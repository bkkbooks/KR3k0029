body:
  text: 羣書考索續集卷三十三宋章如愚編官制門六尚書唐六尚書有虞九官周六卿其實一也或析而為二兵刑是也或合而為一禮樂也然虞官百周三倍之卿雖寡而副之者多故也秦變古為九卿世儒乃謂三孤與六卿為九秦人每事不師古始亦未嘗取法成周漢亦但承秦制而已惟其既為漢之九卿則不可復合為周之六典猶之周有六典亦不復别為虞之九官也今唐既有六尚書又有九寺卿合周漢而並用之不幾繁乎且一尚書之外為侍郎者二為其屬者有四是為二十四司矣二十四司之有侍郎有郎中有員外郎然則何所不包而亦何所不任也大司農少府户部職也太常宗正禮部職也廷尉刑部之屬也大鴻臚禮部之主客也光祿勳但供良醖禮部之膳部衛尉也掌軍器儀仗帳幕兵部之庫部也太僕兵部之駕部也而其餘四監以禮兵二部𨽻之亦可也夫天下之事以古準今雖曰條目增繁而其綱要自不可易苟因其職位重而分之合而總之其屬愈多而統目有要亦無害其為善法矣且以周之六當虞之九豈其遂略於古哉總之也要而屬之也詳唐之官品卿監視尚書少卿視侍郎是一職而二任之又多為之統則其勢必至於虛授而多曠是其繁也乃其所以為曠也杜佑言其繁之弊則曰官名職務遷易不同空存虛稱皆無事實故有二臯陶二垂二契二伯夷二伯益四伯景之說陸長源言其曠之弊則曰兵部無戎帳户部無版圖虞水不管山川金倉不管錢榖光祿不供酒衛帟不供幕祕書不校勘著作不修撰官曹虛設俸祿枉請噫其言之盡矣亦知其為繁乃其所以為曠者歟宰相吏部皆得引其權成周選舉之法先之以司徒終之以司馬唐人先之以禮部終之以吏部司馬位居司徒之次而受其成者故以司馬受終焉若此比類言之則唐之禮部乃古司徒之職而吏部實居司馬之任所謂司士以德詔爵以功詔祿以勞奠食則猶唐之考功郎之類也然而冢宰者初無預於其間豈非以此為有司之職而其廢置大柄不應於始進之日而錙銖耶漢至成帝而選曹之立自漢之東權歸臺閣所謂臺閣者乃尚書之職而選所自出也論者每以不任三公謂為倒置豈非選權益重既非昔比又有不可虛拘者耶晉宋而下其任均矣宋徐羡之謂蔡廣曰黃散而下悉以相委廣猶辭不受則吏部猶重也然自宰相嘗總其大吏部嘗任其小以至於唐有敕授有㫖授敕授者五品以上宰相奏議而除拜之㫖授者六品以下吏部銓材授職然後上言詔㫖但盡開從之不可否也開元初起居補遺及御史等官皆以敕授列於選曹四年乃敕員外郎御史等官皆以敕授不復在吏部矣然則吏部之權日以輕宰相之任日以繁然而唐世吏部之職而亦不可以取必定之制是以丞相吏部皆得引其權焉噫辨論官材司馬職也詔爵詔祿司士職也黃散而下悉委之選宋吏部職也諫員臺屬不由敕授開元以前吏部職也以今準古吏部之職豈其輕哉夫唐既嘗輕之矣然猶有重者存是可嘉也若夫𤣥宗以蘇頲分掌吏部選而親臨决之吳兢切諫以為不可德宗命陸贄擇常參官贄不從命齊抗不復遣官覆吏部歲考曰尚書侍郎皆大臣選今更覆核非任人勿疑之道栁渾不許門下吏白過官曰既委有司而復撓之非賢者用心也此皆明選法本原而知體之論可以為法者也宋六部宋初省部寺監皆為空言而六部之職則有併省之不齊焉且審官院則吏部職也審刑院則刑部職也有判禮院有判禮部貢院則禮部職也而三司一職本舊戶部其職為特詳兵部工部不設主判其職為甚略何也蓋宋以中書主民樞密主兵三司主財三者鼎立彼此相繼樞密之權重則兵部之職省矣三司之權重則合戶部工部而歸之矣不惟是也三監既歸三司九寺之鴻臚光祿司農太府又歸之三司而衛尉一職分隸三衙而統之樞密焉此其建置分合之數也然官名未正體統不立故咸平中楊億以為言至和中吳育又以為言衆論異同莫之能革逮至元豐始舉六典之制而盡復之令僕率其屬丞郎分其行郎中員外判其曹三曹令史承其事四部之事簡故侍郎之員一郎中之員二吏部户部之事詳故侍郎之官各倍之焉而刑部之事稍詳故郎官亦倍其數焉都司以糾之六朝以察之彼此相制秩然不紊矣然員職叢委事權散亂元祐初省併冗員膳部入於主部虞部入於屯田而六曹所減凡十九員而其弊猶未盡去也故寺監當省之說陳於劉安世三監乞隸戶部之說陳於蘇子由言者紛紛未之能已也建置分合今日有成制矣若夫循祖宗之格法選六曹之長二要必如髙宗而後可元豐革六部弊有唐宇文融言利急於辨事增置諸使而正官皆閒了如置轉運使便奪了金部倉部權後來如劉晏身兼二十餘使唐亦欲罷諸使但才罷不多時又復置此弊直至元豐改置始革之且如當時吏部閒了事却歸審官院及流內銓戶部閒了事却歸三司禮部閒了事歸禮儀院刑部閒了事歸審刑院兵部閒了事歸樞密院六部名存實亡諸司體統不正故元豐不得不革東萊文集尚書六部總論宋初吏部總於審官院刑部總於審刑院禮部總於太常禮儀院兵部總於樞密院至於戶部工部則三司使總之元豐改制廢審官審刑而復於吏部刑部職不為冗矣然既復禮部而太常如故既復兵部而樞密院如故豈得謂無冗職乎是四曹之利害不過有冗省之異耳其大弊則在戶部工部何也昔者二部總於三司而今也三司散於諸部寺監詳見比部末利權不可分說事權不一體統分裂版籍與財賦不盡貫通而刑罰之與賦斂則相為表裏也非惟職冗而已也民之受害可勝紀耶然則吏部刑部尤有可言者吏部量才之地也分為四選尚書左右選十有五案侍郎左右選亦十五人是雖未足以核天下之才而亦不至於無法守也刑部人命所係也諸州有典獄諸路有提刑在京有大理刑部覆奏而大臣審官雖時有失出而亦不至於失入也吏部吏部曰天官與周冢宰所掌不同故不復論辨姑以近世之制言之地官户部亦然惟禮兵刑工差與古近考宋朝舊制武臣升朝以上樞密院主之至熙寧則併於審官西院唐制武選兵部主之至元豐則併於吏部於是審官東西院流內三班左右選合為四選分為三十案皆吏部尚書侍郎主之建炎詔六曹惟吏部備官者各有實職非具文也愚謂審官變法雖出於王安石私意置西院所以奪樞密之權沮文潞公之進也而吏部改制則本於神祖之獨斷神宗欲合兩選為一蘇頌贊成之乃併於吏部此其所以為得也夫先漢選舉之法未備而天下無遺才者權出於君相也魏晉選舉之法漸密而不足以盡天下之才者權歸於有司也權出於君相則取人於法之外歸於有司則局人於法之內髙祖驟封孺子文帝超於少年武帝擢賢良為丞相光武用縣令為三公是豈選舉之常式哉魏晉而降掌選部者得其人則黜陟有叙非其人則升沉混淆夫既權歸於有司則亦在乎擇其人而任之耳雖然掌選無私其權雖出於有司而入仕無濫其權未嘗一日不在君相也不清其源而欲塞其流不可得矣嘗觀太平興國初文武朝官班簿止二百人而天聖間則十倍其數宋初三班員不過三百至元豐則一萬二千見李淑疏自元豐改制資叙正行於吏部而朝廷差除出於宰相之化筆由王安石驟用新進少年務以集事故也上之人不清其源下之人安得而守法哉又東漢中興光武雖擢縣令為三公至以四科取士皆令有孝弟公亷之行其公卿辟召刺史二千石察舉授試以職有非其人有司奏罪名并正舉者其後左雄察舉孝亷謬舉者黜免胡廣等十人公選者得拜郎是則東都選舉未嘗無法也宋太宗朝御史王齊論銓選之弊以為殿者雖加厚罰而最者莫見明揚或驟遇寬恩則靡限其功過是銓選徒有名而無實也斯弊也今尤甚焉既不能清源復不能守法其勢未知所止也戶部三司附又見三司說馬户部曰地官也司徒掌教其屬有師氏保氏司證全不同亦不復論辨虞舜命九官獨不聞以財賦為念者於以見自為之意輕也雖然不取諸民無以為國禹宅百揆熙帝載亮采惠疇則事無不統矣禹貢所謂六府孔修庶土交正底慎財賦咸則三壤成賦中邦皆禹之責也亦猶周之國用皆制於冢宰下之人不得而紊之上之人不得而私之也是故周以冢宰總太府玉府內府外府職內職歲職幣之財用者皆九貢九賦九功之入也以上係常賦其他征斂冢宰不與有司書以掌其數有司㑹以聽其㑹計以見九府均通其權皆歸於冢宰也宋朝三司使之名雖因仍五季而總統利權暗有合於虞周之意鹽鐵之財賦雖與古不同而戶部之版籍度支之用度一曰轉運主督運常賦歸之户部猶虞周九貢九賦九功之常也磨勘司衙司胄案修造案河渠案即司㑹職歲作虞共工之故也章聖朝帑藏盈溢其名其數皆籍於三司惟三司得知之而人主不得以私之也章聖屢欲知之而宰臣李沆終不以進慮開人主之侈心也王安石乃籍其數於御前謂之旁通簿其後户部度支鹽鐵雖歸之本曹而磨勘司歸之比部屬刑部衙司歸之都官屬刑部胄案歸之庫部屬兵部修造案歸之工部將作軍器監其出納貿易則歸之太府寺河渠案則歸之都水監宰相既與三司分權而三司所統又分裂於六部寺監又其後也蔡京以制作自任奢費紛起貂璫承受索辦不復關白所司既無計相以司其出入又無宰相以制其大綱祖宗美意至是銷削無餘而靖康之變作矣嗚呼戶部司版籍財賦而刑部之都官比部乃得與焉是刑罰與賦斂相為表裏也自漢而下至於宋朝熙豐惟財賦之任屢更者類皆聚斂之臣投人主之欲於是借刑罰以行其私此又變亂之原司馬溫公蘇子由皆言利權宜歸一欲令户部尚書兼領左右曹而舊三司財用事有在五曹寺監者亦歸户部詔尚書省立法左右曹錢榖尚書兼總數目知其數此元祐元年詔也至於紹聖則不然矣又天下戶數自非兵荒而其離合也有故未容以多寡為盛衰之候也昔者合以避賦役故户數寡今也析以避田數故户數多也唐初天下户八百餘萬而口四千餘萬率一户而五口也今姑以一州一邑言之率户一萬則口二萬户二萬則口四萬是昔者一家五口而今也一家二口也較以一家八口之數唐猶不古而况於今乎賦役不均故其弊至此不究其源而猥譽今日户數之盛過於全盛之時或者其未然也唐户部大略唐户部之職蓋三變焉杜佑謂唐分六部吏兵尚書資任尤美故宰相多兼領之方時無事人主留意人才故以宰相下行選職所以寵資之至於多事之日百萬兵屯仰給有司用度或闕國非其國故不得已而以宰相下行戶部之事而居之者誠為難矣蓋自肅宗朝宰相吕諲使度支其後遂為故事賢相如裴度李德裕皆常以身任之惟裴度知度支非宰相所宜因請罷去韋𢎞質言宰相不可兼錢榖而德裕怒其輕已且貶之識者以是知裴李之優劣然周官以冢宰制國用所謂九貢九賦九式九職皆有常分屬官治其繁而冢宰聽其要爾唐制六部尚書皆宰相之屬而度支郎掌歲計所出而支調之與中書門下議定乃奏然則財用之計本關丞相使户部治其繁而已總其要亦何不可今也係公使名而下行其事是一變也又其後遂省之有分置故吳武陵之鹽鐵度支一户部郎爾今分其務員則戶部之職盡廢此又一變也接於五代後唐遂以鹽鐵戶部為三司使然則戶部之職一變而判以丞相再變而主以他官三變而為三司而所謂三司使乃其三變耳是亦非古宋朝熙豐間始罷此職而論者惜之是但知宋朝典故而未嘗考所自來也宋戶部財宜歸一祖宗時外置轉運使以漕一路之賦內置三司使之總天下之財自常平倉隸司農外其餘皆總於三司一文一勺以上悉申帳籍非條例有定數不得擅支故能知其大數量入為出分畫移用取彼濟此指揮百司及轉運使諸州如臂使指自神宗改官制以來內置尚書六曹二十四司九寺四監應支用錢物五曹與寺監皆得自專有司得符即時應辦而户部不能制申發帳籍又不盡歸户部外分二司轉運司獨主民常賦及酒稅之課其餘財利悉收於常平司轉運之財左曹隸焉常平之財右曹官焉而左曹又不隸於尚書天下之財分而為二始無專主之者至哲宗時司馬光始乞歸户部使權出於一然國家支費之尤大者莫如三司昔時三司有三案掌之一曰河渠二曰胄曹三曰修造皆屬之三司故事歸乎一自神宗分河渠案為都水監分胄曹案為軍器監分修造案為將作監三監既隸工部故事歸於三司司馬光雖乞收攬諸司私權而三監之屬工部者猶故是以蘇轍謂光當時所以未得其要乞明詔三監並隸戶部禮部古者六官以治教禮樂為本而政刑事工其助也漢以來禮教禮樂未免虛文政刑事工乃為先務是故禮樂刑政相為表裏則足以導其善心而制其不善之念後世惟知刑罰與賦斂通至問以禮樂教化則曰鐘鼓之音籩豆之事各有司存而已此唐虞之世夷夔契之所分典不厭其詳而今日既有太常復有禮部人即以為冗且贅也元豐正名禮書猶缺建炎中興復併光祿鴻臚而歸禮部以其職掌虛閒雖多無所事也然則禮部亦幸有學校貢舉之事而已不然太常自足以治三禮何以禮部為哉貢舉太宗至道中御史王齊陳十事以為貢舉不嚴孤貧難進莫若令在朝三品及見任文武升朝官子孫弟姪薦名於兩監即今所謂監舉也又欲令未升朝官子弟及白屋之士薦名於州郡即今所謂鄉貢也然後升於禮部亦兩分之則權勢異途孤貧自進齊之說誠然矣特不知今之薦於監者率十取二三而薦於鄉者率數百人而取一其所以優權勢而抑孤貧者猶故也然宋初禮闈所取不過十一人未幾而數十人又未幾而數百人至於熙豐貢以萬計而所取又倍於前者其故何歟宋初有制舉有薦舉有遺逸舉以分其所入之餘也熙豐大臣盡屏諸科而限以科舉一路猶西蜀之水㑹乎巫峽無怪其奔衝鬭激疾馳急趨而無復淵沄回委之態也使齊生乎今其論貢舉之弊又當如之何而可行哉嘉祐元年詔每嵗秋試自縣令告察行義保任之上於州長復審察焉然後上本道使者類試已保任而後有缺行則州縣皆坐罪若省試文謬坐元考官于時富弼韓琦任政府也是後王安石吕惠卿專政一切變更故其所言則欲庶幾三代教育選舉之法而所取者葉祖洽陸佃輩也兵部唐制兵部掌武選至元豐則併於吏部宋初兵部悉歸樞密院至元豐始分掌武舉地圖車甲之政令然則武選在吏部兵權在密院而兵部之所職掌亦甚微矣宜乎中興之始以衛尉歸兵部以兵部郎兼職方又以駕部兼庫部而太僕寺亦隸焉然則今之密院乃古者夏官司馬之職兵部特贅員耳名為夏官其實安在刑部刑部之與大理自漢以來未嘗偏廢當今諸州有司録有法曹有理掾諸道有提㸃刑獄在京有大理寺刑部覆奏大臣審讞猶不識古人詳刑之意者人命所係甚重也然刑部之有比部者唐制也天下財賦皆納於左藏庫而太府四時上其數比部覆其出入㑹稽逋勸每三月一比也周官司㑹以屬冢宰宋初比部悉歸三司是以元豐改制復以比部歸刑部又以地官之司門隸焉豈古人省刑罰薄賦斂之意歟荆公理財動法周典至是不法周典而法唐制又何歟工部工部周之冬官也六官惟司空之屬不具故後世足之以考工記或曰足之者非也六官其屬六十而地官六十有三所謂角人羽人丱人之類皆工也秋官六十有二所謂司烜柞氏皆工也夏官之屬幾七十所謂掌固掌疆司險量人司爟挈壺射人司弓矢司甲司戈盾藁人司兵之類皆工也百工之士散處於六官之屬云爾是或一說也今工部之屬有虞部即地官之山虞澤虞其屯田即稻人水部即川衡也其然豈其然乎然宋朝工部之職悉總於三司修造案初無不集之事豈亦周官之意乎官制行農田水利等事紛然四起無益於國祗以病民而已元祐詔兼領司封司勳倉部駕部水部各減一員復以主客兼膳部職方兼庫部都水兼司門屯田兼虞部亦以閒劇不同故也劉安世請省寺監以歸六部哲宗即位之初膳部併於主客虞部入於屯田又六曹所減凡十九員處之得其理也今太僕鴻臚光祿太府各二卿軍器將作少府各二監丞部官屬仍不預焉省曹所減止十餘員而寺監所謂又倍平昔昔杜佑建議於唐此謂一臯陶二垂二伯夷二伯益云云今凡寺監之職可以為六部者宜併省之罷三司使審官院審刑院三舍法事始歸於四部吏部所掌者注銓之法也而銓選之法不容無弊弊在官聯太冗而奸𨽻得以壅蔽稽留戶部所掌者財賦之法也而財賦之法不容無弊弊在持守太吝而德澤因以不逮於民禮部掌貢舉而貢舉之弊失於士風刻薄濫進偶得者容乎其間而不知詆訶刑部掌奏讞而奏讞之弊失於案牘稠重舞文巧詆者容乎其間而不加辨别自五代置三司而移户部財賦之權自淳化雍熙置審官院而侵吏部銓選之權自審刑院建而讞復之議屬於中書不屬於刑曹自三舍法行而升貢之序歸於學校不歸於宗伯後聖立法舉而更張之復六官之舊而各散其司天下咸曰名正而辭順李賢良垕文唐吏兵尚書資任尤美杜佑謂唐分六部吏兵尚書資任尤美故宰相多兼領之蓋吏部主文選兵部主武選此權任之所歸是以稱美焉惟户部當古地官之任其任甚重其務甚繁然而不若兵吏之美也方時無事人主留意人材故以宰相下行選職所以寵資之至於多事之日百萬兵屯仰給有司用度或闕國非其國故不得已而以宰相下行户部之事而居之者誠為難焉制度編唐禮部乃古司徒吏部乃古司馬考功郎乃古司士成周選舉之法先之以司徒而終之以司馬唐人先之以禮部而終之以吏部司馬位居司徒之次而受其成者故以司馬受終焉若此比類言之則唐之禮部乃古司徒之職而吏部實居司馬之任所謂司士以德詔爵以功詔祿以勞奠食則猶唐之考功郎之類也然而冢宰者初無預於其間豈非以此為有司之職而其廢置大柄不應於始進之日而錙銖耶制度編兵部為閒曹工部為散秩且兵部之設如古司馬本以主天下甲兵出入之政工部之設如古共工本以主天下百工營築之事今也握兵之將出於三衙管軍用兵之略制於樞密而兵部特掌其籍而已數之盈虛彼莫得而周知籍之冒僞彼莫得而致詰也則兵部於此為閒曹土工之興出於宫苑伎巧制作之工專主於內侍省而工部特掌其籍而已器械之精粗彼莫得而問費用之多寡彼莫得而預也則工部為散秩李賢良垕文集兵部工部官職冗贅兵部舊章軍旅武選今軍旅歸樞密使武選歸吏部右選兵部有尚書侍郎官所領不過廂軍鋪兵之名籍其屬有職方者掌諸州逐年所上地圖有駕部者每年一至車輅院行視而已近雖省併郎官員缺一司仍在省官之俸不能當吏祿之竒數文移回復之害固自若也工部所掌營繕百工之事今營繕之大者歸轉運司臨安府小者歸修內司百工有文思院軍器所而將作軍器監實按臨之亦不過歲時按行故事士之才者既無職以自見而不才者得以濫吹竽於其間薛季宣文宋璟為吏部人服其公姚崇為兵部武選亦治吕吉甫曰稱必有星尺必有刻勿為無星之稱勿為無刻之尺蓋法者天下之至公本無私也所以不為天下之信者惟用者之私爾唐之銓衡李嶠崔湜之徒掌之則傾附勢要以至於選法大壞者是所謂無星之稱無刻之尺也宋璟掌吏部而人服其公姚崇為兵部而武選亦治者所謂稱之有星而尺之有刻也林少頴唐論羣書考索續集卷三十三
