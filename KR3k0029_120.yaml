body:
  text: 羣書考索後集卷五十四宋章如愚編財賦門雜賦類古者取民謂之稅軍用謂之賦而雜征或通謂之稅賦禹貢摠以貢名周官一書有所謂九貢九賦有所謂近郊逺郊之異又有所謂屋粟夫布漆林山澤之征然角羽草葛皆以之而充賦不強民以所無也秦人頭會箕歛無藝甚矣漢氏之興其取民者雖曰三十稅一然田租之外民七嵗以上則有口賦十五以上有筭賦又戍邊則有更賦班史以為厥名三十仍什税五王莽下令亦曰漢氏減輕田租三十稅一常有吏賦罷產咸出厥名三十實什税五也仲舒曰田租口賦鹽鐵之利二十倍於古漢興循而未改史記曰孝惠時量吏禄度官用以賦於民孝武時入物補官出貨除罪更皮幣筭舟車𣙜鹽鐵置均輸𣙜酒酤其目多矣唐初租出榖庸出絹調出繒布未嘗以錢為賦其後始有青苗錢地頭錢至徳宗相楊炎遂作兩税法先計州縣嵗貢及上供數而賦於民未幾而借商之令出増税之法行其後筭間架并除陌竹木茶漆皆有税矣方初定兩税時貨重錢輕乃計錢而賦帛既而物價愈下所納愈多輸一者過二度支以税物頒諸司皆増本價為虚估倍給之而繆以濫惡督州縣剥價謂之折納賦役日重陸贄極言之使民摘山而煮海官售劵而納息曰權貨之錢官給屋以居民民出錢以奉官曰樓店之錢重五合之價計其榖而折其直使民貢榖以輸官曰折變之錢嚴酒麴之禁使民為之而入其課曰坊場之錢據津渡之衝要使民主之而取其筭曰河渡之錢重門闗之防使吏守之而察其貨曰商税之錢凡雜錢鹽錢物産錢則曰兩税之錢絲麻果蔬百物之貨則曰雜賦之錢曰地頭錢丁口之錢曰免役之錢免引之錢曰青苗之錢除陌之錢折帛淳化間天下承平紬每疋為錢六百文絹為錢八百文朝廷於民之乏先於春夏之交每疋給本錢一貫文夏秋始責之輸絹於是有和買之名其後大農不足始命東南郡以塩折直崇寧以後塩利盡歸朝廷而嵗輸其帛如故中興之初絹價倍増每疋為錢十貫文建炎三年乃令上戸輸絹下戸輸錢於是有折帛之名每疋折錢六貫新安志折錢八貫省和議以後令人戸輸納者八分折錢二分納本色絹三分折錢七分納本色當時兵火之餘桑柘煨灰絹價倍増朝廷損價折錢本欲優民戸也承平既久桑麻遍野絹每疋為錢三貫省而民間所折八貫省至是民戸益用輸錢之苦和買預置咸平二年李士衡建言民間每嵗春收息利於蒙家不若官中預給緡錢至秋輸帛從之祥符元年知潁州王明請貸錢與民蠶成輸絹是時絹疋七百官出一千又先得之民以為便天下謂之預買絹仁宗天聖七年江都主簿王琪上書言江都戸止五千而嵗和買絹三千祖宗舊法降本其後或給塩又其後則直賦於民今又以其十之三以為折帛而充上供矣承平時有支移折變之目熈寧元祐紹聖中雖有意於更張而卒不能改宣和中有言非法折變者既曰以絹折錢又以錢折變以絹較錢錢倍於絹以錢較麥麥倍於錢展轉増加民無所訢高宗赦書和買本支實價聞立價甚低或以他物凖折或以無虗實劵充數甚者未支實錢而前期起催委提刑覺察商稅古者闗譏而不征至周公而後始有市㕓之征周公非以為利蓋有田以耕有宅以居而又有隙地以為場圃藝植如是而或有自放於㳺惰者始從而困辱之所以抑末而歸本且戰國之間始有賤丈夫者出而征商此孟子之所以嘆也蓋井田既廢貧富不闗於上其勢不得不操尺寸之貨以逐千百之利漢髙令賈人不得乗車重租税以困辱之其意猶未以為利也至武帝時外興師旅縣官太空而富商不佐公上之急始更幣以抑之商賈以幣交而積貨於是有筭商車之法而告緡之令行矣建隆之元首詔諸州不得羇留行旅貨幣常輸外不得發箧淳化二年詔曰闗市之征其來舊矣用度所出未遑削除征筭之條當從寛簡諸路商税宜参酌裁減以利細民五年詔商旅除貨幣外細碎交易不得收税其當筭之物令有司條祈頒下天聖三年免荆湖㳂江上水空船力升康定元年詔訪聞諸州搜檢税物不依條例冀為績効今後並依自來體例不得創増無名税額慶歴中議弛茶塩之禁及減商税范文正公不可茶塩商税之人但分減商賈之利今國用未減既不取之商賈復取之農恐害農也天禧以前二浙之大郡合一都征商之入有不及五六萬者自熈寧以來坊場河渡白地房廊坑冶市舶農田水利各置提舉而利權不在州縣矣自方鎮之亂始息而經制之錢興自金人之擾愈甚而總制之名立渡江後陳享伯創二浙之糴本江東西湖南北之大軍月樁諸縣之版帳青冊軍衣無額經總制其目不一宋國初平斛斗太祖去廣南大斛之弊而秋苖唯正賦間雖有義倉之歛每一石正賦輸一斗建隆中置而乾徳罷景祐平甫置未幾而㝷罷然㝷即罷去今日有正耗有省耗有中耗有斗脚有市例頭子之外有糜費後唐明宗嘗入倉觀受納主吏懼責其多取乃故為輕量明宗曰倉廪宿藏動經數歳若取之如此後豈免折閱吏因訴曰自來主藏者所以致破家竭産以償欠正為此耳明宗惻然乃詔自今石取二升為䑕雀耗至今行之所謂加耗是也近世立般量出剰法本防吏姦而州縣貪暴多取於民一斛苖糙倍納二斛又至於加七加八以其正數上供而存出剰以自給則加耗之害又不足言財賦總論禹平水土水火金木土榖惟修正徳利用厚生惟和益稷奏艱食鮮食懋遷有無化居此為民理財也禹貢一書始任土以作貢賦之法冀州賦上上錯第一雜出第二兖州賦貞青州賦中上第四徐州賦中中第五揚州賦下上上錯第七雜出第六荆州賦上下第三豫州賦錯上中第二雜出第一梁州賦下中三錯第八雜出第七第九三等雍州賦中下第六貢皆隨地所産如揚之橘柚荆之大龜必待錫命而後貢亦非常用之物其取田賦不過什一此虞夏貢賦之大畧也商以天子之地百里之内以供官公田籍助也而不税是以其求也寡其供也易又冢宰於嵗之杪五榖皆入然後制國用量入以為出説者曰商制也至商末暴虐厚賦歛以實鹿䑓巨橋之積周武王伐商而有天下發其財𣪚其粟於是分其九畿侯畿貢祀甸畿貢嬪物男畿貢器物采畿貢服物衛畿貢財物蠻畿夷畿貢貨物鎮畿藩畿其所貴寳為䞇及周公作周官而理財之法益詳以九賦歛財賄邦中四郊邦甸家削邦縣邦都闗市山澤幣餘以九式均節用祭祀賓客䘮荒羞服工事幣帛芻秣匪頒好用之式以九貢致邦國之用祀嬪器幣材貨服斿物凡九貢皆屬於天官冡宰小宰致邦國九貢九賦九式之貳以内節財用又有太府受其財用之入凡頒財以法式授之外府掌邦布之出入以待邦之用内府掌賦貳之貨賄以待邦之大用職内則掌邦賦之入職嵗則掌邦賦之出其理財之官可謂衆矣然而任地國宅無征園㕓二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二唯漆林之征二十而五無非度地以取諸民周公所以為善理財者歟此商周財用之大畧也周衰魯宣公初税甸哀公用田賦春秋譏之其初履畝而税始用田賦也是時有若對哀公年飢用不足之問曰盍徹乎公曰二吾猶不足如之何有若曰百姓足君孰與不足又問孔子子曰薄賦歛則人富公曰寡人貧矣子曰未有子富而父貧也管仲相桓公専以漁塩之利富國陵夷至戰國上之人拳拳乎利國之問下之人皆曰我能為君充府庫故孟獻子曰百乗之家不畜聚歛之臣與其有聚歛之臣寧有盗臣白圭問孟子曰吾欲二十而稅一何如孟子曰子之道貉道也秦孝公用商鞅開阡陌而十二年初為賦始皇又盡括提封之内撮粟尺布以自奉重以内興功作外攘夷狄收太半之賦仲舒曰秦田租口賦鹽賦之利二十倍於周二世不變而海内遂叛漢髙帝鑒秦之弊輕田租什五而税一量吏禄度官用以賦於民而山川園地市肆租税之入自天子以上封君湯沐邑名為私奉養不領於天下之經費重租稅以困商賈四年史書初為筭賦漢儀注云人年十五至五十六出賦錢每人百二十為一筭盖譏其變古重歛也孝惠復十五税一文帝人賦四十丁男三十而税一其筭賦稍減於前矣帝朝而問丞相勃曰天下一嵗錢榖出入㡬何勃謝不知問平平曰當責治粟内史是皆不知理財宰相之事也是時晁錯言令人入粟拜爵除罪自此利源開郡縣邉食足可勿收農人租帝從之賈誼亦曰公私之積猶可哀痛乃下詔賜十一年租税之半十三年詔除田租正以倉廪豐故也孝景二年令人半出田租平分而税一其後上郡旱復修賣爵令及輸粟除罪文景相承京師之錢至鉅萬貫朽而不可校太倉之粟陳腐而不可食武帝因文景之蓄忿胡粤之害於是始招東甌繼事兩粤通西南夷以罷巴蜀置滄海郡以動燕齊及馬邑之釁開而財賂耗廢不贍矣於是下入物補官出貨除罪之令而興利之臣自此而始財賦稍充遂築朔方費巨萬府庫益虗矣復募民入奴婢而入羊者得為郎大将連嵗伐羌經用又竭矣乃置武功賞官直三十萬金驃騎比年大出且通漕救飢縣官復大空矣更造白鹿皮幣白金三銖錢以東郭咸陽孔僅領塩鐡事而桑洪羊貴幸三人言利析秋毫及衛霍絶漠賞賜五十萬金是時財又匱戰士頗不得禄矣其後宫室之役興封禪之禮舉則以榷塩鐡算舟車告緡錢時富人爭匿財乃尊卜式以風之而百姓終莫分財而楊可告緡錢矣榷酒酤也廵守賞賜帛百萬而金錢以萬計則又以均輸平凖之置也洪羊置均輸平凖盡籠天下之貨貴賣賤買名曰平凖推原其故由文帝蓄積之富是以啓武帝之慾心昭帝時賢良文學皆願罷塩鐡酒錢均輸官元始中罷酒𣙜元鳯四年減口賦十三漢儀注民十嵗至十四出賦二十三其二十以食天子三錢武帝以馬車騎焉宣帝甘露中減民筭三十至元帝始罷塩鐡官三年而復之孝成又減天下賦筭四十是以王莽下令曰漢民輕田税三十税當有更賦罷癃乃出厥名十三實什税五也光武中興田租三十税一明章時人無横徭時張休請封錢以年帛為租帝從之安帝用不足三公始請入粟為闗内侯桓帝又置西方金堂為私藏靈帝乃垂鴻都之牓開賣官之路三公拜者皆輸東園禮錢千萬况其下乎晉劉毅云桓靈賣官錢入官庫時趙忠又説帝令歛天下田税錢以營宫室延熹中陳蕃有三空之説此兩漢財用之大畧也晉泰始中杜預為度支定榖價較塩鐡制課調内以利國外以救邉五十餘條成帝又度田取十分之一畝税米三升至咸康初米空垂五十餘萬斛尚書諸曹以下免官縣帑藏空惟有練布數千而王道身衣大練遂貴孝武増口税五十宋武帝制人戸嵗輸布四疋明帝時師旅不息加以侈費百官皆停禄埋錢於殿中為私錢後魏正光後國用不足充折六年租調取之又賜與無節乃減百官之禄徹軍人常廪後因蘇綽以國用不足而征税頗傷既而嘆曰今之所為正如張弓非平世法也後之君子其誰能弛乎子威以為己任至隋時奏減賦役文帝躬節儉益免田租寛税賦有司上言府庫皆滿更開左藏創屋以受之詔曰寧積於人無藏府庫煬帝繼之天下充賦乃大治宫室百役繁興東西廵幸征伐髙麗供奉不給天下積怨而亡此晉南北朝隋財用之大畧也唐初授田以口分世業而取以租庸調之法其用之有節制兵以府衛故兵多而無損設官有常員故官不濫而易禄自高宗用李義府許敬宗役費並起永淳以後財不足加以天后之亂賦益惨矣𤣥宗開元初復租庸調而國用充天寶以來天子驕佚而用不知節大抵用物之數常過所入於是韋堅愼矜王鉷楊國忠各務㾗刻嵗進非租庸正額錢百億萬入大盈庫以供天子燕私更禄山之變民物弊耗肅宗即位第五𤦺言財賦所産江淮居多假臣一職可無乏用即以為江淮租庸使上元中用劉晏充度支治財賦焉二年以元載代之載取八年租調之逋負者又平分民租謂之曰著代宗永泰二年分天下財賦鑄錢常平轉運塩鐡置二使以劉晏第五𤦺主之晏斡山海以佐軍用雖兵戈數十年歛不及民而用度足晏理財以得人養民為先第五琦𣙜鹽以佐軍興初嵗收緍錢六十萬末乃什之嵗入千一百萬而𣙜塩居大半先是天下財賦皆歸左藏而太府以時上其數尚書比部覆其出入至第五𤦺為度支使請歸大盈庫供天子給賜主以中官自是天下之財為人主私藏有司不得程其多少至徳宗罷劉晏相楊炎遂作兩税法量出以制入是法既行而朱滔王武俊田悦叛用益不給而惜商之令出趙賛又請税竹木茶漆十之一税間架除陌錢及涇卒大呼之後而間架除陌竹木等税皆罷暨朱泚既平帝屬意聚歛常賦之外進奉不息劒南有日進江西有月進其他皆徼射㤙澤以常賦入貢名為羡餘至代易又有進貢自裴延齡用事益為天子積私財而生民重困至順宗乃罷宫市及月進憲宗又罷代進奉及兩税外𣙜率分天下之賦為三一曰上供二曰送使三曰留州及討淮西度支楊於陵坐饋運不繼貶以皇甫鏄代由是益為刻剥後李巽代杜佑為塩鐡使自劉晏之後居財賦之職者莫能繼巽掌一年征課所入過之又一年加一百八十萬緡淮西既平上浸驕侈皇甫鏄程异曉其意數進羡餘以供費是時四方爭進奉謂之助軍賊平又進謂之賀禮後又進奉謂之助賞上加尊號亦進奉謂之賀禮穆宗即位一切罷之兩税外加一錢者以枉法論是時錢重楊於陵請廣鑄鼓兩税皆輸絲纊唯塩酒用錢張平叔請官自賣塩又奏追逺年逋欠皆不從武宗㑹昌未置備邉庫收度支塩鐡錢宣宗更號延賞資庫初以度支郎中判之至是以屬宰相其任益重諸道進餽諸軍皆輸焉天下遂困竭矣此唐財賦之大畧也以通典周禮唐志史記修宋法後唐之制三司使實總國計貢賦之入朝廷未嘗與焉總塩鐡度支戸部號計皆使位亞執政目為計相又有副使而逐司各置判官二員其三司則判官六員分主之開折司衙司磨勘司修造司曹案司渠案太祖太宗多以武儀為三司自真宗以㓂萊公充之始不用武儀矣其任人也如此景徳中丁晉公著景徳㑹稽録皇祐中田况著皇祐㑹稽録治平中蔡襄著治平㑹稽録元祐中蘇轍著元祐㑹稽錄其計度也如此太祖以來有景福内庫太宗改名内藏廪所貯金帛備國用也凡郊祀所費鉅萬皆出於此不取於民真宗時李逈曰祖宗初置内藏庫欲取西北支凶年請出以佐國用帝大發以賜三司其置庫也如此真宗嘗謂王旦曰三司官不欲數易財榖案籍往往不見本末仁宗時賜發運使出身以久其任時范蜀公鎮上疏請約祖宗以來官吏兵數酌取其中為定制以今賦入之數十七為經營而儲其三備水旱非常又官古者冡宰制國用唐以宰相兼度支今中書主民樞宻主兵三司主財各不相知故財已匱樞益兵無窮民已困而三司取財不已請使中書通知兵民財利大計與三司使同制國用其攷察出納之數也如此祖宗之時每嵗塩利大率三千餘萬緡茶税百四十萬緡採山之鑄六百萬緡熈寧以來祖宗之法變矣國初財用未使三司總之三司使自唐明宗以張廷明為三司使三司使之名始此其費用蠧耗之大者皆可節以制度也至王安石為相取周禮以行新法謂宰相當主財計遂與三司分權凡賦税常貢征𣙜之利方歸三司摘山煮海坑治𣙜貨戸絶汲納之財悉歸朝廷其立法與常平免役坊場河度禁軍闕額地利之資皆號朝廷封樁又有嵗科上供之數盡運入京師别創庫以貯之三司不預焉於是祖宗處國計之良法盡壞矣宋朝分路設轉運使副判官付以按察之權使督財賦悉𨽻三司凡經費羡餘轉運官獻之三司盡轉都城積於左藏庫别有科名及分貯内藏庫者皆三司使主之熈寧理財乃納勸沮之法所遣使者盡出宰相之門皆務聚歛以恱廟堂非若三司使有權以動人則漕臣亦不敢横歛也章聖朝帑入盈溢其名數皆籍於三司其總數唯使得知也章聖屢欲知其數宰相李文靖公沆每對以容令三司使供具王欽若見乆不奏問之文靖曰非不能取索但不敢奏知恐知數多而廣用也此乃深得祖宗置三司使之㣲意沆又言在朝廷十餘年四方之言利者未嘗施行以此報國耳安石乃置旁通簿於御前盡籍國帑之數在神宗恭儉郡國帑藏率皆盈溢至崇寜後蔡京制禮作樂種種蠧國勸上以奢費内興營繕外拓境土而又宦官専局應奉及滛巧繕修與夫除戎器備河患之費凡百端皆不先闗戸部但各作决科次請于朝廷或兼取于戸部者非若三司使有専按以闗防也自元豐改制户部尚書全無計相之權職在朝廷之文移僅能經畫在京師官吏諸軍俸給而已以此論之三司使之職不待改官制而失其權自熈寧變法度之時已壞矣况政和之後以鉅鐺為承受獨總財計以便宜取則戸部尤難守其職業矣以㑹要蔡元道舊典修自天聖以來天下病夫官之多也而州縣有待闕官月料之費自熈寧以來初置宫觀差遣而州縣有宫觀官請俸之費自熈寧以來初遣宗子疎屬補外官而州縣有宗子口劵之費自紹興以來初遣養老之兵而州縣有養老使臣廪給之費羣書考索後集卷五十四
