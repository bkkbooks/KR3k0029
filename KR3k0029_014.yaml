body:
  text: 羣書考索卷十四宋章如愚撰正史門東漢類始末漢明帝詔班固陳宗尹敏孟冀作世祖本紀及建武時功臣列傳後有劉珍李尤雜作建武已後至永初間紀傳命伏無忌黃景作諸三王子恩澤侯并單于西羌地理志又崔實曺夀等作漢記蔡雍盧傳等續為東觀漢記晉薛瑩作後漢記司馬彪作續漢書華嶠刪東觀記為後漢書謝沈袁嵩皆作後漢書宋范曄集諸家作十紀十志八十列傳凡百篇十志未成曄被誅至梁劉昭補成之唐章懷太子賢集當時學者張太安周寶寧等同注范曄後漢書傳之至今景祐元年余靖王洙悉取館閣諸本參校嘉祐七年仁宗讀後漢書見墾田字皆作懇字詔國子監劉攽等分手校正初曄令謝儼撰志搜次垂畢會曄誅儼悉蠟以覆車一代為恨曄字蔚宗少好學善為文章為尚書吏部郎元嘉元年左遷宣城太守不得志乃刪衆家後漢書為一家之作至於屈伸榮辱之際未嘗不致意焉曄獄中與諸甥姪書以自序其略曰吾造後漢轉得統緒詳觀古今著述及評論殆少可意者班氏最有髙名既任情無例惟志可推耳博贍可不及之整理未必愧也吾雜傳論皆有精意深旨至於循吏以下及六夷諸序論筆勢縱放實天下之竒作其中合者往往不減過秦篇嘗共比方班氏所作非但不愧之而已欲遍作諸志前漢可有者悉令備雖事不必多且使見文得盡又欲因事就卷內發論以正一代得失意復不果贊自是吾文傑思殆無一字空設竒變不窮同合異體乃不自知所以稱之此書行故應有賞音者紀傳例為舉其大略耳諸細意甚多自古體大而思精未有此也但恐世人不能盡知多貴古賤今所以稱情狂言耳紀吕后稱制班氏次其年月雖與帝紀同編而記其事迹乃繫於外戚傳於范曄乃升東都諸后盡列諸紀豈以六后臨朝之故耶抑亦未之思也志食貨國家之本不可不志東漢略之藝文者一代之典不可或缺而漢志缺焉志傳班固十志官制獨缺其略僅見於百官表逮東都至百官而兩都之制始詳班史者漢末清節之士如譙元周黨逄萌之徒特見於王貢序傳而已范史皆傳於獨行逸民之間數子雖淟汨於班氏而卒光明於范史然則有補於班氏書者多矣傳范曄增損東漢自謂無慙良史而王喬鳬履出於風俗通左慈羊鳴傳於抱朴子皆有取而載之傳穢莫大焉史通蔡雍之女文詞有餘節槩不足曄乃列之烈女傳果何見乎史通謂秦嘉之妻徐氏動合禮儀言成規矩蔚宗標烈女乃不齒焉又何哉隗囂從更始公孫述而叛光武而范曄乃為囂辨論且加虛美焉多見其無識也怪力亂神宣尼不語吞燕卵而生商啓龍漦而周滅厲壞門以禍晉鬼謀社而亡曺江使反璧於秦皇圮橋受書於漢相此則事關軍國理涉興亡有而書之以彰靈驗可也而王隱何法盛之徒撰晉史乃專訪州閭細事委巷瑣言聚而編之自為鬼神傳録言之不經范曄博采衆書裁成漢典至於方術篇及諸蠻夷傳乃録王喬左慈廪君盤瓠言唯迂誕事多詭越惜哉范曄傳儒林而鄭康成一代儒宗乃不與於其間何也蓋康成博通六經傳記非漢儒專門之比蔚宗所以表而出之雖然康成於經功罪相半革章句之繁蕪會合衆説於經固有功矣至於援讖釋經朱紫雜揉於經亦不能無罪也范曄之論乃謂仲尼之門不能過抑又過矣補注梁劉昭得舊志補注為三十卷國朝乾興中孫奭欲以劉昭注補後漢志三十卷然則附昭注補志於東都正史者其殆乾興之時乎史通云范曄之刪後漢也簡而且周疏而不漏蓋云備矣而劉昭採其所損以為補注言盡非要事皆不急唐太宗時章懷太子等注三國志類陳夀字承祚仕蜀為令史蜀亡晉武帝時為著作郎魏志三十卷紀四傳二十六有后妃諸王有方技有夷狄蜀志十五卷吳志二十卷君臣俱謂之傳史通云先是魏時魚豢私撰魏略後孫盛撰魏氏春秋王隱撰蜀記張勃撰吳録宋文帝嫌三國志簡略命裴松之兼採衆書補注其缺初夏侯湛亦著魏書見夀所作三國志便壞已草王通稱夀書細觀之實髙簡有法不言曺操本生而載夏侯淳及淵於諸曺傳中則見嵩本夏后氏之子也髙貴鄉公書卒而載於司馬懿之奏則見公之不得其死也他皆類此但以魏為紀稱漢吳曰傳又改漢曰蜀世頗譏其失至謂其銜諸葛孔明髠父而為貶詞求丁氏米不獲不立儀廙傳之類亦必然也朝志陳夀傳夀為著作佐郎撰吳蜀三國志凡六十五篇時人稱其善序事有良史才張華深善之謂夀曰當以晉書相付耳然不為丁儀立傳又言諸葛將略非所長無應敵之才議者以此少之元康七年卒尚書郎范頵等上表曰陳夀作三國志辭多勸戒有益風化雖文豔不及相如而質直過之願垂采録於是詔洛陽令就家寫其書夀又撰古國志五十篇耆舊傳十篇魏黃初中始命魏覬繆襲草創紀傳纍載不成又命韋誕應璩王沈阮籍等復共撰定成魏書四十四卷其書多為時諱殊非實録吳大帝之季年始命太史令孚項峻撰吳書孚峻皆非史才其文不足紀録至少帝時更敇韋耀周昭薛瑩梁廣華核訪求往事相與記述為五十五卷至晉陳夀乃集三國史撰為國志先是魏魚豢私撰魏録其後孫盛撰魏氏春秋王隱撰蜀記張勃撰吳録異聞間出其流甚多宋文帝以國志載事簡略乃命裴松之兼采衆書補注其闕由是言三國志者以裴注為本魏文帝黃初元年十月辛未受禪陳志云庚午袁紀亦云庚午按獻帝紀乙卯始發禪册二十九日登壇受命又文帝受禪碑亦云辛未受禪陳志袁紀誤也按蜀志稱王崇補東觀許蓋掌禮儀又郤正為祕書郎廣求益部書籍斯則典教無闕屬辭有所而陳夀評云蜀不置官者得非厚誣諸葛乎漢氏之亡天下鼎峙論王道則曺逆而劉順語國祚則魏促而吳長但以地處中夏人傳正朔度長挈大魏實居多二方之於上國亦猶秦繆楚莊與文襄而並霸逮作者之書事也乃沒吳蜀號諡呼權備姓名謂魚豢孫盛等方於魏邦相去頓爾懲惡勸善其義安歸文中子謂陳夀有志於史依大義而削異端阮逸注云夀變史稱志大抵簡略存其大義傳魏次蜀而後繼之以吳魏蜀后妃皆以后稱至吳則曰夫人云按三國志諸葛誕毋邱恪皆破家殉國視死猶生而乃與鍾會同傳其何以激揚名教以勸事君者乎古之書事也令賊臣逆子懼今之書事也使忠臣義士羞史通魏武帝乘時撥亂電掃羣雄二袁劉吕總關王室不涉霸圖而陳夀國志引居傳首臧洪陶謙劉虞公孫瓚生於季末自相吞噬漢典所具而魏册仍編豈非流宕忘歸迷而不悟者乎褒貶丁儀丁廙有盛名於魏夀謂其子曰可覔千斛米當為尊公作佳傳丁不與竟不立傳夀父為馬謖參軍謖為諸葛亮誅夀父被髠乃為亮立傳以將略非所長諸葛瞻輕夀乃言瞻名過其實議者少之陳夀蜀人其志黨蜀抑魏按曺公罪百田常禍千王莽文帝臨戎不武為國好奢夀皆依違其事無所措言劉王終始無瑕可比少康光武夀抑其長攻其所短蓋魏為典午所承蜀乃中朝所嫉故曲稱曺美虛説劉非安有背曺向劉疏魏親蜀者乎正統史通云陳夀蜀書首標二牧次列先主以繼焉璋豈以蜀是偽朝遂不遵於常例隋李德林著論稱陳夀蜀人其撰國志黨蜀而抑魏殊不知以魏為正朔之國則隋乃僭偽之君考其大致多曲稱曺美而虛説劉非安有背曺而向劉疏魏而親蜀也史通晉桓溫覬覦非望鑿齒著晉漢春秋以裁正之起光武終晉愍凡五十四卷於三國時蜀以宗室為正統魏武雖受漢禪尚為篡逆至晉文平蜀乃為漢亡而晉始興焉習鑿齒傳又曰吳魏犯順蜀人仗正三格論習鑿齒漢晉春秋以蜀為正統其編目敘事皆謂蜀先主為昭烈皇帝史通三國志泰和五年乃書諸葛冦天水正始元年書曺爽征蜀豈其然乎夀之志三國也紀魏而傳吳蜀夫三國鼎立稱帝魏之不能有吳蜀猶吳蜀之不能有魏也夀獨以帝當魏而以臣視吳蜀而吳蜀於魏何有而然哉此夀之失也蘇文晉書類貞觀中太宗以晉史何法盛等十八家制作雖多未能盡善乃勑史官房玄齡等褚遂良許敬宗更加纂録採正典與舊説數十餘部兼引偽史十六國為紀十志二十列傳七十載紀三十合為百三十卷晉載紀十六國傳凡五涼四燕三秦二趙夏蜀凡十六國今考之僅存十四國曰前趙劉淵後趙石勒前燕慕容廆前秦苻堅後秦姚萇蜀李特後涼吕光後燕慕容垂西秦伏乞歸仁北燕馮跋南梁秃髮烏孤南燕慕容德北梁沮渠蒙遜夏赫連勃勃列之載記凡十有四而涼缺其二蓋前梁張軌雖處西域實受晉命而臣節不廢而西涼李皓實唐之祖晉史作於唐世故不敢列之十六國而附之列傳云又命李淳風李延夀等十三人分掌著述敬播四人等考正類例多出敬播天文律厯則李淳風為之惟宣武紀陸機王羲之傳論太宗則自為之當時修史者多文詠之士好採詭異以廣聞見學者譏之江左餘風文多駢四儷六非作史之體故太宗親撰四贊以息浮議故總題曰御撰云陸機撰三祖紀束晢又撰十志會中朝喪亂其書不存先是王齡有著述才每私録晉書未及就而卒子隱博學多聞受父遺業撰晉書八十九卷隱雖好著作而辭拙才鈍時于寶亦撰晉紀其書簡略直而能婉甚為當時所稱晉江左史自鄧粲孫盛王韶之檀道鸞已下相次繼作逺則編紀兩帝近則惟敘六朝至宋何法盛始撰晉中興書勒成一家首尾該洽齊臧榮緒又集東西二史合成一書貞觀中詔前後晉史十有八家未能盡善乃敇史官更加纂撰自是言晉史皆棄其舊本競從新撰者焉宋臨川王義慶著世説新書上敘兩漢三國及晉中朝江左事劉峻注釋摘其瑕疵偽迹昭然理難文飾而唐室撰晉史多取此書遂採康王之妄言違孝標之正説以此書事奚其厚顔魏晉以下著述多門語林笑林世説俗説皆喜載啁噱少辨嗤鄙異聞雖為有識所譏頗為無知所恱而斯風一扇國史多同至如王思狂躁起驅蠅而踐筆畢卓沈湎左蟹螯而右杯劉雍搒吏以膳茹齡宋人石載舅而損贅其事蕪穢其辭猥雜而歷代正史特為邪言茍使讀之者為之解頥聞之者為之撫抃固異乎記功書過彰善疸惡者也史通晉世雜書若語林世説幽明録搜神記之徒恢諧小説神鬼怪物唐朝所撰多採以為書夫以王鄧之所糞除王虞之所粳粃以為逸史用補前傳終見嗤於君子矣傳楊王孫裸葬伊藉對吳漢書蜀志為其立傳前哲致議言之詳矣然楊能反經合義足矯奢葬之僭伊以敏辭辨對可免使乎之辱列諸篇第猶有可取近者晉書有劉伶畢卓傳其敘事也直載其嗜酒悖禮亂德若斯而已為傳如此復何所取者哉舊本無劉畢傳至唐新撰以補前史之缺並史通沈約晉書喜造竒説稱元帝牛金之子以應牛繼馬後之證鄴中學者王邵等言之詳矣而魏收深嫉南國幸書其短著司馬睿傳遂録休文所言唐室作新書不加刪削復載此語史通宋書類元嘉中何承天草創紀傳自後山謙之補承天殘闕後又命裴松之續成國史松之卒史祐孫沖之表求别自創立為一家言孝建初又敕蘇寶山續造諸傳元嘉名臣皆有所撰寶山被誅太明中又命徐爰踵成前作爰因何孫山蘇所述勒為書其臧質魯爽王僧達諸傳又皆孝武自造而序事多虛難以取信自永光以後至禪遜十餘年中闕而不載至齊沈約更補綴所遺製成雜史始自義熙肇號終乎升明三年為紀十志三十列傳六十合百卷名曰宋書永明末其書遂行梁裴子野更刪為宋略三十卷約見而嘆曰吾所不逮也由是言宋史者以裴略為上沈書次之沈約謝靈運傳論全説文體備言聲律此可正為翰林之補亡流别之總説耳李充撰翰林論摯虞撰文章流别論如次諸史傳實為乖越本志兼載晉魏失於限斷又王邵謂其喜造竒説以誣前代如琅琊王妃通小吏牛氏事之類是也後梁武帝知而不以為非朝志宋書所載當紀宋事耳沈約惟採諸説號為博洽而志乃載魏晉以來事論者以為失於限斷按崇文總目缺趙倫之傳一卷今本有倫之傳而到彥之傳卷末殘缺按隋楊松玠八代談藪云沈約修宋史書裴子野父祖殊無令譽云自松之下無聞焉子野乃撰宋略書沈約家世備有醜聲又云盱眙太守沈璞斬於建鄴市璞約之父也約見之乃削宋書子野見之亦削宋略按史通云裴幾原刪宋略實有功而所録文章頗傷蕪穢如文帝除溥官詔顔峻討三凶徼孝武擬李夫人賦裴松之上柱國志表孔熙先罪許矅辭凡此諸文是皆不宜載者而載之史通崔浩諂事太武曲為邪説稱拓拔之祖本李陵之胄當時衆議相斥事遂不行或有竊其書以渡江者沈約撰宋書紀魏事仍傳崔浩所述凡此諸妄其流甚多史通齊書類梁蕭子顯撰六十卷今存五十九卷亡其一初江淹為齊志十沈約又為齊紀子顯自表於梁武帝别為此書作紀八志十一列傳四十然天文志但記災祥州郡不著户口祥瑞多載圖讖子顯表言素不載戶口且天文復祕故不私載焉館閣書目初江淹為齊志約復著齊紀時吳均亦撰齊春秋三十篇其書稱梁武帝為齊明佐命帝惡其實燔之然其私本竟能與蕭氏所撰並傳於後史通曽南豐南齊書目録序云子顯之於斯文喜自馳騁其更改破析刻雕藻繢之變尤多而其文益下齊史江淹始受詔著述以為史之所難無出於志故先著十志以見其才沈約復著齊紀二十篇紀八志十一列傳四十合成五十九篇時吳均亦表請撰齊史乞給起居注并羣臣行狀有詔齊氏故事布在流俗聞見既多可自搜放也遂撰齊春秋三十篇其書稱梁帝為齊明佐命帝惡其實燔之然其私本竟能與蕭氏所撰並傳於後梁書類唐姚思廉撰梁武帝時沈約與周興嗣鮑行卿謝吳相承撰録已有百篇值後遭變淪沒何之元劉璠以所聞見究其始末合撰梁典三十篇而紀傳之書未有所作陳姚察有志修梁陳二史施功未周至於陳亡其書不就史通乃令子思廉續成之貞觀三年思廉受詔與魏徵同撰乃採謝氏諸家史刪次為紀六列傳五十魏徵惟裁其總論云書目陳書類陳史初有顧野王傅縡各為撰史學士其武文二紀即顧傅所條太建初陸瓊續撰諸篇事傷繁雜姚察就加刪改粗有條貫及江東不守持以入關隋文帝常索梁陳事迹察具以所成每篇續奏而依違荏苒竟未絶筆至唐其子思廉撰成之史通凡三十六卷紀六列傳三十又南豐目録序云初思亷父察梁陳之史官也録二代之事未就而陳亡隋文帝見察甚重之每就察訪梁陳故事察因以所論載每一篇成趣奏之而文帝亦遣虞世基就察求其書又未就而察死屬思亷以繼其業唐髙祖時思亷受詔為陳書久之不就太宗時詔論撰於祕書內省貞觀十年始上之此書歷三世傳父子數十嵗而後成其難如此然世之傳者亦少故學者罕詳其意祕府所收往往脫誤本朝嘉祐中始詔校讎板行天下後魏書北齊魏收博採舊聞勒成一史上自道武下終孝靖紀傳與志凡百三十卷收諂齊氏於魏室多不平既黨北朝又厚誣江左性憎勝己喜念舊惡甲門盛德與之有怨者莫不被以醜言沒其善事遷怒所至毁及髙曽書成始奏詔收於尚書省與諸家討論前後列訴者百有餘人時尚書令楊遵彥一代貴臣勢傾朝野收撰其家傳甚美是以深被黨援諸訟史者皆獲重罪怨謗不息孝昭世敕收更加研審然後宣布於外書成嘗訪諸羣臣猶云不實又令詔改其所變易甚多由是世薄其書號為穢史史通初收天保中奉詔搜撰五年表上悉焚崔浩李彪等舊書收黨齊毁魏褒貶肆情衆號為穢史獨楊愔等助之故其書漸行文帝以其不實敕魏淡更作按唐志又有張太素魏書今收書記缺二卷傳缺二十二卷不全者三卷全缺二卷太宗紀則補以魏淡所作靜帝紀則補以北史髙氏小史修文殿御覽列傳則益以北史髙氏小史志則補以太素所撰淡及太素書今亡惟此紀志存書目魏收以元氏出於邊裔見侮諸華遂髙自標舉比桑乾於姬漢之國曲加排抑同建業於蠻夷之邦夫以敵國相與交兵結怨載諸移檄用可致誣列諸信史難為妄説史通收修國史初得楊休之助因謝曰無以謝卿當作佳傳爾朱榮子納以金故減榮惡而增其善會要收撰魏書頗用愛憎為褒貶每謂人曰收作色舉之則使升天按之則使入地梁紀崔浩既誅大和後始有李彪崔鴻等書魏末山偉綦雋更主國書二十餘年事迹蕩然萬不紀一文宣時詔收撰次成十二紀十志九十二列傳上之悉焚舊史多諂諱不平受爾朱榮子金故減其惡夙有怨者多從其善黨北朝貶江左為島夷至謂晉元帝為金牛之子時人疾之號為穢史劉知幾謂其生絶胤嗣死逢剖斫皆隂慝所致後隋文帝顔之推等别修唐貞觀中陳叔達亦作五代史皆不傳獨收書在皇朝命劉恕等校正朝志北齊書類唐李百藥撰初天統間祖孝正述獻武起居名曰黃初傳天祿時陸元規常從文宣征討著皇帝實録惟紀行師不載他事自武帝後史官楊休之杜臺卿祖宗儒崔子發等相繼注記迄齊滅隋王邵李德林並少仕鄴中多識故事王乃憑述起居注廣以異聞造編年書號曰齊志十有六卷其序云二十卷今傳惟十六卷李在齊預修國史創紀傳書二十卷至開皇中奉詔續撰增多齊三十八篇已上送史官藏之祕府唐貞觀初敕其子李百藥仍其舊録雜採他書演為五十卷今之言齊史者惟王李二家云史通百藥齊史凡諸帝廟號為百藥避唐朝諱皆易其文議者非之書目八紀四十二列傳後周書類唐令狐德棻撰初周栁蚪隋牛𢎞各嘗論次率多抵牾唐初詔德棻與陳叔達庾儉同加修纂歷年不就貞觀三年與岑文本崔仁師撰次為紀八傳四十二凡五十卷書目先是蘇綽秉周政軍國詞令多準尚書牛𢎞為史尤務清言德棻因之以成是書故多非實録仁宗時出太清樓本各史館祕閣本又募天下獻書而取夏竦李巽家本下館閣是正其文字而後林希王安國上之朝志南北史類南史唐李延夀撰初延夀父欲擬春秋編年刋究南北事未成而殁延夀數與論撰追述先志起宋永初元年盡陳正明三年作本紀十列傳七十謂之南史凡八十卷北史唐李延夀撰起魏登國元年盡隋義寧二年作本紀十二列傳八十謂之北史凡一百卷書目二史刪煩補缺過本史逺甚獨缺本志而隋書有之故隋書亦傳於世朝志先是宋齊梁陳魏齊周隋天下參隔南方謂北為索虜北指南為島夷互相抵毁延夀父思所以改正事未成而卒延夀乃續父業謂之南史北史百八十篇詳於北而略於南以唐承隋隋承周故也會要司馬溫公曰李延夀書亦近世之佳史也雖於禨祥談嘲小事無所不載然敘事簡徑比於南北正史無煩冗蕪穢之辭切謂陳夀之後惟延夀可以亞之但恨其不作志書使數代制度沿革皆沒不見耳通鑑前例通鑑外紀序云李延夀總八朝為南北史而言辭卑弱義例煩雜書無表志沿革不全劉恕李延夀為南北史於北則前儒林於南則冠以循吏豈非所以禮義之邦為無足貴而夷虜之域當示之以激勸乎及劉知幾作史通數十篇譏評古今史氏絲髮無遺而獨於儒林次序了無所及又何邪羣書考索卷十四
