body:
  text: 羣書考索卷四十七宋章如愚撰樂門樂樂之来尚矣自葛天氏有牛尾歌黄帝有景鐘而樂已具矣呂氏春秋曰葛天氏八闋三人捲牛尾投足而歌之一曰戴民二曰元鳥三曰遂草木四曰奢五殳五曰欽天常六曰達天功七曰依地德八曰摠八物之極此葛天氏之八闋也管子曰黄帝作五鐘青曰太音赤曰重心黃曰洒地黑曰隱常而景鐘其一也此黄帝之五鐘也通典帝系譜曰伏羲樂名扶来亦曰立本神農樂名扶持亦曰下謀黄帝作咸池少皥作大淵顓帝作六莖帝嚳作五英堯作大章舜作韶箾而又有五弦之琴以歌南風至於禹之時以五音聴治垂鐘鼔磬鐸置鞀以待四方之士教以道者擊鼔教以義者擊鐘教以事者振鐸語以憂者擊磬有獄訟者揺鞀今鬻子淮南諸書皆具載此至於設簴待賢與夫揚旌取士對而言之猶見王融策秀才之文成周之時大司樂有六代之樂而雲門大卷大咸大㲈大夏大濩大武鍾師有九夏之奏曰王夏肆夏昭夏納夏章夏齊夏族夏裓夏驁夏樂師有六舞曰帗舞羽舞皇舞旄舞人舞干舞鼓人掌教六鼔四金之音聲以節聲樂以雷鼓鼓神祀以靈鼔鼔社祭以路鼔鼓鬼享以鼖鼓鼓軍事以鼛鼓鼔役事以晉鼓鼓金奏此六鼓也以金錞和鼓以金鐲節鼓以金鐃止鼔以金鐸通鼓此四金也漢宗廟則有嘉至樂永至樂休成樂永安樂盖高祖時叔孫通因奏樂人制宗廟樂大祝迎神于廟門則奏嘉至猶古降神之樂也皇帝入廟門則奏永至以爲行歩之節猶古之采齊肆夏也乾豆上奏登歌猶古清廟之歌也登歌再終下奏休成之樂美神眀之既享也皇帝就酒東廂坐定奏永安之樂美禮之已成也高祖六年又有昭容樂禮容樂昭容者猶古之昭夏也主出武徳舞禮容者主出文始五行舞舞入無樂者將至至尊之前不敢以樂也出用樂者言舞不失節能以樂終也大抵皆因秦舊事焉至武帝立樂府採詩夜誦有趙代秦楚之謳以李延年爲叶律都尉多舉司馬相如數十人造爲詩賦畧論律呂以合八音之調作十九章之歌曰練時日曰帝臨曰青陽曰朱眀曰西顥曰𤣥𡨕曰惟泰元曰天地曰日出入曰天馬曰天門曰景星曰齊房曰后皇曰華煜煜曰五神曰朝隴首曰象載瑜曰赤蛟者是也漢又有房中樂高祖唐山夫人所作也高祖樂楚聲故房中樂楚聲也孝惠帝二年夏侯寛更名曰安世樂其歌十七章有曰金枝秀華庶旄翠旌有曰七始華始肅倡和聲曰我定厯數曰王侯秉德曰桂華曰美方之類是也夫漢承秦火之餘禮廢而樂尢甚制氏世爲樂官但能記其鏗鏘鼔舞而不能言其義所得於竇公樂書者見周官大司樂一章而河間雅樂之獻又特採諸子之言以為樂記漢樂之述古者止於此而已叔孫通因秦制而爲享祀之樂欲倣古采齊肆夏清廟之奏此猶可也沛宮之歌特一時醉語而使禮官隸習施之原廟相如等所爲歌詩非有和順積於中者而郊祀用之恐我將思文王昊天有成命之頌宜不如是也葢自高祖樂楚聲而房中之樂制於婦人武帝好趙代秦楚之謳而以協律付之閹孺鄭聲洋溢於朝廷而王侯貴戚類以女樂相尚安望其移風易俗哉故太史公樂書曰余讀虞書至於君臣相𠡠維是幾安而股肱不良萬事隳壞未嘗不流涕成王作頌推已懲艾悲彼家難可不謂戰戰恐懼善守善終哉君子不爲約則修德滿則棄禮佚能思初安能維始沐浴膏澤而歌詠勤苦非大徳誰能如斯凡作樂者所以節樂君子以謙退為禮以損感爲樂樂其如此也武帝作十九章令李延年次序其聲通一經之士不能獨知其辭皆集會五經家相與共講習讀之乃能通知其意多爾雅之文漢家常以正月上幸祠太乙甘泉使僮男僮女倶歌春歌青陽夏歌朱眀秋歌西顥冬歌𤣥冥又嘗得神馬於渥洼水中復次以爲太一之歌後伐大宛得千里之馬馬名蒲稍次作以爲歌汲黯進諫曰今得馬詩以爲歌先帝百姓豈能知其音耶前漢禮樂志曰是時河閒獻王雅樂歳時以備數然不常御及郊廟皆非雅聲今漢郊廟詩歌又不協於鐘律而内有掖廷才人外有上林樂府皆以鄭聲施於朝廷至成帝時平當議雅樂復寢是時鄭聲尤甚哀帝罷樂府官然百姓浸漬日久不制雅樂以相變光武平隴蜀增廣郊祀高祖配食樂奏青陽朱眀西皥𤣥冥雲翹育命之舞眀帝永平用曹元圖讖之言改大樂爲大予樂東平王蒼摠定公卿之議遂采文始五行武德爲文武之舞薦之光武之廟時樂有四品一曰大予樂郊廟用焉二曰雅頌樂辟雍鄉射用焉三曰黄門鼓吹樂天子宴群臣用焉四曰短簫鐃歌樂軍中用焉章帝藉田班固奏藉田歌帝又親著詩歌四章列在食舉及制靈臺十二門詩各以其月祀而奏之自東京大亂後絶無金石之樂魏武帝平荆州獲漢雅樂郎杜䕫始復先代古樂而柴玉左延年之徒乃以妙善鄭聲被寵王粲所改者不過登歌安世及巴渝詩而已魏眀帝改漢大予樂曰大鈞而繆襲改漢短簫鐃歌十二曲而更爲之辭晉武帝時荀朂改杜䕫之樂依古尺以作新律元帝南渡時無雅樂至孝武破苻堅獲其樂工楊朂等閑習舊樂於是金石始備至宋之樂則以永而爲名梁之樂則以雅而為名如皇雅寅雅介雅需雅之屬皆梁樂也陳之樂則以韶而爲名懋韶通韶潔韶穆韶之類皆陳樂也隋之樂則以夏而爲名如昭夏皇夏肆夏需夏之類皆隋樂也唐興即用隋樂武德時詔祖孝孫定樂始制十二和以法天地之成數號唐雅樂張文收又考正律呂與呂才叶其聲音而五虚鍾皆用於是用十二鍾開元中又増三和樂共爲十五和曰元和順和永和肅和雍和壽和太和舒和休和昭和祴和以至于正和承和豐和宣和凡十五和焉唐禮樂志曰自周陳以上雅鄭淆雜而無别隋文帝始分雅俗二部至唐更曰部當凡所謂俗樂者二十有八調自太宗高宗作三大舞七德舞九功舞上元舞雜用於燕樂而燕樂又有十部初高祖仍隋制設九部樂曰燕樂伎清商伎西涼伎天竺伎高麗伎龜兹伎安國伎疏勒伎康國伎及太宗平高昌收其樂自是遂有十部樂其他諸曲雖非純雅尚不至於滛放𤣥宗有散樂又分樂爲二部堂下立奏謂之立部伎堂上坐奏謂之坐部伎太常閱坐部不可教者隸立部又不可敎者乃習雅樂當時流俗多傳其事以為盛其後盜起天下用兵不息而離宮苑囿遂以荒湮獨其餘聲遺曲聞者爲之感動葢其事適足以爲戒不可考法也宋初循用王朴竇儼所定周樂太祖患其聲高遂令和峴減下一律故有和峴所定之樂太宗時有平晉樂有方國朝天樂二典樂章皆太宗聖製真宗時樂始議隨月轉律之法屢加按覆仁宗聖祐肇創雅樂名以大安帝親御宸殿閲焉律度契乾坤之正聲氣協陰陽之純小音紆徐大音激越匪霆匪雷天籟自鳴百度秩八風從冕旒虛已以當宁俊乂儼容而布列如觀周舞而見分綴憲左之有容也如處舜庭而見堂上堂下之奏異也皇乎休哉初景祐三年仁宗命李照定大樂下王朴樂三律及皇祐又命胡瑗等攷正范鎮司馬光皆預焉元豐三年神宗詔鎮與劉凡定樂而劉凡即用李照樂加用四清聲而奏樂成哲宗即位范鎮造樂獻之下李照一律有奇上御延和觀樂實元祐三年也律先王通於倫理以候氣之管爲樂聲之均吹建子之律以子爲黄鍾丑爲大呂寅為太蔟卯爲夾鍾辰爲姑洗巳爲中呂午爲𬎼賔未爲林鍾申爲夷則酉爲南吕戌爲無射亥爲應鍾陽管有六爲律者黄鍾太蔟姑洗㽔賔夷則無射此六者爲陽月之管謂之律隂管有六爲呂者謂大呂應鍾南呂林鍾中呂夾鍾此六者爲隂月之管謂之呂變隂陽之聲故爲十二調各文之以五聲播之以八音乃成爲樂故有十二垂之樂焉周禮太師掌六律六同以合隂陽之聲皆文以五聲播以八音凡爲樂器以十有二律爲之數度以十有二聲爲之齊量凡和樂亦如之漢書曰黄帝使伶倫自大夏之西至崑崙之隂取竹生於嶰谷其竅厚薄均者斷兩節之閒而爲黄鍾之管因制十二筩吹以準鳯鳴而定律呂之音吹陽律以候於鳯吹隂律以擬於凰故能協中和聲候氣不爽清濁相符倫理無失五聲六律旋相爲宮其用之法先以本管爲均八音相生或上或下取足五聲然後爲十二律旋相爲宮周景王鑄無射問律於伶州鳩對曰律所以立均出度也紀之以三平之以六成於十二漢文帝令張蒼定律厯元帝時京房知五音六律之數房受學於焦延壽六十律相生之法以上生下皆三生二以下生上皆三生四陽下生陰陰上生陽終於中呂而十二律畢矣中呂上生執始執始下生去滅上下相生終於南呂六十律畢矣夫十二律之變於六十猶八卦之變於六十四也杜佑通典曰古之神瞽考律均聲必先立黄鍾之均黄鍾之管以九寸爲法故用九乘爲管絃之數九九八十一之數也管數多者則下生管數少者則上生相增減之數皆不出於三以上生者三分益一下生者皆三分去一宮生徵徵生商商生羽羽生角此五聲大小之次也是黄鍾爲均用五聲之法以下十二辰辰各有五聲其為宮商之法亦如之故辰各有五聲合爲六十聲是十二律之正聲也故杜佑所載十二律相生之法乃京房㽔賔上生大呂之法也宋白續通典云前漢書所載律呂相生皆一上一下起黄鍾終中呂皆陽下生陰陰上生陽而京房等遂從㽔賔又重上生大呂冬季夷則上生夹鍾無射上生中呂孟夏此三呂於司馬遷班固所生之寸數及分皆倍焉縁大呂之管三分益一以爲生於是大呂之管增而爲長所以自大呂以下相生咸易漢志上下之號案晉書律厯志言上生下生者相生之道也言重上生吹候之用也晉書此説猶未盡其義昔梁武帝作鍾律論前代得失其畧云按律呂京馬鄭蔡至㽔賔並上生大呂而班固至㽔賔以次乃云下生若從班義則夾鍾中呂其律過促夫仲春孟夏正相生長飬其氣舒緩不容短促求聲索實班義爲乖此説得之矣故禮記曰㽔賔之月陰已生而陽不用事故云上生大呂鄭康成注大師曰㽔賔又生大呂盖用此説也然杜佑通典言十二鍾爲十二律之正聲又有十二子律爲十二子聲其子聲半正聲之法如黄鍾之管正聲九寸爲均其子聲則四寸有半先儒又有云如中呂三分益一上生黄鍾以所得管之寸數半之爲子聲之鍾故有正聲與有十二子聲通爲二十四鍾迭爲五聲合之而爲六十律也抑又聞之樂有所本中聲者樂之本也所謂中聲者黄鍾之宮也揚子曰黃鍾以生之中正以平之禮曰量聲中黄鍾之宮月令曰律中黃鍾之宮則黄鍾者信樂之本也黄鍾以一生三以二生九九而九之終於八十一其管所以九寸而餘律自此生也揚雄之作太𤣥也以一元生三方三方生九州九州生二十七部二十七部生八十一家其音之辭曰陽氣濳萌於黄鍾之宮信乎無不在其中矣夫欲樂之聲清不太輕濁不太重高不至於揚下不至於抑大不過宮細不過羽當以黄鐘而求之也雖然樂主於音音生於律律定於尺尺成於黍黍既不具尺亦不定尺無所準律亦自差司馬遷黄鐘之律八寸七分之一班固司馬彪説黃鍾長九寸聲最濁蔡邕鄭𤣥杜䕫荀朂等所論盡有損益而黄鍾之宮要以九寸為定荀朂當武帝泰始中校大樂八音不和知漢至魏尺長於古四分有餘乃令劉恭依周禮以制尺所謂古尺也後汲冢得古周時玉律及鐘磬與新律闇同于時郡國或得漢時故鍾吹朂律以命之其聲皆應時人稱其精密故前漢律厯志具言尺度量衡云度長短者不失毫厘量多少者不失圭撮權輕重者不失黍絫起於一協於十長於百大於千衍於萬其法在算術度者分寸尺丈引也所以度長短也本起於黃鍾之長量者龠合升斗斛也所以量多少也本起於黃鍾之龠權者銖兩斤鈞石也所以秤物平施知輕重也本起於黃鍾之重而皆以黍而度之歐公作唐禮樂志亦曰聲無形而樂有器古之作樂者知夫器之必有弊而聲不可以言傳懼夫器失而聲遂亡也乃爲法以著之故始求聲者以律而造律者以黍自一黍之廣積而爲分寸一黍之多積而爲龠合一黍之重積而爲銖兩此造律之本也故爲之長短之法而著之於度爲之多少之法而著之於量爲之輕重之法而著之於權衡是三物者亦必有時而弊而又摠其法而著之於數使其分寸龠合銖兩皆起於黄鍾然後律度量衡相用而爲表裏使得律可以制度量衡因度量衡亦可以制律不幸而皆亡則推其法數而制之用其長短多少輕重以相參攷四者既同而聲必至聲至而後樂可作矣唐志律通典曰伏羲作易紀陽氣之初以爲律法建冬至日之聲以黄鍾爲宮太蔟爲商姑洗爲角林鍾爲徵南宮爲羽應鍾爲變宮㽔賓爲變徵此聲之元五聲之正也按變宮變徵而商以前但有五音此二者自周以来加文武二聲謂之爲七夫五音相生而獨宮徵有變聲何也宮爲君商爲臣角爲民徵爲事羽爲物君者法度號令之所自出也宮故生徵法度號令所以授臣臣所以奉承者也徵故生商君臣一德以康庶務則萬物得所民遂其生矣故商生羽羽生角也然臣有常職民有常業物有常形不可以遷遷則失其常矣商羽角三聲此其無所變也故君總萬務不可以執於一方事通萬務不可滯於一隅故宮徵二聲必有變也北齊蘇䕫駁鄭譯曰韓詩外傳所載樂聲及月令所載五音所中竝皆有五不言變宮變徵左氏所云七音六律以奏五聲推此而言每宮應立五調不聞更加變宮變徵二調爲七調譯答曰固有七音之律漢書律厯志云天地人及四時謂之七始黄鍾爲天始林鍾爲地始太蔟爲人始是謂三始姑洗爲春㽔賓爲夏南呂爲秋應鍾爲冬四時之始是以爲七今若不以二變爲調曲則是缺冬夏之聲四時不備是以每宮須立七調於是衆從譯然太史公之爲律書其始不言律而言兵不言兵之用而言兵之偃及言兵之偃而於漢文帝尤加詳焉既曰陳武請伐朝鮮而文帝以謂願且堅邉設候結和通使由是而天下富庶雞鳴犬吠烟火萬里可謂和樂者矣又曰文帝之時能不擾亂由是而百姓遂安耆老之人不至市㕓㳺遨嬉戲如小兒狀嗚呼若太史公者可謂知制律之時而達制律之意也何則當文帝時偃兵息民結和通使而天下安樂則民氣歡洽陰陽叶和而天地之氣亦隨以正茍制律以候之其氣之相應自然知吾律之爲是其氣之不合自然知吾律之爲非天地之正氣以定一代之正律律有不可定者乎古人謂天地之正氣合以生風天地之氣正而十二律以定殆謂是歟奉天古之聖人天命之𠡠謹於幾時基命宥密夙夜以之辨其叙事以會天位必見於馮相氏之職五物之辨以詔救政又見於保章氏之官故詩曰敬之敬之天惟顯思命不易哉又曰我其夙夜畏天之威于時保之盖太平無事之時尤兢兢自保之日也漢之武帝挾英雄之資乃悵悵然求於天人之際其䇿董生也則以何修何飾而甘露降百穀登其策公孫也則以天人之道何所本始帝之心自以爲禱祠之事足以爲格天之實祥瑞之符足以驗天休之至及觀仲舒之對首以天人之際甚可畏者以警帝心而公孫𢎞亦以天地之和應者在於心形氣之和使帝不加厭薄則漢之爲治殆有可觀者柰何帝不之聽是以芝房寳鼎之歌天馬長星之瑞史不絶書而虛耗之弊自若唐太宗初年水旱蝗螟之變相尋而至於太宗所以自警者惟曰上畏皇天之監臨至祥瑞之来則以爲不若家給人足之爲美其後貞觀之治庶幾成康必有召之者矣至於眀皇初年銳意於治而輔相之臣不知古人敬天之説日食厯差而以不虧班賀太室自壞於行朝而以材朽飾其謟此説一開則悖禮傷道無所不至異時狃於治平㤀於譴告而宴安之酖毒已伏於漁陽之盜奉天之禍何酷哉德宗雖粗知天數之不可違而昧於上下因奉之故奉天之事一切委之於天命其告陸贄則又非人事之言其語李泌復以天命爲辯鄉非陸贄罪已之詔李泌造命不言命之説有以深警帝心而密回天意則唐之爲唐未可知也古人敬天未嘗以作輟爲心天意之我顧吾固不敢以自幸天心之或戾吾亦不敢以自怠茍惟畏災而爲之憂懼徼福而為之修飾是尚得爲畏天哉恭聞真宗之論災異而有先其在已後其在天之論仁宗皇帝嘗與王洙講論五行五事休徴之由曰人主當謹於未形俟天譴告然後成之非敬天之道也呂公著進疏於哲宗首以畏天爲説孝宗書敬天圖置之坐右祖宗稽古附典謨之書首及稽古高宗中興監于成憲文王之謨啟佑于後人而下武之詩於是而美武王之繼文武王之烈啓佑于後人而假樂之詩於是而美成王之率由舊章是亦可以見其率乃祖攸行矣漢之高帝規模宏遠而文帝繼之故梅福以孝文循高祖之法稱之今觀用申屠嘉之舊臣而不改高祖用人之意從釋之平恕之論而不改高祖寛仁之風寧屈賈生之才而不敢以啓紛争之論也寧自貽多缺之愧而不敢以變其休養安靖之意也光武中興務爲併省簡約之制而顯宗繼之故史臣有遵奉建武制度之言稱之今觀其講經太學即投戈論道之意也均待陰郭即保全功臣之意也容鍾離意之直諫則與豁達大度之風何以異尊禮元榮其與尊用卓茂者何以異唐𤣥宗尊尚經術復置十八學士以修太宗之制亦既善矣然唐之制度徃徃多壞於開元憲宗謂庶幾二祖之道德風烈亦既美矣然淮西既平之後志意驕逸竟不能自保其終有讀太宗政要而慨然興慕者文宗也而不能振委靡不振之弊有讀太宗金鑑録而舉其要者宣宗也而不能去察察之眀是又徒有法祖宗之言而未知所以法祖宗之道欲法祖宗者當以我朝仁宗爲法昔慶厯中邇英出御書十三軸凡三十五事一曰遵祖宗之訓二曰奉真宗之業三曰念祖宗艱難四曰思真宗愛民四十二年太平之事實由於此方其初年從李淑之請而作三朝寳訓之書則固已有意祖宗之治及邇英進讀則又以真宗正説先之其後御紫宸而詔三館近臣以觀三朝訓鑒之圖則一言一動未嘗不以祖宗爲心昔元祐中范祖禹作唐鑑一書至於終也則曰今當何法不在祖宗乎其作帝學一書於仁宗之卷末則曰願陛下法仁祖而已矣羣書考索卷四十七
