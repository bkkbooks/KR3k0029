body:
  text: 羣書考索續集卷四十七宋章如愚編輿地門諸路東南十路淮南兩路江南兩路荆湖兩路廣南兩路兩浙路福建路傳稱善人天地之紀君子邦家之光又曰不有君子其能國乎然則天下國家之重端有在於得人也江淮閩廣之地其來尚矣自黄帝南廵而登湘山宋朝潭州益陽縣内夏禹東廵而登㑹稽宋朝越州高陽正朔所際南暨交趾唐交州宋朝棄之南蠻是東南之域振古而通中國也然而文身鴃舌去京華甚遠承太古巢穴之餘未陶王化二代已前邈為蠻區賢人君子不産其邦帝王公侯未始建國中原視為遐陬不之齒也逮夫太伯奔荆蠻而呉人化其德文王之興化行江漢而召公之教明于南國東南之民浸沐休風聲教既被君子出焉由是季札歴聘諸華而先王禮樂達于海隅陳良北學中國而周孔之道遍於南國若敖蚡冐篳路籃縷以啓山林而荆楚以闢勾踐種蠡焦勞辛苦牧養其民而揚越以庶子胥之治吳建倉廪峙兵庫創城郭設守備而江浙之間浸有疆理矣蒍敖之相楚商農士賈各肄其業德刑政事不易其常而湘漢之間滋然繁盛矣加之兩漢而下循吏接踵馬援脩駱越之律張覇興吳㑹之學王景導淮西以牛耕韋宙教江西以陶瓦許荆以人倫之教新桂嶺之治任延錫光以諸華之風移嶺表之俗而東南之邦浸為禮義矣嗟乎城邑而居倉庫而儲陶瓦以覆服牛以耕父子夫婦以為家鄉黨庠序以為教斯中原之民自古能之而東南之民自三代以前漫然未有聞知則與禽獸何異哉逮夫春秋戰國而下得善人君子以為邦浸革蠻風而歸諸華而又漢魏以還天下有變常首難於西北衣冠轉而南渡故西北益耗而東南益盛施于隋唐宋朝風教滋美端與中原無異而民物豐夥又復過之故知今之東南非昔東南昔之東南不能當宋一路而今之東南乃過於昔之中原又豈可一概論哉方西漢元始五年嵗在乙丑東南縣户僅當天下十之一時天下縣千五百五十餘東南纔百七十餘天下户千二百餘萬東南纔百餘萬後一百三十有九年當東漢建康九年嵗在甲申東南縣户乃當天下十之二時天下縣千一百八十餘東南當二百四十有餘天下户九百七十萬東南當二百四十萬餘又後一百三十有六年當西晋太康元年嵗在庚子東南縣户乃過天下十之三時天下縣千二百有餘東南當四百七十有餘天下户二百四十五萬東南八十餘萬又後四百有六十年當李唐開元二十八年嵗在庚辰東南縣户乃當天下十之四時天下縣千五百七十有餘東南當六百有餘天下户八百四十餘萬東南二百七十餘萬又後三百五十年當宋元豐末東南縣户乃過天下十之五時天下縣千一百三十餘東南當四百七十有餘天下户千六百五十萬東南九百萬觀其縣邑之増民户之庶既若此其甚而又財貨如山利源百出以今擬古邈焉殊絶盖自開闢以來東南財用之饒見諸載史者莫盛於唐而宋朝猶且加増數倍唐時歳運東南粟以寔闗中不贏二百餘萬石而宋朝運漕大増嵗至六百餘萬石唐朝出銅鐵銀錫之冶凡六州而五在江浙宣潤饒衢信州嵗鑄錢多止十數萬緡而宋朝鼓鑄大増嵗至百餘萬緍唐朝塩利初不過嵗四十萬緍至劉晏斡盡其利嘗増至六百萬緍盖不常有而宋朝塩利大増多至嵗二千萬緍而海塩之利居多茶利興自唐季貞元中始定之額得四十萬緍自後代有増加終唐世不過倍貞元之額而宋茶利大増歳至二百二十五萬餘緍而皆在東南此皆熈豐以前國家常賦之嵗額也其後益有増加至于今則又不然矣嗚呼漢魏以還皇天眷佑東南宻爲覆護俾斯民日以富庶迄于宋朝物大豐美方之西漢盛時縣邑之増幾至三倍民户之増幾至十倍財貨之増則數十百倍以至庠序之藹興人材之挺出與夫典禮之脩習俗之美則又與古斬焉不相侔矣雖往古中原之盛尤有所不逮則知天運去來地無常利特因時而已然自開闢以來至于宋之興王者之作未有自於東南故議者不能無惑而不知壅乆必行蓄厚必發天意所鍾抑有待而然耳且如并州之地自陳隋以前寥寥數千載未有一王興其間何其㣲也及唐太宗㧞起晋陽不踰時遂遷隋鼎綿歴五代五十年間河東三節度乃相繼為帝又何其盛也閩中之地自陳隋以前亦寥寥數千載未嘗有顯者出及李唐中葉而後常衮唱其教歐陽詹為之師於是庠序浸興更五代至於宋朝而英才軰出傑然為國用者不勝其紀由是觀之則并州之利始於唐太宗而閩中之利始於常衮又安知東南之利不始於宋朝哉仰觀俯察酌以民情國家之勢斷可識已中原七路京東二路京東西路京西南路京西北路北東路河北西路河東路劉石之亂東晉奄有東南垂百餘年淮漢以南盡為晉土而當時有志之士常嘆中原之未復豈不以古帝王之墟而重失之邪然攷其地不過禹貢青徐兖豫兾州之壤而在唐為河南河北河東三道在宋朝為四京七路及淮南宿亳海泗諸州與陜西河中府觧州陜虢諸郡是已以宋疆理校之僅能得天下十三耳何於古而甚重也亦嘗考之載史自開闢以來綿于三代其間帝王之作莫不建國於三河之間户口熈繁田囿腴闢城邑井里粲然聿脩天下民物於此乎聚四方風教於此乎美更三皇五帝而益重冠九有四夷而屹崇故歴古以來端為重地號稱中原捨此以外則蠻夷戎狄之所居中原可坐而制之以為偏方指臂之地耳逮夫宗周以降陜服始為王畿春秋而下南國滋為覇土秦漢以還逺斥夷狄包四海之内盡歸中國疆理而偏方指臂之地浸與中原埒矣然而西漢盛時總天下民户千有二百二十餘萬而中原垂九百萬天下縣三百七十有餘而中原當一千有餘大率縣户過天下十之七矧三代以前抑又可知東晋之時去西漢為未逺中原之地雖漸以陵替而中原之名猶在也當時有志之士深用慨嘆盖以宜矣然自新室而下更歴魏晉南北隋唐五季之亂三河亂離寔亟郡邑名物代不如昨中原之名雖因於古而中原之寔已非古矣何則當西漢元始五年中原縣户過天下十之七後一百三十有九年當東漢建康元年中原縣户乃過天下十之六時天下縣千一百八十中原當七百天下户九百七十萬中原當五百七十萬又後一百三十有六年當晋太康元年中原縣户乃當天下十之五時天下縣千二百有餘中原當五百有餘天下户二百四十五萬中原纔餘一百二十萬又後四百六十有一年當李唐開元二十八年中原縣户乃當天下十之四時天下縣千五百七十有餘中原當五百有餘天下户八百四十餘萬中原當三百九十萬又後三百四十年當宋朝元豐末元祐年中原縣户乃當天下十之三時天下縣千一百三十有餘中原當四百有餘天下户垂千六百五十萬中原四百十萬夫以宋朝元豐間去西漢之季纔千一百年耳而昔之民户縣邑當天下十之七今乃僅能當十之三何古今之殊絶也盖自秦漢以前天下蕃庶舉在中原而江淮閩浙川廣之間荒凉為甚漢魏而下三河浸以荒凉而中原蕃庶反移於江淮閩浙川廣之間暨于我宋朝虚實推遷不啻十倍如今瑯琊一郡五十二縣而宋朝存者止三縣而已諸城安邱二縣屬宋朝宻州宋朝海州東海縣即漢贛榆縣也漢㑹稽治縣一縣也宋朝乃為福建一路凡四十五縣漢潁川一郡餘四十三萬户宋朝為許潁二州民户纔贏十萬而已而漢豫章一郡纔六萬户宋朝乃為江東西十有三州軍江西唯興國軍餘皆豫章郡地江東饒信二州及南康軍亦是豫章郡地也増至一百七十萬户夫瑯琊潁川皆古中原地也㑹稽豫章皆古偏方地也畧以此數郡觀之盛衰相反如此然則中原安得不益輕而偏方安得不益重故今之中原非古之中原今日之中原已與古偏方無異而古之中原乃在今東南偏方之域矣狥名而責實必輕重之當議者可不深考云川陜六路永興軍路秦鳯路益州路利州路䕫州路梓州路粤自蜀江東下黄河南注而天下大勢分為南北故河北江南皆天下制勝之地而挈南北之輕重者又在川陜而已夫江南所恃以為固者長江也而四川之地據長江上游而下臨呉楚其勢足以奪長江之險河北所恃以為固者黄河也而陕西之地據黄河上游而下臨趙代其勢足以奪黄河之險是川陜二地常制南北之命而况江南之地以淮漢為喉衿以荆湘為肘腋而巴蜀之地乃控勒湘漢鴻溝千里無再舍不接畛設令北人兼有巴蜀則南國以湘漢之郊為戰守之地而耕桑之民止於江浙之間萬有偏師不陣一城告奔則冀馬秦鋒馳於呉㑹之郊矣河北之地以汴洛為喉衿以并汾為肘腋而秦中之地乃與汾洛踵接百城逶迤𤇺火相望也借令南人兼有秦中則汾洛之間皆為戰守之地而耕桑之民止於河漳之間萬有偏師不陣一城告奔則越㦸吳兵騁於趙代之郊矣輔車相依唇亡齒寒者正此之謂盖自春秋戰國以來至于宋朝之興垂千有七百年而南北交爭餘九百載而北人能并南者有四大率皆先得四川故秦惠王併蜀而始皇因以滅楚晋文帝併蜀而武帝因以㓕呉周文帝併蜀而隋文帝因以㓕陳及宋之興亦乾德中併蜀而開寳中遂平江南然則四川克固江南可奠枕也春秋三國東晋南朝之際南兵屢得志於中原矣然而終不能成功者以其不知先取闗中故也唯宋武常克長安旋即失之故亦不能濟河盖得河南而未得闗中則縁河抵闗縱横數十城皆為戰守之地而所向遇敵其勢逆矣故自河北而渡河南則易自河南而渡河北則難自闗中而出河南則易自河南而入闗中則難借使南人兼有闗中而善用之則河南數千里之地縱在敵人徒為戰場無險可恃一戰有勝則汴洛百城可傳檄而下矣故知得闗中則取河南易於反掌不得闗中雖有河南不能守也而東晉南朝交爭一二百年間君臣将士日夜圖回雖鋭意收復中原而不知陜西之利故轉戰河南以徼河朔之功而勝負叛服代如棊變終無益也然則自古南北交争而南人終不能併者豈唯力之不迨固亦謀之不臧也夫然後知南人之守在巴蜀而戰在陜西北人之守在陜西而戰在巴蜀彼河南江北之鎮莭舟車往來之地耳非成功制勝之所也故曰天下大勢分為南北而挈南北之輕重者又在川陜而已羣書考索續集卷四十七
