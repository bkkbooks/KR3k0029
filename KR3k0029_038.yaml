body:
  text: 羣書考索卷三十八宋章如愚撰禮門旌旗類黃帝振兵教熊羆貔貅貙虎豹制陳法設五旗五麾夏后氏奚仲為車正建旗斿旐以别尊卑等級釋名曰旗期也言與衆期於下明堂位曰有虞氏之緌夏后氏之綢練商之崇牙周之璧翣則制有自矣周制司常掌九旗之物王建太常諸侯建旗孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐道車建旞斿車載旌日月為常交龍為旗通帛為旜雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌則其等有辨矣然熊虎為旗而九旗亦謂之旗經傳凡言旌旗是也日月為常而諸侯之旗亦謂之常行人之上公建常九斿諸侯建常七斿是也交龍為旗天子之常亦謂之旗覲禮天子載大旗是也析羽為旌天子至大夫士之旗亦謂之旌樂記龍旗天子之旌是也嘗觀大司馬中秋教治兵旌旗物之用言王載太常諸侯載旗與司常同其他軍吏載旗而司常則師都建旗師都載旜而司常則孤卿建旜鄉遂載物而司常則大夫士建物郊野載旐而司常則縣鄙建旐百官載旟而司常則州里建旟載旞載旌則建於司常而司馬又皆缺焉抑治兵大閲其禮各異歟陸農師禮象曰初之集衆也故有師都而未有軍將有州里縣都鄙而未有鄉遂郊野及其民大和集也正以治民則軍吏於是載旗以總别之師都鄉遂無非將也更建旗物鄉鄉大夫也州里在焉遂遂大夫也縣鄙在焉故大司馬鄉遂載物若夫郊野載旐百官載旟則方是時孤卿大夫皆各以其屬衛王而公邑之吏又别將其衆焉由是言之司常所建是其正也大司馬所建言其暫而已雖然九旗亦旗也猶五侯皆謂之侯五溝皆謂之溝五涂皆謂之涂八法皆謂之法也周禮言旗言大旗言旗物言旌旗言旗鼓則旗與大旗云者熊虎之旗也旗物旌旗旗鼓云者有非熊虎之旗也故鄉邑以旗物及田之前期致民則以司徒之大旗鄼長之作民以鼓旗遂人起野役致民則以遂之大旗然則熊虎之旗豈卑者所得而有耶旗之所用不特軍旅田獵野役之事而已凡祭祀各建其旗會同賓客亦如之蓋衆之所會使各視旗而知所從也然則虞人有虞旗虞旌何也山虞掌山林之政令山林者獸之所集故有虞旗以致禽澤虞掌國澤之政令澤者禽之所集故有虞旌以屬禽先王之於旗分之采物而禮意存焉春秋時楚圍令尹也而為王旌田宣子晉卿也而假羽毛於齊或以蟊弧而先登或建大斾之左旃後世秦於四時各有所旗故月令於春則青旗於夏則赤旗於中央則黃旗於秋則白旗於冬則黑旗漢髙祖初為沛公旗幟皆赤韓信伐趙立漢赤幟自公孫臣謂漢土德當改服色而文帝聽之則旗幟皆黃光武中興始用火德色尚赤於是復故乘輿金根則建大旗十二斿畫以日月升龍大駕前驅則有九斿雲罕東京賦曰雲罕九斿諸侯王則旗旗九斿公列侯則亦九斿卿以五斿皆以降龍後周太常畫三辰旗畫青龍旟畫朱雀旌畫黃麟旗畫白獸旐畫𤣥武其旜物在軍亦畫其事號徽幟亦如之若司常則掌旗物之藏通帛之旗六以供郊丘之祀一曰蒼旗二曰青旗三曰朱旗四曰黃旗五曰白旗六曰𤣥旗畫繢之旗六以充玉輅之等一曰三辰之常二曰青龍之旗三曰朱鳥之旟四曰黃麟之旌五曰白獸之旗六曰𤣥武之旐皆左建旗而右建搨㦸又有繼旗四以施軍旅一曰麾以供軍將二曰旞以供師帥三曰以供旅帥四曰斾以供卒長唐天子之車五輅黃屋左纛左建旗十二旒或載闒㦸旌旗皆從路質故揚雄之在漢杜甫之在唐皆言軍旗之盛如曰登鳳凰而翳華芝駟蒼螭而六素虯流星旌以電燭咸翠蓋而鸞旗玉車千乘輕先疾雷此揚雄獻甘泉賦於成帝之語也如擬翠毛於華蓋比黃屋於勾陳命雷公以挾輈墮旄頭以設斾車之轇轉旗之葳蕤此杜甫奏太清宫賦於明皇之語也其誇耀泰侈為何如哉夫三代之時詩人之辭所以頌車旗之盛不過曰元戎十乘白斾央央不過曰其旗淠淠鸞聲噦噦耳不過曰我車既攻我馬既同耳二子之所褒揚贊詠者如此未聞明先王之禮制以制其灾者此後世之不能如古也佩綬帶周官玉府掌共王之佩玉詩渭陽曰瓊瑰玉佩采芑曰服其命服有瑲葱珩公劉曰何以舟之維玉及瑶記玉藻曰將適君所既服習容觀玉聲古之君子必佩玉右徴角左宫羽趨以采齊行以肆夏周旋中規折旋中矩進則抑之退則揚之然後玉鏘鳴也故君子在車則聞鸞和之聲行則鳴佩玉之音是以非僻之心無自而入也君在不佩玉左結佩右設佩居則設佩朝則結佩齊則綪結佩而爵􅔖凡帶必有佩玉佩玉有衝牙君子無故玉不去身君子於玉比德焉天子佩白玉而𤣥組綬公侯佩山𤣥玉而朱組綬大夫佩水蒼玉而純組綬世子佩瑜玉而綦組綬士佩瓀玫而緼組綬蓋古者佩玉之制上有雙衡下有雙璜中有琚瑀下有衝牙貫之以組綬納之以蠙珠而其色有白蒼赤之辨其聲有角徴宫羽之應其象有仁智禮樂忠信道德之備或結或垂所以著屈伸之理或設或否所以適文質之儀此所以純固之德不內遷也蓋衡以平其心璜以中其德琚欲其有所安牙欲其有所制右徴角所以象事與民左宫羽所以象君與物趨以采齊行以肆夏所以比於樂周旋中規折旋中矩所以比於禮進則揖之於前退則揚之於後則佩之為物奚適而非道耶然古者有德佩有事佩德佩則左右皆玉事佩則左紛帨右玦捍之類左佩皆有五右佩皆有六以左陽而竒右隂而耦故也左佩者小右佩者大以左不如右之强也先設事佩後設德佩以事成而下德成而上故也詩言佩觿佩韘乃言容兮遂兮是先設事佩而後德佩也自五霸迭興戰兵不息佩非戰器韍非兵旗於是解去綬佩而韍佩遂廢韍佩既廢秦乃以采組連結於璲光明章表轉相結受故謂之綬漢承秦制用而不改故加之以雙印佩刀之飾至孝明皇帝乃為大佩衝牙雙璜瑀皆以白玉而古制尚存然漢之印綬則有五等諸侯王金璽盩綬丞相太尉則金印紫綬比二千石以上銀印青綬比六百石以上銅印墨綬比二百石以上銅印黃綬亦有無印綬者此其别也朱博之刺冀州也使從事明敇告吏民欲言縣丞尉者刺史不察黃綬各自詣郡欲言二千石長吏者行部還詣治所然則黃綬蓋縣丞尉之屬而墨綬則長吏二千石者是也東漢盩綬易為赤綬餘並因之凡除官受印綬而佩之遷官上印綬而易之兼官纍印綬而服之免官解印綬而歸之張奐自謂前後仕進十要銀艾此除官者受印綬而要之也元帝策蕭望之曰詔左遷君為太子太傅授印其上故印使者此遷官者上印綬而易之也武帝謂楊僕懷銀黃垂三組此兼官者纍印綬而服之也石慶為丞相封侯乞骸骨則請歸丞相侯印此免官者解印綬而歸之也夏侯勝言士病不明經術經術茍明其取青紫如俯拾地芥者謂紫綬青綬也顔注以為卿大夫之服豈以印綬亦可言服耶若夫古之帶則又有大帶淺帶博帶之别素帶練帶錦帶縞帶雜帶之辨大戴禮曰黃帝黼黻衣大帶此大帶之謂也荀子曰逢衣淺帶雋不疑曰褒衣博帶蓋淺帶即博帶也玉藻曰天子素帶朱裏終辟諸侯素帶終辟大夫素帶辟垂士練帶率下辟居士錦帶弟子縞帶雜帶君朱緣大夫元華士緇辟此素帶練帶錦帶縞帶雜帶之謂也古者革帶大帶皆謂之鞶內則所謂男鞶革帶也左傳曰鞶厲游纓昭其數也此之謂也冠帶禮記正義曰世本云黃帝造火食旃冕則冕蓋起於黃帝也黃帝以前則以羽皮為之冠黃帝以後則以布帛為之飾荀卿言魯公問舜冠於孔子孔子曰古者有務而拘領漢輿服志曰上古衣毛而冒皮後世聖人見鳥獸有冠角􅏋胡之制遂作冠冕纓緌以為首飾則古者冒皮而已及冠冕纓緌之作皆有所象也古者冠其飾有緣其貫有笄其束有武其係有纓其垂有緌古之冠其飾不過緌武緣其名不過母追章甫委貌而已禮曰委貌周道也章甫商道也母追夏后氏之道也白虎通曰夏十三月為正其飾最大故曰母追商十二月為正其飾微大故曰章甫周十一月為正萬物萌小冠飾最小故曰委貌漢輿服志曰委貌冠皮辨冠同制所謂夏之毋追殷之章甫者也然考白虎通所言則三冠之制異輿服志所言則三冠之制同禮文殘闕其制度名義莫究其詳儒行曰孔子冠章甫之冠莊子曰孔子冠枝木之冠蓋枝木之冠即章甫也後世有長冠通天逺游髙山竹皮進賢方山巧士却非却敵之制而其異者有若鷸冠鶡冠其怪者有漉酒有墊角之類非古也今考之史在秦則有曰通天曰逺游而執法者之所服則曰法冠獬豸冠柱後惠文冠夫言柱後惠文則法冠也但言惠文則侍中冠也夫惠文之名蓋起於趙自趙武靈王改胡服以金璫飾前前插貂尾以為貴職後代效之故名惠文至漢因之亦名武辨或曰大冠諸武官冠之侍中中常侍加黃金璫附蟬為文貂尾為飾侍中插右及於晉曰繁冠曰建冠籠冠者即惠文之制也唐之乘輿加金附蟬侍中中書令加貂蟬以及於諸武官府衛領軍者亦惠文之制也其他在漢則有曰長冠劉氏冠齊冠則為享廟之服髙山冠則為乘輿之服方山冠則為祠宗廟樂人之服却非冠則為殿門吏之服樊噲冠則為衛士之服巧士冠則為黃門之服雋不疑冠進賢冠則有進賢冠酈食其衣儒冠側注則又有側注冠顯宗冠通天冠則天子有通天冠在晉衛士之服則曰却敵冠在唐視朝之服則曰翼善冠以賜貴臣則曰進德冠蓋太宗嘗以幞頭之制創於後周以便武事及天下偃武遂采古制而為翼善以自服之又制進德冠以賜貴臣制如辨服及開元以來朔望朝顓用常服而辨服翼善之制遂廢不用今載於唐車服志者可考也衣裘周禮司裘掌為大裘以共王祀天之服則有所謂大裘玉藻惟君有黼裘以誓省則有所謂黼裘司裘曰仲秋獻良裘王乃行羽物季秋獻功裘以待頒賜則有良裘功裘之辨玉藻曰君衣狐白裘錦衣以裼之君子狐青裘豹褎𤣥綃衣以裼之則有狐白狐青之别羔裘豹飾緇衣以裼之而詩又曰羔裘如濡洵直且侯此以羔為裘者也狐裘黃衣以裼之而詩又曰君子至止錦衣狐裘此又以狐為裘者也麛裘青犴褎絞衣以裼之此又以麛而為之也犬羊之裘不裼此又以犬羊而為之也大東曰熊羆是裘是又以熊羆而為之也論語曰素衣麑裘此又以麑而為之也玉藻曰君之右虎裘厥左狼裘夫士謂之虎士門謂之虎門旗有熊虎之文車有虎幦之飾則左右虎狼之裘宜矣至於衣也有曰韍曰韠曰韎韐之名詩曰朱芾斯皇三百赤芾易曰朱韍方來困于赤紱玉藻曰一命緼韍幽衡再命赤韍幽衡三命赤韍葱衡此所謂韍也玉藻又曰韠君朱大夫素士爵韋此所謂韠也詩曰韎韐有奭傳曰有韎韋之跗注此所謂韎韐也鄭康成曰古者佃漁而食之衣其皮先知蔽前後知蔽後後王易之以布帛而獨存其蔽前者不忘本也蓋韠之作也在衣之先其服也在衣之後韠之為物以其弗前則曰韍以其一巾足矣故曰韠以色則曰緼以韞質則曰韎韐及戰國連兵而韍非兵飾故去而不用漢明帝復制韍天子素皮蔽膝魏晉以來或用絳紗為之皆古之遺制也鹵簿儀衛五經精義曰鹵者盾也以大盾領一部之人故名為鹵簿蔡雍獨斷曰漢天子出車駕次第謂之鹵簿官有注名曰甘泉鹵簿國朝宋綬序鹵簿圖謂有文事必有武備故整法物之駕嚴師兵之衛總名之鹵簿焉古者諸侯二車九乘秦滅九國兼其車服故大駕屬車八十一乘法駕半之最後一車乘垂豹尾豹尾以前為省中漢之甘泉自古祭天圜丘之處也本秦林光宫自文帝時郊五畤武帝立泰畤三歲一郊車駕必幸雍幸甘泉故有甘泉鹵簿武帝天漢四年始定車服郊祀謂之大駕車千乘馬萬匹東都行祠天郊以法駕祠明堂省什三祠宗廟尤省謂之小駕每出太僕奉駕上鹵簿侍御史蘭臺令史副皆執法以督整車騎謂之護駕東晉屬車五乘而已宋孝建中田宏議屬車以為江左五乘則儉不中禮帝王文物旗旒皆十二為節宜依禮十二乘為制隋之大業復備八十一乘唐大駕屬車十二乘大駕行幸則分前後施於鹵簿之內若大陳設則分左右施於衛內其鹵簿具於開元禮導駕則先萬年縣其次則自京兆而下而至於豹尾車又其次則左右廂黃麾仗左右領軍黃麾仗若法駕則減於大駕小駕則又減於法駕漢之大駕公卿奉引大將軍參乘太僕御光武中興止陳法駕公卿不在鹵簿中惟河南尹執金吾雒陽令奉引侍中參乘奉車郎御至唐則兼列六引唐朝會之儀三衛番上分為五仗號衙內五衛一曰供奉仗二曰親仗三曰勳仗四曰翊仗五曰散手仗列坐東西下每月立內廊閣外號曰內仗以左右金吾將軍一人押之有押官有知隊仗官有押引駕官國家肇造之初承五季草創之後法駕之制警蹕之衛大率尚仍簡略雖得長興南郊鹵簿圖字僅可考正而闊略滋多自陶穀為禮儀使奏言金吾諸衛將軍暨押仗導駕等官服皆以紫於禮未稱請按開元禮咸用繡袍至若執仗之士舊服五色畫衣先後靡倫無所準式請以黑為先而青赤黃白以次分列始定鹵簿之制其導駕押仗之服則從開元繡袍之制其執仗次第之色則從五行相生之次其乘輿則增造五路其奉引則備用六引始造於乾德之四年而告備於開寶之三年越明年謁款圜丘實始用之想夫䂍弰前驅五路增副里以鼓記南以車指雞翹豹尾夭矯婀娜公卿執事前導後陪細仗大角壯其容幰蓋繖扇備其節耋老幼稚族觀聚歎向也目熟乎刀兵今乃窺文物旗常之美向也耳厭乎金鼓今乃聞鍚鸞和鈴之音皇皇哉治世之巨典華夏之偉觀也竊讀三朝寶訓而知藝祖恭儉之德出於天資衣用浣濯器御質素齊官無三服之獻織室罷纂組之工顧於羽衛乃顯設藩飾如此得無意乎蓋躬節儉者帝王之盛德也備羽衛者國家之上儀也在漢孝文殿設書囊之帷身以示朴為先及其詔令則曰鸞旗在前屬車在後儀物明盛猶可想於千載之下然則聖人所以奉已與夫華國者固自殊轍是以知藝祖之意有在也列聖繼承制作益詳曰大駕曰法駕曰鸞駕曰黃麾仗大駕則用之於郊祀用之於藉田法駕則用之於明堂用之於恭謝鸞駕則或用之於封祀或用之於太清玉清黃麾仗則或用之於親征或用之於省方若是者皆各有制焉揆厥所元皆自繡衣發之故郊祀藉田畢陳大駕明堂祫享率用三引聲名法度著矣門觀宫殿易曰上古穴居而野處後世聖人易之以宫室蓋取諸大壯則宫室之設尚矣故自其門闕之制言之考工記曰匠人營國方九里旁三門鄭氏之注以為旁三門者天子十二門也月令曰毋出九門先儒謂天子外門四關門也逺近郊門之與國門也內門五曰臯曰庫曰雉曰應曰路是也路者大也王之路車路馬路寢路鼓皆名曰路則大寢之門謂之路門宜矣然路門者書則謂之畢門又謂之南門帥氏則謂之虎門春秋之時齊晏子端委於虎門得非末世諸侯之門亦效其名乎應門者發政以應物也爾雅謂之正門明堂位亦曰應門臯門者以緩為義也臯鼓臯舞皆以臯為緩則門之逺者謂之臯宜矣毛氏以臯門為郭門非也公羊傳曰五版為堵五堵為雉蓋城雉之制在是焉此豈非雉門之意歟諸侯之外門有四與天子同內門有三則曰庫曰雉曰路而與天子異詩以天子之禮追太王之事明堂位以魯之門取天子之制故皆有臯門應門之名也魯僖公二十年新作南門穀梁曰南門者法門也雉門之說不見於經然周禮閽人掌中門之禁則中門者豈雉門歟臯門之內外朝也朝士建其法小司冦掌其政列三槐之與九棘設嘉石之與肺石而朝諸侯聽訟詢大事在焉應門之內治朝也司士正其位宰夫掌其法太僕正王之位而王日視朝在焉路門之內燕朝也太僕正其位掌擯相而族人朝焉玉藻曰朝服以視朝退適路寢聽政然則王日視朝於治朝而退聽政於燕朝矣雉門之外垂治象所以待萬民應門之外設宗廟社稷所以嚴神位路門之外則九室九卿朝焉路寢之內亦九室九嬪居焉三代而後所以名其門者亦不一矣漢都城之門載於三輔黃圖者凡十有二曰霸城曰清明曰宣平曰覆盎曰安門曰西安曰章城曰直城曰雍門曰洛城曰厨城曰橫門而直城則舊謂之龍樓霸城又謂之青門宣平則又謂之東都安門則又謂之鼎路章城則又謂之光華洛門則又謂之髙門而清明則又有藉田凱門之號西安則又有便門平門之目東漢雒陽城門亦十有二上應月位中東惟卯上西惟戌開陽平城巳午順方若雍若殳若拜若津曰上東夏門曰廣陽上苑駢羅錯峙周於子亥而李尤嘗為之銘漢未央宫有金馬青鎖兩門武帝時東門京作銅馬法獻之立於魯班門外乃更其名而謂之金馬則金馬者因班門之舊而公孫𢎞東方朔之徒嘗所待詔者也建章宫之門曰閶闔亦曰壁門未央長樂甘泉諸宫皆有司馬門武帝置酒甘泉北宫令董偃從東司馬門而更其名曰東交則以私情易之者也若乃啓南端之特闈而端門之名於是乎顯建氷室之謻門而謻門之名於是乎彰雲龍神虎之門則又列於德陽殿之東西是蓋後漢之制而見於張平子之賦東京者也唐之京城左河華右隴坻前終南後九嵕南三門曰明德曰啓夏曰安化東三門曰春明曰通化曰延興西三門曰金光曰開逺曰延平皇城在京城之中南三門曰朱雀曰安上曰含光東西二門曰延喜曰景風西二門曰安福曰順義其中左宗廟右社稷百僚之廨列乎其間凡省六寺九臺一監四衛十有八東宫官屬宫城在皇城之北南三門曰承天曰長樂曰永安若元正冬至受萬國之朝貢則御承天門以聽政蓋古之外朝也其北曰太極門其內曰太極殿朔望則坐而視朝焉蓋古之中朝也又北曰兩儀門其內曰兩儀殿常日聽朝而視事焉蓋古之內朝也大明宫在禁苑之東南正南曰丹鳳門門內正殿曰含元殿開元時元正冬至乃於此而聽朝也其北曰宣政門門內曰宣政殿殿東曰日華門門東門下省西曰月華門門西中書省宣政之左曰東上閣右曰西上閣次西曰延英門其內之左曰延英殿右曰含象殿宣政北曰紫宸門其內曰紫宸殿興慶宫在皇城之東南宫之西曰興慶門門內曰興慶殿本朝之宫門曰宣德曰左右掖曰東西華門曰左右景德門此皆其門之可考者也爾雅曰觀謂之闕周禮垂法於象魏禮器曰天子諸侯臺門郊特牲曰臺門而旅屏大夫之僭禮也諸侯有臺門而無兩觀魯有兩觀以周公之故也何休曰天子外闕兩觀諸侯內闕一觀然天子外闕於經無見也春秋書新作雉門及兩觀蓋譏其加度云爾子家駒以魯設兩觀為僭誤矣先王之時門皆南向蕭何治未央宫立東闕北闕顔師古以為未央殿雖南向而上書奏事謁見之徒皆詣北闕公車司馬亦在北焉以北闕為正門蓋出於蕭何厭勝之術非古典也三輔黃圖以為未央有元武蒼龍二闕其東闕北闕者歟漢之建章宫則有鳳闕圓闕别風嶕嶢之闕甘泉宫則造赤闕於南以象方色後漢亦建象魏之兩觀見於張平子之賦者皆其觀闕之可考者也自其宫殿之制言之合宫則作於黃帝蘄年宫則作於秦穆棫陽宫則作於秦昭王萯陽宫則作於秦文王阿房宫則作於始皇若西垂若平陽封宫若橐泉若梁山若林光皆所謂秦宫者也始皇宫曰興樂而漢髙帝修飾之以為長樂宫叔孫通與魯兩生共起朝儀而諸侯羣臣皆朝十月者即此地也其後太后常居之而惠帝以來皆居未央因龍首山為之而臺殿四十有三紀於西京雜記則壯麗可知矣曰雒陽南宫則髙帝命通侯諸將以言劉項得失與夫張良請封雍齒之地也曰沛宫則髙祖召父老子弟而歌大風之地也自是而後宫室之盛莫過於武帝曰龍淵宫則因救河而作也曰宣防宫則因塞河而作也甘泉宫一曰雲陽秦始皇作甘泉前殿載於史記至武帝盡增廣之是蓋黃帝以來圓丘祀天之地而漢帝受計及諸侯朝者皆在此也揚雄作甘泉賦以諷成帝而雄傳之所載以為石關封巒枝鵲露寒棠梨時得遊觀屈竒瑰偉則其奢麗為何如建章宫本於越巫厭勝之說東方朔有曰今陛下以城中為小圖起建章左鳳闕右神明號為千門萬戶則其奢麗為如何若明光若首山若交門若桂宫又皆文帝之所作者漢之宫有曰萬歲者武帝所造嘗見於宣帝之幸而有神爵之瑞者也曰步夀者宣帝神爵二年鳳凰集于祋栩所集之地復獲玉寶而建以為宫者也其他如宜春宣曲則述於子虛之賦黃山池陽則見於東方朔之傳以至長楊五柞回中大臺竹宫北宫之類亦皆散見於書史若乃三雍宫者所謂明堂靈臺辟雍者也明帝即位親行其禮坐明堂而朝羣后登靈臺以望雲物袒割辟雍之上尊養三老五更則其禮制盛矣後漢之宫有曰南宫曰大駕宫則作於光武曰北宫則作於顯宗而南宫則圖二十八將者也東晉之宫如咸和所作新宫則成於王導所以破溫嶠輩遷都豫章會稽之二論如太原新宫則作於謝安所謂仰模元象合體宸極者也元魏之宫曰金墉則又作於孝文而以為遷洛之舉也唐天子所居之宫太極則以大內目之會要曰大明則以東內目之曰興慶則以南內目之自龍朔而後人主常居大明謂之大內而太極乃謂之西內大明創於貞觀始謂之永安繼謂之大明改謂之蓬萊而卒定於大明之號興慶創於𤣥宗而因乎藩邸龍池之祥至於武德之營洪義宫而後易之以大安武德以舊第為武功宅而其後易之以慶善貞觀以隋之仁夀宫為九成宫而其後易之以萬年開元置溫泉宫於驪山而其後易之以華清其他如太和仁智之造於武德玉華翠微飛山襄城之作於貞觀合璧之作於顯慶紫桂之作於儀鳯奉天之作於永淳啓聖之作於開元而通義宫者則武德以舊第為之躍龍宫者則武德以奉義監為之而唐又有宫曰長春此皆其宫之可考者也西漢之殿其在長樂宫者則曰臨華曰神仙其在未央宫者則曰清凉曰宣室曰長年曰玉堂曰麒麟白虎西都賦注三輔黃圖孟堅西都賦所謂區宇若兹不可殫論者也王商傳云成帝世單于來朝引見於白虎殿杜欽傳云上盡召直言之士詣白虎殿對䇿而杜欽谷永皆於此對六經之問即所謂白虎通也未央之殿若承明則以為著述之所孟堅所謂承明金馬著作之庭者武帝賜嚴助書云君厭承明之廬成帝世客有薦揚雄文似相如者召待詔承明之庭其在是歟若金華則以為講授之地鄭寬中張禹朝夕入說尚書論語而班伯之所受業者其在是歟以至武臺通光之名曲臺宣明之號神明髙門昭陽之屬皆其殿之列於未央者若明光殿則作於桂宫者也若函德殿作於建章宫而宣帝之世金芝九莖産於銅池者也若鳳凰殿則又宣帝叶其嘉瑞而作者也光武即位之初車駕入洛幸南宫却非殿遂以定都又作南宫前殿而顯宗亦有德陽之作其他如含德章臺天祿宣明之類紀於張平子之賦者皆東漢之殿也唐室之殿若太極者則見之於太極宫若含元紫宸宣政延英則見之於大明宫若乾元則見之於洛陽宫以至慶善宫之有披香而椒風披香已見於孟堅之賦則漢已有此名也開元鶺鴒集白虎庭木則是唐亦有白虎之號也宋朝之殿以文德為正衙而又有大慶紫宸集英在景德則有玉宸殿即偃息之所而聚書真宗謂此惟正史纍校定者小說他書不置於此在景祐則有崇政殿以賈昌朝楊安國等為崇政殿說書日以二人入講說者蓋自此始也皇祐中以邇英後殿為隆儒明道中以承明為端明以端明為延和慶厯中改文明為紫宸以延恩為觀文在治平則有欽明殿命王廣淵書洪範於屏而廣淵因有三德為馭臣之柄之說此皆其殿之可考者也臺觀館閣樓室臺觀之作逺矣若周之靈臺魯之觀臺漢長樂宫之鴻臺未央宫之玉臺趙王宫之叢臺武帝之柏梁建章之神明甘泉之通天殿中之蘭臺上林之清臺後漢之靈臺雲臺唐顯慶之講武開元之測景此皆其臺之可見者也若漢之甲觀屬玉觀後漢之東觀而劉珍劉騊駼馬融蔡雍張衡曹褒黃香皆嘗入焉至於白虎觀則章帝建初中博士議郎諸生諸儒如魏應淳于恭之徒會於此地講議五經同異帝親臨決作為白虎議奏者也魏明帝之聽唐之嵩陽此皆觀之可見也館閣之作也亦逺矣漢武帝為飛廉館於長安而後漢明帝則取飛廉以為平樂館考之漢紀武帝元封六年京師民觀角抵於上林平樂館則平樂之名在武帝時固已有之也武帝又於甘泉作迎風露寒儲胥之館曰射熊曰繭館亦皆漢世之所有而平津開東閣營客館以招天下賢士有所謂欽賢翹材接士之號則漢之人臣蓋亦有列館者矣齊王儉之學士館唐之六館宋之三館曰集賢昭文史館此皆其館之可考者也漢有石渠天祿麒麟三閣皆蕭何之所創造石渠在未央殿北以藏入關所得秦之圖籍其後又藏祕書而天祿麒麟皆在未央宫中三輔黃圖亦為藏書之地劉向專精校書而有青藜之異者即天祿也宣帝思股肱之美而圖畫霍光輩者即麒麟也班孟堅西都賦曰天祿石渠典籍之府故老名儒講論乎六藝稽合乎同異者蓋謂此也杜佑曰漢凡圖書所在有石渠石室廣內延閣貯之於外府又有御史中丞居殿中掌蘭臺祕書及麒麟天祿二閣藏之於內禁及考三輔舊事石渠閣在未央大殿北以藏祕書則石渠不得謂之外府劉歆七略亦云外有太常太史博士之藏內有延閣廣內祕室之府則延閣廣內皆為禁中之藏明矣是以漢之祕書多在於天祿非大夫侍中不預此選劉向以光祿大夫劉歆以侍中揚雄以大夫校書天祿閣而石渠則為諸儒講論五經之地而以博士處之也施讐為博士甘露中與諸儒講論同異於石渠歐陽生薛廣德王式戴聖皆以博士論經石渠者也蘭臺石室則在殿中而為史官著述之所而蘭臺則掌圖籍故漢之校書講筵修史三者皆處於內禁云唐之閣曰凝暉則嘗置渾儀於其中曰凌烟則圖畫功臣於其中曰祕書閣曰蓬萊書閣則以為崇儒待士之所宋自龍圖閣而下皆以為祖宗宸章之奉太宗肇新祕閣則以之彚聚典籍育養英才仁宗景祐初開創邇英延義二閣列峙於迎陽門崇政殿之東西又以為訓習道藝之地此非其閣之可考者歟至於樓室之制若井幹樓則作於漢武之建章北顧樓則起於梁之京口花萼相輝勤政務本則唐𤣥宗作之於興慶籌邊樓則李德裕作之於劍南宋之樓曰紫雲則藝祖與趙普等議論民事之地曰太清則真宗天禧中召近臣觀書之地也此皆其樓之可見者也漢以宣室為聽政之所三輔黃圖曰宣室者未央前殿正室也文帝思賈誼召之入見上方受釐坐宣室因感鬼神事而問鬼神之本何武傳言武與楊覆衆等習歌中和樂職詩宣帝求通達茂異之士召見武等於宣室刑法志亦云宣帝因路溫舒之言季秋請讞時上常幸宣室齊居而決事刑號為平則漢之人主受釐訪問總覽萬幾裁斷庶獄一皆在是焉東方朔傳曰武帝為竇太主置酒宣室使謁者納董偃朔辟㦸而前曰夫宣室者帝王之正處非法度之政不得入焉其嚴蓋可知矣漢百官表有織室屬之少府而後漢禮儀志祠祭先蠶亦有織室三輔黃圖以為此室在未央宫有所謂東西織室者若乃凌室亦在未央而用以為藏氷者焉此皆其室之可見者然也唐車輿衣服令車輿衣服定著于令唐制也夫三王制作莫盛於蒼姬考之禮經玉金象革洎夫木路是為王車若翟車而下至於子篆縵墨棧則后與諸臣各有制焉大裘而下洎夫冠辨是為王服若褘衣揄翟至於衮冕希毳則后與諸臣亦有制焉嬴秦變古改商瑞山名為金根屬車之衆至于九九汰侈斯甚已無足稽衣服之制亦弗之見炎劉定憲金根一車御為乘輿爵非公乘劉氏勿冠錦繡綺縠賈人有禁尊卑有制頗亦詳密號登天漢郊於甘泉千乘萬騎其儀特盛中間蕩析武車諸子繡􅜎貽笑三輔一時文物埃滅無餘世祖中興葆車輿輦法物始備永平之時玉佩絇屨冠冕行事范史登載亦既周悉繇晉逮隋隨世改更定令弗聞微乎不足論已唐自髙祖開創垂意制作武德四載首著斯令上由天子下達庶人常尊等威厥有定制故天子五輅則倣周制而耕根安車白鷺記里指南之屬是為屬車后太子所謂車乘制則詳已天子之服自大裘衮冕而下亦倣周制通天絳紗朝會以服后與諸臣制已詳已垂憲作則簡牘且存上得兼下下毋擬上截然畫一凛莫可犯隆殺有經貴賤斯殊所以嚴分守而杜僭侈者繄斯令之設唐一代之制於是有考焉若乃翼善進德嘗創厥冠朱明鵰袍亦製厥服品官服色舊止黃紫馬周建議始更厥制而其後又以色之淺深為品秩髙卑之辨兹雖出於一時之宜史氏備載灼為丕範亦以昭唐家定令之詳始終不茍蓋如此唐洪文定制禮儀唐會要太宗改修文為洪文垂意文學精選賢良之士如虞世南禇亮姚思廉歐陽詢蔡允恭蕭宗德言之徒皆以學士講論政事天策學士其登是選者殆半焉是以貞觀之修改五禮此禮官之職也而必詔學士參預貞觀之有事泰山公卿預議可也必參以學士之詳定永徽之際明堂制度非特下之諸曹詳考而洪文館實與議焉封嵩山之儀禇無量為學士中宗亦詔其定南郊儀典不特此也馬嘉運之刪正義蘩蘋姚思廉之撰述陳梁二史劉嗣之修次國史實録皆以洪文學士職之又嘗考之唐自封國初命祀四室因仍至於貞觀莫有更易至九年朱子奢以諫議兼洪文始建三昭三穆之議一代大典因之以立蓋唐自太宗即位殿左置洪文館而學士無定員館中有四部書及圖籍正諸儒講論之地也洪文沿革武德四年置修文館於門下省九年改曰洪文其後又置諸經博士儀鳳中置詳正學士校理圖籍武德後五品以上曰學士六品以上曰直學士又有文學直館皆他官領之垂拱以後以宰相兼領館務號主給事中一人判館事神龍元年改洪文曰昭文二年曰修文景龍二年置大學士四人以象四時學士八人以象八節直學士十二人以象十二時景雲中減其員數復為昭文館開元七年洪文館置校書郎又有校理讎校錯誤等官長慶二年詳正學士講經學士皆罷專以五品以上曰學士六品以下曰直學士未登朝為直館大抵學士掌詳正圖籍教授生徒朝廷制度沿革禮儀輕重皆參議王儉學士館齊武帝時王儉領國子祭酒詔於儉宅開學士館以總明觀四部書目充之自宋世祖好文章士大夫悉以文章為尚無專經者儉少好禮學及春秋由是衣冠翕然更尚儒術矣宋朝三館按唐武德中始置修文館隸門下省貞觀中建史館於禁中專掌國史開元十二年改集仙殿為集賢書館三館之名肇於此矣自是集賢昭文置大學士史館置修國史以宰相兼領之昭文集賢又置學士直學士史館集賢修撰史館有直館檢討集賢有直院校理崇文院又有檢討校理皆以他官領之初昭文館隸門下省史館寓於集賢後合為一矣太平興國二年太宗幸三館後增棟宇之制天禧八年詔崇文外院以三館為額龍圖真宗景德二年閣下列六閣曰經典曰史傳曰子書曰文集曰天文曰圖畫祥符初建以奉太宗御書取龍馬負圖之義太宗同此閣中天章真宗天禧五年作奉安真宗御書取雲漢為章之義一云天聖末間作此寶文舊曰壽昌慶厯初改今名嘉祐八年詔以仁宗御書藏於閣取寶書為訓之義英宗同此閣顯謨藏神宗御書取丕顯文謨之義政和四年閣初成徽猷哲宗取君子徽猷之義大觀二年詔以哲宗號令之指陳若揭日月緝熙紹復之故敷文徽宗取誕敷文德之義紹興十年詔以徽宗宸章奎炳發為號令著在簡編煥章髙宗取煥乎其有文章之義華文孝宗取重華協帝之義羣書考索卷三十八
