body:
  text: 羣書考索後集卷三十九宋章如愚編兵門上凖東漢安帝紀注下凖東漢百官志衛尉注漢興天下既定踵秦置材官於郡國京師有南北軍之屯至武帝平百粵內增七校晉灼曰凡八校尉胡騎不常置故云七也外有樓船皆嵗講𨽻武備云至元帝以貢禹議始罷角抵而未正治兵振旅之事刑法志孟堅志刑法而不志兵取古者大刑用兵之義而以兵附刑然述之不詳使一代之制無考焉漢初兵民不甚分如馮唐謂吏卒皆家人子弟起田由從軍而後漢禮儀志謂罷遣之士必勸以農桑由是觀之兵農尚未分京師有南軍北軍漢舊儀曰殿外門署衛尉殿內郎署屬光祿勳南軍將陵寢有衛士中尉有材官騎士中都有戍卒有官徒水衝有楫棹士武帝置期門羽林兵有佽飛有彀者置八校尉兵城門有兵長樂有兵此京師屯兵之大凡也兵制南軍衛尉主之顔曰衛尉等在宫內胡廣云主宫闕之門內按百官表衛尉掌宫門下屯兵而髙后紀言周勃既入北軍尚有南軍乃令平陽侯告衛尉無納吕産吕祿為將軍掌北軍産為相國掌南軍太尉已入北軍然尚有南軍未敢誦言誅産也已告衛尉無納相國産殿門産欲入未央宫為亂弗得入為産所將南軍當在殿廬之內故外人不得以入宣帝用張安世為衛將軍兩宫衛尉城門北軍兵屬焉不言南軍蓋衛尉即南軍也戾太子變時京師兵盡發獨不聞發南軍蓋衛士從上在甘泉也以此知南軍為宫城兵而衛尉主之也古者扈衛有二等宫伯則領貴遊子弟宫正則領宫徒役事漢有衛郎亦此制歟衛尉衛郎中令武帝更名郎中令為光祿勳掌宿衛宫殿門户其屬有諸郎掌守門户出充車騎凡郎官皆更直執戟宿衛出充車騎惟議郎不在直中中郎有五官左右三將車户騎三將見百官表至武帝又置期門羽林屬焉羽林郎乃選六郡良家子補之又取從軍死者子孫養之羽林教以五兵號曰羽林孤兒蔡質漢儀曰羽林有左監主羽林左騎八百右監主右騎九百人平帝又更期門為虎賁主宿衛此光祿勳所領之兵也南軍有郎衛兵衛掌天子宿衛北軍止於護城輕重不侔矣漢世凡大喪自諸郎衛皆發而宣帝之葬霍光光武之葬吳漢則詔以北軍護送章懷太子曰不以南軍重之也又王國人不得宿衛親屬犯法人不得宿衛如龔勝為楚王常侍三舉孝亷以王國不得宿衛蕭望之以甲科為郎坐從弟犯法則不得宿衛季冬或正月天子行幸曲臺臨饗衛士勸以農桑令就田里必觀角抵而後遣則南軍之重可知矣北軍中尉主之按百官表中尉秦官掌巡徼京師屬宫有中壘寺丞武庫兵器所都船四令丞又式道左右候候丞及左右京朝都尉尉丞卒兵皆屬焉是中尉所職乃巡檄京師以此知北軍為京城兵而中尉主之也自武帝增置八校而更名中尉為執金吾百官志注云執金吾秦官緹騎五百二十人光武常曰仕宦當作執金吾言徒役盛也及帝用兵四夷發中尉之卒逺擊南載恐內無重兵或致生變於是創置七校尉募知胡人事者為胡騎知越人事者為越騎又取中尉屬官所謂中壘者進為校尉湊成八校按武帝八校為北軍表不言屬中尉疑中壘自專此統北軍與中尉異司而北軍始不屬中尉矣武帝既增校尉恐中壘之權太重又於光祿勳之下旋理會添置於是增羽林期門大意欲南北二軍之勢均胡廣曰衛尉巡行宫中則執金吾徼於宫外為表裏唐李揆曰漢以南北軍相制此也按百官表雖不明言八校尉為北軍考之百官志光武中興省中壘但置北軍中候一人掌五營胡騎并長水虎賁并射聲並掌宿衛兵故東漢纍有北軍五校之稱是知武帝之八校正北軍也南軍守宮北軍護城雖漢舊制然國有大變則北軍亦繞宫屯衛故官志有五校之兵為宿衛之兵云漢初南北軍亦自郡國更畨調發來何以言之黃霸為京兆尹坐發騎士詣北軍馬不適士劾乏軍興則知自郡國調上衛士一嵗一更則知更代畨上初無定兵自武帝置八校則募兵始此置羽林期門則長從始此古者圻兵不出漢初猶得古意京師之兵不以出征髙帝十一年發中尉卒軍灞上文帝三年發中尉材官屬衛將軍軍長安則中尉之兵未始遠出武帝元鼎六年發中尉卒擊吕嘉則失之矣至宣帝又以羽林佽飛諸兵逺赴羌事甚者至發汝南汝南去金城幾何而騷動至此乎南軍在漢世往往重於北軍東漢自明帝至順帝南軍凡二出北軍凡六出明帝永平中鄧鴻率五營士屯鴈門章帝建初二年馬防耿恭將北軍五校擊羌吾章和二年竇憲將北軍五校伐北胸奴和帝永元六年遣鄧鴻將左右羽林北軍五校士擊降胡反出塞者安帝永初五年朱寵將五營士屯孟津順帝永和五年且凍羌冦三輔遣馬賢將左右羽林五校屯漢陽蓋左右羽林南軍五校五營皆北軍自宫城門內皆南軍衛尉主之自京城門內皆北軍中尉主之城南皇城之中有中尉兵宫闕之內有衛尉兵宫殿之內有郎衛羽林期門兵城門兵城門初無兵自戾太子事後始置以城門校尉一人領之十二城門各有候王商以特進孔光以太傅領城門兵得舉吏如五府兵制按漢兵郎無員數虎賁千五百人而多不過千人羽林左八百人右九百人八校各七百人至東漢不過三千五百三十六人執金吾一騎五百二十人至東漢亦不過六百人衛尉所領諸宫掖門都候劔戟衛士至東漢不過二千五百人十二城門兵不見數然亦不過門置一候以掖門司馬考之多至百八十人少或三十八人則城門領於一校大約可見中都兵蓋僅盈乃杜佑通典謂漢重兵悉在京師非也歷代兵制郡國兵郡國有材官騎士樓船有更卒有奔命有弩宫邊郡有戍卒有田卒有羌胡騎此郡國屯兵之大凡也按列郡王國侯國三者其兵不殊郡有都尉佐守典武卒天下郡國凡百有三置都尉者九十三輔外郡十三置特多於列郡者重京師而為衛也王國中尉北都尉侯國相比天下令長每嵗郡守衛教兵則相令長同預官儀曰八月太守都尉令長相丞尉會都試課殿最是也其王國封內之兵皆屬天下不可擅用漢官儀曰高祖命天下選能引關蹶張材力威猛者以為輕車騎士材官樓船皆於正卒中選而為之一嵗而滿班固曰踵秦置材官特言其略爾平地用車騎山阻用材官澤國用樓船三者各用所宜也髙帝十一年發上郡北地隴西車騎巴蜀材官武帝元鼎六年發隴西天水安定北地上郡騎士又按地理志廬江郡有樓船官卜式傳曰願與博昌習樓船者擊吕嘉伍被傳曰有潯陽太守朱買臣為會稽太守詔到郡治樓船用此參考則巴蜀三河潁川諸處有材官上郡北地隴西諸處有車騎而廬江會稽潯陽諸處有樓船三者之兵豈非因其宜哉刑法志武帝外有樓船疑武帝始置也及考嚴安書曰秦皇帝使尉署睢將樓船之士攻越則樓船蓋秦制也漢因之漢官儀以為出於髙宗豈其然哉調兵漢官儀云民生二十三為正一嵗為衛士二嵗為材官騎士習射御騎馳戰陳年五十六衰老乃得免為庶民就田里如淳亦曰律年二十三傳之疇官髙不滿六尺二寸以下為癃罷漢民凡在官三十二年自二十三以上為正卒每一嵗當給郡縣官一月之役其不役者當錢二千入於官以顧庸者已上戍中都官者一年為衛士京師者一年為材官騎士樓船郡國者一年三者隨其所長於郡縣中發之然後退為正卒就田里以待畨上調發更有三品有卒更有踐更有過更古者正卒無常人皆迭為之一月一更是為卒更也貧者欲得顧更錢次直者出錢顧之月二千是為踐更也天下人皆直戍邊三日亦名為更律所謂繇戍也雖丞相子亦在戍邊之調不可人人自行三日戍又行者當自戍三日不可往便還因便往一嵗一更諸不行者出錢三百入官以給戍者是謂過更也此亦秦制漢因之見前發兵漢初以羽檄徵兵於郡國孝文時則以龍虎符顔師古曰檄者以木簡為書長尺二寸以召兵其有急則加鳥羽示速也應劭曰銅虎符第一至第五國家當發兵遣使者至郡合符符合乃聽受之解題曰吕氏之難齊王欲發兵中尉曰非有虎符驗也襄平侯通乃持節矯內太尉北軍朱虛已殺産少帝命謁者持節勞朱虛侯朱虛侯欲奪節信謁者不肯朱虛侯與載節信馳斬長樂衛侯吕更始然則節京師固可以制兵事特郡固非虎符則不可發兵耳故莊助以節發會稽兵而太守欲拒不為發兵是也七國敗龔髙侯詰膠西王卬曰未有虎符擅發兵王自圖之淮南王盜寫虎符終以此敗之兩漢沿革髙祖之世南北二軍不出而民兵散在郡國有事以羽檄召材官騎士以備軍旅文帝始以銅虎符代檄當時各因其地以中都官號將軍將之如魏遫為北地將軍周竈為隴西將軍事已而罷京師止南北軍及中尉緹騎郎中令諸郎城門校尉屯兵北軍屬太尉南軍屬衛尉武帝更太尉為大司馬大將軍以罷將軍至以中尉材官出擊恐京師無重兵而生變於是分北軍為八校以中壘領之又恐北軍之權太重故於光祿勳增羽林期門之兵此武帝以南北軍相制之意唐人蓋知之矣異時南北軍皆郡國畨上無定在之兵也自武帝置大校大抵以習知胡越人充之則寡兵始自期門羽林皆家世為之則長從始此期門父死子代羽林孤兒乃子孫見表志蓋自是有養兵之病而京師之兵制壞矣元狩以後兵革數動民多買復調發之士益鮮於是發及謫吏次及謫民次及謫戍次及七科謫異時以𨽻于都尉者充兵故其伍符甚整也及常兵不足調及他衆甲伍必紊而郡國之兵制又壞矣是以昭宣以來其弊日甚始元元年募民及發奔命者擊益州元鳳元年遣太常三輔徙免刑擊氐五年發三輔及郡國惡少吏有告劾亡者屯遼東本始二年又選郡國吏三百石伉健習騎射者從軍神雀元年又發三輔中都官徒弛盡及應募佽飛射士孤兒胡越騎詣金城以益邊兵去募及奔可調及惡少發及刑徒選及三百石吏而又以羽林佽飛胡騎越騎從事是南北軍出矣紛紛無復舊制皆自武帝啓之按武帝時事越則會稽豫章擊朝鮮則舉遼東關西南夷則巴蜀南北軍猶未出至宣帝擊羌而始出矣及光武一起而變之兵制蕩然矣按光武以幽冀并州立定天下始於黎陽立營領兵騎常千人以謁者監之號黎陽兵而京師南北軍如故於北軍則并胡騎虎賁二校為五營以北軍中候易中壘以監之於南軍則光祿勳省車户騎三將及羽林令都尉省旅賁及衛士一丞建武六年欲罷郡國都尉并職太守無都試之法惟京師𨽻兵如故明年罷天下輕車騎士材官樓船士及軍酒吏悉還民伍惟更賦如故九年省關中都尉十三年罷左右將軍二十二年罷諸邊郡亭候吏卒然終建武之世已不能守前法罷尉省校輒復臨時補置七年罷長水射聲二十校十五年復更增屯騎校九年省關都尉十九年復置函谷關都尉其後天下亦往往置都尉明帝以後又嵗募郡國中都官死罪繫囚出戍聽從妻子自占邊縣以為常凡徙者皆給弓弩衣糧於是北胡有變則置度遼營明帝南蠻或叛則置象林兵和帝羌犯三輔則置長安雍二尉安帝鮮卑冦居庸則置漁陽營安帝其後又盜作緣海稍稍增兵順帝而魏郡趙國常山中山六百一十六塢河內通谷衝要三十三塢扶風漢陽隴道三百塢西羌傳置此多矣武罷都試而外兵不練雖疆場之間廣屯增戍列營置塢而國有征伐終𨽻京師之兵以出蓋自建武迄于漢衰胸奴之冦鮮卑之冦嵗嵗有之或遣將出擊或移兵留屯如永平中伐胸奴留兵伊吾廬城至肅宗二年罷之之類是也連年暴露奔命四方而禁旅無復鎮衛之職矣安帝永初間募入錢榖得為虎賁羽林緹騎營士而營衛之選亦衰矣成帝延熹間詔減羽林虎賁不任事半俸則京師之兵亦單弱矣外之士兵不練而內之衛兵不精設若盜起一方則羽檄被於三邊興發甲卒取辦臨時戰非素具每出輒北於是羌冦轉盛移兵赴逺民不堪命永和二年交趾九真二郡之兵至於反叛無以罷於奔命之過歟此其興兗豫之卒擊象林萬里之冦李固所以力爭也三年永建間方且令郡舉五人教習戰射又方募為陷陳羌傳任尚募以擊羌召為積射鮮卑傳鄧逺以擊鮮卑召為義從東漢有羌胡義從蓋取西邊羌胡之願從者為兵也董卓正以羌胡義從兵入亂京師大抵創立名號蕩無良法桓靈之世雖能委任假紀眀以盡滅諸羌而中平元年黃巾遂作所在盜賊不可勝數於是置八關都尉五年望氣者言京師當有大兵兩宫流血何進於是勸靈帝大發四方兵講武於平樂觀躬擐甲介焉稱無上將軍以厭之是嵗始置西門八校尉以小黃門蹇碩統之雖大將軍亦屬焉又改刺史為州牧然是時也黃巾諸賊亦就殱滅而蕭墻之禍深可寒心蓋自中世以後令下房帷鄧后臨政始任宦官而政歸臺閣戚宦更領兵權戚謂竇武何進迭相傾奪然五營畏服中人陳蕃竇武等欲誅宦官北軍不助武等而助宦官故族滅焉何進袁紹不勝其憤且懲竇武之事故欲藉分兵以除之於是內置園校陽尊閹宦外重州牧實召邊將卓正以并州牧將兵閹宦雖除而董卓之禍已成義兵四起羣牧爭政漢遂三分原漢盛衰皆兵之由而光武實為之光武徒見自西都之季都試或以為患韓延壽以試士僣擬不道誅而翟義之討王莽李通之勸光武皆因秋試之日因勒軍旅誅守長號令起軍遂罷都試之法三國蜀初置五軍其將校略如漢而兵有突將無前賨叟青羌散騎武騎之别諸葛亮卒蜀兵耗矣諸葛亮傳戮謖以謝衆上疏注曰漢晉春秋曰云云自臣到漢中中間期年耳然喪趙雲陽羣馬玉閻芝丁立白壽劉郃鄧銅等及曲長屯將七十餘人突將無前賨叟青羌散騎武騎一千餘人此皆數十年之內所紏合四方之精鋭非一州之所有吳多舟師而兵有解煩敢死兩部孫權傳魏命曹休等出洞口權遣吕範等督五軍以舟車拒休等曹公出濡須作油船夜渡洲上權以水軍圍取得三千餘人其沒溺者亦數千人權數挑戰公堅守不出權乃自來乘輕船從濡須口入公軍諸將皆以為是挑戰者欲擊之公曰此必孫權欲身見吾軍部伍也敕軍中皆精嚴弓弩不得妄發權行五六里回環作鼓吹公見舟船器仗軍伍整肅喟然歎曰生子當如孫仲謀劉景升兒子若豚犬耳周瑜傳曹公赤壁瑜部將黃蓋曰冦衆我寡難與持久然觀操軍船艦首尾相接可燒而走也乃取蒙衝鬬艦數十艘實以薪草膏油灌其中裹以帷幕上建牙旗先書報曹公欺以欲降又豫定走舸各繫大船後因引次俱前曹公軍吏士皆延頸觀望指言蓋降蓋發諸船同時發火時風盛猛悉延燒岸上營落頃之煙焰漲天人馬燒溺死者甚衆軍遂敗吕蒙傳權先遣蒙在前蒙至尋陽盡伏其精兵􅖻􅀈中使白衣搖櫓作商賈人服晝夜兼行至羽所置江邊屯候盡收縛之是故羽不聞知遂到南郡蔣欽傳權討關羽欽督水軍徐盛傳魏當大出橫江盛與諸將俱赴討時乘蒙衝遇迅風船落敵岸下諸將恐懼未有出者盛獨將兵上突斫敵敵披退走有所傷俟風止便還魏文帝大出有渡江之志盛建計從建業築圍作薄落圍上設假樓江中浮船諸將以為無益盛不聽固立之文帝到廣陵望圍愕然彌漫數百里而江水盛長便引軍退胡綜傳權以見兵少使綜科諸縣得六千人立解煩兩部徐詳領左部胡綜領右部韓當傳韓當遷昭武將軍領冠軍太守後加都督之號將敢死及解煩兵討丹陽賊破之車下虎士甘寧傳建安二十年從攻合肥會疫疾軍旅皆已引出唯車下虎士千餘人丹陽青巾沈瑩事孫皓傳孫皓天紀四年丹陽太守沈瑩等所在戰克注云沈瑩領丹陽鋭卒刀楯五千號曰青巾兵前後屢陷堅陳交州義士步騭傳延康元年權遣吕岱代隲隲將交州義士萬人出長沙及健兒武射之名非一調度亦無法凌統傳權復征江夏統為前鋒與所厚健兒數十人共乘一船常去大兵數十里行至右江斬黃祖將張碩盡獲船人還以白權引軍兼道水陸並集甘寧傳寧雖粗猛好殺然開爽有計略輕財敬士能厚養健兒健兒亦樂為用命駱統傳出為建忠郎將領武射兵三千人及凌統死復領其兵大率強者為兵羸者補户陸遜傳權遣遜討棧棧支黨多而壯兵少遜乃益施牙幢分布鼓角夜潛山谷間鼓譟而前應時破散遂部伍東三郡強者為兵羸者補户得精卒數萬人宿惡蕩除所過肅清至有二百餘家輒皆科取以他郡羸民遷補其處其後又以五子分將而昊遂亡陳武傳嘉禾三年諸葛恪領丹陽太守討平山越以表領新安都尉與恪參勢初表所受賜復人得二百家在會稽新安縣表簡視其人皆堪好兵乃上疏陳讓乞以還官充足精鋭詔曰先將軍有功於國國家以此報之卿何得辭焉表乃稱曰今除國賊報父之仇以人為本空枉此徑鋭以為僮僕非表志也皆輒科取以充部伍所在以聞權甚嘉之下郡縣科正户羸民以補其處魏制略如東漢南北軍如故時遣南北軍衛張郃初曹公置武衛營於相府以領軍主之文帝增置中營於是有武衛中壘二營以領軍將軍併五校統之改漢乘之名曰治兵是時有中左右前軍各一帥又有中護中領軍領護軍將軍各一人自操納司馬之言黃初中復令州郡典兵州置都督尋加四征四鎮將軍之號又置大將軍都督中外兵兵柄世在司馬氏而魏祚移矣晉自文王置二衛中衛後衛三部司馬前驅由基強弩以中領之軍領之武帝以伐魏遂分左右各一將軍又置羽林虎賁上騎異力四部皆領於驍騎又有左右前後四軍四護軍領之凡二衛左右前後驍騎七軍皆以中軍將軍羊祐領之祐罷改七軍中候帝始懲魏氏孤立大封同姓大國三軍兵五千人次國二軍兵三十人小國一軍兵千五百人吳平之後即詔天下刺史悉去州郡兵大郡才置武吏百人小郡五十人州縣無備而晉遂東遷矣元帝南渡有大將軍都督四鎮四征四平之號然調兵不出三吳大發毋過三萬每議出討率取奴兵自用刁協議後皆以奴為兵王道子發諸郡奴號曰樂屬更翼發六州奴北伐是也百姓怨嗟有戰輒敗及後魏天和中闔門之責除於崔挺崔挺傳時以犯罪配邊者多有逃越遂立重制一人犯罪逋亡闔門充役挺上書以為周書父子罪不相及以一人犯罪延及闔門豈不哀哉辭甚雅切帝納之三長之制立於李沖通鑑云魏無鄉黨之法惟立宗主督護民多隱冒三五十家始為一户內祕書令李沖上言宜凖古法五家立鄰長五鄰立里長五里立黨長取鄉人強謹者為之鄰長復一夫里長二夫黨長三夫三載無過則升一等其民調一夫一婦帛一匹粟二石大率十匹為公調二匹為調外費三匹為百官俸此外復有雜調民年八十已上聽一子不從役孤獨癃者篤疾貧窮不能自存者三長內迭養食之書奏詔百官通議中書令鄭議等皆以為不可太尉丕曰臣謂此法若行於公私有益但方有事之月校比户口民必勞怨請過今秋至冬乃遣使者於事為宜沖曰民可使由之不可使知之若不因調時民徒知立長校户之勤未見均徭省賦之益心必生怨宜及誅謫之月令知賦稅之均既識其事又得其利行之差易羣臣多言九品差調為日已久一旦改法恐成擾亂文明太后曰立三長則課調有常凖蔭附之户可出僥幸之人可止何為不可甲戌初立黨里鄉鄰三長定民户籍民始皆愁苦豪強者尤不願既而課調省費十餘倍上下安之屯兵興於薛虎子而戍兵資絹自隨之困省魏以薛虎子為徐州刺史時州鎮戍兵資絹自隨不入公庫虎子上表以為國家取江東先須積穀于彭城竊唯在鎮之兵不減數萬資糧之絹人十二匹用度無凖未及代下不免飢寒公私損費今徐州良田十萬餘頃水陸肥沃清汴通流足以灌溉若以兵絹市牛可得萬頭興置屯田一嵗之中且給官食牛兵藝殖餘兵屯戍且耕且守不妨捍邊一年之收過於十倍之絹三時之耕足充數載之食於後兵資皆貯公庫五稔之後穀帛俱溢非直戍卒致豐飽亦有吞敵之勢魏人從之虎子為政有惠愛兵民懷之世業定於李安世而豪強蔭附逃役之弊均魏初時司馬氏多蔭附蔭附者皆無官役而豪強徵斂倍於公賦給事中李安世上言歲飢民流田業多為豪右所占奪雖桑井難復冝更均量使力業相稱又所爭之田宜限年斷事又難明悉歸今主以絶詐妄魏主善之由是始議均田十月詔遣使者循行州郡與牧守均給天下之田其男夫十五以上受露田四十畝婦人二十畝奴婢依良丁牛二頭受田三十畝退止四牛所授之田率倍之三易之田再倍之以供耕作及還受之盈縮人年及課則受田老免及身沒則還田奴婢牛隨有無以還受初受田者夫給二十畝課種桑五十桑田皆為出業身終不還恆計見口有盈者無受無還不足者受種如法盈者得賣其盈諸宰民之官各隨近給公田有差更代相付賣者坐如律定都中洛選武勇之士十五萬人為羽林虎賁以充宿衛魏孝武帝紀乙巳詔選天下勇士十萬人為羽林虎賁以充宿衛分建六鎮優復府户鬱然可觀有太平之風永平之後良法浸隳矣髙齊别為內外領之二曹外兵曹門騎兵曹雖十八受田二十充兵六十免役頗追古意然武帝之際政以賄成一時領軍至二千人無謂甚矣府兵之制始於西魏西魏大統中宇文泰用蘇綽始倣周典置六軍籍六等之民擇魁健材力之士以為之首盡蠲租調而刺史以農隙教之合為百府每府一郎將主之分屬二十四軍開府各領一軍大將軍凡十二人每一將軍統二開府一柱國主二大將軍復加持節都督以統焉凡柱國六員衆不滿五萬人此蘇綽之請也周至克齊之後并相各置六府而東北别為七總管自此𨽻户有還奴虜有免隱丁有誅府兵有復丁以十二取役以一月代糧蓄以六家偹民力日裕矣隋之兵制大抵乃周齊府兵之舊而加潤色焉其十二衛曰翊衛曰驍騎衛曰武衛曰屯衛曰禦衛曰侯衛各分左右皆置將軍以分統諸府之兵附有郎將有副部將坊主團主以相統治其外又有驃騎車騎二符皆有將軍後有驃騎曰鷹揚郎將軍騎曰副郎將别置折衝果毅此府兵之大略也文帝取江南之役凡總管兵合五十一萬八千而散之要害之地者凡八所或出於六合晉王廣或出於襄陽秦王俊或出於永安王素以至江陵劉仁恩蘄春王世積廬州韓擒虎廣陵賀若弼東海燕榮皆列兵分戍旌旗舟楫橫亘數千里然其節度則總之晉王其元帥帥長史則屬之髙熲而各相統攝焉此髙祖御兵之意也自煬帝不綱府兵之制不講至伐髙麗之役而平壤之會四方兵集凡一百十三萬三千八百人是以逺近騷動士卒死亡而遼東浪死之歌作搜平民補簿隋遂亡矣羣書考索後集卷三十九
