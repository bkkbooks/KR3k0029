body:
  text: 羣書考索别集卷十五宋章如愚撰禮樂門車服周家冬官職領之嚴周人尚輿而制作之法領於冬官其輿之廣六尺六寸故其轍迹之在地者相距之間廣狹如一無有逺邇莫不齊同凡為車者必合乎此然後可以行乎方內而無不通不合乎此則不惟有司得以討之而其行於道路自將偏倚杌隉而跬步不前亦不待禁而自不為矣中庸或問周輅過侈之弊曰周輅為過侈何也曰夫輅者身之所乘足之所履其為用也賤矣運行振動任重致逺其為物也勞矣且一器而工聚焉則其為費也廣矣賤用而貴飾之則不稱物勞而華飾之則易壞費廣而又增費之則傷財周輅之所以為過侈歟語或問周家車服之制路車金輅以賜同姓象輅以賜異姓也𤣥衮𤣥衣而畫以卷龍也黼如斧形刺之於裳也周制諸公衮冕九章侯伯鷩冕七章則自華蟲以下子男毳冕五章衣自宗彛以下而裳黼黻孤卿絺冕三章則衣粉米而裳黼黻大夫𤣥冕則𤣥衣黼裳而已詩傳大車兵車之制凡車之制廣皆六尺六寸其平地任載者為大車則軫深八尺兵車則軫深四尺四寸車轂之制轂者車輪之中外持輻內受軸者也大車之轂一尺有半兵車之轂長三尺二寸故兵車曰暢轂並同上輦車之制觀通典夏末制輦之言則知輦制自夏而肇原觀地官車輦辨物之語則知輦制至周而大備夫輦者車之制也在商則曰胡奴車在周則曰輜車至秦則為乘車昭其名也夏以三十人而輦商以十八人而輦周以十五人而輦昭其數也周以黃金為飾漢以雕玉為飾後魏以羽葆為飾昭其文也或使人挽或用馬駕漢之制也形似輜車裝用金飾梁之制也絡飾以朱輦不施輪隋之制也一曰大鳯二曰大芳三曰仙遊四曰小輕五曰芳亭六曰大王七曰小王唐之制也然則整六飛而肅萬乘固非所以侈辨物之儀而事文藻之飾實所以重君尊之義也不然後魏輿輦乖制李德林何以有請從太和之奏哉夏商之制簡曰周冕之不為侈奈何曰加之首則體嚴而用約詳其制則等辨而分明此周冕所以雖文而不為過也夏商之制雖不可考然意其必有未備者矣語或問衮衣之制衮衣裳九章一曰龍二曰山三曰華蟲四曰火五曰宗彛皆繢於衣六曰藻七曰粉米八曰黼九曰黻皆繡於裳天子之龍一升一降上公但有降龍以龍首卷然故謂之衮也三命之服芾冕服之韠也一命緼芾黝珩再命赤芾黝珩三命赤芾葱珩大夫以上赤芾乘軒並詩傳古今朝服之制古者有朝服有祭服祭服謂鷩冕之類朝服所謂皮辨𤣥端之類自漢以來祭亦用冕服朝服則所謂進賢冠絳紗袍自隋煬帝時始令百官戎服唐人謂之便服又謂之從省服乃今之公服也祖宗以來亦有冕服車旗之類而不常用惟大典禮則用之文公語録自天子至庶人禮制之異且如冕服是天子祭服皮辨是天子朝服諸侯助祭於天子則服冕服自祭於其廟則服𤣥冕大夫助祭於諸侯則服𤣥冕自祭於其廟則服皮辨又如天子常朝則服皮辨朔旦則服𤣥冕無旒之冕也諸侯常朝則用𤣥端朔旦則服皮辨大夫私朝亦用𤣥端夕深衣士則𤣥端以祭上士𤣥裳中士黃裳下士雜裳前𤣥後黃也庶人深衣同上古者朝服祭服之制古朝服用布祭服則用絲詩絲衣繹賔尸也皮辨素積皮辨以白鹿皮為之素積白布為裙同上今公服非法服後世禮服固未能猝服先王之舊然且得內外稍有辨别尤得今世之服大抵非法服如上領衫靴鞋之類先王冠服掃地盡矣中國衣冠之亂自晉劉石後遂相承襲唐接隋隋接周周接元魏大抵非法服並同上今朝服乃古間服今朝廷服色三等乃古間服此起於隋煬帝時然當時亦只是做戎服當時以巡幸煩數欲就簡便故三品以上服紫五品服緋六品以下服緑他當時亦自有朝服大祭祀時用之然不常以朝到臨祭時取用文公語録朝服變於隋朝今之朝服乃戎服蓋自隋煬帝數遊幸因令百官以戎服從一品紫次朱次青皂靴乃上馬鞋也後世循襲遂為朝服今公服即唐常服唐人有官者公服幞頭不離身以此為常服又别有朝服如進賢冠中單服之類其下又有省服為常服今之公服即唐之省服也玉佩珩璜瑀琚之制雜佩者左右佩玉也上橫曰珩下繫三組貫以蠙珠中組之半貫一大珠曰瑀末懸一玉兩端皆鋭曰衝牙兩旁組半各懸一玉長博而方曰琚其末各懸一玉如半璧而內向曰橫又以兩組貫珠上繫珩兩端下交貫於瑀而下繫於兩璜行則衝牙觸璜而有聲也詩傳圭笏五等諸侯之制公執桓圭侯執信圭伯執躬圭子執穀璧男執蒲璧五等諸侯執之以合符於天子而驗其信否也周禮天子執冒以朝諸侯鄭氏注云名玉以冒以德覆冒天下也諸侯始受命天子錫以圭圭頭斜鋭其冒下斜刻小大長短廣狹如之諸侯來朝天子以刻處冒其圭頭有不同者即辨其僞也書說執笏始於宇文周古者君臣所執五玉三帛二生一死皆以為贄而已笏則指之用以指畫記事而已不執之以為儀也宇文周復古乃不修贄而執笏於是攝齊鞠躬之禮廢升堂而蹴齊者多矣語或問古今圭笏之制笏者忽也所謂備忽忘也天子以球玉諸侯以象大夫以魚須文竹士竹本象可也漢書有秉笏奏事又曰執簿亦笏之類本只是為備遺忘故手執眼觀口誦或於君前有所指畫不敢用手故以笏指畫今世遂用以為常執之物周禮典瑞王搢大圭執鎮圭大圭不執只是搢於腰間却執鎮圭用藻藉以朝日而今郊廟天子皆執大圭大圭長三尺且重執之甚難古者本非執大圭也文公語録樂律聲和則樂和聲者宫商角徴羽也大抵歌聲長而濁者為宫以漸而清且短則為商為角為徴為羽所謂聲依永也既有長短清濁則又必以十二律者和之乃能成文而不亂假令黃鍾為宫則太簇為商姑洗為角林鍾為徴南吕為羽蓋以三分損益隔八相生而得之餘律皆然即禮運所謂五聲六律十二管還相為宫所謂律和聲也聲既和乃以其聲被之八音而為樂則無不諧和而不相侵亂失其倫次可以奏之朝廷薦之郊廟而神人以和矣聖人作樂以養情性育人才事神祗和上下其體用功效廣大深切如此書注律陽而吕隂六律為陽黃鍾太簇姑洗蕤賔夷則無射六吕為隂大吕夾鍾仲吕林鍾南吕應鍾凡十二管皆徑三分有竒空圍九分而黃鍾之長九寸大吕以下律吕相間以次而短至應鍾而極焉以之制樂而節音聲則長者聲下短者聲髙下者則重濁而舒遲髙者則輕清而剽疾書注古人吹律以合聲以黃鍾為宫便用林鍾為徴太簇為啇南吕為羽姑洗為角應鍾為變宫蕤賔為變徴這七律自成一均其聲自相諧應古人要合聲先須吹律使衆聲皆合律方可用後來人想不能解去逐律吹得京房始有律凖乃是先做下一個母子調得正了後來只依此為凖國語謂之均梁武帝謂之通其制十三弦一弦是全律底黃鍾只是散聲又自黃鍾起至應鍾有十二絃要取甚聲用柱子來逐絃分寸上柱定取聲立均之意本只是如此文公語録黃鍾不可為它律所用樂律中所載十二詩譜乃趙子敬所𫝊云是唐開元間鄉飲酒所歌也但却以黃鍾清為宫此便不可蓋黃鍾管九寸最長若以黃鍾為宫則餘律皆順若以其他律為宫便有相陵處今日只以黃鍾言之自第九宫後四宫則或為角或為羽或為商或為徴若以為角則民陵其君矣若以為商則臣陵其君矣徴為事羽為物皆可類推樂記曰五者皆亂迭相陵謂之慢如此則國之滅亡無日矣故制黃鍾四清聲用之清聲短其律之半是黃鍾清長四寸半也若後四宫用黃鍾為角徴商羽則以四清聲代之不可用黃鍾本律以避陵慢故漢志有云黃鍾不復為他律所役其餘律亦皆有清聲若遇相陵則以清聲避之不然則否惟是黃鍾則不復為他律所用然沈存中續筆談說云唯君臣民不可相陵事則不必避先生一日又說古人亦有時用黃鍾清為宫前說未是文公語録辨絲竹之聲絲尚宫竹尚羽宫聲大故以羽聲濟之絲聲細故以竹聲諧之當先定黃鍾之律十二律自黃鍾而生黃鍾是最濁之聲其餘漸漸清若定得黃鍾是便入得樂都是這裏才差了些子其他都差只是寸難定所以易差隋何妥之失謬南北之亂中華雅樂中絶隋文帝時鄭譯得之於蘇祗婆蘇祗婆乃自西域𫝊來故知律吕乃天地自然之聲氣非人之所能為譯請用旋宫何妥恥其不能遂止用黃鍾一均並同上上下皆損益之理律管只以九寸為凖則上生下生三分益一損一如破竹矣黃鍾應鍾長短清濁管有長短則聲有清濁黃鍾最長則聲最濁應鍾最短則聲最清造樂關國祚長短律管只吹得中聲為定若謂用周尺或羊頭山黍雖應凖則不得中聲終不是大抵聲太髙則噍殺低則盎緩劉歆為王莽造樂樂成而莽死後來荀勉造於晋武帝時即有五胡之亂和峴造於周世宗時世宗亦死惟宋朝太祖皇帝神聖特異初不曽理㑹樂律但聼樂聲嫌其太髙令降一分其聲遂和唐太宗所定樂及宋朝樂皆平和所以世祚長久今之樂非古樂今之樂非古樂也雖古之鄭衛亦不可見矣今關雎鹿鳴等詩亦有人播之歌曲然聽之與俗樂無異不知古樂如何古之宫調與今之宫調無異但恐古者用濁聲處多今樂用清聲處多當明制樂之本孟子論今樂古樂則與民同樂乃樂之本學者所當知也若欲明其聲音節奏特樂之一事耳啞鍾以避宫聲王朴當五代之末杜撰得個樂當時有幾鍾名為啞鍾不曽擊蓋古人制此不擊以避宫聲若一例皆擊便有陵節之患並同上吾身之樂有舜之文德則聲為律而身為度簫韶二南聲不患其不作文公答陳佐仁審音不在聲而在律由民論之則審音之難不在於聲而在於律不在於宫而在於黃鍾蓋不以十二律節之則無以著夫五聲之實不得黃鍾之正則十一律者又無所受以為本律之宫也今又極論宫聲之妙而無曰黃鍾云者則恐其於聲音法制之間猶有所未盡也夫以聲音法制之粗而猶有未盡則雖有黃帝大舜之君伶倫后䕫之佐亦如之何徒手而可以議大樂之和哉聲律辨詩雅變風之辨夫二南正風房中之樂也鄉樂也二雅之正朝廷之樂也商周之頌宗廟之樂也是或見於序義或出於𫝊記皆有可考至於變雅則固已無施於事而變風又特里巷之歌謠其領在樂官者以為可以識時變觀土風而賢於四夷之樂耳讀吕氏詩記桑中篇三代禮樂達天下三代之時禮樂用於朝廷而下達於閭巷學者諷誦其言以求其志詠其聲執其器舞蹈其德以涵養其心則聲樂之所助於詩者為多文公語録鄉飲之樂可疑鄉飲酒所奏樂有不用二南小雅與笙詩而用南吕無射兩宫十章不知何據豈有以見古之鄉樂用此律而寫其遺聲邪將古樂已亡而不可稽考而别制此樂也然則特用此律其㫖安在文公答林黃中樂亡而不可學古樂既亡不可復學但講學踐履間可見其遺意耳文公答李饒卿正聲子聲之别蓋正聲是全律之聲如黃鍾九寸是也子聲是半律之聲如黃鍾寸半是也一均之內以宫聲為主其律當最長其商角徴羽之律若短即用正聲或有長者則只可折半用子聲此所謂一均五聲而分正聲子聲之法也十二律既自有正聲又皆有子聲以待十二均之用所謂黃鍾大吕太簇無子聲以其一均之內商角徴羽四聲皆短於本律故也若以中吕為宫則黃鍾為徴而當用子聲矣若以㽔賔為宫則大吕為徴而當用子聲矣若以林鍾為宫則太簇為徴而當用子聲矣此十二律所以皆有子聲也文公答陳淳小雅大雅之别正小雅燕禮之樂也正大雅㑹朝之樂受釐陳戒之辭也故或歡欣和說以盡羣下之情或恭敬齊莊以發先王之德詞氣不同音節亦異詩傳上下通用之樂按儀禮鄉飲酒及燕禮前樂既畢皆間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀間代也言一歌一吹也然則此六者蓋一時之詩而皆為燕享賔客上下通用之樂同上九歌乃韶樂之本韶與武今皆不可考但書所謂正德利用厚生惟和九功惟叙九叙惟歌戒之用休董之用威勸之以九歌此正是韶樂之本也所謂九德之歌九韶之樂也文公語録七音之辨不考鄭譯答蘇䕫之語無以知七音之始不觀杜佑加文武之文無以知七音之變是何也蓋伏羲始紀陽氣而為律黃帝聽鳯凰而定音但有五聲未聞有變宫變徴也至周武王始加二變聲而七音備焉考之周語可見矣武王克商之時嵗在鶉火月在天駟日在析木越三日而辰在斗越四十八日而辰在天黿鶉火張也天駟房也自張及房則為七列鶉火午也天黿子也自午至子則為七同合之以數昭之以聲而七律於是乎作然則加變宫變徴而為七音者豈非自武王始乎故後世或謂之七始或謂之七華黃鍾為天林鍾為地太簇為人姑洗為春㽔賔為夏南吕為秋應鍾為冬此則以七音而為七始者也婆陀力華為宫聲雞識華為南吕沙識華為角聲沙侯加濫華為變徴沙臘華為徴聲般贍華為羽聲利建華為變宫此則以七音而為七華者也吁故必知七始七華之說而後可與論七音之妙也顔氏三夏之歌讀左傳而知三夏之奏觀周禮而知三夏之名考詩頌而知三夏之說夫三夏者歌之大也天子享元侯用之故尸出入則奏肆夏牲出入則奏昭夏四方賔來則奏納夏昭其聲也其聲載於樂章其職掌於鍾師其名始於周代重其事也然杜預之說則曰肆夏一名樊韶夏一名遏納夏一名渠吕叔玉之說則又曰一曰肆夏二曰繁遏三曰渠夏三夏之名為不同也愚嘗考之詩而得其說蓋肆之為言遂也時邁之詩遂於大位豈古所謂肆夏者乎遏之為言止也執競之詩言福祿止於周之多豈非古所謂昭夏者乎渠之為言大也思文之詩言后稷配天之大豈非古所謂納夏者乎吁愚以是知肆夏繁遏渠夏皆為周頌而即三夏之異名也若夫三夏之外又有所謂王夏章夏齊夏族夏驁夏是總為九夏之名尤不可不知也同上周人何以不用商音先儒之言曰聞宫聲使人溫良而寬大聞商聲使人方廉而好義聞角聲使人惻隱而愛人聞徴聲使人樂義而好施聞羽聲使人恭儉而好禮則知樂有五音闕一不可然周人祭祀何以用宫角徴羽而不用商乎圜鍾為宫黃鍾為角太簇為徴姑洗為羽此禮天神之樂而遺商也函鍾為宫太簇為角姑洗為徴南吕為羽此禮地示之樂而遺商也黃鍾為宫大吕為角太簇為徴南吕為羽此禮人鬼之樂而遺商也故或以為人聲或以為殺聲或以為中聲不知天地鬼神非人孰享商果人聲何為不與於祭也黃鍾之太簇函鍾之南吕莫匪殺聲是殺聲未嘗不用也宫生徴徴生商商生羽羽生角中聲闕則上下之音散是中聲尤為當用也吁三者之說皆非愚未敢以為信蓋古樂以鍾殸為主無鍾磬則以管為主晉志所謂笛猶鍾磬是也今之笛即古之管古者之管但有四孔未有商音至漢京君明始加一孔於笛之後是為商聲然則周人祭祀用管為主奚嘗惡商哉此非愚之臆說實得之馬融之笛賦並同前樂器八音之制八音金石絲竹匏土革木也皆樂器也書說塤箎之制樂器土曰塤大如鵝子鋭上平底似稱錘六孔竹曰箎長尺四寸圍三寸七孔一孔上出徑三分凡八孔橫吹之詩傳簧笙竽之制簧笙竽管中金葉也蓋笙竽皆以竹管植於匏中而竅其管底之側以薄金障之吹則鼓之而出聲所謂簧也故笙竽皆謂之奏笙十三簧或十九簧竽三十六簧也並詩傳鍾磬特垂編垂之别鍾磬有特垂有編垂者其特垂者器大而聲宏雜奏於八音之間則絲竹之聲皆為所掩而不可聽故但於起調畢曲之時擊其本律之垂以為作止之節其編垂者則聲器皆小故可以雜奏於八音之間而不相凌也文公答王子順羣書考索别集卷十五
