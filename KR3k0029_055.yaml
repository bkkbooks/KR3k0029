body:
  text: 羣書考索卷五十五宋章如愚撰歷數門歷類古今歷名調歷黃帝顓帝歷虞歷夏歷殷歷周歷魯歷以上歷謂之古歷皆以四分起數若同六歷則不數虞歷太初歷西漢武帝時鄧平所作三統歷西漢末劉歆推説此歷四分歷本古歷法東漢以太初疏闊章帝元和間用之乾象歷東漢靈帝時劉洪作黃初歷曹魏文帝初韓翊作景初歷曹魏明帝時楊偉作泰始歷即景帝初歷晉武帝改此名正歷西晉武帝時劉智作春秋長歷杜預作乾度歷西晉初年李修王顯用杜預歷論作通歷東晉穆帝時王朔之作三紀甲子元歷姚秦薑岌作七曜歷宋何承天表言徐廣有此歷不知作者元嘉歷宋文帝時何承天作大明歷宋孝武時祖沖之作梁歷武帝大同中命虞􅒠作趙􅱿歷涼太史趙􅱿作正光歷北魏孝明宗時崔光合九家歷作興和歷東魏孝靜帝命李業興更修正光歷天保歷北齊文宣帝初宋景業作甲寅元歷北齊董復鄭元偉作劉孝孫歷北齊後主時張孟賔歷北齊後主時明克讓歷北周明帝時天和歷北齊武帝時甄鸞作丙寅元歷北周靜帝時馬顯作張賔歷隋文帝開皇初張胃元歷隋開皇十七年皇極歷隋劉焯作戊寅元歷唐髙祖初傳仁均作麟德甲子元歷唐髙祖時李淳風作經緯歷唐髙宗時瞿曇羅上光宅歷武后命瞿曇羅作乙巳元歷中宗時南宫説作開元大衍歷玄宗時僧一行作九執歷來自西域至德歷肅宗時韓頴作寶應五紀歷代宗詔郭獻之作建中正元歷德宗時徐承嗣楊景風作元和觀象歷憲宗時徐昴上長慶宣明歷穆宗初詔日官作景初崇玄歷昭宗時邊岡等作符天歷唐建中時曹士薦作調元歷石晉時馬重績作明玄歷五代周太祖時王延訥作萬分歷五代時民間有此歷永昌歷前蜀王建時胡秀林作正象歷亦蜀人作齊政歷南唐時陳咸勳作顯德欽天歷五代至周世宗時王朴作以上五十七歷立元黃帝調歷辛卯顓帝乙卯虞丙午夏丙寅殷甲寅周丁巳魯庚子太初丁丑三統庚戍四分庚申乾象己丑景初壬辰以上十二歷立元各不同必始以甲子正朔之通歷自此歷始以甲子為上元祖沖之大明歷自此歷始立論以為作歷上元必當以甲子曹士薦符天歷此歷始不立上元而以近出唐顯宗五年庚申起起數古之七歷皆以十九嵗為一章有七閏積章月二百三十五一嵗凡三百六十五日四分十之一是名月分一月凡二十九日九百四十分日之四百九十九太初歷始變古法以八十一為日法以一千五百三十九為統法一嵗凡三百六十五日一千五百三十九分日之三百八十五一月凡二十九日八十一分日之四十三其一嵗餘則增四分法多六千一百五十六分日之一故積六千一百五十六年則增多四分之法之一日然猶以十九嵗為一章東漢四分歷即古歷耳乾象歷始減斗分以五百八十九為紀法百四十五為斗分亦猶以十九嵗為一章大明歷始破章法不復以十九嵗為一章乃以三百九十一嵗為一章有一百四十四閏積章月四千八百三十六雖斗分章法盡變古法併日法度法兩者並立則猶無異於古也日法者約朔周之法度法者約嵗周之法麟德甲子元歷至此歷始併日法度法為一而立總法總去一千三百四十一嵗三百六十五日一千三百四十分日之三百三十八一月二十九日一千三百四十分日之七百十一施用久近黃帝至周凡二千四百一十四年而歷止七改黃帝顓帝虞夏殷周魯漢四百年而歷始改初用顓帝武帝用太初章帝用四分景初一歷自曹魏明帝始盡魏涉兩晉至宋文帝元嘉二十二年始改凡用二百八十年元嘉歷用於宋涉齊至梁凡六十五年大明歷用於梁終梁訖陳凡八十年唐始終二百九十餘年而歷九改唐志序云八改及考志中乃凡九改戊寅元麟德甲子元脫元大衍至德寶應五紀建中正元元和觀象長慶宣明景初崇玄宋朝方二百六十餘年而歷十餘改應天乾天儀天崇天明天奉天觀天占天紀元統元乾道淳熙會元統天大抵古歷用之久後世之歷改之頻因襲三統襲太初四分襲古歷一黃初景初俱襲乾象一張賔依何承天法張胃元歷竊劉焯術戊寅元歷祖術張胃元稍以劉孝孫術參之麟德歷因劉焯皇極法增損所宜寶應五紀歷用麟德元紀為大衍舊術建中正元歷以後三四歷皆因大衍舊術調元歷用符天法立元用宣明法推氣朔用崇元法推五星創改乾象始創月行遲疾法黃初始課日蝕景初始有交蝕起虧術元嘉始改斗分為室分大明又改室分為虛分始立嵗差法馬顯丙寅元歷始推交蝕定小餘張胃元始立五星入氣加減法始立日應食不食術皇極始有推黃道月道術大衍始立步中朔術始以九服逺近推軌漏交會創立嵗星差合術崇玄始立相減相乘法以求黃道月道欽天始變五星法令遲疾留行舒亟有漸精密太初上元日月如合璧五星如連珠清臺課校太初第一乾象方於前法轉為精密鄭玄徐嶽並解釋之自黃初以後改作歷術皆斟酌乾象所減斗分朔餘月行疾徐以求折𠂻洪術為後代推步之師表大明歷本宋祖沖之所作宋不及用至梁武帝天監中沖之子祖常上其父術詔與元嘉歷參校起八年十一月訖九年七月沖之歷皆密元嘉歷皆疏張胃元歷與古不同者三超古獨異者七皇極歷術士或稱其妙麟德歷當時以為密大衍歷較經史所書氣朔日名宿度可考者皆合因南宫説陳元景等言其九執術詔李麟等較靈臺候簿大衍十得七八麟得才三四九執一二焉自太初至麟德歷有二三十家與天雖近而未密也至一行密矣其倚數立法固無以易也後世雖有改作者皆依倣而已宣明歷自大衍歷後法制簡易合望密近旡能出其右者自譽楊偉作景初歷上表云雖使研桑心算𨽻首運籌重黎司晷羲和察景以考天路步驗日月究極精微盡術數之極皆未能並臣如此之妙也薑岌作三紀甲子元歷其略云圖讖皆云三百嵗斗歷改憲今治新歷上可以考合於春秋下可以取驗於今世此法乃可千嵗用之豈三百年歷改憲者乎馬顯作丙寅元歷上表云謹案史曹舊簿及諸家法數棄短取長共定今術兩曜虧食五星伏見參校積時最為精密劉焯作皇極歷自言於皇太子曰顧循記注自許精微秦漢以來無所與讓尋聖人之迹悟曩哲之心則七曜之行得三光之度正諸氣朔成一歷象會通今古符元經傳稽於庶類信而有徴王朴作欽天歷奏云包萬象以為法齊七政以立元測土箭以候氣審朓朒以定朔明九道以步月校遲疾以推星考黃道之斜正辨天勢之升降而交食詳焉陳舛顓帝歷漢初用之朔晦月見弦望滿虧多非是三統歷方於四分六千餘年輒益一日何承天以為歆幾乎不知而妄言者杜預考古今歷以驗春秋知三統之最踈四分歷施用至魏日蝕率常在晦乾象法魏太史令許攸云劉洪月行術用以來且四十餘年以後覺失一辰有竒韓翊以為乾象減斗分太過後當先失景初歷晉改名泰始而用之其推五星尤疏闊晉元帝更以乾象五星法代之薑岌云殷歷斗分粗故不可施於今乾象斗分細故不可通於古景初斗分雖在粗細之中而日之所在乃差四度宋何承天云景初二至差三日五時元嘉歷既施用祖沖之上表云日月所在覺差三度二至晷影幾失一日五星伏見至差四旬梁時與祖沖之參校元嘉歷踈張賔歷既行劉孝孫劉焯並稱其失凡六條如冬至日守常度五星不同元等事丙寅元歷劉焯以為日躔莫辨緩急月離妄為兩種月道交會去極晷滿立術之疏不可紀極隨事紏駮凡五百三十六條戊寅元歷施行至武德三年正月望二月八日朔當蝕比不效麟德歷施行至開元九年曽署日蝕比不效至德歷施行至寶應元年六月望戊夜月蝕三之一至德加時在日出後有交不署蝕不與天合五紀歷施行至德宗時五紀歷氣朔加時稍後觀象歷測驗不合宣明歷施行至昭宗時數亦漸差調元歷行之五年輒差不可用舍而復用四分西漢初用顓帝歷即四分法武帝改太初東漢章帝復用四分崇玄唐昭宗時始用崇玄至石晉髙祖始用調元行之輒差不可用而後用崇玄二歷參用東漢用四分後以劉洪月行術參之西晉用泰始至東晉元帝以乾象五星法參之唐髙宗用麟德歷以瞿曇羅經緯歷參之歷家爭辨太初西漢既用太初二十七年至元鳯三年太史令張壽王執古調歷與之爭詔課清臺太初歷第一壽王課比下有司劾壽王所執乃殷歷非調歷又壽王改易黃帝以來帝王世代竟以下吏自太初歷初起至元鳳六年而是非堅定四分東漢既用四分至安帝延光中謁者亶誦言當用甲寅元順帝漢安中邊韶言當復用太初歷靈帝熹平中馮光陳晃復議四分五元之非欲用甲寅為元每有異論輒集衆議尚書令忠稱甲寅之失於先太史用虞恭辨太初之非於中議郎蔡雍斷四分之是於後是以終東漢一代四分不易元嘉何承天上新歷宋文帝詔付外詳之太史令錢樂之等奏皆如承天所上唯月有頻數比月法乖異請宜仍舊詔可大明祖沖之表上新歷宋孝武帝下之有司使內外博議時人少解歷數竟無異同之辨唯太子旅賁中郎將戴法興立議六條其改立章法一議其歲日度嵗差一議其歷元甲子一議其七曜同元一議其改移辰次一議其遲疾隂陽異率一議沖之隨辨析之各有條理時法興方有權寵議者皆附之唯中書舍人巢尚之是沖之之術天保北齊用宋景業天保歷至後主時董峻鄭元偉皆立議非之遂上甲寅元歷又有廣平人劉孝孫張孟賔名為歷術趙通嚴又更盈縮爭論未定遂國亡張賔歷賔歷既行劉孝孫劉焯並稱其失凡六條遂上孝孫歷法時賔有寵劉暉附會之共短孝孫等斥罷之後賔死孝孫訟其事帝令與賔歷參校張胃元歷張胄元亦短賔歷異論鋒起久之不定帝令參考日食事楊素等奏賔歷無驗胄元孝孫所尅皆中帝於是引見孝孫等勞徠之孝孫請先斬劉暉乃可定歷帝不懌而罷皇極歷及孝孫卒楊素牛𢎞復薦胄元帝召見因言日長景短之事帝大恱令定新術劉焯聞胄元進用又增損孝孫歷法更名七曜新術以奏之袁充與胄元害之焯又罷至開皇十七年胄元歷成劉暉與國子助教王頗等執舊術與司歷劉宜援據古史駁難胄元言合朔晷影月見虧蝕等事胄元不能盡下迭相駁雜不決會通事舍人顔敏楚上書云漢改太初言後八百年當有聖人改之今七百餘年胄元其是矣帝遂廢退劉曄等而施用胄元歷開皇二十年帝命皇太子召歷算之士集東宫議歷事劉焯復增修其書名曰皇極歷太子嘉之未獲考驗以官不滿意稱疾歸至仁壽四年焯言胄元之失於皇太子以為胄元之歷實竊焯歷前本遂紏駁其失凡五百三十六條胄元復難劉焯以為既定朔不應復有歲月平率若值三小猶減三五為十四值三大猶增三五為十六皆非三五之正互難不決焯又罷歸煬帝大業四年太史奏日食無效帝召焯欲行其歷袁充方幸於帝左右胄元共排焯歷又會焯死歷竟不行戊寅元唐髙祖既用戊寅元歷至太宗貞觀初李淳風疏論十八事詔崔善為課之其七條改從淳風麟德貞觀十四年太宗將親祀南郊戊寅元歷以十月癸亥朔甲子冬至而李淳風新術以甲子合朔冬至國子祭酒孔頴逹等議請從淳風十八年淳風又上言仁均歷有三大二小云日月之蝕必在朔望十九年九月後四朔頻大詔集諸解歷者詳之不能定庚子詔用仁均平朔大衍一行作大衍歷善算瞿曇羅撰者怨不得與改歷事開元二十一年與陳元景奏大衍寫九執歷其術未盡南宫説亦非之詔侍御史李麟等較靈臺候簿大衍十得七八九執才一二乃罪説等而是否決傳會太初本於律三統説易春秋四分之元在圖讖通歷以上元為開闢之始天保用圖讖三十五數大衍依於易假歷天保因北齊文宣受禪遂假托圖讖以為握圖元命包言齊受祿之期當魏終之紀得乘三十五以起數張賔歷隋文帝作輔於周張賔揣知其欲受禪之意欲得進用而主此歷張胄元歷表之言日行上道書長晷短張胃元依附之戊寅元歷因唐髙祖以戊寅年授禪遂以戊寅為元乙巳元歷因唐中宗以乙巳年及位遂以乙巳為元閏餘類閏易曰歸竒於扐以象閏五嵗再閏故再扐而後挂西漢志曰黃帝考定星歷正閏餘自三苗亂德重黎之官廢而閏餘乖次堯命羲和以閏月定四時成嵗周春官太史正嵗年以序事頒告朔于邦國閏月詔王居門終月注云閏所以正中朔也中朔小大之不齊正之以閏記玉藻天子玄端閏月則闔門左扉立于其中春秋傳曰文公閏三月非禮也先王之正時也履端於始舉正於中歸餘於終履端於始序則不愆舉正於中民則不惑歸餘於終事則不悖此聖王之重閏也杜元凱釋例自文公十一年三月甲子至襄公二十七年凡七十一年當有二十六閏而長歷推得二十四閏是再失閏襄公哀公事見歷序襄公二十八年書春無氷説者謂去年覺其失於是頓置兩閏以應天正去年謂二十七年見前建子之月無氷乃書以記災一嵗兩閏果是其理乎哀公十二年冬十二月螽季孫問仲尼曰聞之火伏而後蟄者畢心星也火伏在今十月今火猶西流司歷過也注云失閏自秦用顓帝歷以十月為嵗首常以九月為閏自以為得歸餘於終之説而不知其非也漢興因之久而不革至武帝元封中乃悟其謬更造太初歷校中朔所差以正閏分傳曰閏以正時時以作事事以厚生生民之道於是乎在則閏可不重乎又曰歷數以閏正天地之中西漢晉志杜預曰閏月無中而北斗斜指兩辰之間所以異於他月算閏法竊求之二十八宿循天而左行一日一夜一周天周天之外更行一度計一年三百六十五度四分度之一也日一日行一度則是一嵗一周天也月一日行十三度十九分度之七凡二十七日而周天一匝更行十九度半餘逐於日與之會以所次之辰故傳曰日月相會謂之辰周天之度各分為九百分則嵗之變凡有三十三萬一千七百分一日九百分一年而餘小盡六日得五千四百分又計五百四分度之四凡有四千七百分并之而為一萬一千七百分以當十一日半弱兩嵗則餘二萬三千四百分以當二十二日半小弱前劇一百分跨一日故曰弱此添剩四百分故曰小弱三嵗則餘二萬四千六百分以當三十四日小強凡四百五十分為判此六百政日小強所以歷家於三年置一閏用以歸受此三年之餘分也然三年一閏故用二十九日約周天之餘度二萬六千一百分耳尚更剩前二年中八千五百分通後第四年所餘一萬一千七百分而二萬零二百分以當二十三日半小弱餘四萬分故曰小弱及五年則三萬一千九百分以當二十四日半強改五嵗再閏也此三十四日猶有餘分又積歸後年置閏若前年且閏之月大餘則後閏大餘分也姚説同禮者曰周天三百六十五度四分度之一而一嵗凡十二月除月之小者而計其餘積三十二月而適得一月之數故三年而一閏五年而再閏八年而三閏十年而四閏十三年而五閏十六年而六閏十九年而七閏大衍歸竒以象閏説大衍之數五十説曰天一地二合而為五位每位各衍為十故曰大衍其用四十有九説曰虛其一以象太極分而為二以象兩説曰兩者天地也挂一以象三説曰挂者以著歸小指間三者人也人與天地為三揲之以四以象四時説曰揲者數也四時春夏秋冬也歸竒於扐以象閏五嵗再閏故再扐而後挂説曰竒者四揲之餘也或一或二或三或四扐指間也先揲左以其竒歸於中指無名指之間一扐也次揲右以其竒歸于中指食指間再扐也五嵗再閏者一變之中自有五節挂焉為一節揲左為二節歸左之竒於扐為三節後復以所餘之蓍合而為一焉第二變再分再挂再揲也不言分二不言揲四而獨言挂一者明第二變不可不挂也古注係辭皆韓康伯注惟此章之注其首云王弼曰日用時當記王弼曰演天地之數所賴者五十也其用四十有九則其一不用也不用而用以之通非數而數以之成則易之太極也四十有九數之極也夫無不可以無明必因於有故常於有物之極而必明其所由之宗也竒説於四揲之餘不足復揲也分而為二既揲之餘合挂於一故曰再扐而後挂凡閏者十九年七閏為一章五嵗再閏者二故略舉其凡也易曰大衍之數五十其用四十有九歸竒於扐以象閏五嵗再閏故再扐而後挂前志曰元始有象一也春秋二也三統三也四時四也合而為十成五體以五乘十大衍之數也而道據其一其餘四十九所當用也故蓍以為數曰象兩兩之又以象三三之又以象四四之又歸竒象閏十九嵗有陶分滿十九則為閏也及所據一加之因以再扐兩之是為月法之實如日法得一則一月之日數也而三辰之會交矣至五位乘會數而朔旦冬至是為章月四分月法為周至是乘月法以其一乘章月是為中法參分閏法為周至官乘月法減中法而約之則六扐之數為一月之閏其餘七分此中朔相求之法也閏惟正時尚書正義周天三百六十五度四分度之一而日行一度則一期三百五十五日四分度之一六歷諸緯與周髀皆云日行一度月行十三度十九分度之七為每月二十九日過半日之於法分為日九百四十分日之四百九十九即月有二十九日半強為十二月六大之外有月分三百四十八是除小月無六月又大嵗三百六十六日小嵗三百五十五日則一嵗所餘無十二日全之十三日者當以大率據釐而計之其實一嵗所餘止十一日弱也以為十九年七閏十九年二十一月則三百九日其七月四九二分猶二百七日况無四大乎為每年十一日弱分明矣所以弱者以四分日之一於九百四十分則二分為二百三十五分少於小月餘分三百四十八以二百三十五減三百四十八不盡一百一十三是四分日之一餘矣皆以五日為率其小月雖無嵗日殘分所減猶餘一百一十三則實餘尚無六日就六日抽一月為九百四十分減其一百一十三分不盡八百二十七分以不抽者五日并三百六十日外之五日為一百其餘九百四十分日之八百二十七為每嵗之實餘今十九年二十日得整日一百九十又以十九乘八百二十七分得一萬五千一百一十三以日法九百四十除之得十六日以并一百九十日為二百六十日不盡六百七十三分為日餘今為閏月得七每月二十九日七日為二百三日又每四百九十九分以七乘之得三千四百九十三以日法九百四十分除之得三日以二百三日亦為二百六日不盡亦六百七十三為日餘亦相當矣所以無閏時不定嵗不成若以閏無三年差一月則以正月為二月每月皆差九年差三月即以春為夏若十七年差六月即四時相反時何由定嵗何由成乎至朔同日説按太初歷元自十一月夜半甲子朔旦冬至以牽牛之星居於子為日月初躔之紀積而至於七閏是為一章自一章既至却與紀之之初復以十一月朔旦冬至是謂至朔同日然其分刻又不能無差故但云至朔同日謂之章是以班固作歷志述孝武造漢太初歷晦朔弦望皆密且以日月如合璧五星如連珠為淵蓋亦其紀元章會無差故也積餘分置閏説按堯典期三百有六旬有六日以閏月定四時成嵗蓋以周天之度推之此特人事參考上天故以二十八宿分其度及星辰次舍循環一位乃知上天之度有三百六十五度外只四分度之一只此四分度之一有差乃一嵗尅出六日為剩又一嵗抽出六月小故得六日揍尅出六日遂一嵗合得十二日積三年已得三十六日即置一閏又積至二年後得二十四日揍前閏所剩六日又得三十日足於是再閏所謂三年一閏五年再閏職此之由也閏既成則春夏秋冬四時從而定矣故曰閏以定四時成嵗閏月斗指兩辰間説閏月斗指兩辰間古今之所常驗大槩以閏月無中氣亦非常月所可比而斗之居中央臨四方分隂陽建四時均五行移節度定諸紀在遷固等史必云皆係於斗者的以斗之所指未嘗有差故也是以月令取昏旦之中星以王弼文必以月建之辰為取信者不無謂也失閏左傳文元年閏三月非禮也先王之正時也履端於始序則不愆舉正於中民則不惑歸餘於終事則不悖文六年閏月不告朔猶朝於廟傳曰閏月不告朔非禮也閏以正時時以作事事以厚生生民之道於是乎在不告閏朔是棄時政也何以為民杜預注云四時漸差前置閏以正之榖梁傳云閏者附月之餘分也積分而成於月襄二十七年十一月乙亥朔日有食之辰在申司歷過也再失閏矣襄二十八年春無氷杜預注曰前年知其再失閏頓置兩閏以應天正此年正月建子得以無氷為災哀十二年冬十二月螽杜預注曰周十二月今十月是嵗置閏而失不置雖書十二月實今之季月司歷誤一月九月之初尚溫故得有螽傳季孫問諸仲尼仲尼曰丘聞之火伏而後蟄者畢火猶西流司歷過也杜預曰火心星也火伏在辰今十月猶西流言未盡沒詔王居門説禮記外傳云明堂古天子布政之宫在國南十里之內七里之外南方陽明之地故謂之明堂太廟青陽三者之制同也即周制唐虞時為五府府聚也合五帝之神而祭之夏謂太廟為世室言世世不毁商人謂路寢為重屋周人謂五府為明堂為其形制同故再舉其名夏氏一堂之上為五室木室在東北火室在東南金室在西南水室在西北土室在中南陛三階三靣九一五室者象天地裁五行生於四時故每室有四逹四窗相對一室有八窗象八節夾室之窗周人上有圓屋即太廟之宣室今以月令言之則十二室依十二辰以應其月之令四隅有八室各以左右個言之個者隅也各自室不相通也今之東西廟亦以個名中央正靣各當四神之月正子正邜正午正酉也通謂之廟東則青陽太廟西則總章太廟南則明堂太廟北則玄堂太廟每室各有垣夏后氏卑其宫室階崇一尺制則九尺矣室中之廣夏時度以步步廣八尺三代不同尺有長短也商人度以尋尋亦八尺周人度以几几即三尺堂上度以筵筵即八尺四靣各五門三代制不同此以古尺度之此閏月詔王居門即玉藻云每月就其時之堂而聽朔焉若閏月則闔門左扉而聽朔於明堂門中還處路寢門終月是也周官太史注亦謂門路寢門也鄭司農云月令分十二月在青陽明堂總章玄堂左右之位惟閏月無所居居于門故於文王在門為閏外傳又云天子五門自外入內第一曰皋門其二庫門其中雉門其四應門極內則路門又云路門即路寢之門然閏月必取寢門為言者蓋閏月聽朔則亦明堂門中還處則路寢終月故也周禮圖云閏非四時之正而四時不得則不正太史必於閏月詔王居門蓋嵗月日時固有常矣而置閏則無常無常者變也有常者待是而後成王於是乎居門以門者一闔一闢而無常利用出入有常者待是而後成也蓋有常以為利無常以為用者天道之自然王之所為凡所以承天而已法於四時春則青陽夏則明堂秋則總章冬則玄堂其居固有常矣而閏月居門凡以明此而已時令類時令堯典曰分命羲仲宅暘谷平秩東作以正仲春申命羲叔宅南交平秩南訛以殷仲夏分命和仲宅西昧谷平秩西成以正仲秋申命和叔宅朔方平在朔易以正仲冬夏至仲康羲和廢時亂日胤后征之曰先王克謹天戒每嵗孟春遒人以木鐸徇于路惟時羲和俶擾天紀乃季秋月朔辰弗集于房昏迷天象以干先王之誅政典曰先時者殺無赦不及時者殺無赦夏小正按禮記曰我欲觀商道吾得夏時焉鄭康成記曰夏四時之書也其書存者有小正大戴禮有夏小正一篇蓋戴德取以為正隋志云夏小正一卷戴德撰詳矣宋朝紹興初傳嵩卿見閔澮所藏戴禮别定一篇列正文於其前而以戴氏傳附之中興館閣書目吕氏春秋秦吕不韋所作一曰孟春紀其别有四曰本生始生者天地飬而攖之謂天子曰重已有五星而反害之者不逹乎性曰貴公聖王治必先公曰去私無私也其二曰仲春紀其别有四曰貴生耳目口鼻生之役也害於生則止曰情欲天生人有欲聖人修性以止曰染絲墨子見素絲而嘆也曰功名由其道功名致其三曰季春紀其别有四以下皆有四曰盡數聖人察隂陽之宜辨萬物之利以便生精神安而年夀曰先已事之本先治身曰論人太上反諸己其次求諸人曰圜道天貟地方聖人以立上下其四孟夏紀曰勸學曰尊師紀十聖神農黃帝顓帝嚳堯舜禹湯文武也六賢齊桓晉文秦穆楚莊吳王闔閭越王勾踐未有不尊師者也曰誣徒逹教之師使弟子得之曰用衆假人之長以補其短其五曰仲夏紀曰大樂音生於度量本於太一曰侈樂亂世之樂曰適音樂在和心在適曰古樂敘自朱襄以來炎帝别號也其臣士逹於五弦瑟以來隂氣葛天氏之樂三人摻斗尾投足以歌八闋戴氏元鳥逐草木奮五殳敘天常逹帝功依地德總萬物之極樂非一世之造其六曰季夏紀曰音律敘十二律之相生三分益一以上生三分去一以下生曰音初夏后氏孔甲破斧之歌始為東音禹為塗山氏反歌始為西音秦穆作為秦音始為南音有娥氏二女作歌一終始為北音曰制樂觀王樂於至治曰明理帝王盡於樂也其七曰孟秋紀曰蕩兵一作用兵敘古有義兵無偃兵曰振亂世濁矣有賢主則其義兵矣曰禁塞兵茍義則攻守亦可救守亦可曰懷寵敘君子中理然後説士當人然後議其八曰仲秋紀曰論威義勝之也曰簡選兵勢兵器欲便利角材士民欲精習曰決勝兵有本義智勇曰愛士憐困窮則國士得矣其九曰季秋紀曰順民順民心故功成曰知士髙節守義者曰審已不察存亡審其所以曰精通聖人以愛民為心號令未出而天下延頸精通乎民其十曰孟冬紀曰節喪曰安死曰異寶古人知義所惡為己所喜此其寶所以異乎俗也曰異用桀紂用其材亡湯武用其材王其十一曰仲冬紀曰至忠逆耳者曰忠亷曰當務貴辨曰為論貴信曰遵理貴勇曰行義貴法曰當務曰長見智相過也其十二曰季冬紀曰士節當理不避難臨患忘利曰介立以富貴易以貧賤曰誠廣受於天者曰序意一作亷孝志以身為人重也漢宣帝時魏相采易隂陽及明堂月令奏之曰東方之神太昊乘震執規司春南方之神炎帝乘離執衡司夏西方之神少昊乘兊執矩司秋北方之神顓帝乘坎執權司冬中央之神黃帝乘坤艮執繩司下土兹五帝所司各有時也東方之卦不可以治西方南方之卦不可以治北方春興兊治則飢秋興震治則華冬興離治則曵夏興坎治則雹明王謹于尊天飬人故立羲和之官以乘四時授民事髙皇帝令群臣議天子所服何昌陵通等議春夏秋冬天子所服當法天地之數請申謁者趙堯舉春李舜舉夏倪湯舉秋貢禹舉冬四人各執一時制曰可願陛下選明經通隂陽者四人各主一時時至明言所職以和隂陽相傳東漢則太史讀四時令魏晉齊宋皆行之唐則讀時令之儀具于開元禮國家因仍未暇建明章聖皇帝祥符中嘗欲因四時首月入閣讀時令之儀而不果行之仁宗景祐中亦嘗詔儒臣講定時令一篇未幾亦罷時孫殊請詔禮官博士再定讀時令之儀選明經術通知隂陽者各主一時時至明言其職經緯集唐會要曰貞觀十四年正月命有司讀春令於太極殿長安四年崔融日讀時令自魏晉創有此禮每嵗立春立夏大暑立秋立冬常讀時令又命韋韜每月進月令一篇坐而讀之肅宗乾元中春讀春令德宗正元四孟月迎氣之日令讀時令後世時令書月令章句東漢蔡雍撰分十二月以中央附夏季之末合十三篇各以章句解之今一卷非雍全書也又唐玄宗刪定月令李林甫等注有序又李林甫有注解月令其序與刪定月令同而所序十二月専紀節候及氣令變異之應隋杜臺卿有玉燭寶典以禮記月令分冠諸篇引經傳百家之説以釋之唐韓鄂有嵗華紀麗探經史嵗時雜事述以駢儷之語韋行規有月録凡飲膳服餌種藝蓋藏之法皆附本月書之李綽有秦中嵗時記紀唐室朔望薦獻及嵗時宴賞之事一名輦下嵗時記一名咸鎬嵗時記李雍撰金谷園記採傳記小説嵗時雜事五代南唐徐諧撰嵗時廣記掇古今傳記并前賢詩文隨日以甲子編類凡時政風俗耕農飬生之事悉載國朝賈昌朝撰國朝時令初景祐中丁度等承詔約唐時令為國朝時令以備宣讀最後昌朝又參以蔡雍髙誘李林甫諸家月令之説為集解劉安靖撰時鏡新書以四時分十二月各繫其事孫屺撰備閲時令見賈昌朝所奏時令見失紹興中雖訪得之非復舊本乃以景祐歷書考日月之合疏列分度併取一二名數注字音於下以備閲時之宜焉並中興館閣書自修月令疑孔頴逹正義曰按鄭云名曰月令者以其紀十二月政之所行也本吕氏春秋十二月紀之首章也以禮家好事私合之後人因名曰禮記或云周公所作其中官名時事多不合周法此卷解者不同今且申鄭旨釋之按吕不韋集諸儒首著為十二月紀合十餘人言名吕氏春秋篇首皆有月令與此文同是一證也又周旡太尉惟秦有之况月令乃云命太尉此是官名不同周法二證也又秦以十月建亥為嵗首而月令云為來嵗受朔日即是九月為嵗終十月為受朔此是時不合周法三證也又周有六冕郊天逆氣則用大裘乘玉輅建太常日月之章而月令服飾車旗並依時色此是事不合周法四證也則月令不韋之作明矣按秦始皇十二年吕不韋死十六年并天下然後以十月首用十月時不韋已死而不韋不得以十月為正又云周書先有月令何得為不韋所造又秦并天下為郡何得云諸侯又秦以好兵毒天下何能布德施惠春不興兵既如此不同而鄭氏必謂不韋作者何也蓋不韋集諸家作為一代大典亦採擇善事遵立舊章但秦自不能依行何怪不韋所作也禮記正義明堂月令論東漢蔡雍作也謂之月令所以順隂陽本四時效氣物立王政也成法各從時月藏之明堂所以示承祖考神明明之不敢褻瀆之義故以明堂名者其篇自天地立位其象聖帝明王也世有紹襲蓋以成大業非惟一代之事也易正月之卦曰益其經曰王用享于帝者蓋孟春月令曰乃擇元日祈榖于上帝顓帝歷曰天元正月己巳朔旦立春正月俱起於天廟營室五度月令曰日在營室堯典曰乃命羲和欽若昊天歷象日月星辰敬授人時月令曰乃命太史守典司天日月星辰之行易曰不利為冦利用禦冦月令曰兵戎不起不可從我始書曰嵗二月同律度量衡中春令日夜分則同度量鈞衡石此皆合於大歷古歷唐政戴記夏小正傳曰隂陽生物之後王事之次則夏之月令也商人無文及周而備文義深逺冝周公之所著也官號職司與周官合周書七十二篇而月令第五十三則月令周書明矣秦相吕不韋著書取月令為記號淮南王安亦取以為第四篇改名曰時則故偏見之徒或云月令吕不韋作或曰淮南作皆非也蔡中郎集吕氏春秋十二紀漢儒論次其月令措諸禮為大法焉其言十有二月七十有二候迎月步氣以追寒暑之序類其物冝而逆為之備聖人之作也然而聖人之道不窮異有以為神不引天以為髙利祿人備於事而已觀月令之説茍以合五事配五行而施其政令去聖道亦逺矣凡政令有俟時而行之者有不俟時而行之者是故孟春修封疆相土宜仲春止田獵備蠶氣孟夏旡起土功季秋休百工孟冬築城郭仲冬伐木取竹箭季秋誨武習射御也固俟時而行所謂敬授人時者也其餘郊廟百祀亦古之遺典不可廢誠使古之為政者非春無以布德和令非夏無以行爵出祿非秋無以任有功誅暴慢非冬無以賞死事恤孤寡則其缺政以繁矣斯固不俟時而行之者也變天之道絶地之理亂人之紀舍孟春則可以有事乎作淫巧以蕩上心舍季春則可以為之乎又曰反時令則飄雨暴雨是特瞽師之語非出於聖人者也然則夏后周公之典逸矣柳文羣書考索卷五十五
