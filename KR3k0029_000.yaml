body:
  text: 羣書考索類書類提要臣等謹案羣書考索二百十二卷宋章如愚撰如愚字俊卿婺州金華人慶元中登進士第初授國子博士改知貴州開禧初被召疏陳時政忤韓托胄罷歸事迹具宋史儒林傳史稱所著有文集行世今已散佚惟此書獨存凡分四集前集六十六卷分六經諸子百家諸經諸史聖諱書目文章禮樂律吕厯數天文地理十三門後集六十五卷分官制學制貢舉兵制食貨財用刑法七門續集五十六卷分經籍諸史文章韓墨律厯五行禮樂封建官制兵制財用諸路君道聖賢十五門别集二十五卷分圖書經籍諸史文章律厯人臣經藝財用兵制四裔邊防十一門宋自南渡以後迂儒尊性命而薄事功文士尚議論而鮮考證如愚是編獨以考索為名言必有徵事必有據博采諸家而折衷以己意不但淹通掌故亦頗以經世為心在講學之家尚有實際惟其書卷帙浩繁又四集不作於一時不免有重復抵牾之處如前集六經門外又立諸經一門其文互相出入諸子百家門中以晏子荀子揚子文中子之類為諸子以管子商子韓非子淮南子之類為百家亦不知何以分别又如前集第三十五卷詳列六宗之說無所專從續集第十卷則主鄭康成說前集第三十卷既主二年一祫五年一禘以為宋制合古别集第十四卷又專主顔達龍三年一禘五年一祫之說前集第三十三卷專主鄭康成說祫大禘小别集第十四卷又專主顔達龍說禘大祫小前集第十三八卷既主天子五門諸侯三門别集第八卷則又謂天子六門諸侯二門皆前後抵牾疏於決擇然大致網羅繁富考據亦多所心得在宋人著述之中較通考雖體例稍雜而優于釋經較玉海雖博贍不及而詳於時政較黃氏日鈔則條目獨明較吕氏制度詳說則源流為備前人稱蘇軾詩如武庫之兵利鈍互陳如愚是編亦可以當斯目矣乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
