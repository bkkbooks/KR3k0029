body:
  text: 羣書考索卷五十二宋章如愚撰樂門律類十二律先王通於倫理以候氣之管為樂聲之均吹建子之律以子為黃鍾丑為大吕寅為太簇卯為夾鍾辰為姑洗巳為中吕午為㽔賔未為林鍾申為夷則酉為南吕戍為無射亥為應鍾陽管有六為律者謂黃鍾太簇姑洗㽔賔夷則無射此六者為陽月之管謂之律律者法也言陽氣施生各有其法又律者帥也所以帥導陽氣使之通逹隂管有六為吕者謂大吕應鍾南吕林鍾中吕夾鍾此六者隂月之管謂之吕變隂陽之聲故為十二調謂各文之以五聲播之以八音乃成為樂故有十二懸之樂焉周禮春官太師掌六律六吕以合隂陽之聲陽聲黃鍾太簇姑洗㽔賔夷則無射隂聲大吕應鍾南吕林鍾中吕夾鍾皆文以五聲宫商角徴羽播之以八音金石絲竹匏土革木謂之八音以合隂陽之聲者隂陽各有合也黃鍾子之氣十一月建焉而辰在星紀大吕丑之氣十二月建焉而辰在𤣥枵太簇寅之氣正月建焉而辰在諏訾應鍾亥之氣十月建焉而辰在析木姑洗辰之氣三月建焉而辰在大梁南吕酉之氣八月建焉而辰在夀星㽔賔午之氣五月建焉而辰在鶉首林鍾未之氣六月建焉而辰在鶉火夷則申之氣七月建焉而辰在鶉尾中吕巳之氣四月建焉而辰在實沈無射戍之氣九月建焉而辰在大火夾鍾卯之氣二月建焉而辰在降婁辰與建交錯貿處如表裏然是其合也其相生則以隂陽六體為之黃鍾初九下生林鍾之初六林鍾又上生太簇之九二太簇又下生南吕之六二南吕又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生㽔賔之九四㽔賓又上生大吕之六四大吕又下生夷則之九五夷則又上生夾鍾之六五夾鍾又上生無射之上九無射又下生中吕之上六同位者象夫妻異位者象子母所謂律娶妻而吕生子者也黃鍾長九寸其實一籥下生者三分去一上生者三分益一五上六下乃一終矣文者以調五聲使之相次如錦繡之有文章也播者揚也揚之以八音乃可得而觀矣凡為樂器以十有二律為之數度以十有二聲為之齊量數度度廣長也齊量侈弇之所容也凡和樂亦如之和樂謂周故器五聲十二律還相為宫伏羲氏作易紀隂陽之初以為律法建冬日至之聲以黃鍾為宫太簇為商姑洗為角林鍾為徴南吕為羽應鍾為變宫㽔賔為變徴此聲之元五聲之正也故各統一日其餘以運行當日者各自為宫而商徴以類從焉漢書云黃帝使伶倫自大夏之西至崑崙之隂取竹生於嶰谷其竅厚薄均者斷兩節之間而為黃鍾之管因制十二管吹以聽鳯鳴而定律吕之音用生六律六吕之制以候氣之應而立宫商之聲以應五聲之調鳯有雄雌鳴亦不等故吹陽律以候於鳯吹隂律以擬於凰故能叶和中聲候氣不爽清濁相符倫理無失五聲六律旋相為宫其用之法先以本管為均八音相生或上或下取五聲令足然後為十二律旋相為宫若黃鍾之均若大吕之均太簇之均夾鍾之均姑洗之均中吕之均㽔賔之均林鍾之均夷則之均南吕之均無射之均應鍾之均此謂迭為宫商角徴羽也若黃鍾之律自為其宫大吕之律自為其宫太簇之律自為其宫夾鍾之律自為其宫中吕之律自為其宫㽔賔之律自為其宫林鍾之律自為其宫夷則之律自為其宫南吕之律自為其宫無射之律自為其宫應鍾之律自為其宫所謂五聲六律十二管旋相為宫者也五聲十二律相生法古之神瞽考律均聲必先立黃鍾之均黃鍾之管以九寸為法故用九自乘為管絃之數管數多者則下生其數少者則上生相生增减之數皆不出於三又生取之數不出於八宫從黃鍾而起下生得八為林鍾上生太簇亦復依八而取為商其增减之法以三為度以上生者皆三分益一下生者皆三分去一宫生徴徴生商商生羽羽生角此五聲大小之次也是黃鍾為均用五聲之法以下十二辰辰各有五聲其為宫商之法亦如之故辰各有五聲合為六十聲是十二律之正聲也其十二律相生之法皆以黃鍾為始下生者三分去一上生者三分益一五下六上乃得一終黃鍾下生林鍾林鍾上生太簇太簇下生南吕南吕上生姑洗姑洗下生應鍾應鍾上生㽔賔㽔賔上生大吕大吕下生夷則夷則上生夾鍾夾鍾下生無射無射上生中吕此謂十二律長短相生一終於中吕之法又制十二鍾准為十二律之正聲也鳬氏為鍾以律計自倍半半者准半正聲之半以為十二子律制為十二子聲此正聲為倍則以正聲於子聲為倍以正聲比子聲則子聲為半但先儒釋用倍聲自有二義一義云半以十二正律為十子聲之鍾二義云從於中宫之管寸數以三分益一上生黃鍾以所得管之寸數然半之以為子聲之鍾其為半正聲之法者以黃鍾之管正聲九寸為均子聲則四寸半黃鍾下生林鍾之子聲林鍾上生太簇之子聲太簇下生南吕之子聲南吕上生姑洗之子聲姑洗下生應鍾之子聲應鍾上生㽔賔之子聲㽔賔上生大吕之子聲大吕下生夷則之子聲夷則上生夾鍾之子聲夾鍾下生無射之子聲無射上生中吕之子聲此半正聲法其半相生之法者以正中吕之管長六寸中吕上生黃鍾黃鍾下生林鍾三分去一還以下生所得林鍾之管寸數半之以為林鍾子聲之管以次而為上下相生終於中吕皆以相生所得之律寸數半之各以為子聲之律故有正聲十二子聲十二分大小有二十四以為二十四鍾通於二神迭為五聲合有六十聲即為六十律其正管長者為均之時則通用正聲為五音正管短者為均之時則通用子聲為五音亦皆三分益一减一之次還以宫商角徴羽之聲得調也歷代製造漢文帝令丞相北平侯張蒼始定律歷元帝時郎中京房知五音六十律之數上使韋𤣥成等試問房於樂府房對受學於故小黃令焦延壽六十律相生之法以上生下皆三生二以下生上皆三生四陽下生隂隂上生陽終於中吕而十二律畢矣中吕上生執始執始下生去滅上下相生終於南事六十畢矣夫十二律之變至于六十猶八卦之變至於六十四卦也魏武帝時杜䕫精識音韵為雅樂郎中令鑄銅工柴玉巧有意思形器之中多所造作亦為時人見知䕫令玉鑄鍾其聲均清濁多不如法數毁改作王甚厭之謂䕫清濁任意更相訴白於魏武魏武取所鑄鍾雜錯更試然後知䕫為精而玉之謬也明帝青龍中鑄大鍾髙堂崇諌曰夫禮樂者為治之大本也故簫韶九成鳯凰來儀雷鼓六變天神以降是以政平刑措和之至也新春發響商辛以隕大鍾既鑄周景以死存亡之機恆由此作君舉必書古之道也作而不法何以示後帝稱善焉晋張華荀朂校魏杜䕫所造鍾律其聲樂多不諧合乃出御府古今銅竹律二十五銅尺銅斛七具校减新尺短䕫尺四分因造十有二笛笛具五音以應京房之術笛體之音加各用㽔賔林鍾之角短則又倍之二笛八律而後成去四分之一而以本宫管上行度之則宫定也因宫穴以本宫徴管上行度之則徴定也各以其律展轉相因隨冗踈密所宜置之或半之或四之以調律吕正雅樂正㑹殿庭作之自謂宫商克諧然論者謂朂為暗解時阮咸善逹八音論者謂之神解咸常心譏朂新律聲髙以為髙近哀思不合中和每公㑹作樂朂自以為逺不及咸常意咸謂之不調以為異已乃出咸為始平相後有田夫耕於野得周玉尺朂以校已所理鍾石絲竹皆短校一米於此伏咸之妙復徴咸歸梁武帝天監元年下詔慱採古樂竟無所得帝既素善音律詳悉舊事遂自制立四器名之為通通受聲廣九寸宣長九尺臨嶽髙寸二分每通施三絃一曰𤣥英通應鍾絃用百四十二絲長四尺七寸四分差强黃鍾絃用二百七十絲長九尺大吕絃用二百五十二絲長八尺四寸三分差弱二曰青陽通太簇絃用二百四十絲長八尺夾鍾絃用二百二十四絲長七尺五寸弱姑洗絃用百四十二絲長七尺二寸一分强三曰朱明通中吕絃用百九十絲長六尺六寸六分弱㽔賔絃用百八十九絲長六尺三寸二分强林鍾絃用百八十絲長六尺四寸四曰白藏通夷則絃用百六十八絲長五尺六寸二分弱南吕絃用百六十絲長五尺三寸三分大强無射絃用百二十九絲長四尺九寸九分强因以通聲轉推用氣悉無差違而還相得中又制為十二笛黃鍾笛長三尺八寸大吕笛長三尺六寸太簇笛長三尺四寸夾鍾笛長三尺二寸姑洗笛長三尺一寸中吕笛長二尺九寸㽔賔笛長二尺八寸林鍾笛長二尺七寸夷則笛長二尺六寸南吕笛長二尺五寸無射笛長二尺四寸應鍾笛長二尺三寸用笛以寫通聲較古夾鍾玉律并周代古鍾並皆不差於是被以八音施以七聲莫不和韵陳山陽太守毛爽習京房候氣術陳亡祖孝孫學之於爽周嵗之日日異於律冬至之日以黃鍾為宫林鍾為徴太簇為商南吕為羽姑洗為角應鍾為變宫㽔賔為變徴隨月異宫匝嵗而復後魏孝明帝神龜元年有陳仲儒者自江南歸魏頗聞樂事請依前漢京房立准以調八音有司問仲儒言前被符問京房准定六十律之後雖有器存曉之者鮮至後漢嘉平末張光等猶不能定絃之急緩聲之清濁仲儒授自何師出何典籍而云能曉答曰仲儒在江左之日頗愛琴又常覽司馬彪所撰續漢書見京房准術成數昭然而張光等不能定仲儒不量庸昧竊有意焉遂竭愚思鏡研甚久雖未能測其機妙至於聲韵頗有所得度量衡歷自出黃鍾雖造管察氣經史備存但氣有盈虗黍有巨細差之毫釐失之千里自非管應時候聲驗吉凶則是非之源諒亦難定此則非仲儒淺識所敢聞之至於准者本於代律取其分數調校樂器則宫商易辨若尺寸小長則六十宫商相與微濁若分數如短則六十徴羽類皆小清至於清濁相宣諧㑹歌管皆得應合雖積黍驗氣取聲之本清濁諧㑹亦須有方若間准意則辨五聲清濁之韵若善琴術則知五調調首之體參此二途以均樂器則自然應和不相奪倫如不練此必至乖謬按後漢順帝陽嘉二年冬十月行禮辟雍奏應鍾始復黃鍾作樂器隨月律是謂十二之律必須次第為宫而商角徴羽以類從之尋調聲之體宫商宜濁徴羽用清若依公孫崇止以十二律聲而云還相為宫清濁悉足非唯未練五調調器之法至於五聲次第自是不足何者黃鍾為聲氣之元其管最長故以黃鍾為宫太簇為商林鍾為徴則其任相順若均之八音猶須錯揉衆聲配成其美若以應鍾為宫大吕為商㽔賔為徴則徴濁而宫清雖有其韵不成音曲若以夷則十二律中唯得取中吕為徴其商角羽並無其韵若以中吕為宫則十二律內全無所取何者中吕為十二之窮變律之謂依京房書中吕為宫乃以去滅為商執始為徴然後方韵而崇乃以中吕為宫猶用林鍾為商黃鍾為徴何由可諧仲儒以為調和樂器文飾五聲非准不妙若如嚴嵩父子心賞清濁是則為難若依案見尺作准調絃緩急清濁可以意推耳但音聲精微史傳簡略舊志唯云准形如瑟十三絃隱間九尺以應黃鍾九寸調中一絃令與黃鍾相得按畫以求其聲遂不辨准須柱以辨柱有髙下絃有粗細餘十二絃復應若為致令覺者迎前拱手又按房准九尺之內若十七萬七千一百四十七分一尺之內為萬九千六百八十三分又復十之是為於准一寸之內亦為萬九千六百八十三分然則於准一分之內乘為二千分又為小分以辨強弱中間至促雖離朱之明猶不能窮而分之雖然仲儒私曽考驗但前却中柱使入常准尺分之內相生之韵已自應合然分數既微器宜精妙其准平靣直須如停水其中絃一柱高下須與二頭臨嶽一等移柱上下之時不使離絃不得舉絃又中絃粗細須與琴宫相類中絃須施軫如琴以軫調聲令與黃鍾一管相合中絃下依數出六十律清濁之節其餘十二絃須施柱如筝又凡絃皆須素張使臨時不動即於中絃按畫一周之聲度著十二絃上然後依相生之法以次運行取十二律之商徴既定又依琴五調調聲法以均樂器其調以宫為主清調商為主平調以角為主然後錯採衆聲以文飾之如錦繡自上代以來消息調准之方並史文所略出仲儒愚思若事有乖此聲則不和平仲儒尋之分數精微如彼定絃急緩艱難若此而張光等視掌上不知藏中有准既未識其器又安能施絃也且燧人不師資而習火延壽不束修以變律故云知之者欲教而無從心逹者體之而無師茍有毫釐所得皆關心抱豈必要經師授然後尋竒哉但仲儒自省庸淺才非贍足正可粗識音韵才言其理致耳時尚書蕭寶寅又奏金石律吕制度調均自古以來鮮或通曉仲儒雖粗述而學不師授云出己心又言舊器不任必須更造然後克諧上違用舊之旨輕欲製造臣竊思量不合依許詔曰禮樂之事蓋非常人能明可如所奏北齊神武霸府由曹參軍信都芳世號知音能以管候氣仰觀雲色常與人對語則指天曰孟春之氣至矣人往驗管而飛灰已應每月所候言皆無爽又為輪扇二十四埋地中以測二十四氣每一氣感則一扇自動他扇並住與管灰相應若合符契焉隋文帝開皇二年詔求知音之士參定音樂沛國公鄭譯云考尋樂府鍾石律吕皆有宫商角徴羽變宫變徴之名七聲之內三聲乖應每常求訪終莫能通初周武帝時有龜兹人曰蘇祗婆從突厥皇后入國善胡琵琶聽其所奏一均之中間有七聲因而問之答云父在西域稱為知音代相傳習調有七種以其七調勘校七聲冥若合符一曰婆陀力華言平聲即宫聲也二曰鶚識華言長聲即南吕聲也三曰沙識華言質直聲即角聲也四曰沙侯加濫華言應聲即變徴聲也五曰沙臘華言應聲即徴聲也六曰般贍華言五聲即羽聲也七曰侯利建華言斛牛聲即變宫聲也譯因習而彈之始得七聲之正然其就此七調又有五且之名且作七調以華言譯之且者則謂之均也其聲亦應黃鍾太簇南吕姑洗五均以外七律更無調聲遂因其所捻琵琶絃柱相飲為均推演其聲更立七均合成十二以應十二律律有七音音立一調故成七調十二律合八十四旋轉相交盡皆和合仍以其聲考校太樂所奏林鍾之宫應用林鍾為宫乃用黃鍾為宫應用南吕為商乃用太簇為商應用應鍾為角乃取姑洗為角故林鍾一宫七聲三聲並戾其十一宫七十七音例皆乖越莫有通者又以編懸有八因作八音之樂七聲之外更立一聲請之應聲譯因作書二十餘篇明其㫖趣至是譯以其書宣示朝廷并立議正之有萬寶常者妙逹鍾律遍解六音常與人方食論及聲調時無樂器因取前食器及雜物以箸扣之品其髙下宫商畢偹合於絲竹文帝後召見問鄭譯所定音樂可否對曰此亡國之音豈陛下之所冝聞遂極言樂聲哀怨淫放非雅正之音請以水尺為律以調樂器上遂從之遂造諸樂器其聲率下於譯調二律并撰六樂譜十四卷論八音旋相為宫之法改絲移柱之變為八十四調百四十四律變化終於十八聲時人以周禮有旋宫之義自漢魏以來知音者皆不能通見寶常時創其事皆哂之至是試令為之應手成曲無所凝滯見者莫不嗟嘆於是損益樂器不可勝紀其聲雅淡不為時所好太常善聲者多排毁之又太子洗馬蘇䕫駁譯曰韓詩外傳所載樂聲感人及月令所載五音其中並皆有五不言變宫變徴又左氏所云七音六律以奉五聲准此而言每宫應立五調不聞更加變宫變徴二調為七調七調之作所出未詳譯答曰周有七音之律漢書律歷志天地人及四時謂之七始黃鍾為天始林鍾為地始太簇為人始是為三始姑洗為春㽔賔為夏南吕為秋應鍾為冬是為四時四時三始是以為七令若不以二變為調曲則是冬夏告闕四時不備是故每宫須立一調於是衆從譯議譯又與䕫俱云按今樂府黃鍾乃以林鍾為調首失君臣之義清樂黃鍾宫以小宫變徴互為相生之道令請推黃鍾宫為調首清樂去小宫還用㽔賔為變徴衆皆從之䕫又與譯議欲纍黍立分正定律吕時以音律久不通譯䕫等一朝能為之以為樂聲可定而何妥舊以學問推為儒首帝素不悅學不知樂妥又恥已宿儒不逮譯等欲沮壞其事乃立議非十二律旋相為宫曰經文雖道旋相為宫恐是直言其理亦不過隨月用調是以古來不取若休艱元及司馬彪須用六十律方得和韵今唯取黃鍾之正宫兼得七始之妙義非止金石諧韵亦乃簨簴不繁可以享百神可以合萬舞矣而又非其七調之義曰近代書記所載縵樂鼓琴吹笛之人多云三調之聲其來久矣請存三調而已時牛𢎞揔知樂事不能精䆒音律寶常又修洛陽舊典言幼學音律師於祖孝徴知其上代修調古樂周之壁翣殷之崇牙懸八用七盡依周禮備矣所謂正聲又近前漢之樂不可廢也是時競為異議各立朋黨是非之理紛然淆亂或欲各令修造待成擇其善者而從之妥恐樂成善惡易見乃請張樂試之遂先說曰黃鍾者以象人君之德及奏黃鍾之詞帝曰洋洋和雅甚與我㑹妥因陳用黃鍾一宫不假餘律帝大恱班賜妥等修樂者自是譯等議寢帝又遣毛爽及蔡子先子普明等以候節氣依古於三重密屋之內以木為按十有二具每取律吕之管隨十二辰置于按上而以土埋之上平於地中實葭莩之灰以輕緹素覆律口每地氣至與律冥符則灰飛衝素散出于外而氣應有旦晚灰飛有多少或初入月其氣即應或至中下旬間氣始應者或灰飛出三五夜而盡或終一月才飛少許者帝異之問牛𢎞𢎞對曰灰飛半出為和氣灰全出為猛氣吹灰不能出為衰氣和氣應者其政平猛氣應者其臣縱衰氣應者其君暴帝駮之曰臣縱君暴其政不平非月别而有異也今十二月律於一歲內應不同安得暴君縱臣若斯之甚也𢎞不能對初萬寶常聽太常所奏樂泫然而泣人問其故對曰樂淫厲而哀天下不久相殺當時四海全盛聞其言皆謂不然大業末其言卒驗而寶常貧困無人贍遺饑餒將死取其所著書焚之曰何用此為見者於火中採得數卷見行於世開皇初有盧賁蕭吉並撰著樂書皆為當時所用至於天機去寶常逺矣又有安馬駒曹妙逹王長通郭金等能造曲為一時之妙多習鄭聲而寶常所為皆歸於雅正雖公議不服然皆謂以為神煬帝時幸江都有樂人王令言妙逹音律令言之子常從於户外彈胡琵琶作翻安公子曲令言時卧室中聞之大驚蹶然而起變色急呼其子曰此曲興自早晚對曰頃來有之令言歔欷流涕謂其子曰汝慎無從行帝必不返此曲宫聲往而不返宫君也吾所以知之帝竟被弒於江都大唐髙祖受禪軍國多務未遑改創樂府尚用隋氏舊文至武德九年正月始命太常少卿祖孝孫者正雅樂至貞觀二年六月樂成奏之初孝孫以梁陳舊業雜用吳楚之音周齊舊樂多涉胡戎之伎於是斟酌南北考以古音而作大唐雅樂以十二律各順其月旋相為宫按禮記云大樂與天地同和治世之音安以樂其政和故製十二和之樂合三十二曲八十有四調祭圎丘以黃鍾為宫祭方澤以林鍾為宫宗廟以太簇為宫五郊朝賀享宴則隨月用律為宫凡祭天神奏元和之樂地祗奏順和宗廟奏永和天地宗廟登歌俱奏肅和皇帝臨軒奏太和王公出入奏舒和皇帝食舉及飲酒奏休和皇帝受朝奏正和皇太子軒懸出入奏承和元日冬至皇帝禮㑹登歌奏昭和郊廟爼入奏雍和皇帝祭享酌酒讀祝文及飲福酒受胙奏壽和五郊迎氣各以月律而奏其音又郊廟祭享奏化康凱安之舞貞觀初張文收善音律常覽蕭吉樂譜以為未甚詳悉乃取歷代㳂革截竹為十二律吹之備盡旋宫之義太宗召文收於太常令與少卿祖孝孫參定雅樂太樂有古鍾十二近代唯用其七餘有五鍾俗號啞鍾莫能通者文收吹律調之聲皆響徹時人咸服其妙尋授叶律郎及孝孫卒文收復採三禮更加釐革依周禮祭昊天上帝以圜鍾為宫黃鍾為角太簇為徴姑洗為羽奏元和之舞若封泰山同用此樂祭地祗方丘以函鍾為宫太簇為角姑洗為徴南吕為羽奏順和之舞禪梁父同用此樂禘祫宗廟以黃鍾為宫大吕為角太簇為徴應鍾為羽奏永和之舞五郊日月星辰及類上帝黃鍾為宫奏元和之曲大蠟大報以黃鍾太簇姑洗㽔賔夷則無射等調奏元和順和永和之舞明堂雩以黃鍾為宫奏元和之曲神州社稷籍田冝以太簇為宫雨師以姑洗為宫山川以㽔賔為宫並奏順和之曲臨軒出入奏舒和之樂並以姑洗為宫享先妣以夷則為宫奏永和之曲大享宴㑹奏姑洗㽔賔二調皇帝食畢以月律為宫並奏休和之曲皇帝郊廟出入奏太和之曲臨軒出入奏舒和之樂皇帝大射奏騶虞之曲並以姑洗為宫皇太子奏狸首之曲皇太子軒懸以姑洗為宫奏永和之曲凡奏黃鍾歌大吕奏太簇歌應鍾奏姑洗歌南吕奏㽔賔歌林鍾奏夷則歌中吕奏無射歌夾鍾凡黃鍾蕤賔為宫其樂九變大吕林鍾為宫其樂八變太簇夷則為宫其樂七變夾鍾南吕為宫其樂六變姑洗無射為宫其樂五變中吕應鍾為宫其樂四變天子十二終上公九終侯伯七終子男五卿六大夫四士三然後樂教大備前上元三年十一月勑新造上元之舞先令大祠享皆陳設自今已後貟丘方澤太廟祀享然後用此舞餘祭並停乾元元年三月肅宗以太常舊鍾磬自隋以來所𫝊五聲或有差錯謂太常少卿于休烈曰古者聖人作樂以應天地之和以合隂陽之序和則人不夭札物不疵癘且金石絲竹樂之器也比親享郊廟每聽樂聲或宫商不倫或鍾磬失度可盡將鍾磬來朕當於內定太常進入上集樂工考試數日審知差錯然後令再造及磨刻二十五日一部先畢召太常樂工上臨三殿親觀考擊皆合五音送太常又於內造樂章三十一章送太常郊廟歌之羣書考索卷五十二
