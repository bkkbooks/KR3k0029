body:
  text: 羣書考索别集卷二十二宋章如愚撰夷狄門厯代御夷狄厯代待夷狄皆非上䇿夷狄荐食邉境為日久矣虞夏有山戎獯鬻之患成周有昆夷玁狁之難趙築長城以設險秦驅諸戎而出塞逮漢而下和之以親而不庭懷之以文而不至要之以盟而無信餌之以貨而無厭强臣以是發憤王者於焉赫怒至有空天下以事之奪耜耒而授干盾四海將服而中原隨弊英主所以疚心良士所以極慮故漢武震威而損費光武惜費而損威李牧知保塞而不議其久奉春約和親而不議其叛賈誼陳五餌而不議其貪晁錯論三技而不議其獷班固述懷禦而不議其强侯應討屯戍而不議其守誠哉嚴尤所謂無上䇿者也魏晉以降或結以姻婭抗之鋒鍔謀者鮮而鬬者衆偏議多而勝算少其間羈禦之制無復可從夏英公文帝王之世以伐夷狄為不得已泰漢而後以伐夷狄為當然堯舜禹湯文武之世何嘗聞治夷狄之事出車杖杜之詩以紂徳方暴戎狄乘間侵入詩序所謂以天子之命命將以守衛中國故歌采薇以遣之其後厲王無道玁狁入居焦穫之間侵鎬及方以至涇陽宣王初起奮然欲討其不服不得不然故六月出師冒急而行其詩初謂薄伐玁狁以奏膚公者是也劉向自號為儒者不能知三代之意其論陳湯之功言來歸自鎬我行永久千里之鎬猶以為逺也萬里之外其勤至矣其夸大如此自以為三代莫能及如賈誼横身要治葢後世所謂賢者皆不識三代之人意此所以内外擾擾迭為勝負如秦皇漢武無其功唐太宗雖有其功而非先王之所尚不足以為後世法也葉正則周御夷狄嚴尤以周為得中䇿劉貺以周為得上䇿周之盛時列荒服於五服之逺坐夷蠻於九門之外召公戒武王之受獒周公勸成王之詰兵叛則不勞師降則不釋備此劉貺所以稱其得上䇿也彼嚴尤屈周而居中其後人不詳也彼其意以為先王之於夷狄或臣或叛吾何事於必征哉不幸周室中微四夷交侵宣王之明命師出征亦不過驅而出諸涇原而已誠以征而有功則疲民征而無功則覆國故自古未有專征而得上䇿者有若宣王之不窮兵遠討亦僅得中䇿所以深明周家之盛脩政刑嚴武備使其為冦不能為臣不得為最上之䇿可知矣然則尤之意豈有異於貺乎宋藻史論周漢御夷狄古者太平之世以臣服夷狄為驗後世强盛之時以征伐夷狄為功古者太平之世以臣服夷狄為驗後世强盛之時以征伐夷狄為功方周人開國之初太王有狄人之患内守外禦其為常不足以自給比至成王東夷又叛然其徳化之流行四方無思不服越裳氏累數譯而來葢方其始立國之初以至於國勢既成之後其聖賢警戒脩徳銷兵馴致積漸以至責躬省已無分毫欠缺處當其天下太平乃是人主徳化已到四夷出力以抗者終是其來有限而聖人脩徳以應其誠不已故當太平之盛雖無俟乎遠夷之向化要荒之慕義然必臣服然後太平可得而驗漢之初年承戰伐死傷之後匈奴控弦於北方勁兵强弩出入無常漢人累世不得解甲自漢而言文景號為有徳之君然匈奴侵冦不常文帝徳既不足以懷之武又不足以勝之方其攘臂拊髀雖欲求勝而不可及其納幣結昏則又請和而不遂富庶之後窮兵遠討師徒死傷者無數終以不服雖漢之事比之成周用徳與用力之殊難易之辨成敗之迹已大相遼絶葉正則春秋御夷狄㑹戎為非追戎亦非春秋書公㑹戎于唐葢譏其戎不可㑹而戎之㑹也又書云追戎于濟由益譏其遇侵而無備逮去而後追也宋藻諸史論魯莊公不知禦夷狄之術臣謹案春秋魯莊公十八年夏公追戎於濟西孔子書之者葢罪莊公禦之無術而備之不素也夫人有數口之家知猛獸之為害則必高其柴柵而外施陷穽以預待之矣有百金之資知穿窬之為盜則必峻其垣牆而内固扄鐍以預防之矣此野夫鄙人非有過人之聰明尚能及此也若莊公者土地不為不廣人民不為不衆而反恬不事事侵而不知其來知其去也方追之於濟西而已其術不已踈乎此其所以得罪於春秋者也鄭範芻蕘論秦襄公於西戎義當復讎秦襄公始有秦國車馬器械未備而嵗出師以伐西戎則疑於困民力者而小戎之詩聖人取焉葢西戎於秦不共戴天之讎往者秦仲之事莊公之子世父曰戎殺我大父我非殺戎王則不敢入邑事雖不成君子義之況西戎嘗伐周實殺幽王驪山下周平王至遷都避之以其地封秦則襄公於戎固有君父之讎雖終身伐戎死於出師葢甘心焉此聖人之意也春秋之義夫子以討賊望天下之臣子而復讐之義載在禮經周公葢盡心焉武帝開西域西域不能為漢利光武絶西域匈奴亦不能為漢患漢自武帝開西域以圖匈奴光武閉玉關以謝西域喜功名之士多言開西域之功樂安靜之人亦言謝西域之利吾嘗推原其故矣言利者則曰自武帝建置四郡隔絶西域相通之道可以斷匈奴之右臂而制西域合從之患言害者亦曰自光武絶西域而海内安樂無事雖議論不一而大要不出乎二端而已矣嗟乎聴言之道亦以其事觀之耳秦漢隋唐所以不如三代者豈非以其治亂之大驗而察之乎漢自武帝開西域之後中國之力困於龜兹大宛之國多矣終武帝之世弊於匈奴曷嘗籍西域之助哉甘露黄龍之間千里賔服此亦直匈奴衰亂故適㑹其成事非西域之功也光武謝絶西域亦未見匈奴侵暴久乃南北單于自相攻擊納款稱臣謝絶之事豈遽遂無功哉永平之後既通西域而鄯善墩煌之間一治一否未見制匈奴之為漢利而開西域之為漢患也昭昭矣同上武帝御夷狄武帝窮兵文武所恃者祖宗之徳未泯人才之用為多孝武窮兵文武之主也承富庶之餘席治平之後不務脩徳而快意於匈奴其總兵者凡十有三其分出鴈門雲中酒泉者凡二十有八其遣將提軍九十有七嗚乎武帝之窮兵如此至於海内虚耗户口減半繼以聚斂𣙜酤愁嘆無聊當此之時海内騷然幾無復為漢矣武帝以能扶持宗社不至敗亡者葢以文景之徳在人未泯人才之用於兹為多故爾師古宣帝御夷狄宣帝中興不在於撥亂反正而在於兼夷狄高帝有百戰之勇而有白登之圍吕后臨朝而有嫚罵之書文帝務徳與之和親而有火通甘泉之警武帝窮天下之力暴兵連年而終不得其要領匈奴之勢日長炎炎而漢之辱甚矣宣帝本始之中一遣五將軍以擊之神爵之中又遣充國以屯田之當是時也匈奴畏威悚服奉珍朝賀入侍者不可勝數至於渭上之朝光前絶後三代以來絶無而僅有此固足以雪漢家之恥矣昔商髙宗之興有鬼方三年之伐宣王之興亦修政事以攘夷狄是二君者亦商周中興之君也而史臣以宣帝比之其以此歟愚故曰宣帝之中興不在於撥亂反正而在於兼夷狄也唐子西漢宣帝非專於兼夷狄强其在我而彼不得不弱漢武好大喜功勤兵於逺聽張騫王恢之誕計任衛青霍去病以深入蘇武㡬不得脫李陵終不免久而邊儲告乏府庫屢空則任用聚歛之臣繼行慘酷之政外将無功而内將自潰民不堪命者有年矣賴宣帝興自民間知天下之疾苦信用知時務之霍光繼以遵祖宗之故事魏相又承之以長厚之丙吉於是革苛政為愷悌易暴亂為昇平文學法理之士莫不各精其能夫然後聲教洋溢而四海畏威非孝宣専於兼夷狄也强其在我而彼不得不弱故也同上漢自宣帝以前匈奴盛强而漢以治自宣帝以後匈奴衰弱而漢以亂漢自宣帝以前匈奴盛强而漢以治自宣帝以後匈奴衰弱而漢以亂觀宣帝以前太史之所書曰某年匈奴入雲中某年匈奴入上郡某年匈奴入朔方誠艱難多事之時也觀宣帝以後太史之所書曰某年郅質支單于祠郊廟某年呼韓邪單于来朝改元某年單于来朝赦天下誠太平無事之時也有艱難多事之形而天下反治有太平無事之形而天下反亂獨何歟多事則懼而修政無事則怠而佚豫此治亂之所以分也吾甞謂漢祚之亡不在於元帝而在於宣帝不生於王莽之强而生於渭橋之弱焉彼匈奴自髙帝以来桀驁不賔非祖宗之治常若宣帝也特其勢自强耳及宣帝之世欵塞来王非宣帝之治過其祖宗也特其勢自强耳初無一毫預於中國而宣帝乃以為功光祖宗張皇其事以震耀于後世元成以下習熟見聞遂以為祖宗之所患者獨匈奴今匈奴既服則天下無復多事矣遂盤樂怠傲以至于亡豈非宣帝有以啓之耶吕東莱夷狄之强弱無闗於漢家之盛衰漢自宣帝以前夷狄之患無日無之今年入雲中明年入上郡而漢日以大治及至中世而後来朝告廟而漢治日以不振夫以强無損於漢之治弱無救於漢之衰盖盛衰之勢在漢而不在匈奴也明矣寧邊對廷晉宋御夷狄晉宋無一定之謀䇿妄挑强胡我朝無先立之規模常墮窮計謝元淝水之役桓温㶚上之師宋武帝入燕平秦之捷皆大機會唯其當時為國者靳靳自保初無長䇿逺算故旋勝輙敗隨得隨失若宋文帝元嘉中屢甞北伐既得河南未㡬而魏取之最後二十七年輕信王元謨之言大舉伐魏先是童謡有云敵馬飲江水佛貍死邜年是時魏太武南下南方議者皆謂是又符堅之舉也无何元謨退敗魏師直至𤓰步所過無不殘滅宋之君臣搏手無策縁江置戍魏人凡破南兖徐梁豫青冀六州而國以大困則皆其無一定之策横挑强魏之所至也今北敵之强比曩時之魏伯仲爾其一定之計盖以和為戰以戰為和是術也而吾之所以待之者反不先立其在我而乃蹈其術中可乎萬石上兵事秦隋御夷狄秦之亂在於匈奴隋之亂在於高麗髙麗事本微賤不足論然隋唐之所以興亡節目闗繫却在此自秦漢以来中國所甚患者不過匈奴當始皇時天下新統一常得祕記於是空國以事不復計較國内虛實與民之安危盡力匈奴内又為奢侈苛刻以揺動之陳勝呉廣因以為亂漢武帝亦縁累世為匈奴所侵中國不得志故欲乗其富强併力除治而天下困弊㡬至大亂秦皇漢武甘心快意其過失固不待論然要是相為權衡因循以至亂亡尚有可言者若髙麗則東海一隅之小夷本未甞為中國之難及隋文帝新合天下為一其時匈奴故地突厥得之已自稽首承順隋煬帝巡遊親至突厥帳啓民奉事甚恭執事甚謹據此事勢雖秦皇漢武亦無所發其怒偶因髙麗之使在啓民所然而煬帝亦何甞知髙麗正欲置於度外耳縁裴矩一言遂成此禍裴矩亦無他言但要見天下大勢已合亦欲髙麗效朝貢見其得意而不知大亂之端乃發於此自此天下騷動煬帝親屈萬乗至其國都大合天下之力以較一城之勝負推理論之無有不敗雖以黄帝之兵無能爲也既不能克遂至再伐而天下已亂盖陳勝呉廣所以亂秦者在匈奴而楊元感所以亂隋者在髙麗葉正則漢唐御夷狄冒頓在漢乃始强之時故高祖用兵難突厥在唐正將衰之日故太宗用兵易突厥當周隋之際最為强盛方後周北齊相距爭求助於突厥突厥常持二國之輕重以得大利至隋中間天下一統始漸臣服及大業末隋政亂而西北盜起爭引突厥為助雖髙祖太宗亦不免資以為名以此突厥復强與漢匈奴無異然而冒頓正是匈奴始强之時卒能為中國患謀臣猛將皆莫敢抗突厥雖强却是將衰之勢故太宗不勞重兵不煩累戰而其國天變見於上人心叛於下乖離潰㪚不内屬中國則北附薛延陀突厥竟以此亡豈太宗之兵威便能使突厥如此亦豈李靖李勣為將便能制之如此葉正則唐太宗御夷狄太宗征伐夷狄自謂行仁義太宗豈得為仁義之師太宗不知此意反以為秦皇漢武帝窮極兵革不能致其要領而吾一旦得之遂以為功髙前世嘗謂嚴尤謂禦戎無上策今朕治安中國而四夷自服豈非上策乎又言朕用魏徴力行仁義元年水二年旱蝗民雖東西就食未嘗咨怨三年闗中大熟米斗三錢是時突厥来朝蠻夷君長皆帶刀宿衛不知此直偶然就使君臣立行仁義如何便得其效捷疾如此縁此太宗所恃以為國本者甚輕因而斥大邉境破薛延陀滅髙昌吐谷渾其他如龜兹焉耆窮塞之外邊蠻小夷稍有不從則選將用兵俘取其君長盖秦皇漢武猶是肆為無道快意用兵若太宗則直云朕行仁義其征伐皆是仁義之師仁義必世百年而後見其功豈為旦暮用兵之名耶同上太宗當以隋為鑒不當伐髙麗太宗明達見隋之所以失與已之所以得本因髙麗之故當懲艾前事絶迹息意不敢復言而羣臣諸將亦不當以此為意就使髙麗奉其土地人民請命於唐亦不可受如漢光武尚能閉玉闗謝西域何者覆車之轍深可畏也然太宗之志反以煬帝為不能克在我之時不當有此事雖偃武修文而其按劔抵掌之志已在平壤之下矣遂至晚年親為此行當時想見在庭之臣亦多不以為然者魏鄭公在時太宗猶未敢有此意故證亦不及至於房元齡以垂死之忠苦口力諫而終不可回比親到髙麗士馬頓斃衣糧頓竭威重傷損終不能克既以天下之大困扵一城之小而不能反當此之時惟言魏徴若在不使朕有是行盖雖𤣥齡之言亦不能念矣同上唐太宗伐髙麗謂不遺後世憂不知適所以為後世患太宗之伐髙麗也曰今天下大定唯遼東未賔後嗣因士馬盛强謀臣導以征討喪亂方始朕故自取之不遺後世憂也烏乎異哉夫人君之有一國譬如人之有一身其小大肥瘠各有天性如欲増大而附益之非為廡則癭矣其益不已是欲廡與癭也其所以累子孫而為後世患莫大焉反以為不憂乎太宗聰明英武自其弱嵗征伐無不如志故其即位猶喜馳馳海外狃於常態故也且以唐考之西極葱嶺東至髙麗南界真臘北極大漠其土地亦大矣然卒得以服而有之者㡬何時哉干戈未定而兩都不守萬乗播奔肅宗號為中興而大盜劇賊自擅境土近在宇下是以其心腹且不能自有而區區取髙麗以為不遺後世憂甚矣思之過而計之失也崔鷗文唐太宗一勝髙麗夸示臣下以為功髙麗既敗舉國大駭後黄城銀城皆自拔遁去數百里無復人烟帝驛書報太子仍與髙士亷等書曰朕為將如此何如斷曰太宗之伐髙麗非獨恃其四海之富兵力之强也本其少時奮扵布衣志氣英果百戰百勝以取天下治安既久不能深居髙拱猶思所以逞志扼腕踊躍喜扵用兵如馮婦搏虎不能自止非有理義以養其志中和以養其氣始扵勇敢終於勇敢而已矣記曰所貴於勇敢强有力者貴其敢行禮義也天下無事則用之於禮義天下有事則用之於戰勝用之於戰勝則無敵用之於禮義則順治太宗於天下無事不知用之於禮義而雅以戰勝為美也是故以天子之尊而較勝於逺夷一戰而克自以為功矜其智能夸示臣下其欲不亦小哉范祖禹唐太宗當髙麗之强而不能伐唐髙宗乗髙麗之弱而乃能攻太宗舉國以取髙麗猛將統率自以無前而頓兵堅城逡巡而返何則盖蘇文之雄而欲以亡國處之過矣髙宗之初蘇文入㓂則以一李勣滅之而有餘夫勣之才豈過太宗哉敵之勢敗也張文潛唐太宗屈意事戎所以甚戎之曲而盈中國之氣唐太宗如彼其才而持金帛盟解頡利可汗館帝女于外而許延陀何也當時羣臣或不能通知太宗之意夫太宗雖以武定天下然民方厭苦於兵頡利延陀未有可誅之大罪故厚之以貨賂許之以婚姻若曰戰非我所欲而寧負愧所以甚彼之曲而盈中國之氣也故卒擒頡利可汗延陀失據而死則太宗之謀不為不逺矣李清臣文唐太宗伐夷狄而矜功非可以遺後嗣江夏王道宗伐延陀破之鐵勒諸部皆請入朝車馬至浮陽回紇冬遣使入貢帝大喜詔曰云云混元以降殊未前聞又為詩序曰雪恥酧百王陳凶報千古斷之曰昔武王克商通道於九夷八蠻西旅獻獒大保作訓曰不矜細行終累大徳為山九仭虧一簣因事而戒恐其驕也太宗不得志於東夷欲收功於北荒因延陀破亡以兵臨之如疾風於振槁自以為開闢以来未之有也昔之有天下者亦可得而畧聞矣舜曰其難任人蠻夷率服又曰無怠無荒四夷来王然則欲其率服莫若難任人欲其来王莫若無怠荒柔逺能邇治内安外而殊之民嚮風慕義不以利誘不以威脇而自至矣欲附者則撫之不欲者不强致也故不勞民不費財至於後世之君或奮疾而欲殄滅之或愛恱而欲招之是二者皆非也為之者秦始皇是也山川之所限風氣之所移言語不通嗜欲不同得其地不可居得其民不可使也列為州縣是崇虛名而受實弊也且得之既以為功則失之必以為恥其失不在於己則在於子孫故有征討之勞餽餉之煩民不堪命而繼之以亡隋煬帝是也且中國地非不廣也民非不衆也曷若俱得無失修其禮樂刑政以惠養吾民使男有餘粟女有餘布兵革不試以致大平不亦帝王之盛美乎故有求於外如彼其難也無求於外如此其易也然而人君常捨所易而行所難何哉忽近而喜逺厭故而謀新不入於秦則入於隋雖不至於亡而嘗與之同事其累徳豈細哉太宗矜其功能好大無窮非所以遺後嗣安中國之道此當以為戒而不可慕也同上唐太宗自謂得上策豈得為上策自嚴尤論夷狄以為前世未嘗有上策至唐太宗能擒頡利郡縣諸戎始以嚴尤為非若太宗者所謂上策歟噫亦陋矣先王何策之可論又況從而區處之與秦漢並稱乎葉正則羣書考索别集卷二十二
