body:
  text: 羣書考索卷五宋章如愚撰六經門禮記類禮記傳授之圖禮記始末易曰有夫婦父子君臣上下禮義有所措而帝王質文有損益周人曲為之防事為之制故曰禮經三百威儀三千前藝文志禮記之作出自孔氏但正禮殘闕無復能明故范武子不識殽烝趙鞅及魯君謂儀為禮至孔子没七十二子之徒共撰所聞以為記或録舊禮之義或録變禮所由或兼記體叚或雜序得失中庸孔伋所作緇衣公孫尼子所撰月令吕不韋所修王制漢文帝時博士所録館閣書目周衰諸侯將踰法度惡其害己皆滅去其籍自孔子時已不具至秦大壊漢興魯髙堂生愽士禮十七篇訖孝宣世后蒼最明戴徳戴聖慶普皆其弟子三家立於學官禮古經者出於魯淹中里名及孔氏學七十篇文相似多三十九篇及明堂隂陽史氏記所見多天子諸侯卿大夫之制雖不能備猶瘉音愈蒼等推士禮而致於天子之説出藝文志記百三十一篇前儒林傳劉向校定得二百餘篇梁國戴德刪為八十五篇號大戴禮戴聖又刪為四十九篇是為小戴禮授漢馬融盧植考諸家同異附戴聖篇章去其繁重及其缺略而行於世鄭康成注其書唐孔頴達為正義舘閣書目至孝宣世東海后蒼傳於梁國二戴其後諸儒又加月令明堂位樂記三篇凡四十九篇即今之禮記也禮記正義初魯髙堂生傳周禮十七篇又有䘮服一篇舊别行子夏為之傳鄭康成為之注馬融王肅諸儒為訓説儀禮者乃周家行禮渉於儀度委曲之書若後世所謂儀注者是也其初盖三千餘條秦焚書漢訪求之止得此十七篇故多亡禮云舘閣書目孝文時徐生善為頌為禮官大夫瑕丘蕭奮授孟卿孟卿授后蒼后蒼以授二戴由是禮有大戴小戴之學大戴授徐良小戴授橋仁楊榮是以大戴有徐氏之學小戴有橋楊之學初漢立后蒼禮愽士宣帝世復立大小戴儒林傳大戴禮今存四十篇其篇始於二十九篇次不倫又一本止十卷三十三篇篇自第一至三十三恐是後人改正舘閣書目唐元宗時王嵓請刪去禮記舊文而益以今事張説以為禮記不刋之書去聖乆逺不可改易儀禮儀禮未知孰作或曰周公作之也孔子有學禮之言禮記有讀禮之文當是時固已有簡牘之傳矣决非秦漢間筆也其制度必出於聖人若曰周公作之則非所敢知也漢初言經則離記言記則離經今記附經附之者又誰也出於孔氏之宅壁者曰禮記河間獻王云得先秦古書者曰禮曰記夫禮者今之儀禮記者今儀禮之記特未有儀禮之名也豈漢後學者覩十七篇中有儀有禮遂合而名之與秦暴焚書禮之見於漢者猶古經五十六卷經七十篇記百三十一篇漢之君臣特不好不尚而已至宣成世大小戴劉向所録止十七篇十蓋逸其七八孰謂不好不尚之禍乃甚於秦之焚之也魯人髙堂生傳士禮十七篇與今儀禮同陸德明賈公彦皆以為今儀禮考之西漢藝文志髙堂生禮后蒼最明蒼以傳大小戴古經者出魯淹中多天子諸侯卿大夫制愈於蒼等推士禮以致天子夫如是則髙堂生所傳特士禮爾今儀禮中所謂士禮有冠婚相見䘮夕虞特牲饋食七篇他皆天子諸侯卿大夫禮必非髙堂生所傳者不知賈陸二子何據而云爾漢數六經禮樂與焉厥後樂書亡矣有儀禮在亦不取周禮古矣然聖人設官分職之書也至其所用以長以治者豈能舍儀禮禮記古矣然皆釋儀禮之義若祭義冠義婚義鄉飲酒義射義燕聘義是也豈得而先儀禮班固之論曰六經之道同歸禮樂之用為急固之言必有得於先生長者之緒餘而非臆度也鄭康成收拾大小戴及劉向别録中參以今古之文定為之注其書不純古矣漢石渠諸儒因曲臺餘論倣儀禮為之如介僎賔主儀禮特其名禮記兼述其象意今之禮記特儀禮之傳疏也儀禮注疏周禮儀禮發源是一周禮為末儀禮為本本則難明末則易曉周禮注者則有多門儀禮所注服鄭而已其為章疏則有二家黄慶李孟悊慶舉大略小經注疎漏悊舉小略大經注稍周二家之疏互有脩短時之所尚李則為先儀禮疏唐賈公彦等撰韓愈讀儀禮文王周公之法制粗在於是孔子曰吾從周謂其文章之盛也古書之存者希矣百氏雜家尚有可取况聖人之制度邪於是掇其大要竒辭奥㫖著于篇學者可觀焉惜乎吾不及其時進退揖遜于其間嗚呼盛哉昌黎文集訓詁傳授魯髙堂生傳士禮十七篇而徐生善為頌讀曰容故諸言禮為容者由徐氏儒林瑕丘蕭奮以禮至雒陽守以授孟卿孟卿傳孟卿東海人事蕭奮以授后蒼前孟卿傳后蒼説禮數萬言號曰曲臺記如淳注曰行禮於曲臺后蒼為記故名曰曲臺戴徳戴聖禮行於世者戴徳戴聖之學禮記正義大戴小戴禮之衰也出文中子慶普曹褒時慶氏為博士上言禮樂褒結髪傳父業曹褒董鈞字文伯習慶氏禮後儒林傳孔頴逹為正義八歳就學闡三禮義宗禮記義疏去聖逾逺異端漸扇大小二戴共氏而分門王鄭兩家同經而異注自晉宋至周隋傳禮業者江左尤盛其為義疏者南人有賀循賀瑒庾蔚崔靈恩沈重宣皇甫侃北人有徐道明李業興李寳鼎侯聰熊安其見於世者皇熊二家而已熊則違背本經多引外義皇雖章句詳正微稍繁廣皇勝熊矣正義注禮記者六家盧植王肅孫炎蕭遵庾蔚鄭元也序録疏禮記者數家孔頴逹宋子奢李善信賈公彦柳士寜范義領張權周元達趙君賛王士雄趙宏智五始孔頴達以伏戯造琴制皮為嘉禮之始以神農播種飲食為吉禮之始以黄帝有戰有葬有官為軍賔凶禮之始此五始也王制釋云漢文帝令博士諸生作此王者之制爵禄公侯伯子男凡五等天子方千里公侯方百里伯七十里子男五十里附於諸侯曰附庸千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯制三公一命卷音衮若有加則賜也不過九命次國之君七命小國之君五命大國之卿三命下國之卿再命小國之卿與下大夫一命諸侯之於天子也比年一小聘三年一大聘五年一朝天子五年一廵守天子曰辟廱諸侯曰頖宮天子將出征受成於學執有罪反釋奠于學以訊馘告司徒脩六禮以節民性明七教以興民徳齊八政以防淫一道徳以同俗耆老皆朝于庠元日習射上功習鄉上齒命鄉簡不帥教者以告不變命國之右鄉簡不帥教者移之左命國之左鄉簡不帥教者移之右不變移之郊如初禮不變移之遂如初禮不變屏之逺方終身不齒命鄉論秀士升之司徒曰選士司徒論選士之秀而升之學曰俊士升於司徒者不征於鄉升於學者不征於司徒曰造士樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書大樂正論造士之秀者以告子王而升諸司馬曰進士司馬辨論官材論進士之賢者而定其論論定然後官之任官然後爵之位定然後禄之天子諸侯無事則歳三田冢宰制國用必於歳之抄五穀皆入然後制國用國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國矣三年耕必有一年之食九年耕必有三年之食以三十年之通制國用雖有水旱民無菜色天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五大夫三廟一昭一穆與太祖之廟而三士一廟庶人祭於寝天子諸侯宗廟之祭春曰礿夏曰禘秋曰嘗冬曰烝天子犆音特礿祫禘祫甞祫烝諸侯礿則不禘禘則不嘗嘗則不烝烝則不礿天子社稷皆太牢諸侯社稷皆少牢大夫宗廟之祭有田則祭無田則薦庶人春薦韭夏薦麥秋薦黍冬薦稻司㓂正刑明辟以聴獄訟必三刺附從輕赦從重疑獄汜與衆共之衆疑赦之必察小大之比以成之成獄辭史以獄成告于正正聴之正以獄成告于大司㓂大司㓂聴之于棘木之下大司㓂以獄成告王王命三公參聴之三公以獄成告于王王三宥然後制刑凡養老有虞氏以燕禮夏后氏以享禮殷人以食禮周人脩而兼用之五十養於鄉六十養於國七十養於學達於諸侯有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠六禮冠婚䘮祭鄉相見七教父子兄弟夫婦君臣長㓜朋友賔客八政飲食衣服事為異别度量數制月令釋文此是呂氏春秋十二紀之首後人刪合為此記蔡伯喈王肅云周公所作呂不韋作或言周公作其中官名時事多不合周法令按周無太尉唯秦有之此月令乃命太尉是官名不合也周以六冕郊天以大裘玉輅太常迎氣月令車服並依時色是時事之不合也星孟春日在營室昏參中旦尾中日月㑹于娵訾斗建寅仲春日在奎昏弧中旦建星中日月㑹于降婁斗建卯季春日在胃昏七星中旦牽牛中日月㑹于大梁斗建辰孟夏日在畢昏翼中旦婺女中日月㑹于實沈斗建巳仲夏日在井昏亢中旦危中日月㑹于鶉首斗建午季夏日在柳昏火中旦奎中日月㑹于鶉火斗建未孟秋日在翼昏建星中旦畢中日月㑹于鶉尾斗建申仲秋日在角昏牽牛中旦觜觽中日月㑹于夀星斗建酉季秋日在房昏虛中旦柳中日月㑹于大火斗建戍孟冬日在尾昏危中旦七星中日月㑹析木之津斗建亥仲冬日在斗昏東壁旦軫中日月㑹于星紀斗建子季冬日在婺女昏婁中旦氐中日月㑹于𤣥枵斗建丑帝神春帝太皥神勾芒夏帝炎帝神祝融中央帝黄帝神后土秋帝少皥神蓐収冬帝顓頊神元𡨕日春甲乙夏丙丁中戊己秋庚辛冬壬癸數春八夏七中央五秋九冬六音春角夏徴中央宮秋商冬羽律孟春大蔟仲春夾鍾季春姑洗孟夏中呂仲夏蕤賔季夏林鍾中央律中黄鍾之宮孟秋夷則仲秋南吕季秋無射孟冬應鍾仲冬黄鍾季冬大吕十二月聴朔之處孟春青陽左个大寢東堂北偏也正義云此是明堂北偏而云大寝者欲明明堂與太廟大寝制同故兼明於明堂聴朔竟次還大廟次還大寝也仲春青陽大廟東堂當大室也季春青陽右个東堂南偏孟夏明堂左个大寝南堂東偏仲夏明堂太廟南堂當大室也季夏明堂右个南堂西偏中央土大廟大室中央室也正義云案考工記周人明堂東西九筵南北七筵凡室二筵則五室並皆二筵无大小也今中央室稱大室者以中央是土室土為五行之主尊之故稱大以夏之世室則四旁之室皆南北三歩東西三歩二尺中央土室南北四歩四尺則用之明堂亦應土室在中央大於四角之室但文不具耳孟秋總章左个大寢西堂南偏仲秋總章大廟西堂當大室也季秋總章右个西堂西偏孟冬元堂左个北堂西偏也仲冬元堂大廟北堂當大室季冬元堂右个北堂東偏月令舉要孟春立春之日迎春于東郊命相布德和令元日祈穀于上帝以上辛祭天也乃擇元辰躬耕帝籍盖郊后吉辰也命布農事命樂正入學習舞為仲春將釋奠仲春擇元日命民社祀社用甲命有司省囹圄順陽寛也祠髙禖日夜分則同度量鈞衡石角斗甬正權概鮮音獻羔開冰先薦寢廟上丁命樂正習舞釋菜釋菜先師仲丁又命樂正入學習樂為季春將習合樂也季春薦鞠衣于先帝先帝太皡之屬為蠶求福薦鮪于寢廟進時美物命有司發倉廪賜貧窮出幣帛聘名士擇吉日大合樂所以助陽達物也后妃親蠶孟夏立夏之日迎夏於南郊命樂師習合禮樂為將飲酎天子始絺命野虞勞農勸民以彘甞麥先薦寢廟斷薄刑决小罪后妃獻繭天子飲酎用禮樂仲夏命有司祈祀山川百源大雩帝以祈穀實以雛甞黍先薦寢廟班馬政挺寛也重囚益其食季夏命婦官染采以給郊廟祭祀之服以為旗章命虞人入山行木毋有斬伐孟秋立秋之日迎秋於西郊命將帥選士厲兵命有司脩法制繕囹圄農乃登穀天子嘗新先薦寢廟命百官始収歛仲秋養衰老授几杖命司服具飭衣裳命有司申嚴百刑斬殺必當天子乃難乃多反以達秋氣以犬甞麻先薦寢廟可以築城郭建都邑穿竇窖脩囷倉命有司趣民収歛乃勸種麥易關市來商旅日夜分則同度量平權衡正鈞石角斗甬季秋命冢宰舉五穀之要上丁命樂正入學習吹為將饗帝大饗帝遍祭五帝也教畋獵習五戎班馬政乃趣獄刑毋留有罪以犬甞稻先薦寢廟孟冬立冬之日迎冬於北郊命太史釁龜筴始裘命百官謹盖藏坏城郭備邊境大飲蒸祈來年于天宗命將帥講武習射仲冬命有司土事毋作毋發盖毋發室屋乃命大酋酒官之長秫稻必齊麯糵必時命有司祈祀四海大川順其盛徳之時祭之也季冬命有司大難出土牛以送寒氣乃甞魚先薦寢廟命農計耦耕事具田器命四監收秩薪柴以共薪燎與公卿大夫共飭國典論時令以待來歳之宜禮器釋文鄭云以其記禮使人成器如孔子謂子貢瑚璉之器是也禮有以多為貴者天子七廟諸侯五大夫三士一天子之豆二十有六諸公十有六諸侯十有二上大夫八下大夫六諸侯七介七牢大夫五介五牢天子之席五重諸侯之席三重大夫再重此以多為貴也禮有以少為貴者天子無介祭天特牲大路繁纓一就次路繁纓七就此以少為貴也有以大為貴者宮室之量器皿之度棺槨之厚丘封之大此以大為貴也有以小為貴者宗廟之祭貴者獻以爵賤者獻以散尊者舉觯卑者舉角五獻之樽門外缶門内壺君尊瓦甒此以小為貴也有以髙為貴者天子之堂九尺諸侯七尺大夫五尺士三尺天子諸侯臺門此以髙為貴也有以下為貴者至敬不壇掃地而祭天子諸侯之尊廢禁廢去也禁如今方案大夫士棜禁棜无足此以下為貴也禮有以文為貴者天子龍衮諸侯黼大夫黻士𤣥衣纁裳天子之冕朱緑藻十有二旒諸侯九上大夫七下大夫五士三此以文為貴也有以素為貴者至敬無文父黨無容大圭不琢大羮不和大路素而越音活席犧尊疏布􅀢莫歴反椫章善反木白理杓此以素為貴也文王世子釋文文王周文王昌也鄭云以其善為世子之禮故著謚號標篇言可法也文王為世子文王之為世子朝於王季日三雞初鳴而衣服至於寢門外問内豎之御者曰今日安否如何内豎曰安文王乃喜及日中又至如之及莫又至亦如之食上必在視寒暖之節武王帥而行之不敢有加焉成王㓜不能踐阼周公相踐阼而治抗世子法於伯禽欲令成王之知父子君臣長㓜之道也成王有過則撻伯禽所以示成王世子之道世子之學凡學世子及學士必時春夏學干戈秋冬學羽籥皆於東序小樂正學干大胥賛之籥師學戈籥師丞賛之胥鼓南春誦夏弦太師詔之瞽宗秋學禮執禮者詔之冬讀書典書者詔之禮在瞽宗書在上庠凡祭與養老乞言合語之禮皆小樂正詔之於東序大樂正學舞干戚語説命乞言皆大樂正授數大司成論説在東序三王教世子凡三王教世子必以禮樂樂所以脩内也禮所以脩外也禮樂交錯於中發形於外是故其成也懌恭敬而温文立太傅少傅以養之欲其知父子君臣之道也太傅審父子君臣之道以示之少傅奉世子以觀太傅之德行而審喻之太傅在前少傅在後入則有保出則有師是以教喻而徳成也師也者教之以事而喻諸德者也保也者慎其身以輔翼之而歸諸道者也記曰虞夏商周有師保有疑丞設四輔及三公不必備唯其人語使能也郊特牲釋文鄭云以其記祭天用騂犢之義也郊者祭天之名用一牛故曰特牲郊之祭也迎長日之至也大報天而主日也兆於南郊就陽位也掃地而祭於其質也器用陶匏以象天地之性也於郊故謂之郊牲用騂尚赤也用犢貴誠也郊之用辛也周之始郊日以至祭之日王皮弁以聴祭報示民嚴上也祭之日王被衮以象天戴冕璪十有二旒則天數也乗素車貴其質也旗十有二旒龍章而設日月天垂象聖人則之所以明天道也萬物本乎天人本乎祖此所以配上帝也郊之祭也大報本反始也蜡天子之大蜡八註蜡祭有八神先嗇一司嗇二農三郵表畷丁列反四猫虎五坊六水庸七昆蟲八伊耆氏古天子號也始為蜡蜡也者索也歳十二月合聚萬物而索饗之也蜡之祭也主先嗇而祭司嗇也先嗇若神農者司嗇后稷是也祭百種以報嗇也饗農田畯也及郵表畷謂田畯所以督約百姓於井門之處也禽獸仁之至義之盡也古之君子使之必報之迎猫謂其食田䑕也迎虎謂其食田豕迎而祭之也祭坊與水庸溝也事也曰土反其宅水歸其壑昆蟲毋作草木歸其澤此蜡祝辭也皮弁素服而祭素服以送終也葛帶榛杖䘮殺也蜡之祭仁之至義之盡也黄衣黄冠而祭息田夫也野夫黄冠黄冠草服也八蜡記四方四方年不順成八蜡不通以謹民財也順成之方其蜡乃通以移民也既蜡而收民息已故既蜡君子不興功社社主祭土而主隂氣也君南嚮於北牖下答隂之義也日用甲用日之始也天子大社必受霜露風雨以達天地之氣社所以神地之道也天垂象取財於地取法於天是以尊天而親地也故教民美報焉家主中霤而國主社示本也明堂位釋文鄭云以其記諸侯朝周公於明堂於陳列之位昔者周公朝諸侯於明堂之位天子負斧依南鄉而立三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上諸子之國門東北面東上諸男之國門西北面東上九夷之國東門之外西面北上八蠻之國南門之外北面東上六戎之國西門之外東面南上五狄之國北門之外南面東上九采之國應門之外北面東上四塞世告至此周公明堂之位也明堂也者明諸侯之尊卑也學記釋文鄭云學記者以其記人學教之義古之教者家有塾黨有庠術有序國有學比年入學中年考校一年視離經辨志三年視敬業樂羣五年視博習親師七年視論學取友謂之小成九年知類通達强立而不反謂之大成夫然後足以化民易俗近者悦服逺者懐之此大學之道也大學始教皮弁祭菜示敬道也宵雅肄三官其始也入學鼓篋孫其業也夏楚二物收其威也未卜禘不視學游其志也時觀而弗語存其心也㓜者聴而弗問學不躐等也此七者教之大倫也記曰凡學官先事士先志其此之謂乎樂記釋文鄭云名樂記者以其記樂之義宮為君商為臣角為民徵為事羽為物五者不亂則無怗懘之音矣宮亂則荒其君驕商亂則陂其臣壊角亂則憂其民怨徵亂則哀其事勤羽亂則危其財匱五者皆亂迭相陵謂之慢如此則國之滅亡無日矣清廟之瑟朱弦而疏越壹倡而三歎有遺音者矣大饗之禮尚𤣥酒而爼腥魚大羮不和有遺味者矣故鐘鼓管磬羽籥干戚樂之器也屈伸俯仰綴兆舒疾樂之文也簠簋爼豆制度文章禮之器也升降上下周旋禓襲禮之文也昔者舜作五絃之琴以歌南風䕫始制樂以賞諸侯其治民勞者其舞行綴逺其治民逸者其舞行綴短故觀其舞知其徳聞其謚知其行也大章章之也咸池備矣韶繼也夏大也殷周之樂盡矣所謂大輅者天子之車也龍旗九旒天子之旌也青黒縁者天子之寶龜也從之以牛羊之羣則所以贈諸侯也聖人作為鞉鼓椌楬壎篪此六者徳音之音也然後鐘磬竽瑟以和之干戚旄狄以舞之此所以祭先王之廟也君子聴鐘聲則思武臣聴磬聲則思死封疆之臣聴琴瑟之聲則思志義之臣聴竽笙簫管之聲則思畜聚之臣聴鼔鼙之聲則思將帥之臣君子之聴音非聴其鏗鏘而已也故商者五帝之遺聲也寛而靜柔而正者宜歌頌廣大而静疏達而信者宜歌大雅恭儉而好禮者宜歌小雅正直而静廉而謙者宜歌風肆直而慈愛商之遺聲也商人識之故謂之商齊者三代之遺聲也齊人識之故謂之齊明乎商之音者臨事而屢㫁明乎齊之音者見利而讓臨事而屢㫁勇也見利而讓義也有勇有義非歌孰能保此故歌者上如抗下如隊曲如折止如槀木倨中矩句中鉤纍纍乎端如貫珠故歌之為言也長言之也説之故言之言之不足故長言之長言之不足故嗟歎之嗟歎之不足故不知手之舞之足之蹈之也祭法釋文鄭云以其記有虞氏至周天子以下所祭祀羣神之數也四代之祭有虞氏禘黄帝而郊嚳祖顓頊而宗堯夏后氏亦禘黄帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王燔柴於㤗壇祭天也瘞埋於㤗折祭地也用騂犢埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宮祭日也夜明祭月也幽宗祭星也雩宗祭水旱也四坎壇祭四方也山林川谷丘陵能出雲為風雨見怪物皆曰神有天下者祭百神諸侯在其地則祭之亡其地則不祭祀羣臣夫聖王之制祭祀法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大菑則祀之能捍大患則祀之祭義釋文鄭云名祭義者以其記齊戒薦羞之義祭儀祭不欲數數則煩煩則不敬祭不欲疏疏則怠怠則忘是故君子合諸天道春禘秋嘗霜露既降君子履之必有悽愴之心非其寒之謂也春雨露既濡君子履之必有怵惕之心如將見之樂以迎來哀以送往故禘有樂而嘗無樂致齊於内散齊於外齊之日思其居處思其笑語思其志意思其所樂思其所嗜齊三日乃見其所為齊者郊郊之祭大報天而主日配以月夏后氏祭其闇殷人祭其陽周人祭日以朝及闇祭日於壇祭月於坎以别幽明以制上下祭日於東祭月於西以别外内以端其位鬼神宰我曰吾聞鬼神之名不知其所謂子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也衆生必死死必歸土此之謂鬼骨肉斃下隂為野土其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也建國之神位右社稷而左宗廟祭統釋文鄭云統猶本也以其記祭祀之本故名祭統䘮祭是故孝子之事親也有三道焉生則養没則䘮䘮畢則祭養則觀其順也䘮則觀其哀也祭則觀其敬而時也盡此三道者孝子之行也親耕親蠶天子親耕於南郊以共齊盛王后蠶於北郊以共純服諸侯耕於東郊亦以共齊盛夫人蠶於北郊以共冕服齊戒祭及時將祭君子乃齊齊之為言齊也齊不齊以致齊者也及其將齋也防其邪物訖其嗜欲耳不聴樂故記曰齊者不樂言不敢散其志也是故君子之齊也專致其精明之徳也故散齊七日以定之致齊三日以齊之定之之謂齋齋者精明之至也然後可以交於神明也是故夫人亦散齊七日致齊三日君致齊於外夫人致齊於内然後㑹於大廟君純冕立於阼夫人副禕立於東房君執圭瓉祼尸大宗執璋瓉亞祼及迎牲君執紖卿大夫從士執芻宗婦執盎從夫人薦涚水君執鸞刀羞嚌夫人薦豆此之謂夫婦親之及入舞君執干戚就舞位君為東上冕而總干率其羣臣以樂皇尸是故天子之祭也與天下樂之諸侯之祭也與竟内樂之冕而總干率其羣臣以樂皇尸此與竟内樂之之義也夫祭有三重焉獻之屬莫重於祼聲莫重於升歌舞莫重於武宿夜此周道也周公用天子禮樂昔者周公旦有勲勞於天下周公既没成王康王追念周公之所以勲勞者而欲尊魯故賜之以重祭外祭則郊社是也内祭則大嘗禘是也夫大嘗禘升歌清廟下而管象朱干玉戚以舞大武八佾以舞大夏此天子之樂康褒大也周公故以賜魯也子孫纂之至于今不廢所以明周公之徳而又以重其國也中庸釋文鄭云以其記中和之為用也庸用也孔子之孫子思作之以昭明聖祖之徳也程子曰不偏之謂中不易之謂庸中者天下之正道庸者天下之定理此篇乃孔門傳授心法子思恐其乆而差也故筆之於書以授孟子其書始言一理中散為萬事末復合為一理放之則彌六合卷之則退藏於宻其味無窮皆實學也善讀者玩索而有得焉則終身用之有不能盡者矣天命之謂性率性之謂道脩道之謂教命猶令也性即理也天以隂陽五行化生萬物氣以成形而理亦賦焉猶命令也於是人物之生因各得其所賦之理以為健順五常之徳所謂性也率循也道猶路也人物各循其性之自然則其日用事物之間莫不各有當行之路是則所謂道也修品節之也性道雖同而氣稟或異故不能無過不及之差聖人因人物之所當行者而品節之以為法於天下則謂之教若禮樂刑政之屬是也盖人之所以為人道之所以為道聖人之所以為教原其所自無一不本於天而備於我學者知之則其於學知所用力而自不能已矣喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也樂音洛中節之中去聲喜怒哀樂情也其未發則性也無所偏倚故謂之中發皆中節情之正也無所乖戾故謂之和大本者天命之性天下之理皆由此出道之體也達道者循性之謂天下古今之所共由道之用也此言性情之徳以明道不可離之意致中和天地位焉萬物育焉致推而極之也位者安其所也育者遂其生也自戒懼而約之以至于至静之中無少偏倚而其守不失則極其中而天地位矣自謹獨而精之以至於應物之處無少差謬而無適不然則極其和而萬物育矣盖天地萬物本吾一體吾之心正則天地之心亦正矣吾之氣順則天地之氣亦順矣故其效驗至於如此此學問之極功聖人之能事初非有待於外而脩道之教亦在其中矣是其體一用雖有動静之殊然必其體立而後用有以行則其實亦非有兩事也故於此合而言之以結上文之意天下之達道五所以行之者三曰君臣也父子也夫婦也昆弟也朋友之交也五者天下之達道也知仁勇三者天下之逹徳也所以行之者一也知去聲達道者天下古今所共由之路即書所謂五典孟子所謂父子有親君臣有義夫婦有别長㓜有序朋友有信是也知所以知此也仁所以體此也勇所以强此也謂之達徳者天下古今所同得之理也一則誠而已矣達道雖人所共由然無是三徳則無以行之達徳雖人所同得然一有不誠則人欲間之而徳非其徳矣程子曰所謂誠者止是誠實此三者三者之外更别無誠凡為天下國家有九經曰脩身也尊賢也親親也敬大臣也體羣臣也子庶民也來百工也柔逺人也懐諸侯也經常也體謂設以身處其地而察其心也子如父母之愛其子也柔逺人所謂無忘賔旅者也此列九經之目也呂氏曰天下國家之本在身故脩身為九經之本然必親師友然後脩身之道進故尊賢次之道之所進莫先其家故親親次之由家以及朝廷故敬大臣體羣臣次之由朝廷以及其國故子庶民來百工次之由其國以及天下故柔逺人懐諸侯次之此九經之序也視羣臣猶吾四體視百姓猶吾子此視臣視民之别也自誠明謂之性自明誠謂之教誠則明矣明則誠矣唯天下至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以賛天地之化育可以賛天地之化育則可以與天地叅矣天下至誠謂聖人之徳之實天下莫能加也盡其性者德無不實故無人欲之私而天命之在我者察之由之巨細精粗無毫髪之不盡也人物之性亦我之性但以所賦形氣不同而有異耳能盡之者謂知之無不明而處之無不當也賛猶助也與天地參謂與天地並立為三也此自誠而明者之事也大學釋文鄭云大學者以其記博學可以為政也朱氏章句序云大學之書古之大學所以教人之法也盖自天降生民則既莫不與之以仁義禮智之性然其氣質之禀或不能齊是以不能皆有以知其性之所有而全之也一有聰明睿智能盡其性者出於其間則天必命之以為億兆之君師使之治而教之以復其性此伏羲神農黄帝堯舜所以繼天立極而司徒之職典樂之官所由設也三代之隆其法寖備然後王宮國都以及閭巷莫不有學人生八歳則自王公以下至於庶人之子弟皆入小學而教之以洒掃應對進退之節禮樂射御書數之文及其十有五年則自天子之元子衆子以至公卿大夫元士之適子與凡民之俊秀皆入大學而教之以窮理正心修己治人之道此又學校之教大小之節所以分也夫以學校之設其廣如此教之之術其次第節目之詳又如此而其所以為教則又皆本之人君躬行心得之餘不待求之民生日用彛倫之外是以當世之人無不學其學焉者無不有以知其性分之所固有職分之所當為而各俛焉以盡其力此古昔盛時所以治隆於上俗美於下而非後世之所能及也及周之衰賢聖之君不作學校之政不修教化陵夷風俗頽敗時則有若孔子之聖而不得君師之位以行其政教於是獨取先王之法誦而傳之以詔後世若曲禮少儀内則弟子職諸篇固小學之支流餘裔而此篇者則因小學之成功以著大學之明法外有以極其規模之大而内有以盡其節目之詳者也三千之徒盖莫不聞其説而曽氏之傳獨得其宗於是作為傳義以發其意及孟子没而其傳泯焉則其書雖存而知者鮮矣自是以來俗儒記誦詞章之習其功倍於小學而無用異端虛無寂㓕之教其髙過於大學而無實其他權謀術數一切以就功名之説與夫百家衆技之流所以惑世誣民充塞仁義者又紛然雜出乎其間使其君子不幸而不得聞大道之要其小人不幸而不得蒙至治之澤晦盲否塞反覆沉痼以及五季之衰而壊亂極矣子程子曰大學孔氏之遺書而初學入德之門也於今可見古人為學次第者獨頼此篇之存而論孟次之學者必由是而學焉則庶乎其不差矣大學之道在明明徳在親民在止於至善程子曰親當作新大學者大人之學也明明之也明德者人之所得乎天而虚靈不昧以具衆理而應萬事者也但為氣禀所拘人欲所蔽則有時而昏然其本體之明則有未嘗息者故學者當因其所發而遂明之以復其初也新者革其舊之謂也言既自明其明徳又當推以及人使之亦有以去其舊染之汙也止者必至於是而不遷之意至善則事理當然之極也言明明徳新民皆當止於至善之地而不遷盖必其有以盡夫天理之極而無一毫人欲之私也此三者大學之綱領也知止而后有定定而后能静静而后能安安而后能慮慮而后能得后與後同後倣此止者所當止之地即至善之所在也知之則志有定向静謂心不妄動安謂所處而安慮謂處事精詳得謂得其所止物有本末事有終始知所先後則近道矣明徳為本新民為末知止為始能得為終本始所先末終所後此結上文兩節之意古之欲明明徳於天下者先治其國欲治其國者先齊其家欲齊其家者先脩其身欲脩其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物治平聲後倣此明明徳於天下者使天下之人皆有以明其明徳也心者身之所主也誠實也意者心之所發也實其心之所發欲其一於善而無自欺也致推極也知猶識也推極吾之知識欲其所知無不盡也格至也物猶事也窮至事物之理欲其極處無不到也此八者大學之條目也物格而后知至知至而后意誠意誠而后心正心正而后身脩身脩而后家齊家齊而后國治國治而后天下平治去聲後倣此物格者物理之極處無不到也知至者吾心之所知無不盡也知既盡則意可得而實矣意既實則心可得而正矣脩身以上明明徳之事也齊家以下新民之事也物格知至則知所止矣意誠以下則皆得所止之序也自天子以至於庶人壹是皆以脩身為本壹是一切也正心以上皆所以脩身也齊家以下則舉此而措之耳其本亂而末治者否矣深衣釋文鄭云以其記深衣之制也名曰深衣者謂連衣裳而純之以采也有表則謂之中衣以素純則曰長衣也制十有二幅以應十二月袂圜以應規曲袷如矩以應方負繩及踝以應直下齊如權衡以應平故規者行舉手以為容負繩抱方以直其政方其義也故大易曰坤六二之動直以方也下齊如權衡者以安志而平心也五法已施聖人服之故規矩取其無私繩取其直權衡取其平故先王貴之故可以為文可以為武可以擯相可以治軍旅完且弗費善衣之次也投壺釋文鄭云投壺者主人與賔燕飲議論才藝之禮也别録屬吉禮亦實曲禮之正篇也皇云與射為類宜屬嘉禮或云宜屬賔禮也籌室中五扶堂上七扶庭中九扶筭長尺二寸壺頸長七寸腹脩五寸口徑二寸半容斗五升壷中實小豆焉為其矢之躍而出也壺去席二矢半矢以柘若棘毋去其皮冠義釋文鄭云名冠義者以其記冠禮成人之義也是故古者聖王重冠古者冠禮筮日筮賔所以敬冠事敬冠事所以重禮重禮所以為國本也故冠於阼以著代也醮於客位三加彌尊加有成也已冠而字之成人之道也冠者禮之始也嘉事之重者也是故古者重冠重冠故行之於廟行之於廟者所以尊重事尊重事而不敢擅重事不敢擅重事所以自卑而尊祖也婚義釋文鄭云婚義者以其記娶妻之義内教之所由成也婚禮者將合二姓之好上以事宗廟而下以繼後世故君子重之是以婚禮納采問名納吉納徵請期皆主人筵几於廟而拜迎於門外揖讓而升聴命於廟所以敬慎重正婚禮也是故男教不脩陽事不得適見於天日為之食婦順不脩陰事不得適見於天月為之食是故日食則天子素服而脩六官之職蕩天下之陽事月食則后素服而脩六宮之職蕩天下之隂事故天子之與后猶日之與月隂之與陽相須而后成也鄉飲酒義釋文鄭云鄉飲酒義者以其記卿大夫飲賔於庠序之禮尊賢養老之義也賔主象天地介僎象隂陽三賔象三光讓之三也象月之三日而成魄也四面之坐象四時也天地嚴凝之氣始於西南盛於西北此天地尊嚴氣也此天地之義氣也天地温厚之氣始於東北而盛於東南此天地之盛徳氣也此大地之仁氣也主人者尊賔故坐賔於西北而坐介於西南以輔賔賔者接人以義者也故坐於西北主人者接人以仁以徳厚者也故坐於東南而坐僎於東北以輔主人也仁義接賔主有事爼豆有數曰聖聖立而將之以敬曰禮禮以體長㓜曰德鄉飲酒之禮六十者坐五十者立侍以聴政役所以明尊長也六十者三豆七十者四豆八十者五豆九十者六豆所以明養老也鄉飲酒之義立賔以象天立主以象地設介僎以象日月立三賔以象三光古之制禮也經之以天地紀之以日月參之以三光政教之本也射義釋文鄭云射義者以其記燕射大射之禮觀德行取其士之義也故射者進退周還必中禮内志正外體直然後持弓矢審固持弓矢審固然後可以言中此可以觀德行其節天子以騶虞為節諸侯以貍首為節卿大夫以采蘋為節士以采蘩為節騶虞者樂官備也貍首者樂㑹時也采蘋者樂循法也采蘩者樂不失職也是故天子以備官為節諸侯以時㑹天子為節卿大夫以循法為節士以不失職為節故明乎其節之志以不失其事則功成而德行立德行立則無暴亂之禍矣諸侯歳獻貢士於天子天子試之於射宮其容體比於禮其節比於樂而中多者得與於祭其容體不比於禮其節不比於樂而中少者不得與於祭數與於祭而君有慶數不與於祭而君有讓數有慶而益地數有讓而削地故曰射者射為諸侯也天子將祭必先習射於澤澤者所以擇士也已射於澤而后射於射宮射中者得與於祭不中者不得與於祭不得與於祭者有讓削以地得與於祭者有慶益以地進爵絀地是也燕義釋文鄭云名燕義以記君與臣燕飲之禮上下相報之義也諸侯燕禮之義君立阼階之東南南鄉爾卿大夫皆少進定位也君席阼階之上居主位也君獨升立席上西面特立莫敢適之義也設賔主飲酒之禮也使宰夫為獻主臣莫敢與君亢禮也不以公卿為賔而以大夫為賔為疑也明嫌之義也賔入中庭君降一等而揖之禮之也席小卿次上卿大夫次小卿士庶子以次就位於下獻君君舉旅行酬而後獻卿卿舉旅行酬而後獻大夫大夫舉旅行酬而後獻士士舉旅行酬而後獻庶子爼豆牲體薦羞皆有等差所以明貴賤也聘義釋文鄭云名聘義者以其記諸侯之國交相聘問重禮輕財之義聘禮上公七介諸侯五介子男三介所以明貴賤也介紹而傳命君子於其所尊不敢質敬之至也故天子制諸侯比年小聘三年大聘以圭璋聘重禮也已聘而還圭璋此輕財重禮之義主國待客出入三積餼客於舍五牢之具陳於内米三十車禾三十車芻薪倍禾皆陳於外乗禽日五䨇羣介皆有餼牢一食再享燕與時賜無數所以厚重禮也聘射之禮至大禮也質明而始行事日幾中而后禮成非強有力者弗能行也故強有力者將以行禮也酒清人渇而不敢飲也肉乾人飢而不敢食也日莫人倦齊莊正齊而不敢懈惰以成禮節以正君臣以親父子以和長㓜此衆人之所難而君子行之羣書考索巻五
