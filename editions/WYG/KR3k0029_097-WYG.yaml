body:
  text: 羣書考索後集卷三十一宋章如愚編士門天子學陳禮書曰四代之學虞則上庠下庠王制曰有虞氏養國老於上庠養庶老於下庠夏則東序西序王制曰夏后氏養國老於東序養庶老於西序商則右學左學王制曰商人養國老於右學養庶老於左學周則東膠虞庠東膠即東序也虞庠即上庠也又有辟雍成均瞽宗之名瞽宗即右學也或曰辟雍一曰成均王制曰周人養國老於東膠養庶老於虞庠虞庠在國之西郊詩曰鎬京辟雍王世子曰禮在瞽宗則上庠東序右學東膠大學也故國老於之養焉下庠西序左學虞庠小學也故庶老於之養焉祭義曰天子設四學鄭註謂四郊虞庠之學非也葢周之制也辟雍即成均也以其形圜如璧則曰辟雍以其成其虧均其過不及則曰成均以習射事則曰序以糾德行則曰膠以樂祖在焉則曰瞽宗以居右焉則曰右學葢周之學成均居中其左東序其右瞽宗此大學也虞庠在國之西郊則小學也文王世子曰天子視學命有司行事祭先師先聖焉卒事遂適東序設三老五更之席祭義曰食三老五更於太學所以教諸侯之弟祀先賢於西學所以教諸侯之德夫天子視學即成均也命有司行事祭先師先聖焉即祀先賢於西學也祀先賢於西學則祭於瞽宗也有司卒事適東序設三老五更之席即養國老於東膠也養國老於東膠即祀三老五更於太學也然則商之右學在周謂之西學亦謂之瞽宗夏之東序在周謂之東膠亦謂之太學葢夏學上東而下西商學上右而下左周之所存特其上者爾則右學東序葢與成均並建於一丘之上而已由是觀之成均領學政董仲舒以成均為五帝之學豈非周之辟雍用成均之舊法以為學政故辟雍亦名成均歟右學祀樂祖東序養老更右學東序不特存其制而已又因其所上之方而位之也大戴賈誼有帝入五學之説陸氏禮象曰天子設四學葢天子立四學并其中學而五直於一處並建周人辟雍則辟雍居其中其南為成均其北為上庠其東為東序其西為瞽宗鄭康成謂周有四郊之虞庠王肅謂辟雍即明堂耳皆不可考也周禮禮記掌學之官其名不同周禮師氏掌三德以教國子禮記文王世子曰大司成論說在東序又曰父師司成鄭註以為大司成即司徒之屬師氏也周禮保氏掌養國子以道而禮記闕其官周禮大司樂掌成均之法而樂師掌國學之政禮記王制曰樂正崇四術立四教順先王詩書禮樂以造士將出學小樂正簡不帥敎者以告於大樂正大樂正以告於王鄭註曰小樂正即樂師也而謂大樂正為樂官之長意者即周禮大司樂歟自大胥而下小胥大師籥師其名皆同周禮大胥掌學士之版小胥掌學士之政令禮記王制將出學小胥大胥小樂正簡其不帥敎者以告於大樂正周禮大師敎六詩而文王世子曰春誦夏弦太師詔之周禮籥師掌教舞羽吹籥文王世子曰籥師學戈周禮有諸子之官燕義曰古者周天子之官有庶子之官鄭曰即諸子也諸侯學天子曰辟雍諸侯曰泮宫王制曰天子命之敎然後為學小學在公宫之左大學在郊明堂位曰米廩有虞氏之庠也序夏后氏之序也瞽宗商學也頖宫周學也然則魯亦用四代之學歟諸侯頖宫與魯同制但無瞽宗與序亦有小學也陳禮書曰頖宫之制半於辟雍而水葢缺於北方也諸侯樂懸缺其南而泮水缺其北者缺南而存北所以便其觀也缺北而存南所以便人之觀也泮水太學也大學在郊故記曰魯人將有事於上帝必先有事於泮宫焉然則序與瞽宗葢亦設在頖宫之左右而米廩在公宫之小學歟鄉學孟子曰庠者養也校者教也序者射也夏曰校商曰序周曰庠學則三代共之皆所以明人倫也陳禮書曰孟子因論井地而及於此則校庠序者鄉學也鄉飲酒主人迎賓於庠門之外鄉簡不帥耆老皆朝於庠則庠鄉學名也周官州長春秋以禮㑹民而射於州序黨正以禮屬民而飲酒於序則序亦鄉學名也鄭人之所欲毁者謂之鄉校則校亦鄉學名也然鄉曰庠記言黨有庠州曰序記言遂有序何也古之致仕者敎子弟於閭塾出書大傳則記以為家有塾云者非家塾也合二十五家而教之於閭塾謂之家有塾可也則合二十五黨而教之鄉庠謂之黨有庠可也周禮遂官各降鄉官一等則遂之學亦降鄉一等矣降鄉一等而謂之州長其爵與遂大夫同則遂之學其名與州序同可也漢食貨志言里胥坐右塾則里亦有塾葢閭在遂則為里又言里有序又言鄉有庠其名不同大小内外之辨陳禮書據祭義之説周設四代之學以為辟雍居中一名成均東序在左一名東膠又名太學右學在右一名瞽宗一名西學天子大學在内者三小學在外者一虞庠是也虞庠在國之西郊一名上庠米廩陸氏禮象據大戴禮賈誼之説以東學為東序南學為成均西學為瞽宗北學為上庠太學為辟雍此五學在内者皆大學也小學在外東膠虞庠是也二者皆有所據未知其孰當然而天子之學小學居外大學居内諸侯之學大學在外小學在内葢諸侯選士由内以升於外然後達於京故也天子選士由外以升於内然後達於朝故也天子視學禮曰天子視學四養老也簡不帥教也出征受成也以訊馘告也其養老也天子之於老也其所養也三國老也庶老也死政者之老也歲養之也三仲春也季春也仲秋也周禮羅氏羅春鳥獻鳩以養國老在仲春月令養衰老授几杖在仲秋文王世子曰凡大合樂必遂養老鄭氏云大合樂謂春入學釋菜合舞秋頒學合聲於是時也天子則視學焉遂養老此養老於仲春仲秋者也月令季春之末擇吉日大合樂天子乃率三公九卿諸侯大夫親往視之大合樂亦必養老此又養老於季春者也夫貴胄謂之國子則貴而老者謂之國老賤者謂之庶人則賤而老者謂之庶老國子與庶人之俊者同其學所以一道德國老與庶老異其學所以别分義故有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序商人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠而又有死政者之老焉故羅氏獻鳩以養之者國老也司徒以保息養之者庶老也司門以其財養之者死政者之老也若夫外饔酒正槁人所謂耆老者總三者而言之也鄭氏謂三老五更各一人皆年老更事致仕者也名三五者取象三辰五星天所因以照明天下者皇氏謂人君養老有四種一是養三老五更二是子孫為國難而死者父祖三是養致仕之老四是引户校年庶人之老熊氏云天子視學養老一嵗有七鄭氏云凡飲養陽氣凡食養隂氣陽用春夏隂用秋冬是四時養老凡四也文王世子凡大合樂必遂養老大合樂謂春入學舍菜合舞秋頒學合聲又季春大合樂天子視學亦養老是七也然則古者建國必立三卿鄉飲酒必立三賓而養老必立三老故禮曰三公在朝三老在學三公非一人則三老五更非各一人矣漢志以德行年高者一人為老次一人為更故永平中拜桓榮為五更建初中拜伏恭為三老而鄭氏以此為三代之制誤矣先王父事三老兄事五更則三老五更乃羣老之尤者而致仕之老固在其間皇氏離而二之亦誤矣月令無冬夏養老之文周禮禮記特言春養秋食而已熊氏謂養老嵗有七亦誤矣又禮記言天子視學遂適東序養老則視學養老皆同日也鄭氏謂用其明日亦誤矣飬老之禮外饔掌割烹酒正共酒槁人共食羅氏共鳩方其養也必先釋奠於先老遂設三老五更羣老之席位適饌省醴養老之珍具遂發咏焉登歌清廟下管象武天子袒而割牲執醬而饋執爵而酳冕而總干則乞言憲行之養著而孝弟之化行矣有司告以樂闋王乃命公侯伯子男及羣吏曰反養老幼於東序而終之以仁此所謂一舉事而衆皆知其德之備也禮言凡養老有虞氏以燕禮而服深衣夏后氏以饗禮而服燕衣商人以食禮而服縞衣周人脩而兼用之而服𤣥衣葢虞氏以燕則以恩勝禮夏后氏以饗則以禮勝恩商人以食則趣恩禮之中而周則文備故修而兼用之周官外饔言饗耆老此周人以饗禮養老也行葦言飲射而繼之以祈黄耇此周人以燕禮養老也祭義曰食三老五更於太學此周人以食禮養老也漢明帝養老之禮天子親袒割牲執醬執酳祝哽在前祝噎在後其禮似矣然所養特三老五更二人而已羣老不與焉非古禮之意也三老五更皆三代所尊也三者道成於三謂天地人也老者舊也夀也詩云方叔元老書稱無遺耆老黄耇之言則罔所僣五者訓於五品更者更也五戌長子更相代言其能以善道改更已也故三老五更皆取有道夫妻男女完具者為之鄭𤣥曰老更互言之耳皆老人更知三徳五事者也蔡邕曰更當為叟字之誤也天子父事三老兄事五更親袒割牲執醬而饋執爵而酳三公設几九􅀸正履祝哽在前祝噎在後使者安車輭輪送迎至家天子獨拜於屏其明日三老詣闕謝以其禮遇太尊故也後漢明帝以李躬為三老桓榮為五更桓榮皆以二千石祿養終其身安帝以魯丕李充為三老靈帝又以袁逢為三老賜以玉杖玉杖長九尺端以鳩為飾鳩者不咽之鳥欲老人之不咽也魏高貴鄉公即位幸太學命王祥為三老祥字休徵鄭小同為五更祥南面几杖以師道自居天子北面乞言祥陳明王聖帝君臣政化之要以訓之聞者莫不砥礪後魏孝文養老於明堂以尉元為三老元字荀仁游明根為五更明根字逺志帝再拜三老肅拜鄭衆云但俯下手今時揖拜是也給三老上公之祿五更九卿之祿後周武帝保定三年詔以太傅燕國公于謹為三老賜延年杖帝幸太學以食之三老入門皇帝迎拜門屏之間三老答拜有司設三老席於中楹南向太師晉國公䕶升階設几於席三老升席南面憑几而坐大司寇楚國公寧升階正舄皇帝升立於斧扆之前西面有司進饌皇帝跪設醬豆親自袒割三老食訖皇帝又親跪授爵以酳有司撤訖皇帝北面立訪道三老乃起立於席後皇帝曰猥當天下重任自惟不才不知政治之要公其誨之三老答曰木從繩則正后從諫則聖自古明王聖主皆虚心納諫以知得失天下乃安惟陛下念之云云三老言畢皇帝再拜受之三老答拜禮成而出唐制仲秋吉辰親養三老五更於太學通典其簡不帥教出征受成以訊馘告也王制曰天子出征受成於學出征執有罪反釋奠於學以訊馘告將出學小胥大胥小樂正簡不帥教者以告於大樂正大樂正以告於王王命三公九卿大夫元士皆入學不變王親視學然則養老有常時謂仲春季春仲秋事見前而簡不帥敎者受成獻馘則無常時雖無常時其入學也亦必養老焉禮書古者諸侯視學之禮葢有同於天子泮水所言是也釋奠周制王制出征執有罪反釋奠於學以訊馘告釋菜奠幣禮先師也禮記月令仲春曰是月也命樂正習舞為將釋奠上丁釋奠於國學釋謂置也謂置牲幣之奠於文宣王天子及公卿諸矦大夫親往視之覲其禮也命有司上戊釋奠於太公廟亦用牲幣之奠又月令仲秋曰是月也命樂正習吹春夏尚舞秋冬尚吹習之為將釋奠上丁釋奠於國子天子乃率公卿諸侯大夫親往視之禮儀同仲春是月也命有司上戊釋奠於太公廟禮儀同仲春文王世子凡學眷官釋奠於先師秋冬亦如之不言夏夏從春可知也釋奠者設薦饌酌奠而已無迎尸以下之事凡始立學者必釋奠於先聖先師及行事必以幣凡釋奠者必有合也有國故則否合者當與鄰國合也凡大合樂必遂養老大合樂為春入學舍菜合舞秋頒學合聲於是時也天子則視學焉遂養老者謂用其明日也始立學者旣釁器用幣然後釋菜菜芹藻之屬不舞不授器釋菜禮經也釋奠則舞舞則授器司馬之器司兵司戈司盾祭祀授舞者兵也乃退儐於東序一獻無介語可也釋菜於虞庠則儐賓於東序天子視學大昕鼔徵乃命有司行事興秩節祭先師先聖焉有司卒事反命始之養也適東序釋奠於先老周禮凡有道有德者使教焉死則以為樂祖祭於瞽宗大祝大㑹同造於廟宜於社過大山川則用事焉反行舍奠曽子問曰凡告必用制幣反亦如之甸祝舍奠於祖廟禰亦如之賈公彥曰非時而祭即曰奠以其不立尸奠之言停停饌具而已儀禮賓朝服釋幣於禰又釋幣於行遂受命上介釋幣亦如之釋幣於門乃至於禰筵几於室薦脯醢觴酒陳主人酌進奠一獻言陳者將復有次也先薦後酌祭禮也行釋幣反釋奠略出謹入也席於阼薦脯醢三獻並儀禮周武王入殷未及下車而封先代之後葢追思其德也孔子以大聖而終於陪臣未有封爵見晉志漢元帝孔霸以帝師賜爵號褒成君奉孔子後後漢明帝永平二年三月帝始率羣臣射養三老五更於辟雍行大射之禮郡國縣道行鄉飲酒於學校皆祠先聖先師周公孔子漢志魏文帝黄初二年正月詔以議郎孔羨為宗聖侯邑百户奉孔子祀令魯郡脩舊廟置百戸吏卒以守衛之魏齊王正始三年二月五年正月七年十二月並使太常釋奠以太牢祠孔子於辟雍以顏囘配晉志晉范堅書問馮懷曰漢氏以來釋奠先師唯仲尼不及公旦何也馮答曰若如來談亦當憲章堯舜文武豈惟周旦乎摯虞釋奠頌曰如彼泉流不盈不運講業旣終禮師釋奠升觴折爼上下惟善邕邕其來肅肅其見晉武帝太始三年十一月改宗聖侯孔震為奉聖亭侯又詔太學及魯國四時備三牲以祀孔子晉志武帝太始七年惠帝元康三年二釋奠皆於太學太始六年元康五年二行鄉事皆於辟雍惠帝之為太子及愍懷太子講經竟並親釋奠於太學通典東晉元帝大興二年皇太子並親釋奠以太牢祠孔子以顏回配晉志明帝太寧三年詔給奉聖亭侯孔亭四時祠孔子祭宜如太始故事成帝咸康元年穆帝升平元年三月孝武寧康三年七月並釋奠如故事穆帝孝武並權以中堂為太學並晉志宋文帝元嘉二十二年太子釋奠採晉故事祭畢親臨學宴㑹太子以上悉在南齊武帝永明三年有司奏宋元嘉舊事學生到先釋奠先聖先師禮又有釋菜未詳今當行何禮用何樂及禮器時從喻希議用元嘉故事設軒懸之樂六佾之舞牲牢器用悉依上公梁武帝天監八年皇太子釋奠周捨議旣惟大禮請依東宫元會太子著絳紗襮音博衣領也樂用軒懸合升殿坐者皆服朱衣帝從之又有司以為禮云凡為人子者升降不由阼階吏部郎徐勉議鄭𤣥云由命士以上父子異宫宫室旣異無不由阼階之禮請釋奠及宴㑹太子升堂並宜由東階若轝駕幸學自然中階其㑹賓客依舊西階大同七年皇太子表其子寧國臨城公入學時議者以與太子有齒胄之議疑之僕射臣纉等以為參㸃回路並事宣父鄒魯稱盛洙泗無譏師道旣光得以資敬無虧亞二制可並通典後魏明帝正光二年三月庚午幸國子學祠孔子以顏回配南史北齊將講於天子講畢以一太牢釋奠孔宣父配以顔回列軒懸樂六佾舞皇太子每通一經及新立學必釋奠禮先聖先師每嵗春秋二仲常行其禮每月朔制祭酒領博士以下及國子諸學生以上太學四門博士升堂助教以下太學諸生階下拜孔聖揖顔回日出行事其郡學則於坊内立孔顏廟博士以下亦每月朝隋制國子寺每嵗四仲月上丁釋奠於先聖先師年别一行鄉飲酒禮唐志仲春仲秋釋奠於文宣王武成王皆以上丁國學以祭酒司業博士為一獻唐六典曰仲春上丁釋奠於孔宣父以顔回配焉其七十二弟子及先儒並從祀仲秋之月亦如之仲春上戊釋奠於齊太公以留侯張良配焉仲秋之月亦如之凡州縣皆置孔宣父廟以顔回配仲春上丁州縣官行釋奠之禮仲秋上丁亦如之並通典唐高祖武德二年始詔國子學立周公孔子廟武德七年高祖釋奠焉以周公為先聖孔子配武德九年封孔子之後為褒聖侯並唐志太宗貞觀三年左僕射房𤣥齡博士朱子奢建言周公仲尼皆聖人然釋奠於學以夫子也大業以前皆孔子為先聖顔回為先師乃罷周公升孔子為先聖以顏回配貞觀四年諸州縣學皆作孔子廟貞觀十一年詔尊孔子為宣父作廟於兖州給户二十以奉之並唐志貞觀十四年太宗親釋奠於國子學詔祭酒孔頴達講孝經貞觀二十年二月詔皇太子於國學釋奠於先聖先師皇太子為初獻國子祭酒張復𦙍為亞獻光州刺史攝司業趙𢎞智為終獻旣而就講𢎞智演孝經忠臣孝子之義右庶子許敬宗上四言詩以美其事貞觀二十一年中書侍郎許敬宗奏秦漢釋奠無文可檢至於魏氏則使太常行事自晉宋以降學官主祭並唐㑹要高宗永徽中復以周公為先聖孔子為先師顔回左丘明以降皆從祀顯慶二年太尉長孫無忌等言禮釋奠於其先師若禮有高堂生樂有制氏詩有毛公書有伏生又禮始立學釋奠於先聖鄭氏註若周公孔子也故貞觀以孔子為先聖衆儒為先師且周公作禮樂當同王者之祀乃以周公配武王而孔子為先聖總章元年二月二十九日皇太子𢎞釋奠於學贈顏回為太子少師曽參少保咸亨元年詔州縣皆營孔子廟並唐志永隆二年二月皇太子親行釋奠之禮開耀元年二月十九日皇太子釋奠於國學並唐㑹要武后天授元年封周公為褒德王孔子為隆道公中宗神龍元年以鄒魯百户為隆道公采邑以奉嵗祀子孫世襲褒聖侯並唐志寶龍二年七月皇太子親釋奠於國學㑹要睿宗太極元年以兖州隆道公近祠户三十供灑掃加贈顔回太子太師曽參太子太保皆配享唐志太極元年二月二十八日皇太子親釋奠開講筵國子司業褚無量執經唐㑹要𤣥宗開元七年先聖廟十哲皆坐圖七十子及二十二賢於壁從李元瓘請也二十二賢左丘明卜子夏公羊高榖梁赤伏勝高堂生戴聖毛萇孔安國劉向鄭衆賈逵杜子春馬融盧植鄭康成服虔何休王肅王弼杜預范甯也貞觀中詔配享尼父廟唐志開元七年十一月以貢舉人將謁先師質問疑義敕曰皇太子及諸子雖年未志學而道在尊師宜行齒胄禮開元七年皇太子入國學行齒胄禮謁先聖皇太子初獻其亞獻終獻並以胄子充常侍褚無量開講孝經及禮記文王世子篇開元十一年九月十一日敕春秋二時釋奠諸州依舊用牲牢屬縣酒脯而已開元十九年正月三十日敕春秋二時釋奠天下諸州縣並停牲牢唯用酒脯自今以後永為常式並唐㑹要開元二十七年詔夫子旣稱先聖可諡曰文宣王遣三公持節冊命以其嗣為文宣公任州長史代代勿絶先時孔廟以周公坐南面而夫子坐西牖下貞觀中廢周公祭而夫子位未改至是二京國子監天下州縣夫子始皆南面以顏回配於是二京之祭牲太牢樂宮懸舞六佾矣一縣之牲以少牢而無樂唐志開元二十八年二月五日敕文宣王廟春秋釋奠宜令三公行禮著之常式二十日國子祭酒劉瑗奏准故事釋奠之日羣官道俗皆合赴監觀禮請依故事著之常式制可之其儀具開元禮通典德宗建中元年二月國子司業歸崇敬奏上丁釋奠其日舊例合集朝官講論五經文義自天厯五年以前常行不絶其年八月已後權停講論今旣日逼恐須復舊依奏貞元二年二月釋奠自宰臣已下畢集於國學學官升講座陳五經大義及先聖之道貞元九年九月太常奏以十一月貢舉人謁先師合與親享太廟日同准六典上丁釋奠若與太祠同日即用仲丁其謁先師請别擇日從之貞元十五年四月歸崇敬為膳部郎中奏時議每年春秋二時釋奠祝版御署訖北面而揖臣以為其禮太重按大戴禮師尚父授周武王丹書武王東面受之請參酌輕重庶得其宜並唐㑹要憲宗元和九年禮部奏貢舉人謁先師自是不復行矣唐志宋朝太祖増修學舍親撰先聖及亞聖贊其十哲分命宰臣兩制已下撰贊建隆二年十一月禮部貢院移牒禮院云竊以千載昌朝聿興文教四方貢士皆集皇都祗謁先師素聞舊典爰及近代又廢其儀太學之盛禮未陳四國之羣儒安仰請檢詳儀制禮院准禮閤新儀云舊儀無貢舉人謁先師之文開元二十六年詔諸路貢舉人見訖就國子監謁先師官為開講質問疑議所司設食自後遂為常禮貢院遂議復行謁先師之祭自後每歲十一月必行此祭而貢舉人集焉無舉人即不祭真宗幸西京謁先聖咸平二年帝幸國子監謁先師並㑹要仁宗景祐元年詔釋奠用登歌之樂㑹要神宗元豐三年二月辛卯京兆府學教授蔣夔言春秋釋奠以孔子為先聖顏回為先師先聖之樽在西先師之樽在東肆祭器實牲體盥手濯爵奠幣讀祝拜讀登降進退之節與孔子無少異而九人之像坐於兩旁樽酒豆肉不及且孔子師也顔子雖大賢與九人者徒也乞下臣議於禮官薦享祝獻顔子降於孔子九人降於顔子以正開元之失禮詔禮院詳定禮官言唐顯慶二年長孫無忌議案永徽之令改周公為先聖孔子為先師漢魏以來取舍各異顏回夫子互作先師宣父周公迭為先聖今看詳孔子顔子稱號歴代各有據依難輒更改并配享正享禮意及儀物祝獻亦難降殺所乞進九人亦在祀典葢州縣舊釋奠儀未有十哲從祀之文檢熙寧祀儀十哲皆為從祀各設籩二豆二俎簋簠爵各一命官分獻一奠而止乞自今三京及諸州文宣王廟十哲像春秋釋奠並準熙寧祀儀從之長編哲宗元祐六年十月庚午朝獻景靈宫退幸國子監詣至聖文宣王殿行釋奠禮一獻再拜幸太學御敦化堂召宰臣執政官親王從臣賜坐禮部太常寺本監官承務郎以下三學生坐於東西廡侍講吳安詩執經國子祭酒豐稷講尚書無逸終篇復命宰臣以下二三學生坐賜茶國子監進書籍七十二部軸上命留論語孟子各一部遂幸昭烈武成王廟酌獻肅揖禮畢還内是日賜豐稷三品服本監官學官等賜帛有差先是范百禄轉對請視學故有是舉長編徽宗崇寧三年六月癸夘詔荆國公王安石配享孔子廟庭長編崇寧四年三月丁未禮部言常州進士孫天興言伏覩諸路州縣學校春秋上丁釋奠自先聖文宣王至於十哲其餘古今宗公巨儒係享祀者計八十餘員並未預祭欲乞應諸學校每遇釋奠日就先聖殿西廊隨例祭祀從之長編崇寧四年五月巳亥臣僚言國學至州縣學春秋釋奠皆習儀於先聖殿庭本欲致恭盡禮而反近於凟望自今習儀前期就學之講堂從之長編崇寧四年七月丁未禮部太常寺言邢州教授曽弼言孔子廟春秋釋奠自宣聖以至十哲禮物略具其他兩廡從祀薦獻蔑如也乞放太學制度頒其法於天下前一日守倅縣令率教官分獻官詣學齋宿躬親㸃檢今乞依曽弼所言並與國子監共修成外州軍釋奠儀注乞鏤板倣下從之如祭器不足以他物充代長編大觀四年九月丁丑禮部奏從祀文宣王公夏首等封爵詔公夏首封鉅平侯等一十人並封政和二年四月庚寅國子監言十哲從祀贊文有犯先聖名者合改撰從之長編政和四年四月戊辰詔諸路州軍學生習雅樂已精熟處春秋釋奠並許用從成都府路轉運副使周燾奏請也長編政和六年四月丙子新知遂寧府徐見可奏乞春秋釋奠於學諸生並依郊廟禮例給士服詔送制局詔㫖高宗紹興十四年三月己巳上幸太學祗謁先聖先師止輦於大成殿門外趨登降執爵灌獻注視貌像翼翼欲慕復覽太祖真宗徽宗所製贊文又命有司悉取從祀諸賢併録以進遂升堂頒手詔示樂育詳定之意賜諸生坐命國子司業高閎講易泰卦學官内外舍生推恩有差復幸養正持志二齋諸生肄業之所徘徊久之即除閎禮部侍郎言者以為盛事請宣付史館從之於是上親製文宣王贊曰大哉宣聖斯文在兹帝王之式古今之師志則春秋道由忠恕賢於堯舜日月其譽維時載雍戢此武功肅昭盛儀海宇聿崇閎奏曰陛下頒示御製宣聖贊文形容至德無愧於古上曰唐明皇作贊文乃斥先聖先師之名非尊儒重道之意閎曰此尤見聖學高於前代帝王之上旣又御製七十二子贊其序略曰朕兹幸太學延見諸生因作文宣王贊幾政餘閒歴取顔回而下七十二人亦為製贊僉刊石置於太學中興紀事奠者陳而奠之也鄭氏曰釋奠者設薦饌酌奠而已無迎尸以下事考之儀禮禮賓歸至于禰薦脯醢觴酒陳陳者所以奠之也則釋奠設薦饌酌奠而已可知也特牲饋食奠之於尸未至之前則釋奠無迎尸可知也古者釋奠或施於山川或施於廟社或施於學周官太祝大㑹同造於廟宜於社過大山川則用事焉反行舍奠甸祝舍奠於祖廟禰亦如之此施於山川廟社者也大司樂凡有道者有德者使教焉死則以為樂祖祭於瞽宗文王世子凡學春官釋奠於先師秋冬亦如之凡始立學者必釋奠於先聖先師及行事必以幣凡釋奠者必有合也天子視學大昕鼔徵乃命有司行事興秩節祭先師先聖焉有司卒事反命適東序釋奠於先老王制出征執有罪反釋奠於學以訊馘告此施於學者也山川廟社之祭不止於釋奠學之祭釋奠而已賈公彥曰非時而祭曰奠此為山川廟社而言之也學之釋奠則有常時者有非時者文王世子凡學春官釋奠於先聖先師秋冬亦如之鄭氏曰不言夏夏從春可知此常時之釋奠也凡始立學天子視學出征執有罪反以訊馘告必釋奠焉此非時之釋奠也釋奠之禮有牲幣有合樂有獻酬太祝造於廟宜於社過大山川則用事反則釋奠此告祭也曽子問曰凡告必用牲幣文王世子凡始立學釋奠行事必以幣此釋奠有牲幣之證也文王世子凡釋奠者必有合也此釋奠有合樂之證也聘禮觴酒陳席於阼薦脯醢三獻一人舉爵獻從者行酬乃出此釋奠有獻酬之證也然山川廟社之釋奠皆有牲幣學之釋奠非始立學則不必有幣也學之釋奠有合樂則山川廟社不必有合也聘賓釋菜有三獻則天子諸侯之於山川廟社不止三獻也凡始立學與天子視學釋奠於先聖先師四時則釋奠先師而已文王世子謂春釋奠於先師鄭氏釋王制亦謂釋奠禮先師其説是也然鄭氏以王制之釋奠為釋菜奠幣以文王世子之釋奠者必有合為與鄰國合孔頴達以學記之釋菜為釋奠其説誤也並禮釋菜周禮大胥春入學舍菜合舞鄭司農云古者士見於君以雉為摯見於師以菜為摯菜直為蔬食菜羮之菜鄭康成云舍即釋也始入學必舍菜禮先師也菜蘋藻之屬占夢季冬乃舍萌於四方以贈惡夢舎萌猶釋菜也儀禮上婚禮若舅姑旣沒則婦入三月乃奠菜以篚祭菜葢用席於廟奧東面右几席於北方南面祝盥婦盥於門外歸執笲菜祝帥婦以入祝告稱婦之姓曰某氏來婦敢奠嘉菜於皇舅某子婦拜扱地坐奠菜於几東席上還又拜如初婦降堂取笲菜入祝曰某氏來婦敢告於皇姑某氏奠菜於席如初禮婦出祝闔牖户詩采蘩曰于以采繁于沼于沚于以用之公侯之事于以采蘩南澗之中于以用之公侯之宫采蘋曰于以采蘋南澗之濱于以采藻于彼行潦于以盛之維筐及筥于以湘之維錡及釜于以奠之宗室牖下左傳茍有明信澗溪沼沚之毛蘋蘩薀藻之菜筐筥錡釜之器潢汙行潦之水可薦於鬼神可羞於王公禮記月令仲春上丁命樂正習舞釋菜文王世子始立學者旣釁器用幣然後釋菜不舞不授器乃退儐於東序一獻無介語可也學記皮弁祭菜示敬道也喪大記大夫士既殯而君往焉巫止於門外祝代之先君釋菜於門内周禮大胥春入學舍菜合舞學記皮弁祭菜示敬道也月令仲春上丁命樂正習舞釋菜文王世子始立學者既釁器用幣然後釋菜不舞不授器乃退儐於東序一獻無介語可也然則釋菜之禮猶摯也婦見舅姑其摯也棗栗腶脩若沒而廟見則釋菜弟子見師其摯也束脩若禮於先師則釋菜大胥釋菜合舞而文王世子釋菜不舞不授器者以釋奠旣舞故也士喪禮君視斂釋菜入門喪大記大夫士旣殯而君往焉釋菜於門内占夢季冬乃舍萌於四方舍萌釋菜也則釋菜之禮豈特子弟之見先師婦之廟見而已哉婚禮奠菜席於廟奥東面右几席於北方南面祝盥掃盥於門外婦執笲菜祝帥婦以入祝告稱婦之姓曰某氏來婦敢奠嘉菜於皇舅某子婦拜扱地坐奠菜於几東席上逺又拜如初婦降堂取笲菜入祝曰某氏來婦敢告於皇姑某氏奠菜於席如初禮記曰笲緇被纁裏加於橋葢婦菜盛以笲笲飾以緇被纁裏加之於橋橋設於門外婦盥執笲以入坐奠於東几上然則弟子之見先師其儀葢此類歟鄭氏謂婚禮奠菜葢用堇入學釋菜蘋藻之屬始立學釋菜芹藻之屬葢以泮宫有芹藻子事父母有革變故有是說也菜之為摯則菜而已采蘋教成之祭毛氏謂牲用魚芼之用蘋則詩所謂湘之者芼之也與釋菜異矣禮書唐太宗貞觀二十一年二月丁丑皇太子釋菜於太學宋朝徽宗大觀元年十一月丁巳大司成强闕等言自今每嵗貢士第一人並乞於正月公試鎖院前擇日引見及應貢士始入辟雍以元日釋菜於先聖從之長編政和六年閏正月丁酉詔高麗李生來歲元日隨貢士釋菜從提舉江南西路學事鄭滋奉請也長編羣書考索後集卷三十一
