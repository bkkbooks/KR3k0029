body:
  text: 羣書考索後集卷三十七宋章如愚編士門貢舉類祥符元年正月癸未詔禮部貢院諸科舉人雖初舉而材藝可取者與進場第上謂王旦等曰今兹舉人頗以糊名考較為懽然有才藝者皆喜於盡公旦曰諸路發解拘限程制慮遺俊秀當稍寛之馮拯曰比來省試但以詩賦進退不考文論江浙士子專業詩賦以取科第望令於詩賦人内兼考䇿論上然之三月庚辰晁逈等上合格進士諸科八百九十一人免解一百八十六人又學究二十二人得四通三史五人一通並凖格落下詔特奏名命給事中張秉等七人鎖宿於御事院覆考試卷遣守使監視考訖又送中看詳壬寅上御崇政殿親試進士仍録題摹印以示之初於殿廊設幔列坐席標其名姓又揭牓表其次序令視訖就坐命翰林李宗諤等八人為考官直史館張復等八人為覆考侍御周師望等二人糊名給事中張秉知制誥周起詳定等第上遍至幄次諭宗諤等務極精詳勿遺賢俊時南省下第舉人周叔良等百二十人訟知舉官朋附權吏抑塞孤寒之士勢家子弟四十餘人文學淺近不合奏名上曰貢舉謗議前代不免朕今召所謂勢家子弟者列坐就試旣而叔良所陳皆妄令配𨽻許州翌日又命宗諤等出諸科義題復令孫奭詳審以進刻板横本遣中使就坐給之宗諤上所定進士文卷詔宰相覆考訖乃臨軒賜進士姚曄等一百六人及第三人同出身十五人同三禮出身八十三人學䆒出身九經以下及第出身試御助教者六百五十二人先是謝恩始令釋褐是日特賜緑袍靴笏曄鄭州人也祥符二年五月辛酉詔權罷今年貢舉丁丑禮部貢院言凖詔議定國子監二京諸路五次解到舉人内取一嵗最多者為數自今解十之三永為定式詔於五年最多數中特解十之五六月庚戌上御崇政殿親試仍别錄本考較取玉篇中字為號如令第進士程試為五第曰上次曰中上曰中次曰下上曰次取考官覆考官所定試卷參較等第有不同者命再考之考訖又付右僕射張齊賢等詳審仍以高第十卷付宰相重定賜進士梁固等二十六人及第同出身者三人同三禮出身者二人九經五經三禮學究明法及第者四十八人同出身者六人第五人以下除官同元年牓固灝之子初以灝遺䕃進士出身服除詣登聞讓前命願赴鄉貢許之祥符三年五月癸未詔權停今年貢舉祥符四年五月庚寅詔諭諸道設科取士之意俾各盡至公或至遺材當行覆視其應解而不解不應解而解者並行朝典十一月庚午朔詔聞河朔諸州解送舉人難於考覈頗多謬妄令轉運使於落解舉人至多處遣官别加考試合格人送禮部甲戍詔河中府進士五舉諸州諸科終場七舉以上特許禮部奏名丙子上御崇政殿親試進士扣殿檻請諭詩賦論目所上令録示之始令賦論中不得用小臣儒有字又以冬晝景短罷常務不决即令引試内出新定條制舉人納卷内臣收之先付編排官去其卷首鄉貫狀以字號第之付封彌官謄寫校勘用御書院印始付考官定等級復封彌付覆考官再定等編排官閲其同異未同者再考之如復不同即以相附近者為定始取鄉貫狀字號合之乃第其姓名差次并試卷以聞遂臨軒唱第其考第之制學識優長詞理精絶為第一等才思該通文理周密為第二等文理俱通為第三等文理中平為第四等文理疎淺為第五等自餘率如貢院舊制賜進士張師徳等十一人及第十人同出身諸科及第者四十二人同出身者八人師徳去華子也辛巳詔自今知貢舉及發解官並令門辭遣官伴入院不得更求上殿及進呈題目祥符五年正月癸酉命翰林晁逈樞密直學士劉綜知制誥李維待詔孫奭同知貢舉上作詩諭以論材之意始遣内臣一員承受奏報二月癸丑上謂宰臣曰聞貢院試諸科舉人皆解衣閲視慮其挟藏書冊頗失取士之體宜令止之先是直史館劉鍇請挟書并同保人殿一舉是嵗諸科以挾書扶出者十八人并同保九十三人而十二人當奏名有司以聞上特令赴殿試乃詔禮部别加裁定罷同保殿舉之制三月癸未詔禮部奏名人隠慝服紀者並令自陳毋得輙赴殿試己丑上御崇政殿親試禮部合格貢士人殿之廊廡分列位次署其名氏仍揭於牓使無得遷易始摹印詩賦論題以賜官給紙起草得進士建安徐奭而下及第者百人同出身者二十六人諸科及第者三百三十四人同出身者五十二人丁酉上封者言進士蕭立之本名琉嘗因賭博抵杖刑今易名赴舉登第詔有司召立之詰問立之引伏奪其敕贖銅四十斤遣之五月戊辰朔詔禮部權停今年貢舉祥符六年五月辛卯詔權罷今嵗貢舉祥符七年二月壬申舉人因事殿舉及永不得入科場不經刑責者許将來依例取解自後大赦率下此制五月甲午上因言開寳中舉人陛見有以武勇求較勝負王旦曰太祖英武之徳賢不肖共知科場無藝者往往以挽强善騎自陳太祖勉從之縱有司程以名第不過貢之州縣切宋凖有文行釋褐即除授校書郎直史館盖神機聖鑒非常人之所測也七月戊子知開封府王曙言本府解送舉人承前每場以過落姓名及奏牒送府印頗涉漏泄自今望給奉使一印從之辛卯開封府考試舉人舊例試官更互封彌卷首直集賢院楊侃等請别差官從之庚子詔益州舉人自今薦送定名外别解三人以其逺方多學者故優之八月丙子詔自今差發解知貢等授敕訖即令閤門祗候一人引送鎖宿無得與僚友交言違者閤門具奏如所乘馬未至即以廐馬給之九月戊戌上御景福殿試亳州南京路服勤辭舉經明行修舉人得進士張觀等二十一人諸科二十一人賜及第除官如東封西祀例觀絳人也絳州非宋亳路當考張觀得官當是國子監及開封府薦送實録偶不詳耳當云試亳州南京路及開封府國子監所薦送上謂宰相曰近嵗舉人文藝頗精孤寒得路然為主司者亦大不易徇請求則害公絶薦託則獲謗王旦曰今郡縣至廣人數亦繁必須臨軒親試至於南省發解非朝廷特為主張則雖責成主司亦難以集事也乙巳初開封府解服勤辭學進士二十五人為下第者劉溉所訟其十三人以寓貫皆奔竄潛匿有司追捕王旦奏曰陛下比降恩詔搜羅才俊今乃變為囚繫恐傷風教且科舉之設本待賢徳此輩操行如此望特出宸斷以懲薄俗上曰此葢當時官司不曾曉諭致此過誤其寓貫者當並釋罪溉付外州覊管丁未詔自今舉人如本貫顯無户籍及離鄉已久者許召官保明於開封府投牒職解冬十月乙亥詔諸州解送舉人内黜落多處宜令本州選官覆試取藝業優長者送禮部以二月一日為限進士諸科以曾經殿試并河北陜西諸科曽經終場及他州兩經終場下第者悉免取解祥符八年春正月甲午命兵部侍郎修國史趙安仁知禮部貢舉翰林學士李維知制誥盛度劉筠同知上覽諸道貢舉人數减於常嵗因曰外郡官吏未體朕意耶比者詔命累下但戒其徇私爾若􅀎精擇寒俊雖多何害又曰聞所試諸科六通已上卷中小有㸃汙粘綴若記驗者即駁放茍實緣誤失亦可憫也當諭主司勿即駁放次場靣試以辨其真偽是嵗始置謄錄院令封印官封所試卷付之集書吏録本諸司供帳内侍二人監焉命京官校對用兩京奉使印訖復送封印院始送知舉官考校置謄録院實録未見疑本脱當考其月日二月丙辰詔諸科舊舉人宜復場後引試考校經御試者終場引試考校丙子詔禮部貢院進士六舉諸科九舉以上雖不合格並許奏名三月戊戌趙安仁等上禮部合格人數姓名上顧謂宰相曰今嵗舉場似少謗議安仁等適對朕亦以此語之矣王旦曰條式備具可守而行至公無私其實由此癸卯上御崇政殿覆試命所黜落又疑所㸃抹者或未當命宰相閲視之旦曰考官過為艱難公在其中矣於是得選士蔡齊以下百九十七人並賜及第六人同出身又賜六舉以上特奏名進士七十八人同三禮出身賜諸科三百六十三人及第同出身試将作監主簿除官如元年之制齊等旣考定上顧問王旦等曰有知姓名者否皆曰人無知者真所謂搜求寒俊也故事當賜第必召其高第數人並見又參擇其材質可者然後賜第一時新喻人蕭貫與齊並見齊儀狀秀偉舉止端重上意已屬之知樞密院冦凖又言南方下國人不宜冠多士齊遂居第一上喜謂凖曰得人矣特詔金吾給七騶出兩節傳呼因以為例凖性自矜尤惡南人輕俊旣出謂同列曰又與中原奪得一狀元齊膠水人也四月乙卯命翰林學士陳彭年以趙安仁等知貢舉起請事件著于式先是懐衛濵州以部内官屬少進士登科者因舉數州進士都試之乃詔自今諸州發解知之試官宜令轉運司選鄰州官充不得移舉人就他州併試辛未以監察御史李仲容為右司諫直史館上之親試進士也内出詩賦論題先令考官折其義仲容所對頗詳備上嘉之特命中書召試而有授焉五月癸未詔罷貢舉一年九年五月丁未詔權停貢舉天禧元年五月辛丑詔禮部權停今年貢舉九月甲寅詔自今特㫖召試者並問時務䇿一道仍别試賦論或雜文一首癸亥右正言魯宗道言進士所試詩賦不近治道諸科對義但以念誦為工罔䆒大義上謂輔臣曰前已降詔進士兼取䇿論諸科有能明經者别與考校可申明之天禧二年九月壬午右正言劉􅁮言今嵗秋試食禄之家鏁㕔應舉者頗衆望諭中外自今食祿家弟姪子孫若文藝必可程試者不得就資䕃其有官者不得與孤寒競進詔不許但令天下精加考校天禧三年正月丁卯翰林學士錢維演四人權同知貢舉乙亥諸路貢舉人郭稹等四千三百人見于崇政殿時稹冒緦䘮赴舉為同輩所訟上命典謁詰之稹即引咎付御史臺劾問殿三舉同保人並贖金殿一舉時有司欲脱宋城王洙問洙曰果保稹否不然可易也洙曰保之不願易也遂與稹俱罷王洙本傳云稹冒祖母禫墓銘作母禫今從實録郭稹有傳祥符人恐此别是一人也京西轉運使胡則言湯州進士楊世質等訴本州黜落即取元試卷付許州通判崔立有訴立以為世質等所試不至紕繆已牒滑州依前解發詔轉運司具析不先奏裁直令發解縁由以聞其試卷仰本州繳進世質等仍未得解發及取到試卷詔貢院定奪乃言詞理低次不合充薦詔落世質等而劾轉運使乃崔立之罪立鄢陵人也天禧三年三月壬戍詔南京下第舉人内曽經御試及諸科七舉終場者特以名聞丙寅上御崇政殿親試禮部奏名貢舉人作詩賜考校官令皇子傳示宰相得進士王整以下六十三人賜及第八十六人同出身又賜學䆒出身者一十三人諸科及第者一百二人同出身者四十七人試將作監者五人除官如前例王整魏人登科記云明道元年十月庚子録王旦孫整為正字恐此及第者非魏人或是贄子乙卯工部郎中陳堯佐右正言陳執中並奪一官堯佐為起居郎依前直史館監鄂州茶場執中為衛尉丞監岳州酒税初上累定考試條制舉人納試即先付編排官去其卷首鄉貫状以號第之封彌官謄冩校勘始付考官再定等訖復封彌送覆考官再定等乃送詳定官訖且閲其同異名驗著定始付編排官取鄉貫狀字號合之即第其姓名差次并試卷以聞遂臨軒放牓焉大抵欲考校詳定官不獲見舉人姓名書翰編排官雖見姓名而不復升降用絶情弊而堯佐執中為編排官不詳此制復改易其差級差日内廷覆驗多所同異遂悉付中書命直龍圖閣馮元太子右諭徳魯宗道閲視仍召堯佐執中洎考校詳定官對辨之堯佐等具伏王欽若等言堯佐等所犯誠合嚴譴若屬吏議其責尤重請止據罪降黜從之而宗道又請以堯佐等妄去留者明諭貢舉人乃詔禮部揭牓貢院其元定合格為編排誤落者並賜附牓及第元定不合格誤編排及第者並追敕更令修學元定稍及第者量免省試凡已落復及第者進士諸科各二人免省試者進士十四人諸科二十三人已及第出身而追奪者二十一人本志云先是編排官兼詳定仍須㸃檢差失是嵗分編排詳定為二而堯佐執中不詳詔意得詳定試卷復更升降放及第畢禁中參驗多所同異故堯佐執中坐黜責與實録所載差别今但從實録嘗考王舉正誌堯佐墓云編次文卷有差舛宰相王欽若持其事降秩左司茗𣙜於鄂渚未至丁内艱天禧四年正月庚辰詔三京諸州取進士諸科三舉已上曾經御試無罪犯者量試藝業揀材質書禮解送赴闕當議於班行録用如經御試者數少許即選五舉以上南省終場下第人充三月壬申先是詔以近年開封府舉人稍多屢致詞訟令翰林學士承㫖晁逈等議定條約於是逈等上言諸州舉人多以身有服制本貫難於取解奔凑京轂寓籍充試人數旣衆混而為一有司但考其材藝解送之際本府土著登名甚少交起喧競亦由於此欲請自今有朞周卑幼以下服者聼取文解寄應舉人實無户籍者許召官保任於本府户籍人數外别立分數薦送詔從之仍取大中祥符七年寄貫人數中進士解十之三諸科十之五癸酉詔川峽廣南諸州自今依先定條制解合格舉人外更有二人可取者悉許薦送本志不及廣南當考合格人元數四月甲寅詔禮部權停貢舉一年六月壬寅上御崇政殿親試禮部奏名舉人命考官覆如常例授三班奉職者九十二人借職者十三人其不合格者補諸州上佐文學自奉職至殿侍悉免短使與家便差遣九月庚午先是詔翰林學士劉筠等試諸州續解進士辛未筠等上奏名凡五十六人其十九人授三班奉職二十九人借職八人當授諸州長吏司馬特補借職並與家便差遣天禧五年五月丁丑詔禮部權停今年貢舉乾興元年五月辛未詔權停貢舉仁宗天聖元年秋七月戊辰詔禮部貢院舉人有期親卑幼及大功以下服者並聼應舉十一月己未降侍御史髙弁為太常博士職方員外郎吳濟為都官員外郎太常丞直集賢院胥偃為著作佐郎監察御史王軫為太常博士監兗州漣水光化軍郢水酒税左正言劉隨罰銅五斤初弁等為開封府官舉人訟其考試不公上以得解進士三十八人䇿論命秘閣封彌卷首送翰林學士晏殊覆考殊言舉人作詞以規覆考頗虧士風因聽止取訟者試卷看詳弁與濟偃乃坐擅拆舉人卷首適有名居上軫為封彌官而不以聞聼坐舉人以䇿辭相授隨廵捕官而不能察故有是命偃長沙人也吳濟未詳劉隨正傳乃云隨坐此責監濟州税與實録不同正傳葢因宋祁墓誌按隨後數論事未嘗出也今從實錄天聖二年春正月甲午詔禮部貢院開封府國子監及别頭各增置㸃檢試卷封彌廵鋪監門官有差開封府舉人無户籍者召有出身京朝官保二人無出身曾歴任者保一人外州召命官使臣為保不得過一人所保不實以違制論舉人兩處取解及犯徒而嘗以䕃贖者永不得入科場同保人殿五舉其殿三舉者實殿一舉五舉殿二舉進士不得以押韻入試罷諸科舊人别院試者聽至復場入試其被黜而毁謗主司及投匿名文字令所在收捕之即主司不公許单名以吿不得期集連狀廣南東西益梓利䕫路舊制於額外有合格者亦聴舉送如聞比来冒籍者多自今毋得人外發解時承平嵗乆天下貢士益衆間起爭訟故條約之癸酉命御史中丞劉筠等四人權知貢舉庚戌詔貢舉如咸平二年故事令禮部放榜仍先具合格等第字號以聞辛亥知貢舉劉筠等請差覆考及詳定官上曰非所以責成之意也詔筠等依公考校廵鋪官左正言孔延魯又請未試前令主司曉諭舉人不得上請仍雕印試題分明解説就試卷内散上曰文闈取士條約已多只依舊例施行可也二月庚午上謂王欽若曰久罷貢舉慮遺天下賢俊宜令禮部貢院精加校試将來放進士特增至二百人諸科三百五十八人三月戊子朔詔禮部諸科舉人不能對䇿者未得退落先是上封者言經學不䆒經㫖乞於本科問䇿一道至是對者多紕繆帝以執經肄業不善為文特令取其所長用廣仕路癸卯禮部上合格進士姓名詔翰林學士晏殊龍圖閣直學士馮元排等第乙巳御崇政殿賜宋郊葉清臣鄭戩等一百五十四人及第四十六人同出身不中格者六人以嘗經真宗御試特賜同三禮出身丙午又賜諸科一百九十六人及第八十一人同出身郊與其弟祁俱以碑賦得名禮部奏祁名第三太后不欲弟先兄乃推郊第一而置祁第十劉筠得清臣所對䇿竒之故推第二宋朝以䇿擢高第自清臣始壬子賜鄉貢進士張瓌太常寺太祝吕宗簡進士及第仍附春榜瓌洎孫宰臣王欽若女壻宗簡參知政事夷簡弟也四月庚辰以特奏名進士李道宗等四十三人諸科王播等七十七人為将作監主簿及諸州長史文學司七參軍道宗等皆年踰五十嘗應六舉王播等皆年踰六十嘗應八舉因謂輔臣曰此雖學業非工然憫其白首無成故悉甄録之天聖三年五月癸未禮部言今年貢舉乞賜指揮上謂輔臣曰去嵗放及第人數不少然而覽其程試多未盡善今宜權罷貢舉各令勵志修學王曾對曰前来逺方下第舉人方到鄉里今若復許隨計何暇温習事業即降詔權停貢舉一年五月初二日癸未此據㑹要八月辛亥知益州薛田言本州發解舉人自張詠以來例給館劵至京師今得三司移文乃責吏人償所給官物恐非朝廷之意上曰漢貢士皆郡國續食今獨不能行之逺方耶其令悉蠲之天聖四年五月己卯詔禮部貢舉進士實應二舉諸科五舉並免取解己亥詔舉人雖文辭可採而操檢不修者州郡毋得薦送辛未詔增西川廣南東西路諸州軍進士解額有差又詔命官鎻㕔應舉自今更不先試所業下第者免責罰仍聽再舉其厯任有贓私罪及停廢責降衝替未經叙用人即不許應舉舊制鎻㕔應舉者先於所屬選官考試所業方聽取解至禮部程文紕繆者勒停其不及格者猶贖銅永不得應舉至是上欲開誘進士之路下近臣參議而降是詔下第免責景祐元年四月又有詔葢此專指下第者彼又及不得解者八月戊子命官考試開封府國子監舉人宰臣王曽等因言自唐以來遴選儒臣授以文柄可否進退委自攸司或升黜之間不副公議即覆行考試嚴加懲責比來條目繁密闗防周至善則善矣然於推心委任求賢㧞俊之理恐未允惬今言事者必曰此皆先朝舊規不可輕議改革殊不知先帝孜孜選士務要盡心思皇之念本不如此蓋當時近臣不悉淵𠂻罔知大體有此擘畫更乞聖慈漸次體當事理他後别加詳定上從之九月庚申詔禮部貢院舉人有能通三經者量試講説特以名聞當議甄擢之十月乙酉詔進士諸科嘗經先朝御試而今不預薦者許就省試己亥詔天僖中舉人補三班使臣者聽換文職天聖五年正月癸丑命樞密直學士禮部侍郎劉筠權知貢舉中書初議擇官上曰劉筠可用也筠時在潁川遂驛召之己未詔禮部貢院比進士以詩賦定去留學者或病聲律而不得騁其才其以䇿論兼考之諸科毋得離摘經注以為問目又詔進士奏名勿過五百人諸科勿過千人三月辛酉御崇政殿試禮部奏名進士仍命翰林學士宋綬以下二十六人為殿後封彌謄録考覆詳定編排官如先朝舊制壬戌試諸科甲子詔進士五舉年五十諸科七舉及六舉終場年六十淳化以前嘗應舉及經先朝御試者不以舉數令貢院别具名以聞乙丑賜進士王堯臣等一百九十七人及第八十三人同出身七十一人同學䆒出身二十八人御試丙寅賜諸科及第并出身者又六百九十八人四月癸酉試特奏名進士及諸科甲戌賜同出身及御試者凡三百四十二人尋下詔戒諭諸道舉人宜奮勵詞學勿坐視嵗月冀望恩澤天聖七年六月甲辰詔鎻㕔舉人自今在京有職事無職事已罷未赴並聽於國子監開封府取解外任者聽於别州仍先取㫖文臣許兩應武臣止一十一月庚午上封者言今嵗開封府舉進士者至千九百餘人多妄冒户籍請條約之癸酉詔舉人有開封府户籍七年以上不居他處者聽解取雖無户籍亦不曽占名他州者先經所屬投牒察訪行實召京朝官二人保之違犯則保官以違制論其外州寄應者悉令還本貫與理舊舉場第若犯賂而妄冒鄉貫三代者以違制失論不以䕃贖天聖八年正月丙寅命資政殿學士晏殊權知禮部貢舉二月甲子御崇政殿試禮部奏名進士丙寅試諸科丁卯賜進士王拱壽等二百人及第四十九人同出身己巳賜諸科及第同出身者又五百七十三人拱壽咸平人也詔更其名曰拱宸六月乙巳詔禮部貢院治尚書周易二經者自今皆分場考試明法以七同以上為合格時言者謂書易本兩科先朝并為一每經各問義五道舉人或偏習一經對及五同已為合格又明法科所對止取六同書少而易習請益以一經故更定之天聖九年三月己巳詔權停貢舉羣書考索後集卷三十七
