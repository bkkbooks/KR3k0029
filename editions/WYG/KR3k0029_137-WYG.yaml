body:
  text: 羣書考索續集卷六宋章如愚編經籍門詩作詩之由論詩之所以為教或有問於余曰詩何為而作也余應之曰人生而静天之性也感於物而動性之欲也夫既有欲矣則不能無思既有思矣則不能無言既有言矣則言之所不能盡而發於咨嗟咏嘆之餘者必有自然之音響節奏而不能已焉此詩之所以作也曰然則其所以教者何也曰詩者人心之感物而形於言之餘也心之所感有邪正故言之所形有是非惟聖人在上則其所感者無不正而其言皆足以為教其或感之之雜而所發不能無可擇者則上之人必思所以自反而因有以勸懲之是亦所以為教也昔周盛時上自郊廟朝廷而下達於鄉黨閭巷其言粹然無不出於正者聖人固已叶之聲律而用之鄉人用之邦國以化天下至於列國之詩則天子廵狩亦必陳而觀之以行黜陟之典降自昭穆而後寖以陵夷至于東遷而遂廢不講矣孔子生於其時既不得位無以行帝王勸懲黜陟之政於是特舉其籍而討論之去其重複正其紛亂而其善之不足以為法惡之不足以為戒者則亦刋而去之以從簡約示乆逺使夫學者即是而有以考其得失善者師之而惡者改焉是以其政雖不足行於一時而其教實被於萬世是則詩之所以為教者然也曰然則國風雅頌之體其不同若是何也曰吾聞之凡詩之所謂風者多出於里巷歌謡之作所謂男女相與詠歌各言其情者也惟周南召南親被文王之化以成徳而人皆有以得其性情之正故其發於言者樂而不過於滛哀而不過於傷是以二篇獨為風詩之正經自邶而下則其國之治亂不同人之賢否亦異其所感而發者有邪正是非之不齊而所謂先王之風者於此乎變矣若夫雅頌之篇則皆成周之世朝廷郊廟樂歌之詞其語和而莊其義寛而密其作者往往聖人之徒固所以為萬世法程而不可易者也至於雅之變者亦皆一時賢人君子閔時病俗之所為而聖人取之其忠厚惻怛之心陳善閉邪之意猶非後世能言之士所能及之也詩之為經所以人事浹於下天道備於上而無一理之不具也曰然則其學之也當奈何曰本之二南以求其端參之列國以盡其變正之於雅以大其規和之於頌以要其止此學詩之大㫖也於是乎章句以剛之訓詁以紀之諷詠以昌之涵濡以體之察之情性隠㣲之間審之言行樞機之始則修身齊家平均天下之道其亦不待他求而得之於此矣文公文集詩思無邪詩三百一言以蔽之曰思無邪凡詩之言善者可以感發人之善心惡者可以懲創人之逸志其用歸於使人得其情性之正而已然其言微婉且或各因一事而發求其直指全體則未有若此之明且盡者故夫子言詩三百篇而惟此一言足以盡蓋其義其示人之意亦深切矣程子曰思無邪者誠也范氏曰學者必務知要知要則能守約守約則足以盡愽矣經禮三百曲禮三千亦可以一言蔽之曰毋不敬文公語録詩六義一曰風二曰賦三曰比四曰興五曰雅六曰頌風雅頌者聲樂部分之名也風則十五國風雅則大小雅頌則三頌也賦比興則所製作風雅頌之體也賦者直陳其事如葛覃卷耳之類是也比者以彼状此如螽斯緑衣之類是也興者託物興詞如關雎兎罝之類是也葢衆作雖多而其聲音之節製作之體不外乎此故太師之教國子必使之以是六者三經而三緯之則凡詩之節奏指歸皆将不待講説而直可吟詠以得之矣六者之序以其篇次風固為先而風則有賦比興矣故三者次之而雅頌又次之葢亦以是三者為之也然比興之中螽斯專於比而緑衣兼於興兎罝專於興而關雎兼於比此其例中又自有不同者學者亦不可以不知也文公集注詩之教以詩為教能使人興於善而戒於惡又入人深而見功速女正位乎内男正位乎外夫婦之常也孝者子之所以事父敬者臣之所以事君詩之始作多發於男女之間而逹於父子君臣之際故先王以詩為教使人興於善而戒其失所以道夫婦之常而成父子君臣之道也三綱既正則人倫厚教化美而風俗移矣事有得失詩因其實而諷詠之使人有所創艾興起至其和平怨怒之極又足以逹於隂陽之氣而致祥召灾葢其出於自然不假人力是以入人深而見功速非它教之所及也文公集注詩之風上以風化下下以風刺上風者民俗歌謡之詩如物被風而有聲又因其聲以動物也上以風化下者詩之美惡其風皆出於上而被於下也下以風刺上者上之化有不善則在下之人又歌詠其風之所自以譏其上也凡以風刺上者皆不主於政事而主於文詞不以正諫而託意以諫若風之被物彼此無心而能有所動也文公集註詩雅鄭不同部夫子所以不刪桑濮之詩者欲以垂戒於後世非欲與雅樂並奏也或者曰詩三百篇皆雅樂也祭祀朝聘之所用也桑間濮上之音鄭衞之樂也世俗之所用也雅鄭不同部其來尚矣且夫子答顔淵之問於鄭聲亟欲放而絶之豈其刪詩乃録淫奔者之辭而使之合奏於雅樂之中乎亦不然也雅者二雅是也鄭者緇衣以下二十一篇是也衞者􅆁鄘衞三十九篇是也桑間衛之一篇桑中之詩是也二南雅頌祭祀朝聘之所用也鄭衞桑濮里巷狹邪之所歌也夫子之於鄭衛葢深絶其聲於樂以為法而嚴立其詞於詩以為戒如聖人固不語亂而春秋所記無非亂臣賊子之事葢不如是無以見當時風俗事變之實而垂監戒於後世故不得已而存之所謂道並行而不相悖也今不察此乃欲為之諱其鄭衞桑濮之實而文之以雅樂之名又欲從而奏之宗廟之中朝廷之上則未知其將以薦之何等之鬼神用之何等之賔客而於聖人為邦之法又豈不為陽守而陰叛之耶其亦誤矣文公經説詩體不同變風變雅乃觀民風者存之訓戒後世不必謂三百篇皆雅樂而皆祭祀賔客之所用詩體不同固有鋪陳其事而不加一詞而意自見者然必其事之可言若清人之詩是也至於桑中溱洧之篇則雅人莊士有難言之者矣孔子之稱思無邪以為詩三百篇勸善懲惡雖其要歸皆出於正然未有若此言之約而盡者耳非以作詩之人所思皆無邪也今必曰彼以無邪之思鋪陳滛亂之事而閔惜懲創之意自見於言外則曷若曰彼雖以有邪之思作之而我以無邪之思讀之則彼之自状其醜者乃所以為吾警懼懲創之資耶而况曲為訓説而求其無邪於彼不若反而得之於我之易也巧為辨説而歸無邪於彼不若反而責之於我之切也若夫雅也鄭也衛也求之諸篇固各有其目矣雅則大雅若干篇是也鄭則鄭風若干篇是也是則自衛反魯以來未之有改而風雅之篇説者又有正變之别焉至於桑中小序政散民流而不可止之文與樂記合則是詩之為桑間又不為無所據者今必曰三百篇皆雅而鄭風不為鄭邶鄘衛之風不為衛桑中不為桑間亡國之音則其篇帙混亂邪正錯揉非復孔子之舊矣且於小序之無稽可笑者猶篤信之而於其有據者反不之信此又何耶夫二南正風房中之樂也鄉樂也二雅之正雅朝廷之樂也商周之頌宗廟之樂也是或見於序又或出於𫝊記皆有可考至於變雅則固已無施於事而變風又特里巷之歌其領在樂官者以為可以識時變觀土風而賢於四夷之樂耳今必曰三百篇皆祭祀朝聘之所用則未知桑中當薦何等之鬼神溱洧當接何等之賔客耶葢古者天子廵狩命太師陳詩以觀民風固不可問其美惡而悉存以訓也然其與先王雅頌之正篇秩不同施用亦異如前所陳則固不免於龎雜矣今於雅鄭之實察之既不詳於龎雜之名畏之又太甚顧乃引夫滛放之鄙詞而又以風刺之美説必欲强而置諸先王雅頌之列是乃反為龎雜之甚而不自知也夫以夷樂與鄭衛合奏猶曰不可而况强以桑中溱洧為雅樂又欲合於鹿鳴文王清廟之什而奏之宗廟之中朝廷之上乎其以二詩為猶止於中聲者太史公所謂孔子皆絃歌之以求合於韶武之音其誤葢亦如此然古樂既亡無所考正則吾不敢必為之説獨以其理與其詞推之有以知其必不然耳又以為近於勸百諷一而止乎禮義則又信大序之過者夫有所謂諷者若漢廣知不可而不求大車有所畏而不敢則猶有所謂禮義之止也若桑中溱洧則吾不知其何詞之諷而何禮義之止乎哉若曰孔子嘗欲放鄭聲矣不當於此而又收之以備六籍也此則曽南豐於戰國策劉元城於三足之論皆嘗言之又豈俟吾言而後白也哉大抵吾説之病不過得罪於桑間洧外之人而其力猶足完先王之樂彼説而善則二詩之幸而雅樂之不幸甚矣抑且於溱洧而取范氏之説則又似以鄭詩為鄭聲者豈理之自然固有不可奪者耶因讀桑中之説而惜前論之不及竟又痛伯共父之不可作也因書其後以為使伯恭父而聞此雖未必遽以為然亦當為我逌然而一嘆也嗚呼悲夫文公經説詩序之辨詩之小序出於漢儒非孔子子夏所作詩序之作説者不同或以為孔子或以為子夏或以為國史皆無明文可考唯後漢書儒林𫝊以為衛宏作毛詩序今𫝊於世則序乃宏作明矣然鄭氏又以為諸序本自合為一編毛公始分以寘諸篇之首則是毛公之前其傳已久宏特増廣而潤色之耳故近世諸儒多以序之首句為毛公所分而其下推説云云者為後人所益理或有之但今考其首句則已有不得詩人之本意而肆為妄説者矣况㳂襲云云之誤哉然計其初猶必自謂出於臆度之私非經本文故且自為一編别附經後又以尚有齊魯韓氏之説並𫝊於世故讀者亦有以知其出於後人之手不盡信也及至毛公引以入經乃不綴篇後而超冠篇端不為注文而直作經字不為疑辭而遂為决辭其後三家之𫝊又絶而毛説孤行則其牴牾之迹無復可見故此序者遂若詩人先所命題而詩文反為因序以作於是讀者轉相尊信無敢擬議至於有所不通則必為之委曲遷就穿鑿而附合之寕使經之本文遼戾破碎不成文理而終不忍明以小序為出於漢儒也愚之病此乆矣然猶以其所從來也逺其間容或真有𫝊授証驗而不可廢者故既頗采以附𫝊中而復并為一編以還其舊因以論其得失云文公詩傳詩之𫝊授詩之𫝊授愈久愈多異同至東萊吕氏而後衆説該貫其義大明詩自齊魯韓氏之説不得𫝊而天下之學者盡宗毛氏毛氏之學𫝊者亦衆而王述之類今皆不存則推衍説者又獨鄭氏之箋而已唐初諸儒為作䟽義因訛踵陋百千萬言而不能有以出乎二氏之區域至於本朝劉侍讀歐陽公王丞相蘇黄門河南程氏横渠張氏始用已意有所發明雖其深淺得失有不能同然自是之後三百五篇之㣲辭奥義乃可得而尋繹葢不待講於齊魯韓氏之𫝊而學者已知詩之不専於毛鄭矣及其既乆求者益衆説者愈多同異紛紛爭立門户無復推讓祖述之意則學者無所適從而或反以為病今觀吕氏家塾之書兼緫衆説巨細不遺挈領提綱首尾該貫既足以息夫同異之爭而其述作之體則雖融㑹通徹渾然若出於一家之言而一字之訓一事之義亦未嘗不謹其説之所自及其斷以己意雖或超然出於前人意慮之表而謙讓退托未嘗敢有輕議前人之心也嗚呼如伯恭父者真可謂有意乎温柔敦厚之教矣學者以是讀之則於可羣可怨之㫖其庶幾乎東萊讀詩記序詩禮樂興於詩學之始也立於禮學之中也成於樂學之終也詩本性情有邪有正其為言既易知而吟詠之間抑揚反覆其感人又易入故學者之初所以興起其好善惡惡之心而不能自已者必於是而得之禮以恭敬辭遜為本而有節文度數之詳可以固人肌膚之㑹筋骸之束故學者之中所以能卓然自立而不為事物之所揺奪者必於此而得之樂有五聲十二律更唱迭和以為歌舞八音之節可以養人之情性而蕩滌其邪穢消融其渣滓故學者之終所以至於義精仁熟而自和順於道徳者必於此而得之是學之成也按内則十歲學㓜儀十三學樂誦詩二十而後學禮則此三者非小學𫝊授之次乃大學終身所得之難易先後淺深也程子曰天下之英才不為少矣特以道學不明故不得有所成就夫古人之詩如今之歌曲雖閭里童穉皆習聞之而知其説故能興起今雖老師宿儒尚不能曉其義况學者乎是不得興於詩也古人自洒掃應對以至冠昏䘮祭莫不有禮今皆廢壊是以人倫不明治家無法是不得立於禮也古人之樂聲音所以養其耳采色所以養其目歌詠所以養其性情舞蹈所以養其血脈今皆無之是不得成於樂也是以古之成材也易今之成材也難文公論語集註曰詩者樂之章也故必學樂而後誦詩所謂樂者葢琴瑟塤箎樂之一物以漸習之而節夫詩之音律者也然詩本於人之情性有美刺風喻之㫖其言近而易曉而從容詠嘆之間所以漸漬感動於人者又為易入故學之所得必先於此而有以發起其仁義之良心也至於禮則有節文度數之詳其經至於三百其儀至於三千其初若甚難强者故其未學詩也先已學㓜儀矣葢禮之小者自為童子而不可闕焉者也至於成人然後及其大者又必服習之乆而有得焉然後内有以固其肌膚之㑹筋體之束而徳性之守得以堅定而不移外有以行於鄉黨州閭之間逹於宗廟朝廷之上而其酧酢之際得以正固而不亂也至於樂則聲音之髙下舞蹈之疾徐尤不可以旦暮而學其所以養其耳目和其心志使人淪肌浹髄而安於仁義禮智之實又有非思勉之所及者必其甚安且乆然後有成其徳焉所以學之最早而其見效反在詩禮之後也文公論語或問詩樂詩出乎志樂出乎詩志者詩之本而樂其末也不當以聲求詩詩之作本為言志而已方其詩也未有歌也及其歌也未有樂也以聲依永以律和聲則樂乃為詩而作非詩為樂而作也三代之時禮樂用於朝廷而下逹於閭巷學者諷詠其言以求其志詠其聲執其器舞蹈其節以涵養其心則聲之所助於詩者為多然猶曰興於詩成於樂其求之固有序矣是以凡聖賢之言詩主於聲者少而發其義者多仲尼所謂思無邪孟子所謂以意逆志者誠以詩之所以作本乎其志之所存然後詩可得而言也得其志而不得其聲者有矣未有不得其志而能通其聲者也就使得之止其鐘鼓之鏗鏘而已豈聖人樂云樂云之意哉况今去孔孟之時千有餘年古樂散亡無復可考而欲以聲求詩則未知五樂之遺聲今皆可推而得之乎三百五篇皆可恊之音律而被之絃歌已乎誠既得之則所助於詩多矣然恐未得為詩之本也况未必可得則今之所講得無有畫餅之饑乎故愚意竊以為詩出乎志者也樂出乎詩者也然則志者詩之本而樂者其末也末雖亡不害本之存患學者不能平心和氣從容諷詠以求之情性之中耳有得乎此然後可得而言顧所得之淺深如何耳有舜之文徳則聲為律而身為度簫韶二南之聲不患其不作此雖未易言然其理葢不誣也文公文集詩有正變美刺聖人著書立言葢善惡必録有善則極其所至者稱之有惡則併其情而状之可言者言之凡以示夫勸懲而已矣然而醜亂之極帷幕之私言之於他書已非大雅君子之所欲况詩則非徒使人誦之而已復使人歌之非特使人歌之而已復使人舞之以其淫泆之事君子所諱聞之言不忍刪之削之而使後學習焉此後世有疑於聖人焉也曰風雅有正變美詩之言合乎法度所謂正也刺詩之言蕩佚不法所謂變也聖人教人亦多術也純以法度教人是以縞縁素人何縁知其美雜之以可監可戒可耻可懼則以緇縁素也自非瞽䑃白黒之理一見决矣詩所以宣民情嘗觀於詩刑政之苛賦役之重天子諸侯朝廷之嚴而后妃夫人祍席之祕匹夫匹婦皆得以肆言之聖人為詩而肆天下之匹夫匹婦皆得以言其上宜若積天下輕君之心及至於幽厲之小雅􅆁鄘衛陳鄭之風亟諫而不訐顯譏而不戾相與携持去之而卒不忍然後知聖人使之言而至於民之不敢盡言而况於敢叛是故湯武之興其民急而不敢先周之衰其民哀而不敢離葢其堙􅊊不平之氣舒焉而亡聊之氣不蓄也嗚呼詩不作天下之怨極矣卒不能勝共起而亡秦秦亡而後快於是始有匹夫匹婦存亡天子之權嗚呼春秋之亡以禮廢秦之亡以詩廢吾固知公卿大夫士之禍速而小民之禍遲而大而詩之所以維君臣之道之功深也召南有召公之詩周南無周公之詩蘇氏曰召南有召公之詩而周南無周公之詩周公在内近於文王雖有徳而不見則其詩不作召公在外逺於文王功業明著則詩作於下此理之著明者也東萊文集觀詩見先王之風澤深厚觀詩至緑衣然後知先王之風澤深厚士之出於其時者為可願夫以婦人女子而所知如此葢其器宏深其聲舂容其藏充實其施溥博鳴和鑾委玉佩執綏正立辭色坦夷固與追奔車比服馬追前人惟恐不及氣息茀然者不可同年語矣此婦人傷已之詩也由後世觀之必且仰天而號曰何為使我至於此極也殆有甚者今其若此亦可觀矣葢無意而攄其藴不得已而後言仁厚積中而言者其行之指也山谷文古人學詩知其大意古人之學與後世異古人學詩知其大意而已矣章句詁訓有所未暇也巧笑倩兮美目盻兮夫子直以告人曰繪事後素而已周餘黎民靡有孑遺孟子直以告人曰以意逆志而已其他皆未及也後世學者不由章句詁訓則入於𫝊注之學相繼而作詩中和之理中之理其至矣乎人皆有之而不自知也嬰兒之生蒙然而已飢則呱呱然戲則啞啞然故人皆有之而不自知者和之失也中不自中以一故中和不自和以中故和中與和相習而莫之能名謂之道者喜而忘喜怒而忘怒哀而忘哀樂而忘樂不以喜怒哀樂而傷其真者是中之至和之極也中則誠和則明昔者中山王聞樂而悲子琴張臨尸而歌樂非所以為悲尸非所以為歌也然則感之者真在内也故感人心者莫深於詩而蕩人心者亦莫甚於詩蕩之者過而已矣喜之過流怒之過暴哀之過傷樂之過淫聖人惡其過也是故通之以情而正之以性性通於情不情其性情止於性能性其情使天下之人雖和而不失中者性之正也凡人之情喜均則無喜怒均則無怒如其不均故喜怒生焉夫天下之至異者秦越也至聞其歌則同於樂其哭則同於悲聞之者非天歟故雅之二頌之三風之正變十有五皆出乎天下之自然者也大者曲而歸諸直小者怨而歸乎正深者宕淺者夸雅頌之别然爾二南王化之基也邶鄘衛商民之相變者也俗變於近而王不能正則王不王也鄭首叛也齊首覇也晉并魏則又伯而秦其甚也是皆王之不王而諸侯肆行莫之禁也陳滛也檜亂也曹奢也紛紛乎益甚而益不可正茍有后稷先公之化如􅃎者庶乎其可也此名之先後也雖孔子之聖亦安能離衛降王進鄭退齊分晉與秦以一己之私定天下之誠然哉張雷叟羣書考索續集卷六
