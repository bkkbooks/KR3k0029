body:
  text: 羣書考索别集卷十三宋章如愚撰禮樂門禮樂先王以通上下之情君臣之分以嚴為主朝廷之禮以敬為主然一於嚴敬則情或不通而無以盡其忠告之益故先生因其飲食聚會而制為燕享之禮以通上下之情而其樂歌又以鹿鳴起興而言其禮意之厚如此庻乎人之好我而示我以大道也詩傳不可遺本而事末敬而將之以玉帛則為禮和而發之以鍾鼔則為樂遺其本而專事其末則豈禮樂之謂哉語注存守内外之節君子之於禮樂也講明不置則存之熟是非不謬則守之正存之熟則内有以飬其莊敬和樂之實守之正則外有以善其威儀節奏之文語或問其用無小大之殊禮樂之用通乎上下無小大之殊一身有一身之禮樂一家有一家之禮樂一邑有一邑之禮樂以至推之天下則有天下之禮樂亦隨其大小而致其用焉耳不必其功大名顯而後施之也同上欲修禮樂之書六經之道同歸禮樂之用為急遭秦㓕學禮樂先瓌漢晉以來諸儒補緝竟無全書其頗存者三禮而已周官一書固為禮之綱領至其儀法度数則儀禮乃其本經而禮記郊特牲冠義等篇乃其義說耳前此猶有三禮通禮學究諸科禮雖不行而士猶得以誦習而知其說熈寧以來王安石變亂舊制廢罷儀禮而獨存禮記之科弃經任傳遺本宗末其失已甚而博士諸生又不過誦其虚文以供應舉至於其間亦有因儀法度数之實而立文者則咸幽㝠而莫知其源一有大議率用耳學臆斷而已若乃樂之為教則乂絶無師授律尺短長聲音清濁學士大夫莫有知其說者而不知其為闕也故臣頃在山林嘗與一二學者考訂其說欲以儀禮為經而取禮記及諸經史雜書所載有及於禮者皆以附於本經之下具列注䟽諸儒之說畧有端緒而私家無書檢閲無人抄冩乆之未成會䝉除用學徒分散遂不能就而鍾律之制則士友間亦有得其遺意者竊欲更加参訂别為一書以補六藝之闕而亦未能具也欲望許臣就秘書省太常寺關借禮樂諸書自行招致舊日學徒十餘人令其編類可以興起廢墜垂之永乆使士知實學異時可為聖時制作之助寧宗朝朱熹乞修三禮剳子禮樂以進反為文禮主其减者禮主於樽節退遜檢束然以其難行故須勇猛力進始得故以進為文樂主其盈者樂主於舒暢發越然一向如此必至流蕩故以反為文禮之進樂之反便得情性之正又减是退讓樽節收歛底意思是禮之體本如此進者力行之謂盈是和悅舒散快滿底意思是樂之體本如此反之退歛之謂禮主其减却要進一歩向前着力去做樂主其盈却須退歛節制收拾歸裏如此則禮减而却進樂盈而却反所以為得性情之正也故曰减而不進則消盈而不反則亡矣文公語録禮樂同一理禮之誠便是樂之本樂之本便是禮之誠若細分之則樂只是一體周流底物禮則是兩箇相對著誠與去偽也樂如晝夜之循環隂陽之闔闢周流貫通而禮則有向背明暗論其本則皆出於一樂之和便是禮之誠禮之誠便是樂之和只是禮則有誠有偽須以誠克去偽則誠著同上漢無興禮樂之主先王之禮今存者無幾漢初自有文字都無人收拾河間献王既得雅樂又有禮書五十六篇惜乎不見於後世是當時儒者專門名家自一經之外都不暇講說在此時又無興禮樂之主故胡氏說使河間献王為君董仲舒為相汲黯為御史則漢之禮樂必興矣同上古今只此一理自古亘今都只是這一道理天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉聖人制度禮樂顛來倒去都只是這一道理做出來同前人而不仁如禮樂何或問人而不仁如禮何人而不仁如樂何曰心中斯須不和不樂而鄙詐之心入之外貌斯須不莊不敬而慢易之心入之旣不和樂不莊敬如何行得禮樂同上窮逹損益之宜聖人窮而在下所用禮樂固是從周之前軰若聖人逹而在上所用禮樂須㣲有損益不止從周之前軰如荅顏子為邦之問則告以四代之禮樂同上樂其生反其始樂樂其所生禮反其所自始亦如樂由中出禮自外作樂是和氣從中間直出無所待於外禮却是始初有這意思外面節文却是人做底故下文云樂章德禮起情反始也問如何是章德曰和順積於中英華發諸外便是章著其内之德同上有是理即有是氣問禮樂極乎天而蟠乎地行乎隂陽而通乎鬼神窮髙極逺而測深厚此是言一氣之和無所不通否曰此亦以理言有是理即有是氣亦如説天髙地下萬物散殊而禮制行乎其中矣同上禮樂鬼神一理問明則有禮樂幽則有鬼神曰禮主减樂主盈鬼神亦只是屈伸之義禮樂鬼神一理同上同體而異用問上蔡謂禮樂之道異用而同體還是同出於性情之正還是同出於敬曰禮主於敬敬則和這便是同體處同上不見先王之禮樂今世人有目不得見先王之禮有耳不得聞先王之樂此大不幸也同上有徳有位方可制作有位無徳而作禮樂所謂愚而好自用有徳無位而作禮樂所謂賤而好自專居周之世而欲行夏殷之禮所謂居今之世反古之道同上禮樂相為表裏問禮之用和為貴和便是樂否曰和是禮中之樂未便是樂如天子八佾諸侯六大夫四士二此又是樂中之禮並同上非玉帛鍾鼓之謂禮云禮云玉帛云乎哉樂云樂云鍾鼓云乎哉而夫子之於告朔愛其一羊而不忍去於齊聞韶至於三月不知肉味何也抑其所以如此者其意乃有所屬而非玉帛鍾鼓之謂耶策問如寒暑生殺禮樂刑政之為教如寒暑生殺之為嵗文公答楊深父典禮當盡禮之實遜者禮之實也有禮之實以為國則何難之有不然則其禮文雖具亦且無如之何矣而况於為國乎語注不當事繁文末節盖以禮之繁文末節當世所尚皆時人所易行者至於辭遜之心則禮意之實而人所憚為故言能以禮遜為國而先民則其為國也不難若不能以禮遜為國而徒相與從事乎繁文末節之間則亦無以為禮耳語或問先王以義起禮以是為主而酌乎人情世變以文之則禮雖先王未之有者亦可以義起後世議禮者不明乎此故常以其節文度數之小不可備而不敢為卒以就乎大不備而後已此劉向所以深嘆之也然無孟子之學而强欲為之如叔孫通曹褒之流是又不免乎私意之作而已矣孟或問典禮是天理之當然典禮自是天理之當然欠一毫不得添一毫不得惟是聖人之心與天合一故行出無一不與天合其間曲折厚薄淺深莫不恰好都不是聖人自撰出都是天理决定合如此文公語録天道流行發見禮儀三百威儀三千優優大哉皆是天道流行發見為用處同上古者典禮分眀古者禮學是專門名家始終理㑹此事故學者有所𫝊授終身守而行之凡欲行禮有疑者輒就質問所以上自宗廟朝廷下至士庶鄉黨典禮各各分明同上簡易則可行大凡禮制欲行於今須有一簡易底道理若欲盡拘古禮則繁碎不便於人自是不可行同上所因損益之理所因謂大體所損益謂文為制度大體是害不得底雖如秦之絶㓕先王禮法然依舊有君臣有父子有夫婦依舊廢不得同上至周然後大備問喪祭之禮至周公然後備夏商而上想甚簡畧曰然親親長長貴貴尊賢夏商而上大槩只是親親長長之意到得周來則又添得許多貴貴底禮數如始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟期之喪天子諸侯絶大夫降然諸侯大夫尊同則亦不絶不降姊妺嫁諸侯者則亦不絶不降此皆貴貴之義上世想皆簡畧未有許多降殺貴貴底禮數凡此皆天下之大經前世所未備到得周公捜剔出來立為定制更不可易同上漢禮非復三代氣象叔孫通為緜蕝之儀其效至於羣臣震恐無敢諠譁失禮者比之三代燕享羣臣氣象又大不同盖只是秦人尊君卑臣之法漢君臣不明古禮漢河間獻王得古禮五十六篇必有可觀但當時君臣間有所不曉遂至無𫝊故先儒謂聖經不亡於秦火而壊於漢儒同上南北朝猶有禮學南北朝是甚時節而士大夫間禮學尤不廢陸農師之徒説禮宋朝陸農師之徒大抵説禮都要先求其義豈知古人所以講明其義者盖縁其儀皆在其具並存耳聞目見無非是禮所謂三千三百了然可知故於此論説其義皆有㨿依並同前有本有文凡禮有本有文其所施於家者言之則名分之守愛敬之實其本也冠婚喪祭儀章度數者其文也其本者有家日用之常體固不可以一日而不修其文又皆所以紀綱人道之終始雖其行之有時施之有所然非禮之素明習之素熟則其臨事之際亦無以合宜而應節是不可以一日而不講且習焉也三代之際禮經備矣然其存於今者宫廬器服之制出入起居之節習已不宜於世世之君子雖或酌於古今之變更為一時之法然亦或詳或畧無所折衷至有遺其本而務其末緩於實而急於文自有志好禮之士猶或不能舉其要而困於貧窶者尤患其終不能有以及於禮也家語文公序禮書禮廢而後有書夫子曰博我以文約我以禮禮之為義其大哉然古禮非必有經盖先王之世上自朝廷下達閭巷其儀品有章動作有節所謂禮之實者皆踐而履之矣故曰禮儀三百威儀三千待其人而後行則豈必簡策而後𫝊哉其後禮廢儒者惜之乃始論著為書以𫝊於世今禮記四十九篇則其遺説已學而求所以約之者不可以莫之習也講禮記序説程張司馬三家禮範禮廢久矣士大夫㓜而未嘗習於身是以長而無以行於家長而无以行於家是以進而无以議於朝廷施於郡縣退而無以教之閭里𫝊之子孫而或莫知其職之不脩也程張之言猶頗未具獨司馬氏為成書而讀者見其節文度數之詳有若未易究者徃徃未及習行而已有望風退怯之意又或見其堂室之廣給使之多儀物之盛而切自病其力之不足是以其書雖布而𫝊者徒為篋笥之藏未有能舉而行之者也殊不知禮書之文雖多而身親試之或不過於頃刻其物雖博而亦有所謂不若禮不足而敬有餘者今乃以安於驕佚而逆憚其難以少不備之故而反就於大不備豈不誤哉故某嘗欲因司馬氏之書參考諸家之説裁訂増損舉綱張目以附其後使覽之者得因其要以及其詳而不憚其難行之者雖貧且賤亦得以具其大節畧其繁文而不失其本意也䟦三家禮範觀古今而加損益嘗獨觀古今之籍因其大體之不可變者少加損益於其間以為一家之書大抵謹名分崇愛敬以為之本至其施行之際則又畧浮文崇本實竊自附於孔子從先進之遺意誠願得與同志之士熟講而勉行之庶㡬古人所以脩身齊家之道謹終追逺之心猶可以復見家禮序俗吏不能布宣今上下所共承用者政和五禮也其書雖嘗班布然與律令同藏於理官吏之從事於法律之間者多一切俗吏不足以知其説長民者又不能以時布宣使通於下甚者至或并其書而亡之此禮之所以不合同上大要以儀禮為本其書大要以儀禮為本分章䟽附而以小戴諸義各綴其後其見於他篇或他書可相發明者或附於經或附於義又其外如弟子職保傅𫝊之屬又自别為篇以附其類其目有家禮有鄉禮有學禮有邦國禮有王朝禮有喪禮有祭禮有大𫝊有外傳今其大體已具者盖什七八矣文公答李季章温公書儀不可輕改温公書儀制有未盡合古制處然兼而存之自可考見得失今以其一詞之不合便欲削去似亦草率且彼以俗尚而雜古禮吾以臆見而改古書安知後之視今不猶今之視昔耶文公答趙子欽奏乞頒降禮書政和五禮新儀州郡元有給降印本兵火以來徃徃散失目今春秋釋奠祈報社稷及祀風雨雷師壇壝器服之度升降跪起之節無所據依循習茍簡而臣民之家冠昏喪祭亦無頒降禮文可以遵守無以仰稱國家欽崇祀典防範民彛之意乞頒降禮書狀至和政和之制至和之制雖若不合於古而實得其意但有所未盡而已政和之制則雖稽於古者或得其數而失其意則多矣同上有經有變禮有經有變經者常也變者常之變也先儒以曲禮為變禮看來全以為變禮亦不可盖曲者委曲之義故以曲禮為變禮然毋不敬安定辭安民哉此三句豈可謂之變禮先儒以儀禮為經禮然儀禮中亦自有變變禮中又自有經不可一律看也禮記聖人説禮及學者問答處多是説禮之變上古禮書極多如河間獻王収拾得五十六篇後來藏之秘府鄭元軰尚及見之今注疏中有引援處後來遂失不𫝊可惜可惜儀禮古亦多有今所餘十七篇但多士禮耳文公語録古書今不可見古禮今不復存如周禮自是紀載許多事當時别自有个禮書如云宗伯掌邦禮分明自有禮書今亦不可見禮以義起儀禮不是古人預作一書如此初間只以義起漸漸相襲行得好只管行至於情文極細宻極周緻處聖人見此意思好故録成書同前大小戴記之作大戴禮冗雜其好處已被小戴採摘來做禮記了然尚有零碎好處在同上大戴記多雜偽大戴禮篇目缺處皆是無一非小戴所去取其間多雜偽亦有好處然多誤難讀同上大戴禮多錯舛大戴禮本文多錯注尤舛誤武王諸銘直是做得巧了切題者如鑑銘是也亦有絶不曉者想古人只是述其戒懼之意而隨所在冩記以自警省耳不似今人為此銘後便要就事物上説得親切然其間固亦有切題者如湯盤銘之類至於武王盥盤銘則又却似个盤銘想只是因水起意然恐亦有錯雜處唐五禮新儀之失開元禮煞可看唯是五禮新儀全然不是是當時要做這文字時不曽用得識禮底人只是胡亂變易古文白撰全不考究並同上上難强下之行禮不難行於上而欲行於下者難也盖朝廷之上典章明具又自尚書省置禮部侍書侍郎以下至郎吏數十人太常寺置卿少以下至博士掌故又數十人每一舉事則案故事施行之而此數十人者又相與聚而謀之於其器幣牢醴共之受之皆有常制其降登執事之人於其容節又皆習熟見聞无所違失一有不當則又有諌官御史援古㨿今而質正之此所謂不難行於上者也惟州縣之間士大夫庶民之家禮之不可已而欲行之則其勢可謂難矣民臣禮議雖亡闕而有可攷禮經雖亡闕然於覲見天子之禮於燕射聘食見諸侯之禮於士相見見士大夫之禮宫室之名制不見其有異特其廣狹隆殺不可考耳儀禮釋宫唐與宋朝沿革開元禮有刺史與吏民之禮畧如古者國君與臣本朝刪去此條開寳禮全體是開元禮但畧改動五禮新儀其間有難定者皆稱御製以决之如禱山川者又只開元禮内有文公語録宋朝立科之意向時有開寳通禮科令其熟讀此書試時挑問後來又做出通禮通禮如注釋一般如人要治此必須連此都記得如問云這起於何時逐一説了後又反覆論議一段如此亦自好古今禮儀沿革三代之禮今固難以盡見其畧幸散見它書如儀禮十七篇大夫士禮邦國人君者僅存一二遭秦人焚滅之後至河間獻王始得邦國禮五十六篇獻之惜乎不行至唐此書尚在諸儒注疏尤時有引為説者及後來無人説著則書亡矣豈不大可惜叔孫通所制漢儀及曹褒所脩固已非古然今亦不存唐有開元顯慶二禮顯慶已亡開元襲隋舊為之宋朝脩開寳禮多本開元而頗加詳備及政和間脩五禮一時奸邪以私智損益疏畧牴牾更没理㑹又不如開寳禮同上今禮古禮之異今人儀禮只是士大夫禮無天子諸侯禮漢河間獻王五十六篇却有天子諸侯禮班固作漢書時此禮尚存不知如何失了故班固云今之言禮愈於推士禮以達天子豈若用此禮哉四先生言禮得失二程與横渠多是古禮温公則大槩本儀禮而參以今之可行者要之温公禮較穩其中與古不甚逺是七八分好若伊川禮則祭禮可用婚禮則惟温公者好大抵古禮不可全用如古服古器今皆難用横渠温公所制不同横渠所制禮多不本諸儀禮有自杜撰處如温公却是本諸儀禮最為適古今之宜並同上禮器五禮之器五器謂五禮之器也如周禮大行人十一年同數器之謂書注禮食之器簋瓦器容斗二升方曰簠圓曰簋簠盛稻梁簋成黍稷四簋禮食之盛也詩傳爵用宣和禮制禮器之失不但一爵今朝廷所用宣和禮制局操度雖未必皆古然庶㡬近之文公答黄商伯射禮古者立諸侯之禮射中則得為諸侯不中則不得為諸侯此等語皆難信書謂庶頑䜛説侯以明之然中間若有羿之能又如何以此分别恐大意畧以射審定非專以此去取也文公語録大射之制大侯君侯也天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕天子侯身一丈其中三分居一白質畫熊其外則丹地畫以雲氣同上君子無所争之義大射之儀耦進三揖而後升堂射畢又揖而降勝者􅃝决遂執張弓不勝者襲脱决拾郤左手右加弛弓於其上遂以執射揖如始升射及皆勝者先升升少右不勝者進北面坐取豐上之觶立飲坐奠於豐下與揖先降其雍容謙遜乃如是是則雖曰有争而其争也亦不失其為君子之道矣語或問射可以觀徳仡仡勇夫射御不違此書之論射也終日射侯不出正兮此詩之論射也夫射者所以觀徳而非事乎張弓挾矢之可觀也必心正體平而後可以言射必周旋中禮而後可以言射否則威儀不肅動作不文雖有逄䝉后羿之藝無益也是故天子射熊諸侯射麋大夫射虎豹士射鹿豕明其徳之所服有大小也天子百二十步諸侯九十步大夫七十步士五十步明尊卑之所服有逺近也天子以騶虞諸侯以貍首大夫以采蘋士以采蘩明奏樂之上下有節也天子合九而成規大夫合五而成規士合三而成規所射之弓異也天子六耦三侯諸侯四耦二侯士三耦豻侯所射之侯異也天子射於郊諸侯射於境大夫射於鄉士射於學所射之地異也吁射禮其可廢乎哉若果可廢則禮記胡為有射義周官胡為有射人白虎通又胡為有鄉射乎雖然二十學射是又男子之事而士君子之所當肄習者也顔達龍鄉飲酒不必盡如於古有聖賢者作不必盡如古之禮必當裁酌從今之宜而為之也又如士相見禮鄉飲酒禮鄉射禮之屬而今去那裏行只是當存他大槩使人不可不知方當周之盛時禮文全體皆備所以不可有纎毫之差今世盡不見徒掇拾編緝於殘篇斷簡之餘如何必欲盡倣古之禮得文公語録當取可行於今漢儒説制度有不合者多推從殷禮去大抵古人制度恐不便於今如鄉飲酒禮節文甚繁今强行之畢竟无益不若取今之禮酌而行之同上爵齒兩不相妨親親長長貴貴尊賢皆天下之大經固當各有所尚然亦不可以此而廢彼故鄉黨雖上齒而有爵者則自賔主獻酧禮畢然後入又席於尊使自為一列不為衆人所壓亦不壓却他人即所謂遵也遵亦作僎如此則長長貴貴各不相妨固不以齒先於爵亦不以爵加於齒也文公答嚴時亨有司不能奉行朝廷舉行鄉飲酒之禮而州縣之有司奉行不謹容節謬亂儀矩闕疎甚不足以稱明天子舉遺興禮之意今者賔興有日謹與諸生考協禮文推闡聖制周旋揖遜一如舊章行鄉酒禮告先聖文飲非為飲自吾夫子有觀鄉之嘆而後知鄉飲之禮為可行自抱朴子有煩碎之誚而後知鄉飲之禮不必行夫所謂鄉飲者非專為飲食也為行禮也華陔奏雅所以鼓座間之春風俎豆容與所以藹族閭之和氣叙長别㓜小不得以加大也尊价坐僎賔不得以慢主也凡謂古禮不可行於後世乎果不可行則儀禮鄉飲酒篇戴記鄉飲酒義可以無作矣盖古之鄉飲有四鄉大夫飲國中之賢者酒用鄉飲禮一也州長春秋習射於序先行鄉飲二也三年大比舉賢興能此則為鄉吏賔興之禮三也八十者五豆九十者六豆此則為黨正蜡祭之飲四也古之謹庠序之教申孝悌之義何其嚴歟奈何長㓜之倫冺大小之禮廢介僎之序失而賔主之禮失晨星曉露尤幸見於叔代在泮飲酒是鄉飲僅行於魯邦之泮水也儀盛永平是鄉飲僅舉於東漢之郡學也分叙賔介是鄉飲僅見於李唐之鄉校也然能施於一時之暫而不能行於異日之乆能用於貢舉之日而不能通於閭里之間非古今天下異也世變不古雖鄉飲不足理軍市也噫嘻安得再使風俗淳而行三代鄉飲之禮冠禮嘉禮之重冠禮著於儀禮冠義記於戴經夫冠者禮之始也嘉事之重者也所以正容體所以齊顔色亦所以順辭令也容體不正則齠齓之習生顔色不齊則誠敬之實冺辭令不順則暴慢之心入吁冠禮之不可不謹固如此故古之冠者有醴辭有字辭有祝辭又有鄉大夫相告之辭甘醴惟厚嘉薦令芳拜受祭之以定而祥則醴辭也令月吉日昭示爾字爰自禮加髦士攸宜則字辭也近於民逺於佞則周成王之祝辭也推逺冲孺之㓜志藴積文武之成徳則漢昭帝之祝辭也韓獻子告之以善范文子告之以戒或告以實或告以忠則卿大夫告晉武子之辭也不特此耳夏商周醮於客位周人用醴於客位曰醮曰醴其敬賔之意一也商以二十呼伯仲周以五十呼伯仲或二十或五十其稱字之意一也奈何周轍不西是禮㡬冺魯哀公可冠而未冠故晉悼公有盍為冠具之問是冠禮始廢於魯也母見其子不拜酒脯是冠禮再廢於唐也孫嗣昌雖能發憤而行之然曵笏却立外庭大笑是冠禮三廢於唐之縉紳矣噫嘻後之欲行冠禮者請讀周公之冠禮戴記之冠義贄禮明執守之義自鄭康成注曲禮以贄為至而後世始以贄為言禮之至自班固纂白虎通以贄為質而後世始以贄為質己之誠夫古人相見之禮必有贄者所以明執守之義而致己之敬也故公侯以玉卿以羔大夫以鴈士以雉以公侯卿大夫士而所質不同者是必有等差之辨也姑試論之盖公卿之徳欲其精白純粹而玉者取其燥不輕濕不重之義故公侯之贄必以玉也九卿之職貴於盡忠率下而羔者取其羣而不黨之義故九卿之贄必以羔也大夫之職在於奉命通四方而鴈者取其俟時而行之義故大夫之贄必以鴈也士之氣節本乎剛方勁直而雉者取其死不失節之義故士之贄者必以雉也不然古人何以為是區别哉然卿大夫贄古以麑鹿今以羔鴈而公侯士之贄惟用玉與雉何取吁此可以見公侯之徳有常而士以一介仗節不變也羣書考索别集卷十三
