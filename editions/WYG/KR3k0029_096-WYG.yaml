body:
  text: 羣書考索後集卷三十宋章如愚編士門宗學范曄有言自帝室王公之冑皆生長脂腴能勵行飭身者葢寡所以立之學者豈特使為章句儒釣爵取祿者邪敎之明人倫而已人倫明則重犯法重犯法則賢才成而可以為維城之助矣記言庶子之正於公族漢之郡國而置宗師唐貞觀王國而立學官則訓導之官也茍能謹其選則糾察防範皆得其道則天𣲖慶源駸駸然並為君子之歸矣昔欒伯請公族大夫晉侯曰荀家惇惠晉大夫荀檜文敏荀之族欒黶果敢無忌鎮靖韓使兹四人者為之夫膏粱之性難正也故使惇惠者敎之文敏者導之果敢者諗之鎭靖者修之以列國之於公族猶知擇公族大夫以訓誨之如此况天子乎國語宋朝英宗治平元年六月己亥増置宗室學官詔曰以宗枝甚衆而誘道之方未至故命近臣舉有學行之士為之敎授傳不云乎少成若天性習貫如自然蓋子弟之學非尊屬勉勵則莫知勸若不率敎其令尊屬同以名白大宗正司敎授不職大宗正司察舉以聞宗室自率府副率以上八百餘人其奉朝請者四百餘人而教學之官六員而已始命増置凡皇族年三十以上者百三十人置講書四員年十五以上者三百九人増置教授五員年十四以下者别置小學教授十二員並舊六員為二十七員以分教之上謂韓琦等曰凡事之行患於漸久而怠廢况為學之道猶戒中止諸宗室之幼者仍須本位尊長常加率勵庶不懈惰可召舍人論此意作詔戒勉之故有是詔宏詞宗學記云高山大麓固豫章栝栢所宜生也今以公族之盛其材多固宜然世逺而益繁而敎養之法未廣哲宗皇帝明詔加恩為宗子建學以成神考之志甚盛徳也臣幸得以文字載其本末惟古帝王莫不以學為大務而其敎皆自近始文王之時無射亦保要必由兄弟以御家邦為敘至周官成均教國子其法益詳而同姓先焉葢古之政敎逺近親疎固有次第如此惟漢襲秦之舊厚戚里而疎公族明章之政於時為盛然為四姓小侯建學以東觀書考之蓋南陽宗室有不逮者至其甚則親者見嫌疎者不錄信厚之風安得而不衰甚可嗟也惟國家聖聖相承其教皆以親親為本勸奬宗英唯恐居後逮神考時法益詳宗子益秀出往往折節從學問試用可觀今益廣學校為建師儒凡諸侯官學之所建者悉居之其敎養勸課與夫簡試升黜之法皆視太學徽宗崇寧元年十一月庚戌起居舍人鄭居中言欲乞諸官學别以儒臣專提舉學事或選宗正寺長貳以學事隷之詔諸官學若宗正事長貳提舉大觀二年三月戊午兩官仲瑈唐突言官學無官宗子三經公試不中乞特與升補内舍有詔放罪而大宗正司執政當行故也並長編大觀二年九月己未御筆宗室升貢試或不中自今許入國子學初學制局議遣歸本學上以為庶士既得辟雍不可薄於宗親故有是詔同上大觀四年八月乙酉詔宗子升補上舍係比舊日宗室應舉之人得解其赴貢士舉試係比省試今不經殿試便分三等命官緣熙豐未有此法可依貢士已降指揮並留俟殿試其上中等人遇唱名取㫖同上大觀四年閏八月甲寅工部尚書李圖南上宗子大小學敕令格式二十二册詔付禮部頒降同上政和二年四月庚戌禮部言大觀三年貢士并宗子上舍與進士同釋褐就瓊林苑賜宴今合取㫖詔宴就辟雍仍用雅樂差知舉蔡嶷押宴同上高宗紹興十二年七月時因有宗子犯法乙卯上謂宰執曰見宗學教官今日率宗子講書作功課庶使用心不為惡事紹興十二年十月己亥上謂宰執曰今後宗子許於所在入學令與寒士同處仍别作齋庶盡變積習異時文行有可取也四門學宋文帝永嘉十五年立儒學館永嘉十六年命何尚之立元素學何丞大立史學謝𤣥立文學元嘉二十年立國學二十七年廢後魏孝文帝遷都洛邑立四門小學詩靈臺疏頴子容春秋釋例云太廟四門之學謂之太學北齊隋皆有四門學開皇二十年廢唐高祖詔四門學生百三十員高宗龍朔二年東都四門生三百員俊士二百員西京四門生千三百人其五百人以六品七品及侯伯子男之子為之其八百人以庶人俊造者為之律學梁武帝天監四年置胄子律博士隋律學隷大理寺唐武德初隷國子監尋廢貞觀六年復置高宗顯慶三年復廢龍朔二年復置生二十人宋朝神宗熙寧六年於國子監置律學熙寧七年五月壬戌國子監言太學生員多而齋舍少先以朝集院為律學外屋尚百餘間乞盡充學舍從之初太學地甚隘其東為錫慶院又其東為朝集院慶厯中始以錫慶稍益之未幾復罷後胡瑗至乃復錫慶後堂及二廡容諸生仍以齋筵更衣位置行堂遇乾元節賜齋筵上權以錄行堂更衣至是并朝集院賜之以廣二學為屋百楹學者以千計長編元豐六年四月壬子國子司業朱服言相度入律學命官公律律義斷案考中第一人乞許依吏部試法與注官其太學生或精於律義斷案就律學公試中第一與比私試第二等注籍從之長編徽宗政和六年六月丁卯户部尚書兼詳定一司敕令孟昌齡等奏今參照熙寧舊法修成國子監律學敕令格式一百卷乞以政和重修為名頒降從之長編書學隋國子寺統國子太學四門書筭學唐武德初廢貞觀二年復高宗顯慶二年又廢龍朔二年東西都復置石經説文字林為頴業宋朝徽宗崇寧五年正月丁巳詔書畫筭醫四學並罷更不修蓋書畫學於國子監􅨐截屋宇充每學置博士一員生員各以三十人為額同上大觀元年正月甲午大司成兼侍講學制局編修官薛昂言修整書畫學畢工額各三十人分為兩齋從之同上大觀元年正月乙未書學直學劉應漢州進士張適並為將仕郎應書學適畫學諭同上大觀元年三月甲辰詔書畫學並依崇寧四年十二月已前敕令式人額等其後來裁損指揮勿行同上大觀四年正月庚戌登仕郎長沙縣丞朱克明為書學諭克明言許氏說文其間字畫形聲多與王安石字說相戾掇其尤乖義理者凡四百餘字名曰字括乞委官刊正國子監看詳克明字括並以字說為証頗見用心然字說與說文不妨兩存難以刋正而克明特有此議長編大觀四年三月庚子詔六藝皆聖人作廼者増學舍置師弟子而入流命官靡有區别其令醫學生併入太醫局筭學生入太史局書學生入翰林書藝局畫學生入翰林圖畫局置學官及人吏等重和元年十一月丙子提舉成都府路學士翟栖筠奏王安石參酌古今篆隷而為之説此造道之指南而窮經之要術也然字形書畫纖悉委曲咸有不易之體世之學者知究其義而已至於形畫則或略而不講從俗就簡轉易偏旁傳習既殊漸失本真如期朔之類從月股肱之類從肉勝服之類從舟丹青之類從丹靡不有辯而今書者乃一之若此者不可勝舉故幼學之士終年誦書徒識字之近似而不知字之正形甚可歎也臣竊見國子監有唐人張參唐元度所撰五經文字及九經字様所以辯證書名頗有依據然其法本取蔡邕石經許氏説文而蔡許之學顧有未盡如是從日而從月昏從氏而從民謬戾者甚衆願詔儒臣重加修定去其訛謬存其至當一以王安石字説為正分次部類為新定五經字様頒之庠序詔太學官集衆修之同上宣和六年正月己未詔置提舉措置書藝所以杜從古徐兢米友仁並為措置管勾官生徒五百人為額篆正文法鍾鼎小篆法李斯隷法鍾繇蔡邕真法歐虞褚薛草法王羲之顔栁徐李逐日㑹試有并經義舉人及貴游子弟又分士流雜流為二先是王黼以唐告三道虞世南書狄仁傑告顏真卿書顏允南母蘭陵郡太夫人張氏告及徐浩封贈進呈上曰朕欲敎習前代書法所頒告命使能者書之不愧前代時書學已罷故特置是局長編筭學書畫附隋國子寺統筭學唐廢貞觀二年詔隷國子學高宗顯慶元年尚書左僕射于志寧奏置令習李淳風等注釋五曹孫子筭十部筭經為二十卷行用顯慶三年詔以書筭學業明經事唯小道各擅專門有乖故實並令省廢龍朔二年東西都置九章五曹周髀為顓業唐國子監領國子太學廣文四門律書筭學宋朝神宗元豐七年正月壬戌吏部乞於四門選補筭學博士闕從之徽宗崇寧三年六月壬子都省言竊以筭數之學其傳久矣周官大司徒以鄉三物敎萬民而賓興之三曰六藝禮樂射御書數周之盛時所不廢也在昔我神宗皇帝將建學焉屬元祐異議遂不及行方今紹隆聖緒則筭學之設實始先推而行之宜在今日今將元豐筭學條制重加刪潤修成勅令冠以崇寧國子監筭學敕令格式為名又言竊以書用於世先王為之立學以敎之設官以達之置使以諭之蓋一道德謹法守以同天下之習世衰道微官失學廢人自為學習尚非一體畫各異殆非所謂書同文之意今四方承平未能如古蓋未有校試勸賞之法焉今欲倣先王置學設官之制考選簡拔使人人自奮有在今日所有圖畫之技朝廷所以圖繪神像與書一體今附書學為之校試約束謹修成書畫學勅令格式一部冠以崇寧國子監為名並乞賜施行都省上崇寧國子監筭學書畫學敕令格式詔頒行之只如此書自可也五年正月二十四日並罷元豐七年十二月七日初置筭學博士及學諭十八日罷筭學始置書畫筭學長編大觀三年三月壬戌禮部太常寺言筭學以文宣王為先師兖鄒荆三國公為配享及十哲為從祀自昔著名筭數之人繪畫於兩廊欲乞加賜五等之爵然後隨所封以定其所服之服按吳時傳時為禮部員外郎方興筭學欲以黄帝為先師時言朝廷祀黄帝祝版稱聖祖著臣名春秋釋菜孔子正中祀數學乃六藝之一若以黄帝為先師則當用大祀或中祀也遂止此皆從祀文宣王廟或是因時議然十一月七日丁未竟以黄帝為先師又所奏七十人但疑從祀初未加封爵却恐十一月七日所奏合移在三月十八日以前更須細考之吳時行狀云朝廷不能決集禮官博士議遂易黄帝以隷首此又與詔㫖實録不合並須細考宣和二年七月己未又詔筭學元豐中雖存有司之請未嘗興建又所議置官不過傳授二員今張官置吏考選而任使之大略與兩學同既失先帝本㫖賜第之後不復責以所學何取於教養可並罷官吏依省罷法應文籍錢物令國子監拘收長編醫學唐太宗貞觀三年置醫學宋朝徽宗崇寧三年六月辛酉講議司言熙寧九年嘗置太醫局教養生員分治三學諸軍病患歲比較等第給錢元祐裁减浮費遂行廢罷今已别置醫學敎養上醫外所有本局並合興復從之長編崇寧四年四月壬子禮部言太醫局大方脉局生郭稽中等充四川醫學敎授乞國子監應干醫經方書各賜一本從之同上政和三年閏四月辛亥尚書省言檢㑹太醫令裴宗元劄子乞就太醫局復置醫學詔依所乞外方難得醫藥在京醫學等員數甚多並令尚書省措置契勘翰林院見今醫官至祗候七百餘員端閑並無職事諸路駐泊員額止百餘山州僻郡不知藥脉坐以致斃今立較試之法隨所試中高下分遣諸路三京七人帥府六人大藩五人上州四人中州下州三人次逺二人從之同上政和三年閏四月戊午和安大夫康州防禦使曹孝忠等措置醫學奏乞詔内外執政官以上各舉諳曉醫術文士二人以姓名聞給以照帖俾執赴本學及十人即附試上舍所取不得過二分合格者乞依太學上舍中等推恩不中選者並補内舍太學上舍生並申尚書禮部奏名乞賜以醫學上舍出身上等從事郎中等登仕郎下等將仕郎從之詔㫖政和三年六月乙卯禮部尚書鄭居中奏應本部所注醫職醫工不許諸州軍及諸司奏辟亦不許舉留再任從之長編政和三年八月丙寅翰林院奏據翰林醫官局申禮部申請未有差遣等醫官四百餘員端閑並無職事乞將不經就試不終塲人不注授内外差遣本局勘㑹若不經就試及試不終塲人依上件指揮不注授内外差遣轉見在局端閑乞除不得注授内外差遣外如承朝廷特㫖差撥亦從所屬申取尚書省指揮施行其祗醫學醫官太醫承直局醫正以上無差遣人不就將來秋試及試不終塲并不願注授之人更乞詳酌嚴賜約束施行詔如承朝廷特㫖差撥人令翰林院知不行詔㫖政和三年九月乙巳提舉入内醫官曹孝忠等言醫學將來賜上舍出身之人欲乞初任自從近降朝㫖注新授在京醫職外其後並依兩學上舍出身入赴吏部注合入差遣從之長編政和三年十二月庚戌提舉入内醫官曹孝忠言臣昨蒙聖恩擢領醫學仰體興創之初欲得通經之士兼領醫術其所推行皆崇寧大觀已頒之令兼倣兩學之制未嘗輒敢妄有申請其或奉朝廷一時指揮者蓋欲激勸士人使之樂從而法行未逮半載生徒已及三百四方充貢之士繼踵而至儒者習醫於斯為盛益見陛下美意良法垂信天下舉知鼔舞然醫學之逮今逾十年再興再廢者正以流俗多為毁沮伏望陛下日月照臨使好生實德普濟四海與天地無窮不勝幸甚詔曹孝忠以御前祗應有妨故令罷司業職事即非罪罷可與申明行下詔㫖政和三年十二月乙夘詔諸州醫學生赴本學試並依貢士法閏四月八日所降指揮勿行同上政和五年正月己丑左武大夫康州防禦使勾當龍德宫提舉入内醫官編類政和聖濟經曹孝忠等奏乞諸州縣並置醫學隷於州縣學提舉學事同選差本州見任官通醫術能文者一員兼權醫學敎授比倣諸州學格内文士三年所貢人數十分中以一分五氂人數創立諸路醫學貢額分為三年並不侵占文士貢額諸路貢士與本學内舍同試上舍三歲共取合格人數升補上舍以上中等一百人為額並附文士引見釋褐學生分三科兼治五經内一經方脉科通習大小方脉風產針科通習針灸口齒咽喉眼目痬科通習瘡腫傷折金鏃書禁三科學生各習七書黄帝素問難經巢氏病源補註本草千金方王氏脉經張仲景傷寒論三部針灸經龍木論千金翼方方脉科黄帝素問難經巢氏病源補註本草千金方王氏脉經張仲景傷寒論針科黄帝素問難經巢氏病源補註本草千金方黄帝三部針灸經龍木論痬科黄帝素問難經巢氏病源補註本草千金方黄帝三部針灸經千金翼方出題儒經素問難經並於本經内出運氣義於素問出臨時指問五運六氣司天在泉太過不及平氣之紀上下加臨治淫勝腹所掌疾病隨歲所宜如何調治或設問病證於今運氣如何理療處方義於所習經方内出假令病法方脉科於千金千金翼外臺聖惠方治雜病門中出針科於三部針經千金千金翼外臺聖惠方龍木論治雜病及口齒咽喉眼目門中出痬科於三部針灸經千金千金翼外臺聖惠方治瘡痬門中出逐路並置醫學諭一員以本學上舍出身人充並從之長編政和五年九月壬午祠部言諸路醫學三年合貢共七百三十三人合該推恩共百人又契勘舊進士并諸科解額并五路剰額及國子監開封府解額共四千八百九十二人内一百三十人充武士貢額二十四人貢孝悌特起之士四千七百三十八人立為見今諸路貢額舊省額進士五百六十人諸科四十人見今貢士三年推恩額六百人醫學貢額係比倣諸州學格内文士三年所貢人數十人中以一分五釐人數創立諸路醫學貢額並不侵占文士貢額所有推恩人額第一第二年各三十人第三年四十人並不在文武士推恩額内詔令尚書省别行措置尚書省請諸路貢額以昨來撥充貢額内樁留一分人數充共九十五人推恩額十人詔推恩以上五人為額長編宣和二年七月己未詔先帝董正治官太醫局丞教授立學生員額成憲具在今醫局之外復建醫學旣違元豐舊制舍選之法本示敎養今又醫學生賜舍之後盡官州縣不復責以醫術平昔考選遂成虚文在京醫學三舍生舊係内外學籍願入學者止内舍並特令於見醫學合額上降一舍外學許通理醫學校定入學令禮部國子監限五日條具聞奏官吏依省罷法合當除者别與差遣文籍田產應干錢物並併歸國子監同上儒學自太祖建隆三年始開國子監聚徒講學當是時也斯民新脫干戈文風未大興起學者尚寡天下已平儒者往往依山林即聞人以講授大率多至數十百人嵩陽嶽麓睢陽白鹿四書院為尤太宗皇帝間又驛送九經俾生徒肄業明道景祐之間文采浸盛胡文定石守道孫明復諸公皆以師道為學者宗而文定在湖其弟子去來常數百人各以經傳授隱然為東南之洙泗慶厯間天子開天章閣與大臣議天下事慨然詔州縣皆立學於是京師廣襲慶以為太學而有司請用安定湖學之法盛矣哉皇家養士之宏規也太宗興國二年三月庚寅知江州周述言廬山白鹿洞學徒常數千百人乞賜九經使之肄習詔國子監給本仍傳送之長編真宗咸平四年三月辛夘以國子監經籍賜潭州岳麓山書院從知州李允則之請也長編仁宗寶元兀年四月丁亥賜河南府嵩陽書院田十頃同上元新修大黨書院名曰嵩陽書院胡安定在湖州置治道齋學者有欲明治道者講之於中如治兵治民水利筭數之類嘗言劉彞善治水利後累為政皆興水利有功程氏遺書先生尤患隋唐以來仕進尚文詞而遺經業茍趨祿利及為蘇湖二州教授嚴條約以身先之雖大暑必公服終日以見諸生嚴師弟子之禮解經互有要義懇懇為諸生言其所以治己而後治乎人者學徒千餘日月刮劘為文章皆傳經義必以理勝信其師說敦尚行實後為太學四方歸之庠舍不能容旁拓步軍居以廣之五經異論弟子記之自為胡氏口義侍邇英講不以諱忌為避蔡端明撰墓誌曽孫滌記云侍講讀乾元亨利貞不避諱上與左右皆失色侍講徐曰臨文不諱上意遂解安定先生在湖學時福州劉彝執中往從之學者數百人彝為高弟凡紀綱於學者彝之力為多熙寧二年召對上問從學何人對曰臣少從學於安定先生胡瑗上曰其人文章與王安石孰優彝曰胡瑗以道德仁義教東南諸生時王安石方在塲屋修進士業臣聞聖人之道有用有體有文君臣父子仁義禮樂歴世不可變者其體也詩書史傳子集垂法後世者其文也舉而措之天下能潤澤其民歸於皇極者其用也國家累朝取士不以體用為本而尚其聲律浮華之詞是以風俗偷薄臣師瑗當寶元明道之間尤病其失遂明體用之學以授諸生夙夜勤瘁二十餘年專切學校始自蘇湖終於太學出其門者無慮二千餘人故今學者明夫聖人體用以為政敎之本皆臣師之功也上曰其門人今在朝為誰對曰若錢藻之淵篤孫覺之純明范純仁之直溫錢公輔之簡諒皆陛下之所知也其在外明體適用教於民者迨數十輩其餘政事文學粗出於人者不可勝數此天下四方之所共知而歎美之不足者也上悦李廌書安定先生皇祐至和間為國子直講朝廷命主太學生千餘人先生曰講易予列諸生執經座下先生每講罷或引當時之事以明之至小畜以謂畜止也臣止君也已乃言及中書令趙公相藝祖日上欲擇一任諫諍臣中令具名以聞上却之弗用異日又問可任者中令復上前劄上亦却之如此者二仍碎其奏擲於地中令輒懷以歸他日復問中令乃補所碎劄子呈於上上乃大悟卒用其人麈史胡先生瑗判國子監其敎育諸生皆有法先生每語諸生食飽未可據案或久坐皆於血氣有傷當習射投壺游息焉是亦食不語寢不言之遺意也程伊川曰凡從安定先生學者其醇厚和易之氣望之可知也國子監舊有先生祠紹聖初林自為博士聞於朝徹去聞見錄安定先生自慶厯中敎學於蘇湖間二十餘年束脩弟子前後以數千計是時方尚詞賦獨湖學以經義及時務學中故有經義齋治事齋經義齋者擇疏通有器局者居之治事齋者人各治一事又兼一事如邊防水利之類故天下謂湖學多秀彥其出而筮仕往往取高第及為政多適於世用若老於更事者由講習有素也歐陽公詩曰吳興先生富道徳詵詵弟子皆賢才王荆公詩曰先收先生作梁柱以次收拾桷與榱皇祐末召先生為國子監講書專管勾太學數年進天章閣侍講猶兼學正其初人未甚信服乃使其徒之已仕者盛晦之僑顧子敦臨吳元長孜輩分治職事又令孫莘老覺說孟子中都士人稍稍從之一日升堂講易音韻高朗指意明白衆方大服然在列者皆不喜謗議蜂起先生偃然不顧也强力不倦以卒有立迄今二十餘年猶用其規模不廢先生在學時每公私試罷掌儀率諸生㑹於首善掌合雅樂歌詩乙夜乃散諸齋亦自歌詩奏琴瑟之聲徹於外吕氏家塾記徐積字仲車號節孝先生從安定學不復仕進其學以至誠為本初見安定頭容稍偏安定厲色曰頭容直積因思不獨頭容直心亦要直也自此不敢有邪心皇鑑箋要總論言理學者主張程言數學者主康節而言經學則太山之明復徂徠之守道而安定先生則其待學者也宋初士以浮靡相高以雕刻相尚體用之學懵然未之知也公也以身先之其文詩書禮樂其言仁義道徳望其容肅如也聽其言粹如也經義治事各名其齋文藝節義隨類而處雅歌投壺以紓其情公服終日以肅其躬學者明體用以為政教之本先生之力居多焉是故庠舍不足旁拓步營人曰此儒學之盛也吾獨曰從游之多者未足以為盛而從遊之皆賢者始足以為盛吳興先生富道德詵詵子弟皆賢材歐陽之詩以其賢而稱之也始於蘇湖終於太學人曰此儒學之顯也吾獨曰學之獲用者未足以為顯而學之有用者始足以為顯先收先生作梁柱以次收拾桷與榱荆公之詩以其有用而稱之也當是時出其門者淵篤純明溫直簡諒色色有之而治邊防者有人興水利者有人政事文學不可悉數安定之功大矣或曰科舉之外有義理之學義理之外有物理之學物理之外有性命之學安定之學猶未離乎科舉者噫有所學必有所用學而無用與不學等耳使人人盡棄科舉而談虚空則國誰與理民誰與治耶又况安定之學亦未始以科舉累其心者徐節孝非學於安定乎不樂仕進以誠為本誰實教之伊川非學於安定乎不樂仕進以誠敬為學誰實肇之節孝因頭容而不敢有非心安定之教非專以科舉也伊川嘗曰凡從安定學者其醇厚和易之氣可知伊川亦不敢忘其本也吾從學者之妄雌黄故具言之事並見前杜駉文蕃學漢明帝别立校舍自期門羽林之士悉令通孝經章句匈奴亦遣子弟入學唐太宗天下初定增築學舍四夷若髙麗百濟新羅髙昌吐蕃相繼遣子弟入學並三塲指南宋朝太宗興國元年十二月己未是歲高麗國人金行成始入學於國子監神宗熙寧五年詔陜西置蕃學熙寧七年二月庚寅詔國子監許賣九經子史諸書與高麗國使人並長編元豐七年正月壬戌詔高麗王子僧統從其徒三十人來遊學非入貢也其令禮部别定儐勞之儀徽宗大觀二年二月一日黔南興學御筆黔南新造之邦人始從化雖未知學然遡其鄙心非學無以善之委轉運判官李仲將以漸興學舉其孝悌忠和使之勸問大詔令政和五年十一月甲申翰林學士王黼等言體問得高麗所遣學生金瑞等五人在本國日係習詩賦今來若許入學即願習經義及稱國王巳具表請遣子弟入學見候朝廷指揮御筆令遣入學又令太學闢俊選造士二齋以處金瑞等長編政和五年十二月丁巳詔高麗學生每經差通經人三員充博士全編政和七年三月庚寅御崇政殿高麗學士權適等上舍及第釋褐以適為承事郎趙奭金瑞並文林郎歐惟氏從事郎令隨進奉使李資諒歸本國太學俊選造士齋職事人並免省試長編孝宗淳熙八年輔臣進呈湖南安撫轉運司申郴州宜陽縣杜陽軍臨武縣雖與溪峒接境實國家省民欲重恢鄉校招誘溪峒子弟入學訓導上曰開設學校使强暴子弟知有禮義庶㡬移風易俗詔從之羣書考索後集卷三十
