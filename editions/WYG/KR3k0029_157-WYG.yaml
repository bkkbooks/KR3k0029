body:
  text: 羣書考索續集卷二十六宋章如愚編禮樂門禮親享太廟於郊太祖乾徳二年十一月將有事南郊以是月癸亥親享太廟以甲子合祭天地于圜丘開寳元年幸西京將有事南郊以三月壬申親享太廟以四月庚子合祭天地于西京之圜丘哲宗元祐七年詔曰祖宗以來郊廟時祀命官攝事惟三嵗一親郊則享清廟按禮曰魯人將有事于上帝必先有事於泮宫泮宫先人廟也又按唐制奏告太廟之冊祝曰取某月某日有事於某所不敢不告惟宫廟謂之奏告餘百神遣使祭曰祭告至有事南郊方為正祠天寳間乃更太清宫曰朝獻𤣥元廟太廟曰朝享非也而太祖太宗皆先享太廟而後郊冊祝之文曰奏告乎曰朝享乎當從禮官問之太廟原廟祠禴甞烝祫禘宋朝七廟已畧見前郊明堂配享說王制曰天子七廟三昭三穆與太祖之廟而七也周七廟稷為太祖文王武王與親廟四也殷六廟契為太祖湯與二昭二穆也夏五廟禹及二昭二穆也漢無始封之祖高祖即為太祖故漢世止於七廟唐有始封之祖故唐公景皇帝為太祖至𤣥宗時建為九廟其後景皇帝之廟既祧神堯始為太祖舊志載黎幹十詰十難以歸崇敬議尊景皇為始祖不合于禮宜以神堯為始祖其言極當當宋初興僖祖文安令為太祖至于徽宗建為九廟自翼祖而下至于哲宗也以七廟論之則太祖為太祖矣中興以來九廟之外既有已祧者惟禘祫則合食于太廟時享則分祭于原廟景靈宫是也所謂原廟孟享享則四孟者按禮有邑之君祭用首時無田之主薦以仲月也見元魏志各於其室春祠夏禴秋甞冬烝與臘享而五也無事則親享有事則命官攝事也惟太廟親享在太祖朝再舉而太宗以來南郊之嵗始先享太廟而後郊至禘祫之禮乃獨罕見夫宗廟之制一嵗五享朔望薦新薦食之外三年一祫五年一禘皆序昭穆而合食即所謂三年一殷五年再殷猶三年一閠五年再閠也考之九朝帝紀惟仁宗嘉祐四年一祫祭于太廟是何時享之數而禘祫之䟽也唐新志云殷周之興太祖世逺而羣廟之主皆出其後故其理易明漢魏以來其興也暴又其上世微故創國之君為太祖而世近毁廟之主皆在太祖上於是禘祫不得如古斯言得之矣元魏志孝文不以平文為太祖而以道武為太祖於禮為當唐自太宗止曰親享而不言禘祫新舊唐志與宋朝史志雖存禘祫之文而帝紀所書不曰禘祫亦以此歟原廟始於漢凡郡國亦有原廟天子所甞行幸之處也宋朝滁州并州澶州皆有原廟太祖太宗真宗之所臨幸也廟室廟主祭器祭食太廟東向靣陽主生應建門左祖之義也惟太祖居太室中央正東靣之位其三昭三穆六室各列兩旁昭南向穆北向也帝與后有室室有主未祔用桑既祔用栗討有罪則載遷廟之主以行然周家豐洛兩都各有廟廟各有主學者泥夫子尊無二上之言謂廟不言二主者執一無權也毎一室有廟社齋郎三人主之又有室長一人一日一洒掃親享太廟則用牲牢籩豆鉶登存古禮而不尚䙝味至于寢園則朔望薦食各以牙盤備極諸品天寳中用王璵之議太廟亦用寢園之禮非也故廟一嵗而五享寢園一月而二薦享尚氣臭敬之至也薦用䙝味情之盡也或引國語天子有日祭有月祭曽不知月祭朔望也日祭或薦新甞果而已非日祭以為瀆也宗廟昭穆論昭穆世次及宗廟制度之不同或曰昭穆之昭世讀為韶今從本字何也曰昭之為言明也以其南靣而向明也其讀為韶先儒以為晉避諱而改之然禮書亦有作招字者則假借而通耳曰其為向明何也曰此不可以空言曉也今且假設諸侯之廟以明之葢周禮建國之神位左宗廟則五廟皆當在公宫之東南矣其制則孫毓以為外為都宫太祖在北二昭二穆以次而南是也葢太祖之廟始封之君居之昭之北廟二世之君居之穆之北廟三世之君居之昭之南廟四世之君居之穆之南廟五世之君居之廟皆南向各有門堂室寢而墻宇四周焉太祖之廟百世不遷自餘四廟則六世之後毎一易世而一遷其遷之也新主祔于其班之南廟南廟之主遷於北廟北廟親盡則遷其主于太廟之西夾室而謂之祧凡廟主在本廟之室中皆東向及其祫于太廟之室中則唯太祖東向自如而為最尊之位羣昭之入乎此者皆列於北牖下而南向羣穆之入乎此者皆列於南牖下而北向南向者取其向明故謂之昭北向者取其深逺故謂之穆葢羣廟之列則左為昭而右為穆祫祭之位則北為昭而南為穆也曰六世之後二世之主既祧則三世為昭四世為穆五世為昭而六世為穆乎曰不然也昭常為昭穆常為穆禮家之說有明文矣葢二世祧則四世遷昭之北廟六世祔昭之南廟矣三世祧則五世遷穆之北廟七世祔穆之南廟矣昭者祔則穆者不遷穆者祔則昭者不動此所以祔必以班尸必以孫而子孫之列亦以為序若武王謂文王為穆考成王稱武王為昭考則自其始祔而已然而春秋傳以管蔡郕霍為文之昭䢴晉應韓為武之穆則雖其既逺而猶不易也豈其交錯彼此若是之紛紛哉曰廟之始立也二世昭而三世穆四世昭而五世穆則固當以左為尊而右為卑矣今乃三世穆而四世昭五世穆而六世昭是則右反為尊而左反為卑也而可乎曰不然也宗廟之制但以左右為昭穆而不以昭穆為尊卑故五廟同為都宫則昭常在左穆常在右而外有以不失其序一世自為一廟則昭不見穆穆不見昭而内有以各全其尊必大祫而㑹于一室然後序其尊卑之次則凡已毁未毁之主又畢陳而無所易唯四時之祫不陳毁廟之主則高祖有時而在穆其禮未有考焉意或如此則高之上無昭而特設位於祖之西禰之下無穆而特設位於曽之東也歟曰然則毁廟云者何也曰春秋傳曰壊廟之道易檐可也改塗可也說者以為將納新主示有所加耳非盡撤而悉去之也曰然則天子之廟其制若何曰唐之文祖虞之神宗商之七世三宗其詳今不可考獨周制猶有可言然而漢儒之記又已有不同矣謂后稷始封文武受命而王故三廟不毁與親廟四而七者諸儒之說謂三昭三穆與太祖之廟而七文武為宗不在數中者劉歆之說也雖其數之不同然其位置遷次宜亦與諸侯之廟無甚異者但如諸儒之說則武王初有天下之時后稷為太祖而組紺居昭之北廟太王居穆之北廟王季居昭之南廟文王居穆之北廟王季居昭之南廟文王居穆之北廟猶五廟而已至成王時則組紺祧王季遷而武王祔至康王時則成王祔自此以上亦皆止為五廟而祧者藏于太祖之廟至穆王時則文王親盡當祧而已有功當宗故别立一廟於西北而謂之文世室於是成王遷昭王祔而為六廟矣至共王時則武王親盡當祧而亦以有功當宗故别立一廟於東北謂之武世室於是康王遷穆王祔而為七廟矣自是以後則穆之祧者藏於文世室昭之祧者藏於武世室而不復藏於太廟矣如劉歆之說則周自武王克商即増立二廟於二昭二穆之上以祀自高圉亞圉如前遞遷至于懿王而始立文世室於三穆之上至孝王時始立武世室於三昭之上此為少不同耳曰然則諸儒與劉歆之說孰為是曰前代說者多是劉歆愚亦意其或然也曰祖功宗徳之說尚矣而程子獨以為如此則是為子孫者得擇其先祖而祭之也子亦甞考之乎曰商之三宗周之世室見於經典皆有明文而功徳有無之實天下後世自有公論若必以此為嫌則秦政之惡夫子議父臣議君而除謚法者不為過矣且程子晩年亦甞論宋朝廟制亦謂太祖太宗皆當為百世不遷之廟以此而推則知前說若非記者之誤則或出於一時之言而未必其終身之定論也曰然則大夫士之制奈何曰大夫三廟則視諸侯而殺其二然其太祖昭穆之位猶諸侯也適士二廟則視大夫而殺其一官師一廟則視大夫而殺其二然其門堂室寢之備猶大夫也曰廟之為數降殺以兩而其制不殺何也曰降也天子之山節藻梲􅃨廟重屋諸侯固有所不得為者矣諸侯之黝堊斵礱大夫有不得為矣大夫之倉楹斵桷士又有不得為矣曷為而不降哉獨門堂室寢之合然後可名於宫則其制有不得而殺耳葢由命士以上父子皆異宫生也異宫而死不得異廟則有不得盡其事生事存之心者是以不得而降也曰然則後世公私之廟皆為同堂異室而以西為上者何也曰由漢明帝始也夫漢之為禮畧矣然其始也諸帝之廟皆自營之各為一處雖其都宫之制昭穆之位不復如古然猶不失其獨專一廟之尊也至於明帝不知禮義之正而務為抑損之私遺詔藏主於光烈皇后更衣别室而其臣子不敢有加焉魏晉循之遂不能革而先王宗廟之禮始盡廢矣降及近世諸侯無國大夫無邑則雖同堂異室之制猶不能備獨天子之尊可以無所不致顧乃梏於漢明非禮之禮而不得以致其備物之孝葢其别為一室則深廣之度或不足以陳鼎爼而其合為一廟則所以尊其太祖者既䙝而不嚴所以事其親廟者又厭而不尊是皆無以盡其事生事存之心而當世宗廟之禮亦為虚文矣宗廟之禮既為虚文而事生事存之心有終不能以自已者於是原廟之儀不得不盛然亦至于宋朝而後都宫别殿前門後寢始畧如古者宗廟之制是其㳂襲之變不惟窮鄉賤士有不得聞而自南渡之後故都淪没權宜草創無復舊章則雖朝廷之上禮官博士老師宿儒亦莫有能知其原者幸而或有一二知經學古之人乃能私議而切歎之然於前世則徒知譏孝惠之飾非責叔孫通之舞禮而於孝明之亂命與其臣子之茍從則未有正其罪者於今之世則又徒知其惑異端徇流俗之為陋而不知本其事生事存之心有不得伸於宗廟者是以不能不自致於此也抑甞觀於陸佃之議而知神祖之甞有意於此矣然而考於史籍則未見其有紀焉若曰未及營表故不得書則後日之秉史筆者即前日承詔討論之臣也所宜深探遺㫖特書總叙以昭示來世而畧無一詞以及之豈天未欲使斯人者復見二帝三王制作之盛故尼其事而嗇其傳邪嗚乎惜哉中庸或問禮論僖祖不當祧當為宋朝萬世之始祖切詳羣議其說雖多而揆以禮經皆有可疑如曰藏於太廟之西夾室則古者唯有子孫祧主上藏於祖考夾室之法而無祖考祧主下藏於子孫夾室之文昔者僖祖未遷則西夾室者僖祖之西夾室也故順翼二祖之主藏焉而無不順之疑今既祧去僖祖而以太祖祭初室矣則夾室者乃太祖之夾室自太祖之室視之如正殿之視朶殿也子孫坐於正殿而以朶殿居其祖考於禮安乎此不可之一也至於祫享則又欲設幄於夾室之前而别祭焉則既不可謂之合食而僖祖神坐正當太祖神坐之背前孫後祖此又不可之二也如曰别立一廟以奉四祖則不唯䘮事即逺有毁無立而所立之廟必在偏位其棟宇儀物亦必不能如太廟之盛是乃名為尊祖而實卑之又當祫之時羣廟之主祫于太廟四祖之主祫于别廟亦不可謂之合食此又不可之三也如曰藏主于天興殿則宗廟原廟古今之禮不同不可相雜而不得合食亦與别廟無異此又不可之四也凡此數者反復尋繹皆不可行議者亦皆知其不安而不知所以然者特以其心急欲尊奉太祖三年一祫時暫東向之故而為此紛紛不復顧慮殊不知其實無益於太祖之尊而徒使僖祖太祖兩廟威靈常若相與争校强弱於㝠㝠之中并使四祖之神疑於受擯徬徨躑躅不知所歸令人傷痛不能自已不知朝廷方此多事之際亦何急而為此也今毋論其他但以太祖皇帝當日追尊帝號之心而黙推之則知太祖今日在天之靈於此必有所不忍而不敢當矣又况僖祖祧主遷於治平而不過數年神宗皇帝復奉以為始祖已為得禮之正而合於人心所謂有其舉之而莫敢廢者乎且孔子論武王周公之孝而曰踐其位行其禮奏其樂愛其所親敬其所尊事死如事生事亡如事存孝之至也今天子既踐太祖之位行太祖之禮奏太祖之樂矣則當愛太祖之所親敬太祖之所尊所以事太祖者無以異於生存之時乃為至孝而議者顧欲黜其所追尊之祖考置之他所而又未有一定之處是豈所謂愛敬其所親尊而事之如生存之時乎且議者之所以必為此說者無他但以太祖膺圖受命化家為國而王業之興不由僖祖耳若以此言則后稷本封於邰而不窋已自竄於戎狄公劉太王又再遷而後定文武之興又何甞盡由於后稷哉但推其本始為出於此故不可以不祭而祭之不可以不尊耳豈計其功徳之小大無有哉况周人雖以后稷為太祖而祭法亦曰祖文王而宗武王是乃所謂祖有功而宗有徳之意故自為世室而百世不遷以冠羣廟則亦不待東向於祫然後可以致崇極之意矣然今日宗廟之制未能如古始以權宜而論之則莫若以僖祖擬周之后稷而祭於太廟之初室順祖為昭翼祖為穆宣祖為昭而藏其祧主于西夾室太祖為穆擬周之文王為祖而祭於太廟之第二室太宗為昭擬周之武王而祭於太廟之第三室其太祖太宗又皆百世不遷而謂之世室真宗為穆其祧主亦且權藏於西夾室仁宗為昭為宗而祭於第四室亦為世室如太宗之制英宗為穆藏主如真宗之制神宗為昭祭第五室哲宗為穆祭第六室徽宗為昭祭第七室欽宗為穆祭第八室高宗為昭祭第九室孝宗為穆祔第十室異時高宗亦當為宗為世室如太宗仁宗之制三嵗祫享則僖祖東向如故而自順祖以下至于孝宗皆合食焉則於心為安於禮為順矣至于古者宗廟之制今日雖未及議尚期興復之後遷反舊都則述神宗之志而一新之以正千載之繆成一王之法使昭穆有序而祫享之禮行於室中則又善之大者也葢尊太祖以東向者義也奉僖祖以東向者恩也義者天下臣子今日之願也恩者太祖皇帝當日之心也與其伸義屈恩以快天下臣子之願孰若屈義伸恩以慰太祖皇帝之心乎韓愈所謂祖以孫尊孫以祖詘者正合此意而又以為四時各祭其廟則所伸之祭常多三年然後一祫則所詘之祭常少亦中事情熹於此常有感焉切獨以為今欲議四祖神位所祔之宜而卒不免於舛逆而難通不若還僖祖於太廟三年而一東向之為順易而無事也文公奏議謹按禮家先儒之説兄弟傳國者以其甞為君臣便同父子各為一世而天子七廟宗者不在數中此為禮之正法若今日見行廟制則兄弟相繼者共為一世而太廟増為九世宗者又在數中皆禮之末失也故熹所擬太廟世數一凖先儒之說固知未必可用若議者乃用今制而反不曽詳考自僖祖以至孝宗方及十世太祖太宗為第三世尚在四昭四穆之中今日祧遷只合依孝宗初年遷翼祖例且遷宣祖然後為得乃不察此而欲一旦無故并遷僖宣二祖又强析太祖太宗各為一世既與哲徽欽高之例不同又使太廟所祀其實僅及八世進不及今之九退不成古之七尤為乖謬無所據依政使熹說迂濶多所更改不可施行其議者并遷二祖析一為二之失亦合速行改正且遷宣祖而合太祖太宗復為一世以足九世之數文公奏議熹既為此議續搜訪得元祐大儒程頥之說以為太祖而上有僖順翼宣先甞以一僖祧之矣介甫議以為不當祧順以下祧可也何者宋朝推僖祖為始已上不可得而推也或難以僖祖無功業亦當祧以是言之則英雄以得天下自己力為之並不得與祖徳或謂靈芝無根醴泉無源物豈有無本而生者今日天下基本葢出於此人安得為無功業故朝廷復立僖祖廟為得禮介甫所見終是高於世俗之儒熹切詳頥之議論素與王安石不同至論此事則深服之以為高於世俗之儒足見理義人心之所同固有不約而合者但以衆人不免自有争校强弱之心雖於祖考亦忘遜避故但見太祖功徳之盛而僖祖則民無得而稱焉遂欲尊太祖而卑僖祖又見司馬光韓維之徒皆是大賢人所敬信其議偶不出此而王安石乃以變亂穿鑿得罪於公議故欲堅守二賢之說并安石所當取者而盡廢之所以無故生此紛紛今以程頥之說考之則可以見議論之公而百年不决之是非可坐判矣仝上臣切見太祖皇帝受命之初未遑他事首尊四祖之廟而又以僖祖為四廟之首累聖尊崇罔敢失墜中間雖以世數寖逺遷之夾室而未及數年議臣章衡復請尊奉以為太廟之始祖宰相王安石等遂奏以為宋朝自僖祖以上世次不可得而知則僖祖有廟與稷契疑無以異今欲毁其廟之主替祖考之尊而下祔於子孫非所以順祖考之孝心也於是神宗皇帝詔從其請而司馬光韓維孫抃孫固等以為非是力奏争之其說甚詳然其立意不過以為太祖受命立極當為始祖而祫享東向而僖祖初無功徳親盡當祧而已臣深考其說而以人心之所安者揆之則僖祖者太祖之高祖考也雖歴世乆逺功徳無傳然四世之後篤生神孫應天順人以寧兆庻其為功徳葢不必身親為之然後為盛也是以太祖皇帝首崇立之以為初廟當此之時葢已歸徳於彼而不敢以功業自居矣今乃欲以尊太祖之故而必使之奪據僖祖初室東向之位臣恐在天之靈於此有所不忍而不敢當也安石之為人雖不若光等之賢而其論之正則有不可誣者世之論者不察乎此但見太祖功徳之盛而不知因太祖當日崇立僖祖之心以原其所自但見光等之賢非安石章衡之所及而不知反之於已以即夫心之所安是以紛紛多為異說臣甞病其如此毎恨無以正之因訪得元祐大儒程頥所論深以安石之言為當而所論并祧一祖止成八世之說尤為明白欲乞詳議以承太祖皇帝尊祖敬宗報本反始之意上延基祚下一民聴千萬幸甚文公奏議廟議得失不同大畧見前郊丘明堂配享說之末注議禮之家有同聚訟至於廟議抑又甚焉已祧之主莫適所歸惟唐人陸贄之議為當其說以為藏諸夾室是無獻享之期異乎周人藏於文武二祧之義禮不可行也置於别廟始於魏明之說禮經實無明文瘞於寢園乃漢韋𤣥成之說是禘祫無復序昭穆惟有藏於興聖廟禘祫之嵗一祭之庻乎亡於禮者得變之正也興聖廟猶周之后稷廟唐諸儒無有易其說者此以議而得也漢用韋康之議盡罷毁廟及郡國原廟宋朝元豐盡罷從祀也亦然崇寧間建九廟而已祧者盡復又類西漢之末盡復毁廟原廟也是非迭出罷復不常此以議而失也然則廟議得失人主亦惟揆其情之安從其理之當者而已不然漢武帝自制封禪議唐武氏自制明堂圖不從公議自遂侈心其悖常亂理者愈多矣帝王夫子廟秦漢廢興仁暴不同九疑祀舜㑹稽祀禹過魯而祠孔子其所以為致敬者一也故五帝三王歴代祀典不絶或尊為三恪或廟而祖之吾夫子之廟自漢迄今其間或以中國而主中國或以夷狄而汚中國皆知尊其道重其教正衣冠執豆籩屈膝展拜於其庭延師儒講詩禮摳衣揖遜於其堂此足以見祖述憲章其道同也歴觀諸史志自郊廟親祠外惟帝王夫子廟人主所至與有時而臨幸皆親祠焉與其他常祠有司攝事葢不侔矣然武成王廟輒與文宣並稱此乃開元之失禮循而襲之非也彼得與有功於國者同在祀典已為過矣何容以文武二學之故而儕諸元聖之列乎雖然追封孔子為王顔子等為公廟像及圖畵祭器釋奠儀注視開元禮為有加者皆宋真宗行之其列㦸十六則太祖所立幸學之典累聖所遵釋奠之禮至今遍于天下武成一廟不足以况之矣忠臣孝子廟聖王之制法施於民以死勤事以勞定國能禦大菑能捍大患者皆在祀典忠臣孝子義婦烈女國史有傳血食有廟者一念足以動天地方寸足以貫日月廟而祀之於以表倡風俗砥礪生民其有功於天下不細矣神仙之事若果有之則列仙傳所載亦惟忠孝者為之信乎正道無徃而不存也徽號人臣上人主尊號亦猶人主上天地尊號也然三朝禮書以是為嘉禮之冠其事重矣熈寧中羣臣有請至於三四上終不允且曰尊號正如卿等功臣何補名實此皆基於司馬温公一言而神祖終身行之至今以為法者禮也愚敢以是為逹禮之冠夫自漢以來時君雖時有加號未為常典唐高宗稱天皇中宗𤣥宗始有上尊號之禮宋朝因之凡上尊號皆因郊祀明堂封禪也夫熈豐大臣盡變祖宗法度獨於此無所論列者出於神考之獨斷也又大臣志在變法而已使不允尊號之請祖宗已甞行之則將求異於前人矣神考甞悔改官制矣又甞言役法宜均所謂均無貧也元豐四年舒亶言役法未均上曰近臣僚有自陜右來者欲盡免中下之民朕謂不然夫衆輕易舉中下之民多而上户少若盡免而取足於上户則不均甚矣曷謂均無貧也今之避役者多為詭户正合神祖之言神考多有美意特臣下不能將順者皆此類也茍能將順則神考盛美大書不一而足何止不允徽號一事乎朝㑹大舜廵狩羣后四朝禹㑹塗山玉帛萬國武王孟津之㑹不期而至者八百康王即位諸侯入應門左右宏璧琬琰天球河圖布列於東西序可謂盛矣故周禮辨朝覲㑹同之名春秋嚴朝覲㑹同之名春秋嚴朝覲㑹同之分以五等之爵各有分地等差故也自秦罷侯置守尊君抑臣而朝㑹之儀與古不同漢初猶有侯王至武帝以酎金罷省所存無㡬故自東都迄于唐元㑹之日執玉帛羔鴈者雖畧倣古制其實公侯皆虚名而非有分地者内則不過在朝之臣外則不過刺史二千石與諸州計吏四夷賔使而已今考之漢晉隋唐之志所紀元㑹之儀甚設仗衛森嚴文物備具班列整齊太史公及新唐志皆言其鏘鏘濟濟有可觀者君尊臣卑故也惟宋齊梁以來有所謂白獸尊者猶存杜舉之意若夫漢徳陽殿元㑹西方舍利作霧為魚龍曼延之戯唐開元受朝作樂有拜象舞馬之侈適足為大盗之招三代之禮必不然也宋太祖元㑹服衮冕設宫縣冬至受朝賀服通天冠絳紗袍登歌二舞羣臣禮飲五行或十行太官賜食太宗真宗遂為家法崇觀少縱即致大變宜乎中興益知戒謹也常朝常參唐制文武職事官並赴常參未有無職事者有日參有一月六參九參者類苑載宋朝凡不釐務者謂之常參何不同也葢文徳殿曰外朝凡不釐務朝臣日赴是謂常朝常朝猶常參也垂拱殿曰内朝宰臣樞宻以下要近職事於武班日赴是謂常起居毎五日文武朝官釐務不釐務並赴内朝謂之百官大起居凡三等也文武陞朝官大朝㑹並朝服常起居並公服天子坐朝莫先於正衙殿文徳殿是也於禮羣臣無一日不朝者故正衙雖不坐常參官猶立班後放朝乃退愚按事畧太祖建隆三年詔常參官五日以次轉對以二人為率是則常參官未必盡無職事史文按一朝國史云三年詔内殿起居日令百官以次轉對封章於閣門通進則知五日大起居之時釐務不釐務者皆許轉對封章也入閣晩朝自唐至宋朝天子御正殿則金吾仗黄麾伏整文武兩班以侍輦出或避正殿則喚仗入閣仍賜廊下食熈寧中王珪等以為唐制不足取削去之葢唐制宰相入閣諌官隨之熈寧大臣欲變法故不復行入閣之儀也見職官志諫官說舊䂓學士當直則趂晩朝其後赴早朝而罷晩朝舊制經筵皆有實職蔡確慮其有言也乃以侍讀侍講為兼官而以秩卑資淺者為說書隆興改元詔學士及經筵官内宿稍復祖宗故事宜矣詳見職官志朝服公服三代而上天子諸侯衮衣旒冕執圭履舄各有隆殺秦滅九國廢衮冕而俱元冠絳衣使臣下不得與天子同則知孟子所謂朝衣朝冠者衮冕圭舄也漢以來大祭祀大朝㑹則具朝服其常祀常朝則公服而已所謂公服者今之朱紫幞帶靴笏也政和中始改靴用履然今之衣冠較之古制則不足較之唐制則有餘者葢自漢明帝修復先典見沈約引司馬彪輿服志迄于江左六朝畧存衣冠佩玉舊制故雖元魏亦未變服自北齊高氏中國常服乃全用故窄袖短衣長靿靴蹀躞帶唐武徳貞觀時猶然者高祖太宗起自晉陽故也開元後雖稍褒博而制難盡更故幞頭四帶二垂腦後二繫頭上令曲折惟人主得用硬帶迨夫宋朝興自亳都衣冠褒博始近古制文武陞朝官大朝㑹並朝服常朝常起居並公服士大夫常服亦用㡌帶靖康之變服制變易又百年矣嗚呼中國禮義之所自出乃衣冠亦隨氣運代有變更何耶宋朝直脚幞頭上下通用又有高脚交脚朝天順風四者隨所用之冠弁巾幘㡌太古布冠齊則緇之夏曰毋追殷曰章甫周曰委貎爵弁皮弁武弁隨所用之緇衣羔裘素衣麑裘黄衣狐裘裼裘襲裘皆三代之所常服也秦漢以來臣下皆𤣥冠絳衣又以武靈王之惠文貂蝉賜侍臣蝉清貂煖皆夷服以楚王之獬豸冠賜法官以其能觸邪皆非古制也古者賤人不冠則服幘秦加武將首飾以絳帕漢加以顔題名之以幘元帝額有壯髪始引幘服之王莽髪秃又加其屋而光武亦甞岸幘而迎馬援於是乎有介幘平巾幘赤幘黒幘之制以别文武然則公西赤所謂端章甫而孔孟家所傳畵像冠服猶古至秦而下冠始加幘也晉志有所謂緗幘白幍烏紗幍江左常服中褐􅃭裙漢巾幅巾縑巾葛巾纚㡌自萬乗王公士人野人各隨所宜漢郭林宗墊巾唐賜臣下以􅀈巾又各隨所尚宋朝常服亦然惟先軰多尚紗㡌深衣亦甚典重大抵勝乎唐制衣冠矣夫深衣又曰单衣禮記言之詳矣人皆能辨其制度惟方領中矩取夫折旋之義而已非必盡如矩方也今人製衣領或類道流所謂堂衣者其俗特甚璽佩韍印綬東漢志云古者君臣佩玉有度所以章徳垂韍蔽膝所以執事戰國戰争去韍佩而留其係禭秦以采組連結於禭謂之綬漢因秦制加之以印公卿而下皆佩印綬天子帶綬六采而不佩六璽使侍中以金銀縢組負璽以從今考之禮記天子佩白玉而𤣥組綬公侯山𤣥玉而朱組綬卿大夫水蒼玉而緇組綬士瓀玟而緼組綬自周已然非始於秦也秦漢有位者皆佩印蘇秦佩六國印朱買臣佩㑹稽印印亦非始於漢也今之有位者印亦不佩矣非惟萬乗不佩璽也宋志引漢志注曰印璽也秦以前皆金玉為印龍虎紐惟所好自秦以璽為稱漢高祖得始皇玉璽名之曰傳國寳與白蛇劒同傳晉武庫火劒已失璽或亡或存故臣下無得用玉又知印固非始於漢而璽亦非始於秦也宋志又云漢明帝復佩玉之制至漢末而廢魏王粲復制玉佩而宋因之故宋皇太子諸王有瑜玉𤣥玉之辨公侯有水蒼玉之制今惟大朝㑹大祭祀及釋奠猶存佩玉而公服則佩魚而已又漢制左佩劒象青龍右佩刀象白虎晉以來始以木劒代之今皆不然又秦以前丈夫皆佩劒玉童子亦佩觹韘今亦不然夫古者去喪無所不佩琴瑟無故不去身以見禮樂不可斯湏忘也非僻安得而入易直子諒安得不油然而生今既不然宜乎投魚于淵寘猿于木也魚笏帶唐制公服有紫緋緑青碧今無青碧制佩有魚龜刀礪今止有魚唐制魚有金銀銅鍮今止有金銀唐制佩魚係而垂之其制小而類魚今乃係之於𢃄制稍大而不全類魚周禮諸侯之笏用象大夫以魚須文竹晉宋以來謂之手板晉宣帝時内外婦人亦執笏拜俛伏興唐開元中諸笏五品以上用象九品以上用竹木與今大同小異惟象笏唐以前詘後直前屈後挫者為尊今皆不然晉志云革帶古之鞶帶也上而有位下而騶從皆服之其有囊綬則綴於帶凡執笏亦搢于帶搢笏則垂紳三尺有事則書諸紳惟笏亦書以紀事故甞簮筆臺省官内侍簮之他皆不簮與今皆不類圖畵衣冠劉知幾議祕閤有梁武帝南郊圖多有不冠乗馬者此乃後人所為葢當今有古圖畵多矣如張僧繇畵羣公祖二疎而兵士有着芒屩者閻立本畵昭君入匈奴而從人有着帷㡌者夫芒屩出於水鄉非京華所有帷㡌創於隋代非漢宫所作則知梁武南郊圖義同於此愚謂志禮樂者宜紀一代所用之文足矣茍徒詳而非實毋亦梁圖漢畵之類乎劉知㡬謂江左官至尚書郎即不乘馬故謂梁武南郊必無不冠乗馬也然梁武帝南郊已御輦而不御輅則衣冠未必不乘馬蒐苖獮狩國之大事惟祀與戎戎兵凶器也有軍禮存焉蒐苗獮狩旄頭罕畢以先驅金鼓鐲鐃以為節皆武事也乃皆謂之禮周官司馬掌兵而起軍旅之法乃屬之掌教之司徒者聯比閭族黨之情次伍兩軍旅之序無非示之以禮也下至春秋圖伯之君欲用其民亦必大蒐使之知禮秦漢以來惟孫吳韓白之詐是尚而治兵閲武之事蒐苖獮狩之禮萬乗少親御馬或十月而都數十年而一講如馳射上林講武驪山者遂為希代之曠典一旦用民惟譎是恃于禮乎何有惟宋太祖嚴卒伍階級之法則下不得以凌上三衙見宰執横仗肅揖則武不得以抗文談笑從容殺節度之權賔接撫柔慰降王之心無非禮也察見諸將之不嗜殺人者然後用之非止殺人之中猶有禮也此所以訓兵十五萬東征西怨無敵於天下也累聖相承太平日乆蒐苗獮狩之禮希講而百萬之師安於豢養澶淵之役衛士瑟縮不敢前靖康之變王師遑遽而無策者由斯民耳不熟於金鼓目不熟於戰陣也太祖鑿講武池於朱明門太宗築講武臺於楊林真宗以後閱武蒐狩之事時焉一講未􅇠希濶射享食鄉古者天子諸侯弓矢射侯皆有名數而後射禮行朝覲聘問皆有時序而後享禮行凡是二者以尊而親乎卑者也自秦罷侯置守而情不親故射享之禮無足言者古者食老更屈已而尊高年所以示孝悌之義鄉飲酒尚齒而不尚爵所以明長㓜之序凡是二者以尊而下乎卑者也自秦尊君抑臣其分過嚴故食鄉之禮無行之者漢魏以來間有行之者遂為剏見而亦非人情之所安故凡諸志所載五禮之目而射享食鄉雖存於嘉禮真所謂旲文而實則不然也宋朝幸學講經釋奠之典常行而養老之文不具太宗真宗言及鄉飲之禮皆不果行詳見樂門讌樂說惟射享之禮有可得而言者太宗朝命有司草具大射之禮凡遊幸池苑躬率武臣宗室臨射上中的則從官奉觴為壽其射者中則有襲衣金帶鞍馬之賜孝宗朝令學校文武士皆習射至今文人多能之者殿庭策士猶以是較能否也至於燕享羣臣故事常以春秋之季仲月及誕聖節大宴于廣徳殿殿上朶殿兩廊有綉團蒲團之别至典宴則用天子郊祀籍田禮畢則大宴觀燈觀稼校獵賞花釣魚皆有宴然有禮有分存焉至崇觀間顧乃過為䙝瀆其變有不可勝言者乃知是禮不可一日廢也冠昏喪祭人生二十曰弱冠三十謂之成人然周公東征成王年甫十六而與大夫盡弁以開金縢之書禮曰國君十五而生子冠而後生子禮也是不待二十而後冠也東漢禮儀志云乘輿初加緇布進賢冠次爵弁武弁次通天冠所謂三加元服也設金石之樂行祼享之義或冠於廟見欽若昊天式是六合也宋儀禮注云晉宋以來皇太子及諸藩王冠加一冕幘而已是不待三加也漢禮乘輿皆用正月甲子或丙子日見東漢志正始之道也唐太宗貞觀中用十月慮遣兵設儀衛妨農時故也宋朝政和間皇長子初行冠禮遂編次五禮今王公之家猶存此禮而士禮盡廢矣其有以某子冠告同列者遂以為笑端不特此也大昏萬世之始三綱之首聖賢之所重而後世之所忽非惟六禮莫之能行而世教日衰賣昏之家至今習以成俗哆然無顧人倫掃地盡矣䘮以送終所謂大事祭以時思所謂終身之慕二禮所載喪祭之儀至備身不能行而乃聽命於緇黄者何哉蓋古者喪祭詔禮者有人相禮者有助故致孝者得以行禮於其間而無悖於禮也今人以緇黄代詔相者而身得以自安其有知所敬畏者緇黄猶詔相也不然則悖於禮者多矣短䘮漢文帝鑒平勃之事不欲百官聽命於冡宰遂為以日易月之制後世固有改之而終莫能改者情之所便也烏有天子之孝刑於四海身不能行而欲天下行之何以哉故凡歴代之所謂凶禮大本既立其餘節目自有司存不復論辨宋朝渡江以來所以待金使之儀亦皆權時之宜也墓祭火葬夫子曰拜下禮也今拜乎上吾從下麻冕禮也今也純儉吾從衆愚亦謂古不墓祭禮也今也上自萬乘有上陵之禮下逹庻人有掃墓之祭雖非古義不害時思宜從今古者為棺槨衣衾以土葬禮也今也下愚之俗效夷狄之法有火葬水化之慘其為悖禮甚矣宜從古太祖建隆初詔禁火葬故曰禮從宜又曰禮時為大順次之凡適其宜而行之以順則古今之禮亦可以通行矣無徒是古非今也䘮服議故事武臣不持䘮韓汝玉奏請如文臣㑹議於玉堂唐子萬曰今日不可為高論歐陽永叔勃然曰父母死而令持服安得為高論葉夢得不覺歎曰俊人也率然一言亦中於理於是議武臣官大者持父母服官卑者不持服至今猶然則知濮議之興歐公未必非其平日之定見所恨不知權耳羣書考索續集卷二十六
