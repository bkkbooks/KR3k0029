body:
  text: 羣書考索續集卷十五宋章如愚編諸史門三國志不當書魏為紀呉蜀為𫝊壽以魏承漢統為正故稱紀呉蜀各據一方故在諸侯之列而言傳愚以謂既以魏為正統則諸侯宜奉天子之正朔其書當皆言魏志呉主蜀主𫝊安得言三國志而於呉蜀主𫝊各稱其紀年乎若曰呉蜀不禀魏正各擅制度則其書自稱紀無害史例也或者又謂仲尼作春秋不曰周史而曰魯史不稱天王之元年而稱魯公之元年則呉蜀𫝊不繫於魏史而自稱其年紀於義無異予曰仲尼所作者魯史爾故稱其國君之元猶書曰王正月言王者之正諸侯所當禀奉而行稱魯公之元者是别其一國之書也蘇魏公文同前古者二國争盟晉楚並稱侯伯七雄力戰齊秦俱曰帝王其間雖勝負有殊大小不類未聞勢窮者即為匹庶力屈者乃成冦賊也至於近古則不然當漢氏云亡天下鼎峙論王道則曹逆而劉順語國祚則魏促而呉長但以地處幽夏人𫝊正朔度長挈大魏實居多二方之於上國亦猶秦繆楚莊與文襄而並伯逮作史之書事也沒呉蜀號諡呼權備姓名方於魏邦遼隔頓逺懲惡勸善其義安歸史通蜀書不當首標二牧次列先主逐兎争㨗瞻烏靡定羣雄僣盗為我驅除是以史𫝊所分真偽有别陳勝項籍見編於髙祖之後隗囂孫述不列於光武之前而陳夀蜀書首標二牧次列先主以繼焉璋豈以蜀是偽朝遂乃不遵常例但鷃鵬一也何大小之異哉同上陳壽以父仇而謗蜀陳氏三國志劉後主𫝊云蜀無史職故災祥靡聞按黄氣見於秭歸羣鳥堕於江水成都言有景星出益州言無宰相氣若史官不置此事從何而書蓋由父辱受髠故加兹謗議者也同上後漢書晉書不當因彼虚譽定為實録至如江東五篇始自㑹稽典録潁川八龍出於荀氏家𫝊而修漢晉史者皆因彼虚譽定為實録茍不别加研覈何以詳其是非史通晉書紀傳載記皆太宗之失為甚多噫太宗以湯武而平隋之亂以成康而致治之美何頼一晉史而知名哉畫蛇而添足者徒失盃酒畫虎而添翼者祗自取辱然晉史之行於今五百年矣宣景文不當稱帝而太宗為之立紀賈充王沈八王不當稱臣而太宗為之立𫝊十六國之禍流天下不當稱其偽號而太宗為之載記此太宗之失也後世或因而不改此又同太宗之失也同上史家皆文詞之士競為綺艶不求篤實唐房元齡與中書侍郎禇遂良受詔重撰晉書於是奏取太子右庶子許敬宗中書舎人來濟著作郎陸元仕劉子翼前雍州刺史令狐徳棻太子舎人李義府薛元超起居郎上官儀等八人分功撰録以臧榮緒晉書為主參考諸家甚為詳洽然史官多是文詞之士好采詭謬碎事以廣異聞又所評論競為綺艶不求篤實由是頗為學者所譏惟李淳風深明星厯善於著述所修天文律厯五行三志最可觀采太宗自著宣武二帝及陸機王羲之四論於是總題云御撰餘以為史之失自陳夀始觀呉志諸葛恪載題驢謝馬事乃知晉史冗記有自來矣自昔史氏所書兩人一事必曰語在某人𫝊晉書載王隱諌祖納奕棋一叚幾二百字兩𫝊俱出此為文煩矣孔毅父雜説史臣筆力短弱多失事情吾觀魏志管寕注胡昭脱晉宣帝於死而口終不言以為賢於丙吉又觀晉載記慕容超𫝊呼延平之活超也與丙吉事正相類而史氏文不足以起之故奄奄如此可為長太息也晉書隱逸夏仲御𫝊史臣欲效太史公樂書文章而不知筆力短弱乃失事情使人讀而覺之為可笑也許邁當在隱逸𫝊而以綴王羲之之後失次矣同上晉書本非御撰晉史乃唐時文士所為但托之御撰耳天文志云天聰明自我人聰明以民為人太宗不應自避其名又洛書乾曜度以乾為甄則太宗又不應為太子承乾避名也以此足見乃當時臣下所為耳臣下之文嫁其名於人主已為失矣而人主傲然受之不辭當胥失矣嬾真子録多採小説為非晉世雜書諒非一族若語林世説幽明録搜神記之徒其所載或詼諧小辨或神鬼怪物其書非聖揚雄所不觀其言亂神宣尼所不語唐朝所撰晉史多採以為書夫以于鄧之所糞除王虞之所糠粃作為逸史用補前𫝊此何異魏朝之撰皇覽梁世之修通略務多為美􅀶聚為功雖取悦於小人終見嗤於君子矣史通𫝊劉伶畢卓所取何事近者皇家撰晉書著劉伶畢卓𫝊其叙事也直載其嗜酒沉湎悖禮亂徳若斯而已為𫝊如此復何所取者哉同上貞元元和之後皆長於文故述史者為近古貞觀開元之前猶短於文故述史者為得罪於古惟正元元和之後承三變之餘有二漢述作之風自韓愈作順宗實録當時以為頗有風骨故元和諸公皆能著述如毛頴如革華如李赤如醉吟先生𫝊史才過於前人也愚所謂以貞元元和之文而述史者猶為近古以貞觀開元之文而述史者宜得罪於古人也嗚呼唐太宗處正觀之初既不及開元之雄渾又未見正元元和之典則以徐庾遺風王楊末學欲追遷固之遐軌如貶晉之亡而謂鼇隊三山鯨呑九服此即詩詠之詞也貶惠帝之昏而謂溽暑之氣方聞滛蛙之音罕記此即表奏之詞也是皆蕪穢簡編謬亂賢否太宗不為愧耳林少穎𫝊之所記者十不得其六七贊之所褒貶者百不得其一二嘗考晉史之文其失實者以百數姑取其害於名教者一二陳之夫典午之晉合百五十餘年自景文以來凡為八王之黨者又皆司馬之賊自元帝中興之後凡為王敦蘇峻之徒者知有賊而不知有君自海西簡文之後凡為桓温靈寶之徒者知有逆而不知有順故將相無終始之功名而王侯貴戚亦無幸全之腰領此宜褒一忠賢而使之與日月争光貶一奸回而使之與糞穢同臭是故其贊叙之文當反覆諄諭無一言一事之不詳然後亂臣賊子知所畏懼也今晉史載叙拘於文而不及於理短於識而不知其辨𫝊之所記者十不得其六七贊之所褒貶者百不得其一二林少頴稱為御撰是掠美於羣臣切原太宗之稱為御撰者是掠美於羣臣豈其萬機之暇猶能為此麗藻耶且廷臣如李延夀者最長於史筆南北八代二書百八十篇者皆自延夀次之其它如令狐徳棻既明修史之義如崔仁師岑文本次周史李百藥次齊史姚思亷次梁陳二史魏公次隋史房元齡總監修之夫以南北二史其言詞與晉同贊序與晉同延夀徳棻等既以南北馳名自不得以晉史知名也羣臣次晉史而太宗擅名此何足怪也同上梁陳隋周書多貞觀貴臣為父祖揚名自梁陳已降隋周而往者史皆貞觀年中羣公所撰近古易悉情偽可求至於朝廷貴臣必父祖有𫝊考其行事皆子孫所為而訪彼流落詢諸故老事有不同言多爽實昔秦人不死驗符生之厚誣蜀老猶存知葛亮之多枉斯則自古所歎豈獨於今哉史通北史魏書二十八君不當襲其虚號元氏起於邊朔其君乃一部之酋長耳道武追崇所及凡二十八君自開闢以來未之有也而魏書序紀襲其虚號何異沐猴而冠腐䑕稱璞者矣史通隋書不當依阮氏七録指晉朝劉石符姚等書為偽史當晉宅江淮實膺正朔嫉彼羣雄稱為僣盗故阮氏七録以田范裴叚諸記劉石符姚等書别剏一名題為偽史及隋氏受命海内為家而世有撰隋書之經籍志者其流别羣書仍依阮録按國之有偽其來尚矣如杜宇作帝勾踐稱王孫權建鼎峙之業蕭詧為附庸之主而楊雄撰蜀紀子貢著越絶虞裁江表𫝊蔡述後梁史考斯衆作咸是偽書自可類聚相從合成一部何止取東晉一世十有六家而已乎史通王邵袁充兩𫝊徒載繁辭昔賈誼上書晁錯對策皆有益於國足貽勸戒而編於漢史讀者猶恨其繁如隋書王邵袁充兩𫝊唯録其詭辭妄説遂盈一篇夫人載言示後者貴於辭理可觀既以無益而書豈若遺而不載同上漢書唐書𫝊儒林循吏獨行隱逸獨義孝友非漢唐美事西漢之有儒林有循吏非西漢美事葢自髙祖見儒服而嫚罵而儒氣不振申韓之術行於世而吏治多出於刑名班固作西京一書表儒林循吏而出之以傷漢之儒與吏也東漢之有獨行隱逸非東漢美事葢自矯激之俗興士始流為崖異卓絶之行自亷恥之風喪時始貴髙舉逺蹈之人范􅁮作東都一書表獨行逸民而出之蓋亦傷士之少純全時之多獨善也李唐之有獨義非李唐美事葢自髙祖變節於晉陽而唐無獨義之風文皇行虧於閨門之内而唐無孝友之俗秉唐史之筆者表孝友忠義而出之蓋傷當時忠孝之難能而僅有為足貴也夫天下皆有則所有者不能書天下皆無則僅有者斯可書且西漢有商山之四皓非無逸民也有矯世之楊玉孫非無獨行也而班固不立逸民獨行𫝊者葢以當時士之亷退者尚多無貴夫逸民行之純全者猶衆無取乎獨行其不以是立𫝊葢不使當時有逸民獨行之名也東漢有江革申屠蟠之徒非不甚孝有李固杜喬之徒非不甚忠而范􅁮不立忠義孝友𫝊者葢以當時俗多孝友則孝友不可悉書人多忠義則理義殆不可勝紀二𫝊之不立蓋不欲當時有孝友忠義之名也並王十朋張湯杜周何不列酷吏蔡琰何以𫝊列女裴延齡何不列奸臣班史之去取固善矣張湯杜周以殘忍深刻著名者也而不列於酷吏則何以少衰惨酷之風范史之去取固善矣蔡琰失節於胡行非不醜也乃以其文采之故而𫝊諸列女則何以勵天下之婦節唐史之去取固善矣裴延齡奸佞之雄者也而不列於奸臣則又非春秋斧鉞之誅矣同上唐書唐書不特指歐陽唐書凡舊唐史之類皆是陸長源唐春秋懲勸皆有深意樵謂陸長源唐春秋乃編年雜録因掇其潔切峭獨可以示懲勸者擲其叢冗秃屑不足以警訓者自為十八通書號孫氏西齋録起髙祖終武皇首廟號以表元首日月以表事有所鯁避則微文示譏無所顧慓則直書志慝所謂髙祖殺太子建成者何黜長徇愛譏失教也李勣立皇后武氏者何忘諫贊慝懲廢命也起王氏已廢之魂上配天皇者何登嫌黜冡不可謂順予懼後世疑於禘祼也條髙后擅政之年下繫中宗者何紫色閏位不可謂正予懼後世牽以稱臨也崔察賊殺中書令裴炎者何詭諛梯亂肇殺機也張守珪以禄山叛者何貸刑咈教稔亂階也稱天下殺者何罪暴天下示衆與殺也稱天子殺者何死非其罪示衆不與殺也孫樵文唐書記名字官名多誤予家有閻􅀶陵畫唐秦府十八學士各有真贊亦唐人書多與舊史不同姚東之字思亷舊史乃姚思亷字簡之蘇真陸徳明薛收唐書皆以字為名李元道蓋文逹于志寕許敬宗段志𤣥蔡允恭唐書皆書字房𤣥齡字喬年唐書乃房簥字真齡孔頴逹唐書字仲逹蘇典戯名從日從九唐書乃從日從助許敬宗薛收官皆直記室唐書乃攝記室蓋唐書成于後人之手所𫝊容有訛謬此乃當時所記者以舊史考之魏鄭公對太宗云目如懸鈴者佳則真鈴果名非字也然蘇世長太宗召對真武門問云卿何名長意短後乃為學士似為學士時方更名耳沈存中筆談真齡避𤣥字唐史官不如范曄陳壽所為故不能貶惡揚善唐史官才薄言辭鄙淺不足以發揚髙祖太宗列聖明徳使後之觀者文采不及周漢之書僕以為西漢十一帝髙祖起布衣定天下豁逹大度東漢所不及其餘惟文宣二帝為優自惠景已下亦不皆明於東漢明章兩帝而前漢事迹灼然𫝊在人口者以司馬遷班固叙述髙簡之功故學者悦而習焉其讀之詳也足下讀范􅁮漢書陳夀三國志王隱晉書生熟何如左邱明司馬遷班固書之温習哉故温習者事跡彰而罕讀者事跡晦唐有天下聖明繼於周漢而史官叙事曽不如范􅁮陳夀所為况足擬望左邱明司馬遷班固之文哉李翺書新唐書乃歐陽脩宋祁等刋脩商周以來為國長乆惟漢與唐而不幸接乎五代衰世之士氣卑弱言淺意陋不足以起其文而使明君賢臣雋功偉烈與夫昏虐賊亂禍根罪首皆不得暴其善惡以動人耳目誠不可以垂勸戒示久逺甚可歎也乃因邇臣之有言適契上心之所閔於是刋修官歐陽脩宋祁與編修官范鎮王疇宋敏求吕夏卿劉羲叟等並膺儒學之選悉發秘府之藏俾之討論共加刪定凡十有七年成二百二十五卷其事則増於前其文則省於舊至於名篇著目有革有因立𫝊紀實或増或損義類凡例皆有據依纎悉綱條具載别録蔡公亮表新書紀志表𫝊大數舊史記志𫝊約一百九十萬新史紀志𫝊約一百六十四萬外新添約一十一萬二千九百三十字發傳凡六十一外新添𫝊三百三十一凡二后妃三宗室一百三十一列傳十三忠義𫝊十六孝友𫝊五隱逸𫝊六循吏𫝊十二儒學二十文藝六方技二十二烈女一外戚十一宦者四十八藩鎮三奸臣一叛臣一逆臣者也舊志十一種而新志増其三儀衛選舉兵是也表凡四宰相方鎮宗室宰相世系是也吕夏卿紀例新書帝紀所書之例竊攷新書所作之例其𫝊位也太宗明皇則言踐祚葢明代父之誼憲宗則言内禪不書太上皇𫝊位嫌承受不明也不書即位者嫌父在而取大寶也立皇太子若景雲元年書立皇太子宏基者言人神所歸也永隆元年書立子哲為皇子言立不以正從私也武徳九年立皇后長孫氏立以徳也神龍元年書立妃韋氏為皇后立以嬖也命宰相得人書備官若書以許州刺史姚崇為丞相是也将得人書帥師討有罪書伐若書遼東大總管李勣帥師伐髙麗是也将非其人書王師大戰書及王師及雲南大戰于瀘川敗績是也王者之覽民謠其行以時則書幸不書還宫若開元十年幸興慶宫雖踰月不書還宫是也出非其時稱駕所至及還宫若天寶八年十月車駕至華清宫九年車駕還宫是也朝賀失禮則書地天寶九載受朝賀於華清宫是也不受朝賀則不書朔正元二年皇帝不受朝賀以嵗饑饉故不書朔是也宴㑹得禮則書地若天寶十四年勤政樓宴羣臣是也失禮則書宴若景龍四年宴羣臣於芳林園是也親蠶之禮不書本紀譏后徳之不建若武后四親蠶不書是也籍田如禮則異之以示勸若開元二十三年皇帝有事于籍田是也有灾變而無修省之實則載之天文五行志懲不知也同上新書志𫝊所書之例列傳之作其體有二一曰年二曰事年以先之事以次之備賢愚紀成敗功髙行稱則特立一𫝊若魏文公裴度陸贄韓愈李徳裕是也人子務在顯親毎𫝊必備載父祖名謚官爵人情重於繼體𫝊末必厯譜於子孫之世不著於世則略之也攷其名字若賀知章字季真房琯字次律於舊集得之載其郡縣若韓文公南陽人舊史為昌黎人是也題𫝊之目羣𫝊以姓若杜甫李白同𫝊是也特𫝊以名若韓愈李徳裕𫝊皆具姓名是也功髙以事若五王傳是也迹偽以地淄青李正巳𫝊是也宗室之子雖有功亦承本傳李適之李臯各附本祖尚親也凡例𫝊之體有六冠以后妃尊也以宗室諸王親也列以僣國受命之始也序一時之君臣葢事之總也繼以四夷王化之及也終以逆臣成敗之歸也凡褒者卒月韓愈𫝊書寶厯元年十二月卒褒也貶者卒年若韋臯傳正元二十一年卒貶也有功徳則夀年若干謹終也若郭子儀書八十五李晟書六十五是也謚贈之數非功徳不書懲及倖也論議表章以助君上之得失補國家之利害非此則不書若李伯藥𫝊封建論朱欽則𫝊五王論白居易元稹書是也論貨殖之弊陳禮樂之原則志之若陸贄諌二庫状韓文公禘祫議皆附于志是也䟽軍旅之宜斥奸邪之惡見于他𫝊如權文公韓文公淮西招討事見于元濟南蠻𫝊是也詩賦之作揄揚國體則見之如李白明堂賦杜甫三大禮賦是也詔策之實足以信後代則摭之若載實事見本傳是也官爵遷易不常所居有善則書循吏儒林皆得一端則標之𫝊外戚之衆惟卓然殊尤者為立𫝊若呉湊别立一𫝊是也夫唐十八帝之盛百禮交舉志當時正朔用厯之本曰律厯焉志邦國財用曰貨殖焉志禮樂之㳂襲曰禮樂焉志宗廟鬼神之常祀曰郊祀焉志髙宗明皇天后登封降禪之禮曰封禪焉志氣沴之侵奸曰五行焉志邦國之闊狹户口之衆寡曰地理焉志經籍之總目曰藝文焉志旂章之物色曰車服焉凡兩都宫闕制度園籞之規模一朝之舊章也廐牧孳乳之數牝牡圏印之名車輅出入征伐武事所急有國之常用也然而厯代未嘗志其名數非通制也兩都宫闕志于郡國之下廐牧乗馬之數志于車服之末亦記事之體也至若得大衍景福之厯而律厯志可全矣得職該六典之書而百官可全矣得開元曲臺禮郊祀録而禮樂志可全矣吕夏卿書𫝊唐文人多而史才少史之難其人乆矣魏晉宋齊梁隋間觀其文則亦固當然也所可怪者唐三百年文章非三代兩漢無敵史之材宜有如丘明遷固輩而本無一人可與范曄陳夀比肩老泉史論序孫之翰論唐事皆舊史所不及録示孫之翰唐論僕不識之翰今見此書凛然得其為人至論禇遂良不譛劉洎太子璜之廢縁張説張廵之敗縁房琯李光弼不當圖史思明宣宗有小善而無人君大略皆舊史所不及蘇子瞻答李廌書歐陽公修唐書不掩宋公之善歐陽公修修唐書最後至局專修紀志而已列傳則宋尚書祁修也朝廷以一書出於兩手體不能一遂詔歐陽公㸔詳列𫝊令刪修為一體公雖受命退而嘆曰宋公於我為前輩且人所見多不同豈可悉如己意於是一無所易列傳書宋姓名紀志歐公姓名宋公聞而喜曰自古文人不能遜而好相凌掩此風前所未聞也歐陽公撰唐書皆有深意公嘗被詔撰唐史又自撰五代史其為紀一用春秋法於唐禮樂志明前世禮樂之本出於一而後世禮樂為虚名五行志不書事應盡破漢儒灾異附㑹之説人主觀史宰相修史之失古者官守其職史書善惡君相不與焉故齊太史兄弟三人死於崔杼而卒不沒其罪此奸臣賊子所以懼乎後世人君得以觀史而宰相得以監修欲其直筆不亦難乎司馬遷有言曰文史星厯近乎卜祝之間葢止於執簡記事直書其實而已非如春秋有褒貶賞罰之文也後之為史者務褒貶而忘事實失其職矣人君任臣以職而宰相不與史事則善惡庶乎其可信也史以宰相監修固有所制而不得直筆也又况人君自取而觀之為史官者安得而有實録哉人主觀史宰相監修之弊自唐太宗以人主欲觀史朱子奢之諌咈而不從而為史官始不敢以行其直自太宗以宰相監修國史實録之上𤣥齡多所隱諱而為史官者益不得以行其直史通各有可褒可貶者讀唐人徐堅凡為史官宜置坐右之言則知史通為可取劉知幾𫝊讀唐史贊工訶古人拙於用己之言則知史通為可貶知幾贊夫一劉知幾也一史通也而或予或貶不一其説考古者惑焉及以史通觀之可予者十有三四可貶者十有五六或予或貶良有以也史通之書自六家二體以下則謂之内篇自史官建置以下則謂之外篇内篇論史則有惑經車右之篇外篇論史則有直書左筆之名内篇曰叙事曰書事所以論作史之體也曰載文曰載言所以言為史之法也曰古今正史所以議論歴代之史也其自述則有自叙忤時之名其矜能則有黜煩雜駁之號知幾之用力亦已勤矣謂司馬體失録煩六家篇謂班固精練該密同上謂項羽不當曰紀本紀篇謂陳勝不當曰世家世家篇謂范曄虚美隗囂與夫陳夀不當貶孔明魏收不當貶爾朱之類論贊論貶所當貶予所當予三代直道亦不是過此徐堅之徒所以采取之也至於疑古一篇雖堯舜伯禹不免見疑惑經一篇雖夫子春秋不免見貶既以班固為精審矣至論五行志則専考班氏之短至有蕪纇錯繆失宜乖理多鑑不精之語外篇既以藝文為不當志矣書志篇其自述作史之法則又以為都邑氏族方物宜為三志同上藝文不可志氏族方物果可志耶此工訶拙用之言贊史者所為而發也知幾嘗為史有才學識三長之説本傳蓋以自任也史通一書貫穿古今不可謂無學矣三為史官再入東觀不可謂無才矣疑古惑經之類得非識有所不足耶目見毫芒不見其睫正知幾之謂矣有志於汗青者宜戒焉通鑑惟通鑑便人主觀覽白虎通為講論五經同異而設故以發明經傳為本至通史則不然梁武帝詔羣臣修撰自秦以上皆以史記為本旁採它説以廣異聞至兩漢以還則全録當時紀傳呉蜀二主皆入世家五胡元魏列於夷狄其為體制一如史記特不為表而已通史内篇史記家知幾史通葢為譏評諸史而作故專以去取褒貶為義至通鑑則不然其意以為遷固而下文字繁多布衣之士猶難遍讀人主萬幾奚暇周覽進通鑑表於是撮機舉要刪繁削冗擇其切於興衰理亂之監者定為一書以便乙覽司馬進通鑑表其可攷也五代史用春秋法歐陽公修五代史記褒善貶惡其法甚精曰嗚呼此亂世書也吾用春秋之法師其意不襲其文其論曰孔子作春秋因亂世而立治法余述本紀以治法而正亂君此其志也書减舊史之半而事迹添數倍議者以謂功不下司馬遷又謂爭功相馳上下無駁雜之説至於條例精密則遷不及也亦嘗自謂我作伶官𫝊豈下滑稽也哉史官世不易職古者之史世不易業不遷官不貳事如周之史佚魯之史克晉之史蘇史黯史趙史墨皆世掌之如後世亦尚有此意太史談之後有史遷班叔皮之後有班孟堅唐時史官不易如出使屢黜亦以史自隨如劉仲幾作史通後其子餘亦掌之近世史官皆為遷轉之地耳羣書考索續集卷十五
