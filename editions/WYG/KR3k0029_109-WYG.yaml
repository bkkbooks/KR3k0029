body:
  text: 羣書考索後集卷四十三宋章如愚編兵制門兵食三代之時兵農一致無事則出耕有事則習戰故食不乏詩曰乃積乃倉乃褁餱糧于槖于囊思戢用光弓矢斯張干戈戚揚爰方啓行葢居者有積倉行者有褁糧然後可以爰方啓行也周官委人掌歛野之賦軍旅共其委積薪蒭凡疏材漢高祖與項羽相持滎陽數年軍無見糧蕭何鎮守闗中轉漕給軍民食不乏故帝論三傑亦曰給餽餉不絶粮道吾不如蕭何方其困滎陽成臯時欲捐成臯以東食其曰敖倉天下轉輸乆矣臣聞其下藏粟甚多楚人抜滎陽不知堅守敖倉此乃天所以資漢上乃復守敖倉又令盧綰劉賈入楚燒積聚而移越田横居梁地往來苦楚兵絶其糧食垓下之戰卒以食盡而亡文帝用晁錯之策募民輸粟塞下以足兵食宣帝時趙充國曰金城湟中穀賤吾謂耿中丞糴百萬斛𦍑人不敢動後止糴得四十萬義渠再使且費其半失此二策𦍑人故敢為逆光武時定河内拜冦恂為太守曰吾委公堅守轉運給足軍糧恂移書属縣收田租四百萬斛轉以給軍食蜀諸葛亮出師祁山斜谷以木牛流馬運糧後以糧不繼分兵屯田為乆駐之計宋文帝時檀道濟伐魏食盡道濟夜唱籌量沙而覆以餘米及旦魏軍見之謂其糧有餘而不敢迫隋置洛陽口倉積粟李宻因之以起事唐初府兵糧食皆自備開元以後始募兵為騎而有養兵之費代宗時郭子儀以河中軍食常乏自耕百畆以勸士卒是歲地無曠土軍有餘糧徳宗時東渭橋有粟十餘萬斛度支給李懐光軍幾盡而懐光朱泚連兵叛李晟以孤軍處二强冦之間内無資糧會韓滉運米百艘以餉李晟遂成收復之功宋朝太祖建隆元年召三司使張美問兵食之數美曰懐州宻邇上黨自李筠叛刺史馬令琮日夜儲蓄以待王師上善之亟詔授令琮團練使宰臣范質曰大軍北伐湏令琮供億不可移他郡戊戌升懐州為團練以授之其後王師十萬出太行經費無闕通畧乾徳三年三月國初貢賦悉入左藏庫及取荆湖下西蜀儲積充羡上顧左右曰軍旅饑饉當豫為之備不可臨事厚歛於民乃於講武殿後别為内庫以貯金帛號曰封樁庫凡歲終用度贏餘之數皆入焉太宗端拱初北敵冦邊張泊奏曰犬戎為患自古為然惟聚兵積穀分屯塞下來則備禦去則勿追足矣淳化五年張詠始至益州先是陜西課民運粮以給蜀師者相屬於路詠亟問城中所屯兵數凡三萬人而無半月之食詠訪知民間舊苦鹽貴而私廪尚有餘積乃下鹽價聴民得以米易鹽民争趨之未踰月得米數十萬斛軍士驩言前所給米皆雜糠粃不可食今且精好此翁真善幹國事者詠聞而喜曰吾令可行矣時四郊尚多賊壘城門晝閉王繼恩日務宴飲不復窮討官支芻粟飼馬詠但給以錢繼恩怒曰國家征馬豈食錢耶詠曰城中草場賊既焚蕩芻粟當取之民間公今閉門髙會芻粟何從而出若開門擊賊何慮馬不食粟乎繼恩既分兵四出詠計軍食可支二歲乃奏罷陜西運糧上喜曰鄉者益州日以乏糧為請詠至未乆遂有二歲備此人何事不能了朕無慮矣長編真宗因問李迪以陜西兵數對曰臣轉運時以方寸小策記兵及糧以備調發今猶置佩囊中上令探取之因給紙札令迪悉上合存留及調塞下數以進上曰不意頗牧在吾禁中矣事畧咸平六年出内府綾羅錦綺定價出市糴粟實邊景徳元年内出銀三十萬兩貿易軍糧景徳二年咸平末河北轉運使劉琮上言西漢晁錯請入粟授以爵塞下之粟必多文帝從之今民入粟備邊今河北諸州聚兵糧饋勞費望行漢制以濟軍儲既而水部郎中許𤣥豹復言縁河州縣和市邊榖數少望許進獻糧授官秩事下三司議奏請以粟多少地逺近為差從之長編乾興元年三月出内藏庫銀二十萬兩錢三十萬貫下諸路又出錢三十萬萬貫令三司筭商人入便於河北助給軍費仁宗甞出内藏之積下河北糴軍儲又韓琦請陜西歲豐先謀儲蓄則兵食無缺天聖四年十月出内藏庫緡錢二十萬下京西路糴軍儲天聖七年七月出内藏庫𣙜貨務緍錢各十萬下陜西河北助糴軍儲天聖九年八月丙戌出内藏庫絹六十萬下陜西河北河東市糴糧草戊戌又出内藏庫緡錢五十萬下河北市糧草景祐元年三月出内藏庫絹五十萬下發運司市糴軍儲四月出内藏絹三十萬下河北轉運司市糴軍儲九月中書門下言近累於内藏庫支撥錢帛與三司收糴軍儲宫中餘羡物色乞指揮詔曰朕以宫閫之間務先儉約軍國之用宜在優豐念有司經畫之勤出中禁冗餘之物俾資常費式表推恩宜令入内内侍省將尚氏等位金銀錢帛物色除各已優厚給賜逐入據見在數凖折價錢二十一萬貫委内藏庫撥與三司支贍軍旅使用景祐二年六月丁卯出内藏庫紬絹一百萬下三司市糴軍儲十月出内藏庫緡錢七十萬下河北轉運司市軍儲景祐三年九月出内藏庫緡錢五十萬下河北轉運司市糴邊儲景祐四年八月出内藏庫絹三十萬下河北路市糴軍儲十一月出内藏庫紬綿五十萬下河北陜西路市糴軍儲寳元二年出内庫真珠估緍錢三十萬賜三司上諭輔臣曰此無用之物既不欲捐棄不若散之民間收其直助糴邊儲亦可少紓吾民之歛也二月辛丑出内藏庫緡錢八十萬付陜西市糴軍儲康定元年十月庚子出内藏庫絹一百萬下三司助邊費十二月出内藏庫絹一百萬下三司助邊費慶歴元年五月甲子出内藏庫緡錢一百萬助三司給陜西軍費慶歴二年六月甲戌出内藏庫銀一百萬兩紬絹各一百萬疋下三司以給邊費慶歴五年命陜西轉運使李㕘専制置觧鹽代范祥也時㕘為陜西轉運使閱五年矣自軍興諸路經畧司多貸三司錢以佐軍謂之隨軍錢㕘權慶州鈎考得所貸八萬緡悉償之遂廢其庫又戍兵多而食苦不足㕘視民闕乏之時令自隠度榖麥之數預貸以官錢穀麥熟則二之謂之青苖錢數年兵常有餘其後青苗法葢取諸此朝廷患入中法歲費増廣􅄁請鑄錢于邊郡以平估糴權罷入中以㕘之去省𣙜貨錢以千萬計長編慶歴七年命内侍二員提舉月給軍糧時侍御史吴鼎臣言諸軍班所給糧多陳腐又升斗不定請以内侍糾察之翌日諸監倉官進呈軍糧上諭曰自今當足其數以給之時衞士皆在殿下殿前都指揮使李昭亮因相率羅拜以謝軍糧自江淮轉漕至京師又積年而後支雖上軍所給㪷升僅足中下軍率十得十九雖遣内侍提舉徒動軍情而終不可行長編皇祐二年閏十一月丙辰出内藏庫緡錢四十萬紬絹六十萬下河北便糴糧草皇祐四年閏七月出内藏庫緡錢十萬紬絹二十萬綿十萬下河北助糴軍儲至和元年六月甲寅出内藏庫紬絹五十萬緡錢三十萬下河北助糴軍儲至和二年十月乙未出内藏庫錢一百萬下河北市糴軍儲嘉祐元年十月丁卯出内藏庫銀十萬兩絹二萬疋錢一十萬貫下河北市糴軍儲嘉祐六年九月癸丑詔三司如聞河北秋稼甚登其出内藏庫緡錢一百萬助糴軍儲張方平論兵謂治平中禁兵之數約七十萬一夫錢糧賜予歲不下五十千廂軍之數約五十萬一夫錢糧賜予歲不下三十千神宗元豐五年五月上因議陜西兵食謂執政曰我朝康定中西鄙用兵契丹乘間有所要請而仁宗延和對輔臣至於感憤涕泣朕為人子孫守祖宗神器每念顧託之重宜如何也因改容泣涕羣臣震恐莫敢對長編高宗紹興十年七月甲子上曰万侯卨論營田之弊極當大凡營田湏是軍中自為之則不歛于民而軍食足聖政孝宗乾道元年八月己卯進呈營屯田文字錢端禮等奏差官措置官莊田以助營屯田之利異時租入多則軍儲可足民力可寛矣上曰永豐圩見𨽻建康行宫歲收米三萬餘石朕欲撥付建康軍中以助軍食亦以示至公之意卿等便可批㫖施行端禮等奏陛下此舉不獨昭示至公羣心自服亦前此所未有欲乞自陛下從中批出上曰可聖政乾道四年詔曰朕觀古昔斟酌時宜欲豐軍食之儲必講屯田之制故充國經畫於金城而兼得十二便之利曹操規圖於許下而遂收百萬石之饒先積粟以為資乃厲兵而必戰朝報淳熈六年七月癸亥進呈荆鄂副都統郭果奏唐鄧諸處自來積穀不多襄陽自漢江以北四向美田民間多有蓄積若置而不問恐資盗糧欲宻行措置於秋收之際收儲以備緩急上曰令周嗣武同劉邦翰詳所奏事理於秋成之際廣行收糴其合用倉敖及收貯去處仰公共相度措置申聞聖政包拯曰聞前代防邊之兵三時農務之時教戰公私自足未有冗而且衆坐糜廪食虚困疲民如今之甚者若謂兵食粗足敵好方堅輙過目前以為成筭惰於更張措置臣恐日削月朘中外益以殚竭一旦用武節暴加重歛民心怨叛則肘腋之下皆為仇怨豈暇禦外冦哉此國家根本之患苟不表裏恊心銳意而速圖之臨事無及矣皇祐四年蘇轍曰今世之患莫急於無財而已財者為國之命而萬事之本國之所以存亡事之所以成敗常必由之昔趙充國論邊備之計以為湟中榖㪷八錢糴三百萬斛𦍑人不敢動矣諸葛亮用兵如神而以糧道不繼屢出無功由是觀之茍無其財雖有聖賢不能自致於跬步苟有其財雖庸人可以一日而千里熈寧二年總論軍糧神農之教曰石城十仞湯池百步帶甲百萬而亡粟則弗能守也葢日費千金然後可以舉十萬之衆十夫之耕然後能供兵之一食葢用兵者必聚財積穀以為守禦之備故或屯田以息轉輸之勞或運漕以支内外之費或仰給於邊糴或積榖於塞下其制雖不同至於足食則一也此四者雖足以食兵然特一時之制而已自三代以上兵隠於農耕戰一事雖百萬之師屯於邊陲大不疲於國小不歛於民以其兵自為食而已三代而下為農者盡力於耕為兵者逸居而食然後運糧不可以無備而屯田漕運邊糴入粟之利興焉林之竒文兵器百工之事皆聖人作而於兵械尤重弓矢之取諸睽既載立於經而威天下之具亦概見扵史葢稽古以来凡黄帝堯舜之世所不廢也垂為共工而竹矢之傳閲三代以為世寳周禮夏官司馬掌五盾以待軍事司弓矢掌六弓四弩八矢之守藏出入冬官弓人之為弓桃氏之為劒函人之為甲矢人之為矢纎悉登載於太平之書周道中微宣王復古如詩之所詠修車馬備器械而中興之業在焉魯侯之礪鋒刃備弓矢鍛戈予繕甲胄聖人猶列之於經而除戎器以戒不虞易之垂訓亦昭昭也漢文帝時鼂錯上兵書曰山林積石經川立阜此步兵之地車騎二不當一土山丘陵平原廣野此車騎之地步兵十不當一平陵相逺川谷居間仰髙臨下此弓弩之地短兵百不當一兩陣相近平地淺草可前可後此長㦸之地劒楯三不當一蒲葦竹蕭草木蒙蘢此矛鋋之地長㦸三不當一曲道相伏險阻相薄此劒楯之地弓弩三不當一兵不堅利與空手同甲不堅宻與􅃝裼同弩不可及逺與短兵同射不能中與亡矢同矢不能入與亡鏃同故兵法曰器械不利以其卒與敵也漢制民年二十三出賦錢百二十以治庫兵及車馬則州郡庫兵與車騎皆率歛民而官為備之有事則授以征行漢武庫兵器度大司農錢母將隆諌哀帝發武庫送董賢及乳母言武庫兵器天下公用國家武備繕治造作皆度大司農錢諸侯不得私作兵器江都王建以私作兵器獲罪此漢制之大畧也晉武帝時馬隆伐凉州帝命隆自至武庫選仗惟隆所取故卒以取勝元帝時祖逖有虎視河洛之志乃不給鎧仗使自召募忠雖有餘功卒不就識者深恨焉唐府兵之法人其弓一矢三十刀一其介冑戎具皆藏於庫有所征行則給之畨上宿衞者給弓矢横刀而已馬燧為河東節度使其造甲必短長三制稱士所衣以便趨進又為戰車冐以狻猊列㦸于後行以載兵止則為陣居一年威震北方宋朝太祖時中都二坊制造兵器旬一進視謂之旬課列置五庫深在禁中歲輸所作於五庫故器械精明後世鮮及開寳二年兵部令史馮繼昇等進火箭法太祖命試驗賜衣物束帛太宗課督尤宻車駕甞幸司弓所按循作工賜以錢幣章聖亦幸軍器庫嘉賞主吏是以工致其敏吏勉其職真宗咸平元年御前忠佐石歸宋進木羽弩箭以木為翎長僅尺餘所激甚逺中人鎧甲以幹去而鏃留牢不可抜蕃人最畏之願多造以給邊用詔增歸進月俸以其男補殿侍咸平三年神衞水軍隊長唐福獻新製火箭火毬火鎗等物咸平六年給軍中傳信牌先是石晉言北面抗敵行陣間有所號令則遣人馳吿多挾計畫後虞奸詐請令將帥破符持之遇傳令則合而為信帝以為古有兵符既而乆廢因漆木為牌長六寸濶三寸腹背刻字而中分之置鑿柄令可合又穿二竅容筆墨上施紙札臨陣則分而持之或傳令則置其言繫軍吏之頸至彼合置復命景徳四年帝宣示王欽若等南北作坊制造兵器宜令樞宻與三司同相度内有見在材料數多者權罷制造俟支用數少别行計度先是帝以兩坊日造兵器數多而軍器庫累歲積留未甞支用其見管材料數目可支三二十年而外州斷折制造未已甚為勞費因遣入内都知秦翰於軍器庫㸃檢籍其數以見管馬步禁軍約之皆給用有餘故有是詔冀州團練使石晉自言能發火毬火箭真宗召至崇政殿試之仁宗時米守信守澧州遣牙校李錫持新造兵器來上試于殿庭擢為三班差使又知并州韓琦言汾州推官郭固約古制為車上召至便殿擢為衞尉丞天聖六年九月缺已詔河北城壁為水摧圯天下州軍器械乆不繕完者其遣使臣十七人往諸州提㸃修葺之河北則委轉運使廵所部舉行天聖九年上封者言國家承平已來武庫山積天下州府打造軍器計綱上供未甞暫停望下有司約度如有凖備且停罷詔自今諸州打造軍器及採斫材料箭簳每歲减半慶歴元年太常丞田况言今賊甲皆冷鍜而成堅滑光瑩非勁弩可入自京齎去衣甲皆軟不足當矢石以朝廷之事力國之伎巧乃不如一小𦍑乎由彼専而精我漫而畧故也今請下逐處悉令工匠冷砧打造純鋼甲旋發赴縁邊先用八九斗力弓試射以觀透箭深淺而賞罰之聞太祖朝舊用絶為精好但歲乆斷綻乞且穿貫三五萬聮均給四路亦足以禦敵也慶歴二年歐陽修言諸州所造器械數不少矣工作之際已勞民力運輦般送又苦道路然而鐵刃不鋼筋膠不固長短大小多不中度葢造作之所但務充數而速了不計所用之不堪經歴官司又無檢責此有器械之虚名而無器械之實用也以草草之法教老怯之兵執鈍折不堪之器械百戰百敗理在不疑臨事而悮何可及乎皇祐四年河北河東陜西都部署司言郭諮所進獨轅衝陣無敵流星弩可以備軍之用詔弓弩院如様制之尋以諮為鄜延路鈐轄所制弩五百募土兵教之既成經畧使夏安期言其便詔置獨轅弩軍長編嘉祐四年七月庚申詔在京所造軍器多不精利其選朝臣使臣各一員㨂試之神宗熈寧元年命入内副都知張若水西上閤門使若水進所造神臂弓初民李宏獻此其實弩也上於玉津園校驗射二百四十餘步穿榆木没半簳有司并鋸木奏御詔依様製造至是以進上御延和殿臨閱置鉄甲七十步俾衞士試射未有中者若水請自射連中徹札上稱奨之熈寧五年五月庚辰朔御文徳殿視朝命供備庫副使陳珪管勾作坊造斬馬刀初上匣刀様以示蔡挺刀刃長三尺餘鐔長尺餘首為大環挺言制作精巧便於操擊實戰陣利器也遂命内臣領様置局造數萬分賜邊臣長編熈寧六年丙午詔軍器監以殿前馬軍司所相度鞍轡様計在京諸軍馬數造給初馬軍用大鞍不便野戰至是上始以邊様皮䪌小鞍用木鞍長韁回旋轉射得盡馳驟之技仍選邊人習射者𨽻諸軍後熈寧六年六月己亥置軍器監總内外軍器之政其所統攝並依將作仍以吕惠卿曽孝寛為判監所置官屬令逐官奏舉軍器舊領於三司胄案三司事叢判案者又數易至是始案唐令置監而廢胄案焉先是上語輔臣河北兵械皆不可用王安石曰兵械非可以一朝一夕具湏預具上乃議置監設官提舉翌日遂有是命熈寧六年七月甲子詔諸造入陣弓箭度材料上中下軍分三等上等弓四尺八寸五分箭八寸五分中等下等弓第减分箭第减一寸其拘射教閱射親馬射弓箭自依舊制同上熈寧六年十二月庚午詔程昉於㳂河採車材三千兩下軍器監定様製造戰車上修嚴武備既采唐李靖三人隊法欲試行之且以北邊地平可用車為營衞因内出手詔令三府講求而有是詔熈寧七年二月庚辰詔軍器監除依新様造兵車外仍以牛皮及氊木製車上蔽陳之物臨時因民車使用同上熈寧十年軍器監言天下軍器五路已編排修完其餘諸路欲令隨州郡大小次第編排以五千人至千人為額從本監量定年限於都作院修選委監司或提舉司官一員提舉㸃檢從之内出攻守圖二十五部賜河北又出敵樓様送軍器監頒降修製長編元豐二年五月乙未上批内外簡閱諸軍已悉用闗閃促張弓减指箭其令在京及諸路作院造弓罷長弰舊制同上元豐四年七月涇源路經畧司言近準朝㫖修渭州城置炮臺已畢防城戰具止有大小合蟬床子等弩案武經總要有三弓八牛床子弩射及二百餘步用一槍三劒箭最為利器攻守皆可用乞下軍器監給弩箭各三副赴本路依様造以備急用軍器監言弩毎重十餘斤難運致乞圖其様付本路作院從之元豐六年八月庚子上批京都所造軍器動以萬計雖廣求製様尚恐未殚衆善或不適用徒費工力聞鄜延路經畧使劉昌祚屢諳戰闘精於騎射而留心兵仗委走馬承受霍内諭昌祚令具所習用馬步戰器並且繫士卒禦賊可用利械入逓進呈元豐六年十月辛卯工部郎中范子竒言判軍器監創進床子大弓二張强於神臂弓獨轅弩較之九牛弩尤為輕便用人至少射逺而深可以禦敵詔工部軍器監管軍官同比試以聞長編元豐七年正月壬寅涇源路經畧司言乞改造神衛素鐵甲為偏挨甲從之同上髙宗建炎紹興間或出御前所造鞍以示大臣或出禁中所造甲以示執政論越州所造甲不精則曰兵器在承平時猶不可廢况於今日閱將帥之捷則曰兵既精則又葺治器甲所以成功孝宗申命諸道主兵官専任閱習凡器械之刓蠧不備者皆有程督上自三衙以及江上諸軍下及諸郡之禁卒兵械益加整葺其於兵器之修屢致意焉淳熈三年輔臣進呈鎮江都統郭棣奏本司諸軍每月造手射角弓三百張赴淮東總領所共納過弓九千九百張上曰可令總領所取二千張赴御前進納又曰取赴御前欲觀其製造之精否數多則不容偽寳訓輔臣奏郭剛將軍戰船改造多槳船雖利於輕捷然料例大叚不同竊恐自此車戰舡减損異時無以應用上曰車船古之艨衝辛巳歲用以取勝豈宜改可令郭剛其折并約束㳂流諸軍遇有損壊隨即修葺不得擅有更易再擬指揮將上同上總論軍器熈寧天子留意兵政既置軍器監熈寧六年事見前又置内弓箭庫又置内弓箭南庫儲御前所製軍器别差官提舉其在諸州又有作院車馬之修器械之備至不苟也弓一也有神臂弓熈寧元年事見前有促張弓元豐二年事見前又有床子弓元豐六年事見前弩一也有獨轅弩有九牛弩並見上又有八牛弩元豐四年事見前箭一也有入陣箭熈寧六年事見前有减指箭又有三劒箭元豐二年事見前刀以斬馬名熈寧五年事見前鞍以邊様名熈寧六年事見前甲以偏挨名元豐七年事見前兵車有様熈寧七年事見前敵樓有様熈寧十年事見前于斯時也内有張若水之弓射徹札熈寧元年事見前外有劉昌祚之留心兵仗元豐八年事見前戎器之精前古有光焉髙宗甞言祖宗内外置庫皆有深意其備豫不虞之㫖可想而知也高宗曰祖宗有内外軍器庫㡬百間所藏弓弩器甲不可勝計外器庫數亦如此原祖宗置庫有内外之異及弓弩弦箭亦各異藏分官主之皆有深意嗚呼此非神宗制也抑亦祖宗制也昔我太祖之定天下也造軍器者十日一進見下典軍器者十餘年不易太祖使魏丕典作坊十餘年器械精備舊制床子弩止七百步丕増至千步作坊歲造凡三萬弓弩院歲造凡千六百萬諸州歲造又六百餘萬五庫所藏戎具勁精曽子固文太祖時平定四方命魏丕主作責以稱職每造兵器十日一進謂之旬課上親閱之作治之巧盡矣國工署有南北作坊歲造甲鎧具装鎗劒刀鋸器械箭箶簏皮笠弩橦床子弩凡三萬二千又有弓弩院歲造弓弩箭弦鏃等凡千六百五十餘萬諸州歲造弓弩箭劒甲兠鍪甲葉箭鏃等凡六百二十餘萬又别造諸兵幕甲袋鉦鼓炮炒鍋鉶行槽鍬钁鎌斧等謂之什器凡諸兵械置五庫以貯之戎具精勁近古未有焉自宋初至慶歴凡幾年矣而所造之甲可以禦敵他可知己慶歴元年事見前成法一定歴世遵之太宗幸司弓舍賜及作工錢真宗幸軍器監嘉賞主吏當是時工技器械咸精其能有自來矣事見前至于仁宗天下承平武備稍弛故衣甲皆軟田公况言之慶歴元年事見前兵器不精賈昌朝言之賈昌朝陳六事曰今之兵器多名詭狀製造不精虚費民力器械不堪歐陽公脩言之慶歴二年事見前天子慨然既遣近臣分治軍器天聖六年事見前又遣朝臣揀試軍器嘉祐四年事見前一加敕勵工吏竦然不獨郭諮之弩皇祐四年事見前郭固之車郭固事見前米守信之牌甲米守信事見前為有聲於世也胡安定一代巨儒也作院之監訪尋利器工必盡其能事必求其精兵器堅利至今為作院法胡安定監某處作院從容與吏言制作利害吏以誠吿曰器不精良由督以程課每苟簡於事備數而已欲革此弊莫若使工各盡其能每事必求精緻不使懈墮然後計其成而定以日力安定從其說兵器堅利非前日比至今為作院法噫儒臣之知兵如此而况赳赳之夫乎治世之備兵如此而况多事之世乎林駉文羣書考索後集卷四十三
