body:
  text: 羣書考索卷一宋章如愚撰六經門易類周易始末易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶伏羲氏之王天下也始畫八卦以通神明之徳以類萬物之情易文王重易六爻作上下篇孔氏為之彖象繫辭文言序卦之屬故曰易道深矣人更三聖世歴三古前藝文志或曰周公作爻辭韓宣子適魯見易象曰吾乃今知周公之徳而爻辭作扵周公彼誠有以知之其後馬融陸績亦云惟班固以謂人更三聖而周公不與盖文王周公父子一道序父不序子尊父也而諸儒泥扵三聖之說遂以爻辭為文王所作重卦之人諸儒不同凡有四說王輔嗣等以為伏羲鄭元之徒以為神農孫盛以為夏禹史遷等以為文王其言夏禹及文王重卦者案繫辭神農之時已有盖取諸益與噬嗑以此論之不攻自破其言神農重卦亦未為得今以諸文驗之案說卦云昔者聖人之作易也幽賛于神明而生蓍凡言作者創造之謂也神農以後便是述修而不可謂之作也幽賛用蓍謂伏羲矣伏羲用蓍即伏羲已重卦今依王輔嗣為得其實八索八卦之說謂之八索疏云說者以八卦交互相說其理此索為求索亦為捜索以易為主故易曰八卦成列象在其中矣就八卦而求其理則萬有一千五百二十策天下之事得故謂之索非一索再索而已此索扵左傳有不同皆後人失其真理妄穿鑿耳易之卦四營而成易十有八變而成卦繫辭蓍之徳圎而神卦之徳方以知仝上易之象吉凶者得失之象也悔吝者憂虞之象也變化者進退之象也易之變參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此爻象繫辭三易及諸儒訓詁傳授河出圗伏羲始畫八卦其後重而為六十四文王繫爻辭孔子作十翼上彖下彖上始乾坤下始咸恒上象下象上繫下繫文言說卦序卦雜卦古經彖象文言皆在六爻經辭之後乃孔子自卑退不敢干亂正經費直以彖象繫辭文言解說上下經見西漢儒林傳汲冡書冡易上下篇與今正同别有隂陽說而無彖象文言繫辭鄭康成始以彖象連經文而王弼又以文言附於乾坤二卦周官太卜所掌又有三易一曰連山夏易也始扵艮鄭𤣥云象山之出雲連連不絶二曰歸蔵商易也先坤而後乾鄭𤣥云萬物莫不歸蔵扵其中三曰周易周易也始扵乾鄭𤣥云言易道周普無所不備也孔穎逹云文王重易扵羑里猶商世故題周以别商也夏商之易取七八以不變為占左氏言遇艮之八是也周易取九六以變為占穎逹正義云三易杜子春云連山伏羲歸蔵黄帝與鄭𤣥之說皆不取案世譜等書神農曰連山氏亦曰列山氏黄帝曰歸蔵氏既連山歸蔵並是代號則周易稱周亦然也帝王世紀曰庖犧氏作八卦神農重之為六十四黄帝堯舜引而伸之分為二易至夏人因炎帝曰連山商人因黄帝曰歸蔵文王廣六十四卦著九六之爻謂之周易爾雅疏曰歸蔵者成湯之所作也公羊疏孔子欲作春秋卜得陽豫之卦宋氏云夏商之卦名孔子何不用周易占之盖孔子見西狩獲麟又見天命有改制作之意故用夏商之易也秦燔詩書易以卜筮存初商瞿受易扵孔子五傳至田何漢之言易者如楊何施讐孟喜梁丘賀之徒所學皆祖田何楊何最先出武帝時已立博士施孟梁丘至宣帝時又立博士惟焦氏費氏髙氏三家為異焦延夀髙相皆述隂陽災異之言焦傳之京房房易具存大抵隂陽律數之事元帝時亦立學官費氏初傳民間至後漢時陳元鄭康成皆傳費氏易費氏興而餘學息今所傳即費氏易也魏王弼注上下經晉韓康伯注繫辭說卦序卦唐孔頴逹為正義夲朝則有陳摶种放范諤昌邵雍之徒孔頴逹云易卦六十四分為上下象隂陽故上篇三十所以象陽竒始乾坤而終扵離坎者以有日月之道也下篇三十四以法隂耦始咸恒而終扵既濟未濟者所以明戒謹也數龍馬負圗戴九履一左三右七二與四為肩六與八為足五為腹心是天地自然之數也亦謂之九宫縱横皆十五數總四十有五陳摶孔傳謂龍馬出河伏羲遂則其文以畫八卦謂之河圗大衍之數四十有九分而為二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閏五嵗再閏故再扐而後卦是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣或者六十四卦在其中矣天數二十有五地數三十凡天地之數五十有五而大衍之數五十其用四十有九是扵天地之數既减其五又虚其一何也鄭康成云天地之數五十有五以五行之氣通扵萬物故減五大衍又减其一故四十有九故嘗為之説曰天一下降與地六合而生水扵北地二上駕與天七合而生火扵南天三左旋與地八合而生木扵東地四右轉與天九合而生金扵西天五𡨕運與地十合而生土扵中以竒生者成以耦以耦生者成以竒天陽也故其數竒地隂也故其數耦竒耦相合而五十有五之數備大衍之數减其五五行之用也虚其一者元氣之夲也姚信董遇云天地之數五十有五者其六以象六畫之數故减之而其用四十九三兆三易太卜掌三兆之法一曰玉兆二曰瓦兆三曰原兆玉兆顓帝之兆瓦兆帝堯之兆原兆有周之兆其經兆之體皆百有二十其頌皆千有二百掌三易之法一曰連山二曰歸蔵三曰周易連山伏羲歸蔵黄帝其經卦皆八其别皆六十有四諸儒重卦之説王弼以為伏羲鄭元以為神農孫盛以為夏禹史遷以為文王以經考之随之上九曰王用享于岐山明夷之六五曰箕子利貞此皆商周時事然則以為神農伏羲夏禹者皆非也或以為文王至武王時始追王此已言王似非文王時重也然則爻辭孰作之歟宣子適魯見易象而言曰吾今乃知周公之徳與周之所以王也是爻辭意亦周公作也然世之論易者以為人更三聖謂伏羲文王孔子而不數周公盖父統子業也此數語見孔頴逹正義孔穎逹援韓宣子之言以驗曰卦辭文王爻辭周公馬融陸績並同此說今依用之觀太卜掌三易之法其經卦皆八其别皆六十四則六十四卦之體已具久矣孔頴逹正義云重卦之人諸儒不同凡有四説王輔嗣以為伏羲鄭元以為神農孫盛以為夏禹史遷以為文王其言禹及文王者按繫辭神農時已有取諸益與噬嗑以此論之不攻而破其言神農亦未為得易緯数三聖但云伏羲文王孔子不及神農時神農但見取諸益不重卦矣今依王輔嗣以伏羲既畫八卦即自重為六十四為得其實孔子象象用夏正或曰易象非孔子作也雷在地中復先王以至日閉闗商旅不行后不省方考之夏小正十一月萬物不通則至日閉闗后不省方夏之制也周制以十一月北廵狩至于北岳矣恐大象非孔子作殊不知周正雖建子而孔子彖象皆建寅故以復為十一月姤為五月此正孔子行夏時也文言穆姜襄公九年占有文言之辭襄公二十二年孔子生下距穆姜十四年穆姜之時已誦随繇之辭因取乾卦文言然其言與今易稍異穆姜之言曰元體之長也亨嘉之㑹也利義之和也貞事之幹也體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事以今易考之删改者二増益者六則古已有是言孔子特文之耳他卦彖象而已獨乾坤更設文言以發其義伊川易學京房之學專守名數王弼之學髙談理致繫辭文言序卦或以為非孔子作其間每更一事必稱子曰若夫子自作不應自稱子曰歐公亦以為然唐僧一行易纂引孟喜序卦文辭與今易不同然則今之序卦等恐非夫子全文或出扵經師未可知也子夏易漢之易家自田何始何而上未嘗有書魏管輅謂易安可注者其得先儒之心歟古今學者咸謂卜子夏受易孔子而為之傳然太史公劉向父子班固皆不論著唐劉知㡬知其偽矣是書亡不傳扵今今號為子夏易傳者竊意非古所傳何者觀其書不依古易經次乃遵費氏鄭氏王氏所合彖象文言扵爻下而傳之也唯隋唐志有卜子夏易傳二卷文已殘缺子夏詩序之外有易傳唐劉知㡬謂疑出於漢之杜氏漢諸儒易傳自魯商瞿子木受易孔子師古曰商瞿姓也瞿音衢以授魯橋庇子庸師古曰姓橋名庇字子庸它皆類此庇音必寐反子庸授江東馯臂子弓師古曰馯姓也音韓子弓授燕周醜子家子家授東武孫虞子乘子乘授齊田何子装及秦禁學易為筮卜之書獨不禁故傳受者不絶也漢興田何以齊田徙杜陵號杜田生師古曰髙祖用婁敬之言徙闗東大族故何以舊齊田氏見徙也初徙時未為杜陵盖史家夲其地追言之也授東武王同子中雒陽周王孫丁寛齊服生皆著易傳數篇師古曰田生授王同周王孫丁寛服生四人而四人皆著易傳也子中王同字也中讀曰仲同授淄川楊何字叔元元光中徴為大中大夫齊即墨成至城陽相師古曰姓即墨名成廣川孟但為太子門大夫魯周霸莒衡胡師古曰莒人姓衡名胡也臨淄主父偃皆以易至大官要言易者本之田何丁寛易説寛從田何受易復從周王孫受古義景帝時寛為梁孝王將軍距呉楚號丁将軍作易說三萬言訓故舉大誼而已今章小句是也寛授田王孫王孫授施讐孟喜梁丘賀繇是易有施孟梁丘之學京房易京房受易焦延夀延夀嘗從孟喜至成帝時劉向校書考易說以為譜易家說皆祖田何楊叔丁将軍大誼畧同唯京氏為異黨焦延夀獨得隠士之說託之孟氏不相與同房以災異得幸繇是易有京氏學費直易長扵卦筮無章句徒以彖象繫辭十篇文言解說上下經劉向以中古文易經校施孟梁丘經或脫去无咎悔亾唯費氏經與古文同崔篆易林後漢崔篆建武初朝廷多薦言之者幽州刺史又舉篆賢良篆辭歸不仕客居滎陽著周易林六十四篇用决吉凶多所占驗王弼易魏尚書郎王弼注六十四卦六卷韓康伯注繫辭以下三卷王弼又撰易略例一卷諸儒以彖象文言雜入卦中漢藝文志易經十二篇施孟梁丘三家顔師古曰上下經及十翼故十二篇是則彖象文言繫辭始附卦爻而傳扵漢歟先儒謂費直專以彖象文言繫辭解說上下經以彖象文言繫辭雜入卦中者自費氏始其初費氏不列學官惟行民間至漢末陳元鄭康成之徒學費氏古十二篇之易遂亡孔頴逹又謂輔嗣之意象夲釋經宜相附近分爻之象辭各附當爻則費氏初變亂古訓時猶若今乾卦彖象係卦之末古經始變扵費氏而卒大亂扵王弼惜㢤奈何後之儒生尤而效之杜預分左氏傳按經宋𠂻范望輩散太元賛與測於八十一首之下是其明比也揆觀其初乃如古文尚書司馬遷班固序傳揚雄法言序篇云爾今民間法言列序篇首與學官書不同槩可見也唐李鼎祚又取序卦冠之卦首則又效小王之過也嵩山晁氏說漢初傳訓者皆與經别行三傳之文不與經連故石經書公羊傳皆無經文而藝文志所載毛詩故訓傳之文亦與經别及馬融為周禮注乃云欲省學者兩讀故具載夲文而就經為注据此則古之經傳夲皆自為一書詩疏易元魏鍾㑹甞著易元互體才性同異後扵㑹家得書二十篇名曰道論寔刑名也易摘呉程秉著周易摘易圖唐髙定通王氏易以為圗合八出上員下方合則重轉則演七轉而六十四卦六甲八節備焉太易張志和著太易十五篇其卦三百六十五易發微王勃夣有告者曰易有太極寤而作易發微易飾易文趙賓為易飾易文以為箕子眀夷隂陽氣亡箕子箕子者萬物方荄茲也賓持論巧慧易家不能難皆曰非古法也景鸞易説見漢諸儒門洼丹易通見漢儒諸門易名三義易緯乾鑿度云易一名而含三義所謂易者變易也不易也又云易者其徳也光眀四通澹泊不失此其易也變易者其氣也天地不變不能通變五行迭終四時更廢君子取象變節相移此其變易也不易者其位也天在上地在下君南靣臣北靣父坐子伏此其不易也九師易文中子曰盖九師興而易道微注淮南王聘九人眀易者撰道訓二十篇號九師易文中讃易子曰吾扵讃易也述而不敢論又曰讃易道以伸先師之㫖注申眀十翼也子讃易至序卦曰大矣時之相生也逹者可與㡬矣至雜卦曰旁行而不流守者可與存義子讃易至革歎曰可矣其孰能為此哉至初九曰吾當之矣又安行乎薛収問一卦六爻之義子曰卦也者著天下之時也爻也者傚天下之動也趍時有六動焉吉凶悔吝所以不同也収曰敢問六爻之義子曰六者非他也三才之道誰能過乎子讃易至山附于地剥曰固其所也将安之乎是以君子思以下人續易太𤣥雄以為經莫大扵易故作太𤣥畫為三方九州二十七部八十一家為八十一首每首九賛合七百二十九賛外有踦嬴二賛每卦曰初一次二次三次四次五次六次七次八上九即九賛每賛皆有測卦始扵中終於養王涯曰太𤣥以一生三以三生九以九生二十七以二十七生八十一三三相生元之數也司馬公說元曰易有彖𤣥有首易有爻𤣥有賛易有象𤣥有測易有文言𤣥有文易有繫辭𤣥有攡瑩掜圗告易有説卦元有數易有序卦𤣥有衝易有雜卦𤣥有錯𤣥漢宋𠂻解其義呉陸績釋之初雄作太𤣥首賛測皆異卷晉范望始合之使相聨屬望又采陸績宋𠂻之說而為之注館閣書目唐王涯作說𤣥一卷本朝許洞撰演𤣥十卷仝上司馬光又為之集注張行成又為翼元十二卷哀帝時雄大覃思渾天參摹而四分之三析而四分天之宿度甲乙也極扵八十一旁及三摹九据極之七百二十九賛亦自然之道也故觀易者見其卦而名之觀元者數其畫而定之元者首四重非卦也數也其用自天元推一晝一夜隂陽度數律歴之紀九九大運與天終始故元三方九州二十七部八十一家二百四十三表七百二十九賛分為三卷曰一二三與太初厯相應亦有顓帝之厯焉筮之以三策闗之以休咎絣之以象類播之以人事文之以五行擬之以道徳仁義禮智無主無名要合五經苟非其事文不虚生為其泰漫濫不可知故有首衝錯測攡瑩數文掜圗告十一篇皆以解剝元體離散其文章句尚不存焉通元晉王長文閉門自守不交人事著書四卷撰易名通元經有文言卦象可用卜筮時人比之揚雄太元同郡馬秀曰揚雄太元惟桓譚以為必傳後世晚遭陸績元道遂眀長文通元經未遭陸績君出耳論元有客難元太深雄解之號曰解難劉歆謂雄曰今學者有利祿尚不能明易如𤣥何恐後人用覆醤瓿張衡致思扵天文隂陽歴筭常好元經謂崔瑗曰吾觀太𤣥方知子雲妙極道数乃與五經相擬非徒傳記之屬使人難論隂陽之事桓譚曰雄書至深而論不詭扵聖人若使遇時君更閱賢知為所稱善則必度越諸子矣司馬公曰元者以賛易也非别為書以與易角也蘇氏之論謂其以艱深之辭文淺近之說陳濳室曰雄之元如膠柱調弦各不能相通非如易一自竒耦之畫而窮扵六十四卦互相為用或云六十四卦八卦之重也元方州部家之雜至是而周矣不可以變也或曰易之六爻即六畫耳由其爻用六故其畫亦六今元有四重即卦上四畫也而賛乃有九皇極經世十卷邵雍撰天地運化隂陽消長皆以數推之以窮夫萬物之變此書以元㑹運世自開闢以來推其年數以元經㑹以㑹經運以運于世以日經日為元之元其數一日之數一故也以日經月為元之㑹其數十二月之數十二故也以日經星為元之運其數三百六十日之數三百六十故也以日經辰為元之世其數四千三百二十辰之數四千三百二十故也則是日為元月為㑹星為運辰為世此皇極經世之數也一元象一年十二㑹象十二月三百六十運象三百六十日四千三百二十世象四千三百二十時也盖一年有十二月三百六十日四千三百二十時故也經世一元十二㑹三百六十運四千三百二十世一世三十年是為一十二萬九千六百年是為皇極經世自元之元更相變而至扵辰之元自元之辰更相變而至扵辰之辰所謂皇極經世但著一元之數使人引而伸之可以終而復始也三山說起堯即位之二十二年甲辰終扵周顯徳六年己未編年紀治亂興亡之事以符其學晁氏志潜虚曰氣曰體曰性曰名曰行曰命温公自序曰萬物皆祖於虚生於氣氣以成體體以受性性以辨名名以立行行以俟命故虚者物之府也氣者生之戸也體者質之具也性者神之賦也名者事之分也行者人之務也命者時之遇也又曰元以凖易虚以凖元元且覆瓿而况虚乎館閣書目曰潜虚一巻易之為卦始扵太極太極生兩儀兩儀生四象四象生八卦八八乘之而極扵六十四卦元之為首始扵一元以生三由三以生九由九以生二十七九九乘之斯為八十一首虚之為行始扵五行一六置後二七置前三八置左四九置右通以五十五行易之卦兼河圗洛書之數元之首得河圗之九數虚之行得洛書之十數易之數生扵一故揲法虛一元之數生扵三故揲法虚三而虚之數生於五故揲法虚五易有乾坤二策乾之策二百一十有六坤之策百四十有四合而計之凡三百有六十以當朞之日衍而積之凡萬有一千五百二十以當萬物之數元以首管九賛以二賛管八䇿當一日以二萬六千二百四十四策當三百六十四日半又有踦當一日四之二贏當一日四之一然後當三百六十五日四分之一與周天之度合虚以冬至之氣起扵元轉而周三百六十四變變尸一日乃授扵餘而終之易得其全故無餘元有欠故増踦贏之賛虛有餘故退元餘齊而無變本朝張行成作潜虚衍義十六卷羣書考索卷一
