body:
  text: 羣書考索卷三十三宋章如愚撰禮門禘祫類王制天子犆礿祫禘祫嘗祫烝祭法曰有虞氏禘黄帝而郊嚳夏后氏禘黄帝而郊鯀商頌長發大禘也𤣥鳥祀高宗也鄭氏以為祀當為祫商四時之祭春禴夏禘秋嘗冬烝故長發大禘所以别四時之禘也周頌雍禘太祖也不言大蓋周以禘為盛祭巳更春祭曰禴夏祭曰禘周禮大宗伯以肆獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以嘗秋享先王以烝冬享先王鄭注云宗廟之祭有此六享肆獻祼饋食在四時之正則是祫也禘也魯禮三年䘮畢而祫於太祖春秋文二年八月大事于太廟躋僖公公羊曰大事者何祫也明年春禘於羣廟自爾以後五年而再盛祭一祫一禘陳禮書曰古者䘮除朝廟合羣祖而祭焉故祫謂之朝享以合羣祖為不足明年又禘其祖之所自出故禘謂之追享禮不王不禘又曰王者禘其祖之所自出諸侯不禘降殺於天子也然則魯何以有禘春秋何以書之蓋成王追寵周公故也祭統云成王追念周公賜之重祭郊社禘嘗是也魯之用禘蓋於周公之廟而上及文王者即周公之所出故也此祭惟得於周公廟為之閔公時遂僭用於莊公之廟禮記曰以禘禮祀周公於太廟則禘豈可施於羣廟哉禮曰魯之郊禘非禮也周公其衰矣孔子曰禘自既灌而往吾不欲觀之矣蓋譏其失禮也漢平帝元始中祫祭明堂後漢張純以為禘也而章懷太子注云俱是大祭名可通也漢時以禘祫為一祭故其禮始紊光武自十八年幸長安祠高廟詔太常行禘禮至二十六年詔問張純曰禘祫之禮不行幾年純奏三年一祫五年一禘至是始復行議者以為光武之祭疏而怠矣魏明帝詔曰漢氏四百年廢無禘禮唐開元六年䘮畢而祫明年而禘各自以年不相通數凡七祫而五禘至二十七年禘祫並在一歳有司乃覺其非議者以為明皇之祭數而瀆矣國朝舊制三年一祫以孟夏五年一禘以孟冬禘祫之月不行時享以禧祖為始祖元豐中禮官言古者祼獻饋食禴祠烝甞並為先王之享未嘗廢時祭故孔頴達正義以為天子夏為大祭之禘不廢時祭之禴秋為大祭之祫不廢時祭之嘗請禘祫之月仍行時享從之其後禮官又以僖祖而上譜失其傳國家既求其所自出而不得則禘當缺又從之漢官舊儀載三年一大祫祭子孫諸帝以昭穆坐於高廟諸毁廟神皆合食高祖南面昭西南穆東南將祫祭前期十日肆師告其太宰太宗大史帥執事而卜日既卜太宰眡滌濯司徒奉牛牲司馬奉羊牲司空奉豕牲每廟各一牢籩人陳四籩之實醢人掌四豆之實小史叙昭穆之爼簋酒正共五齊三酒以實八罇九服内諸侯及夷狄等來助祭所貢方物珍異等皆陳廟庭司服共享先王則衮冕享先公則鷩冕尸服亦然其曰大宗伯出高祖以下木主守祧出先王先公祧主皆入太祖后稷廟中尸各位木主之左凡七尸用九獻王入奏王夏后從王而入奏齊夏尸入奏肆夏王乃珪瓚酌斚彛欝鬯以授尸尸受之灌地祭之以降神乃啐之奠之此為求神之始也此為一獻后以璋瓚亞獻此為二獻次奏黄鍾為宫大吕為角太簇為徵應鍾為羽路鼓路鼗隂竹之管龍門之琴瑟九德之歌九韶之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣前祼及樂皆為求神謂之二始以周人尚臭故以鬯臭次王出迎牲入奏昭夏王親牽牲執鸞刀啓其血毛以行朝事之禮乃薦腥肉於尸主前謂之朝踐之禮王酌泛齊以獻尸謂之朝踐之獻凡三獻也后於是薦朝事之籩豆時堂上以大吕之調歌清廟之詩堂下以黄鍾之調作大武之樂奏大武之時則歌維清及大武之詩獻后稷尸時樂同降神樂章則歌思文獻先王先公則大司樂云奏無射夾鍾舞大武以享先祖樂章則歌天作獻文王尸歌清廟獻武王尸歌執競樂同先王先公后薦之後遂以瑶爵亞獻凡四獻也至薦熟時迎尸入室王酌盎齊獻尸謂之再獻凡五獻也時后薦饋食之籩豆酌醴齊以亞獻凡六獻也尸食訖王以泛齊酌尸謂之朝踐凡七獻也后乃薦加事籩豆后以盎齊獻尸謂之再獻凡八獻也諸臣為賔酌沈齊以備卒食三獻凡九獻太祝設饌於廟門外以索祭名為祊既九獻兼作六代之樂遂行加爵為旅酬之始來日又祭為繹其禘祭肆師卜日如祫祭九獻之節廟堂之樂所用樂章祊繹一如祫祭所異者但祭毁廟以上不及親廟禮云毁廟之主皆升合食而立二尸韓詩内傳云禘取毁廟之主皆升合享於太廟是也其神主位按鄭𤣥禘祫志大王王季以上遷主祭於后稷之廟其坐位與祫祭同文武以下遷主若穆之遷主祭於文王之廟昭之遷主祭於武王之廟其尸后稷廟中后稷尸一昭穆尸各一文王廟中文王尸一穆尸共一武王廟中武王尸一昭尸共一其五齊自醴齊而下四齊而已無泛齊酒亦三酒於文王之廟無降神之樂繹祭則同日禮記正義王制云天子諸侯宗廟之祭春曰礿夏曰禘秋曰嘗冬曰烝注云此蓋夏商祭名周則改之春曰祠夏曰礿以禘為殷祭詩小雅曰礿祠烝嘗于公先王此周四時祭宗廟之名正義曰此云春礿而郊特牲云春禘者彼鄭注云禘當為礿從此為正祭義曰春禘秋嘗鄭注云夏殷禮也周改春曰祠夏曰礿案宗伯云以祠春享先王以礿夏享先王又知周以禘為殷祭者案公羊傳云五年而再殷祭又春秋僖公八年七月禘于太廟是禘為殷祭殷大也謂五年一大祭王制曰天子犆音特礿祫禘祫嘗祫烝注云犆猶一也祫合也天子諸侯之喪畢合先君之主於犆廟而祭之謂之祫後因以為常天子先祫而後時祭諸侯先時而後祫凡祫之歲春一礿而已不祫以物無成者不殷祭周改之夏祭曰礿以禘為殷祭也正義曰案禮緯三年一祫五年一禘鄭云百王通義則虞夏及商皆與周同祫亦三年為一也皇氏取先儒之義以為虞夏祫祭每年皆為又云三時祫者謂夏秋冬或一時得祫則為之不三時俱祫然案鄭云三年一祫五年一禘百王通義鄭又注此云春一礿而已不祫以物無成者不殷祭也又禘祫志云王制記先王之法祫為大祭祫於秋於夏於冬周公制禮祭不欲數如鄭此言則夏商三時皆殷祭皇氏之說非也王制又曰諸侯礿則不禘禘則不嘗嘗則不烝烝則不礿諸侯礿犆禘一犆一祫嘗祫烝祫正義曰礿則不禘者虞夏之制諸侯歲朝皆闕一時之祭也此從南方始南方諸侯春礿祭畢夏來朝故闕夏禘禘則不嘗者西方諸侯行夏祭竟而秋來朝故不嘗嘗則不烝者北方諸侯行秋祭竟而冬來朝故廢烝烝則不礿者東方諸侯行冬祭竟而春來朝故廢礿也然各廢一時餘三時皆祭諸侯礿犆者諸侯降於天子故礿在犆上也禘一犆一祫者言諸侯當在夏祭一禘之時不及禘祭惟犆一祫而已闕時祭也嘗祫烝祫者謂諸侯先作時祭烝嘗然後為大祭之祫也議曰聖人制禮合諸天道使不數不怠故有四時之祭焉而又設殷祭者因天道之成以申孝敬之心用盡事終之禮禘祫二禮俱是大祭先賢所釋義各有殊馬融王肅皆云禘大祫小鄭𤣥注二禮以祫大禘小賈逵劉歆則云一祭二名禮無差降數家之說非無典據至於大通經訓鄭義為長鄭試嘗論之禮經及春秋所書皆祫大於禘按春秋公羊傳云大事於太廟大事者祫也祫者毁廟之主陳於太祖未毁廟之主皆升合食於太祖至於禘則云禘于莊公禘于僖公既不於太祖則小於祫矣又逸禮記祫于太廟之禮云毁廟之主升合食而立二尸又按韓詩内傳云禘取毁廟之主皆合升食於太祖則禘小於祫也祫則羣廟之主悉升於太祖廟禘者各於其廟而行祭禮二祭俱及毁主禘之時文王以上毁主自在后稷廟而祭文王以下毁主自在二祧之廟而祭禘之與祫同得為盛祭則小於祫而大於四時也曽子問主夫子曰自非祫祭七廟五廟無虚主而不言禘小於祫明矣其祫則備五齊三酒禘惟四齊三酒祫則備用六代之樂禘則四代而下又無降神之樂以示其闕也祭之時禮緯云三年一祫五年一禘說者以為天道三年一閏五年再閏故制禮象之公羊傳云五年而再盛祭禘者所以審締昭穆而辨之各於其廟謂追及其祖之所自出故司尊彛又謂之追享禘以祼享先王其祼也猶事生之有享也享以陽為主故禘以夏大宗伯肆獻祼享先王指禘言之也祫者合也所以合聚羣祖而食之毁廟之主陳於太祖未毁廟之主皆升合食于太祖以其自三年之喪畢而朝於廟為始故司尊彛謂之朝享祫以食享先王其食也猶事生之有食食隂也故祫以冬大宗伯饋食之享指祫言之也周禮圖禘祭以為夏四月其說一也而於祫祭則或以為秋或以為冬如毛氏詩解閟宫傳曰諸侯夏禘則不礿秋祫則不嘗惟天子兼之是以祫為秋祭也崔靈恩亦云禘以夏者以審締昭穆序别尊卑夏時陽在上隂在下尊卑有序故因次序而祭之祫以秋者以合聚羣生其禮最大必秋時萬物成熟大合而祭之是亦祫為秋祭也若果為秋祭則三十九月為前二十一月為後不若張純之說以祫為冬祭其說曰冬十月五穀成熟物備禮成故合聚飲食而祭之然二說或以秋或以冬皆取萬物成熟之時其時不同其意則一不如張純以冬十月為得其正也宗廟之享有五年之禘三年之祫所謂間祀也而又有四時之享焉蓋祭不欲數數則瀆故有間祀祭不欲疏疏則怠故有時享宗廟之禮總而言之有三等蓋獻祼是禘之大祭飲食是祫之次祭春享而下是時祭之小祭若以總用衮冕太牢言之亦皆為大祭也雖禘不足為大祭祫不足謂之次祭也薛圖家語曰凡四代帝王之所謂郊者皆以配天其所謂禘者皆五年大祭之所及也祭之制后稷東向羣昭南向羣穆北向祫祭五齊泛醴盎緹沈禘祭四齊醴盎緹沈或以為祫三齊坊記所謂醴酒在室醍酒在堂澄酒在下是也或以禘四齊禮運所謂𤣥酒在室醴醆在户粢醍在堂澄酒在下是也其祼樽用鷄彛鳥彛司尊彛云春祠夏礿祼用鷄彛鳥彛以禘在夏故也朝踐用兩犠樽再獻用兩象樽合樂時作四代之樂其祭禮后稷文王武王廟各一日凡祭之禮質明行祼謂之晨祼繼以朝踐次乃饋熟以下是則每廟各行此禮煩難可以一日而畢又乖朝踐之義繹祭則同日國朝嘉祐四年將行祫饗議者請陳瑞物及代國之寳元豐中請親祠太廟令戸部陳歳之所貢以充庭實仁祖神宗皆可其奏其後祫享應瑞寳貢物可出而陳者並不陳設親祠太廟凖此四朝志國朝舊制禮饌外設常食一牙盤元豐中罷之禮官吕希純甞建議曰先王之於祭祀皆備上古中古及今世之食所設古器禮饌即上古中古之食也牙盤常食即今世之食也而議者乃以為宗廟牙盤原於秦漢之制殊不知三代以來自備古今之食請依祖宗舊制薦一牙盤及是始從希純之議云太祖朝太廟見籩豆簠簋問侍臣以禮樂對帝曰我之祖寧識此命撤去亟令進常饍親享畢顧羣臣設禮器俾儒士輩行事至今太廟先進牙盤而後行禮邵康節曰太祖之於禮可謂達古今之冝矣聞見録太祖皇帝開寳五年詔享太廟科外别置牙盤然則牙盤之制其來逺矣九獻一獻王祼以圭瓉酌鬰鬯以獻尸二獻后次王以璋瓉酌鬰鬯以獻尸三獻薦腥朝踐之節王以玉爵酌醴齊以獻尸四獻后薦朝事之豆籩又以玉爵酌醴齊以獻尸五獻薦熟饋食時王乃以玉爵酌盎齊以獻尸六獻后薦饋食之豆籩又以玉爵酌盎齊以獻尸七獻王醴尸以玉斚酌朝踐之酳齊八獻后酳尸以瑶爵酌饋食之盎齊以獻九獻諸臣酳尸又次后以瑶爵酌盎齊獻尸諸臣之獻乃所以酢尸故曰諸臣之所胙也此皆先儒之說薛圖載之禮書曰先儒謂大祫十有二獻非也先儒又謂公侯伯子男三祼在九獻之内亦非也司尊彛朝踐風雨尊皆有罍饋食用兩尊皆有罍籩人醢人有朝踐王獻之后亞之諸臣胙三獻也饋食王獻之后亞之諸臣胙六獻也酳尸三九獻也加爵不與焉此宗廟九獻之禮也一獻三獻五獻七獻禮器曰一獻質三獻文五獻察七獻神郊特牲曰郊血大饗腥三獻爓一獻熟鄭氏謂一獻祭羣小祀三獻祭社稷五祀五獻祭四望山川七獻祭先公禮書賔客獻數禮書曰賔客之禮士一獻士冠禮一獻卿大夫三獻郊特牲三獻之介子男五獻禮器五獻之等侯伯七獻上公九獻而王饗諸侯自子男五獻以至諸侯長十有再獻周禮春秋時楚子入享於鄭九獻加籩豆六品配享大禘詩曰實為阿衡實左右商王禘于太祖則功臣與祭故末章言伊尹也稽古編書書盤庚告于羣臣曰兹予大享于先王爾祖其從與享之國朝舊制親祠太廟不配享功臣有司詔講求禮例自是親祠始與享焉元豐三年禮官言周禮司勲凡有功者祭于大烝烝冬祭也謂之大者物成衆多之時其祭以三時為大也方是時百物皆報其祭有功冝矣禮記祭統衛孔悝之鼎銘曰勤于大命施于烝彛後世烝祭不及功臣既不合禮而禘祫及之事不經見請每遇冬烝以功臣配享其禘祫配享罷之詔凡冬享禘祫及親祠功臣並配享先後之辨禮緯曰三年一祫五年一禘而鄭氏徐邈又分為二說為鄭氏之說則曰前三後二謂禘後四十二月而祫祫後十八月而禘為徐邈之說則曰前二後三謂二祭相去各三十月駁鄭氏者則曰三年而祫為月有餘二年而禘為月不足駁徐氏者則曰禘在祫前則是三年而禘祫在禘後則是二年而祫以二說攷之惟鄭氏曰魯禮三年喪畢祫於太廟明年禘於羣廟自是之後五年而再盛祭一祫一禘由此言之鄭氏依倣魯禮推明王制實為有據本朝慶厯初用徐邈說每三十月一祭熈寧八年既禘又祫此有司之失也請今十八月而禘四十二月而祫庻幾舉禮不煩事神不瀆禮官言唐開元中禮官用晉徐邈之說以二祭相去各三十月合五歲再盛祭之說以為禘祫之數本朝自慶厯以來皆三十月而一祭至熈寧五年後始不通計遂至八年禘祫併在一歲昨元豐三年四月已行禘禮今年若依舊例十月行祫享即比年頻祫復踵前失請以慶厯以來舊制通計年數皆三十月而祭詔依見行典禮四朝志唐開元中二十七年禘祫在一歲一祭二名之辨大宗伯肆獻祼是禘祭也饋食是祫祭也司尊彛追享是禘祭朝享是祫祭也既有此别而賈逵劉歆以為禘祫一祭二名漢平帝祫祭於明堂而張純以為禘祭章懷太子注云是大祭名可通也周禮既曰肆獻祼既曰追享又曰朝享差别其禘祫也祫則及毁廟之主禘則及於祖之所自出也安得一祭而二名哉時享禮書曰君子以義處禮則祭不至於數煩以仁處禮則祭不至於疏怠悽愴發於霜露之既降怵惕生於雨露之既濡此所以有四時之享商禮曰春曰礿夏曰禘秋曰嘗冬曰烝周禮春祠夏禴秋嘗冬烝王制曰天子犆礿祫禘祫嘗祫烝蓋祫有三年之祫有時祭之祫時祭之祫小祫也士虞禮曰薦此祫事則時祭謂之祫宜矣三年之祫大祫也蓋小祫止於未毁廟之主大祫已及於毁廟之主月祭玉藻言天子聽朔於南門之外諸侯聽朔於太廟春秋文公六年書閏月不告朔猶朝于廟論語曰子貢欲去告朔之餼羊鄭氏釋玉藻謂天子聽朔於明堂以特牲告其帝及神配以文王武王釋論語謂人君每月告朔不祭謂之朝享然周禮朝享非謂告朔而聽朔於明堂以特牲告其帝及神配以文王武王無所經見要之告朔於廟餼以特牲謂之月祭此先王之禮也魯文公不行告朔之禮但身至廟拜謁而已故春秋譏之禮書薦新月令孟夏薦麥孟秋薦黍季秋薦稻吕氏月令一歲之間八薦新物開元禮加以五十餘品景祐中禮官建議以謂吕紀簡而近薄唐令雜而不經於是更令四時所薦凡二十八物除依詩禮月令外又増多十有七品雖出於有司一時之議然四時登薦祖宗行之已久今欲稍加刋定取其間先王所常享用膳羞之物見於經者可依舊制存之其不經者去之庻幾不失禮意凡新物及時出者即日登獻既非正祭則於禮不當卜日漢儀嘗韮之屬皆於廟而不在寢故韋元成傳以為廟歲二十五祠而薦新在焉四朝志漢叔孫通曰古者有春嘗菓方今櫻桃熟可獻願陛下出因取櫻桃獻宗廟上許之諸菓獻由此興惠帝時政和中言者謂先王建祭祀之禮必得疏數之中未聞一日並行兩祭者也今太廟薦新有與朔祭同日者夫朔祭行於一月之首不可易也若夫薦新則未嘗卜日一月之内皆可薦也新物未備猶許次月薦之亦何必同朔祭之日也詔薦新與朔祭同日即用次日羣祀類天子七祀商制天子祭五祀戸一竈二中霤三門四行五也歲徧諸侯與大夫天子同周制王為羣姓立七祀曰司命曰中霤曰國門曰國行曰泰厲曰戸曰竈諸侯為國立五祀曰司命曰中霤曰國門曰國行曰公厲大夫立三祀曰族厲曰門曰行嫡士立二祀曰門曰行庻人立一祀或立霤竈或立户周有地大夫五祀無地大夫三祀禮記正義曰曲禮天子諸侯大夫皆祭五祀鄭氏注云戸竈中霤門行也此商制祭法曰天子立七祀諸侯五祀大夫三祀士立二祀謂周制也案王制曰大夫祭五祀文與此同又鄭云五祀謂司命也中霤也門也行也厲也與此不同者王制之文上云天子祭天地諸侯祭社稷大夫祭五祀既有尊卑等級疑是周禮故引祭法五禮以解之是有地大夫祭五祀無地大夫祭三祀也有地無地見鄭氏注漢立五祀白虎通云户一祀竈二祀門三祀井四祀中霤五祀唐開元制七祀唐初廢七祀惟季夏祀祭中霤開元中制禮祭七祀各四時享祭之於廟庭司命户以春竈以夏門厲以秋行以冬中霤以季夏其儀具開元禮中霤月令中央土其祀中霤鄭氏注云中霤猶中室也古者複穴是以名室為霤正義云庾蔚云複謂地土累之謂之穴則穿地也複穴皆開其上取明故兩霤之是以後因名室為中霤也祀中霤之禮設主於牖下開牖象霤故設主於牖下也正義祭四時以下祭法云埋少牢於泰昭祭時也正義云泰昭壇名相近於坎壇祭寒暑也王宫祭日也夜明祭月也幽宗祭星也雩宗祭水旱也四坎壇祭四方也有天下者祭百神五祀七祀論五祀見於周禮禮記儀禮雜出於史傳多矣特祭法以司命泰厲為七祀而左傳家語則以五祀為重該脩熈黎勾龍之五宮月令以五祀為門行户竈中霤白虎通劉昭范曄高堂隆之徒以五祀為門井戸竈中霤鄭氏釋大宗伯之五祀則用左傳家語之説釋小祝之五祀則用月令之說釋王制五祀則用祭法之說而荀卿謂五祀執薦者百人侍西房侍西房則五祀固非四方之五官侍必百人則五祀固非門戸之類然則五祀所謂者其名雖同其祭各有所主也七祀之祭不見他經鄭氏以七祀為周禮五祀為商制然周官雖天子亦止於五祀儀禮雖士亦傳五祀則五祀無尊卑隆殺之數矣祭法自七祀推而下之至於適士二祀庻人一祀非周禮也然禮所言五祀蓋皆門户之類而已兩漢魏晉之立五祀井皆與焉特隋唐參用月令祭法之說五祀祭行及李林甫之徒復脩月令冬亦祀井而不祀行然則行神亦特較於始行而祀非先王冬日之常祀也秦陳寳祠秦文公以獲若石云于陳倉北阪城祠之其神或歲不至或歲數來也常以夜光輝若流星從東方來集于祠城若雄雉其聲殷殷云野雞夜鳴以一牢祠之名曰陳寳作陳寳祠質如石似肝云語辭秦伏祠秦德公卜居雍子孫飲馬於河遂都雍雍之諸祠自此興用三百牢于鄜畤作伏祠磔狗邑四門以禦蠱災孟康曰六月伏日也周時無至此乃有之顔師古云伏者謂隂氣將起迫於殘陽而未得非故為藏伏因名伏日也立秋之後以金代火金畏於火故至庚日伏庚金也八神祠始皇東遊海上行禮祠名山川及八神求仙人羡門之屬八神將自古有之或曰太公以來作之其休絶莫知起時至始皇乃祠之一曰天主祠天齊二曰地主祠泰山梁父三曰兵主祠蚩尤四曰隂主祠三山五曰陽主祠之罘山六曰月主祠之萊山七曰日主祠盛山八曰四時主祠琅琊漢蚩尤祠高祖狥沛為沛公祀蚩尤釁鼔旗及即位詔御史令豐治枌榆社令祝立蚩尤之祠於長安唐親祀神農於東郊明皇開元十九年停帝稷而祀神農於壇上以后稷配二十三年親祀神農於東郊配以勾芒遂躬耕壠畝止唐先農壇唐永徽以前皆謂籍田壇至垂拱後乃為先農後又改為帝社壇元和五年詔以來歲正月籍田太常修撰韋公肅言籍田禮廢久矣有司無考乃據禮經參采開元乾元故事為先農壇於籍田漢宣室受釐漢惟祭天地五畤皇帝不自行祠還致福釐未央殿前正室文帝受釐唐壽星壇明星生於八月以仲秋日月會于壽星特置壇用於秋節日祭老人星及角亢七宿著之常式東漢老人星廟在國都南郊祀之宋朝壽星壇景德三年八月王欽若言謹按月令八月命有司秋分日饗壽星於南郊其壇亦依靈星制度風伯雨師國朝每歲以立春後丑日祭風伯立夏後申日祭雨雷師諸州亦設祭淳化四年光禄寺言風雨本中祠而獻官行禮反是小祠禮料切惟風雨之功其於萬物最大唐太宗親曽展拜今禮數混亂乞行改正從之祥符元年請令州郡長吏親享二年有司言州縣神祀並如小祀用羊一籩豆各八簠簋各二從之祭司寒月令仲春之月天子乃鮮羔開氷先薦寢廟鄭注云鮮當為獻聲之誤也獻羔謂祭司寒也祭司寒而出氷薦於宗廟乃後賦之春秋傳曰古者日在北陸而藏氷西陸朝覿而出之其藏也深山窮谷固隂沍寒於是乎取之其出之也朝之禄位賔食喪祭於是乎用之其藏之也黒牡秬􅁰以享司寒其出之也桃弧棘矢以除其災其出入也將食肉之禄冰皆與焉正義云薦於宗廟謂仲春也乃後賦之謂孟夏也故凌人云夏頒冰左傳云火出而畢賦是也日在北陸者北陸虚也謂十二月日在虚之時而藏冰西陸朝覿而出之者西陸昴也鄭康成以四月之時日在昴畢之星朝見東方於時出冰以賜百官若其初出薦廟時在二月也朝之禄位謂大夫以上黒牡秬黍者以其祭冰神色尚黒謂司寒之神則𤣥冥水神也火出而畢賦左傳云火出於夏為三月於商為四月於周為五月則火出季春建辰之月以周禮夏頒冰乃建巳之月不同者但建辰火星在卯火星始出至建巳火星漸高總而言之亦得稱火出早則三月之末晩則四月之初不甚相逺又三月内有四月節時故據夏而言之太祖建隆二年始置藏冰務而修其祭焉以四月命官率太祝用幣以黒牲祭𤣥冥之神乃開冰以薦寢廟詞題唐制先立春三日用黒牡秬黍祭司寒之神於冰室祭訖鑿冰而藏之仲春開冰具開元禮通典祀大火康定元年太常博士胡宿請修火祀按春秋士匄曰古之火正或食於味陶唐氏之火正曰閼伯居商丘祀大火而火紀時焉說曰火正謂火官也掌祭火星行火政後世以為火祖相土契之曽孫伐閼伯後主火星宋其後也按商丘今南京太祖皇帝受命之地當房心之次以宋建號用火紀德蓋取於此至真宗始升建京邑號為三都則閼伯之神上配大火國家之興實受其福至於祀典尤宜超異於昔今閼伯祠制度狹小又不領於天子之祠官歲時府吏享祀而已甚非報本尊始之意願詔太常列於祠宫歲時遣使齎其攝行祠事詔禮院詳定既而宿又言云云祥符中交修大禮拱揖諸神雖偏方逺國山林之禮不出經據偶在祀典者尚秩王公之攝増牲牢之品而大火閼伯國家䝉福之神宋興八十年祠官不以聞此有司之闕也又按左氏國語董因逆晉侯于河公問曰吾其濟乎曰君之出也歲在大火閼伯之星也是為大辰辰以成善又曰嗣續其祖以穀之滋韋昭以為辰為農祥周先后稷之所經緯以成善道子孫繼續其祖如穀之蕃滋推此而言則東方七宿房心通有農祥之稱若因舊丘古祠除潔壇地臨遣近臣對祭閼伯不惟講修火政亦足以祈豐年以陶唐之舊祀祖宗之闕典一旦恢而復之為萬世法貽厥子孫永錫純嘏臣不勝區區太常禮院言閼伯為高辛火正實居商丘主祀大火能宿其官後世因之祀為貴神配火侑食亦如周棄配稷后土配社之比下歴千歲遂為重祀祖宗以來郊祀上帝而大辰已在從祀閼伯之廟每委京司長吏致奠咸秩之典未始云闕然國家有天下之號實本於宋五運之次又感火德切謂冝因興王之地商丘之舊作為壇兆秩大火以閼伯配之每建辰戍出納之月内降祝板詔留司長吏奉祭行事籩豆牲幣得視中福云云從之羣書考索卷三十三
