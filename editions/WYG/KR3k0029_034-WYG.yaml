body:
  text: 羣書考索卷三十四宋章如愚撰禮門羣祀類太一賈公彦周禮疏曰按爾雅北極謂之北辰鄭注云天皇北辰耀魄寶又云昊天上帝又名太一常居以其尊大故有數名也如鄭氏之說則周禮所謂上帝之祀昊天乃今之太一是三代亦有其祭矣按元命包紫微宫為大帝又云中宫太極星其一明者為太一常居文耀鈎亦云中宫大帝其北極星下一明者為太一先合元氣以斗布常是則天皇大帝之號也武帝時繆忌奏祠太一方曰天神貴者太一太一佐曰五帝天子立其祠其後人上書言古者天子三年一用太牢祠三一天一地一太一天子許之㑹要所謂大祀小祀者以太一為天之尊神五帝乃其佐也初漢武帝用方士之言初郊泰畤然命祀之典尚論於二祝之雜說而未知禮經之明證當是時漢有五帝之位禮官知尊五帝以為天之神而不知太乙之神乃天尊之又尊者也至武帝而正定之尊其禮幣在五帝之上唐人因之肆類圜丘則列太一之位次於昊天上帝與天地神祇為比類皆大祀也太和中博士不達其指以漢武所建溺於方士非六籍之正降為小祀至武帝而復之開元通禮命為中祀咸平禮官重復其禮復為大祀太宗從之自是著為定令矣易乾鑿度曰太一取其數以行九宫九宫者一為天蓬以制冀州之野二為天芮以制荆州之野三為天衝其應在青四為天輔其應在徐五為天禽其應在豫六為天心七為天柱八為天任九為天英其應在雍在梁在揚在兖天衝者木也天輔者亦木也故木行太過不及其眚在青在徐天柱金也天心亦金也故金行太過不及其眚在梁在雍惟水無應宫焉此謂以九宫制九分野也太宗皇帝時始建置太一宫於蘇州其後司天春官楚芝蘭上言請於京師蘇村建太一宫詔徙太一宫於蘇村太一宫成張齊賢請用祭天地之禮殺其半又少損之歳每四立日行祠禮上令增教坊伶官百人自昏祠至明如漢制靈星詩曰高子曰靈星之尸也靈星不知何星漢郊祀志云高祖詔御史其令天下立靈星祠張晏曰龍星左角曰天田則農祥也辰見而祭之史傳之説靈星惟有此耳漢郊祀志後漢志云漢興八年有言周興而邑立后稷之祀於是高帝令天下立靈星祠言祠后稷而謂之靈星者以后稷又配食靈星也祀用壬辰位祠之壬為水辰為龍就其類也牲用太牢縣邑令長侍祠舞者用童男十六人舞者象教田初為芟除次耕種耘耨驅爵及穫刈舂簸之形象其功也通典云周制仲秋之月祭靈星於國之東南唐開元禮祭靈星於國城東南天寳四載升為中祀武帝乾封三年詔天下尊祠靈星髙禖後漢志仲春之月立高禖祠於城南祀以特牲漢武帝立高禖壇於城南後漢至晉皆因之北齊置壇於南郊旁隋亦祀於南郊景祐四年二月張奎言月令仲春燕至之日以太牢祀於高禖天子親徃后妃率九嬪御乃禮天子所御帶以弓韣授以弓矢於高禖之前此先王求嗣之祭願敕有司准舊儀天子躬行時祭祈天錫羡承萬世之業詔有司詳定禮官以謂記月令雖可執據然周官所載獨闕其文則成康之時似廢而不享月令本秦吕不韋所集疑此乃夏商所行班固郊祀志言漢家祠祭最悉不言禖祀獨枚臯傳言皇子禖祀則武帝乃一時權祭非經也後漢至江左槩見其事而儀典委曲不可周知且推檢歴代祭饗樂章無高禖歌辭則當時所祀似禮之細者惟齊高禖祀最顯然出於草創儀章覇駮妃嬪參享黷而不蠲恐不足為後世法唐明皇因舊月令特存其事及開元定禮已復不著陛下稽古是式圖復舊章然高禖之祠湮晦已乆禮經不全朝廷必欲從之亦應參凖前言無禆煩䙝以瀆上神謂當築壇於南郊春分之日以祀青帝本詩克禋以禮祓之義也配以伏羲帝嚳羲本始嚳著祥也以禖神從祀報古為禖之先也以石為主依漢晉之舊也牲用太牢樂以升歌儀視先蠶使有司攝事祝版所載具言天子求嗣之意乃以弓矢弓韣致於禖神之前祀訖奉弓矢等并胙若酒進内以禮所御使齋戒受之以應求男之祥仍每歳令有司申請祭之命曰特祀不為常典詔可是月太常禮院言其壇制高九尺周廣二丈六尺四出陛陛廣五尺設三壝壝别二十五歩主用青石玉用青玉幣色從之牲用牛羊豕各一如盧植所說祭歌樂章祀儀並準青帝樽器神座如勾芒寳元二年八月詔為皇子降誕遣官以太牢報祠高禖並凖春分祠儀唯不設弓韣弓矢康定二年正月詔髙禖著為常祀遣兩儀官攝事二月禮官言髙禖既載常典即為報祀今後欲依寳元詔書更不設弓韣弓矢從之慶厯三年余靖言髙禖之祀不設弓韣弓矢非是請如景祐之制禮官議曰生民云克禋克祀以祓無子鄭云祓除其無子之疾而得福此則禖祀之義本主於祈求至漢武既得太子立禖官於城南祀以特牲始為報禮亦不言去弓韣弓矢之禮今皇嗣未廣宜謹祈祓當循古典庻獲嘉祥請依所奏自今祀依舊用弓韣弓矢詔可嘉祐二年五月詔徙髙禖壇於南郊壇東注先是禮院言禖壇卑陋請徙髙爽之地議者請徙於圜丘之東或言當在東方長男之位下禮官詳定以為漢武始立祠於城南後漢至晉皆因之北齊制壇於南郊旁隋以祀於南郊唐禮不載國朝景祐中初築於南郊壇之西南其地卑濕宜徙圜丘之東擇髙爽地改築之雩祭荀子曰湯旱而禱曰政不節歟使民疾歟宫室營歟婦謁盛歟苞苴行歟䜛夫興歟何以不雨至此極也陳禮書曰雩祭也月令仲夏之月大雩帝禮書云祀昊天上帝及五帝也用盛樂命百縣雩祀百辟卿士有益於民者以祈穀實周禮舞師掌教皇舞帥而舞旱暵之事注曰雩也黨正春秋祭禜注曰雩禜水旱之神也女巫旱暵則舞雩使女巫舞旱崇隂也詩噫嘻春夏祈穀於上帝注曰龍見而雩檀弓曰歳旱穆公召縣子而問曰天乆不雨吾欲暴巫而奚若曰天則不雨而望之愚婦人毋乃已踈乎左傳曰啓蟄而郊龍見而雩龍建巳之月過則書春秋書雩者二十皆秋雩也惟成公七年冬大雩雩樂以舞為盛後世或選善謳者歌詩而已皆非古也北齊祀禮古者雩舞以皇舞以女巫皇與女隂也則舞所以達陽中之隂而已董仲舒祈雨之術閉南門縱北門蓋亦古者達隂之意也禮書雩用建巳之月而建巳月乃陽亢之時隂氣難達故雩祀作焉過此而雩春秋所以譏也東萊吕氏曰雩有二等有常雩有旱而雩龍見而雩歳之常雩也上辛大雩季辛又雩旱而再雩也月令仲夏之月命有司祈祀山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士有益於民者以祈穀實鄭注云陽氣盛而常旱山川百源能興雲雨者也衆水始所出為百源必先祭其本乃雩雩吁嗟求雨之祭也雩帝謂為壇南郊之旁雩五精之帝配以先帝也百辟卿士者古者上公若勾龍后稷之類也春秋傳曰龍見而雩雩之正當以四月凡周之秋三月之中而旱亦修雩禮以求雨因著正雩此月失之矣天子雩上帝諸侯以下雩上公周冬及春夏雖旱禮有禱無雩正義云以四月純陽用事故云陽氣盛而常旱故制禮此月為雩縱令雩祭時不旱亦為雩祭雩五精之帝者以雩是祭天當從陽位以五天總祭不可徧在四方故知在南郊也以春夏秋冬共成歳功不可偏祭一天故雩五精之帝以自外至者無主不正當以人帝配之太皥配靈威仰炎帝配赤熛怒黄帝配含樞紐少皥配白招拒顓帝配叶光紀故云配以先帝也古者上公若勾龍后稷之類者百辟則古之上公則國語鯀為崇伯而禮記祭法有祀之文社稷五祀雖為王朝卿士兼帶上公之官故左氏云封為上公祀為貴神案左傳有社稷五官今直云若勾龍后稷不云勾芒蓐収之等舉有益於民功之顯者言之爾凡周之秋三月之中旱亦修雩禮以求雨者釋此經大雩在五月之中為五月不雨修雩祭作記者言云五月之雩是常雩故記之於五月也周冬及春夏雖旱禮有禱無雩者按春秋周七月八月九月皆書穀梁不譏成七年冬大雩穀梁云無為雩是譏其冬雩是冬無雩也春秋周之春及周之四月五月皆無雩文春夏不雩雖旱不為修雩之祭其周季夏當有正雩則龍見而雩是也穀梁說云得雨而雩不得雨曰旱公羊說言雩則旱見言旱則雩不見此二家之說不同大雩若國大旱則司巫師巫而舞雩漢承秦滅學正雩禮廢旱太常祝天地宗廟後漢自立春至立夏盡為秋郡國上雨澤若少府郡縣各掃社稷公卿官長以次行雩禮以求雨東晉穆帝制雩壇於南郊之旁梁武帝天監元年有事雩壇又以雩祭燔柴以火祈水於理為乖於是停用柴燔從坎瘞典時儀曹朱異議曰按周宣雲漢之詩毛注有瘞埋之文不見燎柴之說唐武德初定令每歳孟夏雩祀昊天上帝於圜丘正觀雩祀於南郊開元旱甚則大雩大蜡蜡之義自伊耆之代而有其禮古之君子使之必報之是報田之祭也其神神農初為田事故以報之夏氏更名曰嘉平廣雅曰嘉善也平成也以嵗終萬物成就而報其功殷更名曰清祀廣雅曰清潔而祭祀也據廣雅則夏曰清祀殷曰嘉平今按風俗通及蔡邕章句耳未詳孰是周因之復名大䄍天子之䄍故曰大䄍以嵗十二月建亥月合聚萬物而索享之春官宗伯以疈辜祭四方百物疈牲胸而桀之為腊焉崔靈恩云䄍祭用少牢行一獻之禮疈音普逼切其祭以主曰也主日其光明天之神可見者著莫大焉易曰懸象著明莫大於日月配以月餘百神從祀於下所䄍之神有八一曰先穡二曰司穡先穡若神農為主司穡后稷為主三曰農農田畯也鄭衆曰田畯古之先教田者爾雅曰畯農夫也四曰郵表畷謂田畯於田表畔相連之所造田舎焉為郵亭屋宇督約百姓之處五曰貓虎所以迎貓為食田䑕也迎虎為食田豕也䑕豕能為田害故迎貓虎之神而祭焉六曰防防所蓄水亦以障水七曰水墉水墉溝也一云以池所以受水亦以洩水八曰昆蟲昆蟲暑生寒死螟螽之屬能為穀害索鬼神而致百物用六奏之樂大司樂云一變而致羽物及川澤之祇再變而致羸物及山林之祇三變而致鱗物及丘陵之祇四變而致毛物及墳衍之祇五變而致介物及土祇六變而致象物及天神云䄍則禴􅃎頌擊土鼓秦初因曰臘後復曰嘉平臘者獵也曰臘取禽獸以祭先祖也又曰臘索羣小神而祭之或云臘接也新故交接狎臘大祭而報功也蔡邕獨斷曰臘者嵗終大祭縱鼓非迎氣故但送而不迎漢因復曰臘或曰臘之名始自漢氏按左氏傳虞不臘矣是已有臘始漢之說非也季冬之月星廻嵗終隂陽以交勞農大享臘言祭宗廟旁祭五祀蓋同一日自此而始非舊典也魏因之髙堂隆議臘用日云王者各以其行之盛而䄍以其終而臘水始於申盛於子終於辰故水行之君以子䄍以辰臘火始於寅盛於午終於戍故火行之君以午䄍以戍臘木始於亥盛於夘終於未故木行之君以夘䄍以未臘金始於巳盛於酉終於丑故金行之君以酉䄍以丑臘土始於未盛於戍終於辰故土行之君以戍䄍以辰臘今魏土德而王宜以戍䄍辰臘宋因以水德王䄍以子臘以辰後周以十月祭神農伊耆以下至毛介等神於五郊五方天地星宿四靈五帝五官嶽鎮下至原隰各分其方合祭之上帝地祇神農伊耆人帝於壇上南郊則以神農既䄍無其祀三辰七宿則為小壇於其側自嶽鎮以下則各為坎餘於平地隋初因以孟冬丁亥䄍百神開皇四年詔曰考之前代於義有違其十月行䄍者停可以十二月為臘於是始革前制唐貞觀十一年房𤣥齡等議曰按月令䄍法唯祭天宗近代䄍五天帝五人帝五地極皆非古典今並除之季冬寅日䄍祭百神於南郊大明用犢二籩豆各四簠簋㽅爼各一神農及伊耆氏各用少牢一籩豆等與大明祠后稷及五方十二次五官五方田畯五嶽四鎮四海四瀆以下方别各用少牢心其日祭井泉於川澤之下用羊一卯日祭社稷於社宫二十八宿五方之山林川澤丘陵墳衍原隰鱗羽羸毛介水墉坊郵表畷貓虎及龍鱗朱鳥白獸𤣥武方别各用少牢一每座籩各二簠簋㽅爼各一䄍祭凡百八十七座當方年穀不登則闕其祀䄍之明日又祭社稷於社宫如春秋二神之禮神農伊耆氏以著樽皆二實盎齊田畯以壺樽實沈齊水墉坊郵表畷貓虎昆蟲以散尊實清酒皆二立冬蜡祭百神髙尺廣尺蜡壇也開元中制儀季冬臘曰蜡百神於南郊之壇若其方不登則闕之其儀具開元禮宋建隆元年三月有司上言國家受周禪周木德也木生火宜以火德王色尚赤請以戍日為臘從之四年六月和峴上言伏凖去嵗十二月十四日臘以前十日辛卯蜡百神按蜡始於伊耆氏夏曰嘉平商曰清周曰蜡漢曰臘是知蜡者臘之别名漢以火行戍日為臘臘者接也新故相接田獵禽獸以享百神報成之功也王者因行臘蜡上享祖廟旁及五祀展其孝心盡物示恭也魏晉以降沿襲為常至唐實乗土德貞觀之際尚以前寅蜡百神卯祭社宫辰日臘宗廟開元定禮三祭皆以辰臘以應土德也當時議者以為得宜聖朝火德宜以戍日為臘而以前七日辛夘便行蜡禮恐未合宜况今宗廟社稷並遵臘享而獨蜡不以臘於理不通事下太常議曰按開元禮云臘日蜡祭請如峴議今後䄍百神祀社稷享宗廟皆用戍臘一日從之天聖三年十一月同知禮院陳詁言每年季冬蜡百神於南郊祠壇五方田畯郵表畷之位各於其方元豐六年正月詳定郊廟奉祀禮文所言歴代䄍祭獨在南郊為一壇惟周隋四郊之兆乃合禮意又禮記月令以蜡與息民為二祭故隋唐息民祭在蜡之後日請蜡祭四郊各為一壇以祀其方之神前期司農關有不順成之方更不修報其息民祭在蜡祭之后從之並會要雜記曰子貢觀于蜡孔子曰賜也樂乎對曰一國之人皆若狂賜未知其樂也孔子曰百日之蜡一日之澤非爾所知也禮書曰蜡之為祭所以報本反始息老送終也其服王元冕而有司皮弁其牲體疈辜其樂六樂而奏六變次豳頌擊土鼓舞兵舞帗舞其所致者川澤山林以至土祇天神莫不與焉則合聚萬物而享之者非特八神也而所重者八以其尤有功於田故也禮書曰古者蜡則飲於學黨正屬民飲酒於序是也既蜡則臘先祖五祀於廟仲尼與於蜡賔事畢出遊於觀之上是也然則臘亦謂之蜡矣禮書曰先儒言郊特牲言皮弁素服而祭又言黄衣黄冠而祭則二祭之服不同月令言祈來年於天宗割祠於公社又言臘先祖五祀則蜡臘之名不同於是謂皮弁素服而祭與祈來年於天宗蜡也黄衣黄冠而祭與臘先祖五祀臘也蜡以息老物臘以息民息民固在蜡後矣此記所以言既䄍而收民息已也禮書曰蜡及天宗則日月星辰之類而已後周兼天帝而祭之非也蜡因其順成之方以報神因其州之序以樂民則唐一於南郊亦非也蘇子曰蜡者古今之戱禮也殊不知存其禮所以勸農而使之樂事就功也是以因俚俗凡鄙之所為而勸農以興嗣嵗祈豐年而飬君子於安逸飽適之地故詩風雅頌篇凡言稼穡耕耘之事而詩人之終篇必言農夫所與修祭祀興飲食而相與歡樂之意者􅃎詩七月信南山甫田大田與夫頌之歌豐年歌載芟良耜可考也社稷社所以祭五土之示稷所以祭五穀之神稷非土無以生土非稷無以見生生之效故祭社必及稷以其同功均利以養人故也禮書祭法曰王為羣姓立社曰大社王自立社曰王社諸侯為百姓立社曰國社諸侯自立社曰侯社大夫以下成羣立社曰置社大夫不得特立社百姓以上則共立一社社之名不同如此又有所謂亳社小司㓂所謂勝國之社稷是也共工氏之伯九州其子曰勾龍能平九州故祀之以配社厲山氏之有天下其子曰農能植百穀故祀之以配稷商之時又易之以周棄鄭康成曰社為五土總神稷為原隰之神勾龍有平水土之功配社祀之稷有播種之功配稷祀之也禮書曰王與諸侯之祀皆三其二社所以盡祈報之誠其勝國之社所以示鑒戒之理王之大社則土五色而冐以黄夏之時徐州厥貢惟土五色孔安國以社言之是也諸侯之國則受其方土之色於天子而苴以茅漢之時有受青土赤土蔡邕以茅社言之是也其位則中門之右社主隂故也其壝則北向社面隂故也其制則不屋記所謂大社必受霜露風雨以逹天地之氣是也其表則木所謂夏后以松殷人以栢周人以栗是也其方則廣五丈此見韓詩外傳其主則石為之先儒謂石地類也左傳言擁社抱社主是也其列則社東而稷西禮書先王之祭社稷春有祈秋有報孟冬大割祠月令大割祠於公社春祈歌載芟秋報歌良耜此祭之常也凡天地大烖之類祭小宗伯大故天烖之彌祀太祝君行有宜宫成有衈此祭之不常者也祭之常者用甲其地則惟吉而已祭之牲以太牢其遇天灾則用幣而已考之於禮禮神之玉蓋用兩珪有邸其牲王制云天子祭社稷皆太牢諸侯祭社稷皆少牢皆黝色用黑幣日用甲祭日之晨王及尸皆服絺冕樂則大司農云奏太簇歌應鍾舞咸池以祭地祇用三獻其禮取血先瘞於所祭之處以為祭始次則禮神以玉時尸前薦爛肉及脯醢籩豆王則酌大罍中酒以獻尸所謂朝踐之獻是為一獻也至薦熟時宗伯亦攝后酌以亞獻所謂再獻尸食訖賔長酌酳尸謂之三獻天子大社必受霜露風雨以逹天地之氣故喪國之社屋之不受天陽也亳社北牖使隂明也亳社有所祈求禱祠則祭之以刑官為之尸喪祝掌其祀漢髙帝初起禱豐枌榆社二年東擊項籍還入關因命縣為公社後四年天下定詔御史令豐謹理枌榆社其後又令縣常以春三月及臘祠后稷以羊彘人里各自裁以祠平帝時王莾奏帝王建立社稷百王不易漢興禮儀稍定已有官社以后稷食官稷稷種穀樹徐州牧嵗貢五色土一㪷後漢光武建武二年立社稷於洛陽在宗廟之右皆方壇無屋有墻門而已二月八月及臘一嵗三祠皆太牢具使有司祠郡縣皆置太守令長侍祠牲用羊豕唯州所理有社無稷以其使官也東漢志曰古者師行有載社主不載稷也魏自漢後但大社有稷官社無稷故常二社一稷也至明帝景初中立帝社明帝祭社但稱皇帝晉武帝太康九年詔曰社實一神其并社之祀東晉元帝建武元年又依洛京二社一稷宋仍晉舊無所改作齊武帝永明十一年修儀其神一位北向稷東向齋宫社壇東北南面立以西為上諸執事西向立以南為上稷名大稷梁社稷在太廟西天監四年以太常省牲太常牽牲太祝令賛牲至大同初又加官稷并前為五壇陳依梁而帝社以三牲首餘以骨體薦粢盛為六飯粳以稻以牟黄梁以簠白梁以簋黍以瑚粢以璉後魏天興二年置大社大稷帝社於宗廟之右為方壇四陛以二月八月日用戊皆太牢勾龍配社周棄配稷皆有司侍祠北齊立太社帝社太稷三壇於國右每仲春仲秋元辰及臘各以一太牢祭焉皇帝親祭則司農卿省牲進熟司空亞獻司農終獻後周立社稷於左帝親祠則冡宰亞獻宗伯終獻隋文帝開皇初建社稷並列於含光門内之右仲春仲秋吉戊各以一太牢祭牲色用黒孟冬丁亥又臘祭之郡縣二仲月並以少牢各祭百姓亦各為社唐社稷亦於含光門内之右仲春仲秋二時戊日祭太社太稷社以勾龍配稷以后土配武后神龍元年詔於東都建太社社主用石長一尺六寸方一尺七寸禮官愽士議社主長短在禮無文按韓詩外傳天子太社方五丈蓋以土是五數其社主請凖五數長五尺准隂之二數方二尺剡其上以象物方其下以象地體埋其半以根在土中而本末均也又檢舊社稷壇上四方布以方色惟中央覆以黄土又天寶三載詔社稷列為中禮頗紊大猷自今後社稷列為大祀大厯六年勅中祀並用少牢貞元五年後依正禮用太牢詔從之宋朝景祐四年詔太常檢討云按五禮精義州縣春秋二仲月上丁釋奠文宣王刺史縣令初獻上佐縣丞亞獻州博士縣簿尉終獻如有故以次官攝祭社稷與釋奠同請詔天下並用此禮從之祥符二年禮院請正配座每座樽各二籩豆各八簠簋各二爼二從祀籩豆各二簠簋爼各一從之又獻官作小祠例止以公服行事天聖十年禮院言按唐郊祀録太社壇廣五丈髙五尺五色土為之稷壇在西如社之制社壇以石為之主形如鐘長五尺方二尺剡其上培其下以其社稷四面宫垣餙以方色面各一屋三門每門二十㦸四隅皆連餙罘罳如廟之制詔依舊制修築仍遣官祭之朝日夕月周禮大宗伯實柴以祀日月星辰典瑞圭璧以祀日月星辰古之祀日月其祀有六郊特牲曰郊之祭大報天而主日配以月一也玉藻曰朝日於東門之外祭義曰祭日於東祭月於西二也小宗伯四類於四郊鄭注云兆日於東郊兆月於西郊三也月令孟春祈來年於天宗天宗日月之類四也覲禮拜日於東門之外反祀方明禮日於南門之外禮月於北門之外五也霜雪風雨之不時於是乎禜之六也夫因郊社而祀之非正祀也類禜而祀之與覲諸侯而禮之非常祀也春分朝之於東門之外秋分夕之於西門之外此祀之正為常者也日言朝則於日出之朝朝之也月言夕則於月出之夕夕之也日壇謂之王宫以其有君道故也月壇謂之夜明以其昭於夜故也其次則大次小次設重帟重案其牲體則實柴其服則元冕元瑞其圭之繅藉則大采少采禮之玉則一圭邸璧祀之之樂則奏黄鐘歌大吕舞雲門周禮於掌次之帟案於典瑞之大圭鎮圭繅藉言朝日而已則夕月之禮又殺乎此也漢武帝因郊泰畤朝出竹宫東向揖日其夕西向揖月則失東西郊之禮也魏文帝正月祀日於東門之外則失春分之禮也春分陽氣方永秋分隂氣向長天地至尊故用其始而祭以二至日月次天地故祭以二分禮書魏文帝詔曰天子拜日東門之外禮方明也而漢儀煩䙝似家人之事非尊天之道明帝太和二年二月丁亥朔朝日於東郊八月己丑夕月於西郊始得古禮唐二分朝日夕月於國城東西宋朝天禧元年四月監察御史王博文言近充監祭使祀夕月其日辰時行事至巳前禮畢伏以祀稱夕月壇號夜明既屬隂靈翻居晝祭恐未合宜事下太常禮院既而上言准禮秋分夕月於西郊國語大采朝日少采夕月又曰春朝朝日秋夕夕月栁宗元論云夕之名者朝拜之偶也古者旦見曰朝暮見曰夕故詩云邦君諸侯莫肯朝夕傳曰百官承事朝而不夕按禮文秋分八月蓋其時晝夜平分太陽當午而隂魄已生遂行夕拜之祭以祀日未前一刻太宰令率宰人以鸞刀割牲未後三刻行禮唐劉禹錫仕御史監祀夕月壇有詩備記其事注云其禮用晝蓋是古禮以夕行朝祭之禮又按禮云從子至巳為陽從午至亥為隂參詳典禮合於未後三刻行禮從之四望書曰望於山川又柴望大告武成周禮小宗伯祀四望四類左氏曰望郊之細也楚昭王曰三代命祀祭不越望江漢睢漳楚之望也哀公六年陳禮書曰天子四望逹於四方魯三望泰山河海而已諸侯之望皆其境内之名山大川也望難以名山大川為主而其實兼上下之神故詩於柴望言懷柔百神及河喬岳周禮於望皆言祀而不言祭天言祀地言祭人言享又典瑞四望與山川異玉大司樂四望與山川異樂公羊曰方望之事無所不通則望兼上下神可知矣鄭司農釋大宗伯曰四望日月星海杜預釋左氏傳曰望祀分野之星及封内山川許謹曰望日月星辰河海大山其說蓋有所受之也鄭康成釋大宗伯曰四望五岳四瀆釋大司樂又兼之以司中司命風伯雨師釋舞師又以四望為四方其言異望之禮有二而其用不一男巫掌望祀望衍鄭氏讀衍為延謂望祀有牲與粢盛望衍用幣致神而已望祀或設於郊天之後或設於廵狩之分或旅於大故之時則望有常有不常之祀也望祀其兆四方其牲各放其方之色其樂姑洗南吕大磬其玉兩圭有邸其服毳冕其位茒以辨之而植表於其中周禮所謂旁招以茒晉語所謂置茒蕝設表望是也並陳禮書四方禮書曰周禮大司馬春祭社秋祭祊舞師教羽舞帥而舞四方之祭祀詩曰以我犧羊以社以方又曰方社不莫古者言社必及方則社為民祈方為民報祈在春報在秋詩言來方禋祀明堂言春社秋省則秋省歛而因祀焉此所謂來方禋祀也鄭康成釋曲禮謂四方五官之神東勾芒西蓐收南祝融與黎北𤣥𡨕釋舞師謂四方四望是也康成從先鄭之說釋大宗伯謂四方百物八蜡也然鬯人凡四方在山川之下大司樂曰望在山川之上則四方非四望也舞師教羽舞帥而舞四方之祭祀鼓人凡祭祀百物之神鼓兵帗舞則四方非百物也祀之禮則其位四郊其鬯蜃尊鬯人凡山川四方此蜃其舞皇舞舞師教皇舞帥而舞四方祭祀其牲體則疈之其牲色則各以其方之色而已詩曰以我犧羊以社以方周禮小司徒小祭祀奉牛牲則四方之祭不特用羊而已羣書考索卷三十四
