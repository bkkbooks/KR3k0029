body:
  text: 羣書考索别集卷九宋章如愚撰經籍門周禮學詩學禮之説學詩則心氣平而事理明學禮則徳性成而分守定則本末兼舉無所遺矣語或問正心誠意之學竊見周禮天官冢宰一篇乃周公輔導成王垂法後世用意最深切處欲知三代人主正心誠意之學於此考之可見其實孝宗朝戊申封事周家之制度周禮一書好㸔廣大精宻周家法度在裏但未敢令初學㸔李方子多説事之綱目周禮中多有説事之綱目者如属民讀法其法不可知司馬之職乃陳車徒如戰之陳其法亦不可見矣文公語録宰相所行之事理㑹周禮非位至宰相不能行其事自一介論之更自逺在且要就切實理㑹受用處若做到宰相亦湏上遇文武之君始可以得行其志同前大體非聖人不能為後人皆以周禮非聖人書其間細碎處雖可疑其大體直是非聖人做不得同上冢宰之職為至繁天官之職是總五官者若其心不大如何包得許多事且冢宰内自王之飲食衣服外至五官庶事自大至小自本至末千頭萬緒若不是大其心者區處應副事到前便且區處不下况於先事措置思患預防是着多少精神所以記得此復忘彼同上冢宰領王之服御冢宰一官兼領王之膳服嬪御此最是設官者之深意盖天下之事無重於此同上太宰總六典之職方其在六典也五官與太宰各司其一太宰所掌特専於治典而已及其佐王論道則五官總曰教曰禮曰政曰刑曰事雖各列其目而統於太宰則皆謂之治故曰佐王治邦國所以見當時治本之悉出於一者如此山齋太宰道揆非有司之職六典八法八則之書太宰既建之矣而太史又建之以逆邦國官府都鄙之治者盖建者作而立之也太宰以道揆者也太史以法守者也以道揆則所謂建者法之所自出也以法守則所謂建者書之所自成也史以掌官書為事太史所謂建則特作而立其書焉以道制法有不與焉也邦國官府都鄙之治其所逆者非一也所治在太史則太史之所逆也所治在司㑹則司㑹之所逆也所治在小宰則小宰之所逆也非太史司㑹小宰所逆然後太宰以典法則待之太宰道揆與内史不同夫上下之分有道揆有法守太宰以八柄詔王馭羣臣者明道揆於上而所掌者非特法而已内史掌王八枋之法以詔王治者謹法守於上而道揆所不與也謂之八枋之法則其所掌者法而已太宰言詔王馭羣臣則疾徐進止制於上而太宰有同於君道故也内史言詔王治而不言羣臣則以内史者有司之事而治則在王於馭羣臣非所宜也古人任相之意至後世而輕夫周以小宰二冢宰而漢人以御史下丞相周以邦治為冢宰而東漢以政權歸臺閤周以冢宰制百官而唐以諌垣為紏宰相下吏輕上爵卑職侮尊位豈惟政治有所不行而其漸豈可長耶精華古人任相之専古人之任相待之以誠而不疑畀之以權而不忌求之周官冢宰之職則可見矣凡作大事則百官皆禀命於冢宰而王眡治朝與夫眡四方之聼朝則冢宰必從而賛治焉若邦之小治與四方賓客之小治則冢宰得専聽之至於羣吏嵗終之廢置三嵗之誅賞皆冢宰視百官之功過以詔王為之而天子好惡之私不與也故觀内府之職曰凡王及冢宰之好賜予而共之司㑹之職曰周知四國之治以詔王及冢宰廢置夫賜予廢置皆王之職也冢宰皆得並言之亦足見古人任相之専若此後世申屠嘉詰責鄧通而文帝不加怒是嬖倖之不法宰相得以専誅姚崇叙進郎吏而明皇不應是郎吏之秩卑宰相得以専授此正得古人待相之體自武帝與田蚡争除吏之後而宰相唯唯憂死不給德宗以猜忌而貶陸贄而刺史縣令以上悉自選擇中書行文書而已豈識周官冢宰廢置誅賞之意劉屏山内庭之職𨽻太宰所以格君心人徒見内外庭宿衛之士士之賤者也烹庖饔膳之事事之辱者也魚腊酒醤醯醢之物物之㣲者也次舍幄帟裘服為末用而宦寺嬪御洒掃使令為冗役也不知夫三代以還所以蠱壊人主之心術而侵奪大臣之權柄者徃徃皆是人為之盖公卿大臣其内外則有限其進退則有時不得日侍人主之左右前後也若夫侍御僕從之人備趍走使令之職而人主宴私玩狎之際無不與之同焉比其極也則變換其耳目感移其心志伺候以和其㫖夸靡以中其欲小㢘小謹以示其信人主一墮其中則亦何所不至哉周公深智逺慮有見於此是以亂萌禍機之所至無不䆒極以見古人輔相之事業皆格物窮理之學也東萊太宰兼六卿之職成周之制三百六十属聼命於六卿聼命於冢宰冢宰實三公兼之渙散分職之中而有比附聮属之勢自今職職而攷之太史内史掌六典八法八則八柄之貳春官之属也而典法之政則在於太宰太僕掌諸侯之復逆小臣掌三公孤卿之復逆御僕掌羣吏之逆及庶民之復夏官之属也而臣民之總則掌於宰夫司士掌朝儀之位夏官之属也而治朝之位宰夫掌之泉府廪人倉人掌財用地官之属也貨賄之出入太府掌之内外朝之冗食地官犒人之職也而宮正内宰則又均其稍食王朝之服飾春官司服之職也而内司服至履人則又掌其服飾之用自宰夫之下夏采之上六十官之内三百六十官之職錯綜而互見焉並建六典並行六卿天下萬事皆有闗於理亂安危之大者則無不翕然在其掌握中也盖古者三公無官惟與天子坐而論道故設六卿以分主六典而三公實統之三公既兼冢宰則六卿之大典非冢宰而誰建耶此事權之所以合於一而周家所以無多門之政同上三公兼官自唐虞以來禹以司空而兼百揆羲和以二子而兼四岳及舜二十二人之治則四岳實一人兼之古者官不必備惟其人而已有其人則備無其人則兼是以周官之作實倣唐虞之制而官事不攝吾夫子所以深責管仲變先王之法也以三公言之召公為保周公為師而太傅無有焉二公實兼之也周公既没召公為保而太師太傅無有焉召公實兼之也不惟此也三公之下實有三少當時不見其人召公又兼盖一人之身而兼七職矣其大者猶兼而况於百官羣有司乎故甞以周禮攷之二卿則公一人是三公兼卿老也一卿則卿一人是六卿兼卿大夫也軍將有命卿是六卿兼六軍也其若太公以太師而兼司盟之職載在盟府太師職之是也蘇公以三公而兼太史之職太史司冦蘇公是也同上六卿分職每終之以為民極先王之教天下未始有精粗本末之間也夫朝不混市野不踰國人不侵官后不敢以奸王之權諸侯不敢以僣天子之制公卿大夫不牟啇賈之利六卿九牧相属而聼命於三公夫彼皆民上也皆富且貴正與者也而尺寸不敢踰一毫分寸不敢易所以習民於尊卑等殺階級之中消其富上亡等之心而寓其道德之意是以民服事其上而下無覬覦賤不亢貴卑不踰尊舉一世之人皆安於法度分守之内志慮不易視聼純一易直淳龐而從上之令父詔其子兄授其弟各率其属何往而非五禮五樂三物十二教哉方位國野設官分職何往而非以為民極哉甞讀晋之國語每嘆絳之富啇韋藩木二過朝之事以為富商之饒於財使其繹其車而華其服非不足也而必易車服於過朝之際不敢混然與士大夫無别焉民志之定而中道之存成王周公之遺化固隠然在此也東萊法度之意必有關雎麟趾之意然後可以行周官之法度明道外書周禮是非古之言周禮者如漢武何休皆深擯之如劉歆鄭康成皆深取之擯之則以為末世紛亂之典六國隂謀之説取之則以為成王周公致太平之迹一是一非如此後世何所從乎周官書列於經㡬千百年矣戾於經而列於經此子所以不得不辯其非所以明其是也予豈得已哉賈氏曰六經禍於秦惟周禮最後出也以始皇特惡之故禁絶加嚴也此理不然北宮錡問周室班爵禄之制孟子謂諸侯惡其害已而皆去其籍可聞其略而不可聞其詳方戰國時周室猶存諸侯強大不禀周制故已滅去其籍也是周公所制之典夫子所正之經已不𫝊於世也故雖孟子愽學大儒不得聞其詳何待秦之禍而後亡始皇禁絶之嚴故後出乎豈有時有周禮而孟子不見之乎孟子且不見周禮漢世焉得而有之有之則非周公之舊後儒為之章章矣然秦漢去周未逺使其洪儒碩學請聞周禮之舊作為一書使後知所本又何幸耶故雖非周公之親筆謂之周禮亦可也今乃不然所載之典大抵以衰世之制為盛時之典其背理傷教甚衆以理度之特出於漢儒之才髙而不深於道者歟所以不能使人盡信也夫成周之制語其最大者莫若建都也又莫若封國也又莫若設官也今其言皆與他經不合言建都之制則戾書洛誥召誥之㫖言封國之制則戾書武成與孟子之説言設官之制則戾書周官之六典此其事之最大理之最明而皆與古書戾則其小者可知矣頥齋周禮建都周人求地中以建國畿方千里故鄭氏曰周公居洛營邑於土中七年使成王居洛邑其説信矣然犬戎作難平王始遷居洛邑盖前此未以為都故也然則謂成王居之何哉若但測景求地中而不居則謂之王畿王國寧有是理乎大司徒以土圭之法測土深正日景以求地中由是建王國制其畿方千里土圭之法不見於他經惟見於周禮大司徒及典瑞玉人之官以是測日景長短求與土圭等盖謂周公營洛邑之事鄭氏謂周公居洛營邑於土中七年使成王居洛邑夫周公營洛邑未甞與成王居之至犬戎之難西周已䘮平王始遷居焉今指洛邑謂之王國王畿即謂成王居之豈不戾乎若但測景求地中而不居則不得謂之王畿王國也此其説失之明矣且王者之居必求地中何耶古之聖人定都建國特取其便於時爾堯都平陽舜都安邑文王居豐武王居鎬何必其地之中耶賈氏以五帝以降惟湯居亳得地中堯舜雖不得地中而政令均天下治者以並在五岳之内周之岐鎬處五岳之外故周公東居洛邑此因鄭氏而愈失之也堯舜文武之治若不施仁政於民則居地中何益徒居地中與五岳之内即能令政教均天下治者陋儒之見也且先儒謂今頴川陽城為地中故置中表若然周公何不即都陽城乃營洛邑乎洛邑去陽城亦逺矣既求地中而不以為都何耶又曰日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂説者謂凡日景於地千里而差一寸南表千里景短一寸北表千里景長一寸有是理乎若千里即差一寸萬里乃差一尺也此已不可况謂東表去中表千里晝漏半中表景得正時東表日已跌矣是地於日為近東故得夕景西表去中千里晝漏半中表景得正時西表日未中是地於日為近西仍得朝時之景此甚不可也日月麗天萬里同晷纔去千里之間地中得正時在東之景已夕在西之景方朝若然是夏日之至晝漏方半東去地中千里之人以西方之朝為夕西去地中千里之人以東方之夕為朝使相去數千里之外則當以晝為夜以夜為晝矣雖蠻夷之地窮日際月窟之所居亦不至是昔堯命羲和宅嵎夷命羲叔宅南郊命和仲宅昧谷命和叔宅幽都皆以觀日景之出入短長隂陽氣候之偏正未甞聞四方日景之異如此又曰天地之所合也四時之所交也風雨之所㑹也隂陽之所和也夫謂之中國居天地之中者以外有東夷南蠻西戎北狄之為中也其蠻夷之地或相倍蓰或相什百在四夷之域廣輪自不同中國之内但指一洛正為天地之所合四時之所交其果乎故營王邑者欲居天下之中使四方道理均此則可矣而謂天地必合於此四時必交於此恐無是理也况於風雨之㑹隂陽之和夫亦在人君徳政應天心如何耳但居洛邑以求風雨之㑹隂陽之和空言也此無他盖見書召誥有王來紹上帝自服於土中之言故作周禮者行其説也不知書所謂土中者但謂道理均耳使周公必以土圭測景求地中則書載營邑之事詳矣豈得不言今觀洛誥之書特云卜澗水東卜瀍水西何甞如大司徒及諸儒之説學者茍知成王未甞營居洛邑之説自可知其非也玉川經説封國之制大國不過百里次七十里次五十里周制然也今攷周官建國之法則以公五百里侯四百里伯三百里子二百里男百里與當時之制似若相戾何也周禮封國之制先儒固有能言其非者俗學又為之委曲求通以誤後世亦不能無辨焉夫子以大國為千乘之國又曰安見方六七十而非邦也者至孟子荅北宮錡及慎子之言與武成列爵分土之制無少差異則大國不過百里次七十里次五十里周法固然也又曰今滕絶長補短将五十里也則孔孟非特聞武王周公之制盖親見當時之諸侯則然漢儒作王制亦同獨為周官書者以公五百里侯四百里伯三百里子二百里男百里與書論語孟子禮記之言並戾無疑其為非也陋儒鄭氏釋王制乃曰武王初定天下更以五等之爵増以子男而猶因殷之地以九州之界尚狭也周公致太平斥九州之界封有功諸侯大者五百里最小者百里盖據大司徒之文夫堯舜夏商周之地不過九州攷周職方掌天下之圗無以過於禹貢之域禹之疆域東漸於海西被於流沙朔南暨聲教夫既已窮於海至於流沙将何所斥廣哉借能斥大邊境取夷狄之地亦不可増封於内此甚不然也或曰諸侯之地當如孟子之言至開方之則如司徒所記故其言封疆皆言方者開方之法也王制云方千里者為方百里者百若據實千里而言則不得有方百里者百亦開方法也此百里之國開方得百里之國者四公當為四百里此言五百里者錫之以附庸故也伯七十里開方得七十里之國者四則為二百八十里舉成數可為三百里子五十里開方得五十里之國者四故為二百據此説亦非也以公侯之地開方之已不得五百里之數又益之以附庸若公侯有附庸則自伯而下亦當有附庸合於公侯則又不合於伯子矣况子男同五十里今以子五十里開方得二百里而男開方之止於百里何哉説者又強通以為男實有二十五里何所據而云然王制有曰古者以周尺八尺為歩今以周尺六尺四寸為歩古者百里當今百二十一里六十歩四尺二寸三分然則孟子周官里數之不同而尺之有短長耶夫借謂尺有短長其百里當後之百二十一里有竒周官但當云諸公之地封疆方百二十里何至相去數倍遼逺之甚乎是又不可也不知為此異説者盖漢儒見周之衰諸侯相侵吞滅小國開疆拓地至於數百里之廣乃以為周制耳子産曰古者列國一同今大國數圻若無侵小何以至焉孟子曰周公之封於魯為方百里今魯方百里者五又曰今海内之地方千里者九齊集有其一觀此則春秋之大國非復一同也戰國時魯乃五百里齊乃千里此作周官書故以為據也又職方氏曰千里封公方五百里則四公方四百里則六侯方三百里則七伯方二百里則二十五子方百里則百男皆非古之制不可信也故曰舉衰世之典而為盛時之制此類是也艮齋文設官分職唐虞之世事簡而建官少周之世事煩而建官多夏商不過倍唐虞之制周人亦不過倍夏商之制而已今觀其職掌之分乃與夏商之制萬萬不侔者何哉敢詳言之周禮事之最大者莫如建都封國之制予既辨其非古矣然未為甚也至其言設官則甚矣據書周官稱唐虞官百夏商倍之繼之曰仰惟前代時若訓廸厥官立太師太傅太保兹惟三公少師少傅少保曰三孤而後及於六卿周之官制可據惟此成王仰惟前代則大率依唐虞夏商之制耳今觀周禮乃無三孤三公之官不誌其大而誌其小於理安乎為之説者乃曰三公之尊坐而論道故不列於官謬説也成王言六卿所治之職何甞以配天地四時今以冢宰曰天官而天事反在春官乃曰天取兼總人天之至尊惟萬乘可稱曰天王曰天子豈人臣而得稱天乎司徒謂之地官尤無義古者司徒掌教教以人倫今乃掌土地之事乃是司空掌土地非司徒掌教也宗伯掌禮謂之春官春者物之生五行以象仁今謂之禮豈能主教也哉司馬掌兵而謂之夏官夏方物之盛反用兵乎惟司冦掌刑謂之秋官猶可矣司空掌土謂之冬官又無理也使成王有取於天地四時則書言之矣書既不言所取又無義則漢儒臆説可知也又小宰謂天官以下其属各六十計為三百六十官説者謂象日月星辰之度今觀自太宰至屨人官凡六十有三自大司徒至犒人官凡七十有九自太宗伯至宗人官凡七十有一自大司馬至家司馬官凡七十自大司冦至家士官凡六十有六計五官之属已有三百五十有二而冬官尚不與小宰之言自戾矣且其趨走之吏僕𨽻之職皆列於官内小臣内竪男巫女巫之類何為者耶甚者國氏去鼃黽壷涿氏除水蠱􅍈氏攻草木而方相氏蒙熊皮黄金四目為一官乎瀆亂不經甚矣然此雖不可猶可強道也若乃鄉官之制五家為比有下士為比長五比為閭有中士為閭胥四閭為族有上士為族師五族為黨有下大夫為黨正五黨為州有中大夫為州長五州為鄉有卿一人謂之鄉大夫六鄉之民不過七萬五千家耳今每鄉卿一人中大夫五人下大夫二十五人上士一百二十五人中士五百人下士二千五百人一鄉之中自卿至下士凡三千一百五十六官合六卿計之則有萬八千九百三十六官不知七萬五千之家何以供之雖盡土之所産賦之所入不足以給之至遂人言六遂之制又云五家為隣有隣長推而上之為理為鄼為都為縣為遂為異於鄉之制併六家計之亦萬八千九百三十六官六遂又能供之耶合鄉遂之數則為三萬六千八百七十二官據孟子王制諸侯之下士比上農夫食九人使六鄉六遂之官皆食諸侯下士之禄則三萬七千八百七十二官盖食三十萬有餘人鄉遂之中耕者凡㡬萬人乃食三萬不耕之人乎况又不止皆食諸侯下士之禄况又鄉遂之外他官至衆内而三公三孤之属外而諸侯之臣又不知其㡬借謂堯舜之世事簡而建官少周之世事煩而建官多夏商不過倍唐虞之制周人亦不過倍夏商之制何得與夏商相去乃數萬倍耶盖彼但見成周建官之多而不計其數乃至於此其誕謾至此世儒乃酷信之不亦傷乎王氏曰王畿受天下財賦不當以財不足禄為疑不知官冗至此禄之當以何術世之陋學随人東西未有如漢鄭氏近世王氏也作周禮者正以欺若人耳王后不㑹周禮凡用皆㑹唯王及后則不㑹然則費用亡度未免有耗蠧之漸寕可不之慮乎先生曰周官九式之職冢宰任之王恣其費用有司雖不㑹冢宰得以九式論於王矣故王后不㑹非蕩然無以禁止之也制之有冢宰之義而非以有司之法故也龜山禮有屈伸禮有屈伸分所當然爾故三公北靣執璧所以示屈禮以尊君也然不知孤卿大夫反以東靣西靣何哉后致飲則醫酏糟亦所以示屈禮於賓客也然不知夫人致飲又反得用清醴何哉學者觀禮當辨此説先儒言禮有所謂位尊而禮屈位卑而禮伸者盖起於周官書射人掌國之三公孤卿大夫之位三公北靣孤東靣卿大夫西靣其摯三公執璧孤皮帛卿執羔大夫執雁説者曰三公臣之職尊者也故特屈使北靣荅君璧子男所執三公執璧服毛冕屈使與子男同也其在酒正王后致飲於賓客之禮則醫酏糟在漿人共夫人致飲於賓客之禮則清醴醫酏糟説者曰后致飲無禮醫酏不清者與王同醴屈也夫人不敵王故得備之也黄子曰非也先王制禮不如是之顛倒禮者何也正名分之謂也名分一正則尊者不得踰卑小者不得加大賤者不得妨貴是以上下無争國家可長保也名分一紊則卑踰尊小加大賤妨貴覬心一生則亂亡隨之也三公之尊坐而論道為孤卿大夫百僚之率其宮室車旂衣服之物莫之敢伉也今謂三公北靣以示屈孤東靣卿大夫西靣以示不屈而又執子男之璧服子男之冕於禮稱乎王后天下之母也尊與君同自夫人以下皆媵妾爾其禮儀制度自相懸絶今后致飲乃無清醴以示屈夫人致飲反有清醴以示不屈於禮又可乎以三公之尊為嫌而卿大夫之不屈反不以為嫌乎以后之敵體為嫌而卿大夫之不屈反不以為嫌乎若然則朝廷之上公卿大夫宫禁之内王后夫人名分俱不正矣不至於上下乖争禍亂随之者㡬希若虢公晋侯朝王王皆賜之玉五㲄馬三匹識者譏之曰名位不同禮亦異數公侯之禮尚不得而同况使尊者屈卑者伸乎先王制禮防閑萬世所以嚴小大尊卑之分至矣後世猶越等破制以相攘奪况自亂其名分乎此其誤説可知也而三禮義宗又曰三公服章有五欲見其屈斿得用八以明其伸伸者見其尊貴之理屈者明其為臣之義又三夫人服有二等廹於后則闕狄以放三公夫人以明其屈也不迫於后則服揄狄以劾侯伯夫人以明其伸也先王立禮固有定制豈有一三公之服有屈者又有伸者一夫人之服又有時而屈伸紛紛如此誰能辨之又因周禮而失之也嗚呼孰知其説之陋亦本於穀梁氏乎春秋隠公八年書曰公及莒人盟於浮來據經公及諸侯盟則書諸侯及大夫盟則書大夫之㣲者盟則書人此本無他説穀梁乃曰可言公及人不可言公及大夫豈謂大夫廹近於公盟公則嫌其伉㣲者位卑則不嫌其伉也此妄也公誠不可與大夫盟則春秋甞書公及齊大夫盟於蔇何耶穀梁為一字之巧説非矣後之言禮者乃推是而為禮之屈伸陋學相𫝊何時已乎汲齋内宰之職周人以辨宮九嬪九御之教責之内宰然乎否乎夫以宫禁之宻房帷之事非外官所治也女子未嫁教以婦言婦德婦容婦功者女師之事也今内宰二人下大夫也其属又有上士四人中士八人府史胥徒之衆而使之出入宫禁以隂禮教皇后及九嬪無是理况謂之婦職織紝組紃之事内宰其果能教之乎夫男女之别正家所先先王以宫掖使令掃除之事不可以無人於是不得已用奄官所以為之防未聞使外官治内事也后夫人以下欲無驕偽無嫉妬無䜛言無私謁在人君正身以率之耳不正身以率之而使内宰之徒教之非也舜以匹夫妻帝之二女使執婦道於虞氏曰嬪于虞盖以德化之矣文王能使太姒之有德亦身率之耳詩曰刑于寡妻至於兄弟以御於家邦皆非使人教之也在易之家人曰女正位乎内男女正天地之大義六二之爻辭曰无攸遂在中饋言婦人凡事無所専特主饋食於中爾今天官之属乃使九嬪世婦女御如女祝女人與焉春官之属乃使世婦世吏内宗外宗與焉在世婦則每宮卿二人是禁幃之内男女雜其職豈分别内外之理哉古者内外言不出入於梱今使宫嬪而属六卿使朝臣而化九嬪周公必不為是禮也又曰凡賓客之祼獻瑶爵皆賛説者謂王同姓及二王之後來朝覲為賓客者行祼禮時后則亞王禮賓王享燕之后則亞王獻賓瑶爵后所以亞王酧賓也此又不可方宗廟之事后助王祭禮也賓客何得特為王同姓二王後乎以在中饋位乎内之婦人使之外接賓客雜與有司行祼獻之禮則易家人之道不足為訓也釋者又引陽侯來朝於穆侯穆侯享陽侯夫人助君獻酧於賓陽侯見夫人色美遂殺穆侯而竊其夫人故大享廢夫人之禮誠如是説則周制禮未足以經國家其弊乃至於使其臣竊君之夫人豈防亂之禮意乎予謂君有賓客必無后夫人祼獻之禮使果有之則陽侯竊夫人之亂亦宜至於此矣盖此特漢儒以后夫人有助祭祼獻之禮而謂賓客亦然世人惑其説不見其禮行於世故為陽侯竊夫人而廢夫享之説也又曰凡建國佐后立市設其次置其序正其肆陳其貨賄出其度量諄制祭之以隂禮此又不可也婦人無外事何得以立市乎説者謂后職主隂王立朝后立市隂陽相成之義若然凡事之属於隂者皆后主之也祭天陽也祭地隂也祭日陽也祭月隂也祭祖陽也祭社隂也然則祭地祭社祭月等事何不歸之后乎吾聞神農氏教人日中為市者矣未聞后之立市也聞舜之廵狩同度量衡者矣未聞后之出其度量也王之事后不得與猶后之事王不得與也日昱乎晝月昱乎夜各無相侵而後得隂陽之義也是故牝雞之晨周王數其惡哲婦傾城詩人記其亂歴觀聖經之訓未有聼婦人與政者獨漢儒序詩以求賢審官知臣下之勤勞為后妃之事盖悖理亂常之謬説不可以訓也作周官書者之説與序讀内宰意所不可者三以隂禮教六官教九嬪以婦職教九御一也凡賓客之祼獻瑶爵二也凡建國佐后立市三也以為誠如此則隂陽非以相成乃以相侵為亂之本秦漢以來女禍相仍盖不知道者之説有以啟之也可不戒哉三物興賢大司徒以鄉三物教萬民而賓興之其一曰六德智仁聖義忠和二曰六行孝友睦婣任恤三曰六藝禮樂射御書數合是三物則十有八目其為選舉之法亦可謂詳矣然不知當時人才備此六德六行六藝者誰歟言取士者皆謂莫成周之盛盖取之於鄉素有以攷其德行道藝平日已書於族閭州黨及三年大比鄉老以禮賓之宜其所得必真賢實能也成周鄉舉里選之法固善矣然果若周禮所載否乎今讀大司徒以鄉三物教萬民而賓興之見其立制不中復名亡實乃知漢儒之臆説非成周之舊典也古之取士務求所長而不責其備或以德進或以言揚或以事舉求才而責其備雖聖人不能今司徒之三物一曰六德智仁聖義中和二曰六行孝友睦婣任恤三曰六藝禮樂射御書數合是三物以為十有八目今欲興一賢能必以六德六行六藝兼有是十有八者而後可則捨伊周孔顔無人也皐陶之陳九德自寛而栗至於強而義必有是德而後可用也然必日宣三德夙夜浚明有家日嚴祗敬六德亮采有邦盖可為卿大夫者不過日宣三德可為諸侯者不過祗敬六德未甞責人以九德之備若大司徒之十有八事亦不求人之備則亦當如皐陶謨有三德六德九德之辨今下並無其文是使人備是三物而後可乎且六行人可為也六德之中則有不可為者焉曰知曰義曰忠曰和猶可能也若聖與仁夫子以為豈敢三千之徒惟一顔子僅可言仁他人皆不可况其聖乎仁且聖人皆間出者也其誰敢當是名耶名為宣敬如必求聖者而充其選可易得耶抑不知大司徒果何人而能教人以仁聖仁聖亦可以教人乎至於六藝之中謂射御書數為藝則是矣而禮樂乃道之用德之大者亦謂之藝何哉孟子甞言禮樂矣曰仁之實事親義之實從兄禮則節文斯二者樂則樂斯二者則是禮樂者無他潤飾仁義而已夫子曰冉求之藝文之以禮樂可以為成人今以禮樂即為藝非聖人之所謂也又曰志於道據於德游於藝若禮樂但一藝可游而不可據雖無禮樂何害為成人乎以孔孟之言質大司徒之法相戾多矣故三物之制有不可者三責人以備一不可也求仁聖於賢能二不可也捨禮樂為六藝三不可也成王周公立一制必不有三不可焉可知漢儒之臆説也玉川属民讀法五經之文未甞有属民讀法事唯周禮何言之詳州長則一嵗属民讀法者凡三正月及嵗時祭祀是也黨正則一嵗属民讀法者六四時之孟月及春秋祭禜是也族師則一嵗属民讀法者十有四毎月之吉及春秋祭晡是也至閭師又曰無時凡春秋祭祀役政䘮紀衆庶既聚則皆讀法不知其㡬説者曰彌親民於教亦彌數郷大夫官五州去民逺故不讀法州長管五黨去民漸親故四讀法黨正去民彌親故七讀法族師又彌親故至十有四焉閭胥官卑於民至近讀法無有時若此然比長尤親民者又何以不属民讀法乎夫四閭為族族之民即閭之民也五族為黨黨之民即族之民也五黨為州州之民即黨之民也今則黨族閭讀法多同其日民既讀法於州安得又至於族將誰適從乎且民之趨事赴功析因夷隩各從其時之不暇至其閑暇之日亦各欲休息何乃一嵗之間州使之讀法者三黨使之讀法者六族使之讀法者十有四閭使之讀法者又無數不亦弊弊然其勞將見春不及耕夏不及耘秋不及歛冬不及藏而惟讀法之為急不亦擾民之甚乎夫種木者深根厚土而俟其自殖昧者乃旦旦而視之掘土而搔之而木性已揺矣王者之於民不過輕徭薄賦以厚其生崇德明義以化其心其生厚則無窮民其心化則無奸民何嘗區區示以法令今日使讀法於此明日又讀法於彼使民有終嵗奔走從事之勞是何異昧者之種木欲其生而反揺其本也此决非周公之意不知治體者為是説爾或曰聖人之教民委曲詳重務使人心皆明知之讀法雖數何足為疑曰不然盤庚方欲遷都民咨胥怨乃作書三篇以告之周公欲伐四國議者以為艱大乃作大誥以開其未喻至於商之頑民未知化於是諄諄作多方多士之書皆國事曉勸之爾何嘗聞數數覿民以法乎法者治之末爾向使人心皆明知之又豈移風易俗之道耶紫芝免役多少役法一也國中以免者多役者少野則免者少役者多以至世禄者必不免何也卿大夫采地圭田皆以為永業所謂世禄之家必不異今之官户也舍役者惟老者疾者賓者賢者能者服公事者舍此雖世禄者役不必免國中以免者多役者少故晚征而早蠲之野則免者少役者多故早征而晚蠲之貴者賢者能者服公事者老者疾者多居國中故免者多横渠羣書考索别集卷九
