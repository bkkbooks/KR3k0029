body:
  text: 羣書考索别集卷七宋章如愚撰經籍門詩詩不始於周先儒謂詩三百篇其始終皆在於周嘗試論之自有天地有萬物而詩之理已寓雷之動風之偃萬物之鼓舞皆有詩之理而未著也嬰孩之嬉笑童子之謳吟皆有詩之情而未動也桴以蕢皷以土籥以葦皆有詩之用而未文也康衢順則之謡元首股肱之歌皆詩也故虞詩曰詩言志歌永言當是時詩之義已終矣至於太康逸豫而五子述大禹之戒以作歌傷今而思古變風變雅之體已備矣商頌十有二篇而詩之為詩者已極其至然則烏在其始於周孔子曰周監於二代郁郁乎文哉前輩謂天下未嘗一日不趨於文至周而後大備此説盡之黄山谷文觀詩之法度先平易其心張横渠云詩之情性温厚平易今顧以﨑嶇求之以艱難索之則其心先狹隘矣惟平易其心則意思廣大此知味之學觀詩之法也同上詩不過發乎情性六義者學詩之筌蹄而非其至也故夫知感而遂通之理於寂然不動之先知喜怒哀樂之理於渾然未發之際則三百篇之詩一詩也噫明乎太極則六爻一爻耳明乎皇極則九疇一疇耳明乎情性則六義一義耳同前詩出於小人嘗觀於詩天子諸侯朝廷之嚴而后妃夫人之祕匹夫匹婦皆得肆言之聖人為詩而肆匹夫匹婦之言宜若積其輕君之心至於幽厲之小雅􅆁􅅠衛陳鄭之風直諫而不訐顯譏而不戾相與携持去之而卒不忍然後知聖人使之言而民猶不敢盡言而况敢叛是故湯武之興其民急而不敢先周之衰其民哀而不敢離盖其湮欎之氣舒而亡聊之氣不蓄也嗚呼詩不作天下之怨極矣卒不能勝共起而亡秦秦亡而後快於是始有匹夫匹婦之存亡天子之權嗚呼春秋之亡以禮廢秦之亡以詩廢同前三千古詩司馬遷謂古詩三千餘篇孔子刪之存者三百未知遷説何所據乎司馬謂古詩三千餘篇孔子刪之存者三百鄭學之徒皆以遷説為繆古詩雖多不容十分去九以予考之遷説然也何以知之今書𫝊所載逸詩何可數焉以圖推之有更十君而取其一篇者又有二十餘君而取其一篇由是言之何啻乎三千詩哉六一文詩序乖亂古詩無序詩序自卜商始或者又以為聖人之自序且序者所以總括詩人之㫖意而冠於詩首者也使學者觀之則可以明詩然不知文王一人爾在周南則以為王者在召南則以為諸侯何也太姒一人爾在召南則以為夫人何也其他乖戾未易枚數請因其類而復詳言之詩序之壞詩無異三𫝊之壞春秋然三𫝊之壊春秋而春秋存詩序之壊詩而詩亡三𫝊好為巧説以壊春秋非不酷也然其三家之學自相彈射後儒又有啖趙之徒能以辨其非故世人頗知三傳之非春秋也是以春秋猶存若乃詩序之作既無學三家者以攻之又無後儒以言之俗學相傳以為出於子夏妄者又直以為聖人知求其義又只就序中求之况後之學又不得違詩序人之辭學者自兒童時讀詩即先讀序已入肌骨矣及其失㫖嗚呼詩安得不亡乎春秋之教或不待聖人復生可以行於後詩人之㫖雖吾夫子復出不可與世人班也然則詩序之為害比之三傳其酷不愈甚乎且如二南之詩謂之周南召南此盖古人採詩於周之南得之則為周南採詩於召之南得之則為召南周召皆周地也地志扶風雍縣東北有周城東南有召城古以周召二公分土而治主東西方諸侯於地得其詩故以為名二南之義盖出於此彼序詩者乃以闗雎麟趾之化王者之風係之周公鵲巢騶虞之徳諸侯之風故係之召公謬妄之甚也既以二南係之二公則遂以其詩皆為文王之詩見闗雎葛覃婦人之詩則遂以他詩亦皆出之婦人文王一人在周南則以為王者在召南則以為諸侯太姒一人在周南則以為后妃在召南則以為夫人豈夫子正名之意乎以二南之詩所言后妃夫人多無義理其間大可怪者如小星之詩云夙夜在公肅肅宵征抱衾與裯夫肅肅宵征者逺行不怠也夙夜在公者勤勞王事也詩之此語多矣抱衾裯而夜行者皆不憚勞役之意豈非命之不均乎故曰實命不猶此無疑其為使臣勤勞之詩也今其序乃曰夫人無妬忌之行恵及賤妾進御於君知其命有貴賤能盡其心矣不知進御於君何用肅肅宵征夙夜在公為哉又何用抱衾與裯而往乎注云諸妾夜行抱被與床帳進御之次序䟽云䟽君所有裯亦當抱衾裯而往學經不知理乃至於此豈不貽有識者之笑汝墳曰既見君子不我遐棄殷其靁曰振振君子歸哉歸哉皆其室家思見君子之辭而勉之以正勸之以義吾未見其可也既曰召南之國被文王之化兎􅆯之武夫皆好徳而材可用焉材可用又安得強暴之男侵陵貞女而致行露之訟又安得有女懐春之吉士誘之如野有死麕之辭謂文王太姒之化只及婦人不及男子已非也况婦人果皆貞潔則亦如漢上之女不可犯安有無感我帨無使厖吠之語序於此為説不行乃云被文王之化雖當亂世猶惡無禮委曲諱䕶亦已勞矣予謂不然二南之詩雖大概美詩而亦有刺詩不惟西周之詩而漢廣之㳺女不可求國風無以異也何以辨之據何彼穠矣一詩可知矣其曰平王之孫齊侯之子考春秋莊公元年書曰王姬歸于齊此乃桓王女平王孫下嫁於齊襄公非平王孫齊侯子而何説者必欲以為西周之詩於時未有平王齊侯乃以平王為平正之王齊侯為齊一之侯與書寜王同義此妄也據詩人明指其人之子孫則必直言之如稱衛莊姜云東宫之妹邢侯之姨頌魯僖公云周公之孫莊公之子又可疑乎且其詩刺詩也以王姬徒以容色之盛而無肅雝之徳何以使人化之故曰何彼穠矣棠棣之華曷不肅雝王姬之車詩人若曰言其容色固如棠棣矣然汝王姬之車何不肅雝乎是譏之也今其序反曰猶執婦道以成肅雝之徳變白為黒於理安乎觀此一篇之義則二南之詩與夫三百五篇壊於詩序暗昧磨滅禮義殆盡矣夫子曰人而不為周南召南其猶正墻面而立也歟今人為二南而反面墻可不哀哉或曰何彼穠矣之詩若是東周之詩何不列之於王黍離而列之於此乎曰為詩之時則東周也採詩之地則召南也於召南所得之詩而列於東周此不可也或又曰子辯詩序之非是矣借無詩序後世知詩為何義且其序行之數百年彼豈無據而云曰聖人刪詩不為之序非不能為之也正使學者深惟其義而後可以自得詩人之意不若易春秋之㣲妙學者能深思之不待序而自明亦如春秋不待𫝊亦自得也不幸漢儒之陋一冠之以序詩始無傳焉且彼又烏有據哉不過多據左氏之説爾左氏亦自誣妄不足信以妄𫝊妄反可信乎其他無可據者又只於詩中求之如見小星之實命不同則云知其命有貴賤見何彼穠矣云曷不肅雝則云以成肅雝之徳淺陋之見止如此他何所見乎嗚呼齊女文姜嫁于魯鳥獸之行終以弑夫滅國春秋屢書為戒萬世彼則刺鄭忽云齊女賢而不取齊桓公之覇正譏其無救衛之功惟書城楚邱以譏之彼則云齊桓公攘夷狄而封之國人思厚報之若此之類背理亂敎為甚世人乃酷信之詩烏得而不亡乎然此無他學者不深於春秋故詩義無自而見詩序無由知其謬也詩序非止於一人以詩序為卜子夏所作者自沈重之言始以詩序為衛敬仲所作者自范曄之言始愚嘗以詩序考之文辭殽亂知其非出於一人之手也何者史記作於司馬氏而日者等𫝊禇先生實補之漢史作於班固而古今人表曹大家實續之然則詩序之作謂専出於一人可乎姑試論之詩有六義一曰風至六曰頌則見於周官太師之所掌情動於中而形於言至亡國之音哀以思其民困則見於戴經之樂記成王未知周公之志公乃為詩以遺王名之曰鴟鴞焉則見於書之金縢古者長民衣服不貳從容有常以齊其民則見於戴記之緇衣文公不能使髙克將兵而禦狄于境則見於春秋之左氏傳正考甫得商頌十二篇於周之太師以那為首則見於左氏之國語措辭引援往往雜出於𫝊記之文而謂一人為之可乎若以沈重之言為子夏所作未必非敬仲若以范曄之言為敬仲所作則未必非子夏然則詩序果作之誰乎昔昌黎議詩有曰子夏不序詩愚然後知詩序非子夏所作實出於漢之諸儒也國風雅頌詩有國風雅頌皆聖人所以辨尊卑盛衰之義其間不容顛倒錯亂也然王黍離一篇不當降之國風夫不當降而降之者是卑王室而尊諸侯也為此詩者果知道乎請試言之或論春秋謂鄭祭仲出忽立突春秋字之者以其賢而知權也又論詩謂黍離平王之詩聖人列於國風者以周衰降之也私心頗不喜而深疑之以至祭仲廢正立惡萬世之罪人春秋正當深誅之以懲後何得反謂之知權平王之世周道雖衰猶為天下之宗主聖人何得降之於國風耶又知學經而究其旨然後知二者皆非聖人之意漢儒謬妄之説聾瞽後學故也春秋因舊史何嘗以名字論褒貶彼公羊専求一字之義見經字祭仲則不得不謂賢而知權豈有逢君之大惡聖人謂之知權乎夫子刪詩風雅頌各得其所何嘗以風必為諸侯之詩彼序詩者妄以風雅辨尊卑見王黍離在國風則不得不謂降王室而尊諸侯烏有王室之尊聖人輙降之乎嗚呼自詩序之作詩雖存而亡已乆矣王室尚可降為諸侯則天下豈復有理小人豈復有教乎謂詩之𫝊於世吾不信也曾不知聖人刪詩謂之風謂之雅謂之頌者此直古人作詩之體耳何嘗有天子諸侯之辨耶今人作詩者有律有古有歌有引體製不同而名亦異古詩亦然謂之風者出於淺近之語大概小夫賤𨽻婦人女子之言淺近易見也謂之雅則非其淺近易見其辭則典麗醇雅故也謂之頌者則直賛美其上之功徳耳三者體裁不同是以其名異也今觀風之詩大率三章四章一章之中大率四句其辭俱重複相類既曰參差荇菜左右芼之窈窕淑女鐘鼔樂之既曰葛之覃兮施于中谷惟葉萋萋又曰葛之覃兮施于中谷惟葉莫莫樛木三章四十有八字惟八字不同螽斯三章三十有九字惟十二字不同芣苢三章四十有八字亦惟八字不同甚者􅇻其靁三章七十有二字惟六字不同已焉哉天實為之謂之何哉北門三章俱言之期我乎桑中要我乎上宫送我乎淇之上矣桑中三章皆言之凡風之體皆語重複淺近易見如此若夫雅則不然其言典則非複小夫賤𨽻婦人女子能道之盖士君子為之也然雅有小大小雅之雅固已典正非復風之體然其語間有重􅃨雅則雅矣猶其小者爾曰小雅者猶言其詩典正未至於渾厚大醇也至於大雅則渾厚大醇矣其篇十有六章章十有二句者比之小雅愈以典則非深于道者不能言也凡與大小雅皆道人君政事之得失有美有刺曰頌則無有諷刺惟以鋪張勲徳爾學者試以風之詩與雅之詩詳觀之然後知聖人辨雅之意以小雅之詩與大雅之詩詳觀之然後知聖人辨大小之意夫子曰吾自衛反魯然後樂正雅頌各得其所當聖人未反魯之時雖古詩之多風雅頌皆渾淆無别逮聖人而後各得其所學者可無思乎彼序詩書者妄人爾不知此理乃以言一國之事謂之風言天下之事謂之雅政有小大故有小雅大雅頌則以其成功告神明其言皆惑既以風為諸侯又以周南為王者之風后妃之徳何耶借謂文王在當時猶為諸侯故得謂之風而豳詩乃成王之詩周公之事亦列於風豈時亦未為王乎故謂黍離降則豳詩亦降矣觀此言風之謬可知既以小雅蓼蕭為澤及四海以湛露為燕諸侯六月采芑為南征北伐王者之政孰大於此又以小雅為政之小何耶吾不知常武之征伐何以大於六月卷阿之求賢何以加於鹿鳴觀此言二雅之謬可知頌者謂其稱君之功徳則是矣何必告神明乎豈不告神明即不得為頌也既以敬之為戒成王小毖為求助與夫振鷺臣工閔予小子皆非告神明而作也觀此言頌之㫖又不通矣今田夫里婦皆能言鄉土之歌此即古風之遺體也唐人作平淮夷雅漢人作聖主得賢人頌之類此即古之雅頌遺體也何用他説乎或曰如子所説則七月鴟鴞之詩既出於周公周公之言安得不為雅而徒為風乎曰詩各有體七月鴟鴞之詩其言則文其體則風雖非婦人小夫之言而婦人小夫之體也此無足疑嗚呼審夫此理則周平王之詩為國風不害為天子之尊魯僖公詩列之於頌不失為諸侯之卑尊卑之辨不在於此故也學者不察此徒信序詩之説反謂聖人降王室而尊諸侯豈不卑哉風雅正變風一也而云有正有變雅一也而亦云有正有變是果詩有異體而聖人亦嘗為此言乎不然則漢儒序詩之失殆不可以不辨漢儒序詩不特言二南與風雅頌之失又有謬者風一也而云有正有變雅一也亦云有正有變二南之詩則為正風十三國風則為變風文王成王之詩則為正雅幽厲則為變雅有是理乎有是理聖人必言之矣盖彼不知風雅乃古詩之體或羙或刺辭有美惡體則一而已以二南皆文王之詩故不得不以為正風謂二南之詩美詩多而其他國刺詩多則是矣謂風有正變則妄也既謂之變風是無復羙詩也又以淇奥羙衛武公緇衣羙鄭武公小戎羙秦襄公之類皆稱其功徳何也且謂變風變雅之作由禮義廢政教失作者傷人倫之廢哀刑政之苛若衛武公鄭武公之徳豈亦禮義政教之廢失人倫廢刑政苛者乎讀淇奥緇衣之詩人愛之譽之如彼乃使與墻有茨南山行如禽獸者同謂之變風善惡果有辨乎既以政之小為小雅政之大為大雅而雅又有變則是小雅政失之小者大雅政失之大者今其序以小雅刺詩為刺幽王大雅刺詩為刺厲王犬戎之禍西周以亡幽王之失猶為小乎惟其有正變之陋説是以其詩雖刺而必以為羙如野有死麕何彼穠矣之類皆以為文王詩是也其詩雖羙而必以為刺如楚茨信南山之類皆以為思古是也詩人若傷今思古必先言古之美以證今之失今觀楚茨信南山甫田大田瞻彼洛矣桑扈等詩惟述年榖豐盛祭祀受福人愛君子之辭無一言不美無一事譏時何傷今思古之有盖其詩不幸繼鼔鐘之後以鼓鐘為刺幽王故此詩亦例為刺也彼其悖理亂經如此學經者僅守其説而不悟不若不學之為愈也程元嘗問文中子曰豳風何也曰變風也曰周公之際亦有變乎曰君臣相疑其能正乎成王終疑則風遂變矣鄭氏以自六月下至何草不黄五十有八詩皆為小雅之變自民勞以下至召旻十有三詩為大雅之變夫成王賢主周公聖臣宣王中興之功震赫古今其詩反謂之變風變雅則其正者乂誰當之鄭氏不足道以王通之才惑於詩序其言之謬亦如此詩義豈復存乎故予嘗曰黜左氏而後春秋明削漢儒之序而後詩義著逹者或以為然正風變風明天子在上天下統而為一當是時也歌詠功徳皆歸於王者諸侯不得有正風及其禮廢教失政異俗殊民各歌其君之善惡則變風興焉然周召為正何也曰在商則為變在周則為正也先王之澤尚存於變風君子之於詩非徒誦其言又将以考其情性非特以考其情性又将以考先王之澤盖法度禮樂雖亡於此猶能并與其深㣲之意而𫝊之故其為言率皆樂而不􅁋憂而不困怨而不怒哀而不傷如緑衣傷己之詩也其言不過曰我思古人俾無訧兮擊鼓傷上之詩也其言不過曰土國城漕我獨南行至軍旅數起大夫久役止曰自貽伊阻往役無期度大夫思其危難以風焉但曰茍無饑渇而已若夫言天下之事羙盛徳之形容固不待言而可知也列國之風有自來周之盛時王澤充塞其善者篤於善不善者以禮自將亦不至於惡其後周徳既衰諸侯各因其舊俗而增之善者因善以入於惡而不善者日以滋甚故晉以堯之遺風為儉不中禮陳以大姬之餘俗為逰蕩無度此理勢然也觀變風而知王澤自吟詠情性言之則變風之發乎情乃民之性自逹於事變懐其舊俗言之則變風止乎禮義乃先王之澤也觀衛女之思以禮共姜之誓以義蝃蝀無恥不在所齒墓門不義必在所惡則所謂止乎禮義者皆然矣先王盛時其流風美意能使後世婦人女子小子小夫賤𨽻皆能自致於禮義之中不敢以私廢公不敢以恩忘義則王澤所漸不既深乎且禮義見於人主之教化則天下不復有變風惟禮義廢於朝廷而著於詩人之吟詠此變風所以作也盖天下之公議當在上而不當在下今周之所以為禮義者不存於周而存於詩人周之為周可知矣周南無周公之詩召南有召公之詩周南無周公之詩而召南則有召公之詩何也盖周南天子之所都天子在上周公不得専有其羙者也召公専主諸侯則南國之教得以稱召伯也在易二與四同功而異位二多譽逺也四多懼近也周公近召公逺此二南之詩所以異歟陳古以諷今則曰風十二國風莫非風也而􅅠之氓王之君子于役鄭之羔裘齊之盧令獨以風者盖其辭言古之君子而其意所以諷今優㳺而不廹切尤得風之體者也二南不可以異觀詩分二南盖周召分陜而治當時采詩者得于襄漢之東者為周南得于襄漢之西者為召南小旻之及下無異於螽斯之不妬忌標有梅之男女及時無異於桃夭之婚姻以時何彼穠矣王姬肅雝無異於麟趾公子之信厚野有死麕之惡無禮無異於漢廣之無思犯禮故二南不可言逺近教化不可言淺深周召不可分聖賢也論變風次第自􅆁􅅠衛之有變風然後知諸侯擅相吞滅衛首并􅆁􅅠之地而不禀命於天子也自王國之有變風然後知王政不行於諸侯而僅行於境内也自鄭國之有變風然後知畿内之封亦廢法失道而不能自保自齊國之有變風然後知君臣上下之分失而人倫遂至於廢亂矣夫如是則天下無不亂之國無不變之俗雖魏以舜禹之都唐以帝堯之國而風化義禮亦消亡矣此魏唐之變風所以作也禮義消亡則夷狄交侵而天下相胥為夷矣此秦之變風所以作也禮義之俗亡夷狄之風行雖陳以有虞之後亦不能以自存而危亡至矣此陳之變風所由作也懼危亡而思周道則曹檜之風作亂極而治危極而安反之以周公之道斯可也於是乎繼之以豳焉此風之所為終而雅之所為始也正家而天下定二南為王道之基盖正家而天下定故也龜山二南之化有淺深二南皆文王之詩而其所係不同者周南之詩其時羙其道盛㣲至於紏紏武夫兎􅆯之人逺至於江漢汝墳之域乆至於衰世之公子皆有以成其徳召南則不然此所以為諸侯之風而係之召公也夫事出於二人而風不同如此者盖所入有淺深所施有逺近故也王國有風非孔子所貶或曰平王之國不雅而風貶之也天子不正名諸侯不勤王朝覲不同不脩包匭菁茅不入天子擁虚器於上號令不及於天下則亦與列國等耳故夫子降平王之詩為國風傷之也吁是豈吾夫子之心哉夫子作春秋序於諸侯之上所以尊周室而使天下知有王也而乃復於詩而降之乎盖黍離之為國風自周太師采詩之時已然矣而非孔子名之也周室未遷則其聲天下之正聲也平王遷而東之則其音乃東土之音耳而非天下之正音也故曰王國風豈以王不正而遽降之哉變風發乎情止乎禮義蟋蟀周儉之詩也而曰好樂無荒盖有以禮自娱樂之意考槃述窮處之詩也而曰永矢弗諼盖有畎畆不忘君之意君子于役風危嘆之詩也而曰茍無饑渇盖有臨難無茍免之意泉水之衛女思歸而能以禮載馳之夫人思歸而能以義其發乎情止乎禮義者於此可見矣故觀詩人喜怒哀樂之中節者尤當於變風觀之黄山谷文齊侯封衛諸侯攘狄而封衛可謂仁矣齊侯之仁見於詩孔子宜列諸齊而反列諸衛何也孔子之意而人莫之知也盖孔子不與齊侯之封也封衛齊侯也詩列以見諸侯之仁在衛而不在周也茍列諸齊則齊侯之行正矣儒志王風閔周王風閔周之詩四而君子陽陽曰閔周何也或謂王風之詩凡十篇而閔周之詩四方是時平王東遷豐鎬為墟文武之舊已掃地矣此黍離所以閔周也兵敗禍結此兎爰所以閔周也風俗衰薄家室不相保此中谷所以閔周也周家有是三者閔之宜矣君子陽陽之序曰君子遭亂相招為禄仕全身逺害盖君子猶未至也何遽閔之哉答曰序此詩者其知道乎國家之患莫大於有君子而不能知小人在位而賢人在下也其小人不為盡心未害也至於君子不盡心以求茍免熟視其禍而不肯救者國必亡此知㣲君子所以嗟嘆而傷之也彼黍離兎爰中谷之亂茍有君子其至是乎伊川七月公劉之詩七月之詩周公作也公劉之詩召公作也七月陳王業公劉戒以民事其意等也周公作之戒成王召公作之亦戒成王七月之興當既王之後公劉之興亦當既王之後同時作之也然而七月則係為豳風公劉則入為雅何也先儒以為周公遭變故七月為􅃎風召公無變故公劉為大雅其然乎其不然乎􅃎風者名之為􅃎實周公詩耳周公之詩何不名曰周公國風而曰􅃎乎周公畿内國也畿内諸侯止係於王不得列為風也何不編於魯魯者伯禽封耳周公不之魯也何不編之雅與公劉之詩倫公劉之詩言其政事七月之詩言其風俗既曰風矣不得編於雅矣周公作詩意在於􅃎而周公之詩無所可繫故因謂之􅃎也王逢原周公之詩曰􅃎風管蔡流言成王信之而疑周公於時周公作七月之詩厯陳后稷先公風化之所由使成王知積累之艱難如此而奉承之不易且以見己之所以當國而不辭之意凡以重王業之艱難故也後人因鴟鴞而下六篇附之盖上不敢附天子之雅下不得列諸侯之風故係之以周公之事而備其本末云耳豳詩正朔之辨太甲三篇伊尹所作也君子觀中篇三祀之文則知其為商人紀年之號月令一篇漢儒訂正之也君子觀篇首太簇之律則知其為漢人建寅之正然則讀周公七月之詩而不知為周之正朔其惑滋甚矣盖周正建子與夏商之時異􅃎人風俗又與中國之地不同姬公之為是詩實所以紀􅃎風而述周正也且周之七月今五月也在堯典則為星火之候故􅃎詩以流火驗之豈非為周之七月乎周之九月今七月也在月令則為飭衣之候在􅃎詩則以授衣證之豈非為周之九月乎至於于耜舉趾順其序烹葵剥􅀥適其時若以􅃎俗而驗之正如符契相合斷無毫髮差誤故陳寵謂周以十一月為春其有見於此歟或者則曰豳者岐山之北雖為戎狄之地然以十一月為春則時之氣候差而寒暑紊吁胡不反而思之乎驪山阬谷古戎地也冬日種𤓰温燠成實則十一月為春獨不可以是為證乎或者又曰豳詩固述周正矣康成之箋厯舉夏時参論之則周人未必不兼用夏正也吁又獨不反而思之乎周典一書鄭氏釋也釋太府則曰若漢司農釋司會則曰若漢尚書今以夏正而箋七月者又豈非漢行夏正特引是以為證乎吁故必知此而後可以讀周公之七月矣宣王褒賞宣王能褒賞中伯錫命韓侯詩人美之不為無意崧髙之詩止於建國親諸侯褒賞申伯韓奕之序止於能錫諸侯夫武王盛時大邦畏其力小邦懐其徳朝覲會同無敢失時征伐誅討莫不如志爵賞有度錫命有禮夫豈以為盛哉天子之事固若是也一不能是則亂而已而宣王所能乃止於褒賞錫命詩人美之如是者盖周至厲王而亂極矣王室衰㣲諸侯肆行王且不能有國况能建國乎諸侯背叛結怨連禍况能親諸侯乎賞罰不行於上則褒賞申伯為可羙錫命不行於下則賜命韓侯為可嘉天下出於大亂之後而能振起之以行天子之事是亦可道也伊川魯無風魯之無風何也先儒以為時王褒周公之沒比於先代故廵守不陳其詩而其篇特不列於太師之職是宋魯無風其或然歟或者謂孔子有所諱而削之然考其當時為國大夫賦詩相属及季子觀周樂于周皆無曰魯風者是説不通焉致魯於頌諸侯無正風正風者非諸侯之詩也且魯受天子禮樂其僣已甚矣而何有盛徳之形容然聖人所以特致於頌豈無意哉或問曰諸侯無正風而魯有頌何也曰是惡夫僣者非頌也聖人不得已而名之是聖人之㣲意也其原伯禽受天子禮樂乎以諸侯而僣天子吾從而目之即其志也且四篇之體不免變風之例耳是又何頌之有乎故其序曰季孫行父請命於周而史克作頌是亦未免乎強也是僖之政猶未全其徳而春秋之貶尚不能逃其罪抑亦不知其頌從何而興耶夫頌之羙者莫如文武而已聖人所以列為魯頌者得不示其強弱哉商魯並頌魯本不足頌而聖人列之頌者所以譏其僣也若商頌者非魯頌之比而聖人特與之並列者何哉詩有魯頌商頌何也魯實僣天子今觀魯頌之事豈是為盛徳而可告於神明故言季孫行父請命於周而作是頌則以周室既㣲明魯之強而僣也其商頌亡特附之而已故曰得商頌十二篇以此知孔子不欲絶一代之事所得而附之非有所褒貶也羣書考索别集卷七
