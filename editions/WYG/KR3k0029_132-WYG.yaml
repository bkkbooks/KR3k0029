body:
  text: 羣書考索續集卷一宋章如愚編經籍門河圖洛書圖者圖寫其象推原圖書之數天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也此一節夫子所以發明河圖之數也天地之間一氣而已分而為二則為隂陽而五行造化萬物終始無不管於是焉故河圖之位一與六共宗而居乎北二與七同朋而居乎南三與八同道而居乎東四與九為友而居乎西五與十相守而居乎中葢其所以為數者不過一隂一陽一竒一耦以兩其五行而已所謂天者陽之輕清而居乎上者也所謂地者隂之重濁而位乎下者也陽數竒故一三五七九皆屬乎天所謂天數五也隂數耦故二四六八十皆屬乎地所謂地數五也天數地數各以其類而相求所謂五位之相得者然也天以一生水而地以六成之地以二生火而天以七成之天以三生木而地以八成之地以四生金而天以九成之天以五生土而地以十成之此又所謂各有合焉者也積五竒之數而為二十五積五耦而為三十合是二者而為五十有五此河圖之全數皆夫子之意而諸儒之説也至於洛書則雖夫子所未言劉歆所謂相經緯表裏者可見矣或曰河圖洛書之位與數不同何也曰河圖以五生數統五成數而同處其方盖揭其全以示人而道其常數之體也洛書以五竒數統四耦數而各居其所盖主於陽以統隂而肇其變數之用也曰其皆以五居中者何也曰凡數之始一隂一陽而已矣陽之象圓圓者徑一而圍三隂之象方方者徑一而圍四圍三者以一為一故參其一陽而為三圍四者以二為一故兩其一隂而為二是所謂參天兩地者也三二之合則為五矣此河圖洛書之數所以皆以五居中也然河圖以生數為主故其中之所以為五者亦具五生數之象焉其下一㸃天一之象也其上一㸃地二之象也其左一㸃天三之象也其右一㸃地四之象也其中一㸃天五之象也洛書以竒數為主故其中之所以為五者亦具五竒數之象焉其下一㸃亦天一之象也其左一㸃亦天三之象也其中一㸃亦天五之象也其右一㸃則天七之象也其上一㸃則天九之象也其數與位皆三同而二異盖陽不可易而隂可易成數雖陽固亦生之隂也曰中央之五既為五數之象矣然則其為數也柰何曰以數言之則通乎一圖由内及外固各有積實可紀之數矣然河圖之一二三四各居其五象本方之外而六七八九十者又各因五而得數以附于其生數之外洛書之一三七九亦各居其五象本方之外而二四六八者又各因其類以附于竒數之側盖中者為主而外者為客正者為君而側者為臣亦各有條而不紊也曰其多寡之不同何也曰河圖主全故極於十而竒耦之位均論其積實然後見其偶贏而竒乏也洛書主變故極於九而其位與實皆竒贏而耦乏也必皆虛其中也然後隂陽之數均於二十而無偏爾曰其序之不同何也曰河圖以生出之次言之則始下次上次左次右以復于中而又始于下也以運行之次言之則始東次南次中次西次北左旋一周而又始于東也其生數之在内者則陽居下左而隂居上右也其成數之在外者則隂居下左而陽居上右也洛書之次其陽數則首北次東次中次西次南其隂數則首西南次東南次西北次東北也合而言之則首北次西南次東次東南次中次西北次西次東北而䆒于南也其運行則水克火火克金金克木木克土右旋一周而土復克水也是亦各有説矣曰其七八九六之數不同何也河圖六七八九既附于生數之外矣此隂陽老少進退饒乏之正也其九者生數一三五之積也故自北而東自東而西以成於四之外其六者生數二四之積也故自南而西自西而北以成於一之外而七則九之自西而南者也八則六之自北而東者也此又隂陽老少互藏其宅之變也洛書之縱横十五而七八九六迭為消長虚五分十而一含九二含八三含七四含六參伍錯綜無適而不遇其合焉此變化無窮之所以為妙也曰然則聖人之則之也柰何曰則河圖者居其中則洛書者總其實也河圖之虚五與十者太極也竒數二十耦數二十者兩儀也以一二三四為六七八九者四象也析四方之合以為乾坤離坎補四隅之空以為兑震巽艮者八卦也洛書之實其一為五行其二為五事其三為八政其四為五紀其五為皇極其六為三徳其七為稽疑其八為庶證其九為福極其位與數尤曉然矣曰洛書而虚其中五則亦太極也竒耦各居二十則亦兩儀也一二三四含九八七六縱横十五而互為七八九六則亦四象也四方之正以為乾坤離坎四隅之偏以為兑震巽艮則亦八卦也河圖之一六為水二七為火三八為木四九為金五十為土則因洪範之五行而五十五者义九疇之子目也是則洛書固可以為易而河圖亦可以為範矣又安知圗之不為書書之不為圖也曰是其時雖有後先數雖有多寡然其為理則一而已但易乃伏羲之所先得乎圖而初無待於書範則大禹之所獨得乎書而未必追考於圖爾且以河圖而虚十則洛書四十五之數也虚五則大衍五十之數也積五與十則洛書縱横十五之數也以五乗十以十乗五則又皆大衍之數也洛書之五又自含五則得十而通為大衍之數矣積五與十則得十五而通為河圖之數矣茍明乎此則横斜曲直無所不通而河圖洛書又豈有先後彼此之間哉故曰時雖有後先數雖有多寡然其為理則一而已安國云河圖者伏羲氏王天下龍馬出河遂則其文以畫八卦洛書者禹治水時神龜負文而列於背有數至九禹遂因而第之以成九類劉歆云伏羲氏繼天而王受河圖而畫之八卦是也禹治洪水賜洛書法而陳之九疇是也河圖洛書相為經緯八卦九章相為表裏關子明云河圖之文七前六後八左九右洛書之文九前一後三左七右四前左二前右八後左六後右邵子曰圓者星也厯紀之數其肇於此乎厯法合二始以定剛柔二中以定律厯二終以紀閏餘是所謂厯紀也方者土也畫州井地之法其放於此乎州有九井九百畆是所謂畫州井地也盖圓者河圖之數方者洛書之文故羲文因之而造易禹箕叙之而作範也蔡西山元定曰古今傳記自孔安國劉向父子班固皆以為河圖授羲洛書錫禹關子明邵康節皆以為十為河圖九為洛書盖大𫝊既陳天地五十有五之數洪範又明言天乃錫禹洪範九疇而九宫之數戴九履一左三右七二四為肩六八為足正龜背之象也惟劉牧意見以九為河圖十為洛書託言出於希夷既與諸儒舊説不合又引大𫝊以為二者皆出於伏羲之世而易置圖書並無明驗但謂伏羲兼取圖書則易範之數誠相表裏為可疑耳其實天地之理一而已矣雖時有古今先後之不同而其理則不容於有二也故伏羲但據河圖以作易則不必預見洛書而已逆與之合矣大禹但據洛書以作範則亦不必追考河圖而已暗與之符矣其所以然者何哉誠以此理之外無復他理故也然不特此耳律吕有五聲十二律而其相乗之數䆒於六十日名有十幹十二支而其相乗之數亦䆒於六十二者皆出於易之後其起數又各不同然與易之隂陽䇿數老少自相配合皆為六十者無不若合符契也下至運氣參同太一之屬雖不足道然亦無不相通盖自然之理也假令今世復有圗書者出其數亦必相符可謂伏羲有取於今日而作易乎大𫝊所謂河出圗洛出書聖人則之者亦汎言聖人作易作範其原皆出於天之意如言以卜筮者尚其占與莫大乎蓍龜之類易之書豈有龜與卜之法乎亦言其理無二而已耳文公易學啓蒙先天圗此圗明隂陽相生之數邵子曰大𫝊云天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也此一節眀伏羲八卦盖乾南坤北離東坎西震東北兌東南巽西南艮西北八卦相錯者明交相錯而為六十四自震至乾為順自㢲至坤為逆數往者順若順天而行是左旋也皆已生之卦也故云數往也知來者逆若逆天而行是右行也皆未生之卦也故云知來也夫易之數由逆而成矣此一節直觧圗意固嘗推之太極既分兩儀立矣陽上交於隂隂下交於陽而四象生矣陽交於陰隂交於陽而生天之四象剛交於柔柔交於剛而生地之四象八卦相錯而後萬物生焉是即一分為二二分為四四分為八八分為十六十六分為三十二三十二分為六十四猶根之有榦榦之有枝愈大則愈小愈細則愈繁是故乾以分之坤以翕之震以長之㢲以消之長則分消則翕也迨翕盡而為純坤又非靜了便動此又有所謂太極在一靜一動之間一動一靜天地人之至妙一動一静之間天地人之至妙至妙者故又云無極之前隂含陽也有象之後陽分隂也隂為陽之母陽為隂之父故母孕長男而為復父生長女而為姤是以陽始於復而隂起於姤也盖嘗有詩曰耳目聰眀男子身洪鈞賦予未為貧湏探月窟方知物未躡天根豈識人乾過姤時觀月窟復與姤相值可觀月窟之妙地逢雷處㸔天根坤與復相值可見天根之妙天根月窟閑來往三十六宫都是春三十六宫即八卦之數言也乾一則一宮兌二則三宫離三則六宫震四則十宫巽五則十五宫坎六則二十一宫艮七則二十八宫坤八則三十六宫是以圎圗言也若夫方圗造化尤妙又嘗有詩曰天地定位否泰反類山澤通氣損咸見義雷風相薄恒益起意水火相射既濟未濟四象相交成十六事八卦相盪為六十四又合圎圗方圗而並論圎圗其陽在南其隂在北方圗其陽在北其陰在南此尤造化之妙處圗雖無言吾終日言未嘗離乎是盖天地萬物之理盡在其中矣易易𫝊序易變易也隨時變易以從道也其為書也廣大悉備將以順性命之理通幽明之故盡事物之情而示開物成務之道也聖人之憂患後世可謂至矣去古雖逺遺經尚存然而前儒失意以𫝊言後學誦言而忘味自秦以下盖無𫝊矣予生千餘載之後悼斯文之湮晦將俾後人沿流而求源此𫝊之所以作也易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占吉㓙消長之理進退存亡之道備於辭推辭考卦可以知變象與占在其中矣君子居則觀其象而玩其辭動則觀其變而玩其占得於辭不逹其意者有矣未有不得於辭而通其意者也至微者理也至著者象也體用一源顯微無間觀㑹通以行其典禮則辭無所不備故善學者求言必自近易於近者非知言者也予所傳者辭也由辭以得其意則在乎人焉伊川易序易之為書卦爻象象之義備而天地萬物之情見聖人之憂天下來世甚至矣先天下而開其物後天下而成其務是故極其數以定天下之象著其象以定天下之吉㓙六十四卦三百八十四爻皆所以順性命之理盡變化之道也散之在理則有萬殊統之在道則無二致所以易有太極是生兩儀太極者道也兩儀者隂陽也隂陽一道也太極無極也萬物之生負陰而抱陽莫不有太極莫不有兩儀絪緼交感變化不窮形一受其生神一發其知情偽出焉萬緒起焉易所以定吉㓙而生大業故易者隂陽之道也卦者陰陽之物也爻者隂陽之動也卦雖不同所同者竒耦爻雖不同所同者九六是以六十四卦為其體三百八十四爻互為其用逺在六合之外近在一身之中暫於瞬息微於動静莫不有卦之象焉莫不有爻之義焉至哉易乎其道至大而無不包其用至神而無不存時固未始有一而卦未始有定象事固未始有窮而爻亦未始有定位以一時而索卦則拘於無變非易也以一事而眀爻則窒而不通非易也知所謂卦爻彖象之義而不知有卦爻彖象之用亦非易也故得之於精神之運心術之動與天地合其徳與日月合其明與四時合其序與鬼神合其吉㓙然後可以謂之知易也雖然易之有卦易之已形者也卦之有爻卦之已見者也已形已見者可以言知未形未見者不可以名求則所謂易者果何如哉此學者所當知也易非伏羲之書易者天地之書也非伏羲之書也伏羲但法天而畫之耳繫辭曰天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉㓙生矣在天成象在地成形變化見矣此天地自然之書伏羲何預哉易為天地之書凡天地之間肖翹蠢動皆受形於易者也易具天地之理則凡天地之間有適於用皆受命於易者也王弼韓安國談理而不談數故其學窮於談説卦揚醜夫長於數而不長於用故終於滛巫瞽史未畫既畫之易有未畫之易有既畫之易未畫者易之書曰天尊地卑曰在天成象在地成形此未畫之易易之理也有聖人者作然後制此之畫富彼之理羅彼之理歸此之畫而易之書生焉是故因彼之天地定吾二卦為乾坤因天地之卑高列吾六位之貴賤因天地之示形象見吾六十四卦之變化畫卦之推原作易之濫觴於是乎出此既畫之易易之書也易之未作乾坤在天地易之既作天地在乾坤易先天而出天地出於易而易非出於天地聖人作夫易而易不作於聖人易以理𫝊三易同祖伏羲而文王之易獨以理𫝊五家同𫝊周易而費氏之學獨以理傳馬王諸儒同釋易之學而王弼之注獨以理傳然則明易之要在理而已矣易理無盡以象談易占筮者之事也以數談易推筭者之事也以理談易學士大夫之事也然而不可不兼也易之為書變易之義也泥於易而不變非知易也昔者伏羲畫卦夏得之而為歸藏商得之而為連山固可以洞吉㓙矣雖勿變可也文王必變而為易周公作爻辭仲尼賛之一爻之中有兼數義者於繫辭又屢致意焉其言象也既曰乾為馬坤為牛又曰作結繩以為網罟盖取諸離耒耜之利盖取諸益明象之不可以數端求也其言數也既曰大衍之數五十又曰天數二十有五地數三十凡天地之數五十有五明數之不可一端求也其序卦也既曰盈天地之間唯萬物故受之以屯物生必蒙故受之以蒙又曰乾剛坤柔比樂師憂臨觀之義或予或求明序之不可一端求也天下之理無盡故易之理亦無盡天下之變無盡故易之變亦無盡聖人欲以三百八十四爻盡天下能事是宜其變動不居也注易誤則為害甚大客有問陶𢎞景吾欲注周易本草宜何先曰宜易先客曰何也注易誤猶不足以殺人注本草誤則有不得其死者矣世以𢎞景為知言曽不知本草所以辨動植之性注而或誤其害有數也易之為書盡性至命而開物成務不眀其義而為之立言如王弼何晏之徒既自䘮其身又亡人之國至於天下板蕩神州陸沉數十年而未止其所殺豈與本草一物之害比哉王何談易而已其效已若此况遍談六經而誤者又何如邪𢎞景之言於是大失易者聖人取象以形天下乾道無形聖人獨見乾之賾於是取龍以象乎乾言健而神也坤道無形聖人獨見坤之賾於是取馬以象乎坤言順而載也故曰象者所以形天下無形之理然固有言天下之至賾而可惡者矣異端之虚𤣥寂滅是也易則不然龍血𤣥黄雨於何地日中見斗灾於何世載鬼一車見於何人然衆人不以為誣君子不以為怪何也其象也非實也易道之用在人大哉易之道乎豈一端已乎故訟之終凶用之自訟則吉隨之說隨用之詭随則㓙乾之初九有勿用之戒而仲尼歴聘以愛日咸之上六有滕口之規而孟子好辯以明道晉之初未可以速進故貴於摧如之退然顔子最少而進未止益之上九不可以過益故忌於或擊之傷然大舜已老而謙得益故曰神而明之存乎其人聖人象天地以作易昔者易之未作非無易也有易而散在天地人物之間也然則其有也孰得之其散也孰聚之得之於心而聚之於易者其惟包羲氏歟是故羲者易中之高曽也文者易中之祖也孔者易中之父也易在天地其理具其名隠至包羲畫之而名始立易在包羲其名立其道微至文王重之仲尼繫焉而道始章然則包羲氏之畫孰示之也天示之也天以何而示之在天有象在地有法在人有一身之靈在物有鳥獸之文有萬物之宜若為雷為風觀象於天而得之也若為山為澤觀法於地而得之也若左股右肱取諸身也若鶴鳴鴻漸取諸物也八卦既畫幽而神明之徳顯而萬物之情皆具見於易而不得遁矣羣書考索續集卷一
