body:
  text: 羣書考索卷六十二宋章如愚撰地理門要害類自古封疆之守其詳不可勝言三代以前純任德化不以地險為急故要害之説未之聞焉昔者太王居邠狄人侵之則去之岐山之下居焉未聞以某地某處為要害置城壘以控扼之遣軍戍以守禦之也自采薇之詩作命將遣戍以守衛中國葢其西有昆夷之難北有玁狁之患雖聖人亦不得不然也自兹以往德化寖薄每恃地以為險故要害之説有得而言者戰國時趙武靈王北破樓煩築長城自代傍隂山下至髙闕為塞而置雲中雁門代郡秦將秦開襲破東胡却千餘里燕亦築長城自造陽至襄平置上谷漁陽右北平遼東郡以距胡秦滅六國始皇使蒙恬將數十萬之衆北擊胡悉收河南地因河為塞築四十四縣城臨河徙適戍以充之而通直道自九原至雲中因邊山險塹谿谷可繕者繕之起臨洮至遼東萬餘里又渡河據陽山北假中地名也漢備匈奴要害漢文帝三年夏匈奴右賢王入居河南地為冦於是帝遣邊吏車騎八萬詣髙奴上郡之縣也文帝後四年匈奴絶和親大入上郡雲中於是漢使三将軍軍屯北地伐屯句注趙屯飛狐口又置三将軍軍長安西渭北棘門霸上以備胡武帝時使將軍韓安國屯漁陽備胡初匈奴擊東胡大破之滅東胡既歸西擊走月氐南併樓煩白羊河南王悉復收秦所使䝉恬所奪匈奴地者與漢闗故河南塞至朝那膚施至是衛青出雲中擊胡之樓煩白羊王於河南指定取河南地築朔方復繕故秦時䝉恬所為塞因河而為固漢亦棄上谷之斗辟縣造陽地以予胡漢得昆邪則隴西北地河西益少胡㓂屯朔方以東備胡漢使光祿徐自為出五原塞數百里逺者千里築城障列亭至盧朐使彊弩都尉路博徳築居延澤上驃騎出代左賢王将皆遁走驃騎封於狼居胥山禪姑衍臨翰海而還是後匈奴逺遁而漠南无王庭宣帝本始三年遣田廣明将四萬餘騎出西河范明友三萬餘騎出張掖韓増三萬餘騎出酒泉田順三萬餘衆出五原凡四将軍兵十餘萬衆匈奴聞漢兵大出遂逺遁成帝時單于上書願保塞上谷以西至燉煌請罷邊備塞吏卒以休天子人民後漢建武二十四年南單于欵塞願永為藩蔽捍禦北狄入居雲中後又移居美稷三國六朝要害魏人都許不以方城為險而守襄陽蜀人都益不以劒閣為險而守漢中吳人都秣陵不以大江為險而守荆渚晉宋齊梁經略河南暫得而暫失之而羯胡拓跋深入淮甸故其鎮守自河南至於江南靡常厥所陳於淮南暫復而旋失之故其鎮守江南為重焉晉兩失襄陽而復得之以至於齊乃䘮樊鄧及蕭含附魏江陵失守則陳氏所得江南而已故其鎮守亦隨時而遷焉荆州三國必争之地魏有荀彧蜀有諸葛亮吳有魯肅皆一時之傑也荀彧説曹操則曰先取河北南臨荆州諸葛亮説劉備則曰跨有荆益保有險阻者其意各在吞吳故不得不窺荆州也至孫權都江左荆州乃其上游尤當力争故魯肅説之曰荆州與國隣接撫而有之天下可定及曹操破荆州順江東下則遣周瑜逆擊𤣥徳領荆州牧則命諸葛瑾從備求之而又躬擐甲胄與魯肅吕䝉陸遜軰數十年間以死拒戰而荆州要地卒為吳有魏不復南渡蜀不敢東下者以不失上流之勢也及吳之衰晉圖平之羊祜首建䇿謂必藉上流之勢若引荆益之兵水陸俱下荆楚之衆進臨江陵平南豫州直抵夏口徐揚青兖並向秣陵是以一隅之吳當天下之衆也其後王濬唐彬胡奮王戎軰并吞席捲順流長騖直造秣陵悉如祜策而吳遂亡是荆州不可失也巴蜀晉三失蜀而三得之宋取仇池而不能有梁失漢中久而後復至其末年併與蜀而失之若其鎮守往往漢之故處也况當太白斗絶之隅一夫敵萬不惟險之恃可乎自司馬錯請伐而蜀道始通巴蜀相攻俱告急于秦秦恵王欲伐蜀以為道險難至司馬錯請伐蜀從之魏武以為五百里石穴其險可知魏明帝欲發兵攻諸葛亮孫資曰昔武皇帝征南鄭取張魯數言斜谷道為五百里石穴公孫嘗盗據矣以荆門㑹兵而旋發延岑之驚漢岑彭𫝊公孫述據荆門拒漢兵使其将延岑悉兵拒廣漢岑彭繞出延岑軍後述大驚以杖撃地曰是何神也劉璋嘗分守矣以白水進兵而至動巴郡之嘆漢獻帝時劉璋敇所在供奉劉𤣥徳入境至巴郡太守嚴顔拊心歎曰此所謂獨坐窮山放虎自衛也璋増修兵令督白水軍此失其險者也𤣥徳斂兵自守遂有漢中武侯不忘酬主之恩攻祁山出斜谷竟以糧盡而志不克伸渭南屯田而中營之星隕矣諸葛亮揚聲由斜谷出祁山亮以數出皆以軍糧不繼使己志不伸乃分兵屯田耕于南渭之濱亮本傳有星赤墜亮營俄而亮死然武侯亦豈徒險而暴師哉始則斬雍闓擒孟獲服夷之心繼則責躬引咎休息三年葢以自治而守其險也亮至南中所在戰捷斬雍闓擒孟獲闓衆拒亮亮生擒孟獲使觀於營陳之中縱之七縱七擒亮猶遣之獲止不去曰公天威也南人不復反矣趙雲鄧芝亦敗於箕谷亮引咎責躬布所失於境内厲兵講武以為後圖姜維反之雖種㳫中之麥而悉空外圍之兵既失陽安之防徒為劒閣之拒魏元帝時漢將軍姜維退住㳫中因求種麥不敢歸成都漢人聞魏兵至乃遣廖化將兵至㳫中姜維張翼董厥等詣陽安闗口為諸圍外助勅諸圍不得戰維敗走化翼厥等合兵守劒閣以拒魏停諸葛瞻綿竹之行延魚貫必死之㓂開闗揖盗而進之葢自取之也魏將鄧艾自隂平中以氊自裹而下將士皆攀木縁崖魚貫而進諸葛瞻督諸軍拒艾艾破瞻前鋒瞻退在綿竹艾斬瞻李徳裕建籌邊樓修青溪大度之險以來維州之降唐本𫝊徙劒南西川乃建籌邊樓築伏義城以制青溪大度之阻吐蕃維州將悉怛謀以城降于唐恃險而輕者譙縱蕭紀尉遲廻耳晉義熙元年侯暉陽昧逼譙縱為主稱成都王蜀大亂九年王志斬縱首以送朱齡石梁元帝紀武都王紀即位于蜀二年梁将軍樊猛追斬之陳宣帝大建十二年周尉遲廻自稱大總管楊堅以韋孝寛為元帥討廻城破廻自殺王孟相繼粗知守險之道使非後嗣之庸失其所守未易取也五代時王建據蜀子衍二世降于後唐孟知祥據蜀至昶降于本朝自江南至于河鎮守之地大抵无江北則守江南京口石頭牛渚姑孰潯陽夏口江南之鎮守也進而有江北則廣陵濡湏皖城邾池安陸為鎮守也又進而全有淮南則淮隂鍾離合肥夀春義陽為鎮守矣又進而有淮北則下邳彭城泗口角城譙城垂瓠白狗堆為鎮守矣又進而全有河南則東陽歴城碻磝滑䑓雍丘滎陽虎牢洛陽為鎮守矣自江南而至于河其鎮守可考者如此建康建康在東南為一都㑹控帶荆揚引輸江湖咫尺淮甸應接梁宋其山川之雄盛原隰之平衍食貨之富饒真足以容萬乗而供六師六朝建都之地不過建康京口江陵武昌數處其强弱利害燎然可觀孫策以㑹稽為興造之根本大帝嗣興移遷京口其後又嘗住公安江陵縣界又嘗都武昌鄂州縣葢往來其間因時制宜不得不然也及江南已定遂還建鄴而與魏蜀抗衡百戰而不屈其宏規逺畧晉宋而下不能及也孫皓捨建鄴而之武昌而吳因以衰梁元帝捨建鄴而守江陵而梁遂以亡李嗣主捨建鄴而還洪府南唐遂不能以自立王導斷然折㑹稽豫章之論而以建鄴為根百年之基業遂定此其大畧也昔秦始皇東巡經秣陵縣望氣者言金陵地形有王者都邑之氣張紘説孫權曰地有王氣天之所命宜為都邑因徙治石頭改秣陵為建鄴西晉之末始改石頭為建康起元帝迄陳區區霸業晉不足以當此休應孫皓議遷都武昌陸抗上疏曰武昌土地危險非王都之所船泊則流漂陵居則峻危且童謡言寧飲建鄴水不食武昌魚寧歸建鄴死不止武昌居夫民謡本出於天心乃以安居而比死足以明天意知民所苦矣晉蘇峻平宗廟宫室並為煨燼温嶠建議遷都豫章三吳豪傑請都㑹稽二論紛紜未有所適王導曰建康王者之宅古之王者不以豐儉移都且北狄游魂伺我之隙一旦示弱竄於蠻越望實皆䘮由是嶠等謀並不行南齊蕭頴胄議遷都夏口桞忱以巴峽未賔不宜輕捨根本不徙俄而巴東之兵至峽口遷都之議遂息論者以為見機梁侯景平元帝臨荆峽二十餘年不欲歸建鄴故府臣僚皆楚人並欲即都江陵方建鄴舊都凋荒已極周洪正諫曰若黔首未見入建鄴使謂猶列國諸王今日赴百姓心不可不歸建鄴江淮表裏江淮之險天所以限南北也自昔立國於南則守江以為家户備淮以為藩籬三國時吳割據荆揚盡長江所極而有之而壽陽合肥蘄春皆為魏境吳不敢涉淮以取魏魏亦不敢絶江以取吳盖其輕重强弱足以相攻拒也故魏人攻濡湏吳必傾國以争之吳人攻合肥魏必力戰以拒之終吳之世曽不得淮南尺寸之地江南單弱故卒無以拒魏魏已下蜀經畧上流屯壽春出廣陵此吳之所以為擒也東晉迄陳彭城盱眙江都廬江諸鎮之地皆入南境據江扼淮以防北狄及陳宣帝時盡歸于周未㡬而陳亡由是觀之江淮之形不合則東南之守必孤其表裏之勢則然也今自淮而東則楚泗廣陵為之表京口秣陵得以蔽遮自淮以西以壽廬歴陽為之表則建康姑孰得以襟帶江西之鎮莫重於潯陽而舒蘄者實潯陽之表也湖北之鎮莫緊於武昌而齊安者實武昌之表也表裏江淮包括東南其來尚矣凡我之所以守敵之所以攻古今之宜葢不甚相逺昔魏文帝嘗以舟師自譙循渦從陸道至徐因幸廣陵臨江而觀兵矣吳之所備者不過自石頭至江東浮船列筏以應之爾苻堅嘗出汝潁破夀春以撓晉晉之所備者不過以宰相為征討大都督屯江之南遣謝𤣥率衆擊洛澗渡淝水以應之而已魏太武嘗臨淮飲江臨𤓰步山以窺宋矣宋之所備者不過沿江六七百里舳艫相接以應之而已凡此因淮甸蹙江南之策也觀之前世知敵所由入則吾之所以為守者可不固邪魏之屯田皖城謀以弱吳孫權乗雨水入皖督軍攻城須臾而拔自是皖城屬吳矣魏以晉宋為蘄春太守數冦吳境吳遣賀齊襲蘄春生致晉宋今皖與蘄江州之北境也曹操治水軍順流而下周瑜程普督兵以逆之遇於赤壁初一交戰操兵敗退瑜屯南岸使黄葢焚燒北船操遁去今赤壁武昌之北境也凡此舉江南之衆以入淮甸之䇿也觀之前世知我之所以取則知敵之所以攻可不備邪今欲守江為門户然淮甸之勢未立則江豈可得而守邪又欲備淮以為藩籬然江南之基未固則淮豈可得而備邪守江以治内守淮以治外此二者可以並行而不可以偏廢起荆襄而至于江左政舉而人和兵强而食足則淮之東西倚江以為重恃江以為援敵人知之彼且設備于宿亳必不能㸃集青徐以擾闗輔矣彼且設備于光潤必不能轉輸陳許以給大梁矣如是則我之所以備敵者専敵之所以備我者分矣羣書考索卷六十二
