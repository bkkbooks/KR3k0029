body:
  text: 羣書考索卷五十九宋章如愚撰地理門州郡類謹按天文分野角亢為韓分一曰鄭氐房心為宋分尾箕為燕分斗為呉分牛女為越分虚危為齊分室壁為衞分奎婁為魯分胃昴畢為趙分觜參為魏分井鬼為秦分柳星張為周分翼軫為楚分角亢星曰壽星宫曰天秤時曰辰州曰兗氐房心星曰大火宫曰天蝎時曰卯州曰豫尾箕星曰析木宫曰人馬時曰寅州曰幽斗牛星曰星紀宫曰磨蝎時曰丑州曰揚女虚危星曰𤣥枵宫曰寶瓶時曰子州曰青室壁星曰娵訾宫曰雙魚時曰亥州曰并奎婁星曰降婁宫曰白羊時曰戌州曰徐胃昴畢星曰大梁宫曰金牛時曰酉州曰冀觜參星曰實沈宫曰陰陽時曰申州曰益井鬼星曰鶉首宫曰巨蠏時曰未州曰雍栁星張星曰鶉火宫曰獅子時曰午州曰三河翼軫星曰鶉尾宫曰雙女時曰巳州曰荆唐天文志曰近代諸儒言星土者或以州或以國虞夏秦漢郡國廢置不同周之興也王畿千里其衰也僅得河南七縣今天下一統而直以鶉火為周則疆場舛矣七國之初地形雌韓而雄魏魏西距髙陵盡河東河内北固漳鄴東分梁宋至於汝南韓據全鄭之地南盡潁川南陽西達虢畧距函谷宜陽北連上黨地皆綿亘數州相錯如綉考雲漢山河之象多者或至十餘宿其後魏徙大梁則西河合於東井秦拔宜陽而上黨入於輿鬼方戰國未滅時星象之言屢有明効今則同在畿甸之中矣或者猶據漢書地理志推之是守甘石遺術而不知變通之數也晉志序十二次度數及州郡躔次云班固以十二次配十二野又魏陳卓更言郡國所入宿度其言最詳今附次之角亢氐鄭兖州東郡入角一度東平任城山陰入角六度泰山入角六度濟北陳留入亢五度濟陰入氐一度東平入氐七度房心宋豫州頴川入房一度汝南入房二度沛郡入房四度梁國入房五度淮揚入心一度魯國入心三度楚國入房四度尾箕燕幽州梁州入箕十度上谷入尾七度漁陽入尾三度右北平入尾十度涿郡入尾十六度西河上郡北地遼西東入尾十度渤海入箕一度樂浪入箕三度𤣥莬入箕六度廣陽入箕九度斗牛女吳越揚州九江入斗一度廬江入斗六度豫章入斗十度丹陽入斗十六度㑹稽入牛一度臨淮入牛四度廣陵入牛八度泗水入女一度六安入女六度虚危齊青州齊國入虚六度北海入虚九度濟南入危一度樂安入危四度東萊入危九度平原入危十一度淄川入危十四度室壁衞并州安定入室一度天水入室八度隴西入室四度酒泉入室十一度張掖入室十二度武都入壁一度金城入壁四度武威入壁六度燉煌入壁八度奎婁胃魯徐州東海入奎一度琅琊入奎六度髙宻入婁一度城陽入婁九度膠東入胃一度昴畢趙冀州魏郡入昴一度鉅鹿入昴三度常山入昴五度廣平入昴七度中山入昴一度清河入昴九度信都入畢三度趙郡入畢八度安平入畢四度河間入畢十度真定入畢十三度觜參魏益州廣漢入觜四度越嶲入觜三度蜀郡入參一度犍為入參三度䍧牱入參五度巴郡入參八度漢中入參九度益州入參七度井鬼秦雍州雲中入井一度定襄入井八度鴈門入井十六度代入井十六度太原入井二十九度上黨入輿鬼二度栁星張周三輔洪農入栁一度河南入星三度河内入井九度翼軫荆楚南陽入翼六度南郡入翼十度江夏入翼十二度零陵入翼十一度桂陽入軫六度武陵入軫十度長沙入軫十六度唐一行山河兩戒説按唐一行天下山河之象存乎兩戒北戒自三危積石負終南地絡之陰東及太華逾河並雷首底柱王屋太行北抵常山之右乃東循塞垣至濊貊朝鮮是謂北紀所以限戎狄也南戒自岷山嶓冢負地絡之陽東及太華連商山熊耳外方桐柏自上洛南逾江漢攜武當荆山至于衡陽及東循嶺徼達東甌閩中是謂南紀所以限蠻夷也故星經謂北戒為胡門南戒為越門河源自北紀之首循雍州北微連華陰而地絡相㑹並行而東至太行之曲分而東流與涇渭濟瀆相為表裏謂之北河江源自南紀之首循梁州南徼達華陽而與地絡相㑹並行而東及荆山之陽分而東流與漢水淮瀆相為表裏謂之南河故於大象則洪農分陜為西河之㑹五服諸侯在焉自陜而西為秦凉北紀山河之曲為晉代南紀山河為巴蜀皆負險用武之國也自決而東之用中岳為成周西距外方大伾北至于濟南至于淮達鉅野為宋鄭陳蔡河内及濟水之陽為邢衞漢陳濱淮水之陰為田隨闕用文之國也北紀之東至北河之北為邢趙南紀之東至南河之南為荆楚自北河下流南距岱山為三齊夾右碣石為北燕自南河下流北距岱山為鄒魯南涉江淮為吳越皆負海之國殖之所自阜也自河源循塞垣北東及海為戎狄江源循嶺徼南東及海為蠻越觀兩河之象與雲漢之所終始而分野可知矣歴代帝王郡邑伏羲陳今陳州神農陳一曰曲阜今兖州黄帝涿鹿今涿州少昊曲阜顓帝帝邱今濮州濮陽縣帝嚳亳今河南沛縣唐堯晋陽今晉州虞舜蒲阪今河中永濟夏韓今頴昌府陽翟縣商湯今偃沛周鎬東今永興鎬秦咸陽今長安西漢咸陽今長安東漢洛陽今西京魏鄴今相州呉初武昌今鄂州後建鄴今建康蜀成都西晉洛陽東晉建康宋建康齊建康梁建康陳建康元魏初雲中後洛陽北齊鄴後周長安隋長安首山唐長安梁汴今東京後唐汴晉汴漢汴周汴宋朝汴中興杭辨古今州郡區域區域之建肇自古初以迄于今上下數千百載間離合分併増省廢置不勝紜煩故有境土雖同名稱或異為梁一也而有南有大有少焉今汝州梁縣為南梁皇都浚儀縣為大梁州韓城縣為少梁為蔡一也而有新有上有下焉新蔡上蔡今蔡川縣下蔡今頴川縣是也三齊三楚之既别齊與濟北膠東是為三齊江陵為南楚彭城為西楚呉為東楚三蜀三吳之已殊三蜀謂蜀都漢髙分置廣漢武帝分置犍為三呉今蘇潤湖州或取名於列宿則曰營曰婺隋置婺州取婺女星之分為名營州亦然或率循於姓氏則為姚為蒙姚州人皆姚姓蒙州亦皆蒙姓以至地列荆揚方分陜右南齊以荆州為陜西葢比周召分陜之義青齊沃壌復號東秦慕容徳初議所都潘聰曰青齊沃壌號曰東秦載籍所𫝊不可不辨區域之興古别九州西漢以十三州統治晉分天下為十九州唐分為十道宋朝分為二十三路古豫今東京南京曹單亳虢陜及京西路徐滑郢金房信陽之地古兖今北京滑濮濟鄆恩德博濵𨽻滄分乾寧永靜之地古青今齊青海濰宻登萊及遼東之地古徐今宿泗滁沂淮揚漣海之地並屬京西南地分河北東西京東東西路在漢亦兖豫州青徐等州二十九郡國之地在晉豫兖司等州六郡即古之豫司兖青冀等州九郡即古之兗徐豫揚州四郡即古之徐青平等州四郡即古之青唐之河南道古冀今信安保定瀛莫深洺磁相西南盡河之地屬河東河北東西路在漢冀得司𨽻幽并等州十郡國之地冀參幽州得司𨽻幽冀等州二十郡在晉即幽司冀平等州列郡在唐冀為河東道冀參古幽為河北道古雍今華州永興河之西渭之北岷洮西北至𤓰沙之地屬鄜延等五路在漢司𨽻凉并等州十二郡之境在晉即司雍秦凉等州諸郡唐之關内道古梁今疊宕階成鳳商金房及四川除施黔之地屬成都等四路古荆今施黔黄郢信陽分興國及荆湖以西之地屬荆湖南北路在漢古荆參梁即司𨽻荆涼益等九郡之地古雍參梁即涼州八郡之地在晉荆得荆州五郡之地梁得秦雍梁益荆等州之地在唐梁為劒南道分荆梁為山南道分梁雍為隴右道古揚州今潮州及福建路浙淮南滁宿亳黄泗漣海之地屬淮南東西江南東西兩浙福建等路在漢即豫荆揚等州八郡國之境在晉即揚州五郡唐之淮南道古揚之南境今廣南東西路漢交州九郡之地晉交廣等州列郡唐之嶺南道古揚之北境今兩浙江南東西淮南西荆湖南路漢荆揚州十郡國晉荆揚等州列郡唐之江南道古今地理廣狹禹别九州東漸于海西被于流沙朔南暨聲教葢中國之地方五千里周制九州分七千里至秦分天下為三十六郡與黔中南海桂林上郡為四十東南至海西洮北漠漢之盛時四履之地東樂浪西燉煌南日南北鴈門西南永昌東西九千里南北方三千里五代承三國之後冠帶之國盡秦漢故地隋之世東南盡海西抵沮沬北距五原唐初分為十道及平髙昌拓四鎮比之漢代南北則同東不及而西過之覊縻之地皆受節制宋朝土宇與古齊盛凡使者所部分為二十三路其四方蕃夷之地唐賈魏公所載凡數百餘國今列其著聞者又參考𫝊記以敘其盛衰本末至如西有江海諸國西北有奄蔡北有骨利斡者北距大海東北有流鬼不知其地以其不通名貢而无患於中國今畧不載辨四瀆河出崑崙江出岷山松州嘉城縣甘松嶺下淮出唐州桐栢山濟出王屋山今孟州始禹道沇水而為濟截河南渡東流與菏澤故水㑹又北東入於海兖州在濟河之間濟發源為名今濟州乃非景也至周置兖州兼得今郡之地而濟水自王莽末入河因同流入海是則濟河之地无濟水矣自後所立皆集舊名兼有濟南如漢之淄濟晉唐之齊州濟北如漢晋之濟州濟陽如漢之曹濮晉唐之曹魏等郡國葢建置之際未之審也辨三江自豫章而下入于彭蠡而東至海為南江自蜀岷山至于九江彭蠡以入于海為中江自嶓冢導漾東流為漢過三澨大别以入于江匯于彭蠡以至于海為北江自彭蠡以上為二自夏口以上為三下而過秣陵京口以入于海則不復三矣辨河源河出崑崙曰劉元鼎常使吐蕃見其源自别館界來吐蕃之人皆云山在國中今澶州東北葢秦決而注魏也辨九河九河之名徒駭太史馬頰覆釡胡蘇鉤盤鬲津簡與潔按九域志鬲津徒駭在今瀛州鉤盤太史胡蘇在今滄州曰篤馬河者即馬頰也在今濟州其他覆釜簡潔漫不可考當在東光成平鬲縣南北之間以漢許商之言考之徒駭最北鬲津最南葢徒駭是河之本道東分為八齊小白塞之為一今河間弓髙以東至平原鬲津往往有其遺處葢塞其八枝併使歸於徒駭也辨江漢汴泗按禹貢浮于淮泗達于河葢水勢自淮泗入河必道於汴世謂隋煬帝始通汴入泗非也觀晉王濬伐吳杜預與之書曰自江入淮逾於泗汴泝河而上振旅還都則由汴可以入泗吳王夫差開溝通水與晉㑹于黄池則自江可以至淮辨伊洛瀍澗伊水出洪農盧氏縣熊耳山東北入洛洛水出洪農上洛縣冢嶺山東北至鞏縣入河瀍水出河南穀城縣潛亭北東南入洛澗水出洪農新安縣東北入洛伊瀍澗三水入洛合流而入河辨五岳中嵩山在西京東太山在兖南衡山在潭西華山在華北恆山在定州辨五嶺大庾嶺一名塞上在䖍州水明嶺本都龎在道州白芒嶺本畛諸亦在道州臘嶺本騎田在郴州臨源嶺本越在今桂州辨華山九域圗載疏云華山泗州之際東北曰冀東南曰豫西南曰梁西北曰雍以華山十字分之四隅乃四州也辨非九州之地伊州在燉煌北大磧之外為戎狄之地非九州之限四州漢時車師前王之庭庭州在流沙之西北前漢烏孫之舊壌後漢車師後王之庭安西都䕶府本龜兹國南越自嶺而南當唐虞三代為蠻夷之國是百越之地亦可謂之南越或云南越之君亦夏禹之後也按甌越閩越禹後少康庶子所封之地即南非闕種也故地理志云東南二越其義詳矣或曰自交趾至于㑹稽七八百里越雜處各有種姓故知皆非少康後古謂之雕題王制曰南方曰雕題非禹貢職方之地晋書隋書並以交廣之地為禹貢揚州之域稽其同略考其鎮藪則禹貢職方皆不及此故列於九州外太一曰未畫野晉書曰昔者元胎旡象太素流形對越在天以為元首則記所謂冬居營窟夏居櫓巢飲血茹毛未有絲麻者也及燧人鑽火庖犧氏出震風宗下武炎嗣昌基畫野旡聞其歸一揆神農始有里數皇甫説帝王世紀曰自天地開闢未有經界之制三皇尚矣諸子稱神農之王天下也地東西九十萬里南北八十五萬里黄帝推分星制天下黄帝受命乃推分星方制萬里畫壄分州得百里之國萬區易稱首出庶物萬國咸寧顓頊帝嚳始别九州顓頊之所建帝嚳受之創制九州統領萬國北至幽陵南暨交趾西導流沙東極蟠木日月所照莫不底焉是以制萬國而建九州黄帝方立萬國帝嚳始置九州按孔安國注云冀州帝都不説境界以餘州所至則可知兖州東南距濟西北距河青州東北距海西南距岱徐州東至海北至岱南及於淮揚州北距淮南距海荆州北距荆山南及衡山之陽豫州西南至荆山北距河梁州東距華山之陽西距黒水雍州西距黒水東距河堯立九州堯遭洪水而天下分絶使禹平水土還為九州如舊制也晉志云昔在帝堯叶和萬邦制八家為鄰三鄰為朋三朋為里五里為邑十邑為都十都為師州十有二師焉舜十二州之制舜攝帝位分為十二州故虞書云肇十有二州注云析冀為幽并析青為營又東坡指掌圗云堯遭洪水天下分絶使禹平之為九州如帝嚳之制至舜肇十有二州葢以古冀州南北濶大分衞水為并州分燕以北為幽州以青州越海析遼東之地為營州禹貢九州之制夏氏革命又為九州塗山之㑹亦云萬國書曰冀州既載濟河惟兗州海岱惟青州海岱及淮惟徐州淮海惟揚州荆及衡陽惟荆州荆河惟豫州華陽黑水惟梁州黑水西河惟雍州晉志云夏后氏東漸于海西被于流沙南浮于江而朔南暨聲教章亥所步莫不率俾㑹群臣于塗山執玉帛者萬國於是九州之内作為五服天子之國内五百里甸服百里賦納總二百里納銍三百里納秸服四百里粟五百里米甸服外五百里侯服百里采二百里任三百里侯侯服外五百里綏服三百里揆文教二百里奮武衞綏服外五百里要服三百里夷二百里蔡要服外五百里荒服三百里蠻二百里流訖于四海弼成五服五服至于五千里夏徳中微遇有窮之亂少康中興不失舊物自孔甲之後以至于桀諸侯相兼其能存者二千餘國方於塗山十損其七矣殷商封國晉志曰成湯取桀於焦遷鼎于亳伊摯仲虺之徒大明憲典王者之制爵禄公侯伯子男凡五等天子之田方千里公侯皆方百里伯七十里子男五十里不能五十里不合於天子附於諸侯曰附庸凡四海之内九州州方千里建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國名山大澤不以封其餘以為附庸閒田八州州二百一十國天子之縣内百里之國九七十里之國二十有一五十里之國六十有三凡九十三國名山大澤不以班其餘以禄士以為閒田凡九州千七百七十三國天子之元士諸侯之附庸不與天子百里之内以供官千里之内以為御千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬於天子之老二人分天下為左右曰二伯千里之内曰甸千里之外曰采曰流天子使其大夫為三監監於方伯之國國三人天子之縣内諸侯禄也外諸侯嗣也商因夏制漢志曰殷因於夏旡所損益晉志曰夏功在唐堯殷因旡所損益夏氏革命又為九州塗山之㑹至者萬國四百年間遞相兼并殷湯受命其能存者三千餘國亦為九州分統天下載祀六百周并體國經野周既克殷監于二代而損益之定官分職改禹徐梁二州合於雍青師古注云省徐州以入青州并梁州以合雍州分冀州之地以為幽并分天下為九畿方千里曰王畿其外曰侯畿又外曰甸畿又外曰男畿又外曰采畿又外曰衞畿又外曰蠻畿又外曰夷畿又外曰鎮畿又外曰藩畿職方氏掌天下之圖辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人東西曰揚州其山鎮㑹稽其澤藪具區正南曰荆州其山鎮衡山其澤藪雲夢河南曰豫州其山鎮華山其澤藪圃田正東曰青州其山鎮沂山其澤藪孟豬正西曰雍州其山鎮嶽山其澤藪弦蒲東北曰幽州其山鎮醫无閭其澤藪貕養河内曰冀州其山鎮霍山其澤藪楊紆正北曰并州其山鎮恆山其澤藪昭餘祁周禮注云揚荆豫兖雍冀與禹貢略同青州則徐地也幽并則青冀之地也无徐梁春秋列國武王克殷光有天下兄弟之國十有五人姬姓之國者四十人爵五品而土三等公侯百里伯七十里子男五十里不滿者為附庸葢千八百國成王時亦曰九州屬職方氏其後諸侯相併有千二百國及平王東遷迄獲麟之末二百四十二年間諸侯征伐更相吞滅不可勝數而見於春秋者百二十四國蠻夷戎狄不在其數逮乎下分地理上配天象所定躔次摠標十二鄭宋晉呉衞秦齊陳楚蔡杞燕漢志曰至春秋時尚有數十國五伯迭興緫其盟㑹師古曰此五伯謂齊桓宋㐮晉文秦穆楚莊也戰國七雄陵夷至於戰國天下分而為七師古曰謂秦韓魏趙燕齊楚七國也合從連橫經數十年而兵革不息通典云初平王時雒邑與宗周制京也通封畿東西長南北短相覆為千里後為諸侯所侵比周之亡七城而已即河南洛陽新城平隂偃師鞏緱氏是也按七邑之境西自河南洛陽南自伊闕緱氏東至鞏縣北至于河秦置三十六郡秦兼并四海以為周制微弱終為諸侯所喪故不立尺土之封分天下為郡縣盪滅前聖之苗裔靡有孑遺者矣始皇初并天下懲㣻戰國削罷列侯分天下為三十六郡三川河東南陽南郡九江章郡㑹稽潁川碭郡泗水薛郡東郡琅邪齊郡上谷漁陽右北平遼東遼西代郡鉅鹿邯鄲上黨太原雲中九原鴈門上郡隴西北地漢中巴郡蜀郡黔中長沙凡三十五郡與内史為三十六郡也於是興師踰江平取百越又置閩中南海桂林象郡凡四十郡郡一守焉其地則西臨洮而北沙漠東縈南帶皆臨大海周平王東遷洛邑以岐豐之地賜秦㐮公至孝公作為咸陽今咸陽縣築冀闕徙都之謂秦川亦曰關中至始皇始并天下分置三十六郡郡各領縣二萬戸以上為令减萬戸為長後平百越又置四郡郡置一守一丞兩尉以典之監侍御史掌監諸郡西漢郡國漢興因秦制度崇恩德行簡易以撫海内至武帝攘却胡越開地斥境南置交趾北置朔方之州兼徐梁幽并夏周之制改雍曰涼改梁曰益凡十三郡置刺史本秦京師為内史分天下作三十六郡漢興以其郡太大稍復開置又立諸侯王國武帝開廣三邊故自髙祖増二十六文景各六武帝二十八昭帝一訖於孝平凡郡國二百三縣邑千三百一十四道三十二侯國二百四十一地東西九千三百二里南北萬三千三百六十八里提封田一萬萬四千五百一十三萬六千四百五頃其一萬萬二百五十二萬八千八百八十有九頃其邑居道路山川林澤羣不可墾其三千二百二十九萬九百四十七頃可墾定墾田八百二十七萬五百三十六頃漢極盛矣漢祖隆興革秦之弊分内史為三郃更置郡國二十有三桂陽江夏豫章河内親郡東漢楚國平原梁國定㐮泰山汝南淮陽千乗東萊燕國青河信都常山中山渤海廣漢涿郡合二十三郡三内史者河上渭南中地也地理志曰髙祖增三十六武帝改河上渭南中地以為京兆馮翊扶風是為三輔也文増厥九廣平城陽淄川濟南膠西膠東河間廬江衡山武帝改衡山曰六安景加其四濟北濟陰山陽北海也宣改濟北曰東平武帝開越攘胡初置十七南海蒼梧鬱林合浦交阯九真日南朱崖儋耳九郡平西南夷置䍧牱越嶲沈黎汶山犍為益州六郡西置武都郡又分立零陵郡合十七郡拓土分疆又増十四𢎞農臨淮西河朔方酒泉陳岳安定天水𤣥莬樂浪廣陵燉煌武威張掖昭帝少事又増其一金城至平帝元治二年凡新置郡國七十有一與秦四十合一百一十一改雍曰涼改梁曰益置徐州復夏舊號南置交阯北有朔方凡為十三部凉益荆揚青豫兗徐幽并冀十一州交趾朔方三刺史合十三部史記云西南夷君長以十數夜郎滇卭都徙筰都冉駹白馬最大皆巴蜀西南外蠻夷漢武建元六年唐蒙説上通南夷夜郎司馬相如亦言西夷卭筰可置郡後平南夷置䍧牱郡冉駹皆震恐請臣置吏乃以卭都為越嶲郡筰都為沈黎郡冉駹為汶山郡廣漢西白馬為武山郡滇為益州郡又晉志始秦惠王㓕蜀置郡以張若為蜀守及始皇置三十六郡蜀之郡名不改漢初有漢中巴蜀髙祖六年分蜀置廣漢凡為四郡武帝西南夷更置犍為䍧牱越嶲益州四郡凡八郡遂置益州統焉益州葢始此也又晉志昔周武王封召公於燕及秦滅燕以為漁陽上谷右北平遼西遼東五郡漢髙帝分上谷置涿郡武帝置十三州幽州依舊名不改以後開東邊置𤣥莬樂浪等郡亦皆属焉又晉涼州志周衰其地為狄秦興羡陽甘泉宫本匈奴鑄金人祀天之處匈奴既失甘泉又使休屠渾邪王等居凉州之地二王以後地降漢漢置張掖酒泉燉煌武威金城謂之河西五郡改周之河州為凉州葢以地處西方常寒凉也地勢西北斜出南隔西羌西通西域斷匈奴左臂通典云昔漢武置朱崖儋耳二郡昭帝省儋耳置朱崖元帝又罷朱崖以其阻絶數反云晉志曰漢興創艾亡秦孤立而敗於是割軍封疆立爵二等功臣侯者百有餘邑于時民罹秦項戸口彫敝大侯不過萬家小者五六百戸而尊王子弟大啓九國古者有分土旡分民若乃跨州連郡小則十有餘城以戸口為差降畧封疆之逺近所謂分民自漢始也起鴈門以東盡遼陽為燕代常山以南太行左轉渡濟漸于海為齊趙穀泗奄有龜蒙為梁楚東帶江湖薄㑹稽為荆呉北界淮瀕畧廬衡為淮南波漢之陽亘九嶷為長沙諸侯比境周匝三垂外接胡越天子自三河東郡潁川南陽自江陵以西至巴蜀北至雲中西至隴西與京師内史凡十五郡漢異姓八王之地漢書云昔髙祖定天下功臣異姓而王者八國張耳吳芮彭越黥布臧荼盧綰與兩韓信皆得列土南面稱孤漢五年以魏故地封彭城越為梁王都定陶今曹州封黥布為淮南王都六今夀州縣九江廬江衡山豫章皆屬焉以長沙豫章象郡桂林南海立吳芮為長沙王都臨湘韓王信初都陽翟上後以信壯武北近鞏雒南迫宛葉而有淮陽皆天下勁兵處也乃更以太原郡為韓國徙信以備胡都晉陽今太原韓信初王齊後徙封楚王都下邳今淮陽而按本𫝊不載所封地據楚元王傳信以反誅分其地為二一以封别王一以封楚張耳居趙都㐮國今邢州臧荼王燕都薊皆如故地後盧綰以從征荼有功因以燕地封之漢呉楚七國漢史髙祖六年既廢韓信分其地為二國以東陽郡鄣郡吳郡五十三縣立劉賈為荆王後以荆地封吳王濞更以廣陵國屬吳按濞本𫝊呉有豫章之地以碭郡薛郡郯郡三十六縣立交為楚王至孫戊嗣國孝又敗分故齊地以膠東封雒渠以汶川封賢以膠西封功以濟南封辟光又割趙之河間而以餘故趙地封幽王子遂為王東漢郡國世祖中興惟官多役煩乃命并合省郡國十縣邑道侯國四百餘所明帝置郡一章帝置郡國二和帝置三安帝入命属國别領北郡者六又所省縣漸復分置至于孝順九郡國百有五縣邑通侯國置皆无郡名而不復列上中下之目其後有方鎮史官不録於地理之書以為方鎮兵伐之事非職方所掌故也唐置十五道城理明皇開元二十一年又因十道分山南江南為東西道増置黔中道又京畿都畿置十五采訪使如漢刺史之職京畿理西京今長安都畿理洛陽今西京闗内多以京官遙領河南理陳留郡河東理太原河東河北理魏郡隴西理鄯西平山南東理㐮陽山南西理漢中郡劒南理成都蜀淮南理揚廣陵郡江南東理吳郡江南西理豫章郡黔中理黔中郡嶺南理南海郡及天寶盜起中國用兵而河西隴右不守陷于吐蕃自禄山之亂河右曁鄯武疊宕等郡皆没于吐蕃代宗寶應元年又陷秦渭洮臨廣徳元年復陷河蘭岷廓徳宗正元二年陷安西北庭隴右州縣盡矣河北道覊縻州突厥之别部及奚契丹靺鞨降胡髙麗為府十四州四十六𨽻幽州都督安東都䕶府關内道突厥回紇党項吐谷渾為府二十九州九十𨽻靈夏延慶州都督并單于安北都䕶府隴右道突厥回紇吐谷渾之别部及龜兹于闐焉耆疎勒河西内屬諸胡西域十六國為府五十一州百九十八𨽻秦凉林松都督并安西都䕶府江南道蠻為州五十一𨽻黔州都督府嶺南道蠻為州九十二𨽻峯桂邕都督并安南都䕶府劒南道羌蠻為州二百六十一𨽻松茂姚嶲黎雅戎千一百八十東觀書曰桓帝永興元年鄉三千六百八十二亭二千四百四十三晉志云光武投戈之嵗在則耗之辰郡國蕭條并省者八城陽淄川髙宻膠東六安真定泗水廣陽建武十一年省州牧復為刺史貟十三人各掌一州明帝置一永昌章帝置二城呉郡和順改作其名有九和帝置淮北廣陽順帝改淮陽為陳楚為彭城濟東為東平臨淮為鍾離千乗為柴安信都為安平天水為漢陽省朔方刺史合之於司𨽻凡十二部其與西漢不同者司𨽻校𨽻部郡治河南朔方𨽻於并部而郡國百有八焉省前漢八置五改舊名七因舊九十六少前漢二也桓靈頗増於前復置六郡桓帝置髙陽髙平西陵靈帝置南陂番陽零陵東有樂浪南永昌郡四履之盛亦如前漢云羣書考索卷五十九
