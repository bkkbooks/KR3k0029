body:
  text: 羣書考索續集卷三十五宋章如愚編官制門漢館閣漢石渠石室延閣廣内蘭臺麒麟天禄之屬皆在内禁杜佑云漢凡圖書所在有石渠石室延閣廣内貯之於外府又有御史中丞居殿中掌蘭臺祕書及麒麟天禄二閣藏之於内禁及考三輔舊事石渠閣在未央大殿北以藏祕書則石渠不得謂之外府劉歆七録亦云外有太常太史博士之藏内有延閣廣内祕室之府則延閣廣内皆為禁中之藏明矣武帝建藏書之策置寫書之官祕府書稍充集成帝復求遺書於天下輯羣書總之而為七閣而漢之書籍始備於此是以漢之祕書多在於天禄非大夫侍中不預此選劉向光禄大夫劉歆侍中揚雄以大夫校書天禄閣而石渠則為諸儒講論五經之列而以博士處之蘭臺石室則在殿中而為史官著述之所蘭臺掌圖籍祕書通典云漢中丞在殿中有石室藏祕書圖䜟之屬司馬遷為太史令紬石室書而明帝亦以班固為蘭臺令按光武本紀及諸傳記通典又云漢之蘭臺及後漢東觀皆藏書之室亦著述之所當時文學之士使校讎於其下故漢之校書講筵修史三者皆處於内禁其大畧可睹矣東萊漢魏晉唐館閣之職按六典祕書郎四人從六品上分掌四部書以甲乙丙丁為之目昔漢武帝聚天下文籍於庫内謂之中祕書魏晉之際祕書與中書或分或合故云職近日月宜居三臺之上丞郎之任與南宫相亞歴代辨論與時輕重唐國初思漢廷延閣之舊制江左貴遊之選始以岑江陵虞永興褚河南迭為之厥後彬彬多文學之士然則先王之法志官師之訓典九流百氏如貫珠然學與仕皆優而還相為用者其在茲權德輿祕書郎壁記唐館閣唐中宗以術士為祕書監明王立政不惟其官惟其人葢聖人命官必得其人以居之然後為重茍非其人而授之何足道哉太宗之世以祕監而命魏徴虞世南顔師古則祕書之官安得而不重中宗以術士鄭普思為之則其官安得而不輕林少穎唐史論宋館閣宋朝語曰寧登瀛不為卿寧抱槧不為監此言館閣之貴也故兩府闕人取之館閣館閣其育材之地歟真宗朝出於館臺者必為卿相其不至卿相而為名臣者不可悉數其職任不輕也嘗攷祖宗之制三館創於興國祕閣創於端拱儲積富矣崇文之籍祕閣之書寵榮多矣有直館有直院有祕閣有校理校勘員職備矣官制之行併其職於祕書省元祐復之紹聖罷之宣和又復之中興以來隨罷隨復此其建置之制也而取人之路凡三焉進士髙科一也大臣論薦二也歳月酧勞三也舊制進士三人以上及制科及第者一任即試進士第四五者二任治平以來進士第一人制科第三等加之兩任餘不與試至於熈寧則不復試矣舊制兩府初除各舉三兩人即與召試治平以來大臣所舉籍之於簿候其有闕方與㸃試至於熈寧則不復試矣此猶未足慮也館閣華選本育英才而使膏粱子弟育焉此固可慮也而猶未足深慮也得一魯宗道則不肯以處子弟矣得一吕公著則雖召試且不屑就矣所可深慮者其惟貼職乎祖宗朝搢紳宿望治效顯著欲示優恩故令貼職元豐罷直院直館而有直閣所以存者為貼職也元祐初館職雖復貼職尤繁故浸輕其選迨至政和弊濫之甚宋三館祕閣四處藏書前世藏書分𨽻數處葢防水火散亡也今三館祕閣凡四處藏書然同在崇文院其間官書多為人盜竊士大夫家往往得之嘉祐中乃置編校官八員雜讎四館書給百人以黄紙寫之自此私家不敢輙藏校讐累年僅能終昭文一館之書而罷筆談宋有龍圖閣祕書監崇文院國子監况今歴代墳籍畧無亡逸内則有龍圖閣中則有秘書監崇文院之列三館國子監之印摹書雖漢唐之盛無以加此文粹序宋置昭文集賢史館祕閣之異名祕閣之設其來久矣晉宋已還皆有其號惟宋朝所以建閣之制實因於漢唐漢有天禄石渠蘭臺金馬與夫承明著作之庭又有東觀亦列禁中命名雖殊而所以崇文之意一也宋因之故有昭文集賢史祕閣之號葢取諸此有唐太宗始命十八學士更直閣下夜分論藝有補於治宋因之故有校理著作祕書正字之異職葢取諸此且五代之後三館雖存而湫隘喧囂僅蔽風雨惟宋太宗皇帝混一區宇鋭意文藝太平興國二年車駕臨觀喟然歎曰若此之弊烏足以待天下賢俊遂命有司度地昇龍門左督工經營棟宇之制煥然一新三年畢工乃錫名曰崇文又發明詔求遺書小則償以金帛大則授之以官凡先聖墨迹與夫古史圖畫不數載間充祕書府端拱元年又即其中堂建祕閣飛白二字以光其名車駕臨幸喜形於天顔至徽宗即位之二年乃詔將作監更加修營興工於建中靖國之冬昭文集賢史館之異相為環列所謂祕閣者實總其中而昭文書庫列於東廊集賢書庫列於南端史館書庫列於西序乃以崇寧元年告成王巖叟重修祕閣記宋館閣職任之濫館閣者圖書之府長育英材之地也從官於此乎次補執政於此乎遞升故士非學術藝文屹然為一時之望者莫得而居之可謂天下之妙選矣今中材凡吏一為大臣之所論薦則得居其位嘗有金榖之細兵刑之勞則皆得假其名嗚呼近年以來校書正字之職龍圖集賢之號何其紛紛也秦淮海文集同前嘗任臺省之職或任漕刑之司者人心有所不厭而莫為之寵則往往假以龍圖集賢之號夫龍圖集賢之號所以待天下文學之士也而以諸吏莫為之寵而假焉豈非乖資望之甚歟同上宋館職不輕於授人人亦不敢輕進宋自孟蜀既平圖籍之入於内府者不可勝計校讐之選皆世之聞人廬陵歐陽公嘗曰館閣儲材之地也請益重其選公非易夫人也慮其濫而授則人將濫而進金陵王公嘗召試館職矣力辭而不就公非矯夫俗也慮其例而得則人必例而求東萊宋館閣多為貼職三館招文集賢史館也有學士有修撰諸閣龍圖天章寶文之類有學士有直學士待制皆有職掌官制行始為貼職其職隸祕書考宋舊制惟觀文資政端明殿學士無官守職掌並以寵大臣之去位者其他三館諸閣雖曰職名實有職守所以厲行義文學之士官制行薦試之法不立校讐之職無與劉公摰有不察流品之戒王公巖叟有車載斗量之誚蔡京復増其目而置修撰之虛名凡六等於是詔謂天下人才富盛職名寡少不足以延多士增置貼職凡九資今後依此遷授自此而密矣蔡攸方以此夸京之長見於國史外補證父攘羊又從而文之是可悲矣職名祖宗以來重之以集賢殿修撰後改右文與直龍圖閣直祕閣分為三等政和中二浙福建諸路監司郡守往往變通内官多以應奉有勞遷職遂有未嘗朝覲天子忽為待制班從官者蔡京不樂六年因增其目置修撰與舊為三等曰集賢殿修撰右文殿修撰祕閣修撰直閣與舊為六等曰直龍圖天章閣寶文閣顯謨徽猷祕閣朝廷除授自此密矣舊貼職無雜壓至是増置雜壓於是詔謂云云此蔡國史外補新義祕書總論本係監省以與館閣互有沿革故特附於此宋太平興國中始建三館及端拱初復置祕書閣擇三館書籍藏之皆在崇文院然祕書官本為寄禄至元豐則有實職三館本有職掌至元豐則為貼職由改制之始以崇文院為祕書省既罷館職盡以三館職事歸祕書故也以彼易此朝三暮四猶未害也至於館職之與祕書皆為虛名則甚害也夫祕書之設即周之大史小史外史漢之天禄東觀唐之蘭臺麟閣也自劉向揚雄馬融以來世有校讐撰述今其書具存不徒辨九流七畧守中經四部而已也元豐既以祕書代館職則自監少丞郎至於正字其屬有五迨今居是職者復無異於寄禄豈今之學與古異耶職畧云元豐以著作郎林希為大著著作佐郎豐稷為小著皆一時選豈盡取一時有用之文士而置之無用之地耶紹興重建祕書省紹興之間十三年十一月建十四年二月成重建祕書省右文殿居中列四庫於殿前祕閣居後石渠次之道山堂又次之著作廷居後宸翰殿閣二牌是歳七月丙子車駕臨幸焉詞目要録史館史館總論宋史館又謂之國史院有判館事有修撰官此常職也宰相監修朝官修撰京官檢討此常制也仁宗天聖中修真宗史宰相提舉執政修史㕘樞殿學閣學同修三館祕閣校理編修重其事也元豐紹聖國史悉隸祕書而修史則以别曹翰學為之同修則以侍郎為之由館閣盡為貼職故史局無定所修史無定員也東坡詩中嘗有新掃舊巢痕之句葢自歎嘗為館閣之職至是舊迹一掃而空也故凡元豐紹聖大臣所以為是紛更者無非顧慮修史者或紀新法官制之非是於是擇其同己者用之而異己者即擯之耳於是蔡京為左史蔡卞為右史元豐則起居注非其實矣又以林希為大著豐稷為小注則著作失其真矣坡詩又云朅來東觀弄丹青聊借舊史誅奸强葢亦微寓其思昔之意焉夫天子不觀史古道也唐自李林甫置史館於禁中姚璹請撰時政記以進御而宋遂沿襲以為故事天子不能無觀史之失矣夫日記起居則為起居注月記時政則為時政記排次起居時政則謂之日歴總集日歴則為一朝實録積集累朝實録則為一代全史今也起居郎舍人之職不侍左右固無以知言動之實而時政進御宰臣監修又從而遷就焉作宋一經果何所據而為之雖然中興以來即祕書省復建史館以修神宗哲宗實録乾道中改修蔡攸所編宋會要重編入熈寧中事於是熈豐元祐紹聖之所因革治亂興王之所由係炳然在眼不啻丹青彼欺君者亦徒為是紛更而已外有玉局所係編年以紀帝系及夫政令之因革為玉牒熈寧中於三班院置局元豐以隸宗正寺又有勅令所編叙勅令格式乾道中亦復刪削建炎已前牴牾號為詳定司有刪定官唐世崇尚史館故史官記事最詳臣竊考唐貞觀職官故事天子御正衙則起居郎居左舍人居右有命則臨陛俯聽退而書之每仗下議政事亦必隨輔臣入殿執筆記録於前史官隨之及仗在紫宸内閤則夾香案對立殿下上記得失繇是事之機要言之微密人之忠邪皆得書之方册昭示將來明主賢臣之事罔或缺遺一代之典文燦然大備且唐天下垂三百年號稱至治莫盛於貞觀而謀猷設張制度文采勲績治效必可法於後世而當時崇尚史官載録如此繇今考之事之存者猶十之五六此史官之不可不如故事也石公弼大觀三年為起居郎上徽宗古者史官皆世掌與久任今史官亟拜亟罷古者史官皆世掌故司馬談之後則有司馬遷班彪之後則有班固如揚子雲亦是司馬遷之甥故最為通史其時史官韋述掌圖書四十年任史官二十三年劉知幾三十年蔣義二十年葢作史不可造次須是有傳授兼識得他本末方可故必當久任今之史院編修與史實録玉牒等官往往亟拜亟罷著作未成不免棄去故作史不出一人之手本末易以失序多所乖異要不若久任之善也東萊吕氏博議唐韋述只是史才不比春秋時史官忠義韋述只是史才其為人亦止以一史自是故禄山之亂獨抱國史藏南山他意思只道職於作史故抱史以往更不思量自身以上事至於臨陷賊汚偽官卒以貶故不食而死若是春秋時人如董狐於趙盾弑君事書法不隠齊崔氏之事書而死者三人南史執簡而往聞己書而退如此等人直是寧可死節不肯自屈韋述只知抱史豈知節義者使董狐諸公處此則禄山之事必將直書於策矣同上古無國無史史未嘗一日無書竊惟自古無國無史史未嘗一日無書晉謂之乗楚謂之檮杌魯謂之春秋以此見無國無史也春秋以事係日以日係月以月係時以時係年必四時具謂之編年以此見史未嘗一日無書也漢法太史公位丞相上天下計書先上太史公副上丞相唐及宋宰相皆兼史官其重如此故書榻前議論之辭則有時政記録柱下見聞之實則有起居注類而次之謂之日歴修而成之謂之實録所以廣記備言垂一代之典也龍溪汪内翰文集宋史官脩撰多簡畧遺失史者國家之典法也自君臣善惡功過與其百事之廢置可以垂勸戒示後世者皆得書而不隠故自前世有國者莫不以史職為重伏見宋之史以宰相監修學士修撰又以兩府之臣撰時政記選三館之士當陞擢者乃命修起居注如此不為不重矣然近年以來員具而職廢其所撰述簡畧遺漏百不存一至於事闗大體者皆没而不書此實史官之罪然其弊在於修撰之官惟據諸司供報而不敢書所見聞故也時政記雖是兩府臣寮修纂然聖君言動有所宣諭臣下奏議事闗得失者皆不記録惟書除目辭見之類重於起居注亦然與諸司供報文字無異修撰官祗據此銓次係以日月謂之日歴而已是以朝廷之事史官雖欲書而不得書也云云加以日厯時政記起居注例皆承前積滯相因故纂録者常務追修累年前事而歳月既逺遺失莫存至於事在目今可以詳於見聞者又以追修積治不暇及之歐陽修上仁宗寺監寺監六典之制漢有寺監無六典唐有六典無寺監宋兼之而事皆重複既設尚書六曹於上使百司有所凂屬又置寺監於下而百司復得分隸故六曹之事裁决已定上翻行於寺監寺監所受聽其符報諸司並無可否於其間而空有稽留之弊曷若使六曹文符指揮直抵諸司何其簡且便也文公寺監總論周典三孤與六卿合而為九即秦漢以來三公三省之任也八座六部已不足以况之矣是豈九寺之卿之比耶即令揆古六部已冗於周而况於寺監乎國初寺監猶為寄禄至元豐而備官至崇觀宣政而濫矣中興併省以光禄鴻臚歸禮部以衞尉歸兵部以太僕歸駕部是九寺止存其五也以少府入將作太府以殿中内侍入内侍省以都水歸水部是七監止存其三也祕書不係監司添改為局以此集事猶覺擾閑雖併於六部可也梁武帝方循漢制增為十二卿而有春夏秋冬之名是果非觀美之具耶今九寺止存太常宗正大理司農太府以入禮刑戸部亦可耳今二監止存國子將作軍器以入工部亦可也然太常大理自漢以來多與禮部刑部兼存者禮刑事重體大故中興獨不併省也唐世建官之繁今唐既有六尚書又有九寺卿合周漢而並用之不幾於繁乎且一尚書之分為其屬者有四是為二十四司矣二十四司之屬有侍郎有郎中有員外郎然則何所不包而亦何所不任也大司農少府户部職也太常宗正禮部職也大鴻臚禮部之主客也光禄勲但供良醖禮部之膳部也衞尉掌軍器儀仗帳幙兵部之庫部也太僕兵部之駕部廷尉刑部也而其餘四監以禮兵一部隸之亦可也東萊議論唐世置使之贅官制之濫未有如唐之甚也六官周制也九卿漢制也漢雖不如古其一代制度猶可言者唐之職官曰省曰部曰臺曰寺曰監何如是其多也六部擬周而作也九寺五監復兼漢而用之其為美觀乎抑求備於周漢乎户部司徒也而司農太府則一司徒而三之也禮部宗伯也而太常鴻臚宗正祕書監則一宗伯而四之也工部司空也而少監將作軍器都水監則一司空而五之也刑部理刑而大理寺復理刑兵部主兵而六軍十六衞復主兵吏部一職僅免重複之弊内而知銓外而選補使則其職亦不專矣若夫光禄衞尉皆非漢之舊殿中省既設則與夫太僕者皆可併矣藉曰六部所以舉其要而寺監所以分其目則二十四司果何為者綱紀既煩文移必滯將有所不行其在當時已病於不振於是皇華四出而百司庶府遂為養賢之地矣始中外財賦之入户部主之既而移於判度支未幾租庸鹽鐵轉運之使出則太府不得知其數比部不得覆其出入而戸部為具員矣中外監牧之任太僕主之既而移於殿中省未幾内飛龍閑廐之使出則尚乗不得預其事監牧不得攷其籍而太僕為具員矣以至館驛有使則駕部廢禮部有使則祠部廢出納有使則庫部廢禮儀有使則禮部廢微而至宫苑鑄錢木炭之屬皆銜命而出則向之所謂省簿寺監不幾於贅員乎當是之時自内而一司外而列郡無慮皆領於使矣吕士瞻官制要論六院四轄倉場庫務附自六部之外有寺監其間不能無冗員故中興以來多從併省然寺監之外有所謂院轄者獨無所損何也葢以治財用者居其半也是故六院之有糧料審計四轄之有權貨務都茶場雜買場左藏庫皆為財也其可省者檢院鼓院有名無實進奏官誥文思不無冗員而已不徒惟是院轄之外又有所謂封樁庫編估打套局惠民藥局酒庫酒税務省倉豐儲倉草料場排岸司無非為財也其可省者車輅騏驥院御前軍器所與駕部庫部軍器監無不重複而已然則當今之有院轄倉場庫務有所不可省者大抵皆為財而財之所給大抵皆為兵其次為官殆不可不推原其故也宗司諸王宫官親王夫宗正古官而寺與司分置自宋朝始方今宗寺掌宗廟陵寢專以纂修譜牒圖籍為職宗司則糾叙皇族而睦之違則糾之名同而所掌異其實皆周官小宗伯之職爾自元豐改制始不𨽻六曹此其離合因革之概也至於宋朝之制王宫官屬有翊善講讀之官直講贊讀記室教授宗司内外則教訓糾舉之令凡在仕版不為相不為將其屬親地近者尊以虛名厚以秩禄而已是故無凌轢王室之變矣然靖康之變亦乏維城屏翰之助者事不兩立故應如此宋非趙氏不王故期親封王而屬尊者封郡王皇子出閤亦封郡王納妃外第則封真王然皆虚名也異姓惟趙普元勲曹彬潘美以女若孫為后故皆封王然亦虛名也故相未有封王者蔡京以紹述而封荆公為舒王何相為清源王又贈韓魏公為魏王以塞朝論而童貫亦封王王爵亦濫矣國子監本係五監今以類相從夫熈豐改制不難知也有生於無實轉為虛不遵古意惟務美名此其志也夫國之有學自堯舜以來莫之能易也宋朝國子監粗容春秋釋奠而太學猶未營建然有判監事有直講官天子臨幸師儒講經實意存焉熈寧初詔用經術取士廣闢黌舍分為三學元豐正名復置國子監掌三學之政令崇寧立辟雍以三舍之法而考選其名則美其實則非者葢先之以三經之義天下惟知尚同申之以三舍之選天下惟知字學甚至以舒王配食孔顔復令士女從觀塑像六經於是乎掃地矣羣書考索續集卷三十五
