body:
  text: 羣書考索卷十五宋章如愚撰正史門隋書類隋史開皇仁夀時王邵為書八十卷以類相從定其篇目至於編年叙傳並缺其體煬帝世惟有王胄等所脩大業起居注及江都之禍仍多散逸貞觀中勑顔師古孔穎達共撰成隋書五十五卷并新撰周史並行於時唐顔師古撰初武徳間命封徳􅂜顔師古修隋史未就貞觀三年復詔魏徵撰房𤣥齡總之為五紀五十列傳惟十志未上又詔于志寧李淳風韋安化李延夀令狐徳棻裒綴三十卷髙宗時上之其志上總梁陳齊周之事書目其篇第雖編入隋書其實别行俗呼為五代志史通魏徵撰紀五列傳五十五長孫無忌等撰志三十天文律厯五行三志淳風獨作晁氏周齊梁陳隋書修撰總類令狐徳棻建元近代無正史梁陳齊文籍猶可據周隋事多脫捐帝於是詔蕭瑀王敬業殷聞禮主魏封徳彝顔師古主隋崔善為孔紹安蕭徳言主梁裴矩祖孝孫魏徵主齊竇璉歐陽詢姚思亷主陳陳叔達庾儉及徳棻主周整振論譔多歴年不能就罷之貞觀三年復詔撰定議者以魏有魏收魏澹二家書為已詳惟五家史當立徳棻與岑文本崔仁師次周史李百藥次齊史姚思亷次梁陳二史魏徵次隋史房𤣥齡總監修撰之原目徳棻發之書成遷禮部侍郎兼修國史唐史類初五代晉宰相劉昫撰唐三百年間國史刪為紀二十志三十列傳百五十凡二百卷今謂之舊唐書本朝仁宗時詔歐陽修宋祁刪修史表志則歐公主之傳則宋公主之凡十有七年而成始慶厯五年迄嘉祐五年紀十志五十表十五列傳百五十凡二百二十五卷今謂之新唐書凡廢舊傳六十一増新傳三百三十一又増三志四表書目舊史凡一百九十萬字新史合一百七十五萬九百三十字其事則増於前其文則省於後唐書卷首其後又詔歐公㸔詳宋公所著列傳令刪修為一體公曰宋公前輩且人所見多不同豈可悉如己意於是無改言行録初唐之興温大雅撰創業起居注自是房𤣥齡許敬宗等相次立編年體號為實録姚思亷又撰紀傳其後長孫無忌等因舊書以綴後事龍朔中許敬宗總諸史任所作記傳或曲希時㫖或猥釋私憾凡有毁譽多非實録其後有劉知幾徐堅吳競更撰唐史又修則天實録史通唐栁芳取編年法為唐厯四十卷頗有異聞然不立褒貶義例起隋義寧元年盡大厯十三年太中間崔龜從續之謂之續唐厯凡二十二卷起大厯十三年止元和十五年唐陳嶽用荀恱袁宏例為大唐統紀起武徳盡長慶成一百卷皇朝陳彭年謂唐文物憲章可述獨缺編年之史乃次新書刪其繁文定為唐紀四十篇僅三十萬言起髙祖迄哀帝皇朝吕夏卿撰述新書義例且摘繁文闕誤號直筆新例皇朝吳縝摘舉歐陽修宋祁新書舛駁謬纇為二十門號新唐書糾謬其序曰一曰責任不專二曰課程不立三曰初無義例四曰終無審覆五曰多採小說而不精擇六曰務因舊文而不推考七曰不知刋修之要而各徇私好八曰不舉校勘之職而惟務茍容唐書紀志表則歐陽公主之列傳則宋公祁主之帝紀編年則得於孫氏之南齊録述姚崇十事則得於開元之遺史其贊房杜則本於栁芳其贊邱王則本之吕温傳段秀實則得子厚之文集傳張巡許逺則得之於李翰韓愈傳甄逢甄濟則得之元稹李郭相勉以忠義則得之杜牧韓愈使王庭湊之節舊史不書今乃書之所以明君子之節義也太宗拒魏徵之諫而有殺田舍翁之語舊史則書今乃不書所以掩人君之闕此新史之得也舊史以外戚首雜傳以良吏次宦官之後以忠義次酷吏之後是先小人而後君子也以髙智周薛季昶王方翼之功業而槩之以良吏以陳子昂之諫諍劉蕡之切直而槩之以文苑以吳溆之忠義而槩之以外戚以陽城之卓異而槩之以隠逸以孫思邈之髙尚而槩之以方技是棄其大行而取其小節也此則舊史之失也古之修史多出一家故司馬遷班固姚思㢘李延夀之徒皆父子論譔數十年方成盖通知本末則事實貫穿不牴牾惟後漢東觀羣儒纂述無統而前史譏之况夫唐之為國幾三百年其記事亦衆矣而紀志表則歐陽修主之傳則宋祁主之天文律厯五行志則劉羲叟為之方鎮百官表則梅堯臣為之禮儀兵志則王景彝為之所主既異而不能通知其故紀有失而傳不知如膠東郡公道彦等紀書降封縣公而傳乃郡公之類傳有誤而紀不見如傳叙天平節度止有四人而紀則七人之類取彼例以較此例則不同取前傳以比後傳則不合詳畧不一去取未明書法無凖如紀書薨而傳書卒者有之如宗室或書姓或不書姓者有之如中宗紀與前諸帝不同諸帝亦自詳畧不同之類並糾謬豈非責任不專歟唐修晉書而令狐徳棻之徒先為之定例則一史之内凡秉筆者皆遵用之今新書則不然取彼例以較此例則不同取前傳以較後傳則不合詳畧不一去取未明書法無凖一史之内而體異名殊豈非初無義例乎僕固懐恩贊乃列於陳少游傳後馬存亮贊乃列於仇士良楊復光之後宰相莫不表世繫固也而于惟謙之相中宗鄭綮之相昭宗武釋方之相則天乃不登載其亦有所缺悞歟糾謬劉元城曰新唐書叙事好簡畧其辭故其事多鬱而不明此作史之蔽也唐書進表云其事則増於前其文則省於舊且新書所以不及兩漢者其病正在此也而反以為工何哉舊史得失以良吏次宦者以忠義次酷吏是先小人而後君子也以陳子昂之諫諍劉蕡之切直而槩之以文苑以吳溆之忠義而槩之以外戚以陽城之卓異而槩之以隠逸以孫思邈之髙尚而槩之以方技是棄大行而取小節也循吏有功於民而無賛以揚之宦者灑掃之役反有贊以紀之獨孤之才行皇甫湜之文章皆不得見之於傳而僧神秀一行之徒道流王知逺吳筠之輩或𫝊於方技或𫝊於隠逸皆舊史之失也唐史發潛曰姚瑀唐之佞臣諂事則天以取宰相舊史乃與狄仁傑同傳豈其然乎新舊史更革舊史段秀實與大將劉海賓何明禮姚令言判官岐靈岳同謀朱泚新史乃削去判官岐靈岳五字夫姚令言乃涇原節度使與朱泚同反舊史乃謂令言之判官岐靈岳新史削去五字誤矣徐舊史封徳彝傳諫封諸王謂漢制惟皇子親兄弟封王其餘宗族疎逺非有大功如周郇滕漢賈澤皆不得濫封所以别親疎也新史乃修曰其餘宗族疎逺者非有大功不王如周郇滕漢賈澤皆不得茅土郇滕賈澤周漢侯因其言悞矣徐韓文注云按代宗紀大厯三年七月瀘州刺史楊子琳反陷成都楊琳即子琳也詳見崔寧傳新史昌裔傳云楊恵琳亂昌裔說之按恵琳居靈夏叛在憲宗初年新史誤也韓文龍武統軍劉公昌裔墓誌五代史類舊梁唐晉漢周各有史宋開寶中盧多遜扈蒙等修五代史史成而褒貶失實仁宗命歐陽公修之其立例皆寓褒貶之意本紀十二家人傳八即后妃傳也梁臣傳三仕於梁朝也唐臣傳五仕於唐朝也晉漢周臣傳各一仕於晉漢周朝也死節死事傳各一守節忠義者也一行傳一髙尚者也唐六臣傳一背唐附梁者也義兒伶官宦者傳各一皆本其實者也雜傳十九皆厯事累朝無操守者也司天考二職方考一盖天文地理志也世家十二時偏方割據者也又有十國年譜一四夷附録三皆諸國興亡四夷強盛之迹也凡七十四卷徐無黨注㑹要歐陽修五代史記褒貶善惡其法甚精發論必以嗚呼者亂世之書也吾用春秋之法師其意不襲其文其論曰昔夫子作春秋因亂世而立治法予述本紀以治法而正亂君此其志也書減舊史之半而事迹比舊史稍添議者以為功不下司馬遷又謂筆力馳騁稍上下而無駁雜之說至於紀列精密則不及也亦嘗自謂我作伶官傳豈下滑稽哉㑹要徐無黨注曰大事則書變古則書非常則書意有所示則書後有所因則書非此五者則否又曰夷狄来不言朝不責其禮也不言貢不責其物也故書曰来又曰用兵無勝敗攻城無得失不書或書月或書日或書死或書殺或書滅或書屠歐陽公十國年譜序曰或問十國固非中國有也然猶命以封爵而稱中國年號来朝貢者亦有之矣本紀之不書何也曰封爵之不書所以見其非中國有也問者又曰四夷十國皆非中國有也四夷之封爵朝貢則書何也曰以中國而視夷狄夷狄之可也以五代之君而視十國夷狄之則未可也故十國之封爵朝貢不如夷狄則無以書之書如夷狄則五代之君未可以夷狄之也是故外而不書見其自絶於中國焉耳歐公五代本紀天文變異一辭不載雖曰具於司天考而與行事了不相屬王蜀世家黄龍甘露麟鳳白雀之瑞纎悉具紀觀公之論著自謂取法春秋夫豈不知春秋書災異而不書祥瑞之意乎紀傳所載時有不同梁之殺崔嗣子于京師也紀以遣朱支謙而傳以為遣朱友諒楊涉之相梁三仕三已而嵗月所具紀載實異至其末年之為相但書其罷而了不知其所入之嵗月豈史遺其入歟或誤書其罷歟唐明宗在位七年餘耳而歐公之論贊乃以為十年其誤明矣此固纂誤之書所由作也宋朝范質采舊史採摭要言總而集之為通録六十五卷肇自開平迄于顯徳史通類唐左史劉子𤣥名知幾馬融三入東觀漢代稱榮張華再典史官晉朝稱美予兼而有之是用商確史篇區分類聚凡三十卷三千餘篇曰六家曰二體曰載言曰本紀曰世家曰列傳曰表厯曰書志曰論贊曰序列曰採撰曰補注曰品藻曰直書曰曲筆曰鑒識曰模擬曰人物曰覈才曰煩省曰紕繆曰史官建置曰古今正史曰感古曰疑經曰漢書五行志錯誤并雜駁等篇昔漢世諸儒集論經傳定之於白虎殿因名曰白虎通予在史館而成此書亦名史通漢求司馬遷後封為史通子是知史通之稱其来久矣自古帝王文籍其流有六一曰尚書家二曰春秋家三曰左傳家四曰國語家五曰史記家六曰漢書家班荀二體後来作者不出二途故晉史有王虞王隠晉書虞預晉書而副以于記宋書有徐沈徐爰宋書沈約而分以裴畧裴子野宋畧諸史志司馬遷曰書班固曰志東觀曰記華嶠曰典張勃曰録何法盛曰說名目雖異體統不殊亦猶楚之謂檮杌晉謂之乗魯謂之春秋其實一也於其編則有先曰平凖後云食貨古號河渠今稱溝洫析郊祀為宗廟分禮樂為威儀垂象出於天文郡國生於地理如斯變革不可勝紀若乃五行藝文班補子長之闕百官輿服范拾孟堅之遺王隠後来加以瑞異魏收晚進洪以釋老斯出乎胷臆者論都邑氏族方物逺則漢有三輔典近則隋有東都記於南則宋南徐州記晉宫闕名於北則洛陽伽藍記鄴都故事盖都邑之事盡在是矣譜諜之作盛於中古漢有趙岐三輔決録晉有摯虞姓族記江左有兩王百家譜中原有方思殿格盖氏族之事盡在是矣自沈瑩著臨海水土周處撰陽羨風土是以地理為書陸澄集而難盡水經加注酈元編而不窮盖方物之事盡在是矣諸史論贊春秋左傳每有發論假君子以稱之二傳云公羊子穀梁子史記之太史公既而班固曰贊荀恱曰論東觀曰序謝承曰詮陳夀曰評王隠曰議何法盛曰述揚雄曰撰劉炳曰奏袁宏裴子野自顯姓名皇甫謐葛洪列其所號史官所撰通曰史臣其列名雖殊其實一也夫論者所以辨惑釋疑司馬遷始限以篇終各書一論史論之類實萌於此尋其得失子長淡薄無味承祚濡緩不切孟堅辭惟温雅尤善者有典誥之風仲豫義理雖長失在繁富自兹以降大抵華多於實理少於文擇其善者則于寶范曄裴子野是其最也沈約臧榮緒蕭子顯抑其次也孫安國都無足采習鑿齒時有可觀袁彦伯之務飾元言謝靈運之虚張髙論髙邵志在簡直言兼鄙野唐修晉書逺棄史班近宗徐庾飾彼輕薄之句編為史籍之文史之有論盖欲事無重出省文可知太史公曰觀張良貎如美婦人耳項羽重瞳舜之苖裔此則加他語以補書中所謂事無重出者也班固贊曰萬石奮之為父澣衣君子非之楊王孫裸𦵏賢於秦始皇逺矣此則片言之約而諸義甚備所謂省文可知也及後来贊語多録紀傳云言其有所異為加文飾而已馬遷叙傳後厯寫諸篇各敘其意既而班固變為詩體號之曰述范曄改彼述名呼之以贊史之褒貶盖無假於此也然固之總述合在一篇使其條貫有叙厯然可恱蔚宗後書實同班氏乃各附本事書於卷末蕭李南北史蕭子顯李百藥唐修晉書皆依范書篇終有贊夫毎卷立論其繁已多而嗣論以贊為黷彌甚至若班固之深排賈誼范曄之虚美隗囂陳夀謂諸葛孔明不逮管蕭魏收稱朱爾提可方伊霍或言傷其實或擬非其倫史例史之有例猶國之有法國之無法則上下靡定史之無例則是非莫凖惟令升先覺逺述丘明重立凡例勒成晉紀鄧孫已下據攝其蹤史例中興於斯為盛若沈宋之志序蕭齊之序録唯皆以序為名其實例也于寶范曄理切而多功鄧粲道鸞鄧粲晉陽秋檀道鸞晉陽秋詞繁而寡要子顯雖文傷蹇躓而義甚優長斯一二家皆序例之美者名號之失吕陸二氏吕不韋陸賈名著一書不繋時月此乃子書雜記而皆號曰春秋魚豢姚察著梁二史巨細畢載蕪纇甚多而俱榜之以畧馬遷撰皇后傳而以外戚命章班固撰人表以古今為目其所載皆非漢之事子長史記别創八書孟堅既以漢為書不可標書改書為志何氏中興何法盛晉中興書易志為記此則貴於革舊未見其能採撰失實馬遷史記采世本國語戰國策楚漢春秋至班固漢書則全同太史自太初已後又雜引劉氏新序說苑與七畧之詞此並當代雅言故能取信一時擅名千載但中古作者百家諸子私存撰録如禹生啓伊尹産空桑海客乗槎以登漢嫦娥竊藥以奔月如斯踳駮不可殫論􅄞康髙士𫝊聚七國寓言𤣥晏帝王紀多采於六經圖䜟引書之誤其萌始此至范曄増損東漢王喬鳬履出於風俗通左慈羊鳴傳於抱樸子穢莫甚焉晉世雜書若語林世說幽明録搜神記之徒其所載或恢諧小辨或神鬼怪物唐朝所撰晉史多採以為書至如江東五雋始自㑹稽典録潁川八龍世於荀氏家傳而修晉漢史皆信之博聞多矣補注韓戴服鄭鑽仰六經裴李應晉訓解二史發明先義是曰傳宗既而史傳小書人物雜記若摯虞之三輔決録陳夀之季漢輔臣周處之陽羨風土常璩之華陽志文言美辭列於章句委曲叙事存於細書此之注釋異夫儒士者矣次有好事之子思廣異聞乃掇衆史異詞補前史之闕若裴松之三國志陸澄劉昭兩漢書劉彤晉紀劉孝標世說之類是也亦有躬為史臣手自刋削志存該博列為子注若蕭大圜淮海亂離志陽衒之洛陽伽藍記宋孝王闗東風俗傳王邵齊志之類是也陸澄所著班史多引司馬遷之書若乃此缺一言彼増半句皆採摘成注標為異說范曄之刪後漢也簡而且周劉昭採其所捐以為補注言盡非要事皆不急言語飾詞專對古之所重春秋載吕相絶秦子産獻捷臧孫諫君納鼎魏絳對戮揚干是也戰國之事爭為馳說若史記載蘇秦合從張儀連衡范睢反間以相秦魯連解紛而全趙是也漢魏以降如朱雲折檻以抗憤張綱埋輪而獻直秦密之酬吳客王融之答虜使此之小辨曽何足云戰國已前皆可諷詠如鶉奔鸜鵒童子之謡也山木輔車時俗之諺也皤腹棄甲城者之謳也原田是謀輿人之誦也斯皆芻辭鄙句猶能温潤若此况束節之士加以多聞博古者哉敘事班馬執簡既五經之罪人晉宋殺青又二史之不若人之著述雖同是一手其間則有善惡不均精麤非類若史記蘇張蔡澤等傳是其美者至於三五本紀日者倉公龜策傳固無所取漢書之帝紀陳項諸篇是其最者也至於淮南王司馬相如東方朔傳又安足取盖言媸者其史亦拙事美者其書亦工丘明之紀事也當威文作霸晉楚更盟則能飾彼詞句成其文雅及王室大壊事益縱横則春秋美辭幾乎翳矣子長之叙事也自周已往言所不該則其文闊畧秦漢以下條貫有倫則煥炳可覩若荀恱漢紀其才盡於十帝陳夀魏書其美窮於三祖觸類而長他皆若斯序傳按屈原離騷經其首章上陳氏族下列祖考先述厥姓次顯名字自序發迹實始於此降及司馬相如始以自序為傳至司馬遷又模楷二家勒成一卷於是揚雄遵其舊轍班固酌其餘波自叙之篇實始於此雜述史氏流别其流十焉一曰偏記二曰小録三曰逸事四曰瑣言五曰郡書六曰家史七曰别傳八曰雜記九曰地理十曰都邑簿夫皇王受命作書著述有雜記當時不終一代若陸賈楚漢春秋樂資山陽公載記王韶晉安紀姚梁後畧此之謂偏記者也人物洪多罕能周悉則有獨舉所知若戴逵竹林名士王粲書漢末英雄蕭世誠懐舊志盧子洪知己傳此之謂小録者也史有遺逸好竒之士補其所亡若和嶠汲冢紀年葛洪西京雜記顧譚新語謝綽拾遺此之謂逸事者也小說偽言好事君子無所棄諸若劉義慶世說裴崇期語林孔思尚語録楊松玢談藪此所謂瑣言者也郡國人物若陳留耆舊周斐汝南先賢陳夀益郡耆舊虞預㑹稽典録此之謂郡書者也髙門華胄紀其先烈若揚雄家牒商敬世傳孫氏之記陸宗系厯此之謂家史者也賢士貞女若劉向列女梁鴻逸民趙来忠臣徐廣孝子此之謂别傳者也怪物異聞若祖台志怪于寶搜神劉義慶幽明劉敬叔異苑此之謂雜記者也志本國風物若盛洪之荆州記常璩華陽國志辛氏三秦羅含相中此之謂地理者也帝王桑梓列聖遺塵若潘岳闗中陸機洛陽三輔黄圖建康宫殿此之謂都邑簿者也名諱名有五有信有義有象有假有類以名生為信其唐叔虞魯公子友以徳命為義若文王名昌武王名發以類命為象若仲尼首象尼丘取於物為假若伯魚生人有饋之魚因名曰鯉取於父為類若魯荘公與桓公同日生名之曰同也晉以僖侯廢司徒改為中軍宋以武公廢司空改為司城禮記正義史官建置史之建官其来尚矣軒帝受命蒼頡沮誦實居其職至於三代其數漸繁周官禮記有大史小史内史外史左史右史之名大史掌國之六典小史掌邦國之志内史掌書之命外史掌書使於四方左史記言右史記事此周制也曲禮曰史載筆大事書之於策小事簡牘而已大戴禮曰太子既冠成人免於保傅則有司過之史韓詩外傳云據法守職而不敢為非者太史令至諸侯列國各有史官如孔甲尹逸名重夏商戎夫倚相譽髙周楚晉則伯黶司籍魯則丘明授經降及戰國史氏無廢趙鞅猶有直臣書過操簡筆於門下齊田文對賓客侍史記於屏風至若趙秦澠池之會各命御史書其年月又春秋晉齊太史書趙崔之弑鄭公墨強與於盟使太史書其名且曰七子晉韓宣子来聘觀書於太史氏見易象與魯春秋曰周禮盡在魯矣然則諸史之任太史豈最優乎秦太史令胡毋敬作傳漢武置太史公位丞相上宣帝以其官為令行太史公文書兼掌厯象日月隂陽官數司馬遷没後之續史記事者若褚先生劉向馮商揚雄之徒並以列職未知史務於是太史之職非復記言之司故張衡單颺王立髙堂隆等其當官見稱唯知占候而已史有三等史之為務厥途有三張善貶惡不避強禦若晉之董狐齊之南史此其上也編次勒成鬱為不刋若魯之丘明漢之子長此其次也髙才博學名重一時若周之戎夫楚之倚相此其下也知幾中宗時人修武后實録有所改正而武三思等不許自以見用於時而志不遂乃著史通内外篇四十一篇譏評古今徐堅讀之嘆曰為史氏者宜置此座右也此書以在史館所著者故名史通放漢白虎諸儒論經名曰白虎通又漢封司馬遷後為史通子兼取此意云知幾論史有三長曰才曰學曰識世以為確論知幾論史有三長自言曰吾始以文章得譽晚談史傳由是減價其自感慨者如此本傳張唐英發潛曰嘗求劉子之書而觀之則知子之用心亦勤矣馳騁古今發摘歴代史之失雖班馬夀曄皆為其輕重兹可尚矣至外篇惑經有未諭者十一條始亦疑孔子於春秋有所疎畧乃取春秋而審之如趙盾以不討賊而被惡名許世子以不嘗藥見特筆齊鄭之或以疾赴皆不免致疑於其間而不知赴告策書各因其策書之所吿而必削以正王法亦所以使亂臣賊子懼也以此知劉子徒好辨而不知春秋史通歴詆前史春秋聖經且疑其虚美者五未諭者十二其自待不淺矣又嘗疑遷固之書有未備者乃欲於天文之外復志人形藝文之外復志方言又欲撰都邑志於輿服之上撰方物志於食貨之首撰氏族志於百官之下甚至欲於表志之外取人主之制冊誥令羣臣之章奏移易而更立一書識者固已譏其贅矣尚敢輕詆乎戰國策類後漢髙誘注按劉向序云戰國策或曰國事或曰短長或曰事語或曰長書或曰修書向以戰國游士輔所用之國為之策謀宜為戰國策除復重得三十二篇崇文編目稱十一篇缺編校史館書籍曽鞏求訪盡得其書然後三十三篇復備隋志向所録者三十四卷誘所注者士二十一卷書目漢稱為戰國策雜以長短之號而有蘇張縱横之說學者諱之置而不論也此書若張孟談魯仲連發策之慷慨諒毅觸龍納說之從容養淑之息射保功莫大焉越人之投石謀賢莫尚焉王斗之愛縠憂國莫重焉諸如此類不一皆有合先王正道孔孟之所不能違也若之何置之曽鞏之序美矣而謂禁邪說者類將明其說於天下則亦求其故為之說非此書指也鮑彪注戰國䇿序曽子固序叙曰向叔此書言周之先明教化修法度所以大治及其後詐謀用而仁義之路塞所以大亂其說既美矣率以謂此書戰國之謀士度時君之所能行不得不然則可謂惑於流俗而不篤於自信者也夫孔孟之時去周之初已數百嵗其舊法已亡其舊俗已熄久矣二子乃獨明先王之道以為不可改者豈將強天下之主以後世之所不可與哉亦將因其所遇之時所遭之變而為當世之法使不失乎先王之意而已也五帝三王之治其變固殊其法固異而其為天下國家之意本末先後未嘗不同也二子之道如此而已盖法者所以適變也不必盡同道者所以立本也不可不一此理之不易者也戰國之游士則不然不知道之自信而樂於說之易合於設心注意偷為一切之計而已故論詐之便而諱其便言戰之善而敝其患其相率而為之者莫不有利焉而不勝其害有得焉而不勝其失卒至蘇秦商鞅孫臏吳起李斯之徒以亡其身而諸侯及秦用之亦滅其國為世之大禍明矣而俗猶莫悟惟先王之道因時適變法不同而考之無疵用之無敝故古之聖賢未有以此而易彼也或曰邪說之害正宜放而絶之則此書之不明其可乎對曰君子之禁邪說固將明其說於天下使人皆知其說之不可從然後以禁則齊使人皆知其說之不可為然後以戒則明豈必滅其籍哉放而絶之莫善於是故孟子之書有為神農之言孟子之言者皆著而非之此書之作上繼春秋下至秦漢二百四五十年之間載其行事固不得而廢也戰國策所載大抵皆縱横捭闔譎誑相輕傾奪之說也其事淺陋不足道然而人讀之則必鄉其說之工而忘其事之陋者文辭之勝移之而已戰國之時強者務并吞弱者患不能守天下方爭於戰勝攻取馳說之士因得以其說取合時君其要皆主於利言之合從連横變詐百出然自春秋之後以迄于秦二百餘年興亡成敗之迹粗見於是矣雖非義理之所存而辨利横肆亦文辭之最學者所不宜廢也王覺題戰國策戰國策隋經籍志三十四卷劉向録髙誘注止二十一卷漢京兆尹延篤論一卷唐藝文志劉向所録已闕二卷髙誘注乃増十一卷延淑堅之論尚存今世所傳三十三卷崇文總目髙誘注八篇今十篇第一第五闕前八卷後三十二三十二通有十篇武安君事在中山卷末孫元忠記歴代起居注類漢武有禁中起居注自魏至晉職歸著作後魏始置起居令史行幸宴會記録帝言及賓客酬答之語後别置起居注一人北齊有起居省隋置舍人二人唐初𨽻門下顯徳中分屬兩省羣書考索卷十五
