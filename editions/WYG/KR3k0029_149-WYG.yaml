body:
  text: 羣書考索續集卷十八宋章如愚編文章門文選蕭統去取未為盡善有李善之見而後可以辨文選之惑有康國安之識而後可以駮文選之異夫蕭統索古文士之作築臺而選三十卷自謂立見真而成功卓也李善辨其惑國安駮其異是果何為者耶盖統之用工雖勞而統之所選則未善其陋識拙文且莫逭東坡之誚又安能使唐人家置文選哉然則辨惑駮異真足以起統廢疾鍼統膏肓矣且毛詩大序最戾經㫖自韓退之歐陽永叔諸賢皆以為非卜商所作統特題曰卜子夏何見也宋玉高唐賦之醜者盖亦司馬相如子虗亡是公相答問之體統不曰賦而曰序何意也石季倫作思歸引所以動淵明歸去來之興選收其序而不載其詞何義也陸士衡作豪士賦所以諷齊王矜功之心選録其序而莫載其賦何謂也載曲水詩并二序而蘭亭之記不入何耶述武帝二詔而漢之諸詔不收又何耶是猶曰去華摭實汲長溺短正統之所謂選者然仲舒三䇿得伊周格心之學反黜之可乎劉向序戰國有先秦典雅之製不録之可乎相如上林引盧橘夏熟之語槩取之可乎子雲甘泉陳玉樹青葱之句遽收之可乎是則工者未必選選者未必工安得東坡諸公不媒孽其短雖然擬於卜隠之續於孟利貞注定於五臣音纂於曹憲是又鑚皮出羽者也滕王閣記不入文粹絲竹管絃四言兩意蘭亭記所以不入文選也土宿三目辭多險恠離騷經所以不入通鑑也然則姚鉉録唐文而不録滕王閣記亦猶文選之於蘭亭記通鑑之於離騷經乎且滕王閣記作之者誰唐王勃也觀落霞秋水之句不特起閻公之歎雖後世亦諒其為天才也然勃既得為天才而不得列班於唐之百卷姚鉉掇菁擷華必非棄珠於淵者甞因是而思之盖此記所作凡七百六十五字而重叠用字凡三百五十有餘如天之字有五地之字有六星一字而三言可也又所謂斗牛又所謂北辰則辭失之繁山一字而四言可也又所謂島嶼又所謂崗巒則言失之贅句之重者則如嗟乎時運不齊其與嗟乎勝地不常者一也響窮彭蠡之濵其與氣凌彭澤之樽者一也潦水静而寒潭清其與地勢極而南溟深者一也甚至以陳蕃而對牛斗以楊得意而曰楊意此又足以見措辭之荒謬者設鉉録之則文不必以粹命名亦豈能逭後世有識者之月旦品藻文章曽子文章衆無有水之江漢星之斗耳是詩者當為之斂襟肅容讀書未到康成處安敢言談議漢儒目是詩者當為之服膺書紳蓋操戈入室真名教中罪人而隠惡揚善不失為士君子忠厚之意故必想音容於函丈之席味節奏於浴沂之瑟附高翼於李勃之鳯凰借隙光於昌黎之北斗稱文選而不敢辨文選之惑愛唐史而不敢紏唐史之繆善史通為該􅀶不敢著析微以議子𤣥示顔注為標凖不得為指瑕以議師古否則無樂取諸人之意背請事斯語之訓瓊杯玉斚類多玷缺豐肌膩理猶乏風骨墨守而有發焉廢疾而有起焉離騷正大不免露才揚己之譏三都宏暢莫逭待覆醬瓿之誚吹毛求疵溺長綆短讀孫呉之書而䧟孫呉處和扁之門而議和扁又奚取於若人哉昔者夫子刪定詩書扶植名教為天地立心為生民立極叔孫何人敢肆唇吻毁夫子哉是猶曰叔孫非吾徒也不知夫子者也陳亢知夫子者伯魚一問猶以私心議夫子則陳亢實天地間一蠡管耳孟軻觝排異端主盟正道折戰國七雄之氣襲姬孔數聖之傳臧倉何人敢容私意沮孟子哉是猶曰臧倉嬖人也不知吾孟子也荀况知孟子者非十二子例以亞聖濟之則荀况實苖稼中一螟螣耳今日士夫其弊又有甚於此者平居聚談卑陋秦七黄九坐於雞窓雪案則曰吾文當得屈宋為衙官吾筆當使王羲之北面夸於品彚儔伍則曰吾賦可以劘賈馬之高壘吾詩可以攻李杜之長城覩落霞孤鶩之句則曰襲孤松撑蓋而作也讀孤月浪中翻之句則曰蹈孤月浪中生而作也文之雄徤者以艱澁議富贍者以浮靡議簡古深沉者以踈陋迂緩議其品藻不為不工其議論不為不至不知讀元元為元二以箕子為荄兹狀貌魁梧可監稚長之厨腸胃空虛類衣周公之服獻遼東豕未不必舉手揶揄於河東鬻鄭人璞未必不掩口盧胡於周市吁子貢方人孔門所耻宋朝先正其用心亦果如是乎使其耳宋朝先正曽子文章衆無有水之江漢星之斗之詩則莫指游夏之辭不下張李之軰又奚暇於姍笑目宋朝先正讀書未到康成處安敢言談議漢儒之詩則輟雌黄之辯緘詆訾之喙又安敢相詆􅐵耶雖然不患不已知患不知人也昔有詩用彩霓者考官以沈約賦雌霓讀為入聲黜之後世公議終不以彩霓為非必以考官為學識不廣之過今日之工於議人者烏知不拙於謀已也愚方斂袵前脩迷津詞路正恐冠玉如陳肥瓠如蒼稽伯如常又安敢過王尊之門以貽布鼓之誚翰墨門字翰有字書之始有字書之變項羽投戈荆軻執㦸此傳玉書翰也君子取其壯字裏金生行間玉潤此遂良筆法也君子取其工魚開萍藻鳥散芳洲此韓擇木字訣也君子取其妙雖然徐安子未生誰知五十六種之分張李嗣真不作孰定八十人之優劣然則字學源流誠不可不知也愚嘗博觀史籍考訂偏旁而得其宗矣蓋龍文萌蘖於伏羲穂書啓軔於炎帝龜字細繹於陶唐鍾鼎發揮於夏后倒薤浚源於務光虎書發迹於史佚此則字之始造者也李斯形篆换高辛仙書之骨程邈古𨽻奪史籕大篆之胎漢武英芝析六國芝英之𣲖衞常散𨽻蔓蔡邕飛白之根此則字書之變易者也題延陵墓則為大篆題建章宫則為複篆冩始皇碑則為細書題秦印璽則為剖符書漢家詔版則為偃波題後漢經目則為垂鍼此則字書之可驗者也窮年經史議論筆法而不知造字之源委雖秃千兎之翰書盈尺之楮徒費毛錐而已故嘗因是而為之説曰讀魏鍾繇筆骨論不若讀徐安子五十六種之書倣晉王羲之筆陣不若考李嗣真九品之評學者審此則始可與言字體矣古字之誤有四歐陽融之分毫正字所以辨字畫之訛陸德明之經典釋文所以别字音之誤顔氏之匡謬正俗所以論俗字之非愚嘗究字學之淵源而知古字之誤者有由矣有以妄改而誤者有以私説而誤者有以忌諱而誤者又有以穿鑿而誤者且古罰字本從刀也元命包改刀作寸則罸字自此始古對字本從口也漢文帝去口從土則對字自此始古曡字本從目也新室改作三田則疊字自此始古洛字本從水也世祖改水作佳則雒字自此始豈非字以妄改而誤乎國風之為曰風男女之為女于名譽之為毁譽見於陸氏釋文序傳人之為嘉期僅得之以為近逺平生之為外甥見於李祭酒涪説塗泥之為道塗黨與之為取與胃子之為甲胃見於郭忠恕佩觽豈非字以私説而誤乎爾雅周禮皆從辠字祖龍因與皇字相肖以四下作非代之宋前文書不諱騧字明帝忌與禍字相類以馬旁作𤓰代之或􅀈或昬皆從民字唐太宗欲避世民之諱石經皆以氏字代之豈非字以忌諱而誤乎伺之一字經史不載而兖州圖經曰魯國伺水􅟘之一字羣書所無而釋文首序曰呉興大􅟘溮之一字古書不録而申州雜記曰溮乃川名䭀之一字偏旁不著而登真隠訣曰有䭀飯方豈非字以穿鑿而誤乎雖然此特字畫之誤耳而音韻之誤尤有大可議者焉河朔謂毛曰無漢注言之巴蜀謂北曰卜佩觽言之以下馬為蝦蟇兩京記言之以琵琶為鼙婆捜神記言之吁此又四方言語之誤尤有甚於魯魚帝虎者安得蒼頡史􅘴諸公與之論字哉字音之失變於四方言語之殊惑於漢儒穿鑿之見讀季登之聲韻不若讀子雲之方言取季静之韻集不若取戴規之字辨是何也蓋古者字音之失變於四方言語之殊惑於漢儒穿鑿之見南楚呼蔽䣛曰大巾齊魯呼蔽䣛曰袡襦梁宋稱蜉蝣曰渠略齊魯稱蜉蝣曰蚼蟓筆為不律蜀何訛也居讀為姬魯何陋也秦人以累為諉見於爾雅之注呉人稱浦為歩著於韓子之碑至於以都音瀦以來音離此非變於四方言語之殊乎班史以龜兹而音邱慈范史以龜兹而音屈沮審氏名食其而音異基趙氏名食其而音食其頥為語助遷何見也化叶蛇音衍何鑿也以君疇為尹壽見於古今人表以箕子為荄茲見於孟喜本傳至於吁讀曰于梧讀曰悟此非惑於諸儒穿鑿之見乎雖然訂周思言之音韵質劉秋孫之釋名以聲譜而定平上去入以玉篇而參古文篆籕以指微韵鏡而别唇齒舌喉牙之音以熈寧集韵而究僻俗用假借之字又安有伏獵雌霓之失造字之本有六書叔重作解字君子惡其鑿戴規作字辨君子議其拘荆公作字説君子蘖其短盖自五十六種之開端而分枝麗葉僅有三百六十體推原造字之本其實有六書焉一曰象形謂畫成其物隨體詰屈日月是也二曰象事謂視而可識察而見意上下是也三曰象意謂比類合誼以見指撝武信是也四曰象聲謂以事為名取言相成江河是也五曰轉注謂之建類一首同意相受考老是也六曰假借謂本無其字依聲託字令長是也文字之義總歸六書後儒議論烏可肆穿鑿之喙而騁雌黄之辯乎且地固可以土言張顯作古今訓有地乃土乙力之文畛固可以田論埤蒼所言有畛則爾有田之説則辭失之泥呉木郡國之號國志有口在天上之語酉本十二支之名詩説有二在天下之論則議失之踈恭本敬愿之容晉書有黄頭小人之辨銀本百物之貨新論則有全昆配物之言則意失之索此猶可也中興書以舟在二間為舟春秋説以人有十四心為徳何鑿乎蘇許公以甲不全身詠尹梁史以木在斗下稱未何謬乎萬廻以八人為火楊脩以人一口為合何拘乎至於九禾之秀三刀之州文武之斌日月之易求工附合著意牽聮盖有託妄人山借言鬼木而不知顚迷於字苑中者何後世紛紛籍籍而喜於辨字哉故必讀裴務齊切韻序而後知左廻右轉之非讀郭忠恕佩觽而後知野言繆誤之失否則尚書考異玉乗馬首開元文字子在母懐其不典孰甚焉飛禽即須安鳥水族便應着魚其蕪纇孰甚焉吁愚於此益信夫字不可以妄觧亦不可以輕辨尤不可以鑿説古詩音字自訓纂紬繹於揚子雲而後知一字各有一意自廣韻裒輯於陸法言而後知一字各有一音字一也音與意或有不同又何疑之有茍能以意求字不拘攣於筆舌不凝滯於形迹如杜詩天子呼來不上船之句則指襟紐為衣船栁詩蒲扇桃笙安可帶之詠則以桃笙為簟何必泥衣船與簟為非船與桃笙字之意耶茍能以音求字不辨析於筆畫精考閲於偏旁如班史以龜兹為邱慈范史以龜茲為屈沮之類何必拘邱慈與屈沮為非龜兹之音耶吁知此則知古詩異同之音字矣且夫發言盈庭則發音方伐鱣鮪發發則發音補末果可以發言與發字牽合其説耶携手同行則行音何更寘彼周行則行音胡剛果可以偕行與周行字強偶其説耶説之一字曰與子成説曰不可説也曰召伯所説音析而意殊也莫之一字曰維葉莫莫曰莫其德音曰嵗聿云莫音異而意别也小弁詩語也而所謂有頍者弁則一字而兩音無邪詩語也而所謂其虛其邪則一字而兩意題一字也題彼脊令則題為大計儺一字也佩玉之儺則僅為乃可獨不可以意㑹耶此愚所謂一字各有一意亦各有一音者此也雖然學識不廣徒執古音以為矛盾是又識者之所姍歎沈約之賦雌霓則霓為入聲范景仁胡以彩霓讀為入聲而黜進士可乎揚雄之賦翰林主人曰吁則吁即咨嗟顔師古胡為以吁為子音而穿鑿之可乎若夫砭伏獵之沉痼醒書麞之醉夢猶在人之上有以教之耳羣書考索續集卷十八
