body:
  text: 羣書考索續集卷四十五宋章如愚編財用門周財用周官理其財之所出或問周禮其理財之書乎曰周之理財理其出而已非理其入也理國之財而已矣非理天下之財也毎觀六典之書六卿之職兵既以私田而不餉士大夫既以公田而不廪而嵗時經費獨祭祀賓客田役䘮荒飲膳衣服與夫稍秣匪頒賜予玩好數用者而已周公於此上則慮夫人主侈心之生而妄費之無節下則慮夫掌財用財者之吏渗漏乾没或有容奸而肆欺異日之憂則又慮夫國計匱乏而府庫空虚既窘於用則不免虐取於民也於是一毫財賦之出而數人之耳日通焉内府在内反以共邦之大用外府在外反以供王及后世子衣服之用内外互相攷也職内職入反以毎嵗所入而攷其所出職嵗職出反以毎嵗所出而證其所入出入互相攷也不相参則可以專其耳目必相攷則可以防其奸欺惟其然也故財用之出上無所肆其侈下無所容其私上不侈而下不私則財常適於用征斂常不至於虐而民無復有受其病者然則周家之理財理其出而已非理其入也理之於上者不欲虐取之於下而已非固屑屑然為是不惮煩也太宰統其大綱司徒統泉府倉人廪人之大綱㑹計則均出於司㑹式法之數則司次舍幄帟服䘮之用捨奄寺嬪御掃洒使令之損益皆得以自緫而身計之而不惟上之自便以滋國費困民力嗚乎茲成周之所以盛耶由此觀之冡宰制國用非理財之謂也均莭財用之謂也亦明矣非理其入理其出也薛抄云冡宰制出司徒制入太宰制國用制其出也古者財用冢宰制出司徒制入皆三公兼之自漢丞相以出入財榖非已責則均莭㑹計之職散之九卿葢經用屬大農禁錢屬少府㑹計屬司徒郎此尚可疑廪假屬僕射右丞然猶有統攝不相侵紊光武歸禁錢於司農歸水利於少府歸塩鐵於郡國然意善而法不精章和以後大農之平凖為中凖列於内而取少府之尚藥大官御者尚方考工諸曹别作監悉用奄人主之同上云周漢唐財用周漢唐内外財周時冡宰制國用凡玩好匪頒皆得以制之是内外之財相通也漢興山海地澤之稅歸少府以供天子私用公賦之入歸大司農以供國家經費内外不相闗若非周制矣然宫掖之費在内所不能免若於經費之外别立少府専為天子私奉養而不歸於大農大農用有常費亦是羙意故人主莭儉緩急之際又可以出私帑濟公用若光武禁錢悉歸大農是不知此反使後世有鴻都之事惟唐之人君斡經費之物盡為私藏則意大失矣漢財用漢初内外財不相通東漢令歸大農漢少府掌山海地澤之稅以供天子私奉養大農掌國貨以供軍國之用漢初縣官未榷鐡山海之稅歸之少府武帝元封間乃始領司農丞領塩鐵事官自榷之而向時山海之稅歸少府者至是入大司農矣按毋将隆傳云漢武庫兵器天下合用國家武備繕法造作皆度大司農錢自乘輿不以給其養勞賜一出少府則大司農少府自不相闗故髙帝之初吏祿官用悉取田租而山川園池市肆租稅之入則為私奉養不領於天子之經費故司農用有常度而不至於乏事武帝初年用度未廣都内之錢貫朽而不可校大農猶有餘財元狩以來費用百出大司農經用租賦並竭始不足以奉戰士而猶未至於出私帑也宣帝承武帝困乏之餘乃始出水衡錢私藏以供縣官工作之費其後西𦍑之役費四十餘萬大司農錢盡乃以少府禁錢續之天子之内藏至是始與大司農相通為用也史載元帝温恭寡慾賞賜莭約都内錢四十萬水衡錢二十五萬少府錢十八萬大農内藏皆有餘蓄則亦何事竭公帑以肥其内哉東漢光武併禁錢掌之大農将以絶一已之私制非不善而不知反使後世開邸鬻爵以為私藏何哉夫宫掖之費在内所不能免而頋使一切助辦於宫庭則固有其制而不得為者此所以計出於亡聊而有内庫之私也然則宣元二君捐私帑以濟公用要不失為美之意後元富庶緣不用兵後元富庻緣不用兵又武帝不開邊雖不入粟拜爵亦可唐仲友郡國財賦漢置司農少卿雖承秦舊但秦人盡欲斂天下財賦至於負海之粟以歸京師賈生所謂千八百國民以自養者是也至漢大封九國分侯功臣止以十五郡屬京師而又列侯公王食邑其中近於周家獨取畿内之賦是時郡國自有司農少卿錢所以呉王鑄山煮海者自擬王者百姓更賦皆貸勿收梁孝王府庫藏金玉多於京師正為此也是時賈誼晁錯諸公皆以是為憂故武帝設塩鐵官盡籠天下之利筭緡錢商車大率皆是籠絡郡國財賦尊顯卜式以風諸侯令助邊養財所自出治財之術亦養其財之所自出而已矣夫秦之商鞅漢之晁錯其為術刻矣而其治財猶為知本未至如後世之一切也商君之法使民耕織粟帛而復其身晁錯之法使民入粟買爵而勿收其租夫粟不入於官也而復其調則上宜乏用貿爵入粟也而除其租則所入者宜不足以償所失也二子行之秦以冨强而漢有紅腐之積彼獨何術也彼誠知夫財之所自出者不可不養則其所以予民者乃其所以取民也武帝承文景冨庶之後内多慾而外事兵役自其兵役之興而邊民困賦役之煩也而農民困自其斡塩鐵筭商告緡也而商民困自其賣爵得以免罪也而冨民困自其立轉送之法而入財補郎也而世家之子弟困自其差出馬也而封君至吏三百石以上困自其造皮幣罰酎金也而列侯困夫上自列侯封君而下至於庶人葢財之所自出也使帝知所以養民之本則戸口日息田野日闢蓄牧益蕃而財貨流通賦稅之入而上不勝用矣陳季雅唐財用唐財用為人主私藏唐初天下財賦歸左藏太府以時上其數尚書比部覆其出入𤣥宗時王鉷給嵗進百億萬緡非租庸正額者積百寳大盈庫以供天子燕私及祿山反楊國忠以為正庫物不可給士卒肅宗時第五琦請以左藏財賦盡歸之大盈庫供天子賜給主以中官自是天下之財皆人主私藏而有司不得程其出入矣徳宗時瓊林大盈陸贄常極諌之故方屬意聚斂韋臯有日進李兼有月進劉賛有羡餘之貢又有代易進奉刺史進奉自裴肅始判官進奉自蕭綬始一以裴延齡用事益為天子益私財憲宗即位盡罷進奉似矣未幾劉闢李琦既平貲藏皆入内庫于頔皇甫鎛為刻剝於是有助軍賞之名後武宗懲前弊以户部度支塩鐵及諸道進奉並輸延資庫以宰相領之又不是唐財賦倚東南自天寳後河北淪於藩鎮而國用仰給全在東南東南之賦安得不重抑甞切疑其重賦之始當在肅代之際然大歴中獨孤及為舒州元結為道州率户不過嵗取十千而止至於元和而東南之賦始重李林甫上國計簿揔計天下方鎮十五道不申户口外嵗所倚辦止於浙江東西宣歙淮南江西鄂岳福建湖南八道四十九州一百四十萬户當時户數減耗如此而李絳言於憲宗曰今東南大縣嵗賦二十萬緍一千萬緡之賦已増道州三分之一此其増重可知矣葢至是而求其及於什一之半而不可得此李翺之書所以作也自是而後至於咸通又加甚焉故陸龜蒙言元和中國家用兵帑金窖粟不足用江南之賦已重殆今盈六十年賦又數倍於前後蒙此言乃發於咸通也故元和視大歴建中而重咸通視元和而又重向使太宗之初已取其盈則變故之餘重之又重豈特唐末年而後盛哉然大歴之際軍旅數興户口減耗而賦得無増者史稱劉晏之功誠不可揜矣宋朝財用㑹計錄唐李吉甫始部錄元和國計著為成書宋朝丁謂著景徳㑹計錄田况著皇祐㑹計錄蔡㐮著治平㑹計錄蘇轍著元祐㑹計錄皆所以揔括邦計量入為出熈寧亦有是錄徳宗時三百八十萬五千餘户稅榖二百一十五萬七千餘斛而兵七十六萬八千餘人是四户養一兵蘇轍取元豐八年之㑹計之實而别其五一曰收支二曰民賦三曰課入四曰儲運五曰經費若内藏右曹之積與天下封樁之實非昔三司所領則不入㑹計其收支叙云宗室之衆皇祐莭度使三人今為九人兩使留後一人今為八人觀察使一人今為十五人防禦使四人今為四十二人百官之冨景徳大夫三十九人今為二百三十人朝奉郎以上百六十五人今為六百九十五人承莭郎一百二十七人今為三百六十九人奉議郎一百四十八人今為四百三十一人其餘諸司使副供奉侍禁三省之吏莫不數倍於前仁宗末年任子之法自宰相以下無不減省神宗裁減宗室之恩今微為之莭使見仕者無損方來者有限雖未見其利要之十年之後事有間矣慶厯之入二千八百餘萬出二千七百餘萬治平入二千三百六十餘萬出二千三百二十餘萬熈寧入三千餘萬出二千五百餘萬然其入之所以常多於出者先為之計爾夫計入以為出則吾出也常裕如以出而為入則吾入也常不給葢知所計則不輕用之用之則不妄用今宜日入其成月入其要嵗比其數以較出入孰為經用孰為私予孰為起支孰為定例孰為有餘孰為不足精㑹計財莫先於莭亦莫先於㑹宋朝初建版部則布左計右計揔計等使之目其後三司置使度支居其一有使有副有判官有提舉帳司磨勘理欠等司夫度支之設職在諸曹一郎吏主之足矣前人特以建使則其意可見歟自景徳皇祐治平熈寧元祐主計者必有㑹計成書其户口之籍輿地之圖謂度之多寡賦予之厚薄其名其色其制其數莫不備矣自三司使之罷理財既已無術而渡江以來典籍散漫㑹計之事一切委而不講營營支撑僅紓目前以至於今推原其弊皆起於理之而無其說今日費用紹興中鄭湜劄子宋朝混一之初歲入緡錢一千六百餘萬以為極盛兩倍唐室矣其後月増歲貢及熈豐間言利之臣極力聚斂然後歲入六千餘萬渡江之初東南歲入不啻千萬比年乃増至六千五百餘萬則所入倍於祖宗時多矣神宗皇帝中都吏祿兵廪所費全歲不過百五十萬元豐間紛更費用猶不過月支三十六萬至和末崇侈無度月支百二十萬渡江之初雖連年用兵然月支猶不過八十萬比年安靖無事乃月支百二十萬則其所費亦倍於祖宗多矣徽宗宣和間月支九十五萬髙宗紹興三年月支一百一十萬陳㐮論神宗嵗入緡錢約六千餘萬養兵之費約五千餘萬乃是六分之兵占其五財耗於兵官今日生財之道多矣惟是莭省不得其術以今天下較財用於漢唐所入十倍於漢五倍於唐唐人榷塩劉晏時毎年得六百餘萬李巽最多之年比晏多一百八十萬此必一叚說熈豐多於唐紹興又若干云云今准一年所入一千三百萬有竒較之熈豐以後所入倍再今姑置勿論紹興初年今所入已數倍矣紹興初養兵僅百萬今中外纔四十萬爾比來弊直合於餉軍理㑹左藏支養兵居十之七又未甞養得兵說者只云合汰老弱去詭名殊號不知軍中不可無老練之人弱有二說病弱者則强壮者自不與為伍幼弱則他日復成将詭名未易檢校劉樞宻云得一賢相自無許多般事始末只合於餉事上說外則靳惜名器如紹興初使相未甞除人節鉞惟四大将今使相二十餘人節鉞數百軰人月費數千緡又宫親無樽節安得不匱之魏元禮今日財有陽耗隂耗建理財之議而有取於生財者今日之故說也建理財之議有取於節財者亦今日之故說也今生財之術視前古為詳矣榖則有租絹則有庸酒則有榷茶塩則有征又有坊場之錢樓店河渡之錢前世所以取於民者今盡行之矣以此生財而財不豐則生財之說果不可用也今節財之說視前古為盡矣力役不興征伐不舉好予匪頒初無濫賞而又惜士祿之圭角停樞宻院之犒設上玉牒所之科次前古所不知節者今盡為之矣以此節財而財不豐則節財之說果不可用也今日天下不慮夫無財慮夫所以陷没之者不可以類推而又以隂耗之者衆前日之事今日之鑒也髙宗皇帝在紹興間甞以六事詢執政而當時宰臣之職吕頥浩謂宣和徽宗全盛之時月支九十五萬紹興三年月支一百一十萬則紹興之月費加多於宣和一嵗共用一千三百餘萬又謂榷貨所入東南塩嵗若干萬宋朝内藏備非常之用宋朝置朝藏奉宸等庫其實欲蓄積以待非常之用軍興賞賚則用之水旱灾傷賑濟則用之三司財用乏則出以助之諸路財用乏則出以助之太祖始平僣亂收其府庫别貯之封樁庫國用之餘悉入焉甞曰俟滿五百萬緡當問契丹贖燕薊又曰用二十疋絹募一敵人首用絹二百萬疋敵且盡矣太宗改名内藏自淳化至景徳用兵之費皆取是焉太宗初實内帑謂侍臣曰河東敵境甚邇吾必取之至所不免擾民今内帑所積以備調發葢重擾也其後皆如詔卒不擾下真宗謂王旦曰内藏庫所貯金帛備軍國之用非自奉也但外廷不知耳仁宗明道二年出内藏錢百萬賜三司初三司以用度不足吿於上上曰國家禁錢本無内外葢以助經費也自是嵗歉或調發則出内藏以濟之當時常出錢百萬緡以助常平糴本哲宗時甞因冬大寒出錢十萬緡散與窮民祖宗時利權不分祖宗時户部之職實為三司其餘司則有磨勘衙司曹案刑案修造河渠之屬凡天下之事權鎮之太半貨財之入工役之興皆可以稽其賬籍量其費用斂散及時縱舍由己而不為它司所牽制内而諸司外而轉運如心腹之運手足如臂使指茍官得其人則財無不羡此之謂利權不分自三司之胄案為軍器監而繕修械仗之具户部不得預曰都作院屬於諸道憲司曰水部屬於冬官曰磨勘司屬於都部而並屬於刑曹鈎考檢校户部莫得而知之利權於此分矣故它司以辦事為効而不顧財之有無戸部以給財為功而不論事之當否職守拘牽而費用無藝國用安得不匱乎内外財計不一今中都有戸部有修内司有内庫有二庫之激賞有國子之贍養有諸軍之營運惟軍資當合自治餘皆屬戸部可也今它司財計所在户部不得其出入及漏巵無當何所致詰耶外司有轉運常平有市舶有坑冶有揔制有經制有帥司之激賞有州有縣而州縣又各有務庫曹局惟激賞不當它屬餘皆宜屬轉運可也利合而富利散而窘理財之道可一言而盡矣祥符天禧出入之數國初以來財用所入莫多於祥符天禧之時所出亦莫多於祥符天禧之時至道中榷酒稅錢一百二十萬貫至天禧増至七百七十九萬貫其他闗市津渡等稅率増倍之至道末塩課錢七十二萬貫天禧末至一百六十三萬貫至道中嵗鑄錢八十三萬貫景徳末至一百八十三萬貫則財之所入多於國初矣然國初三嵗一郊費五百萬貫景徳以來祀郊費七百餘萬祀汾隂上寳璽不與焉至道末所出不過二千餘萬貫天禧末天下揔收二千六百餘萬貫緫費錢二千七百一十萬貫設者不預焉今日揔司之財古之掌財者二今之掌財者三内帑也外帑也此自古以來則然也而中興之後則於二者之外而有揔司之財焉此不可不講也中興以來駐蹕呉㑹控扼之地上下數千里列屯相望費用不貲其始糧餉職之主将主将不自給也主将取之緫司緫司吝於供億也然後請之於朝而揔領之官出焉然未以名官也自收諸帥之兵目為御前分屯要害而後揔領之官置焉號為外司農其權重也官分四揔領其職專也兩淮之職或分或合四川之名或仍或革此特一時之制焉爾而其大意則欲便於糧餉也大抵國家用度多靡於兵西蜀湖廣江淮之賦類緫司其供京師者惟仰閩浙而已近年以來甞命官以攷緫司之財矣又甞欲合緫司之財以歸户部矣合之則緩急無所備不合則事權無所統其說紛紛至於今未定愚切以為合之非也不合亦非也盍亦求中興之初所以命官之意乎方其初年揔領財賦本之户部兵貳職固在外也而其權未始不歸於内也權出於内則可以制其虚盈職分於外則可以備其緩急斯不亦可行之法乎四緫所掌錢糧鎮江諸軍錢糧淮東揔領掌之建康池州諸軍錢糧淮西揔領掌之鄂州荆南江南諸軍錢糧湖廣揔領掌之興元興州金州諸軍錢糧四川揔領掌之紹興嵗入之數渡江之初東南嵗入猶不滿千萬上供纔二百萬緍此祖宗正賦也吕頥浩在户部始創經制錢六百六十餘萬緍孟庾為埶政又増揔制錢七百八十餘萬緍朱勝非當國又増月樁錢四百餘萬緍紹興末年合茶塩酒筭坑冶𣙜貨糴本和買之入六千餘萬緍而半歸内藏係年錄紹興二十七年嘉定嵗入之數當今嵗入之數為緍錢三千五百餘萬而歸於版曹者葢一千九百餘萬歸於淮東之揔所者二百六萬歸於淮西揔所者三百七十八萬歸於湖廣者五百七萬歸於四川者五百三十八萬嘉定十年廷對羣書考索續集卷四十五
