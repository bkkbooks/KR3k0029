body:
  text: 羣書考索後集卷九宋章如愚編官制門九卿類夏商九卿伊尹曰九卿通寒暑周六官是為六卿又立少師少傅少保是為三孤與六卿為九焉前漢百官注漢正卿九太常光禄勲衞尉太僕廷尉鴻臚宗正大司農少府亦謂之九寺大卿又置十二卿執金吾大長秋將作大匠後漢分屬太尉司徒司空魏晉宋齊如舊梁天監中象四時置十二卿春卿太常宗正司農夏卿太府少府太僕秋卿衞尉廷尉大匠冬卿光禄鴻臚太舟即都水後魏置六卿各有少卿北齊謂之九寺隋唐因之龍朔改九年名九卿皆加正若太常卿為奉常正卿後復舊又九寺皆曰棘卿見通典分紀宋雖設九卿皆以為命官之品秩而無職事元豐正名始有職掌中興以来併省冗職除太常寺太理寺不罷外宗正以太常兼而衞尉併兵部太僕併駕部太府司農併户部光禄鴻臚併禮部紹興復置宗正太府司農餘遂廢中興㑹要太常寺太常卿唐虞伯夷為秩宗夔典樂太常之任也周曰宗伯為春官典邦禮秦改奉常典宗廟禮儀有丞漢初曰太常以列侯忠孝恭謹者居之秩中二千石太常者王之旌也畫日月有大事則建以行禮禮官主奉持之故曰奉常後改為太常欲令國家盛大常存惠帝更名奉常景帝更名太常王莽改為秩宗後漢太常掌禮儀祭祀及行事掌賛天子晉品第三銀章青綬進賢兩梁冠綘朝服佩水蒼玉餘卿皆同魏晉宋齊皆有舊用列曹尚書好遷選曹尚書領䕶梁太常宗正司農為春卿太常位視金紫光禄大夫後魏為上卿兼置小卿官周禮有大宗伯北齊曰太常寺置卿及少卿丞各一人掌陵廟羣祀禮樂儀制天文術數衣冠之屬隋與北齊同煬帝加置少卿二人唐髙宗龍朔改為奉常咸亨復舊光宅改為司禮神龍復正卿一人總判寺掌禮樂郊廟社稷之事總大樂鼓吹太醫太卜廪犧諸祠廟等署通典六典宋太常寺皆以禁林之長主判續㑹要云皆以兩制充而禮院自有判院同判院祥符中符瑞繁縟别建禮儀院輔臣主判而知制誥為知院天禧末罷知院天聖中省禮儀院而寺與禮院事舊不相兼康定元年置判寺同判寺並兼禮儀事元豐正名始専其職焉職畧卿掌禮樂郊廟社稷壇壝陵寢之事禮之名有五吉賓軍嘉凶皆掌其制度儀式祭祀有大祠有中祠有小祠其犧牲幣玉酒薦獻器服各辨其等掌樂律樂舞樂章凡親祠及四孟月朝獻景靈宫郊祀太廟掌賛相禮儀升䧏之節及朝㑹宴饗上夀封冊之儀若禮樂有損益及祀典神祇爵號與封襲繼嗣之事當考定者擬上於禮部凡太醫政令以時頒行四朝志元祐詔太常寺置長貳餘寺監長貳並互置㑹要中興併省寺監獨存太常又命太常兼宗正紹興復中興㑹要隆興元年詔光禄寺併歸太常寺兼領丞一員罷孝宗會要太常少卿周小宗伯少卿之任秦漢無聞後魏太和初置少卿一人後周為小宗伯景明初少卿為第一清選明禮樂兼天文隂陽者為之隋置少卿一人煬帝置二人唐武徳置一人正觀置二人龍朔改為奉常大夫宋少卿無職事以為階序品秩元豐正名始有職掌元祐元年吕純禮為少卿御史論門廕得官不可任奉常於是外補續㑹要中興建炎三年詔太常少卿一員兼宗正少卿㑹要太常丞奉常秦官有丞漢多以博士議郎為之後漢諸丞皆掌行禮及祭祀小事總署曹事皆銅印墨綬歴代皆有唐因之分判寺事通典宋皇祐中詔特差近上知禮官一員兼丞事御史李泌之請也職畧建炎三年省丞紹興三年復置中興㑹要太常博士秦官漢叔孫通為博士定禮制博士掌通古今員多至數十人後漢置十四人魏晉時掌引導乘輿王公以下應追諡者則博士議定之歴代皆有隋四人唐因之甚為清選資位與補闕同掌撰五禮儀注導引乗輿賛相祭祀定誄諡及祥瑞之事通典分紀宋祥符中置博士二員後四員元豐正名初除何洵直博士掌講定五禮儀式有改革則據經審議凡於法應諡考其行狀撰定諡文有祠事則監視儀物掌凡賛道之事四朝志中興省丞簿而太常博士如故紹興九年諫議大夫曽統言祖宗朝太常博士四員今見一員詔添置一員中興㑹要太常寺主簿主簿漢有之鹵簿之制太常駕四馬主簿前車八乗魏晉亦有之唐置二人掌付事勾稽省署抄目監印給紙筆等事餘寺主簿並同職通典職林分紀皇祐中宋祁乞増置一員勾檢在寺文書及掌出納遂除胡瑗後詔省不置元豐正名初除王子竒職畧建炎三年省紹興十年復置㑹要大社令周建國左宗廟右社稷故有典祀掌以時祭祀以時而祭則徵役於司𨽻帥其屬而修除之秦漢有太祝令景帝改為祠祀武帝更曰廟祀後漢祠祀屬少府魏晉有太祝令丞宋有明堂令丞掌祀五帝之事齊有太祝及明堂二令梁有明堂太社二令北齊太廟令兼領郊祀崇虚二丞郊祀掌五郊羣神崇虚掌岳瀆神後周有司郊司社隋置郊社令唐因之掌郊社明堂祀祠祈禱及茅土衣冠等事宋初年置郊社令命石祖元為之熈寜元年郊社局令張伯世言局有郊社名而不主四郊之事於是始主四郊壇壝之事按唐六典兩京郊社局令各一人掌五郊社稷明堂之位然則郊社令通掌五郊之事乞自今兼令勾當四郊壇壝之事使得廵視提舉所貴官正其名郊兆常潔從之郊社令掌廵視四郊及社稷之壇壝掌凡掃除之事祭祀則省牲四朝志渡江初闕紹興十九年始除韓彦直為太社令請給等並依五監主簿例中興會要籍田令周為甸師漢文帝感賈誼之言始開籍田置令丞掌耕國廟社稷之田春始東耕於籍田祠先農大賜三輔二百里孝弟力田三老帛種百榖收萬斛立為籍田館榖皆以給祭天地宗廟羣臣之祀東漢及魏闕晉武復置江左省宋元嘉中又置通典宋掌帝籍耕耨出納之事五榖蔬菓蔵氷以待用見四朝志元豐三年詔籍田令𨽻太常寺續㑹要渡江初闕紹興十五年初除康與之為籍田令三十一年詔籍田司權罷官吏並罷中興㑹要後復置大理寺大理卿虞舜命臯陶作士正五刑孔安國曰理官也周官為司宼晉文公使李離為理韓詩外傳曰謂察理刑獄也秦置廷尉掌刑辟有正左右監漢因秦景帝更名大理武帝復為廷尉宣帝置左右廷尉平哀帝復為大理後漢復為廷尉郡國讞疑皆處當以報魏以世家為之而郭氏尤盛時郭躬為廷尉家世掌法務在寛平乃條諸重文可從輕者四十一事悉令皆施行躬奏讞法利多所生全梁為秋卿隋為大理寺唐因之龍朔改為詳刑寺咸亨復光宅改司刑神龍復卿一人掌鞫獄定刑决諸疑讞宋大理寺以朝官一員或二員判寺事一員兼少卿事建隆二年以工部尚書竇儀判寺事㑹要故事䑓省長官兼判公事得言判某官事如晉朝尚書左丞崔祝兼判太常卿事是也若止言寺事則其屬丞正並可行之竇儀兼判太常寺又兼判大理寺事皆新例也凡獄訟之事随官司決劾不復聴訊但掌斷天下奏獄送審刑院詳訖同書以上于朝熈寜九年神宗謂國初廢大理獄非是以問孫洙洙對合㫖於是下詔以京師官寺凡有獄皆繋開封府司録司及左右軍廵三院囚逮猥多難於隔訊又暑多瘐死因縁留滯動渉嵗時稽參故事宜屬禮官可復置大理獄天下奏案刑部審刑院詳斷置卿一少卿二丞四始命崔台符知卿事蹇周輔楊汲為少卿各舉丞及檢法官四朝志官制行左斷刑右治獄各五案左㕔斷刑曰詳刑詳讞宣黄分簿奏表右㕔治獄曰左推右推寺案知雜檢法元祐間因鮮于侁所請廢大理獄後復職畧卿掌折獄詳刑鞫獄之事凡職務分左右天下奏劾命官將校及大辟囚以下以疑請讞者𨽻左斷刑則司直評事詳斷丞議之正審之若在京百司事當推治或特㫖委勘及係官之物應追究者𨽻右治獄則丞専推鞫盖少卿分領其事而卿總焉四朝志建炎三年併省寺監而大理如故省卿而斷刑治獄少卿各一員中興㑹要大理少卿後魏置北齊及隋因之唐置二人六典宋以朝官一員兼少卿事神宗置大理獄少卿二員以蹇周輔楊汲為之分左斷刑右治獄四朝志建炎中興省大理卿而少卿二員如故中興㑹要大理寺正周禮記王制成獄辭史以告於正正聴之秦置廷尉正二人漢廷尉正監及平謂之廷尉三官秩千石梁服獬豸冠銅印墨綬唐龍朔改為詳刑大夫光宅中為司刑正後復改掌議獄正科條凡丞斷罪有不當者則以法正之唐四朝志掌參議刑辟詳正科條之事見職林分紀宋神宗復置大理獄後置寺正元豐五年刑部奏乞分評事司直與正為斷司丞與長貳為議司凡斷案先上正看詳當否論難改正然後過議司覆議續㑹要建炎併省斷刑治獄寺正各置一員中興㑹要大理寺丞晉武帝咸寜中因曹志上書請廷尉置丞隋改為勾檢官唐置丞六人掌分判寺事正刑之輕重宋神宗復置大理獄丞四員命卿少舉官元豐五年命莫君陳等九人為大理寺丞始自朝廷差官也續會要舊制斷刑寺丞六員建炎三年減三員治獄寺丞減二員中興㑹要大理司直後魏永安三年髙穆奏置司直十人位在正監上不署曹事唯覆理御史檢劾事六典注分紀唐置六人掌承制出使推覆若寺有疑獄則參議之宋熈寜中置大理獄及至元豐五年始命程嗣先四人為四直續㑹要建炎三年詔斷刑司直兼治獄司直其治獄司直罷中興會要大理評事漢宣帝地節三年初於廷尉置左右平員四人後漢光武省右平唯有左平掌平決詔獄冠法冠魏晉以来無左右而直謂之廷尉評隋置大理評事此語見六典注唐貞觀二十二年褚遂良議重法官奏置評事十員掌出使推覆後加為十二員通典宋熈寜置大理獄至元豐五年始命張仲穎等十二人為評事續㑹要云大理寺簿晉初置廷尉主簿六典後齊九寺各有主簿隋百官志唐置二人掌印省署抄目勾檢稽失唐百官志宋元豐正名初除二員建炎三年省後復司農寺司農卿少皥氏以九扈為九農正扈通典作􅟾注􅟾鳥也􅟾有九種以為農號舜命棄為后稷播時百榖周禮有太府掌九賦九貢下大夫秦為治粟内史掌榖貨韓信歸漢為治粟内史即其任也景帝更名大農令武帝太初更名太司農掌九榖六畜之供膳羞者凡郡國諸倉農監都水六十五官皆屬焉通典云屬官有太倉均輸平準都内籍田五令丞平帝改曰羲和以劉歆為之又改為納言後漢為大司農掌諸錢榖金帛郡國四時上月旦見錢穀簿邊郡諸官請調度者皆為給報損多益寡取相給足郡國鹽鐵官初屬司農中興屬郡縣歴代皆有梁置十二卿以署為寺官為卿唐有司農卿龍朔改為司稼咸亨復卿掌邦國倉儲委積之事緫四署諸監謹其出納京師百官廩禄皆仰給焉朝㑹祭祀共御所須孟春皇帝親耕籍田之禮有事于先農則奉進耒耜季冬藏冰祭司農以黑牡秬黍仲春啟氷亦如之六典宋司農寺判寺事二人以兩制或朝官以上充熈寜二年立常平歛散法三年詔以新法付司農寺而農田水利免役保甲等法悉自司農講行元豐官制行寺監不治外事遂循唐典正其職秩司農舊職悉歸户部右曹續㑹要司農掌倉儲委積之政令緫苑囿庫務之事而謹其出納京都官吏禄廩諸路嵗運至京師悉掌焉凡苑囿行幸排比及薦饗進御頒賜植蔵之物與造麴糵給薪炭皆戒有司以時辦具天子親耕籍田則奉耒耜所𨽻官屬凡五十倉二十有五會要總作二十四草場十有二續㑹要作十排岸司四續會要園苑四並四朝志建炎三年詔罷司農寺紹興四年復置司農寺卿少各特置二員中興㑹要司農少卿後魏北齊司農寺置少卿隋唐因之宋元豐正名置少卿為卿之貳建炎三年省紹興四年復中興㑹要司農寺丞秦治粟内史有兩丞漢司農丞亦二人或謂之中丞通典云耿夀昌為大司農中丞奏設常平倉給北邊省轉漕又桑𢎞羊為大司農中丞管諸計㑹事平帝又置大司農部丞十三人人部一州勸農桑後漢司農丞一人部丞一人魏晉因之銅印黄綬進賢一梁冠宋齊以墨綬並通典唐有丞六人掌判寺事凡天下租税及折造轉運于京師皆閱而納之以供國用以禄百官分紀宋新法行呂惠卿請始置司農寺丞一員以農田水利免役保甲等法付司農熈寜五年増置丞四員仍與簿輪出按察逐州保甲元豐四年舒亶請止留丞一員餘並罷明年改制以司農舊職悉付户部右曹而始循唐典正其秩職續㑹要建炎三年詔罷司農寺紹興三年復置寺丞二員中興㑹要司農寺主簿晉太康中置主簿一人自後無聞梁陳又有北齊亦然唐主簿二人掌印署抄目勾檢稽失出納通典分紀宋治平中已置主簿熈寜新法行詔増一員五年増至四員後置六員元豐四年舒亶請存三員餘並罷仍與丞輪出逐州按察保甲續㑹要建炎三年罷司農紹興十年復置中興㑹要太府寺太府卿周官有太府下大夫掌貢賦之貳受其貨賄之入頒其貨賄于受蔵之府即今太府之任歴代不置然其職在司農少府至梁天監置太府卿掌金帛府帑及闗津市肆位視宗正後魏太和改少府為太府卿掌財物庫蔵王顯謂楊固曰吾作太府卿庫蔵充實固曰減百官之禄及贓贖悉入京蔵以此充府未足為多北齊兼掌造器物後周太府中大夫賞貢賦貨賄以供國用屬大冡宰隋初與北齊同所掌左右蔵及尚方司染甄官等署煬帝分太府寺置少府監管尚方織染等署而太府但管市及平凖左右藏唐因隋龍朔改太府為外府正卿咸亨復光宅改為司府神龍復領兩京諸市平凖左右蔵常平等九署通典宋太府寺判寺事一人以兩制或帶職朝官充凡財物廪蔵貿易四方貢賦百官俸秩皆𨽻三司本寺但掌供祠祭香幣帨巾神位席及造斗秤升尺而已元豐改制始正職掌此據續㑹要而題名乃云國初省部寺監惟以寄禄寺則光禄太常宗正衞尉司農大理或以卿或以貳或以丞各寓一階别設主判之官以典事惟太府則否其職悉入三司諸案故主判之任罕置與㑹要稍異當考卿掌財貨出納貿易之事凡貢賦之輸于京師者至則别而受之供君之用及待邊費則歸於内蔵供國之用及待經費則歸于左蔵應禄賜以法給厯從有司檢察書其名數鈎覆而後給焉供奉之物則承㫖以進審奏得畫乃聴除之若頒畿内軍衣則前期進様定其頒日將校部營兵支請月具數以聞凡商賈之賦小賈即門征之大賈則輸於務貨之不售平其價鬻於平準乗時賖貸以濟民用若質取於官則給用多寡各從其抵嵗以香茶鹽抄募人入豆榖實邊即京都門用物預報度支凡課入以盈虧定課最行賞罰大祭祀祼則卿置幣奠玉則入陳玉帛元祐三年詔太府寺置長貳餘寺監長貳互置建炎三年詔罷太府寺撥𨽻金部獨以一丞治鹺茗之質劑凡省五年而後復置卿少一員初除馬承家初元豐以在京司局分屬寺監而太府總局二十有四今雖頗省猶劇於他寺以式班内外之廩稍覆其名數而鈎磨之則諸軍諸司糧審四院屬焉頒財用於受蔵之府周知入出而㑹之則左蔵東西兩庫屬焉時禁省官府之需以儥用物則買務屬焉斥幣餘互市之積以便貿易則賣場屬焉比物奠賈俾從其抵則編套兩局屬焉藥石必良以除札瘥則和劑恵民四局屬焉叙財幣以待上之賜好則祗候庫屬焉制券之短長以通商則鈔引庫屬焉所異於元豐者惟内蔵奉宸不外屬㩁貨顓𨽻於諸司太府少卿後魏孝文帝改少府為太府置少卿一人北齊因之隋煬帝加至二人唐減一人貞觀中復龍朔咸亨光宅神龍並随寺改復六典宋太府寺同判寺同判寺一人以京朝官充元豐正名置少卿一人以為卿之貳元祐三年詔太府長貳並置餘則否續㑹要建炎中興省紹興四年復中興㑹要太府寺丞丞於周官為太府上士之任梁選部太府丞一人陳因之後魏亦一人後周曰太府上士隋又曰太府丞六人唐四人通典掌判寺事凡正大朝應貢萬物應陳於殿廷者皆受而進之分紀宋丞二人元豐改制置丞二人元符中増一員崇寜中置藥局又添丞一員宣和中省一員建炎三年罷太府寺紹興三年置三員中興㑹要太府寺主簿主簿亦周官太府下士之任梁置一人陳因之後魏一人隋四人唐三人掌印省署抄目勾檢稽失凡置木契九十五隻通典分紀宋元豐改制置主簿二人續㑹要建炎三年罷太府寺紹興十年復置中興㑹要羣書考索後集卷九
