body:
  text: 羣書考索别集卷五宋章如愚撰經籍門書洪範九疇劉氏之𫝊曰田獵不宿飲食不享出入不節奪民農時則木不曲直引春秋成公十六年雨水氷為證劉向以隂氣脅木為僑如公子偃之應歆以為上陽施不下通下隂施不上逹或又以為魯侯執辱之異或又以為甲兵之象吾不知何者可信又曰棄法律逐功臣殺太子以妾為妻則火不炎上引春秋威公十四年八月御廪災為證向則曰夫人有淫行也歆則曰棄法度亡禮之應也仲舒則曰君臣俱猜也吾不知何從又以木不曲直則貌之不恭是謂不肅厥咎狂厥罰常雨厥極惡能順之則其法為攸好徳五行皆然是以五事上配五行下配五福六極不能當於庶徵又有厥咎眊厥罰常隂之説此其又惑矣思昔夫箕子之言九疇自五行至於五福六極固不能無後先緩急之序首以五行者以天生五材闕一不可一日而無五行則人不能以自生何暇論五事八政五紀三徳以至五福六極乎故曰鯀湮洪水汩陳五行帝乃震怒不畀洪範九疇言九疇始於五行五行本於水火性失則五行汩亂五行之性失則九疇無序矣謂九疇以五行為重可也而謂九疇皆配合以五行則非也九疇之相配惟五事庶徵而已曰肅時雨若乂時暘若哲時燠若謀時寒若聖時風若此以人事上配天時經則明言之矣其他皆無相配之理也五行之與五事亦自不相渉况及其他乎先儒以貌配木以言配金以視配火以聴配水以思配土漢儒之説然也非箕子之意也若出箕子之意則五行必先木以當貌次金以當言次水次火次土以當視聴思又必須庶徵謂謀肅乂哲聖之言今五行乃先水次火次木次金次土殊不與五事同序又無肅乂謀哲聖之言必欲配之者強配之也曾不思箕疇次八曰念用庶徵謂之庶徵則直以為五事之證驗與他疇不同也若夫五行自五行八政自八政五紀自五紀三徳自三徳稽疑自稽疑何證驗之有乎茍以五行皇極五福六極皆合於五事則八政五紀三徳稽疑亦可強合之乎知彼之不可而惟此之求戾箕子之意明矣近世蘇子知劉氏之失立論以非之是矣而其自為説則又以理五行資乎五事正五事頼乎皇極五行包羅九疇者也五事檢御五行者也皇極裁節五事者也此亦不可也五行之用特急於九疇何以能包羅九疇乎五事之在人無與於五行何以能檢御五行乎皇極之道凡天下事皆吾歸之八政三徳之類亦然豈惟裁節五事而已哉乃欲以一治三以三治九以九治五十以五十治百未見其可也且謂皇極之建凡九疇皆序亦可矣若皇極之不建吾不知木何以不曲直金何以不從革土何以不稼穡至於六極之中生而抱病謂之疾狀貌醜陋謂之惡勢力孤寡謂之弱此皆出於天命非人之所能為也今以皇極不建五事不當五行不順乃使人疾使人惡使人弱有是理乎蘓子之論正與五行𫝊辯而未免五行𫝊惑之也誠使劉氏之𫝊舉而焚之不為後儒惑則九疇之義昭昭矣五行相生陽變隂合初生水火水火氣也流動閃鑠其體尚虚其成形尤未定次生木金則確然有定形矣水火初是自生木金則資於土五金之属皆從土中旋生出文公語録隂陽在五行中得五行之秀者為人只説五行而不言隂陽者盖人湏是五行方做得成然隂陽便是五行中所以周子云五行一隂陽也舍五行無别討隂陽處同前虚明虚暗之理火中虚暗則離中之隂也水中虚明則坎中之陽也同前錯綜相生水隂根陽火陽根隂錯綜而生其端是天一生水地二生火天三生木地四生金到得運行處便水生木木生火火生土土生金金又生水水又生木循環相生又如甲乙丙丁戊己庚辛壬癸都是這隂陽事同前土旺四季之義土寄旺於四季每季皆十八日是土四个十八日計七十二日其他四行分四時亦各得七十二日五个七十二日共湊成三百六十日也同前隂陽生五行四時陽變隂合而生水火木金土水隂盛故居右火陽盛故居左木陽穉故次火金隂穉故次水土冲氣故居中而水火之交係乎上隂根陽陽根隂也水而木木而火火而土土而金金而復水如環無端五氣布而四時行也太極圖天地氣質之説五行者質具於地而氣行於天者也以質語其生之序則曰水火木金土而水木陽也火金隂也以氣語其行之序則曰木火土金水而木火陽也金水隂也又統而言之則氣陽而質隂也又錯而言之則動陽而静隂也同前五行分合之理隂陽之為五行有分而言者如木火陽而金水隂也有合而言之者如木之甲火之丙土之戊金之庚水之壬皆陽而乙丁己辛癸皆隂也文公文集洪範始終貫皇極洪範一篇首尾都是歸從皇極上去盖人君以一身為至極之標凖最是不易又湏歛是五福所以聚歛五福以為建極之本又湏是敬五事順五行厚八政協五紀以結裹个皇極又湏乂三徳使事物之接剛柔之辨湏區處教合冝稽疑便是考之於神庶徵是驗之於天五福是體之於人這下許多是維持這皇極語録人君端本示儀之理五皇極只是説人君之身端本示儀於上使天下之人則而效之聖人固不可及然約天下而使之歸於正者如皇則受之則錫之福也所謂遵王之義遵王之道者天下之所取法也人君端本豈有他哉修於己而已一五行是發源處二五事是總持處八政則治民事五紀則協天運也六三徳則施為之樽節處七稽疑則人事已至而神明其徳處庶徵則天時之證驗也五福六極則人事之證驗也其本則在人君之心其責亦甚重矣皇極非説大中之道若説大中則皇極都了五行五事等皆無歸着處同前人君為治之心法問皇極曰此是人君為治之心法如周禮一書只是个八政而已中不可以訓極至如北極之極屋極之極皇極之極民極之極諸篇雖有解為中者盖以此物之極常在此物之中非指極字而訓之以中也極者至極而已以有形者言之則其四方八面合湊將来到此築底更無去處從此推出四方八面都無向背一切停均故謂之極耳後人以其居中而能應四方故指其處而以中言之非以其義為可訓中也文公文集極者標凖之義若皇極之極民極之極乃為標凖之意猶曰立於此而示於彼使其有所向望而取正焉耳非以其中而命之也同前後人訓極為中非是大𫝊洪範詩禮皆言極而已未嘗謂極為中也先儒以此極處嘗在物之中央而為四方之所面内而取正故因以中釋之盖亦未為甚失而後人遂直以極為中則又不識先儒之本意矣同前窮極極至之義皇極如以為民極標凖立於此四方皆面内而取法皇謂君太極如屋極隂陽造化之總會樞紐極之為義窮極極至以上更無去處語録極不可以訓中人君建極如个標凖如東方望也如此西方望也如此南方望也如此北方望也如此莫不取則於此如周禮以為民極詩維民之極四方之極都是此意中固在其間而極不可以訓中同前君奭之書召公為保周公為師相成王為左右召公不悦周公作君奭此孔氏説也司馬遷作史記燕世家亦曰成王㓜周公攝政因踐阼召公疑之乃作君奭未知所以不悦而疑之者何哉孔頴逹曰周公既攝王政不宜復列於臣職是以召公不悦周公留也王氏曰襲文武至治之後則難為繼成王非有過人之聰明則易以壊以易壊之資任難繼之事此召公於親政之始有不悦也蘓氏曰成王既復政而詩謂周公不歸故也如王氏之説則是召公以成王聰明不足難與有為豈聖賢之意乎如孔氏蘓氏之説則是周公不知以禮進退反使召公有疑也孟子曰説詩者不以文害辭不以辭害意以意逆志是為得之學經之弊正坐於此拘辭失意豈惟詩而已君奭之書學者惟見序有召公不悦之言書有汝有合哉之語則皆以為召公疑周公召公聖人之徒也不疑周公於四國流言之際而疑周公於復辟之後有是理邪然則召公之不悦者非為周公自有所不悦也成王能自為政召公之年已老矣而復尊以師保之任方功成身退之時而加以尊重之寄雖成王之所眷注周室之所倚頼爵位日隆任責日重非召公所樂也况召公已封於燕身留相周而不得優㳺於國不説之㫖盖謂此爾是以周公勤勤作書以留之盖不以寵利居成功者人臣去就之際忘身徇國愛君不忍去者大臣終始之義召公之欲告老雖得去就之節未可為忘身愛君之義此君奭之書所為作也始則曰周雖受天命而天命不可知昔者商有天下賢臣若伊尹伊陟巫咸之徒皆始終盡忠不去王室故謂之率惟兹有陳保乂有􅇻是以多厯年所也至周文武之時虢叔閎夭之徒既昭文王於前又昭武王於後亦如商之世臣也今予暨汝奭其濟小子同未在位之時不可以位尊重不樂留此而異前世之臣也故耉造徳不降我則鳴鳥不聞謂老成之徳若不降意少留則不能致鳳鳥之瑞矣既又告之曰前人命汝作民極使汝明朂偶王其敢忘之乎及其終又曰惟乃知民徳亦罔不能厥初惟其終祗若兹往敬用治言汝惟知民徳不可徒盡臣節於初而不能成其終宜敬汝之治職而後可也深考一篇之義無非周公以大義留召公釋其不悦之意欲與同濟成王時周公自以為成文王之功于不怠雖海隅出日之地皆率俾之豈容召公告去乎觀此則君奭之書為留召公而作非召公不悦周公可知矣知此理則一篇之義昭然若謂召公以周公當去職則耉造徳不降之言乃周公自謂也可乎至於命汝作民極惟其終之言何謂耶故曰召公自有所不悦爾非為周公也其後周公没召公相成王至康王即位嘗為太保承介圭以授王則召公終老於王室雖有燕之封而終不得就國與周公之魯國也豈非以周公之㫖不可忘耶嗚呼君奭之書大臣愛君之義盡矣穆王三書嘗謂夫子定書自周成康之後獨存穆王作君牙伯冏呂刑三書使後世觀者知其用人與其訓刑之際如是明審可知穆王之為人不墜文武成康之風烈矣及觀韓退之作徐偃王遺碑乃曰偃王凡君國子民待四方一出於仁義時周穆王無道意不在天下得八龍騎之西逰宴王母于瑶池歌謡忘歸凹方諸侯之争辨者無所質正咸賔祭於徐執三帛二生之物于徐之庭者三十六國穆王方且復命造父御長驅而歸伐徐偃王北走嗚呼如退之説則夫子所存穆王三書可以廢而無𫝊究其所以乃退之恃矜智輕信異端詭説厚誣穆王也夫乘八駿而宴王母出於列子謂西極之化人請穆王同逰王執化人之袪騰上乎中天既而王悦不恤國事肆意逺逰乃至巨蒐氏之國又升崑崙之邱以至於瑶池此但列子假托謬悠之言以神其神仙之術與謂黄帝不親政事夢想華胥之事同莊列寓言大概譎恠如此後左氏不察乃因其説曰穆王欲肆其心周行天下将皆有車轍馬迹焉妄者又作穆天子𫝊以廣孟浪之説此退之所為據也夫以列子謂穆王好神仙不恤國事為可信則黄帝不親政事亦可信耶以穆王宴瑶池為可信則黄帝至華胥國亦可信耶退之名為信吾道排異端者也而反溺於異端不已陋乎且其言謂偃王能行仁義愈非也周室在上偃王誠知仁義者則豈敢斷諸侯之争辯受三十六國玉帛之贄乎信一誣怪之説而戾夫子定書之㫖立徐偃之偽名誣周王以大惡退之一碑之失百世不能贖也今觀穆王三書其命君牙為大司徒則自謂守文武成康之緒其心憂危若蹈虎尾渉春氷必頼股肱心膂為之翼也其命伯冏為大僕正則自謂怵惕惟厲中夜以興思免厥愆至有僕臣䛕厥后自聖之言非惟見其任伯冏君牙之得人且知其惕躬畏咎也其命吕侯以刑也則厯告以謹刑罰恤非辜雖當耄年而其心未嘗不在民反謂之意不在天下何耶使穆王作三書皆無實之言所任之人亦不當則夫子不取之也夫子存其書則君牙伯冏吕侯非妄人穆王非不恤國事之主明矣當是之時君臣如此而謂徐子僣王已謬况又受諸侯之贄乎今之世儒有讀伯冏為大僕正則曰穆王好馬故也讀呂刑王享國百年耄荒則曰老而荒怠故好逰也盖列子之説傳為左氏以及於韓子信韓子之説必至於此也據書曰王享國百年耄荒言時已老矣年雖老而猶荒度作刑以誥四方正見其不怠也荒度之義與禹荒度土功同若果既耄荒何暇訓夏贖刑乎予病世人聞聲覘影毁譽失真至有無兄盗嫂無妻撾婦翁之謬街談巷議不足恤而韓子亦信之所以不得不為之辯也吕刑非先王之法問贖刑所以寛鞭朴之刑則吕刑之贖刑如何曰吕刑盖非先王之法也故程子䇿問云商之盤庚周之吕刑聖人載之於書其取之乎抑将垂戒後世乎文公語録秦誓何以入經秦穆公夷狄君爾以夫子定書何以秦誓附之於帝王書之後百篇之書帝王大訓特序秦誓者盖聖人念焚書之酷雖知不可免猶不敢廢人事焉若曰旌穆公之改過用人彼夷狄之君爾既死猶以三良殉𦵏豈其能改過而用人者乎諸臣執贄書記舜廵守之日脩五禮五玉三帛二生一死贄孔氏傳曰三帛諸侯世子執纁公之孤執元附庸之君執黄二生卿執羔大夫執雁一死士執雉元纁黄之説於經則無所據矣况舜之東廵肆覲東后方與諸侯協時月同度量脩禮玉諸侯世子何得執纁以見乎孤之名起於周官為三宗之貳書春秋與孟子言諸侯之制並無孤之名獨周禮有之舜之時未可據此且世子必執纁孤必執元附庸必執黄所取何義若無義則謂世子執元孤執黄附庸執纁亦可也是故不可不辯孔氏釋書類皆亡據有如舜之東廵肆覲東后雖曰脩五禮五玉三帛二生一死贄而未嘗有纁元黄之説與夫羔雁雉之言此孔氏據周禮大宗伯之文因以意而觧之其失亦甚矣且禮諸侯所執者玉而已幣帛禽鳥皆非所執也盖彼據周官書有執之文孔氏之失正自周官書誤之也大宗伯以禽作六摯以等諸臣曰孤執皮帛卿執羔大夫執雁士執雉庶人執鶩工商執雞據春秋魯莊公娶夫人使宗婦以幣見春秋書曰大夫宗婦覿用幣不聞其執幣也惟左氏曰禹會諸侯於塗山執玉帛者萬國盖用玉帛連文其實執玉奠帛也若信周禮謂帛可執則皮亦可執乎嗚呼執帛猶可也曰羔雁雉之物其可執乎方卿大夫之見天子鞠躬屏氣傴僂不假而乃手執羔執雁執雉果為禮容乎至尊之前羔雁生禮執持惟恐或失不知何如拜趨俯伏乎至於執死雉以見君豈其宜哉且必取此三物何義鄭氏曰卿執羔者取其羣而不失其類或曰羔羣而不黨凡鳥獸各以其類聚何特羔不失其類乎又安知羔之不黨乎陋説之甚也大夫執雁者取其俟時而行如大夫之隨君也凡人臣皆當隨君而大夫獨取此義何耶士執雉者謂士當如雉耿介為君致死也凡為人臣者皆當為君致死何特士也哉若如所説則卿之所執亦可以為大夫之所執大夫之所執亦可以為士之所執皆不通之説盖作周官書者但見舜典上有五玉之文以玉為可執則下之三帛二生一死之物皆可執也諸侯既執玉矣則其餘所執者不得不強以孤卿士大夫當之是不思之甚不知舜典之㫖不然舜之行守諸侯各執玉以見而三帛二生一死之物特以為贄見之禮爾古者君臣相見必以見土地所生之物而為之贄康王之誥曰皆布乗黄朱賔稱奉圭兼幣曰一二臣衛敢執壤奠方康王既尸天子諸侯皆布四黄馬朱鬛以為庭實謂之壤奠舜之諸侯以三帛二生一死贄者亦壤奠之謂也禽鳥之物性馴擾者則生致之性耿介者則死致之此皆使人致之于天子天子受其贄而還其玉故曰如五器卒乃復使孤卿大夫士常執之物天子不容受之不與五器俱復也觀此則可見執羔執帛等之説為謬矣執帛執羔固不可而又謂庶人執鶩工商執雞愈可鄙也謂孤卿執贄何所見邪此又因舜典之文而增益之惑世之甚也矣書至文侯而誥命絶風氣之推移治道之通塞必於其會而觀之此篇作於東遷之初由此而上則為成康為文武由此而下則為春秋為戰國乃消長升降之交會也故法語舊典尚有一二未冺而陵遲隳墮之意亦已見於辭命之間學者所當審擇而明辯焉文侯之命見周終於東嗚呼周所以終於東者盖於此章見之平王東遷之初大讐未報王略未服正君臣坐薪嘗膽之時也奔亡之餘僅得茍守而君臣釋然遽自以為足曰父義和其歸視爾師寜爾邦兵已罷矣曰用賚爾秬鬯彤弓盧矢功已報矣曰父往哉柔逺能邇恵康小民無荒寕叙之以平世之政軍旅不復講矣曰簡䘏爾都用成爾顯徳勉之以本邦之治王室無復事矣嗚呼周之君臣如此周其終於東乎書録秦魯見帝王之道未嘗終五帝三王之命至文侯之命竭矣受之以費誓者以法制之在列國猶可因也受之以秦誓者以理義之在人心猶可復也充魯國之心而因伯禽之法帝王之道何逺之有觀書之終而後知帝王之道初無所終也書非甚髙而難行昔孔子序書録上古之帝王於其興事造業布政出令以經理天下之際始於受禪終於征伐已略盡矣今其存者其智謀非有出於人也其行事非有以矜於衆也以天為不可不敬以民為不可不畏以己為不可私以諫為不可逆患至而不敢避功成而不敢居酌天下之事而處其中如是而已矣葉水心進卷羣書考索别集卷五
