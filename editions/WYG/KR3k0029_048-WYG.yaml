body:
  text: 羣書考索卷四十八宋章如愚撰樂門樂名類樂者聖人之所樂也而可以善民心其感人深其移風易俗易故先王著其教焉夫民有血氣心知之性而無哀樂喜怒之常應感而動然後心術形焉是以志微噍殺之音作而民思憂嘽諧慢易之音作而民康樂粗厲猛奮之音作而民剛毅亷直正誠之音作而民肅敬寬裕和順之音作而民慈愛流辟邪散之音作而民淫亂先王恥其亂也故制雅頌之聲本之情性稽之度數制之禮義合生氣之和導五常之行使之陽而不散隂而不密剛氣不怒柔氣不懾四暢交於中而發作於外皆安其位而不相奪足以感動人之善心而不使邪氣得接焉是先王立樂之方也王者未作樂之時因先王之樂以教化百姓説樂其俗然後改作以章功德易曰先王以作樂崇德殷薦之上帝以配祖考樂記二十三篇禮記正義樂記篇按鄭目録云名曰樂記者以其記樂之義此於别録属樂記盖十一篇合為一篇謂有樂本有樂論有樂施有樂言有樂禮有樂化有樂象有賔牟賈有師乙有魏文侯今雖合此畧有分焉案藝文志云漢興制氏以雅樂聲律世爲樂官頗能紀其鏗鏘鼓舞而不能言其義武帝時河間獻王好儒與毛生等共采周官及諸子言樂事者以作樂記常山王禹成帝時爲謁者數言其義獻二十四卷記劉向校書得樂記二十三篇與禹不同其道浸以益㣲故劉向所授二十三篇著於别録今樂記所斷取十一篇餘有十二篇其名猶在二十四篇記無録也十二篇之名案别録十一篇下次奏樂器樂作意始樂穆說律季札樂道樂義招本招頌竇公是也十二至二十三又案别録禮記四十九篇樂記第十九則樂記十一篇入禮記也在劉向前矣至劉向為别録時更載所入樂記十一篇又載餘十二篇摠爲三十三篇也樂書太史公曰余毎讀虞書至於君臣相敕維是幾安而股肱不良萬事墮壊未嘗不流涕也成王作頌推已懲艾悲彼家難詩頌訪落曰未堪家多難可不謂戰戰恐懼善守善終哉君子不爲約則修德滿則棄禮佚能思初安能惟始沐浴膏澤而歌詠勤苦非大德誰能如斯治定功成禮樂乃興海内人道益深其德益至所樂者益異滿而不損則溢盈而不持則傾凡作樂者所以節樂君子以謙退爲禮以損感爲樂樂其如此也治道虧缺而鄭音興起封君世辟名顯鄰州争以相高卒於䘮身滅宗并國於秦太史公曰夫上古眀王舉樂者非以娯心自樂快意恣欲將欲爲治也正教者皆始於音音正而行正故音樂者所以動盪血脉通流精神而和正心也故聞宮音使人溫舒而廣大聞商音使人方正而好義聞角音使人惻隠而愛人聞徵音使人樂善而好施聞羽音使人整齊而好禮夫禮由外入樂自内出故君子不可須㬰離禮須臾離禮則暴慢之行窮外不可須臾離樂須臾離樂則奸邪之行窮内故樂音者君子之所飬義也厯代帝王樂名同異樂記云大章章之也咸池備矣韶繼也夏大也殷周之樂盡矣鄭氏注云大章堯樂名周禮闕之或作大卷咸池黄帝所作樂名也堯增修而用之鄭氏注大司樂曰大章咸池堯樂也大㲈舜樂也大夏禹樂也大濩湯樂也大武武王樂也正義曰知大章堯樂者樂緯及禮樂志云堯作大章故知之也周禮無大章故云闕此言大章當周禮大卷也周禮云咸池以祭地黃帝之樂堯不增修者則别立其名則此大章是也其咸池雖黄帝之樂堯增修者至周謂之大咸其黄帝之樂堯不增修大章者至周謂之大卷於周之世其黄帝樂堯不增修謂之大卷者更加雲門之號是雲門大卷一也知周别爲黄帝樂名雲門者以此樂記惟云咸池大章無雲門之名周禮雲門在六代樂之首故知别爲黄帝之雲門之名也知於大卷之上加雲門者以黄帝之樂堯增修者既謂之咸池不增修者别名大卷眀周爲黃帝於不增修之樂别更立名故知於大卷之上别加雲門是雲門大卷一也知樂有增修者禮樂志漢之文始舞者韶舞高帝六年更云改名文始也漢文始五行舞者本周舞始皇二十六年更立五行舞是知有增修之法案五行鉤命決云伏羲樂爲立基神農樂爲下謀祝融樂爲祝續案樂緯云黄帝曰咸池帝嚳曰六英顓帝曰五莖堯作大章舜曰簫韶禹曰大夏商曰大濩周曰大武禮樂志云顓帝作六莖帝嚳作五英與樂緯不同名曰六莖者宋均注云爲六合之英革五龍爲五莖者能爲五行之道立根莖也禮記正義樂府疑難西漢武宣之世命禮官考制度開蔵書之府設協律之官先代之微聲古今之遺器中僨而起幾絶而續是以芝房寳鼎白麟赤雁之歌凡十有九章薦之於郊丘及取安世歌凡十有七章用之於宗廟魏晉宋齊梁陳周隋沿革損益雖或不同然源流所出如國風雅頌可以支分而𣲖别也如晉有多牲及迎送神享神之歌齊有雩祭藉田之歌隋有蜡祭先農朝日夕月之歌或爲十二雅或爲十二和或爲十二成或爲十二順此厯代用之於天神人鬼地祗而不可雜也其外又有鐃歌有横吹曲今所存者鐃歌二十二曲而其四曲無傳横吹舊有二十八章自黨正也君子謂鄉大夫也鄉大夫士飲國中賢者亦用此禮又云六十者坐五十者立侍亦是黨正飲酒之事下又云合諸鄉射是亦州長習射之禮鄭以此魏晉以来已不復存如朱鷺如戰城南張籍李白嘗有是作此鐃歌詞也如入關如出塞張佑杜甫嘗有是作此横吹曲也其外又有相和三調皆周人房中所作之樂也如長歌如燕歌此干調也如苦寒如秋胡此清調也如公無渡河如飲馬長城窟此瑟調也三調之變又有所謂清商樂者如巴渝眀君白鳩白紵之属是也隋有七部唐有十部而獨以清商爲中上正聲也葛天氏八闋記呂氏春秋云葛天氏八闋伏羲樂名扶来亦曰立本神農樂名扶持亦曰下謀黄帝咸池頌黄帝有咸池樂堯增用之記曰咸池備矣咸皆也池施也言德無所不施也呂氏春秋曰黄帝命伶倫與榮綏鑄十二鐘以和五音以仲春之月乙夘之日在奎奏之命曰咸池周六代樂堯之樂亦曰咸池少皥作大淵顓帝作六莖帝嚳作六英堯大章頌堯作大章章眀也言堯徳章眀也呂氏春秋曰堯命質為樂丘郊山林谿石之音拊石擊石以象上帝玉磬之音按五弦之瑟作爲十五弦命之曰大章以象上帝舜韶箾頌舜繼堯乃作箾韶之樂韶紹也紹堯之道也左氏季札聘魯觀樂見舞象箾者曰大矣如天之無不幬也如地之無不載也雖甚盛德蔑以加矣孔子在齊聞韶三月不知肉味周官大㲈之舞漢改曰文始五行舞又以春秋言舜用臯陶伯夷等至十二牧天下戴德禹乃興九韶之舞致異物鳯凰翔舜作大韶書曰䕫命汝典樂敎胄子聲依永律和聲八音克諧無相奪倫神人以和䕫曰於予擊石拊石百獸率舞禹作大夏湯作大濩紂棄先祖之樂乃作淫聲書曰作奇技淫巧以恱婦人周六代樂周公作勺又有房中之樂以歌后妃之德春官大司樂以樂舞教國子舞雲門大卷大咸大韶大夏大濩大武以六律六同五聲八音六舞大合樂以致鬼神示以和邦國以諧萬民以安賓客以説遠人以作動物乃分樂而序之以祭以饗以祀乃奏黄鍾歌大呂舞雲門以祀天神乃奏太蔟歌應鍾舞咸池以祭地祗乃奏姑洗歌南呂舞大韶以祀四望乃奏㽔賔歌函鍾舞大夏以祭山川乃奏夷則歌小呂舞大濩以享先妣乃奏無射歌夾鍾舞大武以享先祖王出入則令奏王夏尸出入則令奏肆夏牲出入則令奏昭夏凡日月蝕四鎮五嶽崩大傀異災諸侯薨令去樂大扎大凶大災大臣死凡國之大憂令弛縣凡建國禁其淫聲過聲凶聲慢聲太樂本情性浹肌膚而藏骨髓雖經乎千載其遺風餘烈尚猶不絶春秋時陳公子完奔齊陳舜之後韶樂在焉故孔子適齊聞韶三月不知肉味曰不圖為樂之至於斯美之甚也周道始衰怨刺之詩起王澤竭而不作樂官師瞽抱其器而奔散於諸侯益壞缺矣傀音鬼周六代樂記周所存六代樂者黄帝曰雲門大卷黄帝能成名萬物以眀民共財言其德如雲之所出民得以有族類大咸咸池堯樂也堯能禪均刑法以儀民言其德無所不施大㲈舜樂也言其德能紹堯之道也大夏禹樂也禹治水敷土言其德能大中國也大濩湯之樂也湯以寬治民而除其害言其德能使天下得其所也大武武王樂也武王伐紂以除害言其德能成武功周九夏記春官鍾師掌金奏凡樂事以鍾鼔奏九夏王夏肆夏昭夏納夏章夏齊夏族夏祴夏驁夏杜子春云王出入奏王夏尸出入奏肆夏牲出入奏昭夏四夷来賔奏納夏臣有功奏章夏夫人祭奏齊夏族人侍奏族夏客醉而出奏陔夏公出入奏驁夏九夏皆詩篇名頌頌族類也周六鼔四金地官鼓人掌教六鼓四金之音聲以節聲樂以和軍旅以正田役教爲鼔而辨其聲用以雷鼔鼓神祀以靈鼓鼓社祭以路鼔鼔鬼享以鼖鼔鼓軍事以鼛鼔鼓役事以晉鼓鼓金奏此六鼔也以金錞和鼓以金鐲節鼔以金鐃止鼔以金鐸通鼓此四金也周筍簴禮記曰夏后云簴商云崇牙冬官梓人爲筍簴樂器所垂横曰筍植曰簴天下之大獸五臝者羽鱗者以爲軍六簴貴野聲也羽属常無力而輕聲清揚而遠聞故以爲磬簴臝屬常有力而不能走其聲大而宏故以為鍾簴至於鱗屬則以為筍簴三禮圖云鍾磬十六杖在人簨簴十六之數起於八音倍而設也秦始皇平天下六代廟樂惟韶武存焉二十六年改周大武曰五行房中曰壽人衣服同五行樂之色漢興樂家有制氏魯人善非以雅樂聲律世世在太樂官但能紀其鏗鏘鼓舞而不能言其義鏗鏘金石之聲高祖時叔孫通因秦樂又制宗廟樂太祝迎神于廟門奏嘉至猶古降神之樂也皇帝入廟門奏永至以爲行歩之節猶古采齊肆夏也乾豆上奏登歌獨上歌不以管絃亂人聲欲在位者徧聞之猶古清廟之歌也登歌再終下奏休成之樂美神眀既饗也皇帝就酒東廂坐定奏永安之樂美禮已成也又有房中祠樂高帝唐山夫人所作也周有房中樂至秦名曰夀人凡樂樂其所生禮不㤀本高祖樂楚聲故曰房中樂楚聲也漢昭容樂高祖六年又作昭容樂禮容樂昭容者猶古之昭夏也主出武德舞禮容者王位文始五行舞舞入無樂者至至尊之前不敢以樂也出用樂者言舞不失節能以樂終也大抵皆因秦舊事焉孝惠二年使樂府令夏侯寛備其簫管更名曰安世樂高廟奏武德文始五行之舞孝文廟奏昭德文始四時五行之舞孝武廟奏盛德文始四時五行之舞武徳者高帝四年作以象天下樂已行武以除亂也文始舞者曰本舜韶舞也高祖六年更名曰文始以示不相襲也漢安世房中歌十七章大孝備矣一章大孝備矣休德昭清金支秀華庻旄翠旌七始華始一章七始華始肅倡和聲神來宴娭庻幾是聽孟康曰七始天地四時人之始華始萬物英華之始以爲樂名如六英也續通典云五章兼變徵變宮爲七始我定厯數一章我定厯數人告其心王侯秉德一章王侯秉徳其鄰翼翼顯眀昭式清眀鬯矣海内有姦一章大海蕩蕩水所歸一章大海蕩蕩水所歸高賢愉愉民所懷安其所一章安其所樂終產豐草葽一章靁震震一章桂華一章都荔遠芳窅窊桂華孝奏天儀若日月光美芳一章馮馮翼翼承天之則慈惠所愛美若休德原父曰古詩皆有篇名今此獨兩章存仲馮曰本在前篇之末傳冩之誤置也磑磑即即一章磑磑即即師象山則嘉薦芳矣一章嘉薦芳矣吿靈享矣皇皇鴻眀一章皇皇鴻眀蕩侯休德在樂不荒惟民之則浚則師德一章孔容之常一章承帝眀徳一章承帝眀德師象山則漢郊祀歌十九章練時日練時日侯有望炳膋蕭延四方牲繭栗粢盛香尊桂酒賔八鄉帝臨帝臨中壇四方承宇海内安寧興文偃武后土冨媼昭眀三光青陽鄒子樂青陽開動根荄以遂震聲發榮巖處頃聼巗岩字朱明鄒子樂朱眀盛長敷與萬物西顥鄒子樂西顥沆碭秋氣肅殺𤣥㝠鄒子樂𤣥㝠陵隂蟄蟲葢蔵惟泰元惟㤗元尊媼神蕃釐鸞路龍鱗㒺不盻飾天地建始元年匡衡奏罷鸞輅龍鱗更定詩曰㳙選休成天地竝况惟予有慕爰熈紫壇思求厥路黼繡周張承神至尊日出入匡衡罷繡黻周張更定詩曰肅若舊典日出入安窮時世不與人同訾黄其何不徠下黄帝乘之而仙武帝意欲得之曰何不來耶太一况太一况天馬下薾浮雲晻上馳今安匹龍爲友元狩三年馬生渥洼水作天馬天馬徠從西極渉流沙九夷服天馬徕龍之媒游閶闔覩玉臺閶闔天門玉臺上帝之居太初元年誅宛王獲宛馬作天門天門開跌蕩蕩光夜燭徳信著休嘉砰隠溢四方景星景星顯見信星彪列景星者德星也鎮星為信星汾脽出鼎皇祜元始元鼎五年得鼎汾陰作齊房齊房產草九莖連葉蔓蔓日茂芝成靈華元封二年芝草生甘泉房作皇后皇后嘉壇立𤣥黄服物發兾州兆蒙祉福華煜煜華煜煜固靈根五神五神相包四鄰玉帝爲太一祖也包含也四鄰四方也朝隴首朝隴首覽西垠靁電尞獲白麟元狩元年行幸雍獲白麟作象載瑜象載瑜白集西食甘露飲榮泉赤鴈集六紛貟太始二年行幸東海獲赤雁作赤蛟赤蛟綏黄華葢孝文所作以示天下之安和也葢樂已所自作眀有制也樂先王之樂眀有法也孝景采武德舞以爲昭德以尊太宗廟漢樂府文景之閒禮樂肄業而已至武帝定郊祀之禮祠太一於甘泉就乾位也祭后土於汾陰澤中方丘就坤位也乃至樂府采詩夜誦采詩者依古遒人徇路采取百姓誦謡以知政教得失也夜誦者其言辭或秘不可宣故於中夜歌誦也河閒獻王禮樂古事班固云叔孫通没之後河閒獻王采禮樂古事稍稍增輯五百餘篇今學者不能昭見但推士禮以及天子説義又頗謬異河閒獻王雅樂漢武帝時河閒獻王有雅才以爲治道非禮樂不成因獻所集雅樂天子下大樂官常存肄之嵗時以備數然不常御也常御及郊廟皆非雅聲至成帝時謁者常山王禹世受河閒樂能説其義其弟子宋曅等上書言之平當以爲獻王修興雅樂以助化大儒公孫𢎞董仲舒皆以爲音中正樂立之大樂春秋鄉射作於學宫希闊不講故自公卿大夫觀聽者但聞鏗鏘不曉其意而欲以風諭衆庻其道無由今曅等守習孤學宜欲属雅樂以拒絶衰微事下公卿以爲久遠難分眀當議復寢漢河閒樂記河間獻王好儒武帝時與毛生等共采周官及諸子言樂事者以作樂記前漢禮樂志曰是時河閒獻王雅樂歲時以備數然不常御常御及郊廟皆非雅聲然詩樂施於後嗣猶有所祖述昔殷周之雅頌乃上本有娀姜嫄卨稷始生𤣥王公劉古公太伯王季姜女太姒之德乃及成湯文武受命武丁成康宣王中興下及輔佐阿衡周召太公申伯召虎仲山甫之屬君臣男女有功德者靡不褒揚功德既信美矣褒揚之聲盈乎天地之閒是光眀著於當世遺譽垂於無窮也今漢郊廟詩歌未有祖宗之事八音調均又不叶於鐘律而内有掖庭材人外有上林樂府皆以鄭聲施於朝廷至成帝時平當議雅樂復寢是時鄭聲尢甚五侯外戚之家至與人主争女樂哀帝即位罷樂府官然百姓浸漬日久不制雅樂以相變豪吏富民沉湎自若孝宣采昭德舞爲盛德以尊世宗廟武帝諸帝廟皆常奏文始四時五行舞哀帝自爲定陶王時疾之又性不好音及即位下詔曰惟世俗奢泰文巧而鄭衞之聲興夫奢泰則下不遜而國貧文巧則趨末背本者衆鄭衞之聲興則滛僻之化流而欲黎庶敦樸家給猶濁其源而求其清流豈不難哉孔子不云乎放鄭聲鄭聲淫其罷樂府官郊祭樂及古兵法武樂在經非鄭衞之樂者條奏别属他官丞相孔光大司馬何武奏樂人貟大凡八百二十九人其三百八十八人不可罷可領属太樂其四百四十一人不應經法成鄭衞之聲皆可罷奏可然百姓漸漬日久又不制雅樂有以相變豪富吏民沈湎自若陵夷壞于王莽也漢郊祀歌武帝立樂府采詩夜誦有趙代秦楚之謳以李延年爲協律都尉多舉司馬相如數十人造爲詩賦畧論律呂以合八音之調作十九章之歌以正月上辛用事甘泉圜丘使童女七十人俱歌昏祠至眀夜常有神光如流星正集于祠壇天子自竹宮而望拜百官侍祠者數百人皆肅然動心焉光武帝初平隴蜀增廣郊祀高帝配食樂奏青陽朱眀西皓𤣥暝雲翹育命之舞北郊及祀眀堂並奏樂如南郊迎時氣五郊春歌青陽夏歌朱明竝舞雲翹之舞秋歌西皓冬歌𤣥𡨕竝舞育命之舞季夏歌朱眀兼舞二舞眀帝永平元年東平王蒼揔定公卿之議曰宗廟宜名奏樂不應相襲所以眀功德也遂采文始五行武德爲大武之舞薦之光武之廟時樂四品一曰大予樂郊廟上陵之所用焉二曰雅頌樂辟雍鄉射之所用焉三曰黄門鼔吹樂天子宴羣臣之所用也四曰短簫鐃歌樂軍中所用也又采百官詩頌以爲登歌章帝元和元年籍田𤣥武司馬班固奏籍田歌辭用商頌載芟祠先農自東京大亂絶無金石之樂樂章亡缺不可復知後漢大予樂永平三年秋八月改太樂爲大予樂時曹充上言漢再受命仍有封禪之事而禮樂傾闕不可爲後嗣法五帝不相沿樂三王不相襲禮大漢宜制樂以示百官帝問制禮樂云何對曰河圖括天地象曰漢世禮樂文雅出尚書璇璣鈐曰有帝漢出德洽作樂名予帝善之下詔曰今且改樂官曰大予詩曲操以俟君子大予樂令一人秩六百石漢樂四品大予樂曲周雅頌曲黃門鼔吹短簫鐃歌一曰大予樂曲郊廟食舉之樂郊樂易所謂先王以作樂崇德殷薦之上帝周官若樂大變則天神皆降可得而禮也宗廟樂虞書所謂琴瑟以詠祖考来格詩云肅雝和鳴先祖是聴食舉樂王制謂天子食舉以樂周官王大食則令奏鐘鼔二曰周雅頌曲辟雍享射六宗社稷之樂辟雍射樂孝經所謂移風易俗莫善於樂禮記曰揖讓而治天下者禮樂之謂也甫田所謂琴瑟擊鼔以御田祖者也禮記曰夫樂施于金石越于聲音用乎宗廟社稷事乎山川鬼神此之謂也三曰黄門鼓吹天子所以燕樂羣臣詩所謂坎坎鼓我蹲蹲舞我者也其四短簫鐃歌軍樂也其傳曰黃帝所以建威揚德風動士也葢周所謂王大捷則令凱樂軍大獻則令凱歌也漢章帝章帝親著歌詩四章列在食舉及制靈臺十二門詩各以其月祀而奏之前詩四章一曰思齊姚皇二曰六騏驎三曰竭肅雍四曰陟吐根合前六曲故事食舉有鹿鳴承元氣二曲合帝作四篇爲六也以爲宗廟食舉重来上陵二曲合八曲爲上陵食舉減宗廟食舉承元氣一曲加惟天之命天之厯數二曲合七曲爲殿中御食飲舉文漢大樂食舉十三曲一曰鹿鳴二曰重来三曰初筵造四曰夾安五曰歸来六曰遠期七曰有所思八曰眀星九曰清涼十曰渉大海十一曰大置十二曰承元氣十三曰海淡淡靈帝熹平四年正月中出靈臺十二新詩下大予樂官習誦冊府元龜羣書考索卷四十八
