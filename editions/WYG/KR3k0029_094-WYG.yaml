body:
  text: 羣書考索後集卷二十八宋章如愚編士門學法類三舍附真宗祥符七年八月辛巳詔國子監學生應子弟在監習業者除實是開封府外每人召京朝官二人為保識然後收試其保官須具印狀赴監長編仁宗慶歴三年二月辛酉國子監言自今補説書官請以四人為定額及歲所試監生不合格且留聽讀三試不中者黜之仍請立四門學士以庶人子弟為生員以廣招賢之路並從之長編神宗熙寧四年十月戊辰中書言近制増廣太學益置生員除主判官外直講以十員為額每二員共講一經委中書選差或主判官奏舉其生員分三等以初入學生員為外舍不限員自外舍升内舍内舍升上舍上舍以一百員内舍以二百員為限生員各治一經從所隸官講授主判官直講月考試優等舉業上中書學正學録學諭於上舍人内逐經選六員如學行卓然尤異者委主判及直講保明中書考察取㫖除官具有職事者受官訖仍舊管勾候直講敎授有闕次第選充其主判官直講職事生員並第増給食錢從之長編熙寧六年三月庚戌上言學校法終當革王安石曰此餘事恐久遠須立法命知制誥呂惠卿兼修撰國子監經義太子中允崇政殿説書王雱兼同修撰先是上諭執政曰今歲南省所取多知名舉人士皆趨義理之學極為美事王安石曰民未知義則未可用况士大夫乎上曰舉人對䇿多欲朝廷早修經義使義理歸一乃命惠􅀸及雱而安石以判國子監沈季長親嫌故辭雱命上弗許已而又命安石提舉安石又辭亦弗許長編元豐二年十二月乙已御史中丞李定等言切以取士兼察行藝則是古者鄉里之選蓋義可以一日而校行則非歴歲月不可考今酌周官書考賓興之意為太學三舍選察升補之法上國子監敕式令并學令凡百四十條詔行之初太學生檀宗益上書言太學敎養之䇿有七一尊講官二重正録三正三舍四擇長諭五增小學六嚴賞罰七設司業上覽其言以為可行命定與畢仲衍蔡京范鏜張璪同立法至是上之太學置齋舍八十齋容三十人外舍生二千内舍生二百上舍生一百總二千四百生員入學本貫若所在州給文據試而後入月一私試歲一公試補内舍生間歲又一試補上舍生封彌謄録如貢舉法而上舍則學官不與考校諸齋月書學生行藝以帥敎不戾規矩為行治經程文合格為藝齋長諭學録學正直講主判官以次考察籍記公試外舍生入第一第二等參以所書行藝預籍者升内舍内舍生試入優平二等參以行藝升上舍分三等俱優為上一優一平為中俱平若一優一否為下上等命以官中等免禮部試下等免解以升補人行藝進退計人數多寡為學官之賞罰縁升舍為姦者論如違制律不用去官赦原學正増為五人學録増為十人學録參以學生為之長編元豐三年二月辛丑詔國子監罷書庫官復置主簿増監􅌮使臣各一員増歲賜公使錢并舊為千緍太學正録二年為任通計六考聽改官三考與循資并増巡宿剰貢并舊為二百人並從看詳學制所請也元豐四年七月己酉國子監言學生入學乞同縣五人以上為保如犯第一等罰不覺舉者與罪許人告賞錢三百千未入學以前違礙亦準貢舉法從之哲宗元祐元年五月戊午王巖叟言太學條制本學生徒須在學聽讀一年方許於太學應舉臣伏見特降但曽經補中監生人並許應舉詔國子監立法請今次科場應自元豐三年興學以來在學前後通及一年者並許取應從之並長編元祐元年五月戊辰詔孫覺固臨程頤同國子監長貳看詳立國子監太學條制長編元祐元年秋七月丙辰朔尚書省言舊制中外學官並試補近詔尚書侍郎左右司郎中學士待制兩省御史臺官國子司業各舉二員宜罷試法先是王巖叟言内自太學外至諸郡學官之制皆令就試四方之士區區於進卷屑屑於程文不憚奔馳豈其心哉祿仕迫之有不得已耳伏望聖慈令罷此法一用應詔薦舉之士為中外學官以重敎導之選武學學官亦乞依此罷試於是從巖叟之言也長編元祐元年冬十月癸丑劉摯言太學條制獨可按據舊條考其乖戾太甚者删去之若乃高濶以慕古新竒以變常非徒無補而又有害夫職親於諸生而習知其情偽者宜莫如學官也使其因人情利害而為之法者亦莫如學官也然則安用以他官置局為哉欲望聖慈指揮罷修定學制所止以其事責在學官正録以上將見行修制去留修定嚴立近限次第條上取㫖施行所貴因革不失其當法令速成以便學者以述先帝興學之㫖以副陛下之意摯言高濶以慕古新竒以變常蓋指程頤也頤所立條制輙為禮部疏駁頤亦自辯理然朝廷訖不行長編元祐六年九月戊子禮部臣僚上言國子監今欲令生員遇有請益許見長貳逐旬遇三日學諭出題内試賦論許於經史子集通出長諭解脱歸齋生諭諸生次日早食前仍納旬終送博士㸃檢仍間召生員以所納齋課於講堂上指諭委博士逐月遍巡所隷齋詢考學生所業凡私試不鎖宿欲令不罷講説從之長編元祐八年三月庚子中書省言進士御試答䇿多係在外準備之文工拙不甚相逺難於考較祖宗舊制御試進士賦詩論三題施行已逺前後得人不少况今朝廷見行文字多係聲律對偶非學問該洽不能成章若不復行祖宗三題舊法者未知朝廷所向取到國子監狀太學見管生員二千一百七十五人内二千九十三人習詩賦八十二人習經義不兼詩賦以此可見中外學者習詩賦人數極多詔來年御試將詩賦舉人復試三題經義舉人且令試䇿此後全試三題長編紹聖二年二月戊辰國子司業龔原等言太學公試除依元豐舊例差長貳監試輪差博士五員入院外乞朝廷差官五員共十員入院同共考檢從之壬午國子司業龔原等言太學更乞不置掌儀添直學依元豐舊令置學諭二十人從之長編紹聖三年十二月甲戌翰林學士承㫖詳定國子監條制蔡京言奉敕詳定國子監三學并外州軍學制今條成太學敕令式二十三冊以紹聖新修為名詔以來年正月一日頒行長編元符二年十一月詔諸州置敎授者學生依太學三舍法考選外補内上舍生每歲貢一人内舍生每歲貢二人上舍生限當年十二月到京隨太學補試合格與充内舍生不合格許再試三經試不中者遣還内舍生不候試與充外舍諸路貢上舍生到京並權破外舍生食諸路合選監司一員提舉學校仍令通知專一管勾諸州試内舍上舍並監司選差有出身官一員與校官同考試仍封彌謄録合用條貫今於國子監取索行下其外州不可行者比類條具申尚書省長編徽宗崇寧元年八月甲戌右僕射蔡京請以學為今日先務乞天下並置學養士如允所請乞先次施行一乞罷開封府解額除量留五十人充開封府土著人取應外餘並改充天下貢士之數所有諸州單額各取三分之一添充貢士額一乞天下並置學養士郡小或應舉人少則令二三州學者聚學於一州一乞置州學並差敎授二員一乞増置田產養士應本路常平户絶田土物業契勘合用數撥充如不足以諸色係省官田宅物業補足一乞以三舍考選法遍行天下聽每三年貢入太學上舍試仍别為號分為三等若試中上等補充太學上舍試中中等補充下等試中下等者補充内舍餘為外舍生雖補不及中下等或不及等及科舉遺逸而學行為鄉里所服委知州通判監司依貢士法貢入委祭酒司業博士詢考得實當議量材録用一乞令郡守監司保任貢士若貢士到太學試中上等及考選升舍人多即等第立法推賞一乞諸縣置學於本縣委令佐擘畫地利及不係省雜收錢内樁充費用一乞學生自縣學考選升州學一乞州縣並置小學一乞立學生在學升黜法一乞外任官子弟許入學取應在外官子弟親戚法不合在本處取應者許隨處入學即不得升補為貢在學甫及一年給公據許赴太學取應國子監解名一乞州學職掌學諭敎諭學長許差特奏名人一乞禁不得教學生非經史子書文字詔令講議司立法頒降仍差將作少監李誡於城南門外踏逐修置外學長編崇寧元年八月二十二日甲戌興學校詔詔曰學校崇則德義著徳義著則風俗淳故敎養人材為治世之急務除京師置外學待其歲考升之太學已嘗靣諭外餘並依所陳蔡京所請仍講議司立法頒付禮部施行大詔令崇寧元年十月戊辰宰臣蔡京奏竊以周制大司樂掌成均之法以治建國之學政而王國之外則黨有庠遂有序卿大夫由是以興賢能焉故王制述四代之學亦曰周人養國老於東膠養庶老於虞庠虞庠在國之西郊先儒謂四代之學或上西或上東或貴在國或貴在郊其制不一要之内外皆有學也賈誼按大戴禮以謂禮有五學蓋本諸此歴代唯唐貞觀間四夷皆遣子弟入學國子監三學之士至八千人神宗皇帝元豐二年始立太學立三舍分命師儒以敎養天下之士蓋有志於成周之賓興賢能也臣面奉徳音詔天下皆興學貢士仍建外學於王國之南待其歲考行藝升之太學悉出陛下聖意合於先王建學之制而仰紹神宗皇帝之遺訓天下幸甚今具外學條件如左一國子祭酒總治外學事今來旣設外學其官屬欲増損欲依下項人數立定員數縁太學生將來减少撥入外學内外分為兩學亦須量増官員今欲太學博士十二員减六員爲外學博士増四員通作十員太學正録各五員今欲减二員入外學各増三員通餘五員其餘職事人亦倣此増减外學官屬司業一人丞一人博士十人學正五人學録五人職事人係學生充學諭十人直學二人齋長每齋一人齋諭每齋一人外舍生三千人一太學上舍一百人内舍三百人今諸路貢士既多則上舍内舍難拘舊額欲候將來貢試到合格人即増上舍作二百人内舍作六百人處上舍於太學處外舍於外學一外學置齋一百講堂四每齋五間三十人一太學自訟齋以待學生之不率敎者令移於外學别置一外學生諸路貢到並入外學候依法考選校試合格升之太學為上舍内舍生一見今太學外舍生且令依舊法在太學候將來外學成日别取指揮一外學並依太學敕令格式施行從之外學尋賜名辟雍長編崇寧三年十一月丁亥詔曰惟昔神考嘗議以三舍取士而罷州郡科舉之令其法始於畿甸而未及行於郡國肆朕纂圖制詔有司講議其方成書來上悉推行之設辟雍於國郊以待士之升貢者禮文咸舉制度大畧乃擇日謁欵先聖臨幸黌舍延見諸生擇其當論選者而官之増秩博士加恩子弟朕所以勸勵學者可謂至矣然令州郡猶以科舉取士而學校之法不得專行故士心所嚮未一豈朕之意哉其詔天下除將來科塲如故外並罷州軍發解及省試法其取士並繇學校升貢庶幾洽往古作人之隆紹先帝造士之美以稱朕圖治之意長編崇寧四年正月乙未詔應入自訟齋進士及一年令太學勘㑹不犯第一等罰從本州給公據許入太學及本鄉取應長編崇寧四年正月丙申尚書省言諸路州學升補上舍不得過三分内舍不得過二分慮法行之初升貢數少詔今歲權不以分數據闕額升補長編崇寧四年閏二月庚午提舉開封府界學事路瑗言朝廷立法増養小學生每人日供一食其所費錢乞以太學生减半又言已補試在學生當免身丁其請假除籍之人依舊應役並從之長編崇寧四年閏二月辛未詔應諸路州學據學粮餘數額外増養學生並依額内人條施行其崇寧三年三月二十三日所降遇額内有闕即與縣學升補之人隔間補塡指揮勿行長編崇寧四年三月戊戍詔應學生試補已入學經試能終塲免身丁自外舍升内舍免本户役升上舍免本户役外仍免諸般役借其應舉得免丁人自依舊長編崇寧四年四月壬子詔諸州縣學生試補入學經試終塲及自外舍升内舍者免身丁内舍仍免役借升上舍即依官户法其三月八日指揮勿行崇寧五年七月甲辰詔已降指揮舉行學制比閲前後法令猶有未備慮失士心或因而煩擾有害學政可依下項一天下學士旣令嵗貢將來入貢其數必多所有辟雍並令舊制仍依崇寧四年十二月已前指揮施行一退送學生既展一年俟之不為不久待之不為不盡比覽科舉舊法有因赦理舉許特奏名推恩之法學生貢至辟雍三試退送之人所以患無歸學生貢至辟雍試不中并退送者並與理為到省舉數依例施行一州縣設學養士訪聞州縣官吏并頑猾並縁為姦下行收買飲食什物减刻侵欺騷擾人户難與供辦細民受弊又人少學費有餘豐腆過甚人多不足則菲薄草具甚非敎養均一之義緣學事輙科配率斂及下行買賣者徒二年吏人公人配千里因而乞取賍輕者準此其飲食仰學制所取太學見行法令酌中修立聞奏長編崇寧五年八月乙酉詔學校升貢之法雖有崇寧四年指揮朕朝夕省閲未至詳盡理當増損諸州學以中格上舍生每歲入貢仍以解額均為三分每歲貢一分有餘分者第三年入貢即人不足者闕之太學試上舍生以與三年科舉相妨故二年一試今旣罷科舉而每歲一貢其一年一試州學上舍生每歲春試秋下入貢限年終至辟雍路逺者季首發遣川廣福建貢士給借職券二千里以上給大將券並以學錢充天下置學敎養多士考其行藝以復里選由縣升州不當復立補入州學之法容其雜進五路解額可以歳貢餘分撥一分貢武士周制三年大比今以三年殿試不失成周之意然試中上等及鄉里孝悌之人使俟三年慮成淹滯可即推恩引赴殿前釋褐餘留太學以俟三年殿試長編大觀元年三月甲辰詔曰學以善風俗明人倫而人材所自出也今有敎養之法而未有善俗明倫之制殆未足以兼明天下朕考成周之隆賓興萬民以六德六行否則威之以不孝不悌之刑比已立法保任孝悌睦婣任恤忠和之士去古綿邈士非里選習尚科舉不孝不悌有時而容故任官臨政趨利犯義詆訕貪汚無不為者此官非其人士不素養故也近因餘暇稽周官之書制為法度頒之學校明倫善俗庶幾於古一諸士有善父母為孝善兄弟為悌善内親為睦善外親為婣信於朋友為任仁於州里為恤知君臣之義為忠達義利之分為和一諸士有孝悌睦婣任恤忠和八行見於事狀著於鄉里者耆鄰保伍以行實申縣縣令佐審察延入縣學考騐不虚保明申州如令一諸八行孝悌忠和為上睦親為中任恤為下有全備八行保明如令不以時隨奏貢入太學免試為太學上舍司成以下引問考騐較定不誣申尚書省取㫖釋褐命官優加擢用一諸士有全備上四行或不全一行而兼中等二行為州學上舍上等之選不全上二行而兼中等一行或不全上三行而兼中二行者為上舍中等之選不全上三行而兼中等一行或兼下一行者為上舍下等之選全有中二行或中等一行而兼下一行者為内舍之選餘為外舍之選一諸士以八行中三舍之選者上舍貢入内舍在州學半年不犯第二等罰升為内舍仍準上舍法一諸士以八行中上舍選而被貢入太學者上等在學半年不犯第三等罰司成已下考騐行實聞奏依太學貢士釋褐法取㫖推恩中者依太學上等法待殿試推恩下等依太學中等法一諸士以八行中選在州縣若太學皆免試補為諸生之首選充職事及諸齋長諭以八行考士為上舍上等其家依官户法中下等免户下支移折變借身丁内舍免支移身丁一諸謀反謀叛謀大逆子孫同及大不恭詆訕家廟指斥乗輿為不忠之刑惡逆詛罵告言祖父母父母别籍異財供養有闕居䘮作樂自娶釋服匿哀為不孝之刑不恭其兄不友其弟姊妹叔嫂相犯罪杖為不悌之刑殺人畧財放火強姦盜若竊盗杖及不道爲不和之刑謀殺及賣掠緦麻已上親毆告大功以上尊長小功尊屬若内亂為不睦之刑詛罵告言外祖父母與外姻有服親同母異父親若妻之尊屬相犯至徒違律為婚停妻娶妻若無罪出妻為不婣之刑毆受業師犯同學友至徒應相隱而輙告言為不任之刑詐欺取財罪杖告囑耆鄰保伍有所規求避免或告事不干己為不恤之刑一諸犯八刑縣令佐州知通以其事目書於籍報學應有入學不睦十年不婣八年不任五年不恤三年能改過自新不犯罪而有二行之實耆鄰保伍申縣縣令佐審聽入學在學一年又不犯第三等罰聽齒於諸生之列長編大觀元年五月缺日罷提舉河北東路學事葉常御筆手詔詔曰稽古騐今作人造士比建庠序親製法令有能中選每歲釋褐命官不俟三年之淹可謂不次之舉八行異能之士不試而貢由鄉以升州由州以申朝非次拔用可謂非常之舉常身為提舉學事官乃不知此方進劄子乞立傑然在人上之法欲加升進法既不能詳考其能舉職以敎多士乎可罷提舉學事司别為差遣大詔令大觀三年四月壬日知樞密院事鄭居中等上大觀重修國子監太學辟雍并小學敕令格式總四十八冊設改正十三條餘悉詔行之詔㫖大觀四年八月戊寅詔學校之法頒之天下奉行之初設官屬厚餼廩所以勸趨向及今累年頗見就緒其間事貴經久理須裁適博士太學五員國子五員辟雍十員國子令太學兼領辟雍省五員命官正録太學各三員辟雍各五員太學省命官學録一員辟雍省二員國子命官正録各二員三省又省辟雍命官直學又辟雍巡檢一員兵士百人又省國子監崇寧二年所増監庫官辟雍所増亦省公􅌮使臣一員依紹聖格存留二員省崇寧四年所増一員縣學並州縣小學生更不給食依元豐例願陪􅌮者聽川廣福建並二千里已上貢士給券條令勿行多士悉由鄉貢慮有遺逸自今取貢額三分於大比前一年解發不入學及雖入學而見係退黜者方得取應仍别作一項貢士院即令同考校太學辟雍月試依紹聖格更不謄録諸路所貢士試上舍以合格者取十人為上等四十人為中等五十人為下等補武學内舍逐等合格人不足者聽闕餘不入等並充武學外舍生武學監􅌮官令國子監公􅌮官兼管司計止差學生仍令禮部取内外學制將衝改事件參定取㫖頒降長編政和元年十二月丙辰鄭居中奏學法一百三十卷御筆裁成者列於卷首乞冠以政和所修為名仍乞付國子監頒降從之長編政和三年三月辛卯淮南東路提舉常平徐旼言欲望應䕃補入官人須在學及一年不犯第三等罰方許就銓試内兩試入等者與免試預公私第一名者特為比類銓試推恩庶幾一命之上皆陶陛下敎養異時從政必能以所學措諸事業不獨為簿書獄訟之習而已詔令尚書省立法施行詔㫖宣和三年六月庚申尚書省言學校養士以待天下賢能可以作人材敦士行興敎化自縣學升之州自州升之辟雍升之太學然後命官則縣學為升貢之本令天下佐吏部注授多非其人俗吏則以學為不㥯不加察治縱其犯法庸吏則廢法容奸漫不加省有罪不治以故學生近來在學毆鬭爭訟至或殺人蓋令佐不加治訓州縣不切舉察提舉官失於提按以致如此不惟士失其行亦官廢其職今具下項一州縣學生有犯在學杖以下從學規徒以上若在外有犯並依法斷罪一州縣學生有犯敎授令佐職事人不糾舉與同罪知運失按减一等提舉官又减一等若故縱並加一等欲令轉運提舉司契勘諸縣官對移上内舍登科人隨資序到任二年以下人充令佐於學事司錢内支食錢三貫如不是吏部注人替滿兩考人其被替人理一任减一考改官詔依長編政和三年七月癸巳臣僚言學生非實有真才而至師長位因而有所干請者乞嚴行糾舉冒濫恩愛重不副敎養期待之意詔有犯依學規科犯論罰同上政和五年三月壬辰臣僚上言伏乞陛下留神學校度越前古創法立制纖悉備具而八行條目减資睿詔四方萬里當官者仰承德意守法不渝乃為稱職茍或觀望畏縮廢格不行則誅罰之科殆不可廢御製學法内一項諸以八行中三舍之選者上舍貢入内舍在州學半年不犯第二等罰升為上舍一年不犯第三等以上罰升為内舍仍準上舍法法意昭明可循可守諸路士人有能中選者學司州郡自當遵奉詔條考察升貢然臣訪聞福州學生有大觀二年已保任行實補於内外舍至今在學首末八年而不升舍者臣嘗詢考其故葢縁逺方當職官違慢有素又以中遭紛更阻抑學校故本路一面違法不行至今使人人所存如此則陛下親製成法果何賴焉臣愚伏望聖慈特降睿㫖委不干碍官體究俟見實狀其前後違法官並乞重賜黜責貴使學法悉行中外悚畏不勝幸甚詔令本州具析不升舍因依申尚書省同上政和七年八月庚午御筆國子有官人限以入學一年方許參選此法也今身不在學而以假告理年是為廢法自今除月給及依令給假外並不理為在學月日特給假仍補塡在京委太學在外委本州當官保明關申吏部如違犯人屏出學滿三年方許再入保明失實者以上書詐不實論重和元年四月丙辰蔡京等言取大觀元年以後至政和六年六月以前應縁諸路學制續降指揮編修成敕令格式總一百七十三冊乞以政和續編諸路州縣學制為名與大觀學制兼行同上高宗紹興十三年二月己卯先是國子司業高閎言陛下復興太學凡養士取士之法當取聖裁上曰自有祖宗成法閌曰有慶歴元豐紹聖崇寧法有司未知適從若出於聖裁則行之乃久閌又奏舊太學辟雍皆有御書今亦乞建閣以藏御書仍願特洒宸翰加惠多士上許之閌又奏有一事最先經術是也上曰經不易通士習詩賦已久遽能使之通經乎閌曰先王設太學之意惟講經術而已上曰近侍讀官程瑀亦論經術閌曰國初猶循唐制用詩賦神宗始以經術造士遂罷詩賦又慮不足以盡人材乃設詞學一科試以雜文上曰詩賦亦雜文也閌曰取士以經義為主不過三塲後加詩賦為四塲不能無礙蓋太學之法旬有課月一周之月有試季一周之若加一塲則課試之法遂紊自元祐以來雖増為四塲終不可行者葢以此也今欲經義第一詩賦第二論䇿各一第三上可之庚辰閌具分三塲乞永為定式時閌又請在學人定三年歸省之限詔可上曰舊有九年之法徽廟方改作三年豈有士人九年而不省其親者乎長編紹興十三年九月戊辰司業高閌因經筵講畢奏曰國子落成臣奉詔試補諸生幾六千人自中興已來雖二年省闈亦未有如此之盛上曰乍脫干戈人皆向學此誠可喜閌曰近來塲屋不無懷挾假授之弊前日頓革皆不可犯上曰朕亦聞之此美事閌曰臣待罪學官見此美事諸生以為陛下方偃武修文與太祖初定天下之時同符趣舉建隆故事願陛下講臨雍之禮言未畢上曰已令討論矣蓋是時上已有幸學之意閌未知之也先是閌請修監舉法以元豐為主詔令敕令所參修至是成中興紀事羣書考索後集卷二十八
