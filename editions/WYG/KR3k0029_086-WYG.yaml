body:
  text: 羣書考索後集卷二十宋章如愚編官制門武階類宋朝㳂唐舊制武選之稱自内客省使至閤門使使各有副為横行自皇城使至供備庫使為諸司正使自皇城副使供備庫副使為諸司副使自内殿承制至三班借使為使臣元豐肇正文階而武階猶未及改元豐董正官制如武臣易将軍校尉之號竟獨依舊不復更定麈史政和初一切易以新名正使為大夫副使為郎横行十二階正副亦然是以有郎居大夫之上者其後以新名未足又增置宣正履正叶忠翊衛親衛大夫郎通為横行政和六年御筆官爵以待勞能今興事造功能者軰出而官名未及何以寵奨多士可増下項右武左武拱衛親衛翊衛中衛中亮中侍恊忠履正宣正正侍大夫通舊依此郎亦如之唯不置通侍紹興雜壓釐正其序郎皆在大夫之下聖朝職畧太尉見使相門横行十三階通侍大夫舊為内客省使政和新制宋朝内客省使未嘗除人自易武階詔不置通侍盖遵祖宗之意也正侍大夫舊為延福宮使政和新制宣政大夫政和初易武階未有宣政大夫續増置焉履正大夫政和續増置協忠大夫政和續増置忠侍大夫舊為景福殿使政和新制以景福殿使為之忠亮大夫舊為客省使政和新制中衛大夫舊為引進使政和新制翊衛大夫政和續添置親衛大夫政和續増置拱衛大夫舊為四方館使政和新増左武大夫舊為東上閤門使政和新制右武大夫舊為西上閤門使政和新制舊諸司使八階武功大夫舊為皇城使政和新制武徳大夫舊為宫苑左右騏驥内藏庫使政和新制武顯大夫舊為左藏庫東西作場使武節大夫舊為荘宅六宅文思使政和新制武畧大夫舊為内園洛苑如京崇義使政和新制武經大夫舊為西京左藏庫使政和新制武義大夫舊為西京作坊使東西染院使禮賔使政和新制武翼大夫舊為供備庫使舊横行副使正侍郎舊在右武大夫之下右武郎舊在武功大夫之上紹興始釐正焉十二階正侍郎宣正郎履政郎協忠郎中侍郎政和續増置中亮郎舊為客省副使政和新制中衛郎舊引進副使政和新制翊衛郎親衛郎政和續増置拱衛郎政和新制以四方館使為拱衞大夫而四方舘舊無副使續置拱衛郎左武郎舊為東閤門使政和新制右武郎舊為西閤門使政和新制舊諸司副使八階武功郎舊為皇城副使政和新制武徳郎舊為宫苑使左右騏驥副使内藏庫副使政和新制武顯郎舊為左藏庫副使東作坊副使西作坊副使政和新制武節郎舊為荘宅副使六宅副使文思副使政和新制武畧郎舊為内園副使洛苑副使如京副使崇儀副使政和新制武經郎舊為西京西藏庫副使政和新制武義郎舊為西京作坊副使東西染院副使禮賔副使政和新制武翼郎舊為供備庫副使政和新制小使臣十二階訓武郎舊為内殿承制修武郎舊為内殿崇班從義郎舊為東頭供奉官秉義郎舊為西頭供奉官忠訓郎舊為左侍禁忠翊郎舊為右侍禁成忠郎舊為左班殿直保義郎舊為右班殿直承節郎舊為三班奉職承信郎舊為三班借職進武校尉舊為三班差使進義校尉舊為三班差使政和新制太史局太史令三代各有太史秦有太史令胡毋敬秦漢以来太史之任兼成周太史馮相保章三職通典漢司馬談父子相繼為太史令遷云文史星厯近乎卜祝至宣帝時修撰之職以他官領之此語見通典中書令史官門於是太史之官唯知占候而已已上合史通通典六典之詞又史通曰自古太史之職雖有著述為宗而兼掌厯象日月隂陽氣数司馬遷既沒後之續史記者禇先生劉向馮商揚雄之徒並以别職来知史務於是太史之署非復記言之司故張衡單颺王立髙堂隆等其當官見稱唯知占候而已故後漢百官志曰太史令掌天時星厯而不及史掌晉太史令品第七江左以他官兼領六典注云髙瑩以侍中陳卓以義興守吳道欣以殿中侍御史兼領宋齊梁陳同隋祕書省太史曹置令二人煬帝改曹為監唐因之武徳改為太史局龍朔改祕書閣局光宅改渾天監又曰渾儀監長安復曰太史局景龍曰太史監景雲又為局六典掌察天文稽厯数凡日月星辰風雲氣色之異率其屬而占每季録祥𤯝送門下中書省紀于起居注嵗終上送史館嵗頒厯于天下唐百官志宋朝因梁曰司天監或以他官兼判又有同判之名以朝官充兩朝國史志云監及少監闕則置判監事二人以五官正以上充與分紀同掌察天文祥異鐘鼓刻漏稽定厯数供諸壇祭祀神位版畫日兩朝志元豐官制行改為太史局有令有判局有同判局選五官正以上業優考深者二人為判及同判掌占天文及風雲氣候凡祥異之事自具所占以聞嵗一頒厯則造進御覧祭祀婚冠䘮葬則擇所用日政和因仍無所改其别局有天文院鍾鼓院測驗渾儀刻漏所印厯所皆主占驗厯法續㑹要太史正國初司天監無正元豐官制行太史局置正太史令總一局之事而正與丞為之貳五官正唐乾元三年置春官夏官中官秋官冬官正各一人掌司四時各司其方之變異唐職官志宋朝設五官正至道中詔五官正磨勘至殿中丞止以後只加檢校官元豐無改所掌與唐同太史丞漢太史有丞一人秩二百石魏晉宋齊皆同六典注隋置二人煬帝减一人唐初不置乆視改渾儀監始置丞二人長安省景龍復置六典宋初司天監有丞元豐官制行置太史局丞續㑹要太史令總一局之事而丞為之貳太史局直長宋初司天監無直長元豐改太史局有直長自直長至今十年一遷續㑹要元祐官品直長從八品靈臺郎後漢太史下别有靈䑓丞掌靈䑓云云掌候日月星辰後漢百官志魏太史有靈䑓丞主候望郎隋有天文博士唐初因之長安二年改為靈䑓郎乾元元年改五官之名六典宋初司天監有靈䑓郎慶厯詔十年遷元豐雖改太史局有靈䑓之名如故惟試中乃遷㑹要保章正周禮春官太史屬有保章氏秦漢以来無其職後周春官府置太史其屬有保章上士中士即其任也至隋置厯博士唐長安四年改厯博士為保章正掌教厯生乾元元年加五官之名六典宋初司天監有保章正慶厯五年詔保章十年一遷官元豐改太史局而保章正如故掌厯法及測景分至表準五年一遷官㑹要挈壺正周制夏官有挈壺氏秋官有司寤氏春官雞人氏凡三職咸掌其事自漢以後太史掌之唐長安四年始置挈壺正掌知刻漏孔壺為漏浮箭為刻以考中星昏明之候乾元元年加五官之名六典宋初司天監有挈壺正元豐改太史局而挈壺正如故太史局官有五年一遷者十年一遷者有試中而遷者惟挈壺正無遷法㑹要醫官和安成和成安成全大夫舊為軍器庫使保和大夫舊為西綾錦使保安大夫舊為𣙜易使翰林良毉舊為翰林毉官使和安成安成和成全郎舊為軍器庫副使保和郎舊為西綾錦副使保安郎舊為𣙜易副使翰林毉正舊為翰林毉官副使翰林毉官翰林毉效翰林毉痊翰林毉愈翰林毉證翰林毉診翰林毉候翰林毉學舊諸司使副有毉官使及副使盖自太毉丞直院轉毉官副使叙遷年格一同武官但為東班使額耳謂自法酒庫以上至皇城使政和初既易武階而毉官之名亦遂焉凡十有四階立和安大夫視𣙜易使以上翰林良毉視毉官使其和安郎以下視東副使若毉官副使則以翰林毉正易之官制舊典云此名皆大臣所撰無所稽據傳白登髙能賦可以為大夫今乃以雜流為之可見當時大臣之不學也舊額和安大夫至良毉二十員紹興二年五員和安郎至毉官元額三十員紹興二年四員毉効元額七員紹興二員毉痊元十今一員毉愈至祗候大方脉元額百五十員紹興十五員而已中興㑹要后妃内官命婦附帝嚳有四妃以象后妃四星其一明者為正妃餘三小者為次妃帝堯因焉舜不告而娶不立正妃但三妃而謂之夫人離騷所歌湘夫人舜妃也夏后氏增以三三而九合十二人春秋說云天子娶十二女即夏制也殷人又増以三九二十七合三十九人周人法帝嚳立正妃又三九二十七為八十一人合百二十一人其位后也夫人也嬪也世婦也女御也五者相三以定尊卑焉以上鄭𤣥所云故禮曰古者天子后立六宫三夫人九嬪二十七世婦八十一御妻以聴天下之内治天子立六官三公九卿二十七大夫八十一元士以聴天下之外治並通典漢興因秦之稱號帝母稱皇太后帝祖母稱太皇太后正嫡稱皇后妾皆稱夫人又有羙人良人八子七子長使少使婕妤武帝加置婕妤娙娥武帝加置容華充衣武帝加置昭儀元帝加置五官順常儛涓共和娛虚寳林良使夜者上家人子中家人子前漢外戚傳後漢皇后紀論曰后正位宫闈同體天王三夫人坐論婦禮九嬪掌敎四徳世婦主知䘮祭賔客女御序于王之燕寢頒官分務各有典司女史彤管記功書過居有保阿之訓動有環佩之響所以能述宣隂化修成内則閨房肅雍險謁不行者也光武悉闕此號唯皇后如舊有貴人貴人金印紫綬羙人宫采女皆無禄秩四時賞賜而已漢法常因八月筭民遣中大夫與掖廷丞及相工於洛陽鄉中閱視良家童女年十三以上二十以下姿色端麗載還後宫擇視可否分紀魏武帝因西漢置夫人昭儀婕妤容華美人文帝増置貴嬪一人並位次皇后淑媛修容順成良人明帝又増淑妃昭華修儀似夫人以下爵凡十二等唐后妃傳唐自隋制皇后之下有貴妃淑妃徳妃賢妃並為夫人昭儀昭容昭媛脩儀修容修媛充儀充容充媛為九嬪婕妤九人美人九人才人九人寳林二十七人御女二十七人其餘六尚諸司分典乗輿服御元宗以后下復有四妃非是乃置惠麗華三妃以代三夫人又置六儀四美人七才人而尚宫尚儀尚服各二人參合前號大抵踵周官相損益云分紀宋朝㳂唐制置貴妃淑妃徳妃賢妃此古之所謂四妃佑皇后論婦禮於内者也秩視三公恩同宰相累朝多闕元豐纔有二員政和後冊妃至六七人次有九嬪秩視六卿次有婉容婕妤恩比侍從宫女有貴人才人美人郡君皆有閤分恩各有差而以時御于帝所若受帝祉生男則遷兩等生女則遷一等遇覃恩方㮣進一官故於叙遷甚艱祖宗惜名位雖於内寵未嘗用私恩官制舊典又云至和嘉祐間嬪御乆不得遷屢有干請上答以無典故又上笑答汝不信試與降㫖政府遂執奏無法或有只請御筆進官者上取彩牋戯書云某官某氏特轉某官至給奉時各出御書請増禄有司不敢遵用退復訴於上前上笑以遣之咸服仁宗之聖斷其禁中執事六次者封郡國夫人其逮事兩朝若乳保至尊則進封四加國號保聖焉眀道初以仁宗母順容李氏為宸妃宸妃之號惟此一見焉乾興末初仁宗即位尊淑妃楊氏為皇太妃元豐末哲宗即位尊徳妃朱氏為皇太妃太妃之號前後再見焉職畧外命婦三代之制諸侯之婦曰夫人大夫曰孺人士曰婦人庶人曰妻公侯有夫人有世婦有妻有妾邦君之妻君稱曰夫人夫人自稱於天子曰老婦自稱於諸侯曰寡小君自稱於其君曰小童邦人稱之曰君夫人自世婦以下自稱曰婢子婢之言卑也凡婦人無爵從夫爵坐以夫之齒至秦漢始有封君之號公主及邑司之制元壽七年始令列侯太夫人夫人無得擅徴捕唐外命婦制皇后妃嬪及太子良娣以下為内命婦公主及王妃以下為外命婦諸王母妻及妃文武官一品國公母妻為國夫人三品以上母妻為郡夫人四品母妻為郡君五品母妻為縣君散官同職若勲官四品有封母妻為鄉君其母邑號皆加太字視夫子之品通典宋朝舊制外命婦有國夫人郡夫人郡君縣君之號初以為此特㳂五代之制且非婦道也乃别造新名以命之政和二年盖古者妻随其夫之爵國家承襲五代或有未革今命婦猶列郡縣以稱君盖非婦道又等級既少輕重不倫可改依下項武臣准此事見詔㫖執政以上封夫人太師太傅太保左丞相右丞相少師少傅少保正樞宻使開府儀同三司封國夫人知樞宻院事參知政事同知樞宻院事樞宻副使簽書樞宻院事特進太尉太子太師太傅太保觀文殿大學士太子少師少傅少保金紫銀青光禄大夫光禄大夫左右金吾衛上将軍左右衛上将軍節度使封郡夫人尚書以上封淑人御史大夫觀文殿大學士資政保和殿大學士六曹尚書翰林學士承㫖翰林學士資政保和端明殿學士龍圖天章寳文顯謨徽猷敷文閣學士侍郎以上封碩人左右散騎常侍權六曹尚書御史中丞開封府尹六曹侍郎樞宻直學士龍圖天章寳文顯謨徽猷敷文閤直學士宣奉正奉正議通奉通議大夫左右驍衛以下諸衛上将軍殿前都指揮使承宣使太中大夫觀察使入内内侍省内侍省都知帶遥郡團練使以上政和殿中監大司成太中大夫以上封令人太子賔客詹事給事中中書舍人殿前副都指揮使左右諫議大夫權六曹侍郎樞宻都承㫖保和殿待制龍圖天章寳文顯謨徽猷敷文閣待制太常宗正卿祕書監中大夫七寺卿中奉中散大夫防禦團練使左右金吾以下諸衛大将軍入内内侍省内侍省副都知押班帶遥郡團練使以上政和大司樂殿中少監中散大夫以上封恭人通侍大夫馬軍都指揮使副都指揮使歩軍都指揮使副都指揮使國子祭酒太常宗正少卿祕書少監正侍宣正履正叶忠忠侍中亮大夫太子左右庶子中衛翊衛親衛拱衛左武右武大夫諸州刺史駙馬都尉集英殿修撰七寺少卿朝議奉直大夫入内内侍省内侍省都知武功至武翼大夫帶遥郡團練使以上宣政使政和典樂朝奉大夫以上並封宜人中書門下省檢正諸房公事尚書左右司郎中右文殿修撰國子司業少府将作軍器監都水使者太子少詹事左右諭徳入内内侍省内侍省副都知押班樞宻承㫖樞宻副都承㫖起居郎起居舍人侍御史尚書左右司員外郎樞宻院檢詳諸房文字祕閣修撰開封少尹尚書六曹郎中開封府判官推官直龍圖閣朝請朝散朝奉大夫管客省四方館閣門公事武功至武翼大夫帶遥郡刺史武功至武翼大夫政和辟雍司業知引進司公事朝奉郎以上封安人直天章閤殿中侍御史左右司諫正言符寳郎内符寳郎正侍宣正履正叶忠中侍中亮中衛翊衛親衛拱衛左武右武郎樞宻副承㫖尚書六曹員外郎同管客省四方館閣門公事樞宻院諸房副承㫖直寳文閣開封府司録參軍事朝請朝散朝奉郎少府将作軍器少監監察御史和安成和成安成全平和保安大夫諸衛将軍著作郎武功至武翼郎政和簽書引進司公事殿中丞通直郎以上封孺人直顯謨徽猷敷文閤承議郎翰林良毉和安至保安郎翰林毉官直祕閤左右郎将奉議郎太常宗正祕書丞大理正太史局令判太毉局閤門舍人宣贊舍人翰林毉效毉痊太子左右衛司禦清道監門率府率七寺丞祕書郎著作佐郎國子監丞諸王宫大小學教授國子博士大理司直評事敦武郎通直郎修武郎政和直翰林毉官局太毉丞太常博士祕書省主簿辟雍丞羣書考索後集卷二十
