body:
  text: 羣書考索續集卷四十宋章如愚編兵制門周兵兵志序古者制兵必有法其法必有志夏有政典商有伊尹兵書周有太公兵法司馬法戰國有孫吳兵書皆兵志也自太史公八書止於律書言兵班孟堅漢史止於刑法志言兵於是漢晉隋唐舊史皆無兵志惟歐陽公作新唐書始志兵故凡歴代用兵之法掌兵之職養兵之具雜出於傳記之間本末源流無所統壹聊於暇日採摭大要所以備漢以來兵志云周兵寓於農將寓於吏夏官司馬序官曰凡制軍萬二千五百為軍王六軍大國三軍次國二軍小國一軍將皆命卿二千五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士三十五人為兩兩司馬皆中士五人為伍伍皆有長鄭注云伍一比兩一閭卒一族旅二黨師一州軍一鄉葢當時之兵居則為比閭旅黨州鄉出則為伍兩卒旅州軍李太伯云比為伍閭為兩族為卒黨為旅州為師鄉為軍當時之將居則為鄉大夫出則為將帥長與司馬故李太伯云比長因為伍長閭胥因為兩司馬族師因為卒長黨正因為旅帥州長因為師帥卿大夫因為軍將兵不待選皆吾民也將不改置皆吾吏也有事則敺之於行陣事已則歸之於田里無招收之煩而教不闕無廩給之費而食自飽太伯又曰此則六卿為六軍也按遂人注康成云遂之軍法如六鄉是則六遂亦為六軍也林賢良曰井田必為鄉遂井田之别所以寓軍法王畿將重根本故制田以鄉遂而寓六軍之制凡更迭用之國勢而民不勞可謂善矣若夫采地以往不可使家出一人於是制井田而寓軍之法則亦異焉兵寓於民凡歳時軍旅之事以鄉遂之官登其夫家簡其兵器治其車輦以縣師稍人之職作其司徒㑹其卒伍治其政令則此等官宜領之司馬而乃属於教官以此見周人之兵出於民民事治則軍政舉於中夫家數周禮所謂夫家者一夫受田百畝家出一夫而已然亦有合居者故小司徒又言上地家七人可任者家三人中地家六人可任者二家五人葢雖合居亦惟計其丁壯而用之與别居者無異兵數多而民役簡天子六軍七萬五千人為兵車千乗大國三軍三萬七千五百人為兵車五百乗次國二軍小國一軍此其所用以征伐之大數也若乃王畿千里軍賦萬乗則六軍所用特其什一而已漢志云天子畿方千里提封百萬井兵車萬乗故稱萬乗之主凡兵車一乗馬四匹甲士三人步卒七十二人萬乗之賦為馬四萬匹士卒七十五萬人大國一封軍賦千乗則三軍所用特其半而已漢志一封三百六十里提封十萬井兵車千乗此諸侯之大者然周禮公侯或五百里或四百里則兼附庸言之故與此不同至於次國小國其所用之軍葢亦無以異此此其經常之制可為後世式也竊嘗考之千里之畿提封百萬井定出賦六十四萬井一井之田八家耕之總計六十四萬井之田為五百一十二萬家家出一夫為五百一十二萬夫以此夫衆而供萬乗之賦是為七家而賦一兵列國之賦皆通此數孫子曰興師十萬日費千金内外騷動怠於道路者七十萬家葢言一夫從軍七家奉之亦可見七家賦一兵葢自夫率之七家相更以給於軍則王畿之内凡七十征而役一周焉以七夫付一兵又用賦之十一為軍故也諸侯之國凡十四征而役一周焉民年二十而事六十而老其間服役者不過四十年是王畿之民凡給役者半歳而更則其民生一世之中而一役焉耳使諸侯之民凡給役者一歳而更則其民生一世之中而再三役焉耳不亦簡而易從乎雖然王畿之内有諸侯之朝邑如晉有許田之類有公卿大夫元士之夫禄謂之内諸侯有王公子弟之采地凡所以屬任其民者不一而足故其制賦之數視侯國特輕焉欲其以勞佚相補也至於侯國其歳則有朝聘㑹同之役其征伐則有勤王敵愾之師至於衞社稷修封疆簡車徒備器械治兵振旅無所不用其衆故其賦民之制必如是足雖其役至於倍王畿然亦不得已也丘甸之法不行於鄉遂丘甸之法按康成注小司徒以為是采邑之制如杜氏所云亦即采邑寓軍之制周人六鄉六遂雖不用丘甸法然亦通此數計之王畿百同一同之内則為百甸百甸而百乗百同而萬乗每乗七十五人則王畿千里其為七萬五千人者凡十適當六軍之制十倍矣天子凡征行不過六軍以十分而迭用其一此所以民不勞而國不危也是豈若秦漢以後之用師動以百萬之衆决勝於一舉而能哉然而丘甸法獨不行於鄉遂者葢除鄉遂十六同外自稍地以往所餘八十四同自可以為六軍者有八其竒者猶三萬人周公之制六鄉六遂特為天子之衞而有所征行則於采地之中迭用其八分之一以備六軍猶有用不盡者三萬亦可以充補卒之備古者制軍如此不窮民力丘甲春秋成元年作丘甲杜氏注以為丘出戎馬一匹牛三頭甸長長轂一乗馬四匹牛十二頭甲士十三人步卒七十二人此甸所出今魯使丘出之按杜氏説似不通周制四丘為甸如此則是魯人增四倍之賦魯雖無道必不至如此之甚哀公田賦曰二吾猶不足聖人猶切譏之豈至如此惟李靖説頗通胡康侯曰作丘甲者益兵也古者四丘為甸甸方八里旁加一里為成出長轂一乗此司馬法一乗之賦也魯為齊難作丘甲益兵備禦爾唐太宗問李靖楚廣興與周制如何靖曰周制一乗步卒七十二人甲士三人亦二十五人為甲凡三甲共七十五人然則一丘所出十有八人積四丘出一乗則今作丘甲者即丘出一甲向之十有八人者令増而為二十五人是一甸之中共百人為軍矣所未可知者其三甸而增一乗乎抑每乗而增一甲乎魯昭公時嘗蒐於紅革車千乗則計甸而増乗未可知也楚人二廣之法一乗至用百五十人則魯每乗而増一甲亦可知也要之其實為益兵向之四丘共出三甲者今使每丘出一甲耳非若杜氏之所謂丘出一甸之賦内政内政之法自五家為軌積而至於十軌而為里自四里而為連積而至於十連而為鄉軌五家也十軌則五十家而四里即二百家也故二百人而為卒十連二千家而五鄉即萬家也故萬人而為軍率一家而為兵者一故分齊為三軍得精兵三萬人周制之在司農率三農八家其可任者二十人以一井率之甸六十四井為夫一千二百有八十矣司馬法則曰甸出甲士三人士卒七十二人大司徒同籍民數彼其衆而征於司馬者不能十之何耶民悉可以為兵而不悉以為兵也非特此也司馬法又曰井十為通通十為成成百井三百家士十人徒二十人夫百井之城除宫室涂巷三分之一餘六十四井即一甸也今又特三十人何耶兵籍甚具比征調則止此爾且兵者視農而益損行者視居而益損先王所以休民力者如此今仲之制率家一兵率五鄉一軍更代復免未聞焉其名為寛實視周為苛矣得無殫民力乎况周制處農於野處工於肆處商於市葢相資而不相病也今仲以工商别為鄉六不與仕伍專幹利以給費得無以末病本乎若仲特强齊之術耳葢周制大國本七家出一人其征謂二人只用一人是十四家迭出一人征調陳君舉云仲欲得志於諸侯要使一旦用之大國不及知小國不及備而獨於都邑之近地分為二十一鄉而以農鄉十五以賦三軍則是五鄉萬家為一軍家出一人每軍萬人其視古者七家出一人其征調又二人止用一人之制大有間矣然其三軍惟出於農鄉而工商六鄉不與焉即軌里連鄉以寓伍戎卒旅其視昔時居則為比閭族黨出則為伍兩卒旅者未甚戾也葢其時在鄉曰農在軍曰士而文學之士獨不在於二十一鄉之列者所以表其貴於四民而居之間燕是故管子以軍民言之則曰士農之鄉國語以軍言之則曰士鄉彼韋氏謂士為軍士而唐尚書乃謂十五鄉士民共之其意以為閒燕之士此固不待辨而知其誤矣又况周制賦兵皆出於農惟田與追胥則工商竭作今也既曰公帥五鄉髙國各如之而又曰公帥十一鄉是其合工商六鄉言之即竭作之遺制也軍制壊自宣王自宣王喪南國之師料民於太原夫以井田寓軍制何可料也自是而至於春秋世主而急於立功齊威以募士伯諸侯晉侯為前行而獲其志秦穆以陷陣而服鄰國楚共以簡師克鳩茲吁益又專矣若夫齊之技擊魏之武卒秦之鋭士私自為法代相長雄先王之制掃地盡矣魯作三軍周禮大國三軍伯禽時有三郊三遂春秋譏魯作三軍説者以魯本三軍悼於大國之賦而自損其一其後三家將弱公室而作三軍理當然也季氏廢公室之三軍而三家各有其一季氏盡征焉而舊法亡矣故謂之作畿兵不出古者五侯九伯專征而諸侯皆共四方之事畿兵不出也司馬法王有四方之事則冢宰命師於諸侯小宰掌其戒具虎賁氏以牙璋發之則畿兵不逺征明矣在昔髙宗伐鬼方有賞於大國雖天子之親征亦用諸侯之師劉文公之㑹對晉人曰天子之老請帥王賦元戎十乗以先啟行平王東遷以王人出戍則揚之水刺之春秋二百四十二年王人㑹伐屢矣左氏未嘗載王師之出惟敗績於茅戎王師自出春秋深譏之焉至戰國時京師益弱諸侯往往猶畏之當時告楚者亦曰一周當一百晉不百韓不足以伐周説辭雖過實而亦可以見畿兵不出其力常裕周志三變至秦而極周之六官司馬掌極而其起軍旅之法乃屬之司徒者兵民一致所謂仁義之師也故司徒以井邑丘甸而均其所出之賦以比閭族黨而通其相與之情以伍兩卒旅而擇其可任之人而後司馬因蒐苗獮狩之時得以辨其旗鼓鐲鐃之用而教以進退疾徐之節凡此皆井田之功也是故天子六軍居尊而統卑大國三軍次國二軍小國一軍比小而事大凡鄉遂家任一人而未嘗盡用則民有餘力矣九伐以正邦國而不及蠻夷則民無逺征矣九式均節財用而不及軍旅則民不轉輸矣凡此皆封建之助也内有井田為之根本外有封建為之屏翰無養兵之費無勤兵之勞此宣王攘夷狄止於盡境平王遷洛邑晉鄭得以同奬王室也一變而春秋齊桓作内政有什五之法晉文蒐被廬作執秩之官於是乎以强而并弱矣魯成公作丘甲宣公初税畝於是乎以上而剥下矣雖井田封建之制至是而漸壊其伯諸侯者猶能斥夷狄以衛中國也再變而戰國齊愍之技擊魏惠之武卒秦昭之騎士皆導民以力爭誘民以利鬭六國之君各有百萬之師則不復大國三軍之舊矣秦民十五以上悉詣長平昭王時齊民戸三男子並為戰卒則不復家用一人之制矣封建井田雖壊裂於此時而諸侯自相吞噬猶未逸出乎中國之外故當時亦未聞有征行之勞轉輸之費也三變而秦郡縣侯國則外無屏翰之助天子孤立於上而中國與四夷為鄰所籍者萬里長城而已阡陌井田則内無根本之固黔首窮悴於下而中國與四夷為敵所資者三十鍾致一石而已然則自秦而降封建井田壊裂已極而先王仁義之制蕩滅無餘無事養兵烏得無椎剥朘削之患有事用兵烏得無征行轉輸之勞乎此雖勢所必至而後世興衰之故亦必有所本矣羣書考索續集卷四十
