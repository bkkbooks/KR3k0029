body:
  text: 羣書考索後集卷四十宋章如愚編兵門唐立府兵之制頗有足稱焉葢古者兵法起於井田自周衰王制壞而不復至於府兵始一寓於農其居處教飬蓄材待事動作休息皆有節目雖不能盡合古法葢得其大意髙祖太宗之所以盛也至於後世子孫驕弱不能謹守屢變其制夫置兵所以止亂及其弊也適足以為亂又其甚也至困天下以飬亂遂至於亡焉唐有天下二百餘年而兵之大勢三變其始盛時有府兵後廢而為彍騎彍騎又廢而方鎮之兵盛矣及其末也强臣悍将兵布天下而天子亦自置兵於京師曰禁軍其後天子弱方鎮强而唐遂亡滅者措置之勢使然也府兵府兵之制起自西魏後周而備於隋制十二衛唐因之武徳初始置軍府以驃騎車騎兩将軍府領之拆闗中為十二道皆置府三年更為軍唐初置十二軍分闗中諸府以肄五年省七年以突厥入冦復置後又省其後定制衛驍武威各有左右又領軍金吾監門千牛亦有左右凡十六衛通典云貞觀置十六衛萬年道參旗軍長安道鼓旗軍富平道元戈軍醴泉道井鉞軍同州道羽林軍華州道騎官軍寜州道折威軍歧州道平遠軍豳州道招揺軍西麟州道苑游軍涇州道天紀軍宜州道天節軍軍置将副各一人以督耕戰以車騎府統之六年天下既定廢十二軍改驃騎曰統軍車騎曰别将又軍有坊置主一人察户口勸農桑軍置將軍一人太宗貞觀十年更號統軍為折衝都尉别將為果毅都尉諸府總曰折衝府兵天下十道置府六百二十四皆有名號而闗内二百六十有一皆以𨽻諸衛此陸贄之言會要云折衝府二百八十通計舊府六百三十三陸贄奏議以為太宗置府八百在闗中者五百杜牧原十六衛蓄養戎臣外開折衝果毅府五百七十有四其數不同府多在闗中説者以為固本漢置都尉亦此意左右衛皆領六十府諸衛領五十至四十其餘以𨽻東宫十率府而折衝亦𨽻焉太子管軍非古制也凡府三等兵千二百人為上千人為中八百人為下府置折衝都尉一人左右果毅都尉各一人長吏兵曹别将各一人校尉六人士以三百人為團團有校尉五十人為隊隊有正十人為火火有長毎人甲兵装糧皆自備并其介胄戎具藏於庫有所征行則視其入而出給之民年二十為兵六十而免其能騎而射者為赴騎其餘為步兵毎歲季冬折衝都尉率五校兵馬之在府兵教戰唐只是折衝自敎漢都試之日郡縣之官盡會厥有㫖哉凡發府兵皆下符契州刺史與折衝勘契乃發唐之府兵雖散在諸道然折衝都尉並遥𨽻於諸衛乃是内任官故官志係於諸衛之後下與外官同漢都尉不𨽻於衛尉乃是外任官故表係之郡守之後與唐異然而領兵則太守與都尉刺史與折衝同矣何以言之唐發府兵符下刺史若全府發則折衝都尉以下皆行不盡則果毅行少則别将行當給馬者官予其直市之若平居無事時則耕於野其畨上者宿衛而已四方有事則命将以出事解輙罷兵散於府将歸於朝故士不失業而将帥無權兵之重所以防微漸絶禍亂之萌也凡當宿衛者畨上兵部分遠近給畨五百里五畨千里七畨一千五百里八畨二千里十畨二千里外十二畨皆一月上唐以遠近分畨皆以一月恐太紛擾漢以一歲更代為善又唐在二千里外者亦不免此法所以壊也彍騎高宗武后時天下久不用兵府兵之法浸壊畨役更代多不以時衛士稍稍亡匿𤣥宗時益耗散宿衛不能給張説乃請一切募士宿衛取京兆蒲同歧華府兵及白丁而益以潞州長從兵共十二萬人號彍騎入𨽻於十二衛為六畨毎衛萬人而諸府士益多不補折衝将又積歲不遷士人皆恥為之自天寳後彍騎之法又稍變廢士失拊循八載折衝諸府至無兵可交李林甫遂請停上下魚書其後六軍宿衛皆市人及祿山反不能受甲矣方鎮府兵法壊而方鎮盛所謂方鎮者節度使之兵也其始起於邊将之屯防矣唐初兵之戍邊大曰軍小曰守捉曰城曰鎮皆有使而總之者曰道道有大将一人曰大總管已而更曰大都督帶使持節謂之節度使而安祿山正以范陽道節度使反犯天子之兵弱不能抗而諸鎮之兵共起誅之當時號九節度之師大盜既滅武夫戰卒有功者皆除節度使由是方鎮相望於内地父死子握其兵而不肯代自擇將吏號為留後以邀命於朝天子力不能制則忍恥含垢因而撫之謂之姑息之政始為朝廷患者號河朔三鎮朱全忠以梁兵李克用以晉兵更犯京師唐遂亡矣禁軍天子禁軍南北衙兵也南衙諸衛兵是也北衙禁軍是也高祖以義兵起太原已定天下悉罷遣歸其願留衛者三萬人號元從禁軍後老不任事以其子弟代謂之父子軍貞觀初太宗擇善射者百人為二畨於北門長上曰百騎又置北衙七營又於元武門置飛騎營高宗龍朔中取府兵越騎步射置左右羽林軍武后改百騎曰千騎睿宗改千騎曰萬騎及𤣥宗以萬騎平韋氏改為左右龍武軍又詔羽林軍闕取士以户部印印臂為之末年禁兵侵耗祿山反入蜀從者裁千人肅宗赴靈武士不滿百至徳二載置左右神武軍以元從扈從官子弟補之亦曰神武天騎制如羽林總曰北衙六軍又擇便騎射者置射生手千人總號曰左右英武軍代宗以射生軍清内難賜名寳應功臣故射生又號寳應軍初哥舒翰破吐蕃因置軍於臨洮之西及祿山反衛伯玉将其兵千人赴難屯于陜賜號神策軍既而領於中使魚朝恩廣徳元年代宗避吐蕃幸陜朝恩舉在陜兵與神策軍迎扈悉號神策軍遂以屯禁苑中為天子禁軍徳宗時神策兵雖處内徃徃數出征伐士多鬭死者建中四年詔以白志正為使募兵蒐補志正隂以市人補之名𨽻籍而身居市肆及涇卒潰變禁兵寡弱不足備非常及李晟將西兵赴難北軍遂振貞元二年特置監勾當神策軍以寵中官又改左右射生軍曰左右神威軍自肅宗以後京師實倚禁兵以為重然廢置不一惟羽林龍武神武神策神威最盛總曰左右十軍矣自徳宗幸梁還以神策兵有勞號興元從奉天定難功臣自後皆統於中人矣順宗即位王叔文欲收神策兵柄以奪宦者權而不克元和二年又省神武神威合為天威軍八年廢天威軍以其兵分𨽻神策軍景福中以藩臣跋扈議以宗室典禁兵可謂良策矣卒之諸王遇害乃召朱全忠兵入悉誅宦官而神策左右軍由此廢天子無一人之衛唐乃亡徳宗正元二年與李泌議復府兵泌曰府兵無事則耕有事則調發至所期處將帥案閲有教習不精者罪其折衝甚者罪及刺史行者近不踰時逺不經歲緣髙宗以劉仁軌為洮河鎮守使以圖吐蕃於是有久戍之兵武后以來府兵寖隳為人所賤百姓至蒸熨手足以避役又邊将苦之自天寳後山東戍卒還者十無二三然未嘗有内叛外侮者誠顧戀田園恐累族也至開元張說始募長從兵謂之彍騎其後益為六軍及李林甫為相奏諸軍皆募人為之兵不土著又無宗族不自愛重遂至為梗上曰候河中平當議之三年又問復府兵之策泌請先行屯田上召對曰戍卒因屯田致富則安於土不復思歸制戍卒三年而代及其將滿下令有願留者即以所開田為永業不過數畨則戍卒皆土著乃悉以府兵之法理之既而戍卒應募願耕屯田者五六陸贄曰太宗列置府兵八百所而闗中五百舉天下不敵闗中則居重馭輕之意也方世承平久武備微故祿山乘外重之勢一舉而覆西京然猶諸牧有馬州縣有糧肅宗得以中興乾元後外虞踵發悉師東討吐蕃承虚而代宗莫禦是失馭輕之權也唐會要載貞觀十年闗内置府二百六十一積兵二十六萬又置折衝府二百八十通計舊府六百三十三河東道府額亞於闗中河北之地人多壯勇故不置府其諸道毎歲十月以衛士帳上兵部以俟召發天下衛士向六十萬初置以成丁而入六十出役其家不免征徭遂漸逃散杜牧云凡有兵四十萬畨上遠近不均杜甫兵車行云去時里正與裹頭歸來白頭還戍邊葢其役之苦如此宜其民不堪命而法之亟弊也宋朝兵制藝祖深鑒唐末五代之弊既平諸國詔諸道長吏送其驍鋭於闗中聚勁兵於京師躬定軍制紀律詳盡其軍製親衛殿禁之名其營立龍虎日月之號而分領於殿前侍衛兩司為步兵者百十有九為騎兵者七十有二而忠佐皇城司不與焉又峻其等級相犯之刑謂之階級以絶其犯上之心三年一戍更出迭入其定荆湖聚巴蜀俘粤廣平江南前後精兵不過二十餘萬京師屯十萬足以制外變外郡屯十萬足以制内患諸州鎮兵内屬侍衛而蕃方縣鎮亦有天子之兵其内外輕重均矣而京師之兵内有親衙諸兵四城之外諸營列峙此京城内外相維之勢也然州郡節察防團刺史雖居京師謂之遥授至於一郡則盡行軍制守臣通判名銜必帶軍州其佐悉帶軍事雖曹椽悉曰參軍一州賦稅民財出納則謂之軍資葢賦税本以贍軍使人知以兵為貴咸知所先也遂縣置衛專捕盜賊濟以縣巡檢之兵不足則會合諸州巡檢使之兵又不足則資諸守臣與一路帥臣故兵威強盛此其州縣相維之勢也逮咸平二年西北邊警之後兵増置六十萬皇祐之初兵已一百四十一萬神宗即位患兵之冗四朝志云治平之兵葢一百十六萬三千邦用不繼始議銷併乃親製選練之法立為定額葢熙寜之籍天下禁軍凡五十六萬八千六百八十八人時王安石欲變募兵而行保甲熙寜三年始聨比其民以相保伍自畿内始九年而保甲民兵義勇之繫籍者合七百一十八萬二千二十八人自保甲立法而故老大臣相與論難甚苦而當時百姓至有自傷殘以避免者自元豐而後民兵日盛募民日衰其募兵缺額則收其廩給以為民兵敎閲之費元祐以降民兵亦衰崇觀以後兵弊日滋喈級既壊紀律亦亡童貫握兵恥於言敗敗沒第言逃突河北将兵十無二三往往住招以缺額封樁為上供之用四朝志并王銍兵制序宋朝前會要修而藩維之固缺然矣太上中興收三帥之精鋭以强輦轂而江上分屯之軍皆𨽻禁衛臂指屈伸靡不如志唐雜著或云國家之兵大抵自禁兵立而廂兵廢自将兵立而禁兵廢自大軍立而將軍又廢矣藝祖養兵止二十二萬京師十餘萬諸道十餘萬使京師之兵足以制諸道則無外亂合諸道之兵足以當京師則無内變内外相制無偏重之患矣天下承平百餘年葢因於此王珪曰宋朝兵制雖詳然莫能推明其意張璪曰非陛下神聖孰能知之元豐五年神宗曰聞見錄太祖問趙普曰吾欲息兵定長久之計其道何如普曰李唐戰爭不息節度太重而已雖稍奪其權制其錢穀收其精兵則天下安矣上因與石守信王審𤦺飲酒曰汝曹何不釋去兵權市好田宅為永久之業守信等皆謝明日請解軍政於是更置易制者使主親軍又收天下精兵以備宿衛宋朝以備戰衛為禁軍以給徒役為廂兵各𨽻其州之本城内總於侍衛司而尚書兵部掌其政令因事立名者各𨽻於其部又以廂軍教閲者始號廂禁軍後皆以為下禁軍其給吏於諸司者亦各以其事屬役焉太祖既得天下收節鎮兵權置諸司軍額其名號不一金鎗班東西班蔽直鈞容直新立内員寮直寜逺捧日三十八指揮驍騎三十三指揮天武二十五指揮龍騎四十一指揮驍健四十二指揮神衛四十六指揮虎翼五十一指揮雄武三十三指揮自古禁旅之盛無如本朝者殿前司領騎兵之額三十七步兵之額二十六侍衛司領騎兵之額三十五步兵之額八十三御前忠佐軍頭司領步騎之額四皇城司領步騎之額二左右騏驥院領騎兵之額二建隆揩軍額尤少至太宗則無不備矣如金鎗之類皆太宗所創也太宗嘗與羣臣議論及屯田利害張洎上言國家懲前王之失審形勢之宜以大梁者八方所湊為天下之樞思以阜安兆民臨制四海故於京邑而定都焉昔炎運開基高帝曰吾以羽檄召天下兵未有至者又武帝以虎符發郡兵即知兵甲在外也惟自南北軍期門郎羽林兒以備天子扈從蕃衛之軍唐承隋制置十二衛府民皆農夫也及罷府兵始置神策為軍旅不過三四萬人以備天子扈從藩衛而已及祿山犯闗驅市人接戰徳宗蒙塵扈駕者四百餘騎兵甲散在郡國軍兵存而可舉者除河朔三鎮外太原青社各十萬人邠寜軍宣武各六萬人潞徐楊各五萬人襄宣夀鎮海各二萬人自餘觀察團練據要害之地者亦不及萬人今天下甲卒數十萬衆戰馬數十萬匹萃在京師本固兵强邦家之利也上覽嘉之長編真宗景徳三年真宗謂王欽若曰馬步諸軍累終簡閲缺額漸多今雖承平武備不可廢或謂選近甸强壮朕念取農民以實軍伍良策也推軍伍之家悉有子弟多願繼世投軍但慮父兄各𨽻一軍則須分别以此故不應募今可曉諭許𨽻本軍欽若曰此輩嘗從父兄征行兵甲部伍熟於聞見亦免廢農畝而奪耕民真長久之策也寳訓大中祥符四年上因謂宰相曰外道所給比徃年南郊户多十餘萬葢募兵太廣爾其間老疾不任事者當簡閲之王旦曰言事者稱民間或有小歉及游手皆宜募置軍籍然一列軍門何由復業不若令田農有利自致滋殖也長編仁宗慶厯四年六月富弼上守禦十二策河北最號勁兵處若盡精閲則不敵於天下況邊徼乎頃朝廷未與匈奴講和敵騎每入冦惟懼北兵視南兵輕之蔑如也我當分南北兵各為軍凡對陣敵必先犯南軍南軍潰北軍累之以必敗懲此故有南北混而戰者敗走益甚是不若純用北軍之為勝也同上慶厯六年三司使王拱辰言太祖時兵十二萬太宗時十八萬章聖時四十萬今皆倍之兵在精不在衆冗散坐食非計也長編慶厯中張方平言太祖蓄兵不及十五萬人太宗朝不過四十萬人章聖備禦西北兵籍頗増至於寳元凡内外増置禁軍約四十二萬餘人通計三朝舊兵且八九十萬人其鄉軍義勇州郡廂軍諸軍小分剩真等不在此數同上嘉祐七年初祖宗兵籍開寳總三十七萬而禁軍十九萬至道總六十六萬而禁軍三十五萬天禧總九十一萬而禁軍四十三萬其數皆有竒自慶厯以來乃總二百二十五萬而禁軍八十二萬視祖宗時募兵浸多至是宰臣韓琦言祖宗之兵有征伐則募事已則省今西北二邊屯兵待敵竭天下之力不能給宜先慮而速𠡠之開寳至道天禧之兵祖宗所以定亂守成者也惟慶厯兵乃自西帥増置於是詔中書樞密院掇其制裁為定額通畧英宗治平二年命供備庫副使孟淵等十九人徃開封府界及京東西淮南路募兵長編神宗熙寜二年樞密院進呈減駐營兵數目祖宗朝北戎無警即便罷兵今既講和而屯兵至多徒耗錢帛文彦博曰自古皆募營兵遇事息即罷漢文帝以恭儉故至武帝時府庫充實因用兵卒致公私匱乏上曰文景恭儉豈是庶事不為以致富盛葢能立制度所以有成效也如仁宗朝何嘗横有費用止緣衆人妄耗物力府庫遂空韓絳曰朝廷須修法度愛惜財幣迺能休息生靈一人獨儉未足成化陳升之曰已議暗消本路冗兵於京東招補亦將有序不數年可見效矣吕公弼曰緣邊之兵不可多減若遇大閲人數全少北戎觀之非便彦博曰自有遣戍兵不至闕事也上曰卿等可詳議以聞長編熙寜三年三月詔併龍猛八指揮為六舊三百五十人額今以三百人為額自康定慶厯以來諸軍間有併廢至熙寜初大整軍額有就而合者如龍衛三十九指揮併為二十有以全部附𨽻者宣威併入威猛廣捷而宣威廢罷契丹直撥入神騎而契丹直廢罷有併營而増額者如宣武二十指揮四百人額併為十二指揮五百人為額有就而易名者如驍猛四指揮以第四指揮改充驍雄存三指揮自是部伍齊肅無有名存而實缺也熙寜三年詔以禁軍分五都法檢治廂軍其後禁軍或降剰員或陞階以備廂軍諸路力役之事廣則聞詔増募而京西轉運司所募多至三萬人陜西減額五千人亦至三萬人河朔流民寓京東者如舊制募士敎閲以為忠果二十指揮分𨽻河北總管司以除道恤飢而河北及熙河路修城壘河北所募五千人熙河亦三千人修京城以廢馬監兵置廣固保忠凡十指揮亦五千人湖南徭人平戎瀘軍興逃河轉漕又皆増置大抵自熙寜元豐之間廂兵之數視祖宗時益衆矣自五代後凡國之役皆調於民故民以勞弊宋有天下悉役廂軍凡役作工徒營繕民無與焉故天下民力完固承平百年熙寜四年詔揀諸路兵半分年四十五以下力能勝甲者并為大分五十以上願為民者聽之舊制兵至六十始免猶不即許也至是免為民者甚衆長編神宗嘗謂輔臣曰前世為亂者皆無賴不逞之人我藝祖平定天下悉招聚之刺以為兵連營以居什伍相制節以軍法厚祿其長使自愛重付以生殺寓威於階級之間使不得動既無敢為非因取其力以衛良民所以太平之業定而無叛民自古未有及此者王安石行保甲法神宗曰募民兵無異安石曰募兵多浮浪非良農之比也元豐八年三月凡禁軍之最親近者執殿陛宿衛宫省扈從乘輿號諸班直非諸班直𨽻於御前忠佐軍頭司皇城司騏驥院餘軍皆以守京師備征戍而出戍邊或諸州更戍者謂之屯駐非戍諸州而𨽻於總管司者謂之駐泊非屯駐駐泊而以糴賤留便廩給謂之就糧諸司募者曰役兵諸州募者曰本城廂兵敎閲者為敎閲廂兵蕃夷内附糾合其人而用之曰蕃兵什伍其民而敎之武事曰民兵熙寜元豐之間兵制備矣長編熙寜之籍天下禁軍凡五十六萬八千六百八十人人元豐之籍六十一萬二千二百四十三人初上即總治平之兵一百十六萬一千而禁軍步騎六十六萬三千校慶厯之籍減幾十萬開寳之籍増至七十萬二千上患兵冗邦用不繼始議銷併乃親制選練修飾武備之法甚衆長編髙宗建炎元年六月詔京東京西河北永興軍淮南江南兩浙荆湖路皆置帥府要郡大要郡帥府為安撫使帶馬步軍都總管要郡帶兵馬鈐轄次要郡帶兵馬都監皆以武臣為之副改路分為副總管路鈐轄為副鈐轄州鈐轄為副都監總管鈐轄司許以便宜行軍馬事辟置僚屬依帥臣法屯兵各有差遇朝廷起兵則副總管為帥副鈐轄副都監各以兵從聽其節制正官願行者聽轉運使副一員隨軍一員留本路提㸃刑獄彈壓本路盜賊則量敵出兵多寡㑹合以相應援聖政總論宋朝兵制太祖定制凡禁軍之親近者號諸班直非諸班直者𨽻於軍頭皇城内守京師外備征戍其出戍邊或諸州更戍者曰屯駐非戍諸州而𨽻總管者曰駐泊非屯駐駐泊以糴賤而留之者曰就糧包拯嘗言沿邊單州蓄兵愈多乞令防守外其屯駐駐泊就糧兵士各令歸營謂此兵也諸司募者曰役兵諸州募者曰廂兵而敎閲廂兵則又即廂兵而敎之也什五其民教之武事謂之民兵蕃夷内附糾而用之謂之蕃漢兵此制兵之畧也而制兵深意有可得言者太祖聴趙中令之説收節度之權於杯酒間州郡精兵悉歸京師雖曰京師十萬諸郡十萬内外足相制而外兵之弱終不若京師之強也嗚呼其慮遠矣不特此也前日之亂皆不逞之人為之太祖聚以為兵節以軍法畀以厚祿祿厚則各自愛重法嚴則不敢為非此其慮何如也又不特此也軍士衣不得過膝葱韭不得入營無侈心也出戍之日多在營之日少無非念也營在城西者糧在城東營在城東者糧在城西無怠之也此其慮又何如耶是猶御兵之意然爾至於兵之所屬又有微意存焉三帥有握兵之重而無發兵之權樞密有發兵之權而無握兵之重彼此相制無敢有異心者此其為慮不既深遠矣哉自時厥後此意不明故樞密屬官有欲使之管軍者東西倉互給有謂之固欲邀求者募兵浮浪有謂之非良農之比者噫祖宗之意微矣漢唐兵制未有善於斯者奈何其莫之察也皇朝之制大臣平章先軍而後國羣臣出守先軍而後州軍曰軍資監曰軍器官曰參軍務曰贍軍其於軍事重矣盍亦以是加之察乎林駉衛兵周制周官宫正掌王宫之戒令糾禁以時比宫中之官府次舎之衆寡為之版以待夕擊柝而比之國有故則令宿其比亦如之辨内外而時禁稽其功緒糾其徳行譏其出入均其稍食去其淫怠與其竒衺之民會其什伍而教之道藝月終則會其稍食嵗終則會其行事次舎次諸吏直宿若今部署請廬者宫伯掌王宫之士庶子凡在版者掌其政令行其秩叙作其徒役之事授八次八舎之職事若邦有大事作宫衆則令之月終則均秩歲終則均叙以時頒其衣裘掌其誅賞庶子宿衛之官皆屬太宰内宰以治王内之政令分其人民以居之人民吏子弟分之使衆者就寡均宿衛夏官司馬政官之屬有虎賁氏有虎士八百人虎賁氏掌先後王而趨以卒伍舎則守王閑王在國則守王宫秋官司𨽻掌五𨽻之法執其邦之兵守王宫罪𨽻蠻𨽻夷𨽻皆守王宫漢制南軍在京城門内衛尉主之北軍在宫城門外中尉主之國有大變北軍亦繞宫屯衛詳見漢兵門郎中令秦官掌宫殿掖門户有丞武帝太初元年更名光祿勲屬官有大夫郎謁者皆秦官又期門羽林皆屬焉衛尉秦官掌宫門衛屯兵有丞景帝初更名中大夫令後元年復為衛尉屬官有公車司馬衛士旅賁三令丞衛三丞又諸屯衛侯司馬十二官皆屬焉郎掌守門户出充軍騎有議郎中郎侍郎郎中皆無員多至千人並百官表後漢光祿勲掌宿衛宫殿門户典謁書郎更直執㦸宿衛門户攷其徳行而進退之五官中郎将五官中郎五官侍郎五官郎中凡郎官皆主更直執㦸宿衛諸殿門户出充車騎左右僕射主虎賁郎習射左右陞長主直虎賁朝會在殿中虎賁郎中将中郎郎中羽林中郎将羽林郎無員掌宿衛侍從掌選漢陽隴西安定北地上郡西河凡六郡良家子弟補百官志唐制左右監門衛掌諸禁衛門籍之法左右千牛衛掌衛及供御兵仗親衛一府勲衛二府翊衛二府凡有五府毎府中郎将一人左右郎将各一人凡府中郎将掌領校尉旅師親衛之屬宿衛者而總其府事左右郎将二焉畨上者以名簿上於大将軍而配以職武徳貞觀世重資䕃二品三品子補親衛二品曽孫三品孫四品子職事官五品子若孫勲官三品以上有封及國公子補勲衛四品孫五品及上柱國之子補翊衛及率府勲衛之官二品及縣男以上子若孫補諸衛及帥府翊衛王府執仗親事執乘親事毎月畨上者數千人宿衛内庶及城門給廩食執扇三衛三百人左右衛上將軍各一人大將軍各一人將軍各二人掌宫禁宿衛凡五府及外府皆總制焉凡五府三衛及折衝府驍騎番上受其名簿而配以職左右衛左右驍騎左右武衛左右威衛左右領軍左右金吾左右監門衛左右千牛衛凡六左右千牛衛掌侍衛及供御兵仗以千牛備身左右執弓箭宿衛以主仗守戎器折衝都尉掌領屬備宿衛師役則總戎具資糧㸃習以三百人為團一校尉領之唐官制南北衙兵南衙諸衛兵也北衙禁兵也南衙領於金吾北衙統於羽林李揆曰朝廷置南北衙文武區别以相司察也北衙之制其後雖増易不常名號不一然皆天子宿衛之兵也五代禁旅無復舊制梁太祖始置侍衛馬步軍周世宗置殿前軍時募天下猛士上為都虞候受詔簡其技擊精絶者為殿前諸班宋太祖受禪悉因其制乃詔殿前侍衛二司簡其驍勇者升為上軍疲弱者退為剩員又令諸路選所部兵送至闕下補其缺其後殿前司領兵之額三十七步兵之額二十六侍衛司領騎兵之額三十五步兵之額八十三通略建隆三年上留意治兵乃簡强壯者謂之兵様散降諸道令依様招收其後募兵之木版差以尺寸高下謂之等仗亦散給諸州設旗給賞募之長吏專督其事部送闕下者軍頭司覆驗引對分𨽻諸軍同上太祖御講武殿親臨試之其法刻木為箭鏃裹以氊􅄢命引強者兩兩相射又以木梃為馬撾施韋韒俾馳騎相擊皆取其不避者各分等級以遷𨽻之由是禁旅精銳同上太宗興國二年詔以美名易禁軍舊號鐵騎曰日騎控鶴曰天武龍騎曰虎衛虎捷曰神衛長編舊制有左右金吾引駕仗堂内内宿衛車駕巡行勘箭警巡唱探之事又有仗衛司淳化五年於崇政殿親選五百七十人分四營上以巡警用禁軍非舊制遂擇置使傳呼備盜至道元年復募得二千人以閻承翰劉承藴為都監六軍諸衛有龍衛羽林神武左右六軍以判金吾左右衛仗将軍兼領之然諸衛自左右衛以下官名存而事廢有侍衛親軍司兼總步衛二軍之政國初有都指揮使副指揮使其後止置都虞侯又有侍衛親軍馬軍司侍衛親軍步軍司㑹要真宗謂近臣曰如聞禁軍人數不足當令殿前司諸軍材勇者升補之捧日上三軍毎指揮及三百人龍衛上四軍及二百五十人拱聖而下及三百五十人同上咸平六年募近京强壯補禁衛詔殿前都指揮使高瓊閲習陣勢召近臣觀之覩行伍整肅景徳二年上謂輔臣曰殿前侍衛司禁兵老疾者衆葢久從征戍失於簡練今多已召還宜精加選擇並長編仁宗慶歴五年丁度建言請擇河東陜西就糧禁軍以補禁旅之闕同上哲宗元祐二年八月詔在京置宣武第十三至第十五三指揮廣勇左第三軍第一右第三軍第一兩指揮以先銷廢寛衣天武第六指揮會一嵗廩給别招中下禁軍以補其額故也同上總論衛兵三衙四廂國家以仁得天下未始以兵為重也然定都陳留四無扞蔽其勢亦必資於兵張方平言京師古之陳留郡四衝八達之地都城四面無險阻之形藩籬之固太祖始削節度之權屯兵於内太祖選諸道驍勇者補禁旅乾徳三年令天下長吏擇本道兵驍勇者籍其名送都下以補禁旅之闕太宗取禁軍伉健者𨽻親軍太平興國三年後苑親閲禁軍取伉健者𨽻親軍罷癃老弱悉分配外州其强幹弱枝之意悉矣而所聚之兵有三衙有四廂或合而為二或分而為三或殿前居侍衛之下或侍衛居殿前之上其故可得而稽也葢侍衛起於後唐石林燕語梁置在京馬步軍都指揮使而自將之於唐六軍之外則為私兵至於後唐明帝遂改為親衛軍殿前起於周之顯徳五代會要世宗募天下豪傑選武藝超絶者署為殿前諸班宋初侍衛親軍有都指揮使有副使有都虞侯殿前亦然而下於侍衛故雖殿前都指揮亦在侍衛都虞侯之下傅潛之為侍衛都虞侯在殿前都指揮使戴興之上而王超亦自殿前都指揮遷侍衛都虞侯是也實錄淳化元年傅潛自殿前副都指揮使遷侍衛馬步軍都虞侯在殿前都指揮使戴興之上咸平三年王超自殿前都指揮使遷侍衛馬步軍都虞侯自王超罷職無復任者而侍衛之馬軍步軍遂分為二與殿前號為三衙而馬步二軍始居殿司之下矣職畧捧日天武四廂屬之殿司龍衛神衛四廂屬之馬步二司捧日舊曰日騎天武舊曰控鶴龍衛舊曰龍捷神衛舊曰英武太平興國二年改控鶴為天武龍捷曰龍衛虎捷曰神衛雍熙四年改日騎曰捧日皆以美名易禁軍之號也殿前司捧日天武馬軍司龍衛步軍司謂之上四軍各有左右廂廂名三軍謂之上四軍見上謂之八桄梯官制管軍八位武弁軍門號八桄梯葢副都指揮使都虞候四廂都指揮使為管軍入則侍衛殿陛出則扈從乘輿凡天下之兵柄皆在焉其任之也重則其待之也亦不輕是故見宰執而横仗聲揖禮也至其後則惟横仗矣筆談三衙内見宰執皆横仗立廊階下唱喏宰相出笏階上揖之此禮久廢惟内中横仗之禮至今不廢見兩制而連騎通名禮也至其後則又分道矣寳元康定間王君貺為舎人在坐見殿前馬步軍聯騎立門外呈榜稱不敢求見慶厯三年余作舎人此禮已廢然三衙相逢斂馬駐立舎人馬過然後敢行後十年入翰林相逢分道而過葢兩制漸輕三衙漸重歐陽歸田錄至於熙寜待遇之禮繼於二府至有寺監召之而不可得者九年殿前都指揮使郝質往軍器監議軍器上批三帥朝廷待遇禮繼二府寺監小官豈可呼名自今可移文定議續會要吁何其重也而祖宗立法又有深意所寓者天下之兵本於樞密有發兵之權而無握兵之重京師之兵總於三帥有握兵之重而無發兵之權彼此相維不得専制范祖禹言伏見樞密都丞㫖曹誦權馬軍司事祖宗兵法本於樞密有發兵之權而無握兵之重京師之兵總於三帥有握兵之重而無發兵之權彼此相維不得專制此所以百二十年無兵變也自唐季以及五代樞密之權偏重動為國患由手握禁旅又得興發今副都承㫖為樞密屬官權主管軍是本兵地又得握兵合而為一非祖宗制兵之意其與漢周間史洪肇之徒為之者異矣石林燕語三司天下兵柄皆在其手權雖重而軍政號令則在樞密院與漢周間史洪肇之徒為之者異矣此祖宗之微意非前世所及也是以樞密承㫖管軍范祖禹力言之見上而張公方平亦言宿衛必取端愿之士慶厯八年張方平言漢宿衛之士選材武必取端愿之士宋初宿衛皆㳺惰無根蔕者乞於諸班之中選年勞久次者東西下班殿侍有門閥家業者選取以充殿内之衛此其防微之意非人之所能及也林駉文羣書考索後集卷四十
