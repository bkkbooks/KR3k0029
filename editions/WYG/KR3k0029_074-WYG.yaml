body:
  text: 羣書考索後集卷八宋章如愚編官制門六部類户部尚書漢置尚書郎四人其一人主財帛委輸至魏文帝置度支尚書寺専掌軍國支計呉有户部呉孫休初即位户部尚書階下讀奏而晉有度支皆主筭也宋齊度支尚書領度支金部倉部起部四曹北齊度支統度支倉部左户右户金部庫部六曹後周置大司徒卿一人如周禮之制其屬有民部中大夫二人掌承司徒教以籍帳之法賛計人民之衆寡隋初有度支尚書則并後周民部之職開皇三年改度支為民部統度支民部金部倉部四曹唐修隋志謂之户部永徽初改民部為户部廟諱故也唐顯慶元年改户部為度支龍朔三年改度支尚書為司元太常伯咸亨元年復為户部尚書初户部居禮部之後武后改置天地四時之官以户部為地官由是遂居禮部前神龍元年復改地官為户部總判户部度支金部倉部事通典掌天下户口井田之政令凡徭賦職貢之方經費賙給之筭蔵貨嬴儲之準悉以咨之六典宋户部判部事一人以兩制以上充凡户口田産金榖食貨之政令皆歸於三司三司謂鹽鐵户部度支也本曹但受天下之土貢元㑹陳於庭而已續㑹要元豐改官制罷三司歸户部左右曹而三司之名始泯矣四朝志初除安燾為户部尚書續㑹要户部掌天下人户口土地錢榖之政令貢賦征役之事以版籍考户口之登耗以税賦待邦國之嵗計以土貢辨郡縣之物宜以征𣙜抑兼并而佐調度以孝義婚姻繼嗣之道和人心以田務劵責之理直民訟凡此歸於左曹以常平之法平豐㐫時斂散以免役之法通貧富均財力以保伍之法聨比閭察盜賊以義倉賑濟之法收飢饉恤艱阨以農田水利之政治荒廢務稼穡以坊場河渡之課酬勤勞省科率凡此歸之右曹四朝志是時右曹所領侍郎専之雖尚書亦不得預實録元豐六年詔户部右曹令侍郎専領尚書不預至元祐元年門下侍郎司馬光欲令户部尚書兼領左右曹而舊三司財用事有在五曹寺監者並歸户部則利權歸一詔尚書省立法左右曹錢穀尚書兼總使周知其數量入為出而制國用焉職畧舊三司使即今尚書三司副使即今侍郎權發遣副使即今權侍郎三司判官推官及判子司官即今郎中員外郎之任也續㑹要户部侍郎隋煬帝始置民部侍郎唐因之後改曰户部龍朔二年改為司元少常伯咸亨元年復為户部侍郎他時曹名或改而官號不易舊制一員長安四年加一員神龍元年減二年復加通典職掌天下户口井田之政令凡徭賦職貢之方經費賙給之筭臧貨嬴儲之準悉以咨之六典宋户部之職皆歸三司元豐官制行户部始總邦計置侍郎二員左曹五案户口案稅賦案農田案檢法案知雜案右曹五案常平案免役案坊場案檢法案知雜案左曹除陳安石右曹除李廷職畧其餘職掌沿革並見户部尚書門户部郎中漢尚書郎一人主户口墾田呉張温為户曹郎魏有左民郎曹晉兼置右民郎曹東晉而下有民部曹梁陳為左右郎後魏為左户曹郎北齊有左右民郎曹隋初民部郎曹置侍郎二人煬帝改曰民部郎唐為郎中髙宗改為户部龍朔中為司元大夫後復故郎中二人員外郎二人掌户口土田賦役貢獻蠲免優復婣婚繼嗣之事以男女之黄小中丁老為帳籍以求業口分園宅均其土田以租庸調斂其物以九等定天下之户以為尚書侍郎之貳其後以諸行郎官判錢榖而户部度支郎官失其職矣唐職林宋沿革見户部尚書門度支郎中漢有度支侍郎即郎中之任也歴魏晉宋齊後魏北齊並有度支郎中梁隋陳為侍郎煬帝但曰郎自漢魏以来皆度支尚書領度支郎開皇三年改度支尚書為民部尚書始民部領之唐因焉武徳三年加中字龍朔二年改為司度大夫咸亨元年復故六典掌度支國用租賦少多之數物産豐約之宜水陸道路之利毎嵗計其所出而支其所用六典宋度支判司事一人列六案度支案發運案支供案賞賜案掌法案知雜案以無職事朝官充凡調度之政皆歸三司本司無所掌元豐官制行郎中員外郎始實行本司事續㑹要初除陳向職畧參掌計度天下之經費以貢賦稅租之入而為之出小事則擬畫大事則咨其長職官志金部郎中漢置尚書郎四人其一人主財帛委輸盖金部郎曹之任也歴魏晉宋齊後魏北齊並有金部郎梁陳隋為侍郎煬帝但曰郎唐因之武徳三年加中字六典龍朔中為司珍大夫唐職林咸亨復天寳改司金郎中至徳初復舊掌庫蔵出納之節金寳財貨之用權衡度量之制皆總其文籍而頒其節制六典宋金部判司事一人以無職事朝官充凡庫蔵出納之節金寳財貨之用皆歸於三司而儀衡度量之制主於太府寺本司無所掌元豐官制行郎中員外郎始實行本司事續㑹要初除晁端彦焉職畧參掌給納天下之泉幣計其嵗所輸數歸於應授之府蔵以待邦國之用而鉤考平準市舶𣙜易商稅香案鹽鐵之數以周知其登耗凡造升斗尺稱皆以法頒其禁令分案七左蔵案右蔵案錢帛案𣙜易案請給案檢法案知雜案倉部郎中周廩人倉人之職也魏晉而下皆有倉部郎中梁陳為侍郎宋齊以度支尚書領之後魏有太倉尚書後周有司倉下大夫隋初為倉部侍郎煬帝止曰倉部郎唐武徳三年加中字龍朔二年改司庾大夫咸亨復天寳中為司儲郎中至徳復掌天下儲庫出納租稅禄糧倉廪之事六典唐職林宋倉部判司事一人以無職事官充凡倉庾受納租稅出給禄廩之事皆歸三司而别置提㸃倉場官以督察本司别無所掌元豐官制行郎中員外郎始實行本司事續㑹要初除韓正彦焉職畧參掌國之倉場儲積及其給受之事嵗以應用蒭粟前期缺度支均定支移拆變之數四朝志列六案曰倉場案上供案給納案糶糴案掌法案知雜案建炎三年詔罷司農寺本寺諸倉場事務𨽻倉部紹興四年復舊中興㑹要禮部尚書漢成帝置尚書五人其四曰客曹主外國夷狄事光武分六曹吏部曹兼掌祭祀事然則夷狄祭祀皆今禮部職也魏尚書有祠部曹及晉江左有祠部尚書掌廟祧之禮常與右僕射通職不常置以右僕射攝之歴代皆與右僕射通職宋祠部尚書領祠部儀曹二曹齊梁陳皆有祠部尚書後魏為儀曹尚書北齊祠部尚書統祠部主客虞曹屯田起部五曹又有儀曹主吉凶禮制屬殿中尚書後周置春官卿又有禮部而不言職事後改禮部為宗伯又春官之屬有典命後改典命為大司禮俄改大司禮復為禮部謂之禮部大夫至隋置禮部尚書統禮部祠部主客膳部四曹盖因後周禮部之名兼前代祠部儀曹之職至唐人因其制龍朔中改為司禮太常伯光宅中為春官尚書神龍元年復改尚書掌禮儀祭享貢學之政六典通典唐職林宋禮部判部事二人以兩制及帶職朝官以上充凡禮儀之事悉歸於太常禮院而貢舉之政領於知貢舉官本曹但掌制科舉人補奏太廟郊社齋郎室長掌座都省集議百官謝賀章表諸州申舉祥瑞出納内外牌印之事而兼領貢院焉續㑹要元豐改制掌禮樂祭祀朝㑹燕饗學校貢舉冊寳印記圖書表疏及祥瑞之事凡禮樂有所損益小事則同太常寺大事則集侍從或百官議定以聞若有事於南北郊明堂籍曰禘祫太廟薦饗景靈宫酌獻陵表及行朝貢慶賀宴樂之禮則承詔舉其儀物職官志時雖正名尚書尤未除人職畧續㑹要可考見下禮部侍郎沿革建炎二年併光禄寺鴻臚寺歸禮部中興㑹要禮部侍郎隋煬帝初置禮部侍郎大業三年初置用蘓植為之唐因之龍朔中為司禮少常伯髙宗咸亨元年復舊他時曹名或改而官號不易嘗䇿試貢舉及齋郎𢎞崇國子生等事舊制考功員外郎貢舉開元二十三年李昻為進士李權所詆朝議以考功位輕不足以臨多士次年遂以禮部侍郎掌焉天下髦彦由其所取勢傾當時資與吏部侍郎等六典宋沿革見尚書門元豐正名初除謝景温職畧又續㑹要元豐五年四月二十四日除户部侍郎謝景温為禮部侍郎侍郎自此始正除尚書缺禮部郎中魏晉宋齊梁陳後魏北齊有殿中郎儀曹郎而殿中掌表疏儀曹掌吉凶禮制皆禮部郎中之職也後周依周官隋禮部曹置侍郎一人煬帝除侍郎又改儀部唐因之稱郎中武德三年復為禮部龍朔二年改司禮大夫六典注咸亨初復舊其後曹名或改而官不易掌禮樂學校儀式制度衣冠符印表疏冊命祥瑞舖設喪葬賵賻及宫人等通典注宋沿革見尚書門元豐正名初除劉摯王子韶職畧尚書掌禮樂祭饗貢舉之政令而侍郎為之貳郎中員外郎參領之凡講議制度損益儀物則審覆有司所上之狀以次諮决而資於尚書郎續㑹要大朝㑹則上書奏藩國貢物凡賀慶告謝則郎中員外郎分撰表文四朝志祠部郎中東晉而下逮於北齊皆有祠部郎後周春官府有典祠中大夫隋有祠部郎唐為郎中龍朔中改為司禋大夫後復故掌祠祀饗祭天文漏刻國忌廟諱卜筮醫藥僧尼之事唐職林宋祠部判司事一人以無職事朝官充凡祠祀享祭皆𨽻太常禮院而天文刻漏歸於司天監本司但掌祠祭畫日休假令受諸州僧尼道士女官童行之籍給剃度受戒文牒而已元豐改制郎中員外郎始實行本司事續㑹要初除趙令鑠職畧參掌天下典祀國忌廟諱凡本司所治之事月奏祠祭畫日及休假令節即神祠封爵號則覆太常所定以上尚書省應宫觀寺院僧道置籍書其名額嵗較醫官功過而賞罰之四朝志知貢舉唐初貢舉省試主之考功開元二十四年考功員外郎李昻為舉人詆訶帝以員外郎望輕遂移貢舉於禮部以侍郎主之禮部選士自此始由是勢傾一時與吏部侍郎同其貢士有姻舊悉試考功謂之别頭其後齊抗為相奏罷之唐職林宋禮部貢院以朝官一員主判若遣官知貢舉即主判官罷舉事畢復别遣官主判㑹語兵部尚書漢置五曹未有主兵之任六典魏始置五兵尚書謂中兵外兵騎兵别兵都兵也晉初無太康中乃有五兵尚書而又分中外兵各為左右一按晉雖中兵外兵為左右與舊五兵為七曹然尚書惟置五兵而已無七兵尚書之名至後魏始有七兵尚書今諸家著述或謂晉太康中置七兵尚書誤矣宋五兵尚書唯領中兵外兵二曹餘則無矣通典孝武大明二年省順帝昇明元年復置六典齊梁陳皆有之後魏為七兵尚書北齊為五兵左中兵右中兵左外兵右外兵都兵凡五曹後周置大司馬其屬又有兵部中大夫小兵部下大夫其職並缺至隋乃有兵部尚書統兵部職方駕部庫部四曹盖因後周兵部之名兼前代五兵之職唐因之龍朔二年改司戎太常伯咸亨元年復舊光宅元年改夏官尚書神龍元年復故天寳十一載改武部至徳二年復舊通典掌天下兵籍武官選授之政令凡軍師戍卒之籍山川要害之圖廐牧甲仗之數悉以咨之六典選舉亦為三銓制如吏部通典宋兵部判部事一人以兩制充凡天下兵籍武官選授及軍師卒戍之政令悉歸於樞宻院其選授小者又分頒於三班本曹但掌三駕儀仗鹵簿字圖春秋釋奠武成王廟及武人科舉之事嵗終以義勇弓箭手寨兵之數上于朝兩朝國史志元豐中釐正職事惟民兵馬政權𨽻樞宻院以俟法成而歸之續會要武官銓選併歸吏部蘇頌行狀唐制文選吏部掌之武選兵部掌之神宗謂自三代至漢未嘗有文武之别頌請文武一歸吏部上從之詳見吏部沿革尚書掌武舉地圖車輦甲械之政令而侍郎為之貳凡軍民以民籍統𨽻者閱習按試選募遷補及武學定賞與本曹所治之事續㑹要正名之初尚書猶未除人職畧五年九月詔應縁義勇保甲事並𨽻樞宻院其餘民兵悉𨽻兵部續㑹要建炎三年併衞尉寺歸兵部中興㑹要兵部侍郎隋置兵部侍郎唐因之龍朔為司戎少常伯光宅中為夏官侍郎後復故唐職林舊制一員總章元年加一員通典掌武選地圖車馬甲械之政唐職林其詳見尚書宋沿革元豐正名職同尚書見前門初除許將續㑹要元豐五年四月二十二日除許將試兵部侍郎侍郎自此始尚書缺兵部郎中魏有五晉有七兵皆置郎中歴代或单為部或為郎中隋初為兵部侍郎煬帝除侍字又改名曹郎唐初依隋武徳三年改兵部郎中龍朔改司戎大夫咸亨光宅神龍随曹改復二員一員掌判帳及天下武官之階品衞府之名數一員掌判簿以總軍戎差遣之名數通典六典沿革元豐正名並見尚書門初除潘良器職畧本曹所治之事郎中員外郎參掌之續㑹要建炎二年併省冗職以兵部郎兼職方題名駕部郎中周夏官之屬有輿司馬有校人主馬之官有牧師掌牧放有巾車掌公車之政及王之五輅皆駕部之本也魏晉尚書有駕部郎宋駕部屬左民尚書齊有之後魏與北齊並曰駕部郎中隋曰侍郎屬兵部煬帝除侍字唐武徳加中字龍朔改司輿大夫咸亨復天寳中改司駕至徳復通典宋駕部判司事一人以無職事朝官充輿輦車乗𨽻於太僕傳驛給受一出於樞宻院廐牧之政總於羣牧司本司無所掌元豐改制郎中員外郎始實行本司事續會要初除王欽職畧參掌輿輦車馬驛置厩牧之事大禮則戒有司具五輅續㑹要建炎三年以駕部兼庫部復併太僕寺歸駕部本朝㑹要隆興改元復裁内外官於是駕部又當省而郎適贊讀王府有詔聴留需其遷勿補闕後間或一置而一員之制定矣題名兵部四曹而止一員刑部尚書漢成帝時尚書初置二千石曹主郡國二千石又置三公曹主斷獄光武改三公曹主嵗盡考課諸州郡政二千石曹掌中都官水火盜賊辭訟罪法亦謂之賊曹重於諸曹魏置尚書都官郎佐督軍事晉以三公尚書主刑獄齊梁陳並有都官尚書宋三公比部主刑法又置都官尚書主軍事刑獄隋開皇改都官為刑部尚書統都官刑部比部司門四曹唐因之龍朔改司刑太常伯咸亨復武后改為秋官神龍復天寶改為憲部至徳復掌律令刑法徒𨽻按覆讞禁之政唐職林宋刑部尚書侍郎郎中止為階官而刑部判部事二人以御史知雜已上或朝官充淳化二年以刑部覆大辟案増置審刑院凡四方以刑獄来上則讞於審刑院大中祥符二年置糾察在京刑獄司元豐三年並併歸刑部五年官制行六部各正其職而刑部始得専其官尚書掌天下刑獄之政令而侍郎郎中員外郎分治其事續會要題名是時尚書猶未除人職畧刑部侍郎隋煬帝置刑部侍郎唐因之龍朔改為司刑少常伯光宅中為秋官侍郎天寳中為憲部侍郎掌律令刑名覆案大理及諸州應奏之事通典六典宋沿革見刑書門元豐正名初除崔台符自大理卿除見續㑹要刑部郎中漢尚書有三公曹後漢有二千石曹魏有都官曹皆掌刑法獄訟之事晉宋齊並以三公郎曹掌刑獄置郎中一人隋初省三公曹置刑部曹掌刑法置侍郎一人煬帝除侍字又改憲部郎至唐因之武徳改刑部郎中龍朔改司刑大夫咸亨光宅神龍並随曹改復六典通典宋沿革見刑書門元豐正名初除胡瑗杜絃職畧都官郎中都官者本因漢置司𨽻校尉其屬官有都官從事一人掌中都官不法事因以名官都官者義取中都官中都官謂京師官也後漢又改二千石曹掌中都官水火賊盜魏青龍二年陳矯奏置都官郎曹郎中歴晉宋齊都官郎中並掌京師非違得失事非今都官之任後周置司厲之職掌諸奴男女男子入於罪𨽻女子入於舂藳之事盖今都官郎中之任隋置都官侍郎二人猶掌非違得失開皇改都官尚書曰刑部其都官郎曹遂改掌簿録配役官私奴婢唐因之武徳加中字龍朔改曰司僕大夫咸亨復故六典宋都官判司事一人以無職事朝官充凡俘𨽻簿録給衣糧醫藥之事分領於他司本司無所掌元豐改制郎中員外郎始實行本司事參掌徒流配𨽻及吏籍之事續㑹要初除韓宗良職畧列四案謂軍大將案吏籍案配籍案知雜案比部郎中魏尚書有比部曹晉因之宋比部主法制齊梁陳皆有之北齊掌詔書律令勾檢等事後周曰計部中大夫隋為比部侍郎煬帝除侍字唐加中字龍朔改司計大夫咸亨復天寶改為司計至徳復掌内外諸司公􅇬及公私債負徒役功程贓物帳及勾用度物通典宋比部判司事一人以無職事朝官充凡勾㑹内外賦斂經費出納逋欠之政皆歸三司勾院磨勘理欠司本司無所掌兩朝國史志自治平至熈寜初凡四年而未鉤考帳已踰十有二萬錢帛芻粟虧損不可勝數遂置提舉帳司領之元豐官制行釐其事歸比部郎中員外郎始實行本司事四朝志初除宇文昌齡職畧列五案勾覆案磨勘案理欠案憑由案知雜案工部尚書漢成帝初置尚書有民曹主凢吏民上書光武改民曹主繕修功作鹽池園苑晉宋有起部尚書而不常置毎營宗廟宫室則權置之事畢省以其事分属都官左民二尚書北齊起部亦掌工造属祠部尚書後周有冬官大司空卿掌五材九範之法其属有工部中大夫掌百工之籍而理其禁令至隋乃有工部尚書盖因後周工部之名兼前代起部之職唐髙宗龍朔中改為司平太常伯咸亨復武后改為冬官神龍復總判工部屯田虞部水部事通典掌天下百工屯田山澤之政令六典宋工部判部事一人以兩制以上充凡城池土木工役程式皆𨽻三司修造案本曹無所掌元豐官制行尚書掌百工山澤溝洫屯田之政令侍郎為之貳郎中員外郎參掌之續㑹要是時尚書猶未除人職畧紹興三年併少府監歸工部以文思院屬焉文思院舊屬少府監至是以少府監併工部故文思院監官從本部辟差工部侍郎隋煬帝改置工部侍郎唐因之龍朔改為司平少常伯咸亨復他時曹名或改而官不易通典職掌同尚書宋沿革見尚書門元豐正名初除熊本續㑹要工部郎中晉宋齊皆有起部郎中梁陳改置起部侍郎隋初為工部侍郎煬帝除侍字改起部唐武徳改工部郎中龍朔改司平大夫咸亨復光宅神龍並随曹改復六典宋沿革同尚書見尚書門元豐正名初除范子竒髙遵恵職畧屯田郎中漢尚書郎四人其一主户口墾田盖屯田之始也范勝之為侍郎教田三輔魏有農部郎曹晉始置屯田郎中東晉宋齊並左民郎中兼知屯田事陳隋並為侍郎煬帝曰屯田郎唐龍朔中為司田大夫後復故掌天下屯田事及在京文武職田諸司公廨田以品給焉唐職林宋屯田判司事一人以無職事朝官充凡屯田之政令𨽻三司本司無所掌元豐改制郎中員外郎始實行本司事兩朝志參掌營屯田官莊唐濼學校職分之田及其租入四朝志初除張叙職畧元祐改入户部崇寜復續㑹要見崇寜元年十二月詔中興間除題名記虞水二部以閑曹久不除惟屯田間除六部監門紹興二年以吏部尚書沈與求之請詔置六部監門官一員選陞朝文臣有才力人充仍令六部長貳奏差序位請給依寺監丞初以平江通判董將為之中興㑹要其六部監官𨽻尚書左右選見中興㑹要尚書左選注六部架閣元豐有六曹架閣庫續㑹要崇寜元年何執中為吏部尚書四選按集吏藏于家以舞文取賄執中請置庫架閣命官涖之是後六曹皆建立四朝史何執中傳大觀三年罷内吏部令封司餘部末曹郎官管勾政和三年六曹依舊置管勾架閣庫官宣和二年罷續㑹要宣和二年户部勘㑹紹興三年立六部架閣庫中興題名記十五年以大理寺丞周楙有請詔復置官吏户部各差一員禮部兵部共差一員刑工部共差一員以主管尚書某部架閣為名中興㑹要舊制官庀其司置于六部之内或遇其廢則以郎省兼之否則以監六部門兼之迨于紹興寺監簿正官俱復然始庀司于外也舊制金耀門文書庫多蔵三司帳籍三司今版曹也自銓曹而下儲蔵帳籍之所未之詳焉其後置六部架閣庫大抵成案留部二年然後畀而蔵之又八年則蔵之金耀今金耀無復曩日則悉蔵於架閣庫二也二者不同而至於諸曹二十四司之文書盡歸儲蓄以待有用則今猶昔也李大異架閣題名記羣書考索後集卷八
