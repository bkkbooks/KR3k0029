body:
  text: 羣書考索續集卷七宋章如愚編經籍門詩二南二南作於周初二南譜正義曰鄭答張逸云文王以諸侯而有王者之化卒以受命是受命之前已行王徳當此之時詩已作也何則化被於下則民述其志何須待布王號然後作歌武王采詩之時二公已有爵土命其行化遂分繫之非由二公有土此詩始作也周召二十五篇惟甘棠與何彼穠矣二篇乃是武王時作武王伐紂乃封太公為齊侯令周召為二伯而何彼穠矣經云齊侯之子太公已封於齊甘棠經云召伯召公為伯之後故知二篇皆武王時作非徒作在武王之時其所美之事亦武王之時也辨文王之詩屬周召陳曰文王之詩所以屬之周召者何也愚知之矣太師係之也文王受命以六州之地命周召治之二公所施則文王之教也太師採詩之時得於周南之地者属之周公得於召南之地者属之召公以為不可属之文王也文王既受命其詩不入於雅則入於頌二南諸侯之風也周召又其地之諸侯也關雎之下安得不属之周召哉辨二南詩或後世附益林曰或謂二南為周衰之詩理固似矣然孔子刪詩上始文武不應燕樂鄉樂射樂房中之樂周室盛時初無一篇足取而其所記反盡取周衰之文也以二南皆為文武之詩其説既正然甘棠之作在召公既没之後召公既没在康王時何彼穠矣之詩乃復平王時事又安得後人不疑也大抵詩之所載上起文王下訖陳靈則陳靈之世詩之篇目皆未定也二南雖為文王之詩然而文王之後以至陳靈凡詩之主乎夫婦而言乎人倫則後世取而附諸二南之末亦勢之所不免也二南王者之風張逸問王者之風王者當在雅在風何答曰文王以諸侯而有王者之化述其本宜為風正義辨文王化行自二南孔曰逸以文王稱王則詩當在雅故問之鄭以此詩所述述文王為諸侯時事以有王者之化故稱王者之風於時寔是諸侯詩人不為作雅文王三分有二之化故稱王者之風是其風者王業基本此述服事殷時王業基本之事故不述其本宜為風也化霑一國謂之為風道被四方乃名為雅文王纔得六州未能天下統一雖則大於諸侯止是諸侯之大者耳此二南之人猶以諸侯待之為作風詩不作雅體體實是風不得謂之為雅文王末年身實稱王又不可以國風之詩繫之王身名無所繫詩不可棄因二公為王行化是故繫之二公安國二南樂章之名陳曰二南樂章之名也周世未有樂名南者惟左氏載舜象箾南籥則南葢文王樂名也商紂之末天下潰亂文王之化自北而南及於江漢惟東北之區尚染於紂故作樂者采自北以南土風而名之曰南用之為燕樂用之為鄉樂用之為射樂用之為房中樂所以彰文王之徳美也二南何以先國風李曰孔子告伯魚曰人而不為周南召南其猶正墻面而立也與是告之學詩必自周南召南始葢詩之序先之以風次之以雅次之以頌風者詩之最而周南召南又為風之先焉葢道無始則不行而周南則為正始之道化無基則不立召南則為王化之基此皆文王之正心誠意有在於此故其肅肅雍雍在於閨門之内而其化行於二南之國葢以其能正家而治國故詩必首於二南詩之首於二南如易之首於乾坤孔子曰乾坤其易之門學易者必自乾坤而入也是以三百篇之中必首於二南六十四卦首於乾坤其體一也二南篇次之叙二風大意皆自近及逺周南關雎至螽斯皆后妃身事桃夭兎罝芣苢后妃化之所及漢廣汝墳變言文王之化見其化之又逺也召南鵲巢采繁夫人身事草蟲采蘋朝廷之事甘棠行露朝廷之臣大夫之妻與夫人同為隂類故先於召伯皆是夫人化之所及也羔羊以下言召南之國江沱之間亦言文王之政是又化之差遠也篇之大率自以遠近為差詩周南南國何以無變風二南譜問者曰周南召南之詩為風之正經則然矣自此之後南國諸侯政之興衰何以無變風答曰陳諸侯之詩者将以知其缺失省方設教為黜陟時徐及呉楚僣號稱王不承天子之風今棄其詩夷狄之也辨呉楚以僣號黜其詩孔曰列國政衰變風皆作南國諸侯其數多矣不得全不作詩今無其詩故問而釋之廵狩陳詩者觀其國之風俗故采取詩以為黜陟之漸亦既僣號稱王不承天子威令則不可黜陟故不録其詩矣楚僣號稱王春秋多有其事知呉亦僣者檀弓云邾婁考公之喪徐君使容居來弔其辭云昔我先君駒王是其僣稱王也卷耳后妃求賢李曰古者天子立后六宫三夫人九嬪二十七世婦八十一御妻以聽天下之内治以明章天下之婦順故内順而家理天子立六官三公九卿二十七大夫八十一元士以聽天下之外治以明彰天下之男教故外和而國治葢闑内之事后妃主之闑外之事天子主之故后妃之職惟在於求賢妾以助内治關雎之詩是也至於求賢審官知臣下之勤勞此乃天子之職后妃特輔佐之而已此言后妃之志則是求賢審官知臣下之勤勞但有其志耳卷耳經叙之文詩卷耳求賢審官知臣下之勤勞朝夕思念至於憂勤也孔曰至於憂勤即首章采采卷耳不盈頃筐是也求賢審官即嗟我懷人寘彼周行是也經叙倒者叙見后妃求賢而憂勤故先言求賢經主美后妃之志能為此憂勤故先言其憂也螽斯何以喻后螽斯后妃子孫衆多也言若螽斯不妬忌則子孫衆多也李曰螽斯蝗蟲之類耳以蝗蟲之微物而乃取喻於后妃疑若不倫然詩人之意但取其意不必以蝗蟲而嫌之耳如狼跋之詩曰狼跋其胡載㚄其尾公孫碩膚赤舄几几以周公多才多藝而詩人取喻以為狼毋乃比周公於鳥獸乎是不然詩人亦取其合於徳如何耳如關雎鷙鳥而比於后妃亦取其徳之合也草蟲之詩曰喓喓草蟲趯趯阜螽草蟲蝗蟲之類比於婦人詩人取喻類多如此孔子曰小言害道小辨害理關雎興於鳥君子取其雌雄之有别鹿鳴興於獸君子取其得食之相呼若以鳥獸之名而嫌之則不可行也觀此則可知詩也已漢廣何獨稱南國漢廣徳廣所及也文王之道被于南國孔曰羔羊序云召南之國也彼言召南此不言周南者以天子事廣故直言南彼論諸侯故止言召南之詩正義麟趾處周南之末麟之趾關雎之應也關雎之化行則天下無犯非禮雖衰世之公子皆信厚如麟趾之時也孔曰關雎之化謂螽斯以前天下無犯非禮桃夭以後也雖衰世之公子皆信厚如麟趾之時此篇三章是也此篇處末見相終始故厯序前篇以為此次既因有麟名見若致然編之處末以法成功也此篇本意直美公子信厚似古致麟之時不為有關雎而應之太師編之以象應叙者述以法耳不然此豈一人作詩而得相顧以為終始也詩召南甘棠何以美召伯甘棠美召伯也正義曰武王之時召公為西伯行政於南土决訟於甘棠之下其教著明於南國愛結於民心故作是詩以美之經三章皆言國人愛召伯而敬其樹是為美之也諸風雅正經皆不言美此云美召伯者二南文王之風唯不得言美文王耳召伯臣子故可言美也芣苢言后妃之美謂説后妃之美行非美后妃也皇矣言美周不斥文王也至於變詩美刺各於其時豳亦變風故有美周公也甘棠稱召公為伯行露雖述召伯事與甘棠異時趙商謂其同時疑而發問故志趙商問甘棠行露之詩美召伯之功箋以為當文王與紂之時召伯自明誰云文王與紂之時乎至行露篇箋義云衰亂之俗微貞信之教興若當武王時被召南之化久矣衰亂之俗已銷安得云微云此文王時也序義云召伯聴訟者從後録其意是以云然鄭此答明甘棠箋之所云美其為伯之功謂武王時也何彼穠矣為刺詩林曰二南之詩雖大槩美詩亦有刺詩不徒西周之時而東周亦與焉十二國風無以異也何以辨之據何彼穠矣之詩可知矣其曰平王之孫齊侯之子考春秋荘公元年書曰王姬歸于齊此乃威王女平王孫下嫁於齊襄公非平王孫齊侯子而何説者必欲以為西周之詩於時未有平王齊侯乃以平為平正之王齊如齊一之侯與書言寕王同義此妄也據詩人欲言其人之子孫則必直言之如稱衛姜云東宫之妹邢侯之姨頌魯僖公周公之孫荘公之子又何疑乎且其詩刺詩也以王姬徒然有容色之盛而無肅雍之徳何以使人化之故曰何彼穠矣唐棣之華曷不肅雍王姬之車詩人若曰言其容色固如唐棣矣然汝王姬之車何不肅雍乎是譏之也今其序曰猶執婦道以成肅雍之徳變白為黒於理安乎詩邶鄘衛邶鄘衛商畿内地武王伐紂以其京師封紂子武庚分其地置三監自紂城北為邶南為鄘東為衛成王滅三監封康叔於衛後世并二國而有之七世至頃侯當周夷王時衛變風始作各從其國本而異之為邶鄘衛之詩自頃公至襄公凡十二君有詩者六成已下無詩變詩以事為次諸變詩一君有數篇者大率以事之先後為次故衛宣公先烝於夷姜後納伋妻邶詩先匏有苦葉後次新臺是以事先後為次也舉此而言則其餘皆以事次也牆有茨鶉之奔奔皆刺宣姜其篇不次而使桑中間之編篇之意或以事義相類或以先後相序邶鄘為變風首孔曰邶鄘衛者商紂畿内千里之地柏舟之作夷王之時有康叔之餘烈武公之盛徳資母弟之戚成入相之勲文公則滅而復興徙而能富土地既庸詩義早作故以為變風之首既以衛國為首邶鄘則衛之所滅風俗既異美刺則同依其作之先後故以邶鄘先衛也正義辨衛詩為變風首所謂衛首變風者衛居紂都廹近王畿兼邶鄘而有之滅人之國罪莫大焉矧同姓者乎奈何天子不能討方伯不能伐是以末强而本弱也迹衛詩之始卒君臣之亂未有甚於此時也民俗之敝未有甚於此國也聖人筆其罪以刑萬世首之變風次之二南著善以明惡也三國何以同風正義曰以康叔不得二國故知後世子孫也頃公之惡邶人刺之則頃公以前已兼邶與鄘或亦然矣周自昭王以後政教陵遲諸侯或强弱相陵故得兼彼二國混一其境同名曰衛也此殷畿千里不必邶鄘之地止建二國也或多建國數漸并於衛不必一時滅之地理志云武王崩三監叛周公誅之盡以其地封弟康叔號曰孟侯遷邶鄘之民於洛邑邶鄘三國之詩相與同風如志之言則康叔初即兼彼二國非子孫矣邶曷在三國之前三國如此次者以君世之首立前者為先故世家頃侯卒子釐侯立四十二年卒子共伯餘立為君共伯弟和襲攻共伯於墓上共伯自殺衛人立和為衛侯是為武公以頃公三國詩之最先故邶在前也鄘柏舟與淇澳雖同是武公之詩共姜守義事在武公政美入相之前故鄘次之衛為後也詩王國王國者王城也武王作邑於鎬京謂之宗周為西都成王宅洛邑謂之王城為東都即今之河南周公往營成周即今洛陽成王還西都十一世至幽王為犬戎所殺平王徙居東都王城於是王室下同諸侯詩不復雅故貶之謂之王國變風王詩何以居變風孔曰言王國變風者謂以王當國故服䖍云尊之猶春秋之王人稱王而列於諸侯之上在風則卑矣已比列國當言周王則尊之故顯王以當國而叙以此應故每言閔周也王詩次在鄭上譜退豳下者欲近雅頌與王世相次故也又曰王下列諸侯謂化之所及纔行境内政教不加於諸侯與諸侯齊其列位故其詩不能復更作大雅小雅而與諸侯同為國風焉辨平荘詩分為王風文王之世所謂風二南是也成王之世所謂風者豳詩是也何以平荘之世獨無土風之作乎平荘之去成王也四百餘年王城之去岐豳也八百餘里土風既殊不可係於二南之末不可作於豳詩之末則分為王風而别係之亦勢之當然非夫子之作意也辨平王列於國風李曰孟子曰詩亡然後春秋作春秋之作葢在平王之時黍離以下之詩皆是平王之詩也安得謂詩亡然後春秋作乎孟子所謂詩亡者雅頌之詩亡也今也平王之詩既下列於國則是詩之亡矣既以平王之詩為國風則是天王下列於諸侯矣然春秋又或書天王或書天王者葢春秋所以存王道也以是知春秋與詩相為表裏王風何以次衛周平王東遷政遂微弱化之所被纔及郊畿詩作後於衛頃國地狹於千里徒以天命未改王爵仍存不可過于諸侯故使次之於衛也譜詩鄭國鄭風何以次王孔曰鄭以史伯之謀列為大國桓為司徒甚得周衆武公夾輔平王克成大業有厲宣之親有緇衣之美既親且勲故使之次王也詩齊國周武王封太公望於營邱是為齊凡五世至哀公政衰紀侯譛之於周懿王而烹之當懿王時齊以變風始作又九世至襄公有詩者二桓公已下無詩詩魏國魏無世家其詩當在平桓間魏風何以次齊魏國雖小儉而能勤踵虞舜之舊風有夏禹之遺化故季札觀樂美其詩音云大而婉儉而易行以徳輔此則明主也故次於齊詩唐國周武王封弟叔虞於唐至六世孫僖侯唐之變風始作唐之地堯都詩人本其風俗故云唐自僖至獻公有詩者四惠公已下無詩唐風何以次魏唐者叔虞之後雖為大國昭公則五世交爭獻後則喪亂宏多故次於魏下詩秦國周赧王封非子於秦邑為附庸當宣王時命為大夫而變風始作自非子至康公凡十五世有詩者十共已下無詩秦風何以次唐秦以仲始大襄公始命穆公遂覇西戎卒為强國故使之次唐也正義詩陳國周武王封媯滿於陳是為胡公當周厲王時陳之變風始作凡十八君至于靈公有詩者五成公已下無詩詩曹國周武王封叔振鐸于曹凡十五君至于昭公卒共公立有詩者四自文公已下無詩詩檜國檜妘姓之國無世次其詩當在周夷王厲王之間檜風曷次於末檜則其君滛恣曹則小人多寵國小而君奢民勞而政僻季札之所不譏國風次之於末宜哉正義詩豳風豳戎狄之地名也后稷曽孫公劉自邰而世居焉及成王時周公遭四國流言之變居於東都乃思先祖公劉大王為豳公憂勞民事致王業之艱難以此叙己志而作七月鴟鴞之詩成王悟而迎之故太師述其詩為豳國之風豳詩居變風末孔曰豳者周公之事欲尊周公使専一國故次於衆國之後小雅之前欲兼其上下之美非諸國之例也正義辨豳詩有風雅之體林曰説詩之體土風之詩謂之風朝廷之詩謂之雅宗廟祝頌之詩謂之頌諸詩各具一體故皆以先後為次惟豳兼有風雅之制以為風則其辭作於朝廷係於政事以為雅則又記土風焉故列於風雅之間明其不純於風而不可以雅也辨豳詩不入風雅正義曰金縢云惟朕小子其新逆是成王迎而反之代成王治國政而致太平其世居東都也其入攝王政也常守専一之徳不有囘邪純似公劉太王之所為也周公作詩之時有自比二人之意及其終得攝王政其事又純似之此詩用於樂官當立題目太師於是大述周公之志以此七月之詩主述豳風之事故其詩不合在周之風雅而以為豳國之變風焉此乃逺論豳公為諸侯之政周公陳之欲以此序己志非美王業之本不得入周召之正風也又非刺美成王不得入成王之正雅周公王朝卿士不得専名一國進退既無所繫因其上陳豳公故為豳之變風辨周公作詩之意夫豳風者周公之詩若不可為變風矣若不可居於國風之末矣考鄭氏之補頴逹之疏則曰豳者周公之事欲尊周公使尊一國故列之於衆國之後小雅之前使兼其上下之美非諸國之比也嗚呼豳風者周公之心也列之二南次之二雅次之三頌皆可也何居衆國之末為尊周公耶此特不得聖人之意强為此言也夫周家之業后稷公劉起之文武成之成王以㓜冲嗣位周公恐文武之業日墜而天下之未一于周遂置身於可疑不幸四國唱之成王和之使周公睨不之願后稷公劉文武之業浸浸微矣知其無可奈何乃有七月鴟鴞之詩述創業之艱難以遺成王又欲救於已變之後使天下之人與夫成王百官感其主而成武之繼使無周公則變而下之正危而不之扶矣奚有七百年之基業乎豳風獨念公劉大王七月之詩非刺成王非美成王也故説先公之風化陳王業之艱難則是思念先公以比叙己志也當時周公所作太師題之曰豳明其然矣而先王豳州經十世知唯念公劉大王者以公劉初居豳之王大王終主豳之君俱是先公之後皆有事難之故周公身遭事難追念處豳先君明是念其後者故知周公所念念此二人豳詩何不列於雅七月詩周公所作也公劉詩召公所作也周公召公等也七月陳王業之本公劉亦云戒以民事美公劉之厚於民其意亦尊也周公作之戒成王也七月之興當既王之後公劉之興亦當既王之後其時並尊也然而七月則繫豳風公劉列入大雅何也公劉豈非豳國之君七月豈非公劉之詩乎先儒以為周公遭變故七月為豳風召公先變故公劉為大雅其然乎其不然乎豳風者名之為豳實周公詩耳周公之詩何不名曰周公國風而曰豳乎周者畿内國也畿内諸侯上繫於王不得國風也何不編於魯魯者伯禽封耳周公不之魯也何不編之雅與公劉之相倫公劉之詩言其政事七月之詩言其風俗既曰風矣不得編於雅矣周公作詩意在於豳而周公之詩無所可繫故因謂之豳也就豳言之七月東山皆正風也鴟鴞以下皆變風也由是言之豳七月自無縁入雅不得云遭變故為變風也且以七月東山為變風世復有不變風者乎曰然則鴟鴞破斧之属何不列之於雅曰列之於雅是為變雅成王雖疑周公而終任之攝政六年而後復子明辟君臣之道亦無間矣君子成人之美故不使成王之世有變雅之聲而特引其詩使還周公也曰東山之詩非刺也亦何以不入於雅曰當此之時成王猶諒闇故兹事不得為成王之美亦不入雅明總已之際責在冡宰也與春秋毛伯來求金相似乃知聖人之意六經如合符契耳管蔡何以列於雅譜曰棠棣閔管蔡之失道何故列於文王之詩正義曰周公雖内傷管蔡之不睦而作親兄弟之詩外若自然須親不欲顯管蔡之有罪縁周公此志有隱忍之情若在成王詩中則學者知由管蔡而作是彰明其罪非為閔之由此故為隱推進而上之文王之詩因以見文王有親兄弟之義也詩二雅鄭氏云二雅皆周室居西都豐鎬之時詩也小雅正十六篇自鹿鳴至菁菁者莪是也有其義無其辭者六變雅正十四篇自六月之後也雅頌何以稱什什伍者部别聚居之名風及商魯頌以當國為别詩少可以同卷而雅頌篇數既多不可混併故分其積篇每十篇為卷即以卷首之篇為什長卷中之篇皆統焉言鹿鳴至魚麗凡十篇其總名之是鹿鳴之什者宛辭言四牡之等篇皆鹿鳴之什中也故樂師注云徹者歌雍雍在周頌臣工之什言雍篇在臣工之什中是卷首之篇為什長以統餘篇之目也正義雅題何以稱同大小雅傳譜正義曰國風皆題諸國之名知其風土所在雅題不同周者以雅與國風殊絶又無異代相渉故不言周也小雅大雅之别孔氏曰王政既衰變雅兼作取大雅之音歌其政事之變者謂之變大雅取小雅之音歌其政事之變者謂之變小雅故其變雅之美刺皆由音體有小大不復由政事之有小大也正義小雅何以先大雅孔曰小雅所陳有飲食賔客賞勞羣臣燕賜以懷諸侯征伐以强中國樂得賢者養育人材於天子之政皆小事也大雅所陳受命作周代殷繼伐荷先王之福禄尊祖考以配天醉酒飽徳能官用士澤被昆蟲仁及草木於天子之政皆大事也詩人歌其大事制為大體述其小事制其小體體有大小故分為二焉風見優劣之差故周南先於召南雅見漸積之義故小雅先於大雅此其所以異也大雅小雅之樂上下雅譜曰其用於樂曰君以小雅天子以大雅然而享賔或上取燕或下就天子享元侯歌肆夏也則非元侯者不得歌之肆夏頌之族類頌下唯有大雅故知於諸侯歌文王也傳文又言文王兩君相見之樂是諸侯於鄰國之君亦歌文王與天子於諸侯同也鄉飲酒燕禮合樂皆降於升歌歌鹿鳴合鄉樂則於歌文王者當合鹿鳴歌肆夏者當合文王也諸侯曷用小雅之樂小雅之為天子之政所以諸侯得用之者以詩本縁政而作臣無慶賞威刑之政不得有詩而詩為樂章善惡所以為勸戒尤美者可以為典法故雖無詩者令得進而用之所以風化天下故曰用之鄉人焉用之邦國焉因其節文使之有等風為夫婦之道生民之本王政所重欲天下變化之故風為鄉樂風本諸侯之詩鄉人所用故諸侯進用小雅小雅曷無刺厲王詩譜曰小雅之臣何以獨無刺厲王曰有焉十月之交雨無正小旻小宛之詩是也漢興之初師移其第耳鹿鳴何以先小雅孔曰采薇序云文王之時西有昆夷之患北有玁狁之難以天子之命将率歌采薇以遣之出車以勞還枤杜以勤歸則采薇等篇皆文王之詩天保以上自然是文王詩也魚麗序文武並言則魚麗武詩也鹿鳴至天保六篇言燕勞羣臣朋友是文事也采薇三篇言命将出征皆是武事也故魚麗序云文武以天保以上治内采薇以下治外既以治内為先君為元首臣為股肱君能推誠以樂下臣能盡忠以事上此為政之尤急故以鹿鳴燕羣臣嘉賔之事為首也六月小雅之變六月宣王北伐也鄭氏曰從此至無羊十四篇是宣之變小雅辨六月言廢興之由李曰六月之序總言廢興之由文武成康自鹿鳴之興至於菁菁者莪之詩此周之所以興也至於厲王之世斯道掃地小雅盡廢此周之所以衰也大雅大雅正變之篇大雅正十八篇變十三篇自文王卷阿為正雅自六月之後為變雅公劉何列於大雅見前豳詩何不列於雅詩周頌周頌之作按左氏傳曰武王克商作頌曰載戢干戈云云鄭譜云在周公復政成王即政之初三頌為體各異頌詩直述祭祀之状不言得神之力但美其祭祀是報徳可知此解頌者唯周頌耳其商魯之頌異於是矣商頌雖是祭祀之歌祭其先王之廟述其生時之功正是死後頌徳非以成功告神其體異於周頌也魯頌主詠僖公功徳纔如變風之美者耳義與商頌異也頌者美詩之名王者不陳魯詩魯人不得作風以其得用天子之禮故借天子美詩之名改稱為頌非周頌之流也孔子以其同有頌名故取備三頌耳置之商頌前者以魯周之宗親同姓使之先前代也正義辨頌體章句不一孔曰周頌三十一篇及那烈祖𤣥鳥皆一章者以其風雅人事刺過論功志在匡救一章不盡重章以申殷勤故風雅之篇無一章者頌者太平徳治之歌述成功以告神直言冩志不必殷勤故一章而已魯頌不一章者魯頌美僖公之事非告神之歌此則論功頌徳之詩亦殷勤而重章也雖云盛徳之同魯頌實不及制故頌體不一也頌詩何以言周雅不言周頌言周者以别商魯也周葢孔子所加也書議列虞夏商周書各為一列當代異其第則詩本亦當代為别商頌不與周頌相雜為次第也既有商魯須題周以别之故知孔子加周也詩魯頌周公伯禽受封於魯十四世至僖公能遵伯禽之法既薨而國人美之季孫行父請命於周史克作頌魯僖何以有頌謂頌者美盛徳之形容是詠歌之善稱王者有成功盛徳然後聲作焉今魯詩稱穆穆魯侯敬明其徳是美徳也既克淮夷孔叔不逆是成功也故借其嘉稱以美其人言其所美有形容之状故稱頌也以作頌非常故特請之天子以魯周公後僖公又實賢君故特尊之不然亦不得轉借其名而作頌也魯頌譜辨僖公能遵伯禽之法如禘太廟不郊三望皆為春秋所譏然為小失非有損於國家僖以魯之先君國事多廢逺遵伯禽之法能復周公之宇故臣子請而作頌正義辨魯僖公之有頌頌之為體非徒天子用之諸侯之臣子凡所以祝頌其國者亦得用之僖公既沒魯人述陳其功徳以告于王王命魯臣之能文者頌之其君比之諸侯則貧儉其時比之春秋則小康其事則臣子之願心而非有諂畏此孔子所以取而録之也魯頌皆史克所作駉頌序云史克所作是廣言作頌不指駉篇則四篇皆史克所作閟宫云新廟奕奕奚斯所作自言奚斯作新廟耳而漢世文人班固王延夀之等自謂魯頌是奚斯作之謬矣故王肅云當文公時魯賢臣季孫行父請于周而令史克作頌四篇以祀是肅意以其作在文公之時四篇皆史克所作也魯頌惟閟宫可疑李曰魯頌四詩惟閟宫獨為可疑如駉之詩言牧馬之事有駜之詩言君臣宴飲泮水言其修泮宫服淮夷雖其事僖公未能盡之然所褒之事猶為可褒也至於閟宫之詩則所褒者非可褒之事也毁譽失真莫此為甚且如閟宫之詩言祀姜嫄后稷至於文武大王與夫郊天之祭魯以諸侯之國而祀姜嫄后稷周之先王不可也郊天之祭亦不可也此詩乃盛稱祭廟與郊天之祭以示誇耀不亦過乎此序美僖公能復周公之宇也亦不可信詩序徒見詩中言居常與許復周公之宇故附㑹以為復周公之宇殊不知詩人所言乃祝頌之辭也如曰天錫公純嘏眉夀保魯與夫萬有千歳眉夀無有害皆是祝頌之辭若以萬有千歳眉夀無有害果為非祝頌之辭則是僖公果有萬有千嵗乎故此序言復周公之宇亦為可疑也詩商頌商髙宗中興時有作詩頌之者武王滅商封微子代殷後七世至戴公當宣王時正考父得商頌十二篇於周太師歸以祀其先王孔子録詩時得五篇矣商頌著後王之義正義曰今詩是孔子所定商頌止有五篇明是孔子録詩之時已亡其七篇唯得此五篇而已王者存二王之後所以通夫三統夏之篇章既已泯棄唯有商頌而已孔子既録魯頌同之三王之後乃復取商頌列之以備二頌著為後王之義使後人監視三代之成法其法莫大於是言聖人之有深意也周太師何得商頌譜問曰周太師何由得商頌曰周用六代之樂故有之正義曰以用六代之樂樂章固當有之故得有商頌也然則自夏以上周人亦存其樂而竟無其詩者或本自不作或有而滅亡故也此商頌五篇自是商世之書因宋而後得有故鄭為譜因商而又序宋也宋何以無變風商頌譜問者曰列國政衰則變風作宋何獨無乎曰有焉乃不録之王者之後時王所客也廵狩述職不陳其詩亦是無貶黜客之義也雜論風雅頌之體不同陳曰夫子刪詩風雅頌各得其所何嘗以風必為諸侯之詩彼序詩者妄以風辨尊卑見王黍離在國風則不得不謂之降王室而諸侯烏有王室之尊聖人輙降之乎嗚呼自詩序作詩雖存而亡久矣王室尚可降為諸侯則天下豈復有理聖人豈復有教乎謂詩之𫝊於世吾不信也曽不知聖人謂之風謂之雅謂之頌者此直古人作詩之體何嘗有天子諸侯之辨耶今人作詩有律有古有歌有行體制不同而名亦異古詩亦然謂之風者出於風俗之語大槩小夫賤𨽻婦人女子之言淺近易見也謂之雅者則其非淺近易見其辭典麗純厚故也謂之頌者則直讚其上之功徳爾三者體裁不同是以其名異也今觀風之詩大率三章四章一章之中大率四句其辭俱重􅃨相類既曰參差荇菜左右采之窈窕淑女琴瑟友之又曰參差荇菜左右芼之窈窕淑女鐘鼓樂之既曰葛之覃兮施于中谷維葉萋萋又曰葛之覃兮施于中谷維葉莫莫樛木三章四十有八字惟八字不同甚者殷其雷三章七十二字惟六字不同已焉哉天實為之謂之何哉北門三章俱言之期我乎桑中要我乎上宫送我乎淇之上矣桑中三章皆言之凡風之體皆言重辭複淺易如此若夫雅則不然其言典則非復小夫賤𨽻婦人女子能道之葢士君子為之也然雅有小大小雅之詩固已典正非風之體然語間有重複雅則雅矣猶其小者爾曰小雅者猶言其詩典正未至於渾厚大醇也至於大雅則渾厚大醇矣其篇有十六章章有十二句者比之小雅愈以典則非深於道者不能言也風與大雅小雅皆道人君政之得失有美有刺有諷頌則無有頌惟以鋪張勲徳爾學者試以風雅之詩與頌之詩詳觀之然後知聖人辨小大之意以風雅之詩與頌之詩詳觀之然後知四者之體各不同矣夫子曰吾自衛反魯然後樂正雅頌各得其所當聖人未反魯之時雖古詩之多風雅頌皆混殽無别待聖人而後各得其所者可無思乎彼序詩者妄人爾不知此理乃以言一國之事謂之風言天下之事謂之雅政有小大故有小雅有大雅頌則以其成功告於神明其言皆惑既以風為諸侯又以周南為王者之風后妃之徳何耶借謂文王在當時猶為諸侯故得謂之風而豳詩乃成王之時周公之事亦列於風豈當時亦未為王乎故謂黍離降而豳詩亦降矣觀此言風之謬可知既以小雅蓼蕭為澤及四海以湛露為燕諸侯六月采芑以為北伐南征王者之政孰有大於此又以小雅為政之小何耶吾不知常武之征伐何以大於六月卷阿之求賢何以大於鹿鳴觀此言雅之謬可知頌者謂其稱君之功徳則是矣何必告神明乎豈不告神明則不得為頌也哉既以敬之為戒成王小毖為求助與夫振鷺臣工閔予小子皆非告神明而作也觀此言頌之㫖又不通矣今田夫里婦皆能卿士之歌此即古風之遺體也唐人作淮夷雅漢人作聖主得賢臣頌之類此即古之雅頌遺體也何用他説乎詩次顛倒之疑李曰詩三百之多本末有顛倒者如載馳之詩衛懿之詩乃在於文公之後清人之詩鄭文公之詩乃在於突忽之前葛藟之詩平王之詩乃在於桓王之後皇皇者華君遣使臣之詩乃在於四牡之後而邠風之破斧乃在於東山之前雖其顛倒如此亦非詩之本意也如四牡之詩但言人君之勞使臣不可不知其勤勞皇皇者華但言使臣之出使不可不知其疾苦詩之本意如斯而已如必泥先後之序非詩人之本意也論篇章散亡先後失序陳曰去古愈逺聖道不明篇章散亡先後失序後之學者不見聖人之全經不識古人之大體如春秋之時趙衰之賦河水子駟之賦河清祭公之作祈招宋公之賦新宫而今皆闕焉則詩之篇章其逸多矣孔子未刪之前始於周召而終於檜曹今之詩次始於周召而終於曺豳者其封之先後國之大小與其作詩之時皆失其次篇章之序其亂甚矣古人學詩不同古人學詩取其善言美意而已夫子於詩所取者不過思旡邪南容於詩三復者不過白圭子路於詩終身誦者不過不求初未嘗區區分别所作之人所採之時故孟子號長於詩者而以戎狄是膺為周公之詩有不暇恤也後世始併其本末源流論之然後為通經雖其守約之心未必如古而貫穿馳騁亦足尚也宋朝𫝊授之學宋朝惟存外𫝊其説與毛義絶異諸儒惟本毛鄭頗以己意増益詩序先儒謂子夏所作毛公衛宏頗加潤色近世諸儒議之不齊自歐陽脩論詩頗疑序有舛誤蘇轍獨存大序夷攷其説鮮不本序義者王安石訓其義子雲訓其辭雖知本詩序至於比興穿鑿苛碎學者由此拘牽小文勝而大義隱唐仲友文羣書考索續集卷七
