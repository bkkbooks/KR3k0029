body:
  text: 羣書考索别集卷四宋章如愚撰經籍門書古文今文之别書有古文有今文今文乃伏生口𫝊古文乃壁中之書大禹謨説命髙宗肜日西伯戡黎太誓等篇凡易讀者皆古文况又是科斗書以伏生書字文考之方讀得豈有數百年壁中之物安得不訛損一字却是伏生記得者難讀此尤可疑今人作全書解必不是文公語録孔壁伏生所𫝊之異孔壁所出尚書如大禹謨五子之歌𦙍征太誓武成冏命微子之命蔡仲之命君牙等篇皆平易伏生所傳皆難讀如何伏生偏記得難底至於易底全記不得此不可曉如當時誥命出於史官属辭須説得平易若盤庚之類再三告戒者或是方言或是當時曲折說話所以難曉同上有平易難曉處孔壁所傳平易伏生書難曉如堯典舜典臯陶謨益稷是伏生所傳有方鳩僝功載采采等語不可曉大禹謨一篇却平易同前書中體製不一書有兩體有極分曉者有極難曉者某恐如盤庚周誥多士之類是當時召之来而面命之靣教告之自是當時一類説話至於旅獒畢命㣲子之命君陳君牙冏命之属則是當時修其辭命所以當時百姓都曉得者有今時老師宿儒之所不曉今人之所不曉者未必當時之民不識其辭義也同上典謨盤誥未易看二典三謨其言奥雅學者未遽曉會後盤誥等篇又難看如商書中伊尹吿太甲五篇伊訓太甲三篇咸有一徳其言治心脩身雖為人主言然初無貴賤之别同前安國伏生之書難易按漢儒以伏生之書為今文而謂安國之書為古文以今考之則今文多艱澁而古文反平易或者以為今文自伏生女子口授晁錯時失之則先秦古書所引之文皆已如此恐其未必然也或者以為記録之實語難工而潤色之雅辭易好故訓誥誓命有難易之不同此為近之然伏生倍文暗誦乃偏得其所難而安國考定於科斗古書錯亂磨滅之餘反専得其所易此又有不可曉者至於諸序之文或頗與經不合而安國之序又絶不類西京文字亦皆可疑獨諸序之本不先經則頼安國之序而可見同前典謨備訓誥誓命之體余嘗言典謨之書以其簡嚴寛大事事畢備書有六體典謨訓誥誓命是也至於典謨之書六體皆具焉與其他書不同如禹益儆戒之辭皆訓也如欽哉惟時亮天功之辭皆誥也如禹會羣后誓師之辭皆誓也如命汝作納言之辭皆命也誰謂誓誥不及五帝者哉陳紹觀書不可以定體拘其讀二典也則知其為君道之盡其讀三謨也則知其効臣職之至訓戒於君上則事得以規正誥告於臣民則情得以通逹有誓焉則俾士庶之盡命而知所畏有命焉則俾臣下之盡心而知所禀出治規模粲然畢備乃若典謨雖為二帝之書然觀誓征苖之師命羲和之官則未嘗無誓命也訓誥誓命雖為三王之書然觀商有先人之典周有丕顯之謨則未嘗無典謨也以至堯典乃謂之虞書禹謨不謂之夏書命止於文侯誓著於秦魯益稷謨也而不言謨旅獒訓也而不言訓盤庚之誥而不言誥𦙍征之誓而不言誓君牙之命而不言命類皆存一時之㣲㫖誦其文者要當深察其意觀其事者要在黙操其道惟夫䟽通知逺而不誣者庶乎其有所得者矣定齊書者通君臣之情敷之而曰奏輔之而曰賛啟之而曰誥陳其功而廸之曰謨循其道而叙之曰範誦其闕而規刺之曰箴愛之切望之深舉其可畏可慕者而警之曰戒遷都非細事也而謀之於民異位非常典也而咨之於庭致天之罰以除暴亂也而猶恤夫衆言之弗叶移踈逖之餘民以宻邇於正都也而且諄諄然諭之以無我怨帝王之心盖以為不如是不足以見吾績也君好生也而戒之以傲虐君克勤也而儆之以怠荒君逸於得人也而諷之以叢脞持盈守成戒懼修飭無所不用其至也而尤懲之以迷亂禹益臯陶周公所以敢直言而無忌者盖以君臣之情素交相孚也君之心臣無一而不知則臣之忠君亦無隠而不見雖是辭訐弗㢲於外葢有相容而無疑者矣鄭域書之序失其𫝊康誥序曰成王既伐管叔蔡叔以殷餘民封康叔謹按康叔者成王叔父不應稱之曰朕其弟曰成王者康叔之猶子也不應自稱曰乃寡兄其曰兄曰弟者盖武王命康叔之辭也故史記武王封康叔於衛且康叔文王之子叔虞成王之弟也周公東征叔虞已得封於唐王命歸周公於東豈有康叔得封反在唐叔之後乎故不得不捨書序而從經史也胡五峯商周之書無若稽古之文或曰堯舜二典大禹臯陶謨皆以若稽古目之商周之書咸無焉豈商周之君臣無若稽古乎答曰唐虞之道直而純商周之道變而正直而純者可為萬世法故仲尼以若稽古目之眀一時之權耳唐虞之世君揖遜於上臣訏謨於下古有善道君得以順考而行之臣得以順考而言之不亦直而純乎商周之世湯武之君固聖矣然其跡則伐伊周之臣固忠矣然其跡則放焉攝焉然必湯武而行之乃為聖也必伊周而行之乃為忠也不亦變而正者乎楊元素盤誥之書斯民目擊而心曉予讀書至盤庚三篇周公之誥如在宗廟武庫中觀古器物懵然不之識如登太行之﨑嶇劍閣之道羊腸九折之險一歩一止而九嘆息如夷狄蠻貊窮荒萬里之人聴華人之語累數十譯僅乃能通未嘗不廢書而驚曰古聖人欺予哉後世之縉紳先生老於文學者考釋訓誥役馳精神厯數十年至於白首沒齒有不能知之當時之人號召告令於一日之間何自而知之也當時之學士大夫俱曰知之何也田夫野叟閭巷之徒何自而知之也竊意三代之民家家業儒人人有士君子之識所謂道徳仁義之意性命之説典誥之語一聞見而盡識之非上之人好為聱牙倔強難入之言以驚拂之也盖其所習者素曉也馬子才周官金縢成王初年之書也洛誥周公還政之書也無逸立政周公儆戒成王之書也周官成王親政開物成務之書也合是數篇以觀成王可以見其本質焉可以見其知類通逹離師傅而不反焉過此而有君陳乃周公既沒之後又過此而有顧命乃其身將沒之時成王進徳始終之序備矣周公格君造化之功著矣東莱訓誥誓命之文不同大抵書文訓誥多竒澁而誓命多平易盖訓誥皆是記録當時號令於衆之本語故其間多有方言及古語在當時則人所共曉而於今世反為難知誓命則是當時史官所撰櫽括潤色粗有體製故在今日亦不難曉耳文公語録書𫝊非出於安國尚書孔安國𫝊恐是魏晉人所作托安國為名與毛公詩𫝊大叚不同今觀序文亦不類漢文章漢時文章麄魏晉間文章細如孔叢子亦然書小序亦非孔子作與詩小序同同前小序不出於夫子書小序不是孔子作只是周秦間人作然後人亦自理會他夲義未得且如臯陶矢厥謨禹成厥功帝舜申之申重也序者本意先説臯陶後説禹謂舜欲令禹重説故将申字係禹字下盖伏生書以益稷合於臯陶而思日賛賛襄哉之下接帝曰来禹汝亦昌言禹拜曰都帝予何言予思日孜孜思日兩字便見舜令禹重言之意此是序者本意今人都不如此説徒説得多端非本意也同前讀尚書不如讀大學或問讀尚書曰不如且讀大學若尚書却只説治國平天下詳多事較詳如堯典克明俊徳親九族至黎民於變展開是多少舜典又詳大學自格物致知以至平天下有多少節次尚書只合下便大如堯典自克明俊徳以親九族至黎民於變時雍展開是多少同前詩書具大細之理詩書大而天道精㣲細而人事之曲折無不在其中同前堯典述禪位之事自疇咨若時登庸到篇末只是一事皆是為禪位設也一舉而放齊舉嗣子再舉而驩兠舉共工三舉而四岳舉鯀皆不得其人故卒以天下授舜同前堯典紀為治之序堯典一篇自説堯一代為治之次序至讓於舜方止今却説是讓于舜後方作舜典亦是見一代政事之終始却説厯試諸難是為要受讓時作也至後諸篇皆然况先漢文章重厚有力量今大序格致極輕疑是晉宋間文章况孔書至東晉方出前此諸儒皆不曽見可疑之甚同前堯典禹謨稱虞書見其道同孔子於三聖之書不仍舊史而必為之序正既加序正而又不俱謂之唐謂之夏而必以虞稱者抑又何意也葢堯授舜舜授禹三聖相授守一道自古繼繼承承未有粹然出正如三聖人者孔子序書欲後世知三聖之時時異道同故序正其書均謂之虞以見道同而書亦同也其不俱題為唐者堯授舜而已授禹者非堯謂之唐則可以該舜而不可以該禹下俱題為夏書者禹承舜而已承堯者非禹謂之夏則可以統舜而不可以該堯惟舜上承堯下𫝊禹以虞名書則三聖之道備夫子之意固不深歟夏先生書首堯典美其克遜或曰皇之三帝之五其書皆存焉仲尼刪書獨斷堯典為始何也曰聖人所以垂世立教杜百代簒争之亂也其刪書也斷堯典始焉美其能以聖遜聖也千古盛徳將何以加諸取為百代典誥之首則萬世良者慕之悖者懼之矣不亦宜乎其序曰將遜于位遜于虞舜作堯典㣲㫖可知也楊元素堯典為虞書以成堯之遜仲尼定堯典為虞書者何原聖人授受之心杜百代簒争之亂以成堯之遜也堯之遜舜以天下者非受於文祖之日而遽授之也若受終文祖之日而遽授之争其可已耶必先一其天下歸舜之心爾使舜之跡著于天下舜之功被于天下堯舜無二也則雖堯之民即舜之民也雖堯之事即舜之事也然則堯授舜以天下而臣無怨舜受堯之天下而臣不争故仲尼刪書移堯典為虞書明非一人獨能與舜天下盖堯之時天下已皆為虞矣則雖堯之事即舜之事也同前堯舜諡號釋堯舜者曰堯舜諡也翊善𫝊聖曰堯仁聖盛明曰舜後之學者罔不宗焉然未知所以著諡法之因諡法著於周公盖三代之際世有辟王欲使聞美號而知勸見惡謚而思懼此周公之制也豈以周制而逆觀堯舜之世耶武侯堯舜諡論堯舜𫝊禪堯禅舜則試之矣舜禅禹則不試何耶或曰昔者羣臣薦舜於堯堯曰我其試哉書曰厯試諸難夫試者非聖人之事以天下與人而試之何也曰是聖人之用也非試也堯在位乆其流澤於民也深天下之人知堯而未知舜堯舉舜於畎畆之中授之以天下之事一日以嗣位吿則衆且譁雖堯莫之能遏也曰我其試矣民未忘乎堯也舜既履天下之政其膏澤流乎民無異乎堯之君天下由是天下歸舜曰我君也堯之試舜既聞命矣敢問舜之禪禹不言試何也曰禹以治水之功被天下民之視禹也無異於視舜也書曰洚水儆予成允成功惟汝賢禹之力被於民也夫民之歸之也順不待試而天下安之矣舜授位而去然尤患天下之懷也廵狩於外以避之書曰五十載陟方乃死此之謂也堯名放勲謂放勲為堯名書之釋也然果何所據依乎放勲作堯號盖史稱堯之道謂三皇而上以神道設教不言而化至堯方見於事功也後人以放勲為堯號故記孟子者遂以堯曰為放勲曰若以堯號放勲則臯陶當號允廸禹曰文命下言敷于四海有甚義理伊川堯典中星堯典篇曰中星鳥以殷仲春說云春分之昏正南方朱鳥之星畢見觀之以正仲春之氣然龍星乃春之星也春主東方可觀之以正其候今何不云是而反觀朱鳥之星何謂也嵗周其序春居其始四星各復其方聖人南面而坐以觀天下故春之時朱鳥之星當其前故云觀之以正仲春舜去四凶堯不去四凶而舜去之然則堯所未能乎萬物只一天理舜舉十六相去四凶堯豈不能堯固知四凶之惡然民未被其虐天下未欲去之堯以安民為難遽去之則民不安故不去必舜而後因民之不堪而去之也舞干格苗有苗逆命征之可也禹但舞干羽於兩階七旬苖自格格何易乎或曰干羽之舞果格苖之道乎曰格苖不在干羽之舞子之言信也然苗之所以服我者班師而已舜大聖也為天下之君禹大臣也奉君命以行師其舉苖猶反掌耳然自謂克之以威彼必不服意君徳有未至乎何苖之逆也退而自悔然後苖服焉夫以天下之大士師之衆仁聖之徳問罪於苖苖民不服猶且班師此服苖之心也是故服天下以心不以威以威人未有能服人者也夫以徳用威且不可况以暴用威乎啟與扈戰古者天子有征而無戰若啟天子也扈諸侯也何以與戰于甘之野戰危辭也知有扈之強也不曰征啟天子而失禮矣古者天子六卿卿将一師諸侯不恭則奉辭以討之天子未嘗躬行有扈不恭啓失其制故至於大戰夏徳衰耳孔子憂之放桀伐紂湯放桀武王伐紂於義何如也湯放桀先伐葛伐韋伐顧桀不悟而後放之文王伐紂先伐崇伐宻伐共伐黎紂不悟武王又觀兵於孟津卒不悔而後伐之夫戒之而不戒者自亡而已何有於我哉戒之吾之志也放之伐之非吾志也非吾志而得天下者湯武是也逢人之惡利人之位未有得天下者也伊尹及説命易曉伊尹書及説命三篇大抵分明易曉今人觀書且看他分明底其難曉者且置之政使曉不得亦不害事文公語録商書幾篇分曉商書幾篇最分曉可玩太甲伊訓等篇又好看似説命盖髙宗資質髙傅說所説底細了難看若是伊尹與太甲説雖是麄却切於學者之身太甲也不是昏愚人但欲敗度縱敗禮耳同前盤庚五誥難曉尚書中盤庚五誥之類實是難曉若要添減字硬説将去儘得然只是穿鑿終恐無益耳同前周誥如曉諭之文典謨之書恐曾經史官潤色来如周誥等篇恐只似如今曉諭俗人者方言俚語隨地隨時各自不同同前禹貢酒誥可疑處書中亦極有難考處只如禹貢説三江及荆揚間地理是吾輩親自見者皆有疑至北方即無疑此無他是不曾見耳康誥以下三篇更難理會如酒誥却是戒飲酒乃曰肇牽車牛逺服賈何也梓材又自是臣告君之辭更不可曉同前武成記事武成一篇乃史官記武王征伐及其歸周所行之事者也然諸儒所以疑之者有説以其所記之日有差故也一月癸巳武王自周伐商不當即繼以四月哉生明既曰既生魄為四月之十六日不當繼以既戊午反是正月之二十八日既先偃武修文不宜始記禱神與商受會於牧野既曰祀於周廟命庶邦冢君不宜始記式商容閭散財發粟此其顛倒斷絶有不容以不辨者疑武成之誤者古今常説也孔頴逹曰此篇序事多而王言少其辭又首尾不結體裁異於餘篇無作神羞以下當有其辭今無其語是言尚未已簡編斷絶也自漢以来豈惟頴逹疑之邪特為之䟽義故説行於世也如近世王氏程氏之徒莫不疑之人自為斷家自為讀而卒無定論嗚呼書之不幸出於口授壁藏孔安國定其可知者五十有九篇曰其餘錯亂磨滅不可復知然則五十九篇既定之後豈無錯謬者哉蓋亦有之矣夔曰於予擊石拊石之辭只合在益稷之末而重出於舜典命官之際康誥之書周公作誥以封康叔而云周公初基作新大邑于東國洛此文皆錯誤失次也若夫武成之書則似顛倒錯亂然實究其㫖實未嘗錯誤也盖古昔之體自不同仲虺之誥全載仲虺之言湯誥全載湯之命伊訓全載伊尹之語至如太甲盤庚之類皆出一人之㫖此其大凡也若堯典則惟記用人之言至於稱堯之徳與乃命羲和以下並史官之辭舜記並是史官述舜之為政及命官事禹貢顧命等書並史官當時之制此又有體也其可一概觀邪武王伐紂五書泰誓三篇牧誓一篇皆全記武王誓衆之辭史官無加焉此則仲虺之誥湯誥伊訓體也惟武成不然武成者武王伐紂之功已成識其政事之書皆史官記武王征伐及其歸周所行之事此則與堯典舜典顧命之書體同孔氏乃疑其序事多而王言少體裁異於餘篇不當如是之疑也且據左傳無作神羞以下皆有其辭此獨無又何拘之甚乎至王氏則離析其章句以予小子其承厥志以下即繼以乃反商政夫經上言先王之勤勞文王之未集大統武王方承厥志以下不言伐商遽謂反商政則其語無倫之甚學者惟患武成之失次其離而讀之反以無倫可乎予謂不然武成一書惟知古人作書之體者乃知其無誤也武王既勝商歸豐史官雜記其事首曰惟一月壬辰旁死魄越翼日癸巳王朝歩自周于征伐商此則記其始往征伐商之時也繼以四月哉生明王来自商至于豐乃偃武脩文以下此則記其克商還周之時也既述其往又記其歸此其識事之總目也即載其命冢君百工之辭告皇天后土所過山川之言至無作神羞述武王往伐之時有此言耳述武王之言已盡乃曰既戊午師逾孟津此史官還卒言其勝商之事爾下至封墓式閭散財發粟皆天下已定行之雖若不相倫續盖雜記其政事無害作書之體也以此見既生魄乃序其歸周之後既戊午重述其伐商之時不得以戊午繼四月生魄為説也學者反覆深思理可見矣或曰孟子之於武成尤不盡信之矣豈得無所疑乎曰孟子特疑其仁人伐罪不至於血流漂杵爾孟子雖疑其理之或非未嘗疑其文之錯誤後人疑武成當如孟子而後為知書也武成一月泰誓武成月不稱正而稱一者何哉泰誓武成稱一月者商正已絶周正未建故只言一月也羣書考索别集卷四
