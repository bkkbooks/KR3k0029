body:
  text: 羣書考索卷五十七宋章如愚撰律歴門星官類星官之書自黄帝始髙陽氏使南正重司天北正黎司地帝嚳亦式序帝堯乃命羲和欽若昊天夏有昆吾商有巫咸周之史佚宋之子韋魯之梓慎鄧之禆竈晉之卜偃魏之石氏齊之甘公楚之唐昧越之尹臯皆能言天文察時變也漢𫝊天數者有李尋之倫光武有蘇伯况郎雅光能參伍天文後張顧為太史今鑄渾天儀總序經星謂之靈憲三國吳陳卓始列甘氏石氏巫咸三家星官著於圖錄宋元嘉中錢樂之鑄渾天銅儀以朱墨白色用殊三家而合陳卓之數隋髙祖平陳得善天官者周墳并得宋渾儀器乃命庾季芳等參校周齊梁舊圖刋其大小正彼疎密凖三家星位以為盖圖煬帝又遣官四十人就太史局别詔袁充教以星氣業成者進聞以參占驗史臣於觀䑓訪渾儀見元魏趙崇所造者以鐡為之乃周武帝平齊所得隋開皇三年以置觀䑓之上唐因而用焉以隋晉志脩書堯典乃命羲和欽若昊天歴象日月星辰敬授人時命羲和出納日月考中星以正四時舜則曰在璇璣玉衡以齊七政古者天人之際推候占測為術猶簡唐天文志羲和湎滛廢時亂日羲和廢厥職酒荒于厥邑𦙍后承王命徂征惟時羲和顛覆厥徳沈亂于酒叛官􅄐次俶擾天紀乃季秋月朔辰弗集于房馮相氏掌十二嵗十有二月十有二辰十日二十有八星之位辨其叙事以㑹天位冬夏致日春秋致月以辨四時之叙馮乘也相視也登髙䑓以望天文之次序上注保章氏掌天星以志日月星辰之變動以觀天下之遷辨其吉㓙以十二風察天地之和命乖别之妖祥以詔救政訪序事天子有日官諸侯有日御日官居卿以底日左桓十七年㐮公二十七年十一月朔日有食之辰在申司歴過也哀公十三年冬十二月螽季孫問諸仲尼仲尼曰丘聞之火伏而後蟄者畢今火猶西流司歴過也詩人所謂婚禮土功必候天星春秋書日食星變𫝊載諸國所占次舎伏見逆順周禮測景求中分星辨國妖祥察候至漢以後星經歴法皆出於數術之學唐興太史李淳風浮屠一行尤稱精博唐天文天文類天文經星經星常宿中外官凡一百一十八名積數七百八十三皆有州國官宫物類之象張衡云文耀麗乎天其動者有七日月五星是也衆星布列體生於地精成於列各宿錯峙若有攸属在野象物在朝象官在人象神有五列焉是為三十五名一居中央謂之北斗四布於方各七為二十八舎中外之官常明者百有二十四可名者三百二十為星二千五百㣲星之數盖萬一千五百二十中宫北極五星鈎陳六星皆在紫宫中北極北辰最尊者也其紐星天之樞也天運無窮三光迭曜而極星不移第一星主月太子也第二星主日帝王也亦太乙之座第三星主五星庶子也鈎陳後宫也大帝之居也北四星曰文御宫勾陳口中一星曰皇天大帝抱北極四星曰四輔所以佐北極而出政授度大帝上九星曰華盖所以覆蔽大帝之座也下九星曰扛盖之柄也又下五星曰五帝内座扛旁六星曰六甲極東一星曰柱下史北一星曰女史𫝊合九星在華盖上亦曰胡兵南河中五星之造父御官也一曰司馬一曰伯樂西河中九星曰鈎星天一星在紫宫中門右星南天帝之神也太一星在天一南亦天帝之神也紫宫垣十五星其西蕃七東蕃八在北斗北一曰紫㣲大帝之座天子之常居也一曰長垣天營旗星東垣下五星曰天柱門内東南維五星曰尚書三納言尚書西二星曰隂徳陽徳宫門左星内二星曰大理主刑門外六星曰天床西南角外二星曰内厨東北維外六星曰天厨比北極紫宫次舎北斗一星輔一星在太㣲北七政之樞機隂陽之元本也故運乎天中而臨制四方以建四時而均五行也魁四星為璇璣杓三星曰玉衡又曰斗為人君之象也號令之主也又為帝車取運動之義又第一星曰天樞為天二曰璇為地三曰璣為日四曰權為時五曰玉衡為音六曰開陽為律七曰瑶光為星一至四為魁五至七為杓石氏云一主天主秦二主地主楚三主火主梁四主水主吳五主土主燕六主木主趙七主金主齊魁中四星為貴人之牢輔星𫝊乎開陽所以佐斗成功丞相之象也杓南三星及魁第一星西三星皆曰三公主宣徳化調七政和隂陽之官也西漢志曰杓擕龍角衡中南斗用昏建者杓夜半建者衡平旦建者魁斗運乎中央臨制四方移節度定諸紀皆係乎斗北斗之次文昌六星在北斗魁前天之六府也一曰上將二曰次將三曰貴相四曰司禄司中五曰司命六曰司冦西漢志曰四曰司命五曰司禄六曰司災與此不同此六星曰内階相一星在北斗南總領百司以集衆事太陽星在相西西北四星曰勢天牢六星在魁下北文昌宫之次太微天子庭五帝之座也一曰為衡主平也又為天庭十二諸侯之府也其外藩九卿也南藩中二星間曰端門東曰左執法廷尉之象也西曰右執法御史之象也左執法之東左掖門也右執法之西右掖門也東蕃四星一曰上相二曰次相三曰次將四曰上將西蕃四星一曰上將二曰次將三曰次相四曰上相皆曰四輔也西南角外三星曰明堂天子布政之宫西三星曰靈䑓主觀雲物左執法東北一星曰謁者主賛賔客也謁者東北三星曰三公内朝坐㑹之所居也北三星曰九卿内座九卿西五星曰内五諸侯辟雍之禮得則太微諸侯明此太微之次黄帝座在太微中含樞紐之神天子動得天度則五帝座明黄帝座不明人主求賢以輔法四帝星夾黄帝座東方蒼帝靈威仰之神也南方赤帝赤熛怒之神也西方白帝白招拒之神也北方黒帝協光紀之神也北一星曰太子太子北一星曰從官帝座東北一星曰幸臣屏四星在端門之内所以擁蔽帝庭郎位十五星在帝座東北郎將在郎位武賁一星在太微西蕃北斗常陳七星在帝座北此五帝座之次三台六星兩兩而居起文昌抵太微一曰天柱三公之位也在天曰三台主開徳宣符也西近文昌二星曰上台為司命王壽次二星曰中台為司中主宗室東二星曰下台為司禄主兵所以昭徳塞違也又曰三台為天階大一躡以上下一曰泰階上階上星為天子下星為女主中階上星為諸侯三公下星為卿大夫下階上星為士下星為庶人所以相隂陽而理萬物也南四星曰内平近職執法平罪之官也中台之北一星曰太尊貴戚也此三台之次攝提六星直斗標之南主建時節焉楯以夾擁帝座西三星曰周鼎大角在攝提間大角者天王座也北三星曰梗其北一星曰招揺其北一星曰天戈招揺與北斗杓間曰天庫天槍三星在北斗杓東女床三星在紀星北天棓五星在女床北七分七星在招揺東三公之象也貫索九星主法律九星皆明天下獄煩天紀九星在貫索東織女三星在天紀東東足四星四漸䑓西足五星曰輦道左右角間二星曰平道西一星曰進賢亢東咸西各四星在房心北日月五星之道也鍵閉一星在房東北鈎鈴主闗籥天市垣二十二星在房心東北帝座一星在天市中候一星在帝座東北宫者四星在帝座西南宗正二星在帝座東南宗人四星在宗正東宗星二在候星東天江四星在尾北天籥八星在南斗柄西建星六星在南斗北東南四星曰狗國北三星曰天鷄天弁九星在建星北河鼓三星旗九星在牽牛北旗端四星南北列曰天桴離珠五星在湏女北天津九星横河中騰蛇二十二星在營室北王良五星在奎北其四星曰天駟旁一星曰王良前一星曰䇿星閣道六星在王良前𫝊路一星在閣道南天將軍十二星在婁北大陵八星在胃北北九星曰天船一曰舟星中一星曰積水昴西二星曰天街卷舌六星在昴北五車五星三柱九星在畢北西北大星曰天庫窮星曰天倉東南星曰司空西南星曰卿星其中五星曰天潢潢南三星曰咸池東南六星曰諸王其西八星曰八榖天闗一星在五庫南日月之所行也東井鉞前四星曰司恠西北九星曰坐旗西四星曰天髙西一星曰天河南河北河各三星兩河開日月五星之常道也河南三星曰闕邱五諸侯五星在東井北南三星曰天樽積水一星在北河西積薪一星柜積水東水位四星在積薪東軒轅于七星在七星北軒轅右角南三星曰酒旗南三星曰天相軒轅西四星曰爟爟北四星曰内平少微四星在太微西一名處士明大而黄則賢士舉也西四星曰長垣此周天之雜星並隋書二十八宿二十八舎之度最多者莫如東井其次莫如南斗度之少者莫如觜觽其次莫如輿鬼東方角一星為天闗其間天闗其内天庭黄道徑其中七曜之所行左角為天田主刑右角為將主兵亢四星天子之内庭也氐四星天子之宿宫房四星為明堂天子布政之宫也亦四輔也又為四表中間為天衢為天淵黄道之所經也南間曰陽間北間曰隂間七曜由乎天衢則天下和平亦曰天駟為天馬主車駕亦曰天廐又主開閉為蓄藏又北小星為鈎鈴房之鈴鍵天之管籥明而近房天下同心心三星天王正位也中星曰明堂天子位為大辰主天下之賞罰前星為太子後星為庶子尾九星後宫之埸亦為九子色欲均明小大相承則後宫有叙箕四星亦后妃之府主八風凡日月宿在箕東壁翼軫者風起北方南斗六星天廟也丞相太宰之位主褒賢進士又主兵牽牛六星天之關梁主犧牲事須女四星天少府也主布帛虛二星三宰之臣也主北方邑居廟堂祭祀祝禱事危三星主天府營室二星天子之宫也為主功事東璧二星主文章天下圖書之秘府西方奎十六星天之武庫也主以兵禁暴婁三星主苑牧犧牲供給郊祀胃三星天之厨藏主倉廪五榖府也昴七星天之耳也主西方又為旄頭胡星也昴畢間為天街黄道之所經畢八星三邊兵戈獵月入畢多雨觜觽三星為二軍之候參十星白獸之體中三星主將南方東井八星天之南門黄道所經主水衡輿鬼五星天目也主視明察奸謀柳八星天之厨宰七星主衣裳文綉張六星主珍寳而又主天厨翼一十二星天之樂府主夷狄逺客軫四星亦主冡宰輔臣也並晉書十二次度數角亢氐壽四星在辰鄭兖州角十三亢九氐十五房心大火在昴宋豫州房五度心三度尾箕析木在寅燕幽州尾十八度箕十一度斗牛女星紀在丑呉越揚州斗二十六度牛八度女十三度虚危元枵在子齊青州虛十度危十七度營室壁訾娵在亥衛并州營室十六度壁九度奎婁胃降婁在越魯徐州奎十六度婁十二度胃十四度昴畢大梁在酉趙冀州昴十一度畢十七度觜觹參實沈在申晉益州觜一度參十一度東井輿鬼鶉首在未秦雍州井三十三度鬼三度栁七星栁十五度星七度張三河十八度鶉火在午周三輔或曰三河翼十八度軫十七度鶉尾在已楚荆州七曜日月天之運也一晝一夜而運過周星從天而西違天而東日有中道黄道也夏至至於東井北近極故晷短冬至至於牽牛南逺極故晷長春秋分日至婁角去極中而晷中皆去極近逺之差晷景短長之制也陽用事則日進而北晝進而長陽勝故為温暑隂用事則日退而南晝退而短故為凉寒此寒暑之表日有九行青白黒赤各一道其交必於黄道故為九立春春分東從青道立秋秋分西從白道立冬冬至北從黒道立夏夏至南從赤道日行不可指而知也故以二至二分之星為候至月行則以晦朔决之日之所行為中道月五星皆臨之也律歴志曰日月相推日合月速當其同謂之合朔先速後近一逺三謂之弦相與為衡分天之中謂之望以速及舒光盡體伏謂之晦晦朔合離斗建移辰謂之日月之行則有冬有夏冬夏之間則有春有秋是故日行北陸謂之冬西陸謂之春南陸謂之夏東陸謂之秋隋志曰東陸謂之春南陸謂之夏西陸謂之秋北陸謂之冬按月令孟春在營室仲春日在奎季春日在胃孟夏日在畢仲夏日在東井季夏日在栁孟秋日在翼仲秋日在角季秋日在房孟冬日在尾仲冬日在斗季冬日在婺女四時日行陸惟孟月未正自仲至季皆在以此考之則漢志信然而隋志未必然日道發南去極彌逺其景彌長逺長乃極冬乃至焉日道歛北去極彌近其景彌短近短乃極夏乃至焉二至之中道齊景正春秋分焉日有中道月有九行行出入而交生焉朔㑹望陸衡鄰於所交虧薄生焉並漢志太元經曰日一北而萬物生日一南而萬物死揚子雲曰日未望則載魄於西至望則終魄於東𫝊不曰冬至而曰日南至極於牽牛之初日中之時景最長以此知其南至斗綱之端運貫營室織女之紀指牽牛之初以紀日月故曰星紀五星起其初日月起其中凡十二次日至其初為至節至其中斗建下為十二辰視其建而知其次劉歆歴日之與月其隂陽尊卑之辨若君臣然觀君居中而佚臣旁行而勞臣近君則威損逺君則勢盛故月逺日則其光盈近日則其明缺禮書星傳日者徳也月也刑也日食修徳月食修刑灾異消矣禮記曰男教不修陽事不得故日食婦順不修隂事不得故月食五星嵗星東方木主春仁也貌也仁虧貌失逆春令傷木氣則罸見嵗星史記曰義失罰出嵗星非也主齊吳營室為清廟嵗星廟也熒惑南方夏火禮也視也禮虧視近逆夏令傷火氣罰見熒惑主楚吳越以南心為明堂熒惑廟也鎮星中央季夏土信也心也仁義禮智以信為主貌言視聽以心為正故四星皆失填為之動南斗填星廟主王子史記曰徳禮義刑殺已失則四星之動揺太白西方秋金義也言也義虧言失逆秋令傷金氣罰見太白亢太白廟也主大臣史記曰殺失者罪出太白辰星北方冬智也水也聽也智虧聽失逆冬令傷水氣罰見辰星辰星主刑主燕趙史記曰萬失名罰出辰星七星辰星廟也晉志太史公曰五星色白圜赤圜青圜黒圜皆凶黄圜則吉五星同色天下偃兵百姓寧昌西漢志曰漢元年十月五星聚東井以歴推之從嵗星也魏髙允謂崔浩曰漢元年冬十月五星聚東井此方歴數之淺事今譏漢史而不覺此謬浩曰所謬云何允曰按星𫝊金水二星常附日而行冬十月日旦在尾箕昏没於東南而東井方出於寅北二星何因背日而行是史官欲神其事不復推之於理浩曰欲為變者何所不可君獨不疑二星之聚而恠一星之來允曰此不可以空言争游雅曰髙君長於歴當不虚言後歳餘允謂浩曰果如君語五星以前三月聚於東井非十月也四朝志曰凡五星差行惟熒惑太白與諸星不同有南侵狼座北入瓠𤓰變化超越獨異他星東坡曰金水常附日不逺而十月日在箕尾此浩所以疑其妄以予考之十月為正盖十月乃今之八月耳八月而得七月節則日猶在翼軫間則金水聚於井亦不甚逺方是時沛公未得天下甘石何意謟之也太嵗在寅曰攝提格在卯曰單閼在辰曰執除在巳曰大荒落在午曰敦牂在未曰協洽在申曰涒灘在酉曰作噩在戍曰掩茂在亥曰大淵獻在子曰困敦在丑曰赤奮若各分為十二月七曜總論七政之行遲速不同故其復㑹為甚難日之行也一嵗一周天月之行也一月一周天嵗星以十二年而一周鎮星以二十八年而一周熒惑以二年而過周惟太白辰星附日而行或速則先日或遲則後日速而先日昏見西方遲而後日晨見東方要之周天僅與日月同故亦一嵗一周焉惟七政之行不齊如此其所以難合也而世之觀漢史者見其論太初之歴曰日月如合璧五星如連珠遂以為五星㑹於太初之元年殊不知此乃論太初推而上之至於渾元之初其數之精宻旡有餘分故有是言在太初實未嘗如合璧如連珠也五星之行其最遲者莫如鎮星試以鎮星攷之漢髙元年五星聚東井盖鶉首之次也自髙祖元年至太初元年凡百有二十年也鎮星二十八年而一周當是時鎮星之周天盖以三周而復行半周有餘已進在元枵之次矣安得有日月如合璧五星如連珠起於牽牛之初乎夫日舒而月速當以二十九日半强而相及盖月行速而日行舒故也故一嵗之周凡十有二㑹焉以其序而言之十有一月㑹於星紀之次十有二月元枵正月訾陬二月降婁三月大梁四月實沈五月鶉首六月鶉火七月鶉尾八月壽星九月大火十月析木夫㑹而為晦晦而復蘇明於是乎生焉是之謂朔月之行速漸逺於日以周天言之其近日也九十一度有竒其逺於日也三百七十四度有竒是之謂一近一逺三為弦此謂上弦也其行甚逺而與日對去日百八十二度六十二分有竒是謂相與為衡分天之中為望盖日與月相望故也其行過中逺於日也二百七十四度有竒其謂之近一近一逺三為弦此謂下弦也上弦在於八日下弦在於二十二日望在於十五日此其常也與弦或退則是七日或進則在九日下弦或退則在二十一日或進則在於二十三日望或退則在於十四或進在十六此其變也渾儀十二辰十二土天有十二次日月之所躔地有十二辰王侯之所國周官大司徒辨十有二土十有二壌保章氏以星土辨九州所封皆有分星以觀妖祥盖九州十二域或係之北斗或係之二十八宿或係之五星則雍主魁冀主揺青兖主璣揚徐主權荆主衡梁主魁陽豫主揺光此係之北斗者也星紀吳越也元枵齊也娵訾衛也降婁魯也大梁趙也實沈晋也鶉首秦也鶉火周也鶉尾楚也壽星鄭也大火宋也析木燕也此係之二十八宿者也嵗星主齊吳熒惑主楚越鎮星主王子太白主大臣辰星主燕趙代此係之五星者也然吳越南而星紀在丑齊東而元枵在子魯東而降婁在戍東西南北相反而相属何耶先儒以謂古者受封之日嵗星所在之辰其國属焉觀春秋凡言占相之術以嵗之所在為福嵗之所衝為灾故師曠梓慎禆竈之徒以天道在西北而晋不害嵗在越而吳不利嵗滛元枵而宋鄭饑嵗棄星紀而周楚惡嵗在豕韋而蔡禍嵗及大梁而楚凶則古之言星次者未嘗不視嵗之所在也禮書中星書於仲夏舉房心而月令舉亢書於仲秋舉虚而月令舉牛書於仲冬舉昴而月令舉壁則書之中星常在後月令中星常在前盖月令舉月本書舉月中也月令旦昏之中星或舉朔氣或舉中氣猶書於七星或舉其名或舉其次皆互見也禮書月令四時昏旦之中星皆協二十八宿之度惟仲春之月昏弧中旦建星中夫弧建二星不預於二十八宿之列而月令云爾者盖弧属於井建属於斗故也歴書舉昏旦中星者取其示人以中而已如仲春之月昏東井中旦南斗中然考之二十八宿東井南斗其度最闊中春昏旦井斗之度雖中井斗之星甚逺故秦之為歴慮其非示人以中之意乃視井度之中其昭然當中者莫如弧星故取以代井焉視斗度之間其昭然當中者莫如建星故取以代斗焉其實弧属井建属斗耳賈逵曰建星即斗星謂建之度即斗之度此說是矣若李竒謂古以建星為宿今以牽牛為宿是大不然渾儀畧說月令仲春之月昏弧中按尚書之日中星鳥不同者如鄭康成之意南方七宿總為星鳥井鬼則鳥星之分故云鳥星與此同也按仲夏昏亢中尚書云日永星火不同者按鄭谷孫顥云星火非謂心也卯之三十度總為大火其為大火之次有星者月令舉其月之初朔書則總舉一月之初中故不同也按仲秋之月昏牽牛中書云宵中星虚仲冬之月云東壁中書云日短星昴不同者亦是月令舉其初朔尚書總舉一月之初中理亦不異孔安國注書一所舉星者皆云七星並見是畢見之義不謂南方之中禮記正義三辰五星太極運三辰五星於上而元氣轉三統五行於下其於人皇統三徳五事於中故三辰之合於三統也日合於天統月合於地統斗合於人統五星合於五行水合於辰星火合於熒惑金合於太白木合於嵗星土合於鎮星三辰五星相經緯劉歆歴十二風十有二風風之生於十二辰者也考之𫝊曰陽立于五極于九五九四十五則變矣八風各四十五日艮為條風震為明庻風巽為清明風􅄐為景風坤為凉風兊為閶闔風乾為不周風坎為廣莫風卦不過八則風亦八而已言十二風者乾之風漸九月坤之風漸六月艮之風漸十二月巽之風漸三月而四維之風皆主兩月艮為條風而立春亦曰條風巽為清明而立夏亦清明坤曰凉風而立秋亦曰凉風乾為不周風而立冬亦曰不周風所以為十二風也保章氏以十二風察天地之和命乖别之妖祥鄭曰十二辰皆有風吹律以知和否楚師伐鄭師曠曰吾驟歌北風又歌南風南風不競多死聲楚必旡功是時楚師多凍則其命乖别也審矣八風八風從律而不奸樂記謂十二月律也樂音象八風其樂得其度故八風應八節條風者條者生也明庻風明庻者迎衆也清明風清明者芒也景風景者大也言陽氣長飬也凉風凉寒也隂氣行也閶闔風閶闔者咸取飬也不周風不周者不交也言隂陽未合化也廣莫風廣莫大莫也開陽氣也正文注季札聘魯觀周樂曰五聲和八風平㐮二十五年舜曰惟聖人知樂之本以通八風孔叢子天漢起没天漢起東方徑其尾之間謂之漢津乃分為南北二道至天津下而合西南行又分而東南行在七星南而没晉隋志天雲漢自坤抵艮為地紀唐天文析木謂之津箕斗之間津也爾雅祥瑞三皇邁紀五星如連珠日月如合璧漢志伏羲有神龍負圖之瑞炎帝感神龍之生黄帝受命有雲瑞寳鼎之祥有土徳之瑞故號黄帝少昊鳯鳥至堯時甘露降芝草生醴泉出又有蓂莢生於庭舜時簫韶九成鳯凰來儀擊石拊石百獸率舞禹時天雨金三日亦嘗雨稲塗山之㑹濟河黄龍負舟劉敞外紀龜書畀姒之應商元鳥隨卵而生契並史記又有白狼衘環之異嘉禾同本而異秀其大盈車瑞應圖周姜嫄踐巨人之跡而生稷武王之興白魚入于王舟有火至于王屋流為赤色烏史記或曰齊桓將伯髙祖入秦五星聚房髙祖生而有交龍之祥又有赤帝之瑞芒碭雲氣之異冬十一月至覇上五星聚東井此髙帝受命之符客謂張耳曰東井秦地漢王入秦五星從嵗星聚當以義取天下文帝時黄龍見成紀武帝元符元年獲白麟作白麟之歌元鼎四年得寳鼎后土祠旁馬生渥洼水中作寳鼎天馬之歌元始三年幸東海獲赤鴈作赤鴈之歌宣帝初卧居數有光輝神爵元年詔曰嘉谷元稷降于郡國神爵仍集金芝九莖産凾徳殿銅池中九真獻竒獸南郡獲白虎威鳯為寳東濟大河神魚舞幸萬嵗宫神爵集其改元神爵是後鳯凰五至改元五鳯三年甘露降改元甘露夏黄龍見新豊又改元黄龍成帝時犍為郡於水濵得古磬十六枚議者以為善祥劉向言宜興辟雍庠序雅頌之音西漢光武生而赤光照室中中興獲赤伏符强華士云四七之際火為主白水真人王莾改金刀為貨泉或以貨泉字為泉龍飛白水鳯翔參虛張衡兩都賦光武謂馮異曰我夜夣乗龍上天建武中鳯凰見陳晋雨穀形如稗實中元中醴泉湧出京師朱草生嘉禾一莖九穗光武嘗自謙每郡國上靈物輙抑而不當並東漢明帝永平中王雒山出寳鼎漅湖出黄金麒麟白雉醴泉嘉禾所在出焉又甘露降於甘陵芝草生神爵集詔賈逵作頌章帝時鳯凰仍集麒麟並臻甘露宵降嘉穀滋生郡國上符瑞合於圗書者數百千所東漢魏文帝生黄龍見於譙明帝景初黄龍見有司奏冝以建丑為正上黄吳時黄龍見武昌嘉禾生㑹稽因以改元黄龍嘉禾三國志魏青龍中張掖郡寳石負圗有石馬七後司馬氏興晋武帝大始中嘉禾生於酒泉一蔕十莢宋書有白雉之頌林邑獻馴象後有五馬渡江一馬化為龍之謡元帝中興之兆有日重暈皆以為中興之象晋書唐髙祖時野蚕成繭太宗曰比見群臣上表賀祥瑞夫家給人足而無瑞不害為堯舜後魏之世吏焚連理木煑白雉而食之豈足為至治乎自今惟大瑞表聞嘗有鵲巢寢殿槐上左右賀上曰常笑煬帝好祥瑞瑞在得賢此何足賀遂命毁之太子室中産素芝十四莖並為麟鳯之形髙宗龍朔中􅅤光殿前麟趾見改元麟徳三年鳯凰集改儀鳯元宗開元中潞州獻瑞應圗謂宰相曰徃者史官惟記灾異將令王者懼而修徳故春秋不書祥瑞惟記有年聖人之意明矣勑天下不得奏祥瑞代宗大歴中澤州進慶雲圗制曰以時和年豊為嘉祥以進賢遂忠為良瑞如慶雲靈草異木自今諸道並不須進徳宗正元詔曰所寳惟賢至如嘉禾神芝竒禽異獸盖虚羙也冝停進七年梓州言嘉禾生麟食之一鹿引群鹿隨焉使工圗之以獻文宗開成中詔以慈惠恭儉為休證人和年豊為上瑞諸道祥瑞並不得奏聞太宗時長孫旡忌曰嘉祥又還陛下推而弗居今史官閣筆旡以示後帝曰瑞應之來當勞心以答天地耳㑹要五代唐明宗即位焚香祝天願早生聖人為中國主二年而太祖生於洛陽神光滿室異香逹于外至今俗呼為香兒營太祖時有瑞文馴象玉鳥皓爵之瑞詔和峴作樂章昭憲生太宗時夣神人捧日置懐而孕雍熈中獲一角獸太宗曰珍禽異獸無益於事非所尚但得時和嵗稔人安俗阜乃為上瑞淳化元年宋炎奏踐祚以來郡國所獻羽族之瑞三十七蹄角之瑞三十六草木之異雲露之應不可勝紀上謙遜不以示外願付史館宏詞編眞宗大中祥符間太山天書降上東封覩外郡獻嘉禾顧左右曰天下豊稔即祥瑞也寳訓仁宗時河北進芝草是日雪上曰今日嘉雪大滋宿麥自勝芝草之瑞聖政議論歐陽公五代史曰自秦以來尤多祥瑞予讀蜀書至龜龍麟鳯之類所謂王者之嘉祥莫不畢出於國或以為王氏不足以當之但視時之治亂可知也龍之為物以不見為神以升雲行雨為得致令偃然暴露其形是不神也可以為妖鳯之逺來有道之應今數至或出於庸君謬政之時或出於危亡大亂之際豈可為瑞哉麟獸之逺人也故孔子書西狩獲麟譏之也如堯舜湯武之世麟未嘗一出而當亂世孰知其為瑞哉此數物者皆出於蜀雖可以為瑞物亦可疑也庻幾或者有作焉班彪王命論推王者之興瑞應之異世系之短長固非好竒論以夸耀時俗也盖天子之貴神明之祚可得而妄處哉固未見運世無功本徳不紀而能崛起在此位者也司馬遷作史記其紀述三代之世系而因元鳥以生履巨跡以孕白魚赤鳥之瑞亦累累言之不厭孟堅之賛髙祖則逺推其世系之所從出而知其為帝堯之後芒碭之雲當道之蛇此豈可以常理論哉二史最為精簡豈猶有費辭正以天位不可幸而得其杜窺窬之意深矣是故陳嬰之母自念其家勢之微不欲嬰之暴貴韓淮隂智勇無敵甘心於髙祖之服正以為帝之興為天授非人力也灾異堯時十日並出焦禾稼上射十日民皆喜商太戊立桑榖共生於朝伊陟曰妖不勝徳帝政其有闕歟帝從太戊修徳而桑榖死髙宗祭湯有飛雉升鼎而雊祖已訓王先修政事史記成王初周公攝政管蔡流言而公居東時大熟未穫天大雷電以風禾盡偃大木斯拔邦人大恐王啓夫金縢之書曰冲人不及知今天動威以彰周公之徳出郊乃雨反風禾盡起嵗大熟國語曰幽王時山川皆震伯陽父曰陽伏而不能出隂迫而不能承於是乎有地震劉向曰幽厲之際朝廷不和是日月薄蝕而無光其曰朔日辛卯日有食之彼月而微此日而微天變見於上地變見於下水泉沸騰山谷易處其詩曰百川沸騰髙岸為谷深谷為陵霜降失節其詩曰正月䌓霜我心幽傷此不和之所致也至春秋二百四十年日食三十六地震五彗星三見夜常星不見星隕如雨者一火灾十二五石隕墜六鷁退飛周道遂不復興宋景公熒惑守心宋之分也司星子韋曰可移於相公曰相吾之股肱可移於民公曰君者待民可移於嵗公曰嵗飢民困吾誰為君子韋曰君有人君之言冝有動於是果徙三度史記齊景公彗星見當齊分晏子曰君髙䑓深池賦歛如弗得刑罰恐不勝茀星將出彗何懼乎公曰可禳否曰神可祝而來亦可禳而去百姓怨苦以萬數而君令一人禳之安可勝衆口乎景公懼而修徳十六日而㓕晋梁山之變召伯宗重人曰國主山川故山川摧竭則君為之不舉降服而徹樂祝幣史辭以禮焉雖伯宗若之何昭公四年大雨雹申豊曰聖人在上無雹雖有不為灾鄭人鑄刑書士文伯曰火未出而作火以鑄刑器鄭其敗乎十七年日食祝史請用幣昭子曰日食天子不舉伐鼔于社諸侯用幣伐鼔于朝禮也冬有星孛于大辰禆竈言於子産曰以宋衛陳鄭將同日火若我用瓘斝鄭必不火子産弗與戊寅風甚皆火禆竈言曰不用吾言鄭又將火子産曰天道逺人道邇竈焉知天道是亦多言矣遂不與亦不復火漢文帝元年齊楚地震二十九山同日崩大水潰出胡日史書其異而旡其應或以為吕氏隂盛餘氣所感是不然意者帝方以徳化天下愛民惟恐傷之所以有灾異之證而旡其應二年日有食之詔舉賢良以正不逮景帝時日食旱蝗星孛旡嵗旡之武帝六年有星孛于東井長竟天遣王恢韓安國擊越元光三年河水决濮陽汎郡十六發卒十萬救决河起龍淵宫元狩四年長星出于西北衛青霍去病各將五萬騎伐單于元封二年瓠子河决命從臣將軍以上皆負薪塞河其秋有星孛于東井又有星孛于三台望氣王朔言獨見填星出如𤓰食頃復入有司皆曰陛下建漢家封禅天報其徳星云昭元鳯三年太山有大石自立上林有栁木枯僵自起生此宣帝興之兆也宣帝元年地之鈌也對曰物之自然未必闗人事今責躬自省未必不為福也長壽三年三月大雪蘇味道將賀王永禮曰此灾也乃誣為瑞若三月雪是為瑞雪臘月雷為瑞雷乎𤣥宗開元七年日食素服俟變徹樂宋璟曰日食修徳月食修刑君子耻言浮於行茍至誠以行不必數下詔也初太廟四室壊上素服避正殿宋璟蘇頲願且停東都之幸姚崇曰太廟皆苻堅時物嵗乆朽腐而壊適與行期相會不可信從先是二月朔太史奏太陽應虧不虧姚崇表賀徳宗正元中司天奏是日太陽虧是時以隂雲不見百寮稱賀諸儒言灾異仲舒治國推隂陽錯行求雨閉諸陽縱諸隂其止雨反是藁未上主父偃竊而奏焉於是下吏劉向見洪範陳五行隂陽休咎之証乃集春秋至春秋灾異之說紀推迹行事著其占驗號曰洪範五行𫝊焦延壽長於言灾異八八六十四卦更直日用事以風雨寒温為候各有占驗京房用之尤精孟康曰一爻主一日六十四卦為三百六十日餘四卦震􅄐兊坎為方伯監司之官是二至二分之日京房以六十律相生之法占隂陽寒燠風雨後志翼奉元帝初上封事曰知下之術在六清十二律而已北方好貪狠申子主之東方隂賊並行是以王者忌子卯也南方惡亷貞寅午主之西方喜寛大巳酉主之二陽並行是以王者吉午酉也樂行奸邪辰未主之哀行公正戍丑主之辰未属隂戍丑属陽物各以類應廼正月癸未日加申有暴風從西南來未主奸邪申主貪狼風以太隂下抵月建前是人主左右邪人之氣郎顗父崇學京氏易善風角星筭謂候四方四隅之方能望氣占候吉㓙顗亦夜占象度並漢書京房說凢日食不以每朔者名曰薄杜預謂日光以望時遥奪月光故日蝕日月相㑹月掩日故日蝕李吉甫曰日月運行遲速不齊凡周天三百六十五度有餘日行一度月行十三度有餘率二十九日半而與日㑹又月行有南北九道之異或進或退若晦朔之交日為月所掩故有薄蝕之變劉歆說凡日食君能修政則灾消福至不能則福息禍生故經書灾而不記其故盖吉㓙旡常隨行而成禍福也蘇曰仲尼修春秋二百四十二年日星之變必書而月蝕不紀觧之者云月諸侯道也夷狄象也彼有虧王者中國之政勝故不為灾或云盖取詩人彼月而蝕則惟其常之義也仲舒言星孛者惡氣之所生也劉向謂五星嬴縮變色逆行甚則為孛劉歆說彗所以除舊布新也左氏曰人火曰火天火曰灾陳蕃上火灾䟽曰惟善政可以已之魏明帝崇華灾髙堂隆曰推禮修徳可以勝李固曰地震地者隂也法當安静今也越隂之職専陽之政故應以震動張行成呉陽君象也地隂臣象也君宜轉動臣宜安静今地震焉宜深思以杜其萌仲舒曰天心仁愛人君必示灾異以警懼之春秋末周徳雖微數十年間旡災青者天所棄也羣書考索卷五十七
