body:
  text: 羣書考索後集卷四宋章如愚編官制門國初舊官制宋朝沿唐制設官間有損益中書門下尚書雖為三省長官多不除中書令尚書令侍中雖國初趙普范質直拜不復言平章事外是未嘗除人雖除亦不為政皆為空官特以寓祿秩叙品位而已中書門下平章事即為宰相任有二人即分日知印上相為昭文次為集賢下宰相一等即為參知政事太祖乾徳二年趙普為相太祖畏其專将使官為副而難其名問陶榖榖曰唐有參知幾務參知政事今可用之矣乃命吕餘慶薛居正為參知政事不升堂不押班不知印開寳六年始與宰相分日知印至道中升政事堂議軍國事矣樞宻前有使副有知院有同知有僉書有同僉書國朝樞宻與中書對侍文武二柄號為二府禮遇畧同樞宻之名起於唐代宗時以中官二人為使承授表奏若人主有處分則宣付門下中書朱梁改為崇政院命敬翔為使始用士人後唐復為樞宻院命宰相郭崇韜兼使又置院使一人然權侔宰相矣晉天福中以劉處謙兼樞宻奏事不稱旨遂廢其院以卻付中書門下開運中復置國初有參知樞宻院有使有副使太平興國中始有僉書院事自石熈載始也淳化中以張詠知院㓂凖同知二院之名始此治平中以郭逹同僉書院同僉書之名始此宣徽有南院使三司則有使三司之属二十四案如兵刑曹之類其後令三司判官各領八案而緫於三司使自太平興國八年始分三司為三部各置使焉有鹽鐵使又有度支使有户部使有審官院東院文臣西院武臣三班院使臣流内銓流外銓格式司則有審刑院有禮儀院有翰林學士院韋執誼翰林故事云翰林院者六藝能技術召見者之所處也而學士則自唐初有之太宗時名儒學士時召草制然猶未有名號乾封以後始號北門學士𤣥宗初置翰林待詔掌四方表䟽批荅應和文章繼以誥敕文誥悉由中書多壅滯始選朝官有詞藝學識者入居翰林供奉别旨然由未定名制詔書敕猶或分在集賢開元二十六年始以翰林供奉改稱學士别建學士院於翰林之南俾在内命其後又置東翰林院於金鑾殿之西隨上所在禮遇益親號為内相又以為天子私人凡學士無定員下自校書上及諸曹尚書皆為之晋天福中以翰林歸中書舍人開運中復置與舍人分為兩制各六員宋朝翰林學士掌内制承旨為長承旨始於憲宗元和元年命鄭綱也宋朝不常置以院中久次者一人充淳化中以翰林學士賈黄中蘇易簡同管勾差遣院而學士領外司自此始也自是學士兼領他司只與職名同唐制官序未至而他官權攝者為真官宋朝開寶中以李昉盧多遜並直學士院而直院之名始此六年以張澹權直翰林院而權直之名始此登聞進奏官吿則又有院門下封駁有司通進銀䑓有司發敕則有司有知諌院有知制誥起居有院舍人有院御史則有中丞知雜三院經筵則有侍講說書太常宗正光祿衞尉太僕大理鴻臚司農太府皆有寺祕書殿中内侍皆有省國子少府将作都水軍器司天皆有監凡三省六曹寺監給舍諌垣史館皆為官品不釐本務而别領内外使更設主判官以司其職自著作郎而上京官在内為主判在外則為奉使雖筦庫而上皆同其領在京官職任則不分京朝若擢為䑓諌經筵則必借命朝臣差遣惟擢新進之士官未升朝者即以太子中允處有出身人中舍處無出身人所以别流品也勲官十有二級上柱國柱國上護軍護軍上輕車都尉輕車都尉上騎都尉騎都尉驍騎尉飛騎尉雲騎尉武騎尉率三嵗一遷必因其除授以加之所以别年勞也太師太傅太保是為三師宋朝三公之官尤重太師趙韓王以勲文潞公以年方得之王文正公吕文靖公皆在相二十年纔以太尉致仕可見宋朝重太師之官也太尉司徒司空是為三公至於武臣則厚其祿而薄其禮凡貴於正任重於官軍要在積行近在承旨御帶寵在閣職設遥郡以賞勞績設使臣以别祿秩此武臣之名分也以莭度使留後觀察防禦團練刺史為正任以殿前馬歩軍副指揮使三軍都虞候天武捧日龍神衞四廂都指揮使為管軍以内閣省使省引進四方館東西上閤門使副為横行以通事舍人閤門祗候為閤職以横行使及諸司使帶防禦團練使刺史為遥郡以諸司使副内殿承制崇班為大使臣供奉官侍禁殿直供奉職為小使臣自遥郡而上名俸皆厚其使臣本祿雖稍薄而添支給劵皆優若朝謁都燕惟正任御焉盖正任方號武臣得與文臣分班也管軍臣僚號侍衞横行大使臣皆為祗應官耳此所謂薄其禮也外郡官自太祖時剪削藩鎮有缺則令文臣權知三年易又設通判以貳其事擇文吏為之佐建隆元年諸郡判官皆令吏部注擬所以革将吏自補之弊也三年置簿尉所以懲親吏為諸縣鎮将之弊也又選朝臣以掌倉庾所以懲諱吏監視重槩量之弊也乾徳中平湖南令潭州諸郡直屬京師至太宗藩鎮無復支郡夫既收其金榖之權擇其精銳之士以赴闗然後藩鎮無陸梁之禍節度之權歸於州鎮将之權歸於縣又分天下而置轉運使以察之而一路之財貨歸之太宗時雖節度防禦團練觀察刺史皆不預僉書金榖刑獄之事矣淳化中詔諸路轉運各命掌參官一人專知糾察州軍刑獄事是時猶𨽻轉運未别立司也景徳四年始置提刑自為别司而不𨽻轉運權稍重矣是時雖專糾刑獄及詞訟未及他事也至天禧中已兼勸農一事其後或罷或置而盗賊軍器河渠保甲封樁錢榖之類悉歸提刑而轉運所緫唯財賦綱運之責而已元豐新官制神宗喜觀唐六典六典𤣥宗撰李林甫等注一日諭王珪等朕欲倣唐六典酌古今之宜修改官制蔡確為參知政事與珪賛行之命官置局上自考求故實咸親臨决以定其論四朝志云神宗慨然欲更官制熈寧末始命館閣校唐六典元豐三年以摹本賜羣臣乃置局中書命翰林學士張琮等詳定八月遂下詔肇新官制凡省䑓寺監領空名者一切罷去而易之以階九月詳定所上寄祿格㑹明堂禮成近臣遷秩即用新制而䑓省寺監之官各還所職矣文階自開府儀同三司而下二十四階以開府儀同三司特進易三司官平章事左右僕射以金紫光祿大夫易吏書以銀青光祿大夫易五部尚書以光祿大夫易左右丞以正議大夫易六部侍郎以通議大夫易給事中以大中大夫易左右諌議大夫以中大夫易祕監以中散大夫易光祿衞尉二卿少府監以朝議大夫易左右司郎中太常光祿少卿以朝請朝散朝奉大夫易郎中以朝請朝散朝奉易員外郎以承議郎易太常國子博士奉議郎易太常祕書殿中丞通直郎易太子中允中舍左右賛善大夫宣徳郎易侍從宣文郎易監丞承事郎易大理評事承奉郎易太常寺太祝奉禮郎承務郎易寺監主簿是為寄祿官也張演元豐職官記中云自大中大夫至金紫止六階昔之五部尚書今為銀青一官昔之六部侍郎今為正議大夫是十一官而併為兩官左右丞左右諌議又併四官而為兩官祖宗舊制出身自郎中三遷而至祕書監䕃補人自郎中五遷而至祕書監所以示其别也今也併為三階矣其後増置奉直中奉而有出身人不遷中散大夫奉直則猶髣髴舊制也舊制所以分别流品者至嚴一官冗數等衆執侍從之遷為一等列卿館職之遷為一等雜流之遷為一等出身人遷為一等列卿館職之遷為一等自將作監簿至祕書二監其遷秩各視其品由諌議大夫而上兩省兩制告侍從之選故不復别其品非故為是紛紛也誠以流品有别則人安其分而無倖進之心爵秩有章而名器加重元豐寄祿之制混為一流無復差别當時羣臣不能推祖宗制官之意立為品章故士大夫慊然以兩制為未盡也新階既少品而轉行者易及至元祐初於朝議大夫六階以上始分左右又以流品無别乃詔寄祿官悉分左右紹聖中罷之崇寧中自承直至将仕凡換選人七階大觀初乂増宣奉正奉通奉中奉奉直大夫之階政和末又改從政至廸功郎三階而寄祿之格始備矣武臣亦詔易以新階正使為大夫副使為郎而横行班十二階使副亦然故有郎居大夫之上者政和中以新名未具増置宣正履正大夫郎凡十餘階通為横班而文武臣官制益加詳矣在内設尚書省置令左右僕射門下省置侍中中書省置令已上為三省即宰相之職兩令侍中不除人尚書有左右丞門下中書各有侍郎而參政之官罷矣自漢元成以外戚領尚書光武中興事歸䑓閣於是權在尚書魏武以祕書令典尚書章奏文帝改為中書有令有監於是權在中書自晉以侍中緫門下樞要江左五朝因之王曇首王華之徒皆宻侍帷幄於是權在門下歴代各有偏重至唐則三省鼎立有中䑓東䑓西䑓之稱揆其本原皆六卿之屬曰尚書者本天官之司㑹曰門下侍中本夏官之太僕曰中書令者本春官之内史在周不過為中大夫而後世遂為宰相之任宋朝用之元豐正官名而三省猶因唐六典之舊以中書造命門下審覆尚書省奉行而政歸中書又分班奏事各行其職此蔡確之所以得專政柄也元祐末吕正獻公諸三省同班奏事紹聖更革謂元祐政事三省分班之制章子厚為門下相懼其權之去已乃不果改故歴紹聖崇寧以來元祐政事無一存者獨此法不變也政和更左右揆為太宰少宰靖康復為左右僕射建炎中罷尚書左右丞宰臣不兼兩省侍郎復祖宗之舊為同中書門下平章事置參政二員通知三省乾道七年改為左右丞相而參政如故樞宻院有知樞宻院事有同知樞宻院事而廢使副僉書元祐中復置僉書院事紹興七年詔依故事置樞宻使及副使其知院同知院僉書並如舊時以宰臣張俊兼使也尚書六部吏部有尚書有侍郎侍郎二人分掌四選吏部司封司勲考功屬焉户部有尚書有侍郎侍郎二人分左右曹而户部度支金部倉部屬焉禮部有尚書有侍郎禮部祠部主客膳部屬焉兵部有尚書有侍郎兵部職方駕部庫部屬焉刑部有尚書有侍郎刑部都官比部司門屬焉工部有尚書有侍郎工部屯田虞部水部屬焉每部郎官二人知州資序及階官朝議大夫以上為郎中餘為員外郎唯吏部户部刑部郎官各置四員以其劇曹也左右司郎官各二員通糾六部號都司專佐宰相理省事謂之宰屬也翰林院有學士以二員為額久次者為承㫖御史䑓有中丞有侍御史有殿中侍御史監察御史如舊制焉但更知雜及裏行之名門下後省置左散騎常侍而不除人給事中四員起居郎左諌議大夫左司諌左正言寓焉中書後省置右散騎常侍而不除人中書舍人六員起居舍人右諌議大夫右司諌右正言寓焉號兩省官祕書省有監少監丞郎校書郎正字而著作郎佐郎寓焉號為館職罷直館院校理等員闕而唯存修撰直祕閣號貼職而别領在外任使九寺則太常宗正光祿衞尉太僕大理鴻臚司農太府有卿少卿丞簿而太常復置博士太祝奉禮協律郎大理則復置寺正評事司直四監将作少府軍器置監少監丞簿都水置使者丞簿南外北外丞已上為寺監官國子監有祭酒司業丞簿太學有博士正錄已上為學官是謂職事官也罷諸主判官而以其職分𨽻諸省部寺監郡牧司使名不除而其職併於太僕以太師太傅太保為三師太尉司徒司空為三公皆論道之官無專領之職為宰相兼官緫論國初元豐官制黄琮曰宋朝自太祖設官分職多襲五代之制雖稍有増損而大體俱舊制也其唐制省部寺監之官備員而已無所職掌别領内外任使而省部寺監别設主判官員額惟以侍中中書令同中書門下平章事為宰相此尚循唐制也至乾徳二年始置參知政事為宰相副貳初以薛居正吕餘慶為之宰相所居省謂之中書門下國政所出也而兵政歸樞宻院承五代之制有使有副至太宗朝初命石熈載以樞宻直學士僉書樞宻院事後以張士遜為知樞宻院事㓂凖温仲舒同知樞宻院事治平中郭達以檢校太保同僉書樞宻院事故樞宻有使副使知院同知院僉書院員額與中書號為二府焉尚書省置判尚書都省一員掌百官赴省集議及大祀受誓戒之事六部各有主判率以學士待制館閣官領之吏部即審官東院掌尚書左選審官西院掌尚書右選吏部南曹掌侍郎左選三班院事掌侍郎右選流内銓考功郎中之職也户部即三司使尚書之任也其官崇職重久次者為使稍輕則為權使資淺則為權發遣使公事度支副使户部副使鹽鐵副使各二員此侍郎之任也别置子司判官八員度支判官户部判官鹽鐵判官各一員所掌本曹郎中之職也判胄案一員掌造器械唐軍器監職也判修造案一員唐工部将作少府監職也判磨勘司一員掌句考唐比部職也判太上皇帝嫌名院一員掌審復出納及審覆百官諸司兵級請俸舊兼禁軍以繁冗别立諸司專討司掌之以分其職判理欠司一員掌催促諸路遺欠禮部有判部及判禮部貢院郎尚書侍郎之任内兵部事歸樞府工部事歸三司故此二部不設主判官多以别官兼之刑部則判審刑院及詳議官掌詳覆諸路奏案是其職也翰林學士襲唐制以六員為額其帶知制誥即釐本院職事其别領省府職任即不帶知制誥内年徳俱重者一員為承㫖知通進銀䑓司兼門下封駁事其任即給事中也而𨽻樞宻院知制誥即中書舍人之職也御史䑓雖有大夫員而不除以中丞為䑓長次侍御史知雜吏侍御史裏行殿中侍御史殿中侍御史裏行監官御史裏行以上為䑓官諌官以别官兼領者即為知監院同知諌院亦有正諌議大夫司諌正言者九寺則判太常寺禮院即卿之任也資輕耳為知院同知院兼掌博司職宗正有判寺一員太僕職屬群牧司有制置使一員以樞府及學士領之則判官二員大理則糾察在宗刑獄是其職也鴻臚歸客省四方館光祿司農太府其職皆𨽻三司衛有無所緫樞其職分為金吾街仗司其環衛之任分𨽻三衛皇城司矣故此五司别無制司并主判官員祕書省即昭文館史館集賢院謂之三館典祕閣同𨽻本省有直館直院直閣校理館閣校勘謂之館職初除於本省供職一年出補内外任使昭文史館有直館集賢院有學士修撰直院校理秘閣有直閣校理又有判祕書省祕閣一員專掌省事國子監有判某資淺者乃同知或同管即祭酒司業之任而博士轉為直講将作少府軍器三監之職並屬三司而都水無常職員遇興役即差官亦繫三司差人迨熈寧興役法水利方置判司農寺丞并司農寺丞員開建大理寺方置權發遣大理少卿公事二員職掌官外有學士待制等員唯觀文殿大學士仁宗朝以賈昌朝辭使相特建此職内詔非曽任宰相不除觀文殿大學士資政殿大學士資政殿學士端明殿學士翰林侍讀侍講學士龍圖天章寳文閣學士樞宻直學士三閣待制皆為侍從清望之選並無職掌多帶職以領在内省府寺監在外藩方任使自資政以上多以授二府舊臣此宋舊官制如此文臣則兼帶勲階即自武騎尉至上柱國十二轉是也武臣則兼帶勲階憲御檢校官四色憲御自監察御史至御史大夫號為憲御檢校自國子祭酒至三公亦唐及五代舊制也而宋遵之至元豐初始命置屬詳定官制大概皆本唐六典為法稍増損之在内設尚書省置令左右僕射門下省置侍中中書省置令已上為宰相而兩令侍中不除人尚書有左右丞門下中書各有侍郎樞宻院有知樞宻院事同知樞宻院事已上為執政官尚書六部吏部一尚書二侍郎分掌四選吏部司勲考功屬焉户部一尚書二侍郎分左右曹而户部度支金部倉部屬焉禮部一尚書一侍郎禮部祠部主客膳部屬焉兵部一尚書一侍郎兵部職方駕部庫部屬焉刑部一尚書一侍郎刑部都官北部司門屬焉工部一尚書一侍郎工部屯田虞部水部屬焉每部郎官二員知州以上資序及階官朝議大夫已上為郎官餘員外唯吏部户部刑部郎官各置四員以其劇曹也左右司郎官各二員通糾六部號都司專佐宰相理省事謂之宰屬翰林學士定以二員為額久次者為承㫖御史䑓官名如舊制而除知雜事及裏行之名門下後省置左散騎常侍而不除人給事中四員起居郎一員而知諌議大夫左司諌左正言寓焉中書後省置右散騎常侍而不除人中書舍人六員起居舍人一員而右諌議大夫右司諌右正言寓焉號二省官祕書省有監少監丞郎校書郎正字而著作郎佐郎寓焉號館職罷直館院校理等員闕唯存修撰直祕閣號貼職而别領在外任使九寺太常寺宗正光祿衛尉太僕大理鴻臚司農太府有卿少卿丞簿而太常復置博士太祝奉禮協律郎大理則置寺正評事司直四監将作少府軍器置監少監丞簿都水置使者丞簿南外北外丞已上為寺監官國子監有祭酒司業丞簿太學有博士正錄以上為學官是謂職事官罷三司使副及諸主判官而其職分𨽻諸省部寺監郡牧司使名不除而不命官其職皆屬太僕寺以太師太傅太保為三師太尉司徒司空為三公皆論道之官無專領之職為宰相兼官以開府儀同三司易節度使同中書門下平章事號為使相以唐文散階換省部寺監官歸釐務本職號階官為寄祿官而食其俸以領内外任使以特進易左右僕射金紫光祿大夫易吏部尚書銀青光祿大夫易五曹尚書光祿大夫易左右丞正議大夫易列曹侍郎通議大夫易給舍太中大夫易左右諌議大夫中大夫易祕書監殿中監中散大夫易大卿監朝議大夫易少卿監朝請朝散朝奉大夫易郎中朝請朝散朝奉郎易員外郎承議郎易太常國子博士奉議郎易太常祕書殿中丞通直郎易太子中允中舍左右賛善大夫宣志郎易寺丞宣議郎易監丞承事郎易大理評事承奉郎易太常寺太祝奉禮郎承務郎易寺監主簿自承務郎至特進為寄祿官其大學士至待制其名皆存以為二府罷政省部長貳給舍諌議補外之職集賢殿脩撰直龍圖直憲閣號貼職庶僚領在外繁劇任使者帶之削去憲銜檢校官留勲十二轉自通直郎以上帶入銜此為元豐新制官名即循唐舊典職掌亦倣周禮六官之法也元豐罷三司使副神宗喜觀六典一日諭王珪等倣唐六典修改官制然唐六典以中書造命行無法式事門下審覆行有法式事尚書奉行而政柄盡歸於中書又分功奏事各有其職蔡確言於神宗不置三省長官以左僕射兼門下侍郎右僕射兼中書侍郎各主兩省事時王珪為左而確為右獨專政柄而珪不與聞除吏之事後吕正獻公乃請三省同班奏事分省治事而元祐行之其後不能易也然元豐官制以唐六典為宗名實正矣而寄祿之制混為一流無復差别當時群臣不能推原祖宗制官之意者蓋祖宗官制所以甄别流品者為至嚴宻一官凡數等曰宰執侍從之選卿列館職之選出身人之選䕃補人之選雜流之選各為一等有條不紊可謂盛矣不獨此也宋之待武臣也厚其祿而薄其禮凡貴於正任重於管軍要在横行近在承旨御帶寵在閣職設遥郡以賞勞績設使臣以别祿秩此武臣之名分也若夫三司使之職又其制之善者宋沿五代及復唐之制置三司使以緫國計應四方貢賦之入朝廷未嘗預焉一歸三司緫鹽鐵度支户部號計省使位亞執政自為計相稱省主其恩數廪祿與參樞均若除翰林承旨及資政端明學士或官至尚書或久任權三司使者方正除之若待登柄用多先預焉鹽鐵度支户部在唐五代皆專使額皇朝方各設副使以三司使緫之故號三司鹽鐵副使其度支户部亦如之位亞待制乃稱省副恩數視大卿監逐司各置判官其資序視轉運使又有三司判官子司其資序視提刑乃稱省判凡初除必任子司自子司遷鹽鐵等判官判官而後副使盖祖宗不用資淺新進人厠列於其間也祖宗舊制選除執政侍從必先歴錢榖自有三司度支副使擢起居舍人知制誥有先除權三司使而乃拜樞宻可見祖宗之意也其所掌之財驅磨財計檢察慿由悉歸磨勘司造作軍器則謂案主行土木之工𨽻修造案防河之役則河渠案行之且國家工役之費先出於三事其所用為蠧耗之大者必命三司使緫之乃可節以制度也至安石為相以周禮行新法故持冢宰掌邦計之說謂宰相當主財計遂與三司分權凡稅賦常貢征榷之利方歸三司摘山煮海坑冶𣙜貨户絶没納之財悉歸朝廷其立法與常平免役坊場河渡禁軍闕額地利之資皆號朝廷封樁又有嵗科上供之數盡運入京師别立庫以貯之三司不預焉於是祖宗處國計之良法盡失矣自元豐改官制户部尚書全無計相之權職在行朝廷之文移僅能經畧在京官吏諸軍俸祿而已以此論之三司使之職不待改官制而不受權自熈寧變更法度之時已壊矣元豐罷三司副使羣書考索後集卷四
