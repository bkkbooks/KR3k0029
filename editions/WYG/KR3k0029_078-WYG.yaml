body:
  text: 羣書考索後集卷十二宋章如愚編官制門東宫三師三少東宫三師三少三王教世子立太傅少傅以養之太傅在前少傅在後入則有保出則有師文王世子周成王㓜在襁抱太公為太師大戴禮西漢有太子太傅少傅屬官有太子門大夫庶子洗馬舍人後漢太傅禮如初不領官屬少傅悉主太子官屬魏太傅於太子不稱臣少傅稱臣晉咸寜中備六傅之職三太三少東晉置保傅而無二師景帝諱師唐三師三少官不必備惟其人無其人則闕之分紀宋朝師傅不常設仁宗升儲置三少各一人丁謂兼少師馮拯兼少傅曹利用兼少保是時實為東宫官餘多以前宰執為致仕官若太子太師太傅太保以待宰相官未至僕射者及樞宻使致仕亦随本官髙下除授太子少師少傅少保以待前執政其少師非經顧命不除若本官至尚書即除少傅丞郎給諫只除少保若因遷轉則遞進一官至太師即遷司空矣官制舊典繼照堂在開封府東真宗尹京日射堂大中祥符二年臨幸賜名㑹要資善堂在元符觀南大中祥符八年置仁宗律學之所天禧四年徙御厨以北㑹要慶寜堂英宗潜邸有閣藏御覽經籍續㑹要睿成宫元祐元年閏二月二十二日詔神宗皇帝所居東宫改為睿成宫續㑹要龍徳宫元符三年二月二十四日詔懿親宅潛邸賜名龍徳宫是為徽宗舊邸續㑹要王府官翊善宋朝太平興國四年置翊善一人分紀以常參官充續㑹要賛讀唐開成元年宰相李石奏太子有侍讀諸王亦有侍讀無降殺之禮宜改奉諸王講讀宋朝英宗治平元年諸王府置侍讀二人職畧以為太平興國中始置侍講侍讀與此不同當考徽宗政和七年張大亨奏竊見講讀之官在天子謂之侍講侍讀而在諸王府者亦有侍講侍讀官號比擬稱謂相紊詔諸王府侍讀改為賛讀侍講改為直講直講宋朝太平興國四年别置侍講以常參官充政和七年詔改侍讀為直講詳見賛讀記室宋自明帝以後皇子皇弟雖非都督亦置記室參軍梁陳王府皆有隋皇伯叔昆弟皇子是為親王府置記室參軍唐因之六典通典後唐長興四年以前襄州觀察支使魚崇逺為秦王府記室參軍事宋朝太平興國中置政和中以參軍行軍之際所稱詔除去參軍字大小教授宋朝太宗至道元年以員外郎孫蠙充皇姪皇孫教授從新號也時中書言案唐文宗朝宰臣李石奏太子有侍讀諸王亦有侍讀無降殺之禮請改為奉諸王講讀今皇姪皇孫是環衞之職以教授為名從之真宗咸平元年以朱昻兼南宅教授張蔚兼北宅教授嘉祐以来置諸宫教授立講書課試規罰之法此事見紹興五年錢觀復奏疏中興㑹要英宗治平元年教授更不兼官以兩處供職有所廢闕㑹要時宗室本支之盛自率府副率以上八百餘人而教授之官六員而已因詔増置教授官凡皇族年三十以上者百十三人置講書四員年十五以上者三百九人増置教授五員年十四以下者别置小學教授十二員并舊六員為二十七員以分教之大學京朝官充小學選人充四年詔今後諸宫院大小學教授有缺令國子監與學士院舍人院輪舉熈寜元年小學教授亦輪京朝官元祐三年詔諸宫學教授闕選所舉學官及可為師表可備講讀科不足則三省選陞朝官有出身年四十以上者充崇寜三年睦親宅周王宫廣親宅各大學小學教授一員廣親北睦親西及周王宫大學兼領小學各二員大小學兼領始于此六院登聞檢院宋文帝元嘉九年魏主詔闕左懸登聞鼓以逹寃人通典唐大厯十四年詔天下寃滯於朝堂受詞推决尚未盡者聽撾登聞鼓通典宋朝雍熈元年改匭為檢東延恩曰崇仁南招諫曰思諫西申寃曰申明北通𤣥曰招賢七月改匭院為登聞仍依舊諫官一員判院㑹要景徳四年改為登聞檢院命樞宻直學士張詠判院仍差内品監門不得監預公事𨽻諫議大夫掌受文武官及士民章奏表疏凡言朝政得失公私利害軍期機宻陳乞恩賞理雪寃濫及竒方異術皆受以通達凡進狀者先鼓院若為所抑則詣檢院外有理檢使今不置始於淳化三年置理檢院於乾元門之西北廊以知制誥錢若水領之復唐制也至道三年廢天聖七年上因讀唐史見匭函逹下民寃枉之事乃謂左右曰天下九州之大豈無寃枉之人若至京師檢院鼓院理雪此必是州縣官吏提㸃刑獄轉運使不能理雪又若不為申理則赤子無告矣乃置匭函仍専命御史中丞為理檢使分紀㑹要中興之初因舊制置局于闕門之前舊在宣徳門外仗𨽻門下省建炎三年専𨽻諫院中興㑹要登聞鼔院國初曰鼓司以内臣掌之鼓在宣徳門南街西廊至道三年命太子中舍王濟勾當鼓司用朝臣勾當自此始鼓司舊止内品許懐逺與殿直程峻二員勾當至是省峻而命濟始用朝臣也㑹要景徳四年詔改為登聞鼓院命知制誥周起直史舘同判仍差内品監門不得闗領公事㑹要掌諸上封受而進之以逹萬人之情㑹要𨽻司諫正言續㑹要凡文武臣僚閣門無例通逹文字者並先經登聞鼓院進狀未經鼓院者檢院不得收接分紀建炎元年因舊制置局于闕門之前髙宗即位於南京召李綱為宰相綱奏曰人主莫大於兼聽廣視使下情得以上達故舜明四目逹四聰而天下治今艱難之際四方休戚利害日欲上聞而士民之願効其智慮者尤多陛下即大位已踰月而檢鼓院猶未置恐非所以通下情而急先務也遂置登聞檢院鼓院於行在便門外進退志三年専𨽻諫院進奏院唐藩鎮皆置邸京師以大將主之謂之上都留後大厯十二年改為上都知進奏院官五代以来支郡不𨽻藩鎮補人為者聽自置邸𨽻藩鎮者兼掌焉宋初縁舊制皆本州鎮補人為進奏官其軍監場務轉運司則差知後官或副知掌之逐州就京師各置進奏院㑹要太平興國八年諸州罷知後之名簡知後官得李楚等百五十人並充進奏官命供奉官張文粲提轄諸道進奏院周編題監官以京朝官及三班使臣充掌受詔勅及諸司符牒辨其州府軍監以頒下之并受天下章奏案牘狀牒以奏御及分授諸司續㑹要中興以来𨽻門下後省給事中㸃檢乾道九年依舊𨽻後省合傳報事令後省録付報行中興㑹要孝宗㑹要又題名云宋興盡罷節度使權太平興國中因何保樞請以鈐轄諸道扁院額而摹印章率用名流糧料院宋初承舊制以三司大將軍為都糧料使自開寳六年以著作佐郎陸光範充在京都糧料院使改用京官自此始太平興國五年分糧料諸司馬軍歩軍為三院八年以馬歩軍合為一院雍熈四年命供奉官陳處誨勾當諸司糧料供奉官曽祚勾當馬歩軍糧料自後復分馬歩軍為兩院或以諸司使副分主之端拱二年復以京朝官主之並宋朝㑹要元豐末併馬軍歩軍為諸軍與諸司為二院中興百官題名𨽻太府寺掌以法式頒廪禄凡文武百官諸司諸軍俸料以券準給四朝志中興以来行在有諸軍諸司糧料院鎮江建康有分差諸軍糧料院鄂州有分差户部糧料院四川總所有分差户部魚闗糧料院分差利州户部糧料院並中興孝宗㑹要審計院宋初以三司使總邦計司各有院以乗中外泉榖出入之政盖㑹計之府也然案牘叢委典者不能徧察而奸容焉淳化三年始用户部使樊知古奏剔其冗籍復别為院置官顓領之以聽稍食之要其置院之初特掌騎兵徒兵給受之數猶未及諸司也元豐三年合歩騎兩院為一遂以其一主諸司自宫禁朝廷下至斗食佐史凡賦禄者以式法審其名數而稽其辭名者唯郊賜給已乃審禄有疑予則詔以法凡四方之計籍上于大農則逆其㑹凡有司議調度㑹賦出則諏焉設員二曰左右聽分案六史八人題名舊為諸軍諸司専勾司建炎元年避髙宗御諱改諸軍諸司審計司官誥院宋初於右掖門置院四司誥身案並集于此以備中書除改本司郎官各主其事淳化五年始専置官司於省内凡官誥各以本司誥身印印之文臣用吏部武臣用兵部王公命婦用司封加勲用司勲掌文武官將校誥身及封贈以朝官一人主判知制誥一人提舉㑹要元豐五年奉行官制文武官誥身屬吏部審官屬兵部封贈及内外命婦等誥身屬司封加勲并將校等屬司勲官誥院四部誥身案及吏人随事𨽻本部七年并司封司勲誥身案入吏部預書庫收掌崇寜四年吏部専置造官誥局尋罷大觀復置尋改為官誥院仍𨽻左右司三年復罷歸吏部政和三年依舊置官誥院差官一員主管少府監鑄印記以吏部製造誥身案記為文中興以来因仍不改四轄𣙜貨務都茶場𣙜貨務掌折博斛斗金帛之屬四朝志以朝官諸司使副内侍二人監太平興國中以先平嶺南及交趾諸國入貢通闗市議於京師置𣙜易院大中祥符中併入𣙜貨務會要建炎中興又創都茶場給賣茶引随行在所於𣙜貨務置場雖分兩司而提轄監官並通銜管幹建炎四年詔𣙜貨務都茶場依舊𨽻左右司其提領措置並罷其都茶場仍令提轄𣙜貨務官兼行提轄尋徙越州一務場於建康又併真州一務場歸建康紹興五年詔建康鎮江兩務場只是給賣鈔引三十二年詔三省今後選差文臣充監官更不差武臣乾道六年詔依舊通差武臣中興會要孝宗㑹要先是課入不立額惟視舊嵗為等差是嵗始昈分有定數嵗總為錢二百四十萬萬行都受藏之所為數八十萬萬于建康者一百二十萬萬于鎮江者四十萬萬題名雜買務雜賣場雜買務舊曰市買司太平興國四年改至道中廢咸平中復置以京朝及三班内侍三人監掌和市百物凡宫禁官物所需以時供納雜賣務景徳四年置掌受内外幣餘之物計直以侍出貨或準折支用以内侍及三班二人監後亦差文武朝官以四朝志㑹要纂紹興六年詔雜買務雜賣場置提轄官一員中興㑹要左蔵庫掌受四方財賦之入以待邦國之經費其原盖起於周職内主賦入職嵗主賦出而邦布之入出則外府又主之皆其職也晉始置左右蔵令唐於左右蔵分建東西庫以太府少卿知出納於左長慶門之東宋初左蔵止一庫置使領焉題名太平興國二年分為二庫淳化三年分置左右蔵各二庫四年廢右併入左政和六年脩建新庫以東西庫為名以㑹要續㑹要纂中興因仍東西庫各以文臣監武臣同監其東幣帛絁紳之屬在焉其西金銀泉劵絲纊之屬在焉紹興二十七年詔户部於轄下丞簿内選一員兼充左蔵庫提轄官此提轄所由始孝宗即位詔將御前樁管激賞庫撥歸左蔵庫以左蔵南庫為名専一樁管應副軍期支遣於是有東西南三庫以中興㑹要孝宗㑹要修尋罷南庫大抵國家用度多靡於贍兵西蜀湖廣江淮之賦類歸四總領所以餉諸屯其送京者殆亡㡬唯閩浙悉輸焉東西庫嵗入以端計者率百四十萬以緍計者率二千萬給遣稱是而大軍居十之七宫禁百司禄賜裁三之間有非泛浩繁之費則請于朝往往出内帑封樁以補所缺監官凡五人分帑而治舊以京朝官為之今唯才是用故四選通得入題名文思院太平興國三年置掌造金銀犀玉工巧之物金彩繪素装鈿之飾以供輿輦册寳法物及凡器服之用𨽻少府監熈寜三年詔文思院兩界監官立定文臣一員武臣一員並朝廷選差其内侍勾當官並罷以四朝志㑹要纂紹興三年詔少府監併歸其文思院上下界監官從工部辟差工部言所轄文思院舊分上下界監官三員内文臣一員係京朝官上界造作金銀珠玉下界造作銅鐵竹木雜料欲依舊分為上下界從之隆興三年詔併禮物局入文思院中興孝宗㑹要三衙類三衙宋朝沿五代之制有侍衞親軍及殿前兩司盖侍衞親軍起於後唐職畧又石林燕語云侍衞親軍自梁起宣武軍乃以鎮兵因舊號置在京馬歩軍都指揮使而自將之盖於唐六軍諸衞之外則為私兵至後唐明宗遂改為侍衞親軍殿前始於周世宗顯徳元年五代㑹要世宗自髙平之戰覩其退縮慨然有懲革之意又以驍勇之士多為外諸侯所占於是詔募天下豪傑不遺草澤而俱送於闕下躬親試閱選武藝超絶及有身首者分署為殿前諸班因有散員散指揮使内殿直散者頭鐵騎控鶴之號宋初侍衞親軍置都指揮使雖都虞候亦在殿前都指揮使之上淳化元年傅潛自殿前副都指揮使遷侍衞親軍馬歩軍都虞候在殿前都指揮使載興之上咸平三年王超自殿前都指揮使遷侍衞親軍馬歩軍都虞候實録自王超罷職無復任者而侍衞司馬軍歩軍遂分為二并殿前號三衙而馬歩二軍始居殿前司之下焉職畧三司天下之兵柄皆在其權雖重而軍政號令則在樞宻院與漢周間史𢎞肇之徒為之者異矣此祖宗之㣲意非前世所及也石林燕語殿前司都指揮使副都指揮使都虞候掌殿前諸班直及歩騎諸指揮之名籍凡統制訓練畨衞戍守遷補賞罰皆總其政令入則侍衞殿陛出則扈從乗輿大禮則提㸃編排整肅禁衞鹵簿儀仗掌宿衞之事都指揮使以節度使為之而副都指揮使都虞候以刺史以上充資序淺則主管本司公事馬歩軍亦如之備則通治闕則互攝四朝志祖宗以来三帥不曽闕兩人若殿帥闕難以從下超補姚麟係殿前都虞候合陞作歩軍副都指揮使元祐七年樞宻王巖叟言政和四年詔殿前都指揮使在節度之上殿前副都指揮使在正任承宣使之上殿前都虞候在正任防禦使之上四朝志宋初沿後周有殿前都㸃檢在都指揮使上太祖由此承禪後不置焉中興以来主管殿前司一員其屬有幹辦公事主管禁衞各二員準備差遣準備差使㸃檢㸃藥飯食各一員尋減幹辦公事一員増書寫機宜文字一員馬軍司都指揮使副都指揮使都虞候都指揮使本方鎮庫校之名自梁起宣武軍乃以其鎮兵因仍舊號置在京馬歩軍都指揮使掌馬軍諸指揮之名籍凡統制訓練畨衞戍守缺補賞罰皆總其政令侍衞扈從及大禮宿衞所掌如殿前司政和四年詔以馬軍都指揮使馬軍副都指揮使在正任觀察使之上馬軍虞候在正任防禦使之上四朝志中興以後主管侍衞馬軍司一員幹辦公事準備差遣㸃檢醫藥飯食常出戍建康歩軍司都指揮使副指揮使都虞候掌歩軍諸指揮之名籍凡統制訓練畨衞戍守遷補賞罰皆總其政令侍衞扈從及大禮宿衞如殿前司政和四年詔以歩軍都指揮使副都指揮使在正任觀察使之上都虞候在正任防禦使之上四朝志中興以来主管侍衞歩軍司一員幹辨公事準備差遣㸃檢醫藥飯食閤職知閤門事宋朝横班有内客省使崇政殿受朝而升東階侍立掌四方進奉及四夷朝貢牧伯朝覲酒饌饔餼宰相近臣禁衞將校節儀諸州進奉使賜物回詔之事引進使四方館使唐四方館以通事舍人判𨽻中書省石晉始有為卿監専判館者宋朝初以檢校官判館淳熈四年改置使名掌文武官正謝辭國忌賜香諸道月旦正至章表郊祀朝畨官貢舉人進奉使京官致仕官道釋父老陪位之事㑹要東上閤門使西上閤門使凡取禀㫖命供奉乗輿朝㑹游宴及賛導三公羣臣蕃國朝見辭謝糾彈失儀之事使副専之舍人以下但通班賛唱而已㑹要其供職于内者多用國戚世族號為華要禮均侍從政和官制横班使副之名既改為大夫而其職任則命内外官知焉職畧其後所除總名知閤門事仍兼客省四方館之職焉紹興三年詔客省四方館並𨽻臺察先是御史䑓六察所𨽻官司有因一時申明免𨽻䑓察去處至是殿中侍御史常同乞依舊制施行所貴百司庶務有所按察不敢違戾故也中興㑹要四年詔依祖宗舊制𨽻中書省不𨽻臺察中興㑹要五年詔右武大夫以上並稱知閤門事兼客省四方館事若官未至右武大夫者即稱同知同兼序在知閤門之下同上同知閤門事宋朝東西上閤門副使雖無定員然選任不及踈逺而所置常少於正使之數政和官制以左武右武郎易二閤副使而閤門事乃命横行知焉則同知之職乃昔時之所謂副使也職畧閤門宣賛舍人故事閤門無通事舍人而通事舍人沿唐制自𨽻中書省如抽赴閤門並稱閤門祗候其後直授閤門通事舍人非舊制也天禧中除閤門字政和六年改為宣賛舍人政和六年御筆閤門通事舍人名稱鄙俗可改為宣賛舍人詔㫖閤門祗候國朝舊以閤門通事舍人閤門祗候二等謂之閤職盖武臣之清選也閤門通事舍人閤門祗候二等比舘職清流為進取之基非熟於朝儀不在此選又有㸔班祗候以命世家新進及擢閤門㸃檢使臣為之而㸃檢官乃知班使之長者二年無過遂改看班政和間改通事作宣賛且不復選人才而濫處不知其數人不以為貴也官制舊典舊止三五員天禧初上與輔臣語及減吏員向敏中因進言曰太祖太宗朝閤門祗候不過三五員宣導賛謁而已今踰數百而除授未已上曰此盖相承為例當漸省之熈寜四年閤門請擇武臣子弟六人前後殿日祗應以閤門看班祗候為名候五年熟識儀數乃除閤門祗候閤門舍人乾道中孝宗初置慶元告詞云我朝重閤門之職乾道置舍人之員帶御器械帶御器械宋初以来嘗選三班以上武幹親信者佩櫜鞬御劔或以内臣為之㑹要初是職止名御帶咸平元年改為帶御器械景祐二年詔自今無得過六人慶厯元年詔遇闕員以歴邊任有功者補之舊制外任帶御器械過闕朝見不宿衞熈寜六年向寶移真定府路總管過京師特命宿直並㑹要中興因仍四箱捧日天武四廂都指揮使龍神衞四廂都指揮使四廂捧日舊曰日騎天武舊曰控鶴宋朝太平興國三年詔改控鶴曰天武雍熈四年改殿前司日騎曰集日龍衞舊曰龍㨗神衞舊曰虎㨗太平興國二年詔改龍捷曰龍衛虎捷曰神衛皆以美名易禁軍之舊號也上四軍殿前司捧日天武馬軍司龍衞歩虎司神衞謂之上四軍各有左右廂廂各三軍東齋記事環衛宫環衞官宋朝六軍諸衞有左右金吾衞上將軍秦曰中尉漢武改曰執金吾隋曰侯衞所領軍事名佽飛唐龍朔改左右金吾衞正三品掌宫中及禁城晝夜廵警之法以執禦非違漢官宰尹曰吾禦也常執金革以禦非常緹騎二百人輿馬導從充滿於路世祖歎曰仕宦當作執金吾也左右衞上將軍晉武帝分中衞將軍為左右衞各大將軍一人銀章青綬隋改置左右衞為左右翊衞唐武徳中更曰左右衞府龍朔中省府字左右驍衞將軍漢武以李廣為驍騎將軍後省之光武改屯騎為驍騎晉文立晉䑓以為宿衞官至隋煬帝改左右備身為左右驍衞所領名豹騎唐置驍騎府龍朔去府字光宅改左右武威衞神龍復舊武舊衞上將軍魏武為丞相有武衞營隋探其名置左右武衞府有大將軍光宅改左右鷹揚衞龍朔復舊屯衞上將軍隋煬帝置左右屯衞唐龍朔改為威衞光宅改為左右豹韜衞領軍衞上將軍魏武為丞相始置中領軍魏文又置領軍晉因之品第三金章紫綬宋齊領軍掌内禁兵唐别置領軍衞大將軍龍朔改威衞咸亨復舊監門衞上將軍漢魏以来城門校尉之職也隋置左右監門府將軍煬帝改府字為衞唐置大將軍龍朔改為監衞千牛衞上將軍後魏有千牛衞備身本掌乗輿御刀盖取庖丁為恵文君觧數十牛而刃若發硎此刀可以備身因以名官隋左右府領千牛備身唐改為左右千牛府龍朔改為奉宸衞神龍改為千牛衛諸衞大將軍諸衞將軍並為環衞官無定員皆命宗室為之乃武臣之贈典大將軍以下又為武臣責降散官政和中改武臣官制而環衞如故盖雖有四十八階别無所領故也四朝志靖康元年用御史中丞陳過庭言請遵藝祖開寳初罷諸節度使歸環衞故事於是節度使錢景臻等並為左右金吾衞上將軍四朝志又崇寜四年傚古脩立三衞官有郎一員中郎為之二文武各一員博士二主簿一親衞府有郎有中郎以后妃嬪御之家有服親及翰林學士并管庫正任觀察使以上子孫充勲衞府有郎有中郎以勲臣之世賢徳之後有服親大中大夫以上及正任團練使遥郡觀察使以上子孫充翊衞府有郎有中郎以卿監正任刺史遥郡團練使以上並以親兄弟子孫試充三衞郎治其府之事率屬日直于殿陛長在左立起居郎之前二分左右文東武西立都承㫖之後親衞立於殿上勲衞立於朶殿翊衞立於兩階衞士之前中興久不除授孝宗隆興詔學士院討論環衞官制度欲參酌祖宗時及唐太宗制度詔曰朕惟祖宗選用將帥以崇武節外建方鎮内列環尹品式備具近来環衞久不除授非所以儲材而均任也可依舊制應以才畧聞堪任將帥及久勤軍事暫歸休佚之人並為環衞官更不換授並令兼領如節度使則領左右金吾衞上將軍承宣使則領左右衞上將軍在内則兼帶在外則不帶以十員為額朝參侍殿並依御帶體例宗室不在此制仍不差戚里及非戰功人除改差主兵官合不領環衞如皇城司帶御器械之類仍許兼領羣書考索後集卷十二
