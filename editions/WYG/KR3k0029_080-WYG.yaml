body:
  text: 羣書考索後集卷十四宋章如愚編官制門太守郡守秦官掌理其郡秩二千石秦滅諸侯以其地為郡置守丞尉各一人守治民丞佐之尉典兵漢景帝中元二年更名太守王莽改曰大尹中興仍西漢三國及南朝因之晉郡守皆加將軍後魏初郡置三太守北齊制郡為上中下三等後周郡太守各以户多少定品命隋因北齊九等之制開皇三年罷天下諸郡以州統縣大業三年又改為郡唐武徳元年改為州刺史加號持節天寶元年改為郡太守五代仍刺史之號宋朝藝祖開基召諸鎮㑹于京都賜第以留之分命朝臣出守列郡號權知軍州事軍謂兵州謂民政焉其後文武官參為知州軍事二品以上及帶中書樞宻院宣徽使職事稱判官太守掌總理郡政宣布條教導民以善而糾其姦慝嵗時勸課農桑獄訟錢榖之事皆總焉建炎元年詔河北京東西路除帥臣外舊差文臣知州去處許通差武臣一次詔要郡帶本路兵馬鈐轄次帶兵馬都監紹興三年罷五年令郡守除授罷任並上殿六年詔控扼去處並以三年為任九年罷並帶提舉學事乾道二年令不任守臣不為郎淳熈中令郡守罷帶學事漢教化太守在蜀則有文翁興學潁川則有黄覇力行教化淮陽則有汲黯卧治董仲舒䇿曰今之郡守縣令民之師帥所以使承流而宣化宣帝詔曰太守吏民之本又曰與我共治者其惟良二千石乎孟舒為雲中守號為長吏後漢魏颯遷桂陽太守下車脩庠序之教任延光武時為九真太守教之耕桑禮配劉寵為㑹稽太守簡除煩苛郡中大化趙廣漢為潁川太守郡中震慄尹翁歸為東海大守治豪猾而大治李廣為上谷太守才氣天下無雙後漢范曄為天水太守政嚴猛道不拾遺黄昌為蜀郡太守宿惡大奸皆奔之他境唐韓愈潮州刺史鰐魚徙六十里開元以後四十年間治廣清節者三人宋璟李朝隐盧奐杜南同元結舂陵行序當天下分憂之地得結軰十數人落落然參錯天下為邦伯萬物吐氣天下安矣賈厚順為洛州刺史百姓立碑袁滋為華州刺史拜將軍耆老至遮道不得進狄仁傑寜州刺史撫和戎夏人得歡心賜勞勸勉漢宣嘗拜刺史輙召見親問考其所行以質其言王嘉上言云孝文時吏居官者或長子孫二千石長吏亦安官樂職其後或數月而遷送故迎新居官者茍安求全二千石益輕吏民慢之成帝下詔二千石有急取辨尊重事難危乃能使下唐太宗嘗曰朕思治人之本莫重刺史故録姓名於屏風卧興對之得不肖牧輒疏下之以擬廢置始都督刺史皆臨軒䇿受後不復冊受命日便殿賜衣物乃遣元宗時已辭詣側門候進㫖所以光寵守臣以責其功開元中詔三省侍郎缺擇嘗任刺史者宣宗大中元年詔古者郎官出宰公卿治郡所以重親民之官馬周言古者郡守縣令皆選賢徳欲有所用必先試以臨人或由二千石髙第入為宰相今獨重内官縣令刺史頗輕其選又刺史多武夫勲臣或京官不稱職始出補外張九齡言古者刺史入為三公郎官出宰百里今朝廷士入而不出其於計私甚其自得也臣愚謂治之本莫若重守令𤣥宗嘗選諸司長官有聲望者一十人為刺史命宰相御史餞於洛濵宋朝太平興國九年選祕書丞楊延慶等十餘人分知諸州太宗謂宰相曰刺史之任最為親民非其人則民受其弊皇祐三年楊景宗請為一州帝曰景宗章恵太后之弟然貪戾之性老而益甚今與一州則一州之民受其弊卒不與沿邊太守國朝沿邊州郡或當一道衝要者並兼兵馬鈴轄或帶沿邊安邊沿邊溪洞廵察餘州則否通判秦置郡丞以佐守在邊為長吏掌兵馬漢因之歴代相仍不廢而後改為别駕宋懲藩鎮之弊置諸州通判建隆四年詔知府公事並須長吏通判連書方許行下時大郡二員餘郡一員州不及萬户不置縣令周官有縣正各掌其縣之政令而賞罰之春秋時縣大而郡小左傳云上大夫受縣下大夫受郡千里百縣縣有四郡縣邑之長曰宰曰尹曰公曰大夫其職一也戰國郡大而縣小甘茂曰宜陽大縣其實郡也漢縣令長皆秦官掌治其縣萬户以上為令減萬户為長侯國為相秩亦如之凡縣道國邑千五百八十七列侯食縣曰國皇太后公主所食曰邑有蠻夷曰道後漢令掌治民勸善罰惡理獄訟平稅賦秋冬上計於所屬郡國晉制大縣令有治績官報以大郡若不經宰縣不得入為䑓郎自晉宋以後令長國相皆如漢制北齊制為縣上中下三等唐制縣有六等之差凡一千五百七十三縣令各一人導揚風化撫字黎民察寃屈親獄訟五代任官凡齷齪無能者始注為縣令故天下之邑率皆不治甚者誅求刻剥猥瑣萬状宋朝建隆元年應天下諸縣除赤畿外有望緊上中下四千户為望三千以上為緊二千户以上為上千户以上為中不滿千户為中下五百户以下為下戍兵則兼攝兵馬都監或監押三年始以朝臣為知縣其間復參用京官或幕職為之朝臣知縣自大理正奚璵等始淳化四年詔京朝京官未歴州縣不得任知州通判慶厯間詔天下知縣非鞫獄毋得差出政和二年詔縣令以十二事勸課農桑自政和以来太平盛時人皆重内輕外士大夫皆輕縣令之選吏部兩選不注者甚多然後議所以増重激勸之法宣和五年縣令止差六十以下人從王敏之請靖康初詔請改官必為縣紹興七年詔將寺監丞簿等任滿已改官人未歴民事者各與堂除知縣一次九年詔吏部自後縣令差文臣乾道元年詔京官知縣以二年為任雖屢有更革卒以三年為任二年御筆今後非兩任縣令不除監察御史楚令尹子文三仕為令尹無喜色三已無愠色舊令尹之政必以告新令尹子㳺為武城宰孔子聞絃歌之聲曰割雞焉用牛刀子游曰昔聞諸夫子曰君子學道則愛人小人學道則易使鄭子皮欲尹何為邑子産曰少未知可否子皮曰使往學焉子産曰大官大邑身之所庇也僑聞學而後入政未聞以政學者也漢薛宣為彭城令宣曰吏道以法令為師可聞而知及能與不能自有資才何可學也董宣為洛陽令摶擊豪强後漢卓茂為宻令視人如子人不忍欺道不拾遺魯㳟為中牟令専以徳恵為治不任刑罰劉昆教授江陵光武除為江陵令連年火災昆能降雨止風前漢卜式為中郎將曰治民如牧羊惡者輒去毋令敗羣上竒其言試使治民拜緱氏令三國龐統字士元守耒陽令在縣不治魯肅遺先主書曰龎士元非百里才使之處治中别駕方始展其驥足天寶九載詔親人之官莫過縣令比来選司取人必思書判古来良宰豈必文人自今以後以政績為最大歴中淫雨害稼渭南令劉藻曲附度支韓滉言所部無損代宗以為水旱咸均不宜渭南獨免縣令職在恤人不損猶損損而不聞豈有恤人之意乃貶劉藻貞元四年上召京兆府請縣令對于延英殿訪以民之疾苦翌旦減免之𤣥宗新除縣令宣政殿親問治人之䇿擢其髙第者開元中郎官缺擇嘗任縣令者又縣令數中辭赴職帝自制令長新誡以諭之仍於廟堂賜宴以遣之其憂民擇吏如此宋朝尹洙知河南伊陽縣與穆修以古文革楊劉文體之弊天下翕然宗之嘉祐中王允規知河清縣軍民歌詠有十竒㓂準知巴東縣毎朝會賦役不出符移惟其姓名掲縣門民莫敢後嘗手植雙栢於縣庭至今民以比甘棠謂大萊公栢京畿令宋朝以通判資序人充縣丞國初不置天聖中因蘇耆請開封兩縣始各置丞一員在簿尉之上仍於有出身幕職令録内人充元祐中因給納常平免役置丞並行省罷事務難劇處不罷主簿自漢以来皆令長自調至隋始置之宋朝開寶三年詔諸縣千户以上置令簿尉四百户以上置令尉令知主簿事四百户以下置簿尉主簿兼知縣事薦舉類舜命禹為司徒遜于稷契臯陶垂作共工遜于殳斨伯與益作朕虞遜于朱虎熊羆命伯夷為秩宗遜于䕫龍四岳薦鯀當時不以為疑春秋時晉侯問祈奚嗣曰午也可君子曰立其子不為比祈奚為中尉羊舌職佐之羊舌職死舉其子赤君子曰舉其偏不為黨又晉侯問咎犯誰可為西河守曰虞子羔羔謝犯曰薦公也不以私事害公議趙簡子曰趙簡王問解狐孰可守上黨曰荆伯栁王曰非子之讐乎曰舉賢不避讐晉悼公稱伯六卿皆取民譽祈奚薦其子韓無忌薦其弟范匄欒書魏絳之徒聞其人之賢則上之昭頃以後伯美襄魏獻子為政用魏戊等十人為大夫而謂成鱄曰吾與戊縣人其以我為黨乎夫存形畏謗不見於六卿輔晉之時而在於六卿分晉之後為公道之不行也漢初宰相列侯薦士蕭何薦韓信魏無知薦陳平灌嬰薦張孟不特此也廷尉呉公薦賈誼召為博士文翁以蜀郡太守察舉至蜀郡太守武帝初年除吏之權盡出宰相又有繆舉之罰竇嬰田蚡推轂趙綰為御史大夫王臧為郎中令薦人或起家至二千石權移主上隂欲殺其權恐不知其人可用遂置侍中等為加官除宰相外皆帶之朝夕在側以薦導人物嚴助侍中則薦朱買臣衞青侍中則薦主父偃楊得意侍中則薦司馬相如而丞相不得薦舉是以公孫𢎞開東閣不曽進一士石慶欲治一近臣反受其過鄭當時推轂薦士衞青以薦賢人主之柄不肯薦舉末年綉衣薦人尤峻有自縣令至二千石如主所是也宣帝而下韓増舉馮奉世使大宛宣帝謂所舉得人張安世有郎功髙不調不肯出一言必待人主自明谷永薦薛宣為御史大夫何武薦兩龔兩唐又薦鮑宣為諫大夫光武詔自三公至州牧嵗舉茂才孝亷郡國守相未滿嵗不得察舉以其未久不周知也杜詩薦伏湛郎顗薦黄瓊虞詡薦左雄左雄薦周舉杜喬薦荀淑晉武帝時羊祐所進達之人皆不知所由常曰拜官公朝謝恩私門吾所不取也且薦杜預自代其後權浸下移勢位之家更相薦記有如互市中興謝安舉兄子謝𤣥為將不負所舉唐太宗謂房𤣥齡曰公為僕射當助朕訪賢才比聞閱牒訟數百豈暇求人哉武后時狄仁傑為相婁師徳實薦之仁傑不知仁傑薦張柬之又薦桓彦範敬暉姚崇等數十人率為名臣或謂仁傑曰天下桃李悉在公門曰薦賢為國非為私也肅宗謂崔祐甫曰人言卿擬官多親故曰夫薦擬者必悉其才行如不聞知何由得賢文宗謂宰相薦人勿問親踈朕聞竇易直為相未嘗用親故若果才避嫌而棄之亦不為公裴度薦李徳裕姚崇薦魏知古裴垍為相有故人求京兆判司曰才不稱不敢以私傷至公他日盲宰相不妨得之垍則不可陸贄請令臺省官各舉其屬而徳宗疑諸司所舉皆親故受賂者贄諫曰陛下擇相亦不出臺省長官之中豈有為長官而不能舉一二屬吏居宰相則可擇千百具僚其要在於精擇長史贄之説盡矣宋朝祖宗時以考第資歴無過犯有勞績者逓遷謂之循資若磨勘應格自令録以上及六考皆改著作佐郎無出身及七考改大理寺丞今宣教郎其有功賞循資者減一等若未該磨勘循資至支使今文林郎及八考者有出身人改太子中允餘改太子中舍今通直郎其四色判官今承直郎及九考以上者改祕書丞今奉議郎十二考以上改太常博士今承議郎無出身人止殿中丞亦奉議郎仁宗始以及第改官者多遂詔用帥守監司通判保薦以嵗改百員為額元豐稍鑴改官之格故觀察判官以上改奉議郎無出身人改通直郎掌書記改通直郎支使以下一例改宣徳郎續通鑑節要祖宗之初上自侍從大臣下至常參官又下至部使者與郡守又下而至監當知縣之為陞朝官者皆得以薦舉其路至廣也有嵗舉有御禮舉有一人而嵗舉數十人者有不限之以數者其為員至寛也侍從舉四員而本道轉運使副所舉或一二員皆得以引對磨勘其為法至畧也不至有繆舉之患自天禧罷監當朝臣舉官之制至寳元康定又罷常參薦舉治平御史知雜以上又罷薦舉至熈寜又併式郡舉官罷之而路始狹矣仁宗康定雖詔定内外臣僚薦舉之數而諸路薦舉屬之監司其不限之以數猶故也其後皇祐懲張易濫舉之弊又併部使者舉員差定之而員姁拘矣増四考為六考増舉者四人為五人所共益宻矣此薦舉之因革也仁宗皇帝尤以選人遷官為重引對之際予奪抑揚不専於有司之法陳琪用薦者十餘人知其為龎籍之婿則抑之胡宗堯用薦者十餘人知其為胡宿之子則抑之李師錫用薦者三十餘人知其為王徳用之姻則抑之且曰朕設保舉以寵天下士今但勢要者得孤寒之士何由而進又吕文靖公薦其子夷簡以為有宰相之才後果為名宦宋維翰薦种放為諫官嘗出十輔之書以禆聖政此薦舉之公也富弼論西事疏曰有才徳者然後知人之才徳無者見必増忌歐陽公言三弊亦曰守亷謹者各主清幹之人贓汚者舉貪濁之人狥私者舉請求之人乾徳中嘗詔陶榖等四十五人舉郡佐矣太平興國中又嘗詔李昉等十二人舉二司判官及轉運使矣至邢昺等四人舉學官則景徳之詔也張齊賢五人舉御史則祥符之詔也張知白等十二人舉監司則天禧之詔也夫居近列者非不多而被詔舉者有數此祖宗用人之法也側聞太宗語大臣曰若不擇舉主何由得賢真宗語近臣曰不若行擇舉主以類求人此擇舉之法也銓選類成周之時鄉大夫鄉老舉賢能而賔其禮司徒教三物而興諸學司馬辨官材以定其論太宰詔廢置而持其柄内史専與奪而式於中司士掌其版而知其數論定然後官之任官然後爵之位定然後禄之盖擇才如此之詳漢至成帝建始初置常侍曹尚書一人主公卿又有二千石曹尚書一人掌郡國二千石盖選曹之所起也漢末立資格而資格甚嚴郡縣守相之髙第者然後為二千石二千石之有治行者然後為九卿九卿之稱職者然後為御史大夫至於丞相則非御史大夫之任職者不遷也此其大者之有常格也博士髙第者為尚書次者為御史否則以次補諸太學博士弟子二嵗通一藝以上補文學掌故其髙第為郎中文事掌故郡屬備員此其小者之有常格也諸官初除必先試守試守一嵗然後為真則稱號有常格矣有市籍者不得為官入財為官者不得名職則流品有常格矣後漢光武改常侍曹尚書為吏部尚書其時選舉於郡國屬功曹於公府屬東西曹於天臺屬史曹尚書亦曰選部而尚書令總之其所進用加嵗月先後之次其後所舉皆特拜不復簡試謗議漸生安帝永嘉中左雄議改察舉之制限年四十以上儒者試經學文吏試章奏如有顔回子竒之類不拘年齒時徐淑年未及而舉孝亷乃以不拘年為對雄詰之曰回聞一知十孝亷聞一知㡬淑無以對乃遣還郡雄在尚書十餘年察選清平各得其人後黄瓊以雄孝亷之選専用儒學文吏於取士之義猶為有違乃増為四科孝弟及能從政三國魏文帝時陳羣立九品官人之法州郡皆置中正以定其選中正以州郡之賢者為之有言行脩著或以五升四以六升五道義虧則或自五退六自六退七是以吏部不能審定故委中正銓第及其弊也惟知問悶不辨賢愚故劉毅云下品無髙門上品無寒士南北朝至于隋選舉之法雖互有損益而九品及中正至開元才罷其武選俾䕶軍主之又以崔琰毛玠為丞相掾並典選舉所用皆清正之士吏潔於上俗成於下晉依魏氏九品之制内官吏部尚書司徒左長史外官有大中正州郡有小中正皆掌舉選其後中正任久愛憎由已而九品之法漸弊劉毅上疏曰九品有八損而官才有三難請因用土斷復鄉舉里選之法及劉頌為吏部尚書復建九班之制令百官在職少遷時賈郭専朝任者務速故不行山濤居選部甄别人物各為題目時號山公啟事宋文帝限年三十而任郡縣以六周而代刺史十餘年及至武帝仕者不拘老幼守宰以三周是時謝莊請令大臣各舉所知以付尚書銓用帝不欲重權在下乃分吏部置兩尚書以散其權梁制九流常選州置州重郡置郡崇鄉置鄉豪各一人専典捜薦無膏梁寒素之隔後復置中正陳選無定時随缺則補官後魏時中正所銓但在門第吏部彛倫仍不才舉文帝求理内官通班以上自考覈以為黜陟其後員少應調者多選曹無以處之崔亮乃奏不問賢愚以停觧日月為斷魏之失才從亮始也後周以吏部長選蘇綽為六條欲罷門資之制隋制尚書舉其大者侍郎銓其小者則六品以下官吏咸吏部所掌自是海内一命以上之官州郡無復辟署矣後魏北齊以来州郡僚佐以多為吏部所授隋一切歸在省司劉炫曰小大之官悉由吏部職介之迹皆屬考功所以繁也省官不如清心唐制諸王及職事正三品以上若文武散官三品以上及都督都䕶上州刺史之在京師者冊受五品以上皆制授六品以下守五品以上及視五品以上皆勅授凡制勅授及冊拜皆宰司進擬白六品以下㫖受悉由尚書文官屬吏部武官屬兵部謂之銓選文武選事各分為三銓尚書典其一侍郎分其二凡選始於孟冬終於季春武徳以十一月起選至春則閒停至貞觀劉休甫奏四時總選随到注擬其擇有四事曰身言書判四事可取則先乎徳徳均以才才均以勞六品以降計資量勞而擬官五品以上不試列名上中書門下聽制勅凡選以類為甲先簡僕射乃上門下省給事中讀之黄門侍郎省之侍中審之不審者皆得駮下既審然後上主者受㫖而奉行焉給告身武選亦然其黔中嶺南閩中之官不由吏部謂之南選髙宗麟徳以後選人漸多裴行儉設長名姓歴榜引銓注之法開元中裴光庭以選人無常限復作循資格賢愚一貫必合乎格者乃得銓授久淹者皆荷之謂之聖書而掄才之方失矣武徳初官不充員吏曹移牒州府課人應集至則授官無退遣後求者漸多始有沙汰太宗詔杜如晦曰吏部取人舉言辭不詳才行將依漢法令本州辟召事寢不行貞觀十八年髙季輔獨知選事太宗賜金鏡一面以表其清鑒焉永徽中以来官紀以紊武后朝以選人多不實令糊名暗考以定第及中宗韋氏太平公主用事神龍後除官不由宰司特勅斜封便拜凡數千員内外謂之三無坐處言宰相御史及員外郎也韋氏敗始以宋璟為吏部尚書李義盧從愿為侍郎姚元之為兵部尚書陸象先盧懐慎為侍郎悉奏罷斜封官量闕留人雖資髙考深非才實者不取初尚書銓掌七品以上選侍郎銓掌八品以下選至是通其品而掌焉未㡬璟元之等罷崔涖薛昭希太平公主意上言罷斜封官人失其所而怨積於下必有非常之變乃下詔盡復斜封别勅官𤣥宗以選試不公乃置十銓試人明年復故天寳中楊國忠以吏部尚書三銓注官皆自専之與左相唱注以誇敏速由是不經門下省審侍郎不得參議肅代以後銓注無可道者徳宗時沈既濟有四太之説入仕之門太多世胄之家太優利禄之資太厚督責之令太薄顯慶中劉祥道知選事上疏陳六事㑹杜正倫亦言入流者衆乃詔與祥道參議而執政憚改作遂格其議矣以通鑑唐書修宋朝太祖承五季之弊文武常參官非有勞者未嘗進秩考滿叙遷之法稍不復舉當是時京朝𨽻中書三班屬樞宻主管差遣磨勘之法歸之大臣則是大臣實預黜陟之權建隆詔吏部判銓選人並試判三道為上中下三等太平興國中定十四等惟除下等餘三等皆注官太宗淳化建審官院為黜陟之地量才較績而引對不廢其無功可録者至有供奉官四十年不遷至道中官缺至千七百人而有司請併合吏員三而省一以實空官一切超折就擬尚不充也承平既久官塗大啟天禧之間遂有假員之法取審官虚闕而躐授吏部待擬之人而銓品浸革矣祥符中黄綬之吏未得選者遂至三千始預用一嵗員闕至仁宗時吏在仕版者無慮八九千人而調補者復不在焉預用之闕且渉三嵗議者以為流爛之極是時范仲淹陳事有言曰今不聞勞逸能否一切以嵗月叙遷非考績之法而蘇紳亦曰今不問才能之長短惟以資歴深淺為先後欲賢不肖有别不可得也今吏部之注擬者何也始入官而得簿尉自簿尉而得令丞推而上之至於幕職由是法也又上而至於守貳由是法也其宜得者則曰應格其不宜得者則曰不應格羣書考索後集卷十四
