body:
  text: 羣書考索卷三十七宋章如愚撰禮門鄉飲酒類鄉飲禮鄉飲酒禮主人朝服就先生而謀賓介賓席牖前南面主人席阼階上西面介席西階上東面衆賓之席皆不屬焉樽兩壺於房戸間𤣥酒在西設洗於阼階東南主人與賓三揖至於階三讓主人升賓升主人阼階上當楣北面再拜賓西階上當楣北面答拜主人坐取爵實之賓席前西北面獻賓西階上拜主人少退賓進受爵復位主人阼階上拜送爵賓少退薦脯醢五挺賓升席自西方乃設折俎賓坐左執爵祭脯醢奠爵於薦西興賓實爵主人之席前東南面酢主人主人阼階上拜賓少退主人進受爵復位賓西階上拜送爵薦脯醢主人升席自北方設折俎祭如賓禮自席前適阼階上北面坐卒爵興奠爵遂拜執爵興賓西階上答拜主人坐奠爵於席端主人實觶酬阼階上北面坐奠觶遂拜執觶興賓西階上答拜坐祭遂飲主人實觶賓之席前北面西階上主人進坐奠觶於薦西主人揖降立於階西當西序東面主人以介揖讓升拜如賓禮主人坐取爵於序端主人少退介進北面受爵復位主人介右北面拜送爵少退主人立於西階東薦脯醢介升席自北方設折俎祭如賓禮自南方降席北面坐卒爵興坐奠爵遂拜執爵興主人介右答拜介授主人爵於兩楹之間介西階上立主人實爵以酢於西階上介右坐奠爵遂拜執爵興介答拜主人復階揖降介降立於賓南主人西面三拜衆賓衆賓皆答一拜主人揖升坐取爵於西楹下實爵獻衆賓衆賓之長升拜受者三人主人拜送坐祭立飲授主人爵降復位衆賓獻則不拜受爵坐祭立飲每人一獻則薦諸其席主人以爵降奠於篚揖讓升即席設席於堂廉東上樂正先升立於西階東工入升自西階北面坐工歌鹿鳴四牡皇皇者華笙入堂下磬南北面立樂南陔白華華黍乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀乃合樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋工告於樂正歌備樂正告於賓司正洗觶升自西階上北面受命於主人主人曰請安於賓司正告於賓司正實觶降自西階北面坐奠觶退拱少立坐取觶不祭遂飲坐奠觶於其所退而立於觶南賓北面坐取俎於西阼階上北面酬主人主人降席立於賓東主人受觶賓拜送於主人之西主人西階上酬介介立於主人之西如賓酬主人之禮主人揖復席司正升相旅曰某子受酬受酬者降席司正退立於序端東面拜興飲皆如賓酬主人之禮司正降復位使二人舉觶於賓介司正升自西階受命於主人主人曰請坐於賓乃羞無算爵賓出奏陔主人送於門外再拜後漢永平二年郡縣行鄉飲酒於學校祀先聖先師周公孔子牲以犬晉武帝泰始六年十二月帝臨辟雍行鄉飲酒之禮詔曰禮儀之廢乆矣乃令復講隸舊典賜太常絹百匹丞博士及學生牛酒咸寧三年及惠帝元康九年復行其禮大唐貞觀六年詔曰比年豐稔閭里無事乃有墮業之人不顧家業朋遊無度酣宴是耽危身敗惡咸由於此自非澄源正本何以革兹弊俗可先錄鄉飲酒一卷頒行天下每年令州縣長官親率長幼依禮行之庶乎時識廉恥人知敬讓開元十八年宣州刺史裴耀卿上疏曰州牧縣宰所主者宣揚禮樂典册經籍所教者返古還淳上奉君親下安鄉族外州逺郡俗習未知徒聞禮樂之名不知禮樂之實竊見以鄉飲酒禮頒於天下比来惟貢舉之日畧用其儀閭里之間未通其事臣在州之日率當州所管一一與父老百姓勸遵行禮奏樂歌至白華華黍南陔由庚等章言孝子養親及物遂性之義或有泣者則人心有感不可盡誣但以州縣久絶雅聲不識古樂伏計太常具有樂器太常乆備和聲請令天下三五十大州簡有性識人於太常調習雅聲仍付笙竽琴瑟之類各三兩事令比州轉次造習每年各備禮儀准令式行稍加勸奬以示風俗宋朝淳化三年詔有司講求鄉飲酒故事將議舉行命翰林承㫖蘇易簡等依古樂章作鹿鳴南陔嘉魚崇丘關雎鵲巢之詩後不果行髙宗中興當干戈甫定之餘首詔舉行鄉飲孔穎達禮記正義云按鄭目錄云名曰鄉飲酒義者以其記鄉大夫飲賓於庠序之禮尊賢養老之義儀禮有其事此記釋其義也但此篇前後凡有四事一則三年賓賢能二則鄉大夫飲國中賢者三則州長習射飲酒四則黨正蜡祭飲酒總而言之皆謂之鄉飲酒有四事者以鄉飲酒義云鄉人士君子尊於房戸之間賓主共之也鄭氏注云鄉人鄉大夫也士州長黨正也君子謂卿大夫也卿大夫士飲國中賢者亦用此禮又云六十者坐五十者立侍亦是黨正飲酒之事下又云合諸鄉射是亦州長習射之禮鄭以此參之故知此篇兼有四事鄉則三年一飲州則一年再飲黨則一年一飲所以然者天子六鄉諸侯三鄉卿二鄉大夫一鄉各有鄉大夫而鄉有鄉學取四鄉之中致仕大夫爲父師致仕之士爲少師在於學中名爲鄉先生教於鄉中之人謂鄉學每年入學三年業成必升於君若天子鄉則升學士於天子若諸侯之鄉則升學士於諸侯凡升之必用正月於將升之先爲飲酒之禮鄉大夫與鄉先生謀事學生最賢使爲賓次者爲介又次者爲衆賓此鄉大夫爲主人與之飲酒而後升之故周禮鄉大夫職云三年則大比考其徳行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賓之故鄭云古者年七十而致仕老於鄉里大夫名曰父師士名少師而教學焉常知鄉人之賢者是以大夫就而謀之賢者以爲賓其次以爲介又其次爲衆賓而與之飲酒是亦將獻之以禮禮賓也若州一年再飲者是春秋習射因而飲之以州長爲主人也若黨一年一飲者是歳十二月因於大蜡祭而黨中於學飲酒子貢觀蜡是也亦黨正爲主人也鄭云古者年七十至國禮禮賓之也出鄭氏注儀禮鄉飲酒篇鄉飲酒之義主人拜迎賓於庠門之外入三揖而後至階三讓而後升所以致尊讓也盥洗揚觶所以致潔也拜至拜洗拜受拜送拜既所以致敬也鄭氏云庠鄉學也州黨曰序正義曰此謂卿大夫故迎賓於庠門外若州長黨正則於序門外也拜至謂賓與主人升堂之後主人於阼階之上北面再拜也拜洗謂洗爵而升賓於西階上拜受受爵也拜送者主人於阼階上拜送爵也拜既者賓飲酒盡而拜也鄉飲樂工入升歌三終主人獻之笙入三終主人獻之間歌三終合樂三終工告樂備遂出注云工謂樂正也正義云升歌三終者謂升堂歌鹿鳴四牡皇皇者華每一篇而一終也笙入三終者謂吹笙之人入於堂下奏南陔白華華黍每一篇一終也主人獻之者謂獻笙入也間歌三終者間代也謂笙歌已竟而堂上與堂下更代而作也堂上人先歌魚麗則堂下笙由庚此爲一終又堂上歌南有嘉魚則堂下笙崇丘此爲二終又堂上歌南山有臺則堂下笙由儀此三終也合樂三終者謂堂上下歌瑟及笙並作也若工歌關雎則笙吹鵲巢合之若工歌葛覃則笙吹采蘩合之若工歌卷耳則笙吹采蘋合之所引篇名出儀禮鄉飲酒篇儀禮鄉飲酒云工四人二瑟瑟先相者二人注云四人大夫制也二瑟二人鼓瑟則二人歌也相扶工也衆賓之少者爲之每工二人工瞽朦也疏云大射射侯禮諸侯禮而云六人故知四人者大夫之制若然士當二人天子當八人爲差儀禮鄉飲酒云乃合樂周南關睢葛覃卷耳召南鵲巢采蘩采蘋注云此六篇者教之原故國君與其臣下及四方之賓燕用之合樂也小雅爲諸侯之樂大雅頌爲天子之樂鄉飲酒升歌小雅禮盛者可以進取也儀禮鄉飲酒云鄉樂惟欲注云鄉樂周南召南六篇之中惟所欲作不從次也不歌鹿鳴魚麗者辟國君也疏云鄉樂周南召南者上注以二南爲卿大夫之樂小雅爲諸侯之樂故知二南也賓客酒漿周官酒人共賓客之禮酒飲酒而奉之賓客之陳酒亦如之漿人掌六飲水漿醴凉毉酏而共賓客之稍禮詩曰我姑酌彼金罍所以勞於人臣也易曰樽酒簋貳所以納誠素之約也禮曰飲酒至於無算所以極賓主之懽也水漿禮書曰周禮酒正四飲清醫漿酏而無水醴凉漿人六飲水漿醴凉毉酏而無清内則有醴清糟酏漿醷濫而無水凉毉玉藻有水漿酒醴酏而無凉毉者鄭氏曰清謂醴之泲者則酒正之清與漿人之醴一也内則重醴稻醴清糟黍醴清糟粱醴清糟三醴則糟之濁者也醴内則所謂或以酏爲醴内則所謂黍酏也毉内則所謂醷也凉内則所謂濫也水凉之味薄非酒正之所辨酒在飲中非用漿人之法内則無水凉亦以其薄而畧之也大飲蒸類大飲蒸月令孟冬之月大飲蒸注云十月農工畢天子諸侯與其羣臣飲酒於大學以正齒位謂之大飲黨正職曰國索鬼神而祭祀則以祀屬民而飲酒於序以正齒位亦謂此時也詩云十月滌場朋酒斯饗曰殺羔羊躋彼公堂稱彼兕觥萬壽無疆是頌大飲之詩也正義云案此大飲蒸是天子之禮詩豳風躋彼公堂是諸侯之事是諸侯之禮故云天子諸侯與羣臣也蒸謂有牲體爲俎者案國語云王公大飲則有房蒸此既大飲饗禮當用房蒸半體之俎也黨正云國索鬼神謂蜡祭也與此同月射類射禮記射義篇正義云案鄭目錄云名曰射義者以其記燕射大射之禮觀德行取於士之義此於别錄屬吉禮案此篇中有鄉射又云不失鵠正然則鄉射賓射俱有之矣今目錄惟云燕射大射者但此篇廣說天子諸侯大射之義不專於鄉射賓射燕射故鄭目錄特舉大射燕射也射之所起起自黄帝故易繫辭古者弦木爲弧剡木爲矢弧矢之利以威天下蓋取諸睽文世本云揮作弓夷牟作矢注揮夷牟黄帝臣是弓矢起於黄帝虞書云侯以明之是射侯見於堯舜夏商無文周則具矣正義云凡天子諸侯及卿大夫禮射有三一爲大射是將祭擇士之射二爲賓射諸侯来朝天子入而與之射或諸侯相朝而與之射三爲燕射謂息燕之射其士無大射故司裘云大射惟言王及諸侯卿大夫不及於士故鄭注云士不大射士無臣祭無所擇也故射人云士射豻侯二正是士有賓射也鄉射記云士有侯畫以鹿豕是士有燕射矣又有州長射於州序之禮其侯並同賓射之法禮記正義又有主皮之射凡主皮之射者有二一是卿大夫從君田獵班餘獲而射書傳云凡祭取餘獲陳於澤然後卿大夫相與射也鄭注鄉射云主皮者無侯張獸皮而射之主於獲也二是庶人主皮之射鄭注周禮至庶人無侯張皮而射是也禮記正義又有習武之射故司弓矢云弧矢以射甲革椹質者是也樂記曰貫革穿革甲也考之國語有三革之制則射革非特甲也古者祈子帶弓韣生子垂弧其成童也教以射其貢之也試以射則射豈君子之所可忽耶然則弧矢之作始於黄帝侯以明之見於虞書至周弓之别有六矢之别有八侯之别有三皮侯五采侯獸侯侯之别有三則大射賓射燕射之侯也士無大射而有賓射燕射庶人無賓射燕射特有主皮之射而已周官司裘於王共虎侯熊侯豹侯設其鵠諸侯共熊侯豹侯卿大夫共麋侯皆設其鵠此大射之侯也梓人所謂張皮侯而棲鵠則春以功是也射人以射法治射儀王射三侯五正諸侯射二侯三正卿大夫射一侯二正士射豻侯二正此賓射之侯也梓人所謂張五采之侯則逺國屬是也鄉射記曰凡侯天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士皮侯畫以麋豕此燕射之侯也梓人所謂張獸侯以息燕是也大射之侯用虎熊豹麋之皮飾其側而中又制皮以爲鵠賓射之侯亦虎熊豹麋之皮飾其側而中畫五色朱白蒼黄𤣥以爲正燕射之侯則畫熊麋虎豹鹿豕之形以象鵠此三射之别也通典曰按易庖犧氏弦木爲弧剡木爲矢弧矢之利以威天下射義曰男子以桑弧蓬矢六射天地四方者男子之所有事也是故周制諸侯歳獻貢士於天子試之射宫其容體比於禮其節比於樂而中多者得與於祭數與於祭而君有慶益以地其容體不比於禮其節不比於樂而中少者不得與於祭數不與於祭而君有責削以地是以諸侯君臣盡志於射以習禮樂天子將祭必先習射於澤澤者所以擇也又曰射之爲言者繹也繹者各繹已志也故心平體正持弓矢審固則射中矣射有三焉一曰大射天子將有郊廟之事與其来朝諸侯及畿内諸侯王之子弟卿大夫士及諸侯所貢之士行之三公將有宗廟之事與其卿大夫及公之子弟卿大夫所選鄉中之俊者行之孤卿大夫將有宗廟之事亦率其家臣而行之二曰賓射謂列國諸侯来朝於王或諸侯自相朝聘或孤卿以下禮賓而射謂之賓射皆行之於朝或行於廟三曰燕射天子諸侯無事之日燕息縱適或勞燕来朝聘使之賓或復自與己臣共相勞息若天子諸侯之射則先行燕禮以明君臣之義卿大夫則先行鄉飲之禮以明長幼之序夫三射者貴其容體比於禮其節合於樂故謂之禮射其樂天子以騶虞爲節諸侯以貍首爲節卿大夫以采蘋爲節士以采蘩爲節騶虞者樂官備也貍首者樂會時也采蘋者樂循法也采蘩者樂不失職也故明乎其節之志以不失其事則功成而徳行立無暴亂之禍而國家安故曰射者所以觀徳也白虎通曰天子射百二十步諸侯九十步大夫七十步士五十步所以明尊者所服逺卑者所制近也按鄭𤣥說射禮入嘉禮今按五帝三王之時天下萬國迭相征伐士之志藝以射爲首是以我國家開元中修五禮以射禮入軍禮焉古者天子之大射曰射侯者射中則能服諸侯以下中之則爲諸侯君臣盡志於射以習禮而以流亡者未之有也孔子曰君子無所爭必也射乎揖讓而升下而飲其爭也君子斯之謂歟大射古者天子以射選諸侯卿大夫士正義曰此非專以射而選但既爲諸侯卿大夫士又考其徳行更以射辨其才藝髙下也又云古者天子之制諸侯歳獻貢士於天子天子試之於射宫其容體比於禮其節比於樂而中多者得與於祭其容體不比於禮其節不比於樂而中少者不得與於祭數與於祭而君有慶數不與於祭而君有讓數有慶而益地數有讓而削地故曰射者射爲諸侯也注云歳獻獻國事之書及計偕物三歳而貢士舊說云大國三人次國二人小國一人正義云中多者得與於祭此謂大射也又云爲人父者以爲父鵠爲人子者以爲子鵠爲人君者以爲君鵠爲人臣者以爲臣鵠故射者各射己之鵠故天子之大射謂之射侯射侯者射爲諸侯也射中則得爲諸侯射不中則不得爲諸侯注云大射將祭擇士之射也正義云凡射大射則皮侯賓射則五采侯燕射則獸侯惟大射則有鵠鵠則上下俱同無君臣父子之别以爲父鵠者謂升射之時既身爲人父則念之云所射之鵠是爲人父之鵠中則任爲人父不中則不任爲人父故爲人父者以爲父鵠以下倣此各射己之鵠者謂衆射之人雖共射一鵠各射己所主之鵠也天子大射謂之射侯者言天子所射之物謂之射侯舉大射言之其實賓射燕射皆謂之射侯射中得為諸侯者謂數有慶賜地得久爲諸侯也射不中不得爲諸侯者數被責不得久爲諸侯也正義云其侯天子大射則射皮侯故考工記云張皮侯而棲鵠則春以功又司裘職云王大射則共虎侯熊侯豹侯設其鵠畿内諸侯大射則張熊侯豹侯故司裘職云諸侯則共熊侯豹侯設其鵠是也若畿外諸侯大射亦張三侯一曰大侯鄭注云天子熊侯謂以熊皮飾之二曰糝侯鄭注云糝雜也豹鵠而麋飾三曰豻侯鄭注云豻故犬皮飾若畿内卿大夫射麋侯故司裘云卿大夫則共麋侯是也畿外卿大夫射侯無文於諸侯既得三侯其卿大夫降君一等則糝侯豻侯也其大射之侯皆有鵠也其鵠則三分侯中而居其一謂之鵠者取名於鳱鵠鳱鵠小鳥而難中是以中之爲雋亦取鵠之言較較者直也則是但取其名非是實鳥也射義云天子將祭必先習射於澤澤者所以擇士也已射於澤而後射於宫射中者得與於祭不中者不得與於祭不得與於祭者有讓削以地得與於祭者有慶益以地注云澤宫名也士謂諸侯朝者諸臣及所貢士也諸侯有慶者先進爵有讓者先削地正義云非惟祭而擇士餘射亦在其中選士於澤不射侯也但試武而已士謂諸侯朝者諸臣及所貢士者以其助祭故知此等之人其射宫則天子在廟也鄭氏注周禮司裘曰大射者爲祭祀射王將有郊廟之事以射擇諸侯及羣臣與鄉國所貢之士可以與祭者諸侯卿大夫將祀其先祖亦與羣臣射以擇之侯者其所射也以虎熊豹麋之皮飾其側又方制之以爲􅀢音準謂之鵠著於侯中所謂皮侯王之大射虎侯王所自射也熊侯諸侯所射豹侯卿大夫以下所射諸侯之大射熊侯諸侯所自射豹侯羣臣所射卿大夫之大射麋侯君臣共射焉凡此侯道虎九十弓熊七十弓豹麋五十弓列國之諸侯大射大侯亦九十糝七十豻五十鄭司農云鵠鵠毛也方十尺曰侯四尺曰鵠二尺曰正四寸曰質𤣥謂侯中之大小取數於侯道鄉射記曰弓二寸以爲侯中則九十弓者侯中廣丈八尺七十弓者侯中廣丈四尺五十弓者侯中廣一丈尊卑異等此數明矣考工記曰梓人爲侯廣與崇方參分其廣而鵠居一焉然則侯中丈八尺者鵠方六尺侯中丈四尺者鵠方四尺六寸大半寸侯中一丈者鵠方三尺三寸少半寸也疏言凡此侯道虎九十弓至五十弓並約鄉射記案鄉射記云侯道五十弓案大射大侯糝侯豻侯直言九十七十五十不云弓故注鄉射記云大侯九十弓糝侯七十弓豻侯五十弓燕射鄉射侯有弓字則大射所云九十者九十弓七十者七十弓五十者五十弓可知也列國之諸侯大射大侯亦九十糁七十豻五十者大射所云是也射人又云王大射則以貍步張三侯鄭氏注云𤣥謂貍善搏者也行則止而擬度焉其發必獲是以量侯道法之也侯道者各以弓爲度九節者九十弓七節者七十弓五節者五十弓列國之君大射亦張三侯數與天子同三侯者虎熊豹也射人云祭侯則爲位與太史數射中佐司馬治射正祭祀則贊射牲疏云案大射禮使服不氏負侯將祭侯之時先設位於侯西北服不氏於位受得獻訖乃於侯所北面祭侯大射諸侯禮謂之司射天子謂之射人周禮疏儀禮大射儀云大射之儀君有命戒射宰戒百官有事於射者射人戒諸公卿大夫射司士戒士射與贊者注云將有祭祀之事當射宰告於君君乃命之宰天子冢宰治官卿也作大事則掌以君命戒百官司士掌國中之士治凡其戒命皆司馬之屬也贊佐謂士佐執事不射者疏云鄭目錄云名曰大射者諸侯將有祭祀之事與其羣臣射以觀其禮數也周禮太宰職云掌百官之誓戒此言宰戒百官其事同故鄭以天子冢宰言之其實諸侯天官冢宰地官司徒兼之又云司馬命量人量侯道與所設令注云量人司馬之屬掌量道巷塗數者量侯道謂去堂逺近也容謂之乏所以爲獲者之禦矢疏言此云乏周禮云容以其容身故得禦矢言之言矢於此匱乏不去也又云釋獲者東面於中西坐先數右獲二算爲純一純以取實於左手十純則縮而委之又云樂正命太師曰奏貍首間若一注云貍首曽孫侯氏是也間若一者間其聲之疏數宋朝淳化大射圖五年九月中書門下獻大射圖先是上有意於大射詔有司講求典故自周官射禮及開元開寶禮斟酌損益草定其儀大約如朝謁元會之禮興國習射水心殿興國九年二月駕幸後園習射中的者五乙丑又召近臣賞花後圃因習射水心殿宰相宋琪等各以應制詩上進上吟味久之壬申又幸含芳園習射中的者四時僞主劉繼元李煜等皆侍坐淳化元年射後苑二年射玉津園六年二月射瓊林苑三年正月射迎春苑燕射射義云古者諸侯之射也必先行燕禮卿大夫士之射也必先行鄉飲酒之禮故燕禮者所以重君臣之義也鄉飲酒之禮者所以明長幼之序也梓人云張獸侯則王以息燕及儀禮鄉射記云天子熊侯白質之等皆燕射之侯也周禮疏賓射周禮射人掌國之三公孤卿大夫之位三公北面孤東面卿大夫西面其贄三公執璧孤執皮帛卿執羔大夫鴈注云位者將射始入見君之位不言士者此與諸侯之賓射士不與也射人云王以六耦射三侯三獲三容樂以騶虞九節五正諸侯以四耦射二侯二獲二容樂以貍首七節三正孤卿大夫以三耦射一侯一獲一容樂以采蘋五節二正士以三耦射豻侯一獲一容樂以采蘩五節二正注云謂之三侯者五正三正二正之侯也二侯者三正二正之侯也一侯者二正而已此皆與賓射於朝之禮也考工梓人職云張五采之侯五采即五正之侯也正之言正也射者内志正則能中焉畫五正之侯中朱次白次蒼次黄𤣥居外三正損𤣥黄二正去白蒼而畫以朱錄今之儒家云四尺曰正二尺曰鵠鵠乃用皮其大如正此說失之矣九節七節五節者奏樂以爲射節之差也疏曰言容者據唱獲者容身於其中據人而言梓人云張五采之侯則逺國屬及此五正之等皆賓射之侯也鄭氏注儀禮大射儀云正亦鳥名也齊魯之間名題肩爲正正鵠皆鳥之捷黠者禮記正義云天子賓射用五正三正二正之侯畿内諸侯賓射用三正之侯卿大夫用二正之侯士亦用二正之侯又飾以豻畿外諸侯以下賓射其侯無明文大射諸侯既同天子張三侯則賓射亦同天子用五正三正二正之侯其卿大夫射亦三正二正之侯士射二正之侯若五正者同虎侯九十弓三正者同熊侯七十弓二正者同豹侯五十弓鄉射鄉射謂卿大夫貢賢能之後行鄉射之禮而詢衆庶故鄉大夫職云獻賢能之書於王退而以鄉射之禮五物詢衆庶是也禮記正義儀禮鄉射禮主人戒賓賓出迎再拜主人答拜乃請無介乃席賓南面東上衆賓之席繼而西注云主人州長也鄉大夫若在焉則稱鄉大夫也不謀賓者時不獻賢能事輕也周禮鄉老及鄉大夫獻賢能之書於王退而以鄉射之禮五物詢衆庶亦用此禮射而詢衆庶乎疏云州長春獻以禮會民而射於州序之禮謂之鄉射者州鄉之屬鄉大夫或在焉不改其禮射禮於五禮屬嘉禮也案鄉大夫是諸侯之鄉大夫則此州長亦諸侯之州長以士爲之若天子州長中大夫爲之鄉飲酒之禮有介二人以輔賓此無介者主於射序賓之禮畧故無介以輔賓也又云工四人二瑟笙入立於垂中西面乃合樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋又云司正爲司馬注云兼官也司正爲涖酒爾正義云不煩餘官也又云樂正東面命太師曰奏騶虞間若一又云大夫與則公士爲賓注云不敢使鄉人加尊於大夫也公士在官之士鄉賓主用處士儀禮鄉射云凡侯天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕凡畫者丹質注云此所謂獸侯也燕射則張之鄉射及賓射當張采侯二正而記此者天子諸侯之燕射各以其鄉射之禮而張此侯由是之焉君畫一臣畫二隂陽竒耦之數也丹質者賓射燕射之侯皆畫雲氣於側以爲飾必先以丹采其地鄉射云鄉侯上个五尋上个謂最上幅也上幅用布四丈中十尺方者也用布五尺考工記曰梓人爲侯廣與崇方謂中也侯道五十弓弓二寸爲侯中言侯中乃取數也量侯道以爲貍步而云弓者侯之所取數宜於射器也倍中以爲躬躬身也謂中之上下幅也用布各二丈倍躬以爲左右舌謂上个也居兩旁謂之个左右出謂之舌下舌半上舌半者半其出於躬者也用三丈所以半上舌者侯人之形類也上个象臂下个象足張臂八尺張足六尺五八四十五六三十以此爲率也箭籌八十箭篠籌也算八十者畧以十耦爲正貴全數周鄉射鄉大夫之職以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞鄭司農云和謂閨門由行也容謂容貌也漢甘露石渠議黄門侍郎臨奏鄉射合樂大射否何也諸儒各以所見對韋𤣥成曰鄉人無樂故合之朝廷君臣固有樂矣時以爲然射服司服王祀先公饗射則鷩冕賈公彦曰王饗食在廟故服鷩冕大射在西郊虞庠亦服鷩冕燕射在寢則朝服賓射在朝則皮弁服然王燕以朝服則燕亦皮弁也射樂射義曰騶虞樂官備也貍首樂會時也采蘋樂循法也采蘩樂不失職也然則王射以騶虞大夫之鄉射亦以騶虞者鄉射之詢衆庶也亦欲官備於天子也鄉射合樂大射不合樂者鄉射屬民欲同其意故合樂大射擇士與祭欲嚴其事故不合樂射義云天子以騶虞爲節諸侯以貍首爲節卿大夫以采蘋爲節士以采蘩爲節騶虞者樂官備也貍首者樂會時也采蘋者樂循法也采蘩者樂不失職也正義云此節明天子以下射禮樂章之異騶虞者歌騶虞之詩射人云騶虞九節貍首者歌貍首也射人云貍首七節采蘋采蘩者射人云皆五節案鄉射注云五節歌五終四節四拾其一節先以聽也若然則九節者五節先以聽七節者三節先以聽皆以四節應乗矢拾發也樂官備者謂射一發而得五豝喻得賢人多賢人多則官備樂會時者諸侯不来朝射其首是樂會及時也射義云故詩曰曽孫侯氏四正具舉大夫君子凡以庶士小大莫處御於君所以燕以射則燕則譽言君臣相與盡志於射以習禮樂也注云此曽孫之詩諸侯之射節也四行者獻賓獻公獻卿獻大夫乃樂作而射也正義曰諸侯射以貍首之篇謂今詩文無貍首射義有載曽孫之詩故知是貍首也射侯射人祭侯則爲位祭侯獻獲者獻獲謂射中者射中則獻也其祝則天子之禮曰惟若寧侯毋或若汝不寧侯不屬於王所故抗其射汝强飲强食詔汝曽孫諸侯百福諸侯以下之祝不可考也其薦俎則鄉射大射薦有脯醢俎有折脊肺臑天子之禮不可考也獲者北面受爵司馬西面拜送爵然射人祭侯爲位則三祭與獲者受爵之位鄉射記獲者之俎皆有祭則脊脅肺臑皆有祭也射地天子諸侯皆燕射在國又天子賓射在朝亦在國士大夫燕射賓射不在國大夫亦得行大射雖無郊學亦不得在國是以孔子爲鄉射於矍相之圃是其一隅也射中君國中射則皮中於郊則閭中於境則虎中大夫射則兕中士則鹿中惟君有射於國中而燕射大射賓射異中大夫士射必於郊而燕射賓射同中後漢明帝永平二年臨辟雍行大射之禮晉咸康五年行鄉射之禮依周制唐制皇帝射於射宫三月九日賜百寮射貞觀五年三月三日賜文武五品以上射於武徳殿本朝淳化中參酌古禮爲射圖如朝謁元會之制開樂架設熊虎侯弓矢易曰弦木爲弧剡木爲矢書曰和之弓垂之竹矢周禮司弓矢掌六弓四弩八矢之法凡弩夾庾利攻守唐大利車戰野戰凡矢枉矢潔矢利火射用諸城守車戰殺矢鍭矢用諸近射田獵矰矢茀矢用諸弋射常矢庳矢用諸散射古者射矢之材以木若竹弓以木爲上以竹爲下矢以竹爲常以楛爲異弓材謂之榦矢材謂之藁弓之長短視人之形體弓之强弱因人之志氣矢之安危以濟人之强弱往體寡來體多者王弓弧弓也詩之彫弓是也往體多來體寡者夾弓庾弓也往體來體若一唐弓大弓也詩之彤弓是也爾雅曰金鏃翦羽謂之鏃骨鏃不翦羽謂之志君子志於中而不志於殺故禮射習射之矢皆謂之志也射必翦羽尚疾也志不翦羽尚舒也尚疾則以金鏃而必其入尚舒則以骨鏃而防其傷羣書考索巻三十七
