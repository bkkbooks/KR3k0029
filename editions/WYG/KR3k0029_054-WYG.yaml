body:
  text: 羣書考索卷五十四宋章如愚撰歴數門歴類歴數之起尚矣伏羲晝八卦以象二十四氣炎帝分八節以紀農功皇帝迎日推䇿乃使羲和占日常儀占月車區占星氣大撓造甲子𨽻首作筭數容成綜斯六術考定氣象建五行察微歛起消息正閠餘述而著焉謂之調歴洎于少昊以鳥名官而鳯鳥氏實為歴正𤣥鳥氏司分伯趙氏司至青鳥氏司啓丹鳥氏司閉顓帝則南正重司天北正黎司地建孟春以為元是為歴宗其後三苖亂徳二官咸廢而閏餘乖次孟陬殄滅攝提失方堯復黎育重之後使纂其業西漢志書曰乃命羲和欽若昊天歴象日月星辰敬授人時朞三百有六旬有六日以閏月定四時成嵗夏至太康羲和廢職唐一行曰湯作商歴以十一月甲子合朔冬至為上元又曰商歴得庚寅一分周歴得己丑二分武王訪箕子言大法九章而五紀明歴法故自商周咸正歴紀以應天道周衰天子不班朔魯歴不正以閠餘一之嵗為蔀首故春秋襄二十七年十一月乙亥朔日有食之於是辰在申司歴以為在戍史書建亥哀十二年亦以建申流火之月為建亥而恠蟄虫之不伏也自文公閠月不告朔至此百有餘年莫能正歴數五伯之末史官所紀惟有黄帝顓帝夏商周及魯歴秦兼天下用顓帝厯推五勝而自以為獲水徳乃以十月為正色尚黒前漢志後漢志曰黄帝造厯元起辛邜而顓帝用乙卯虞用戊午夏用丙寅周用丁巳魯用庚子秦用乙卯漢初因之漢興厯凡五變初襲秦正朔以張蒼言用顓帝厯比於六厯䟽闊中最為微近然正朔服色不覩其真而晦朔月見弦望滿虧多非是蒼𫝊曰蒼為計相善筭厯以髙祖十月始至覇上故因秦時本十月為嵗首推五徳之運以為漢當水徳尚黒如故漢家言厯者本張蒼迨文帝詔公孫臣立土徳時厯制度蒼由此絀著十八篇言隂陽律厯事此漢初用顓帝厯也武帝元豊七年漢興百二嵗公孫卿壺遂司馬遷等言歴紀壊廢宜改正朔上與倪寛等議曰推𫝊序文則今夏之時也其以七年為元年於是遂詔卿遂遷與侍郎尊大典星射姓等議造漢歴乃以前歴上元泰初四千六百一十七嵗至元封七年復得閼逢攝提格之嵗中冬十一月甲子朔旦冬至日月在建星即牽牛也太嵗在子巳得太嵗初本星度新正姓等奏不能為筭願募治歴者更造宻度各自増减以造太初歴乃選鄧平等及與民間治歴二十餘人唐都洛下閎與焉部分天部而閎運筭轉歴其法以律起歴曰律容一龠積八十一寸則一日之分也故黄鍾紀先氣之謂律律法也莫不取法焉與鄧平所治同於是皆觀新星度日月行更以推筭如閎平法名曰陽歴元朔月生隂歴朔而後月乃生乃詔遷用鄧平所造八十一分律歴罷廢尤䟽逺者十七家復使淳于陵渠覆太初歴晦朔望皆最宻日月如合璧五星如連珠遂用鄧平歴後二十七年元鳳三年也張壽王言黄帝調律歴漢元年以來用之今不調宜更歴之過也詔鮮于妄人詰問壽王不服請與麻光等雜候鈞校諸歴詔雜候上林清䑓課歴䟽宻凡十一家壽王課踈逺壽王所治乃商歴漢元年不用黄帝調歴復候盡六年太初歴第一徐萬且徐禹治太初歴亦第一壽王季信治皇帝調歴皆䟽闊壽王又妄言太初虛四分日之三去小餘七百五分以故隂陽不調竟以下吏歴之本驗在於天自漢歴初起盡元鳳六年三十六嵗而是非堅定蔡邕曰太初用丁丑唐一行亦曰元起丁丑推而上之皆不值甲寅東都李洪難張衡曰太初多一日冬至日值斗而云在牽牛踈闊不可復用獨衡以為宻近邊詔曰太初至永平十一年百七十嵗進退餘分六十三治歴者不知處之推得十二度弦望不知初廢述者得切其說此武帝太初歴也孝成世劉向總六歴列是非作五紀論子歆䆒其微妙作三統歴及譜以說春秋推法要宻其歴曰經元一以統始易太極之首也春秋二以目嵗易兩儀之中也於春每月書王易三極之統也於四時雖無事必書時月易四象之節也時月以建分至啓閉之分易八卦之位也象事成敗易吉㓙之効也朝聘㑹盟易大業之本也易與春秋天人之道也以易窮則變之數為閠法以參天九天終數兩地十地終數為㑹數以天數二十五地數三十即易天地之數五十有五也為朔易之㑹是為㑹月以㑹數乘之周於朔旦冬至也章月至日同朔謂之章閠月是為統嵗三統為元嵗又曰夏數得四時之正也三代各據三統也黄鍾為天統始施於子半為天正林鍾為地統受於丑初而畢於辰也天地生物自十二月至三月畢為地正太簇為人統受於寅初而成於申為人功自正月至七月畢故歴數三統天以甲子夏正月朔地以甲辰商正月朔人以甲申周正月朔孟仲季迭用事為統首邊韶曰歆驗之春秋參以易道唐一行曰三統歴以己邜為堯商之嵗非也今三統歴自太初至開元朔後天三日數而上之以至周初先天之失盖益甚焉班固謂其要宻著于漢志且賛曰三統歴譜考歩日月五星之度有意其推本之也然歆之歴追考春秋所書三十六食僅得其一故杜預考古今十歴以驗春秋乃知三統之最踈此劉歆三統歴也以上並西漢志後漢志曰自太初元年開三統歴施行百餘年歴稍後天朔先歴朔或在晦月建武中朱浮許淑等言歴不正當改天下初定未遑至永平中詔楊岑課弦望官歴皆失復令張盛景防鮑鄴等以四分法與岑課盛等所中多岑六事四分之衍始頗施行是時盛防未明歴元但用弦望而已至元和二年太初失天益逺章帝知其錯謬故召治歴編訢李梵詔改行四分歴而訢梵尤以為元首十一月當先大帝使賈逵問衛承李崇等以為月當先小勑無拘歴已班天元始起之月當小歴遂定永元中復以九道法候弦望無差安帝延光中亶誦言當用甲寅元梁豊言當復太初詔公卿施延等議太初過天日一度弦望失正元和改從四分雖宻於太初復不正皆不可用甲寅元與天相應合圖䜟可施行李洪議四分歴起圗䜟最正不宜易甲寅元多失未可取正上納其言順帝漢安二年邊韶上言章帝以保乾圗三百年斗歴改憲之文就用四分以庚申為元無明文按弦望足以知之准百官議虞恭常訢等言建歴之本必先立元元正然後歴可成四分歴仲紀之元起文帝後元三年嵗在庚辰止四十五嵗嵗在乙未歴度與天相應不可復尚君更三聖光武創之孝明放之章帝行之其元則上統開闢其數則復古四分宜如甲寅奏可靈帝熹平中馮光陳晃言歴元不正蔡邕議曰太初歴行百八十九嵗章帝改從四分元用庚申今光晃以庚申為非甲寅為是及用四分以来攷之行度宻於太初是新元効於今日者也光晃以隂陽不和盗賊之興皆元之咎誠虛妄造勘劾之四分歴僅七十餘年而已謬盖建歴元初専泥三百年斗建改憲之文是以斗分太多揆諸月行遂踈闊較之天度出三百年而餘一日積世不誤劉洪何承天能指言其失則踈太甚此東都四分歴也以上東漢志永光中宗紺上書正月十六日月當食而四分歴以二月詔行紺法熹平三年二十九年之中月先歴食者十六事於是差矣洪作七曜術時孫誠言繼法當改洪奏冝用誠術遂用洪等施行誠術晉志曰靈帝光和中洪考古今歴法言其進退之行知四分歴踈闊更以五百八十九為紀法一百四十五分為斗分而造乾象歴冬至日在斗二十二度以術追日月五星之行依易立數名為乾象歴又制日行月行黄道赤道之度法轉精宻矣獻帝建安中鄭𤣥受其法又加注釋焉自黄初後改歴者皆斟酌乾象洪術遂為後代推歩之表此劉洪乾象歴也宋何承天曰四分於天出三百年而盈一日積世不誤劉歆三統又踈濶方於四分六千餘年又益一日揚雄心惑其說采為六元班固謂之最宻著于漢志魏文帝黄初中髙堂隆議歴數改革韓翊以為乾象减斗分太過後當先天造黄初歴以四千八百八十三為統法千二百五為斗分其後陳羣奏翊首建恐不審故以乾象互相參校更相是非無時而决徐岳議劉洪以歴後天加太初元十二紀减十斗下分元起己丑實精宻可長行今翊所造皆用洪法小益斗下分所錯無㡬岳課日月蝕五事乾象四逺黄初一近翊術自踈又楊偉言韓翊據劉洪之術知貴其術而棄其論至明帝景初元年楊偉改造景初歴欲以大吕之月為嵗首建子之月為歴初遂以建丑之月為正改其年三月為孟夏三年正月復用夏正晉姜岌曰古歴斗分强不可施於今乾象斗分細不可通於古景初雖得其中而日之所在乃差四度合朔于盈皆不及其次唐一行曰韓翊楊偉更造新術而皆依䜟緯三百嵗改憲之文攷經之合朔多中校𫝊之南至則否說齋曰翊創於前偉繼於後咸遵劉洪之議未及洪之深妙盖二歴皆冩子模毋終不過洪之術也蜀仍漢四分歴吴王蕃以劉洪術制儀象及論故吴用乾象歴此魏黄初景初歴也晋武帝因魏之景初歴改名泰始歴自泰始十年上元甲子朔夜半冬至日月五星始于星紀為正歴杜預又著春秋長歴及論武帝咸寧中李脩卜顯依預論為術名乾度歴表上之時尚書史官以乾度與泰始參校古今注記乾度歴殊勝泰始歴上勝官歴四十五事今其術具存元帝渡江更以乾象五星法代楊偉歴穆帝永初八年正朔造通歴以甲子為上元說齋曰因其上元為開陽之始其說畧見於晉史其私不用於日官莫可考也其后武帝太元中姜岌造三紀甲子元歴其畧曰治歴之道必審日月之行然後可以上考天時下察地紀一失其本四時變移自羲皇暨漢魏各自制歴以求厥中考其䟽宻惟交㑹薄蝕可以驗之然書契所紀惟春秋著日食之變凡三十六其朔晦不知用何歴班固以為春秋用魯歴歴不正閏失其序魯以閏餘一之嵗為蔀首春秋置閏不與此蔀相符合歴序曰孔子為春秋之故退脩商之故歴故其數事𫝊於後世則是春秋用商歴並晉志晉之歴有五曰泰始曰乾度曰乾象曰通歴曰三紀甲子然終晉之世止用泰始而餘歴不果施行南朝宋武帝永初元年改泰始歴為永初歴文帝元嘉二十二年何承天撰元嘉新歴刻漏改二十五箭以日食之衝知日所在又以中星驗之知堯時冬至日湏女十度今在斗十七度又測景以校二至差三百有餘知今之南至日應在斗十三四度於是更立新法冬至徙上三日五時日之所在移四度又有遲疾前歴合朔月食不在朔望今晉以盈縮定其小餘以正朔望之日詔付外詳之太史令錢樂之等奏皆如承天所上推月頻三大頻二小此舊法殊為乖異謂冝仍舊詔可又元嘉十四年河西王牧犍遣使獻河西趙􅱿所撰甲寅元歴通鑑自宋迄齊相仍用元嘉歴梁武初興因循齊舊天監中因祖常進甲子元歴令太史候新舊二歴氣朔交㑹及七曜行度新歴宻舊歴踈乃更用祖常所造甲子元歴又名大明歴至大同十年詔太史虞氏更造新歴以甲子為元未及施用而遭侯景之亂陳氏亦用祖仲之歴隋志南朝之歴曰永初曰元嘉曰甲寅元曰甲子元曰大同新歴然甲寅元大同二歴不用永初歴又復因晉四朝所用者元嘉甲子元二歴而已北朝元魏大武時崔浩上表言自秦燔書而漢以来妄造歴術者十餘家皆不得天道之正大誤四千小誤甚多不可言盡宜改誤歴術若以從天遊曰五寅元歴其後浩以國書之禍坐誅終魏之世惟用元始正光二歴而五寅元不果行也浩傳初魏入中原但得景初歴世祖克沮渠氏得趙􅱿元始歴時人以為宻髙宗興安元年始行之世宗以元始歴寖踈命更造新歴至肅宗正光中崔光取張龍翔等九家所上歴候驗得失合為一歴以壬子為元應魏之水徳命曰正光歴宏詞篇又有信都芳因祖常之法私撰靈憲歴筭月頻大頻小食必有朔證據甚明每云何承天亦用此法而不能精靈憲若成百代無異議者書未成而卒其法亦莫考也及東魏興和元年以正元歴浸差命李業興更加脩正以甲子為元號曰興光歴西魏入關尚行興光歴法北齊顯祖天保元年命宋景業造天保歴行之而重峻鄭元偉立議非之又與劉孝孫張孟賔二人同上甲寅元歴後周明帝武定元年始造周歴於是胡克遜庾季才及諸日者採祖常舊議通簡南北之術然周齊並時而歴差一日頗覩其繆故正光廢而天和作矣天和歴上於甄鸞其後大象年間太史馬顯等上景徳元歴即行之時隋髙祖輔周欲以符命曜天下道士張賔知上意乃自言星歴有代謝之證乃更造新歴又名己巳元歴何承天法㣲加増損行於開皇之四年賔歴既行劉孝孫劉焯並稱其失所駁六條十七年張胃元論曰日影短長羣臣咸以胃元為宻乃行胃元所造歴劉焯増修其書名曰皇極歴又名甲子元更有増損迄于義寧並隋志北朝之歴曰五寅元曰元始曰正光曰靈憲改元魏之歴也曰興光曰天保曰甲寅元此東魏髙齊之歴也曰天和曰景寅元曰己巳元曰皇極此後周隋氏之歴也言歴者不一行之數十年輙復差繆故南朝之歴則以何承天為宗而北朝則依趙􅱿祖冲之以為據此南北歴之大㫖也唐志曰唐終始二百九十餘年而歴八改初曰戊寅元厯盖髙祖時傅仁均所造也用於武徳之二年閱明年而月蝕比不驗明年詔祖孝孫等考定乃畧去其尤䟽闊者其後崔善與李淳風復更定其數十條淳風又言仁均减除稍多定朔遂差二刻其二曰麟徳甲子元歴髙宗時李淳風作也戊寅歴推歩既踈淳風乃増損劉焯皇極歴作是歴古歴有章蔀紀元有日分度參差不齊淳風為總法千三百四十以一之損益中晷術以考日至為本渾圖以測黄道當時以為宻與太史令瞿曇羅所上經緯歴參行其三曰開元大衍歴僧一行所作也開元九年麟徳歴書日蝕比不效詔一行作新歴推大衍數立術以應之較經史所書氣朔日名宿度可考者皆合本志曰自太初至麟徳歴有二十三家與天雖近而未宻也至一行宻矣其倚數立法固無以易也後世雖有作者皆依放而已竊考其詳本於天地之二中始於冬至之中氣以晦朔定日月之㑹以日度正周天之數以卦氣定七十二候以中星正二十四氣其原皆出於易自春秋以来至開元十二年變更凡二十一事戊寅歴得十六麟徳歴得二十三而開元得二十四用此例以校古今之薄蝕五星之變差而開元歴課皆第一然開元十二年七月朔十三年十二月朔於歴當蝕而皆不蝕杜預有云日月動物雖行度有大量不能不小有盈縮故有雖交㑹而不蝕者或有頻交而食者是也若因開元二蝕曲變交限而從則差者益多矣肅宗時山人韓頴言大衍或誤頴乃増損其術更名曰至徳歴其四曰寳應五紀歴司天郭獻之等所上也代宗以至徳歴不與天合詔獻之等復用麟徳元紀更立嵗差増損遲疾交㑹及五星差數以冩大衍舊術上元七曜起赤道虛四度帝為製序題曰五紀歴其與大衍小異者九事而已其五曰建中正元歴司天徐承嗣所上也徳宗時五紀歴氣朔加時稍後天推測星度與大衍差率頗異徐承嗣等雜麟徳大衍之㫖治新歴上元七曜赤道虛四度建中四年歴成名曰正元其氣朔發歛日躔月􅄐晷漏交㑹悉如五紀法其六曰元和觀象歴司天徐昻所上也憲宗元和二年用之然無章蔀之數至於察歛啓閉之候循用舊法測驗不合其七曰長慶宣明歴穆宗即位以為累世纉緒必更歴紀乃詔日官改撰歴術名曰宣明上言七曜起赤道虛九度其氣朔發歛日躔月􅄐皆因大衍舊術晷漏交㑹則稍増損之更立新度以歩五星其八曰景福崇元歴邊岡所造也昭宗時宣明歴施行已乆數亦漸差邊岡筭改治新歴岡用筭巧能馳騁反復于乘除間雖籌䇿便易而冥於本原用唐志修一行歴議曰易天數五地數五五位相得各有合所以神變化而行鬼神也天數始於一地數始於二合二始以位剛柔天數終於九地數終於十合二終以紀閏餘天數中於五地數中於六合二中以通律歴天有五音所以司辰也地有六律所以司辰也參伍相周䆒於六十聖人以此見天地之心也自五以降為五行生數自六以徃為五材成數五十為大衍之母蓍數之變九六皆一乾坤之象也七八各三十六子之象也故爻數通六十是為天地之樞如環之無端盖律歴之大紀也五代初用唐崇元歴而晉髙祖時馬重績始更造新歴不復推古上元甲子冬至七曜之㑹而起唐天寳十四載乙未為上元用正月雨水為氣首初唐建中時術者曹士薦始變古法以顯慶五年為上元雨水為嵗首號符天歴然世謂之小歴祗行於民間而重績乃用以為法遂施于朝廷賜號調元律行之五年輙差而復崇元歴周廣順中􅀶士王處訥私撰明元歴于家民間又有萬分歴而蜀有永昌歴正象歴南唐有齊政歴五代之時大畧如此而調元歴法既非古明元又藏其家萬分止行民間其法既不足紀而永昌正象齊政歴皆止用於其國今亦亡矣周世宗内修法度王朴通於歴數乃詔朴撰嵗餘朴奏曰自唐季以来亂日失天陛下考古道舉墜典敢不奉詔乃包萬象以為法齊七政以立元測圭箭以候氣審朓肭以定朔明九道以歩月按疾遲以推星考黄道之邪正辨天勢之昇降而交蝕詳焉乃以一篇歩日一篇歩月一篇歩星以卦氣㓕没為下篇都四篇歴經一卷歴十一卷顯徳三年七政細行歴一卷為欽天歴世宗嘉之詔司天監用之以明年朔旦為始顯徳欽天歴行自前諸歴並廢用五代歴修王朴歴成王處訥謂之曰此歴可且行乆則差矣既而果然宋興乃命處訥正之國朝隆興二年以王朴欽天歴時刻差繆命有司重加研覈四年王處訥上新歴號應天歴此國朝歴法之始也太平興國中以應天歴置閏有差誤詔吳昭素等各造新歴而昭素歴頗精宻賜號乾元此歴之一變也其後朔望有差真宗咸平四年史序王熈元獻新歴更名儀天此歴之再變也始熈元等上儀天歴趙昭逸請覆之而不從後二嵗而歴果差昭逸言其熒惑度數稍繆復推驗之果如其說後以星躔差仁宗天聖中司天監復上新歴賜名崇天晏殊為序此歴之三變也英宗初司天言崇天歴五星之行及諸氣節有差又以日蝕差詔周琮等各造新歴以范鎮詳定惟琮歴最宻乃用之號明天歴此歴之四變也初右道言琮歴不可用至神宗熈寧中月食東方與歴不叶詔歴官雜候時有言衛朴通歴法召朴至朴言其失在置元不當詔朴改造朴以已學為之視明天歴朔减二刻歴成行之沈恬上之號奉天歴此歴之五變也九年奉天以日蝕不當詔集歴家考驗其後有司言奉天有後天之差有詔改造歴哲宗元祐六年歴成詔以觀天為名此歴之六變也徽宗崇寧三年命姚虞輔造歴名曰占天此歴之七變也未幾而蔡京令虞輔更造用帝受命之年即位之日元用庚辰日起己夘歴成而名以紀元此歴之八變也紀元立朔既差定臘亦舛日食不驗髙宗建炎三年乃改造統元歴元用甲子日起甲子盖自古造歴多起朔旦甲子夜半冬至懲虞輔用受命年月日之失也此歴之九變也壽皇以統元日食有差於是改造乾道歴又改淳熈歴以四朝志及㑹要修主上踐祚歴號曰會元章蔀紀元攝提遷次黄龍移辰謂之嵗嵗首至也月首朔也至朔同日謂之章同在日首謂之蔀蔀終六旬謂之紀嵗朔又復謂之元是故日以實之月以閏之時以分之嵗以周之章以明之蔀以部之紀以記之元以原之極建于中道營于外東漢志總論歐陽公曰歴起於數數者自然之用其用無窮而無所不通以之於律於易皆可合也太初以律起數大衍以易起數然其要在於候天地氣以知四時寒暑而仰察天日月星之行運以相參合而已然四時寒暑無形而運於下天日月星有形而見於上二者常動而不息一有一無出入升降或遲或疾不相為謀其乆而不能無差失者勢使之然也故為歴者其始未甞不精宻其後多踈而不合亦理之然也不合則屢變其法以求之自堯舜三代以来歴未甞同也吾甞因是而觀諸易矣革之象曰澤中有火革君子以治歴明時天下之事可革者多矣而聖人必以歴言者盖事之在天下最易差者莫如歴而不可不修者莫如歴四朝志曰自古帝王必先考正歴象盖將以前民用授人時也然以聖人之智其於天地之理隂陽五行之運日月星辰之紀考驗推測無有不盡其至立法倚數固宜歴萬世而不忒徃徃𫝊之稍乆其應輙差何哉天地之數其妙而不可測者常在於𦕈忽毫釐之際而其象與氣推移嬴縮亦有時而不齊故雖聖智不能盡窮積以嵗月則歴之不能無差理固然也聖人不能使歴之無差嘗因其差而正之而歴家者流徃徃各持其說以相矛盾主其議者又從而以私意輕重之漢唐以來歴之所以數變而無一定之說亦有由矣大抵漢歴五變而太初最宻唐歴八改而大衍最宻宋朝初用欽天歴至太平興國中始更定歴名曰乾元至咸平復改曰儀天天聖曰崇天嘉祐曰明天熈寕曰奉元元祐曰觀天崇寧曰占天後復改曰紀元盖自乾元以至紀元凡八變法雖不同至於前民用授人時其歸則一矣辨嵗差自漢改歴之初洛下閎謂八百年後當差一度然當時史官考諸中星知太初歴已差五度而閎不之察盖古之為歴未知有嵗差之法其論冬至日月躔之宿一定不移而不知今嵗之日􅄤在冬至者視去嵗冬至之日纒常有不及之分至晉虞喜始覺其差遂立嵗差之法以五十年日退一度然失之太過宋何承天倍増其數以百年退一度又反不及至隋劉焯取二家中數以七十五年退一度較之二家之歴雖為差近亦未甚宻故唐一行復以大衍之法推之乃得八十三年而差一度自唐以来歴家皆宗其法迄于今日又不若統天歴之為漸宻也大衍立法謂日躔于一嵗之間行周天度未徧餘分而日已至焉每嵗若有不及之分故一度為三千四十分其所差之分一嵗三十有六又積而至於八十三年則差一度矣然猶未也考古驗今其實七十九年而退一度是故堯時之日月在虛一度自是而降漸退在女又過在斗自牽牛而退在斗二十六歴斗二十五迤􅆔而退則在建星矣知嵗差之法則知古今之中星不同可坐而判或者不知嵗差之法每以堯典校之月令至於今日不啻差一次矣求其說而未得遂謂節氣有初中之殊又謂古以午為中今以未為中是皆自欺之說固不足信盖嘗考諸經史自堯以来至于宋朝冬至日躔各自不同然後知嵗差之法固不可廢大衍歴推帝堯縯紀之端日在虛一度則鳥火虚昴皆以仲月昏中合於堯典考諸堯時日之所在冬至在虛一度夏至在柳十四度春分在胃十二度秋分在氐十度至唐開元大衍歴冬至日在斗十度夏至在井十六度春分在奎七度秋分在軫十四度今之統元歴冬至在斗二度夏至在井十八度春分在奎初度秋分在軫七度自冬至之日黄道至斗為極南黄道極南之所出辰入申故日亦出辰入申又漸退而北行至於春分正當黄赤道之交出夘入酉故日亦出夘入酉進而至夏至黄道至井而極北黄道極北之所出寅入戍故日亦出寅入戍自夏至後日漸退而至於秋分復當黄赤道之交出夘入酉故日亦出夘入酉又退而至於冬至復如初極之於南矣日之出入也北而復南南而復北者黄道之勢使然也故太元經曰日一北而萬物生一南而萬物死正謂是矣月之行天也循黄道内外而東黄道内曰陽歴外曰隂歴與黄道赤道相去最逺者二十四度月道與黄道相去最逺者六度日行黄道月行九道青道二出黄道東朱道二出黄道南白道二出黄道西黒道二出黄道北其交必由於黄道而出入故兼言為九道也然此特言其大槩爾至五代王朴乃以黄道一周分為九節一節之中分為九道盡七十二道而斜正之勢無所隠遯明月之行道備於此矣日之行也舒月之行也速當其同度謂之合朔舒速先後近一逺三謂之弦相與為衡分天之中謂之望以速及舒光盡體伏謂之晦其循黄道左右而進也春分弦以東井亦猶日之夏至而極北也秋分弦於南斗亦猶日之冬至而極南也然不可與日同測景者以月有入隂陽歴之差也故周官有冬夏致日春秋致月者此也至五星之行其出入夫隂陽之歴大畧與日月不異然其伏見遲留進退前後又各不同當以五緯推歩法求之可也渾儀畧說裴胄之問董生曰日常右轉星常左轉大凡不滿三萬年日行周二十八舎三百六十五度然必有差約八十年差一度自漢文帝三年甲子冬至日在斗二十二度至唐興元元年甲子冬至日在斗九度九百六十一年差十三度矣唐李肇國史補疑難西漢之歴莫善於太初東漢之歴莫善於四分由魏至隋莫善於皇極在唐則大衍為善在五代則欽天為善然其立法各有不同太初以八十一為日法四分則用蔀月九百四十皇極則用一千二百四十二大衍則用二千四十欽天則用七千二百其多寡之異何耶太初以三百八十五為斗分四分則用章法十九皇極則用萬二千一十有六大衍又以七百七十九為虚分欽天則一千八百八十四其増損又如此之異何耶泰初諸歴則日為一法度為一法至大衍又合日度為一法太初諸歴則餘分置於斗分至大衍則餘分置於虚分此又何耶太初之歴本於鍾律以八十一分為統母其數起於黄鍾之龠而終漢之歴號為最詳開元之歴求乎大衍以四十九分為筭而終唐之世號為最宻是非所祖之多門而為數則同也黄帝造歴元起辛夘髙陽氏起乙夘虞舜用戊午夏商周以三統改正朔是非立元之多門為數則同也漢靈帝時劉洪作乾象歴以五百八十九為紀四百四十五為斗分魏文帝時韓翊造黄初歴以四千八百八十三為紀法千二百五為斗分漢之歴或八十一為法魯之歴或以九百四十為筭是非倚數之多門而為數則一也若夫孝昭清臺之候課諸歴法號為得宜而張壽王書乃以隂陽不調為更歴之過章帝元和之詔用四分歴其法頗宻而馮光陳晃之論乃以為不合於圖䜟此皆不經之言也羣書考索卷五十四
