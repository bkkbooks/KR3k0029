body:
  text: 羣書考索續集卷三十七宋章如愚編官制門監司周始制監司王制云天子使其大夫監其方伯之國國三人漢監司漢刺史無常員時遣丞相史分刺諸州黜陟賢否理斷寃罪武帝始置部刺史十三人秩六百石專以六條察二千石其秩卑其權重故能激昂而自奮也朱博為冀州刺史行部不察黄綬吏民有言縣丞者令各詣部何武為揚州刺史所舉奏二千石長吏必先露章服罪者為虧除免之而已是二者可謂得刺史之體矣至於鮑宣舉措煩苛代二千石除吏聽訟所察過詔條則勢偪郡國而後侵預其事矣宋朝監司宋朝之監司漢之部刺史遺制也元城先生嘗論之矣漢部刺史十三州以六條問事其五條則皆及二千石考其秩則六百石乃在千石縣令之下也秩卑則其人自奮權重則其志得行至於綏和更之為牧秩二千石其法墮矣唐制諸道帥臣兼觀察之權無有糾其非者是則綏和之制矣宋朝之監司以臺省寺監為之雖宰臣從官為帥亦許糾劾是則元豐之制也二三百年無方鎮之患其此之由歟宋朝監司有轉運使副有轉運判官使之按察官吏可也而又有提㸃刑獄有武臣同提刑使之並察官吏可也而有提舉常平提舉茶鹽轉運置於乾德判官置於開寶使副置於太平興國此轉運之職也淳化中置提㸃刑獄四年省之景德中復置天聖六年罷之八年復置而治平罷之迨置於熈寧而提刑之職遂不廢提舉常平置於熈寧而元祐罷之既而隨罷隨復提舉茶鹽置於宣和而紹興罷之既而或置或罷迨至紹興之五年常平茶鹽併為一司而後提舉之職定矣然今之使副運判既不雙除武臣提刑罷之復久常平茶鹽合為一司其名雖繁其職實簡昔在仁宗朝鋭意太平責任牧守於時范公仲淹在政府取不才監司一筆勾去而張温之之徒首被茲選風聲凜凜聞者恐懼當時不堪遂以三虎四瞪之名中之卒罷按察之名而變仲淹已行之政歐陽公有言按察所奏不能與行沮毁者一言便加輕信嗚呼若此而望部刺史之舉其職難矣哉泉司唐有諸道鑄錢使故今之泉使亦曰都大鑄錢司然必兼提㸃坑冶以為名者錢以銅為母而鉛錫其助也夫既以鑄錢為主意今其弊乃至於銷錢者何哉葢黄金白銀元無與於鑄錢而上之人利於得銅乃以是而優鑿山者俾之多方營銅也其意則善其法則未然者地之所産有無不可以强同也愚民利於金銀之獲不復計夫銅之有無採之於山既不可得則計無從出未免復銷錢以為銅耳利之所在死且不顧是豈刑罰之所能禁哉夫鑿山而得之者與銷錢而為之者其質迥絶不同所司獨不辨之乎葢吏胥均其所入之利而上下更相蒙也銅日加多而錢日加少名曰鑄錢司乃導民銷錢之地也有能隨五金之所入而不强無以為有則害除而利自興矣總司方今駐蹕吳會上流自蜀漢下流則負海江淮綿亘其中凡數千里所當控扼者皆制軍馬小戍數百大屯數千漕臣所入租賦而入於總所總所會所入錢糧以餉諸屯統軍者不與錢糧掌財者不施節制所以專其責而分其權也以無事之時言之漕臣足以辨事以有事之時言之四總未為贅員凡是區畫得失相半然財之所聚公亷者寡貪冒者多籍浩繁之入而為奸利之資者不無官吏之弊不嚴賞罰軍政何由而肅乎文公云總領一司趙忠簡所置語録常平茶鹽司宋朝立法初意常平所以濟民饑茶鹽所以助國用昔分為二今合為一使之有無相通上下兼足也然今日在在常平有名無實茶鹽之利一孔無遺何於利民者恝然而於利國者獨留意耶嘗觀熈寧變法諸州常平免役義倉市易坊場河渡等錢者委郡貳主之此乃王安石行青苗新法籍此以為國息也人主意在國息則利民之事不能以兩立矣今日雖去青苗之擾而諸州茶鹽香礬與夫所謂經總制錢所司督辦毫髪必計於此重則於彼輕宜乎常平雖有移互之禁覆糧之令更相蒙蔽徒為具文也獨不可原其故而為之所乎論監司當改作按察自秦置守尉監司有郡守刺史如今監司專主按察至漢末令刺史掌兵遂侵郡守之權兼治事而刺史之權獨重後來或置或否某嘗説不用許多監司每路只置一人復刺史之職正其名曰按察使令舉州縣官吏其下却置判官數員以佐之如轉運判官刑獄判官農田判官之類農田專主婚田轉運專主財賦刑獄專主盜賊刑獄而刺史總之稍重諸判官之權資序視通判而刺史視太守判官有事奏聞則刺史為之發奏刺史不肯發則許判官徑自申御史臺尚書省以分刺史之權葢刺史之權獨專又不是若非其人則害貽一路又須重諸判官之權諸判官之下又置數員官屬如職屬官之屬如此則事權歸一太守自治州事而刺史得舉刺一路豈不簡徑省事又無煩擾耗蠧之弊今之主管雖視通判資格但權輕不能有所為但得奉承運使而已若分為判官又為專達則監司不敢妄作矣文公監司不盡其職皇華遣使專務咨諏繡衣直指風動列城是豈蒙蔽茍安之地哉則養安以自重積日以計資以因循為識時以緘黙為得計以容奸為寛大以舉職為煩苛以興利除害為生事以激濁揚清為抗奸一事之當為則上下相倚首尾兩端文符往來終於不立一吏之當劾則左右顧望畏首畏尾符檄雖峻卒亦如初褰帷問俗所不暇也馳騁原隰所不便也深山窮谷或以險阻不及至新貴故交或以人情不欲至其所至者則前遮後擁吏卒漁獵悉飽其欲而後去反不若不去之為愈者監司不敢舉劾况監司之於郡縣亦有不敢者某郡之守嘗為侍從也則幸其復為侍從而有所求某郡之守嘗為臺諫也則恐其復為臺諫而有所擊至於縣吏之與在朝有姻有舊者皆不敢問也民訴其守則封其詞以送其守民訴其令則封其牒以與其令是為守令執仇讎也守令從而甘心焉後有寃者夫誰敢言州縣之胥憑守令之寵以暴訴民誅之者某守令然章奏相望無非䑕雀之盜聲勢交援或漏吞舟之魚耳輕從非人有以秩卑假以重權者漢之六百石察郡國是也有以權重而得專務禄者唐之以使持節是也使臨益部上動星躔車駐徐州旋至雨澤刺史之任所闗如此而可輕畀其人哉非精神剛正不畏强禦則不足以任其職非風采奮發事業雄偉則不足以振其權在慶厯時亷直中正者方得舉而苛細矯激之人不用也嘗任縣邑者方擢為按察而僥求苟至者不擇也其後公正聰明之有科剛方豈弟之有目固不容非才濫厠其間者孝宗嗣位益重其選宰相進擬必反覆審問且親洒宸翰欲得剛正者奏舉數人監司之不輕畀也如此今也親擇之意易而為拘牽者法薦選之功變而為攷任之弊郡印方綰已懷攬轡使車未還覬倖且有先為之地者不風力則勢要請托皆得以行其私資考是遷則闒茸庸繆皆將執例以取償於我矣任監司之說有三愚嘗論任監司有三説資望不可太輕遷徙不可太數文法不可太拘資望輕則屬吏不畏遷徙數則意㫖不行文法拘則省察不周知此三説則上之人無媿於責任下之人得以盡其職矣郡守漢郡守漢郡守地大而權重故二千石得以專制而有以盡其才按會稽一郡合今浙東西之地在其封内則其權安得不重趙廣漢之將兵屬蒲類將軍擊匈奴朱買臣將兵與横海將軍擊東越是其兵得以自將而征討矣朱博召見諸曹吏書佐及縣大夫選視其可以用者盡斥罷諸病吏薛宣移書屬縣黜陟易置惟其所為是其僚吏得以自進退矣文翁減省紀用度而自興學校尹翁歸論棄東海大豪市而莫能犯禁是其財賦刑獄又得以斟酌輕重而自用之矣然觀張敞與朱邑書曰佐敞逺守劇郡馭於繩墨胷臆約結固無竒也雖有亦安所施龔遂之於渤海亦願丞相御史無拘於文法得一切便宜從事則知宣帝懼其專制而馭之以法矣夫是以漢之太守其地雖大其權雖重俯首聽命惟上所令而不聞其跋扈難制之患者葢自上有以馭之之道耳杜延年吾丘壽王一以治郡不進盜賊竊發則璽書詰責之而治行第一課最上聞有増秩賜金之寵核實之法嚴賞罰之用明此漢之所以多循吏也唐郡守方鎮之禍豈獨唐世然哉原其所以致之之由由夫郡守之無權耳原其所由始於漢末而然矣初漢置郡守以察郡國秩不過六百石漢成帝時遂更為牧秩中二千石則常一變矣始時奏劾二千石長史者皆下三公遣吏驗實然後退黜及光武即位不復委任三府故權在州牧廢置自由則又變矣其始以六條詔察過失者罷其後乃與賦政治民之事則又一變也始則傳車周流後乃更為重鎮爭據土地則又一變也愈變愈重至於東都之末方鎮之形已成而劉晏建論猶請重其權任郡守之權悉歸牧鎮知有牧鎮而不知有朝廷太守之興嘗易太守為刺史又假之以使節之稱按前此所謂使持節者皆得專戮二千石以下是以古所以假太守者而假刺史此其重之之意豈無謂哉惟其邊屯之兵總之都督又其品位崇重不為少卿而刺史見都督之禮又已先為之極至且唐制刺史見都督必首屬戎服不敢以客禮見令狐峘為吉州刺史堅不如制見觀察使齊映謫為别駕此則雖假之以漢刺史之名果何益哉開元以來諸道使得專停刺史而代宗使劉晏攷刺史六品以下杖而後奏此則所謂使持節之名又何相戾也郡守日輕而方鎮日强是無足怪宋朝郡守大哉宋太祖之立國也夫趙中令之謀國也方鎮之强為天下深患弊根蠧穴葢數十百年莫能去一旦盃酒從容談笑閒雅控御抑制有如嬰兒分其支郡在此無疑心留之邸地在彼無觖望置轉運以警其志置倅貳以分其權其規模逺矣哉夫收天下之精兵聚之京師州郡之兵若不足也而猶足以自衞也聚天下之財榖入之京師州郡之財若不足也而猶足以自給也大郡十數指揮中郡五七指揮小郡三五指揮軍儲餉給屬之運司統制軍馬隸之守倅一旦有警可以使之犯難而忘死其兵何如哉二税分數隸屬州縣地利嬴餘歸之本州經費職之軍資庫犒宴職之公使庫而又使之回易收其息利其財何如哉强不至縱弱不至削此國初之制然也熈寧大臣用意過當盡削州郡之權籍郡縣兵併兵額一路團結五千人為一將置將副專領軍情離貳役使不行而州郡之兵弱矣免役青苗色色取辦舊例財帑悉歸經費守臣所有者止有限額正使錢而已而又禁其回易限其醖造而州郡之財匱矣兵不足以自衞財不足以自給一有警急束手無措後日之患君子已預卜之嗟夫州郡之權不可以不削亦不可以過削不削則縱過削則弱得其中者其惟國初乎京尹自漢以來京尹之任類多聲稱趙張三王劉晏許孟容韋渙黎幹魏少遊薛元賞輩近世亦然近故也歐陽修韓維吳充范仲淹蔡襄杜衍劉沆輦轂之下百官軍民萃焉四方萬里瞻焉君相必先知其人而後任之任是職者必自度其才而後居之也近觀列城凡令城下者類能自持亦以近守貳之故歟其亦自度其才之足以辦此歟廟堂量才之地必審擇天下之守令與夫守令之所以自審者皆然則郡邑之治班班可紀矣郡守得人紫雲之宴切責藩侯選德之屏書及郡守祖宗之重牧守者如此哉先張後王有聲於蜀卲父陳母迭稱於廣張方平之尹開封也人不敢欺田况之守成都也人不忍欺或以寛厚而比仲詩或以清介而過馬援遺錢不取劉君之盛德也外户不閉曾公之美政也二州竟留杜公之遺愛循吏之政班班可紀遡其自來寧非自上之人有以激勸之哉守令守令守令自秦人郡縣七國未之有改也宋朝懲五季藩鎮之弊凡朝臣領外寄者必帶省曹寺監宫僚之名奉使而出上至牧守監司下至倅宰管庫通以奉使目之所以均内外輕重之任也至孝宗朝不任守臣不為郎不任縣令不除監察御史亦此意也然漢多良吏類由久任宋元嘉之政卓冠江左亦由守宰以六朞為斷也宋初懲創藩鎮之弊失之過甚而守令者率不過二三年重以熈寧新法之擾郡縣之財悉歸公上任是職者朝夕皇皇惟以財賦為念席不暇煖民不及親而去官之日近家食之日逺為身之計紛然四出其何以循良為哉雖然未仕善士皆可為也既仕循吏皆可為也古者循吏省刑而薄賦斂今也倚刑而聚斂古者循吏奉法而循理今也任法而背理板曹之供輸監司之督辦無名之需非時之擾文移交馳促迫逮繫然則為州縣者如之何而省刑薄斂奉法循理乎曰黄霸事刑名之主而以寛和著名卓茂當紛亂之世而視民如子内心有主行其所學無往而不可中無得焉視人以為趨向雖平世亦不可為矣逺方守令虐民無由上達近之官吏賢耶民譽之歌之不賢耶譏之謗之譽歌譏謗者衆則必傳傳則必達於朝廷是官吏之賢否易知也一夫不獲其所訴之刺史刺史不問裹糧走京師緩不過旬日撾鼓上聞而有司不得不省矣是民有寃易訴也吏之賢否易知也逺方之民雖使盜跖為之守檮杌饕餮為之令郡縣之民羣嘲而聚罵者雖千百為輩朝廷不知也白日執人於市誣以殺人雖其兄弟妻子聞之亦不過訴之刺史不幸而刺史又抑之則死且無告矣老泉今日守令之弊守令之奸民號而訴者案牘相銜也重者不過罷去次者僅免而已舒之歳月民血之未乾而謫罰之書又以恩貸矣至於公卿大夫貪沓冗眊以不稱職聞者則皆剖符以左遷之不意父母斯民之職乃為逐臣之淵藪也何公剡嘗言於先朝曰上賢使之為三公次賢使之為臺諫監司下賢使之為守令是大不然鄰州刺史以親故除豐城令尹以求劍補於己則便如國家爵禄何於私則便於天下蒼生何陳傅良善治所感蝗避中牟鳳集潁川九江得人而去猛虎潮陽得人而去鱷魚善政感物者也米以王渙而通粟以李峴而賤有李勉則夷舶來有薛公則魚鹽至善政感人者也吳弁秦無賢守令故民離而亡秦之吏非殘忍侵漁以逢其君則貪釁幸灾不逞之人也於是民之欲亡秦者十户而八九矣闗東之豪投袂一呼毛奮而鱗集戮力以傾秦者不可勝計烏合之師所至如破竹者大率皆郡馘其守邑俘其令以應之也不然則吏為自全之計挈地以賂而市一旦之命也又不然則談士掉三寸之舌傳檄而風靡其同黨之惡不遽臣妾者如三川守由四川守壯南陽守齮亦徒驅欲潰之民疾鞭而戰之不戰而塗地矣秦以虎狼之資尺攻寸取以吞天下一夕有變而三十六郡皆無人之墟子嬰之席未煖而天下嬗漢何也無良吏也守令數易之弊天下非怨吏之可畏也民怨之可畏也今日遷其守明日易其令其擾則妨民其費則傷民其無意於留而茍簡於治則弊民其自以為將遷而求足其欲則又困民故夫吏之便民之病也蜀廣之守不應輕畀廣蜀之辟置近者數千里逺者萬里一時部使者以奏牘來上其能否其賢不肖一聽之所薦之人其親與故不知也其利與勢不知也其果長於治郡與否不知也是又出於堂除部缺之外也名藩巨鎮非長才弗畀無已則曰姑與廣郡與之蜀郡而已是則蜀廣之守非庸才不任事之人則同列所不齒之士也天下之勢無逺近無内外凡隸一圻皆吾郡凡受一㕓皆吾民豈有近之民為重而逺者之可輕也豈有近之地為貴而逺者之可賤也王者以民為天廣蜀之民何罪而獨不在所重也守令在勸沮郡計不上璽書切責密令治化擢為三公懲勸之道時出而用之則騰桑麥之歌沸襦袴之謠鳴單父之琴富河陽之花將比比矣縣令漢縣令有自孝亷舉者趙廣漢王導劉輔尹賞平當有自賢良舉者魏相貢禹有自直言舉者王導有自方正舉者房鳳有自茂才舉者薛宣龔勝有自四行舉者何武有以能治劇而選者何並原陟陳導尹賞有自郡吏積功而選者朱博王訢則登進之路亦廣矣有遷郡守者王導魏相何並召信臣陳萬年有遷刺史者朱博有遷諫大夫者劉輔有遷京輔都尉者趙廣漢王訢有遷御史中丞者薛宣亦有吏民所愛而増秩復留者焦延壽超遷之賞亦厚矣魏相為茂陵詐御史傳者至於棄市何並為長陵侍中犯法者至於斷頭胡建捕客於葢主之家義縱不少貸太后外孫之罪權任可謂重矣然謁郡守步入府而因吏迎謁其子之使者至負弩以前驅督郵察縣得以按劾記檄所及不免解印甚而繡衣使者欲斬王訢買馬不具欲斬長安令恩遇不隆莫此為甚此汲黯所以受責歸田里孔光所以自免歸教授貢禹一受責而解官即去也前漢循吏傳稱守不稱令廣漢之在陽翟焦延壽之在小黄王尊為虢令朱博為櫟陽令皆良吏也而傳不之載縣令弦歌自娛者致割雞之喻操刀未能者貽製錦之譏夫縣令之職乃民之師帥而教化惠養所宜先焉非徒曰紆墨綰銅賦田園之蕪醉河陽之花而已今也闕其慮牒訟裝其懐弄權於雁鶩之行倚法為膺虎之暴溪壑其誅求星火其督促間有魁壘之才一納於流俗之繩墨非舍逺而就近則以不合於有司之程度而去矣作令亦足以濟民前輩嘗謂達則願為卿相窮則願為良醫某亦自謂大則願宰天下小則願宰一邑葢卿相之與良醫窮達雖不同而濟人則一也宰天下與宰一邑小大雖不同而濟人則一也縣吏曠職而宛轉以自全銜帶勸農而實不副職寄營田而事不講平時出郊不過以飲酒遊山為樂幸而刺史責之則求援於監司而免矣監司劾之則求援於臺省而寛矣臺省攻之則求援於宰執而脱矣疊遞相陵等級相制縣道窘迫難為積年拖欠前政已去而尚須帶納征亭商税差官監收而又令補解昔之匱窘者今已變而為敗缺昔之富厚者今已變而為煎熬未赴者有償邑債之憂已赴者有蹈鑊湯之歎至於掉頭吐舌不敢反顧頻年豐稔猶艱支吾歳一不登立見狼顧是以因訟事而科罰其初數十千羨至數百千用歳課而預借其初一二年旋至五六年州縣貪殘害民等事科罰之賦私入以為己物沾籍之法輕用以為己威兩淮之陸運差科至於重疊而民户之流離不䘏也蜀道之夫錢敷斂至於再三而井邑之蕭條不顧也沿海諸郡之船番根括及細㣲而吏胥之奸弊不問也貪吏誅求民財困於蟊賊虐吏峻急民財困於追呼奸吏狎侮民財困於曲法懦吏委靡民財困於猾胥劉謂一握州麾便肆貪欲訟牒則不問其曲直獄市則不究其是非窮晝徹夜惟財是求常賦之外别立科名刷遞年已閣之錢立青册不移之限旬分定數納必加數或遣吏置局而拘催或差官下邑而根括縣道既極煎熬民間又難催索於是行一切之政據不根之詞開告訐之門以網無罪設羅織之獄以穽富民對人則戚戚嗟嗟謂周弊之難復對吏則唯唯諾諾議事則端有可尋是以今日有窮空州郡而無窮空之知州有貧乏縣道而少貧乏之知縣天下財賦不在朝廷不在百姓而在士大夫之箱篋州縣吏便己而害民朝列而請郡曰吾為婚嫁之未畢也家食而求郡曰吾為孥累之猥衆也勢利之結交以冀援於異日親故之饋遺以報恩於平時於是以家為郡矣改秩而試邑曰吾姑以應令而非得已也選人之為令曰吾病於徒勞而無補也於是以傳舍視邑矣朝廷無幸法郡縣無幸吏則天下無不幸之民云云朝廷不能無幸法則天下安得無幸吏天下不能無幸吏則天下不能無不幸之民矣一守之幸一郡之不幸也一令之幸一邑之不幸也是以賦取有常數而擅移預借百端以取之無䘏也財入有定額而擅發移用隂以取之弗顧也民既竭矣而斂不休力已匱矣而役未已民果何罪而吏與之仇也葢不仇民則無以資吾之苞苴也無以厚吾之囊橐也能吏良吏不同精神可以照民情風力可以駭俗聽吏之能也吁抑孰知斵喪斯民之和氣虧傷國家之至仁者未嘗不在於能吏乎夫能吏以督租辦課為能以摶奸擊强為能以一切之美觀善最為能以巧取隂奪之計無出其右為能而所謂良吏者則輸課以後期聞涖政以無能聞抑强扶弱以不得其術聞巧取賂遺以不由其徑聞然吾講求田里之隠陋則吏之以能名者往往有賦毒於蛇政猛於虎民敢怒闕於天而籲無告者而郡有循吏則政藏於市㕓之貿易闕扵農桑之種植而良法美意則隠然於匹夫匹婦之心惜哉良吏之不多見也上雖有意於精擇然所得者辨明法令者耳鉏擊奸邪者耳知事情於鉤距者耳學道愛人於武城者誠心於單父者有乎無也三稱善於蒲不敢欺於邾者有乎無也嗟夫珥筆教訟者傳問孝之章剺耳鎖吭者深春耕之耒一邑之㣲古人之治如此正不待夫今之所謂能吏也理財者牟利如秋毫立威者用刑如刺骨知術者施鉤距文法者用刻深則必曰能吏也有用之才也持心近厚者似怯慮事過詳者似遲好持義者似迂恥言功利者似拙則必曰腐儒者無用之才也非操切之風勝而豈弟之政泯歟上供之數使之無缺留州之租足以自給則偃然自足以為稱職矣雖期㑹急於星火文移􅃤於矛㦸上之人不問也課額一有不敷綱運一有不繼則忿然遂去恨晚雖小民愛如父母百姓以為司命上之人不䘏也非撫字之心薄而催科之令慘歟孫琰饕者以民而填其貪贓之溪壑健者以民而試其屠剥之斧斤上不應以財賦責守令今天下郡縣皆為計司理財之地承流宣化字民之職皆為計司理財之官常賦辦矣雖谿壑其誅求不䘏也上供輸矣雖鷹虎其苛刻不責也不然則息爭虞芮無益督責之煩徧野農桑莫贖催科之拙世無盧坦孰肯違租賦以受罰人非何易于孰肯却𣙜茶之請以賈禍乎財賦辦則陟陞矣朘削生民剥及肌體無所考也期㑹失則貶黜矣雖撫字心勞愛養備至無所見也建章奏上分畫再三其得罪而去者非茶鹽酒税之不登則上供總司之不辦也非户部常額之過期則轉運需求之不至也詔下褒美増秩賜金其躐等而進者非額外聚斂之有餘則經費衍用之俱足也非坑冶鼓鑄之餘數則必密進留州之兩盡也財不辦則病官財必辦則病民今之試邑甚難也以易于而短於督賦君子謂之不智以冉求而事於聚斂君子謂之不仁以淵明而忸於督郵君子謂之不勇戴星而入令佐之相與語者非錢粟之説無庸議也奉文書而立者雁行以進非錢粟之計無庸書也箠楚列於庭下呌號痛楚流血被體非錢粟之事無庸急也州縣催科獄訟撫字心勞催科政拙聽訟猶人必使凡有官君子皆知從事斯語鍾師禹然至於涖官臨民之際則所謂財已竭而斂不休民已窮而賦愈急每蹈韓公昌黎之戒而有司之不犯也囹圄之空虛也刑措之不用也每不能追還隆古之舊觀何耶豈時非成康文景之世人非龔黄卓魯之流古今異習而太平官府不多見於天下耶曰非也夫綰銅章紆墨綬分民社膺胙土者孰不曰守以牧名當以惠善為先務也帥以師名當以教化為己任也官以親民為名當以撫字為意而不容有一夫之向隅也今乃不以留心撫字為稱職而以財賦促辦為任職不以甘棠聽訟為盛德而以簿書獄訟為癡兒之了官事是必有由也奉使輕相擇使敵國有事相待以相無事將觀以使今之所以使者亦輕矣曰此人也為此官也則以為此使也今歳以某來歳當以某又來歳當以某如縣令差役必均而已矣人之才固有所短而不可强其專對捷給勇敢又非可以學至也今乃强之彼有倉皇失措為夷狄笑而已夷狄觀之以為樽俎笑談之間尚不能辦軍旅之際宜其無人也丈夫生不為將得為使折衝口舌之間足矣遣使女真無謂信使再通謂之屈辱可也謂因以覘國亦可也邊諜不明彼此間隔藉一介之遣或可盡得其虚實之狀古之人有行之者鄭元璹之於可汗是也非外示羈縻之誠則無以為生聚之計古之人有行之者范蠡之於吳是也譬之奕棊面置東西取舍旁角願今日勉之所以結局者何如也使權輕重提師百萬不能攻城掉舌三寸可以縳敵故欲戰則使命輕欲和則使命重臨淄之兵志於克敵則酈生之説姑為餌而恤此使命之輕也平城之役主於弭兵則婁敬之往舉城望其有成此使命之重也爭言氊帳執節自誓固可尚矣而乃憚於復往甘言陽許信而歸報固可喜矣而乃墮其虛紿大夫出疆茍利社稷則可專之春秋之義也或恐假以生事奉使有㫖矯制造命漸不可長漢儒之論也或謂沮抑成功是將如之何而可内外官周重内輕外朝廷郡國天下之爵禄也使士大夫止為區區之爵禄者計則初何内外之分惟其愛君憂國之意有不在此而在彼者此仲山甫徂齊所以允懐而國人所以眷眷於我周公也歟均内外康王之新陟位也而誥諸侯曰雖爾身在外乃心罔不在王室雖所以勉之適所以慰之也猶曰在中在外猶一體也又稱之曰一二伯父固所尊之亦所以親之也周冢宰屬官或問三公與王論道經邦當時下兼冢宰而其所綂六十官之屬往往士大夫所不屑為之事何也此固所以論道經邦也人徒見夫内外廷宿衞之士士之賤者也烹庖饔饍之事事之辱者也魚腊酒漿醯醢之物物之微者也次舎幄帟裘服為末用而宦寺嬪御灑掃使令為冗役也而不知夫三代以還所以蠱壊人主之心術而侵奪大臣之權而茍茫茫皆是人為之葢公卿大臣内外則有限其進退則有時不得日居人主之左右前後也若夫侍御僕從之人備趨走使令之職而人主宴私玩狎之際無不與之同焉比其極也則變換其耳目惑移其心志伺候以和其㫖奢靡以中其欲小亷小謹以示其信人主一墮其中則亦何所不至哉故雖以文武之聖而侍御僕從猶樂於得正人而周公之所以相成王而詔後世哉又不獨見於太宰之屬他日立政之作尤拳拳於綴衣虎賁趣馬之微焉周内外廷相通小宰掌宫刑以貳太宰宰夫掌朝法以貳小宰皆通内外之官也故太僕傳言於宰夫宰夫傳言於小宰小宰傳言於太宰又有内宰雖掌治王内之政令亦屬於太宰以此知周之宫中府中實合為一體也漢内外無輕重之偏天下之勢有内外而輕重之權勿使有所偏舉則善矣古之人常均内外之勢而中持衡焉不泄邇不忘逺而吏之出入内外初不容有所决擇於其間漢選郡國守相髙第為中二千石選二千石為御史大夫又選博士諫大夫通政事補郡國守相其所以為内外制者未嘗不均一也文帝召季布於河東以其使酒而復之郡若有意於重内者然詔遣列侯之國為吏雖丞相周勃有所不敢辭則曷嘗不以外為重耶是以嚴助之厭承明而出補為會稽守非以内為輕外為重也其均秩之禮則然也蕭望之雅意本朝而不樂平原守非以外為輕内為重也其愛君之心則然也故助自會稽召留侍中望之自平原入為少府其出入内外安有輕重區别也哉愚甚懼乎奸邪之害正隂傾巧計使賢者不獲安處於朝而人主不加察也故汲黯迫於淮陽而不得久居位雖有出入禁闥拾遺補過之願而不克遂京房沮於石顯而出為魏郡守雖有通籍殿中以防壅塞之請而不得行若是曰人臣之顧位有所决擇内外之心其亦君見之不明哉漢初内外朝相通其後始不相関漢御史大夫屬官有兩丞一曰中丞在殿中蘭臺圖籍祕書權尊勢重與人主親近事下中丞則中丞白之大夫大夫白之丞相是中丞在内丞相御史在外外得以綂内也内領侍御史外督部刺史刺史掌奉詔條察州郡治狀黜陟能否以六條問事而奏事復上於中丞是部刺史在外中丞在内内得以統外也要之漢之官制三公九卿雖列職於外而皆有屬以在内以周官之遺意求之則丞相猶太宰也御史大夫猶小宰也御史之中丞少府之尚書猶宰夫也少府之下又有大長秋猶内宰也大長秋屬少府少府中丞屬丞相御史是秦與漢之制皆近於周之制也不特此也髙帝之世御史大夫周昌嘗宴見入奏事見髙帝擁戚姬髙后之世審食其為相監宫中如郎中令公卿百官皆因之以奏事武帝之世丞相公孫𢎞亦得數宴見上或時不冠此雖非體貌大臣之意然亦可以見其洞然無内外之限矣夫是以閹宦雖寵丞相猶以檄召而詰責而大長秋中常侍猶參用士人而為之自武帝晩年宴遊内庭不出不復與士大夫接用宦者主中書而典尚書之章奏尚書之官於是廢矣既以尚書居中而憂事又置諸吏居中而舉法故當時奏下諸事自中書遞送兩府自兩府下九卿自九卿下郡國而不由中丞中丞之官於是不得居中制事而内之侍御史外之部刺史併廢矣將軍列侯而下皆得帶加官而丞相御史獨不如名曰尊之而實疎外之於是丞相御史無復有至内庭者矣末年以霍光為大司馬領尚書事宜若合内外為一然亦非丞相職任儼然號稱内朝而併奪丞相御史之權昌邑之廢丞相楊敞不及與議不惟不得至内廷且不復預内廷之事矣夫宦官典中書之任中丞無制事之權三公無加官之號大將軍領尚書之職霍光告田千秋所謂令光治内君侯治外内外朝判然如此此漢治之所由以盛衰也及光武懲外戚之用事憤大臣之竊命於是取三公之官以為閑職而職尚書及中書專委任之以為臺閣之長以舉法歸中丞而以奏事歸尚書二官雖復用事然疎外廷而親内廷矣捨大臣而近小臣矣置三公而事歸臺閣矣變前世委任士人之制而專用奴僕薫腐之餘矣桓靈之季御史之權盡歸於尚書尚書之權又移於宦官尚書宦官合為一黨而宰相疎隔於外御史緘黙於内監自古内外之不相屬未有如東漢之甚者而其源實始於光武極其源而論之則又始於武帝使武帝不改漢初之制使三公九卿在外而以中丞尚書在内内外相屬而闗節脉絡相應則漢之制周官太宰之制也奈何快意於法度之外使内外事權分裂四出而不專領於大臣其末流遂以若是極耶漢内外常若軒輊大抵漢内外朝之勢常若軒輊方外朝之勢伸則申屠嘉得以召辱大臣及中朝之氣盛則嚴助朱買臣等輩得以數詘御史丞相太尉彼非能自為軒輊也顧人主抑揚輕重之意如何耳大抵文帝專任大臣畏服公議故外朝得志而内廷詘武帝不假大臣以權勢欲適一已之私意故多致口舌議論之私人謂之天子賓客以軋之彼其意固與資之自助以排抑大臣也故中朝得志而大臣詘唐内外官迭為輕重唐自天寶以前朝廷尊隆士大夫皆以仕於朝為榮故外輕而内重倪若水以京官選為河南採訪使不為薄矣然視班景倩貳卿之行至有登仙之歎景倩自揚州採訪入為大理少卿若水餞之於郊顧左右曰班公是行若登仙恨不得為騶從葢是時雖自朝廷冗官擢為方面者嘗自謂下遷其後一經中華之變故自是朝廷不尊外勢轉輕而為重加以刺史月俸至千餘緡而方鎮所取無藝京官之禄浸浸寡薄故薛邕由左丞刺歙州此貶也而家人恨降之晩崔祐甫任吏部員外而有洪州别駕之求自方鎮入八座至謂罷權凡幕府賔僚有所忤於主帥者始薦入為郎吏其嘗遷臺閣者又寧以不赴取罪去矣然推原士大夫所以恥立於朝廷之故葢亦有謂是殆不在於區區俸禄而已李泌增俸之請毋乃見其一未見其二乎盧懐慎曰明主之於萬物平分而無偏施以罪吏而牧遐方是謂惠近而遺逺彼逺方何負聖化而獨受其惡政乎宋朝均内外州縣為滯路朝廷為經途重内輕外人情大抵然也雖然亦在乎所以取之如何耳祖宗典憲改秩者必宰邑典郡者方除郎寺監丞之既更必出千里之地郎官卿監之已厯必分一道之節更迭之制為一代之良法是陳若拙知潭以辭而被責郭贄知天雄雖辭而卒遣祖宗之職令如此孰敢以外地為輕哉趙昌言之知天雄以能政稱而參大政劉昌言倅河南以言事稱㫖而知樞密院祖宗之恩賞如此孰不以外地為重哉當是時風俗渾厚人知義命張知白身在館閣而乞領外郡韓授官至正郎而自請知縣不計品位之崇卑不論禄秩之多寡惟知盡瘁報國而已其用心之厚何如哉今之縉紳奔競成習居内則為遷在外則為黜亦豈盡無張知白韓授輩然不可謂皆若人也祖宗黜陟之法盍亦講而行之乎紹興之詔曰卿監郎官更迭補外侍從有闕選守臣監司此法而可行也乾道之詔曰外有治效擢之内職内有實績擢之外任此令尚可申也外官月俸尤更豐足有能以唐為言如范仲淹富弼者乎二千石治效増秩賜金有能以漢制為言如昔人者乎不然彼方有登仙之望吾乃强之以勞人之職亦終於不樂而已矣不樂其職何以牧民帖職祠禄國家之所以遇臣下者至矣盡矣不可以有加矣特未知臣下之所以報君為民之意如何耳夫居其位而後享其禄任其事而後安其榮必也上無負於君下無負於民中無愧於心而後可也今也朝廷大臣至於州縣小吏有居其名而不在其位者有尸其位而不治其事者不知其幾人也或閒居而祠祿或優寵以職名或坐展磨勘或例沾郊賚或引年有加恩或老死有遺澤考之漢唐典故自食邑致仕奉朝請外所未聞也其視自提壺飱仕無廩俸之代為如何耶國家之所以待臣下者至矣盡矣不可以有加矣王安石乃挾祠禄以為擠屏之具司馬温公提舉嵩山崇福宫凡四任神宗末年欲用光而蔡確王珪沮之乃已蔡京乃假職名以為寵利之私其所以報君為民又何如哉臣之厚民之薄勢使然也羣書考索續集卷三十七
