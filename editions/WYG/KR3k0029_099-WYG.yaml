body:
  text: 羣書考索後集卷三十三宋章如愚編士門春秋人才僖伯之諫觀魚隱五年哀伯之諫納鼎桓二年皆能陳先王之禮制臧文仲雖有三不仁不智之譏文三年至於請糴於齊莊二十八年設備於邾僖二十二年諫焚巫尫僖二十二年則其可取者也臧武仲雖有求後之失至於不詰魯盗襄二十一年而謂軌度其信而後可以治人者此其可取者也魯欲伐齊曹劌能以察獄之忠而致一戰之勝莊十一年齊侯伐魯展喜能以成王之盟使之釋兵而反斾僖二十六年子家羈心衛社稷不肯從季氏欲與從政之願定公元年言與行合可謂忠臣矣况以子路之勇子貢之辨冉求之藝皆聖人之徒也由之一言足以使小邾射之信過於千乗之盟賜之一出存魯而破吳強晉而伯楚齊之伐魯冉子請背城而戰以敵齊之車師親用矛焉而卒獲齊之甲首襄十一年此皆魯之人才也管仲有治國致民之才而相桓公作内政以制兵故南至召陵北伐山戎諸侯莫敢違史齊世家兵車之㑹三乗車之㑹六九合諸侯一匡天下齊之所以強天下者法制之得也嘗觀其責包茅於伐楚僖四年定世子於首止僖五年甯母之謀鄭僖七年而有招攜懷遠之言葵丘之㑹諸侯僖九年而有尊賢育才之訓於賜胙之命亟修下拜之恭於上卿之饗而退辭下卿之禮僖九年勸齊侯不背曹沬之盟史曹沬傳而示信於諸侯相齊侯伐山戎以救燕史齊世家而使燕納貢於周仲尼以為民到於今受其賜論語則仲之才蓋可知也晏平仲以節儉力行而事二君有補於世若踊貴屨賤之言昭三年而能使齊侯之省刑衡鹿舟鮫之言而能使齊侯之薄斂昭二十年以獻可替否之相濟而力辨夫和與同之異以禮之可以為國而欲已夫陳氏之難昭二十六年此皆齊之人才也趙衰之佐史晉世家文公深知而多謀勸公子之先入能以得周而為言以至文公蒐於被廬衰則進郤縠以其說禮樂而崇詩書可為元帥文公命衰為卿辭以欒枝之智先軫之謀胥臣之多聞可以為輔士㑹之賢范武子趙文子以為利其君檀弓不忘其身謀其身不遺其友晉人謂文子之知人及宋之㑹襄二十七年子木問武子之德文子以為夫子之家事治言於晉國無隱情祝史陳信於鬼神無媿辭子木曰人神歆之宜其光輔五君為盟主也今觀城濮之戰士㑹尚幼已有獻俘授馘之功位將中軍則晉國之盗逃奔於秦因殽烝之問而能講求禮典以修晉國之法則士㑹之德可知矣魏絳戮揚干之僕合於軍禮論和戎有五利為國之福叔向博識文辭以禮信為國使晉多取重於諸侯治國制刑而不隱於親孔子以為遺直魏獻子舒之為政也以舉賢人仲尼聞魏子戊之舉以為近不失親遠不失舉昭二十八年可謂義矣韓宣子聘魯觀周禮於太史氏見易象與魯春秋昭二年則知周禮之盡在魯及周之所以王此皆晉之人才也子産多記識書善辭令外雖慈愛而守勁正子太叔問政對以政如農功襄二十五年且謂有德者能以寛服民晉取諸侯之幣重則告以長國家者在於有德能使范宣子之輕幣襄二十四年及其為政都鄙有章上下有服田有封洫廬井有伍大夫之忠儉者從而與之泰侈者因而斃之襄三十年輿人之誦已至有子産誨之子産殖之之言方其不毁鄉校仲尼以為仁襄三十一年合諸侯藝貢事仲尼以為禮以學而後入政答子皮為邑之問襄三十一年以茍利社稷解國人丘賦之謗昭四年此皆鄭之人才也子木問聲子以晉大夫與楚孰賢歸生對以楚雖有才晉實用之楚失華夏則析公之為也楚失東夷則雍子之為也楚罷於奔命則子靈之為也楚失諸侯則苗賁皇之為也孫叔敖為相王以幣輕更小為大百姓不便孫敖則復請如故葉公之使齊孔子以命義天下大戒之語訓其行葉公之為政孔子則以近恱遠懷之言而答其所請凡有所為問而後行諸梁之賢於人也遠矣子木使為掩書土田而度山林賦車籍馬楚是以興左史倚相能讀三墳五典八索九丘右尹子革作祈招之詩則楚之人才亦盛矣歴代人材國家求賢之道必於閒暇無事之時賢者報國之功乃在於緩急有為之際棫樸之人才至於濟濟之多卷阿之吉士至於藹藹之盛三有宅克即宅是三宅之有其人也三有俊克即俊是三俊之有其人也至於中興之時有張仲孝友以導之於左右有仲山甫之垂式於百辟蕃宣之寄足為南國之式者申甫也平淮之難足以致四方之平者召虎也是以當時頌中興之盛則以為任賢使能焉漢高之興駕馭英雄廣覽豪俊轉給餽餉則有蕭何謀謨帷幄則有張良戰勝攻取則有韓信其餘彭越英布之徒莫不各以才勇而自効孝武之時得人為盛儒雅則公孫𢎞董仲舒文章則司馬遷相如奉使則張騫蘇武將帥則衛青霍去病孝宣招選茂異蕭望之夏侯勝以儒術進劉向王褒以文章顯將相則趙充國魏相丙吉治民則黄霸龔遂趙廣漢光武中興而鄧禹杖䇿渡河首論大計而有延攬英雄之說故任使諸將多訪於禹每有所舉各當其才是以敢戰深入若賈復馳志伊吾如臧宫馬武守河内而給足軍糧者冦恂排衆議而憂失河北者邳彤也馮異之平三輔岑彭祭遵之平隴蜀二十八將之才足以正東都再造之業至於三國各自據其土而成鼎峙之勢亦諸人之力也故在魏則荀攸賈詡之筭無遺䇿郭嘉劉曄之才䇿謀畧管寧之淵雅高尚毛玠之典選清正在吳則周瑜魯肅之儔入為腹心出為股肱甘寧凌統之徒奮其威黄蓋蔣欽之屬宣其力在蜀則諸葛孔明之長於治國費禕董允之志慮忠純向寵之性行均淑皆一時之人傑也蓋至於晉則王戎王衍之徒皆以浮誕相尚而人才遂流於虚雖王導能收拾賀循顧榮扶持江左之基祚而此風猶未盡變祖逖擊楫之志則不能用也陳穎之正論則不能容也其後褚褒殷浩竟以虛名而不能成效太宗造唐之初房𤣥齡收采人物致之幕府杜如晦參謀軍事剖决如流登瀛之選更畨入侍以討論文籍𢎞文學士内殿講論以商𣙜政事魏徴以諫諍為己任知無不言而馬周之才聞一常何之薦則督促者數輩即日召用迭運新進而天下無遺才之嘆此所以致貞觀之盛也出張說而相姚宋二人相繼用事而應變成務則崇之長也持法守正則璟之長也同心輔佐而尤急於擇人隨才授任使百官各稱其職此所以致開元之盛也元和之初首用杜黄裳而置之宰輔振立紀綱裁抑藩鎭白居易之徒皆得以盡言而無忌裴垍李絳又相與開闢言路推輓人才李絳之劾李吉甫崔羣之論皇甫鎛韋貫之論張宿皆有犯顔納諫之忠此所以致元和之盛也宋之人才莫盛於慶厯元祐之時輔弼之臣則有若杜衍吕夷簡韓琦范仲淹之徒裁抑恩倖者衍也以黜陟人才為職者仲淹也夷簡之志畧深沉韓琦之足辦大事則其居輔弼之任為如何臺諫之臣則有若歐陽修余靖蔡襄唐介之徒經筵之官因讀正統而進諫有如杜詢因讀漢書而致戒有如丁度因講經而㣲諷有如楊安國史館之士則張方平以直諒聞劉庾義以該博聞孫輔以抗直聞豈非慶厯之盛乎元祐之時輔弼之臣則有若司馬光吕公著文彦博吕大防之徒更保甲而罷新法放市易而去方田者光也緫揆路而除吏妙選一時端良之士者公著也彦博之夷狄知名大防之力挽祖宗家法則其居輔佐之任者為如何臺諫之臣則有如朱光庭范祖禹蘇轍梁燾之徒經筵之官因讀寶訓論鈔法有如顧臨因讀寶訓而推崇好生之德有如韓淮欲以陸䞇奏議而備講讀有如蘇軾史館之士有直筆之稱者黄庭堅也有文學之譽者張耒也蔡襄之以文藻自奮陸佃之以著述自見豈非元祐之盛乎人物一代之人物必有一代之名譽天下之公論係焉不可誣也晏平仲事齊三世甘茂起於閭閻而皆顯名諸侯陸賈勸陳平交歡周勃而游於漢庭公卿之間名聲籍甚韓安國所推舉天下名士而天子以為國器楊惲之才能好交英俊而名顯朝廷尹翁歸之清潔自守不以行能驕人而甚得名譽此皆名之著於朝廷者也以范蠡之三徙而成名於天下灌夫之破吳軍而名聞於天下荀淑之清識難尚鍾皓之至德可師而李膺實以此稱之謝安雖處衡門而自然有公輔之望此皆名之著於天下者也季布之諾季心之勇而俱聞於關中鄭當時之聲聞梁楚而山東諸公又翕然有鄭莊當時字莊之稱雋不疑之進退以禮而名聞於州郡此皆名之著於郡國者也威名之盛流聞匈奴則有若趙廣漢者焉名聲逺布為元魏李孝伯之所訪問則有若宋謝莊者焉有蕭夫子之名而外夷願得以為師則有若唐之蕭頴士者焉此則名之著於外域者也道德彬彬則有若馮仲文豹德行恂恂則有若召伯春馴天下規矩則有若房伯武植天下模楷則有若李元禮膺不畏強禦則有若陳仲舉蕃天下俊秀則有若王叔茂暢以至德行堂堂有若魏邢子昻顒後進領袖則有若裴秀渤海赫赫有若晉歐陽堅石建洛中英英有若晉荀道明闓洛中奕奕有若劉輿劉琨盛德絶倫有若趙郗嘉賔江東獨歩有若王文度坦之此皆名之見於誦詠者也龔勝龔舎則謂之楚兩龔周澤孫堪則謂之二穉澤字穉都堪字子穉李固杜喬李膺杜宻則皆謂之李杜鄧彪宗武伯之徒則謂之南陽五伯陸機陸雲則謂之二陸張載張恊張𤣥則謂之三張孔敬康瑜張瑋康茂丁世康揮則謂之㑹稽三康晉謝𤣥張𤣥則謂之南北二𤣥顔延之宋謝靈運則謂之顔謝齊陸倕兄弟則謂之三陸北齊之邢邵温子昇則謂之温邵邢邵之與魏攸則又謂之邢魏若乃中興三明京師三明則皆諸葛恢荀闓蔡謨皆字明道其人也凉州三明後漢則段紀明皇甫威明張然明其人也二劉則劉焯劉光伯也二蓋唐則蓋文達文懿其人也二蘇後周則蘇亮蘇綽其人也沈宋則沈佺期宋之問其人也蘇李則蘇味道李嶠其人也蕭李則蕭頴士李華其人也元白則元稹白居易其人也劉白則劉禹錫白居易其人也此皆名之見於並稱也八士則出於周三傑則出於漢諸葛亮關羽張飛則謂之蜀三傑宋璟張說源乾曜則謂之唐三傑富嘉謨吳少㣲魏谷倚並負文辭則謂之北京三傑竇武陳蕃之徒號為三君而陳實父子亦曰三君李膺荀昱之徒號曰八俊而劉表亦曰八俊郭林宗之徒則曰八顧張儉之徒則曰八及度尚之徒則曰八厨劉表與張隱之徒則曰八交以與劉翔之徒則曰八友而八交者亦有八顧之號龎參禰衡則樊凖孔融比之為一鶚樊凖薦參孔融薦衡皆云鷙鳥累百不如一鶚蜀馬良兄弟則謂之馬氏五常顧榮陸機陸雲則謂之三俊石崇歐陽建陸機之徒則謂之二十四友阮放郄鑒等則謂之兖州八伯方伯達伯之類薛兼紀瞻等則謂之五雋而張華又目之為南金晉胡母輔之輩謂之四友而謝靈運何長瑜之徒亦有四友之目若曰四族之雋者則孔沈魏顗輩也郎氏二賢者則郎知平郎餘令也號為四傑者則楊炯王勃輩也陳留八俊者格處仁王孝逸輩也出唐格輔元傳河東三絶則有若徐彦伯之徒唐竹溪六逸則有若李白孔巢父之徒號為四䕫則有若崔造韓㑹之徒至於龍鳯目之者若荀淑諸子則謂之八龍而獨推慈明荀爽之字之無雙晉卞粹兄弟則謂之六龍而獨推元仁粹之字之無雙後漢許䖍許劭則謂之平輿二龍而汝南俗有月旦評之號魏華歆邴原管寧則謂之三人為一龍諸葛孔明龎士元則謂之伏龍鳳雛晉索靖輩則謂之敦煌五龍晉温羡諸父則謂之六龍薛收薛元敬薛德音則謂之河東三鳯至於以珠玉目之者若晉郄詵則謂之崑山片玉夏侯湛潘岳則謂之連璧王勃兄弟則謂之三珠此皆名之見於標目者也以馬威卿馬孺卿後漢而謂之鉅下二卿以張湛而謂之中東門君以王敬洪而謂之王東山以王績唐而謂之東臯子以白履忠唐而謂之梁丘子以李栖筠而謂之賛皇公此名之係於地理者也若賈誼則劉向以為古之伊管未能逺過若諸葛孔明則陳壽評之以管蕭之亞若王導則桓彛比之以為管夷吾若王儉則李延壽謂其雅道自居早懷伊吕之志而衣冠禮樂盡在於是若王鎮惡則李延壽謂其推鋒直指前無強敵為周之方叔若崔浩則自比於子房若劉湛則自比之於管葛若坦崇祖則自比於韓白而齊高帝獨許之若任昉則王僧孺論之以為過於董生若房𤣥齡杜如晦則唐史賛之以為蕭曹之勲不足過此皆名之見於比擬者也兩漢諸儒唐書儒林賛曰左氏與孔子同時而公羊高榖梁赤皆出子夏門人自三代而降儒者之盛莫兩漢若也今以西都言之大抵諸儒相傳授而枝分𣲖别有可論者故言易則自淄川田生言書則自濟南伏生言詩於魯則申培公於齊則轅固生於燕則韓太傅言禮則魯髙堂生言春秋於齊則胡母生於趙則董仲舒此其大畧也及攷其傳授則易之名家有四一曰田何之易自商瞿子木受之於夫子數傳而至於何又數傳而至於施讎孟喜梁丘賀由是易有施孟梁丘之學若乃王子中周王孫丁寛亦皆受易於田何有以見當時之言易者皆本之於何矣二曰京房之易房授之焦延壽劉向攷易諸家謂延壽獨得隱士之說以房為異黨故别為京氏之學三曰費直之易長於卦筮以彖象繫辭十篇文言解說上下經而傳之王璜四曰髙相之易其學初無章句專說陰陽灾異而授之子康及母將永髙費二家皆未嘗立於學官至於後漢建武中陳元鄭衆皆傳費氏易其後馬融亦為之傳融授於鄭𤣥而𤣥則為之注荀爽則又為之傳自是費氏興而京學衰矣然則易之所傳授者蓋如此書之名家者有三自伏生而傳之歐陽生自歐陽生而傳之兒寛而書遂有歐陽之學張生再造而至夏侯勝勝又傳而至於夏侯建而書遂有小大夏侯之學勝宣帝時議廟樂下獄黄霸從勝受經獄中勝言洪範傳取重霍光建問五經諸儒與尚書相出入者建牽引章句具文飾說勝非為章句小儒破碎大道建非勝學䟽畧卒自專門名經建勝之從兄子也若東漢之牟融則習為大夏侯之學者也王良則習為小夏侯之學者也桓榮則習為歐陽氏之學者也榮義世習相傳東京最盛其源流之逺如此孔氏有古文尚書安國以今文字讀之因以起其家逸書得十餘篇而司馬遷亦從安國學故遷書載堯典禹貢洪範諸篇多古文說是時猶未立學官後漢之杜林實傳古文賈逵為之作疏馬融為之作傳鄭𤣥為之注解而古文尚書遂顯於世然則書之所傳授者蓋如此詩之名家者有四魯詩則自申公授之於浮丘伯與褚先生俱而瑕丘江公能傳之若許生徐公亦皆守學教授者也韋賢以詩事江公許生而傳於𤣥成韋賢之子故魯詩有韋氏之學王式以詩事徐公許生而式之傳又有張唐褚氏之學齊詩始於轅固諸齊以詩顯貴皆固之弟子而夏侯始昌授之后蒼自蒼而後齊詩則又有翼奉匡衡師丹伏理之學韓詩始於韓嬰燕人孝文時為博士推詩人之意以作内傳四卷外傳六卷自嬰之後韓詩則又有王吉食長孫之學至於毛詩則始於趙人毛公以授貫長卿後又有徐敖傳之故言毛詩者皆本於敖若齊若魯若韓皆立博士而毛氏獨未之立焉至東漢之鄭衆賈逵皆傳毛詩而馬融則又為之傳鄭𤣥則又為之箋顯宗建初八年詔諸儒選髙才生受毛詩由是遂行於世此則詩之所傳者然也禮之名家者有三自高堂生傳士禮十七篇其後瑕丘蕭奮以授后蒼蒼授戴德戴聖慶普故禮有大小戴慶氏之學二戴之與慶氏皆立博士而孔安國所獻禮古經五十六篇及周官經六篇前世傳其書未有名家者焉建武中曹充習慶氏之學傳其子褒遂撰漢禮而鄭衆傳周官經馬融亦作周官傳授鄭𤣥𤣥又作周官經𤣥本習小戴禮後以古經校之取其長者為鄭𤣥學又注小戴所傳禮記四十九篇通為三禮經此則禮之所傳授者然也春秋之名家者有三自胡母生授公羊春秋與董仲舒同業而齊之言春秋者宗主之其後如嬴公如眭孟如嚴彭祖如顔安樂皆以學彰此皆公羊之學也自瑕丘江公受榖梁春秋於魯申公其後如榮廣如尹更始如房鳯皆以其名顯此皆榖梁之學也自賈誼為左氏傳訓以授貫公數傳而至於尹咸更始子也翟方進賈䕶之徒故劉歆從翟尹以受左氏由是言左氏者本之賈䕶劉歆焉此所謂左氏之學也公孫𢎞本學公羊及相武帝又比輯瑕丘江公及董仲舒之議而卒用董生於是武帝尊公羊家而榖梁浸㣲至宣帝時召蕭望之等大設公榖同異而多從榖梁其後劉歆欲建立左氏於學官房鳯王龔皆與也至於移書以責太常逮建武中鄭興陳元皆傳左氏之學而元又從而訟之遂立左氏博士顯宗時賈逵言五經家皆無以證圖䜟明劉氏為堯後者而左氏獨有明文由是遂行於世此則春秋之所傳授者也五經家皆言顓頊代黄帝而堯不得為火德左氏以為少昊代黄帝問官名今攷西漢儒林傳所載自丁寛以至髙相則為易自伏生以至孔安國則為書自申公以至於毛公則為詩自髙堂生及孟卿則為禮自胡母生以至於房鳯則為春秋後漢儒林傳之所載自劉昆以至於孫期則為易自歐陽歙以至於楊綸則為書自髙詡以至於衛宏則為詩自慶普至鄭衆則為禮自丁恭以至於謝該則為春秋獨董鈞以禮名家皆昭昭可見者習慶氏禮永平中為博士時草創五郊祭祀及宗廟禮樂等多令參議多從用然漢之諸儒於經各自名家漢之為制每家則各立博士初叔孫通為博士是時雖有博士之官而挾書之律猶未除至惠帝除挾書律孝文復廣游學之路而天下衆書往往頗出論語孝經爾雅皆置博士至五經家得列於學官者不過詩而已矣故申公韓嬰皆以詩為博士翟酺曰文帝始置一經博士蓋謂此也景帝復立齊轅固詩而他經猶未立也至武帝憲章六學始罷傳記博士獨立五經故孟堅之賛儒林有曰武帝立五經博士開弟子員設科射䇿勸以官祿訖於元始百有餘年傳業者浸盛一經說至百餘萬言大師衆至千有餘人蓋利祿之路然也初書惟有歐陽禮惟有后蒼易惟有楊氏楊叔光受易於田何春秋惟有公羊而已夫立五經而獨有四蓋詩經已立於文帝時今并詩為五耳至宣帝世於書則復立大小夏侯於易則復立施孟梁丘於禮則復立大小戴於春秋則復立榖梁在元帝時於易則復立京氏在平帝時則又復立左氏春秋毛詩逸禮與夫古文尚書從劉歆之言也光武中興易有施孟梁丘京氏儒林傳書有歐陽小大夏侯詩有齊魯韓氏禮有大小戴春秋有公羊嚴顔凡十四博士今載於百官志乃太常之屬也肅宗建初中㑹五經於白虎而又詔高才生受古文尚書毛詩榖梁左氏春秋雖不立學官然皆擢髙第為講郎所以網羅遺逸博存衆家此其大畧也雖然兩漢諸儒之經術豈茍然哉若丁寛字子襄景帝時為梁孝王將軍距吳楚之讀易精敏而作易說三萬言訓故舉大誼而已今小章句是也寛與王子中周王孫又皆著為易傳顯名儒林后蒼之兼通詩禮而作后氏曲臺記后蒼字近君夏侯勝之善說禮服轅固之不曲學阿世申公力行之說王式三百五篇之諫字翁思諫昌邑王也韓嬰之論事上前雖仲舒不能難以至梁丘賀之筮墮劒宣帝時字長翁長於災異京房分卦直日之法長於占驗此其所以見述於西漢也作考課法公卿刺史以煩碎不可行因石顯之譛棄市字子玉若洼丹之學義研深而作易通論七篇景鸞之能治詩易而作易說詩解又撰禮内外記號曰禮畧任定祖安也之居今行古楊子行政也之說經鏗鏗戴馮字次仲之解經不窮鍾興字次文之學行高明召伯春馴也之德行馴馴董鈞字文明之號為通儒丁恭字子然之學義精明周防之撰尚書雜記許叔重名慎之五經無雙又作說文解議十二篇而作五經異藝之書以傳說臧否不同何休之精研六經而作訓詁春秋公羊墨守左氏膏肓穀梁廢疾之書又以春秋較漢事而妙得公羊之本意不窺門十七年以至衛宏字敬仲之好古學宏作漢舊儀四篇以載西京雜事又著賦頌誄七首行於世旣從謝曼卿受詩作毛詩序善得風雅之㫖復從杜林受古文尚書以作訓㫖之篇服䖍字子慎亦作左氏傳解且以左氏六十條駮何休漢事之說此其所以見述於東漢何休駮漢事六十條自謂妙得公羊本意然西漢之儒治春秋明經術者有若董仲舒者矣學春秋雜說有若公孫𢎞者矣時行賃作帶經而鋤有若兒寛者矣疏廣之明春秋夏侯始昌之通五經李尋之好洪範翼奉之明經術而有六情十二律之論師丹之深於議論而多切直之言其他如篤志於學號為鄒魯大儒者韋賢也兼通五經能為騶氏春秋者王吉也經學精習說有師道匡衡也文義至深度越諸子者揚雄也好古強博集為七畧者劉歆也議論通明以禹貢行河有如平當者焉明經潔行定宗廟之祀有如貢禹者焉身為儒宗有如蕭望之者焉經學明習有如翟方進者焉以至於兩龔鮑宣眭孟之徒亦皆以明經顯於世而不載於儒林傳者何哉東漢之儒其好古學明於左氏周官長於厯數有若鄭興者矣兼通五經榖梁之說尤明左氏春秋有若賈逵者矣字景伯博通五經有若馬融者矣字季長經傳洽熟號為純儒有若鄭𤣥者矣桓榮之明經稽古榮字春卿時賜以車馬榮曰今日所䝉稽古力也顯宗辟雍初成拜為五更丁鴻之殿中無雙鴻字孝公從榮受歐陽學論難白虎觀鄭衆之兼通經傳持節使匈奴而不肯少屈顯宗時從鮑駿子以家事廢國家之言還就國陳元之為學者所宗而上疏光武不可有察公輔之名皆其不可泯者及觀其淵源之際則鄭興傳之鄭衆司農字仲師賈逵本之賈徽逵父也傳父業而東都遂有賈鄭之學故撰左史條例校三統厯者鄭興也條奏左氏三十事肅宗時尤著明者皆君臣之正義父子之紀綱撰歐陽大小夏侯尚書古文同異齊魯韓詩毛氏異同及為周官解故者賈逵也作陳春秋推記條例者鄭衆也著三傳異同之說為注孝經等詩易諸經之注則出於馬融病賈逵鄭衆之注曰賈君精而不博鄭君博而不精故作三傳異同說時欲廢蒐狩之禮息戰陳之法融初上廣成頌諷不可廢講武忤鄧氏㫖後懲艾為梁兾草章奏作大將軍西第頌為正直所羞發墨守鍼膏肓起廢疾作六藝論毛詩譜周禮難以及於五經之異義則出於鄭𤣥而亦不載於儒林傳何耶得非其出於事業他有可書者於史氏之條列固當别出邪不特此也東漢之儒其博洽多聞則推之於杜林閉户講論則推之於魯恭五經復興則推之於魯丕經為人師則推之伏湛博學多通尤好古學則推之桓譚如馮豹之道德彬彬翟酺之四世傳詩周舉之五經縱横道古今者盧植也其學本於馬融而能作尚書章句三禮解詁濟世美者崔植也而其學本於駰爰而能與諸儒博士雜定五經延篤之論解經傳而服䖍以為折中蔡邕字伯喈之正定五經而後儒咸所取正若乃公羊嚴氏春秋樊鯈之冊定章句既以樊侯名其學矣而張霸以為猶多繁碎復施減定之力焉東都之儒不旣盛乎范蔚宗乃曰東京學者亦各名家而守文之徒滯固所禀異端紛紜互相詭激遂令經有數家家有數說章句多者或乃百餘萬言獨鄭康成括嚢大典網羅衆家刪裁繁誣刋改漏失自是學者畧知所歸范甯每攷先儒經訓而長於康成常以為仲尼之門不能過也及傳授生徒並專以鄭氏家法云吁即此可以論東漢諸儒之學矣唐自太宗銳情經術開文學之館召名儒之流且命學士番宿更休與之討論古今道前王成敗之事日昃夜艾未嘗少怠而又讎正五經頒之天下使諸儒作為義疏以久其傳至於𤣥宗亦詔羣臣舉通經之士而褚無量馬懷素之徒勸講禁中加以尊禮集賢院之部分典籍乾元殿之博彚羣書至六萬卷由是開元之世經籍大備唐世儒學之盛良有以也且當時之儒者果何如哉博通五經明於左氏有如徐文逺曠著書博辨撰為釋文有如陸徳明精於詁訓考定五經有如顔師古字籕有注班書撰孝經章句作五經義訓有如孔頴達字仲達貞觀中講以能問於不能達與師古同受詔為之詔號義賛後詔改為正義以至王恭之三禮義證號為精博王元感之詆先儒同異號為五經指南武后時撰書糾繆春秋振滯魏知古歎曰五經指南也褚無量之講經博敏尹知章之徧明六經鄭餘慶之奏對多傳經義而行已全㓗鄭覃之經術該深而刻定石經鄭絪之進以儒術而守道寡慾此則以經行明名者也徐堅等薦奏裒為儒宗博貫經史有若歐陽詢字信本者焉與魏徴虞世南裒次經史百氏以太宗欲知前世得失故也帝王興衰之要有若蕭德言者焉太宗愛其書博而要史筆之美比方陳壽有若敬播者焉博通經史有若馬懷素者焉此則以經史顯者也以商踐猷之博學多通而有五緫龜之名謂龜千年五聚問無不知也元行冲之博通故訓梁太常任昉而能辨古銅器之作有人得銅器於古冢曰此阮咸所作也命易之木為之遂謂之阮咸孔若思之多識古今而當時之大政必咨而後行徐堅之諳識典故而當時之譔次蓋由於高選路敬淳之明於姓系而以譜學名其家栁冲之學而以姓系著乎錄唐初姓系譜學惟敬淳名家後柳冲韋述等皆祖之初太宗命諸儒撰姓氏志則天時復詔冲及徐堅吳兢等討綴書成號姓系錄若乃曹憲之䆳於小學而能復興古文註述廣雅武平一之博學通春秋而能答崔日用三桓魯也七穆鄭也之問晉六卿齊楚執政之數唐武平一傳崔日用問武平一曰魯三桓鄭七穆如何答曰慶父叔牙季友桓三子矣孟孫至彘凡九世叔孫舒季孫肥凡八世鄭穆公十一子子然及二子孔三族亡子羽不為卿故稱七穆子罕子駟子良子國子卬子游子豐也一坐驚伏平一問日用曰公言齊桓公楚莊王時諸侯屬齊若幾平公靈王時諸侯屬晉楚凡幾晉六卿齊楚執政幾何人日用謝曰不知平一條舉始末無留語鄭欽說之博物而能辨甸服黄鐘之銘初梁大傳任昉於鍾山得銘曰甸服黄鐘當時莫能辨欽說得之於長樂驛至敷水三十里而悟曰云云人服其智此則以博學聞者也寧拒觀史之詔而不肯開史官之禍守職不屈若朱子奢者其直節為如何能變豪奢之習而省損騶馭之數聞風自化若栁公權楊綰者其清節為如何不特此也𤣥宗尊尚經術選置學士而張說實倡之至於用天下知名之士佐佑王化粉澤典章成一王法使開元之盛見述於後世則說之功為多焉唐之諸儒大槩如此而其間以傳授名於世者若啖助之淹該經術善為春秋考三家之短長而集傳例統之書作又有趙康字伯循陸䞇為之高弟而纂例之書出焉雖然儒亦患於難全也顔師古於古篇竒字討析雖熟而讎校之際使商賈之徒亦竄選中孔頴達之義賛包貫雖詳而其中不能無謬冗馬嘉運駮正其失互相譏詆而啖助之言春秋亦多鑿意得不有惜於此哉唐三百年間獨韓愈者與孟軻揚雄相為表裏遂以六經之文為諸儒倡史氏謂其所得粹然一出於正皇皇仁義篤道君子信矣自今攷之論宫市諌佛骨雖之死不悔逐鰐魚諭庭湊軍其感人動物有如此者至於三上書宰相潮州謝表蓋將祿仕於諸侯與庻幾憲宗之改耳退之自謂文皆約六經之㫖舉其大槩聖德詩約乾之文言也别知賦約詩之谷風者也佛骨表有似無逸之書進學解有似學記之說乃若符讀書城南或謂誘人以利祿之學孰知約宵雅肄三之意感二鳥賦或謂有羡於榮光孰知約飲食教誨之旨至於原道師說等數十篇皆奥衍宏深佐佑六經其道蓋自比孟軻以荀况揚雄為未純自晉迄隋佛老顯行聖道不絶如𢃄諸儒倚天下正議助為怪神愈獨喟然引聖爭四海之惑雖蒙訕笑跲而復奮始若未之信卒大顯於時昔孟軻距楊墨去孔子才二百年愈排二家乃去千餘載撥衰反正功與齊而力倍之所以過况雄為不少矣自愈没而其言始行學者仰之如太山北斗云羣書考索後集卷三十三
