body:
  text: 羣書考索卷六十宋章如愚撰地理門州郡類魏州郡魏武建鄴闕自生靈版蕩闗洛荒蕪所置郡十二新興樂平西平新平洛陽陰平帶方譙郡樂陵章武南鄉㐮陽所省者七上郡朔方五原雲中定㐮漁陽廬江而文帝置七朝歌陽平弋陽魏興新城姜陽安豊明及少帝増二明上庸少平陽渭漢郡者五十四焉蜀州郡蜀先主於漢建安之間置郡九巴東巴西梓潼江陽汶山漢嘉末提石渠涪陵後主増二雲南興古得漢郡十一吳州郡呉主帝初置郡五濡湏武昌珠崖新安盧陵南郡少帝景帝各四少臨川臨海衡陽湘東景天門建安建平合浦北部歸命侯亦置十有二郡始安始興邵郡安成新豐武平九徳呉興東陽桂林榮陽宜都得漢郡者十有八焉西晉郡國武帝太康元年既平孫氏凡増置郡國二十有三闕上洛顔邱臨淮東莞㐮威榮陽長廣廣寗昌黎新野隋郡陰平義陽毗陵宣城南康晋安寧浦始平畧陽樂平南平省司𨽻置司州别立梁秦寧平四州仍吳之廣州凡十九州司冀兖豫荆徐揚青幽平并雍凉秦梁益寧交廣郡國一百七十三仍呉所置二十五仍蜀所置十一仍魏所置二十一仍漢舊九十三置二十三盡有殷周之土武帝太康元年平呉分為十九州部置司州治洛陽兖治帝丘豫治項城冀治房州并治晉陽青治臨淄徐治彭城荆初治㐮陽後治江陵揚初治壽春後治建業凉治武威分三輔為雍治京兆分隴山之西為秦治上邽益治成都分巴漢之地為梁治南鄭分雲南為寧治雲南幽治涿分遼東為平治昌黎交治昌編分合浦之北為廣治番禺又増置郡國二十有二凡州百五十有六縣千一百有九以為冠帶之國盡秦漢之土東晉中興郡國永嘉南渡境宇殊狹九州之地有其二焉初元帝命祖逖鎮雍邱逖死北境漸蹙於是荆豫青兖四州又徐州之半陷劉曜石勒以合肥淮陰夀陽泗口角城為重鎮成帝時鄼守時退屯㐮陽穆帝時平蜀漢役梁益之地又遣軍而入關至濡土再北伐一至洛陽一至枋頭所得郡縣軍旋入又失洎苻堅東平慕容暐西南陷蜀漢西北尅姑臧則漢水長淮以北悉為堅有及堅敗再復梁益青徐兖荆河内之地其後青兖陷於慕容徳荆田司陷於姚呉以彭城為北境藩扞後益梁又陷於譙縱每因劉石苻姚衰亂之際則進兵屯戍在於漢中㐮陽彭城然大抵上明江陵夏口武昌合肥壽陽淮陰當為晉氏鎮守義熙以後又復青兖司荆河梁益之地而政歸於宋矣劉宋南國土宇武帝北平廣固西定梁益又尅長安盡得河南之地長安尋為赫連勃勃所陷至廢帝滎陽王景和中武牢以西復陷後魏今大較以孝武大明為正凡二十有三州揚治建業南徐治京口徐治彭城南兖治廣陵兖治瑕邱荆河治歴陽荆治汝南江治尋陽青治臨淄冀治歴城司治義陽荆治南郡郢治沔賈湘治臨湘雍治㐮陽梁治南鄭秦亦治南鄭益治成都寧治建寧廣治南海交治龍編越治臨鄣郡凡二百三十有八縣千一百七十有九初文帝元嘉中遣將北伐水軍入河尅魏碻磝滑臺武牢洛陽四城其後又失又分軍北伐西軍尅𢎞農開方二城以東攻滑臺不尅而平碻磝守之尋皆敗退於是後魏主大武揔師經彭城臨江屯於𤓰步退攻盱眙不拔而旋明帝時後魏又南侵淮北青冀徐兖四州及荆河州西境悉陷没則長淮為北境揚徐兖於淮南立青冀二州寄治贑榆其後十餘年而淮亡然初強盛也南鄭㐮陽懸瓠彭城歴城東陽皆為宋氏藩扞蕭齊南國土宇齊氏淮北之地所有全少青州治朐山冀理渦口荆河治壽春北兖治淮陰北徐治鍾離又置巴東治巴其餘州郡悉因宋代州二十有二郡三百九十有五縣千四百七十有四其後蕭齊為後魏所侵至東昬永元初沔北諸郡相繼敗没又遣軍北伐敗於圏馬屯盆城又失壽春後三年齊亡始全盛也南鄭樊城㐮陽義陽壽春淮陰角城漣口朐山為重鎮蕭梁南國土宇梁氏州郡多㳂舊制天監中州二十有三郡三百五十縣千二十有五其後更有析置大同中州十有七郡縣亦稱於此自侯景逆亂建康傾陷墳籍散逸不可得而詳焉初武帝受禪數年即失漢川及淮西之地其後諸將頻年與魏軍交戰於淮南淮北互有勝負雖得懸瓠彭城俄而又失又尅夀春宋大通初大舉北伐淮北城鎮相次尅平直至洛陽暫為梁有其後又復漢中至東魏將侯景以河南地降逆亂相尋有名旡實及景平後江北之地悉陷髙齊漢川蜀川没于西魏大抵雍州下溠戊夏口白狗堆硤石城合肥鍾離淮陰朐山為重鎮南陳南國土宇陳氏比於梁代土宇彌蹙西不得蜀漢北失淮淝以長江為境有州四十有二郡百有九縣四百三十有八宣帝大建中頻年北伐諸將累㨗盡復淮南之地更經畧淮北大破齊軍於吕梁及旋師属髙齊國亡又摠軍北伐至吕梁周軍來拒又大破之旋為周軍所敗悉虜其衆自是江北之地盡没于周又以長江為界及隋軍來伐遣將守狼尾灘荆明安蜀城公安巴陵已下並風靡退散隋軍自采石京口渡江而平之元魏北國土宇後魏起自北方至道武率兵下山東攻拔慕容寶中山遂有河北之地於是遷都平城慕容氏喪敗遣將南略地至于滑臺許昌彭城明帝太常中始於滑臺許昌置兵鎮守大武帝時又得蒲坂長安統萬神䴥中宋師來伐碻磝滑臺武牢戍將皆不守尋並復之太延以後東平遼東西平姑臧於是西至流沙東接髙麗所未得者漢中及南陽縣瓠彭城青州之南而已其後帝自南征遂臨𤓰步宋之淮北城鎮守將多有敗没獻文天安初自河之南長淮之北皆為魏有孝文遷都洛陽頻嵗親征皆度淮沔宣武初又得夀春續收漢川至于劒閣兼得淮西之地莊帝時梁軍洛陽數旬敗走爾後内難相繼不暇外畧三四年後分為東西魏矣皆權臣擅命自永安末年爾朱世隆稱兵入洛圖籍散亡不可詳記今按舊史管州百十有一郡五百十有九縣千三百五十有二自太武以後漸更強盛東征西伐尅定中原屬宋明以後及于齊梁國土漸蹙自守不暇雖時有侵掠而退不旋踵故魏之城鎮少被攻圍因利進取不常所守也髙齊北國土宇北齊神武東魏天平末大舉西伐至蒲津西魏乗勝攻陷陜州神武西至沙苑西軍又乗勝襲陷洛陽明年西師又至于河陰時拒守河陽城西師敗歸其後神武攻圍西魏玉壁不尅西師來伐至北邙山後神武又圍玉壁不尅文㐮遣將圍頴川拔之於是河南自洛陽之西河北自晉州之西悉入西魏文宣之代命將略地南際于江矣武成清河中築戍於軹闗其年周軍至洛陽敗還後主武平中陳軍來侵盡失淮南之地周師攻拔河隂大城後至隆化末西師攻拔晉州因之國㓕自東西魏之後天下三分梁陳有江東宇文有闗西髙氏據河北有州凡六十有七郡百六十縣三百六十有五當齊神武之時與周文帝抗敵十三四年間凡四出師大舉西伐周師東討者三焉自文宣之後纔守境而已大抵西則姚㐮城洪洞晉州武平關栢崖軹闗河陽南則武牢洛陽北荆州孔防城汝南郡魯城置兵以防周宼及陳師侵軼數嵗齊亡南境要害未遑制置也後周北國土宇周文帝西魏大統中東魏師至蒲津文帝東征尅陜州兼得宜陽郡邵郡東師又至沙苑後文帝東征至河陰先勝後敗築城於玉壁文帝又至邙山先勝後敗得梁雍州廢帝初尅平漢中又遣軍平蜀文帝西征至姑臧后又平江陵自是疆理西有姑臧西南有全蜀南至于江矣其河南自洛陽之東之北河東自平陽之界屬于髙齊至武帝建德中東征拔齊晉州城尋又東征破齊師於晋州城下乗勝平齊後遣軍破陳軍於吕梁其東南之境盡于長沙通計州二百一十有一郡五百八縣千二十有四當全盛戰爭之際則玉壁邵郡齊子嶺洛通防黄櫨三城宜陽郡南陜縣土剗三荆三鵶鎮置兵以備東軍隋廢郡為州隋文帝開皇三年遷都大興城遂廢諸郡以州治人自九載廓定江表尋以戸口滋多析置州縣煬帝大業初移洛陽城又平林邑更置三州既而併省諸州隋改州為郡三年改州為郡乃置司𨽻刺史分部巡察五年平定吐谷渾更置四郡大凡郡百九十縣千二百五十五東西九千三百里南北萬四千八百一十五里東南皆至于海西至且末北至五原隋氏之盛極於此矣唐改郡為州大唐武徳初改郡為州太守為刺史其邊鎮及襟帶之地置總管府以鎮軍戎至七年改總管府為都督府唐置十道自因隋季分割州府倍多前代貞觀初并省州縣始於山河形便分為十道一曰關内道二曰河南道三曰河東道四曰河北道五曰山南道六曰隴右道七曰淮南道八曰江南道九曰劒南道十曰嶺南道既北殄突厥頡利西平髙昌東西九千五百十里南北萬六千九百十八里髙宗平髙麗百濟得海東數千餘里旋為新羅靺鞨所侵失之又開四鎮即西境拓數千里者于闐疎勒龜兹焉耆諸國矣唐置都督府景雲二年又分置二十四都督府分統諸州時議以權重不便尋罷之唐採訪使及節度經畧使開元二十一年分為十五道置採訪使以檢察非法京畿都畿闗内河南河東河北隴右山南東山南西劒南淮南江南東江南西黔中嶺南又於邊境置節度經畧使式遏四夷大凡鎮兵四十九萬人戎馬八萬餘匹每嵗經費衣賜則千二十萬疋段軍倉則百九十萬石大凡千二百十萬鎮西節度使寧西域統龜兹國焉耆國于闐國疎勒國北庭節度使防制突騎施堅昆斬啜管澣海軍建康軍寧宼軍玉門軍墨離軍豆盧軍新泉軍張掖郡守捉烏城守捉交城守捉白亭守捉朔方節度使捍禦北狄統經略軍豐安軍定逺城西城安北都䕶府東城振武軍河東節度使犄角朔方統天兵軍雲中郡守捉大同軍横野軍定㐮郡鴈門郡樓煩郡岢嵐郡范陽郡節度使制臨奚契丹統經畧軍威武軍清夷軍靜塞軍恆陽軍北平軍髙陽軍唐興軍横海軍平盧節度使鎮撫室韋靺鞨統平盧軍盧龍軍渝闗守捉安東都䕶府隴右節度使以備西戎統臨洮軍河源軍白水軍安人軍振武軍威戎軍綏和守捉合川郡界守捉莫門軍寧塞軍積石軍鎮西軍平夷守捉劒南節度使西抗吐蕃南撫蠻㺐統團結營臨翼郡通化郡維川郡天寶軍蓬山郡交川郡平戎城盧山郡江源郡洪源郡昆明軍寧逺軍雲南軍澄川守捉南江郡歸誠郡鎮南五府經畧使綏靜夷獠統經畧軍清海軍桂管經畧使容管經畧使鎮南經略使邕管經畧使又有經畧守捉使三以防海宼長樂郡經略使東萊郡守捉東牟郡守捉天寶初又改州為郡刺史為太守大凡郡府三百二十有八縣千五百七十有三覊縻州郡不在其中其地東至安東都䕶府西至安西都䕶府南至日南郡北至單于都䕶府南北如前漢之盛東則不及西則過之唐都名明皇開元中定天下州府自京都及諸都督䕶府外以近畿之州為四輔同華岐蒲其餘為六雄鄭陜汴絳懐衞十望宋亳滑許汝晉洛虢衛相十緊初有十緊州後入者甚多更不復列及上中下之差天寳中上州一百九中州二十九下州一百八十九肅宗乾元初收復以郡為州置團練守捉使都團練守捉使大者州鎮十餘小者二三州而已故自此所置皆無郡名而不復列上中下之目其後有方鎮史官不録於地理之書以為方鎮兵伐之事非職方所掌故也唐置十五道城理明皇開元二十一年又因十道分山南江南為東西道増置黔中道及京畿都畿置十五採訪使檢察如漢刺史之職京畿理西京今長安都畿理洛陽今西京闗内多以京官遥領河南理陳留郡河東理太原河東河北理魏郡隴西理鄯西平山南東理㐮陽山南西理漢中郡劒南理成都蜀淮南理廣陵郡江南東理蘇呉江南西理豫章黔中理黔中嶺南理南海及天寶盜起中國用兵而河西隴右不守陷于吐蕃自禄山之亂河右暨鄯武疊宕等郡皆没于吐蕃代宗寳應元年又陷秦渭洮臨廣徳元年復陷河蘭岷廓徳宗正元二年陷安西北庭隴右州縣盡矣河北道羈縻州突厥之别郡及奚契丹靺鞨降胡髙麗為府十四州四十六𨽻幽州都督安東都䕶府闗内道突厥回紇党項吐谷渾為府二十九州九十𨽻靈夏延慶州都督并單于安北都䕶府隴右道突厥回紇党項吐谷渾之别部及龜兹于闐焉耆疎勒河西内屬諸胡西域十六國為府五十一州百九十八𨽻秦凉臨松都督安西都䕶府江南道蠻為州五十一𨽻黔州都督府嶺南道蠻為州九十一𨽻峯桂邕都督并安南都䕶府瀘都督府唐藩鎮魏博𫝊五世至田𢎞正入朝十年復亂更四姓𫝊十世有州七成徳更二姓𫝊五世至王承元入朝明年王庭湊反傳六世有州四盧龍更三姓𫝊五世至劉揔入朝六月朱克融反𫝊十二世有州九淄青𫝊五世有州十二滄景𫝊三世至程權入朝十六年而李全畧有之至其子同㨗而㓕有州四宣武𫝊四世有州四彰義𫝊三世有州三澤潞𫝊三世有州五朱梁及十一國土宇梁太祖朱溫都汴𫝊世三梁初天下别為十一南有吳浙荆湖閩漢西有岐蜀北有燕晉而朱氏所有七十八州以為梁劉仁恭稱燕昭宗乾寧初為幽州盧龍節度使梁初其子守光因之李克用稱晉昭宗封晉王子存朂立是為莊宗國號唐李茂正稱岐僖宗時節度鳳翔後取興元有州二十歧隴涇原渭武秦成階鳳邠寧慶衍鄜坊丹延梁洋其被梁圍也興元入于蜀開平以後鄜坊入于梁秦鳳階成又入于蜀當梁末年所有七州封歧王錢鏐稱吳越僖宗時兼鎮杭越其後為楊行宻所侵止十三州梁封為尚父吳越王楊行宻稱呉王盡有淮南之地昭宗封為𢎞農王兼有宣鄂子渥嗣自稱呉王王審知稱閩黄巢冦亂審知因有閩嶺五州之地昭宗就封閩馬殷稱楚盡有湖南之地後兼衡潭鼎澧二十餘州梁封為楚王王建稱蜀昭宗授之西川節度後併東川及山南諸郡髙季興稱南平梁初領荆南節度十州後為諸道所侵季興所有一城而已劉隠稱南漢梁初封為海東王卒其弟陟襲位盡有嶺表之地僭號於廣州國號南漢後唐及五國地理後唐莊宗諱存朂晉李克用之子都洛陽𫝊世凡四莊宗初起并代取幽滄有州三十五其後又取梁魏博等十有六州合五十一州以滅梁岐王稱臣又得其州至同光破蜀已而復失惟得秦鳳階成四州而營平二州陷于契丹其王置之州一合一百二十三州以為唐夏李仁福卒子彛超留後卒弟彛興立岐李茂正卒子從儼立蜀前蜀王衍後孟知祥殂子昶立楚湖南馬覇圗薨子希聲立薨弟希範立呉明宗天成二年呉王楊溥稱帝石晉及七國地理晉髙祖石敬塘太原人為鄆帥唐末帝清泰三年以鴈門之北及幽州所管州結契丹以攻唐自立都洛陽𫝊世凡二謹按五代職方考石氏立獻十有六州于契丹而復得蜀金州又増置州一合一百九州以為晉蜀孟昶南平髙從誨楚馬希範南漢劉龔子玢南唐呉王楊溥遜于其相徐知誥改號齊知誥改姓李名昪號唐殂子璟嗣位閩天福三年閩王王昶立審知之子延義為王五年制授福州王延義閩王延義為其臣朱文進所弑詔授文進節度封閩王呉越天福六年呉越王錢元瓘薨子佐襲位劉漢及六國地理漢髙祖姓劉名嵩本名知逺晉少帝開運二年初封北平王三年即皇帝位於太原號大漢稱天福十二年云謹按五代職方考劉氏之初秦鳳階成復入于蜀隠帝時増置州即解州也合一百六州以為漢蜀孟昶南平髙從誨子保融楚馬希範希廣希蕚南漢劉旻南唐李璟呉越錢佐郭周及七國地理周太祖姓郭名威都汴𫝊世三謹按五代職方考郭氏代漢十州入于劉旻世宗取秦鳳階成瀛莫及淮南十四州又増置州五濟濱通雄霸而廢者三景武莫合一百一十八州以為周石晉末閩已先亡而在者七國自江以南二十一州為南唐自劒南以及山南西道四十六州為蜀自湖南北十州為楚自浙東西十三州為吳越自嶺南北四十七州為南漢自太原以北十州為東漢荆歸峽三州為南平右合七國所有一百六十八州而軍不在焉宋朝肇造混一及升改廢置州郡太祖受周禪建隆元年李筠反澤潞遣石守信髙懐徳進討上親征筠赴火死李重進反淮南遣石守信王審琦李處耘討之上親征重進赴火死建隆四年二月王師入荆南南平髙繼冲舉族歸朝得州三縣一十五三月克湖湘周保權得州十四縣五十八六年正月蜀孟昶降兩川悉平得州四十五縣一百九十八開寶四年二月拔廣州擒劉鋹嶺南悉平得州四十一縣六十五八年十一月拔昇州擒李煜江南悉平得州一十九軍三縣一百八太宗太平興國三年四月平海軍節度使陳洪進上表以所管十三州歸于有司三年五月錢俶獻所管十三州一軍八十六縣四年上親征太原東漢劉繼元上表納欵得州十縣四十一七年得西夏李繼捧銀夏二州元豐九域志謹按聖朝元豐頒行李徳芻曾肇王存等撰九域志揔為二十三路元豐元年詔河北東西永興秦鳳京東東西京西南北淮南東西路轉運司通管兩路遂以河北陜西京東京西淮南路為名提刑提舉司仍舊分路京東東西路熙寧七年分京西南北路太平興國三年分河北南路後併為一路熙寧五年復分為二路河北東西路太平興國三年分河北南路雍熙四年分東西路端拱二年併為一路熙寧六年復分二路陜西路太平興國二年分河北河南路又有陜府西路後併為一路熙寧五年分二路按陜除永興一路外鄜延環慶涇原秦鳳熙河是為五路而序止稱陜西路今姑别之以俟觀者河東路淮南東西路太平興國元年分東西路後併為一路熙寧五年復分二路兩浙路江南東西路太平興國元年分東西路後併為一路天禧四年分二路荆湖南北路咸平二年分南北路成都府路乾徳三年兩川併為西川路開寶六年分峽路咸平四年分益利䕫梓四路嘉祐四年以益州路為成都路闕化外州郡契丹自唐末陷營平二州晉祖起并州藉其兵勢割幽瀛莫涿檀順新媯儒武雲應寰朔蔚易十六州以報之顯徳六年周世宗復瀛莫二州至今十六州為敵所據西夏自唐末拓跋思恭鎮夏州討黄巢有功賜姓李氏有拓跋仁福者為蕃部都指揮使從其姓梁開平中將吏迎立仁福為州帥子彛超彛興繼為帥世有夏銀綏宥之地彛興仕周為定難軍節度使太傅中書令封西平王其後光睿繼錡繼佐相次承襲然自祖宗以來服叛不常朝廷易其小宼不即討除彼盜有之地故元豐九域志列之為化外云宋朝化外州葢唐覊縻之類雖貢賦版籍不上戸部然聲教所暨皆邊州帥府領焉河北路安東大都䕶府幽慎易闕檀營平燕歸順遼師順瑞薊河東路安北大都䕶府單于大都䕶府鎮北大都䕶府雲應新蔚媯朔寰儒毅陜西路安西大都䕶府庭靈夏凉沙鄯𤓰銀鹽勝宥西廓㑹宕疊甘肅伊洮陽建康鎮利州路松扶翼當悉恭柘直保靜䕫州路思費播夷牂西髙業充莊琰廣南路交峯攘嚴田愛驩陸福禄長越温演林景環平琴山武安古徳化即茫州升改廢置州郡四京東京開封南京應天西京河南北京大名京東升改四兗政和八年升襲慶齊升濟南府曹升興仁府鄆升東平府廢一廣濟熙寧四年廢入曹州京西升改五陳宣和元年升淮寧府許升潁昌府潁升順昌府孟升河陽府汝政和五年改陸海軍廢一光化熙寧三年廢𨽻㐮州河東升改三晉政和八年升平陽府潞升隆徳府府崇寕元年改靖康軍廢四沁太平興國四年廢慈熙寧五年廢平晉太平興國四年廢靜樂咸平五年廢河北升改七德升安德府定升中山府邢宣和元年升信德府趙升慶源州澶崇寧五年升開德府瀛升河間府乾寧大觀二年改清州廢二通利熙寧三年廢承天廢𨽻真定兩浙升改六越紹興元年升紹興府杭升臨安府蘇政和二年升平江府潤升鎮江府睦宣和三年改嚴温政和七年改應道軍廢二順化廢還杭州江陰廢還常州淮南升改二舒政和五年改德慶軍壽政和六年升壽春州廢二髙郵漣水熙寧五年並廢天長至道二年廢江南升改二歙宣和二年改徽州江寧建炎二年升建康府荆湖升改二岳宣和二年改岳陽軍誠崇寧三年改靖州廢三復熙寧六年廢漢陽熙寧五年廢荆門熙寧六年廢廣南升改二端宣和元年升肇慶府桂紹興三年升靜江府開置二隆兗政和五年西路置廢二十五富巒富登勤常樂縮順寓思明南儀崖瀧溥牢羅竇蒙睿嚴黨恩州歸恩芝州五路升改四通逺崇寧四年升改鞏州延升延安府慶升慶陽軍廢二乾儀熙寧五年並廢綏熙寧二年廢成都改一陵井大觀四年改仙井利路升一三泉縣今復改大安軍廢二壁開寳五年廢集熙寧五年廢潼川升改四戎政和四年改叙州梓州宣和五年升潼川府遂升遂寧府㳙井改長寧軍䕫升改一榆崇寧元年改恭州開置渝遵義大觀三年置永興升一永興軍升京兆府河北化外升改二幽燕山府雲雲中府陜西化外改一湟宣和元年改樂䕫路化外廢二思播宣和二年省并思為務川城播為播川城府號郡名多㳂唐舊號不同者虢曰虢郡滑曰靈河熙曰臨洮楚曰山陽明曰奉化嵐曰樓煩龍曰江油唐所无者十四澶曰澶淵軍曰碭郡淮曰易陽礠曰滏陽祁曰蒲陰耀曰華原府曰永安宿曰符籬泰曰海陵信曰上饒沅曰潭陽昌曰昌元劒南曰劒浦浦化曰陵水羣書考索卷六十
