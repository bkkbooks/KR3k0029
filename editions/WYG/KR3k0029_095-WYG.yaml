body:
  text: 羣書考索後集卷二十九宋章如愚編士門國子監解額宋朝仁宗天聖元年冬十月癸亥増國子監進士解額二十人長編天聖七年八月甲午詔國子監進士自今以五十人為額長編慶歴元年八月癸巳詔國子監今歲解發進士諸科各特増二十人長編慶歴四年十一月戊午朔判國子監余靖言臣伏見先降敕命并貢舉條制國子監生徒聽讀滿五百日方許取應每十人之中與解三人其諸路州軍府監並各立學及置縣學本貫人並以入學所習三百日舊得解人百日已上方許取應後來雖有敕命曽到省舉人與免聽讀内新人顯有事故給假並與勘㑹除破其如令非畫一難以久行竊以國家興建學校所以育俊秀而訓導之由是廣學宫頒學田使其專心道義以思入官之術伏縁朝廷所賜莊園房錢等贍之有限而來者無窮若徧加廩給則支費不充若自營口腹則貧窶者衆日有定數不敢不來非其本心同於驅役古之勸學初不如此臣以為廣黌舍所以待有志之士去日限所以寛食貧之人國家有厲賢之風寒士得帶經之便欲乞應國子監太學生徒如有情願聽讀滿五百日即依先降敕命將來取解十人之中與解三人其不滿五百日者並依舊額取解應舉所有開封府及天下州軍立州學處亦取情願聽讀更不限以日數所貴寒士營生務學不失其所乃詔罷天下學生員聽讀日限長編慶歴四年十二月戊戌詔自今解發進士太學以五百人開封府以百人為額舊制開封府三百三十五人國子監百六十人熙寧八年合為一以解額通取至是復分而太學生數多故省開封解額以益之長編皇祐五年七月戊子又詔開封府國子監進士自今每一百人解十五人其試官親嫌令府監互相送若兩處俱有親嫌即送别頭長編嘉祐三年五月壬申管勾國子監吳中復言舊制每遇科塲即補試廣文館監生近詔間歲貢舉須前一年補試比至科塲多就京師私買監牒易名就試及旋冒畿内户貫以圖進取非所以待逺方孤寒之意請自今遇科塲補試監生如故仍以四百五十人為額從之尋又増一百五十人長編神宗熙寧元年五月戊戍國子監言自來補試國子監生以六百人為額今科塲三年一開竊見開封府國學各増解名三分之一四方士人以此盛集京師欲乞監生人數亦展一分以九百人為額從之長編元豐三年五月編修學制所言奉㫖立勢要及國子監生太學官親屬許不以鄉貫就開封應舉之法臣等看詳監以國子為名而無國子教養之實恐未稱朝廷建學育士之意乞應清要官親戚並令入監聽讀以二百人為額解發毋過四十人從之長編哲宗元祐七年六月癸丑禮部狀近準都省批狀勘㑹開封府遇科塲歲多有四方舉人冒貫畿縣户名取應及太學生員依條須在學及一年方預就試其間有未及一年之人亦不免有寄貫取應之弊檢㑹舊制國子監取應舉人先於廣文館補試給牒取應今欲復置廣文館生員今再行看詳開封府進士解額一百人即乞依舊外將本府諸科二百人并國子生四十人共為二百四十人解額並撥屬廣文館廣文館生員以二千四百人為額并國子監狀太學生員上舍一百人内舍三百人外舍二千人元祐五年發解國學舉人每五人四厘二毫一忽解一人詔依禮部所申今後太學舉人并國子生發解並依元祐五年發觧取人分數施行長編紹聖二年二月甲午罷廣文館觧額及將國子生四十人發還本監從之長編武學文武一道也由三代而上敎出於一而文武之才各適其用由三代而下敎出於二而文武之才徒相為訾古之為學必取士取士必文武其敎養之法非有二也堯舜尚矣舜之政猶見於書益稷曰侯以明之蓋以射侯之禮致衆而論士則文武皆其選也禮曰受成於學出征執有罪反釋奠於學以訊馘告詩曰在泮獻囚又曰在泮獻馘三代之學文武豈二途哉玉臺先生諱賞文漢時隴西天水上郡北地材官騎士布滿郡國高祖雖未嘗設科而一時猛將或出於餓隷韓信黥徒黥布鼓刀樊噲販繒灌嬰之賤自是之後雖有勇猛知兵之選成帝始立勇武明法之科平帝詔舉明法戰陣詔舉武猛堪將皆安帝詔舉武猛謀謨明帝詔舉明戰陣之畧詣公車靈帝卒未有得人如高祖之世者唐又别立一科謂之武舉而進士武舉遂兩立矣武后長安二年始置武舉其置有長垜馬射步射平射筒射又有馬槍翹關負重身材之選亦以鄉飲酒禮送兵部其選用之法不合於道故不復書唐志𤣥宗開元十九年兩京諸路各置太公廟以張良配享春秋仲月上戊日祭武學人准明經進士行鄉飲酒禮取自古名將十哲七十二弟子肅宗乾元元年不以張良配享上元元年太公望追封為武成王享祭一同文宣王正元二年刪去十哲德宗正元中關播奏言仲尼十哲皆當時弟子今以異時名將列之弟子非類也乃去十哲之名於是諸儒爭言太公於聖人非倫也宜去王號獨令狐建以為勿追王爵宜以時祠為武敎主自是始有武學為文者習章句而嗤武士為武者習騎射而誚文儒二者殆若氷炭矣玉臺先生諱賞文宋朝太祖皇帝幸武成王廟觀兩廊名臣繪像指白起曰此人殺降不武之甚以杖畫之寶訓修武成王廟令張昭竇儀詳定配享功臣以吳起孫臏廉頗韓信等二十二人不克令終並退之復升灌嬰耿純輩梁周翰表陳其事上曰升降之制蓋有所懲勸周翰未之思耳同前開寶元年上令諸道解武舉者命李昉扈蒙試問所習之業皆無悉令罷之開寶八年詔郡國有文經武畧堪任用之二十已上五十已下具名以聞仍速赴闕當考其臧否以進退之並要覽太宗嘗幸武成王廟指郭子儀李晟畫像咨其功業且曰德宗為奸臣所誤非晟則祚去矣事畧真宗咸平二年上北征趙安仁上言當今有至要者五其三求軍謀今武舉已行其軍謀深逺武藝絶倫科望依唐故事仁宗朝富弼言應制科者必樂為賢良方正才識兼茂耻為將帥邊寄之名蓋今人重文雅而輕武節也武舉者蹶張馳射儕於卒伍所得庸妄鄙淺固不敢望得異士但稍能警勵有㢘耻則焉肯為卒伍之事乎臣請詔近位及藩鎭於文武官中各舉明兵法有威果習練武略堪任將帥者一二人皇監蘇洵上書可復武舉而為新制以革其舊弊且昔之所謂武舉者蓋疎矣其以弓馬得之者不過挽强引重市井麄材而以䇿中者亦皆記録章句區區無用之學其取人太多故其所得皆貪汚無行之徒豪傑之士耻不忍就宜因貢士之歲使兩制各舉所聞有司試其可者而陛下親䇿之權略之外便於弓馬可以出入險阻勇而有謀者不過取一二人待以不次之位試以守邊之任皇監天聖七年閏二月壬子又置武舉以待方略智勇之士其法皆先上藝業於有司有司較之然後試秘閣中格然後天子親䇿之若武舉則仍閲其騎射焉長編天聖七年因唐之制置武舉應三班院使文武子弟實有軍謀武藝許詣兵部投牒取應先投軍機䇿論三卷每卷三道召人保委主判官先詳所業視人才驗行止先試步射一石弓力馬射七斗弓力問䇿一道合格即引見召試㑹要寶元間詔兵部試武舉人以䇿論定去留以弓馬定高下聖政慶歴二年十二月壬寅詔兩制舉文武官各一員為武學敎授從賈昌朝之言也長編慶歴三年五月丁亥置武學於武成王廟以太常丞阮逸為武學敎授同前慶歴三年八月戊午罷武學改武學敎授太常丞阮逸兼國子監丞其有願習兵書者許於本監聽讀旣立武學議者以為古名將有諸葛亮羊祜杜預裴度等豈嘗專學孫吳立學無謂故亟罷之長編慶歴三年後胡瑗上書請興武學其略曰頃歲吳育已建議興武學但官非其人不久而廢今梅堯臣曽注孫子大明深義孫復以下皆明經㫖臣曾任邊陲頗知武事若使梅堯臣兼隷武學每日只講論語使知仁義忠孝之道講孫吳使知制勝禦敵之術於武臣中選子孫有智略者三二百人敎習之則一二年必有成效臣已選武學規矩一卷進呈時議難之呂原明記皇祐元年八月丙戍御崇政殿試武舉人得何景略等三十七人授官有差長編皇祐元年九月己未詔曰國家采唐室之舊建立武之科每隨方聞之詔並舉勇略之士條格之設歲敘已深然而時各有宜今異於古尺籍之衆旣以其技力自奮於行伍之間武弁之流又用其韜鈐自進於軍旅之任來應兹選殆稀其人如間所𨽻習者率逢掖諸生編户年少以至捨學業而事籌䇿矯溫淳而務麄猛紛然相效為之愈多朕方恢隆文風敦厚俗尚一失其本恐陷末流宜罷試於兵謀俾專由於儒術尚慮積習且久頓更為難就其等倫裁為規制其將來武舉科塲人曽經祕閣考試者即許投下文字外更不許新以取應以後科塲令罷武舉一科大詔令皇祐中嘗罷是科言事者以文武並用廢一不可宜復此科分為三等上等取其學識深逺䇿對優絶次等取其䇿對優長騎射兼有下等取有擊刺拋射翹傑魁俊量能而官因材而任委以巡警之司縣尉之職觀其提一旅之衆佐一司之重能激勵士卒翦滅盜賊然後取而用之豈不利於國家乎豈不有勝於卒伍而為之乎惟陛下復之無疑㑹要嘉祐八年密院奏以為文武二選不可闕一與其任用不學之人臨時不知應變不若素習韜略之士緩急驅䇿可以折衝况今朝廷所用人稍有稱聲者多由武舉而得則此舉不可廢罷明矣英宗治平元年九月丁卯詔復置武舉按㑹要嘉祐八年十月八日密院初建請治平元年三月二日王珪等上條件二十一日賈黯乞試韜略四月九日詔六月十五日并八月十九日密院奏皆武舉條件今依實錄聨書之仍略刪修使不相抵牾蓋嘉祐八年始議治平元年九月議定乃降詔其降詔因縁密院建請并治平元年九月方建請也神宗熙寧三年八月翰林學士司馬光言奉敕考試武舉人而法當先試弓馬若合格即試䇿略緣弓馬以選士卒之法非所以求將帥者也不幸而不能挽强馳突則雖有䇿略將帥之材不得預試恐非朝廷建武學之意况試弓之法挽與弝齊尤不應格自今欲乞試䇿並挽弓及弝者皆聽就試中書請如舊制上批再相度卒如中書所請長編熙寧五年六月乙亥樞密院言仁宗時嘗建武學旣而中輟乞復之詔於武成王廟置武學選文武官知兵者為敎授凡使臣未參班並門蔭草澤人許入學給常膳集諸家兵法敎授官纂次歴代用兵成敗及前世忠義之節足以為訓者講釋之通鑑熙寧五年初密院修武舉條令不能答䇿者止答兵書墨義王安石恐入官太冗兼近方以學究但知誦書反愚魯不曉事廢之今又置武舉墨義一科其所習墨義又少於學究所取武藝又不難及則當時為學究者乃更應武舉若收得如此人作武官亦何補於事上曰朕亦語密院以墨義不可用至是再進呈武舉條制乃悉從中書所定同上熙寧五年立武學於御路之側於是詔舉人先試以孫吳大義元豐二年其䇿武士有曰朕以經法先聖莫不以兵為大事是以設科置學冀足以延知兵之士聖政編年熙寧五年閏七月壬子詔武學生員以百人為額遇科塲前一年委樞密院降宣命武臣路分都監及文臣轉運判官以上各奏舉堪應武舉者一人其被舉人遇生員闕願入學者聽仍免試生員及應舉者不過二百人春秋各一試步射以一石三斗馬射以八斗或弓八斗矢五發中的或别習武伎副之䇿略雖弓力不及學業卓然者並為優等補上舍以三十人為額三班使臣無賍罪及私罪情輕仕族或草澤人無違負亦聽入學量試馬射以六斗步射以九斗䇿一道孫吳六韜又十道以五通為合格春秋試内舍生馬步射馬戰應格對䇿精通士行可稱者上樞密院雖不應而曉術數知陣法智略可用或累試䇿優等悉取㫖補上舍武藝又進者樞密院審察人材旋加試用生員及應舉者不過二百以下至旋試用並以選舉志増入實錄武學言乞在學生員春秋各一試至三十人為額及三班使臣至五通為合格並係之八月八日令并從本志入此又實錄六年八月一日與此相重略有不同處今兩存之長編熙寧五年九月辛酉詔武學士試大義十道分兩塲從御史劉孝孫請也後試武舉人亦如之長編熙寧六年八月壬申朔武學言春秋試法内舍生馬步射馬戰應格對䇿精通士行可稱者上樞密院補上舍生雖不應格而能精曉術數陣法智略可用或累試䇿優等别取㫖補上舍武藝䇿略累在下等者復降外舍上舍無過三十人别齋増給食如累試又優等及武藝進者上樞密院審察人材試用從之長編熙寧六年九月辛亥御崇政殿試武舉進士凡武舉初試義䇿於祕閣武藝則試於殿前司及殿試則又試䇿於庭於是詔武舉人䇿入優等武藝又入優等與右班殿直武藝次優與三班奉職末等與三班差使减磨勘二年䇿入平等武藝優等與奉職武藝次優與借職次等與三班差使减磨勘二年末等三班差使長編熙寧六年九月丁巳賜武舉進士文煥及等注兩使職官熙河路準備差遣侯抱真而下二十三人授以班奉職借職差使緣邊差遣後復賜煥進士及第為梓䕫路察訪司準備差遣長編熙寧七年二月庚午樞密院言武舉補試生員前此無立定時限四方游士困於伺候乞隨在學上舍生以春秋二時引試仍下進奏遍行庶使遠方通知朝廷招徠之意從之熙寧八年七月戊辰試武舉人先試孫吳六韜大義共十道為兩塲次問時務邊防䇿一道與鎻聴人同考試馬軍司試弓馬差官監試武舉試格前後參錯至是始加裁定長編熙寧八年八月庚寅别試所言武舉人試孫吳六韜大義六韜本非全書義理訛舛無所考據欲止於孫吳書出題從之長編元豐七年十一月丁未詔應武舉及試出官並依進士討大義一塲第一等取四通第二等取三通第三等取二通並為中格從司業翟思朱服所請也長編哲宗元祐元年六月甲寅看詳太學條制所狀續準指揮國律武學條貫令一就修立檢準官制格國子監掌國子太學武學律學筭學五學之政令元祐六年十月庚午幸武成王廟徽宗崇寧三年九月壬辰詔諸州學别為齋舍敎養材武之士隨人數多寡許令入學並依進士法其考選較試并補取令武學條制别看詳修立頒下長編崇寧四年正月丙申尚書省言乞諸州教養武士附於州學參酌武學成法修立考選等格從之長編崇寧四年六月丁丑詔諸州武學習射馬許私置不得過五疋仍官給草料如不能私置用學事司錢置三疋長編崇寧五年九月甲寅學制局言臣等檢㑹崇寧三年九月二十二日朝㫖諸州縣學别為齋舍敎養武士續有條畫頒下諸路後來入學之人己多昨因今年二月廢罷未曽復置臣等伏覩御製學校新法内一項逐州解額五路已有指揮十人取一名可令前旁所解額於數内以一分充貢武士額臣等未審今來立敎養武士法合依舊遍行天下或止於三路五路施行乞降睿㫖别具合措置事件聞奏御筆山西出將氣俗使然所當先者至如餘路間亦有之平治之時武不可廢可依已降指揮置武士齋仍以所給解額取一分充貢額有則貢無則貢文士長編大觀元年十一月庚申御筆天下材武之士漸向學校今在學之人多寡不同訪聞河東路有六百六十人貢十人永興軍路有一百九十人亦貢十人多寡相逺未為均當可以諸路並以在學人數十五人貢一人詔㫖大觀二年七月辛未前宿州州學敎授胡伋言乞武士與文士别塲引試及馬射八斗九斗一上垜並理作分數從之長編大觀三年十月丁酉知樞密院事鄭居中等上大觀重修武學并諸路州縣學武士敕令格式等二十七册詔頒行之長編政和元年正月己丑詔武士舉額可以國子監所立一百六十九人之數下諸路充貢額武舉省試舊來正奏名止三十人大觀元年已後所増人數比舊奏名猶多二十人本為貢士今來科舉可於舊試奏名額内除豁三分充科舉奏名長編政和三年三月丙辰詔武舉博士依太學博士法朝廷差人詔㫖政和三年六月丁巳詔武學州縣外舍生稱武選士内舍生稱武俊士餘依四月三日已降指揮長編政和三年六月丙寅武學博士孫宗鑑言武士馬射優劣之格上垜中貼皆有等第分數而中的獨為闕文則貼廣三尺二寸而的又十之一其工拙不同明甚今一中貼比兩上垜乞以一中的比兩中貼從之詔㫖政和三年八月丁丑提舉京西南路學事陳適道言大觀武學令諸外舍三經公試若内舍三經試上舍而不與升貢或三犯第三等以上罰者外舍除籍内舍臣欲乞於曾犯第三等以下罰字及添三經校定而不與選十字庶免虚占學籍有妨後學從之詔㫖宣和二年七月丁卯詔武士該貢人特許貢發小學上舍上等特許赴來年控試如合格與補太學外舍太醫學俟殿試人特許赴來年特奏名試長編宣和二年十月己巳尚書省言契勘州縣武學已罷内外願入在京武學人乞依元豐法試補入學舉試入舊制係與武學外舍人類試取一百人同上舍生發解縁科舉已罷今比傚新舊法令尚書省於大比前二年春季檢舉降敕下兵部依元豐法奏舉其備舉人限當年冬季到闕與免補試入學稱外舍生依與校定人赴次年公試其考選外補推恩並依大觀武學法從之長編宣和二年十月甲申臣僚言州縣武學已罷諸路見任武士敎諭總二十四員自今隨事减罷今京畿京西路申明乞罷者才三人爾其在任者猶衆也契勘雖有武士該貢人特許貢發指揮而諸生弓馬行藝已成校定無所加損其於教諭無委職事特降睿㫖並依省罷從之長編高宗紹興三年四月庚子給事中黄唐傳乞立武選之格以科舉人數三分之一待武士中第者注縣尉他日有統兵官闕並先選武士詔兵吏二部條上建炎中國子監併歸禮部丁未始詔駐蹕所在國子監量養士仍置博士然未果行焉紹興十一年三月庚子朔上曰賢將與才將不同賢將識君臣之義知尊朝廷不專於戰勝攻取唯以安社稷為事才將一意功名爵賞專以戰勝攻取為能而未必識朝廷大體及社稷久遠利害要湏駕馭用之上又曰文武之事雖同而事實異世稱衛霍不薦士為賢蓋禦侮折衝將帥職也何與薦士祖宗故事樞密院不與進擬蓋知文武之事異也紹興十六年二月壬戌上以文武之道不可偏廢三月庚午朔詔興武學養士其後以百人為額置博士員紹興二十六年四月己卯上諭執政曰文武一道今太學以就緒而武學幾廢致有遺才祖宗武學養士自有成法可令禮兵部速具以聞紹興二十七年四月壬戍進呈保義即閤門祗候趙應熊擬江南東路安撫司準備差遣上宣諭曰朕觀應熊所試弓馬文字皆有可採可謂有用之材徽宗皇帝時如馬擴馬識逺皆以武舉擢用今來所得亦不可謂無人湯思退曰應熊初入仕且以帥司准備將處之以養資望上曰善臣等曰文武之判久矣儒者悉不知兵而勲門將閥號為知兵者又不過善擊刺工騎射臨陣能死敵耳其知不足言也故太上皇帝思得有用之才用之惜乎有司不能推原聖意所出也夫有軍功有捕盜賞有武臣䕃補而又設為武舉一科或者其不止於求騎射一藝乎今有善兵如孫臏知權識變如張子房而足不便鞍馬力不挽石弓則有司望然拒之曰非設科意也嗚呼其亦拘矣誠願詔舉者先韜略後騎射而明告之以馬擴馬識逺必用之意使天下曉然知異時長驅伊洛而泥封函谷者在此而不在彼歆然慕之遲之數年縱不得人獨不愈於屈天下韓范使與郭狄等伍以倖萬一之歡乎孝宗即位創置武學乾道元年上問輔臣曰近日曽有武人赴試否洪适奏曽有數人至都堂投狀乞試已行下吏部令赴武學收試上曰前時立法亦不至嚴否适奏係文臣銓試舊法十人取七人今武臣既不能弓馬須要試七書義亦少抑入仕之路上曰得他少知義理甚好乾道九年輔臣進呈樓源乞令太學生習射藝事上曰古者命將在公卿之列有文事者必有武備鄭聞奏射御六藝之數古之文武未嘗分也上曰紹興重修學令既許習射可令有司討論上又曰向來玉津園燕射唯武臣恐祖宗典故文臣亦當與射可併討論以聞淳熙元年輔臣進呈奏名進士射殿最上曰進士射前來未嘗舉行今可將中上等人優加旌賞以示激勸淳熙元年詔近舉行燕射之禮可令臨安府於城内踏逐近便寛閑地段建置射圃以備百僚職事之餘習射淳熙二年上御射殿進士第五甲及特奏名按射上顧行間有黎華者遣内侍問姓名上曰觀其人物服飾似壯士射亦閑習宜略與旌别旣而傳㫖黎華可特免銓試與注黄甲差遣上又曰自此須立一規矩今將帥稍知書曉文書禁衞出身如光武故事令習孝經使文士能射御武士知詩書總論有文學有武學養之於未用之先也有文選有武選用之於旣養之後也然則科舉之法既有文舉矣烏可不有武舉乎宋朝制科有六而武事居其二又外置武舉以待方略武勇之士時蓋天聖七年也行之二十年而罷罷之十有五年而復是故以䇿論定去留以弓馬定高下寶元制也先試大義次試時務邊防䇿又别試弓馬熙寧制也以此而取士則其得人當不居唐之子儀下而或者猶曰弓馬不過麄材䇿論亦為無用蘇老泉之論謂不若方略有謀者之可用也武舉者蹶張馳射儕於卒伍稍有㢘耻則焉肯為富文忠公之論謂不若威果武略之堪任將帥也是則然矣然亦嘗觀嘉祐議臣之奏乎今朝廷所用稍有聲稱者皆由武舉而得此其所取豈得謂之無益於世者如富如蘇之論特不過謂來者猥多取者不擇而豪傑之士有不屑就焉爾如執此以議武舉君子謂之不知務並見前林駰文羣書考索後集卷二十九
