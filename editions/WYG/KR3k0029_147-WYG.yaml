body:
  text: 羣書考索續集卷十六宋章如愚編諸史門諸史正史史記始於談而備於遷為之訓釋者前後十四家斐駰徐廣劉伯莊王元感等也卒無以易遷之為也西漢書權輿於彪而成就於固為之訓釋者前後三十家服䖍應劭晉灼孟康韋昭顔師古等也卒無以易固之為也後漢書自謝承迄于范􅁮作者八人而後􅁮之書始行謝承薛瑩司馬彪劉義慶華嶠謝沈袁山松范􅁮晉書自虞預迄於唐太宗作者八人而後名為御撰者始定虞預朱鳳謝靈運臧縈緒于寶蕭子雲何法盛太宗作宋書者四人徐安孫亷沈約王智深是也作齊書者三人蕭子顯劉陟呉兢是也謝呉姚察姚思亷呉兢俱作梁書顧野王傅縡姚思亷呉兢俱作陳書王劭等隋書在唐而屢變王劭張大素令狐徳棻皆作隋書孔頴逹作隋志云是長孫無忌奉勅撰無忌長官也呉兢亦作隋史二卷呉兢等唐史至五代本朝而再更晉劉照等修本朝歐陽公宋公重修以至三國五代史王沈作魏書陳夀作三國志韋昭作呉書薛居正作五代史歐陽公刪脩後魏北齊後周之書南史北史小史統史之别梁武帝作通史李延夀作南北史髙氏作小史姚康復作統史魏收魏澹張大素斐安時並作北魏書李徳林張大素李百藥並作北齊書令狐徳棻呉兢並作後周書悉非一人為之何遷固之書後世不能易自遷固而下歴代之史何作者紛紛不一也蓋西都之治遷固得之見知聞知者為甚詳其與後世之史臆測於數百年之下者不同也西都之文大畧近古故遷固之史事實文核其與後世雕飾駢儷文工而實不至者又不同也遷固父子家學相傳用法專一發凡起例動有法度其與後世之史出於衆口而筆於衆手者又不同也有是三不同遷固之書安得不永傳不朽而後世人之史安得不屢更而無定耶編年隋志謂之古史唐謂之編年春秋古史皆編年也易編年而為紀傳自遷固始遷固之後紀年出於汲冡漢紀作於荀悦故張潘袁宏作後漢紀習鑿齒作漢晉春秋干寶陸機之晉紀裴子野之宋畧呉兢韋述唐春秋近世司馬公通鑑皆編年也驗之唐志作者無慮四十餘家後世觀者多嗜紀傳而厭讀編年編年之書自春秋及左氏通鑑之外如荀悦漢紀之類至有耳不聞目不覩者何也意者紀傳之體隨其人之終始事之綱目即於一紀一𫝊見之故觀者易知也編年之法具一代之本末而其人之始終事之表裏則間見雜出於其間故觀者難於遽見又紀傳多載竒怪不經之語而編年則不可以泛紀也愛竒厭常舎難就易文人才子之習云耳必有史才者欲知去取予奪之大法則編年之書目熟而心究之矣偽史偽史者僣偽之事也隋唐志有常璩華陽國志有漢之書常璩撰蜀漢偽官故事也二石書燕秦凉趙事幾二十家隋謂之僣史唐謂之偽史按史通因習篇曰阮氏七録以劉石符姚等書為偽史及隋氏海内為家而撰隋經籍志者還依阮録與此不同蓋隋書内自有數本也雜史隋唐志同雜史者隋志云不與春秋史記漢書相似率爾而作非史之正也劉向戰國策陸賈楚漢春秋子貢越絶書後漢趙􅁮呉越春秋司馬彪九州春秋之類是也漢志以戰國策等入春秋經類其時經籍史部未多故不得不附于此耳唐志如貞觀政要明皇政録亦謂之雜史者此等書言其政之大畧耳善惡是非未必盡見也起居注隋唐同隋志云起居注者君舉必書記録人君言行動止之事也漢武帝有禁中起居注後漢明徳皇后撰明帝起居注然則漢時起居注似在宫中為女史之職然皆零亂不可復知今之存者有漢獻帝及晉代已來起居注皆近侍之臣所録晉時又得汲冡書有穆天子傳體制與今起居注正同以上並隋志云故隋唐志所載自穆天子傳而下漢晉宋齊梁隋唐皆有起居注其唐姚璹脩時政記亦其類也實録隋志無唐志有隋志如梁太清録周興嗣謝昊梁皇帝實録之類並入雜史類唐志則别立實録故唐家十八君皆有實録韓愈亦修順宗實録意者起居注者日記之史也實録則集日記而為一朝之史也韓愈沈傳師宇文籍撰順宗實録李吉甫監修事不歸一故退之托之人禍天刑之説云耳故事隋志曰百司庶府各藏其事太史之職又總而掌之漢定律令章程儀法晉初甲令已九百餘卷武帝命賈充引羣儒刪采其要増律十篇其餘不足經逺者為法施行制度者為令品式章程者為故事各還其官府縉紳之士撰而録之遂成篇卷故謂之舊事等書是也詔令晉雜詔宋幹詔集温彦愽古今詔集唐徳音録明皇制詔録等書見官志隋無此門職官隋唐志同隋志云古之仕者名書于所臣之策各有分職以相統治周官冡宰掌建邦之六典而御史數凡從政者然則冡宰總六卿之属以治其政御史掌其在位名數先後之次焉今漢書百官表列衆職之事記在位之次蓋亦古之制也漢末王隆應劭等以日官表不具乃作漢官觧詁漢官儀等書是後相因正史表志無復百僚在官之名矣縉紳之徒或取官曹名品之書撰而録之别行于世宋齊以後其書益繁故刪其見存可觀者編為職官因隋志之言而觀唐志職官類有開元六典注云開元十年陸堅被詔修六典𤣥宗手冩六條曰理典教典禮典政典刑典事典張説知院集賢院委徐堅經歳無規制乃命毋煚余欽韋述等參撰始以令式象周禮六官為制蕭嵩張九齡李林甫相代知院二十六年成自開元十年止此實十六年夫漢周設是官故有是制有是制故著是書以成制而為成書何難之有哉王隆有漢官觧詁應劭作漢官儀注徐勉梁朝選簿沈約梁朝新定官品皆述一代之官而為一代之書也雖一人為之亦足矣至於唐之建官本非周官之制元宗一旦手書六典令文臣修撰宜乎徐堅等經歳無規制也韋述等始以令式象周禮六官為制蕭嵩張九齡李林甫相繼知集賢閲一十六年而書始成是知唐志與周志異六典特象周為制耳如唐制與周同而不必倣象則修書者旦夕可就何必更易數十人綿延十六年而後成哉王方慶尚書考功簿裴行儉選譜有唐循咨格簿太寶中定沈既濟選舉志此則有唐官制也至於六典則非唐制而象周制者也更以唐官制實證與周不同處元和國計簿唐志職官類有元和國計簿按通鑑憲宗元和二年李吉甫奏元和國計簿自鳳翔至淄青一十五道不申户口之數鳳翔鄜坊邠寕振武涇原銀夏靈塩河東易定魏􅀶鎮冀范陽滄景淮西淄青十五道七十一州也由浙江至湖南四十九州倚辦賦税之資浙江東西宣歙淮南淮西鄂岳福建湖南共八道四十九州也輸税之户比天寶則四分减三仰食之兵比天寶則三分増一元和之兵八十三萬餘人輸税之户二百四十四萬大率二户資一兵其水旱所傷非時調發不在此數更有非時之調不在常賦之科此吉甫論元和地狹而税廣户少而兵多之説也元和六年吉甫又論中原宿兵八十餘萬商賈僧道十居五六以三分勞筋苦骨之軰奉十分待衣坐食之人况内外之官不下萬員而權臣月俸幾至萬貫九千緍也其刺史則月俸千緍遂以一鄉之民而為縣復以一縣之地而為州宜减入仕之塗及省吏員之數此吉甫論元和農少而仰食者多民稀而入仕者衆之弊也于時遂詔李絳等詳定併省内外官八百員諸司流外一千七百六十九人兵多官冗當時大弊吉甫國計簿之作是欲憲宗知其弊之所自來也然則此書唐志何為而列諸職官之間哉是蓋官兵之大數與俸廩之大計所係也今日之地雖兼江淮呉蜀而有之蜀中之賦不至京都所倚以辦官兵之資亦止於元和中所謂浙江八道之數元和之弊與今日正同故詳著其始末云太和國計簿亦在唐官職門宋朝有丁謂景徳㑹計録田况皇祐㑹計録儀注儀注者君臣父子六親九族上下親踈之别養生送死弔恤賀慶及進嵗儀之數也即唐虞之三禮周官之五禮也三禮五禮既入禮經類自漢而下所謂儀注書儀二禮五禮及天子駕鹵簿衣服志等書乃附史家儀注類者豈後之禮儀不足以配古歟刑法漢建武律令故事漢名臣奏廷尉决事陳夀漢名臣奏事賈充杜預刑法律本宋齊梁陳隋唐皆有律書夫諸史既有刑法志而藝文志史家復有刑法類者刑法志言律令更革與用刑重輕之意也藝文志所載皆刑法書名而已唐律令格式始於隋見隋志武徳中詔裴寂等撰定律令流罪三皆加千里居作三嵗至三嵗半者悉為一嵗餘無改焉貞觀中又詔房𤣥齡等撰定律令格式降大辟為流者九十二流為徒者七十一以為律定令千五百餘條以為令又刪武徳以來敕三千餘條為七百條以為格又取尚書省列曹以諸寺監十六之計帳以為式又太宗以笞杖徒流死為五刑去斷趾法為加役流三千里居作二年又詔罪人無得鞭背皆在未定律令格式之前既定律令格式則縱死囚寛黨仁宏之死唐之法汰重為輕亦已甚矣由隋人之法盗一𤓰者至死盛夏六月猶且行刑至唐屢加减汰方可耳貞觀所定行令格一有留司格者以尚書省諸曹為目其常務留本司者為留司格也永徽所定律令格式有散頒天下格者天下所共也有留本司格者以曹司常務為行格也唐律疏唐志有律疏三十卷注云長孫無忌李勣于志寕唐臨段志𤣥等七人奉詔撰髙宗永徽四年上刑法志髙宗初即位詔律學之士撰律䟽又詔長孫無忌等増格敕其曹司常務曰留司格頒之天下曰散頒格是知刑法志散頒留司格在撰律䟽之後而藝文志散頒留司格在律䟽之前藝文以所上年月為定也又刑志以律䟽為律學之士所撰此云是無忌等撰其實律學之士為之無忌等總攝其事故題以長官之名耳國史國朝之史聖宋之史國初始有内庭日厯樞宻院抄録送付史館然不過對見辭謝而已而帝王言動莫得而書扈蒙始乞委㕘政抄録言動並付史館至太宗朝張泌始請置起居院復左右史之職以記録為起居注與時政記逐月終送史館以備修日厯自是以來國史常以宰相監修學士修撰又以兩府之臣撰時政記選三館之士當升擢者乃命修起居注如此不為不重矣然修撰之官非據諸司供報不敢書所聞見而撰述成又必録本進呈歐陽修建論仁宗朝史館有欲書而不得書者有欲書而不敢書者因請史得以據所聞見而書之更不敢進呈其本李昉扈蒙同修太祖實録錢若水楊億同修太宗實録李維晏殊孫奭同修真宗實録富弼總類三朝編為三朝典故范祖禹編仁宗訓典進讀三朝寶訓神宗實録至髙宗始定紹聖初蔡卞曽布等以乆不得進用欲乞改元祐諸臣所為盡復王安石政事故指范祖禹趙彦若等所修之神宗實録為詆誣先烈因請用王安石日録改修其言皆出一時私意變亂是非於是元祐史官皆得罪迨夫徽宗初陳瓘陳次升相繼論列雖常降詔刪修然卒為卞京所蔽不克是正在紹興間我髙宗皇帝灼見邪正之實乃命范冲等重修天下之議始定記注漢有起居注唐亦有起居注宋朝淳化置之禁中漢制也而元豐之二史分注則唐之制也先唐有時政記後唐亦有時政記宋朝開寶委之宰臣先唐制也興國之二府分注則後唐之制也帝王之言動必書臣下之是非必録其記述之職乎雖然有異唐者二史所注止於後殿舊制也而宋仁祖許前後殿皆立則凡有言行皆得與聞之矣樞密所記止於内庭舊制也而宋真宗俾宰樞别撰則凡有言行皆得並書之矣雖然又有大異於此者古者天子不觀史天子觀史自唐始宋朝起居注撰集時政記亦進御其㳂唐之制乎而宋仁祖不使之進而孝宗又不使之進則凡所記無䛕辭而所注皆直筆矣嘉祐以前時政惟書辭見雖起居注亦然其畧而不得書若此歐陽一言仁祖亟從有以也紹興間柄臣當國起居注廢而不修者十五年耳記時政又可知已其畏而不敢書若此胡銓一言孝宗聴之意蓋有激也夫史不進本則無曲筆史得悉書則無遺事斯不亦盡善盡美矣乎修撰史之目不一而其凡有二曰紀載之史曰纂修之史時政有記起居有注其紀載之史乎纂修之史名目滋多實録云者左氏體也正史云者司馬體也紀其大事則有玉牒書其盛美則有聖政總其樞轄則有㑹要其曰日厯合紀注而編次之也其曰寶訓於實録正史之外而撰定之也其為書也詳其為職也重任是責者豈容以易為哉世嘗謂天子觀史則史不敢書宰臣監史則史不得書唐之制然也宋朝之制亦然也吁有是哉宋朝天子雖亦觀史然一物之名必令其書則凡所書皆直筆也又况不使進本其仁宗嘗行之矣宋朝宰臣雖號監修然一字之易聴史官自執則凡所書者非私意也又况不立監修宋神宗又嘗行之矣唐以觀史而私宋朝以觀史而公唐以監史而紊宋朝以監史而定故凡執唐以議論宋朝者皆未之攷也是故王元之直書吾取之扈蒙之多遜吾無取之司馬公之記事吾取之荆公之日録吾無取焉吾有公非碧雲騢之妄相抵毁吾不問也有公是伊川雜録之妄相推美吾不信也昔太祖嘗謂内臣曰爾謂帝王可容易行事耶偶有誤失史官必書之昔人謂史官之權與天與君之權均矣信矣哉玉牒登封告成必用玉檢法令明奥號為玉條天下之至堅而不可磨者玉也史以玉牒名其殆鋪張對天之閎休揚厲無前之偉績乎玉牒名書自唐開成始上自帝系下及祥瑞凡大制作大除拜咸書之春秋之法大事則書之策或者其遺意歟聖明迭興璇源流衍設局於祥符之六年謹㑹粹也建殿於祥符之八年重秘藏也景祐之制參㑹要而修纂之慮遺失也元豐之制合日厯而節録之重記注也瑶編金軸藻飾愈崇寶鑰縹囊緘護愈密祖宗之隆重若此亦恐尊聖徳隆世系在是故爾中興以來尤加崇重宰臣提舉曩未有也而今有之從臣兼修曩未有也而今有之曩宗正所掌凡數書今三書合而一獨玉牒不之合以玉牒異於三書也曩玉牒成書聖徳居一今所修聖徳名為中興聖統以中興異於昔時也曩諸司供報動至稽時今也加之督促廢職舉矣曩成書來上動十年今也不拘乆近怠心去矣實録史以實録稱古無是也而稱之自漢始史以實録名漢無是也而名之自唐始祖漢唐之舊號成宋朝之一經蘭臺石室有直筆而無隱情寶軸牙籖有全書而無逸典可不謂之盛徳事乎然嘗恠太祖太宗之舊録事多遺闕其失也畧神宗哲宗之舊録事多竄易其失也誣嘗攷其故事實未見於津涯翰墨或多於漏畧而張伯所修僅止一卷迨李沆重修而始備獻贊雖著於話言親决不聞於策府而錢若水所修止用九月迨王旦増修而猶闕此其失之畧可知矣自安石日録附入正史神宗本意鬱而不明迨攷異之書著而去取始定自京卞諸人妄出私意宣仁盛徳抑而不宣迨辨誣之書作而汙衊始潔此其失之誣可知矣若夫真宗之百五十卷修之者孫奭也仁宗之二百卷典之者韓公琦也英宗之三十卷領之者曽公亮也徽宗之六十卷髙宗之二百二十卷則紹興嘉泰之臣實定之也紀述之詳議論之當無復有前二者之弊矣迨孝宗之在位凡二十有六載豐功偉徳宏模懿範皎皎乎其不可誣也嘉定天子克紹前烈乃命儒臣討論而潤色之今之遷固其才賈董其筆者誠有人矣然採摭舊聞網羅遺逸惡可書也或慮子孫之讐隙而不敢書善可書也或疑子孫之虚飾而不敢書若此則雖備猶未備也若乃提舉以宰臣修撰以侍從檢討校勘以本省官或置院或寓史館斯特其制然爾㑹要日厯始於唐時政記始於唐玉牒實録亦始於唐史之有㑹要其亦自唐始乎有唐㑹要蘇冕創之崔鉉續之至于宋朝王溥而後成之嗟夫此一代之典耳人更三手世厯數代而其書始就緒甚矣㑹要之難成也宋朝之㑹要慶厯三年以上王洙修之熈豐間王珪續之亦既續之矣而洙之所修又取而増損焉熈寕十年以後蔡攸修之乾道間汪大猷繼之亦既繼之矣而攸之所修且盡從而刪定焉葢嘗攷之洙之紀載也多遺事其修撰也多羡文遺事可増也羡文可逸也此珪所以必加之増損也攸之修定止於三門其所改易本於時好止於三門非成書也本於時好非正論也此大猷所以必加之刪定也熈豐之増損乾道之刪定於是得其當矣若夫始於帝系終於蕃夷類而總之彼離而此合王洙㑹要總類十五帝系三卷禮三十六卷樂四卷輿服四卷學校四卷運厯瑞異各一巻職官三十三卷選舉七卷食貨十六卷刑法八卷兵九卷方域八卷蕃夷三卷王珪㑹要凡二十二類如后妃王洙入在帝系中王洙自為一類别而分之前畧而後詳王珪㑹要總二十一類八百五十五門此又其精者也紹興天子嘗曰㑹要祖宗故事之總轄不可闕也舊書分門極有法似不湏改大哉王言是以定史筆之權度也成則一定厯世由之中興㑹要成於乾道九年孝宗㑹要成於淳熈七年嘉定天子因而續之提綱属之大臣振範資之時宰成書來上軌範具存紫宸進讀縉紳拱聴嗚呼盛矣日厯莫詳於建炎紹興之所録時政有記起居有注合記注而兼修之其惟日厯乎記注之厯外廷之言行書焉内庭之機密書焉然後舉而委之史館以日係月以月係時以時係年此日厯之所由作也或𨽻秘書省或不𨽻秘書省而所𨽻無定属或秘書預修或秘書不預纂修而所預無定員有以修撰専修者有不以修撰修者又有以修撰與判館直館分修者而所修亦無定職監修以宰臣重其事也論撰以從官謹其職也檢討闕官則置之編類員少則増之詳其任也此特其制之粗也而紀述之嚴揄揚之盛猶有可論者向也史官不記言動自張泌一言而忠邪書矣向也史官惟慿供報自歐陽一言而後書所聞見不止於供報也有大於此者太宗日厯一字不易而真宗已與王旦議之矣繼自今已往史臣其敢妄書乎神宗日厯一渉私筆而誤髙宗已命范冲修之繼自今以往史臣其敢繆論乎至若信𫝊信疑𫝊疑筆則筆削則削若建炎紹興之所録者又古今之所無也寶訓寶訓云者於國史之外採摭故典而作之也根荄於唐之呉兢建明於宋朝之王曽李淑王舉正之纂修其因曽之言歟林希曽鞏之續修其倣曽之意歟淑可責也而舉正為足重也希不足貴也而鞏為不可及也若夫蔡京之所陳乞則異是矣舉正之所修以真宗正史既成而後修之也鞏之所修亦兩朝正史既成而後修之也然神宗之史未成而先修寶訓京何見哉舉正所修首以政體徳居其三尚政也曽鞏所修首以孝徳政居十二尚徳也京於正史猶加之誣何有於寶訓哉中興以來洗瑕滌穢雲霧一開日月照矣而堯言布天下繼此又有光也歳在甲子特加纂集嘉泰始年修髙宗寶訓嵗在丁丑特命進讀嘉定十一年進讀髙宗寶訓猗歟盛哉三墳五典三代之書皆寶訓也而堯典又有首稱者歟誦堯之言行堯之行亦堯而已矣正史且正史之修始於景徳之初年景徳四年詔修宋太祖及太宗正史當是時也史館文書先時編次二府紀録及時供報一禮制之文未備未害也而必求之則凡典故之疎漏者畢録矣一州郡之名未當未害也而必易之則凡典故之㳂革者悉著矣人務為甄官鐘鼓樓為陋室細事也而今直書則凡有大於此者無飾辭矣自時厥後真宗國史成於王曽一美政之有疑不敢書也五朝國史成於曽鞏一事迹之未究不敢書也一語之褒春風和氣一字之貶秋霜烈日公論之在史筆昭昭乎其不可揜也熈寕元豐正邪迭勝元祐紹聖編輯各殊甚者補天洗日之功曖昧而不宣者數十年然尊堯有集辨誣有書公議之在天下也不可磨也不獨此也紹興權臣所書聖語多出己意未幾而刪去之矣開禧之初權臣妄貪天功貿亂國典未幾而更定之矣人心之公議如此哉羣書考索續集卷十六
