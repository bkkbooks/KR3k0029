body:
  text: 羣書考索别集卷二十五宋章如愚撰邉防門蜀全蜀自古為蜀之要害曰興元曰成州曰文州曰龍州曰金州今日為蜀之要害曰巴州曰劍州曰閬州曰古渝興元即漢中郡古南鄭也楊洪謂孔眀曰漢中益州咽喉無漢中則無蜀矣成州即武都文州即漢開西南夷置隂平道鍾㑹伐蜀姜維表請備隂平即此龍州晉置隂平郡鄧艾自隂平至江南金州魏置魏興郡符堅由此冦蜀晉吉挹扵西城縣南九里築壘拒之巴州有米倉前瞰漢中近米倉南地名三㑹乃劒閬巴蓬渠達六郡之衝要建屯扵此可遏其突至䕫門劒州有劍門實有天險與利為鄰阻闗為固可遏其突入西川閬州有大獲城近利州阻山為固可遏其突入葭萌古渝據内外二水之㑹三面斷崖壁立可控引三陕孔眀論跨荆益後漢建安十三年孔眀謂先主曰益州險塞沃野千里天府之土将軍若跨有荆益保其巖阻則伯業可成孔眀論帥益州兵又云天下有變則以一軍向宛洛一軍向秦将軍親帥益州之衆以臨闗中則孰不簞食以迎将軍周瑜欲取蜀十四年瑜見孫權乞與奮威俱進取蜀而并張魯留奮威固守其地與馬超結援法正說取益州十六年法正至荆州說先主取益州龎統曰益州土沃財冨大業可成先主降劉璋十七年先主攻璋進圍成都城中尚有精兵三萬穀帛支一年吏民咸欲死戰璋遂降曹操降張魯二十年操降張魯使夏侯淵張郃屯漢中法正說先主取漢中二十二年法正說備曰操一舉而降張魯定漢中不因此埶以圗巴蜀而留淵郃屯守身遽北還舉衆往討必可克也備善之乃遣諸将進兵漢中漢中益之咽喉二十三年備屯陽平闗與淵郃徐晃相拒遣陳式絶馬鳴閤道晃破之急書發益州兵亮以問楊洪洪曰漢中益之咽喉存亡之機㑹若無漢中則無蜀矣先主斬夏侯淵二十四年淵備相拒踰年備自陽平南渡沔水沔水屬漢中縁山稍前營扵定軍山淵争之備使黄忠乗髙鼓噪攻之斬淵先主得漢中操自長安出斜谷軍遮要以臨漢中備曰曹公無􅀎為我必有漢川矣趙雲将數千騎大破魏兵備遂有漢中吴蜀唇齒魏黄初四年蜀遣鄧芝脩好扵吴芝曰蜀有重險之固吴有三江之阻合此二長共為唇齒亮定中原太和元年亮率諸軍北駐漢中臨發上疏曰今天下三分益州疲敝此誠危急之秋今南方已定兵甲已足當奨率三軍北定中原遂行屯扵沔北陽平右焉亮斬王雙二年亮引兵出散闗圍陳倉以糧盡引歸王雙追之亮擊斬雙亮㧞二城三年亮遣陳戒攻武都隂平二郡㧞之木牛運糧五年亮出祈山以木牛運米司馬懿督張郃等救祈山亮大破郃死之司馬昭欲伐蜀景元三年昭欲伐蜀朝臣多持不可昭諭衆曰吴地廣而下濕攻之差難不如先定巴蜀三年之後因順流之勢水陸並進此滅虢取虞之勢也今絆姜維扵沓中使不得東顧直指駱谷出其空虚以襲漢中其亡可知也姜維請據險姜維表冝遣諸軍分護陽安闗且及隂平之橋頭黄浩信巫鬼謂敵不至寝其事鄧艾伐蜀四年鍾㑹鄧艾三道伐蜀艾督三萬餘人自狄道趣甘松沓中以連綴姜維諸葛緒督三萬餘人自祁山趣武街橋頭絶維歸路鍾㑹統十餘萬分從斜谷駞谷子午谷趣漢中姜維引兵守劒閣㑹攻之不克食乏欲還艾言若從隂平由邪徑經漢徳陽亭趣倍出劍閣西百里去成都三百餘里竒兵衝其腹心劍閣之守必還赴涪則㑹方軌而進劒閣之軍不還則應涪之兵寡矣遂自隂平行無人之地七百餘里鑿山通道造作橋閣艾以氊自褁推轉而下将士鑿木縁崖魚貫而進降馬邈扵江油斬諸葛贍扵綿竹禪降王濬造船晉泰始八年晉将平吴濬造船艦扵益州羊祜疏今梁益之兵水陸俱下巴陵竒兵出其空虚一䖏傾壊則上下振蕩桓温平蜀永和二年温将伐漢軍青衣漢主勢大發兵拒之漢人無鬭志遂降符堅取蜀寧康元年秦楊庶等㧞漢中克劒門降梓潼遂取梁益二州劉裕平蜀義熈九年裕用朱齡石斬譙縦遂平蜀拓㧞英圍南鄭齊建武二年魏主在鍾離梁州刺史拓㧞英請以州兵㑹劉藻擊漢中魏主許之蕭懿等據險立柵英急攻㧞之乗勝長驅遂圍南鄭太祖平蜀宋朝乾徳二年上命王全斌等合步騎六萬伐蜀上出畫圗示全斌等曰西川可取王全斌等曰臣等仗天威遵廟算克日可定史延徳曰西川若在天上不可到在地上到即平十二月劉光義入峡連破松木三㑹巫山等寨初蜀扵䕫州嘗鏁江為浮梁上設敵棚三重夹江列礟具光義等行上出地圗指其䖏曰沂江至此切勿以舟師爭勝當遣步騎俟却乃以戰棹交攻可必取也光義等未至鏁江三十里許捨舟前達浮梁復引舟而上遂頓兵白帝廟西戊辰光義遣張廷翰與守謙戰扵猪頭鋪守謙敗走廷翰乗勝攻其城王全斌以蜀斷棧議取羅川路康延澤謂彦進曰羅川路險不如分兵脩棧約㑹大軍扵深渡可也彦進遣白全斌全斌許之不數日閣道成進擊金山寨又破小漫天寨而全斌亦以大軍由羅川深渡與彦進㑹兵二道遂破之壬申全斌等入利州命史延徳分兵趨来蘓跨江為浮梁以濟延徳至青強取劍州昶和劒門已破李昊勸封府庫以降遂克蜀敵由陕趨蜀建炎二年敵将婁室至鳯翔謀趨涇州涇原統制曲端正将吴玠屯軍原上婁室遂自馮翊渡河破潼闗䧟同華陕以歸知延安王庶遣将斷河橋絶其歸路敵遂遁後圍陕李彦仙極力禦之敵首拜城下而去敵䧟延安敵至延安庶召諸軍未集端不援敵乗虚䧟延安張浚使川陕三年張浚為川陕宣撫䖏置使初上問大計扵浚浚請身任西事置司秦川故有是命浚用曲端曲端前在陕西屢嘗挫敵浚欲仗其威聲拜為統制浚論漢中形勝九月敵入永興軍十月浚至興元言漢中實形勢之地理財積穀願陛下扵来夏早為西行前據六路之師後據兩蜀之粟左通􅍮襄之財右出秦隴之馬天下大勢可定矣浚移王似知成都浚至秦州即出行闗陕移環慶帥王似知成都以趙哲代之參議劉子羽薦吴玠㧞為統制官又以其弟璘領帳前親兵全陕沒四年春敵䧟陕州李彦仙死敵始敢西而全陕沒矣曲端拒敵敵攻邠州浚遣端拒之兩戰皆捷又敗之扵白店原薩里罕望之懼而哭既而端所部張中孚李彦琪戰不利敵亦引去浚罷曲端王庶毁端浚乃罷其兵柄陕西人恃端為命及是軍情不恱冨平之敗浚自冨平敗退保興州吴玠收餘兵閉大散闗以斷敵来闗師古收餘兵保岷孫渥扵階成鳯三州扞蜀口既而散闗又不守浚欲徙治䕫州劉子羽曰若東走䕫門則與闗中血脉不相通當且留興州外繫闗中之望内安全蜀之心浚乃止玠視散闗之東有險曰和尚原方據險列柵而賊已抵原下浚又退保利州或謂玠冝屯漢中以安蜀玠曰我保此敵必不敢越我而進堅壁臨之彼懼躡其後是所以保蜀也敵旋引去五路之䧟敵破涇破渭降慶扵是五路相繼䧟沒吴玠和尚原之捷紹興元年敵分兩道入攻玠璘以數千人駐和尚原朝問隔絶軍儲匱乏人無固志有謀刼玠兄弟北去者玠召諸将勵以忠義諸将感泣敵至玠引待之更戰迭休敵烏濟赫敗走十月烏珠移寨欲窺蜀玠扵和尚原先䖏戰地烏珠至玠率諸将選勁弓強弩分畨迭射號駐隊與敵戰凡三十餘陣烏珠中箭而遁俘其将英格貝勒横尸滿野是役也烏珠往返萬里首尾二年其衆損者踰半皆呻吟携持以歸烏珠初有從馬數百至是僅留其六乃北歸燕山保蜀亦浚用玠之力王之望記西事曰陕西之敗皆浚為之然而金人不􅀎取蜀亦浚用玠之力張浚罷赴行在二年以王似為川陕宣撫浚即求去且論吴玠劉子羽皆有功扵蜀不應一旦以似加其上又以盧法原為副使罷浚令赴行在敵入金州三年薩里罕由商扵出漢隂趨金商王彦兵敗退保石泉縣敵入金州敵䧟興元知興元劉子羽遣田晟守饒風嶺且報玠玠曰事急矣當亟邀于險諸将不􅀎辦我當自行自河池縣一日夜馳三百里至饒風拒之官軍萬七千人益以洋州義士為三萬敵繞出饒風嶺後玠還仙人闗敵䧟興元子羽保三泉縣從兵才三百子羽遺玠書與之訣玠得書泣引麾下趣三泉數日兵稍集子羽以潭毒山形斗㧞其上寛平有水乃築壁壘守之初敵謂四川唾手可取所忌獨玠故道險從金商不意玠越境而戰至是野無所掠殺馬而食盡殺簽軍而食遂退諸将分守陕蜀四年王似盧法原同在閬分陕蜀之地責守扵諸将自秦鳯至洋川吴玠主之屯和尚原金房至巴達王彦主之屯通州文龍至威茂劉錡主之屯西洮岷至階成闗師古主之屯武都未幾師古降賊玠併統其衆自此遂失洮岷獨存階成而已辛炳劾浚浚還朝御史辛炳言浚輕失五路坐困四川用劉子羽輩皆小人而殺曲端趙哲為無辜以至授秘閣以崇儒擬上方以鑄印吴玠殺金平之捷烏珠薩里罕復犯仙人闗玠為壘扵闗旁殺金平嚴兵待之楊政謂玠曰此地為蜀扼塞死不可失當守以強弩彼不敢舍而犯闗且地名亦善破之必矣及敵攻壘玠命璘領射士號駐隊者射之又夜攻兩酋寨破之敵不􅀎支遂遁是役也敵自元帥以下皆令携弩而来又選取豫腹心為四川招撫使期不徒還既不得騁則還鳯翔授甲士田為久留計不敢復妄動矣吴玠専治戰守吴玠為川陕宣撫副使専治戰守趙鼎都督川陕七月以鼎為川陕宣撫䖏置使鼎奏陛下扵浚有山河之誓終致物議今臣當此重責伏望憫臣孤忠使得展布四體少寛陛下西顧之憂楊政㧞秦州五年玠以敵犯淮上亟遣楊政乗機牽制政㧞秦州宣撫盧法原憾政不濟師不餽糧不給錢幣不應副器械功成又不銓量功獲将士上以手詔詰法原既而法原卒扵閬令玠權行宣撫司事又以邵溥權川陕副使吴玠趙開謀不合玠與總領趙開謀不合玠欲從陸運糧開執言不可玠乃扵洋州及闗外成鳯岷三州治屯田嵗收十萬斛吴玠宣撫六年陞玠宣撫使罷邵溥職聽玠移撥錢物委開拘收胡世将制置八年四川謀帥上問刑書胡交脩廷臣孰可将者交脩曰臣從子世将可用遂除之吴玠卒九年玠走于仙人闗胡世将嘗問玠所以勝者扵璘璘曰敵令酷而下必死先兄每與敵戰非數月不决舉所長用之爾中國弓矢勁利敵士卒堅耐吾嘗以長技洞重甲扵數百步外又選據便利出銃卒更擾之使不得休彼雖堅耐亦不􅀎無弛此待之之要世将乞命璘世将乞命吴璘扵鳯翔及寳雞以来命政扵鞏州及白石以来駐軍則應接川陕其勢兩便吴璘以身任責十年敵渝盟薩里罕據鳯翔胡世将在河池諸将勸其退保吴璘曰敵所以輕犯我者聞先兄亡謂我無權今我退墮其計矣璘請以身任責世将壮之乃曰吾遽避則大事去矣吾誓死扵此勿多言也敵奄至石壁寨璘遣姚仲拒之哲庫貝勒中傷退屯武功烏濟赫自武功整兵再来吴璘楊政迎敵至扶風縣力戰㧞其城殺敵衆幾盡力保闗隘詔胡世将今日事勢以力保闗隘為先璘㧞秦州璘政入陕十一年吴璘楊政下秦隴取華虢入陕府以鄭剛中為川陕宣撫使楊政攻敵于渭北擒通恩貝勒璘辨四長四短二十一年利西安撫吴璘鎮興州已久自著書曰金人有四長我有四短當反我之短而制彼之長曰騎兵曰堅忍曰甲重曰弓矢吾當集漢蕃所長而兼用之故制其騎則有分隊之法制其堅忍則有更休迭戰之法制其甲重則勁弓強弩制其弓矢曰以逺尅近以強制弱璘為宣撫三十一年吴璘為四川宣撫使仍判興州璘破敵九月敵喀齊喀自鳯翔大散闗入州界攻黄牛堡用強臂弓射退璘復秦隴敵犯黄牛堡旬餘不退璘遣将至寳雞滑河刼寨大捷又攻秦州破之羣書考索别集卷二十五
