body:
  text: 羣書考索續集卷二十宋章如愚編律門律數生鍾分子一分丑一分二三三而積寅九分八卯二十七分七六二其實辰八十一分六十四四其實亥十七萬七千一百四十七分六萬五千五百三十六三三而積三其法也一倍而為二或一演而為四所謂倍其實五其實也太史公曰以下生者倍其實三其法以上生者四其實三其法六者子為陽丑為隂陽生隂為下生隂生陽為上生子一分也三三而積則下生丑得三分是所謂三其法也一為實一則倍之而為二故丑三分而又有二云者倍其實也丑為隂寅為陽自丑三分而上生寅九分亦三其法也二為實而四之則為八故寅九分而又有八云者四其實也自丑順數至亥但推此例筭法則得十七萬七千一百一十七分皆二其法之所積也又有六萬五千五百三千六云者皆倍其實之所積也漢志曰數起於黄鍾始於一而三之三三而積之歴十二辰之數十有七萬七千一百四十七而五數偹即此之謂也太極元氣函三為一變一而三變三而九故曰一十百千萬本起於黄鍾之數也生黄鍾九陽數之極故黄鍾乃陽之長其律九寸六隂數之極故林鍾為隂之長其律六寸太史公論黄鍾之術乃曰上九商八羽七角六宫五徵九置一而九三之以為法實如法得長一寸凡得九寸命曰黄鍾隋志以十辰為成數以十二辰為該數以為律積以成法除該積得九寸即黄鍾律之長也此二説叩之能筭法者見一生三三生九而已實如法得九寸者一為本數之實如三三而積之法以乗之則得九寸也以成法除該積者十二為該數如三三而積之法除去其三亦九寸也六觚筭法六觚者周流六虛之象也其筭法用竹徑一分長六寸二百七十一枚而成六觚為一握蘓林曰觚角也度角至角其度一寸靣容一分筭九枚六九五十四筭中積凡得二百七十一枚孟康曰以四十九䇿成陽六爻為乾乾之䇿二百一十六以成六爻是為周流六虚之象也夫乾䇿二百一十六而六觚則二百七十一止言乾之䇿而不及坤之䇿何也按隋志曰筭用竹廣一分長三寸正䇿三亷三脊也積二百一十六枚成一觚乾之䇿也負䇿四亷積一百四十四枚成方坤之䇿也校之漢志徑一分與二分之説不同長六寸與三寸之説不同二百七十一枚與乾坤之䇿三百六十之説不同是則漢志之法畧隋志之法詳也要之漢志六觚容筭二百七十一者筭徑一分故其中所容多也隋志六觚容筭二百一十六枚者筭廣二分而三亷故其中所容少也漢志以徑象黄鍾之律一分而長象林鍾之律六寸用此法則二百七十一筭不能象乾䇿坤䇿之數矣隋志以觚象乾䇿以方象坤䇿觚方皆經十二辰之數見本文用此法則正䇿二分而三亷負䇿二分而四亷其長皆不逾三寸用此法則其長其徑不能象林鍾黄鍾之數矣大抵天地有生成之數積筭有乗除之法推而廣之一十百千萬非假觚方之筭則不可也其觚方之制竹筭長徑之數其間雖黙有自然之理足以象乾坤律吕之義茍不能推廣無窮之數而待求工於一握之筭溺意於方觚之噐取彼合此分多配寡殆非深於筭術者也乾坤之䇿二篇之爻乾一爻三十六䇿者陽數九四九三十六也六爻則二百一十六䇿也坤一爻二十四䇿者隂數六四六二十四也六爻則一百四十四䇿也合乾坤之䇿則共成三百六十䇿當期之日也又二篇之䇿三百六十四者此以六十四卦推演之也一卦六爻六十四卦則三百八十四爻也又乾坤之䇿推而演之則得萬一千五百二十當萬物之數也夫三百八十四爻半為陽半為隂毎一半則計一百九十二爻凡一爻計三十六䇿則合得六千九百一十二䇿也隂爻一百九十二凡一爻計二十四䇿則合得四千六百單八䇿也六千九百一十二加四千六百單八則共成一萬一千五百二十也復以乾坤之䇿乗二篇之䇿也乾䇿老陽坤䇿老隂也二篇之䇿老隂老陽變生少隂少陽為三百八十四爻也天地之數大衍之數大衍之數五十其用四十有九天數二十有五一三五七九共二十五也地數三十二四六八十共三十也凡天地之數五十有五以五行氣通凡五行减五大衍又减一故四十九也姚信云天地之數五十有五其六以象六畫之數兼虛一之數共為六畫此説尤非故减之而用四十九也王弼云演天地之數所頼者五十也其用四十九其一不用也不用而用以之通非數而數以之成斯易之太極也四十有九數之極也云演天地之數是云數之極非甞因諸家之説而攷之易係之文首言乎大衍之數之用次及乎分二掛一揲四歸竒之法又其次始言天地之數五十有五以成變化而行鬼神又其次則言乾坤之䇿當期之日與萬物之數故其末總提上文云是故四營而成易十有八變而成卦引而伸之觸類而長之天下之能事畢矣顯道神徳行是故可與酬酢可與佑神矣觀聖人立言之意不先言天地之數五十有五而先言大衍五十者明所主在大衍也明大衍包天地之數而非天地之數生大衍也何者天之數可名以一三五七九地之數可名以二四六八十也大衍虛一不用則不可以名求無名為有名之宗故大衍足演天地之數也其用四十有九以生天地之數而為天地樞故五竒五偶推而至於五十有五此天地之數此乾坤之䇿亦自大衍而生也注大衍揲􅆱乾䇿三十六為老陽坤䇿二十四為老隂乾坤之䇿自大衍生也此所謂引而伸之觸類而長之之意也此顯道神徳行所以形容虛一不用之意也虚一不用太極之道也分而為二以象两太極生兩儀也揲之以四而象四時即兩儀生四象也注九六七八為四象十有八變而成卦四象又生八卦也此非大衍生天地之數而何茍曰天地之數五十有五去其六而為大衍之數則是天地之數演大衍非大衍之數演天地也是兩儀生太極非太極生兩儀也惟王弼之注黙諭此意故曰演天地之數所頼者五十也不曰天地之數演大衍而曰大衍之數演天地不曰所頼者五十五而曰所頼者五十明五十五之數頼五十之數以生也又曰其一不用易之太極也是亦太極生兩儀之意歟雖然王弼之言固足以知大衍之奥㫖其曰四十九者數之極惟此言為害理大衍之數茍極於此則其用何以窮變化哉此用數也非極數也或者以為整數亦非也唐僧一行倚大衍之數以立厯法自十百而至于千萬自千萬而至于億兆悉是道也其數何窮極之有哉一行言虚一包四十九之用即太極之説矣其演生數成數即太極生天地也其所謂揲餘䇿實即乾坤二篇之䇿也至於天地之數五十有五所以不用其五而為大衍者何意一行則未甞言之又以大衍之數非生於天地之數也一行猶知此意何鄭康成姚信之不悟也一行曰兼生成數而為天地之數以五位取之復得二中之合者生數一二三四五共十五也成數六七八九十共四十也十五四十共五十五也故曰大衍兼生成之數為天地之數大衍筭法乾老陽坤老隂震坎艮三少陽巽離兊三少隂以此為次第亦可聖人揲蓍虛一分二掛三揲四歸竒再扐確然有法象非茍作也故五十而用四十九分於兩手掛其一則存者四十八以四揲之十二揲之數也左手滿四矣乃扐其八而謂之多左手餘一則右手餘三左手餘三則右手餘一左手餘二右手以餘二矣乃扐其四而謂之少三少則扐十并掛而十三其存者三十六為老陽乾以四計之則九揲也故稱九三多則扐二十四并掛而二十五其存者二十四為老交隂坤以四計之則六揲也故稱六一少兩多則扐二十并掛而二十一其存者二十八為少单陽以四計之則七揲也故稱七一多兩少則扐十六并掛而十七其存者三十二為少隂以四計之則八揲也故稱八所謂七八九六者盖取四象之數也於是五十之䇿不可増損増一損一則不可揲之矣故王弼述天下之㫖曰演天地之數所頼者五十也茍謂聖人以五行天五之故特减其五則未知不减之時當如何揲也曰少者皆陽爻也曰多者皆隂爻也一少而二多震之象也二多而一少艮之象也一多而二少兊之象二少而一多巽之象也一多一少而復一少坎之象也一少一多而復一少離之象也九六各一乾父坤母也十八各三六子也震長男坎中男艮少男三少陽也巽長女離中女兊少女三少隂也掛左則數右掛右則數左九流筭法東漢志鄭𤣥傳學九章筭術注云周公所作也凡有九篇一日方田粟米差分少廣均輸傍要盈不足九鈎股與此大同小異馬援採為九章注云劉徽所作隋志論一十百千萬之數有律度嘉量衡厯率之别所謂田疇界域二曰粟米王荆公立方田之法亦方田之意祖冲之等法程粟一斛積二千七百寸程米一斛積比上則八十寸是也以御交質變易三曰衰分以御貴賤禀粟一行曰法有轉分有列衰衰進退之象四曰少廣以御積羃方圎祖冲之有差羃法隋志論斛羃若干斛積若干五曰商功以御功程積實即隋志程粟米知度量廣狹淺深之數也六曰均輸以御逺近勞費豈桑洪羊均輸之意耶七曰盈朒以御隠雜互見一行歴法進為盈退為朒八曰方程以御雜揉正負九曰句股以御髙深廣逺即王蕃句股之法也測日景之類皆乗以散之除以聚之齊同以通之合有以貫之則筭數之方盡於此矣周徑宻率隋志曰古之九數員周率三員徑率一其術踈舛自劉歆張衡等各設新率未臻折𠂻惟宋祖冲之以宻法推之其員徑一億為一丈員周盈數三丈一尺四寸一分五厘九毫二杪七忽朒不足數也只少一忽正數又在盈朒二限之間宻率員經一百一十三員周三百五十五約率員徑七員周二十二觀冲之之法即徑一周三徑三周九之法耳特其計析毫厘故徑上於一而周三則有竒推而廣之徑七周二十二而約率已加一分矣又推而廣之員徑一百十三員周三百五十五而宻率已加十六分矣又推而廣之則盈朒所爭止於二忽而正數又在盈朒之間此其計之詳悉一至此極隋志所謂古者周三徑一之説其術踈舛也雖然銖銖而稱至石必差寸寸而度至丈必過古人約法亦未容以踈舛忽之中數生數成該法實損益乗除正負約宻脁朒周徑肉好庣羃天之中數五五在一三七九之中也地之中數六六在二四八十之中也一生數也一至五為生數六至十為成數置一得九九與一為十也三三而積歴十辰所得之數者成數也一萬九千六百八十三又三三而積歴十二辰所積之數十七萬以上謂之該數也該者無不遍也與積同黄鍾之法即三三而積之謂也黄鍾之實即充其始數而至於無不該遍倍其實四其實之謂也一變為二倍其實也二變為八四共實也益者三分而益一則得四分損者三分而損一則得二分此上下生之法也乗者以二乗九則十八也二九十八黄鍾九寸乗之得十八寸也三乗四乗皆然除者十八而三分除則得六也十八寸除十二寸止有六寸即黄鍾下生林鍾也二乗而三約之即此意也正䇿者陽䇿也負䇿者隂䇿也抱陽而負隂之義也約率者大綱也宻率者細目也九流筭法之極也朓者過也與盈同朒者不及也與縮同消息盈虚進退逆順屈伸先後隨立法之意而輕重也員而圍之為周頋忖量之為徑體爲肉孔為好不滿處為庣包而度一為羃朓土了反朒女六反庣他彫反羣書考索續集卷二十
