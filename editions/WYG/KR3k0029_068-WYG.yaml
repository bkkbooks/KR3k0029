body:
  text: 羣書考索後集卷二宋章如愚編官制門總序類唐太宗正觀中大省内外官定制七百三十員曰吾以此待天下賢材足矣然是時已有員外置唐志通典云貞觀六年大省内外凡文武定員六百四十有三而已髙宗龍朔二年又改京師百官之名咸亨元年復至於武后再易庶官或從宜創號或参用古典天授二年凡舉人無賢不肖咸加擢拜大置試官以處之試官葢始於此試者未為正命神龍初復舊號又置員外官二千餘人於是遂有員外特制自永徽六年以蔡孝瑋為尚書員外特置同正員外自是員外有同正者檢校試攝判知之官迨乎景龍官紀太紊復有斜封三無坐處之誦興焉謂宰相御史及員外官也元宗懲其弊開元二十五年刋定職次著為令格自後又有置使之名軍功之官遂不勝其濫矣嘗攷唐之官制大抵沿隋官司之别曰省䑓寺監衞府東宫王府為京兆職事官州縣鎮戍為外職事官自開府至将仕郎二十八階為文散官自驃騎至陪戎三十一階為武散官上柱國至武騎尉十二等為勲官通典唐志唐鑑三師太師太傅太保論道之官也隋因後魏置煬帝廢貞觀十一年復置近代多以為贈官親王拜者但存其名耳三公太尉因隋置武徳初秦王兼之永徽中長孫無忌為之其後親王拜者皆不親事祭祀則攝者行之司徒隋廢宰相而置唐因之司空三公各一人古者三公論道經邦不以一職名太尉掌武乃司馬職也司徒主民司空主土皆六卿之任也以是為三公則名已不正其後親王拜者僅存其名則任益輕六省尚書省尚書令一人掌領百官龍朔二年改曰中䑓廢尚書令尚書曰太常伯侍郎曰少常伯咸亨復光宅元年改曰文昌䑓俄曰文昌都省垂拱元年曰都䑓長安三年曰中䑓神龍復其屬有六尚書吏部尚書掌文官選舉龍朔改司列太常伯咸亨復光宅改天官神龍復天寳改吏部至徳復侍郎二人其屬有四吏部郎中二人一人掌文官階品一人掌選補龍朔改司列大夫咸亨復司封郎中一人掌邦之封爵凡九等武徳為主爵龍朔改司封大夫開元復司勲郎中一人掌管人之勲級凡十等龍朔改司勲大夫咸亨復考功郎中一人掌攷官吏功過龍朔改司績大夫咸亨復户部尚書掌天下土地人民貢賦之政初因隋為民部貞觀改户部顯慶改度支龍朔改司元太常伯咸亨復光宅改地官神龍復侍郎二人其屬有四户部郎中二人掌戸口田賦龍朔改司計大夫後復度支郎中一人掌嵗計而支調之龍朔改司度大夫咸亨復金部郎中掌庫藏出納龍朔改司珍大夫咸亨復倉部郎中掌倉廩龍朔改司庾大夫咸亨復禮部尚書掌禮儀祭享貢奉之政龍朔改司禮太常伯咸亨復光宅改春官神龍復侍郎一人其屬有四禮部郎中一人掌禮樂學校龍朔改司禮大夫咸亨復祠部郎中一人掌祠祀享祭龍朔改司禋大夫咸亨復膳部郎中一人掌酒膳龍朔改司膳大夫咸亨復主客郎中一人掌朝見龍朔改司藩大夫咸享復兵部尚書掌武選車馬龍朔改司戎太常伯咸亨復光宅改為夏官神龍復侍郎二人其屬有四兵部郎中一人一掌武官階品一掌軍戎調遣名數龍朔改司戎大夫咸亨復職方郎中一人掌地圖龍朔改司城大夫咸亨復駕部郎中掌車輿龍朔改司輿大夫咸亨復庫部郎中掌戎器鹵簿龍朔改司庫大夫咸亨復刑部尚書掌律令刑法初曰都官隋改刑部龍朔改司刑太常伯咸亨復光宅改秋官神龍復侍郎一人其屬有四刑部郎中一人掌律法奏讞龍朔改司刑大夫咸亨復都官郎中掌簿錄龍朔改司僕大夫咸亨復比部郎中掌勾㑹賦斂龍朔改司計大夫咸亨復司門郎中掌門籍龍朔改司門大夫咸亨復工部尚書掌山澤屯田工匠之事龍朔改司平太常伯光宅改冬官神龍復侍郎一人其屬有四工部郎中一人掌土木工役龍朔改司平大夫咸亨復屯田郎中掌屯田龍朔改司田大夫咸亨復虞部郎中掌苑囿山澤龍朔改司虞大夫咸亨復水部郎中掌津濟溝洫之事龍朔改司川大夫咸亨復六部皆屬尚書令左右僕射為之貳又有左右丞各一人吏部戸部禮部左丞緫焉兵部刑部工部右丞緫焉既有三公又有六省是政出於二也尚書六部止三省之一也而光宅中遂以擬周之六卿亦過也唐有左右僕射又有侍中二尚書二令左右丞相以官未及而人可用者奉預朝政而其大綱俾中書出令門下審駁分為二省尚書受成頒之有司上下相聨甚善也然皆秦漢所輕之官自魏晉以來反為重任而唐因之其立制之始名已不正民部掌度支可也而或領於僕射吏部掌銓曹可也而或攝之中書况其他乎遂有以禮樂掌禮樂之官而掌吏部之十銓者有之如蘇頲是也自後百官益無職掌故陸長源上宰相書曰兵部無戎帳户部無版圖虞衡不管山川金倉不司錢榖傷其置諸散地有虚其職也太宗較細務屬左右丞大事關僕射當矣然其用人未免用術以李勣之髙勲位尚書領中書門下事寵已至矣使輔太子敢不盡力乎何至無故譴逐使太子他日授以僕射以勣之忠又無故黜之不無怏怏太子雖授以僕射勣豈不曉其以利誘耶至廢立皇后之際不肯盡忠雖勣無大臣莭而亦太宗以利啟其心也門下省侍中二人掌出納帝命相禮儀凡國家之務與中書令參緫而專判省事龍朔二年改曰東䑓左相武后光宅元年改曰納言垂拱元年改曰鸞䑓開元元年改曰黄門監五年復天寶元年曰左相咸亨復光宅改鑾䑓納言神龍復開元改黄門監五年復黄門侍郎二人掌貳侍中之職龍朔改東䑓侍郎垂拱改鸞䑓侍郎天寳改門下侍郎乾元復左散騎常侍一人掌規諷過失侍從顧問隋廢散騎常侍武徳散騎常侍加官貞觀置二員十七年為職事官顯慶二年分左右𨽻門下省皆金蟬珥貂左散騎與侍中為左貂右散騎與中書令為右貂謂之八貂龍朔二年曰侍極左諌議大夫四人掌諫諭得失侍從賛相隋二人唐四人武徳元年置諫議大夫龍朔二年曰正諫大夫貞元四年分左右神龍復給事中四人掌侍左右分判省事隋置二十人煬帝減置四人唐武徳三年名曰給事中龍朔改東䑓舍人左補闕六人掌供奉諷諌垂拱立四員左右各二天授各加三員通十員神龍復各置二人左拾遺六人掌供奉諷諌大事廷議小則上封事起居郎二人掌錄天子起居法度初因隋置舍人貞觀省之移於門下置起居郎顯慶又置舍人與郎分掌左右正觀初以給事中諌議大夫兼知起居注或知起居事毎仗下議政事起居郎一人執筆記錄於前史官隨之其後復置起居舍人分侍左右秉筆隨宰相入殿若仗在紫宸内閣則夾香案分立殿下直第二螭首和墨濡筆皆即坳處時號螭頭龍朔天授改左史咸亨神龍復典儀二人掌賛唱隨謁者䑓有典儀武徳五年復置𨽻門下省城門郎四人掌京城皇城宫殿門開闔之莭隨門下省綂城門局煬帝改𨽻殿中省後𨽻門下省唐因之符寳郎掌天子八寳及國之符節初置符寶郎天后改符璽開元復𢎞文館學士掌詳正圖籍教授生徒參議朝廷制度武徳置修文館又改𢎞文神龍改昭文開元洪文𨽻門下省自武徳貞觀以來皆簡賢良為學士五品以上稱學士又有文學直館並無員數皆以他官兼之儀鳳以圖籍多未詳正委學士校理自垂拱多大臣兼領館中有四部書給事中判館事校書郎掌校理典籍刋正錯謬開元改置四人後減二人大臣議事使諌官史官隨之或糾其非或書其過則大臣安敢不直議䟽賤言事者令司門引奏置立仗馬以備之則天下之情無不達諌議大夫之職太宗以王珪魏徴之流為之可謂得人矣然顯慶中召孫思邈拜諫議大夫乃固辭稱疾而還山史臣謂才不足當世取舍故逃而不反是不然太宗之時天下之士填然躍而附之獨一思邈以遺逸召至而不能屈使天下知如太宗之君亦有不得而臣者其守吾道不亦重乎其助太宗不亦多乎太宗置文學館召儒雅十八人為學士討古今論成敗其意美矣究其本為隐巢之謀而時取智計之士十八人者大抵皆君子惟許敬宗一小人厠其間盖心術不正小人得以乘間而入也易曰開國承家小人勿用以亂邦也貞觀之治衆君子扶之而不足武氏之惡一敬宗濟之而有餘亂邦之言信哉中書省中書令二人掌佐天子執大政而緫判省事武徳三年為内史又改中書龍朔元年改省為西䑓令二年為右相咸亨復光宅元年改省為鳳閣令為内史神龍復開元元年改紫㣲令後復天寳元年曰右相大厯五年紫微侍郎乃復為中書侍郎侍郎掌二令之職初為内史後隨省改中書舍人六人掌侍進奏參表章武徳置右散騎常侍一人右補闕六人右拾遺六人掌如門下省左同通事舍人十六人掌朝見引納殿庭通奏武徳四年廢謁者䑓故通事謁者曰通事舍人集賢殿書院學士侍讀學士脩撰官掌刋輯經籍開元五年乾元殿為四部書置乾元院使六年更號麗正修書院置使及檢討官改修書官為麗正殿直學士八年加文學直又加修撰校理刋正校勘官十一年置麗正殿修書學士十三年改為集賢殿書院五品以上為學士六品以下為直學士宰相一人為學士知院事常侍一人為副知院事又置判院一人押院中使一人以張說為大學士知院事𤣥宗又置集賢院侍講學士侍讀直學士又増修撰官校理官待制官留院官知檢討官文學直之員至徳二年置大學士貞元初置編錄官四年罷大學士八年罷校理置校書正字元和二年復置集賢校理罷校書正字四年集賢御書院學士直學士皆用五品如開元故事以學士一人年髙者為判院事非登朝者為校理餘皆罷校書四人史館修撰四人掌修國史貞觀三年置史館於門下省以他官兼領或卑位有才者亦以直館稱以宰相蒞修撰開元二十年李林甫以宰相監修國史建議以為中書切宻之地史官記事𨽻門下省踈逺於是諌議大夫史館修撰尹愔奏徙於中書省天寳後地官兼職者曰史館修撰初入為直館元和六年宰相裴垍建議登朝官領史職者為修撰以年髙者判館事未登朝者皆為直館大中八年廢史館直館二員増修撰四人史館直筆之任也貞觀以他官兼領職掌已不專矣又以宰相莅修撰則秉筆者能無顧忌之心乎開元李林甫以宰相監修則國惡往往諱而不書矣豈非太宗啟其端而流弊至此歟祕書省監一人少監二人丞一人監掌經籍圖書之事領著作局少監為之二龍朔二年改為蘭䑓太史少監曰侍郎丞曰大夫祕書郎曰蘭䑓郎武后垂拱改為麟䑓太極元年復祕書郎三人掌四部圖籍校書郎十人正字四人掌讎校典籍刋正文章有二局著作局郎二人著作佐郎二人校書郎二人正字二人著作郎掌撰碑誌祝文祭文與佐郎分判局事武徳四年改著作曹曰局龍朔三年改曰司文局郎為郎中佐為司文郎著作佐郎本四人開元初減二人司天䑓監一人少監二人丞一人主簿二人主事二人掌察天文稽厯數凡日月星辰風雲氣色之異率其屬而占有通𤣥院以藝學召至京師者居之凡天文圖書器物非其任不得與焉毎季錄祥眚送門下中書省紀於起居注嵗終上送史館嵗頒厯於天下武徳四年改太史監曰太史局𨽻祕書省七年廢監候龍朔二年改太史局曰祕書閣令局令曰祕書閣郎中武后光宅改太史局為渾天監不屬麟䑓俄改為渾儀監置副監及丞主簿改司辰師曰司辰長安二年復為太史局廢副監及丞𨽻麟䑓如故景雲元年又為局𨽻祕書省踰月為監嵗中復為局二年改為渾儀監開元二年復為太史監十四年太史監復為局以監為令而廢少監天寳元年太史局復為監自是不𨽻祕書省乾元元年太史局復為司天䑓祕書文學之任也唐初用孔穎逹顔師古之流為之夫以穎逹之通五經師古之博學善屬文居是職也若無愧矣然而師古之為祕書少監也乃引後生相與校讎且先貴勢雖商賈富室亦竄選中得無憾乎其後陸長源曰祕書不校勘著作不修撰盖至此遂為虚職矣太史星厯之流也乃𨽻於祕書何哉盖通天地人正吾儒之事也又有春官夏官秋官冬官中官正各一人掌四時各司其方之變異五官保章正二人監候三人五官司厯二人掌厯法五官靈䑓郎各一人掌候天文五官挈壺正二人司辰八人漏刻博士六人掌知漏刻武后長安二年置挈壺正乾元元年與靈䑓郎保章正司厯皆加五官之名殿中省監一人少監二人丞二人掌天子服御之事少監為之二又有進馬五人掌大陳設龍朔二年曰中御府監曰大監舊有天藏府開元二十三年省其屬有六局尚食尚藥尚衣尚舍尚乘尚輦尚食局奉御二人直長五人食醫八人奉御長儲供直長為之貳進御必辨時禁先甞之龍朔二年改奉膳局諸局奉御皆曰大夫尚藥局奉御二人直長二人掌和御藥診視龍朔三年改奉御局又有侍御毉四人司醫五人尚衣局奉御二人直長四人掌供冕服几案奉圭龍朔二年改奉冕局尚舍局奉御二人直長六人掌殿亭祭祀張設湯沭燈燭汛掃龍朔二年初改奉衣局尚乗局奉御二人直長十人掌内外閑廐之馬龍朔二年改奉駕局又有司廩司庫尚輦局奉御二人直長三人尚輦二人掌輿輦繖扇龍朔二年改奉輿局内侍省監二人少監二人内侍四人監掌内侍奉宣制令少監内侍為之貳武徳四年改為内侍監内承奉曰内常侍内承直曰内給事龍朔二年改監為省武后垂拱元年曰司宫䑓天寳十三年置内侍監改内侍曰少監尋更置内侍内常侍六人通判省事内給事十人掌承㫖勞問分刑省事内謁者監十人掌儀法宣奏承敕令内謁者十二人掌諸親命婦朝集班位分莅諸門内寺伯六人掌糾察宫内不法寺人六人掌皇后出入其屬有六局掖庭宮闈奚官内僕内府内坊掖庭局令二人丞三人掌宫人簿帳女工掌教博士一人掌敎習監作四人掌監涖雜作宫闈局令二人丞二人掌侍宫闈出入管籥奚官局令二人丞二人掌奚𨽻工役宫官之品内僕局令二人丞二人掌中宫車乗内府局令二人丞二人掌中藏寳貨給納之數太子内坊局令二人丞二人掌東宫閣内及官人糧廩坊事五人有典直四人下有内官等尚官局並尚儀局尚服局尚食局尚寝局等官並𨽻于此後古者内宰之職緫于冢宰令内侍並列於六省北司不𨽻於南牙毋乃散而無統乎隋令丞並用士人為之掖庭宫闈奚官三職亦參用士人焉此隋制之善也唐因隋置内侍而止令供奔走将命之役其内侍又不置三品葢所以防患也自𤣥宗用髙力士而此制已壊自時厥後或預朝政或典禁兵其有殊勲者則拜大将軍仍兼内侍焉是以終唐之世有宦官之禍使悉甪士人詎至此哉御史䑓大夫一人中丞二人掌以刑法典章糾正百官之罪惡中丞為之貳髙宗改治書侍御史中丞以避帝名龍朔二年改為憲䑓大夫曰大司憲中丞曰司憲大夫武后文明元年改肅政䑓光宅元年分左右䑓左䑓知百司監軍旅右䑓察州縣省風俗尋命兩䑓兼察州縣兩䑓御史有假有檢校有員外有丞至神龍初皆廢景雲三年廢右䑓延和元年復置嵗中以尚書省𨽻左䑓月餘而右䑓復廢㑹昌初升大夫中丞品東都留䑓中丞二人侍御史一人殿中府御史二人監察御史三人元和以後不置中丞以侍御史殿中侍御史監察御史主留䑓務而三院御史亦不常備其屬有三院一曰䑓院侍御史𨽻焉六人掌糾舉百僚及入閣承詔知推彈雜事隋末廢殿内侍御史義寧元年丞相府置察非掾二人武徳元年改曰殿中侍御史龍朔元年置監察御史裏行文明元年置殿中裏行後亦專以裏行名官長安二年置内供奉主簿一人掌印受事二曰殿院殿中侍御史𨽻焉九人掌殿庭供奉之儀京畿諸州兵皆𨽻焉三曰察院監察御史𨽻焉十五人掌分察百僚廵按州縣獄訟軍戎祭祀營作大府出納皆莅焉寺有九太常寺卿一人掌禮樂郊廟社稷之事緫郊社大樂鼓吹太醫太卜廩犧諸祠廟署少卿為之貳初有衣冠署令貞觀元年廢髙宗即位改治禮郎曰奉禮郎以避帝名龍朔二年改為奉常寺九寺卿皆曰正卿少卿曰大夫武后光宅元年復改為司禮寺丞二人掌判寺事博士四人掌辨五禮太祝六人掌出納神主奉禮郎二人掌君臣版位以奉朝㑹祭祀之禮協律郎二人掌和律吕兩京郊社署令各一人掌五郊社稷明堂之禮與奉禮郎設樽罍篚幕太樂署令二人丞一人樂正八人掌調鍾律以供祭饗鼓吹署令二人丞二人樂正四人掌鼓吹之節太醫署令二人丞三人醫監四人醫正八人掌醫療之法其屬有四醫師針師按摩師呪禁師醫博士一人助教二人掌教授諸生以本草甲乙脉經分而為業針博士一人助教一人針師十人掌教針生按摩博士一人按摩師四人掌教導引之法呪禁博士一人掌呪禁祓除為厲者太卜署令一人丞二人卜正博士各二人掌卜筮之法廪犧署令一人丞二人掌犧牲粢盛汾祠署令一人丞一人掌享祭灑掃之制三皇五帝以前三皇五帝周文王武王漢高祖兩京成王廟令一人丞一人掌開闔洒掃釋奠之禮光祿寺卿一人少卿二人丞二人主簿二人掌酒醴膳羞之政緫大官珍羞良醖掌醢四署龍朔二年改曰司宰寺武后光宅元年曰司膳寺大官署令二人丞四人掌供祠宴朝會膳食珍羞署令一人丞二人掌供祭祀朝㑹賓客之庶羞良醖署令二人丞二人掌供五齊三酒掌醢署令一人丞二人掌供醢醯之物衞尉寺卿一人少卿二人丞二人掌器械儀物緫武庫武器守宫三署主簿二人龍朔二年改司衞寺武后光宅元年又改神龍復丞掌判寺事兩京武庫署令各二人丞二人掌藏兵械有赦建金雞武器署令一人丞二人掌外戎器及鹵簿棨㦸守宫署令一人丞二人掌供帳帟宗正寺卿一人少卿二人丞二人掌天子族親屬籍主簿一人知圖譜官一人脩玉牒官一人知宗子表䟽官一人錄事二人武徳二年置宗師一人後省龍朔二年改為司宗寺武后光宅元年改為司屬寺領陵䑓崇𤣥二署諸陵䑓令各一人丞各一人建初啟運興寧永康陵令各一人丞各一人掌守衛山陵凡陪𦵏開元二十四年以宗廟所奉不可名以署太常少卿韋縚奏廢太廟署以少卿一人知太廟事二十五年濮陽王澈為宗正卿恩遇甚厚建議以宗正司屬籍乃請以陵寝宗廟𨽻宗正天寳十二載駙馬都尉張伯為太常卿得幸又以太廟諸陵署𨽻太常十載改獻昭乾定橋五陵署為䑓升令品永康興寧二陵稱署如故至徳二年復以陵廟𨽻宗正永泰元年太常卿姜慶初復奏以陵廟𨽻太常大厯二年復舊諸太子廟令各一人丞各一人錄事各一人掌灑掃開闔之節諸太子陵令各一人丞各一人錄事各一人崇𤣥署令一人丞一人掌京都諸觀名數與道士簿籍齋醮之事隋以署𨽻鴻臚唐置諸寺觀監𨽻鴻臚寺貞觀廢上元二年置漆園監尋廢開元二十五年置宗𤣥學於𤣥元皇帝廟天寳元年兩京置博士助教二載改博士為宗𤣥博士改助教為直學士置太學生二人以宰相為之領兩京𤣥元宫及道院改天下宗𤣥學為通道學博士為道徳博士未幾而罷太僕寺卿一人少卿二人丞四人主簿二人錄事二人卿掌廐牧輦之政緫乗黄典廐典牧車府四署永徽改司馭武后光宅元年改司僕寺乗黄署令一人丞一人掌供三路及馴御之法典廐署令二人丞四人掌飼馬牛給養雜畜典牧署令三人丞六人掌諸牧雜畜給納及酥酪脯腊之事車府署令一人丞一人掌王公以下車路諸牧監上牧監監各一人副監各一人丞各二人主簿各一人中牧監監之設監監各有副監丞主簿掌詳政孳課東宫九牧監丞二人錄事一人掌牧養馬牛大理寺卿一人少卿二人掌刑獄詳政龍朔二年改詳刑寺武后光宅元年改司刑寺中宗廢正二人掌議獄正科條丞六人掌分判寺事正刑之輕重主簿二人掌印省署鈔目鉤檢稽失獄丞二人掌率獄吏司直六人詳事六人掌出使推按鴻臚寺卿一人少卿二人丞二人掌賔客及凶儀之事領典客司儀二署龍朔二年改同文寺武后光宅元年改曰司賔寺典客署令一人丞二人掌二王後介公酅公之版籍及四夷歸化在藩者掌客十二人掌送迎藩客儀署令一人丞一人掌凶禮䘮𦵏之具司農寺卿一人少卿二人掌倉儲委積之事緫上林太倉鉤盾導官四署龍朔二年改司稼寺丞六人緫判寺事主簿二人錄事二人上林署令二人掌苑囿園池植果蔬以供朝㑹祭祀季冬藏氷太倉署令三人丞五人監事八人掌廩藏之事鉤盾署令二人丞四人監事十人掌供薪炭鵝鴨蒲雈陂池藪澤之物導官署令一人丞四人監事十人掌導擇米麥初有御細倉督麯麫貞觀省外有太原永豐龍門等倉毎倉監一人司竹監一人副監一人掌植竹葦慶善石門温泉湯等監每監各二人掌湯池宫禁京都諸宫苑緫監監各一人副監各一人掌苑内宫館京都諸園苑監苑四面監監各一人副監各一人掌完葺九成宫緫監監一人副監一人掌脩完宫苑諸鹽池監監一人掌監功簿帳諸屯監一人掌營種屯田句會功課太府寺卿一人少卿二人掌財貨廩藏貿易緫京都四市左右藏常平七署丞四人掌判寺事主簿二人掌印省鈔目句檢稽失平權衡度量錄事二人兩京諸市署令一人丞二人掌財貨交易度量器物左藏署令三人丞五人監事八人掌錢帛雜綵右藏署令二人丞三人監事四人掌金玉珠寳銅鐡骨角齒毛綵畵常平署令一人丞二人監事五人掌平糴倉儲出納既有六省又有九寺是政出於三也司農太府户部職也太常宗正禮部職也太鴻臚禮部之主客也光祿勲但供良醖禮部之膳部也衛尉掌軍器儀仗帳幕兵部之庫部也太僕兵部之駕部廷尉刑部也夫天下之事以古準今雖曰條目増繁而其綱要自不可易茍因其職位釐而分之合而總之其屬愈多而統目有要亦無害其為善法矣唐之官品卿監視尚書少卿視侍郎是一職而二任之又多為之統則其勢必至於虚授而多曠是其繁也乃其所以為曠也杜佑言其曠之弊則曰官名職務遷易不同空存虚稱皆無事實故有二皋陶四伯囧之論陸長源言其曠之弊則曰光祿不供酒衛尉不供幕官曹虚設祿奉枉請噫其言之盡矣亦知其為繁乃其所以為曠者歟太常寺居九寺之先意者重禮樂之任也自太宗翫悦之心一動樂工雜伎如白明達韋樂提軰乃駸駸曳章服而迴翔乎士大夫之間亦過矣大理寺掌刑之官也其他寺皆有兼職獨大理卿無焉葢刑者民命之所繫重其職而専其任者庻其留意於刑而不敢輕用也其後張道源為大理卿天子見其年耆乃拜綿州刺史夫古者作吕刑必於耄荒之年盖老成定慮也今以道源徳行之懿使其在位所謂皤皤黄髪國之光華顧乃棄之外服勞以吏事豈尊老貴賢之義耶吾於唐不能無憾矣監有五國子監祭酒一人司業二人掌儒學訓導之政緫國子大學廣文四門律書筭凡七學天子視學皇太子齒胄則講儀釋奠執經論議奏京文武七品以上觀禮凡授經以周易尚書周禮儀禮禮記毛詩春秋左氏傳公羊傳榖梁傳各為一經兼習孝經論語老子嵗終考學官訓導多少為殿最丞一人掌判監事每嵗七學生業成尚司業祭酒莅試登第者上於禮部主簿一人掌印句督監事七學生不率教者舉而免之錄事一人武徳初以國子監曰國子學𨽻太常寺貞觀二年復曰監龍朔二年改國子監曰司成館祭酒曰大司成司業曰少司成咸亨元年復曰監垂拱元年改國子監曰成均國子學博士五人掌教三品以上及國公子孫從二品以上曽孫為生者五分其經以為業周禮儀禮禮記毛詩春秋左氏傳各六十人睱則習𨽻書國語說文字林三倉爾雅每嵗通兩經求作者上於監秀才進士亦如之學生以長幼為序習正業之外教吉凶二禮公私有事則相儀龍朔二年改博士曰宣業助教五人掌佐博士分經教授直講四人掌佐博士助敎以經書講授五經博士各二人掌以其經之學教國子太學博士六人助教六人掌教五品以上及郡縣公子孫廣文館博士四人助教二人掌領國子學生業進士者四門館博士六人助教六人直講四人掌教七品以上公侯伯子男子為生及庶人子為俊士生者律學博士三人助教一人掌教八品以下及庶人子為生者律令為耑業兼習格式法例書學博士二人助教一人掌教八品以下及庶人子為生者石經說文字林為耑業兼習餘書筭學博士二人助教一人掌教八品以下及庶人子為生者二分其經以為業九章海島孫子五曹張丘建夏侯陽周髀五經筭綴術緝古為耑業兼習記遺二等數凡六學束修之禮少府監一人少監二人掌百工技巧之政緫中尚左尚右尚織染掌冶五署丞六人掌判監事主簿二人武徳初廢監以諸署𨽻太府寺貞觀元年復龍朔二年改曰内府監武后垂拱元年曰尚方監神龍復中尚署令一人丞二人掌供郊祀圭璧器玩后妃服飾赦日植金雞於仗南左尚署令一人丞五人掌供翟扇葢繖五路五副七輦十二車右尚署令二人丞四人掌供十二閑馬之轡織染署令一人丞二人掌供冠冕組綬及織紝色染掌冶署令一人丞一二人掌範鎔金銀釧鐵及塗飾琉璃玉作諸冶監令各一人丞各一人掌鑄兵農之器諸鑄錢監監各二人副監各二人丞各一人以所在都督刺史判焉互市監每監監一人丞二人掌蕃國交易之事隋以監𨽻四方館唐𨽻少府貞觀六年改交市監曰互市監副曰丞武后垂拱元年改曰通市監将作監監一人少監二人掌土木工匠之政緫左校右校中校甄官等署百工等監丞四人掌判監事武徳初改令曰大匠少令曰少匠龍朔二年改作繕工監大匠曰大監少匠曰少監咸亨改曰營繕監神龍復主簿二人掌官吏糧料俸食假使必由之左校署令二人丞一人掌梓匠之事樂縣簨簴兵械喪塟儀物右校署令二人丞三人掌版築塗泥丹堊匽厠之事中校署令一人丞三人掌供舟車兵械雜器武后改曰營繕署垂拱元年復舊尋廢開元初復置甄官署令一人丞二人掌琢石陶土事百工就谷庫谷斜谷太隂伊陽監監各一人副監一人丞一人掌采伐材木武徳初置百工監掌舟車又置就谷庫谷斜谷太隂伊陽五監貞觀廢百工監髙宗置百工署開元十五年為監軍器監監一人丞一人掌繕甲弩以時輸武庫緫署二一曰弩坊二曰甲坊主簿一人錄事一人武徳初有武器監掌兵仗廐牧七年廢軍器監八年復置九年又廢貞觀元年廢武徳監開元以前軍器皆出在尚署三年置軍器監十一年復廢為甲弩坊𨽻少府十六年復為監弩坊署令一人丞一人掌出納矛矟弓矢排弩刃並雜作甲弩署令一人丞一人掌出納甲胄綅繩筋角雜作都水監使者二人掌川澤津梁渠堰陂池之政緫河渠諸津監署監一人丞二人掌判監事主簿一人掌運漕漁捕程㑹而糾舉之武徳初廢為署貞觀復為監龍朔改為司津監使者曰監武后垂拱元年改曰水衡監使者都尉開元二十五年不𨽻将作監河渠署令一人丞一人掌河渠陂池隄堰魚醢之事唐有河隄使者貞觀改河隄謁者又斗門有長人貞觀六年盡廢河隄謁者六人掌完隄堰利溝瀆漁捕之事諸津令各一人掌天下津濟舟梁壩橋初有都水署貞觀元年改都水使者龍朔改司津監丞咸亨復光宅改水衡都尉後復祭酒訓導之官也太宗時張嗣宗以舊學出為刺史帝因其有請始問以欲何官后乃畀以祭酒之任太宗不自知所以處嗣宗者必待其求豈尊師重傅之道哉自飛騎授經諸蕃入學知太宗終欲考武功之盛自小學之為益助大唐僅能推諸外戚宗室功臣而已豈知古者六卿之教皆有所謂小學者耶國學教化所從出之本豈與他官府有司比也頋乃與近監之屬並有此唐之大失也向使以尚書門下國子監祕書殿中為六省而䧏内侍於左右衞之士則尊儒重道之意明而閹宦預政之階替矣並唐百官志羣書考索後集卷二
