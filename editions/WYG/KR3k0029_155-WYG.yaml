body:
  text: 羣書考索續集巻二十四宋章如愚編五行門五行漢五行志河圖洛書相為經緯八卦九章相為表裏文王演周易孔子述春秋則乾坤之隂陽效洪範之咎證漢仲舒治公羊春秋始推隂陽為儒者宗劉向治糓梁數其禍福傳以洪範與仲舒錯歆治左氏傳其春秋意亦已乖矣言五行傳又頗不同是以攬仲舒劉向歆傳載眭孟夏侯勝京房谷永李尋之徒所陳行事以傳春秋著于篇後漢五行志司馬彪作又晉五行志及隋大槩承襲漢志獨唐五行志云灾異之學莫不指事以為學及其難合則旁引曲取而遷就其説葢自漢儒仲舒向歆皆以春秋洪範為學而失聖人之本意至其不通也父子之言自相戾昔箕子陳九疇初不相附屬而向為五行傳乃取其五事皇極度證附於五行以為八事皆屬五行則至於八政五紀三徳稽疑福極之類又不能附至俾洪範之書失其倫序孔子於春秋記灾異而不著其事應以謂天道逺非諄諄諭人君子見其變恐懼修省而已若推其事應則有合有不合至於不合則将君子怠焉以為偶然而不懼此其深意也葢聖人謹而不言故畧依洪範五行傳著其灾異而削事應云唐五行著灾異而不言事應五代紀言人事而不著灾祥但存之司天攷以為有司所記五代史昔孔子作春秋而天人備予述本紀書人而不書天予何敢異於聖人哉其文異其意一也葢聖人不絶天於人亦不以天參人絶天於人則天道廢以天參人則人事惑故常存而不䆒也春秋雖日食星變之類孔子未甞道其所以然者云云故以其官誌之以備司天之考一圖指傳之謬田獵不宿飲食不享出入不節奪民農時及有奸謀木不曲直貌之不恭是謂不肅厥咎狂厥罰常雨厥極惡說曰順之其福攸好徳棄法律逐功臣殺太子以妾為妻火不炎上言之不從是謂不義厥咎僣厥罰常𤾉厥極憂說曰順之其福康寕治宮室治臺榭内滛犯親戚侮父母稼穡不成視之不明是謂不哲厥咎豫厥罰常燠厥極疾說曰順之其福壽好戰攻輕百姓飾城郭侵邊境金不從革聼之不聰是謂不謀厥咎急厥罰常寒厥極貧説曰順之其福富簡宗廟不禱祠廢祭祀逆天時水不下潤思之不睿是謂不聖厥咎䝉厥罰常風厥極凶短折説曰順之其福考終命皇之不極厥咎眊厥罰常隂厥極弱一圖形今之意皇極之建貎恭肅言從義視明哲聼聰謀思睿聖木曲直金從革火炎上水潤下土稼穡時雨時𤾉時燠時寒時風五福皇極不建貌不恭狂言不從僣視不明豫聼不聰急思不睿蒙木不曲直金不從革火不炎上水不潤下土不稼穡常雨常𤾉常燠常寒常風六極隂陽生水火陽生隂故水先成隂生陽故火後成隂陽相生也體性相湏也是以陽去則隂竭隂盡則陽㓕康節金火木從類金火相守則流火不相傳則然其類也水遇寒則結遇火則竭從其所勝也同上五行之相生五行之木萬物之類也五行之金出乎石也故火水土石不及金木金木生其間也火生濕水生燥五行之相得木曰曲直既能屈而反伸也金曰從革一從革而不能自反也水火氣也故炎上潤下與隂陽升降土不得制焉木金者土之華實也其性有水火之雜故木之為物水漬則生火燃而不離也葢得土之浮華於水火之交也金之為物得火之精於土之燥得水之精於土之清故水火相持而不相害爍爍反流而不耗也葢得土之精實於火之際也土也者物之以成始而成終也地之質也化之終也水火之所升降物兼體而不道者也隂陽為水火水者隂凝而陽未勝也火者陽麗而隂未盡也五行自隂陽陽變隂變而生水火木金土水隂盛故居右火陽盛故居左木陽穉故次火金隂稚故次水土冲氣故居中而水火之交系乎上隂根陽陽根陰也水而木木而火火而土土而金金復水如環無端五氣布而四時行焉太極圖解五行氣質五行者質具於地而氣行於天者也以質而語其生之序則曰水火木金土而水木陽也火金隂也以氣而語其行之序則曰木火土金水而木火陽也金水隂也又統而言之則氣陽而質隂也又錯言之則動陽而静隂也文公五行所生之序陽變隂合初生水火水火氣也流動閃爍其體尚虛其成形猶未定次生木金而確然有定形矣水火初是自生木金則次於土五金之屬皆從土木旋生出來五行循環相生或問以質而語其生之序不是相生否只是陽變而助隂故生水隂合而陽盛故生火木金各從其類故在左右先生曰水隂根陽火陽根隂錯綜而生其端是天一生水地二生火天三生木地四生金到得運行處便水生木木生火火生土土生金金又生水水又生木循環相生又如甲乙丙丁戊己庚辛壬癸都是這個物事文公十是五行數卦雖八而數則須十八是隂陽數十是五行數一隂一陽便是二以二乘二便是四以四乘四便是八五行本只是五而有十者蓋是一個便包兩個如木便包甲乙火便包丙丁土便包戊己金便包庚辛水便包壬癸所以為十同上五行之序論始生之序則曰水木火金土論相生之序則曰木火土金水然水火者隂陽變合之初氣之至精且盛者也故為五行之先水隂而根陽火陽而根隂故水又為火之先也有水火而木金生焉木華而疎金實而固故木金次於水火而木又為金之先焉土則四時之所成終而成始也故次五焉勉齊羣書考索續集卷二十四
