body:
  text: 羣書考索後集卷十六宋章如愚編官制門吏禄類周禮司禄缺其職而不載豈孟子所謂諸侯惡其害己而去其籍者乎雖然軻嘗聞其畧矣自天子至於子男凡五等自公卿至于下士凡六等天子一位公一位侯一位伯一位子男同一位凡五等君一位卿一位大夫一位上士一位中士一位下士一位凡六等君十卿禄食二千八百八十人卿禄四大夫食二百八十八人大夫倍上士食七十二人上士倍中士食三十六人中士倍下士食十八人下士與庶人在官者同禄食九人庶人士在官謂未命為士者禄足以代其耕也此大國之制次國小國則卿禄有隆殺焉次國君十卿禄卿禄三大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同禄小國君十卿禄卿禄二大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同禄大抵自上農夫食九人積而言之耳孔子使原思為之宰與之粟九百孟子為齊卿其禄十萬鍾范睢訐穣侯之辭曰自斗食以上有非相國之人者乎王剪攻閼與歸斗食以下秩佐史也然則自周以迄戰國無不以榖粟制禄也漢興雖小有増損然亦秦制三公號萬石有中二千石比六百石有真二千石有二千石比四百石有比二千石比三百石有千石比二百石有比千石推而下之以至于百石其月斛各有差班固雖不載於本史而顔氏百官表之注尚畧具焉旁考漢律丞相大司馬大將軍俸錢月六萬貢禹上書元帝亦曰臣為諫大夫秩八百石俸錢月九千二百此通典所謂其時亦有俸錢之差但史文不具耳然則西京之制有榖有錢往往榖多而錢少宣帝益天下吏百石以下奉十石成帝又益三百石以下奉後漢建武二十六年増百官俸其千石以上乃減於西京而六百石以下則増於舊制荀綽晉百官表注載後漢延平中二千石俸錢九千米七十二斛真二千石月錢六千五百米三十六斛當煬帝時百官俸禄猶米多而錢少况於前乎伏則有賜臘則有賜立春則又有賜帛之制漢官儀所載猶可考也北齊以帛制禄後周以粟制禄也唐武徳中外官無禄貞觀中制有上考乃給禄其後遂定給俸禄之制以民地租充分官為九品有正有從而給米石各有差凡文武官每嵗給禄以石計者總一十五萬有竒而在外者不與焉在外皆降等其俸錢之制則以公􅇬錢充用公􅇬錢者官給錢本置令史府史回易納息以充俸又攷之通典凡京文武正官毎嵗供給俸食等錢以千計者總一十五萬有竒而員外置不與焉是唐初俸禄錢與米相等矣其後亂離百官俸禄才給其半梁開平中始令全給唐同光初租庸使孔謙以軍儲不充百官俸錢雖多而折支非實請減半數而支實錢是後所支半實復從虚折周顯徳中復支實錢宋朝皆約後唐之制或一分支實二分折支景徳罷兵始詔京師官每千實給六百在外四百至祥符以景貺来格又復増給矣禄令之制定於嘉祐五年府禄米月止百石而俸錢則宰相月三百千執政月二百千而使相則四百千而餐之有在此外者以月計之亦不下四五萬錢則是本朝之制俸錢多於禄米元豐肇新官制職事官職錢以寄禄官髙下分行守試三等大率官以禄令為準而在京官供給之數皆併為職錢如大夫為郎既請大夫俸矣又請郎官職錢視嘉祐禄制為優至崇寜間蔡京秉政貪鄙者在位於寄禄官俸錢職事官職錢外復増供給食料既請僕射之俸又請司空之俸其餘侍從錢米皆支本色執政皆然其視元豐制禄又増倍矣紹興兵興京官以上各減三之一而小官之俸或反増於曩時所以責亷節也歴代禄數周制自天子至下士凡六等諸侯國君十卿禄食二千八百八十人卿四大夫禄食二百八十八人大夫倍上士食七十二人上士倍中士食三十六人中士倍下士食十八人下士與庶人在官者同食九人次國之卿食二百一十六人君食一千一百六十人小國之卿食百四十四人君食千四百四十人次國之卿命於君者亦如小國之卿漢制自中二千石至百石凡十三等中二千石月俸百八十斛二千石百二十斛至百石十六斛宣帝益天下吏百石以下奉十五漢書攷異按漢書云宣帝益百石以下奉十五若食一斛則益五斗是也又按應劭注漢書云張敞蕭望之言曰今小吏奉率不足常有憂父母妻子之心雖欲潔身為廉其勢不能可増天下吏奉宣帝乃益天下吏奉什一今二説牴牾不可不審亦兩存之成帝陽朔中除八百石就六百除五百石就四百綏和二年又益吏三百石以下奉凡吏比二千石以上年老致仕者三分故禄以一與之終其身通典中三千石月俸百八十斛二千石百二十斛比二千石俸百斛千石俸八十斛六百石俸七十斛四百石俸五十斛比四百石俸四十五斛三百石俸四十斛比三百石俸三十七斛二百石俸三十斛比二百石俸二十七斛百石俸十六斛自四百石以至二百石為長吏斗食月俸一十斛或云斗石嵗俸不滿百石計日而食一斗二升故云斗食佐史目俸八斗自百石以下是為下史通典漢書表攷異按漢官制所食禄秩皆以斛計當是時但以米榖為禄也今觀貢禹上書曰臣為諫議大夫秩八百石俸錢月九千二百為光禄大夫秩二千石俸錢月萬二千則是又有錢為俸又按王莽詔曰公卿以下一月纔布二匹或帛一匹是又有布帛為俸也由此觀之則漢一代之官禄不可純以為用榖也後漢大將軍三公月俸三百五十斛至建武二十六年増百官俸其千石以上減於西京舊制六百石以下増於舊秩永初四年又減百官及州郡縣俸各有差本史凡諸受俸皆半錢半榖延平中定制中二千石月俸錢九千米七十二斛真二千石錢六千五百米三十六斛比二千石錢五千米三十四斛千石錢四千米三十斛六百石錢三千五百米二十一斛四百石錢二千五百米十五斛三百石錢二千米十二斛二百石錢一千米九斛百石錢八百米四斛八斗臘及立春更頒賜有差宋永元初制州郡秩俸随土所出無有定準有父母祖父母年登七十者並給見錢其郡縣田禄以芒種為斷其此前去官者則一年秩禄皆入前人此後去者悉入後人梁武帝天監初定九品令帝於品下注一品秩為萬石第二第三品為中二千石第四第五品為二千石及侯景亂國用常􅄶京官文武月唯别得廪食多遥帶一郡縣官而取其禄秩焉通典揚徐等大州比令僕班寜桂等小州比參軍班丹陽郡呉郡㑹稽等郡同太子詹事尚書班髙源晉康等小郡三班而已大郡六班小縣兩轉方至一班品第既殊不可委載其州郡縣禄米絹布絲綿當處輸臺倉庫若給刺史守令等先准其所部文武人物多少由勅而裁後魏初無禄秩至孝文太和八年始頒俸禄罷諸商人以簡民事増調三疋榖二斛九升以為官司之禄均調為二疋之賦禄行之後賍滿一疋者死其禄毎季一請於是百官受禄有差諸宰人之官各随近給公田刺史十五頃太守十頃治中别駕各八頃縣令縣丞六頃更代相付至十年議定民官依尺給絹本史又曰初邊方小郡太守數户而已一請止六尺絹給不滿疋北齊官秩一品毎嵗八百疋二百疋為一秩從一品七百疋一百七十五疋為一秩二品六百疋一百五十疋為一秩從二品五百疋一百二十五疋為一秩三品四百疋一百疋為一秩從三品三百疋七十五疋為一秩四品二百四十疋六十疋為一秩從四品二百疋五十疋為一秩五品一百六十疋四十疋為一秩從五品一百二十疋三十疋為一秩六品一百疋二十五疋為一秩從六品八十疋二十疋為一秩七品六十疋十五疋為一秩從七品四十疋十疋為一秩八品三十六疋九疋為一秩從八品三十二疋八疋為一秩九品二十八疋七疋為一秩從九品二十四疋六疋為一秩禄率一分以帛一分以粟一分以錢事繁者優一秩平者守本秩閑者降一秩長兼試守者亦降一秩官非執事不朝拜者皆不給禄執事官一品以下給公田各有差凡州郡縣制禄之法刺史守令下車各前取一時之秩上上州刺史嵗秩八百疋與司州牧同上中上下各以五十疋為差中上降上下一百疋中中及中下亦以五十疋為差下上降中下一百疋下中中下亦以五十疋為差上都太守嵗秩五百疋降清諸尹五十疋上中上下各以五十疋為差中上降上下四十疋中中及中下各以三十疋為差下上降中下四十疋下中下下各以二十疋為差上上縣嵗一百五十疋與鄴臨潼咸安三縣同上中上下各三十疋為差中上降上下二十疋中中及中下各以五疋為差下上降中下二十疋下中下下各以十疋為差州自長史下逮于史吏郡縣自丞以下逮于掾佐亦皆以帛為秩郡有尉者尉減丞之半皆以其所出常調課給之自一品以下至流外勲品各給事力一品至三十人下流外勲品或以五人為等或以四人三人二人一人為等繁者加一等平者守本力閑者降一等謂州刺史守令以下幹及力皆聽勅乃給其幹出所部之人一幹輸絹十八疋幹身放之力則郡縣白直充後周制禄秩下士一百二十五石中士以上至於大夫各倍之上大夫是為四千石卿二分孤三分公四分各益其一公因盈數為一萬石其九秩一百二十石八秩至於七秩毎二秩六分而下各去其一二秩一秩為四十石通典隋京官正一品禄九百石其下每以百石為差至正四品是為三百石從四品二百五十石其下每以五十石為差至正六品是為一百石從六品九十石以下每以十石為差至從八品是為五十石食封及官不判事者并九品皆不給禄其給皆以春秋二季刺史太守縣令則計户而給禄各以户數為九等之差大州六百二十石其下每以四十石為差至於下下則三百石大郡三百四十石其下每以三十石為差至於下下則一百石大縣百四十石其下毎以十石為差於下下則六十石其禄唯及刺史二佐及郡守縣令通典京官給職分田一品者各給田五頃至五品則為田三頃其下毎品以五十畆為差至九品為一頃外官亦各有職分田又給公􅇬以供用要訣文帝時嘗以百僚供費不足臺省府寺咸置􅇬錢收息取給工部尚書蘇孝慈以為官人争利非興化之道上表請罷從之公卿以下及給職田各有差通典義寧二年唐王為相國罷外官給禄每十斛給地二十畆通典大唐武徳中外官無禄貞觀二年制有上考者乃給禄其後遂定給禄俸之制以民地租充之京官正一品米七百石錢九千八百從一品六百石正二品米五百石錢八千從二品米四百六十石正三品米四百石錢六千一百從三品米三百六十石正四品米三百石錢四千二百從四品米二百六十石正五品米二百石錢三千六百從五品米百六十石正六品米百石錢二千四百從六品米九十石正七品米八十石錢二千一百從七品米七十石正八品米六十七石錢千六百從八品米六十二石正九品米五十七石錢千三百從九品米五十七石諸給禄者三師三公及太子三師三少若在京師宰相文武官職事九品以上并左右千牛備身左右太子千牛衞等官給其春夏二季春給秋冬二季秋給凡京文武官每嵗給禄總一十五萬一千五百三十三石三斗自至徳之後不給其在外文武官九品以上準官皆降京官一等給其文武官在京長上者則不降諸給禄應降等者正從一品各以五十石為一等二品三品皆以三十石為一等四品五品皆以二十石為一等六品七品皆以五石為一等八品九品皆以二石五斗為一等其俸錢之制京師諸官初置公􅇬令行署及畨官興易以充其俸貞觀十二年罷公􅇬置胥士七千人取諸州上户為之準防閤例而收其課三嵗一更計貟多少而分給焉貞觀十五年以府庫尚虚勅在京諸司依舊置公廨給錢充本置令史府史胥士等今回易納利以充官人俸諫議大夫禇遂良上疏陞下近許諸司命史捉公􅇬本錢不便太宗納之停諸司捉錢依舊本府給月俸貞觀二十一年復依故制置公廨給錢為之本置令史府胥士等職賈易收息以充其俸永徽元年悉發胥士等更以諸州租庸脚直充之其後又令薄賦百姓一年稅錢依舊令髙户及典正等掌之毎月收息以充官俸其後又以稅錢為之而罷其息利凡京文武正官每嵗供給俸食等錢并防閤庶僕及雜錢等總一十五萬三千七百二十貫員外官不在此數外官則以公􅇬田收及息錢等常食公用之外分充月科先以長官定數其州縣少尹長史司馬及丞各減長官之半尹大都督府長史副都督别駕及判司准二佐以職田數為加減其參軍及博士減判司主簿縣尉減縣丞各三分之一謂内外貟外官同正貟者禄科賜㑹食科一事以上並同正貟其不同正貟者禄賜食科亦同正貟餘各給半職田並不給自乾元之後以常賦不給内外官俸禄各減其半内供奉及裏行不帶本官者禄俸食料防閤庶僕一事以上並同正官帶官者聽從多處給若帶外官者依官給食料賜㑹以京官同諸檢校及判試知等官不帶内外官者料度一事以上准貟外官同正貟例給若檢校及判試知處正官見闕者兼給雜用其職田不應入正官者亦給其特御史殿中及監察御史知試並同内供奉給行例儀鳯三年制内外官俸食防閤邑士白直等宜令王公以下率口出錢以充給焉調露元年九月職事五品以上准舊給仗身武太后光宅元年九月以京官八品九品俸料授簿諸八品毎年給庶僕二人九品二人又有親事帳内六品七品子為親事八品九品子為帳内限年十八以上舉諸州共率萬人為之凡王公以下及文武職事三品以上帶勲官者則給之其親事府帳内府官附在王侯篇三師三公開府儀同三司一百三十人嗣王郡王一百八人上柱國帶二品以上職事九十五人帶三品職事六十九人柱國帶二品已上職事七十九人帶三品職事六十二人上䕶軍帶二品已上職事七十三人帶三品職事五十五人䕶軍帶二品已上職事六十二人帶三品職事三十六人諸州縣之官流外九品之上皆給白直二品四十人三品二十三人四品二十四人五品十六人六品十人七品七人其七品佐官六人八品五人九品四人諸州縣官流内九品以上及在外監五品以上皆給執衣随衣驅使典執舉硯其監官於随近州縣取充二品十八人三品十五人四品十二人五品九人六品七品各六人八品九品各三人闗津兵讀官並不給分為三畨每周而代不願代者聴之初以民丁中男充為之役使者不得踰境後皆捨其身而收其課課入所配之官遂為恒制鎮戍之官以鎮戍上中下為差上鎮給仗身四人中下鎮將副各三人中下鎮副各二人倉曹兵曹戍主副各一人其仗身十五日一時收資六百四十人開元十年正月省王公以下視品官參佐及京官五品以上官仗身職貟凡京司文武職事官五品以上給防閤一品九十六人二品七十二人三品四十八人四品三十二人五品二十四人六品以下給庶僕六品五人七品四人八品三人九品二人公主邑士八十人郡主六十人縣主四十人特封縣主三十四人京官任兩職者從多給凡州縣官皆有白直二品四十人三品三十二人四品二十人五品十六人六品十二人七品六人八品五人九品四人凡諸親王府屬並給士力數如白直其防閤庶僕白直力士納課者每年不過二千五百執衣元不過一千文防閤庶僕舊制季分月俸食料雜用即有分諸官應月給開元二十四年六月乃撮而同之通謂之俸料一品月俸料八千食料千八百雜用千二百防閤二十千通計三十一千二品月俸六千食料千五百雜用一千防閤十五千通計二十四千二百三品月俸五千食料千一百雜用九百防閤十午通計十七千四品月俸三千五百食料七百雜用七百防閤六千六百六十七通計十一千五百六十七五品月俸三千食料六百雜用六百防閤五千通計九千二百六品月俸二千食料四百雜用四百庶僕二千五百通計五千三百七品月俸千七百五十食料三百五十雜用三百五十庶僕千六百通計四千五十八品月俸千三百五十食料三百雜用三百庶僕六百通計二千五百五十九品月俸千五十食料二百五十雜用二百庶僕四百通計千九百貟外官帶同正者不減正貟官食料錢不帶同正者減半宰臣李林甫奏天寶三載勅郡縣闕職錢送納太府寺自今已後納當郡充貟外官料錢不足即取正官料錢分若無貟外官當縣分天寶五載制郡縣白直計數多少同料錢加稅以充之不得配丁為白直十四載八月制兩京文武官九品以上正貟官自今以後毎月給俸食雜用防閤庶僕等宜十分率加二分其同正官加一分乃永為恒式肅宗至徳二年已後内外官並不給料錢乾元元年外官給半料與職田京官亦與職田不給料仍勅度支使量閑劇可給手力課貟外官一切無料全二年九月詔京官比無俸料桂玉之費將何以堪宜取綘州榖錢給冬季即仰所由申請計㑹支給大歴三年通計京城諸司毎月給手力資錢凡四萬七千五百四十六貫四十八並以天下青苗錢充初以常賦不給乃稅人墾田畆十有五錢資用窘急不暇成熟候苗青即征之故謂之青苗錢主其任者為青苗使大厯十二年四月度支奏給京百司文武官及京兆府縣官毎月料錢自太師以下及參軍文學博士録事各有差應給百司正貟文武官月料錢外官貟準式例合支給料錢自檢校及内侍省監省監亦有差度支奏毎年約加一十五萬六千貫文準舊給數都當二十六萬貫文已来伏望準數起六月一日給付勅㫖依仍令所司起五月一日支給待豐年無事即準常式處分六月七日户部侍郎判度支韓滉奏準今年四月二十八日恩勅加給京文武九品以上正貟官月俸其同中書門下平章事不帶正官勅内無額應檢校官同中書門下平章事並請同正官例就一髙處給勅㫖依至建中三年閏正月四日文武百官每月料錢一百貫已上者三分減一八十貫已上者五分減一六十貫已上者七分減一四十貫已上者十分減一三十貫已下者不減待兵革寧後仍舊給至貞元三年十一月二十八日勅京官及京兆府縣官宜加給料錢至四年正月十六日勅京文武及京兆府縣官總三千七十七貟據元給及新加毎月當錢五萬一千四百四貫六百一十七文一年都當六十一萬六千八百五十五貫四百四文三十四萬八千五百貫四百文舊額二十六萬八千三百五十五貫四百文新加已上並通典及理道要訣并唐㑹要宋朝太祖乾徳四年詔州縣之職民政是親自来所請料錢多是折以他物既將貨物未免擾人豈惟傷廉抑亦犯禁且民為邦本禄以代耕俸給茍或不充官吏何以知勸應天下令録簿尉判司等宜準漢乾祐三年勅復於中等無色役户内置俸户據本官所請料錢折支物色每一貫文給與兩户貨賣逐户每月輸錢五百文除二稅外與免役其折支物色每嵗有官吏随蠶鹽一倂給付元數給第定置田料錢人户等易料錢二十貫至七貫俸户自四十户至十四户各有差役幕職官亦給俸户開寶五年悉令罷之㑹要太宗雍熙四年詔曰王者設班爵以馭貴差禄秩以養賢所宜各懋厥官共成庶務顧其稍食宜在優豐應内外文武臣僚等折支俸錢舊以八分為十分支給自今並以實價給之大詔令淳化三年户部言桂州給貞州十七兩四錢充轉運使時載月俸五十一貫八百文有逾常例望令按劾詔以殊賜載仍别給俸錢焉真宗祥符五年詔定加文武職官月俸數加今制自唐貞元四年定百官俸至僖昭亂離國用窘闕天祐中止給其半梁開平始令全給後唐同光祖庸使孔謙以軍儲不充百官月俸萬數雖多而折支非實請減半數而支實錢是後所支半實俸虚折顯徳三年復給實錢宋朝之制備于國史大凡約後唐所定數其非兼職者有一分實錢三分折支景徳罷兵之後始其俸給他物者京師一千給實錢六百在外四百帝嗣位以来承二帝恭儉之外富有多積承平既乆賦斂至薄軍國用度之外未當廣置自奉且以庶官勤事非厚稍無以責㢘隅故因行慶特給六年入内内侍省亦等第加給會要仁宗寶元初論者欲損吏兵俸賜帝曰禄廪皆有定制毋遽更變以揺人心長編寳元間陜西用大輔臣議節浮費有議百官俸賜上曰朕所欲去乘輿服御宫掖奢侈竒巧無名之費不給之用爾今國家擇人用職俸賜自有定制何可裁減寶訓神宗熙寧二年詔自今文武朝官乞致仕歴任有功績治狀顯著者給外任俸錢衣賜京官班行準此其雖無功績治狀歴任無公私罪事理重及無賍罪者減半長編熙寕四年中書言天下選人俸既薄而又多寡不一恐不足以勸廉吏今欲月増縣令録事參軍俸錢至十五千米麥四石司理司法司户參軍主簿縣尉防團軍事推官軍監判官錢十二千米麥三石每月通増俸錢一萬二千餘緡米麥二千八十餘石其三班使臣短使并押綱運並縻費不易欲令三司勘㑹開畫以聞從之先是選人廪給下者至請錢七千米麥兩石而已貧不足自飬則往往陷於茍賤不㢘之地上閔之故更此法其後三班吏臣卒不及増長編髙宗建炎初詔宰執及見任宫觀待歸未有差遣京官以上俸錢權減三之一聖政紹興二年上語及戢贓吏吕頥浩曰奸吏侵漁不可不禁然州縣官依條格合得請給宜按月支與使之食足然後可以飬廉隅上曰然輔臣因進呈諸路公使庫支給外縣官供給條格詔申明行下聖政紹興三年上曰小官増俸雖變舊法亦所以權一時之宜祖宗成憲固當謹守至於今昔事有不同則法有所不行亦須變而通之自元豐増選人俸至十千二百當時物價甚賤今飲食布帛之價比宣和間猶不啻三倍則選人何以自給而責以廉節難矣先是御筆増小官俸方下有司條具故聖諭及此聖政羣書考索後集卷十六
