body:
  text: 羣書考索别集卷十二宋章如愚撰諸史門諸史掌文籍之官史掌文籍之官如二公及王乃問諸史并周禮諸属各有史㡬人如内史御史皆掌文籍之官秦有御史大夫亦掌制度文物者也文公語録文有餘而誠不足吏掌文書多聞習事而誠或不足語注列國皆有史古者列國皆有史官掌記時事晋之乘楚之檮杌魯之春秋此三者皆其所記冊之名也孟有餘力則看全史先㸔語孟中庸更㸔一經却㸔史方易㸔先讀史記史記與左傳相包次㸔左傳次㸔通鑑有餘力則㸔全史文公語録義理明方可看史今人讀書未多義理未至融㑹若便去㸔史考古今治亂理㑹制度典章譬如作陂塘以溉田須是陂塘中水滿然後决之則可以流注滋殖若陂塘方有一勺之水遽决之以溉田則非徒無益於田而一勺之水亦復無有矣讀書既多義理亦融㑹胷中尺度已分明而不㸔史書考治亂理㑹制度典章則是猶陂塘之水已滿而不决以溉田若讀書未多義理未有融㑹處而汲汲焉以看史為先務是猶决陂塘一勺之水以溉田也其涸也可立而待矣同上作史意思易見讀史亦易見作史者意思後靣成敗處他都説得意思在前了如陳蕃殺宦者但讀前許多踈脱都可見了甘露事亦然同上讀史當看大處讀史當㸔大倫理大元㑹大治亂得失同上史為懲勸小人而作史何為而作乎其有憂乎何憂乎憂小人也何由知之以其名而知之楚之史曰檮杌檮杌四凶之一也君子不待褒而勸不待貶而懲然則史之勸懲獨小人耳仲尼之志大故其憂愈大憂愈大故其作愈大是以因史修經卒之論其效者必曰亂臣賊子懼由是知史與經皆憂小人而作其義一也雖然經以道法勝史以事辭勝經不得史無以證其褒貶史不得經無以酌其輕重老泉後世史筆不公董狐不生舉世無直筆仲尼已後天下無公言李顔遷史司馬遷取予戾於聖人司馬遷以一時之傑斷獨述陶唐以來至於麟趾紀有十二表有十書有八世家有三十列傳有七十總篇一百三十九五十二萬六千有五百字勒成一家之書意盖踵春秋而作也以紀攷之以五帝則不紀少昊於西漢則不紀惠帝項羽何人也奸雄之中所謂錚錚佼佼者也遷反紀之得與堯舜禹湯之列羽死而有知寧一日少安乎以傳攷之若刺客則有傳若游俠則有傳若佞倖滑稽則有傳紀信義士也英烈之言可畏而反無一辭以褒之俾與庸夫並朽而腐可勝嘆哉嗚呼遷明春秋也明春秋而叛於春秋可乎春秋善善惡惡又果如是乎孟堅謂其是非頗謬於聖人詎不信夫李顔司馬才髙而率司馬遷才髙識亦髙但麄率文公語録史遷蘇黄門優劣昔時讀史者不過記其事實摭其詞采以供文字之用而已近世學者頗知其陋則變其法務以考其形勢之利害事情之得失而尤喜遷史之書講説推尊㡬以為賢於夫子寧舍論孟之属而讀其書然嘗聞其説之一二不過只是戰國以下見識其正當處不過知尊孔氏而亦徒見其表悦其外之文而已其曰折衷於夫子者實未知所折衷也後之為史者又不及此以故讀史之士多是意思粗淺於義理之精㣲多不能識而墮於尋常之見以為雖古聖賢亦不過審於利害之等而已唯蘇黄門作古史序首言古之聖人其於為善如火之必熱水之必寒不為不善如騶虞之不殺竊脂之不谷於義理大綱領處見得極分明提得極親切雖其下文未能盡善然只此數句己非近世諸儒所能及文公荅吕子約史記數條之疑史記疑數條向曽考證來了功臣表與漢史功臣表其户數先後及姓名多有不同二史各有是非當以傳實證之不當全以史記所傳為非真也如淮隂為連敖典客漢史作票客顔師古謂其票疾而以賓客之禮禮之夫淮隂之亡以其不見禮於漢也蕭何追之而薦於漢王始為大將若己以賓禮禮之淮隂何為而亡哉此則史記之所載為是三代表是其踈謬處無可疑者盖他説行不得若以為堯舜俱出黄帝是為同姓之人堯固不當以二女嬪于虞舜亦豈容受堯之二女而安於同姓之無别又以為湯與王季同世由湯至紂凢十六傳王季至武王纔再世耳是文王以十五世之祖事十五世孫紂武王以十六世祖而伐之豈不甚謬戾耶文公荅丁子文史遷書有純駁以史遷能貶卜式與桑𢎞羊為伍又能不與管仲李克為深知功利之為害不知六國表所謂世異變成功大議卑易行不必上古貨殖傳文長貧賤而好語仁義為可羞者又何謂耶伯夷傳辨許由事固善然其論伯夷之心正與求仁得仁者相反其視蘇氏之古史孰為能考信於孔子之言耶謂遷言公孫𢎞以儒顯為己私之不足為儒不知果有此意否彼固謂儒者􅀶而寡要勞而少功是以其事難盡從然則彼所謂儒者其意果何如耶若以馬遷與班固並論則固不無優劣而其書數十萬言亦豈無好處但論其大㫖則蘇氏兩語恐史遷復生不能自解免也文公荅吕子約有愧於春秋作史無定法本之春秋則有定法考史無定論本之春秋則有定論然則論遷之史記獨不可質之春秋乎且遷史胡為而作為續春秋而作也何以知其續春秋嘗讀小司馬索隠有曰遷承五伯之運繼春秋而纂是史則史記為續春秋而作明矣吁遷史既續春秋則當以春秋論之可也盖自麟經絶筆之後而得褒貶之遺意者吾於遷史有取焉陳平而曰陳丞相衛青而曰衛將軍豈非有得正紀官之意乎周勃而曰絳侯韓信而曰淮隂侯豈非有得於紀官之意乎大梁王而曰彭越九江王而曰黥布豈非有得於稱名之意乎至於長叔田叔之稱叔其與書字也同一轍賈生酈生之稱生其與書字也均一義嗚呼襲春秋而後存春秋之例者捨遷史吾誰與歸雖然雜呂后於本紀之中進陳渉於世家之列置相如於西夷傳之下是又有媿於春秋之褒貶不然議者何以曰是非頗謬於聖人黄門古史有功於遷史愛周官者駁周官之異愛爾雅者剟爾雅之瑕愛文選者辨文選之惑吁又孰知蘇頴川古史之作正所以愛遷史歟後世之愛遷史者固為不少然裴駰集解第釋其疑少孫續書略補其闕劉伯莊之地名張守節之正義裴安時之纂訓又特將順其意而乏髙天下之見不有古史正救舛訛則遷史之惑滋甚且生而神靈此盖虚誕之語遷紀髙辛而蘇公削之則古史非有功於遷乎琴牢陳亢孔門之髙弟遷史不載而蘇公詳之則古史非有功於遷乎刺客荆軻固非有不欺之志遷史美之而蘇公辨之則古史又非有功於遷乎莊周實左􅃝於孔子遷以為周詆孔子之徒故明其跡吁豈有攻人之短而復摭人之所長乎此古史所以不容置喙也宰我出於聖人之親炙遷以為宰我常從田常而為僣道之舉吁豈有沐夫子之教誨而忍為是乎此古史所以不容絶筆也至於傳穰苴而不知考據之乖記虞卿而不知履歴之先後蘇公古史歴歴言之固非洗垢索瘢而次毛求疵者喜遷之心動於中反愛而知其惡也不然秦漢以下奚獨一史班范諸公又匪一人蘇公胡為特拳拳於太史公乎愚於此又知古史之作正所以愛遷非所以詆遷也小司馬索隠辨史記之惑裴駰集解所以釋史記之疑安時人訓所以明史記之㫖吁又孰知小司馬索隠乃所以辨史記之惑也歟且史記作於誰乎漢太史司馬氏父子所述也彼自以承五百之運繼春秋而纂是史於是上始黄帝下迄大漢為一百三十篇以變左氏體本紀十二則記帝王之實而法嵗星之一周表十則録隠㣲之事而象剛柔之十日書八則述國家之大體而擬八節之成嵗世家三十則記諸侯代系而取一月之成數列傳七十則列人臣事跡而明致仕之大義紀録不為不工用工不為不久其間舛訛錯謬前後倒置不有小司馬以索其隠則後世之惑滋甚何者平章百姓堯舜之文也而五帝作便章是猶曰古平字亦有便音也彭蠡既瀦禹貢之文也而夏本紀作既都是猶曰南方謂都為瀦也然秦㑹稽刻石文曰詐謀而秦紀曰作謀豈非書字之誤乎古文尚書曰在治忽而夏紀則曰來始滑又豈非襲舛之訛乎項羽假號西楚果足以齊本紀之驅耶陳勝起自匹夫果足以厠世家之列耶相如汲鄭挺挺漢臣之右置之西夷傳之下是耶非耶大宛列傳宜在朝鮮之後列於酷吏㳺侠之間當耶否耶盖公非薄遷史也愛而知其惡實為之鑚皮出羽而非洗垢索瘢也不然索隠可以無作而補缺誣謬又何以拳拳致譏於元成間禇少孫耶班史古今人表辨後志之惑者可以誚劉昭不可以誚范曄索史記之隠者可以議禇公不可以議司馬糾唐史之繆者可以論宋祁不可以論歐陽公何者補注五十八卷出於昭而非􅁮也龜筴等傳續於禇先生而非遷也唐史列傳編於宋祁而非歐陽公也吁又孰知班孟堅作漢史而古今人表大率成於曹昭之手乎是表之作繆妄最多考其所述伏漢軋秦而羅千載之人物夫以千載之人物而編入漢書真所謂鳩居鵲巢者然一表之中九品森列皂白繽紛玊碈混揉雌黄出其唇吻朱紫由其月旦愚未敢以為通論瓢飲春融心齋光霽顔子德行聖人流品管仲孱軰而齊並驅駕是蹇驢得以肩騏乘也伊訓盤銘説命龜鑑伊傅事業千古掀掲叔向何人而混處室廬是豹窟麑場而豹乳春囿也詠歸明月雩舞春風曽子學問聖門翹楚宰予下第而同居二等是錙銖不辨而權秤未定也至於優司馬而劣老􅆅進太弓而退冉有尤足以見甲乙之差范武子即士㑹也既述武子又述士㑹申包胥非伍子胥儔匹也先取包胥後取子胥又足以見品藻之誤向使孟堅之秉筆就緒大家之狗尾不續則班固為漢一代良史劉氏何以刋誤顔㳺何以决疑李善何以辨惑文中何以曰史失自固始漢書有可疑處顔思古注前漢書如此詳猶有不可曉者况其他史無注者漢宣渭上令單于母謁范升劾周黨服而不謁又不知是何禮元注疑是君臣之禮見而自通其名然不可考矣文公語録唐史唐史筆不公云何歐陽子秉筆迷至公唐經亂周紀凢例孰此容侃侃范太史受説伊川翁春秋二三䇿萬古開羣蒙感興詩通鑑看正史却看通鑑史亦不可不㸔㸔通鑑固好然須㸔正史一部却㸔通鑑一代帝紀更逐件大事立个綱目其間即目䟽之於下便可記得文公語録通鑑與正史不同問讀通鑑與正史如何曰好且㸔正史盖正史于一事關渉處多如髙祖鴻門一事本紀與張良灌嬰諸傳互載又却意思詳盡讀之使人心地浹洽便記得起通鑑則一處説便休直是有氣性人方看得同上通鑑綱目提綱以正統為主問通鑑提綱主意曰主在正統問何以主在正統曰三國當以蜀漢為正而温公乃云某年某月諸葛亮入冦是冠屨倒置何以示訓同上綱目無正統例綱目於無正統處並書之不相主客通鑑於無正統處須推一个為主某又􅄁取史法之善者如權臣擅命前後多書以某人為某王某公范曄却書曹操自立為魏公綱目亦用此例同上提綱書逆臣例通鑑提綱例凡逆臣之死皆書曰死至狄仁傑則甚疑之李氏之復雖出於仁傑然畢竟是死於周之大臣不奈何也教相隨入死例書云某年月日狄仁傑死也同上與史記所載異同通鑑先後之不同者却不必疑史家叙事或因時而記之或因事而見之田和遷康公通鑑載於安王十一年是因時而紀之也史記載於安王十六年是因事而見之也何疑之有只有伐燕一節史記以為涽王通鑑以為宣王史記却是考他源流來通鑑只是慿信孟子温公平生不喜孟子到此又却信之不知其意如何但二説今皆無所證未知孰是孰非文公答吕子約書與左傳相授受自漢以來為史者一用太史公紀傳之法此意固不復講至司馬温公受詔纂述資治通鑑然後千三百六十二年之事編年係日如指諸掌雖托始於三晋之侯而追本其原起於智伯上係左氏之卒章實相授受偉哉書乎自漢以來未始有也䟦通鑑紀事本末纂緝綱目之意先正温國司馬文正公受詔編集資治通鑑既成又撮其精要之語别為目録三十卷并上之晚病本書太詳目録太簡更著舉要歴八十卷以適厥中而未成也至紹興初故侍讀南陽胡文定公始復因公遺藁修成舉要補遺若干卷則其文愈約而事愈備矣然往者得於其家而伏讀之猶切自病記識之弗強不能有以領其要而及其詳也故甞過不自料輙與同志因兩公四書别為義例増損櫽括以就此編盖表嵗以首年而因年以著統大書以提要而分注以備言使夫嵗年之久近國統之離合辭事之詳略議論之同異通貫曉析如指諸掌名曰資治通鑑綱目資治通鑑綱目綱目義例精密綱目亦修得二十許卷義例益精密上下千有餘年亂臣賊子真無所匿其形矣文公與劉子澄改正温公所紀之年温公舊例皆以後改者為正此殊未安如漢建安二十五年之初漢尚未亡今便作魏黄初元年奪漢太速與魏太遽大非春秋存陳之意恐亦不可為法文公答吕伯恭書直書楊雄荀彧之死揚雄荀彧二事按温公舊例凡莾臣皆書死如太師王舜之類獨於揚雄匿其所受莾朝官稱而以卒書似渉曲筆不免書按本例書之言莽大夫揚雄死以為足以警夫畏死失節之流而初亦未改温公直筆之正例也荀彧却是漢侍中光禄大夫而㕘丞相軍事其死乃是自殺故但據實書之曰某官某人自殺而係於曹操擊孫權至濡須之下非故以彧為漢臣也然悉書其官亦見其實天子近臣而附賊不忠之罪非與其為漢臣也文公答尤延之乞修通鑑綱目臣舊讀資治通鑑切見其間周末諸侯僭稱王號而不正其名漢丞相亮出師討賊而反書入冦此類非一殊不可曉又凡事之首尾詳略一用平文書寫雖有目録亦難檢㝷因初妄意就其事實别為一書表嵗以首年而因元以著統大書以提要而小注以備言至其是非得失之際則又輙用古史書法略示訓戒名曰資治通鑑綱目如蒙聖慈許就閑秩即當繕寫首編草本先次進呈恭俟臨决文公奏狀史通才長識短挾已見以攻訶古人易立史法以取信後世難夫知㡬貫穿史籍而著内外四十九篇上窮王道下浹人倫議論攻訶絲粟不貸徐堅讀之且有史官宜置座右之歎如之何而不足取於後盖史通之作矯亢多而夸詡勝疑古則十有一條惑經則二十一事陳勝世家指司馬之疵纇虚美隗囂中范曄之膏肓孔明之才不當貶所以起陳夀之廢疾也􅈛朱之事不當褒所以攻魏收之墨守也片言隻字嚴甚秋霜使碔砆不得以揜瑕薫蕕不得以混臭故曰挾己見以攻訶古人易然首白可期汗青無日姑含載事閤筆之羞三為史臣再入東觀重起竟無成功之喙此猶曰任不專職不久知㡬之處時如此堯舜五帝之盛伯禹三王之祖疑古一篇不免見疑堯舜伯禹果可疑乎夫子萬代之宗師春秋百王之軌範感經一篇不免見貶夫子春秋果可貶乎既以班固為該密矣至論五行志又曰班固錯繆不精吁錯繆且爾豈得謂之該密乎既以藝文為不當志矣其自述史又曰都邑氏族方物宜為三志吁方物可志藝文獨不可志乎故曰立史法以取信後世難昔知㡬嘗為史有三長之説愚以史通觀之謂其長於才學而短於識也不然栁璨何以有析㣲之作唐史臣何以有工拙之辨通歴議論非出於一家始黄帝迄天寳杜佑之通典也君子謂其未必通於典起太初終南齊梁武帝之通史也君子謂其未必通於史馬㑹元通歴之作其亦猶杜祐之通典梁武帝之通史乎嘗攷其書大抵編次衆史而為之議論根株則多有取於虞世南之帝王略論捜索三墳著述興敗覿元風於千古貫寳歴於聖唐總之於歴可謂通矣然栗陸驪連書所不載而通歴載之何踈寒浞之事經所不詳而通歴詳之何靡乎此猶足以見其通也既以女媧為三皇之一又曰燧人共工未知孰是取予不真果足謂之通乎既以有熊為中古之世又曰無懐已上莫知其都講貫不熟果足謂之通乎既以天地人皇為四萬五千六百年矣又曰有巢之代未詳年嵗闕略尚多又果足謂之通乎吁又孰知總之所未通正有待於後世之通者歟稽古録此書元無義例稽古録有不備者當以通鑑補之温公作此書想在忙裏做成元無義例文公語録可備經筵進讀稽古録一書可備經筵官僚進讀小兒讀六經了令接讀去亦好末後一表其言如蓍龜一一皆驗宋莒公歴年通譜亦與此書相似然不如温公之有法也髙氏小史亦好一書但難得本子髙峻唐人通鑑亦多取之同上唐鑑唐鑑不可不讀司馬温公史論稽古録范唐鑑不可不讀語録唐論理所不及唐鑑意正有踈處孫之翰唐論精練説利害如身處親歴之但理不及唐鑑耳同上國史國史當看長編問讀史之法曰先讀史記及左氏却㸔西漢東漢三國志次㸔通鑑温公初作編年起於威烈王後又添至共和後又作稽古録始自上古然共和以上之年已不能推矣獨邵康節却推至堯元年皇極經世書中可見編年難得好者温公於宋朝又作大事記若欲㸔宋朝事當㸔長編若精力不及其次當㸔國紀國紀只有長編十分之一耳文公語録國紀長編詳略宋朝國紀好㸔雖略然大綱却都見長編太詳難㸔修史者不敢増减今之修史者只是依本寫不敢増减一字盖自紹聖初章惇為相蔡卞修國史將欲以史事中傷諸公前史官范純夫黄魯直時已去職各令於開封府界内居住就近報國史院取㑹文字諸所不樂者逐一條問黄范又須䟽其所以然至無可問方令去國後來史官因此懲創故不敢有所増損也並同上修史宜得鴻博之士伏惟髙宗皇帝中興艱難實同創業成功盛德莫可形容信史所傳垂法萬世宜得鴻博之士執簡操筆其間庶㡬將來有以考信辭免實録院修撰奏狀文集不見於史禍之後紹聖史禍諸公置對之辭今皆不見於文集獨嘗於蘇魏公家得陸左丞畫一數條皆詆元祐語也其間記黄太史欲書王荆公勿令上知之帖而已力沮之黄公争辨甚苦至曰審如公意則此為佞史矣是時陸為官長以是其事竟不得書而黄公猶不免於後咎然而後此又數十年乃復賴彼之言而事之本末因得盡傳於世是亦有天意矣䟦山谷草書千文日録皆誑譎之言因妄謂日録固為邪説然諸賢攻之亦未得其要領是以言者瀆而聽者疑用力多而見功寡也盖嘗即其書而考之則凡安石之所以惑亂神祖之聰明而變移其心術使不得遂其大有為之志而反為一世禍敗之原者其隠㣲深切皆聚此書而其詞鋒筆勢縱横捭闔煒煜譎誑又非安石之口不能言非安石之手不能書也以為蔡卞撰造之言固無是理况其見諸行事深切著明者又已相為表裏亦不待晚年懟筆有所増加而後為可罪也然使當時用其垂絶之智舉而焚之則後來載筆之士於其帷幄之間深謀密計雖欲畢力捜訪極意形容勢必不能得之如此之悉而傳聞異詞虚實相半亦不能使之無濫惡之疑讀兩陳諫議遺表羣書考索别集卷十二
