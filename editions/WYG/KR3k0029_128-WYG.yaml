body:
  text: 羣書考索後集卷六十二宋章如愚編財用門楮幣類三代之賦皆以粟榖所謂帛布不過一時權輕重吏俸乃分田制禄未嘗以錢幣為也夏商之幣金為三品黄金白金赤金是也周小宰以官府之八成經邦治七曰聽稱責以傳别鄭司農注云稱責謂貸予也傳别謂劵書也當是之時特民間私相稱貸以為符驗公家未嘗為之漢自王公至佐吏亦以榖粟制禄當時制賦不過口筭而人納錢百餘至武帝用度不給於是造白鹿以為皮幣王侯貴人或以朝覲或以㑹遇或以聘享必以薦璧而後行造銀為白金飾以文采或以為龍或以為馬或以為龜各有其直而不紊國用頼以少舒民力頼以少寛亦一時權宜之術唐憲宗時令商賈至京師委錢諸道富家以輕装赴四方合劵乃取號為飛錢即楮劵所由起也迨我國朝真宗朝張詠鎮蜀患蜀人鐵錢之重不可貿易於是設質劑之法一交一緡以三年為一界而換之始祥符之辛亥至熈寧之丙辰六十五年二十二界雖至巧有不能易寳訓仁宗天聖元年初蜀民以鐵錢重私為劵謂之交子以便貿易富民十六户主之其後富者稍衰不能償所負争訟數起大中祥符末薛田為轉運使請官置交子務以㩁其出入久不報㓂瑊守蜀遂乞廢交子不復用㑹瑊去而田代之詔曰與張若谷度其利害田若谷議廢交子不復用則貿遷非便但請官為置務禁民私造又詔梓州路提㸃刑獄官與田若谷議田等議如前詔從其請始置益州交子務長編天聖初用其議一界止一百二十五萬餘緡至紹聖則増為一百四十萬緡至元符則又増為一百八十萬餘緡今則二千五百七十萬餘緡㑹要慶歴七年孫甫嘗監交子務轉運使以偽造交子多犯法欲廢不用甫曰交子可以偽造鐵錢可以私鑄有犯私鑄鑄可廢乎但嚴治之不當以小害廢大墓誌皇祐二年阮逸建言作錢葆飾以翠羽珠珮藉以鹿皮欲以錢兼行陳升之以為漢武帝置皮幣取後世之譏况阮逸之言作偽不可用上罷之神宗朝文彦博言行交子不便事上曰行交子誠非得已若素有定制財用既足則自不須此今未能然是以急難不能無有不得已之事長編皮公弼言交子之法以方寸之紙飛錢致逺然不積錢為本亦不能以空文行今商虢鄜耀紅崖清逺鐵冶所收極廣茍即冶更鑄折二錢嵗除工費外可得百萬緡為交子本并上可行十二事上批可如所乞委公弼營辦長編熈寧二年條例司言髙遵裕等乞置交子務交子行於成都人以為便今河東若運鐵錢勞費宜行交子法後轉運使交子法行商賈不肯中納糧草不惟有害邉糴亦恐鹽礬不售遂廢沈起以陜西錢不足請行交子後張景寧出使言交子可行於蜀不可行於陜西将恐民失業無以為生罷之後又以鈔法有害邉糴復行交子二年又以無實錢為本法不可行無益於鈔法又罷哲宗紹聖二年上問曽布欲行交子法如何近曽令余景相度以為可行布曰此法不可行不惟與川交子相亂兼交子須有見錢相當乃可行熈寧四年韓絳作相兩欲施行皆議論不成而罷余景輕易小人何可與議法長編徽宗大觀元年改四川交子為錢引自朝廷取湟廓西寧通行交子法以助兵費由是比天聖一界逾二十倍價益减落及至換界年分新交子一千乃當舊交子四千交子法大壊故更張之其後又詔四十一界至四十三界更不收兊云長編十月又詔陜西河東數路引直五千至七十而成都纔直二三百民間貿易十千以上今錢與引半用㑹要髙宗紹興六年張澄嘗請依四川造㑹子與錢並行詔造百五十萬充糴本而未樁到見錢議者以為恐未信於民遽詔罷之髙宗論四川交子之弊曰如沈該稱提之說但官中嘗有百萬緡遇交子减價自買之即無弊矣紹興三十年錢端禮知臨安府建言楮幣以行累月合支官錢造㑹子流傳輸官亦許用之紹興三十一年詔於都茶場置㑹子務仍撥左藏庫錢十萬貫為本錢端禮為六務出納制用皆有法平孝宗淳熈元年𠡠曰劄子去嵗降㫖揮許人户以㑹子入納官物及今年正月内令諸州軍起發上供諸色窠名錢許用三分㑹子比見浙中州縣間交納稅物不依近降㫖揮許民戸經户部御史臺越訴不遵依去處重行賞罰如此州縣不得因縁為奸人知㑹子之貴自然流通無滯此亦救弊之一端三省同奉聖㫖依孝宗嘗收内帑金帛以易楮藏于内庫者四百萬行于民間者僅二百萬一時幣楮重於黄金淳熈三年四月壬子内殿進呈淮東西兩總領乞以金銀兊換㑹子支遣上曰綱運既以㑹子中半入納何故乃爾闕少葉衡龔茂良奏縁朝廷以金銀換㑹子此不過散在民間耳上曰何幸得㑹子重但更思所以闕用之因三日復宣問及此衡奏户部嵗入一千二百萬其半為㑹子而南庫以金銀換收者四百餘萬流行於外者纔百萬安得不少上謂曰此是户部之數不知兩總領所數多寡如何恐久有弊須先䆒見其源兩處且各以二十萬與之兊換金銀及錢銀臣申到民間入納闕少㑹子并兩淮收換銅錢已支絶㑹子乞再給降上曰會子真如此少茂良奏聞得商旅往來貿易競用㑹子一為免稅二為省脚乗三為不復折閱以此觀之大段流通上遽令應副因宣諭曰卿等子細講究本末思所以為善後之計衡等多遵禀聖訓而退聖政七月乙未宰執進呈訖上謂曰㑹子通行民間銅錢日多甚可喜葉衡奏今諸處㑹子甚難得謂宜量行支降行使上又曰未可向來止縁所出數多致有前日之弊今須少待徐議施行淳熈十年正月辛亥進呈鎮江總領所乞降新㑹兊換上見前具新印㑹子數目乃曰新印㑹子比舊又増多大凡行用㑹子少則重多則輕王淮等奏曰誠如聖諭聖政趙開知川蜀憂其楮幣之輕遂詢其至貴之時用官錢以此價收之故蜀人大為貴重孝宗即位民間惟重錢輕楮幣於是出御府之金以佐大農寧收空劵典章坑冶黄帝問於伯髙曰吾欲陶天下而以為一家為之有道乎伯髙對曰上有丹砂者下有金上有磁石者下有銅金上有陵石者下有鉛錫赤銅上有赭者下有鐵此山之見榮者也禹以歴山之金鑄幣而贖民之無饘賣子者禹貢青州貢岱畎絲枲鈆松怪石揚州貢金三品荆州貢金三品梁州貢璆鐵銀鏤砮磬湯以荘山之金鑄幣而贖民之賣子者並管子周禮卝人掌金玉錫石之地而為厲禁以守之若以時取之則物其地圗而授之廵其禁令齊管子謂威公曰君其率白徒之卒鑄莊山之金以為幣漢四百年班范二史其金之所産與夫國資其利者不見於志惟吴鄧以銅山錢遍於天下唐銀銅鐵錫之冶二百六十八陜宣潤饒衢信五州銀冶五十八銅冶九十六鐵山五錫山二鈆山四汾州礬山七太宗時權萬紀上言宣饒二州銀大發采之可得數百萬緡上怒曰朕為天子所少者非財也但恨無嘉政可以利民而卿乃以利規我欲方我漢桓靈耶遂黜萬紀髙宗麟徳二年廢陜州銅冶四十八𤣥宗開元十五年初稅伊陽五重山銀錫徳宗時韓洄言山澤之利宜歸王者自是皆𨽻鹽鐵使憲宗元和中天下銀冶廢者四十嵗采銀萬二千兩銅二十六萬六十斤鐵二百七萬斤錫五千斤鈆無常數文宗開成元年復以山澤之利歸州縣刺史選吏主之其後諸州牟利以自植天下不過七萬餘緡武宗増河湟戍兵衣絹五十二萬餘匹裴休請復鹽鐵使以助國用増銀冶二鐵山七十一銅冶二十七鈆山一天下嵗率銀二萬五千兩銅六十五萬五千斤鈆十一萬四千斤錫萬七千斤鐵五十三萬二千斤唐志宋太祖凡産金有商饒歙撫四州南安軍産銀有桂陽開寳龍焙三監又五十一場在饒䖍信建昌越衢處建福漳汀南建邵武南安廣韶連英恩春秦興元等州軍産銅有三十五場在饒處建英信南汀漳邵武南劔等州軍又一務曰梓州之銅來産鐵有四監曰徐州之大通利國兖州之萊蕪廢於大中祥符七年又河鳳翔虢同儀蘄黄袁英州興國軍有十二冶晉磁鳳澧道渠合梅陜耀坊䖍吉州有十二務信鄂建連南劔邵武等州軍有二十五場産錫有九場在河南之長水及䖍南康道賀潮循等州軍産鈆有三十六場在衢越建南安英春韶汀漳南劔邵武等州軍水銀四場在秦階商鳳州朱砂二場在商宣道至道末天下嵗課金若干兩銀十四萬五千餘兩銅四百一十二萬餘金鐵五百七十四萬八千餘斤鈆七十九萬三十餘斤鍚一十六萬九十餘斤天禧末金一萬兩銀八十八萬三千餘兩銅二百六十七萬五千餘斤鐵六百二十九萬三千餘斤鈆四十四萬七千餘斤錫一十九萬一千餘斤水銀三千餘斤朱砂五千餘斤然金銀除坑冶丁稅和市外課利折納互市所得皆在焉國家産金之所六産銀之所四十有七産銅之所三十有六産鐵之所四十有七産鈆之所七産錫之所一水銀朱砂之所一此舊制為然後有増罷不止此㑹要祖宗時金嵗入五萬餘兩自景徳至寳元金増五萬五十餘銀増至二十一萬斤開寳三年詔曰古者不貴難得之貨後代賦及山澤上加侵削下益彫弊朕每念兹事常深痛懐未能捐金於山豈忍奪人之利自今桂陽監嵗入白金宜三分减一開寳四年詔昔漢法作偽黄金棄市所以防民之奸弊也如聞京城之内競習其術轉相誑耀此而不止為盗之萌自今犯者並寘極典太宗興國八年詔大通冶嵗輸鐵上方鑄兵噐煅煉十分纔得其四五自今大通冶鐵先鑄成噐俾官倅治之無使負重致逺匱民焉㑹要至道元年廢邵武軍歸化縣金場已配買金百姓送納建以棄命自例者詔永不得興置工匠悉放歸農後本軍復上言請興置是場真宗以先帝恐害及久已得停廢可從也遂罷其奏至道二年陜西奏成州金坑嵗不登望遣使按行更正新制詔曰捐金於山前聖之盛徳所寳惟榖舊史之格言朕緬慕太古之風不貴難得之貨其成州兩處金坑並宜停廢又廢衢州銀冶㑹要真宗時邵武軍上言請興置舊廢金場先是太宗至道元年詔廢是場永不得興置遂不從所請咸平二年宰相張齊賢上言今之所患錢貨未多望擇使臣逐處相度髙價招誘人户採陶鈆錫仍按行出銅錫薪炭處置場鑄錢如此三年嵗可得百五十萬貫乃命馮亮白承眷度至明年鑄錢一百二十五萬貫銅皆有餘羡乃以亮為都大提㸃鑄錢事以承眷同提㸃焉長編祥符元年帝以京城金銀價貴以問三司使丁謂言多謂戎回鶻所市入蕃詔令約束之祥符九年發運使李溥奏饒江池信等州四監共鑄一百二十五萬貫使銅四百五十三萬餘斤自景徳元年至大中祥符八年出坑漸少乞告諭民有知苖脉興廢處許令告官烹煉較其課利優之㑹要仁宗時三司上言恩州陽江縣産金請選官主其事上曰毋得乗此重擾逺民姑務納束之寳訓天聖三年都官貟外郎桞宏奏朝廷於饒州置金雖累更條而其弊尚深遂使豪商操其權貧民受其困雖差衙前户請錢散買毎一次充役遂至破竭家産又大商富賈多自京師入便饒州錢此州别無輕貨正買生金官錢既少私價轉増是致一方久罹其弊今請住諸處商客入便饒州錢一二年間驗其損益金價必减民力稍蘇其利歸公家用制商賈遂從之天聖五年買金逐等第毎兩各添錢一貫自是金數多詔奬本州長吏以下宰臣王曽等言獲金雖本州長吏以下雖多深慮耕鑿之民弛廢農業争趨厚利望諭本州常切體量止絶遂從之也慶歴三年六月甲辰詔曰議者多言天下茶鹽礬銅銀坑冶之有遺利朕懼開掊克之政常抑而弗宣然尚慮有過取而傷民者轉運司其諭所部官吏條上利害以聞長編神宗熈寧元年詔天下貨寳坑冶不發而負嵗課者蠲之㑹要元豐七年提㸃江浙等路坑冶鑄錢胡宗師言信州鈆山縣銅坑發已置場冶乞借江東提舉司錢二十萬緡以新鑄錢息二分還福建二浙有銅坑處准此户部言宗師言皆推行詔借江東提舉司錢十五萬緡以新鑄錢還所乞福建二浙借錢不行長編哲宗紹聖二年十一月同管勾陜西路銀銅坑冶鑄錢許天啟言檢踏到銅苖興發計六十餘處内四處已置場差人烹煉外如銅苖興發在京西川路亦乞計度前去檢踏從之長編髙宗紹興二十七年湯鵬舉奏前日罷坑冶鑄錢司甚善但戸部近日欲檢本錢兼别差官所以臺章論列兼恐坑冶司省罷官在此唱為異議願陛下以鑄錢專委轉運司必能就緒上宣諭曰此一事朕詢之士大夫亦無他說獨王珪再有章䟽朕謂凡建立人各以所見相可否歸之至當後可若一人唱之百人和之事或未當朕則何取聖政孝宗乾道二年以饒州貢金千兩民力不支遂减十分之七以蘇一部之民饒州貢金記坑冶宋朝舊有官置場監或民承買以分數申於官舊𨽻諸路轉運司本錢亦資焉其物悉歸内帑崇寧以後廣搜利宂𣙜賦益偹凡属之提舉司者謂之新坑冶用常平息錢與剰利錢為本金錢等物往往皆積之大觀庫自蔡京始也四朝志鬻爵秦始皇四年令百姓納粟一千石拜爵一級漢文帝時因晁錯請令天下入粟縣官得以拜爵六百石爵上造第一等爵稍増至四千石為五大夫第九等爵萬二千石為大庶長第十八等爵各以多少級數為差是時張釋之以訾為郎漢初訾得萬錢乃得官至景帝時上郡以西旱復脩賣爵令而裁其價以招人訾四方皆可得官武帝元朔元年外事四夷内興功利國用空竭乃募民能入奴婢以終身復為郎増秩及入牛馬為郎唯卜式數求入財天子拜式為中郎始令吏得入粟補官郎至六百石後桑宏羊請令民得入粟補官通典元朔五年有司議令人得買爵至賞官名曰武功爵級十七萬凡直三十餘萬金請買武功爵官首者試補吏先除千夫如五大夫五大夫舊二十等爵之第九級也通典又犯令株送徒入財得補官黄覇以待詔入錢賞官補侍郎謁者成帝鴻嘉三年買爵價級千錢後漢安帝永初三年天下水旱用度不足三公奏請令吏人入榖得闗内侯通典靈帝先和元年開西邸賣官二千石二千萬四百石四百萬於西園立庫以貯之又私令左右賣公卿公千萬卿五百萬時司徒崔烈入錢一百萬以買司徒其子鈞曰大人不當為三公論者嫌其銅臭通典晉武帝太康三年問劉毅以吾可方漢何主毅對以桓靈之主帝曰吾雖徳不及古人猶克己為理南平吴㑹一天下方之桓靈不亦甚乎對曰桓靈賣官錢入官庫陛下賣官錢入私門以此言之乃不如也後魏明帝初承䘮亂之後倉廩虚罄遂班入粟之制輸粟八千石賞散侯六千石散伯四千石散子三千石散男職人輸七百石賞一大階授以實官白人輸五百石聴依第出身千石加一大階諸沙門有輸粟四千石入京倉者授本州統各有差通典唐肅宗至徳二年御史鄭叔清奏前諸使下召納錢物多給空名告申又准敇納錢百千與明經出身如曽受業粗通帖策修身謹行鄉曲所知者量减二十千文如先經舉送到省落第灼然有慿帖策不甚寥落者减五千文若粗識文字准元敕處分未曽讀學不識文字者加三十千應授執事官并勲階號及贈官等有合䕃子孫者如户内兼䕃丁中三人以上免課役者加一百千文毎加一丁中累加三十文蓋先已納錢令再納錢求出身也通典憲宗時募民入粟河北淮西自千斛以上皆授以官宋朝太宗時州郡有水旱之災民艱食者許富民入粟賑貸飢民等第授官淳化中勑一千石賜爵一級二千石本州助教二千石本州文學四千石試大理評事三班借職五千石與出身奉職七千石與别駕不簽押公事一萬石與殿直太宗朝恩例差减於此天聖八年河北民飢亦用此例真宗景徳二年二月咸平末河北轉運使劉綜上言西漢晁錯以為爵者上之所擅出於口而無窮粟者民之所種生於地而不乏使入粟授以爵塞下之粟必多文帝從之令民入粟偹邉六百石爵上造萬三千石為大庶長事存典故利及公家今河北諸州聚兵糧饋勞費望行漢制以濟軍儲既而水部郎中許元豹言縁河州縣和糴邉榖數少望許進獻糧授以官秩事下三司議奏請令河北定州廣信安肅軍北平寨入榖千石授本州助教文學二千石賜出身三千石授簿尉借職四千石授奉職五千石授寺監主簿六千石授校書正字七千石授太祝奉禮郎八千石授大理評事殿直九千石授諸寺監丞侍禁萬石授大理寺丞供奉官真定府洛邢趙貝冀博瀛莫雄覇等州乾寧順安信安永定永静等軍千石以上加百石授助教文學二千石以上復遞加一百石至萬二千石授大理寺丞供奉官大名府懐磁衛相澶等州通利軍千石以上加五百石授助教文學二千石以上遞加五百石至萬五千石授大理寺供奉官上慮爵賞之濫重惜其事宰相言故事具存行之無損乃請陜西諸州亦如此制既而有司復定環渭涇原慶州鎮戎保安軍同定州等處涇定鳳儀邠鄜秦隴鳳州同洛州等處鳳翔河中府陜同莘觧乾耀丹坊虢成階州同懐州等處悉從之長編天禧二年學䆒鄭可狀本州民闕食願出粟五千八百石賑濟乞賜第選班行奉㫖不行晁逈李綱上言臣等商度損餘補乏為利亦大望令宰臣定議特從其請俟豐稔即止仁宗康定初陜西用兵太子中允尹洙請為鬻爵為土軍營房及所給物費其鬻爵之法凡入粟五百斛為上爵許入珠金為婦女服飾得與本部七品官接坐入粟百斛為下爵許蓄女使以銀為飲食噐三司使鄭戬為翰林學士丁度知制誥葉清臣參議以謂未能制勝於閫外適足歛怨於天下其議遂寢長編慶歴七年詔係方銓應納粟授官人不除司理司法參軍洎上州判官資考深無過犯方注縣尉主簿如循資入縣令録事參軍者銓司依格注擬止令臨監物務從御史知雜李東之所請也嘉祐六年詔凡入貲為郎至升朝官戸役皆免之京官不得免衙前自餘免其身而止神宗熈寧元年賜河東路轉運司試将作監主簿大廟齋郎州助教攝助教空名敕誥各三十令乗秋熟募民納粟實邉候已授官仍更免差役之次從轉運使劉庠請也癸丑詔給將作監主簿齋郎補牒州助教攝助教敕各三十下鄜延路募百姓入粟實邉仍免徑差一次長編熈寧七年賜敕誥補牒賑貸涇原環慶路飢民及為永興常平糴本哲宗元祐元年上官均百司胥吏主行文書積年寡過例該禄仕又豪右之家以貲受官其才品庸下素不知義又外臺郡守奬薦之所不及彼固分甘卑賤豈復有奮動之意其視補䕃子弟聞父兄之教少壯就官有鄉進之心宜有間矣由此觀之納粟胥吏不如補䕃補䕃不如進士理之必然也臣以為四者之冗有可罷者納粟得官是也有可裁抑者特奏資䕃胥吏是也髙宗紹興元年詔以米價踴貴細民闕食令諸路州軍以常平倉粟量度出糶仍令州縣勸誘積榖之家將願糶數具文歴出糶如及三千石以上補守闕進義副尉六千石以上進義副尉九千石以上下班祗應一萬二千石以上進義校尉一萬五千石以上進武校尉二萬石以上者取㫖優異推恩已有官䕃者此類别作施行聖政孝宗淳熈三年詔鬻爵非古制也理財有道均節出入足矣安輕官爵以益貨財朕甚不取自今除歉嵗民願入粟賑饑有裕於衆聽取㫖補官其餘一切住罷見在綾紙告身並繳赴尚書省毁抹㑹要爵二十級自公士至不更四級為士爵公士簮袠上造不更自大夫至五大夫五級為大夫爵大夫大夫官大夫五公公乗大夫自左庶長至大庶長九級為卿爵左庶長中右庶長左更更右更駟少上造車庶長太上造大庶長以至闗内侯則内諸侯也徹侯則外諸侯也皆爵也世多以秦商君為政為爵十八級合闗内侯為二十等殆秦制乎殊不知自齊已有勇爵之名而春秋傳已有所謂庶長鮑者則其來非一日矣意者自春秋以来急于攻戰設爵以示天下至秦而益以武功為尚而爵級之制備于商君上設爵以待軍功下非功則不能以倖得所以起天下好戰之心而握其運動之微權也髙祖造漢百戰而得之軍功既多而爵級亦濫暨天下既平徃徃人不以爵為重而有善遇髙爵之詔不如詔者重論之髙祖正懼爵級之輕而人或賤簡之也然而天下猶不以爵為重朝廷之賜民爵並加而無間盖視為恩典之常耳武帝繼業思所以振起武功故於爵不得不重専置武功爵以賞軍功其等十有一士爵四級造士閑輿衛元良士戎士大夫爵三級官首千秉鐸夫卿爵四級樂卿執戎政長庶軍衛耳較之秦爵遂减其十爵級既少則轉者易及所以作新天下之意而啟其尚功之習也至於舊爵之級亦不輕予卜式以輸財助兵費於是賜爵左庶長以布告天下使知帝意之所向焉羣書考索後集卷六十二
