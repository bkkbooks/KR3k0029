body:
  text: 羣書考索續集卷十一宋章如愚編經籍門春秋總論春秋為百王之大法天之生民必有出類之才起而君長之治之而爭奪息導之而生養遂教之而倫理明然後人道立天道成地道平二帝而上聖賢世出隨時有作順乎風氣之宜不先天以開人各因時而立政暨乎三王迭興三重既備子丑寅之建正忠質文之更尚人道備矣天運周矣聖王既不復作有天下者雖欲倣古之跡亦私意妄為而已事之謬秦至以建亥為正道之悖漢專以智力持世豈復知先王之道也夫子當周之末以聖人不復作也順天應時之治不復有也於是作春秋為百王不易之大法所謂考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑者也先儒之傳曰游夏不能贊一辭辭不待贊也言不能與於斯耳斯道也惟顔子嘗聞之矣行夏之時乗殷之輅服周之冕樂則韶舞此其凖的也後世以史視春秋謂褒其善貶其惡已至於經世之大法則不知也春秋大義數十其義雖大炳如日星乃易見也惟其微辭隱義時措從宜者為難知也或抑或縱或與或奪或進或退或微或顯而得乎義理之安文質之中寛猛之宜是非之公乃制事之權衡揆道之模範也夫觀百物然後識化工之神聚衆材然後知作室之用於一事一義而欲窺聖人之用心非上智不能也故學春秋者必優游涵泳黙識心通然後能造其微也後王知春秋之義則雖徳非禹湯尚可以法三代之治自秦而下其學不𫝊予悼夫聖人之志不明於後世也故作𫝊以明之俾後之人通其文而求其義得其意而法其用則三代可復也是傳也雖未能極聖人之藴奥庶幾學者得其門而入矣伊川春秋集𫝊序春秋之法大者春秋之法大者在乎侵伐戰取闈入執殺盟㑹如聘禘郊蒸嘗歸復入納災異賦役焉其間書侵五十七伐者二百一十三書圍者四十四入者二十七聖人之意其詳大備也如是豈茍然哉蓋誅其禍亂之道爾先儒徒隨事而𫝊之蓋三𫝊往往從而美之亦有一言發明聖人誅之之心者也獨陸君用啖氏之説曰春秋紀師何無曲直之辭曰一之也不一則禍亂之門闢矣若夫其差者甚者則在乎其文矣此則見聖人絶惡之源原情之法此表裏之論也其餘若盟若㑹其法皆用是也明道春秋之著書竊原春秋之文求聖人之志災之書有十一大水之書者七不雨之書者九大旱之書者二無麥苖大無麥禾之書者各一蓋言五行失其序則六府失其宜也同上春秋聖人之用詩書載道之文春秋聖人之用詩書如藥方春秋如用藥治病聖人之用全在此書所謂不如載之行事深切著明者也有重疊言者如征伐盟㑹之類蓋欲成書勢湏如此不可事事各求異義但一字有異或上下文異則義須别伊川經説五經有春秋五經之有春秋猶法律之有斷例也律令唯言其法至於斷例則始見其法之用也伊川遺書春秋窮理之要學春秋亦善一句是一事是非便見於此此亦窮理之要然他經豈不可以窮但他經論其義春秋因其行事是非較著故窮理為要嘗語學者且先讀論語孟子更讀一經然後㸔春秋先識得个義理方可看春秋春秋以何為凖無如中庸欲知中庸無如權須是時而為中若以手足胼胝閉户不出二者之間取中便不是中若當手足胼胝則於此為中當閉户不出則於此為中權之為言秤錘之義也何物為權義也時也只是説得到義義以上更難説在人自看如何傳為按經為斷春秋𫝊為按經為斷並同上謂之孔子刑書五伯者功之首罪之魁也春秋者孔子之刑書也功過不相掩聖人先褒其功後貶其罪故聖人有功亦必録之不可不恕也康節經世書春秋之大㫖春秋大㫖其可見者誅亂臣討賊子内中國外夷狄貴王賤伯而已未必如先儒所言字字有義也近世如蘇子由吕居仁却看得平文公語録明道正誼之書春秋本是明道正誼之書今人只較齊晉伯業優劣桓文謀利大義都晦了且如今人做義只做得齊桓晉文優劣論同前孔子因魯史作春秋陸曰古之王者必有史官君舉則書所以慎言行昭法式也諸侯亦有國史春秋即魯之史記也孔子應聘不遇自衛而歸西狩獲麟傷其虚應乃與魯君子左丘明觀書于太史氏因魯史記而作春秋上遵周公遺制下明方來之法褒善黜惡勒成十二公之經以授弟子弟子退而異言丘明恐弟子各安其意以失其真故論本事而為之𫝊明夫子不以空言説經也春秋所貶損當世君臣其事實皆形於𫝊故隱其書而不宣所以免時難也及末世口説流行故有公羊榖梁𫝊釋文序辨孔子有尊周之心仲尼之心何心哉尊周其心也春秋之法何法哉尊王其法也仲尼有尊周之心而無尊周之權有尊王之法而不得著尊王之事業自衛反魯春秋於是作焉仲尼尊周之心庶幾其有所寓也始於東遷卒於西狩周之典憲靡一不載焉所以始平王者著其為東周之實也所以取桓文者以其有尊奨之功也書王正以大一統存周之正朔也尊王人以抑諸侯存周官之等衰也王稱天以表無二尊别呉楚之僣擬也何以春秋名書春秋之意先説記事主記當時之事事有先後須顯有事之年表顯也首始也事繫日下年是事端故史之所記必先顯其年以為事之初始也年有四時不可徧舉四字以為書號故交錯互舉取春秋二字以為所記之名也春先於夏秋先於冬舉先可以及後言春足以兼夏言秋足以見冬故舉二字以包四時也春秋二字是此書之總名雖舉春秋二字其實包冬夏四時之義正義辨杜氏之説為當春秋本錯舉以為所記之名也為賈氏之説則曰春為陽中萬物已生秋為隂中萬物已成有取於隂陽之中正也正義論之亦詳矣竊於杜氏有取焉蓋有説也墨子曰吾見百國春秋國語曰羊舌肹習於春秋左氏傳曰韓宣子適魯見魯春秋仲尼之前葢有春秋之名矣褒貶之法自仲尼始前此皆編年之書也曰編年安得不舉四時以為名哉此所以有取於杜氏之説也春秋不以日月為例史之所記日必係月月必係時春秋二百四十二年之間有日無月者十四有月無時者二或史文先闕而仲尼不改或仲尼偹文而後人脱故四時必具乃得成年桓十七年五月無夏昭十年十二月無冬二者皆有月而無時既得其月時則可知仲尼不應故闕其時獨書其月當時仲尼之後冩者脱漏其日不係於月或是史先闕文若僖二十八年冬下無月而有壬申丁丑計一時之間再有此日雖欲更正何以可知仲尼無以復知當是本文自闕不得不因其闕文使有日而無月如此之類蓋是史文先闕未必後人脱誤其時而不月月而不日者史官立文亦互有詳畧按經傳書日者凡六百八十一事自文公以上書日者二百四十九宣公以下亦俱六公書日者四百三十二計年數畧同而日數相背此則乆逺遺落不與近同且他國之告有詳有畧若告不以日魯史無由得其日而書之如是則當時之史亦不能使日月皆具當時已自不具仲尼從後脩之舊典參差日月不等仲尼安能盡得知其日月皆使齊同去其日月則或害事之先後備其日月則古史有所不載自然湏舊有日者因而詳之舊無日者因而畧之亦既有詳畧不可以為褒貶故春秋諸事皆不以日月為例其以日月為例者唯卿卒日食二事而已正義辨書事時日月之異春秋書事有時而不月者有月而不日者有時月日皆備者故公羊榖梁皆立以為例以示褒貶使後儒紛然是非交錯旁引曲援穿鑿多門乃曰某事當日不日畧之也某事不日而日謹之也殊不知朝覲㑹盟侵伐誠不可指日而期指日而畢故多書時天子諸侯之𦵏禮有七月有五月之差不可指日而㑹故多書月子生及君臣薨卒一定不易故多書日此自然之理也至如凡灾異不以日月著之厯日者月之不可遍舉其日也厯月者時之不可徧舉其月也厯時者必加自文為異若文公十二年書日自正月不雨至於秋七月之類是也亦皆隨事逺近大小而志之何定例褒貶之有哉又如桓公五年正月甲戌己丑陳侯鮑卒此甲戌之下别當有事亦舊史闕文也二𫝊乃云甲戌之日亡己丑之日死而得君子疑焉故以二日卒之若此之迂怪説者往往從之史氏秉筆臨文以日月為褒貶或不自决者衆矣大抵事有大小或可舉時或可舉月或可舉日不須膠柱爾若事有都失時月者於歳末總云是歳知時失月者時末總云是時知月失日者於月末總云是日此又先儒之通論為史之大法也史例五始非褒貶之要説公羊者云元者氣之始春者四時之始王者受命之始正月者政教之始公即位者一國之始春秋緯稱黄帝受圖有五始謂此五事也杜於左氏之義雖無此文而五始之理亦於杜無害此非左氏褒貶之要自是史官記事之體故晉宋諸史皆言元年春王正月帝即位是也正義春秋之言有三謂春秋有臨天下之言焉有臨一國之言焉有臨一家之言焉此三者皆以内外辭别之王者則以四海内辭言之即天王狩于河陽是也一國之言若晉侯卒于扈一家之言若毛伯來錫公命及劉卷卒之類是也榖梁春秋之諱有四謂為尊者諱恥成元年王師敗績于貿戎不言戎為天王諱言莫之敢敵也為賢者諱過若閔二年衛為狄所滅不言滅而言入者齊桓不能攘夷狄救中國故為之諱僖十七年滅項不言桓公為賢者諱桓公知項之可滅也而不知己之不可以滅項也桓有存亡繼絶之功故君子為之諱也為魯諱敗若桓十年齊衛鄭來戰于郎不言及荘二十八年臧孫辰告糴不言如僖二十二年及邾人戰于井陘不言及文十一年叔孫得臣敗狄于鹹不言獲為同姓諱滅成九年晉欒書帥師伐鄭不言戰者欒書以鄭伯伐鄭君臣無戰道也鄭兄弟之國而君臣交兵疾莫大焉故為之諱榖梁辨諱者所以深責公榖言春秋為賢者諱歐陽子言春秋責偹賢者公榖之説得其文歐陽子之説得其意諸侯之賢莫如威文攘夷尊周室九合諸侯一正天下出定襄王入務利民此其賢之大畧也謂之諱者則有矣自荘之三十年齊人降鄣公羊傳曰取而言降為桓公諱也僖之元年齊師宋師救邢公羊傳曰不書狄滅為桓公諱也榖梁傳曰不言齊侯以其不足揚救不及事也十七年夏滅項二𫝊皆曰孰滅之不言齊為桓公諱也春秋為賢者諱君子善善樂其終也僖之二十八年晉侯㑹諸侯盟于踐土天王實在焉經不言之二𫝊皆曰諱㑹天王也不與致天子也冬諸侯復㑹於温天王狩於河陽二𫝊又曰諱㑹天王不與再致天子也左氏亦云以臣召君不可以訓故書曰天王狩于河陽言非其地也且明徳也諱則詳矣責安在焉以此知為之諱者乃所以深責之也辨春秋之諱有公論昔吾夫子作春秋之書蓋用法之至嚴也然説者謂春秋為尊者諱為親者諱信斯言也是春秋無公論也昭公娶於呉失禮之大者而夫子則曰知禮及其卒也書曰孟子卒葉公之黨有直躬者其父攘羊而子證之而夫子則曰吾黨之直者異於是父為子隱子為父隱直在其中矣信斯言也是春秋雖有諱未為無公論也嘗讀春秋至於鄭之君河陽之狩見其為天王諱滅項不書盟處父不書見其為魯公諱是孔子作春秋猶有諱也况夫後世作史雖曰秉直筆之權至於品藻去取豈能盡如公論哉春秋書有異辭公羊謂所見異辭所聞異辭所𫝊聞異辭所見謂昭定哀已與父時事所聞謂文宣成襄王父時事所𫝊謂隱桓荘閔僖髙祖曽祖時事思已與父之臣尤深大夫卒有罪無罪皆日録之丙申季孫意如是也王父之臣恩少殺大夫卒無罪者日録有罪者不日畧之叔孫得臣是也髙曽之臣恩淺大夫卒有罪無罪皆不日畧之公子益師無駭是也所𫝊之世見治起於衰亂之中用心尚麄故内中國而外諸夏先詳内而後治外録大畧小内小惡書外小惡不書大國止大夫小國畧稱人内離㑹書外離㑹不書是也所聞之世見治升平内諸夏而外夷狄外離㑹小國有大夫是也所見之世著治太平夷狄進王於爵天子逺近小大若一用心尤詳故宗仁義幾二名是也益師卒以臣見思㑹于稷以君見思所見臣子思其君父尤厚故多微辭是也所聞之世思王父少殺煬宫不日武宫日是也所𫝊之世思髙祖又少殺子赤不日子般日是也記事必具四時史之記事一月無事不空舉月一時無事必空舉時者葢以四時不具不成為嵗故時雖無事必虚録首月其或不録皆是史之闕文隱六年空書秋七月注云雖無事而書首月具四時以成嵗桓四年不書秋冬注云國史之記必書年以集此公之事書首時以成此年之嵗故春秋有空時而無事者今不書秋冬首月史闕文是其説也正義無事必書首月春秋之例竟時無事乃書首月以記時此下三月有㑹盟之事則不得空書首月也正月無事而空書首月者以人君於始年初月必朝廟告朔因即人君之位以繼臣子之心故君之始年必書曰元年春王正月公即位史䇿之正法也正義元年春王正月何休云公即位者一國之始政莫大於正始故春秋以元之氣正天之端以天之端正王之政以王之政正諸侯之即位以諸侯之即位正境内之治諸侯不上奉王之政則不得即位故先言正月而後言即位政不由王出則不得為政故先言王而後言正月王者不承天以制號令則無法故先言春而後言王天不正其元則不能成其化故先言元而後言春並正義辨春秋本用周正春秋之作紀年必書春王正月所以尊周也故公羊曰正月者何周正月也而杜預亦曰所用之厯即周正也然周正建子在夏正為十一月而謂之春故後世或以為用夏正而不知先王建正因時之春秋為嵗首理不可易也謹按經書十月隕霜殺菽釋者曰今八月也使為今十月則隕霜不必書也經書秋水大無麥苗釋者曰今五月也使為今之秋不復有麥苗也書冬十月雨雪使今之十月則雨雪不為灾書正月無氷使今之正月則無氷不為異即是而言則孔子之用周正審矣春秋何以異於史或曰春秋之異於史也奈何曰史以官春秋以匹夫史以國春秋以天下曰春秋曷以匹夫及天下曰小人之惡幸而逃於刑不能逃於史幸而逃於國之史不能逃於天下之春秋然則惡果不可葢作者其庶有忌乎此聖人之術葢至是也窮故曰春秋天子之事知我者其惟春秋乎不察聖人之心則匹夫而専天子之事春秋固僭也焉得而無罪春秋何以不書征陳曰春秋上下二百年間未嘗一書征者以諸侯之侵伐皆非奉王命以敵所愾但相為强弱以構禍亂非上之所以伐下罔有敵于我師者也然則陳人蔡人從王伐鄭亦上之伐下不謂之征何也曰征之為言正也伐鄭之事出於交惡而已豈所謂正乎春秋褒貶之異林曰諸儒之説春秋有以為以一字為褒貶者有以為有貶無褒者有以為褒貶俱無者其説孰是曰皆是也謂春秋以一字為褒貶者意在於推尊聖人其説出於太史公太史公曰夫子脩春秋游夏之徒不能贊一辭故學者因而得是説也謂春秋有貶無褒者意在於罪列國之君臣也其説出於孟子孟子曰春秋無義戰彼善於此則有之矣故學者因而得是説也謂春秋無褒貶者意在於矯漢儒其説本於竹書紀年所載鄭棄其師齊人殱于遂之事皆孔子未修之前故學者因而得其説也雖各有所本然亦不可泥泥於一字褒貶之説則是春秋字字皆挾劒㦸風霜聖人之意不如是之勞煩也泥於有貶無褒之説則是春秋乃司空城旦之書聖人之意不如是之慘也泥於無褒貶之説則是春秋𤨏語小説聖人又未嘗無故而作經也葢春秋之舉當先求聖人作經之文然後褒貶之㫖畧得而言之矣春秋辭有隱直或曰春秋懼惡之書也賤者之叛不書雖弑君不名季氏用八佾大變也不書陽虎季孫稔禍也不書聖人不赦於其顯而諱於其微也何故曰隱之也聖人嘗曰天下無道禮樂征伐自諸侯出天下有道政不在大夫天下有道則庶人不議當是時天子之權凡移於諸侯者皆歸於大夫矣聖人於諸侯曰天下無道自諸侯出直辭也於大夫曰不在大夫隱辭也嗚呼諸侯猶近也大夫微矣聖人不忍大其微也大夫猶近也降是益微也故夫春秋之僣積而至大夫大夫之僣積而至陪臣陪臣之積吾未知其所終也矣春秋所書有喜怒春秋二百四十二年之間天下是非雜然而觸乎其心見惡而怒見善而喜則夫其是非之際又可以求諸其言於喜怒之間矣春秋之於仲孫湫之來曰齊仲孫來於季友之歸曰季子來歸此所謂喜之之言也於魯鄭之易田曰鄭伯以璧假許田於晉文之召王曰天王狩於河陽此所謂怒之之言也於叔牙之殺曰公子牙卒於慶父之奔曰公子慶父如齊此所謂怨之之言也夫喜之而和怒之而厲怨之而深此三者無以加矣至于公羊榖梁之𫝊則不然日月土地皆所以為訓也夫日月之不知土地之不詳何足以為喜而何足以為怒此喜怒之所不在也春秋書曰戎伐凡伯春秋書曰齊仲孫來而以為呉仲孫怒而至於變其國此又喜怒之所不及也東坡春秋書卜郊之别經書郊者九皆為有故而書非因卜不吉而廢郊則因牲死傷而廢郊又有待卜之吉而特郊者雖牛之死傷而必郊者因卜不吉而廢郊則若僖三十一年夏四月四卜郊不從乃免牲猶三望成十年夏四月五卜郊不從乃不郊襄公七年四月三卜郊不從乃免牲十一年夏四月四卜郊不從乃不郊是也因牲死傷而廢郊者則若宣三年正月郊牛之口傷改卜牛牛死乃不郊猶三望成七年正月鼷䑕食郊牛角改卜牛鼷䑕又食其角乃免牛夏五月不郊猶三望是也有不待卜之吉而特郊者則若成十七年九月辛丑用郊是也有牛雖死傷而必郊者則若定十五年正月鼷䑕食郊牛牛死改卜牛夏五月辛亥郊哀元年春正月鼷䑕食郊牛改卜牛夏四月辛巳郊是也辨先儒不明經㫖先儒之説不過罪其屢卜與其養牲不謹爾或曰禮不卜常祀而卜其牲日或曰三卜禮也四卜五卜非禮也今因不吉而廢郊是失禮也又據禮養牲必二一以祀上帝一以祀后稷帝牛有變則改卜稷牛以代之今以牛死傷而廢郊是又失禮也所以春秋書以示譏此皆非聖師之㫖不知聖人書郊乃惡其非禮之大者至屢卜之凟養牲之慢非春秋所責也春秋踰年即位林曰先儒皆以春秋君薨嗣子踰年即位為正非也不知聖人所書正以譏非禮且啓禍亂之門也在禮天子崩七日而殯既殯嗣子即位稱王以示天下之有主也諸侯薨五日而殯既殯嗣子即位稱公以示一國之有主也觀書顧命及康王之誥曰乙丑王崩齊侯以二干戈虎賁百人逆子釗南門之外延入王室恤宅宗癸酉王麻冕黼裳既尸天子大保畢公率四方諸侯執壤奠羣公既已聽命相揖遜而出王釋冕反喪此嗣君即位之常禮也夫成王方崩齊侯必迎元子釗入翼室居憂以為天下宗主及既殯遂麻冕衣裳稱王受冊命同瑁而即位矣既尸天子受諸侯之奠贄作誥報之君臣之分已定乃釋告吉之服行喪禮自乙丑至癸酉九月之間已行即位之禮斯周公之舊典夫子定書取之以存周制周公孔子豈不知君父方崩嗣子遽吉服即位改元為未可也葢以大位奸邪之窺名號不早正則窺伺奪嫡之禍作矣豈惟天子則然方周公薨喪未踰年伯禽興徐戎之伐稱公以興師葢諸侯亦然也迨至周衰此禮喪亂始有踰年即位之禮其未踰年也天子不稱王諸侯不稱公名之為子故平王以隱三年春三月崩至秋武氏子來求賻雖踰三時不稱天王使之以桓王未即位也襄王以文八年秋八月崩至明年春毛伯來求金雖踰年猶不稱天王之命以襄未𦵏嗣君未成君也昭二十二年景王崩于夏四月至冬十月王猛猶稱子則異乎康王嗣天子之禮也魯荘公薨於秋八月子般至冬十月而稱子文公薨於春二月子赤至冬十月而稱子襄公薨于夏四月子野至九月而稱子其他列國皆然僖九年春宋公御説卒其夏襄公稱子㑹于葵邱僖二十九年夏衛侯燬卒其冬成公稱子盟于洮如此之類異乎伯禽嗣諸侯之禮矣嗚呼一人之家不幸喪其主父不有家督以為之主則豪奴悍婢與其他人竊其私藏謀及田宅必矣矧大而一國又大而天下其可一日而無君方先君不幸踰年而後正嗣君之位豈可以絶覬覦之望塞禍亂之門耶所以尹氏得以立子朝而抗猛王室以危慶父得以立閔而殺般襄仲得以立宣而殺赤魯以大亂春秋之多變故蓋始於此也使從周公之典名位早定則不啓亂源也近世蘇氏讀書顧命康王之誥乃記漢儒記禮之説與春秋列國之制謂康王以嘉服見諸侯又受乗黄玉帛之幣為非禮且曰使周公在必不為此夫周公制禮成康之君召畢之臣相與守之以為常制豈有非周公之典成康召畢乃行之乎行之非禮夫子定書乃取之乎不知書之所以存顧命者正以見春秋之非爾葢蘇氏不究春秋之㫖故誤為之説也春秋書伐之例陳曰春秋書内伐十有五書外伐百三十有七伐我者二十有一與我伐者二十有九左氏以有鐘鼓曰伐公羊以精者曰伐榖梁以斬草木壞宫室曰伐趙啖以稱罪致討曰伐皆臆説也晉之春秋書盟之例陳曰觀春秋書内外諸侯盟六十有二書公與大夫盟十有一書大夫特盟外諸侯九書内大夫與外人盟七書外人盟六書來盟者五書莅盟四非譏其盟也譏其屢盟以覆信而已晉之春秋義例不一林曰春秋書當時之事有顯然易見者聖人欲使學者以理斷之則始直書其事焉公及邾儀父盟于蔑祭伯來之類是也有屢書而後見者欲使學者參而攷之則必始終其事焉宋人伐鄭圍長葛宋人取長葛之類是也有所譏貶而難言者欲使學者思而得之則必變文示意焉鄭伯克叚于鄢鄭伯以璧假許田之類是也春秋三𫝊之學春秋九十七部九百八十三卷春秋者魯史策書之名昔成周微弱典章淪廢魯以周公之故遺制尚存仲尼因其舊史裁而正之或婉而成章以存大順或直書其事以示首惡口授弟子左丘明恐失其真乃為之𫝊漢初有公羊榖梁鄒氏夾氏四家並行王莽之亂鄒氏無師夾氏亡初齊人期母子都𫝊公羊春秋授嬴公嬴公授孟卿孟卿授畦孟畦孟授嚴彭祖顔安樂後漢公羊有嚴氏顔氏之學與榖梁二家並立漢末何休又作公羊解説左氏漢初出於張蒼之家本無𫝊者文帝時梁太傅賈誼為訓詁授趙人貫公劉向子歆欲立於學諸儒莫應建武中韓歆請立而未行時陳元最明左傳上書訟之乃以李封為左氏􅀶士後羣儒蔽固者數廷爭之及封卒遂罷諸儒𫝊左氏者甚衆永平中能明左氏者擢髙第為講郎其後賈逵服䖍並為訓解至魏遂行於世晉杜預又為經傳集解榖梁范寗注公羊何休注左氏服䖍杜預注俱立國學然公羊榖梁但試讀文而不能通其義後學三傳通講而左氏唯𫝊服義至隋杜氏盛行服義及公羊榖梁浸微今無師説羣書考索續集卷十一
