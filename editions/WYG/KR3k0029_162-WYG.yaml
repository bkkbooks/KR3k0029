body:
  text: 羣書考索續集卷三十一宋章如愚編官制門宰輔天官乃冢宰之加官或問冢宰一官其屬六十顧未始有一事闗乎天者而冢宰謂之天官何也曰此加官也周省九官以為六卿之職又省六子以冠六卿之號以虛名而加實職而授之所以寵而尊之也古之大臣論道經邦以轉移人主之心術而釐正天下之萬事者皆寅亮燮理也皆對時育物撫五辰而熈庶績也和同天人之際使之無間然者雖聖人之能事而大臣實輔佐之其誰曰人事之非天理也加天官於冢宰之上其尊大臣也雖至其所以責大臣也葢深周制尚兼官或問自太宰至於下士其為官凡六十有三而為府者六為胥與吏者皆十有二而為徒者百有二十何也曰此皆兼官也專官行事則不足兼官行事則有餘矣葢自唐虞以來禹以司空而兼百揆羲和以二人而兼四岳乃舜二十二人之咨則四岳實一人兼之古者官不必備惟其人而已有其人則備無其人則兼是以周官之作實倣唐虞之制而官事不攝吾夫子所以深責管仲變先王之法也以三公言之召公為保周公為師而太傅無與焉二公實兼之也周公既没召公為保而太師大傅無有焉召公實兼之也不惟此也三公之下實有三少當時不見其人召公又兼之乃同召太保奭芮伯彤伯畢公衛公毛公是六卿之長召公又兼之葢一人之身兼總七職矣惟成王之季年芮伯彤伯衛侯實兼領司徒宗伯司冦之職其餘大抵皆兼官也其大者猶兼而况於百官羣有司乎故嘗以周禮考之二卿則公一人是三公兼鄉老也一鄉則卿一人是六卿兼鄉大夫也軍將皆命卿是六卿又兼六軍之將也甚者太公以太師而兼司盟之職載在盟府太師職之是也蘇公以三公而兼太史之職太史司冦蘇公是也故夫六官中以春夏秋冬為通率以多少相乘除大約一官凡五百人則六官凡三千人而其兼行權攝者意其必相半焉是以局分不必設府吏胥徒不别置而其數亦未嘗過濫也太宰兼行六卿之事或問六卿分職各率其屬太宰之職顧曰掌建邦之六典何也曰此太宰兼行六卿之事也自其分職而言之則太宰掌治典司徒掌教典宗伯掌禮典司馬掌政典司冦掌刑典司空掌事典各有攸司固若不同自太宰兼行六卿而言之則八典八法八則八柄八統九職九賦九式九貢九兩凡此十條皆經國之大綱政事之條目而散見於三百六十官之中太宰實舉其綱而撮其要焉葢唐虞三代建官之制職事分於下而權綱合於上非泛然而無統也四岳通内外之官羲和之長也羲和則實聽於四岳百揆宰相之職百官之長也九官則實聽於百揆百揆統九官四岳四岳統羲和四子比附聨絡天下之治雖一二人為之而實一二人能使之成周之制亦然三百六十屬聽命於六卿而六卿聽命於冢宰冢宰實三公兼之渙散分析之中而有比附聯屬之勢蓋古者三公無官惟與天子坐而論道故設六卿以分主六典而三公實統之三公既兼冢宰則六卿之六典非冢宰而誰建耶此事權之所以合於一而國家所以無多門之政自漢以來則失之矣有三公又有九卿而丞相御史未嘗行九卿事觀武帝時桑𢎞羊等致利王温舒之屬峻法兒寛等推文學九卿更迭用事事不闗决於丞相而大臣之權盡去矣嗚呼人君之為天下如欲稽古正名而使事權之合於一茍捨周官未有不蕩然無統者矣太宰兼統内庭先王之制事權欲合於一而内外之勢本不容於分也宫中府中俱為一體余嘗於冢宰屬官論之矣宫正宫伯雖曰掌王宫内宰俱曰掌王内統而臨之則惟太宰焉故宫正宫伯内宰皆𨽻於太宰而小宰之夫皆佐於太宰而兼掌其事職雖列於外而通於内權雖分於二而總於一王宫後宫無不任所掌也自其掌王宫也則兵衛郎衛凡宿衛之人皆領之飲膳衣服洒掃啓閉次舎幄帟凡供奉之人皆領之宫禁之秘藏王后世子之好用凡財用之私存皆領之其間多寡豐約用舍去取天子始不得以自私而小臣始不得以自便矣自其掌后宫也則六宫六寢無王内之限九嬪九御無女官之别詔其禮樂正其服御禁其竒衺稽其功緒其間損益増減採擇進御始有宴私玩狎之節而無侵竊惑移之患矣葢世未有家不齊而國可治者未有國不治而天下可平者太宰之治所以兼統内外而以小宰為始小宰之宫刑既已齊其家宰夫之朝法又已治其國然後太宰之邦典始可治天下矣道揆法守冢宰以佐王則有法守之意以聽治則有道揆之理夫惟有所守故八柄八統皆曰詔王夫惟有所揆故八法八則直曰以治而已責任一夫不獲阿衡曰時子之辜房𤣥齡曰夙夜盡心惟恐一物失所劉蕡曰擇將相以任之使權造化之柄百揆者言揆度百事使得其正也阿衡者言權衡萬物使得其平也冢宰者言調制百化使得其和也體統周公不能自為三百六十官之事而能用三百六十官之所長唐制列五房於政事堂而吏房居其首前輩著宰相論曰以一人為天下用則用天下而不足以天下人才為天下用則用天下而有餘故惟不以一能自名也而後能合衆人之所能周公相君比舜禹益伊尹傅説相君不同或問曰周公相成王制禮作樂一飯三吐哺一沐三握髮起以待士何汲汲也如此沐與飯且不暇舜相堯禹相舜益相禹伊尹相湯傅說相髙宗皆不如周公勤且勞也此周公之德不及舜禹益伊尹傅說乎曰周公不得不然也堯聖人也舜聖人也髙宗聖人也舜禹益伊尹傅說勤且勞復何為哉周公則不得不然也成王孺子也方在襁褓之中不知果為聖人耶茍成王不嗣墜廢其業則是后稷公劉王季文王武王之天下周公失之也周公豈得不勤且勞乎石守道文周公為相事事物物各得其所昔韓退之上宰相書其論周公也有曰當時天下之賢才皆已舉用奸邪讒佞欺負之徒皆已除去四海皆已無虞九夷八蠻在八荒之外皆已賔貢天災地變昆蟲草木之妖皆已寖息天下之所謂禮樂刑政教化之具皆已修理風俗皆已敦厚動植之物風雨霜露之所沾被者皆已得宜休徴嘉瑞麟鳳龜龍之屬皆已備至夫以周公為宰相近而朝廷治逺而天下和又逺而四夷服以至肖翹喘息昆蟲草木之各遂其生者無非周公職業之所在則宰相不可以一官一職論者即周公見之矣陳伯厚唐史斷漢三公名不定漢官因於秦舊視古舛駁而三公之名尤為甚焉初以丞相御史大夫太尉為三公其名雖均而其權實差武帝罷太尉而置大司馬成帝改御史大夫而置大司空未幾而復罷大司空而置御史大夫哀帝又改丞相為大司徒改御史大夫為大司空而司馬之職終於漢世不改方漢之初丞相之權最尊太尉特佐其職而已籍福說田蚡曰魏其為相將軍必為太尉太尉相尊等耳至是太尉之權始無異於丞相也故事御史大夫奏事㑹庭中差居丞相後不當與丞相鈞禮蕭望之為御史大夫乃不禮於丞相丙吉至是御史大夫之權始不下於丞相也惟宣帝能加禮丞相稍抑御史大夫而不使之抗尊武帝竊假大司馬之權而不任宰相故終漢之世大司馬專秉國柄丞相具位奉行文書而已夫司馬古之六卿掌兵者也自漢以太尉改置而兵柄不移致使其權在丞相上以貽後日僭竊之禍其來逺矣故古之三公一失而為秦之左右丞相再失而為漢之丞相太尉御史大夫三失而為東漢之尚書令僕四失而為魏晉之中書令監五失而為後魏之門下侍郎六失而為隋之三省七失而為唐之樞宻院葢至於今而樞宻與丞相並稱謂之東西二府不惟失其名而併與其實而失之矣子故因漢而詳言之權有所分用儒不得其真自漢武帝以公孫𢎞為丞相而後儒者相繼秉軸宜其賢於漢初軍功刀筆矣然等功課效未聞其逺過於前何也葢武帝本不識儒徒誘於虛名而取其易制者為之既任以相乃侍中出入禁闥辯論數詘大臣以侵侮外廷之權九卿更進用事而天下之務不闗决於宰相即位以來亟辭亟罷而五十四年之間凡易相者十有三人且彼固不足以任相位又奪其權而責之事安望其有盡職者哉宣帝抑御史之權似知尊禮丞相然六百石以上更不選於丞相而調於尚書宦官久典機要天下之事一切歸之中書成帝雖罷中書而復置尚書自丞相以下皆聽命焉然則漢之宰相亦焉用彼為哉史臣不䆒其故以為元帝專用儒生委之以政貢薛韋康迭為宰相使上牽於文義而孝宣之業於是乎衰嗚呼此豈儒者之過哉用儒而得其真與夫權有所分而不得其職者之過也以武帝之用儒擇其賢而責成功則漢之為漢不止於此矣宰相當通知錢穀人皆謂錢穀之問不當至廟堂論道經邦之任不知司農少府廷尉列在九卿三公總九卿漢制然也平之不知忝職多矣借曰道揆法守不相紊亂獨不知周官太宰貨賂則歲終計出入議獄則三公㑹其數乎文帝非徒問也末年紅腐朽索之效幾致刑措之風皆基於此陳季雅漢相失權始於陶青大事記曰自嘉之死漢相之權遂奪矣御史大夫雖副貳丞相之官今晁錯為之陶青特充位而已體統不正葢自此始武帝任九卿輕宰相夫丞相九卿皆天子大臣所論議相與出治者也九卿贊宰相以謀國宰相輔天子以出治此古今不易之道也夫今之九卿固他日宰相也豈為宰相不可盡信而為九卿時可盡信耶蓋朝廷重宰相是重朝廷也若使九卿更進用事各行其志以與宰相爭權則朝廷紛紛何時定乎又皆言漢相權輕自大司馬領尚書事始自武帝以來宰相建空名於百官之上其輕久矣葢非特石慶淳謹故至此也張湯用事時語國家用度常至日晏丞相充位則固已分宰相之權矣為宰相大事不得與聞坐小事輒誅死豈不大可恨也哉光武以吏事責三公而有大災異三公策免待之以簿書期㑹小吏之職而責之以隂陽天地大臣之事是何異淳于髠豚肩巵酒之喻耶戴溪史義漢曹參為相不當拒人之言宰相之任重矣居是任者必欲得天下之士來天下之言俯而從之惟恐失故也愚嘗觀漢史文怪曹參最為賢相號為一代宗臣宜其宰相之任當有握髪吐哺之禮覩其代蕭何為相日夜酣飲卿大夫以下吏及賔客欲有所言輒飲以醇酒莫敢開說嗟乎曹參何為者而敢拒人之言哉又况祀兹酒文王所以誥庶邦也無彛酒文王所以教小子也參之所謂飲酒者果何謂耶繼而卿大夫日夜飲吏民無他故亦日夜飲而參之罪孰甚焉若曰舉事無所變更一遵何之約束則孝惠朝可謂多事矣后族驕蹇已有萌蘖豈無一事而可言耶當時卿大夫欲有諫者未必不引此為戒而參輒拒之卒於吕氏盗權而禍亂之興幾不救藥實參有以啓之也師古曹參當相吕后問蕭相國既死誰可代之上曰曹參可及何病惠帝臨視曰誰可代君者對曰知臣莫若君帝曰曹參何如曰帝得之矣及何之薨也曹參告舎人趣治行吾將入相髙帝以參為可相惠帝亦以參為可相蕭何又以參為可相而參亦自知其為當相以是而相之天下豈有不服林少穎漢史論斷漢止一相漢初止有一相相國何死參代之惠帝末年始用王陵陳平為左右相武帝用劉屈氂為左相分官屬為兩府虛其右以待四方之選然終漢世止一相也陳彦羣博議漢相優劣且以西漢公輔言之蕭曹以清靜致治功良平以謨明贊王業至宣帝時則魏相通故事丙吉知大體斯皆章章可言者也及夫張蒼之律厯公孫𢎞之文章韋賢之好學平當之有恥然以號為賢相抑又次焉至若匡張孔馬服儒衣冠被阿䛕之譏不勝其任最下則陶青劉舍莊翟趙周之徒皆齪齪備位故身名偕泯夫此數子者豈不粗知君子之道古今之變哉病於無所發明保持祿位而已權德輿賀崔相國啓漢相失職自陳平始陳丞相不對錢穀决獄論者謂其得宰相體吾謂漢宰相之失職葢自平始也夫錢穀之出入國用之本也决獄之多寡民命之所係也宰相不與聞焉而顧使天子責之廷尉與治粟内史則凡九卿中二千石宰相皆不與知矣陳彦羣博議漢初宰相御史大夫尤親密漢初政權出於一兩府於人主最親宻故御史大夫周昌以事入奏見帝擁戚姬酈食其為左相監宫中如郎中如郎中令公卿百官皆因奏事至公孫𢎞亦數窶見上或不冠雖非所以禮貌大臣亦見其相親矣同前漢初相猶有權其後備位申屠嘉為相欲斬鄧通田蚡請按灌夫武帝曰此丞相事何請於時相猶有權也自霍光為大將軍領尚書事至丞相位在將軍上備位而已陳彦羣博議漢初御史大夫無覬覦為相之心漢初宰相皆以積功封侯及久次者為之若其他才地有餘而功資未足以封侯者則得為御史大夫而不得為相周昌趙堯是也文景武帝初年皆然葢宰相當以勲舊者為之不可以茍得耳是以御史大夫甘心守職而不敢有踰次之心草茅公孫𢎞為相不聞閥閲功勞一朝拜相而封侯之爵隨之後以為例是以當時凡位至御史大夫不求所以副宰相皆有覬覦代位之心是以武帝之世宰相多禍少全同上漢世宰相權輕武帝以中大夫侍中而謂丞相為外朝而内廷之事宰相不與知矣自九卿更進用事事不闗决於丞相也而外廷之事宰相不預知矣自其以吏六百石以上調於尚書也而天下之事宰相皆不與知矣同上漢相權輕已久人皆言漢相權輕自大司馬領尚書事始自武帝以來宰相建空名於百官之上其輕久矣葢非特石慶醇謹故至此也張湯用事時語國家用度常至日晏丞相充位則固已分宰相之權矣為宰相大事不得與聞坐小事輒誅死豈不大可恨也哉戴氏筆議漢武帝之始君弱相强其後君强相弱方武帝即位之始富於春秋武安侯田蚡以肺腑為丞相權移主上上滋不平特以太后之故隱忍而不發當此之時臣强君弱隂勝而僭陽武安侯既死上懲其事盡收威柄於掌握之中大臣取充位而已稍不如意則痛法以繩之自丞相以下皆惶恐救過而不暇當此之時君强臣弱陽勝而偪隂夫豪傑之士類多自重莫肯少殺其鋒鄙人則惟恐失之無所不至矣石慶為相時九卿更進用事不闗决於慶慶醇謹而已嗚呼此其所以見容於武帝歟秦少㳺漢初相權甚重其後相權甚卑自髙祖以蕭曹㠪陵陳平周勃屬吕后以為相之後則宰相之任得有所專而其權甚重若申屠嘉為相欲斬鄧通而劾晁錯文帝既莫之罪方且遣使以謝之當此之時天下之望宰相也為甚尊及魏其武安之後則宰相之任不敢有專而其權益輕若武帝之時九卿更進用事而李蔡嚴青翟趙周石慶公孫賀劉屈氂之徒名曰宰相而齪齪自守於不得已而任之當此之時天下之視宰相也為甚卑林少穎丙吉為相政治未善而求隂陽和丙吉為丞相出逢羣盜格鬭死傷横道過之不問見牛喘而問之以為詰禁盜賊守令之事隂陽不調此乃宰相職耳談者美之愚竊以為不然夫宰相所以治隂陽者豈拱手端居無所施設而隂陽自調葢亦佐人主治庶政安四海使和氣洋洋薄於宇宙旁暢周達浸潤滲漉明則百姓洽隂則鬼神諧然後寒暑時至萬物阜安丙吉為政之時政治之不得刑罰之失中不肖之未去忠賢之未進可勝紀哉釋此不慮而慮於牛喘以求隂陽和豈不疎哉温公丙吉為相不為憂邊思職邊鄙之事宰相之所宜知者也將帥之能否儲峙之虛實山川之險易士馬之强弱宜皆曉然於吾之胸中一旦有警則指授於中而取勝於外今也不然平日邊事漫不加省一旦邊吏以赤白囊至乃信一馭吏之言倉卒之間召東曹按録粗記一二以備應對卒使已受憂邊之名而御史大夫等皆得譴責吉方以得士自誇則吾之所為將誰欺乎宋藻漢宣中興之功當始於霍光不在於丙魏史臣之論名相不取其立功之時而取其收功之際斯亦失矣觀其言髙祖開基蕭曹為冠孝宣中興丙魏有聲夫蕭曹起豐沛之間從髙祖誅秦項二人之立功名居多及定天下俱為相國而曰髙祖開基蕭曹為冠宜矣若夫孝宣中興起自藩邸俱由霍光之力其廢昌邑於談笑之間上玉璽於危疑之際在朝駭愕而將軍優為之此漢之伊尹也然則立中興之功葢自發端於霍光而丙吉魏相乃於廢立既定之後坐收功於一時專以遵祖宗故事與夫寛厚持重取名語其定國家安社稷固不及光矣漢世宰相名之不正武帝命霍光以周公之事此宰相之職也當是時田千秋方處相位帝既不以委之千秋而委之光則宰相之名移之於光可也今也千秋為相自若而光以大將軍輔政則宰相之名不正矣自是而後宰相之名廢置惟光之意而國之大事相無預焉燕蓋之敗桑𢎞羊之子遷與史呉繫獄丞相千秋召中二千石博士㑹議問法此其職也而光以擅召為千秋之罪則宰相之職復曠矣由其名之不正以致其職之曠故昌邑之廢楊敞為相而不得預其謀至於聞議驚懼不知所言汗出浹背唯唯而已葢霍光有宰相之實而無其名楊敞有宰相之名而無其實名之不正於斯時未見其害其後成帝之世張禹為相而輔政專權乃在王鳳平帝之世孔光為相而政之所委乃在王莽卒之擅移漢祚以成海内之禍其源乃在於名之不正林少潁通鑑論斷光武不任大臣政歸房闥天下權柄必有所歸人主聰明必有所寄只合委大臣使百官各得其職又况西都吕霍上官王氏皆是權戚不是大臣托孤之際不免政歸房闥捨宦官外戚孰得親近唐仲友漢尚書權重凡前漢為三公者惟丞相御史二府不帶尚書事其太尉及他官則帶尚書事矣太尉復改大司馬大將軍後漢既以司徒比丞相司空比御史大夫而猶與太尉參錄尚書事為稱凡録尚書事方得預國政則尚書之權任可見雖置三公事歸臺閣之驗見於此矣凡領尚書事得秉政權猶帶加官得親近入禁中也故田千秋桑𢎞羊與霍光同受詔輔幼主而不得與尚書事者亦以不領尚書事故也或云懲上官桀爭權之患故光獨領之自領尚書之名起於霍光則事歸臺閣不特東漢為然觀張安世以大司馬領尚書事每定大政議已定乃陽使吏問丞相府則是丞相府不過奉行尚書之議論予决爾宰相權輕九卿權重漢初猶近古髙祖之制御史大夫下相國相國下諸侯王御史大夫之副事下御史御史白之丞相丞相得以可否之御史中執法下郡守中執法即中丞也中丞居殿中受事雖與人主親近權尊勢重然亦是御史大夫之屬事下中丞中丞白之大夫大夫亦得以可否之於是下之郡守下之侯王葢尊者行其尊卑者行其卑也及御史大夫抗丞相之權對立而為兩府郡國事不上丞相而上御史御史得以意平章之而武帝之世又急於功利多率意施行不經丞相是故張湯為御史大夫數行丞相事造白金皮幣而李蔡嚴翟不與議兒寛為御史大夫九卿更進用事徙流民四十萬於邊而石慶又不與議大臣既不與大事則賤臣得以輕柄臣自是之後内廷之事丞相不得聞知而歸之侍中外廷之事不得闗决而歸之九卿郡國上計調吏之事丞相不得與聞而自達於天子調於尚書大臣之無權小臣之横乃至於此葢自陳平自棄其權而武帝又削其權權既分裂四出而貪權者欲集之而歸已至使簿書期㑹之𤨏屑以其身冒而為之於是上多事而下為欺矣太尉廢置不常按百官表髙帝時盧綰為太尉止一年而省絳侯周勃為太尉亦一年而省惠帝六年勃復為太尉凡十年而為丞相文帝元年將軍灌嬰為太尉二年而省景帝二年周亞夫破七國歸復還太尉亞夫傳又云吳楚反亞夫以中尉為太尉東擊吳楚至五年而復省之武帝以來或置或省終無定制羣書考索續集卷三十一
