body:
  text: 羣書考索後集卷四十九宋章如愚編兵門漢邊兵漢世邊戍之兵掌之無定官髙祖陳豨以代相監趙代邊兵傅寛為代相國將屯張蒼為代相國備邊冦本傳髙祖時武帝時李廣本傳程不識俱以邊郡太守將屯趙充國昭帝時以中郎將屯上谷此掌之無定官也吕祖謙大事記吕后五年始令戍卒嵗更文帝十三年除戍卒令及武帝中世乃詔減隴西上郡戍卒之半而宣帝時盖寛饒為司𨽻子自行戍北邊何邪攷韓安國傳安國與王恢議擊匈奴曰陛下復遣子弟乗邊守塞觀此則戍卒之復其殆武帝之時乎盖漢鴈門雲中以備北狄隴西諸郡以備西羗巴蜀諸郡以備西南夷遼東燕齊諸郡以備朝鮮㑹稽諸郡以備南越此漢邊備之大畧也及詳攷之邊郡增置長史掌兵馬則異於他郡吏任事者得賜武庫兵則異於他吏都尉司馬不治民則異於他職其於邊吏如此其優也有事則廷臣集議上奏則不日報可充國傳事其於邊事如此其急也大司農調給費用或續以少府或令入粟於邊而受錢都内武帝通西南夷租賦不足乃募豪民西南夷入粟縣官而受錢都内見食貨志其於邊費如此其備也太守將萬騎行塞兵庫則專置令官三十六苑分布西北有失亡則廷尉史按驗亭徼不治則太守伏誅於以見其嚴邊備也民徙邊者則予冬夏衣晁錯論邊備廪屯田則予犁牛昭元鳳三年詔應劭注止胡人所驅則予其半錯論邊備於以見其厚邊民也從軍五尺以上賈誼封事曰今西北二邊之郡五尺以上不得輕息戍卒一歲而一更晁錯曰今逺方之卒守塞一歲而更此又邊兵之大畧也以至北邊諸郡特藏兵器成紀建興元年如淳注西北二邊分養苑馬漢儀注内郡有守有丞而已邊吏又有長史以掌兵内郡郡縣有令丞而已邊郡則又置障塞尉後百官志内郡則太守都試而已邊郡則又將萬騎行障塞而駕御邊吏鎭撫邊民每加委曲丞相東曹實掌邊吏之𤨏丙吉傳或有邊冦則按視邊𤨏而科條長吏每除邊吏則五府舉人以充之西域都䕶缺則簽舉段㑹宗䕶羗校尉缺則簽舉辛湯邊戍正卒一歲則更邊吏則三歲而更其有任事者則取古者賜斧鉞之義而予之武庫之兵器毋將隆傳隆奏至於徙邊之民廪食給衣食貨志北邊騎士軺車不筭邊民被害飢寒相失則天下共給其費蕭望之傳而六郡良家子則選以為郎以給羽林期門之選以為邊人榮大氐漢世之經理邊郡詳矣葢西漢備禦西邊以為三輔捍蔽其法最宻與内郡不同葢自周衰而西方廹近戎狄民習戰備髙上氣力漢因其俗取六郡之内騎射異等者謂之良家子補以為羽林期門名將之選由此出使其俗相欣慕葢有以鞍馬騎射為官而登將相者太僕所掌牧師諸苑三十六所養馬三十六萬四分置河西六郡屯田殖榖有農都尉以領之宜禾效榖取之以為官名邑號一郡所積不下百餘萬斛榖内尉雖廣止置一尉而西邊都尉増置特多又有兵吏以佐守掌兵馬胡騎伉徤則又有属國都尉以領之東漢之興專意文治公卿大夫徃徃鄙棄勇力是時西邊之備虚矣問其牧馬則漢陽一苑之外餘郡無有也里有牧師苑皆令官主養管分在河西六郡界中中興皆省惟漢陽有流馬苑但以羽林郎監領問其屯兵則平原度遼一營之外餘郡無有也兵馬一職無長史農田之職無都護酒醴之㑹不通於上下而民始踈於内郡公府辟召皆尚文行而西周豪傑不取也羽林期門不以黄門鼓吹選補則入錢榖者即得之而叚紀明皇甫規之徒乃以文學之䇿選於是可見故曰明帝罷緣邊屯兵之後永平元年以野無風塵而罷北胡有變則置度遼營明帝永平八年用鄭衆之言置南蠻有變則置上林兵和帝紀十四年置羗犯三輔則置長安雍二尉安帝永初四年置鮮卑為冦則置漁陽營安帝建初元年置其後盗賊浸作緣邊緣海稍稍増兵順帝泰定元年緣邊増歩兵陽嘉元年増沿海屯兵而扶風漢陽三百塢順帝紀永和五年令扶風等築隴道塢三百所置屯兵魏郡常山六百塢皆置屯長西羗傳詔魏郡趙國常山中山繕作塢堠六百十六所而西園八校乃以小黄門統之其事無足言矣漢兵將天下之患莫大於兵無事而聚食將有權而專兵先王必於其所自出者深為之思曲為之備設鄉遂井田之制以寓兵設比閭族黨之官以寓將於四時之隙命有司講武而教民以鼓鼙鐃鐲之節諸侯卿大夫朝聘燕享從容歡欣之際而猶不忘弓矢之事故方其有事則取兵於農以執干戈取將於士大夫以典軍旅事已則將還其職以治民兵散於野而力耕是以兵無聚食之費將無專兵之虞此其綱紀大意之所在者而見於節目之間則征行者限其數調發者從其方備邊防者甚嚴制畿兵者甚衆其别又有四焉且通籍於司徒者若彼其衆征於司馬者不能什一是限其數也而未嘗悉民以為兵伐楚以荆伐淮以江漢是從其方也而未嘗調民以戍逺薇作而征雨雪而歸是邊防不以無事而暫止葢恐其一旦有倉卒之變元戎啟行不過十乗是畿兵不以有故而輕出葢恐其内外有輕重之患此先王之深意寓諸節目者又如此求其綱維而循其節目類皆無有隙之可議此其所以經久而無後患而為先王之制歟自周衰一變而為齊之内政再變而為晉之爰田先王之制其綱維節目掃地盡矣漢興吾殆有望於復古者抑嘗深考其制則夫紀綱所在吾固以先王之遺意尚存而猶有不滿於吾心者亦以其節目之不詳而一代良法未能無累也何以言之民年二十則傅於籍而嵗及立秋則嚴兵法之𨽻公卿子弟執㦸以備宿衛而博士郎中皆課之射當是時民與士大夫有不閑軍旅者或為卒更或為踐更或為過更民皆已練之兵或取之於大農或取之於宗正或取於太僕而士大夫皆可命之將以是觀之大抵漢制之善者在於兵不常聚而將無常員故將官騎士布滿郡國有事檄召否則罷歸衛霍勲大績重身奉朝請兵皆散去夫是以終漢之世上無叛將下無驕兵彼其綱紀大體猶有先王之遺意吾於漢亦何敢議若乃以軍擊冦預郡國材官之數者發之可也奈何吏無告敕父母有市籍彼獨無名而一切征行甚而列侯封君吏二千石皆有所不免是悉用以為兵也得無困於征行之憂乎戍邊備冦如上郡北地隴西之兵調之可也奈何淮南之於漢汝南之於金城相去幾何里而一切調發而其東方之卒亦所不免是驅民以戍逺也得無困於調發之勞乎時平若不可以弛備矣而赤白囊一至始科𤨏邊吏倉卒必有不可用者何以為外防之道戍卒若可實邊矣而中尉北軍亦出擊胡王旅將無鎭衛之職何以為内重之權漢之節目不謹者吾葢於此而見之嗚呼漢去古未逺有意於先王之制則既正綱維之本而復察於節目之間以無聚食之兵無握兵之將而又征行者限其數調發者從其方備邊防者甚嚴制畿兵者甚重則漢之兵制非漢之兵制三代之兵制也夫惟綱維僅立而其節目見於數者大率踈畧而不加意是以漢之兵制雖少近古而卒不能遂如古也以此觀之古今之兵制大抵欲詳宻而不宜踈畧也方其盛時京師有南北二軍之屯諸陵有六國豪傑之徒而其根本既强郡國有都尉掌兵邊郡復立長史而其法制甚備加以御兵之制簡肅精明六級之差而雲中之賞不行七日之速而金城之奏已報輪䑓之功敗亡不掩衛霍行封得䘮相除而無壅蔽之欺雖其節目之不周而大體既正又得是數者維持之故未見其弊自中興以來而兵制浸失都試之法不可罷者罷之三校尉之官不可廢者廢之葢至於郡兵不練而專倚南北二軍以集事是兵非曩時比也士大夫不閑武事至引邊將以入朝是將非曩時比也漢家之初不詳於節目纎悉而今也又并與其綱維大體者一切廢去烏得而不衰漢唐邊備形勢兵旅軍食將帥漢之邊備莫善於西漢自東漢以來則不可以言備矣唐之邊備莫善於唐初自天寳以來則不可以言備矣西漢之時鴈門雲中以備北狄隴西諸郡以備西羗巴蜀諸郡以備西南夷㑹稽諸郡以備南越此邊備之形勢如此也丞相之子均調戍邊司𨽻之子親行戍邊太守將行塞將兵萬騎三十六苑分置焉此備邊之兵旅如此也屯田殖榖有農都尉以領之一郡所積不下百餘萬斛入粟塞下糴榖湟中此邊備之糧食如此也陳豨以爲代相監趙代邊兵張蒼以代相國備邊寇李廣程不識俱以邊郡太守將屯此備邊之將如此也至於東都中興之後緣邊屯兵惟存度遼一營餘悉罷去視西漢形勢之備為如何罷車騎材官即郡兵已虚罷都試法即兵不習戰邊郡亭候吏卒悉從減省視西漢兵旅之偹為如何農之職不置都䕶而邊計無可儲之積鄧隲任尚發兵㑹衆則至於借俸侯王其視西漢兵食之備為如何自隴蜀既平之後絕不言兵公府辟召皆尚文行而西州豪傑不與也叚紀明皇甫規乃文學進士大夫不閑武士其視西都將帥之備為如何故曰漢之邊備莫善於西都自東漢以後不可以言備矣有唐之初邊要地皆置總管寧朔要地或置大使以䕶突厥單于瀚海置都䕶府以禦北邊此其備邊之形勢如此也邊戍之軍軍城守捉總之於道戍邊之兵三年一代三時耕稼一時習武此其備邊之兵旅如此也太原屯田始於竇静太宗之時増屯并州足省餽運此其備邊之糧食如此也李世勣都督并州而邊塵不警太宗謂其賢於長城此其備邊之將如此也自開元天寳以來諸道節度盡用胡人精兵咸聚北邊而天下之勢偏重則其形勢視唐初如何也折衝諸府無可交之兵而戍卒更代多不以時故杜子美一從十五北防河便至四十西營田則其兵旅之備視唐初如何也兵卒驕恣或逐主帥徳宗之時以邊兵𨽻神䇿由是塞上稱神䇿行營皆統於中人則其將帥視唐初又如何也唐初三邊之兵止於十萬自李林甫導人主以邊功而三邊之師蓋四十九萬衣糧之給以私勞費其後陸䞇言備邊六失以為財匱於兵衆則其糧食視唐初如何故曰唐之邊備莫善於唐初自天寳以來則不可以言備矣惟我藝祖皇帝用李漢初屯闗南以捍北敵郭進振西山以禦太原姚内斌守慶州以備西戎此所以為備邊之形勢也開寳之初制更戍之令使熟知邊塞之制或三年一更或閱講武殿所以為備邊之軍旅也何繼筠屯棣州二十餘年董遵誨屯通逺軍四十年其餘皆不減十年邊障頼之所以為備邊之將帥也西北二邊軍市之租多賜諸將不問出入徃徃賞賚又輙千萬是又備邊之軍食也蓋形勢張則可以固中國之勢兵旅振則可以壯中國之威有軍食則緩急無轉餉之勞有將帥則戎卒皆可用之士備邊之䇿莫先於此矣宋何承天備邊之對大要欲田淮泗以實青徐築城邑以壯形勢計丁役以給鎧仗堅壁以俟其來整甲以乗其弊周王朴上開邊䇿亦謂羣材既集政事既成財用既充士民旣附然後舉而用之則有必取之勢愚敢以爲獻雖然形勢也兵旅也軍食也將帥也是四者固邊備之不可缺者然得其人則形勢不患其不强軍食不患其不足兵旅不患其不振茍無其人徒𤨏𤨏於是數者之間事愈不可具舉矣昔先零諸羗嘗為漢患而漢之所以為備者惟一充國耳今以其傳攷之馳至金城以圖上方畧四望陿中而知敵之不能守則形勢之强愚知其在漢而不在羗矣以淮陽汝南之歩兵分屯要害條上便宜十二事以省運輸則兵旅之強軍食之豐愚知其在漢而不在羗矣其後先零諸羗稽首請命金城属國以處降羗是漢之邊備得一充國而有餘吐蕃蠻夷常為唐患而唐之所以為備者一德裕耳今以其傳攷之於南劒西川建籌邊樓以山川險要列為二圖召習邊事者典之指畫商訂則形勢之强愚知其在唐不在冦矣雄邊子弟使之習戰而飛星流電總十一軍不聞乏食之患則兵旅之强兵食之豐愚知其在唐而不在冦矣其後南詔恐懼請還所俘吐蕃維州卒以城降是唐之邊備得一德裕而有餘然則今日之言邊備者於是可得其要矣唐府兵吾觀李泌告徳宗曰府兵之制史册不詳於是參稽傳記以類焉葢府兵之制始於西魏蘇綽因於周隋而大備於唐二十為兵六十而免唐志貞觀十年而民無常兵之勞三時耕稼一時治武見杜牧原十六衛而兵無常聚之患六家而賦一兵李泌曰府兵皆於六户中等以上家有三丁選材力一人為之及糧牛驢皆六家共備是不悉民以為兵也六家而供一兵上注是不仰給次官也宿衛者一月而更貞觀十一年宿衛者畨上皆一月而更戍兵者三年而代李泌曰戍邊舊制三年而代又曰闗東之人西戍者皆人齎練數百匹隨為三年之計則所以役民者甚簡也置府六百而居闗中者三百六十陸䞇以為太宗列置府兵八百餘所在闗中者殆五百焉杜牧原十六衛以為貞觀中内有十六衛蓄養戎臣外開折衝果毅府五百七十四與此數不同也此以通監并見唐志舉天下不敵闗中所以明乎輕重之勢兵散於府將歸於朝而無握兵之重所以杜乎禍亂之原見唐志若夫器甲則出於民唐志兵甲皆自備輸之庫征行則給之戎兵衣糧則又取辦於民劉仁軌日士卒咸言初發日惟令備一年資装國無養兵之費惟元從禁兵與畨上衛兵或出征者有所給焉孫唐論又劉仁軌言徃在海西百姓爭欲從軍或請自辦衣糧謂之義征則征伐之際衣糧當從官給也至於教戰調發亦有可考者折衝以農隙教戰陣按閱不精則罪至折衝并及刺史李泌家傳此其教戰者也國家有所召發則下符契於郡府參驗乃發此其調發者然也唐兵志夫府有三等千二百人為上千人為中八百人為下府有折衝都尉左右果毅都尉又有别將長史兵曹校尉旅師等官以其等級相統治則有坊團隊火之制居無事時耕於野有事則命以出兵解輙罷其所以纎悉委曲為維持經久之計者誠三代而下近古之良法也故李泌謂徳宗曰貞觀中北滅突厥延陀西取龜兹盡臣西域滅吐谷渾髙宗滅髙麗百濟新羅皆府兵也自置府兵未有外叛内侮殺帥自擅者正以經畫得宜而區處之盡善也杜牧作原十六衛亦曰國家始踵隋制開十六衛將軍属官各守分部夾峙近省自貞觀至於開元百三十年間戎臣兵伍未始逆命此聖人所能柄統輕重制鄣表裏聖筭神術也古今以還法術最長其置府立衛乎然不一再傳而弊端已見接於開元其制因以廢墜是豈立法之不善葢所以守之者失其制也且始者宿衛之士月上而歲徧至髙宗則番役更代多不以時唐志始者番上宿衛謂之侍官至武后則悉假姻戚以充役使宿衛之士固亦有亡匿之患矣李泌家傳始者出征多不踰時逺不經歲髙宗命劉仁軌鎭洮河而兵始困於久戍李泌始者戰没行陣則官其子孫髙宗以後官不記錄劉仁軌論兵疏而兵非樂於征戰又州縣調發類不以實壯而富者以財免貧雖老弱者亦不得而逃焉州縣之兵於是又有逃亡之患矣劉仁軌論兵疏逮至於元宗之時衛士不給唐志府兵寡弱李泌家傳是以張說募彍騎以爲長從宿衛而番士之制已廢李林甫募長征兵以息山東之戍而邊戍之制又廢自是而後兵農既分不可復合於是有養兵之費矣故開元之時歲供邊兵而衣糧已二百萬至天寳以後益兵浸多爲費浸廣天寳以後養兵毎歲用衣千二百匹糧百九十萬斛又天寳九年朔方節度使張齊丘給糧失宜軍士怒毆其判官兵馬使至其甚也止受甲見唐志天寳以後彍騎之法又稍變廢士失拊循折衝諸府至無兵可交李林甫請停邊上下魚書方鎭篇其後徒有兵額而戎器並廢祿山之變至無兵可以受甲至永泰建中之世其弊尤甚故獨孤及陸敬輿諸人皆言其弊以為竭天下之財以供無用之兵財利匱於養兵稅法壊於奉軍豈非兵民既分其弊遂至於此歟加以天寳以後人主甘心邊功調發逺戍民亦無以為生杜子美所謂一從十五北防河便至四十西營田去時里正與褁頭歸時頭白還戍邊亦可見矣世之說者見府兵後日之弊遂歸咎於太宗立法之不詳葢亦未深攷焉耳張說不能因時救弊以復貞觀之舊顧乃立茍簡之制以便目前畧不思異時之患遂使古人良法美意因不復見終唐之世根本不固國勢動揺失居重馭輕之意者說亦不得不任其責焉其後雖李泌與德宗議復府兵非不拳拳而終不可復杜牧傷其廢壊恢然作原十六衛以自見意而一代之制竟無有能興起者豈非其原一失後世難於復攷歟識者觀古制之不存後世葢不無恨於張說也唐藩鎭唐自太宗參酌西魏周隋之制以防天下之變而府兵之制遂為一代之大法分置諸府以布列内外更畨迭上以分𨽻禁衛總天下凡八百餘府而環京畿者殆五百餘所以防外重内輕之憂隊伍火長各有等差折衝果毅各有定序所以立上下相維之勢四方有警則命將以出事已輙罷則又所以防䟦扈專恣之漸至於邊防之制則城捉鎭守率皆有使一道則又有大將以總其權當是時進退伸縮罔不惟朝廷之命而將帥重臣無不奔走以承要束京邑嚴固而四方無虞此貞觀之世所以為有唐極盛之時也自府兵法壊而節度之權浸浸日重而藩鎭之禍始蟠結而不可解終唐之世與國更為消長而一代之變其大節有可論者方永徽之初都督帶使持節者始曰節度斯時有節度之名矣猶未具其官也再傳景雲之初薛訥為西州節度使斯時有節度之職矣猶未重其權也接於開元文武迭用不久任不遥授專領貞觀故事猶有存者此葢𤣥宗之初年也奈何遥授之端一啟於王嗣眞之寵兼領之設復溺於葢加運之私愛攘郤四夷之意始銳然以自奮而為邊將者十餘年而不易方鎭之權於是乎重使𤣥宗講求立一國之舊制使無外重内輕之弊則復可維持而不亂惜其募廣騎以宿衛而無可交之兵在内之勢日輕置長征於邊而精銳咸聚西北在外之勢日重十道置使偏於邊陲而藩鎭有强盛之勢節度之職盡用胡人而國家無藩籬之助漁陽之變豈待智者而後知哉肅宗起兵靈武初造唐室是宜正上下之分以紀綱四方而偷取一時之安不思永久之患彼命將帥統藩鎭國之重事也王元志之亡乃委一介之使狥行伍之請不問賢否惟其所欲與者授之節鉞甚至偏裨逐主帥亦因以位授任之爵祿廢置不出於上而出於下則禍亂又庸有極乎廣徳之際安史之亂既已削平河北諸州既已賓服此正因事置變之機也子儀之在當時力請解罷節度以收兵權其所以為後日慮至深逺也代宗一切不之聽卒使僕固懐恩養冦以自封而薛嵩李寳臣之徒皆分帥河北以自固其黨於時朝廷厭苦兵革茍冀無事因以授之此所以復兆後日之亂也徳宗慷慨發憤痛懲積弊即位之初罷貢獻省樂工雖足以警動淄青之亂卒然不思因時之制以隄防人心是李惟岳欲世襲於成徳一不如志而田恱之徒遂相顧而起向使紀綱素立則彼奔走聽命之不暇又安有四王一帝之僣哉陸敬輿在深為國慮論闗中形勢之要居重馭輕之說而且拳拳於府兵之舊此正維持久長之深計也徳宗之制皆出於權不足以知此而乃却而不用奉天之幸亦其勢之必至也洎反都邑而姑息愈甚此所以養成藩鎭之禍若夫憲宗能用杜黄裳諸人故能以威武起衰弊殆非前數君所比者劉闢阻兵巴蜀則既平之李錡之守長江則又平之楊惠琳據夏州則又平之呉元濟之擅兵淮蔡則又平之所向無前所征必克是以王承宗以德棣二州自獻於上程權以滄景一州鎭而自歸於朝烏重嗣之在横海又舉支郡之兵盡屬刺史向時相與䟦扈以拒朝命者垂六十年今皆拱手以遵約束直以處置得宜能服其心耳異時河朔之歸劉總之䇿𤓰分其地而禀命於朝慨然欲為諸鎭倡首者是豈無故而然哉正以憲宗威畧在人者未冺也惜乎穆宗溺於宴安而崔植杜元頴軰又恬不知省遂激成朱克融之亂至於王庭湊之擅魏博史憲成之擅成徳合從方命故河朔再失以迄唐之亡當是時魏洪簡居中用事將不得專令而授方畧於禁中雖以裴晉公之元臣宿望竟不能以成功終於師老財匱而止其後澤潞之役李德裕許河朔世襲以安其心自貞觀開元百三十年間戎臣兵伍未始有變然則開元天寳之後其所以兆亂稔禍者其本末於是而可觀矣南北衙制神䇿左右十軍唐書志曰唐有天下二百餘年而兵之大勢三變其始盛時有府兵府兵後廢而為騎兵騎兵又廢而方鎭之兵盛矣及其末也强臣悍將徧滿天下而天子亦自置兵於京師曰禁軍以今攷之曰左右羽林軍曰左右龍武軍曰左右神武軍總曰北衙六軍葢唐有南北衙兵南衙諸衛兵是也北衙者禁軍也初髙祖已定天下其義兵願從宿衛者三萬人號元從禁軍至貞觀特擇其善射者曰百騎髙宗時則置羽林軍武后時則曰千騎睿宗時則曰萬騎此羽林之制也𤣥宗以萬騎平難改為左右龍武於是而有龍武之號肅宗時靈武之後調補北軍置左右神武於是有神武之名廣德之初代宗以避吐蕃而幸陜魚朝恩舉在陜之兵而迎扈悉號神䇿元泰之初吐蕃入寇朝恩又以神䇿軍屯苑中自是浸盛分為左右勢居北軍右遂為天子禁軍非他軍比自肅宗以後北軍増置威武長興等名類頗多而廢置不一惟羽林龍武神武神䇿神威最盛總曰左右十軍若夫李德裕之在蜀則有雄邊子弟李抱眞之在澤潞則有昭義歩兵方德裕之在劒南也建籌邊樓以左右二圖而圖其險要率户二百而取一人使習戰事緩則農急則戰謂之雄邊子弟故南詔吐蕃悉以城降方抱眞之在澤潞也以上黨正為正衛乃籍民每三丁選一壯者使農隙習射比三年而得精兵二萬遂雄山東此又在外之軍者也三國晉宋兵晉置二衛左右前後驍騎七軍皆以中軍將軍而統之呉多舟師而兵有車下虎士甘寧傳丹陽青巾沈瑩傳交州義士見歩隲傳及健兒武射之名非一赤壁之敗兵八十萬須濡之屯兵亦四十萬蜀兵率十萬呉兵三十三萬通三國之兵僅視其户之數斯民得無病乎晉武之制大抵内强宿衛領之貴戚外削州牧統於宗藩皆懲魏也未幾宗王横肆而宿衛散於外府禁軍單虚而州牧轉為强鎭是以闗門無結草之固晉陽有屢舉之甲欲强而反弱將削而滋大何哉事不師古急於矯弊崇私廢公而患生所偏也比及江左江州之兵至或單丁俱上不得番休民滋胥怨是以宗室誘之則為八王之亂夷狄攘之則為五胡之擾方鎭聚之則為王蘇庾元之亂自昔禍敗至晉滋極職兵之由終晉之世惟陳勰馬隆得諸葛亮古陣遺法畧試一二隆以募兵三千平西凉厥功彌著勰事雖不概見然徒校幖幟兵之一物耳當凉闗倉皇之中而白虎幡一麾衆皆解甲麾弓素信收歛至此孰謂古法不可施之後世而軍政之無益於國哉方五胡亂華之時民間豪傑各推塢主以冦抄為事元帝南渡依江以立國祖逖北討藉以為重自用刁叶議後率以奴為兵庾翼所統六州奴北伐百姓嗟愁戰輙奔敗終元帝世惟謝𤣥一戰有功葢所謂北府兵也劉牢之常領精銳為前鋒戰無不㨗劉裕亦以北府兵有功皆北兵也自劉裕以荆居上流甲兵半朝廷而刁崇丘襁褓迭據方岳文帝元嘉之政最爲可觀置宣武場挍獵講武然而亟用其民猜防智將殺檀道濟使王元謨等北伐再舉再敗邑里蕭條當是時惟荆州尚全後以藩州太重分荆楊别置二州而晉人上流中流重鎭之意掃地於此葢自元嘉以來王糺始自十五至十六為半丁十七而全丁而何承天備邊之論亦云一城千家堪戰之士不下二千計丁課役葢稍稍欲裁制矣然文帝銳志中原不暇息民方其一舉悉發六州倩使暫行而白丁不教輕進易退卒至敗衂帝猶不已由是盡户發丁王公子弟亦皆從役重以將由上御士無專統元嘉北伐常授成律交戰日時亦待中詔嗚呼無惑乎斯民至此極也將貴在一將帥之心昔者鞌之戰此晉兵也邲之戰此亦晉兵也夫晉豈强於鞌而弱於邲哉而勝負異變功業相反何哉吾觀鞌之役也韓厥戮人郤克分謗郤克流血張侯并轡至於振旅入國士爕後歸䇿勲勞將郤克先遜由是范叔歸功於荀庚欒書歸功於范爕有將如此烏得而不勝若邲之戰則異於此矣方與楚遇荀林父欲還隨武子亦欲還先縠欲進韓子亦欲進至於鄭人如師彘子欲許欒武子亦欲不許趙括趙同欲許甚者魏錡求公族而未得戰而敗趙旃求卿未得而怨欲戰而敗夫如是雖㣲楚晉固先潰况以楚師壓之則其敗也無足怪由是觀之晉之兵非有變也將帥之心不一勝負必至此也漢武之世兵數大出元朔五年衛青以三萬騎有功元狩四年青以五萬騎而無功盖元朔之後諸校力戰公孫敖李蔡李沮李恩軰皆從大將軍而有功至於蘇建無功青不專誅三子封侯青不受賞皆謝曰諸校之力夫元戎與列校如此以之克獲雖三萬不為之寡元狩之行霍去病始寵青之眷始衰分兵異出而敢戰深入之士皆属去病青由是心不平矣李廣欲先當匈奴而青使並出東道廣固辭青固遣卒以失期死青以不見敵不封而去病日盛當是時兩軍出塞馬凡十四萬匹而後入塞者不滿三萬則不知足以致此故曰選兵不如選將一士心不如一將心雖然士卒有心將帥一之將帥有心其誰能一葢至於此則事歸於廟堂而功係於君相趙充國上屯田之奏將持久以敵先零非魏弱翁任其說則不能以成功諸葛孔明出師一表反覆議論大抵望左右之得人以祖逖之績著於河南而以戴若思代之則以憤卒郭子儀李光弼之忠見於復兩京而以魚朝恩統之則以衆敗李晟以張延賞私憾而失兵柄卒使渾瑊為吐番所詐賀蘭進明以房琯之素嫌而不敢復出兵卒使張廵許逺為安祿山所殺故曰擇將不如擇兵擇將以周瑜之望曹公不啻虎狼而呉兵捷於赤壁以劉𤣥德之視陸遜甚於嬰雛而蜀師衂於白帝是不在乎敵之堅脆也東西異壤也而鄧艾以縋兵取成都南北異習也而王鎭惡以舟師平闗中是不在乎地之逺近也夫以東晉之衰而謝𤣥得志於淝水開元之盛而哥舒翰失利於潼闗是又不在乎時之治亂也故善將者勢無强弱任無久近敵無堅脆地無逺近時無治亂不用之則已用之無不勝焉惟其將而已矣然則擇將之術宜如何東坡蘇公進卷曰天下之實材不可求之於言語又不可較於武力獨見之於戰爾戰不可得而試也是故見之於治兵子玉之治兵於蔿終日而畢鞭七人貫三人耳蔿賈觀之以為剛而無禮知其必敗孫武始見試以婦人而猶足以取信於闔閭知其可用故凡欲觀將帥之才否莫如治兵之不可欺也或舉方畧之類以求之親兵以試之觀其顔色和易則足以見其氣約束堅明則足以見其威也坐作進退各得其所則足以見其能凡此者皆不可强也前代以六十萬勝楚以四十萬勝秦惟王翦項籍二人而多多益辦者獨韓信能之自餘兵至三十萬未有得志者趙括以四十五萬敗於長平漢初合五諸侯兵五十六萬敗於彭城以三十萬困於白登王恢引三十二萬伏馬邑無功王尋王邑以百萬敗於昆陽符堅以八十萬敗於合肥隋以九十萬敗於遼東其衆愈多而敗愈盛然猶有可諉者曰將不善若曹公可謂善將矣復以水軍六十萬而敗於烏林是時戰艦相接故為敵人所撓大衆屯聚故疫死者過半此兵多為累之明驗也雖然漢擇將之法猶可取焉漢選置將帥不與他官比非昔之所習知則出於一時之論薦嘗試而泛使之鮮有不敗者漢之將帥多由於環衛使其出入於周廬殿陛之間其果毅沈鷙忠義勇武皆天子之所熟識隨其材而器使之可也故夏侯嬰以奉車李廣以騎郎將趙充國甘延夀以羽林郎衛青霍去病以侍中其朝夕扈從久為天子見知無不為漢名將韓信為治粟都尉數與丞相蕭何言而竒之卒拜為大將李陵將兵於外天子召見於武䑓而卒用以伐單于葢至於設六郡良家子以為求將之方置羽林期門以為蓄將之地最為良法夫取之於山西出將之地而養之以宫禁扈從之中一旦有警則選諸環衛而用之眞可謂頗牧在禁中者耶雖然又有儒將焉鄧禹受詩長安光武循河北為將軍馮異好讀書而通孫子法賈復習尚書朱祐習儒學祭遵雖在軍旅不忘俎豆魯肅雖在軍陣手不釋卷陸凱統軍好太元論杜預征南通左氏傳婁師德擢進士第及吐蕃犯塞從軍西討裴行儉舉明經為朔方總管以儒而能將者也羣書考索後集卷四十九
