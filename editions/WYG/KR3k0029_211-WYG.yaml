body:
  text: 羣書考索别集卷二十四宋章如愚撰邉防門海海江淮手足也海口咽喉也京畿腹心也錢塘面瞰浙江去淮有千里之遥涉海無半日之頃江淮固要津守禦既備倉卒有警未足為腹心之憂巨海梯航快風順水自海而入京畿不信宿而直𢷬吾腹心之所江淮之師雖列百萬各堅守禦豈􅀎應緩急之援今日防海之兵如許浦如定川雖有之然許浦之屯深入扵長江之口僅可為長江之蔽定川之屯僻䖏扵四眀之海濵僅足為四眀之備其扵京畿海門勢甚遼逺若不相闗萬一不虞則許浦至海門不趐五百里定州里定川抵浙江往来亦三兩日何以相援耶今日之要害在浙則金山海門眀州定海秀州海鹽是也在淮則通州料角泰州石港建康土山江乗是也海門秀州金山為江浙海門之要衝金亮所謂夜半過海門山未眀抵我京畿者指此定海敵舟由海北岸来則至眀州定海海鹽敵舟由海南岸来則至秀州海鹽土山江乗建康上元縣東南三十里有土山西北十七里有江乗蔡謨備石季龍䖏料角石港沈與求謂水勢湍急海舟至此必得沙上水手方􅀎轉入者指此謨備石季龍晉石季龍扵青州造船數百掠沿海諸縣朝廷以為憂蔡謨遣徐元等守中州并設募取季龍舟船是時謨統七千人所戍東止土山江乗鎮守八所城壘凡十一䖏烽火樓望十餘䖏盖季龍謀出海道口趨建康如土山江乗此其要津也頥浩言避冦不如禦冦宋朝建炎四年敵退吕頥浩言朝廷集海舟于四眀必為避冦之備夫避冦固當預辦然禦冦之計尤不可緩防海委沿江太尉言者論防海利害莫若委之沿海太尉及民社兵大抵海舟不􅀎齊一未集而擊之必可成功詔從之沈與求備海紹興二年敵豫扵京東造舟沈與求言海道當防言者多欲扵眀州向頭設備使賊舟得至向頭則已入吾腹心之地矣如通州料角泰州石港水勢湍險海舟至此必須得沙上水手方􅀎轉入倘扵此為備盡拘水手則敵亦焉􅀎衝突望廟謨早定詔付頥浩仇悆為沿海制置先是創沿海制置使以集撰仇悆為之建司扵浙西吕頥浩言近創此司最為得䇿然敵舟從海来有二道一自海北岸来至眀之定海一自南岸来至秀之海鹽萬一有警逺不􅀎及乞令悆専管浙西别命人管浙東從之張浚條海道利害十年福建安撫張浚條海道利害大治海舟至千艘為直指山東之計以俟朝命汪澈論備海道三十一年澈言嚴備海道以遏其牽制李寳駐江隂命浙西總管李寳駐江隂以防海道李寳海州之捷七月金亮遣蘓保衡統水軍由海道将趨二浙鄭家奴副之寳遣子公佐同将官邉士寜潜入敵境伺動静士寜回言公佐挟歸正官魏勝得海州矣寳大喜趣其下乗機進發寳舟師至東海縣時敵圍海州寳麾兵登岸敵驚引去時山東豪傑王世脩等爭應為援寳與子公佐引舟師至宻之膠西石臼島而敵舟已出海口泊唐島相距止一山候風即南不知王師猝至寳禱于石臼祈風助順丙寅風雨南来衆喜争奮引㠶俄頃過山薄敵敵驚失措敵㠶皆以綿纈為之彌亘數里忽為波濤捲聚一隅窮促揺兀無復行次寳以火箭射之烟熖隨發延燒數百人不及者猶欲前拒寳命健士登其舟以短兵擊刺殪之降者三千人獲完顔鄭家奴六人斬之惟保衡未發舟旋自經死得獻議造舟人倪詢商簡梁三兒皆淮浙奸民為敵嚮道者寳欲乗進聞亮已濟淮旋駐東海視緩急為援御書賜寳寳捷奏至上賜詔奨諭書忠勇李寳四字表其旌幟葉義問論土豪官軍義門為報謝使回言今江淮既有師屯獨海道冝備臣謂土豪官軍不可雜䖏盖土豪諳練海道之險憑海之食利􅀎役使船户若雜以官軍彼此氣不相下難以恊濟欲扵沿海要䖏分寨以土豪為寨主令隨其便使土豪撓扵舟楫之間官軍阨扵塘岸之口此䇿之上也襄襄江淮所恃以為藩籬者江陵也江陵所恃以為唇齒者襄陽也秦兼天下自漢以北為南陽即今鄧州自漢以南為南郡即今江陵襄陽乃南陽南郡二郡之地故南接江陵北接鄧州西則接巴蜀實為衝要南北必爭之地江陵襄至江陵步道五百里郡志云勢同唇齒無襄陽則江陵受敵故江陵以襄為西捍鄧州襄陽北有樊城即古樊邑自樊城北有光化即古鄼城屬南陽縣即今光化軍去鄧一百二十里與敵境相接巴蜀襄陽西由房州達金州以入蜀即古魏興郡符堅攻蜀由此入晉吉挹扵西城縣南築壘拒之桑仲據襄欲西上吞蜀遣李横攻金州敗退保房州漢江漢水出蟠冡山蟠冡在隴西縣西其西漢水所出正屬今利州三泉縣金牛鎮劉琮降操後漢建安十三年劉琮屯襄陽㑹操南征琮遂舉州降魯肅欲說劉備先是肅聞表卒言扵孫權曰荆楚與國鄰接外帶江漢内阻山陵有金城之固請往說備使撫表衆共治曹操權遣行至南郡而琮已降據襄取北方十四年周瑜說權曰據襄陽以䠞操北方可圗也闗侯攻樊二十四年侯攻曹仁扵樊仁使于禁龎徳屯樊北大霖雨漢水溢禁等七軍皆沒禁窮迫遂降操子徙都避之司馬懿請遣人勸權奸其後則大圍自觧操從之吕蒙請據襄蒙宻言扵權曰蒙為國家前據襄陽何憂扵操陸遜向襄陽魏青龍二年吴陸遜諸葛瑾入江夏沔口向襄陽襄陽必爭六月滿寵欲㧞新城帝不聽曰先帝南守襄陽地有所必爭也羊祜鎮襄晉泰始五年帝欲并吴以羊祜鎮襄陽祜綏民逺近甚得江漢之心陶侃遣将㧞襄咸和七年秋趙郭敬南掠陶侃遣南中郎将桓宣乗虚攻樊城悉俘其衆竟陵太守李陽攻新野㧞之敬遁去宣陽遂㧞㐮陽侃使宣鎮襄陽宣招懐逺附簡刑罰勸農桑在襄十餘年趙人不􅀎勝時人以為亞扵祖逖周訪庾翼論據上流建元元年庾翼曰襄陽荆楚之舊西接益梁與闗隴咫尺去河洛千里土沃田良方城峻險水道流通進可掃蕩秦趙退可保據上流北魏向襄陽齊建武四年薛真度勸魏主先取樊鄧九月真度引兵冦南陽太守房伯玉擊敗之魏主怒以南陽小郡志必滅之遂引兵向襄陽李綱請幸南陽宋朝建炎元年李綱請幸南陽劉珏言陳唐諸郡新刳扵亂南陽城惡亦不可恃二年敵䧟鄧州程千秋失㐮三年冬先是京西制置程千秋在襄陽而所降襄仲有衆數千屯漢水之北城中統兵官有徐大方曹火星者仲遣人以馬遺徐徐以良甲二報之千秋怒其與賊通誅之一軍皆憤奔以告仲仲曰我以兄故不入襄陽今千秋殺吾兄遂攻城千秋遣曹出戰一晝夜殺傷相當黎眀仲盡驅良人各持竹一竿第見城外青竹蔽野仲軍繼之曹敗仲入據襄陽千秋遁去趙鼎論襄四年鼎言襄陽左顧川陕右視湘湖而下瞰京洛真帝王之宅宜屯重兵扵襄陽桑仲據襄謀蜀紹興元年仲據襄樊鄧隨郢等州久之野無所掠以人為糧襄民殱焉每自稱襄仲本王官終當以死報國以故􅀎服其下至是有衆號二十萬而無食知不可久長驅西上有吞蜀之志先遣横攻金州金房鎮撫使王彦扼險敗横横據房州彦又敗之横乃還襄陽范宗尹乞赦桑仲時右僕射范宗尹念其鄉國禍酷請赦仲罪遂以仲為鄧州鎮撫使仲命横屯鄧州霍明屯郢雖已受命再圗取金州冬復攻房州王彦大敗之霍眀殺桑仲二年仲再謀攻金房眀不從仲自馳至郢起軍眀殺之横報讐攻眀眀走歸行在詔授横襄陽等州鎮撫使李横思立竒功三年横思立竒功以自固乃與信陽鎮撫牛臯相約同北襲昌府遇敵戰大捷遂復頴昌及汝州葉縣等䖏横𫝊檄復東京趙鼎論襄陽江西帥趙鼎奏襄陽居江淮上流實川陕衿喉之地今聞横軍起兵東京恐縁此紛擾横烏合之衆不􅀎禦决失襄陽川陕路絶江湖震動横未幾果敗頴昌復䧟觧潜乞保上流荆南鎮撫解潜奏横已回襄陽敵䧟鄧州境與本鎮相近望下湖南撥兵同保上流敵偽䧟襄敵偽復犯襄陽横食盡棄城遁敵兵南至隨郢逺近震恐朱勝非議委岳飛取襄四年襄陽重地既為偽将李成所據湖湘之民亦不奠枕朱升謂當先取之上曰今便可議就委岳飛如何時飛駐軍鄂岳趙鼎曰知上流利害無如飛者奏請上令韓世忠一萬人臨泗上為疑兵劉光世選精兵出陳蔡庶幾兵勢相接上命飛收復命光世發精兵萬人援之飛自鄂趣襄勝非許飛迄事建節且命農卿沈昭逺往總軍餉鼎請上親筆詔監司帥守餉飛軍無闕庶幾必濟岳飛復襄豫求救于敵敵偽俱来我師連戰大破之遂復襄陽及郢隨諸州飛分遣統制王貴張憲連擊賊兵又復鄧州軍聲大振講防秋事上謂宰執曰岳飛既復襄陽粘罕必怒況今已六月下旬便可講防秋事敵人南来朕當親統諸軍分頭迎敵若依前逺避為泛海計何以立國岳飛進屯襄浚視師命岳飛進屯襄陽以窺中原時飛在鄂飛不可浚奏岳飛一動則襄陽有警復何所制吴拱戍襄三十一年亮渝盟詔知襄陽吴拱以三千人戍襄陽朝廷聞金人决欲敗盟乃令淮西諸将各畫界分使自為守措置民社増壁積糧是時御前都統田師中戍鄂吴璘戍武興姚仲戍興元任彦戍漢隂李道戍江陵戚方屯九江李顯忠戍池陽王權戍建康劉錡戍鎮江壁壘相望而襄陽獨未有備故命拱戍之汪澈言増重襄澈言願益兵上流増重荆襄之勢陳康伯請分禁旅助襄五月聚議康伯請分三衙禁旅助襄陽兵力成閔控扼上流六月朝廷以上流重地邉面濶而兵力分冝主以大将乃詔馬帥成閔總旅三萬往上流控扼又以汪澈置司鄂渚節制兩路敵瞰襄七月亮遣劉諤将二萬厯唐鄧以瞰荆襄汪澈言襄不可棄澈自鄂渚至襄撫軍時田師中握兵久且耄澈恐緩急不可倚伏奏罷之議者又欲置襄陽而併力守荆南澈奏襄陽重地為荆楚門户不可棄也成閔𢷬蔡成閔遣統制趙樽乗虚𢷬蔡入其城斬敵酋吴拱襄水之捷敵将劉諤揚聲欲取荆南又欲分兵自光黄𢷬武昌朝廷慮之令拱遣兵䕶武昌一帶津渡拱将回鄂汪澈聞之馳書止拱而自發鄂之餘甲進戍黄州敵果犯襄陽拱與戰于襄水之上敗之羣書考索别集卷二十四
