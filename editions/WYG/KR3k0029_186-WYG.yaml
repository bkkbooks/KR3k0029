body:
  text: 羣書考索續集卷五十五宋章如愚編臣道門臯陶刑不可有舜之九官若典禮樂也同教養也未嘗不決於汝諧而任刑一事獨以明允期之葢禮樂教養不可一日無而刑不可一日有也以徳用刑禹稱臯陶邁種徳穆王論臯陶敎祗徳葢其職雖在於明刑而其心未甞不本於徳也論典禮與天命天討之異臯陶曰天叙有典勑我五典五惇哉天秩有禮自我五禮五庸哉天命有徳五服五章哉天討有罪五刑五用哉葢典禮必自天子出故言勑我自我若夫爵人於朝與衆共之刑人於市與衆棄之雖天子不得而私故不言哉楊時以徳用人九徳之名自臯陶始其後周公吿成王亦欲其廸知忱恂于九徳之行葢古人之論人者必廣其有徳後世之主或以材能取人而不稽諸徳行故有才無徳之小人得以自售其不敗事者幾希臯陶之言真萬世知人之法也真徳秀主外治舜之時在庭之臣多矣至𫝊禹以天下而禹獨推臯陶何也曰舜徒得此兩人而天下巳治故也禹緫百揆而臯陶施刑内外之治舉矣古者兵刑之官合為一觀舜之命臯陶蠻夷猾夏是其責也則臯陶之職所施於外者為詳故臯陶雖不可以無禹而禹亦不可以無臯陶是以當舜之欲𫝊位禹乃遜於臯陶餘人不與焉孟子曰舜以不得禹臯陶為己憂而子夏亦言舜有天下選於衆舉臯陶不仁者逺矣盖有見乎此楊時君臣相遜刑期於無刑民叶於中此舜治也舜不敢自以為功舉而歸之臯陶曰時乃功臯陶不敢自以為功曰帝徳罔愆而舜猶曰俾予從欲以治惟乃之休此足以見君臣相遜之美而上下常有慊然不自居其功之意也稷體阻飢之心見乃粒之民以舜之時烝民乃粒何甞阻飢然舜之命棄乃若是云者葢欲棄甞體阻飢之心見乃粒之民若見阻飢之民則百榖不期而自播矣為生民立命萬世開太平禹稷思天下溺由已溺思天下飢由已飢便是為生民立命烝民乃粒萬邦作乂便是為萬世開太平夔其教即大司樂之樂徳樂語唐虞之時任於朝者非天子之族類則世臣巨室之家其起於耕釣側㣲者不過數人豈當時世家子弟皆賢哉亦敎之有道耳然舜之命官以敎胄子也必属之典樂之䕫何哉葢古之敎者不在於辭令文章惟長善救失以成其徳故優而游之使自求之饜而飫之使自趍之夫樂者所以和平其心志而導逹其善性也此舜之教胄子所以先諸樂歟周官大司樂以樂徳教國子中和秪庸孝友以樂語教國子興道諷誦言語自直而温至簡而無傲即敎以樂徳也自詩言志至律和聲即教以樂語也典樂兼教典樂教胄子見䕫兼兩事既典樂又教胄子樂與教不可以不並樂者廣大易直感人也深故掌樂必兼教之任動盪感發使人之良心悠然而生教人之道無大於此周之大司樂掌成均之法漢之太常猶領太學其名久而不廢也吕祖謙伊尹卓然獨見或問古人卓然獨見者誰為最先生曰伊尹或曰何謂先生曰伊尹去堯舜之世已逺絶無師承堯傳之舜舜傳之禹自此以往寂寥數百載伊尹㫁然號於人曰予天民之先覺者也及湯學於伊尹故湯得伊尹之傳曰文武曰周公曰孔子由此傳之也不是獨見得到何由敢自任如此張九成樂堯舜之道伊尹耕於有莘之野以樂堯舜之道夫堯舜之道豈有物可玩而樂之乎即耕於有莘之野而巳此農夫田父之所日用者而伊尹之樂有在乎是若伊尹則所謂知之者也楊時取予合義一介與萬鍾若論利害則有多寡若論義其理一也伊尹惟能一介知所取予故雖祿之天下不顧繫馬千駟弗視後世􅀚之則一介不以予諸人為太吝一介不以取諸人為太潔然君子之取予適於義而已予之嗇取之㣲雖若不足道矣然茍害於義又何多寡之間乎孔子於公西赤之富不恤其請於原思之賢不許其辭此知所予者也孟子言非其道則簞食不可受於人如其道則舜受堯之天下不以為泰此知所取者也同上從容於處利害之際湯方聘伊尹於莘尹幡然而從之豈必於伐桀哉茍可與為堯舜之君者初無擇也豈特伊尹為然雖湯亦然故五就桀者亦湯志也至於五反而不能至然後止於亳而伐桀之謀定此湯伊尹之本心也然後放天子太甲不以為嫌及其復之太甲不以為怨從容去就如處湯桀之間葢惟無利桀之心雖伐而不疑於亂惟無奪太甲之志雖放而不疑於簒此聖人之事常人所不能測也有天下之大莭辦天下之大事者有天下之大節者也立天下之大節者狹天下者也夫以天下之大而不足以動其心則天下之大節有不足立而大事有不足辦者矣孟子曰伊尹耕於有莘之野非其道也非其義也雖祿之天下不受也夫天下不能動其心是故其才全以其全才而制天下是故臨大事而不亂夫太甲之廢天下未甞有是而伊尹始行之天下不以為驚以臣放君天下不以為僣既放而復立太甲不以為専何則其素所不屑者足以取信於天下也彼其視天下眇然不足以動其心而豈忍以廢放其君求利也哉蘇軾人知其志於太甲復位之時伊尹之志其自知則在遷太甲於桐之日人知其志則在奉太甲歸亳之時善進諌太甲一篇合伊訓而觀之然後知伊尹納誨之不可及後世人臣至于再三鮮不以辭氣忿怒浸至不平伊尹三節進戒一節反緩於一節伊訓之作太甲過末形之時也其言庸傷有哀悼不能自已之意及其過巳形而太甲一篇乃雍容和緩不傷悼痛切伊訓言爾惟不徳罔大墜厥宗墜宗則九廟為墟矣使人凛然有危懼之意至太甲但曰忝厥祖忝祖之言視墜宗之言為孰嚴其曰無越厥命以自覆無之一字辭㫖從容亦非墜厥宗之斷斷也况又曰惟懐允圖曰萬世有辭期望之意愈至詳味太甲首篇温乎春風和氣中有陶然自得之意及觀伊川格言大訓明偹森嚴如武庫矛㦸森列何也臣之事君如子之事父事父母幾諫見志不從又敬不違勞而不怨夫父母有過諫之於幾㣲而不從常情或有忿激之心忿激之心生則諌諍之言過其傷多矣為孝子者加敬而不違雖勞而不怨其色愈恭其氣愈和其言愈從容而不敢廹也伊尹聖人太甲庸君伊尹元老太甲幼主而事之如父此其所以聖也吕祖謙傅説髙宗素知傅說昔髙宗之於傅説其知之舊矣豈真足以夢得哉惟夫踈逺之士欲舉而置之貴近之右未有以信於天下也故假諸夢以神之故孟子告齊宣王曰必不得已而使卑踰尊踈踰戚不可不重陳傅良學無止法傅説告髙宗以典學曰終始不曰始終學無止法也真徳秀開聖學之源學之一事前此未經見也説命曰惟敎學半曰念終始典于學於是始有學之名遂開萬古聖學之源其功亦大矣哉同上髙宗之得說以心之通髙宗之用人不求之於必可得之人而求之於不可知之夢事近恠矣然髙宗審其所夢之象而旁求之於天下而并以其所夢之意告之於人而舉朝之人不恠且疑耶使者四出交錯道路而傅巖之野負版之役夫儼然肖焉遂載而去之而説亦不辭舉朝之臣與其天下之人與其同役胥靡之人其愈不恠且疑耶既至而相之命之為礪命之為霖雨命之為舟楫命之為瞑眩之藥自比於弗視地之跣其勤若是其誠若是耶以髙宗之不言且夢帝而得之且形貌求而肖之且舉版築而相之且命之則説宜有驚世之智絶人之謀而徒曰從諫好學之類而已耶而髙宗又從而信受之服行之終始尊任之卒以繼伊尹之功而興商何耶甚矣其不恃其力以致物而以其心而致物也如此葉適周公用天子禮樂問賜周公以天子之禮樂當否曰始亂周公之法度者是賜也人臣安得用天子之禮樂哉成王之賜伯禽之受皆不能無過記曰魯郊非禮曰周公其衰矣聖人甞譏之矣説者乃云周公有人臣不能為之功業因賜以人臣不得用之禮樂則妄也人臣豈有不能為之功業哉借使功業有出於周公亦是人臣所當為爾人臣不當為其誰為也程顥誠於任管叔管叔不令公宜無不知也與其使之監商而終致辟焉孰若封之有庳富貴之而已耶游氏曰象以殺舜為事其㓙愚既已暴於世矣觀其志亦不過欲富貴而已舜以兄之道處之故封之有庳而使吏治其國所以處象而全之也若管叔之徳未著於迹其才又非象比也其志亦未可量周公詎忍逆探其兄之不仁将自絶於君親而棄之耶若為有庳之封則彼将以為鄙我而速亂耳周公之親愛其兄宜無不盡其道矣管叔之事聖人之不幸也舜誠信而喜象周公誠信而任叔天理人倫之至其用心一也吕大臨不相忌召公為保有欲去之志周公反覆留之不遺餘力後世權位相軋之際排之使去則多有之挽之使留葢亦鮮矣周公固不可以後世論也然大臣之秉心公則惟恐無助私則惟恐不専公私之間世主所當深察也吕伯恭待士周公之治天下何如其治計其一時之士雖賢且能孰有出周公之右者也雖有智計謀議孰有出周公之意者也以周公而輕天下之士則天下之士夫誰議而周公則不爾也沐不敢暇櫛也食不敢下咽也周公非不敢也周公則以為不沐不食不過足以病吾之一身耳不幸而失一士則足以病天下病風俗吾則不忍以一身之安而易天下之病風俗之病也羣書考索續集卷五十五
