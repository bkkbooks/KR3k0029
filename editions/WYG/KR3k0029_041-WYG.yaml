body:
  text: 羣書考索卷四十一宋章如愚撰禮器門車輅類輦輿夏氏末代制輦周曰輜車即輦也不知何代去其輪司馬法曰夏后氏二十人而輦商十八人而輦周十五人而輦秦爲人君之乗唐制輦有七一曰大鳳輦二曰大芳輦三曰仙遊輦四曰小輕輦五曰芳亭輦六曰大玉輦七曰小玉輦轝有三一曰五色轝二曰常平轝三曰腰轝大駕鹵簿先玉輅以行月令車馬之制鸞路有虞氏之車春所乗朱路夏所乗大路商路也明堂位之文形制似商之路但服色尚黄飾之黄耳春時用鸞路此用大路者以土五行之主故取尊大之名乗商又尚質之義也中央土所乗戎路兵車也制如周革路而飾以白秋所乗𤣥路冬所乗蒼龍馬八尺以上爲龍春所駕赤駵夏所駕黄駵中央土所駕白駱秋所駕鐵驪冬所駕月令注云皆所以順時氣也凡此車馬皆所取於商時而有變焉非周制也周禮朝祀戎獵車服各以其事不以四時爲異玉藻曰天子龍衮以祭𤣥冕而朝日皮弁以日視朝與此皆殊大路次路禮記云大路繁纓一就者大路商祭天之車商尚質以木爲車繁謂馬腹帶纓鞅也一帀曰就就成也言五色帀一成車既朴素故馬亦少飾止一就也次路繁纓七就者次路商之第三路也供卑用故就多也然郊特牲云大路一就先路三就次路五就而此之次路七就鄭注郊特牲以此云七爲誤鄭注郊特牲云禮器言次路七就與此乖字之誤也諸侯大夫等車輅周制巾車服車五乗孤乗夏篆五色畫轂約也卿乗夏縵大夫乗墨車士乗棧車庶人乗役車漢初以將相之尊乗牛車長吏至下更服入閭里自景武以後其制漸立景帝詔二千石車朱兩幡千石至六百石朱左幡三百石以上皂布蓋千石以上白布蓋此景帝所定之制也通典武帝天漢四年始定輿服之制令諸侯王大國朱輪特虎居前左兕右鹿小國特熊居前麋皆居左右此武帝所定之制也然所乗之車其名不一皇孫乗綠車太子有子則乗以從丞相乗髙蓋車于公曰少髙大門閭令容駟馬髙蓋車三公皆乗使車列侯乗安車太守則乗藩車陳遵刺史則乗傳車大夫乗官車使者追捕考按乗小使車佐吏則乗小車致仕者或賜安車杜延年于定國賈人毋得乗馬車旂常類黄帝振兵教熊羆􅆛貅貙虎制陣法設五旗五麾夏后氏奚仲爲車正建旗斿旐以别尊卑等級商因之周制司常掌九旂王建大常畫日月於縿首象天明也其制長九刄以素錦綢之以絳帛一幅爲縿附於杠上畫龍於縿上又屬十二斿於縿皆長十二刄每斿皆畫交龍十二其杠首仍注五采羽於上縿音所咸反旂常昔者黄帝與蚩尤戰爲其不可以無所麾也故象雲氣以制旂明堂位曰有虞氏之旂夏后氏之綏商之大白周之大赤司常掌九旂之名物各有屬以待國事左傳曰三辰旂旗昭其明也行人曰上公建常九斿侯伯建常七斿子男建常五斿曲禮曰武車綏旌徳車結旌常周禮司常日月爲常王建太常巾車玉路建太常十有二斿以祀司馬仲秋教治兵王載太常覲禮天子乗龍載大旂象日月升龍降虎郊特牲曰旂十有二斿龍章而設日月象天也考工記曰弧旌枉矢以象弧也書曰厥有成績紀于太常禮書曰太常不特祀天而已至於拜日禮月祀方明禮四瀆禮山川皆載焉祭祀朝覲節服氏衮冕六人維王之太常旂司常交龍爲旂諸侯建旂巾車金路建大旂以賓同姓以封司馬仲秋教治兵諸侯載旂覲禮侯載龍旂弧韣考工記曰龍旂九斿以象大火詩曰龍旂陽陽龍旂承祀龍旂十乗左傳曰分魯公以大路大旂史記曰龍旂九斿所以養信也旗司常熊虎爲旗師都建旗司馬仲秋治兵軍吏載旗考工記龍旗六斿以象伐也鄭氏曰伐屬白虎宿與參連體而六星故六斿旗之所用不特軍旅田獵野役之事而已凡祭祀各建其旗會同賓客亦如之後世秦於四時各有其旗月令春青旗夏赤旗中央黄秋白冬黒鄭有蝥弧晉有蠭旗以至呉王之建肥胡武之靈輈田蚡之曲旃後漢之雲罕皆一時之觀美而已旟司常鳥隼為旟大閱州里建旟司馬治兵百官載旟二者不同何也禮書曰州里建旟者州里之常百官載旟一時之事軍國之容耳詩曰孑孑干旟蓋州里之臣爾雅曰錯革鳥曰旟輈人曰鳥旟七斿象鶉火也旐司常龜蛇為旐又曰縣鄙建旐大司馬曰郊野載旐蓋田役軍旅王事也雖命教不同而同於四斿其所辨異者有名號存焉考工記輈人曰龜蛇四斿以象營室爾雅曰緇黄充幅長尋曰旐詩曰設此旐矣旜物司常通帛為旜雜帛為物又曰孤卿建旜大夫建物司馬治兵師都載旜鄉遂載物左氏曰亡大旂之左旜又曰分康叔以少帛旃爲大赤注大赤通帛象路建大赤以朝異姓以封故孤卿建之物爲少帛注大白商之正色路建大白以即戎以封四衞故士建之禮書曰旜物之斿經無其說公侯伯子男旂斿皆以命數為節意者旜物之斿亦稱其命數歟旞旌司常全羽爲旞析羽爲旌又曰道車載旞斿車載旌禮書曰道車象路也斿車木路也象路建大赤以朝木路建大麾以田注曰麾不在九旂以正色言之則黒夏后氏之建綏是也而有旞旌者蓋朝則建大赤燕出入則建旞田則建大麾鄙則載旌旞旌皆注旄而旄與羽又注於旗則羽可以飾旗又可以爲旗也大麾以田夏后氏之正色大帛以即戎商之正色翿旌君射於國中以翿旌爲獲白羽與朱羽揉鳴脰韜杠三刄龍旗君射於境所用也畫龍於通帛之上難曰周禮司常掌九旗各有所屬也攷之曲禮有綏旌結旌之文而司常缺焉不載何也蓋司常掌九旗之物各有屬以待國事皆名其用而已非言其義也曲禮則言其義矣司常名其用故各指其制言之曲禮言其義故武車之旌曰綏旌綏者欲其安也臨武事則所貴在安徳車之旌曰結旌結者欲其固也執徳則所貴在於固然則綏旌結旌不言於司常非無之也其在武車則爲綏旌矣其在徳車則爲結旌矣唐之禮儀文物藏在有司時世而用之故車旗之制其合於古者職在太常其不合於古者無足道也旗者所以附衆出令不可不肅也司馬相如曰曳明珠之旗亦聞三代之旗以明月之珠而飾乎此後世之制所以不如古也由漢及唐鹵簿繁盛旗旛之龍彌野㳂漢虹旌絳節白虎黄幡無復先王之制矣此所謂用與禮并棄而開其侈心者也冕服類冕服之作尚矣書稱舜曰予欲觀古人之象日月星辰山龍華蟲作會宗彛藻火粉米黼黻絺繡黼黻而上象服也象服有冕禮記曰有虞氏皇而祭夏后氏收而祭商人冔而祭周人冕而祭則皇收而下皆冕也孔子稱禹致美乎黻冕書稱伊尹以冕服奉嗣王詩稱商之孫子常服黼冔則夏商服章蓋與古同矣世本曰黄帝作冕服史記曰放勲黄收純衣禮記玉藻曰天子玉藻十有二旒前後邃延龍卷以祭元端而朝日於東門之外聽朔於南門之外諸侯元端以祭禆冕以朝郊特牲曰祭之日王被衮以象天鄭氏謂有日月星辰之章此魯禮也周禮昊天上帝則大裘而冕戴冕璪十有二旒則天數也祭義曰易抱龜南面天子卷冕北面左𫝊臧哀伯曰衮冕黻珽帶裳幅舄衡紞紘綖昭其度也火龍黼黻昭其文也子太叔曰爲九文六采五章以奉五色周語單襄曰陳侯棄衮冕而南冠以出不亦簡䙝乎哉荀子曰天子朱裷衣冕諸侯𤣥裷衣冕又曰天子山冕諸侯𤣥冕家語曰黄帝與炎帝戰克之始垂衣裳作黼黻又曰將郊天子皮弁以聴祭報郊之日天子大裘以黼文被裘象天既至泰壇王脫裘矣服衮以臨燔柴戴冕璪十有二旒則天數也上公衮冕繅九就前後九旒旒九玉共五百六十二繅玉三采朱白蒼執桓圭三禮圖云司服云公之服自衮冕而下注云自公衮冕至卿大夫之𤣥冕皆朝聘天子及助祭之服諸侯非二王後皆𤣥冕而祭又弁師云諸公之繅斿九就瑉玉三采其餘如王之事注云三采朱白蒼其餘綖紐皆𤣥覆朱裏與王同繅斿皆三采每繅九成則九斿每斿九玉計用玉百六十二其五冕之板亦廣八寸長尺六寸前圓後方又覲禮注云公衮有降龍無升龍又明堂注韍畫山火而無龍祭義云諸侯冕而青紘張鎰圖云其服𤣥衣纁裳朱紱素帶朱瑑終辟佩白玉而𤣥組綬赤舄黒絇繶純其方伯及王之子弟出封侯伯皆得服之朝王助祭焉新圖云司服曰公之服自衮冕而下如王之服而鄭氏謂上公衮無升龍又其冕九斿誤矣弁師曰諸侯之繅斿九就瑉玉三采其餘如王之事蓋曰諸侯之繅斿九就則公十有二斿可知公衮冕十有二斿侯鷩冕九斿則毳冕七斿希冕五斿𤣥冕三斿可知舊圖謂侯伯之服鷩冕七斿子男毳冕五斿公之孤希冕四斿則以上失於公衮冕九斿又於𤣥冕三斿爲之說也一曰凡冕於天子皆十二旒諸侯皆九旒故記曰天子十有二旒諸侯九旒弁師云諸侯繅斿九就諸侯蓋通稱也司裘仲秋獻良裘季秋獻功裘公之服自衮冕而下侯伯之服自鷩冕而下子男之服自毳冕而下孤之服自絺冕而下卿大夫之服自𤣥冕而下士之服自皮弁而下其齋服有𤣥端素端節服氏掌祭祀朝覲衮冕六人維王之太常諸侯則四人其服以如之郊祀喪冕二人執戈送逆尸從車行人以九儀辨諸侯之命等諸臣之爵以同邦國之禮而待其賓客上公之禮冕服九章侯伯冕服七章子男冕服五章秦滅禮學郊社服用皆以袀音鈞𤣥以從冕旒前後邃綖以祭蔡邕獨斷曰袀紺繒也班固東都賦注云袀皂也漢興因陋就簡雖叔孫通制綿蕞之儀特出一時草創無所稽考髙皇竹皮之冠文帝弋綈之衣謂之不忘舊不侈靡可也其如廢禮何賈生易服色之請正欲以感悟而猶謙讓未遑故終漢世制度視古莫及世徒譏班固不志輿服夫豈知固之深意正所以明漢家無制度也後漢輿服志曰上古穴居而野處衣毛而冒皮後世聖人觀翬翟之文榮華之色乃染帛以效之成以爲服見鳥獸有冠角䫇胡之制遂作冠冕纓蕤凡十二章至周九章秦滅禮學郊祀之服皆以袀𤣥漢承秦故至顯宗初服旒冕衣裳文章赤舄絇屨衣裳𤣥上纁下乗輿備文日月星辰十二章三公諸侯用山龍九章九卿以下用華蟲七章皆備五采大佩赤舄絇屨以承大祭冕冠垂旒前後邃延玉藻孝明皇帝永平二年初詔有司采周官禮記尚書臯陶篇乗輿服從歐陽說公卿以下從大小夏侯伏勝說冕皆廣七寸長尺二寸前圓後方朱綠纁下𤣥上前垂四寸後垂三寸係白玉珠爲十二旒以其綬采色為組纓三公諸侯七旒青玉為珠卿大夫五旒黒玉為珠皆有前無後各以其綬采色為組纓旁垂黈纊郊天地宗祀明堂則冠之自髙祖以竹皮爲冠宗廟諸祀皆用之至顯宗初服冕旒衣裳文章赤舄以祀天地其祀天地明堂皆冠旒冕衣裳上𤣥下纁天子備日月星辰十二章三公諸侯九章卿以下七章詔有司采周官禮記尚書爲冕廣七寸長尺二寸前圓後方以其綬采色爲組纓㑹要宋齊皆王公平冕九旒衣山龍以下九章卿七旒衣華蟲以下七章後周設司服之官掌皇帝十二服祀昊天上帝則蒼衣蒼冕祀東方上帝及朝日則青衣青冕祀南方上帝則朱衣朱冕祭皇地祇中央上帝則黄衣黄冕祀西方上帝及夕月則素衣素冕祀北方上帝祭神州社稷則𤣥衣𤣥冕享先皇加𤣥服納后朝諸侯則象衣象冕十有二章衮冕自龍以下凡九章山冕八章鷩冕七章通十有二旒諸公之服九一曰方冕二曰衮冕九章三曰山冕八章四曰鷩冕七章五曰火冕六章六曰毳冕五章七曰韋冕八曰皮弁九曰𤣥冠諸侯服自方冕而下八無衮冕俱八旒諸伯服自方冕而下七又無山冕俱七旒諸子服自方冕而下六又無鷩冕俱六旒諸男服自方冕而下五又無火冕俱五旒三公之服九一曰裨冕二曰火冕六章三曰毳冕五章四曰藻冕四章五曰繡冕三章六曰爵弁七曰韋弁八曰皮弁九曰𤣥冠三孤之服自裨冕而下八無火冕公卿之服自裨冕而下七又無毳冕上大夫之服自裨冕而下六又無藻冕中大夫之服自裨冕而下五又無皮弁下大夫之服自裨冕而下四又無爵弁士之服三一曰祀弁二曰爵弁三曰𤣥冠庶士之服一𤣥冠隋改後周制度乗輿衮冕垂白珠十有二旒服十二章皇太子衮冕垂白珠九旒服九章王國公開國公三公衮冕青珠九旒服九章侯鷩冕八旒服七章伯鷩冕七旒服七章子毳冕六旒服五章男毳冕五旒服五章唐制天子之服十四大裘冕者祀天地之服也廣八寸長一尺二寸以板爲之黒裘纁裏無旒衮冕廣一尺二寸長二尺四寸金儲玉簪導垂白珠十二旒鷩冕八旒七章絺冕六旒三章𤣥冕五旒裳刺黼皇太子之服六衮冕白珠九旒羣臣之服二十有一衮冕者一品之服也九旒青􅋒爲珠貫三采玉鷩冕者二品之服也八旒毳冕者三品之服也七旒絺冕者四品之服也六旒元冕者五品之服也以羅爲之五旒衣韍無章裳刺黻一章平冕者郊廟武舞郎之服也黒衣絳裳爵弁者六品以下九品以上從祀之服也以紬爲之無旒陳祥道禮書唐楊景奏議論服色制度議曰古者太昊包犧氏仰以觀象俯以察法造書契而文籍生次有黄帝垂衣裳而天下理易服色者謂夏后氏尚黒殷人尚白周人尚赤至於山龍華蟲宗彛藻火粉米黼黻此又百代可知之道也謹按虞書曰予欲觀古人之象日月星辰山龍華蟲作會宗彛藻火粉米黼黻絺繡由此言之則其所從来者尚矣夫日月星辰者明光照下土也山者布散雲雨象聖王澤沾下人也龍者變化無方象聖王應機布教也華蟲者雉也身被五采象聖王備兼文明也宗彛者武蜼也以剛猛制物象聖王神武定亂也藻者逐水上下象聖王隨代而應也火者陶冶烹飪象聖王至徳日新也米者人恃以生象聖人物之所頼也黼能斷割象聖主臨事能決也黻者兩己相背象君臣可否相濟也逮有周氏以日月星辰爲旌旗之飾又登龍於山登火於宗彛於是乎制衮冕以祀先王也九章者注於陽數也以龍爲首章者衮者巻也龍徳神異應潛見象聖王深沈逺智卷舒神化也又制鷩冕以祭先公鷩者雉也有耿介之志表公有賢才能守耿介之節又制毳冕以祭四望也四望者岳瀆之神也武蜼者山林所生也明其象也制端冕以祭社稷土穀之神也粉米由之成也象其功也又制𤣥冕以祭羣小祀也百神異形難可徧擬但取黼黻之相背異名夫周公之多才也故治定制禮功成作樂以孔子之聖也故行夏之時服周之冕先王之法服乃備於此矣唐羣臣冕服二十有一一品衮冕二品鷩冕三品毳冕四品絺冕五品𤣥冕六品至九品爵弁又有平冕爵弁武弁弁服進賢冠法冠之屬羣臣之章服則始於貞觀中詔三品以上服紫四品以上服緋六品七品以綠八品九品以青束以帶一品二品銙以金六品以上以犀九品以上以銀庶人以鐵垂頭於下取其順下之義也佩以魚則始於髙宗國朝天子冕服有衮冕平天冠前後十二旒祭天地宗廟受册尊號元日受朝及册皇太子則服之通天冠絳紗袍大祭祀致齋出乗玉輅入乗金輅正冬大會則服之大宴則服之常服赭黄淡黄袍於大宴則服之赭黄䙆袍常朝則服之窄袍便坐視朝則服之赭黄袍衫而下皆皂紗折上巾國朝王公以下冕服有九旒冕八旒冕古無此冕七旒五旒平冕平梁三梁冠兩梁冠之類九旒冕三公奉祀則服之七旒冕青羅爲衣裳四品五品爲獻官則服之紫檀衣朱裳御史博士服之平冕無旒青衣纁裳五旒冕太祝奉祀服之五梁冠一品二品侍祠朝㑹則服之中書門下梁冠加籠巾貂蟬三梁冠諸司三品御史臺四品兩省五品侍祠朝㑹則服之御史大夫中丞則冠有獬豸角羣臣之章服一品以上服紫五品以上服朱七品以上服綠九品以上服青雍熈初郊祀慶成始詔升朝官服緋綠二十年者叙賜緋紫真宗東封西祀恩賞京朝官並以十五年爲限太平興國二年詔朝官出知節鎮及轉運使副借紫知防團刺史州借緋衣緋者借紫其爲通判知軍監正借緋衮冕者九章衣五而裳四毳冕五章衣三而裳二衣多而裳寡固也然鷩冕七章衣三而裳四絺冕三章衣一而裳二乃裳多而衣寡何也蓋冕服之制分隂陽為竒耦陽數竒故衣則竒數隂數耦故裳則耦數衣繪而裳繡如益稷所謂衣作繪裳作繡固也而絺冕于衣亦繡者何也葢絺冕三章粉米一也黼二也黻三也既以此爲三章之服而粉米非可畫之物故雖衣亦繡也冕制黄帝作冕垂旒目不邪視也充纊耳不聴讒言也論語曰禹致美乎黻冕禮記祭義曰天子爲籍千畆冕而朱紘躬秉耒諸侯爲籍百畆冕而青紘躬秉耒郊特牲曰𤣥冕齋戒鬼神隂陽也周弁商冔夏收朱干設鍚冕而舞大武諸侯之僭禮也樂記曰食三老五更於太學袒而割牲執醬而饋執爵而酳冕而總干所以教諸侯之弟也雜記曰大夫冕而祭於公弁而祭於已士弁而祭於公冠而祭於己明堂位曰朱干玉戚冕而舞大武皮弁素積裼而舞大夏禮運天子之冕朱綠藻鄭氏曰朱綠似夏商禮周禮天子五采藻十有二旒諸侯九上大夫七下大夫五士三此以文爲貴也魏文侯曰吾端冕而聴古樂武王克商散軍而郊射裨冕搢笏而虎賁之士說劍也大戴禮曰公冠四加𤣥冕顔淵問爲邦子曰服周之冕蓋以周冕為百王不易之大法也而夫子又曰麻冕禮也今也純儉吾從衆則是周冕又可得而易蓋古者冠布無文夏以毋追或謂以收商以章甫或謂以冔至周用文繡始備三十升麻布而爲之故夫子曰服周之冕又曰麻冕禮也至孔子時以絲易麻而孔子乃從衆蓋以絲易麻而尊卑上下之分猶在也至後世其法始亂春秋傳曰上物不過十二禮記郊特牲曰戴冕璪十有二旒則天數也玉藻曰天子玉藻十有二旒龍卷以祭是則帝王之衮冕十有二旒也典命曰上公以九爲節則上公之衮冕九旒九玉也弁師言繅十有二就以見斿亦十有二言繅斿九就以見斿與玉亦九於王舉衮冕於諸侯舉上公之冕皆指其盛者言之也孔子曰麻冕禮也記曰玉藻前後邃延漢叔孫通之冕制版廣八寸而長倍之後方前圓後仰前俯則版質而麻飾之上𤣥爲延下朱爲裏約之以武武冠卷也設之以紐貫之以筓固之以紘五采玉則朱白蒼黄𤣥也玉十有二則每五間以八寸也其𤣥朱方圓俯仰如此而辨物之徳應物之事不變之體無方之用莫不賅存乎其間命之曰冕者禮爲應物而設故也然服飾於下隂也故司服之服六冕飾於上陽也故弁師之冕五而已猶王后之服六而追師之首飾三而已副編次則大裘衮衣同冕猶三翟同副也康成謂大裘無衮其冕無旒於經無據玉藻曰龍卷以祭其文在朝日聴朔之上則祭昊天五帝先王之類皆以玉藻龍卷此又與郊特牲象天則天數之說合矣周官司服掌王之吉凶衣服大裘以祀天衮冕服享先王升日月於旌旗服備九章一曰龍二曰山三曰華蟲四曰火五曰宗彛皆畫以爲繢六曰藻七曰粉米八曰黼九曰黻皆絺以爲繡則衮之衣五章裳四章凡九章鄭氏曰登龍於山登火於宗彛尊其神明也鷩冕服享先公畫鷩翟謂華蟲也凡九章毳冕服祀山川畫虎蜼謂宗彛也凡五章絺冕服祭社稷五祀絺刺粉米無畫凡三章𤣥冕服祭羣小祀其衣無𤣥裳刺黼而已凡兵事韋弁服眂朝則皮弁服凡甸冠弁服弁師掌王之五冕皆𤣥冕朱裏綖紐冕服有六而言五者大裘冕首飾尊也五采繅十有二就皆五采玉十有二玉筓朱紘諸侯及孤卿大夫之冕各以其等爲之弁師掌王之五冕皆𤣥冕朱裏綖紐五采繅十有二就皆五采玉十有二玉筓朱紘諸侯之繅斿九就瑉玉三采其餘如王之事繅斿皆就玉鎮玉筓諸侯及孤卿大夫之冕韋弁皮弁弁絰各以其等爲之而掌其禁令後漢光武祀天地明堂皆冠旒冕東晉初過江服章多闕而飾冕以翡翠珊瑚珠郊祀天地明堂宗廟元會臨軒始改服黒介幘通天平冕宋更名曰平天冕後周設司服之官掌皇帝十二冕祀昊天則蒼冕五帝各隨方色朝日同青冕夕月同素冕地祇同黄冕神州社稷同𤣥冕享先皇加𤣥服等象冕享先帝食三老耕籍等以衮冕視朔大射等以山冕視朝適宴等以鷩冕皆十有二旒餘諸公侯伯子男而下各有等差唐依周禮制天子之六冕有大裘冕衮冕鷩冕毳冕絺冕𤣥冕通典𤣥端素端如之其色不同陳禮書云司服言王及諸侯孤卿大夫士之服而繼之以其齋服有𤣥端素端則𤣥端素端非特士之齋服而已鄭氏曰端者正也士之衣袂皆二尺二寸而屬幅是廣袤等也其袂尺二寸大夫以上侈之侈之者蓋半而益一則其袂三尺三寸袪尺八寸然謂之端則衣袂與袪廣袤等矣無大夫士之辨也果士之袪殺於袂尺非端也大夫之袂侈以半而益一亦非端也深衣之袂圓長衣之袂長弔祭及飾衣之袂侈則端衣之袂蓋可知矣古者端衣或施於冕或施於冠樂記曰魏文侯端冕而聴古樂荀卿曰端冕𤣥裳俛而乗路此施於冕者也劉定公曰吾端委以治民董安于曰臣端委以隨宰人此施於冠者也蓋𤣥端祭素服也諸侯與士以爲祭服玉藻𤣥端以祭郊特牲冠𤣥端是也大夫士以爲私朝之服玉藻朝𤣥端是也天子至士亦以爲燕服玉藻天子卒食𤣥端以居内則事父母端衣是也然則端衣所用固不一矣服𤣥端者冠則緇布齋則𤣥冠特天子齋用冕燕則𤣥冠而已然齋或用素端則其冠不𤣥矣鄭曰素端爲禮裘有所禱請是已毳冕毳冕五章說文毳獸細毛也宗彛有虎蜼之飾而毳又有宗彛之章故書謂之宗彛周禮謂之毳冕毳冕王祀四望山川之服也詩曰毳衣如菼毳衣如璊劉熈釋名以毳爲藻文鄭氏以毳爲􅄢衣與宗彛之制不合不足信也三禮圖之毳冕五章祀四望山川之服按鄭義毳冕七旒六命五采絲繩貫五采玉每旒各十二玉前後共十四旒計用玉百六十八毳畫虎蜼謂宗彛也故此五章一曰宗彛二曰藻三曰粉米皆畫於衣四曰黼五曰黻皆繡於裳藻水草也取其文如華蟲之義粉米取其潔又取其養人粉米不可畫之物故皆刺繡於衣與裳也黼之文亦作斧繪人職據采色而言白與黒謂之黼若據繡於物上即爲金斧之斧近刄白近銎黒則曰斧取金斧斷割之義也青與黒爲黻則兩已相背取臣民背惡向善亦取君臣離合之義新圖云弁師曰諸侯之繅斿九就瑉玉三采其餘如王之事則鷩冕九斿毳冕七斿希冕五斿𤣥冕三斿斿各十二玉可知其異於王者殺其斿與其采而已且曰瑉玉則天子用玉可知蓋不如是則殺玉彌寡其垂有不及目者惡足以示蔽明之義哉毳冕自虎蜼而下書作繪宗彛則畫虎蜼之彛爲是粉米兩物共爲一章在裳則繡然而在衣則畫希冕是已舊圖粉米在衣亦繡皆非是三公毳冕繅八就前後皆八旒旒八玉用瑉玉一百二十八繅玉亦皆三采三禮圖云三公八命而下服毳冕者案射人職掌三公孤卿之位三公北面以三公臣中最尊故屈之使北面答君也其摯執璧與子男同制故服毳冕與子男同也雖從毳冕五章其旒與小章皆依命數此所謂屈而伸者也玉繅亦皆三采每繅八成則八旒每旒八玉計用瑉玉一百二十八按弁師注於一等之中獨著孤繅四就用玉三十二仰推王之三孤六命上極三公繅玉形制采繪章數觸類可知陳禮書曰射人三公執璧執璧則服毳冕而已蓋王饗射降而服鷩冕則公於王射降而服毳冕矣陸難曰詩毳衣如菼刺大夫之詩也大夫希冕今曰毳衣則上大夫卿也卿服毳冕則三公宜服鷩冕先儒謂毳冕誤矣王制曰三公一命衮明服鷩冕也子男毳冕繅五就前後各五旒旒五玉用玉五十繅玉皆三采以上子男並同但執穀璧蒲璧之異耳司服云子男之服自毳冕而下如侯伯之服弁師注云子男繅五就繅玉皆三采每繅五成則五斿每斿亦貫玉五瑉玉計用五十韍帶綬舄皆與侯伯同若朝王及助王祀昊天上帝祭先王先公饗射祭四望山川及自祭四望山川皆服之王者之後方伯王之子弟封爲侯伯者皆服之以助王祭四望山川王之孤卿毳冕繅六就前後各六旒旒六玉用玉七十二以上孤卿毳冕並同但執皮帛據孤而言若卿則執圭或說天子孤及卿皆六命則同絺冕之服三章小章則畫六羣書考索巻四十一
