body:
  text: 羣書考索續集卷二十五宋章如愚編禮樂門禮樂總論禮樂仁者天性也義者天情也人而不仁血氣之性也人之不義利欲之情也人惟有血氣利欲以亂其天性天情故聖人制禮以節之作樂以和之反其不仁不義之習而復之仁義之真於以承天順地報本反始誠之至也於以敬親尊君友于閨門悌于鄉黨百慮無邪無體之禮也歡心各得無聲之樂也然無本不立無文不行遵情性復仁義者禮樂之本也玉帛牲幣鐘鼓管絃者禮樂之文也典謨二禮所紀本與文竝行歴代諸史所志類皆器數之末所謂本者容或知之猶未詳也今也考論語志始末亦止及乎文之大略而已細而節目别有司存大而原本以俟君子天子志四代禮樂孔子曰行夏之時乘殷之輅服周之冕樂則韶舞夫韶舞形容紹堯之意也周謂之大韶漢謂之文始唐謂之九功宋朝謂之元徳升聞雖歴代取天下之異各作樂以取其功而韶舞大意至今猶存漢自武帝用寅正歴代相承雖取五行更王之義以為服色旗幟之尚而夏時終不可易也殷輅大輅也周謂之玉輅見書注秦謂之金根殷有山車之瑞故車名桑根秦改為金根見東漢輿服志云漢謂之乘輿歴代乗之以備朝祭之儀周冕十有二旒前後邃延繅十有二就玉笄朱紘衮衣十有二章歴代服之以為朝祭之服夫子舉四代禮樂以告顔淵既為當時僣禮樂者之戒且為萬世不可易之制也然衮冕之外所謂大裘冕無旒以祀天與其諸餘冕自秦漢廢之而不用大輅之外所謂大駕鹵簿屬車八十一乘自秦漢増之而益侈漢儒正朔之辨未必祖夏時唐樂舞倍八佾之數未必似舜韶夫子亦不保其往者後世為侈心所奪也然則歴代猶存韶舞夏時殷輅周冕之大意者何歟大道所在雖萬世猶一日也史記集經子為禮樂書虞周之時夷夔之所分典大宗伯大司樂之所職掌見於書禮之所述者即禮樂志也自春秋以來諸侯越禮而去其籍大夫僣樂而歌雍以徹六經方作輒燔於秦秦之所謂禮樂集六國以為侈志於尊君抑臣而已漢因秦舊叔孫之禮藏於理官法家又復不傳制氏竇氏之樂有司止能紀鏗鏘鼔舞而不能言其義夫如是安得有本書哉太史公作禮書畧述秦漢與建元因革之槩而乃足之以經子之禮論其樂書畧序高祖武帝所自為歌詩而乃足之以六經之樂記樂記出於魯淹中河間獻王獻之自班馬而降東漢六朝隋唐迄于宋朝正史皆有禮樂志次第相承前後相襲止叙五禮六樂之舊文與夫輿服音律之舊式迭參旁䆒時有因革初無大異特作史者姑掇拾以備諸志之一耳未必當時盡施用此禮此樂也史通譏切諸史志頻頻互見其以是歟詳見下諸志姑存輿服舊式說班志以庠序為禮樂之原董仲舒劉向漢大儒也其論禮樂教化必曰立太學以教於國設庠序以化於邑又曰興辟雍設庠序隆雅頌之聲盛揖遜之容而已班固志禮樂之始也歴序武帝成帝不克用二子之原而終也嘉歎光武首立明堂辟雍顯宗躬行宗祀飬老之事且謂威儀雖美而禮樂未具由庠序未設之故夫固與舒向論禮樂之原皆歸之庠序之教何也葢舜命夔典樂教胄子周以大司樂治學政凡直寛剛簡祇庸孝友之徳歌詠聲音諷誦言語之節與夫干戈羽籥射鄉享之儀上自朝廷下及黨遂皆有學以教之於是童而習之至于老死踐而行之不厭不倦者皆學校之功也夫人安得不為士君子之行而禮樂逹于天下矣周衰禮廢樂缺循法守正者見侮於世奢溢僣差者謂之顯榮子夏見紛華聞夫子之道二者心戰不能自决而况庸下漸漬於失教被服以成俗乎此太史公所以發歎也秦㓕先代之教而漢人置博士弟子貟所致功令復以利禄之路誘之詳見藝文志功令說雖曰設太學致辟雍所飬所教之科與虞周異矣此班固所以歎建武永平之威儀雖美而禮樂猶未具也東都太學諸生迭相標致激成黨錮之患唐制由學舍之選者謂之生徒者未免乎科舉之累宋朝因唐制以取士自京師至州邑皆有學而禮樂之壊反自學校始由所習者皆場屋之文也禮義之地既為利禄所移禮闈貢舉又為刑名所禁欲以是為禮樂教化之原難矣歐陽志論禮樂與刑政為二禮樂為國之根本刑政為國之輔助也歐公之志謂治出於一則朝廷里閭居處動作衣服飲食之間朝夕從事乎禮樂所以遷善逺罪而成俗也治出於二則所急者簿書獄訟兵食而已故事物名數皆有司之事搢紳大夫莫能曉習而天下之人終身未甞見也况欲識禮樂而被其化乎嗚呼歐陽可謂知禮樂之本矣然猶歴述隋唐之所承變貞觀開元之所紀者與夫元和新儀曲臺新禮者於以見其其文而意不存也故凡有唐五禮之次第六樂之名纎悉備載猶未免效諸史之尤者豈以存諸一代之正史猶勝於藏之理官與律令同科歟禮樂以成教化禮樂所以成教化而兵制輔之當唐虞之時禮樂之官析為二兵刑之官合為一詳略可見禮書鍾律六經之道同歸而禮樂之用為急遭秦滅學禮樂先壊漢晋以來諸儒補緝竟無全書其頗存者三禮而已周官一書固為禮之綱領至其儀法度數則儀禮乃其本經而禮記郊特牲冠儀等篇乃其義說耳前此猶有三禮通禮學究諸科禮雖不行而士猶得以誦習而知其說熙寧以來王安石變亂舊制廢罷儀禮而獨存禮記之科棄經任𫝊遺本宗末其失已甚而博士諸生又不過誦其虚文以供應舉至於其間亦有因儀法度數之實而立文者則咸幽𡨕而莫知其源一有大議率用耳學臆斷而已若乃樂之為教則又絶無師授律吕短長聲音清濁學士大夫莫有知其說者而不知其為闕也頃嘗考訂其說欲以儀禮為經而取禮記及諸經史詩書所載有及於禮者皆以附於本經之下具列注疏諸儒之說略有端緒而未就而鍾律之制則士友間亦有得其遺意者切欲更加參考别為一書以補六藝之闕興起廢墜垂之永久使士知實學異時可為聖朝制作之助文公奏議禮禮總序諸史禮志多按虞書五禮以吉凶軍賔嘉為次第然伯夷所典三禮即天地人是也蓋有天地而後有人有祖考而後有身故人之心必先敬乎神祇而身之居必先營乎寢廟下而匹士莫不皆然而况於天子之尊王公之貴乎今所編次自郊廟始而後及於朝廷鄉黨槩以三禮為宗所謂五禮皆在其中矣若夫歴代三禮圗其詳已見藝文志抄禮類所謂細而節目者也既有司存不復按圗而為之辨歴代禮四代各垂法而禮獨不著於象魏四官各有司而禮獨名以宗伯六官各有職而其書獨謂之周禮禮之為用大矣哉彌綸天地經緯隂陽藏之人心著之天下不可以一官名不可以一事著葢無一而非禮也三禮之典五禮五庸在唐虞尚矣夏商以來文獻不足至于成周經制大備禮儀三百威儀三千事為之制曲為之防至纎悉也故魯用周禮識者謂以其為未可動情未能周禮詩人謂以固其國夫何後世不知此哉叔孫通定漢儀沿襲秦典不能致魯兩生固不足恨竊怪通所制禮書凡十二篇所制刑書凡十八篇於刑為詳於禮為畧彼所職何事而顧為此耶大抵漢人輕禮重刑定律以丞相而主禮則以奉常刑書藏之理官而禮書亦録於理官其輕重之心於此可見通之為此也意其有所觀望而為之也后蒼所記徒顯學校之闕曹褒所定反雜䜟緯之言習儀禮者徒善為容談曲禮者指為拘曲彼將視禮為何物而賈誼仲舒王吉劉向之徒亦徒為之嘆息焉耳在漢則然則夫黄初之裁定朝儀太始之削除乖謬梁之裁成大典隋之著為五禮亦有不足論也唐之太宗慨慕古典周禮之書拳拳於乙夜之讀而約之以禮有魏徵存焉而房杜諸人以河汾一流𣲖禮樂之問汗浹無對使一代之典遂為闕文雖曰貞觀禮書凡一百三十八篇要之皆𤣥齡所定未免率意為之也于後有顯慶禮有開元禮有郊祀緑禮閤新儀曲臺新禮然求之野者不知何人而聚訟之議亦徒自為同異而已甞觀唐有孫昌嗣者發憤行冠禮薦笏外庭而為曵笏却立者所笑天下不以非鄭尹而快孫子焉嗚乎一冠禮也而唐人不能知何有於三千三百之儀焉宋朝宗工鉅儒講明禮學三禮圖已進於聶崇義矣而祥道禮書思參用焉開寳通禮既上於劉温叟矣而盧多遜之義亦兼取焉分門禮選作於邢昺禮閤新篇作於王皥太常新禮慶厯禮儀作於賈昌朝宜詳而詳則歐陽等參稽歴代因革可也宜畧而畧則沈括等獨上明堂祫享禮可也雖然此特其文耳文不足以盡禮請觀之所施焉郊祀廢典也行於建隆藉田曠儀也行於端拱明堂亦希世之學行於皇祐朝㑹有禮以千五條彈其大儀婚姻有禮以五禮存其名數掃漢唐舊儀去成周成法茲可見矣記曰待人而行豈虛言哉漢禮叔孫通為漢制禮雜以秦儀其說以為禮者因時世人情為之節文而古先聖王之制非所以施之於後卒使漢家之禮法度不立品式無章郊祀建而惑於天地分合之異宗廟立而疑於昭穆迭毁之說太學雜奉常之制明堂遵玉𢃄之圖上下相承風俗侈靡其所著為漢禮儀者又與律令同録而藏於理官非復視以為禮豈能有美教民定民志哉且漢以古今之俗不同而時措之宜不得不然耶韓延壽守潁川一旦變告訐之風而為禮遜之教議定嫁娶䘮祭儀品畧依古禮百姓莫不遵依其教何古人之禮可行於一郡而不可行於天下歟高祖草創之初未遑他務然猶有可諉者賈生論經制於孝文王吉明王制於宣帝此時而不為是終不可以反三代之禮也其後曹褒議定漢禮章帝授以叔孫通漢儀告以此制多不合經今宜依禮條正褒乃雜以五經䜟記撰以天子庻人制度凡百五十篇不數月而奏之夫以百五十篇之多斷以一人之見成於數月之間而雜以䜟記之言葢不待見其書固已知其紛駁而不純於古矣今去古浸逺而古禮之存於世者無幾有能博議而復之今日可乎其卒不可行於後世乎郊祀分合不同分祭合祭先軰辨之詳矣葢合祭本之開元禮宋朝因之一祖三宗太祖太宗仁宗英宗合祭天地于圜丘惟真宗中年分祭于太山睢上初年末年皆合祭于圜丘神宗哲宗末年徽宗初年皆祀天而下及祀地豈合祭當天地之心而分祭不合於禮乎葢古者一陽生而祀天一隂生而祀地皆一嵗而再蕆事務誠尚質事從簡易不厭其為數也後世誠質不足而虚文有餘三嵗合祭既為數怠而况於六年分祭其為䟽怠抑又甚矣是知分祭固當如禮當如古者一嵗再舉詳於正祀畧於虚文可也不然三年一郊必欲如後世之侈費不如合祭乃其宜耳詳見下叚郊祭䟽數不同大舜嵗周方岳所至柴望周以冬夏至之日分祭天地質勝文也漢高以常三年一郊見前漢郊祀志至武帝遂為定制大駕鹵簿皆用秦儀文勝質矣宋太祖太宗皆三年一郊惟太宗雍熈之元至淳化之四凡八年而後郊以星變也將南郊而彗星見宰相以問杜鎬鎬曰當祭日食猶廢祭謫見如此罷祀不疑從之八年之間日蝕者再真宗初年末年皆循常典惟中年以天書降東封西祀而後恭謝天地圜丘合祭之禮遂暫廢皆王丁諸臣以偽而亂常也仁宗四十二年非郊則明堂郊九明二祫祭祀恭謝二皆以三年一舉兼取郊以配天明堂以祀上帝之義遇灾變則恭謝於内殿亦合春秋不郊之意慶厯諸臣之力也英宗五年止於一郊其間惟濮議是講是究神宗將郊而河决王安石以為大祀不可廢於是末年祭天圜丘而地祇不與宗祀明堂而餘祀悉罷皆非也熈豐大臣烏得逃其責宣仁用慶厯故事則合祭哲宗用元豐故事則分祭其是否不齊可知矣徽宗即位十二年始合祀地祇於是圜丘方澤明堂頻年蕆事始也䟽終也數王蔡之罪也是知人主職論一相必得其人三才安常百度俱正茍非其人不徒人事不經而天地常祀亦從而變更矣人主之職不於此而致謹哉移郊為明堂配享不同郊祀后稷以配天宗祀文王於明堂以配上帝此禮之常也移郊為明堂天地合祭祖宗並配此禮之變也仁宗皇祐二年之詔曰明堂前代並用鄭康成王肅義說兼祭昊天上帝已為變禮祖宗三嵗一郊即遍祭天地而百神靡不從祀明堂正當三嵗親郊之期今移郊為明堂宜合祭昊天皇地祇奉太祖太宗真宗並配而五帝神州亦親享獻其日月河海諸神從祀悉如圜丘之儀遂以是年九月辛亥大享明堂嘉祐七年復以是月大享仁宗可謂適禮之變矣神宗凡再享明堂初享尤循皇祐舊典惟末年大享用新樂上以英宗配上帝而餘祀悉罷仁逹乎禮之常曽不知移郊為明堂三嵗一蕆事天地百神皆不及祀而止祀上帝祖功宗徳皆不以配而止於親禰其可乎是時王珪相蔡確章子厚並執政也馴至崇觀間冬祀圜丘夏祭方澤嵗享明堂月班正朔制度宏博煩文屢舉一嵗再赦濫恩頻行天下不勝其弊而靖康之變作皆由常變兩失之也太祖初立四廟高曾祖考也郊祀則以考宣祖配太宗郊則以宣祖太祖並配真宗初郊以太祖太宗並配祥符中以聖祖降乃祀玉皇于朝元殿以聖祖太祖太宗並配仁宗時祀上帝以太祖太宗真宗並配猶漢家尊崇高祖孝文孝武也神宗元豐中詔享明堂止以英宗配徽宗詔仁祖神祖永祀不祧又詔自翼祖至于哲宗建為九廟而已祧者盡復又類西漢之末盡復毁廟也餘見後太廟二議說郊丘明堂制度不同於郊故謂之郊掃地而祭席用藁秸器尚陶匏聖人之意若曰天地大徳備天下之物無足以稱之必尚質素乃足以示報本之意云耳不然過為繁縟祗所以為瀆也自漢泰畤有柴壇八觚其制雖非掃地之舊而後圜丘方澤皆有常度未為侈也其侈大不度則在乎千乘萬騎繁文縟典而已惟明堂之制漢武帝汶上之圖出於方士唐武后神宫之號原於佞臣其侈大異乎圜丘方澤之為矣按薛綜注東京賦曰於此頒教則曰明堂大合樂享射則曰辟雍司厯紀候氣則曰靈臺又按蔡邕論曰明堂即清廟也取其宗祀則曰太室取其四門立學則曰太學取其四靣周水則曰辟雍其實一也又按唐顔師古議曰周明堂即路寢也四靣有應庫雉門則是天子之常居也其青陽總章明堂太室及左右个又與月令四時之次相同或曰在國之陽或曰在國近郊始於孝經之傳大戴之說漢武有懐剏造溺方士之秘記啓後人之侈心也愚因三者之說而參諸宋朝之制仁宗即以大慶殿為明堂誠合古意以之祀天頒政皆可也何必他求哉徽宗政和五年詔建明堂於丙巳地至七年而始成其為侈大可知矣此皆蔡京變亂宋朝之家法也夫明堂所以感通神人帝堯土階文王茅屋斯亦足矣如其不然汶圖三層神宫萬象猶無益也郊丘明堂儀數不同宋朝循唐制禁衛五重一親從官二天武官三御龍宫箭直四御龍骨朶直五御龍直其中謂之禁圍闌入者有罪車駕行幸肆祀則前驅清道外設仗衛如殿中儀至於南郊亦循唐制命五使宰相大禮使學士禮儀使太常卿鹵簿使御史中丞儀仗使知開封府尹橋道轉逓使太祖次郊始用綉衣鹵簿鑾輅行至闕門則行勘箭勘契之禮真宗行幸肆祀所至皆然夫既移郊為明堂明堂又在路寢則郊與明堂儀數有不同者特有内外之間耳而其所以同者曰齊戒曰陳設曰省牲器曰奠玉帛曰進饋食也祀畢則百官之賞典六軍之賜賚亦無不同也然則郊與明堂其大費既同則禁衛乃内外之常儀而勘箭勘契示出入敬謹之意云耳移郊為明堂非為是也熈寧中以勘箭為胡法而去之崇觀微行實兆於此元豐間太常玉輅舍其舊而新之工巧殊常珠寳極備元旦將陳於大慶殿忽暮屋墜木而碎之於是復乘舊輅紹聖間金明池龍舟亦舍舊而别制工麗有加於前是日臨幸大風晦冥池水盡波竟不能移跬歩遂不復御乃知變更制度至于舟輿極矣天之示仁愛之戒亦昭昭矣大禮必簡能循祖宗之舊斯亦足矣何必更為哉宋朝郊悉用冬至惟太祖末年幸西京而郊用夏四月太宗末年以許王故用春正月皆非常典至大享明堂悉用九月上辛封禪郊丘明堂之意不同封禪之君七十二君行之久矣於秦漢乎何尤蓋古者封禪猶郊祀明堂示不忘本也自秦皇肆祀求仙而漢武慕黄帝祭封不死之説於是泥金檢玉祕記莫宣與郊祀明堂之意異矣宋太宗將有事泰山遇災而止敬之至也真宗封禪志在沮獷夷之暴安吾民之生仁之發也與秦漢侈心不可同年而語也夫日月星辰隂陽五行之精英體著於地象成於天下有庶民則上有繁星上有五星列宿則下有賢人君子帝王之尊配徳天極王侯輔弼亦應三公五諸侯此人之所以與天地鼎立為三才者形體精氣實相貫通也秦皇漢武不自知其身之尊猶天極然而登封降禪外求神仙不老之術是豈知麗乎形數者天地猶有晦㝠日月猶有盈昃而况於人乎人之形數雖有終窮而實未甞終窮者其精英變化猶秋冬斂藏而春夏復榮也知乎此則居易以俟命即神仙也何必外求哉天地神祇位號不同經言蒼天昊天旻天上天者取四時之氣言之也曰青帝赤帝黄帝白帝黒帝者以五方之色言之也自緯書出於漢鄭氏遂以青帝為靈威仰赤帝赤熛怒黄帝含樞紐白帝白招拒黒帝叶光紀又為六天之說以昊天上帝為北辰耀魄寳而五帝皆屬於太微於是唐天寳中尊崇道教天帝皆有位號未㡬而范陽之變起宋朝政和中上玉皇后土尊號其曰太上開天執符御厯含真體道玉皇上帝地曰承天效法厚徳光天后土皇地祇未㡬而靖康之變作乃知天地之大徳本不可名而况以尊號瀆之乎雖然舜類于上帝禋于六宗望于山川遍于羣神者毋不敬也祀典之不可廢者毋不舉也祭固不可以數而煩亦不可以䟽而怠也泰畤南北郊議論不同漢武祀天於甘泉祀地於汾隂人皆以為非成帝從匡衡之議而復南北郊人皆以為是然泰畤罷祀大風壊竹宫拔畤中大木以百數帝以問劉向向言甘泉汾隂及雍五畤始立皆有感應非茍營也又言陳寳夜光直祠之祥自秦至漢興不廢皆祖宗與賢臣所共定至尊至重難以疑說正也夫衡向皆儒者而所言之異如此果孰是孰非也葢神明無徃不在初無彼此之間敬心存焉不以侈没禮皆可也古者聖人不輕剏亦不輕改者有其舉之不可廢也所可廢者如後世所謂滛祠也如其至尊至重當如劉向之言不必過為異論六宗解釋不同六宗者日為陽宗月為隂宗五星五行之宗辰次列宿之宗北斗辰次之宗北辰衆星之宗也舜既類上帝則六宗其可以不禋祭乎如昔者圜丘之制既列上帝之位則日月星辰斗極之次各得其所也夫上帝六宗皆天也故又謂之天宗山川羣神皆地也故曰地祇歸格于藝祖用特告祖廟也是天神地祇人鬼皆可得而禮也然六宗之說數十家或主祭法以為泰昭祭時坎壇祭寒暑王宫祭日夜明祭月幽宗祭星雩宗祭水旱韋昭以為除其天地於上遺其四方於下中取其六而言之非也昭於是取地數六之說以社稷等祀是也不知社稷之外以何祀足之而為六乎又望于山川得非地乎遍於羣神社稷豈不與乎顔師古於是主乾坤六子之說是八方亦遺其二也韋昭說見東漢志師古說見西漢郊祀志注或主三昭三穆之說以去而告廟歸而格祖也曾不知去而告然後類于上帝可也不應先類而後告也然則漢唐諸儒不知其㡬人而六宗之說不及日月星辰斗極何也葢古者合而言之曰天分而言之曰帝類者各因其方之色而祭也合而言之曰星辰分而言之曰北辰北斗五星列宿十二辰也自鄭康成釋經見書注又見唐志以北極太乙紫微為昊天上帝而又以五帝為太乙之佐故後世儒者不復列北辰為衆星之宗也夫子曰為政以徳譬如北辰居其所而衆星拱之愚敢以聖言為證元魏禮志以六宗為六天之神亦拘鄭氏六天之說也太乙九宫貴神泰郊四畤禮八神齊地八山漢初祠黒帝蚩尤靈星又以梁巫祠天地晉巫祠五帝泰巫祠社荆巫祠司命文昌第四星祭法七祀一曰司命主督察三命九天巫祠九天鈞天蒼天旻天𤣥天幽天昊天朱天炎天陽天是也夫司命靈星蚩尤皆天星也皆有祠焉而况於北辰天極之尊乎漢天文志天極星其一明者太乙也即第二星也赤明者是也旁三星三公也武帝時或曰五帝太乙之佐也公孫卿符以黄帝登仙之事遂立太乙祠壇即甘泉泰畤也以上見前漢郊祀志唐謂之太清紫極宫宋朝謂之太乙宫然皆與原廟隣者唐祖𤣥元宋朝祖黄帝聖祖之像存焉故祖宗神御皆奉安於此也此雖出於方士而天極一星昭昭也唐天寳中又用田同秀之言而立九宫祠者按黄帝九宫經其神太乙即天極一星也又其神曰攝提曰軒轅曰招揺曰天符曰青龍曰咸池曰太隂曰天乙多北斗左右前後之星所謂貴神也又曰其星天蓬大任天芮天衝天輔天禽天心天柱天英者今術家類能言之與天文志雖有異同凡曰天星不可誣也如司命司中之類歴代以為常祀尊而敬之可也狎而瀆之不可也鄭康成以北辰為耀魄寳新唐志所以非之者以其名不經且近乎瀆非所以尊天也天下宫觀祠祀宋太宗作崇政殿祠太乙宫將封泰山以文明殿災而止於是終太宗之世無所作為仁宗作受命寳建太乙而玉清昭應宫災文徳殿成而是夜禁中火於是四十二年惟災異之聞而無大工役真宗作玉清鴻慶景福宫建天慶元符㑹靈太極祥源觀皆起於天書之瑞徽宗建帝鼎寳録萬壽宫改大覺真仙寺院悉為宫觀皆起於豐亨豫大之說善乎李公沆之為相日奏四方災異葢慮宫室禱祠之事興也不然則木征降而致靈州之敗王韶方臘擒而致女真之師童貫外寧必有内憂又非止宫室禱祠之事而已人主其可頃刻忘儆戒之意乎太社太稷天子有太社祀用仲春上戊戊屬土也社至用石壇方五丈諸侯半之土數五則土宜五尺准隂之二數宜方二尺方其下以象地體剡其上以象物生埋其半以根在土中本末均也至人間之社則各以其土之所宜木所謂以松以柏以栗也社壇四方其土各隨其方之色惟中央用黄而復遍冐以黄土者象王者覆被四方也太社帝社也籍田王社也以王為言别於諸侯也王社在籍田中載芟云春籍田而祈社稷是也稷壇在太社壇之西其廣與大社同而不備方色所以異於太社也此唐神龍中韋叔夏引韓詩外傳言此制也於是准令用孟春吉亥祠后土以勾龍配至開元定禮配神農於壇而以后稷配又按漢書郊祀志漢興已有官社未立官稷於是復立官稷所謂立漢社稷也以夏禹配官社平水土也以后稷配官稷粒烝民也光武中興不立官稷唐以來社稷為中祀天寳升為上祀祀用太牢然則社稷分合其義孰當愚謂土爰稼穡其本一也社為九土之尊稷為五榖之長稷生於土分祭合祭皆可也祭主乎誠而已誠茍不至分祭何益宋太祖糊名考太社祝文文稱宋天子某太祝持板進於神座之右西向讀之皇帝罍洗並如圜丘之儀仍奉巵跪奠可謂誠矣至矣唐故事見㑹要宋朝事見類苑至仁宗嘉祐間河決侵太社太稷壇是則太社太稷分祭而人間之社則合稷而為一耳祭法曰王為羣姓立社曰太社王自為立社曰王社與韋叔夏之言異而意同籍田先農宋朝太宗親耕帝籍仁宗祀神農于壇乃就耕位則知籍田之中有王社明矣祀先農於王社則用正月吉亥者上辛祈糓于上帝亥後於辛三日即於是日親耕也唐開元中上封事者言月令八月日月㑹于壽星為列宿之長請毎至八月社日祀壽星於太社壇遂設壇並祭角亢七宿又升日月五星為大祀列宿為中祀天子皆申拜禮唐舊儀注立秋後辰日祀靈星即壽星次也夫耕籍田祀先農先蠶不失為重本之意能如漢文帝有减租之實則又勝於開元之虛文能如東漢馬后之躬儉練衣則親蠶之義在其中矣臘蜡五祀宋朝火徳王火庫在戍故建隆初即以戍日為臘而蜡百神祀社稷享宗廟同用戍日今春秋二社乃用上戊者何也葢蜡百神祀社稷享宗廟者乃十二月臘享也與春秋二社正祀不同唐以土徳王故臘享用辰土庫在辰故也五祀者户竈中霤門行也春屬木木為肝月令則曰祭先脾夏屬火火為心月令則曰祭先肺中央土土為脾月令則曰祭先心秋屬金金為肺月令則曰祭先肝惟冬屬水祭先腎之言相同其他所屬皆相違何也風伯雨師雷師唐天寳以前風伯雨師為小祀天寳四載升為中祀五載又祀雷師與雨師同壇共牲别置祭器仍令諸郡置風伯壇於社壇之東雨師壇於社壇之西各稍北三數十歩其壇卑小於社祀風伯用立春後丑丑近箕星次也祀雨師用立夏後申申近畢星次也天子申拜禮别撰樂章今州縣祀典亦然葢因唐制也又開元中有興慶池龍壇貞元中祭五龍壇元和中孟夏行雩禮遂幸興慶宫祠龍壇隨有感應葢龍致雷雨皆神物也今所在皆然嶽瀆山川武王伐紂所過名山大川稱周王而自名唐武徳親祠華岳舊儀上祝版御名北靣再拜謹遣證聖間有司言天子父天母地兄日姊月於禮有再拜之儀其五岳視三公四瀆視諸侯天子無拜公侯之禮貞元中裴堪奏禮記云非其臣則答拜鄭康成注云不臣人之臣也星辰岳瀆是天地之從官人君不得而臣之也故開元禮祭岳瀆禮文皇帝稱名又云謹遣於義有必拜之文遂復申拜禮然舊禮因郊祀望祭岳瀆天寳始有遣使祈福之祀至徳中加號東岳天齊王西岳金天王中岳中天王及諸岳瀆王公之號宋朝復加天齊王為帝是五帝天地人皆有之矣毎嵗常祀九朝事畧帝紀所載惟郊丘明堂封禪親享太廟親耕帝籍初置諸宫觀乃特書如毎嵗正月上辛祈糓于圜丘又祀感生帝立春日祀青帝於東郊祭東方嶽瀆海鎮之類四時凡七十二祀並不書者皆有司行之非天子親舉大禮也考之唐㑹要亦然貞元中太常卿齊抗奏毎年大小中祀凡七十其四立二分二至臘祭其用上辛吉亥者葢謂節氣也其後寅後申後亥後丑等日葢謂星次也氣行有時星位有次舍或定用日或用辰不可改移宜依舊制其有别禱祭即是太卜擇日遂為故典又按東漢禮儀志注正月上辛祀南郊注引尚書丁己用牲于郊先甲三日辛也後甲三日丁也皆可接事昊天之日然則古今所用以祀神之日皆有據也今所論者皆一代體大事重者也如其備文而不親者皆畧焉羣書考索續集卷二十五
