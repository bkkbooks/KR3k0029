body:
  text: 羣書考索續集卷四十二宋章如愚編兵制門三國養兵三國養兵漢末䘮亂州牧如劉虞劉焉劉表各守分界坐視成敗者惟藉勸課農桑以自保其或交兵以争覇者惟藉也田以足食不然則為二袁取給於桑椹蒲盈而已是故孔明始以乏粮退師終也屯田渭濵為久駐之資不獨孔明為然也呉陸遜先甞為海昌屯田都尉見本傳其後以所在榖少表令諸将增廣田畆呉主父子遂受田與衆均其勞逸又其後也正始二年呉主遣校尉陳勲将屯田士鑿句容道至通㑹市作邸閣為積榖之所又吕蒙傳云蒙及甘寧督拔皖城遂賜蒙以尋陽屯田六百户夫孔明屯田於乏糧之後當不藉此以為養兵之助也趙充國屯田金城乃獨為後世法或者未詳其故耶神爵元年六月戊申上奏七月甲寅賜書報可往來凡七日也既破先零之衆復受䍐开之降乃奏留屯積榖以待其斃自是奏報集議至於再三計得可報乃是年十月之交也是月也非田作時矣明年之春方計口賦田布江入種甫夏五月即請罷兵上可其奏振旅而還是所耕之田猶未及耕耨也尚何積榖之有哉向也奏請屯田如是之䔍今也未及積榖即已凱旋何先後之自戾耶意者先零方强宜留屯以待其斃先零敗亡所有無幾冝罷兵以息民也然是時降𦍑凡三萬五千餘人上方置属國於金城以處之而不分其黨此非䇿者也充國胡不留屯為之措畫循用武帝散處降人於邊郡之䇿耶昔者充國之言曰湟中之榖止糴四十萬斛遂致𦍑人反叛今也留屯積榖維其時矣慮不及此而速欲振旅方欲面陳利害為後人法是不過曰致人之術在於先聲後實而已及置属國充國止謂辛湯使酒不足任此責耳不知是後降𦍑屢反至於東漢其反益甚遂至有棄涼州之議永平中豈特為辛湯使酒而然耶東漢叚紀明上䟽曰先零作難充國徙令居内煎當亂邊馬援遷之三輔始聚終叛至今為梗是知宣帝光武君臣每事過於武帝獨是一節所不及也漢承井田既廢之餘養兵之具有司農倉升五稅一盡在郡國即今所謂秋苗稅也有筭賦錢百二十供士馬車徒之費即今所謂調也六十三文入司農五十七文入郡國卒更之不役者出平價即今所謂庸也庸錢悉在州郡有屯田有平糴宣帝時耿夀昌奏糴三輔榖省闗東漕又奏邊郡築倉糴穀名曰常平倉即充國所言者有鹽鐵官武帝輸之京師光武盡歸郡國水官漁稅利工官百工稅酒酤之利所以田稅獨少三國用兵始末和帝而下凡八世母后外氏利於立幼主以自專故宦官權倖亦得誅鋤外氏以為巳功此禍亂之原也鄭衆誅竇憲王聖陷鄧隲孫程立順帝單超元侯誅梁冀曹莭誅竇武張讓誅何進少帝即位後為董卓所廢何后臨朝何進欲復宦官之仇而反召外兵進已為張讓所殺董卓來而更立獻帝生方十年曹氏得挾之以令諸侯天下三分漢遂以亡禍亂之極也於斯時也南北單于東西𦍑黄巾諸盗十去八九矣内則董卓王允李傕自相屠戮外則牧守諸侯争為雄長為曹氏者曰吾夾輔漢室者也為孫氏者曰吾求殺漢賊者也為劉氏者曰吾興復漢祚者也於是操終身不敢簒漢而其子方得之備權必待山陽禪魏而後自帝自王此三國所以能鼎峙之勢建安二十五年也也若夫劉焉益州牧劉虞凉州牧劉表荆州牧坐觀成敗二袁術自稱天子紹自稱大将軍吕布公孫瓉妄自尊大無不以興漢為名者隨即消没是則三國託公以行其私者即詐力之雄也曹氏詐力兼之故先得竒貨建安元年孫氏詐力次於曹故保有江南建安六年權襲䇿位惟劉𤣥徳有用智之志而無其資故得蜀最晩自曹操起兵之初討董卓即建炎元年𤣥徳方為平原公孫紹存相乂領徐州牧代陶謙既降吕布而復歸曹公既歸袁紹而復依劉表在荆州驚日月之邁始得諸葛亮於隆中又二年而始得益州自初至是十九年矣十九年之中曹公首得荀彧次得荀攸賈詡郭嘉之徒孫氏父子亦有張昭周瑜魯肅軰𤣥徳之所恃者惟闗張鬬将耳自得孔明始於棋枰之一隅旋成活計復欲謀人非詐力何從而得之惜乎得孔明之晩也孔明王佐才也規取劉璋未免數計是特可以兼弱攻昧為之辭耳其欲與呉為援者孔明之正也𤣥徳既背借荆之徳復懐吞呉之志雖與孔明情猶魚水而是志未免乎異趣先主殂而孔明始得行其志抑又太晩矣故自顧廬以來二十一年呉蜀方有合從之勢亮出兵攻祁山駐漢中權破曹休於夾石不數年而亮卒七年得非天乎然則三國之君皆以詐力為用兵之法惟孔明未可以是而例論耳孫權以妹妻先主又以荆州借之非惟孔明欲與呉為援而呉亦欲與蜀為援也惟周瑜有吞蜀之志君臣各自異趣所以不能併魏也瑜死先主殂孔明孫公方合從而亮卒者天也然則孫公雖詐力猶有可取者三國用将三國用兵雖以詐力而其用人則有間矣凡漢末不幸失身於曹氏者亦皆覊紲於其詐力之中而不能自為去留禰衡孔融乃欲以氣凌之以義正之固宜其不免彼有大功於操如二荀者亦且一死一生其餘庸陋者姑從豢養以茍活爾若劉先主則不然非特視闗張猶父子孔明猶魚水也其於許靖法正軰亦皆遇之以誠惜其用兵之踈不及用人之篤而已至於孫公猶有足為今日言者呉之人才孰有過於周瑜者始為春榖長終於南郡太守亞瑜之才者魯肅也始為賛軍太尉終於漢昌太守代肅之任者吕蒙也蒙甞為廣徳尋陽令又為廬江漢昌南郡守繼蒙之後者陸遜也遜甞領海昌縣事歴宜都零陵江夏南郡守其他如程普黄葢甘寧徐盛潘璋朱然朱桓賀齊凌統全琮吕範皆智足以御衆勇足以却敵未有不為守令之職者初未聞有徒勞州縣之嘆也方陸遜大破曹休於夾石振旅過武昌孫公賜以上珍復令還鎮賀齊平丹陽呉歙之㓂被命詣在所作樂舞象以寵之復令還鎮是則孫公之用人亦必有道矣三國惟呉獨後亡使孫皓能循故轍不忽陸抗守西門之䇿猶未易量也蜀丞相亮呉太傅恪皆主兵周瑜吕蒙陸遜皆為大督其為将佐者有征北征西之號皆臨事加之其初不過一守臣爾凡三國職兵名更不必辨又三國之君所以待其臣者如此為之臣者盍亦思所以去就之義矣荀賈託身非地或者顧以良平目之識者謂其先見猶未及許劭之月評是安足以語良平去就之義諸葛孔明周公瑾皆一世英傑其不仕魏明矣劉表近在荆州二子曾不屑顧亦置之不足語之域也孔明欲與呉為援而公瑾乃勸權留備二子志度不無等級使其叶謀同力常如赤壁一戰雖百曹氏其如呉蜀何雖然二子之才皆未容䡖訾也先漢知兵韓彭衛霍輩大畧皆武夫惟張良從容文義而又未甞獨将晁錯談兵鋒起遇變輒欲居守馴至貢薛韋康言及兵事則漠然無對東都自光武身兼幾畧而㓂鄧祭遵亦文武兩具三國以來其君或横槊賦詩或觀書俱曉大義其臣或優游談笑於赤壁淝水之戰或䡖裘緩帶射不穿札而收平呉之功類皆臨危不懾遭變不廹其視後世處常失措者相去當幾倍耶豈五行英氣散於天下人才秀發固應若此又何昔之多而今之寡耶抑豈未有以振之必臨事而後見耶愚葢未知其說也赤壁逆戰淝水附孫公謂周瑜曰卿與子敬魯肅程公名普便在前發孤當續發為卿後援邂逅不如意便還就孤當與孟徳次之瑜等遂将兵與劉備併力逆操進與操遇於赤壁操兵大敗是役也可以為東南守禦之法葢長淮大江其阻非一晉之入呉呉城望風而奔降驚北來諸将之飛渡由呉主不能用而孫公則未甞一日不然也孔明屯田於邊郡而呉之潯陽今江州也海昌今塩官也是内外郡莫不皆然也又不獨呉主為然也赤壁之後曹公明年自渦入淮軍合肥開芍陂屯田其後又使朱光屯田廬江皖城不徒惟是自中平以來曹公以棗祗為都尉以任峻為典農屯田許下得榖百萬斛於是州郡例置田官所在積榖征伐四方無運糧之勞是則曹公屯田乃在於破黄巾定許之時葢不在乎三國鼎峙之後也是時州郡例置田官亦不止芍陂皖城許下而已也然則孔明何獨知之晚耶葢先主與孔明相遇於十九年之後既得蜀復北拒魏東拒呉南平西南夷根本粗立然後出祁山以木牛運出斜谷以流馬運非固為是巧思不即屯田也蜀之境土狹於呉魏斜谷箕谷单徑千里非屯田之所也必屯渭濱而後志獲伸耳晉兵西晉合離始末晉之所以能禅魏者由世執魏柄而其所以能吞呉蜀者由晉之君逺過劉禅之庸孫皓之暴也是故三國交攻時猶六國然外夷安得而進及三國併而為晉亦猶六國盡入於秦於是天子復與四夷為隣矣秦人猶知築長城以限胡藉積威以震殊俗晉武則處𦍑胡於内地拓跋祿官劉淵父子石勒慕容廆等已在焉郭欽許徙内郡各羌於邊地江統亦作徙戎論帝皆不聽撤州郡之兵備陶璜山濤諫皆不聽秦人猶知以詐力并兼天下故罷侯而置守晉武不度其所以取魏者何道而妄欲封建諸王東宫不立賢而立愚騃不立齊王攸立恵帝子妃不擇善裔衛瓘女而擇昏荒之女賈充之女賈后也身死未幾蕭墻變起無一日寧骨肉相殘幾無遺類其亂又甚於東都之季矣公卿大夫養恬怙侈賢士名流清談相尚牧伯無孫曹之智宗盟無𤣥徳之志夷狄亂華天下遂分為南北者三百年由元氣耗極而外邪之所惑者深也吁羊祜進平呉之䇿山濤欲釋呉以為外懼吾是以知祜之先見不如濤秦兼六國隋混南北適為漢唐驅除而晉并三國乃為拓拔之地相去特唯阿爾然晉氏中興江左尚百餘年秦隋之祚皆不過二世吾是以知柔弱猶勝於强暴也然則南北朝弱固不能以勝强而强亦不能以吞弱者大畧皆然歟東晉與五胡不能相統一祖逖雍諸戎禇裒彭城桓温覇水謝𤣥淝水劉裕闗中西晉一再傳五十年間而中土淪胥由不能齊其家以治國故雖有混一之名而無平天下之實也然不以苛政滛刑得罪於臣民故一時忠臣悲其君之降辱相繼殺身以成仁一時義士聞其國之傾覆相與紏合以興復也元帝植根江表單獨甚矣王導軰翼而振之亦足以成中興之功自是以來更十一世明成康穆哀海西簡文孝武安恭傳百餘年其君類多冲幼孱弱其臣類多英毅奮發此東晉雖不能復中原而五胡所以亦不能吞晉也祖逖雍丘之役元帝即位之四年黄河以南盡為晉土然未即推鋒越河者内則有王劉之難外則有石勒張賔與之為敵也逖應妖星之次年勒亦發天奪張賔之歎此則王厚蘇峻祖約相繼内向彼則二趙相攻凡六年而後定誠無暇於交兵矣自逖死祖約退屯夀春郄鍳退屯合肥王敦退保盱眙劉遐退保泗口於是同豫徐兖之地復入於後趙以淮為境矣陶侃庾亮庾翼軰雖有志於中原而未甞大舉北伐石勒死石虎殺其子而自立是年侃亦卒咸康五年亮欲北伐以蔡謨議而止石虎卒時翼卒已五年矣褚裒彭城之役穆帝永和五年也葢乗石鑒石遵之鬬而欲收漁人之功也奈何穆帝幼冲時年七嵗母后臨朝裒以后父之尊而無御衆之才桓温殷浩交相為仇會稽王昱引浩以抗温而裒居其間曾無調䕶之方一敗塗地敗於代陂慙恨而卒固其宜也方裒之北伐也蔡謨獨以為不可未幾而有代陂之敗裒退之次年殷浩再舉北伐王羲之獨以為不可未幾亦有山桑之敗人皆以二子為知言而不知桓温之才非二子之所能料也温之伐秦也直抵覇上而其伐燕也進據洛陽永和七年伐秦九年伐燕是舉也中原可復矣其如温有不臣之心何方温之至㶚上也咫尺長安而不度㶚水王景畧得以窺其量矣温之據洛陽也枋頭之敗隨輒失之此苻堅所以蔑視晉室人才而銳於一來也曾不知謝安石昔甞從容談笑沮桓温不臣之心今也圍棋賭墅坐却秦師固有餘矣淝水之役不戰而敗與曹公赤壁之戰同不二三年三謝繼殂亦與周瑜魯肅之早世也同一轍其何以復中原哉苻秦自淝水之敗其國裂為八九更相攻伐生民塗炭者二十三年姚萇據長安為後秦乞伏國仁據抱䍐為西秦慕容垂據鄴為後燕吕光據姑臧為後凉又其後也李髙據敦煌為西凉禿髪烏孤據潁川為南凉沮渠䝉遜據張掖為北凉慕容徳據滑䑓為南燕馮跋據和川為北燕赫連勃勃據朔方為夏劉宋髙祖受晉禅諸國盡入於元魏東晉自淝水之勝未及三年三謝既殁孝武引沙門居内殿委政於琅琊王道子安帝即位道子猶存桓𤣥舉兵内向而孫恩盧循之妖賊相繼竊發晉無寧息之日亦二十餘年劉裕奮自草萊内平㓂亂外伐燕秦燕超折北秦泓面縛中原已在掌握徒以劉穆之之死而返斾以圖晉者所仗無良平之智也愚甞謂南北强弱變故相當所以不能相統一惟劉裕闗中之役為可惜次則桓温㶚上之功而已使桓劉能為桓文尊周之舉則不失齊晉之封晉氏能使之自取中原且自為守則晉祚其有興矣惜哉宋齊與元魏不能相統到彦之河南滑䑓崤峽之役蕭衍義陽並附東晉中興以後大畧君弱於臣而五朝亦自相吞噬宋齊之初興也大畧臣劣於君而元魏諸君亦足相當天分南北豈偶然哉宋髙祖自闗中返斾之後不四年而受晉禅是時北方諸國亦併入於元魏十且八九矣惟赫連夏未即服文帝承髙祖之業元嘉之政獨冠江左魏太武席元明之烈神䴥之政亦有足稱方到彦之以庸劣之才而規復河南乃與夏人有中分河北之約崔浩以為連雞不能俱飛彦之泝河而魏主斂戍避之俟河氷復合乃更取之皆不逃魏君臣之所料彦之與夏人聲援兩不相接魏安頴等濟河而南杜驥失守於金墉尹冲屈辱於虎牢竺靈秀繼敗於湖陸朱維之見執於滑䑓彦之焚舟南走而檀道濟亦唱籌量沙而得免自是以來宋魏不大舉者二十年迨夫王𤣥謨以大言而起文帝封狼居胥之意於是栁元景薛安都據崤峽而𤣥謨拔滑䑓魏太武亦來揚州相與易地此登石頭而望方歎無檀道濟之才彼自𤓰歩北歸亦已惜崔浩之死又其後也彼有宗愛之逆元嘉二十九年也此有子劭之禍三十年也何强弱變故適相契耶宋孝武酗虐明帝賢明蒼梧昏暴順帝即禅位於蕭道成自時厥後南北不相攻伐者四十餘年自王𤣥謨滑䑓之役止齊建武二年蕭衍義陽之役通計四十四年由此之君多昏庸而彼之主多早世也魏文成年二十六獻文年二十三為馮后所弑蕭齊髙祖逆取順守與魏通好魏孝文貶夷狄之俗修帝王之制亦初無并齊之心自魏邢巒北歸始謀伐齊義陽之役實齊明帝建武二年也此則猜忌而盡戮髙武子孫彼則舍代遷洛亦将有穆泰陸叡之變並建武三年彼有王肅劉昶為之謀主而此亦有蕭衍間道以解義陽之圍又二年建武四年魏主南來迭有勝負此則房伯玉劉思忌蕭衍等皆退敗彼則王肅㑹義陽而救滑陽之急未幾齊適有喪明帝崩而魏亦有榖塘之變魏主北還死於此自是齊東昏愚而狂暴魏孝宣弱而信讒以彼料此亦足相當此其所以不能相統一也梁陳與魏不能相統一梁蕭宏洛口韋叡鍾離陳慶之洛陽陳呉明徹淮南彭城梁武帝自解義陽之圍止四年而轉齊為梁嘗觀帝在位四十八年而魏之所更者七主孝宣懦弱孝明幼冲為胡后所弑孝荘惡終為爾朱昶所害孝武見逼為髙歡所逼魏於是分為東西矣髙氏宇文氏握其權彼更七主此止一君此豈不善於彼哉然蕭寳寅帝讎齊明帝之子也助魏而㓂梁猶可也蕭綜帝子也亦叛梁而入於魏蕭正徳近親也既入魏而後歸於梁太子統以巫蠱而早世劭陵王綸以愚騃而犯上武帝之臣子如此皆其任計數之報也果何以過於魏哉彼受寳寅則終亂闗中是時魏之元法僧元顥元恱元䧏元慶和亦叛魏而入於梁此受侯景則貽禍䑓城彼任盧昶軰則此任朱昇彼崇佛法肅宗胡后則此亦捨身即彼驗此無一不同梁止一君亦何異於魏之七主哉是故武帝即位之五年蕭宏洛口之役挾數十萬衆怯懦不前積嵗軍資委頓殆盡為魏元英所敗次年韋叡鍾離之役元英单騎而入梁城諸軍逐北而至濊水一勝一負乃其常也自是以來凡二十有二年而後陳慶之有洛陽之勝其始也易於破竹其終也削髪逃歸亦其當也二十二年之間為梁将者馬仙琕韋叡康絢張齊裴蘧夏侯亶湛僧智為魏将者元英邢巒辛祥盧昶崔亮傅立眼元琛楊延或争懸瓠三闗或争朐山夀陽或争武興廣陵互有勝負未甞深入惟陳慶之入洛魏孝荘北走爾朱榮渡河慶之逃歸武帝殁於䑓城止八年而梁轉為陳矣陳覇先因北齊蕭軌之㓂建康也勇於一戰因以得國者由梁末骨肉分布境土日蹙其權易移也髙祖文帝在位日淺誠無暇於北伐至宣帝時始謀伐齊自梁敬帝時至此纔十八年淮南之役呉明徹一勝由北齊髙緯所用非人也用皮景利怯将尉破明下才彭城之役明徹一敗由氣盈而不用忠言也蕭摩訶一勝一敗如奕棋然自劉裕闗中桓温㶚上之外大畧皆然然則何為而然哉葢自開闢以來地雖有中外之分而天之愛民則一有徳者佑之無徳者驚之興亡得喪史不絶書此自然之理天亦無所偏厚扵其間也六朝兵六朝掌兵之職敎戰隋志歴叙漢魏至於梁陳百官之制大抵畧同雖梁武帝置戎狄之官百有餘號並施外國凖於中夏亦因漢之四征魏之四安與夫四鎮四平渡遼陵江之舊也梁有衞尉掌宫門屯兵有左右衛率掌諸營兵有領軍驍騎等六将軍左右前後四将軍中郎将屯騎歩騎等五校尉羽林虎賁等将軍皆分司殿中侍左右即漢之南北軍也呉之大督吕䝉陸遜晉宋之莭度諸軍王渾或都督中外諸軍事琅琊王裒王導賈充褚裒亦猶漢之大将韓信太尉周勃大将軍衛青大司馬呉漢之類皆元帥之任也夫六朝皆在偏方而掌兵之職不減於二漢其名益侈其實未必皆備者南北相夸率以為常也隋志又歴叙六朝蒐苗獮狩之制宜造類禡之典蒐苗等制並見隋禮儀志殆與成周盛時無異至於交攻迭鬬惟詐力是恃無復周官司馬法矣孟子曰春秋無義戰彼善於此則有之如元帥之任晉用外戚賈充褚裒宋梁用親王宋用義真等梁用蕭宏等不若晉呉擇能而任之周瑜謝𤣥所謂六朝教戰之法徒具其文亦未必如周瑜謝𤣥能以少擊衆也又諸葛孔明魯子敬與其君言無一不酧謝安石内舉其姪足為将帥安石内舉見謝幼度本傳越明年乃有淝水之㨗温嶠陶侃郄鑒軰智勇兼之皆足以持顛扶危此皆非偶然者也自宋髙祖倚仗劉穆之竿牘之才而文帝復振迅於王𤣥謨大言之士梁陳之間如韋叡者獨不多得若陳慶之呉明徹軰回視一國東晉人才益劣矣不獨此也宋文帝驅六州民兵梁武帝用兵動數十萬其與苻秦元魏籍民為兵也何異其回視周瑜之三萬謝𤣥之八千又何如哉愈變愈下此南北朝所以一於隋也南北養兵三國六朝北伐以乏糧而返者固不少諸葛亮桓温是也祖逖攻劉豹囊土以為米檀道濟取河南唱籌而量沙王鎮惡取給義租朱脩之至食熏鼠五胡元魏南㓂以乏糧而遁者尚多有之石勒魏佛狸元英是也劉淵攻南陽以乏糧取葉倉孟表守渦陽至屑木葉是故宋元嘉中或借富民僧尼之貲或減内外官司之俸元魏永泰初亦減冗官之祿或獻親王之給誠知用兵固難而養兵尤不易也甞觀隋食貨志歴叙東晉至於梁陳皆收蠻酋賧物珠犀之利州郡任土之賦王公佃戸之稅編民租調之入以供軍用大抵自侯景之亂國用常褊不復有如呉蜀晉宋行屯田之䇿者矣至於元魏自永安以後征伐皆權調於民或折絹糴粟收塩錢以充軍自分為東西北齊有都子使以收屯田之利後周有六柱國以給府兵之資於是宇文髙氏兩虎交鬬如渭曲金墉之戰邔山玉壁之戰未甞聞以兵食不足為憂者以有屯田府兵之制也然則周齊陳之混一於隋也雖皆由後裔之昏暴而其用兵養兵之備梁陳反不周齊若矣宋何承天安邊論所謂二科者和戰是也要在大田淮泗内實青徐庶幾一舉蕩夷無但遣軍報復也所謂四䇿者徙新附實内地築城邑纂軍課丁仗也宋文帝且不能用其在梁陳益可知矣隋兵隋兵民之盛天下盛强莫如秦隋興亡之易亦莫如秦隋者由以力而不以徳也然而隋文混一南北躬行勤儉屯田亘長城之北社倉逹華夏之境古今户口財賦兵民之盛未有不稱開皇者夫隋之天下即南北朝之天下也何昔衰而今驟盛耶攷之隋食貨志山東舊俗巧偽避役詐為老稚規免租賦帝乃令州縣大索貌閱戸口不實者正長逺配而又開相紏舉之科大功以下並令析籍人自為户於是丁口倍進然後知其户口之盛由捜抉剖裂而增之財賦之羡由嚴刑峻罰以聚之而兵民之衆由驅率丁中而為之也貽謀不善顛覆隨之兵民轉而為盗財貨適為盗貨矣嗟乎莭用愛人本非二道隋文吝儉乃為驕侈之地者由志不在民故也羣書考索續集卷四十二
