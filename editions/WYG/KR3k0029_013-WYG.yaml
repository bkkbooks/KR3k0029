body:
  text: 羣書考索卷十三宋章如愚撰正史門西漢類班彪字叔皮扶風安陵人也彪既才髙而好述作遂專心史籍之間武帝時司馬遷著史記自太初以後闕而不錄後好事者頗或綴集時事然多鄙俗不足以踵繼其書彪乃繼採前史遺事傍貫異聞作後傳數十篇因斟酌前史而譏正得失嘗又以爲司馬遷細意委曲條例不經若遷之著作採獲古今貫穿經傳至廣􅀶也一人之精文重思煩故其書刋落不盡尚有盈辭多不齊一今此後篇慎覈其事齊整其文不爲世家唯紀傳而已論曰班彪以通儒上才傾側危亂之間行不踰方言不失正仕不急進貞不違人敷文華以緯國典守賤薄而無悶容彼將以世運未𢎞非所謂賤焉恥乎何其守道恬淡之篤也固字孟堅年九嵗能屬文誦詩賦及長􅀶貫載籍九流百家之言無不窮究所學無常師不爲章句學大義而已父彪卒歸鄉里固以彪所續前史未詳乃潜精研思欲就其業既而有人上書顯宗告固私改作國史者有詔下郡收固繫京兆獄盡取其家書先是扶風人蘇郎僞言圖䜟事下獄死固弟超恐固爲郡所覈考不能自明乃馳詣闕上書得召見具言固所著述意而郡亦上書顯宗甚竒之召詣校書郎除蘭臺令史與前雎陽令陳宗長陵令尹敏司𨽻從事孟異共成世祖本紀遷爲郎典校祕書固又撰功臣平林新市公孫述事作列傳載記二十八篇奏之帝乃復使終成前所著書固以爲漢紹堯運以建帝業至於六世史臣六代謂武帝史臣謂司馬遷也乃追述功德私作本紀編於百王之末厠於秦項之列太初以後闕而不錄故探纂前紀輟輯所聞以爲漢書起元髙祖終于孝平王莽之誅十有二世二百三十年綜其行事傍貫五經上下洽通爲春秋考紀表志傳凡百篇紀十二表八志十列傳七十合百篇前書音義曰春秋考紀謂帝紀也言考覈時事具四時以立言如春秋之經固自永平中始受詔潜精積思二十餘年至建初中乃成當世甚重其書學者莫不諷誦焉永元初大將軍竇憲出征匈奴以固爲中䕶軍及憲敗固先自免官洛陽令种兢心衘固因此捕繫固遂死獄中班固非有漢羣祀三十六篇議對十九篇則孟堅郊祀志何所攷證而作也非有漢著記百九十卷大年祀五篇則孟堅十二帝紀何所攷證而作也作董仲舒傳則知有仲舒繁露作劉向傳則知有説苑作陸賈傳則知有陸賈新語固之條例有司馬遷作之於前而已放之於後其所變者不過増八書耳史通云史記止太初其後劉向劉歆馮商揚雄之徒撰續迄哀平建武中班彪以雄歆僞褒新室乃採摭作後傳六十五篇子固以父所撰未盡乃起髙皇迄王莽十有二世三百三十年爲帝紀十二表八志十列傅七十凡百卷史通云班固漢書全同太史太初以後又雜引劉氏新序説苑七畧之辭章帝初固坐竇氏事卒於獄書頗散亂帝詔其妹昭與馬融等就東觀緝校今八表及天文志其所補也史通云乃待詔馬續所作也而古今人物表尤不類本書漢服虞辭爲音義又有晉灼臣瓚等説蔡謨固附著之而唐顔籕爲注范曄後漢書班固著續書其八表及天文志未及竟而卒劉昭補志序云續志昭表以是推之八表其班昭所補天文志其馬續所成之歟紀固述文景武宣諸贊皆詫其政治制法之盛至贊髙祖獨推其世糸何也觀彪王命論未見運世無本功德可紀而得崛起在此位者也卽彪之辭揆固之贊遠推堯運以見非逐鹿幸捷而得之所以杜亂臣賊子窺伺之意深矣史遷贊帝引三代忠質文之偏環繼以秦不能改漢興得天統矣又繼之以朝以十月車服黄屋左纛塟長陵意謂漢已接三代之正統猶用亡秦之陋典惜之也固贊未免溺於後世符瑞之習迂怪之論孟堅漢紀不書丞相除拜於死必書自申屠嘉既死之後而陶情等皆不書其有以哉紀所以提萬事之綱孟堅於武宣二紀大抵纂述詔文及行幸爲詳而治本所在幾缺不載武帝峻刑之主而紀無嚴酷之迹宣帝基漢世宦官外戚之禍而紀曽不記許史𢎞恭用事之因原孟堅之意正以見於刑法及外戚佞幸傳故不復重出表固之功臣表則有深意髙祖約非有功不侯而景帝始亂之自髙至文爲一表自景至哀為一表以見家法之變自景帝始至外戚侯表則目之以恩澤明其僥倖而得之此固之得也人物表離爲九等第其髙下樂王鮒從君者也而與於仲氏之列三等祝鮀佞人也而列於君牙之次四等先伯牛而後曽參進仲弓而退冉有伯牛仲弓第二等曽參冉有第三等士㑹范武子一人也以武子名則列於二等以士㑹名者則列爲四等王翦爲虎傅翼者李悝爲國闢草萊者而謂之上智墨翟以辨商鞅以法禍天下而列於中上李朴子列傳或曰八表未具而固卒後人續之耳故人物表尤爲不倫者非固之過雖然固未具八表而表之名固立之矣以漢人作漢史不應尚論古人物也不特此也貨殖傳自陶朱子貢而下皆列焉雖曰祖馬遷之遺躅而遷著作乃自陶唐以迄獲麟而固則述漢史耳班氏古今人表仰包億載列之以三科定之以九等若孔門達者顔冉殆庶至於他子難爲等差今乃先伯牛而後曽參進仲弓而退冉有牛弓在二等參有在三等叙晉文之㠯位也舟之僑爲上陽處父次之士㑹爲下其述燕丹之賓客也髙漸離居首荆軻亞之秦舞陽居末斯並是非瞀亂固贊馬遷貶其叙唐虞以前之事然固表所載女媧方雷乃以空名次於羲黄之間夫以是責人矣而已蹈之何也蓋人物表出於曹大家志所列非固責也志孟堅十志網羅詳矣而獨於兵缺焉乃附見於刑法何哉反覆漢事而知之漢官凡稱尉者皆掌卒徒廷尉刑官也而亦以尉稱中尉兵官也刑獄之事實得同領豈古者兵刑同制之意乎食貨志曰公孫𢎞以春秋之義繩臣下張湯以峻文決理爲廷尉於是見知之法生而廢格沮誹窮治之獄用矣宜載諸刑法志而固於食貨志及之推固之意所以譏漢之用刑大抵與民爭利至刑法志乃曰孝武外事四夷之功内盛耳目之好徴發煩多百姓貧耗又曰今饑寒並至此刑之所以審也然則二志之文自相表裏蓋亦微而顯歟班列儒者於九流正以不知儒故也漢儒祖叔孫通故漢輕儒後以公孫𢎞倪寛爲儒班固謂儒於道最髙自謂尊儒不知與九流並列已非矣八家皆儒之一偏一曲豈得而並言哉班固五行志每叙一災推一怪董仲舒京房之説前後相反向歆之解父子不同遂乃雙載其文史通天人之交休咎之證焉可誣也將以五行傳爲可盡廢則失警戒脩省之助茍以五行傳爲可盡用則又非格王正厥事之本惟書其事而不著其應此春秋之微意也西漢二百一十餘年日食乃至五十有三以文景之詔其日食乃至十有二焉班固於他帝輙書其應於文景獨書其食而虛其應班固地理全寫禹貢蓋以水濟水徒有其煩昔春秋諸國賦詩見意左氏所載錄其章名如地里爲書宜云禹貢已詳何必重述古文班氏著志抵忤者多在於五行蕪纇尤甚今條其錯誤定爲四科四科之中疏爲科目其第一科曰引書失宜者其流有四一曰史記左傳文錯相併二曰春秋史記雜亂難别三曰屢舉春秋言無定體四曰書名去取所記不同第二科叙事乖理者其流有五一曰徒發首端不副證驗二曰虛編古語討事不終三曰直引時談竟無他述四曰科條不整尋繹難知五曰標舉年號詳畧無準第三科釋灾多濫者其流有八一曰商𣙜前世全遺故實二曰影響不接牽引相㑹三曰敷演多端唯的無主四曰輕持善政用配妖禍五曰但神解釋不顯符應六曰考覈雖讜義理非精七曰妖祥可知祲黙無説八曰不循經典自任胸臆第四科古學不精者其流有三一曰􅀶引前書網羅不盡二曰兼採左氏遺逸甚多三曰屢舉舊事不知所出傳孟堅記傳惟儒林循吏酷吏等各以序冠於首其餘則無之至於王貢龔鮑傳首乃特爲之序而以四皓鄭子真嚴君平等先之是殆表而出之之意歟不曰后妃傳而曰外戚傳志漢外戚之擅權也元后别立傳禮樂湮微漢世大缺也固則志之以爲叔孫綿蕞循見於倥􅘓不暇給之初而賈董王吉之所建白乃委棄於治平無事之日則文帝宣武諸君不得不任其咎前後條列而抑揚實寓焉所以重禮文多缺之羞也外戚預政漢世大變也固則傳之凡姻聨攀附悉皆紀錄以傷后族之强盛至若衛霍以軍功顯名史丹以功德自致馮奉世父子以才能居位㒺不表見又從而爲之辭則曰數子之外皆夤縁以幸富貴者槩而用之此漢禍之所以日蕃而固之所以重傷也二者漢之大故不敢顯然以詔來世寄意悠逺而後之深於史者得以覽視焉范曄譏固飾主闕不知其贊多微文顧讀者弗察耳劉知幾又詆其古今人物表無益於漢史此論誠然但非固之罪也至謂受金曲筆固雖諂附匪人亦何至是歟晁志田叔節士樂布一節季布豪俠相去逺甚夫以囚奴茍活之人而齒於視死如歸之士此華嶠所以得議其排死節而否正直也孟堅贊王章曰不量輕重以陷刑戮贊何武王嘉又曰武嘉區區以一簣障江河班彪贊翟義曰義不量力懐忠憤發以隕其宗此所以不免范曄之譏也漢三年酈生説髙祖據敖倉及請説齊此一時事也班固合爲一劉向則分而言之或者固欲省其文或者向欲條其事蓋未可知也學者觀之要當知其請據敖倉及請説齊皆生之謀也已何必泥其或分或合哉神爵中詔益吏百石以下俸十五此固所記也荀悦又以爲五十斛或班荀聞見之殊或前後傳冩之誤皆未可知也學者觀之要當知其百石以下之俸皆宣帝一時所増而已烏可强别其孰是孰非哉董仲舒以賢良舉見於武帝建元之初公孫𢎞以賢良舉見於武帝元光之後二子之傳悉之矣而武帝本紀又併於元年而言之固之意或以互見或畧言之亦未可知也學者要當知二子皆以賢良進又知武帝賢良之舉所得者二人亦足矣何必以先後而疑之哉至於封髙廟功臣之後置武威酒泉之郡與夫主父偃嚴安徐樂之上書攷之於志驗之於紀又攷之於傳雖嵗月之訛亦無害於理學者觀之能觀其意而畧其文可也孟堅每一姓有傳多附出餘親其事迹尤異者則全入他部故愽陸去病昆弟非復一篇外戚元后婦姑分爲二錄至如元王受詩於楚至孫戊亡按其行事所載甚寡而能獨載一卷者實由向歆之助耳但交封漢始地啓列藩向居劉末職才卿士昭穆旣疎家國又别使分楚王子孫於髙惠之世與荆代並編析劉向父子於元成之間與王荆並列方於諸傳不亦纇乎長卿之子虚上林揚雄之甘泉羽獵班固兩都馬融廣成諭過其體詞沒其義繁華而失實流宕而忘返無禆勸􅅄有長奸詐而前漢史中皆書諸列傳不其謬乎漢書東方朔傳委曲煩碎不類諸篇且不述其亡没嵗時及子孫繼嗣正與司馬相如司馬遷揚雄傳相類尋其傳體必曼倩之自叙也但班氏脫畧故世莫知之蘇子卿父建行事甚寡韋元成父孟德業稍多漢書編蘇氏之傳則先以蘇建標名列韋相之篇則不以韋孟冠首並其失也褒貶公孫𢎞矯飾之詭行則實其釣名之言東方朔詼諧之詭談則鄙爲滑稽之雄此不激詭之體也蓋寛饒之事主彼抗言而爲狂瞽者也則以爲邦之司直梅福之去官彼抗節而從所好者也則以爲尚有典刑此不抑抗之體也相如之風雅而及於臨卭奔亡之事則以爲淫靡之戒張禹之傳授而及於後堂聲色之樂則以爲乖僻之箴此贍而不穢之體也賈誼政事之書載其萬言皆切於世事董生賢良之策載其三篇皆明於經術此詳而有體之證也遷固得失總論類古之爲史者舉其大綱而已堯舜二典是也其後爲編年以序事如晉之乘楚之檮杌魯之春秋是也至司馬遷始創紀表書傳之體焉文中子曰史之失自遷固始譏其失古史之體當矣然遷固烏可並言哉遷之學雖未粹感憤舛駁往往有之然二帝三王之統紀周秦楚漢之世變孔子孟子之所以異於諸子百家者於其書尤有考焉髙氣絶識包舉廣而興寄深後之爲史者殆未易窺其涯涘也固特因遷之規模而足成之耳其竄定遷史諸篇漢初豪傑之所存尚未深究况於前此者乎司馬正索隠曰班氏書近代諸儒共所鑽仰其爲訓詁蓋亦多門蔡謨集解之時已有二十四家夫史詩殘文㫁句尤難究詳古今爲注解者絶希此遷所以慨然發可爲智者道之嘆也王充著書旣申班而屈馬張輔持論又劣固而優遷王充爲彪文義狹陋紀者詳觀者以爲甲太史公之乙也張輔名士優劣論曰遷叙三千年五十萬言班固二百年事八十萬言其煩省之不敵固有以知之也然則二書互有脩短張晏云遷没後亡龜筴日者傳褚先生補其所缺言詞鄙陋非遷本意按遷所撰五帝本紀七十列𫝊稱虞舜見阨遂穿宂而去宣尼旣殂門人唯奉有若其言爲鄙又甚安得獨罪禇生而全宗馬氏也劉軌思商㩁漢史雅重班才唯譏其本紀不立少帝而輙編髙后按少帝非劉氏而竊養漢宮時天下無主呂后輔制故僣其嵗月寄以編年而野鷄行事自具外戚班固之譏馬遷也論大道則先黃老而後六經序游俠則退處士而進奸雄述貨殖則崇勢利而羞貧賤此其所蔽也又傅元之貶班固也論國體則飾主缺而折忠臣叙世教則貴取容而賤直節述時務則謹辭章而畧事實此其所失也史記十表意義洪深殆學者多不能達三代世表以世糸爲主所以觀百世之本支也漢興以來諸侯年表以地爲主故年經而國緯所以觀天下之大勢也髙祖功臣侯年表以時爲主故國經而年緯所以觀一時之得失也漢興以來將相名臣年表以大事爲主所以觀君臣之職分也以百世本支言之黃帝之初先列譜糸以祖宗爲經以子孫爲緯則五帝之代皆出於黃帝可知矣周成王之後詳列諸侯以世爲經以國爲緯則親疎之相輔可知矣帝顓頊以下周武王以上有經而無緯止列世糸而大治亂附焉則正嫡旁支之繼統皆可知矣以天下大勢言之如髙帝五年韓信王楚英布王淮南盧綰王燕張耳王趙彭越王梁韓王信王太原吳芮王長沙則天下之勢異姓強而同姓未有封者也如髙帝六年髙祖弟交王楚髙祖子肥王齊英布王淮南盧綰王燕張敖王趙彭越王梁髙祖兄喜王代吳芮王長沙則天下之勢異姓强弱亦畧相當也如髙祖十二年髙祖弟交王楚髙祖子肥王齊髙祖兄子濞王吳髙祖子長王淮南髙祖子建王燕髙祖子如意王趙髙祖子恢王梁髙祖子友王淮陽髙祖子恒王代吳芮王長沙則天下之勢同姓甚强而異姓絶無而僅有也不以得失言之如髙祖功臣年表髙祖功臣侯者一百四十三至文帝之世存者一百二十五至武帝時存者七十二則時之守典章待舊勲孰得孰失皆可知矣如惠景間侯者表建元之後存者二國太初已後又皆國除則時之政事孰緩孰急皆可知矣建元以來侯者表元光侯者四元朔侯者二十元狩侯者十三皆以匈奴封元鼎侯者十六以匈奴南粤封元封侯者十七以東越甌駱南越朝鮮西域封則時之用兵孰多孰少皆可知矣建元以來王子侯者表元光侯者七元朔侯者一百二十七元狩侯者二十五元鼎侯者三則時之分封諸侯子弟施行次第皆可知矣以君臣之職分言之如髙帝元年大事記沛公爲漢王之南鄭還定雍而相位書蕭何守漢中御史大夫位書周苛守滎陽髙帝九年大事記未央宫成置酒前殿帝親奉玉巵上太上皇夀曰今臣功孰與仲多而相位書蕭何為相國御史大夫位書周昌爲趙丞相則君臣之職分或得或失皆可知矣彼班氏作漢史茍欲自出機軸盡變子長之例分異姓王同姓王爲兩表漢初親疎相錯之意不復見同姓諸侯王表廢年經國緯之制王子侯下諸表廢國經年緯之制徒列子孫世數是特諸家之譜諜耳天下大勢當世得失泯然莫可考何名爲表哉太史公諸侯秦楚之際月表此一時也漢興以來諸侯年表此又一時也至於以節目論之則髙祖功臣年表與惠景間侯者表異矣惠景間侯者表與建元以來侯者表異矣建元以來王子侯者表㫁自建元似亦有以矣彼班氏分諸侯王爲兩表智不相近理固應爾至於王子侯起於髙祖則史家之常例也至於中分西漢諸帝之功臣以髙惠髙后文爲一卷景武昭宣成元爲一卷特以卷秩重大析之耳别外戚恩澤侯自爲一表雖頗有意然其所發明者亦狹矣百官公卿表上卷叙官制沿革固有益於後世若下卷所謂表者削去大事不記則所書者止於公卿拜罷月日而已并載九卿雖爲繁碎猶非其大失也古今人表以區區一人之見而欲定生民以來聖賢愚智之等差其不知量亦甚矣孔子曰蓋有不知而作者我無是也有㫖哉太史公作秦楚之際月表記其起事之人而不書元所以見當時自相雄長而無復君國子民之實也及韓彭英盧張耳韓王信吳芮皆載於漢興以來諸侯表所以著漢世之所封而明藩屏之義也孟堅不達其意乃取秦楚月表自項羽封宰侯王之事併於異姓諸侯王表失之矣太史公漢興諸侯表於王之初立必書元年所以見其君國子民之實也於諸王朝京師之際必書來朝所以見其尊君親上之義也孟堅於元年則不書於來朝則又互書失其㫖矣太史公於髙祖功臣侯者作一表惠景間侯者作一表至建元以來諸侯復作一表極有深意觀髙祖表繫以功成者謂其以功而封爵也惠景間書侯而不書功謂其無功侯者多也至建元以後多以軍功封亦不書功蓋謂武帝之功雖應本約乃邀功生事之功而非創業比也孟堅分髙惠髙后文作一表景武昭宣元成作一表而例以功臣名豈其㫖哉孟堅表序謂孝文時有弓髙襄城之封雖自外來本功臣後固至孝景始侯䧏者丞相周亞夫守約而爭帝黜其義初開封賞之科世儒謂是表始於景帝以其有非功而侯者也參以孟堅論觀之則作史之初誠有是意然非功而侯非特自景帝始也太史公作惠景間表已嘗言之矣孟堅之言若此豈非以惠帝以來無功而侯者己見於外戚恩澤表而不復再出歟失太史公之意矣漢髙帝接秦而興雖不能追復五帝三代之統業然置宗正官猶有意乎明族屬也存三老職猶有意乎崇教化也念天下匄匄數嵗而復役賜爵赦􅓧宥辜罷兵歸農猶不忘乎民隠也衣衾棺椁加惠士伍猶勤勤乎死生之數衡山閩越之就封猶知繼絶世也以大牢祀孔子於魯猶知尊先聖也刻印銷印聴不旋踵猶有從諫如流之美也令賈人母得衣錦綉操兵乗馬猶知辨上下定民志之義也赦田叔孟舒於侯藩而盡拜為郡守諸侯相捐四千户慰趙子弟而不以為惜則其恢𢎞磊落猶有帝王之度也十一年之詔招徠賢士大夫尊顯勸駕如恐弗及雖學焉而臣之義有未暇講而與我共安猶庶幾南山有臺之義也凡此皆班氏之所錄而太史氏之所闕也夫以髙帝之興漢其宏綱大指固不專在是而四百年間君子懷其道小人樂其生或者此其爲仁義公恕之實而太史氏或畧而弗錄或附見而不繫之一人之本何哉蓋究王迹之終始察人事之損益折中千有餘年之事變以俟後世聖人君子太史具焉而聖君明臣賢人哲士之令德雅行嘉言善論可以載之爲世訓者此則猶有賴於記事之功而有傳也三代而上事之不錄者何限猶有考信於六藝使秦漢之軼事無所托以信於後世將使後世何從而知之乎班固之於史豈盡知之者哉而髙帝之事獨因其縝密之工而得弗廢則有功於史亦多矣此遷固之史所以並傳也經以道法勝史以事辭勝經不得史無以證其褒貶史不得經無以酌其輕重經非一代之實錄史非萬世之常法體不相沿而用實相資焉遷固雖以事辭勝然亦兼道與法而有之故時得仲尼遺意焉其一曰隠而章二曰直而寛三曰簡而明四曰微而切遷之傳廉頗也議救閼與之失秦伐韓圍閼與赧王欲救之不載焉具之趙奢傳傳酈食其也謀撓楚權之謬不載焉具之留侯傳固之傳周勃也汗出洽背之恥不載焉具之王陵傳傳仲舒也議和親之疏不載焉具之匈奴傳本傳晦之而他傳發之則其與善也不亦隠而章乎遷論蘇秦稱其知過人不獨使蒙惡聲論北宮子多其愛人長者固贊張湯與其推賢揚善贊酷吏人有所褒不獨暴其惡於傳詳之於論於贊復明之則其懲惡也不亦直而簡乎遷表十二諸侯首魯訖吳實十三國而越不與焉夫以十二名篇而戰國十三何也不數吳也皆諸侯爾獨不數吳何也用夷禮也不數而載之何也周裔而霸盟上國也春秋書哀六年公㑹吳于鄫書十二年公㑹吳于槖臯書十三年公㑹吳于黃池此其所以雖不數而猶獲載也非越區區於南夷豺狼狐狸之與居不與中國㑹盟以觀華風而因夷俗之名以赴故君子即其自稱罪之春秋書定五年於越入吳書十四年於越敗吳于攜李書哀十三年於越入吳此春秋所以夷狄畜之也遷舉而措之諸侯之末則山戎玁狁亦或庶乎其間是以絶而棄之將使後之人君觀之曰不知中國禮義雖勾踐之賢猶不免乎絶與棄則其賤夷也不亦簡而明乎固之表八而王侯六書其人也必曰某王若侯某或功臣外戚則必加其姓而首目之曰號諡姓名此異姓列侯之例也諸侯王其目止號諡豈以其尊故不名之邪不曰名之而實名之豈以不名而不著邪此同姓諸侯王之例也王子侯其自爲王則曰號諡名而曰名之則殺一等矣此同列侯之例也及其下則曰號諡姓名夫同姓列侯而加之異姓之例何哉察其故蓋元始之間王莽僞褒宗室而封之者也非天子親自封之者也宗室天子不能封而使王莽封之故從異姓例亦示天子不能有其同姓也將使後之人君觀之曰權之歸於臣雖同姓不能有名器誠不可假人矣則防僣也不亦微而切乎隠而章則後人樂得善之利直而寛則後人知有悔過之漸簡而明則人君知中國禮義之爲貴微而切則人君知强臣專制之爲患用力寡而成功愽爲能爲春秋繼而後之史無及焉者以是矣或問張輔著班馬優劣論云遷叙三千年事五十萬言固叙二百年事八十萬言是固不如遷也荅曰不然按太史公書上起黃帝下盡周末年代雖存事迹殊畧至戰國以下始有可觀然遷雖叙二千年事其間詳備者唯漢興七十餘載而已其省也則如彼其煩也則如此求諸折中未見其宜班氏漢書全取史記仍去其日者倉公等傳以爲其事煩蕪不足編次故也若使遷固異地而處撰成漢書將恐多言費辭有踰班氏安得以此而定其優劣耶兩曜百星麗於元象非如九州萬國廢置無常故海田可變而景緯無異必欲列之國史施於何代不可史記作天官書讀者竟忘其誤班固以天文作志無漢事而𨽻入漢書降迄有晉迄乎隋氏其篇倍多但載其時彗孛氛祲薄食晦明禆竈梓謹之所占京房李邰之所候志之可也若乃丹􅀈素魄之纒次黄道紫官之分野施於何代不可也漢書之志天文藝文也蓋欲廣列篇名示存書體後來繼述其流日廣天文則星月㑹渾圖周髀之流藝文則四部七錄中經梁任昉四部梁阮孝緒七錄魏鄭黙中經祕閣之輩莫不各踰三篋自成一家近世著隋書者乃廣包衆作勒成貳志前志已錄而舊志仍書篇目如舊煩互繼出凡撰志者當變其體近者宋孝王闗東風俗𫝊亦有墳籍志其所錄皆鄴下文儒之士讐校之司所列書名惟取當時撰者習兹楷則庶免譏嫌班固之志五行每有叙一災推一恠董京之説前後相反歆向之解父子不同遂乃雙載其文兩存厥理言無準的事益煩費豈所謂撮其機要者乎班固綴荀卿之詞以序刑法探孟軻之語用裁食貨五行出劉向洪範藝文取劉歆七畧若許負相經𫝊雄方言並當時所重見傳流俗天文有志何不爲人形志乎藝文有志何不爲方言志乎司馬遷班固父子其言史官載籍之作大義粲然著矣譏者咸稱二子有良史之才遷文直而事覈固文贍而事詳若固之序事不激詭不抑抗贍而不穢詳而有體使讀之者亹亹而不厭信哉其能成名也彪固譏遷以爲是非頗謬於聖人然其論議常排死節否正直而不叙殺身成仁之爲美固序遊俠傳曰劇孟郭解之徒馳騖於閭閻雖其陷於刑辟自與殺身成名若季路仇牧而不悔也古之正法五伯三王之罪人六國五伯之罪人四豪者又六國之罪人况於郭解之倫以匹夫之細竊生殺之權其罪不容於誅也則輕仁義賤守節愈矣愈猶甚也固傷遷愽物洽聞不能以智免及刑謂下蠶室然亦身陷大戮智及之而不能守之嗚呼古人所以致論於目睫也羣書考索卷十三
