body:
  text: 羣書考索巻四十二宋章如愚撰禮器門冕服類希冕希冕三章王祭祀社稷五祀之服非卑之於享射也以社稷五祀之所上止於利人故衣粉米而已謂之希以其立早少故也鄭氏以希為絺以絺為刺謂希刺粉米無畫然畫陽事也在衣繡隂功也在裳希衣之粉米固亦畫矣繡而不畫則與餘章之在衣者不類其說非也唐以希冕為繡冕蓋一襲鄭氏之失歟賈公彦謂天子九章侯伯七章大章也章各依命數小章也則九章章皆十二七章章皆七若然則舜十二章之服日月星辰之類皆十二乎不必然也考之於禮升龍降龍為一章虎彛蜼彛為一章則山火之下皆左右畫繡之也王之大夫希冕繅四就前後各四旒旒四玉用三十六繅玉皆朱繅執鴈諸侯之孤希冕繅玉采如王之大夫執皮帛王之孤卿六命大夫四命及其出封皆加一等其未出封則卿六命與子男同五章之服矣觀司服孤之服自希冕而下如子男之服卿大夫之服自𤣥冕而下如孤之服公之孤四命而服三章之希冕大國之卿三命大夫再命而服一章之𤣥冕則王之公卿大夫其衣服各降命數一等可知也典命云公之孤四命以皮帛眂小國之君又司服云孤之服自鷩冕而下鄭注弁師云孤繅四就繅玉皆朱綠用玉三十二其服三章𤣥衣纁裳服以助祭社稷𤣥冕𤣥冕一章王祭羣小祀之服其衣𤣥而無文裳黻而已其章不足道也故以𤣥名之夫乾居西北而天事武故黼之色白黒艮居東北而成始終故黻之色青黒天下之理歸於所斷成於所辨故章服以黻終焉觀易隂陽之相代歸於復小而辨於物卦象之相推終於未濟之辨物居方舜命九官終於黜陟分北周官六計終於㢘辨皆六服終黻之意也然剛斷者先王之所沈潛非向而上之也故黼依設於後藉席用黼純設於下中衣繡黼設於中皆六服後黼之意也𤣥衮及黼黻衣繡裳常服黼冔書曰麻冕黼裳語曰致美乎黻冕記曰諸侯黼大夫黻爾雅曰衮黻也凡此皆舉其章之末者則餘章著矣賈疏云上四衣皆𤣥而有畫此衣不畫而無文其衣本是一𤣥故得𤣥名一章惟裳刺繡黻而已禮象圖云天子之上士三命服𤣥冕中士再命服爵弁下士一命服皮弁或曰王之上士三命爵弁服今曰服𤣥冕何也曰王之大夫四命服希則上士三命宜服𤣥冕若以謂王之士有爵弁而無弁冕其加一命遂為大夫不容躐𤣥冕而服希冕禮器曰天子之冕朱綠藻十有二旒諸侯九上大夫七下大夫五此士服𤣥冕之證也諸侯之卿𤣥冕繅三就前後各三旒旒三玉用三十八執羔諸侯之大夫𤣥冕再命之大夫繅再就用玉八一命之大夫用玉二繅一就執鴈司服云卿大夫之服自𤣥冕而下注云朝聘天子及助祭之服諸侯非二王後其餘皆𤣥冕而祭又弁師注云三命之卿繅三就繅玉亦朱綠用玉一十八再命之大夫繅再就繅玉亦朱綠用玉八若王朝之大夫上公之卿得用三就同姓封為侯伯者助王祭羣小祀視朔朝日皆服之陳禮書曰再命之大夫繅再就用玉八一命之大夫用玉二繅一鄭云一命之大夫冕而無斿然典命言各視其命之數果一命之冕無斿則其視命之數云者為空言也裨冕裨冕覲禮侯氏裨冕玉藻曰諸侯裨冕以朝樂記曰裨冕搢笏而虎賁之士說劍也荀卿曰大夫裨冕康成釋覲禮曰裨之言埤也天子大裘為上其餘為裨釋玉藻曰裨冕公衮侯伯鷩子男毳是也鄭司農釋周禮特以鷩為裨冕拘矣鷩冕鷩冕七章鷩雉也雉之為物五色備而成章故曰夏翟亦曰華蟲猶中國謂之夏亦謂之華也司服又謂之鷩者别其名也鷩冕以祀先公享射然先公尊矣所服止於此者非卑之於先王以為祭則各以其服授尸尸服如是而王服衮以臨之非所以為敬故弗敢也享射亦以鷩冕者王朝覲諸侯以衮冕故享與賓射以鷩冕祭祀以衮冕故大射亦以鷩冕以享與賓射殺於朝覲而大射殺於祭祀故也燕射於寢則皮弁而已賈公彦謂賓射服皮弁燕射服朝服然鄭氏釋司服謂鷩冕享射者享食賓客與諸侯射則賓射不以皮弁矣又皮弁即王之朝服耳離而二之其說誤也侯伯鷩冕繅七就前後七旒旒七玉共玉九十八繅玉皆三采以上侯伯並同但執信圭躬圭之異耳三禮圖云司服曰侯伯之服自鷩冕而下如公之服弁師注云侯伯繅七就繅玉皆三采每繅七成則七斿每斿亦貫玉七瑉玉皆計用九十八韍帶綬舄皆與上公同王祀昊天上帝助祭及朝王皆服之王者之後公伯王之子弟封為侯伯皆服以助王祭先公及饗射王之三公鷩冕繅八就前後各八斿斿八玉用玉二百二十八執圭躬則執璧書曰周公秉圭以冕覲之蓋執信圭先儒王執桓圭王之三公八命及其出封皆加一等則是三公一命衮而衣服以九為節其未出封則八命與侯伯同七章之服矣故服鷩冕據未封之時然也山冕考工記曰山以章荀卿曰天子山冕諸侯元冠皮弁縫中貫玉以為飾其衣用布十五升而裳素積弁服眂朝則皮弁服弁師王之皮弁會玉采玉琪象邸玉筓諸侯及孤卿大夫之冕韋弁皮弁弁絰各以其等為之而掌其禁令士冠禮皮弁服素積聘禮賓皮弁聘詩淇澳曰會弁如星鳲鳩其弁伊騏頍弁有頍者弁賓之初筵側弁之俄禮運弁冕兵革藏於私家非禮也玉藻天子皮弁以日視朝明堂位皮弁素積裼而舞大夏後漢輿服志委貌冠皮弁冠同制長七寸髙四寸制如覆杯前髙廣後卑銳所謂夏之毋追商之章甫者也委貌以皂絹為之皮弁以鹿皮為之行大射禮於辟雍公卿諸侯大夫士行禮者冠委貌衣𤣥端素裳執事者冠皮弁衣緇麻衣皂領袖下素裳所謂皮弁素積者也蓋皮弁天子以視朝以宴以聴祭報郊特牲祭之日王皮弁以聴祭報示民嚴上也以舞大夏諸侯以聴朔以巡牲以卜夫人世婦以迎王之郊勞以待聘賓卿大夫以王命勞侯氏覲禮王使人皮弁用璧勞侯氏以聘於鄰國以卜宅士以冠學士以釋菜凡大夫士之朔月皆皮弁服則皮弁之所施者衆矣蓋人為者多變自然者不易皮弁亦因其自然而已韋弁周禮司服凡兵事韋弁服弁師諸侯及孤卿大夫之冕韋弁皮弁弁絰各以其等為之而掌其禁令或曰周禮有韋弁無爵弁書與冠禮禮記有爵弁無韋弁士之服止於爵弁而荀卿曰士韋弁孔安國曰雀韋弁也劉熈釋名亦曰以爵韋為之謂之韋弁則爵弁即韋弁耳觀弁師司服韋弁先於皮弁書雀弁先於綦弁孔安國曰綦弁皮弁也士冠禮次加皮弁皮弁加爵弁而以爵弁為尊聘禮主卿贊禮服皮弁及歸饔餼服韋弁而以韋為敬則皮弁之上非韋弁則爵弁耳此所以疑為一物也以上並陳禮書冠弁田獵則冠弁服鄭云冠弁𤣥冠委貌也委安也服之所以安正容體也若以色言之則曰𤣥冠其服則十五升緇布衣素積以為裳養老宴羣臣亦服之其諸侯不限畿内畿外視朝行道皆服之天子諸侯之卿大夫祭其廟亦同服之然則周之委貌殷之章甫夏之毋追並用緇布為之故有𤣥冠之名幞頭起於周建徳中為四脚蓋便於軍容也唐武徳四年勑折上巾軍旅所服即今幞頭貞觀中偃武以翼善冠頗類幞頭乃宜常服至開元廢不用本朝淳化中用之冠制荀卿稱魯公問舜冠於孔子孔子曰古者有務而拘領書大傳務作冒拘作句漢輿服志曰上古衣毛而冒皮後世聖人見鳥獸有冠角􅐖胡之制遂作冠冕纓緌以為首飾則古者冒皮而已及冠冕纓緌之作皆有所象也古者冠其飾有緣其貫有筓其束有武其係有纓其垂有緌古之冠其飾不過纓武緣其名不過毋追章甫委貌而已後世有長冠通天逺遊髙山竹皮進賢方山巧士却非却敵之制而其異有若鷸冠鶡冠其怪者有漉酒墊角之類非古也緇布冠郊特牲曰太古冠布齋則緇之其緌也孔子曰吾未之聞也冠而敝之可也玉藻曰始冠緇布冠諸侯下逹曰緇布冠繢緌諸侯之冠也毋追冠白虎通曰夏十三月為正其飾最大故曰毋追毋追言其追大也禮書引禮圗曰毋追有覆杯之狀於義或然鄭司農言夏后氏之牟追蓋古者牟毋通用也記曰毋追夏后氏之道也章甫冠論語曰端章甫儒行曰孔子冠章甫之冠莊子曰孔子冠枝木之冠蓋枝木之冠即章甫也白虎通曰商十有二月為正其飾微大故曰章甫章甫者尚未為極其本相當也禮書記曰章甫商道也委貌冠左傳劉定公謂趙孟吾與子弁冕端委以治民臨諸侯晏平仲端委立虎門國語晉侯端委以入武宫董安于曰臣端委以隨宰臣蓋端衣委貌士以為祭服大夫士以為朝服私朝服之天子至士亦以為齋服故劉定公晉侯董安于皆得以服之白虎通曰周十一月為正萬物萌小冠飾最小故曰委貌記曰委貌周道也委貌委曲有貌也趙惠文冠胡廣曰趙武靈王改胡服以金璫飾前前插貂尾為貴職或以北土多寒胡人以貂皮温額後代效之亦曰惠文惠者蟪也其冠文細如蟬翼故名惠文漢因之曰武弁一名大冠諸武官冠之侍中中常侍加黄金璫附蟬為文貂尾為飾侍中插左常侍插右貂用赤黒色漢應劭漢官儀曰金取堅剛百鍊不耗蟬居髙清潔貂内勁悍而外温潤又名鵕䴊冠幸臣閹孺為侍中皆服大冠天子元服亦為先加雙鶡尾置左右名曰鶡冠鶡鷙鳥之暴疏者也每所攖撮應爪摧碎天子武騎故冠之晉依之名繁冠一名建冠一名籠冠即惠文冠也齊因之侍臣加貂蟬唯武騎虎賁插鶡尾於武冠上隋名武弁武職及侍臣通服之侍臣加金璫附蟬以貂為飾天子則金博山三公以上玉枝四品以上金枝文官七品以上眊白筆八品以上及武官不眊筆唐因之乗輿加金附蟬平巾幘侍中中書令則加貂蟬侍左右珥武官九品以上亦准此後漢進賢冠古緇布冠文儒者之服也公侯三梁中二千石以至博士兩梁自博士以下至小史私學弟子皆一梁宗室劉氏亦兩梁冠示加服也後漢改緇布為進賢儒者之服獬豸冠法冠一曰柱後執法者服之獬豸神羊能别曲直楚王嘗獲之故以爲冠楚執法者所服也胡廣說曰春秋左氏傳有南冠而縶者則楚冠也秦滅楚以其君服賜執法近臣御史服之後漢長冠長冠一曰齋冠制如板以竹為裏髙祖微時以竹皮為之謂之劉氏冠楚冠制也民謂之鵲尾冠非也祀宗廟諸祀則用之本髙祖所造故以為祭服尊敬之至也唐翼善冠太宗嘗以幞頭起於後周便武事也方天下偃武採古制為翼善冠自服之元日冬至朔望視朝翼善冠唐進徳冠太宗製之以賜貴臣王􅋒制如弁服以金飾梁花趺三品以上加金絡五品以上附山雲後周常冠武帝時初服常冠以皂紗全幅而後幞髮仍裁為四脚齋冠禮書曰太古之齋冠以緇周之齋冠以𤣥天子齋則𤣥冕而𤣥端所謂冕而乗路是也諸侯而下𤣥冠𤣥端而已故謂𤣥冠丹組纓𤣥冠綦組纓是也然則諸侯與士之齋則同而尊卑之分則異同故皆𤣥冠以一其誠異故組纓殊色以辨其等諸侯丹組纓則陽而已以其純於徳故也士綦組纓則隂陽雜矣以其不純於徳故也禮書通天冠秦制逺遊冠秦采楚制髙山冠漢舊儀云乗輿冠髙山冠方山冠漢制祠宗廟樂人服却非冠漢制樊噲冠漢衞士服却敵冠晉制衞士服建華冠漢制天地五郊明堂舞樂人服巧士冠漢制黄門宦者服黄冠禮書曰黄衣黄冠而祭息田夫也野夫黄冠草服也然則皮弁素服而祭者蜡祭四方百物也黄衣黄冠而祭者臘先祖五祀也冠禮三代之盛典禮素明自諸侯以上則十二而冠左傳晉悼公問魯襄公年季武子對曰㑹于沙隨之歳寡君以生晉侯曰十二年矣國君十五而生子冠而生子禮也君可以冠矣大夫盍為冠具武子曰寡君在行未可具也請及兄弟之國而假備焉晉侯曰諾公還及衞冠于成公之廟禮也楚共王蜀之㑹蔡景公為左許靈公為右二君弱皆强冠之自士以上則二十而冠鄭氏曰士以二十而冠急成人也筮之於廟冠之於阼階醮之於客位古之制禮皆隨時而損益之夏商則用醮其醮也每一加醮於客位周人則用醴也三加既畢則乃醴於客位此其或醴或醮之有異也周制文王年十二而冠成王十五而冠通典漢昭帝十七而冠元鳳元年辨燕王詐時年十四至四年加元服則年十七矣五經要義云冠嘉禮也冠首服也首服既加而後人道備故君子重之以為禮之始矣通典通典曰按大戴禮有公符篇云公冠四加天子亦四加又家語冠頌云王太子之冠擬諸侯之冠天子之元子亦擬諸侯四加諸侯之子同於士據此自天子至於諸侯非無冠禮但因秦焚書遂同蕩滅其周制士冠禮頗備王者時採行焉東遷以後禮樂廢壊固異乎先王之時魯襄公可冠而未冠則晉悼公問其年而告之盍爲冠具春秋之時猶如此則其盛時可知也秦漢以来人自為禮家自為俗雖搢紳大夫豈知所謂筮日筮賓主人即位于門東有司即位于門西其卜筮之制為何如又豈知始加緇布再加皮弁三加爵弁其弁之制為如何又豈知夏用葛屨冬用皮屨其屨之制又如何故唐孫嗣昌嘗冠其子至外庭曳笏言於卿士曰某冠子畢鄭叔明則咈然而却立曰何與我耶庭中大笑此其勢則然也唐之制禮一品之子以衮冕二品之子以鷩冕自三品以至九品皆有其數雖不盡合於古而唐人決行之者禮從宜故也至於母見其子則立而不拜過也考之儀禮以酒脯奠於廟既冠者遂持酒脯以見母母拜其酒脯非拜其子也而唐室輕之殊失古人之意矣古人之意果何為哉不過曰責成人之禮焉耳蓋少之與長也異當其未冠則深衣結髮謂之未可勝冠也其未可以成人責之也及其既冠則必責之以為人子為人弟為人臣之禮焉必責之以顔色齊辭令順容貌正焉不如是則徒服其服童子佩觿雖則佩觿能不我知童子佩韘雖則佩韘能不我甲蓋觿韘者成人之佩也無成人之徳則是佩觿而不我知佩韘而不我甲雖謂之童子可也使行冠禮盡如斯不㡬於無冠乎古之冠者必有祝之之辭成王冠周公命史雍作頌曰近於仁逺於佞近於義逺於財祿賢使能漢昭帝之祝辭曰推逺冲孺之幼志藴積文武之舊徳六合之内靡不蒙福承天無極趙武子之冠韓獻子告之以成子之文宣子之忠茍不稱服則所告之祝辭無乃虚設耶醴辭曰甘醴惟厚嘉薦令芳拜受祭之以定爾祥字辭曰令月吉日昭告爾士爰字孔嘉髦士攸宜醮辭曰㫖酒既清嘉薦亶時始加元服兄弟具来孝友時格永乃保之無其徳而有其服則三辭無乃虚設耶儀禮曰周弁商冔夏收三王共皮弁素積無大夫冠禮而有其昏禮古者五十而後爵何大夫冠禮之有鄭氏注曰周之禮年未五十而有賢才者試以大夫之事猶服士服行士禮二十而冠急成人也五十乃爵重官人也天子始冠之冠玉藻曰𤣥冠朱組纓天子之冠也天子始冠不以緇布而以𤣥冠然其子則猶士而已𤣥冠朱組纓則緌可知也朱以著正陽之色純其色所以異也諸侯始冠之冠玉藻曰緇布冠繢緌諸侯之冠也鄭氏曰皆始冠之冠考之於禮始冠緇布冠自諸侯下達則諸侯所以異於大夫士者繢緌耳緇布冠繢緌則纓可知也繢以備五采之文五采雖美不若朱正陽之色純也服制古之服章十有二而日月星辰山龍華蟲繪於衣宗彛藻火粉米黼黻繡於裳則星五星也辰十二次也華蟲雉也宗彛虎彛蜼彛也粉米粉其米也黼白黒文也黻黒青文也蓋日月星辰在天成象者也山龍華蟲虎蜼藻火粉米黼黻在地成形者也然則古者合三辰以在服備十二章以則天數後世判三辰以在旗而服止九章以法陽數鄭康成謂周服九章登龍於山登火於宗彛以尊其神明理或然也左傳臧哀伯曰三辰旂旗昭其明也火龍黼黻昭其文也子太叔曰為九文六采五章以奉五色夫哀伯言服止於火龍太叔言色止於九文則周之衮服止於九章而無日月星辰明矣陳禮書書曰天命有徳五服五章哉又曰予欲觀古人之象日月星辰山龍華蟲作會宗彛藻火粉米黼黻絺繡以五采彰施于五色作服汝明黼黻絺繡備十二章𤣥衣纁裳上六章在衣下六章在裳上畫下繡書大傳曰天子衣服其文華蟲作繢宗彛藻火山龍諸侯作繢宗彛藻火山龍子男宗彛藻火山龍大夫藻火山龍士山龍文曰山龍青也華蟲黄也作繢黒也宗彛白也藻火赤也天子服五諸侯四次國服三大夫服二士服一鄭氏曰𤣥或疑焉禮運曰五色六章十二衣還相為質也禮器曰禮有以文爲貴者天子龍衮諸侯黼大夫黻士𤣥衣纁裳周禮典絲凡祭祀共黼畫組就之物典命上公九命其衣服以九為節侯伯七命其衣服以七為節子男五命其衣服以五為節王之三公八命其卿六命其大夫四命及其出封皆加一等其衣服亦如之公之孤四命以皮帛眂小國之君其卿二命其大夫再命其士一命其衣服各眂其命之數侯伯之卿大夫士亦如之子男之卿再命其大夫一命其士不命其衣服各眂其命之數司服公之服自衮冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服孤之服自希冕而下如子男之服大夫之服自𤣥冕而下如孤之服士之服自皮弁而下如大夫之服凡大祭祀大賓客共其衣服而奉之考工記曰白與黒謂之黼黒與青謂之黻五采備謂之繡土以黄其象方天時變火以圜山以章水以龍鳥獸虵雜四時五色之位以章之謂之巧詩大車曰毳衣如菼毳衣如璊終南曰黻衣繡裳九罭曰我覯之子衮衣繡裳采菽曰又何予之𤣥衮及黼文王曰厥作祼將常服黼冔韓奕曰王錫韓侯𤣥衮赤舄諸侯祭服祭統曰夫人蠶于北郊以共冕服又曰君純冕立于阼玉藻曰諸侯𤣥端以祭裨冕以朝鄭氏謂諸侯祭宗廟之服惟魯及二王之後衮冕餘皆𤣥冕考之雜記大夫冕而祭於公弁而祭於己士弁而祭於公冠而祭於己以其致隆於公不敢與己同其服則諸侯以鷩毳希冕祭於王端冕祭於己宜矣褒衣諸侯褒衣亦始命為諸侯及朝覲加賜之衣也王制曰三公一命衮若有加則賜孔穎逹謂九命龍衮之外君衣特賜雜記謂之褒衣是也秦制水徳服尚袀𤣥後漢光武踐祚始修郊祀天子冕服從歐陽氏說三公九卿特進侯朝侯侍祠侯從夏侯氏說祀天地明堂皆冠旒冕衣裳皆𤣥上纁下一服而已明帝永平中議乗輿備文日月十二章刺繡文三公諸侯用山龍九章九卿以下用華蟲七章後周設司服之官掌皇帝十二服祀昊天上帝則蒼衣五方上帝各隨方色朝日用青衣祭皇地祇用黄衣夕月用素衣神州社稷用𤣥衣享先皇加𤣥服納后朝諸侯則十二章享諸先帝食三老五更耕耤等自龍以下九章祀星辰視朝大射享羣臣等八章羣祀臨太學燕射養庶老適諸侯家七章諸侯之服九章諸伯皆七章諸子服六章諸男服五章漢羣臣所衣之衣史氏不述夏侯勝言士病不明經術經術茍明取青紫如俛拾地芥者謂印綬也按百官公卿表丞相太尉皆金印紫綬秩比二千石以上皆銀印青綬曰青紫者謂此顔注以為卿大夫之服豈以印綬亦可言服耶余攷宣帝世京兆尹張敞自謂備皂衣二十餘年如氏注羣臣雖有五時服至朝皆著皂衣然則皂衣蓋漢朝臣服也谷永自太常丞擢光祿大夫奏書謝王鳳曰擢之皂衣之吏厠之争臣之末此之謂也鄭國風緇衣云緇衣卿士聴朝之服也戰國䇿載左師觸龍見趙太后云老臣賤息令得補黒衣之數以衞王宫然則漢代皂衣其亦古制矣後魏明帝以公卿衮衣黼黻之文擬於至尊後損畧之唐制天子祀服有大裘衮冕鷩冕毳冕繡冕𤣥冕隋大業初煬帝詔牛𢎞宇文愷虞世基許善心等憲章古制創造衣冠自天子等差始令五品以上通服朱紫通天冠武弁黒介幘白紗帽平幘白帢凡十二等貞觀四年制三品以上服紫四品以上服緋六品以上綠八品九品以上青龍朔二年孫茂道奏八九品著深青亂紫請改著碧上元元年又制深緋淺緋深綠淺綠深青淺青裘制周禮司裘之職掌為大裘以共王祀天之服大裘黒羔裘服以祀天示質中秋獻良裘王乃行羽物良善也良裘王所服也季秋獻功裘以待頒賜功裘人功㣲麄謂狐青麛裘之屬鄭司農云功裘卿大夫之服也月令孟冬天子始裘内則男子二十而冠可以衣裘帛玉藻惟君黼裘以誓省大裘非古也大裘羔裘也黼裘以白與黒雜為黼文也省當為獮君衣狐白裘錦衣以裼之君之右虎裘厥左狼裘士不衣狐白君子狐青裘豹褎𤣥綃衣以裼之麛裘青豻褎絞衣以裼之羔裘豹飾緇衣以裼之狐裘黄衣以裼之錦衣狐裘諸侯之服也犬羊之裘不裼不文飾也不裼裘之裼也見美也服之襲也充美也弔則襲不盡飾也君在則裼盡飾也無事則裼弗敢充也童子不裘不帛禮不盛服不充故大裘不裼詩羔羊曰羔羊之皮素絲五紽紽數也古者素絲以英裘羔羊之革素絲五緎緎縫也羔羊之縫素絲五總總數也旄丘責衞伯也狐裘蒙戎匪車不東鄭羔裘刺朝也羔裘如濡洵直且侯羔裘豹飾孔武有力羔裘晏兮三英粲兮三英三徳也晉羔裘刺時也羔裘豹袪自我人居居箋羔裘豹袪在位卿大夫之服羔裘豹褎自我人究究終南曰君子至止錦衣狐裘毛曰狐裘朝廷之服檜羔裘曰羔裘逍遥狐裘以朝羔裘翺翔狐裘在堂羔裘如膏日出有曜豳七月一之日于貉取彼狐狸為公子裘都人士曰彼都人士狐裘黄黄大東曰舟人之子熊羆是裘毛曰舟舟楫之人鄭曰舟當作周裘當作表家語大裘以黼之論語曰羔裘𤣥冠不以弔緇衣羔裘素衣麑裘黄衣狐裘䙝裘長短右袂狐貉之厚以居又曰公西華乗肥馬衣輕裘左傳曰北國之人鞨巾而裘中國之人冠冕而裳大裘三禮圖云大裘者黒羊裘也其冕無旒亦𤣥表纁裏鄭志大裘之上又有𤣥衣與裘同色但無文采耳裘下有裳纁色朱韍素帶朱瑑終辟佩白玉而𤣥組綬赤舄黒絇繶純大裘以下冕皆前圓後方天子以珠玉為飾祀昊天上帝五帝崑崙神州皆服大裘新圖云王者之祀天内服大裘外被龍衮所以襲大裘也記曰裘之裼也見美也服之襲也充美也禮不盛服不充故大裘不裼則襲衮可知大裘龍衮則戴冕璪十二旒旒十二玉前後各用百四十有四可知茍徒服大裘而無襲非禮意語曰䙝裘長則凡行禮之裘短矣茍徒服大裘而加長焉與䙝裘何異哉鄭志謂大裘之上又有𤣥衣此說尤為無據也大裘黼裘玉藻云惟君有黼裘以誓省大裘非古也鄭注云天子祭上帝則大裘而冕大裘羔裘也黼裘以羔與狐白雜為黼文也省當為獮獮秋田也國君有黼裘誓獮田之禮正義云君諸侯也禮唯許諸侯服黼裘以誓軍衆田獵耳不得用大裘當時非但諸侯有大裘又有大夫僭用大裘者故譏之云非古也周大裘服記曰郊之祭王被衮以象天戴冕璪十二旒則天數也鄭司農云大裘黒羔裘服以祀天示質也然則合二禮而言之王之祀天内服大裘外被龍衮所以襲大裘也記曰裘之裼也見美也服之襲也充美也禮不盛服不充故大裘不裼則襲衮可知也先王之於祀天也有文以示其外心之勤有質以示内心之敬故因立埽地陶匏槀秸之類此因其自然以示内心之敬者也執鎮圭而用繅藉之采就旂龍章而設日月之飾八變之音四圭之邸此因其文飾以示外心之勤者也然則内服大裘以因其自然外被龍衮戴冕璪以致其文飾不以内心廢外心不以自然廢文飾然後祀天之禮盡矣不特此也以神事之則有五齊以人養焉則有二酒至敬不壇而有壇焉禮曰泰壇郊天是也至質不祼而有鬯焉大宗伯涖玉鬯記親耕粢盛秬鬯以事上帝是也祀天之禮孰謂其一於無文哉陳祥道禮書陸農師禮象曰元豐詳定郊廟禮文其初用何洵直議欲以黒繒創為大裘如衮唯領褎用羔神宗疑非是後佃緣說文進書聖問偶及具以經對云禮不盛服不充故大裘不裼則大裘襲可知又曰郊之日王被衮以象天則大裘襲衮可知大裘襲衮則戴冕璪十有二旒可知冕服有六而弁師云掌王之五冕也神宗稱善遂詔有司製黒羔以為裘而被以衮議者又謂今古異宜若純用羔恐大裘重難服及裘成輕重纔與袍等工作皆被賜詩曰羔裘如濡又曰羔裘如膏則古之裘制蓋亦精矣唐顯慶元年九月太尉長孫無忌等奏謹尋歴代惟服衮章與郊特牲義㫖相協按周遷輿服志云漢明帝永平二年采周官禮記始制祀天地服天子備十二章沈約宋書云魏晉郊天亦皆服衮冕及考之宋紀曰明帝制云以大冕純玉璪𤣥衣黄裳郊祀天地後魏周齊迄于隋氏勘其禮令祭服悉同今請憲章故實郊祀天地皆服衮冕其大裘請停開元十一年冬𤣥宗將有事於南郊張說又奏祭天服大裘之冕事出周禮取其質也顯慶修禮改用衮冕出郊特牲取其文也若遵古制則用大裘若便於時則衮冕為美上以大裘樸畧冕又無旒乃廢不用狐白裘玉藻曰君衣狐白裘錦衣以裼之鄭注云君衣白毛之裘則以素錦為衣以覆之使可裼也袒而有衣曰裼必覆之者裘䙝也天子狐白之上衣皮弁服與與疑辭凡裼衣象裘色正義云君謂天子凡裼衣象裘色者狐白裘用錦衣為裼狐青裘用𤣥衣為裼羔裘用緇衣為裼是裼衣與裘色相近也天子視朝服皮弁服則皮弁之下有狐白錦衣也諸侯於天子之朝亦然凡在朝君臣同服然則三公在天子之朝執璧與子男同則皮弁之下狐白錦衣與子男同也其天子卿大夫及諸侯卿大夫在天子之朝亦狐白裘以下又云士不衣狐白則卿大夫得衣狐白也其裼不用錦衣狐青裘玉藻又云君子狐青裘豹褎𤣥綃衣以裼之正義云君子謂大夫士也以狐青為裘豹皮為褎用龍綃之衣以覆裼之韍韠韎韐詩曰朱芾斯皇三百赤芾又曰赤芾金舄庶見素韠兮易曰朱紱方来困于赤紱玉藻曰韠君朱大夫素士爵韋圜殺直天子直公侯前後方大夫前方後挫角士前後正又曰一命緼韍再命赤韍三命赤韍又曰齊則綪結佩而爵韠明堂位曰有虞氏服韍夏后氏山商火周龍章詩曰韎韐有奭左傳曰衮冕黻珽昭其度也鄭康成曰古者佃漁而食之衣其皮先知蔽前後知蔽後後王易之以布帛而獨存其蔽前者不忘本也韠之作也在衣之先其服也在衣之後其色則視裳而已禮記言君朱大夫素士爵韋者祭服之韠也周官典命公侯伯之士一命之士而助祭以爵弁爵弁纁裳故緼紱緼赤黄之間色所謂一命緼紱是也公侯伯之卿三命大夫再命而卿大夫助祭聘王以𤣥冕𤣥冕纁裳故赤紱所謂再命三命赤紱是也韠之為物以其茀前則曰韍以其一巾足矣故曰韠以色則曰緼以質則曰韎韐古人謂舊為茅葸讀茅葸為韎韐及戰國連兵韍非兵飾去之明帝復制韍天子赤皮蔽膝魏晉以来用絳紗為之故字或作紱深衣王制曰有虞氏皇而祭深衣而養老玉藻曰諸侯深衣祭牢肉又曰朝𤣥端夕深衣深衣三袪謂大夫士也縫齊倍要衽當旁袂可以回肘長中繼揜尺袷二寸曲領也袪尺二寸也袪口也縁廣寸半縁邊也深衣曰古者深衣盖有制度以應規矩繩權衡短毋見膚長毋被土續衽鈎邊要縫半下袼之髙下可以運肘袂之長短反詘之及肘帶下毋厭髀上毋厭脇當無骨者制十有二幅以應十有二月袂圓以應規曲袷如矩以應方負繩及踝以應直下齊如權衡以應平故規者行舉手以為容負繩抱方者以直其正方其義也五法已施故聖人服之故規矩取其無私繩取其直權衡取其平故先王貴之可以為文可以為武可以擯相可以治軍旅也禮書曰深衣所以異於餘服者餘服上衣下裳而不相連深衣則衣裳連矣餘服幅前後四深衣則十二幅矣餘服之帶三分帶下紳居二焉由帶而下四尺五寸深衣之帶則當無骨矣羣書考索巻四十二
