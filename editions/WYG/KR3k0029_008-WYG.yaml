body:
  text: 羣書考索卷八宋章如愚撰六經門六經總論下隋志經籍者機神之妙㫖聖哲之能事學之者將殖焉不學者將落焉寔仁義之陶鈞誠道德之槖籥也其爲用大矣故曰不疾而速不行而至今之所以知古後之所以知今其斯之謂也是以大道方行俯龜象而設卦後聖有作仰鳥跡以成文書契已傳繩木棄而不用史官旣立經籍於是興焉夫經籍也者先聖據龍圖握鳳紀南面以君天下者咸有史官以紀言行言則左史書之動則右史書之故曰君舉必書懲勸斯在考之前載則三墳五典八索九丘之類是也下逮殷周之世史官尤備紀言書事靡有闕遺則周禮所稱太史掌建邦之六典八法八則以詔王治小史掌邦國之志定世繫辨昭穆内史掌王之八柄策命而貳之外史掌王之外令及四方之志三皇五帝之書御史掌邦國都鄙萬民之治令以贊冢宰此則天子之史凡有五焉諸侯亦各有國史分掌其職則春秋傳晉趙穿弑靈公太史董狐書曰趙盾弑其君以示於朝宣子曰不然對曰子爲正卿亡不越境反不討賊非子而誰齊崔杼弑莊公太史書曰崔子弑其君崔子殺之其弟嗣書死者二人其弟又書乃舍之南史聞太史書死執簡以往聞旣書矣乃還楚靈王與右尹子革語左史倚相趨而過王曰此良史也能讀三墳五典八索九丘然則諸侯史官亦非一人而已皆以記言書事太史總而裁之以成國家之典不虚美不隠惡故得有所懲勸遺文可觀則左傳稱周志國語有鄭書之類是也暨夫周室道衰紀綱散亂國異政家殊俗褒貶失實隳紊舊章孔丘以大聖之才當傾頹之運歎鳳鳥之不至惜將墜於斯文乃述易道而刪詩書脩春秋而正雅頌壞禮崩樂咸得其所自哲人萎而微言絶七十子散而大義乖戰國縱横真僞莫辨諸子之言紛然淆亂陵夷蹐駁以至于秦秦政奮豺狼之心滅先代之迹焚詩書坑儒士以刀筆吏爲師制挾書之令學者逃難竄伏山林或失本經口以傳説漢氏誅除秦項未及下車先命叔孫通草綿蕝之儀救擊柱之弊其後張蒼治律歴陸賈撰新語曹參薦蓋公言黄老惠帝除挾書之律儒者始以其業行於民間猶以去聖旣遠經籍散逸簡札錯亂傳説紕繆遂使書分爲二詩分爲三論語有齊魯之殊春秋有數家之傳其餘互有蹐駁不可勝言此其所以愽而寡要勞而少功者也武帝置太史公命天下計書先上太史副上丞相開獻書之路置寫書之官外有太常太史愽士之藏内有延閣廣内祕室之府司馬談父子世居太史探采前代㫁自軒皇逮于孝成作史記一百三十篇詳其體制蓋史官之舊也至於孝武祕藏之書頗有亡散乃使陳農求遺書於天下命劉向校經傳諸子詩賦任宏校兵書尹咸校數術李柱國校方技每一書就向輙撰爲一錄論其指歸辨其訛謬叙而奏之向卒後哀帝使其子歆嗣父之業乃徙温室中書於天祿閣上歆遂總括羣篇撮其指要著於七畧大凡三萬三千九十卷王莽之末又被焚燒光武中興篤好文雅明章繼軌尤重經術四方鴻生巨儒負篋自遠而至者不可勝算石室蘭臺彌以充積又於東觀及仁壽閣集新書班固傅毅等興掌焉並依七畧而爲書部固又編之以爲漢書藝文志董卓之亂獻帝西遷圖書縑帛軍人皆取爲帷囊所收而西猶七十餘載兩京大亂掃地皆盡魏氏代漢采掇遺亡藏在祕書中外三閣魏鄭黙始制中經荀朂又因中經更著新簿分為四部總括羣書一曰甲部紀六藝及小學等書二曰乙部有古諸子家近世子家兵書兵家術數三曰丙部有史記舊事皇覽薄雜事四曰丁部有詩賦圖讚汲冢書大凡四部合一萬九千九百四十五卷但錄題及言盛以縹囊書用緗素至於作者之意無所論辨惠懷之亂京華蕩覆渠閣文籍靡有孑遺東晉之初漸更鳩聚李充以朂舊簿校之其見存者但有三千一十四卷充遂總沒衆篇之名但以甲乙爲次自爾因循無所變革其後中朝遺書稍流江左宋元嘉八年謝靈運造四部目錄大凡六萬四千五百八十二卷元徽元年王儉又造目錄大凡萬五千七百四卷儉又别撰十志一曰經典志紀六藝小學史記雜傳二曰諸子志紀今古諸子三曰文翰志紀詩賦四曰軍書志紀兵書五曰隂陽志紀隂陽圖緯六曰術藝志紀方技七曰圖譜志紀地域及圖書其道佛附見合九條然亦不述作者之意但於書名之下每立一傳而又作九篇條例編乎首卷之中文義淺近未爲典則齊永明中祕書丞王亮監謝朏又造四部書目大凡一萬八千二十卷齊末兵火延燒祕閣經籍遺散梁初任昉躬加部集又於文德殿内列藏衆書華林園中總集釋典大凡二萬三千一百六卷而釋氏不豫焉梁有祕書監任昉殷鈞四部目錄又文德殿目錄其術數之書更爲一部使奉朝請祖晣撰其名故梁有五部目錄普通中有處士阮孝緒沉靜寡慾篤好墳史􅀶采宋齊已來王公之家凡有書記叅校官簿更爲七錄一曰經典錄紀六藝二曰記傳錄紀史傳三曰子兵錄紀子書兵書四曰文集錄紀詩賦五曰技術錄紀數術六曰佛錄七曰道錄其分部題目頗有次序剖析詞義淺薄不經梁武敦悦詩書下化甚上四境之内家有文史元帝克平侯景收文德之書及公私經籍歸于江陵大凡七萬餘卷周師入郢咸自焚之陳天嘉中又更鳩集考其篇目遺缺尚多其中原則戰爭相尋干戈是務文教之盛符姚而已宋武入闗收其圖籍府藏所有藏四千卷赤軸青紙文字古拙後魏始都燕代南畧中原粗收經史未能全具孝文始都洛邑借書於齊祕府之中稍以充實暨於爾朱之亂散落人間後齊遷鄴頗更捜聚迄於天統武平校寫不輟後周始基闗右外通強隣戎馬生郊日不暇給保定之始書止八千後稍加增方盈萬卷周武平齊先封書府所加舊本纔至五千隋開皇三年牛𢎞表請分遣使人捜訪異本每書一卷賞絹一疋校寫旣定本卽歸主於是民間異書往往間出及平陳已後經籍漸備檢其所得多太建時書紙墨不精書亦拙惡於是總集編次存爲古本召天下工書之士京兆韋霈南陽杜頵等於祕書内補續殘缺爲正副二本藏于宫中其餘以實祕書内外之閣凡三萬餘巻煬帝卽位祕閣之書限寫五十副本分爲三品上品紅瑠璃軸中品紺瑠璃軸下品漆軸於東都觀文殿東西廂構屋以貯之東屋藏甲乙西屋藏丙丁又聚魏以來古跡名畫於殿後起二臺東曰妙楷臺藏古跡西曰寶墨臺藏古畫又於内道場集道佛經别撰目錄大唐武德五年克平僞鄭盡收其圖書及古跡焉命司農少卿宋遵貴載之以舩泝河西上將致京師行經底柱多被漂沒其所存者十不一二其目錄亦爲所漸濡時有殘缺今考見存分爲四部合條爲一萬四千四百六十六部有八萬九千六百六十六卷其舊錄所取文義淺俗無益教理者並刪去之其舊錄所遺辭義可采有所𢎞益者咸附入之遠覽馬史班書近觀王阮志錄挹其風流體例削其浮雜鄙俚離其疏遠合其近密約文緒義凡五十五篇各列本條之下以備經籍志雖未能研幾探賾窮極幽隠庶乎𢎞道設教可以無遺缺焉夫仁義禮智所以治國也方技數術所以治身也諸子爲經籍之鼓吹文章乃政化之黼黻皆爲治之具也故列於此志云緯書易曰河出圖洛出書然則聖人之受命也必因積德累業豐功厚利誠著天地澤被生人萬物之所歸往神明之所福享則有天命之應蓋龜龍衘負出於河洛以紀易代之徴其理幽昧究極神道先王恐其惑人祕而不傳説者又云孔子旣叙六經以明天人之道知後世不能稽同其意故别立緯及䜟以遺來世其書出於前漢有河圖九篇洛書六篇云自黃帝至周文王所受本文又别有三十篇云自初起至于孔子九聖之所增演以廣其意又有七經緯三十六篇並云孔子所演并前合爲八十一篇而又有尚書中候洛罪級五行傳詩推度災紀厯樞合神務孝經句命決援神契雜䜟等書漢代有郗氏袁氏説漢末郗萌集圖緯䜟雜占爲五十篇謂之春秋災異宋均鄭𤣥並爲䜟律之注然其文辭淺俗顛倒舛謬不類聖人之㫖相傳疑世人造爲之後或者又加㸃竄非其實錄起王莽好符命光武以圖䜟興遂盛行於世漢時又詔東平王蒼正五經章句皆命從䜟俗儒趨時益爲其學篇卷第目轉加增廣言五經者皆憑以爲説唯孔安國毛公王璜賈逵之徒獨非之相承以爲妖妄亂中庸之典故因漢魯恭王河間獻王所得古文叅而考之以成其義謂之古學當世之儒又非毁之竟不得行魏代王肅推引古學以難其義王弼杜預從而明之自是古學稍立至宋太明中始禁圖䜟梁天監已後又重其制及髙祖受禪禁之愈切煬帝卽位及發使四出捜天下書籍與䜟緯相涉者皆焚之爲吏所糾者至死自是無復其學祕府之内亦多散亡今錄其見存列于六經之下以備異説唐五經正義唐太宗以師説多門章句繁雜命孔穎達與諸儒撰五經疏名曰五經正義巾箱五經梁衡陽王鈞嘗手自細寫五經部爲一卷置于巾箱以備遺忘六經法言唐韋處厚路隋掇五經粹要二十篇號六經法言穆宗時五經精義開元九年二月丙申詔楊安國等五經正義以五經精義爲名漢校定中書五經伏湛元孫元忌世襲湛爵爲不其侯􅀶物多識順帝時爲侍中屯騎校尉永和元年詔元忌與議郎黄景校定中書五經諸子百家藝術中書内中之書其後元嘉中成唐新修六經要言敬宗時崔郾與髙重類六經要言爲十篇以便觀省九經師授譜韋處微以學者薄師道不如聲樂賤工能尊其師著九經師授譜詆其違晉中經晉得汲冢古文竹書詔荀勉撰次以爲中經五經通論束晢漢大學石經蔡邕少慱學好辭章術數天文妙探音律拜郎中校書東觀遷議郎邕以經籍去聖久遠文字多訛俗儒穿鑿疑誤後學熹平四年與堂谿楊賜馬日磾張馴韓説覃颺等求正定六經文字靈帝許之乃自書於碑使工鐫刻立於大學門外於是後儒晩學咸取正焉及碑始立其觀視者及摹寫者車乗日千餘兩洛陽記大學堂前石經四部盧植尚書三禮盧植熹平四年作尚書章句三禮解詁時始立大學石經以正五經文字植上書願詣東觀專心研精合尚書章句攷禮記失得裁定聖典刋正碑文徐邈五經音訓徐邈傳漢武帝始覽載籍招延儒學之士太傅謝安舉邈以應選補中書舎人在西省侍帝雖不口傳章句然開釋文義標明指趣撰正五經音訓學者宗之唐石經髙重爲國子祭酒與鄭覃刋定九經于石鄭覃文宗時爲相以經籍刓繆􅀶士淺陋不能正建言願與鉅學共力讐刋準漢故事鏤石大學示萬世法詔可覃乃表周墀崔球張次宗孔温業等是正其訛文刋于石文宗定五經鑱之石張叅等正其訛文五經鈎沉晉楊方傳方爲髙梁太守在郡積年著五經鈎沉更撰吳越春秋行於世隋志五經鈎沉十卷五經同異評徐苗傳家貧好學遂爲儒宗作五經同異評石渠議宣帝甘露三年詔諸儒講五經同異於石渠閣施讐論易周堪孔霸等論書薛廣德論詩戴聖論禮公羊則嚴彭祖榖梁則尹更始各以經議對蕭望之平奏其議天子稱制臨決焉乃立梁丘易大小夏候尚書榖梁春秋􅀶士白虎通後漢章帝建初四年詔諸儒㑹白虎觀講五經同異帝親稱制臨決如石渠故事作白虎通令班固撰集其事凡四十篇今所存本乃四十四卷篇首於爵終於嫁娶大抵皆引經㫁論却不載稱制臨決之語咸平重校七經疏義咸平四年翰林侍讀學士邢昺等上重校周禮儀禮公榖傳孝經論語爾雅七經疏義凡一百六十三卷命模印頒行咸平龍圖閣五經圖見圖類諸子百家門孝經類夫孝者天之經地之義人之行自天子達於庶人雖尊卑有差及乎行孝其義一也孔子旣序六經題目不同指意差别恐斯道離散故作孝經以總㑹之明其枝流雖分本萌於孝者也遭秦焚書爲河間人顔芝所藏漢初芝子真出之凡十八章而長孫氏愽士江翁少府后蒼諫議大夫翼奉安昌侯張禹皆名其學又有古文孝經與古文尚書同出而長孫有閨門一章其餘經文大較相似篇簡缺解又有衍出三章并前合爲一十二章孔安國爲之傳至劉向典校經籍以顔本比古文除其繁惑以十八章爲定鄭衆馬融並爲之注又有鄭氏注相傳或云鄭𤣥其立義與𤣥所註餘書不同故疑之梁代安國及鄭氏二家並立國學而安國之本亡於梁亂陳及周齊唯傳鄭氏至隋王劭於京師訪得孔傳送至河間劉炫炫因序其得喪述其議疏講于人間漸聞朝廷後遂著令與鄭氏並立儒者諠諠皆云炫自作之非孔舊本而祕府又先無其書又云魏氏遷洛未達華語孝文帝命侯伏侯可悉陵以夷言譯孝經之㫖教于國人謂之國語孝經今取以附此篇之末出隋志説齊孝經序云孔子爲曾參言孝道門人錄之爲書謂之孝經更秦滅學漢河間獻王得之顔芝家凡十八章古文孔氏一篇二十二章本出屋壁劉向校書定著十八章至於唐諸儒説者且百家孝明皇帝詔諸儒集議劉知幾詆鄭注請行孔傳司馬正非之力申鄭説帝乃采集六家自爲之注頒之天下以十八章爲定元行冲爲之疏本朝邢昺增損之力正義訓詁證引詳矣先正司馬公范公皆爲古文指解所發明益以通暢夫孝百行之本學者所當先聖人之言簡嚴易直而天人備固非一家所能究其説故拾諸儒遺意相與講貫務通理而不飾文學者以筌蹄觀之庶幾不悖先聖人之意正義云按孝經遭秦坑焚之後爲河間顔芝所藏漢初除挾書之律芝子真始出之長孫氏及江翁后蒼翼奉張禹等所説皆十八章及魯共王壊孔子宅得古文二十二章庶人章分爲二曾子敢問章分爲三又多閨門一章孔安國作傳劉向校經籍比量二本除其煩惑以十八章爲定而不列名又有荀栩集其錄及諸家疏並無章名而援神契自天子至庶人五章唯皇侃標其目而冠於章首今鄭注見章名豈先有改除近人追遠而爲之也鄭注依古今集詳議儒官連狀題其章名乞加商量遂依所請曾參字子輿孔子以爲能通孝道故受之業作孝經史弟子傳至於迹相祖述殆且百家韋昭王肅先儒之領䄂虞翻劉劭抑又次焉劉炫明安國之本陸澄譏康成之注𤣥宗序何休注訓孝經論語皆經緯典謨本傳孝文皇帝欲廣遊學之路論語孝經孟子爾雅皆置慱士明帝自期門羽林之士悉通孝經章句後儒林序貞觀十四年太宗觀釋奠於國子學詔孔穎達講孝經禮樂志天寶三載大赦詔天下家藏孝經唐𤣥宗紀論語類論語者孔子弟子所錄孔子旣叙六經講於洙泗之上門徒三千達者七十其與夫子應荅及私相講肄言合於道或書之於紳或事之無厭仲尼旣沒遂緝而論之謂之論語漢初有齊魯之説張禹本授魯論晩講齊論後遂合而考之刪其煩惑除去齊論問王知道二篇從魯論二十篇爲定號張侯論當世重之周氏包氏爲之章句馬融又爲之訓又有古論語與古文尚書同出章句煩省與魯論不異唯分子張爲二篇故有二十一篇孔安國爲之傳漢末鄭𤣥以張侯論爲本參考齊論古論而爲之注魏陳羣王肅周生烈皆爲義説何晏又爲集解是後諸儒多爲之注齊論遂亡古論先無師説梁陳之時唯鄭𤣥何晏立於國學先鄭氏甚微周齊鄭學獨立至隋何鄭並行鄭氏盛於人間其孔叢家語並孔氏所傳仲尼之㫖爾雅諸書解古今之意并五經總義附于此篇論語者孔子應荅弟子時人及弟子相與言而接聞於夫子之語也當時弟子各有所記夫子旣卒門人相與輯而論纂故謂之論語藝文志序曰漢中壘校尉劉向言魯論語二十篇皆孔子弟子記諸善言也仲弓子游等撰定論者綸也以此書可以經綸世務故曰綸也圓轉無窮故曰輪也藴含萬理故曰理也篇章有序故曰次也羣賢集定故曰撰定也鄭元疏論語者五經之輨轄六藝之喉衿也孟子之書則而象之魯論語者魯人所𫝊即今所行篇次是也龔奮夏侯勝韋賢及子元成魯扶卿夏侯勝蕭望之並傳之各自名家齊論語者齊人所傳别有問王知道二篇凡二十一篇其二十篇中章句頗多於魯論王吉宋畸王卿貢禹五鹿充宗王生並傳之王吉名家古論語者自出孔氏壁中凡二十一篇有兩子張篇次不與齊魯同孔安國爲傳後漢馬融亦注之張禹受魯論於夏侯建又從庸生王吉受齊論擇善而從號曰張侯論最後行漢世禹以論授成帝後漢包咸周氏並爲章句列于學官鄭元注本就魯論張包周之篇考之齊古爲之注焉何晏集孔安國包咸周氏馬融鄭𤣥陳羣王肅周生烈之説爲集解正始中盛行于世正義孝文皇帝欲廣遊學之路論語孝經孟子爾雅皆置􅀶士平帝詔召天下通知論語教授在所爲駕一封軺傳遣詣京師本紀王通隋末大儒聚徒河汾間倣古作六經又爲中説以擬論語不爲諸儒稱道故書不顯惟中説獨𫝊王續𫝊或曰儒者稱論語孔子弟子所記信乎曰樂正子春子思之徒相與爲之爾當時孔子弟子雜記其言然卒成其書者曾氏之徒也栁論語辨正孟子類孟子名軻子思弟子有列傳師古曰聖證論云軻字子車此志無字未詳其所得出藝文志魯公族孟孫之後師孔子之孫子思著書七篇遭蒼姬之訖錄值炎劉之未奮進不得佐興唐虞雍熙之和退不能信三代之餘風恥沒世而無聞焉是故垂憲言以貽後人於是退而論集所與髙弟弟子公孫丑萬章之徒難疑荅問又自撰其法度之言著書七篇二百六十一章三萬四千六百八十五字包羅天地揆叙萬類可謂亞聖命世之大才也又有外書四篇性善辨文説孝經爲正其文不能洪深不與内篇相與似非孟子本其後世依倣而託之者也孟子旣沒公孫丑萬章之徒撰次難疑荅問成書七篇後漢趙岐爲章句析爲十四篇唐林謹思以弟子記軻之言不能盡其意故演而續之作續孟子二卷本朝馮休謂孟子有可疑者或門人所增益乃作刪孟一卷司馬公有疑孟孟子之書亦不必論其文之如何是直萬章公孫丑之徒所次耳何有於孟子哉足下試以唐陸善經孟子對今孫宣公所校定孟子㫁可見其文之異同也晁以道荅賈子莊書韓愈以爲弟子所㑹集非軻自作今考之則知愈言非妄也其書孟子所見諸侯名謚如齊宣王梁惠王梁襄王滕定公滕文公魯平公是也夫死然後有謚軻著書時所見諸侯不應皆死故予以愈言爲然晁氏太史公曰余讀孟子書至梁惠王問何以利吾國未嘗不廢書而嘆也孟子受業子思之門人道旣通游事齊宣王宣王不能用適梁梁惠王不果所言則見以爲迂遠而闊於事情孟軻乃述唐虞三代之德以所好者不合退而與萬章之徒序詩書述仲尼之意作孟子之書孟子列𫝊始吾讀孟軻書然後知孔子之道尊聖人之道易行尊聖人之道者孟氏而已晩得揚雄書益尊信孟氏其存而醇者孟軻氏而止爾孟氏醇乎醇讀荀篇孟軻好辯孔道以明轍環天下卒老于行吐辭爲經舉足爲法絶類離倫優入聖域進學解羣書考索卷八
