body:
  text: 羣書考索卷二宋章如愚撰六經門書類尚書始末古者伏羲氏之王天下也始畫八卦造書契以代結繩之政由是文籍生焉伏羲神農黃帝之書謂之三墳言大道也少昊顓帝髙辛唐虞之書謂之五典言常道也至于夏商周之書雖設教不倫雅誥奧義其歸一揆是故歷代寶之以為大訓先君孔子生于周末討論墳典斷自唐虞以下訖于周芟夷煩亂剪截浮辭舉其宏綱撮其機要足以垂世立教典謨訓誥誓命之文凡百篇所以恢宏至道示人主以軌範也孔子百篇遭秦火不存至漢伏生口授得二十八篇後又得泰誓一篇為二十九篇孔壁之書既出孔安國定其可知者二十五篇又别出舜典益稷盤庚康王之誥共為五十八篇其文以𨽻書存古文故謂之古文尚書此書之成遭巫蠱不出漢儒聞孔氏之書有五十八篇遂以張霸之徒造偽書二十四篇為古文尚書兩漢儒者所傳大抵皆霸偽本也其實未嘗見真古文尚書故杜預注左氏韋昭注國語趙岐注孟子凡所舉書出于二十五篇之內皆指為逸書其實未嘗逸也劉歆當西漢之末欲立古文學官移書責諸博士甚力然歆之所見皆偽夲亦非真古文書也以至賈馬鄭服之輩亦皆不見古文書至晉然後其書漸出及開皇三年求遺書得舜典然後于書大備孔氏書始出皆有𨽻書至唐天寶間詔衛衡改古文從今文書今之所傳乃唐天寶所定之夲也並林少穎説漢藝文志易曰河出圗洛出書聖人則之故書之所起逺矣至孔氏纂焉上斷于堯下訖于秦凡百篇而為之序原其作意秦燔書禁學濟南伏生獨壁藏之漢興亡失求得二十九篇以教齊魯之間訖孝宣世有歐陽大小夏侯氏立于學官古文尚書者出孔子壁中武帝末魯共王壞孔子宅欲以廣其宫而得古文尚書及禮記論語孝經凡數十篇皆古字也共王往入其宅聞鼓琴瑟鐘磬之音于是懼乃止不壞孔安國孔子後也悉得其書以考二十九篇得多十六篇安國獻之遭巫蠱事未列于學官劉向以中古文校歐陽大小夏侯三家經文酒誥脫簡一召誥脫簡二率簡二十五字者脫亦二十五字簡二十二字者脫亦二十二字文字異者七百有餘脫字數十書者古之號令號令于衆其言不立具則聽受施行者弗曉古文讀應爾雅故解古今語而可知也尚書三説孔安國曰以其上古之書謂之尚書尚書施機鈐曰尚書上也上天垂文垂布節度如天行也王肅曰上所言下為史所書曰尚書也推此三説其義不同洛書禹治洪水賜洛書法而陳之洪範是也自初一曰五行至威用六極凡六十五字皆洛書夲文至商箕子在父師位而典之周興武王虛已而問焉河圗洛書相為經緯八卦九章相為表裏五行志洛書之數自天一與地六合于北而生水地二與天七合于南而生火天三與地八合于東而生木地四與天九合于西而生金天五與地十合于中而生土然後五十五數謂之生成或曰河圗陳四象八方之位而不言五行洛書述五行而不述四象然四象亦五行之數所以異者由四象附之數而成質故四象異于五行五行亦四象之數由始於生而終於成乃合于五十五所以異于四象矣則知龍圗自一至九皆縱橫合天地自然之數龜書其數自一至十相為生成符於自然之數皆非後人假偽設之也故伏羲始因河圗而陳四象終由洛書而畫八卦至大禹資洛書而敘五行終本河圗而分九疇也故河圗八卦自伏羲始也洛書九疇自大禹始也又曰河圗有天一地二天三地四為象之始至于天五則居中而主乎土變化但未能成形謂之四象至于洛書有土十之成數故水火金木皆相竒耦而成形故河圗合四象之數可以定八方之位洛書有五行之數可以備八卦之象也是象生其卦必俟天之變而備于洛書土十之成數而後成八卦矣于是象金而畫乾兌象土而畫坤艮象木而畫震巽象水而畫坎象火而畫離是為八卦故易曰河出圗洛出書聖人則之資用孔子定書尚書緯云孔子求書得黃帝元孫帝魁之書迄于秦穆公凡三千二百四十篇斷可取以為世法者百二十篇故以百二篇為尚書十八篇為中候漢今文尚書孔子刪書為百篇及秦焚書孔子末孫惠與秦博士伏勝各藏其夲于屋壁漢興伏生求其書亡數十篇獨得二十九篇歐陽公謂伏生既耄乃繆合三十四篇為二十九篇文帝求治尚書者天下無有而伏生老不能行使朝錯往受之其後有歐陽生大小夏侯勝建之徒皆學伏生書寫以漢世文字號今文尚書漢古文尚書武帝時孔惠之書始出皆科斗文字因魯共王壞孔子舊宅得之其文始出時人無能知者安國以所聞伏生之書考論文義定其可知以𨽻古定增多伏生二十五篇又分伏生書中四篇為九篇堯典分舜典臯陶分益稷盤庚分為三篇顧命分康王之誥并序一篇合為五十九篇及安國作傳遂引序以冠其篇首而定為五十八篇虞書五虞書亡十一夏書四夏書亡五商書十七商書亡十七周書三十二周書亡九共五十八篇共亡四十九篇號為古文尚書會巫蠱事起遂寢不用平帝雖立學官事見儒林贊然其書終不甚顯至後漢遂絶孔頴逹正義謂馬鄭諸儒莫覩其學見于經典者諸儒皆謂之逸書趙岐注孟子謂丕顯丕承等杜預釋左傳謂念茲在兹等皆為逸書今見于大禹謨君牙二篇後漢杜林傳古文尚書賈逵作訓馬融作傳鄭元注解由是古文遂顯于世東漢中文尚書劉陶眀尚書為之訓詁推大小夏侯歐陽三家及古文是正文字七百餘事名曰中文尚書唐今文尚書唐眀皇天寶三年詔應尚書古體文字勒依今文館閣書目又云李肇經史題釋云開元十四年改洪範無偏無頗為無偏無詖詔曰三復斯言書皆叶韻故天寶復有勒依今文之詔焉前段參藝文志儒林傳及崇文總目修定古文今文尚書緇衣載君奭曰昔在上帝觀文王之德鄭氏注云古文周田觀文王之德為割申勸寧王之德今博士讀為厥亂勸寧王之德三者皆異古文似近之正義云古文周田觀文王之德為割申勸寧王之德者以伏生所傳歐陽夏侯所注者為今文尚書以衛賈馬所注者元從壁中所出之古文即鄭注尚書是也今博士讀為厥亂勸寧王之德者謂今之尚書也三者以異古似近之者三者謂此禮記乃古文尚書並今博士讀者三者其文各異古文周田為割申其字近于義理故云古文似近之云古三墳此書之目見于孔安國序而漢藝文志已不載夲朝元豐中毛漸因奉使西京得之按其書以山氣形為别山墳謂之連山氣墳謂之歸藏形墳謂之坤乾與先儒所言三易異其中有紀姓一篇皇策一篇政典二篇胤征引政典曰先時者殺無赦不及時者殺無赦孔氏謂夏后氏為政之典籍今政典之文頗合豈偽邪毛漸序館閣書目云皆依托也左傳楚靈王謂左史倚相能讀三墳五典八索九丘之書三墳夲朝張商英天覺得之於北陽民家墳皆古文而傳乃𨽻書三墳者山氣形也按七略隋志皆不載世皆以為天覺偽撰云朝志舜典晉元帝時豫章內史梅賾始以孔傳奏上而缺舜典一篇乃取王肅堯典慎徽以下分為舜典以續之自是歐陽大小夏侯家等學馬融鄭元王肅諸注廢而古文孔傳獨行列于學官永為世範齊建武中吳興人姚方興采馬王之義以造孔傳舜典云於大􅲥拾得詣闕以獻舉朝集議咸以為非及江陵板蕩其文北入中原學者異之隋劉炫遂取一篇列諸夲第故今人所習尚書舜典元出於姚氏者焉禹貢九州冀兖青徐揚荆豫梁雍自虞舜分冀為并幽分青為營周禮職方氏九州無徐梁有幽并爾雅無梁并青有幽營徐蓋歷代沿革大同而小異也漢改雍曰涼改梁曰益置徐州以復禹舊號增交州以治南越資用禹貢先冀次兖言治水自下始禮先揚次荆南為陽方尊之為先也九州或言距河或言距海或以山或以水所以别其封域也獨冀不言封域者京師所在孔安國曰以餘州所至亦可知矣帝王世紀曰顓帝帝嚳孔子稱其地北至幽陵南暨交趾西蹈流沙東極蟠木是以建萬國而制九州堯遭洪水分為十二州今虞書是也禹平水還為九州今禹貢是也詩正義云禹貢九州夏時之制于周則夏官職方氏辨九州之域有揚荆豫青兖雍幽冀并較之禹貢無徐梁有幽并故地理志云周監二代而損益之改禹貢徐梁合之于雍青分冀州之地為幽并是其事也爾雅釋地九州之名有冀豫雍荆揚兖徐幽營孫炎曰此蓋殷制禹貢有梁青無幽營周禮有幽并無徐營然則此説不同不言殷九州而逺指禹世者孫炎以爾雅之文與禹貢不同于周禮又異故疑為殷制耳亦無眀文言殷改夏地理志云殷因於夏無所變改班固不以爾雅為世法又周禮冀幽并于禹貢惟一州耳賈公彥疏云爾雅曰兩河之間曰冀州河南曰豫州濟東曰徐州河西曰雍州漢南曰荆州江南曰揚州燕曰幽州濟河間曰兖州齊曰營州詩譜曰梁雍荆豫徐揚之民咸被其化數不同者禹貢所云堯舜法爾雅所云似夏法詩譜所云似殷法自古以來皆有九州惟舜暫置十二州至夏還為九州故春秋云夏之方有德也貢金九牧是也但自神農以上有大九州柱州迎州神州之等至黃帝以來德不及逺惟于神州之內分為九州故括地象云昆崘東南萬五千里名曰神州者是也周禮疏禹貢賦九州之田宜與賦相當今考之經惟兖一州相當耳荆之賦至髙于田五等雍之田至髙於賦五等蓋賦與貢總焉故髙下相補揚賦最重者也田賦之外其貢則金瑶琨篠簜齒革羽毛織貝橘柚不勝其多也雍賦之最輕者以其田賦之外所貢者璆琳琅玕而已亦無包篚之類故總言之則輕也以其最重最輕者質之經而此説近乎可信程禹貢論禹之為法有貢有賦非謂有貢而又有賦也貢賦之法各因其土地而定之故列為三品而為九等此貢賦之常也然而有田腴而賦薄田瘠而賦饒者由乎人力之有多寡爾故孔氏傳以荆州田第八賦第三為人功多雍州田第一賦第六為人功少即是推之多寡可知矣揚之橘柚豫之磬錯皆不常有必錫命然後貢之至于九江之龜亦不常有必錫命然後納之于龜特言納而不言貢者豈非寶龜之意乎兖之賦必待作十三載乃同者兖居東北最下河害特甚今始得降丘宅土自非寬為之期使加功嵗久安得較數嵗之中而定其貢程禹貢論禹貢江河河自積石龍門華隂底柱孟津洛汭而上亘古皆可考自成臯以下垠岸髙于平地故在古已嘗溢為滎澤播為九𣲖而其迹道不主一地矣至後徙決不勝載于是自大伾至洚水大陸説者甚多關並亦言河決常于平原東郡左右其地形稍下聞禹治河時夲空此地以為水滙鄭康成謂九河其八為齊桓公所塞酈道元宗其説而孔頴逹又推夲緯書以成證曰移河為界于齊莒填淤八流以自廣蘇子由亦曰齊桓公利河之地以居民漢河與禹河自周漢而後分南北兩道蓋河自周定王五年已失故道矣河有九河江有九江古今概謂分流為九以經考之特一𣲖耳不與河同也經之序九河曰北播為九河同為逆河入于海先播而為九又合而為一其文甚明説者曰逆者迎也九江有是哉曰過九江至于東陵曰過九江至于敷淺原其曰過者禹自記其所經如曰過洚水過洛汭是也河流自積石以至海源委半天下而其橫曾不能與江並郭璞所謂踰淮咸江也夫以如此源委而又益以滔天襄陵之水其勢自應不能容受故上流則溢滎為濟而下流則播一為九理之必然九河之名爾雅有之漢世許商按求其故僅得其三杜佑作通典又從而附益之蓋九得其六矣夫河患為甚􅊰求禹迹亦最詳又與三代耳目接近其所得知者僅僅三河而亦不能真不知後世日逺于古凡其載籍皆非漢儒之所見則其所得河道何從而增多于漢殆難輕信也班固作漢史曰韓牧欲即九河處穿河以殺水怒王橫闢之曰往者天嘗連雨東北風海水溢西南出浸數百里九河之地已為海所漸矣信橫之言足以破萬世之惑後之言禹貢者盍稽焉賈讓謂古隄闊故遊波有所縱蕩漢隄狹故束迫而為決溢初齊作隄去河二十五里水抵隄泛趙魏趙魏亦為隄去河二十五里漢隄去水數百步逺者數里宜河之為患也漢自髙后以前唐自肅代而後河患特少則生齒登耗乃與河之平決相應蓋人希土曠則河濡得以受水稍經生息則遙隄之外展轉居作而新隄興矣夲朝興國詔書曰河防舊以遙隄寬其水勢其後民利沃壤咸居其中河之盛溢則罹其患也已上並程禹貢論河源之説後世甚紛紛也或以為崑崙或以為蔥嶺或以為于闐由不詳見于聖人經故後世復以肆其臆説獨怪作書者導淮則曰自桐柏導渭則曰自鳥鼠導洛則曰自熊耳以淮出桐柏渭出鳥鼠洛出熊耳故皆以自言之至于導河積石而獨不言自者豈非源之所自出在當時或未究歟先儒以為施功發于積石而不指以為源抑所以發眀作書者之微意也積石雍州之山在金城之西南先儒亦以河之所經則非河源眀矣史記一段見拾遺一段見地理河門唐太宗貞觀九年李靖伐吐谷渾督諸軍經積石河源且至未窮其西境禹貢汴水大河不輟為治世患而汴渠規橅不出于禹而轉輸之利乃有益于後世然則河水入汴煬帝為之也後世不以一勞永逸為功而獨深罪煬帝者以其主為燕遊耳不獨汴也淮不通江江不通浙其鑿而通之因古迹以便漕運皆煬帝實成之江之通淮以𨝍溝𨝍溝吳創也禹貢三江三江之説諸儒不一考於經固自有三江之文於導漾曰東為北江入于海於導江曰東為中江入于海孔安國順經為説曰有中有北則有南可知近世蘇氏即中北二江之文以求三江遂以豫章彭蠡之江南出而北會者指為南江以足三江之數並程禹貢論伊訓稱元祀十有二月商之正月即夏之十二月也商雖建丑為正猶以夏正數月史記秦始皇三十一年十二月更名臘曰嘉平夫臘建丑之月也秦以十月為正則臘當在三月而云十二月以是知古者雖改正朔然猶以夏正數月也漢元年十月五星聚東井泰誓宣帝時復有河內女子得泰誓一篇獻之與伏生所誦合三十篇行之于世其篇所載年月不與序相符會又與左氏國語孟子所引泰誓不同故漢魏諸儒咸疑其繆或以為漢儒引白魚赤烏之事洪範五行傳劉向在成帝時領校中五經祕書向見尚書洪範箕子為武王陳五行隂陽休咎之證乃集合上古以來歷春秋六國至秦漢符瑞災異之説推迹行事連傳禍福著其占驗比類相從各有條目凡十一篇號曰洪範五行傳論奏之天子心知其忠故為鳳兄弟起此論也班固云發明大傳著天人之應漢劉向治榖梁春秋數其禍福傳以洪範至歆言五行傳又頗不同孝武時夏侯始昌善推五行傳其後以傳夏侯勝下及許商其傳與劉向同向之傳五行曰田獵不宿出入不節奪民農時則木不曲直棄法律逐功臣則火不炎上治宫室飾臺榭則稼穡不成好攻戰輕百姓則金不從革簡宗廟廢祭祀則水不潤下其傳五行事曰貌之不恭是謂不肅厥咎狂厥罰常雨厥極惡言之不從是謂不又厥咎僣厥罰常暘厥極憂視之不明是謂不哲厥咎豫厥罰常燠厥極疾聽之不聰是謂不謀厥咎急厥罰常寒厥極貧思之不睿是謂不聖厥咎蒙厥罰常風厥極凶短折五行志書斷自唐虞夫子生于春秋之末干戈相尋無復禮遜敘書始于此者正欲示天下以禮遜也及羣弟子述論語終于堯曰荀卿作荀子而終于堯問皆夫子之遺意春秋始隱亦此意乎書終於秦誓讀文侯之命一篇與平康之世無異當東遷之後而無憤悱哀痛之心君子是以知其無志也自文侯之命無復有誥則周之業衰矣雖然聖人猶有望於魯也故繼之以費誓蓋魯周之裔也周之衰孔子有望于魯魯不足望則勢必并於秦此夫子感傷之深意故以秦誓終焉中星聖人南靣而聽天下占星以授人時故春則日中星鳥舉其形也夏則日永星火舉其次也秋宵中星虛冬日短星昴舉其宿也于春言其形則夏為蒼龍秋為元武冬為白虎可知于夏舉其次則春為鶉火秋為元枵冬為大梁可知于秋冬言其宿則春為栁星夏為氐房可知或言其形或言其宿互相見也所以異乎月令之中星仲春曰日中日中者陽至是而中也仲秋曰宵中宵中者隂至是而中也冬至之後日自南而北則陽氣漸生則畫日以長夏至之後日自北而南則隂氣漸興則畫日以短六宗伏生馬融謂天地四方鄭氏謂星辰司中司命風師雨師劉歆謂乾坤六子賈逵謂天宗三日月星地宗三河海岱獨晉人張髦謂三昭三穆是也按天神人鬼地祇三祭之説尚矣周禮春官所載若樂六變則天神可得而禮矣若樂八變則地祗可得而禮矣若樂九變則人鬼可得而禮矣是則三祭之禮未嘗偏廢舜當受命之初即肆類于上帝禋于六宗望于山川其為天神人鬼地祗之祭復何疑哉伏生大傳生為秦博士至孝文時且百嵗歐陽生張生從其學而授之伏生死後數子各論所聞以己意彌縫其間别作章句因名之曰傳至鄭康成始次為八十三篇館閣書目汲冡書晉太康中於汲郡古冢得之先儒多稱是書乃孔子刪百篇之餘史通疑其言堯舜益啓非揖遜桀遜位于湯與經不合杜預左氏後序言其載太甲潛殺伊尹之事與尚書乖異晉武帝咸寧五年汲郡人掘魏襄王冡得竹簡小篆古書十餘萬言藏于祕府荀勉傳武帝時汲郡冡中得古文竹書詔勉撰之為中經列在祕書訓詁傳教隋經籍志書之所興蓋與文字俱起孔子觀書周室得虞夏商周四代之典刪其善者上自虞下至周為百篇編而序之遭秦滅學至漢唯濟南伏生口授二十八篇又河內女子得泰誓一篇獻之伏生作尚書傳四十一篇以授同郡張生張生授千乘歐陽生歐陽生授同郡兒寬寬授歐陽生子世世傳之至曾孫歐陽髙謂之尚書歐陽之學又有夏侯都尉受業于張生以授族子始昌始昌傳族子勝為大夏侯之學勝傳從子建别為小夏侯之學故有歐陽大小夏侯三家並立訖漢東京相傳不絶而歐陽最盛初漢帝時魯共王壞孔子舊宅得其末孫惠所藏之書字皆古文孔安國以今文校之得二十五篇其泰誓與河內女所獻者不同又濟南伏生所誦有五篇相合安國並依古文開其篇第以𨽻古字寫之合成五十八篇其餘篇簡錯亂不可復讀並送之官府安國又為五十八篇作書傳巫蠱事起不得奏上私傳其業於都尉朝朝授膠東庸生謂之尚書古文之學而未得立後漢扶風杜林傳古文尚書同郡賈逵為之作訓馬融作傳鄭玄亦為之注然其所傳惟二十九篇又雜以今文非孔舊夲自餘絶無師説晉世祕府所存有古文尚書經文今無有傳者及永嘉之亂歐陽大小夏侯尚書並亡濟南伏生之傳唯劉向父子所著五行傳是其夲法而又多乖戾至東晉豫章內史梅賾始得安國之傳奏之而又闕舜典一篇齊建武中吳姚方興於大航頭得其書奏上比馬鄭所注多二十八字于是始列國學梁陳所講有孔鄭二家齊代惟傳鄭義至隋孔鄭並行而鄭氏甚微自餘所存無復師説又有尚書逸篇出于齊梁之間考其篇目似孔氏壁中書之殘缺者故附尚書之末漢儒不見古文唐虞建官惟百鄭康成乃云有虞氏官六十以不見古文尚書特見今文尚書也如婁敬説高祖有八百諸侯之語仲舒説武帝有白魚流烏之辭劉歆作三統有丙午還師之言與今人所讀書不同蓋今人所讀乃古文也臯陶邁種德德乃降虞書之辭也左氏以為夏書揚雄謂酒誥之篇脫簡也班固謂劉向以古文校歐陽大小夏侯三家經文酒誥脫簡一召誥脫簡二禮經舉咸有一德為尹吉舉君牙為君雅司馬子長謂盤庚三篇為帝辛時事以文侯之命為晉重耳時事鄭康成以胤征為臣名以旅獒為酋豪夏侯亦以嵎夷字為嵎鐵百二篇西漢時又有百兩篇出於張霸分析合二十九篇以為數十又采左氏傳書敘作為首尾凡百二篇文意淺陋成帝以中書中書天子所藏之書也校之非是後以弟子樊並謀反黜其書而百兩先廢疑古十條虞書美放勳云克明俊德而陸賈新語又曰堯舜之民比屋可封按春秋傳云高陽髙辛氏各有才子八人謂之元凱堯不能舉帝鴻氏少昊氏顓帝氏縉雲氏有不才子俱稱四凶而堯亦不能去斯則當堯之時小人君子比肩齊列善惡不分論語云舜舉咎繇不仁者逺則當咎繇未舉不仁甚多又安得謂之克明俊德比屋可封乎其疑一也堯典序云將遜于位遜于虞舜按汲冡瑣語云舜放堯於平陽山海經謂放勳之子為帝丹朱斯則堯之授舜其事難明謂之遜國真虛語耳其疑二也虞書舜典又云五十載陟方乃死注云死蒼梧之野按蒼梧者于楚則川號汨羅在漢則邑稱零陵地總百越山連五嶺地氣歊瘴雖使百金之子猶憚經履其途况于萬乘之君而巡幸其國其疑三也汲冡書云舜放堯帝於平陽益為啓所誅又曰太甲殺伊尹文王殺季歷語異正經世人多不之信也若啓之誅益亦猶晉之殺元乎若舜禹相代事業皆成惟益覆車伏辜夏石亦猶元遜司馬而致殺身之禍乎其疑四也湯誥曰湯伐桀戰于嗚條之野又云湯放桀于南巢惟有慙德而周書商祝篇稱桀遜湯王位墨子曰湯以天下遜務光而使人説務光遂投清冷之泉而死湯乃即位然則湯之飾遜偽迹甚多考墨家所言雅與周書相會書云慙德其疑五也按武王為泰誓數紂過失亦猶近代之有吕相為晉絶秦陳琳為袁檄魏欲加之罪也能無辨乎而後來諸子乘其偽説競列紂罪故孔子曰桀紂之惡不至是班生曰安有據婦人臨朝劉向又曰桀紂不至于是自古言辛癸之罪將非厚誣者乎其疑六也微子之命曰殺武庚案祿父即商紂之子也合謀二叔徇節三監雖君親之怨不除而臣子之誠可見考諸名教死生無慙苟以功業不成便以頑民為目如是則夏少康伍子胥亦當𨽻迹醜徒編名逆黨乎其疑七也論語曰大哉周之德三分天下有其二猶服事商按尚書云西伯戡黎商始咎周夫姫氏爵乃諸侯而輒行征伐此則春秋荆蠻之滅諸姫論語季氏之伐顓臾也按其書曰文王受命稱王有商猶存而王號遽立此即春秋楚及吳越僣號而凌天子也姫之事商當比馬之臣魏必稱周德之大不亦虛偽其疑八也論語曰泰伯可謂至德三以天下遜按吕氏春秋所載云云斯則太王鍾愛厥孫欲立其父泰伯年居長嫡地實妨賢雖欲勿遜君親其立諸原泰伯毁兹玉體從彼祝髮者本以外絶嫌疑內懷猜忌夫子美其因病成遜轉禍為福斯則當矣如云至德無乃謬為其譽乎其疑九也尚書金縢篇云管蔡流言左傳云周公殺管叔而放蔡叔愛王室故也按尚書君奭序云召公為保周公為師相成王為左右召公不恱斯則旦行不臣之禮挾震主之威迹居疑似雖奭猶懷憤悶况彼二叔側聞異議能不懷猜周公遽加顯戮于友于其義薄矣而詩之所述用為美談何哉其疑十也宋朝開寶尚書釋文九年二月翰林李昉知制誥扈蒙李穆上初準詔校定尚書釋文乃詔以大宋開寶新定冠其題刻板頒行陸德眀釋文用古文尚書故命國子博士判監周惟簡與太子中舍陳鄂重修定焉仁宗洪範政鑒康定元年仁宗製以示輔臣英宗欽明殿洪範屏治平三年六月壬子改清居殿曰欽明殿命直龍圗閣王廣淵書洪範一篇于屏時帝謂廣淵曰先帝臨御四十年天下承平得以無為朕方屬多事豈敢自逸故命此殿名因訪廣淵論洪範得失對以張景所得最深以景論七篇進復召對延和曰景所論過先儒逺矣以三德為馭臣之柄尤為善論朕遇臣下常務謙柔聽納之間則自以剛斷此屏置之左右豈特無逸之戒賜廣淵御紙筆墨黃金等仁宗邇英殿無逸圗皇祐四年十二月甲午尚書工部郎中知制誥王洙起居舍人知制誥蔡襄上所書無逸孝經圗初侍講楊安國書無逸篇于邇英閣之後屏上曰朕不欲背聖人之言當書置之左後又命侍讀丁度取孝經天子孝治廣要道至德四章對為右圗令襄書無逸洙書孝經既又命翰林學士承旨王拱辰為一圗焉真宗龍圗閣尚書圗祥符二年九月二十六日召宗室觀于龍圗閣因覽尚書圗髙宗無逸圖紹興五年親寫無逸篇為圗以揭于講筵續書類文中子續書薛收曰敢問續書之始于漢何也子曰六國之弊亡秦之酷吾不忍聞也又焉取皇綱乎漢之統天下也其除殘去穢與民更始而興其視聽乎賈瓊問續書之義子曰天子之義列于範者有四曰制曰誥曰志曰策大臣之義載乎業者有七曰命曰訓曰對曰讃曰議曰誡曰諫文中子曰帝者之制恢恢乎其無所不容其有大制制天下而不割乎其上湛然其下恬然天下之危與天下安之天下之失與天下正之千變萬化吾常守中焉其卓然不可動乎其感而無不通乎此之謂帝制矣程元問叔恬曰續書之有志有詔何謂也叔恬以告文中子曰志以成道言以宣志詔其見王者之志乎其恤人也周其致用也悉一言而天下應一令而不可易非仁智博逹則天明命其孰能詔天下乎叔恬曰敢問策何謂也子曰其言也典其致也博憫而不私勞而不惓其惟策乎子曰續書之有命遂矣其有君臣經略當其地乎其有成敗于其間天下懸之不得已而臨之乎進退消息不失其幾乎道甚大物不廢髙逝獨往中權契化自作天命乎文中子曰事者續書有事其取諸仁義而有謀乎子曰訓之興也抑明主乎雖天子必有師然亦何常師之有惟道所存以天下之身受天下之訓得天下之道成天下之務民不知其由也其惟明主乎賈瓊曰書無制而有命何也魏而下續書無制而有命子曰天下其無主而有臣乎曰兩漢有制志何也子曰制其盡美于恤人乎志其慙德于備物乎薛收曰帝制其出王道乎曰不能出後之帝者非昔之帝也其雜百王之道而取帝名乎其心正其迹譎其乘秦之弊不得已而稱之乎政則苟簡豈若唐虞三代之純懿乎文中子曰七制之主道斯盛矣薛收曰何為其然子曰嗚呼惟明王能受訓收曰無制而有訓何謂也子曰其先帝之制未亡乎大臣之命尚正乎若孝武之制未亡霍光之命尚正則可以訓前漢諸帝也光武之制未亡桓榮之命尚正則可以訓後漢諸君也無制而有訓天下其無大過矣否則蒼生不無大憂焉薛收曰讚其非古乎子曰唐虞之際斯為盛大禹臯陶所以順天休命也文中子曰議天子所以兼采而博聽也惟至公之主為能擇焉文中子曰誡其至矣乎古之明王敬慎所未見悚懼所未聞刻於盤盂勒于几杖居有常念動無過事其誡之功乎薛收曰諫其見忠臣之心乎其志直其言危子曰必也直而不迫危而不詆其知命者之所為乎狡乎逆上吾不與也文中子曰廣仁益智莫善于問乘事演道莫善于對非眀君孰能廣問非逹臣孰能專對乎文中子曰有美不揚天下何觀君子之于君贊其美而匡其失也所以進善不暇天下有不安哉文中子曰議其盡天下之心乎昔黃帝有合宫之聽堯有衢室之問舜有總章之訪皆議之謂也大哉并天下之謀合天下之志而理得矣我何為哉恭已正南靣而已文中子曰晉而下何其紛紛多事也吾視惠懷傷之舍三國將安取志乎此明續書有志三國何其孜孜多虞乎吾視桓靈傷之舍兩漢將安取制乎此明續書有制賈瓊習書至郅鄆之事問于子曰敢問事命志制之别子曰制命吾著其道焉志事吾著其節焉賈瓊以告叔恬叔恬曰書其無遺乎書曰惟精惟一允執厥中其道之謂乎詩曰采葑采菲無以下體其節之謂乎子聞之曰凝其知書矣子曰事之于命也猶志之有制乎非仁義發中不能濟也子曰逹制命之道其知王公之所為乎其得變化之心乎逹志事之道其知君臣之所難乎其得仁義之幾乎文中子曰制命不及黃初續書帝制公命惟漢有之不及魏矣黃初魏文帝初即位年號志事不及太熙續書君志臣事至晉太康而止矣不及惠帝太熙惠帝年號董常習書告于子曰吳蜀遂志乎續書有魏而無吳蜀子慨然歎曰通也敢忘太皇昭烈之懿識孔明公瑾之盛心哉董常曰大哉中國五帝三王所自立也衣冠禮義所自出也故聖賢景慕焉中國有一聖賢明之中國有並並謂吳蜀聖賢除之耶子曰噫非中國不敢以訓文中子曰漢魏禮樂其末不足稱也然書不可廢尚有近古對議存焉續書有對議問對君髙貴鄉公問諸儒經義淳于昭等對曰三王以德化民三王以禮為治是也議若夏侯元議時事曰銓衡臺閣上之分孝弟閭里下之分是也賈瓊習書至桓榮之命曰續書有桓榮之命篇榮字春卿漢光武太子傳洋洋乎光明之業天實監爾能不以揖讓終乎初光武之東海王強為太子強讓其弟陽陽立是謂明帝唐書王勃傳勃祖通隋末居白牛溪教授門人甚衆常起漢魏盡晉作書百二十篇以續古尚書後亡其序有録無書者十篇勃補元缺逸定著二十五篇唐陳正卿續尚書纂漢至唐十二代詔策章疏歌頌符檄論議成書開元末上之孔衍王邵擬尚書自宗周既殞書體遂廢至晉廣陵相魯國孔衍刪漢魏諸史取其美詞典言足為龜鑑者定以篇第纂成一家由是有漢尚書後漢尚書凡為二十六卷至隋祕書監王邵又録開皇仁夀時事編而次之以類相從各為其目尋其義例皆準尚書君懋隋書雖欲祖述商周憲章虞夏觀其體制乃以孔氏家語臨川世説可謂畫虎不成者也羣書考索卷二
