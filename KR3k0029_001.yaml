body:
  text: 羣書考索卷一宋章如愚撰六經門易類周易始末易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶伏羲氏之王天下也始畫八卦以通神明之德以類萬物之情易文王重易六爻作上下篇孔氏為之彖象繫辭文言序卦之屬故曰易道深矣人更三聖世歷三古前藝文志或曰周公作爻辭韓宣子適魯見易象曰吾乃今知周公之德而爻辭作于周公彼誠有以知之其後馬融陸績亦云惟班固以謂人更三聖而周公不與蓋文王周公父子一道序父不序子尊父也而諸儒泥于三聖之説遂以爻辭為文王所作重卦之人諸儒不同凡有四説王輔嗣等以為伏羲鄭元之徒以為神農孫盛以為夏禹史遷等以為文王其言夏禹及文王重卦者案繫辭神農之時已有蓋取諸益與噬嗑以此論之不攻自破其言神農重卦亦未為得今以諸文驗之案説卦云昔者聖人之作易也幽贊于神明而生蓍凡言作者創造之謂也神農以後便是述修而不可謂之作也幽贊用蓍謂伏羲矣伏羲用蓍即伏羲已重卦今依王輔嗣為得其實八索八卦之説謂之八索疏云説者以八卦交互相説其理此索為求索亦為搜索以易為主故易曰八卦成列象在其中矣就八卦而求其理則萬有一千五百二十策天下之事得故謂之索非一索再索而已此索于左傳有不同皆後人失其真理妄穿鑿耳易之卦四營而成易十有八變而成卦繫辭蓍之德圎而神卦之德方以知同上易之象吉凶者得失之象也悔吝者憂虞之象也變化者進退之象也易之變參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此爻象繫辭三易及諸儒訓詁傳授河出圗伏羲始畫八卦其後重而為六十四文王繫爻辭孔子作十翼上彖下彖上始乾坤下始咸恆上象下象上繫下繫文言説卦序卦雜卦古經彖象文言皆在六爻經辭之後乃孔子自卑退不敢干亂正經費直以彖象繫辭文言解説上下經見西漢儒林傳汲冡書冡易上下篇與今正同别有隂陽説而無彖象文言繫辭鄭康成始以彖象連經文而王弼又以文言附於乾坤二卦周官太卜所掌又有三易一曰連山夏易也始于艮鄭玄云象山之出雲連連不絶二曰歸藏商易也先坤而後乾鄭玄云萬物莫不歸藏于其中三曰周易周易也始于乾鄭玄云言易道周普無所不備也孔穎逹云文王重易于羑里猶商世故題周以别商也夏商之易取七八以不變為占左氏言遇艮之八是也周易取九六以變為占穎逹正義云三易杜子春云連山伏羲歸藏黃帝與鄭玄之説皆不取案世譜等書神農曰連山氏亦曰列山氏黃帝曰歸藏氏既連山歸藏並是代號則周易稱周亦然也帝王世紀曰庖犧氏作八卦神農重之為六十四黃帝堯舜引而伸之分為二易至夏人因炎帝曰連山商人因黃帝曰歸藏文王廣六十四卦著九六之爻謂之周易爾雅疏曰歸藏者成湯之所作也公羊疏孔子欲作春秋卜得陽豫之卦宋氏云夏商之卦名孔子何不用周易占之蓋孔子見西狩獲麟又見天命有改制作之意故用夏商之易也秦燔詩書易以卜筮存初商瞿受易于孔子五傳至田何漢之言易者如楊何施讐孟喜梁丘賀之徒所學皆祖田何楊何最先出武帝時已立博士施孟梁丘至宣帝時又立博士惟焦氏費氏髙氏三家為異焦延夀髙相皆述隂陽災異之言焦傳之京房房易具存大抵隂陽律數之事元帝時亦立學官費氏初傳民間至後漢時陳元鄭康成皆傳費氏易費氏興而餘學息今所傳即費氏易也魏王弼注上下經晉韓康伯注繫辭説卦序卦唐孔頴逹為正義夲朝則有陳摶种放范諤昌邵雍之徒孔頴逹云易卦六十四分為上下象隂陽故上篇三十所以象陽竒始乾坤而終于離坎者以有日月之道也下篇三十四以法隂耦始咸恆而終于既濟未濟者所以明戒謹也數龍馬負圗戴九履一左三右七二與四為肩六與八為足五為腹心是天地自然之數也亦謂之九宫縱橫皆十五數總四十有五陳摶孔傳謂龍馬出河伏羲遂則其文以畫八卦謂之河圗大衍之數四十有九分而為二以象兩挂一以象三揲之以四以象四時歸竒於扐以象閏五嵗再閏故再扐而後卦是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣或者六十四卦在其中矣天數二十有五地數三十凡天地之數五十有五而大衍之數五十其用四十有九是于天地之數既減其五又虛其一何也鄭康成云天地之數五十有五以五行之氣通于萬物故減五大衍又減其一故四十有九故嘗為之説曰天一下降與地六合而生水于北地二上駕與天七合而生火于南天三左旋與地八合而生木于東地四右轉與天九合而生金于西天五𡨕運與地十合而生土于中以竒生者成以耦以耦生者成以竒天陽也故其數竒地隂也故其數耦竒耦相合而五十有五之數備大衍之數減其五五行之用也虛其一者元氣之夲也姚信董遇云天地之數五十有五者其六以象六畫之數故減之而其用四十九三兆三易太卜掌三兆之法一曰玉兆二曰瓦兆三曰原兆玉兆顓帝之兆瓦兆帝堯之兆原兆有周之兆其經兆之體皆百有二十其頌皆千有二百掌三易之法一曰連山二曰歸藏三曰周易連山伏羲歸藏黃帝其經卦皆八其别皆六十有四諸儒重卦之説王弼以為伏羲鄭元以為神農孫盛以為夏禹史遷以為文王以經考之隨之上九曰王用享于岐山明夷之六五曰箕子利貞此皆商周時事然則以為神農伏羲夏禹者皆非也或以為文王至武王時始追王此已言王似非文王時重也然則爻辭孰作之歟宣子適魯見易象而言曰吾今乃知周公之德與周之所以王也是爻辭意亦周公作也然世之論易者以為人更三聖謂伏羲文王孔子而不數周公蓋父統子業也此數語見孔頴逹正義孔穎逹援韓宣子之言以驗曰卦辭文王爻辭周公馬融陸績並同此説今依用之觀太卜掌三易之法其經卦皆八其别皆六十四則六十四卦之體已具久矣孔頴逹正義云重卦之人諸儒不同凡有四説王輔嗣以為伏羲鄭元以為神農孫盛以為夏禹史遷以為文王其言禹及文王者按繫辭神農時已有取諸益與噬嗑以此論之不攻而破其言神農亦未為得易緯數三聖但云伏羲文王孔子不及神農時神農但見取諸益不重卦矣今依王輔嗣以伏羲既畫八卦即自重為六十四為得其實孔子象象用夏正或曰易象非孔子作也雷在地中復先王以至日閉關商旅不行后不省方考之夏小正十一月萬物不通則至日閉關后不省方夏之制也周制以十一月北巡狩至于北嶽矣恐大象非孔子作殊不知周正雖建子而孔子彖象皆建寅故以復為十一月姤為五月此正孔子行夏時也文言穆薑襄公九年占有文言之辭襄公二十二年孔子生下距穆薑十四年穆薑之時已誦隨繇之辭因取乾卦文言然其言與今易稍異穆薑之言曰元體之長也亨嘉之會也利義之和也貞事之幹也體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事以今易考之刪改者二增益者六則古已有是言孔子特文之耳他卦彖象而已獨乾坤更設文言以發其義伊川易學京房之學專守名數王弼之學髙談理致繫辭文言序卦或以為非孔子作其間每更一事必稱子曰若夫子自作不應自稱子曰歐公亦以為然唐僧一行易纂引孟喜序卦文辭與今易不同然則今之序卦等恐非夫子全文或出于經師未可知也子夏易漢之易家自田何始何而上未嘗有書魏管輅謂易安可注者其得先儒之心歟古今學者咸謂卜子夏受易孔子而為之傳然太史公劉向父子班固皆不論著唐劉知幾知其偽矣是書亡不傳于今今號為子夏易傳者竊意非古所傳何者觀其書不依古易經次乃遵費氏鄭氏王氏所合彖象文言于爻下而傳之也唯隋唐志有卜子夏易傳二卷文已殘缺子夏詩序之外有易傳唐劉知幾謂疑出於漢之杜氏漢諸儒易傳自魯商瞿子木受易孔子師古曰商瞿姓也瞿音衢以授魯橋庇子庸師古曰姓橋名庇字子庸它皆類此庇音必寐反子庸授江東馯臂子弓師古曰馯姓也音韓子弓授燕周醜子家子家授東武孫虞子乘子乘授齊田何子裝及秦禁學易為筮卜之書獨不禁故傳受者不絶也漢興田何以齊田徙杜陵號杜田生師古曰髙祖用婁敬之言徙關東大族故何以舊齊田氏見徙也初徙時未為杜陵蓋史家夲其地追言之也授東武王同子中雒陽周王孫丁寬齊服生皆著易傳數篇師古曰田生授王同周王孫丁寬服生四人而四人皆著易傳也子中王同字也中讀曰仲同授淄川楊何字叔元元光中徴為大中大夫齊即墨成至城陽相師古曰姓即墨名成廣川孟但為太子門大夫魯周霸莒衡胡師古曰莒人姓衡名胡也臨淄主父偃皆以易至大官要言易者本之田何丁寬易説寬從田何受易復從周王孫受古義景帝時寬為梁孝王將軍距吳楚號丁將軍作易説三萬言訓故舉大誼而已今章小句是也寬授田王孫王孫授施讐孟喜梁丘賀繇是易有施孟梁丘之學京房易京房受易焦延夀延夀嘗從孟喜至成帝時劉向校書考易説以為譜易家説皆祖田何楊叔丁將軍大誼略同唯京氏為異黨焦延夀獨得隱士之説託之孟氏不相與同房以災異得幸繇是易有京氏學費直易長于卦筮無章句徒以彖象繫辭十篇文言解説上下經劉向以中古文易經校施孟梁丘經或脫去無咎悔亡唯費氏經與古文同崔篆易林後漢崔篆建武初朝廷多薦言之者幽州刺史又舉篆賢良篆辭歸不仕客居滎陽著周易林六十四篇用決吉凶多所占驗王弼易魏尚書郎王弼注六十四卦六卷韓康伯注繫辭以下三卷王弼又撰易略例一卷諸儒以彖象文言雜入卦中漢藝文志易經十二篇施孟梁丘三家顔師古曰上下經及十翼故十二篇是則彖象文言繫辭始附卦爻而傳于漢歟先儒謂費直專以彖象文言繫辭解説上下經以彖象文言繫辭雜入卦中者自費氏始其初費氏不列學官惟行民間至漢末陳元鄭康成之徒學費氏古十二篇之易遂亡孔頴逹又謂輔嗣之意象夲釋經宜相附近分爻之象辭各附當爻則費氏初變亂古訓時猶若今乾卦彖象係卦之末古經始變于費氏而卒大亂于王弼惜哉奈何後之儒生尤而效之杜預分左氏傳按經宋𠂻范望輩散太元贊與測於八十一首之下是其明比也揆觀其初乃如古文尚書司馬遷班固序傳揚雄法言序篇云爾今民間法言列序篇首與學官書不同槩可見也唐李鼎祚又取序卦冠之卦首則又效小王之過也嵩山朝氏説漢初傳訓者皆與經别行三傳之文不與經連故石經書公羊傳皆無經文而藝文志所載毛詩故訓傳之文亦與經别及馬融為周禮注乃云欲省學者兩讀故具載夲文而就經為注據此則古之經傳夲皆自為一書詩疏易元魏鍾會嘗著易元互體才性同異後于會家得書二十篇名曰道論實刑名也易摘吳程秉著周易摘易圖唐髙定通王氏易以為圗合八出上員下方合則重轉則演七轉而六十四卦六甲八節備焉太易張志和著太易十五篇其卦三百六十五易發微王勃夢有告者曰易有太極寤而作易發微易飾易文趙賓為易飾易文以為箕子眀夷隂陽氣亡箕子箕子者萬物方荄茲也賓持論巧慧易家不能難皆曰非古法也景鸞易説見漢諸儒門窪丹易通見漢儒諸門易名三義易緯乾鑿度云易一名而含三義所謂易者變易也不易也又云易者其德也光眀四通淡泊不失此其易也變易者其氣也天地不變不能通變五行迭終四時更廢君子取象變節相移此其變易也不易者其位也天在上地在下君南靣臣北靣父坐子伏此其不易也九師易文中子曰蓋九師興而易道微注淮南王聘九人眀易者撰道訓二十篇號九師易文中讃易子曰吾于讃易也述而不敢論又曰讃易道以伸先師之旨注申眀十翼也子讃易至序卦曰大矣時之相生也逹者可與幾矣至雜卦曰旁行而不流守者可與存義子讃易至革歎曰可矣其孰能為此哉至初九曰吾當之矣又安行乎薛收問一卦六爻之義子曰卦也者著天下之時也爻也者效天下之動也趍時有六動焉吉凶悔吝所以不同也收曰敢問六爻之義子曰六者非他也三才之道誰能過乎子讃易至山附于地剝曰固其所也將安之乎是以君子思以下人續易太玄雄以為經莫大于易故作太玄畫為三方九州二十七部八十一家為八十一首每首九贊合七百二十九贊外有踦嬴二贊每卦曰初一次二次三次四次五次六次七次八上九即九贊每贊皆有測卦始于中終於養王涯曰太玄以一生三以三生九以九生二十七以二十七生八十一三三相生元之數也司馬公説元曰易有彖玄有首易有爻玄有贊易有象玄有測易有文言玄有文易有繫辭玄有攡瑩掜圗告易有説卦元有數易有序卦玄有衝易有雜卦玄有錯玄漢宋𠂻解其義吳陸績釋之初雄作太玄首贊測皆異卷晉范望始合之使相聨屬望又采陸績宋𠂻之説而為之注館閣書目唐王涯作説玄一卷本朝許洞撰演玄十卷同上司馬光又為之集注張行成又為翼元十二卷哀帝時雄大覃思渾天參摹而四分之三析而四分天之宿度甲乙也極于八十一旁及三摹九據極之七百二十九贊亦自然之道也故觀易者見其卦而名之觀元者數其畫而定之元者首四重非卦也數也其用自天元推一晝一夜隂陽度數律歷之紀九九大運與天終始故元三方九州二十七部八十一家二百四十三表七百二十九贊分為三卷曰一二三與太初厯相應亦有顓帝之厯焉筮之以三策關之以休咎絣之以象類播之以人事文之以五行擬之以道德仁義禮智無主無名要合五經苟非其事文不虛生為其泰漫濫不可知故有首衝錯測攡瑩數文掜圗告十一篇皆以解剝元體離散其文章句尚不存焉通元晉王長文閉門自守不交人事著書四卷撰易名通元經有文言卦象可用卜筮時人比之揚雄太元同郡馬秀曰揚雄太元惟桓談以為必傳後世晚遭陸績元道遂眀長文通元經未遭陸績君出耳論元有客難元太深雄解之號曰解難劉歆謂雄曰今學者有利祿尚不能明易如玄何恐後人用覆醬瓿張衡致思于天文隂陽歷算常好元經謂崔瑗曰吾觀太玄方知子雲妙極道數乃與五經相擬非徒傳記之屬使人難論隂陽之事桓談曰雄書至深而論不詭于聖人若使遇時君更閲賢知為所稱善則必度越諸子矣司馬公曰元者以贊易也非别為書以與易角也蘇氏之論謂其以艱深之辭文淺近之説陳濳室曰雄之元如膠柱調弦各不能相通非如易一自竒耦之畫而窮于六十四卦互相為用或云六十四卦八卦之重也元方州部家之雜至是而周矣不可以變也或曰易之六爻即六畫耳由其爻用六故其畫亦六今元有四重即卦上四畫也而贊乃有九皇極經世十卷邵雍撰天地運化隂陽消長皆以數推之以窮夫萬物之變此書以元會運世自開闢以來推其年數以元經會以會經運以運于世以日經日為元之元其數一日之數一故也以日經月為元之會其數十二月之數十二故也以日經星為元之運其數三百六十日之數三百六十故也以日經辰為元之世其數四千三百二十辰之數四千三百二十故也則是日為元月為會星為運辰為世此皇極經世之數也一元象一年十二會象十二月三百六十運象三百六十日四千三百二十世象四千三百二十時也蓋一年有十二月三百六十日四千三百二十時故也經世一元十二會三百六十運四千三百二十世一世三十年是為一十二萬九千六百年是為皇極經世自元之元更相變而至于辰之元自元之辰更相變而至于辰之辰所謂皇極經世但著一元之數使人引而伸之可以終而復始也三山説起堯即位之二十二年甲辰終于周顯德六年己未編年紀治亂興亡之事以符其學朝氏志潛虛曰氣曰體曰性曰名曰行曰命溫公自序曰萬物皆祖於虛生於氣氣以成體體以受性性以辨名名以立行行以俟命故虛者物之府也氣者生之戶也體者質之具也性者神之賦也名者事之分也行者人之務也命者時之遇也又曰元以凖易虛以凖元元且覆瓿而况虛乎館閣書目曰潛虛一卷易之為卦始于太極太極生兩儀兩儀生四象四象生八卦八八乘之而極于六十四卦元之為首始于一元以生三由三以生九由九以生二十七九九乘之斯為八十一首虛之為行始于五行一六置後二七置前三八置左四九置右通以五十五行易之卦兼河圗洛書之數元之首得河圗之九數虛之行得洛書之十數易之數生于一故揲法虛一元之數生于三故揲法虛三而虛之數生於五故揲法虛五易有乾坤二策乾之策二百一十有六坤之策百四十有四合而計之凡三百有六十以當期之日衍而積之凡萬有一千五百二十以當萬物之數元以首管九贊以二贊管八䇿當一日以二萬六千二百四十四策當三百六十四日半又有踦當一日四之二贏當一日四之一然後當三百六十五日四分之一與周天之度合虛以冬至之氣起于元轉而周三百六十四變變尸一日乃授于餘而終之易得其全故無餘元有欠故增踦贏之贊虛有餘故退元餘齊而無變本朝張行成作潛虛衍義十六卷羣書考索卷一
