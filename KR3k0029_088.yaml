body:
  text: 羣書考索後集卷二十二宋章如愚編官制門漢官漢世公有三等太師太傅太保為上公丞相太尉御史大夫為三公大将軍驃騎車騎将軍為比公卿有三等前後左右将軍為上卿太常至少府皆稱正卿執金吾太子太傅将作少府詹事大長秋水衡都尉京兆馮翊扶風為陪卿大夫有三等二千石為上大夫千石為中大夫六百石為下大夫大夫之下復有士劉劭爵制曰自一爵以上至不更為四等皆士也而本表比六百石有博士之官意者爵自公士至不更官自比六百石以下至百石皆士秩也丞相與御史大夫稱兩府兼將軍或稱四府或稱五府光禄勲稱内卿光禄勲王龔以外属内卿校書内朝稱朝者博士稱禮官司𨽻刺史稱奉使丞相掾吏稱宰士太守稱郡守又稱明府此漢官稱謂之大凢也漢之三公分掌九卿而侍御史則分刺守相守相則察守尉令長然有事御史下相國相國下諸侯王御史中執法下郡守有議論則中二千石二千石博士議郎諫大夫等雜議大率紀綱皆有條緒今自三公言之漢初以丞相御史大夫太尉為三公其名雖均而其權實差武帝罷太尉而置大司馬成帝改御史大夫而置大司空哀帝又改丞相為大司徒而遂正三公之名方漢之初丞相之權最尊大尉特佐其職而已籍福說田蚡乃曰魏其為相将軍必為太尉太尉相尊等耳至是太尉之權始無異於丞相耳故事御史大夫奏事㑹廷中差居丞相後不當與丞相均禮蕭望之為御史大夫乃不禮於丞相至是御史之權始不下於丞相惟宣帝能加禮丞相稍抑御史而不使之抗尊武帝寵假大司馬之權而不任宰相故終漢之世大司馬專秉國政而丞相具位行文書大司馬古之六卿掌兵者也自漢以太尉改置而兵柄不移致使其權在丞相上以貽異日之禍其来逺矣今自丞相而言之漢初選用人才盡出丞相髙祖詔郡國舉賢良必遣詣相國府書行義年武帝之初衛綰奏罷賢良治申韓蘓張者竇嬰田蚡推轂趙綰王臧薦人或起家至二千石武帝隂欲殺其權遂増重加官之制朝夕在側以薦導人物嚴助侍中則薦朱買臣衛青侍中則薦主父偃楊得意侍中則薦司馬相如而宰相之權盡矣故公孫𢎞雖開東閣而不聞薦士李蔡以後客館丘墟矣不獨此也吕后欲王諸吕問右丞相陵左丞相平而不及趙堯文帝錢榖斷獄之問不過右丞相勃左丞相平而不及張蒼是御史大夫雖名三公特副丞相而已九章之律定於蕭相國收孥之令文帝亦與平勃等論議而後除是法令之更定必歸之造命之地羣有司不與焉景帝寵任晁錯多所變更内史更法定令而列卿未免出位之思御史謀削七國而已無復副貳丞相之實漢制之壊開端於此迨武帝抑又甚焉自武帝任中大夫侍中而謂丞相為外朝而内庭之事宰相不與知矣自九卿之更進用事事不關决於宰相也而外庭之事宰相不與知矣自其以吏六百石以上調於尚書也而天下之事宰相皆不與知矣建水衡之官以侵大農之職置中都三十六獄以紊廷尉之權九卿更進用事而事不關於石慶御史言事日旰而事多决於張湯甚者趙禹以中大夫更定律令視造命之地何有焉其後游宴後􅒉始令中書官章奏霍光以大将軍領尚書其後殆不可言矣今以御史大夫言之漢承秦制以御史副丞相每人主有大事欲與大臣及九卿議則曰制詔御史或羣臣有奏請天子當下與大臣議則曰下御史文帝欲議肉刑則曰制詔御史而兩府同議髙祖封陳平曲逆户口則詔御史而竟行如制書班下諸王國則御史以其制書請於丞相同書而行此之謂御史下相國相國下諸侯王也如制書班下諸郡則御史大夫與中丞同書而不經丞相此之謂御史中執法下郡守是也以御史乃丞相之副而中丞又御史大夫之副諸侯王尊於郡守故丞相主行其尊而御史大夫主行其卑耳自武帝以来凡事多務率意乃專任御史大夫而使之自行張湯為御史大夫議造白金皮幣等丞相李嚴之徒惟取充位皆不與行兒寛為御史大夫與上議行封禅九卿更進用事初不關决於石慶其後東漢輔相權去政事漸歸臺閣盖自武帝始矣今自九卿言之京輔豪右非一縣可令故屬之太常九卿之長列侯屬之主爵尚書主章奏屬之少府皆有本末次第及武帝紛更始置三輔以分太常之權用宦寺為中書謁者而不属少府自改為三輔而太常之權稍微而主爵之職遂廢至昭帝時遂有三輔太常舉賢良三輔太常縱囚徒之言則太常之職輕矣曩時少府有尚書主文書章奏今置中書而以宦寺掌之是章奏皆不由於廟堂也是以其後恭顯得以肆志於其間廷尉本掌獄也而中都官獄又有二十六所以史攷之灌夫繫居室復繫都司空是居室都司空皆獄也謁者詔王商詣若盧詔獄張湯治他囚導官是若盧導官皆獄也典客有别火獄水衡有上林詔獄中尉有寺互都船獄至若北軍尉則主上書者獄他如蠶室暴室皆獄也辛慶忌救劉輔徙共工則共工亦有獄也絳侯囚於請室則請室亦皆獄也是非紛紛而紊亂乎然九卿之名按後漢安紀注以奉常光禄衛尉太僕鴻臚廷尉少府宗正司農為九卿而西漢志所謂奉常光禄勲衛尉太僕廷尉鴻臚宗正司農少府執金吾水衡都尉主爵都尉左内史右内史皆號九卿張禹子宏為太常而傳云官至太常列於九卿張安世子延壽為太僕而傳云歴位九卿張湯為廷尉而傳云及列九卿收接天下名士大夫陳咸為少府而杜鄴傳云咸為少府在九卿髙弟汲黯為主爵都尉而傳云列為九卿鄭當時為右内史而傳云至九卿為右内史此奉常至右内史為九卿之可考者也今自将軍之官言之漢初於左右前後將軍皆不常置或有事將兵則置之尋亦罷去至武帝外事四夷則無日不置嘗攷將軍之號自春秋時已有故公羊傳稱楚子重為將軍左氏傳稱魏獻子為將軍漢因其號所置不一然惟大將軍最貴次驃騎將軍次車騎將軍次衛將軍又有左右前後將軍文帝自代邸夜拜宋昌為衛将軍薄昭為車騎将軍而車騎衛将軍始有定職武帝就軍中拜衛青為大将軍而大将軍始有常職其後復用霍去病為驃騎將軍上官桀為左将軍始有驃騎左右将軍之職用趙充國為後将軍韓増為前将軍始有前後将軍之職其他如師出匈奴則有浮沮匈河浚稽祁連蒲類之號師出兩粤則有伏波樓船戈船下瀨横海之號擊遼東則謂之度遼擊西羌則謂之破羌曰驍騎曰護軍曰輕車曰材官曰代郡曰鴈門曰二師曰強弩曰六人皆其號也武帝之時又増八校曰中壘曰屯騎曰步兵曰越騎曰長水曰胡騎曰射聲曰虎賁凡有八校而刑法志乃曰内増七校盖胡騎不常置也其後以特進領城門兵得舉吏如五府武帝雄材大畧一時紛更其弊乃至此哉漢官漢之遷轉惟上所命初不以品秩髙下為升降故士亦俯首聴命而莫敢有所請張釋之十年不得調揚雄三世不徙官至有為太僕立功自髙及文猶未離乎舊職則何其濡滯若此也賈誼超遷嵗中至大中大夫公孫𢎞徒歩數年至宰相封侯王仲翁補大将軍長史三嵗至光禄大夫若此者又何其速也彼其黜陟進退雖未必皆當其賢否而用舍之權一出於我固未始有資格之拘然朱博傳云刺史居部九嵗舉為守相守相髙第遷為中二千石二千石遷為御史大夫御史大夫任職則為宰相雖然此特常典耳其有異材顯効為時君之所識便復不拘此制漢世尊右卑左故號貶秩為左遷而進居髙位者則云以為右職周昌自御史大夫為趙相髙帝謂曰吾猶知其左遷而陳平為右丞相請以位遜周勃文帝乃以太尉勃為右丞相位第一平徙為左丞相位第二此即尊右卑左之實也然至於大臣之不職者去之可也收其印綬可也亦奚至於左遷他官以辱之也孔光免丞相博陸侯乆之復為光禄大夫位次丞相月餘為御史大夫未幾復為丞相以至韓安國蕭望之翟方進之徒皆以御史大夫左遷為他官彼嘗執天子之政矣嘗正百官而統其權矣今一旦降尊就卑與其僚佐比肩而治事豈所以待大臣哉漢制遷吏三嵗而其他官吏以至倉庫之微初未始有終更之限也自夏侯嬰事髙祖為太僕至文帝世不易其職揚雄為黄門郎厯三世不徙官此其在内然也有為京兆尹九年如張敞有為刺史五年如何武有為郡太守八年如黄霸其在外職亦未嘗不乆任也王嘉謂文帝時吏居官者或長子孫以官為氏其二千石長吏亦安官樂職莫有茍且之意足以見漢之任吏不輕於易置也茍二千石治行課最則持璽書褒寵増秩賜金亦未易遷擢以重斯民去思之心至其屬吏則惟太守察其亷汙而故郡丞雖老聾或以其亷而不欲為數易黄霸曺吏書佐選其可用者而罷斥諸病吏朱博亦安有具貟而終任者哉當是時惟長安浩穰最為難治而為京兆者雖久不過三二年近者數月一嵗輙毁傷其失以罪過罷張敞則知漢之乆任固以吏之循良而姦貪闒冗軰亦豈容久病民哉漢世士大夫自少至老初末始有限也劉向以二十為輦郎陳咸以十八為郎貢禹之子年十二而元帝欲官之其入不幾於濫乎劉辟彊以八十為衛尉公孫𢎞以八十為丞相趙充國以七十餘為後将軍貢禹以八十一遷御史大夫是未至於老廢者皆可以綰綬於朝也平帝元始中龔勝以年老乞骸骨詔䇿遣之始有年至致仕不盡其力之詞後漢左雄議限年法四十以上始舉孝亷是二者得於古人之意也漢無引年之制大夫告老而歸初不以齒論上印綬乞骸骨天子為之賜金安車駟馬以寵其行此其常典然有以故禄歸老于家者張歐周仁萬石君是也有䇿遣其歸而不敢斥名者龔勝邴漢是也有聴其罷歸而就問於其家者趙充國董仲舒是也有不待告謝令奉朝請者張禹孔光是也若是者又皆一時之特恩所以全其終始尊其道徳養其氣體幾於古人之乞言者矣漢律春曰朝秋曰請其禮盖古諸侯之朝聘也後漢和紀注曰奉朝請無員數三公外戚宗室諸侯多奉朝請按石奮以上大夫禄歸老于家以嵗時為朝請是上大夫之致仕者亦當朝請也唯病免者乃得曠廢王陵吳王濞之類是也馮參以列侯奉朝請世祖中興不任功臣以事其加優異者不過以列侯奉朝請留京師盖取馮參故事也凡百官遇視朝無不朝者至蘓武之復為典属國蕭望之之賜爵關内侯張禹之罷相就第孔光之為太師皆止朝朔望盖時君特以優之非常典也漢世百官洗沐之制史氏不著其詳石建為郎中令也傳載其每五日洗沐歸謁親鄭當時為太子舍人也傳載其每五日洗沐常置驛馬長安諸郊請謝賔客按此則知五日一暇者乃漢世官吏之通法薛宣傳云日至休吏東方朔傳云伏日當早歸意漢世百官休告之期如此者尚衆也惜其無可考耳古者名吏休暇曰告漢律二千石有予告有賜告予告者任官有功最法所當得也賜告者病滿三月當免天子優賜其告使得帶印綬将官属歸家治病也至成帝郡國二千石賜告不得歸家和帝世予賜皆絶此孟康說也汲黯病免三月上常賜告者数終不愈至谷永病三月有司奏請免馮野王之守琅琊也病滿三月賜告御史中丞劾奏野王賜告養病而私自便持虎符出界歸家竟免野王即此事也漢官漢官無内外輕重之别選郡國守相髙第為中二千石為御史大夫又選博士諫大夫通政事者補郡國守相其所以為内外制者未嘗不均一也文帝召季布於河東以其使酒而復遣之郡若有意於重内者然詔遣列侯之國為吏雖丞相周勃有所不能辭則又豈不以為重是以嚴助厭承明而出補為㑹稽守非以内為輕而外為重也其均佚之禮則然也蕭望之雅意本朝而不樂平原守非以外為輕而内為重也其愛君之心則然也故助自㑹稽召留侍中望之自平原入為少府其出入内外安有輕重區别哉然汲黯沮於𢎞湯而不得久居位雖有出入禁闥拾遺補闕之願而不克遂京房沮於石顯而出為魏郡守雖有通籍殿中以防壅塞之請而不得行若是而人臣之顧位有内外决擇之心其亦由君見之不明也哉漢官無文武之分髙祖當征戰日不暇給之際過魯而祠孔子至沛而作樂歌之後此其中持文武之權衡輕重相凖以貽後世並用長乆之術其意微矣議者徒見髙帝不喜儒生而思猛士謂其尚武而不尚文抑不知文武一道其相湏以為用髙祖固未嘗二其所思也當勇力爭奮之時而董公仁義之言而不以為迂及㧞劒擊柱之頃而叔孫通禮儀之制亦以為當援詩書於馬上而聴留侯韜畧之謀寓歌詩於大風而善陸賈新語之奏此其機已發於過魯至沛之日矣至於文帝之好元黙若尚文者而講武習射不廢於平時武帝之喜征伐若尚武者而制度典章焜耀於當代言其取士則以孝亷賢良選於内郡以兵法勇猛選於邉郡而文武莫不並用而無遺言其用人則以武弁期門轉為諌大夫以諫大夫復遷為執金吾而文武之材莫不更迭而不偏也漢置大夫專掌議論句其事疑似而未决則合中朝之士雜議之自兩府大臣而下至博士議郎皆得以伸其已見而不嫌於卑抗尊也故罷郡國廟則有議韋𤣥成賞邊功有議陳王傳入谷免罪有議蕭望之賈誼為博士詔令下諸老先生未能言誼代為之對未嘗以公卿之言而廢誼之對也呼韓邪單于願保塞朝臣集議卒用郎中侯應之策未嘗以将相之言而格應之奏也匈奴傳朱博得罪議其獄者五十八人而諫大夫龔勝等敢於異将軍二千石之議也王嘉得罪議其獄者六十人而少府猛等敢於抗驃騎将軍御史之議也不緘黙以因人不雷同以附勢不合黨以濟奸不託公以行私惟盡其已之所欲言而付之人主之獨斷此漢之集議所以有公天下之意然至於屯田之功既成有詔罪前言不便者馬邑之舉既敗獨罪首謀以謝天下此又足以戒謀議之不謹者也雖然髙帝之十二年立諸侯王則有議吕后之二年定列侯位次則有議是時他官猶未預也文帝至邸丞相謹與列侯吏二千石議是時博士猶未預也吳公薦賈誼為博士每詔令議下盡為之對而後元之詔曰令吏二千石博士議至是博士始預議也及武帝時尋朔方之議朱買臣以中大夫預挟弓弩之議吾丘夀王以光禄大夫侍中預武帝之時集議雖廣而意則欲以宿衛詘外庭也漢官諫員史官經筵自漢以下異於古者三諌員也經筵也史館也古者諫官無常員工執藝事以諫瞽誦詩士傳言至武帝元狩五年始置諫大夫後更名光禄大夫自此諫官有常員矣古者左右前後皆通明經術之士如伊尹作伊訓周公陳王業援引古義以訓導人主至漢武猶有古意従兒寛受四書又從歐陽生問尚書是也自成帝置金華殿講業而鄭寛中張禹得以入講經於殿中非講業之官不得執經以訓人主自此經筵有常所講業有常人矣古者左史書言右史書動秦漢以来御史主柱下方書則親近人主而去堂陛不逺凡郡國上計先達御史後至丞相是以太史公紬金匱石室之書以作史記而武帝不羙之迹彰而不隠所以公道修明史皆實録延及於唐宰相始監修國史夫直筆之職茍上有重臣安望其肆意極言哉以史攷之漢石渠東觀之士與五經諸儒雜論同異而可為優者施讎也經學精熟遣奉使以問諸儒得其義者梁丘賀也劉向初受谷梁兼能論五經歐陽生以尚書從兒寛此四子者講論於石渠之人也李尤字伯仁當和帝朝以文章顯賈逵薦其有相如揚雄之風因受詔而作賦黄香強學經典能文章京師有天下無䨇之號如劉珍之與馬融校定五經諸傳記百家藝術髙彪由孝亷試經第一數奏賦頌竒文此五子者讎校於東觀之人也晉左太冲為三都賦自以所見不博求為秘書郎遂减機雲之價唐李邕欲益文選注自以為讀書未廣願為秘書未㡬奥篇隠帙了辨如響夫以太冲李邕一詣秘閣讀平生未見之書亦足以慰胷中所期矣則館閣者國家右文之地所以待非常之人人莫不願得之亦以榮也是以漢開石渠而劉向韋𤣥成施讎周堪之軰出天禄開則揚雄之徒聞蘭䑓築而班固傅毅於是乎進東觀設而黃香盧植蔡邕馬融於是乎登白虎闢而賈逵丁鴻由是而升漢之人才出於秘省臺閣者也自唐開麗正藏書而馬懐素禇無量出焉開集賢而張說徐堅元澹賀知章出焉此唐之人才出於秘省䑓閣者也漢唐數子皆表表著見於青史者外又漢有金馬之選唐有蓬莱之遊特出武帝太宗一時之遇臣下者又不在於秘省䑓閣之數焉漢加官郎中爵吏禄漢加官之制何也侍中左右曹諸吏散騎中常侍皆加官也所加或列侯将軍卿大夫或郎中無員數多至數十人給事中亦加官所加或大夫博士議郎掌顧問應對皆本於秦制然張辟強於惠帝時為侍中賈山至言亦曰舉令方正之士使為常侍諸吏則加官在漢初不廢也至武帝始重加官之權加侍中者如吾丘夀王為侍中中郎孔安國為侍中以儒者掌御盂之類加諸曹者如辛慶忌為左曹中郎将之類加諸吏者如楊惲為諸吏光禄勲之類加散騎者如張勃為散騎諫大夫之類加給事中者如終軍為謁者給事中之類獨二府不得兼魏相以御史大夫兼給事中為分霍氏權非定制也或以奉車駙馬為加官非也荀氏漢紀杜佑通典並不列於加官即此可攷也漢郎官之制何也光禄勲有議郎中郎郎中皆無員多至千人中郎有五官左右三将郎中有車户騎三将主車曰車郎主户衛曰户郎凡郎官皆主更直執㦸宿衛諸殿門出充車騎惟議郎不在直中故省中郎曰中郎散郎曰外郎汲黯曰臣願為中郎出入禁闥補過拾遺郎官故事令郎出錢市財用給文書乃得出名曰山郎羽林以六郡良家補武帝以便從獵還宿殿陛岩下故曰岩郎期門為虎賁郎郎選其塗非一有以父兄任子弟為郎者袁盎劉向是也有以富訾為郎者張釋之司馬相如是也有以上書獻策為郎者婁敬主父偃是也有以孝著為郎者馮唐是也有以戯車為郎者衛綰是也有以格五為郎者吾丘夀王是也有以從軍善射為郎者李廣鄭吉有以經明甲科為郎者召信臣王嘉是也仲舒對䇿總云吏二千石子弟選郎吏又以富訾者盖多出兩塗也夫所謂爵者何也秦爵二十等自公士一級以上至不更四等則比士大夫以上至五大夫凡五等則比大夫左庶長以上至大庶長九卿之義也闗内侯比古圻内之子男列侯比古列國之諸侯漢初因之凡爵一級直錢二千有赦則賜民爵一級有罪則許民買爵以免罪公大夫以上者得與令丞抗禮爵五大夫者有罪不入狴犴爵士造以上者當刑减一等爵非公乗以上者無得冠劉氏冠爵至五大夫以上者乃得復一人以樊噲夏侯嬰傳攷之則爵之遷轉次第有不可紊也然後又有武功爵一曰造士二曰閑輿衞三曰良士四曰元戎士五曰官首六曰秉鐸七曰千夫千夫以上得免繇役八曰樂卿九曰執戎十曰政戾庶長十一曰軍衛盖武帝外事四夷内興功利國用空竭不足以奉戰士有司議令人得買爵及免罪請置賞官名曰武功爵諸買武功爵官首者試補吏先除千夫如五大夫其有罪又减二等爵得至樂卿以顯軍功軍功多用超等大者封侯卿大夫小者郎吏道雜而多端則官職耗廢矣若夫封侯之爵則有二等曰王曰侯皇子而封者謂之諸侯王王子而封侯者謂之諸侯羣臣異姓以功封者謂之徹侯大者不過萬家小者五六百户以為差降有見任宰相而封侯者如曹參以平陽侯王陵以安國侯陳平以曲逆侯周勃以絳侯公孫𢎞封平津侯是也或以功封如霍去病比再冠軍封為冠軍侯趙破奴從驃騎将軍封為從驃侯或以地名如蘓建為平陸侯以伉為宜春侯是也或以意名如張騫為博望侯取其廣博瞻望霍光為博陸侯取其博太平陸是也有以匈奴降者封為侯孝文世乃有弓髙㐮城之封孝景世初開封賞之科而徐盧等畢侯矣又有侍伺侯鄧禹傳載禹孫康以侍伺侯為越騎漢官儀注云其非朝侯侍伺而以下土小國或以肺腑宿親隨時見㑹謂之猥諸侯東漢又有謂之四姓小侯者其食邑比二十級之爵惟徹侯乃得食縣其次闗内侯本無食邑其有加異者列之闗内之邑食其租税餘十八等大庻長以下如吏職耳每戶一嵗更輸錢二百貨殖傳所謂千戶之君則二十萬是也有累爵至列侯而未有食邑者樊噲是也有累賜食邑而後封侯者酈商是也顔師古以為楚漢之際權設寵榮假其位號或得邑地或空受爵此例多矣列侯有餐錢有奉邑髙后紀丞相平言列侯幸得賜餐錢奉邑是也其吏禄也自三公而下至百石吏禄各有差其見於百官表之注者皆以榖計也至所謂丞相大将軍俸錢月六萬是漢禄多而錢少貢禹拜諫議大夫秩八百石奉錢月九千二百盖寛饒以太中大夫擢為司𨽻校尉俸錢月數千當時亦以為禄厚加之節臘有賜士大夫足以養亷而無冒耻干禄之態惟小官卑秩稍禄既薄而賞賜不及焉則不能以自奉此東方朔所以借侏儒而諷上也宣帝憫小吏之勤事於是益百石以下俸十五哀帝又益吏三百石以下俸自是小吏稍稍優游光武中興其千石以上減於西京舊制六百石以下増於舊秩是光武之减吏禄乃所以益小吏也唐定俸禄之制以民地租充分官為九品而給米各有差凡京文武官每嵗給禄以計者總十五萬有竒而在外不與其俸錢則以公廨錢充攷之通典在京每嵗亦十五萬是唐初俸禄乆與米相等矣宋朝禄令定於嘉祐往往俸錢多於禄米漢官不分流品鄉評任子雜流待詔辟除薦舉守試漢之用人不分流品視其才能勲績等而上之無有限格周勃以引強申屠以蹶張薛宣以書佐魏相以卒史皆致位為丞相然其入仕之始等級次第亦自有品節存乎其間其以明經文學進者多除博士或大夫侍中如嚴助朱買臣疏廣平當之徒是也其以材武勇猛進者多除中郎将驂乗如公孫賀衞琯是也張湯以法律進則先以法官處之故張湯為内史丞相掾薦補侍御史後為廷尉皆法官也黄霸以入粟補官則先以財賦處之故伯始以卒史領郡錢榖計簿書正以亷且察補河東均輸長皆掌財也雖其始有所分别而積功累勲無不可任者此漢官未免乎雜也終漢之世清濁混殽上下無别以官者典領中書以醫術校書秘閣尚書郎掌代王言而以令史乆次補之宜乎丁邯耻以孝亷為郎也漢之取人猶用鄊評武帝求賢良國人共推公孫𢎞以充賦萬石君以孝謹聞郡國特以其子為郎中令一推兒寛則曰知之乆矣一言蕭望之則曰此東海蕭生耶一薦龔勝則曰固已知其名至於酈食其家貧落薄縣中謂之狂生韓信家貧無行不得推擇為吏陳湯丐貸無節不為州里所稱是故能自持於鄊里然後州縣㧞為幹佐曹吏能自立於州縣者然後五府辟為曹椽能自效於五府者然後為朝廷所選用也是以髙祖之初鄊縣各置三老相帥為善而設為孝亷之科以取士其殆有意於鄊舉里選之遺意乎漢之取人有出於任子者二千石九卿得䕃子弟為郎其為虎賁諸郎者皆許父老而子代之或沒於刺守而名績昭著亦䝉恩典録其後嗣如汲黯張安世皆以父任而袁盎亦以父任為郎光禄勲嵗以四行察其茂亷才迹優異始䝉選舉銓居髙弟然後出補長丞異時遷擢上而至於兩府初無限格然考之於史貢禹以光禄勲大夫二千石秩惟有一子猶未得禄後以御史大夫卒始以特恩任其子為郎桑𢎞羊為御史大夫自以為有功於國欲為子弟得官而武帝不與則漢之奏䕃雖有定制亦未始有常恩也漢之取人有出於雜流者蕭何著試吏之法以六體書而課最者為尚書御史書令史至於大學選用文學掌故之士則有補左右内史鴻臚卒史者以至二千石屬者故兒寛以射䇿補為尉卒吏龔勝以明經為郡史路溫舒既為獄吏而又以通春秋舉孝亷薛宣朱博皆起於書佐察亷補令丞而終至於登宰相東漢三公有長史有府掾而朱穆何敞班彪李膺之徒卒由此途用則知漢之胥吏亦以功次遷而無所限格也漢世凡以才伎召而未有正官者皆云待詔有待詔公車者有待詔金馬門者有待詔丞相府者有待詔保官者有待詔承明之庭者有待詔黄門者盖其為制初無定地而奉禄薄厚亦往往不齊待詔公車東方朔之類是也待詔金馬門公孫𢎞之類是也待詔丞相府劉徳是也待詔保官周慶丁姓是也待詔承明之庭揚雄是也待詔黄門李尋是也按尋之待詔也自言過隨衆賢待詔合太官衣御府乆注玉堂之所則可見矣漢有辟除之制有尚書選部自縣令以上始赴尚書調選其餘郡縣之属吏至於公府之掾曹各自辟於其長其諸侯王國自内史以下皆得以自除故曹吏拔於州縣者然後為五府所辟五府舉掾曹然後為朝廷所用推而至於公卿之尊初未始有限也故何武以大司空而辟鮑宣為西曹掾史髙領尚書事而辟康衡為義曹史此曹掾之辟於公府者也周景以刺史而辟陳蕃為别駕王渙以方城令而辟仇覽為主簿此属之辟於郡縣者也漢有薦舉之制河南守舉賈誼益州守舉王褒河南守舉終軍是郡國薦士也太府舉張湯四府舉辛湯五府舉叚㑹宗是公府薦士也暴勝之以直指薦雋不疑閻崇以執金吾薦龔勝王商以衛将軍薦鮑宣何其薦舉之寛也至於嚴延年舉獄吏贓不入已猶坐貶秩陳勃舉茂才不以實亦坐削户二百何武坐舉方正者槃辟失禮有司以為詭衆虗偽而左遷盖漢薦舉之路廣而同坐之法嚴也漢世凡官吏有守試之法趙廣漢守京兆尹滿嵗為真尹翁歸守右扶風滿嵗為真韓延壽守左馮翊滿嵗稱職為真張敞守太原滿嵗為真盖諸官吏初除皆試守一嵗乃為真食全俸也唐世除吏尚循此制裴度自司勲郎中知制誥為中書舍人白居易行其制曰臺郎滿嵗班列當遷綸閣之職所宜真授又韓愈權知國子博士三嵗為真其所謂滿嵗三嵗雖若各有其别然大率皆漢制也故通典載正觀令曰散官以職官髙者為守職事卑者為行官階相等無行無守髙官兼攝下司者自漢世以来謂之領宣帝世張安世以車騎將軍元帝世蕭望之以前将軍成帝世王鳳以大将軍兼領尚書事是也羣書考索後集卷二十二
