body:
  text: 羣書考索續集卷八宋章如愚編經籍門禮記曲禮多出孔門弟子禮記多出於孔子弟子然必去吕不韋之月令及諸儒之王制仍博集名儒擇冠昏喪祭鄉相見之經典以類相從然後可為一書若大學中庸則孟子之倫也不可附之禮篇至於學記樂記閒居燕居緇衣表記格言甚多非經解儒行之比當以為大學中庸之次也禮運禮器玉藻郊特牲之類又其次也伊川先生五禮之所由始遂皇在伏羲之前始王天下是尊卑之禮始於遂皇也伏羲制嫁娶以儷皮為禮是嫁娶嘉禮始於伏羲神農氏始教天下種榖始為蠟則祭祀吉禮始於神農也黃帝與蚩尤戰於涿鹿則有軍禮也易繫辭𫝊第二章云古者葬諸中野則有凶禮也又論諸撰考云軒知地利九牧倡教既有九州之牧當有與聘是賔禮也正義禮有三起之義禮有三起禮理起於太一禮事起於遂皇禮名起於黃帝其禮理起於太一其義通也其禮事起於遂皇禮名起於黃帝其義乖也且遂皇在伏羲之前禮運燔黍捭豚在伏羲之後何得以祭祀在遂皇之時正義禮記雜出記録禮記之作出自孔子但正禮殘缺無復能明至孔子沒後七十二子之徒共撰所聞以為此記或録舊禮之義或録變禮所由或兼記體制或雜序得失故編而録之以為記也中庸是子思伋所作緇衣公孫尼子所撰鄭康成云月令吕不韋所修盧植云王制漢文時博士所録其餘衆篇皆如此例但未能盡知而記之也正義辨諸儒折難之非禮記之書雜出諸儒其所師𫝊或異故有兩存之說如吕不韋月令漢博士王制王制又皆刺經而作兼有時王之制學者考其說間與周官抵牾不知秦漢諸儒采古參今未嘗施用乃持其說以相折難此聚訟所由起也然先王之制頗在於是乃刪摘詆訾如柳宗元時令論苛碎刻裂不知議者之在後其弊至於㑹稽夏休破禮記之書此如子孫不聞前世之事而臆度祖父之傳為非是謂吾獨見聖人之心乃聖人所謂不知而作非吾所敢同也唐仲友文非禮書者七篇漢興諸儒搜求於脫略之中禮得於淹中樂𫝊於制氏所謂禮樂者無復聖人之制作也於是合禮樂之可知者編為禮記之書曲禮郊特牲祭義祭法喪服等篇古之禮書也樂記一篇古之樂書也若乃檀弓月令文王世子學記中庸表記大學等篇可謂之禮書乎可謂之樂書乎非禮書而謂之禮記無怪乎學者之疑也篇目各有所屬曲禮王制禮器深衣屬制度檀弓禮運玉藻中庸表記緇衣儒行大學經解哀公問燕居坊記大𫝊學記屬通論投壺冠義婚義射義樂義聘義鄉飲酒屬吉禮郊特牲祭法祭統祭義屬祭禮月令屬明堂隂陽記屬文王世子法樂記屬樂記明堂位屬明堂記內則屬文王世子法曲禮所記五禮之疑按鄭目録云名曰曲禮者以其篇記五禮之事祭祀之說吉禮也喪荒去國之說凶禮也致貢朝㑹之說賔禮也兵車旌鴻之說軍禮也事長欽老執贄納女之說嘉禮也此於别録屬制度按鄭此說則此曲禮篇中有含五禮之義是以經云禱祀祭祀之說當吉禮也送喪不由徑歲凶年榖不登又云大夫士去國如此之類是喪荒國之說當凶禮也五官致貢曰享天子當寧主人拜迎之類是賔禮須敬也軍中之拜肅拜之類是軍禮須敬也冠昏飲酒皆有賔主答拜之類是嘉禮須敬也兵車不式乘玉輅不式鄭云大事不崇曲敬者謂敬天神及軍之大事故不崇曲小之敬熊氏以為唯此不敬者恐義不然也既云曲禮曰是引儀禮正經也正義禮有經有變禮有經有變經者常也變者常之變也先儒以曲禮為變禮看來全以為變亦不可蓋曲者委曲之義故以曲禮為變然毋不敬安定辭安民哉豈可以此三句為變禮只是禮各有經有變先儒以儀禮為經禮儀禮中亦有變然所謂變禮者又自有經不可一律看也禮記聖人問答處多是說禮之變又曰上古禮書極多如河間獻王收拾得五十八篇後來藏在祕府鄭𤣥輩尚及見之今注疏中有引援處後來遂失不𫝊可惜可惜今儀禮古時亦多有今所餘十七篇但士禮耳文公經說毋不敬是統言毋不敬是統言主宰處儼若思敬者之貌也安定辭敬者之言也安民哉敬民之事也此只言大綱本領而事無過舉自在其中若只以事無過舉可以安民為說則氣象淺迫無含蓄矣同前記王制月令王制載事之非爵位建國三監田狩祭林曰孟子以天子一位公一位侯一位伯一位子男同一位凡五等王制則以子男為二位不及天子孟子以君一位卿一位大夫一位上士一位中士一位下士一位凡六等彼則不言君一位而惟五等此則異矣至其餘文則録孟子之辭可以大國次國小國無異制皆有上士二十七人孟子以上士中士下士各一位安得上士如此之多若諸侯上士皆二十七人則中士下士又當幾人矣此不可也又曰凡九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國併九州計之則為千七百七十三國周封諸侯之數不得知也其見於春秋者并附庸不過百八十國見於左氏者不過倍加之數爾借謂僻陋小國無事見經與見吞於强大然安得千七百國之多乎又以天子之縣內方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國古者畿內不以封建諸侯雖有六卿采地而謂之百里七十里計凡十有三國此又不可也又曰天子使其大夫為三監監於方伯之國國三人古無三監之官獨周封武庚於商慮其煽亂乃命管叔蔡叔霍叔監殷安得國各有三監乎若周禮有立其監之語乃謂諸侯自監一國也引書與周禮為據俱非又不可也又曰天子諸侯無事則歲三田無事而不田曰不敬田狩之事雖因農隙以講武事然天子一日萬幾焦勞不暇何必三時親田也文王不暇盤于遊田而謂無事不田曰不敬又不可也又曰諸侯礿則不禘禘則不嘗禘之為祭大祭也王者審禘其祖之所自出乃謂之禘春秋書禘皆記其僣也何得為諸侯之祭乎若曰虞夏之制則雖帝王至異不至於天子之祭為諸侯之祭又不可也記月令月令之說不經林曰月令之書出於秦漢之間拘於陋學不知道者為之也鄭氏以為吕不韋為之蓋以孟夏有太尉又是秦官也季秋有來歲又是秦制也或者又曰秦始皇十二年不韋死至十六年秦始并天下以十月為嵗首方秦以建亥首嵗而不韋已死數載矣不得為不韋所作豫謂此不必詳其人觀其言不可為道不過出於秦漢之陋儒爾唐柳子厚嘗辨其非矣曰事有當俟時而行者有不得俟時而行者而月令一書反時令則有灾異此乃瞽史之說離聖人之道已逺古之儒者未有柳子厚之知道者也然惜其所辨者小至其乖戾大者未之辨也夫四時所主之帝所祀之處所祭之牧天子所居之所所乘之車所駕之馬所載之旗所衣之衣所服之玉所食之榖與牲所用之器各謂不同此皆不經之語古無有也月令中星之疑按二十八宿隨天當春分時昏中之星各正其位厯夏至秋冬一時差一方一日差一度以東漢周天度考之月令所言中星節氣之星也後漢志云中星加二十四氣二月初氣昏井中中氣昏鬼中五月初昏亢中中昏氐中八月初中皆昏斗中十一月初昏壁中中昏奎中堯典所言中星氣之星也堯典曰春日中星鳥夏日永星火秋日中星虛冬日短星昴一氣十五日一差一度月令仲春昏弧中弧九星在狼東南狼一星在東井弧星近東井自東井三十度至星一度隔十八度節氣之星固宜弧中矣月令仲夏昏亢中亢十度至房一度隔十三度節氣之星固宜亢中矣月令仲秋昏牽牛中自牽牛七度至虛六度隔十六度節氣之星固宜牽牛中矣月令仲冬昏東壁中自東壁十度至昴一度隔四十四度况自虛十度至壁一度止隔三十四度豈有時幾一季而星度止差三十四度初疑戴經之誤及按石氏星經云弧與建星非二十八宿而昏明舉之弧星近井建星近斗井有三十三度斗有二十六度從奎第五度為二月節數至井第十五度得九十一度是弧星之當井之十六度建星在斗十度尚書云日中星鳥南方七宿總為鳥星井鬼鳥星之分也仲夏昏亢中尚書云日永星火日永星火非謂心星也昴之三十度總為大火月令舉其月初尚書總舉一月故也仲秋昏牽牛中尚書云宵中星虛仲冬昏東壁中尚書云日短星昴月令舉其初朔尚書總舉一月之中孔安國注尚書與此則别尚書所舉星者自取畢見之義不謂南方之中也正義記文王世子文王何以稱三朝文王之為世子朝於王季日三正義曰案緯候之說文王年九十六始稱王崩後諡之曰文則為世子之時未得為文王也記者於後追而書之下記世子朝父母每日唯二又內則云命士以上昧爽而朝日入而夕者朝禮具夕禮簡故言夕今三皆曰朝者以其禮同故通言朝凡常世子朝父母每日唯二今文王朝於王季日三者增一時又三者皆稱朝並是聖人之法也記禮運禮運之言訛謬淇水文曰禮運雖有夫子之言二十一冠篇言大道與三代之治其語雜而不倫以正君臣篤父子而為起兵賊亂之本取老子之言為證記明堂位明堂位載事之疑林曰禮記一書其典正無抵牾者中庸大學而已其次坊記可也自曲禮樂記祭法祭義射義等篇並漢儒之語戾古已多而王制月令又居其下然其悖禮亂教未有如明堂之甚也成王幼周公為冡宰攝政以王命賞罰天下何嘗去北面之禮而居非常之位哉明堂乃曰周公朝諸侯于明堂之位天子負斧依南面而立又曰周公踐天子位而果有是乎金縢曰武王既喪管叔及其弟流言於國曰公將不利於孺子公乃為詩以貽王蔡仲之命曰惟周公位冡宰正百工羣叔流言繼以蔡仲克庸祗德周公以為卿士乃命諸王邦之蔡書言公作詩以貽王言乃命之王而後封仲於蔡周公未嘗負斧依南面而立當時何從以為天子哉以周公為天子則成王何以處此周公特輔政耳羣叔且有不利之言使實踐祚而朝諸侯豈特羣叔流言而已哉謬之甚也又曰成王以周公有勳勞於天下封周公於曲阜地方七百里命魯公世世祀以天子禮樂此又不知禮之謬亂豫嘗辨其不然矣魯昭公曰吾何僣哉子家駒曰設兩觀乘大輅朱干玉戚以舞大夏八佾以舞大武皆比天子之禮也觀春秋書初獻六羽書郊書望書新作南門新作雉門及兩觀無非惡魯人之僣夫子所謂禮樂征伐自諸侯出也何得謂魯用天子禮樂兼虞夏商周之制孟子以魯儉於百里彼乃以為七百里周書以唐虞官百夏商官倍彼則以有虞官五十夏后官百戾經違古莫此為甚至其大可怪者乃曰魯之君臣未嘗相弒也天下以為有道之國春秋魯只十餘君隱為桓所弒子般閔公公子赤皆戕於亂臣昭公哀公皆見逐焉十二公之中而相弒害己如此而謂未嘗相弒蓋彼未嘗觀春秋妄說至此後世不察乃據以為禮經彼之謬不足道也後儒酷信之者陋又居其下矣誠使逹於理者削而去之則先王之禮可尋易春秋詩書之㫖自彰明矣記樂記樂記作於漢世漢興制氏以雅樂聲律世為樂官頗能記其鏗鏘鼓舞而已不能言其義理武帝時河間獻王好博古與諸生等共采周官及諸子云樂事者以作樂記也其內史丞王度𫝊之以授常山王禹成帝時為謁者數言其義獻二十四卷樂記劉向校書得樂記二十三篇與禹不同其道浸以益微故劉向所校二十三篇著於别録今樂記所斷取十一篇餘有十二篇其名猶在二十四卷記無所録也論樂記之一篇樂記曰人生而靜天地之性也感於物而動性之欲也何也曰此言性情之妙人之所生而有者蓋人受天命之正以生其未動感也純粹至善萬理具焉所謂性也然有是性則有是形有是形則有是心而不能無感於物感而動則性之欲者出焉而善惡於是乎分矣性之欲即所謂情也又曰物至知知然後好惡形焉何也曰上言情性之别此指情之動處為言而性在其中也物至而知知之者心之感好好惡惡者情也形焉者其動也所以好惡而有自然之節者性也又曰好惡無節於內知誘於外不能反躬天理滅矣何也曰此言情之所以流而性之所以失也情之好惡本有自然之節惟其不自覺知無所涵養而大本不立是以天則不明於內外物又從而誘之此所以流濫放逸而不自知也茍能於此覺其所以然者而反躬以求之則其流庶乎其可制也不能如是而惟情是狥則人欲熾盛而天理滅息尚何難之有哉此一節正天理人欲之幾間不容髮處惟其反躬自克念念不忘則天理益明存養自固而外誘不能奪矣文公記儒行儒行非孔子言儒行非孔子之言也蓋戰國時豪士所以髙世之節耳考一篇之內雖時與聖人合其稱說多過其施於父子兄弟夫婦若家若國若天下粹美之道則無見矣聖人之行如斯而已乎或謂哀公輕儒孔子有為而言也曰多自夸大以授其君豈所謂孔子哉記鄉飲酒鄉飲酒有四事正義曰鄉飲酒一篇凡有四事一則三年賔賢能二則鄉大夫飲國中賢者三則州長習射飲酒也四則黨正蠟祭飲酒總而言之皆謂之鄉飲酒雜辨禮書逸亡篇數逸禮者漢書藝文志漢興始於魯中得古禮五十七篇其十七篇與今儀禮正同其餘四十篇藏在祕府謂之逸禮其投壺禮亦此類也又六藝論云漢興髙堂生得禮十七篇後孔子壁中得古文禮五十七篇其十七篇與前同而字多異以此言之其不入於記者此為逸也禮記表厯代禮樂存亡禮樂之制盛于三代備於周三代之興皆數百年而周最久逮武王周公修太平之業畫天下以為六服自天子至於庶人皆有法度方其郊祀天地開明堂以㑹諸侯其車旗服器文章爛然何其盛哉及幽厲之亂周室衰其後諸侯漸大然齊侯受胙而拜晉文不敢必請隧以禮維持又二百餘年禮之功亦大矣世更戰國禮樂殆絶漢興禮出淹中后戴諸儒共為補拾得百餘篇三鄭王肅之徒皆精其學而說或不同夫禮極天地朝廷宗廟凡人之大倫可謂廣矣雖百家殊說豈不博哉自漢已來㳂革之制有司之𫝊著于書者可考也自漢以來樂之㳂革惟見史之志其書不備隋唐所録今著其存者云廬陵文羣書考索續集卷八
