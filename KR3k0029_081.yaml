body:
  text: 羣書考索後集卷十五宋章如愚編官制門考課類考課之法尚矣舜典曰三載考績三考黜陟幽明如鯀之績用弗成必待九載而後見是也至成周而計吏之法益詳焉嵗終考嵗㑹月終考月要日終考日成又三嵗有大計之治九載有黜陟之方亦幾於不憚煩者而綱維所繫并二可考嵗終受㑹則掌之太宰詔王廢置則掌之太宰大計誅賞則又掌之太宰是亦足矣至小宰又以六計亷善亷能亷敬亷正亷法亷辨弊羣吏之治宰夫以八職正師司旅府史胥徒掌官府聽國計於司㑹計吏治於司書有小司徒以考其治成有內史以逆其㑹計大抵皆統於太宰功罪能否舉以告王而升黜之此周制之善也凡設官之長各考一官之屬六卿考屬官牧伯考諸侯又盡考於司㑹而後冢宰受百官府之㑹而詔廢置焉蓋各考其屬則寡而難欺提要於上則簡而易見秦任刀筆郡國事不先上丞相輒上御史是時法雖嚴而王稽守河東至不肯上計漢興課吏之際猶有古意郡守辟除令長得自課第刺史得課郡國守相而丞相御史得雜考郡國之計書至天子則受丞相之要以史考之王尊為郡决曹太守察尊廉補鹽官長焦延夀為郡史察舉補小黃令是令長之職多郡守自辟置也令長於嵗盡計户口墾田榖錢盜賊之數上計郡國課功效故茂陵令蕭育為漆令請扶風怒曰君課第六裁自脫何暇以為左右言是令長之職守相得自課第也刺史巡行所部郡國考殿最嵗盡詣京師奏事是刺史得課守相也谷永薦薛宣曰左馮翊宣考課功績簡在兩府則御史得雜考郡國明矣丙吉曰殺傷橫道京兆尹職當禁嵗旱丞相課其殿最奏行賞罰而已觀其課殿最之言則丞相雜考郡國之計書明矣觀奏行賞罰之言則天子受丞相之要又明矣又其課吏皆每事而考韓延夀在東郡斷獄為天下要此刑獄課也尹翁歸守右扶風盜賊課常為三輔最此盜賊課也倪寬為內史租稅不入當免後民爭輸租而更以最此租課也卜式為成臯令將漕最此漕運課也陳立為天水太守勸農桑為天下最此農桑課也後志注曰令長嵗盡計縣户口墾田錢榖盜賊上其簿於郡課校其功則户口墾田錢榖亦各有課也以此推之在當時考核必有法度惜漢史之不具而後世無以復考也漢制或受計於京師或受計於甘泉或受計於明堂其所受之不一也或令以列侯居相府而領其事漢初置計相以張蒼為之領郡上計或令先上太史而後上丞相或察之以御史其所掌之官不一也然當時魏尚以差功六級廢賞夀王三年不上計至勤詔書督促其欺隱未易概舉也吾觀兒寬以負租課殿當免民恐失之輸負租不絶課更以最右扶風㑹課茂陵令蕭育治六漆令郭舜殿育為之請夫始殿而終最使人得以用情而無一定之法固無可議㑹既定而人得為之請囑則其法將安用哉宣帝黃龍之詔責計簿之欺謾曰三公不以為意朕將何在蓋膠東王成以僞增户口而蒙顯賞公卿不言他時反得諸郡國計吏之言則帝之詔蓋為此也元帝時京房作考功課吏之法令晉灼所列者令丞尉以盜賊除罪之科爾其法非止此也然而不覺盜三日者坐之則繩下過急矣故公卿議㑹而皆以房言煩細時部刺史亦以為不可行其後出守魏郡帝惟許其自行未幾而廢三國魏明帝時劉邵作都官考課之法七十二條大略欲使親人之吏以功次補郡守就秩賜爵其法得矣而使州縣察士必以四科則取士之路亦狹矣時崔林以為考課存乎其人若大臣能任職式是厥辟則孰不肅烏在考課焉京房之說欲専任法崔林之說欲専任人二者皆偏也要必詳明乎法而復參乎人然後考課之法立惟晉武帝杜預論考課乃兩備其意預之言曰古者黜陟疑於心不泥於法末世疑心而信耳目疑耳目而信簡書簡書愈繁官愈僞莫若委任逹官各考所統於是立六優六劣之法優多劣少者平叙劣多優少者左遷法簡而易行然必以六嵗乃一按焉故時病不能行也後魏文帝泰和中詔三載一考即黜陟親與公卿論其善惡上上者遷之下下者黜之中中者守其本任其後崔鴻建議患選曹一槩不曽甄别則是法已紊矣唐置考功郎中員外郎各一人掌文武百官功過善惡之考法凡考課有四善德義清謹公平恪謹二十七最有上中下之别自近侍至于鎮防並據職事目為之最凡二十七焉一最以上有四善為上上一最以上有三善或無最而有四善為上中一最以上有二善或無最而有三善為上下一最以上有一善或無最而有二善為中上一最以上或無最而有一善為中中職事粗理善最弗聞為中下愛憎任情處斷乖理為下上背公向私職務廢缺為下中上官諂詐及貪濁有狀為下下若於善最之外别有可嘉尚及罪雖成殿而情狀可矜或雖不成殿而情狀可責者省校之日皆聽考官臨事量定太宗又遣使以六條黜陟天下時房𤣥齡王圭掌內外官考課權萬紀奏曰不平上命侯君集推之馬周疏曰今流內九品以上有九等考第自比年不過中上未有得上下以為上考者臣謂所設九等正考當今之官必不施之於異代也縱使朝廷實無好人猶恐於見任之內比校其無善者以為上第豈容皇朝士人遂無堪上下之考臣謂宜每年選天下政術尤最者一二人為上上其次為上中其次為上下則中人以下可自勸矣盧懷慎曰三載考績校其功也請自令都督刺史以下在任者未經四考不許遷除𤣥宗開元中命諸道採訪使考課官人善績三年一奏永為常式至二十七年二月赦文比來諸道所通善狀但優仕進之輩與為選調之資責實循名或乖古義自今以後諸道使更不須通善政每至三年朕自擇使臣觀察風俗有清白政理著聞者當别擢用並通典德宗時趙璟獻審官六議四議考課曰今內庶僚外刺史課最尤者擢以不次善矣臣謂黜陟宜責嵗限若任要重未當遷者加爵或秩其餘進退宜示遲速之常若課在中考如限平轉而歷試之即無茍且之心滯淹之慮唐傳嘗觀唐之世如班宏之駮劉乃趙宗儒之貶裴郁盧紹控李泌之抑蕭俯假文昌崔實杜元欽而進張惟素鄭覃皆考課之得人也陽城刺史道州治民如治家而民皆知化可謂刺史之最而當時反以催科政拙而下其考何易于令昌邑不督賦役三年無囚可謂縣令之最矣而當時反以在官無異稱而中上其考此考課之失也以通典漢唐志及雜文修開元初考功多請托冒濫嵗數百人王丘遷考功務核實材登科才滿百人本傳至德後考績未實內外悉考中上殿最混淆趙宗儒領考功事黜陟詳當無所回憚凡入中上者才五十人本傳趙璟自言薦韋證以貪敗請降考考校使劉滋謂璟知過更以考升盧承慶嘗考內外內有一官監運損糧考中下其人容色自若又改注曰非力所及考中中既無喜無愧又改曰寵辱不驚考中上韋嗣立調雙流令政為前最盧從願遷豫州刺史政嚴簡奏課為天下第一裴向為櫟陽渭南令奏課第一薛珏為乾陵臺令嵗終以清白聞課第一宋朝太祖建隆二年令右益門衛將軍魏仁滌等以監酒麴市徴額外有美利並令遷秩故事文武常參官各以曹官事繁省著為月限考則遷轉太祖循名責實非有勞者未嘗進秩自是嵗滿序遷之典頗不復舉行㑹要建隆三年十一月甲子先是案令文州縣官撫育有萬户口增益者各率見户每十分加一分刺史縣令各進考一等其州户不滿五千縣户不滿五百各準五千五百户法以為分若撫養乖方户口減耗各準增户法亦減一分降考一等主司因循例不進考惟按視闕失不以輕重便書下考至是有司上言自今請以減損户口一分科納係缺一分已上並降考一等如以公事曠遺有制殿罰者亦降一等又言京官月限多少不等有以三十六月為滿者有以三十月者有以二十月住支料錢者有司逐年書校考第並無準繩自今請應有曹局料錢京官並以三十月為滿內有合校考第者以此為限其料錢一依舊例月數支給並從之長編乾德元年詔御史臺吏部南曹刑部大理寺官自少卿郎中員外郎知雜御史以下丞簿司直評事等並以三年為滿如常在本司决事者至月限日便與官其尚書侍郎御史中丞大理卿别議恩典如官不恪事廢即不得例遷仍量罪置罰㑹要乾德四年詔曰惟彼銓衡止慿資歷慮有英俊沉于下僚自今常調赴集選人委吏部取南曹取歷任中多課績而無闕失者具名送中書門下引驗量才甄叙寶訓乾德四年詔三司判官皆妙選時守而事務既繁心力有限若非考課升黜則功過難明自今有改移制置切在從長事或未詳須問别司若三省遍咨猶未能决即訪之諸道轉運使以盡利害仍各置歷書其課績至嵗終考之三司各置推官一員别給以印三司使亦時糾其非宜庶幾各盡心共濟公事通略開寶九年十一月庚午詔諸道轉運使各察舉部內知州通判監臨物務京朝官等以三科第其能否政績尤異者為上恪居官次職務粗治者為中臨事弛慢所蒞無狀者為下嵗終以聞將大行誅賞焉長編太宗謂宰相曰朕欲擇河北一轉運遍閲班簿多不詳操履自今臣僚授任並具履歷引對所冀朕漸與羣臣相識亦可觀其材質若懷才藴智之士自可因此敷揚或嘗負瑕缺朕前一一讀之想其聉如撻市宋琪曰陛下樂育多士將面命而識之使士大夫有所效又令當職之官獲免謗議寶典太宗詔置內殿崇班在供奉之上左右侍禁在殿直之上以供奉殿直有四十年不遷者故特置崇班侍禁之直以次授之是國初之制不以嵗月計久近為叙遷之法也至三年趙韓王復相畏嫌避事請置考課以分中書之權於是以京朝官考課歸審官院以幕職州縣官考課歸流內銓以二銓使臣考課歸三班院或給印紙歷子或功績可紀清白有守過犯度數舉主姓名盡皆書之俾至闕下赴院磨勘第其等而升黜之尚有甄别能否之意也興國二年正月十日詔曰虞書考績爰及三年漢官奏課聿分九等應諸道州府曹椽府及縣令簿尉先是吏部南曹給印紙歷子俾州縣長吏書其績用愆過秩滿有司詳視而差其殿最斯舊章也執事者其申明之無或蔽欺以紊經制諸州先於歷子外給公據者罷之敢有妄書功勞輒隱違犯致磨勘彰露或為人陳告本判官録事參軍悉除名長吏重罰曹司决配仍揭榜于録事參軍㕔事㑹要興國三年二月判吏部南曹董淳言諸州録事掾縣令簿先給南曹歷子州吏批書多所漏略今於令式取其合書如受驛義倉官市牛皮筋角前代帝王陵寢嶽瀆河海祠廟及給鹽麯商稅超越等並書敢漏一事者殿一選三事者降一資初入令録者只於本資降州縣吏加笞責焉令式所合書者雖所部無有亦著其無以相參驗望頒行諸州從之同上興國六年二月詔曰朝廷伸懲勸之道立經久之規應羣臣掌事于外州悉給以御前印紙所貴善惡無隱殿最必書俾因滿秩之時用因考績之典近聞官吏頗紊綱條朋黨比周秩相容蔽米鹽細碎妄有指言蠧有巨而不章勞雖微而必録有司據文而校件析以聞志既切於澄清思或由於僥幸成命不反蓋示信以當然出令惟行於垂勸而安在宜行戒諭用警因循自今應出使臣僚在任日勞績非尤異者不得此書曽有殿犯不得引慝其餘經常事不在批書之限㑹要興國七年五月詔曰朝廷重賞罰之柄為懲勸之典蓋生民之利病由官吏之能否也所以旌别善惡黜陟幽明每思精審以立制條州縣官所考殿最係南曹而知州通判别給御前印紙以書功過洎嵗時斯久因循失職遂成私徇寖以混淆特舉舊章以明申警自今外任京朝官凡從政之迹並係本部以實狀書於所給印紙不得增京功過阿私罔上其關津書考之官悉書其名違者置罪同上二十九日詔應知州通判知軍監知縣減官及進士及第幕職州縣官曽給御前印紙者宜令齎往任所批事迹納差遣司磨勘功過定升降官第及堪何任使京官以下送閣門引見朝官件析以聞同上興國八年四月詔曰國家並建庶官分掌衆務各司攸局咸盡其材不明殿最之文曷伸懲勸之道應州縣幕職官等吏部蓋有舊規自今京朝官釐事於外者秩滿歸闕曽經責罰及臨事簡慢者並與邊逺州郡課績髙第治行尤異者授以近地式示勸能著為定制同上六月三日刑部郎中楊徽之庫部員外郎孔承恭同考校京朝官殿最八月內詔曰朕選用羣才升良衆職九品之賤一命之微未嘗専委於有司必須召對於便殿親與之語以觀其能倘敷納而可觀必越次而命賞靡容僥幸庶協澄清自今應親臨選擢官吏並送中書更審勘履歷别聽進止同上雍熙二年詔右諫議大夫雷德驤同知京朝官考課今録其履歷功過之狀引對既得漸識羣臣可以擇才委任且使有官政者樂以召對負瑕纍者耻於顧問可以懲勸矣通略雍熙四年三月十二日詔曰國家分職建官蓋期於共理信賞必罰以示於無私用崇激勸之風冀盡忠勤之節應天下知州通判等共分憂責各效官成政理之臧否攸歸黎庶之慘舒是繫所宜明為責罰以示勸懲先給御前印紙令書課績而功過未盡其實黜陟未得其宜自今並條其事迹凡决大獄幾何凡政有不便於時改而更張人獲其利者幾何及公事不治曽經殿罰並具書其令狀同僚共書不得隱漏罷官日上中書考校以定殿最㑹要淳化二年正月十日左諫議大夫魏庠知制誥柴戍務同知京朝官考課十九日詔曰國家擇幹蠱之材領轉漕之任生民係乎舒慘國用倚之盈虛百吏承風在舉措而宜謹三年㑹計固黜陟以是行茍無課最之文曷伸懲勸之理應諸道轉運使自令釐革庶務平反獄訟及貨財盈羡飛挽辦集有利於民等事並令所在州府軍監每嵗終開析以聞其尤異之績者不得申舉同上淳化三年十月戊寅詔曰三考黜陟有虞之茂典八使按行東漢之舊章茍課最之不明於賞勸而何在應諸道知州通判及釐務京朝官録事判官縣令簿尉等內有治行尤異吏民畏服居官亷恪蒞事明敏獄訟無滯倉庫盈羡冦盜剪滅部內清肅者本道轉運使各以名聞當召赴闕親臨問狀增秩懋賞以旌其能其有貪猥自私臨蒞無取稽留狂獄叛離官次盜賊羣起賄賂公行並須修狀來上當行貶斥時上慮中外官吏清濁混淆莫能甄别壬午命户部侍郎王沔度支副使謝必祕書丞王仲華同知京朝官考課吏部侍郎張宏户部副使髙象先膳部員外郎范正辭同知幕職州縣官考課號曰磨勘院又命左贊善大夫魏庭式與樞密都承㫖趙鎔李著同較三班院殿直以上功過淳化四年以考校京朝官為審官院幕職州縣官為考校官廢京朝差遣院令審官院總之又以幕職州縣官考課院歸流內銓淳化五年臨軒親選京官郭玘等四人為升朝官仍給御前印紙令書今任課績滿日賫赴御前考校之帝面諭玘等爾為布衣在塵埃時見一朝官還羡否今來未滿嵗而卒擢選宜自厲力以答殊恩至道知考課王旦引對吕蒙正之弟蒙亨上曰此人於兄弟之中最優蒙正在相時何不言旦曰文字政事俱其所長纍有朝臣奏舉即授光祿丞真宗舊制郊祀推恩臣僚多獲叙進上即位諫官孫何耿望上疏請罷之以塞僥幸上曰此真有理况官吏遷絀於月實有典故自今郊祀行慶止加勳階爵邑遂定三年考課磨勘進秩之制命有司考其殿最臨軒黜陟之釋曰郊祀覃慶改官非舊典也自雍熙以來有之真宗因諫官上言遂罷其事命有司定三年考課之制引對黜陟之辨能否令審官院磨勘京朝官功但先經磨勘以前其履歷中雖有甚惡更不舉問磨勘後有贓私罪只增添年限茍應近格亦得改官其有勞績具而不論事一出於有司殊無黜陟之實甚非祖宗進賢退不肖之意咸平三年上諭宰臣今寫録內外京官歷任功過編䇿進內咸平四年四月初每遇郊祀則百僚遷官上即考課官孫何耿望以為僥幸請罷去至是之郊慶止加階勳爵邑而京朝則命審官院考其殿最引對上親閲而遷之磨勘京朝官自此始通略景德元年九月五日詔諸路轉運使副察所部官吏能否辨為三等公勤亷幹文武可取利益於國惠及於民者為上幹事而無廉譽清白而無治聲者為次畏懦而貪慢公不治贓狀未露濫聲頗彰者為下並列狀以聞㑹要景德二年以京朝官任中外職受代者位課引對多獲叙進而計司三館不預兹例於是內出孫沔等四人姓名特遷其官復令審官院立五年之制三班院以七年為限祥符四年以主客郎中李巽為度支郎中兩浙轉運副使司勳員外郎王矩為工部郎中京西轉運副使初遣官提㸃刑獄至是代選命向敏中較其殿最以嘗活寃獄者為第二等餘為第三等祥符八年及上玉皇聖號大赦內外文武官滿三年者有司即考課以聞於是引對之法廢矣天禧元年詔不限內外職守但及三嵗非犯入已贓者皆磨勘遷陟則其他贓私敗皆得以遷官於是黜陟之法廢矣乾興元年九月己巳詔伎術官自今不得如京朝官考課遷陟聖政仁宗時趙尚寬知忠州以考課第一知唐州有異故下詔褒焉仍進秩賜金天聖三年謂輔臣曰先王考績之次序雖見於經其詳不傳於後世朕以諸路舉刺之官初未有法以考其賢比令有司校考績課以嵗滿所上功狀定其殿最為上中下三等用唐考功四善之法驗其行實升絀之又擇可信良吏典治之其以新書布于天下凡在位者悉力一心務以稱朕至誠惻怛之意天聖六年詔令前一日具功過進內候欲出引對又非太宗臨軒顧問懲惡勸善之意矣明道間李迪再相沽譽又減武臣三年遂定為五年磨勘之制而昔時考課黜陟之意愈失矣天聖七年敕宜令審官院今後京朝官並宜依景德四年敕以前轉官及三周年者並收接文字依例磨勘如到闕已來未及三周年者依例差遣仍候轉官四年者亦與磨勘其川廣轉官及三周年許令在任中發文字赴審官院磨勘仍命御史臺曉示今後京朝官得替仰依程限赴闕如不因事故顯有拖延具官位姓名聞奏天聖八年審官院參詳京朝官多得替後轉官未及三年却别准本州或轉運司及諸州公文差遣常及在路故拖延三周年方始到闕今後京朝官並須以得替日前以轉官及三周年磨勘從之㑹要慶厯二年正月御史中丞賈昌期言近嵗舉諸州路提刑多非其人請廢故課黜陟之法詔自今提刑到闕令磨勘院具在任功過分三等聞奏上等除省府判官或轉運使副中等與大藩知州後方升陟差任下等正知州郡如未替間别有差委不拘此限㑹要慶厯三年開天章閣責治范仲淹富弼有曰我祖宗朝文武百官皆無磨勘之例惟政能可旌者擢以不次無所稱者至老不遷故人人自勵以求績效今文資三年一遷武職五年一遷謂之磨勘不限內外不問勞逸賢不肖並進此豈黜陟幽明之意耶臣請今後兩地臣僚無大功大善更不非時進秩內外官雖通滿五年乃得磨勘長編詔曰考課之法舊矣祥符之際治致升平凡下詔條全於寬大考最則有限年之制入官則有循資之格及此事邊因緣多故數披官簿審閲周行思得應務之才毋虧素飬之道非賞勸衆志不激勵非比别人情不憤悱具申凡目著于甲令大詔令嘉祐六年八月詔曰先王考績之次序雖見於經而其詳不見於後世朕若稽古以修衆功而諸路刺舉之官未有以考其賢否比令有司詳議厥制條奏來上詢謀悉同古人有言曰徒善不足以為政徒法不能以自行今朕有念功樂善之志而又繼之以黜陟幽明之法以待天下之大吏矣然非夫任事之臣躬率以正而考核其實與士大夫之宣力于外者皆安於禮義而不以便文徼幸為奸則朕之志豈能獨善於天下而法亦何恃以行哉咨爾在位其各采力一心務祇簡書以稱朕至誠怛惻之意其令考校轉運使副提㸃刑獄課績院以所定條目施行英宗治平三年始展為四年磨勘及定少卿監員額亦以救舊時之弊行至于今入流至多員額猥衆既無引對之法又有減年之令雖任宫祠以至待次無功可考無聲可述但計嵗月並與遷秩其與國初之意太戾矣治平四年十月詔曰考課之法所以諫羣臣而核名實也今諸路監司與郡守之政既已詳别其條具為令矣至於縣令之職與民尤近而未嘗立法恐非所以愛飬元元之道宜令天下州軍各上所轄縣令治狀優劣其條約令考課院議定以聞神宗熙寧三年四月自上即位循名責實守臣課不及等則有展年降資而治狀優異則褒寵之監司以上則命御史考校至是以縣最為近民未有勸沮約束乃詔考課院條具於儀定以斷獄平是賦入不擾均役屏盜勸課農桑振恤孤窮遵修水利户籍增衍整治簿書為最而參用德義清謹公平恪勤為善以考令之治行分上中下三等取其能否尤著者别其優劣嵗上其狀以詔賞罰即循權要抑孤寒故不以實者論如遺制之法通略考課院言準詔定到知縣縣令課法在任斷獄平允民無寃濫賦稅及時了辦不須追擾及差役均平並無論訴之人及雖有論訴而無不當之理在任能屏除盜賊里民安居勸課力田使野無曠土又能振恤困窮不致流移雖有流移之人而多方招誘都令復業一任之中主客户比舊籍稍有增衍在任架閣庫簿書務合整齊經提刑轉運㸃檢别無散失及興修水利疏通積水以利民田能勸誘人户種植桑棗天下州軍委知州通判每嵗取索轄下得替知縣令前項三條課績兼依唐四善德義清謹公平恪勤採逐人有上項事實即參詳分為上中下三等申本路轉運提㸃刑獄司逐司類聚齊足同共將一路所供三條課績四善事實再行審定上中下三等內有事狀尤異出於上等之外則定為優等如政事昏繆出於下等之下者即定為劣等即不得將合在三等政事定優或劣其奏狀並限次年春季申奏到送考課院看詳如所奏報允當即從本院保明申奏武臣知縣為上中下等之人即乞比類上項賞罰施行詔並從之長編熙寧三年丙午詔中書考察內外官司置簿記功過俟嵗終及因非次除擢檢録比校進呈擇其尤甚者進絀之同上哲宗元祐七年四月三省言諸路考察縣令課績等第者本條未有限定人數今以一路所管縣多寡為則委本州通判考察課績以德義有聞清慎明著公平可稱恪勤匪懈為四善以獄訟無寃催科不擾稅賦别無失陷宣敕條貫經帳簿書齊整差役均平為治事之最農桑墾殖野曠土闢水利興修民賴其用為勸課之最屏除奸盜人獲安處賑恤窮困不致流移為撫飬之最仍通取善最分為三等七事為上二等為中餘為下限次月申監司數聚每半年一次同行審復若有能否尤著者别為優劣上半年限八月下半年限次年二月具事狀保明以聞知州除太中大夫觀察使以上三京留守安撫使鈐轄不考察外其餘並委監司依此考察以上並令吏部開拆等第申尚書省即知州通判到任未滿一月監司未滿兩月者並展一月其知縣令在任不及二年罷任者不考察從之同上紹聖二年七月尚書省言今增損諸轉運提刑提舉官合上簿七事一舉官二勸農桑三招流亡四興利除害五按察吏部賦罪六部內置獄及平反獄訟七譏察賊盜並開具互申都司都司限兩月開具申尚書省諸考課事核賞罰而隱瞞不申者徒二年逐曹失報者責其吏從之㑹要髙宗紹興間因尚書席益之奏而用乾德詔書凡常調中才行可取或課績優著者長二具以名聞紹興三年八月臣僚上言守令有四善四最考課之法雖具載條格欲望明詔監司守臣遵行考課良法責以試實治狀上聞如得優異之人乞加獎擢以為循吏之勸詔令吏部申明行下同上紹興三年二月權吏部尚書席益言太祖乾德四年詔曰自今常調赴集注選人吏部南曹取歷中多課績而無闕失者觀其人才詣以吏術可副升擢者具名送中書門下省驗以聞當與量加甄奬欲望不用乾德詔書凡常調中才行可取或課績優著者長二具以名聞從之同上紹興六年四月殿中侍御史周祕言國家以十五事考校監司以四善四最考校守令保奏有限違限不實者有罪而五六年間惟成都潼川路一嘗奏到其餘諸路課績並不申奏法令廢弛能否無辨欲望特命有司檢具考課條令申嚴行下責諸路監司州縣自今各依限保明其纍年輒不申奏者亦乞取問因依仍乞自今從朝廷制度取殿最各一二人量行賞罰詔令吏部申嚴行下諸路常切遵守如違仰御史臺糾劾以聞餘依奏紹興二十八年十二月右正言凌哲言祖宗時監司考課之法尤所注意至給御前印紙批書事件俟其滿嵗用以磨勘至於保奏互舉各有期限違者論罪如律比年以來文存實亡漫不加省善否混淆莫之旌别欲望申命有司撿坐見行考課條法嚴飭諸路監司恪意遵守以時互舉聞乎朝廷且使稍久其任以究行殿最從之㑹要孝宗乾道間臣僚乞自今以責實以為政吏不惟文法士不惟詞藝故考課黜陟之法所以復還前日之舊矣總論宋朝建隆初始以户口增耗為州縣吏嵗課之升降興國初又定三科之法以核能否其後遂詔郭質勝中正雷德驤典其事又雍熙間上嘗閲班部欲擇用人而患不能遍知羣下之才始詔德驤以羣臣易過之迹引與俱對淳化中又分京朝官考課使王沔主之乃取州縣官考課使張宏主之三班考課使魏廷式主之沔既條奏其法於是御史戴子元郎中張紳皆以負黜焉然沔之法亦以煩碎無待士君子之體物議非之久之復廢京朝考課而置審官院以錢若水主之廢州縣官考課歸之流內銓以蘇易簡主之唯三班無所改易其後天子又嘗欲自宰相修制書考之事既而但欲責其稱職遂不行焉然親書課最之意二十餘幅以賜錢若水等蓋其丁寧之意如此焉曽南豐太祖委大臣擇士嵗滿叙遷之典稍不復舉文武常參官非有勞者未嘗進秩至淳化間先正趙普復相畏嫌避事請置考課院以分中書之權於是以京縣官考課歸審官院以幕職州縣官考課歸流內銓以三班使臣歸三班院舉大臣之道揆付之有司之法守雖有才品至庸下而資考既足莫不例遷論者以為非便羣書考索後集卷十五
