body:
  text: 羣書考索後集卷十宋章如愚編官制門祕書周外史掌四方之志三皇五帝之書漢圖籍所在有石渠石室延閣廣內貯之於外府又有御史中丞居殿中掌蘭臺祕書及麒麟天祿二閣藏之於內禁後漢圖書在東觀桓帝始置祕書監掌典圖書古今文字考合同異屬太常魏武帝置祕書令典尚書奏事文帝置中書令而祕書改令為監掌藝文圖籍之事初屬少府自王肅為監乃不屬其蘭臺亦藏書籍而御史掌之魏薛夏云蘭臺為外臺祕書為內閣晉武帝以祕書併入中書省著作之局不廢惠帝復别置祕書監併統著作局掌三閣圖書自是祕書之府始居於外梁曰祕書省後周祕書監亦領著作監修國史隋祕書省領著作太史二曹後又改監為令唐武德初改為監龍朔二年改祕書省為蘭臺改監為太史天授初改祕書省為麟閣神龍初復掌經籍圖書領著作太史二局通判省事其後國史太史分為别曹而祕書省但主書繕勘校而已宋太平興國始建昭文館史館集賢院皆總為崇文院及端拱初建祕閣擇三館書籍真本并內出古畫墨迹藏之亦在崇文院中淳化中詔祕閣次三館祕書省仍𨽻京百司時祕書雖有監少監丞郎校書郎正字著作郎佐皆以為寄祿官常帶出入郎官至祕書監有特令供職者有以他官兼領有以判祕閣官兼判者至道中宋白始以翰林兼祕書監祥符中楊億乃以祕書監判祕閣兼祕書省事凡邦國經籍圖書悉歸祕閣而祕書所掌掌祭祀祝版而已元豐正名既罷館職盡以三館職事歸省祕書省置祕書省職事官自監少至正字不領他局初除龍圖閣學士王勝之為祕書監時寄祿官已正議大夫蓋金陵欲重此選又勝之雅有文學故也監掌書籍圖史天文厯數之事屬有五著作佐郎祕書校書正字各以職𨽻長二惟日厯非編修官不預元祐中復置館職已而隨官資除授或預內外職任不必専在館中紹聖初罷之宣和初改元豐之制增為十八員以倣登瀛洲之數建炎三年罷紹興元年復置五年立定十八人為額太史局文德殿鐘漏所𨽻焉隆興元年詔監少丞外以七員為額二年詔依祖宗舊法更不立額少監隋煬帝置後改為令唐龍朔中改為侍郎尋復太極中增少監為二員宋元豐初除葉均繼除孫覺皆一時選也掌祕書圖籍國史天文歷數之事丞魏武帝置祕書令及丞典尚書奏事黃初中有左右二丞後省晉復置齊梁尤重後周栁蚪為祕書丞時祕書􅢖領著作不參史事因蚪為丞始令監掌唐龍朔中改為蘭臺大夫尋復宋淳化中詔祕書丞仍舊惟無定員及不専職分蒞中外之任元豐正名始定為職事官下並同掌參領書籍國史天文厯數之事元豐制祕書郎後漢馬融為祕書郎詣東觀典校書魏武嘗以劉邵為之晉掌中外三閣經書校閲脫誤亦謂之郎中武帝分祕書圖籍為甲乙丙丁四部使祕書郎中四人各掌其一宋齊尤為美職皆為甲族起家之選待次入補其居職例十日便遷齊梁末多以貴人子弟為之無其才實北齊又謂之郎中隋祖諱忠除中字唐分判校寫功程事龍朔中改為蘭臺郎尋復舊天授初曰麟臺郎尋亦復舊唐祕書郎三人掌四部圖籍皆有三本一曰正二曰副三曰貯校寫分貯集賢院史館昭文館祕閣經籍圖書則祕書郎主之元豐制見上元祐四年祕書郎並除升朝知縣已上資序人任滿除集賢校理紹聖初罷校理校書郎漢之蘭臺及後漢東觀皆藏書之室當時文學之士校書其中故有校書之職後於蘭臺置令史又選他官入東觀乃令典校祕書或撰述傳記蓋有校書之任而未為官也故以郎居其任則謂之校書郎以郎中居其任則謂之校書郎中當時重其職故學者稱東觀為老氏藏室道家蓬萊山至魏始置祕書校書郎後周屬春官之外史唐掌讐校典籍為文士起家之良選其𢎞文崇文館著作司經局並有校書之官皆為美職而祕書省為最唐校書郎掌讐校典籍判正文字皆辨其紕繆以正四庫之國史焉編緝校正定其脫誤則校書郎主之元豐制見上建炎罷紹興復置又參酌舊制必召試學士院而後命之正字後漢桓帝初置祕書監掌圖書古今文字考合同異其後監令掌圖籍之紀監述作之事不復専文字之任矣今之正字蓋令監之遺職校書之通制歷代無聞北齊集書省掌諷議有正書祕書省司經籍有正字隋四人唐因之掌刋正文字其官資輕重與校書郎同貞元八年屬集賢殿編緝校正定其脫誤則正字主之元豐制見上建炎罷紹興復置又參酌舊制必召試學士院而後命之也著作佐郎漢東京圖書悉在東觀故使名儒碩學入直東觀撰述國史謂之著作東觀皆以他官領焉蓋有著作之任而未嘗為官員也魏明帝太和中始置著作郎官𨽻中書省専掌國史後置佐著作郎官𨽻中書省専掌國史後又置佐著作郎亦屬中書晉祕書監自調補之元康詔曰舊著作舊屬中書今祕書既典文籍宜改中書著作為祕書著作於是改𨽻祕書後别自置省謂之著作省而猶隸祕書著作郎一人謂之大著作専掌史任佐著作郎始到職必撰名臣傳一人宋齊以來遷佐於下謂之著作佐郎亦掌國史集注起居梁初周捨裴子野皆以他官領其職與大著作同陳為令僕子弟起家之選後周屬春官之外史唐為著作局亦屬祕書省龍朔改著作郎為司文郎中佐郎為司文郎尋復舊初著作郎掌修國史及製碑頌之屬分刋局事佐郎二之徒有撰史之名而實無其任其任盡在史館其屬有校書正字掌修纂日厯祭祀祝辭則著作郎佐主之元豐制見上初除林希為大著豐稷為小著皆一時選也經筵周官師氏掌以媺詔王保氏掌諫王惡漢武時兒寬見帝語經學宣帝甘露三年詔諸儒講論五經於石渠閣光武平隴蜀後數引公卿郎將講論經理建武五年受尚書通大義每朝令桓榮敷奏經義顯宗時張酺以尚書教授數講於御前肅宗即位引酺會庭中使酺講尚書一篇建初四年會諸儒于白虎觀講五經同異帝親臨決如石渠故事靈帝詔三公選通尚書章句舉楊賜侍講于華光殿唐太宗時置𢎞文館精選天下文學之士又命孔頴逹講五經正義玄宗開元十三年改麗正修書院為集賢殿書院選耆儒日一人侍讀以質史籍疑義置集賢院侍讀學士侍讀直學士褚元量馬懷素為侍講每入闕門則令乘肩輿以進親自迎送以申師資之禮韋處厚通五經義穆宗詔入為翰林侍講學士宋太祖召趙孚對後殿講周易又召王昭素對便殿令講易乾卦太宗太平興國八年用吕文仲為侍講又幸國子監孫奭講尚書真宗咸平元年召崔頥正講尚書於景福殿又於苑中説大禹謨以年老致仕仍充直講二年以楊徽之夏侯嶠並為翰林侍讀學士侍讀學士邢昺為翰林侍講學士先是侍講朱崇首置此職擇耆舊以充其選班次如翰林學士設直廬於祕閣侍讀更直仁宗天聖元年上始御崇政殿召翰林侍講孫奭馮元講論語初詔雙日至是隻日亦詔講讀六年又命孫奭講尚書景祐元年以賈昌朝趙希言王宗道楊安國並為崇政殿説書日以二人入侍講院崇政説書自此始慶厯三年詔御史中丞侍講延英閣故事中丞無預經筵者以昌朝善於講論特詔之四年命曽公亮講毛詩王洙讀祖宗聖政録丁度讀前漢書初元昊叛罷讀至是復命講讀皇祐三年御延英閣讀易又御集賢閣講易英宗時御邇英閣召講經史元豐官制廢翰林侍讀侍講學士但以為兼官必侍從以上兼之其秩卑資淺則為説書嵗春二月至端午日秋八月至長至日遇隻日入侍邇英閣輪官講讀元祐七年復增學士之號元符元年省神宗時司馬光進讀通鑑漢賈山疏因言從諫之美拒諫之禍又讀通鑑漢紀至曹參代蕭何為相一遵何規矩上曰使漢常守何之法久而不變可乎光曰不獨漢也夏商周之子孫茍能守法雖至今存可也建炎二年三月甲午詔經筵講論語讀資政通鑑至四月庚申上諭宰執曰故事自五月至八月罷講筵朕以寡昧履兹艱難方夙夜孜孜於經史若如故事則纍月當廢疑義無所質朕欲勿罷可乎羣臣皆稱善於是詔勿罷講筵聖政宋朝講讀官初未有定制太宗始命吕文仲為侍讀繼而加翰林學士侍讀真宗時乃特置翰林侍讀學士班次翰林學士舊講讀官每見先賜坐暫起講復坐仁宗富於春秋乃令儒臣並就御案遂為故事王安石以為道之所存禮亦加重請復賜坐不行程頥為侍讀請坐不從元祐間蘇頌為侍講請如慶厯故事詔講讀官遇不講日各進漢故實二事崇政殿説書宋景祐元年置以賈昌朝為之四年改為天章閣侍讀慶厯二年以趙師民預講官復為崇政殿説書分紀蓋秩卑資淺則為説書不兼侍講元祐間范純夫乃以著作佐郎兼侍講司馬公休又嘗以著作佐郎兼侍講前世所未有也吕原明家孰廣記崇寧中初除説書二人皆以隱逸起蔡宗吕瓘仍遂其性詔以士服隨班朝謁入侍同前職名宋之制有士曰殿學士曰閣學士曰雜學士曰待制曰殿撰曰修撰曰直閣殿學士士有觀文有資政有端明資望極峻無吏守無典掌惟出入侍從備顧問觀文殿大學士非宰相不除皇祐元年詔置觀文殿大學士寵待舊相今後須曽任宰臣乃得除授時賈昌朝由使相右僕射觀文殿大學士判尚書都省觀文殿置大學士自昌朝始三年詔班在觀文殿學士之前六尚書之上會要自是嘗任宰相者出必為大學士熙寧中韓絳宣撫陜西河東得罪罷守本官四年用明堂恩授觀文殿學士宰相不為大學士自絳始續會要觀文殿學士以寵輔臣之去位者觀文殿即舊延恩殿初為文明殿學士四朝國史慶厯七年宋庠言文明殿學士稱呼正同真宗諡號兼禁中本無此殿額其學士理自當罷乞擇見今正朝或祕殿以閣學士易之乃下詔改為紫宸殿學士以參知政事丁度為之會要時學士多以殿名為官稱丁遂稱曰丁紫宸歸田録八年御史何郯以為紫宸不可為官稱於是改延恩殿為觀文殿歐陽公云觀文乃隋煬帝殿名理宜避之蓋當時不知然則朝廷之士果不可以無學也即殿名置學士會要以丁度為之東齋記事自後非曽任執政者弗除續會要熙寧中王韶以熙河功元豐中王陶以宫僚雖未歷三府亦除是職蓋異恩也然韶猶兼端明殿龍圖閣學士續會要資政殿大學士學士亦以寵輔臣之去位者資政殿在龍圖閣之東序景德二年王欽若罷參政後真宗時置資政殿學士以寵之在翰林學士下侍讀學士上十二月復以欽若為資政殿大學士班在文明殿學士之下翰林學士承旨之上資政殿置大學士皆自欽若始景祐元年詔資政殿學士薛奎班在翰林學士承旨之上薛奎事見實録康定二年右正言梁適請遵先朝故事定以員數康定詔大學士置二員學士三員會要舊制資政殿大學士學士並以寵朝臣之去位者元豐中韓維陳薦皆以東宫舊臣故特授焉會要端明殿學士惟學士久次者始除近嵗以待簽樞云端明殿即西京正衙殿也退朝録後唐天成元年明宗即位之初四方書奏命樞密使安重誨進讀懵於文義孔循獻議始置端明殿學士命馮道趙鳳俱以翰林學士充班在翰林學士上後有轉改止於翰林學士內選任初如三館例職在官下趙鳯轉侍郎諷任圜特移職在官上後遂為故事晉天福五年廢開運元年復五代史宋太宗時程侍郎羽為之後隨殿名改為文明殿學士慶厯中改文明為紫宸復改紫宸為觀文其改置本末見觀文殿明道二年改承明為端明復置端明殿學士以翰林侍讀學士宋綬為之在翰林學士之下大抵宋朝皆以翰林兼領不以翰林兼領者唯程戡王素乃特拜也自明道訖元豐無前執政為之者近來以待學士之久次者元豐中以前執政為之自曽孝寬始以見任執政為之自王安禮始會要政和中嘗改為延康殿職略建炎二年都省言延寧殿學士舊係端明殿學士詔依舊中興會要近拜簽樞者多領焉閣學士雜學士宋庶官之外别加職名所以厲行義文學之士髙以備顧問其次與議論典校讐得之為榮選擇尤慎元豐中修三省寺監之制其職並罷滿嵗補外然後加恩兼職直龍圖閣省郎寺監長二補外或領監司帥臣則除之待制雜學士給諫以上補外則除之係一時恩旨非有必得之理奏議元祐二年詔增復館職及職事官並許帶職尚書二年加直學士中丞侍郎給舍諫議通及一年加待制紹聖三年詔職事官罷帶職非職事官仍舊會要待制唐永徽中命𢎞文館學士一人日待制于武德殿西門文明元年詔京官五品以上清官日一人待制于章善明福門先天末又命朝集使六品以上二人隨仗待制代宗永泰時勳臣罷節制無職事皆待制于集賢門凡十三人崔祐甫為相建議文官六品以上更直待制其後著令正待制官日二人開元中每日以六品以上清官兩人待制於衙內唐職林據紀元云永徽中詔許敬宗每日待制于武德殿此始有待制之名永泰元年敕裴冕等並集賢待制此始有待制之所然則蓋唐設官也宋景德元年置龍圖閣待制以杜鎬戚綸充並依舊充職祥符二年詔班視知制誥列其下元祐令從四品掌侍從備顧問有所獻納則請到或奏對續會要龍圖閣宋大中祥符中建龍圖閣在會慶殿西偏北連禁中閣東曰資政殿西曰述古殿閣上以奉太宗御書御製文集及典籍圖畫寶瑞之物會要及宗正寺所進屬籍世譜四朝志有學士直學士待制直閣學士大中祥符三年置以杜鎬為之班在樞密直學士之上六年詔給䘖在本官之上會要直學士景德四年置以杜鎬為之班在樞密直學士之下祥符六年詔給銜在本官之上會要待制景德元年初置以杜鎬戚綸為之並依舊充職四年詔班在知制誥之下並赴內殿起居會要自改官制為學士初復之職或知制誥平出除之官制舊典直閣祥符九年以馮元為太子中允直龍圖閣直學士名始於此天章閣天禧四年初建天章閣在會慶殿之西龍圖閣之北明年仁宗即位修天章閣工畢奉真宗御製安于天章閣東曰羣玉殿西曰蘂珠殿以在位受天書祥符故曰天章取為章于天之義天聖八年置待制慶厯七年又置學士直學士會要又有侍講學士慶厯七年初置在龍圖閣學士之下學士罕以命人迄於仁宗世才王摰一人而已直學士慶厯七年初置在龍圖閣直學士之下會要待制天聖八年初置寓直於祕閣與龍圖遞宿尋命范諷鞠詠充職會要直閣政和中置詳見貼職寶文閣在天章閣之東西序羣玉蘂珠殿之北即舊日夀昌閣慶厯改曰寶文嘉祐八年英宗即位詔以仁宗御書御集藏于寶文閣治平四年神宗即位始置學士直學士待制恩賜依龍圖英宗御書附于閣會要學士治平四年初置以吕公著兼直學士治平四年初置以邵必為之會要待制治平四年初置直閣政和中置顯謨閣元符元年曾布鄧詢仁各申請建閣詔翰林學士中書舍人撰閣名五以聞續建閣藏神宗御集以顯謨為名徽宗建中靖國元年詔以顯謨閣為熙明閣仍置學士直學士待制續奉旨仍以顯謨為額崇寧元年詔顯謨閣學士直學士待制如三閣故事序位在寶文閣學士直學士待制之下三年又詔以熙寧元豐功臣圖形於顯謨閣會要學士建中靖國元年置直學士建中靖國元年置待制建中靖國元年置直閣政和中置徽猷閣大觀二年初建以藏哲宗御集置學士直學士待制學士大觀二年初置直學士大觀二年初置待制大觀二年初置直閣政和中置待制大觀二年初置敷文閣紹興十年置實録院檢討朱翌申請乞建閣以謹藏徽宗聖製詔閣以敷文為名中興會要置閣學士直學士待制等官職略學士紹興十年置直學士紹興十年置待制紹興十年置直閣紹興中置煥章閣淳熙十五年建藏高宗御製學士淳熙十五年置直學士淳熙十五年置待制淳熙十五年置初除劉國瑞也直閣淳熙十五年置華文閣慶元二年建以奉孝宗御製置學士直學士待制直閣等官學士慶元二年置直學士慶元二年置待制慶元二年置直閣慶元二年置貼職祖宗以來重之有集賢殿修撰後改右文殿直龍圖閣直祕閣三等政和四五年二浙福建諸路監司郡守往往交通內官多以應奉有勞遷職遂有未嘗朝覲天子因忽為待制班從官者蔡京不樂政和六年因增其目置修撰與舊為三等曰集英殿修撰唐張昌齡為北門修撰孫逖為集賢殿修撰修撰之名始於唐也曰右文殿修撰舊名集賢殿政和六年御筆集賢殿無此名祕書省殿以右文殿為名見任集賢殿修撰並改作右文殿修撰曰祕閣修撰同上置直閣與舊為六等曰龍圖天章寶文顯謨徽猷祕閣置人見前朝廷除授自此密矣舊貼職無雜壓至是因增至乃定為雜壓蔡絛國史外補祥符九年以馮元為太子中允直龍圖閣會要直閣之名始此元傳宋以史館昭文館集賢院為三館皆寓崇文院端拱元年置祕書於崇文院以右司諫直史館宋泌為直祕閣長編直館直院則謂之館職以他官兼者謂之貼職元豐以前凡狀元制科一任還即試詩賦各一而入否則用大臣薦而試謂之十館官制行廢崇文院為祕書監建祕書閣於中自監少至正字列為職事官罷文館直院之名獨以直祕閣為貼職皆不試而除蓋特以為恩數而已紹興十年置直敷文閣淳熙十五年置直煥章閣淳熙令自集英殿修撰至直祕閣為貼職羣書考索後集卷十
