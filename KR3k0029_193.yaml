body:
  text: 羣書考索别集卷六宋章如愚撰經籍門詩風雅頌之義風雅頌者聲樂部分之名也風則十五國風雅則大小雅頌則三頌也賦比興則所以製作風雅頌之體也賦者直陳其事如葛覃卷耳之類是也比者以彼狀此如螽斯緑衣之類是也興者託物興詞如關雎兎置之類是也盖衆作雖多而其聲音之節製作之體不外乎此詩𫝊風雅正變之分先儒舊説二南二十五篇為正風鹿鳴至菁莪二十二篇為正小雅文王至卷阿十八篇為正大雅皆文武成王時詩周公所定樂歌之詞也至豳十三國為變風六月至何草不黄五十八篇為變小雅民勞至召旻十三篇為變大雅皆康昭以後所作同前風者民俗之歌謡國者諸侯所封之域而風者民俗歌謡之詩也謂之風者以其被上之化以有言而其言又足以感人如物因風之動以有聲而其聲又足以動物也是以諸侯采之以貢於天子天子受之而列於樂官於以考其俗尚之羙惡而知其政治之得失焉同前勸懲得情性之正孔子曰詩三百一言以蔽之曰思無邪盖詩之言羙惡不同或勸或懲皆有以使人得其情性之正然其明白簡切通於上下未有若此言者故特稱之以為可當三百篇之義以其要為不過乎此也學者誠能深味其言而審於念慮之間必使無所思而不出於正則日用云為莫非天理之流行矣同前感善心懲逸志凡詩之言善者可以感發人之善心惡者可以懲創人之逸志其用歸於使人得其情性之正而已然其言㣲婉且或各因一事而發求其直指全體則未有若此之明且盡者故夫子言詩三百篇而惟此一言可以盡盖其義而示人之意亦深切矣語注優㳺含蓄之意詩雖或主於譎諫然其譏是人也亦必優㳺含蓄㣲示所以譏之之意然後其人有以覺悟而懲創焉若但探其隠匿而播揚之既無陳善閉邪之方又無懇切諷諭之誠則正恐未能有益於其人而吾之言固已墮於媟嫚刻薄之流而先得罪於名教矣夫子亦何取乎爾哉語或問美刺風諭之㫖詩本於人之情性有美刺風諭之㫖其言近而易曉而從容詠嘆之間所以漸漬感動於人者又為易入故學之所得必先於此而有以發起其仁義之良心也同前二南詩之正風周南之詩言文王后妃閨門之化召南之詩言諸侯之國夫人大夫妻被文王后妃之化而成徳之事盖文王治岐而化行於江漢之域自北而南故其樂章以南名之用之鄉人用之邦國以教天下後世誠意正心脩身齊家之道盖詩之正風也同前詩之作者非一人詩有是當時朝廷作者雅頌是也若國風乃採詩者採之民間以見四方民情之美惡二南亦是採民言而被樂章爾文公語録詩者古之樂詩古之樂也亦如今之歌曲音名不同衛有衛音鄘有鄘音弼有弼音故詩有鄘音者係之鄘弼音者係之弼若大雅小雅則亦如今之商調宫調作歌曲者亦按其腔調而作爾大雅小雅亦古之作樂之體格按大雅體格作大雅按小雅體格作小雅非是做成詩後旋相度其辭自為大雅小雅也大率國風是民庶所作雅是朝廷之詩頌是宗廟之詩同前雅有小大正變之分問二雅所以分答曰小雅是所係者小大雅是所係者大呦呦鹿鳴其義小文王在上於昭于天其義大問變雅曰亦只是變用他腔調爾同前風雅隨時而升如周南召南當初在豐鎬之時其詩為二南後来在洛邑之時其詩為黍離只是自二南進而為二雅自二雅退而為王風二南之於二雅如登山到得黍離時節便是下坡了同前六義之説有三問豳風本風而周禮籥章氏祈年於田祖則吹豳雅蜡祭息老物則吹豳頌不知就豳詩觀之孰為雅孰為頌曰先儒因此説而謂風中自有雅自有頌雖程子亦謂然似都壊了詩之六義然有三説焉一説謂豳之詩吹之其調可以為風可以為雅可以為頌一説謂楚茨大田甫田是豳之雅噫嘻載芟豐年諸篇是豳之頌謂其言田之事如七月也如王介甫則謂豳之詩自有雅頌今皆亡矣數説皆通恐其或然未敢必也同前六義之體不同所謂風雅頌乃是樂章之腔調也如言仲吕調大呂調越調之類是也至比興賦又别如直指其名直叙其事者賦也如本要言其事而虚用兩句釣起因而接續者興也引物為况者比也立此六義非特使人知其聲音之所當又欲使歌者知作詩之法度也同前比興之義不同詩之比興比是以一物比一物而所指之事常在言外興是借彼一物以引起此事而其事常在下句但比意雖切而却淺興意雖闊而味長同前詩之為興不一如興體不一或借眼前事説起或别將一物説起大抵只是將三四句引起如唐詩尚有此等詩體如青青河畔草青青水中蒲皆是别借此説興起其辭非必有感有見於此物也有將物之無興起自家之所有將物之有興起自家之所無前軰都理會這个不分明如何説得詩本指同前假物興辭之意詩人假物興辭大率将上句引下句如行葦勿踐履戚戚兄弟莫逺具邇行葦是比弟兄勿字乃興莫字此詩自是飲酒會賔之意序者却牽合作周家忠厚之詩遂以行葦為仁及草木如云酌以大斗以祈黄耉亦是歡合之時祝夀之意序者遂以為養老乞言豈知祈字本只是祝頌其髙夀無乞言意也同前笙詩有譜而無辭由庚白華等乃是笙詩有其譜而無其辭者也同前無邪者詩之全體或問思無邪如何是直指全體曰詩三百篇皆無邪思然但逐叚無邪耳惟此一言舉全體言之因曰夏之日冬之夜百嵗之後歸于其居冬之夜夏之日百嵗之後歸于其室此亦無邪思也出其東門有女如雲匪我思存縞衣綦巾聊樂我貟此亦無邪思也為子而賦凱風亦無邪思也為臣而賦北門亦無邪思也但不曾説破耳惟思無邪一句便分明説破或曰如滛奔之詩如何曰淫奔之詩固邪矣然反之則非邪也故其善者可以感發人之善心惡者可以懲創人之逸志同前美刺可以為勸戒問思無邪曰非言作詩之人思無邪也盖謂三百篇之詩所美者皆可以為法而所刺者皆可以為戒讀之者思無邪耳同前美刺不足以盡詩古人作詩與今人作詩一般其間亦自有感物道情吟詠情性㡬時盡是譏刺他人只縁序者立例篇篇要説美刺説将詩人意思盡是鑿壞了且如今人見人纔做事便作一詩歌美之或譏刺之是甚道理如此一似里巷無知之人胡亂稱頌䛕説把持放鵰何以見先王之澤何以為情性之正同前詩中頭緒多詩中頭項多一是音韻一是訓詁各件一是文體若逐一根究然後討得些道理則殊不濟事湏是通悟者看方得同前詩至夫子而復舊當時史官收詩時已各有編次但經孔子時已經散失故孔子重新整理一畨未見得删與不刪如云吾自衛反魯然後樂正雅頌各得其所云各得其所則是還其舊位同前聖人只是刋定人言夫子刪詩看来只是採得許多詩夫子不曾删去往往只是刋定而已聖人當来看定好詩便要興歎詠發人之善心不好詩便要起人羞惡之心皆要人思無邪盖思無邪是魯頌中一語聖人却言三百篇惟魯頌中一言足以盡之同前詩序失詩人之本㫖今人不以詩説詩却以序説詩是以委曲牽合必欲如序者之意寜失詩人之本意不恤也此是序者大害處同前讀詩當味其意讀詩者湏當諷味看詩人之意在甚處如栢舟緑衣不得於其夫宜其怨之深矣而其言曰我思古人實獲我心又曰静言思之不能奮飛其詞氣忠厚惻怛怨而不過如此所謂止乎禮義而中喜怒哀樂之節者所以雖為變風而繼二南之後者以此臣之不得於其君子之不得於其父弟之不得於其兄朋友之不相信處之皆當以為此法如屈原不忍其憤懐沙赴水此賢者之過也賈誼云厯九州而相其君兮何必懐此都也則又失之逺矣讀詩湏如此看所謂詩可以興可以觀可以羣可以怨是詩中一大義不可不理會得也同前讀詩全在涵泳讀詩之法只是熟讀涵泳自然和氣從胷中流出其妙處不可得而言不待安排措置務自立説只恁平讀意思自足同前讀正文自見其意聖人言詩之教只要得人思無邪其他篇篇是這意思惟是此一句包説得盡只将詩正文讀自見其意今人都縁這序少間只要説得序通却将詩意来合序説却不要説教詩通同前看詩自有次序看詩義理外更好看他文章且如谷風他只是如此説出来然而叙得事曲折先後皆有次序而今人費盡氣力做尚做得不好同前樂為詩而作盖以虞書考之則詩之作本為言志而已方其詩也未有歌也及其歌也未有樂也以聲依永以律和聲則樂乃為詩而作非詩為樂而作也三代之時禮樂用於朝廷而下逹於閭巷學者諷誦其言以求其志詠其聲執其器舞蹈其節以涵養其心則聲樂之所助於詩者為多同前志者詩之本詩出乎志者也樂出乎詩者也然則志者詩之本而樂者其末也末雖亡不害本之存患學者不能平心和氣從容諷詠以求之情性之中耳有得乎此然後可得而言顧所得之淺深如何耳語録聖賢以志求詩聖賢之言詩主於聲者少而發其義者多仲尼所謂思無邪孟子所謂以意逆志者誠以詩之所以作本乎其志之所存然後詩可得而言也得其志而不得其聲者有矣未有不得其志而能通其聲者也同前樂聲不足以盡詩程夫子謂二南猶易之乾坤而龜山楊氏以為一體而相成其説當矣試考之如何召南夫人恐是當時諸侯夫人被文王太姒之化者二南之應似亦不可専以為樂聲之應為言盖必有理存乎其間同前詩具天人之理凡詩所謂風者多出於里巷歌謡之作所謂男女相與詠歌各言其情者也惟周南召南親被文王之化以成徳而人皆有以得其性情之正故其發於言者樂而不過於淫哀而不及於傷是以二篇獨為風詩之正經自弼而下則其國之治亂不同人之賢否亦異其所感而發者有邪正是非之不齊而所謂先王之風者於此焉變矣若夫雅頌之篇則皆成周之世朝廷郊廟樂歌之詞其語和而莊其義寛而宻其作者往往聖人之徒固所以為萬世法程而不可易者也至於雅之變者亦皆一時賢人君子閔時病俗之所為而聖人取之其忠厚惻怛之心陳善閉邪之意尤非後世能言之士所能及之此詩之為經所以人事浹於下天道備於上而無一理之不具也詩集傳序風者民之歌謡凡言風者皆民間歌謡採詩者得之而聖人因以為樂以見風化流行淪肌浹髓而發於聲氣者如此其謂之風正以其自然而然如風之動物而成聲耳如闗雎之詩正是當時之人被文王太姒徳化之深心膽肺腸一時換了自然不覺形於歌詠故當作樂之時列為篇首以見一時之盛為萬世之法尤是感人妙處文公答潘叔恭雅鄭二者之别雅鄭二字雅恐便是大小雅鄭恐便是鄭風不應概以風為雅又於鄭風之外别求鄭聲也聖人刪録取其善者以為法存其惡者以為戒無非教者豈必滅其籍哉文公答吕伯恭刪後無詩之喻伯樂之所不顧則謂之無馬可矣夫子之所不取則謂之無詩可矣文公答范伯宗齊魯毛鄭之詩詩自齊魯韓氏之説不得𫝊而天下之學者盡宗毛氏毛氏之學𫝊者亦多而王述之類今皆不存則推衍説者又獨鄭氏之箋而已吕氏家塾讀詩記後序説詩多以意會今人說詩空有無限道理而無一㸃意味只為不曉此意耳語録詩説者不一燕燕之詩毛氏以為衛荘姜傷已韓詩則以為衛定姜歸其婦送之而作鄭康成注禮記又以為衛獻公不禮於鄭姒鄭姒作此詩謂當思先君獻公以待寡人柏舟之詩毛氏則以為仁人不遇韓氏則以為衛宣姜自誓所作自孔子既没之後世之學者各以其所聞而𫝊之故其説所以不一也詩之序自相反江有氾之詩既以為羙媵也勤而不怨嫡能悔過也而其下文云文王之時江沱之間有嫡不以其媵備數媵遇勞而無怨嫡亦自悔也載馳之詩既以為許穆夫人所作也閔其宗國顛覆自傷不能救也又言衛懿公為狄人所滅國人分散野處漕邑許穆夫人閔衛之亡傷許之小力不能救思歸唁其兄又義不得故賦是詩也如魚麗之詩序以為文武以天保以上治内以采薇以下治外始於憂勤終於逸樂既以為文武之詩棠棣之詩又曰宴兄弟也閔管蔡之失道故作棠棣焉此又成王之詩也非一人所作甚明矣論詩次序先後夫去而遣之還則勞之先遣後勞則皇皇者華當在四牡之前孔氏曰使臣往返非一四牡所勞不必是皇皇者華所遣之使孔氏以伐柯九罭破斧東山然後終以狼䟦今皆顛倒不次以為簡札誤編或者次詩不以作詩之先後孔氏之説亦一見也云云載馳衛懿公之詩乃在文公之後皇華遣使之詩乃在四牡之後豳風破斧乃在東山之前雖顛倒如此然四牡之詩但言人君之勞使不可不知勤勞皇華但言使臣之出不可不詢疾苦詩之本意如此不必泥先後之序也風雅頌之用不同其實則一詩之别有三風者風也本其風俗之美惡人情之去就為之詩因鄉飲射而歌之以風其上故曰風雅者正也言朝廷政事得失教化隆衰為之詩因朝廷政事享而歌之卒歸於正故曰雅頌者容也發潜徳之幽光揚先人之功烈為之詩因郊廟祭祀而歌之盡其形容故曰頌三者其用雖異其所以使之手舞足蹈而不知樂而不淫勤而不怨安於禮而不敢亂者則一也風雅頌之别詩大序雖出於後人𫝊益而其妙處實有孔子源流盖夫子嘗為子夏子貢之徒言之後人得其緒餘合為一篇之序也如詩有六義曰風賦比興雅頌非孔門不能道盖風雅頌詩之體也賦比興詩之用也以賦比興加之風雅頌之中所以風多比興雅頌多賦也予嘗為之説曰鄉黨之詩曰風故二南諸國之詩皆鄉黨人為之歌於鄉射鄉飲蜡祭或因諸侯之貢或因王人之来逹於太史而比其聲音於太師氏後世因為常樂今儀禮所歌二南諸詩是也朝廷之詩曰雅盖王朝卿士或太史氏為之於大賔客大朝會或燕享時歌之太師氏類以為樂章今儀禮所歌鹿鳴文王白華南陔諸詩是也郊廟之詩曰頌亦公卿大夫與太史氏為之周公諸人作周頌正考父之於商頌史克之於魯頌於郊祀明堂常祭宗廟時歌之而各有所主如清廟主文王執競主武王思文后稷不得而易非如雅詩可以通用也後世學詩不知風雅頌之聲與其所用者不同而妄為之故郊廟之詩間有作者而風雅詩寂不聞以古諸侯之邦人皆能詩國皆有史遂得轉而上於國乆矣何彼穠矣是也第不當在召南坰而下四篇非魯人為之盖請於朝天子命史克作之以追美僖公因歌於廟而列之頌此又詩之變者孔子曰樂正雅頌各得其所盖因其自然初非以是為褒貶也而序詩者以言一國之事謂之風言天下之事謂之雅有一定不可易而雅之小大由於政則有大事載之小雅小事載之大雅者故凡大序之論詩有出於後人混淆之辭不敢盡言引詩句以證風雅頌自其四始而言之則必有一國之政事者謂之風自其詩之體而論之則三百篇之中有所諷諭之言者皆謂之風也如文王曰咨咨汝殷商之類是也自其四始而言之則必其正言天下之事也然後謂之雅自其詩之體而論之則三百篇之中有所謂正言其事者皆可謂之雅也如憂心悄悄愠于羣小覯閔既多受侮不少之類是也自其四始而言之則必其形容天子之盛徳然後謂之頌自其詩之體而論之則三百篇之中有所稱頌聖人之盛徳者皆可謂之頌也如吁嗟麟兮吁嗟乎騶虞之類是也風也雅也頌也皆分在於三百篇之中故學詩者不當泥四始之故必求之六義可也詩之譏刺以㣲諷棠棣之詩所以閔管蔡也所陳者文王之事而已未嘗直閔其失焉大田之詩所以刺幽王也所稱者乃成王之美而已未嘗直刺其惡焉雄雉之刺亂則曰百爾君子而已隰有萇楚之疾恣則曰樂子之無知而已聖人不刪淫亂之風所以示戒淫亂之風非美事也而孔子刪詩不去而存之者所以示鑒戒於天下也亦如春秋三百餘年篡弑之事亂臣賊子一一書之亦所以示戒也而唐太子𢎞授左傳至於楚世子商臣殺其君頵而更授他書是不知聖人垂訓之意也近世有建言經筵不進國風是亦不知聖人垂訓之意也詩於一篇之中或有二義氓之詩曰刺淫佚又曰美反正是刺之中有美也庭燎之詩曰美宣王又曰因以箴之是美之中有箴也終南美襄公又曰因以勸戒之常武美宣王又曰因以為戒是美之中又有戒也詩有美刺怨惡閔傷規誨而一篇之中或有二義汝墳閔而有勉殷其雷勉而有勸氓刺而有美抑刺而有警揚之水怨而有思庭燎美而有箴大功之君雖小失不足譏刺宣王之詩凡二十篇其所稱美者衆矣然庭燎曰箴沔水有規鶴鳴曰誨祈父白駒黄鳥我行其野四篇皆曰刺者盖大有功者不能無小失也孔子刪詩並録其功過俾後世知大功之君雖小過不免譏刺也聖人叙詩正名而已平王天子也其政不足化天下則其詩列於風僖公諸侯也其功亦可以告於神明則其詩列於頌聖人之叙詩無加損焉正名而已矣逸詩司馬遷云古者逸詩三千餘篇孔子刪之存者三百孔頴逹則以為傳記所舉逸詩絶少史記所言盖司馬遷之謬歐陽又以為圖觀之宜不啻三千也樂官以詩諫工以納言時而颺之古之樂官掌誦詩以納諫也詩之有刺出於不得已讀詩至於庭燎未嘗不嘆古之君子愛其君之至也知其将失也則就其美而箴之箴之不可則沔水以規之規之不可則鶴鳴而誨之誨之不可然後祈父諸詩以刺之然則刺其君豈詩人之心哉盖不得已也夫有宣王之功而不至於文武此詩人之所惜也詩人思古以見今昔者詩人之傷幽厲也不敢言幽厲之失而詠歌文武成康之隆三嘆而不已者盖思古以見今之失也鄭氏訓詩之失鄭氏之學長於禮而深於經制至於訓詩乃以經制言之夫詩性情也禮制迹也彼以禮訓詩是按迹以求性情也此其所以繁塞而多失者歟緑衣之詩鄭以為褖不諫亦入鄭以為入於宗廟狼䟦狀周公安閑自得於䜛疑之中故有公孫碩膚赤舄几几之句而鄭謂之公遜庭燎見宣王有怠政之漸而鄭以為設雞人之官諸類此者不可悉舉豈可謂之知詩邪淇水文羣書考索别集卷六
