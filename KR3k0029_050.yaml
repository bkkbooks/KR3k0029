body:
  text: 羣書考索卷五十宋章如愚撰樂門樂名類宋建隆三年二月有司請改一代樂名并太廟四室酌獻迎俎送神樂章詔竇儼撰進四月儼上新定二舞十二樂曲名并樂章文為文德之舞武為武功之舞祭天用髙安之曲祭地用靖安之曲先農藉田同靖安祭宗廟用理安之曲祭天地宗廟登歌用嘉安之曲皇帝臨軒用隆安之曲王公出入用正安皇帝飲食用和安皇帝受朝皇后入宫用順安皇太子軒垂出入用良安正冬朝會登歌用永安郊廟俎入用豐安祭享酌獻飲福受胙用禧安五月竇儼上太廟四室舞名并登歌辭僖祖室舞大善之舞奏大善之曲順祖室舞大寧之舞奏大寧之曲翼祖室舞大順之舞奏大順之曲宣祖室舞大慶之舞奏大慶之曲乾德元年陶榖上祀感生帝樂章曲名降神州大安太尉行禮用保安奠玉帛用慶安司徒奉俎用咸安酌獻用崇安飲福用廣安亞獻終獻用文安送神用普安四年十月詔太常寺置熊羆十二案及文武舞羽籥干戚樂工之數本寺上言文舞二十六人二人執纛武舞六十六人二人執旌及引舞十八人共百五十人具服各異其鼓吹十二案鼓氊牀十二為熊羆騰倚之狀以承其下鼓吹工共一百八人二舞用樂章四首詔陶穀竇儀分撰是月和峴言樂器中有妙手笛與雅樂正聲清濁相應可以旋十二宫可以通八十四調其制如雅笛而小其長六尺與黃鍾之管等其竅六左四右二請改為拱宸管於十二案上及十二編磬并登歌兩架下各一望編於令式又言郊廟殿廷通用文德武功之舞然其綴兆未稱武德之形容又依古義以揖遜得天下者先奏文舞以征伐得天下者先奏武舞陛下以揖遜受禪宜先奏文舞請改殿廷所用文舞為文德升聞之舞其舞人約唐太宗舞圗用百二十八人以倍八佾之數分為八行皆著履執拂服袴褶冠進賢冠引舞二人執五采纛其舞狀人容變數聊增改舊制又陛下以神武定宇內即次奏武舞請改為天下大定之舞人數行列悉同文舞舞人皆披金甲持戟引舞二人執五采旗其舞六變一變象六師初舉二變象上黨克平三變象維揚底定四變象荆湖歸復五變象卭蜀納款六變象兵還振旅仍别撰舞曲樂章而文德武功二舞請於郊廟仍舊通用又按唐貞觀中景雲見河水清張文收采古朱鴈天馬之義制景雲河清歌名曰宴樂元會苐二奏是也伏見今春有進甘露嘉禾紫芝緑毛龜白兔者欲依月律撰五瑞各一曲每朝會登歌首奏之至十一月冬至帝御乾元殿受朝賀畢群臣詣大眀殿有上夀之禮始用雅樂登臣二舞先是帝每謂雅樂聲高近於哀思不合中和又念王朴竇儼素各知樂皆已淪沒因詔和峴討論峴奏曰十二月聲含在寂默古聖設法演而出之立尺寸作為律呂三分損益上下相生取合真音謂之形器但以尺寸長短非書可傳故纍秬黍求為準的後代試之或不符會西京銅臬可校古法今司天臺影表上有銅臬下有石尺是也今以朴尺淺量短於影表上尺四分知今樂聲之髙皆由於此况影表測於天地則律管可以準繩帝乃令依古法别造新尺并黃鍾九寸管令工人品校其聲果下於朴管一律尋又中出上黨秬黍纍尺校律亦相符合乃下尚書集官議定遂重造十二律管取聲自此雅音和暢自國初以來御正殿受朝賀用宫垂次御别殿羣臣上夀舉樂是歲始備用焉六年十月詔和峴作瑞文駟象玉烏皓雀四瑞樂章以備登歌從和峴請依漢朝作天馬赤鴈御鼎白麟之歌也是月太常寺言準令宗廟殿庭宫垂三十簴殿庭加鼓吹十二案開寶四年郊祀誤用宗廟之數今歲親郊欲用舊禮詔圜丘增十六簴餘依前制五瑞四瑞樂之章乾德四年十月和峴言唐貞觀十四年景雲見河水清張文收采古朱鴈天馬之義制景雲河清歌名曰宴樂元會第二奏者是也伏見今年荆南進甘露京兆果州進嘉禾黃州進紫芝和州進緑毛龜黃州進白兔欲依月律撰神龜甘露紫芝嘉禾玉兔五瑞各一曲每朝會登歌首奏之六年十月峴又言漢獲天馬赤雁神鼎白麟之瑞並為郊歌國朝台州進瑞木成文馴象南方自至秦州獲白烏黃州獲白雀並合播在管絃薦于郊廟詔峴作瑞文馴象玉烏皓雀四瑞樂章太宗皇帝遊藝集萬國朝天樂曲平晉樂曲法音前集同和之舞定功之舞二曲樂譜二曲樂章淳化三年元日朝賀畢再御乾元殿羣臣上夀用宮垂二舞登歌五瑞曲又請取今朝祥瑞之尤者作為四瑞樂章備郊廟奠獻以代舊典詔從之注有司雖承詔而不能奉行故今闕其典至道元年十二月帝以新增九絃琴五絃阮宣示近臣因謂之曰古樂之用與鄭衛不同朕近因內治心術外觀時政求古人之意有未盡者增琴為九絃曰君臣文武禮樂正民心阮為五絃曰金木水火土别造新譜凡三十七卷俾太常樂工肄習之以備登薦二年正月太常寺言音律官田琮以帝新增九絃琴五絃阮均配十二律旋相為宫隔八相生並以叶律冠于雅樂以旋宮相生之法畫為圗以獻遂請廢拱宸管帝覽之喜詔遷職以賞之真宗祥符六年四月召輔臣至龍圗閣宣示上件太宗御製詔以太宗聖制曲為名共三百九十六付修史院又以萬國朝天樂曲同和之舞平晉樂曲定功之舞二曲雅樂譜及御製二曲樂章令太常寺與禮官參議於郊廟祭享參用景德樂纂景德三年判太常事李宗諤編録律吕法度樂物名數上之名曰樂纂景祐廣樂記景祐樂髓新經景祐大樂圗景祐三年六月九日馮元等上言奉詔修撰樂書望特降書名詔以景祐廣樂為名七月十三日馮元等上廣樂記凡八十一卷先是太常燕肅建言金石不調願以周世王朴律凖更加考按詔令李照宋祁共領其事眀年金石一部成帝御延福宮臨閲因問照樂果和否照對金石之音與王朴律凖已叶然朴凖比古樂差高五律比禁防樂差髙二律臣願制管以調度帝曰誠為之乃取京縣秬黍纍尺成律鑄鐘審之其聲猶高更用太府布帛匹尺為法潞州所上羊頭山秬黍擇大者縱纍之檢考長短尺成與太府尺合法乃堅定下太常四律於是詔內東門供奉官鄧保與照監視羣工改作金石命聶冠卿檢閲典實佐其興作丞相府總領焉凡所改制皆關相府詳定以聞别詔臣元臣冠卿討論為一代典帝乃親制雅樂聲譜以受有司親制郊廟樂章二十一曲財成頌體告成于神眀詔丞相呂夷簡等分造樂章參施郊祀及為景祐樂髓新經凡五篇第一釋十二均第二眀主事第三辨音聲第四圖律呂相生并祭天地宗廟用律及陰陽數配五十二管長短次第歷代度量衡皆本之於陰陽配之於四時建之於日辰通之於覲望演之於王戍遁甲之法以授樂府以教正聲以暢羣臣初照等改造金石所用貟程凡七百一十四起五月止九月成金石興七案焉至於鼓吹及十二案悉修飭之令臣冠卿等作景祐太樂圖二十篇以載鎔金爐石之法歷代八音諸器異同之狀新舊律管之差是日與新樂并獻于崇政殿詔中書門下樞密院大臣與觀焉考聲展器靡不如素帝悅自監董以下至卒徒進秩賞賜各有差其年十一月有事南郊悉以新樂并聖製及諸臣樂章用之其後議者以李照立黍纍尺為非詔不行用宋祁馮元乃諧於樂書舊本刪去李照樂事一節詔張方平與宋祁等同共刪潤祥符七年六月詔玉清昭應宮景靈宮其宮架樂並用三十簴舊用二十簴景祐二年二月燕肅等以考定樂器畢元年肅上言乞考定編鏄磬詔於延福宮進呈按試作御製天地宗廟樂曲樂章凡五十一曲帝問李照此樂如何照為集賢按理初亦詔參其事照對高古樂五律遂命詳陳其事照上言臣始到太常寺時已磨琢鐘磬成就切聽八音之作雖與王朴所造律準品格符合其於聲調則乃太髙比之古樂約髙五律比之胡部亦高二律若擊黃鐘則必齊於仲呂若擊夾鐘則必齊於夷則乃是冬行夏令春召秋風此皆王朴所造律凖經五代亂離之後雅樂廢壞鑿空創意不合古法臣又觀編鐘鑄鐘大小輕重厚薄長短並無差降倫敘之法加以銅錫不精聲韻失美大者則陵小者則節非中度之器也雖無鑄造年代文字本寺相傳云是唐末舊鐘亦有周朝所制驗其率易必在倉卒之時也且唐室遺故物於末代纍經衰亂之世王朴造律準於前朝莫覩福應之驗以兹為美未見其可昔黃帝命伶倫截竹為律復令神瞽叶其中聲然後聲應鳯鳴而管之參差亦如鳯翅是以大樂著美世稱其善望令臣特依神瞽律法試鑄編鐘一架則大小輕重長短厚薄必令合法帝令照於錫慶院作編鐘既成奏御照遂欲改大樂并引集賢校理聶冠卿為檢討雅樂制度故實官因更定尺律别創樂器其形詭異多非經説范鎮樂律初仁宗命李照改定太樂下王朴樂三律皇祐中又命胡瑗等考正范鎮與司馬光皆預鎮上疏論律尺之法又與光書往復論難凡數萬言元豐三年神宗詔鎮與劉幾定樂鎮曰定樂當先正律上曰然雖有師曠之聰不以六律不能正五音鎮作律尺籥合升豆區釜斛欲圗上之又乞訪求真黍以定黃鍾而劉幾即用李照樂加用四清聲而奏樂成詔罷局賜賚有加鎮謝曰此劉幾樂也臣何與焉及哲宗即位鎮欲造樂獻之自以為歉乃先請致仕既得謝請太府銅為三逾年乃成比李照樂下一律有奇二聖御延和殿召執政同觀以樂下太常詔三省侍從臺閣之臣皆往觀焉實元祐三年也東坡作范蜀公墓志宋朝太安樂皇祐三年七月翰林學士承旨王堯臣言案太常天地宗廟四時祠祀樂章凡八十九曲自景安而下七十五章率以安名曲豈特本道德政教嘉靖之美亦緣神祗祖考安樂之故謹上議國朝樂宜名曰大安其祀感生帝降神大安曲請更為元安詔從之先是帝自景祐初詔有司博訪通古知音之士討論雅樂制度與歷代沿革考正音器作為新書成一朝之典至皇祐二年九月三日帝御崇政殿召近臣宗室館閣臺諫官閲雅樂自宮架登歌舞佾之奏凡九十一曲遍作之因出太宗皇帝琴阮譜及御撰眀堂樂曲音譜并按習太樂新録賜羣臣又出新製頌塤匏笙洞簫仍令登歌以八音諸器各奏一曲因謂輔臣曰作樂崇德薦之上帝以配祖考今將有事于眀堂然世鮮知音其令太常益加講求於是內出改制樂曲名及譜法樂章令肄習之又詔鏄鐘特磬未叶音律令鄧保信阮逸盧昭等同太常寺檢詳典禮别行鑄造閏十一月十二日詔古者作樂不相沿襲然必太平始克眀備周武受命至成王時始大合樂漢初亦沿舊樂至武帝時始定泰一后土樂詩光武中興至明帝時始改大豫之名唐髙祖造邦至太宗時孝孫文收始定鍾律明皇方成唐樂國初亦循因王朴竇儼所定周樂太祖患其聲髙遂令和峴減下一律真宗始議隨月轉律之法屢加按覆亦未就緒頃者雖博加訪求縱未有知聲知經可信之人嘗為改更未適茲意宜委中書門下集兩制及太常禮樂以天地五方神州日月宗廟蠟祭享所用登歌宫架審更定奪聲律是非按古合今調諧中和使經久可用以發揚祖宗之功德云及是而羣臣上議故有是詔皇祐四年召兩府及侍臣觀新樂于紫宸殿凡鏄鐘十二詔以其圗送中書五年六月御紫宸殿奏太常寺新定大安樂召宰臣至省府館閣預觀皇祐紫宸殿奏大安樂宋受皇天大寶命藝祖太宗統一區夏建萬世無窮之基惟真宗克昭前人重光允釐康功逮我仁宗皇帝益闡潤色之洪猷道洽治隆超三軼五爰有制作顯彰厥成乃皇祐紀元之三可羣臣之奏肇創雅樂名以大安越眀年十有二月壬辰有司以樂備聞又眀年六月乙亥皇帝親御便殿閲焉律度契乾坤之正聲氣叶陰陽之純器異制而同和工殊習而舉間若節若守有度有序小音紆徐大音激越匪霆匪雷天籟自然百度秩八風從冕旒虛已以當寧俊乂儼容而布列泠然肅然感於耳而動於心如觀周舞而見分綴憲左之有容如處舜庭而見堂上堂下之異奏四聖人之成功盛德雍容於綴兆之內而發揮於搏拊之間浩蕩於天地覆育之內而鼓舞於動植散殊之衆不待聰眀見微之士而後喻皇乎休哉國家非常之大典古今罕儷之上儀不可貶已臣竊惟祖宗御圖出治之經其逺者大者雖罔克究識若稽遺承沿襲之一道則麗于三極之內者惟曰有以安之而已新樂崇雅固已集百王之大成至於定名大安訂義考類實叶實從又足以表章聖謨昔所謂雖甚盛德其蔑以加此者亶屬兹乎莫仲頌景祐五年五月韓琦言奉詔詳定鐘律伏覩李照所造樂不依古法率意妄行别為律度朝廷因而施用識者久以為非竊聞太常舊樂見今存在乞將來郊廟大禮復用舊樂詔晏殊宋綬等詳定殊等言照新樂比舊樂減下三律衆論以為無所依據且用和峴所定舊樂從之八月太常寺言舊宫垂內用龍鳯散鼓四面以應樂節李照樂廢散鼓不用止以晉鼓一面應節舊樂建鼓四架并左鞸右應共二十四面設於宫垂四隅備而不擊李照樂以四隅建鼓與鏄鐘相應考擊舊樂雷鼓雨架各八面止用一人考擊李照樂别造雷鼓每面各用一人順天左旋三步一止各用一人考擊又令二人搖鞉應之詔並依舊樂制度李照所作更不用皇祐二年五月太常寺言奉詔定明堂樂皆當隨月用律九月以無射為均五天帝各用本音之樂從之樂器類黃帝景鐘有熊氏以神靈之資法天則地正名百物為五帝先涿鹿一戰萬國咸順乃膺土德之瑞受河圖興寶鼎紀雲官舉力牧為相調政理之緩急以作五鐘青曰大音赤曰重心黃曰灑光黑曰隱常而景鐘其一也五聲既調時位俱正甘露降醴泉出是為天地之美猗歟盛哉惟古樂自羲農而上制作無聞逮黃帝之兵起五部建氣物創法垂世以前民用惟兹景鐘神畀符命祥金隱曜受於赤城位得本體聲含正氣不繫方色獨取其起而名之故咸池之樂由是而備後聖因之作樂崇德雖書記舜鏞禮具周鎛文物為盛而究其音制悉自黃帝始想夫垂衣法宮金奏在庭大聲洋洋與嶰谷之管所以寫鳯鳴而定律本者異名而同調信乎足以暢天地之化而和人神也周麟之景鐘銘舜五絃樂記云舜作五絃之琴以歌南風夔始制樂以賞諸侯五絃謂無文武二絃唯宮與商等之五絃也夔是舜典樂之官欲天下同行舜道故歌此南風以賞諸侯使海內同教也鄭注云其詳未聞案聖證論引尸子及家語難鄭云昔舜彈五絃之琴其辭曰南風之薰兮可以解吾民之慍兮南風之時兮可以阜吾民之財兮今案馬昭云家語王肅所增非鄭所見又尸子雜説未可取證正經故言未聞也禮記正義禹五音聽治淮南子曰禹之時以五音聽治懸鐘鼓磬鐸置鞀以待四方之士為號曰教寡人以道者擊鼓諭寡人以義者擊鐘告寡人以事者振鐸語寡人以憂者擊磬有獄訟者搖鞀禹待賢以虡夏后氏以神聖之資勤勞天下溝壑之地殖為桑麻魚鱉之民育為衣冠乃膺玄圭之錫受九牧之貢襲爵行道垂拱視阜欽惟盛帝求賢自輔善旌諌鼓懇懇之意尤見於功崇德茂之時爰資五聲以廣聽治凡爾賢士能輔不逮教以道諭以義告以事語以愛鼓鐘鐸磬或振或擊或得以聞至於搖鞀以聽彼詔而來針規五者之器屹然在虡又從而銘著之想夫當時千里並應四海來告有諤諤之昌無訑訑之拒信乎其德之成足以為三王之祖也夏書所載猶有闕遺而鬻子淮南諸書不能具載至於設虡待賢與夫揚旌求士對而言之猶見於王融策秀才文之作盛意隆指終以不昧是用為銘述待賢之美賡續聖作以補詩書之闕文莫叔光銘周樂器制度周地官鼓人有六鼓雷鼓八面靈鼓六面路鼓四面長一丈八尺鼛鼓長一丈二尺晉鼓長六尺六寸而周禮經圗又有鼓足夏后氏謂之鼓足建鼓建立也以木貫而截之鼗鼓持其柄搖之旁耳還自擊連前共為九鼓四金金鐲金錞金鐃金鐸又樂器圗有特垂鐘謂黃鐘之律倍半而為之狀如鈴不圜黃鐘聲前長三律二尺七寸後長二律一尺八寸此謂特垂大磬配鏄鐘也編鐘十六枚同在一簨簴編磬垂鐘磬半為堵全為肆鐘磬十六枚同在一簨簴曰堵鐘一堵磬一堵謂之肆琴七絃瑟二十五絃柷如漆桶中有椎柄以節樂敔狀如伏虎背上有二十七鉏鋙刻以木長尺櫟之竽三十七簧長四尺二寸用竹為之形參差象鳥翼笙長四尺列管匏中施簧大者十九簧小者十三簧塤燒土為之大如雁卵鋭上平底篪以竹為之長尺四寸圍三寸小者尺二寸笛今時所吹五孔笛是也籥如笛三孔笙師教奏應長六尺五寸其中有雅笙師教奏雅如漆筒而弇口雅簫長尺四寸二十四管類簫二十三管又相案記云治亂以相即拊也琴瑟管簫干戚戈羽簧笙篪釋樂云大琴謂之離聲留離廣雅云琴長三尺六寸六分五絃大瑟謂之灑瑟之布音如掃灑郭景純云瑟長八尺一寸二十七絃之釋樂云大管謂之簥音驕郭景純云管長尺圍寸併漆之有底賈氏以為如篪六孔釋樂云大簫謂之言郭景純云編二十二管長尺四寸劉熙釋名云干盾也戚斧也戈鉤羽鳥羽也周禮云竽三十六簧鄭注周禮云笙十三簧釋樂云大笙謂之巢郭景純云列管瓠中施簧管端大者十九簧釋樂云大篪謂之沂郭景純云篪以竹為之長尺四寸禮記正義密須鼓昭十五年王謂籍談曰密須之鼓與其大路文所以大搜闕鞏之甲武所以克商唐叔受之以處參虛注謂密須姞姓國也文王伐之而得也漢犍為古磬成帝時犍為郡得古磬十六枚議者以為善祥劉向因是説上宜興辟雍設庠序陳禮樂隆雅頌之聲盛揖遜之容以化天下京房律凖京房云竹聲不可以度調故作準以定數準之狀如瑟長丈而十三絃隱問九尺以應黃鍾之律九寸中央一絃下有畫分寸以為六十律清濁之節其術施行於史官候部用之晉古尺武帝太始九年荀朂校太樂八音不和始知後漢至魏尺長於古四分有餘朂乃部著作郎劉恭依周禮制尺所謂古尺也依古尺更鑄銅律呂以調聲韻以尺量古器與本銘尺寸無差及汲郡盜發六國時魏襄王冢同周時玉律及鍾磬與新律聲韻暗同于時郡國或得漢時故鍾者吹律命之皆應朂銘其尺曰晉泰始十年中書考古器校今尺長四分半即所校古法有七品一曰姑洗玉律二曰小吕玉律三曰西京銅望臬四曰金錯望臬五曰銅斛六曰古錢七曰建武銅尺姑洗微強西京望臬微弱其與此尺同銘八十二字晉會稽鍾元帝初為晉王使郭璞筮遇豫之暌曰會稽當出鍾以告成功上有勒銘及大興初剡縣人果於井中得一鍾上有古文竒字十八字云會稽嶽命璞曰王者之作必有靈符塞天人之心與神物合契乃可以言受命觀五鐸啓號於晉陵棧鍾告成於會稽鐸發其響鍾告其象東晉石磬謝尚以鎮西將軍鎮夀陽採拾樂人并制石磬以備太樂江左有太古之樂自謝尚始也梁四通十二笛梁武帝素善鍾律欲釐正雅樂乃自製四器名之為通每通施三絃黃鍾絃用二百七十絲長九尺應鍾絃用百四十二絲長四尺七寸四分差強中間十律以是為差因以通聲不推月氣悉無差違而還得相中又製十二笛黃鍾笛長三尺八寸應鍾笛長二尺三寸中間十律以是為差以寫通聲於是被以八音施以七聲莫不和順唐崇業里鍾大唐缺黃鍾鑄不能成李嗣真居崇業里疑土中有之弗得道上逢一車有鐸聲甚厲嗣真曰宮聲也市以歸振於空地若有應者掘之得鍾衆聲遂振特命嗣真為太常寺丞唐賜學士銀鍾杜淹為秦王文學館學士侍宴賦詩尢工賜以銀鍾駱越銅鼓馬援於交址得駱越銅鼓為式焉岐陽石鼓韓愈嘗作石鼓歌云周綱陵遲四海沸宣王憤起揮天戈搜于岐陽騁雄俊萬里禽獸皆遮羅鐫功勒成告萬世鑿石作鼓隳嵯峨從臣才藝咸第一簡選撰刻留山阿太常王朴律聲周顯德六年詔朴考正樂朴以謂十二律管互吹莫得其真乃依京房為凖以九尺之絃十三依管長短寸分設柱用七聲為均乃和宋朝至景祐七年九月帝御觀文殿詔取王朴律準觀視御筆篆寫律凖宋祁為之贊其詞云在周有臣嗣古成器絃寫琯音柱分律位俾援攸司謹傳來世上聖稽古規庭閲視嘉御正聲親銘寶字奎鉤奮芒河龍獻勢樂府增榮乾華俯賁用叶咸韶永和天地慶厯新製晉鼓仁宗嘗曰鍾磬之音未合古法其集兩制太常與知音者考定其當既而議者各守所習久而不決上乃命各為鍾律以獻又新作晉鼓三牲鼎鸞刀以補禮器之缺召輔臣宗室諫官御史省府推官臨視之時慶厯五年九月十九日也景祐鎛鍾景祐二年七月李照言鑄造鎛鍾大小法云謹按國語制鍾大不出鈞重不過石注云以木長七尺有絃擊之以為鈞此文既言大小不出鈞理當以器量之義擇之不當以木長之法為解諸書皆云三十斤為鈞此文既云大小不出鈞者乃是三十斤之量爾若以三十斤金土之重凖其量則量太小若以三十斤之黍穀之重凖其量則太大漢志云以水凖其槩乃得大小輕重酌中之法可為準矣今稱水三斗則重三十斤以為鎛鍾之量頗協聲韻鑄造成鍾之後其重者亦不過百二十斤蓋據事見法有此顯驗從之雙鳯管景祐中以李照等新製雙鳯管詔付太樂府其制合二管以定律聲管端刻為雙鳯之飾施其兩簧焉南蠻銅鼓乾德二年南蠻進羣書考索卷五十
