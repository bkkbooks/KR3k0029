body:
  text: 羣書考索後集卷五十宋章如愚編兵門御將太祖之置將也隆之以恩厚之以誠富之以財小其名而崇其勢畧其細而求其大久其官而責其成毎朝必命坐賜與優厚撫而遣之嘗令為郭進起第悉用同瓦有司言非親王不可用上曰郭進控扼西山十餘年使我無北顧之憂進豈減兒女邪此可謂隆之以恩矣取董遵誨於仇讎取姚内斌於俘虜皆用之不惑郭進在西山嘗有軍校訟其不法上曰進御下嚴是必罪人懼進法欲誣進以自免也使中人捽以賜進令詰而殺之此可謂厚之以誠矣西北邊軍市之租多賜諸將不問出入徃徃賞賚又輙以千萬李漢超守闗南屬州錢七百萬餘貫悉以給與漢超猶私販榷場規免商筭有以事聞者上即詔漢超悉免闗征故邊將養士足以得死力用間足以得敵情以居則安以動則勝此可謂富之以財矣李漢超郭進皆終於觀察使所居不過廵檢使之名終亦不以大將處之然皆得以便宜從事郭進在西山毎遣戍卒必諭之曰汝等謹奉教我猶赦汝郭進殺汝矣其假借如此故郭進所至兵未嘗少衂此可謂小其名而崇其勢矣王彦昇之好勇馮繼業之自伐然彦昇守原州繼業之守靈州皆邊境以安此可謂畧其小而求其大矣何繼筠屯棣州二十餘年董遵誨屯通逺軍四十年其餘皆不減十餘年邊境頼之此可謂久其官而責其成矣夫寵之以非常之恩則其感深待之以赤心則其志固養之以非常之惠則其力足以至小其名而不撓權則位卑者有赴功之心而勇智者得以騁畧其過愆則材能進久其任則功利悉自古用將之術不易於是太祖兼用之故李漢超屯闗南馬仁瑀守瀛州韓令坤鎭常山賀惟忠守易州何繼筠領棣州以防北冦郭進控西山武守琪戍晉州李謙溥守温州李繼勲鎭昭義以禦太原趙賛屯延州姚内斌守慶州董遵誨守環州馮繼業守靈武以備西戎如姚内斌董遵誨之徒所領不過五六千人而威名皆行乎夷狄當此之時元年誅李重進收揚州十一月誅李筠收潞州四年收湖南六年收蜀十三年收南越十七年定江表之北内則呉越閩海嵗奉貢賦外則交州髙麗請吏向化而契丹修好之使數至於闕庭拱揖指麾而天下一定不知封疆之憂盖太祖用將之術如此故養士少而蓄材多操術簡而收功博也其次如漢之光武亦善御將闗輔之役不取諸將之健鬬而獨遣馮異潁川之冦以冦恂之憂國而獨委冦恂荆州之事以呉漢之不習舟師而獨任岑彭皆素知才畧而明於授任而又能感之以恩假之以權結之以心觀賈復病傷之時帝撫然大驚曰果然失吾名將聞其婦有孕生女邪我男娶之生男邪我女嫁之一時恩意眞足以感動英豪之心至祭遵以軍法殺舍中兒而謂諸將曰當避祭遵舍中兒犯法尚殺之必不私諸卿軍旅安得而不警及賈復之於冦恂有部將誅戮之恥則又為之致禮極歡以消其怒曰天下未定兩虎安得私鬬今日朕分之遂戮力同心以濟天下之難帝之御將亦多術矣任將任將貴乎專古者六軍之制軍將皆命卿無事則將歸卿列有事則諸卿皆將宣王之時命召虎以平淮夷而王心乂寧一切委之而無疑命程伯休父以省徐士而徐方為之震驚而不可抗亦可見任將之意趙以李牧為守邊將市租皆歸募兵而軍一决於外盖自閫以外將軍制之古之道也髙祖初興築壇拜信以亡虜之人即以數十萬付之可謂專矣魏豹之叛髙祖枚數三將謂其不足以當韓信文帝戒景帝即有緩急周亞夫可任其後七國之難亞夫獨乗傳㑹兵以抗呉楚之鋒武帝之興銳意征伐而任將尤所致意李廣之斬霸陵尉帝非惟不加之罰且詔褒嘉衛青霍去病皆選將兵而獨付之是以鴈門雲中之師出即有功隴西祁連之役捕虜之功獨多於諸將光武中興任用諸將闗輔之役不取諸將之健鬬而獨遣馮異潁川之冦以冦恂之憂國獨委冦恂荆門之事以呉漢不習舟師而獨任岑彭祭遵以軍法殺舍中兒而反戒諸將以為當避祭遵所以伸其威也唐太宗用李世勣於青州凡十六年而竟獲長城之固李靖之擒蕭銑滅突厥破谷渾人皆知其所向有功而不知太宗之任勣爲甚專也嘗觀詔靖之言曰兵事節度皆以付公吾不從中治也肅宗之時九節度之師不相統属而不免相州之敗憲宗用髙崇文以討劉闢杜黄裳請不置監軍以一其權故不淹時而闢以平藝祖開創大業委任邊將闗市之租悉以賜予徃徃不問其出入門校之訟主將則遣使歸之曹彬出征授之以劒副將而下有不用命者得以行法焉郭進之在西山葢二十年李漢超在闗西葢十七年其他何繼筠之屯棣州董遵誨之屯通逺軍皆不下十餘年兵食此專論楚漢昔嘗復熟遷固二書至於楚漢勝敗所由分之際未嘗不為之感歎也葢國之所恃以為威者雖本於兵而兵之所恃以為强者實資於食觀髙帝自蜀漢而東也未遑他慮而租食之任一付於股肱之佐自闗中而東也初無他䇿而轉漕之計必委之輔佐之臣及﨑嶇於滎陽成臯間必據敖倉之粟以示形制之勢則髙帝之心固無一日而不在於食也及髙祖欲屯鞏洛以拒楚羣臣深以為敖倉之不可棄隋何之說九江則曰下蜀漢之粟酈生之說齊王則又曰蜀漢之粟萬船而下是乃知議論之臣亦無一日不在乎食也至於彭越徃來河上必以絶楚之糧為急韓信之定燕擊齊亦以絕楚之糧道為請其他如盧綰劉賈之時出入楚地專以焚燒積聚為事是外而奔走之臣惟恐敵人之或豐乎食也夫當存亡呼吸之間而運籌决勝之䇿惟以兵食為成敗利鈍之幾此漢之所以得而楚之所以失項氏曽不悟也既得敖倉反視以為無用之具棄置不守乃用以資漢徒使老弱轉糧於千里之外而識事者固已預計楚兵之不日疲也其後太公之歸正以食少洪溝之約亦以食盡勢窮力竭不復自振而卒使垓下之敗夫觀楚漢之成敗在兵食之多寡則後之議用兵者無亦思所以制勝之術可乎兵法古兵法之存於漢者百八十二家張良韓信則取要用者定為三十五家中更散逸而其後任宏校理兵書論次為四種而權謀形勢隂陽技巧之别猶有五十三家則漢之兵法亦云備矣唐李靖謂張良所學者太公六韜三畧韓信所學者穰苴孫武葢亦因其圮上所傳與夫背水之陣以證之也然考之藝文志上自神農黄帝風后力牧下至公孫鞅范蠡大夫種孫呉之書無不載為兵家而獨以六韜列之於儒曰周史之六㢰六篇是也所謂太公謀八十一篇言七十一篇兵八十五篇則列之於道家者流是何黄石之所授於留侯者特不見錄以爲兵書邪蓋太公之韜畧非若孫吳穰苴詭詐以求勝也吾觀漢家以孫吳六十四陣爲都𨽻之法而又教其將學孫呉兵法則是當時急於趍利争為詭詐權謀以速勝也太公之韜畧固視以為迂緩而不之好君臣將相浸不之省歴世久逺而子房之所學者胥為無用蓋無怪乎不錄於兵而錄於儒與道也至司馬穰苴兵法乃齊威王使大夫追論古司馬兵法而附穰苴於其中號曰司馬穰苴法前漢藝文志軍禮司馬法百五十五篇載在禮書之中而唐書藝文志載司馬穰苴法三卷在兵法之中皮日休讀司馬法曰古之取天下也以民心今之取天下也以民命漢魏尚權取赤子於利刃之下爭寸地於百戰之内是編之為術愈精而殺人愈多此所以嘆後世之兵法也自今觀之兵法以韜名者如太公之韜梁元帝玉韜劉裕金韜皆韜也以法名者如田穰苴司馬法魏武續孫子兵法伍子胥兵法交将軍射法皆法也有以畧名者如黄石公三畧魏文帝兵書要畧景祐神武秘畧慶厯邇英續經武武畧熈寧經武要畧皆畧也有以要名者魏武兵書接要武徳圖五兵八陣法要皆要也有名之以鑑者李靖六陣鑑李淳風垂鑑皆鑑也有名以孫子者則又有魏武注孫子杜牧注孫子焉有名以呉子者則又有賈詡注呉子焉其他如孔衡兵林司馬彪兵記呉鐃之兵家正史李允弼之統軍盧綰秘䇿李徳裕西南備邊錄郭元振定逺安邊䇿劉秩止戈記皆兵法也然在用之如何耳趙括善讀父書而不能免長平之敗馬謖善論兵法而不免街亭之敗房琯學春秋車戰法而卒敗於陳濤李元平好論兵而竟辱於降敵霍去病不學古兵法而自顧方畧如何山濤不學孫呉而暗與之合虞詡不從兵法日行二百里變孫臏減竈法而乃為之増竈張廵用兵不依古法以謂吾使兵識將意將識士情而已是又不專在法也惟韓淮隂得於兵法而有以致背水之勝李衛公不廢兵法而有以成定襄之功此可謂善用兵法者子房受書圮上老人卒以一篇為沛公謀臣其發䇿建議初無一言及於太公兵法借箸之謀踞鞍之問皆漢存亡之决秦宫數語無不剴切帝心而卒濟大業八難之說至論武王造周之業皆武成之設施也急趣丞相定功行封葢異日治齊尊賢尚功之意也四皓之來盖西伯善養老天下之父歸之之意也此皆在兵法中後賢莫能察而獨髙祖信用於當時此子房所以善談兵者歟史家謂子房以太公兵法說沛公而不知子房未嘗以兵法為言也晁錯以儒者上兵書魏相以儒者識兵畧士大夫指司馬孫子兵法以為談者葢不一數孰有如子房善藏其用哉抑又有攷焉黄帝始置八陣法其後唐獨孤及有風后八陣圖諸葛亮造其圖於魚腹平沙壘石為八行後人皆莫能識韓擒虎深明其法以授李靖乃造六花陣以變九軍之法大抵八陣者即九軍九軍者方陣也六花陣即七軍七軍者員陣也七軍加前後二軍即為九也宋置殿前馬軍歩軍三帥即中軍前後軍之别名而馬步軍都虞侯是為二虞侯天武捧日龍神衛四廂是為四廂軍焉其制葢原於此不獨此焉在成周則有大司馬陣法在春秋時鄭則有魚麗陣宋則有鵝陣鶴陣越有牝牡陣晉毁車為行五乗為三五為五陣以相離兩於前伍於後專為右角參為左角偏為前拒此又其歩軍之法漢都𨽻之法用孫呉六十四陣漢垓下則又有陣法史記載髙祖與諸侯共擊楚軍與項羽决勝垓下淮隂侯將三十萬兵當之孔將軍居左賈將軍居右皇帝在後項羽之卒可十萬淮隂先合不利却孔將軍賈將軍縱楚兵不利淮隂復乗之垓下大敗此馬隆所謂魯公不識者也兵器周官司兵掌五兵五盾各辦其物與其等以待軍事五兵戈殳㦸酋矛夷矛也五盾櫓盾干盾之属也司弓矢掌六弓四弩八矢之法王弓弧弓以授射甲革椹質者夾弓庾弓以授射豻侯鳥獸者唐弓大弓以授學射者使者勞者此六弓之名也凡弩夾庾利攻守唐太利車戰野戰此四弩之名也凡矢枉矢絜矢利火射用諸守城車戰殺矢鍭矢用諸近射田獵矰矢茀矢用諸弋射恒矢痺矢用諸散射此八矢之名也函人為甲犀角七属兕甲六属合甲五属此又甲之名也漢自郡國至於京師皆有武備在郡國則有庫兵或置工官庫兵以等賦為之而工官與鐵官同置於産鐵之郡在京師則有武庫令掌於中尉而天子又有若盧考工室若盧以藏兵器考工室以主作器械一以少府主之武庫則以大司農錢為之也故毋將隆以為武庫兵器天下公用國家備繕治造作皆度大司農錢邊吏職在距冦者得賜武庫兵其或邊兵不足則亦出武庫工官兵器以贍之此武庫之制也以史考之公孫宏禁兵不得挾弓弩與漢置强弩將軍之號則知漢之兵器率以弩為尚也故攻戰圍守凡將帥所用一皆以弩為急李廣之擊匈奴以大黄射其禆將李陵之歩戰亦以連弩射退單于叚㑹宗入烏孫選兵三十弩而陳湯之圍郅支亦以戰弩是知漢以後之用兵無急於弩而亦當時之所尚也不然晁錯論匈奴中國之長技何以云勁弩長㦸匈奴之弓不能敵邪諸葛亮傳亮性長於巧思損益連弩皆出於其意晉馬隆募勇士腰引弩三十六鈞者得三千五百人討凉州賊杜牧之言於李徳裕請用宣潤弩手二千擋澤潞皇祐中有衝陣無敵流星弩熈寧中神臂弓又有狼牙箭鴨嘴箭皆兵器也軍㨗自古出師而有功者皆可攷焉漢貳師之斬大宛鄭吉之破車師傅介子之斬樓蘭馮奉世之斬渉車陳湯之斬郅支定軍師而通于闐者竇固也斬虜使於鄯善而威鎭西域者班超也吕蒙斬闗羽以定荆州而其言曰羽討樊而多備兵必恐蒙圖其後也蒙以治病還建鄴羽必撤備兵盡赴襄陽大軍浮江晝夜馳上襲其空虚則南郡可下而羽可擒也王濬羊祐大舉伐呉杜預與諸軍議今兵威已振譬如破竹數節之後皆迎刃而解遂指授羣帥方畧徑造建康祖逖之復河朔也中流擊楫而誓遂屯淮隂進克譙城至雍邱黄河以南盡為晉土桓温之入闗洛也發江陵水軍自襄陽而入闗中遂至霸上人民爭持牛酒迎勞謝石之破苻堅也謝𤣥為前鋒𤣥先遣劉牢之五千人直指洛澗進屯夀陽臨淝水𤣥等以精兵决戰堅兵奔潰聞風聲鶴唳以為王師之至隋賀若弼韓擒虎之平陳也若弼攻京口擒虎濟采石南北並進而陳人皆遁至於唐之李靖之破頡利以三千蹀血虜庭遂取定襄太宗以為足以澡渭水之恥者李靖也李靖之破吐谷渾也雖老尚堪一行决䇿深入遂踰積石山大戰數十而降其國人者亦李靖也李勣之俘髙麗也率總管兵以伐髙麗部其地為都督者李勣也李勣之破薛延陀也與騎卒徑造白道而殘卒遂奔漢北者亦李勣也李孝恭之破蕭銑也修戰艦於江中而後勝也侯君集之平髙昌率五總管之兵而後討也阿史那社爾之俘龜兹也在於貞觀之間蘇定方之俘百濟則在髙宗之世劉仁軌則有破新羅之功薛訥則有破吐蕃之功薛仁貴則有破突厥之功在肅宗時安慶緒之難則有郭子儀復長安克東都在廣徳中吐蕃之難則有郭子儀收長安復京師朱泚之亂而克復京師者李晟也劉闢之叛而遂取成都以擒闢者髙崇文也呉元濟之亂而請身督戰誓不與賊偕生卒使李愬克縳元濟者裴度也軍旅古者以井田制軍自五人為伍積而為兩為卒自五卒為旅積而為師為軍而天下之軍興矣連帥比年以簡卒卒正二年以簡徒羣牧五載大簡車徒則選擇為有時春振旅以蒐夏苃舍以苗秋治兵以獮冬大閱以狩則練習為有時任地事以令貢賦則農時不違因農隙以講武事則武備無缺此兵制之所以備於周也自管仲變周兵為内政制國為二十一鄉商之鄉六而士之鄉十五故有軌里連鄉之制鄙為五属立五大夫使各涖一属之政故有邑卒鄉縣属之制國中之士為兵鄙野之民為農兵不諳耒耜之勤而農不識干戈之事自是先王寓兵於農之意冺矣晉作州兵魯作兵甲戰國時地方二千里帶甲數十萬臨淄之中七萬户不下户三男子卒固以二十一萬大抵戰國之制勝甲以上籍為民兵而民力困矣漢無計口授田之法故賦兵以丁而不以田自其二十三為正卒五十六而退一嵗為衛士一嵗為材官置材官於都國而京師則有南北軍南軍則光祿勲衛尉掌之北軍則中尉掌之其地巴蜀三河潁川則多材官隴西天水安定則多騎士西北之地則多輕車故闗東上郡北地皆有車東南之地多樓船故博昌潯陽㑹稽皆有船以至臨淄之弩手荆楚之劒客各惟其土之所宜而習熟之一旦有事則以羽檄召天下兵而無有不集事者以至精兵郡國人主親為擇將相代地吾所急委陳豨淮陽兵勁實擢灌夫嵗及立秋則嚴兵法之肄都試而不諧郡所者則必免此兵制之得也若夫以軍擊敵預郡國材官之數者發之可也奈何吏無告敕父母有市籍而一切征行甚者列侯封君吏二千石有所不免得無困於征行者乎戍邊備冦如上郡北地隴西之兵調之可也奈何淮南之於漢汝南之於金城相去幾何而一切調發得無困於調發之勞乎自中興之後兵旅尤弛都試之法不可罷者罷之三校尉之官不可廢者廢之至於郡兵不練而專倚南北二軍以集事士大夫不閑武事至使邊將以入朝此其所以失也唐因西魏周隋府兵之制而益修之二十為兵六十而免而民無常兵之勞三時耕稼一時治兵而兵無常聚之患置府六百三十四而居闗中者二百六十有一所以明輕重之勢兵散於府將歸於朝所以杜禍亂之原至於器甲則出於兵衣糧則取辦於民國無發兵之資折衝農隙教習戰法訓練不精則罪至折衝國家有所召發則下符契於郡府參驗乃行故李泌曰貞觀中北滅突厥延陀西取西域皆府兵也杜牧作十六衛自貞觀至於開元百三十年戎臣兵伍未始有變者此也自貞觀而後番役更代多不以時侍官之重乃先役是以張說募騎兵以為長從戍衛而番上之制已廢李林甫募長征兵以息山東之戍而邊戍之制又廢自是兵農既分於是有養兵之費至其甚也天寳以後騎兵之法又稍變廢折衝諸府至無兵可交而方鎮之兵盛矣諸道節度盡用胡人而精兵咸聚西北而天下之勢偏重及其末也天子亦自置兵於京師號曰禁軍而天下治亂之勢遂係於兵矣藝祖立國之初制兵二十萬京師十萬以制外變外郡十萬足以制内患而又嚴階級之法置更戍之令斬三班殿直以懲其妄訴之罪廢雄武軍以警其侵畧之擾閱武便殿以精其藝募習水戰以習其能此宋御兵之法如此也車戰古之用兵也險野人為主易野車為主則險野非不用車而主於人易野非不用人而主於車車之於戰動則足以衝突止則足以營衛將卒有所庇兵械衣裘有所資詩曰君子所依小人所腓則車之為利大矣昔周伐鄭為魚麗之陣先偏後伍伍承彌縫邲之戰楚君之戎分為二廣廣有一卒卒偏之兩楚巫臣使於呉以兩之一卒適呉舎偏兩之一焉攷之周禮五伍為兩四兩為卒司馬法二十五人為兩百人為卒卒兩則人也偏則車也杜預以十五乗為大偏九乗為小偏其尤大者又有二十五乗之偏則周魚麗之偏二十五乗之偏也楚二廣之偏十五乗之偏也巫臣所舎之偏九乗之偏也先偏後伍伍從其偏也卒偏之兩兩從其偏也先其車足以當敵後其人足以待變則古者車戰之法畧可知矣兵之道惟車有節諸侯節制不謹遂以逐利於原隰草莽之間於是有還濘而止注水而止徃徃車戰由此浸廢趙武靈王大變中國之法而用胡騎然六國之時亦多用車漢夏侯嬰傳破李由軍雍邱以兵車趣攻從擊章邯東河以兵車疾戰擊秦軍洛陽東以兵車趍攻戰此楚漢之際用車畧可見者也衛青擊匈奴以武剛車自環為營李陵至浚稽山以大車為營引士出營為陣光武造樓櫓戰車置塞上以拒匈奴孫呉之陣猶有革車之陣見於周禮車僕之注下及三國諸葛孔明用車戰亮之後其法不傳惟晉馬隆常作扁箱車以討鮮卑而凉州以平馬隆之後又莫之用惟宋武帝以車戰得志於天下武帝之後又莫之用惟宇文泰髙歡之徒又嘗畧用之唐太宗與李衛公問對辨論車甚詳而未嘗用𤣥宗實錄云哥舒翰為狻猊車或塞險道以遏奔衝新唐書云馬遂為狻猊車威振北方房次律用之而遂有陳濤斜之敗古者車冐以革而琯用木焉幾何而車不見焚古者駕以駟而琯用牛焉幾何而牛不髀慄古者射御必精而琯則用劉秩将市人焉幾何其不一敗而塗地或者謂晉人以什共車必克矣琯以車戰取敗遂以用車不若用人與騎之愈是不知晉人之克非什之利用什之幸也房琯之敗非車之不利用兵之罪也古者教民以射御為藝君子以射御為能故君子曰吾執御乎執射乎古人相率以射御如此竊嘗誦詩見其材之良焉御之精焉驂服之漸習焉然後知斯民之習於車果非一日之可能也三代各有所尚惟周人獨尚輿故一器而兼衆才者車為多而有輪有輻以為之行有箱有較以為之安有軸有轂以為之利有矛有殳以為之建有旂有旐以為之識而其詩曰小戎俴收五楘梁輈四牡騤騤旟旐有翩言其材之美也當時士無貴賤莫不安於乗馳便於射御未嘗有韈而鐙鞍而騎者其詩曰叔善射忌又良馭忌不失其馳舍矢如破言其御之精也人安於上輿載於下轅乗承於載馬順夫轅施之行陣之間則地輕馬馬輕車車輕人人輕戰而其詩曰執轡如組兩驂如舞蕭蕭馬鳴悠悠斾旌言其驂服之漸習也舟戰周禮作舟以行水月令命舟牧覆舟太公三韜有水戰周制兵出於井馬出於丘車出於甸舟師未詳其制焉春秋之時秦穆伐晉濟河焚舟是秦用舟也楚敗晉于邲晉中軍下軍爭舟師以伐呉是晉楚之用舟也楚敗呉于長岸獲其乗舟餘皇楚囊瓦伐呉師于豫章呉人見舟于豫章而請師於巢楚圍巢克之是呉之用舟也越之報呉凡四萬七千人而習流定一千是越之用舟也漢地理志廬江有船官攷諸傳則潯陽有船博昌有船桂陽有船豫章零陵皆有船韓信之擊魏陳兵於臨晉而以木罌渡軍襲安邑東甌告急遣嚴助将㑹稽兵浮海救之中興材官騎士既罷而三郡棹卒四部黄頭班班可見此兩漢之用舟也然歴代舟師有用之於淮者有用之於江者有用之於蜀者有用之於河者有用之於海者梁韋叡伐魏乃装大舟以廬江水軍攻魏元英於邵陽洲大潰魏軍此用之於淮也曹操與周瑜遇於赤壁瑜乃取蒙衝鬬艦十艘載荻柴以焚之魏兵由是大敗晉武伐呉王濬作大船連舫以木為城起樓櫓畫鷁首舟楫之盛自古未有此用之於江者也建武岑彭伐蜀公孫述絶水道以拒漢兵彭乃装直進樓船冐突露橈皆船名數千艘逆流而上直衝浮橋蜀兵大敗此用之於蜀者也呉蜀長江之險全藉舟楫而舟師尚用於南方晉桓温北伐勒舟師以逼許洛劉裕伐慕容超討姚洪亦浮淮入泗自河浮渭南方之長技始用於此宋武北伐王鎭惡率水軍自河入渭所乗皆蒙衝小艦泝渭而進北土素無舟楫莫不驚以為神遂克長安此用之於河者也春秋時呉欲自海入齊不克而還則猶未習海道之戰呉晉爭長黄池越范蠡沿海泝淮以絶呉隋伐髙麗率江淮水軍舳艫百里浮海先進唐太宗用戰艦五百艘自萊州越平壤以伐髙麗葢又用於鯨波之間矣然唐水戰之利不載於兵志按漢武帝以樓船士二十餘萬擊粤元狩三年發謫吏穿昆明池以習水戰亦有樓船之制唐獨不講何哉然孝恭破蕭銑以荆襄總管兼統水陸嗣曹王臯討李希烈以江漢之兵大治戰艦亦必有法矣兵志不述焉何哉宋朝建隆有數船池開寳以為講武池雍熈習水戰於水心殿祥符置神衛水軍今之所守沿江屯重兵沿淮列城屯皆得控要害而據之明之定海平江之許浦皆駐舟師通之料角平江之與江隂皆有屯戍是今守海道之說也國家江海要害制置水軍皆習水戰戰又多造舟艦精緻堅穏夫防淮及江不足為今日道自淮及泗則汴水湮塞已久獨不可自通泰入海𢷬登萊髙宻以揺山東乎徃者敵兵失利海上之㨗與有力焉馬政成周之時設校人之官非徒具六馬之數也辨其六馬之属凡軍事則物馬而頒之設庾人之官非徒具十二閑之數也教以阜馬佚特歛駣攻駒則其教之也為有素矣惟其教之也為有素則用之也為適宜宣王中興此意猶有存者比物四驪閑之維則閑習為如何兩驂不倚不失其馳則其馳御者為如何中興之功或者其有得於此春秋以來秦晉交戰於韓原晉馬旋濘而止冀之北士馬之所生晉固非少於馬者而乃不能以求勝及晉楚之戰于邲楚許叔御樂田以致晉師執轡掉鞅動中程式晉莫能當其鋒用能車馳卒奔以乗晉師荆楚之地固非馬之所産而獲其用如此觀韓原之戰則知馬不貴於徒盛觀邲之戰則知馬不可以不習漢氏之馬太僕之属内則五令外則有西北邊有三十六苑至武帝則廐馬葢四十萬矣衛霍之師發十萬騎而私從者又十四萬戰争之餘入塞者曽不滿三萬則其馬數雖多而習於用者或少而未精歟不然自兩將出塞之後史何以言其竟以馬少不伐胡邪中興之後益務省約六廐之存者一耳三十六苑之存者流馬耳何望其教習邪葢至於唐隴右三牧八坊四十八監之制可謂養之得其地矣自張萬嵗之司羣牧至於王毛仲之領閑廐可謂制之得其人矣開元之中馬至四十餘萬馬色則為羣望之如雲錦唐馬之盛莫盛於此然祿山之變馬至不能授甲雖多亦奚以為哉宋朝自咸平置羣牧司景徳置羣牧使所以重其事也牧馬之盛至二十萬非徒盛也觀王明羣牧故事一書則見其生息之方訓習之制莫不咸載是葢知馬政之所先者自熈寧廢牧馬之制因而賦馬於民故其制始紊於今日東南之馬皆取於西北此茶之所以設也互市之廢嵗不下數百萬舉西路摘山之餘僅足以當嵗市之費所入之綱凡百五十有一而一綱之費計為馬五十是嵗致馬八千矣存者既多來者未已則何患乎馬之不多然馬之不多非所患不習深可憂此愚之所以拳拳於今日也又論周官牧人之職掌主馬之政辨六馬之属種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物此馬之種為不同也凡頒良馬而養乗之乗馬一師四圉三乗為皁皁一趣馬三皁為繫繫一馭夫六繫為廐廐一僕夫六廐成校校有左右駑馬三良馬之數麗馬一圉八麗一師八師一趣馬八趣馬一馭夫此養馬之政為有等也天子十有二閑馬六種邦國六閑馬四種此養馬之制為有别也其他所謂馬量三物則属之馬質掌其牧地則属之牧師掌十有二閑之政教以阜馬則職之庾人此周之馬官也若夫卿師之職曰以國比之法以時稽其馬牛之物辨其可任者縣師之職曰若将有軍旅㑹同田役之戒則受法於司馬以作其衆庶及馬牛車輦此皆馬之在於民者也至春秋時魯新延廐而傳曰凡馬日中而出日晡而入此馬政之尚有於古也晉惠公韓原之戰乗鄭小駟慶鄭曰古者大事必乗其産生其水土而知其人心安其教訓而服習其道惠公不聽戎馬還濘而止此其不合於古者也晉悼公使程鄭為乗馬御六騶属焉晉有乗馬御之官宋有校正之官此掌馬之可攷者也晉有屈産之乗呉伐楚取駕之良馬也此馬名之可攷者也漢之三十六苑分布於西北二邊豢養教習擇取其良以給天子之六廐故北地西河遼東諸郡皆有牧師而太原亦有家馬官自天子六廐以供乗輿餘悉養之邊郡武帝将有事於征伐益盛養馬以西河上郡為萬騎太守而馬政始兼掌於郡二千石矣蓄積廐馬有四十萬自遣衛霍之師數十萬騎及私從馬十四萬窮追匈奴出塞者十餘萬入塞者不滿三萬故自兩府出塞之外竟以馬少久不禦敵於是令民得蓄邊縣官假馬毋限以三嵗而歸息什一以除告緡之令然終不能補車騎之乏上乃籍吏民馬而課息及於天下矣夫漢之馬政自其分牧於邊苑而蓄養之地得其宜寄牧於邊民而歸息之制為不廹至於籍取吏民馬以補車騎行此下䇿而其計出於無端非惟民擾且不足為軍用也至於後漢馬政始廢舊有六廐而中興省約之後止存一廐舊有三十六苑而中興省約之後止有漢陽流馬一苑則與西漢大不同矣唐初得突厥馬二千疋及得隋馬三千於赤岸澤徙之隴右監牧之制遂始於此其官領於太僕初用張萬嵗領郡牧自貞觀至麟徳四十年間馬四十餘萬置八坊於岐豳涇寧之間募民耕八坊之田以給芻稼八坊之馬為四十八監時天下以一縑易一馬可見馬之盛也自萬嵗失職馬政頗廢開元初王毛仲領内外閑廐使稍復舊始二十四萬至十三萬乃四十三萬天寳以後諸軍戰馬動以萬計議者謂秦漢以來戰馬最盛故范祖禹唐鑑曰唐之圉馬惟一能臣而掌之不數十年而其多過於二百倍曰此任職之專也傳曰冀之北土為馬所生夫馬必生於邊陲而養於苦寒之地稍遷之中國則莫能壯也唐養馬於隴右非獨就其水草之美葢置之西戎之地必求其健也凡欲制事得其人而善其法豈有不盛者乎宋初嵗遣市馬於邊自是閑廐始充太宗平太原之後得汾晉燕薊之馬分置諸州咸平三年置羣牧司總以内外馬政其後嵗遣判官一人廵行諸監景徳中羣牧司判官王明上羣牧故事六卷採摭舊聞次其類例上曰上古下暨皇家生息之耗登蓄孳之訓至於九龍十驥之名稱東門西門之骨法無不具焉亦可見其盡心於職矣雖然自穆王廵狩而八駿之名顯曰赤驥曰渠黄曰驊騮曰琭耳之類在李觀則有序在白居易則有歌此其名之彰彰者也曰專兵曰路軫曰騎馬曰駿馬武帝又改門曰銅馬此漢太僕四令丞之名也曰龍馬曰閑駒曰櫜泉曰騊駼曰承華此漢太僕五監之名也曰未央曰承華曰騊駼曰騎馬曰路軫曰天廐此漢六廐之名也曰汗血曰天馬曰渥洼曰余吾此武帝所得於西域之名也曰飛黄曰吉良曰龍媒曰騊駼曰駃騠曰天苑此唐左右六閑之名也曰祥麟曰鳳苑此唐二廐之名也曰保樂曰甘露曰南晉曰北晉曰岐陽曰太平曰宜祿曰定足此唐八坊之名也曰騰霜曰皎雪曰凝露曰決波曰飛霞曰發電曰流金曰祥麟曰奔蛇此貞觀間骨利幹十驥之名也憲宗伐蔡市馬於河西故有龍波監之名穆宗牧馬於銀州故有銀州監之名此皆不可不知也凡兵之動莫善於馬之良六月之詩四牡騤騤二章曰比物四驪閑之維則三章曰四牡脩廣其大有顒五章曰四牡既佶既佶且閑馭夷狄昆夷玁狁之患外既有以示薄伐之威而采薇之戍役内又有以嚴守禦之備一月三㨗無非所謂征伐也薄言還歸則終於仁愛而已矣葢肆不殄厥愠亦不隕厥問柞棫拔矣行道兊矣此聖人待夷狄之常法也宣王中興南征北伐人知其攘夷却狄而不知玁狁期於薄伐猶文武之䇿荆蠻至於來威宣王曷嘗拒其來哉修車馬備器械要亦盡其在我者耳豈非夷狄之上䇿乎恢復東漢之初羣盗竊據而天下之勢遂紛紛而不可禁樊崇摽掠於青徐赤眉擅竊於三輔王郎之徒復盤錯於邯鄲幽冀之間當是之時漢之遺緒葢凛凛乎可懼矣惟光武屹然自奮於南陽宛葉之中獨能恢復先漢之舊力倡大義以動漢民謳吟之思故尋邑之師震讋退縮而不敢亢雖以百萬之衆特剪除於昆陽一戰之頃而天下之勢自是而立其後北徙渡河而豪傑之士至杖䇿而歸附出師西陜而三輔之民至擕負以相属河西奉命不勞寸兵而隴蜀之役皆次第而告平此豈特其廟謀雄斷要之以寡而擊衆正以其義在人心不可禦也方呉氏以曹操不正而自立於江東則所與為仇者實操也為呉之計者要力主大義正名討賊以共扶漢業於傾覆之餘則芍陂之地操必不敢入淮而為屯田之計也濡須之地操必不敢渡兵而為臨江之計也龍舒之地操必不大開稻田而為逼呉之謀也奈何孫權立國之初僅為保守江東之計而無復規恢中土之畧故合肥之役一為張遼困敗之後遂歛袵而不敢與之爭顧反委質於魏而務為自全之計雖周瑜魯肅吕蒙陸遜之徒相為䇿畫不過為呉計耳故赤壁之戰在公瑾雖知操為漢賊而卒不能為漢以討賊此呉之所以失也不然呉豈特自全於江東而已哉東晉自劉石之難而自立於江左則所與為仇者實在劉石也為晉之計正當出於救難自誓復仇以明不共戴天之義則祖逖進兵必不肯牽荆而使之自沮也周嵩復仇之請必不肯擯斥而使之不遇也五胡亂華之禍必不肯迭起於中夏而不知止也奈何元帝立國之初止為植立江左之規而無復恢復中華之意故刻日北征旋即返斾而遂歸罪於漕運之臣加以王導畏法不能酬其克復神州之語故晉之規模遂止於守而不能以進雖庾亮庾翼褚裒殷浩之徒間嘗出師而終無補於晉耳淝水之勝亦出於謝安保淮之計而不能乗其進取之幾此晉之所以失也不然晉豈特茍安於江左而已哉劉宋之北伐雖嘗有功而終不能以成其功蕭梁之北伐雖嘗得地而不能守其地方劉裕以來滅南燕取後秦席卷闗輔之險固已有混一區宇之勢矣然其心之所向已不能揜於夏連勃勃之言則其義已不直於人心加以文帝之志惟在河南而無復幽冀之畧故到彦之統帥舟師徑取河洛司兖之地嘗一平矣未幾而復失柳元景嘗以襄陽之師克復潼闗闗輔之地嘗一平矣未幾而復失至魏人𤓰歩之師徒追咎於檀道濟之不存而不知其所失者盡在我也梁自蕭衍之初義陽之師鍾離之圍固以不振而漢中劒閣之險皆相隨而盡入於魏正宜奮張英武大正討虜之䇿以强中國之勢帝也志意凋落而無規恢之謀故蕭宏之師雖大舉以伐魏然不能因梁城之㨗以成深入之功卒以懦怯而自退韋叡之才雖屢出以勝魏然不能因魏師之既退以復三闗之地卒因詔命而論罷兵其後與魏通和而夷夏之辨混然無别此所以為梁之失也屯田屯田之法在漢文帝時則有北邊屯田之言在武帝時則有西域屯田之䇿在昭帝則有隴右屯田之法在元帝則有南邊屯田之議至於李絳請開營田省度支漕運李泌欲以屯田易府兵之法端拱中何承矩屯於河北而募耕隙地障水為隄以遏冦衝之奔軼敵窺麟州為河東患龎公請募耕麟州者復租稅十五年元昊擾邊范文正公上屯田之䇿以謂沿邊兵寨可置屯田據畆定課兵獲餘羨皆屯田之䇿也以史考之漢自張騫通西域李廣利征伐之後初置校尉屯田渠犂而輪䑓渠犂皆有閒卒至宣帝鄭吉田渠犂以積榖遂破車師此屯田於西域者也趙充國擊先零謂擊虜以殄滅為期遂上奏願罷騎兵屯田陳十二利此屯田於金城西羗者也建安中劉馥鎭合肥廣屯田修芍陂茹陂七門呉塘以溉稻田而公私有積鄧艾自鍾離而南積石以西五里而置一營淮南皆相連接自夀春而至京師農官兵田雞犬之聲阡陌相属毎軍興則汎舟而下達於江淮資有餘而無水害此屯田於淮者也羊祜鎮襄陽呉石城守去襄陽七百餘里毎為邊患祜乃以詭計令呉罷守於是戍邏減分以墾田八百餘頃大獲其利方祐之始至也軍無百日之糧季年有十年之積此屯田於襄陽者也晉元帝時應詹上表曰江西良田曠廢未久火耕水耨為功差易宜簡流人興復農官功勞報賞皆如魏氏故事此屯田於江西者也魏氏經營四方棗祗建置屯田募百姓屯許下得榖百萬斛郡國列置田官數年之間所在積粟倉庫皆滿郭子儀以河中軍食乏乃自耕百畆將校以是為差於是士卒皆不勸而耕河中野無曠土軍有餘糧此屯田河中者也唐李瀚有嘉興屯田紀績頌此又屯田於嘉興者也雖然有民屯有兵屯漢之屯田以兵唐之營田以民漢自通西域始以校尉將卒屯田渠犁趙充國既罷騎兵所留盖弛刑應募及淮南汝陽歩兵唐因軍府以置營田天下之屯凡九百九十有三或属司農或𨽻苑内或分請州軍鎮或以御史莅輸或有警則以兵千人助穫地之良薄與嵗之豐約等而三之屯官助功則眡其等為上下不特此也漢張掖之屯臨羗之屯許下之屯陳蔡之屯鄧艾屯以兵也東晉用三呉之流人墾江西之曠土後魏籍州郡戸十之一以為屯田唐李絳請營田於振武王起營田於靈武文宗時商侑以流民營田於義昌屯以民也然屯田之法非内外得人則不可行趙充國議屯田魏相實主之韓重華之屯田李絳實主之此内得人以賛其議者也婁師徳屯田豊州身衣皮袴以率先士卒諸葛亮屯田渭濵使兵雜於居民之間百姓安堵軍無私焉此外得人以督其耕者也羣書考索後集巻五十
