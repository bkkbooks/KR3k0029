body:
  text: 羣書考索後集卷三十二宋章如愚編士門選舉教養之法舜典曰帝曰夔命汝典樂教胄子王制曰春秋教以禮樂冬夏教以詩書王太子王子羣后之太子卿大夫元士之適子皆造焉文王世子曰凡學世子及學士必時春夏學干戈秋冬學羽籥小樂正學干大胥贊之籥師學戈籥師丞贊之胥鼓南春誦夏弦太師詔之瞽宗秋學禮執禮者詔之冬讀書典書者詔之燕義曰庶子官職諸侯卿大夫士之庶子之卒掌其戒令與其教治國有大事則率國子而致于太子唯所用之若有甲兵之事則授之以車甲合其卒伍置其有司以軍法治之司馬弗正凡國之政事國子存遊卒使之修德學道周禮師氏掌以三德教國子至德敏德孝德教三行孝行友行順行掌國中失之事以教國子弟凡國之貴遊子弟學焉保氏養國子以道乃教之六儀祭祀賓客朝廷喪紀軍旅車馬大司樂掌成均之法以治建國之學政而合國之子弟焉凡有道有德者使教焉以樂德教國子中和祗庸孝友以樂語教國子興道諷誦言語以樂舞教國子雲門大卷大咸大㲈大夏大濩大武樂師掌教國子小舞帗舞羽舞皇舞旄舞干舞人舞及徹帥學士而歌徹此教國子之法大司徒正月之吉始和乃縣教象之法於象魏使萬民觀教象挾日而斂之乃施教法於邦國都鄙使各以教其所治民因此五物者民之常而施十有二教焉祀禮陽禮陰禮樂禮儀俗刑誓度世事賢庸以鄉三物教萬民而賓興之一曰六德知仁聖義忠和二曰六行孝友睦姻任恤三曰六藝禮樂射御書數以鄉八刑糾萬民不孝不睦不姻不弟不任不恤造言亂民以五禮防萬民之偽而教之中吉凶軍賓嘉以六樂防萬民之情而教之和雲門大咸大㲈大夏大濩大武此俊造之教也若夫選舉之法則又有不同焉大胥掌學士之版春合舞秋合聲諸子春合諸學秋合諸射以考其藝而進退之王制曰樂正崇四術立四教順先王詩書禮樂以造士此國子之選舉者如此也周禮閭胥二十五家書其敬敏任恤者旅師百家書其孝弟睦姻有學者黨正五百家書其德行道藝州長二千五百家考其德行道藝而勸之鄉大夫萬二千五百家三年大比考其德行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賓之王制曰命鄉論秀士升之司徒曰選士即自比長以上升之也司徒論選士之秀者而升之學曰俊士即周禮大司徒以鄉三物教萬民而賓興之升於司徒者不征於鄉升於學者不征於司徒曰造士大樂正論造士之秀者以告於王而升諸司馬曰進士司馬辨論官材論進士之賢者以告於王而定其論論定然後官之任官然後爵之位定然後祿之此鄉舉俊造者如此也若夫諸侯教養選用之法則有可考者矣詩泮水曰思樂泮水薄采其芹無小無大從公于邁曰載色載笑匪怒伊教此諸侯教俊造之法也左傳晉悼公即位使荀家荀會欒黶韓無忌為公族大夫使訓卿之子弟共儉孝弟此諸侯教國子之法也至於貢士用賢之法則又有可考者矣周禮司士曰凡邦國三嵗則稽士任而進退其爵祿禮記射義曰古者天子之制諸侯嵗獻貢士於天子試之於射宫其容體比於禮其節比於樂而中多者得與於祭其容體不比于禮其節不比於樂而中少者不得與於祭數與於祭而君有慶數不與於祭而君有責數有慶而益地數有讓而削地書傳曰諸侯之於天子三年一貢士一適謂之好德再適謂之賢賢三適謂之有功一不適謂之過再不適謂之傲三不適謂之誣其適則有衣服弓矢秬鬯虎賁之賞其不適則有黜爵之罰此諸侯之貢士如此春秋之時若季文子之忠叔孫穆子之公孟獻子之加於人一等皆出於魯之三桓也若子皮之舉賢子産之惠子太叔之美秀而文者皆出於鄭之七穆也宋之良臣多出於戴桓武莊之族舉其尤者華元子罕是也衛之良臣亦公族及卿大夫之裔也舉其尤者公子荆公孫叔公子朝皆公族也子鮮公子也史鰌寧武子卿大夫之裔也齊之高國鮑晏楚之鬭蒍薳屈皆能世其家而不忝乃祖乃父此諸侯用國子之法如此也管子載齊桓公為軌里連鄉之法正月之朝鄉長復事復白也公親問焉曰於子之鄉有居處好學慈孝於親聰慧質仁發聞於鄉里者有則以告有而不以告謂之蔽賢其罪五謂其罪當入於五刑而定其罰公又問焉曰於子之鄉有拳勇股肱之力筋骨秀出於衆者有則以告有而不以告謂之蔽才其罪五於是鄉長退而修德進賢蓋古者鄉舉之意也此諸侯舉俊造之法也漢選士之法有三老孝弟力田掾史多資入粟從軍良家子賢良孝廉茂才射䇿明經任子下詔特舉正召為博士公府辟召上書童子武勇補試三老漢髙祖二年舉民年五十以上能率衆為善置以為三老文帝時始置常員三老秦制也秦人變先王制未盡尚有存者如新城三老説髙祖以仁義是也孝弟力田惠四年舉孝弟力田復其身髙后置孝弟力田二千石者一人孝文二年戶口率置孝悌力田常員掾史趙禹以佐史補中都于定國以郡決曹補廷尉史以至為侍御史梅福以郡文學補南昌尉如此之類不一或以察廉而為令長者尹翁歸是也或舉賢良而為茂陵令者魏相是也非一目也有多資入粟漢制資五百萬為常侍郎張釋之以資為騎郎司馬相如以資為郎漢景詔曰今資算十乃得廉士無資不得官今限資算四得官朝錯建鬻之議於文帝猶未鬻官也武帝始置武功爵級故黃霸以入錢賞官補侍郎謁者所忠建議請令世家入財子弟得舉為郎吏道雜而多端至後漢遂有入粟為關內侯者矣有從軍良家子李廣在文帝時以良家子從軍擊胡有功為郎騎常侍趙充國以良家子補羽林後從軍擊胸奴還拜為中郎馮奉世武帝時以良家子選為郎功次補武安長有賢良漢世有大災異大政事即下詔求賢良文帝三年以日食詔舉十五年太子家令朝錯以諸侯王公卿郡守舉對䇿遷中大夫武帝以長星見董仲舒初景帝時為博士至此以賢良對䇿公孫𢎞先為博士後免武帝時舉賢良對䇿嚴助吳人以郡舉對策擢為中大夫魏相朱邑皆以卒史對策昭帝時特詔舉文學髙第章帝時大司農劉寬舉魯丕時對䇿者百餘人惟丕在髙第除為郎安帝時蘇章少博學能屬文對䇿髙第為議郎有孝廉漢初無此科獨馮唐在文帝時以孝廉為郎中武帝元光元年用董仲舒言初令郡國舉孝廉各一人以備宿衛無間吏民然郡國時有不舉元朔元年詔令合郡不薦一人者罪王吉以郡吏舉孝廉為郎路溫舒為決曹舉孝廉為山邑丞其王國人雖以孝廉舉亦不得宿食龔勝舉孝廉以王國人出補吏元朔元年議曰不舉孝不奉詔當以不敬論不察廉不勝任也當免孝與廉待之蓋有輕重焉順帝陽嘉中左雄上言郡國孝廉請自今年不滿四十者不得察舉然自雄之制行也徐淑以年未四十而罷免當時所得陳蕃李膺陳球等三十餘人迄於永嘉察選清平然諸生試家法文吏科箋奏識者外之張衡上書曰孝廉必先孝行有餘力乃學文法耳今詔書一以能誦章句結奏按為限雖有至孝不當其科也其後黃瓊以雄制於取士之義猶有所遺乃奏增孝悌乃能從政者為四科种皓傳田歆為河南尹謂王湛曰今當舉六孝廉多貴戚書命不宜相違欲自用一名士以報國家爾助我求之乃舉皓漢初郡國各舉一人末乃增至五六人有茂材董仲舒傳曰州郡舉茂材自仲舒發之漢武帝元封五年詔州郡察吏民有茂材異等可為將相及使絶國者宣帝元康四年遣太中大夫強等十二人循行天下舉茂材異倫之士元帝初元二年詔丞相御史中二千石舉茂才異等直言極諫之士儒林傳曰博士弟子即有秀才異等者輒以名聞漢舊儀載州舉茂才移名丞相丞相考召取三科一明經一明律令一治劇後漢世祖始詔三公光祿監御史司隸州牧歲舉茂才有定員矣有射䇿漢儒林傳曰自武帝立五經博士開弟子員設科射䇿則射䇿始於武帝時也其射䇿者謂為難問疑義書之於䇿量其大小等為甲乙之科列而置之不使彰顯有欲射者隨其所取得而釋之以知優劣何武蕭望之翟方進等皆以博士弟子得射䇿甲科為郎若使人皆得射䇿則幾於濫進恐為博士弟子者可得射䇿故傳贊曰開弟子員設科射䇿然王嘉傳直言以明經射䇿甲科為郎匡衡房鳯傳直言射䇿耳有明經昔漢召信臣以明經甲科為郎則明經亦有試龔遂以明經為官以明經為郡史者甚衆後漢伏恭為劇令青州舉為尤異太常試經第一拜博士建武中楊仁舉孝廉除郎太常上仁經中博士則為吏者亦試經順帝陽嘉元年初令郡國舉孝廉限年四十以上諸生通章句文吏能箋奏乃得應選質帝本初元年夏四月令郡國舉明經年五十以上七十以下詣太學受業歲課試章帝元和三年令郡國上明經者四十萬以上五人不滿十萬三人有任子袁盎以兄任汲黯以父任蘇武亦以父任為郎大抵任子多為郎次為太子洗馬宣帝時王吉上言曰今使吏得任子弟率多驕傲罔通古今宜明選求賢除任子之令劉向以父任為郎以行修飭為諫大夫是漢法既往而復有所決擇初非泛然用之也東漢桓榮之子郁以父任為郎郁經授二帝時稱其能世傳家學至曾孫桓焉亦以父任為郎明經篤行位至三公餘見官制任子門有下詔特舉漢髙帝十一年詔曰賢士大夫有肯從我遊者吾能尊顯之下郡守其有意稱明德者必身勸為之駕遣詣相國府署行義年正召為博士者博士蓋秦官秦時叔孫通為博士漢文帝時河南守吳公薦賈誼召以為博士夏侯勝召為博士然亦有試者張禹為郡吏久之試為博士武帝時舉茂才丞相以三科考士有明經科以待博士諫大夫之選有公府辟召曹參輔惠帝時擇郡國吏謹厚者為丞相史武帝元狩六年開丞相史員三百八十二人故令丞相設四科之辟漢制州郡察其功能然後為五府所辟者三商為時進得城門兵得舉吏以此知五府得辟吏後漢黃瓊雖五府俱辟而不應孔融辟司徒府隱核官寮貪濁者有上書武帝初即位招天下賢良文學之士四方多上書言得失自鬻者以十數其不足采者輕報聞罷可采者待詔公車徐樂嚴安上書朝奏暮召皆為郎中有童子何武在宣帝時以童子習科歌中和樂職宣布詩得召見遣詣博士受業順帝左雄為尚書時汝南謝廉河南趙建年始十二各能通經雄奏拜為童子郎有武勇漢成帝元延元年詔北邉二十二郡舉勇猛知兵法者孝平元始元年詔郡國舉武勇有節明兵法者後漢安帝永初五年舉列將子孫明曉戰陳任將帥者建光元年又有武猛堪將帥者之舉順帝永和三年又選剛毅武猛有謀謨任將帥者補試後漢順帝陽嘉元年以太學新成試明經下第者補弟子魏九品中正魏陳羣立九品官人之法州郡皆置中正以定其選通典云按九品之制初因後漢建安中天下兵興衣冠士族多離本土欲徵源流遽難委悉魏氏革命州郡縣俱置大小中正各取本處人任諸府公卿及臺省郎吏有德充才盛者為之區别所管人物定為九等其有言行修著則升進之或以五升四以六升五倘或道義虧缺則降下之或自五退六自六退七矣是以吏部不能審定核天下人才士庶故委中正銓第等級憑之授受謂免乖式及法弊也惟能知其閥閲非復辨其賢愚所以劉毅云下品無髙門上品無寒士南朝至梁陳北朝至於周隋選舉之法雖互相損益而九品及中正至開皇中方罷段灼表以為九品訪人賢惟問中正故據上品者非公侯之子孫則當途之昆弟蓽門蓬戶之俊安得不陸沉者哉兩晉選舉之法晉依魏九品之制吏部選用必下中正徵其人居及父祖官名武帝又議考課傅玄皇甫陶以為政教頽弊上疏以為今未舉清逺有禮之臣以崇風節帝不用其後九品之法漸弊計官資以定品格唯以居位為貴劉毅以九品非經久之典上疏曰九品有八損而官才有三難皆興替之所由今人物難知一也愛憎難防二也情偽難明三也今中正定九品髙下愛惡隨心情偽由已損一也使是非之論橫於州里損二也今之中正坐徇其私推貴異之器使在九品之下損三也使得縱橫無所顧憚壅蔽邪人損四也以愛憎奪其平以人事亂其度損五也今附卑品而獲髙敘抑功實而崇虛名損六也品狀相妨况不實乎損七也廢褒貶之義任愛憎之斷損八也職名中正實為姦府事名九品而有八損臣以為宜罷中正除九品衛瓘請除九品復古鄉舉里選李重上疏宜明貢舉之法華競自息禮義日崇矣劉頌復建九班之制令百官在職少遷時賈郭專朝仕者務速進故皆不行東晉元年制揚州嵗舉二人諸州各一人時逺方孝秀不復䇿試乃召試經有才不中舉者免其太守後孝秀莫敢應命孔坦請延五歲許其講習乃詔孝廉申至七年秀才如故通典宋代選舉之制宋制丹陽吳會稽吳興四郡歲舉二人餘郡各一人凡州秀才郡孝廉至皆䇿試天子或親臨之及公卿所舉皆屬於吏部序才銓用凡舉得失各有賞罰文帝元嘉中限年三十而仕郡縣以六周而代刺史或十餘年武帝仕者不復拘老幼守宰以三周為滿周朗上疏今宜二十五家選一長百家置一師男子十三至十七皆令學經十七至二十皆令習武習經者五年有成而升之司徒習武三年能藝升之司馬若七年經不明五年勇不達雖公卿子弟長歸農畝終身不得為吏帝省之不悅謝莊以搜才路狹上表請令大臣各舉所知以付尚書銓用不從帝不欲重權在下乃分吏部置兩尚書以散其權通典齊代選舉之制齊駱宰議䇿秀才格五問並得為上四三為中二為下一不合與第謝超宗議以為一通峻正寧劣五通詔從宰議因習宋限年之制其所進取以官婚胄籍為先時士人皆厚結姻援奔馳造請寖以成俗和帝時梁武帝為丞相上表請自今選曹宜精隱核依舊立簿使名實不違乃施行通典梁代選舉之制梁初無中正制年二十有五方得入仕天監中又制九流常選年未三十不通一經者不得為官若有才同甘顔勿限年次至七年州置州重郡置郡崇鄉置鄉豪專典搜薦無復膏粱寒素之隔詔州歲舉二人大郡一人敬帝復令諸州各置中正仍舊訪選舉皆須中正押上然後量授通典陳代選舉之法陳依梁制年未三十不得入仕唯經學生䇿試得第諸州迎主簿西曹左奏及嘗為挽郎得未壯而仕諸郡唯正王為丹陽尹經迎得出身者亦然有髙才異行殊勳者不在常例凡選無定時隨缺則補若有遷授吏部先與參掌者署奏其可者下於選曹隨才補用其别發詔除者即宣詔施行付選司武帝承侯景之後制度未立百官無復考校殿最之法但更年互遷驟班進秩法無可稱者後徐陵孔奐繼為吏部尚書差有其序通典後魏選舉之制後魏州郡皆有中正掌選舉每以季月與吏部銓擇可否表敘之成帝和平三年詔曰今選舉之官多不以次令班白處後晚進居先諸曹選補宜各書勞舊才能其後中正所銓但在門第吏部彜倫仍不才舉文帝內官通班以上皆自考核以為黜陟宣武詔庶族子弟年十五不聽入仕孝明嗣位張彛之子仲瑀請排抑武夫不使在清品武夫怨怒羽林虎賁相率千餘人至尚書省詬詈求彛長子始均不獲以瓦礫投擊臺門聲如雷霆京師懾震遂焚其第執始均生投火中仲瑀被創以竄免彛信宿而死詔斬尤凶者八人乃命武官得依資入選崔亮為吏部尚書奏為格制官不問賢愚以停解日月為斷後甄琛元修義城陽王徽相繼為吏部尚書踵而行之自是賢愚同貫涇渭無别魏之失才從亮始也及辛雄轉吏部郎中上疏請後地先才不得拘以停年孝莊初詔求德行文藝政事強直者縣令郡守刺史皆敘其志業其以表聞得三人賞一階非其人黜一階守令六年為滿滿後六年乃敘通典北齊選舉之制北齊選舉多沿後魏之制凡州縣皆置中正其課試之法中書䇿秀才集書䇿貢士考功郎中䇿廉良天子坐於朝堂秀孝各以班草對書有濫劣者飲墨水一升文理孟浪者奪席脫容刀初東魏元象中文襄王髙澄攝吏部尚書乃革崔亮年勞之制務求才實自遷鄴以後掌大選知名者不過數四唯辛術貞明簡實新舊參舉管庫必擢門閥不遺衡鏡之美一人而已至孝昭帝詔內外執事官每在三年之內各舉一人或夙在朝倫沈屈未用或先官後進今見停散或白屋之人巾褐未釋其髙才良器允文允武理識深長幹具通濟操履凝峻學業宏贍諸如此輩隨取一長無待兼資方充舉限舉薦之文指論事實隨能量用必陳所堪不得髙談謬加褒飾所舉之人止在一職三周之內有犯死罪以下刑罪以上舉主凖舉人之犯各罰其金自後州郡辟士之權浸移於朝廷外吏不得精核由此起也通典後周選舉之制後周以吏部中大夫一人掌選舉人時蘇綽為六條詔書其四曰擢賢良罷門資之制察舉精謹及武帝平齊廣收遺逸乃詔山東諸州舉明經幹理者上縣六人中縣五人下縣四人宣帝大成元年詔州舉髙才博學者為秀才郡舉博經行修者為孝廉上州上郡嵗一人其刺史寮佐州吏則自署府官則命於朝廷通典隋代選舉之制隋文帝開皇七年制諸州嵗貢三人工商不得入仕開皇十八年又詔京官五品以上及總管刺吏並以志行修謹清平幹濟二科舉人牛𢎞為吏部尚書髙構為侍郎最為稱職當時之制尚書舉其大者侍郎銓其小者則六品以下官吏咸吏部所掌自是州郡無復辟署矣煬帝始建進士科又制百官不得計考增級其功德行能有表著者乃擢之大業三年始置吏部侍郎一人分掌尚書職事時武夫參選多授文職八年詔曰頃自班朝治人乃由勳敘拔之行陳起自勇夫自今以後諸授勳官者並不得授文官職事通典唐取士之科唐多因隋舊然其大要有三由學館升者曰生徒由州縣者曰鄉貢皆升於有司而進退之其科之目有秀才凡秀才試方略䇿五道以文理通粗為四等有明經凡明經先帖文然後口試經問大義十條答時務三道亦為四等狄仁傑徐有功皆以明經舉而祝欽明元稹亦擢明經有明法凡明法試律七條令三條有明字凡書學先口試通乃默試説文字林二十條有明算凡算學録大義本條為問答明數造術詳明術理然後為通試九章三條有一史有三史凡史每史問大義百條䇿三道通一史者白身有出身三史皆通者特擢之有開元禮凡開元禮通大義百條䇿三道者超資與官有道舉玄宗時開元二十九年始置崇玄學習老子莊子文子列子亦曰道舉有童子凡童子科十嵗以下能通一經李泌開元中以童子召玄宗登封劉晏八嵗獻頌竒其幼時號神童韓退之有送張童子序裴耀卿童子科有俊士進士凡進士試時務䇿五道帖一大經杜牧白居易楊綰顔真卿韋貫之裴垍所習皆舉進士而李宗閔牛僧孺亦舉進士唐明經之别有五經有三經有二經有學究一經有三禮有三傳有史科此嵗舉之常選也其天子自詔曰制舉所以待非常之才焉然則制舉之名七十有餘如賢良方正直言極諫科則有裴度韓休劉蕡之徒然賈竦牛僧孺皇甫鎛則亦以是進博學宏詞是科所取則有陸贄杜黃裳之徒然王涯劉禹錫則亦以是進其他如武舉武后時始置武舉唐志云選用之法不足道不復書然以武舉異等中第如郭子儀遂能成再造唐室之功如任子李德裕以元和宰相之後調官餘見官制任子門大抵衆科之目進士尤為得人方其取以文章類若浮文而少實及其臨事設施隱然為國名臣者不可勝數也自煬帝以來風俗浮靡始有進士之科而試以律賦唐室孝廉秀才之科雖在而唯明經進士二科最盛而孝廉衰矣寶應中雖楊綰上疏力言進士者皆誦當世之文而不通經史明經者但記帖括又投牒自舉請依古察孝廉縣薦之州州送於省仍自投牒乃詔明經進士與孝廉兼行而終不足以勝二科也又其後也文革之士日盛進士益重而明經稍衰減矣是以鄭覃嫉進士浮薄屢請罷之文宗不可武宗時李德裕論進士不根藝實朝廷顯官須公卿子弟為之何者少習其業目熟朝廷事體臺閣之儀不教自成寒士雖有出身之才固不能間習也其議亦卒不行雖然士風所在唯上之人如何耳轉移變革豈無其道張昌齡王公謹有時名而王師旦惡其浮革不書以第盧照鄰駱賓王文章為時冠裴行儉謂其浮躁抑之使不進豈不足以勵方來而移風俗哉何必今日更一令明日更一法耶殿試武后天授元年䇿問貢士於洛成殿殿試自此始也别試唐選舉志禮部侍郎親故移試考功謂之别頭正元間罷元和中復自漢至隋以前惟孝廉與秀才常行自隋唐至宋朝惟進士明經常行至熙寧間荆公用事改取士之法自是進士獨存明經始廢唐大詔令開元中處分舉人敕謂頃年䇿試頗成弊風所問既不切於時宜所對亦何關於政事徒考隱僻莫見才能以此擇賢竟未得所張九齡作宋朝取士之法宋朝以學校養才以科舉取士其制舊矣有進士有諸科有武學常例之外又有制科童子而進士為尤盛祖宗以來試以詩賦帖經墨義百餘年間人才相望諸科之設又可得質朴記誦之士胥濟以為用其教育則置太學於京師慶厯中置內舍二百人神宗垂意儒學益外舍生員三舍之法開端於此王安石采周官王制之緒自京師至郡縣學歲時月各有試以程其能以差次升舍最優者為上舍免解發及吏部試而賜之第遂欲以此專取士而寖廢科舉業進士者以德義易故習應諸科者以明法消舊額意若尊經復古抑浮靡而革椎魯也然新義字説頒命四方驅學者以宗已其後議臣極排力抵於是經義詩賦定為兩科四朝志自太祖建隆元年即開貢舉而楊礪之徒以進士選其後嵗嵗選士以登科記考之唯試詩賦及論自開寶元年始召對講武殿而第名六年士有擊鼓論榜者於是更試於講武殿而御試自此始也當是時諸科有五經開元禮三禮三傳三史之目太宗興國三年始試律賦以平仄用韻真宗時嚴挾書之令著糊名之法下秉燭之禁馮拯在當時謂江浙舉人業詞賦以取科名今歲望令兼考論䇿此祥符元年也則進士科固有論䇿矣仁宗時富弼亦言自咸平景德以來省試有三場一日試詩賦一日試論一日試䇿詩賦可以見辭藝論䇿可以見才識慶厯四年更進士之科先策次論次詩賦不專均於聲律偶切也經術之家兼行舊式稍增新制經史明法諸科願對大義者從宋祁之請也未幾而復舊制自嘉祐二年始詔間嵗一開科場英宗治平二年易以三嵗熙寧中罷詩賦帖經墨義令各占一經兼論語孟子之學試以大義殿試䇿一篇諸科稍令改易以應進士科其不能改者許應明法新科試以律義刑統大義斷案置律學行舍法事見前進士自第一人而下皆令試律而五路人士皆厚重朴實文辭不足以自見於是五路别放京東陕西河北河東京西元祐元年貢舉始添詩賦經義兼用注疏及諸家之説而不專於新義矣又詔文武京朝官於進士舉人力舉經明行修者紹聖中罷詩賦專經義除不得用王安石字説之禁髙宗時詩賦經義兼行紹興間舉人並兼習其後復雙行聽學者願習以登科記國朝會要四朝志修廢明法科紹興十八年也宋朝進士科往往為將相極通顯至明經之科不過為學究之類當時之人為之語曰焚香取進士嗔目待明經蓋進士有設焚香之禮而明經則設棘監守恐其傳義也雍熙中唱進士名內有李宗撰者宰相昉之子吕蒙亨參政蒙正之子王扶鹽鐵使王明之子許待問度支使仲宣之子上曰斯並世家縱以藝升天下亦謂朕有私並下第賢良宋初有三科賢良方正能直言極諫經學優深可為師法詳間史理達於政化凡三科應內外官草澤並許諸州及本司解送上吏部對御試䇿一道時制科先廢乃許詣闕自薦乾德二年有穎贄者應焉贄先任博州推官擢為祕書著作佐郎咸平中命近臣薦舉時林陶以進士應選就試學士院而不及格猶命之第以招來俊茂也景德二年增置六科賢良方正能直言極諫科博通墳典達於教化科才識兼茂明於體用科武足安邉科洞明韜略運籌決勝科軍謀宏逺材任邉寄科委中書門下先加程試器業可觀而後親䇿三年詔制舉人所納文卷委翰林學士等考定是時陳宗古所業學士院考不中式然皆特命就試景德四年詔䇿問宜用經義而夏英公竦出焉天聖七年詔六科許卿監以上奏舉或自進狀仍先進所業䇿論五十首委兩制看詳詞理優長召赴闕試論六首合格而後御試又增置髙蹈丘園沈淪草澤茂才異等三科許轉運及長吏奏舉所業召試如前式又有書判拔萃諸科先録判詞三十首於流內銓投下優者召試判十道是為天聖十科明年富公弼以茂才異等中選而余靖尹洙亦應中書拔萃科自是天下應制科者不下五六千人然得就祕閣試者蓋三之一中選者又十之一景祐元年詔六科不許三科又下第人應自是應者稍少其年吳育中才識兼茂明於體用科蘇伸中賢良方正能直言極諫科而張方平以茂才異等中而投拔不復置矣寶元元年田況中賢良而張方平復中選凡中此科目者不十年登禁從慶厯二年錢明逺中才識兼茂明於體用科四年遂為翰林學士自是朝廷惜其恩命艱難其選皆取僻書傳注疑似之説以為題而誤之慶厯中齊唐雖閣試已通言者以其無履行而罷試又行近臣論薦之制無得自舉而制科隨貢舉開設矣雖仁宗不欲隱奧因之數戒邇臣取其明當世治亂者而有司欲觀其所學於祕閣之試必艱其題而士亦留心於記問朝廷既艱制科之選陳執中不由科第以取宰相非留意於取士者皇祐五年制科就試者十八人而執中密諭考官放趙彥若一人過閣御試復黜之上歎曰天下之大而無一人中選豈朕待之不至耶乃下詔焉嘉祐六年執政亦欲廣收英豪之士時祕閣就試者七人所取者過其半焉於是二蘇兄弟俱中賢良選蘇轍制䇿極言得失有司請黜之仁宗曰以直言召之而以直言棄之天下謂朕何有司不得已而置之下第也熙寧中孔文仲對䇿指陳時政言最切直且言當專任有德王安石惡其説自是制科不復設矣元祐十一年始復置紹聖中又罷髙宗時雖詔復賢良科未有應者至孝宗乾道七年而眉山李垕出焉且及注疏命題目在幽隱者許監司勤篤焉以國朝會要國朝事實中興訓典登科記修宏詞自唐有宏詞之科而所取猶以詩賦詞也大中時李潘知貢舉放博學宏詞科陳琬等及進詩賦論而詩乃用重字故下之唐會要真宗景德三年龍圖閣待制陳彭年奏請條制貢部宏詞科采擇經術許流內選應宏詞拔萃科明經人投狀自薦䇿試經義以勸學者同上哲宗紹聖二年罷制舉懼無以收文學博異之士於是置宏詞以繼賢良之選所試以章表露布文書用四六也頌銘戒諭序記雜用古今體不拘四六也許進士登科者就試試以奏試上舍日附試不立院也四題分為二日試者雖多取毋過五人惟詔誥赦敕不以為題以登科記四朝志修又制詔四題內二題以歷代史故事宣和罷上舍試於是附試南省兵興其後廢宣和五年詞學兼茂科選人秦檜循一資髙宗紹興三年始復置謂之博學宏詞科以至天聖大觀格目以制誥詔書表露布檄針銘詩頌記序十二事為題古今雜出三題分為三場不拘有無出身詔先投所業學士院看詳召試以登科記四朝志修童子學宋朝太祖下江南以賈黃中知金陵按行府第得寶貸數十巨櫝皆李氏物不𨽻於籍者悉表之太祖賜黃中錢三百萬以旌其潔黃中年七嵗以童子及第李昉贈之詩曰七歲童子古所難賈家門戶有衣冠七人科第排頭上五部經書誦舌端興國中遂參大政曹彬生周嵗父母以玩具羅於席觀其所取彬左手提干戈右手取俎豆斯須取一印太宗時郭忠恕其先洛陽人也善屬文及書史學通九經七歲舉童子國初不仕太宗聞其名召為國子監主簿事略楊億字大年始生母口授以書隨即成誦六嵗學吟詩七嵗善屬文年十一以童子召對試詩賦五篇頃刻立成太宗歎異以為祕書省正字制曰汝方在髫齔不煩師訓精爽神助文學生知越景絶塵一日千里豫有望於汝也同上楊億年十一親試一賦二詩頃刻而成上喜送中書再試喜朝京闕詩有願秉清忠節終身立聖朝之句真宗景德二年撫州進士晏殊年十四大名府進士薑蓋年十三皆以俊名聞特召試殊試詩賦各一首蓋試詩六篇殊屬辭敏贍上極歎賞乃賜殊進士蓋學究後復召殊試詩賦論既成數稱善擢祕書正字祕閣讀書咸平二年六月令祕書省正字邵煥於祕閣讀書從其請也祕閣讀書自煥始煥嘗以童子召對賜帛遣歸是春復至京師上令賦春雨詩援筆立成遂命以官時年十二祥符八年以童子蔡伯希為祕書省正字其父龜從為祕書郎伯希年四歲誦詩百餘篇上召入禁中應對周詳所誦精習因命以官又作詩賜伯希長編仁宗朝文潞公幼時與羣兒擊毬入柱穴中不能出公以水灌之毬浮出司馬公幼與羣兒戲一兒墮水甕中公取石破其甕兒得出二公之仁智不凡矣王禹稱字元之七歲能文畢文簡竒之一日太守席上出詩句鸚鵡能言爭似鳯元之書其下蜘蛛雖巧不如蠶文簡曰經綸之才也寶元元年罷天下舉念書童子皇祐二年詔諸處無得遣念書童子赴闕英宗朝蘇軾生十年太夫人嘗讀東漢至范滂傳慨然太息公曰軾若為滂夫人亦許之否乎夫人曰汝能為滂吾顧不能為滂母耶神宗元豐七年夏四月賜饒州童子朱天錫五經出身天錫年九嵗禮部試誦七經皆通也上召入禁中取七經試之隨問即誦延安郡王時在傍上指天錫而撫王曰汝能如彼誦書乎面賜天錫錢五萬使買書以歸戒無廢學長編冬十月召饒州童子朱天申對於睿思殿賜五經出身天申天錫再從兄禮部言天申年十二試誦十經通也同上哲宗元祐元年五月丁巳朔又詔禮部自今乞試童子誦書所屬毋得取接同上髙宗紹興十三年三月進呈十書習射童子求試於有司者凡九人上曰上有好者下必有甚焉朕嘗示恩一二童子故求試者雲集此雖善事然可以知人主好惡不可不審也武舉見前武學門試教官宋朝神宗熙寧八年始立教授試法即舍人院召試大義五道初太博正録及州教官朝廷固嘗特除用亦雜出薦試否則取其試藝等格優多者用之哲宗元祐元年詔近臣擇經明行修者舉為內外學官罷試補法紹聖中詔依舊法召試附吏部春秋試試兩經大義各一道其後學官嵗許一試附吏部春銓漕試宋朝神宗熙寧中詔諸州廢解考試官凡親戚若門客毋得試於其州類名上轉運司使與鎖廳者同試率七人立一額四朝志仁宗景祐四年賈昌朝言舉人有親戚守官及隨行地逺并發解官親戚並令運司差官類試皇朝編年推恩宋朝太祖開寶三年詔貢士十五舉賜本科出身得司馬傳已下百六人仍不為例真宗祥符四年詔河中府進士五舉餘州七舉並特奏名祥符八年帝謂宰臣曰纍舉不第年齒已髙深可憐憫於是詔進士六舉諸科九舉特與奏名仁宗嘉祐八年始詔進士五舉諸科七舉年五十以上者具名以聞宗學見前宗學門羣書考索後集卷三十二
