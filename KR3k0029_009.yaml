body:
  text: 羣書考索卷九宋章如愚撰經史門諸經漢藝文志曰昔仲尼沒而微言絶七十子喪而大義乖故春秋分爲五詩分爲四易有數家之傳愚因是以考諸經不能無説於此蓋自易太卜掌三易之法皆出於伏羲一曰連山伏羲二曰歸藏黄帝三曰周易文王其經卦皆八其别皆六十有四今藝文志云伏羲畫八卦文王重六爻孔子爲彖象繫辭文言之屬人更三聖世歴三古所謂周易者然也及秦燔書而易獨以卜筮存惟失説卦三篇後河内女子得之亦可謂全書矣然劉向以中古文校之惟費氏之經與古文同而孟梁丘之經則未免有无咎悔亡之脱畧及晉太康之世汲冢所得易經雖與周易上下經合而繇辭則異汲冢之書固不可盡信而孟梁丘之易則自商瞿子木傳之田何者也乃復有參差焉何哉漢藝文志載易經十有二篇顔師古以爲上下經及十翼故有十二篇自費氏始以卦象文言雜入卦中而陳元鄭康成之徒皆學於費氏故十二篇之易遂亡王弼分爻之象辭各附當爻而古經遂不可復矣至於三易之名爲杜子春之説則以連山爲伏羲歸藏爲黄帝爲鄭康成之説則以連山爲夏歸藏爲商孔穎達之作正義則以連山氏爲神農歸藏氏爲黄帝其可不折衷於此歟歸藏漢初已亡按晉中經有之惟載卜筮隋藝文志有歸藏十三卷冠於周易之首以本卦尚存姑備商之缺云自孔子討論墳典而所謂三墳之書在伏羲氏天皇則曰三墳君臣民物隂陽兵象八者而已在神農氏人皇則曰氣墳歸藏生動長育止殺八者而已在黄帝氏地皇則曰形墳天地日月山川雲氣八者而已三墳之目見於孔安國而漢藝文志已不載本朝元豐中毛漸因奉使西京得之其中姓紀一篇皇策一篇政典一篇嗣征引政典孔氏注乃謂夏后爲正之典籍今正典之文頗合豈僞邪館閣書目云皆依托也夫子㫁自唐虞以下而典謨訓誥誓命之文足書百篇此所謂書者然也奈何秦火之餘濟南伏生漢文帝時能尚書者天下無有命伏生治之老不能行詔錯往受之以口授晁錯而教於齊魯之間者不過二十九篇而已孔安國得古文尚書於孔氏之壁者比之伏生增多二十五篇安國始定爲五十八篇作傳而漢藝文志乃曰尚書古文止五十七篇鄭康成序贊以爲安國所定之書後又亡其一篇與安國之序不能相合劉向所校歐陽夏侯三家之經比之古文多有脱異此蓋伏生所傳之本而馬融鄭康成所作尚書傳注如隋志所載乃云雜以經文非孔氏舊本蓋孔氏之書以巫蠱之事不復以聞逮至後漢其本遂絶間有見於經典者諸儒皆謂之逸書王肅亦注今文尚書而與古文孔傳相類或肅私見其本而祕之乎晉元帝時豫章内史梅賾始以孔傳奏上而獨闕舜典乃取王肅之堯典分而續之自慎徽以下分之陸德明釋文云今之舜典乃王肅本也自是歐陽夏侯之學馬鄭王肅之注皆廢而古文獨行於世矣即孔傳也若乃無偏無頗洪範之舊文也唐元宗以聲不恊語此乃唐今文尚書改而爲無陂又命衛包易古文以從今文天寶三年猶未害也彼漢之張霸乃爲百兩之篇文意淺陋劉向校之非是遂黜其書則何爲僞妄若是哉有如漢宣帝時河内女子得泰誓獻之與左氏國語孟子所用泰誓不同漢魏諸儒因疑其謬而齊建武中姚方興亦造孔傳舜典自言得之大航當時集議咸以爲非而隋之劉光伯炫乃取以列諸本第人遂以爲舜典之篇出於姚氏此蓋隋志及史通之所載者其真僞不待校而明也以至汲冢古書出於晉武帝咸寧五年汲郡人盜掘魏襄王冢得竹簡小篆古書十餘萬言藏于祕府而荀勉撰次以爲中經而後啓之殺益太甲之誅伊尹共伯之名和則與經傳甚戾又有尚書逸篇出於齊梁之間考其篇目似孔壁之殘缺者隋藝文志載之尚書之末果可信乎自三百五篇之詩刪於夫子更歴嬴秦其書獲全得非以諷誦不獨在於竹帛蓋於漢而後有齊魯韓毛之學此詩之所以分爲四也然齊詩至魏而亡魯詩至西晉而亡韓詩雖存無傳之者惟毛詩鄭箋至今獨存自左氏爲春秋傳三十卷魯太史而公羊十一卷名髙齊人榖梁十一卷魯人名赤相繼爲之後復有鄒氏十一卷夾氏十一卷之傳而鄒氏無師而夾氏未有其書亦得以並名於世此春秋所以分爲五也然惟左氏之晉杜預而爲之集解至隋而盛行公羊榖梁浸微今殆無師說矣若乃禮之書自秦而後缺壞爲甚髙堂生傳士禮十七篇而河間獻王又得古禮五十六篇記百三十一篇出鄭氏六藝論經典釋文所引其十七篇髙堂生所傳同而字則多異其外則逸禮是也至劉向考校經藉因而第之戴德刪其煩重合而記之爲八十五篇謂之大戴禮戴聖又刪大戴之書爲四十六篇謂之小戴記漢末馬融遂傳小戴之學融又是月令明堂位樂記合四十九篇卽今之禮記是也髙堂生所傳士禮卽今之儀禮也禮記之作出自孔氏然正禮殘缺無復能明故范武子不識殽烝趙鞅及魯君謂儀爲禮至孔子没七十子之徒其撰所聞以爲記而月令則呂不韋所修王制則漢愽士所錄緇衣公孫尼子所撰蓋非復古之全書矣秦始王深惡周官至於漢武帝開獻書之路周官一經旣出於山巖屋壁之間而復入于祕府五家之儒莫得見焉其後劉向校理祕書始得著錄然亡其冬官一篇乃以考工記足之隋志又云河間獻王以千金求冬官不可得遂足以考工當時諸儒共排以爲非是劉歆獨識之後又有杜子春者能通其讀而鄭衆賈逵之徒皆傳其業焉然隋志以爲河間獻王得周官五篇缺冬官一篇而六藝論則以爲周官壁中所得六篇而同異旣未可知蓋非古之全經矣至於漢藝文志所載孝經古文有二十二篇之分而字讀皆異至劉向典校經籍除其煩惑以十八章爲定論語古文有二十二篇之别而齊魯二家篇目又别不同析堯曰以為從政分子張爲二篇是古論之殊也增問王與知道是齊魯之異也後張禹從魯論二十篇爲定而諸儒多爲之注齊論遂亡古論志無師説然考之當時論語之傳授齊則有王吉貢禹之儔魯有龔奮蕭望之張禹之屬前藝文志而孝經又有後蒼翼奉輩相傳以名其家此所以不絶於後世歟雖然經固出於聖人也乃若輔翼而推明之則諸儒之功焉自西漢之後其擬其續之者有其人矣揚雄之太𤣥王長文之通言是所以擬乎易也晉著書四卷名通言有文言卦象時人比之太𤣥可用卜筮孔衍刪取典言而作漢尚書白居易作湯征篇以補逸書王通取漢之制誥誌策而謂之續書起漢魏盡晉中書百二十篇以續古尚書後亡其序有錄無書者十篇孫王勃補缺遺定著二十篇陳正卿唐纂漢唐以來詔策章疏而爲續尚書是所以擬乎書也束晢之補亡六篇王通之續詩以備六代而有化政頌歎之名是所以續乎詩也魏證之類禮是又續乎禮者也習鑿齒之晉時人漢晉春秋始光武而終晉愍王文中之元經首太熙而正開皇孔衍之漢春秋檀道鸞之晉春秋韋述吳兢之唐春秋此又欲續乎春秋者也其傳而訓釋之者亦有其人矣以言乎易則崔彖之易林後漢建武初六十四篇用決吉凶王弼之大衍論魏尚書郎陸德明之文句義疏李鼎祚之集註裴通之易書王勃之周易發微以言乎書若伏生之大傳劉向之洪範五行傳說向在成帝時乃集合上古以來歴春秋六國至周秦漢有祥瑞災異劉陶之中文尚書東漢事連𫝊禍福著其占驗此類相從凡十一篇專爲鳳兄弟設也牟長之尚書章句王肅之尚書釋駁李顒之尚書新釋以言乎詩則若鄭康成之詩譜王肅之毛詩義駁楊義之辨異許叔牙之纂義唐貞觀時爲𢎞文館直學士於詩禮尤䆳作爲十篇髙智周曰欲明詩者宜先讀此陸機之草木蟲魚疏楊嗣復之草木蟲魚圖唐開成中文宗命集賢院修撰詩草木蟲魚圖并㑹物象大學士楊嗣復學士張次宗上之以言乎禮則若馬融之周官傳十一卷傅元之周官評論陳邵駁戴聖之月令章句十二卷何承天之禮論三百十卷崔靈恩之三禮義宗三十卷丘敬伯之五禮異同張鎰唐之三禮圖九卷皇侃之禮記講疏百卷賈公考之禮記正義六十卷而周禮儀禮又合爲之疏焉若春秋繁露則作於董仲舒春秋釋例攷衆家譜第本爲傳設春秋長厯脩成一家之學則作於杜預春秋調人左氏解也公榖皆爲經傳中朱書以别之春秋全綜則作於劉兆晉兆謂春秋二經三家殊塗諸儒之議紛然乃合三家之異取周官調人之義論其首尾使大義無乖有不合者取其長短以通之春秋義函則作于于寶春秋纂例則作於髙重文宗好左氏髙重時爲翰林學士乃分諸國名爲書藝文字春秋纂例四十卷是也左氏解誼則作於伏䖍公羊注作於何休休訓釋甚詳而出周王魯大體乖戾更注公羊多有新義又注於王接榖梁集解作於范寗惠帝時補尚書殿中郎常謂以榖梁未有善解遂沉思積年爲之爲世所重而又作於徐邈春秋通例則作於陸希聲病諸儒執一槩是紛然故作此通理經趣春秋三傳總例則作於韋表微此則春秋之學也孝經義疏則作於皇侃孔穎達孝經制㫖一卷則作於唐𤣥宗𤣥宗自注孝經詔行冲爲疏立于學官廣孝經則作於徐浩乾元二年上計十卷論語章句則作於張禹以成帝好故作此以獻論語釋疑則作於王弼注則作於韓愈注辨則作於張籍而賈公彦又爲論語孝經之疏此則論語孝經之學也若乃五經音訓則作於晉之徐邈孝武始覽載籍招延儒學之士謝安舉邈補中書舍人在西省侍帝雖不口𫝊章句然開釋文義標明㫖趣故作此書學者宗之九經師授譜則作於唐之韋處微以學者薄師道不如聲樂賤工能尊師故作此以詆其違五經勾沉則作於晉之楊方隋志云五經勾沉十卷方時爲髙梁太守積年方成五經異評則作於晉之徐苗苗家貧好學遂爲儒學宗五經微㫖則作於唐之張鎰六經外傳則作於唐之劉貺九經要句則唐李適實譔之睿宗時六經法言則唐韋處厚等實爲之穆宗時掇五經粹要二十篇六經要言則唐崔郾等實爲之敬宗時郾與髙重類爲十篇以便觀省五經精義則唐楊安國等實爲之開元九年詔名曰云云至於漢之五經則定於蔡邕楊賜之徒唐之石經定於髙重鄭覃之屬此又兼通諸經之儒也諸儒之功亦多矣而唐之劉子元乃獨不然其作史通也於尚書論語則有疑古之十條於春秋則有五虛美十二未諭之論噫聖人之經而猶有疑焉亦足以知子元之學矣漢石經邕爲東觀議郎以經籍去聖久遠文字多訛俗儒穿鑿疑誤後學熹平四年與楊賜韓説覃颺等求正定六經文字靈帝許之乃自書丹於碑使工鐫刻石於太學之門外後儒晚學咸取正焉碑始立其觀視及模寫者車乗日千餘兩洛陽記太學堂前石經四部盧植熹平四年作尚書章句三禮解詁時始立太學石經以正五經文字植上言願詣東觀專心研精合尚書章句攷禮記得失裁定聖典刋正碑文唐石經鄭覃文宗時爲相以經籍刓繆博士淺陋不能正建言願與鉅學共力刋讐準漢故事鏤石太學示萬世法詔可覃乃表周墀崔琳等是正其文刋于石文宗定五經鑱之石張參等定正其訛文儀禮韓愈嘗苦儀禮難讀以爲文王周公之法制粗在於是班固志藝文以魯髙堂生所傳士禮十七篇其篇數與儀禮同大宋朝樂史謂儀禮有可疑者五漢儒傳授曲臺雜記後馬融鄭衆始傳周官而儀禮未嘗以教授一疑也周禮缺冬官求之千金不可得使有儀禮全書諸儒寧不獻之朝乎班固七畧劉歆九種並不著儀禮魏晉梁陳之間是書始行二疑也聘禮篇所記賓行饔餼之物禾米芻薪之數籩豆簠簋之實鉶壺鼎甕之列考之周官掌客之説不同三疑也其中一篇喪服蓋講師設問難以相解釋之辭非周公之書四疑也周官所載自王以下至公侯伯子男皆有其禮而儀禮所謂公食大夫禮及燕禮皆公與卿大夫之事不及於王其他篇所言曰主人曰賓而已似侯國之書使周公當太平之時豈不設天子之禮五疑也今攷其書猶有可疑者且吉凶賓嘉皆有其禮而軍禮獨闕焉自天子至士皆有冠禮而大夫獨無焉鄉飲酒之禮有黨正以正齒位而今獨不載焉賓禮之别有八燕禮之等有四冠昏之篇皆冠以士大射之禮獨名曰儀朝遇之禮不錄而獨存覲禮其他禮食不載而獨有公食大夫禮以至言本末之異同孔子言周禮爲本儀禮爲末賈公彦言周禮爲末儀禮爲本論章疏之詳畧齊黄慶之舉大畧小經注疏畧隋李孟哲舉小畧大經注稍簡是皆考究精微者焉諸子百家自太史談爲六家要指之論而劉歆所奏七畧有輯畧六藝諸子詩賦兵書術數方伎之目班固作漢藝文志以爲諸子十家其可觀者九家而已今攷藝文志之所載曰儒曰道曰隂陽曰法曰名曰墨曰縱横曰雜曰農曰小説此所謂十家者也而儒家則出於司徒之官道家則出於史官隂陽家則出於羲和之官法家則出於理官以至於名家之出於禮官墨家之出於清廟之官縱横家之出於行人之官雜家則出於議官農家出於農稷之官小説家則出於稗闔官則亦未有無所本者然孟堅所謂可觀者九家而於小説家則曰君子弗爲得非説家或在所指乎孟堅於諸子十家之外又有兵家天文歴譜五行醫經皆刪劉歆七畧之説以備于篇者也後世分四部之書而諸子百家皆列於子部豈亦傚孟堅之體乎隋書之志經籍唐書之志藝文儒道法家名墨縱横之類大抵與班同而隂陽之家不列於目而唐志又始以雜藝術類然後諸子百家之書燦然可知也夫所謂儒家者何也唐藝文志若晏子則爲晏平仲之書曾子則謂曾參之書公孫尼子則爲七十弟子唐志無七十弟子四字之書隋志董子則爲戰國董何心之書難墨子魯仲連則爲魯連子之書漢作魯仲連子鹽鐵論則作於桓寛潜天論則作於王符昌言則作於仲長統申鑒則作於荀悦魏子則作於後漢之魏明本明牟子則作於後漢之牟融中論則作於魏之徐幹體論則作於魏之杜恕法訓則作於蜀之譙周續説苑則作於唐之劉貺古今説苑則作於唐之李吉甫若乃新語則作於漢之陸賈新書則作於賈誼隋志云賈子十卷新序則作於劉向成帝永始元年桓子新論則作於桓譚顧子新語則作於顧譚志林新書則作於虞喜而夏侯湛華譚亦皆有新論之作王子正論則作於王肅袁子正論則作於袁準正言則作於干寶正覽則作於梁周捨而唐之儲光羲亦有正論之作此豈非儒家者歟所謂道家者何也唐藝文志鬻子之出於鬻熊唐志作雄道德經之出於老子名聃鄭氏傳其學田子之出於田駢莊子之出於莊周列子之出於列禦冦廣成子之出於商路公張太衡注蘇子之出於蘇彦宣子之出於宣聘陸子出於陸雲抱朴子内篇之出於葛洪而黔婁子則出於齊之隠士漢志鶡冠子以鶡鳥毛爲冠則出於楚之隠人隋志文子之書雖曰出於老子弟子而班氏以爲似依托者此豈非道家者歟所謂法家者何也唐藝文管夷吾之有管子商鞅之有商君書謹到之有謹子申不害之有申子韓非之有韓子晁錯之有新書董仲舒之有春秋決疑崔寔劉􅛫媿之有政論魏桓範之有世要論梁劉邵之有法論杜佑之有管氏指畧此豈非法家者歟所謂名家者何也唐藝文志若鄧析子則鄭人與子産同時者若伊尹文子則與宋鈃形俱游稷下者若公孫龍子則爲堅白之辨者若惠子則所謂惠施而與莊子並時者漢志至於魏盧毓之九州人士論劉邵之人物志梁姚信之士緯范謐之辨名苑杜周士之廣人物志唐志此豈非名家者歟曰墨子唐藝文則爲墨翟之作曰隋巢子曰胡非子則爲墨翟弟子之作此句出漢志此所謂墨家者然也曰蘇子有列傳則爲蘇秦之書曰張子則爲張儀之書而鬼谷子者隋志以周世𨼆人目之唐志以蘇秦目之而皇甫謐樂臺輩有鬼谷之注梁元帝有補缺子之作唐志此所謂縱横家者然也若尉繚子唐志則作於六國時之尉繚尸子則作於魯人之尸佼吕氏春秋之作於吕不韋淮南子之作於劉安論衡之作於王充風俗通義之作於應劭説林之作於孔衍抱朴子外篇之作於葛洪金樓子之作於梁元帝古今注之作於崔豹續古今精義之作於唐周䝉類苑之作於劉孝標羣書治要之作於魏證帝王畧論之作於虞世南理道要訣之作於杜佑此所謂雜家者然也四民月令之作於崔寔齊民要術之作於賈思恊荆楚嵗時記之作於宗慓玉燭寶典之作於杜臺卿秦中嵗時記之作於李綽四時纂要之作於韓鄂而范子計然之書則范蠡與計然之所問答此所謂農家者然也張華之愽物志顧恊之瑣語劉義慶之世説劉孝標之續世説裴子野之類林其皆小説之謂乎以孫子之兵法而魏武帝杜牧賈林輩皆爲之注武帝又爲之續以吳起之兵法而賈詡孫鐈亦註釋之若曰六韜隋志以爲太公之作而漢藝文志止曰太公二百三十七篇初無此書之名雖有周史六弢載之於志然注言惠襄之間或顯王時或曰孔子問焉顔師古以卽今之六韜而亦不指爲太公之書則不知隋志將何所據邪有如黃帝之太一兵厯太公之金匱三宫兵法隋志穰苴之司馬法黄石公之三畧魏武帝之兵書接要司馬彪之兵記孔衍之兵林李靖之六軍鏡吳競之兵家正史李德裕之西南備逐錄其兵法之謂乎靈憲圖藝文渾天儀則張衡爲之渾天象注則吳王蕃爲之天儀説要則陶洪景爲之靈臺祕苑則庾李才爲之而釋周髀乾坤祕奧法象志則李淳風爲之與天剛集以至石氏之星經傳讀甘氏之四七法其皆天文之謂乎若厯譜十八家見於班氏之志而四分厯則李梵爲之景初厯則晉陽偉爲之厯術則何承天崔浩皆爲之皇極厯則劉焯爲之厯義則浮屠一行爲之九章重差則爲之於劉向算經則爲之於張正建韓延夏侯陽九章算術則爲之於徐徽徐岳九章算經五曹算經則又甄鸞爲之其皆厯算之謂乎京房則有周易占周易林焦贑費直管輅則有易林而費直則又有易内神靈郭璞則有周易新林晉史綽則有龜經是所謂五行者也秦府十八學士及凌煙功臣則閻立本圖之開元十八學士則商􅙀韋無叅圖之是所謂雜藝者也若皇帝素問黄帝甲乙經黄帝八十一難若扁鵲内外經若岐伯炙經是又所謂醫經者也而班氏之志有曰儒家者流祖述堯舜憲章文武宗師仲尼以重其言於道最髙噫不如是何以見儒術之尊非諸家之比哉嘗觀荀卿論十二子有曰今之世飾邪説文奸言以亂天下混然不知是非治亂之所存是他囂魏牟也漢志有公子侔忍情性以異爲髙不足以合大衆明大分是陳仲史鰌也上功用大儉約而慢差守是墨翟宋鈃也上則取聴於上下則取從於俗不可以經國定分是謹到田駢也不法先王不是禮義而好治怪説辨而無用是惠施鄧析也然皆持之有故其言之成理足以欺惑愚衆者也畧法先王而不知其統子思唱之孟軻和之世俗唯唯然不知其非也是則子思孟軻之罪也今夫仁人上則法舜禹之制下則法仲尼子弓之義以務息十二子之説如是則天下之害除聖王之迹著矣司馬談論六家之要指有曰隂陽之術太詳而多忌諱使人拘而多畏然其叙四時之大順不可失也儒者愽而寡要勞而少功是以其事難盡從然其序君臣父子之禮列夫婦長幼之禮不可易也墨者儉而難遵是以其事不可偏循然而强本節用者不可廢也法者嚴而少恩然其正君臣上下之分不可改也名家者使人儉而善失真然而正名實不可廢也道家者使人精明專一動合無形其爲術也因隂陽之大順采儒墨之善撮名法之要與時遷徙應物變化㫖約而易操事少而功多班固之論九家有曰者儒家者流助人君明教化游心於六經之中留意於仁義之際於道最爲髙唐虞之際商周之盛仲尼之業已試之效者也然惑者旣失精微而僻者又隨時抑揚違離道本茍以譁衆取寵是以五經乖析儒學寖衰此辟儒之患也道家者流清凈以自守卑弱以自持此其所長也及放者爲之則絶去禮學兼棄仁義隂陽家者流歴象日月星辰敬授人時此其所長也及拘者爲之則牽於禁忌舍人事而事鬼神法家者流信賞必罰以輔禮制此其所長也及刻者爲之則無教化去仁愛任刑法而傷恩薄厚名家者流古者名位不同禮亦異數此其所長也及譥古予切者爲之則析亂而已墨家者流貴儉兼愛上賢古鬼非命上同此其所長也及蔽者爲之見儉之利因以非禮推廉愛之意而不别親疎縱横家者流權事制宜此其所長也及邪人爲之則上詐諼而棄其信雜家者流兼儒墨合名法見王治之無不貫此其所長也及盪者爲之則漫羨而無所歸心農家者流播百榖勸農桑此其所長也及鄙者爲之欲使君臣並耕悖上下之序小説家者流或一言可采此亦芻蕘狂夫之義致遠恐泥是以君子弗爲也夫諸子者皆起於王道旣衰時君世主好惡殊方是以九家之術蠭出並作各引一端崇其所善以此持説取舍諸侯雖有蔽短合其要歸亦六經之支與流裔使其人遭明王聖主得其所折中皆股肱之才也若能修六藝之術而觀此九家之言舍短取長則可以通萬方之畧矣觀太史公於儒不深取論道家甚詳無所病意者習見漢初之事曹參以清凈治天下而百姓無擾自後儒者出來變更紛紛而擾卒無所補太史公之所以病儒者非果以儒爲非乃陋漢儒耳不然太史公説詩書禮樂春秋以爲學者至今則之夫豈以儒者爲無益哉觀史遷與董生論春秋一段亦可謂識得儒者河圖洛書易曰河出圖洛出書聖人則之劉牧以爲河圖洛書同出於伏羲之世殊不知河圖授羲洛書錫禹經傳之明文古今之通論也故劉歆馬融孔安國之徒謂天授伏羲以河圖錫禹以洛書然天數二十有五地數三十不可易也而河圖之數則四十有五洛書之數則五十有五其不同者何也天地之數五十有五今大衍之數止於五十又何也蓋五者中數也在五行曰土今以四時論之木王於春火王於夏金王於秋水王於冬惟土分王四季十有八日共成七十二日以藏四時之間而成嵗功也今大衍止五十蓋三才分四象著五者退藏於密也其用四十有九由體起用也分而爲四十有九合而爲一然則無爲而爲者其惟五乎河圖者大衍之本也其數五居中而一與九次之三居乎左之中四與八次之七居乎右之中六與二又次之總爲四十有五而止蓋虚十者是亦上也蓋大衍所虛者生數也河圖併與成數而虚之然河圖或縱或横皆十有五今以五居中象易之太極也虚十於中是不縱不横亦十五也豈天地密意歟若洛書其疇雖九數亦五十有五五行也五事也八政之典五紀也六三德之與十稽疑也八庶證也五福之與六極也唯大衍之五十皇極五也特不言數豈非非數之數然後於數之中而有所統㑹也然則易之太極河圖之五洛書之皇極經天緯地宗主萬變乃象數出入之門皆不離乎此也孰謂天地五十有五河圖四十有五洛書五十有五而有異者哉雖然易與洪範相爲表裏後世吕不韋取而著之月令揚雄以是而草太元劉向以是而作五行𫝊班固范曄以是而作五行志皆第相沿仍宜其一揆而或異同何也易曰天一地二天三地四天五地六天七地八天九地十又曰天數五地數五五位相得而各有合洪範一曰水二曰火三曰木四曰金五曰土則數至於五而不及於六七八九十何也月令春秋則其數八夏則其數七中央其數五秋則其數九冬則其數六又不及於一二三四十何也太𤣥經曰三八爲木四九爲金二七爲火一六爲水五五爲土又不言於十何也洪範則以水火木金土爲序易則不言大禹謨則以水火金木土榖爲序而增榖爲六府者何也月令則以木火土金水爲序太𤣥則以木金火水土爲序班固劉向以木火土金水爲序范曄則以木金火水土爲序又何也蓋易不言水火金木土者以旣寓於四象則不待言而理自存猶禮官不言垂象也其洪範不及於六七八九十者即其生數可以見其成數也太𤣥經曰一德而作二生一刑而作五尅五生不相殄五尅不相逆不相殄乃能相繼父子之道也不相逆乃能相治君臣之道也大禹謨之言以水治火以火治金以金治木以木治土以土治榖相治之理也增榖爲六府者土爰稼穡禹論其可歌之功也吕不韋月令據夏小正以正四時則以德之盛者言之也劉向倣月令而作傳班固擬劉向之傳而作志故其序一與之同皆取相生亦猶制地之律以資生爲功故黄鍾爲宫大簇爲角姑洗爲羽之義也一與六共宗二與七共朋三與八成友四與九同道五與十相守揚子雲擬易而作太𤣥故合生成之數范曄作志則本太𤣥而衍厯故其序與之合以自下尅上爲言木受制於金金受制於火火受制於水水受制於土皆取相制之義也大衍易曰天數二十有五地數三十凡天地之數五十有五所以成變化而行鬼神也又曰大衍之數五十其用四十有九是於天地之數减其五也韓輔嗣曰演天地之數所賴者五十也其用四十有九則其一不用也不用而用以之通非數而數以之成斯易之太極也四十有九數之極也然則五十有五乃天地隂陽竒耦之數非謂衍天地之策也衍天地之策則夫五退藏於密其數所以止於五十也天地之數五十有五天地之極數也大衍之數五十天地之用數也京房則曰五十者謂十日十二辰二十八宿凡五十其一不用者天地之大生氣也馬季良曰易有太極謂北辰也太極生兩儀兩儀生日月日月生四時四時生五行五行生十有二月十有二月生二十四氣北辰居中不動其餘四十有九轉運而用也荀爽則曰卦各有六爻六八四十有八加乾坤二用凡有五十乾初九潛龍勿用故四十有九也鄭康成則曰天地之數五十有五者以五行氣通於萬物故减五大衍又减一故四十有九也姚信董遇則曰天地之數五十有五者其六以象六爻之數故减六而用四十有九顧愷則曰此五十數以數神神雖非數因數而顯故虚其一以明不可言之義數子之言皆未爲得而韓輔嗣近之京房知二十八宿之小而遺其七政之大季良不知四者同氣而總名耳荀爽以八卦言之加乾坤以足之則又重舉乾初九之一爻諸説亦迂矣蓋天一下降與地六合而生水於北地二上騰與天七合而生火於南天三左旋與地八合而生木於東地四右轉與天九合而生金於西天五㝠運與地十合而生土於中以竒生者成而耦以耦成而竒天陽也故其數竒地隂也故其數耦其耦相合而五十有五之數備大衍之數减其五者五行之用也虚其一者元氣之本也蓋天五爲變化之始散在五行之位故中無定象天始生一肇有其數也而後生四象五行之數今焉而虚一不用是明元氣爲造化之宗居尊不動也旣以减五又以虚一然後以四十有九之數分而爲二以象兩儀就兩儀之間於天數之中分掛其一而配兩儀以象三才揲其蓍皆以四爲數以象四時四揲之餘歸此餘數於所扐以象閏五嵗再閏故再扐而後掛以陽爻之六一爻三十有六策六爻故二百一十有六也隂爻亦六爻二十有四策六爻故百四十有四也凡三百有六十此舉中道以言之策者揲而所得之數乾坤之策皆取老隂老陽之數老陽之數三十有六六之故乾之策故二百一十有六老隂之數二十有四六之則坤之策故百四十有四二篇之策凡陽爻百九十有二皆乾之九隂爻百九十有二皆坤之六合爲䇿故象萬物也當期之日二篇之策乾坤之策皆一定之數出於大衍者也故大衍之數先天地而乾坤之策次之萬有一千五百二十當萬物之數也夫大易之數何也參天兩地之數也所以參天者天秉陽八卦之陽爻皆得參天之數參天一爻當三三爲九所謂兩地者兩地蓋坤六㫁則一當二故也地秉隂八卦之隂爻皆得兩地之數惟陽爻得參天之數故乾之陽爻三得自然之數九當揲蓍之際三揲俱少則計所揲之餘得四九之數所以爲老陽惟隂爻得兩地之數故坤之隂爻三得自然之數六當揲蓍之際三揲俱多則計所揲之餘得四六之數所以六爲老隂三男之爻一陽而二隂得自然之數七揲蓍之際兩多一少則折揲之餘得四七之數而七爲少陽者自然之理歟三女之爻一隂而二陽得自然之數八揲蓍之際兩少一多則所計楪之餘得四八之數而以八爲少隂者自然之理歟大衍之數五十其用止於四十有九而九七八六之理存隂陽老少之理明增之一則於揲爲贅不可也减之一則於揲有缺不可也此自然之數歟河圖得自然四十五之數洛書得自然五十五之數亦猶周天之度周朞之日或嬴或縮亦皆本於自然也或者求九七六八之數而不得考隂陽老少之理而未明乃謂陽動而進以進爲文故少七而老九隂動而反以反爲文故少八而老六又惑於不用十爲老少之説乃謂臣不可以加君隂不可以加陽故不用十而用八則其於自然之理蓋亦昧而不通者歟昔子雲作太元以天地之策各十有八合爲三十六策虚其三而用二十有三司馬作潛虚三百六十四變變蓍一日以周朞數亦本於自然數之理也所以蓍之德圓而神顧取而用之如何耳羣書考索巻九
