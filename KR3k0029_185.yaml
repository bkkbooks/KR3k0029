body:
  text: 羣書考索續集卷五十四宋章如愚編君道門湯處時之務嘗讀書而至於湯未嘗不悲湯之窮也雖然使湯安於其窮而不變不可也安而不變者是助桀者也放桀之罪身罪也助桀之罪心罪也身罪之罪其罪小心罪之罪其罪大小不可以易乎大而身不可以掩乎其心也身罪而心非後世或可以原心而定罪身脫而心陷焉者吾不知其罪之如何也嗟乎此湯之本心也而難以告夫人吾觀當時曰舍穡曰其如台者非助桀之言也不急以伐桀者之言也夫安於虐而不急以伐焉者何也意者執於其分而不忍也夫不忍以賊乎其君而上之人誠忍焉湯之心又何如也吾固曰湯處時之窮者也吕祖謙德澤深教化明成湯伐桀而商之衆曰我后不恤我衆舍我穡事而割正夏觀此見得湯之德澤入於民者深教化示於民者明桀之民雖不聊生然商之民陶陶於農畝而不知非德澤之深者能如是乎桀雖無道而且以為正統之夏非教化之明而尊卑上下之分猶不忘乎此雖怨湯之言乃足以見湯之德澤教化也應天順人武王附夫極聖人之常遇天人之變吾甘心任之而不之謝非樂乎其命之革也彼不克嚴其不可犯之尊往往自速其不可回之禍一或恝然乎天心之從違恬然乎人心之去就徘徊乎一事之不屑則我於至理已有乖戾安保天下之不呼舞四起而奪之亟吾不忍斯民或擠於不可救藥之時寧忍一巳自冒其不可測知之勢德少慚乎吾身將大安乎天下樂未善乎一時將大聲於後世劉穆元六事自責桑林之禱乃其至誠惻怛之所形而六事以自責者又皆其反躬內省之實意然自常情觀之昭德建中必無不節之政克寬克仁必無失職之民制事以義宫室何自而崇聲色不邇女謁何自而盛以至不殖貨利從諌弗咈而苞苴之行讒夫之昌必不能以纍乎湯也然湯固無是也湯奚敢以無是而自足哉蓋其平日所以處其身者常歉如也嗚呼聖人之用心如此哉罪己湯之德莫如罪己以元牡告上帝者請桀之罪也有罪不敢赦者求己之罪也范祖禹救民武王附湯之伐桀討罪也升陑而不避險阻正兵也與桀戰於鳴條危之也兵刃既接勝負未可知勝則出民於塗炭不勝則貿貿然將何所恃以歸乎危之固勝之也夫揖遜與賢而繼之以世又繼之以兵時愈交下視古愧焉而不辭天下之惡名以救斯民不避後世之口實以援斯世昔所未有自我為之雖時有汙隆而理無彼此因時乘理聖人之時中此湯之所甚懼而不釋然者雖後有聖人不幸而遇後世天下望其來蘇如旱雲時雨茍能不恤吾身起而應之舉一世塗炭之民而置之清閟之地則湯之所甚懼而不釋然者至此可以無憾矣故曰于湯有光孟津之渡升陑之正也牧野之戰鳴條之危也數紂之罪若有凉德者武王之心又危於湯哉陳君舉具訓蒙士湯制官刑警于有位所謂三風十愆惟曰具訓于蒙士而已此正易所謂蒙利用刑人意也無心伐桀文王附書稱伊尹去亳適夏既醜有夏復歸于亳蓋伊尹耕於莘野既以處士從湯矣及其適夏非其私行也湯必與知之其君臣之心以為從湯伐桀以濟斯世不若使伊尹事桀以止其亂雖使夏不亡商不興無憾也及其不可復輔於是捨而歸爾其後文王事紂亦身為之三公至將囚而殺之然後棄之而西蓋湯之於桀文王之於紂其不欲遽奪之者如此此其所以為湯文王而後世之所不及也蘇轍因亳民以見忠厚之化湯之伐桀至於東征西怨南征北怨然亳民乃憚於興師必誓以必往而强其從者此見湯之忠厚化於亳邑故其伐桀不惟湯有黽勉不得已之意而亳民亦至於强而後從非其本心樂為是舉非湯之盛德何以及此不然則安史之亂幽陵之民至以安史為聖惟恐其事事不濟豈至强而後從哉盤庚不與民爭勝盤庚遷都作書三萹而心腹腎腸披露於其末豈前此猶有懷未盡乎曰古人相告語法如此也人方以吾為厲已而遽與之别白是非若將好勝然者是故撫諭慰釋以和其不平之心而未盡之意則徐待其定而後從陳傅良遷亳非强民盤庚之遷亳曰丕從厥志曰恭承民命蓋志者民之良心命者心之正理盤庚非從其情乃從其心也非順其事乃順其理也民之忿心不可禁遏盤庚告諭爾衆則曰罔伏小人之攸針自常情論之民不樂遷沮事之言惟恐聞之今乃使之無伏蓋民之忿心不當禁遏必使之發於語言乃可以漸消殺如秦之誹謗者族民不敢言而忿怒之心日長矣况曰針者盤庚之心豈以民言為悉不足聽舉事深恐下情壅塞蓋有㫖也吕祖謙法令恩意並用盤庚曰無有逺邇用罪伐厥死用德彰厥善盤庚責人以必遷之辭也又曰邦之臧惟汝衆邦之不臧惟豫一人有佚罰盤庚自咎而不咎人之辭也上兩言法令也下兩言恩意也商君之徒有法令而無恩意盤庚則賞罰並用蓋無下兩言則徒法不能以自行無上兩言則徒善不足以為政君民相愛憂民之憂者民亦憂其憂盤庚罔不惟民之承則憂民之憂矣而保后胥戚是民亦憂其憂也以貨飭臣非盛世事自盤庚有總於貨寶之戒至穆王之命伯冏復有惟貨其吉之戒成湯文武之隆未聞數數以貨飭其臣也噫其商周之衰乎髙宗用傅說說草野一匹夫耳一旦應高宗之求幡然居相位而不嫌髙宗慿一夕之夢即倚說以重任而不疑何也堯帝不知舜方且觀其刑於二女而又歷試以諸艱之事以堯觀之髙宗似失之略以髙宗觀之堯似失之過詳孔子曰參乎吾道一以貫之曾子曰唯顔淵問仁孔子曰克己復禮為仁顔子復請問其目曾子之以一唯悟道如髙宗之以一夢信說顔子以問目求仁如堯之以歷試舉舜二者本無二體夏葛冬裘各宜其時堯之舉舜顔之問目可謂詳審曾子之唯髙宗之夢可謂捷徑蓋舜四嶽所舉說髙宗自得之顔子問仁曾子則夫子自告之其理不可不深思也吕祖謙用傅說不可以常論嘗怪傅說以匹夫而登相位不由薦舉不由人望不由家世不由勳業不由資序而當世物論遂信之而不疑何哉嗚呼此不可以常情論也有髙宗有傅說則可君非髙宗臣非傅說則必有私意用人而不合於公議者矣漢文帝以夢得鄧通光武以䜟用王梁此豈足信哉後世用人者當如堯帝試舜斯可矣周公所論者世臣周公作君奭之書曰在武丁時則有若甘盤髙宗得一傅說而為商中興昭乎無以議為也而周公不取傅說而稱甘盤何耶蓋自古用人率由世選傅說雖足以當是責之重而世臣陵落已甚矣至誠感天灾異有二人君之過形見暴露然後出灾異以警懼之此無道之君與天地隔絶不通飛潜動植皆失其宜如是者灾異之應常遲賢君至誠與天地合為一體情性之差少有過失灾異立應如是者灾異之應常速高宗祭成湯而有飛雉之變以髙宗之為君豈其有異蓋髙宗恭默思道夢帝賚豫良弼精神與天地相通久矣又繼之以憲天之功德與天合故於祭祀之間略有過厚飛雉隨而應之此雖髙宗近厚之過過於厚亦過也吕祖謙夢得說髙宗思得賢於夢寐故朕兆先見亦不忘於夢寐之間今有人誠心下卜有禱輒應此理之常譬如明鏡物無不照亦非此往亦非彼來程頥周農事開國周家以農事開國今觀七月之詩日月星辰之運行昆蟲草木之變化凡感乎耳目者皆有以觸其興作之思是其心無一念之不在乎農也自于耜而舉趾自播榖而滌場所用非一器所業非一端私事方畢而公宫之役毋敢稽嵗功方成而嗣嵗之圖不敢後是一嵗之間無一日不専乎農也惟夫與婦惟婦與子各共乃事各任乃役是一家之內無一人不力乎農也織薄於秋求桑於春躬耕蠶績之勞以為衣服之計無所不至猶恐其未足也于貉為裘又有以相之食鬱及薁烹葵及菽偹果蔬之美以充耆老之養無所不至猶恐其未足也穫稻為酒又有以介之當時農之所耕者自有之田而上之人又從而崇奬勸諭之故斯民亦以為生之樂而勤敏和恱之氣浹于上下不見其有勞苦怨歎之狀朋酒羔羊升堂稱夀君民相與獻酬忘其為尊卑貴賤之殊真德秀民心念周拯救於文武涵養於成康勞來安集於宣王卒之民心固結牢不可解黍離之歌涕泗欷歔葵丘之㑹感激奮發此猶可也至於末年以盟向豫鄭而盟向之民不肯事鄭以陽樊豫晉而陽樊之民不肯事晉是知民心之不忍棄周雖衰微之後猶一日也享國長久昔周之興也禮以為本仁以為源自后稷以來至於文武成康其講禮也偹矣其施仁也深矣民習於耳目浹於骨髓雖後世微弱其民將有陵慢之志則畏先王之禮而不敢為將有離散之心則思先王之仁而不忍去此其所以享國長久也司馬光文武待臣之至鹿鳴之詩曰燕羣臣嘉賓是以臣為賓也伐木之詩曰燕朋友故舊是以臣為友也以臣為賓敬已至矣以臣為友敬益至焉故序詩者謂雖天子必須友以成得其指矣玩其詩止見其為人之求友而不見為君之求臣蓋先王樂道忘勢但知有朋友相須之義而不見有君臣相臨之分故也詩凡三章皆言燕樂之義三章曰既有肥羜以速諸父又曰既有肥牡以速諸舅諸父者朋友之同姓而尊者也諸舅者朋友之異姓而尊者也三章曰籩豆有餞兄弟無逺兄弟者朋友之同儕者也夫以天子之貴而尊其友曰父曰舅親其友曰弟曰兄此其為尊德樂道之至也夫此其所以為有周之盛也夫真德秀日夜整齊其民周之制民有罪惡未麗於法而害於州里者桎梏而坐諸嘉石重罪役之朞以次輕之其下罪三月役使州里任之然後宥而捨之其化之不從威之不格患苦其鄉之民而未入於五刑者謂之罷民凡罷民不使冠帶而加明刑任之以事而不齒於鄉黨由是觀之則周之盛時日夜整齊其民而鋤去其不善譬如獵人終日馳驅踐蹂於草茅之中搜求狐兔而搏之不待其自投羅網而後取也夫然小惡不容於鄉大惡不容於國禮樂之所易化而法禁之所易行者由此之故也不輕於用刑成周之時左右刑罰有五禁焉先後刑罰有五戒焉所以警民於未然之先者甚明也兩造之禁訟入束矢而後聽兩劑之禁獄入鈞金而後聽所以防民於將犯之際者甚著也至開其自新之塗篤其自反之念則嘉石之平圜土之教其施於已犯之後者尤切也刑乃所以教周之刑罰具見於周官大司徒以八刑紏民在三物教民之後而其所紏者不孝不睦不姻不弟不任不恤造言亂民而已是其刑祗以為教也真德秀周官不載學校之官周官三百六十而學校之官獨缺不載蓋以為統領於六官者皆法之所寓而學校非法守之職也周官法度必有關雎麟趾之意而後可以行周官之法度程皓用人無尊卑逺近嘗觀周公立政之書論文武得人之盛而至於夷微盧之蒸三亳版之尹皆有常之士而其選無異於三宅彼皆逺方也皆卑職也逺方非要地卑職非膴仕以天下之美材居之亦宜有所不安焉而莫之問何也有君如文武非棄材之主有臣如周公非蔽賢之相則逺之非踈之卑之非薄之也且夫周公大聖也天下所共知也而諸侯無伯則出為東伯六卿無宰則俯為冡宰畢公大賢也亦天下之所共知也而周公不沒則未得以為伯君陳不沒則未得以監商聖如周公而下缺人焉則降而為之不以為辱賢如畢公而上有人焉則淹而留之不以為恨天下不聖於周公而不賢於畢公者又何擇也陳傅良君臣相愛古者上下相親上之於下則曰駿發爾私終三十里惟恐民食之不給也下之於上則曰雨我公田遂及我私惟恐公田之不善也籍兵觀成周籍民兵之數然後知古人之不誘乎名自司徒籍民數而言則治田為八家可任者蓋二十人至於起徒役則毋過家一人耳自司馬籍兵數而言則一甸六十四井蓋出七十五人至於行兵則又毋過三十人耳夫實調者如此其寡而虛籍如此其衆先王何自而不逃乎其名也兵之在民寧籍而不用理財周官國用之制冢宰職之其權専也治財之官終其身而不易其位其任久也貢賦所入庫藏所出皆身親其勞府史胥徒無與焉其職勤也是三者天子言而附之所用之人不敢以茍簡倉卒而責辦也故成周之財國不告竭而民嘗有餘此其效爾待士辟雍之於樂菁莪之樂育觀樂之一辭古人養士之意何其厚也以三物教萬民而賓興之觀賓之一辭古人取士之意又何其厚也周禮春秋有功於周周自夷王已下寖衰寖微京師存乎位號而已然五六百年間綿綿延延不絶如線而諸侯卒不敢叛周者周禮在故也王室益弱諸侯日强又二百年亂臣賊子如麻然而畏未敢取周者春秋作故也自堯舜三代唯周得八百有餘年雖后稷公劉積德自逺實以二大典矣嗚乎周禮明王制春秋明王道可謂盡矣天報其仁太王不耻於失國而耻於失民心忍於辱己而不忍於鬭其民避狄去邠而子孫有天下者七百餘年天報其仁也范祖禹文王受命稱王為妄說書稱商始咎周以乘黎乘黎者西伯也西伯以征伐諸侯為職事其伐黎而勝也商人已疑其難制而患之使西伯赫然見其不臣之狀與商並立而稱王如此十年商人反晏然不以為怪其父師老臣如祖伊微子之徒亦默默相與熟視而無一言此豈近於人情耶由是言之謂西伯受命稱王十年者妄說也以紂之雄猜暴虐嘗醢九侯而脯鄂侯矣西伯聞之竊歎遂執而囚之幾不免死至其叛已不臣而自王乃反優游而不問者十年此豈近於人情耶由是言之謂西伯受命稱王十年者妄說也孔子曰三分天下有其二以服事商使西伯不稱臣而稱王安能服事商乎且謂西伯稱王起於何說而孔子之言萬世之信也由是言之謂西伯受命稱王十年者妄說也伯夷叔齊古之知義之士也方其遜國而去顧天下莫可歸聞西伯之賢共往歸之當是時紂雖無道天子也天子在上諸侯不稱臣而稱王是僣叛之國也然二子不以為非依之久而不去至武王伐紂始以為非而棄去彼二子者始顧天下莫可歸卒依僣叛之國而不去不非其父而非其子此豈近於人情耶由是言之謂西伯受命稱王十年者妄說也歐陽修善處君臣之間不蘄得民而民自歸之其勢可取而不取為商之民與為吾民何異臣人與為人臣亦何異故有君民之大德有事君之小心謝顯道視民如傷文王之視民如傷豈以𡨕冥之不可欺昭昭之不可犯哉幽明物我通為一體不見其有可傷之地吕祖謙挽人心以事商天下之生久矣尊卑之分不可易也而紂為之君夫紂誠君也文王誠臣也臣不可以加乎其君者理也而天下亦曰文王宜王夫文王固宜王也而文王之心則以為奚王也岐山之民王之民也江漢之民王之民也東海北海亦王之民也無王則無岐無江漢無東海北海而豫奚得以君之也今岐之民則曰是文王之仁也江漢之民則曰是文王之化也東海北海則曰是文王之養老也嗟乎我何有於天下而天下過知有我也已而虞芮不質成於商王而質成於我昆夷不遣聘於王而遣聘於我甚矣文王其無以謝天下也吾將有以率邠岐之民江漢之民東海北海之民與夫虞芮昆夷之聘而歸之王可也是故羑里之囚人皆以為文王之不幸也而文王則以為宜也我無以取信於君而得罪者宜也君奚過哉故易之書為明大分而作也自夫文王安於羑里之囚而不敢以過紂夷明養晦益堅事上之小心然後天下始曰文王聖人也聖如文王而且不敢過我何有哉是以當時之人怨不至於叛憤不至於激者皆文王以身挽之也吕祖謙勞逸讀無逸見文王之勞讀立政見文王之逸不自足羑里之囚若可憂也而從容於演易靈臺之成若可樂也而暇食之不遑太顛散冝生之徒若可用也而復以為無能往來茲迪彛教以人道使人於采薇見先王以人道使人至於後世則牛羊而已范祖禹涵養文王羑里之囚死生憂患之至矣而從容演易安時處順無異凝旒端冕南面而居蓋其平昔涵養之功正在事物變遷之際與之循習無所駭異也劉彥冲為商室係民心汝墳之卒章曰魴魚赬尾王室如燬雖則如燬父母孔邇蓋勞苦之極從而寬之曰王室雖如燬而文王在邇有以恤我也玩此詩則民心雖怨乎紂而尚以周之故未至於泮散也是文王以盛德為商之方伯與商室係民心而維宗社者也其德可不謂至乎張栻教化王化之所振蕩德教之所鼓舞四方萬里如在掌握閭巷匹夫如游庠序當時兔罝有好德之心武夫有干城之略江漢游女無犯禮之思汝墳婦人有勉正之義共歌於詩班班可考也武玉非聖人之言失之過東坡謂武王非聖人斯言過矣故其所言竊武盡美矣未盡善也之論而不察孔子之意蓋孔子止謂武王征伐不及舜之禪遜易曰湯武革命順乎天而應乎人詩曰武王有聖德故後世信孔子而不信東坡也既以武王非聖人而荀文若却言聖人之徒何哉武未盡善是聲音之失說者以征伐不及揖遜曰迹固不及然其聲音莭奏亦有未盡善者樂記曰有司失其𫝊也若非有司失其𫝊則武王之志荒矣孔子自衛反魯然後樂正雅頌各得其所是知未正之前不能無錯者程皓征伐非聖人所欲以言其德則韶武二樂皆盡美也蓋樂者德之華也以言其應世之事則武為未盡善蓋征伐非聖人之所欲也周孚先舜與武王同道揖遜之事天與之人與之征伐之義順乎天而應乎人也聖人豈有二心哉如冬日則飲湯夏日則飲水事固如此征伐之義固不如儀鳳之容然聖人豈以我所遇之時不如舜而私自己哉盡善盡美聖人之意豈不曰舜與武王同道謝顯道化天下昔武王既克商散財發粟使天下知其不貪禮下賢俊使天下知其不驕封先聖之後使天下知其仁誅飛廉惡來使天下知其勇如此則教化天下之實固已立矣天下聳然皆有忠信廉耻之心然後文之以禮樂教之以學校觀之以鄉射而謹之以冠昏喪祭民是以目擊而心諭安行而自得也知天下之勢武王不泄邇不忘逺仁矣乎曰非仁也勢也天下之勢猶一身一身之中手足病於外則腹心為之深思靜慮於內而求其病以療之二物腹心手足之相救非有待而後然故曰武王之不泄邇不忘逺非仁也勢也勢如此其急而古之君獨武王為然者何也人皆知一身之勢而武王知天下之勢也傾紂之否武王誓師之書必曰泰誓者乃否泰之泰紂時上下不交天下無邦武王大㑹諸侯以往伐傾紂之否故名篇以泰誓王安石憂無君天下不可一日無君也一日無君者周武王之憂亦伯夷之憂也武王憂今日之無君而伯夷憂後世之無君憂不同而君一也吾嘗讀泰誓之書未嘗不悲武王有無君之心也然武王之無君天下之有君也武王得無君之非而天下獲有君之幸以己之非而易天下之幸奚不可也而伯夷則不之恕也吾觀湯之慙未釋於伐夏之日而仲虺則釋之武自謂于湯有光而伯夷則非之何者湯無伯夷則慙而武王之臣皆虺故非也慙不見於湯則非必見於夷光未見於武則釋先見於虺湯之慙夷之非武之光虺之釋皆同此憂也無武之光無虺之釋則天下無善治無夷之非無湯之慙則天下無寧君吕祖謙急於聞道武王之始克商也訪洪範於箕子其始踐祚又訪丹書於太公可謂急於聞道者真德秀教化武王反商政之初釋箕子囚封比干墓式商容閭則君子賢其賢而親其親散鹿臺之財發巨橋之粟則小人樂其樂而利其利有心於教武王左仗黃鉞右秉白旄以麾釋者曰左手仗鉞示無事於誅右手秉旄示有心於教牧野之戰武王何心哉通道於九夷八蠻武王通道於九夷八蠻蓋蠻夷來王而其道自通非武王有意於開四夷而斥大境土也成王不以法待士大夫成王周官之告戒獨望之講學而法無與焉先王所以厲士大夫法設不用也不以學取人而徒法之恃賈誼所謂官徒遇之彼將官徒自為陳傅良為治有序內修外攘治之序也而成王黜商命滅淮夷乃始歸豐作周官何也境外之寇鄉鄰之鬭者也先修而後攘可也境內之寇同室之鬭者也苟不先治其鬭室可得而治乎武庚三監之伐近在肘腋實係王室安危而淮夷亦在封域之中聲勢相倚者也二患既除然後創制立法之事可興矣是固治之序也吕伯蒙得周公以輔養自古人君守成而致盛治者莫如周成王成王之所以成德由周公之輔養昔者周公傅成王幼而習之所見必正事所聞必正言左右前後皆正人故習與智長化與心成程頥關市之征文王之時關市譏而不征周公成王之時則關市有征矣至凶年然後弛之秦觀兵權不偏屬於一人昔成王將終命大臣相康王方是時掌兵權者太公望之子伋也宰臣召奭命作威南宫毛取二干戈虎賁百人子伋以逆嗣子伋雖掌兵非有宰臣之命不敢發也召公雖制命非諸侯將命以往伋亦不承也兵權散主不偏屬於一人可知矣胡安國躬行周公之訓周公作立政以戒成王使成王不能躬行周公之訓則言為徒言耳今觀周官之書如撫萬邦巡侯甸四征弗庭即立政詰爾戎兵方行天下之意也如立太師太傅太保而下即常伯常任凖人之意也如戒有官君子其爾典常作之師即其惟克用常人之意也尊所聞行所知成王所以日進於髙明光大之地歟司寇不言刑成王司寇之命不言刑而言掌禁者蓋治於已然不若沮於未然先王之立刑法惟恐天下之人入其中而不能自出故為之明示法禁使知有如是之罪必陷如是之刑人有懼心易避難犯此先王忠厚意也宣王備禦當周人有常言一身之內備風寒者不過幾處守要之說也宣王之時北有玁狁南有荆楚東有徐夷故城東方則仲山甫矣式南國則申伯矣奄北國則韓侯矣四夷已備其三異時犬戎之禍乃作於西以乘其不備之處狐鼠之巧於伺便乘隙從古然矣一隅不謹且遺後患况夷垣啓鑰以縱盜之入乎志足以立功大雅始於雲漢著其心也小雅始於六月著其功也編詩者之意以為有是心者然後有是功宣王惟其出此是以能挈天下之大器以就其能成之大功攘夷狄宣王之時薄伐玁狁至於太原太原周境也宣王之治戎狄不盡吾境不置也吕祖謙明文武之功業政事之修則欲如庶獄庶謹之勿誤器械之備則欲如爾戈爾矛之必飭謹微接下則必如遣使之禮樂側身修行則必如內治之憂勤遣將命帥隱然采薇枤杜之歌而還定安集之民猶其在懷保惠鮮之日凡為此者固將以紹文武立治之大經而措斯世於道化盛行之日也秦以得人興前世論者咸以山河之險秦得百二遂并天下地勢便利使之然也所以奉春進計田肯建言著之史牘千古稱善愚謂秦人之興有由然矣自伯翳至於秦仲率以立功克守其業而僻在岐雍諸侯以夷狄待之穆公之世得人而昌廣地開國悉由任賢之功矣百里奚亡虞之臣也而授以國政孟明奔軍之將也而委以師律引咎自責卒渡河西之地由余在戎公以為憂當其來聘也降千乘之尊接以殊禮坐則曲席食則傳器及其來歸以客卿待之故能益國十二闢地千里遂霸西戎而抗衡中國矣自後孝公增修穆公之德寤寐賢者列爵而尊之分土而豫之衛鞅以孽公子求見遂用其謀開阡陌急耕戰法行民便亦以稱霸後世克遵先軌范睢蔡澤離蔬釋蹻而取卿相任賢之術速於置郵卒能滅二周吞六國而并天下者用此術也且蘇秦反覆之臣燕王一聽其言合從山東秦人不敢出函谷者十五年以此思一賢之功堅於山河逺矣湯以亳武王以鎬而王天下其政何如哉百二之說於是為腐余元度不師古謂先王井田不足繼而開阡陌之議謂先王鄉遂不足復而發閭左之兵封禪之典謂先王禮儀不足以飭治也參夷之誅謂先王刑法不足以齊民也先王良法美意不復存自封建之法廢而郡縣則官無定守自井牧之法廢而阡陌則人無定業自什一之法廢而為大半之賦則民財竭矣自三日之役廢而為閭左之戍則民力盡矣其他良法美意掃地無餘不去肉刑三代法度秦盡變更獨不去肉刑安得不滅石安世失道非一日李斯佐始皇定天下不可謂不智扶蘇是始皇子秦人戴之久矣陳勝假其名猶足以亂天下而斯乃矯詔立胡亥殺扶蘇蒙恬夫蒙恬持重兵在外使不即受誅而復請之則斯髙無遺類矣以斯之智而不慮此何哉曰秦之失道有自來矣豈獨始皇之罪自商鞅變法以來以殊死為輕典以參夷為常法人臣狼顧脅息以得死為幸何暇復請方其法之行也求無不獲禁無不止鞅自謂軼堯舜而駕湯武矣及其出亡無所舍然後知為法之弊矣夫豈獨鞅悔之秦亦悔之矣荆軻之變持兵者熟視始皇環柱而走莫之救者以秦法重故也李斯之立胡亥不復忌此二人者知威令之素行而臣子之不敢請也二人之不復請亦知始皇之鷙悍而不可回也豈料其僞也哉周公曰平易近民民必歸之孔子曰有一言而可以終身行之者其恕乎夫忠恕為心而以平易為政則上易知而下易逹雖有賣國之奸無所投其隙倉卒之變無自發焉然令行禁止蓋有不及商鞅者矣而聖人終不以彼易此商鞅立信於徙木立威於棄炭禍其親戚師傅積威權之劇以及始皇秦人視其君如雷電鬼神之不可測也古者公族有罪三宥然後制刑今至使人矯殺太子而不忌太子亦不敢請則威信之過也故夫以法毒天下者未有不反中其身及其子孫者也東坡始皇天厭秦嬴政之有天下也始以利觜長距雞鬬六國而擅場復以鈎爪鋸牙虎噬萬方而擇肉終以多藏厚斂蠶食兆民而富國然後戍五嶺築阿房驅周禮之書盡赴回祿惑神仙之術但崇方士收大半之賦則黔首豆分用三夷之刑則赭衣櫛比鯨鯢國政螻蟻人命原膏野血風腥雨羶民厭秦也訴之於天天厭秦也授之於漢秦獨厭天厭民而自王乎詩書之道廢秦以山西鏖六國欲帝萬世劉氏一呼而關門不守武夫健將賣降恐後何耶詩書之道廢人唯見利而不聞義焉耳李泰伯以失士而亡秦人既一天下以為六國之餘士游談於齊之稷下客食於四公子之門家於薛養於燕者猶在也而不盡去是則無以弭患設重賞酷罰以致名士欲盡殺而後快而不知結軌連橫之徒又溢出而聚於豐沛之子弟耳餘之厮役報韓之黨大鄉之盜分裂四騖各茍富貴卒合而亡秦陳正齊又夫智勇辨力此四者天民之秀傑也類不能惡衣食以養人皆役人以自養也故先王分天下之富貴與此四者共之此四者不失職則民靖矣四者雖異先王因俗設法使出於一三代以上出於學戰國至秦出於客漢以後出於郡縣吏魏晉以來出於九品中正隋唐至今出於科舉雖不盡然取其多者論之六國之君虐用其民不減於始皇二世然當時百姓無一人叛者以凡民之秀傑者多以客養之不失職也其力耕以奉上皆椎魯無能為者雖欲怨叛而莫為之先此其所以少安而不即亡也始皇初欲逐客用李斯之言而止既并天下則以客為無用於是任法而不任人謂民可以恃法而治謂吏不必才取能守吾法而已故墮名城殺豪傑民之秀異者散而歸田畝向之食於四公子吕不韋之徒者皆安歸哉不知其槁項黃馘以老死於布褐乎抑將輟耕太息以俟時也秦之亂雖成於二世然使始皇知畏此四人者有以處之使不失職秦之亡不若是速也蘇軾焚坑之謬李斯獻䇿始皇用之燒經書焚學士謂可以杜異見息訕謗矣然沛公一起言太公兵法運籌决勝者張良也說下秦將使敵和者陸賈也收圖籍薦大將撫根本者蕭何也陳奢靡取亡之戒者樊噲也將思歸之士出南鄭定三秦者韓信也脫挽輅言建都陳山河百二之利者婁敬也自餘如參陵平勃之徒莫不以材智䇿烈為漢宗臣計其生時秦子楚尚未得華陽夫人也或伏於胥吏困於卒伍屠狗販繒寄食乞憐姓名不聞而往往已有蹀血咸陽爼醢祖龍之志矣始皇既不得而坑之方且虞心非巷議之人治偶語非今之罪是猶大川泛溢壞堤橫決而區區於增土石窒罅漏不亦愚之甚哉史謂秦愚黔首夫黔首固多愚不待秦而後愚也其不愚者非秦之所能愚也然則滅仁義之塗絶諌說之辨以一身而讎疾四海之人將以遏其口屈其心至於賊疾而不知刃迫而不見是則自愚而已胡寅以術留天下智者或可與取天下矣而不可與守天下守天下則必有大度者也何者非有大度之人則常恐天下之去我而以術留天下以術留天下而天下始去之矣自周失其政諸侯用事而秦獨得山西之地不過千里韓魏壓其衝楚脅其肩燕趙伺其北而齊掉其東秦人被甲持兵七世而不得解寸襲尺取至始皇然後合而為一秦見其取天下如此其難也而以為不急持之則後世且復割裂以為敵國是以墮名城殺豪傑銷鋒鏑以絶天下之望其所以偹慮而固守之者甚密如此然而海內愁苦無聊莫有不忍去之意是以陳勝項籍因民之不服長呼起兵而山澤皆應由此觀之豈非其重失天下而防之太過之弊歟蘇轍吏不肖昔秦人之趣亡非一道也而其若是太甚者吏不肖也吾觀始皇之初陋三代之封建其弊至於戰國髖髀相依以蹙王室故夷其城而郡縣之其慮誠逺也既而天下之吏習於嬴氏之暴斬刈剝啄草菅其民而斃之重之以頭㑹之斂閭左之徭又重之以阿房驪山土木之役當時之吏非殘忍侵漁病民以逢其君者則貪釁幸灾不逞之人也於是民之欲亡秦者十户而八九矣關東之豪投袂而起一呼響應毛奮而鱗集戮力以傾秦人者不可勝計烏合之師所至如破竹者大抵皆郡馘其守縣俘其令以應之者也不然則吏為自全之計挈地以賂敵而市一旦之命者也又不然則談士掉三寸之舌𫝊檄而風靡者也而孰為秦守哉其間黨秦之惡不肯遽臣妾者如三川之守田四川之守社南陽之守錡亦欲驅欲潰之民疾鞭而戰之不敗而塗地則亦為降虜而已亦奚救於秦之斃耶秦以虎狼之强尺攻寸取以吞天下一夕有變三十六郡皆無人之墟子嬰之席未暖天下為漢何也秦人之憂素不及吏也知儒之不可殺爰自亡秦以詐力自私始以儒者為不切於用雖然彼固惡之也亦有所忌而未敢誦言殺之也種瓜函谷設穽驪山以秦氏之暴虐殘鷙欲殺則殺之耳何至委曲紆餘如此意者恐天下以殺儒議已而始先為自文之也如是則於儒生雖然能殺而亦深自知其不可殺也已羣書考索續集卷五十四
