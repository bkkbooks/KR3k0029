  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0029_WYG_071-1a, image: WYG0937/WYG0937-0065c.png}
body:
  text: 羣書考索後集卷五宋章如愚編官制門三公類夏商以前云三公無官伊尹曰三公調隂陽周以太師太傅太保曰三公記曰三公無官古有其人然後充之舜之於堯伊尹之於湯周公召公之於周是也或説司馬主天司徒主人司空主土是為三公漢以丞相大司馬御史大夫為三公後漢以太尉司徒司空為三公天地災變即皆册免自太尉徐防始焉靈帝就長安拜張溫為太尉三公在外自溫始也魏晉宋齊梁陳後魏北齊皆以太尉司徒司空為三公宋志云三公之職太師居首晉帝名師故置太宰以代之後周以太師太傅太保為三公司徒為卿隋以太尉司徒司空為三公唐因之理道要缺宋治平二年詔自今皇子及宗室早屬除檢校師傅言隨其遷序改授三公仍俟加恩改授元祐令太尉司宰司空為三公三師三師太師太傅太保古官殷太甲時伊尹為太保紂時胥餘為太師見漢儀注又記曰虞夏商周有師保疑丞成王作周官立太師太傅太保兹為三公尚書逸禮三公為太師周公為太傅召公為太保前漢承秦制闕三公之位吕后以王陵為太傅陵免官省平帝元始元年始置太師太傅太保金印紫綬太師位在太傅上太保次太傅漢百官表漢志傅保在三公上號曰上公初學記明雖天子必有所師六典東漢以後常曰上公初學記其後或置或廢大抵無所統職晉初依周備三公三公之職太師居首景帝名師故置太宰以代之宋百官志宋太師太傅太保為三公訓護人主道以德義天子加拜以不臣之禮非其人則缺宋書南齊唯置太傅南齊百官志至後魏特稱三師以正其名正一品然非道德崇重則不居其位無其人則缺之六典後齊多循後魏置太宰太傅太保是為三師隋百官志近代陳多以為贈官六典後周改為三公六典及注隋髙祖既受命置三師三公三師不主事不置府僚蓋與天子坐而論道者也隋百官志煬帝即位廢三師官隋百官志唐太師太傅太保各一人是為三師唐百官志其或親王自拜者但存其名耳六典及注宋之制以太師太傅太保為三師太祖時符彥卿為太師李彝興自守太傅為太尉髙保融自守太保為太傅元祐令太師太傅太保為三師三公之官尤重太師趙韓王以勳文潞公以年方得之此二年不拜自司空五遷至太師王文正公吕文靖公皆任相二十年才以太尉致仕可見宋朝重太師之官也政和二年詔曰太師太傅太保此古三公之官為宰相之任今為三師然古無三師之稱合依三代為三公官不必備惟其人為真相之任若除三公即為宰相靖康末詔依元豐故事以僕射為宰相三公止為階官不復與三省之政焉職略三少周以少師少傅少保為三孤二公𢎞化寅亮天地弼豫一人通典曰此三官名曰三孤孤特也言卑於公尊於卿特置此三人書微子殷既錯天命微子作誥公師少師佐少師孤卿秦漢而下省前漢百官公卿表太師太傅太保為三公又立三少為之副少師少傅少保是為三孤與六卿為九焉後漢百官志太傅天子燕業反其學左右之習詭其師合諸侯遇大臣不知文雅之辭已語之適簡聞少誦不博不習此少師之責也天子居處出入不以禮衣服冠帶不以制御服列側不以度采服從好不以章忿恱不以義與奪不以節此少傅之責也天子居處燕私安而易樂而取飲食不時醉飽不節寢起早晏無常玩好器弄無制此少保之責也後周置三孤以二三師宋初沿唐制置三師以太尉司徒司空為三公元豐肇新官制於三師三公無所改政和二年詔司徒司空周六卿之官非三公之任乃今之六曹尚書是也太尉秦官居主兵之任亦非三公太尉司徒司空並罷依周制三孤之官乃次輔之任或稱三少為次相之任通典續會要檢校官唐有檢校官宋之制檢校官一十九三公三師六左僕射至水部郎共十三元豐官制行左僕以下皆為職事官故罷之凡三師三公除授自司徒遷太保太保遷太傅太傅遷太尉太尉遷太師檢校官亦如之續會要政和二年罷太尉司徒司空以少師少傅少保為三少後亦置檢校官紹興七年士裊檢校少師錢忱檢校少保宰相黃帝置六相謂得蚩尤而明天道得太常而察地理得蒼龍而辨東方得祝融而辨南方得風后而辨西方得后土而辨北方謂之六相堯有十六相虞舜臣堯舉八愷使主后土以揆百事莫不時敘地平天成舉八元使布五榖於四方內平外成謂之十六相並通典殷湯有左右相以伊尹為右相以仲虺為左相宋百官志武丁得傅説爰立作相王置諸其左右書説命篇周成王有左右相召公為保周公為師相成王為左右亦其任也秦悼武王二年始置左右丞相官以樗里疾甘茂為左右丞相茂為左疾為右史記莊襄王又以吕不韋為丞相及始皇立尊吕不韋為相國則相國丞相皆秦官也金印紫綬掌丞天子助理萬幾秦初有左右荀恱曰秦本次國命卿二人是以置左右丞相無三公官至二世復有中丞相漢髙帝即位置一相緑綬髙帝三年拜曹參為假左丞相即漢初丞相當有左右今言一丞相或漢書之誤以蕭何為之及誅韓信乃拜何為相國何薨以曹參為之孝惠髙后置左右丞相文帝二年復置一丞相月俸六萬初陳平為左丞相及誅諸吕文帝初立平乃謝病以讓周勃乃以勃為以丞相位第一平為左丞相位第二勃免平專為左相武帝用劉屈氂為左丞相分官局為兩府虛其名以待四方之選成帝綏和元年御史大夫何武建言宜建三公官定卿大夫之任分職授政以考功效於是上拜曲陽侯王根為大司馬而何武自御史大夫改為大司空皆金印紫綬比丞相則三公俱為宰相哀帝復罷大司空元夀二年更名丞相為大司徒初漢制常以列侯為相惟公孫𢎞布衣數年登相位武帝乃封為平津侯其後為故事至丞相而封自𢎞始也通典漢東京不復置宋百官志後漢廢丞相及御史大夫而以太尉司徒司空總理衆務則三公復為宰相矣獻帝建安十三年復置丞相而以曹公居之又有相國魏黃初元年改丞相為司徒文帝復置中書監令並掌機密自是中書多為樞機之任復置大丞相第一品後又有相國齊王以司馬師為之髙貴鄉公以司馬昭為之吳有左右丞相晉惠帝永寧元年罷丞相復置司徒趙王倫篡位以梁王彤為丞相永興元年以成都王穎為丞相愍帝建興元年以琅琊王睿為左丞相南陽王保為右丞相三年以保為相國睿為丞相其後或有相國或有丞相省置無常而中書監令常管機要多為宰相之任元帝渡江以王敦為丞相轉司徒荀組為太尉以司徒官屬并丞相為留府敦不受成帝以王導為丞相罷司徒府以為丞相府導薨罷丞相復為司徒府宋孝武帝初唯以南郡王義宣為丞相而司徒府始如故亦有相國丞相金章紫綬進賢三梁冠絳朝服佩山玄玉相國則緑盩綬也齊不用人以為贈官齊職儀相國緂綬衮冕服梁罷相國置丞相罷丞相置司徒陳又置相國位列丞相上并丞相並為贈官自魏晉以來宰相但以他官參掌機密或委知政事者則是矣無有常官其相國丞相或為贈官或則不置自為尊崇之位多非人臣之職其真為宰相者不必居此官通典相國丞相秩萬石後魏舊制有大將軍不置太尉有丞相不置司徒自正光以後始俱置之北齊乾明中置丞相河清中分為左右各置府僚然而為宰相秉持朝政者亦多為侍中趙彥琛元文遙和士開同為宰相皆兼侍中後周恭帝三年初行周禮建六官有大冡宰亦其任也靜帝二年置左右丞相大象二年以楊堅為大丞相遂罷左右丞相官文帝自大丞相代後周遂置內史納言即中書令侍中是為宰相亦有他官參預焉柳述為兵部尚書掌機事又楊素為右僕射與髙熲專掌朝政並通典唐世宰相名尤不正初以三省長官中書令侍中尚書令共議國政此宰相職也其後以太宗嘗為尚書令臣下避不敢居其職由是僕射為尚書省長官與侍中中書令號為丞相品位既崇不欲輕授常以他官居宰相職而假以他名唐百官志如同中書門下三品及平章事知政事參知機務參與政事及平章軍國重事之名是也通典自太宗時杜淹以吏部尚書參議朝政魏徴以袐書監參預朝政其後或曰參議得失參政知事之類其名非一皆宰相職也貞觀八年李靖以疾辭位詔疾小瘳三兩日一至中書門下平章事平章之名蓋始於此其後李績以太子詹事同中書門下三品者謂同侍中中書令也而同三品之名蓋起於此然二名不專用而他官居職者猶假他名如故自髙宗以後為宰相者必加同中書門下三品而張文瓘以東臺侍郎同東西臺三品同三品入銜自文瓘始武后龍朔二年改侍中為左相中書令為右相尚書僕射為立政後復改易摘竒自先天之前其員頗多景龍中至十餘人開元以來常以二人為限或多則三人初三省長官議事於門下省之政事堂其後裴炎自侍中遷中書令乃徙政事堂於中書省開元中張説為相又改政事堂號中書門下列五房於其後一曰吏房二曰樞機房三曰兵房四曰户房五曰刑禮房分曹以主衆務焉宰相事無不統故不以一職名官自開元以後常以領他職雖欲重其事而反輕宰相之體故時方用兵則為節度使時崇儒學則為大學士時急財用則為鹽鐵轉運使又其甚則為延資庫使至於國史太清宫之類其名頗多皆不足取法故不著其詳矣五代史後唐長興四年樞密使馮贇加平章事以其家諱改同中書門下一品周顯德中樞密使吳廷祚亦以家諱改焉宋沿唐舊制其命相必曰同中書門下平章事即真拜侍中者不復言平章事然國初止除范質趙普外是亦未嘗除人纍朝因仍三省長官尚書中書令侍中僕射不與政皆為空官特以寓祿秩位品而已元豐三年神宗肇新官制以左右僕射為宰相左揆兼東臺王文恭圭為左相兼門下侍郎右揆兼西臺蔡忠懷確為右相兼中書侍郎行之三十年政和間更左揆曰太宰右揆曰少宰而以三師三公是謂真相是時蔡魯公京以太師為公相宣和王黼以太傅總三省之事靖康末詔依元豐故事復為僕射何􅙫初除是命左右僕射必兼門下中書侍郎建炎三年吕頥浩言被旨將元祐中司馬光建請併省奏召侍從參詳宰臣乃不兼兩省侍郎中書門下侍郎並為參知政事而復祖宗之舊為同中書門下平章事職略中興會要乾道七年詔丞相總齊百揆贊襄治道事無不統而僕射之官名實未稱宜倣周漢之制明年改尚書左右僕射為左右丞相其侍中中書尚書二令官制雖存皆設而不除可並刪去以左右丞相充其位中興會要宰屬檢正宋熙寧三年中書門下言奉旨議中書創置士人為屬官伏以中書統治百官以佐天子政事而所置吏屬尚仍舊制宜髙選士人稍依先王設弼置輔之意今欲置檢正五房公事一人逐房各置檢正公事二人並以朝官充或用京兆官若選人即為習學公事見宰相參政如常朝官之禮檢正五房在提點之上逐房檢正與提點序官在堂後官之上職官分紀官制行罷之其職歸左右司焉四朝志建炎三年以軍興多事文移培增再置中書門下檢正諸房公事二員序位在左司上次年罷紹興二年復置一員中興會要左右司隋煬帝三年尚書都司置左右司郎中各一人品同諸曹郎從五品掌都省之職通典唐武德省貞觀復置掌副左右丞所管諸司事二十四曹呼左右司為都公國史補龍朔改為左右承務咸享中復為左右司郎中武后又增員外郎各一人與郎中分掌曹務永昌三年置神龍初省後復置朝服與諸司員外郎同唐職官志六典注宋朝以為階官元豐正名始實有職掌左右司郎中各一人左右司員外郎各一人題名凡四員掌舉諸司之綱紀號為都司亦曰左右曹焉職略建炎三年以置檢正減左右司二員明年復會要隆興元年從右諌議大夫王大寶等議詔左右司郎官各差一員減罷二員二年詔以左司書擬吏戶禮機速房右司書兵刑上賞功房文字孝宗會要後以右司掌刑房事任為劇乃置二員中興題名參知政事後魏古弼太武時為尚書令參知政事隋蘇威髙熲宇文述等參預朝政唐劉洎張文瓘皆參知政事魏徴杜淹參預朝政蕭瑀參議朝政崔仁師等參知機務此其始也摘竒劉洎貞觀十三年尚書右丞以黃門侍郎參知政事李義府永徽六年中書舍人守中書侍郎參知政事盧承慶顯慶四年度支尚書參知政事張文瓘乾封二年東臺舍人參知政事宋乾德二年太祖已相趙普畏其專相擇官以為副而難其名稱召陶榖問曰下丞相一等有何官對曰唐有參知機務參知政事今可用之遂命薛居正吕餘慶為參知政事惟不宣制不押班不知印不升政事堂止令就宣徽院使廳上事殿廷别設磚位於宰相及敕尾書銜降相數字月俸雜給皆半之此乾德之制也至開寶六年詔押班知印及祠祭行香今宰相趙普與參知薛居正等輪知雍熙四年御史言文德殿常朝百官皆有磚位惟參知政事每遇橫行參假未有磚位詔令依位排砌至道元年詔參政宜與宰相分日知印押正衙班其磚位先異宜合而為一遇宰相使相視事及商議軍政事並得升都堂先是吕端冦凖並為諌議大夫參知政事至是端相而凖尚參知政事端慮凖不平且言臣兄餘慶任參知政事日悉與宰相同願舉行之特從其請次年準既罷詔只令宰相押班知印參知政事遇正衙橫行參假並重行兾位非議軍國政事不得升都堂祠祭行香書敕並依開寶詔書元豐官制罷知政事以門下中書侍郎尚書左右丞為執政職略建炎二年吕頥浩請將元祐司馬光併省奏召侍從參議孫覿等請以門下中書侍郎並為參知政事而減罷尚書左右丞焉中興會要樞密院樞密院唐代宗永泰中置內樞密使馮鑑續事始以宦者為之初不置司局但有屋三楹貯文書而已其職掌惟承受表奏於內中進呈若人主有所處分則宣付中書門下施行而已吕源明家孰廣記代宗永泰中宦官董廷秀參掌樞密事憲宗元和中劉光琦梁守謙為樞密使穆宗初年以宦官知樞密事舊左右軍容多入為樞密不著三間轄書匱而已亦無視事之廳後禧昭時楊復恭西門季玄欲奪宰相權乃於堂狀後帖黃指揮公事此其始也續通典後梁革唐世宦官之弊改樞密院為崇政院命敬翔為使始更用士人其備顧問參謀議於中則有之未始專行事於外也五代史唐莊宗同光元年復以崇政院為樞密院命宰臣郭崇韜兼使又置院使一人然權侔宰相矣五代會要晉髙帝天福中以桑維翰知樞密院事四年廢樞密院以劉處謙兼樞密每有奏議多不稱旨及處謙丁內憂乃以樞密使印付中書門下遂廢其院晉少帝開運元年復置以宰臣桑維翰兼使周顯德六年范質王溥並參知樞密院事五代會要宋樞密院與中書對持文武二柄號為二府太祖建隆元年以魏仁浦吳延祚為樞密使趙普為副使周末闕副使至是始置太宗太平興國四年以石熙載為樞密直學士以簽書院事簽書之名始此淳化二年以張遜知院事溫仲舒冦凖同知院事同知院之名始此英宗治平中以郭逵同簽書院事同簽書之名始此舊制樞密院有使則置副使有知院則置同知會要如置知院則當為副使者皆改同知若置使則同知復改為副使神宗熙寧元年文彥博吕公弼為使韓絳邵亢為副使時陳升之三至樞密府神宗欲稍異其禮乃以為知院於是知院與副使並置矣元豐改官制議者欲廢密院歸兵部神宗曰祖宗不以兵柄歸有司故專命官統之互相維制不從然以樞密聮職輔弼非出使之名乃定置知院同知院二人餘悉置職事亦多所釐正細務分𨽻六曹專以邊機兵政為職而契丹國信民兵牧馬猶總領焉中興初有知院張浚同知院富直柔簽樞張守同簽樞韓肖胄不置樞密使副使髙宗紹興七年詔依故事置樞密使及副使其知院同知院簽書並如舊中興會要副使自嶽飛罷後無有除者樞密使五代置樞密使國初因之詳見樞密院太祖建隆三年趙普為檢校太尉充樞密使不帶正官充使自普始也開寶九年曹彬為樞密使領忠武軍節度使樞密帶節度自彬始也太宗太平興國六年石熙載為户部尚書充樞密使以文資政官充使自熙載始也真宗祥符五年王欽若陳堯佐並守本官檢校太傅同中書門下平章事充樞密使儒臣以樞密使兼使相自欽若等始也此事見宋朝職略仁宗皇祐五年樞密使髙若訥罷令舍人院草詞樞密使免罷不降麻自若訥始也神宗元豐官制行罷使副髙宗紹興七年復置會要副使自嶽飛後無有除者宰相兼樞密國初魏仁浦以宰相兼樞密使後罷仁宗慶厯二年西方用兵富弼屢言邊事係國安危不當專委樞密宜使宰相兼領於是以宰相吕夷簡判樞密院事章得象兼樞密使王舉正言二府均體總制之名太重亦改夷簡兼樞密使五年從賈昌朝陳執中之言罷兼樞密使以邊事寧故也髙宗紹興七年令宰臣張浚兼樞密使趙鼎秦檜亦以左僕射兼二十五年檜薨明年詔曰比緣軍興令宰相兼樞密使典掌機務今邊事已定可依祖宗故事更不兼領中興會要二十三年孝宗即位參政史浩論樞密合使宰相兼使事因引富弼對仁宗故事上曰正合朕見詔宰臣依舊兼樞密使孝宗會要淳熙間省知樞密院事晉天福元年掌書記桑維翰以翰林學士尚書禮部侍郎知樞密院事知院之名始此分紀國初不置淳化二年樞密使王顯出鎮始以張遜知樞密院事元豐官制行廢使副存知院中興初宰相兼樞密只兼知院此事見建炎四年詔同知樞密院事五代有參知樞密院事見樞密沿革國初闕淳化二年王顯出鎮始以溫仲舒冦凖同知樞密院事同知之名始此會要神宗元豐官制行廢使副存同知簽書樞密院事國初缺至太平興國四年石熙載元懿公以樞密直學士僉書之名始此會要後又有同僉書大抵以處資淺之人若僉書一經親祠方進同知及副使若武臣擢預國政只除同僉書治平中郭逵除同僉書元豐官制行並罷哲宗元祐初復置僉書事四朝志後多帶端明殿學士初除必降旨恩例並依執政蓋本條不同執政者自同本條故也見淳熙重定樞屬樞密都副承旨五代有承旨副承旨以諸衛將軍充宋太宗太平興國中以楊守一充都承旨都承旨自守一始也是時都承旨副承旨多用士人比僚屬事參謀議真宗後天下無事稍稍遂用吏人歐陽修建言請復舊制不克神宗熙寧三年始以東上閣門使李評為樞密都承旨李綬為之副不用院吏而更用士人自評始也續會要熙寧五年以尚書比部員外郎集賢校理同修起居注曽孝寬為起居舍人充史館修撰兼都承旨先是或用士人亦止於右職中選用文館兼領自孝寬始也元豐三年用張誠一為客省使都承旨自是都承旨復用武臣續會要哲宗元祐中復以文臣帶待制充都承旨職官制元符中王師約為都承旨左司諌陳瓘論神考以文臣為都承旨其副則參用武臣之可用者今師約據文臣之位甚非神考設官之意至崇寧以後則專用武臣矣四朝志髙宗建炎四年以辛道宗為副承旨紹興元年詔依元祐職制置都承旨一員差兩制中興會要檢詳神宗熙寧四年以編修經武要略官王存四人檢詳樞密院諸房文字視中書檢正官會要十年詔以二年為任元豐元年詔定置二員及改官制檢詳尋罷建炎中樞密院請依祖宗置檢詳二員在左右司下髙宗紹興二年詔樞密院已置都承旨一員減檢詳一員二年樞密院請置二員從之中興會要三十二年詔樞密院諸房令檢詳書擬從左右司請也孝宗會要編修仁宗慶厯四年史館王洙承旨單士寧編修例册編修之名自此始分紀神宗熙寧三年以館職王存顧臨等同編經武要略兼刪定諸房例册哲宗元祐四年詔樞密院條例久未編修又自官制後舊事𨽻他司所存者亦未刪正命承旨司取索編修以奉議郎蔡駰宣德郎衛規充編修官續會要舊以四員為額髙宗紹興兵興裁省其半三年樞密請置檢詳二員編修止存一員後復中興會要羣書考索後集卷五
