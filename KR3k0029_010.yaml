body:
  text: 羣書考索卷十宋章如愚撰諸子百家門諸子類家語孔子家語者皆當時公卿士大夫及七十二弟子之所咨訪交相對問言語也後序始皇之世李斯焚書而孔子家語與諸子同列故不見滅髙祖克秦悉斂得之皆載於二尺竹簡多有古文字及呂氏專漢取歸藏之其後被誅亡而孔子家語乃散在人間好事者或各以意增損其言故使同是一事而輒異辭孝景皇帝末年募求天下禮書于時京師士大夫皆送官得呂氏之所𫝊孔子家語而與諸國事及七十子辭妄相錯雜不可得知以付掌書與曲禮衆篇亂簡合而藏之祕府元封之時吾仕京師切懼先人之典辭將遂泯滅於是因諸公卿大夫私以人事募求其副悉得之乃以事類相次撰集為四十四篇又有曽子問禮一篇自别屬曽子問故不復録其諸弟子書所稱引孔子之言者本不存乎家語亦以其已自有所傳也是以皆不取也將來君子不可不鑑同上按班固藝文志孔子家語二十七篇顔注云非今所有家語則以肅之所注者在可疑也館閣書目國語戰國策孔衍春秋後語司馬彪九州春秋左丘明采録前世穆王以來下訖魯悼智伯之誅邦國成敗嘉言善語隂陽律呂天時人事逆順之數以為國語其文不主於經故號曰外傳所以包羅天地探測禍福發起幽微章表善惡者昭然甚明實為經藝並陳非特諸子之倫也左丘明既為春秋內傳又稽其逸文纂其别說分周魯齊晉鄭楚吳越八國事起自周穆王終於魯悼公列為春秋外傳國語合為二十一篇自古名儒賈逵王肅虞翻韋耀之徒並申以注釋治其章句此亦六經之流三傳之亞暨縱橫互起力戰爭雄秦兼天下而著戰國策其篇有東西二周秦齊燕楚三晉宋衛中山合十二國分為三十二卷孔衍又為春秋後語除二周及宋衛中山其所留者七國而已始自秦孝公終於楚漢之際此則春秋亦盡二百四十餘年之行事漢司馬彪又録漢事因為九州春秋尋其統體亦近代之國語也左氏國語其文深閎傑異固世之所耽嗜而不已也而其說多誣淫不槩於聖余懼世之學者溺其文采而淪於是非是不一有知字得由中庸以入堯舜之道本諸理作非國語栁文作非國語序爾雅張晏漢藝文志注云爾近也雅正也魏張揖上廣雅表言周公著爾雅一篇三朝記哀公曰寡人欲學小辨以觀於政可乎孔子曰爾雅以觀於古足以辨言矣是知周公所作也今俗所傳爾雅三卷或言仲尼所增或言子夏所益或言叔孫通所補陸德明釋文云釋詁蓋周公作邢昺疏云釋詁一篇相承以為周公作但其文有周公後事故先儒共疑焉漢藝文志爾雅二十篇今為十九篇郭璞注陳涉博士孔鮒撰小爾雅十三章甲衍詁訓張揖廣雅三篇今逸唯廣雅音存隋曹憲因張揖廣雅附作音解更為十篇避煬帝諱改廣為博雅今存十卷李商隱以蜀語為蜀爾雅李俶書目劉溫潤採托羌虜之言以華音釋之為羌爾雅宋朝嘉祐中神宗朝陸佃因進對論物性進說魚說本二篇自是益加論撰成埤雅二十卷以館閣書目修西漢郭威謂爾雅周公所制而爾雅有張仲孝友張仲宣王時人非周公之制明矣劉歆嘗以問楊子雲子雲曰孔子門徒游夏之徒所記以解釋六藝者也劉向以謂外戚傳稱史佚教其子以爾雅爾雅小學也又記言孔子教魯哀公學爾雅爾雅之出遠矣舊學者皆云周公所記也張仲孝友之類後人所足耳西京雜記若言胡不承權輿及緇衣之席兮此秦康鄭武之詩在周公之後明矣疏歐陽公本義亦謂爾雅非聖人之書考其文理乃是秦漢之間學詩者纂集說詩博士解詁之言爾周公倡之於前子夏和之於後自爾以後世罕得聞至漢武帝時濟南人終軍既辨豹文之鼠人服其博物故爭相傳授爾雅之業於是遂顯其後雖注者十餘家猶未詳備陸德明叙録犍為文學注二卷劉歆注三卷樊光注六卷李巡注三卷推此五家而已又五經正義援引有某氏謝氏顧氏今郭氏言十餘千典籍散亡未知誰氏然皆未詳夫爾雅者先儒授教之術後進索隱之方誠傳法之濫觴為經籍之樞要者也夫混元闢而三才肇位聖人作而六藝斯興本乎發德於衷將以納民於善洎夫醇醨既異步驟不同一物多名繁方俗之語片言殊訓滯今古之情將使後生若為鑽仰繇是聖賢間出詁訓遞陳周公倡之於前子夏和之於後蟲魚草木爰自爾以昭彰禮樂詩書盡由斯而紛郁然又時經戰國運歷挾書傳授之徒浸微發揮之道斯寡諸篇所釋世罕得聞惟漢終軍獨深其道豹鼠既辨斯文遂隆其後相傳乃可詳悉其為注者則有犍為文學劉歆樊光李巡孫炎雖各名家猶未詳偹惟東晉郭景純用心幾二十年注解方畢甚得六經之旨頗詳百物之形學者祖焉最為稱首其為義疏者則俗間有孫炎髙璉皆淺近俗儒不經師匠今既奉上敕校定考按其事必以經籍為宗理義所詮則以景純為主爾雅小雅漢書藝文志有爾雅又有小雅唐藝文志有郭璞注爾雅又有李軌解小雅廣雅唐藝文志張揖廣雅四卷博雅唐藝文志曹憲博雅十卷李文成博雅志十三卷唐藝文志雜家類也埤雅宋朝陸佃作續爾雅唐藝文志劉伯莊續爾雅邢昺爾雅疏成平四年上子思名伋孔子孫著書二十三篇漆雕子名啓後孔子弟子著書十三篇宓子名不齊字子賤孔子弟子著書十六篇景子著書三篇說宓子語似其弟子李克子夏弟子魏文侯相著書七篇晏子齊大夫晏嬰按漢志云晏子八篇隋志云晏子春秋七篇今館閣書目云晏子春秋十二卷或以為後人採嬰行事而為此書故其書卷頗多於前志方晏子伏莊公尸哭之成禮然後去豈所謂見義不為無勇者邪至其諫說犯君之顔此所謂進思盡忠退思補過哉假令尚在余雖為之執鞭所欣慕焉史記諡平仲相齊景公孔子稱善與人交有列傳師古曰有列傳者謂太史公書曽子參南武城人字子輿少孔子四十六嵗志存孝道故孔子因之以作孝經與其弟子公明儀樂正子之徒論述立身孝行之要天地萬物之理今十篇自修身至天圓皆見於大戴禮蓋後人托出而為曽子荀子荀卿趙人名况方齊宣王威王之時聚天下賢士於稷下尊寵之若鄒衍田駢淳于髠之屬甚衆號曰列大夫皆世所稱咸作書刺世是時荀卿為秀才年五十始求游學諸子之事皆以為非先王之法也荀卿善為詩禮易春秋至齊襄王時而荀卿最為老師齊尚修列大夫之缺而荀卿三為祭酒焉孟子者亦大儒以人之性善荀卿後孟子百餘年荀卿以為人性惡故為性惡一篇以非孟子趙人名况唐楊倞注分舊十二卷三十二篇為二十卷按史記初况以讒適楚為蘭陵令應聘諸侯卒不用退老蘭陵楚人尊師之著書數萬言宋朝撰削荀子疵一卷韓愈讀荀子曰考其辭時若不醇粹要其歸與孔子異者鮮矣抑猶在軻雄之間乎余欲削荀氏之不合者附于聖人之籍亦孔子之志也魯仲連子魯仲連子齊人也好竒偉俶儻之畫策而不肯仕宦齊欲爵之魯連逃隱於海上史記十四篇藝文志齊人以談說遊諸侯不願於仕宦退隱海上著此書藝文志孔叢子孔叢子陳涉博士孔鮒撰一名盤盂取其事雜也又益以連叢二篇合為二十三篇田蚡傳曰學盤盂孔甲諸書揚子揚雄字子雲蜀郡成都人也本傳實好古而樂道其意欲求文章成名於後世以為經莫大於易故作太元傳莫大於論語作法言史篇莫大於倉頡作訓纂針莫善於虞針作州針晉灼曰九州之針也賦莫深於離騷反而廣之辭莫麗於相如作四賦皆斟酌其本心與放依而馳騁云本傳雄見諸子以知舛馳大抵詆訾聖人雖小辨終破大道故時人有問雄常用法應之者以為十三卷象論語號曰法言文中子隋王通所與門人答問薛收姚義集而名之曰中說唐杜淹為序宋朝阮逸注宋咸以文中悉模論語句迹仲尼事且謂李靖陳叔達房魏諸公未嘗師事作過文中子又為駁中說凡二十二事共十卷王福畤記正觀初杜淹問王凝曰子聖賢之弟也有聞乎仲父曰凝亡兄嘗講道於河汾亦嘗預於斯六經之外無所聞也淹曰昔人咸有記焉蓋薛收姚義綴而名之曰中說兹書天下之昌言也微而顯曲而當旁貫大義宏闡教源門人請問之端文中行事之迹則備矣子盍求之家仲父曰凝以喪亂以來未遑及也退而求之得中說一百餘紙大抵雜記不著篇目首卷及序則蠧絶磨滅未能銓次十九年仲父被起為洺州從事又以中說授豫曰先兄之緒言也余再拜曰中說之為教也務約致深言寡理大其比論語之記乎孺子奉之無使失墜因而辨類分綜編為十篇百家類儒家儒家者流蓋出於司徒之官助人君順隂陽明教化者也游文於六經之中留意於仁義之際祖述堯舜憲章文武宗師仲尼以重其言師古曰祖始也述修也憲法也章明也宗尊也言以堯舜為本始而遵修之以文王武王為明法又師尊仲尼之道於道最為髙孔子曰如有所譽其有所試師古曰論語載孔子之言也言於人有所稱譽者則試以事取其實效也譽者戈於反唐虞之降殷周之盛仲尼之業已試之效者也然惑者既失精微而辟者又隨時抑揚違離道本師古曰辟讀曰僻茍以譁衆取寵師古曰譁衆也寵尊也譁呼華反後進修之是以五經乖析儒學寖衰此辟儒之患漢藝文志儒者所以助人君明教化者也聖人之教非家至而戶說故有儒者宣而明之其說大抵本於仁義及五常之道黃帝堯舜禹湯文武咸由此則周官太宰以九兩繫邦國之人其四曰儒是也其後陵夷衰亂儒道廢闕仲尼祖述前代修正六經三千之徒並受其義至于戰國孟軻子思孫卿之流宗而師之各有著述發明其指所謂中庸之教百王不易者也俗儒為之不顧其本苟欲譁衆多設問難便辭巧說亂其大體致令學者難曉故曰博而寡要隋經籍志諸儒並見前類道家道家者流蓋出於史官歷記成敗存亡禍福古今之道然後知秉要執本清虛以自守卑弱以自持此君人南面之術也合於堯之克讓易之謙謙一謙而四益此其所長也及放者為之則欲絶去禮學兼棄仁義曰獨任清虛可以為治漢志道者蓋為萬物之奧聖人之至賾也易曰一隂一陽之謂道又曰仁者見之謂之仁知者見之謂之知百姓日用而不知夫隂陽者天地之謂也天地變化萬物蠢生則有經營之迹至於道者精微淳粹而莫知其體處隂與隂為一在陽與陽不二仁者資道以成仁道非仁之謂也智者資道以為智道非智之謂也百姓資道而日用而不知其用也聖人體道成性清虛自守為而不侍長而不宰故能不勞聰明而人自化不假修營而功自成其𤣥德深遠言象不測先王懼人之惑置于方外六經之義是所罕言周官九兩其三曰師蓋近之矣然自黃帝以下聖哲之士所言道者傳之其人世無師說漢時曹參始薦蓋公能言黃老文帝宗之自是相傳道學衆矣下士為之不推其本茍以異俗為髙狂狷為尚迂誕譎怪而失其真矣管子管夷吾者穎上人也既用任政於齊齊桓公以霸九合諸侯一匡天下管仲之謀也史記本傳吾讀管氏牧民山髙乘馬輕重九府詳哉其言之也管仲世所謂賢臣然孔子小之豈以為周道衰微桓公既賢而不勉之至王乃稱霸哉語曰將順其美匡救其惡故上下能相親也豈管仲之謂乎史記弟子職一篇應劭曰管仲所作在管子書前藝文志春秋尊王不尊霸與中國不與夷狄始乎平王避夷難也是王室遷而微也見于周書文侯之命微王也是王者失賞也費誓善其備夷是諸侯之正也秦誓專征伐是諸侯之失禮也書春秋合體而異世也書以文侯之命終其治也春秋以平王東遷始其微也自東遷六十五年春秋無晉以其亡護亂也及其滅中國之國而後見其行事譏失賞也周之微也幸不夷其宗稷齊桓之功也其中國無與加其盛也其夷狄無與抗其力也見於衛詩美其存中國也春秋無與辭何異也存一國之風無其人則衛夷矣全王道之正與之霸是諸侯可專征伐也夫晉之為霸也異齊逺矣桓正文譎夫桓之為正抑夷狄存中國文之為譎陵中國微王室晉之風也無美其美無功其功外無他人雖國人不與也然而桓之正非王道之正也以文譎而桓正也桓之功非王道之功也以攘狄而存周也無桓周滅有周桓賊桓卒齊衰楚人滅周周之不幸桓之早死也故曰周之存桓之功也桓之不幸管仲之早死也故曰桓之功管仲之力也自是楚滅諸國而熾矣今得其著書然後知攘夷之功皆遠略也儒譏霸信刑賞豈王者詆民哉霸嚴政令豈王者怠忽哉霸鄉方略豈王者不先謀哉霸審勞佚豈王者暴師哉霸謹畜積豈王者使民不足哉亦時夷狄內聘大者畏威小者懷仁功亦至矣不幸名之不止然奈衰世何孔子曰微管仲吾其披髮左祍矣此其據也老子楚人也姓李氏名耳字伯陽諡曰𣆀周守藏室之史也孔子適周問禮於老子老子見周之衰乃遂去至關關令尹喜曰子將隱矣強為我著書於是老子乃著書上下篇言道德之意五千餘言而去莫知其所老子百有六十餘嵗或言二百餘嵗以其修道而養壽世之學老子者則絀儒學儒學亦絀老子道不同不相為謀豈謂是邪並出史記莊子䝉人也名周嘗為䝉漆園吏與梁惠王齊宣王同時其學無所不窺然其要本歸於老子之言故其著書十餘萬言大抵率寓言也戰國時䝉人莊周撰其㫖宗於老子晉郭象注唐成元英又為之疏列子者鄭人也名禦冦與鄭繻公同時其學以黃帝老子為宗自言師壺丘子林而友伯昏無人列子書舊二十篇西漢劉向去重復存者八篇列子蓋先莊子及莊子著書多取其言二子之道一也抱朴子葛洪元帝時著書不輟其自序曰世儒莫信神仙之書故儒所言黃白之事名曰內篇其餘駁難通釋名曰外篇自號抱朴子洪博物深洽江左絶倫太公二百三十七篇姓呂名望為周師尚父本有道者或有近出又以為太公術者所增加也漢藝文志孫子武齊人也以兵法見於吳王闔廬見史記作孫子十六篇藝文志隂陽家隂陽家者流蓋出於羲和之官敬順昊天歷象日月星辰敬授民時此其所長也及拘者為之則牽於禁忌泥於小數舍人事而任鬼神漢志天文天文者序二十八宿步五星日月以紀吉凶之象聖人所以參政也易曰觀乎天文以察時變然星事殛悍非湛密者弗能由也夫觀景以譴形非明王亦不能服聽也以不能由之臣諫不能聽之主此所以兩有患也漢藝文志天文者所以察星辰之變而參於政者也易曰天垂象見吉凶書稱天視自我人視天聽自我人聽故曰王政不修謫見于天日為之蝕后德不修謫見于天月為之蝕其餘孛彗飛流見伏陵犯各有其應周官憑相掌十有二嵗十有二月十有二辰十日二十有八星之位辨其叙事以㑹天位是也小人為之則指凶為吉謂惡為善是以數術錯亂而難明矣歷譜歷譜者序四時之位正分至之節㑹日月五星之辰以考寒暑殺生之實故聖王必正歷數以定三統服色之制又以探知五星日月之㑹凶厄之患吉隆之喜其術皆出焉此聖人知命之術也非天下之至材其孰與焉道之亂也患出於小人而强欲知天道者壞大以為小削遠以為近是以道術破碎而難知也歷數者所以揆天道察昏明以定時日以處百事以辨三統以知厄㑹窮理盡性而至於命者也易曰先王以治厯明時書叙朞三百有六旬有六日以閏月定四時成嵗春秋傳曰先王之正時也履端於始舉正於中歸餘於閏又曰閏以正時時以序事事以厚生生民之道其在周官則亦太史之職小人為之則壞大為小削遠為近是以道術破碎而難知五行五行者五常之形氣也書云初一曰五行次二曰敬用五事言進用五事以順五行也貌言視聽思心失而五行之序亂五星之變作皆出有律歷之數而分為一者也其法亦起五德終始推其極則無不至而小數家因此以為吉凶而行於世寖以相亂漢志五行者金木水火土五常之形氣者也在天為五星在人為五藏在目為五色在耳為五音在口為五味在鼻為五臭在上則出氣施愛在下則養人不倦故傳曰天生五材廢一不可是以聖人推其終始以通神明之變為卜筮以考其吉凶占百事以觀於來物觀形法以辨其貴賤周官則分在保章馮相卜師筮人占夢視祲而太史之職實司總之小數者才得其十粗便以細事相亂以惑於世隋志法家法家者流蓋出於理官信賞必罰以輔禮制易曰先王以明罰飭法此其所長也及刻者為之則無教化去仁愛專任刑法而欲以致治至於殘害至親傷恩薄厚漢志法者人君所以禁淫慝齊不軌而輔於治者也易著先王明罰飭法書美明于五刑以弼五教周官司冦掌建國之三典以佐王刑邦國詰四方司刑以五刑之法麗萬民之罪是也刻者為之則杜哀矜絶仁愛欲以威劫為化殘忍為治乃至傷恩害親處子九篇師古曰史記云趙有處子藝文志遊棣子一篇藝文志燕十事十篇藝文志商子戰國時公孫鞅撰史記言鞅少好刑名之學嘗讀商君開塞耕戰書與其子相類今其書具存韓子韓非者韓之諸公子也喜刑名法術之學而其歸本於黃老非為人口吃不能道說而善著書與李斯俱事荀卿斯自以為不如非非見韓之削弱數以書諫韓王韓王不能用故作孤憤五蠧內外儲說林說難十餘萬言然韓非知說之難為說難書甚具終死於秦太史公曰老子所貴道虛無因應變化唯無為故著書辭稱微妙難識莊子散道德放論要亦歸之自然申子卑卑施之於名實韓子引繩墨切事情明是非其極慘徼少恩皆原於道德之意而老子深逺矣史記季子名悝相魏文侯富國强兵作季子三十二篇出藝文志申子申不害京人也故鄭之賤臣學本於黃老而主刑名著書一篇號曰申子史記相韓昭侯終其身諸侯不敢侵韓師古曰京河南京縣藝文志􅏯錯穎川人也學申商刑名於軹張恢生所本傳􅏯錯鋭於為國逺慮而不見身害贊作書三十一篇藝文志慎子戰國時慎到所撰四十二篇務刑名之學申韓稱之藝文志名家類名七家三十六篇名家者流蓋出於禮官古者名位不同禮亦異數孔子曰必也正名乎名不正則言不順言不順則事不成此其所長也及譥者為之則茍鈎軱析亂而已漢志名者所以正百物叙尊卑列貴賤各控名而責實無相僣濫者也春秋傳曰古者名位不同節文異數孔子曰名不正則言不順言不順則事不成周官宗伯以九儀之命正邦國之位辨其名物之類是也拘者為之則苛察繳繞滯於析辭而失大體出隋志公孫龍子戰國時公孫龍撰為堅白之辨假物取譬冀時君感悟而正其名實焉鄧析二篇鄭人與子産並時師古曰列子及孫卿並云子産殺鄧析據左傳昭公二十年子産卒定公九年駟㪜殺鄧析而用竹刑則非子産所殺也藝文志惠子一篇名施與莊子並時墨家墨六家八十六篇墨家者流蓋出於清廟之守茅屋采椽是以貴儉養三老五更是以兼愛選士大射是以上賢宗祀嚴父是以右鬼順四時而行是以非命以孝視天下是以上同此其所長也及蔽者為之見儉之利因以非禮推兼愛之意而不知别親疏漢志墨者强本節用之術也上述堯舜夏禹之行茅茨不翦糲梁之食桐棺三寸貴儉兼愛嚴父上德以孝示天下右鬼神而非命漢書以為本出清廟之守然則周官宗伯掌建邦之天神地祗人鬼肆師掌立國祀及兆中廟中之禁令是其職也愚者為之則守於節儉不達時變推心兼愛而混於親疏也隋志墨子宋大夫墨翟撰其說貴儉兼愛尚賢明鬼非命尚同藝文志云墨子七十一篇今自親士至雜守為六十一篇亡節用節葬明鬼非樂非儒等九篇從橫家從橫十二家百七篇從橫家者流蓋出於行人之官孔子曰誦詩三百使於四方不能顓對雖多亦奚以為又曰使乎使乎言其當權事制宜受命而不受辭此其所長也及邪人為之則上詐諼而棄其信從橫者所以明辨說善辭令以通上下之志者也漢書以為本出行人之官受命出疆臨事而制故曰誦詩三百使于四方不能專對雖多亦奚以為周官掌交以節與幣巡邦國之諸侯及萬姓之聚導王之德意志慮使辟行之而和諸侯之好達萬民之說諭以九稅之利九儀之親九牧之維九禁之難九戎之威是也佞人為之則便辟利口傾危變詐至於賊害忠信覆邦亂家隋志鬼谷子周時髙士姓名不聞以其所隱自號鬼谷先生蘇秦張儀事之受以捭闔分其書三卷蘇子三十二篇蘇秦者周雒陽人師習鬼谷先生夫蘇秦起閻閭連六國從親此其智有過人者史記張子十篇張儀魏人嘗與蘇秦俱事鬼谷先生學術三晉之權謀之士夫言從衡强秦者大抵皆三晉之人也夫張儀之行事甚於蘇秦然世惡蘇秦者以其先死而儀振暴其短以扶其說成其衡道要之此兩人真傾危之士哉史記羣書考索卷十
