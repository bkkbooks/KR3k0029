body:
  text: 羣書考索後集卷四十二宋章如愚編兵制門用將周武王尊太公為尚父以致牧野之勝周禮王六軍大國三軍次國二軍小國一軍軍將皆命卿春秋時楚圍宋晉侯將救之於是乎搜于被廬作三軍謀元帥趙說曰郤縠可臣亟聞其言矣說禮樂而崇詩書君其試之乃使將中軍終勝楚于城濮趙李牧為將守邊以便宜置吏市租皆輸入幕府為士卒費日擊牛享士軍功爵賞皆决於外遂破胸奴秦與趙戰長平趙欲以趙奢之子為將藺相如曰王以名使人若膠柱而鼓瑟耳奢子與其父言兵事奢不能難然不謂善其母問奢奢曰兵死地而易言之趙以為將破趙必矣其母上書具言且以為此兒為將東向而朝軍吏無敢仰視王所賜金帛視便利田宅買之願勿遣王不聽遂與秦戰敗悉坑之漢與項羽爭天下蕭何薦韓信為大將異時與信論將信曰陛下能將十萬臣多多益辦帝曰多多益辦何以為我禽對曰陛下不善將兵而善將將文帝時周亞夫屯細柳備胡帝欲勞軍而不得入詔開壁門亞夫以軍禮見天子改容成禮而去後帝語景帝曰卒有緩急亞夫可將七國反亞夫平之初胸奴大入朝那關文帝問馮唐安得頗牧以為將也唐曰古之遣將跪而推轂曰閫以內者寡人制之閫以外者將軍制之委任責成不從中御故牧乃得盡其智今竊聞魏尚守雲中市租盡以給士出私養錢胸奴逺避敵曽一入所殺甚多上功幕府首差六級文吏以法繩之由此而言雖得頗牧不能用也帝恱是日即赦魏尚復為雲中守武帝時李廣程不識俱為名將然廣無部伍行陳人自便幕府省文書而不識正部曲行伍營陳軍不得休息士卒多樂廣而苦不識武帝見大將軍青不離側蘇建亡軍歸青不敢致之法而卒歸之帝以為不敢擅誅於外以風人臣之不敢専權其後驃騎所將常選而宿將乃流落不耦也光武之於諸將每能包容宥其小失雖馬武斟酌於前面折同列帝反以為歡祭遵為軍令光武舍中兒犯法遵殺之光武曰吾舍中兒犯法尚殺之必不赦諸軍也三國諸葛亮治蜀馬謖以違節度敗流涕斬之晉馬隆討羌戎聽其自募勇敢令其自至武庫選仗又給三年軍資遂有秦凉唐太宗收攬英雄如尉遲敬德之出於降虜李靖出囚繫有以勸厲而感激之以就事功其詔李靖曰兵事節度皆付公吾不從中治也唐自開元以後以中宫監軍每選精鋭自隨憲宗時命髙崇文將兵討劉闢杜黃裳請不置監軍不淹時遂擒劉闢宋初任將甚久李漢超之在關內十七年郭進在山西凡二十餘年李謙漙在隰州凡十年董遵誨在通逺軍凡十四年方太祖時征蜀之役王全斌以貪暴聞則貶抑之至於江南已平之後而始還其旌鉞曹彬獨無所汚則自客省使超授宣徽南院使義成節度使以賞之郭進在山西有軍校訟進不法太祖遣中使送之進又江南之征命曹彬為大將潘美副之太祖賜之劒曰副將而下有犯罪卿當斬之美悚懼三代而上兵權散主有扈之師六事咸在牧野之戰三卿同出常武曰王命卿士南仲太祖太師皇父整我六師王謂尹氏命程伯休父左右陳行則是皇父整師尹氏佐令程父出征則兵無専將殆及叔世司馬世官爰以命氏馴至諸侯更伯大夫藏甲春秋書帥師譏専臣也自後兵皆常聚帥多世守兵之所在權則歸之漢世太尉相國列為三公城門領兵得如五府是故諸吕謀難必先監軍平勃交歡勢不相下武帝置大司馬以尊寵將帥以冠諸軍大臣之權尤偏重於將矣用兵成周大司徒周知人民之數五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賔此平居無事之時為然也小司徒會萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役此用於有事之時然也以周禮司馬法考之王有四方之事則冡宰召師于諸侯小宰掌其戒具虎賁奉書以牙璋發之則畿兵不輕出也劉文公平丘之會對晉人曰天子之老請帥王賦元戎十乘蓋可略見自秦以爵級誘天下開其戰鬪之門卒有自焚之災漢制間有近古民有常兵而無長征之勞國有常備而無聚食之費南北二軍未嘗輕出見前當是時故將之家亦唯給賦宰相之子均調戍邊是以繇有復算有减更有貸則得為君上之恩御軍之法簡肅嚴明雲中上功差首六級賞典輒格屯田上奏不越旬日璽書即報輪臺之哀敗亡不掩其制亦可槩見矣又其召發各以其方備敵則上郡隴西北地事越則會稽豫章擊朝鮮則齊遼東開西南夷則巴蜀移兵赴逺不過一再蓋古人調兵各從其方之便髙宗伐楚蓋裒荆旅武王克商實用西土之士至於征徐以魯追貊以韓平淮以江漢略見於經可考也齊威東討陳濤唯及江黃北入山戎亦因燕衆蓋猶節制之師也秦泗上亭長而送徒驪山陳涉楚卒而逺戍漁陽自東都已不復前制南北二軍交騖於境見前而王旅非復鎮衛之職盜起一方而羽檄於三邊順帝永和中興兖豫四州之卒以擊象林萬里征行此李固所以憤惋也自漢以後制之善莫善於唐兵寓於民固已近古然畨上宿衛或取諸數千里之外在人情固難以久行而器用糧糗亦其自備此豈足以傳逺不恃張說而騎兵不得置矣然唐初戰勝攻克太宗所以撫馭士卒者猶可略見平定城邑府庫無所私多與士卒共之間有殁於行陳則斂而藏之甚者祭以太牢人莫不感泣而盡力也唐李光弼與安太清戰有禆將援矛刺賊者又有不戰而却者光弼召援矛者賜之絹不戰者斬之於是諸軍爭奮而賊衆大敗國朝我宋太祖平蜀收其精卒置川班後以訴南郊賞給斬其四十人而廢班雄武兵白晝略人於市至殺數百輩而後止衛士之無賴則冶鐡以錮其頸太祖嘗曰撫養爾輩士卒不吝爵賞苟犯吾法唯有劒耳其於太原之班師則謂將士曰爾輩吾腹心爪牙吾寧不得太原豈忍令害爾輩康定初文彥博言將權不可不重兵法不可不峻國朝著令禁軍將校有過則從中覆可施之平時將不重權軍不峻法將何以制上嘉納之時西鄙用兵有臨陳而先退者故公有是請教閲周初太公曰教戰之法必明告吏士申三五之令教其操兵起居進止旌旗指麾大司馬中春教振旅以旗致民平列陳如戰之陳辨鼓鐸鐲鐃之用以教坐作進退疾徐疏數之節遂以搜田中夏教苃舍辨號名之用遂以苗田中秋教治兵如振旅之陳辨旗物之用遂以獮田皆如搜田之法中冬教大閲修戰法虞人為表百步則一為三表又五十步為一表田之日司馬建旗于後表羣吏以旗物鼓鐸鐲鐃各帥其民而致質明弊旗誅後至者乃陳車待如戰之陳遂以狩田周禮皆於農隙以講事比年簡車卒正三年簡徒羣牧五載大簡車徒此先王立武之大略也刑法志宣王因出獵而選車徒齊內政春田曰搜以振旅秋田曰獮以治兵晉文公搜于被廬作三軍吳王闔閭以孫武為將武以宫人試勒兵以二寵姬為隊長三令五申而左右皆笑武斬二隊長王不可武曰將在軍君命有所不受王知孫子能卒以為將漢興設南北軍之外命天下郡國選能引强蹶張材力武猛者以為輕車騎士材官樓船常以立秋後郊禮畢斬牲於東門以薦陵廟肄孫吳兵法六十四陳每月都課試金革騎士各有員數如有兵警平地用車騎山阻用材官水泉用樓船孝文納朝錯之策以為軍之勝負定於內有事則可以應於外頗祖周司馬法齊寄政之制後漢立秋之日自郊禮畢始揚威武斬牲于郊東門名曰貙劉兵官皆肄孫吳兵法六十四陳名曰乘之魏書曰漢承秦制三時不講惟十月車駕幸長安水南門會五營士為八陳名曰乘之此京師教試之法也郡國材官騎七八月太守都尉令長丞相尉會都試課殿最不好為樓船亦習戰射行船邊郡太守各將萬騎行障寨州郡縣教試之法也漢文帝射戎服親御鞍馬從六郡良家子材官之士馳射上林講習戰陳是時朝錯云士不選練卒不服習起居不精以之應敵百不當十並西漢刑法志曰漢以歲時𨽻修武備至元帝時以貢禹議始罷角抵而未正治民振旅之事漢光武見翟義反隗囂叛皆以秋試勒軍騎誅守長以起事是以建武六年罷郡國都尉無都試之法唯京師𨽻兵如故靈帝中平五年以天下黃巾賊起大發四方兵講武耀兵於平樂觀獻帝建安二十一年有司奏古四時講武按漢西京承秦制三時不講唯十月都試今金革兵戈未偃士衆素習可無四時講武但以立秋擇吉日大朝車騎號曰閲兵上合禮名下承漢制是冬閲兵魏王曹操親執金鼓以令進退延康元年曹丕嗣魏王其年秋閲兵于郊公卿相儀王御華蓋親令金鼓之節魏明帝太和元年十月閲兵於東郊晉武帝太始四年九月咸寧元年太康四年六年冬皆自臨宣武親大閲習衆軍然不自令進退自惠帝以後其禮遂廢東晉元帝詔左右衛及諸營教習旅大習儀太興四年成帝咸和中詔內外諸軍戲兵於南郊之場故其地因名閲場自後藩鎮桓庾諸方伯往往閲習然朝廷無事焉宋文帝依故事肄習衆軍兼用漢魏之禮其後以時講武於宣武堂已上晉志宋志後魏明帝永興五年以九月十月之交親行貙劉之禮孝成帝和平三年因歲除大儺遂耀兵示武更為制令步兵陳於南騎士陳於北各擊鐘鼓以為節度其步兵所衣青赤黑黃别為部隊楯弰矛㦸相次周回轉易以相赴就飛龍騰蛇之變為函箱魚鱗四門之陳凡十餘法跪起前却莫不應節陳畢南軍北軍皆鳴鼓角衆盡大譟各令騎將六千人去來挑戰步兵更進退以相拒擊南敗北捷以為威觀自後以為常北齊常以季秋皇帝講武於都外有司先芟菜野為堪為二軍進止之節輿駕停觀遂命將教衆為戰陳之法隋大業七年征遼東衆軍將發御臨朔宫親授節度唐髙祖武德中講武于同宫太宗習射殿庭又閲武于城西髙宗顯慶二年十一月二十一日講武於􅓳水之南行三驅之禮上設次於尚書臺以觀之顯慶五年三月八日又講武於并州城北上御飛閣羣臣臨觀之武太后聖歷二年欲以季冬講武有司延入孟春時王方慶上疏孟春講武是行冬令請至明年孟冬教習以順天道從之𤣥宗開元初講武新豐先天二年講武驪山五代承唐衛兵未嘗訓練宋朝太祖首議教閲擊刺騎射嘗令步騎數百挽强彀弩視其進退發矢如一喜曰此殿庭間數百人耳猶兵威可觀况堂堂之陳數萬成列乎建隆初選天下驍騎集闕庭親御近郊閲武自是飛山嶽臺之駕新池玉律之幸曽無虛歲建隆三年上謂近臣曰晉漢以來衛士不下數十萬然可用者極寡朕須按籍而閲之去其冗弱又親校其擊刺騎射之藝令悉為精鋭故順時令而講武焉長編建隆四年四月出內庫錢募諸軍子弟數千人鑿大池於京城之南引蔡水注之造樓船百艘選精卒號水虎捷習戰池中命神武上將軍陳承昭督其役上遣使者行詣諸道選擇精兵凡其材力技藝有過人者皆收𨽻禁軍聚之京師以備宿衛厚其糧賜居常躬自教閲訓練皆一以當百諸鎮皆自知兵力精鋭非京師之敵莫敢有異心者太宗興國二年幸西郊講武臺大閲諸軍南北綿亘二十里建五色旗鼓於前崔翰執金鼓按旗指蹤六師如一軍容甚整上登臺就觀大恱以金帶賜翰奬之上曰晉朝之將無如崔翰者蓋言晉室將帥不得其人而軍政隳紊也太平興國九年上親閲諸軍參考勞績升絀之上曰兵雖衆苟不簡閲即與無兵同先帝訓練之方咸盡其要朕因講習漸至精鋭儻統帥得人何敵不克太平興國九年幸金明池觀習水戰曰示不忘戰爾至道中閲武於便殿真宗祥符中罷兵之後並依常於農隙教戰蓋安不忘戰古之道大中祥符三年上謂王旦曰諸軍校習武藝或云未益於事朕以為射騎馳突要其習熟至於旗幟之用大為軍容亦師之耳目誠不可闕祥符六年詔在京師諸軍選江淮習水卒於金明池按試戰掉立為水虎翼軍置營于側其江浙淮南諸州亦令凖此選卒置營初太祖立神衛水軍及江淮平定不復振舉上以兵備不可廢故復置焉環慶張繼勳言本路軍士閲習與京師不同望令赴殿前司觀教之法真宗曰戰陳之事量山川形勢教以兵法臨陳而用之各禀主帥之命若與京師同法似非便也又咸平二年大閲東郊又作文武七條武臣有曰訓習簡閲英宗治平元年閲諸軍班將校武藝擢授有差上諭天武右第三軍都指揮使竇州刺史王秀曰爾藝雖不中格而嘗有戰功故以爾為正刺史又諭散直都虞侯胡從曰爾藝雖不中格而治兵齊肅故以爾為內園使命殿前副都指揮使郝質戒諸軍勤習武藝支諸軍班錢長編神宗熙寧二年樞密院言廂軍近已團結教閲武藝欲給威邊指揮請以州軍大小定人數自三百人至百人仍改軍額淮南曰壯武江南曰雄武荆湖曰靜江兩浙曰崇節福建曰保節並加教閲二字於軍額上從之同上熙寧五年詔以涇原路蔡挺衙教陳隊於崇政殿引見仍頒其法於諸路先是上善其法故頒焉同上四月庚戌朔詔殿前司馬步諸軍令巡教使臣春秋分行校試射親人等給銀牒及令兵房檢詳官置簿考校以多少定殿最取㫖舊制諸軍教閲每指揮給一兩銀牒一射中者共分之所得既微無以激勸欲命遍賜宜定殿最長編燕逹為馬軍副指揮使神宗閲武騎患未精逹謂躬自巡教悉為精鋭又采諸葛亮李靖遺意成五陳法授之以教戰事略熙寧八年五月河北第八副將臧景言馬射六事詔景即武學召殿前馬軍司教押馬軍使臣以所陳六事并下五路經略司及將官依此教習馬軍六事者一曰順鬃直射二曰背射三曰盤馬射四曰射親五曰野戰六曰輪弄景各為說以曉習射者長編元豐六年二月己酉詔燕逹王淵取一軍合用久將案試營陳先是上親以古兵法製九軍營陳凡出戰下營互變分合作止進退方圓尖直𨽻習皆盡其妙至是命燕逹按試同上哲宗元祐元年二月庚申殿前馬步軍司言凖朝㫖相度到髙翔上言乞依舊教閲御陳事欲於教陳日與新陳日相兼詔遇教陳隔日更互教習所有元豐七年六月甲申指揮勿行先是神宗置九軍營陳為方圓曲直鋭凡五變為五陳遂罷教習御陳至是復以舊陳互教長編高宗建炎三年六月上諭宰執欲親閲武宰臣奏祖宗時不忘武備如鑿金明池蓋欲習水戰上已遊幸必命衛士馳射因而激賞亦所以賞武上曰朕亦久命諸將各閲所部人馬以别能否當召卿等共觀之紹興三年十二月辛亥司封員外郎鄭士彥奏國以兵故强兵以教故精孔子曰以不教民戰是謂棄之甚言其教之不可廢也恭唯國家方承平之際禁軍教習之法最嚴且密况當艱虞之時其可忽諸方今諸州軍往往冗占樁留實妨教閲大抵以將迎為急務而以教習為虛文伏望深詔有司參酌祖宗成法申嚴而行之每州遴選兵官三兩員専主教習庶責任嚴而成效速歲終則較其精粗而賞罰之如此則兵精而國振矣詔劄與諸路帥司措置施行紹興三年四月上曰大將統軍尤當訓練軍士為先使五兵利而但優拙要在身率之也若娛女色縱耳目之欲居多暇日何以當委寄之重也聖政孝宗乾道二年十一月甲子車駕幸候潮門外大教場進早膳畢次幸白石教場獨摘進呈三司軍馬總管殿前司王祺主管馬軍司李舜舉主管步軍司陳敏率將佐等恭導聖駕幸白石皇帝登臺舉黃旗軍衆皆呼萬歲騎軍打圍舉白旗三司軍皆出舉紅旗向臺合圍聽一金止就圍地作圓形立射生官兵隨鼓聲出射再一金止舉黃旗皆就臺下獻所獲有旨慰勞錫賚諸將戰馬金帶以及士卒賞皆有差時久隂曀皇帝出郊雲霧解駁風日開霽史臣贊曰夀皇聖帝之志未嘗一日而忘中原也是以二十八年之間練軍實除戎器擇將帥選士卒所謂武備者無所不講白石之搜隆冬出郊親御鞍馬夫豈徒為文具而已故臣敢因斯事以推明聖志之所嚮焉聖政淳熙四年八月壬申樞密院奏已降指揮令諸州軍有御前屯駐或分屯軍馬去處將見教閲禁軍差官部轄附大軍一就教閲所有不係駐劄并分屯軍馬州軍其禁軍自合逐州教閲竊慮因而廢弛理冝申飭詔令諸路帥司行下所部州軍守臣嚴行責委兵官將見管禁軍精加教閲不則差官前去校試如有武藝退惰具當職官姓名按劾施行聖政開寶通禮有四時講武之儀太宗嘗築臺於楊村以備大閲真宗亦嘗闢場東武發卒會射自景德以後崇文治士大夫耻以軍旅為言逮仁宗時吕景初首以訓練不素教閲不精為憂神宗乃置內教場訓𨽻有法程其能否而勸沮之旬一御便殿以為常又自制隊伍之法營軍之制頒行諸路置提舉教閲之官今之州縣有旬教有月教有春秋教所以練兵也其教閲果有益乎今之諸路有春秋案教之官所以重閲兵也其案教果有益乎孔子曰以不教民戰是謂棄之孟子曰不教民而用之謂之殃民周成王纘文武丕業躬巡侯甸四征弗庭薄海內外莫不歸往而猶以武備為懷及奄人既平旋蹕豐邑分命六官大司馬實掌戎事粵中春號召諸侯來會岐陽以講大搜所以飭武備壯軍容豈徒為乾豆賔客之奉而已于時頌聲交作講武類禡咸有其辭岐搜號國大事逮至景王七年因楚人伍舉之言事始經見獨無文辭以著一時之美亦史氏之闕也歧陽石鼓之十章實雅頌之遺文殘缺磨滅或者得於千載之後而有周之全文尚可考蓋因搜狩講武之作也先王之時雖隆仁義禮樂以化天下之俗銷伏其悖戾好爭之心而常隂求天下之竒材以待不測之患蓋常寓其法於六遂之間使卒乘車徒之制素具而朝廷之公卿大夫之諸侯內之君臣朝聘燕享從容歡欣之際必陳弓矢以講射而四時之隙則命有司以講武以天子之尊而馳騁于原野親金鼓干戈之事以射取禽獸蓋燕享者人君之所樂而弓矢者威武之事田游者佚樂之舉而殺戮者征伐之容蓋先王所以藏天下之所畏於人情從容之際所以隂養天下竒傑之氣使之一旦習知其術安之而不懾也三代國容不入軍軍容不入國禮儀吉凶賔嘉逹于天下而軍禮獨藏于大司馬號司馬法若有田役之之事則縣帥始受法于司馬以作民六官唯小司馬職掌不悉書而軍司馬輿司馬行司馬皆不備官有事則置其不欲觀兵如此羣書考索後集卷四十二
