body:
  text: 羣書考索後集卷五十三宋章如愚編賦稅門田賦類論語哀公問於有若曰年飢用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也對曰百姓足君孰與不足百姓不足君孰與足左傳季孫欲以田賦使冉有訪諸仲尼仲尼不對而私於冉有曰君子之行也度於禮施取其厚事舉其中斂從其薄如是則丘亦足矣且子季孫若欲行而法則周公之典在若欲茍而行又何訪焉弗聴禹九等田賦冀田中中賦上上錯田第五賦第一錯出第二之賦兖田中下賦貞田第六州第九賦正欲九相當青田上下賦中上田第三賦第二徐田上中賦中中田第二賦第五揚田下下賦下上上錯田第九賦第七雜出第六荆田下中賦上下田第八賦第三豫田中上賦錯上中田第四賦第二又雜出第一梁田下上賦下中三錯田第七賦第八雜出第七第九三等雍田上上賦中下田第一賦第六人功少按冀州賦上上田中中差四等盖冀帝都也百物所聚事事皆出於此所以賦特重於他州兖州田中下賦貞等九作十三載乃同者兖州水患最甚禹八年於外惟此州十三年乃與諸州同賦孔氏謂禹當水初平制賦各隨其力後必漸増不知禹於地平天成之時人工未盡修地力未盡闢制為貢賦之定法後雖人衆地闢賦不加多藏之於民以均裕民之政與後世俗括隠田之類異矣禹貢定田以九等賦亦有九等賦之髙下不與田伯當說者謂地有定宜而人无常功田上而賦下者人功廢也田下而賦上者人功修也審如是則禹之賦亦隨宜取之而已豈其以為定法哉九等之賦後世莫不相時而變通豈不為民害歟龍子曰治地莫不善於貢傷其法之弊也大禹之貢法雖曰校數嵗之中以為常而禹行之蓋自有道夏諺曰吾王不遊吾何以休吾王不豫吾何以助以此推之當禹之時貢法既定而又有廵狩之禮以省耕省歛問其疾苦休戚而觀其年之豐㓙厚薄以補其不足助其不給何不善之有禹九等貢法禹别九州任土作貢注任其土地所有定其貢賦之差兖貢漆絲篚織文青貢鹽絺海物惟錯岱畎絲枲鈆松怪石徐貢土五色羽畎夏翟嶧陽孤桐泗濵浮磬淮夷蠙珠暨魚厥篚𤣥纎縞揚貢金三品金銀銅也瑶琨美玉篠簜齒象齒革犀皮羽鳥羽毛旄牛尾惟木楩楠豫章厥篚織貝織絹紵貝水物厥包橘柚錫貢錫命乃貢言不常荆貢金三品杶木名幹柘也栝柏葉松身曰栝柏礪砥砥綱於礪皆磨石也砮砮石中矢鏃丹朱顔惟箘簵美竹楛中矢幹三邦底貢厥名三物皆出雲夢之澤近澤三國常置貢之其名天下稱善包橘柚也匭匣也菁菁以為菹茅茅以縮酒厥篚𤣥纁此州染𤣥纁色善故貢之璣珠類組綬類九江納錫大龜尺二寸曰大龜豫貢漆枲絺紵篚纎纊細錦也錫貢磬錯治玉曰錯治磬錯梁貢璆玉名鐵銀鏤砮磬熊羆狐狸織皮貢四獸之皮織金罽雍貢球琳皆玉名琅玕石似玉禹貢一書有貢有賦賦出於田而貢則因地所有而不責其所无非賦之外又有貢也周官角人羽人以齒角羽以當邦賦亦此意故其書揔謂之貢孟子曰夏后氏五十而貢盖以田賦亦謂之貢也然而八州皆有貢惟冀州无貢以畿内王之所食時歛其賦而曰非所謂貢也邦國有嵗之常貢春入貢是也是以禹貢之言五服其畿内五百里謂之甸服百里賦納緫二百里納銍三百里納秸服四百里粟五百里米皆謂田賦輕重之别也其外侯服綏服荒服則不言賦盖取之諸侯而貢之天子天子有常法以受其貢而已所謂貢者皆隨地之所產如揚之橘柚荆之大龜必待錫命而後貢示非常用之物其取田賦皆不過什一此虞夏貢賦之大略也禹五服之圖禹定九州量逺近制五服任土作貢分田定稅十一而賦萬國以康故天子之國内五百里甸服為天子服里田百里賦納揔禾藁曰揔供飼馬二百納銍銍刈為禾穗三百里納秸服秸槀也服槀役四百里粟五百里米所納精者少麤者多其外五百里曰侯服侯候也斥候而服事百里采供王事不王一二百里男邦男任也三百里諸侯同為王者斥候又其外五百里曰綏服服王者之政教三百里揆文教度王者文教而行之二百里奮武衛奮武衛天子所以安也又其外五百里曰要服要束以文教三百里夷守平常之法二百里蔡蔡法也法三百里而差簡又其外五百里曰荒服言荒又簡略三百里蠻以文徳蠻來之不制以法二百里流流移也言政教隨其俗商助法殷以天子之地百里之内以供官千里之内曰甸以為御千里之外曰流設方伯以為属公田藉而不稅七十而助是以其求也寡其供也易降及辛紂暴虐厚賦以實鹿臺大歛以積巨橋周武王貢法武王伐商而有天下發其財散其粟於是分九畿侯畿貢祀物甸畿貢嬪物任嬪以女事貢布帛男畿貢器物任工以飭材事采畿貢服物絲纊也衛畿貢財物龜貝之具蠻畿夷畿貢貨物絲采鎮畿番畿以其所貴寳為贄成周國中之征司徒之職以嵗時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆任之其舍者國中貴者賢者能者服公事者老者疾者皆舍以嵗時入其書成周任地之法凡任地國宅无征園㕓二十而一近郊十一逺郊二十而三甸稍縣都皆无過十二唯漆林之征二十而五凡宅不毛者有里布田不耕者出屋粟凡民无職事者出夫家之征不毛謂不樹桑麻也罰以二十五家之泉空五者罰以三家之稅夫税者百畝之稅凡稅者出士徒車輦給繇役國中及四郊之人民六十之數以任其力待其政令以時徵其賦成周任民之法任農以耕事貢九榖任圃以樹事貢草木任工以飭材事貢器物任商以市事貢貨賄任牧以畜事貢鳥獸任嬪以女事貢布帛任衡以山事貢其物任虞以澤事貢其物成周立賦稅之名因其比鄰以五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役凡役人嵗不過三日任其土所以紀地宜也分五服設九畿所以别逺近也五人為伍所以知衆寡也因井廬以定賦税謂公田什一及工商衡虞之人也賦謂供車馬兵甲七徒之役充實府庫賜予之用稅給社稷宗廟百神之祀天子奉養百官禄食庶事之費皆因其所工不求其所絀農人納其穫工女効其職是以黔首安本而易贍農足而工有餘也成周九賦九式九貢之法周公作周官而理財之法益詳以九賦歛財賄邦中四郊邦甸家削邦縣邦都闗市山澤幣餘以九式均節財用祭祀賔客䘮荒羞服工事幣帛芻秣匪頒好用以九貢致邦國之用祀貢嬪貢器貢幣貢材貢貨貢服貢斿貢物貢皆属於天官冡宰小宰致邦國九貢九賦九式之貳以均節財用又有太府受其貨賄之入凡頒財以法式授之外府掌邦布之出入以待邦之用内府掌貢賦之貨賄以待邦之大用職内則掌邦賦之入職嵗則掌邦賦之出其理財之官可謂衆矣貢助徹之名孟子夏后氏五十而貢商人七十而助周人百畝而徹其實皆什一也古之取民貢助徹三法而已校數嵗中以為常是為貢一井之地八家皆私百畝同治公田是為助不為拘俟嵗之成通以什一之法取於百畝是為徹吕東莱夏后氏五十而貢商人七十而助周人百畝而徹徹者徹也盖兼貢助而通也方里而井井九百畝八家皆私百畝其中謂公田所謂九一而助也國中什一使自賦則用貢法矣此周人所謂徹也魯宣税畝魯宣十五年初稅畝公羊傳曰初者何始也稅畝者何履畝而税也初稅畝何以書譏何譏尔譏始履畝藉古者曷而稅也何譏乎始履畝而稅古者什一也為什一而藉什一天下之中正也什一而頌聲作矣左氏之非私也杜預云公田之法十取其一今又履其餘畝復十取其一故哀公曰二吾猶不足遂以為常故曰初成公丘甲左傳成公元年三月作丘甲周禮九夫為井四井為邑四邑為丘十六井出戎馬一疋牛三頭四丘為甸甸六十四井出長轂一乗戎馬四匹牛十三頭甲士三人歩卒七十二人此甸所賦今魯為齊難議重斂哀公田賦哀公十二年春用田賦田謂一井之田賦者歛取其財物也言用田賦者漢家分民賦以田為率矣言井者城郭里巷亦有井嫌悉賦之禮税民公田不過什一軍賦十井不過一乗哀公外慕强呉空盡國儲故復用田賦過什魏文增賦孝公十二年初為賦納商鞅説壊井田開阡陌制貢賦之法始皇収大半之賦始皇建守罷侯貴以自奉提封之内撮粟尺布一夫之役盡專於已徂春歴秋徃還萬里是所得者至寡所失者至大人用無聊海内咸怨夫夏之貢殷之助周之藉皆十而取一盖因地而税秦則不然舍地而税人故地數夫盈其税必備是以貧者辭賦役而逃逸富者務兼并而自若加之以内興功作外攘夷狄収大半之賦發閭左之戍竭天下之資財以奉其政猶未足以贍其欲也二世承之不變其失反更益之海内愁怨遂用潰畔漢田租田有租非古法也自阡陌行而田始有租矣秦初収天下大半之賦漢氏興而量吏禄度官用以賦民於是十五税其一文帝世始時行賜租之令至十三年之六月乃盡除而不収焉及景帝元年始行半租之令至其明年則又有三十稅一之令矣故終漢家皆三十稅一者自景帝始乎其後雖有權益田稅之說而竟不行然亦衰世之政歟要之漢田大率以寛租為意故流民免而新田則稍入運租之民又時貸焉若夫田租之外又有藁稅又有計百物之銖兩則其弊政也十五税一减田租十五税一鄧展注曰漢家初十五税一儉於周十税一也中間廢今復云也如淳曰秦作阿房之宫収大半之賦遂行至此乃復十五税一師古曰鄧説是也惠紀漢興民失作業天下既定民无蓋藏髙帝於是輕田租十五税一量吏禄度官用以賦於民賜租文帝二年詔云今兹親率羣臣農以勸之其賜天下民今年田租之半十二年詔曰且吾農民甚苦而吏莫之省將何以勸焉其賜八年農民田租之半並文紀宣帝甘露二年賜民无出今年租本始元年五月賜天下租税勿収並宣紀除租文十三年六月詔曰農有租税之賦其除田之租稅文紀景帝元年令半田租本紀三十税一孝景二年令民半出田租三十而稅一也食貨莽下令曰漢代减輕田租三十而税一常有更賦疲癃咸出而豪民分田却假厥名三十實税五也權益田園税成帝賜方進朕惟往時之用與今一也君不量多少奏一切增賦税城郭堧及園田過更張晏注曰一切權時也堧城郭旁地園田入多益其税也翟方進傳貲不過三萬免平帝時天下民貲不滿二萬及被灾之郡不滿十萬勿租稅行所過免元封元年行所廵至博奉髙蛇丘歴城亢父民田租逋賦貨已除四年賜汾隂夏陽中都三縣及楊氏毋出今年租賦太初四年夏四月赦天下行所過毋出田租本紀神爵元年詔賜行所過毋出田租宣紀初元四年三月幸河東祠后土所過毋出租賦永光元年幸甘泉郊泰畤所過毋出租賦元紀永始四年幸河東祠后土賜所過毋出田租成紀初郡免武帝時初置郡十七以其故俗治無賦稅食貨灾郡免元帝時于定國爲丞相責以職事曰民田有灾害吏不肯除収趣其租以故重困定國傳昭帝即位二年秋八月詔曰往年灾害多今年蠶麥傷毋令民出今年田租昭紀本始三年大旱郡國旱甚者民毋出租稅宣紀四年詔地震破壞甚者勿収賦租元康二年五月詔令郡國被灾甚者毋出今年租稅並宣紀初元元年關東穀不登民多困乏令郡國被灾害甚者毋出租稅二年詔郡國被地動灾甚者毋出租賦並元紀建始元年十二月郡國被灾什四以上毋収田租成紀哀帝詔他郡國灾害十四以上民貲不滿十萬皆毋出今年租賦平帝時天下被灾之郡不滿十萬勿收租税本紀給軍免二年蜀漢民給軍事勞苦勿復租稅二嵗假田免初元元年江海陂湖園池属少府者以假貧民勿租賦新田稍入武帝時河東渠田廣予越人令稍入稍漸也貸逋租成帝建始二年諸逋租賦所振貸勿収又河平四年成紀藁稅已奉穀租又出藁稅貢禹傳田稅外有雜稅除其租銖之律師古曰租稅之法皆依田畝不雜計百物之銖兩貢禹漢山澤園池稅古者山澤與民共財而臺池苑囿之與民共樂芻蕘雉兔皆得以往者亦以天地之財非人主所得私也而所謂虞衡之設者要以理之使不咈生之使不息以為天下不可勝用而已此所謂禁民為非之義也舉而税之其自戰國之君始乎殺郊闗之麋鹿如殺人之罪據天地之有以私人主之身而又立法以征之與民共財此意其替矣哉漢之山澤園池之租本以給供養而少府掌之其後倣古虞衡之意而置水衡方始取少府之所謂山林苑囿之稅而付水衡以平之然他日猶有江海陂池属少府者而海丞果丞猶掌之於少府之下則亦盡之也惟文帝時稍弛其賦而後世猶有増益其稅而故為六筦之令其増預行廢固有時節少府掌山海池澤稅百官表少府掌山海池澤之稅以給供養師古注曰大司農供軍國之用少府以養天子也山林池苑稅水衡都尉應劭曰古山林之官曰衡掌諸池苑故稱水衡師古曰衡平也主平其稅入又曰水衡掌山林苑池海丞果丞平帝時置少府海丞各一人師古曰海丞主海税果丞主果實弛賦文帝時六年大旱蝗令諸侯無入貢弛山澤取出澤者有税初設六筦之令諸采取名山澤衆物者税之王莽魏武帝初平袁氏以定鄴都令収田租以粟四升户絹二疋綿二斤餘皆不得擅與晉食貨志晉武帝平呉之後制户調之式丁男之户嵗輸絹三疋綿三斤及女次丁男為户者半輸晉成帝時權賦民男丁嵗穀三斛女半之疾病又半之户調絹不過數丈綿數兩事少役希民多富實新附者皆給復除通鑑北齊田制未娶者輸半衣租調有妻者輸一床無者半床陽翟一郡户至數萬籍多無妻有司劾之帝不許由是奸欺尤甚户口租調十已六七清河三年定令乃率以十八人受田輸租調二十充兵六十免租役六十六還田免租調率人一床調絹一匹綿八兩凡十斤綿中折一斤作絲墾租二石義租五斗奴婢準良人之半牛調二丈墾租一斗義租五升墾租送臺其義租納郡以備水旱後周文帝覇府初開制司賦掌賦均之政令凡人自十八至六十四與輕疾者皆賦之其賦之法有室者嵗不過絹一匹綿八兩粟五斛丁者半之其丱桑土有室者布一匹麻十斤丁者又半之豐年則全賦中年半之下年一之皆以時徵焉若艱㓙札則不徵其賦司徒掌力役之政令凡人自十八至五十九皆任力役豐年不過三旬中年則二旬下年則一旬起徒役無過家一人通典唐制髙祖太宗初制為租庸調法田制二百四十歩為畝三百為頃男年十八已上人一頃八十畝為口分二十畝為永業凡受田者丁嵗輸粟二斛稻三斛謂之租丁隨鄉所出嵗輸絹二匹輸絁二丈布加五之一綿三兩麻三斤丱蠶鄉則輸銀十四兩謂之調用人之力嵗二十日閏加二日不役者日為絹三尺謂之庸水旱霜蝗耗十四者免租桑麻盡者免調田耗十之六者免租調耗七者諸役皆免租以斂穫險易遠近為差庸調輸以八月發以九月同時輸者先逺民皆自槩量州府嵗市土所出為貢還買地𤣥宗開元中頒租庸調法於天下好不過精惡不至濫於是詔買者還地而罰之括羨田是時天下户未嘗升降監察御史宇文融獻䇿括籍户口羨田逃户自占者給復五年每丁稅錢千五百以攝御史分行括實陽翟尉皇父景上書言其不可𤣥宗方用融乃貶景諸道所括客户八十餘萬田亦稱是州縣給㫖張虚數以正田為羨編户為客嵗終籍錢數百萬緡初租庸調之法以人丁為本自開元以後天下户籍乆不更迭丁口轉死田畝賣易貧富升降不實其後國家侈費無節盜起兵興財用益屈租庸調法弊壞自代宗時始以畝定稅而歛以夏秋大厯元年詔流民還者給復二年田園盡則授以法田天下苗一畝稅錢十五以國急不及秋方苗青則征之號青苗錢又有地頭錢每畝二十通名青苗錢徳宗時趙賛請以諸道律㑹置吏閱商賈錢每緡税錢二十竹木茶漆稅十之一以贍常平復請稅間架筭除陌而民益怨及涇原兵反皆罷之陸贄說徳宗曰請革其大甚者大畧有六一曰國家賦稅之法曰租曰調曰庸其取法逺其歛財均其役人固有田則有租有家則有調有身則有庸天下之法均一雖轉死莫容其奸故人無恤心又曰榖帛人所為也錢貨官所為也人所為者租稅取焉官所為者賦歛捨焉國朝著令稅出租庸出絹調出繒纊布麻葛嘗禁人鑄錢而以錢為賦徳宗終不聽徳宗相楊炎遂作兩税法夏稅無過六月秋稅無過十一月置兩稅使以揔之户無主客以居為簿人無下中以貧富為差商稅三十之一與居者均役曰稅視大厯十四年墾田之數為定遣黜陟使按比諸道丁產等級免鰥寡孤獨不濟者敢有加歛以枉法論税法既行民力未及寛方鎮合從而叛用益不給而借商之令出矣分三賦憲宗分天下之賦以為三一曰上供二曰送使三曰留州宰相裴洎又令諸道節度觀察調費取於所治州不足則取於属州而属州送使之餘與其上供者皆輸度支唐志本朝税賦有四品穀之品五稻麥黍禾菽雜子帛之品十羅綾絁絲綿紬布等共十金鐵之品六金銀鐵銅鑞鉛錢等物產之品六六牲齒革羽毛齒州萊均租太宗至道三年勅應天下荒田許民請射開耕不計嵗月未議均稅直俟人户開耕勝任起稅即於十分之内定二分為永額出垂拱元龜真宗祥符六年上言者謂天下曠土甚多請差官檢括上曰今天下賦稅不均豪富形勢之家田多租少貧弱之户地薄租重實為憾事寳訓蠲租太祖開寳六年詔廣南州縣嵗輸米稅舊每石加率錢一百六十令每石止十文餘並放髙宗紹興二年詔書可將建康四年應在前殘租積欠除形勢及官户州縣公人外餘不問有無專法一切蠲除又二十九年詔書諸路人户積年欠負昨郊祀赦文放至二十五年今將二十六年二十七年分第四等人户所欠夏秋租稅和買丁產諸色官物並與除放聖政夀皇凡郊恩明堂赦皆放第五等户欠租寛閒田之税髙宗紹興二年詔曰昨詔諭淮東八郡人户佃田并免二年租稅將來合行權納之嵗可止據當年已種頃畝計數起納其後逐嵗添展墾闢到田畝亦據實數添納庶人户曉然易以安業如或州縣過數催追並依違制之罪仍許人户越訴聖政孝宗淳熙元年劄子竊見兩淮自經踐蹂以來都國殘弊田畝荒蕪長民之吏不以勞來安集之政為先是以寛恤之詔今尚勤九重之軫念夫為民病者莫甚於根括田畝而重増租稅何者兩淮之地異時率多荒梗彼四方之民指規嵗棄鄉井而樂於遠至者以地利厚而官賦輕雖勞不憚方其請射之初實久廢不耕之地未暇計其畝歩積以嵗月盡力墾闢方稍獲利其勤若亦甚矣比年以來州縣見民間漸次成業以其不無寛剰之數每行括責復増征歛其實公家所得至微而令民煩擾不安甚非撫字惠養之意淮甸之間民非土著平時極意存恤猶恐不能寧居一或擾之則率而之他矣此地之所以不加闢民之所以不加多也近者朝廷行下湖北路闢墾荒田不許通檢仰見聖徳矜念元元之意又况兩淮之地與湖北事不同先宜存撫欲望聖慈令兩淮湖北已得指揮今後民户墾闢田畝止令送納舊稅不得剏法増添庶幾民被實惠漸成富實奉聖㫖依準緩下限之租又八年劄子竊見今州縣催科之責皆在縣令得人彼固自有處若非其人其權盡出於胥吏之徒多䕶其黨且如監司州郡人吏有產者未嘗納官物假使納破未嘗足數蓋縣邑之庇也至於縣邑人吏又復自庇又各庇其親黨拖欠官物嵗嵗有之豈獨此哉攬納等人攬民户錢物在已不盡以輸官例是計㑹鄉司互相蒙蔽而鄉司等人亦復與之為市膠固深結牢不可破此两色者所欠稅賦初未嘗足祥符三年郊赦與夫水旱異恩放至某年則彼固皆脱然無累矣至於貧民下户初未嘗沾尺寸升斗之恩故朝廷實恵悉為虚文者良由此蓋有說彼縣邑催科既庇其大者雖多不問乃治其小者至絲粟不貸安得有隔嵗不納者乎故小民所欠尺寸升合往往出引追逮絡繹道路不問其數多少與已納未納並行决撻流血盈庭所不堪聞又分委佐官謂之比校所欠税户纍纍枷錮口無漿飯而身被楚毒往往狼狽而死倚郭大邑大抵如是人不為怪而况山僻小邑又可知已然則和氣安得不傷水旱安得不作臣愚以為宜令州縣索簿㸃對有人吏之不納攬户之不輸者並行斷罪即時監納仍出榜令人陳吿至扵下户所欠稅賦夏稅二尺以下苗米一斗以下令各縣不得追呼及行决撻如此則所欠多者不得容隱所欠少者庶免追擾矣夏稅二尺以下苗米一斗以下止是數百文上下錢利害又自各有大保長催納必不至拖少臣所以致免其追呼决撻者有利於民無損於官故也令夏稅未及下限苗米亦未及下限苗亦未起催朝廷約束政可施行㐲望聖慈以臣所言利病行下州縣仍令監司太守覺察所部有催科不擾撫字有方者具實薦聞有催科煩擾為害小民者以名申奏庶幾州縣之間有所懲勸不至循習以傷和氣聖㫖依禁受納情弊仁宗慶厯七年四月二十三日臣寮上言竊見諸路轉運司廣要出剰求媚於上民之輸租已是大半之賦厚有加耗謂之潤官江西諸州軍體例百姓納米一石出剰一斗徃徃有聚斂之臣加耗之外更要一斗以萬數積累則所聚之數不少且江西路嵗百萬石為准若每石米一斗以百萬石出剰已及十萬石米數若在民間米價必不至騰貴一旦於民間取十萬耗入官則民下必食貴米理為均然此只粗引一路之弊如此况天下之廣其弊可知臣願陛下閱其奏目或有横加收斂以為出剰乞賜貶黜使民知陛下之意上諭之曰古稱聚斂之臣過於盗賊今如此掊斂是與朕結怨於民也遂下諸路止禁之髙宗紹興元年即位赦文内云比來州縣受納稅賦務加槩量以規出剰可並行禁止紹興七年進呈論諸路和采米加耗太多如饒州一石至収四斗下提刑司體究上曰郡守謂誰候體究得實當痛與懲戒二十四年進呈臣寮言諸路州縣受納物帛官吏作弊邀難人户將中程好物沮抑不受至用柿油等退印損壞縱容攬子多取民錢將紕疎之物納官上察其為民害命有司申嚴見行條法行下令監司御史臺次第糾劾民有越詞者聴之聖政淳熙四年勅訪聞諸路州縣月納人户苗米徃徃過數多収斗面顯是違法重困民力四月六日三省同奉聖㫖令諸路監司常切約束覺察如有違戾去處按劾以聞哲宗輕重太祖開寳八年詔紬絹不滿疋許納價錢仁宗慶厯六年詔諸路轉運司夏秋折賣自今於未納半年前榜諭之紹興二十六年上宣諭曰前日臣寮有論川中折帛錢太重絹一疋私直不及五千而官估則取十千他物率皆稱是去嵗裕民所蠲减價直不過一千而已須量與减損若只令行下看詳未濟事不若便劄與四川總領司令契勘合蠲减數目申朝廷庶幾民受實惠聖政减上供數目建炎元年即位赦文内云上供悉有常數後因臣寮奏請嵗有増加不勝其弊仰諸路轉運司開具祖宗上供舊制及増添數目聞奏當損以舒民力三年知婺州蘇遲乞奏减年額上供羅上問祖宗額幾何輔臣對皇祐編勅一萬匹問今幾何輔臣指遲奏言五萬八千七百九十七匹上驚歎曰民將何堪時遲奏乞减半上曰盡依皇祐法輔臣奏今用度與祖宗時不同上復曰與减二萬匹併八千有餘今數因著為定制仍令給以本錢聖政詔令監司通融州縣淳熙六年三月御筆手詔朕躬節儉以先天下無暴征無苛取期吾元元躋於富庶之域郡國之間宜若公私交裕矣今顧不然豐年樂嵗中外少事或未免於匱乏州廹於縣縣廹於民其故安在無乃賦入寡而用費衆歟吏二千石有能有不能歟將輕費妄用莫知撙節歟汝等得不深思視所部為一家周知其經費而通融其有無廉察其能否而裁抑其耗蠧數者備矣郡計何患乎不足郡計足則属邑寛属邑寛則民力裕則吾宵旰之慮釋國有信賞於汝何吝若乃有餘者取之不足者聽之逮其乏事然後從而劾之斯亦晩矣是則黜陟之行奚獨郡守而已諸道轉運其明知朕意漕臣條具州縣取民色目劄子臣恭覩今年三月二十四日親手詔曰豐年樂嵗中外少事或未免於匱乏州廹於縣縣廹於民其故安在故分道置臺寄耳目於爾漕臣職當計度欲其計一道盈虚而經度之也職當按察欲其早正奏定毋使病民也聖意惻怛何其知民疾苦如是之深切也臣久在州縣粗知色目試論其所以然大率守令下車未循民事首請属邑督責財賦必欲如數遵依方許還邑此之謂獻助錢又不測委郡丞職幕官乍邑㸃檢責辦邑官認寢錢制抑無為有増少為多此之謂剛刷錢二稅就州輸納創為色目既倍収合耗重價折科又刷具合令就整一寸納一尺一合納一升謂之畸令錢酒稅不照用祖額止從重數謂之逓年課利錢至於催到上供錢物之類申發鈔狀到州多行截留先填舊欠别行催發謂之改鈔錢及當支散春衣賜抛降數目拘催謂之軍衣錢又有無額經總制補虧州用之類不一而足籍為定數按月解發曰板帳曰綱目曰格目又有所謂月樁并青冊子錢所在州縣名雖不同是皆州廹於縣之色目也督促之期急於星火每月輸委丞簿尉催發稍有所虧動輒監繫大率不過敦請上户勸誘預借非理科罰籍沒家產積欠既放而復催常賦已足而重納寄納官庫少有給還理索賷到納官例多乾沒和買役錢嵗有定額今平江諸邑無故追索人户砧基簿驅磨虚具失納和買役錢監催三年六科人户遇有交易方可買契今台州諸邑則有預借稅契錢候有契日銷還甚者多賣於人價増數倍應詞訟及胥吏行遣供責必勒令責買方與受理此風則江西盛行又有年計廣造惡酒應皂𨽻行舖僧道倡優皆無幸免此風則秀州尤甚是皆將廹於民之色目也臣欲乞自今以徃取見州縣逓年収支之數量其入以為出凡縣道匱乏當自州郡假借苗税容其從便輸納酒税使之隨宜措置少寛其積欠凡州縣財無渗漏有餘贏者則照對文厯申朝廷不可作寛剰而刷不可作羨餘而獻雖牋目之數未能遽革其間有名無實不便於民違戾三尺如前所陳必痛行蠲除或守令有愛民之實則使之論薦其並縁為姦者按劾上聞如此則奉行詔㫖裁抑其耗蠧也七月十七日奉聖㫖令諸路漕臣約束所部不得違矣如有科擾之處即具名按劾漕臣失覺察亦重寘典憲修貢籍之利淳熙四年户部侍郎韓彦古劄子奏天下貢賦之籍朝廷不能盡知州縣所入之虚實州縣不能必知百姓所輸之多寡所謂帳目者皆臨時以應故事而已是以州縣可以欺民間而恣其所欲朝廷不能制州縣盈虚之數且當取於百姓迺薄鈔所書之數而此外巧立名色大率増倍今朝廷所憑者州郡之帳籍州郡所憑者縣鄉之胥吏多寡任情輕重無制隱落竄易其弊如麻豪民大斛與之為一則可以属饜貧户細民所操有限則任其誅剝於是富者日益富貧者日益貧而國始病矣臣嘗考唐制合天下之稅租其用有三其一曰上供今之户部所入是也其一曰留州今州郡係省得用錢是也其一曰送使今轉運所得是也今户部所知之數則上供而已其留州送使盖無得而考焉若州郡處處得人不為官吏侵耗不為豪強隠落則雖竭民力而取之亦是文遣不辨何益於事不但此弊而已朝廷不知取民之實數多寡任情輕重無制民間合輸一石不止兩石合納一疋不止兩疋多取之罪則一律而不言法禁縱弛民間將何所措手足哉今二稅之額秋苗自正數之外有所謂正耗有所謂義倉有所謂本州耗又有所謂合令又有所謂隨蘿斛面出剰及倉例掃撮又有頭子勘合朱墨水脚市例縻費夏税正額外有所謂和買有所謂合令就整又有畸令折帛又有寛剰布帛又有頭子勘合朱墨市例縻費亦何理哉此姑舉二説而言爾其他征求又不止此為今之計謂且取見諸路大都財賦之所入稍依唐制分為三等視其用度多寡而為之制自上供為始上供所餘則均之留州留州所餘則均之送使送使所係則𣲖分逓减悉蠲於民朝廷不利其贏焉然則自朝廷至於郡國取於民者皆有成數不可得而利出剰於其間然後整齊天下之帳目外而責任轉運使内而責户部量入為出嵗攷其能否而為之殿最州縣不得多取於民朝廷亦不多取於州縣上下相恤有無相通無廢事無傷財貢籍之成太平之基立矣此誠長治久安之至計也伏惟聖朝採擇而行之天下幸甚奉御筆批韓彦古所陳周知民隱其造貢籍可擇一才力通敏者先次施行一郡俟已就緒當頒降諸路依倣行之正月二十一日三省同奉聖㫖令薛元鼎前去秀州依此將錢絹米斛等數帳目聞奏論稅簿之弊高宗紹興二年三月癸丑詔曰朕於民事未嘗敢緩而守令監司弗之察也訪聞造簿之弊或奸藏狼籍民被其苦苛自今後應逃亡死絶詭名挾佃産去税存之户不待造簿書特依法倚閤檢察推割庶使斯民猶堪給養而不被無藝之横歛也如違令佐公吏並竄海島知通監司隱庇不舉發者同罪并許民户越訴羣書考索後集卷五十三
