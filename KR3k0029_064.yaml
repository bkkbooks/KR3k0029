body:
  text: 羣書考索卷六十四宋章如愚撰地理門田制類黄帝八家為井井開四道而分八宅鑿井於中則井田之原其來逺矣唐堯堯遭洪水天下分絶使禹平水土别九州冀州土白壌旡塊曰壌田中中田第五兗州土黑墳色黑而墳起田中下田第六青州土白墳田上下田第三徐州土赤埴墳土粘曰埴田上中田第二揚州土塗泥地泉濕田下下田第九荆州土塗泥田下中田第八豫州土惟壌下土墳壚壚疏也田中上田第四梁州土青黎色青黑沃壌也田下上田第七雍州土黄壌田上上田第一虞夏殷三代凡一千餘載其間定墾書册不存鄭康成云昔夏少康在虞思有田一成有衆一旅一旅之衆而田一成則井牧之法古先然矣周井田之制六尺為步百步為畝百畝為夫三夫為屋三百畝三屋為井九夫九百畝十井為通九十夫九千畝十通為成百井九百夫九萬畝十成為終百通千井九千夫九十萬畝十終為同百成千通萬井九萬夫九百萬畝十同為終千成萬通十萬井九十萬夫九千萬畝十封為畿百同千終萬成終十為同圗夫三為屋屋三為井井十為通通十為成成十為終終十為同同中容四都六十四成方八十里出田稅縁邊為澮畫野為井周禮地官小司徒乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事而令貢賦凡税斂之事鄭司農注云井牧者春秋𫝊所謂井衍沃牧隰臯者也𤣥謂隰臯之地九夫為牧二牧當一井今造都鄙授民田有不易有一易有再易通率二而當一是謂之井牧九夫為井田方一里九夫所治之田也此制小司徒經之匠人為之溝洫相包乃成耳邑丘之屬相連比以出田税溝洫為除水害四井為邑方二里四邑為丘方四里四丘為甸甸之言乗也讀如衷甸之甸甸方八里旁加一里則方十里為一成積百井九百夫以六十四井五百七十六夫出田税三十六井三百二十四夫治洫四甸為縣方二十里四縣為都方四十里四都方八十里旁加十里乃得方百里為一同也積萬井九萬夫其中四千九十六井三萬六千八百六十四夫出田税二千三百四井二萬七百三十六夫治洫三千六百井三萬二千四百夫治澮井田之法備於一同今止於都者采地食者四之一其制三等百里之國凡四都一都之田税入于王五十里之國凡四縣一縣之田税入於王二十五里之國凡四甸一甸之田稅入于王地事謂農牧虞衡也貢謂九穀山澤之材也賦謂出車徒給徭役也司馬法曰六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為通通為匹馬三十家士一人徒二人通十為成成百井三百家革車一乗士十人徒二十人十成為終終千井三千家革車十乗士百人徒二百人十終為同方百里萬井三萬家革車百乗士千人徒二千人或曰文王在岐作司馬法及周公攝天子位從而增損之以為周禮賈公彦曰齊穣苴作司馬法至齊威王大夫等又附於穣苴賈公彦曰井十五通十井之内有九十夫之内而止云三十家者葢宫室塗巷三分去一唯有六十夫地又不易一易再易通率三夫受六夫之地唯有三十家使出馬一匹士徒三十家共出三人通十為成一成之内有九百夫之地宫室塗巷三分去一不易一易再易通率二而當一故一成惟有三百家革車一乗士十人徒二十人下皆倣此大率三十家出一馬一士二徒當以類推百乗千乗萬乗之别故丘有戎馬一疋牛三頭甸有戎馬四匹兵車一乗牛十二頭甲士三人步卒七十二人一同百里提封萬井戎馬四百匹車百乗此卿大夫采地之大者是謂百乗之家一封三百六十六里提封十萬井定出賦六萬四千井戎馬四千匹車千乗此諸侯之大者謂之千乗之國天子之畿内方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乗戎卒七十二萬人故曰萬乗之主任民之法小司徒之職乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事而令貢賦凡税歛之事前漢志曰周六尺為步步百為畝畝百為夫夫三為屋屋三為井井方一里是為九夫八家共之各受私田百畝公田十畝是為八百八十畝餘二十畝為廬舍詩曰中田有廬疆埸有𤓰是也民受田上田夫百畝中田夫二百畝下田夫三百畝農民已受田其家衆男為餘夫孟子曰餘夫二十五畝亦以口受田工商家受田五口乃當農夫一人若山林藪澤等地各以肥磽為差民年二十受田六十歸田在野曰廬在邑曰里一里八十戸八家共一巷春將出民里胥坐於右塾入者必持薪樵冬民既入女人同巷相從夜績女工薛士龍曰班固既有此言而何休注公羊范甯解穀梁趙岐注孟子皆以為然於理則不通何者言井九百畝其中為公田則中央百畝共為公田不得家取十畝又言八家皆私百畝則百畝為屬公矣何得更以二十畝為廬舍也言同養公田是八家共理公事何得家分百畝自治之也若家得百畝自治安得謂之同養也若二十畝為廬舍則二畝半亦入私矣何得謂八家皆私百畝此俗儒之謬周禮上地家七人而王制孟子則上食九人其次八人中地家六人而王制孟子則中食七人其次六人下地家五人而王制孟子下食亦五人葢先王之於民養之欲其富保之欲其安故家七人者必授以九人之上地家六人者必授以七人之中地下地則以地稱人而已凡欲下地之民生齒之繁以及中上者而後旡歉此富而庶之術任田任地之法民受田上田夫百畝中田夫二百畝下田夫三百畝嵗耕種者為不易上田休一嵗者為一易中田休二嵗者為再易下田三嵗更耕之自爰其處農民戸人已受田其家衆男為餘夫亦以口受田如比士工商家受田五口乃當農夫一人此謂平土以肥磽多少為差民年二十受田六十歸田七十以上上所養也十嵗以下上所長也十二以上上所強也孟子曰夫仁政必自經界始經界既正分田制祿可坐而定也按司馬法曰王國百里為郊二百里為州三百里為野四百里為縣五百里為都杜子春以五十里為近郊百里為逺郊鄭康成以二百里為甸地三百里為稍地四百里為縣地五百里為都地周禮亦曰五百里為都載師職曰以㕓里任國中之地遂人分田里夫一㕓是也以場圃任園地以宅田致仕者受士田仕者即受圭田賈田賈人所受任近郊之地以官田庶人在官者受賞田賞賜之田牛田牧田牧人所受任逺郊之地去國五十里為近郊一百里為逺郊置六鄉萬二千五百家自場圃至牧田皆六鄉之外餘地也以公邑之田任甸地置六遂萬六千五百家以為公邑以家邑大夫家邑之田任稍小也地以小都之田任縣地卿之采地以大都之田任畺地公之采地薛曰王國九里興命疏云方二十里去國五十里曰近郊一百里曰逺郊共四同之地置六鄉去國二百里曰甸十二同之地置六遂餘為公邑去國三百里曰稍二十同之地其中五十里之國六十三為大夫家邑餘為公邑去國四百里曰縣二十八同之地其中七十里之國二十一為卿之采地餘為公邑去國五百里曰都三十六同之地其中百里之國九為公之采地餘為公邑出租税納王由此觀之公邑有四而載師特曰公邑之田任甸地者言公邑始立於此也葢公邑甸田天子使大夫治之自甸至縣使大夫治之都使下士治之遂人治野分為九等上上田百畝旡萊上下田萊二十五畝上中田萊五十畝此舉上地之上也中上萊七十五畝中中萊百畝中下萊百二十五畝此舉中地之中也下上萊百五十畝下中萊百七十五畝下下萊二百畝此舉下地之下也若夫司徒造都鄙不易家百畝舉上上也一易家二百畝舉中中也再易家三百畝舉下下也亦以九等為率葢大司徒與遂人其法一同皆以二十五畝振之曰旡可疑者而説者自見其同異耳唐周禮於都鄙言易不易者地事也於鄉言所食者地利也於遂言地田萊者地力也都鄙以政為主故以地事言之鄉以人為主故以地利言之遂以地為主故以地力言之惟遂人上地有萊五十畝為異於鄉與都鄙以鄉之地狹於遂而都鄙之地又輕於遂故也禮書鄉遂異同大司徒令五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賔六鄉也遂人五家為鄰五鄰為里四里為鄼五鄼為鄙五鄙為縣五縣為遂六遂也一鄉五州二十五黨百二十五族五百閭二千五百比自比長下士以上其官三千一百五十六鄉之官凡一萬八千九百三十六一遂五縣二十五鄙百二十五鄼五百里一千五百鄰自里宰下士以上其官六百五十六六遂之官凡三千九百三十六揔一萬二千二百七十二人學者固疑財不足以祿之葢王圻受天下之財貢六鄉六遂乃軍之所在而邦家之本係焉是雖祿養之繁先王不以為費也遂官各降鄉一等故鄉大夫卿而遂則中大夫州長中大夫而縣則下大夫其官亦降焉故州謂之長而縣與黨同謂之正黨謂之正而鄙與族同謂之師以至在鄉者謂之民則以禮義為之主故鄉大夫待之以教法在遂者謂之甿則以事功為之主故遂大夫齊之以政令自相保至相賔鄉遂皆然而遂獨不言者鄉以教為主遂以耕為主故也鄉學加遂一等故謂之庠庠者養也所以養人材遂學降鄉一等故謂之序序者射也所以攷藝事凡此鄉遂之辨也夫鄉遂雖有内外之别然遂之相保相賙相葬相賔不異於鄉鄉之相糾不異於遂鄉之田法同於遂遂之軍法同於鄉先王之於家既以五家為比為鄰積而上之至於萬二千五百家為鄉為遂其於人也既以五人為伍為兩積而上之至於萬二千五百人為軍而又十家為聨以聮其居十人為聨以聨其事鄉則聨之以八里如此則居作相友戰守相衞有同心而無離徳也管仲相齊使居則五家為軌十軌為里十里為連十連為鄉出則五人為伍十人為戎十戎為卒十卒為旅葢倣先王之遺制也禮書鄉遂之制上公之國三鄉三遂諸侯之國二鄉二遂子男之國一鄉一遂書曰魯人三郊三遂魯大國也故三郊三遂大宗伯頒祀于邦國都家鄉邑大司馬簡稽鄉民以用邦賦則邦國亦有鄉遂明矣按大司徒施教法于邦國都鄙使之各以教其所治民而繼之以比閭族黨州鄉者則是比閭族黨之法通行于邦國都鄙可知矣不獨六鄉也只看軍法便可知凡制軍萬二千五百人為軍王六軍大國三軍次國二軍小國一軍一軍便是王賦所供者如軍行師從卿行旅從二千五百人為師校之五黨為州相似五百人為旅校之五族為黨相似此見是法通行於邦國都鄙之間可知矣制鄉之法大司徒令五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賔受田於鄉大司徒凡造都鄙制其地域而溝封之以其室數而制之不易之地家百畝一易之地家二百畝再易之地家三百畝注云不易之地嵗種之地美故家百畝一易之地休一嵗乃復種地薄故家二百畝再易之地休二嵗乃復種故家三百畝鄉之教令鄉師各掌其所治鄉之教而聽其治鄉大夫各掌其鄉之政教禁令萬二千五百家為鄉正月之吉受教法於司徒退而頒之于其鄉吏各以其所治以考其徳行察其道藝州長各掌其州之教治政令之法二千五百家為州正月之吉各屬其州之民而讀法以考其徳行道藝而勸之以糾其過惡而戒之黨正各掌其黨之政令教治五百家為黨及四時之孟月吉日則屬民而讀邦法以糾戒之族師各掌其族之戒令政事百家為族月吉則屬民而讀邦法書其孝悌睦婣有學者閭胥各掌其閭之政令二十五家為閭凡春秋祭祀役政䘮紀之數聚衆庶既比則讀其法書其敬敏任䘏者比長各掌其比之治制遂之法遂人掌邦之野注曰郊外曰野此野謂甸稍縣都以土地之圗經田野造縣鄙形體之法五家為鄰五鄰為里四里為鄼此管反五鄼為鄙五鄙為縣五縣為遂皆有地域溝樹之注曰鄰里鄼鄙縣遂猶郊内比閭族黨州鄉也異其名示相變爾遂之軍法追胥起徒役如六鄉受田於遂遂人辨其野之土上地中地下地以頒田里上地夫一㕓田百畝萊五十畝餘夫亦如之中地夫一㕓田百畝萊百畝餘夫亦如之下地夫一㕓田百畝萊二百畝餘夫亦如之注萊謂休不耕者鄭司農云戸計一夫一婦而付之田其一戸有數口者餘夫亦受此田也㕓居也𤣥謂㕓城邑之居孟子所云五畝之宅植之以桑麻者也六遂之民各受一㕓雖上地猶有萊所以饒逺也遂之教令遂人掌邦之野郊外曰野五縣為遂使各掌其政令刑禁以嵗時稽其人民而授之田野簡其兵器教之稼穡凡治野以下劑致氓以田里安氓以樂昏擾氓以土宜教氓稼穡以興鋤利氓以時噐勸氓以疆予任氓以土均平政注變民言氓異内外也氓猶懵懵然旡知貌也致猶㑹也民雖受上田中田下田及會之以下劑為率謂可任者家二人樂昏勸其昏姻疆予謂民有餘力復予之田若餘夫然政讀為征遂師各掌其遂之政令戒禁以時登其夫家之衆寡六畜車輦辨其施舍與其可任者經牧其田野辨其可食者今年所可耕者周知其數而任之巡其稼穡而移用其民以救其時事遂大夫各掌其遂之政令以教稼穡以稽其功事正嵗簡稼噐修稼政縣正掌其縣之政令五鄙為縣以頒田里以分職事掌其治訟趣其稼事而賞罰之鄙師各掌其鄙之政令祭祀五酇為鄙凡作民則掌其戒令以時數其衆庶而察其媺惡而誅賞酇長各掌其酇之政令四里為酇以時登其夫家比其衆寡以治其䘮紀祭祀之事凡嵗時之戒令皆聽之趣其耕耨稽其女工里宰掌比其邑之衆寡與其六畜兵噐治其政令以嵗時合耦于耡以治稼穡趣其耕耨行其秩叙注二耜為耦兩人相助耦而耕隣長五家為隣掌相糾相受不妨農時夏官司馬中春教振旅中夏教茇蒲末反舍中秋教治兵中冬教大閲因以蒐田左𫝊曰春蒐夏苗秋獮冬狩皆於農隙以講事不廢農力記曰古者用民之力嵗不過三日勸之使耕記月令孟春之月天子乃以元日祈穀于上帝乃擇元辰天子親載耒耜措之于參保介之御間帥三公九卿諸侯大夫躬耕帝藉驅之使耕載師掌任土之法以物地事授地職而待其政令凡任地國宅无征園廛二十而一近郊十一逺郊二十而三甸稍縣都皆旡過十二唯其漆林之征二十而五凡宅不毛者有里布田不耕者有屋粟凡民旡職事者出夫家之征以時收其賦閭師凡旡職事者出夫布凡庶民不畜者祭旡牲不耕者祭旡盛不樹者旡槨不蠶者不帛不績者不衰貸歛以時地官旅師掌聚野之耡粟屋粟閒粟注野謂逺郊之外也耡粟民相助作一井之中所出九夫之税粟也屋粟民有田不耕所罰三夫之税粟閒粟閒民旡職事者所出一夫之征粟閒音閑而用之以質劑致民平頒其興積施其恵散其利而均其政令注以質劑致民案入税者名會而貸之興積所興之積謂三者之粟也均其政令者皆以國服為之息而音若積子賜反凡用粟春頒而秋歛之遷徙有法地官比長五家為比鄉老之屬各掌其比之治徙于國中及郊則從而授之注徙謂不便其居也或國中之民出徙于郊或郊民入徙國中皆從而付所處之吏明旡罪惡若徙於他則為之旌節而行之注謂出居異鄉也授之者有節乃達若旡授旡節則唯圜土内之注鄉中旡授出鄉旡節過所則呵問係之圜土考辟之也呵呼何反鄰長五家為鄰遂人之属掌相糾相受徙于他邑則從而授之旅師凡新氓之治皆聽之使旡征役以地之媺惡為之等注新氓新徙來者也治謂有所求乞者也使旡征役復之也以地媺惡為之等七人以上授以上地六口授以中地五口授以下地緩急相親門族師以邦比之法率四閭之吏以時屬民而校登其族之夫家衆寡辨其貴賤老㓜廢疾可任者及其六畜車輦五家為比十家為聫五人為伍十人為聨四閭為族八閭為聨使之相保相受刑罰慶賞相及相共以受邦職以役國事以相葬埋比長各掌其比之治五家相受相和親有罪竒衺則相及有旡相濟鄉師正嵗稽其鄉噐比共吉㓙二服閭共祭噐族共䘮噐黨共射噐州共賔噐鄉共吉㓙禮樂之噐注吉服者祭服也凶服者弔服也比長主集為之祭噐者簠簋鼎爼之屬閭胥主集為之䘮噐者夷槃素爼楬豆輁軸之屬族師主集為之民所以相共也射噐者弓矢楅中之屬黨正主集為之為州長或時射於此黨也賔噐者尊爼笙瑟之属州長主集為之為鄉大夫或時賔賢能於此州也吉噐若閭祭噐者也凶噐若族䘮噐者也禮樂之噐若州黨賔射之噐者鄉大夫備集此四者為州黨族閭有故而不共也此鄉噐者旁使之相共則民旡廢事上下相補則禮行而教成鄰長遂人之屬掌相糾相受凡邑中之政相贊長短使相補助諸儒言井田不同鄭康成以小司徒有邑甸縣都之别而其名與采邑同匠人有􅎌遂溝洫澮之别而多寡與遂人異故言采地制井田鄉遂公邑制溝洫又謂鄉遂公邑之吏或從民以公使不得恤其私諸侯専國之政或恣為貪暴税民旡藝故畿内用夏貢法邦國用商助法賈公彦之徒遂以載師自國中園廛以至甸稍縣都皆旡過十二是鄉遂及四等公邑皆用貢而旡助以明鄉遂為溝洫而已然先王之為井田也使所飲同井所食同田所居同廛所服同事出入相友守望相助疾病相扶持鄕遂六軍之所寓豈可授之田而不為井乎大田之詩言曾孫來止而歌雨我公田遂及我私噫嘻之詩言春夏祈穀于上帝而歌駿發爾私終三十里亦服爾耕十千維耦周官遂人言興耡旅師有耡粟比鄉遂井田之事鄭氏以鄉遂旡井田而又以遂人之法釋詩以一井之法釋旅師是自戾也孟子曰鄉田同井請野九一而助則鄉遂之為井田可知也薛李泰伯曰司馬法與周禮其言頗異意者文王在岐作司馬法及周公攝天子位從而増損之以為周禮乎當以周禮為定司馬法有步畮夫屋井周禮如之但不别為屋爾司馬法十井為通十通為成周禮則四井為邑四邑為丘四丘為甸一甸旁一里為成司馬法十成為終十終為同周禮則四甸為縣四縣為都旁加十里為同又司馬法止為一制旡逺近之殊周禮則三百里以外都鄙為井田二百里以内鄉遂為十夫百夫千夫萬夫則是殊制矣故當以周禮為定羣書考索卷六十四
