body:
  text: 羣書考索卷五十三宋章如愚撰律歷門律吕類昔者黃帝吹九寸之管得黃鍾正聲半之為清聲倍之為緩聲三分損益之以生十二律十二律還相為宫以應十二月之律此律之正也至於周禮九變之樂宫商徴羽之法考之七始之次序乃雜然而不同也周禮之變為人思而作人以情相合大吕太簇應鍾律之相合者也將以致人思則安得以相生之正體而必其同歟音律之用自是而變益不窮掌者於是求為法以通之京房之六十律通十二律之法也房受學於焦延壽既以律吕之本衍而相生始於黃鍾極於中吕然後又立執始去滅南事之名以畢之其為術亦精矣五音之敘宫商必濁徴羽必清正也然律吕之用或相配而成或相反而生其清濁豈得獨有定體耶黃鍾之宫在十始之次則太簇為商而濁在九變之敘則太簇為徴而清可疑也五音之宫商角為正徴羽為變固也然五聲之作其配則金木水火土其象則君臣民事物臣與民不可變變者君與事而已是故有變宫變徴而無變商角羽何分之瀆哉若所謂積黍為律之制此又古人定律之法後世學者紛紛於短長廣狹之辨而不一也古者因一桴二米之黍以起數由一黍之多積而至於律度量衡皆以黍而定後世之黍未必皆與古同學者之法不生於自悟之心而責諸不同之黍其惑亦冝矣要之公孫崇之以長纍寸即李照之以橫纍寸也李照之以橫纍尺即劉芳之以廣積分即胡瑗之以橫纍尺也差之毫釐繆以千里安得以不求法於心以斷之哉陸唐老䇿律定於尺樂主於音音生於律律定于尺尺成于黍黍既不具尺亦不定尺無所凖律亦自差古者神瞽考中聲而量之以律所以立均出度也司馬遷黃鍾之律八寸七分之一太簇七寸七分之二林鍾五寸七分之四應鍾四寸二分之三班固司馬彪説黃鍾長九寸聲最濁太簇長八寸林鍾長六寸應鍾長四寸七分四釐強聲最清蔡雍鄭玄杜夔荀朂等所論尺有損益而黃鍾之宫要以九寸為定始荀朂當武帝泰始中校大樂八音不和知漢到魏尺長於古四分有餘乃部著作郎劉恭依周禮制尺所謂古尺也後汲冢得古周時玉律及鍾磬與新律暗同于時郡國或得漢時故鍾吹朂律以命之其聲皆應時人稱其精密徐古編樂有所謂本中聲者樂之本亦有所謂末器者樂之末也秉本以正末若挈裘振領之易也就末以齊本猶治絲而棼之也先王之作樂豈徒事其干戚羽毛鍾磬管籥綴兆疾徐以為世俗觀美哉探天地之至賾求隂陽之妙義得所謂中聲者黃鍾之宫也揚子曰黃鍾以生之中正以平之禮曰量聲中黃鍾之宫月令曰律中黃鍾之宫則黃鍾信乎其為樂本也黃鍾以一生三以三而生九九而九之終於八十一其管所以九寸而餘律自此生也揚雄之作太玄也以一元生三方三方生九州九州生二十七部二十七部生八十一家而其音之辭則曰陽氣潛萌於黃鍾之宫信乎無不在其中是則玄之文高極蒼天深入黃泉大也包畛纎也企戚良由求黃鍾之法而創為方州部家也夫得黃鍾之法猶足以草玄又况以是而制作烏不足以考中聲哉黃帝之雲門顓帝之五莖而帝嚳之六英堯之咸池舜之簫韶禹之大夏湯之大濩武之大武成王之大酌樂名雖異其中聲之和未始不本於黃鍾也是以奏之圜丘則神明降用之方澤則地祗升搏拊球石則百獸率舞樂終九成則瑞禽來翔此德音之音雅樂之情也三代而下號為博識之士相與論撰定次多矣由漢已來則有京房六十律由唐以來則有祖孝孫之八十四調因而轉相祖述又從而損益高下之其間祖意決著眉睫之論無所考者類皆棄經任傳徒紛紜為此贅疣也彼烏知所謂中聲哉古語有曰黃鍾委棄瓦釡雷鳴吾知殆為此曹設也夫欲樂之聲清不太輕濁不太重髙不至於揚下不至於抑大不過宫細不過羽當以黃鍾之中聲求之也三山疑難要折前漢志律以統氣類物吕以旅陽宣氣周景王時鑄無射問律於伶州鳩對曰律所以立均出度也紀之以三平之以六成於十二一曰黃鍾所以宣飬六氣九德也二曰太簇所以金奏贊陽出滯也三曰姑洗所以羞潔百物考神納賔也四曰㽔賓所以安靖神人獻酬交酢也五曰夷則所以詠歌九則示平民無二也六曰無射所以宣布哲人之令德示民軌儀也為之無間以揚沉伏而黜散越也元間大吕助宣物也二間夾鍾出四隙之細也三間中吕宣中氣也四間林鍾和展百事俾莫不任肅純恪也五間南吕贊陽秀也六間應鍾均利器用俾應復也皆所以述時氣效節物也五音尊卑清濁月令孟春其音角注云角數六十四屬木者以其清濁中民象也正義曰凡數多者濁數少者清今宫數八十一商數七十二徴數五十四羽數四十八角數六十四少於宫商多於徴羽故云清濁中既尊者為濁卑者為清民則卑於君臣尊於事物亦是尊卑之中故云民之象也案樂記及律歷志云宫為君商為臣角為民徴為事羽為物羽屬北方其數少所以黃鍾在子其數多者冬時凝寒之氣在於地土水又清輕羽既稟寒氣又象水聲故其數少冬至陽氣伏於地下溫積土中黃鍾含藏陽氣又象土聲故其數多各自為義不相須也凡聲尊卑取象五行者宫主土土聲濁其數多故主君商主金金聲稍重其數稍多故為臣角主木木聲清濁中其數多少中故為民徴主火火聲稍輕其數少故為事事謂人之所營事務也羽主水水聲極輕其數最少故為物也物謂人之所用財物也月令季夏之末云中央土其音宫正義云案律歷志五聲始於宫陽數極於九九九相乘故數八十一以五聲中最尊故云君之象春三月其音皆角夏三月其音皆徴秋三月其音皆商冬三月其音皆羽八音本五聲説心感於內情形於外而單出者樂之聲也曲折成萬交錯成文而雜出者樂之音也樂發聲則中之為宫章之為商觸之為角徴之為徴宇之為羽此五聲原於五行也五方於器則金石以動之絲竹以行之匏以宣之瓦以贊之革木以節之此八音所以逐八風也大司樂曰凡樂皆文之以五聲播之以八音傳曰五聲和八音諧而樂成此五聲八音而成之者也然五聲者八音所從出也故金尚羽石尚角瓦絲尚宫匏竹尚徴而無清濁之常革木一聲而無清濁之變其説以謂律吕和五聲施之八音合以成樂也是則知音必自聲始故曰不知音者不可與言聲不知聲者不可言樂案書曰聲依永律和聲繼之以八音克諧無相奪倫則音本於聲者明矣三山要會律吕相生京房易云十二律得位者生五子失位者生三子不失不得生四子五律得位各生五子謂黃鍾太簇姑洗林鍾南吕也五五二十五并五凡三十也失位者生三子亦五半謂大吕夾鍾中吕夷則無射三五十五并本五凡二十二十就三十合成五十也不得不失者生四子謂㽔賔黃鍾也二四為八并本二為十也十就五十合為六十也言其得位者謂以陽居陽以隂居隂失位者謂以陽居隂以隂居陽不失不得者處隂陽交際之間也又黃鍾太簇等七律各統一月自為宫其餘五十三律隨所生月六七等為其月之宫則周一期月數如京房所述然其所生者則黃鍾生色育執始大吕生分否陵隂之類是也其上三分益一下生三分去一皆漢書律歷志云禮記正義續通典云漢書所載律吕相生皆一上一下起黃鍾九寸為首展轉生之終於仲吕得十二律所云下生者謂長管生短管也所謂上生者謂短管生長管也皆云三分其管而損益之應下生者損其一分應上生者益其一分各得其所生之管長短之數是則損長為短益短為長也假如黃鍾九寸之管分作三分每分合有三寸計九寸除其三分自然合成六寸即得六月林鍾之管謂之下生也如以林鍾六寸之管分作三分即三分合有二寸即此之數加於六寸之上自然合成八寸即得正月太簇之管謂之上生也盡十二管其例一同陽下生隂隂上生陽然則準黃鍾林鍾太簇三管各得全寸之分餘外九管則有微分之數中三分損益自然之所致也據漢志又司馬遷等本法皆三分十月應鍾益一上生五月㽔賔損一下生十二月大吕若用此法則大吕之管惟長四寸有竒此是漢志一上一下之法而京房等遂從五月㽔賔又重上生十二月大吕緣此大吕夾鍾仲吕三管各於漢志本數之上三分益一以為生於是六吕之管添長八寸有竒夾鍾之管添長七寸有竒仲吕之管添長六寸有竒餘之九律並依漢志不改所以㽔賔本合下生大吕而遂改為上生因與應鍾重生上也緣大吕一管改作上生所以自大吕以下相生咸易漢志上下之號故大吕本合上生夷則而遂改為下生也夷則本合下生夾鍾而遂改為上生也夾鍾本合上生無射遂改而為下生也無射本合下生仲吕而遂改作上生也案晉書律歷志云五音之體務在和聲益則加倍損則減半其於本音常為無爽然則言上生下生者相生之道也言重上生者吹候之用也於㽔賔重一生者通為用之數故言律者因焉非相生之正謹案晉書此説猶未盡其義何者既云其於本音常為無爽何更云非相生之正耶案所以㽔賔重上生大吕者亦不獨在取聲和以及吹候之用也其本意蓋取排管餘殺欲使一例均同耳律吕乘之數禮運曰五聲六律十二管還相為宫也鄭玄注云宫數八十一黃鍾長九寸九九八十一也三分宫之一生徴徴數五十四林鍾長六寸六九五十四也三分徴益一生商商數七十二太簇長八寸八九七十二也三分商益一生羽羽數四十八南吕長五寸三分寸之一五九四十五又三分寸之一為四十八也三分羽益一生角角數六十四姑洗長七寸九分寸之一七九六十三又九分寸之一為六十四也三分角去一生變宫三分變宫益一生變徴自此以後則隨月而變所謂還相為宫三場指南聲律生於日辰揚子雲曰聲生於日律生於辰取法於五行十二辰之義也聲生於日日有五故聲亦有五日謂甲己為角乙庚為商丙辛為徴丁壬為羽戊癸為宫是五行合為五日五音之聲生於日也律生於辰者十二律出於十二辰子為黃鍾之類是也律吕傳後之説唐禮樂志云聲無形而樂有器古之作樂者知夫器之必有弊而聲不可以言傳益懼器失而聲遂亡也乃多為聲以著之故始求聲者以律而造律者以黍自一黍之廣積而為分寸一黍之多積而為籥合一黍之重積而為銖兩此造律之本也故為之長短之法而著之於度為之多少之法而著之於量為之輕重之法而著之於權衡是三物者亦必有時而弊而又總其法而著之於數使其分寸籥合銖兩皆起於黃鍾然後律度量衡相用為表裏使得律者可以制度量衡因度量衡亦可以制律不幸而皆亡則推其法數而制之用其長短多少輕重以相參考四者既同而聲必至聲至而后樂可作矣夫物用於有形而必弊聲藏於無形而不竭以有數之法求無形之聲其法具存無作則已茍有作者雖去聖人於千萬嵗後無不得焉此古之君子知物之終始而憂世之慮深其多為之法而丁寧纎悉可謂至矣三代既亡禮樂失其本至其聲器有司之守亦以散亡自漢以來歷代莫不有樂作者各因其所學雖清濁髙下時有不同然不能出於法數至其所以用於郊廟朝廷以接人神之歡其金石之響歌舞之容則各因其功業治亂之所起而本其風俗之所由黃鍾之宫月令中央土律中黃鍾之宫正義云黃鍾之宫於諸宫為長季夏土王其聲最重謂土之聲氣應此黃鍾之宫聲非黃鍾一聲也黃鍾候氣之管本位在子此是黃鍾宫聲與中央土聲相應但土無候氣之法取黃鍾之宫聲以應土耳非候氣也故賀瑒云黃鍾是十一月管何緣復應此月正以土義居中故虗設律於其月實不用候氣也是以此項注云季夏氣到則黃鍾之宫應直言律中黃鍾之宫不言律應者明謂中央土聲與黃鍾為宫音相應非為氣應也蔡氏及熊氏以為黃鍾之宫謂黃鍾少宫半黃鍾九寸之數管長四寸五分六月用為候氣案六月林鍾之律長六寸七月夷則長五寸三分有餘何以四寸五分之律於六月候之乎又土聲最濁何以與黃鍾半聲相應乎其説非也不云黃鍾律最長而云黃鍾之宫最長者惟黃鍾宫聲於諸律最長故云黃鍾之宫也禮記正義曰國語云黃鍾所以宣飬六氣九德案彼注十一月建子陽氣在中六氣隂陽風雨晦明九德金木水火土榖正德利用厚生作事宣遍黃鍾象氣伏地物始萌所以遍飬六氣九功之德若施於人六情正德天德利用地德厚生人德也變宫變徴説夫五音相生而獨宫徴有變聲何也宫為君商為臣角為民徴為事羽為物君也者法制號令之所自出也宫故生徴法度號令所以授臣臣所以奉承者也徴故生商君臣一德以康庶務則萬物得所民遂其生矣故商生羽羽生角也然臣有常職民有常業物有常形不可以遷遷則失其常矣商羽角三聲此其所以無變也君總萬務不可執以一方事通萬務不可滯於一隅故宫徴二聲必有變也鍾律月令注曰律候氣之管以銅為之律中者中猶應也孟春氣到則太簇之律應應謂吹灰也正義云角是春時之音律審正月之氣音由氣成以其音氣相須故角律同處其太簇夾鍾六律六吕等皆是候氣管名又計太簇管數倍而更半鑄之為鐘名曰太簇之鍾元生於太簇之律是律在於前鍾生於後故律歷志云黃帝制十二筒以聽鳯凰之鳴其雄鳴則為六律雌鳴為六吕是律生在前蔡氏以為太簇鍾名先有其鍾後有其律非也陽管為律隂管為吕又隂律利同言與陽同也總而言之隂陽皆稱律故十有二月皆稱律中也律管案司農注周禮陽律以竹為管隂律以銅為管鄭康成則以皆用銅為之案律歷志量者籥合升本之黃鍾之籥而五量加之其法皆用銅聲中黃鍾以此凖之故知用銅也司農云陽律以竹隂律以銅非也律應謂之吹灰者蔡雍云其法為室三重户閉塗苴必周密布緹縵室中以木為案每律各一案內庳外髙從其方位加律其上以葮灰實其端其月氣至則灰飛而管通也熊氏云謂作十二律管於室中四時位上埋之取蘆莩燒之而實之律管中以羅縠覆之氣到則吹灰動縠矣律空圍九分凡律空圍九分者以黃鍾為諸律之首諸律雖長短有差其圍皆以九分為限孟康云林鍾長六寸圍六分則圍之大小隨管長短然則分寸之數不可定故鄭氏皆以為圍九分也九數鄭氏注周禮保氏九數云方田粟米差分少廣商功均輸方程羸不足旁要今有重差夕桀句股也禮記正義云九數之名書本多誤儒者所解方田一粟米二差分三少廣四商功五均輸六方程七羸不足八旁要九今有重差句股者鄭司農指漢時云今世於九數之內有重差句股二篇其重差即為舊數差分也去舊數旁要而以句股替之為漢之九數即今之九章也馬融干寶等更云今有夕桀各為一篇未知所出今依鄭司農注周禮之數餘並不取禮記正義度量權衡書乃同律度量衡三代式遵斯制秦滅學之後紛紜莫定漢書曰夫推歷生律制器規圎矩方權重衡平唯繩嘉量探頥索隱鈎深致逺莫不用焉度長短者不失毫釐量多少者不失圭撮權輕重者不失黍纍紀於一協於十長於百大於千衍於萬其法在算術宣于天下小學是則職在太史羲和掌之度者分寸尺丈引也所以度長短也本起黃鍾之長以子谷秬黍中者子北方北方黑謂黑黍也一黍之廣度之九十分黃鍾之長黃鍾九寸一為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣量者籥合升斗斛也所以量多少也本起於黃鍾之籥用度數審其容以子谷秬黍中者千有二百實其籥以井水凖其槩十籥為合十合為升十升為斗十斗為斛而五量嘉矣權者銖兩斤鈞石也所以稱物平施知輕重也本起於黃鍾之重一籥容千二百黍重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石權與物鈞而生衡衡運生規規貟生矩矩方生繩繩直生凖凖正則平衡而鈞權矣是謂五則也位於北方太隂為智為水水曰潤下智者謀謀而深故為權北方之義也大小有準輕重有數各應其象五權謹矣度以黍起亦以絲起隋志曰孫子算法云蠶所生吐絲為忽十忽為杪十杪為毫十毫為釐十釐為分此皆起度之源斛數秉莒稯秅儀禮聘禮云十斗曰斛十六斗曰藪色縷反十藪曰秉秉十六斛為江淮之間量名有為藪者今文藪為愈二百四十斗謂一車之米秉有五藪四秉曰莒此秉謂刈禾盈手之秉也莒音才竹反者也若今萊易之間刈稻聚把有名為莒毛詩云彼有遺秉又云此有不斂穧十莒曰稯總十稯曰秅䄷四百秉為一䄸一車之禾三稯為千二百秉三百莒三十稯也王制言古尺周尺玉人職云圭尺有二寸又云桓圭九寸是周猶以十寸為尺也王制云以周尺六尺四寸為步乃是六十四寸則謂周八寸為尺也或言周尺八寸鄭即以古周尺十寸為尺八尺為步則步八十寸鄭又以今周尺八寸為尺八尺為步則今步皆少於古步一十六寸以此計之則古之四步剩出今之一步古之四十步為今之五十步古之八十步為今之一百步則合云古者百畝當今百五十六畝二十五步古者百里當今百二十五里今王制乃曰古者百畝當今東田百四十六畝三十步古者百里當今百二十一里六十步四尺一寸二分與此不相應者蓋六國時變亂法度經文散亂不可用也禮記正義周有十寸之尺有八寸之尺家語曰布指知寸布手知尺投壺記曰籌室中五扶堂上七扶公羊傳曰膚寸而合鄭氏曰鋪四指曰扶一指按寸何休曰側手為膚按指為寸扶即膚耳然則寸尺之度取諸身也漢律歷志曰一黍之廣為分十分為寸十寸為尺然則寸尺之廣又取諸物也先王制法近取諸身逺取諸物足以考信而無疑焉然後尺寸之度起矣則指尺之與黍尺一也黍有巨細故尺有長短先儒以黍之巨者積而為寸則於膚指不合於是有指黍二尺之辨謂圭璧之屬用指尺冠冕尊彛之屬用黍尺豈其然乎周禮典瑞羡以起度考工記壁羡度尺好三寸以為度壁徑九寸羡而長之從十寸廣八寸同謂之度尺則周之法十寸八寸此皆為尺也考工記於案言十有二寸於鎮圭言尺有二寸此十寸尺之證也説文曰咫八寸周尺也王制曰周尺八尺為步今以周六尺四寸為步六尺四寸乃八尺亦此八寸尺之證也隋書所載歷代之尺至有一十五種蓋古尺既廢後世長短異同之論遂不一也陳禮書造歷之時太史公之為律書其始不言律而言兵不言兵之用而言兵之偃及言兵之偃而言漢文帝尤加詳焉既曰陳武請伐朝鮮而文帝以謂願且臨邊設候結和通使由是而天下富庶雞鳴狗吠煙火萬里可謂和樂者矣又曰文帝之時能不擾亂由是而百姓遂安耆老之人不到市廛遊遨嬉戲如小兒狀嗚呼若太史公者可謂知制律之時而逹制律之音者也何則文帝時偃兵息民結和通使而天下安樂則民氣歡洽隂陽協和而天地之氣亦隨以正茍制律以候之其氣之相應自然知音律之為是其氣之不合自然知音律之為非因天地之正氣以定三代之正律律有不可定者乎古人所謂天地之氣合以生風天地之風氣正而十二律定殆謂是歟後周正律唐製十二和樂合四十曲八十四調又有九功九德之舞開元中更造三和樂郊廟元會册命大禮則用之自漁陽入寇樂工散亡樂音不嗣周世宗留意雅樂時王朴竇儼俱號知音顯德中命朴儼考正八音為一代之樂朴乃以古黑黍之法以審其度造成律吕以定六律六吕旋相為宫之義續通典宋朝考正音律五代之亂禮樂之制寂然無聞太祖雖在兵革之間注意於禮樂之內故和峴之徒因周人舊樂創為一代之制其為典則有龍安髙安之異其為舞則有文德武德之殊用之宗廟而交神人之慶也以至太宗增琴阮之制真宗新隨月之律厥後李照參考和峴之徒而黃鍾之音或近於太簇峴遂改造而調又髙則是和峴失之於清而李照失之於濁也於是又制神龜紫芝甘露嘉禾玉兔之歌謂之五瑞又假律鑄十二鍾設黃鍾大吕太簇夾鍾以附四清聲之次以奏朝會登歌此其所以有雅鄭之異也皇祐中仁宗祀明堂遂鋭意樂律詔訪天下通知音律之士而胡瑗阮逸之徒相繼而起瑗以上黨之黍考正鍾律而鍾之不合於古制者三磬之不合於古制者七莫不按古樂為之仁宗遂造七均十二律造乾安之曲制化俗右文威功睿德之舞與夫大善大宰大順大慶大定大盛大明之舞相間之郊廟明堂故一代之典鼎新大備蓋由先和民心後正律吕而然也羣書考索卷五十三
