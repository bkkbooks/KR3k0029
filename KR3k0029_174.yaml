body:
  text: 羣書考索續集卷四十三宋章如愚編兵制門漢唐兵漢唐兵皆三變漢初用都尉兵征伐後用京師兵又其後用州牧之兵唐府兵彍騎藩鎮唐兵唐兵志唐兵之大勢三變其始盛時有府兵府兵後廢而為弩騎弩騎又廢而為方鎮之兵盛矣及其末也強臣捍將兵布天下而天子亦自置兵於京師曰禁軍府兵太宗貞觀十年更號統軍為折衝都尉别將為果毅都尉諸府揔曰折衝府凡天下十道置府六百三十四皆有名號而關中二百六十有一皆以𨽻諸衛凡府三等兵千二百人為上千人為中八百人為下府置折衝都尉一人髙祖舊名統軍左右果毅都尉各一人舊名别將凡民年二十為兵六十而免能騎而射者為越騎其餘為步兵武騎凡當宿衛者畨上兵部以逺近給畨自髙宗武后時府兵之法浸壞宿衛不能給宰相張説乃請一切募士宿衛後更號曰弩騎分𨽻十二衛揔十二萬為六畨自天寶以後弩騎之法又稍廢八載折衝諸府至無兵可交及祿山反皆不能受甲矣初府兵之置居無事耕於野其畨上者宿衛京師而已四方有事則命將迭出事解乃罷兵散於府將歸於朝故士不失業而將帥無握兵之重方鎮方鎮者莭度使之兵也原其始起於邊帥之屯防者唐初兵之戍邊者大曰軍小曰守捉曰城曰鎮而總之者曰道自武德天寶以前邊防之至其軍城鎮守捉皆有使而道有大將一人曰大總管已而更曰大都督太宗時行軍征討曰大總管在其本道曰大都督自髙宗永徽以後都督帶使持莭者始謂之莭度使然猶未以名官景雲二年以賀拔延嗣為涼州都督河西莭度使自此而後接乎開元朔方隴右河東河西諸鎮皆置莭度使及范陽莭度使祿山反陷兩京肅宗起靈武而諸鎮之兵共起誅賊其後慶緒思明繼起中國大亂肅宗命李光弼等討之號九莭度之師久之大盜既滅而武夫戰卒以功起行陳列為侯王者皆除莭度使由是方鎮相望於內地大者連州十餘小者猶兼三四故兵驕則逐帥帥強則叛上或父死子握其兵而不肯代或取舍由於士卒往往自擇將吏號為留後以邀命於朝天子顧力不能制則忍耻撫之謂之姑息之政始時為朝廷患者號河朔三鎮及其末也朱全忠以梁兵李克用以晉兵更犯京師而李茂貞韓建近據岐華妄一喜怒兵已至於國門及昭宗奔岐梁兵圍之天下無復勤王者向之所謂三鎮徒能胎禍而已其他大鎮南則吳浙荆湖閩廣西則岐蜀北則燕晉而梁益據其中自國門以外皆分裂為方鎮矣禁兵禁軍者南北衙兵也南衙諸衛兵是也北衙禁軍也初髙祖以義兵起太原已定天下悉罷遣歸其願留宿衛者三萬人髙祖以白渠旁腴田分給之號元從禁軍從老不任事以其子弟代謂之父子軍及貞觀初太宗擇善射者百人為二畨於北門長上曰百騎以從田獵又置北衙七營選材騎壯月以一營畨上十二年始置屯營於玄武門領以諸衛將軍號飛騎髙宗始取府兵越騎步射置左右羽林軍武后改百騎曰千騎睿宗改千騎曰萬騎分左右營玄宗以萬騎平韋氏改為左右龍武軍代宗以射生軍入禁中除內亂皆賜名寶應軍後吐蕃入寇魚朝恩以神䇿軍屯苑中為天子禁軍非它軍比也邊兵弱則夷狄為患畿兵弱則邊兵為患推唐弊源只緣開邊大廣則都督兵不得不多都督兵多則畿一弱不應不為患唐初以軍鎮城守捉兵置都督於邊以制夷狄也以府兵畨止於京師置十二衛所以制外兵也至於府兵壞而為射騎射騎又壞內兵既弱則邊兵為患祿山反以邊兵制變則吐蕃回紇乘間而入惟宋太祖邊兵少而専征最為得䇿府兵乃兵農之分前輩論府兵皆以為兵農之合乃是兵農之分儒者但説先王寓兵於農先王何曽寓兵於農分田使之耕築室使之居既有以衣食之則不可無以自衛非是用以求勝自苻堅伐晉民皆盡發蘇綽周人欲休息其民遂令各募一項人為兵蠲除科繇不復他役國家既可長享為兵之利而民得家出一人之外亦且可以自安後來法度漸立至太宗府衛既成農遂不復為兵兵亦不復為農兵農之分所以終不復合人但見其寓兵於農遂以為先王之意非也葉適府兵煩勞周制三十服戎六十弛政嵗率不過用民三日蓋沒一人之齒給公事才三月耳田家一夫征戍卒嵗則四夫可以安坐老佚是謂羡卒惟社田與追胥竭作外此無擾也今府兵丁悉𨽻役而它役不免亦不足念乎政典教兵之法案其表率相距五十步二表之間二百五十步爾若以步法立人殆不足以容六軍然則不盡會耶教之而不盡會何也六軍固近閲也千里之畿僅為軍者六六軍之旅僅入閲者一教事若此其簡也今關中兵嵗聚而教之毋乃暇日自弊乎陳君舉府兵府數異同按陸贄傳太宗列府八百而關中五百唐兵志凡天下大道置府六百三十四而關中二百六十一又按杜牧原十六衛云凡府五百七十四有四十萬人三者之説不同今以唐地志每州之府數計之僅杜牧同其説當可據也凡府有三上府千二百人中府千人下府八百人但以中為率亦不止四十萬人則是下府為多也陸云關中五百乃其中道總數之大凡似太相逺豈併所謂軍鎮守捉而統以府計耶抑姑欲戒德宗以居重馭輕之意不區區於數之合耶府兵發而後有養兵之費當唐盛時天下户口八百餘萬而府兵四十萬皆自食其力不賦於民凡民租調以奉公上者二十分之十九其一為兵是以國富兵裕亦不失其兵強也田制既壞府兵已廢而唐常有養兵之困孫樵云率中户五供給一兵宿兵百萬必五百萬户然後能當之使唐常有五百萬户盡以給兵其他用度又將安取况其户數有不及者耶王彥威言長慶户三百五十萬而兵乃九十九萬率三户資一兵是其為不足也已居五之二况又有他經費則民與國安得不俱貧耶所以和糴鹽鐵等錢括苗榷利借商進奉獻納靡所不至稍知體國者於是有減兵之説屯田之説率不見其裕而徒有傷今思古之嘆夫兵之法行縣官嵗受八百萬之賦入皆不為兵費及府兵之法壞盡天下之户調猶不足以給兵安得不深思太宗之初制哉府兵役繁地逺所以難守府兵之法惟太宗能行之其所以處府兵之條目蓋已繁矣既耕又戰又畨上又以𨽻它役而其置府又或絶逺關內有府二百七十四蓋已逺及朔方邊陲之地况其餘四百𨽻於他道者其隔逺如此既繁且逺所以難守也唐太宗老猶好兵太守弱冠起義兵咄嗟間定四海命一偏將略示計謀則擒頡利虜髙昌破吐谷渾降薛延陀莫不郡縣其地衣冠其人狃於常勝之味一日不跨鞍馬則伎癢激烈思復逞其威神嗟夫太宗愧於三王者道不足以制氣耳唐兵三變始末唐初十六衛左右衛上將軍揔之驍衛武衛威衛領軍衛金吾衛監門衛千牛衛並分為左右上將軍並參掌南北衙兵髙宗始置左右羽林軍玄宗改曰左右龍武軍肅宗置左右神武軍揔曰北衙六軍即百騎千騎萬騎即彍騎神䇿也諸史皆不志兵惟歐陽公作新唐史乃志史以唐兵有井田遺意也惜乎不保其往耳嘗觀太宗起晉陽之甲未免於智數開天䇿府推刃同氣亦未免於詐力天下既定因周齊之制置十六衛將軍內統北門百騎七營屯騎謂之北衙禁軍外統關內天下諸府畨上宿衛者謂之南衙衛兵唐志云南衙諸衛兵是也北衙禁兵是也是則北衙即漢之北軍而南衙即漢之南軍也新舊二史志皆大略同安得有井田鄉遂之遺意哉蓋後周府兵之制講閲戰陳皆於農隙身租庸調一切蠲除北齊租調之制十八受田二十充兵六十免力役是則周齊之兵皆受田矣唐沿周齊有口分世業田三衙隊正副各八十畝見通典王制諸府坊團有主掌督課農桑是則唐兵亦受田矣兵農一致所以得井田之遺意歟井田之制漸壞於春秋戰國井田壞為并兼自晉惠爰田始公入晉許郤乞汶陽田百萬丕鄭父蔡田七十萬趙簡子誓師亦曰克敵者任田十萬故鄉遂變而為技擊鋭士者勢也口分世業既開貿易之門凡庶民貧者得賣永業即桑果木之田也徙寬鄉者得賣口分已賣者不復授死者收之以授無田者見食貨志而府兵變為彍騎者亦勢也况北衙禁軍自睿宗平韋氏之亂左右屯營欲避征戍者皆納資以𨽻軍而府兵之家不免雜徭千里畨上宿衛名為侍官周府兵時已自軍卒為侍官安得不逃匿而耗散乎此府兵所以變為彍騎也然則彍騎變為藩鎮者何如哉太宗務廣地諸邊都護諸道經略大將大總管大都督即藩鎮之漸也自開元而上北衙禁軍諸府衛兵尚可枝梧太平日久至天寶末府兵既壞而彍騎之為禁軍者又復單弱玄宗幸蜀從者千人肅宗幸靈武士不滿百自是以來調補禁衛又皆以宦者主之李輔國等此所以禁衛弱於上而藩鎮強於下也然則開貿易而馴致府兵之壞務廣地而遂成藩鎮之弊是則太宗之過至於玩太平而不能振起前人之制疑大臣而以宦者激成藩方之僣者玄宗肅宗不能逃責矣太宗時有事命將於朝事已則兵散於府將歸於朝故藩方無握兵之變自玄宗以安祿山為范陽莭度已足以基天寶之變古今大亂未有不生於大治之時者玩故也陽極隂生亦數也惟天子不可以言數唐南北衙李揆比漢南北軍相制唐舊制南北衙文武區别以相伺察猶漢之南北軍也李輔國以宦者總北衙六軍又欲以北衙羽林騎士徼巡京師因得以併南衙金吾之權也李揆托漢制以為言雖暫抑而不行及其終也嗤點文臣之贓遂貽甘露之禍皆宦者為之也嗚呼肅宗疑李郭輩而使李輔國典北衙兵德宗疑李晟輩而使竇文場盡領神䇿軍卒之李郭洎晟不亂法而亂法者輔國文場也自是宦者亂於上藩鎮亂於下而唐遂以亡何異支撑大厦不用巨材而用朽木欲無顛覆其可得乎是惑也非疑也唐志與陸贄論府兵多寡不同德宗初年唐志謂十道置府六百三十四而關內二百六十一陸贄謂諸府八百餘所而關中殆五百焉唐志所言乃貞觀十年之制也十二年內置左右七營飛騎又選北門百騎十三年天下州府增至三百五十八十四年以髙昌為州縣唐地延袤萬里二十一年分敕勒諸部置六府七州二十三年奚契丹內屬置十四州意者天下內外所增之府皆以𨽻關中故關中獨居五百陸贄但約其末年大數而言之也李泌議復府兵德宗末年觀泌之言止謂髙宗時府兵久戍不還武后時府兵為人所賤玄宗時邊將利府所入而有役死者此府兵所以壞也泌乃欲於沿邊遍募戍卒俾耕荒田然後旋理以府兵之法雖略行之竟不復就蓋泌之法乃屯田法耳府兵之法自上而下可也屯田之法由外而內則不可矣况德宗末年宦者典兵於內方鎮交兵於外其何以行之哉唐五代養兵始末唐兵歷敘唐初授人以口分世業而取之以租庸調故其蓄兵以府衛兵雖多而無所損設官有常員不濫而易以祿及開元天寶世業租調府兵三者俱廢兵冗官濫而兩稅之外有鹽鐵轉運屯田和糴鑄錢括苖榷利借商稅間架進奉獻助無所不至乃知官兵民有常職故費約而兼足足則交相養口分世業為之本也官兵民無常職故食冗而俱貧貧則交相賤由口分世業之不存也然世業府兵之制雖壞而猶有軍府屯田營田以扞要衝天下屯總一百九十二處以助兵食玄宗開元末天下屯田入榖幾二百萬斛憲宗元和中韓重華屯田于振武嵗收粟二十萬石穆宗太和末畢諴營田邠寧嵗收三十萬斛皆度支錢以數百萬計至於五代易置天子皆以兵於是不聞有屯田者惟見石晉括民榖周氏鬻營田而𨽻營田之民於州縣遣使均天下之田稅而已然則兵民之分始於府兵之壞而極於屯田之俱廢天下安得不以養兵而困哉此五季有犯啜茗餐鹽之禁者悉有常刑皆為養兵故也石晉失關南十縣契丹主南來既度鴈門之險自知其必勝者以中國有險固而不知有守也言猶在耳而復以關南十縣豫之何晉氏之昏庸哉自時厥後更漢周而逮於宋幾得而復失者屢矣天以險固畀夷而不畀夏抑非偶然者耶何夷狄恃此卒為中國患也周世宗湯武以仁義之師除天下之同害方至大坰已有慙德旋旌牧野首即散牛誠以兵凶器不可恃以毒民也周世宗食珍膳自言有愧於民惟當親冒矢石為之除害愚恐其害未除而民已困矣惟其有是言故髙平奏捷秦鳳迎降奄有江北之地將復關南之疆不值彌留未有已時也茲其所以轉周而為宋歟羣書考索續集卷四十三
