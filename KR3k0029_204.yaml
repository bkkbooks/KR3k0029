body:
  text: 羣書考索别集卷十七宋章如愚撰厯門渾天儀古制至宋朝而備厯代以来其法漸宻宋朝因之為儀三重其在外者曰六合備平置單環上刻十二辰八十四隅在地之位以凖地而面地四方側立黑雙環具刻去極度數以中分天脊直跨地平使其半出地上半入地下而結扵其子午以為天經斜倚赤單環具刻赤道度數以平分天腹横繞天經亦使半出地上半入地下而結扵其卯酉以為天緯二環表裏相結不動其天經之環則南北二極皆為圎軸虚中而内向以挈三辰四逰之環以其上下四方扵是可考故曰六合次其内曰三辰儀側立黑雙環亦刻去極度數外貫天經之軸内挈黄赤二道其赤道則為赤單環外依天緯亦刻宿度而結扵黑雙環之夘酉其黄道則為黄雙環亦刻宿度而又斜倚扵赤道之腹以交結扵卯酉而半入其内以為春分後之日軌半出其外以為秋分後之日軌又為白單環以承其交使不傾墊下設機輪以水激之使其日夜隨天東西運轉以為象天行以其日月星辰扵是可考故曰三辰其最在内者曰四逰儀亦為黒雙環如三辰儀之制以貫天經之軸其環之内則兩面當中各施直距外趾指兩軸而當其要中之内又為小窽以受玉衡要中之小軸使衡既得隨環東而運轉又可隨䖏南北低昂以待占候者之仰窺焉其以東西南北無不周徧故曰四逰此其法之大畧也書說名儀象觀揚子雲八事之難則盖天不如渾天觀蔡邕無師法之譏則宣天亦不如渾天觀晉志好音狥異之語則昕安穹天皆不如渾天夫渾天乃顓帝之始造者也周旋無端其形渾渾此則為渾天之名上以璣運下以衡窺此則為渾天之儀日月更迭星宿蟠羅此則為渾天之象究其名驗其儀考其象定三光之出入逆隂陽之升降推嵗序之往来有不必造緹室之律以候氣正陽城之土圭以測景矣是故梁置扵重雲殿隋置扵觀象殿太宗置扵凝暉閣皆所以寓崇重之意也魏永興有銘唐𤣥宗有銘崔子玉亦有銘皆所以示不朽之𫝊也虞帝用璣張衡用銅梁令瓚用木魏永興用鐵皆所以為造器之驗也平子轉之以水葛衡動之以機張思訓代之以水銀皆所以成轉運之法也有六合儀有三辰儀又有四㳺儀李淳風所造之儀也有雙環規有單横規又有單規梁人所置之規也有陽經環有隂經環又有璇極環僧一行所製之環也渾天造化精深㣲妙又豈容以淺識肆其喙哉彼梁武帝立新意以排渾天王仲壬以掘地有水駁渾天是皆未知渾天之妙者也顔達龍衡窺璣仰之制以衡窺璣仰占天象之實自是一器而今人所作小渾象自是一器不當并作一說也元祐之制極精然其書亦有不備乃最是𦂳切䖏必是造者秘此一節不欲盡以告人耳文公荅江徳明天體圎象之制天經之說正坐以天形為可低昂反覆耳不知天形一定其間隨人所望固有少不同䖏而其南北髙下自有定位正使人能入扵彈圎之下以望之南極雖髙而北極之在北方只有更髙扵南極决不至反入地下而後遇南方也但入單圎下者自不有見耳盖圗雖古所創然終不似天體孰若一大圎象鑚宂為星而虚其常隠之規以為甕口乃設短軸於北極之外以綴而運之又設短柱於南極之北以承甕口設四柱小梯以入其中而扵梯未架空北入以為地平使可仰窺而不失渾體耶古人未有此法杜撰可笑試一思之恐或為即著其說以示後人亦不為無補也文公荅蔡季通渾象疏堯典月令昏星遲速按堯典仲夏星火至秦月令仲夏昏亢中大率遲二十六度今仲夏昏軫中又遲十七度疏曰先儒論堯典中星多牽合月令月令乃吕不韋以秦厯増損周公時訓而為之者也大抵季月中星與堯典仲月中星多合盖其嵗差使然爾嵗差之說有以四十五年差一嵗者宋大眀厯是也有以百八十六年差一度者梁虞􅒠厯是也有以百八十三年差一度者梁祖沖之大同厯是也有以八十四年差一度者唐開元之大衍厯是也虞喜謂五十年差一度何承天謂百年差一度皆未得其實宋朝紀元厯以七十八年差一度最為宻凖唐志有云考古史及日官候簿以通法計之三千四十分度之三十九為一嵗之差盖亦七十八年而差一度也崇天厯慶厯甲申冬至日在斗五度以嵗差之法推而上之自慶厯甲申去唐開元甲子凡三百二十一年日差五度故唐志云開元甲子日在赤道斗十度是也又推而上之自開元甲子至漢太初元年丁丑凡八百二十七年日差十度故唐志云以開元大衍厯嵗差引而退之則太初元年冬至日在斗二十度是也其太初厯云日在牽牛初為術疎矣自太初丁丑推而上之去秦荘襄王元年一百四十五年日差二度冬至日當在斗二十二度故月令云日在斗也自秦荘㐮王元年推而上之去堯之甲子凡二千二十八年日差二十六度冬至日當在虚一度日沒而昴中故堯典云日短星昴是也盖月令之中星不宗堯典固已用嵗差之法自漢以来迄扵晉唐諸儒皆以日在斗牛互為膠柱之說雖厯家亦不括其非至宋梁以来厯家雖論其差儒者猶未深察故唐臣疏月令中星參以堯典謂七星畢見果然則中星之度數不必考而玉衡為無用也至宋朝命儒臣修唐志而嵗差之法始眀矣然先儒言日至所在星度多舉冬至為例此獨舉仲夏中星者愚扵月令仲冬中星有疑故闕之中星遲則黄道隨夫中星遲則日至所在不同而黄道隨之矣疏曰黄道者光道也日之所行故曰光道晉志載葛洪渾天儀注謂黄道與赤道東交扵角五少弱西交扵奎十四少強南至斗二十一度北至井二十五度唐志云黄道春分與赤道交奎五度多秋分與赤道交扵軫十四度少南至斗十度北至井十三度愚按葛洪所引渾天儀注似是漢人所作其論黄道東西交南北至度數近太初元年日行之度唐志則㩀開元甲子而云所以不同也至扵漢志謂光道北至東井南至牽牛東至角西至婁其北至東交與葛洪同其南至西交與葛洪異盖班固主太初厯而云其太初厯謂冬至日在牽牛初東漢賈逵已論其疎矣葛洪與賈逵一說也此所謂日至所在不同而黄道隨之矣按堯典以著其端按堯典以著演紀之端也疏曰凡厯數所起謂之演紀之端皇甫謐曰帝堯以甲辰之嵗即帝位皇極經世所載亦然凡在位七十年二十一年而得甲子即以為演紀之端是年天正冬至日在虚一度以紀元厯步之一萬分度之百二十八為一嵗之差凡七十八年日差一度自帝堯演紀之端至漢太初元年丁丑積二千一百九十四年日差二十七度八千二百七十二分至唐開元甲子積三千一年日差凡三十八度四千一百二十八分至宋朝乾徳甲子積三千二百四十一年日差凡四十一度四千八百四十八分至慶厯甲申積三千三百二十一年日差凡四十二度五千八十八分至紹興甲子積三千四百二十一年日差凡四十三度七千八百八十八分若不存演紀之端則積分計差之法何所從始此所以只依堯典而著演紀之端也春秋文曜鈎云唐堯即位羲和作渾儀王蕃亦云渾天儀者羲和之舊器也愚按堯典所載有厯有象故作渾象渾象者羲和之舊器也安得不著堯典之中星以為演紀之端乎七政皆緯星日月五星是為七政皆緯星也疏曰不動者為經星動者為緯星張衡曰文曜麗乎天其動者有七日月五星是也故曰七政皆緯星也今著黄道南北至去赤道各二十四度以驗日晷之短長疏曰後漢志載張衡渾儀赤道横帶天之腹黄道斜帶其腹去赤道表裏各二十四度晉志載葛洪渾天儀注赤道帶天之紘黄道出入赤道極逺者去赤道二十四度唐志載一行黄道儀云赤道帶天之中以分列宿之度黄道斜運以眀日月之行五代司天考載王朴曰赤道者天之紘帶也其勢圜而平紀宿度之常數焉黄道者日軌也其半在赤道内半在赤道外去極二十四度此所以著黄道南北至去赤道各二十四度也日晷短長之說漢志曰日近極故晷短日逺極故晷長日去極逺近難知要以晷景晷景者所以知日之南北也按周禮大司徒以土圭之法測土深日至之景尺有五寸謂之地中先儒皆謂地中今陽城是也立八尺之表日永景尺五寸日短景丈三尺其鄭康成注及考靈曜周髀靈憲王蕃陸績諸書並云日景扵地千里而差一寸隋志載宋元嘉十九年遣使往交州測景夏至日影出表南三寸三分何承天計陽城去交州路當萬里而影差一尺八寸二分是六百里而差一寸也唐太史議曰交州去洛九千里盖山川回折使之然以表考其弦當五千乎開元十二年遣使天下候影太史監南宫說擇河南平地設水凖繩墨植表以引度之大率五百二十六里晷差二寸餘南候林邑冬至晷六尺九寸夏至在表南五寸七分北候鐵勒夏至晷四尺二寸三分冬至晷二丈九尺二寸六分計陽城南距林邑徑六千一百二十二里五月日在天頂北六度北距鐵勒與林邑正等則五月日在天頂南二十七度四分舊說千里而差一度疏矣然則日晷短長之說不必以尺寸為較大約測其晷極長則知日南至測其晷極短則知日北至如斯而已矣書次以求晦朔書十二次以求月之晦朔而嵗成矣疏曰十二次亦曰十二辰日月之所㑹也晉志云班固取三統厯十二次配十二野其言最詳又有費直說周易蔡邕月令章句所言頗有先後魏太史令陳卓更言郡國所入宿度今附而次之自軫十二度至氐四度為夀星扵辰在辰鄭之分野屬兖州自氐五度至尾九度為大火扵辰在夘宋之分野屬豫州自尾十度至南斗十一度為析木扵辰在寅燕之分野屬幽州自南斗十二度至須女七度為星紀扵辰在丑吴越之分野屬揚州自須女八度至危十五度為𤣥枵扵辰在子齊之分野屬青州自危十六度至奎四度為陬訾扵辰在亥衞之分野屬并州自奎五度至胃六度為降婁扵辰在戍魯之分野屬徐州自胃七度至畢十一度為大梁扵辰在酉趙之分野屬冀州自畢十二度至東井十五度為實沈扵辰在申魏之分野屬益州自東井十六度至栁八度為鶉首扵辰在未秦之分野屬雍州自桞九度至張十六度為鶉火扵辰在午周之分野屬三河自張十七度至軫十一度為鶉尾扵辰在已楚之分野屬荆州此班固所志也其費直蔡邕之說所先後或一二度或三四度多不過六度又陳卓范蠡鬼谷先生張良諸葛亮譙周京房張衡並云角亢氐辰鄭兖州房心邜宋豫州尾箕寅燕幽州斗牛女丑吴越揚州虚危子齊青州室壁亥衞并州奎婁胃戍魯徐州昴畢酉趙冀州觜參申魏益州井鬼未秦雍州栁心張午周三河翼軫已楚荆州皆不計星度舉其大綱耳夫天運一周日移一度月移十三度十九分度之七日舒月速當其同謂之合朔舒先速後近一逺三謂之弦相與為衡分天之中謂之望以速及舒光盡體怯謂之晦凡十二晦朔而嵗成焉張衡靈憲曰日譬則火月譬則水火則外光水則含景故月光生扵日之所照魄生扵日之所蔽當日則光盈就日則光盡也皇極外書言月本黑受日之光而白與靈憲之說合矣此所以有晦朔也星家扵諸緯行度皆能著厯惟月行最速未及八刻已移一度不可著厯其為算法積分成度求之久逺易致差謬欲明其要不若求之晦朔日之所次則月之所㑹也自朔日計之每日行十三度十九分度之七至晦又求之㑹則弦望所次皆可得而推雖不中不逺矣日月之行皆有盈縮日盈月縮則後中而朔月盈日縮則先中而朔故曰雖不中不逺矣日月之㑹是為十二次十二次之所㑹則十二朔之所紀也十二晦朔雖曰成嵗常有餘分盖日行三百六十五日有二十五刻而周天月行二十九日有五十三刻強而與日㑹凡三百五十四日有三十七刻而十二晦朔終矣每嵗餘十日有八十八刻三嵗餘三十二日有六十四刻而置閠受二十九日有五十三刻尚餘三百有十一刻通十九嵗計之共餘二百六日有七十二刻凡置七閠受二百六日有七十一刻乃無餘分故揚雄太元十九嵗為一章一章者閠分盡也按六厯諸緯與周髀云日月同起扵端度日舒月速凡日行十九周月行二百五十四周而復㑹子端是為一章後漢制曰閠七而受其嵗十九名曰章是也四章為蔀蔡邕月令章句曰七十六年為蔀首是也二十蔀曰紀紀法一千五百二十年三紀為元韓子曰四千五百六十嵗為元是也此所以書十二次以求月之晦朔而嵗成也緯星可以數測其餘緯星自可隨其遲速以數步之也疏曰上文既眀日月之行矣其餘緯星謂五星也木東方曰嵗星火南方曰熒惑金西方曰太白水北方曰辰星土中央曰鎮星張衡靈憲曰日者陽精之宗月者隂精之宗五星五行之精也日行黄道日與五星皆出入黄道也隋志載宋元嘉十七年作小渾天其日月五星悉居黄道不著出入之度盖為之大約云耳唐志載李淳風黄道儀以玉衡璇規别帶日道旁列二百四十九交以擕月逰一行更造㳺儀黄道内施白道月環其法太煩所以難述然則月與五星大約出入黄道其纎悉則付之造厯者考其出入之度以推日月之交蝕五星之留速有差則以渾天占之盖渾天者象也厯紀其詳象著其晷厯象與天合而七政齊厯象不與天合則黄道差而七政不齊其厯與象皆當脩也按漢志月有九行者黒道二出黄道北赤道二出黄道南白道二出黄道西赤道二出黄道東一行考月行出入黄道為圗三十六究九道之増損作大衍厯五代司天考載王朴明九道以步月作欽天厯曰九道者月軌也其半在黄道内半在黄道外去極逺六度出黄道謂之正交入黄道謂之中交自古雖有九道之說盖亦知而未詳徒有祖述之文而無推步之用今以黄道一同分為八節一節之中分為九道盡七十二道而使日月無所隠其邪正之勢焉盖月之出入黄道時異而日不同非渾天所能述要之極逺不過六度則大數可知矣五星行度有舒有速金水輔日而行謂之輔星一嵗一周天火曰熒惑二嵗周天木曰嵗星嵗易一次十二嵗而周天土曰鎮星三十嵗而周天其盈縮也近日而疾逺日而遲去日極逺勢盡而留此其大畧也或曰七政不齊則厯當脩固矣渾象亦有修乎曰安得無修觀堯典與月令中星不同則黄道之交至凡七十八年一修矣黄道定而七政齊故曰其餘緯星自可隨其遲速以步之也經星或㣲或著經星有㣲有著凡萬有一千五百二十疏曰前漢志云凡天文在圗籍昭昭可見者經星常宿中外官凡百一十八名積數七百八十三星皆有州國官宫物類之象張衡靈憲曰星也者體生扵地積成扵天列宿錯峙各有所屬中外之官常明者百有二十四可名者二百二十為星上千五百而海人之占未存焉㣲星之數盖萬有一千五百二十庶物蠢蠢皆得繫命晉志云武帝時太史令陳卓總其石巫咸三家所著星圗大凡二百八十三官一千四百六十四星以為定紀盖靈憲所謂常明可名之星也唐志云使者六相元太言交州望極纔髙二十餘度八月海中望見老人星下列星粲然眀大者甚衆古所未識乃渾天家以為常沒地中者也大率去南極二十度以上之星則見盖靈憲所謂海人之占未存焉者也㣲星不可勝窮故舉而當諸萬物之數曰萬有一千五百二十也南北樞以象二極今斜倚南北樞去地髙深各二十六度以象二極疏曰王蕃曰天地之體状如鳥卵天包地外猶殻果黄也周旋無端渾渾然故曰渾天也又曰渾象之設地當在天中其勢不便故反觀其形地為外國扵已解者無異在内盖自古作渾象皆然惟吴葛洪與宋錢樂之所作使地居扵天中後之人亦不用其法盖其勢不便也今置木櫃以為地平盖從古法葛洪曰北極出地三十六度南極入地三十六度兩極相去一百八十二度半強繞北極徑七十二度常見不隠繞南極七十二度常隠不見唐志曰地三百五十一里八十步而極差一度林邑極髙十七度四分周圎三十五度常隠鐵勒極髙五十二度周圎百四度常見不隠然則南北極去地髙深各距三十六度據陽城而言也著赤道以定昏旦之中星著赤道帶天之腹書二十八舍以分周天之度而昏旦之中星定矣疏曰二十八舎者二十八宿之度數也以日月五星之所次舍故諸志亦曰二十八舍也東漢志載永元太史黄道銅儀以角為十三度亢十氐十六房五心五尾十八箕十斗二十四四分度之一牽牛女須女十一虚十危十六營室十八東壁十奎十七婁十二胃十五昴十一畢十六觜三參八東井三十輿鬼四栁十四星七張十七翼十九軫十九唐志一行大衍厯南斗二十六牛八婺女十二虚十大危十七營室十六東壁九奎十六婁十二胃十四昴十一畢十七觜觽一參十東井三十三輿鬼三栁十五星七張十八翼十八軫十七角十二亢九氐十五房五心五尾十八箕十一為赤道度其畢觜觽參輿鬼四宿度數與古不同舊經角距星去北極九十一度亢八十九度氐九十四度南斗百一十六度牛百六度虚百四度危九十七度營室八十五度東壁八十六度奎七十六度婁八十度胃昴七十四度畢七十八度觜觽八十四度參九十四度東井七十度輿鬼六十八度栁七十七度七星九十一度張九十七度翼九十七度軫九十八度一行大衍厯角距星去北極九十三度半亢九十一度半氐九十八度房百一十度半心百一十度尾百二十四度箕百二十度南斗百一十九度牽牛百四度須女百一度虚百一度危九十七度營室八十三度東壁八十四度奎七十三度婁七十七度胃昴畢七十六度觜觽八十二度參九十三度東井六十八度輿鬼六十八度栁八十度半七星九十三度半張百度翼百三度軫百度今用一行大衍厯更定度數較之扵古尤為精矣此所以著赤道帶天之腹書二十八舎以分周天之度也定昏旦之中星其法尤詳舜典曰在璇璣玉衡以齊七政鄭康成云其轉運者為璣其持正者為衡皆以玉為之七政者日月五星也以璣衡視其行度以觀天意也馬融曰渾天儀可旋轉故曰璣所謂衡者其横蕭也所以視星辰也璇為璣玉為衡貴天象也日月五星皆以此度知其盈縮進退愚按二說皆謂衡以視星辰之行度非謂以衡望璣也惟蔡邕盖天說謂圎者為璣其徑八尺以美玉為之懸而運之以象天之行直者為衡其長八尺以美玉為之孔徑一寸從下望璣以視星辰唐孔頴達疏遂采蔡說謂懸璣以象天而以衡望之轉璣窺衡以知星宿且邕謂璣為黄天懸而運之其徑八尺盡圗列宿固已稠穊管窺則亂矣況在函丈之内安用八尺之管窺之乎其說殊不可曉然則當從鄭康成馬融之說以衡視星辰之行度得之矣今求諸家之說為圗以附于後又按隋志載梁天監中祖于錯綜經注以推地中其法曰先驗昏旦定刻漏分辰次乃立表於凖平之地名曰南表候日中更當立表扵南表影中名曰中表夜依中表以望北極樞而立北表今參相直三表皆以懸凖定乃觀三表直者其立表之地即當子午之正三表曲者當東求之又以春秋二分之旦日始出半體乃立表扵中表之東名曰東表是日之夕日入西方半體又立表扵中表之西名曰西表乃觀三表直者則其地䖏夘酉之正也南北經之東西緯之各經百有二十一尺四分尺之三規而圜之周三百有六十五尺四分尺之一以象周天之度漏刻上求正日之昏從中表之北望之以候二十八宿之先至使與南表及中表相直為中星也至眀日昏時更望之星則西過一度乃移南表一尺以望之又明日星復西過一度又移南表一尺以望之至後星當表即是前星度分之盡也如是為法至三百六十五日始候之星還而當中盖太史占候中星之法至是為特詳愚謂三表之設善矣更當以玉衡望之其法始備玉衡之說與璇璣為二器互相為用不可闕一故舜典並言之若共為一器安得並言哉先儒皆知璇璣為渾儀玉衡為横簫然而必欲以二者合為一器則謬矣按張衡作渾天儀扵宻室中轉之以告靈臺觀天者皆如合符則如渾儀之轉在宻室而横簫之觀在靈臺二者互相為用不可闕也至吴時王蕃制渾儀乃設㳺筩扵其中謂之玉衡其說以為有璣而無衡者但謂之渾象不謂之渾儀此強分别也儀謂儀形法謂法象儀謂豈有二哉隋志采王蕃之說謂張衡所造止是渾象而譏何承天莫辨儀象之異以為乖失此乃蔽扵王蕃之新論而不觧張衡等之舊制云耳所載偽劉曜光初六年孔挺作鐵儀其規有六其外四規不動其内兩規徑八尺其運動屬雙軸之間置衡長八尺通中有孔圎徑一寸當衡之半兩旁有關各注著雙軸衡既随内規東西轉運又自扵雙軸之間得南北低昂觀此之云玉衡在渾儀之中乃為贅物有之無用去之無損果何為哉又載後魏晁崇所作與劉曜大同盖互相攷述也唐李淳風作銅儀其外四規不動號曰六合儀其内雙規徑八尺轉扵六合之内號曰三辰儀𤣥樞為軸傍轉於内貫玉衡在𤣥樞之間而南北㳺號曰四㳺儀觀此之云與劉曜所作無以異矣一行銅儀徑四尺五寸九分玉衡長四尺五寸八分旋扵軸中其制亦與劉曜相類皆附㑹王蕃之率合璣衡以為一器其實無義理也王蕃之說曰渾儀以察三光以分宿度渾象以著天體以布星辰愚請更之曰衡以察三光以分宿度璣以著天體以布星辰斯二者以考扵天盖宻矣如此然後昏旦之中星定也經星可以象占其餘經星自可因其出沒以象占之也疏曰上文既明北極及二十八宿之方位度數矣其餘經星謂如靈憲所載常明可名之星也方位度數既定則出沒之時可知矣出沒之時定則其疎宻鱗次之象皆可按圗而占之矣舊經文昌二星在輿鬼四星在東井北斗樞在七星一度璇在張二度璣在翼二度權在翼八度衡在軫八度開陽在角七度杓在亢四度天關在黄道南四度天尊天桴在黄道北天江天髙狗國外屏雲雨虚梁在黄道外天囷土公吏在赤道外上台在東井中台在七星建星在黄道北半度天苑在昴畢王良在壁外屏在觜觽雷電在赤道外五度霹靂在赤道外四度八魁在營室長垣羅堰當黄道唐一行測文昌四星在栁一星在輿鬼一星在東井北斗樞在張十三度璇在張十二度半璣在翼十三度權在翼十七度太衡在軫十度半開陽在角四度少杓在角十二度少天關天尊天桴天江天髙狗國外屏皆當黄道雲雨在黄道内七度虚梁在黄道内四度天囷當赤道土公吏在赤道内六度上台在栁中台在張建星在黄道北四度半天苑在胃昴王良四星在奎一星在璧外屏在壁雷電在赤道内二度霹靂四星在赤道内一星在外八魁五星在壁四星在營室長垣在黄道北五度羅堰在黄道北凡圗星辰之象其法有二一曰渾天其圓如丸一曰盖天其圓如盖渾天本象天體盖天南方之度反濶所以不類漢末揚子雲難盖天八事以通渾天其後桓譚鄭𤣥蔡邕陸績各陳周髀之遺周髀即盖天之說也其本包羲氏立周天厯度其所度則周公受扵殷商周人志之故曰周髀髀股也股者表也其言天之居如倚盖極在天之中而今在北此所以知天之形如倚盖也天旁轉如推磨而左行日月右行隨天左轉譬之蟻行磨石之上磨左旋而蟻右去磨疾而蟻遲故不得不隨磨而左廻焉此其說亦可取又謂日朝出陽中暮入隂中夏時隂少故日長冬至隂多故日短此則疎而未詳也愚謂今之星圗凡可以鋟木勒石者皆盖天之遺也渾天不可以鋟木勒石亦有以二分二至為四圗而鋟木勒石者反不如盖天之圗歸一然則是盖天渾天之說可以並行之也惟是盖天之圗南方之度當狭而反濶其星當宻而反疎亦勢不得不爾觀者以意㑹之可也按隋志髙祖平陳得善天官者周墳乃命參校周齊梁陳官私舊圗刋其小大正彼疎宻依凖甘石巫咸三家星位以為盖圗旁摛始分甄表常度并具赤黄二道内外兩規懸象著眀王度攸次星之隠顯天漢昭回宛若穹蒼将為正範唐志李淳風以為盖天之說天地中髙而四隤日月相隠蔽以為晝夜遶北極常見者謂之上規遶南極常隠者謂之下規赤道横絡者謂之中規盖天之說與渾天並行扵世其外又有宣夜之說謂天本無質仰而瞻之髙逺無極眼瞀精絶故蒼蒼然也日月衆星自然浮生虚空之中其行其止遲疾任情其無所繫著可知矣若綴附天體不得不然虞喜因宣夜之說作安天論虞聳又立穹天論姚信造昕天論隋志載劉焯曰盖及宣夜二說並驅平昕安窮四天騰沸大抵四天之說皆宣夜之遺晉志蔡邕之說曰宣夜之學絶無師法周髀術數具存考驗天状多所違戾惟渾天近得其情又曰渾天之設其来乆矣綿代相𫝊史官禁宻學者不覩故宣盖沸騰是故儀象昭著莫如渾天其次盖天猶有考焉至扵宣夜其說無取所以世莫𫝊也總論渾天之制疏曰自古渾天之作其尺度之廣者莫如晁崇李淳風其機械之巧者莫如張衡一行古舊渾象以二分為一度凡周七尺三寸半分或曰洛下閎之所作也張衡更制以四分為一度凡周一丈四尺六寸一分王蕃折衷二家以三分為一度凡周一丈九寸五分之三也宋太史令錢樂之放述吴葛衡之說鑄銅為儀使地居扵天中以機動之天動而地止比古制差失亦不過以五分為一度凡周一丈八尺二寸五分大而已惟晁崇鐵儀李淳風銅儀各有内外規其内規各經八尺凡周二丈四尺故曰尺度之應無如晁崇李淳風也錢樂之晁崇李淳風之儀雖大皆須人運非能自運也惟漢張衡唐一行渾儀各以漏水轉之衡為闗捩轉瑞輪蓂荚扵堦下隨月盈虚依厯開落程子玉稱其制作侔造化一行立二木人扵平地上前置鍾鼓以候辰刻每一辰則自然撞鍾每一刻則自然擊鼔皆扵櫃中關鎻相持此運雖同而遲速各異使臣稱其妙過前古無幾銅鐵亦澁不能自轉故曰萬機千械不足以盡之也大抵渾天之設欲知日出沒之時某星始見某星當中某星已沒如斯而已矣以水運之當昏而日未沒或未昏而日沒則如之何未免節其漏水以求其齊孰若以人運之及齊而止不亦易且簡乎盖渾儀與刻漏不同刻漏遂刻候之故不可以人運渾儀推昏旦候之日中及夜中皆不候故不必以水運則機械之巧可以已矣不然自衡與一行之外為渾儀者衆矣何為皆不以水運也且王蕃言張衡渾天儀為器傷大難可動移一行言李淳風黄道儀法頗難述遂致寝廢然則為兹器者非不務為簡易也盖患夫星辰之稠概焉耳愚采古法作小渾天書星名而不畫其象所以著易簡之理也以一分為三度象太極函三之道徑四寸有竒以象四時周一尺二寸有竒以象十二月其竒以象閠故曰舉其綱而知衆目之隨則是亦足矣本其綱者謂中星正而萬有一千五百二十之星皆正也扵戯以天地之大而述之以四寸之儀天地之道可運之掌矣愚作渾象而患夫器之不能常存也又為之圗圗亦豈能常存矣當明其理至扵理則無時而不存矣中庸曰天地之道可一言而盡也其為物不貳則其生物不測又曰上天之載無聲無臭至矣宋朝太平興國中命巴人張思訓創渾儀大率依倣一行之法激水運機加以樓數層髙丈餘以藏闗柱冬月用水銀代水以防凝澁撞鍾擊鼔之外復有揺鈴執牌之報太宗詔置扵文眀殿題曰太平渾儀自思訓死機䋲斷壊無復知其法制者至道中韓顯符皇祐中周琮及熈寜元豐所造渾儀皆不以水運以是知機械之巧可以已也元祐初吏部尚書蘓頌舉吏部守當官韓公亷更造渾儀復用水運著新儀象法要三卷藏之太史謂水運者為渾天儀不以水運者止曰銅候儀其說以至道皇祐熈寜新舊渾儀當時翰林天文院及太史局所用皆是銅候儀不得為渾天儀盖信用韓公亷矜尚機巧之過非通論也其制木閣五層司辰擊鼓揺鈴執牌出沒扵閤内皆依倣張思訓之舊兩極内置直距直距中夹望筒使南北低昂旋運持正窺七人皆因循一行之法以望筒在渾儀腹中實無所用也乃出新意使望筒常指日日體常在筒竅中所謂窺測七曜者如是而已矣且望筒果能扵渾儀中窺測七曜又何用臺上測驗哉今必使人於其旁驗星在之次與臺上測驗者相應以不差為凖是窺測七曜者常在臺上不在望筒也由是觀之望筒當設扵司天臺上不當在渾天腹中眀矣或問劉智云渾天之制周制衡管用考三光之分所以揆正宿度凖步盈虚者也自王蕃以来孔挺淳風一行張思訓韓公亷所造皆周旋衡管扵渾天腹中窺測七曜今曰衡管在渾儀之中乃為贅物何以知其無窺測之用乎曰窺測七曜者當在露天空曠之中其衡管之下必通人来往窺測今淳風儀置之凝暉閤一行儀置之武成殿張思訓儀置之文眀殿韓公亷儀置之集英殿皆在禁中又作版屋覆之其儀表裏三重衡管在三重之中周旋遮蔽載以龍柱鰲雲充塞其下不通往来以是知其無窺測之用也且衡貴持正以定觀動今使隨規東西運回又自扵雙軸之間得南北低昂其勢揺揺然靡所定正是動中之動也安取持正之義乎此所以知其無窺測之用也總論七政之運行奚自混元之初七政運行嵗序變易有象可占有數可推由是厯數生焉夫日月星辰有形而運乎上者也四時六氣無形而運乎下者也一有一無不相為侔然而二者實相撿押以次嵗功盖日窮于次月窮于紀星回于天此有形之運扵上而成嵗者也五日為候三侯為氣六氣為時四時為嵗此無形之運扵下而成嵗者也混元之初日月如合璧五星如連珠自此運行迨今未嘗復㑹如合璧連珠者何也盖七政之行遲速不同故其復㑹也甚難日之行天也一嵗而一周月之行天也一月而一周嵗星之周也常以十二年世俗以年為嵗者盖本於此鎮星之周也以二十八年熒惑之周也以二年惟太白辰星附日而行或速則先日或遲則後日速而先日昏見西方遲而後日晨見東方要之周天僅與日同故亦嵗一周天焉夫惟七政之行不齊如此此其所以難合也世之觀漢史者見其論太初厯之宻日月如合璧五星如連珠而遂以謂五星㑹扵太初之元年殊不知此乃論太初厯之周宻推而上至扵混元之初其數之精無有餘分故有是言在太初之年實未嘗如合璧如連珠也何以言之五星之㑹嘗從鎮星五星之行鎮星最遲故諸星從之而㑹以厯攷之漢髙祖之元年五星聚扵東井盖鶉首之次也自髙祖元年至太初元年凡百有年也鎮星二十八年而一周當是之時鎮之周天盖已三周而復行半周有餘凡八次矣進在元枵之次安得有日月如合璧五星如連珠起扵牽牛之初乎牽牛星紀之次也夫日舒而月速其相㑹也以速而及舒月之㑹日常以二十九日半強而相及半強謂四百四十九分也盖月行速而日行遲故也是故一嵗之周凡十有二㑹焉以其序而言之十有一月㑹扵星紀之次十有二月㑹于元枵正月㑹訾娵二月㑹降婁三月大梁四月實沈五月鶉首六月鶉火七月鶉尾八月夀星九月大火十月析木夫㑹則為晦晦而復蘓眀扵是乎生焉是之謂朔月之行速漸逺扵日以周天言之其日近也九十一度有竒其逺扵日也二百七十四度有竒是之謂近一逺三謂之弦此盖謂上弦也其行上逺而與日對去日百八十二度六十二分有竒是之謂相與為衡分天之中謂之望盖日與月相望故也其行過中逺扵日也二百七十四度有竒其近日也九十一度有竒亦謂之近一逺三謂之弦此盖下弦也上弦在於八日下弦在扵二十二日望在扵十五日此其常也上弦或進則在七日或退則在九日下弦或進則在二十一日或退則在二十三日望或進在十四日或退在十六日此皆其變也羣書考索别集卷十七
