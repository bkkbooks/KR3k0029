body:
  text: 羣書考索續集卷四十四宋章如愚編兵制門宋朝兵太祖善於制兵宋朝兵制凡禁兵之親近者號諸班直𨽻於軍頭皇城內守外備征戍其出戍邊或諸州更戍者曰屯駐非戍諸州而𨽻揔管者曰駐泊非屯駐駐泊以糶賤而留之者曰就糧諸司募者曰役兵諸州募者曰廂兵什五其民教之武事謂之民兵蕃夷內附紏而用之謂之蕃漢兵此制兵之大略也而治兵深意有可得而言者太祖聽中令之説收節度之權於杯酒間州郡精兵悉歸京師雖曰京師十萬諸郡十萬外足以相制而外兵之弱終不若京師之強也嗚呼其慮逺矣不特此也前日之亂皆不逞之人為之太祖聚以為兵節以軍法畀之厚祿祿厚則各知自重法嚴則不敢為非此其慮何逺也至於兵之所屬又有微意存焉三帥有握兵之重而無發兵之權樞密有發兵之權而無握兵之重彼此相制不敢有異心者此其為慮豈不深逺哉宋朝大臣平章先軍而後國群臣先軍而後州庫曰軍資監曰軍監官曰參軍務曰贍軍其於軍事重矣蓋亦以是加之察乎宋朝藝祖用將嘗謂曽鞏論如取董遵誨於仇讎姚內斌於俘虜是待之以誠而結其心王彥升守原州馮繼業守靈武邊境以安雖彥升之好勇繼業之自伐皆所不問是略其小而求其大爾何繼筠屯棣州二十餘年董遵誨屯通業四十餘年邊境賴之是久其任而責其成凡此固藝祖之術未足以見其術之微者藝祖於郭進李漢超也治第用銅瓦則隆之以恩賜屬郡錢七萬及地利使自養則富之以財待之如此宜皆極其爵位也然所居不過巡檢使而其名則小名既不足有為矣然皆使之得便宜從事而其勢則崇豈不隆以恩不富以財不能以結其心不小其名則不能勵其進不崇其勢則不能重其威宋朝三衙四衛國家以仁得天下未始倚兵以為重也然河南陳留四面受敵其勢亦必資於兵而所聚之兵有三衙四廂或合而為三或分而為三或殿前居侍衛之下或侍衛居殿前之上其故可得而稽也蓋侍衛起於後唐殿前起於周之顯德國家侍衛親軍有都指揮使有副使有都虞候殿前亦然而下於侍衛故雖殿前都指揮亦在侍衛都虞候之下自王超罷職無復任者而侍衛之馬軍步軍遂分為二與殿前號為三衙馬步二軍始居殿前之下矣捧日天武四廂屬之殿司龍衛神衛四廂屬之馬步二司謂之上四軍謂之八桄梯入則侍衛殿陛出則扈從乘輿凡天下之兵柄皆在焉其任之也重則其待之也亦不輕是故見宰職而聲揖禮也至其後則推橫仗矣見兩制而聮騎通名至其後則又分道矣至於熙寧待遇之禮繼於二府至有寺監召之而不可得者吁何其重也而祖宗立法又有深意所寓者天下之兵本於樞密有發兵之權而無握兵之重京師之兵揔於三帥有握兵之重而無發兵之權彼此相維不得專制宋朝三衙四廂等兵三衙殿前軍指揮使副使都虞候侍衛馬軍都指揮使副使都虞候侍衛步軍都指揮使副使都虞候四廂捧日天武四廂都指揮使龍衛神衛四廂指揮使蓋殿前有捧日天武馬軍有龍衛步有神衛謂之上四軍各有左廂右廂廂各有三軍殿前有神勇宣武驍騎各上下軍又有寧朔驍騎虎翼各三軍馬軍有馬騎武騎步軍有虎翼左右各三軍四兵王鏜兵序云兵之目有四一曰禁兵殿前馬步二司𨽻焉處則衛鎮出則戍更二曰廂兵諸州𨽻焉専於服勞間亦更戍三曰役兵羣有司𨽻焉若牧置若漕挽若管庫若工役其業以事専故處而不更四曰民兵今廣南土丁保丁土丁係稅戶上五丁抽二二十一嵗注籍六十一嵗入老保丁係稅户上二抽一皆係終身終軍無更番之法今禁兵亦二十一嵗招刺六十減少分七十放停皆無更畨之法所以不如周之更畨禁兵之數與今日之弊國家開寶初兵實籍揔三十七萬而禁兵才一十九萬至道六十六萬而禁兵才三十五萬天禧九十一萬而禁兵才四十三萬明道增至一百一十六萬而禁兵才六十六萬以今準昔亦可概見本政書曰禁軍平時衣食縣官四體不勤五榖不分往往嬉遊驕惰而不可用而又一遭黥涅類不得與齊民齒終身執兵無休免之期故雖厚賞招募而應者益寡所在兵額闕而不補十常二三樞密院時時迫切州縣督以嚴科俾招填闕額則有司茍免充數疲癃咸在而又害及平民動遭創執皆以抑勒為情願上下相蒙茍逃憲網故每當有府檄至則道路為之輟行商旅為之罷市比屋嗸嗸無所控告又遭黥涅者既非本心故雖就羈制尋即潰散朝以溢額而奏陳夕以逃亡申舉者有矣亡逃既衆則所在嘯聚惟事攻剽習以為常而國家常慮生事亦每為之屈法招撫許其首復自新依舊軍分安排雖有竄亡訖無刑罰祖宗軍政廢弛殆盡其間州縣往往招納亡卒使之詭冒身號為認名字亦謂之捉换故凡在軍之人朝甲暮乙倐此忽彼靡有定居由是卒伍之間動為自營之計凡有差出征戍稍涉重難率皆亡命逃避緩則冒名急則為寇有罪則頒赦養兵之制宋太祖有言吾家之事惟養兵可為百代之利而韓公琦亦曰養兵雖非古然利處不為不深嗟夫田不井居兵與農異此茍道也而聖如太祖賢如韓公顧以為利何也我知之矣善養兵者以兵養民不善養兵者以兵病民思昔祖宗之制兵也斂強悍之民以為兵賦淳良之民以給兵征伐之苦兵任之民不知也屯戍之苦兵任之民不知也天下之民安居暇食優遊以生死仰事俯育終其身相保聚雖日賦月斂有不暇恤曽謂不以為利而反以為病乎雖然是制也通古今行之可也而二三百年間之所以變易政令則曰養兵之害下之所以遊談聚議則曰養兵之害言利者不一二而言害者已千百此獨何説也曰兵之利於民者非一端害於民者大槩有二焉兵冗一也兵驕二也民兵國初京師之兵強州縣之兵弱一有警急悉調京師京師不足以民兵足之振武保捷宣毅義勇皆兵出於民而籍之州縣者也是故禁旅不若土人陳貫言之京兵不及土兵田况言之彼其習於風土長於戰鬬故能動有成功慶厯初詔刺四路弓手張方平曰不可韓公琦曰可卒刺之治平初詔刺陜西義勇溫公曰不可韓公曰可刺之夫以祖宗之至仁大臣之至忠而籍民為兵猶不之免良以費省而足用也馴至熙寧因趙子幾之言行保甲之法夫保甲亦民兵也而為法既密而為法益酷鞭笞之苦不得免焉民不堪命則有執指使逐巡檢攻提舉官以輸其忿而已太祖兵制壞於童貫太祖盛時皇城之內有諸班之兵京城之內有禁衛之兵京師之外列營猶數十里中夜造朝入朝則奔趍營居西者必給東倉之米以逺其塗負糧兩石不得雇代以逺其力太祖常謂雖京師有警皇城之內已有精兵數萬况天下乎取太原兵以為龍衛取幽州兵以為神武左右員寮本藩鎮廳頭也左射拱聖本諸州騎兵也忠莭之軍升自川陕虎翼之軍選自江淮宋朝之兵自童貫髙球壞之而勸阻之法壞驕惰之習成出伐則亡遇敵則潰小則荷戈攘奪以逞大則殺將攻城而叛唐史有云置兵所以止亂及其弊也適足為亂又其甚也至困天下以養其亂今日之勢幾於此宋朝兵精秦漢之際一燕一代自當胸奴宋朝之初慶州姚內斌雄州李允則自當一道此無他兵精而無冗食也時使而不久戍也岩險其壘而不多留兵也通其互市以致州粟也多置屯田以息逺餉也廣募土人以減軍旅也宋朝精兵太宗真宗以來循建隆故事親閲歷旅武藝精絶有擲劒凌空續身承接妙捷若神者有挽強至二石五斗二十餘發而綽有餘力者有槃鐵槊十五斤舞於馬上往來如飛者有百人守關而契丹不敢窺其國者有對移一席地剩汲一瓶水而亦蒙簡記其姓名以備後日之用者開禧用兵不是處有進攻唐州退坐棗陽敵兵方至三家河而夜遁以奔譙樊城者有解圍和州不聽以印制徑帶五千人退居采石夜聞行舟虛驚敵至而欲走太平州者不知此何以張吾軍又有率師儀真為敵掩襲倉皇失措而無統者有進圍夀春退走安豐截斷浮橋首尾不應者失律如此何以整其旅華嶽丙寅用兵賞罰不當丙寅褒賞冒濫郭公莊之捷小將之用車以勝也主帥乃冒之而遷官四方山之捷總保之守山寨以勝也招使乃冒之而加秩平進關之幸以不敗守關者之力也而賞歸於安陸之别駕南河之奮死不顧忠義軍之力而捷奏於漢陽之守二柘臯秦興之能保鄉井義勇民兵之鏖戰也而京口統制乃被不次之擢臨淮夀春之不顧矢石萬弩手之亡命以徇也而幕府與屬乃膺最上之賞以至鳳凰山之捷以王師斃而不問尉斗谷之捷而招撫怒而不上襄陽一萬八千之奏而及賞者才四百十人而半為宣幕之鄉親漢陽一千二百人之捷奏及賞才二百人而半屬朝士之薦送合肥守城之奏不及其十分之一而厚薄之不平已見於沿淮之歌頌尉斗燠奏伏騎之奏不及其百分之一而有無之異報已間於將二之交爭以至宣招制帥之結罪勘同反不若檢詳詳房吏人一笑之為得監司州縣之外衙保奏反不若承旨司一言之增重臨戰未湔之膏血而為都司檢正吏會之金珠被傷未沒之瘡痍又復割而為兵籍賞功諸房令史之酒炙立功之地不在於戰鬬之場而在於檢正廳擬筆之濃淡奏功之牘不出於都轄之官而出於左右司薦口之輕重惟是助偽之范仲壬敘官而得秩而仗節死義之秦司幹官乃無料祿以沾升合事叛之王喜則鉞以帥閫而亡命先登之李好義乃廢黜於西江之戎副胡海之首斷於王福之手而賞歸於班世興射楊之血濺於張敵萬之身而命出於趙師道是則賞不特歸於不戰之人而且及於從叛之人恩不特及於無功之士而反遺於守節之士陛下所謂不吝爵賞以勸智勇果何智勇之謂勸耶同上小人每輕啓兵端熙寧之初不過變新法耳新法已變而兵興於熙河元豐小人不過撼元祐耳及其得志則兵興於湟鄴蔡京始謀不過鉗制上下耳及其求恱則薦童貫以帥師而童貫始謀亦不過望莭鉞耳及其得位則納焉植於國以開邊隙主於始謀又不過傾蔡京耳及其勢利相軋則欲復燕兾以要功名蔡京欲固其寵則興嚴武之師王圭患失其位則贊永樂之役章厚之於湟鄴蔡京之於青塘皆是謀也雖王安石亦開熙河之端况小人之不足道乎宋朝掌兵管軍之職宋朝用兵以仁故所遣之將亦皆不嗜殺人者如曹彬申嚴禁暴之令則賞王全斌稍肆侵掠則罰是也平蜀之役斌以節度使為都部署見罰則為留後彬以內客省使為都監見賞則為宣徽南院使充義成軍莭度使其平江南也彬以宣徽南院使為都部署見賞則為樞密使潘美以節度使為都監見賞則為宣徽北院使所謂節度則遙領也平蜀平江南皆在罷莭度使兵權之後所謂客省宣徽使則猶職名也所謂都部轄都監則猶漢唐大將督帥有事則命事已則罷也至於莭度留後觀察防禦團練刺史為正任者止與文臣分班而已內客省使引見四方館東西上閣門使副為橫行者皆為祗應官耳自通事舍人而下為閣職自諸司使至刺史為遙郡自諸司使副至內殿承制崇班為大使臣自供奉官至禁直借職奉職為小使臣皆以别秩祿而無與於掌兵惟殿前馬軍步軍都副指揮使三軍都虞候天武捧日龍衛神衛四廂都指揮使為管軍掌兵之職而又無符印故三衙雖統天下之兵而軍政號令則在樞密院其見宰執必橫仗肅揖樞密惟總符印而兵則管於三衙四廂其有調發則必需天子之命三衙樞密於是乎盡屏五代餘習矣環衛官自金吾上將軍至於千牛諸衛將軍皆為宗室之職名及為武臣之贈典或為責降之散官故環衛官無復漢唐內變沿邊有守將李漢超郭進等皆內屬密院諸路有兵官鈐轄都監之類皆外屬帥臣於是乎內郡外郡無黠將驕兵矣然澶淵之役禁衛瑟縮而不行靖康之變主帥倉皇而不至敵馬長驅中原曽無結草之衛天蹕南駐張韓劉嶽各擁大兵以抗強敵士氣稍振兵威方張復懲東晉之失盡易而為御前軍馬固無桓劉之僣亦無灞上關中之捷矣推原其故自太祖太宗削平諸國之後宿將淪謝文臣典兵寇公澶淵之行韓范為西北捍禦戰雖不足守則有餘厥後王韶擅開邊隙李邦彥但守和議戰守俱無足言者習於用文而不用武故也又按陳止齋建隆編蔡龍圖之制舊典建隆二年七月太祖從容杯酒間盡罷侍衛指揮石守信殿前副檢點髙懷德殿前都指揮王審琦侍衛都虞候張令鐸等軍職而授以莭度之虛名其在外郡以莭度而掌兵者猶近三十州符彥卿在大名王景仁在秦州郭從義在徐州武行德在鄜州郭崇昭在真定李重進在揚州李洪義在永興王彥超在鳳翔楊承信在夀春張永德在潁昌劉重進在邠州趙贊在廬州宋延渥在鄧州孫行友在定州蔡元福在興仁白重贊在涇州張鐸在河中王仁鎬在襄陽趙朝在孟州李萬金在延安李廷璋在晉州袁彥在陜州李筠在龍德府陳思退在滄州馮繼義在臨州折德強在慶州李夷興在夏州皆非他莭鎮之比而以莭鉞管軍者不與焉自唐末五季各擁重兵不純臣京師乾德中有因遷徙而代者趙贊徙延安以馮瓉知廬州有因致仕而代者郭從義致仕以鄭牧知河中有因卒而代者王景卒以劉知古知鳳翔有以它職遙領者張光翰以永清莭度管軍即以劉熙古知貝州於是天下莭度皆為守臣矣雖然守將之控於西北者如李漢超郭進輩凡十四人類多久任其家族在京師者撫之甚厚所部州縣管權之利悉以與之恣其回易免所過征稅由是邊臣皆富於財得以養士用武朝廷無西北之虞李漢超守關南馬仁瑀守江州韓令坤鎮常山賀惟忠守易州何繼筠鎮棣州以拒北敵郭進控西山武守其戍晉州李護普李繼勳鎮昭義以禦北漢趙贊屯延州姚內斌守慶州董遵誨屯環州王彥升守原州馮繼業鎮靈武以備西戎其內郡守倅兼治一州民兵轉運使兼總一路財賦其稅賦榷酤啇稅茶鹽坑冶山澤之利各以分數𨽻給州郡及係省房廊地利坊場河度支酬衙前不盡者盡歸本州有軍資庫貯經費有公使庫備知通泛用廳遂州置軍營指揮大郡有十數指揮中郡有五七指揮小郡不下三五指揮凡指揮四五百人是時雖罷方鎮而守倅猶得分兵財之權備非常也自熙寧初王安石建言與其財利資守臣孰若收之公上於是盡括四方地利罷州府禁軍招填會逐路闕額兵食衣俸上供京師自為朝廷封當免役錢坊場河渡沒官之産召人買撲斷佃以助常平設青苗市易盡歸常平司其房廊地課盡歸轉運司州郡只有公使庫限二百千至三千貫止州郡所入才有此息房園祠廟之利守臣窘束屢有奏陳其免役等錢則歸之常平司房廊地課盡歸轉運司於是乎守臣無利權矣安石又籍州郡兵通一路團結五千人為一將置副専領西北今七十九將東南止十三將於是乎守臣無兵權矣內外守臣既無兵權又無利權此靖康之變所以無勤王者也間或有之亦市井小人易合而易散者也是烏得歸咎於國初懲艾藩鎮之過歟嗟乎國朝一路財賦猶揔為轉運使至熙豐則分為提舉常平茶鹽市舶坑冶渡江以來又有四揔所則州郡之財益可知矣熙寧立制猶有一路團結之兵今之闕而不補者十且三四州郡之兵又可知矣獨不監靖康覆轍乎今兩浙崇莭福建保莭乃廂軍團併為額者兩浙雄莭福建廣莭乃教閲之兵𨽻之將下者元豐令悉以雄莭之類升同禁軍兵雖遍天下而虛籍率十三四其間老弱又半之或有弄兵潢池者已不足以禦之况望其當大敵乎宋朝養兵之制井田既廢自漢迄唐皆收屯田之利宋朝官有屯田郎不聞屯田之效守倅以營田係銜不著營田之績何耶五季易置皆以兵也養兵如養驕子抱而哺之猶慮弗食如之何使之田而食耶律以階級亦已善矣始以民田終以兵田使之知有倉廪之積室家之奉踐其利而忘其勞顧何有不足之意太祖規模逺大慮不及此乂何耶按建隆編太祖以諸郡本城供百役或更戍它郡三司禁旅就糧州郡亦不得常坐食於京師所以勞苦其身違離其妻子使之習南北風土之異未必不為屯田地也特神機深祕未即發露耳自慶厯嘉祐列郡各置禁軍於是嚴差出占破之令自熙豐壯城作院各置指揮由是在京禁旅無就糧者而廂軍升為禁軍不復戍役矣又嘗觀之太祖語左右曰吾將西遷洛雍者無他欲據山河之勝而去冗兵循周漢故事以安天下也不然不出百年民大困矣蓋國初自石晉失關南十郡而太原與北敵合從大梁京都外無藩籬之限所藉重兵以為衛厚賦以養兵耳月積歲纍既無屯田以養兵又不遷都以省兵民安得而不困哉是故太祖懲創五季征𣙜茶鹽酒酤之禁止能寬之而不能盡去之者凡以養兵故也未幾以朝臣監諸州稅以刺史為解州𣙜鹽制置使以嵗之餘用别貯為封樁庫收典賣田宅印稅錢增河東幽州礬禁置揚州建康茶引𣙜嶺南鹽拘留州錢為係省無得妄費比校諸州征𣙜等錢不得欺隱自朝臣監稅止不得欺隱事並係太祖時凡以為民亦為養兵故也太祖又合蔡閔二水貫京師逹夀春以通淮泗舟楫浚五丈渠自都城逹鄆以通東方之漕亦為養兵也於是國初之兵十五萬真宗時內外兵幾百萬實九十一萬仁宗寶元以後募兵益廣迄於至和兵蓋一百二十六萬矣以上並見至和二年神宗即位張方平上疏曰京師砥平衝會之地國依兵而立兵恃食而聚究其本原冗兵最為大患慶厯禁軍之數比景德以前增四十餘萬人又太祖置壯城謂之廂軍遂與禁軍數目幾等嵗增衣糧天下安得不困考方平之言遂符太祖之先見使平生於崇觀間則目之所覩又如何耶嗚乎太祖規模逺過漢髙祖而羣臣無奉春之䇿豈天數當有靖康之變耶秦漢用度耗於用兵國朝財賦困於養兵曾南豐云宋興當雍熙之間強敵屢為邊害天子念守兵嵗廣而趙魏失寧廢耕桑之務於是方田之法自此始是復開易水疏雞距修鮑河之利邊屯以次立矣然中國一統內外百萬之師議者以為豈晏然者知兵農兼務哉天子乃遣議臣東出宿亳至夀春西出許潁轉陳蔡之間至襄鄧得田可開者二十二萬頃欲收耕屯之業廣其功用矣天子鋭意向之而任事者破壞其計故功不立今日養兵之䇿宋朝財賦困於養兵已見職官户部六院四轄諸監司并右方養兵説今日之兵不減於全盛之時者蜀漢荆淮海綿亘數千里皆為邊郡湖廣閩浙﨑嶇山谷間皆為內郡非兵無以為守也今日養兵所藉者田稅之入征榷之利皆已數倍於盛時不可以有加矣民聚於內郡地狹民稠亦無可墾之田矣邊郡沃狹在在有之棄而弗耕獨不可為屯田地乎租逖積榖雍邱吳主屯田尋陽荀義之東陽晉穆帝時陳慶之之義陽劉義欣宋人桓崇祖齊人之芍陂鄧艾之夀春羊祜杜預之襄陽都貴苻堅臣薛虎子元魏人之徐州以圖按之皆在漢南淮右惟雍邱在曹滑之間夀春半在淮北而已其餘皆今之邊郡也中興以來要約既固議者憚於開邊隙徙邊之民占佃已久議者憚於起民爭也今也或戰或和犬羊相噬何要約之足恃丙寅北伐流轉者衆何占佃之可戀乘流轉之初返而以安集為名當蚌鷸之相持而以防拓為説及是時也行屯田之䇿省養兵之大費當今之急務也就髙為堡以固民心韓重華之法可行也外為遊兵以護田作趙充國發騎就草為田者濟兵祖逖置軍屯以禦其外之䇿可用者計夫給畝以地之良薄嵗之豐凶為三等當如唐之軍府屯因水之利以之灌溉以之運漕當如鄧艾之導濟河杜預之激滍淯劉義欣之疏芍陂可也國家間暇北敵擾攘不及是時少為根本地忽有小警相顧無䇿不免朘內郡之膏血補邊方之瘡痍內外俱弊將不知其所止矣何暇為恢復計哉羣書考索續集卷四十四
