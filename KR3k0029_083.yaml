body:
  text: 羣書考索後集卷十七宋章如愚編官制門職田類古者自卿以下必有圭田圭田五十畆故王制曰公田籍而不稅夫圭田無征是也攷異按周制三等采地既以為公大夫之禄孟子所謂下士以上皆有禄以代耕今之卿已下必有圭田圭田五十畆然則分田亦得古法矣抑周制采地之民一以井田之法授田於公而公卿大夫食其賦以為禄初不以為私屬也通典曰秦漢之間其制不詳晉公卿各有菜田後魏孝文太和五年州刺史郡太守并官節級給公田隋文帝開皇中罷公廨錢收息公卿以下内外官給職分田一品五頃至五品則為三頃其下每以五十畆為差又給公廨田以供用唐凡京諸司各有公廨田自司農寺而下其給頃畆有差諸州及都䕶府職分之田亦有等級其載於通典者尚截然而可考也武徳元年自王公以下皆有永業田親王一品六十頃至從五品五頃其数有差自上柱國三十頃至文武騎尉六十畆其数又有差此傳子孫不在收授之限也凡京諸司各有公𪠘田内而自司農寺二十六頃至率更府各二頃所給有差外而自大都督府四十頃至中戍下戍各一頃亦各有差諸京官文武職事各有職分田一品十二頃二品十頃三品九頃四品七頃五品六頃六品四頃七品三頃五十畆八品二頃五十畆九品二頃並在京城百里内給百里内地少欲外給者亦聴之諸州及都督府親王府官人職分之田亦各有差二品十二頃三品十頃四品八頃五品七頃六品五頃七品四頃八品三頃九品二頃五十畆諸職分陸田限三月三十日稻田限四月三十日以前上者並入後人以後上者入前人其麥用田以九月三十日為限各前人自耕不種後人酬其功直已自種者凖租分法凡給田而無地者畆給粟二斗太宗貞觀十二年以職田侵漁百姓詔給逃還貧户視職田多少每畆給粟二升謂之地子是嵗以水旱復罷之唐志貞觀十八年以京兆府峽岐同華邠坊等州隙地陂澤堪可墾者復京官職田唐志𤣥宗開元十年正月内外官職田除公廨田園外並官收先給逃還户及貧下户先次丁田中書舍人張嘉貞奏至六月二十六日𠡠所置職田本非古法度自近制是以因循事有變通應須刪改其内外官所給職田子從今年九月以後並宜停給㑹要開元十三年内京官職田㑹要開元十八年三月内京官職田特令凖令給受㑹要開元十九年四月𠡠天下諸州縣并府鎮戍官等職田四至頃畆造帳申省仍依元租價對定六斗已下者依舊定已上者不得六斗㑹要地不毛者畆給二斗唐志開元二十九年二月七日𠡠外官職田委所司準列倉中受納畢一時分付縣官亦準此㑹要其年以京畿地狭計丁給田猶不足於是分諸司官在都者給職田於都畿以京師地給貧民是時河南北職田兼稅桑有詔公廨職田有桑者每督絲課天寳十二載國忠以兩京文武職田送租勞民請五十里外輸于縣倉斗納直二錢百里外納直三錢使百官就請于縣然縣吏欺盗盖多而閑司有不能自直者唐志肅宗乾元元年亦給外官半料及職田京官給手力課而已唐志上元元年復令京官職田以時輸送受加耗者以枉法贓論其後籍以為軍糧矣唐志代宗大厯二年復給京兆府及畿縣官職田以三之一供軍饟唐志大厯三年九月十七日京官職田三分給二餘一分充軍料唐志大厯十二年十二月勑京諸司缺官職田苗子自今以後宜並充修當司廨宇雜用其草準處分仍令分司監察御史勾當㑹要大厯十四年八月𠡠内外文武官職田及公𪠘職田準式州縣每年六月三十日勘造白簿申省以諸司文觧勘㑹至十月三十日收徴給付本官近来不守常規多不申報給付之際先付清望要官其閑慢卑官即被延引不付自今已後準式各令送付本官又準式職田黄籍每三年一造自天寳九載以後更不造籍宜各委州縣每年差專知官廵覆仍造簿依限申送所司不得隐漏及妄破蒿荒如有違犯專知官先用闕本典準法科罪㑹要徳宗貞元元年十一月詔文武常參官宜共賜錢七萬貫文委度支據班秩所損職田多少量等給從今至明年四月以来随月支給㑹要貞元四年八月𠡠準田令永業田職事官從一品郡王各五十頃國公若職官正二品各四十頃郡公若職事官從二品各三十頃縣公若職事官從三品各二十頃侯若職事官正四品各十四頃若職事官從四品各十一頃㑹要貞元十一年八月屯田奏諸州府送納内外文武官職田及公廨田四至白簿等前件簿書準天寳十四載八月十三日敕每年六月十三日勘造申省如違本判官牒吏部先用闕本典準法科處者伏以地叚佃户並無改移随年造簿實有勞費今請令諸州府及畿内縣三年一送違限者準𠡠科處敕㫖每年造簿事乃近煩三年一申又為太簡如外官並須勘造竊慮因此擾人宜令應管京官職田等州府文簿二年一送其餘依舊㑹要憲宗元和六年八月户部侍郎李絳奏諸州缺官職田禄米及見任官抽一分職田請所在收貯以備水旱賑貸從之㑹要其年勑百官職田其數甚廣今縁潦水諸處道路不通宜令所在貯納充度支支用百官却令據數於太倉請受㑹要元和十二年八月京兆尹竇易直請改職田並入兩稅地事竟不行元和十三年二月詔百司職田多少不均為弊日乆宜令每司各收職田草粟等數目長官已下據多少作等差除留闕官物外分給㑹要元和十四年三月屯田奏左右神䇿中尉準令式二品官合受田一十頃請取京兆府折衝府院戎場垜埓公廨等地七十七頃二十六畆八分數内取二十頃充前件官職田依奏㑹要其年四月𠡠京畿二十二縣欠元和十四年京百司職田二十二萬九十二石束貫等京畿百姓聞甚艱貧須差搬運軍粮今又修營陵寝雖應縁驅役皆給價錢而屢有役名頗妨農畆豈可更懲懸欠重使憂愁其所欠並宜蠲免其受納所欠職田或見任官班各請厚俸或近終考秩稍有餘資宜體朕懐以寛人力㑹要文宗太和五年户部侍郎庾敬休奏兩川米價騰踴百姓流亡請以闕官職田禄米以救貧民從之㑹要武宗㑹昌六年十月十四日京兆府奏諸縣徴納京百司官夏秋職田斛斗等望從今後却準㑹昌五年前舊例上司官斛斗勒人户便自送納所冀輸納簡便百官各得本分職田縣司所無𨼆欺𠡠㫖從之㑹要宣宗太中元年十月屯田奏應内外官請職田時月已準令式為定然每遇閏月交替者即牒訴紛紜令式之中又不該說公田給用須用準程今後望請如交替者有閏即以十五日為定式十五日已前上者入後人已後上者入前人從之㑹要太中三年九月𠡠秦州刺史并秦城兩州經畧使天雄軍使職田夏小麥共八十石秋粟一百二十石原州威州刺史職田夏小麥各二十三石秋粟各六十六石七斗㑹要宋朝真宗咸平二年欲給職田詔議臣定制杜鎬曰職田廢於五代昭於聖朝而計司以出納之名遂有輸稅之議臣厯尋故事應充州吏職並無稅許長吏以下募人墾闢所得課租均分以鄉原之例準令以一年造簿替日逓相交付不得私以贖賣自是始給内外京職田復定官荘諸路職田共一千四百頃以此田均濟官吏欲人各足用責其清謹時御史王岳請以天下職田輸官少助振借不從祥符八年馬亮言竊見天下庶官職田過為優厚請三二年間權住支給聊助經費臣今嵗所得米麥四百二十餘石已牒本府納官詔奨之祥符九年七月丙寅詔曰職田彛制品秩定規盖優待於庶官且旁益於稍食夫厚禄食者盖欲聳其亷節務稼穡者亦在利於貧民佇介潔之治聞必甄揚而明陟而州縣之職慈愛靡聞閔恤人勞且違田制闢汙之始奪農力以多求斂熟之時峻公文而奄取無水旱蠲除之惠無鄉原賑恤之恩有一于茲動興訟訴沮傷和氣深敗素風各宜革心用叶求治自今天下羣官職田並須遵守元制無擾客户遇災沴即蠲省之大詔令仁宗朝唐肅嘗知洪州艤舟南康不即赴或問之肅曰職田以四月為限今遽往得無赴利之譏乎踰月乃上名臣傳天聖二年祕書丞韓琚言今後闕官職田如正官到任該得𠡠限給與正官或不該者盡收入官更不給與管勾者上從之天聖中上封事者請廢天下職田以收斂之際多量以害人屢致訟言故耳晏殊與三司皆議罷上以為不可於是詔天下職田所納類聚申三司三司紐定價錢均給諸道見任人天聖七年晏元獻公奏曰朝廷置職田盖欲稍資俸給其官吏不務至公以差遣狥私僥倖者極衆屢致訟言上煩聴覽欲乞陳罷時可其奏但令佃户逐年收課利類聚天下都数紐價均散晏公文七年内降上封者言乞天下停廢職田𠡠應天下職田宜依所奏停罷其見佃人户逐年分課利並納入官仰諸道州府軍監每年各具夏秋納到石斛時估價例申三司類聚天下都收數目紐成價錢均給與諸道州府軍監見任官員其均等第及令行條約令三司奏聞㑹要天聖七年八月丁亥詔曰洪惟先聖勤䘏庶工謂廪給之稍豐則潔亷之易守奚稽故實並賜公田嵗月寖深侵牟滋長間從起獄反以害人重念釐務之臣固多秉節之士茍例停於租入将曷勸於官勤斂而均之孰曰不足其罷天下職田悉以嵗入租送官具數上三司以所在時籌定價例而均給之仍委三司别行約束以聞大詔令天聖九年正月癸巳詔曰天下吏給職田所以惠飬亷節也而貪汚之人並縁為私侵漁細民滋以為害比詔有司皆從停罷如聞勤事之吏禄薄不足以自養朕甚閔焉職田即無得多佔佃户及無田而配出租違者以枉法論大詔令慶厯三年詔限職田大藩長長吏二十頃通判五頃判官五頃幕職官四頃凡節鎮長吏十五頃通判七頃判官四頃幕職官三頃五十畆凡防團以下州軍長吏十頃通判六頃判官三頃五十畆幕職官二頃凡縣令萬户以上六頃五千户以上五頃不滿五千户並四頃自此人有定制土有所限焉㑹要神宗熈寕中又以四川職田嵗收子利稻麥絲麻竹等物隨處不同遂詔中丞延誨知雜劉述均定乃計實紐作稻殳一色每斗中價自有二千而梓利䕫三路數少均錢不足止到成都一路以髙下均給之元豐以後復熈河等路以其地給弓箭手而郡縣官職田每頃嵗給錢鈔十千哲宗元祐中復推廣神宗均定四川遺意以限月之法變而均給焉元符新𠡠又變限月而貪冒者或窮一日之力以赴期㑹徽宗初杜子充請復元祐均給之法以養亷吏從之初晉州守臣李君卿以所取職田諭意属邑令増租入比舊數倍後襄陵縣令周政力陳其弊郡守時彦嵗减十七八佃户始脫苛歛之苦而晉絳陕三州土腴素厚守臣多苛法易其種子或遣子弟監穫貪汙猥賤無所不有建中靖國初知延安范純粹乞令監司究治改正從之大觀四年言者謂祖宗之制以提㸃刑獄官察所部職田故嘗給以圭租庶不同其利而公行之也近嵗提㸃刑獄官所受圭租同於他司而檢法官亦視其長乃詔依舊法政和末言者又謂天下圭租多寡不均縣令所得多至九百斛如階州之髙苑八百斛如常州之江隂自是而降或四五百或二三百閩廣有自来無圭租處遂詔係令職田未有及格者促令標撥宣和元年詔諸路州係違法抑都保正長及上户虚認職田租者以違詔論檢傷不盡者計賍以枉法論入已者以自盗論髙宗紹興二十七年臣僚言凡官吏之禄米輙加耗及任官以職田未髙價抑市户出糴者許人户越訴並計贓科罪孝宗初詔職田米輙敢折納見錢者並計贓坐罪其為防禁之請嚴矣任子古者有世賞無世官盖賞可世也官不可世也舜命䕫典樂教胄子臯陶稱舜曰賞延于世是舜之時有世賞而未有世官也周武王泰誓始有官人以世之說周文王治岐仕者世禄孟子而周官教國子之法詳焉師氏以三徳至徳敏徳孝徳三行孝行友行順行教國子養國子以道教之六藝五禮六樂五射五御六書九數六儀祭祀賓客朝廷喪紀軍旅車馬司樂掌成均之法合國之子弟以樂徳中和祇庸孝友樂語興道諷誦言語樂舞雲門大卷大咸大㲈大夏大濩大武教國子諸子掌國子之逰倅使之修徳學道春合諸學秋合諸射以攷其藝而進退之康王戒畢公曰世禄之家鮮克由禮以蕩陵徳實悖天道周衰仲尼歎曰大人世及以為禮春秋𨼆三年書尹氏宣十年書崔氏譏世卿也成五年書仍叔之子來聘而公羊以為譏父老子代也其後髙國之侵齊孫寗之專衛六卿盛而分晉三家強而擅魯而遂有世家僣竊之禍漢興諸侯皆以嫡子襲爵邴漢龔勝免策曰其上子若孫同産若同産子一人各除為郎是漢法唯得任其子若孫同産若子而已漢儀云二千石以上親事滿三嵗得任子弟擇其茂亷者補令丞九卿得任子弟為郎劉向以父任為郎以行修飾遷諌大夫是漢法既任而復有所决擇此當法之善也任子之名亦不一有任為太子洗馬者汲黯有任為太子庶子者蕭育有任為太子舍人者董賢有任為右校丞者辛慶忌有任為郎者蘓武有任為侍中中郎将者于永宣帝時王吉上疏曰今俗吏得任子弟益多驕驁不通古今宜明選求賢除任子之令哀帝始除任子晉之季年專稱閥閱自是三公之子傲九棘之家黄散之孫蔑分長之室論門户而不議賢能後漢立九品中正之法而上品無寒門下品無世族迨乎晉室而流弊滋甚矣唐世任子之法益詳矣禮部簡試太廟齋郎以五品已上子孫及六品職事并清官子為之郊社齋郎以六品職事官子為之文資也皆讀經粗通擇儀状端正者兵部簡試千牛備身及太子千牛武資也補親衛勲衛翊衛者皆五品已上之子若孫也劉祥道以襲爵厯御史中丞李徳裕以䕃補校書郎裴行儉亦以䕃補𢎞文生此任子之得人也馬周嘗言今不肖襲爵嗣職則兆庶被殃魏𤣥同言貴戚子弟一皆早仕𢎞文崇賢千牛輦脚之類技能薄而門閥髙請裁諸從沈既濟論四太之弊亦曰世胄之家太優此任子之失也㑹昌以後公卿子弟朋比貴好益妨平進之路矣於是武宗决意黜之李徳裕以無名弟為宰相甚欲扶持主張不免深疾進士曰朝廷顯官須公卿子弟為之大抵唐之末造也任止於同産若子者漢法也任止於子若孫者唐法也文武䕃補之制自是不廢後唐天成三年凝和奏齋郎嵗以三十人為限同光二年奏千牛左右仗各六員嵗以十二員為限宋乾徳元年詔减每嵗奏補千牛齋郎之類嵗凡補二十五員建隆初嵗制禮部補齋郎兵部補進馬以三事覆試之曰身曰年曰通書官而不實主者坐之故奚璵王貽孫坐補進馬失實而貶官趙元拱髙元緒坐補齋郎失實而貶官是也年辰在後藝祖初定任子之法䑓省六品諸司五品必嘗登朝厯兩任然後得請不請者則不補矣太宗淳化始因改元恩霈文班中書舍人武班大将軍以上並許䕃補如遇轉品即許更䕃一子而奏薦之廣自此始至道二年始有夀寧節推恩之令則聖節奏薦自此為例真宗大中祥符元年始有東封禮畢推恩之令則郊禋奏薦自此為例前朝患之累常裁定聖節奏薦自嘉祐元年罷今唯郊禋如故至于致仕遺表之恩凡予之皆特典也而後亦為定制至于熈寧始裁定諸衛将軍諸司副使累奏不得過二人非任路分都監差遣即須入仕三十年方聴奏薦而限年限員之法立宣和四年中大夫至帶職朝奉郎入官十五年諸衛大将軍武功至武翼大夫入官二十年宣和四年𠡠内侍郎官武功大夫至武翼郎累奏不得過二人肆于孝宗法度益嚴淳熈九年更務裁抑始立郊禋䕃補恩澤止数宰相十人開府儀同三司以上同執政八人侍從六人觀察使至節度使侍御史同中散大夫至中大夫右武大夫至通侍大夫同帶職朝奉郎朝議大夫三人武翼大夫至武功大夫同致仕遺表恩澤文臣見任宰相八人舊十二人曽任宰相七人舊十一人見任執政六人舊九人曽任執政謂帶職者五人舊七人在内侍從在外待制以上或不帶職大中大夫以上二人舊三人無遺表止得致仕者侍御史舊二人中散中奉至中大夫舊二人朝奉郎至朝議大夫一人武臣見任使相七人舊七人曽任使相六名舊八人見任執政太尉謂許依執政官例者六名舊七人曽任執政節度使五人舊七人諸衛上将軍至承宣使四人舊五人觀察使三人舊四人通侍大夫二人舊四人正侍至右武大夫舊三人諸衛大将軍武功至武翼大夫遥郡同一人自祥符以後始有郊祀大禮致仕遺表之例太祖太宗朝無有也韓令贇以節度使卒劉蟠以諫議大夫卒皆以特恩官其子胡旦乆厯侍從以目疾致仕為子求官僅得試銜是無遺表致仕之例也王超入為殿帥出歴四鎮建鉞秉旄二十年而身殁之後其子徳用始以天平軍牙校補官是三衙方鎮亦無奏䕃之法矣魏咸信以都尉建節時請於朝始官其子是公主亦無奏䕃之法矣趙普佐命元勲乆居将相之任未嘗為子求官太祖亦不行延賞之典他日特授承昭為六宅使已為厚恩矣以上周禮通典唐志漢書續通鑑節修再考宋朝任子太祖建隆開寳猶循古制宰相止賜一子官故沈倫盧多遜子並為水部員外郎參知政事樞宻副使之子或為供奉官帝嘗言資䕃子弟但能在家彈琵琶弄絲竹豈能得治官於是不許親民寳訓建隆四年詔尚書禮部所補太廟齋郎自今每嵗齋郎以十五人為額其䕃補人並須年貌合格試念書精熟如經試引驗不合元敕其本司官並當貶降千牛進馬亦同每年所補各减二員乾徳五年虞部郎中趙元拱國子監奏延緒坐試齋郎念經不實皆責授二年周易博士奚嶼坐試進馬不實責降舊制䑓省六品諸司五品已上官皆得補䕃進馬嵗兵部試念經籍熟者中選齋郎亦然試於禮部至是陶榖子鄑求補殿中省進馬而所試令未精榖知私請於嶼即以鄑合格聚問事發案之故有是命榖亦奪兩月俸㑹要太宗至道二年詔自五品以上任子不得復擢太祝悉令同學究出身依例選集先是帝謂宰相曰膏梁之族官勲已崇貴子孫仕宦者多至四五人每覃慶中多授以稱官未幾即授正員不十數年半至闕籍此其弊政亟宜革之故有是詔尚書禮部補齋郎兵部補千牛進馬挽郎遇山林則補之也㑹要真宗咸平四年校書郎張褒言文武臣僚䕃補子孫殁於王事親属授官者涖事不學動成過咎持禄自滿豈知民情欲望自今並令先具所習文武書計事業差官攷試随其所長量才任使若無可采者乞授散官且令習業假有所立許上書求試攷較中程即與等第差遣仍詔樞宻直學士馮拯陳堯叟同詳定聞奏拯言準禮部令式所補齋郎須兩經粗通文義今奏補多是不經考試便授京秩州縣官及諸色出身若依式求文義粗通然後補署又慮難頓改更欲望自今文武臣僚奏補及殁於王事子孫骨肉内京官候至求差遣時審官院官員親冩家状仍令讀一經家状取書札稍堪讀書取精熟無誤者方為合格依例且與監當若在任别無贓罪顯有勞績候得替許與事状進呈取㫖其直授州縣官等委銓司依此攷試候合格方得給簽符厯子發遣赴任得出身人至參選日亦依此施行不合格者並殿一選本官且令習學候次年依此再行考試咸平五年詔自來臣僚並奏異姓召門客或除簿尉賜出身今並罷之㑹要大中祥符二年詔門資求差遣者當於國學習書以二年為期仍令審官院判監次考試訖以名聞寳訓乾興元年翰林學士李維晏殊等言竊自至道中太宗三年時宋白梁周翰各奏姪男充永定陵挽郎臣維有外甥王諫臣殊有堂弟詢欲望充永定陵挽郎上從之㑹要仁宗大聖九年王竦等挽郎注官如齋郎例慶厯三年九月開天章閣責治范仲淹富弼有曰自我真宗皇帝以太平之樂與臣下共慶恩澤漸廣大任子孫法弊冗濫日増請罷少司監以上乾元節恩澤正郎以下君監司邉任須在職二年始得䕃子弟大臣不得薦子弟在館閤長編十一月丁亥詔周大司樂掌學政以六藝教國子則官材盖本於教胄而今之䕃法推恩太廣以致疎宗蒙澤推齒授官未知立身之道從政之方而並階仕進非所以審政重民也其著為令使夫冢嗣先録以篤為後之體支子限年以眀入官之重設考課之格立保任之條古不云乎爵禄者天下之砥石人君所以礪世而磨鈍咨爾庶位體茲意焉自是任子之恩殺矣然猶未大艾也同上慶厯八年九月己未殿中侍御史何郯言近年大臣罷兩府任便陳乞子弟召試充館職或出身用為恩例望自今後館閣不許臣僚陳乞子弟外其陳乞及奏舉人同試以塞私倖詔今後臣僚奏子弟姪等乞出身及館職如有合該恩例者送學士院精加考試候㸃到等第臨時取㫖至和二年諫官李東之言徃年减省䕃補近臣但於服属踈逺者舉行數事而已使天下議論不厭伏大凡立法自貴始則人無怨心請先自嬪御宗室兩府大臣以至帶職員外諸司副使内臣之家一切裁損於是詔兩制䑓諌定議以聞長編嘉祐元年初龍圖直閣學士李柬之請定選舉補䕃之法知諫院范鎮侍御史毋湜翰林學士承㫖孫抃等亦更進其言自是每嵗减入流者無慮三百員長御史李絃言比奏薦親属無親踈之禁因得以冒為奸諫議大夫趙相以孫為子取為髙䕃自非具陳朝廷曷究其弊端乃詔自今奏薦子弟皆言服紀親踈即不奏無服之親嘉祐五年以内外官冗令䑓諫六品諸司五品一郊而任一人者增為兩嵗兩制以上一嵗而任一人増為三嵗長編神宗熈寧元年八月初御史張唐英乞兩府兩制奏弟姪並受職官大卿監亦罷奏子京官諫官吳申乞内自后妃外自宰相並權罷奏薦十年致仕遺表許奏一人兩府奏子孫終身無過五人兩制三人卿監二人郎中一人郎官員外郎龎元英乞諸司副使帶提㸃刑獄及閣門都事舍人比帶職員外郎兩遇郊任子其餘悉罷諌官吳充乞裁定妃嬪外戚遇聖節奏親属恩數詔兩制同定長編學士承㫖王珪等議乞宰相使相奏再從弟姪並與試銜大卿監遇郊奏子一人初等職官少卿監兩遇郊奏一人待制觀察使以上三遇郊奏異姓一人諸妃每遇同天節郊禮奏一人縣主每遇郊奏子一人三司副使兩遇郊奏一人並從之哲宗元祐元年八月右司諫蘓轍言臣伏見祖宗舊法凡䕃補子弟皆限二十五嵗然後出官守選逢恩乃得注官從来乆逺習以為常先朝患天下官吏不習法令欲誘之讀法乃令䕃補子弟不復限二十五嵗出官許令試法通者注官自是天下官吏爭誦律令於事不為無益然人既習法則試無不中故䕃補者例减五年遂令吏部員多闕少差注不行臣愚以為宜復祖宗守選之舊而選滿之日兼行先朝諸侯之科此亦今日之便也長編十一月右司諫王覿言臣伏見給率左右司郎官等準朝㫖用度裁减入流人數臣竊見文臣與武臣任子之法殊有未均文臣承議郎班列既在武臣諸司副使之上而諸司副使品常調今得任子承議郎以上至朝請郎非帶職者皆不得任子以品秩言之武臣親文臣若皆常調雖諸司使猶未可以任子也况副使哉盖前日諸司副使員少任子不多而入流之人未冗也推恩稍廣無所不可今副使員多任子者衆而入流之人冗甚則理當比類文臣重别立法伏望聖慈指揮下有司與前項裁减入流事一處相度施行長編孝宗淳熈七年臣僚劄子乞明詔有司将銓試終場合取人數令本經及法律試官各取其半本經取者以法律兼場法律取者以本經為兼場庶幾不廢舊規任子益加勉焉朝報淳熈九年臣僚乞自今以始文臣員郎武臣副使終身止得任一子員郎不許於貼職副使不許於隔郊自正郎正使以上其再遇大禮者則増至於三隔郊者則展至于再非侍從則無遺表自侍從以上其生前曽經奏薦者於致仕遺表皆損於在格之半仍以品秩之崇卑立為員額之定數若一品則通許䕃補幾人而止秩而下之各為限額朝報再論任子得人漢汲黯自衛君十世為卿黯以父任為郎為太子洗馬後仕武帝諫諍剛直義形於色張安世以父任為郎上亡書三篋詔問莫能知惟安世識之後定策立昭帝金日磾世名忠孝七世内侍東漢楊靈至彪四世太尉徳業相繼唐蕭瑀至遇八葉宰相名徳相望與唐盛衰張嘉貞至洪靖三世宰相李徳裕補䕃校書郎深嫉進士因曰朝廷顯官須公卿子弟為之何者少習其業自熟朝廷事䑓閣之儀不教而自成子弟未易可輕徳裕之論偏異並本傳宋朝韓維忠憲公億之子以䕃補将作監簿後為門下侍郎范純仁文正公次子以恩授太常寺太祝後中進士第元祐中兼中書侍郎曹瑋彬之子以父任西頭供奉官為将四十年用兵未嘗一衂种世衡放之兄子以䕃補将作監簿為将有智畧用間精宻素得属羌心復定和戎之䇿並言行録大臣不求任子宋太祖時趙普為相及歴三鎮節度未嘗為子求官太宗特授六宅使寶訓吕蒙正三入中書未嘗為姻戚徼寵澤從簡書奏補之制宰相奏子起家即授水部員外郎加朝階公奏曰臣昔忝甲科及第釋褐止授六品京官况天下才能老於巖穴不能霑寸禄者無限今從簡始離襁褓一物不能知膺此寵命恐罹隂譴止乞以臣釋褐所授官補之自此為制湘山野録羣書考索後集卷十七
