body:
  text: 羣書考索續集卷五宋章如愚編經籍門商書湯誓何以稱王曰孔曰泰誓云獨夫受此湯稱為王則比桀於一夫桀既同於一夫故湯可稱王矣是言湯於伐桀之時始稱王也周書泰誓稱王則亦伐紂之時始稱王也辨作書者以王稱陳曰湯由七十里起順四方徯后之心以伐夏救民鳴條之野不自王也孔安國謂桀為一夫而自稱王必無是理使當諸侯欲王湯耶則克夏之後諸侯自王之矣使諸侯不欲王湯則朝覲不至貢賦不入雖遽稱王亦無益也要知作書者追述之爾說者又引武王稱有道曽孫周王殊不知泰誓言豫小子發至武成之書史文其言以記其成功爾盤庚何以不言誥正義曰盤庚三篇皆以民不樂遷開解民意告以不遷之害遷都之善也中上二篇未遷時事下篇既遷後事上篇人皆怨上初啓民心故其辭尤切中篇民心少悟故其辭稍緩下篇民既從遷故辭復益緩哀十一年左傳引此篇云盤庚之誥則此篇皆誥辭也題篇不曰盤庚誥者王肅云取其徙而立功故但以盤庚名篇然仲丁祖乙河亶甲等皆以王名篇則是史意異爾太甲元年之疑程正叔曰湯崩太丁未立而死外丙方二嵗仲壬方四嵗故太甲得立也太甲又有思庸之資故伊尹立之非謂六年之間太甲方立也高宗曷任傅說陳曰學者言治亂之應一槩之以人事而不係於天道此固然也然不知天道人事初非異端苟能一本之以至誠則人事至而天道得矣夫高宗舉天下之政而授之版築之夫此事之所未有者也然髙宗恭默致誠神交於天天有所授亦無不可况高宗之學于甘盤遁于荒野宅于河服勞于外以同小人之役當時風俗之利病人材之賢否在髙宗必能知之使傅說而不賢則已傅說而賢高宗必得其詳矣得其詳於聲聞之交而方其夢於形容之間此所以一見而置諸左右也說命出於漢後說命之書疑出於漢之後也觀孟子舉書曰若藥弗暝眩厥疾不瘳今以說命觀之辭皆然也而趙岐於注乃云書逸篇也趙岐猶以說命之書為逸篇則出於漢之後可知伐黎之年不同正義曰鄭𤣥云紂聞文王斷虞芮之訟又三伐皆勝而始畏惡之所言據書𫝊為說伏生書𫝊云文王受命一年斷虞芮之質二年伐䢴三年伐密須四年伐犬夷五年伐耆六年伐崇七年而崩耆即黎也伐黎之前始言惡周故鄭以伐䢴伐密須伐犬夷三伐皆勝始畏惡之武成篇文王誕膺天命九年乃崩則伐國之年不得如書𫝊所說微子誥不言作正義曰殷紂既暴虐無道錯亂天命其兄微子知紂必亡以作言誥告父師箕子少師比干史敘此事而作此篇也名曰微子而不言作微子者已言微子作誥以可知而省文也周書泰誓非伏生所𫝊孔曰按史記及儒林𫝊皆云伏生獨得二十九篇以教齊魯則今之泰誓非初伏生所得按馬融云泰誓後得鄭𤣥書論亦云民間得泰誓而書别録曰武帝末民有得泰誓書於壁內者獻之與博士使讀說之數月皆起𫝊以教人則泰誓非伏生所𫝊而言二十九篇者以司馬遷在武帝之世見泰誓出而得附入於伏生所𫝊內故為史揔之并云伏生所出不復曲别分析云民間所得其實得時不與伏生所𫝊同也辨遷史已得泰誓孔曰按王充論衡及後漢史獻帝建安十四年房宏云宣帝泰和元年河內女子有壞老子屋得古文泰誓三篇論衡又云以掘地所得者今史漢書皆云伏生𫝊二十九篇則司馬遷時已得泰誓以并歸於伏生不得云宣帝時始出也辨泰誓以古文為真孔曰史記云伏生得二十九篇武帝記載今文泰誓末篇由此劉向班固因同於史記而劉向云武帝末得之泰誓理當是一而古今文不同者即馬融所云所見書𫝊多矣凡諸所引今之泰誓皆無此言而古文皆有則古文為真亦復何疑武成非述作之體正義曰此篇叙事多而王言少其辭又首尾不結體裁異於餘篇自惟一月至受命于周史叙伐殷王反及諸侯大集為王言發端也自王若曰至大統未集述祖父已來開建王業之事也自豫小子至名山大川言已承父祖之意告神陳紂之罪也自曰惟有道至無作神羞王自陳告神之辭也既戊午已下又是史叙往伐殺紂入殷都布政之事無作神羞以下惟告神其辭不結文義不成非述作之體辨諸儒疑武成之非疑武成之誤者古今之常說也孔頴逹曰此篇序事多而王言少其辭又首尾不結體裁異於餘篇無作神羞當有其辭今無其語是言尚未訖簡篇斷絶也自漢以來豈惟頴逹疑之耶特為之疏義故說行於世也近世王氏程氏之徒莫不疑之人自為斷家自為讀而卒無定論嗚呼書之不幸出於口授壁藏孔安國定其可知者五十有九篇曰其餘錯亂摩滅不可復知然則五十九篇既定之後豈無錯繆也哉蓋亦有之矣若夫武成之書則似顛倒錯亂然深究其旨實未嘗錯誤也武成者武王伐紂之功已成識其政事之書皆史官記武王征伐及其歸周所行之事此與堯典舜典冏命之書體同孔氏乃疑其序事多而王言少且據左氏無作神羞以下皆有其辭此獨無文何拘之甚邪王氏則離析其章句以豫小子其承厥志以下即繼以乃反商政夫繼上言先王之勤勞文王之未集大統武王方承厥志經以底商之罪此其辭理是順無其承厥志以下不言伐商罪遽謂反商政則其語無倫世之學者惟患武成之失次及其離而讀之反以無倫可乎武成一篇之旨武成一書惟知古人作書之體者乃知其無誤也武王既勝商歸豐史官雜記其事首曰惟一月壬辰旁死魄越翼日癸巳王朝步自周于征伐商此則記其始往伐商之時也繼以厥四月哉生明王來自商至于豐乃偃武修文以下此則記其克商還周之時也既述其往又記其歸此其記史之揔目也即載其命冡君百官之辭告皇天后土所過山川之言至無作神羞述武王往伐之時有此言爾述武王之言已盡乃曰既戊午師逾孟津此史官卒言其勝商之事爾至於封墓式閭散財發粟皆謂天下已定行之雖若不相倫續蓋相雜記其政事無害作書之體也以此月既生魄乃序其歸周之後既戊午重述其伐商之時不得於戊午繼四月生魄為疑也學者反復深思之理可見也辨疑武成當如孟子或曰孟子之於武成固盡信之矣豈得無所疑乎曰孟子將疑其仁人伐罪不至於流血漂杵爾孟子雖疑其理之或非未嘗疑其文之錯誤後人疑武成當如孟子而後為知書也天錫禹為洪範正義曰易繫辭云河出圖洛出書聖人則之九類各有文字即是書也而云天乃錫禹知此天與禹者即是洛書也漢書五行志劉歆以為禹治洪水錫洛書法而陳之洪範是也先逹共為此說龜負洛書經無其事中候及諸緯多說黃帝堯舜禹湯文武受圗書之事皆云龜負書經候之書不知誰作通人討核謂僞起哀平雖復前漢之末始有此書以前學者必相𫝊此說故孔以九類是神龜負文而出列於背有數從一而至於九禹見其文遂因而第之以成此九類法也辨洪範不本於洛書洛書之為物果如後世所𫝊一六畫北二七畫南者乎則其數有位而無文禹安知其一為五行二為五事也果如先儒所𫝊自五行至嚮用五福威用六極乎則其書有凡而無目禹安知其五事之為視聽言貌思八政之為食貨祀司徒司空也若以為終篇皆出洛書則上天之言又不應如是之繁悉也天人交感理誠有之其所以諄諄者特誘發人之智慮所未悟爾其已知已行則未嘗及也今九疇之中所謂卜筮者伏羲已兆之所謂歷數者黃帝已推之所謂司徒司空者堯舜已官之是無待乎洛書而後禹知之也則洪範之不本於洛書審矣洪範皇極皇者君也極者至極之標凖不可訓皇極為大中洛書之數而五居中洪範九疇而皇極居五故自孔安國訓皇極為大中而後之諸儒莫有以為非者豫嘗考之皇者君之稱也極者至極之義標凖之名嘗在物之中央而四外望之以取正焉者也故皇極為在中之至則可而直謂極為中則不可若北辰之為天極屋棟之為屋極其義皆然而周禮所謂民極者於皇極之義為尤近顧今之說者既誤於此而並失之於彼是以其說展轉迷繆而終不能以自眀也即如舊說姑亦無問其它但於洪範之文易皇以大易極以中而讀之則所謂惟大作中大則受之之屬為何等語乎故豫竊獨以為皇者君也極者至極之標凖也人君以一身立乎天下之中而能修其身以為天下至極之標凖則天下之事固莫不協於此而得其本然之正天下之人亦莫不觀於此而得其固有之善焉所謂皇極者也是其見於經者位置法象蓋皆本於洛書之文其得名則與夫天極屋極民極者皆取居中而取極之意初非指中為極也則又安得以是而訓之哉曰皇建其有極者言人君以其一身而立至極之標凖於天下也曰斂時五福用敷錫厥庶民者言人君能建其極而於五行焉得其性於五事焉得其理則固五福之所聚而又推以化民則是布此福而與民也曰惟時厥庶民于汝極錫汝保極者言民視君以為至極之凖而從其化則是以此還錫其君而使之長為天下之標凖也曰凡厥庶民無有淫朋人無有比德惟皇作極者言民之所以能若此者皆君之德有以為至極之標凖也曰凡厥庶民有猷有為有守法則念之不協于極不罹于咎皇則受之者言君既立極於上而民之從化或有遲速深淺之不同則其有謀為操守者固當念之而不忘其不能盡從而未抵於大戾者亦當受之而不拒也曰而康而色曰豫攸好德汝則錫之福時人斯其惟皇之極者言人有能革面而以好德自名雖未必出中心之實亦當教以修身求福之道則是人者亦得以君為極而勉其實也曰無虐煢獨而畏高明人之有能有為使羞其行而邦其昌者言君之於民不當問其貴賤强弱而皆欲其有以進德故其有才能者必皆使之勉進其行而後國可賴以興也曰凡厥正人既富方榖汝不能使有好于而家時人斯其辜于其無好德汝雖錫之福其作汝用咎者言欲正人者必先有以富之而後納之於善若不能使有顧於其家則此人必將陷於不義而不復更有好德之心矣至此而後始欲告之以修身求福之說則已緩不及事而其起汝惟有惡而無善矣蓋人之氣禀不同有不可以一律齊者是以聖人立極於上者至嚴至正而所以接引於下者至寬至廣雖彼之所以趨於此者遲速真僞才德髙下有萬不同而吾之所以應於彼者矜憐撫奄懇惻周盡未嘗不一也曰無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直㑹其有極歸其有極者言民皆不溺於己之私以從夫上之化而歸㑹于至極之標凖也析而言之則偏陂好惡以其生於心者言也偏黨反側以其見於事者言也遵義遵道遵路方㑹其極也蕩蕩平平正直則已歸於極矣曰皇極之敷言是彞是訓于帝其訓者言人君以身為表而布命乎下則其所以為常為教者一皆循天之理而不異乎上帝之降衷也曰凡厥庶民極之敷言是訓是行以近天子之光者言民於君之所命能視以為教而謹行之則是能不自絶逺而有以親被其道德之光華也曰天子作民父母以為天下王者言能建其有極所以有作民父母而為天下之王也不然則有其位無其德不足以建立標凖子育元元而履天下之極尊矣天之所以錫禹箕子之所以告武王者其大指蓋如此雖其奧雅深微或非淺見所能窺測然試嘗以是讀之則亦坦然明白而無一字之可疑者但先儒昧於訓義之實且未嘗講於人君修身立道之本既誤以皇極為大中又見其辭多為含洪寬大之意因復誤認以為所謂中者不過如此殊不知居中之中既與無過不及之中異而無過不及之中乃義理精微之極有不可以毫厘差者又非含糊茍且不分善惡之名也今以誤認之中為誤認之極不謹乎至嚴至密之體而務為至寬至廣之量則漢元帝之優柔唐代宗之姑息皆是物也彼其是非雜揉賢不肖混殽方且昏亂陵夷之不暇尚何斂福錫民之可望哉吾意如此而或者疑之以為經言無偏無陂無作好惡則所謂極者豈不實有取乎得中之義而所謂中者豈不真為無所去就憎愛之意乎吾應之曰無偏無陂者不以私意而有所去就爾然曰遵王之義則其去惡而從善未嘗不力也無作好惡者不以私而自為憎愛耳然曰遵王之道遵王之路則其好善而惡惡固未嘗不明也是豈但有包容漫無分别之謂又况經文所謂王義王道王路者乃為皇建有極之體而所謂無所偏陂反側者自為民歸有極之事其文義亦自不同也邪必若子言吾恐天之所以錫禹箕子之所以告武王者上則流於老莊依阿無心之說下則溺於鄉原同流合汙之見雖欲深體而力行之是乃所以幸小人而病君子亦將何以立大本而序彞倫哉皇極為至極大君居中有至極之德而後能立至極之標凖於天下三曰皇極之為至極何也豫應之曰人君中天下而立四方靣向而觀仰之者至此輻輳於此而皆極焉自東而望者不能過此而西也自西而望者不能踰此而東也以孝言之則天下之孝至此無以加以弟言之則天下之弟至此而無少過此人君之位之德所以為天下之至極而皇極所以得名之本意也故惟曰聰明睿智首出庶物如所謂天下一人而已者然後有以履之而不疚豈曰含容寬裕一德之偏而足以當之哉又曰人君以眇然之身既居天下之至中則必有天下之絶德而後可以立至極之標凖故必順五行敬五事以修其身厚八政協五紀以齊其政然後至極之標凖卓然有以立乎天下之至中使夫靣向而環觀者莫不於是而取則焉語其仁則極天下之仁而天下之為仁者莫能加焉語其孝則極天下之孝而天下之為孝者莫能尚也是則所謂皇極者也由是而權之以三德審之以卜筮驗其休咎於天考其禍福於人如挈裘領豈有一毛之不順哉此洛書之數所以雖始於一終於九而必以五居其中洪範之疇所以推本於五行究於福極而必以皇極為之主也文公文集九疇次序之義孔曰自初一曰已下至此六極已上皆禹所第也禹為此次者蓋以五行世所行用是諸事之本故五行為初也發見於人則為五事故五事為二也正身而後及人施人乃名為政故八政為三也施人之政用天之道故五紀為四也順天布政則得大中故皇極為五也欲求大中隨德是任故三德為六也政雖任德事必有疑故稽疑為七也行事在於政得失在於天故庶徴為八也天監在下善惡必報休咎驗於時氣禍福加於人身故五福六極為九也皇極居中者總包上下故皇極𫝊云大中之道大立其有中謂行九疇之義是也福極處末者顧氏云前八事俱得五福歸之前八事俱失六極臻之故福極處末也九疇以五行為首夫箕子之言九疇自五行至五福六極固不能無先後緩急之序首以五行者以天生五材闕一不可一日而無五行則人不能以自生何暇論五事八政五紀三德以至五福六極乎故曰鯀湮洪水汨陳其五行帝乃震怒不畀洪範九疇言九疇始於五行五行本於水水性失則五行汩亂五行之性失則九疇無序矣謂九疇以五行為重可也而謂九疇皆配合於五行則非也向歆傳洪範之非蘇曰或曰古人言洪範又莫深於歆向之傳吾嘗學而得之矣今觀子之論子其未之學邪何遽反之也子之論曰皇極裁節五事其建為五事之得失𫝊則擬五事而言之其咎其罰其極與五事此非所以裁節五事也子又曰皇極建則五福應皇極不建則六極應𫝊則條福極而配之與貌與言與視與聽與思與皇極又非皇極兼獲福極也然則劉之𫝊子之論孰得乎曰爾以箕子之知洪範與歆向之知孰愈必曰箕子之知愈也則吾從之彼歆向拂其意矣吾復何取辨蘇論惑於劉𫝊近世蘇子知劉氏之失立論以非之是矣而其自為說則又以理五行資五事正五事賴於皇極五行包羅九疇者也五事檢節五行者也皇極裁節五事者也此亦不可也五行之用特急於九疇何以能包羅九疇乎五事之在人無與於五行何以能裁節五行乎皇極之道凡天下事皆欲歸之八政三德之類亦然豈惟裁節五事而已哉乃欲以一治三以三治九以九治五十以五十治百未見其可也且謂皇極之建凡九疇皆序亦可矣若皇極之不建吾不知木何以不曲直金何以不從革土何以不稼穡至於六極之中生而抱病謂之疾狀貌醜陋謂之惡勢力孤寡謂之弱此皆出於天命非人所為也今以皇極不建五事不當五行不順乃使人疾使人惡使人弱者有是理乎故夫蘇子之論正與五行𫝊辨而未免五行傳之惑也誠使劉氏之𫝊舉而焚之不為後儒惑則九疇之義昭昭矣福極合為一疇陳曰五福六極合為一疇蓋可知矣八疇皆得則五福應八疇皆失則六極應劉向以福極分應五事而五行庶徴皆以類合不知聖人立論不如是也况六極者五福之反也五福曰壽曰考終命而六極以凶短折之一極反之五福曰攸好德而六極以惡之一極反之五福曰富而六極以貧之一極反之或以一極反二福或以三極反一福若之何離而為五以配五事顧弱之極無所係也又以皇之不極附之為六漢儒之學其病在此太保何以作旅獒武王克商通道夷蠻方物畢獻固其宜也按周禮大行人云九州之外謂之蕃國各以所貴寶為贄鄭𤣥云所貴寶見經傳犬戎獻白狼白鹿是也然則西旅獻獒武王受之未害也旅獒何戒焉嗚呼公之意有在矣學者未之考也不寶逺物則逺人格所寶惟賢則邇人安茍於此而不戒則四方之夷珍禽異獸莫不畢至是止知寶逺物而不知寶賢也茍不惟賢之是寶則惟物之是玩王之志將由是而喪矣太保之戒其可緩邪大誥序文不同陳曰大誥之序曰周公相成王將黜殷是黜武庚也而孔子之序曰武王崩三監及淮夷叛夫孔子之序言三監也而獨不及武庚何耶蓋武王之立武庚非得已也立武庚則武庚必叛無疑矣武王知武庚之必叛故立武庚以為商王之後以奉一代之祀而治民之事則三叔監之武庚不得而預也然則何由知之曰由堯舜之封象而知之也舜之封象於有庳也不使之有為於其國而使吏治其國而納其貢賦武王之封武庚也亦若此而已矣故治武庚之國而納其貢賦者即三監也武庚為諸侯而三監治其國使三監不叛而武庚欲叛得乎此大誥之序言黜殷而孔子正其實以為三監叛也孔子以武庚為三監之一夫哉武庚既為諸侯矣安得謂之三監乎周公營洛居土中正義曰周禮大司徒云以土圭之法測土深正日影以求地中日南則影短多暑日北則影長多寒日東則影夕多風日西則影朝多陰日至之影尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也陰陽之所和也然則百物阜安乃建王國焉辨大司徒論中土之非營王邑者欲居天下之中使四方道里均此則可矣而謂天地必合於此四時必交於此恐無是理也况於風雨之㑹隂陽之和無非在人君德政故應天心如何爾但居洛邑以求風雨之㑹隂陽之和空言也今觀洛誥之書特云卜澗水東瀍水西何嘗如大司徒之說乎周召相營洛周孔曰召誥云三日戊申太保朝至于洛卜宅厥既得卜則經營是召公先相宅即卜之又云乙卯周公朝至于洛則逹觀于新邑營是周公自後至經營作之召公相洛邑亦相成周周公營成周亦營洛邑各舉其一互以相見卜者召公卜也周公既至洛邑按行所營之處遣使以所卜吉兆逆告成王也諸儒議君奭非是君奭之書學者惟見序有召公不說之言書有汝有合哉之語則皆以為召公疑周公召公聖人之徒也不疑周公於四國流言之際而疑周公於復辟之後有是理耶司馬遷作史記燕世家且曰成王幼周公立政因踐祚召公疑之乃作君奭此尤謬也君奭書乃周公復辟之後二公為師保之時何得云爾乎夫召公之不疑周公先儒或能言之矣然其自為說則又未得也孔頴逹曰周公攝王政不宜復列於臣職是以召公不恱周公之留也王氏曰習文武至治之後則難為繼成王非有過人之聰明則易以壞以易壞之資任難繼之事此召公於親政之始有不恱也蘇氏曰伊尹既復政而告歸周公不歸故也王氏之說則是召公以成王聰明不足難與有為豈聖賢之意乎如孔氏蘇氏之說則是周公不知以禮進退反使召公欲其告歸又且不免聖賢之有疑也辨召公所以不悅君奭一書無召公憂成王難與共治之事亦無召公欲周公告去之意然則召公之不恱者非為周公也自有所不恱也夫召公之自有所不恱何也召公相文武成王三世矣至成王能自為政召公之年已老矣而復尊以師保之任方功成身退之時而加以莫重之寄雖成王之所眷注周室之所倚賴爵位日隆任責日重非召公所樂也况召公已封於燕身留相周而不得優游於公不悅之旨蓋為此爾是以周公勤勤作書以留之蓋不以寵利居成功者人臣去就之節忘身狥國愛君不忍去者大臣始終之義召公之欲告老雖得去就之節未可以為忘身狥君之義此君奭之書所由作也撫萬邦巡侯甸正義曰周之法制無萬國也惟伐淮夷非四征也言萬國四征亦是大言之爾六服而惟言侯甸者二服去圻最近舉近以言之言王巡省偏六服也虞周巡守異同孔曰周禮大行人云十有二嵗王巡守郡國是周制十二年一巡守也如舜典所云春東夏南秋西冬北以四時巡行故云時巡考正制度禮法於四嶽之下如虞帝巡守然康王之誥分合正義曰康王既受顧命在天子之位羣臣進戒於王王遂報誥諸侯史叙其事作康王之誥伏生以此篇合於顧命共為一篇後人知其不可作分而為二馬鄭王本此篇自高祖寡命已上內於顧命之篇王若曰已下始為康王之誥諸侯告王王報誥諸侯而使告報異篇失其義也穆王非荒媱之主嘗謂夫子定書自周成康之後獨存穆王作君牙伯冏吕刑三書使後世觀書知其用人與其訓刑之際如是明審可知穆王之為人不墜文武成康之風烈矣今觀穆王三書其命君牙為大司徒則自謂守文武成康之遺緒其心憂危若蹈虎尾涉春冰必賴股肱心膂為之翼也其命伯冏為大僕正則自謂怵惕惟厲中夜以興思免厥愆至有僕臣諛厥后自聖之言非惟見其任君牙伯冏之得人且知其飭躬畏咎也其命吕侯以刑也則歷告以謹刑罰恤非辜雖當耆年而其心未嘗不在民反謂之意不在天下何耶使穆王作三書皆無實之言所任之人亦不當則夫子不取之也夫子存其書則君牙伯冏吕侯非妄人穆王非不恤國事之主明矣辨世儒議穆王非是今之世儒有讀命伯冏為大僕正者則曰穆王好馬故也讀吕刑王享國百年耄荒則曰王老而荒怠故好游也據書曰王享國百年耄言時已老矣年雖老而猶荒度作吕刑以誥四方正見王之不怠也荒度之義與荒度土功同若果既耄且荒何暇訓夏贖刑乎穆王用夏刑之制孔曰周禮司刑掌五刑之法以麗萬民之罪墨罪五百劓罪五百宫罪五百刖罪五百殺罪五百五刑惟有二千五百此經五刑之屬三千按刑數乃多於周禮而言變從輕者周禮五刑皆有五百此則輕刑少而重刑多此經墨劓皆千剕刑五百宫刑三百大辟二百輕刑多而重刑少變周用夏是改重從輕也禮記以吕刑為甫刑正義曰禮記書𫝊引此篇之言多稱為甫刑曰故𫝊解之後為甫侯故或稱甫刑知後為甫侯者以詩大雅嵩高之篇宣王之詩云生甫及申揚之水為平王之詩云不與我戍甫明子孫改封為甫侯不知因吕國改作甫名不知别封餘國而為甫號然子孫封甫穆王時未有甫名而稱為甫刑者後人以子孫之國號名之也魯侯何以征徐戎孔曰禮諸侯不得専征伐惟州牧於當州之內有不順者得専征之於時伯禽為方伯監七百里內之諸侯故得帥之以征戎夷王制云千里之外設方伯以八州八伯是非别立一賢侯以為方伯即周禮大宗伯云八命作牧是也禮記明堂位云封周公於曲阜地方七百里孔意以周之大國不過百里禮記云七百里者監此七百里內之諸侯非以七百里地并封伯禽也序何以終秦誓書之終以秦誓先儒言之不過曰美其悔過耳愚則以為仲尼所以存周也子不繼則支繼之支不繼則庶繼之明有𫝊而不絶也魯周之支也秦周之庶也周之衰孔子有望於魯矣魯之衰孔子有望於秦矣文侯之命東遷之書也次之以費誓又次之秦誓聖人之意豈徒然哉孔子曰如有用我者吾其為東周乎蓋此意也雜辨書備帝王之道看書須要見二帝三王之道如二典即求堯所以治民舜所以事君尚書之難看尚書難看蓋難得胸臆如此之大只欲解義則無難也同上篇意之不同八條二典三謨其言奧雅學者未遽曉會得後靣盤誥等又難看如商書中伊尹告太甲五篇宜熟讀極好商書幾篇最分曉可玩太甲伊訓等篇又好看似說命典謨之書須經史官潤色來如周誥等篇恐只如今榜文曉諭俗人方言俚語各自不同髙宗舊學于甘盤至此方言學字大誥一篇不可曉其意思緩而不切看二典之書堯舜所以卷舒作用直如此熟康誥三篇是武王書無疑其中分曉說王若曰孟侯朕其弟小子封五峯吳才老皆說是武王書尚書諸命皆分曉蓋如今制誥是朝廷做底文字諸誥皆難曉蓋是當時與民說話後來追録而成並文公語録篇意序意之說其所言治心修身處雖為人主言然初無貴賤之别宜取細讀極好今人不於此等處理㑹却只去理㑹小序某看得書小序不是漢人作只是周秦間低手人作然後人亦理㑹它本義未得且如臯陶矢厥謨禹成厥功帝舜申之申重也序者本意先說臯陶後說禹謂舜欲令禹重說故將申字係禹字盡伏生書以益稷合於臯陶謨而思曰贊贊襄哉與帝曰來禹汝亦昌言禹拜曰帝豫何言豫思日孜孜相連申之二字使見是舜令禹重言之意此是序者本意今都不如此說得多皆非其本意也又曰以義制事以禮制心此是內外交相養法事在外義由內制心在內禮自外作文公經說當求聖人之心尚書須要考歷代之世變先生曰世變難看唐虞三代事浩大闊逺何處測度不若求聖人之心如堯則考其所以治民舜則考其所以事君且如湯誓曰豫畏上帝不敢不正熟讀豈不見湯之心大抵尚書有不必解者有須著意解者有略須解者有不可解者如仲虺之誥太甲諸篇只是熟讀義理自分明何俟於解如洪範則須著意解如典謨諸篇稍雅奧亦略須解若如盤庚諸篇已難解而康誥之屬則已不可解矣昔日吕伯恭相見語之以此渠云亦無可闕處因語之云若如此則是讀之未熟後二年相見云誠如所說訓字之是非棐字與匪同先儒錯解作輔至今承誤惟顔師古注漢書曰棐匪同嘗疑尚書解是後人做非漢人文章解得不成文字然張衡亦將棐錯使了書中迪字或解為道或解為行疑只是訓順字惠迪吉從逆凶以逆對迪可見書中迪字用得皆輕也書中弗弔字只如字先儒欲訓弔為至故音的非也其義正如詩中不弔昊天耳言不加憫豫於上帝也忱諶字只訓信天棐忱如云天不可信也已上並文公遷史得罪於經書學不明其馬遷之過歟馬遷未嘗釋書而吾獨咎之非咎其不能釋經也究其史記之作考正不精使書因是不明也蓋夫子以前載籍無經史之殊夫子既刪定之然後經為經史為史經以明道史以記事經略而史詳則世之學者引史而談經史其理也遷當焚書之後經之闕遺多矣幸而伏生孔壁之𫝊至於石室之書可得而考然而不能以翼經為心而自棄於史家者流好竒尚異雖惑甚害於理者有不忍棄焉蓋自以為史家之學貴多貴博與經異體而不知說書者皆引遷為證則遷雖無意於惑經而經之惑實由遷致也書之序虞舜也直曰側微而已未嘗明言其族也遷獨系之以為黃帝子孫至堯而四世至舜而八世其世數多少既已可疑而左氏曰自幕至於瞽瞍無違命則虞氏之先又有所謂幕者矣非止八世也堯舜世系疑似難明遷遽數之至使後世謂舜為上娶祖姑則由遷之誤以致之也書之述四凶也多以事體相類總言之未嘗一朝俱刑之也遷述本紀以謂舜巡守歸而言於帝得流共工以變北狄放歡兜以變南蠻遷三苖以變西戎殛鯀以變東夷其所謂流放以變夷狄者既未必然而左氏曰鯀殛而禹興韓子曰堯授天下於舜共工不義舜舉兵伐之則共工之流在舜攝政之後伯鯀之殛在舜未舉之前其時相去既逺而遷併以為一時至使後世謂禹専其功而舜不能貸其父亦由遷之誤以致之也書之言朕虞也曰伯益而已伯益之外未嘗有人也遷既載伯益於舜紀又載柏翳於秦紀而不知二人之本一至後世謂柏翳為女華之子謂伯益為臯陶之子則又惑於遷之說也書之載禪位也曰受命于神宗率百官若帝之初矣是舜不復事矣遷既書蒼梧南巡之事而不知舜之終實在鳴條至使後世謂大舜耄期之後猶違禮而逺征則又惑於遷之說也上古帝王之事賴書而𫝊書學不明尚賴史家證之而馬遷於古疏略如此此吾所以正其端歟非特此也太甲桐宫居廬之制也而謂伊尹放君則是高歡之事也周公踐祚冡宰之事也而謂負扆居攝則是王莾之事也文王稱王後世追稱耳而謂之命於虞芮質成之後則是梁未亡而稱帝也召公不說懼主少國疑耳而謂忌周公之為師則是李林甫之􅦫張九齡源乾曜也以盤庚為作於小辛之世以肜日為作於祖庚之世以金縢為作於成王之世以文侯之命為作於襄王之世詆繆如此此吾徒所以不得不正其端歟原遷之作史抑不為聖經計固不當引經罪之然遷之失不闢則經不明此又吾之不得已於遷也羣書考索續集卷五
