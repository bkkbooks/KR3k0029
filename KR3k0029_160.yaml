body:
  text: 羣書考索續集卷二十九宋章如愚編官制門歷代官制總序三代之道人非天地不生天地非人不成故凡君臣庶民皆人也人不能以自治故必推其能順天地以治人者戴之而謂之君君不能以獨治故必擇其能代天工以共治者任之而謂之臣君臣之間兩盡其職則民得其所矣古今天下有是民則有是相生養之事有是事則必有是相維持之職非古無而今獨有之也惟職當於事則知所以為民職浮於事則徒知所以自為而已少皥以五氏司民時五鳩鳩民事五工正以利民九農正以扈民皆為民也堯命羲和以授民時舜命九官十二牧以主民事夏商官倍亦克用乂周家設官以為民極皆順天地代天工者也以一君而統百官而理萬民所謂本也以萬民而養百官以百官而奉一君所謂本立而末自舉也今昔建官上必量材而授下亦自量而受則知所本矣不知所本而君臣重於自奉輕於為民是豈天地之心哉故夫無是事而立是職無是實而有是名者皆非也官茍可以理民則與其煩也寧簡職茍可以集事則與其革也寧因必考已事之驗不為鑿空之談則古今官制名實之是非煩簡因革之當否其如指諸掌矣職官表志太上龍雲鳥火之號至春秋時郯子猶能識之則知文籍既生官制未嘗無表志焉書稱唐虞稽古建官惟百夏商因唐虞而倍其數第第相承必有品式若表志然所患文獻不足以證之耳周典一書此又表志之大者非周公創為之也乃損益帝王之制而備之耳曰百官倍曰三百六十此其制也曰萬國咸寧曰亦克用又曰以為民極此其意也班固漢表必先叙其所因以明簡易次述其增益由武帝之侈心終言新式慕古無補而吏民不安以見光武中興節約之意有足法者范曄志東漢百姓止存光武之制而其後之所因革損益漫不及焉晉隋唐志但紀官名之變復而煩簡是非之實又無所旌别非惟後世官制不如漢初之簡易而史之志百官也亦失班氏紀述之體矣是安能究古者建官之本意哉歷代官制因革周典六官其來尚矣唐虞水土事殷故伯禹以司空居冡宰之任垂益以工虞分司空之職是時兵刑雖設民用不犯於是司馬司冦臯陶兼掌之而有餘禮樂教化務所當先於是司徒宗伯契夷䕫分典而不足棄后稷龍納言十有二牧食哉惟時凡以為民也三代相承率由斯道秦人不師古始輕變官制未害也特罷侯置守尊君抑臣燔燒詩書以愚黔首其意唯知自奉而不知有臣民也雖然周之官制非至秦而始變也蘇秦為國相許歷為國尉孫龎仕魏為將軍而須賈亦為魏中大夫吳起守西河馮亭守上黨西門豹令鄴荀卿令蘭陵是則守令將相之名在戰國則已然特至秦而始定耳夫是制既定於秦而漢人復因秦舊自魏晉迄于隋唐又復因先漢之名而升降之如秦漢侍衛之士謂之侍郎而近世居從槖之尊秦漢出入禁闥謂之侍中而近世為三省之長秦漢僕射之職甚卑而近世以為宰相之任其升降輕重雖不同苐顧其所任之人與夫所以為民之意如何耳其或煩其制以病民侈其名以尊已文貌有餘而精神不足氣血壅滯而脉胳不貫者皆未免秦皇漢武之餘習也歷代官名沿襲人皆謂唐之官名因乎隋宋朝官名因乎唐曽不知公師保傅大尉將軍自周漢已有之二漢百官表志有侍中備顧問有僕射中常侍黃門侍郎給事中等皆在禁中似今門下省也有尚書令又曰中書謁者令掌選置及奏下文書衆似今中書尚書省也有尚書僕射佐令奏下衆事似今左右僕射也有尚書六人分為六曹典天下集課事似今六部尚書也內有三公尚書二人典三公文書有吏曹尚書典選舉似今吏部尚書也有常侍曹尚書掌公卿事有二千石曹尚書主郡國二千石及水火盜賊似今刑部兵部尚書也有民曹尚書典治功作及監池苑囿似今工部户部尚書也有客曹尚書似今禮部尚書也又有左右丞掌録文書似今尚書左右丞也每曹有侍郎六人似今六部侍郎也有尚書郎有尚書郎中似今六部郎中員外郎也不特此也少府之屬有御史大夫有御史中丞有治書御史有監察御史東宫之屬有庶子有詹事有舍人洗馬議郎九卿則有宗正司農太常光祿太僕衛尉鴻臚大理七監則有都水將作大匠等其餘如太史太祝太醫博士祭酒光祿大夫大中大夫諫議大夫凡此之類皆二漢之官名也唐豈特因隋宋朝豈特因唐也哉夫古今天下雖封建與郡縣不同而其民其事則同故其所以異者封建則事要而官簡郡縣則事煩而官冗也周之官簡矣復以三公兼冢宰以三孤列九卿則其制為益簡民胡得而不安秦漢以來官冗矣既有三公復有三師既有三省復有六曹既有九寺復有七監則其制為益冗民胡得而不病哉隋志云隋尚書八座六部之屬並如漢制又如梁武用宋齊舊制有尚書省置令僕六尚書有門下省置侍中給事侍郎有中書省置監令侍郎又有集書祕書省此見隋唐官名皆因秦漢魏晉六朝之舊也歷代改制不如省官孔子欲正名於衛者正其父子君臣之名分也夫豈徒名之謂哉是故太古官名雲師火紀不必相同而况於唐虞三代乎欲正其名亦必考論其實而已秦更周制王莽更漢制煬帝更隋制皆未幾而亡武后𤣥宗更唐制蔡確蔡京更宋制皆未幾而亂漢光武宋高宗不更舊制惟務省官皆身置中興之功目擊太平之效者何也蓋君與臣為一心臣與民為一體設官分職凡以為民也徒更其名與制而不計其民之便與否是分擾臣民之體統而使之氣脉不相通貫綱目不相聯附所以亂亡相尋也惟能省官而從節約之制則猶夫清心而四體安提綱而萬目張兹其所以為治歟後漢志云漢興略依秦制武帝改作民用匱乏世祖并官省職費减億計四海風從中國安樂宋高宗孝宗併光祿鴻臚歸禮部并衛尉入兵部太僕入駕部又以少府入將作太府入殿中內侍監入內侍省大而三省亦不置長官惟改僕射之名為丞相而已歷代正名不如務實新室後周皆因倣周官之制而更立公卿大夫元士之號其大略則同莽以采地制祿視嵗之豐凶而增損宇文以榖制祿視年之中上下而頒斂之其制亦略同顧其所以異者莽之制度煩碎吏終不得祿而各自為奸以取給周提其綱而秩祿有定賦加之以六條清心無非便民之事此其所以治也然則漢制不因周而因秦唐制不因後周而因隋亦足以致治者何歟漢之初興凡事簡易唐之初興亦務省官其制不必慕古而其意則微有合於古也使武帝能循高祖之法𤣥宗能遵太宗之制雖不紛更不害其為治也宋初務實與漢唐之初同元豐改制政和正名與建元開元同得失之迹可以鑒矣漢官制官制有爵有職官又有加官漢官制有爵有職官又有加官自公士至徹侯凡二十級者爵也三公九卿者職官也侍中左右曹諸吏散騎中常侍之屬加官也其爵則以功次差轉等級有差考之樊噲夏侯嬰二傳可見其職官之除授初不係其爵之高下固有爵崇而官不轉者樊噲爵至列侯始遷為郎中夏侯嬰至侯不離乎太僕是也亦有官尊而未有高爵者景帝後元年賜中二千石諸侯相爵右庶長是也遷轉之制或遲或速雖有資格未始一拘於資格也唯加官所加則出於上之特恩其所加則上自列侯將軍而下至郎中皆可以出入禁闥故其叙官多在職官封爵之上漢初未有加官且自武帝始置此而外廷公卿之權蓋於是乎輕矣加官之制自奉車都尉之外凡七侍中吏左曹常右曹諸中侍散騎中給事奉車都尉掌御乘輿親近之職也故加官皆屬焉以此見加官皆親近也侍中中常侍得入禁中諸曹得受尚書事左右曹也受者受而奏御也諸吏得舉法散騎得騎馬並乘輿言騎而散從無常職也又有給事中中常侍從左右備顧問應對所加或大夫或博士或議郎掌顧問應對位次中常侍又有給事黃門位從將軍大夫置加官乃是疏外宰相諸吏舉法乃是奪御史中丞之權鄭節卿光武省官非濟己私光武中興深察前弊且當天下雕耗思樂息肩之時躬行節儉取西都官制隨事裁損大略求以濟天下實用而非為己私也故以太常言之太卜則省併太史中興所省凡十官以光祿勳言之車戶騎三將及羽林令皆省焉以衛尉言之則旅賁令衛士一人丞皆在所省也太僕之六廄則置一廄牧師苑皆令官也亦從而省焉右監廷尉之屬也驛官别火之令丞鴻臚之屬都司空者宗正之屬也均輸司農之屬也中興悉從而省焉水衡離宫燕居之處則省併於少府將作大匠之所存者左右校二令而已此軍中候監五營中興既省中壘胡騎之併於長水虎賁又併於射聲世祖節約之制所以反前日浮冗之弊而天下之官師相與維持一代之治者宜為武帝之常憲武帝奢廣之事所以濟一己之私者固有間矣摹純政權必有所寄蓋政權不可一日不在朝廷不在朝廷則在臺閣不在臺閣則在宫闈在朝廷則治在臺閣則亂在宫闈則亡西漢興敗舉出於此漢自孝惠垂拱責成輔相人主皆不曽自有所為至朝錯以五帝親事之說告文帝而文帝不用輔相大臣權望日重以武帝初年田蚡以帝舅之尊始招徠賔客薦進人物當時固有起家二千石之事然而政在朝廷畢竟是宰相隂用人才亦奚不可者使武帝以蚡為非其人則權擇一相委任責成豈惟漢家將後世終無權柄下移之禍奈何帝不能堪欲攬威福之柄然一己聰明有所不逮必須置人為耳目故置加官及尚書之屬自此以後薦進人物盡在左右侍從之人衛青幸則薦主父偃嚴助幸則薦朱買臣楊得意幸則薦司馬相如起家亦自驟貴與其假借左右孰若與宰相同之也夫捨大臣而與小臣謀固不是然此等由是朝士及後以中朝與外朝有黨而尚書等不甚周密於是别用一項人如中書宦者之屬及元成以後向之所謂侍中尚書皆不如中書宦者用事揚雄傳所謂丁傅董賢用事諸附離之者或起家至二千石與其委之閹豎又不若任之臺閣近臣比石中石試官守官漢之官制最有好處均之為二千石也而有比者有真者有中者均之為官吏也而有試者有行者又有守者比不如真真不如中試不如行行不如守觀霍光傳有行大鴻臚事少府樂成是樂成守少府而兼行鴻臚事爾按九卿鴻臚位第二而少府位第五以少府而兼行鴻臚事未得為真也亦猶平陽侯窟行御史大夫事韓安國張湯行丞相事蓋寬饒為諫大夫行郎中戶將事翟義為都尉行太守事爾凡此皆兼行之也宣帝元康元年守京兆尹潁川太守黃霸五鳯元年守左馮翊凡此者皆是擢守此守舊銜而帶之爾非兼行之也至於試則不及此矣王溫舒試縣亭長張禹為郡文學試為博士以此見試不如行行不如守又王尊為虢令轉守槐令兼行美陽令事是王尊雖兼三令只在號為令蓋守者為遷擢兼行者為權攝又王尊為諫大夫守京輔都尉行京兆尹事旬月間盜賊清遷光祿大夫守京兆尹後又為真如此則前日京兆只權行今日有功則擢守既守乃為真諸守臣稱職者滿一嵗則為真又有身帶兩官一官具職秩位號者張安世為右將軍光祿勳趙充國自水門都尉擢後將軍領水衡如故凡此將軍皆號爾非有職事官屬也金安上光祿大夫中郎將馮奉世光祿大夫水衡都尉凡此士夫皆加秩爾亦非有他官守也正如宋朝官制未行之前凡尚書翰林皆是遷轉之階爾凡官缺攝者稱行官卑職重者稱守兼它官者稱權出者稱奉使國家之制朝官資歷淺者間出補外不過下一等帶一權字耳所謂權發遣者惟三司開封官爾其後王金陵引用新進監司郡守始皆帶權發遣矣甚至於擢知縣資格而為之漢唐樂美名漢武帝上嘉唐虞下樂商周制度動欲慕古而創置官名獨不能法古者侈心奪之也唐太宗使長孫無忌輩撰集隋志觀其叙歷代官制自秦而下至于隋大略相仍損益無幾獨謂後周酌豐鎬之遺文其典制有可觀焉又謂隋煬號令日改官名月尋而南征不復朝廷播遷則是褒周而貶隋也今觀有唐官制又復捨周而循漢魏陳隋之舊者何哉亦以公孤侯伯之稱近於朴古而省部寺監之號足為美觀也厥後易尚書省為文昌臺門下省為鸞臺中書省為鳯閣祕書省為文臺之類豈非樂其名之美歟梁武帝增十二卿以象四時革選部定為十八班作戎秩百有餘號皆其類也其於治忽本無所係焉唐太宗猶有異於漢武帝者尚能省官故也唐官制太宗省官固善不合有員外之置有事則有職有職則有官理也古人以事任人事省則職省故有二職而無官後世以人任官人增則官增故有二官而無職有職而無官非廢事也或一官而兼數職有官而無職非增事也或一職而任數人周官三百六十總而計之為六萬三千六百有竒非皆具貟也考之周禮名存而實不備職具而官不除者蓋多也今貞觀省內外官六百四十貟唐志七百貟太宗曰吾以此待天下賢才足矣非不甚美然貟外置已見於當時將何以一流品杜將來哉其後又有特置同正貟檢校兼守判知之類皆非本制宰相或至數人平章事或與外任一官而數人守之貟外官至二千餘人其末流之弊未必非太宗啓之朱黼云開元六典象周為制魏鄭公嘗以周典為太宗獻太宗以為不井田不封建不肉刑而欲行周公之道不可得帝也既懷畫虎不成之疑徵等復慙禮樂廢缺之問是六典者而太宗且未之能行而唐初官制自因漢魏之舊本不與周典相侔開元十年𤣥宗手寫六條曰理典教典禮典政典刑典事典命張說陸堅修撰經嵗無成乃命毋煚韋述輩參撰始以唐之百官令式象周禮六官為制蕭嵩張九齡李林甫相繼知院至開元二十六年乃成是知唐制與周官本不相侔六典特象周為制耳如其制同則修書朝夕可就也何必更易數十人綿延十六年哉况唐自高宗迄于肅宗官名屢有因革高宗龍朔盡改舊名咸亨元年復武后光宅垂拱天授又改中宗神龍復𤣥宗開元二年改五年復天寶又改肅宗至德復而𤣥宗一人之身三變官名元年改僕射為丞相中書為紫微門下為黃門侍中為監至五年而復舊二十四年改主爵為司封天寶元年盡改三省之名而以吏部為文部兵部為武部刑部為憲部之類先後自為異同也如此其制安得與周之六官同其所以同者不過曰尚書以正邦理以宣邦教門下以和萬邦以弼庶務中書以釐萬邦以庶百揆之文而已吁六典象周為制既非其實元豐又復象唐以正名曷若各循祖宗之法哉宋朝官制宋初務實意尚書二十四司由漢以來未之有改也宋太祖太宗一旦懲五季藩鎮外重之弊凡尚書郎曹卿寺等官悉領外寄以分其勢於是上而三省六曹下而九寺七監皆為寓祿官而臺省寺監悉以他官兼領名若未正而實則有餘者非其人不以任是職也自章聖咸平中楊億首言文昌㑹府宜復其舊是時李公沆實任端揆而未嘗有所更變仁祖至和中吳育亦言尚書天下之大有司當漸復之是時文潞公富鄭公皆在中書亦不聞有所改作誠知祖宗立法自有深意也自熙寧中王安石用事而元豐初王圭蔡確繼之悉取百年成法自宋初至元豐三年正得百二十年更而張之於是六尚書二十四司與夫九寺五監皆復其舊一時之名亦甚正矣奈何其名既詳而其實則不可遍察也當是時以左右僕射而兼中書門下之職者圭與確也相臣如是他可知矣是時章子厚除門下侍郎蒲宗孟除尚書丞安燾為戶部尚書曽孝寬為吏部尚書遂使奸邪朋附充塞朝路元祐諸賢雖出力以障其瀾而紹聖政和羣小章子厚曽布蔡京又從而撤其防矣然則務名務實其得失相去乃爾相逺耶官制舊典論曰宋朝沿唐制設官假名以任職責之事功以實不以文故以三省六曹寺監官僚之名分品定祿命充職任自太子洗馬而上號朝臣自著作佐郎以下號京官在內為主判出外名奉使其領在京職任則不分京朝官若升擢為臺諫經筵必備顧問朝臣領外差遣則是帶省曹寺監官僚之名奉使而出上至牧守監司下至倅宰管庫通以奉使目之推進擢新進之士官未升朝者即以太子中允處有出身人中舍處無出身人並任監司重其持節故也亦名借補計嵗月以轉行故流品無雜名位知重矣元豐改制因唐六典神祖晚年喜觀唐六典於是悉易祖宗舊制而惟六典是法其大者建立三省以中書造命行無法式事門下審覆行有法式事尚書奉行而政柄悉歸中書又分班奏事各得其職所以分執政權而互相考察此改制正名之體統也奈何蔡確欲專中書之權遂白三省不建長官而以王圭為左僕射兼門下侍郎確為右僕射兼中書侍郎凡有除授圭不得預聞而確得以自專造命之權是審覆奉行之制已不行於當時矣吕公著進言三省當同班奏事分省治事司馬公光遺奏亦謂有此事則置此官不必依唐之六典分中書為三省蓋有見於確之自專也神祖是時已有悔改官制之意圭確復以省費正名為言於是莫之能行嗟夫小人託人主之公而行其私乘人主美意而逞其不善之心大抵若此是豈變制改法之所能防間哉惟靜以察其所安而後可爾厥後翟思奏言以為今天下之事其煩簡多寡蓋無異於未改制之前然昔以一官治之者今析而為四五昔以一吏而主之者今增而為六七故官愈多而吏愈衆祿愈廣而事愈煩每朝廷文移下尚書省又付吏部又下寺監又下所領庫務自下而逹上者亦然故不若專責省部則官省而吏少事簡而功速矣味思之言則知元豐改制適增冗官多事之弊而已夫何名正之有此翟思元祐三年奏也上距元豐五年才七年耳思又謂今有禮部又有太常有膳部又有光祿勳户部之有司農主客之有鴻臚駕部之有太僕庫部之有衛尉工部之有將作軍器水部之有都水監皆重疊置官例可减省觀此言則元豐官制與熙寧新法何異政和改宦官武臣之制宋朝盡釋節度兵權而寵以虛名不置殿中監而止曰都知押班元豐正名於此獨無所改作猶且知祖宗自有深意也政和中蔡京當國悉加都知押班以大夫之名曰知省事曰同知省事曰簽書省此按蔡龍圖舊典也止齊云京改都知為知省事副同知為同知押班為簽書以效樞府事人易走馬承受而為亷訪使凡節度觀察防禦團練並為正任非惟名器濫䙝而童貫得以專兵稔釁矣夫京之改武官制也實壬辰嵗也自是而至靖康丙午止十五年耳十五年之間女真已有窺伺河洛之志併吞夷夏之心彼方習勒戎馬戰陳之事而此乃紛更武官虛名大抵皆取唐之武散官階與漢魏以來武官之名而雜就焉何異大盜隱伏門屛而家相方率歌童舞女雅修擊刺之容乎興衰治亂莫係於人事如此猥歸之天數不可得矣愚又嘗因是而推原改制變法之由而有感焉熙寧壬子王安石之新法行此一變也元豐壬戍蔡確之官制行此再變也元祐初年方復祖宗之舊而紹聖甲戌章子厚重行熙豐之法此三變也崇觀宣政蔡京用事最久而紛亂法度非止一端此又其變之大者四變之餘靖康之禍作矣夫自熙寧壬子止於靖康丙午五十餘年之間而法度四變新法再行而終廢官制遂變而不復國有棼絲之擾民無一日之安禍胎於王安石吕惠卿長於蔡確章子厚成於蔡京王黼天下本無事庸人自擾之其斯之謂乎新舊官制宋初庶官只存空名元豐新制以階易官唐人之階二十九宋初之階十有五而元豐之階三十四而參錯二制而損益之也左右之制置於元祐紹聖罷之惟存其五而五者之名則定於大觀選人之制起於宋初崇寧七階已定其四而三者之名則更於政和此其建置之大凡也蓋國初懲藩鎮之弊朝官文臣出領外寄郎曹卿監皆為虛名特以是寓祿秩班位序而已而所典之事則别有職存也熙寧天子厲意更新制條例之司設檢正之官兵部軍器大理將作學官司農各已修置董正治官之屬舉矣而名猶未正也乃元豐之三年取唐六典而與羣臣講明之踰二年而法成本末次第歷歷條舉或正而治之或旁而治之或統而治之其為治備矣然議者猶慮其無甄别流品也故元祐為之分左右焉而議者猶慮其沮人為善也故紹聖罷之而存其五焉所以存者謂卿監以上則不可不分之也若乃文林儒林登仕將仕在唐有之宋初已有之元豐正名至承務而止選人之四等七資未暇釐正此崇寧所以必更其七而政和又定其四也歟雖然此特其制然也而其意之異同則有不可不論者且兩制以上不遷卿監舊法也而今也自朝請大夫直遷太中大夫此非有合於古歟少卿監以七十員為額舊法也而今也官至朝請大夫而止待朝議有闕則補此非有合於古歟合者固多矣而不合者亦不少也蓋祖宗舊制所以甄别流品者至為嚴密宰執侍從之遷為一等卿列館職之遷為一等進士為一等世賞雜流各為一等且進士等遷司諫一人及第并制科遷祠部進士出身遷屯田世賞遷虞部雜流遷水部夫司諫祠部屯田虞部今之一朝奉郎也而甄别若此今有之乎六曹侍郎其遷不等侍從臣寮自禮部遷户部户部遷吏部常調臣寮自工部遷刑部刑部遷兵部夫六曹侍郎今之一正議大夫也而甄别若此今有之乎舊制前行郎中進士則遷太常少卿非進士則遷司農衛尉少卿由司農衛尉少卿入光祿少卿今以一朝議該之是十二年之官一遷即為之矣舊制六部尚書侍從則歷禮部户部吏部常調則自工而刑自刑而兵纍而至吏部今以一銀青光祿該之是十二年之官八年俱歷之矣昔之流品甄别今之流品混淆昔之官品難於進今之官品易於高流品有品則人安其分而無僥幸希覬之心官品不輕則名器加重而天下知所趍向今則反是嗚呼安得如丁隲者而與之語祖宗之制哉安得如畢仲舒者而與之論祖宗之制哉省冗官言冗官之策於今日者將省其職乎抑省其員乎抑省其入仕之人乎元祐之减罷諸司建炎之罷並官屬此省其職也祥符之樞密直學士以六員為式治平之少卿監以七十員為額此省其員也開寶之罷流外慶厯之减任子此省其入仕之人也以翟思之奏考之禮部有侍郎郎中員外祠部亦置郎中而太常又有少卿博士丞簿其實皆禮官也户部之有司農主客之有鴻臚庫部有太僕衛尉工部水部有三監卒皆重復置官翟思之言於哲宗如此至于今日又可知也又况祖宗時大縣置丞小縣不置今之縣不置丞者鮮矣大郡具僚屬小郡不具今之郡不具僚屬者鮮矣職之冗也如此其可不省乎以蘇子由之序考之節度視皇祐八倍防禦視皇祐十倍大夫七倍景德朝奉郎六倍景德承議奉議郎三倍景德子由之言於哲宗也如此至于今日又可知也又况祖宗朝未始有添差也而今也有添差而再任者有添差而釐務者祖宗之時未嘗有借補也而今也借補小使臣或至三五十萬員之冗也如此其可不省之乎嗟夫是固可省也而亦不易省也方今入仕之路廣得仕之員狹紆朱滿路襲紫成林率一官而三四人共之居者一人去者一人而伺之者又不止一人以今之職以今之員猶懼其無以處之也况又可省乎哉盍亦清其入仕之源乎上官均有言今之文職入流者凡四武職入流者凡三進士武舉得之也艱在所不論而四者之冗有可罷者有可裁抑者四者之外又有攝官焉夫攝官之濫特止一方鬻爵之舉隨創則隨罷在今日亦不必深講也如資䕃如特科如雜流此皆蠧弊之根冗者其可不加之察乎建隆初禮部稱齊郎裁十五人兵部補洗馬裁十二人至於慶厯則有任學士二十年而出京官二十人者矣未離襁褓已紆簮紱彼烏知國政民事為如何哉嘉祐推恩裁數十人治平三百人熙寧之六年乃至四五百人日暮途逺求田問舍之不暇何暇謀國家事哉有司胥吏主行文書積勤纍日例該祿仕至於三省人吏尤為優幸或以减年而出官或坐理資任而至郡守玩弄文法奸巧百端又豈能盡易昔之故態哉三冗未除百蠧隨至譬如决水於不流之澤前者未去後者方增不至於决堤决防不止不自其流而疏之浚之决之注之亦終於不可為也已權行守試漢人守試之法滿嵗稱職者為真不稱者歸本官亦良法也元豐之制高一品為行下一品為守下一品為試品同則否元祐以來行守試之外又有所謂權者所以待資淺之人也夫階尊官卑者為行階卑官尊者為守官與階卑為行不守若是足矣而守之下有試焉試之下有權焉崇寧盡復元豐之法去權而用行守試至于中興而後元豐元祐之法並用矣羣書考索續集卷二十九
