body:
  text: 羣書考索後集卷二十五宋章如愚編官制門官兵士風田賦刑法厯法法久而必弊天下必然之勢也弊久而必變人主更新之治也昔者聖人作易論黃帝堯舜之治而乃歸之於通其變使民不倦夫當纍聖相承之日而聖人通變之說乃或出於其間是豈所以為繼承之訓哉蓋自古人之治天下有繼承之規有因仍之弊故守繼承之規者固不可有輕變之心處因仍之弊者則不可無通變之道官之日以冗也兵之日以衆也士風之日以浮薄也田賦之日以重也刑法或不能以勝人之情僞也厯法或不能以合乎天象也是皆治道之大綱國體之所重而人主實維持而運轉之其可坐視其弊而不思所以變而通之者乎聖人於易丁寧其說曰化而裁之存乎變推而行之存乎通正欲天下萬世通行而無弊也愚嘗歎是說之不明於世也久矣漢之官以三公分掌九卿而侍御史分制守相然有事則御史下相國相國下諸侯王御史中執法下郡國制官非不善也至於後世增置加官而近臣盛入財為郎而郎選衰置刺史建水衡郡國出鹽多者置鹽官有工多者置工官故漢之官日趨于弊漢之兵京師則有南北軍郡國有材官騎士民年二十則傅于籍而嵗及立秋則嚴兵法之𨽻制兵非不善也至於後世內增七校外置樓船城門則有兵六郡則有良家子隴西北地則有戍卒而調發之數及於七科謫故漢之兵日滋於弊詣丞相府書行義年詔下郡國孝亷具舉其取士之法可知也至其弊也上書自鬻者日以千數而功令擇士顧乃誘以利祿士風烏得而如古十五稅一視古為輕租稅之減或及其半其田賦之法可知也至其弊也假民之田者則有稻田使者掌其賦池苑之所田則有水衡都尉以掌其入田賦烏得而復古自三章而九章禁罔踈濶而民重犯法不為不要矣及張湯趙禹之流更法定令奏報録囚殆不可以數計見知故縱之法出而人始不得以安其生矣刑於是而又弊自顓帝至于太初以律起數而得九九之數不為不精矣及四分厯行而其名乃出於圗䜟至乾象厯雖鄭𤣥以為精密而或者以為減斗分太過厯於是而又弊夫以六者之弊漢家皆不免而竟未有起而振之而使之無弊此更新之治所以不復見於漢也唐之官以三省長官為宰相臺省寺監上下相承中書造命門下審覆尚書奉行制官非不善也至於後世斜封墨敕其濫為甚諸使之名紛然四出督賦稅則以租庸為之使急財用則以鹽鐵為之使故唐之官日趨於弊唐之兵番上諸府而𨽻於諸衛折衝果毅以季冬防團火隊等級相統無事則耕於野有事則命以出兵解輒罷置兵非不善也至於後世當役更代多不以時所謂侍官委假充役州縣調發壯勇而富者以財免貧者雖老弱亦不得而逃故唐之兵日趨於弊由學館者曰生徒由鄉貢者曰貢舉至於制舉則天子自詔其取士之法可知也至其弊也明經者但記帖括進士者皆誦當代之文而不通經史士風烏得而如古以口分世業授之田以租庸調制其賦其田賦之法可知也至其弊也兩稅之法乃定於大厯科率最多之嵗而其後折納和市之法開至比大厯又再倍焉田賦安得而復古自武德之十二條而貞觀遂定之以律令格式條目森列不為不審矣及周興來俊臣之徒日以嚴酷從事至其後如所謂開元格後敕者大抵繁冗而吏反夤緣而為姦此豈非刑之弊乎自武德戊寅厯至於大衍以易起數而本於天地之二中不為不精矣至元和觀象厯則無蔀章之法而測驗不合邊圉崇元厯雖號善算而乃用簡捷超徑之術無復古法矣此豈非厯之弊乎夫以六者之弊唐皆不免未有能振而起之使之無弊者此更新之治所以不復見於唐也請以周明之周之成王亦繼承之主也當纍聖相承之後方且定都中土以肇新其治以言其官則董正治官設官分職舉天下之事率屬於三百六十之中故官不冗而事以舉以言其兵則師旅伍旅兩定於司徒四時教戰掌之司馬故兵不冗而國以強於族師書孝弟睦姻於黨正書德行道藝於鄉大夫三年大比則舉賔興之典以作天下之士而士風日盛司徒掌任地之法載師掌近郊之賦而九賦九貢則冢宰又總統之以均天下之財而田賦日輕司冦有議親議功之法士師有五禁五戒之辨至於布憲以憲邦之刑禁宣布于四方則其於刑也何患乎略馮相之辨四時之叙保章之志日月星辰至於太史則正嵗年以序事頒告朔于邦國則其於厯也何患乎差舉是數者皆舉而更新之此所以能覲文王之耿光揚武王之大烈也大抵繼成之治初非茍安於因循變通之義初非有戾於遵守自後世執繼承之說而不深明聖人變通之義此所以處天下之積弊而常患其多弊也愚以為天下之弊不足慮也於繼成之初而一掃天下之積弊而更新之是乃聖治又新之日也王氏通曰通其變天下無弊法湯之盤銘曰日日新愚敢以是為今日獻監司古者五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯故冢宰施典于邦國則必首之以設其牧職方氏邦國小大之相維則必始之以王設其牧此則古之監司也秦罷封建而置郡縣有御史以監諸郡漢刺史無常員時遣丞相史分刺諸州黜陟賢否斷理寃罪武帝始置十三部刺史秩六百石專以六條察二千石郡守秩二千石而部刺史為之監臨秩不過六百石其秩卑其權重故能激昂而自奮也朱博為冀州刺史行部不察黃綬吏民有言縣丞尉者令各詣郡何武為揚州刺史所舉奏二千石長吏必先露章服罪為虧除免之而已是二者可謂得刺史之體至於鮑宣舉措煩苛代二千石署吏聽訟所察過詔條則勢逼郡國侵預其事矣成帝時何武翟方進奏刺史位下大夫而臨二千石輕重不準乃更為州牧秩真二千石哀帝復為刺史元夀復牧後漢光武復置十二州刺史其一則屬于司𨽻校尉舊制州牧奏二千石長吏事皆先下三公三公遣掾吏按驗然後黜退光武重刺史之權故不復委三府按驗矣李膺為青州刺史守令畏威賈琮為冀州刺史百城聞風振竦唐分為十道置巡察使其後改為按察使姚崇在開元時云今擇十使猶患未得人亦可見其遴選矣慶厯初仁宗開天章閣俾二三元老條陳當世之務而富公弼范仲淹請二府通選按察使為對於是張溫之王素沈邈分道按察黜陟幽明而政令一新范祖禹曰祖宗剗削藩鎮收鄉長鎮將之權悉歸於縣收縣之權悉歸於州收州之權悉歸於監司收監司之權悉歸於朝廷上下相維輕重相制民自徒罪以上吏自罰金以上皆出於天子守令古者分土為三公侯百里伯七十里子男五十里各治其國之民而縣有縣正各掌其縣之政令而賞罰之自秦罷侯置守而守之名立漢萬户以上為令而令之制詳文景之時河南守吳公蜀守文翁之屬皆謹身率先居以亷平孝武時董仲舒兒寬公孫𢎞居官可紀孝宣拜刺吏守相輒親見問常稱曰庶民所以安其田里而政平訟理與我共此者其惟良二千石乎以為太守吏民之本也數變易則下不安故二千石有治理效輒以璽書勉勵增秩賜金公侯闕選諸所表以次用之是以漢世良吏於是為盛若趙廣漢韓延夀尹翁歸之屬皆稱其位召信臣之守南陽朱邑之守渤海皆以治行第一稱魏相以茂陵令最而遷刺史焦延夀以小黃令最而被增秩西漢之守令何如哉光武以細書賜方國自臨宰邦邑者競能其官杜詩之守南陽則有杜母之號郭伋之守潁川則有賢太守之名以至卓茂之為密令而教化盛行王煥之令洛陽而寬猛得宜東漢之守令何如哉唐太宗嘗曰永惟治人之本莫重刺史故録刺史於屏風又詔內外官五品以上舉任縣令於是官得其人𤣥宗開元時復詔三省侍郎闕擇嘗任刺史者郎官闕擇常任縣令者張九齡言於𤣥宗亦曰不歷刺史不得任侍郎不歷縣令不得任臺郎給事是以賈頥之在冀州鄭德之在瀛州薛文鼎之在滄州皆有治理行故時號為河北三刺史賈實之令饒陽則政尚清淨張允濟之令武陽則孜孜於愛民何易于之令益昌則以俸入而代輸賦唐之守令何如哉慶厯初天子鋭意致治而富公弼范仲淹首以守宰不職請二府通選按察使為對切考轉運之職置於開寶提㸃刑獄之司置於淳化至于嘉祐而轉運復分運判之目熙寧更新治具增置提舉常平之官彼皆使者也茍監司得其人則守令之不稱其職無有也昔范公祖禹作唐鑑因姚崇擇十使之事而有及於守宰監司之弊而其說曰十使者擇刺史縣令而置之則君不勞而天下治冗官周建六官屬各六十總之為三百六十焉其間如掌葛掌茶之屬說者則以為必兼官無事則未必置也行司馬輿司馬之屬說者以為非專官臨事而後置也至於冢宰嵗終之詔廢置又有所廢者焉司士之嵗登下其損益之數則又有所謂損者焉夫以三百六十之職以待天下之才而其中又為之省約曽又如此則天下之官安得而冗漢初建官以三公統九卿以丞相史分刺郡國衛將軍屯或至詔罷即問决獄或責之廷尉是以量吏祿度官用以賦於民而嵗漕關中粟以給中都官初未見其冗也自武帝以好大喜功之心承文景積纍之餘故治財之官既有大司農矣而又有水衡都尉焉既有少府矣而郡國又置鹽鐵之官焉治兵之官既有衛尉矣而羽林期門復置焉既有中尉矣而越騎胡校尉復置焉廷尉之外又有京師三十六獄則治獄之吏冗刺史之外又有繡衣直指之使則分刺之官冗光武中興於是為之減省吏員併縣置四百餘吏十置其二能禁錢而去水衡併七校而罷都尉三十六苑止置一苑黎陽五營止存一營漢世冗官之弊於是而遂革唐初太宗省內外官制為七百三十員曰吾以此待天下賢才足矣故三省而下繼以六部六部而次繼以九寺臺有御史而獨司糾察監有八監而互以相繼是以唐世號為簡易之法官不冗而祿易給初未見其冗也自中睿而後斜封墨敕之弊分散四出而車載斗量之譏日以滋甚加以開元天寶之間兵興多事於是靡然無度水陸則有使矣而租庸又置使焉度支既有使矣而鹽鐵又置使焉木炭則又使青苗則又使羣牧置使而太僕之職冗户口置使而户部之職冗李吉甫以為內外官仰俸廪者無慮萬員財日寡而受祿多官有限而調無數於是減省冗官凡八百矣李德裕之相武宗亦以為省官不如省吏於是請罷郡縣吏凡三千餘員唐世冗官之弊於是而遂革蘇軾以為近世以來吏多而闕少率一官而三人共之居者一人去者一人而伺之者又一人久任古者設官分職以為民極官府六屬屬各六十天官之掌邦治地官之掌邦教而治教不相紊也宗伯之掌邦禮司馬之掌邦政而禮政不相亂也司寇之掌邦刑司空之掌邦事而刑之與事又各有職也其掌之也專其任之也久故三百六十之職皆終其身而不易其事是以嵗終各正其治受其會三嵗則大計群吏之治夫然後可以責其成也漢之任官猶有古意吏居官者或長子孫以官為氏其二千石長吏亦安官樂職莫有茍且之意如夏侯嬰自髙祖時為太僕至文帝世不易其職張釋之十年不更其任于定國為廷尉凡十八年外而郡守有治理效則璽書褒美增秩賜金不以輕易有為京兆尹九年如張敞有為刺史五年如何武有為郡太守八年如黃霸此所以治效可觀也晉宋以來元嘉之政守宰以六朞為任及後世乃有三年不滿之制而古意失矣自唐以資格任人而士懷茍且之習州牧更易或一二嵗或三五月則盧懷慎言之以亟去之官臨茍且之民則陳祥道實論之宋朝任官不肯輕易李漢超守關南則十七年郭進在山西十二年然猶曰將帥之任用者然也及魏不一之典作坊亦十餘載不易故器械精辨劉溫叟之為御史中丞亦二十年而不改故以方正顯名以至陳恕之任三司使十七年陳堯佐之為太常丞亦十三年皆祖宗任用之要術也昔司馬溫公論至治之要亦以為人之才性各有所宜而官之職業各有所守唐虞命官各守一職終身不易而荆國王文公亦謂方今用人今日使治財明日使典獄已而又使典禮夫以一人之身而責之以百官所為備宜其人才之難為也爵祿周冢宰以八柄詔王馭羣臣有曰爵以馭其貴祿以馭其富司士掌羣臣之版而曰以德詔爵以功詔祿載師之職有士田賞田而卿大夫之采邑則有大都小都之田任官然後爵之位定然後祿之外而公侯伯子男則有九命五命之制內而公卿大夫則有四命八命之别是古人未嘗以妄授也自春秋之時吳越之君僭號於中國而古人列爵之意遂亂戰國之時諸侯惡其害己而皆去其籍故司祿之職遂闕今其遺制僅見於王制孟子之書自公一位而至於子男同一位者皆爵也自君十卿祿而至於下士在官者之祿皆祿也秦置二十等爵自公士以上至於列侯以比古之卿大夫士漢初因之如樊噲以舍人有斬首之功賜爵大夫已而列大夫增而至於賜食邑夏侯嬰以太僕常奉車有降敵之功賜爵五大夫已而至執帛增而至食邑其一職一戺截有紀序間有超遷越轉則出於上之特恩至武帝時又有武功爵自造士而至於千牛而至於軍衛用以賞軍功爾若夫封侯之爵則有二等同姓而封者謂之諸侯王異姓而以功封者謂之徹侯大者不過萬家小者五六百户此其略也自三公而下至百石吏祿亦各有差其見於百官表之注皆以榖計也至於所謂丞相大將軍俸錢月止亦六萬是漢祿益多而錢少貢禹為諫議大夫秩八百石而俸錢月止九千二百蓋寬饒擢為司𨽻校尉俸錢月數千當時號為祿厚加之節臘有賜士大夫足以養亷而無冒恥干祿之態惟小官卑秩稍祿既薄而賞賜不及焉則不能以自奉此東方朔所以借侏儒而諷上也宣帝憫小吏之勤事於是益百石以下俸十五自是小吏稍優光武中興其千石以上減於西京舊制二百石以下不改西京舊秩是光武之減吏祿未嘗減小吏之俸也唐之封爵凡有九等掌於司封自子男而上至於王給祿之制視其品數方貞觀時從褚遂良之言罷公廨捉錢令史而本府仍給月俸所以養其亷也其後定制京諸司則有公廨田諸州則有職田亦各有差至於月俸之制常衮嘗為裁限李泌又量其間劇而請增之此唐之大略也宋朝懲藩鎮之弊而封爵之制寄之虛名太祖始定添支之制太宗增實俸之給咸平定職田之制嘉祐定祿令之格元豐改官制以唐文階易省部寺監官歸釐本職號階官為寄祿官而食其俸以領內外任使削憲銜留勳十二轉此亦得古人制爵祿之意也賞罰周之八柄有豫以馭其幸誅以馭其過而內史詔王亦曰豫曰奪司勳掌六卿之賞地以等其功士師之職以五戒先後刑罰冡宰嵗終則令百官府致事而詔王廢置三嵗則大計群吏而誅賞之此古人賞罰之大略也春秋之時賞罰之權不明於上而夫子特以是而寄之春秋之書戰國齊威王猶能用其權其烹阿也非惟及於大夫而又及於左右之嘗譽者其封墨也非止於大夫而又及於左右之嘗毁者此其所以公也秦誅名而不責實為善者未必賞而犯惡者未必刑見於公孫𢎞之䇿漢髙祖不以舊怨而封雍齒不以私恩而靳丁公此亦有公天下之意宣帝勵精為治信賞必罰見於詔令者有曰有功不賞有罪不誅雖堯舜不能化天下然而趙蓋韓楊之誅罰非所當罰王成僞增户口之賞賞非所當賞諸葛亮在蜀盡忠益時者雖讎必賞犯法怠慢者雖親必罰善無微而不賞惡無纎而不罰此所以號為治國也唐太宗誅封德彛以明天下之義用魏鄭公而忘平日之讎裴寂貨賂公行雖故舊亦行貶斥蕭瑀劾李靖之過而乃録其功而賞之故嘗謂房𤣥齡曰有功則賞有罪則刑誰敢不竭心盡力以修職業然以䜟言而誅李君羡以譖言而殺劉洎以外戚而封長孫無忌以受賂而賜長孫順德不能盡出於公故魏徴有曰刑賞之本在於勸善而懲惡天子所與天下畫一不以親疏貴賤而輕重也今之刑賞或由喜怒或出好惡者正謂是爾太祖創業之初王仁贍以下蜀而輒開府庫不免責降曹彬平江南而清謹亷潔遂蒙升擢節鉞之除未嘗輕以賞將帥而三班殿直妄訴邀賞則即日誅之銓選古者鄉大夫舉賢能而賔其禮司徒教三物而興諸學司馬辨官材以定其論太宰詔廢置而持其柄內史贊與奪而二於中司士掌群臣之版嵗登下其損益之數此皆古之法也漢以郡縣守相之髙第者然後為二千石二千石之有治行者然後為九卿九卿之稱職者然後為御史大夫然張釋之十年不得調揚雄三世不徙官至有太僕立功自髙及文猶未離乎舊職賈誼超遷嵗中至太中大夫公孫𢎞徒步數年至宰相封侯未始有資格之拘成帝建始四年始置常侍曹尚書一人主公卿二千石曹尚書一人掌郡國而選曹之制遂始於此光武改常侍曹為吏部曹而專主選舉所用者必加嵗月先後之次而尚書從而簡試之此光武之法也其後簡試之法壞而復變惟毛玠之典選其所進用皆清正之士雖時有盛名而行不由本者終莫得進於是而有名於魏山濤之典選每一官闕輒擇才資可為者擬數人甄拔人物各為題目而奏之故於是而有名於晉後魏崔亮奏為格制不問士之賢愚專以停解日月為斷而魏之失人自崔亮始唐文選則吏部主之武選則兵部主之皆為三銓之法在尚書則典其一在侍郎則分其二其擇人之法有四曰身曰言曰書曰判四者皆在所可取則以德行先之德均則以才才均則以勞其得者為留不得者為放自五品以上則不試于選自六品以下始集而試觀其書判已試而銓察其身言己銓而注詢其便利己注而唱則以類而聫其名先簡于僕射而乃上于門下給事中讀之黃門侍郎省之侍中審之不審者則駁其非既審者則以聞自是而外又有所謂小選南選東選之名而所以擇之法則一也自裴行儉設長名榜引銓注法復定升降之等而銓法始變張仁偉造姓厯改狀樣銓厯之式而銓法遂密裴光庭作循資格而賢愚一槩而銓法遂變姚崇宋璟患斜封墨敕之濫也乃合三銓而通掌之於是有通銓之事宇文融患吏部選舉之不公也欲精其選而分掌之於是有十銓之名其後楊國忠以右相而兼吏部悉唱注於都堂以誇神速而門下過官三銓注官之法遂一旦而盡廢此法之所以壞也宋朝太祖文武常參官非有勞未嘗進秩考滿叙遷之法稍不復舉是時典選之職自分為四文選曰審官東院曰流內銓武選曰審官西院曰流外銓元豐定制以審官東院為尚書左選流內銓為侍郎左選審官西院為尚書右選三班院為侍郎右選於是吏部有四選之法諫諍古者諫無常員知無不言故益虞官也而戒舜曰罔失法度罔遊于逸臯陶士官也而戒舜曰元首叢脞哉股肱墮哉三代之時官師相規工執藝事以諫太僕之命亦曰繩愆糾謬格其非心師氐以媺詔王保氏之掌諫王惡司諫之考鄉里之治內史之詔王聽治皆諫官也秦人惡天下之議已思有以遏絶其路故置諫大夫之官而言路始狹漢髙祖好謀能聽從諫如流酈生之諫輟洗聽之子房之謀吐哺聽之躡足之諫隨即聽納排闥之諌笈以優容孝文止輦受言而郎官得以進諌袁盎卻坐而宫闈亦不忘於納諫武帝聞汲黯戇直之言而不以為怒聞吾丘夀王上林之諫而不以為過徐樂嚴安以布衣而諫伐胸奴而不次除擢東方朔以詼諧而諷諫左右而未嘗譴斥然狄山以諫用兵而見棄顔異以腹誹而見誅則聽諫果何如耶唐太宗詔諫官隨中書門下及三品入閣而又導人使諫每群臣奏事則必假以辭色張𤣥素之諫營繕則嘆賞而加賜李大亮之諫求鷹則賜詔而褒美魏徵之諫通西域則從之王圭溫彥博之諫責祖孝恭則又從之然而皇甫德參之諫未免於譴怒禇遂良髙麗之諫竟棄之而不納搖指書空之意停昏仆碑之事乃於末年見之德宗詔延英坐曰許百司長官巡對若好諫者然姜公輔一言忤㫖則反疑其賣已陸贄之忠誠論諫數十百篇而輒棄之於患難已平之後故貞元之十八年史臣書之於紀者曰罷正衙奏事而元稹奏疏於元和之初亦曰近年以來正衙不奏事庶官罷巡對而諫路自是塞矣宋朝諫官以左右分𨽻兩省中書同為一區正欲於造命之地彌縫其闕雍熙中置左右司諫慶厯中增置諫官四員太宗時冦準奏事力爭手攬御衣欲决其事仁宗歐蔡余王論事無所避而俱賜章服考課成周時冢宰既受百官府之會聽其致事而詔王廢置三嵗則大計羣吏之治而誅賞之矣而司徒則又自考其屬正要會而致事司冦則又命於其屬入會乃致事下至宫正則會其行事而自考其一職之所統內宰則稽其功事而自考其一職之所統雖醫事之微而醫師亦於嵗終稽其醫事此各考於其所屬也上下遞察而冢宰實提其大綱至於會計之煩則又專設司會一職以察之司會之職曰以逆羣吏之治而聽其會計以參互考日成以月要考月成以嵗會考嵗成以周知四國之治以詔王及冢宰廢置此可見成周之時各考於一職之長既考於一職之長而後考於一官之長考於一官之長始盡考於司會而後達於冢宰歟各考其屬於下則寡而難欺提其綱於上則簡而易見而又總考於司會則精詳而遍察而可以防其隱蔽也漢考課猶有古意郡守辟除守長得自課第刺史得課郡國守相而丞相御史得雜考郡國之計書至天子則受丞相之要以史考之王尊為郡决曹太守察尊亷補鹽官長是令長之職多郡守自辟置也茂陵令蕭育為漆令請扶風恕曰君課第六裁自脫何暇為左右言是令長之職守相得自課第也刺史巡行所部郡國考課最嵗盡詣京師奏事是刺史得課守相也谷永薦鮑宣曰左馮翊宣考課功績簡在兩府則御史得雜考郡國明矣丙吉曰殺傷橫道京兆尹職當禁止嵗竟丞相課其殿最奏行賞罰而已觀課殿最之言則丞相雜考郡國之計書明矣觀奏行賞罰之言則天子受丞相之要又明矣然漢之課吏皆每事而考韓延夀為東郡决獄為天下最此刑獄課也尹翁歸守右扶風盜賊課常為三輔最此盜賊課也兒寬為內史租稅不入當免後民爭輸租而課利以最此租稅課也後志注曰令長嵗盡計縣户口墾田錢榖盜賊上其簿於郡課校其功則户口墾田錢榖亦各有課也雖然張蒼明習天下圗書計籍髙祖令以列侯居相國領主郡國上計為計相其後計相之職不置併掌於丞相故石慶見詰於武帝曰今流民愈多計文不改君其繩責長吏宣帝黃龍之詔曰上計簿具文而已務為欺謾以避其課三公不以為意朕將何賴則郡國上計實主於丞相而漢之責宰相以課吏不為不嚴矣然而膠東僞增流民户口至于萬餘而守相王成反蒙褒賞臨淮郡國界誤至減田四百頃而匡衡自領計簿不能正則漢之上計雖役役於簿書期會而未免於具文也循吏太史公循吏序曰法令所以導民也刑罰所以禁姦也文武不備良民懼然身修者官未嘗亂也奉職循理亦可以為治何必威嚴哉故所紀者如孫叔敖以楚民之不便於更幣出一言而郢市復子産之在鄭班白不提挈道不拾遺公儀休之拔葵石奢之不敢廢法李離之不敢傅罪下吏止數人而已漢興之初反夫秦之敝與民休息凡事簡易禁網疏濶而蕭曹以寬厚清淨為天下帥民作畫一之歌孝惠垂拱髙后女主不出房闥而天下晏然民務稼穡衣食滋殖至于文景遂移風易俗是時循吏如河南守吳公蜀守文公之屬皆謹身率先居以亷平不至於嚴而民從化孝武之世外攘四夷內用法度民用雕敝姦宄不禁時少能以化治稱者惟江都相董仲舒內史公孫𢎞兒寬居官可紀三人皆儒者通於世務明習文法以經術潤飾吏事天子器之仲舒數謝病去𢎞寬至三公孝武幼冲霍光秉政承奢侈師旅之後海內虛耗光因循守職無所改作至於始元元鳳之間胸奴鄉化百姓益富舉賢良文學問民所疾苦於是罷酒𣙜而議鹽鐵矣及至孝宣繇側陋而登至尊知民事之艱難自霍光之後始躬萬幾勵精為治五日一聽事自丞相已下各奉職而進及拜刺史守相輒親見問觀其所繇退而考察所行以質其言有名實不相應必知其所以然常稱曰庶民所以安其田里而忘歎息愁恨之心者政平訟理也與我共此者其惟良二千石乎以為太守吏民之本也數變易則下不安民知其將久不可欺罔乃服從其教化故二千石有治理效輒以璽書勉勵增秩賜金或爵至關內侯公卿缺則選諸所表以次用之是故漢世良吏於是為盛稱中興焉若趙廣漢韓延夀尹翁歸嚴延年張敞之屬皆稱其位然任刑罰或抵罪誅王成黃霸朱邑龔遂鄭𢎞召信臣等所居民富所去見思生有榮號死見奉祀此凜凛焉庶幾德遜君子之遺風矣以傳考之如文翁之興學於蜀王成之有治聲於膠東黃霸之在潁川務耕桑而獨以寬和名朱邑之在桐鄉有遺愛於民龔遂之治渤海捕盜勸民農桑召信臣之為民興利通溝瀆以灌溉此皆西漢之循吏也光武長於民間頗達情僞見稼穡艱難百姓病害至天下已定務用安靜身衣大練色無重綵耳不聽鄭衛之音手不持珠玉之玩宮房無私愛左右無偏恩建武十三年異國有獻名馬者日行千里又進寶劒賈兼百金詔以馬駕鼙劔賜騎士損上林池禦之官廢騁望弋獵之事其以手迹賜方國者皆一札十行細書成文節約之風行於上下數引公卿郎將列于禁坐廣求民瘼觀納風謡故能內外匪懈百姓寬息自臨宰邦邑者競能其官若杜詩守南陽號為杜母任延錫光移變邊俗斯其績用之最章章者也然建武永平之間吏事刻深亟以謡言單辭轉易守長故朱浮數上諫書針切峻政鍾離意等亦規諷殷勤以長者為言而不能得也所以中興之美蓋未盡焉自章和以後其有善績者往往不絶如魯恭吳祐劉寬及潁川四長荀淑韓韶陳實鍾皓並以仁信篤誠使人不欺王堂陳寵委任賢良而職事自理王堂任陳蕃陳寵任王渙斯皆可以感物而行化也邊鳳延篤先後為京兆尹時人以比前世趙張又王煥任峻之為洛陽令明發姦伏吏端行止雖導德齊禮有所未充亦一時之良能也以史考之衛颯守桂陽而修庠序之教任延教越駱之民以嫁娶之禮王景之修汴渠秦彭之守山陽以禮訓人而不任刑罰王煥之令洛陽得寬猛之宜許荆守桂陽而使民知禮禁孟嘗辨上虞孝婦之寃第五琦之守張掖嵗飢開倉而不待上報劉矩以禮遜化雍丘之民劉寵之令山隂特選一錢之受仇覽謂鷹鸇之不如鸞鳳童恢之令不其而有呪虎之異此皆東漢之循吏也唐興擇用州刺吏縣令太宗嘗曰朕思天下事丙夜不安枕永惟治人之本莫重刺史故録姓名於屏風卧興對之得才否狀輒疏之下方以擬廢置又詔內外官五品以上舉任縣令者於是官得其人都督刺吏其職察州縣間遣使者循行天下劾舉不職始都督刺史皆天子臨軒冊受𤣥宗開元時復詔三省侍郎缺擇嘗任刺史者郎官缺擇嘗任縣令者至宰相名臣莫不孜孜言長人不可輕授亟易是以授受之間雖不能皆善而所得十五與漢相埓以史考之如韋仁夀髙祖時之治越巂人人安悅陳君賔太宗在鄧加意勞徠而儲倉充羡為政之善卓卓可稱以至賈敦實太宗之政清靜為常棣碑韋丹之憲宗教民耕織築堤扞江在江西李惠登明皇之在隋州興利除害暗與古合政自清淨田畝闢户口增盧明洪宣之政元和中自簡省張允濟貞觀時有路不拾遺之政薛大鼎開屯田浚無棣渠而有滂被之德韋京駿神龍中有教導之政何易于自挽舟而不肯妨民其令益昌也不奉植茶之詔而下户賦役或以俸代輸如此者班班可見此唐循吏之可見者也然序言循吏大抵稱太宗明皇之治考之於傳太宗之吏見名者不盈十而明皇則無有焉蓋新史循吏僅十五傳舊史良吏四十餘傳若倪若水之政尚清淨潘好禮之為政孜孜崔隱甫之人頌善政李清之稱為良吏去職有遺愛皆開元吏治也今於舊史有考而新史缺焉宋璟之在廣易茅茨而使有棟宇之利廣人於是有遺愛之頌則載於璟之傳初張九齡言於𤣥宗曰古者刺史入為三公郎官出宰百里欲治之本莫若重守令凡不厯都督刺史雖有髙第不得任侍郎不歷縣令雖有善政不得任臺郎給舍前漢循吏稱守不稱令豈以其職為甚輕耶考之班史可稱紀者非一若趙廣漢之在陽翟治行尤異焦延夀之令小黃三老上書願留王尊為虢令轉守槐里兼行美陽而以髙第見擢朱博為櫟陽令徙雲陽平陵三縣亦以髙第獲遷是以循良之治有足觀者而史不載之循吏至於義縱之作縣少溫籍尹賞之三輔髙第特其嚴毅之所致而非善治之可稱者乃備録于酷吏以時見其美何也文帝時郡縣皆循吏所以無循吏之名借曰吳公治平為天下第一傳無可紀之功班固止附於賈誼篇首而已至宣帝乃有循吏可稱才說循吏必有酷吏區列於其間西漢之有循吏止為宣帝而作東漢之循吏范曄為明帝而作户口有最則王成刑獄有最則張敞盜賊有最則尹翁歸租稅有最則兒寬漢初治三輔多取厚朴寬恕之人考百官表髙惠文景之世皆無顯顯可稱道者武帝初年石慶鄭當時猶為之最汲黯為右內史引大體不拘文法不以微文殺無知之民兒寬為左內史卑體下士務得人心與民相假貸及負租課殿當免民輸租稅不絶課更以最及武帝以後頗以刑法整齊臣下始引用義縱咸宣之徒使為左右內史於是謂郡牧守相倣而奸宄始不勝而繡衣之使始出沉命之法始行宣帝選用能吏如趙廣漢韓延夀尹翁歸之徒相繼守三輔向之浩穰之俗悉化為鬼魅矣宣帝初年王成在膠東時勞來不怠户口鼎盛自張敞以治膠東名不過盡力摧挫令民轉相捕斬而已向時黃霸在河南處議常法而吏民愛敬自嚴延年以治河南名不過會論府上流血數里而已所謂良吏無顯顯可竒之功黃霸之在潁川召信臣杜詩之在南陽賈敦頥之於洛所謂勸農桑以養民者也文翁之於蜀衛颯之於桂陽卓茂之於密所謂興教化以厚民者也龔遂之於渤海郭伋之於漁陽虞詡之於朝歌所謂除盜賊以安民者也薦舉舜命禹為司空而禹則遜之稷契臯陶命垂為共工而垂則遜於殳斨伯與益之遜於朱虎熊羆伯夷之遜于䕫龍與四嶽之薦鯀此皆古之薦舉也春秋時趙簡子貢賢不避讎祁奚之兩舉其子不以私而害公漢初薦士無定法韓信則蕭何薦之陳平則魏無知薦之賈誼則河南吳公薦之宰相薦士或起家至二千石甚者趙綰為御史大夫王臧為郎中令皆自田竇推轂之功武帝欲殺其權遂置加官出入內庭以薦導人物如司馬相如朱買臣主父偃之徒皆侍中之所薦而丞相遂不得薦士公孫𢎞雖開東閣而亦不聞薦士也光武詔三公至州牧舉茂才孝亷郡國守相未滿嵗不得薦舉則薦舉漸有法矣三國周瑜之薦魯肅吕蒙之薦陸遜各惟其才而後舉唐常何之薦馬周一聞其名而即日促詔婁師德之薦狄仁傑狄仁傑之薦張柬之張說之薦張九齡之為祕書裴度薦李德裕之才堪宰相裴垍不以故人之求舉而傷朝廷之至公德宗疑諸司所舉必親故而陸贄拳拳言之且欲請臺省長官各舉所屬此唐薦舉之大略也祖宗時於簿尉舉幕職於幕職舉京官皆親閲班簿擇舉主而任之而舉官初無常員也選人磨勘率一嵗僅數十人是薦舉無定數也仁宗時尤以選人遷官為重陳琪用薦者十餘人知其為龎籍之壻則抑之胡宗堯用薦者十餘人知其為胡宿之子則抑之漢薦舉之制河南守舉賈誼益州守舉王褒是郡守薦士也四府舉辛湯五府舉段會宗是公府薦士也暴勝之以直指薦雋不疑閻崇以執金吾薦龔勝何其薦士之寬也至於嚴延年舉獄吏贓不入已猶坐貶秩何武舉方正者槃辟失禮有司以為詭衆虛僞左遷蓋漢薦舉之路廣而同坐之法嚴也羣書考索後集卷二十五
