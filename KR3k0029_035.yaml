body:
  text: 羣書考索卷三十五宋章如愚撰禮門羣祀類后土書曰敢昭告於皇天后土大宗伯曰王大封則先告后土后土土神也大祝建邦國先告后土用牲幣后土社神月令中央其神后土后土顓頊之子孫兼為土官左氏曰共工氏有子曰勾龍為后土漢武帝祠后土於汾隂宣帝祠后土於河東而宋梁之時祀地皆謂之后土則古者亦命地示為后土矣然周禮有天示有地示又有后土則所謂后土者非地示也祭祀之禮周禮所謂夏日至於澤中方丘正祭也禱祀之屬非正祭也大宗伯以血祭社稷又曰大封則先告后土大祀大師大會同宜於社又曰建邦國先告后土則后土非社矣鄭氏釋大宗伯謂后土神也黎所食者釋月令謂后土黎也以太祝謂后土社神也既曰土神又曰社神是兩之也禮書表貉詩曰是類是禡爾雅曰是禡師祭也禮記禡於所征之地小宗伯凡王之會同軍旅甸役之禮祠𨽻儀為位肆師凡四時之大田獵祭表禡則為位漢書稱高祖祠黃帝蚩尤於沛庭管仲稱蚩尤作劔戟史記稱黃帝與蚩尤戰於版泉豈軍法之興始於此故後世祭之歟貉之祭蓋使有司為之而立表於陳前肆師為位甸祝掌祝號既事然後誓衆而師田焉周官所謂表禡誓民是也唐制禡祭為壇壝設瘞塪皇帝齋於行宫從官齋於軍幕置甲胄弓矢於神座之側建矟於神座之後而牲幣犧象皆有儀度然古人置於立表之處則無壇壝旅祭旅祭掌次王大旅上帝大旅上帝祭天於圜丘國有大故而祭亦曰旅此以旅見祀也大宗伯國有大故則旅上帝及四望典瑞四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望禮器一獻之禮不足以大旅大旅具矣不足以享帝書曰荆岐既旅蔡蒙旅平九山刋旅論語曰旅於泰山爾雅曰旅陳也陳禮書曰旅非常也國有大故然後旅其羣神而祭之則荆岐既旅蔡蒙旅平九山刋旅者以水災耳惟此則凡所遭大故則凶災之類也考之於禮天子所次之位則張氊案設皇邸所奠之圭則四圭有邸所用之版則金版職金旅上帝則金版旅諸侯亦如之周官或言大旅或言旅蓋故有小大而旅亦隨異也然大旅之禮不若祀天之為至也記曰大旅具矣不足以享帝若夫旅四望山川則所次不以氊案皇邸所用不以金版而所奠之圭則兩圭有邸而已類祭造祭書曰類于上帝詩曰是類是禡周禮小宗伯兆五帝於四郊四望四類亦如之四類日月星辰運行無常以氣類為之兆日於東郊兆月與風伯於西郊兆司中司命於南郊兆雨師於北郊凡天地之大災類社稷宗廟則為位禱祈祀輕類者依其正禮而為之肆師類造上帝則為位大祝六祈一曰類二曰造類上帝大會同造於廟詛祝掌類造之祝號記曰天子將出類於上帝造於廟則類者類其神而造之也造者即神而祭之也類之所施或於上帝或於日月星辰或於社稷或於宗廟類之所因或以巡守或以大師或以大災造則或於上帝或於祖廟凡此皆有所祈也不若大旅之有所告而已故大祝六祈有類造而無旅焉鄭康成以宗伯之四類為日月星辰蓋以四類在四郊四望之下而知之也爾雅以詩之是類是禡為師祭蓋以太祝太師類上帝而知之也社稷宗廟非大災則無類祭祭上帝非巡守之所至則無造祭書言至於岱宗柴詩言巡守告祭柴望此蓋造上帝之禮也巡守於其將出則類上帝於其所至則造上帝大師於其將出亦類上帝於其所至時禡於其所征之地而已昔武王伐紂既事而退柴於上帝成王營洛位成之之後用牲于郊牛二此蓋類禮也何則書於舜之既受命則類于上帝於湯之受命則告于上天是既事則必祭而祭必以類禮也於舜之既受命言類則湯之既受命而類可知既受命而類則師之既受邑之既成又可知也類造之禮其詳不可得而知要之劣於正祭既與旅也觀祀天旅上帝而大宗伯掌之類告上帝小宗伯肆師掌之則禮之隆殺著矣四類日月星辰於西郊則類上帝蓋南郊乎禮書山川黃帝祭于山川虞氏秩于山川遍于羣神周制四坎壇祭四方以血祭五嶽以貍沉祭山林川澤一歲凡四祭一者謂迎氣時二者郊天時三者大雩時四者大蠟皆因以祭之禮神之玉兩圭有邸五寸牲用少牢各隨方色用五獻祭皇及尸皆服毳冕樂奏姑洗歌南呂舞大韶以祀四望奏㽔賔歌函鍾舞大夏以祀山川其祭之嶽鎮則升血為始四瀆則沈血為始次薦籩豆為朝踐之獻也大宗伯亞獻亦以盎齊至薦熟王酌清酒以獻尸亞者以清酒所謂饌食之獻通前四獻也尸食訖王酌清酒以酌尸凡五獻也秦并天下令祠官所常奉名山川鬼神可得而序於是自崤以東名山大川祠曰太室嵩高也常山泰山會稽山湘山水曰濟曰淮自華以西名山七曰華山薄山襄山也嶽山岐山吳山鴻冡瀆山蜀山之嵎也名川四曰河祠臨晉沔祠漢中湫淵祠朝那江水祠蜀而四大冡鴻岐吳嶽昔有嘗禾以新旻祭之其河加有嘗醪此皆在雍州之域近天子都故加車一乘駵駒四灞滻澧潦涇渭長水皆大山川數以近咸陽盡得此山川祠而無諸加漢孝文十二年五穀不登詔增修山川羣祀武帝因巡守禮其名山大川後漢章帝元和二年詔祀山川百神應禮者後魏景穆帝立五嶽四瀆廟隋制祀四鎮東鎮沂山西鎮吳山南鎮會稽山北鎮醫無閭山在東夷中遙祀冀州鎮霍山並就山立祠唐武德貞觀之制五嶽四鎮四海四瀆年别一祭各以五郊迎氣日祭之書舜典望于山川遍于羣神詩般巡守祀四嶽河海也禮器晉人將有事於河必先有事於惡沱齊人將有事於泰山必先有事於配林公羊僖三十三年三望者何望祭也泰山河海山川有能潤於百里者天子祭之藉田周制天子孟春之月乃擇元辰親載耒耜置之車右帥公卿諸侯大夫躬耕藉田千畝於南郊冕而朱紘躬秉耒天子三推以事天地山川社稷先古以為醴酪粢盛於是乎取之內宰詔后帥六宫之人生穜稑之種以獻於王使後宫藏種而又生之甸師掌帥其屬而耕耨王藉以時入之漢文帝制曰農天下之本遂開藉田朕躬耕以給宗廟粢盛舊儀春始東耕于藉田官祠先農以一太牢百官皆從賜三輔二百里孝悌力田三老種百榖萬斛為立藉田倉置令丞榖皆以給天地宗廟羣神之祀以為粢盛景帝詔曰朕親耕為天下先昭帝幼即位耕於鉤盾弄田後漢明帝永平中二月東巡耕於下邳章帝元和中正月北巡耕於懷縣其藉田儀正月始耕常以乙日祠先農及耕於乙地晝漏上水初納執事告祠先農已享耕時有司請行事就耕位天子三公九卿諸侯百官以次耕推數如周法力田種各耰訖有司告事畢是月命郡國守皆勸人始耕魏氏天子親耕藉田藩鎮闕諸侯百官之禮晉武帝大始四年正月丁亥帝躬耕藉田于東郊詔曰近代以來耕藉田於數步之中空有慕古之名曽無供祀訓農之實而有百官車徒之費今循千畝之制當羣公卿士躬稼穡之艱難以帥先天下於東郊之南洛水之北帝御木輅以耕太牢祀先農自惠帝後禮廢矣東晉元年將修耕藉事竟不行宋文帝元嘉二十一年將親耕先立春九日司空大司農京尹令尉度宫之辰地八里之外整制千畝中開阡陌立先農於中阡西陌南御耕壇於中阡東陌北將耕宿青幕於耕壇之上皇后帥六宫之人出穜稑之種付藉田令耕日太祝令以一太牢祠先農如帝社儀孟春上辛後吉亥御乘耕根三蓋車駕蒼駟建青旗著通天冠青幘青衮佩蒼玉蕃王以下至六百石皆衣青唯三臺武衛不耕不改章服駕出如郊廟儀至藉田侍中跪奏至尊降車臨壇大司農跪奏先農已享請皇帝親耕太史贊曰皇帝三推三反於是羣臣以次耕王公及諸侯五推五反孤卿大夫七推七反士九推九反藉令率其屬耕竟畝灑種即耰禮畢乃班下州縣悉備其禮焉齊武帝永平中耕藉田用丁亥使御史乘馬車載耒耜從五輅後梁初依宋齊禮以正月用事不齋不祭天監十二年以啓蟄而耕藉百官御事並齋三日沐浴祼享侍中奉耒耜載於象輅以隨木輅之後普通二年又移藉田於建康北岸築兆域於南北郊則有親耕臺在壇東帝親耕畢登此臺以觀公卿之推反後魏大武帝天興三年春始躬耕藉田祭先農用羊一北齊藉於帝城東南千畝內種赤梁白穀大豆赤黍小豆黑穄麻子大麥小麥色别一頃自餘一頃地中通阡陌作祠壇於陌南阡西廣輪三十尺四陛三壇四門又為大營於外設御耕壇於阡東陌北每歲正月上辛後吉亥祠先農神農氏於壇上無配享祭訖親耕隋制於國南十四里啓夏門外置地千畝為壇行禮播植九穀納於神倉以擬粢盛穰藁以餉犧牲唐貞觀三年正月二十一日太宗親祭先農藉一千畝之甸太后改藉田壇為先農壇神龍初復改先農壇為帝社壇開元二十三年二月親祠神農於東郊勾芒配禮畢躬御耒耜親於千畝之甸時有司進儀注天子三推公卿九推庶人終畝玄宗欲重勸耕藉遂進耕五十餘步盡壠乃止耕畢輦還齋宫大赦侍耕執牛官皆加級賜帛其儀備開元禮雍熙四年九月內出御札曰朕嗣守大寶惟懷永圖發一言必念生靈嘗一膳必思稼穡雖燔柴告類紫壇屢薦於至誠而執耒親耕青輅未行於盛禮敦本之道不其闕歟三推宜舉於舊章百代永垂於信史以來年正月擇日有事於東郊行藉田之禮今所司詳定儀注以聞無至煩勞務遵典故次日太常禮院言按開寶通社藉田不置五使今請依南郊命使遂以宰臣李昉為大禮使陳王元僖為橋道頓遞使時尹開封翰林學士宋白為禮儀使賈黃中為鹵簿使御史中丞張宏為儀仗使命白黃中與學士蘇易簡同詳定儀注十月一日詳定所言按通典乘青輅推黛耜者所以順春氣其方位請在東郊又北齊祠壇高九尺廣輪三十六尺四陛三壝四門唐制高五尺周回四十步今請壇高九尺周回四十步飾以青又歷代增去京城逺近各異請於朝陽門外七里之外十五里之內擇地為壇又通禮不載告廟及禮畢稱賀之儀今緣國家盛禮望遣大臣前二日告昊天上帝大廟俟禮畢文武百寮詣行宫稱賀從之十日詳定所言按通禮儀注皇帝親載耒耜於車右隋禮儀志齊代藉田令御史乘馬車載耒耜於五輅之後又舊禮魏晉耕藉乘木輅令凖通禮皇帝乘耕根車請以象輅載耒耜列於仗內御前在皮軒車後所以明示重耕藉之禮從之十五日禮儀使言宋齊之制於先農臺東别立觀耕臺帝親耕畢登此臺以觀公卿推耕其臺不載制度請築高五尺周回四十步四出陛飾以青按唐開元二十三年藉田畢還宫大赦取進止從之乃候禮成肆赦二十一日詳定所言宋元嘉中親耕藉田千畝中開阡陌御耕位在先農壇東北唐禮不開阡陌設御耕位於先農壇南七步詳此即當時壇前不設樂埀則御耕歷代不同今既備樂垂二舞俱在壇前請定御耕位在壝門東南又依隋置青箱奉穜稑之種今請用九榖從之二十三日又言舊禮有庶人終畝之説即不載庶人耕位所在請於諸侯耕位之南退近東十步西向以成終畝之禮又按典禮先農壇用犢一近制中祠以羊豕代望權用犢以純色充禮料祭器權視大祠神農后稷竹册皇帝散齋三日致齋二日百官不受誓戒從之十一月又言享先農亞終獻請準近例以諸王充其享畢獻官並行耕禮七日又言準詔定乘耕根車而車元無副上下小大與金玉輅等緣天子所乘皆有副請改乘玉輅以耕根車改載耒耜十五日又言舊禮太尉司徒司空各一人舊例宰相攝與諸王並行五推禮九卿九人舊例以左右僕射六尚書御史大夫攝諸侯三人舊例以正員三品官及上將軍攝並行九推禮云云端拱元年乙亥上於東郊視饗先農以后稷配遂耕藉田始三推有司言禮畢上曰朕志在勸農恨不能終於千畝豈止以三推為限耕數十步侍臣固請乃止還御乾元門大赦改元民年七十以上有德行為鄉里所宗者賜爵一級仁宗明道二年二月九日帝齋於天安殿翊日昧爽祀神農后稷於壇禮畢就耕位侍中奉耒進御帝搢圭秉耒三推張士遜奏禮畢帝曰願推終畝士遜復奏王有三推禮書舊式帝曰朕志在千畝卿等固請遂耕十有二跬御正陽門肆赦詔呂夷簡等編藉田記祭親蠶內宰中春詔后帥外內命婦始祭於北郊以為祭服禮天官北郊婦人以純隂為尊郊必有公桑蠶室焉上文注季春天子薦鞠衣于先帝具曲植蘧筐后妃齋戒親東鄉躬桑禁婦女毋觀省婦使以勸蠶事蠶事既登分繭稱絲效功以共郊廟之服無有敢惰記月令孟夏蠶事畢后妃獻繭乃收繭稅以桑為均貴賤長幼如一以給郊廟之服同上古者天子諸侯必有公桑蠶室及大昕之朝君皮辨素積卜三宫之夫人世婦之吉者使入蠶於蠶室奉種浴于川桑于公桑風戾以食之古之獻繭夫人世婦之吉者使繅遂朱緑之玄黃之以為黼黻文章服既成君服以祀先公先王敬之至也祭義王后蠶于北郊以共純服夫人蠶于北郊以共冕服王后夫人非莫蠶也身致其誠信也同上詔皇后親桑以奉祭服其具禮儀前文帝紀詔后親桑以奉祭服為天下先明帝永平二年三月皇后帥公卿諸侯夫人蠶禮儀志祠先蠶禮以少牢漢舊儀曰春桑生而皇后親桑於苑中蠶室養蠶十薄以上祠以中牢羊豕祭蠶神曰苑窳婦人寓氏上文注魏文帝黃初七年正月命中宫蠶于北郊依周典也晉禮志正觀元年三月皇后親蠶唐太宗紀開元中上命宫中食蠶親自臨視欲使嬪御已下知女工之事及蠶罷獲絲甚多因以賜焉舊玄宗紀景德三年二月王欽若言古者王后親率嬪御以祀先蠶是以開寶通禮郊祀録並有親蠶祝辭又通禮義纂后親享先蠶貴妃為亞獻昭儀為終獻若攝事則尚宫初獻尚儀亞獻尚食終獻又周禮大宗伯后不與祭則攝而薦豆籩徹蓋薦徹豆籩王后之事而宗伯得攝之唐會要云農桑衣食萬人不宜獨闕先蠶之祭皇帝遣有司攝事可也臣以為屬之命婦未若歸於有司望詔有司參定其儀詔太常禮院檢討攝祭故事禮院言按開寶通禮季春吉已享先蠶於公桑有司攝事前享五日諸預享官散齋致齋享日設先蠶座於壇上北方南向云云又按唐會要云皇帝遣有司享先蠶如先農可也乃詔自今依先農例遣官攝事二月太常禮院言按周禮蠶於北郊以純隂也漢蠶於東郊以春桑生也魏依周典晉太康中蠶於西郊蓋與藉田對其方也又通典晉制先蠶壇高一丈方二丈四陛廣五尺北齊高五尺方二丈四陛陛各五尺隋置壇於宫北三里高四尺唐在長安宫北苑中髙四尺周回三十步今詳歷代沿革制度不同請約故事築於東郊從桑生之義其壇酌中用北齊之制設一壝二十五步如中祠禮例從之六宗類虞書曰禋于六宗周制祀昊天上帝大裘而冕祀五帝亦如之又云禋祀祀昊天上帝月令孟冬祈年于天宗盧植注云天宗六宗之神李邰家書謂六宗者上不及天下不及地傍不及四方在六合之中助隂陽化成萬物漢興於甘泉汾隂立壇禋六宗平帝元始中王容孔光等議曰乾坤六子水火相逮雷風不相悖山澤通氣是謂六宗後漢安帝立六宗祀天地四方之中於洛陽西北戍亥之地比於太極説者謂六宗者在地四方之中為上下四方之宗馬融曰萬物非天不覆非地不載非春不生非夏不長非秋不熟非冬不藏禋於六宗此也孔安國曰宗尊也所尊祭其祀有六埋少牢於太昭祭時祖迎於坎壇祭寒暑王宫祭日夜明祭月幽禜祭星雩禜祭水旱是為六宗賈逵以為天宗三日月星也地宗三河海岱也魏明帝立六宗祀祀六子之卦明帝疑其事以問王肅亦以為六宗之卦故不廢景初二年故祠太極沖和之氣晉初罷其祀時劉邵謂六宗者太極沖和之氣為六氣之宗者也時從其議司馬彪表云六宗之祀不應特立遂廢後復立因魏舊事時摯虞奏祀六宗如舊從之後魏明宗立六宗祀孝文太和十三年詔祀天皇大帝及五帝之臣於郊天壇時高閭曰六宗之祀議者不同凡十一家莫能詳究帝曰尚書稱肆類上帝禋於六宗文相連屬理似一事上帝稱肆而無禋六宗言禋而不别其名以此推之上帝六宗當是一時之祀評曰虞書肆類於上帝禋於六宗望於山川遍於羣神漢以王莽等奏日月星辰山川海澤六子之卦為六宗者按周禮以實柴祀日月星辰則星辰非六宗矣卦是物象不應祭之後漢馬融以天地四時為六宗者禮無禋地與四時之義孔安國言寒暑日月水旱為六宗者於理又乖鄭元以星辰司中司命風師雨師為六宗者並是星辰不應更立風師雨師之位魏劉邵以沖和之氣六氣宗之者氣先於天不合禋天之之下氣從天有則屬隂陽若無所受何所宗之其間有張迪以六代帝王張髦以宗廟三昭三穆等並不堪録後魏孝文帝以天皇大帝五帝為六宗於義為當何者按周禮以禋祀祀昊天上帝則禋祀在祀天不屬别神又司服云祀昊天上帝大裘而冕祀五帝亦如之昊天五帝乃百神之尊宗之義也通典孔叢子云宰我問禋于六宗孔子曰所宗者六埋少牢於太昭祭時也祖迎於坎壇祭寒暑也至於郊宫祭日也夜明祭月也幽禜祭星也雩禜祭水旱也禋于六宗此之謂也孔安國王肅用此説又一説云六宗星辰風伯雨師司中司命一云乾坤六子顔師古用此説一云天地四時一云天宗三日月星辰也地宗三泰山河海一云六為地數祭地也一云天地間遊神也一云三昭三穆王介甫用此説一云六氣之宗謂太極沖和之氣蘇子由云捨祭法不用而以意立説未可信也孔安國注尚書禋于六宗云精意以享謂之禋宗尊也所尊祭者有六謂四時也寒暑也日也月也星辰也水旱也孔頴達尚書正義又曰六宗明是所尊祭者有六但不知六者為何神耳祭法曰埋少牢於泰昭祭時祖迎於坎壇祭寒暑王宫祭日夜明祭月幽禜祭星雩禜祭水旱也據此言六宗彼祭六神故傳以彼六神謂此六宗王肅亦引彼文乃云禋于六宗此之謂矣鄭康成注云四時謂隂陽之神也然則隂陽寒暑水旱各自有神此言禋于六宗則六宗常禮也禮無此文不知以何時祀之鄭以彼皆為祈禱之祭則不可用鄭康成注以解此也漢世以來説六宗者多矣歐陽及大小夏侯説尚書皆云所祭者六上不謂天下不謂地傍不謂四方在六者之間助隂陽變化實一而名六宗矣孔光劉歆以六宗謂乾坤六子水火雷風山澤也賈逵以為天宗者三日月星辰也地宗三河海岱也馬融云萬物非天不覆非地不載非春不生非夏不長非秋不成非冬不藏此其謂六也鄭康成以六宗言禋與祭天同名則六者皆天之神祗謂星辰司中司命風師雨師星謂五緯辰謂日月所會十二次司中司命文昌第五第四也風師箕也雨師畢也晉張髦上表云臣謂禋于六宗祀祖考所尊者六三昭三穆是也司馬彪又上表云歷難諸家及自言已意天宗者日月星辰寒暑之屬地宗者社稷五祀之屬惟王肅據家語六宗與孔同各言其志未知孰是司馬彪續漢書云安帝元初六年立六宗祠於洛陽城西北亥地祀比大社魏亦因之晉初荀顗定新祀以六宗之神諸説不同廢之摯虞駮之謂宜依舊近年以來皆不立六宗之祠梁博士崔靈恩三禮義宗曰尚書禋于六宗禋有三義禋者煙也潔也精也煙者燔柴升煙于天以氣聞達潔取淨潔以表無穢之理精者取祭者精勤之意六宗之神先儒所釋義各不同義雖不同亦各有通伏生馬融謂六宗者天地四方所以用天地四方為六宗者萬物非天不覆非地不載非春不生非夏不長非秋不熟非冬不收皆有功於民故尊而祭之謂之六宗而或有非之者以前文有類于上帝今復謂天為類六宗無天地意謂其在天地四方生成道廣濟物既洪故報亦非一或類或宗尤未盡其功豈有嫌前已祀而謂後為非也然迎春既祭蒼帝靈威仰之神而復郊祭豈可以復以春迎祭天而嫌郊為非天也崔虛惠三禮義宗歐陽和伯夏侯建謂六宗者上不及天下不及地傍不及四方在六者之間助隂陽變化萬物者謂之六宗許謹非之曰處六宗之間謂之六宗其實為一而名六宗虛實相互何以為義歆謂本義以六宗之中合其尊祭故謂之六者明其在六之中間為人所宗非名宗為六不可責其稱六者非實是一之名也三禮義宗孔光劉歆謂六宗者乾坤之六子取水火雷風川澤能生萬物故禋祀以報謂之六宗馬昭難云凡八卦者所以生育萬物若祭卦便應祭八卦豈但祭六明非六卦也意謂劉孔之意所以但祭六者以子不能成父之業故生物之功由於六子合據成功而報故合乾坤而不祭也鄭云宗者星辰司中司命風師雨師此謂六宗也王肅難云星則五緯之星合為一位辰則十二月之會次又合為一位名實不相副也司中司命文昌第五第四星而别為兩位文昌之星獨分為二五緯之星所主各異合而為一義為不安尋鄭本意以五星十二二次各共成功故各合為一司中司命所司有一不共成功故分而二王肅六宗亦以四時共成歲功得合為一宗鄭以十二次五星各共成歲則何以不得各合為一王此難無通義也已上並三禮義宗晉虞喜别論曰地有五色大社象之總五為一則成六六為地數推校經句闕無祭則祭地也劉昭謂虞喜以祭地近得其實而分彼五色合五為六又不通禋更成疑昧尋虞書所稱肆類為上帝是祭天不言天而曰上帝帝是天神之極舉帝則天帝斯盡日月星辰從可知也禋于六宗是祭地不言地而言六宗六是地數之中舉中以該社稷等配從可知也禋者埋祭之名非升煙之祭劉昭稱孔叢子之言若果是夫子所説則後儒無復紛然正謂未必然耳至昭以六宗為祭地則穿鑿甚矣若三昭三穆及天皇五帝之議不待攻而自破也推司馬彪表云周禮無六宗之兆祭法無六宗之文不宜特復立六宗之祀極切於理古尚書及鄭玄言六宗古尚書説天宗日月北辰也地宗岱河海也日月為隂陽宗北辰為星宗河為水宗海為澤宗岱為山宗許君謹案與古尚書同鄭駁之云書云類于上帝禋于六宗望于山川既六宗云禋山川言望則六宗無山川明矣大宗伯云以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命風師雨師凡此所祭皆天神也郊特牲曰郊之祭也大報天而主日也又祭義曰郊之祭大報天而主日配以月則郊天並祭日月可知其餘星也辰也司中也司命也風師也雨師也此之謂六宗亦明矣禮記正義羣書考索卷三十五
