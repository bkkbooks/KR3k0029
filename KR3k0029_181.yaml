body:
  text: 羣書考索續集卷五十宋章如愚編輿地門歷代三代漢唐三代有天下垂二千年而隆平之治才數百載其間篡攘殽亂幾居大半𫝊八十有一王而致治之君才十數而止是治世固少而亂世固多也漢唐有天下餘七百年而天下妥安幾四百載傳四十有五帝而致治之君不下七制三宗是治世固多而亂世固少也然而天下後世言治道者莫不重三代而輕漢唐何哉教化習俗有不同耳蓋三代之牧斯民也任之以井牧養之以庠序警之以號令紀之以典刑下逮草萊之間教養畢偹是故朝覲㑹同五服不期而至搜苗獮狩戎事不戒而嚴教之以禮樂而民蹈中和興之以三物而士敦行義分明於朝齒辨於鄉行成於家俗化於天下而風移於後世方其治時厥效若斯之盛及其亂也先王之遺風猶在雖日尋干戈而民猶覿德詩書講耕耨之餘禮樂見鋒鏑之下童子猶能奮忠婦人亦皆知禮商人足以却敵竊藏於焉納君不至泥塗之人亦或可施於有政良由典制有常教化有素而民難動耳爰自暴秦得志王迹遂熄漢矯秦枉未能逺謀綿歷魏晉南北隋唐之際一因一革載治載亂為政之道不甚相逺也當時君臣日夜圖回不過以刑名食貨之為急它則略而不問是故學校不足以化民成俗而徒為利祿之階禮樂不足以易俗移風而徒為宴樂之具六藝已隳其四四民遂籍其二井牧既廢王制蕩然編户之冨侈埒公侯齊民之貧不侔犬彘風教陵夷刑獄寃濫法藏於有司而民犯於田里行著於鄉里則爵逺於朝廷父子無假蓋之情兄弟有爭桑之醜夫婦懷竊斧之疑奴主起攫金之想而習俗滋久玩為故常方其治時效已不美及其既亂則君子安於犯義小人果於犯刑耒耨化為干戈衣冠轉為皂𨽻比屋盡為胡漢列郡不相唇齒林林之徒不殘於盜賊則斃於飢寒不斃於飢寒則陷於刑戮生民糜爛無有紀極奸雄乘時禍不旋踵良由王制隳壞聖教不行而民易動耳故臣謂三代之離亂猶足以比漢唐之治安而漢唐之君子或未能過三代之小人非其時之不同人之有異風教習俗實使然也且以漢宣之治朝而王吉深切漢宣謂當時士大夫不能舉明主於三代之隆則它可知矣後之為天下者欲建逺成之規茍一時之治則漢唐之法固有足進必欲化民成俗浚太平長治之源則舍三代將焉取哉宋朝混一宇內宗周以降訖於五季寥寥二千載間一治一亂載離載合為十有六代周秦漢魏晉宋齊梁陳隋唐及梁後唐後晉後漢後周而周有天下餘八百年漢有天下餘四百年唐有天下垂三百年其餘十有三代乃不能五百載何修短之相戾耶蓋以弗恤斯民而獲罪於天耳嘗考歷代之君志意所存各有緩急而其德蓋可見矣緩於取天下急於惠斯民者文王也急於取天下而不忘惠斯民者漢祖唐宗也急於取天下而忽於惠斯民者十三代創業之君也唯其愛民緩急不同此享國歷年之所以異也觀漢唐之盛涵養斯民不為不厚然遑遑然以天下為功則於元元有所不暇顧此其盛德所以有愧於文王也貞觀之治有踰兩漢其惠澤斯民可知而好大喜功喪德實多方之髙光文景之君顔其厚矣故唐祚一傾而絶漢祚雖移猶血食百年而後亡蓋其所以惠澤斯民者厚則圓穹之福祚為無窮仰觀俯察反古驗今則天人之理斷可知矣大哉宋太祖皇帝惠澤斯民何其深也方厯運有歸天人震動事出倉卒而市不易肆不動聲色而天運已歸一號令間海宇洗心幡然而屬宋矣於時承周世宗威烈之餘藩夷削弱之甚摧鋒進取無異摧枯而太祖仁民澤物之心有加無已視藩夷之民皆吾赤子息民休兵遵養時晦逮夫張文表僣亂荆湖周保權來乞師始有事於南國副彼來蘇之望遂收不戰之功旋即罷兵與民休息既而蜀人悖德天討靡遑師甫及於六旬功坐收於萬里載集倒戈之烈豈煩卷甲之勞凱歌既旋天威謐靖以至河東不軌而天駕躬臨誓弔斯民一人弗殺江南阻命久稽天誅而申敕將臣深戒殄戮南唐常容於度外一民罔致於非辜故因壘而降尚有勞於再駕罪人斯得終有侔於二年傳曰行一不義殺一不辜而得天下不為也其宋之謂矣昔文王三分天下有其二而九年統未集萬古尚其仁藝祖之興十分天下有其七而十有七年宇內未為一家豈威力有所不足歟恐傷斯民之命必欲以柔道馴致之耳文王之德何以尚茲加之聖聖承承盡循堯道好生之德益洽於斯民故范陽逆命大駕弗亭澶淵赫靈神兵頓戢夏人蠢動類蚊虻之噆膚遼國懷來猶鳥獸之咸若三代以還未有中國實强如宋朝承平之久而猶能釋四夷而弗誅也故海宇之間元元各安生業民有餘力地無遺利政事舉而獄訟理婚姻時而生齒繁上天降康年豐時和斯民父父子子兄兄弟弟夫夫婦婦咸遂其性而浸以休息故承平百年戶口十倍良有以也夫三代以還涵養斯民漢唐為優而考其極盛之時户口可知西漢户口千二百二十三萬東漢九百六十九萬唐八百四十萬皆其極盛之數也宋朝元豐末天下民户揔客主一千六百五十萬户宋朝疆理比漢百郡少四之一益州之牂牱越巂永昌凉之金城北地武威張掖酒泉敦煌并州之上郡五原雲中定襄朔方幽州之涿郡廣陽代郡上谷漁陽右北平遼西遼東𤣥莬樂浪交州之交趾日南共二十六郡自唐末五代以來浸沒於四夷即九域志所載化外之州也而民户猶加十四唐三百州少五之一即漢二十六郡地歷代釐建至唐垂六十州即九域化外之州也而民户猶加十九則知宋朝之興種德斯民過漢唐逺甚方之文武成康之治了無愧色則皇天所以輔佑宋朝其可量耶京都東京酈食其荀文若之徒皆稱陳留為天下之衝四通五逹之郊蓋言其平夷洞達而坐九圍之中也故從古盟㑹戰爭此地尤亟傳稱夏禹有鈞臺之享今陽翟縣京西三百里有鈞臺陂春秋齊桓公㑹諸侯于葵丘今雍丘縣京東八十七里有葵丘聚吳晉爭長于黃池即今之封丘縣也京北六十里晉文公㑹諸侯于踐土即今之滎縣也京西北百六十里晉敗楚師于鄢陵即今之鄢陵縣也京東南百六十里楚敗晉師于邲即今之管城縣也京西百四十里袁曹相持於官渡在今之中牟縣北京西北十里劉項畫界於鴻溝在今之滎陽縣西京西百九十里祖逖鎮雍丘而黃河以南盡為晉有即今之雍丘縣也南北朝力爭河南而滑臺尤為重鎮即今之白馬縣也京北二百里若此之類前史班班未易殫舉則荀酈之言為不誣矣故秦漢以還訖於南北朝天下有變常為兵衝四面搏擊莽為戰場王霸之興未有都於汴者蓋憚其四通五逹而無險可恃也爰自隋煬帝大開汴河直逹淮泗而大梁實坐要㑹振南北水陸之衝形勢百倍既李唐中僨奄山東百州大梁屹為重鎮逮黃巢逆亂中原紛擾梁髙祖僣窺唐室遂據汴地以為根本既而征伐四克卒拓中原自後常為帝居迄於宋朝勃興卜都仍舊開寶九年三月駕幸西京有事於南郊遂有留都之意議者謂東京汴渠引漕東南宿衛百萬實所仰給帑藏軍兵皆在樞本不可搖即日下詔東還嗚乎古先哲王所以更都三河之間者蓋務求水陸便利之鄉所以便國用而紓民力也嘗考堯都平陽命夏禹治水每一州功畢必導決川流直通於河以逹平陽皆所以便諸侯之職貢也聖祖之興混一宇內而猶都大梁誠得唐堯之遺志焉南京春秋以還議者紛紛莫不以名城要害之為尚謂天下國家藩籬舉在於此而不知險非人不守人無險可固險在於人而不在於城也何則睢陽之城自春秋有之歷秦漢魏晉暨於南北朝其間中原變故多矣初未聞其為要害之地及祿山反陷沒兩京威㷔赫然而張巡許逺提孤旅扼危城困十萬之衆於一埤之下俾江淮克全中興實賴以濟則所謂要害者果在於睢陽乎抑亦有賴於巡逺也泛觀前史所謂要害太平得人則重失人則輕故爾危城屹為重鎮者無世無之如旴𣅿玉壁鍾離宛邱諸城自秦漢以還皆蔑然無聞及魏太武南渡長驅渡淮江北益潰南朝大振而臧質乃固守旴𣅿宋朝泗州西魏之初齊神武掃國西下氣吞關陜而韋孝寬乃固守玉壁故城在宋朝絳州稷山縣西蕭梁之初元英提山東數十萬衆乘勝而南江淮震駭而昌義之乃以三千兵固守鍾離宋朝濠州李唐之季黃巢訌亂剽擊萬里宇內瓦裂而趙犨乃固守宛邱宋朝陳州皆能挫鋭摧敵收不世之功則四城之要害為如何以至隗嚻保兾李憲阻舒吳守須濡塢魏爭滑臺城吳太義竊咸陽王成德僣真定或攻之連年不下或討之再世而不賓或環天下兵束之而無功或數十百年爭之而不已自當時觀之宜若險夷鞏固之甚真所謂名城要害者而前此者未有聞也後此者不復有聞也故知地利無常惟人所制吾險不足恃敵强不足畏茍得其人函關雖大拳泥可封也茍失其人黃河雖廣一葦可航也故善設險者擇良將善守城者固民心城不下雖雲屯百萬其孰能乘之哉嗟乎前史班班議論要險守禦之術多矣莫不據一時成敗而言非可為萬世通論也得其要者孟軻氏而已鑿斯池也築斯城也與民守之效死而勿去此萬世不易之要害也若張巡許逺之徒豈所謂與民守之效死而不去者乎愚感巡逺睢陽之事故備論於此而人事地利之分庶可見矣北京班孟堅著漢史叙列國之地各有都㑹蓋謂其財貨之所阜水陸之所湊山河之所襟帶足以指臂四域冠履一方而獨隆者也夫土壤腴瘠道里逺近山川夷險皆一定而不可易者則名都要㑹之所宜古今之所同也然而興廢隨時升降不一郡方都㑹代有不同前王之所升者或後王之所廢今之所重乃古之所輕如宋北京古之元城縣也西漢時已有元城縣應劭以為即魏公子元之食邑自有書契以來逮夫隋唐之交兩河變故實多其王霸之所督帥之所治戰爭守城不免重前史載之詳矣初未聞所謂元城者當時河朔都㑹代有其所或稱濮陽宋朝開德府即古之帝丘焉乃髙辛及昆吾氏之處春秋衛國以遷於此或稱朝歌宋朝衛州黎陽縣鎮商自武丁以後至紂都之周初衛國亦都於此或稱邯鄲宋朝磁州邯鄲縣曹國及西漢時趙國都或稱襄國宋朝邢州即漢晉之襄國縣也西楚常山王張耳後趙石勒皆都之春秋時謂之夷儀即邢所遷也古謂之邢商帝祖乙遷於邢即此也或稱鄴城宋朝相州臨朝縣之鄴鎮商帝河亶甲曹魏後趙前燕東魏北齊皆都之或稱中山宋朝定州戰國時中山國都後燕慕容垂亦都之斯六城者屹然據趙代之間古今更相倚以為重豈元城之足云哉李唐之季魏州始稍隆重更五代至於宋朝形勢益壯遂建上京而歷代所稱六城者反蔑然無聞矣夫鄴城一地也而始建為都又降而為州後周降為相州又降而為縣後周又移州臨於安陽降而為鎮宋朝熙寧中省鄴縣為鎮入臨漳縣何其前重而後輕也元城亦一地也而始建而為縣又升而為郡曹魏就置武門郡又升而為州後周就置魏州又升而為府唐升為大都督府又升而為京宋朝慶厯二年升為北京何其前輕而後重也夫土壤腴瘠山川夷險古今不殊而前後輕重若此是不無其說也抑曰田囿之蕪治城池之修廢民物之聚散甲兵之利鈍風俗之美惡皆在人事如何耳非地利所能常也人事既有工拙而形勢輕重亦隨時而遷矣歷觀皇帝王霸之都興廢無常類皆如此豈惟鄴城元城而已哉試因此而備論之三皇五帝三王之都十有二曰陳宋朝陳州伏羲所都曰曲阜宋朝改為仙源縣𨽻龍慶府神農少昊所都曰涿鹿宋朝燕山府黃帝所都曰新鄭宋朝鄭州新鄭縣即古之有熊氏也黃帝所都曰帝邱宋朝開德府髙陽所都曰亳宋朝西京偃師縣帝嚳成湯所都曰安邑宋朝蔡州安邑縣帝禹皆都之曰平陽宋朝晉州堯禹所都曰蒲版宋朝河中府虞舜氏都曰陽翟宋朝頴昌府陽翟縣夏禹所都曰豐曰鎬豐在宋朝京兆府之西北靈臺鄉豐水上鎬在昆明池北鎬與豐相去才二十五里周文王都豐武王都鎬至春秋戰國之時為大國之都者才五城而已曰曲阜曰安邑曰新鄭曰薊春秋戰國之時大國之都十有七曰曲阜魯國都曰新鄭韓國都曰安邑魏國都曰陳楚自郢徙於陳曰薊則涿鹿也燕國都曰吳宋朝平江府吳國都曰絳宋朝綘州絳縣晉國都曰雍宋朝鳳燕府秦國都曰郢宋朝荆南府江陵縣地楚國都曰睢陽宋國都曰臨淄宋朝臨淄縣齊國都曰㑹稽宋朝越州越國都曰邯鄲趙國都曰大梁魏自安邑遷於此曰夀春宋朝夀春府之夀春縣楚自陳徙於此曰櫟陽宋朝京兆府之櫟陽縣秦自雍徙於此曰咸陽宋朝京兆府之咸陽縣秦自櫟陽遷於此至西漢之初為藩主之都者才三城而已曰邯鄲曰臨淄曰薊西漢之初為藩主之都十有四曰邯鄲趙國都曰臨淄齊國都曰薊燕都曰許宋朝徐州楚王劉交所都曰下邳宋朝淮陽軍楚王韓信所都曰定陶宋朝興仁府之定陶縣梁國都曰晉陽宋朝平定軍韓國都曰丹徒宋朝鎮江府荆國曰廣陵宋朝揚州吳國都曰臨湘宋朝嶽州臨湘縣長沙國都曰番嵎宋朝廣州南越國都曰代晉魏以後夷狄侵其地代國都曰閩宋朝福州閩越王都至魏晉南北之時為王霸大國之都者一城而已薊是也魏晉南北之時王霸大國之都者十有七曰薊前燕國都曰許宋朝潁昌府之許昌縣魏太祖秦漢獻帝都於此曰鄴注已見前曰公安縣蜀先主初治於此曰成都宋朝成都府蜀主李特譙縱皆都於此曰武昌宋朝鄂州吳主孫權先都於此曰秣陵宋朝建康府吳晉宋齊梁陳皆都之曰洛陽宋朝西京曹魏司馬晉元魏皆都之曰平陽後漢劉聰都之曰襄國後趙都之曰廣固宋朝青州益都縣南燕都之曰中山宋朝定州後燕都之曰江陵宋朝荆南府元帝都之曰統萬宋朝夏州赫連夏都之曰平城宋朝雲中府拓跋魏都之曰栁城宋朝營州前燕後燕北燕皆都之至隋唐五季之時為王霸僣竊之都者才六城而已魏鄭隋唐後漢石晉皆都於洛陽隋唐皆都長安前蜀後蜀皆都成都僞燕遼國皆都於兾南唐皆都建康僞梁南平皆都江陵唐去宋為甚近也而唐峙三都存於宋朝者一而已東都洛陽是也其西都則降為京兆府其北都則廢為平定軍而宋朝四京因於唐者一而已東都洛陽是也餘三京則皆當時之郡治耳夫以數十年之間其興廢之驟也如此矧以悠悠往古而較於今是必有大相侔者矣夫然後知地無常重亦無常輕挈其輕重之權者斯在民而已民無常重亦無常輕挈其輕重之權者在政理而已觀姬周以前帝王之作莫不更都三河之間未始有宅西土者也爰自后稷居邰太王居岐文王都豐武王都鎬而關東浸以休息自後雍土常為王霸之都則以后稷之稼穡太王之如豳文王之子來武王之求定有以臻此之盛也自周至唐洛陽為帝居垂二千載矣而代宗遭吐蕃之亂倣徨陕服欲東遷洛陽而郭子儀以為東都乘大亂之餘千里蕭條百曹荒榛其何以備萬乘供百官井舍代宗遂西還而不復倚洛陽為重由是觀之則班史都㑹之論特可施之一時而不可施之萬世也若欲隆上都而觀萬方峙都府以制四履則要當以為政事為先豈以古為泥哉三都自古帝王之作莫不更都三河之間而周秦以降繼宅兩京五季而下又都大梁何帝居之不常也然考其所以定都改卜之意則有由矣大抵長安便於守洛陽便於利大梁便於戰三京利害各有一偏故前王因其便利而都之也方其正朔雖一而利勢不專藩侯棊布山河瓜分列國有唇齒之倚朝廷無指臂之順必也守戰並修軍民兩恤俾其進足以制諸夏之變退足以保固宗社捨長安莫利也故宗周西漢繼宅西土勢或然也嬴秦隋唐踵卜長安仍以為安也逮夫車書混一禮教興行舉綱朝廷張目郡縣於是偃武修文輕徭薄賦俾斯民均受其賜思所以新一王之制侔盛古之隆唯禮樂教化是遑而不以兵革戰伐為事則捨洛陽莫便也故周成漢光定都成周誠得其宜也曹魏司馬晉踵卜洛邑仍以為安也光武而下唯元魏孝文僅留意於稽古禮文之事故逺拔乎成中宅洛邑粲然新一王之政逺侔盛古亦遷都改卜有以相之若乃版圖未一侵伐鼎來夷狄外訌邊隅僣竊必也德刑兼修戰守兩備宿重兵於京師强幹弱枝以鎮服夷夏而指蹤英雄以赴其功則捨大梁莫便也朱梁而下以迄於宋仍都大梁亦勢或然也然有其利必有其害膏腴惰農險阻逸德知禦侮於海隅而忽艱虞於京輦者長安之不利也故五侯九伯不能亂周而犬戎實亂之山東戰國不能亡秦而趙髙實亡之藩狄不能犯函谷而王莽實篡漢燕晉不能隳符秦而姚萇實扁堅以至輔民譟而新莽燼涇師繞而德宗跳豈非長安忘警戒之道也歟德化有時替而君不常眀紀綱有時紊而政不常舉敵受八面而險不數舍一方矯䖍九重震動此則洛邑之不利也在董卓奮而東漢亡爾朱騁而北朝亂偏師犯闕如履門闌以至典午失馭藩侯弄兵往來如織王城不啻傳舍豈非洛陽失守戰之備也歟宴安起於無虞弊蠧生於悠久故載戢載櫜而甲械朽鈍以安以處而士卒獰憊兵多難用將逸難使可以隆安强之威而不足以禦一旦之變此則汴都之不利也故石晉之亡兵叛於外也宋朝靖康之變太平之久也然則長安便於守洛陽便於歸大梁便於戰又在人之所便利如何固未可恃其所便而遽即於安也雖然王京之制各有輔車屏蔽之地又不可不察長安之制以陕西為畿輔而屏蔽實在隴右宋朝失於西夏洛陽之制以關東為畿輔而屏蔽實在河東大梁之制以河南為畿輔而屏蔽實在河北故由古以來洛京之禍常起於并汾汴都之變常起於燕趙長安之難雖不常所自而河隴之寇尤為頻駭良由失其外屏也是以河湟未歸則長安未易都雲朔未賓則洛陽未易卜燕薊未服則大梁未易宅唇亡齒寒者此之謂矣由是以論則三京利害各有攸當不可一概求也然以王道繩之是不無優劣焉從古議者紛紛莫不以長安為優而臣意則否長安之地四塞雖固而包履裁一州之境八州之民皆吾赤子而乃塹潼嶢以自固是何示天下以私也豈天子守在四夷而王者以天下為家之義哉嗚呼天生民而立之君所以均調而齊一之也故王者之作必中天下而立定四海之民俾其貢賦於是而易輸寃抑於是而易訴朝覲㑹同於是而易期赴調上計於是而易逹故布德行仁則易以均被發號施令則易以敷錫皆所以均惠斯民也若夫洛邑之地當天下之中大梁坐水陸之衝其所以惠利斯民孰便於此傳曰譬如北辰居其所而衆星拱之洛邑之謂也又曰三十輻共一轂大梁之謂也然則欲求一室萬世之都所以為國家生民無窮之計三都之中抑洛其庶幾矣羣書考索續集卷五十
