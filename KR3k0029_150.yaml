body:
  text: 羣書考索續集卷十九宋章如愚編律厯門律厯律厯志書黃帝使伶倫造律吕大撓作甲子當時已有述而著之者晉志云炎帝分八節以始農功軒轅紀三綱而開書契乃使羲和占日常儀占月車區占星氣伶倫造律吕大撓作甲子𨽻首作算數容成綜斯六術察發斂正閏餘述而著之謂之調厯降及唐虞堯正厯象舜同律度二典所載大略可知然則律厯之書自代易結繩以來已有之矣漢藝文志術數類有律厯術等書有黃帝五家厯三十卷顓帝五星厯十四卷夏商周魯厯十四卷於以見重黎義和昆吾夏巫咸商史佚周之徒厯世相傳考正天象欽授人時必資是書以相證驗衰周之季天子不頒朔諸侯不告朔日官不授時日御不知閠夫子乃述夏時作春秋假日月以定厯數丘明同聖人之好惡因發凡起例以明之宋之子韋齊之甘德魏之石申亦皆有星經以傳於後其書並見漢唐藝文志隂陽家有宋司星韋三篇景公史也漢天文志論五星皆據甘石經云逮漢太史公始定其名曰律書厯書班固敘劉氏三統厯譜更謂之律厯志漢魏而下迄于隋唐皆仍其名而損益其法是知律厯志無代無之歐陽公修作唐志乃謂夏商周以三統改正朔厯法不傳其作五代司天考又謂三代中間千有餘歲遺文曠廢六經無術孔子之徒亦未嘗道也是果孔子之徒之意乎黃帝而下六家之厯與律厯等書又曷嘗曠廢而無傳乎必以秦火之餘殘缺不全則易以卜筮之書得存而秦人猶用顓帝厯其不遭煨燼可知矣必以六厯等書出於諸子之妄為則武帝太初以前古厯已具而六經讖緯至西漢之末始出其非諸子之妄為可知矣味歐陽公之言殊未詳所謂謂六經無術孔子不道者不明言所以起律厯之術也三代厯法不傳遺文曠廢則非矣晉志曰黃帝使羲和占日堯典曰乃命羲和夏書曰羲和湎淫厯書曰顓帝命重黎重黎與羲和乃官名初非人之名也史律書論八風六律六吕二十八宿史厯書言三王之正及五德之傳以漢為水德前漢律厯志後漢附一曰偹數二曰和聲三曰審度四曰嘉量五曰權衡數者一十百千萬也所以算數事物順性命之理也本起於黃鍾之數始於一而三之三三積之聲者宫商角徴羽也陽六為律隂六為吕律以統氣類物吕以旅陽宣氣有三統之義焉三統者天施地化人事之紀十一月乾之初九故黃鍾為天統律長九寸六月坤之初六故林鍾為地統律長六寸正月者乾之九三故太簇為人統律長八寸象八卦其於三正也黃鍾子為天正林鍾末之衝丑為地正太蔟寅為人正度者分寸尺丈引也量者籥合升斗斛也衡權者衡平也權重也數職在太史羲和掌之聲職在太樂太常掌之度職在內官廷尉掌之量職在太倉大司農掌之衡權職在太行鴻臚掌之漢興以張蒼言用顓帝厯武帝募治厯者造太初厯乃選治厯鄧平與民間治厯者唐都落下閎與焉其法以律起厯淳于陵渠復覆太初厯日月如合璧五星如連珠遂用鄧平厯元鳯三年詔雜候上林清臺課諸歷疏密凡十一家太初厯第一自漢厯初起盡元鳯六年三十六嵗而是非堅定漢成世劉向總六厯作五紀論歆作三統厯及譜後漢元和二年制曰史書用太初鄧平術冬至之日日在斗二十二度而厯以為牽牛中星先立春一日則四分數之立春也而以折獄斷刑於氣已遷今改行四分漢靈帝時劉洪始悟四分踈闊皆斗分太多故也作乾象厯見晉志總論書志所由起太史公律厯書即太初厯法也班孟堅律厯志即劉歆三統厯譜也司馬彪云揚雄太玄亦效三統或云本之太初厯蔡雍與劉洪共述律厯記著之漢史其後范曄則集録以為東漢志司馬彪亦嘗集以為志矣魏氏以來杜夔荀朂皆推音律韓翊黃初厯揚偉景初厯晉劉智正厯王朔之通厯羌岌三紀厯之徒皆著厯法其後房玄齡等集為晉志而名曰御撰長孫無忌等用劉歆舊式敘述宋錢樂之後齊芳深隋牛𢎞何妥之律何承天宋元嘉祖沖之宋甲子元厯梁武帝用之與夫李業興西魏甄鸞周馬文顯張賔張胄元隋之厯以為隋志而宋朝歐陽公修取傅仁均晉志以為帝嚳李淳風僧一行之厯以為唐志其五代司天考則馬重績曹士蒍王朴之成法也夫深於律厯之術而作為律厯之書志自漢而下太史公一人而已蔡雍抑又次焉其餘蓋有不知而作之者班固之徒是也杜預之言曰劉氏三統厯班固不覺其踈而更以為密司馬亦云三統尤為踈闊而揚雄心惑其説採為太玄班固謂之最密而著于漢志其不知而妄言之者歟杜預之言見東漢志劉昭補注司馬彪同吁諸史書志惟天文律厯注釋不同讀之者難以遽曉暇日悉抄所疑以待知者非曰能之願學焉此其志也揚雄太玄或言其本之太初厯雄與歆俱事王莾故司馬彪謂效其三統也諸志皆祖太史公太史公嘗言六律為萬事根本故太初厯法皆本於律班固之論五則梁武之制四通京房準以六十錢樂之轉為三百皆推而廣之也太史公嘗言天運三紀而大偹天官書曰天運三十年而小變百年中變五百年大變三大變一紀三紀而大偹四千五百年也故太初厯元以三紀為率四千六百一十七年并閏月皆在其中也是謂上元甲子貴三五也劉歆之三統甲子甲辰甲申也見三統異同説蔡雍之紀元東漢志述蔡雍劉洪之法曰二十蔀為紀三紀為元正與太初厯同羌岌之紀法以甲子甲辰甲申為三紀甲子元厯此亦太史公貴三五之意皆推而廣之也大抵歷代之談天文律厯者皆祖述太史公之法而推廣其所未偹其或變更損益第第相非其説固不為無所據而亦未可盡信也唐一行倚太衍之數以起厯與太史公推律之法不同至其演起元亦本之太史公耳晉志曰司馬遷八書言律吕粗舉大經則後世所推者皆其節目也唐史志厯不志律太史公作律書亦以太初厯起於律故也兩漢晉隋書志皆兼律厯惟新唐史志厯而不志律何也按唐于厯凡八改自高祖戊寅厯訖于昭宗崇元厯是也戊寅厯作傅仁均行之未幾李淳風盡更蔀紀元日分度之舊而立總法千三百四十以一之蓋其法已主乎數而不專乎律矣一行倚大衍之數立推步之術與遷固以律起厯之説愈不同矣自此以下所謂五紀代宗正元厯德宗觀象憲宗宣明穆宗崇元厯昭宗皆因大衍之數而微加增益焉耳此唐家起厯之法主乎數而不主律故新史志厯而不志律也唐律見樂志夫太史公以六律為萬事根本後之言厯皆基焉惟一行推易數作歷十二篇而不議以律起厯之意其間止有律生於辰一句者又何也唐志曰厯起於數數者自然之用其用無窮則無所不通以之於律於易皆可以合也斯言得之矣漢厯之數起於黃鍾之籥籥之狀似爵酒爵也一籥之黍入諸黃鍾律管之中無欠無餘故曰黃鍾之籥也五量起於黃鍾之籥耳厯何以起於黃鍾之籥哉按落下閎算法其法以律起厯曰律容一籥積八十一寸則一日之分也是知黃鍾之律容一籥長九寸九九八十一則為八十一分漢厯統母日法則本諸此也分一日之度為八十一分是一日之分之數起於黃鍾之籥也其厯法大綱皆起於黃鍾之律矣唐志曰漢造厯始以八十一分為統母其數起於黃鍾之籥蓋其法一本於律此言此意甚曉然而學者不悟乃曰漢厯起於此而不曰漢厯之數起於此差之毫釐謬已千里律候氣律樂律笛律異同淳古之葦籥女媧之笙簧此律吕之制所由起也見晉隋志伶倫取于竹斷兩節間長三寸九分而吹之以為黃鍾之宫調之含少次制十二筒寫鳯之鳴辨雌雄為律吕夫十二律皆不盈尺而黃鍾含少三寸餘伶倫吹以聽鳯典同吹以辨隂陽之聲太史公所謂聞聲而知勝負之數班志所謂氣合而生風之由果樂律耶果候氣之律耶詩曰鳯凰鳴矣于彼髙岡荀卿曰有鳯有凰其聲若簫蓋鳯有中和之氣有高潔之情吹律以寫鳳鳴則律吕之調自應宫商之音自和古人以氣聽以聲聽聲氣俱和故可合天地之風氣而辨隂陽知勝負也黃鍾之宫自三寸餘而至於九寸吹以命之為和聲之律可也為候氣之律亦可矣淮南子曰黃鍾之律九寸而宫音調晉志曰黃帝作律以玉為管長尺而六孔以為十二月音於此見二者無異議矣至於漢章帝時史奚景於舜祠下得玉律六孔反以為尺此正與黃帝所制玉律同然則古者所謂樂律長不過尺所謂候氣之律長不過九寸晉荀朂制黃鍾之笛其長三尺八寸凡十二笛之制短者不減二尺餘較之古者之制何如哉曰此笛律也與古者樂律候氣律皆不同也今人或以十二笛為古人樂律候氣律者皆非也昔京房有言曰截管為律吹以考聲術家以其聲微而體難知其分數不明故作凖以代之觀斯言則知梁武帝荀朂笛律之制甚長亦以樂律分寸皆不盈尺其體難知故更制十二笛也古人妙於聽聲故黃鍾含少不四寸而可知後世拘於形器黃鍾之笛雖數尺餘其聲未必真也晉志曰古人調律出於耳聽後世則據尺度以為之適足易差斯言盡之矣太史公律書以兵言律以神言律其亦得律外之意歟律度長短不同班志黃鍾律長九寸太簇八寸林鍾六寸其餘相生皆有定數京房律法司馬彪律志鄭玄注月令蔡雍月令章句及杜夔荀朂所論皆與漢志同夫太史公厯書既言九九八十一為宫則是黃鍾律長九寸明矣及其論律數也乃謂黃鍾長八寸七分一為宫太蔟七寸二為商林鍾五寸七分四為角者此特以黃鍾九九八十一之數故其長八寸七分一也三分損一下生林鍾五十四之數故曰林鍾五寸七分四也林鍾三分益一上生太蔟七十二之數故太蔟七分二也假律寸之分以生律數爾非所以論制律長短之定式也又按隋書志和聲類曰司馬遷以黃鍾長八寸七分之一太簇長七寸七分二林鍾長五寸七分三皆樂之三始十二律之本末也前律厯志權衡類云七始者天地人四時之始也樂以黃鍾太簇林鍾為天地人三始觀隋志之言則知太史公又以黃鍾律數損益相生而著作樂七始之義亦不可拘以制律長短之定式也夫然則制律長短之定式黃鍾九寸太蔟八寸林鍾六寸也宋何承天新率乃謂太蔟八寸二釐林鍾六寸一釐惟黃鍾無加損隋劉焯校定鍾律乃謂太簇八寸一分四釐而黃鍾林鍾亦無損益二子所制三始之律或遵定式或加餘分者又何歟蓋二子各以己意推測律吕而求合於古人不宜以古人之式曲從二子也兼古今尺度長短亦自不同見下律圍周經嘉量古斛之制不同黃鍾容黍多寡數説律圍周徑不同圍徑之説如量木之小大自外圍之設若得九寸則徑三寸但是三分得一而已月令鄭氏箋云元律空皆圍九分徑三分隋志引班固云黃鍾圍九分意謂長九寸故圍九分也餘律皆倣此林鍾圍六分太簇圍八分後魏安豐王依班固志作律吹之皆不合是則班固之説非鄭玄之説是矣考之隋志云開皇中牛𢎞等參考古律度各依時代制其黃鍾之管俱徑三分長九寸度有損益故聲有高下圎徑長短與度而差見隋志律直日毛爽鍾譜云又以知十二律雖皆徑三分圍九分度有損益無怪乎古今之制不同也又嘗觀隋志之言曰古之九數圎周率三圎徑率一其術疏舛自劉歆張衡等各設新率未臻折𠂻惟宋祖沖之約率圓徑七圎周二十二加一分毫釐盈朒女六反無所不辨然後知古者周三徑一乃律管自然之數文竹所生非人之為也古人推以起度以徑一則圍三徑三則圍九言大略然也隋志所謂祖沖之法辨析毫忽施於起度之際則可知其制律而不因其周徑之自然則不可也烏可例以古術為疏舛哉茍不因其周徑之自然而旁庣其腹求合密率則容黍有多寡其差益逺矣旁庣之説見後律嘉量論律吕上下生不同隔八相生謂如黃鍾為宫宫生四音并變宫變徵為七音未一音變徵即蕤賔也窮則反反則重上生也梁武帝鍾律紀論云見隋志京房馬融鄭玄蔡雍至蕤賔並上生大吕而班固志至㽔賔仍以次下生若從班義則夾鍾惟長三寸七分有竒律若過促則夾鍾之聲成一調中吕復去調半是過於無調仲春孟夏正當生養其氣舒緩不容短促求聲索實班義為乖又晉志曰淮南京房鄭玄諸儒言律吕者皆上下相生至㽔賔又重上生大吕夷則上生夾鍾無射上生中吕此三吕於司馬遷班固所生之寸數及分皆倍焉餘則並同斯則伶州鳩所謂六間之道揚沈伏黜散越假之用者也變通相半隨事之宜贊助之法也晉志謂吕不韋春秋上下生之説亦然晉志列十二辰之律上下相生止言兩未兩酉兩亥兩丑兩卯之所生不言午申戍子寅辰六辰晉志又曰凡音之體務在和韻益加倍損則減半其於本音常為無爽然則言一上一下者相生之道也言重上生者吹候之用也於㽔賔重上生適會為用之數故言律者因焉非相生之正也通典至㽔賔亦重上生大吕所謂五下六上也六律為陽六律為隂陽生隂為下生隂生陽為上生所謂律娶妻吕生子也至㽔賔重上者生賔陽律當三分損一下生大吕今而曰上生則三分益一而生大吕也一損一益長短之相去倍半異同之論何者為是以上生下者三分生二分所謂三分損一也以下生上皆三分生四分所謂三分益一也晉志之言曰一上一下者相生之道也言重上生者吹候之用也於㽔賔重上生者適會為用之數故言律者因焉非相生之正斯言得之矣何者十一月一陽生故陽生隂皆為下生五月一隂生故隂生陽皆為下生㽔賔五月陽律也于時隂為主故陽生隂為上生也吹律候氣變通之法當然也黃鍾為宫隔八而生七音至㽔賔而終窮則反故蕤賔重上生也班固論隂陽相生之正然不可施之推候之用京馬鄭蔡論吹候之用然不可施之相生之正若依班志陽律皆謂之下生隂吕隂吕皆謂之上生陽律則以損益計之十一月黃鍾律長九寸而十二月大吕止長四寸二分而已正月太簇律長八寸而二月夾鍾止長三寸七分而已三月姑洗律長七寸二分而四月中吕止長三寸三分而已不應長短之相間厠如是之不齊也依京馬鄭蔡之説自黃鍾以往陽生隂為下生自㽔賔以往隂生陽為下生則黃鍾九寸大吕八寸四分太簇八寸夾鍾七寸五分姑洗七寸一分中吕六寸七分陽氣自下逹上漸得其序律管以次而減之亦有次第矣用以推律候氣則此是而彼非矣又况京馬鄭蔡以中吕長三寸三分則縱益其一烏能復生黃鍾九寸之律哉是知班志論隂陽相生之正理則可而必施之吹候之用則當從京馬蔡鄭之説太史公律書㽔賔上生大吕律長七寸五分餘亦自㽔賔重上生也晉志乃曰上生大吕司馬遷班固之寸數皆倍焉何也夫十二辰之律隔八相生舊矣今晉志論大吕太簇皆未宫所下生上生之律夾鍾姑洗皆酉宫所下生上生之律中吕㽔賔皆亥宫所下生上生之律應鍾為已宫所下生之律至於黃鍾獨不言所生之自不知午申戌子寅辰六位何以不與豈二位同一致耶律候氣之法不同東漢志及晉志並云候氣之法為室三重户閉塗釁周密布緹縵室中以木為案每律各一內卑外髙從其方位加律於上以葭莩灰抑其端氣至者灰去隋志云髙祖遣毛爽等以律著室中以木為案十有二具每取律吕之管隨十二辰位置于案上而以土埋之上平于地中實葭灰而以輕緹素覆律吕每其月氣至與律宜符今世有言候氣法者以為十二笛隨方置于室中天地之氣合以生風八風從律而不姦則灰飛應候自然不爽此候氣之法有三説也必以人情推之則隨律長短埋于地中之説為正蓋隂陽之氣嘗先萌於九泉之下氣之至也距地而有淺深故律管之度有長短隨時而應自然不差必謂律置虛案之上不入地中而氣候自應已似迂闊之談至於候氣之管自黃鍾而下未有過九寸者今世謂十二笛律可以候氣此又失之誣也不然古人權土炭之低昻蓋以陽氣燥而土炭輕隂氣濕而土炭重後齊芳深作輪扇二十四候中節之氣亦置諸地中而驗之也律書論八風應八節之律即所謂八風從律也必謂笛律足以候之固有此理特不如地中候氣律易驗之為佳耳律氣盛微不同晉志論律吕氣至吹灰動榖小動為和大動君弱臣強不動君嚴暴之應至隋髙祖令毛爽候氣律灰或三五夜而盡或一月才飛少許牛𢎞遂謂灰飛半出為和氣其政平全出為猛氣其臣縱吹灰不出為衰氣其君暴髙祖駮之曰臣縱君暴其政不平豈由月别而有異耶𢎞不能答夫氣應有盛有微故灰飛有遲有速此特中節之氣不齊與隂陽太少之不等耳非如常燠常寒時暘時雨足以驗政治之得失也隂陽家使人拘而多忌諱遂以君暴臣縱月異而時不同歸咎於律氣之盛微則非矣宜乎牛𢎞不能答髙祖之問也天地人三統不同班志曰黃鍾為天統林鍾為地統太族為人統又曰厯數三統天以甲子地以甲辰人以甲申天既以子丑寅為三統而又以子辰申為三統者何哉按班志本文天施復於子故曰甲子地化自丑畢於辰故曰甲辰物生三月畢人生自寅成於申故曰甲申以施工畢於七月也不言丑而言辰不言寅而言申亦猶地統林鍾不言丑而言未之衝也自子至辰凡五數自辰至申亦五數自申至子復得五數是班志所謂三五相包即太史公所謂王者必貴三五之説也以三正論之則子丑寅也以三五論之則子辰申是也三五以用言三正以體言其實三統無異義也李竒韋昭注釋班志所謂甲子夏四月朔也甲辰殷正月朔也甲申周正月朔也然班固論律厯三統而李竒等乃以月朔為言豈必夏殷周正月凡係朔日皆是甲子甲辰甲申耶况夏建寅人統也今乃曰天統以甲子為夏朔日周建子天統也今乃曰人統以甲申為周朔日似與本文相戾不若本文天施地化人生之説為有據也又按晉志晉孝武時後秦羌岌推上元甲子至太元九年甲申嵗凡八萬四千四百餘年有甲子紀甲辰紀甲申紀謂之三紀厯正合班志所謂厯數三統天以甲子地以甲辰人以甲申之説知此説又何必以朔日為言哉李竒以朔日為言是非固未可辨特不可以朔日為三統也或謂為起厯之元按東漢志厯法夏用丙寅周用丁巳亦非甲辰甲申明矣三統之實與三始之義按漢志天數九黃鍾九寸九九八十一此黃鍾所以統母也十九年為一章八十一章為一統此黃鍾之實也實者言其極數之所成也地數六林鍾六寸六六三十六乘之以十則三百六十當期之日此林鍾之實也人數八八卦之位八佾之音之謂也太蔟八寸八八六十四卦此太簇之實也夫天數九地數六人數八此三統本然之數也推而廣之極其數之所成則八十一章為黃鍾之實三百六旬為林鍾之實六十四卦為太蔟之實劉歆班固論易天人道多附會牽合惟三統之實無疑議太史公論黃鍾九寸九九八十一故又云八寸七分一也與八十一章之意同也漢志權衡類以天地人為樂律之三始蓋黃鍾為宫天之始也太族為商人之始也林鍾為角地之始也此即太史公舊法也夫黃鍾為宫則林鍾徴今而曰林鍾為角乃以宫商角為樂之三始非論相生之正也又七始説附見和聲類天地人四時也又見聲始於宫窮於角説黃鍾律數三復而得甲子落下閎運算以律起厯曰律容一籥積八十一寸則一日八十一分也以長相終律長九寸凡百七十一分而終復三復而得甲子夫律長九寸而為九十分也又加之一日之法八十一分則合為一百七十一分也三復則合為五百一十三分也一甲子六十日也九甲子則五百四十日校之三復之數多二十七日而已意者以九寸之律乘六十日之數凡九六五十四而甲子復也羣書考索續集卷十九
