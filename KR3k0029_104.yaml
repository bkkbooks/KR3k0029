body:
  text: 羣書考索後集卷三十八宋章如愚編兵門兵制門黄帝有涿鹿之戰以定火災顓帝有共工之陣以定水害唐虞至治之極猶班師振旅四罪而天下服夏有甘扈之誓商周以兵定天下矣天下既定猶立司馬之官設六軍之衆西漢刑法志夏官司馬凡制軍萬有二千五百人為一軍王六軍大國三軍次國二軍小國一軍注疏義曰凡出軍皆據六卿為數故伍則一比兩則一閭卒則一族族則一黨帥則一州軍則一鄉家皆出一人如六卿之數也王六卿之數也大國三卿故三軍次國二卿故二軍小國一卿故一軍春秋傳曰成國不過半天子之軍則諸侯之大者三軍詩曰周王于邁六師及之此周六軍之見於經也春秋傳曰王使虢公命曲沃伯以一軍為晉侯此小國一軍之見於傳也然而天子六鄉六遂合有十二軍而止六軍何也葢六鄉為正軍六遂為副倅至於大國之三鄉三遂次國之二鄉二遂小國之一鄉一遂亦莫不然攷之魯頌曰公徒三萬此大國三軍之數也襄十一年作三軍春秋書作以譏之葢魯於周為侯次國而已不宜復作三軍至昭五年舍中軍公羊則曰舍中軍復古也其後晉作三行以増中上下而當六軍則衰世禮壊諸侯僭天子矣李泰伯云此則六鄉為六軍又按遂人職曰稽其人民而授之田野簡其兵器康成謂遂之軍法如六鄉則六遂亦為六軍但以王家迭用之則常六軍爾故止言六軍此鄉遂制軍之法軍将皆命鄉二千五百人為師師帥皆中大夫五百人為旅旅師皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆其長師帥三十人者州長之中大夫也旅師百五十人者黨正之下大夫也卒長七百五十人者旅師之上士也兩司馬三千人者閭胥之中士也比長下士一人於五家之數不以從軍故曰五人為伍伍皆有長則推民之勇者為之矣先王之制民居則為比閭族黨州鄉故比卦衆在内二陽在上為之主君象也出則為伍兩卒旅軍師故師卦衆在外一陽在下為之主将帥之象也此軍與將之數也小司徒乃會萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田法以比追胥注曰先王因農事而定軍令欲其恩足相恤義足相救服容相别聲容相識先王處民有法用民有道比其家聨其人其居也則積為比閭族黨州鄉其出也則合為伍兩卒旅師軍方其平居無事之時則有教養之素而恩義足以相結及其倉卒有事之際則習法令而死生足以相託乃均土地以稽其人民上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役無過家一人以其餘為羨唯田與追胥竭作大司馬均其民之可用者家數皆同賈公彦曰此謂六鄉之内上劑致甿一人為正卒其餘皆為羨卒若六遂之内以下劑致甿一人為一卒一人為羨卒其餘皆為餘夫饒遠故也陳禮書曰古者國有遊倅田有餘夫軍有羨卒皆所以副其正也然鄉遂不同者葢六鄉之内賦輕六遂之内賦重也惟田與追胥竭作鄉遂皆然以田獵禽獸人所同欲追伺盜賊人所同惡也注疏謂二者用人多而然亦一說也司徒之可任者如此其多司馬法之出士徒如彼其少者葢古人用兵不為勝計只慮敗也故不盡用之雖敗尚可扶持小司徒只言其可任者非實數也自此之後調發者皆用實數幸而一勝不幸而一敗皆不可救者以晉作州兵乃是盡數調發甚非先生之制其他如魯成作丘甲蘇秦以齊宣王臨淄之中七萬户不下户三男子而卒以二十一萬曹操謂崔琰曰昨案户籍可得三十萬衆故為大州是皆以實數調發唯孔明僅有此意以蜀之大其兵常不過十二萬而所用八萬常留四萬以為更代蜀之強以孔明不盡用之故及蜀之亡尚有十萬二千數年之間所折者不過二萬耳此鄉遂調兵羨卒之數也司馬法曰通三十家出四馬士一人徒二人成三百家出車一乗士十人徒二十人終三千家出革車十乗士百人徒二百人同三萬家出革車百乗士千人徒二千人賈公彦司徒正義云鄭注論語道千乗之國亦引司馬法彼是畿外邦國法彼革車一乗甲士三人步卒七十二人甲士少步卒多此士十人徒二十人此是畿外甲士多步卒少外内有異故也按司馬法車乘之制與杜氏合至於士卒多寡異矣如杜氏説一同七千五百人而司馬法一同止三千人李泰伯引法之文而釋之曰此雖井田顧未與周制同葢謂司馬法趙歧所作非成周制班固曰周因井田而制軍賦地方一里為井井十為通通十為成成方十里成十為終終十為同同方百里同十為封封十為畿畿方千里有稅有賦税以足食賦以足兵故四井為邑四邑為丘丘十六井也有戎馬一疋牛三頭四丘為甸甸六十四井也有戎馬四匹兵車一乘牛十二頭甲士三人卒七十二人干戈備具是謂乗馬之法一同百里提封萬井除山川城池邑居囿路等三千六百井定出賦六千四百井戎馬四百匹兵車百乘此卿大夫采地之大者也是謂百乘之家一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乘此諸侯之大者也是謂千乘之國一封出車千乘以杜氏之法積算十同千乘當有戎馬四千匹牛一萬二千頭甲士二千人步卒七萬二千人合士卒之數可以為六軍然而大國不過三軍其有六軍者猶天子六鄉六遂迭用之爾天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乗故稱萬乘之主戎馬車徒干戈素具春振旅以蒐夏拔舎以苗秋治兵以獮冬大閲以狩皆於農隙以講事焉周制萬二千五百人為軍六軍七萬五千人千里之畿提封萬井定出賦六十四萬井一井之田八家耕之總計六十四萬井之田為五百一十二萬家家一夫為五百一十二萬夫以此夫衆而供萬乘之賦是為七家而賦一兵孫子曰興師十萬日費千金内外騷動怠於道路不得操事者七十萬家葢言一夫從軍七家奉之此亦見七家賦一兵也自夫率之七家相更以給軍則王畿之内凡七征而役一遍焉記曰大國不過千乘葢諸侯地不過百里車不過千乗以開方之法計之方十里者為方一里者百其賦十乘方百里者為方一里者萬其賦千乘然賦雖出千乘而兵不過三軍五百乘而已則五百乘三鄉之所出也千乘闔境之所出也何則鄉萬二千五百家合三鄉則三萬七千五百家凡起徒役無過家一人則三軍為三萬七千五百人矣三軍而車五百乘則天子六軍為車千乘矣王畿千里車萬乘六軍逓用千乘而寰内諸侯各從其國之制諸侯大國百里千乘三軍用五百乘次國七十里七百乘二軍用三百三十乘小國五十里車五百乘一軍用一百六十五乘率天子用十之一次國大國十之五小國三之一皆足成軍之數王畿之地将重根本故制田以鄉遂而寓六軍之制凡二更迭用之國勢壮而民不勞苦矣若夫采地以徃不可使家出一人於是制井田而寓軍之法亦異焉此出車出軍之制也總論王畿千里近郊五十里逺郊百里郊為鄉六鄉百里通十為同為百里者十提封九萬井九十萬井九十萬夫之地除山川城邑之屬三萬六千井為六萬四千井六十四萬夫之地除公田九分之一為五十萬二千夫又以一易再易三易通之三分去一為三十五萬四百夫率三百五十家賦一乘四丘為乘故曰丘乘積六鄉為千乘而餘率七家賦一兵積六鄉為七萬五千人此六軍之制也六遂及三等侯國皆如鄉之法畿方千里為千里者十如鄉之除為三百五十萬四千夫賦車萬乘卒七十五萬人為六軍者十此通畿之師也牧野之師傳七十萬意通畿皆發大司馬逓而征之大司馬教兵號名有縣鄙家鄉官野之異旂物有諸侯軍吏師都鄉遂郊野之别此見其逓征十年而役一遍凡三家可任者率十有一人則終身無過一再公上給事蓋先王忠厚之志更勞均佚不欲窮民之力也古者畿内之兵不出所以重内也卒有四方之役即用諸侯人耳或遣上公帥王賦亦不過元戎十乘以先啓行而已王有四方之事冡宰徵師於諸侯如詩常武云王命卿士太師皇父整我六師冡宰也小宰掌戒具虎賁氏奉書以牙璋發之而調兵諸侯亦各從其方之便髙宗伐楚葢裒荆旅武王克商實用西土至於征徐以魯費誓追貊以韓韓奕平淮夷以江漢略見於經可考也平王出戍遠以見刺當是時周都洛矣由洛戍申許無乃未甚逺而周人已不能堪況後世有勞師萬里者哉春秋之初從王伐鄭猶有蔡人衛人二百四十二年間王人會伐屢矣未嘗見師之出惟敗績于茅戎王師自出春秋深譏之說者謂先王征役先出六鄉不足乃發六遂不足以牙璋起諸侯兵亦謂方伯連帥所不能克然後六鄉之士出焉葢先王之於天下大則有方伯小則有連帥其待卒應變如身之使臂各適其事之逺近而已方伯連帥所不能克然後鄉遂之士應之象胥曰王之大事諸侯推此則出軍之法顧豈先虚其内以實其外哉周衰齊威公問管仲行伯用師之道仲曰公欲定卒伍修甲兵大國亦将修之而小國設備則難以速得志矣於是乃作内政而寓軍令焉刑法志三分其國為二十一鄉工商之鄉六士鄉十五唐尚書云士與農共十五鄉非也韋氏謂為軍是公帥五鄉焉國子髙子各長帥五鄉焉管子云公帥十一鄉者葢工商之鄉𨽻公五家為軌軌為之長十軌為里里有司四里為連連為之長十連為鄉鄉有良人以為軍令是故五家為軌故五人為伍軌長帥之十軌為里故五十人為小戎里有司率之四里為連故二百人為卒連長帥之十連為鄉故二千人為旅鄉良人率之五鄉一帥故萬人為軍五鄉之帥率之三軍有中軍之鼓有高子之鼓有國子之鼓公将其一高國各将其一凡三軍敎士三萬人車八百乘此如鄉之法然參周制車増三百乘徒損三百人春田曰蒐以振旅秋田曰獮以治兵伍其鄙三十家為邑邑有司十邑為卒卒有卒帥十卒為鄉鄉有鄉帥三鄉為縣縣有縣帥十縣為屬屬有大夫五屬五大夫各使治一屬焉並管子國語此如遂之法自邑積至於五屬為四十五萬家率九家二兵得甲十萬九十家一車得車五千乘長勺之戰威公自謂有帶甲十萬車五千乘是可為三軍者四葢以通國之數而逓征之率用車六之一士用十之三大略倣周改從輕便韋昭之説則是國内無農其六鄉為工商其十五則為兵而已五屬之地則皆農居之四民之外特有所謂士卒則是兵農分矣或曰齊變周制欲速得志於天下則釐國内之民在十五鄉者專使之為士卒亦必有田以授之苐不使出租税供他役庶調發雖煩而民亦不怨若其工商之六鄉為農之五屬則皆不以為兵東坡曰王者之兵非以求勝其法要在不可敗而已威文非决勝無以定伯其法在必勝繁而曲者所以為不可敗也簡而直者所以為必勝也周之制萬二千五百人而為軍萬之有二千二千之有五百其數竒而不齊唯其竒而不齊是以知為繁且曲也今夫天度三百六十均之十二辰得三十者此其正也五日四分之一者此其竒也使天度無竒一童子輪指數之足矣唯其不齊是以巧厯莫能算也晉武公初作一軍獻公作二軍恵公韓之敗作州兵二千五百家而成一軍率家五人文公蒐于被廬作三軍城濮之戰車七百乘楚蒍啓疆曰晉十家九縣長轂九百其餘四十縣遺守四千而平公治兵制南適四千乘則通國五千乘止用七百乘猶齊之法其後避六軍之號乃作三行中行右行左行清原之蒐遂作五軍襄公蒐於夷舎之景公邲之戰三軍増置大夫各二人則猶三行也至鞌之戰郤克請益車八百乘由是始作六軍上中下各増新軍厲公鄢陵之戰罷新上下軍悼公初尚四軍後遂舎新軍左傳編至魯成公作丘甲杜預注云丘出戎馬一匹牛三頭甸出長轂一乘馬四匹牛十二頭甲士三人步卒七十二人此甸所出今使丘出之譏重斂哀公用田賦以夫田為賦大變丘乘之制民無餘力矣至戰國齊愍以技擊强魏惠以武卒奮秦昭以鋭士勝荀卿曰齊之技擊亡國之兵也魏之武卒危國之兵也秦之鋭士干賞蹈利之兵也故齊之技擊不可以遇魏之武卒魏之武卒不可以直秦之鋭士秦之鋭士不可以當威文之節制威文之節制不可以敵湯武之仁義刑法志秦自襄公有田狩之事而已不能用周禮至繆公伯西戎始作三軍及孝公用商鞅鞅以周步百為畝畝百給一夫力餘地利不盡於是改制二百四十步為畝百步一夫又以秦地曠而人寡晉地狹而人稠誘三晉人發秦地優其田宅而使秦人應敵於外大率百人則五十人為農五十人習戰通典凡民年二十三附之疇官給郡縣一月而更謂更卒復給中都一歲為正卒復屯邉一歲謂戍卒凡戰獲一首賜爵一級自公士至大庶長十八級後通闗内列侯二十級皆以戰功相君長長平之役年十五以上悉發又非商鞅之舊矣始皇并天下聚郡縣兵器於咸陽銷為鍾鐻謀武之禮罷為角抵是時北築長城四十餘萬南戍五嶺五十餘萬驪山阿房之役各七十餘萬兵不足用而後發謫矣其後里門之左一切發之未及發右而廣勝起矣兵制羣書考索後集卷三十八
