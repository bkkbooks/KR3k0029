body:
  text: 羣書考索續集卷二十七宋章如愚編禮樂門樂序禮序始自郊廟而後及乎朝廷鄉黨惟樂亦然葢樂者樂也神祗祖考安樂之則人和可知矣然樂自天作樂由陽來至和之發也其治心也徳成而後知樂其治人也功成而後作樂至和之極也其粗易知其妙難知姑述所知以為樂志之釋成周郊廟樂律周官大司樂奏黄鍾歌大吕以祀天神奏太蔟歌應鍾以祀地祗奏姑洗歌南吕以祀四望奏㽔賓歌函鍾林鍾也以祭山川奏夷則歌小吕中吕也以享先妣奏無射歌夾鍾以享先祖云者黄鍾子大吕丑太簇寅應鍾亥也日月㑹於子則斗建丑日月㑹於丑則斗建子日月㑹於寅則斗建亥日月㑹於亥則斗建寅也即術家所謂子與丑合寅與亥合也其餘可以類推即太師所謂六律六同合隂陽之聲也陽聲黄鍾太簇姑洗㽔賓夷則無射隂聲大吕應鍾南吕林鍾中吕夾鍾古者下奏黄鍾之律登歌大吕之章所謂聲依永律和聲也聲律合於隂陽之和故能動天地感鬼神也後世祭祀下奏登歌俱是陽律故趙謹言以為不應古法誠有以也雖然此特論律吕之相合者耳必求其變則不可以槩言大司樂又曰冬至之日祀天圜丘以夾鍾為宫夾鍾房星卯位為天帝明堂故為天之宫黄鍾為角太簇為徴姑洗為羽六變而天神降者此言律之相次者也天尚道故取其道之自然也又曰夏至之日祀地方丘以林鍾為宫林鍾井鬼未坤位故為地之宫太簇為角姑洗為徴南吕為羽八變而地示出者此言律吕之相生者也隔八相生地尚功故取其功之所生也又曰祀宗廟以黄鍾為宫黄鍾虚危之位為宗廟故為人之宫大吕為角太蔟為徴應鍾為羽九變而人鬼可得而禮者此言律吕之相合也人尚情故取諸相合情之所感也止知樂律之相合而不知樂律之相次相生則不足以知樂之變通矣尚道尚功尚情之說按禮書又王氏隂陽心經所言與此暗合歴代樂律秦廢先代之樂故漢初制氏樂有司止能紀鏗鏘皷舞而不能紀其義東漢雲翹育命之舞後人莫知其所自出則知後世郊廟所奏樂律所謂相合相次相生其義安在唐舊志載唐初祖孝孫所制推樂祭圜丘以黄鍾為宫奏豫和之樂方澤以林鍾為宫奏順和之樂宗廟以太簇為宫奏雍和之樂已與大司樂正宫旋宫之文多所異同而神祗宗廟登歌俱奏肅和之樂所謂相合相生皆不言其義於是張文収盡遵大司樂舊制正宫旋宫下奏登歌無不同者其所不同惟不用雲咸韶夏濩武之舞而自用唐家十二和之曲而已迨宋朝易和為安祭天以高安祭地以静安宗廟以理安天地宗廟登歌同用嘉安安與和雖異名而同實者樂章皆一代之所自制有所不必辨也其所不可不辨者鍾律也國初所用之樂乃後周王朴之所制也黄帝調十二律而為十二均者蓋取旋相為宫之義王朴調十一律而為十二均者以悉主黄鍾之宫黄帝用宫王朴虚宫猶用中虚中也十二均八十四調則五聲並行其間毎一均七調十二均八十四調也十一均八十一調則四聲並足其數徴商羽角大抵朴之論律以黄鍾為主故言十一聲以宫為主故止言四也見通鑑真宗初年太常言郊廟止用黄鍾一調未甞隨月轉律也樂工單仲辛遂改為八十四調是仲辛之制與黄帝合矣果孰是孰非耶愚試為之辨漢樂不古漢承秦弊雅樂論亡制氏所掌自鏗鏘之外無他事其後河間獻王號通樂律推而上之僅備嵗時荆州杜䕫善知八音攷而正之徒設鍾簴而李延年之叶律乃無異也宋朝樂律樂聲高則聲清近於哀思下則聲濁近於緩散和峴以王朴之樂為聲高遂下一律人尤以為高謂其黄鍾乃古夾鍾信如或者之言則大司樂奏夾鍾為宫以祀天朴豈與此暗合歟仁宗皇祐中詔定新樂是单仲辛之調必有不合者矣於是李照又下王朴之律失之太濁歌工賂鑄工宻减銅劑而聲稍清歌乃叶照初不之知照亦不足謂之知音矣又王朴編鍾皆不圜而側垂李照改鑄圜其形而下垂叩之揜欎不揚其鑄鍾長甬震掉不和劉羲叟以為與周景無射之鍾無異未㡬仁宗以疾其樂遂廢不用先是鑄寫務得古編鍾一其形不圜而側垂與王朴夷則清聲合乃知朴之所知者樂音也故不局於器照之所知者樂器也故不逹於音何以知其然耶劉㡬定元豐新樂以律生尺也魏漢律定政和新樂以指生尺也蔡京薦漢律定律以上中指而為寸生尺取大禹身為度之義皆局於器而昧於音者故李照胡安定以尺生律照累黍之從失之長安定累黍之衡失之短和峴以表定尺阮逸以量求音皆非也人皆謂房庻以律生尺而黍用一桴二米者僅得之曽不知庻之言按西漢律厯志一黍之下脫之起積千二百黍八字故理不通庻乃以黄鍾律長九寸其中容千二百黍九寸加一寸以為尺西漢律厯志乃劉歆三統厯杜收甞非之矣故司馬君實以尺生律本之胡安定范蜀公以律生尺本之房庻亦未免局於器而已處士徐復有言曰古人寓器以聲不求其聲而更其器不可用也意者王朴之樂有得於聲而他皆未之或知也宋朝樂律之議仁宗廟范公鎮甞論古樂以為聲音生於無形故後世必假有形之物以傳其法於是有十不同之辨神廟朝劉公㡬甞論樂以為聖人作以紀中和之聲所以導中和之氣清不可太高重不可太下宋朝太常樂之律凡三等王朴之樂一也李照之樂二也阮逸之樂三也而議者以為王朴阮逸之黄鍾與李照樂之太簇相當王朴阮逸之樂編鍾編磬各十六雖有四清聲而實差黄鍾大吕之正聲也李照之樂編鍾編磬各十二雖有黄鍾大吕而全缺四清聲非古制也昔范蜀公司馬文正公議樂律徃復數千言卒莫能定而異時崇寧中作大晟樂蜀公一故吏以公舊所改制之說來上復以古人以身為度之法而大樂以定不愧韶勺孰謂是學吏猶能之乎歴代郊廟樂章虞書曰詩言志歌永言又曰拊摶琴瑟以詠此即詠歌章之詩於堂上所謂貴人聲也樂本傚人非人傚樂故凡六律八音以歌為本想當時賡歌與九叙惟歌良哉惰哉戒之董之皆有勸戒之意被之樂章恊于音律于以和神人格祖考皆可也周官大司樂所謂歌大吕以祀天神歌應鍾以祀地示歌夾鍾以享先祖者即思文清廟執競諸詩恊以鍾律之調被之絃歌之聲所謂一唱三嘆有遺音也漢初宗廟奏嘉至永至比古者采齊肆夏之詩乾豆登歌比古者清廟之歌乃叔孫氏因秦樂人以制之耳高祖有房中之歌七章乃唐山夫人述楚聲也武帝郊祀十九章之歌備述功徳格于幽顯乃集秦楚之歌謳相如之詩賦畧論律吕以合八音而已安得虞周之歌頌勸戒之實意哉自漢而下諸史所志歴代郊廟與日月星辰社稷諸祀樂章皆當時臣下創為大名多為好詞溢美功徳不足多論亦不必多辨也郊廟鼓鼗筦絃大司樂雷鼔雷鼗以祀天神靈鼓靈鼗以祀地示路鼓路鼗以祀人鬼鄭氏注雷鼓雷鼗八靣靈鼔靈鼗六靣路鼓路鼗四靣唐開元中蜀人有繪圖以獻者一鼓遂為八靣者既不可考擊乃於縣間别置散鼓宋朝乾徳四年詔廢不用今太常於郊廟之祭所用之鼓可知矣澠水燕談曰神有尊卑則數有多寡幾靣鼓猶言幾兩車幾區宅耳愚按唐書史思明以腰鼓三百靣遥脅之豈一鼓而三百靣耶二鄭釋經既已模稜後人承訛一至此極雖禮樂之節目亦未易言矣况大本乎是故管有孤竹孫竹隂竹之異琴瑟有雲和空桑龍門之辨者即黄帝堯舜氏雲咸大韶所奏之八音各隨樂舞以祀天神人鬼而已苟復如雷鼓强為之說則又失之矣大祭小祀皆用樂天地四方五帝日月星辰斗極宗廟社稷先農先師山川羣望百神之祀其牲幣器數樂章樂舞皆有等級諸志各列一代之升降因革自有司存不必序辨而其所以皆用樂者何也按仁宗嘉祐中禮官議曰傳稱祭天以煙為歆降之始以血為陳饌之始祭地以埋為歆神之始以血為陳饌之始祭廟以灌為歆神之始以腥為陳饌之始然則天地宗廟皆以樂為歆神之始者合夫祭有三始之義也天地之間虚豁而不見其形者陽也鬼神居天地之間不可以人道接也樂由陽來聲屬於陽故以樂之聲音號發於天地之間庻幾神明聞之因而來格也商人之祭先求諸陽葢謂此也周人尚臭四時之祭灌地以求神求諸隂之義也然則天地神祗人鬼之祀不可去樂明矣所言當理何李照輩所更樂器未逹此理耶特存之以為祭祀用樂說封禪獨不用樂大祭小祀皆用樂惟封禪非常之祀獨不用樂者何也漢武親郊泰畤采詩夜誦昏祠至明異乎南北郊之正祠矣其登封泰山凡再至焉自有祕祠其巔而無用樂之文光武登封先令石工刻所為記於山上而乃燎祭於山之下羣神皆從用樂如南郊事畢登封璽印玉牒發石泥封乃下唐高祖登封之禮與光武同是山之下用樂而山之上不用樂也至宋朝真宗將封泰山有司按故事山上止登歌封安禪安之章山下則設宫縣二舞其山巔圜臺亞獻終獻例不用樂夫登封祭天告厥成功猶南郊祭天以蕆嵗事樂舞均可用也歴代何為而不同葢秦漢封禪所以祈長年希神仙所祈之言祕不可宣與南郊之意異趣則樂舞安所用之觀郊祀志言武帝自有祕祠其巔可以意見矣樂成感格虞周作樂九成九變祖考格神示降鳯凰儀百獸舞羽毛鱗介之物山林川澤之示皆可致幽而鬼神微而鳥獸隨感而應而况於人乎何漢唐以來不聞有是也葢古者樂律合隂陽之聲樂舞紀功徳之實采詩觀民風因而被之樂章伶州鳩曰天子省風作樂器以鍾之又孔子刪詩皆被之管絃又以見安樂怨怒哀思之情故治亂之音足以動天地感鬼神致諸福之物也自漢人樂律莫能言其義而樂舞又莫知其所自出凡大風天馬之歌被之樂章自文功徳又非出於斯民之至情風俗之真機其何能有所感格哉雖然天降時雨山川出雲嗜慾將至有開必先民之至情樂之真機有不可泯者如唐武氏未興天下歌嫵媚娘韋氏未起天下歌桑條韋穉耋之謡其思無邪治亂之音哀樂之所由兆宜於是而占之殿庭通用文武二舞唐樂十二和周曰十二順故宋朝更為十二安取治世之音安以樂之義凡郊廟社稷星辰總以安為名唐初有九功七徳之舞故宋朝郊廟殿庭通用文徳武功之舞乾徳四年和峴言國家以揖遜得天下次以征伐請改殿庭所用文舞為元徳升聞之舞武舞為天下大定之舞遂改唐太宗舞圖用一百二十八人為八佾分為八行毎行十六人文舞皆着冠履服袴褶執笏引舞者二人各執五采纛武舞皆金甲執㦸引舞者執五采旗象太祖平諸國仁宗英宗朝二舞止用六十四人太宗淳化二年和㠓請改元徳升聞為天下化成改天下大定為威加海内象太宗平諸國並與文徳武功之舞郊廟通用其大畧皆因唐制也唐貞觀中張文收取漢朱鴈天馬之遺為景雲河清之歌以為燕樂而宋朝和峴亦請譔神龜甘露紫芝嘉禾玉兎五瑞各為一曲毎朝㑹登歌以之為首亦漢唐舊制也然則宋朝之樂舞樂章皆因漢唐之舊乎曰非也漢唐元㑹之侈惟獨宋朝不然已甞備論之矣昔太祖及太宗初受朝賀猶用教坊樂未幾而更以雅樂登歌二舞自是為定制至太宗増琴為九絃取君臣文武禮樂正民心之意増阮為五絃取金木水火土五材並用之義且謂鄭聲非中和之道而雅正之音可以治心而真宗不喜鄭聲或為新詞新聲者未甞宣布于外故其仁宗及英宗二舞復古八佾之制累聖相承者如此異乎唐太宗悲悦不由乎樂之言矣惜乎景祐元豐政和所用新樂非祖宗之舊耳朝㑹用雅樂宋朝臨軒之樂為隆安飲食為和安尊號册寳為正安正冬朝賀為求安此樂章之名也乃竇儼陶榖太祖朝蘇易簡太宗朝晁逈楊億等真宗朝譔述其樂舞之名則和峴太祖朝和㠓太宗朝之所更定自太祖元㑹用雅樂設宫縣冬至登歌二舞羣臣禮飲或五行七行太官賜食太宗及真宗遂為定式葢樂章之所歌詠樂舞之所形容乃削平僣偽一統之意所謂太常雅樂也大朝㑹大祭祀則用之其嵗時燕享則用敎坊樂甞觀唐初朝㑹必奏秦王破陣樂示以武功定天下也開元天寳升羌部於堂上即羯鼔噍殺之音涼州甘州伊州之曲也羯鼓以槌撃之其聲透空最逺未幾禄山反涼州甘伊二州皆䧟孰謂聲音不足為治亂之兆乎宋朝靖康之變未作人間習為畨笛畨鼓畨舞使當時常如祖宗朝不忘本始以表風俗安得有是不虞之變哉讌樂周有嘉魚鹿鳴諸詩所以燕嘉賔漢有黄門鼓吹所以樂羣臣至宋朝燕樂羣臣嘉賔多用教坊樂開寳中平嶺南得内臣之聰警者俾於教坊習樂嶺南多宫官號曰簫韶部雍熈中改曰雲韶部每宫中内宴則用之其大曲十三皆太宗之所親製萬年歡中樂普天獻壽等是也至于仁宗時内傳雲韶部遂不復補以其無與於羣臣嘉賔歟然於太宗淳化三年命兩制分譔鄉飲樂章凡三十四章有鹿鳴八章二八句南陔二章二八句嘉魚八章二四句崇丘二章二八句關雎七章二四句鵲巢六章二四句諸詩立名命意與古詩同而措詞演句多倍於古其情親其詞腆誠有補於風化考之三朝國史九朝帝紀淳化中雖講明此理而實未甞行至于真宗朝亦然豈是理終不可施於今歟宋朝射享之禮雖常行而其樂章亦是常所用者今不復論辨清樂唐㑹要論清樂乃九代遺音其始即清商三調是也漢氏以來舊曲自晉播遷其音分散符氏㓕凉得之傳于二秦宋武入關收入江南及隋平陳文帝聽之曰華夏正聲也乃置之清商部總謂之清樂至煬帝乃立清樂西凉等為九部如白雪白紵庭花春江月夜等是也葢自周隋以來多用西凉龜茲樂其曲調世俗所知也果可謂之九代遺音乎庭花夜月亡國之音豈華夏正聲一變而為此乎舊唐志云清樂至唐武后時猶存六十三曲春江花月夜玉樹後庭花陳後主所作也堂堂汎龍舟隋煬帝所作也白雪周曲遺聲也公莫巾舞象項伯以衣袖蔽劒也巴渝象漢高帝以巴渝人擁盾伐楚也昭君王嬙入匈奴也白紵吴地所出吴舞吴歌也子夜團扇懊憹春草烏夜啼石城莫愁採桑皆晉宋齊梁歌舞所傳於後者故隋文謂之九代遺音耳按舊唐志所載如此則知雅聲少鄭聲多自子夜團扇而下皆滛聲悲思之曲謂之九代遺音則可謂之華夏正聲未可也軍樂大司樂王帥大獻則令奏愷樂樂師敎愷歌遂倡之鏄師鼓愷樂凡軍之夜三鼜皆鼔之所謂軍樂也晉文公敗楚于城濮振旅愷以入于晉唐太宗平羣盗被金甲奏愷獻㨗皆愷歌也至宋初有鈞容直取鈞天之義籍軍中之善樂者廵省遊幸則導車駕而奏樂又有東西班夜奏樂於行宫祠祀駕回及園苑賜宴舘遇使人分用諸軍樂諸州亦有衙前樂營皆所謂軍樂也然周禮太師掌執同律以聽軍聲又非止於軍樂矣武王伐紂吹律聽聲而知必勝者孟春王於季冬殺氣相并而音尚宫同聲相應也太史公律書曰六律為萬事根本其於兵械尤重望敵而知吉凶聞聲而效勝負古今知音必有妙於此者非徒歌舞之謂也樂曲調古樂有三調清調平調側調也唐舊志側調謂之瑟調漢三調即周房中遺音白雪調也隋鄭譯八十四調又有新聲犯聲側聲正殺寄殺偏字傍字雙字半字之法非古樂調也又五音宫商角為從聲者律從律吕從吕也徴羽為變聲以律從吕吕從律也故從聲以配君臣民變聲以配事物六律為君聲則商角皆以律應徴羽皆以吕應六吕為君則商角皆以吕應徴羽皆以律應也隋志載鄭譯七調之說曰周有七音之律五音與變宫變徴也漢志有七始之義黄鍾為天始林鍾為地始太蔟為人始姑洗為春㽔賔為夏南吕為秋應鍾為冬是也此以黄鍾為正而隔八以相生也故黄鍾為十三律之本而七始得七音之正鄭譯之言可謂正矣何為從聲變聲無復條理而萬寳常預知其為亡國之音乎想新聲犯聲偏字旁字不勝煩碎而近乎哀思如庭花月夜等曲也或曰唐人所為曲哀樂尚相諧㑹今人哀思而歌樂調樂聲而歌怨詞語雖切而不能感動人心由聲與意不相諧也豈信然乎愚謂少陵淵明無詩不及酒可也今人無曲不及色乃見風俗之薄五音伶倫取嶰竹斷兩節間長三寸九分而吹之以為黄鍾之宫謂之含少次制十二筩寫鳯之鳴辨雌雄而為律吕夫十二律皆不盈尺黄鍾含少近三寸餘伶倫吹以寫鳯典同吹以辨隂陽太史公所謂聞聲而知勝負班志所謂氣合而生風者何由也詩曰鳯凰鳴矣于彼高岡荀卿曰有鳯有凰其聲若簫葢鳯有中和之氣高潔之情吹律以寫鳯鳴則律吕之調自應宫商之音自和古人以氣聽以聲聽聲氣俱和故可合天地之風氣而辨隂陽知勝負也淮南子曰黄鍾之律九寸而宫音調晉志云黄帝作律以玉為管長尺而六孔以為十二月音是樂律長不過尺也晉荀朂梁武帝制黄鍾之笛或長二尺八寸餘或長三尺八寸凡十二笛短者不减二尺餘何哉京房曰截管為律吹以考聲其聲㣲而體難知故作準以代之荀朂梁武之笛亦京房作準之意耳以此知古人妙於聽聲故黄鍾含少不四寸而可知後世局於形器黄鍾之笛數尺十二鍾之制如是之大猶不能辨其為宫為商為角也晉志之言曰古者調律出於耳聽後世據尺度而為之適足易差觀斯言則知後世鍾律器數之辨不足多較是非惟妙於知音斯可耳樂章生於人心韓琦論樂音之起生於人心是以喜怒哀樂之情感於物則噍殺啴緩之聲隨而應之非器之然也祖宗以來通用王朴之樂未甞更易以至天下無事垂八十載而樂之用非不和頃因燕肅之女加磨鑢李照再加改作洎阮逸胡瑗繼至盛言照樂穿鑿再令造律則又圍徑乖古鄧保信續作新法亦復長廣未合臣竊計之不若窮作樂之源為致治之本使政令平簡民純熈洽海内擊壤鼓腹以歌太平斯乃治古之樂可得以器象求之乎樂律聲音律笛鍾均五聲八音十二律十二笛十二鍾十二均之制與夫京房律準梁武帝四通荀朂錢樂之法其詳已見律志諸説此不復著大抵樂以人聲為本聲以能聽為主而已人有所不必辨者如所謂霓裳羽衣曲觀其名則知其為靡慢之音矣新唐志云開元中河西節度楊敬忠獻此曲長恨歌以為因楊妃之舞而為此曲王建詩云聽風聽水作霓裳乃龜茲國王聽風水之聲而作之故河西得之以獻所謂凉州甘州伊州皆其類也定律始於尺定尺始於黍若世無夔牙則當以法自據雖有清濁高下其失不逺顧以胡瑗八百一十方分之法取上黨秬黍之中為據昔泰始中甞命定律荀朂以為後世之尺長於古者四分有餘及得古尺騐之果然夫尺之長短絫黍而為之也黍之小大失其宜則尺之長短失其度矣尺之長短失其度則樂之高下失其聲矣此反本窮源之論也樂律定於近世之儒近世鍾律之議愈舛蔡氏獨究其本原為之説所以有得於古人之意古樂之亡久矣然秦漢之間去周未逺其器與聲猶有存者故其道雖不行於當世而其為法猶未容有異論也逮于東漢之末以接西晉之初則已浸多説矣歴魏周齊隋唐五季論者愈多而法愈不定爰及宋朝功成治定理宜有作建隆皇祐元豐之間葢亦三致意焉而和胡阮李范馬劉揚諸賢之議終不能以相一也而况於崇宣之季奸諛之㑹黥湼之餘而能有以語夫天地之和哉丁未南狩今六十年神人之憤猶有未攄是故不遑於稽古禮文之事然學士大夫因仍簡陋遂無復以鍾律為意者則已甚矣吾友建陽蔡君元定季通當此之時乃獨心好其說而力求之旁搜逺取巨細不捐積之累年乃若㝠契著書兩卷凡若干言予甞得而讀之愛其明白而淵深縝宻而通暢不為牽合傅㑹之談而横斜曲直如珠之不出於盤其言雖多出於近世之所未講而實無一字不本於古人已試之成法葢若黄鍾圍徑之數則漢斛之積分可考寸以九分為法則淮南太史小司馬之説可推五聲二變之數變律半聲之例則杜氏之通典具焉變宫變徴之不得為調則孔氏之禮䟽因亦可見至於先求聲氣之元而因律以生尺則尤所謂卓然者而亦班班雜見於兩漢之志蔡邕之説與夫國朝㑹要以及程子張子之言顧讀者不深考其間雖或有得於此者而又不能無失於彼是以晦蝕紛拏無復定論大抵不拘攣於習熟見聞之近即肆其胷臆妄為穿穴而無所据依季通乃能奮其獨見超然逺覽爬梳剔抉參互考尋用其半生之力以至於一旦豁然而融㑹貫通焉斯亦可謂勤矣及其著論則又能推原本根比次條理管括機要闡䆒精微不為浮詞濫説以汨亂於其間亦庻㡬乎得書之體者予謂國家行且平定中原以開中天之運必將審音叶律以諧神人當此之時受詔典領之臣能得此書而奏之則東京郊廟之樂將不待公孫述之瞽師而後備而參摹四分之書亦無待乎後世之子雲而後知好之矣西山蔡氏律歴新書序聲律黄鍾之宫為五聲之中統乎五聲者也五聲之序宫最大而沉濁羽最細而輕清商之大次宫徴之細次羽而角居四者之中焉然世之論中聲者不以角而以宫何也曰凡聲陽也自下而上未及其半則屬於隂而未暢故不可用上而及半然後屬於陽而始和故即其始而用之以為宫因其毎變而益上則為商為角為變徴為徴為羽為變宫而皆以為宫之用焉是以宫之一聲在五行為土在五常為信在五事為思葢以其正當衆聲和與未和用與未用隂陽際㑹之中所以為盛若角則雖當五聲之中而非衆聲之㑹且以七均論之又有變徴以居焉亦非五聲之所取正也然自其聲之始和者推而上之亦至於變宫而止耳自是以上則又過乎輕清而不可以為宫於是就其兩間而細分之則其别又十有二以其最大而沉濁者為黄鍾以其極細而輕清者為應鍾及其旋相為宫而上下相生以盡五聲二變之用則宫聲常不越乎十二之中而四聲者或時出於其外以取諸律半聲之管然後七均備而一調成也黄鍾之與餘律其所以為貴賤者亦然若諸半聲以上則又過乎輕清之甚而不可以為樂矣葢黄鍾之宫始之始中之中也十律之宫始之次而中少過也應鍾之宫始之終而中已盡也諸律半聲過乎輕清始之外而中之上也半聲之外過乎輕清之甚則又外之外上之上而不可為樂者也由是論之則審音之難不在於聲而在於律不在於宫而在於黄鍾葢不以十二律節之則無以著乎五聲之實不得黄鍾之正則十一律者又無所受以為本律之宫也今有極論宫聲之妙而無曰黄鍾云者則恐其於聲音法制之間猶有所未盡也夫以聲音法制之粗而猶有未盡則雖有黄帝大舜之君伶倫后䕫之佐亦如之何徒手而可以議大樂之和哉又有為宫當配仁之説者恐亦非是迹其所以葢以仁當四徳之元而有包四者之義耳夫仁木行而角聲者也以之配宫則仁既不安而信亦失據然以為可包四者則不害其有是理也夫五行之序木為之始水為之終而土為之中以河圖洛書之數言之則水一木三而土五皆陽之生數而不可易者也故得以更迭為主而為五行之綱以徳言之則木為發生之性水為貞静之體而土又包育之母也故木之包五行也以其流通貫澈而無不在也木之包五行也以其歸根反本而藏於此也若夫土則水火之所寄金木之所資居中而應四方一體而載萬類者也故孔子贊乾之四徳而以貞元舉其終始孟子論人之四端而不敢以信者列序於其間葢以為無適而非此也是則宫之統五聲仁之包五常葢有並行而不悖者矣何必奪彼以予此然後快於其心哉文公文集律吕推十二律旋相為宫及十二律上生下生與夫變宫變徴之説凡十二律各以本律為宫而生四律如黄鍾為宫則太蔟為商姑洗為羽林鍾為徴南吕為角是黄鍾一均之聲也若林鍾為宫則南吕為商應鍾為角太簇為徴姑洗為羽是林鍾一均之聲也各就其宫以起四聲而後六十律之聲備非以黄鍾定為宫太蔟定為商姑洗定為羽林鍾定為徴南吕定為角也但黄鍾大吕太蔟夾鍾姑洗中吕蕤賔林鍾夷則南吕無射應鍾為十二律長短之次宫商角徴羽為五聲長短之次黄鍾一均上生下生長短皆順故得各用其全律之正聲十二律名今俗樂亦用之合字即是黄鍾但其律差高耳筆談言之甚詳自林鍾之宫而生太蔟之徴則林鍾六寸而太蔟八寸徴反長於宫而聲失其序矣故以十二律而言雖當為林鍾上生太蔟而以五聲而言則當為宫下生徴而得太蔟半律四寸之管其聲方順又自太蔟半律四寸之管而生南吕五寸有竒之商則於律雖本為下生而於聲反為上生矣自南吕五寸有竒之商而生姑洗七寸有竒之羽則於律雖本為上生而於聲則又當用其半而為下生矣自姑洗半律三寸有竒之羽而生應鍾四寸有竒之角則於律雖為下生而於聲反為上生矣其餘十律皆然然孔疏葢知此法但言之不詳耳半律杜佑通典謂之子聲者是也此是古法但後人失之而唯存黄鍾大吕太簇夾鍾四律有四清聲即此半聲是也變宫變徴始見於國語注中及後漢樂志乃十二律之本聲自宫而下六變七變而得之者非清聲也如黄鍾為宫則第六變得應鍾為變官第七變得蕤賔為變徴如林鍾為宫則第六變得㽔賔為變宫第七變得大吕為變徴也凡十二律皆有二變一律之内通前五聲合為七均祖孝孫王朴之樂皆同所以有八十四調者葢毎律各添此二聲而得之也蔡氏新書此説甚詳候氣之説其中亦已論之葢埋管雖相近而其管之長短入地深淺有不同故氣之應有先後耳非以方位為先後也但畵一圖朝夕㸔誦仍於指掌間輪之久久自熟乃見其妙此又可驗凡事皆然别無竒巧只常久而習熟便是妙處也文公文集金聲玉振奏之以金所以極其變節之以玉所以成其章金聲或洪或殺清濁萬殊玉振清越和平首尾如一故樂之作也八音克諧雖若無所先後然奏之以金節之以玉其序亦有不可紊者葢其奏之也所以極其變也其節之也所以成其章也變者雖殊而所以成者未甞不一成者雖一而所歴之變洪纎清濁亦無所不具於至一之中聖人之知精粗小大無所不周聖人之徳精粗小大無所不備其始卒相成葢如此此金聲而玉振之所以譬夫孔子之集大成而非三子之所得與也然即其全而論其偏則纎而不能洪清而不能濁者是其金聲之不備也不能備乎金聲而遽以玉振之雖其所以振之者未甞有異然其所振一全一闕則其玉之為聲亦有所不能同矣文公文集樂器八音因革按諸志匏瓠也女媧氏列管於匏上納簧其中爾雅謂之巢大者曰竽小者曰和今以木漆代匏竹管也三孔曰籥淳古以葦為之簫舜所造爾雅謂之筊長尺四寸漢世有洞簫又有管長尺圍寸笛漢武帝工人丘仲所造元出於羗中長尺有咫箎吹孔有觜如棗邊箎出於邊吹觱篥本名悲栗其聲悲出於塞外木柷敔也柷以舉樂敔以止樂今貫為指板絲琴也伏羲所造舜五絃武王加之為七絃栁渾造一絃琴十二柱如琵琶形擊之以竹曰擊琴新唐志云琴工猶傳楚漢舊聲蔡邕五弄楚調四弄瑟太昊所造筝本秦聲或言蒙恬所造非也如琴而絃少京房造五者准十三絃乃筝也筑如筝細項以竹擊之如擊琴琵琶四絃漢樂也秦長城之役有絃鼗而鼓之者漢武帝以宗女嫁烏孫以為馬上樂今俗謂之秦子阮咸亦秦琵琶也唐武后時蜀人得之古冢晉竹林七賢圖阮咸所彈與此同因謂之阮咸箜篌漢武帝樂人侯調所作竪箜篌羌樂也體曲而長二十二絃竪抱于懐兩手齊奏俗謂之擘箜篌又有鳯首箜篌唐善子所作如軫七絃土塤也帝堯埏土為之形如鵞卵六孔銳上豐下新唐志云土則附革而為鞚缶形如覆盆古西戎之樂以四杖擊之金鍾也黄帝工垂所造大曰鎛爾雅謂之鏞小而編之曰編鍾中曰瓢小曰醆錞于圜如碓頭鐃木舌揺之以和鼓石磬也泗濵浮磬是也梁有銅磬葢今方響之類方響以鐵為之長九寸廣二寸貟上方下架如磬而不設業倚於架上以代鍾磬人間所用者才三四寸耳銅鈸出於西戎其圖隱若浮漚貫以韋皮相擊以和樂銅鼓虚其一靣覆而擊之扶南天竹類皆如此革鼓也雷鼓路鼓靈鼓以多寡之數言之也夏后氏加之以足謂之足鼓殷人貫之以柱謂之楹鼓周人縣之謂之縣鼔後世從殷制謂之建鼓晉鼓應鼓與金奏相參小鼓有柄曰鞞大曰鼗揺之以和鼓腰鼓大者瓦小者木皆廣首而纎腹本羌鼔齊鼔大如漆桶檐鼔小如甕羯鼓正如漆桶兩手俱擊以其出羯中故曰羯鼓亦謂之兩杖鼔都曇鼔小於羯鼓擊之以槌毛貟鼓雞婁鼔皆腰鼓也樂縣周禮天子宫縣諸侯軒縣大夫曲縣士特縣縣之横曰簨立曰簴飾簨以飛龍飾簴以飛亷鍾簴以摯獸磬簴以鷙鳥上列樹羽傍垂流蘇周制也縣以崇牙殷制也飾以博山承以花跗覆以華葢上集翔鷺後世之所加也漢魏晉宋齊梁六朝宫縣凡二十架鏄鍾十二編鍾四磬四也隋増為三十六簴唐初因之又設熊羆鼓吹按十二高宗時蓬萊樂縣充庭凡七十二架夫郊廟百神之祀㑹朝宴享之禮各有器數隋唐尚侈大畧如此惟宋朝樂縣未甞過三十六簴將相大臣之家歌兒舞伎容或有之而樂之器數不聞凌僣至今大家猶然亦足見為國以禮可與天地相為長久也樂有八音之節樂有五聲十二律更唱迭和以為歌舞八音之節其所以蕩滌邪穢消融渣滓者人若無所用其力也故學者之終必深有得於此然後成焉葢其義精仁熟而自和順於道徳也文公語注聲相聯如貫珠五音六律不具不足為樂五音合矣清濁高下如五味之相濟而後和合而和矣欲其無相奪倫然亦豈宫自宫而商自商乎不相反而相連如貫珠可也文公語注樂未作擊鎛鍾鎛鍾甚大特懸鍾也衆樂未作先擊此鍾以發其聲衆樂既闋乃擊特懸磬以收其韻文公語注六十聲如甲子又曰樂之六十聲如六十甲子凡十二律毎律管五聲如黄鍾自管五聲大吕太簇夾鍾以下毎律皆管五聲甲子支干亦然甲子管丙子戊子庚子壬子乙丑管丁丑己丑辛丑癸丑以下皆然便是樂一般以十干合十二支而成六十甲子以五聲合十二律而成六十聲若不相屬而寔相為用也但術家有納音之説不可曉前軰多論此皆定説遺書云三命是律五星是厯即此説也文公論作樂體雷聲地中先有雷然後能出而發其胷中元無樂如何作樂天雷本發於地則奮然而震驚此亦順動之象也故先王體此作樂夫樂者亦本諸人心發而寓諸金石鍾鼓之間今人湏㸔雷之所自發處及樂之所自起處則豫之義可知不然則徒見震驚之聲則謂之雷論清濁調其宫角則謂之樂此不足與語雷聲之義也上天下澤履此易之言禮雷出地奮豫此易之言樂大凡天下事不知其理不可便言其無有如栁子厚言樂不能殖財只為自不見此道理成公文集樂者葢本乎政樂者本乎政也政善民安則天下之心和故聖人作樂以宣暢其和心逹于天地天地之氣感而大和焉天地和則萬物順故神祗格鳥獸馴周子通書羣書考索續集卷二十七
