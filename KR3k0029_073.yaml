body:
  text: 羣書考索後集卷七宋章如愚編官制門翰苑類翰林學士承㫖唐始置翰林學士無承㫖至憲宗永貞元年始命鄭絪為承㫖位在諸學士上居東第一閣大誥令大廢置丞相之密畫內外之密奏上之所甚注意者莫不専受専對承㫖院記宋承㫖不常置以院中久次者一人充續㑹要翰林學士唐學士之職本以文學言語備顧問出入侍從因得參謀議納諫諍其禮尤寵職林翰林院者在銀臺門內蓋藝能伎術召見者之所處也韋執誼翰林故事文書詔令則中書舍人掌之職林自太宗時名儒學士時召草制然猶未有名號乾封以後始號北門學士𤣥宗初置翰林待詔掌四方表疏批答應和文章職林繼以詔敕制誥悉由中書多壅滯始選朝官有詞藝學識者入居翰林供奉别㫖然亦未定名制詔書敕猶或分在集賢集賢殿書院學士掌刋緝經籍凡圖書遺逸賢才隱滯則承㫖以采之謀慮可施於時著述可行於世者考其學術以聞凡承㫖撰述文章校理經籍唐志𤣥宗開元二十六年始以翰林供奉改稱學士别建學士院於翰林院之南俾専內命其後又置東翰林院於金鑾殿之西隨上所在韋執誼翰林志選用益重而禮遇益親至號為內相又以為天子私人凡學士無定員下自校書郎上及諸曹尚書皆為之入院一嵗則遷知制誥未知制誥者不作文書晉天福五年詔翰林學士院公事宜並歸中書舍人自是舍人晝直者當中書制夜直者當內制至少帝開運元年復詔翰林學士與中書舍人分為兩制各置六員五代職官志宋翰林學士掌內制凡制誥赦𠡠國書及宫禁所用之文詞凡后妃親王公主宰相節度使除拜則學士草詞授待詔書訖以進赦降德音則先進草大詔命及外國書則具本禀奏傳書亦如之續㑹要太宗淳化二年以翰林學士賈黃中蘇易簡同管勾差遣院而學士領外司自此始會要自是學士兼領他司止焉職名同元豐官制行始専典內制故必帶知制誥見孝宗會要建炎兵興降詔之禮多廢紹興舉行故事凡六尚書及翰林端明殿學士與曽任宰執官不允並降詔從綦崇禮之請也中興㑹要隆興改元詔學士及經筵官內宿稍復祖宗故事乾道又詔郊祀大禮依舊鎖院宣麻先是紹興三十一年詔明堂大禮合加恩官僚權宜更不鎖院宣麻至是始復從周必大之請也直學士院權直唐制官序未至而他官權攝者為直官麈史云許敬宗直記室是也唐五代有翰林學士院而無權直宋初開寶二年以中書舍人李昉知制誥盧多遜並直學士院而直院之名始此塵史云但以資淺者為之其實正官也六年以知制誥張淡權直翰林院時以多遜使江南使還如故職而權直之名始此凡他官入院未除學士謂之直院學士俱闕他官暫行文書謂之權直㑹要續會要云孝宗乾道九年以崔端詩為翰林權直淳熙中議者謂翰林非専掌制誥之地乃改為學士院權直孝宗會要列曹尚書尚書唐虞官也書曰龍作納言詩曰仲山甫王之喉舌士之權貴不過尚書又曰唐虞曰納言其在周官為內史機事所總號令攸發漢官解說尚上也言最在上總領之也辨云尚猶奉也百官言事當省案平處奏之故曰尚書尚食尚方亦然韋昭辨釋名周禮司㑹中大夫二人司㑹主天下之大計計官之長若今之尚書通典秦時少府遣吏四人在殿中主發書故謂之尚書通典尚猶主也漢初有尚冠尚衣尚食尚浴尚席尚書謂之六尚戰國時已有尚冠尚衣之屬矣宋志漢初因之武昭以後其任稍重六典武帝遊宴後庭始用宦者主中書以司馬遷為之中間遂罷其官以為中書之職成帝建始四年罷中書宦者又置尚書五人一人為僕射而四人分為四曹掌圖書祕記章奏之事各有其任其一曰常侍曹主丞相御史公卿事其二曰二千石曹主刺史郡國事其三曰民曹主吏民上書事其四曰主客曹主外國夷狄事後又置三公曹主斷獄是為五曹晉百官志尚書舊不分曹至是始分曹通典後漢光武親攬吏職天下事皆上尚書與人參决乃下三府六典以三公曹嵗盡考課諸州郡事改常侍曹為吏部主選舉祠祀事民曹主繕修功作鹽池園苑事客駕主護駕羌胡朝賀事二千石曹主辭訟事中都官曹主水火盜賊事合為六曹是時尚書雖有曹名不以為號晉職官志漢末改吏部為選部六典靈帝以侍中梁鵠為選部尚書於此始見曹名魏改選部為吏部主選部事又有左民客曹五兵度支凡五曹晉置吏部三公客曹駕部屯田度支六曹而無五兵咸寧二年省駕部尚書四年省一僕射又置駕部尚書太康中有吏部殿中及五兵田曹度支左民為六曹尚書又無駕部三公客曹惠帝世又有右民尚書止於六曹不知此時省何曹也渡江有吏部祠部五兵左民度支五尚書祠部尚書常與右僕射通職不常置以右僕射攝之若右僕射缺則以祠部尚書攝知右事並晉志康帝起居注詔曰尚書萬事之本朕所責成也而廪秩儉薄甚非治體今雖軍國多費不為元凱惜祿其依令僕給尚書各親信五十人廪賜宋有吏部尚書領吏部刑部三公兵部四曹度支尚書領度支金部倉部起部四曹左民尚書領左民駕部二曹都官尚書領都官水部庫部功論四曹五兵尚書領中兵外兵二曹祠部尚書右曹當時通職不俱置起部尚書興立宫廟權置事畢省南宋百官志齊職儀尚書六人品第三秩六百石進賢兩梁冠納言幘絳朝服佩水蒼玉執笏負荷梁與宋同武帝時尚書省置吏部祠部度支左民都官五兵等六尚書侯景改梁五兵為七兵尚書又職官録曰齊尚書品服悉與令同亦别有起部尚書營宗廟宫室權置事畢則省何𦙍字子季為左民尚書後辭官隱於若耶山雲門寺敕給白衣尚書祿𦙍固辭又到洽為御史中丞兄溉為左民尚書舊中丞小専入尚書下舍治引服親不應有礙刺史省詳决乃許入溉省亦以其兄弟素篤不能相别陳置尚書五員後魏皇始二年三月分尚書三十六曹及諸外署凡置三百六十曹令大夫主之大夫各有屬官其有文簿當曹一奏欲以省彈駁之煩十二月復尚書三十六曹曹置代人令史一人譯令史一人書令史一人天賜二年二月復罷二十六曹别置武歸修勤二職武歸比郎中修勤比令史分主省務始光元年正月置右民尚書神䴥元年置諸曹尚書十餘人各居别寺興安二年置駕部右士尚書已上並後魏官志通典載後魏初有殿中掌殿內兵馬倉庫樂部掌伎樂及角使伍伯駕部掌牛馬驢騾南部掌南邊州郡北部掌北邊州郡五尚書其後又有吏部初曰選部兵部都官度支七兵祠部民曹等尚書又有金部庫部虞曹儀曹右民宰官元禔為宰官尚書都牧元稹為都牧尚書牧曹右曹太倉太官祈曹神都儀同曹等尚書自金部以下但有尚書之名而不詳職事北齊六尚書分統列曹吏部統吏部考功主爵三曹殿中統殿中儀曹三公駕部四曹祠部統祠部主客虞曹屯田起部五曹祠部無尚書則右僕射攝之五兵統左中兵右中兵左外兵右外兵都兵五曹都官統都官二千石比部水部膳部五曹度支統度支倉部左户右户金部庫部六曹凡二十八曹吏部二公郎中各二人餘並一人凡三十郎也隋髙祖時吏部尚書統吏部侍郎二人主爵侍郎一人司勳侍郎二人考功侍郎一人禮部尚書統禮部祠部侍郎各一人主客膳部侍郎各二人兵部尚書統兵部職方侍郎各二人駕部庫部侍郎各一人都官尚書統都官侍郎二人刑部比部侍郎各一人司門侍郎二人度支尚書統度支户部侍郎各二人金部倉部侍郎各一人工部尚書統工部屯田侍郎各二人虞部水部侍郎各一人凡三十六侍郎分司曹務直宿禁省如漢之制唐尚書與隋同龍朔二年改尚書為太常伯咸亨元年依舊歷代吏部尚書及侍郎品秩悉髙於諸曹宋朝太祖太宗監藩鎮之弊乃以尚書郎曹卿寺官出領外寄三嵗一易坐鎮外重分裂之勢尚書侍郎郎中員外郎與九寺五監皆為空官特以寓祿秩序品位而已而凡省臺寺監皆往往以他官兼領故自真宗仁宗以來議者多以正名為請咸平中楊億首言文昌㑹府有名無實宜復其舊既而言者相繼乞復二十四司之制至和中吳育亦言尚書省天下之大有司而廢為間所當漸復之然朝論異同未遑釐正神宗即位慨然欲更其制熙寧末始命館閣校唐六典元豐三年以摹本賜羣臣乃置局中書命翰林學士張璪等詳定八月下詔肇新官制凡省臺寺監領空名者一切罷去而易之以階五年詳定所上寄祿格而省臺寺監之官各還所職矣神宗常論蘇綽建復官制上自朝廷下至州縣悉分為六曹體統如一今先自京師候推行有序即監司州縣皆可施行矣六曹尚書侍郎為常式哲宗元祐初置權尚書俸賜依守侍郎班序在試尚書之下四朝志正三品崇寧罷髙宗紹興八年復置權尚書十年詔食邑格內將權尚書在右右散騎常侍下中興㑹要侍郎隋煬帝二年尚書六曹吏部禮部兵部刑部民部工部各置侍郎一人以二尚書之職並正第四品六典注今之侍郎其置自此始也夫侍郎之名舊矣漢凡諸郎掌更直執㦸宿衛諸殿門以侍衛之故通謂之侍郎故武帝時東方朔為郎當時謂之官不過侍郎位不過執㦸是也尚書亦有侍郎通典尚書郎初入臺稱郎中換嵗稱侍郎漢官梁尚書郎初入臺稱郎中功髙者轉為侍郎是也五代史志案前代郎中侍郎兩署侍郎即今郎中之任郎中即今員外之任也初學記隋帝諱忠不置郎中初學記尚書二十四司諸郎中謂之侍郎通若今之郎官非六部侍郎之任也通典自煬帝置六曹侍郎於是改諸司侍郎但曰郎又改吏部為選部郎禮部為儀曹郎兵部為兵曹郎刑部為憲曹郎工部為起曹郎以異六侍郎之名通典唐武德六年廢六司侍郎貞觀二年復通典降為正四品下惟吏部侍郎為正四品上龍朔二年改為少常伯咸亨元年復為侍郎總章元年吏部兵部各增侍郎六員六典注宋初以為階官至元豐官制行始有職掌元祐二年初置權侍郎從四品如未歷給事中中書舍人及待制以上者並帶權字祿賜比諫議大夫四朝志崇寧改元遵元豐舊罷權侍郎建炎四年復置兵部題名記郎中西漢置尚書郎四人分掌尚書事通典一人主丐奴單于營部一人主羌夷吏民一人主户口墾田一人主財帛委輸光武分尚書為六曹每一人尚書則領六郎凡三十六郎焉初學記秦置郎中令其屬官有三署五官中郎將左中郎將右中郎將凡三署署中有郎中侍郎無員多至千人分𨽻三署主執㦸侍宫殿出則充車騎東漢因之漢官云尚書郎初從三署郎選詣尚書臺試每一郎缺則試五人先試箋奏初入臺稱尚書郎中滿嵗稱尚書郎二嵗稱侍郎故郎中侍郎之名猶因三署本號也初學記西漢言郎者多非尚書郎唯田蚡少為諸曹郎是也文帝時馮唐為郎中署長直不疑盜同舍郎金武帝時顔駟為郎三世不遇武帝時揚雄為侍郎及諸言以資為郎父任為郎皆三署郎至東漢猶難分有尚書及曹名冠首者即尚書直言為郎者亦三署魏二晉以後無三署郎主作文書草通典魏自黃初改祕書為中書置通事郎掌詔書而尚書郎有二十三人有殿中吏部駕部金部虞曹比部南主客祠部度支庫部農部水部儀曹三公倉部民曹二千石中兵外兵都兵别兵考功定課非復漢時職任通典自漢以來尚書諸曹郎中侍郎或兩置漢代兩置其職則同魏晉宋齊唯置郎中梁陳兩置後魏北齊唯置郎中隋開皇中置侍郎隋諱忠不置郎中煬帝改曰郎唐改郎為郎中六典龍朔二年改為大夫咸亨光宅神龍並隨曹改復六典宋初元豐官制行郎官理都守以上資任者為郎中四朝志員外郎隋開皇三年尚書二十四司各置員外郎一人通典品從第六謂曹郎本員之外復置郎也六典掌司其曹之版籍侍郎缺則釐其曹事此今尚書員外郎所由始也通典又注曰歷代尚書郎各以曹名為稱首或謂之侍郎皆無員外之號前代史傳及職官要録或有言員外郎者蓋謂員外散騎侍郎耳非尚書之職也又六典注云宋百官階次有員外郎美遷為尚書郎煬帝三年廢二十四司員外郎每司減一郎置承務郎一人同開皇員外郎之職尚書諸曹各置員外郎吏部置二人龍朔咸亨光宅並隨曹改復六典注宋元豐官制六曹郎官理郡守以上資任者郎中通判以下資序者為員外郎雖理知州資序未曽實歷知州及監司開封府推判官者止除員外郎四朝志吏部尚書周禮天官大宰掌建邦之六典以佐王治邦國漢成帝置列曹尚書四人其一曰常侍曹光武改常侍曹為吏部曹主選舉靈帝改吏部為選部以梁鵠為尚書魏改選部為吏部主選部事職右於諸曹尚書晉吏部尚書一人諸尚書品俸以上皆與令僕同宋置二吏部尚書廢五兵尚書尋復舊名齊梁陳後魏北齊皆曰吏部尚書後周依周官書大冢宰卿一人七命隋復曰吏部尚書六典注自漢及魏授此職者咸云吏部尚書若授諸曹尚書直云尚書初學記漢魏晉世若授吏部者即云以某為吏部尚書若授他曹云某為尚書至晉宋齊已後始云某授工部刑部五兵度支等尚書耳然此官歷代班序常尊不與諸曹同也六典自魏至梁並第三品梁定十八班班多為貴吏部尚書班十四諸曹尚書班十三唐因隋制吏部尚書掌文官選舉又武德五年改選部龍朔二年改司列太常伯咸亨初復舊光宅元年改為天官尚書神龍元年復舊天寶十一載改為文部至德初復舊總判吏部司封司勳考功四曹事六典通典宋雖沿唐制設吏部然名存實廢典選之職自分為四文選二一曰審官東院太平興國六年命郭贄考京朝官課淳化三年置磨勘京朝官院又以興國中所置差遣院併入號磨勘差遣院亦名考課院淳化四年實録書以考課京朝官院為審官院而春明録云大宋始置磨勘差遣院後改為審官蘇紳言太宗始用趙普議置考課以分中書之權今審官流內銓即古之吏部也此書天禧中上涑水記聞云太宗患中書權太重向敏中時為諫官請分中書吏房置審官院刑房置審刑院熙寧間别建審官西院以主武選於是改審官院為審官東院焉一曰流內銓實録淳化四年以幕職州縣考課院歸流內銓命翰林學士蘇易簡領其事自後命近臣主之武選二一曰審官西院涑水記聞云王介甫與韓子華合謀欲沮文潞公且奪其權一日發中㫖置審官西院樞密初不知也韓絳傳云舊制升朝武臣皆選樞密院注授牙洛吏因為發絳請置審官西院如文臣格實録熙寧三年詔西樞本兵任為重矣而狃於舊制自武職升朝以上必兼擇而授之是公府而親有司之為非遇股肱之意宜以審官院為審官東院别置審官西院専領升朝武臣磨勘差遣命天章閣待制齊恢為知院曰三班院實録淳化三年詔置三班院以崇儀副使蔚進掌之先是供奉官等悉𨽻宣徽院至是别置三班院以考殿最自後多命近臣主之元豐定制以審官東院為尚書左選流內銓為侍郎左選審官西院為尚書右選三班院為侍郎右選道鄉集蘇丞相行狀唐制文選掌於吏部武選則兵部主之神宗謂自三代至漢未嘗有文武之别議者不知所處蘇頌言唐制吏部有三銓之法分品秩而掌選事今欲文武一歸吏部則莫若分左右曹以掌兩選又以品秩課格分治之無所不可上從之於是吏部有四選之法書左右選凡十五案左選掌缺案知闕案六品案七品案八品案九品知雜上案下案甲庫案右選注擬案大使臣案小使臣案中庫案掌注案知雜案告身案侍郎左右選凡十五案左選注擬知闕案補闕案參軍上案下案主簿上案下案縣尉上案下案入官案甲庫案格式案過院案右選注擬上下案供奉官案殿直案甲庫案掌法案知雜案而四選密矣職略宋初張昭為尚書獨掌京官七品以下選及昭致仕以他官領之四朝志元豐官制行以審官東西院歸尚書左右選四朝志初除李清臣焉職略建炎詔六曹惟吏部備官餘長二互置題名吏部侍郎隋煬帝三年始置以二尚書之職六品以下銓補多歸之六典通典唐武德初因隋舊置吏部尚書掌六品七品選侍郎銓掌八品九品選㑹要至七年省吏部侍郎貞觀二年復置龍朔二年改為司列少常伯咸亨元年改為吏部侍郎光宅元年改為天官侍郎神龍元年復為吏部侍郎天寶十一載改為文部侍郎至德二載復為吏部侍郎本一員總章二年加一員以裴行儉為之本員為中銓新加員為東銓通典云唐列三銓尚書掌其一侍郎分其二尚書所掌謂之尚書銓侍郎所掌其一為中銓其一為東銓隋置侍郎正第四品唐諸曹侍郎降為第四品下惟吏部侍郎為正四品上㑹要六典宋選人屬流內銓小使臣屬三班院元豐官制行以流內銓歸吏部侍郎左選元豐元年御史舒亶言天下選人名在吏部者且萬人索其家牒以式注籍時將改官制先詔流內銓稱尚書吏部官制行歸吏部侍郎左選以三班院歸吏部侍郎右選三班舊例置局禁中嘉祐八年出之熙寧三年罷主簿二元豐初又詔與審官東院流內銓各省主簿一官制行歸吏部侍郎右選左選掌文臣注擬遷叙之事右選掌武臣亦如之初置二員蘇頌左選李承之右選故事餘曹尚書侍郎通治曹事則同班惟吏部分領四選四朝志自初任至幕職州縣官侍郎左選掌之自副尉以上至從義郎侍郎右選掌之吏部郎中周官太宰屬官有下大夫蓋吏部郎中之任也後漢置吏部郎中職在選舉魏晉用人妙於時選其諸曹郎功髙者遷吏部郎其吏部郎歷代品秩皆髙於諸曹郎魏晉宋齊吏部郎品第五諸曹郎第六梁吏部郎班第十一諸曹郎班第十陳因梁隋煬帝改吏部為選部唐為吏部郎中有二人龍朔二年改為司列大夫咸亨光宅神龍並隨曹改復六典一人掌考天下文吏之班秩品命一人掌小選凡未入仕而吏京師者復分於九品通謂之行署其應選之人以其未入九流故謂之流外銓亦謂之小銓六典宋元豐官制行置吏部郎中四人尚書選二人侍郎選各一人參掌選事而分治之凡序位有品選官有格分仕有職寓祿有階皆以事稽考審核其狀擬定可否質成於長二而後行焉四朝志建炎二年詔三選各一員吕頥浩乞將司馬光併省疏召從官議行也司封郎中舊主爵郎職員令北齊置主封郎中一人隋曰主爵郎唐曰主爵郎中龍朔二年改為司封大夫咸亨元年復故光宅元年改為司封郎中神龍元年復故開元二十四年復為司封掌邦之封爵凡有九等六典宋司封判司事一人以無職事朝官充凡封爵之制一出於中書本司但掌定諡先期戒本部赴集而已元豐官制行郎中員外郎始實行本司事初除王祖道為司封郎中參掌官封叙贈之事凡宗室賜名授官親王內外命婦以下封爵諸親保任其宗屬升朝官褒贈其妻皆𨽻焉列爵有九自王至男八國有三大中小國內外命婦之品五自貴妃至貴人外命婦之號九自大長公主至縣君敘贈之制三三代二代一代皆辨其位序以進之加食邑實封則視其髙下之品以為户數多寡之節凡事之可否與司勳通决於尚書司勳郎中周官有司勳上士二人凡有功者司勳詔之後周夏官有司勳上士一人掌功勳之賞隋文帝立司勳侍郎二人煬帝改為司勳郎唐武德初為司勳郎中龍朔元年改為司勳大夫咸亨二年復故掌邦國官人之勳級凡勳十有二等十二轉自上柱國至武騎尉凡十二凡有功效之人合授勳官者皆委之覆定然後奏擬六典宋司勳判司事一人以無職事朝官充凡勳官之賜一出於中書本司無所掌元豐官制行郎中員外郎始實行本司事初除穆洵為之參掌勳賞之事凡勳十有二級自上柱國至武騎尉自從七品推而上之至正二品三嵗一遷必因其除授以加之凡賞有格皆設於此以逆其至焉若事應賞從其所𨽻之司考實以報則審核其狀以格覆之非格所載則參酌重輕擬定以上尚書省用前代帝系及勳臣之後則考驗而奉行其制命㑹要考功郎中漢元帝時京房作考功課吏之法然其職不在尚書至光武改尚書三公曹主嵗書考課課諸州郡通典魏尚書郎曹有考功郎中宋齊並置功論郎中梁有功論侍郎並考功郎中之任也北齊有考功郎中隋文帝置考功侍郎煬帝改考功郎唐武德初復為考功郎中龍朔二年改為司績大夫咸亨元年復故六典掌內外文武官吏之考課六典及功臣家傳碑頌誄諡等事通典考課之法有四善二十七最其諡議之法古之通典皆審其事以為不刋六典武德舊令考功郎中監試貢舉人貞觀以來乃以考功員外郎専掌貢舉省郎之殊美者至開元二十四年移貢舉於禮部而考功員外郎分判事而已通典宋考功判司事一人以帶職朝官或無職事朝官充凡考課之法分𨽻他司或以他司専領本司但掌覆太常擬諡及幕府州縣官流外較考之事元豐官制行郎中員外郎始實行本司事續㑹要初除蔡峋蔡京職略掌文武遷叙磨勘資任考課之政令凡命官隨所𨽻選以其職事具注於歷給之於其屬州若司嵗書其功過應升遷選授者驗歷按法而叙進之有負殿則正其罪罰以七事考監司以四善三最考守令凡改服色者以年勞計之應諡者覆太常所定行狀報尚書省官集議以聞凡立碑碣名額之事掌之舊置考課院其定殿最皆有考辭元豐悉罷分案十有七五品案六品案七品案八品案九品案職官案參軍案令丞案主簿案縣尉案使副案供奉官案資任案校定案法案知雜案元祐三年詔知州課法吏郎上其事于尚書省送中書省取㫖縣令以下本部専行四朝志羣書考索後集卷七
