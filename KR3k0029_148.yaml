body:
  text: 羣書考索續集卷十七宋章如愚編文章門古今之文文總論有是實於中必有是文於外所以道德文章非出於二歐陽子曰三代以上治出於一而禮樂逹於天下三代而下治出於二而禮樂為虛名此古今不易之至論也然彼知政事禮樂之不可不出於一而未知道德文章之尤不可使出於二也夫古之聖賢其文可謂盛矣然初豈有意學為如是之文哉有是實於中則必有是文於外如天有是氣則必有日月星辰之光耀地有是形則必有山川草木之行列聖賢之心既有是精明純粹之實以磅礴充塞乎其內則其著見於外者亦必自然條理分明光輝發越而不可掩蓋不必託於言語著於簡䇿而後謂之文但自一身接於萬事凡其語默動靜人所可得而見者無所適而非文也姑舉其最而言則易之卦畫詩之詠歌書之記言春秋之述事與夫禮之威儀樂之節奏皆已列為六經而垂萬世其文之盛後世固莫能及然其所以盛而不可及者豈無所自來而世亦莫之識也故夫子之言曰文王既沒文不在兹乎蓋惟已沒知不得辭其責矣然猶若逡巡顧望而不能無所疑也至於推其所以興衰則又以為是皆出於天命之所為而非人力之所及此其體之甚重夫豈世俗所謂文者所能當哉孟軻氏沒聖學失傳天下之士背本趍末不求知道養德以充其內而汲汲乎徒以文章為事業然在戰國之時若申商孫吳之術蘇張范蔡之辨列禦寇莊周荀况之言屈平之賦以至秦漢之間韓非李斯陸生賈傅董相史遷劉向班固下至嚴安徐樂之流猶皆先有其實而後託之於言惟其無本而不能一出於道是以君子猶或羞之及至宋玉相如王褒揚雄之徒則一以浮華為尚而無實之可言矣雄之太玄法言蓋亦長楊校獵之流而粗變其音節初非實為明道講學而作也東京以降訖于隋唐數百年間愈下愈衰則其去道益逺而無實之文亦無足論韓愈氏出始覺其陋慨然號於一世欲去陳言以追詩書六藝之作而其敝精神靡嵗月又有甚於前世諸人之所為者然猶幸其略知不根無實之不足恃因是頗泝其源而適有會焉於是原道諸篇始作而其言曰根之茂者其實遂膏之沃者其光曄仁義之人其言藹如也其徒和之亦曰未有不深於道而能文者則亦庶幾其賢矣然今讀其書則其出於諂諛戲豫放浪而無實者自不為少若夫所原之道則亦徒能言其大體而未見其有探討服行之效使其言之為文者皆必由是以出也故其論古人則又直以屈原孟軻馬遷相如揚雄為一等而猶不及於董賈其論當世之弊則但以詞不已出而遂有神徂聖伏之歎至於其徒之論亦但以剽掠僣竊為文之病大振頽風教人自謂韓之功則其師生之間傳受之際蓋未免裂道與文以為兩物而於其輕重緩急本末賔主之分又未免於倒懸而逆置之也自是以來又復衰歇數十百年而後歐陽子出其文之妙蓋已不愧於韓氏而其曰治出於一云者則自荀揚以下皆不能及而韓亦未有聞焉是則疑若幾於道矣然考其終身之言與其行事之實則恐其亦未免於韓氏之病也抑又嘗以其徒之説考之則誦其言者既曰吾老將休付子斯文矣而又必曰我所謂文必與道俱其推尊之也既曰今之韓愈矣而又必引夫文不在兹者以張其説由前之説則道之與文吾不知其果為一耶為二耶由後之説則文王孔子之文吾又不知其與韓歐之文果若是其班乎否也嗚呼學之不講久矣習俗之謬其可勝言也哉文公文集諸家之文文體參之榖梁以厲其氣參之孟荀以暢其文參之莊老以肆其端參之國語以博其趣參之離騷以致其幽參之太史公以著其潔文之用大能使之為小能使之著煩能不亂肆能不流其雄俊偉壯若決江河而下也其輝光明白若引星辰而上也南豐文以氣為主三代之上文章皆道義之所在三代以後文章皆氣節之所發凡人之精明英偉者謂之氣氣之宣者為言言之精者為文即其英偉之不能掩者也文衡文窮物之精華天地所祕惜故蒙金以沙錮玉以璞珊瑚之藂必茂重溟夜光之珠必頷驪龍抉而不知已積而不知止窮則逼天地讎也文章亦然所取者亷其德必多所取者深其身必窮六經作孔子削迹不粒矣孟子述子思坎坷齊魯矣歷代文章河圖授羲而八卦生洛書畀姒而九疇著文之萌蘖於此矣自伏羲而至于堯煥乎其有文章由唐虞以迄于周郁乎其為文文之敷榮於此矣三代而下惟兩漢之文最為近古文之近厚於此矣魏晉以來日就淪靡文之蠧弊於此矣逮于有唐大厯貞元之間倡之以韓和之以柳起八代之衰而為一王之法文之爾雅肇於此矣知歷代之文章然後可與論文之體矣出於自然者天下之文風行水上渙此亦天下之至文也然而此二物者豈有求於文哉無意乎相求不期乎相遭而文生焉是其為文也非水之文也非風之文也二物者非能為文而不能為不文也老泉文章辭逹而已所示詩賦雜文觀之熟矣大略如行雲流水初無定質但常行於所當行常止於不可不止文理自然姿態橫生孔子曰言之不文行之不逺又曰辭逹而已夫言止於態意疑若不文是大不然求物之妙如係風捕影能使是物了然於心者蓋千萬人而不一遇也而况能使了然於口與手者乎是以謂辭逹辭至於能逹則文不可以用矣東坡相如王褒以文倡於蜀文章之風惟漢為盛而貴顯暴著者蜀人為多蓋相如倡其前而王褒繼其後峩冠曵佩大車駟馬徜徉乎鄉閭之中而蜀人始有好文之意弦歌之聲與鄒魯比同上孔葛之文孔北海志大而論高功烈不見于世然英偉豪傑之氣自為一時所宗其論盛孝章郤鴻豫書慨然有烈丈夫之風諸葛孔明不以文章自名而開物成務之姿綜練名實之意自見於言語至出師表簡而盡直而不肆大哉言乎與伊訓説命相表裏同上文貴㴠養毋注情於翰墨之中而馳志於軒冕之側毋玩意於詞章之末而染指於利祿之中有如羽獵一篇工則工矣而投閣貽玷千古不磨佩韋等作美則美矣而阿附懷姦萬辭莫掩東坡自評其文吾文如萬斛泉源不擇地皆可出平地滔滔汨汩雖一日千里無難及其與石山曲折隨物賦形而不可知也所可知者常行於所當行常止於不可不止如是而已矣其他雖吾亦不知也道勝者文不難至昔孔子老而歸魯六經之作數年之頃耳然則讀易者如無春秋讀書者如無詩何其用功少而至於至也聖人之文雖不可及然大抵道勝者文不難而自至也故孟子皇皇不暇著書荀卿蓋亦晚而有作若子雲仲淹方勉焉以模言語此道未足而強言者也廬陵文不待大而顯雖然凡人之文不待大而顯相如以子虛一賦顯杜牧以阿房一賦顯王勃以秋水共長天一聮顯崔信明以吳江楓落一句顯如遇其人雖微亦顯陳傅良文不適用夫課試之文章非博誦強學窮日之力則不能及其工也大則不足以用天下國家小則不足以為天下國家之用臨川文得於心而成於言夫文者道之用也道者教之本也故文之作也必得之於心而成之於言得之於心者明諸內者也成之於言者見諸外者也明諸內者故可以適諸用見諸外者固可以張其教是故詩書禮樂大易春秋皆文也總而謂之經者也以其終於孔子之手尊而異之爾斯聖人之文也後人力薄不克以嗣但當佐佑名教夾輔聖人而已孫明復經義穿鑿甚於詞賦夫科舉之患極矣何者昔日專用詞賦摘裂破碎口耳之學而無得於心此不足以知經耳使其知之則超然有異於衆而可用故昔日之患小今天下之士雖五尺童子無不自謂知經傳寫誦習坐論聖賢其高者談天人語性命以為堯舜周孔之道技盡於此雕琢刻畫侮玩先王之法言反甚於詞賦南方之薄者工巧而先造北方之朴士屈意而願學衆説潰亂茫然而莫得其要人文乖繆大義不明無甚於此葉正則文章蹈襲自新語造於陸賈而後君子之論喜乎新自雜説著於賈誼而後君子之説惡乎雜愚非喜乎新而惡乎雜也慮夫文章之弊出於蹈襲也故自出機軸可以示一家標凖而寄人籬下識者病之何者滔滔者天下皆是而自拔於流俗者實鮮焉荀卿子戰國之翹楚也三十二篇書禮樂二論大抵多禮記之文宥坐而下太半皆家語之文况下於荀卿者乎司馬漢儒之巨擘而史記所述帝王本紀多出於尚書之文列國世家多出於左傳國語之文况下於司馬者乎王通隋季之大儒而著書立言中説則多依論語之文續詩則多依古詩之文况下於王通者乎呦呦鹿鳴此鹿鳴詩語也而魏武短歌行用之明明天子此江漢詩句也而曹子建責躬詩用之雲從龍風從虎此大易乾卦之文也而楊雄太元經用之至於漢儒之月令純剽吕氏之春秋馬總之通歷專取世南之略論高承之事物紀源多取於劉存之事始無非因仍蹈襲以明據依之學不知後世文章之不古正病於文章之效古也吁晉無文章惟陶淵明歸去來一辭唐無文章獨韓昌黎送李願歸盤谷一序此又文以氣為主而不流於蹈襲者也古文有三等豫以古文為三等周為上七國次之漢乃為下周之文雅七國之文壯偉其失騁漢之文華贍其失緩東漢而下無取焉后山前輩文章各有所短蘇明允不能詩歐陽永叔不能賦曾子固短於韻語黃魯直短於散語蘇子章詞如詩秦少遊詩如詞后山諸儒文章優劣韓子之文所以自成一家取於心而注於手者有六經以本之也老蘇之文所以渾渾乎不覺其易以其學於六經荀孟之文也韓蘇二公豈非以學術為文章而不以科舉為文章乎彼戰國秦漢之時學校不立人自為説家自為學獨一孟子講明仁義是蓋豪傑之士無待而興者也賢如屈大夫而其文終有悲傷憔悴之氣才如洛陽年少而其文亦不免有憤世嫉邪之心仲舒漢儒之領袖亦以隂陽災異自溺學校之教化不明士之有良材美質者終不能拔於流俗文以理為主作竒語自是文章病但當以理為主理得而辭順文章自然出羣拔萃觀杜子美到夔州後詩韓退之自潮州還朝後文章皆不煩繩削而自合矣山谷文隨時尚漢武好浮誇則相如以浮誇應魏帝務華靡則曹植等以華靡應文體文指文趣韓歐得其體而尺度傳周程悟其指而戶庭闢乾淳二三君子會其趣而流𣲖演其餘如上林一賦喜動九重長楊一賦見推當代宋朝文變藝祖之興恢闊磊落不事文墨以振起天下之士氣而科舉之文一切聽其所自為有司以一時尺度律而取之未嘗變其格也其後柳仲塗以當世大儒從事古學卒不能麾天下以從已及楊大年劉子儀因其格而加以瑰竒精巧而天下靡然從之謂之崑體穆修張景專以古文相高而不為駢儷之語則亦不過與蘇子美兄弟唱於寂寞之濵而已故天聖間朝廷蓋知厭之而天下之士亦終未能從也其後歐陽公與尹師魯之徒古學既盛皆祖宗之涵養天下至是蓋七八十年矣故慶厯間天子慨然下詔書風厲學者以近古天下之士乃翕然丕變以稱上意於是胡翌之孫明復石介以經術來居太學而李泰伯梅堯臣輩又以文墨議論遊泳於其中而士始得師矣當是時學校未有科試之法也士之來者至接屋以居而不倦太學之盛蓋極於此矣乘士氣方奮之時雖取三代兩漢之文立為科舉取士之格奚患其不從此則變文之時也而仁祖固已逆知其如此矣然當時諸公變其文而不變其格出入乎文史而不求之以經術學校課士之法又往往失之太略此王荆公所以得乘間而行其説於熙寧也經術造士之意非不美而新學字説何為者哉學校課試之法非不善而月書季考何為者哉當是時士之通於經術者神宗作成之功非盡出於法也及司馬溫公起相元祐盡復其祖宗之故而不能參以熙寧造士之意取其學校課試之大略徒取快於一時而已則夫士之工於詞章者皆是祖宗涵養之餘而非必盡出於法也紹聖元符以後號為紹述熙豐亦非復其舊矣士皆膚淺於經而習熟於文其間可勝嘆哉中興以來參以經術詩賦以涵養天下之士氣又立學以聳動四方之觀聽故士之有文章有德行者深於經理者明於古今者莫不各得以自奮蓋亦可謂盛矣蓋心術既紓則易以縱弛議論無擇則易以浮淺陳同父文文章各有所長人之為文各有其所長諷諭之詩長於激間適之詩長於遣感傷之詩長於切五字律詩百言而上長於贍五百字言而下長於清賦贊針戒之類長於當碑紀敘事制詔長於實啓奏表狀長於真書檄詞䇿剖判長於盡總而言之不亦多乎近世文章之變自文教下衰儷偶章句使枝對䇿比以八病四聲為梏拳守之如奉法聞臯陶史克之作則呷然笑之天下雷同風驅雲趍文不足言言不足志亦猶木蘭為舟翠羽為楫玩之於陸而無涉川之用三年間學者稍厭折楊黃花而窺咸韶之音什五六識者謂之文章中興楚辭楚詞類於詩騷人之詞亦變風變雅變頌之流按周禮太師掌六詩以教國子曰風曰賦曰比曰興曰雅曰頌而毛詩大序謂之六義蓋古今聲詩條理無出此者風則閭巷風土男女情思之詞雅則朝會燕享公卿大夫之作頌則鬼神宗廟祭祀歌舞之樂其所以分者皆以其篇章節奏之異而别之也賦則直陳其事比則取物為比興則託物興詞其所以分者又以其屬辭命意之不同而别之也誦詩者先辨乎此則三百篇者若網在綱有條而不紊矣不特詩也楚人之詞亦以是而求之則其寓情草木託意男女以極遊觀之適者變風之流也其敘事陳情感今懷古以不忘乎君臣之義者變雅之類也至於語冥婚而越禮攄怨憤而失中則又風雅之再變矣其語祀神歌舞之盛則幾乎頌而其變也又有盛焉其為賦則如騷經首章之云也比則香草惡物之類也興則託物興詞初不取義如九歌沅芷澧蘭以興思公子而未敢言之屬也然詩之興多而比賦少騷則興少而比賦多要必辨此而後詞義可尋讀者不可以不察也屈原作離騷屈原之詞出於忠君愛國不能自已之至意不可直以詞人之賦視之也蓋自屈原賦離騷而南國宗之名章繼作通號楚辭大抵皆祖原意而離騷深逺矣切嘗論之原之為人其志行雖或過於中庸而不可以為法然皆出於忠君愛國之誠心原之為書其辭旨雖或流於跌宕怪神怨懟激發而不可以為訓然皆生於繾綣惻怛不能自已之至意雖其不知學於北方以求周公仲尼之道而獨馳騁於變風變雅之末流以故淳儒莊士或羞稱之然使世之放臣屏子怨妻去婦抆淚謳吟於下而所天者幸而聽之則於彼此之間天性民彞之善豈不足以交有所發而增夫三綱五典之重此豫之所以每有味於其言而不敢直以詞人之賦視之也然自原著此詞至漢未久而説者已失其趣如太史公蓋未能免而劉安班固賈逵之書世復不傳及隋唐間為訓解者尚五六家又有僧道蹇者能為楚聲之讀今亦漫不復存無以驗其説之得失而獨東京王逸章句與近世洪興祖補注並行於世其於訓詁名物之間則已詳矣顧王書之所取舍與其題號離合之間多可議者而洪皆不能有所是正至其大義則又皆未嘗沉潛反復嗟嘆咏歌以尋其文詞指意之所出而遽欲取喻立説旁引曲證以強附於其事之已然是以或以迂滯而逺於性情或以迫切而害於義理使原之所為抑鬱而不得伸於當年者又晦昧而不見白於後世豫於是益有感焉疾病呻吟之暇聊據舊編粗加櫽括定為集注八卷庶幾讀者得以見古人於千載之上而死者可作又足以知千載之下有知我者而不恨於來者之不聞也嗚呼稀矣是豈易與俗人言哉楚詞楚辭諸篇之意屈子初放未嘗有自絶之意至其忍死之時則志切辭哀可為慟哭也屈子初放猶未嘗有奮然自絶之意故九歌天問逺遊卜居以及此卷惜誦涉江哀郢諸篇皆無一語以及自沈之事而其辭意雍容整暇尚無以異於平日若九歌則含意悽惋戀嫪低佪所以自媚於其君者尤為深厚騷經漁父懷沙雖有彭咸江魚死不可讓之説然猶未有決然之計也是以其詞雖切而猶未失其常度抽思以下死期漸迫至惜往日悲回風則其身已臨沅湘之淵而命在晷刻矣顧恐小人蔽君之罪暗而不章不得以為後世深切著明之戒故忍死以畢其詞焉計其出於瞀亂煩惑之際而其傾輸罄竭又不欲使吾長逝之後冥漠之中胸次介然有豪髮之不盡則固宜有不暇擇其辭之精粗而悉吐之者矣故原之作其志之切而詞之哀蓋未有甚於此數篇者讀者其深味之真可為慟哭而流涕也文公楚辭辨證屈原之為人原之所為雖過而其忠則非偷生幸死者所可及嗚呼余觀洪氏之論其所以發屈原之心者至矣然屈原之心其為忠清潔白固無待於辨論而自顯若其為行之不能無過則亦非區區辨説所能全也故君子之於人也取其大節之純全而略其細行之不能無弊則雖三人同行猶必有可師者况如屈子乃千載而一人哉孔子曰人之過也各於其黨觀過斯知仁矣此觀人之法也夫屈原之忠忠而過者也屈原之過過於忠者也故論原者論其大節則其他可以一切置之而不問論其細行而必合乎聖賢之矩度則吾固已言其不能皆合於中庸矣尚何説哉且凡洪氏所以為辨者三其一以為忠臣之行發其心之所不得已者而不暇顧世俗之毁譽則幾矣其一引仲山甫寧武子事而不論其所遭之時所處之位有不同者則踈矣其一欲以原比於三仁則夫父師少師者皆以諌而見殺見囚耳非故捐生以赴死如原之所為也蓋原之所為雖過而其忠終非世間偷生幸死者所可及洪之所言雖有未至而其正終非雄固之推之徒所可比余是以取而附之反騷之篇云同上諸家續楚辭離騷之作本出於窮悴無聊之意其奢侈歡愈之作皆所不取屈子者窮而呼天疾痛而呼父母之辭也故今所欲取而使繼之者必其出於幽憂窮蹙怨慕凄涼之意乃為得其餘韻而宏衍巨麗之觀歡愈快適之語宜不得而與焉至論其等則又必以無心而冥會者為貴其或有是則雖逺且賤猶將汲而進之一有意於求似則雖追真如楊栁亦不得已而取之耳若其義則首篇所著荀卿子之言指意深切辭調鏗鏘君人者誠能使人朝夕諷誦不離於其側如衛武公之抑戒則所以入耳而著心者豈但廣厦細旃明師勸誦之益而已哉固余之所為眷而不能忘者若高唐神女李姬洛神之屬其辭若不可廢而皆棄不録則以義裁之而斷其為禮法之罪人也髙唐卒章雖有恩萬方憂國害開聖賢輔不逮之云亦屠兒之禮佛倡家之讀禮耳幾何其不為獻笑之資而何諷戒之有哉其息夫躬栁宗元之不棄則鼂氏已言之矣至於揚雄則未有議其罪者而余獨以為是其失節亦蔡琰之儔耳然琰猶知愧而自訟若雄則反訕前哲以自文宜又不得與琰比矣今皆取之豈不以夫琰之母子無絶道而於雄則欲因反騷而著蘇氏洪氏之貶詞以明天下之大戒也陶翁之詞鼂氏以為中和之發於此不類特以其為古賦之流而取之是也抑以其自謂晉臣耻事二姓而言則其意亦不為不悲矣序列於此又何疑焉至於終篇特著張夫子吕與叔之言蓋又以告夫遊藝之及此者使知學之有本而反求之則文章有不足為者矣文公楚辭後語序諸家楚辭篇次論諸家所作之優劣及朝氏所取之是非王逸所傳楚辭篇次本出劉向其七諫以下無足觀者而王褒為最下余已論於前矣近世朝無咎以其所載不盡古今詞賦之美因别録續楚辭變離騷為兩書則凡詞之如騷者已略備矣自原之後作者繼起而宋玉賈生相如揚雄為之冠然較其實則宋馬辭有餘而理不足長於頌美而短於規過雄乃專為偷生苟免之計既與原異趣矣其文又以摹擬掇拾之故斧鑿呈露脈理斷續其視宋馬猶不逮也獨賈太傳以卓然命世英傑之材俯就騷律所出三篇皆非一時諸人所及而惜誓所謂黃鵠之一舉兮見山川之紆曲再舉兮睹天地之員方者又於其間超然拔出言意之表未易以筆墨蹊徑論其高下淺深也此外朝氏所取如荀卿子諸賦皆高古而成相之篇本擬工誦針諫之詞其言姦臣蔽主擅權馴致移國之禍千古一轍可為流涕其他如易水越人大風秋風天馬下及烏孫公主諸王妃妾息夫躬晉陶潛韓柳宋朝王介父之山谷建業黃魯直之毁壁隕珠邢端夫之秋風三疊其古今大小雅俗之變雖或不同而朝氏亦或不能無所遺脫然皆為近楚語者其次則如班姬蔡琰王粲及唐元結王維顧况亦差有味又此之外則朝氏所謂過騷之言者非余之所敢知矣朝書新序多為義例辨説紛拏而無所發於義理殊不足以為此書之輕重且復自謂嘗為史官古文國書職當損益不惟其學而論其官固已可笑况其所謂筆削者又徒能移易其篇次而於文字之同異得失猶不能有所正也浮華之習徇名飾外其弊乃至於此可不戒哉文公楚辭辨證反離騷論揚雄為屈原之罪人而反騷之篇乃離騷之讒賊反離騷者漢給事黃門郎新莽諸吏中散大夫揚雄之所作也雄少好詞賦慕司馬相如之作以為式又怪屈原文過相如至不容作離騷自投江而死悲其文讀之未嘗不流涕也以為君子得時則大行不得則龍蛇遇不遇命也何必湛身哉乃作書往往托離騷文而反之自岫山投諸江流以弔屈原云始雄好學博覽恬於勢利仕漢三世不徙官然王莾為安漢公時雄作法言已稱其美比於伊尹周公及莾篡漢竊帝號雄遂臣之以耆老久次轉為大夫又放相如封禪文獻劇秦美新以媚莾意得校書天祿閣上會劉尋等以作符命為莾所誅辭連及雄使者來欲收之雄恐懼從閣上自投下幾死先是雄作解嘲有爰清爰靜遊神之廷惟寂惟寞守德之宅之語至是京師為之語曰爰清靜作符命惟寂寞自投閣雄因病自免既復召為大夫竟死莾朝其出處大致本末如此豈其所謂龍蛇者耶然則雄固為屈原之罪人而此文乃離騷之讒賊矣它尚何説哉文公楚辭後語總集文集總集總集者編類古今衆作為一集也唐志有虞摯文章流别杜預善文謝沈名文孔逭一作造文苑蕭統文選蕭圎一作圖文海姚鉉文粹徐堅文府之類是也唐志又有文史者附見于總集之後如劉協文心雕龍劉知幾史通炙轂子詩格鍾嶸詩評之類是也夫史通詩格詩評皆所以考論前人得失是非所不可廢也如文選所集李德裕惡其不根藝實家遂不置今觀唐志惟文選之注釋最多自蕭核僧道淹曹憲等為之音而李善又為之注善得之曹憲也又辨公孫羅注六十卷又所謂五臣注劉良吕延濟張銑吕向李周翰也開元六年吕延祚上之唐安國許淹注者孔利貞卜長福之所續卜隱之所擬宋朝蘇易簡之所纂何其慕者之紛紛也蓋其間多識乎鳥獸草木之名風土宫室之制而已德裕不以文進所見未免有所偏人主文集唐藝文志文集類兩漢之君惟武帝有集二卷而已魏自武帝至於陳思王其為集者五晉自宣帝至于彭城王其為集者八宋自武帝至于新渝侯其為集者九梁武帝簡文帝元帝昭明太子文集至多後魏文帝後周明帝陳後主隋煬帝製作尤冨唐太宗文集四十卷高宗八十六卷中宗四十卷武后垂拱集一百卷金輪集又十卷睿宗玄宗德宗皆有文集不特此也傳注之學經生事耳梁武帝作周易大義宋明帝作周易義疏何也載筆之任史臣責耳梁武作通史唐太宗御撰晉書又何謂哉隋煬帝與薛道衡爭文名武后使元萬頃等代已著述有所謂魏文帝典論唐高宗天訓武后紫樞要録訓記雜載等書盡入唐藝文志儒家者流果何意也唐太宗之言曰梁武隋煬無德政而集文章朕不為也今唐志所載四十卷者非太宗文集歟若夫太宗金鏡帝範諸書足為後世訓者固當筆之而無愧傳之於不朽徒曰作為文章與文人才子爭一旦之名帝王之學正不必爾也迹夫魏晉以下諸君以馬上得天下耻於文名之不彰是以著述紛紛兾以掩武夫之故態耳曽不知漢高帝不事詩書便示人以肝鬲之私何損於高帝明逹之性也耶或曰二典三謨訓誥誓命亦唐虞三代之君之書也後世之君紛紛著述何足多訾曰是不然古之帝王言出於口皆格言也史官筆之於手皆成書也初非有意而作之者也唐太宗之語暗合古道至多史臣書之史册至今焜耀為書如是是亦足矣何必作為文章口談梁武隋煬之失而躬自蹈耶劉知幾評歷代諸史之志曰古之所制於我有何力而班漢定其流别編為藝文續漢以還祖述不暇前志已録而後志仍書篇目仍舊頻頻互出何異以水濟水誰能飲之者乎因知幾之言求之周官太史掌八法八則之二內史掌王之八柄䇿命而二之小史掌邦國之志定世系辨昭穆御史掌邦國萬民之令又有外史掌王之外令及四方之志三皇五帝之書夫周有五史不特掌當代之史而猶及乎三皇五帝之書何其不憚煩耶是則藏書之䇿一代盛典古傳于今今驗于古率是道也况欲詳古今之事則必備古今之書古今之書既備則必有門目以紀之以見昔備而今缺與今有而昔無者庶使學者參而考之了然在目非小補矣知幾之論固足以見作史之法而亦未可盡信也暇日因觀諸史藝文經籍志其名有百千萬卷之異雖未能盡觀其書而究其旨姑因筆而記臆見右方所列者是也凡有疑義猶有待而正諸詩賦漢唐敘詩賦漢志敘詩賦為五種以屈原唐勒嚴忌賈誼枚乘相如劉向王褒等賦二十家為一種以陸賈枚臯嚴助朱買臣司馬遷蕭望之揚雄等賦三十一家為一種以孫卿及秦時雜賦等二十五家為一種以主客賦隱書等十二家為雜賦一種并詩共為五種漢志賦類幾八十家分為四種東漢魏晉以來二京三都作者間出有唐二百年藝文文集類所載唐人著述之賦無所謂四種者意者漢賦之為式大槩先之以問答次之以敷敘終之以諷諫纍數十家而觀之辭雖異而意則同故其為式拘而有所窮也觀東坡赤壁賦之體則異於是矣漢志詩類止二十餘家唐人詩集則十倍於漢詩無定式隨意諷詠可也自東漢及隋賦集尚多隋志可見也唐宋諸公文集亦有賦但其志與漢異耳又漢志不載李陵詩豈以降胸奴故耶隋志論文體隋志文集類論文賦之體深美乎屈宋鄒嚴枚馬潘陸沈謝之作沈休文謝玄暉靈運又謂永嘉晉以後玄風既扇辭多平淡文寡風力降及江東不勝其弊隋志所言得之矣要之隋志乃唐長孫無忌等所作也唐初之文猶尚駢儷故厭平淡而喜雕斫也宫體自梁簡文始論詩歷代詩人之優劣蘇李之天成曹劉之自得陶謝之超然固已至矣而杜子美李太白以英偉絶世之資凌跨百代古之詩人盡廢然魏晉以來高風絶塵亦少衰矣李杜之後詩人繼出雖有逺韻而才不逮意獨韋應物栁子厚發纎穠於簡古寄至味於淡泊非餘子所及也唐末司空圖﨑嶇兵亂之間而詩文高雅猶有承平之遺風其論詩曰梅止於酸鹽止於鹹飲食不可無鹽梅而其美常在於鹹酸之外可以一唱而三嘆也東坡李賀之詩賀之歌詩雲煙聮綿不足為其態也水之迢迢不足為其清也春之盎盎不足為其和也秋之明潔不足為其潔也風檣陳馬不足為其勇也瓦棺篆鼎不足為其古也時花美女不足為其色也荒國陊殿梗莾邱隴不足為其恨怨悲愁也鯨呿鰲擲牛鬼蛇神不足為其迂荒誕幻也蓋騷人之苖裔理雖未及辭或過之世皆曰使賀且未死少加以理奴僕命騷可也韓杜集詩文之大成所謂文者有論理之文有敘事之文有託詞之文有成體之文論理之文如莊周列禦寇是也論事之文如蘇秦張儀是也敘事之文如屈平宋玉是也鈎列莊之微挾蘇張之辨托班馬之實獵屈宋之英本之以詩書折之以孔氏此成體之文韓愈之所作是也昔蘇武李陵之詩長於高妙曹植劉公幹之詩長於豪逸陶潛阮籍之詩長於沖淡謝靈運鮑昭之詩長於峻潔徐陵庾信之詩長於藻麗於是杜子美者窮高妙之極極豪逸之氣包沖淡之趣托峻潔之資備藻麗之態而諸家之作所不及焉嗚呼杜氏韓氏其集詩文之大成者歟淮海觀文可以知人李紳作閔農詩稱其有宰相器韓愈稱歐陽詹亦曰讀其書知其慈孝最隆也丁謂詩有天門九重開終當掉臂入王禹稱讀之曰入公門鞠躬如也天門豈可掉臂入乎此人必不忠後如其言羣書考索續集卷十七
