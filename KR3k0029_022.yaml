body:
  text: 羣書考索卷二十二宋章如愚撰文章門評詩類梁征逺記室參軍鍾嶸詩品序曰氣之動物物之感人故搖蕩性情形諸舞詠照燭三才暉麗萬有靈祗待之以致饗幽微藉之以昭告動天地感鬼神莫近於詩昔南風之辭卿雲之頌厥義敻矣夏歌曰欎陶乎豫心楚謡曰名余曰正則雖詩體未全然是五言之濫觴也逮漢李陵始著五言之目矣古詩眇邈人世難詳推其文體固是炎漢之製非衰周之倡也自王揚枚馬之徒詞賦競爽而吟詠靡聞從李都尉迄班婕妤將百年間有婦人焉一人而已詩人之風頓已缺喪東京二百載中惟有班固詠史質木無文降及建安曹公父子篤好斯文平原兄弟欎為文棟劉楨王粲為其羽翼次有攀龍托鳳自致於屬車者蓋將百計彬彬之盛大備於時矣爾後陵遲衰微迄於有晉太康中三張二陸兩潘一左勃爾復興踵武前王風流未沒亦文章之中興也永嘉時貴黃老稍尚虛談于時篇什理過其辭淡乎寡味爰及江表微波尚傳孫綽許詢桓庾諸公詩皆平典似道德論建安風力盡矣先是郭景純用雋上之才變創其體劉越石仗清剛之氣贊成厥美然彼衆我寡未能動俗逮義熙中謝益壽斐然繼作元嘉中有謝靈運才高詞盛富艷難蹤固已含跨劉郭陵轢潘左故知陳思為建安之傑公幹仲宣為輔陸機為太康之英安仁景陽為輔謝客為元嘉之雄顔延年為輔斯皆五言之冠冕文詞之命世也夫四言文約義廣取效風騷便可多得每苦文繁而意少故世罕習焉五言居文詞之要是衆作之有滋味者也故云會於流俗豈不以指事造形窮情寫物最為詳切者邪故詩有六義焉一曰興二曰比三曰賦文已盡而意有餘興也因物喻志比也直書其事寓言寫物賦也𢎞斯三義酌而用之幹之以風力潤之以丹彩使味之者無極聞之者動心是詩之至也若專用比興則患在意深意深則詞躓若但用賦體則患在意浮意浮則文散嬉戲流移文無止泊有蕪漫之纍矣若乃春風春鳥秋月秋蟬夏雲暑雨冬月祁寒斯四候之感諸詩者也嘉會寄詩以親離羣托詩以怨至於楚臣去境漢妾辭宫或骨橫朔野或魂逐飛蓬或負戈外戎殺氣雄邊塞客衣單孀閨淚盡又士有解佩出朝一去忘返女有楊娥入寵再盻傾國凡斯種種感蕩心靈非陳詩何以展其義非長歌何以騁其情故曰詩可以羣可以怨使窮賤易安幽居靡悶莫尚於詩矣故詞人作者罔不愛好今之士俗斯風熾矣才能勝衣甫就小學必甘心而馳鶩焉於是庸音雜體各各為容至使膏腴子弟恥文不逮終朝點綴分夜呻吟獨觀謂為警䇿衆覩終淪平鈍次有輕薄之徒笑曹劉為古拙謂鮑昭羲皇上人謝眺今古獨步而師鮑昭終不及日中市朝滿學謝眺劣得黃鳥度青枝徒自棄於高聽無涉於文流矣觀王公搢紳之士每博論之餘何嘗不以詩為口實隨其嗜欲商𣙜不同淄澠並泛朱紫相奪喧議競起準的無依近彭城劉士章俊賞之士疾其淆亂欲為當世詩品具陳標榜其文未遂感而作焉昔九品論人七略裁士校以賔實誠多未值至若詩之為技較爾可知以類推之殆均博奕方今皇帝資生知之上才體沉欎之幽思文麗日月賞究天人昔在貴遊已為稱首况八紘既奄風靡雲蒸抱玉者聮肩握珠者踵武以瞰漢魏而不顧吞晉宋於胸中諒非農歌轅議敢致流别嶸之今録庶周旋於閭里均之於談笑耳古詩其體源出於國風陸機所擬十四首文溫以麗意悲而逺驚心動魄可謂幾乎一字千金其外去者日以踈四十五首雖多哀怨頗為總雜舊疑是建安中曹王所製客從逺方來橘柚垂華實亦為驚絶矣人代冥滅而清音獨逺悲夫漢都尉李陵詩其源出於楚辭文多悽愴怨者之流陵名家子有殊才生命不諧聲頺身喪使陵不遭辛苦其文亦何能至此漢婕妤班姬詩其源出於李陵團扇短章辭旨清婉怨深文綺得匹婦之致侏儒一節可以知其工矣魏陳思王植詩其源出於國風骨氣竒高詞彩華茂情兼雜怨體被文質粲溢今古卓爾不羣嗟乎陳思之於文章也譬人倫之有周孔鱗羽之有龍鳳音樂之有琴笙女工之有黼黻俾爾懷鉛吮墨者抱篇章而景慕映餘暉以自燭故孔氏之門如用詩則公幹升堂思王入室景陽潘陸自可坐於廊廡之間矣魏文學劉楨詩其源出於古詩壯氣愛竒動多振絶真骨凌霜高風跨俗但氣過其文雕潤恨少然自陳思已下楨稱獨步魏侍中王粲詩其源出於李陵發愀愴之詞文秀而質羸在曹劉間别構一體方陳思不足比魏文有餘晉步兵阮籍詩其源出於小雅無雕蟲之功而詠懷之作可以陶性雲發幽思言在耳目之內情寄八荒之表洋洋乎會於風雅使人忘其鄙近自致逺大頗多感慨之詞厥旨淵放歸趣難求顔延往解怯言其志晉平原相陸機詩其源出於陳思才高辭贍舉體華美氣少於公幹文劣於仲宣尚規矩不貴綺錯有傷直致之譏然其咀嚼英華厭飫膏澤文章之淵泉也張公歎其大才信矣晉黃門郎潘嶽詩其源出於仲宣翰林歎其翩翩亦如翔禽之有羽毛衣被之有綃縠猶淺於陸機謝混云潘詩爛若舒錦無處不佳陸文如披沙揀金往往見寶嶸謂益壽輕華故以潘勝翰林篤論故歎陸為深余常言陸才如海潘才如江晉黃門郎張協詩其源出於王粲文體華淨少病纍又巧構形似之言雄於潘嶽靡於太沖風流調達實曠代之高手詞彩蔥蒨音韻鏗鏘使人味之亹亹不倦晉記室左思詩其源出於公幹文典以怨頗為情切得諷諭之致雖野於陸機而深於潘嶽謝康樂常言左太沖詩潘安仁詩古今難比宋臨川太守謝靈運詩其源出於陳思雜有景陽之體故尚巧似而逸蕩過之頗以繁蕪為纍嶸謂若人興多才高博寓目輒書內無乏思外無遺物其繁富宜哉然名章逈句處處間起麗典新聲絡繹奔會譬猶青松之拔灌木白玉之映塵沙未足貶其高潔也初錢塘杜明師夜夢東南有人來入其館是夕即靈運生於會稽旬日而謝玄亡其家以子孫難得送靈運於杜治養之十五方還都故名客兒詩品中序曰一品之中略以世代為先後不以優劣為詮次又其人既往其文克定今所寓言不録存者夫屬詞比事乃為通談若乃經國文符應資博古撰德駮奏宜窮往烈至乎會詠情性亦何貴於用事思君如流水既是即目高臺多悲風亦唯所見清晨登隴首羌無故實明月照積雪詎出經史觀古今勝語多非補假皆由直尋顔延謝莊尤為繁密於時化之故大明泰始中文章殆同書抄近任昉王元長等辭不貴竒競須新事邇來作者寢以成俗遂乃句無虛語語無虛字拘攣補納蠧文已甚但自然英旨罕值其人詞既失高則宜加事義雖謝天才且表學問亦一理乎陸機文賦通而無貶表孝充翰林踈而不切王微鴻寶密而無裁顔延論文情而難曉摯虞文志詳而博贍頗曰知言觀斯數家皆就談文體而不顯優劣至於謝客集詩逢詩輒取張隱文士逢文即書諸英志録並義在文曽無品第嶸今所録止乎五言雖然網羅今古詞人殆集輕欲辨彰清濁掎撫病利凡百二十人預此宗流者便稱才子至斯三品升降差非定制方申變裁請寄知者爾漢上計秦嘉嘉妻徐淑詩夫妻事既可傷文亦悽怨為五言者不過數家而婦人居二徐淑敘别之作亞於團扇矣魏文帝詩其源出於李陵頗有仲宣之體則新竒百許篇率皆鄙直如偶語唯西北有浮雲十餘首殊美贍可玩始見其工矣不然何以銓衡羣彥對揚厥弟者耶晉中散嵇康詩頗似魏文過為峻切訐直露才傷淵雅之致然託諭清逺良有鑒裁亦未失高流矣晉司空張華詩其源出於王粲其體華艷興託不竒巧用文字務為妍冶雖名高曩代而疏亮之士猶恨其兒女情多風雲氣少謝康樂云張公雖復千篇猶一體耳今置之中品疑弱處之下科恨少在季孟之間矣魏尚書何晏晉翊守孫楚晉著作王贊晉王司徒椽張翰晉中書令潘尼平叔鴻鴈之篇風規見矣子荆零雨之外正長朔風之後雖有纍札良亦無聞季鷹黃華之唱正叔緑蘩之章雖不具美文彩高麗並得虬龍片甲鳯凰一毛事同駮聖宜居中品魏侍中應璩詩祖襲魏文善為古語指事殷勤雅意深篤得詩人激刺之旨至於濟濟今日所華靡可諷味焉晉清河守陸雲晉侍中石崇晉襄城太守曹攄晉朗陵公何劭清河之方平原殆如陳思之匹白馬于其哲昆故稱二陸季倫顔逺並有英篇篤而論之朗陵為最晉太尉劉琨晉中書劉湛詩其源出於王粲善為悽戾之詞自有清拔之氣琨既體良才又罹厄運故善敘喪亂多感恨之詞中郎仰之微不逮者矣晉𢎞農太守郭璞詩憲章潘嶽文體相暉彪炳可玩始變平原平淡之體故稱中興第一翰林以為詩首但遊仙之作辭多慷慨乖逺玄宗而云奈何虎豹姿又云戢翼棲榛梗乃是坎壈詠懷非列仙之趣也晉吏部郎袁宏詩彥伯詠史雖文體未遒而鮮明緊健去凡俗逺矣晉處士郭泰機晉常侍顧愷之宋謝世基宋參軍顧邁宋參軍戴凱詩泰機寒女之製孤怨宜恨長康能以二韻答四首之美世基橫海顧邁鴻飛戴凱人實貧羸而才章富健觀此五子文雖不多氣調警拔吾許其進則鮑昭江淹未足逮上越居中品僉曰宜哉宋徴士陶潛詩其源出於應璩又協左思風力文體省靜殆無長語篤意真古辭興婉愜每觀其文想其人德世歎其質直至如歡言醉春酒日暮天無雲風華清靡豈直為田家語邪古今隱逸詩人之宗也宋光祿大夫顔延之詩其源出於陸機尚巧似體裁綺密情喻淵深動無虛散一句一字皆致意焉又喜用古事彌見拘東雖乖秀逸是經綸文雅才雅才減若人則蹈於困躓矣湯惠休曰謝詩如芙蓉出水顔如錯彩縷金顔終身病之宋豫章太守謝瞻宋僕射謝鯤宋太尉袁淑宋徴君王微宋征虜將軍王僧達詩其源出於張華才力苦弱故務其清淺殊得風流媚趣課其實録則豫章僕射宜分庭抗禮徴君太尉可託乘後車征虜卓卓殆欲度驊騮前宋法曹參軍謝惠連詩小謝才思富捷恨其蘭玉夙雕故長轡未騁秋懷搗衣之作雖復靈運鋭思亦何以加焉又工為綺麗歌謡風人第一謝氏家録云康樂每對惠連得佳語後在永嘉西堂思詩竟日不就寤寐間忽見惠連即成池塘生春草故當云此語有神助非吾語也宋參軍鮑昭詩其源出於二張善製形狀寫物之詞得景陽之淑詭含茂先之靡嫚骨節強於謝混驅邁疾於顔延總四家而擅美跨兩代而孤出嗟其才秀人微故取湮當代然貴尚巧似不避危仄頗傷清雅之調故言險俗者多以附昭齊吏部謝眺詩其源出於謝鯤微傷細密頗在不倫一章之中自有玉石然竒章秀句往往警遒足使叔源失步明達變色善自發詩端而末篇多躓此意鋭而才弱也至為後進士子之所嗟慕眺亟與余論詩感激頓挫過其文梁光祿江淹文通詩體總雜善於摹擬筋力於王微成就於謝眺初淹罷宣城郡遂宿冶亭夢一美丈夫自稱郭璞謂淹曰吾有筆在卿處多年矣可以見還淹探懷中得一五色筆以授之爾後為詩不復成語故世傳江淹才盡梁衛將軍范雲梁中書郎丘遲范詩清便宛轉如流風廽雪邱詩點綴映媚似落花依草故當淺於江淹而秀於任昉梁太常任昉詩彥升少年為詩不工故世稱沈詩任筆昉深恨之晚節愛好既篤又亦遒變若銓事理拓體淵雅得國士之風故擢居中品但昉既博物動輒用事所以詩不得竒少年士子效其此弊矣梁左光祿沈約觀休文衆製五言最優詳其文體察其餘論固知憲章鮑明逺也所以不間於經綸而長於清怨永明相王愛文王元長等皆宗附之約于時謝眺未遒江淹才盡范雲名級故微故約稱獨步雖文不至其工麗亦一時之選也見重閭里誦詠成音嶸謂約所著既多今剪除浮雜收其精要允為中品之第矣故當詞密於范意淺於江也詩品下序曰昔曹劉殆文章之聖陸謝為體二之才鋭精研思千百年中而不聞宫商之辨四聲之論或謂前達偶然不見豈其然乎嘗試言之古曰詩頌皆被之金竹故非調五音無以諧會若置酒髙堂上明月照高樓為韻之首故三祖之詞文或不工而韻入歌唱此重音韻之義也與世之言宫商異矣今既不備管絃亦何取於聲律耶齊有王元長者常謂余云宫商與二儀俱生自古詞人不知之唯顔憲子乃云律呂音調而其實大謬唯見范曄謝莊頗識之耳常欲進知音論未就王元長創其首謝眺沈約揚其波三賢或貴公子孫幼有文辨於是士流景慕務為精密劈績細微專相凌架故使文多拘忌傷其真美余謂文製本須諷讀不可蹇礙但令清濁通流口吻調利斯為足矣至平上去入則余病未能蜂腰鶴膝閭里已具陳思贈弟仲宣七哀公幹思友阮籍詠懷子卿雙鳬叔夜雙鸞茂先寒夕平叔衣單安仁倦暑景陽苦雨靈運鄴中士衡擬古越石感亂景純詠仙王微風月謝客山泉叔源離宴鮑照戍邉太沖詠史顔延入洛陶公詠貧之製惠連搗衣之作斯皆五言之警䇿者也所謂篇章之珠澤文彩之鄧林漢令史班固漢孝亷酈炎漢上計趙一孟堅才流而老於掌故觀其詠史有感歎之詞文勝託詠靈芝觀懷寄不淺元叔散憤蘭蕙指斥囊錢苦言切句良亦勤矣斯人也而有斯困悲夫魏武帝魏明帝曹公古直甚有悲涼之句睿不如丕亦稱三祖魏白馬王彪魏文學徐幹白馬與陳思答贈偉長與公幹往復雖曰以莛扣鐘亦能間雅矣魏倉曹屬阮瑀晉頓丘太守歐陽建晉文學應璩晉中書令嵇含晉河南太守阮侃晉侍中嵇紹晉黃門棗據元瑜堅石七君詩並平典不失古體大檢似而二嵇微優矣晉中書張載晉司𨽻傅玄晉太僕傅咸侍中繆襲散騎常侍夏候湛孟陽詩乃逺慙厥弟而近超兩傳長虞父子繁富可嘉孝沖雖曰後進見重安仁熙伯挽歌唯以造哀爾晉驃騎王濟晉征南將軍杜預晉廷尉孫綽晉徴士許詢永嘉以來清虛在俗王武子輩詩貴道家之言爰洎江表玄風尚備有長仲祖桓庾諸公猶相襲世稱孫許彌善恬淡之詞晉徴士戴逵晉東陽太守殷仲文宋謝混晉宋之際殆無詩乎義熙中以謝益壽殷仲文為華綺之冠殷不競矣宋尚書令傅亮季友文余常忽而不察今沈特進撰詩載其數首亦復平矣宋記室何長瑜羊曜璠宋詹事范曄詩乃不稱其才亦為鮮舉矣宋孝武帝宋南平王鑠宋建平王宏孝武詩雕文織綵過為精密為二潘希慕見稱輕巧矣宋光祿謝莊希逸詩氣候清雅不逮於王袁然興屬間長良無鄙促也宋御史蘇寶生宋中書令史陵修之宋典詞令任曇緒宋越騎戴法興蘇陵任戴並著篇章亦為搢紳之所嗟咏人非文才是愈甚可嘉焉宋監典事區惠恭惠恭本胡人為顔師伯幹顔為詩筆輒偷定之後造獨樂賦語侵給主被斥及大將軍修北第差充作長時謝惠連兼記室參軍恭伯往共安陵嘲調末作雙枕詩以示謝謝曰君誠能恐人未重且可謝為謝法曹造遣大將軍見之賞歎以錦二端賜謝謝曰辭白此詩公作長所製請以錦賜之齊惠休上人齊道猷上人齊釋寶月惠休淫靡情過其才世遂匹之鮑昭恐商周矣羊曜璠云是顔公忌昭之文故立休鮑之論庾帛二胡亦有清句行路難是東陽柴廓所造寶月嘗憩其家會廓亡因竊而有之廓子賫手本出都欲訟此事乃厚賂止之齊高帝齊征北將軍張永齊太尉王文憲齊高帝詩詞藻意深無所云少張景雲雖謝文體頗有古意至如三師文憲既經國圗逺或忽是雕蟲齊黃門謝超宗齊潯陽太守丘靈鞠齊給事中郎劉祥齊司徒長史檀超齊正貟郎鍾憲齊諸暨令顔則齊秀才顔則心檀謝七君並祖襲顔延之欣欣不倦得士大夫之雅致乎余從祖正貟常云大明泰始中鮑休美文殊已動俗唯此諸人傳顔陸體用固執不如顔諸暨最荷家聲齊參軍毛伯成齊朝請王邁逺齊朝請許謡之伯成文不全佳亦多惆悵吳善之風人答贈許長於短句詠物湯體謂逺云吾詩可為汝詩父以訪謝光祿云不然爾湯可為庶兄齊鮑令暉齊韓蘭英令暉歌詩往往斷絶清巧擬古尤勝唯百願淫矣昭常答孝武云臣妹才自亞於左芬臣才不及太沖爾蘭英綺密甚有名篇又善談笑齊武謂韓云借使二媛生於上葉則玉階之賦紈素之辭未詎多也齊司徒長史張融齊詹事孔稚圭思光紆緩誕放縱有乖文體然亦捷疾豐饒差不局促德璋生於封溪而文為雕飾青於藍矣齊寧朔將軍王融齊中庶子劉繪元長士章並有盛才詞美英淨至於五言之作幾乎尺有所短譬應變將略非武侯所長未足以貶臥龍齊僕射江祐祐詩猗猗清潤弟祀明魔可懷齊記室王申齊綏逺太守卞彬齊端溪令下録王申二卞詩並愛竒嶄絶慕袁彥伯之風雖不𢎞綽而文體勦淨去平美逺矣齊諸暨令袁嘏嘏詩平平耳多自謂能常語徐太保尉云我詩有生氣須人捉者不爾便飛去齊雍州刺史張欣泰梁中書郎范縝欣泰子真並希古勝文鄙薄俗製賞心流亮不失雅宗梁秀才陸厥觀厥文緯具識丈夫之情狀自製未優非言之失也梁常侍虞羲梁建陽令江洪陽詩竒句清拔謝眺常嗟頌之洪雖無多亦能自逈出梁步兵鮑行卿梁晉陵令孫察行卿少年甚擅風謡之美察最幽微而感賞至到耳講説類廣雅曰講讀也論道也説文曰講和解也論義也又鄭玄云論倫也賈逵曰論釋也皆解説談議訓誥之謂也論語曰德之不修學之不講聞義不能徙不善不能改是吾憂也漢書曰夏侯勝每講常謂諸生曰學經不明不如歸耕又曰孔光居公輔位前後十七年時會門下諸生講問疑難舉大義弟子多成就為博士班伯為常侍上方嚮學鄭寬中與張禹朝夕入説尚書論語於金華殿中詔伯受焉既通大義又講異同於許商東觀漢記曰建初四年詔諸王諸儒會白虎觀講五經同異則其事也禮記曰善待問者如撞鍾扣之以小者則小鳴扣之以大者則大鳴大學始教皮辨祭菜示敬道也鄭玄注曰祭菜禮先聖先師也孫卿子曰達師之教使弟子安焉樂焉往焉遊焉肅焉藏焉嚴此六者得其學則邪僻之道塞矣史記曰董仲舒以明春秋孝景時為博士下帷講誦弟子轉相受業或莫見其面申公魯人也呂太后時遊學長安與劉郢同師郢為楚王令申公傅其太子戊戍不好學疾申公及戍立為王胥靡申公耻之退居家教授終身不出門孔子既沒子夏居西河教授為魏文侯師謝丞後漢書曰董春字紀陽少好學究極聖指後還歸立精舍逺方門徒學者常數百人諸生每升講堂鳴鼓三通橫經捧手請問者百人追隨上堂難問者百餘人范曄後漢書曰馬融常在高堂施絳紗帳前授生徒後列女樂弟子以相次傳授鮮有入其室者漢書曰班伯為中常侍上方嚮學鄭寬中與張禹朝夕入説尚書論語於金華殿中詔伯授焉范曄後漢書曰高鳳南陽人也專精誦讀為名儒教授西唐山中東觀漢記曰桓榮拜議郎入侍太子每期會輒令榮於公卿前敷奏經書帝稱善後漢書曰戴馮字次仲正朔朝賀帝令羣臣説經義有不通者輒奪其席以益通者馮重五十席東觀漢記曰永平九年詔為四姓小侯開學置五經師張酺以明經授於南宫范曄後漢書曰李育沉思專精博覽書傳州郡請召育輒病去常避地教授門徒數百人謝丞後漢書曰包減字子長明魯詩論語注東海丘精令講授范曄後漢書曰揚倫通古文尚書不應州郡之命講授於大澤中弟子至千餘人沈約宋書曰魏齊王每講𨽻經通輒使太常釋奠先聖先師於辟雍魏書曰文帝初在中宫氣癘數起士人凋落帝深感歎與大理王朗書云疫癘數起士人凋落余獨何人能全其壽故集諸儒於肅成門內講論大義侃人無倦沈約宋書曰元嘉十五年徵雷次宗至京師開館聚徒授教使丹陽尹何尚之立玄學太子率更令何承天立史學司徒參軍謝元立文學凡四學並建之王隱晉書曰魏高貴公之入學也王祥為三老帝北面乞言乃言曰仰惟明主聖帝之軌俯以訓帝羣書考索卷二十二
