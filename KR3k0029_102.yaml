body:
  text: 羣書考索後集卷三十六宋章如愚編士門分類總考貢舉周禮大司徒以鄉三物教萬民而賓興之一曰六德二曰六行三曰六藝鄉大夫三歲大比考其德行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賓之厥明鄉老及鄉大夫羣吏獻賢能之書于王王再拜而受之登于天府內史二之退而以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞此謂使民興賢出使長之使民興能入使治之州長三年大比則大考州里贊卿大夫廢興黨正正歲屬民讀法而書其德行道藝以歲時涖校比及大比亦如之族師月吉屬民而讀邦法書其孝弟睦姻有學者閭胥既比則讀法書其敬敏任恤者並地官詳見選舉門秦自孝公納商鞅策富國強兵為務仕進之途惟闢田與勝敵而已始皇遂平天下通典漢高祖十一年詔曰賢士大夫既與我定有天下而不與吾共安利之可乎有能從我遊者吾能尊顯之以布告天下後漢章帝建初元年詔曰夫鄉舉里選必纍功勞今刺史守相不明真僞茂材孝亷歲以百數每尋前代舉人貢士或起畎畝不係閥閲敷奏以言則文章可採明試以功則政有異迹文質彬彬朕甚嘉之始復用前漢丞相故事以四科辟士通典魏文帝立九品中正法擇州郡之賢有識鑒者為之區别人物第其高下通典黃初三年始除漢限年之制令郡國貢舉勿拘老幼儒通經術吏達文法則皆試用通典東晉元帝制揚州歲舉二人諸州各一人時以天下喪亂務存慰勉遠方孝秀不復䇿試到即除署既經略粗定乃詔試經有才不中舉者免其太守其後孝秀莫敢應命送至京師皆以疾辭通典宋制丹陽吳會稽吳興四郡歲舉二人餘郡各一人凡州秀才郡孝亷至皆䇿試天子或親臨之及公卿所舉皆屬吏部叙才銓用通典文帝元嘉中限年三十而仕通典孝武即位仕者不復拘老幼通典齊尚書都令史駱宰議䇿秀才格五問並得為上四三為中二為下一不合與第通典梁初無中正制年二十有五方得入仕通典天監中又制凡九流常選年未三十不通一經者不得為官若有才同甘顔勿限年次至七年州置州重郡置郡崇鄉置鄉豪各一人專典搜薦無復膏粱寒素之隔通典普通七年詔凡州歲舉二人大郡一人敬帝太平二年復令諸州各置中正仍舊訪選舉皆須中正選上然後量授不然則否陳依梁制凡年未三十不得入仕唯經學生䇿試得第後魏州郡皆有中正掌選舉其秀才對䇿第居中正上表叙之北齊選舉多沿後魏之制凡州縣皆置中正其課試之法中書䇿秀才集書策考貢士考功郎中䇿亷良天子常服乘輿出坐於朝堂中楹秀孝各以班草對字有濫誤者呼起立席後書有濫劣者飲墨水一升文理孟浪者奪席脫容刀隋文帝開皇中制諸州歲貢三人工商不得入仕煬帝始置進士科唐貢士之法多循隋制上郡歲三人中郡歲二人下郡一人有才能者無常數其常貢之科有秀才有明經有進士有明法有書有算自京師郡縣皆有學焉並具學篇通典每歲仲冬郡縣館監課試其成者長吏會屬僚設賓主陳爼豆備管絃牲用少牢行鄉飲酒禮歌鹿鳴之詩徵耆艾叙少長而觀焉既餞而與計偕其不在館學而舉者謂之鄉貢又制取士之科大要有三由州縣者曰鄉貢皆升于有司而進退之自是士族所趣嚮惟明經進士二科而已其初止試䇿並通典太宗貞觀八年詔加進士試讀經史一部通典高宗調露二年劉思立始奏二科並加帖經其後又加老子孝經使兼通之通典武后長夀二年自製臣軌兩篇令貢舉習業停老子同上中宗神龍二年二月制貢舉人停臣軌依舊習老子同上舊制以考功郎中監試貢舉貞觀後以考工員外郎專掌同上𤣥宗開元二十一年新注老子成詔天下每歲貢士減尚書論語䇿而加老子焉二十四年制移貢舉於禮部以侍郎掌之同上二十五年其進士停經天寶元年帖既通而後試文試賦各一篇文通而後試䇿凡五條三試皆通者為第一進士有甲乙二科自武德以來進士惟乙科而已先試之期命舉人謁于先師有司十日宿張于國學宰輔以下皆㑹而觀焉博集羣議講論而退之禮部閲試之日皆嚴設兵衛荐棘圍之搜索衣服譏訶出入以防假濫焉其進士大抵千人得第者百一二開元以後四海宴清士無賢不肖恥不以文章達其應詔而舉者多則二千人少猶不減千人所收百才有一並同上肅宗乾元中禮部侍郎李揆病取士不考實徒務搜索進所披而迂學陋生且不能自惜干詞乃陳書庭中進諸儒約曰上選士第務得才可盡所欲言由是人人稱美本傳寶應二年禮部侍郎楊綰奏諸州每歲貢人依鄉舉里選察秀才先是進士試詩賦德宗建中二年趙贊以針論表贊代詩賦文宗太和八年復試詩賦從內出題以試進士謂侍臣曰吾患文格浮薄昨日出題所試差勝乃詔禮部歲取登第三十人茍無其人不必充數鄭覃疾進士浮薄屢請罷之文宗曰淳厚浮薄色色有之進士科取人二百年矣不可遽罷唐志武宗即位李德裕論進士不根藝實朝廷顯官須公卿子弟為之唐志宋太祖建隆元年二月丙戌先是中書舍人安次扈䝉權知貢舉庚寅奏進士合格者十九人姓名二年二月癸酉權知貢舉竇儀奏三月丙子權知貢舉王著奏進士合格者十五人九月丙辰詔及第舉人不得呼知舉官為恩門師門及自稱門生並見㑹要乾德元年二月辛亥權知貢舉薛居正奏進士合格者八人八月壬辰詔禮部貢院所試九經舉人落第宜依諸科舉人例許令再試九月丙子詔禮部貢舉人自今朝臣不得更發公薦違者重置其罪故事每歲知舉官將赴貢院臺閣近臣得薦抱至藝者號曰公薦然去取不能無所私至是禁止乾德三年三月丁酉權知貢舉陶榖奏進士合格者八人九月癸未權知貢舉盧多遜言諸州所薦士數益多乃約用顯德之制定發解條例及殿罰之式以懲濫進詔頒行之乾德三年二月丁巳權知貢舉盧多遜奏進士合格姓名凡七人乾德四年二月辛酉權知貢舉王祜言進士合格者六人諸科合格者九人上恐其遺才復令於不中選人內取其優長者䇿而升之乾德五年二月壬申權知貢舉盧多遜奏進士合格者十人復詔參知政事薛居正於中書覆試皆合格乃賜及第開寶元年三月癸巳權知貢舉王祜擢進士合格者一人陶榖子邴名在第六翌日穀入致謝上謂左右曰聞榖不能訓子邴安得登第遽命中書覆試而邴復登第因下詔曰造士之選匪植私恩世祿之家宜崇素業如間黨與頗文衡公器豈宜欺濫自今舉人凡關食祿之家委禮部具析以聞當覆試長編前輩謂進士一科為將相科王曽則其人可知也當時取士兼採譽望廷唱或先審人物有以翰林學士之子而命覆試者陶榖之子昞有以宰相參政之子弟而皆罷之者李昉之子宗吕蒙正之弟蒙亨有以升黜未公而再行考試者王曽等言有以取舍非當至擊鼓自陳者徐士庶有以賦落韻特取之者李迪有以注疏異說而特黜之者賈邊有以上書可用而通榜皆為通判者張齊賢有以儀狀秀偉而召見擢為第一者蔡齊國初取士之際猶不拘於法也或欲罷封彌之法范仲淹范鎮等或欲隆學校之教歐陽修或欲還田里之選趙師民或欲置經明行修之科司馬光皆欲考其素履兼採譽望如國初之制然時異事變難於卒行則亦相視太息而已開寶三年二月甲子權知貢舉趙逢奏進士合格者十人安德裕等此據㑹要登科記其日丁卯是春車駕親征不知何緣不停舉趙逢尋亦為隨車轉運使豈即於行在所取士乎冬十月丁亥詔西川山南荆湖等道自今發遣舉人往來並給劵開寶三年三月壬寅朔詔禮部貢院閲進士諸科十五舉以上曽經終場者以名聞甲辰得司馬浦等六十三人庚戌復取十五舉未經終場者四十三人並賜出身仍詔自今勿得為例權知貢舉扈蒙擢進士合格者八人開寶四年二月辛卯知制誥盧多遜權知貢舉扈蒙奏合格者十人開寶五年閏二月壬辰權知貢舉扈蒙奏合格進士京兆安守亮等十一人諸科十七人上召對於講武殿始詔制放榜新制也十一月己巳詔諸道舉人自今並於本貫州府取解不得更稱寄應如從化外至者先投牒開封府奏請得㫖方許召試開寶六年三月辛酉新及第進士雍邱宋準等十人詔科二十八人詣講武殿謝上以進士武濟川材質最陋應對失次絀去之濟川翰林學士李昉鄉人也昉時權知貢舉上頗不悅會進士徐士亷等擊登聞鼓訴昉用情取舍非當上以問翰林學士盧多遜曰頗亦聞之上乃令貢院籍終場下第者姓名得三百六十人癸酉皆召見擇其一百九十五人并凖以下及士亷等各賜紙札别賦詩賦命殿中侍御史李瑩左司員外郎侯陟等為考官乙亥上御講武殿親閲之得進士二十六人士亷與焉五經四人開元禮七人三禮三十八人三傳二十六人三史三人學究十八人明法五人皆賜及第又賜凖錢二十萬以張宴會責昉為太常少卿考官右贊善大夫楊可法等皆坐責自兹殿試遂為常式夏四月乙酉詔諸州考試官令長吏精選僚屬有才學公正者充知貢舉與考試官同看詳義卷定其通否否即駁放不得優假虛至終場申禁私薦屬舉人募告者其賞有差舉人勒還本貫重役永不得入科場開寶七年三月詔權停貢舉開寶八年二月丁卯知制誥王祐權知貢舉知制誥扈蒙左補闕梁周翰祕書丞雷德驤並權同知貢舉命權同知貢舉始此戊辰上御講武殿覆試王祐等所奏合格舉人王式等因語之曰向者登科名級多為勢家所取致塞孤貧之路甚無謂也今朕躬親臨試以可否進退盡革疇昔之弊矣式等皆頓首謝於是內出詩賦題試得進士王宗以下三十人諸科三十四人八月辛酉詔停今年貢舉十二月甲子詔貢士之下第者特免將來請解許直詣貢部太宗太平興國二年正月丙寅上初即位以疆宇至逺吏員益衆思廣振淹滯以資其缺顧謂侍臣曰朕欲博求俊乂於科場中非敢望拔十得五止得二三亦可為致治之具矣先是諸道所發貢士凡五千三百餘人命張洎石熙載試進士侯陶等試諸科侯涉監之禮部上所試合格人名戊辰上御講武殿出詩賦題覆試進士賦韻平仄相間依次用命翰林李昉扈蒙定優劣為三等得河南吕蒙正以下一百九人庚午覆試諸科得二百七人並賜及第詔禮部閲貢籍得十五舉以上進士及諸科一百八十四人並賜出身九經七人不中格上憐其老特賜同三傳出身凡五百人時先賜緑袍鞋笏錫宴開寶寺上自為詩章賜之唐時禮部放榜之後醵飲於曲江號曰聞喜宴五代多於佛舍名園周顯德中官為主之上命中使典領供帳甚盛第一第二等進士并九經授將作監丞大理評事通判同出身進士及諸科並送吏部免選優等注擬初資職事判司部尉龍章殊異厯代所未有也初太祖幸西京洛陽人張齊賢獻下并汾富民封建敦孝舉賢太學籍田選良吏懲奸謹刑十䇿太祖召見問之齊賢以手畫地條陳太祖善其四䇿齊賢堅執其餘䇿皆善太祖怒令衛士曳出及還語上曰我幸兩京惟得一張齊賢我不欲遂官爵之汝異時可官以自輔齊賢舉進士上决欲置之高等而有司第其名適在數十人後上不悅乃詔進士盡第二等及九經凡一百三十人悉與超除蓋為齊賢故也十月癸未詔權停貢舉一年興國三年八月甲戌上恐場屋間有留滯者乃詔諸州去年已得解者除三禮三傳學究外餘並以秋集禮部九月甲申上御講武殿覆試禮部合格人進士加論一首自是常以三題為準得渤海以下七十四人乙酉得諸科七十人並賜及第始賜宴於迎春苑授官如二年之制故事禮部惟春放榜至是秋試非常例也詔自今禮部試進士律賦並以平仄依次用韻十二月甲戌是冬諸州貢舉人並集會將親征河東罷之自是每間一年或二年乃置貢舉興國四年十一月丙戌詔進士及諸科引試日並以律文疏卷問義又詔張詠冦準同赴大名舉議將首薦詠詠以同郡張覃素有文行即率冦公請以覃為冠士論多之興國五年閏三月甲寅上御講武殿覆試權知貢舉程羽等所奏合格進士得銅山蘇易簡以下百一十九人諸科五百三十三人並分第甲乙賜宴始有直史館陪坐之制進士第一等授將作監丞通判藩郡次授大理評事知令録事諸科受初等職事及判司簿尉興國五年夏四月丁丑趙國昌者求應百篇舉癸未上親試之出雜題二十字令各賦五篇篇八句逮至日旰僅成數十首率無可觀上以此科久廢特賜及第以勸來者仍詔有司自今應百篇舉約此為題長編興國七年九月癸丑上以諸道進士猥雜或挾書假手僥幸得官所至多觸憲章欲懲革之甲寅詔所在貢舉等州自今長吏擇官考試合格許薦送仍令禮部自今解貢舉人依吏部選人例每十人為保有行止違踰為他人所告者同保並當連坐不得赴舉興國八年正月壬戌兩京諸道州府貢士一萬二千六十人甲子命中書舍人宋白等十人權知貢舉三月丙子上御講武殿覆試禮部貢舉人擢進士長沙王世則以下百七十五人諸科五百一十六人並賜及第進士五十四人諸科百七十七人同出身賜宴始就瓊林苑其後遂為定制登科記是年始分甲按國史志分第甲乙乃五年等也六月戊申上因謂侍臣朕親選多士殆忘飢渴召見臨問以觀其材拔而用之庶使嵓野無遺佚而朝廷多君子爾十二月癸卯上謂宰相曰邇來場屋混淆頗聞有僧道還俗赴舉者此輩不能專一科教他日在官必非亷潔之士先須通經過周孔之教或止習浮淺文章殊非務本之道當下詔切戒之甲辰令諸州禁還俗僧道赴舉進士免貼經只試墨義二十道皆以經中正文大義為問題又增進士及諸科各試法書墨義十道又詔諸道下第舉人依舊重請文解不得準近例常赴貢部雍熙二年正月癸亥翰林賈黃中等九人權知貢舉上謂宰相曰夫設科取士之門最為捷要然而近年籍滿萬餘人得無濫進者乎己巳詔自今諸科並令量定人數相參引試分科隔坐命官巡察監門謹視出入有以文字往覆與吏為奸者置之於法私以經義相教者斥出科場伍保預知亦連坐進士倍加研覆貢舉人勿以曾經御試不考而薦始令試官親戚别試者此九十八人又罷進士試律復貼經三月己未上御崇政殿覆試禮部貢舉人得進士須城梁灝等百七十九人庚申得諸科三百一十八人並唱名賜及第唱名自此始據登科記宰相李昉之子宗諤及參知政事吕蒙正之從弟蒙亨鹽鐵使王明之子扶度支使許仲宣之子待問舉進士皆入等上曰此並勢家與孤寒競進縱以藝升人亦以朕為有私也皆罷之青州人王從善應五經舉年始踰冠自言通誦五經文注上厯舉本經試之其誦如流特賜九經及第面賜緑袍銀帶錢三萬時左右獻言尚有遺材壬戌復試又得進士上元洪湛等七十六人癸亥得諸科三百二人並賜及第甲子詔御前下等人有十五舉以上者及貢院第四等人凡八十四人並賜大科及第雍熙三年三月庚寅詔權停貢舉雍熙四年十一月庚寅雍熙初貢舉人集闕下者殆踰萬計禮部考合格奏名尚不減千人上自旦及夕臨軒閲試纍日方畢十二月庚寅朔詔自今歲命春官知貢舉如唐室故事應已得解者明年春集闕下未得解者許至秋取解知貢舉宋白等請已得解在千里內者委本處重加考試乃發遣千里外者就西京仍乞戒勵試官務令精核從之端拱元年閏五月先是翰林禮侍宋白知貢舉放進士程宿以下二十八人諸科一百人榜既出而謗議鋒起或擊登聞求别試上意其遺才壬寅召下第人覆試於崇政殿得進士馬國祥以下及諸科凡七百人令樞密院用白紙為牒賜之以試中為目令權知諸縣簿尉謂樞密副使張宏曰朕自即位以來親選貢士大者為棟梁小者為榱桷今封疆萬里人無棄材六月丁巳上既擢馬國祥等猶恐遺材復命右正言王世則等召下第進士及諸科於武成王廟重試得合格數百人丁丑士覆試詩賦又拔進士葉齊以下三十一人諸科八十九人並賜及第端拱二年三月庚寅知貢舉蘇易簡等固請御試壬寅上御崇政殿試合格舉人得進士閬中陳堯叟晉江曾㑹等一百八十六人諸科孫何等四百五十人並賜及第七十三人同出身賜宴始令兩制三館文臣皆預賜堯叟等針一首勉以修身謹行稽古效官之意堯叟及會並授光祿寺丞直史館第三以下分授職事州縣官越州進士劉少逸年十三中選既與宴則又賜御題賦詩數章皆有趣授校書郎令於三館讀書時中書令史守當官陳貽慶舉周易學究及第既而上知之令追奪所授敕牒釋其罪勒歸本局謂侍臣曰科級之設待士流也豈容走吏冒進竊取科名哉乃詔自今中書樞密院宣徽學士院京百司諸州係職人吏並不得離局應舉又詔貢舉人試科業畢並令試讀律其有不能離經辨句及呼字乖繆者皆駮放如有通念一部與本科及第是歲又申明舉人並請本貫文解之制鄉里在聲教未通之地者許於兩京寄應又貢舉人中有工賈雜類或被廢疾及曾罹刑責不得薦送其雜類中有茂材異等卓然秀出者許之淳化元年三月乙未詔權停貢舉淳化二年吏部吕蒙正以為取士之門無出貢部天下解薦頗失精研望條制以懲謬濫上曰取士擇材國之令典不可不謹寶訓淳化三年正月丙申朔諸道貢舉人萬七千三百皆集闕下辛丑命蘇易簡等同知貢院既受詔徑赴貢院以避請求後遂為常制三月戊戌上御崇政殿覆試合格進士先是胡旦蘇易簡王世則梁灝陳堯叟皆以所試先成擢上第由是士爭習浮華尚敏速或一刻數詩或一日十賦將作監丞陳靖上疏請糊名考校以革其弊上嘉納之詔兩省三館文學士始令糊名考校第其優劣以分等級得孫何以下凡三百二人並賜及第五十一人同出身上諭之曰爾等各負志業中我廷選效官之外更勵精文翰勿墜前功也何等旅拜辛丑又覆試諸科擢七百八十四人並賜及第百八十人出身就宴賜御製詩三首針一首進士孫何而下四人皆授將作監丞大理評事通判諸州餘及諸科援故事州縣官入謝於長春殿上謂宰相曰天下至廣藉羣材共治之今嵗登第者又千餘人皆朕所選擢此等但能自撿清美替而歸則馴致亨行未易測也時詔刻禮記儒行篇賜近臣及京城朝官與在外者并以賜何等令為座右之誡初內殿坐書以賜御侍以寵之至陳堯叟始易以針用敦勉崇及孫何則詩論並賜時論榮之內出巵言日出無數見者駭異不能措詞頒率扣殿檻上請會稽錢易時年七十日未中所試三題皆就言者指其輕俊特黜之淳化四年三月乙亥詔權停貢舉十二月辛丑詔三史及通禮科舊制各試三十場今但試十五場每場令貢舉官取三卷發其端俾之詩能曉大義及識竒字方為合格至道二年三月丁卯是春詔權停貢舉至道三年五月壬午詔今歲貢舉宜令有司精校能否無或因循如覆試有不合格者當行嚴罰每進士一百人許解二十人明經以下諸科共有一百人解二十人如不及一百人亦約此數解送仍十分中只取二分仍須合格有藝不必依所定分數會要云進士百人解二十九人恐九字誤特加詳考本志無此按孫何九月壬午議云貢士新規十取其二然則進士及明經諸科每百人各取二十人舊制國子監開封府舉人有與發解官親戚者止兩司更互考試上慮涉私徇是秋特選官别試十月癸丑命錢若水等覆考開封府得解進士試卷故事京府解十人已上謂之等甲非文業優贍有名稱者不處時以髙輔堯為首錢易次之易頗為流輩所推許意不平遂上書指陳發解官所試朽索馭六馬賦又詩論䇿題意涉譏訕又進士數百輩詣府訟薦送不當輔堯亦投牒遜謝請以易為首開封府以聞上以為士流紛競不可啓其端且欲鎮壓浮俗乃詔若水等擢文行兼著者一人為首乃以孫暨為第一輔堯第二易第三咸平二年春正月乙丑命禮部尚書溫仲舒知貢舉御史中丞張泳刑部郎中師頏同知貢舉刑部員外郎董龜太常博士正涉同考試及封印卷首仍當日入院禮部貢院封印卷首自此始三月癸亥詔今年舉人頗衆若依去年人數取合格者慮有所遺可增及七十人諸科增及百八十人禮部尋以孫暨等二百五十人名聞並賜及第五月丙戌詔天下貢舉人應三舉者今嵗俱免取解自餘依例舉選必求實藝無使遺賢當俟奏名朕親臨試咸平三年三月辛亥翰林王旦等三人權知貢舉三月戊寅詔禮部所試合格舉人有權要親族者具名以聞禮部上合格舉人甲午上御崇政殿親試命翰林宋白等與館閣王府三司官二十一人於殿後西閣考覆國子博士雷說著作佐郎梅詢封印卷首親覽入等者賜陳堯咨以下二百七十一人進士及第一百四十三人同本科及三傳學究出身堯咨堯叟弟也又命翰林邢昺等十五人考校諸科得四百三十二人賜及第同出身又試進士五舉諸科八舉及嘗經御試或年逾五十者論一篇得進士二百六十人諸科六百九十七人賜同出身及試校書郎將作監主簿賜宴日以御詩褒寵之以堯咨等五人並為將作監丞通判第一等並九經為大理評事知大縣第二等為節察防團推官餘為判司簿尉試御者守選四月戊辰詔自今兩京諸路所解舉人宜先察訪行實或藝文可採而操履有虧投書匿名冒濫欺罔之類並嚴加懲斷勒歸鄉縣課役永不得就本貫收試解送所由官吏必當論罪仍御史糾之五月辛卯詔曰去歲天下舉人數踰萬計考核之際謬濫居多蓋其薦送之時輒容僥幸合申憲典以警官司自今濫有解送及遺落孤寒藝實之士並從覆試有不當者輒論如律庚子詔權罷貢舉一年先是詔劉蒙叟等試河北青齊等州舉人得合格者五百八十二人上親試之賜進士齊革等十三人諸科三百四十五人及第同出身有下第求試武藝及量材録用者五百餘人各賜裝錢慰遣之命禮部叙為一舉若能捍冦即賞以官秩咸平五年三月己未上親試禮部舉人得進士王曾以下三十八人九經諸科百八十一人並賜及第先是貢舉人集闕下者萬四千五百六十二命吏部陳恕知貢舉恕所取士甚少以王曾為首糊名考校曽復得甲科時議稱之舊制試經科復舊場第始議進退恕初試一場即按通不去留之以是諸州舉送官吏皆被黜責譴纍甚衆江南恕鄉里所斥無多人用怨讟競為謡詠譏刺或刻木像其首塗血擲於庭又縳葦為人題恕姓名列置衢路過輒鞭之景德二年正月癸亥命翰林趙安仁等五人權知貢舉三月甲寅上御崇政殿親試禮部奏名舉人得進士李迪以下二百四十六人第為五等第一二三等賜及第第四五等同出身又得特奏名五舉以上一百十一人第為三等賜同進士三傳學究出身翌日試諸科得九經以下五百七十人第為三等並賜本科及第出身同出身又得特奏名諸科三禮以下七十五人第為三等賜同學究出身授試銜官此據會要與實録數略不同按七月戚綸奏是年諸道進士僅三千人諸科萬餘人上謂宰相曰昨親閲考官所定試卷意其入末等者過多即别令詳考往往合格比緣臨試多士糊名校覆務於精當而考官不諭朕意過抑等第欲自明絶私甚無謂也迪與賈邉皆有聲場屋及禮部奏名而兩人皆不與考官取其文觀迪賦落韻邉論當仁不讓於師師衆與注疏異特令就御試參知政事王旦議落韻者失於不詳審耳捨注疏而立異論趣不可許恐士從今放蕩無所準的遂取迪而黜邉夏四月丁酉樞密直學士劉師道責授忠武行軍司馬知制誥陳堯咨責授單州團練副使先是師道弟幾道舉進士禮部奏名將廷試近制悉糊名校等堯咨為考官教幾道於卷中密為識號幾道既擢第或告其事詔落籍永不預舉五月己未先是詔禮部貢院别試河北貢舉人其曾援城者進士雖不合格特許奏名諸科例進二場至二場者許終場五舉及經御試并年五十者並以名聞雖不更城守應比舉年六十及瀛洲有勞效者亦如之庚申上御崇政殿親試凡七日得進士范昭等五十一人賜及第四十五人出身諸科賜及第同出身特奏名進士諸科賜及第出身至攝助教𨽻殿侍者六百六十一人上以去歲河北用兵民甚驚擾其乘城捍冦奮勇力者多出士人欲廣示甄采所問經義有兩出者或具引為對考官將黜去上親為發眀焉特奏名進士李正辭論文武先後以為文者主乎靜武者主乎動動以止亂而至乎靜則先後可知上嘉其近理將擢上等會有言其嘗犯杖刑遂補三班奉職六月丁丑朔詔應進士科舉同出身試將作監主簿者並令守選故事登科皆有選限近制及第即命以官咸平三年初郊廷試賜出身者亦免選至是䇿名之士尤衆多設等級以振淹滯雖藝不及格悉賜同出身試秩解褐故令有司循用常調以示甄别又下詔勸學權停貢舉二年時命兩制各撰勸學詔趙安仁所作最切於科試之病特俾用之七月丙子待制戚給與禮部貢院上言今歲諸道進士僅三千人諸科萬餘人其中文理紕謬經義十不九不者甚衆苟非特行約束必恐益長因循又慮官吏坐此殿罰因而避事全不薦人載惟取士之方今垂經遠之制今請諸色舉人各歸本貫取解不得寄應及權買甲産立户諸州取發寄應舉人長吏以下請依解十不入例科罪其開封府委官吏覺察犯者罪如之鄉里遐遠久住京師者許於國子監取解仍須本鄉命官委保判監司驗乃得附學發解日奏請差官考試近年進士多務澆浮不務實學惟鈔略古今文賦懷挾入試昨者廷試以正經命題多懵所出舊敕止許以篇韻入試今請除官韻略外不得懷挾書策令監門巡捕官潛加覺察犯者即時扶出仍殿一舉咸平三年詔㫖進士就試不許繼燭每嵗貢院雖預榜示然有達曙未出者今請除書案外不將茶厨蠟燭等入如酉後未就者駮放之仍請戒勵專習經史自今開封府國子監諸路州府據秋賦投狀舉人解十之四如藝業優長或荒謬至甚則不拘多少開寶通禮義纂請改為義疏今後通禮每場問本經四道義疏六道六通為合格本經二義疏通三亦同今歲秋試止解舊人新人且令習學西川廣南舊取解舉人並許免解今後及第三史通禮三禮三傳除官日比學究明法望授月奉多處貴存激勸上以分數過少約束過嚴恐阻仕進之路乃詔兩制知貢舉官同詳定以聞於是翰林朝逈等上議令諸州約數解送或自來舉子止有三兩人者欲聽全解或其間才業卓然不羣者别以名聞南省引試前一日分定坐次榜名曉諭勿容移徙遠人無籍者令召命官保識就京府取解文武升朝官嫡親許附國學先寄應今還本貫者不得叙理前舉尚書周易學究明法經業不廣宜各問疏義六道經注四通六通為合格三禮三傳所習浩大精熟尤難請問經注六道疏義四道以疏通三以上為合格餘如戚綸等條奏從之十二月己卯禮部貢院言昨詳進士所納士卷多假借他人文字或用舊卷裝飾重行或為庸書人易換文本是致考校無準請自今並令舉人親自投納仍於試紙前親書家狀如將來程試與公卷全異及所試文字與家狀書不同並駮放之或假用他人文字辨認彰露即依例扶出永不得赴舉其知舉官亦望先一月差入貢院考校公卷分為等第如事業殊異者至日更精加試驗所冀抱異者不失搜羅躁進者難施僞濫又言尚書周易學究近年并為一科欲請試本經日每十道而二經各問五道仍雜問疏義五道經注五道以為定式向來明法止試六場請依尚書例試七場第一場第二場試律第三場試令第四場第五場試小經第六場試令第七場試律仍於試律日雜問疏義五道三禮三傳經業稍大難為精熟請每十道義中問經注六道疏義四道以六通及疏通二經注通三為合格詔翰林學士邢昺與國子監官同議可否昺等言尚書周易學究明法經籍不多望名問疏義六道經注四道六通者為合格其三禮三傳請如貢院所奏並從之景德三年二月己卯詔貢舉人因事殿舉及永不得入科場非被杖者並許復應舉景德四年冬十月乙巳翰林學士朝逈等上考試進士新格詔頒行之初陳彭年舉進士輕俊喜謗主司宋白知貢舉惡其為人黜落之彭年憾焉於是更定條制多意白舊事而設關防所取士不復揀擇文行止較一日之藝雖杜絶請託然置甲等者或非人望自彭年始也十二月壬寅先是上嘗問輔臣以天下貢舉人數王旦曰萬三千有餘約嘗例奏名十一而已上曰若此則當黜者不啻萬人矣典領之臣必須審擇朝逈兢畏當以委之周起王曾陳彭年皆可參預拯曰封印卷首若朝廷遣官主之於理亦順尤宜用素有操守之人旦曰滕𤣥晏於士大夫間少交遊上曰今當以宋巽代周起知舉令起與𤣥晏同掌封印事於是命翰林朝逈知制誥宋巽王曾陳彭年同知貢舉既受詔上諭以取士之道務在至公推寒進有藝者又命監察御史嚴穎張士遜監貢院門喬顔鄭彜陳既濟巡試鋪任隨陳覃㸃檢進士程試馬龜符等交考較諸科程試又命滕𤣥晏封印舉人卷首用奉使印李道監封印院門進士諸科試卷首送知舉官考校仍頒其式知舉官既考定等級復令封進入送覆考所考畢然後參校得失凡禮部封印卷首及㸃檢程式别命官皆始此乙巳詔諸科舉人皆理場第自今不合格者須至復場方得落下癸丑先是上降詔榜下禮部貢院序所以杜絶私請搜剔寒秀之意舉人見者咸喜丙辰上與王旦等言及之旦等曰昨頒考校新格周行中頗有論議且言中書不能守科場大體但疑春官有私及詔榜出天下乃知陛下務盡至公恐多遺材故更此條貫也羣書考索後集卷三十六
