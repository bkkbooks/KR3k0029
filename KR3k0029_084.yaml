body:
  text: 羣書考索後集卷十八宋章如愚編官制門設官沿革設官沿革略舉崇著者其於掌部之官長雖品秩下者亦附出黃帝六相為之輔相不必名官少皥司徒前漢嘗加大司馬項羽加大漢以後曰大司空前漢加大改御史大夫為之司冦後周有大司冦卿唐堯有十六相羲仲義叔和仲和叔州牧虞太師太保納言隋及大唐嘗改侍中為之后稷秩宗士共工夏六卿商太宰晉宋齊梁陳改太師為之太宗太史太祝太士太卜司士司土司木司水司草司器司貨太子太師太子太保太子太傅太子少傅方伯周太傅少師少保冢宰後周加大宗伯後周加大內史秦有內史理京師有諸郡守漢分為左右又置京兆尹左馮翊代之後周有內史中大夫隋改中書為內史監令大唐亦嘗以中書為內史焉大僕正至漢為太僕梁為卿大唐為司馭卿又嘗為司僕卿前後左右將軍周末置大將軍自戰國時楚置秦太尉丞相丞相皆左右後周加大相國侍中本丞相史隋改為納言又改為侍內大唐嘗為納言或為左相或為黃門監黃門侍郎後周納言下大夫大唐為東臺侍郎又為鸞臺侍郎又改為門下侍郎散騎常侍魏加侍郎又加員外加通直大唐分為左右尚書令僕射本少府吏以五人在殿中主發書其一人為僕射漢為左右大唐常改為左右匡政或為左右丞相武太后嘗改為文昌左右相尚書少府吏四人謂之尚書至漢分曹掌事後漢為五曹晉為六曹尚書丞至漢置四人後漢光武减二人為左右丞大唐嘗為左右肅機御史大夫大唐嘗為大司憲武太后又嘗改為肅政又分為左右奉常漢改曰太常後曰奉常又改為太常後漢為奉常自後為太常梁謂之卿大唐嘗為奉常卿又嘗為司禮卿郎中令漢為光祿勳後漢為郎中令魏為光祿勳梁除勳字謂之卿大唐嘗為司幸卿又嘗為司膳卿又為光祿卿衛尉漢嘗為中大夫令至魏謂之卿至大唐嘗為司衛卿宗正漢嘗改為宗伯至大唐嘗為司宗卿又嘗為司屬卿理國諱改為粟內史漢改為大農令又改曰大司農後漢末為大農魏為司農至梁謂之卿後魏又加大大唐嘗為司稼卿又為司農卿主爵中尉漢以右扶風代之廷尉二漢梁北齊嘗為大理梁謂之卿餘代曰廷尉大唐嘗為詳刑卿又為大理卿典客漢改為大鴻臚又嘗曰大行至梁除大字謂之卿至大唐為司文卿又嘗為司賔卿又為鴻臚卿典屬國少府至梁謂之卿大唐嘗為內府監亦嘗為尚方監又為少府監將作少監漢改為大匠梁為大匠卿隋將作大監又改為大匠大唐亦嘗為大匠又嘗為膳馬監又嘗為營繕監又為將作監中尉漢武更名執金吾中書謁者令僕射至漢嘗以宦者為之魏為中書監令專掌機務隋為內史監令尋改為內史令又改為內書又為內史令大唐復為中書令嘗為右相又為內史又為紫微令詹事大唐嘗改為端尹又嘗改為宫尹少詹事並為少尹中庶子庶子晉改庶子為左右隋罷中大唐嘗為左右中護太子家令大唐嘗為宫府大夫率更令大唐嘗為司更大夫僕大唐嘗為馭僕大夫內史理京師漢為左右又置京兆尹左馮翊代之郡守漢改為太守後魏每郡置三太守隋置通守魏改二守隋改通守並佐二太中大夫大唐並為文散官漢領尚書事至後漢為録尚書事三公曹尚書後漢改二千石曹掌中都官水火盜賊詞訟罪眚亦謂之賊曹晉曰三公掌刑獄齊為都官隋為刑部大唐嘗為司刑太常伯又嘗為秋官又改為憲部又改為刑部客曹尚書常侍曹尚書後漢改為吏曹主選舉又為選部魏為吏部宋置兩員又大唐嘗改為司列太常伯又為大官中書侍郎東晉嘗為通事郎隋為內史侍郎又為中書侍郎大唐為內史侍郎又為西臺侍郎又為中書侍郎又為鳳閣侍郎又為紫微侍郎御史中丞後魏曰中尉大唐改治書侍御史為之嘗為司憲大夫光祿大夫優寵者則加銀章青綬至魏晉則有金章紫綬齊嘗署左右至隋為散官中散大夫王莽置大唐為文散太皇太后卿長信少府太后以下卿以至于陳自後魏無皇太后卿長樂少府皇后卿大長秋隋有令大唐改為內史中常侍大唐為內常侍都水使者至宋嘗為水衡令梁曰大舟卿隋嘗為都水監大唐嘗為司津監又嘗為水衡都尉驃騎後漢加大夫唐為武散游擊大唐為武散衛車騎驍騎梁置左右伏波上騎材官輕車樓船橫海護軍大唐為勳官渡遼二師蒲類破羌強弩戈船奮威建威積射等將軍奉車騎駙馬等都尉至梁尚主者為司𨽻校尉督察三輔隋有司𨽻大夫大唐京畿採訪使亦其職刺史刺理郡縣至隋理人都護京兆尹左馮翊右扶風特進大唐為文散諸加官左右曹諸吏散騎中常侍侍中給事中也後漢尚書侍郎三十六人初稱尚書郎中滿嵗稱尚書郎三嵗稱侍郎五嵗遷大縣令魏有尚書郎晉又有郎中隋初置三十六侍郎後置員外郎一人後又六曹各置侍郎每曹有郎有員外郎大唐改曹郎為郎中祕書監後又置令大唐嘗為蘭臺太史少監為侍郎又嘗為靈臺武衛隋置左右大唐為左右鷹揚衛輔國晉加大宋改為輔師大唐為武散四征四鎮四安武牙征虜橫野鷹揚討逆討虜破虜等將軍四中郎將都督至晉加大河南尹留守班同三司前漢文帝以宋昌為衛將軍亞三司未為官也魏有開府儀同三司晉又加開府儀同三司後魏有儀同三司北齊有開府儀同三司又有加開府儀同三司後周有開府儀同又有上開府儀同大將軍至隋為散官又諸衛各置開府一人矣八座魏五兵尚書至後魏有七兵尚書隋曰兵部唐嘗為司戎太常伯或為夏官或為武部或為兵部度支尚書吳有户部晉以後為度支至隋為人部唐嘗為度支又為司元太常伯又為户部祠部曹尚書至後魏有儀曹後周有禮部隋置禮部尚書唐為司禮太常伯或為春官又為禮部殿中監秩甚卑隋曰殿內監唐嘗為中御府大監中衛晉分為右左衛將軍隋改為左右翊衛唐復為左右衛中領軍尋改曰領軍隋改為左右屯衛唐嘗為左右戎衛又嘗為左右玉鈴衛又為左右領軍鎮軍大冠軍遊騎並唐為武散四平鎮北武威國諱改焉撫軍陵江寧朔等將軍行臺權置僕射尚書等官號以總外事也晉起部尚書有事即置事畢即省唐嘗為司平太常伯又為工部國子祭酒唯宋曰總明觀祭酒唐嘗為大司成又為成均祭酒中軍龍驤寧逺唐為武散宋殿中將軍梁太府卿唐嘗為外府卿又嘗為司府卿始以太常寺名卿分為四時凡十二卿雲麾忠武壯武眀威定逺等將軍唐並為武散宇宙大將軍後魏柱國大唐為勳官天柱二大將軍諸少卿後周軍器監隋參掌機密守掌朝政並宰相之任左右武候府大將軍唐為金吾衛左右監門府將軍唐改府為衛大總𬋩通守折衝府正議朝議朝請朝散等大夫唐並為文散官左右驍衛府唐除府字大唐太子賔客漢之四皓非官左右千牛衛左右屯營後改為羽林軍嘗改為衛左右威衛嘗改左右豹韜衛左右龍武將軍平章事知政事參知機務同中書門下三品平章軍國重事節度使採訪使宣威武散懷化歸德等將軍並武散以授歸義蕃官封爵類黃帝方制萬里為萬國各百里唐虞夏建國凡五等曰公侯伯子男殷公侯伯三等公一百里侯七十里伯五十里周公侯伯子男五等公侯一百里伯七十里子男五十里周公居擾改制大其封公五百里侯四百里伯三百里子二百里男百里秦爵二十等最髙徹侯乃得食縣其次關內侯食租稅於關內餘十八等大庶長以下則如吏職矣漢國王國侯亭侯三等王皆裂地侯以户數為差分人自此始漢初論功封列侯者凡百四十三人食邑者除租每户一嵗更輸錢二百後漢亦三等皇子封王其郡為國其列侯雖鄧寇元勳不過四縣魏王公侯伯子男次縣侯次鄉侯次亭侯次關內侯凡十等關內侯為虛封自此始又置名號侯爵十八級關中侯爵十七級亦有王公侯伯子男又有開國郡公縣公郡侯縣侯伯子男及鄉亭關內等侯凡十五等王大國二萬户三軍兵五千次國五户二軍兵三千下國五千户一軍兵千五百其公之制如五千户國侯如不滿五千户國並置一軍千人其伯子男以下各有差不置軍宋皆因晉制唯大小國皆二軍至孝武時凡國官屬不得稱臣於其國改稱下官齊因宋梁因前代定制諸王言曰令境內稱之曰殿下公侯言曰教境內稱之曰第下皆自稱曰寡人相以下表疏如臣下不稱臣文書下羣官皆曰告陳有郡王嗣王藩王開國郡公開國縣公侯伯子男沐食侯鄉亭侯開國中關外侯凡十二等後魏有王開國郡公散公侯散侯伯散伯子散子男散男凡十二等王食半侯伯四分食一公三分食一子男五分食一北齊有王公侯伯子男六等後周有公侯伯子男五等隋國王郡王國公郡公縣公侯伯子男九等唐國王郡王郡公開國郡公開國縣公侯伯子男凡九等並無其土加實封者乃給租庸自武德至天寶實封者百餘家自至德至大厯三年實封者二百六十五户通典宋朝封爵之差唐制王食邑五千户郡王國公三千户開國郡公三千户縣公一千五百户縣侯千户伯七百户子男五百户又有食實封者户給縑帛每賜爵遞加一級唐末及五代始有特加邑户而罷實封之給又去縣公封侯以郡宋朝沿其制文臣少卿監以上武臣副使以上內職崇班以上有封爵丞郎學士刺史將軍諸司使以上有實封但以增户數為差不繫給邑過其爵則進爵止於開國公每加食千户至二百户實封六百户至百户皆六等親王重臣或特加有逾千户者皇屬有特封郡公縣公或增侯者無開國字開寶以來伐國降及乃臣叛命不誅者亦封侯皆因其名以見其罪焉三等國舊有大次小三等以為進封之叙然每或封拜又有權升次小國為大國者景德中詔分三等以為定制今著於後趙楊承信封公晉太宗封王丁謂封公秦孟旭向拱封公廷美封王齊廷美封王魏武行德趙普馮拯並封公韓真宗封王武行德王晏潘美曹利用封公燕劉進封公楚侯章封公元佐封王越元雋封王夏商周漢唐新添已上大國十八衛劉鋹趙贊封德崇封王張永德封公鄭張昭封公蔡曹元儼封公許張從思趙普吕蒙正封公錢俶元祐封王代潘美封公徐元渥吕蒙正並封公鄧張永德張耆並封公錢俶封王岐陳洪進張旻封公隋蜀邠王彥超封公邢宋偓封公冀髙懷德王欽若封公元雋封王夀真宗封王鄆曹利用封公荆元儼封王升仁宗封王雍元汾封王豫梁楊新添已上次國二十四江滕孟𤣥哲封王向黃紀譙向拱錢惟濬並封公原弦邾李洪義王溥並封公劊耿舒元稱封王介道相元偓封王酆蔣蕭錢惟濬封公郕談霍䕫萊吕蒙正寇準並封公郇鄅芮薛鄖宫崔彥進封公鄣羅郜鄎戴桐遂管沈虞應息英任崇榮元儼封王扈濮密巢安觀申吕夷簡封公虢宿邾杞陳洪進封公賈鄫䢵巴夷榖頓麋黎葛蓼項𣆀䢴茅胙庸畢滑鄀牟權甘祭尹溫毛樊成單劉鞏邵弼鄘衛鬲寧杜吕晥留郃鄠郿焦宛酇禳葉郢緍􅀈費鄫郚隴范程鄱鄃潜涪遼羸絳汲棓軹營翕秺廣藺易定元儼封王鎬純昌翟陸緇下綸已上皆春秋秦漢以來公侯潞盧鄒房褒康沛邳彭元儼封王竇鄂鄴薊潁汧沔沂王曽封公肅岷瀛郳鄯莘順渝郫蒲􅈶豐已上周唐已來封公棣光儀懷永延盛濟信元佑封公襄真宗封王均陸丹簡益元傑封公欣韶嘉端元儼降封王循恭原雅通元儼封王虎資昭欽珍淑集和郢衡㑹福嶽表桂蘄澧深洋建鄜瓊婺茂衢澶昌慶仁宗封公吉景郴傳賀惠已上唐及五代封王夏趙德明封王自西平進封蘇潭鎮元儼封王潤華已上皇朝封王已上小國二百夀梁趙宋四國更不得封臣景德三年詔㑹要右承議郎李攸再編國二百七十四大國二十二秦魏韓燕楚晉魯陳吳越夏升商周漢唐冀豫兖荆雍揚次國二十一衛蔡曹代徐鄧岐隨蜀邠邢鄆涼潞潭蘇鎮益廣延夀小國二百三十一江滕向黃紀譙原弦祁鄶耿舒介道相酆蔣蕭郕談霍䕫萊郇程郯芮薛鄖莒鄣羅郜鄅戴桐遂菅沈虞應息鄎任崇榮扈濮密巢觀英虢宿邾杞賈􅤂䢵巴申榖頓麋黎葛蓼項𣆀夷茅胙庸畢鄀牟權甘䢴尹溫毛樊成單劉鞏祭弼鄘韋鬲寧杜吕皖邵郃鄠郿焦宛酇穰葉留鄢緍劇費繒郚隴范郢鄱潛浩遼羸絳汲梧軹營稼藺易定鄗洮昌翟陸緇卞綸盧翼鄒房褒康沛邳彭竇鄂鄴薊潁沔沂肅岷瀛郳鄯莘順渝郫蒲􅈶豐光儀懷永盛濟信義涇襄均睦丹思簡欣韶嘉端循恭願雅通䖍資昭欽珍淑集和衡㑹福撫袁桂蘄澧深洋建鄜瓊婺茂衢澶德昌慶吉景郴傅賀惠嶽潤華汧棣滑安翕羣書考索後集卷十八
