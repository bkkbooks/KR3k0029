body:
  text: 羣書考索續集卷二十三宋章如愚編厯門厯三正傳曰火出於夏為三月於商為四月於周為五月蓋夏建寅三月而火出於辰見上文五月而火中于午見堯典七月而火流于申十月而火伏于亥見左傳哀公十二年火伏而後蟄者畢三星在户者五月昏火中于正南也火中而寒暑退者昏中于午而一隂生旦中于午而一陽生也古者考天象驗人時皆以東方大火心星為證者以其周旋得昏中旦中之正也夫周正建子而七月流火九月授衣乃與夏正同或曰七月之詩言一之日二之日三之日四之日者建子正也以月為日取陽生之義即七日來復之義也自四月陽極五月隂生則言月兼舉夏正以正天時由易卦或言七月或言八月也惟三月不言日亦不言月意者蠶月條桑即三月也魯哀公十二年經書十二月螽仲尼以為火伏而後蟄者畢今火猶西流司厯過也杜預云周十二月即今之十月火猶西流誤以九月為十月故蟄户未畢藏也劉歆厯譜並以春秋所書冬十二月為夏之十月是周建子而春秋所用周正也豳詩兼舉夏正春秋則兼用周正特不知經書春正月夏五月秋七月冬十月必以周正言之則是以冬為春以春為夏以夏為秋以秋為冬也春秋之名錯舉四時以示褒貶也假日月以定厯數也豈容四時易其位耶豈十二月火猶西流司厯屢失閠而劉歆杜預推之而未審耶不然周家正嵗讀邦法仲春蠶北郊夏斬陽木秋斬隂木四時已皆易位矣或曰周官言正嵗者子歲正也言正月之吉則寅月也茍周官以正月為寅則春秋經書不可以正月為子矣或曰商書元祀十二月朔元祀不以丑正為正月而言十二月者商雖建丑而編年紀事實用寅矣周官春秋所書亦然夫書年紀事其實用寅而猶曰建子建丑者重一陽二陽之生豫授民時使君民皆知一嵗之事始於此耳又三王之正若循環王者受命必假此以示承天順人之意故有建子建丑之異其書年紀事未嘗不用寅正也審如或者之論則劉歆杜預與左氏傳文不足慿矣漢初仍秦而建亥為正今觀漢史所書乃曰元年冬十月不言正月而言十月者紀一嵗之事雖自此始其實則冬十月也漢史於十月之後又書曰春正月此復用寅正明夏時不可廢也漢史所書春夏秋冬易其位耶後秦羌岌曰春秋日食三十六考其晦朔不知用何厯也班固以為春秋因魯厯岌檢春秋不與蔀目相符命厯序謂春秋用殷厯岌考其文不與殷歷相應當以諸説辨諸誤可也火中寒暑乃退注謂五月六月火昏中而暑退十一月十二月火旦中而寒退此蓋惑於寒暑退之説故兼舉六月十二月言之耳實五月十一月此説是也張躍舉以證晉侯將失諸侯猶隂陽極則反也又三星在户直正户之位爾注亦謂之五月未六月申此又惑於在隅之説曾不知巽為東南隅自巽至已自已至丙午則在户矣何必至未月而方為在户耶太史公三正若循環之説主夏時太史公律書言兵之當用與否以配隂陽之周旋言神生於無而成於有以配律聲之相因及其論厯也先言古厯作於孟春必驗子規嘷為寅月雞鳴三聲為寅時次言王者之正必率天由人三苖亂德而孟陬正月殄滅舜禹相命而寅正以建又其次言商丑周子若循環然窮則反本秦人未暏其真漢初復仍其舊至於武帝太初而始用夏正也觀太史公之言之意即夫子行夏之時之説也其意若曰三王之正若循環然夏寅商丑周子亦既窮矣秦人當復建寅而反建亥漢當反秦而復因秦是窮當反本而不知反也蓋至於太初之元方反本耳其論忠質文之尚亦曰三王之道若循環蓋言周秦文弊漢當復用夏忠也其論漢得天統亦述漢除秦暴所以承天順人繼三王之統也班固不悟此意乃以斷蛇著符為得統之證則非矣雖然太史公之論歷也既主寅正而言律則本黃鍾建子之月且曰萬事根本者何哉嗟乎此太史公所以深得以律起厯率天由人之意也真夏歷真周厯漢清臺所課諸厯踈密即黃帝顓帝夏商周魯六厯是也其後加以太初三統為漢厯則七厯矣漢末宋仲子集七厯以考春秋按夏周三厯術數與漢藝文志所記者不同故更名曰真夏厯真周厯杜預作長厯謂周衰世亂學者莫得其真所傳七厯未必是時王之術也預乃以長歷驗春秋日食之數而知三統厯之最踈蓋春秋日食三十六以三統歷推之止得一食之數也岌又併夏厯真夏厯周厯真周厯得十三十四食之數其真夏厯真周厯止得一食之數與三統厯同豈其真者反不及非真者歟三統厯既謂之踈則真夏周厯亦然矣羌岌之言曰杜預以七厯未必是時王術今誠以七家之厯考古今交會信無其驗皆由斗分踈之所致然則杜預之言是耶宋仲子之言是耶藝文所記與宋仲子所集又孰為真孰為偽耶易春秋天人之道前漢志劉歆三統厯譜之説也劉氏謂春秋書元一以統始易有太極也春秋二以目歲太極生兩儀也於春每月書王王正月王二月王三月是也易象三極之統也於四時雖無事必書時月兩儀生四象也時月以建分至啓閉之分四象生八卦也象事成敗八卦定吉凶也朝聘會盟吉凶生大業也易天也春秋人也故易春秋天人之道也夫易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業易上繫之文也劉氏從而附合春秋之條是則然矣惟於春每月書王象易三極之説厠於兩儀生四象之間未免牽合附會強生一説觀歆之意蓋欲以此數條附太衍之數耳其説曰元始一也春秋二也三統三也四時四也一二三四合為十也以五乘十大衍五十之數也道據其一故其用四十九也歆之意如此焉得不加書王象三極之説厠諸兩儀四象之間哉大衍之數分而為二以象兩挂一以象三揲之以四以象四時歸竒於扐以象閏此與太極生兩儀之文不相屬而歆附會之所以有拘而不通者也况歆以太極三統而儀四象合為大衍之數其八卦定吉凶吉凶生大業之説則又不言其所以合大衍之數之意又何謂哉杜預言其最踈班固誤以為最密隋志言其辨而非實班固惑之遂採以為志其謂是歟厯譜乃曰以某法乘某法得某數始推大衍象得月法合天地終始得閏法之類半是半非不可以盡信也夫易春秋之道未嘗不貫通正不必牽合其文而強合其義亦不必以春秋虛數合大衍實數也人之耳目鼻口脈絡未嘗不貫通而必欲強合其形則拘矣唐志厯法曰漢厯一本於律劉歆以春秋易象推合其數蓋附會之説也唐志之言盡之矣劉子政以五福配六極一極無所附遂足之以厥罰眊之説歆蓋蹈其父説矣向以王鳯擅權之故而推洪範之應其意則忠歆以王莽即真之故而多為附會之談其意則佞此尤不可不辨者也大衍厯一行倚大衍之數立推步之法是一行求合於大衍者也非大衍合一行之數也大衍之數無窮倚此數立此法庶乎其有所據依亦猶太初以律起厯之意也一行厯本議曰天數五地數五五位相得而各有合所以成變化而行鬼神也此易繫之文一行舉以為議厯之本蓋其意所主在乎五位相得而各有合之一言是以推而廣之無往而不合也歐陽修志唐厯曰厯起於數數者自然之用也其用無窮而無所不通以之於律於易皆可合也是亦一行之意歟雖然一行亦豈能外諸厯家之法而獨推大衍而為法歟一行變諸家之法之名而從大衍之數也諸厯雖不倚大衍以立法而其中亦有與大衍暗合者矣一行之言曰天數始於一地數始於二此即易繫天一地二之説諸厯之所同用也所謂天數中於五地中於六為二中此即班固志五六者天地之中合之説也所謂天數終於九地數終於十為二終此即班志十九年為章歲合天地終數得閏法之説也所謂天有五音所以司日地有六律所以司辰此即揚子雲聲生於日律生於辰之説也此其典諸家之説同者如是也自一而降為五行生數自六以往為五行成數一六而退極五十而增極中極居五六之間故六退極五增極也一六為爻位之統五十為大衍之母大衍之數五十或者以為五為十者一生而六成之一與六合所以為爻位之統五生而十成之五與十合所以五與十為大衍之母也又曰五至十則六七八九在其中間矣大衍之數五十而六為老隂七為少陽八為少隂九為老陽皆自五十之數之揲也故曰五十為大衍之母也自一至六則二三四五在其中間即六爻之數也故曰一六為爻位之統也成數乘生數其算六百為天中之積成數六七八九十生數一二三四五成數共成四十也生數共為十五也以四十乘十五則是四十個十五共得六百之數也以十五乘四十亦得六百之數也生數乘成數其算亦六百為地中之積合千有二百以五十約之則四象周六爻也千二百之數五十個二十四也四六二十四四象周六爻也以三十四約之則太極包四十九用也千二百之數亦得二十四個五十也虛一不用太極包四十九用也綜生數約中積皆十五成數四十也四十個十五則得中積六百之數故曰成數約中積皆十五綜成數約中積皆四十生數十五也十五個四十亦得中積六百之數故曰生數約中積四十也十五四十乘六百之數可也復約之而歸于十五四十亦可也兼而推天地之數以五位取之復得二中之合也四十與十五即五十五天數二十五地數三十天地之數五十有五與此合也天之中數五地之中數六也五五二十五五六三十共成五十有五故曰以五位取之復得二中之合也蓍數之變九六各一乾坤之象也乾為九九老陽坤為六六老隂各居其一也七八各三六子之象也七為少陽震長男坎中男艮少男凡三少陽也八為少隂巽長女離中女兊少女凡三少隂也故爻象通乎六十䇿數行乎四百四十是以大衍為天地之樞如環之無端此一行取以為起厯之法也其候卦則本乎月令七十二候之卦也日卦則本乎孟氏章句十二卦主十二月復姤之類也定朔則本乎劉孝孫傅仁均歲差則本乎虞喜何承天更積法曰演法變日法曰通法改周天曰乾實此又一行變諸厯法之名以從大衍之類也唐志曰自太初至麟德厯有二十三家與天雖近而未密也至於一行密矣其倚數立法固無以易也後世雖有改作皆依倣而已唐志之言誠是也特其知大衍之厯倚易數之法而不知其變諸厯之衍以從大衍之數是以表而出之一行厯法有步中朔術發斂衍步日躔衍步日躔術步月離術步軌漏術步交會術步五星術是時有九執厯自西域來詔太史監翟曇悉逹譯之陳影玄將以惑當時謂一行書寫其術者妄也七十二候一年二十四氣一氣有三候初中末是也立春正月節也東風解凍蟄蟲始振魚上冰此立春節氣之三候也雨水正月中也獺祭魚鴻鴈來草木萌動此雨水中氣之三候也周二十四氣則七十二候備矣一行曰卦候七十二候原乎周公時訓書名月令雖頗有增益然先後之次第則同自魏以來始載於厯然依易軌所傳不合經義今改從古昔一行譏李淳風専用吕氏春秋今也有取乎月令七十二候之説而分配以七十二卦則月令未可全非也卦止於六十四而坎離震兌居四正宫分主四時此四卦每卦六爻四六二十四每爻當一氣故此四卦分主四時而不専主於一候也其餘六十卦則五卦主六候者中氣之末節氣之初共一卦主之其餘四候各一卦也如中氣初候卦為公中候卦為辟末候卦為侯至於節氣初候卦亦為侯中候卦為大夫末候卦則為卿也五卦主六候六十卦主七十二候也夫坎離震兌且不専主於一候而乾坤二卦何以各主一候邪蓋六十卦之中所謂辟者君也君主十二月中氣也子復丑臨寅泰卯大壯辰夬已乾午姤未遁申否酉觀戌剝亥坤此十二卦主十二月中氣故乾坤居己亥之位也以十二卦分配十二月孟氏章句也乾六爻俱為陽一陽生於子而極於巳為六陽故乾居巳位坤六爻俱為隂一隂生於午而極於亥為六隂故坤居亥位也一陽生為復二陽生為臨三陽為泰四陽為大壯五陽為夬六陽為乾乾之所生凡五卦也一隂生為姤二隂生為遁三隂為否四隂為觀五隂為剝六隂為坤坤之所生凡五卦也乾坤雖分主乎一候而十二中氣皆乾坤之所生也不特此也六十卦可以配七十二候一卦六爻當一日六六三十六以之分配三百六十日可也京房推六十卦直日悉是道也辰角見而雨畢天根見而水涸木見而草木節解駟見而隕霜火見而清風戒寒此周語單子之言也按星圗角東方宿也八月日月所會之辰日月會于此時時雨可以畢矣天根氐星本亦氐也駟房星也房星一名天駟也火心星也八月九月十月之間日月會于角氐房心之次故為雨畢水涸霜降戒寒之候也所謂見者非見於南方也乃以日月所會言之晨見於東方也日月常合朔於東方於合朔之時角氐房心之宿隨天左旋一晝夜而周遍與日月會于合朔之所故曰日在角日在氐日在房也合一行日度議日躔連前日度嵗差説後一假亦同一行既有日度議復有日躔議度與躔豈有異哉蓋日有度月有道言其大數也日躔有盈縮緩急月離有進退先後言其所經所歷處也離附麗也或日相離逺之離合而言之則皆於日月所行之所而見之也一行曰劉焯立盈縮躔衰術李淳風因之更名曰躔差凡隂陽往來馴積而變日冬至其行最急急而漸遲夏至其行漸舒舒而漸急急極而寒舒極而燠得其中則雨暘之氣也謂春分秋分夫一行所謂日躔有舒急之異者何也周天三百六十五度冬至之時夜之所占度多日之所占度少度少則日短迫故曰其行急也夏至之時夜之所占度少日之所占度多度多則日舒長故云其行最舒也春秋二分日夜停適故云其行及中也所謂躔衰躔差者或自急而漸舒或自舒而漸急或在乎舒急之中也以氣候之以景測之而求其盈縮之所加則可知矣一行曰以二十四氣晷景考日躔盈縮而密加于時蓋謂此也觀乎此則日度日躔似同而異矣應劭注漢志曰日躔月離躔經也離逺也臣瓉曰離歷也冬至日景有長短日景長短其地不同一行言之詳也見天文志抄地茍不易則二至晷景長短有常景或無常則合朔厯差而已一行中氣議曰比年景候長短不均由加時有早晏行度有盈縮也其晷漏例略又曰日行有南北晷漏有長短然二十四氣晷景徐不同者句股使然也一行於是立為四術反覆相求消息同率旋相為中以合九服之變又按宋元嘉十年何承天以土圭測景知冬至已差三日其後劉孝孫以甲子元厯推算凡冬至之日常與景長之日符合然則冬至之景極長夏至之景極短地茍不易歷茍不差斯無異同之辨矣黃帝合而不死名察發斂此武帝議厯之詔也應劭曰言黃帝造厯得仙名孟康曰黃帝作厯終而復始故曰不死如名春夏為發秋冬為斂晉灼引蔡雍天文志曰名察斂發以行日月以步五緯臣瓉曰黃帝與神合契登仙故曰合而不死題名宿度候察進退即史記曰名察宿度之謂也當以蔡雍臣瓉之言為是晦朔弦望章蔀紀元東漢志曰日月謂之合朔日月相去近一逺三謂之弦與日相近一分相逺三分則月形半成如弦之直也以一月論之近一分七日餘也逺三分二十一日餘也故上弦初七八下弦二十二三日月相與為衡分天之中謂之望日與月對望也以月及日光盡體伏謂之晦隂近陽則晦二十九三十日也天一晝夜而運過星從天而西日違天而東日行與天運周在天成度在厯成日日周于天四時備成攝提遷次攝提斗杓端所直之星也青龍移辰東方七宿謂之嵗歲首至也冬至為嵗首也日月初躔于星紀也月首朔也至朔同日謂之章十九年為章冬至在朔日也不必是甲子日也至朔同在日首謂之蔀四章為蔀七十六年也日首者甲子日所謂十一月甲子夜半朔旦冬至有辨在前蔀終六旬謂之紀二十蔀為紀千五百二十年歲朔又復謂之元三紀為元四千五百大數也即馬遷三紀之意章章中章月諸志並以十九年為一章之嵗以一嵗為十二中殊無異論有所謂章中者一年二十四氣其十二氣為中氣總計十九年之中凡得幾中氣也其會中統中元中並推此類算去其曰章月者總十九年之中凡得幾月也其會月統月元月並推此類算去此班志之所紀者然也其餘諸志又有章嵗者合上元凡計幾千年就算凡得幾一十九年也班志曰推天地終數得章數又曰推大衍象得月法等類半是半非蔀七十六年會五百十三年東漢志以四章為蔀計七十六年也甲子朔旦冬至則為蔀首所謂至朔同在日首之謂也西漢志無蔀法惟有魯厯不正以閠餘一之嵗為蔀首之語前志又有會月六者六千三百四十五月也計得五百十三年即太史五百年大變之説也三會而得統統即紀也紀一千五百二十年也九會而復元即四千六百一十七年為元也即太史公三統大備之意也餘見會歲解紀太史公以一千五百年為紀東漢志以二十蔀為紀計一千五百二十年也西漢志以一千五百三十九年為統統即紀也其數不同何也太史公言小變中變大變之綱也東漢志以章蔀實數推去則加多太史公二十年也班志除出閏月亦以年計之則又加多東漢志十九年大略則同耳其晉志羌岌以元法為演紀法唐一行以元法為演紀法是又當以元法推之與此不可同日語也其劉洪以五百八十九為紀法楊偉以千八百四十三為紀法之類各以上元之數不同故紀法亦有多寡之異也元入元百單六年為百六之厄四百八十年為陽九之會六八四十八也其時則有九年之旱太史公曰百年中變言其大數也邵氏皇極經世言堯湯水旱為天數以元會推也太史公以千五百年為紀三紀而大備是以四千五百年為元也東漢以四千五百六十年為元又以章蔀紀實數推之則加多太史公六十年也前漢志以四千六百一十七年為元者除出閠月亦以年計之則又加多東漢志五十七年前志又曰元嵗之閠隂陽災經歲四千五百六十年災歲五十七年者謂五十七年為陽九百六也注四百八十年陽九之會入元百單六年有厄陽九陽七陽五陽三隂九隂七隂五隂三皆災嵗也除五十七年為災嵗其經歲四千五百六十年正與東漢志一元之數同此太史公班固范曄論元法之正者其有變其法而求上元如劉歆三統自太初元年距上元十四萬三千一百二十七嵗晉王朔之元法九萬七千年之類皆積算以起厯耳非三紀大備之正數也詳已見歷元説又羌岌以元為紀一行謂之演紀劉洪謂之乾洪非惟其數不同其名亦異矣日法以班志為祖班志統母日法八十一分者黃鍾律長九寸九寸八十一分為一日之法此林鍾太蔟三統損益之數所自生故曰統母也又八十一章為一元元即統也八十一章自八十一分始故曰統母也一日為八十一分是一度為八十一分也東漢志日法四分晉志劉洪乾象厯日法四百五十七楊偉景初厯日法四千五百五十九凡此等類皆隨意立法以增減之耳大抵日法數多則為日度之密率也日法數少則為日度之約率也一行更日法為通法其歸一揆也月法班志曰如日法得一則一月之數蓋日法八十一分也如日法而得一者三分日法而得其一是得二十七分也月行止二十七日已周天見前日月度餘説其餘者為月餘此一月之日數也至於前漢月法則三千三百九十二唐戊寅厯月法則三十八萬四千有奇意者各垂一法以推之如日法之不齊也閏法十九年為一章一章七閏終天地之數得閏法天數終於九地數終於十故十九年而會餘分之終窮置七閏也諸志皆同後志有餘朔即閏月也有中餘即中氣之餘也前志有滅沒者冬至前一日沒日也無分為沒一行曰古以中氣所盈為沒沒偕盡為滅會數會月會歲班固志會數四十七者羌岌云日月八百九十三歲凡四十七會分盡此之謂也班志又云五十五為朔望之會以四十乘五十五之數得會月六千三百四十五實計五百一十三年也三會而得統實計一千五百三十九也統與東漢統法同九復而復元實計四千六百一十七年也復元復得元法也即歲朔又復謂之元之説也范志有蔀會元會晉志有會通會率大抵皆以冬至日月所會之次求之耳又有通法者諸志立數皆不同一行又更日法為通法周至班志云周至五十七三閏法得周至者閏法十九年為章也三個十九則五十七年也五十七年一甲子將周也周天范志宗昕議云元法定而後定日法日法定而後定周天則知周天以日法而定之也班志周天五十六萬二千六百餘范志周天千四百六十一晉志劉洪乾象厯周天二十一萬五千有奇羌岌三紀厯周天八十九萬五千有奇唐志一行更名周天曰乾實是當計其元法之多寡而求其日法斗分之不同可也月周班志曰月周二百五十四八章月加閏法得月周者閠法十九年為章也日一年一周天十九年十九周也月二十七日強一周天十九年二百五十四周也復會于端是為月周也東漢志月周千一十六羌岌厯月周三萬三千七百有竒或以章歲計之或以紀嵗計之或以蔀嵗計之也通法諸法並有通法立數不同李淳風麟德厯有總法一行厯有通法積嵗如月分之數而後閠餘皆盡又曰以日法為通法其更變又不同矣䇿餘䇿餘者乾坤二篇之䇿萬有一千五百二十當萬物之數班志算日月五星之會而復於太極上元一隂一陽各萬有一千五百二十當萬物氣體之數以其餘者為䇿餘也班志一元凡餘八千八十一行大衍法總嵗終沒分謂之䇿餘亦此意也一行又云乾坤之䇿為日度之凖故䇿餘十有二中所盈也歲分曰䇿實氣䇿曰三元月䇿曰四象候䇿曰天中卦䇿曰地中一行揲蓍以起厯故其䇿算尤詳也小周大周天三木地四金以三乘四則四三十二年是為歲星小周也坤之䇿一百四十四以小周十二年之數乘坤之䇿一百四十四則是十二個一百四十四也十二個一百四十四則共成一千七百二十八年是嵗星大周之數也故前漢志云五勝相乘以生小周以小周乘乾坤之䇿而為大周正此謂也金克木故以木三而乘金四是為四三十二而得歲星十二年一周天之數謂之小周以小周乘坤而得大周之年數也熒惑六十四嵗小周乘乾象則萬三千八百二十嵗為大周土木相乘而合經緯為三十是為鎮星小周小周乘坤䇿則為四千三百二十是為鎮星歲數金火相乘為八又以火乘之為十六而小復小復乘乾䇿為三千四百五十六是為太白歲數水星六十四年小復乘坤䇿九千二百十六嵗大周皆周五行相勝則相乘也諸志並有小周大周特其所周之數不同由入元之年不同也一行五星議歲星自商周迄春秋之季率百二十餘年而超一次至戰國其行浸急及漢哀平間八十四年而超一次因以為常此其與餘星異也姬氏出於威靈仰之精受木行正氣歲星主農祥后稷憑焉故周人常閲其禨祥而觀善敗其始王也次於鶉火以逹天黿及其衰也淫於元枵以害鳥帑左氏傳又其後也歲星之行於上而侯王不寧於下則木緯失行之勢宜極於大運之中理數然也唐開元十二年上距西漢和平三年七百五十年考其行度猶未甚盈縮則哀平後不復歲星漸差也春秋僖公六年歲隂在卯歲星在析木昭公三十二年亦歲隂在卯歲星在星紀三統厯因以為起一次之率考其實猶百二十餘年超一次近代諸厯以八十年齊之或行速而用緩率故或差三次於古或差三次於今一行因謂歲星差合術且曰五事感於中而五行之祥應於下五緯之變彰於上王者失典刑之正則星辰之亂行汨彛倫之敘則天事為之無象當其亂行無象又可以厯紀齊乎故襄公二十八年歲在星紀而淫于玄枵至三十年始及陬訾之口超次而前二年守之其餘皆此類也又曰五星留逆伏見之數表裏盈縮之行皆係之於時而象之於政不然皇天何以隂隲下民警悟人主哉近代算者昧於象占者迷於數覩五星失行皆謂之厯舛故校厯必稽古記注入氣行度上下相距反復相求茍獨異常失行可知矣一行既謂五星失行不可以厯紀齊覩五星失行者亦不可歸罪於厯舛猶且詳為嵗星差合之術如損益率進退積之類又參較諸厯五星行度數百事其故何也太史之言曰五星失軌度則占又曰雖有明天子必占熒惑之所在是知五星遲留伏見足以驗政治之得失故古人詳為之法也五星約法晉志云羌岌所造甲子元厯五星據出見以為正不係於元本然則算步究於元初約法施於今用曲求其處則各有宜故作者兩設其法也嘗因羌岌之説而求之諸志論五星行度與小周大周之數遲留逆順之率令人目眩而心不領皆由元法積數千萬之逺故五星小周大周積算亦無窮盡也有能得其約法斯可以指諸掌矣右日法月法會數通數之類不可悉紀每一厯名垂一法要其歸則一而已一行更積法積算之法曰演法更日法曰通法更周天曰乾實與夫班志以紀為統羌岌以元為紀其名不齊考論其實斯可矣邊韶之議曰數出於秒忽以成毫釐毫釐積以成方寸兩離既定日月離行初行成分積分成度日行一度一歲而周故為法者各行度法法有疏密兩科其歸一也斯言可以類通矣總論諸厯太初厯為張夀王所詆清臺課疏密而是非乃定徐禹治太初第一夀王下吏大衍厯為瞿曇撰南宫説所非靈臺校簿而當否始決大衍厯頒行説等伏罪今侍御史李麟之等校之也東漢厯元為馮晃馮光所駁熹平校議得失遂分詔從蔡雍議雍等劾光晃之罪此厯之方行而迭相詆刺者如是也太初厯是非既定而朱浮以為後天四分儀式既備劉洪以為與天疏闊班固謂三統最密而杜預以為踈一行獨指杜預之謬鄭玄謂乾象窮幽極妙而韓翊指其失此厯行既久而遞相詆刺者又如是也其餘如祖暅之非何承天劉孝孫劉焯之駁張賔王孝通李淳風之譏傅仁均遞遞相非無窮已也要之兩漢之厯太初乾象其最也隋唐之厯皇極大衍其冠也雖更相是非而是非自有定論矣然則太初乾象皇極大衍之厯果能窮盡千萬年之數未及百年咸悉更變何哉杜預之言曰天行不息日月星辰各運其舍皆動物也物動則不一雖行度大量可得而限纍日為月不得無毫毛之差厯差始於毫毛積而失弦望晦朔不得不改憲從之書欽天象易治厯明時言當順天以求合非為合以驗天者也唐志曰四時寒暑無形而運於下日月星辰有象而見於上二者常動而不息一有一無出入升降或遲或速不相為謀此一句害理其久而不能無差忒者勢使之然也故為厯者其始未嘗不精而其後多疏而不合亦理所當然不合則屢變其法以求之自堯迄於唐此厯所以未嘗同也杜預唐志言異世而一事也是知立推步之法者求之千萬年之上以為上元自謂無毫釐之差行之未十百年而乖違已見蓋數往者無所辨而推來者有所證也一行是非諸厯之得失其論甚備而唐志亦稱其立法之密一行之言乃曰乾度盈虛與時消息告譴於經數之表變常於潛遁之中則聖人且猶不質非籌䇿之所能及矣觀乎此則凡所以鈔記者姑識其概焉耳厯有歲差之法隂陽盈縮不齊不能無差故厯家有歲差法明道先生文集論堯夫立差法厯象之法大抵主於日日一事正則其他皆可推洛下閎作厯言數百年後當差一日其差理必然何承天以其差遂立歲差法其法以所差分數攤在所歷之年看一嵗差者幾分其差後亦不定獨邵堯夫立差法冠絶古今却於日月交感之際以隂陽虧盈求之遂不差大抵隂常虧陽常盈故只於這裏差了歷上若是這理所以為多堯夫之學大抵似揚雄然亦不盡如之常窮味有二萬八千六百此非人所合和是自然也色有二萬八千六百又非人所染畫得亦是自然也獨聲之數只得一半數不行蓋陽聲也只是於日出地上數得到日入地下遂數不行此皆有理譬之有形斯有影不可謂今日之影却收以為今日之影伊川文集揚雄兼知法理歷不能無差今之學厯者但知歷法不知厯理能布算者洛下閎也能推步者甘公石公也洛下閎但知厯法揚雄知厯法又知厯理文公厯法先論太虛厯法要當先論太虛以見三百六十五度四分度之一一一定位然後論天行以見天度加損虛度之嵗分歲分既定然後七政乃可齊耳黃道之差始自春分秋分赤道所交月道之差始自交初交中黃道所交日出入赤道二十四度月出入黃道六度黃道一周退前所交六十分度之一是謂嵗差月道一周退前所交一度八萬九千七百七十三分度之四萬三千五百三杪半積二萬一千九百一十五年而嵗差周積二百二十一月及分一千七百五十三而交道周矣又節齋曰赤道弦𢃄天之中日道月道斜交赤道之內外其周圍長短與赤道無差而日月每日行度亦無盈縮進退歷家欲求日月交會故以赤道為起算之法以赤道度數而揆之黃道則日行有盈縮焉以赤道度數而揆之月道則月行有進退焉非日月之行真有盈縮進退也文公厯知三辰所在厯是書象是器無厯則無以知三辰之所在無璇璣則無以見三辰之所在同上厯差其來有漸堯時昏旦星中於午月令差於未漢晉以來又差今比堯時似差四分之一古時冬至日在牽牛今却在斗同上推厯各有所本太史公厯書説是太初然却是顓頊四分厯劉歆三統厯唐一行大衍厯最詳備五代王朴司天考亦簡嚴然一行王朴之厯皆止用之二三年即差王朴厯是七百二十加去季通所用却依康節三百六十數古今厯法不同古今厯法各不同其閠法亦從而異秦用顓帝之厯水德以王天下以十月為歲首故遇閏年即閏九月而謂之後九月蓋取左氏歸餘於終之意近得一統元厯紹興七八年間作篇中暗用紀元厯以統元為名古今厯象惟推算得個隂陽消長分界耳分野之説始見於春秋時詳見於漢志並同上厯之差因日食器久必敝數久必差固也古人謂三百年計厯改憲是厯之改必三百之間可也歷觀前世莫有及者何其改之數也漢之厯四變而太初最密不百餘年而差矣人皆歸咎於當去餘分而不去矣四分減之而非乾象增之而亦非何也抑有可言者太初之造司馬實職之今以其書大餘小餘計之則古厯也非太初也何自矛盾邪唐厯十三變而大衍最密不半太初之年而差矣人皆歸咎於日法之不分矣而繼大衍者推擬圗寫分而不能易者又何也抑有可言者大衍之法後不能易而王朴則斬然自立一家雖失追急而不緩亦難矣其源流誰自且厯之起起於斗度而疏密多寡悉皆不齊冬至之日厯之所生也或以為在斗或以為在建或以為在牽牛或以為在女宿何耶歷之差差於日食而晉唐之間凡日之有食若聚訟然訖無中者則晦朔之間朓朒之微孰從而正哉宋朝之厯十餘變矣邇者復以差聞今厯雖成而主上以授時在璣衡為先務猶懼有闕令侍臣復驗之甚盛舉也蓋聞仁宗時以其厯而較之麟德厯大分餘者三十有竒小分餘者七十有竒今日之厯將縮之將衍之耶諸君其推之以易證之以律明之以春秋而裁之以太元為今日厯之本此星翁厯官事毋泛毋略東萊文集羣書考索續集卷二十三
