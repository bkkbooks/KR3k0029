body:
  text: 羣書考索别集卷三宋章如愚撰經籍門易乾坤隂陽之純粹易中只是隂陽乾坤是隂陽之純粹者然就一年論之乾卦氣當四月坤卦氣當十月文公乾道坤道之說忠信所以進德修辭立其誠所以居業者乾道也敬以直內義以方外者坤道也只是健順又曰非禮勿視聽言動者乾道出門如見大賔使民如承大祭者坤道同上乾是氣之體統問先生嘗言天地之間本一氣之流行而有動靜耳以其流行之體統而言則但謂之乾而無所不包以動靜分之然後有隂陽剛柔之别所謂流行之體統指乾道而言邪先生曰大哉乾元萬物資始乾道變化各正性命只乾便是氣之體統物之所資始物之所正性命豈非無所不包但自其氣之動而言則為陽自其氣之靜而言則為隂所以陽當兼隂隂不得兼陽陽大隂小隂必附陽皆此意也同上乾元亨利貞之德乾道終始即四德也始則元終則貞蓋不終則無以為始不貞則無以為元六爻之立由此而立耳以時成而言者各以其時而成如潜見飛躍皆以時耳然皆四德之流行也初九九二之半即所謂元九二之半與九三即所謂亨九四與九五之半即所謂利九五之半與上九即所謂貞蓋聖人大明乾道之終始故見六位各以時乘乘此六爻之時以當天運而四德之所以終而復始應變而不窮也同上乾不言凶乾不言凶而言有悔悔與凶何辨也仁宗朝賈昌朝講乾卦謂乾卦大㫖在上九一爻此爻在亢極必有凶災不言即凶而言亢龍有悔者以悔中有可凶可吉之象若修德以濟世則免悔而獲吉矣坤德得乾之半蓋陽大隂小陽則兼隂隂不得兼陽坤德常只得乾之半故常减於乾之半也如乾無所不利坤只利牝馬之貞皆是文公文集復是陽氣之初易之精微在兩儀生四象四象生八卦八卦生六十四卦萬物萬化皆從這裏流出緊要處在那復姤邊復是陽氣發動之初同上常非一定之謂常非一定之謂故晝則必夜夜而復晝寒則必暑暑而復寒若一定則不能常也其在人冬日則飲湯夏日則飲水可以仕則仕可以止則止今日道合便從明日不合則去又如孟子辭齊王之金而受薛宋之饋皆隨時變易故可以為常也同上升萃二卦之義問升萃二卦之義多是言祭享萃固取聚義不知升何取義先生曰人積其誠意以事鬼神有升而上通之義又曰六五貞吉升階與萃九五萃有位匪孚元永貞悔亡皆謂有其位必當有其德若無其德則萃雖有位而人不信雖有升階之象而不足以升矣同上艮不終止艮止之義於卦明矣然又曰時止則止時行則行何哉艮止也止其所也故係辭曰止萬物莫善乎艮又曰成乎艮艮者萬物之所成終而所成終也止於此矣復出乎震不終止也故艮卦曰時止則止時行則行龜山訟言吉凶訟卦九二不克訟無眚九四不克訟安貞上九或錫之鞶帶終朝三禠之夫二與四不勝者也然且至於無眚與吉上九訟而勝者也然且存三禠之辱何也曰此止訟之道也夫使勝者自多其勝以誇其不勝怨者日恥其不勝以遂其惡吾不知其所止矣故勝者禠服不勝者安貞無眚止訟之道也渙以立廟渙之為言天下流離渙散而不安其居此宜經營四方之不暇而且曰王假有廟象曰先王以享于帝立廟也居渙散之中安然不爭而自為長久之計宗廟既立享之而位定而天下之心始有所係矣著述序卦序卦之作所以眀大易之藴然韓康伯以為非易之藴何也十翼皆孔子之言乎不得而知也然而有疑焉其所謂序卦者自韓康伯已明其非易之藴而未明其所以非也何謂邪夫三才之交錯萬事之紛揉未嘗有獨行而無法唱之而無應者是故剛柔相配小大相承強弱相長故言天必言地言隂必言陽有大必有小有弱必有強易卦之序豈非二二而相從者乎今夫上經之卦乾天坤地故乾對坤屯氣之始䝉識之始故屯對蒙需和而訟乖故需對訟師憂也比樂也故師對比小畜以隂而制陽履以隂而承陽故小畜對履不惟其義之若是觀其九六竒偶之畫或上或下或相反或相生亦兩之而為比則易卦二二而相從豈不甚明哉今序卦之文蓋不協矣有義之茍合者或義之不合而強通者是豈聖人之言耶學者究之而自知此不可以偏舉也學易者知夫所謂二二而相從則於三才之淵萬事之變可以心通而得易道之半矣淇水文當期之日夫子曰乾之䇿二百一十有六坤之策一百四十有九凡三百六十當期之日由是觀之則知聖人特言乾坤二卦之䇿數何嘗於六十四卦之爻論乎然以易緯參之則以六十四卦一爻配一日期數且不相當何也聖人作易夲以明道其緒餘可以卜筮而已而後之言隂陽者言星歷者言樂律者莫不於易求之求之自以為得配之自以為合然以為聖人之意則非也古之言卦氣者本於何書出於何氏易緯稽覽圖曰卦氣起於中孚坎離震兌各主一方其餘六十卦卦有六爻爻則主一日凡主三百六十日餘有五日每日分為八十分五日分為四百分又四分日之一為二十分是有四百二十分六十卦分之六七四十二卦各得七分每卦得六日七分世儒傳卦氣六日七分之說蓋起於此嗚呼木鐸無聲大易不振至使䜟緯之學本巫史之說假易道以自神學者不察遂為成說亦可以悲夫彼其意蓋見夫子於大衍有謂當期之日於後有謂七日來復故以為說耳此甚不可也夫子曰乾之䇿二百一十有六坤之䇿一百四十有九凡三百有六十當期之日據此乃言揲蓍之法乾老陽三少之餘得四九三十六䇿一爻三十六䇿六爻則二百一十六䇿坤老隂三多之餘得四六二十四䇿一爻二十四䇿六爻則百四十四䇿合乾坤六爻之䇿數則為三百六十當期之日是特聖人言乾坤二卦爻之䇿數如此何嘗為六十四卦之爻論乎何嘗以一爻配一日乎聖人言乾坤二卦之䇿數易緯乃以六十四卦之爻數配之何耶豈非以二篇之䇿數有萬一千五百二十不可以相配故捨聖人所言之䇿數而求聖人不言之爻數也三百八十四爻已踰一期之數矣不相當也於是又以坎離震兌各主一方為方伯以此四卦二十四爻主二十四氣損四卦主四方又不足於期數也於是又有五日分為四百分四分日之一為二十分每卦得六日七分然後足其數吁其亦迂曲僻怪牽強配合甚矣經曰七日來復言復卦自姤初六至此七變而成爻於臨曰消至於八月有凶言一陽方長終為二隂所臨也或言日或言月以隂陽言之耳來復者陽也為陽言故云日消臨者隂也為隂言故云月此乃告人以隂陽消息之義何嘗謂卦氣七日乃當復乎借曰卦氣以七日當陽何得又云六日七分乎又知坎離震兑不與當日之數何自知之也蓋不過求以足當期之數不得不強說也使一朞之數三百八十有四日則必不省四卦當四方矣不知夫子謂當期之日無他特以乾坤䇿數大率與期數合亦如分而為二以象兩掛一以象三揲之以四以象四時之意矣期三百六十有六日聖人但以三百六十當之者舉其大率相當爾若果以一䇿配一日則其數不足也且下云二篇之䇿萬有一千五百二十當萬物之數只以萬數當之足矣其餘又有一千五百二十何以能當其數耶為卦氣之說者能強相配合以萬有一千五百二十以足萬物之數然後可以當期之日配卦也不可強於彼而復強於此妄說可知也子雲儒之勤而陋者也凡易之精義奧㫖皆所不見而徒模效形象本易緯卦氣之陋說而作太元卦氣始於中孚終於頤太元亦始于中終于養吾不知卦氣必始於中孚者何又子雲乃法之考中孚卦四陽二隂四陽處乎上下二隂處乎內說者皆曰中孚之象如孚卵然二隂居中有孚故曰中孚此不知易者之誤說也據中孚信及豚魚聖人曰柔在內而剛得中二隂謂之在內則可謂之剛得中則非觀三與四隂爻皆無誠信可言何孚之有不知聖人名卦曰中孚者謂居中者孚不中者不孚也二四之中故五曰有孚攣如二則有鶴鳴子和之德主卦之美全在九二以有誠於幽隱之間也聖人名中孚之義如此今乃以冬至節氣當之何義此已不可其他以某卦配某節俱非理也太𤣥法之乃云信無不在其中果易㫖乎使子雲而深於易必不作太𤣥溺星歷而逺於道也學者睹於易道而不䆒始為卦氣之誤說反以為易與太𤣥非當期數何以配之皆合夫一朞之數不過三百六十日有竒必強配之何患不合古之樂律不過十二京房則衍為六十已可怪矣至梁沈重又因房之六十律從而六之為三百六十音以當一嵗之日其名有阿衡歸仁俾義九有之異何理也哉茍欲配之誰能強其不可故夫太𤣥以八十一首七百二十九贊當期數亦無異於此者矣其以少配謙以􅕳羡配臨以斂配小畜以文配渙之類殊非理又亦何異以阿衡歸仁之類比黃鍾太簇也嗚呼子雲知悔於作賦而不知悔於草𤣥何察於小而昧於大也十翼總論先儒以繇彖大象小象上繫下繫文言說卦序卦雜卦為十翼後人又以繇彖大小象說卦序卦雜卦分乾坤文言為二加每卦無咎悔吝之辭為十翼先儒之說非也後人之說亦非也古者易之繇為一簡易之彖為一簡文言為一簡繫辭為一簡自鄭元學易始以易象與辭分係諸卦至王弼注經復以文言𨽻乾坤今以上下係為十翼之二不知今之二係乃七十二子𫝊易之大傳也何以言之以其辭之中有子曰之言也非夫子之十翼明矣今以乾坤文言為十翼之二不知聖人作乾坤文言以明易蓋並為一簡特分係於二卦此不過十翼之一耳豈可岐而二哉若以無咎悔亡等語為十翼之一此其說則可信田京二家之書脫去無咎等字或者謂之所𫝊之誤然一二卦可也不應六十四卦皆誤也當時無咎悔亡等字别為一簡田京二家失其簡故耳此謂之十翼明也然十翼之中當增以爻而併文言為一也且繇而後彖彖而後象象而後爻諸卦皆然惟乾坤先爻而後彖象爻與小象既異則爻為十翼之一亦明也諸卦皆分係惟乾卦不然蓋亦存古之意文王重易以大𫝊言之取益取噬嗑取隨皆六十四卦之名也神農黃帝堯舜皆文王之前也則重易六爻謂文王可乎且周官太卜掌三易一曰連山二曰歸藏三曰周易為經卦皆八其别皆六十四夏商之時已有六十四卦非至文王重六爻也然則揚雄班固之徒何以言文王重六爻蓋文拘於羑里而演六十四卦之辭如乾元亨利貞坤元亨利牝馬之貞是也非重六爻也論重爻之義重卦之義先儒之論不一王弼謂伏羲畫卦即自重卦是惑於十三卦之言也鄭元謂神農重卦是以連山為神農之書也孫盛謂夏禹重卦則又惑於連山為夏易之言也孔頴逹黨王弼之議而又申之以取渙隨之說皆非也惟史遷以六十四卦為文王所重考之於易為有證耳論九六之數先儒為九六之說多矣謂九者陽之極六者隂之中陽可使盛隂不可使過此一說也謂乾體三畫坤體六畫陽得兼隂隂不得兼陽又一說也謂老陽之數九老隂之數六老陽老隂其類能變故不取七八而取九六此又一說也三者之說互相是非莫知所定獨不質諸孔子之言乎曰參天者一三五也此陽數之所以為九也曰兩地也二四也此隂數之所以為六也九六之辨孔子已言之矣易者性命之源易者交錯代換之名卦爻之立由是而已天地之間隂陽交錯而實理流行一賦一受於其中亦猶是也通書第一章解易者義理之宗隂陽有自然之變卦畫有自然之體此易之為書所以為文字之祖義理之宗也然不止此蓋凡管於隂陽者雖天地之大鬼神之幽其理莫不具於卦畫之中焉此聖人之精藴所以必於此而寄之也通書解動靜闔闢之理夫易變易也兼指一動一靜已發未發而言之也太極者性情之妙也乃一動一靜已發未發之理也故曰易有太極言即其動靜闔闢而皆有是理也文公文集流行變通之體易之為義乃指流行變易之體而言此體生生元無間斷但其間一動一靜相為終始耳程子曰上天之載無聲無臭其體則謂之易其理則謂之道其用則謂之神正謂此也此體在人則心是已其理則所謂性其用則謂之情其動靜則所謂未發已發之時也此其為天人之分雖殊然靜而此理已具動而此用實行則其為易一也若其所具之理所行之用合而言之則是易之有太極者同上未畫而理已具畫前之易乃謂未畫之前已有此理而後假手於聰明神武之人以發其祕非謂畫前已有此圖畫後方有八卦也同上羲文易有先後先天者伏羲所畫之易也後天者文王所演之易也伏羲之易初無文字只有一圖以寓其象數而天地萬物之理隂陽始終之變具焉文王之易即今之周易而孔子所為作𫝊者是也孔子既因文王之易以作傳則其所論固當専以文王之易為主然不推本伏羲作易畫卦之所由則學者必將誤認文王所演之易便為伏羲始畫之易只從中半說起不識向上根原矣同上三聖教法不同易之為書更厯三聖而制作不同若包羲氏之象文王之辭皆因卜筮而為教而其法則異至於孔子之贊則又一以義理為教而不専於卜筮也是豈其故相反哉俗之淳漓既異故其所以為教為法者不得不異而道則未嘗不同也書伊川先生易𫝊後孔子推出此理蓋易本卜筮之書故先王設官掌於太卜而不列於學校學校所教詩書禮樂而已至孔子乃於其中推出所以設卦觀象係辭之㫖而因以識夫吉凶進退存亡之道蓋聖人當時已曉卜筮之法與其詞意所在如說田狩即實是田狩說祭祀即實是祭祀征伐婚媾之類皆然非譬喻也故就其間推出此理耳文公文集推義理以明訓戒卦爻之辭本為卜筮者斷吉凶而因以訓戒至彖象文言之作始因其吉凶訓戒之意而推說其義理以明之後人但見孔子所說義理而不復推本文王周公之本意因鄙卜筮為不足言而其所以言易者遂逺於日用之實類皆牽合委曲偏主一事而言無復包含該貫曲暢旁通之妙若但如此則聖人當時自可别作一書明言義理以詔後世何用假託卦象為此艱深隱晦之辭乎同上象辭變占之義蓋易有象八卦六爻然後有辭卦爻之辭筮有變老隂老陽然後有占變爻之辭象之變也在理而未形於事者也辭則各因象而指其吉凶占則又因吾之所值之辭而決焉其示人也益以詳焉故君子居而學易則既觀象矣又玩辭以考其所處之當否動而諏筮則既觀變矣又玩變以考其所值之吉凶善而吉者則行否而凶者則止是以動靜之間舉無違理而自天佑之吉無不利也同上卦辭自然之理易本卜筮之書而其畫卦係辭分别吉凶皆有自然之理同上看易先看四書與其虛費心力於此不若且看詩書禮樂之為明白而易知也然大學論孟中庸又在四者之先須都理㑹得透徹方可略看易之大指亦未為晚今所論論語尚爾未通豈可遽及此耶文公文集變亂於費氏王弼漢藝文志易經十二篇施孟梁邱三家顔師古曰上下經及十翼故十二篇是則彖象文言係辭始附卦爻而𫝊於漢考先儒謂費直専以彖象文言參解易爻以彖象文言雜入卦中者自費氏始其初費氏不列學官惟行民間至漢末陳元鄭康成之徒學費氏古十二篇之易遂亡孔頴逹又謂輔嗣之意象本釋經宜相附近分爻之象辭各附當爻則費氏初變亂古制時猶若今乾卦彖象係卦之末歟古經始變於費氏而卒大亂於王弼惜哉同上程易𫝊意味無窮程傳但觀其理而不考卦畫經文則其意味無窮各有用處誠為切於日用功夫但以卦畫經文考之則不免有可疑者同上揲蓍之法大衍之數五十其用四十有九何謂也揲蓍之法四十九蓍聚之則一而四十九隱于一中散之則四十九而一隱于四十九中一者道也謂之無則一在謂之有則不可取四十九者用也靜則歸於一動則惟覩其用一在其間而不可取此謂大衍之數五十其用四十有九大衍蓍數之用太元蓍數三十六虛三而用三十三者三才之義也潜虛蓍數七十五虛五而用七十者五行之象也然則大衍之數五十而用四十九者豈非虛一為元氣之本乎夫天地之數五十有五而大衍之數五十何耶蓋天一下降與地六合於北而生水地二十騰與天七合於南而生火天三左旋與地八合於南而生木地四右轉與天九合於西而生金天五冥運與地十合於中而生土五十有五為天地之極數而衍數五十則天地之用數也以天地之用數而虛一而用四十九焉愚不知所取義者何說聞之京房之論矣有曰十日十二辰二十八宿而一不用者天之生氣是已聞之馬季良之論矣有曰太極兩儀日月四時五行十二月二十四氣是為五十而一不用者北辰不動是已又聞之荀爽之論矣有曰卦有六爻八六四十有八加乾坤二用是為五十而一不用者乾之初九潜龍勿用是已然京房知舉二十八宿而遺其七政之大季良不知四者同氣而總名荀爽以八卦言之加乾坤以足之則又重舉初九之一爻誠不足以知大衍之妙也知大衍之妙者惟韓康伯近之夫演天地之數所賴者五十也其用四十有九則其一不用也不用而用以之通非數而數以之成斯易之太極也然以愚論之則蓍用四十九不為無所證據蓋蓍之德七貟而入神卦之德八方而入知以蓍之七推之七七則為四十九亦猶卦之德八八而六十四也彼康成以減五又減一為說姚信董遇以六卦減六為說顧歡以神數虛一為說不惟不足以知大衍之妙亦不足以知天地之用數耳七八九六之數知天地之成數而後可與言易數之妙知五行之陽數而後可與言易數之宗蓋易用七八九六實本之天地五行也何以言之六八者地之成數七九者天之成數取數之成而遺地十者十為數之窮也水陽數六火隂數七木陽數八金陽數九用數之陽而不用土五者五為數之中也然則九為老陽六為老隂七為少陽八為少隂其義誠有可證者也夫三揲皆少其數總十有三以四十九䇿除十三餘三十六是為老陽乾之象也以四計之凡有九揲故四九之數曰老陽三揲皆多其數總二十五以四十九䇿除二十五餘二十四是為老隂坤之象也以四計之凡有六揲故四六之數曰老隂二多一少數皆二十一以四十九䇿除二十一餘二十八是為少陽震坎艮之象也以四計之各有七揲故四七之數曰少陽二少一多數皆十七以四十九䇿除十七餘三十二是為少隂離㢲兌之象也以四計之各有八揲故四八之數曰少隂然七八九六之數必以四而求之者蓋揲蓍之法起數以四而非四營則不足以成易也雖然六與九合七與八合分而言之各有十五數是又得河圖之生數也不然論者何以曰生生之謂易揲䇿變爻之法倚數之元參天兩地衍而極之五十乃備是曰大衍虛一無為其為用者四十九蓍信手平分置右於几取右一蓍掛左小指乃以右手揲左之䇿四四之餘歸之于扐初扐左手無名指間右䇿左揲將指是安再扐之竒通掛之算不五則九是謂一變置此掛扐再用存䇿分掛揲歸復准前式三亦如之竒皆四八三變既備數斯可察數之可察其辨伊何四五為少八九為多三少為九是曰老陽三多為六老隂是及一少兩多少陽之七孰分少隂少兩多一既得初爻復合前蓍四十有九如前之為三變一爻通十八變六爻發揮卦體可見老極而變少守其常六爻皆守彖辭是當變視其爻兩兼首尾變及三爻占兩卦體或四或五視彼如存四二五一二分一専皆變而他新成舊毁消息盈虛舍此視彼易啓蒙例縱橫順逆之數聖人觀象以畫卦揲蓍以命爻使天下後世之人皆有以決嫌疑定猶豫而不迷於吉凶悔吝之塗其功可謂盛矣然其為卦也自本而幹自幹而枝其勢若有所迫而自不能已其為蓍也分合進退縱橫順逆亦無往而不相值焉是豈聖人心思智慮之所得為也哉特氣數之自然形於法象見於圖書者有以啓於其心而假手焉耳易啓蒙序變化離合之妙揲蓍之法則通計三變之餘去其初掛之一凡四為竒凡八為偶竒貟圍三偶方圍四三用其全四用其半積而數之則為六七八九而第三變揲數䇿數亦皆符㑹蓋餘三竒則九而竒揲亦九䇿亦四九三十六是為居一之太陽餘二竒一偶則八而其揲亦八䇿亦四八三十二是為居二之少隂二偶而竒則七而其揲亦七䇿亦四七二十八是為居三之少陽三偶則六而其揲亦六䇿亦四六二十四是為居四之老隂是其變化往來進退離合之妙皆出自然非人之所能為也係辭本義掛扐過揲之數相參蓋四十九䇿除初掛之一而為四十八以四約之為十二以十二約之為四故其揲之一變也掛扐之數一其四者為竒兩其四者為偶其三變也掛扐之數三其四一其十二而過揲之數九其四三其十二者為老陽掛扐過揲之數皆六其四兩其十二者為老隂自老陽之掛扐而增一四則是四其四一其十二而又進一四也自其過揲者而損一四則是八其四也三其十二而損一四也此所謂少隂者也自老隂之掛扐而損一四則是五其四也兩其十二而去一四也自其過揲而增一四則是七其四也兩其十二而進一四也此所謂少陽者也二老者隂陽之極也二極之間相距之數凡十有二而三分之自陽之極而進其掛扐退其過揲各至於三之一則為少隂自隂之極而退其掛扐進其過揲各至於三之一則為少陽老陽居一而含九故其掛扐十二為最少而過揲三十六為最多少隂居二而含八故其掛扐十六為次少而過揲三十二為次多少陽居三而含七故其掛扐二十為稍多而過揲二十八為稍少老隂居四而含六故其掛扐二十四為極多而過揲亦二十四為極少蓋陽竒而隂偶是以掛扐之數老陽極少老隂極多而二少者一進一退而交於中焉此其以少為貴者也陽實而隂虛是以過揲之數老陽極多老隂極少而二少者亦一進一退而交於中焉此其以多為貴者也凡此不唯隂之與陽既為二物而迭為消長而其一物之中此二端者又各自為一物而迭為消長其相與低昻如權衡其相與判合如符契固為非人之私智所能取舍而有無者而况掛扐之數乃七八九六之原而過揲之數乃七八九六之委其勢又有輕重之不同而或者乃欲廢置掛扐而獨以過揲之數為斷則是舍本而取末去約以就煩而不知其不可也豈不誤哉易啓蒙乾坤二卦之䇿乾之䇿二百一十有六者積六爻之䇿各三十六而得之也坤之䇿百四十有四者積六爻之䇿各二十有四而得之也凡三百六十者合二百一十有六百四十有四而得之也當期之日者每月三十日各十二月為三百六十也蓋以氣言之則有三百六十六日以朔言之則有三百五十四日今舉氣盈朔虛之中數而言故曰三百有六十也然少陽之䇿二十八積乾六爻之䇿則一百六十八少隂之䇿三十二積坤六爻之䇿則一百九十二此獨以老隂陽之䇿為言者以易用九六不用七八也然二少之合亦三百有六十啓蒙上下經二篇之䇿上下經六十四卦其陽爻百九十二每爻各三十六䇿積之得六千九百一十二隂爻百九十二每爻二十四䇿積之得四千六百八又合二者為萬有一千五百二十也若為少陽則每爻二十八䇿凡五千三百七十六少隂則每爻三十二䇿凡六千一百四十四合之亦為萬一千五百二十也啓蒙蓍䇿自然數數者䇿之所宗而䇿為已定之數某竊謂數是自然之數䇿即蓍之莖數也禮曰龜為卜䇿為筮是已老陽一爻過揲三十六䇿故積六爻而得二百一十有六䇿耳文公文集爻卦自然之序揲法初爻成則便止有三十二卦二爻成則便止有十六卦三爻成則便止有八卦四爻成則便止有四卦五爻成則便止見二卦六爻成亦是二卦亦是自然次序節次可見隂陽老少之爻揲蓍之法凡三揲掛扐通十三䇿而見存三十六䇿則為老陽之爻三揲掛扐通十七䇿而見存三十二䇿則為少隂之爻三揲掛扐通二十一䇿而見存二十八䇿則為少陽之爻三揲掛扐通二十五䇿而見存三十四䇿則為老隂之爻大傳専以六爻乘老陽老隂而言故曰乾之䇿二百一十有六坤之䇿百四十有四凡三百有六十其實六爻之為隂陽者老少錯雜其積而為乾者未必皆老陽其積而為坤者未必皆老隂其為六子諸卦者或陽或隂亦互有老少焉蓋老少之别本所以生爻而非所以名卦今但以乾有老陽之象坤有老隂之象六子有少隂陽之象且均其䇿數又偶合焉而因假此以明彼則可若便以乾六爻皆為老陽坤六爻為老隂六子皆為少陽少隂則恐其未安也但三百六十者隂陽之合其數必齊於此若乾坤之爻而皆得於少隂陽也則乾之䇿六其二十八而為百六十八坤之䇿六其三十二而為百九十二其合亦為三百六十此則不可易也九六七八之數五行成數去其地十之土而不用七八九六而已陽竒隂偶故七九為陽六八為隂陽進隂退故九六為老七八為少然陽極於九則退八而為隂隂極於六則進七而為陽一進一退循環無端此揲蓍之法所以用九六而不用七八蓋取其變也答方伯謨以一約四之義其實以一約四以竒為少以偶為多而已九八者兩其四也隂之偶也故謂之多五四者一其四也陽之竒也故謂之少竒陽體圎其法徑一圍三而用其全故少之數三偶隂體方其法徑一圍四而用其半故多之數二歸竒積三三而為九則其過揲者四之而為三十六矣歸竒積三二而為六則其過揲者四之而為二十四矣歸竒積二三一二而為八則其過揲者四之而為三十二矣歸竒積二二一三而為七則其過揲者四之而為二十八矣過揲之數雖先得之然其數衆而繁歸竒之數雖後得之然其數寡而約紀數之法以約御繁不以衆制寡故先儒舊說専以多少決隂陽之老少而過揲之數亦冥會焉初非有異說也同上六十有四之數蓋四數之變極於六十有四老陽十二老隂四少陽二十少隂二十八乃自然之數不容增減揲者隨其所得而言之又何慮其不可觀變耶文公文集蓍七卦八之義蓍以七為數是未成卦時所用未有定體故其德圓而神所以知來卦以八為數是用蓍之變而成已有定體故其德方以知所以藏往卦惟三易有之皆筮法也文公文集內外貞悔之名內卦為貞外卦為悔亦是畫卦之時已有此名至揲蓍求之則九變而得貞又九變而得悔又是後一假事非謂必揲蓍然後始有貞悔之名也同上太一兩儀三才四時之象大衍之數五十其用四十有九者五十之內去其一但用四十九䇿合同未分是象太一也分而為二者以四十九䇿分置左右兩手象兩者左手象天右手象地是象兩儀也掛一者掛猶懸也於右手之中取其一䇿懸於左手小指之間象三者所掛之䇿所以象人而配天地是象三才也揲之以四者揲數之也謂先置右手之䇿於一處而以右手四四而數左手之䇿又置左手之䇿而以左手四四而數右手之䇿也象四時者皆以四數是象四時也歸竒於扐者竒零也扐勒也謂既四數兩手之䇿則其四四之後必有零數或一或二或三或四左手者歸之於第四第三指之間右手者歸之於第三第二指之間而勒之也象閏者積餘而成閏月也五嵗再閏故再扐而後掛者凡前後閏相去大略三十二月在五嵗之中此掛一揲四歸竒之法亦一變之間凡一掛兩揲兩扐為五嵗之象其間凡兩扐以象閏是五嵗之中凡有再閏然後置前掛扐之䇿以見存之象分二掛一而為第二變也蓍卦考誤全數自然之妙蓋四十九者蓍之全數也以其全而揲之則其前為掛扐其後為過揲以四乘掛扐之數必得過揲之䇿以四除過揲之䇿必得掛扐之數其自然之數如牝牡之相銜如符契之相合可以相勝而不可以相無且其前後相因固有次第而掛扐之數所以為七八九六又有非偶然者皆不可以不察也同上天地生成之數今按一二三四五天地之生數也五中數故不用六七八九十天地之成數也十全數故不用而河圖洛書之四象亦無所當於五與十焉故四象之書成而以一二三四紀其次九八七六積其實揲蓍之法具而掛扐之五與六以一其四而為竒九與八以兩其四而為偶竒乃象圎而徑一者其圍三故凡竒者其數三偶以象方而徑一者其圍四而用半故凡偶者其數二所謂參天兩地者也及其揲之三變則凡三竒者三其三而為九三偶者叁其兩而為六此九六之所以得數之實也至於兩竒一偶則亦參其兩竒以為六兩其一偶以為二而合之為八兩偶一竒則亦兩其兩偶以為四參其一竒以為三而合之為七此七八所以得數之實也是其老少雖有不同然其成象之所自得數之所由則皆有從來而不可誣矣同上四象自然之理四象之數乃天地之間自然之理其在河圖洛書各有定位故聖人畫卦自兩儀而生有畫以見其象有位以定其次有數以積其實其為四象也久矣至於揲蓍然後掛扐之竒偶方圎有以兆之於前過揲之三十六三十二二十八二十四有以乘之於後而九六七八之數隱然於其中九七天數也三十六二十八凡老陽少陽之䇿數也六八地數也三十二二十四凡老隂少隂之䇿數也今専以九六為天地之數乾坤之䇿謂七八非天地之數而為六子之䇿則已誤矣同上三變多少之數其法初一變兩揲之餘為掛扐者不五則九第二變兩揲之餘為掛扐者不四則八第三變兩揲之餘為掛扐者亦不四則八五四為少九八為多若三變之間一五兩四則謂之三少一九兩八則謂之三多或一九一八而一四或一五而二八則謂之兩多一少或一九而二四或一五一四而一八則謂之兩少一多蓋四十九䇿去其初掛之一而存者四十八以四揲之為十二揲之數四五為少者一揲之數也八九為多者兩揲之數也一揲為竒兩揲為偶竒者屬陽而象圎偶者屬隂而象方圎者一圍三而用全故一竒而含三方者一圍四而用半故一偶而含二也蓍卦考誤三變所得之數四象之次一曰太陽二曰少隂三曰少陽四曰太隂以十分之則居一者含九居二者含八居三者含七居四者含六其相為對待而具於洛書者亦可見也故三少為老陽者三變各得一揲之數而三三為九也其存者三十六而以四數之復得九揲之數也左數右䇿則左右皆九左右皆䇿則一而圍三也三多為老隂者三變各得兩揲之數而三二為六也其存者二十四而以四數之復得六揲之數也左數右䇿則左右皆六左右皆䇿則圍四用半也兩多一少為少陽者三變之中再得兩揲之數一得一揲之數而三二一三為七也其存者二十八而以四數之復得七揲之數也左數右䇿則左右皆七左右皆䇿則方二圎一也兩少一多為少隂者三變之中再得一揲之數一得兩揲之數而二三一二為八也其存者三十二而以四數之復得八揲之數也左數右䇿則左右皆八左右皆䇿則圓二方一也蓍卦考誤三變皆掛之法三變之中前一變屬陽故其餘五九皆竒數後二變屬隂故其餘四八皆偶數屬陽者為陽三而為隂一圍三徑一之術也掛一而左一右三也掛一而左右皆二一也掛一而左三右一者皆陽也掛一而左右皆四者隂也屬隂者為隂二而為陽二皆以圍用半之術也掛一而左一右二也掛一而左二右一也陽也掛一而左三右四也掛一而左四右三也隂也是皆以三變而掛之法得之後兩變不掛則不得也後兩變不掛則左一右三左二右二左三右一皆為陽惟左右皆四乃為隂三變之後其可為老陽者十二可為老隂者四可為少隂者二十八可為少陽者二十雖多寡之不同而皆有法象老隂陽數本皆八老者動而隂性本靜故損隂之四以歸於陽少隂陽數本皆二十少者靜而陽性本動故損陽之四以歸於隂是亦以三變皆掛之法得之而後兩變不掛則不得也後兩變不掛則老陽少隂皆二十十少陽九老隂同上察隂陽以畫竒偶伏羲仰觀俯察見隂陽有竒偶之數故畫一竒以象陽畫一偶以象隂見一隂一陽有各生一隂一陽之象故自下而上再倍而三以成八卦見陽之性健而其成形之大者為天故三竒之卦名之曰乾而擬之於天也三畫已具八卦已成則又三倍其畫以成六畫而為八卦八卦之上各加八卦以成六十四卦夲義竒偶相加而成卦太一肇判隂降陽升陽一以施隂兩而承惟皇昊羲仰觀俯察竒偶既陳兩儀斯設既幹乃支一各生兩隂陽交錯以立四象竒加以竒曰陽之陽竒而加偶陽隂以章偶而加竒隂內陽外偶復加偶隂與隂會兩一既分一復生兩三才在目八卦指掌竒竒而竒初一曰乾竒竒而偶兑次二焉竒偶而竒次三曰離竒偶而偶四震以隨偶竒而竒㢲居次五偶竒而偶坎六斯睹偶偶而竒艮居次七偶偶而偶八坤以畢初畫為儀中畫為象上畫卦成人文斯朗因而重之一貞八悔六十四卦由內逹外啓蒙原象剛柔相摩而成卦六十四卦之初剛柔兩畫而已兩相摩而為四四相摩而為八八相蕩而為六十四易本義伏羲畫卦之義易有太極是生兩儀兩儀生四象四象生八卦大𫝊又言包犧畫卦所取如此則易非獨以河圖而作也蓋盈天地之間莫非太極隂陽之妙聖人於此仰觀俯察逺取近取固有以超然而默契於其心矣故自兩儀之未分也渾然太極而兩儀四象六十四卦之理已粲然於其中自太極而分兩儀則太極固太極也兩儀固太極也自兩儀而分四象則兩儀又為太極而四象又為兩儀矣自是而推之由四而八由八而十六而三十二由三十二而六十四以至於百千萬億之無窮雖其見於摹畫者若有先後而出於人為然其已成之形已成之勢則固已具於渾然之中而不容毫髮思慮作為於其間也易學啓蒙陽乾隂坤之體易之所有隂陽而已凡陽皆乾凡隂皆坤畫卦定位則二者成列而易之體立矣易本義乾坤生六子之象今按坤求於乾得其初九而為震故曰一索而得男乾求於坤得其初六而為㢲故曰一索而得女坤再求而得乾之九二以為坎故曰再索而得男乾再求而得坤之六二以為離故曰再索而得女坤三求而得乾之九三以為艮故曰三索而得男乾三求而得坤之六三以為兑故曰三索而得女凡此數節皆文王觀於已成之卦而推其未明之象以為說邵子所謂後天之學入用之位者也易啓蒙自下為初之義凡畫卦者自下而上故以下爻為初易本義陽爻隂爻之别陽數九為老七為少老變而少不變故謂陽爻為九隂數六為老八為少老變而少不變故謂隂爻為六同上總論卦爻象之義聖人作易之初蓋是仰觀俯察見得盈乎天地之間者無非一隂一陽之理有是理則有是象有是象則其數便在這裏非特河圖洛書為然蓋所謂數者祗是氣之分限節度處得陽必竒得隂必偶凡物皆然而圖書為特巧而著耳於是聖人因之而畫卦其始也只是畫一竒以象陽畫一偶以象隂而已但才有四則便有八又從而再倍之便是十六蓋自其無朕之中而無窮之數已具不待安排而其勢自有不容己者卦畫既立便有吉凶在裏蓋是隂陽往來交錯於其間其時則有消長之不同長者便為主消者便為客事則有當否之或異當者便為善否者便為惡即其主客善惡之辨而吉凶見矣故曰八卦定吉凶吉凶既決定而不差則以之立事之大業自此生矣此聖人作易教民卜筮而以開天下之愚以定天下之志以成天下之事者如此但自伏羲而上但有此六畫而未有文字可𫝊到得文王周公乃係之以辭故曰聖人設卦觀象係辭焉而明吉凶蓋是卦之未畫也因觀天地自然之法象而畫及其既畫也一卦自有一卦之象象謂有個形似也故聖人即其象而命之名以爻之進退而言則如剝復之類以其形之肖似而言則如鼎井之類此是伏羲即卦體之全而立名如此及文王觀卦體之象而為之彖辭周公視卦爻之變而為之爻辭而吉凶之象益著矣大率天下之道只是善惡而已但所居之位不同所處之時既異而其幾甚微只為天下之人不能曉會所以聖人因此占筮之法以曉人使人居則觀象玩辭動則觀變玩占不迷於是非得失之塗所以是書夏商周皆用之其所言雖不同其辭雖不可盡見然皆太卜之官掌之以為占筮之用有所謂繇辭者左氏所載尤可見古人用易處蓋其所謂象者是假此衆人共曉之物以形容此事之理使人知所取舍而已文公語録元包擬易之作元包作於誰乎衛元嵩也𫝊之者誰乎蘇源明也注之者誰乎李江也元包果何為而作乎為擬易而作也何以知其為擬易夫易始於乾文之昭也包起於坤資之用也此非蘇源明之𫝊元包乎夏曰連山殷曰歸藏周曰周易唐曰元包此非李江之序元包乎觀蘇李之言則信乎其為擬易矣嘗讀其書古字多而辭意蹇誠不足以攀羲經之逸駕易六十四卦分爻布畫所以彌綸天地之造化元包有卦無爻何義也易用著䇿叙老别少所以推驗隂陽之變化元包分太少孟仲何見也借曰用坤為首吾得歸藏然坤卦始於荒并莫默終於厥勛惟極凡有八句而餘卦半焉何意也雖然蓍用三十六猶得之太元以夬第四爻而為變是得之世卦逰魂之說以需下三爻而不變是又得之世卦歸魂之說後學峥嶸亦未可以淺議元包云邵康節正元之作陳漸之演元所以發太元之㫖吳祕之音義所以祛太元之疑陸績之釋失又所以辨太元之惑夫發其㫖祛其疑固有賴於陳漸吳祕之功而正救舛訛若非陸績以釋其失則後世之惑滋甚吁又孰知陸績之後而有我朝邵先生之正元乎夫所謂正者則正救之謂也以楊子雲之太元而邵先生正之固非短於雄而詡己之長也實欲以正太元之所未正者也愚嘗三復正元而知邵先生有功於太元也深矣且方州部家名曰四重元何義也正元則以方州部家而為爻之形象而以上下命名真足以正太元之四重亦猶易卦之有上下爻也由初至上分為九贊元何拘也正元則自一至五而以五行次之真足以正太元之九贊亦猶洪範之序五行也元有十二卷正元則以九天分為九卷元有八十一首正元則以九首各為九卷元九首僅以配土正元則以水火木金土隨次序而品第之至於象工象兀象示象正象器象亦象坐象光象幽之類無非正救太元而為子雲鑽皮出羽也不然蓍何以用三十三首何以依八十一乎信乎先生之有功於太元也深矣哉羣書考索别集卷三
