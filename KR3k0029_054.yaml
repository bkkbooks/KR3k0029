body:
  text: 羣書考索卷五十四宋章如愚撰歷數門歷類歷數之起尚矣伏羲晝八卦以象二十四氣炎帝分八節以紀農功皇帝迎日推䇿乃使羲和占日常儀占月車區占星氣大撓造甲子𨽻首作算數容成綜斯六術考定氣象建五行察微斂起消息正閠餘述而著焉謂之調歷洎于少昊以鳥名官而鳯鳥氏實為歷正𤣥鳥氏司分伯趙氏司至青鳥氏司啓丹鳥氏司閉顓帝則南正重司天北正黎司地建孟春以為元是為歷宗其後三苖亂德二官咸廢而閏餘乖次孟陬殄滅攝提失方堯復黎育重之後使纂其業西漢志書曰乃命羲和欽若昊天歷象日月星辰敬授人時朞三百有六旬有六日以閏月定四時成嵗夏至太康羲和廢職唐一行曰湯作商歷以十一月甲子合朔冬至為上元又曰商歷得庚寅一分周歷得己丑二分武王訪箕子言大法九章而五紀明歷法故自商周咸正歷紀以應天道周衰天子不班朔魯歷不正以閠餘一之嵗為蔀首故春秋襄二十七年十一月乙亥朔日有食之於是辰在申司歷以為在戍史書建亥哀十二年亦以建申流火之月為建亥而怪蟄蟲之不伏也自文公閠月不告朔至此百有餘年莫能正歷數五伯之末史官所紀惟有黃帝顓帝夏商周及魯歷秦兼天下用顓帝厯推五勝而自以為獲水德乃以十月為正色尚黑前漢志後漢志曰黃帝造厯元起辛邜而顓帝用乙卯虞用戊午夏用丙寅周用丁巳魯用庚子秦用乙卯漢初因之漢興厯凡五變初襲秦正朔以張蒼言用顓帝厯比於六厯疏闊中最為微近然正朔服色不覩其真而晦朔月見弦望滿虧多非是蒼𫝊曰蒼為計相善算厯以髙祖十月始至霸上故因秦時本十月為嵗首推五德之運以為漢當水德尚黑如故漢家言厯者本張蒼逮文帝詔公孫臣立土德時厯制度蒼由此絀著十八篇言隂陽律厯事此漢初用顓帝厯也武帝元豐七年漢興百二嵗公孫卿壺遂司馬遷等言歷紀壞廢宜改正朔上與倪寬等議曰推𫝊序文則今夏之時也其以七年為元年於是遂詔卿遂遷與侍郎尊大典星射姓等議造漢歷乃以前歷上元泰初四千六百一十七嵗至元封七年復得閼逢攝提格之嵗中冬十一月甲子朔旦冬至日月在建星即牽牛也太嵗在子巳得太嵗初本星度新正姓等奏不能為算願募治歷者更造密度各自增减以造太初歷乃選鄧平等及與民間治歷二十餘人唐都洛下閎與焉部分天部而閎運算轉歷其法以律起歷曰律容一籥積八十一寸則一日之分也故黃鍾紀先氣之謂律律法也莫不取法焉與鄧平所治同於是皆觀新星度日月行更以推算如閎平法名曰陽歷元朔月生隂歷朔而後月乃生乃詔遷用鄧平所造八十一分律歷罷廢尤疏逺者十七家復使淳于陵渠覆太初歷晦朔望皆最密日月如合璧五星如連珠遂用鄧平歷後二十七年元鳳三年也張壽王言黃帝調律歷漢元年以來用之今不調宜更歷之過也詔鮮于妄人詰問壽王不服請與麻光等雜候鈞校諸歷詔雜候上林清臺課歷疏密凡十一家壽王課踈逺壽王所治乃商歷漢元年不用黃帝調歷復候盡六年太初歷第一徐萬且徐禹治太初歷亦第一壽王季信治皇帝調歷皆疏闊壽王又妄言太初虛四分日之三去小餘七百五分以故隂陽不調竟以下吏歷之本驗在於天自漢歷初起盡元鳳六年三十六嵗而是非堅定蔡雍曰太初用丁丑唐一行亦曰元起丁丑推而上之皆不值甲寅東都李洪難張衡曰太初多一日冬至日值斗而云在牽牛踈闊不可復用獨衡以為密近邊詔曰太初至永平十一年百七十嵗進退餘分六十三治歷者不知處之推得十二度弦望不知初廢述者得切其說此武帝太初歷也孝成世劉向總六歷列是非作五紀論子歆䆒其微妙作三統歷及譜以說春秋推法要密其歷曰經元一以統始易太極之首也春秋二以目嵗易兩儀之中也於春每月書王易三極之統也於四時雖無事必書時月易四象之節也時月以建分至啓閉之分易八卦之位也象事成敗易吉凶之效也朝聘㑹盟易大業之本也易與春秋天人之道也以易窮則變之數為閠法以參天九天終數兩地十地終數為㑹數以天數二十五地數三十即易天地之數五十有五也為朔易之㑹是為㑹月以㑹數乘之周於朔旦冬至也章月至日同朔謂之章閠月是為統嵗三統為元嵗又曰夏數得四時之正也三代各據三統也黃鍾為天統始施於子半為天正林鍾為地統受於丑初而畢於辰也天地生物自十二月至三月畢為地正太簇為人統受於寅初而成於申為人功自正月至七月畢故歷數三統天以甲子夏正月朔地以甲辰商正月朔人以甲申周正月朔孟仲季迭用事為統首邊韶曰歆驗之春秋參以易道唐一行曰三統歷以己邜為堯商之嵗非也今三統歷自太初至開元朔後天三日數而上之以至周初先天之失蓋益甚焉班固謂其要密著于漢志且贊曰三統歷譜考步日月五星之度有意其推本之也然歆之歷追考春秋所書三十六食僅得其一故杜預考古今十歷以驗春秋乃知三統之最踈此劉歆三統歷也以上並西漢志後漢志曰自太初元年開三統歷施行百餘年歷稍後天朔先歷朔或在晦月建武中朱浮許淑等言歷不正當改天下初定未遑至永平中詔楊岑課弦望官歷皆失復令張盛景防鮑鄴等以四分法與岑課盛等所中多岑六事四分之衍始頗施行是時盛防未明歷元但用弦望而已至元和二年太初失天益逺章帝知其錯謬故召治歷編欣李梵詔改行四分歷而欣梵尤以為元首十一月當先大帝使賈逵問衛承李崇等以為月當先小勑無拘歷已班天元始起之月當小歷遂定永元中復以九道法候弦望無差安帝延光中亶誦言當用甲寅元梁豐言當復太初詔公卿施延等議太初過天日一度弦望失正元和改從四分雖密於太初復不正皆不可用甲寅元與天相應合圖䜟可施行李洪議四分歷起圗䜟最正不宜易甲寅元多失未可取正上納其言順帝漢安二年邊韶上言章帝以保乾圗三百年斗歷改憲之文就用四分以庚申為元無明文按弦望足以知之准百官議虞恭常欣等言建歷之本必先立元元正然後歷可成四分歷仲紀之元起文帝後元三年嵗在庚辰止四十五嵗嵗在乙未歷度與天相應不可復尚君更三聖光武創之孝明放之章帝行之其元則上統開闢其數則復古四分宜如甲寅奏可靈帝熹平中馮光陳晃言歷元不正蔡雍議曰太初歷行百八十九嵗章帝改從四分元用庚申今光晃以庚申為非甲寅為是及用四分以來考之行度密於太初是新元效於今日者也光晃以隂陽不和盜賊之興皆元之咎誠虛妄造勘劾之四分歷僅七十餘年而已謬蓋建歷元初専泥三百年斗建改憲之文是以斗分太多揆諸月行遂踈闊較之天度出三百年而餘一日積世不誤劉洪何承天能指言其失則踈太甚此東都四分歷也以上東漢志永光中宗紺上書正月十六日月當食而四分歷以二月詔行紺法熹平三年二十九年之中月先歷食者十六事於是差矣洪作七曜術時孫誠言繼法當改洪奏冝用誠術遂用洪等施行誠術晉志曰靈帝光和中洪考古今歷法言其進退之行知四分歷踈闊更以五百八十九為紀法一百四十五分為斗分而造乾象歷冬至日在斗二十二度以術追日月五星之行依易立數名為乾象歷又制日行月行黃道赤道之度法轉精密矣獻帝建安中鄭𤣥受其法又加注釋焉自黃初後改歷者皆斟酌乾象洪術遂為後代推步之表此劉洪乾象歷也宋何承天曰四分於天出三百年而盈一日積世不誤劉歆三統又踈濶方於四分六千餘年又益一日揚雄心惑其說采為六元班固謂之最密著于漢志魏文帝黃初中髙堂隆議歷數改革韓翊以為乾象减斗分太過後當先天造黃初歷以四千八百八十三為統法千二百五為斗分其後陳羣奏翊首建恐不審故以乾象互相參校更相是非無時而决徐嶽議劉洪以歷後天加太初元十二紀减十斗下分元起己丑實精密可長行今翊所造皆用洪法小益斗下分所錯無幾嶽課日月蝕五事乾象四逺黃初一近翊術自踈又楊偉言韓翊據劉洪之術知貴其術而棄其論至明帝景初元年楊偉改造景初歷欲以大吕之月為嵗首建子之月為歷初遂以建丑之月為正改其年三月為孟夏三年正月復用夏正晉姜岌曰古歷斗分强不可施於今乾象斗分細不可通於古景初雖得其中而日之所在乃差四度合朔于盈皆不及其次唐一行曰韓翊楊偉更造新術而皆依䜟緯三百嵗改憲之文考經之合朔多中校𫝊之南至則否說齊曰翊創於前偉繼於後咸遵劉洪之議未及洪之深妙蓋二歷皆寫子模毋終不過洪之術也蜀仍漢四分歷吳王蕃以劉洪術制儀象及論故吳用乾象歷此魏黃初景初歷也晋武帝因魏之景初歷改名泰始歷自泰始十年上元甲子朔夜半冬至日月五星始于星紀為正歷杜預又著春秋長歷及論武帝咸寧中李修卜顯依預論為術名乾度歷表上之時尚書史官以乾度與泰始參校古今注記乾度歷殊勝泰始歷上勝官歷四十五事今其術具存元帝渡江更以乾象五星法代楊偉歷穆帝永初八年正朔造通歷以甲子為上元說齊曰因其上元為開陽之始其說略見於晉史其私不用於日官莫可考也其后武帝太元中姜岌造三紀甲子元歷其略曰治歷之道必審日月之行然後可以上考天時下察地紀一失其本四時變移自羲皇暨漢魏各自制歷以求厥中考其疏密惟交㑹薄蝕可以驗之然書契所紀惟春秋著日食之變凡三十六其朔晦不知用何歷班固以為春秋用魯歷歷不正閏失其序魯以閏餘一之嵗為蔀首春秋置閏不與此蔀相符合歷序曰孔子為春秋之故退修商之故歷故其數事𫝊於後世則是春秋用商歷並晉志晉之歷有五曰泰始曰乾度曰乾象曰通歷曰三紀甲子然終晉之世止用泰始而餘歷不果施行南朝宋武帝永初元年改泰始歷為永初歷文帝元嘉二十二年何承天撰元嘉新歷刻漏改二十五箭以日食之衝知日所在又以中星驗之知堯時冬至日須女十度今在斗十七度又測景以校二至差三百有餘知今之南至日應在斗十三四度於是更立新法冬至徙上三日五時日之所在移四度又有遲疾前歷合朔月食不在朔望今晉以盈縮定其小餘以正朔望之日詔付外詳之太史令錢樂之等奏皆如承天所上推月頻三大頻二小此舊法殊為乖異謂冝仍舊詔可又元嘉十四年河西王牧犍遣使獻河西趙􅱿所撰甲寅元歷通鑑自宋迄齊相仍用元嘉歷梁武初興因循齊舊天監中因祖常進甲子元歷令太史候新舊二歷氣朔交㑹及七曜行度新歷密舊歷踈乃更用祖常所造甲子元歷又名大明歷至大同十年詔太史虞氏更造新歷以甲子為元未及施用而遭侯景之亂陳氏亦用祖仲之歷隋志南朝之歷曰永初曰元嘉曰甲寅元曰甲子元曰大同新歷然甲寅元大同二歷不用永初歷又復因晉四朝所用者元嘉甲子元二歷而已北朝元魏大武時崔浩上表言自秦燔書而漢以來妄造歷術者十餘家皆不得天道之正大誤四千小誤甚多不可言盡宜改誤歷術若以從天遊曰五寅元歷其後浩以國書之禍坐誅終魏之世惟用元始正光二歷而五寅元不果行也浩傳初魏入中原但得景初歷世祖克沮渠氏得趙􅱿元始歷時人以為密髙宗興安元年始行之世宗以元始歷寖踈命更造新歷至肅宗正光中崔光取張龍翔等九家所上歷候驗得失合為一歷以壬子為元應魏之水德命曰正光歷宏詞篇又有信都芳因祖常之法私撰靈憲歷算月頻大頻小食必有朔證據甚明每云何承天亦用此法而不能精靈憲若成百代無異議者書未成而卒其法亦莫考也及東魏興和元年以正元歷浸差命李業興更加修正以甲子為元號曰興光歷西魏入關尚行興光歷法北齊顯祖天保元年命宋景業造天保歷行之而重峻鄭元偉立議非之又與劉孝孫張孟賔二人同上甲寅元歷後周明帝武定元年始造周歷於是胡克遜庾季才及諸日者採祖常舊議通簡南北之術然周齊並時而歷差一日頗覩其繆故正光廢而天和作矣天和歷上於甄鸞其後大象年間太史馬顯等上景德元歷即行之時隋髙祖輔周欲以符命曜天下道士張賔知上意乃自言星歷有代謝之證乃更造新歷又名己巳元歷何承天法微加增損行於開皇之四年賔歷既行劉孝孫劉焯並稱其失所駁六條十七年張胃元論曰日影短長羣臣咸以胃元為密乃行胃元所造歷劉焯增修其書名曰皇極歷又名甲子元更有增損迄于義寧並隋志北朝之歷曰五寅元曰元始曰正光曰靈憲改元魏之歷也曰興光曰天保曰甲寅元此東魏髙齊之歷也曰天和曰景寅元曰己巳元曰皇極此後周隋氏之歷也言歷者不一行之數十年輒復差繆故南朝之歷則以何承天為宗而北朝則依趙􅱿祖冲之以為據此南北歷之大㫖也唐志曰唐終始二百九十餘年而歷八改初曰戊寅元厯蓋髙祖時傅仁均所造也用於武德之二年閲明年而月蝕比不驗明年詔祖孝孫等考定乃略去其尤疏闊者其後崔善與李淳風復更定其數十條淳風又言仁均减除稍多定朔遂差二刻其二曰麟德甲子元歷髙宗時李淳風作也戊寅歷推步既踈淳風乃增損劉焯皇極歷作是歷古歷有章蔀紀元有日分度參差不齊淳風為總法千三百四十以一之損益中晷術以考日至為本渾圖以測黃道當時以為密與太史令瞿曇羅所上經緯歷參行其三曰開元大衍歷僧一行所作也開元九年麟德歷書日蝕比不效詔一行作新歷推大衍數立術以應之較經史所書氣朔日名宿度可考者皆合本志曰自太初至麟德歷有二十三家與天雖近而未密也至一行密矣其倚數立法固無以易也後世雖有作者皆依放而已竊考其詳本於天地之二中始於冬至之中氣以晦朔定日月之㑹以日度正周天之數以卦氣定七十二候以中星正二十四氣其原皆出於易自春秋以來至開元十二年變更凡二十一事戊寅歷得十六麟德歷得二十三而開元得二十四用此例以校古今之薄蝕五星之變差而開元歷課皆第一然開元十二年七月朔十三年十二月朔於歷當蝕而皆不蝕杜預有云日月動物雖行度有大量不能不小有盈縮故有雖交㑹而不蝕者或有頻交而食者是也若因開元二蝕曲變交限而從則差者益多矣肅宗時山人韓頴言大衍或誤頴乃增損其術更名曰至德歷其四曰寶應五紀歷司天郭獻之等所上也代宗以至德歷不與天合詔獻之等復用麟德元紀更立嵗差增損遲疾交㑹及五星差數以寫大衍舊術上元七曜起赤道虛四度帝為製序題曰五紀歷其與大衍小異者九事而已其五曰建中正元歷司天徐承嗣所上也德宗時五紀歷氣朔加時稍後天推測星度與大衍差率頗異徐承嗣等雜麟德大衍之㫖治新歷上元七曜赤道虛四度建中四年歷成名曰正元其氣朔發斂日躔月離晷漏交㑹悉如五紀法其六曰元和觀象歷司天徐昻所上也憲宗元和二年用之然無章蔀之數至於察斂啓閉之候循用舊法測驗不合其七曰長慶宣明歷穆宗即位以為纍世纘緒必更歷紀乃詔日官改撰歷術名曰宣明上言七曜起赤道虛九度其氣朔發斂日躔月離皆因大衍舊術晷漏交㑹則稍增損之更立新度以步五星其八曰景福崇元歷邊岡所造也昭宗時宣明歷施行已久數亦漸差邊岡算改治新歷岡用算巧能馳騁反復于乘除間雖籌䇿便易而冥於本原用唐志修一行歷議曰易天數五地數五五位相得各有合所以神變化而行鬼神也天數始於一地數始於二合二始以位剛柔天數終於九地數終於十合二終以紀閏餘天數中於五地數中於六合二中以通律歷天有五音所以司辰也地有六律所以司辰也參伍相周䆒於六十聖人以此見天地之心也自五以降為五行生數自六以往為五材成數五十為大衍之母蓍數之變九六皆一乾坤之象也七八各三十六子之象也故爻數通六十是為天地之樞如環之無端蓋律歷之大紀也五代初用唐崇元歷而晉髙祖時馬重績始更造新歷不復推古上元甲子冬至七曜之㑹而起唐天寶十四載乙未為上元用正月雨水為氣首初唐建中時術者曹士薦始變古法以顯慶五年為上元雨水為嵗首號符天歷然世謂之小歷祗行於民間而重績乃用以為法遂施于朝廷賜號調元律行之五年輒差而復崇元歷周廣順中博士王處訥私撰明元歷于家民間又有萬分歷而蜀有永昌歷正象歷南唐有齊政歷五代之時大略如此而調元歷法既非古明元又藏其家萬分止行民間其法既不足紀而永昌正象齊政歷皆止用於其國今亦亡矣周世宗內修法度王朴通於歷數乃詔朴撰嵗餘朴奏曰自唐季以來亂日失天陛下考古道舉墜典敢不奉詔乃包萬象以為法齊七政以立元測圭箭以候氣審朓肭以定朔明九道以步月按疾遲以推星考黃道之邪正辨天勢之升降而交蝕詳焉乃以一篇步日一篇步月一篇步星以卦氣滅沒為下篇都四篇歷經一卷歷十一卷顯德三年七政細行歷一卷為欽天歷世宗嘉之詔司天監用之以明年朔旦為始顯德欽天歷行自前諸歷並廢用五代歷修王朴歷成王處訥謂之曰此歷可且行久則差矣既而果然宋興乃命處訥正之國朝隆興二年以王朴欽天歷時刻差繆命有司重加研核四年王處訥上新歷號應天歷此國朝歷法之始也太平興國中以應天歷置閏有差誤詔吳昭素等各造新歷而昭素歷頗精密賜號乾元此歷之一變也其後朔望有差真宗咸平四年史序王熙元獻新歷更名儀天此歷之再變也始熙元等上儀天歷趙昭逸請覆之而不從後二嵗而歷果差昭逸言其熒惑度數稍繆復推驗之果如其說後以星躔差仁宗天聖中司天監復上新歷賜名崇天晏殊為序此歷之三變也英宗初司天言崇天歷五星之行及諸氣節有差又以日蝕差詔周琮等各造新歷以范鎮詳定惟琮歷最密乃用之號明天歷此歷之四變也初右道言琮歷不可用至神宗熙寧中月食東方與歷不叶詔歷官雜候時有言衛朴通歷法召朴至朴言其失在置元不當詔朴改造朴以已學為之視明天歷朔减二刻歷成行之沈恬上之號奉天歷此歷之五變也九年奉天以日蝕不當詔集歷家考驗其後有司言奉天有後天之差有詔改造歷哲宗元祐六年歷成詔以觀天為名此歷之六變也徽宗崇寧三年命姚虞輔造歷名曰占天此歷之七變也未幾而蔡京令虞輔更造用帝受命之年即位之日元用庚辰日起己卯歷成而名以紀元此歷之八變也紀元立朔既差定臘亦舛日食不驗髙宗建炎三年乃改造統元歷元用甲子日起甲子蓋自古造歷多起朔旦甲子夜半冬至懲虞輔用受命年月日之失也此歷之九變也壽皇以統元日食有差於是改造乾道歷又改淳熙歷以四朝志及㑹要修主上踐祚歷號曰會元章蔀紀元攝提遷次黃龍移辰謂之嵗嵗首至也月首朔也至朔同日謂之章同在日首謂之蔀蔀終六旬謂之紀嵗朔又復謂之元是故日以實之月以閏之時以分之嵗以周之章以明之蔀以部之紀以記之元以原之極建于中道營于外東漢志總論歐陽公曰歷起於數數者自然之用其用無窮而無所不通以之於律於易皆可合也太初以律起數大衍以易起數然其要在於候天地氣以知四時寒暑而仰察天日月星之行運以相參合而已然四時寒暑無形而運於下天日月星有形而見於上二者常動而不息一有一無出入升降或遲或疾不相為謀其久而不能無差失者勢使之然也故為歷者其始未嘗不精密其後多踈而不合亦理之然也不合則屢變其法以求之自堯舜三代以來歷未嘗同也吾嘗因是而觀諸易矣革之象曰澤中有火革君子以治歷明時天下之事可革者多矣而聖人必以歷言者蓋事之在天下最易差者莫如歷而不可不修者莫如歷四朝志曰自古帝王必先考正歷象蓋將以前民用授人時也然以聖人之智其於天地之理隂陽五行之運日月星辰之紀考驗推測無有不盡其至立法倚數固宜歷萬世而不忒往往𫝊之稍久其應輒差何哉天地之數其妙而不可測者常在於眇忽毫釐之際而其象與氣推移嬴縮亦有時而不齊故雖聖智不能盡窮積以嵗月則歷之不能無差理固然也聖人不能使歷之無差嘗因其差而正之而歷家者流往往各持其說以相矛盾主其議者又從而以私意輕重之漢唐以來歷之所以數變而無一定之說亦有由矣大抵漢歷五變而太初最密唐歷八改而大衍最密宋朝初用欽天歷至太平興國中始更定歷名曰乾元至咸平復改曰儀天天聖曰崇天嘉祐曰明天熙寧曰奉元元祐曰觀天崇寧曰占天後復改曰紀元蓋自乾元以至紀元凡八變法雖不同至於前民用授人時其歸則一矣辨嵗差自漢改歷之初洛下閎謂八百年後當差一度然當時史官考諸中星知太初歷已差五度而閎不之察蓋古之為歷未知有嵗差之法其論冬至日月躔之宿一定不移而不知今嵗之日躔在冬至者視去嵗冬至之日纒常有不及之分至晉虞喜始覺其差遂立嵗差之法以五十年日退一度然失之太過宋何承天倍增其數以百年退一度又反不及至隋劉焯取二家中數以七十五年退一度較之二家之歷雖為差近亦未甚密故唐一行復以大衍之法推之乃得八十三年而差一度自唐以來歷家皆宗其法迄于今日又不若統天歷之為漸密也大衍立法謂日躔于一嵗之間行周天度未遍餘分而日已至焉每嵗若有不及之分故一度為三千四十分其所差之分一嵗三十有六又積而至於八十三年則差一度矣然猶未也考古驗今其實七十九年而退一度是故堯時之日月在虛一度自是而降漸退在女又過在斗自牽牛而退在斗二十六歷斗二十五迤邐而退則在建星矣知嵗差之法則知古今之中星不同可坐而判或者不知嵗差之法每以堯典校之月令至於今日不啻差一次矣求其說而未得遂謂節氣有初中之殊又謂古以午為中今以未為中是皆自欺之說固不足信蓋嘗考諸經史自堯以來至于宋朝冬至日躔各自不同然後知嵗差之法固不可廢大衍歷推帝堯縯紀之端日在虛一度則鳥火虛昴皆以仲月昏中合於堯典考諸堯時日之所在冬至在虛一度夏至在柳十四度春分在胃十二度秋分在氐十度至唐開元大衍歷冬至日在斗十度夏至在井十六度春分在奎七度秋分在軫十四度今之統元歷冬至在斗二度夏至在井十八度春分在奎初度秋分在軫七度自冬至之日黃道至斗為極南黃道極南之所出辰入申故日亦出辰入申又漸退而北行至於春分正當黃赤道之交出卯入酉故日亦出卯入酉進而至夏至黃道至井而極北黃道極北之所出寅入戍故日亦出寅入戍自夏至後日漸退而至於秋分復當黃赤道之交出卯入酉故日亦出卯入酉又退而至於冬至復如初極之於南矣日之出入也北而復南南而復北者黃道之勢使然也故太元經曰日一北而萬物生一南而萬物死正謂是矣月之行天也循黃道內外而東黃道內曰陽歷外曰隂歷與黃道赤道相去最逺者二十四度月道與黃道相去最逺者六度日行黃道月行九道青道二出黃道東朱道二出黃道南白道二出黃道西黑道二出黃道北其交必由於黃道而出入故兼言為九道也然此特言其大槩爾至五代王朴乃以黃道一周分為九節一節之中分為九道盡七十二道而斜正之勢無所隱遁明月之行道備於此矣日之行也舒月之行也速當其同度謂之合朔舒速先後近一逺三謂之弦相與為衡分天之中謂之望以速及舒光盡體伏謂之晦其循黃道左右而進也春分弦以東井亦猶日之夏至而極北也秋分弦於南斗亦猶日之冬至而極南也然不可與日同測景者以月有入隂陽歷之差也故周官有冬夏致日春秋致月者此也至五星之行其出入夫隂陽之歷大略與日月不異然其伏見遲留進退前後又各不同當以五緯推步法求之可也渾儀略說裴胄之問董生曰日常右轉星常左轉大凡不滿三萬年日行周二十八舍三百六十五度然必有差約八十年差一度自漢文帝三年甲子冬至日在斗二十二度至唐興元元年甲子冬至日在斗九度九百六十一年差十三度矣唐李肇國史補疑難西漢之歷莫善於太初東漢之歷莫善於四分由魏至隋莫善於皇極在唐則大衍為善在五代則欽天為善然其立法各有不同太初以八十一為日法四分則用蔀月九百四十皇極則用一千二百四十二大衍則用二千四十欽天則用七千二百其多寡之異何耶太初以三百八十五為斗分四分則用章法十九皇極則用萬二千一十有六大衍又以七百七十九為虛分欽天則一千八百八十四其增損又如此之異何耶泰初諸歷則日為一法度為一法至大衍又合日度為一法太初諸歷則餘分置於斗分至大衍則餘分置於虛分此又何耶太初之歷本於鍾律以八十一分為統母其數起於黃鍾之籥而終漢之歷號為最詳開元之歷求乎大衍以四十九分為算而終唐之世號為最密是非所祖之多門而為數則同也黃帝造歷元起辛卯髙陽氏起乙卯虞舜用戊午夏商周以三統改正朔是非立元之多門為數則同也漢靈帝時劉洪作乾象歷以五百八十九為紀四百四十五為斗分魏文帝時韓翊造黃初歷以四千八百八十三為紀法千二百五為斗分漢之歷或八十一為法魯之歷或以九百四十為算是非倚數之多門而為數則一也若夫孝昭清臺之候課諸歷法號為得宜而張壽王書乃以隂陽不調為更歷之過章帝元和之詔用四分歷其法頗密而馮光陳晃之論乃以為不合於圖䜟此皆不經之言也羣書考索卷五十四
