body:
  text: 羣書考索卷五十一宋章如愚撰樂門樂器類鼓荀卿曰鼓象地堯有敢諫之鼓禹以五聲聽治曰教寡人以道者擊鼓陳禮書曰考之於禮夏后氏尚黑商尚白周尚赤則三代鼓色可知矣左傳曰分唐叔以密須之鼓上林賦建靈鼉之鼓禮書曰鼓其聲象雷其大象天其樂象君故凡鼓瑟鼓琴鼓鐘鼓簧鼓缶皆謂之鼓以五音非鼓不節也土鼓簣桴記曰夫禮之初始諸飲食蕢桴土鼓又曰土鼓蕢桴葦籥伊耆氏之樂周禮籥章春擊土鼓吹豳詩以逆暑迎寒祈年吹豳雅擊土鼓以樂田畯祭蠟吹豳頌擊土鼓以息老物蓋樂之作本於籥始於土鼓而周家王業之興本於豳逆暑逆寒祈年皆本始民事蠟息老物則息使復本反始而已足鼓眀堂位曰夏后氏之鼓足鄭康成曰足謂四足楹鼓商頌曰置我鞉鼓眀堂位曰商之楹鼓禮書曰楹鼓蓋為一楹而四􅏢焉貫鼓於其端周禮大僕建路鼓于大寢之門外儀禮大射建鼓在阼階西南即楹鼓也魏晉以後復商制立之謂之建鼓晉鼓考工記韗人為臯陶長六尺有六寸左右端廣六寸中尺厚三寸穹者三之一上三正先儒謂晉鼓其説是也鼓人以晉鼓鼓金奏大司馬中春教振旅軍將執晉鼓春秋吳與越戰載常建鼓韋昭曰將軍執晉鼓晉鼓謂為楹而植之蓋晉鼓建之於軍猶路鼓建之於寢非此則不建矣禮書靁鼓靈鼓路鼓鼓人曰靁鼓鼓神祀靈鼓鼓社祭路鼓鼓鬼享大司樂靁鼓靁鼗靈鼓靈鼗路鼓路鼗鄭康成曰靁鼓八面靈鼓六面路鼓四面鄭司農曰靁鼓六面靈鼓四面路鼓兩面蓋雷天聲也雷鼓以鼓神祀而救日月亦天事也鼓人救日月則詔王鼓先儒以為鼓用靁鼓是也靈鼓鼓社而攻猛獸亦地事也冥氏攻猛獸以靈鼓是也路鼓鼓鬼享而田獵達窮者與遽令亦用之司馬振旅王執路鼓則太僕建路鼓于大寢門之外是也鼖鼓韗人鼓長八尺鼓四尺四尺鼓面也中圍加三之一謂之鼖鼓鼓人鼖鼓鼓軍事司馬中春振旅諸侯執鼖鼓鏄師凡軍之夜三鼜皆鼓之蓋鼖鼓之於軍晝以作衆夜以警之書言鼖鼓在西序詩言鼖鼓維鏞此則鼖鼓與鼓軍事者異矣是以周人尚之提鼓大司馬教振旅師帥執提鄭氏曰馬上鼓有曲木提持鼓立馬髦上者故謂之提鼛鼓韗人為臯鼓長尋有四尺鼓四尺倨句磬折則臯鼓中髙而兩端下矣鼓人曰以鼛鼓鼓役事春秋傳曰魯人之臯蓋臯緩也役事以弗亟為義故以臯鼓節之古者上之使下以仁常欲緩而不迫故名鼓以臯下之事上以義常欲敏而有功故以鼓節之而弗止詩曰鼛鼓弗勝鼗鼓世紀曰帝嚳命倕作鞸先儒謂小鼓有柄曰鞀大鞀謂鞞周官小師掌教鼓鼗瞽矇掌播鼗蓋鼗之播也有瞽矇者有視瞭者而其制鄭氏以為如鼓而小持其柄搖之旁耳自擊是也書曰下管鼗鼓周禮圖曰鼗所以節樂賔至乃作樂故知賔至搖之以作樂也鼙周禮太師大祭祀下管播樂器令奏鼓朄小師大祭祀下管擊應鼓小祭祀小樂事鼓朄鄭康成曰應鼙也應與朄及朔皆小鼓也禮書引爾雅曰小鼓謂之應然則大祭祀皆鼓朄及應大射有朔鼙應鼙詩又以應配朄則朔鼙乃朄鼓也拊周官太師曰大祭祀帥瞽登歌令奏擊拊鄭康成曰拊形如鼓以韋為之著之以粳擊拊鼓乃歌也書曰搏拊琴瑟以詠注曰皆以韋為之雅周禮笙師掌教舂牘應雅以教裓樂鄭司農云雅狀如漆筒而弇口大二圍長五尺六寸以羊韋􅀈之有兩紐鄭康成曰雅中有椎笙師教以舂雅者謂以築地樂記曰訊疾以雅孔頴達曰訊疾以奏此樂器以應之禮書曰樂者正也賔出而舂雅欲其醉而不失正也工舞而奏雅欲其訊疾而不失正也塤周禮小師掌教塤瞽矇掌播塤爾雅曰大塤謂之嘂廣雅云鋭象稱錘以土為之六孔詩何人斯有曰伯氏吹塤仲氏吹篪缶説文曰瓦器也爾雅曰盎謂之缶易曰不鼓缶而歌詩曰坎其擊缶澠池之會秦王謂趙王擊缶李斯曰擊甕扣缶真秦聲也蓋缶古之樂器秦尚之禮書琴琴操曰伏羲作琴世本曰神農作琴樂記曰舜作五絃之琴以歌南風眀堂位曰大琴大瑟中琴小瑟四代之樂器也樂書曰琴長八尺一寸正度也廣雅曰琴長三尺六寸六分象三百六十有六日絃象五行大絃為君寬和而溫小絃為臣清亷不亂文王武王加二絃以合君臣之恩通典謂伏羲作琴以修身理性白虎通曰琴禁也禁止於雅以正人心也通典自宋朝髙宗中興易以干盾之制示不忘武備也然而今之琴者其髙宗之制歟以中興小厯考爾雅曰大琴謂之離二十七絃齊桓曰號鍾楚莊曰繞梁相如曰緑綺伯喈曰焦尾通典王文中鼓琴有釣者曰美哉琴心也傷而和怨而靜在山澤而有廊廟之志子驟而歌南風釣者曰道能利生民功足濟天下其有虞氏之心乎不如舜自鼓也聲存而操變矣後漢蔡雍益琴為九絃崔豹古今注宋朝太宗亦益琴為九絃曰君臣文武禮樂正民心命宋文濟取琴中七絃撫之而已長編琴之為器古堂上樂也堂上之樂有玉磬有琴有瑟而堂下之樂有柷敔鼗鼓晉鼓鎛鐘特鐘編鐘編磬笙竽塤籥簫篪笛管牘雅是為雅樂之器今皆不用故時俗寡得而聞維琴笙笛管形制僅存而笙與笛管又流於胡部惟琴得用於士君子蓋古之士常自御琴瑟而不專於樂工之事故其傳積久而用特隆然時變樂隳殊失其法太古之琴七尺有二寸而一絃後世聖人裁為八尺六寸而虞舜益之以五絃至周武王復增變宮變徴而為七其巨絃寓名黃鐘而推當於宮次太蔟商次姑洗角次㽔賔變徵次林鐘正徵次南呂羽而最後為應鍾變宮三分其絃之長以備上中下三十六律之聲總而計之得二百五十二聲當其用於均操抑援之次而律呂旋相之不同亦皆率是七聲以為法而不可雜依於一律以為聲而不可説今之為琴一切異古長及尋仞短隱肘袂而無定數驟易二絃使叶中呂而為髙角去其變宮變徴而增少宮少商或一操而變用衆律或一引而涉歷於數徽其度曲之無制流聲之不依永徒煩手搖音播美聽而已吳儀琴堂序見延平志瑟世本曰庖犧氏作瑟五十絃黃帝使素女鼓之哀不自勝乃破為二十五絃具二鈞聲樂記曰清廟之瑟朱絃而疏越尚書傳曰大琴敬絃逹越大瑟朱絃達越蓋越底孔也疏達通之也朱絃練而朱之也蓋絲不練則徑而聲清練則熟而聲濁孔小則聲急大則聲遲故疏越以遲其聲然後不至於太急練絲以濁其聲然後不失之太清舊圖雅瑟長八尺一寸廣一尺八寸二十三絃其常用者十九絃其餘四絃謂之畨畨嬴也頌瑟長七尺二寸廣尺八寸二十五絃盡用之此蓋有所謂傳然也周禮小師掌教琴瑟大司樂有雲和之琴瑟祀天空桑之琴瑟祀地龍門之琴瑟宗廟後世髙漸離之擊築似筝細頂蒙恬之造筝漢之琵琶箜篌晉之阮咸此皆仿琵琶而為之歟禮書柷敔止籈樂記曰聖人作為椌楬書曰戛擊鳴球合止柷敔詩曰鞉磬柷圉荀卿曰鞉柷拊椌楬似萬物眀堂位曰揩擊先儒皆謂之柷敔也爾雅曰所以鼓柷謂之止所以鼓敔謂之籈先儒謂柷如漆筒方二尺四寸深一尺八寸中有椎柄連底撞之令左右擊止者其椎名也敔似伏虎背上有二十七鉏鋙刻以木長尺通典曰碎竹以擊其首而逆戛之以止樂本朝依唐制以竹為籈長二尺四寸破一端為十二莖樂將止先擊其首次三戛之此以漢大豫樂言之蓋鼓柷謂之止欲戒止於其早也鼓敔謂之籈欲修潔於其後也柷方二尺四寸陰也敔二十七齟齬陽也樂作陽也以陰數成之樂止陰也以陽數成之固天地自然之理也聲之所出以虛為本桐虛而不實故為琴瑟粳虛而不實故為搏拊以虛然後可以設控以空然後可擊及其止則歸於實焉故敔為伏虎之形則實而已牘應笙師掌教舂牘應雅以教祴樂鄭司農曰牘以竹大五六寸長七尺短者一二尺虛中筒無底其端有兩空髹畫以兩手築地應長六尺五寸其中有椎通典曰舂杵亦謂之頌相相助也以節樂也或謂梁孝王以築睢陽城擊鼓為下杵之節睢陽操用舂牘後代因之笙竽禮記曰女媧之笙簧世本曰隨作笙通典曰未知何代人也禮曰三笙一和而成聲周禮笙師掌教吹竽笙先儒謂笙列管匏中施簧管端大者十九簧小者十二簧竽三十六簧笙長四尺竽長四尺二寸簧金鍱為之後世雅樂和皆十七簧外設二管不定置謂之義管每變均易調則更用焉由是定置二管於匏中為十九簧書曰笙鏞以間笙師祭祀共笙鐘之樂鄭氏曰與鐘相應之笙韓非曰笙者五聲之長故竽先則鐘瑟皆隨竽唱則諸樂和蓋後世之樂然也簫小師掌教簫管笙師掌教吹簫篪書曰簫韶九成詩曰簫管備舉禮從以簫管書於簫言樂成詩於簫言備舉禮凡言簫多在笙竽之後則簫奏益後於笙矣簫竹為之其狀如鳯翼其聲如鳯聲爾雅曰大簫謂之言小者謂之筊郭璞曰言二十三管長四尺筊十六管長尺二寸風俗通曰簫十管長二尺易説長尺四寸舊圖雅簫長一尺四寸二十四彄頌簫長尺二寸十彄博雅云簫大者二十四管無底小者十六管有底蔡雍曰簫編竹有底長則濁短則清以密窒其底而增損之則和蓋皆述其傳然也漢元帝云吹洞簫謂之洞簫者蓋有底爾篪周禮笙師掌教吹篪爾雅大篪謂之沂郭璞曰篪以竹為之長尺四寸圍三寸一孔上出寸三分名翹橫吹之小者尺二寸廣雅曰八孔鄭司農曰七孔不可考也後世有胡篪沈約曰胡篪出於胡吹非雅樂也笛周禮笙師掌教笛杜子春曰竹笛五孔馬融笛賦稱此器出於羌笛舊四孔京房加一孔以備五音風俗通曰漢武帝時丘仲作笛長尺四寸是漢以前固有笛矣但尺四寸者仲所作耳後世有長笛有短笛有義觜笛梁橫吹曲曰下馬吹橫笛有義觜笛如橫笛而加觜西涼樂也有七孔者有八孔者皆適一時之所造也籥眀堂位曰土鼓葦籥伊耆氏之樂也周禮笙師掌教籥籥師掌教國子舞羽吹籥籥章掌擊土鼓吹豳籥蓋籥三孔主中聲而上下之律呂於是乎生命之曰籥以黍籥之法在是故也詩曰左手執籥春秋仲笛卒壬午猶繹萬入去籥公羊曰去其有聲者置其無聲者則吹籥而舞可知爾雅曰大籥謂之産其中謂之仲其小謂之箹廣雅曰籥七孔毛萇曰籥六孔鄭康成曰籥如笛三孔郭璞曰籥三孔而短當從郭鄭之説禮書管下管鼗鼓周禮小師掌教籥管瞽矇掌教簫管笙師掌吹笙管大司樂圜丘孤竹管方丘孫竹管宗廟陰竹管燕禮大射皆下管新宮禮記曰下管象詩曰磬管鏘鏘簫管備舉爾雅曰大管謂之簥其中謂之篞小者謂之篎鄭司農曰管如篪六孔説文亦曰管六孔十二月之音鄭康成曰管如笛而小併兩而吹之廣雅云長尺圍寸八孔無底簧詩曰吹笙鼓簧又左執簧又曰並坐鼓簧又曰巧言如簧記曰女媧之笙簧觀此宜若簧非笙也先儒以為笙中之簧其説拘矣漢武內傳鼓振靈之簧神仙傳王遙有五古竹簧然經無眀説豈古之遺制歟鍾眀堂位曰垂之和鍾世本曰垂作鍾傳曰伏羲之孫鼓筵始為鍾又曰黃帝命伶倫與營援作十二鍾考工記六分其金而錫居一謂之鍾鼎之齊鳬氏為鍾兩欒謂之銑鍾口角也于鼓鉦舞四者鍾體也甬衡二者鍾柄也旋幹柄上環也以蟲為飾篆枚景在于鼓鉦舞之間據所擊之處也樂記曰鍾聲鏗鏗以立號號以立橫國語曰景王將鑄無射為之大林穆公曰先王之制鍾也大不出鈞重不過石律度量衡於是乎生小大器用於是乎出伶州鳩曰樂器重者從細輕者從大是以金尚羽石尚角又律所以立均出度也古之神瞽考中聲而量之以制度律均鍾左傳伶州鳩曰鍾音之器也小者不窕大者不摦則和於物今鍾摦矣爾雅曰大鍾謂之鏞其中謂之剽小謂之剗晉時剡縣氏於田中得一鍾長三寸口徑四寸曰棧唐時岑陽耕者得古鍾髙尺餘揚牧扣之曰此姑洗角也既劀拭有刻在兩欒果然晉克潞之役銘于景鍾魯季武子所得於齊之兵作林鍾而銘魯功磬爾雅曰大磬謂之毊郭璞曰形似犂錧以玉石為之眀堂位曰叔之離磬禮書曰蓋特垂之磬也大戴禮曰垂一磬而尚拊則堂上亦有特垂之磬矣世本曰無句作磬禮書曰句與叔非二人皇氏謂無句叔之别名其説或然考工記磬氏為磬倨句一短有半禮書曰磬方中中矩則倨句一短有半觸其絃也其博為一一律也股為二後長二律也鼓為三前長三律也禮書曰股非所擊也短而博鼓其所擊也長而狹鄭司農云股磬之上大者鼓其下小者康成曰股外面鼓內面則擊者為前而在內不擊者為後而在外內者在下外者在上其小大長短雖殊而其厚均也黃鍾之磬股鼓皆厚二寸則餘推此可知矣編鍾磬周禮磬師掌教擊編鍾鄭氏曰磬亦編而鍾言編者蓋鍾有不編者小胥正宮垂之位王宮垂鄭司農曰四面垂也諸侯軒垂鄭康成曰去南面辟王也卿大夫判垂鄭康成曰判垂左右之合又空北面也士特垂鄭康成曰垂於東方或於階間而已凡垂鍾磬半為堵全為肆鄭注曰鍾磬者編垂之二八十六枚而在簴謂之堵鍾一堵磬一堵謂之肆半之者謂諸侯之卿大夫士也賈公彥疏曰夫舞所以節八音而行八風故以為數樂垂之法取數於此又倍之為十六也薛圖曰天子八堵四肆諸侯六堵三肆卿大夫四堵二肆士三堵一肆諸侯之卿大夫半天子之卿大夫西垂鍾東垂磬士半天子之士垂磬而已漢樂歌云髙張四垂神來燕享謂宮垂也晉及宋齊垂鍾磬大淮相似皆十六架黃鍾之宮其方北面編磬起西其東南編鍾隋參用儀禮及尚書太傅為宮垂陳布之法唐造蓬萊宮成充庭七十架編鍾在東編磬在西開元中太樂曲制凡天子宮垂軒垂之樂鎛鍾十二編鍾十二編磬十二凡三十六簴簨簴詩曰簴業維樅又曰設業設簴崇牙樹羽眀堂位曰夏后氏之龍簨簴鬻子曰大禹為銘於筍簴商之崇牙周之璧翣周官典庸器祭祀帥其屬而設筍簴考工記曰梓人為筍簴陳禮書曰植者為簴橫者為筍筍上有崇牙詩注曰崇牙上飾卷然可垂也簴上設業詩注大板也所以飾筍孫紘曰刻之捷業如鋸齒業上植羽而有端有璧翣鍾簴飾以裸屬周禮曰擊其所垂由其簴鳴裸屬聲大而宏有力而不能走羽屬聲清揚而逺聞無力而輕筍飾以鱗小首而長搏身而鴻若是者謂之鱗屬以為筍堂上堂下樂書曰戛擊鳴球摶拊琴瑟以詠下管鼗鼓合止柷敔笙鏞以間而繼之以擊石拊石戛擊柷敔也鳴球玉磬也搏拊鼓類也是舜之時堂上有戛擊堂下有柷敔堂上有鳴球堂下有石磬堂上有摶拊堂下有鼗鼓也詩言設業設簴崇牙植羽鞉磬柷敔簫管備舉皆在周之庭儀禮樂簴皆在兩階之間此堂下之樂也商頌曰鞉鼓淵淵嘒嘒管聲既和且平依我磬聲以言堂下之管鼓依我堂上之磬聲也禮書金錞鼓人以金錞和鼓注云錞錞于也圓如碓頭大上小下樂作鳴之與鼓相和金鐃鼓人以金鐃止鼓注云鐃如鈴無舌有柄執而鳴之以止擊鼓司馬職曰鳴鐃且郤卒長執之百人長也樂記曰復亂以武復謂反復也亂猶理也武謂金鐃也謂舞畢之時舞人必反復鳴此金鐃而治理之欲退之時亦擊此金鐃而退之金鐸鼓人以金鐸通鼓注云大鈴也振之以通鼓夏官司馬執鐸謂兩司馬振之以通鼓兩司馬者二十五人之長也樂記曰天子夾振之金鐲鼓人職曰以金鐲節鼓注云鐲鉦也形如小鍾軍行則鳴之以為鼓節公司馬執之公司馬伍長也五聲宮商角徵羽也協五行則金木水火土也角為木商為金徵為火羽為水宮為土象五事則視聽言貌思也角為貌商為言徵為視羽為聽宮為思配五常則仁義禮智信也角為仁商為義徵為禮羽為智宮為信樂記曰宮為君商為臣角為民徵為事羽為物又月令孟春之月其音角角觸也物觸而出戴芒角也故主春孟夏其音徵徵祉也物盛大而繁祉故主夏中央土其音宮宮中也居中央為四聲綱也孟秋其音商商之為言章也物成熟可章度也故主秋孟冬其音羽羽宇也物聚藏宇覆之地故主冬並見前漢志其五聲之相生也黃鍾為宮而管九寸九之則其數八十一三分宮去一而下生徵其數五十四六九三分徴益一而上生商其數七十二八九三分商去一而下生羽其數四十八六八三分羽益一而上生角其數六十四八八上生下者其數損下生上者其數益數多者濁數少者清濁者大清者細大不踰宮細不踰羽羽徴之聲又清於角史記曰宮動脾而和正聖商動肺而和正義角動肝而和正仁徵動心而和正智羽動腎而和正禮聞宮音使人溫舒而廣大聞商音使人方正而好義聞角音使人惻隱而愛人聞徵音使人樂善而好施聞羽音使人整齊而好禮八音周禮太師曰金石土革絲竹匏木也通典曰八音八卦之音卦各有風謂之八風一曰乾之音石其風不周乾主石磬音也二曰坎之音革其風廣莫坎主皮革鼓也三曰艮之音匏其風融艮主於匏笙竽也四曰震之音竹其風眀庶震主竹簫篪也五曰巽之音木其風清眀巽主木柷敔也六曰離之音絲其風景離主絲琴瑟也七曰坤之音土其風涼坤主土塤音也八曰兊之音金其風閶闔兊主金鍾音也其配八方則東為震西為兑南為離北為坎東南為巽東北為艮西北為乾西南為坤是也書曰八音在治忽又曰八音克諧無相奪倫國語曰周景王將鑄無射而為之大林問之於伶州鳩對曰琴瑟尚宮鍾尚羽石尚角匏竹利制樂器重者從細重金石輕者從大輕瓦絲是以金尚羽石尚角絲尚宮匏尚議革木一聲又曰金石以動之絲竹以行之匏以宣之瓦以贊之革木以節之如是而鑄之金摩之石繫之絲木越之匏竹節之鼓而行之以遂八風禮書曰金石革絲土木匏竹而天下之音備可以和神人可以作動物非深於樂者其能究出乎蓋樂器重者從細輕者從大大不踰宮細不踰羽大細之中則角而已金重者也故尚羽瓦絲輕者也故尚宮石輕於金而重於瓦絲故尚角匏竹無大細之殊故尚議革木無清濁之變故一聲此八音所以直八卦而遂八風也樂門樂舞類舞詩序曰詠歌之不足不知手之舞之足之蹈之此固舞之所由生也虞書帝乃誕敷文德舞干羽于兩階陳禮書文舞于東階武舞于西階武舞常在先文舞在後何則書言舞干羽則先干而後羽樂記言干戚羽旄謂之樂則先干戚而後羽旄眀堂位祭統皆言朱干玉戚冕而舞大武皮辨素積裼而舞大夏則先大武而後大夏孔安國以干羽為文舞失之矣周禮大司樂以樂舞教國子舞雲門大卷黃帝曰雲門九大卷大咸堯樂也又名咸池又名大章大㲈舜樂也大夏禹樂大濩湯樂也大武武王樂也所以存六代之樂舞也樂記曰武始而北出象觀兵孟津再成而滅商三成而南誅紂已而南也四成而南國是疆有南國疆界也五成而分周公左召公右分陜而治也六成復綴以崇天子説此曰此武王之舞也舞有文武舞師教兵舞鄭康成曰兵謂干戚也帥而舞山川之祭祀教帗舞鄭康成曰帗列五采繒而為之帥而舞社稷之祭祀教羽舞帥而舞四方之祭祀教皇舞皇析五采羽為之帥而舞旱暵之事大抵文舞以羽籥武舞以干戚周禮圖曰文雖用羽籥蓋亦有干書所謂舞干羽而傳者以為舞文舞是也武雖用干戚蓋亦有羽詩所謂方將萬舞而傳者以為干羽為萬舞也蓋籥舞以羽覆干但干不勝羽耳萬舞以干載羽羽不勝干耳此説恐未然舞有大小大司樂以六舞教國子大舞也見前樂師教國子小舞帗羽舞皇舞旄舞旄舞氂牛尾也傳曰葛天氏之樂三人搖牛尾而歌八闋其流風歟干舞人舞人舞手舞也小舞也大抵大舞有其章而無其儀小舞有其儀而無其章詩所謂籥舞者即文舞也所謂萬舞者即武舞也何休釋公羊萬舞之説以為象武王伐紂楚令尹子元振萬夫人曰先君以是舞習戎備又有所謂夷舞者周禮韎師掌教韎樂祭祀則帥其屬而舞之鄭康成注曰舞之以東夷之舞旄人掌教舞夷樂鄭康成注曰夷樂四夷之樂亦皆有聲歌及舞通典引五經通義曰東夷之樂持盾舞助時生也南夷之樂持羽舞助時養也西夷之樂持武舞助時殺也北夷之樂持干舞助時藏也疏曰門外舞之所謂野舞者旄人教舞散舞曰散樂野人為樂之善者疏曰野人不在樂官之員內春秋吳季子適魯觀樂見舞象簫南籥者曰美哉猶有憾見舞大武者曰美哉周之盛也見舞韶濩者曰聖人之宏也而猶有慙德聖人之難也見舞大夏者曰美哉勤而不德非禹其誰能修之見舞韶簫者曰德至矣哉大矣如天之無不幬也如地之無無不載也周之六舞舞師之職掌教國子小舞凡舞有帗舞有羽舞有皇舞有旄舞有干舞有人舞鄭司農云帗舞者全羽羽舞者析羽皇舞者以羽冒覆頭上衣飾翡翠之羽旄舞者氂牛之尾干舞者兵舞人舞者手舞也社稷以帗宗廟以羽四方以皇辟雍以旄兵事以干星辰以人鄭玄曰帗析五采繒今靈星舞干持之是也皇雜五采羽如鳯皇色持以舞人舞無所執以手袖為威儀四方以羽宗廟以人山川以干旱暵以皇西漢武德文始五行之舞昭德文始四時五行之舞盛德文始四時五行之舞高祖廟奏武德文始五行之舞孝文廟奏昭德文始四時五行之舞孝武廟奏盛德文始四時五行之舞武德舞者高祖四年所作以象天下樂已行武以除亂也文德舞者本舜韶舞也高祖六年更名曰文始以示不相襲也五行舞者本周舞秦始皇二十六年更名五行也四時舞者孝文所作以眀示天下之安和也蓋樂已所自作眀有制也樂先之樂明有法也孝景采武德舞以為昭德以尊太宗廟孝宣采昭德舞以為盛德以尊世宗廟諸帝廟皆常奏文始四時五行舞云唐三大舞唐之制樂凡三大舞七德舞者本名秦王破陳樂太宗為秦王破劉武周軍中相與作之及即位宴會必奏謂侍臣曰雖發揚蹈厲異乎文容然功業由之被於樂章示不忘本也乃製舞圖左圓右方先偏後伍交錯屈伸以象魚麗鵝鸛命呂才以圖教樂工魏徴等更製歌辭名曰七德舞初成觀者扼腕踊躍諸將上夀羣臣稱萬歲蠻夷在庭者請相率以舞自是元日冬至朝會慶賀與九功舞同奏之九功舞者本名功成慶善樂太宗生於慶善宮貞觀六年幸之宴從臣賞賜閭里同漢沛縣帝歡甚賦詩起居郎呂才被之管絃名曰功成慶善樂以童兒六十四人舞之號曰九功舞進蹈安徐以象文德麟德六年詔郊廟享宴奏文舞用之上元舞者髙宗所作也舞者依畫雲五色以象元氣其樂有上元二儀三才四時五行六律七政八風九宮十州得一慶雲之曲大祠享皆用之宋朝文武二舞建隆元年有司上言請改一代樂名享太廟四室酌獻迎爼送神樂章詔竇儼撰進四月儼上新定二舞十二樂曲名并樂章文舞為文德之舞武舞為武德之舞至乾德四年和峴取尚書玄德升聞之義請改文舞為玄德升聞之舞取尚書天下大定之義改武舞為天下大定之舞淳化二年和懞上言兄峴乾德中約唐志故事請改殿庭二舞之名舞有六變之象每變各有樂章歌詠太祖功業今覩來歲正會之儀登歌五瑞之曲已從改制則文武二舞亦當有樂名案周易有化成天下之辭漢書有威加海內之歌望改舊玄德升聞之舞為化成天下之舞天下大定為威加海內之舞一變象登臺講武二變象漳泉奉土三變象杭越來朝四變象克殄并汾五變象肅青銀夏六變象兵還振旅每變樂章各一首詔可祥符五年詔玄德升聞之舞為威德升聞大仁之舞嘉祐八年八月學士院請仁宗廟室酌獻所用舞名曰大仁之舞并上樂章詔恭依行之陸佃論羽舞干舞籥舞萬舞大舞文有羽籥武有干戚所謂左手執籥右手秉翟記曰朱干玉戚冕而舞大武是小舞文有羽以為儀而已武有干以為扞而已所謂教國子小舞羽舞干舞是也大舞文曰籥舞蓋武所以毒天下則文所以和天下武曰萬舞蓋文以德勝武以數勝戰功曰多是也干舞干也羽舞鷺羽也至於籥舞用翟萬舞朱干設錫是之謂大然而大舞文雖用羽籥蓋亦有干故書舞干羽于兩階而傳以為武舞文舞也武雖用戚蓋亦有羽故詩方將萬舞而傳以為以干羽為萬舞也又春秋考仲子之宮初獻六羽左氏亦云將萬焉公問羽數於衆仲然則以籥舞用干萬舞用羽其制奈何曰萬舞以干載羽羽不勝干籥舞以羽覆干干不勝羽詩曰蒙伐有苑苑討羽也伐中干也秦人蒙干以羽以討西戎則干或載羽舊矣若夫大夏文武中也故有干戚亦有羽籥故曰夏籥序興又曰朱干玉戚以舞大夏陸佃禮象圖傳曰夫舞者所以節八音而行八風也舞之始也發於其所樂之極其用也常在諸樂之後是以周官樂師樂成告備然後詔末瞽臯舞春秋之時季札歷觀樂歌然後及於象武韶夏之舞在詩序則舞蹈後和於詠歌在樂記則動容後于志詠聲也在孟子則舞蹈後於樂之實也以舞者乃樂之成也禮書舞數按左傳載衆仲之辭謂節八音而行八風者古之所謂舞也天子用八諸侯用六大夫四士二者是言佾之數而不言舞之佾也杜元凱釋傳之義謂自八而下等而降之不殺其舞佾之數而殺其佾中之人且八音克諧然後樂成八人比列然後音節必如元凱之義則士之所舞凡四人焉其何以應八音之節哉善乎江左傅崇引服虔之議曰天子八八諸侯六八大夫四八士二八其等殺甚眀其文義甚當春秋之時鄭伯內晉悼公其樂二八魏降能和諸戎晉侯錫以二八之樂此其證也由是而言則杜預之言非矣拔尢策舞衣書曰胤之舞衣孔安國曰胤國所為舞者之衣皆中法然古者舞大夏則皮辨素積舞大武則冕服其他無所經見特漢舞者之衣法五方謂之五行之舞蓋亦古之遺制歟陳禮書樂歌類歌呂不韋春秋曰葛天氏之樂三人摻牛尾投足以歌八闋一曰戴氏二曰元鳥三曰遂草木四曰奮五投五曰敬天常六曰達帝功七曰依地德八曰總萬方崔豹古今注云黃帝使岐伯以短簫樂歌建武揚盛德戰士也即周禮軍大捷則令凱歌者也虞書之九歌君臣之賡歌帝王世紀載舜南風之歌南風之時兮可以阜吾民之財兮南風之薰兮可以解吾民之慍兮夏塗山之女作歌曰候人兮猗實始作為南音又有五子之歌其後孔甲有破斧之歌周禮春官太師大祭祀帥瞽登歌小師掌教弦歌瞽矇掌九德六詩之歌樂師帥學士而歌徹大司樂歌大呂以祀天神歌應鍾以祭地示歌南呂以祀四望歌函鍾以祀山川歌小呂夾鍾以享先眀堂位禘祀周公登歌清廟下管象文王世子天子飬老登歌清廟下管象祭統大嘗禘升歌清廟下管象康公賜魯也仲尼燕居兩君相見升歌清廟然則祭祀飬老諸侯相見魯之嘗禘皆升歌鄉飲燕禮皆間歌春秋之時諸侯相見必以詩歌而歌不類者不敢當也士大夫間亦各歌詩以相樂至於軍旅之間詩歌不廢樂記師乙曰愛者宜歌商溫良能斷者宜歌齊夫歌者直已而陳德也寬而靜柔而正者宜歌頌廣大而靜疏達而信者宜歌大雅恭儉而好禮者宜歌小雅正直而靜亷而謙者宜歌風左傳吳季札聘魯請觀周樂使工為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌邶鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之德如是是其衛風乎為之歌王曰美哉思而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也哉表東海者其太公乎國未可量也為之歌豳曰美哉蕩蕩乎樂而不淫其周公之東乎為之歌秦此乃未刪已前詩與今次第不同孔子刪詩大段移易曰此之謂夏聲夫能夏則大大之至也其周之舊乎為之歌魏曰美哉渢渢乎大而婉險而易行以德輔此則眀主也為之歌唐曰思深哉其有陶唐氏之遺民乎不然何憂之逺也非令德之後誰能若是為之歌陳曰國無主其能久乎自鄶以下無譏焉為之歌小雅曰美哉思而不二怨而不言其周德之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熙熙乎曲而有直體其文王之德乎為之歌頌曰至矣哉直而不倨曲而不屈邇而不逼逺而不攜遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛德之所同也大司樂祀天神祭地示則有歌歌應鍾祭地示而致天神地示則無歌小師大祭祀大享登歌而小祭祀小樂事則不登歌何也致天神地示無歌猶大神之不祼也小祭祀小樂事則不登歌猶小祭祀不興舞也漢興髙祖過沛作大風歌令兒童百二十人習而歌之其後令沛得以四時歌享宗廟漢高祖自蜀伐楚以板楯蠻為前鋒其人勇而好鬭喜為歌舞髙祖聽之曰此武王伐紂之歌也命之習之後世有巴渝之音蓋自此始武帝立樂府采詩夜誦有趙代秦楚之謳以李延年為協律都尉舉司馬相如作郊祀歌十九章十九章之名不能盡載然或以馬生渥窪而作歌或以得宛馬而作歌或以得汾鼎而作歌或以芝草生甘泉而作歌或以獲赤鴈白麟而又皆作歌史記載帝初作宛馬歌汲黯進諫陛下得馬詩以為歌協於宗廟先帝百姓豈能知其音邪上默然不悅公孫𢎞曰黯誹謗聖制當族又正月上辛用事甘泉圜丘使童男女七十人俱歌春歌青陽夏歌朱眀秋歌西皥冬歌玄冥漢郊廟詩歌下協於鍾律皆以鄭聲施於朝廷西漢志史記書東都永平中以禮讖及月令有五郊迎氣服色因兆五郊皆有歌東郊歌青陽南郊歌朱明西郊歌西皥北郊歌玄𡨕車旗服色皆從其方之色漢眀帝為太子樂人作歌詩四章以贊其德一曰日重光二曰月重輪三曰星重暉四曰海重潤見崔豹古今注唐貞觀十四年景雲見河水清張文收採古朱鴈天馬之義制景雲河清歌顯慶中呂才以御製雪詩為白雪歌宋建隆中竇儼撰祭天地宗廟登歌之辭乾德中和峴請撰神龜甘露紫芝嘉禾玉兔五瑞曲每朝登歌首奏之後峴又作瑞文馴象玉烏皓雀四瑞樂章以備登歌羣書考索卷五十一
