body:
  text: 羣書考索别集卷二宋章如愚撰經籍門易伏羲以上無圖書有天地自然之易有伏羲之易有文王周公之易有孔子之易自伏羲以上皆無文字只有圖畫最宜深玩可見作易本原精微之意文王以下方有文字即今之周易然讀者亦宜各就本文消息不可便以孔子之説為文王之説也易本義序三聖作易之旨文王係彖周公係爻視此八卦二純六爻乃乾斯父乃坤斯母震坎艮男巽離兊女離南坎北震東兊西乾坤艮巽位以四維建官立師命曰周易孔聖傳之是為十翼啓蒙原象吉凶悔吝之理吉凶悔吝者易之辭也得失憂虞者事之變也得則吉失則凶憂虞雖未至凶然已足以致悔而取羞矣蓋吉凶相對而悔吝居其中間悔自凶而趨吉吝自吉而向凶也本義易道無窮易則明乎吉凶消長之理進退存亡之道故可以無大過蓋聖人深見易道之無窮而言此以教人語或問易者理之體質易言隂陽錯綜交換代易之謂如寒暑晝夜闔闢往來天地之間隂陽交錯而實理流行蓋與道為體也寒暑晝夜闔闢往來而實理於是流行其間非此則實理無所頓放猶君臣父子夫婦長幼朋友有此五者而實理寓焉故曰其體則謂之易言易為此理之體質也易者變易之義以其體謂之易以其理謂之道正如心性情相似易便是心道便是性易變易也如奕棊相似寒了暑暑了寒日往而月來春夏為陽秋冬為隂一隂一陽只管相易易之為義有二隂下交生陽陽上交生隂隂交陽剛交柔是交易之易這多變是變易之易所謂易者只此便是易字有二義有變易有交易先天圖一邊本都是陽一邊本都是隂陽中有隂陰中有陽便是陽往交易隂隂來交易陽兩邉各各相對其實非此往彼來只是其象如此易包涵萬理易最難看其為書也廣大悉備包涵萬理無所不有其實自古者卜筮書不必只説理象數皆可説將去彖象卦爻係辭元亨利貞乃文王所繫卦下之辭以斷一卦之吉凶此名彖辭彖斷也陸氏音中語所謂彖之經也大哉乾元以下孔子釋經之辭亦謂之彖所謂彖之傳也爻下之辭如潛龍勿用周公所繫之辭以斷一爻之吉凶也天行健君子以自強不息所謂大象之傳潛龍勿用陽在下也所謂小象之傳皆孔子所作也天尊地卑以下孔子所述繫辭之傳通論一經之大體凡例無經可附而自分上繫下繫也並文公語録天下事無不出於易易須錯綜看天下事無一不出於此如善惡是非得失以至於屈伸消長盛衰看甚事都出於此伏羲以前不知如何占考至伏羲將隂陽兩個畫卦以示人使人於此占考吉凶禍福一畫為陽二畫為隂一畫為竒二畫為偶遂為八卦又錯綜為六十四卦凡三百八十四爻文王又為之彖象以釋其義無非陰陽盛衰屈伸之理聖人之所以學者學此而已易之藴無窮易有精有藴如師貞丈人吉此聖人之精畫前之易不可易之妙理至於容民畜衆等處因卦以發皆其藴也既謂之藴則包含衆義有甚窮盡儘推去儘有也古易與周易不同上古之易方是利用厚生周易始有正德意如利貞是教人利於正正吉是教人正則吉至孔子則説得又多羲文孔子之易伏羲自是伏羲易文王自是文王易孔子自是孔子易伏羲分卦乾南坤北文王卦又不同故曰周易元亨利貞文王以前只是大亨而利於正至孔子方解作四德易只是尚占之書易不可作一意看學易者須將易各自看伏羲易自作伏羲易看周公易自作周公易看孔子易自作孔子易看必欲牽合作一意看不得看易當分三等讀易當分為三等看伏羲之易如未有許多彖象文言説話方見得易之本意只是要作卜筮用如伏羲畫八卦那裏自有許多文字言語只是某卦有某象如乾有乾之象坤有坤之象而已今人説易未曾眀乾坤之象便先説乾坤之理所以説得都無情理及文王周公分為六十四卦添入乾元亨利貞坤元亨利牝馬之貞早不是伏羲之意已是文王周公自説自一般道理了然猶是就人占處説如占得乾卦則大亨而利於正耳及孔子係易作彖象文言則以元亨利貞為乾之四德又非文王之易矣易别是一道理易自别是一個道理不是教人底書故記中只説先王崇四術順詩書禮樂以造士不説易也語孟中亦不説易至左傳國語方説然亦只是卜筮耳聖人未嘗教人讀易聖人不曾教學者看易詩書執禮皆以為教獨不及易至於假我數年卒以學易乃是聖人自説非學者事蓋易是極難理會底事非他書之比蓋易只是卜筮書藏於太史太卜以占吉凶亦未有許多説話及孔子始取而敷繹為一經彖象係辭文言雜卦之類方説出道理來當初只是卜筮之書耳易本為占筮設八卦之畫本為占筮方伏羲畫卦時止有竒偶之畫何嘗有許多説話文王重卦作繇辭周公作爻辭亦只是為占筮設到孔子方説從義理去聖人作易教卜筮上古之時民心昧然不知吉凶之所在故聖人作易教之卜筮使吉則行之凶則逃之此是開物成務之道故係辭云以通天下之志以定天下之業以斷天下之疑易所以眀吉凶易當來只是為卜筮而作文言彖象却是推説做義理上去觀乾坤二卦便可見孔子曰聖人設卦觀象係辭焉而明吉凶若不是占筮如何眀吉凶易定天下之吉凶熟讀六十四卦則學得係辭之語真為精密是易之括例要之易書是為卜筮而作如云定天下之吉凶成天下之亹亹者莫大乎蓍龜又云天生神物聖人則之則専為卜筮也易本卜筮之書易本是卜筮之書聖人因之以明教因其疑以示訓如卜得乾卦云元亨利貞夲意只説亨利於正若不正便會凶中間都是貞吉不曽有不正而吉大率是為君子設非小人盜賊所得竊取而用如黃裳元吉須是居中在下方始會大吉不然則大凶君子當隨卦用易問大蹇朋來之義曰處六五尊位而居蹇之中所以為大蹇所謂遺大投艱于朕身人君當此之時須屈群䇿用群力乃可濟也或言蹇與困相似君子致命遂志與君子反身修德亦一般曰不然澤無水困是盡乾燥處困之極事無可為者故只得致命遂志若山下有水蹇則猶可進步如山下之泉曲折多艱阻然猶可行故教以反身修德豈可與困為比只觀澤無水困山下有水蹇兩句便全然不同易彖説得情狀出易中彖辭最好玩味説得卦中情狀出讀易當先正經讀易之法先讀正經不曉則將彖象辭係來解讀易當先四書易本為卜筮設如曰利涉大川是利於行舟也利有攸往是利於啓行也易之書大率如此後世儒者鄙卜筮之説以為不足言而所見太卑者又泥於此而不通故曰易者難讀之書也不若且從大學做工夫然後循序讀論孟中庸庶幾有益也易經繫前後不同六十四卦只是上經説得齊整下經便亂繫辭也如此只是上係好看下係便沒理會論語後十篇亦然孟子末後却剗地好易説盡天下無窮事理須是此心虛明寧靜自然道理流通方包羅得許多義理蓋易不比詩書他是説盡天下後世無窮無盡事理只一兩字便是一道理又人須是經厯天下許多事變讀易方知各有一理精審端正今既未盡經厯非是此心大假虛明寧靜如何見得此不可不自勉也易傳字字有用處易傳眀白無難看但伊川以天下許多道理散入六十四卦中若作易看即無意味唯將來作事看即句句字字有用處易傳言理甚備易傳言理甚備象數却欠在又云易傳亦有未安處如無妄六二不耕穫不災畬只是説一個無所作為之意易傳却言不耕而穫不災而畬謂不首造其事殊非正意已上二十七假並文公語録畫前有易之理易有太極是太極未判之前有易之理矣及伏羲者作則而象之八卦由是分焉然不知伏羲止畫八卦至於六十四卦必有待於文王與之重畫而後成全易何哉毋乃文王所重之卦於伏羲未畫之前無有也與夫畫前有易之説併不足信歟先生問邵堯夫云須是畫前元有易何以見曰畫前有易其理甚微然即用孔子之已發明者言之未有畫前蓋可見也如神農氏之耒耜取益日中為市取噬嗑黃帝堯舜之舟楫取渙服牛乘馬取隨益噬嗑渙隨重卦也當神農黃帝堯舜之時重卦未畫此理真聖人有以見天下之賾故通變以宜民而易之道得矣然則非畫前有易乎龜山河圖洛書之數易大傳曰河出圖洛出書聖人則之其言近於神怪先儒因是肆為誕謾之説有如鄭康成據春秋緯文河以通乾出天苞洛以流坤吐地符河龍圖發洛龜書感河圖有九篇洛書有六篇聖人但言圖書出於河洛何嘗言龜龍之兆又何嘗言九篇六篇乎鄭氏讖緯之蔽何特此爾劉歆則曰河圖則八卦是也洛書則洪範是也又或曰河圖九宫洛書五行巧者往往為圖以示人曰河圖之數九洛書之數十河圖為生數洛書為成數拘辭失理未知孰是自夫子有聖人則河圖洛書之言箕子有天錫禹洪範九疇之文而後鄭康成劉歆等輩肆為誕謾之説抑不知易有太極是生兩儀兩儀生四象四象生八卦聖人作易幽贊於神明而生蓍焉蓍生而八卦成矣何待圖而畫卦乎設河圖不出則八卦無由畫也若謂伏羲畫卦本於河圖則夫子但曰河出圖聖人則之其可矣乃必兼洛書而並為則之何哉既曰則圖書以作易是伏羲之時圖書並著矣何待大禹治水之後而後天錫以洛書乎若以洛書出伏羲之時人不能知必待大禹而後序之則伏羲神農黃帝堯舜乃何如人皆不知洛書必待大禹而後知之乎審此可知其妄不知箕子夫子之言有旨也伏羲之前太古荒唐未有文籍結繩而治大事則結為大繩小事則結為小繩及有聖人者出天將以斯文開覺後世故河為之出圖洛為之出書然孰知其為何物哉伏羲覩河洛之瑞以為天下不可以無文於是因神蓍而畫八卦書契始行乎天下故夫子曰上古結繩而治後世聖人易之書契百官以治萬民以察孔氏亦曰古者伏羲氏之王天下始畫八卦造書契以代結繩之政由是文籍生焉以此見夫子謂聖人則之者特因圖書之有文始作易以明道矣何嘗依其數而畫卦乎若謂天錫禹洪範九疇亦何嘗有物以豫之乎有物以豫之則天錫王勇智亦以其物也蓋九疇之本在乎五行五行之本又在乎水水性失則五行之性失五行之性失則九疇不得其敘矣觀箕子曰鯀湮洪水汩陳其五行帝乃震怒不畀洪範九疇彛倫攸斁鯀不過治水無功爾而與汨亂五行帝為之不畀九疇則知禹之所以序九疇由五行得其性五行得其性由水性之順也故舜亦曰地平天成是也箕子以初一曰五行次二曰五事次三曰八政以至於五紀皇極以下各有其倫然非五行得性則五材不為人用不能一日以相生何暇謀及他乎黃帝堯舜之時九疇未嘗不序也當洪水之患則蛇龍居中國斯民無地可居無穀可食雖欲敬五事欲治八政欲協五紀建皇極得乎是以天錫禹九疇必於治水有功之後也何嘗以洛書與禹乎是皆世儒不究理之所在好為竒巧之説也近世歐陽子儒之逹者也厭世俗附會之説則以河圖洛書古未嘗有也疑易大傳多非夫子之言然河圖之瑞書顧命與魯語皆明言之不可以為無有明矣若易大傳非聖人之言又誰能為是言耶歐陽子非妖怪之説是矣而又矯枉太過也河圖之太極知龍圖授羲之説然後可以究河圖之宗知左旋右轉之説然後可以定河圖之次知金火易位之説然後可以論河圖之變夫天不愛道始有龍馬之祥地不愛寶始出滎河之瑞豈非河圖之宗乎一三七九逆左循環二四六八順右森布豈非河圖之次乎四九宜西而不居西二七宜南而不居南又豈非河圖之變乎故劉牧傳於范諤昌諤昌傳於許堅堅傳於李溉溉傳於种放放傳於陳希夷即此圖之正印也自後世株守拘攣之習津迷象數之塗或以為不用十數或以為不言成數是皆未知河圖之太極也蓋圖有太極渾淪於中數之五若以五而推則九上一下三左七右以二射八以四射六圖雖不言十而十數隱於其中矣一與五為六水成也三與五為八木成也四與五為九金成也二與五為七火成也圖雖不言成而成數行乎其間矣然則河圖妙致真可與識者道莫為俗人言也是故乾用九坤用六得十五數也七為少陽八為少陰亦得十五數也合而言之凡四十五此則河圖正數發露於大易也一五行二五事三八政四五紀是為十數五皇極六三德七稽疑八庶徵是為三十六數以次九而足之凡有四十五數此則河圖本數敷演於洛書也天數竒而虛五是為二十地數偶而虛五是為二十五合而計之亦四十五此則河圖虛數分布於大衍也故嘗因是而為之説曰天地之數五十有五所謂河圖者缺地十土之成數也所謂洛書者增地十土之成數也所謂大衍者缺天五土之生數也要之大衍之五十即洛書之五十五洛書之五十五即河圖之四十五也河圖自然之數大衍之數五十蓋以河圖中宫天五乘地十而得之至用以筮則又止用四十有九蓋皆出理勢之自然而非人之知力所能損益也文公與圖書之數相參虛十則洛書四十有五之數也虛五則大衍五十之數也積五與十則洛書縱橫十五之數也以五乘十以十乘五則又皆大衍之數也洛書之五又自含五則得十而通為大衍之數矣積五與十則得十五而通為河圖之數矣易啓蒙其數出於河圖河圖五十五是天地自然之數大衍五十是聖人去這河圖裏取那天五地十衍出個數大概河圖是自然底大衍是用以揲蓍求卦者文公大衍河圖之分若論易文則自大衍之數五十至再扐而後挂便接乾之䇿二百一十有六至可與祐神矣為一節是言大衍之數自天一至地十却連天數五至而行鬼神也為一節是論河圖五十有五之數契合圖書之妙來喻謂不當以大衍之數參乎河圖洛書之數此亦有説數之為數雖各主於一義然其參伍錯綜無所不通則有非人之所能為者其所不合固不容以強合其所必合則縱橫反覆如合符契亦非人所能強離也若於此見得自然契合不假安排方知造化工夫神妙巧密文公衍五而為五十河圖洛書之中數皆五衍之而各極其數以至於十則各為五十矣河圖之數五十五其五十者皆因五而後得獨五為五十所因而自無所因故虛之則但為五十又五十五之中其四十者分為隂陽老少之數而其五與十者無所為則又以五乘十以十乘五而亦皆為五十矣洛書積數四十五其四十者散布於外而分隂陽老少之數唯五居中而無所為則五自含五數而并為五十矣易啓蒙有氣便有數氣便是數有是理便有是氣有是氣便有是數物物皆然黃義剛隂陽竒偶之數天地間只有個竒偶竒是陽偶是隂春是少陽夏是太陽秋是少隂冬是太隂自二而四自四而八只恁推去都走不得而揚子却添兩作三謂之天地人事事要分作三截又且有氣而無朔有日星而無月恐不是道理文公數以六十為節大凡易數皆六十三十六對二十四三十二對二十八皆六十也以十甲十二辰亦湊倒六十也鍾律以五聲十二律亦積為六十也以此知天地之數皆至六十為節文公卦雖八而數十卦雖八而數須是十八是陰陽數十是五行數一隂一陽便是二以二乘二便是四以四乘四便是八五行本只是五而有十者蓋是一個便包兩個如木包甲乙火包丙丁土包戊己金包庚辛水包壬癸所以為十文公參伍錯綜之説參以三數之也伍以五數之也如云什伍其民如云或相什伯非真為三與五而已也蓋紀數之法以三數之則遇五而齊以五數之則遇三而會故荀子曰窺敵制變欲伍以參注引韓子曰省同異之言以知朋黨之分偶三五之驗以責陳言之實又曰參之以比物五之以合三而漢書趙廣漢傳亦云參伍其賈以類相凖皆其文也易所謂三五以變者蓋言或以三數而變之或以五數而變之前後多寡更相反覆以不齊而要其齊如河圖洛書大衍之數伏羲文王之卦歷象之日月五星章部紀元是皆各為一法不相依附而不害其相通也文公答王仲禮參伍説天地竒偶之數天數伍者一三五七九皆竒也地數伍者二四六八十皆偶也相得謂一與二三與四五與六七與八九與十各以竒偶為類而自相得有合謂一與六二與七三與八四與九五與十皆兩相合二十有五者五竒之積也三十者五偶之積也易本義説蓍説理之别數只是大衍之數五十與天數五地數五兩假大衍之數是説蓍天地之數是説造化生生不窮之理其數與蓍數同大衍之數五十蓍之數五十蓍之籌乃其策也䇿中乘除之數則直謂之數耳文公康節理與數合康節易數出於希夷他在靜中推見得天地萬物之理如此又與他數合所以自樂文公康節數得於胸中蓋其心地虛明所以推得天地萬物之理其數以陰陽剛柔四者為凖四分為八八分為十六只管推之無窮有太陽太陰少陽少隂太剛太柔少剛少柔今人推他數不行亦是無他胸中文公論道生一之説道生一一生二二生三某恐此道字即易之太極一乃陽數之竒二乃隂數之偶三乃竒偶之積其曰二生三者猶所謂二與一為三也若直以一為太極則不容復言道生一矣詳其文勢與列子易變而為一之語正同所謂一者皆形變之始耳不得為非數之一也文公連山歸藏之名以連山歸藏為伏羲黃帝之易者自杜子春之言始以連山歸藏為夏商之易者自鄭康成之言始夫所謂連山者取山連不絶之義也所謂歸藏者取萬物歸藏之義也故連山首艮艮為山也歸藏首坤坤為地也因是卦以辨是名因是名以究是意亦猶周易以乾為首而有取於周普之義也然一連山也一歸藏也子春以為作於伏羲黃帝康成以為作於夏商二論矛盾將何折衷子春之言是邪歸藏何以曰堯降二女又何以曰殷王則歸藏非黃帝連山亦非伏羲矣康成之言勝邪世譜何以曰連山歸藏並是代號則連山歸藏亦不可謂之夏商矣愚嘗因是而究其説蓋伏羲黃帝造其名夏商因之以作易其可證者有三禮運曰吾得坤乾注之者曰得商隂陽之書也其書存者有歸藏歸藏既為商之書則連山寧非夏易乎其可證者一也皇甫謐云夏因炎帝曰連山殷因黃帝曰歸藏連山果為伏羲皇甫謐又安得謂之因炎帝乎此可證者二也周正建子蓋得天統故周易以乾為首商正建丑實得地統故商易以坤為首夏正建寅實得人統無為卦首之理艮漸正月故夏易以艮為首是則三代之易皆取於三正三統之説烏得為伏羲黃帝乎此可證者三也證之以三者之説子春之論有不攻而自破矣不然李江之序元包何以曰夏連山殷歸藏乎雖然連山久亡歸藏不行又未有如周易之為得也周官三易源流周官三易者太卜簭人所掌也太卜掌三易之法一曰連山二曰歸藏三曰周易而簭人則掌三易以辨九簭之名參諸傳注一以為連山宓犧歸藏黃帝一以為夏曰連山商曰歸藏周曰周易夷考諸説鄭氏注以為連山似山出內乎氣歸藏萬物莫不歸藏於中也杜子春以為連山宓犧歸藏黃帝釋曰按今歸藏坤筮堯降二女節卦王其國趙商問子春連山宓犧歸藏黃帝何由知之鄭氏答曰此數者非無明文改之無據故著子春説而已近師皆以易夏商周故易贊云夏曰連山商曰歸藏周曰周易而禮運注亦曰得商隂陽之書也其書存者有歸藏若依子春之説歸藏黃帝豈得有堯商之事蓋子春之意宓犧黃帝造其名夏商因其名以作易皇甫謐記云夏人因炎帝曰連山商人因黃帝曰歸藏蓋得之矣連山以艮為首歸藏以坤為首周易以乾為首天能周匝萬物故曰周易夏商易以九六不變為占周易以九六變者為占合諸家之説引而伸之觸類而長之周官所掌三易之義見矣用敢敷繹其義為之序曰自昔聖人之作易莫不有義仰以觀於天文俯以察於地理天地設位而易行乎其中觀其象取其用具其體則易之道備矣易與天地凖上下四方之宇往古來今之宙帝之為帝王之為王大之為山川流峙微之為洪纎動植無一物而非易亦無一息而非易也大哉易乎先天有易其真未漓後天有書其祕已泄粵自宓犧氏王天下始畫八卦以乾為天以坤為地以震為雷以巽為風以坎為水以離為火以艮為山以兌為澤一卦具一象一象具一義凡物莫不資始於乾資生於坤而其氣莫不出內乎艮故闢户謂之乾闔户謂之坤而艮者又萬物之所以成終成始也是三卦者皆易之大用而聖明用易者之所尚也故易之為道兼三才之義有天道焉有地道焉有人道焉易之時用大矣哉時更往聖世厯三古自宓犧至于黃帝自黃帝至于夏自夏至于商自商至于周有帝王者出聖作明述莫不制易以取義用易以乘時觀諸三易連山者宓犧之易夏后氏因之以作易者也其卦體以艮為首蓋以艮者山也艮所以成言乎物故曰連山具其體也歸藏者黃帝之易而商人因之以作易者也其卦體以坤為首蓋以坤者地也坤所以厚德載物故曰歸藏取其用也逮至于周而易之書大備故周易之卦以乾為首蓋以乾者天也乾所以首出萬物故曰周易觀其象也三易之體各以一卦為首各以一義為先要之三易經卦皆八其别皆六十有四聖人之於易象法天地對育萬物其傳心之要出治之法前聖後聖其揆一也肆周官六典三易並掌於太卜簭人之官其不可主一廢一明矣乃若其占則有不同九為老陽六為老陰同是體也而夏商以不變為占周以變者為占易有聖人之道四焉以卜筮者尚其占講明三易者尚有考焉書不盡言言不盡意繫辭者已有感於斯矣按唐藝文志連山十卷司馬膺注隋志歸藏十三卷晉太尉參軍薛正注隋志歸藏已亡按晉中經有之惟載卜筮不似聖人之旨以本卦尚存故取冠於周易以備商易之闕記禮有言我欲觀夏禮杞不足證也我欲觀商禮宋不足證也吾得坤乾焉愚於三易亦云四營成易之説不觀周易繫辭無以知四營之説不讀三墳易典無以辨四營之名夫分二象兩挂一象三揲四象時歸竒象閏蓍法有四果足謂之四營乎曰非也老陽數九老隂數六少陽數七少陰數八各以四推果足謂之四營乎曰非也蓋營者經營之謂而四者言四正之卦也乾坤離坎是為四正挂八卦於八方而以四正之卦左右而經營之是為四營何以言之蓋乾營左重得十八卦始於訟鼎大畜需革無妄中於遁睽巽壯家人兊履終於姤夬大有同人小畜此則以純乾之體而一營也坤營左重得二十四卦始於臨蹇震觀解艮中於否泰隨蠱既濟未濟師謙復比終於豫剝升屯明夷萃晉蒙此則以純坤之體而二營也離營右重得十四卦始於中孚大過中於噬嗑渙恆賁節咸終於旅損井豐益困此則以純離之體而三營也坎營自重又生四卦始於小過中於頤終於漸歸妹此則以純坎之體而四營也故周易繫辭曰四營而成易三墳易典曰四營而成重卦正謂是也不然乾營坤營離營坎營四篇可以無作學者茍試思之則過半矣又何待愚之贅言大象名卦之義羲易之旨即大象以明之固然也然聖人名卦或取於義或取於爻有不待大象而後明者何也古今言易者無不據大象以求立卦之旨是皆未知易也聖人名卦取義不一有取於二卦之象者有取於二卦之義者有取於爻之變動者取於二卦之象則如坎上離下之為既濟坎上艮下之為蹇之類是也取於二卦之義則如動而悅之為隨明以動之為豐之類是也取於爻之變動則如柔進而履剛則謂之履剛反動於下謂之復夬剝損益之類皆是也故夫子曰其稱名也雜而不越言取義雖雜而於理皆不越也自夫子沒學者多不究此義謂聖人立卦皆取於上下二象是守株之學也蓋易之旨盡在伏羲之畫特以形容其象已形之義耳然卦有得而形容者有不得而形容者不可専據此以求易也若易之旨必待大象而後明則夫子未作之前文王周公何所據依乎故嘗論之震上坎下為屯坎上震下為解坎震相遇一也大象在屯則曰雲雷屯在解則曰雷雨作解坎之一象或曰雲或曰雨何也蓋聖人欲明屯者難之未解故謂之雲雷欲明解者難之已解故謂之雷雨茍専一義則不通也其在困則坎下兌上坎水也兌澤也據二象當為澤中有水夫子乃曰澤無水困蓋不言無水無以見困之義也然此猶可以形容也固有理之不可以形容者聖人亦但言二象相遇如是耳未嘗強之也其在豐震上離下而亦謂之雷電學者皆疑象文之倒謂六十四卦中未有如是者不知聖人之旨不然噬嗑與豐之成卦不取義於雷電既不取義於此則謂震下離上為雷電可也離下震上為雷電亦可也若世儒所説在噬嗑必謂之電雷非惟言之不文且拘之甚也非特此耳澤中有雷不足以見隨之義山上有火不足以見旅之義風行地上不足以見觀之義山下有雷不足以見頤之義何者隨之為卦已取義於動而説不取於澤中之雷也旅之為卦已取於一陽之來下不取於山上之火也觀之為觀已取義於二陽之在上為羣陰所觀不取於風行地上故也頤之為頤已取於二陽合應上下中虛動不取於山下有雷故也若是之類先儒強求之皆不通也若以大象即可以求卦之旨則以雷電求噬嗑矣聖人何以復告人曰頤中有物曰噬嗑以山下有雷求小過可矣聖人何故又告人曰有飛鳥之象焉説者徒知雷在天上之為大壯不知聖人乃謂剛以動故也徒知澤上有雷為歸妹不知聖人乃謂悅以動所歸妹也求損之旨惟於山上有澤不知聖人告人損下益上乃以為損也求益之旨惟於風雷不知聖人告人損上益下乃以為益也學者之於易能知此理始知聖人名卦之旨庶幾可以入易之門也世之言易者問以六十四卦之名顯然易知者或能知之如萃如升如旅如渙中孚小過之類並莫知名卦之由此已不知况其名卦微旨乎而自謂探易之閫奧遂以名家嗚呼甚哉其相蒙也羣書考索别集卷二
