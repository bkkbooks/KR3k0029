body:
  text: 羣書考索卷三十宋章如愚撰禮門廟制類熙寧五年三月中書門下言准治平四年𠡠遷僖祖廟主藏之夾室臣聞萬物夲乎天人本乎祖故先王廟祀之制有踈而無絶有遠而無遺商周之王斷自稷契以下者非絶嚳以上而遺之以其自有本統承之故也若夫尊卑之位先後之序則子孫齊聖有功又得以加其祖考天下萬世之通道也本朝自僖祖以上世次不可得而知則僖祖有廟與稷契疑無以異今毁其廟藏其主夾室替祖考之尊而下祔於子孫殆非所以順祖宗孝心事亡如事存之義因請制禮實在聖時宗祏重事所宜博考乞以所奏下兩制詳議而擇取其當詔下學士院集兩制詳議於是學士元絳知制誥王益柔陳繹曽布直舍人院許將張號上議曰自古受命之王既以功德有天下皆推其本統以尊事其祖故商周以稷契為始祖者以其皆承稷契之本統故也云云太祖受命之初立新廟自僖祖始僖祖而上世次不可知然則僖祖之為始祖無疑矣倘以為僖祖不當比稷契為始祖則是使天下之人不復知尊祖而子孫得以有功加其祖考也况於毁其廟遷其主而下祔於子孫之室豈所以稱祖宗尊祖之意哉𫝊曰毁廟之主陳於太祖未毁廟之主皆升合食于太廟今遷僖祖之主而藏于太祖之室則是僖祖順祖宣祖祫祭之時皆降而合食也情文不順無甚於此臣以謂宜以僖祖之廟為太祖合於先王之禮意翰林韓維别議曰昔先王既有天下跡其基業之所由起奉以為祖所以重本始也蓋王者之祖有係天下者矣諸侯之祖有係一國者矣大夫士之祖係其宗而止矣亦其理勢然也蓋有天下之始若后稷有一國之始若周公大夫士之始若魯三家今直以稷契為本統之祖則是下同大夫士之禮可乎或曰湯文武去契稷皆十餘世其間子孫衰微奔竄者非一湯文武之有天下稷契何與哉南宮適曰禹稷躬稼而有天下禹之有天下則然矣稷諸侯也而曰有天下者豈非積纍功德至文王而興乎孟子曰湯以七十里文王以百里所謂七十里百里者非契稷所受以遺其子孫之國乎由是言之商周之所以興契稷不為無所與也正考甫作頌追道契湯髙宗商所以興子夏序詩稱文武之功起於后稷豈虛語也哉國語亦曰契勤商十四世而興稷勤周十五世而興榖梁曰始封必為祖是數子生於周代其所言皆親聞而見者其學問又俱出於孔子宜若可信則尊始祖以其功之所起秦漢諸儒亦有所受之也後世有天下者皆特起無所因故遂為一代太祖所從來久矣伏惟太祖皇帝孝友仁聖睿智神武兵不血刃坐清大亂子孫遵業萬世蒙澤功德卓然為宋太祖無少議者僖祖雖於太祖髙祖也然遙遡功業未見其有所因上尋世系又不知其所以始若以稷契奉之切恐於古無所考而於今亦未有所安也臣以為仍舊便若夫藏主合食則歷代嘗議之矣然今之廟室與古殊制古者每廟異宮今所以奉祖宗者皆在一堂之內西夾室猶處順祖之右考之尊卑之次似亦無嫌至於禘祫自是序昭穆之祭僖祖東向禮尤不順所謂子雖齊聖不先父食者也如絳所議非臣所敢同也天章待制孫固上議曰太祖受天命一四海創業垂統為萬世立無窮之基其為宋始祖而配天受享理任不疑今乃欲以僖祖為始封之祖復其祧主夫既以僖祖為始祖則遂受配郊天此臣切所未安也七世之廟親盡而祧此萬世之通法故僖祖之主於陛下之世以親盡而祧在禮適為正而今以為人必本乎祖太祖既以追尊僖祖則今日當以僖祖為本始之祖是未推王者興起有殊異而所當之世各不同也夫開國者其先嘗有功而受封則後之子孫有天下而推以為始祖可矣若夫膺天受命特起而得天下者為太祖亦宜矣此人情之所順而前世之所已行者也今議者曰方今天下隆平不愧治古而禮樂文物宜鄙絶漢唐之所行而純取三代之制以為法故有僖祖與稷契無異之說臣恐以為過矣本朝之興與商周異商周之王本由契稷故自湯武而上其流有源皆可推而考之契布五教民以知禮其興雖略與周同而猶不若周之懿也周自后稷公劉以來積行纍功以至太王王季世世修德逮文武受命而得天下則源流之來豈不有自哉仲尼曰郊祀后稷以配天宗祀文王於明堂以配上帝則周公其人也夫自周而上堯舜夏商之世非不美也其祭祀之禮仲尼不談而獨舉周者豈非其德與世獨為備乎故曰周公其人言惟周公能備此禮爾詩曰思文后稷克配彼天言以德能配天也夫以文武之王而不得預配天之祭者特以后稷之功大爾使周無后稷之祖則周公之祀不當舍文武而及他人且後世之興其先既無周之后稷而郊天之配不先創業之君而逺取追尊之祖此豈先王之禮而近人情者哉云云漢髙之得天下與商周異故太上皇帝不得為始封而光武之興不敢尊㫪陵而祖髙宗景皇帝唐始封之君而元皇帝神堯之父臣觀髙祖之時以景皇帝為配而太宗之初已奉髙祖於圎丘景皇帝不得預郊天其後杜鴻漸等請復以景皇郊配天地黎幹力詰其非而正之夫景皇帝親授唐國之封且不得預配天則未嘗啓有土宇而欲以為始祖臣亦慮其難矣太祖受周禪僖祖始被追尊而建隆之郊配以宣祖僖祖且不得預焉夫以太宗真宗仁宗英宗之世未嘗郊祀僖祖而陛下一旦隆而祀之蓋有所隆者必有所替今使太祖之祀有替於四宗之時此豈陛下孝思之心哉故曰禮别子為祖稷皆帝嚳之子而得姓者故商周以為祖而奉之今宋自僖祖為始祖臣曰不然若以得姓者為祖則趙之得姓自造父封於趙城而趙襄始得姓今若更推考其先世則遂欲上祖趙衰可乎或又曰今但欲存僖祖為始祖爾至於配天未可輕議也臣曰是不可也既以僖祖為始祖始祖必配天則太祖祀替矣此臣所為不可者也今太廟一堂夾室在西祧主藏室中而居順祖之右非所謂下祔子孫之室而替其尊也猶以為不可則乞特為僖祖立室置祧主其中由太祖而上親盡迭毁之主皆藏之僖祖之室當禘祫之時以僖祖之主權居東向之位太宗之主順昭穆之列而從之取其毁廟之主而合食焉則僖祖之尊自有所伸此韓愈所謂祖以孫尊孫以祖屈之義也若以僖祖立廟為非則周人别廟姜嫄不可謂之非祖今因情制禮取聖人之制為萬世法不亦美歟詔以韓維元絳等二狀并孫固所議下太常禮院詳定時祕閣校理王介上議曰凡物有無窮而理固有限以有限制無窮此禮所以起而天子所以七廟也七廟據其世數之上下迭毁而七也今乃自考而上何也必曰祖自祖而上何也必曰曽祖自髙祖而上又何也必曰不可及見則聞而知之者也今欲祖其祖而追之不已祖之上又有祖則固有無窮之祖矣聖人制為之限此天子七廟所以自考廟而上至顯考之外而必祧也自二祧而上惟始封君而必祖也借無始封之君則亦祖受命而王者爾如祖之臣見其有以八廟未見其所謂七也七廟自顯祖之外而祧亦猶九族至髙祖而止也皆以禮為之界也五世而斬故也喪之三年也報罔極之恩也以罔極之恩為不足報則固有無窮之報乎何以異於是故喪之罔極而三年也族之久逺而九也廟之無窮而七也伏惟我朝宗廟英宗則考廟也仁宗則王考廟也真宗則皇考廟也太宗則顯考廟也太祖則祖考廟也宋無始封之君因以太祖為祖考理勢然也以太祖為祖考則僖祖之廟非稷契始封之比當太祖之時固宜在四親廟當陛下之今日世數差逺在顯考之外則理所宜祧者也臣以祭法格之僖祖宜在二祧之域不宜不祧决矣如顯考外而不祧臣疑祭法非先王法也或曰禮不王不禘禘者禘其祖之所自出以其祖配之商周雖祖契稷湯文然猶不絶嚳也宋既祖太祖亦可以絶僖祖乎臣曰是祧也非所謂絶也猶有祧廟焉亦有追享焉顧逺之於無事禘祫而後及之耳按祭法有虞氏禘黃帝而郊髙陽祖嚳而宗堯商人禘嚳而郊契祖冥而宗湯周人禘嚳而郊稷祖文王而宗武王舜繼堯之大統此則祖堯之父也周則不然稷始封之祖也非獨廟之又從而郊之重之也於嚳則逺祖也非獨不廟焉禘而後及之爾抑帝嚳者自有虞氏商人祖之此周所以不立嚳廟而獨廟姜嫄也彼商周之於嚳禘而後及之然則今之僖祖亦禘祫而後及之不亦可乎云云今者之議將取正之變乎亦取變之正乎是以亦取其變之正者况太廟一歲而數祭禘祫數年而後及如此則太祖之尊一嵗而屢享逺祖之尊數嵗而一伸於以求之禮法參之人情是亦變之正也今祧僖祖而祖太祖則如是可也茍不祧僖祖則是太祖啓運立極為子孫立萬世之基本而不得専享東向之位臣恐宗廟神室未安於此也臣雖非兩制共覩大議不容噤默輒貢愚瞽議格不下十月判太常寺張師顔張公裕梁燾等議曰天下大禮莫重於宗廟是以聖王重之必務極其至當伏惟僖祖神主祧藏夾室於禮不順有司失之矣宜其輔臣建正明詔博訪垂萬世法然議者因其藏主有失遂欲推為始祖臣敢為此議昔商周之興本於契稷考諸前載其指有二曰因其始封也蒙其功德也其𫝊已久其禮素定後世無得而易之奉為太祖以主廟祀有以盡一時之宜也詩之長發言商家興廢之久歷虞夏之世其來逺矣昊天有成命言后稷已有王命生民思文皆歌后稷之功不可謂為祖不因功德也後世受命之君功業特起不因先代則親廟迭毁身自為祖故魏祖武帝則處士迭毁晉祖宣帝則征西迭毁唐祖景皇則洪農迭毁此前世祖其始封之君以法契稷之明例也既以法契稷則上之親廟不得不毁勢當然也借使魏晉欲不祖武宣而越取處士征西不惟上推世數更當及於何人且其以始封何唐有天下因以為法韓愈有言事異商周禮從而變臣等取之要之始封世近則親廟不可不立若特以親廟及逺便為始祖舍始封而抑之則前古未之聞也國家治平四年以僖祖親盡而祧之奉景祐書以太祖為帝者之祖是合於禮矣而議者曰商周之祖自以别子之故非以有功與封國為重輕元絳等議如此是不然也别子之法自謂公子不繼世故子孫為大夫士者祖之百世不遷非天子諸侯之禮也使湯武但為諸侯則尚不祖此别子况天下之君而可用大夫士之法乎宋之為宋由太祖首創洪業建大號于天下異乎商周之為商周可知也僖祖雖為聖裔之先而有廟直由太祖親盡則遷右之正義今欲以有廟之始為說拔而進之以為始祖臣固疑其與契稷異矣必欲據此則又有可言者蓋三昭三穆是一定之論也國初張昭任徹之徒不能逺推隆極之制因㳂近制請立四廟遂使天子之禮下同諸侯若使廟數僃六則應當上推兩世而僖祖次在第三亦未可謂之始祖也若謂世次不可推則斯言也詔旨所不著史臣所不録歷百餘年莫知當時之實不取以私意逆推而言也建隆四年親郊崇配不及僖祖開國以來大祭虛其東靣斯乃祖宗已行之意也自祖宗以來不以太祖之位易之今而易之恐失祖宗之意矣或謂儀禮諸侯及其太祖天子及其始祖之所自出今謂始封為太祖乃諸侯制也臣以為逺祖受封子孫世襲親雖盡而廟不毁是謂諸侯及其太祖也若始封之君既已為其國之祖矣後世子孫自諸侯而為天子則始祖不易理勢自然是謂天子及其始祖也若必求太微之精神靈之感謂為始祖之所自出將見遷就生說竒譎無端彌失聖人之意矣唐神龍初議云既立七廟須崇始祖而張齊賢云始祖即太祖太祖之外更無始祖前儒講之熟矣大抵契稷不以功德為祖無必然之論特起之君自為一代之祖無不可之理若乃藏主未順宜以改之蓋夾室者子孫廟之偏室非廟之正也議者謂神道尚右失其㫖矣然則僖祖之主必有所歸按周禮守祧掌守先公先王之廟祧廟則有司修除之祧則守祧黝堊之所謂廟者后稷文武諸廟也祧者所藏先公先王之遷主也先公遷主藏于后稷之廟僖祖猶周之先公也乞倣此例築别廟以藏之大祭之歲祀於其室太廟則一依舊制虛東向之位郊配之禮仍舊無改事之宜而情之順也晉永和中尚書議云周人之王太祖世逺故遷有所歸今晉廟宣帝為主而四祖居之是屈祖從孫也祫祭在上是代太祖也范宣謂可築一室以居四主四主迭遷則宣位正矣自虞喜韋泓蔡謨之徒並同其議唐陳京議請據魏晉舊制築别廟以藏獻懿桞冕等七十餘人亦同其說雖孕藏于興聖廟然本無異于别室也惟顔真卿引蔡謨權居東向之一句而不本其改築之議獲譏於時此前世之論皆有考據同知禮院蘇恱議曰三代廟數雜見於經其詳不可得而推謂夏五廟商人六廟周人七廟切惟先王之道未嘗不同其歸而制作名數不能無小變損益以從時者其於祖嚴祖考稱情立文之意則一也至于立廟或五或六七者所因之迹有隆殺故制禮以報之不得而同也秦漢而下禮廢缺多不足法而猶有能適變合情足以便一時而已聖朝追原先帝事祖之意欲盡𫝊聞之所及正於其所不及而因奉以為始祖乂以正神靈之班尊尊之至也臣伏思僖祖與商周之祖雖詒謀隱德無所先後而時有汙隆道有顯晦故其迹亦緣而少異是宜追崇之禮因小有損益庶乎稱情立文而為之極以遺萬世不刋之法也若乃七世之廟必欲奉尊夲雖隆于商可也若於太廟右特立僖祖一廟則祖考不為不祔於子孫此所謂有疏而無絶有逺而無遺者是矣臣維臣固請夾室在右為尊於正室不思之甚非臣之所敢同也至於郊配之禮在太祖之世嘗行之矣自太宗至于英宗不復追配而奉宣祖崇配臣觀建議之文亦未嘗及追配之說如臣之愚謂仍舊便必若聖朝不欲於太廟興作而務崇簡質追迹古始而參用近代之法庶乎易行則有唐正元以懿獻二祖之祔於興聖德明之廟蓋尊咎陶武昭以為逺祖之廟故升懿獻於尊卑為順也史記載趙氏之祖出於柏翳其後造父受趙城之封子孫因以為氏今景靈聖祖每嵗陛下躬行酌獻之禮亦近於興聖德明之類歟若升祔僖主或因以祀柏翳造父如唐德明興聖之比則不為下祔於子孫雖不合經而免於瀆祖亦因時制禮之道也同判太常周孟陽同知禮院朱充國禮院檢詳文字楊傑議曰按儀禮諸侯及其太祖天子及其始祖之所自出注云太祖始封之君始祖者感神靈而生若稷契也疏云及始祖所由出謂祭所感帝還以始祖配之王者之祖皆感太微五帝之精以生則不止稷與契也其實帝王皆有所感而生也天子始祖並於親廟外祭之古制王者宗廟有始祖太祖之别諸侯則止於太祖無始祖按詩生民之序曰尊祖也后稷生於姜嫄文武之功起於后稷箋云周之始祖其生之者姜嫄也疏云始祖后稷也周以后稷為始祖文王為太祖雍禘太祖謂文王也后稷以感生謂之始祖而亦謂之太祖若文王以受命之大惟稱太祖不得言始也雍之詩曰假哉皇考文武惟后稷非身為天子不得言維后故知雍之禘太祖謂文王也周以稷為始祖文王為太祖與儀禮之文相表裏云云臣等參詳經𫝊古者必尊始祖配祀感生蓋以追崇統系本始非謂推有功也諸侯則不然但推始封之君以為太祖而不及始祖也是以周有天下上推統系至於后稷后稷者帝嚳之子周不可以祖帝嚳以后稷為始祖商推統系上至於契契亦嚳之子商不可以祖帝嚳故以契為始祖示與諸侯之制異也至秦并六國自號始皇帝漢襲秦故以髙皇為太祖之廟不復如禮經追崇始祖蓋用諸侯之制爾魏晉而下禮文殘缺爰及有唐雖世數之久而宗祧制度多不稽古本朝藝祖平定函夏追立親廟玉牒帝系自僖祖始僖祖而上世次不可得知則僖祖之為始祖宜矣伏惟依禮經以僖祖為始祖配祀感生帝其舊制以宣祖配侑今請停其禮自餘祀享天地明堂祖宗配侑並如舊儀臣按商以太甲太戊武丁為三宗周以文武為二祧世世不遷非三昭三穆之數兼觀景祐詔書太祖為帝者之祖太宗真宗為帝者之宗三廟萬世不遷則宣翼順三祖皆在昭穆之內同判太常章衡議曰儀禮義疏曰王者之先皆感太微五帝之精以生不止契稷而已詩序先民曰尊祖說者以為周以后稷為始祖文王為太祖故雍禘太祖為文王也自古有天下者必尊始祖秦漢而降典章殘缺廟祧遷次始失先王所以尊祖之意今陛下纂成大統恭事宗祏宜正有司之失以合先王之禮伏惟尊僖祖為始祖而順祖神主在次當遷此所謂子為父屈以定七世之制其於郊配則禮記大𫝊曰王者禘其祖之所自出以其祖配之請以僖祖配上辛感生帝之祀而罷宣祖侑神之祀此所謂祖以孫尊孫以祖屈以稱祖宗追孝之心自餘祀享配侑並如舊典於情文為順十月中書門下言云云今或以夾室在右謂於宗祏為尊或以本統所承措之别宫為當類皆離經背理臣所不敢知伏請奉僖祖為太廟始祖遷順祖神主藏之夾室孟春祀感生帝以僖祖配詔恭依有司遂請以來年孟春薦享奉安髙宗建炎二年冬十一月己亥上朝享太廟紹興五年初太廟神主寓於溫州歲時薦享委之守臣司封林待聘言原廟之在郡國有漢故事而太廟神主禮宜在都今新邑未奠宜考古師行載主之義還之行闕以彰聖孝至是始就臨安府建太廟遣太常少卿張洙奉安上行欵謁之禮紹興六年起居舍人董弅等論廟制癸未宰執奏事趙鼎曰今日召見百官就尚書省集議廟制上曰太祖開基創業始受天命祫享居東向之位於太祖之廟而已載在禮經無可疑士大夫必無異同之論十二年十二月言者謂自元豐始廣景靈宮以奉祖宗衣冠之遊即漢之原廟也自艱難以來神遊猶寄永嘉四孟薦享旋即便朝設位未副廣孝之意望命有司擇地效景靈舊規以建新廟迎還列聖粹容庶幾四孟躬行獻用慰祖宗在天之靈丁酉詔禮官討論申省遂建于新莊橋之西七月禮官修定景靈宮四孟朝獻儀詔從之紹興十九年著作郎劉章言禮莫重於祭而郊廟為尤重我神宗元豐間嘗詔陸佃等編類成書今陛下以明聖之資當述作之任而縟儀未紀乞命官為紹興郊廟奉祀禮文以續元豐之書上納之孝宗乾道八年太常卿黃鈞奏切謂禮莫重於祭祭莫重於嚴分而辨上下伏見四孟月大駕詣景靈宮朝獻皇帝與羣臣俱拜於庭求之禮經有所不合欲遵元豐之制每遇孟月朝獻褥位于東階之上西向乞於見今朝享儀注內修定施行詔從之光宗紹熙二年正月詔朕惟廟祧之制禮經具存迭毁所以明世數逺近之常不遷所以昭祖宗功德之盛祖則惟一宗無定數昔商三宗及周文武質諸載籍世世尊祀粵惟國朝率循是典太祖太宗恢開創之丕圗真宗仁宗茂守文之鴻業暨于神宗厲精政治景祐元符載頒詔旨一祖四宗萬世不祧亶謂盛矣肆我髙宗聖神武文憲孝皇帝天錫勇智沉幾深略真不世世武以撥亂文以致平中興之烈髙掩武丁內禪之意有光放勳文功數十不能盡宣仙馭賔空威神如在至尊夀聖皇帝稽六藝之文安在天之靈厥既尊為髙廟而以時升祔矣惟是不祧之典猶未遑議顧豫凉菲實奉蒸嘗兹用虔遵聖父之訓丕昭烈祖之光然而事大體重匪朕敢専宜令禮官詳議以聞宋朝宗廟裁製興國二年禮院言按唐制長安太廟凡九室皆同殿異室其制二十一間四柱東西夾室各一前後靣各三階東西各二側階即今太廟四室每室三間將來太祖升祔共成五室欲請依長安之制東西夾室外分為五室每室二間詔恭依至道三年又增太宗一室遂於東西各增修一間以藏冊室景德二年十一月詔宗廟神食禮料委光祿寺精細簡擇宮闈令㸃檢饌造皇祐三年判三司磨勘同李徽之言國家以火德王火生於寅王於午今太廟西向開門宜毁去以避申酉之位帝曰徽之家世儒臣所言乃同巫祝然事緣宗廟亦當下太常宗正寺詳定既而上言今太廟設西偏門所以邀止車馬而南向自有正門徽之所請事涉不經不足采用從之嘉祐八年修奉太廟使蔡襄以太廟八室圗奏御請廣廟室并夾室為十八間從之宋朝親饗乾德元年十一月帝以親行郊禮服衮冕執鎮圭行享禮於四室注自是親行郊祀前一日朝享太廟如儀開寶九年三月以將幸西京四月雩祀于南郊詣太廟行享告之禮舊儀將有事于南郊必先告太廟至是以將赴西京不欲載神主偕行故禮官議行此禮是日帝常服乘步輦列仗衛百官班於庭不設樂垂止一獻不行祼禮不飲福酒不祭七祀端拱二年七月內出御札以八月內親享太廟以今歲為大有年令所司詳定儀注有司言按乘輿鹵簿有大駕法駕小駕之别自東漢以來大駕以郊天法駕以享宗廟小駕以行幸又唐禮大駕郊天法駕祀明堂小駕拜授及行幸將來享廟請用法駕鹵簿既而以彗出東方下詔罷禮祥符五年閏十月以聖祖降詔詣太廟行告謝之禮命置五使如郊禮有司言用享禮一獻庭設宮架殿上登歌無二舞帝欲重其事乃備三獻李宗諤上奠獻登歌瑞安曲樂章是月七日恭謝太廟六室帝作奉先歌羣臣畢賀慶歷三年蔡亶言周制四時享親之禮有九今寺觀則車駕一歲再臨未嘗薦獻宗廟帝謂輔臣曰朕三歲一祠郊廟而賚及天下今若嵗嵗親行則人皆有覬賞之心朕朝夕奉三聖御容於禁中未嘗敢怠也嘉祐七年八月詔凡因郊親享太廟舊用犢一今用羊七豕七孟享臘享舊用羊二豕二今用羊七豕七禘祫攝事舊用羊四豕四今用羊七豕七皇后廟孟享臘享舊用羊一豕一今用羊四豕四髙宗十三年正月己亥上親享太廟先是隂雲欲雪至此日霽霧澄皆誠孝所格王賞請宣付史館從之祝文端拱元年祕書監李至言著作局撰告享宗廟及諸祠祭祝文稱尊號唐室以來惟開元禮有之稽古者以為非禮㑹昌中從禮官議但稱嗣皇帝某則其祝文久不稱號明矣且尊號起於近代請舉舊典告享宗廟稱嗣皇帝臣某諸祠祭稱皇帝斯為得禮從之正辭録端拱元年兼祕書監李至上言祭祀祠辭皆臨事撰進多不合典禮乃取舊祠一百九首增撰八十四首自為正辭三卷上之凡百九十三首八十四新製餘因舊辭詔永為定式祥符五年十二月詳定所言正辭録祝文今請定前代帝王名臣稱號上從之凡祝祠皇帝親祀則書之冊封禪用玉餘用竹皆中書省書之有司常祀則書之板祕書省書之嵗之常祀率用舊文其特祭如有祈請命學士撰進羣書考索卷三十
