body:
  text: 羣書考索後集卷六十一宋章如愚編財用門鐵錢虞夏之時鏐鐵之貢載於書漢武帝之世孔僅籠鹽鐡郡國置鹽鐵官昭帝時賢良文學之士願罷鹽鐵桑𢎞羊難以為足國安邉之本不可廢元帝雖罷而尋復後漢公孫述廢銅錢置鐵錢官百姓貨幣不行梁武帝普通中罷銅冬鑄鐵錢而易得人皆私鑄及大同以後所在鐵錢遂如丘山物價騰貴交易者以車載錢不復計數而商旅姦詐之徒因之以求利矣唐初銀銅鐵錫之冶一百六十八陜宣潤饒衢信五州鐵山五憲宗元和中鐵二百七萬斤宣宗裴休請復鹽鐵使以供國用増鐵山七十一嵗率鐵五十三萬二千斤五代呉越主洪佐議鑄鐡錢其弟洪億言鑄鐡錢有八害乃止宋朝慮銅錢之出蕃界故于沿邊之地如川如陜如淮並用鐡錢興州有濟衆監三萬九千嘉州有豐逺監四萬邛州有恵民監十二萬岷州有鎮錢監十二萬五千此鐡錢之所由立也太宗太平興國二年樊若水言江南舊用鐡錢於民非便望於鼎州饒州産銅處鑄錢即令諸州鐡錢為農器以給河北諸州流民之歸附者詔從之先是李煜據有江南之地國用窘乏建隆四年其大臣韓熈載請鑄每十錢即以鐡錢六權銅錢四而行至乾徳開寳中遂不用銅錢十直鐡錢十及李煜歸朝鑄錢益無用至是復用錢民甚便之興國四年詔先禁銅錢不得入劔南界宜除之自今兩川民許雜用銅鐡錢其銅鐡即不得出他境邊郡諸疆界謹視之興國五年張諤言川陜民鐵錢十直銅錢一輸租即十取二自平蜀失於裁制物價滋長鐵錢彌賤舊夷人銅一斤給鐵錢二百望増為千錢可以大獲因而鑄錢詔夷人銅一斤給鐵錢五百從之興國七年詔諸州輸稅依舊止納鐵錢偽蜀廣政中始鑄鐵錢毎鐵錢一千兼以銅錢四百凡銀一兩直錢千七百絹一疋直錢千二百而鐵工精好始與銅相亂既平蜀沈倫等悉取銅錢上供及増鑄鐵錢易民銅錢益買金銀装發頗失裁制物價増長尋又禁銅錢入川界鐵錢十乃直銅錢二至太平興國四年始開其禁令民輸租及㩁利每鐵錢十納銅錢一時銅錢已竭民甚苦之商賈争以銅錢入川界與民互市每銅錢一得鐵錢十又四其明年轉運副使右賛善大夫張諤言舊市夷人銅斤給鐵錢二百望増為千錢可以大獲因復鑄銅錢民租當輸錢者許且令輸銀及絹候銅錢多即漸令輸之詔許市夷人銅斤止給錢五百然卒難得銅而轉運副使右補闕聶泳同轉運祕書丞范祥皆言民樂輸銅錢前毎嵗逓増一分後十嵗即全取銅錢詔從其請祥因以月俸所得銅錢市與民厚取其直於是増及三分民蕭然益苦之或剜剔佛像毁噐用盗發古冡纔得銅錢四五坐罪者甚衆知益州工部郎中辛仲甫具言其弊乃詔使臣吴承勲馳傳至成都府審度利害仲甫集諸縣令佐問之或潜持兩端莫敢正言仲甫責之曰君等御前及第天子門生何得不為長久計反畏聶補闕范祕丞乎乃皆言其不便召聶泳范祥及東川轉運使覃同轉運卜倫皆下御史獄泳覃杖脊配役将作監祥倫免為庶人覃倫亦以月俸銅錢市與民厚取其直故也興國八年奚嶼言福建諸州少銅錢請於建州鑄大鐵錢從之以太平通寳為文與銅錢並行尋以不便廢之興國九年詔川陕路舊許以鐵錢四百易銅錢一百今罷之先是西川轉運使劉度建議如此至是鹽鐵使明言官既換易即私下必更増添銅鐵錢遂至長起物價乞降估之諸物價錢各仰本處檢㑹未使銅錢之時近年時估物價曉示指揮買賣之人不得違越若或减價一任隨時勑命纔行人心以泰能久曉示固是永便公私切知近來漸増物價乞申舊詔從之淳化二年趙安易上言劔南東西川鐵錢甚賤物騰民困請如劉備時錢十當百事下集議李惟清言非便不從乃遣安易往川陕路鼓鑄嵗終纔得三千餘貫衆議以為非罷之咸平三年兩京左藏庫王允恭言川陜民田之稅皆輸銅錢之一今輸鐵錢之十且民入田稅以一為十官失其九矣吏卒俸給増一為五又失其四矣吏卒得用十復失其半矣且饒信之銅積數千萬若運峽蜀俾䕫益逐路各置監鼓鑄嵗用均給不及十日悉用銅錢矣義雖未用然自吏卒俸給始改用鐵錢之十易銅錢之一景徳二年知益州張詠上言受詔與轉運使黄覬同裁度嘉卭二州所鑄景徳元寳大鐵錢令依福州鐵錢每貫用鐵三十斤取二十五斤八兩成直銅錢一小鐵錢十相兼行用甚便從之已上並㑹要祥符六年益州路轉運使趙稹上言兩川大鐵錢公私未便見管銅數頗多欲鑄成大銅錢一以當十命三司相度利害以聞㑹要祥符七年益州凌榮等請鑄大鐵錢每貫重十二斤兩以一當其使舊錢亦仍舊行用從之先是西川小鐵錢每十當一貿易甚便其後别鑄大錢每貫重二十五斤每一當小錢之十三司言有盗鎔大錢二十五斤範為器用鬻其直二千故盜鎔者衆榮言錢輕則行者賫鐡少則鎔者自息故請改鑄㑹要天禧五年鑄鐵錢有三監卭州曰恵民嘉州曰豐逺興州曰濟衆益州雅州舊有監後廢之大錢貫重十二斤十兩以準銅錢歳鑄總二十一萬餘貫銅錢行於天下鐵錢止於川陜長編仁宗慶歴八年奎復奏晉澤洛三州及威勝軍實録云在五年日鑄小錢獨留用河東而河東鐡錢既行盜鑄錢者獲利十之六錢輕貨重其患如陜西言者皆以為不便知并州鄭戩六年二月戩知并州請河東鐡錢且以二當銅錢一行一年人以三當一或以五當一罷官爐日鑄但行舊錢知澤州李昭遘六年四月昭遘知澤州亦言河東民燒石灰家有槖冶之具盗鑄者莫可詰而契丹亦能鑄鐵錢以易並邉銅錢而去所害尤盛長編翰林學士張方平宋祁御史中丞楊察與三司使葉清臣先上陕西錢議曰六月乙未闗中用大錢本以縣官取利太多致奸人盗鑄其用日輕比年以來皆虚髙物估始増直於下終取償於上縣官雖有折當之虛名乃受虧損之實害救弊不先自損則法未易行請以江南儀商州大銅錢一當小銅錢三又言奸人所以不鑄小鐵錢者以鑄大銅錢得利厚而官不必禁若鑄大銅錢無利又将鑄小鐵錢以亂法請以小鐵錢三當銅錢一既而又請七月辛丑河東小鐵錢如陕西亦以三當一且罷官所置爐朝廷皆施用其言自是奸人稍無利猶未能絶濫錢也其後詔商州罷鑄青黄銅錢皇祐二年二月又令陕西大銅錢大鐵錢曰一當二嘉祐四年二月盗鑄乃止然令數變兵民耗于資用類多咨怨久之始定長編嘉祐四年詔如聞陕西民間多濫鑄大錢以故市易不通其以見行當三大鐵錢並當小鐵錢之二本路官員已支三月俸者即計其數貼支長編先是議者欲變大鐵錢當一提㸃刑獄陸詵言民間貴小銅錢而賤大鐵錢他日一當三猶輕之今令與小錢均直則大錢必廢請以一當二則公私所損無幾而商賈可以通行兼盗鑄計其物直無嬴則必自止而陕西舊藏饒州大錢闊緣民間久不敢用今既無盗鑄則亦可以兼行四者皆便又言既更錢法前曰民負官緡者法應如數追納望分蠲其一詔悉行之自是盗鑄乃止然人之數變兵民耗于資用類多咨怨久之始定神宗熈寧八年永興軍等路轉見管私鐵錢轉運司九萬餘緡常平司十一萬餘緡并買民間私鐵錢數十萬斤並當改鑄省様錢欲除永興軍河中陕西銅錢監添匠鼓鑄外更于商虢洛南増置三監耀鄜權置兩監共九監鼓鑄永興鄜耀河中陕去鐵冶逺第改鑄偽錢一年可畢商州洛南華虢最近鐵可以久行鄜州等五處候改鑄罷工匠併入商州等四監然後専鑄大錢從之仍委皮公弼總制營辦先是安撫轉運司出牓收買四等私錢一切禁㫁舊通用錢而以銅錢易之以官庫見管并換到通用私小錢重行鼓鑄而熊本以為如此則公私未便乃下逐司申明前後條約唯揀鈌薄漏貫字様不明等私錢犯者依法施行入官銷毁應自來通用錢並令行使如故其官庫不堪用鐵等錢即别置錢監増圎物料比省様微如别異鑄熈寧重寳詔逐司具官私合改錢數各計若干及如何措置以聞至是轉運司條具來上故有是詔熈寧八年三月丁酉詔秦鳯等路都轉運司相度所鑄大鐵錢約補足所廢監錢數外不須廣鑄委熊本總制營辦岷州置鑄錢監令知熈州髙遵裕轉運副使張穆之提舉以遵裕言威逺監所鑄折二錢用工少而得利多今岷州鐵冶暴發若増置一監歲可得緡錢四十萬故命置監焉后賜監名曰熖山熙寧八年十二月是月復雲南軍雲安監置舒州同安監京兆華耀陜州鑄錢監熈寧九年四月永興軍等路轉運使皮公弼言比者改鑄私錢悉為省様盗鑄屏迹人情少安今又許通使私錢恐盗鑄復起錢色經久難辨詔三司指揮汪輔之所簡可用鐡錢未得通行先具數以聞熈寧九年七月丙子詔訪聞陜西自罷監錢後軍民交易尚為兼并之家不肯以省様鐡錢與銅錢一般行使令兩路轉運司分明牓諭後如有所犯即行嚴斷仍令衆五日熈寧九年九月中書言陜西官司所納不堪用私鑄錢百一十五萬九千八百餘緡初言止有二十餘萬緡一年可改鑄畢今其數乃如此又稱每年止鑄大錢九千一百五十餘緡其違法納私錢官司欲令三司依法施行從之熈寧九年侍御史周尹言臣聞錢幣之用古者或謂之泉欲其流而無滯或謂之布取其周遍而平均臣去冬奉使經由永興秦鳳路伏見盗鑄錢不少問其本末蓋是錢法用一當二鐵錢易得而民間盗鑄者費少利倍又訪聞得所在官中積貯者約有數百餘貫民間收藏者猶不在其數縁上件錢貨起初原以一當十後来减為折三近嵗又作折二已于國家重貨十損其八若更作一文行用即又損一分所以不敢輙有奏請昨來朝廷差汪輔之往逐路揀選鐵錢萬數不多合三司指揮更不行用仍令改鑄就令改鑄務監毎一日鑄及三千貫即一年之内除節假旬假實有三百日課程約只見九千萬貫以來計三二年間未滿數百萬貫况日課未必及三千貫之數也若改鑄之法或只仍舊作折三即民間私鑄定亦不可止絶臣欲望将折二鐵錢更不别行改鑄亦不須揀選起自今後只作一文行用則盗鑄者所獲之利不充所費自然無復冐禁作過嵗重辟而農商省交易獲泉貨通流之利且約官中所有止就四百萬貫言之若以二為一即猶得二百萬貫之數致力簡省便可行用六月熈寧十年六月壬寅三司言鑄大錢欲乞但依舊額今後如有添鑄乞除陕西河北河東外諸路並鑄小錢又言河北西路轉運司請于邢磁州置監鼓鑄折二錢十萬貫今相度欲於永興軍路鑄折二錢十萬貫却於河北西路添鑄大銅錢並從之元豐元年八月乙丑利州路轉運司言興州濟衆監每嵗舊鑄錢四萬一千緡計支本錢二萬四千緡得息萬七十緡應副茶場司今若依偹宗閔奏請増鑄常使錢三萬一千緡通舊鑄及額錢總七萬二千餘緡共支本錢四萬二千三百餘緡可得息錢三萬緡其宗閔所乞鑄一半大錢欲並鑄折二大錢不惟便於行用兼省工費得收息入茶場司足用及限一年撥還本錢從之仍令止鑄本路見使錢元豐六年陕西轉運司言同州韓城縣山鐵礦盛苖脉深厚可置錢監及渭州華亭縣博濟監因循廢罷欲於黄石河鑄冶務復置監廢秦隴州鐵監從之元豐七年京東路都轉運使吴處厚言徐州利國監鐵柔良堪用乞置寳豊下監毎嵗除供給公使外鑄折二錢三十萬緡委請河輦運司以次附𢃄上京寄納却令三門輦運司具舟載至河中府因回脚鹽車入陜府轉移用度嵗嵗如此不為無助乞從臣相度條畫立法詔畫二合費用及自利國監至京脚直以聞今約鑄折二鐵錢二十萬緡當費用及至京師直計萬五千四十緡詔付户部闗工部並如居厚所奏哲宗紹聖三年七月三省言陜西路比年鐵錢益輕鈔價踴貴公私受弊詔度支郎中任公裕與都大提舉成都府利州陜西等路茶馬事陸師閔同本路轉運司相度措置講究利害先是上問於曽布曰陜西錢輕欲變法鄭雍欲給鈔安燾云只是富得百姓雍不曉布曰六貫鈔見賣十三貫正當給鈔以平鈔價鈔價减則鐵錢重鹽課増商旅行人不食貴鹽未見其不可與其欲减鐵錢以兩文當一公私坐耗其藏鏹之半未見其利百姓固欲其富何可使貧兼未見其但富百姓而有害於公家因言燾素不曉事恐其言未必可取也上曰燾與張惇皆以為不可布曰但令條陳其不可之狀則利害可見矣上又曰錢法恐須變布曰此事體大臣不敢輕議鄭戬在河東變鐵錢以三當一當時人情極洶洶不安今日遽變坐耗公私之半必更沸騰臣未知的確利害不敢以為可變况今鈔沙已弊給鈔以救錢輕之患正是今日所宜雍之說恐可行爾長編徽宗大觀元年詔河北昨鑄夾錫當五錢其様製大小類當十銅錢若或行用姦民趍利染為銅色私作當十難于驗察宜改鑄當二自今可令計備物料廣鑄當二以足一路之費長編夏四月大觀元年詔曰錢為國之利柄以方圎銖兩而寄富貴貧賤之權若為衆庶所操則利柄失矣今淮浙福建官吏曠職縱姦弗戢盜鑄公行有誤良民公然受弊其令監司相度以官錢為様垂之市肆告諭民戸有不如様限一季投納官以一償五限滿不納加罪一等仍以所納錢更鑄補還出榜告諭使長知之長編大觀元年丙申詔東南依已降分數指揮鑄小平錢崇寧監只鑄當十錢長編九月大觀二年御筆陜西轉運判官張摶新進鑄錢錫鐵錢様使錫少鐵多既多必暗與盗鑄者真偽難辨可只依舊鼔鑄不得裁减仍速行下御筆比以四川鐵錢猥多錢輕物重若更許陕西鐵錢入川行用則弊益以輕物益以貴非平價裕民之道其陕西鐵錢可更不許入川行用長編大觀四年春詔與物同少則貴多則賤當十錢法行之方定鑄而不絶源源而來數既多法隨而弊私鑄復興混殽無别其法必壊非長久之術舊鑄錢監並依舊額止鼓鑄小平錢其后降指揮改鑄當十錢數等並罷新置河東河北陜西諸監鼓鑄當十銅錢夾錫鐵錢可罷鑄當十銅錢外仍尚書省取索如新監無鐵炭不可鼓鑄去處相度减罷外有合存留者擬定将上取㫖仍令開封府立法行下長編大觀四年秋七月張商英言當十錢為害久矣舊小平錢有出門之禁故凡四方客旅之貨交易得錢者必大半入中求鹽鈔收買誥牒而餘錢又流布在市井行鋪故上下内外交相利養自當十錢行以一夫而負八千則為小車八十千錢輕齎則告牒為滯為貨鹽鈔非得虚擡之息則不行臣今欲權借内庫并宻院諸司應于封樁絹紬金銀井鹽鐵即下令折十餘錢盗鑄偽濫有害錢法限民間半年於所在送納每十貫支給銀絹一匹一兩限滿其錢更不行用候錢入官擇其惡者鑄小平錢存其好者折三行使如此則錢法鈔法不相低昻可以復舊其銀絹等止是權借半年以上候收到錢撥還長編大觀四年張商英言臣按唐明皇開元中姚崇宋璟為宰相出米萬石收惡錢又以好錢三百文換惡錢一千改鑄二銖四參錢昔之賢相救弊規畫計不出此當十錢自唐以來為害甚明行之於今尤見窒礙監小平錢出門有限有禁故四方客旅商貨交易得錢者必入中末鹽鈔收買官誥度牒而餘錢又流布在街市民間故官私内外交相利養自當十錢行一夫負八十千小車載四百千錢既為輕齎之物則告牒難售鹽鈔非操虚錢而得實價則難行重輕之勢然也長編大觀四年張商英言臣昨奉聖言元豐庫樁小平錢一千五百萬貫外餘聴出入以平錢鈔物三者之價臣不量力願任其責今欲先給鈔五百萬貫付陜西轉運司令分劈於五路沿邉收糴斛斗充代近裏州軍等第戸久來支移租賦之數却令近裏等第户依數送納價錢假如毎名支移嵗費一百貫今三分損一以恵之則其利有三京庫出鈔以飛當十錢其利一也以實鈔糴斛斗則商旅不擡虚價以合鈔面其利二也等第戸免支移陪費而鐵錢輸官以待移用其利三也臣既任此則是遣一腹心人往計㑹孫琦等宻令通知供具五路毎年支移若干斛斗於某州塞實計地里逺近民間毎石并脚乗實出若干錢急速回報今踏逐得奉議郎桑景詢幹敏精悍有心力欲就差本人充陕西路轉運司幹當公事長編政和四年庚辰陕西轉運司奏本路見行使舊大鐵錢其錢係慶歴至和熈寧元豊元祐紹聖元符聖宋字號者即見行使夾錫錢無上件年號民間易為辨認不至疑惑外只有政和通寳一色錢與政和通寳錫鐵錢文様製相類致或夾𢃄般販混雜行使申乞施行尚書省勘㑹夾錫錢諸路行使已各快便唯是陜西路般販舊大鐵錢夾𢃄流傳入諸路與夾鍚錢混雜行使致害錢法欲自今降指揮到日其政和通寳舊大鐵錢官私更不行使均撥赴逐錢監改鑄夾錫錢民間仰限一季并齊赴逐處官司納換從之長編政和五年乙邜奉議郎權提轄措置陜西路坑冶催促鑄錢兼措置川路坑冶蒋彛轉一官彛自言政和四年鐵錢五百三十七萬一千八百貫除支破物料及諸色縻費本錢外實收净息錢三百七萬四千八百貫敷及年額故也政和五年庚寅臣僚上言政和元年已後夾錫錢嘗與舊鐵錢一等行使仍不得别稱呼政和二年朝廷興復鐵錢夾錫錢當銅錢二文而元初寄賣典質之家往往相繼理索收贖歸還者謂當紐折理索者欲依元數縁此紛紛争訟不已當職官又各依違含糊不為辨白止令在外詳議元稱鐵錢即令中半交還元稱錫錢即令還錫錢元稱鐵錫錢方依今來見行錢法紐計本路漕司約束自違錢法謂政和三年五月五日興復錢法以錢典過産業地土今来收贖如元交錫錢自合用錫錢收贖臣契勘鐵錫錢一等行使自錫與鐵錢不異政和三年以後興復錢法錫錢當銅錢二文彼時此時自有輕重今後收贖理當明白曉諭合依見行錢法施行從之孝宗淳熈十一年十二月己卯進呈觧元振奏乞令光州依舒州靳州置監鑄鐵錢上曰此事難行后次鑄到鐵錢時可令分二三萬與光州史臣曰弊多則錢益輕而物重况以鐵為幣又非銅比也鐵之價賤于銅而又多鑄焉其輕也必矣夫以事揆事則慮有遺策以理揆事則物無遯情雖事物之微而皆有以察其利害之實神聖之明天下誦之為不可及矣聖政羣書考索後集卷六十一
