body:
  text: 羣書考索别集卷十宋章如愚撰經籍門春秋春秋有言外之意春秋之書當時天下大亂聖人且據實而書之其是非得失付諸後世公論蓋有言外之意若必於一字一辭之間求褒貶所在切恐不然文公語褒貶極是嚴謹春秋之作蓋以當時人欲橫流遂以二百四十二年行事寓其褒貶極是嚴謹一字不輕易若如今之説只是個權謀智略兵機譎詐之書耳同上大旨不専於法例春秋大旨其可見者誅亂臣討賊子內中國外夷狄貴王賤伯而已未必如先儒所言字字有義也想孔子當時只是要備二三百年之事故取史文寫在這裏何嘗云某事用某法某事用某例耶且如書會盟侵伐大意不過見諸侯擅興自肆耳書郊禘大意不過是會僣禮耳至如二十四卜牛傷牛死是失禮之中又失禮也如書不郊猶三望是不必望而猶望也如書仲遂卒猶繹是不必繹而猶繹也如此等義却自分明同上經世之大法四代之禮樂此是經世之大法也春秋之書亦世之大法也然四代之禮樂是以善者為法春秋是以不善者為戒同上春秋之大旨正誼不謀利明道不計功尊王賤伯內中夏外夷狄此春秋之大旨也先生每言近世解春秋者以所書之字為褒貶深所不取同上春秋垂萬世法孔子作春秋以討亂賊致治之法垂於萬世是亦一治也孟注春秋始於平王平王東遷而政教號令不及於天下黍離降為國風而雅亡春秋魯史記之名孔子因而筆削之始於魯隱公之元年實平王之四十九年也同上討亂臣賊子之法邪説害正人人得而闢之不必聖賢如春秋之法亂臣賊子人人得而誅之不必士師也同上傳例不可信春秋傳例多不可信聖人記事安有許多義例如書伐國惡諸侯之擅興書山崩地震螽蝗之類知災祥有所由致也同上代王者賞罰之柄周衰王者之賞罰不行乎天下諸侯擅相侵伐強陵弱衆暴寡是非善惡由是不明人欲肆而天理滅矣吾夫子憂之乃因魯史而修春秋以代王者之賞罰是是而非非善善而惡惡誅姦諛於既死發潛德之幽光是故春秋成而亂臣賊子懼文公讀溫公辨李公常語上紀事之例不同春秋一事各是發明一例如看風水移步換形但以今人之心求聖人之意未到聖人灑然處不能無失耳文公答柯國材不明書召王之非春秋某所未學不敢強為之説然以人情度之天王狩于河陽恐是時史策已如此書蓋當時周室雖微名分尚在晉文公召王固是不順然史策所書想不敢明言晉侯召王也文公答張元德讀者須反復㴠泳此經固當以類例相通然亦先須隨事觀理反復㴠泳令胸次間濶義理通貫方有意味若一向如此安排説殺正使在彼分上斷得十分的當却於自己分上都不見得個從容活絡受用則何益於事耶文公答魏元履春秋之文兼述作春秋之文兼述作也按舜典紀元日商訓稱元祀經書元年所謂祖二帝明三王述而不作者也正次王王次春乃立法創制裁自聖心無所述於人者也體元人主之職調元宰相之事即位二年必稱元年者明君人之用也大哉乾元萬物資始天之用也至哉坤元萬物資生地之用也成位乎其中則與天地參故體元者人主之職而調元者宰相之事元即仁也仁人心也春秋深明其用當自貴者始故治國先正其心以正朝廷與百官而逺近莫不一於正矣仲尼晚年而後修春秋夫子之修春秋何其著辭之嚴而措意之密也按夫子世家載晏子問禮之年聖人時既有立矣而春秋不作於此時歷聘諸國年踰知命而春秋又不作於此時逮哀公十四年聖人幾七十餘矣因西狩獲麟乃約魯史而修春秋聖人胡不著心於心壯志鋭之年而乃拳拳於血氣既衰之後邪蓋聖人惟恐更天下之事故為未深閲天下之理義為未熟則未敢恃一己之私見而立萬世之正論也春秋大一統議常經者黜百家尊孔氏不在六藝之科者勿使並進此道術之歸於一也言致理者欲令政事皆出中書而變禮樂革制度則流放竄死之刑隨其後此國政之歸於一也若乃尊私門廢公道各以便宜從事是人自為政繆於春秋大一統之義矣夫子自序其績威公以義責楚而楚人求盟夫子以禮責齊而齊人歸地皆書曰來序績也春秋夫子之筆削自序其績可乎聖人會人物於一身萬象異形而同體通古今於一息百王異世而同神定元正元年必書正月謹始也定何以無正月昭公薨於乾侯不得正其終定公制在權臣不得正其始春秋兼帝王之道唐虞公天下則相禪而與賢三代家天下則相繼而與子春秋兼帝王之道可公也則以達節為權故季札辭國貶而稱名可家也則以居正為大故莊公始生即書於策平王末年誥命不足紀而後春秋託於紀事之史書止於文侯之命而春秋起於平王之末年其誥命不足紀而後春秋託於紀事之史乎且文侯之命之存於書已非灝灝之舊矣夫天子命諸侯曰伯父叔父可也顧父義和而字呼之得無降尊貶重乎又况錫圭瓉則是使之禋祀也賚弓矢則是得以専征也國之大事惟祀與戎而又輕以示錫賚之恩乎考其一篇之命不惟褻天王之威重而且開諸侯之僣端是猶初年之出命也顧已若此逮夫末年以天王之尊使其宰下賵諸侯之妾而祭伯之來初非有王命陵夷之勢遂至於此故書之文侯之命有以見帝王而下世變風移將降而為春秋戰國也春秋起於平王之末年有以見帝王以來風聲氣習不復返於春秋之世也嗟夫周書終而春秋始其殆黍離降王而國風歟春秋多貶僖公詩多美僖公魯頌四篇皆為僖公作也僖公其魯之賢君歟考之春秋閔雨喜雨有志乎民則愛民重榖不為無其事所謂淮夷攸服獨嘗會於淮耳新書南門則書之修泮宫無見也取濟西田則書之復周公之宇無有也四卜郊不從乃免牲猶三望則書之所謂享以騂犧殆有時而不然也詩之刪春秋之筆削皆出於吾聖人之手春秋直書而詩多溢辭何歟説者曰僖公之為君功過相半者也詩不刺滅項伐邾之失懼其以過掩功春秋不書修泮伐淮之美懼其以功掩過詩寬而春秋嚴皆所以為教也噫是則然吾姑以春秋論僖公或者魯頌之美生於不足歟哀公之春秋多遺意傳春秋者嘗曰定哀多微辭吾觀哀公之春秋未始不戒其往而開其新辭甚著明而何微之云且春秋書災多矣今而威宫僖宫書災亳社書災夫豈偶然耶春秋書外國之伐亦多矣今而書吳伐我齊國書帥師伐我夫豈闕其地耶春秋書螽亦多矣今而十二年冬十二月書螽明年九月書螽冬十二月又書螽夫豈失閏耶季氏出於威公立於僖公而奕世専魯之政者也故威僖親盡而廟不毁然則二宮之災天以戒季氏之強盛也明矣諸侯之有商社所以戒亡國也魯有季氏國其將亡乎然則亳社之災天以戒魯之危亡也亦明矣聖人詎不明書而警之哉元年以來三家相尋於伐邾為功以會吳為好而不知我能伐邾吳能為邾而伐我我能會吳伐齊齊能以師而伐我是興師之由不知在吳與齊而常在我也惟干戈省厥躬哀公可以自省矣昔人詎不明書以警之哉二吾猶不足哀公之意也欲以田賦季孫欺之意也田賦甫用而連年病螽則重賦害民傷和致異可見矣一諉諸失國殆非也聖人詎不明書以警之哉吾將謂哀公之春秋非多微辭而實多微意也王臣聘魯者八古者諸侯朝於天子天子報聘於諸侯所以嚴君臣之分道上下之情也東遷以來王綱不振諸侯未嘗朝天子而遣使聘魯者八春秋備書之者所以忿諸侯之不臣而悼周室之弱也然桓王在位凡聘於魯者五自隱七年凡伯來聘至桓八年家父來聘是也至若惠襄定三王皆不過一聘而止耳桓繼平而立王室雖衰人心未厭周德猶可以興衰振治統制四海光昭文武之業使周道粲然復舉不亦美乎不此之務反同列國之君下聘魯國長諸侯傲易之心寵桓公篡逆之志造端於後蓋自桓王始也雖然春秋自宣十年定王使王季子來聘之後魯歷五公周更四王皆無來聘之文何哉蓋文宣已前周室微弱然莊僖之際尚有二霸為之扶持禮文猶足以交諸侯爵命猶足以寵諸侯也至文宣之後二伯既逺王室多故故定王初立楚使問鼎已有窺周室之心而當時王臣有卿士而相賊三公而出奔者則周室之衰尤甚於前是以春秋之書來聘則止於宣公來錫命則止於成公來求則止於文公來聘則止於宣公者自宣以後雖有禮文不足以結諸侯也來錫命則止於成公者自成以後雖有爵命不足以寵諸侯也來求則止於文公者自文以後天子雖求之諸侯亦忽之也然天子之聘皆遣大夫唯僖三十年獨遣宰周公留稱天王使惟莊二十三年獨不稱天王使蓋亦有説魯之羣公唯僖最賢且與二伯盟會扶奬王室不為無助故特以三公下聘者加禮於僖公也當莊十九年五大夫作亂立王子頽王出奔溫至二十一年鄭虢納之乃克歸周故二十三年祭叔來聘不言天王使蓋以天王之尊而見逐於臣下傷其威柄不足以使人也嗚呼遣使致聘諸侯敵國之禮也故經書外臣來聘三十有一若宋衛諸國與魯為敵是以有聘問之好至邾莒滕薛則朝而不聘莫敢伉魯矣嗟夫東周之初自桓至定交好諸侯尚能同於列國至其甚也雖聘問且不敢致僅昉邾莒等耳不亦可痛哉天王來求者三先王制九等之賦貢以令天下無有逺邇畢獻方物是以車服器用非特供王之奉而又可班寵邦國也聞有錫諸侯而未聞有求於諸侯者也周室既衰封土之君各擅其利貢賦不入帑藏蕭然雖喪紀之具車服之用且不得自給切切然遣使以求之蓋其勢有不得已也是以經書天王來求者三在桓王時則求賻於隱公求車於桓公在頃王時則求金於文公且天王即位諸侯會葬禮也平王之崩隱無痛君之心輒墮此禮至使天子大夫逺來求賻其罪大矣况隱元年惠公仲子之賵天王尚使宰咺歸之政使敵已猶當復報而况天子之尊乎周知有魯魯不知有周則隱公之惡不容誅也及桓即位數年之間天子三聘其待遇之禮可謂厚矣桓公曽無毫髮之功而致天子之使求車於魯其不恭亦甚矣且車服者人君錫賜臣下所以崇功德隆寵眷也今反求之於諸侯則知四方之貢久絶於王庭矣雖然求賻求車猶可也至於求金則又甚焉説者以為襄王未葬而毛伯來求金故春秋書之以著其惡夫賻不過用於喪禮車不過用於出入禮以不給而求之猶未見其困弱也至於金則王之所資莫急於此今且求之其困乏不振至是極矣是以經於求金之文不稱天王使者諱以王室之富而求金若非天王之命也天王來錫命者三昔韓侯能纘祖考勤王室宣王因其入覲而賜命蓋天子之於諸侯蓋有錫命之禮然必有功於王室述職於王庭然後授之可也春秋之時天子錫命者三莊王使榮叔錫命於桓公襄王使毛伯錫命於文公簡王使召伯錫命於成公彼三公者既無功德之可褒又未嘗朝覲天子而周王方且遣使就國錫之是長其驕傲之心也何以勸天下乎然於桓公則稱王於文公則稱天王於成公則稱天子所書之文皆不同何也説者以謂天王天子皆王者之通稱若然則何以見春秋之褒貶蓋嘗論之桓公有篡弒之惡天子所當誅也莊王既不能誅而於其死也反錫命以褒寵之是豈承天之意哉夫天命人主君臨萬方賞善罰惡所以助天之生殺也若有罪不誅而又加賞則是背天者也故經於此不書天王所以甚莊王之不天也至文在位既無大惡是以春秋之書亦無甚貶而正以天王名之然至錫成公命則又稱天子者按覲禮諸侯入郊王遣使迎勞則稱天子既至王庭則稱王以命之蓋迎勞稱天子者謙下之辭也當簡王時周室益弱諸侯愈強故聖人於此特變文示義稱天子錫者以見周之甚微屈於諸侯不敢以王禮自命也嗚呼孔子傷周之意求於筆削可見矣公及大夫朝如者八春秋之時禮法廢壞諸侯視盟主為甚重視天子為甚輕故公及大夫如齊如晉者不可計至於朝王所如京師雖間見之殆不過因事以往而已初非致禮於天子也僖二十八年踐土之盟溫之會兩書公朝王所者是時晉文公伯致天王於會故僖公之朝似從晉侯盟會實非朝天子也成十三年書晉侯使郤錡來乞師公如京師繼之曰公自京師遂會晉侯八國伐秦是時晉厲公初立將有伐秦之役使來乞師成公特往會伐而道過京師故經以如書之實非朝京師也其餘大夫如京師者五或以事往或以私去請據經以辨之僖三十年天王使宰周公來聘公子遂如京師遂如晉文元年天王使毛伯來錫命叔孫得臣如京師左氏謂仲遂之行以報聘於周得臣之行以報命於周考之經文理或然也然宣九年仲孫蔑如京師左氏謂王使來徴聘故孟獻子聘於周襄二十四年叔孫豹如京師左氏謂齊人為王城郟故穆叔如周聘且賀城竊有疑焉夫春秋偹載當時之事以貽後世若周王使來召聘齊人為王城郟經安得而不書哉經既不書則二大夫之行蓋非為周也至文八年天王崩公孫敖如京師不至而復丙戍奔莒左氏謂穆伯如周弔喪不至以幣奔莒夫當文公時臣下専政國君之命已不行於大夫則公孫敖如周不至蓋無足怪矣嗚呼諸侯知有天子則大夫知有諸侯此上下相持之理也彼魯之國君既蔑無周王又安能使魯之大夫受吾命而不廢哉然則諸侯欲令其臣之無他尊天子則臣自服矣又文九年毛伯來求金叔孫得臣如京師辛丑葬襄王諸侯勤王者五古者威權出於一人命令行於天下諸侯有不服也王命方伯以討之嗣位有未立也王命卿士以定之兄弟有惎間之變則有大臣為之鋤治王都有城築之役則有大臣為之服勤當是時內而三事大夫外而列國諸侯莫不聽命於王此其權所以獨尊也東周不競權勢浸微征討之事扶救之功或主於諸侯或主於伯主或出於大夫類借力於人以紓一時之難比之三代雖若不足取而在春秋亦有可言者孔子書之蓋傷周道之衰微幸諸侯之近正也故桓五年鄭伯不朝蔡衛陳從桓王伐鄭經書從王者喜三國之助也書王伐者譏天子之親伐也前所謂出於諸侯者此也僖五年惠王廢太子小白會世子以定其位八年告難於齊小白盟王人以靖其難經書齊侯且序爵諸侯之上者喜其定世子寧周室也書會世子盟王臣者疾其恃伯主之威而姦分也前所謂出於伯主者此也昭二十三年王室有子朝之亂鄭伯言於晉晉大夫帥師圍郊以討子朝三十二年敬王懼子朝之黨使富辛言於晉徙成周而避之晉合諸侯城成周以固周室經書晉人圍郊仲孫何忌會晉韓不信合十國大夫城成周者喜晉大夫有功於王室也専繫之晉而不書王卿士者見天子之權愈微而専假於列國大夫也前所謂出於大夫者此也嗚呼隱桓之間天子雖微而猶有諸侯從王以侵伐者其後諸侯益強蔑視周室幸二伯繼興託名尊周可以倚重下至昭定二世中國無伯諸侯失權而天子遣使請命卒使圍郊之役成周之功歸於列國諸侯之卿豈非衰弱之甚乎王臣與諸侯盟會侵伐者十春秋自隱至閔無王臣盟會之文蓋是時齊晉未伯諸侯雖強亦不敢伉王室也至僖公五年小白會王世子于首止始有王臣會盟之事晉文繼起乃致天子盟王人其事有甚於小白者然考二伯之會盟皆在服楚之後蓋其克服強楚威振中國伯業已盛自矜其功謂雖天子之尊亦莫或忤矣是以偃然致主臣於盟會雖外假尊周之名而其實以尊已也故僖五年小白會王世子盟於首止八年會王人盟於洮九年會宰周公於葵丘二十八年重耳致天王於踐土於溫二十九年盟王人於翟泉夫小白始會世子以定位盟王人以尊周雖不當召從盟會然以扶奬王室託於大義則猶可言也至葵丘之會初非為周而坐致天子之三公與已盟會則其傲易之心尤甚於前矣晉文襲其迹侈其惡是以踐土之盟溫之會皆致天王而翟泉之盟又以諸侯之大夫盟天子之大夫小白雖致宰周公而未敢召天王雖盟王人而未敢以大夫敵之也至晉則以已召君以大夫敵王人恃已威勢直與天子等爾其無君之罪尤有甚於小白也馴致乎成襄之後晉主伯盟更會王人以從侵伐若成十六年會尹子伐鄭十七年會尹子單子伐鄭襄三年會單子盟於雞澤昭十三年會劉子盟於平丘定四年會劉子侵楚凡此皆晉主之而雞澤之盟以去年合諸國大夫城虎牢平丘之盟以楚公子比弒靈王皆合諸侯以謀楚也蓋二伯盟會則假周之名率諸侯以尊已厲公以來則假周之名以伐楚伐鄭故王臣間見於經然始而會盟終而會伐則以周室益衰諸侯益強其伉禮姦義非止於二伯之時也其他諸侯獨盟王人者唯魯文十年及蘇子盟于女粟左氏以謂頃王立欲以親魯故與之盟夫以伯主合諸侯盟會王臣猶且不可况魯國乎然則文公之惡可知矣周戰伐敗救者四周衰夷狄侵侮諸侯暴橫天子之師屢貽挫衄聖人書之於經者四所以甚傷之也隱七年天王使凡伯來聘戎伐凡伯於楚丘以歸成元年王師敗績於茅戎此夷狄之侵侮也桓五年蔡陳從王伐鄭莊六年王人子突救衛此諸侯之暴橫也按經例伐國則稱伐凡書伐者皆重事也而凡伯奉幣以聘非有甲兵之衆安得與伐國同文乎蓋書伐者重凡伯之罪也重凡伯譏天王也自入春秋未有來聘之文今隱公即位未嘗朝周而桓王首聘於魯以長諸侯不臣之心則其非理甚矣故因凡伯聘魯見伐於戎而書伐以重之重桓公之惡則譏桓王可知矣發微謂楚邱衛也稱楚邱者責衛不能救難稱凡伯以歸者責凡伯不能死職理或然也按左氏晉使瑕嘉平戎於王劉康公徼戎將遂伐之叔服諫不聼遂伐茅戎敗績於徐吾氏説者以謂王者至尊天下莫敵非茅戎可得敗也定王庸暗為茅戎所敗惡之大者故經以王師自敗為文所以譏天王也孟子曰天子討而不伐諸侯伐而不討鄭伯不朝王命諸侯討之此古之制也今桓王從三國之師屈天子之尊親伐諸侯效敵國之交兵則傷威毁重微弱甚矣按左氏載王師敗績而經不書蓋諱之也以天子伐之固已可恥况敗績乎此經所以不言也至莊王救衛之師特書王人之字則喜其救者之善也衛朔負罪出奔諸侯黨惡背義納朔於衛時無伯者以討治其惡而王人獨能救衛則其於名義為得正矣然兵寡力弱卒不成救衛之功故聖人雖字以貴之有以傷周室之微不能勝諸侯之惡也嗟乎周之興也玁狁蠻荆逺遁荒陲屈膝效順而九伐之法足以威制諸侯之不臣是以王師一出有征無戰孰敢拒天子之命而干鈇鉞之誅乎及其衰也兵威墮弱戎狄諸侯共起而凌蔑之師出無功動以取敗可勝嘆哉王室總論傳曰王不立愛公卿無私古之制也故昵愛寵私並后匹嫡未有不産禍者觀東周二百四十餘年王室變亂載於經凡四而以嫡庶不分嗣統不正亂者居其二焉襄王嫡子也叔帶母弟也而惠王以惠后之愛欲廢鄭立帶雖賴小白主伯盟會諸侯以定其位而小白既沒卒不免叔帶之難使襄王越在草莾暨晉文紹伯王始克歸然則牽房闥之私情貽社稷之深患者實惠王啓其端也子猛嫡長也子朝庶長也而景王以賓起之請欲廢猛立朝且結劉單以定朝之位及景王即位子朝作亂盤結黨與交兵攘奪者五年五年之間子猛被禍敬王播越賴劉單之賢倚晉為援戡定禍患逐子朝歸敬王而王室始安然則蔽僥幸之私議貽社稷之深患者實景王啓其端也夫以景王乘變亂之際克紹周統劉單數子輔相而立權不在已而不能即去子朝固不可責也而襄王已即君位有齊晉以為倚重叔帶之難非若子朝之強有能斷以大義而懲艾之何至􅀢宗廟而出奔哉奈何徇匹夫之孝牽母后之恩既不能防其未難之前又不能制於已危之後柔懦不斷養成其愆卒至傲弟再入而身遂失守則叔帶之禍非特惠王之罪抑以襄王醖釀之也故經於襄王書天王居於鄭者貶其出也於敬王書天王入於成周者善其入也貶其出則不與其入故經不書襄王之歸至書敬王則雖貶其出而亦謹其入用見聖人去取輕重之異也夫春秋之法凡諸侯之専殺者皆重譏之以其不請命於天子而自専生殺之柄也諸侯専殺其猶不可况王之卿士朝夕委質王庭其分義之親非諸侯之比也詎可以専殺哉而王孫蘇與毛召爭政遂使子札殺之攘君之權莫甚於此以見天子之柄非獨不行於諸侯而且不行於卿士矣故經書曰王子札殺召伯毛伯者罪王子札之専殺所以譏天子之不能制也左氏以儋括欲立佞夫弗知五大夫殺之則殺弟之罪不在王明矣而經書天王殺其弟佞夫者蓋使佞夫果有篡奪之意則殺之固宜今欲立之意出於括而佞夫弗知則景王容之可也及縱五大夫殺其母弟雖曰大夫之罪實景王使之耳春秋之義惟天子得専殺故無天王殺大夫之文此特書之者以見景王尊為天子而不能容一母弟傷艾手足賊恩悖義莫大於此故特書以甚其惡也嗚呼東周之衰也嫡庶之位不正生殺之柄不行兄弟爭國卿士擅權上下相夷無所畏忌王室益衰不可救止為天下之本且如此安能望諸侯之理乎王臣見經者三十一按例天子三公稱公卿書爵大夫字士名士之微者不名所以分等列定尊卑也三公稱公者若桓八年祭公僖九年宰周公成十二年周公是也卿書爵者若隱元年祭伯七年凡伯蔡凡皆伯爵文元年毛伯五年召伯十年蘇子毛召蘇皆采地十六年尹子十七年單子昭十三年劉子子爵是也大夫稱字者若隱九年南季南氏季字桓四年宰渠伯紏渠氏伯糾字五年仍叔八年家父莊九年榮叔二十三年祭叔祭采地文元年叔服宣十年王季子襄三十年王子瑕是也士稱名者若隱宰咺襄十五年劉夏劉采地定十四年石尚是也士之微者不名若僖八年王人是也然隱三年昭二十三年三十六年三書尹氏隱三書武氏子皆以氏稱譏世卿也莊二十六年王人子突微者而特書字善其救衛也宣十五年書王札子大夫而名貶其専殺也唯文三年王子虎定四年又卷皆以卒書名而昭二十三年書王子朝蓋庶子之長也夫列國之君以爵稱其卿以名稱其或見褒者以字稱而天子之卿書爵所以視諸侯其大夫書字所以視列國卿之賢者也其士稱名所以視諸侯之卿也當周室之衰王室雖微而先王之典猶在故孔子必正其爵秩以王人之微必序諸侯之上不使諸侯得加乎天子所以示萬世之法也嗚呼春秋尊王之義雖名爵之間亦不敢忽豈直為虛文哉二霸齊桓公小白會十五莊十三年北杏十四年鄄十五年鄄十六年幽二十七年幽僖元年柳二年貫三年陽穀五年首止七年寧毋八年洮九年葵丘十三年鹹十三年牡丘十六年淮孔子稱齊侯九合諸侯不以兵車考之春秋自莊十三年終僖十六年大會諸侯凡十有五榖云衣裳之會十有一自北杏至葵丘是也兵車之會四自洮至淮是也按二十三年北杏之會左氏謂平宋亂然此會小白未伯而經獨出其爵諸侯皆稱人者先儒謂聖人舉其攘夷狄救中國以尊周室始合諸侯首圗大舉故獨尊小白蓋欲責之深必先待之重也十四年鄄之會左氏謂宋服故蓋宋雖預北杏之會而復叛齊故十四年經書齊陳曹伐宋既伐而宋服故是年為鄄之會此左氏所謂宋服也十五年又會於鄄左氏謂齊始伯也夫齊侯之會已三合諸侯至是而始伯者蓋中國諸侯莫難服於陳鄭今宋鄭再會而陳又始服則小白之伯業成矣此左氏所謂齊始伯也十六年同盟於幽左氏云鄭成也蓋宋鄭兩預鄄會宜其同好相結不復相侵而鄄會始罷鄭乃侵宋故十六年宋齊衛三國伐之於是率諸侯為幽之盟曰同盟者蓋桓自主伯未嘗修盟而宋有二於北杏鄭有二於鄄必待兵威乃始克服齊既服宋鄭非盟無以結之所以稱同盟者以諸侯同志於桓也然魯鄭既同盟而十七年書齊人執鄭詹十九年書齊宋鄭伐魯西鄙者左氏謂鄭不朝齊執鄭詹疑其説未然切意鄭介於楚有二齊之志故齊侯執之既而詹逃於魯此三國所以伐魯也二十七年復同盟於幽左氏謂陳鄭服按二十八年荆伐鄭公會齊侯救鄭則知是盟鄭已服齊也然十六年同盟於幽衛侯與盟而此盟不與故二十八年齊人伐衛討其不與盟也僖元年柳之會左氏謂謀救鄭蓋自二十七年與盟於幽而楚再伐鄭故小白會諸侯謀以救之此左氏所謂謀救鄭也二年貫之盟左云服江黃也三年陽榖之會左云謀伐楚也蓋江黃楚之與國既背楚而歸齊則齊之威德至此為盛於是可以伐楚矣是以四年諸侯伐楚屈完請盟強楚挫辱使斯民免於左衽之患則其功被當時無以加於此者左云謀伐楚蓋在是也然服楚之後齊人執陳袁濤塗及江黃伐陳冬又大會諸侯侵陳則知陳復叛齊矣逮五年首止之會左云謀寧周也陳再見伐與盟首止之會而鄭伯逃歸不盟則鄭又叛齊而從楚也故六年公會齊侯合六國伐鄭而楚人圍許救之七年齊又伐鄭故是年寧母之盟鄭使世子華聽命於會此左氏所謂謀鄭也八年洮之盟左謂謀王室也鄭伯乞盟請服也蓋襄王有叔帶之難故小白會盟以謀之而鄭伯自七年再被齊伐再來乞盟左氏所謂謀王室鄭服者此也九年會於葵丘左氏尋盟且修好然小白九會諸侯莫盛於葵丘而伯業之衰亦自此始故孟子特舉是會以警戰國諸侯而三傳例皆不取經文又稱諸侯盟於葵丘沒齊侯爵而稱諸侯者所以貶之則知桓德之衰自此始也十三年會於鹹左云淮夷病杞故且謀王室蓋杞迫東夷故會以謀之觀十四年諸侯城緣陵則知此會為杞謀也十五年會於牡丘左云救徐蓋是年春楚人伐徐故齊侯會諸侯以救之觀經書遂次於匡公孫敖及諸侯之大夫救徐則此會為救徐可知也然楚至是稍橫而齊攘救之心亦怠故經言次言救諸侯救徐而遣大夫往見其緩於救患也十六年會於淮左云謀鄫且東略也按齊侯前後盟會鄫未嘗與左氏之説疑為未然考十七年春齊人徐人伐英氏滅項先儒謂英楚與國蓋齊既救徐遂連徐人伐楚之與國切意淮之會謀伐英氏非為鄫也凡此皆齊侯主伯盟會之始終也總而言之諸侯與會者十四宋陳蔡邾魯衛許滑滕曹江黃邢鄭結盟者八而孔子稱其九合者蓋洮之盟為謀王室鹹之會為城杞牡邱之會為救徐淮之會為伐英氏此皆兵車之會也而北杏與鄄之始會齊侯未伯故孔子止稱其九先儒以謂聖人貴禮義賤武力之深旨其説是矣諸侯十四國從齊始終齊侯主伯諸侯與盟會者十四國其間小國如滕滑江黃邢邾皆間見於經國陋人微不係強弱唯宋衛陳鄭曹魯許蔡八國或服或叛其始終可考今托其事迹而録之宋自北杏與會嘗一叛齊莊十四年齊陳曹魯四國伐之自後服從盟主自鄄至淮悉與盟會此當時諸侯最為賢者魯始不與北杏之會鄄之始會止書單伯二會復不與幽雖與而不出公説者謂為公諱也至十七年齊人執鄭詹詹自齊逃來十九年齊伐魯西鄙觀經之文雖以鄭詹之故齊伐之然齊伯數年盟會者四公未嘗往則魯之見伐蓋亦討其不從伯非止為鄭詹也自此一伐之後二十七年幽之盟至淮之會凡十一會公皆親與而不復背齊矣陳始與北杏鄄初會不與二會再從兩盟於幽至柳復不與僖四年伐楚之役背齊從楚故齊人執其臣濤塗冬又合諸侯大夫侵之遂畏齊兵威與盟首止及寧母洮二會遣世子欵受盟至葵邱復不與會見其未純服也然葵邱之會伯業最盛其後諸侯無背盟者故自洮至淮三會陳侯皆來服從也鄭始不與北杏而兩從鄄會是時雖有同會之好而未有服齊之心也故鄄會始罷即背齊侵宋明年齊宋伐之於是兩盟於幽然幽之始盟經書齊人執鄭詹切意鄭有即楚之意而齊人執詹則鄭雖與盟而服齊之心未純也齊既伐其國又執其臣鄭始帖服不敢二齊故柳貫陽穀伐楚之後鄭伯皆從逮首止之會又畏楚而逃歸不盟六年七年齊兩伐之故寧母之盟始遣世子聼命而洮之會遂來乞盟自此以後始純服中國不復向楚矣衛兩與鄄會一與幽之盟至二盟不來齊遂伐之故莊二十八年經書衛人及齊人戰言戰者以見衛之二齊有力拒之意也自後十年伐楚之役齊伯盛強中國悉服衛始復來唯寧母之盟一不與餘皆見經許自莊十六年從幽之盟已後並不見經至僖四年始從齊伐楚復會首止之盟至僖六年諸侯伐鄭圍新城楚人圍許以救鄭而諸侯救之自後盟會並從中國唯寧母之盟不與而已曹自齊伯終小白之時七與盟會柳首止洮葵丘鹹牡丘是也伐楚之師曹伯亦從唯蔡始與北杏其後畏楚不復歸齊故四年齊侯之師先侵蔡而後伐楚而經於莊十年書荆敗蔡師以獻舞歸又十四年書荆入蔡則知蔡為楚屬國其所以不從齊伯者蓋畏楚之甚又非陳鄭比也凡此數國宋背齊者一魯不與會者二陳不與會者三背齊者一鄭不與會者一逃歸者一背齊者三衛不與會者五背齊者一許與會者七曹與會者七皆未嘗叛齊也夫當周室之衰夷狄暴橫小白奮起首倡大義以安中國可謂盛矣而當時諸侯或叛或從難於率服如此其間始終從齊盟會不叛者唯宋一人而已用此以觀則諸侯慕禮義而識所向蓋亦難乎其人哉小白抑強楚衛諸侯當小白始伯之時方合諸侯何暇兵楚楚雖有易齊之心然是時中夏既有盟主楚所侵擾者不過蔡鄭而已其於宋衛諸國未嘗少有窺伺也故莊十年敗蔡師以獻舞歸十四年入蔡十六年入鄭二十八年又伐鄭僖元年稱楚人伐鄭二年侵鄭三年伐鄭小白懼其暴橫浸入中國四年遂大合諸侯問罪於楚而陘之次兵威未加楚已恟懼遂遣使請盟自是楚人帖服不敢犯中國者十五年其間逺小之國間或被害若滅弦圍許滅黃伐徐雖略見經而鄰楚如陳鄭者亦賴召陵之威不復如曩日之侵擾矣其後小白既沒重耳未興楚於是復肆強暴慿陵中外始與盟會馴致盂之會執宋公泓之戰敗宋師虎狼之威日以煽熖嗚呼小白之功其大矣哉小白侵伐并吞執大夫先儒謂小白貪土地之廣持甲兵之衆驅逐脅逼強制諸侯假尊周之名以自封殖夫當春秋時列國諸侯務相侵伐強者肆凌暴弱者受并吞殘民暴骨不勝其患聖人幸伯者之出以禮義交大邦以仁恩綏小國革干戈之亂還敦厚之風庶幾乎西周之治也奈何小白之興伯德不純二十六年之間盟會諸侯雖假仁義號尊王室然其實則逞志威侮肆侵滅以尊己也故自入齊以來大國則侵伐之小國則併吞之而春秋皆例稱人者所以惡齊侯也考之於經莊十四年伐宋十六年伐鄭十九年伐魯二十八年伐衛僖四年伐陳侵陳六年伐鄭七年又伐鄭凡此皆侵伐大國者也莊十年滅談十三年滅遂十五年伐郳二十六年伐徐三十年降鄣閔二年遷陽僖十七年伐英氏滅項凡此皆并吞小國也莊十七年執鄭詹僖四年執陳轅濤塗此皆執諸侯之大夫也雖然宋衛不服陳鄭即楚則用兵侵伐雖害伯德其罪尚輕至若凌虐小國則罪之重者而滅談滅遂滅項尤為甚焉蓋恃兵威以滅國此夷狄事也小白主伯中原攘却夷狄不以德服諸侯而反蹈夷狄之惡不亦可恥哉然則例貶稱人宜矣救國城國救難恤災存亡繼絶伯者之美事也當小白時楚與夷狄交侵中原鄭許徐三國則病楚邢衛二國則病狄所賴以驅攘者唯小白也考之春秋齊侯主伯書救國者五書城國者三然有救之而成功者有雖救而不成功者若莊二十八年救鄭鄭遂與柳之會僖六年救許許遂與洮之盟使背強楚即中國此則救之成功者閔元年救邢僖元年又救邢而邢不免於夷儀之遷僖十五年救徐而徐不免於婁林之敗此則救之而不成功者也夫以伯主之威合諸侯之師救一小國則旌麾所向宜其蔑不濟矣然而救難之師或濟或否其故何耶蓋二十八年荆伐鄭經書公會齊人宋人救鄭僖六年楚人圍許經書諸侯遂救許是皆以中國之兵赴難直前而無所次故能折楚人之暴收救患之功也至莊三十二年狄伐邢閔元年齊人救之則未能率諸侯以往故其功未見春秋稱人以譏之至僖元年雖舉三國之師聲言曰救然次於聶北逡巡顧望是致邢人有夷狄之遷則實非救也又僖十五年楚人伐徐齊侯雖言諸侯盟於牡丘以謀救徐方且逺次于匡遣諸侯之大夫以為救援之名是致徐有婁林之敗則亦非救也嗚呼既不能力救諸侯於被難之時待其社稷喪亡國紀遷徙則雖往城之何益哉故書僖二年城楚邱蓋譏其不救患而城之也僖元年書邢遷夷儀三師城邢蓋譏其緩於救患而城之也十四年書諸侯城緣陵蓋譏其不能攘却東夷而城之也先儒曰與其既亡而城之不若未亡而救之小白之罪蓋見於此三伐戎按齊侯伐戎者三莊二十年伐戎三十年伐山戎皆稱人僖十年伐北戎則稱齊侯何也説者謂貶之故稱人與之故出爵夫攘夷狄正中夏此正伯者之功耳春秋何所貶哉蓋稱人者非病小白也此春秋垂世之法也夫小白有北戎之功春秋例許之則後世有襲其事勤逺國而殘中國者也故春秋兩人之以戒後世之勤兵者然而後不出爵則以小白之功終不可見故復書齊侯以與之一以戒後世一以顯齊侯此所以為春秋也晉文公重耳考之春秋重耳主伯五年侵伐各一僖二十八年侵曹伐衛是也入國一二十八年入曹是也圍國二二十八年圍許三十年圍鄭是也執諸侯二二十八年曹伯衛侯是也盟諸侯二踐土翟泉是也會諸侯一會溫是也按左氏晉侯將伐曹假道於衛衛人弗許還自南河濟侵曹伐衛蓋曹衛楚之與國為楚之捍蔽者也晉侯將服楚救宋然不得曹衛楚未可服是以先侵曹伐衛而後戰楚也是年晉侯入曹執曹伯畀宋人蓋晉為宋楚為曹楚既圍宋矣故晉執曹伯以畀宋所以怒楚使戰也及四月合四國之師及楚戰於城濮楚師敗績經於三國稱師獨出晉侯所以顯晉侯伯功之成也晉既敗楚於是率諸侯為踐土之盟而致天王於會故經於下文書公朝於王所蓋不使晉侯得以致天子故上文不言王又不言諸侯朝特言公朝於王所以明晉侯召君之惡也冬會諸侯於溫晉侯復致天王則其惡又甚矣故經書天王狩於河陽左氏以謂仲尼曰以臣召君不可以訓故書曰天王狩於河陽左氏以謂仲尼曰以臣召君不可以訓故書曰天王狩蓋諱以天王之尊而從伯王之脅致使若王巡狩而諸侯會於方嶽也及二十九年會王人六國盟於翟泉説者以謂皆諸國大夫故稱人然王人不可與盟今使大夫盟之則晉文之惡又可知也嗚呼晉文一戰敗楚於是恃其威勢驕傲不臣至以身召天子以大夫盟王人豈非萬世之罪人哉其不及小白逺矣六國背服始終自小白沒楚乘中國無伯欲驅率諸侯驟主盟會宋襄公雖有紹伯之志而力不敵楚反貽挫辱故盂之會執於楚子泓之戰敗於楚人僖二十六年楚伐宋圍緡二十七年又合諸侯圍宋逮重耳之出始終仇楚者唯宋一人其他國若曹衛許則一於附楚至齊魯陳鄭之屬則又視晉之成敗而為向背者也故城濮之戰從晉侯止齊宋秦三國蓋齊以伯者之後宋以疾楚之深秦以納公之好故當時無顧望之心而皆説於從晉也至陳鄭魯衛蔡邾莒則自敗楚之後始從晉盟故踐土之盟鄭魯蔡衛及莒子始至溫之會邾子始至踐土之盟稱陳侯如會者蓋以陳侯畏楚猶緩於從晉特稱如會以見其不與盟也至衛則始終從楚唯元咺及國人力於附晉故敗楚之後衛侯懼晉而奔楚是時衛國無君元咺奉公子瑕以受盟於此見衛侯雖奔楚其國人皆欲從晉也晉以子瑕結盟故許衛侯復歸於衛衛侯既入而殺叔武則猶有二晉之心是以元咺奔晉以訴之及溫之會陳鄭畢至衛獨不來於是晉人執衛侯歸之於京師且歸元咺於衛然則當時諸侯畏楚之威憚於從晉者唯衛為甚故經書衛事亦多也至許則踐土與溫皆不從盟會故會溫之後諸侯圍許鄭雖兩與盟會而翟泉之盟有二晉之心乃復不至是以三十年晉秦圍鄭以討之也夫小白之伯經營中國者二十五年諸侯懷德畏威從服既久然後率衆以伐楚故當時諸侯信附不疑而盟會之間携二者少及小白沒距晉之伯已十一年諸侯事楚其心已固重耳無盟會之素一旦大興征伐驟伯中夏宜乎諸侯信服不堅而糾合之難也二伯總論孔子曰晉文公譎而不正齊威公正而不譎此聖人即春秋之旨以定二伯之優劣也昔者宣王中興伐玁狁威荆蠻使之竄伏荒陲屏氣息迹不敢內顧自平王東遷周道復衰時無宣王之明無吉甫方叔之佐是以荆蠻醜類浸爾跳梁入蔡伐鄭侵陳圍宋讎狠狼戾所向披靡幸賴小白重耳相望而興或盟會以聲其威或克伐以折其氣是以虐熖不逞中原少寧則二伯之功亦云盛矣考之經筆其行事終始相背馳請備論之以伸孔子之説周惠王以惠后之愛欲廢太子鄭立王子帶而小白親率諸侯會世子于首止以定其位此正天下之功也至重耳敗楚未幾已致天王於踐土則與首止之盟異矣及惠王即位襄王以叔帶之難懼不得立使告於齊小白於是率諸侯以謀之此定王室之功也至重耳會溫未幾又盟王人於翟泉則與洮之盟又異矣小白以禮義柔中國故盟會諸侯八然後有陘之師則先禮義而後征伐者也重耳以兵革威中國故未嘗盟會諸侯遽有城濮之戰則先征伐而後禮義者也小白之服楚先侵蔡以示其威又次於陘以耀其衆及楚畏服遣師乞盟於是結盟而還未嘗接刃則志在於全師而已及重耳戰楚城濮則先侵曹伐衛及又執曹伯畀宋人以怒之然後合四國之師一戰屠楚兵革之威疾若風雷則報楚之功與小白異矣小白盟楚之後楚雖不敢慿陵大國而滅弦圍許滅黃伐徐連嵗侵軼不少衰止至重耳既敗楚師不見經者七年雖徐許小國亦無楚患則服楚之功與小白又異矣小白之伯也諸侯未服固嘗侵伐之然不過伐其國之人臣使諸侯自懼而後已故莊十七年執鄭詹鄭伯遂同盟於幽僖四年執陳轅濤塗陳侯遂盟於首止此皆未嘗執諸侯也至重耳則執曹伯以畀宋人執衛侯以助元咺而曹衛兩國終不與其盟會則其所以服諸侯者異矣小白之伯也伐戎者三救諸侯者四城國者三雖不能盡成其功然驅攘夷狄救恤災患其於諸侯亦不可謂無功也至重耳則戰楚之外不服其攘救之功故三十年狄侵齊而晉侯不能救三十一年衛遷帝丘而晉侯不城則其所以勤諸侯者又異矣夫二伯行事載在春秋其大相戾如此切嘗究其心矣方小白之伐楚非不欲戰也然當春秋時諸侯恣橫干戈相尋殘民暴骨不勝其患小白主伯方崇禮義去侵伐以救當時之弊故端委正笏雍容乎壇陛之間兵革不施而諸侯已諭其志又况當時楚雖浸強其患尚小不過侵擾鄰境若蔡鄭諸國而已及齊侯一出楚既畏服則召陵之師盟而不戰小白之心也然而夷狄之性易以威制難以信結故自齊乏伯而楚之驕暴甚於曩時至伐宋大國執天子上公脅制諸侯使束身從已齊魯之君俯首帖耳委命下吏無復慙色中國之風幾為夷虜矣故重耳之興尚懷仁厚不奮兵威則何以折楚之暴以懲艾諸侯哉然則晉文之伯又不得不用征伐也雖然小白之會止致世子重耳之盟乃召天王其罪之輕重固不待較而明矣然循流究源則小白之罪又加於重耳何則春秋之作為尊王也當周之衰諸侯跋扈忽傲天子君臣之禮掃地殆盡所賴於振興者二伯而已使小白主伯之後即帥諸侯朝天子以令天下則重耳雖不臣安敢致天王哉惟小白不朝京師致王世子是以晉文得侈其惡無所嚴憚論春秋之義則小白之罪誠過於重耳矣嗚呼賢如二伯且假尊周之名而忘其實况當世諸侯哉孟子謂三王之罪人諒矣羣書考索别集卷十
