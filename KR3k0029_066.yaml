body:
  text: 羣書考索卷六十六宋章如愚撰地理門水利類禹分渠通九道陂九澤度九山然河灾之羨溢害中國尤甚故道河自積石歴龍門南到華陰東至底柱及孟津雒汭至於大伾於是禹以河所從來者髙水湍悍難以行平地數為敗迺釃分也二渠以引其河北載之髙地過降水至于大陸播為九河同為逆河入于勃海九川既疏九澤既陂諸夏乂安功施于三代前漢志周溝洫之法小司徒乃經土地而井牧其田野注曰小司徒為經之立其五溝五塗之界其制似井之字因取名焉九夫為井者方一里九夫所治之田也此制小司徒經之匠人為之溝洫相包乃成邑邱之屬相連比以出田税溝洫為除水害四井為邑方二里四邑為邱方四里四邱為甸甸之言乗也甸方八里旁加一里則方十里為一成積其百井九百夫其中六十四井五百七十六夫出田税三十六井三百二十四夫治洫四甸為縣方二十四里四縣為都方四十里四都方八十里旁加十里乃得方百里為一同也積萬井九萬夫其四千九十六井三萬六千八百六十四夫出田税二千三百四井二萬七百三十六夫治洫三千六百井三萬二千四百夫治澮井田之法備於一同遂人凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達于畿注曰十夫二鄰之田百夫一酇之田千夫二鄙之田萬夫四縣之田遂溝洫澮皆所以通水於川也遂廣深各二尺溝倍之洫倍溝澮廣二尋深二仞徑畛涂道路皆所以通車徒於國都也徑容牛馬畛容大車涂容乗車一軌道容二軌路容三軌萬夫者方三十三里少半里九而方一同以南畮圖之則遂從溝横洫從澮横九澮而川周其外焉賈正義曰鄭知遂澮溝洫然者此雖溝洫法與井田異制其遂溝洫廣深亦與井田溝洫廣深同故鄭還約匠人之法而言之也鄭知徑容牛馬之等義如此者此從川上有路而差之凡道皆三涂川上之涂則容三軌道容二軌軌皆八尺其畛宜差小可容大車一軌軌廣六尺自然徑容牛馬及人之步而不容車軌也賈正義曰萬夫者方三十三里少半里此解經萬夫有澮之義千夫萬步萬步有三十三里百步百步是少半里以九澮揔而言之則萬夫矣又十洫於南畔為横澮則於四畔為大川此川亦人造雖无丈尺之數葢亦倍澮此川與匠人澮水所注川者異故百里之間一川謂大川也遂從溝横洫從澮横九澮而川周其外遂入溝溝入洫洫入澮澮注川周世井田之法實公行於天下内外逺近其溝洫固无異制則遂人匠人所掌其制一也説者言遂人十夫有溝而為溝洫之法匠人言九夫為井井間有溝則為井田之法誤矣遂從溝横遂水注溝地勢當如此説者謂遂人其遂從匠人其遂横則亦誤矣小司徒九夫為井田可知匠人亦九夫為井井間有溝自井地言之也遂人十夫有溝兼溝涂言之也然遂人百夫有洫而匠人十里為成成間有洫則九百夫之地遂人千夫有澮而匠人百里為同同間有澮則九千夫之地其不同何耶成間有洫非一成之地包以一洫而已謂其間有洫也同間有澮非一同之地包以一澮而已謂其間有澮也成與同地之廣者也洫與澮溝之大者也於成舉洫以同舉澮亦其大畧云爾遂入溝溝入洫洫入澮澮入川周世井田之法實公行於天下内外逺近其溝洫固不異制則遂人匠人之所掌也其制一也井田之法自説溝洫者不通故曰采地之制用井田鄉遂公邑用溝洫紛紛異議於是始失而不知周時皆用井田凡曰田者皆用徹法孟子曰鄉田同井則是鄉皆同井謂鄉遂用溝洫非也哀公問年饑用不足有若告以盍徹則是邦國亦用徹法後世拘九夫為井以為造都鄙之説則是井田之法獨都鄙為然故云鄉遂公邑用溝洫之法不知周禮書皆通率而言所謂互見者固不一也陳采邑有賦而旡貢邦國有貢而无賦周官太宰之職九賦有甸稍縣都而九貢云邦國之用是也匠人為溝洫耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅎌古犬反田首倍之廣二尺深二尺謂之遂專達於川各載其名九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮注曰此畿内采地之制九夫為井井者方一里九夫所治之田也采地制井田異於鄉遂及公邑三夫為屋屋具也一井之中三屋九夫三三相具以出賦税共治溝也方十里為成成中容一甸甸方八里出田税緣邊一里治洫方百里為同同中容四都六十四成方八十里出田税緣邊十里治澮以匠人攷之井間有溝成間有洫同間有澮兹不易之制也一説謂方里之内二溝十里之外九洫百里之内九澮一説謂一同之地直達而為遂者九萬相溝而為溝者九千洫而為洫以百計之九矣澮而為澮以千計之九矣匠人之制豈其然乎凡天下之地勢兩山之間必有川焉大川之上必有涂焉凡溝逆地阞音勒謂脉理也謂之不行水屬讀為注不理孫音遜順也謂之不行謂決溢也梢溝三十里而廣倍注云謂不墾地之溝也鄭司農云謂水潄齧之溝故三十里而廣倍梢音蕭凡行奠音亭水磬折以參伍水行欲紆曲也凡溝必因水勢防必因地勢善溝者水潄之善防者水淫之潄猶齧也鄭司農云淫謂水淤泥土留著助之為厚凡為防廣與崇方等也其閷色界切薄其上也參分去一大防外閷又薄其上厚其下凡任索約縮也大汲引也其板謂之无任築防若牆者以繩縮其板大引之言板橈也板橈築之則鼓土不堅矣稻人掌稼下地以水澤之地種穀也以瀦蓄水以防止水以溝蕩水以遂均水以列舍水以澮寫水以涉揚其芟作田偃瀦者蓄流水之陂也防瀦旁堤也蕩謂以溝行水也遂田首受水小溝也列田之畦㽟音劣也非一道以去水也澮田尾去水大溝以涉揚其芟以其水寫故得行其田中舉其芟鉤也雍氏掌溝瀆澮池之禁凡害於國稼者春令為阱擭溝瀆之利於民者秋令塞阱杜擭成周揔論天下之地勢西北髙而東南下故古者或東其畝或南其畝畝之所向溝瀆隨之則東南其畝者亦其大致如此而已不必盡然鄭氏曰以南畝圖之遂從溝横洫從澮横凡澮而川周其外然川之所流當適地所非於萬夫之外必有大川圍而匝焉穎達疏詩謂鄭氏所言特設法耳其説是也溝洫之於田野可决而决則无水溢之害可塞而塞則无乾旱之患荀卿曰修隄防通溝洫之水潦安水藏以時决塞則溝洫豈特通水而已哉稻人掌稼下地以瀦蓄水以防止水以溝蕩水以遂均水以列舍水以澮寫水此又下地之制與遂人匠人異也考工記所謂水屬者屬溝洫也所謂稍溝者溝末也自溝末言之謂之稍溝自田端言之謂之田首溝逺而不倍不足以容水水行不磬折不足以殺其勢觀易坎為弓輪而河亦百里一曲一曲一直則溝洫之制磬折可知矣先王之時通九川陂九澤溝洫脈絡布於天下則无適而非利也及井田廢而阡陌作於是史起引漳以富河内鄭國鑿涇以注闗中李氷壅江以灌蜀地番係引汾以溉蒲阪以至白公之於渭郡信臣之於南陽馬臻之於鏡湖張闓之於新豐塘劉義欣之於芍陂鉗盧李襲稱之於雷陂史臣書之以為異績之特名主於不足耳遂溝洫澮川雖不同皆謂之溝司險曰五溝也溝徑畛涂道路雖不同皆謂之涂司險曰五涂是也楚呉蜀水利滎陽下引河東南為鴻溝以通宋鄭陳蔡曹衞與濟汝淮泗㑹於楚西方則通渠漢川雲夢之際東方則通溝江淮之間於呉則通溝三江五湖於齊則通淄濟之間於蜀則蜀守李氷鑿離􅕞音堆岸也避沫水之害沫水出蜀西南徼外東南入江穿二江成都中此渠皆可行舟有餘則用溉百姓饗其利魏水利魏㐮王使西門豹為鄴令史起進曰魏氏之行田也以百畝鄴獨二百畝是田惡也漳水在其旁西門豹為鄴令不知用於是以起為鄴令遂引漳水溉鄴以富魏之河内民歌之曰鄴有賢令兮為史公決漳水兮灌鄴旁終古舄鹵兮生稻粱秦鑿溉田渠其後韓聞秦之好興事欲疲之无令東伐乃使水工鄭國間説秦令鑿涇水自仲山西抵瓠口為渠並北山東注洛三百餘里欲以溉田中作而覺秦欲殺國國曰始臣為間然渠成亦秦之利也秦以為然卒使就渠渠就用注填閼之水溉舄鹵之地四萬餘頃收皆畝一鍾於是闗中為沃野无凶年命曰鄭國渠漢文帝水利漢文帝以文翁為蜀郡太守穿煎㳛口溉灌繁田千七百頃人獲其饒漢興三十九年孝文時河決酸棗東潰金堤於是東郡大興卒塞之武帝水利孝武元光中河決於瓠子東南注鉅野通於淮泗上使汲黯鄭當時興人徒塞之輙復壞元光中大司農鄭當時言引渭穿渠起長安並南山下至河三百餘里渠下民田萬餘頃又可得以溉田益肥闗中之地得穀天子以為然令齊水工徐伯表悉發卒數萬人穿漕渠三嵗而通渠下民頗得以溉田矣河東守番係請穿渠引汾溉皮氏汾陰下引河溉汾陰蒲阪下度可得五千頃五千頃故盡河壖棄地民茭牧其中耳今溉田之度可得穀二百萬石以上天子以為然發卒數萬人作渠田數嵗河移徙渠不利則田者不能償種乆之河東渠田廢與越人令少府以為稍入如淳曰時越人有徙者以田與之其租税入少府也師古曰稍漸也其入未多故謂之稍也嚴羆言臨晉民願穿洛以溉重泉以東萬頃故惡地誠得水可令畝十石於是為發卒萬餘人穿渠自徵引洛水至商顔下岸善崩乃鑿井深者四十餘丈往往為井井下相通行水水頽以絶商顔東至山嶺十餘里間井渠之生自此始穿渠得龍骨故名曰龍首渠作之十餘嵗渠頗通猶未得其饒是時用事者争言水利朔方西河河西酒泉皆引河及川谷以溉田而關中輔渠靈軹引諸水汝南九江引淮東海引鉅定泰山下引汶水皆穿渠為溉田各萬餘頃佗小渠陂山通道不可勝言自鄭國渠起至元鼎六年百三十六嵗而倪寛為左内史奏請穿鑿六輔渠以益溉鄭國傍髙仰之田帝曰農天下之本也泉流灌寖所以育五穀也左右内史地名山川原甚衆細民未知其利故為通溝瀆畜陂澤所以備旱也今内史稻田租挈重不與郡同其議减令吏民勉農盡地利平徭行水勿使失時後十六嵗趙中大夫白公復奏穿渠引涇水首起谷口尾入櫟陽注渭中袤二百里溉田四千五百餘頃因名曰白渠民得其饒歌之曰田於何所池陽谷口鄭國在前白渠起後舉鍤為雲決渠為雨涇水一石其泥數斗且溉且糞長我禾黍衣食京師億萬之口言此兩渠饒也自河決瓠子後二十餘嵗嵗因以數不登而梁楚之地尤甚上既封禪巡祭山川其明年乾封少雨上乃使汲仁郭昌發卒數萬人塞瓠子決河自臨决河湛白馬玉壁上既臨河決悼功之不成乃作歌於是卒塞瓠子築宫其上名曰宣防而道河北行二渠復禹舊迹而梁楚之地復寧无水灾武帝塞瓠子築宫其上名曰宣防而道河北行二渠復禹舊迹非也自戰國以來地理家所載禹迹多失其真孟子禹疏九河瀹濟漯而注之海決汝漢排淮泗而注之江按禹貢揚州沿于江海達于淮泗是禹之時淮泗无達江之道也及呉王夫差掘溝通水以與晉㑹于黄池然後江始有通淮之道而孟子之説是誤認呉王所掘之溝以為禹之舊江矣司馬遷河渠書載禹導河疏二渠按禹貢導河積石至于龍門南至于華陰東至于厎柱又東至于孟津東過洛汭至于大伾北過洚水至于大陸又北播為九河同為逆河入于海是河自龍門而發以至于大陸者皆為一流初非有二渠也自齊桓公填九河之八流以自廣惟以徒駭一河通流至秦之時河決魏郡然後始有二流而子長之論是誤認秦時所決之渠以為禹之舊河矣地理之説最為近古者莫如孟子史記然且誤認後世之迹以為禹之舊功則夫地理家之所載益可疑也宣帝水利宣帝地節中郭昌使行河北曲三所水流之勢皆斜直當也貝邱縣乃各更穿渠直東經東郡界中不令北曲渠通利百姓安之元帝水利元帝建昭中邵信臣為南陽太守於穣縣理南六十里造鉗盧陂累石為堤傍開六石門以節水勢澤中有鉗盧小池因以為名用廣溉灌嵗増多至二萬頃人得其利及後漢杜詩為太守復修其業時歌之曰前有邵父後有杜母西漢揔論漢治河凡五策隄防以塞水穿渠以分水或欲復九河韓收或欲決河注湖中齊人延年或言不與水争地漢用二策一隄防一穿渠按本志孝文時河決酸棗武帝時河決瓠子成帝時河決館陶後決平原皆築塞之則漢治河之策大抵出於隄防耳平當曰經无隄防築塞之文賈遜以増堤為下策張戎以隄塞於平地猶築垣而居水觀此則専用人力以隄防非至計也按本志武帝塞瓠子河道河北行二渠復禹舊迹潘係以穿渠引河宣帝時郭昌更穿直河是將以分殺水勢也是時馮逡則請開屯氏河孫禁則請開馬篤河平當奏言則欲求能浚川疏河者賈遜中策亦不過多穿漕渠以分水勢是治河之策宜无以易此也若復九河之説決河注湖中之説皆不可行所可行者獨不與水爭地之説耳後漢章帝水利後漢章帝建初中王景為廬江太守郡部安豐縣有楚孫叔敖所起芍陂先是荒廢景重修之境内豐給順帝水利順帝永和五年馬臻為㑹稽太守始立鏡湖築塘周迴三百十里灌田九十餘頃至今人獲其利東晉水利東晉張闓為晉陵内史時所部四縣並以旱失田闓乃立曲河新豐塘溉田八百餘頃每嵗豐稔葛洪為其頌乃徵入拜大司農宋水利宋文帝元嘉七年劉義欣為荆河刺史治夀陽于時土境荒毁百姓離散義欣網維補緝隨宜經理芍陂良田萬頃隄堰乆壞秋夏常苦旱義欣遣諮議叅軍殷肅循行修理有舊漕引淠水入陂伐木開榛水得通徑由是遂豐稔後魏水利後魏刁雍為薄骨律鎮將至鎮上表曰富平西三十里有艾山南北二十六里東西四十五里鑿以通河似禹舊迹其兩岸作溉田大渠廣十餘步山南引水入北渠中計昔時髙於河水不過一丈河水激急沙土漂流今日此渠髙於河水二丈三尺又河水侵射往往崩頽渠既髙懸水不得上雖復諸處按舊引水水亦難求今艾山北中有洲渚水分為二西河小狹水廣百四十步臣今請入來年正月於河西髙渠之北八里分河之下五里平鑿渠廣十五步深五尺築其兩岸令髙一丈北行四十里還入古之髙渠即修髙渠而北復八十里合百二十里大有良田計用四千人四十日功渠得成就所欲鑿新渠口河下五尺水不得入今求從小河東南岸斜斷到西北岸計長二百七十步廣十步髙二尺絶斷小河二十日功既得成畢合計用功六十日小河之水盡入新渠水則充足溉官私田四萬餘頃旬日之間則水一徧水凡四溉穀得成實從之公私獲其利裴延儁為幽州刺史范陽郡有舊沈渠徑五十里漁陽燕郡有故戾諸堰廣袤三十里皆廢毁多時莫能修復水旱不調人多飢餒延儁自度水形營造未幾而就溉田萬餘頃為利十倍唐太宗水利貞觀十八年李襲稱為揚州大都府長史乃引雷陂水又築句城塘以溉田八百餘頃百姓獲其利徵拜太府卿人至今賴之髙宗水利永徽六年雍州長史長孫祥奏言往日鄭白渠溉田四萬餘頃今為富商大賈競造碾磑堰遏漕水渠流梗澀渠一萬許頃請修營此渠以便百姓至於鹹鹵亦堪為水田髙宗曰疏導渠流使通灌溉濟汲炎旱應大利益太尉無忌對曰白渠水帶淤泥灌田益其肥美又渠水發源本髙向下枝分極衆若使流入同州則水饒足比為碾磑用水洩渠水隨入滑加以壅遏耗竭所以得利遂少於是遣祥等分檢渠上碾磑皆毁之至大歴中水田纔得六千二百餘頃憲宗水利唐韋丹江西隄丹為江南西道觀察使築隄扞江長十二里竇以疏漲凡為陂塘五百九十八所灌田萬二千頃宣帝讀元和實録見丹政事卓然它日與宰相語曰元和時治民孰第一周墀對曰守江西韋丹有大功徳被八州没四十年老㓜思之不忘乃詔刻功穆宗水利長慶初朗州刺史溫造開後鄉渠百里溉田二千頃號右史渠後遷節度河陽復懐州古秦渠枋口樞以溉田源河内温武陵四縣田五千頃宋朝水利至道元年度支判官梁鼎陳堯叟言乞與南陽陳潁夀春沛郡㐮陽水田復邵信臣鄧艾之制詔何亮等經度之鼎等又言自唐季以來農政多廢民率弃本不務力田是以廩庾无餘糧土地无遺利臣討論典故備得端倪自陳許定鄧潁蔡宿亳至於夀春用水利墾田先賢陳迹具在坊埭廢毁遂成汚萊儻開闢以為公田灌溉以通水利發江淮下軍散卒給官錢市牛及耕具増築防堰每千人人給牛一治田五萬畝畝三斛嵗可得十五萬斛凡七州之間置二十七屯嵗可得三百萬斛因而益之不知其極矣行之二三年可以致倉廩充實省江淮漕運閑田益墾民益饒足仍慎選官吏兼督其事又引漢邵信臣晉杜預鄧艾等遺跡且言水田之制由人力人力茍修則地利可盡帝覽奏嘉之詔皇甫遷何亮等按視經度明年遷等言先至鄭渠相視舊迹按史記鄭渠元引涇水注洛三百餘里溉田四萬頃收皆畝一鍾白渠引涇水注渭中袤二百餘里溉田四千五百頃兩處共四萬四千五百頃今之存者不及二千頃乃二十二分之一分也詢其所由皆云職守之人改修渠堰坼壊舊坊故灌溉之功絶不及古望今増築堰埭云云又鄧陳許潁等七郡官私閑田共二十二萬餘頃並是漢魏以來召信臣杜詩杜預任峻司馬宣王鄧艾等墾闢之地欲望於舊坊未壊可以疏引水利處先耕二萬餘頃漸興置之詔從其請令自鄧州始募民耕墾免其税嘉祐五年三司使包拯言京西多閑田而唐州治四縣其田之入草莽者十八九雖簡其賦役而民多流亡不能以還業知州趙寛興復召信臣渠并境内之陂堰下溉民田數萬頃荒瘠之地變為沃壌今非獨流民自歸又有淮湖之民至者萬餘戸請留再任從之治平四年京西南路安撫使郭中錫言知唐州髙賦在任興建水利墾闢荒田民獲安業詔賦再任如更能興置水利開廣閑田當議陞陟古今水利總論論古今水利之制莫善於周莫不善於漢夫水利之在天下猶人之血氣然一息之不通則四體非復吾有大而江河川澤微而溝洫畝澮其小大雖不同而其疏通導達不可使一國之壅閼則一也成周之盡力於溝洫西漢之用功於河渠不貪小利以害大謀不急近功以遺逺害田畝有灌溉之益川澤旡壅塞之憂此周禮述溝洫遷史書河渠之利歟且成周匠人之職方井之地廣四尺者謂之溝十里之成廣八尺者謂之洫百里之同廣二尋者謂之澮夫自四尺之溝積而至於二尋之澮一同之間其捐膏腴之地以為溝洫之制者凡幾畝也禮冬官匠人為溝洫九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮小司徒之經土地而井牧其田野説者論田税之所出則百井之地出田税者六十有四而三十六井則治洫也萬井之地出田税者四千九十有六井而五千有竒則治溝與澮也夫自一成之地積而至於一同萬夫之衆其捐賦税之入以治溝洫之利者凡幾人也地官小司徒注成周之君豈不愛膏腴之地賦斂之入而棄以為无用之溝洫哉誠以所棄者小而所利者大所捐於公上者不能毫髮而所以福斯民而澤天下者无窮已也自經界不明而先王溝洫之制漫无可考以九河之地猶失其八攴而莫得其迹東坡辨九河云以漢許鬲之言攷之徒駭最北鬲津最南葢徒駭是河之本道東出分為八齊小白塞之為一今河間弓髙以東至平原鬲津往往有其遺處葢其八支併歸徒駭也則細而溝洫之屬可知矣天下所謂有才之士始出而以私智經營雖其利澤不博未及古人徧利天下之意不猶愈於後世與水争地貪尺寸之利而遺无窮之害哉自春秋戰國浚其源西漢道其流而河渠之水利詳矣孫叔敖起芍陂楚受其恵文翁穿㳛口蜀以富饒史記鑿漳水於魏者鄴旁有稻粱之詠魏㐮王時史起為鄴令曰魏氏行田以百畝鄴獨二百畝是田惡也漳水在其旁西門豹為鄴令不知用於是引漳水灌田鄴以富民歌之曰鄴有賢令兮為史公決漳水兮灌鄴旁終古舄鹵兮生稻粱導涇水於秦者谷口有禾黍之謠班固西都賦又前溝洫志自秦用鄭國鑿涇水為渠名鄭國渠至武帝中大夫白公復奏穿引涇水一起谷口以溝池陽賜名曰白渠民歌之曰鄭國在前白公在後且灌且溉長我禾黍云云此見於春秋戰國之時也自漢以來講明尤備内而京師外而列郡又逺而邊地源流𤓰分原隰碁布歴歴可見矣嚴羆穿龍首渠於馮翊之地注見前倪寛穿六輔渠於左内史之治武帝元鼎間倪寛為左内史奏請穿六輔渠白公引涇水於池陽之區見上決渠降雨荷挿成雲衣食京師億萬之口豈非京師之利乎西都賦其他郡縣泰山則引汶東海則引鉅定汝南九江則引淮朔方西河酒泉諸郡則皆引河及川谷以溉田溝洫之用事者争言水利朔方西河河西酒泉皆引河及川谷以溉田而闗中靈軹成國湋渠引諸川汝南九江引淮東海引鉅定泰山下引汶水皆穿渠溉田各萬餘頃他小渠及陂山通道者不可勝言也陂山通道在在相望豈非諸郡之利乎輪臺以東有渠溉田五千頃桑洪羊奏故輪臺以東枝渠黎皆欲國地廣饒水草有溉田五千頃以上温和田益可廣通溝渠種五穀而鮮水左右亦有橋七十所趙充國屯田奏云願留萬二千人屯要害處繕鄉亭浚溝渠治湟陿以西道橋七十所今鮮水左右是雖極邊之地水道源流无不加意又豈非邊地之利乎西漢之君不計地利之廣狹不論費役之多寡不一勞者不永逸不暫費者不永寧此漢人得享溉灌之利也然周漢之所以得水利者治之者非一官領之者非一人得以盡心於溝洫河渠之間是故周官營溝行水之制則職之匠人俾任浚導之功也匠人為溝洫凡溝必因水勢防必因地勢止水蓄水之令則領之稻人俾専儲蓄之利也地官稻人以儲蓄水以防止水以溝蕩水以遂均水以列舍水以澮寫水夫惟浚之於其始積之於其終又安有旱澇之患哉漢之京師則少府揔禁池之事其屬則有池監百官表少府掌山海陂澤之税其属有上林上池監有都水長丞有都水見上水衡掌林苑之事其屬則有水司空百官表水衡都尉水司空長丞属焉有都水前百官表常注如淳曰都水治渠隄水門又按太常少府水衡置有都水長丞三輔以行京師之職太常以領巴陵之渠並百官表郡國則九江有陂湖官南海則有淮浦官南郡江夏則有雲夢官夫惟既任於其内又分於其外又安有壅閼之憂哉地理志九江郡有陂官湖官南海郡中有淮浦官南郡江夏郡有雲夢官國朝恵養元元留心水利三司則有都水監本朝官制都水監屬三司員无常職興役則差諸路則有提舉淳熙七年臣僚乞委提舉常平築陂塘修堰門瀦水為備州有倅貳邑有丞佐淳熙七年又臣僚劄子乞委諸路常平司籍定所𨽻郡縣公私陂塘川澤之數専責縣丞因民暇日勸率疏導聖旨依令専督責縣丞於農隙日浚治疏導廣行儲蓄而又郡有守邑有令皆得以行其浚導儲蓄之利故修蕭何之故堰則若許景山而廢壊之地復蒙大利真宗朝知興元府許景山嘗修漢蕭何所為故堰顧其属曰酇侯方定天下乃暇為此以灌農田今吾豈憚一時之勞而廢萬世之利於是因其壊堰大修之正鄭公在前白公起後之意也見上修召信臣之舊渠則若趙尚寛而荒瘠之場變為沃壌仁宗朝有唐州太守趙尚寛者復修召信臣渠與境内陂堰向為荒瘠之地變為沃壌三司使包拯上其事上嘉其能命留再任且有旌擢之諭正前有召父後有杜母之意也後漢杜詩復修召信臣南陽渠人歌之曰前有召父後有杜母築海隄以衞田而民享其利則如范文正范仲淹監西溪為建白於朝請築海隄於通泰海州之境長數百里以衞民田以文正為興化令専掌役事發通泰楚海四州民夫治之既成民享其利興化以范為姓興水利有功而治累得聲則如劉彞安定胡先生有治道齊如治兵水利之類甞言劉彞善治水後累為政皆興水利得人如是則其計可勝計耶今日聞有論水利之事矣而不䝉其利聞有任水利之官矣而不行其勞太湖藪陂澤水之所瀦而河渠畝遂水之所泄豪民墾之以獲豐殖之資官司仰之以享租輸之久及其日増嵗衍而水利之故地皆為創置之良田曩之仰其水利以耕者今不勝旱溢之害是固不可以悉舉也姑以越之鑑湖言之自漢永和中始闢其廣二百餘里而灌溉之利及於民者為田八千餘頃及熙寧中盜耕其中者九百頃至近嵗又甚矣至取其田以歸之公上此未害也而不知所剩者僅數百畝而利之所入復未必盡歸之官所言者凡數千頃而駸駸不已則越三郡將受其弊矣倘今日公上不利絲毫之賦守令不恤豪右之民毋惑於紛紛之議毋付於悠悠之事則何患乎利不具害不除而使周漢専其利哉雖然水利固當舉也亦未易輕舉也才不辨者不足任心不盡者不足任茍且順從者不足任上縻帑庫下奪農田隄防一開水失故道間有指鄰國以為壑説禹貢而行河者益以滋其謬耳不然閩之苕溪入太湖東坡何託此以諷熙寧興水利者哉東坡請謫王安石興水利自史起溉鄴田鄭國鑿涇水漢興文翁穿煎㳛口鄭當時引渭莊熊引洛自是後王景理芍陂馬臻築鑑湖至晉初杜預疏荆兖之水宋人引淠魏人引河唐疏雷陂築句城皆代天施長地力衣食元元而足公家之費故三代溝澮之法潛而赴時務功此不可不望也伏願我國家頒行古制分命有司每一嵗三月舉行其政委之州牧伯於縣宰通陂湖通溝洫旱魃作厲則引而灌之雨害粢盛則決而注之令民自便不禁其時然後復三老之官以勸耕稼置常平之食以禦灾變上資邦計下慰民望夫倉廩既足民犯重法則仁義之化可以階漸矣夏英公文羣書考索卷六十六
