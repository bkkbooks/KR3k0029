body:
  text: 羣書考索别集卷二十五宋章如愚撰邉防門蜀全蜀自古為蜀之要害曰興元曰成州曰文州曰龍州曰金州今日為蜀之要害曰巴州曰劍州曰閬州曰古渝興元即漢中郡古南鄭也楊洪謂孔眀曰漢中益州咽喉無漢中則無蜀矣成州即武都文州即漢開西南夷置隂平道鍾會伐蜀薑維表請備隂平即此龍州晉置隂平郡鄧艾自隂平至江南金州魏置魏興郡符堅由此冦蜀晉吉挹于西城縣南九里築壘拒之巴州有米倉前瞰漢中近米倉南地名三會乃劒閬巴蓬渠達六郡之衝要建屯于此可遏其突至夔門劒州有劍門實有天險與利為鄰阻關為固可遏其突入西川閬州有大獲城近利州阻山為固可遏其突入葭萌古渝據內外二水之會三面斷崖壁立可控引三陕孔眀論跨荆益後漢建安十三年孔眀謂先主曰益州險塞沃野千里天府之土將軍若跨有荆益保其巖阻則伯業可成孔眀論帥益州兵又云天下有變則以一軍向宛洛一軍向秦將軍親帥益州之衆以臨關中則孰不簞食以迎將軍周瑜欲取蜀十四年瑜見孫權乞與奮威俱進取蜀而并張魯留奮威固守其地與馬超結援法正説取益州十六年法正至荆州説先主取益州龎統曰益州土沃財冨大業可成先主降劉璋十七年先主攻璋進圍成都城中尚有精兵三萬穀帛支一年吏民咸欲死戰璋遂降曹操降張魯二十年操降張魯使夏侯淵張郃屯漢中法正説先主取漢中二十二年法正説備曰操一舉而降張魯定漢中不因此藝以圗巴蜀而留淵郃屯守身遽北還舉衆往討必可克也備善之乃遣諸將進兵漢中漢中益之咽喉二十三年備屯陽平關與淵郃徐晃相拒遣陳式絶馬鳴閣道晃破之急書發益州兵亮以問楊洪洪曰漢中益之咽喉存亡之機會若無漢中則無蜀矣先主斬夏侯淵二十四年淵備相拒踰年備自陽平南渡沔水沔水屬漢中緣山稍前營于定軍山淵爭之備使黃忠乘髙鼓噪攻之斬淵先主得漢中操自長安出斜谷軍遮要以臨漢中備曰曹公無能為我必有漢川矣趙雲將數千騎大破魏兵備遂有漢中吳蜀唇齒魏黃初四年蜀遣鄧芝修好于吳芝曰蜀有重險之固吳有三江之阻合此二長共為唇齒亮定中原太和元年亮率諸軍北駐漢中臨發上疏曰今天下三分益州疲敝此誠危急之秋今南方已定兵甲已足當奬率三軍北定中原遂行屯于沔北陽平右焉亮斬王雙二年亮引兵出散關圍陳倉以糧盡引歸王雙追之亮擊斬雙亮拔二城三年亮遣陳戒攻武都隂平二郡拔之木牛運糧五年亮出祈山以木牛運米司馬懿督張郃等救祈山亮大破郃死之司馬昭欲伐蜀景元三年昭欲伐蜀朝臣多持不可昭諭衆曰吳地廣而下濕攻之差難不如先定巴蜀三年之後因順流之勢水陸並進此滅虢取虞之勢也今絆薑維于沓中使不得東顧直指駱谷出其空虛以襲漢中其亡可知也薑維請據險薑維表冝遣諸軍分護陽安關且及隂平之橋頭黃浩信巫鬼謂敵不至寢其事鄧艾伐蜀四年鍾會鄧艾三道伐蜀艾督三萬餘人自狄道趣甘松沓中以連綴薑維諸葛緒督三萬餘人自祁山趣武街橋頭絶維歸路鍾會統十餘萬分從斜谷駝谷子午谷趣漢中薑維引兵守劒閣會攻之不克食乏欲還艾言若從隂平由邪徑經漢德陽亭趣倍出劍閣西百里去成都三百餘里竒兵衝其腹心劍閣之守必還赴涪則會方軌而進劒閣之軍不還則應涪之兵寡矣遂自隂平行無人之地七百餘里鑿山通道造作橋閣艾以氊自褁推轉而下將士鑿木緣崖魚貫而進降馬邈于江油斬諸葛贍于綿竹禪降王濬造船晉泰始八年晉將平吳濬造船艦于益州羊祜疏今梁益之兵水陸俱下巴陵竒兵出其空虛一處傾壞則上下振蕩桓溫平蜀永和二年溫將伐漢軍青衣漢主勢大發兵拒之漢人無鬭志遂降符堅取蜀寧康元年秦楊庶等拔漢中克劒門降梓潼遂取梁益二州劉裕平蜀義熙九年裕用朱齡石斬譙縱遂平蜀拓拔英圍南鄭齊建武二年魏主在鍾離梁州刺史拓拔英請以州兵會劉藻擊漢中魏主許之蕭懿等據險立柵英急攻拔之乘勝長驅遂圍南鄭太祖平蜀宋朝乾德二年上命王全斌等合步騎六萬伐蜀上出畫圗示全斌等曰西川可取王全斌等曰臣等仗天威遵廟算克日可定史延德曰西川若在天上不可到在地上到即平十二月劉光義入峽連破松木三會巫山等寨初蜀于夔州嘗鎖江為浮梁上設敵棚三重夾江列炮具光義等行上出地圗指其處曰沂江至此切勿以舟師爭勝當遣步騎俟却乃以戰棹交攻可必取也光義等未至鎖江三十里許捨舟前達浮梁復引舟而上遂頓兵白帝廟西戊辰光義遣張廷翰與守謙戰于豬頭鋪守謙敗走廷翰乘勝攻其城王全斌以蜀斷棧議取羅川路康延澤謂彥進曰羅川路險不如分兵修棧約會大軍于深渡可也彥進遣白全斌全斌許之不數日閣道成進擊金山寨又破小漫天寨而全斌亦以大軍由羅川深渡與彥進會兵二道遂破之壬申全斌等入利州命史延德分兵趨來蘇跨江為浮梁以濟延德至青強取劍州昶和劒門已破李昊勸封府庫以降遂克蜀敵由陕趨蜀建炎二年敵將婁室至鳯翔謀趨涇州涇原統制曲端正將吳玠屯軍原上婁室遂自馮翊渡河破潼關陷同華陕以歸知延安王庶遣將斷河橋絶其歸路敵遂遁後圍陕李彥仙極力禦之敵首拜城下而去敵陷延安敵至延安庶召諸軍未集端不援敵乘虛陷延安張浚使川陕三年張浚為川陕宣撫處置使初上問大計于浚浚請身任西事置司秦川故有是命浚用曲端曲端前在陕西屢嘗挫敵浚欲仗其威聲拜為統制浚論漢中形勝九月敵入永興軍十月浚至興元言漢中實形勢之地理財積穀願陛下于來夏早為西行前據六路之師後據兩蜀之粟左通􅍮襄之財右出秦隴之馬天下大勢可定矣浚移王似知成都浚至秦州即出行關陕移環慶帥王似知成都以趙哲代之參議劉子羽薦吳玠拔為統制官又以其弟璘領帳前親兵全陕沒四年春敵陷陕州李彥仙死敵始敢西而全陕沒矣曲端拒敵敵攻邠州浚遣端拒之兩戰皆捷又敗之于白店原薩里罕望之懼而哭既而端所部張中孚李彥琪戰不利敵亦引去浚罷曲端王庶毁端浚乃罷其兵柄陕西人恃端為命及是軍情不恱冨平之敗浚自冨平敗退保興州吳玠收餘兵閉大散關以斷敵來關師古收餘兵保岷孫渥于階成鳯三州扞蜀口既而散關又不守浚欲徙治夔州劉子羽曰若東走夔門則與關中血脈不相通當且留興州外繫關中之望內安全蜀之心浚乃止玠視散關之東有險曰和尚原方據險列柵而賊已抵原下浚又退保利州或謂玠冝屯漢中以安蜀玠曰我保此敵必不敢越我而進堅壁臨之彼懼躡其後是所以保蜀也敵旋引去五路之陷敵破涇破渭降慶于是五路相繼陷沒吳玠和尚原之捷紹興元年敵分兩道入攻玠璘以數千人駐和尚原朝問隔絶軍儲匱乏人無固志有謀劫玠兄弟北去者玠召諸將勵以忠義諸將感泣敵至玠引待之更戰迭休敵烏濟赫敗走十月烏珠移寨欲窺蜀玠于和尚原先處戰地烏珠至玠率諸將選徑弓強弩分畨迭射號駐隊與敵戰凡三十餘陳烏珠中箭而遁俘其將英格貝勒橫尸滿野是役也烏珠往返萬里首尾二年其衆損者踰半皆呻吟携持以歸烏珠初有從馬數百至是僅留其六乃北歸燕山保蜀亦浚用玠之力王之望記西事曰陕西之敗皆浚為之然而金人不能取蜀亦浚用玠之力張浚罷赴行在二年以王似為川陕宣撫浚即求去且論吳玠劉子羽皆有功于蜀不應一旦以似加其上又以盧法原為副使罷浚令赴行在敵入金州三年薩里罕由商于出漢隂趨金商王彥兵敗退保石泉縣敵入金州敵陷興元知興元劉子羽遣田晟守饒風嶺且報玠玠曰事急矣當亟邀于險諸將不能辦我當自行自河池縣一日夜馳三百里至饒風拒之官軍萬七千人益以洋州義士為三萬敵繞出饒風嶺後玠還仙人關敵陷興元子羽保三泉縣從兵才三百子羽遺玠書與之訣玠得書泣引麾下趣三泉數日兵稍集子羽以潭毒山形斗拔其上寬平有水乃築壁壘守之初敵謂四川唾手可取所忌獨玠故道險從金商不意玠越境而戰至是野無所掠殺馬而食盡殺簽軍而食遂退諸將分守陕蜀四年王似盧法原同在閬分陕蜀之地責守于諸將自秦鳯至洋川吳玠主之屯和尚原金房至巴達王彥主之屯通州文龍至威茂劉錡主之屯西洮岷至階成關師古主之屯武都未幾師古降賊玠併統其衆自此遂失洮岷獨存階成而已辛炳劾浚浚還朝御史辛炳言浚輕失五路坐困四川用劉子羽輩皆小人而殺曲端趙哲為無辜以至授祕閣以崇儒擬上方以鑄印吳玠殺金平之捷烏珠薩里罕復犯仙人關玠為壘于關旁殺金平嚴兵待之楊政謂玠曰此地為蜀扼塞死不可失當守以強弩彼不敢舍而犯關且地名亦善破之必矣及敵攻壘玠命璘領射士號駐隊者射之又夜攻兩酋寨破之敵不能支遂遁是役也敵自元帥以下皆令携弩而來又選取豫腹心為四川招撫使期不徒還既不得騁則還鳯翔授甲士田為久留計不敢復妄動矣吳玠専治戰守吳玠為川陕宣撫副使専治戰守趙鼎都督川陕七月以鼎為川陕宣撫處置使鼎奏陛下于浚有山河之誓終致物議今臣當此重責伏望憫臣孤忠使得展布四體少寬陛下西顧之憂楊政拔秦州五年玠以敵犯淮上亟遣楊政乘機牽制政拔秦州宣撫盧法原憾政不濟師不餽糧不給錢幣不應副器械功成又不銓量功獲將士上以手詔詰法原既而法原卒于閬令玠權行宣撫司事又以邵溥權川陕副使吳玠趙開謀不合玠與總領趙開謀不合玠欲從陸運糧開執言不可玠乃于洋州及關外成鳯岷三州治屯田嵗收十萬斛吳玠宣撫六年升玠宣撫使罷邵溥職聽玠移撥錢物委開拘收胡世將制置八年四川謀帥上問刑書胡交修廷臣孰可將者交修曰臣從子世將可用遂除之吳玠卒九年玠走于仙人關胡世將嘗問玠所以勝者于璘璘曰敵令酷而下必死先兄每與敵戰非數月不決舉所長用之爾中國弓矢徑利敵士卒堅耐吾嘗以長技洞重甲于數百步外又選據便利出銃卒更擾之使不得休彼雖堅耐亦不能無弛此待之之要世將乞命璘世將乞命吳璘于鳯翔及寶雞以來命政于鞏州及白石以來駐軍則應接川陕其勢兩便吳璘以身任責十年敵渝盟薩里罕據鳯翔胡世將在河池諸將勸其退保吳璘曰敵所以輕犯我者聞先兄亡謂我無權今我退墮其計矣璘請以身任責世將壯之乃曰吾遽避則大事去矣吾誓死于此勿多言也敵奄至石壁寨璘遣姚仲拒之哲庫貝勒中傷退屯武功烏濟赫自武功整兵再來吳璘楊政迎敵至扶風縣力戰拔其城殺敵衆幾盡力保關隘詔胡世將今日事勢以力保關隘為先璘拔秦州璘政入陕十一年吳璘楊政下秦隴取華虢入陕府以鄭剛中為川陕宣撫使楊政攻敵于渭北擒通恩貝勒璘辨四長四短二十一年利西安撫吳璘鎮興州已久自著書曰金人有四長我有四短當反我之短而制彼之長曰騎兵曰堅忍曰甲重曰弓矢吾當集漢蕃所長而兼用之故制其騎則有分隊之法制其堅忍則有更休迭戰之法制其甲重則徑弓強弩制其弓矢曰以逺尅近以強制弱璘為宣撫三十一年吳璘為四川宣撫使仍判興州璘破敵九月敵喀齊喀自鳯翔大散關入州界攻黃牛堡用強臂弓射退璘復秦隴敵犯黃牛堡旬餘不退璘遣將至寶雞滑河劫寨大捷又攻秦州破之羣書考索别集卷二十五
