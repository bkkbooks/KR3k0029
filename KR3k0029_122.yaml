body:
  text: 羣書考索後集卷五十六宋章如愚編財賦門役類三代役法莫詳於周周禮五兩軍師之法此兵役也惟田追胥之法此徒役也府史胥徒之有其人此胥役也比閭族黨之相保受此鄉役也有司徒焉則因地之善惡以均役有族師焉則校民之衆寡以起役有鄉大夫焉則計年之老少以從役有均人焉則論嵗之豐凶以行役役云衆矣秦廢井田開阡陌民始困於役商鞅立法一嵗屯戍一歲力役三十倍於古漢髙初興十里一亭十亭一鄉置三老以事相教復勿經役以嗇夫收賦稅以游徼禁盜賊所以役民者歲不過三日所謂涆戍也不行者出錢三百以給戍者此因秦制也惠帝舉民孝悌力田者復其身孝景令男二十而始傳以給公家徭役年九十者一子不事八十者二子不事武帝天漢四年敷役發七利之論注曰吏有罪一亡命二贅壻三賈人四故有市籍五父母有市籍六大父母有市籍七孝昭元鳯中雇役有三品之號內有卒更踐更過更三品之號漢末天下大亂民皆役於兵無復制度至於北齊始定制丁男之役嵗不過二旬又十五以下為少者皆復役文宣中九等之户富者稅其資貧者役其力後周太祖創制六官掌力役之政令遂分為三等豐年則役不過三旬中年則二旬下年則一旬起役無過家一人武帝頒新令制立保正之法以相檢察焉魏初髙宗民無官役豪强誅斂李冲上言復立三長五家立一鄰長五鄰立一里長五里立一黨長海內安之隋文之制嵗役不過二十日不役則取其資唐太宗初置租庸調之役謂之庸嵗不過二十日閏加二日不役日為絹三尺有事而加役二十五日免調二十日租調俱免通正役不過五十日自楊炎變兩稅法取大厯中一年科斂多者總為二稅則昔日之庸固已在其中矣東坡亦有是言宣帝之詔州縣差役不均自今每縣據人貧富及役輕重作差役簿送刺史標簿輪差則是庸錢已斂而差役猶在民也武德中量其産定為三等九年又詔為九等天寶中敕定戶籍每有差科先從髙等别籍異居者有禁客户終年者編籍唐之役法蓋亦詳矣宋舊法雖因唐制州縣之役悉差鄉户坊郭之間或有科配然太祖以來未嘗輕於役民浚河通漕凡以為名上憫其勞日加廪給且立為定式先是多以道路為民為遞夫而太宗乃詔郡國悉行禁止其不忍於役民者如此興國九年赦江南兩浙荆湖南北人户有丁錢今以二十成丁六十入老其未成丁入老者並與蠲放真宗時定均役之法所以抑豪强之避徭役也列聖嗣守此意不墜南豐曽公所謂民或老死而不知加力政然憂憐怛惻常謹復除之科急擅興之禁蓋未嘗興一暴役者此也鄉户致力以供上嵗月番休勞逸相代吏若徇理不以非法加民則被役之家本無大苦然役人既為稅户家有産業誅求必得吏少亷隅不免侵取此役法之所以弊而蘇公轍所以拳拳言之也科役既多人規避免天下始有不均之患神宗即位之初詔臣僚集議役法更議蓋始於此因三司韓絳之請也熙寧以來始有募役之法錢收上户緡錢以助役加以二分寬剩為水旱之備人立保伍以防民姦民以保甲相聫屬而官敷民錢以募役二者若不相病一時名臣如司馬公蘇文忠公極議其免役之失而卒不能奪荆公新法之謀熙寧十年知彭州呂陶奏朝廷欲寬力役立法召募初無過斂之意有司奉行過當增添科出謂之寬剩自六年行役法至今四年本州已有寬剩四萬八千餘貫以成都一路計之無慮五六十萬推之天下當有六七百萬貫寬剩矣書不報元豐七年計天下免役嵗收千八百七十餘萬緡而場稅之入粟帛之收不與焉元祐更差法間有兼募者紹聖又復改議而差法行矣初神宗立役錢嘗名為即役矣慮名以為助則是未能盡免異時或有循名以行既差役又斂錢於是槩名曰免役以杜塞之紹聖中詔諸縣毋得以催稅追甲頭保長毋得以雜事追保正副在任官不得以承帖為名占彼使令者坐賦輸錢管催督租州縣輒令陪偹輸納以違制論崇寧初尚書省言民戶既以輸錢免役豈可復差前嘗令太保畏催稅而不給雇直是為差役非免役也於是詔提舉司以元輸雇錢如舊法均給元豐舊法有耆長户丁壯丁三色雇錢耆長管烟火戶長僚稅壯長承文引紹興十年後臣僚言增免行雇役錢充軍須收入總制窠名自後三色無庸錢勸率義役渡江兵興用度不給雇役之錢非復衰日之舊併與所謂寬剩者皆入經賦而民之應役者如故也唐人有田則有租今之秋苖是也有家則有調今之稅絹是也有免則有庸今之役錢是也其後併租庸而為兩稅而役錢蓋在其間今兩稅之外復隨稅起科役錢乾道元年指揮官户役錢不以品格髙下並與减半却於編户增科乾道三年六月四日聖㫖官户與編户一等輸納更不减年將所增科錢委諸路常平司拘收起發由是刋户倍增役錢官户於正科之外復納不减半之直是庸錢數倍多取且復役取其九以充耆户長此其無藝者唐人水旱損四則免租損六則免調損七則租庸調俱免今水旱十分去處而夏稅役錢未有减免之文出田榖以助義役始於乾道間處之松陽兩都憚於役者也隨役户之多寡量家力之厚薄輸金植田遇當役者以田助之撥官田給當役淳熙中邇臣有請計浙西一路共官田一百一十五萬四千七百餘畝欲各以縣分均給諸郡以充義役官户混差罷保正以去民害乾道間嘗行之矣選官户以通差乾道間嘗議之矣卒不能通行於後世平糴常平義倉齊管仲相威公通輕重之權曰嵗有凶穰故榖有貴賤民有餘則輕之人君斂之以輕民不足則重之人君散之以重輕重斂散之以時則大賈蓄家不得豪奪吾民矣又曰守國者守榖而已州縣必積委幣於是縣州里受公錢秋國榖去三之一下令郡縣大夫里邑皆籍粟入若干榖價一也以藏於上平糴之法蓋起於此李悝為魏文侯作盡地力之教曰糴甚貴傷民甚賤傷農善平糴者必觀嵗上中下而糴之使價平則止小饑則發小熟之斂中饑則發中熟之斂大饑則發大熟之斂故雖遇水旱糶不貴而人不散行有餘而補不足也魏國行之富强晉武帝榖賤而布帛貴帝欲立平糴法詔曰古有平糴之法久廢令國實散於穰嵗而上不收貧人困於荒年而國無偹議為條制宋元嘉中彭城王義康請令積蓄之家留一年儲餘皆動使糶為制平價人賴之矣後魏孝莊時李彪請析州郡常調九分之二京師度支嵗用之餘名立官司年豐則糴積於倉時儉則减私之十二糶之逮明帝神龜正光之際收賔資與人和糴為邉偹也唐天寶中以錢六十萬緡付諸道榖賤則加價而糴貴則賤價而糶此和糴之始也故八年自關內至隴右和糴總一百一十三萬九千餘石及德宗時至趙光竒家問民樂對曰不樂曰比嵗豐稔何為不樂曰雖云和糴其實强取至於憲宗時府縣之督甚於稅賦號為和糴其實害民此歷代平糴之制也漢宣帝五鳯中耿夀昌請令邉郡皆築倉以榖賤時增其價而糴以利農貴時减價而糶名曰常平倉民便之時蕭望之非夀昌之言以為不知權道也元帝即位諸侯多言常平倉可罷無與民爭利初元五年罷之後漢明帝與置常平公卿多以為便劉般云外有利民之名內實侵刻百姓置之不便永平五年作常平倉魏司馬文王時杜預奏興常平倉定穀價晉武帝四年立常平倉豐糴而儉糶以利百姓南齊武帝永明中欲立常平倉詔出上庫錢五千萬於京師市米絲綿絹布外自南徐州至雍州各出錢市易後魏太和中置常平倉隋開皇三年陜州置常平倉京師置常平監唐髙祖武德元年置常平監五年廢之唐志曰倉部以常平備凶置令丞監事太宗貞觀十三年置常平倉粟藏九年米藏五年下濕之地粟五年米三年著於令髙宗永徽六年京東西市置常平倉𤣥宗開元二年令諸路修常平倉法江淮浙劒南地不堪貯積不在此例七年敕關內隴右河南河北五道及餘州並置常平倉其本上州三千貫中州二千貫下州一千貫宇文融請以所得客户稅錢充常平本至天寶八年自關南道至山南道常平倉總四百六十萬三千二百二十碩代宗廣德中第五琦請天下常平倉置庫以蓄本錢德宗建中三年趙贊言常平倉廢三十年請置之時國用促迫不能偹常平之積又議稅天下茶漆十取一為常平本錢憲宗元和中詔於州府稅地數內十取一二充常平倉文宗太和中以回易錢置常平倉此歷代常平倉之法也北齊制人每制出義租五斗納郡以備水旱陳文帝亦用此法河清中令郡皆置富人倉榖賤時量割當年義租充入榖貴下價糶之賤復糴貯隋開皇五年長孫平請令百姓軍人當社共立義倉勸課入粟及麥饑饉即以此榖賑給遂詔州縣置義倉十五年詔義倉止防水旱百姓不許輕費十六年又詔社倉凖上中下三等稅上户一石中戶七斗下户四斗唐武德元年置社倉倉部掌義倉太宗貞觀中戴胄言大業中國用不足並取社倉以充官費故末途無以支給請自王公以下出粟稻麥納所在立義倉太宗從之令田畝納二升以偹凶年自是天下州縣始置義倉髙宗永徽二年詔義倉據地取稅實是勞煩令户出粟上上户五石餘各有差至武后數十年間義倉不許雜用其後公私窘迫貸義倉支用自中宗神龍之後天下義倉費用向盡初元中定式畝稅二升以為義倉故天寶八年自關內道至山南道義倉總六千三百一十七萬餘石德宗時韋倫請為義倉以捍荒年陸贄亦請以户部茶稅錢均之諸道穀麥熟則平糴以義倉為名無牟大利穆宗長慶中詔義倉所在益用宜令諸州録事參軍専主文宗太和中以天下田義錢置義倉本錢開成中户部請田别納粟一外添貯義倉此歷代義倉之法也宋朝市糴之名有三和糴以見錢給之博糴以他物給便糴商賈以杪引給之太祖建隆中河北穀賤添價散糴以惠貧民自後諸道豐稔必詔諸道漕司增價和糴太宗淳化中京畿置場增價糴貯近倉令常參官領之歲歉減價以糶永為定制仁宗嘗以左藏三十萬應河北和糴之用時韓琦論和糴價匪髙於市糴何人肯糶與官天聖中淮南江浙置制司請計民稅米一石量糴四分之一上曰是重斂也不許皇祐中上曰轉運惟務誅剝以敷斂為能雖名和糴實抑配爾聖訓神宗亦嘗以六十萬充江淮和糴髙宗紹興中戒漕臣曰以錢給於民宜戒减尅榖輸於倉無取羡餘則公私兩便矣委提轉覺察飭州縣給散俸錢又詔三弊一本錢不均散二將剩數充苖米三收取加耗也此宋和糴之良法也太宗淳化三年置常平倉置場糴同前真宗景德中於京淮江浙置倉令轉運司差州縣官專掌之祥符中諸路常平倉經二年支作軍糧以新者給之天禧詔出糶上以元價為凖又詔蜀廣並置倉慶歷四年詔天下有支借者以違制論嘉祐中詔三司支錢百萬下諸路助糴米又詔天下置廣惠倉給民之不能自存者神宗時專置一司以掌之分𨽻户部右曹郡縣屬之丞二移用擅發皆有禁至熙寧中王安石變常平法廣惠倉易散青苗每夏秋已前召人請領令隨稅送納取息髙宗建炎中詔復常平永勿復行青苗之法此宋常平之法也太祖建隆中詔諸州縣各置義倉自今稅每二石别輸一斗以偹凶歉乾德四年罷之太宗淳化二年令諸州惠民倉糴稍貴减價以糴咸平中置於福建仁宗慶歷中詔天下復立義倉時王琪言宜於正稅外每二斗别納一升入於倉從之又詔新義倉止令主三等户輸之五年罷義倉熙寧二年詔義倉並廢㑹要髙宗紹興中曰義倉所以偹凶荒比年州縣或侵盜移用或賑不均令户部措置聖政此宋義倉之法也宋朝建立常平自淳化三年始義倉自建隆四年始總論平糴斂散之法出於管仲李悝漢耿夀昌言於宣帝請置倉曰常平蓋有受管李之遺業者矣蕭望之爭議是儒者之不通世務也至元帝卒罷之望之之言果酬何耶東都立是倉劉般以為外名利民內實侵刻明帝却其議而立之又何耶魏晉以降廢興不常永明擬常平之制出上庫諸郡錢數千萬市其求拔其自不徒曰米粟而布帛之屬皆在焉是果夀昌之舊乎隋開皇中置倉偹水旱轉相灌注若衛之黎陽華之廣通洛之河陽而陜之倉獨名以常平豈斂散之制專行於陜而不行於他郡乎常平市糴之本在𤣥宗時取諸客戶在德宗時取諸茶漆在憲宗時取諸路地稅在文宗時取諸回易自唐而上不知於何取之開成修常平法淮浙劔南諸道以下溫不堪貯積其䇿果可行乎故祖宗以來常平義倉之法並行不廢淳化中嵗穰物賤始為市糴於京城景德中於京東西河東北陜西南兩浙八路置常平市糴之法其立倉之名初曰惠民淳化則置場焉景德之後天下置之始定常平號天禧之數十八餘萬熙寧以來擇吏以任之置使以紏之此常平之法也建隆中詔天下置義倉官收二稅每石别輸一斗以偹凶歉慶歷中詔天下之義倉自第五等以上於夏秋正稅外率二十而取一各於州邑擇其地置倉以貯之此義倉之法也常平截上供之冬使之收糴景德之詔可遵也留嵗漕之米預為之偹祥符之詔可稽也茶鹽虞夏之時青州鹽絺之貢載於書至於周山澤有虞川林有衡為之厲禁而已鹽人一官不過供王之用度自管仲官山海正鹽策計煮海之利自一家之食籥合以纍之通之於下以富强其國秦漢以來禁弛太史公貨殖一傳所載如烏氏之徒皆以鹽鐵起家富埒王者吳王濞煮海為鹽而國用饒自武帝事征伐則用匱於是孔郡咸陽斡山海募民煮鹽官給牢盆私犯者斬左趾𢎞羊繼之而鹽鐵之官數十布在郡國昭帝即位賢良文學之士皆對願罷鹽鐵而洪羊以為安邉足用不可廢孝元時雖因諸儒之言不與民爭利既罷而尋復後漢張林亦請官自鬻鹽建安初衛覬請置監鹽官魏武從之陳文帝時孔奐奏立莫海鹽稅後魏弛鹽禁與民共之而富豪之家乘勢占奪後復置監官以監檢焉後周文帝置掌鹽之政令一曰散鹽煮海以成之二曰監鹽引池以化之三曰形鹽掘地以出之四曰飴鹽於戎以取之百姓取之皆有稅隋開皇通鹽池鹽井與百姓共之唐鹽池十八井六百四十皆𨽻度支天寶至德間每斗十錢乾元元年中鹽鐵使第伍琦初變鹽法近諸州𣙜鹽鐵使盡𣙜天下鹽斗加價百錢而出之為錢一百一十及兵興劉晏為鹽鐵使因民所急而稅之乃上鹽法輕重之宜因舊監置吏亭戶出本商人縱其所之舟所過州縣有稅晏奏罷晏之始制也鹽利嵗才四十萬緡至大歷末六百餘萬緡天下之賦鹽居其半逮順宗時李巽為鹽鐵使初嵗之利如晏之季年其後則三倍晏時矣時已稅茶志云天下糶鹽稅茶其贏六百六十五萬云穆宗長慶中張平叔請官自糶鹽又請將鹽就其糶易又請以鹽多少為刺史縣令殿最又請據口團結使其四季輸錢韓愈上言以為郭外少錢糴鹽多以雜物貿易或賖貸徐還令人吏坐鋪非得見錢必不敢受負者無從得鹽自然坐失常課人吏以鹽官家至户到而糴必索百姓供應又刺史縣令職在分憂豈可以鹽多少為之升黜又據口給鹽貧家或有淡食者則官吏必用威刑平叔又請行此䇿有商賈喧呼者重法禁之韋處厚議曰絶强人之所不能事必不立禁人之所必犯事必不行議遂寢初德宗之時趙贊議稅天下茶漆竹木十取一以為常平本錢奉天之幸旋即悔罷及正元中張滂復奏行之然十才稅一嵗得錢不過四十萬緡耳至穆宗時王播增天下茶稅率百錢增五十鹽鐵使戶部分領之李圭已言其不可其後王涯置𣙜茶使徙民茶樹於官場焚其舊積天下大怨令狐楚代之納𣙜加武宗時又增江淮茶稅是時茶商所過州縣重稅或掠奪舟車崔珙之榻地錢于悰之剩茶錢公稅加重私販益起而罪有論死者矣逮五代晉天福中以百姓犯鹽禁乃以食鹽錢於諸道計户配之作五等自一貫以至二百乃令人逐便興販其後鹽貨頓賤斤不上二十於是又重置稅焉五代㑹要張方平言周世宗以河北鹽課均之兩稅有鹽産錢及仁宗時王拱辰請𣙜河北鹽方平以為再𣙜鹽也宋茶鹽之禁承五代嚴酷之餘逮太祖肇興日從寬簡建隆之初首寬鹽禁私犯者或更以輕典僞蜀鹽價既髙特命减之以優民開寶七年有司請髙湖南茶價上以困民而弗許也太平興國中罷昌州虛額鹽萬八千餘斤淳化中許茶商於出茶處市茶自江之南悉免其算景德中有司條制茶事過為嚴急帝諭之使裁損又臣僚請於興元置𣙜茶場帝以擾民而弗許天聖七年上言者請更議茶鹽之法帝謂輔臣曰茶鹽民所食而彊設法以禁之致犯法者衆但以贍養兵京師經費尚廣未能弛之耳國朝會要慶歷三年詔議者多言天下茶鹽坑冶之有遺利朕懼開掊尅之政常抑而弗宣慮有過取而傷者皇朝編年嘉祐四年詔山澤之利與民共之遣使就問皆歡然願弛茶禁嵗入之課以時上官又於嵗輸裁减其數剗去禁條俾通商利皇祐中詔三司解鹽通商因范祥之議也合在嘉祐缺並會要宋陳執中在西府乞寬茶鹽之利富弼在諫垣乞弛茶鹽之禁歐陽修在館職乞通茶鹽之法𣙜茶茶之有稅起於趙贊茶之有𣙜起於王涯如王播裴休皆主𣙜茶之議者國家百年茶法之變不知其幾始嘗𣙜管矣又嘗行射帖矣又嘗罷射帖而行交引矣又嘗正三分法矣十分茶價四分給香藥三犀象其茶引别以二十一色四朝志云茶法皇朝編年及天聖元年改茶法官收淨利錢聽人戶興販自天聖以來屢易至嘉祐始行通商雖議者以為不便然更法之意則主於優民也東南數路皆通商惟蜀中獨禁榷崇寧中蔡京大改茶法仍舊禁𣙜園戶嵗鬻於官商人於𣙜貨務入納給引咸平元年茶引錢百三十九萬餘貫五年六𣙜務十三場收茶引之息百四十萬餘緡王安石曰仁宗時茶法極弊歲猶得九十餘萬貫政和中收息至四萬貫有竒𣙜鹽之議成於漢之孔僅𢎞羊至唐而劉晏第五琦皆主𣙜鹽之議者至宋朝𣙜鹽惟海鹽解鹽最資國用鹽有出於井有出於海有出於池其大略三種其外又有出於石者又有出於木者品類不一蜀中之井鹽自贍一方海鹽方國初鈔法未行置倉於建安軍轉米入倉空船載鹽散於江浙諸路得鹽資船運而民力寬解池之鹽朝廷專置使以領之然有契丹西夏之鹽常參奪解池之利大抵海鹽井鹽則用烹煉而人力可為也解鹽疏為畦隴决水灌其間南風起而鹽乃熟此資於天者也國家天下十八路而鹽之所出者十二路淮南河北河東陜西兩浙湖北福建廣東益州明州梓州夔州為池二監十場二十二井八百二十二嵗入之多自兩稅之外莫大於鹽利祖宗鹽利大率二千餘緡仁宗時議臣欲𣙜河北鹽張方平言為河北再𣙜鹽周世宗嘗以鹽課均之兩稅矣仁宗納其言而不行其後章子厚為相而再行禁𣙜矣蔡京秉政專利罔民使商賈入納於官自此為鈔鹽法然而法數十日一變暨法既及鈔不可用商賈折閲此海鹽之變也蓋徽宗時雨水不常防固不密而外水入解池不復成鹽遂失課息後始興工車出外水此解鹽之一變也今日閩廣於官鬻淮浙江湖則通商然則茶自嘉祐收淨利均之茶户輸之使自興販矣而蔡京又復𣙜茶此𣙜之又𣙜者也河北鹽自五代均之稅户而通商矣章子厚復行𣙜鹽之法此亦𣙜之又𣙜者也宣和時淮南鹽利自千五百萬緡今淮南鹽利亦同再考宋朝茶宋之茶唯川陕廣南茶聽民自買賣禁其出境餘悉𣙜犯者有刑淮南六州官曰為場十三置吏以總之黃州麻城場蘄州洗馬場石橋場王琪場夀州霍山場麻步場開順場舒州羅源場大湖場光州商城場子安場光山場六州採茶之民皆𨽻焉謂之園戶其茶皆課園户輸賣或折稅以備𣙜貨務商旅等請也在江南十州宣歙江池饒信溫撫筠表江西五軍廣德興國臨江建昌南康兩浙十二州蘇杭越明婺處溫台湖常衢睦荆湖八州荆潭鼎澧鄂嶽歸峽福建二州建劔其茶皆轉輸要會之地其六道州軍皆𣙜務或買或折太祖乾德二年詔在京建州漢蘄口各置植貨務五年始禁私賣筆談太宗太平興國二年刪定禁法淳化二年許商賈就園户買茶於官場貼射始行貼射法四年行交引法罷貼射又罷𣙜務仁宗天聖元年改三分法復行貼射法改淮南山場茶法官不收買聽人户興販收淨利錢其客旅聽於在京入便見錢於所在給之同上嘉祐三年時臘茶之禁尤嚴於己陷罪者衆茶法屢更嵗課日削宰相陳通商之法命即三司置局議之四年韓絳及三司言宜納至和之後一嵗之數以民得息錢均賦茶民恣其買賣所在無算後以賦茶户錢謂之租錢與諸路本錢悉儲以待邉糴自是唯臘茶禁如舊餘茶四行天下矣續通鑑神宗元豐七年福建路轉運副使王子京言建州臘茶舊立𣙜法遂權聽通商自此茶户售客之茶甚良官中所得唯常茶稅錢極微南劒州亦出二十餘萬欲盡買入官度逐州軍民戶多少及約鄰路民用之數計置即官場賣嚴立告賞禁建州賣私末茶乞借豐國監分十萬緡為本並從之長編始自熙寧七年至元豐八年增廣茶法蜀道茶場四十一京西路金州為場六陕西賣茶為場三百三十二熙寧七年稅息分四十萬緡元豐五年五十萬七年增羡至一百六十萬緡詔定以百萬緡為歲額除充官經費外並儲陕西以待詔用食貨志髙宗紹興二十五年言者請於産茶地分差官置場收買庶免私販之患上問宰執曰今天下一歲茶利所入幾何秦檜曰都茶場三處共得二百七十餘萬貫上曰比承平少陕西諸路其數止如此小歷交引太祖乾德二年諸州民有茶附折稅外官悉市之許民於京師輸金銀錢帛官給劵就𣙜務以茶償之後以西北用兵又募商人入中粟麥竹木於邉郡給文劵謂之交引許就沿江𣙜務自請射茶郡所入直十五六千至二十千即給劵百千謂之加檯然商人入中者不知茶利至京皆以茶引鬻於茶商百千才得二十餘緡謂之實錢輦下坐賈遂專蓄交引以射利謂之引鋪嵗月滋深沿江茶務交引坌至茶錢充給計嵗入新茶三年不能償其弊如此逮至景德三年邉陲罷守言事者多言𣙜務非便乃命鹽鐵使林特議更其法特請依時價官收交引每茶價及百千者官收實錢五十千其執見交引至務者量抽十之二行之一年真宗又命三司同較利害特等請罷比較茶法商旅無疑惑四年特等以課增遷官茶課宋茶利除本外淨入錢𣙜時取一年最中數計一百九萬四千餘貫咸平元年一百三十九餘萬貫始行交引時諸州産茶幾一千百萬斤别以二十一色六𣙜務十三場收息百四十七萬緡又云景德三年前嵗收錢七十三萬餘貫自林特改法官收交引後行之三年共收七百九萬貫羣書考索後集卷五十六
