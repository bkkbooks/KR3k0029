body:
  text: 羣書考索卷二十五宋章如愚撰禮門郊祀類舜虞書曰舜在璿璣玉衡以齊七政師古曰虞書舜典也在察也璿美玉也璣轉而衡平以玉爲璣衡謂渾天儀也七政日月五星也言舜觀察璣衡以齊同日月五星之政度合天意遂類於上帝禋於六宗孟康曰六宗星辰風伯雨師司中司命一說云乾坤六子又一說天宗三日月星辰地宗三泰山河海或曰天地間游神也師古曰類以祭也上帝天也絜絜精以祀謂之禋六宗之義說者多矣乾坤六子其最通乎望秩于山川徧于羣神師古曰望謂在逺者望而祭之秩次也羣神丘陵墳衍之屬輯五瑞師古曰輯與揖同輯合也五瑞公侯伯子男之瑞玉擇吉月日見四嶽諸牧班瑞師古曰四嶽諸牧謂四方諸侯也班布也有虞氏禘黄帝爾雅釋天云禘大祭也虞氏冬至大祭天於圜丘以黄帝坐而郊嚳夏夏后氏禘黄帝而郊鯀按司馬遷五帝本紀云舜則黄帝九代之孫嚳帝曽孫禹帝𤣥孫代系不如此之差懸恐馬遷之誤商商人禘嚳而郊𡨕嚳契之父周武成柴望大告武成古云燔柴郊天望祀山川成王欲宅洛邑用牲于郊召誥生民尊祖也文武之功起於后稷故推以配天焉大司樂云冬至日祀天於地上之圜丘大宗伯職曰以禋祀祀昊天上帝祀神之玉以蒼璧其牲及幣各隨玉色牲用一犢幣用繒長丈六尺王服大裘其冕無旒尸服亦然乗玉輅鍚繁纓十有再就建太常十有二旒以祀鐏及薦葅醢器並以瓦爵以匏片爲之以藁秸及蒲但翦頭不納爲籍神席配以帝嚳其樂大司樂云凡樂圜鍾爲宫黄鍾爲角太簇爲徵姑洗爲羽靁鼔靁鼗孤􅲊之管又和之琴瑟雲門之舞冬至日於地上之圜丘奏之若樂六變則天神皆降可得而禮矣詩序亦曰郊祀天地也禮書曰先王燔座於郟丘其牲角栗其牲全體膋其羮鉶其器犧尊䟽布羃撣扚豆登鼎爼簠簋匏爵之類其籍蒲越藁秸其旂太常其服大裘衮冕其搢執大圭鎭圭其位則神南面王北面示北面王南面而日月從祀則日居東月居西古者郊祀大略如此其感生帝禮大傳曰禮不王不禘王者禘其祖之所自出以其祖配之凡大祭曰禘自由也大祭其先祖所由生謂郊祭天也王者先祖皆感太微五帝之精以主其神名鄭𤣥據春秋緯說蒼則靈威仰赤則赤熛怒黄則含樞紐白則白招拒黑則叶光紀皆用王嵗之正月郊祭之葢特尊焉孝經云郊祀后稷以配天配靈威仰也宗祀文王於明堂以配上帝汎配上帝也因以祈穀其壇名泰壇在國南五十里禮神之玉用四珪有邸大有二寸牲用騂犢青幣配以稷其配帝牲亦騂犢其樂大司樂云乃奏黄鍾歌大吕舞雲門以配天神日用辛乂王者必五時迎氣者以示人奉承天道從時訓人之義故月令於四立日及季夏上德王日各迎其王氣之神於其郊月令云立春之日天子親率公卿諸侯大夫以迎春氣於東郊餘四氣者皆然若以祖之所自出即禘祭靈威仰於南郊一神而已若迎王氣之神即春青帝靈威仰夏赤帝赤熛怒季夏黄帝含樞紐秋白帝曰白招拒冬黑帝叶光紀也其配祭以五人帝春以太皥夏以炎帝季夏以黄帝秋以少昊冬以顓頊月令云其帝太皥等是也故鄭𤣥注月令云迎春謂杞靈威仰與東郊以太皥伏羲氏配坐是也祭外神必有主者公羊傳曰自外至者無主不止故以人帝配神作主其壇位各於當方之郊去國五十里内曰近郊爲兆位於中築方壇亦名曰太壇而祭之禮神之玉按大宗伯云青珪禮東方赤璋禮南方黄琮禮地則中央也白琥禮西方𤣥璜禮北方牲用犢及幣各隨玉色樂與感帝同祭前期一日王親戒百官及族人太宰又總戒羣官曰某日有事於昊天上帝各揚其職百官廢職服大刑而習射於澤宫選可與祭者其日王乃致齋於路寢之室祭日之晨雞人夜呼晨以呌百官巾車鳴鈴以應雞人典路乃出玉輅建太常大司樂旣宿懸遂以聲展之知完否王将出大司樂令奏三夏王所過處之人各於田首設燭以照於路又喪者不敢哭凶服者不敢入國門祭前掌次先於丘東門外道北設大次小次掌次張氈按設皇邸王服大裘而立於丘之東南西面大司樂奏圜鍾為宫以下之樂以降神次則積柴於丘壇上王親牽牲而殺之次則實牲體玉帛而燔之謂之禋祀次乃掃於丘壇上而祭及禓裘而升丘也王及牲尸入時樂章奏三夏肆夏昭夏就坐時尸前置蒼璧又薦籩豆及血腥等為重古之薦王乃以匏片為爵酌瓦甒之泛齊以獻尸為朝踐之獻五齊之名一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊七獻七獻者薦血腥後王以匏爵酌泛齊以獻尸所謂朝踐是也此為一獻次大宗伯攝王后之事亦以匏爵酌醴齊亞獻亦為朝踐是二獻每獻奏樂一成次薦熟於神前薦畢王乃以匏爵酌盎齊以獻尸大宗伯以匏爵酌緹齊以亞獻所謂饋獻也通前凡四尸乃食食訖王更酌朝踐之泛齊以酳尸所謂朝獻大宗伯更酌饋獻之緹齊以亞酳所謂再獻通前凡六又有諸臣為賔之一獻凡七其尸酢諸臣之酒皆用三酒其法如祫祭之禮畢獻之後天子舞六代之樂若感帝及迎氣即天子舞當代之樂其樂章用昊天有成命也秦西畤鄜畤周為犬戎所欺東徙洛邑秦襄公攻戎救周列為諸侯而居西自以為王少昊之神作西畤祠白帝其牲用駵駒黄牛羝羊各一其後秦文公東獵汧渭卜居之而吉夢黄蛇自天下屬地其口止於鄜衍於是作鄜畤用三牲郊祀白帝焉自未作郊鄜畤而雍旁故有吳陽武畤雍東有好畤皆廢無祀或曰自古以雍州髙神明之隩故立畤郊上帝諸祠皆聚云蓋黄帝時嘗用事雖晩周亦郊焉秦宻畤上畤下畤畦畤秦宣公作宻畤於渭南祭青帝後二百五十年靈公於吳陽作上畤祭黄帝作下畤祭炎帝後四十八年周太史儋見秦獻公曰始周與秦國合而别别五百載當復合合七十年而伯王出焉䄡見後七年櫟陽雨金獻公自以為得天瑞作畦畤於櫟陽而祀上帝秦始皇二年一郊常以十月上宿郊見上宿上旬日通爟火烽火也爟舉也拜於咸陽之旁而衣尚白通典秦始皇旣即位以昔文公出獵獲魚黑龍此其水德之瑞用十月為嵗首色尚黒音尚大吕顔師古曰大吕隂律之始東游海上禮祀八神見雜祠篇二代尊雍四畤上帝嵗祠禱因泮凍秋涸凍冬塞祠五月嘗駒及四仲之月月祠畤駒四疋每畤用駒四疋而春秋異色木寓龍一駟李奇曰寓寄也生龍形於木也顔師古曰駟亦四龍木寓車馬一駟各如其帝色黄犢與羔各四珪幣各有數皆生瘞埋無爼豆之具三年一郊常以十月上宿郊見李奇曰上宿上旬通爟火張晏曰爟火烽火也如淳曰爟舉也状若井桔橰舉令先明逺照通於祀所也通舉火者或天子不親至祠所而遥拜或衆祀異處欲一時薦獻故以火為節度也拜於咸陽之旁而衣尚白其用如常時經焚書坑儒後史無典禮祀享用木寓龍木寓馬不知何憑如此乖謬漢髙祖立二年東敗項籍還入關問故秦畤上帝祠何帝也對曰四帝有白青黄赤髙帝曰乃待我而具五色遂立黑帝祠名北畤有司進祠帝不親徃悉召故秦祀官復置太祝太宰如其故儀後四年詔御史令九天巫祠九天顔師古曰九天者中央鈞天東方蒼天東北關天北方𤣥天西北幽天西方皓天西南朱天南方炎天東南陽天其說見淮南子一云東方昊天東南陽天南方赤天西南方朱天西方成天西北幽天北方𤣥天東北方變天中央鈞天皆以嵗時祠宫中文帝即位詔有司增雍五畤路車各一乗駕被具駕車被長之飾魯人公孫臣上書曰始秦以水德則漢當土德其應黄龍見改正朔服色尚黄明年黄龍見成紀拜公孫臣為博士申明土德革改厯服色事革謂剏造有司曰古者天子夏親祠上帝於郊故曰郊夏四月詔郊祀上帝始幸雍郊見五畤祀衣皆尚赤趙人新垣平上言長安東北有神氣成五采若人冠冕焉宜祀上帝於是作渭陽五帝廟同宇宇謂屋覆也一屋之下别為五廟各立門室廟記曰五帝廟在長安東北帝一殿面五門各如其帝色服用及儀如雍五畤明年夏四月帝親拜郊見五帝廟爟火舉若光屬天於是垣平至上大夫文帝出長門如淳曰亭名若見五人於道北因其直立五帝壇直猶當也因其所立處以祠人有書告平詐偽遂誅夷平後渭陽長門五帝使祠官領以時致禮不親徃焉景帝中元六年十月行幸雍郊五畤武帝即位初至雍郊見五畤後常三嵗一郊後亳人謬忌曰天神貴者太一太一佐曰五帝古者天子以春秋祭太一於東南郊日一太牢七日凡七日祭為壇開八通之鬼道於是令太祝立祠於長安城東南郊後人上書言古者天子三年一用太牢祠三一天一人一地一許之令太祝領祠之於太一壇上如其方後二年郊雍獲一角獸若麟於是薦五畤各加一牛以燎有言黄帝鼎成駒龍飛去天子曰得如黄帝上遂郊雍祠官寛舒等具太一祠壇放亳忌太一壇三垓亳忌即謬忌垓重也五帝壇環居其下各如其方黄帝於西南未地當祠畤列火滿壇夜有光及書黄氣上屬天太史令談祠官寛舒等曰神靈之休兆光此地宜立泰畤壇以明應令太祝領秋及臘間祠二嵗天子一郊後嬖臣李延年以好音見帝善之下公卿議曰人間祠尚有鼓舞樂今郊祠無樂豈稱乎公卿曰古者祠天地皆有樂而神祗可得而禮乃立樂府以延年為叶律都尉論律吕合八音之調作十九章之歌以正月上辛用事甘泉圜丘使童男女七十人俱歌昏祠至明夜常有神光如流星上集於祠壇天子自行宫遥拜百官侍祠者數百人皆肅然心動太初元年西伐大宛蝗大起明年有司言雍五畤無牢熟具芬芬不備乃令祠官進畤犢牢具色食所勝而以木寓馬代駒元光三年幸雍祠五畤後常三嵗一郊見元鼎四年幸汾隂立后土祠於汾隂睢上元鼎五年十一月朔辛巳冬至立泰畤於甘泉天子親郊見朝日夕月注祠太一也禮書曰漢之祠天不於南郊而於甘泉祠地不於北郊而於汾隂以至壇有八觚廟有六采樂有玉女車有鸞路騂駒龍馬一切侈靡而匡衡劉向之徒邪正異同之論蠭起於時元始之間謬戾尤甚春秋則天地同牢於南郊冬夏則天地分祭於南郊本朝黄覆言南郊合祭止因王莽謟事元后遂躋地位同席共牢後元元年春正月行幸甘泉郊泰畤元帝即位遵舊儀間嵗正月一幸甘泉郊泰畤西至雍祠五畤成帝長安南北郊成帝即位丞相康衡御史大夫張譚言帝王之事莫大乎承天之序承天之序莫重於郊祀故聖王極慮以建其制祭天於南郊就陽之義也瘞地於北郊即隂之位也天之於天子也因其所都而各享焉徃孝武皇帝居甘泉宫即於雲陽立泰畤祭於宫之南今當幸長安郊見皇天反北之泰隂祠后土反東之少隂事與古戾於是十二月作長安南北郊罷甘泉汾隂祠二年正月罷雍五畤辛巳上始郊祀長安南郊三月辛丑始祠后土於北郊劉向曰國之神寳舊畤甘泉汾隂及雍五畤始立皆有感應武宣之世奉此三神神光尤著祖宗所立誠未易動後復甘泉汾隂祠及雍五畤迄平帝世三十餘年間天地之祠五徙焉哀帝立寢疾博徵方士復甘泉泰畤如故遣有司行事而禮祠焉平帝立王莽奏宜如建始所行丞相匡衡等議復長安郊祀如故莽又頗改祭禮云天地有别有合其合者孟春正月上辛若丁天子親合祀天地於南郊先祖配天先妣配地祭天南郊則以地配天地位皆南嚮地在東共牢而食高帝高后配於壇上西嚮后在北亦同席共牢牲用繭栗𤣥酒陶匏天地用牲一高帝高后用牲一天用牲左及黍稷燔燎於南郊地用牲右及黍稷瘞埋於北郊六律六鍾五聲八音六舞大合樂其别者天地有常位以冬日至使有司奉祠南郊高帝配而遥祀羣陽夏日至使有司祠北郊高后配而遥祀羣隂其渭陽祠勿復修從之三十餘年間天地之祠五徙焉又奏舊天神稱皇天上帝太一兆曰泰畤地祗曰后土與中央黄靈同又兆北郊未有尊稱五帝兆雍五畤並未合禮今宜地祗稱皇地后祗兆曰廣畤中央帝黄靈后土畤兆於長安城東地東方帝太昊青靈勾芒南方帝炎帝赤靈祝融西方帝少昊白靈蓐収北方帝顓頊黑靈𤣥𡨕各兆其方之郊於是長安旁諸廟兆畤甚盛光武洛陽城南郊兆建武元年祭告天地采用元始中郊祭故事六宗羣臣皆從未以祖配天地共犢餘牲尚約二年春正月壬子起宗廟建社稷於洛陽立郊兆於城南依鄗采用平帝元始中故事為圜壇八陛中又為重壇天地位其上外壇上為五帝各以其方其外為壝重營皆紫以象紫宫有四通道以為門中營外營各四門羣神位焉日月在中營内南道日在東月在西北斗在北道之西在别位不在羣神列中隴蜀平後乃增廣郊祀高廟配食位在中壇上西南北上光武北郊兆域中元二年春正月辛未初立北郊祠后土北郊在洛陽城北四里方壇回陛先是建武十八年常幸蒲坂祠后土明帝兆五郊於雒陽永平二年以月令有五郊迎氣用采元始故事兆五郊於雒陽四方中兆一在未壇皆三尺堦無等立春日迎春東郊祭青帝勾芒立夏日迎夏南郊祭赤帝祝融先立秋一十八日迎黄靈於中兆祭黄帝后土立秋日迎秋西郊祭白帝蓐収立冬日迎冬北郊祭黑帝𤣥𡨕車旗服飾各從方色魏文帝南廵在頴隂有司為壇於繁陽故城庚午登壇受紱降壇視燎成禮未有祖配明帝以舜配圜丘明帝景初元年十一月壬子冬至始祀皇帝禘天於圜丘以始祖帝舜配高堂隆曰按古典可以武皇配天魚豢議曰昔后稷以功配天漢出自堯不以堯配天明不紹也且舜以越數代武皇肇創洪業宜以配天自正始以後終魏代不復郊祀晉武帝南郊燎告未有祖配泰始二年二月丁丑郊用宣皇帝配除五帝座武帝泰始二年詔定郊祀南郊除五帝座五郊同稱昊天各設一座而巳時羣臣議五帝即天隨時王而殊號耳名雖有五其實一神從之十一月大司奏古者丘郊不異宜并圜方二丘更修壇兆二至合祀是月庚寅冬至帝親祀圜丘於南郊是後圜丘方澤不别立矣宣帝以神武創業旣以配天復以先帝配天於義亦不正遂復南郊五帝位東晉議立郊祀儀元帝元興二年尚書刁恊祭酒杜夷議旋都洛陽乃修之司徒荀組請更立郊王導荀崧華常庾亮皆同組議遂立南郊其制度皆太常賀循所定北郊尚未立共在天郊南元帝即位於建康議立南郊於已地太常賀循定制度多依漢及晉初儀注三月辛卯帝親郊祀享依泰始故事成帝咸和八年正月郊天則五帝及佐天文等凡六十一神從祀康帝建元元年正月辛未南郊帝親奉焉祝文稱嗣天子臣某安帝元興三年應郊朝儀宜依周禮宗伯攝事尚書右丞王訥之曰郊天極尊非天子不祀無使皇輿不得親奉時從訥之議郊牲用𤣥宋永初二年正月上辛帝親郊祀三年九月司空羡之等奏高祖武皇宜配天郊詔可孝武大明二年正月有司奏今月六日南郊輿駕親奉至時或雨遂遷日有司行事大明三年移郊兆於秣稜牛頭山西在宫之午地大明五年九月甲子有司奏郊祭用三牛廢帝以郊舊地為吉祥移置本處齊間嵗而祀齊高帝建元四年武帝繼位明年正月祀南郊自兹以後間嵗而祀梁武帝郊祀梁武帝即位南郊為壇在國之南常與北郊間嵗正月上辛行事祀天皇大帝武帝迎五帝以始祖配陳武帝永定元年受禪修圜丘柴燎告天明年因以正月上辛有事南郊以皇考德皇帝配除十二辰風伯雨師及五帝位間嵗而祀文帝天嘉中改以髙祖配復三獻之禮宣帝即位以郊壇卑下更增廣之後魏道皇帝即位二年正月親祀上帝於南郊以始祖神元皇帝配二月丁丑郊宣皇帝配自後嵗一祭明元帝太常三年立五精帝兆於四郊獻文帝以西郊舊事嵗增木主易代則更兆其事無益於神明孝文帝太和十二年親築圜丘於南郊北齊每三年一祭以正月上辛禘祀昊天上帝於圜丘以高祖神武帝配五精帝天文等從祀後諸儒定禮圜丘改以冬至祀之南郊則嵗一祀以正月上辛為壇於國南祀所感帝靈威仰以高祖神武皇帝配後周憲章多依周制正月上辛祀昊天上帝於圜丘以其先炎帝神農氏配五帝天文並從祀又祀所感帝靈威仰於南郊以始祖獻侯莫那配隋文帝受命再嵗冬至日祀昊天上帝於圜丘以太祖武元皇帝配五方上帝天文並從祀上帝配帝蒼犢各一五帝日月方色犢各一五星以下羊豕各九孟春上辛祠感帝赤熛怒於南郊以太祖武元皇帝配煬帝大業元年孟春祀感生帝改以高祖文帝配餘並仍舊十年冬至祀圜丘帝不齋於次詰朝備法駕至便行禮唐圜祀南郊武德初定令每嵗冬至祀昊天上帝於圜丘以景帝配五方上帝天文皆從祀孟春辛日祈穀祀感帝於南郊以元帝配武德貞觀之制大享之外每嵗立春季夏立秋立冬郊祀並依周禮其配食及星辰從祀亦然貞觀中奉高祖配圜丘元皇帝配感帝餘依武德制長孫無忌議罷鄭𤣥六天之義永徽二年七月太尉長孫無忌等議曰據祠令及新禮並用鄭𤣥六天之義圜丘祀昊天上帝南郊祀太微感帝明堂祭太微五天帝臣等謹按鄭𤣥此義惟據緯書所說六天皆為星象而昊天上帝不屬穹蒼故注月令及周官皆謂圜丘所祭昊天上帝為北辰星曜魄寳及說孝經郊祀后稷以配天明堂嚴父配天皆為太微五帝考其所說舛謬特深是以王肅羣儒咸駁此義肅等皆以為郊即圜丘圜丘即郊猶王城京師異名同實符合經典其義甚明而今從鄭之說分為兩祭圜丘之外别有南郊違棄正經理深未允詔從無忌等議存祀太微五帝於南郊廢鄭𤣥六天之義通典唐令祭天地禮樂志曰自周衰禮樂壞於戰國而廢絶於秦漢興六經在者皆錯亂散亡雜偽而諸儒方共補緝以意觧詁未得其眞而䜟緯之書出於亂經矣自鄭𤣥之徒號稱大儒皆主其說學者由是牽惑没溺而時君不能斷决以為其舉之莫可廢也由是郊丘明堂之論至於紛然而莫知所止禮曰以禋祀祀昊天上帝此天也𤣥以為天皇大帝者北辰耀魄寳也又曰兆五帝於四郊此五行之精義之神也𤣥以為青帝靈威仰赤帝赤熛怒黄帝含樞紐白帝白招拒黑帝叶光紀者五天也由是有六天之說後世莫能廢焉唐初貞觀禮冬至日祀昊天上帝於圜丘正月辛日祀感生帝靈威仰於南郊以祈榖而孟夏雩於南郊季秋大享於明堂皆祀五天帝高宗顯慶二年許敬宗與禮官等議曰六天出於緯書而南郊圜丘一也𤣥以為二物郊及明堂本以祭天而𤣥皆以為祭太微五帝傳曰凡祀啓蟄而郊郊而後耕故郊祀后稷以祈農事而𤣥謂用祭感生帝靈威仰配以后稷因而祈穀皆繆論也由是盡黜𤣥說而南郊祈穀孟夏雩明堂大享皆祭昊天上帝開元中王仲丘議曰祈穀本以祭天也五帝者五行之精所以生九穀也宜於祈穀祭昊天而兼祭五帝又曰月令大雩大享帝皆盛祭也而孟夏雩季秋大享貞觀禮皆祭五方帝而顯慶禮皆祭昊天上帝宜兼用之以合大雩大享之義旣而蕭高等撰定開元禮雖未能合古而天神之位别矣嗚呼禮之失也豈獨緯書之罪哉在於學者好為曲說而人君一切臨時申其私以增多為盡禮而不知煩數之為黷也古者祭天於圜丘在國之南祭地於澤中之方丘在國之北以順隂陽因高下而事天地以其類也其方位旣别而其燎壇瘞次樂舞變數亦皆不同而後世有合禮之文則始合祭天地𤣥宗定開元禮天寳元年遂合祭天地於南郊是時神仙道家之說興田同秀言元皇帝降丹鳳門乃建元皇帝廟二月辛卯親享元皇帝廟甲午親享太廟丙申有事於南郊其後遂以為故事終唐之世莫能改也為禮者可不謹哉汾隂后土開元十一年明皇因幸并州張說曰由河東入京師有漢武睢上祠此禮廢闕願為三農祈穀帝納其言過祠后土乃還二十年又祠三大禮𤣥宗天寳十載正月壬辰朝獻於太清宫癸巳朝享於太廟甲午有事於南郊杜甫獻三大禮賦沈存中客談曰唐故事凡有事於上帝則百神皆須遣使祭告惟太清宫太廟則親行宫廟謂之奏告餘皆謂之祭告惟有事於南郊可為正詞至天寶九載乃下詔曰告者上告下之詞今後太清宫宜稱朝獻太廟稱朝享自此遂失奏告名冊文皆為正祠德宗郊祀録正元中太常禮院修造王涇考次歴代郊廟沿革之制及其工歌祝號而圖其壇畫陟降之序為郊祀録十巻宋朝太祖乾德參定儀物乾德元年十一月二日詔曰中原多故百有餘載禮樂儀制不絶於綫方今天下無事時和嵗豐禮神報本資乎備物執事者所宜講求遺逸遵行典故無或廢墜以副我寅恭之意於是范質等討尋故事得後唐天成中南郊鹵薄字圖頗多疎畧質等參定遂以新本上之六日太常禮院言皇帝親郊諸司應奉預申嚴辨鹵薄儀仗兵部鼓吹樂架登歌太常寺車輅太僕寺六軍儀仗左右金吾仗六軍知衛左右金吾仗芳考亭鳳輦香蹬車輿繖扇殿中署立金雞擊鼓將作監太常寺登器朝服諸司法物少府監皇帝通天冠絳紗袍衮冕鎭圭等殿中署云云南郊壇衆星位版并刻漏時辰司天臺修撰儀注詳定儀仗法物云云禮儀使司太常禮院禮料粢盛光禄寺太常寺太府寺将作少府監司天臺司農宗正寺秘書省從之乾德修飾壇壝八月詔太常修飾南郊壇禮院定依古制四成十二陛三壝設燎壇於内壝之外丙地又設皇帝更衣大次於壇東外壝東門之内道北南向乾德親郊十三日帝宿齋於崇元殿翌日服通天冠絳紗袍執鎭圭乗玉輦鹵簿前導赴太廟五鼓朝享禮畢質明乗輅赴南郊齋於惟宫十六日服衮冕執圭合祭天地於圜丘奉僖祖配舊制皇帝升壇以褥籍地象天之黄道至是帝命徹之乾德南郊行禮圖唐制毎嵗冬至圜丘正月上辛祈穀孟夏雩祀季秋大享凡四祭昊天上帝親祀則并設皇帝之位國朝因其制作壇於城之南薰門外每嵗令有司奉事乾德元年始有事於南郊自五代以來喪亂相繼典章制度多所散逸宰相范質等相與討尋故事時官籍散落舊史物故惟得南郊鹵薄在後唐天成中者考之今文頗為疏畧其相違戾者多質等遂詳定新本為南郊圖又司天監定南郊從祀星辰圖上之至十一月十六日南郊開寳四年四月合祭天地於圜丘太宗淳化三年九月詔以十一月二十日有事於南郊前祀十日皇子許王薨皇宗以郊祀俯逼禮有未便命宰臣於中書集議請改用來年正月上辛詔可淳化四年正月二日合祭天地于圜丘以宣祖太祖升配至道元年正月上辛二年正月十日親郊至道南郊圖至道二年正月上出次南郊齋宫有司上南郊圖凡為三幅外幅儀衛中幅車輅及導駕宫人物皆令長寸餘又畫圜壇祭器樂駕悉皆詳備眞宗咸平元年八月翰林承㫖宋白等上新畫南郊圖注凡為三幅列外幅儀衛中幅車輅及導駕官疑此更有内幅又畫圜壇祭器樂架等悉皆詳備命藏秘府二年十一月合祭天地於圜丘以太祖太宗升配景德郊壇神位景德二年十一月南郊禮儀使趙安仁上言郊壇神位令依儀注寫定以付司天監製為絹圖壇上神位四昊天上帝皇地祗太祖太宗第一等神位八五方日月神州地祗第二等神位七十三北辰曜魄寳北斗天一太一五帝内座凡六位差在前五星十二辰河漢洎内宫四十九座嶽鎭海瀆十八座凡六十七位在後第三等神位百七十九二十八宿帝座七公日星帝席太角攝提太微垣太子明堂軒轅三公五車月星織女建紀凡四十五位差在前二十八宿洎中宫百五十九座山林川澤一十座凡百三十四差在後内壝之内神位百三十五位外宫百五位丘陵墳衍原隰三十位並齊列内壝之外衆星三百六十六位並齊列總七百五十九位第二等五嶽三等四帝座舊圖差在前皆合在後河漢中鎭舊圖在第三等據儀注合在第二從之三年一郊三嵗之郊非祖宗制也太祖在位十有七年四行大禮乾德中歴六年方一再講開寳四年南郊之後更五歲因平江南祭天地於洛京伸告謝之意而已太宗自雍熙而來經五年乃親耕又六年至淳化四年再行郊禋之禮是十年而一郊也太宗二十有三年親耕之外止五講郊禋之禮也惟眞宗東封西祀徃往率三年而一行大禮仁宗明道元年恭謝天地於大安殿又謁太廟明年又親耕當是時行最為煩數然自是而後三歲一郊遂為定制也吕源三朝增釋羣書考索卷二十五
