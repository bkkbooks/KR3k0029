body:
  text: 羣書考索别集卷十八宋章如愚撰人臣門三公仲山甫以冡宰兼太保問蒸民詩解云仲山甫蓋以冡宰兼太保何以知之曰其言式是百辟則是為宰相可知其曰保兹天子王躬是保則是為太保可知此正召康公之舊職文公禹以司空行宰相禹以司空行宰相事汝平水土則是司空之職惟時懋哉則又勉以行百揆之事同前後世官職紊雜三公三孤以師道輔佐天子本是加官周公以太師兼宰相召公以太保兼宗伯是以加官而兼宰相之職也後世官職益紊今遂以三公三孤之官如階官貼職之類不復有師保之任論道經邦之責矣舊來猶是文臣之有勳德重望者方得除此以其有輔教天子之名故也後世或以諸王子或以武臣為之既是天子之子與武臣豈可任師保之責邪訛謬承襲不復之正祖宗之法除三公三孤者必須建節加檢校太子少保少師之類然後除開府儀同三司既除開府然後除三孤三公南渡以來如張韓劉嶽諸武臣猶是如此今則不然既建節後便抹過檢校徑除開府至三孤三公矣宋朝除授之制文官自金紫光祿大夫補特進開府儀同三司然後加三公三少如富韓諸公是如此宋朝置三太三少官而無司徒司馬司空之三公然韓杜諸公有兼司徒司空又有守司徒司空者皆不可曉神宗贈韓魏公尚書令令後世不得更加侍中中書以為制蓋已前贈者皆是以中書令兼尚書令神宗特贈尚書令者其禮極重宋朝惟韓魏公同上古者以道義輔君周官乃孔氏書說得三公三孤六卿極分眀漢儒皆不知只見伏生書多說司徒司馬司空遂以此為三公不知此只是六卿之半武王初是諸侯故只有此三官又其他篇說此三官者皆是訓誥諸侯之詞如三郊三遂亦是用天子之半伏生書只顧命挑得三公三孤六卿齊整如曰太保及芮伯彤伯畢公衛侯毛公召公與畢公毛公是三公芮伯彤伯衛侯是三孤太保是冡宰芮伯是司徒衛侯是康叔為司寇所以康誥中多說刑三公只是以道之𫝊保王者無職事官屬却下行六卿事漢時太傅亦無屬官書說後世置兼官之失古者諸侯之國只置得司徒司焉司空三卿惟天子方得置三公三少六卿牧誓立政所說周家是時方為諸侯故不及三公三少及周官篇所說則周是時已得天下矣三公三少本以師道傅佐天子乃是加官周公以太師兼冡宰召公以太保兼冡宰是以加官而兼宰相之職也後世官職益紊今遂以三公三少之官為階官不復有師保之任論道經邦之責矣書說三省三省始于漢魏侍中中書尚書三省起于何時侍中漢時置多是侍衛人主或執唾壺虎子之屬行幸則從參錯于宦官之間其初職甚微緣日與人主相親故浸以用事而權日重尚書只是管開拆羣臣書奏又云宰相如州府之都吏尚書如開拆司管進呈文字凡四方奏狀皆由之以達其初亦甚微只是如今之尚食尚衣尚輦尚藥之類亦緣居中用事所以權日重漢武帝逰宴內廷以外廷逺故置中尚書以宦者為之久與人主親狎故其權愈重後來洪恭石顯皆以中尚書居中用事而擅權也及光武即位政事不任三公而歸臺閣即尚書閣即禁中也三公皆擁虛器凡天下事盡入中尚書行下三公或又不經由三公徑行下九卿而三公之權反不如九卿矣所以漢世宦者弄權用事曺操開魏王府未敢即擬朝廷置中書遂置祕書監及篡漢遂置中書監所以荀勉由中書遷尚書監人賀之勉曰奪我鳯凰池諸君何賀邪蓋尚書又不如中書之居中用事親密也問侍中是時為何官曰黃門監即今之門下省也左右散騎常侍皆黃門監之屬也問省字何義曰省即禁也以前謂之禁避魏元后父諱遂為省猶今言省中禁中也書說唐及宋朝體統分合唐初每事先經由中書省中書做定將上得㫖再下中書中書付門下或有未當則門下急駁又上中書中書又將上得㫖再下中書中書又下門下若事可行門下即下尚書省尚書省但主書填奉行而已故中書之權獨重宋朝亦最重中書蓋以造命可否進退皆由之也門下雖有繳駁依舊經由中書故中書權獨重及神宗皇帝倣唐六典三省皆依此制而事多稽滯故渡江以來執政事皆歸一獨諸司吏曺二十四曺依舊分頭各屬三省吏人自分所屬而其上之綱領則不分也舊時三省事各自由不相侵越不相聞知中書自理㑹中書事尚書自理㑹尚書事門下自理㑹門下事如有除授則宰執同共議定當筆宰執判過下中書吏人做上去再下中書中書下門下門下下尚書尚書行給舍繳駁猶州郡行下事須幕職官僉押如有不是得以論執中書行下門下皆用門下省官屬僉押事有未當則官屬得以執奏文公語録宰相在公進賢退不肖之心宰相只是一箇進賢退不肖若著一毫私心便不得前輩嘗言做宰相只要辨一片心辨一雙眼心公則能進賢退不肖眼眀則能識得賢不肖此兩言說盡做宰相之道只怕其所好者未必真賢其所惡者未必真不肖耳同上今日只用牢籠之術今之為相者朝夕疲精神于應接書問之間更何暇理㑹國事世俗之論遂以此為相業然只是牢籠人住在那裏今日一見眀日一請或住半年周嵗或住數月必不得已而後與之其人亦以為宰相之顧我厚令我得好差遣而去賢愚同滯舉世以為當然有一人焉略欲分别善惡杜絶于請分諸門于部中已得以免應接之煩稍留心國事則人爭非之矣同上天官統六卿之職周之天官統六卿之職亦是提起大綱至其他卿則一人理一事然天官之職至于閹寺宫嬪之大魚鹽之屬無不領之同上天官之職非大其心者不能為天官之職是總五官者若其心不大如何包得許多事且冡宰內自王之飲食衣服外至五官庶事自大至小自本至末千頭萬緒若不是大其心者區處應副事到面前便且區處不下況于先事措置思患預防是省多少精神所以記得此復忘彼同上人主之職在論相人主以論相為職宰相以正君為職二者各得其職然後體統正朝廷尊天下之政必出于一而無多門之弊茍當論相者求其適已而不求其正已取其可愛而不取其可畏則人主失其職矣當正君者不以獻可替否為事而以趨和承意為能不以經世宰物為心而以容身固寵為術則宰相失其職矣二者交失其職是以體統不正綱紀不立而左右近習皆得以竊弄威權賣官鬻獄使政體日亂國勢日卑雖有非常之禍伏于冥冥之中而上恬下熙亦莫知以為慮者光宗朝乙酉擬上封事文公宰相天下之紀綱一家則有一家之紀綱一國則有一國之紀綱若乃鄉總于縣縣總于州州總于諸路諸路總于臺省臺省總于宰相而宰相兼統衆職以與天子相可否而出政令此則天下之綱紀也孝宗庚子封事文公輔相當選剛眀正直之人選任大臣必得剛眀公正之人而後可其所以常不得如此之人而反容鄙夫之竊位者非有他也直以一念之間未能撤其私邪之蔽而燕好之私便嬖之流不能盡由法度若得剛眀公正之人以為輔相則恐有妨吾之事害吾之人而不得肆是以選論之際常先挑擯此等置之度外而後取凡疲懦軟熟平日不敢直言正色之人而揣摩之又于其中得其至庸極陋决可保其不至于有所妨者然後舉而加之于位是以除書未出而物色先定姓名未顯而中外已逆知其非天下第一流矣大臣慮四方客有為固始尉言淮甸無備甚先生曰大臣慮四方若位居宰相也須慮周四方始得如今宰相思量得一邉便全然掉去那邉如人為一家之長一家上下也須常常都繫拴在自家心下始得文公宰相擇長官長官擇具僚方今朝廷只消置二相三參政兼六曺如吏兼禮户兼工兵兼刑樞密可罷如此則事易達又如宰相擇長官長官却擇具寮今銓曺注擬小官繁劇而又不能擇賢便每道則令監司差除亦好每道仍只用一箇監司同上今日立對之非古者三公坐而論道方可仔細說得如今莫說教宰執坐然奏對之時頃刻即退所有文字懷于袖間只說得幾句便將文字對上宣讀過那得仔細指㸃且說無坐位也須有箇案子合開展在上指書利害上亦知得仔細看如今頃刻便退君臣如何得同心理㑹事同上當以進賢退奸為職夫杜門自守孤立無朋者此一介之行也延納賢能黜退奸險合天下之人以濟天下之事者宰相之職也奚必以無黨者為是而有黨者為非哉文公與留丞相書廣資天下之才今者進位于輔相之列則所資于天下之才者益衆而所進退于天下之才者益重若但以前日進退官屬者取之恐天下之士所以望于眀公者有未厭也同上正心以正君願深考聖賢所𫝊之正非孔子子思孟程之書不列于前晨覽夜觀窮其㫖趣而反諸身以求天理之所在既以自正其心而推之以正君心又推而見于言語政事之間以正天下之心則眀公之功名德業且將與三代王佐比隆而近世所謂名相者其規模蓋不足道文公與汪尚書正已以正人廣引人才勤政已開使凡政事之出于我者無一疵之可指則上以正君下以正人將無所求而不得如其不然則事之小不正者積之之多亦足以害吾之大正使至大至剛之氣日有所屈于中而德望威名日有所損于外是則且將見正于人之不暇尚何望其能有正君定國之功哉文公答梁丞相書勤勞以輔政況今祖宗之讎恥未報文武之境土未復主上憂勞惕厲未嘗一日忘北向之志而民貧兵怨中外空虛綱紀陵夷風俗敗壞政使風調雨節時和嵗豐尚不可謂之無事況其饑饉狼狽至于如此為大臣者乃不愛惜分隂勤勞庶務如周公之坐以待旦如武侯之經事綜物以成上意之所欲為者顧欲從容偃仰玩嵗愒日以僥幸目前之無事殊不知如此不已禍本日深文公上宰相書盡公以斷事于天下之事有可否則斷以公道而勿牽于內顧偏聽之私于天下之議論有從違則開以誠心而勿誤以陽開隂闔之計則庶乎德業盛大表裏光眀中外逺邇心大誠服文公與留丞相書當有度量心術有度量則宜有以容議論之異同有心術則宜有以辨人才之邪正欲成天下之務則必從善去惡進賢退奸然後可以有濟文公答周益公書相天下者猶梓人梓人委羣才㑹衆工左執引右執杖而中處焉彼斧者奔而右鋸者趍而左斤者聽刀者削其不勝任者退之大厦既成則書其姓字凡執用之工不在列亦猶相天下者條其紀綱而盈縮焉齊其法制而整頓焉擇天下之士使稱其職居天下之人使安其業能者進之不能者退之然後相道得而萬國理矣天下舉首而望曰吾相之功也後之人循跡而慕曰彼相之才也其執事之勤勞而不得紀焉栁文為相規模陳平之所以宰社者宰天下也曺參之所以相齊者相天下也鄭季漢論宰相職在任人用一人當天下受其福否則或受其禍用一人當天下合而譽之否則共指而嫉之用一人否與當未可知也相與語曰某由于其所嫉也一人焉顯拔于上或曰某之才無以異于我也何以先我而甄用乎一人焉失職于下或曰某之才過人如此逺慮是也何獨流落不遇乎舉天下禍福慘舒毁譽恩怨之端一歸之相萬貨之低昂不同價而相為之權衡萬口之鹹酸不同嗜而相為之劑量萬形之妍醜不同狀而相為之氷鑑也此固徇權喜勢之所貪而愛天下者之所深思極慮而不可易也鄭湜得人才不若得一相夫得百騏驥不若得一伯樂得百太阿不若得一甌冶百騏驥有時而瘏劣百太阿有時而毁缺若伯樂甌冶存則舉天下之良馬良劒何求而不得哉房魏二公太宗之伯樂甌冶也當文皇時天下賢士大夫一才一能畢登于朝亦由二公啓沃薦引于上而任用之所以能稱其職而世之談良相者止曰房杜而不言房魏者何哉房喬起于佐命平定天下輔成太平二十餘年百度修舉其功固大矣如晦與房喬與掌朝政其功不及房矣魏公得用知無不為政事小大罔有不論正觀太平之功魏公之功最居多而言者不曰房魏而曰房杜者當太宗即位之初房杜執政天下喜見太平之功及天下已久天下之人酣樂太宗之德化而功不復歸于臣下是庖人調鼎而不可食之時也故世不曰房魏焉然迹其行事考其實效魏公才智在杜之上而規模顯于房故曰房魏二公太宗之伯樂甌冶也唐史發潜宰相所以平天下伊尹之相湯曰阿衡周公之相周曰太宰衡者所以權萬物之輕重而歸于平宰者所以制百藥之多寡而適于和惟其和平而已秦少遊宰相當擇之精任之久昔者三代之相伊尹傅說周公之徒皆終身而不易蕭何相漢以終身為未足使擇其自代者故海內以安是以知宰相之任擇之不可不精任之不可不久也詹叔父論政權不可不在宰相政權不可一日不在朝廷不在朝廷則在臺閣不在臺閣則在宫闈在朝廷則治在臺閣則亂在宫闈則亡國家之興亡治亂皆本諸此田蚡招徠賔客薦進人才起家至二千石在當時固不免専權之失使武帝以蚡所用多非其人則選擇一相委任責成亦奚不可奈何帝不能自欲攬威福之柄歸之一己然聰眀有所不逮則耳目必有所寄故置加官及尚書之屬自此宰相之權愈輕矣陳季雅宰相當公心用賢崔祐甫舉吏無間親舊不亦賢乎然一人之親舊有限而天下之才無窮宰相之職朝夕為天下求才焉考民謡聽士論瑩心鑑以待之則四海九州皆吾兄弟也又何拘親戚而始悉其才行耶石唐發揮大臣以身主天下之議昔慶厯初間仁祖厭西師之久民罷用憊思正百度以修太平是時罷磨勘以别能否減任子以除濫官易監司以澄汰羣吏者以范文正公主之耳熙寧初神宗以大有為之志欲理財治兵強中國以威四夷是時制置條例更張法度一新當世之務以荆公主之爾元祐初宣仁知百姓困于新法之不便欲復祖宗之制以與天下休息是時黜聚斂深刻之吏力引元老以洗除新法以溫公主之爾范公處黨習方興之際而欲塞小人僥幸之路力如此其難也荆公當衆君子交攻力爭之際而獨持勝紹述之論以議其後變如此其難測也然范公慨然獨以先天下之憂而憂後天下之樂而樂為己任荆公自謂人臣不當避天下之怨使怨皆歸已然後為盡忠于國溫公急于救患難以國事未有所付為急雖荆公用心過差戾世述道不可班二公要之皆不以得喪毁譽死生一動其心然後能以其身任天下之責力主其議而無所畏避也鄭湜僕射中書尚書名義禮曰僕人師扶左射人師扶右即周官太僕之職君薨以是舉僕射之名蓋起于此以其朝夕親近人主後世承誤輒失其真遂以為宰相之號如侍中中書令尚書令亦是如此侍中秦官漢因之多是侍衛人主行則參錯于宦官之間其初猶以儒者為之如武帝時孔安國為侍中嘗掌唾壺是也以其日與人主相親故侵以用事尚書是掌羣臣書奏如州郡開拆司管進呈文字凡四方章奏皆由之以達其初亦甚微只如尚衣尚食尚輦尚藥之類亦緣居中用事所以權重中書因漢武帝逰宴後庭去外庭逺始用宦者典事謂之中書謁者置令僕射尤與人主親狎故其權愈重元帝時洪恭為令石顯為僕射嘗權傾內外及光武即位政事不任三公而盡歸臺閣三公皆擁虛器凡天下之事盡入于中書凡見後漢羣臣章奏首云臣某奏言尚書猶今言上書殿下陛下之類雖是不敢指斥而言亦足以見其居要地而秉重權矣當時事無巨細皆是尚書行下三公或不經由三公徑下九卿故在東漢時不惟尚書之權重九卿之權亦重者此也曺操開魏王府未敢即倣朝廷建官但置祕書令篡漢之後始改為中書監以其素承寵任故荀勉自中書遷尚書監人賀之勉曰奪我鳯凰池諸君何賀耶西漢時中書之權重東漢時尚書之職重至此則中書之權復重而尚書之權漸輕矣文公語録百揆朝官之長周官言內有百揆四嶽則百揆是朝廷官之長四嶽乃管領十二牧者也四嶽通九官十二牧為二十有二人則四嶽為一人矣同上古今兼官之制禹以司空宅百揆猶周以六卿兼三公今以户部侍郎平章事同上虞周皆是兼官問禹自司空宅百揆曰是以司空宅百揆如周之六卿兼三公也舜之言曰汝平水土是說司空事惟時懋哉是說百揆事同上宋朝官制沿革之因舊制門下省有侍中有門下侍郎中書省有中書令中書侍郎改官制神宗除去侍中中書令只置門下中書侍郎後併尚書左右丞門下中書侍郎四員為參政官或云始者昭文館大學士兼同中書門下平章事富鄭公等為之後改為左右僕射則蔡京王黼首居是選及改為左右丞相則某人等為之名愈正而人愈不逮前亦何預名事曰只是實不正使名既正而實亦正豈不尤佳又曰人言王安石以正名之說立致禍亂且正名是孔子之言如何便道王安石說得不是使其名果正豈不更佳同上執政執政偏私之過蔡元道所為祖宗官制舊典他只懲創後來之禍皆歸咎祖宗不合輕改官制遂事事以祖宗官制為是便說此是百王不可易之大典殊不知後來所以放行踰越任用小人自是執法者偏私何關改官制事如武臣諸節度副總管諸使所以恩禮隆異俸給優厚者蓋太祖初奪諸鎮兵權恐其謀叛故置諸節度使隆恩異數極其優厚以收其心而杜其異志及太宗真宗以後則此輩或已老死又無兵權後來除授者自可殺其禮數減其俸給降其事權而猶襲一時權宜茍且之制為子孫不可易之常典豈不過哉然祖宗時放行極艱其選不過一二人二三人後來小人用事凡宰相除罷及武臣寵幸宦者之徒無不得之實法制不善有以啓之耳及經變故乃追咎輕越祖宗法度之過殊不知此既開其可入之塗彼孰不為可入之塗以求合乎文公語録樞密使宋朝因仍五代舊制檢校開府以上便得文官文臣為樞密使樞密直學士者䕃子反得武官如富鄭公家子弟有為武官者是也五代以武官為樞密使武臣或不識字故置樞密直學士令文臣為以輔之故奏子皆得武臣宋朝因而不廢文公語録有掌兵名無發兵實宋朝祖宗積纍之深無意外倉卒之變惟無意外之變所以都不為意外之防且如而今樞密號為典兵倉卒之際要得一馬使也沒討處今樞密要發兵須用去御前畫㫖下殿前司然後可發若有緊急事變如何待得許多節次漢三公都帶司及將軍所以倉卒之際使出得主立得事扶得傾危今幸然無意外之變若或有之樞密且倉卒下手未得同上今無冦忠愍髙武烈之倫任國政者不聞有冦忠愍之謀典宿衛者不聞有髙武烈之請使將軍惰心三軍解體敵騎橫突深入兩淮兵少而敵益強事急而糧已匱于戒嚴未及兩月而募兵科借之禍已萌矣文公與黃樞密書侍從從班賢否雜用之弊從班之中賢否猶雜至有終嵗緘默不聞一言以禆聖聽者顧亦隨羣逐隊排連攢補其傑黠者乃敢造為飛語立橫議于臣前所陳者而宰相畏其凶熖反撓公議而從之臺諫亦不敢聞于陛下以請其罪蓋其為患日久矣孝宗朝戊申封事文公朝廷輕任之失夫以至庸之材當至輕之任雖名為大臣而其實不過供給唯諾奉行文書以求不任事安坐資給如吏卒之為而已求其有以輔聖德禆聖政而振紀綱不待智者而知其必不能也下此一等則惟有作奸欺植黨與納貨賂以濁亂陛下之朝廷耳蓋自其為臺諫為侍從而其選任如此其後又擇其尤碌碌者而登用之亦無怪乎常不得天下之賢材而屬任之也同前當遴選醇儒國家設官分職以熙庶事其遷進之序選用之方雖甚細微莫不有法而況次對之官班通禁近其自內而除者猶有嵗月之限在外而擢者必以勞效而升從昔以來未嘗輕授至于經帷則又仰關帝學在今初政尤所當先必得醇儒使任其職然後有以發揮道要感格君心大眀謹始之規以為出治之本尤不可以不遴其選也寧宗朝辭免奏狀文公給舍後省封駁之職納言之官如漢侍中今給事中朝廷誥令先過後省可以封駁文公語録給事中給事外給事宋初置時蓋欲其在內給事或差除有不當用捨有不是便要在上面安頓了不欲其宣受于外今則不然或有除授小報才出應逺近皆知給舍方繳駁乃是給事外也同上公議所在君雖以制命為職然必謀之大臣參之給舍使之僉議以求公議之所在然後揚于王庭眀出命令而施行之孝宗朝戊申封事文公宰相選士為給諫宰相得以盡其獻可替否之志而行其經世宰物之公而又公選天下直諒敢言之士便為臺諫給舍以參其議論使吾腹心耳目之寄常在于賢士大夫而不在于羣小陟罰臧否之柄常在于廊廟而不出于私門如此而主威不立國勢不強綱維不舉刑政不清民力不裕軍政不修者臣不信也光宗時己酉封事文公臺諫當用天下第一流今則所謂負剛大之氣者且先一筆勾斷稱停得到第四五等人氣宇厭厭布列臺諫如何得事成故某向謂姓名未出而內外已知其為非天下第一等流矣文公語録言事當勇蕭果卿初除御史虞丞相意也人或賀之蕭喟然曰彼見吾隤隤然我不能言而以是處我也其輕我甚矣不數日首論其黨遂并攻之論者服其勇云文公與張元善書宰相當主言責前年逐二諫官去年逐一御史近聞又逐一諫官矣上下不交而天下將至于無邦丞相不此之慮而慮士大夫之為黨其亦誤矣文公與留丞相書出諫臣非美事忠士大夫以言見逐非國家美事深使幽隱之賢難自進耳文公答林友之臺諫緘默之過其有初自小官擢為臺諫三四年間趍和承意不能建眀一事則年除嵗遷至極其選孝宗朝戊申封事文公是非不敢言蓋事理只有一箇是非今朝廷之上不敢辨别這是非如宰相固不欲逆上意亦不欲忤宰相意今聚天下之不敢言是非者在朝廷又擇其不敢言人甚者為臺諫習以成風如何做得文公語録漢唐臺諫抗直漢唐時御史彈劾人多抗聲直數其罪于殿上又如要劾某人先榜于門下直指其名不許入朝這須是如此如今要說一事要去一人千委萬丐多方為計而後敢說說且不盡同上諫身過不若諫心過諫君過臣子之下䇿也夫自古聖主眀王曷嘗不倚諫臣以拂其過今乃以諫過為臣子之下䇿無乃鉗忠臣之口結義士之舌使上之人飾非而拒諫歟曰非也過固人主之不免諫亦人臣之當為然遏水于滔天之後孰若遏之于㳙㳙之始撲火于燎原之時孰若撲之于熒熒之初後之諫臣能諫人主之身過而不能諫人主之心過夫身過之過白心過之過微自其微而砭之則易及其白而藥之則難皋䕫之吁咈伊傅之警戒未嘗俟其君之過昭灼于外而後言也芽蘖之萌固以勦而絶之矣而人有德義以澆其內禮法以繩其外是以無汙輪之勞無牽裾之諍無折檻之呼而人主之過已潜消于冥冥之中矣後世之君固有志于唐虞三代之君然知正君之身而不知正君之心知淑君之政而不知淑君之德是以制誥之差賞罰之謬刑法之酷暴于中外然後紛紛紜紜爭以頰舌白簡之彈至于數十章皂囊之上至于數千言吁亦晚矣陳同父諫臣抑宰相陽城欲壞白麻而德宗不相裴延齡李甘欲裂詔書而文宗不相鄭注誠齊諫臣當在左右天子所尊而聽者宰相也然接之有時不得數日久矣唯諫臣隨宰相入奏事奏已宰相退歸中書蓋常然矣至于諫官出入言動常朝綴取早暮相親未聞所當退也如此則事之得失早思之不待暮以言可也暮思之不待越宿而以言可也不諭則極辨之可也屢進陳之冝莫若此之詳且實也雖有邪人庸人莫得而一焉今諫官之見亦有間矣其不能朝夕上下人亦眀矣禁中之與居婦子而已矣捨是則寺人而已耳庸者邪者而已其于冥冥之間議論之際豈不易行其間哉如此則吾見今日兩府諫官之危而未見國家天下之安也曽南豐御史責人亦當自責責人非難責已為難御史責人者也將相大臣非其人百官有司失其職天下之有敗法亂紀服讒搜慝者御史皆得以責之然則御史獨無責乎哉居其位有所不知知之有所不言言之有所不行行之而君子病焉小人幸也此御史之責也御史雖不自責天下得以責之惟其不難于責已則施于責人能稱其任矣曽肇御史君有佚豫失德悖亂亡道荒政咈諫廢忠慢賢御史府得以諫責之相有依違順㫖蔽上罔下貪寵忘諫専福作威御史府得以糾繩之將有凶悍不順恃武肆害玩兵棄戰暴刑毒民御史府得以彈劾之君至尊也相與將至貴也且得諫責糾劾之餘可知也石守道一臺之重夫骨鯁介特蹇諤自立讜言直氣不畏強豪者之為御史故一臺之望足以儀四方也一臺之威足以繩百僚也一臺之屬足以振萬事也一臺之貴足以重朝廷也故國家有大蠧可得而去也郡國有大好可得而接也天下之大利害生民之大休戚百官之大廢置群吏之黜陟皆得督視而劾聞焉重臺諫古人設官必重臺諫之權者非重臺諫也重臺諫所以重朝廷也在漢光武時與百官絶席而當時號獨坐者在唐憲宗時有使百官避道而當時號為龍街者夫入也而使百官絶席出也而使百官避道是果何意哉豈非重其權所以使人有畏耶蘇總龜臺諫權輕人無畏心今日之所恃以折天下奸雄之心者亦固有在然不可以輕其權而使人無畏心人而至于無所畏則亦何所不至夫朝廷欲自便而以臺諫為長員官吏無所憚而以臺諫為文具則亦何以臺諫為哉蓋古者譏訶之權在臺諫而後世進退臺諫之權在權貴夫人之所望扳援而進者固奔走之不暇惟所欲言則借臺諫之重以言之惟所欲去則假臺諫之權以去之事有關于權貴者甘為立仗馬而已至于今日而一章眀日而一疏不過以細謹責天下之士以薄刻恐天下之吏閨門之細故鄉黨之微纍煩紊瑣屑徒厭人聽夫是以所言皆權貴之所指所去皆權貴之所忌昔先朝有為臺官者上謂之曰朕不欲臺諫奉行宰相風㫖則對曰臣非惟不欲奉行宰相風㫖亦不欲奉行陛下風㫖壯哉斯言臺諫皆若而人也則臺綱之不振無是理也同上侍臣諫臣負紫荷槖夾玉皇香案以備清問之顧問者天子之侍臣也簮獬豸冠攖萬乘龍鱗以張天下之膽目者天子之諫臣也朝廷清眀公道振立則一政事之得失不獨諫臣能言之而侍臣亦能言之一用舍之當否不獨諫官能規之而侍臣亦皆規之同上監司守令監司不可過為寬厚今為一路之州縣不知其幾為州縣之官吏不知其幾州則守也倅也下于此則曺掾也縣則令也丞也下于此則簿尉也天下之人不能皆無能皆不肖某人何人也仁可以治民也才可以辨事也亷可以率俗也吾舉之吾君用之夫嗚乎而不勸某人何人也貪汚也闒茸也裒斂以奉上位也奸巧以媚要勢也吾按之吾君殛之夫烏乎而不警一言而人以為勸一言而人以為警夫是以無負于風采之寄今且不然所舉之人某為親舊也某為權勢也一嵗之出按者凡幾州縣之所厯者凡幾以謾不可校之簿書與夫不切之訟諜紛乎其前彼其心雖知其吏之不法而當按則曰某人某之子弟也某人某之親故也某人某之所嘗屬託也吾何忍按焉人且從而稱之曰是寬厚長者之為監司者也夫寬厚長者固士大夫之美名而為天子風采之任則亦何用乎此同上逺地之守當擇廣南之地去京師尤逺瘴癘蟲毒種種穢惡內地之人南轅越嶺不啻斥逐必罪戾孱庸不得已而後膺其選而又地産珍竒掌握之物足富數世疆域曠邈按察稀臨宫闕萬里赴訴莫及則無聊汨沒之人何憚而不為賄乎厯盡交廣之間民獠多叛職由此也賈父來晚之歌尹來殺我之誚人情大可見矣選任守臣可不戒哉吳闕善政所感政之善惡有感于物者亦有感于人者蝗避中牟鳯集頴川九江得人而去猛虎潮陽得人而去鰐魚善政感物者也米以王渙而通粟以李峴而賤有李勉則夷舶來有薛公則魚鹽至善政感人者也二千石善政吾聞風行于上而水波此天下之至文仁形于心而民服此天下之善化豈可以多為令而病民慢自設于險而病民詐也九轉丹砂㸃鐵成金兩漢循吏鑄頑成仁我簡易則民肅我平易則民親今使髙安之農養生于桁楊之外珥筆于教訟者𫝊問孝之章婺耳鎖亢者深春耕之耒賣私鬭之刀劒以為牛羞淫祠之樽爼以養親雖承平百年雨露滲漉非二千石所以教人者乎黃山谷善政即為漢之循吏夫猛而不害善良寬而不長奸宄雖兩漢循吏不過如此萍鄉邑里之間鴟梟且為鳯凰稂莠皆化為嘉穀矣同上守令不任事夫食人之食者任人之責衣人之衣者懷人之憂朝廷以十萬户付之一守以百里地委之一令元元之休戚繫焉一時之豐耗繫焉不知懼此而寅緣為奸亦勿思之甚且設官置吏本以為民今也為民父母而反有以蠧民民何所望耶然士方未仕之時兾得寸祿以有為逮夫嵗月之積家溫食飽則平日志願一皆沒沒吁可歎哉嚴谷吏為民之乳牧嵗當旱歉羣情嗸嗸綏靜撫摩尚虞多事倘貪吏復從而蹙削之是子方啼饑而乳之囂者復奪其食牛方奔喘而牧之悍者復疾其鞭則其轉就羸殘而激成摶觸其勢所必至焉耳人君保民均于保子愛民甚于愛牛而為之乳與牧者實寄諸吏良吏貪吏良吏出為德星則雖齊嵗方艱而民懷父母之戀貪政肆為碩鼠則雖魏麥可食而民興逝去之思贓吏贓吏者人心之巨蠧也芟其根而毋使之蔓伐其枝而毋使之萌布滿郡縣者皆羔羊素絲之節牧養生民者無苛政猛虎之嫌官吏之弊然以風霜之評議者未必畏朝夕之誅求者每自若貪婪狼狽疾險鷙猛肆貪暴之毒長告訐之風以詞訟為興利之門以獄犴為論財之府快意于常刑之外橫取于經賦之餘以慈祥愷悌為姑息以刻剝慘毒為整辦議論習尚日趍于薄似非清眀聖時所宜有也羣書考索别集卷十八
