body:
  text: 羣書考索後集卷二十六宋章如愚編士門學制類五帝有成均之學周禮大司樂掌成均之法鄭注引董仲舒曰成均五帝之學有虞氏大學為上庠小學為下庠大學篇曰古之欲明明徳於天下者先治其國欲治其國先齊其家欲齊其家先修其身欲修其身尊師敬長而大學之道著焉記曰君子如欲化民成俗其必由學乎玉不琢不成器人不學不知道是故古之王者建國君民教學為先魏文侯孝經傳曰大學中學也庠言養也所以養儁徳也舜命䕫曰汝典樂以敎胄子胄子國子也夏后氏大學為東序小學為西序次序先王之道而學之殷制大學為右學小學為左學又曰瞽宗王制曰小學在公宫南之左大學在郊鄭𤣥云學所以學士之宫也尚書傳曰百里之國二十里之郊七十里之國九里之郊五十里之國三里之郊宗尊也瞽無目之名以喻童蒙又云瞽矇之所宗也周制大學為東膠小學為虞庠膠之言糾也所以糾收學士也鄭注祭義云周有四郊之虞庠也以小學為虞庠之制又云天子曰辟雍辟明也雍和也以明和為名化道天下之人使之成士或云辟者圓璧也雍之以水而圓象天於陽徳之施行取流無極使學者進徳而不已亦所以明和政教之至崔靈恩云學制有二一云制與明堂同體五室四堂在一基之上四方堂則以其方名學中央堂謂之大學二云凡立學之法有四郊及國中在東郊曰東學並方名之在國中謂之大學故鄭注祭義曰周布四郊之虞庠諸侯學曰頖宫頖之言班所以班政教五經通義云泮水者泮之言半也天子曰辟雍謂之土雍水外員如璧故曰辟雍義取四方来觀者平均耳泮宫水雍其半蓋東西門以南通水北無水也頖音泮也漢髙帝以叔孫通為奉常諸弟子共定禮儀者咸為選首其後亦未遑庠序之事至孝文時頗登用言少用文學之士也及景帝不任儒學竇太后又好黄老術故諸博士具官待問未有進者具官謂備員而已文翁景帝時為蜀守選郡縣小吏遣詣京師受業於博士又修起學宫於成都市中蜀地由是大化比齊魯焉至武帝乃令天下郡國皆立學校官自文翁始循吏傳是時田蚡為丞相黜黄老刑名百家之言延儒者百數自漢興言易有淄川田生言書自濟南伏生言詩於魯則申培公於齊則轅固生燕則韓太傅嬰言禮則魯髙堂生言春秋於齊則胡母生於趙則董仲舒而公孫𢎞為丞相得封侯天下靡然向風矣制令禮官勸學講議洽聞舉遺興禮以為天下先舉遺謂經典遺逸者求而舉之太常議曰聞三代之道鄉里有教勸學興禮崇化勵賢以風四方太平之原也因舊博士置弟子五十人太常擇年十八以上儀狀端正者補博士弟子昭帝舉賢良文學增博士弟子員數滿百人至成帝時劉向請興辟雍設庠序帝下公卿議會向病卒而止成帝末增弟子員三千人嵗餘如故通典及王莽為宰衡欲耀衆庶遂興辟雍増元士之子得受業如弟子甲乙之科後漢光武五年初起太學帝幸太學賜博士弟子各有差中元元年初起明堂靈臺辟雍明帝永平二年臨辟雍初行大射禮幸辟雍初行養老禮上自為辨説諸儒執經問難於前冠帶縉紳之人圜橋門而觀聽者蓋億萬計九年皇太子諸王侯及大臣子弟功臣子孫莫不受經又為外戚四姓立學於南宫號四姓小侯學置五經師自期門羽林之士悉令通孝經匈奴亦遣子入學自安帝覽政薄於藝文博士倚席不講朋徒相視怠散學舍頺弊鞠為園蔬順帝感翟酺之言乃更修黌宇凡所造二百四十房千八百五十室試明經下第補增甲乙之科員各十人會要質帝本初元年詔令郡國舉明經五十以上七十以下詣太學自大將軍以下至六百石悉遣子弟就學每春秋輒於鄉射月一會有勸勉進用之端於是遊學者增至三萬餘生桓帝建和初詔諸學生課試補官元嘉二年詔曰書生汝南胡憲陳留恭幸爽睪或六十以下常以月朔會辟雍垂白安貧童子潁川王通經拜太子舍人因試憲等補郎舍人後皆限六十以上七十以下年有增減不應得試易記天地之數五十有五此所以成變化今五十在試科是應天地之數也永嘉二年復課試諸生補郎舍人獻帝建安中侍中鮑衡奏按王制立大學小學自王太子以下皆教以詩書而升之司馬謂之賢者任之以官故能致刑措之盛立太平之化也今學博士並設表章而無所教授兵戎未戢人並在公而學者少可聽公卿一千石六百石子弟在家及將校子弟見為郎舍人皆可聴詣博士受業其髙才秀達學通一藝太常為作品式從之晉摯虞決疑云漢初置博士而無弟子後置弟子五十人與博士俱與習肄禮儀又増滿五百人漢末至數千人魏文帝黄初五年立太學於洛陽著慕學者始詣太學為門人滿一嵗試通一經者稱弟子不通一經罷遣弟子滿二嵗試通二經者補文學掌故不通經者聽須後輩試試通二經亦得補掌故滿三嵗試通三經者擢髙第為太子舍人不第者隨後輩復試試通亦為太子舍人滿二嵗試通四經者擢其髙第為郎中不通者隨後輩復試試通亦為郎中滿二嵗能通五經者擢髙第隨才叙用不通者隨後輩復試試通亦叙用晉武帝憂勤軍國猶復修立學校太學生初三千人太始八年有司奏太學生七千餘人才任四品聽留詔曰已試經者留之大臣子弟堪受教者令入學其餘遣還郡國咸寧二年起國子學法周禮國之貴㳺子弟國子受教於師者也惠帝元康三年以人多猥雜欲辨其涇渭於是制立學官品第五以上得入國學東晉元帝時太常賀循上言尚書被符經置博士一人又多故歴紀儒道荒廢學者能兼明經義者少且春秋三傳俱出聖人而義歸不同自前代通儒未有能通得失兼而學之者也况今學義甚頺不可令一人總之今宜周禮儀禮二經置博士二人春秋三傳置三人其餘則經置一人合八人太常車𦙍上言按二漢舊事博士之職唯舉明經之士遷轉各以本資初無定班魏及中朝多以侍中常侍儒學最優者領之職雖不同漢氏盡於儒士之用其揆一也今博士八人愚謂宜依魏氏故事擇朝臣一人經學最優者不繫位之髙下常以領之每舉太常共研厥中其餘七人自依常銓選太興初欲修立學校唯周易王氏尚書鄭氏古文孔氏毛詩周官禮記論語孝經鄭氏春秋左傳杜氏服氏各置博士一人其儀禮公羊穀梁及鄭易皆省不置博士東晉成帝咸和三年袁環請興學校集生徒而士大夫習尚老莊儒風不振孝武帝大元初於中堂立行太學于時無復國子生置太學生六十人國子生權銓大臣子孫六十人事訖罷其國子生見祭酒博士單衣角巾執經一卷以代手板自穆帝至孝武並以中堂為太學大元九年尚書謝石請興復國學以訓胄子頒下州郡普修鄉校帝納其言明年選公卿二千石子弟生増造廊房屋百五十五間而品課無章君子恥與其列國子祭酒殷茂上言臣聞舊制國學生皆取冠族華胄比列皇儲而其中混雜蘭艾遂令人情恥之詔雖褒納竟不施行宋武帝詔有司立學未就而崩文帝雅好藝文使何尚之立𤣥素學何承天立史學謝𤣥立文學雷次宗立儒學為四學帝數幸學溫公論曰學者所以求道天下無二道安有四學哉會要元嘉二十年立國學二十七年廢明帝大始中初置總明觀祭酒一人有𤣥儒文史四科科置學士十人齊髙帝建和四年詔立國學置學生百五十人取王公以下子孫年十五以上二十以下家去都二千里為限帝崩乃以國諱廢學武帝永明三年詔立學乃省總明觀召公卿以下子弟置生二百二十人其年秋中悉集東昏侯永光初詔依永明舊事廢學時有司奏國學太學兩存焉梁武帝雅好儒術以東晉宋齊雖開置國學不及十年輒廢之其存亦文具而已無講授之實乃詔置五經博士各一人廣開館宇博士各主一館又遣博士祭酒巡州郡立學會要後魏道武帝初定中原始於平城立太學置五經博士生員千餘人天興二年春増國子太學生員三千太武始光三年别起大學於城東後徵盧𤣥髙允等令州郡各舉才學於是人多砥礪儒術轉興獻文帝天安初立鄉學郡置博士二人助教二人學生六十人後令大郡立博士二人助教四人學生百人次郡立博士二人助教四人學生八十人中郡博士一人助教二人學生六十人下郡立博士一人助教一人學生四十人郡縣學始乎此矣孝文太和中改中書為國子又開皇子之學及遷都洛邑立國子太學四門小學通典隋文帝詔天下學校生徒多而不精惟簡留國子學生七十人太學生四門州縣學並廢會要開皇中國子寺不𨽻太常自前代皆屬太常也唐髙祖武徳元年詔皇族子孫及功臣子孫於祕書外省别立小學又詔諸州明經秀才俊士明於理體為鄉里稱者嵗隨方物入貢吏民子弟學藝者皆送於京為設考課之法州縣皆學焉太宗即位益崇儒術貞觀五年數幸國學遂増築學舍千二百間國學太學四門亦増生員其書筭各置博士凡三千二百六十員其屯營飛騎亦給博士授以經業無何髙麗百濟新羅髙昌吐蕃諸國酋長亦遣子弟請入國學之内八千餘人國學之盛近古未有髙宗龍朔二年東都置國子監丞主簿録事各一員四門博士助教四門生三百員俊士二百員置𢎞文館於上臺生徒三十人置崇文館於東宫生徒二十人皆以皇族緦麻以上親皇太后皇后大功以上親散官一品中書門下平章事六尚書功臣身食實封各京官職事正三品供奉官三品子孫京官職事從三品中書黄門侍郎子孫為之並尚書省補西京國子監領六學生徒皆尚書省補一曰國子學生徒三百人分習五經一經六十人以文武官三品以上及國公子孫從二品以上之曾孫為之二曰太學生徒五百人每一經百人以四品五品及郡縣公子孫及從三品之曾孫為之三曰四門學生徒千三百人分經之制與太學同其五百人以六品七品及侯伯子男之子為之其八百人以庶人之俊造者為之四曰律學生徒五十人取年十八以上二十五以下以八品九品子孫及庶人之習法令者為之五曰書學生徒三十人以習文字者為之六曰筭學生徒二十人以習計數者為之凡二千二百一十人州縣生徒有差州縣學生門蔭與律書同諸生皆限年十四以上十九以下皆郡縣自補京都八十員大都督中都督府上郡各六十員下都督府中郡各五十員下郡四十員京縣五十員上縣四十員中縣三十員下縣二十員也凡諸學皆有博士助教授其經藝每嵗仲冬郡縣館監課試其成者長吏會屬寮設鄉飲之禮通典明年以書學隸蘭臺筭學隸祕閣律學隸詳刑考疑開元七年十月皇太子詣國學行齒胄禮二十六年正月赦文古者鄉有序黨有塾將以𢎞長儒教誘進學徒化人成俗率由於是其天下州縣每一鄉之内里别各置一學仍擇師資令其教授又敕諸州鄉貢見訖令就國子監謁先師學官為之開講所司設食𢎞文崇文館學生及監内學生亦許聽焉天寳初明經進士習爾雅九載國子監置廢文館知進士業天寳十二載七月舉人不得充鄉貢皆補學生四門俊士停之代宗永泰二年正月國子祭酒蕭昕上言請崇儒學以正風教勅曰頃以戎狄多虞急於經畧太學空設諸生蓋寡絃誦之地寂寥無聲函丈之間殆將不掃上序及此甚用憫焉其諸道節度觀察都督防禦使等朕之腹心久鎮方面眷其子弟各奉義方并宰相朝官及神册六軍子弟欲習業者自今以後並令補國子學生欲其業重籝金器成琢玉日新厥徳代不乏賢其中身雖有官欲附學讀書者聽其學官委中書門下即簡擇行業堪為師範者充學生員數多少所習經業考試等第并所供糧料及緣循理各委本司作事件聞奏唐館𢎞文館唐太宗即位崇儒術乃於門下别置𢎞文館髙宗龍朔二年置於東都上臺生徒三十人崇文館唐太宗貞觀十三年東宫置崇文館龍朔二年置於東都東宫生徒二十人兩館生徒並以皇族后親三品以上子孫為之廣文館唐𤣥宗天寳九年七月置領國子監進士業者博士助教各一人太學以鄭䖍為博士至今呼鄭䖍為鄭廣文會要西都六十人東都十人修文館中宗時置修文館學士員遷公卿以下善為文者李矯等為之每遊宴畢從於是天下靡然以文華相尚儒學忠讜之士莫得進矣宋朝承五代之舊有國子監太學太祖三幸國子監太宗亦幸國子監真宗亦嘗幸太學由是太學翕然文風大振仁宗天聖九年青州王曾以州闕學教育諸生乃繕官舍為州學請國子監羣書上從其請其後天下有請建學賜書與田並從之慶歴四年宋祁上言於是諸路州府軍監並皆立學校及二百人以上又立縣學列聖相承無不以學事為念徽宗崇寧四年始行三舍之法建辟雍之學又慮山林之士不能月書季攷以遊庠序於是科塲與學校並行舍法則嵗貢科塲則隨大比之嵗宣和五年復罷舍法而一歸於科舉髙宗重興太學而士風浸盛太祖建隆三年正月癸未幸國子監二月丙辰幸國子監六月辛夘幸國子監周世宗之二年始營國子監置學舍上既受禪即詔有司增葺祠宇塑繪先聖先賢先儒之像上自賛孔顔命宰臣兩制以下分撰餘賛車駕一再臨幸焉於是左諌議大夫河南崔頌判監事始聚生徒講書上聞而嘉之太宗端拱元年八月庚辰車駕幸國子監謁文宣王禮畢升輦將出四門顧見講坐左右曰博士李覺方聚徒講書上即召覺令對御講覺曰陛下六飛在御臣何敢輒升髙坐上因降輦命有司張帟幕設别坐詔覺講周易之泰卦從臣皆列坐覺乃述天地感通君臣相應之㫖上甚悦特賜帛百疋端拱二年二月以國子監為國子學淳化五年十一月丙寅上幸國子監賜直講孫奭五品服因幸武成王廟復幸國子監令奭講尚書説命三篇至事不師古以克永世匪說攸聞上曰誠哉是言也上意欲切礪輔臣因嘆曰天以良弼賚商朕獨不得耶遂飲從官酒别賜奭束帛真宗咸平二年七月甲寅上幸國子監召學官觀偓佺講尚書大禹謨還幸崇文院登秘閣觀太宗聖製墨迹惻愴久之賜祕書監祭酒以下器帛偓佺頤正弟也咸平四年六月丁夘詔諸路州縣有學校聚徒講誦之所並賜九經景德二年五月戊申朔幸國子監閲書庫問祭酒邢昺書板幾何昺曰國初不及四千今十餘萬經史正義皆具臣少時業儒觀學徒能具經疏者百無一二蓋傳寫不給今板大備士庶家皆有之斯乃儒者逢時之幸也上喜曰國家雖尚儒術然非四方無事何以及此先是館閣博聚群書精加讎校經史未有印板者悉令刋刻或言三國志乃姦雄角立之事不當傳布上曰君臣善惡足為鑒戒仲尼春秋豈非列國爭鬭之書乎又幸西京謁先聖詔河南府營建國子監又幸曲阜謁文宣王廟帝展拜以表嚴師崇儒之意會要景德三年五月癸丑詔國子監學官月俸自今並給見錢景德四年二月癸酉就西京建太祖神御又置國子監武成王廟祥符二年四月辛夘令國子監舉服勤詞學經明行修進士諸科各十人前詔止開封府洎所過州軍至是本監上言故及之乾興元年十一月壬午國子監舊制皆用近臣及宿儒典領近嵗頗任貴遊子弟之初仕者與管庫資序畧均壬辰始命馮元同判國子監仍詔自今無得差補蔭京朝官仁宗即位崇儒術以勸學者乃首命龍圗閣學士馮元以領監事特重之上曰講學之廢久矣執卷者不知經義非學校不興而上之教導有不至耶詔孫奭馮元薦博明經術者以名聞天聖五年正月晏丞相殊留守南京范文正公仲淹希文方遭母憂寓居城下晏公請掌府學范公常宿學中訓督學者皆有法度勤勞恭謹以身先之夜課諸生讀書寢食皆立時刻往往潜至齋舍伺之見有先寢者詰之其人答云適疲倦暫就枕耳問未寢之時觀何書其人亦妄對則取書問之其人不能對乃罰之出題使諸生作賦必先自為之欲知其難易及所當用意亦使學者凖以為法由是四方從學者輻輳其後宋人以文學有聲名於塲屋朝廷者多其所教也涑水記聞天聖九年青州王曾以州闕學教育諸生乃繕官舍為州學請國子監羣書上從其請其後天下有請建學賜書與田並從之明道元年七月甲戌許壽州立學仍賜九經知州侍御史朱諫請之也明道二年五月庚寅許大名府立學仍賜九經從王曾之請也三月乙未賜亳秀濮鄭四州學田各五頃景祐二年三月丁酉詔國子監直講一員兼領監丞主簿事十月己巳許蘇州立學仍給田三頃十一月辛巳朔以應天府書院為府學仍給田十頃九月壬寅賜鄭州學田五頃十月壬子許蔡州立學十二月乙丑許孟州立學仍給田五頃景祐三年正月己酉許洪州宻州立學仍各賜田五頃三月癸巳許潞州常州立學四月乙亥許衡州立學五月戊子許許州立學五月壬辰許潤州立學五月戊戌許真州立學仍給田五頃六月戊申朔許越州立學仍給田五頃六月壬子許階州立學仍給田五頃六月甲子許真定府博州郢州立學各給田五頃八月甲寅許并州立學九月庚辰許絳州立學十月辛未許合州立學十一月乙亥許江州立學景祐四年正月戊寅賜蔡州學田十頃二月丙寅賜常州學田五頃十二月壬申給真定府潞州學田五頃四月乙巳賜宣州學田五頃諸州學田各五頃仍詔自八月戊戌許華福二州立學餘須藩鎮乃許立學十二月乙酉給徐州學田五頃寶元元年二月甲戌賜鄆州學田五頃三月己酉許潁州立學潁非藩鎮也於近詔不當立學知州蔡齊有請特從之七月癸丑賜襄州學田五頃寶元二年二月庚午許明州立學仍給田五頃三月丙辰許泉州立學仍給田五頃十一月辛丑許建州立學仍給田五頃康定元年正月壬戌賜國子監學田五十頃慶歴三年十月戊午以南京府學為國子監庚申許廣州立學慶歴四年春二月乙巳以上清宫田園邸店賜國子監三月己夘范仲淹言意欲復古勸學數言興學校本行實詔近臣議於是翰林學士宋祁御史中丞王拱辰知制誥張方平歐陽修殿中侍御史梅摰天章閣侍講曾公亮王洙右正言孫甫監察御史劉湜此八人姓名據李清臣史藁增合奏曰伏奉詔書議夫取士當求其實則人當盡其材今教不本於學校士不察於鄉里則不能覈名實有司束以聲病學者專於記誦則不足盡人材此獻議者所共以為言也謹參考衆說擇其便於今者莫若使士皆土著而教之於學校然後州縣察其履行則學者修飭矣故為設立學舍保薦舉之法詔曰夫遇人以薄者不可責其厚也今朕建學興善以尊學士大夫之行而更制革弊以盡學者之才教育之方勤亦至矣有司其務嚴訓導精察舉以稱朕意學者其進徳修業無失其時凡所科條可為永式通畧慶歴四年四月壬子判國子監王拱辰田况王洙余靖等言首善當自京師漢太學二百四十房千八百餘區生徒三萬人唐學舍亦千二百間今取才養士之法盛矣而國子監才二百楹制度狭小不足以容學者請以錫慶院為太學葺講殿備乗輿臨幸以潞王宫為錫慶院從之嘉祐元年十二月乙夘太子中允天章閣侍講胡瑗管勾太學始瑗教授湖州科條纎悉備具以身先之雖盛暑必服坐堂上嚴師弟子之禮視諸生如其父兄諸生亦信愛如其子弟從之遊者常數百人慶歴中興太學下湖州取其法著為令瑗既為學官其徒益衆太學至不能容取旁官舍處之禮部所得士瑗弟子十常居四五隨材髙下善自修飾衣服容止徃徃相類人遇之雖不識皆知其為瑗弟子也於是擢與經筵治太學猶如故嘉祐二年五月壬申管勾國子監吳中復言舊制每遇科塲即補試廣文館監生近詔三嵗貢舉須前一年補試比至科塲多就京師私買監牒易名就試及旋冒畿内戸貫以圗進取非所以待逺方孤寒之意請自今遇科塲補試監生如故仍以四百五十人為額從之尋又増一百五十人羣書考索後集卷二十六
