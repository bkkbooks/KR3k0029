body:
  text: 羣書考索續集卷四十八宋章如愚編輿地門諸路二十三路魏晉而下西北之地浸沒於羌狄至於宋朝而有虞十二州之地幾失其三幽州并州營州而元豐二十三路三代以前犬羊為蠻夷之域大抵東南衣冠之地皆往古之蠻夷而西北左衽之鄉盡先王之都邑是以有志之士深切嘆恨王化所加唯在蠻羌荒而不能復先王之都邑往往指燕雲河湟為重指江湖川廣為輕而不知地無常利天運實衡其勝衰凡日月所照可以驅蛇龍剪荆棘而人其居者皆可為中國皆可以為夷狄茍天之所棄何有於華夏天之所祐何有於蠻荒如海表蟠木之地髙陽之疆理也而唐虞棄之無害其為蕩蕩巍巍之功遼東營州之地唐虞之疆理也而隋唐棄之無害其為開皇貞觀之隆燕雲河湟之地隋唐之疆理也而宋朝棄之無害其為聖聖承承百有七十年太平極治之烈然則先王之地固有不必重矣如陜右山南之地夏商以前蠻夷之域也而姬周資之以興王業劍南嶺表之地姬周以前蠻夷之域也而秦漢闢之資以富強海隅七閩之地秦漢以前蠻夷之域也而隋唐理之遂隆美化然則蠻荒之地固有不必輕矣蓋三代以前天運王於西北而廢棄東南故戎狄折北不支而蠻夷得以徼幸當時帝王有作則利於西北而不利於東南故髙陽疆蟠木宅龍城唐營州宋朝棄於東夷黃帝逐獯虜而邑涿鹿唐幽州宋朝棄於北狄髙宗震伐於鬼方西戎之逺也文王逺城於朔野唐雲夏之間宋棄於北狄莫不集厥殊勳訖無後患至虞舜南巡則終於蒼梧夏禹東巡則殁於會稽宋越州有苗之征既以逆命昭王南巡亦復不反大抵經略東南未嘗有所濟也逮秦漢而下天運稍回滋眷佑於東南而西北代以陵替故蠻夷折北不支而戎狄得以徼幸當時帝王有作則不利於西北而利於東南是以秦漢開萬里之封而川廣悉為郡縣隋唐闡海隅之化而閩浙盡為衣冠蠢爾蠻荒於變中華當時既赫厥靈後世益蒙其利至於晉招五部則變生劉石唐開四鎮則禍極吐蕃漢將屯田於蔥嶺重困華人唐宗列郡於隂山終為異域大抵開羌狄為郡縣者未嘗有所濟也是豈非天運回旋而有至此也譬諸人之居焉小人居之則謂之小人君子居之則謂之君子名實在人何常之有春秋之法中國而用夷狄之禮則黜為夷狄夷狄而用中國之禮則進為中國是中國夷狄之人且無一定矧於其地哉而議者謂江湖而南風氣濕燠有失四時之正踰嶺南則有春夏而無秋冬此其所以不可進於中國也而不知四海之內得隂陽之正者唯河南為然渡河以北沿關以西則風氣稍涼至燕雲河湟之間則有秋冬而無春夏其失天地之和一也先王既輯正於西北則後王有作疆理東南復何疑哉由是以論則天運之所加人事之所修皆可以為帝王之居仰觀俯察則西北不得不重於古東南不得不重於今能深究天人否泰之理則天下大勢默可知矣九州禹别九州禹别四海為九州宜若有均一之制而校其道里廣狹全不相侔濟河兖州淮岱徐州相去不能千里荆河豫州千里而近海岱青州千五里而縮荆山衡陽荆州二千里而遙東海西河兾州二千里而近夀春之淮潮陽之海楊州相去且六千里龍門之黃河燉煌之黑水雍州相去以四千里以至華陽黑水窮數千里而未知所經是何廣狹之殊也或者九州之别品殊墳壤因土宜而别也故其道里無得而均然而荆河淮濟之間徐兖豫三州之境也截長補短不能當淮海一州之半借使三州土壤既殊不可得而并揚州之大獨不可得而釐耶古今名儒訓釋禹貢多矣而未始及此蓋難言之也切嘗討之九州之别蓋倣井田之法井田之法始於黃帝方里而井九百畝中為公田八家皆私百畝同養公田而九州之制一州為王圻八州建國以蕃王室是同養公田之義也故其區别境壤不因土宇之小大不限山川之間阻唯據民田多寡而均之耳然而四海之內夷險不齊如荆河淮濟之間百舍坦夷萬頃一瞬而又當中原要區民力修地利盡良疇既闢廣土實稀故三州徐兖豫境土最為狹也至淮海以南揚州淮南荆州漢南幽劒以西雍州在函谷之西梁州在劒閣之西江淮泛濫關山重復而又僻在遐陬闊踈稼政平土蓋寡闢田甚艱故四州境土最為闊也嘗考西漢之時去古未逺方其極盛九有民户揔計千二百餘萬而徐兖豫三州當五百五十萬户青兾二州當三百五千萬户而荆揚雍梁四州僅當三百萬户夫民非榖不生榖非民不植推其户口之多寡足以見田疇之廣闊據今驗古略可知則九州之别唯民田是均斷可考矣嗚乎治有本要帝王一道其來久矣神農之教曰石城十仭湯池百步帶甲百萬而無粟不能守也故舜咨十二牧則曰食哉惟時洪範八政則以食居其首周官九職則以農為先誠以國以民為本民以食為命而食非田不給田非民不耕有田而後可以賦民有民而後可以立市朝廷國家故先王所重唯民與田其所以體國經野設官分職侯甸之制軍國之用皆取定於民田故官無間則兵無聚散家無豐儉民無勞逸而國有致一之斂民有不二之業有田斯墾有榖斯積雖遇水旱兵凶而民無菜色故得禮節著而榮辱彰時雍之治由之而致也爰自秦開阡陌而廢井田罷侯置守以要害為先而不復以民田為制魏晉而下因仍不改坐水陸而建都會鞏山河而峙城郭民物所聚南畝實遙形勢之地良田蓋寡至於平土多疇衣食所資則反以為敞夷不守之地而不知務大抵所重非所本所本非所重先王之制數口之家受田一頃後世邊隅小邑民户不盈數百則地利安能有盡至名區大郡多至數十萬户則又安能有數十萬頃之田乎民無常産則本於末業有天下國家者既不能為之間禁又從因之以規利遂致不耕之民多於南畝有司者徒知日計之有餘而不知嵗計之不足也古稱一年耕必有三年之蓄謂人皆土墾也今耒耜之民僅能當天下十之三使嵗皆有年則斯民僅堪糊口設嵗有不登所在不免告糴然後知先王之制所以為社稷生民之計矣後王之治所以有愧前王者匪惟德教之有虧固亦法制之良也嗟乎今之天下亦古之天下豈先王之制唯可行於古之天下豈先王之制唯可行於古而不復可行於後世乎抑亦復之者未得其漸耳捨先王經國之制未易遽復而先王愛民之心詎可弭忘哉後王之治信能一政之設一令之施惟民與田是崇是重則王制雖未必更張而時雍之治豈云難致臣因考九州之制知先王以民田為重故備論於此庶幾按九州之圖則足以見先王之心無徒論其道里逺近山川夷險而已五服陶唐五服據禹貢五服之制九州之內止方五千里而先儒較以有漢廣輪之制全不相侔以謂西漢盛時東西九千三百里南北萬五千里而山川所屆不出禹貢之域何道理之殊絶也遂致孔頴逹之徒有鳥道之説謂禹貢之制據虛空鳥飛徑過而言兩漢之制以人迹所通逶迤曲屈動有倍加此先儒一定之論而臣切以為不然夫鳥道信為徑通而人迹安能有及抑常討之王制古者百里當今百有二十一里今謂漢也是禹貢五千里之制即漢之六千里也况五服之制據方里而言合以東西四正為據當時堯都平陽正東至東萊之海才二千八百里正西至張掖之流沙才三千三百里是僅可以滿五服之制也兩漢九千里之制則以遼東之海與燉煌之流沙而言也而遼東任東北隅燉煌任西南隅非其正也夫正方一尺者袤之而度其兩隅則為尺有四寸而嬴則五服之制舉其隅而度之宜其九千里也漢制南北萬五千里者舉朔方日南而言也而禹貢所屆正南止及衡山之陽而日南又在衡山之南八千餘里非禹迹所及也至平陽之北不盈千里已為戎狄之地是五服之制唯東西南三方為然北方僅滿二服而已尚何鳥道之云乎則先儒巧傅之説失其據矣嗟乎古先哲王為天下後世之慮何其審也夫九州之地四正雖近四隅實遙非不知舉其隅計其道里之逺足為大也五服之制乃舉其近而略其逺何哉蓋不欲以一時廣大之名啓後世無厭之欲所以貽孫謀以正也惜乎秦漢以還好大之君以廣斥土宇為功而記録之臣又從而恢張之是豈知堯禹之用心乎嗚乎戒哉疆域先王疆域傳稱黃帝北邑涿鹿唐幽州宋棄之北狄虞世南陟蒼梧宋朝荆湖南路道州寧逺縣非嶺表之蒼梧也夏禹東巡會稽宋朝兩浙路越州會稽縣然則後世近荒之地皆先王之內封其正朔所加邈焉可知以至髙陽之際海裔來同北止幽陵南止交趾西止流沙東止析木萬里廣輪一同文軌疆里所屆何其盛歟此秦隋漢唐之君所以務斥大封域糜耗華夏甘心邊夷而無悔者也然徒知先王之盛而不知其所以盛虞夏以前承太古巢穴之餘蠢蠢林林自相君長八紘之中棊布星分畫為萬國其侯邦所履僅能及後世一鄉一亭漢時六千六百二十二鄉二萬九千六百三十五亭其勢力最寡弱而易制也故一人表正則萬國葵傾化之所被者益廣則正朔之所際者益宏是以唐虞之時蠻夷猾夏惟明五刑三旬逆命禹已班師非有如後世強冦徑敵拏兵不解而敢與上國抗衡者也然則黃帝舜禹之盛豈有勞於服逺哉抑以為斯民愛戴之厚不敢自逸故遑遑然周恤之耳爰自夏商以降兵革荐興轉相侵侮小國日滅大國益橫而車書始難同矣何則禹會諸侯於塗山執玉帛者萬國而商湯革命有三千餘國是四百年間轉相吞滅者矣逮夫姬周浸興武王革命封建有加而揔計不踰千八百國是六百年間轉相吞滅又幾半矣故侯邦益大夷狄益強文王之時遞行天討而大邦始畏其力西方則昆夷鼎盛北陲則獫狁獨強交侵中國莫可制禦雖三分天下有二而亦不過命將帥以守衛中國而已自時厥後中國土宇滋蹙而夷狄寖強江浙之間已為文身斷髮之鄉朝聘盟會未始通於上國於會稽蒼梧何有哉故堯舜之教逺暨朔南文王之化近行江漢周公體國經野而舜禹陟方之地有在蠻服之外夫黃帝髙陽唐堯虞舜夏禹文王周公皆古聖人也其君國澤民之道豈相反戾抑亦時或不侔耳使其易地詎不皆然則後王之時所以不及古先哲王之盛者匪惟德之不宏固亦勢有不可也而秦漢以還好大喜功之君窮誅逺討惟日不足極唐虞聲教所暨悉為郡縣而猶以為未也噫何元元之不幸也歟文王周公之道果若是乎使黃帝髙陽舜禹復生於斯詎若是之勞民嗟乎黃帝登空洞宋朝鎮戎之境內虞舜陟蒼梧夏禹巡會稽非不勤逺也秦始皇登之罘山宋朝萊州之文登縣漢武帝登單于臺宋朝雲中府之西北隋煬帝幸鴈門宋朝代州亦非不勤逺也然先王之所以勤於逺者恐其德教有所不被故焦心勞思雖終老而無辭後王之所以勤於逺者恐其威武有所不加故勞民蠧國雖敗亡而無悔此古今相去所以殊絶也故臣謂其觀先王幅員之廣則足以知其德觀後王封域之大則足以知其暴能原先王之用心而弗泥其迹則可與言化矣西漢疆域髙惠文景之時天下甫安四夷鼎盛胸奴侵盜河南宋朝陜西路化外州尉陀竊據南越宋朝廣南西路閩越王猶保閩中宋朝福建路也中國疆域南北才五千里東西又且不及三代以還一王封域未有儉於此也而當時天下無事治幾刑措後世莫及逮夫武帝末年四陲之地舉皆開拓東西九千三百里南北萬五千里開闢以來一王疆里至此為盛而當時海內虛耗户口減半後世未有取也王莽之亂百姓謳吟思仰漢德故劉氏復起天下響應史臣以謂髙祖孝文之仁德結於斯人也深故光武成功若此其易彼漢皇基業恢宏如此曽何補於後世夫然後知務廣地者荒務廣德者王斯言不誣矣羣書考索續集卷四十八
