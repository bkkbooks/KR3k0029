body:
  text: 羣書考索後集卷三十五宋章如愚編姓門姓書曰錫土姓國語曰司商協名姓司商掌賜族受姓之官商金聲清謂人始生吹律合之定其姓名又曰昔少典生黃帝炎帝少典者諸侯國號稱人名也黃帝以姬水成炎帝以姜水成成而異德故黃帝為姬炎帝為姜史記曰黃帝二十五子得姓者十有四人晉司空季子曰黃帝之子二十五宗其得姓者十四人為十二姓姬酉祁已滕針任荀僖姞嬛依惟青陽與林氏同于黃帝故皆為姬姓史記夏義曰禹為姬姓其後分封用國為姓故有夏后氏有扈氏有男氏斟尋氏彤成氏褒氏費氏和氏繒氏辛氏冥氏斟氏戈氏殷贊曰契為子姓其後分封以國為姓有殷氏來氏宋氏辛桐氏稚氏北殷氏目夷氏周語曰伯禹疏川道淵鍾水豐物皇天嘉之祚以天下賜姓曰姒氏曰有夏謂其能以嘉祉阜生物也祚四嶽國命為侯伯賜姓曰姜氏曰有吕謂其能為禹股肱心膂以養物豐民人也左傳襄十年瑕禽曰昔平王東遷吾七姓從王漢髙帝賜婁敬姓劉氏唐髙祖賜徐世績李氏終漢之世有易姓如衛青之徒其後劉元海本胸奴種以冒頓與漢和及其外祖遂謂姓劉其弊至此豈非髙帝有以啓之歟唐世人主非其親者附之屬籍或加於夷狄盜賊以逆賊異類為同宗其弊至此豈非唐髙祖有以啓之歟范祖禹曰古之賜姓所以别之今之賜姓適以亂之氏左傳襄二十四年范宣子謂穆叔曰昔丐之祖自虞以上為陶唐氏在夏為御龍氏在商為豕韋氏豕韋國名東郡白馬縣東南有韋城在周為唐杜氏唐杜二國名殷末遷豕韋國於唐周成王滅唐遷之於杜為杜伯杜伯之子隰叔奔晉四世及士會食邑於范復為范氏杜今京兆杜縣晉主夏盟為范氏禮書曰古者或氏於國則秦魯齊吳氏於諡則文武成宣氏於官則司馬司徒氏於爵則王公王孫氏於字則孟孫叔孫氏於居則東郭北門氏於志則三烏五鹿氏於事則巫乙匠陶而受姓命氏燦然著矣馬援其先趙將號曰馬服君子孫因以為氏魯恭其先魯顔公為楚滅遷於下邑因氏焉樊宏其先周仲山甫封於樊因氏焉馮魴其先魏之支則食采馮城因氏焉宋暉其先微子之後也周衰諸侯滅宋奔碭易姓為宋本傳注姚䇿族書堯典曰以親九族九族既睦髙祖九族之親臯陶謨曰惇叙九族仲虺之誥曰志自滿九族乃離詩葛藟刺平王也棄其九族焉角弓刺幽王不親九族也行葦內睦九族周禮小宗伯掌三族之别禮記仲尼燕居曰閨門之內有禮故三族和三族父子孫也周禮太宰宗以族得氏大宗伯以飲食之禮親宗族兄弟陳禮書曰書與詩序皆言九族周禮小宗伯儀禮士昏禮記仲尼燕居特言三族者三族父子孫也九族髙祖至𤣥孫也三族舉其本九族極其末舉三族則九族見矣白虎通夏侯歐陽何琦如淳之徒以父族四母族三妻族二為九族其說蓋以詩之葛藟刺平王不親九族而言謂他人父謂他人母頍辨刺幽王不親九族而言豈伊異人兄弟甥舅角弓亦刺不親九族而言兄弟昏姻無胥逺矣則所謂九族者非特內宗而已是惡知詩人之所主者因內宗而發哉彼謂父族四者父之姓為一族父女昆弟適人者子為二族己女昆弟適人者子為三族己女適人者子為四族母族三者母之父母為一族母之昆弟為二族母之女昆弟為三族妻族二者妻之父為一族妻之母為二族然於母之母則合而為一族妻之父母則離而為二可乎魯桓公六年隨季梁曰親其九族以致其禋祀杜預注曰九族謂外親祖母從母子及妻父妻母姑之子姊妹之子女子之子并己之同族皆外親有服而異族者也爾雅於內宗皆曰族於母妻曰黨而已又禮小功之未可以嫁娶妻之黨固無妨於嫁娶昏禮不容慮其不虞也然則九族之說當以孔安國鄭康成為正何則小記曰親親以三為五以五為九上殺下殺旁殺而親畢矣此九族隆殺之差也蓋以上親父下親子三也以父親祖以子親孫五也以祖親曽髙以孫親曽𤣥九也宗左傳定四年祝鮀曰成王選建明德以蕃屏周分魯公以殷民六族條氏徐氏蕭氏索氏長勺氏尾勺氏使帥其宗氏輯其分族將其類醜以法則周公用即命于周分康叔以殷民七族陶氏施氏繁氏錡氏樊氏饑氏終葵氏分唐叔以懷姓九宗職官五正隱六年翼九宗五正頃父之子嘉父逆晉侯于隨注云五正五官之長大宗一姓為九族也自唐始分世為晉世強家及晉襄卒得強家之力此宗法之所以善也又叔向云羊舌之宗十一族亦此類也大宗小宗百世不遷之宗五世則遷之宗大傳曰别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼髙祖者五世則遷者也禮書曰百夫無長不散則亂一族無宗不離則疏先王因族以立宗敬宗以尊祖故吉凶有以相及有無得以相通尊卑有分而不亂親疏有别而不二儀禮所謂不二斬之類貴賤有繁而不簡文王世子曰雖為庶人冠取妻必告然後一宗如出乎一族一族如出乎一家一家如出乎一人此禮俗所以行而人倫所以厚也蓋公子不得稱先君故為别子而繼别者族人宗之為大宗雖逺至於絶屬猶為之服齊衰三月母妻亦無庶子不得祭祖故諸兄弟宗之為小宗以其服服之大宗逺祖之正體則一而已小宗髙祖之正體其别有四則繼禰者兄弟宗之繼祖者從兄弟宗之繼曾祖者從祖兄弟宗之繼高祖者族兄弟宗之四世則親盡屬絶而不為宗矣既已無服遂易其宗所謂五世則遷之宗然言繼别為宗又言繼别子之所自出者言繼禰為小宗又言宗其繼髙祖者則繼别者别子之子也繼别子之所自出者即别子也繼禰者庶子之子也繼髙祖者五世之孫也繼禰言其始繼髙祖言其終繼禰言其宗繼别子之所自出言其祖經言繼别子之所自出而孔穎達言别子之所由出然則别子所由出即國君也其可宗乎穀梁曰燕周之分子也分子即别子也然别子不特公子而已有來自他邦而為卿大夫者亦謂之别子有起於民庶而為卿大夫者亦謂之别子有小宗而無大宗有大宗而無小宗有無宗而莫之宗諸侯之公子上不得宗君下未有後世之宗必有以統之故有三者之宗道也君無適昆弟使庶昆弟一人為宗統公子禮如小宗故曰有小宗而無大宗君有適昆弟使之為宗以統公子不復立庶昆弟為宗故曰有大宗而無小宗公子一而已無公子可宗亦無公子宗之故曰有無宗亦莫之宗說者曰陳國録云太宰以九兩係邦國之民曰宗以族得民蓋綴之以族王者所以一天下後世徒蔽於害而莫見其利遂使先生良法美意不可復用如商之七族實封康叔懷姓九宗實封唐叔必曰世家大族有害於國豈成王不仁於二國哉是必強宗大族禮義足以齊其家而好尚足以率其俗正有國者之所共治者此孟子所以拳拳于巨室也不幸魯之桓齊之田并國逐君遂致大家為不可容漢人主都關中遂徙齊諸田楚昭王屈而武帝以六條訪察自以強宗豪右為言陵夷至於晉士夫夫猶有羣聚而族起者不幸五胡亂華奔逸四出至元魏分析䕃户而先王宗以族得民之事始散而不可復收矣禮記載大宗之法皆古大夫之家有采地者也蓋嘗論之天下有大宗天子是也國有大宗諸侯是也家有大宗大夫是也天子既為天下宗矣而王子王孫之又為諸侯則猶為一國之宗諸侯既為一國之宗矣而公子公孫之為大夫則猶為一家之宗若士庶人有升而為大夫則一家之人宗之大夫有進而為諸侯則一國之人宗之諸侯有黜而為大夫則宗其為諸侯者而已不得為宗大夫有廢而為士庶人則宗其為大夫而已不得為宗至於公族疏逺而為士庶人則皆宗於人者也舉天下之人已不為宗則宗於人未有獨立而無宗者也季雅東坡曰古者立宗之道嫡子既為宗則支庶子之嫡子又各為庶子之宗其法止於四而其實無窮自秦漢以來天下無世卿大宗之法不可以復立而其可以收合天下之親者有小宗之法存而莫之行者此甚可惜也今夫天下所以不重其族者有族而無宗也有族而無宗則族不可合族不可合則雖欲親之而無由也族人而不相親則忘其祖矣今世之公卿大臣賢人君子之後所以不能世其家如古之久遠者其族散而忘其祖也故莫若復小宗李氏曰别子謂公子若始來及在此國者後世以為祖也别子之適子適子世世繼别子為大宗然小宗上盡於髙祖則遠者忘之矣旁盡於三則疏者忘之矣故立大宗以承其祖族人五世外皆合之宗子之家序以昭穆則是始祖常祀非孝乎同姓常親非睦乎重宗者尊祖之義也異同嘗按左氏之書子長之史記其載諸國姓氏與夫世裔皆有可疑者春秋之時諸侯之國凡一百十五可以知其姓與爵者四十有六晉楚之類是也可以知其姓而不可以知其爵者一十有八焦陽之類是也可以知其爵而不可以知其姓者一十有七沈之類是也其爵其姓皆不可得而知者三十有六鮮虞陸渾之類是也不知其姓不可得而見之矣而知其姓者又不可究信如以趙為芊姓而子長又以為姬姓以邧姓鄶國為重黎之後又以為吳國之後此其言異同固不足論至於姜氏為伯夷之後又以為四嶽之後是其言自相異同矣舜之咨四嶽有能典朕三禮僉曰伯夷若以四嶽為伯夷則是自薦其才也豈其然乎此左氏之言姓氏所以為可疑者也子長之史記始於黃帝迄於漢武天子世次見於帝紀諸侯世次見於世家夏之後則為杞商之後則為宋以其世家本紀併而考之則其苖裔歷歷而可考至於滕薛邾郳之屬雖其事見於春秋而其世次之不傳者又不可盡信堯乃舜之從高祖而舜乃妻其女鯀乃舜五世從叔公與舜同為堯臣湯與王季同世也湯下傳十六世而為紂王季傳一世而為文王二世而為武王則是文王以十五世祖而臣事十五世孫紂武王以十四世祖而伐十四世孫紂而伐之必不然矣此子長之論世裔所以為可疑也大抵去古既遠抱舛承訛無所取正左氏猶然况子長乎子長猶然况班固以下乎左氏以嬴姓為伯翳之後班固又以為伯益之後韋昭遂以伯益即伯翳也孔穎達復以伯益為臯陶之子愚嘗按史記之文臯陶之後封蓼六伯翳之後封秦垂伯益之後不知所封是則伯益伯翳臯陶各為一族翳與益不得為一人而益不得為臯陶子矣漢之興本於亭長而以為出於唐堯曹魏之興肇於宦官而以為出於曹叔振鐸唐之祖起於隴西狄道而以為出於老子臯陶此何異郭崇韜而拜郭子儀之冡其不貽笑於君子者幾希矣傳臯陶為士未聞其為大理而以理為李甚不經矣劉子元以漢為陸終苗裔固以駁漢之非而高堂隆又以魏舜之後其繆尤甚舜為媯氏其苗曰田安有魏氏耶有異姓而反同者何與韓是也成王母弟唐叔虞之後封於韓韓既失國子孫離析江淮之音以韓為何遂從其音以為何氏此退之所以謂韓與何同姓而近也至於以婁為劉是高祖一時之言無所經見婁者姒姓之後安可與劉為一耶此則高祖之失也有同姓而反異者則以其姓雖一而所祖不同以杜為氏者有出於襄陽有出於京兆以王為氏者有出於太原有出於河東豈可與共譜哉而李義府不得與於李崇德之譜乃傅之致其罪杜正倫不得齒於城南諸杜乃鑿杜固渠者則天之罪也總論周禮小史奠世系辨昭穆左傳衆仲曰天子建德因生以賜姓胙之土而命之氏諸侯以字為氏因以為族官有世功則有官族邑亦如之禮書曰姓非天子不可以賜而氏非諸侯不可以命姓所以系百世之正統氏所以别子孫之旁出族則以氏之所聚而已然氏謂之姓故大傳言係之以姓又言庶姓别於上則氏與姓一也氏又謂之族故羽父為無駭請族隱公命以為展氏則氏族一也蓋别姓則為氏氏則有族族無不同氏氏有不同族故八元八凱出於高陽氏高辛氏而謂之十六族是氏有不同族也商氏條氏徐氏之類謂之六族陶氏施氏之類謂之七族宋之華氏謂之戴族向氏謂之桓族是族無不同氏也有因德而賜姓四嶽佐禹治水有功賜姓曰姜氏曰吕氏有因土而賜姓陳舜之後媯之受姓也本因舜之居于媯汭賜姓曰媯有因官而姓者倉氏庫氏司空司馬有因邑而姓者諸氏因於宋子召食采於諸而子孫承之易子為諸有因字之省文而易姓者于氏出於姬氏之邘去邑而為于喬氏出姬姓之橋去木而為喬有聲音之相近而易姓者辛本莘也辛莘相近莘遂為辛氏郭本虢也郭虢相近虢遂為郭氏有因見於丙殿而易姓者丙本李也李陵之裔自胸奴歸魏見於丙殿故賜姓焉有因文在手而易姓者武氏出自周平王少子生而有文在其手曰武遂以為氏有因語音之訛而易姓者宇文出自神農之後以其有嘗草之功自號為侯汾氏其後訛而為宇文氏有逃自竇出而易姓者竇氏本姒姓也有仍逃出自竇故少康氏為竇王氏之姓不一王氏出自姬姓周靈王太子晉之後時人號曰王家故曰王氏太原王琅琊王其後也又有出自畢公髙之後魏信陵公子孫時人以其故王族號曰王家故為王氏裴氏之姓不一裴出風姓非子之裔孫封非邑卿故為非邑氏至非後世去邑從衣為裴此一裴也晉平公封顓帝之孫於裴中號裴君此一裴也此不可不辨禮書曰方周盛時宗族之法行故常棣行葦之美作於上角弓頍辨之刺不聞於下以此治國而國有倫以此係民而民不散則宗子之於天下豈小補哉及秦用商君之法富民有子則分居貧民有子則出贅上雖王公大人亦莫知有敬宗之道秦興滅學而宗譜不立漢司馬遷修史記上述黃帝下迄麟趾採世本世系而作帝紀採周譜國語而作世家由是人乃知姓氏之所出西漢之間人皆有姓姓以國者韓陳許鄭魯衛趙魏最為多逮晉賈弼有姓氏傳十八州百十六郡合七百二十二篇甄析士類無所遺缺賈希鏡撰姓氏要狀賈執作姓氏英賢齊宋譜牒之學浸興有司選舉必稽譜牒以考其真僞官有世胄譜有世官分天下之姓而為四名過江則有僑姓而王謝袁蕭為大東南則有吳姓而朱張顧陸為大山東則有郡姓而王崔盧鄭為大關中亦有郡姓而韋裴柳薛楊杜首之代北則虜姓而元長宇文陸源竇首之以中國士人差第閥閲而為之制遂分為甲乙丙丁之號焉夫以此言選舉以此考賢才以此形品藻豈上世所以别姓氏之意耶甚者至於賣婚而求財鑿杜而通譜悠悠風塵汨喪亷恥此何理哉其間有欲懲其弊者復至於譜牒脫落迄無考按而世數既遠終不知其何姓氏其失又甚焉嗚呼綴之以姓系之以氏所以序昭穆别婚姻使天下知敬宗尊祖而不忘本者古人之意也奈何漢尚官魏晉尚姓南北尚詐隋人因仍而欺弊莫革漢高帝命官以賢詔爵以公先王公卿之位才則用不才則棄斯尚官也魏立九品置中正尊也位卑寒素而權舉右姓此變官而尚姓矣晉宋因之以别貴賤分士庶選舉之際皆用譜牒至北齊凡舉秀才州主簿郡功曹必四姓乃其選也其尚詐又如此也文之弊至於尚官尚官之弊至於尚姓尚姓之弊至於尚詐隋承其後乃反古之道罷鄉舉離土著尊執事之史由是無鄉舉里選無衣冠士族而庶人替矣此唐太宗所以命高士亷而定世族也初武德中李守素亦明姓氏謂之族譜貞觀中太宗命高士亷普責天下譜約史傳考其真僞進忠賢退悖惡先宗室後外戚右膏粱左寒畯凡二百九十三姓千六百五十一家分為九等號氏族志太宗曰我今定世族者欲崇我唐朝人物冠冕垂之不朽何容納貨舊門嚮聲背實而賣婚以為榮而遂以第一崔幹為第二髙宗時許李更以吕才刋定改為姓氏録當時恥焉號曰勳格路敬淳有衣冠譜有著姓略記長安中劉知幾撰劉氏譜三卷先天時復詔柳冲徐堅等討綴號姓族以開元時韋述好譜學於百氏源𣲖為詳故作譜唐興言譜者以路敬淳為宗有衣冠譜柳公權韋述之與李守素亦明姓氏後有李公淹蕭穎士商寅孔聖為世所稱以宏詞及唐志㑹要修通典載晉太元中賈弼大披羣族撰十八州百一十六郡合七百一十二卷士族略無遺缺宋王洪劉湛並好其書洪曰對千客不犯一人諱湛復選百家譜傷於寡略齊王僧孺又為八十卷東南諸族則為一部不在百家之數唐乾元元年賈至撰百家類例十卷漢高祖嘗賜婁敬諸鎮皆以劉氏亦可謂知天子之職矣然而知其職而未知其義故材陋少文不如元魏孝文之長議論也魏孝文賜喬氏則取其高遠改源氏則取其同源後世帝者徒見英主所為意其駕馭豪傑或出于此於是跋扈之臣與夷酋賊渠例皆賜以國姓謂之固結其心而不知取笑貽辱無以示天下威重夫姓者出於天授於祖宗先聖以神明之德奄有天下以為神明萬物之主而嗣君乃屈帝尊以下同於三者之賤此當時公卿大臣不學之過也古之賜姓受氏不然天子之子常為顯諸侯諸侯之子常為名卿大夫至起於疏逖者又一時賢能才智之士其言行卓卓皆可稱道求之於詩則齊之姜知其前有四嶽而後有太公宋之子知其前有成湯後有微子孟庸孟弋知為衛之世族南方之原知為陳之名家求之春秋則施臧季孟之氏於字戴武穆宣之氏於諡中行司城之氏於官郈御秦費之氏於邑皆可以概見則三代之典禮與後世沿襲之誤較然甚明而漢魏以來賜姓附屬籍者不如不賜之為愈也鄧名世姓氏書序羣書考索後集卷三十五
