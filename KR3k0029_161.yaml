body:
  text: 羣書考索續集卷三十宋章如愚編官制門三公唐虞夏商周三公及宰相之職卿分六職以治萬務相統六卿以御百官自唐虞則然禹司空也宅百揆尹保衡也行冢宰傅說相也總百官周公太師也齊百工前後固若一體也成王末年保奭為宰畢公司馬毛公司空三公兼攝三卿固已見之顧命一公而統三卿固已見之序官三公不備惟其人固已見之書命左右成王太傅不具畢公父師下掌政典曷嘗叙兼而並建哉以目録考之有是事則建是官有是職則為是名名不異職官不異事曰卿曰中下大夫曰上中士特以是科品其髙下耳辨周公為太師召公為太保畢公為司馬毛公為司空周公位冢宰為太師周公道隆徳盛非太師不足以處之而冢宰正百官均四海亦難其人故以論道之重下行端揆之職此明見於書者也周公既没召公以太保兼冡宰必矣而孔氏因顧命之文謂畢公領司馬毛公領司空則未知其所傳據且三公之責雖均而地官已下與冡宰必不若是班也同前周三公之官不必備考之於書有曰立政不惟其官惟其人又曰三公官不必備惟其人故當時雖建三公之官實以六卿之有道者兼之無其人則或缺焉若曰周公位冡宰周公為師豈非六卿之掌而兼三公之任乎若曰周公為師召公為保而太傅之任未聞有人豈非惟有道者乃足以充其職茍非其人則或缺焉周三公之官不必備周之人才號為衆多使備其員宜亦無不充數然天下之事官不必備足矣亦無所事其衆且冗也周公為冢宰則卿固兼於公太史司冦蘇公則公又兼其史立政以用人為本論三俊之賢以居三宅之任則三事以往百司庶府無不備舉而司徒司馬司空六卿之數有不備舉者焉是故有其人則任之無其人擇官而兼之周之治官法可見矣薛季宣前漢三公之名不正三公論道經邦燮理隂陽故不以一職名官太尉掌武蓋古者大司馬之職也司徒主民司空主土皆六卿之任非三公之官也自漢以來失之矣范祖禹前漢三公之名不正漢官因於秦舊視古舛駁而三公之名尤為甚焉初以丞相御史大夫太尉為三公其名雖均而其權實差武帝罷太尉而置大司馬成帝改御史大夫而置大司空未幾復罷大司空而置御史大夫哀帝又改丞相為大司徒改御史大夫為大司空而大司馬之職終漢世不改吕東萊漢丞相太尉御史大夫即非三公漢書多言丞相太尉御史大夫為三公而實非也蕭何創定官制初不以此為三公然其因秦置相國猶有古者冢宰之餘意但當時不置三公而此為朝廷極重官其上無以加之者故人多指丞相為三公而過呼耳丞相一員而稱為三公或御史過呼蓋知假借而呼耳何武以一相不可兼三公之事請置大司空以備三公官而漢何嘗明以丞相御史為三公乎蓋百官表相國秦時金印紫綬髙帝十一年更為緑綬不言位為公也御史大夫掌副丞相耳銀印青綬其位則上卿耳則丞相御史何曽謂之三公乎自髙后以王陵為太傅當時朝臣建此議時必知古者以三公為閒官無職之義故特置此以處陵耳若不知此為古三公官其將謂之何官以封陵乎自成帝時何武以今一相不可獨兼三公之事請置三公官則官職官名始亂而丞相御史始爵秩一同而皆謂之為公耳不知大司徒大司空等官古來不曽謂之三公而漢亦不曽正之成帝末年以丞相大司馬大司空為三公哀帝雖罷大司空復置御史大夫周朱博議至及末年遂改丞相為大司徒復置大司空大司馬焉則是取六卿之名而實之以三公乃是師古而名號大不正曽不如曩時背古而名號不類可借呼而無害也並陳彦羣博議後漢三公之名不正後漢三公乃成周六卿之半聞三公無其人則以冢宰兼師保之任矣未聞使司空司馬司徒為三公也今也既曰三公又以百官有司叢脞之務責之是漢朝有事而無政也豈非倒置之甚耶且名大司馬大司徒大司空為三公者莽制也而光武不知革安在其受尚書大義也管見唐三公之名不正成周董正治官太師太傅太保兹惟三公論道經邦燮理隂陽自是而下六卿分職各率其屬以倡九牧阜成兆民以其名而求其官無有不正者唐初建官以太尉司徒司空為三公而名已不正矣夫太尉周之司馬官也司徒教官也司空事官也以是而為三公豈所謂坐而論道經邦燮理隂陽者乎林少穎唐史論秦漢晉魏隋唐三公之名不正古之三公一失而為秦之左右丞相再失而為漢之丞相御史大夫太尉三失而為東漢之尚書令僕四失而為晉之中書監令五失而為魏之門下侍郎六失而為隋之三省七失而為唐之樞宻院葢至于今而樞宻與丞相並稱謂之東西二府不惟失其名併與其實而失之吕東萊太子師保傅古者天子必有師後世畧之則非矣儲貳人心所係人望所歸必如三王之教世子可也其或性習未定德義未成師保傅之任如之何而畧之漢以來猶有助成羽翼戒太子勿宜獨親外家者魏晉迄唐猶有存其禮而尊其名者宋朝自丁謂曹利用濫居是職神祖建儲將以司馬光吕公著為師傅而事竟不行外是或以為階官或以為贈典或以為檢校官類無實職徒有虛名至於侍讀賔客曰賔則友而不師矣曰侍則立而不復坐論矣詹事春坊又皆朝夕之所狎近者此其故何哉葢近世師道不立非惟不行於君臣之間亦不行於匹士朋友之際矣粗知紙上語即恥於有所師而况於太子將君我而又敢以師道自居哉必也正其性習成其德義惟講讀之職猶可以行其學雖友而弗師可也三公九卿武帝遷推三公九卿不拘常法臣讀西漢百官年表以為武帝規模法度固不若帝王之粹而其役用天下皆聖人不言之妙術也漢制宰相之闕則取諸三公三公之闕則取諸九卿然而石慶之死御史大夫兒寛當遷而不遷而太僕公孫賀得之公孫賀之死御史大夫商丘成當遷而不遷而涿郡太守劉屈氂得之御史大夫延廣之罷九卿當遷者甚衆無何取諸濟南太守之王卿御史大夫公孫𢎞之相九卿當遷者甚衆無何取諸河東太守之畨係故臣以為武帝之用人有不可以次第度之張歐為中尉九年而遷而寗成之遷四年韓安國之遷一年並中尉商丘成為大鴻臚十二年而遷而田千秋之遷一年田廣明之遷五年並鴻臚故臣以為武帝之用人有不可以遲速推並王景文朴論三省總論三省之名始於漢成於晉宋詳於唐已具見之特古今升降輕重不同有可論者漢武宣則以宦者為之成帝更用士人晉宋以來則為相臣之任也然二漢百官表志侍中尚書令中書謁者尚書僕射左右丞御史中丞尚書六曹並屬少府卿者何哉蓋漢制以大農收租賦為公用以少府掌山澤陂池為主私藏也少府為私藏而中書為私人故於此置屬尤詳焉惟私人故易親而其職亦易尊宜其始用宦者中用士人終為宰臣之任也五代置樞密以宦者為之至于宋朝遂與宰相分為二府其勢亦然二漢表志郎中令之屬有太中大夫中大夫諫大夫掌議論有議郎中郎侍郎郎中三署郎掌守門户出充車騎又有謁者僕射中郎將期門羽林咸屬焉夫郎中令即光祿勲也是亦九卿之一也而諫大夫議郎皆屬焉者亦天子之私人也厥後天子不得而私之者亦勢使然也宰相總三省元豐改制說中書令門下侍中尚書令為三省之長中書侍郎門下侍郎尚書僕射為三省之貳自舜舉十六相伊尹相湯周召相成王皆相臣之任也秦漢以來或分為左右或曰丞相相國其名其職猶未淆駁晉宋隋唐至於宋朝因革不一稱謂不同不可遍舉要之三公職兼三省長貳上意所屬事權所歸皆宰相也三公兼職己見右方見三公說三省之制例以唐六典之言為正中書造命門下審覆尚書奉行是也人皆以是為漢唐之善制考之於史惟見魏相總職𤣥齡善謀姚崇應變豈所謂造命者乎丙吉周密如晦能斷宋璟守文豈所謂審覆奉行者乎太宗先勅中書門下不得雷同繼令侍郎給事審正花判者是也亦放談云宋沿唐以三省長官為宰相既以秩髙不除於是元豐五年以尚書令之貳左右僕射為宰相而左僕射王珪兼門下侍郎以行侍中之職右僕射蔡確兼中書侍郎以行中書令之職而别置侍郎以佐之則三省宜相兼矣然左右僕射既為宰相則凡進擬命令未有不由之出者是出令之職身既行之矣尚又省而覆之乎方其進對執政無不同故批㫖曰三省同奉聖旨既已奉之而又審之亦無是理門下省惟有給事中封駁而已未有左右僕射與門下侍郎自駁已奉之命者然則所謂侍中侍郎省審者殆為虚文也放談之所解駁者如此則知王珪蔡確城府間絶已失建立三省之初意何以改制為哉宣和五年張叔夜言中書出令門下審覆尚書奉行神宗制也今急速文字不經三省諸房以空黄先次書讀則審覆殆成虛設三省之弊至是抑又甚焉任非其人則法不足以閑之矣珪確欺君已具元豐改制說復詳著於此使來者有考焉徽宗宣和五年蔡京為相故叔夜言此弊論三省始置之由謹按西漢以丞相總百官而九卿分治天下之事光武中興身親庶務事歸臺閤尚書始重而西漢公卿稍已失職矣又魏佐漢初建魏國置秘書令典尚書奏事文帝受禪改秘書為中書有令有監而亦不廢尚書然中書親近而尚書疎遠矣東晉以後天子以侍中常在左右多與之議政事不專任中書於是又有門下而中書權始分矣降及南北朝大扺皆循此制唐初始合中書門下之職故有同中書門下三品同中書門下平章事其後又置政事堂蓋以中書出詔令門下掌封駁日有爭論紛紜不决故使兩省先於政事堂議定然後奏聞開元中張說奏改政事堂為中書門下自是相承至於宋朝莫之能改非不欲分也理勢不可復分也故向日所謂中書乃中書門下政事堂也温公文三省分建衆官不專一相自漢以來或置左右或並舉三公不拘一相至唐而法意尤密既有左右僕射又有侍中中書尚書兩令左右丞及以官未及而人可用者參預朝政而其大綱則俾中書出令門下審駁分為二省而尚書受成頒之有司當貞觀時君明臣忠朝希粃政不數年坐致太平其集材並用之效如此若棄數百年舊制合三省為一以一相專之而官屬如故畧無可否見姓署名是中書門下之名存而基命駁正之實亡矣補史管見政事堂不當移於中書省政事堂者自武德以來常於門下省議事謂之政事堂故長孫無忌起復授司空房𤣥齡授左僕射魏徵太子太保皆知門下省事至髙宗光宅元年裴炎自侍中除中書令執宰相筆乃移政事堂於中書省唐李義中書政事堂記政事堂不當移於中書省貞觀之際凡軍國大事省審於中書駁正於門下然後頒行之尚書而鮮有敗事此政事之堂所以置於門下省而宰相參决於其間也裴炎以中書令而受顧命乃遷政事堂於中書省則軍國大事中書得以專行而門下不得而駁正之矣由其得以專行於其間此中宗之廢所以啟謀於裴炎而武氏之禍遂至於不可遏也林少穎唐史論軍國大事中書省審門下駁正軍國大事使中書舍人各執所見而書其名使中書侍郎中書令省審之給事中黄門侍郎駁正之此周隋之制而維持紀綱之密自唐以來蔑之有改也然而太宗用之則有貞觀之治中宗用之則有斜封墨敇之弊豈非國家之法本無不善至於神而明之則存乎其人者哉同前六省唐分六典而降内侍唐以尚書門下中書國子監秘書殿中為六省而降内侍於左右衛之上則尊儒重道之意明而奄尹與政之階僭矣讀書管見清中書之務則天下之事易辦中書者王政之所由天子之所與宰相論道經邦而不知其他者也非至逸無以待天下之勞非至靜無以待天下之動是故古之聖人雖有大兵役大興作百官奔走各執其職而中書之務不至於紛紜今者曽不得歲月之暇則夫禮樂刑政教化之源所以使天下回心而向道者何時而議也故臣以為治天下不若清中書之務中書之務清則天下之事不足辦也東坡策畧宋三省之制宋初三省雖曰沿唐而實異於唐蓋三省為空官而以平章為宰相者宋初制也三省各涖職而以左右僕射為宰相為元豐制也建平章號於二相之上者元祐制也伸左相之權而使門下與中書均其任者亦元祐制也而紹聖則竊元祐之制而偏重左相之權而崇寧則竊元祐之制而偏重公相之職也唐制三省長官為宰相而尚書令則以太宗嘗為之故以僕射與侍中中書令為宰相其後以品官不除而使他官參焉其參議參預參知朝政之類宋初三省長官皆為空名不與朝政其命官必曰同中書門下平章事惟其真拜侍中則不帶平章然前後所除亦不過五人此葢宋初政也元豐正名三省分局客司以左右僕射為宰相左相必兼門下侍郎右相者兼中書侍郎而中書取㫖其權獨重此葢元豐制也宋初宰相平章事有至三相者曰昭文曰監修曰集賢官制既行惟置二相元祐初司馬光欲起文彦博居已之上乃以師臣之禮待之居宰相之上而平章軍國事於後吕公著因之以司空平章由彦博焉此元祐兼用祖宗之制也宋初相臣同心共濟進退百官經理大政皆與聞之官制既行惟重中書葢出於蔡確之私意兩省侍郎由中書過門下雖名為遷實抑其權自吕公著有同舟共濟之說而後三省同得取旨焉此亦元祐兼用祖宗之制也是二制也元祐行之非不盡善而繼之者則有假是以行其奸矣紹聖改元章子厚起謫籍任左僕射有欲更分班奏事之制者子厚懼權不歸已乃曰此先帝之意不可易事之合送中書者但自尚書徑上門下李清臣極論之卒不能勝故終哲宗之世不置右相蔡京之在崇寧既置左相乃效子厚所為徽宗取與與京異意者如趙挺之輩而卒莫能制焉此皆竊元祐之制而偏重左相之權者也京得政既久意益自肆乃改左僕射為少宰而已以太師總三省之制號為公相而使宰職居其下不敢與之抗焉其免中書門下省特不欲任兵柄耳兵民乖裂事不與聞此尤不可之大者此又竊元祐之制而偏重公相之職也宣和之七年罷公相靖康之初元改太宰少宰斯不亦大寒索裘矣乎中興以來易平章之名定丞相之號乾道八年改左右丞相罷左右僕射平章事此葢千古不易之典今日遵而行之可也後省宋朝宰相既兼三省無復有造令審令行令之異矣所賴後省給舍得以封駁是猶存審覆之意也然三省長官皆敵己者故大事得以持異同之論而給舍乃中書門下之屬其有大議論而敢為異同者昔有其人矣當今未免詳於細而畧於大矣嘗觀宋初給舍為所遷官實不任職而其職乃以他官兼領之張詠以樞密直學士何郯以待制皆嘗領給事中有不便者輒還中書富弼歐陽修亦以他官領中書舍人知制誥而嘗封還詞頭是數人者雖天姿卓然能自植立亦由素所居官非宰相之屬也元豐正名遂以給舍為宰相之屬風采振職蔑然無聞葢有由矣而况以舒亶之徒為之哉不特此也宋初左右史亦無本職而其職乃以三館校理以上兼之元豐正名皆𨽻後省而蔡京蔡卞分布左右同掌起居彼何人斯而能詳天子言動之實耶都司檢正左右司左右司剏於隋唐都省之職宋朝以為階官元豐正名初曰檢正熈寧三年也後復為左右司此後省之與都司所以皆為宰屬也然給舍封駁猶存審覆之意未免時有異同之論都司綱紀六官凡所奉行與宰臣無所可否矣此給舍所以易疎而都司所以易親也夫宰相既兼三省之權而都司復居易親之地造令行令皆與知而與行之矣熈豐大臣倚是以為羽翼之助而行其變政易令之私而已孰知其流弊之至於此哉任非其人則足以禍蒼生可不戒哉可不謹哉羣書考索續集卷三十
