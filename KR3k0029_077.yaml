body:
  text: 羣書考索後集卷十一宋章如愚編官制門國子祭酒周師氏以三德三行教國子凡國之貴遊子弟學焉保氏養國子以道教之以六藝六儀漢置博士至東京凡十四人而聰明有威重者一人為祭酒謂之博士祭酒本注曰僕射中興轉為祭酒胡廣曰凡官名祭酒皆一位之元長古者賔得主人饌則老者一人舉酒以祭地故以祭酒為名焉此國子祭酒名所由始也晉武帝咸寧四年立國子學置祭酒一人永嘉中又别置儒林祭酒一人以杜夷為之命常為訓範總統一學中衆事又立太學宋不置學明帝置總明觀祭酒一人齊永明中立學尚書令王儉領祭酒省總明觀齊梁號為國師梁武帝以國子學生舊限貴賤帝招徠後進五館生皆引寒門雋才陳後魏亦曰國子祭酒北齊國子寺有祭酒一人隋開皇中國子寺不𨽻太常凡國學諸官自漢以下並屬太常至隋始革之又改寺為學仁夀元年罷國子學唯立太學省祭酒等官煬帝改國子學為國子監復置祭酒唐因之龍朔改為司成館祭酒為大司成咸亨復光宅改為成均監神龍復領六學國子太學四門律學書學算學皆以儒學優重者為之通典職林宋國子監有判監事有管勾監事待制以上則為判餘為管勾㑹要熙寧初詔用經術取士廣闢黌舍分為三學增置生徒總二千八百人朝廷育才於斯為盛及元豐中復正官名置國子監祭酒掌三學之教法政令續㑹要而祭酒猶未除人崇寧立辟雍置大司成一員為師儒之首總辟雍太學之政令位諸曹侍郎上本朝官制詔天下貢士以三舍考選政和罷三舍辟雍官屬並罷四朝志建炎三年併國子監歸禮部紹興三年詔駐蹕所在因國子監量養生徒置博士二員祭酒猶未置也十二年始置祭酒中興㑹要十三年太學成劉季裴題名記國子司業煬帝大業三年於國子監初置司業一人禮曰樂正司業父師司成因以為名唐置二人副二祭酒通判監事龍朔二年改為少司成咸亨初復舊凡祭酒司業皆儒重之官非其人不居通典歸崇敬授國子司業上言司業義在禮記樂正司業正長也言樂官之長同主此業爾雅云大板曰業按詩周頌設業設簴崇牙樹羽則業乃懸鐘磬之簨簴也今太學師不教樂於義則無所取請改國子監為辟雍祭酒為太師氏司業一為左師一為右師詔下尚書集百僚定議以聞議者重難改作其事不行宋有同判監事同管勾監事或帶職朝官充凡監事皆總之㑹要四朝志元豐正名置司業掌三學之教法政令續㑹要初除朱服職略建炎三年省紹興十二年復置中興會要隆興併省司業不許與祭酒並除乾道七年欲除劉焞孝宗曰司業乃祭酒之二並置何妨於是始並置孝宗㑹要國子監丞隋置三人唐一人掌判監事凡六學生每嵗有業成上于監者以其業與司業祭酒試之登第者白祭酒上于尚書禮部六典宋景祐二年孫祖德請於直講京官內差一員充監丞詔學官兼領掌錢榖出納之事兩朝志元豐定制置祭酒司業掌三學之教法政令而監之事則丞與焉續㑹要建炎三年省紹興十二年復置中興㑹要國子博士班固云六國時往往有博士掌通古今又曰博士秦官漢因之後多至數十人武帝初置五經博士宣帝成帝時五經家法稍增置博士一人選有三科髙第為尚書次為刺史其不通政事以久次補諸侯太傅元始四年改博士為博士師後漢兼而存之博士凡十四人易施孟梁丘京氏尚書歐陽大小夏侯詩齊魯韓毛禮大小戴春秋嚴顔各一博士華嶠漢書曰初欲立左氏傳博士范丹以為左氏淺末不宜立陳氏乃詣闕上疏爭之更相辨對帝卒立左氏學掌以五經教子弟國有疑事掌丞問對安帝以博士多非其人詔命三公將軍中二千石舉博士各一人務得經明行髙卓爾茂異晉咸寧四年初置國子博士一人皆取履行清淳通明典義若散騎常侍中書侍郎太子中庶子以上乃得召試梁置五經博士各一人魏晉宋齊並不置五經博士至此始置隋省國子博士至大業復置唐增置二人掌教文武官三品以上及國公子孫龍朔改為司成宣業咸亨初復諸州府亦有經學博士一人通典宋國子監無博士有直講八人熙寧改為太學博士元豐定制亦無國子博士大觀元年薛昻乞置國子博士四員國子正録各二員與太學官分掌教導從之建炎併國子監於禮部紹興三年詔駐蹕所在因國子監量養生徒置博士二員中興㑹要餘學猶未置也國子監主簿北齊國子寺置主簿隋一人唐因之掌印勾檢監事凡六學生有不率師教者則舉而免之六典宋國子監主簿一人以京官或選人充掌文簿或勾考其出入焉兩朝志元豐元年詔省主簿三年罷書庫官復置主簿㑹要國子正録北齊國子寺有正録員隋一人唐因之六典宋闕雖元豐定制亦不置國子正録大觀元年薛昻乞置國子博士國子正録與太學官分掌教導從之自是始置正録凡二員建炎三年省紹興十二年復置書庫官宋書庫監官以京朝官充掌印經史羣書以備朝廷宣索賜豫之用及出鬻而收其直以上於官續㑹要建炎三年併國子監歸禮部官省紹興十三年復置一員後省三十二年詔學官兼書庫乾道七年復置中興㑹要孝宗㑹要太學太學博士晉江左因裴頠奏增置國子博士十六人謂之太學博士品服同國子博士梁置太學博士八人北齊國子寺有太學博士十人後周置太學博士下大夫六人隋仁夀元年罷國子惟立太學置博士五人大業減置二人唐增置三人掌教文武官五品以上及郡縣公子孫六典宋熙寧四年詔宋靖國吕嘉問相度錫慶院建太學從鄧綰所請也綰言國子監粗容春秋釋奠齊庖之室不足以容諸生至於太學即未曽營建止是假錫慶院西北隅廊屋數十間逼窄湫隘又官司未曽葺治今大新學制學者坌集恐不足以容乞特賜錫慶院為太學故命相相其地建之元豐三年詔改國子監直講為太學博士每經二人掌分經講授考校程文以德行道藝訓導學者紹聖元年左司諫翟思言前熙寧更置太學博士正録雖有朝廷特除然類令國子監長二薦舉所業考第髙下以次除授復位試法以核材實其進士發解省試廷試在十五人內太學上舍內舍職事者並令召試不在此例許投所業國子監考覆方與召命元祐以來罷去試法請自今除學官依舊法召試從之元符元年詔學宫嵗一試政和七年臣僚言熙寧元豐間博士未嘗除代近年以來席未暖而代者已至率三人而守一若從正録第遷則博士可免除代與前熙寧元豐無異從之並續㑹要建炎南渡廢紹興十二年權於臨安府措置增展置太常博士三員十三年始復建太學太學正録北齊國子寺有録事員隋一人唐因之六典宋仁宗朝胡瑗掌太學其正録第補諸生熙寧末興三舍始選官為正録如學官之例聖朝職略學正五人學行學規凡諸生之戾規矩者待以五等之罰學録五人掌佐學正糾不如規者元祐三年罷命官正録以上舍內舍生充後復置命官學正二員紹聖改元復元豐學制命官學職悉仍舊焉續㑹要建炎三年省紹興十二年復置各一員中興㑹要武學武學博士武學諭慶歷三年置學始以阮逸為之宋官制未幾省熙寧五年樞密院乞復置武學選文武官知兵者充教授仍差韓縝判武學郭固同判朝臣以上判學續㑹要武學教授如國子置直講元豐官制行改為武學博士教授蔡碩就除博士武學博士學諭各一人掌以兵書弓馬武藝訓誘學者四朝志建炎兵興廢紹興十六年詔令臨安府修建武學二十六年詔武學博士學諭各置一員內博士於文臣有出身或武舉出身曽預髙選人充其學諭差武舉人中興職略將作監將作監秦有將作少府掌治宫室漢因之景帝更為將作大匠秩二千石中六年改光武省常以謁者兼之章帝建初元年又置初以任隗為之掌修作宗廟路寢宫室陵園木土之功魏晉因之江左至宋齊皆有事則置無事則省梁天監七年置十二卿改將作大匠為大匠卿是為秋卿陳因之後魏亦有之北齊有將作寺其官曰大匠後周有匠師中大夫掌城郭宫室之制又有司木中大夫掌木土之政令隋與北齊同至開皇二十年改寺為監大匠為大監初加置副監煬帝十三年改為大令唐復為匠龍朔改為繕工監咸亨復光宅改為營繕監神龍復天寶中改大匠為大監掌土木工匠之政通典六典唐職林宋判監事一人以朝官以上充凡土木工匠之政𨽻三司修造案本監但掌祠祀供省牲牌鎮石炷香盥手焚版幣之事續㑹要熙寧初以嘉慶院為監上重為任使統修造之政㑹要四年以范子竒判監向宗儒同判元豐乃正名焉職略掌土木工匠之事凡出納籍帳嵗受而㑹之上工部分案五設吏二十有七總局九宫城繕完則歸修內司辨其工作因能任事則歸東西八作司乘時儲積以待給用則歸竹木務窑務丹粉所麥麵場前期朴斫以應緩急則歸事材場斂其餘材無所遺棄則歸退材場續㑹要中興以來將作少府未置監建炎三年始併歸工部紹興三年復置將作監少府事總焉中興㑹要將作少監後周有少匠下大夫隋將作置副監一人煬帝改為少監又改少匠又更少令唐武德以為少匠龍朔中為繕工少監咸亨中為營繕少監後復故唐職林宋熙寧四年將作監置同判元豐中為少監續㑹要將作監丞漢將作有丞二人後漢置一人晉魏因之東晉宋齊有事則置無事即罷梁天監七年置大匠丞一人陳因之後魏有之北齊四人後周曰匠師上士一人隋二人唐四人六典掌判監事凡內外繕造百司供給大事則聽制敕小事則候省待以咨大匠而下於署監以供其職宋朝熙寧四年以宋靖國知將作監丞續㑹要元豐正名初除吳處厚職略將作監簿晉將作置主簿員江左有事則置無事則省梁天監七年復置將作主簿一人北齊將作等有功曹主簿員若有營作又别立長史司馬主簿各一員隋二人唐因之六典掌印勾檢稽失凡官吏之申請糧料俸食差遣假使必由之以發其事若諸司之應供四署三監之體物器用違闕隨而舉焉宋熙寧四年初以殿中丞楊增知將作主簿公事續㑹要上元豐正名初除軍器監後周武帝四年初置軍器監隋百官志隋少府監統鎧甲弓弩等局唐武德初有武器監一人少監一人掌兵使廄牧七年廢軍器監八年復之九年又廢貞觀元年罷軍器大監置少監後省之以其地𨽻少府監為甲弩坊焉皆𨽻少府右尚署開元初復以其地置軍器使至三年以使為監更置少監一員丞二員主簿一員録事一員及弓弩坊等署十一年悉罷之復𨽻少府為弓弩坊十六年復移向北都監掌繕造甲弩之屬辨其名物審其制度以時納于武庫少監為之二六典宋軍器領於三司胄案官無専職熙寧六年廢胄案乃按唐令置監擇侍從官總判增勾當以為之屬元豐中復正名分案百設吏十有三總局五掌繕治兵械什物之事續會要建炎三年併歸工部紹興十一年復置長二一員中興㑹要軍器少監沿革見軍器監門軍器監丞唐武德初武器監置丞二人貞觀六年廢武器監開元三年置軍器監有丞二掌判監事凡材革出納之數工徒衆寡之役皆督課焉唐百官志六典宋神宗時置丞二人初除沈叔通職略建炎三年省紹興三年復置中興㑹要軍器監簿唐武德初武器監置主簿一人貞觀六年廢武器監開元三年置軍器監有主簿掌印及勾檢稽失百官志六典宋神宗時置主簿一人初除錢長卿職略日厯所修日厯官唐貞元初韋執誼奏修撰私家紀録非是望令各撰日厯月終館中詳定從之此日厯所從起也葉伯益宏辭編題宋舊以宰相兼監修國史修撰直館檢討無常員掌修日厯以時政記起居注會集修撰為一代之典舊於門下省置編修院専掌國史實録修纂日厯元豐四年廢編修院歸史館官制行屬祕書省國史案六年詔祕書省長二毋得預著作修纂日厯事進書即繫銜以防漏泄如舊編修院法焉八年詔吏部郎中曽肇禮部郎中林希兼著作職事官兼職自此始元祐五年移國史案置局専掌國史實録編修日厯以國史院為名𨽻門下省更不𨽻祕書省紹聖二年詔日厯還祕書省宣和二年詔罷在京修書諸局惟祕書省日厯所係元豐國史案除著作官専管修纂日厯之事無定員外其元豐分案編修日厯書庫官吏並依元豐法四朝志紹興元年以修日厯所為名又詔祕書長二通行修纂日厯以少監程俱言長二於條不與修纂欲準元豐故事著作官闕從本省府暫牒校書郎或正字兼權所貴不廢編修故有是命三年詔左僕射吕頥浩兼提舉修國史時修日厯張綱言祕書省權輕難以取㑹又孫近言景德二年王旦為相領史職乞宰府提舉故有是命詔修日厯令侍從官帶史館修撰餘官帶直史館史館檢討若著作郎佐郎闕依元豐例差郎官兼領時以祠部郎虞澐兼大著禮部郎舒國清兼小著日厯所以修國史日厯所為名四年詔修國史日厯所以史館為名依舊制置編修校勘官十年秦檜請下有司討論史館建併之弊禮部看詳於前元豐舊制併歸祕書省國史案以著作郎佐郎修纂日厯遇修正史郎置國史院遇修實録即置實録院見今修淵聖及今上日厯令宰相提舉以監修國史繫銜實録院以提舉實録院繫銜中興㑹要㑹要所修㑹要官唐德宗貞元間蘇冕始為唐㑹要四十卷武宗時崔鉉又續四十卷宋建隆初王溥取自宣宗以後故事并蘇崔所録共為一百卷宋朝㑹要自建隆止慶厯四年成一百五十卷章得象上王洙編修王圭續以慶厯止熙寧十年通舊增損成三百卷總二十一類八百五十五門國朝㑹要序乾道四年詔尚書太僕射陳俊卿兼提舉編修本朝㑹要五年祕書少監江大猷等言蔡攸所修宋朝㑹要除將熙寧十年以前章得象王圭所修重加刪削外其自元豐至政和止修得帝系后妃吉禮三門攸所修吉禮緣當時議論好惡不同妄有刪改以迎時好乞令本省再加刪定兼今采續修斷自神宗其五朝㑹要內有熙寧十年內事亦合重行編入以續修本朝㑹要為名從之六年中書門下省言國朝會要以修至靖康詔令自建炎元年接續至乾道五年九年祕書少監陳騤言編類建炎以後㑹要至紹興三十二年六月十一日成書以中興㑹要為名從之孝宗㑹要敕令所提舉修敕令詳定附宋天聖慶厯嘉祐熙寧編叙及元符敕令格式各差宰臣提舉此事見續會要何執中奏四朝志乃云提舉敕令自熙寧初編修三司令式命宰臣王安石提舉自後皆以宰執為之如志所言是自熙寧始也然天聖既有提舉之例則不應自熙寧始五朝㑹要無所書今姑存之以俟考究詳定官以侍從之通法令者充舊制一員宣和中七員靖康減三員政和元年差左僕射何執中提舉重修敕令執中上章力辭於是不帶提舉以兼領為名同提舉焉紹興中改為詳定一司敕令所自建炎四年以前著為紹興新法以後續降幾二萬餘條前後抵牾乾道四年刑部侍郎汪大猷請行刪削於是復置敕令所提舉官以提舉詳定一司敕令繫銜詳定官以兼詳定一司敕令繫銜孝宗㑹要宋修軍馬司敕則屬樞密仁宗時命田况提舉熙寧八年權知審刑院崔台符言奉詔修軍馬司敕緣軍政事重故事以樞臣總領於是命樞密使陳升之提舉管勾紹聖元年又詔知樞密院事韓忠彥提舉管勾詳定刪定軍馬司敕例續㑹要刪定官宋朝舊刪定無常員大觀三年詔六曹刪定官併入詳定一司敕令所為一局四朝志後省紹興十二年徐度申請裒集建炎紹興詔㫖令専置一局乞權行復置刪定官以三員為額於行在職事官內差兼詔依舊以敕令所為名後省乾道六年復置敕令所汪大猷申請正差刪定官乞繫銜充詳定一司敕令所刪定官兼刪定官繫銜兼詳定一司敕令所刪定官淳熙十五年林栗申請廢敕令局刪定官並省紹興二年復置局差刪修官三員敕令所題名東宫詹事秦官應劭曰詹省也給也漢因之掌太子家位在長秋上成帝鴻禧三年省魏復置詹事領東宫衆務晉或置或否齊置府領官屬梁陳任總宫朝後魏有太子左右詹事北齊東宫衆事無大小皆統之唐置詹事府掌內外衆務糾彈非違總判府事置少詹事以二之龍朔改端尹少尹咸通復垂拱改宫尹神龍復通典宋東宫官有詹事仁宗升儲置詹事二人神宗升儲置詹事一人欽宗升儲置詹事二人多以他官兼充及登位亦省兩朝國史志職林云左右庶子古者天子有庶子之官職諸侯卿大夫士之庶子掌其戒令與其教治庶子猶諸子周禮諸子之官司馬屬有大事則帥國子而致於太子唯所用之秦置中庶子員漢庶子為太子少傅屬官後漢員五人晉有中庶子庶子各四人宋中庶子與功髙中舍人一人共掌其坊之禁令庶子掌侍從左右與功髙通事舍人一人共掌其坊之禁令隋有左右庶子唐龍朔中改左庶子為左中護右庶子為右中護咸亨中復故掌侍從贊相駁正啓奏通典六典宋東宫官有左右庶子舊制不常設每儲闈之建隨宜置官以備僚宷多以他官兼領仁宗升儲置二人神宗升儲置二人欽宗升儲置一人四朝志乾道中庶子諭德除左不除右同兼領續㑹要左右諭德唐龍朔中左右春坊置左右諭德各一人掌諭皇太子以道德隨事諷讃皇太子朝宫臣列侍左右階出入騎從宋東宫官有左右諭德建儲則置否則闕仁宗神宗欽宗升儲皆置二人並他官兼四朝志云乾道置二人惟除左不除右孝宗㑹要侍講侍讀唐太宗為晉王府有侍講及為太子亦置焉其後或置或否開元初十王宅引辭學士書者入教亦為侍讀職林而無侍講聖朝始置焉左右春坊東宫之務歷代以中庶子領之北齊有門下坊庶子領之典書坊庶子領之隋門下坊置左庶子典書坊置右庶子唐龍朔中改門下坊曰左春坊左庶子中允司議郎左諭德左贊善大夫崇文館學士校書郎洗馬文學校書正字等𨽻焉典書坊曰右春坊右庶子中舍人太子舍人右諭德右贊善大夫太子通事舍人家令率更令等𨽻焉宋建儲闈即置仁宗神宗升儲並以內臣為左右春坊勾當左右春坊事中興不置為不立東宫故也孝宗乾道元年立皇太子置左右春坊二員同左右春坊二員㑹要羣書考索後集卷十一
