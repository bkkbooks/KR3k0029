body:
  text: 羣書考索卷二十九宋章如愚撰禮門廟制類昔者先王感時代謝思親立廟曰宗廟因新物而薦享以申孝敬逺祖非一不可遍追故親盡而止唐虞立五廟其祭尚氣先迎牲殺於庭取血告於室以降神然後奏樂尸入王祼以鬱鬯夏后因之殷制七廟周制小宗伯掌建國之神位左宗廟王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享嘗乃止去祧為壇去壇為墠壇則有禱焉祭之無禱乃止去墠曰鬼廟制舜典曰禋于六宗張髦以為三昭三穆商書曰七世之廟可以觀德鄭康成謂惟周七廟且引禮緯云唐虞五廟親廟四始祖廟一夏四廟至子孫而五商五廟至子孫而六周六廟至子孫而七然則以書考之天子皆七廟非特周也禮記天子七廟三昭三穆與太祖之廟而七鄭康成注曰此周制也七者太祖文武與親廟四也文武受命其廟亦不毁故為二祧唐元稹曰三廟不遷其餘成康已降盡為祧廟故周禮守祧注云先公之祧附于后稷之廟先王之祧附于文武之廟若以為後代有功有德者盡為不遷之廟則成康刑措宣王中興平王東周之始王豈為不祧之廟耶喪服小記曰王者禘其祖之所自出以其祖配之而立四廟庶子王亦如之韋𤣥成立四廟為始受命而王者於理或然蓋始受命而王者不必備事七世故立四廟止於髙祖而已其上親盡不祭可也鄭氏之說似不為無據王肅難鄭康成云文王受命非常廟之數商之三宗宗其德而存其廟不以為數荀卿云有天下事七世又云自上而下降殺以兩今天子諸侯並親廟四而止則君臣無乃不别乎又祭法云王下祭殤五及五世來孫則下及無親之孫而上不及無親之祖不亦詭哉陳禮書曰父昭子穆而有常數者禮也祖功宗德而無定法者義也周於三昭三穆之外而有文武之廟魯於三昭三穆之外而有魯公之世室觀春秋傳稱襄王致文武胙於齊侯史記稱顯王致文武胙於秦孝公方是時文武固已逺矣襄王顯王猶且祀之則其廟不毁可知矣王舜劉歆韓退之之徒皆謂天子祖功宗德之廟不在七世之列時康成以周禮守祧有八人喪服小記王者立四廟則謂周制七廟文武為二祧親廟四而已是不知周公制禮之時文武尚為近廟其所以宗之之禮特起於後代也果所以宗之者在七廟內使繼世間有豐功盛德不下文武復在可宗之列則親廟又益殺乎理必不然馬昭難王肅云禮緯周尊后稷宗文王武王則七廟禮器云周旅酬六尸一人發爵則周七尸七廟明矣今使文武不在七數既不同祭又不享嘗豈禮也哉白虎通云周以后稷文武特七廟張融謹按周禮守祧職奄八人自太祖以下與文武及親廟用七人姜嫄用一人若除文武則奄少二人曽子問孔子說周事而云七廟無虛主如王肅之說則與文武而為九廟主當有九孔子何云七廟無虛主乎然則以周孔之言為證則七廟之制可知矣左傳秦西從衛來聘曰寡君願徼福于周公魯公世數雖逺而魯公之廟猶在也漢宗廟郡國亦立惠帝時叔孫通請立原廟又文帝自作顧成廟景帝尊孝文廟為太宗廟所常幸郡國各立太祖廟至宣帝太始二年復尊孝武廟為世宗凡所巡守亦立焉凡祖宗在郡國者六十八合百六十七所而京師自髙祖下至宣帝與太上皇悼皇考各自居陵旁立廟悼皇考宣帝之父即史皇孫也并為百七十六又園中各有寢便殿凡言便殿室者皆非正大之處也寢者陵上正殿若平生路寢矣便殿者寢側之别殿日祭於寢月祭於廟時祭於便殿寢日四上食廟嵗二十五祠漢儀宗廟一歲十二祠如閏加一祠與此十二十五祠也便殿歲四祠又月一遊衣冠而昭靈后武哀王昭哀后孝文太后孝昭太后衛思后戾太子戾后各寢與諸帝合凡一嵗初上食二萬四千四百凡十五用衛事四萬五千一百二十九人祝宰樂人一萬二千一百四十七人飬犧卒不在數貢禹言古者天子七廟今孝惠孝景皆親盡宜毁及郡國廟不應古禮宜正定天子是其議未行而禹卒後丞相韋元成等奏議曰禮王者受命諸侯始封之君皆為太祖以下諸廟皆迭毁毁廟之主藏於太祖廟五年而再合祭一禘一祫也祫者毁廟與未毁之主合食於太祖父為昭子為穆孫復為昭古之正禮也今髙帝為太祖文帝為太宗世世不毁餘則五廟迭毁景帝為昭武帝為穆昭帝與宣帝俱為昭皇考廟親未盡陳禮書曰漢宣以從孫繼昭帝患昭穆之體一也於是立悼皇廟以當一代之穆固不合禮若特立廟乃庶子王子之所當立者謂不當立誤矣於是罷昭靈后武哀王昭哀后衛思后戾太子戾后園皆不奉祠裁置吏卒守焉罷郡國廟時丞相韋元成等曰臣聞唯聖人為能饗帝孝子為能饗親立廟京師之居躬親承事春秋之義父不祭於支庶之宅君不祭於臣僕之家臣等以為宗廟在郡國宜勿復修奏可以髙皇帝為太祖孝文皇帝為太宗孝景皇帝為昭孝武皇帝為穆孝昭皇帝與孝宣帝俱為昭皇考廟親未盡太上孝惠廟皆親盡宜毁太上廟主宜瘞園孝惠為穆主遷於太廟寢園皆罷修後漢光武皇帝建武二年立髙廟於雒陽髙帝為太祖文帝為太宗武帝為世宗如舊三年正月立親廟雒陽祀父南頓君以上至舂陵節侯節侯名買買生鬱林太守外外生巨鹿都尉回回生南頓令欽欽即光武父時寇賊未平祖儀未設至十九年議立平哀成元帝廟代今親廟兄弟以下使有司祠宜為南頓君立皇考廟祭上至㫪陵節侯羣臣奉祠時五官中郎將張純太僕朱浮等奏議禮為人之子事太宗降其私親今親廟四孝宣皇帝以孫後祖為父立廟於奉明曰皇考廟獨羣臣侍祠願下有司議先帝四廟當代親廟者及皇考廟事下公卿議時從大司徒戴陟奏詔曰以宗廟處所未定且祫祭髙廟其成哀平且祠祭長安故髙廟其南陽舂陵歲時各且因故園廟祭祀園廟去太守理所逺者在所令長行太守事侍祠宗廟在章陵南陽太守稱使者往祭不使侯王祭者諸侯不得祖天子凡臨祭宗廟皆為侍祠惟孝宣皇帝有功德其上尊號曰中宗於是雒陽髙廟四時加祭孝宣孝元凡五帝其西廟成哀平三帝王四時祭於故髙廟東廟京兆尹侍祠冠衣車服如太常祠陵廟之禮皇考南頓君以上至曽祖祭皆就園廟長編又云禮三年一祫五年一禘毁廟之主陳於太祖未毁廟之主皆升合食於太祖父為昭南向子為穆北向父子不並坐而孫從王父後以三年冬祫五年夏禘之時但就陳祭毁廟之主而已謂之殷太祖東靣惠文武元帝為昭景宣帝為穆惠景昭三帝非殷祭時不祭按周制三年一禘五年一祫至此則革周制明帝以光武撥亂中興更為起廟上尊號曰世祖廟蔡雍曰孝明帝立世祖廟以明冉受命祖有功之義後嗣遵儉不復改立皆藏主其中聖明所制一王之法也自執事之吏下至學校莫能知所以兩廟之意以元帝於光武為穆故雖非宗不毁也後遂為常明帝遺詔遵儉無起寢廟藏主于世祖廟更衣孝章初不敢違以更衣有别上尊號曰顯宗廟間祠於更衣四時合祭於世祖廟章帝遣詔無起寢廟如先帝故事和帝初不敢違上尊號曰肅宗後帝承遵皆藏主于世祖廟積多無别是顯宗但為陵寢之號靈帝時京都四時所祭髙廟五主世祖七主未詳所謂三陵殤帝質帝少帝追尊后三陵安帝追尊祖妣宋貴人曰敬隱皇后皇妣左氏曰孝德皇后順帝追尊皇妣李氏恭愍皇后凡牲用十八太牢皆有副倅故髙廟三主親毁之後亦但殷祭之嵗奉祠毁廟之主藏于始祖之廟一世為祧祧猶四時祭之二世為壇三世為墠四世為鬼祫而祭之有禱亦祭之祫於始祖之廟末則迎主出陳於壇墠而祭吏事訖還藏故室迎送皆蹕獻帝初平中董卓與蔡雍等以和帝以下功德無殊而有過差不應為宗及餘非宗者追尊三后皆奏毁之四時祭於髙廟一祖二宗及近帝四凡七魏文帝受禪追尊大父曰大皇帝諱嵩後魏太尉大長秋曹騰飬子也考曰武皇帝以洛京宗廟未成乃祠武帝於建始殿親執饋奠如家人禮按禮將營宮室宗廟為先庶人無廟故祭於寢帝者行之非禮甚矣魏明帝時有司奏以武皇帝為魏太祖文皇帝為魏髙祖明帝為魏烈祖三祖之廟萬世不毁孫盛論曰夫諡以表行廟以存容未有當時而逆制祖宗未終而豫自尊顯魏之羣司於是乎失正矣晋武帝即位追尊皇祖宣王為宣皇帝伯考景王為景皇帝考文王為文皇帝權立一廟後用魏廟追祭征西將軍章郡府君頴川府君京兆府君與宣帝景帝文帝為三昭三穆是時宣皇未升太祖虛位所以祠六代與景帝為七廟廟制於中門外之左通為屋四阿殿制堂髙三尺隨見廟數為室代滿備遷毁太常博士孫育議云考工記左祖右社孔子曰周人敬鬼神而逺之近人而忠焉禮諸侯三門立廟宣在中門外之左宗廟之制外為都宮內各有寢廟别有門垣太祖在北左昭右穆次而南今宣為殿皆如古典太康元年靈夀公主修麗祔于太廟六年廟陷當改修創羣臣議奏曰古者七廟異所自宜如禮又曰古雖七廟自近代以來皆廟七室於禮無廢於情為叙亦隨時之宜也東晋元帝上繼武帝於禮為禰時西京神主陷於虜庭江左建廟皆更新造尋登懷帝之主又遷頴川府君于時三祖毁主權居别室大興三年將祭愍帝之主乃更定制還復章郡頴川于昭穆之位元帝崩則章郡復遷至明帝崩而頴川又遷猶十室也于時續廣太廟故三遷主並還西儲名之曰祧以准逺廟成帝咸康五年始作武倬皇后神主祔廟配享世祖成帝崩而康帝承統以兄弟一代故不遷京兆始十一室也康帝崩穆帝立京兆遷入西儲同謂之祧如前三祖遷主之禮故正室猶十一也穆帝崩而哀帝海西並為兄弟無所登除咸安之初簡文皇帝上繼元皇帝於是頴川京兆二主復還昭穆之位簡文崩潁川又遷孝武帝太元十二年始改作太廟殿正室十四間東西儲各一間合十六間棟髙八丈四尺備法駕遷神主于行廟征西至京兆四主及太孫各用其位之儀服四主不從帝者儀是與太康異也及孝武崩京兆又遷如穆帝之世四祧故事宋武帝即尊位祠七代為七廟永初追尊皇考為孝皇帝皇妣趙氏為穆皇后三年孝懿蕭皇后崩又祔廟髙祖崩神主升廟猶昭穆之序如魏晉之制虛太祖之位文帝元嘉初追尊所生胡媫妤為章皇太后立廟于太廟西其後孝武昭太后明帝宣太后並祔章太后廟齊髙帝追尊父為宣皇帝母為昭皇后七廟梁武帝受禪遷神主於太廟為三昭三穆凡六廟追尊皇考為文皇帝皇妣為德皇后廟號太祖皇祖以上皆不追尊擬祖遷於上而太祖之廟不毁與親廟為七皆同一堂共庭而别室陳依梁制七廟如禮初文帝入嗣而皇考始興昭烈王廟在始興國謂之東廟天嘉中徙神主祔于梁之小廟改曰國廟祭用天子儀後魏之先居於漠北鑿石為祖宗之廟於烏洛侯國西北明元帝永興四年立太祖道武帝廟於白登山嵗一祭具太牢帝親奉無常月又於白登西太祖舊遊之處立昭成獻明太祖廟常以九月十月之交帝親祭牲用馬牛羊又親行貙劉之禮孝文太和三年六月親謁七廟十五年四月改營太廟詔曰祖有功宗有德後者不得擅祖宗之名居二祧之廟今述遵先志宜制祖宗之號烈祖有創業之功代祖有開拓之德宜為祖宗百代不遷而逺祖平文功未多於昭成然廟號為太祖道武建業之勳髙於平文廟號為烈祖比校似為未允朕今奉尊道武為太祖顯祖為二祧餘皆以次而遷平文既遷廟惟有六如今七廟一則無主惟當朕躬此事亦臣子所難言朕以不得忝承洪緒若宗廟之靈獲全首領以沒於地為昭穆之次心願畢矣必不可先設可垂文示後八月詔郡國有時果可薦者並送京師以供廟享其白登山雞鳴山廟惟遣有司行事十一月釋禫祭太和廟帝衮冕與祭者朝服丁卯遷廟之神主于太廟百官陪從奉神主於齊車至新廟有司升神主於太廟諸侯五牧守蕃附等各以其職來祭十月詔先王制禮經綸萬代白登廟者有為而興昭穆不次太祖有三層之宇已降無方丈之室又常用季秋躬駕䖍祀今授衣之月享祭明堂立冬之始奉蒸太廟若復齊白登便為一月再駕緬詳二理謂宜省一可廢東山之祀成此二享之敬可勑有司但命內典神者攝行祭者獻明道武各有廟稱可具依舊式自太宗諸帝昔無殿宇因停之十九年遷都洛邑二月詔曰太和廟已就神儀靈主宜時奉寧可尅五月奉遷於廟其出金墉之儀一准出代都太和之式入新廟之典可依近至金墉之軌其威儀鹵簿如出代廟百官奉遷宜可省之但令朝官四品以上侍官五品以上宗室奉迎北齊文宣帝受禪置六廟獻武以下不毁以上則遞毁並同廟而别室既而遷神主於太廟文襄文宣並太祖之子文宣初疑其昭穆之次欲别立廟衆議不同至二年秋始祔太廟五祭同梁制後周閔帝受禪而右宗廟追尊皇祖為德皇帝父文王為文皇帝廟號太祖擬祖以上三廟遞遷至太祖不毁其下相承置二穆為五焉明帝崩廟號代宗武帝崩廟號髙祖並為祧廟不毁隋文帝受命遣兼太保宇文善奉䇿詣同州告皇考桓王廟兼用女巫同家人禮追尊號為武元皇帝皇妣為元明皇后迎神歸于京師改立左宗廟未言始祖又無受命之祧自髙祖以下置四親廟同殿異室一皇髙祖太原府君廟二皇曽祖康王廟三皇祖獻王廟四皇考太祖武元皇帝廟擬祖遷於上而太祖之廟不毁至煬帝立七廟太祖各一殿惟周文武二祧與始祖而三餘並分室而祭始及祧之外從迭毁之法既營洛邑後有司奏請於東京建立宗廟帝謂祕書監抑𧦬曰今始祖及二祧已具今後子孫處何所又下詔惟議别立髙祖之廟屬有行役復寢唐武德元年追尊髙祖曰宣簡公曽祖曰懿王祖曰景皇帝考曰元皇帝法駕迎神主祔於太廟始享四室貞觀九年髙祖崩增修太廟中書侍郎岑文本議曰祖鄭𤣥者則陳四廟之制述王肅者則引七廟之文貴賤混而莫辨是非紛而不定春秋榖梁傳及禮記王制祭法禮器孔子家語並云天子七廟諸侯五廟大夫三廟士一廟尚書咸有一德曰七世之廟可以觀德至於孫卿孔安國劉歆班彪父子孔昆虞喜于寶之徒商較今古咸以為然故其文曰天子三昭三穆與太祖之廟而七是以晋宋齊梁皆依斯義立親廟六豈有國之茂典不刋之休烈乎然若使違羣經之正說從纍代之疑議背子雍之篤論述康成之舊學則天子之禮下逼於人臣諸侯之制上僣於王者非所謂尊卑有序名位不同者也臣等參詳請依晋宋故事立親廟六其祖宗之制式遵舊典制從之於是增修太廟始崇𢎞農府君及髙祖神主并舊四室為六室漢魏立廟既不合古至晋採周官定七廟之數而虛太祖之室隋興但立髙曽祖禰唐初因其制始立四廟正觀中從朱子奢虛太祖一室之議而廟以六室中宗時以景皇帝為始祖由是始有七室開元中制增太廟為九室范祖禹唐鑑已論其非及其後也禮官又以兄弟不相為後不得為昭穆於是以敬文武為一代故終唐之世為九代十一室焉宋朝廟議建隆元年太常禮院請下百官議立宗廟兵部尚書張昭等言得權判名表主客郎中任徹狀言按堯舜禹皆立五廟蓋二昭二穆與其始祖也有商建立六廟蓋昭穆親廟之外祀契與湯也周立七廟蓋親廟之外祀太祖及文武也漢初立廟悉不如禮魏晉採周官始復七廟之制江左相承不改然而七廟之中猶虛太祖之室斯皆考法於前古定議於一時隋文代周平陳博採兩朝羣議但立髙曽祖禰四廟而已唐因隋制廟止四親蓋由始興之君有功之祖皆在親之中故隋唐之初定二昭二穆立為四廟自唐梁而下至於前朝定廟之規不易其法有司立議無能異同諒由稽古之制不可改也臣以為建四廟深合禮文臣等據任徹所議云云其所立太廟七室及追尊四親廟請如其議制曰恭依咸平元年三月判太常李宗訥等言伏見僖祖稱曽髙祖順祖稱髙祖翼祖稱曽祖宣祖稱祖太祖稱伯詳觀近典參考舊儀爰自唐朝降及五代咸有稱祖及伯之文聖朝因之遂為定制按爾雅云父為考父之考為王父王父之考為髙祖王父又曰父之兄弟先生為世父後生為叔父以此觀之惟父得稱考已上皆稱王父伯則稱曰世父今之稱號未合禮經欲望僖祖止稱廟號順祖而下即依爾雅之文詔下尚書省議張齊賢等曰按王制天子七廟書曰七世之廟可以觀德三代以下迄至於今所謂不刋之典也其間或有兄弟繼立亦移昭穆之列是以漢書曰為人後者為之子故為所後服斬衰三年所以尊夲祖而重正統也安得宗廟中有伯氏之稱乎其唐朝及五代有稱者蓋禮官之失非正典也請自今有事於太廟則太祖并諸祖宗稱孝孫孝曽孫太宗室稱孝子如此則昭穆之位允合大倫其爾雅之文蓋周公著以教人使知父祖親踈之節夲不謂宗廟言也詔僖祖止稱廟號太祖并諸祖宗稱孝孫孝曽孫令太常禮院别加詳定禮院言按左氏傳文公二年躋僖公正義云禮父子異昭穆同此明閔僖弟兄繼統同為一代又魯威公隱公繼立皆當穆位又按江都集禮晉建武中惠懷二王兄弟同位異座以正昭穆又唐書中宗睿宗皆處昭位欽宗文宗武宗序昭穆而位定請自今朝享僖祖室曰曽髙祖順祖室曰髙祖翼祖曰曽祖皇帝並稱孝曽孫宣祖室依禮記正文曰皇祖考自稱孝孫太祖室依唐德宗故事曰皇伯考每大祭太祖太宗昭穆同位自稱孝子太宗室請依禮記曰皇考自稱孝子其别廟稱呼亦依此詔令都省集兩制尚書省四品已上官參議既而上言伏以英武聖文神德皇帝受天明命開國成家恢復土疆撫寧億兆固已為皇宋帝者太祖矣神功聖德文武皇帝纘承大寶臨御四方混一寰區交修禮樂固已為帝者太宗矣古者祖有功宗有德皆先有其實而後正其名今二聖相承功業諡號固已定矣謂之太祖太宗則百世不祧之廟矣豈有祖宗之廟已分二世昭穆之位翻同一代其所以如此者由兄弟繼統故爾若如前儀引漢書云為人後者為之子以正父子之道以定昭穆之義則至公而無疑也必若以兄弟繼統同為一代則是太宗不得自為世數也不得自為世數則何以得為宗乎不得為宗則何以得為百世不祧之主乎云云今太祖為開基之祖太宗為繼統之君二帝相承僖宗以降四廟為六世以六世一昭一穆言之則上無毁廟之嫌下有善繼之美於禮為大順於時為合宜何嫌而謂不可乎又太祖室依德宗在位故事曰皇伯考按唐自明皇至德宗父子相傳無兄弟繼立德宗在位何得有皇伯考之稱臣等以為宜為昭穆於禮為順云云翰林學士宋湜等上言伏以百王之制以功德為祖宗七廟之中以父子為昭穆聖賢垂範典禮具存恭惟太宗盛德大業垂於無窮百代不遷固其宜矣然今定昭穆之位則太祖皇帝之弟也三代而卞至於唐兄弟相繼則多昭穆異位未之見也今詳所議臣切疑焉欲望重下有司審加詳定如前代帝王有兄弟相繼而昭穆異位及天子於伯父叔父有稱孝孫者則依據遵行如其不然望依歷代之義庶無差失詔令禮院詳都省及兩部所議再檢討典故以聞禮院言禮統曰祭有昭穆所以别父子逺近長幼親踈之序而無亂也通禮義纂曰父為昭居上子為穆居下父子異位以崇本也孫以祖烈遞為昭穆斯則長幼之節親踈之序得而正之明上下也晋賀循議兄弟不合繼位昭穆云商人親廟四并契湯而六此有兄弟四人相襲為君者便當上毁四廟乎如四代親盡無復禰之神矣又商紀湯為君合十二代而正代惟六以此言之明兄弟不為正代也通典明皇朝禘祫儀布昭穆之座於户外皇伯考中宗皇考睿宗並在於南廂北向同列穆位又唐郊祀録德宗朝祝文以中宗為髙伯祖續曲臺禮云正元十九年陳京議祫祭圗中宗睿宗俱列昭位户部尚書王紹等五十六人同亰議始與禮合詔從之切以七廟之制百王是尊至於祖有功宗有德則百世不遷之廟也父為昭子為穆則萬世不刋之典也今議者引漢書曰為人後者為人子又曰安得宗廟有伯氏之稱自今皇帝有事於太廟則太祖室稱孝孫則是以太宗為太祖後也殊不知弟不為兄後子不為父孫春秋之深旨也父謂之昭子謂之穆禮記之明文也為人後之說豈可施之於先帝乎臣等又按太宗享祀太祖三十有三載稱曰孝弟此前朝不易之制又安可追改乎唐明皇謂中宗為皇伯考德宗謂中宗為髙伯祖伯氏之稱復何不可請自今合祭自太宗與太祖依典禮同位異座仍舊稱孝子餘並依舊制詔可康㝎元年十二月判太常寺宋祁言准中書送下直祕閣趙希言奏太廟自來有寢無廟因堂為室東西十六間內十四間為七室兩頭各一夾室按禮天子七廟親廟五祧廟二共為七廟今又不遷僖順二祖若以太宗太祖兄弟繼立亦可遷僖祖一室皆不顯著廟號云云臣按周制有廟有寢以象人君前有朝後有寢也廟藏木主寢藏衣冠至秦乃出寢於廟側故陵上更稱寢殿後世因而不改今宗廟無寢蓋夲於兹鄭康成謂周制立二昭二穆與太祖文武共為七廟此一家之說未足援正自大儒荀卿王肅等皆云天子七廟諸侯五大夫三士二降殺以兩之義則國家定七世之數不用康成之說也僖祖至真宗方及六世不合便立廟祧自周漢每帝各立廟晋宋以來多用同殿異室之制國朝以七室代七廟祖宗相承行之已久即同一之制不可輕改云云詔如祁所奏嘉祐八年六月禮院言仁宗神宗祔廟請以太祖太宗為一世增一室以備天子事七世禮詔兩制為禮官考議孫抃等議曰禮云三昭三穆與太祖之廟而七書曰七世之廟可以觀德曰世與昭穆云者據父子之正而言也若兄弟則昭穆同不得以世數之矣商之祖丁之子曰陽甲曰盤庚曰小辛曰小乙四人者皆有天下而商之廟有始祖有太祖有太宗有中宗若以一君為一世則小乙之祭不及其父祖丁是古之兄弟相及昭穆同而不以世數數之明矣故晋之廟十一室而六世唐之廟十一室而九世中宗睿宗之於髙宗恭宗文宗武宗之於穆宗同居穆位國朝太祖為受命之祖太宗為有德之宗此萬世不遷者也故太祖之室太宗稱孝弟真宗稱孝子仁宗稱孝孫而禘祫圗太祖太宗同居昭位南向真宗居穆位北向蓋先朝稽用古禮而著之於祀典矣今仁宗祔廟請增一室為八室以備天子事七世之禮詔從之於是盧士宗司馬光等議曰按禮天子七廟三昭三穆與太祖之廟而七而太祖之廟萬世不毁其餘昭穆親盡則毁示有終也自漢以來天子或起於布衣以受命之初太祖尚在三昭三穆之次或祀七世或祀六世其太祖以上之祖雖屬尊於太祖親盡則遷故漢元之世太上廟主瘞於寢園魏明之世處士廟主遷於園邑晉武祔廟遷征西府君惠帝祔廟遷豫州府君自是以下大抵過六世則遷其神主蓋以太祖未正東向之位故止祀三昭三穆若太祖已正東向之位則并三昭三穆為七世矣唐髙祖初立四世太宗增祀六世及太宗祔廟則遷洪農府君神主於夾室髙宗祔廟又遷宣皇帝神主於夾室皆祀六世此前世之成法也惟明皇九室祀八世事不經見難可據依今若以太祖太宗為一世則仁宗祔廟之日僖祖親盡當遷於西夾室祀三昭三穆更不須展一室詔抃等再議議曰先王之禮自王以下降殺以兩故有天下者事七世有一國者事五世自漢以來諸儒𫝊禮者始有夏五廟商六廟之說出於不見商書之言而承用禮學之誤蓋自唐至周廟制不同而大抵皆七世王制所謂三昭三穆與太祖之廟而七是也今議者疑僖祖既非太祖又在三昭三穆之外以為於禮當遷如此則是以有天下之尊而所事止於六世不稱先王制禮降殺以兩之意自議者言僖祖當遷者以為在三昭三穆之外則於三代之禮未嘗有如此而不遷者臣以為三代之禮亦未嘗有所立之廟出太祖之上者也後世之變既與三代不同則廟制亦不得不變而從時且自周以上所謂太祖亦非始受命之王特始封之君而已今僖祖雖非始封之君要為立廟之始祖方廟數未過七世之時遂毁其廟遷其主考三代之禮亦未有如此者也漢魏及唐一時之議恐未合先王制禮之意臣切以為存僖祖之室以備七世之數合於經傳事七世之文詔恭依治平四年三月太常禮院言准嘉祐詔書定七世八室之制今英宗威神在天崇祔有日請以神主祔太廟第八室僖祖依唐故事祧藏於西夾室奉置西壁石室中自仁宗而上至順祖以次升遷其祧藏之主每遇禘祫即如典禮請依故事下兩制待制以上參議張方平等議曰天子七廟著於尚書春秋𫝊禮記王制祭法禮器諸子之說歷代之議詳矣故昭穆所以序世系之正禘祫所以極仁義之本三代以降惟漢晋唐以其統祚之長得及祧遷之議國家繼天而王列聖重光盛德在人必百世祀云云周堂八室廟制已定僖祖當祧合於典禮請依禮院所奏詔恭依羣書考索卷二十九
