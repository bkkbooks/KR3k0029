body:
  text: 羣書考索别集卷八宋章如愚撰經籍門禮記禮廢而後有書學者博學乎先王六藝之文誦焉以識其辭講焉以通其意而無以約之則非學也故曰博學而詳説之将以反説約也所謂約禮是己禮者履也謂昔之誦而説者至是可踐而履也故夫子曰君子博學於文約之以禮顔子之稱夫子亦曰博我以文約我以禮禮之為義不其大哉然古禮非必有經盖先王之世上自朝廷下自閭巷其儀品有章動作有莭所謂禮之實者皆踐而履之矣故曰禮儀三百威儀三千待其人而後行則豈必簡策而後𫝊哉其後禮廢儒者惜之乃始論著於書以𫝊於世今禮記四十九篇則其遺説而學者求所以約之者不可以莫之習也文公文集古來流傳文字人謂禮記是漢儒説恐不然漢儒最純者莫如董仲舒仲舒之文最純者莫如三策何嘗有禮記中説話如樂記所謂天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉仲舒如何説得到這裏必是古來流𫝊得此文字如此語録禮記是解儀禮儀禮是經禮記是觧儀禮且如儀禮有冠禮禮記便有冠義儀禮有昏禮禮記有昏義以至燕射之類莫不皆然同前禮記諸篇之疑禮疑是古全書若曲禮玉藻諸篇皆戰國士及漢儒所裒集王制月令内則自成書要好自将説禮物處如内則王制月令諸篇附儀禮成一書如中間却将曲禮玉藻又附在末後不説禮物處如孔子閒居孔子燕居表記緇衣儒行諸篇却自成一書樂記文章頗粹怕不是漢儒做自與史記荀子是一套怕只是荀子作同前三禮舊為一經前此三禮同為一經故有三禮學䆒王介甫廢儀禮取禮記以此知其無識同前經三百儀三千禮有節文度數之詳其經至於三百其儀至於三千其初若甚難強者故其未學詩也先已學㓜儀矣盖禮之小者自為童子而不可闕焉者也至於成人然後及其大者又必服習之久而有得焉然後内有以固其肌膚之㑹筋體之束而德性之守得以堅定而不移外有以行於鄉黨州閭之間逹於宗廟朝廷之上而其酧酢之際得以正固而不亂也同前禮記者禮之義説周官一書固為禮之綱領至其儀法度數禮乃其本經而禮記郊特牲冠義等篇乃其義説耳前此猶有三禮通禮學䆒以科禮雖不行而士猶得以誦習而知其説熙寕以來王安石變亂舊制與罷儀禮而獨存禮記之科弃經任𫝊遺本宗末其失已甚乞修三禮劄子禮記出於漢儒孟子曰吾於武成取二三策而已孟子先秦而生去孔子未逺猶謂古書之不可盡信况秦火之餘哉五經獨禮樂尤為秦之所惡絶滅㡬盡今之禮經盖漢儒鳩集諸家之説博取累世之殘文而後世立之於學官夏商秦漢之事無所不統盖不可盡信矣嘗觀禮運雖有夫子之言然觀其冠篇言大道與三代之治其語尤雜而不倫夫聖人之所以持萬世與天地長久而不變者君臣父子而已矣茍無君臣父子則強者攖摶弱者駭竄人之黨将為禽獸之所勝其禍亂何如哉楊氏為我墨氏兼愛卒以其説敗天下置天下之民於禽獸賴孟子出力而攘然後君父之教明聖人之道復存今其言曰大道之行也天下為公人不獨親其親不獨子其子如是而謂之大同又曰大道既隠天下為私各親其親各子其子如是而謂之薄俗又曰禮儀以為紀以正君臣以篤父子以睦兄弟以和夫婦如是而謂之起兵作謀賊亂之本以禹湯文武之治謂之小康鄭氏釋之又以老氏之言為之証薄禮而厚忠信嗚乎禮不出於忠信而安出焉洪水王制乖妄王制之書古無有也漢文帝時令博士諸生刺經作王制博士諸生果何人哉而能作此一書以為不刋之典無窮之傳今觀其書言爵位則竊孟子之文言官制則竊左氏之文言廵狩則竊書之文其餘則雜取公穀等説而益以己見正所謂不知而作也雖其言未必盡非要之牴牾者多矣夫其所謂王制者將周王之制乎抑夏商王之制乎以為周之制孟子之時諸侯已㓕去其籍歴秦至漢博士諸生何從知之是周制不可得而據矣以為夏商之制則孔子之時已言夏商之禮不足証也以杞宋之文獻不足爾歴秦至漢博士諸生何由知之是夏商之制不可得而據矣三代之制既不得而據則所謂王制者采諸尚書孟子左氏公榖等文而附益之果足信乎漢之博士諸生作王制特采尚書孟子左氏公羊穀梁等文而附益之其雜亂已甚矣請條其甚不可者孟子以天子一位公一位侯一位伯一位子男同一位凡五等彼則以子男為二位而不及天子孟子以君一位卿一位大夫一位上士一位中士一位下士一位凡六等彼則不言君之位而惟五等此則有異矣至其餘文則全録孟子之文又以大國次國小國無異制皆有上士二十七人孟子以上士中士下士各一位安得上士如此之多若諸侯上士皆二十七人則中士下士又當㡬人乎此不可也又曰凡九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十九凡二百一十國併九州計之則為千七百七十三國周封諸侯之數不得知也其見於春秋者并附庸不過百八十國見於左氏傳者不過倍加之爾借謂僻陋小國無事見經與見吞於強大然安得千七百國之多乎又以天子之縣内方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國古者畿内不以封建諸侯雖有公卿采地而謂之百里七十里計九十有三國此皆不可也又曰天子使其大夫為三監監於方伯之國三人古無三監之官惟周武庚於商慮其扇亂乃命管叔蔡叔霍叔監之安得以國各有三監乎若周禮有立其監之語乃謂諸侯自監一國也引書與周禮為據俱非此又不可又曰天子諸侯無事則嵗三田無事而不田曰不敬田狩之事雖因農隙以講武事然天子一日萬機焦勞不暇何必三時親田也文王不敢盤於逰田而謂之無事不田曰不敬此又不可也又曰諸侯約則不禘禘則不嘗禘之為祭大祭也王者當禘其祖之所出乃謂之禘春秋書禘皆記其僣也何得為諸侯之祭乎若曰虞夏之制雖帝王異制不至以天子之祭為諸侯之祭也此又不可也又曰圭璧金璋不鬻於市布帛精粗不中數幅廣狭不中量不鬻於市錦文珠玉成器不鬻於市以至衣服飲食五榖不時果實未熟皆不鬻於市市易者惟欲便於民市之有禁不過不使奸人飾行續慝以欺愚民爾雖布帛精粗與夫圭璋錦文等物何為不可鬻於市甲欲售之乙欲得之有司乃強為之禁又誰聼乎禁於公能禁於私乎此又不可也又曰夏后燕衣而養老商人縞衣而養老周人𤣥衣而養老茍可以養老何必服色之不同又曰道路男子由左婦人由右車從中央茍可以使道路之無事何必左右中央之間若是之類皆詩書易春秋之所無漢儒以意言之雖若未有害於經然言有毫釐之差則成千里之謬揚子雲作太𤣥議者謂非聖作經罪同吳楚漢之愽士諸生名氏無聞必不過於子雲以夫子述而不作誅之亦不免吳楚之罪也諸侯専征天下有道禮樂征伐自天子出天下無道禮樂征伐自諸侯出自諸侯出盖十世希不失矣由是言之則諸侯専征之説當不載之經可也然攷之王制言曰諸侯賜弓矢然後征是専征之義於古未嘗廢也又豈王制乃漢諸儒不根之論不必深信而諸侯果不可以専征乎諸侯無専征之義専征者大罪也以諸侯賜弓矢得専征伐者孰為此説也毛萇釋詩孔安國釋書鄭康成釋禮杜預釋左氏皆有是言也吁陋學相仍誤世亂教無以辨之則益啓僣亂之萌也惟辟作福惟辟作威臣而有作福作威則害家凶國之道也凡人臣行一爵賞施一刑罰不由上命則為専作福威之罪况征伐大事人主重權諸侯方得弓矢之賜即可専之乎諸侯専之則非治世明主也治世明主則人不得而專也觀詩書之言尤於此致其辨焉仲康之時夏少衰矣而嗣侯之征羲和書謂之嗣征史官嫌其若嗣侯之専征必曰嗣后承王命徂征商紂之亂諸侯肆矣文王時為西伯出車之詩以討玁狁疑若文王自討之也詩人必以謂自天子所謂我來矣夫仲康商紂之世諸侯有所征討必以王命詩書必明言之而惡其嫌况治世明主具以征伐之柄假乎人惟夫東周無政日以凌遲諸侯始僣亂妄相侵伐不由王命至其中世大夫又執其權聖人傷之曰天下有道禮樂征伐自天子出天下無道禮樂征伐自諸侯出自諸侯出盖十世希不失矣自大夫出盖五世希不失矣深以痛衰周之失政乃至於此也於是作春秋初則述諸侯之僣中則述大夫之専此乃聖人之發憤柰何以為諸侯可得而専乎彼諸儒之意盖以弓矢為征伐之物既賜弓矢則得専征伐不知夫古者諸侯有大功天子賜之弓矢及圭瓉盖殊禮也賜之圭瓉也使得為鬯以祭也賜之弓矢者使待王命而征不庭也故王制曰諸侯賜弓矢然後征賜圭瓉然後為鬯謂之然後未嘗不本王命安得謂専之乎晋文侯有攘戎之大功平王賜之弓矢作文侯之命未嘗有専征之語彤弓之詩亦以賜諸侯也但曰彤弓弨兮受言藏之亦未聞使之専征也盖諸儒不䆒詩書之㫖特因王制之語而失之故耳春秋一經書征書伐書㓕書取書入書戰書圍書討無非罪其無王命而擅行師也若有弓矢之賜即可以出征則是時王室方尚姑息倔強大國亦得弓矢之賜何難一得所賜皆可専征其孰不可以専征乎若是夫子春秋皆無譏也諸儒之説行後世恃強専恣者必以此藉口而無惮者矣故陋學相仍誤世亂教無以辨之則益啟僣亂之萌也或曰左氏嘗載管仲之言曰昔召康公命太公且曰五侯九伯汝實征之此言又何也曰以太公之尊周室倚賴之使有王命得征伐五侯九伯可也何嘗使太公専之乎若晋文侯之子孫恃其先世得弓矢之賜齊太公之子孫恃有康公之言皆以専征諸侯是乃周成王平王教之僣而導之亂也嗚呼豈理也哉不韋月令之書月令之書鄭氏以為吕不韋所作盖以孟夏有太尉文是秦官也季秋有來嵗云是秦制也然可疑者秦始皇十二年不韋死至十六年秦始并天下以十月為嵗首方秦以建亥首嵗而不韋已死數載矣然則月令不得謂不韋所作矣借曰著述是書不必詳其人則其間文理是非豈無可以訾議者月令之書出於秦漢之間拘儒陋學不知道者為之故唐栁子厚嘗辯其非矣曰事有當俟時而行者有不當俟時而行者而月令一反時令則有灾異此乃巫史之説離聖人之道已逺古之儒者少有如子厚之知道也然惜其所辨者小至其大乖戾者未之辨也夫四時所主之帝所祀之處所祭之物天子所居之所所乘之車所駕之馬所載之旂所衣之衣所服之玉所食之榖與牲所用之器各謂不同此皆不經之語古無有也不為之辨為惑後人未知所終也東方之帝必曰太昊者出於鄒衍五運之説後儒推其相生之術以德始於木太昊主春夏火也炎帝以火繼木故主夏中央土也黄帝以土繼火故主中央秋金也少昊以金繼土故主秋冬水也顓帝以水繼金故主冬古者盛德之君多矣何特於此數君主四時又安知木德必始於太昊乎且既以顓帝少昊子也而乃當金父之間著德乃自異耶冠冕百王者莫如堯舜今乃四時之祀不及焉不知堯舜何愧於數君乎故知所謂四時所主之帝非也曲禮之五祀者曰户竈中霤門行也祭法加為七祀古無有也惟見於漢儒之記禮况於春則祀户夏則祀竈中央則祀中霤秋則祀門冬則祀行以隂陽出入盛衰言之皆無理也隂陽之一出一入一盛一衰乃其常理何用人祀户祀門各以其時出入之乎故知謂四時所祀之處者非也肝木也心火也脾土也肺金也腎水也此五藏属五行不易之理也今乃春祭脾夏祭肺季夏祭心秋祭肝冬祭腎何耶鄭氏曰此以五藏之上下次之耳春為陽中於藏值脾脾為尊據五藏肺最在上若論其尊而在上則肺為先矣而反以脾為先使祭五藏得其序已無謂况又亂之乎故知謂四時所祭之物非也王者南靣而聼天下向明而治自有常居何至春居青陽夏居明堂秋居總章冬居元堂又裂為太廟左右今以配十有二月為太室以配中央遷徙徃來莫有定止皆無謂也天子所乘之車不過五輅或祀天或即位或田獵之事取其宜爾何必春乘鸞輅夏乘大輅中央乘木輅秋乘戎輅冬乘𤣥輅而後可耶天子所駕之馬亦不過選其駿者充閑廐備驅馳何必春駕蒼龍夏駕赤駵中央駕黄駵秋駕白駱冬駕鉄驪而後可耶天子之旂為太常畫日月龍章其上自有常色何必春載青旂夏載赤旂中央載黄旂秋載白旂冬載𤣥旂而後可耶天子之服繪六章於衣以法乾綉六章於裳以法坤自有常制何至春衣青夏衣赤中央衣黄秋衣白冬衣黒衣青衣黒衣赤已非法服况衣白類凶服而可乎天子之玉大圭鎮圭衝璜琚瑀其色皆白何至春服蒼玉夏服赤玉中央服黄玉秋服白玉冬服𤣥玉乎至於五榖六畜之味何時而不可食今必春食麥與羊夏食菽與鷄中央食稷與牛秋食麻與犬冬食黍與彘何耶古人制器方圎長短大小廣狭各有其度何可以時變易之哉今必春疏以逹夏髙以粗中央圎以閎秋㢘以深冬閎以奄何哉故謂天子所居之所所乘之車所駕之馬所載之旂所衣之衣所服之玉所食之牲與所用之器四時各不同者皆不經之語也彼其意以謂王者行事必順時氣故雖一旂一車一服一器不可有違是直隂陽家拘忌之説可以欺愚誑庸爾古者順時布政固自有道豈如是哉堯命羲和測四方之中星以授人時觀民析因夷隩則無一民之失所鳥獸之孳尾希革毛毨氄毛則無一物之不遂何用區區然於祀户祭脾車旂器物之間哉使人君遵五常明五教以濟萬民以遂羣物春不居青陽不乘鸞輅不駕蒼龍不載青旂何害於治若拂人理違天道徒以衣服車旂順四方之時色豈有補乎周官書亦好為分配四時之説以青圭赤璋白琥𤣥璜禮四方其牲幣各依方色余嘗以為誠之所在必不然也况天子所服之玉必順時色乎春行羔豚膳膏香夏行腒鱐膳膏臊秋行犢麛膳膏腥冬行鱻羽膳膏羶予以為茍可致養必不然也况四時之牲又異於此乎昔者禹錫𤣥圭商用𤣥牡武王麾白旄周公用騂牛各以其宜爾何甞論服色之異乎從月令之説是數者皆有意也孟子曰我知言凡詖辭之類孟子知之月令之書著為禮經為不可去者以知言之人不世出無有辭而闢之者也月令不可専歸之不韋以月令為周公所作者自蔡伯喈之言始以月令為呂不韋所作者自陸德明之言始愚甞以二公之言而質之月令矣将以為周公耶以孟夏令太尉則太尉為秦官固非周人之所謂司馬也以季夏合百縣則郡縣為秦制亦非周人所謂鄉遂也以季秋受來嵗之朔日則建亥為秦正又非周人之所謂建子也執是以辨蔡公則其説拘矣専以為吕不韋耶則參夷赭衣之世豈知孟春之所謂布徳焚書㓕學之世豈知仲春之所謂釋菜罷侯置守之世豈知季夏之所謂封侯執是以難陸公則其辨窮矣盖周人月令已詳陳於七月之詩則此書斷非周公贅為之也今之月令雖用呂氏春秋十二紀之首亦未可専歸之不韋也然則此書始於何代作於何人乎曰補葺而訂正之者漢儒力也何以言之月令首篇曰律中太簇是漢建寅而行夏正實非周秦之時也仲春之月曰始雨水是漢始以雨水為二月節實非周秦之舊也若夫太尉之職郡縣之制漢實因之布徳之詔釋菜之禮漢實有之受朔之事封侯之典證之以漢初又得之此愚所以謂出於漢儒之訂正而欲與蔡陸二公辨月令明堂秦無明堂後人見月令秦吕不韋所作其間有明堂之文於是以為秦之明堂何也按秦實無明堂但後儒見月令有天子居明堂之文以月令是秦相吕不韋所作春秋十二紀之首章疑為秦之明堂耳然今觀月令明堂十有三位無九室之説盖聶崇義三禮圗誤取大戴九室之堂以為秦制也又鄭康成亦駁大戴云九室三十六户七十二牖似秦相吕不韋作春秋時所益者非古制也噫鄭康成注禮記如月令是吕不韋所作春秋矣而月令豈有九室之文哉何以輙駁大戴九室以為出於吕氏春秋乎誠舛謬之甚也周公明堂成王幼周公為冢宰攝政以王命賞罰天下何嘗居非常之位乎明堂位乃曰周公朝諸侯於明堂之位天子負斧依南向而立又曰周公踐天子之位果如是則周公即居尊矣其説何如書金縢曰武王既䘮管叔及其羣弟流言於國曰公将不利於孺子公乃為詩以貽王蔡仲之命曰惟周公位冡宰正百官羣叔流言繼以蔡仲克庸祗德周公以為卿士乃命之王邦之蔡書言公作詩以貽王言命之王而後封仲於蔡周公何甞負斧依南向而立當時以為天子哉周公為天子則成王何以處此周公但攝政爾羣叔且有不利之言使實踐祚而朝侯則豈止羣叔流言而已哉謬之甚也又曰成王以周公為有勲勞於天下封周公於曲阜地方七百里命魯公世世祀以天子之禮樂此又不知禮之謬論予甞辨其不然爾魯昭公曰吾何僣哉子家駒設兩觀乘大輅朱干玉戚以舞大夏八佾以舞大武此皆天子之禮也觀春秋書初獻六羽書郊書望書新作南門新作雉門及兩觀無非惡魯人之僣天子所謂禮樂征伐自諸侯出是也何得謂魯得用天子禮樂兼虞夏商周之制孟子以魯儉於百里彼乃以為七百里周官以唐虞百夏商官倍彼則以有虞官五十夏后官百戾經違古莫此為重至其大可怪者乃曰魯之君臣未甞相弑也天下以為有道之國春秋魯只十餘君隠為桓所弑子般閔公子赤皆見弑於亂臣昭公哀公皆見逐焉十二公之中而相弑害者已如此而謂之未嘗相弑蓋彼未嘗一覩春秋故妄說至此後世不察乃據以為禮經彼之謬不足道也後儒酷信之者陋又居其下矣誠所逹於理者削而去之則先王之禮可尋易春秋詩書之㫖自彰明矣魯僭禮樂漢儒記禮曰成王以周公有大勲勞於天下故賜魯世祀以天子之禮樂後世信之或曰此魯惠公時周平王命史角賜以郊廟之禮史角留於魯後為墨氏之學然則二説孰是謂魯用天子禮樂其説皆非也夫周至成王而後制禮作樂教典始以大明人皆知名分所在皆周公之力豈有周公方薨成王遽以天子之禮樂賜魯首壊周公之禮典乎茍如是則周公諡當何稱葬用何禮必王而後可也廟諡曰公葬禮亦公天子禮樂何用哉故成王非庸君伯禽非妄人必不為此悖禮亂常之事以啓後世僣擬禍亂之門也或疑其非成王時是矣然謂之平王賜恵公亦豈然哉彼其意以謂治朝賢主則禮典不紊衰主孱君則賞賜濫行故疑在平王之世獨不思周轍雖東魯在當時不過為次國大國有齊楚晋宋敵國有鄭衛陳蔡使平王欲以私意曲賜加魯鄭衛陳蔡豈得無賜齊楚晋宋肯嘿然而已乎彼肯以為上世無功德乎以晋文之伯襄王藉其功而反正及請隧則曰王章也未有代德而有二王亦叔父之所惡也恵公於周平亦何有哉可知其說亦妄意也二説既不可然則孰賜之曰未嘗賜之也其何以然曰魯自為之也曰何以知之據經而知之也夫子曰天下有道禮樂征伐自天子出天下無道禮樂征伐自諸侯出自諸侯出盖十世希不失矣此聖人傷衰周之亂作春秋之本㫖也夫惟名分一不正禮樂征伐不出於天子故諸侯僣擬相仍冠屨倒置無所不至隠公六年書曰初獻六羽言於是始僣樂而踰諸侯之制也又春秋五十有三年始書禘八十有六年始書郊以見僣禮樂之有漸也其後乃乘大輅載弧韣設兩觀舞八佾並用天子禮樂其勢至此耳豈惟魯哉晋作六軍僣天子之軍也晋人曰以寡君之未禘祀僣天子之禮也甚者吳楚直僣稱王無所顧忌春秋魯史也書一魯如此以見諸侯皆然先儒不䆒事意直以魯之所行為他國之所先故有成王平王賜之之説以魯為受賜則晋之六軍禘祀亦賜之耶吳楚僣號亦賜之耶觀此决知二説之非而魯自為之也然説者往往據詩魯頌曰龍旂承祀六轡耳耳春秋匪懈享祀不忒皇皇后帝皇祖后稷以魯為合用盛禮也不知魯人安於僣擅非禮猥稱其君之功德惟恐不至若果魯之常禮何獨以頌僖公乎春秋書公子遂如楚乞師則僖公之畏楚甚矣而頌乃謂荆楚是懲春秋書公㑹齊侯等於淮以見僖公服楚之役而頌乃謂淮夷卒獲以叔段之凶惡不弟而詩人稱其洵美且仁其可信乎故史克之頌魯亦如曲沃人惟知私譽文姜之淫亂而詩稱其豈弟是人徒知有欒盈而不知有晋人徒知有張敖而不知有漢懐其私恩而忘其大義也魯之不朝不貢無請於周久矣而謂史克請如周而作頌可知序詩者之妄也故於序則以祀后帝后稷為盛於春秋則以行郊禘為僣聖人刪詩存魯頌而不削者亦如存叔段文姜之詩使後世有見其非矣非謂其言之公當也學者不知此理反捨春秋而言魯頌不已惑乎門例不同鄭康成曰王有五門臯庫雉應路是也諸侯有三門庫雉路是也後世遂以為定制然攷之經則不同天子當有六門諸侯惟有三門漢儒每以天子諸侯只降一等故天子五則諸侯三及攷之詩書爾雅則曰有畢門南門應門臯門正門質之王制未知孰是嘗即天子門例之制而參之夫謂之臯者逺也明最在外故曰臯庫門則有藏於此故也雉門者取其文明也應門則居此以應治也路門則取其大也此五門各有其義也然書又有畢門者言自此至彼而畢則路門之别名也周禮有中門者言居四門之中則雉之别名也爾雅又有正門者以其正朝所向則應門之别名也此不出五門之數若乃書又有南門説者以南門即應門謂王者於應門向明而治也據康王之誥自云王出在應門之内太保畢公率東西諸侯入應門左右則是王者見諸侯於應門而南門乃康王為太子始逆之門也不得以南門為應門可知若如所説則詩稱古公應門将将諸侯既有應門則春秋不當書新作南門以譏魯也或曰南門雉也雉文明之物而南明方故其義相通若然則春秋何以既書新作南門又書雉門及兩觀灾其名又不同乎由此以見天子五門之外又有南門不預後儒所計之數也或又以南門非正門之數不足以為重故畧之也又不然書逆王世子必於南門春秋譏諸侯不當作南門則其制甚非臣下可僣安得以為非正門之數乎若夫諸侯之門鄭氏以為庫雉路據詩曰乃立臯門乃立應門則古今為諸侯所建惟二門而已諸侯二門曰臯曰應此復何疑毛氏乃云古公作郭門以敵臯門作正門以敵應門謂諸侯不得有臯門應門也或者因其説則以為詩以天子之禮追言之非也攷綿詩召司空司徒立室家作廟社盡述古公為諸侯時之制曰古公亶父不追尊古公之號而避其公乃追易其門之號乎古無是理盖先儒惑於明堂位言魯之制曰庫門天子臯門雉門天子應門則以諸侯有庫雉無臯應也不知明堂皆漢儒不知禮者之説一篇全載僣亂之典不足信也據春秋於僖公書新作南門於定公書新作雉門及兩觀是南門雉門兩觀皆非魯所宜今僣天子之制爾曰作者皆為不當作也若魯有其制春秋不書作矣至庫門亦諸侯所無檀弓曰魯荘公之䘮既葬而絰不入庫門家語謂衛荘公之朝市孔子曰繹之於庫門内失之矣故魯有庫雉衛亦有庫門皆諸侯之僣世儒不察遂據此以為禮則非也彼鄭尤惑也其釋明堂例以諸侯三門為庫雉路至釋綿詩則又以為臯應路是自牴牾忘其前説耳且明堂位記魯人僣禮之盛然猶以魯惟有庫門雉門雖其名則非而未甞以為有三門也至鄭氏始増多之而又自戾其説嗚呼周禮散亡非惟得鄭氏而無補且得鄭氏而愈亂也三代忠質文二治有定體質文迭尚自帝王以來未之能易變而通之則其道久而無窮虞夏之質商周之文至矣記禮者載孔子之言唯文質兩端至若忠之一語不過曰夏道近人而忠又曰周人近人而忠初未嘗明著忠敬文之説後世乃析而三之何也謂三代所尚之政不同者誰歟漢儒之説也董仲舒曰夏尚忠商尚質周尚文所繼之政當用此也漢繼大亂之後宜少損周之文用夏之忠司馬遷亦曰夏之政忠忠之敝小人以野故商人承之以敬敬之敝小人以鬼故周人承之以文文之敝小人以僿莫若以忠周秦之間可謂文弊矣自三代而後學者皆有是説必欲忠質文之迭救而後天下可以無弊盖自仲舒唱之也然求之詩書易春秋之經驗之孔孟之言則無是説也春秋之時周衰盛矣夫子乃曰周監於二代郁郁乎文哉吾從周何漢儒厭周文之弊而夫子反從之何夫子不患小人之僿而漢儒乃孜孜言之嗚呼陋哉漢儒之見殊戾聖人之㫖後世𫝊非習誤莫有為之辨亦可怪也夫文者何古先聖王經世之道億萬載不易之理也粤自上古洪荒朴野之俗未革則君臣上下無别人倫不明斯人禽獸草木如也聖人有憂之乃為之綱紀法度典章禮樂以維持之使父子君臣夫婦兄弟莫不得其正故謂之文文也者所以使萬物各有條理而不相瀆亂也家恃以齊國恃以治天下恃以平天下一日而無文則人倫廢天理亡不可違也是以書稱堯為文思舜為文明禹為文命夫子於堯亦曰煥乎其有文章謂至此而後變朴而為文物大中之道始建也由堯舜至於三代天下日向於文盖民之巧偽日滋先王防閑之制俱宻而文日以盛故夏商之文比堯舜為有間周之文比夏商為尤盛上古捭豚燔黍君民並耕之俗至堯舜而始革堯禹茅茨土階卑宮土墻之制至周人而始變是以孔子以周視二代獨郁郁也二代非不日尚於文而不若周之大備由後世觀之謂之忠謂之敬可也若曰夏政尚忠商政尚敬則非矣夫文果離於忠與敬乎忠與敬義可離於文乎記曰虞夏之文不勝其質商周之質不勝其文此言之三代之文質故有以相勝耳非有所偏尚也觀周之治文武成康之世上下輯睦頥指如意則文之振也穆昭而下王室日衰下多離叛則文之不振也是以序詩者以君臣上下動無禮文為幽王之亂以天下蕩蕩無綱紀文章為厲王之亂使周衰斯文不廢則冠昏享射之制存而乖争之俗不作矣朝覲聘問之禮存而倔強之國不聞矣國家宮室車旂衣服之有等則僣擬之風不起矣號令賞罰政令紀律之既行則統御之權不失矣豈至於亂乎所以聖人必欲從周者以為救有紛者莫若用文之為先也柰何反以三代各有所尚而周衰為文之弊耶如漢儒之説是堯舜之時天下已文矣夏商乃厭文之弊而從上古之質至周復以文救夏商之弊且秦燔典籍漢復詩書豈非以文之無益耶尤而效之謂之救弊其説不可長也盖在意以周之文為煩文末莭之紛紛故過為此説爾韓退之唐之人傑也疑若可與語此其作本政乃曰周之政文既弊也後世不知其弊其有作者黜文文兒而忠質則道之行其庶乎盖亦習聞此陋説也退之如此他尚何望不為之辨則帝王經世之道不明於天下深失夫子從周之意漢儒誤周之説吾於此亦未知其所止也儒行立言儒行一篇孔訓也然伊川程氏謂曰此篇全無義理後世逰説之士所為診天之語然乎否乎儒行非孔子言也盖戰國時豪士所以文髙世之節耳其條雖十有五然文意重復要其歸不過三數塗而已平居自重謹能處貧約臨事有守奪發不顧忌不茍合以至視利禄如土芥容人愛士以身徇朋友其餘亦常事考一篇之内雖時與聖人合而稱説多過其施於父子兄弟夫婦若國若家若天下美之道則無見矣聖人之行如斯而已乎或曰哀公輕儒孔子有為而言也曰将自誇大以揺其君豈所謂孔子哉李泰伯大射之義古人以所射之禮謂之侯不必過求其義漢儒作射義乃曰射侯者射為諸侯之射而侯取諸侯之義鄭康成因之注周官司裘曰謂之侯者天子中之則能服諸侯諸侯以下中之則得為諸侯此説誠可信乎自漢儒以私見臆説作射義曰射侯者射為諸侯也其於古人所射之禮謂之侯者其義已失之矣及鄭康成因之注周官司裘曰謂之侯者天子中之則能服諸侯諸侯以下中之則得為諸侯此説抑又惑焉夫天子之於諸侯其初皆其兄弟子姪其後繼世或祖父之列其在異姓必功德之後或甥舅之國天子待之不曰伯父叔父則曰伯舅叔舅必親之敬之賓之友之無敢失禮而後責其臣順豈有諸侯無事以禮物以射諸侯之義不亦禽獸之仇讎也哉如此則待之不以禮臨之不以仁能使諸侯之服乎周萇𢎞嘗以諸侯不朝乃設貍首射之貍者不來也欲以警不來者晋人怒殺萇𢎞而愈不服夫供一射不來之獸已犯諸侯之怒如此况天下諸侯無忠邪無賢否王室不禮待之無故開嫌召釁寓意所射之物何為乎且天子中之則能服諸侯天子固服諸侯矣何待一射之中若其不中則不能服之可乎天子建諸侯必有大功德使之世嗣今乃謂諸侯中之則得為諸侯愈無理也豈有無他功德但大射一中便得列嗣乎鄭氏之陋説盖出於射義曰射中則得為諸侯不中則不得為諸侯此言固非矣然其意盖謂古者諸侯貢士於天子天子使射中者得與於祭則君有慶而益地不中不與於祭則君有責而削地得為諸侯者以有慶也不得為諸侯者以有責也鄭氏因其説直云諸侯以下射中則得為諸侯尤不可也昔晋侯齊侯相與投壷晋人謂寡君中此則為諸侯師齊人謂寡君中此則與君代興皆中之識者謂晋人失辭晋固為諸侯師矣何待中壷為雋耶自是齊人背晋干戈相尋投壷之語有以啟之爾以此知古人射侯必不取諸侯之義天子諸侯射之必不如鄭氏所説明矣然射義一篇非援古人之辭其自言者皆非也射者特一藝爾人事之最末也稷契伊周未聞其能射也羿逢蒙由基之徒能射者果何若人乎今而曰諸侯嵗貢士於天子天子試之則謹其容體比於禮其莭比於樂中多者得與於祭不然不得與夫禮樂不有於内而徒行於弓矢之間吾見貌堯舜而心跖桀者不可辨也古之取士者未嘗不聼其言觀其行而試其功而後不失人未聞以射為先也惟周禮鄉大夫獻賢能之書退而以鄉射五物詢衆庶此雖漢儒臆説而猶在賓興三物之禮也然所以啟鄭氏之妄談二禮之由禮或曰古者不以射禮取士何謂侯以明之乎曰此二禮所據以為説者此也舜曰欽四隣庶頑䜛説若不在時侯以明之撻以記之書用識哉欲並生哉舜為此言豈為當世士君子發哉若夫四隣之臣世之小人其有不在庶頑之重罪者則猶可揃拭而勿弃之侯以明其義撻以記其過又書其非庶㡬與之並生舜為侯與撻同施是直小人者爾烏有賢者但試以射又撻其過耶據此而謂古者選士之法則撻以記之亦舜取士之意乎知此漢儒之説謬妄尤可知也五運之説六天五運出於漢儒不經之語前此未之聞也然六天之説未㡬而攻之者衆五運之説乃至於牢不可破何也今試攷之則有曰五行相勝者有曰五行相生者夫相勝相生義各有主未知可以辨否事有出於後世不經之説百代莫之能明者六天五運之類是也六天之説出於䜟緯自鄭康成據以為禮由是世咸宗之五運之説出於鄒衍隂陽家自燕秦采其術由是以為常經嗟夫大道無𫝊周禮不作至使䜟緯之學隂陽家者流得以爚亂彛典豈非學古議禮之失歟然六天之説王肅長孫無忌之徒固能力攻之矣而五運之陋自漢張蒼公孫𢎞之徒皆用其説猶無足怪而名儒賈誼司馬遷劉歆之徒咸附益之宜其根深而不可拔牢固而不可破也今攻其説有二賈誼公孫𢎞倪寛司馬遷之徒則本五行相勝之説向歆父子則以五行相生為論言相勝則以前世帝王皆後代勝前代帝王皆後代勝前代火能滅金即以火滅金金能尅木即以金伐木夫帝王之有天下豈以一人之私求勝於前代也哉堯舜禹之相遜盖不得已而處大位湯武之征伐亦不得已而應天命皆無一毫私意今乃推五行之相勝是以末代争奪之事而為帝王之舉豈不謬哉故漢儒以周當火德秦人以為火乃用水徳以勝之更名河曰德水秦人自以為水漢儒必欲以土勝之至太初遂更順黄德夫秦之暴虐専以干戈魚肉諸侯而後能以并海内秦人推五行相勝盖有以也漢髙之興雖以征伐然討定暴亂亦秦民湯武也漢儒賈誼司馬遷不能述漢興撥亂之功反用秦人相勝之説此何理哉逮至向歆又論五行之相生曰帝出乎震故伏羲始受木德木生火故炎帝以火繼之火生土故黄帝以土繼之由是相推而至於漢是謂以母傳子也然亦甚不可也既以黄帝為土德少昊其子也何得又自為金既以帝嚳為木德帝堯其子也何得又自為火父子之間乃自異乎若是則商周𫝊數十世一世為一德不㡬紛亂之甚耶秦人雖不德然得正統之傳今乃以漢德之火上承周德之木置秦於閏位比之共工其可乎盖二説並行各務伸其己見為相勝之説則不得不變周之木為火為相生之説則不得不置秦於閏位夫詩述堯舜三王之事詳矣未甞見其自謂五德何尚報德何施今因一隂陽家之説甲以為相勝乙以為相生妄相配合初不由前代帝王所自為嗚呼何誤世之甚耶且一漢之興都見神母之祥則以為火德驗黄龍之見則以為土德攷河决之符則以為水德三者宜何從乎黄龍見於成紀文帝以公孫𢎞之言為驗乃詘張蒼之議不知臣與蒼俱妄也特幸一言之中爾文帝初不從賈誼易服色之言及聞公孫𢎞之説則喜之未可為不惑者班固譏賈誼請色尚黄其術已踈而已乃依歆向相生之説以文帝之賢班生之學終不免於此吾是知鄒子不經之言後世雖孟子復生不可攻而去之也羣書考索别集卷八
