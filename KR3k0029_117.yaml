body:
  text: 羣書考索後集卷五十一宋章如愚編民門風俗古者一道德以同俗齊七政以防民自五家之比至於五州之鄉使之相保相受而又以本俗六安萬民聨兄弟以同其恩聨師儒朋友以同其義先王尚以謂民之觀聽志慮不可不一而上之好惡不可不示也故大司徒以五禮六樂教民而在上無異教掌道王之德意志慮而在上無異政合萬民以通其財以同其量度而在下無異尚除其怨惡同其好惡而在下無異情而訓萬民又道四方之政事與其上下之志正歲則布而訓四方而觀新物是以人無異心而天下如一家則其風俗可謂同矣自秦以來貴變詐而務峻刻使風俗薄惡人物囂頑德色誶語之風歷數十年而不改天下之風俗嘗趨於薄矣西漢髙祖之興改制易俗而蕭曹又以寬厚清淨為天下先孝文復恭儉道德於其上而萬石君東陽侯張廷尉相與崇長者之風黜憸利之習河南守吳公蜀守文公皆謹身率先以移河南巴蜀之俗日歸於厚自武帝以來好大喜功而吾丘壽王嚴安朱買臣之徒皆以辨説侍左右而張騫輩又大言無當自詭而天下之風俗嘗侈於虛矣孝宣中興總核名實吏上計簿預為欺謾以避其謀者必使御史按察其非實用法或持巧心增辭飾非者則詔二千石察而勿用是以文學法理之咸精其能吏稱其職民安其業於是天下之風俗復歸於實魏晉以來稍慕通達天下賤守節而貴清虛竹林之遊輕滅禮法士大夫爭慕效之而王衍之流又得以浮誕為美弛業廢職而天下之風俗又趨於浮矣歷江左數百餘年而猶有存者蓋至於唐太宗約己治人開文學館以崇儒重道而房玄齡收采人物杜如晦參謀軍事戴胄之執法必歸於是魏徵之諌諍必糾其非刑罰之言黜而不用而仁義之説堅守力行是以官有常職田有常産家給人足而放僻邪侈之行不作貞觀之時不三四年而遂致太平外户不閉行旅不賫糧斷獄之數嵗止二十九於是天下風俗復歸於醇也宋以深仁厚澤涵養天下至於天聖明道之間百姓皆自衣食以樂其生戴白之老安坐以嬉童兒幼稚什伯為羣相與鼓舞於里巷之間仁宗恭已無為其上而執政大臣實得以參可否晏世無以異於漢文景之盛時民生及識五代之亂者益於是與世相忘矣故蘇公軾有曰生於野者不願為公侯藏於家者且多於府庫則民俗為可知天下爭自濯磨以通經學古為高以救時行道為賢以犯顔敢諫為忠則士大夫之風俗為可知矣至上書闕下則曰仁祖德澤在人風俗知義社稷久安終必賴之井田代田限田均田永業口分世業籍田井田之法自黃帝而逮於周其法始大備鄉遂之間井牧有法始於九夫之井而井方一里終於四縣之都而都廣一同從之有溝洫橫之有甽澮大司徒之造都鄙辨其不易再易之有差遂人之辨郊野别其上地中地下地之等其受田則由百畝而差之至於二百畝其列等則由上農夫而辨之至下農夫疆里有常度分畫有常數地利足以食人人力足以闢地至商鞅遂廢井田開阡陌收功一時而後世不勝其弊其後不可之制起於趙過一畝三畝嵗代其處善田者令學養苗之狀亡牛者教以人耕之法命卒於官儒教民於邊郡此代田之制而漢武行之也限田之議出於石苞謂王公以國為家京城宜不復有田宅今可限之自國王公侯以至於丁男丁女皆有降差此限田之制而晉武行之均田之法男子四十畝婦人止二十畝户絶者以為公田刺史十五頃縣令以上六頃其田則更代相付此李安世之議而行於後魏孝文之時永業之制男子十五皆有田畝婦人十五皆有營業又令男子十八而受田六十而免役此北齊孝成之制而行之於清河之時也後周伯政之初置司均之官掌田里之政視户口之衆寡而有五畝四畝三畝之宅有家者畝百四十有丁者止百畝是之謂同均至貞觀之時則有口分出業唐授田之制有丁者人一頃其八十畝為口分二十畝為永業二百四十步為畝百畝為田田多可以足其人者為寬鄉少者為狹鄉授田減寬鄉之半凡庶人徙鄉及貧無以葬者得賣世業自狹鄉而徙寬鄉者得并賣口分田已賣者不復授凡授田者嵗輸粟稻謂之租輸絹綾謂之調用人之力嵗二十日不役者為絹三尺謂之庸此唐制之大略也周世宗嘗夜見唐元稹均田圖慨然嘆曰此致治之本也王者之政自此始乃頒其圖於天下期以一嵗均之此亦有志於古也雖然又有籍田之禮焉仁宗皇帝明道二年二月十有一日帥羣臣耕於朝陽門千畝之甸禮也先時一日備祝號太史侍祗命大臣虔告於皇天上帝宿乾元殿及日至乘耕根車盛服而出僕臣以象輅載耒耜陳於仗前遂即於壇壇髙九尺其陛有四各四十步堊之以青二壝寬博取容御耕之位天子三推禮儀使張士遜以禮畢奏天顔穆然夔夔祗肅計耦耕事訖十一跬而止既復大次則百僚師師稱慶在所黻座端冕駕言旋歸翌日執爵太極殿公卿羣有司咸在勞酒已而肆大賚於天下命士遜秉筆記之四方萬里獲覩二帝三王之盛天地神祗亦罔不懌其纍洽之閎休無窮之偉觀不可尚矣粵自周宣之後棄禮而不能行逮於漢文綿蕞紹復武昭繼承厥有巨定算田上林之事晉泰始躬耕潘嶽作賦貞觀籍田文本頌之自晉至唐亦皆循之直美觀而已惟太宗皇帝始躬耕之匪我仁祖乃罔攸聞嗚呼盛哉井田周禮於都鄙言易不易者地事也於鄉言上地中地下地者地利也於遂言田萊者地力也司馬之令賦則欲知其地之厚薄食之多寡故亦以地利言之其實一也惟遂人上地有萊五十畝為異於鄉與都鄙以鄉之地狹於遂而都鄙之地又輕於遂故也春秋楚蒍掩書土田之事井衍牧沃隰臯大率二牧而當一井漢趙過教民治田一畝三甽嵗易其處謂之代田與一易再易之意同也然周禮上地家七人而王制孟子則上食九人次以八人中地家六人而王制孟子下食亦五人者蓋合禹貢之田上地至下下凡九等蒍掩别楚地自上田以至衍沃亦九等而周禮所言上中下地三等而已孟子王制舉上中而不及下周禮舉中地而不及上下耳書曰濬畎澮距川詩曰惟禹甸之語曰禹盡力乎溝洫春秋傳曰少康有田一成有衆一旅則井田溝洫之制尚矣周禮小司徒乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事以令貢賦遂人凡野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有塗千夫有澮澮上有道萬夫有川川上有路以達於畿考工記匠人為溝洫廣尺深尺謂之甽田首倍之廣二尺深二尺謂之溝九夫為井井間廣四尺深四尺謂之遂方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮司馬法六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為成成十為通通十為終終十為同鄭康成以小司徒為邑甸縣都之别而其名與采邑同匠人有甽遂溝洫澮之制而多寡與遂人異故言采地制井田鄉遂公邑制溝洫又謂畿內用夏貢邦國用商助然先王之為井田也使所飲同井所食同田所居同㕓所服同事出入相友守望相助疾病相扶持鄉遂六軍之所寓豈各授之田而不為之井法乎大田之詩言曾孫來止而歌雨我公田遂及我私噫嘻之詩言春秋夏祈榖于上帝而歌駿發爾私終三十里亦服爾耕十千維耦周官遂人言興鋤旅師有鋤粟此鄉遂井田之事也鄭氏以鄉遂無井田而又以遂人之法釋詩以一井之法釋旅師自是戾也孟子曰鄉田同井請野九一而助則鄉遂之為井田可知矣小司徒九夫為井匠人亦九夫為井井間有溝自井地言之也遂人十夫有溝兼溝塗而言之也然遂人百夫有洫而匠人十里為成成間有洫則九百夫之地遂人千夫有澮而匠人百里為同同間有澮則九萬夫之地其不同何邪成間有洫非一成之地包以一洫而已謂其間有洫也同間有澮非一同之地包以一澮而已謂其間有澮也成與同地之廣者也洫與澮溝之大者也於成舉洫於同舉澮亦其大略云爾春秋蒍掩為政井衍沃牧而司徒井牧田野則取名於縣都而已觀二百一十國謂之州五黨亦謂之州萬二千五百家謂之遂一夫之間亦謂之遂王畿謂之縣五鄙亦謂之縣縣都之名豈特施於采邑哉然則鄉之井地謂之縣都可也水利書曰濬畎澮距川語曰禹盡力乎溝洫遂人夫間有遂遂上有徑十夫有溝百夫有洫千夫有澮萬夫有川匠人廣尺深尺謂之甽田首倍之廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮專達於川雍氏溝瀆澮池之禁稻人掌稼下地以瀦蓄水以防止水以溝蕩水以遂均水以列舍水以澮㵼水以溝洫之於田野可決而決則無水溢之害可塞而塞則無旱乾之患先王之時通九州陂九澤溝洫絡脈布於天下則無適而無非水利也及井田廢而阡陌作於是魏史起引漳水以溉鄴田而河內之民以富漢嚴熊穿洛以為隴首渠而井渠之生自此始番係穿渠引汾榖從渭上而底柱之險可毋復漕召信臣於南陽造鉗盧陂用廣灌溉後漢杜詩復修其業顯宗王景按山海經河渠書而使修汴渠張純穿陽渠引洛水為漕而百姓得其利魏賈逵之為豫州也通運渠二百餘所故謂之賈侯渠鄭渾之為沛郡也興陂碣開稻田嵗增租入故謂之鄭陂渠云宋開寶中以關河為惠民河自新鄭蔡水合貫京師歷陳潁達夀春以通淮右以五丈河為廣濟河自都城歷漕濟以及於鄆此河洛之水利也鄭國鑿涇水以溉田於是關中為沃野秦以富強名曰鄭國渠倪寬為左內史穿六輔渠以溉鄭國髙卬之田故名曰六輔渠白公引涇水以注渭溉田四千餘頃因名曰白渠鄭當時引渭穿渠漕關東粟而渠下之民頗得以溉故謂之鄭當時漕渠班孟堅賦西都首陳源灌溉之利而盛稱鄭白渠之沃此關中之水利也鄧艾自陳潁以東至於夀春開廣漕渠東南有事泛舟而下於江淮資食遂有儲而無水害唐杜亞之在淮南楊州二十四陂輒復湮塞亞乃浚蜀岡渠疏受敬陂起隄貫城以貫大舟李吉父築平津堰以泄有餘防不足而漕流遂通築富人固本二塘而溉田萬頃漢王景修叔孫敖之芍陂而境內豐治劉義欣引芍陂之舊水而由是豐稔李襲引雷陂水以溉田而百姓獲其利此皆淮之水利也韋丹為江西觀察築隄捍江實以疏漲凡為陂塘五百餘所溉田萬有二千頃唐宣宗讀元和實録見丹政事卓然他日與宰相語元和時治民孰為第一周墀對曰韋丹有大功德被於八州乃詔刻功於碑此江之水利也馬臻之鑑湖則見於會稽孟簡之孟瀆則見於常州張鬭之新豐塘則見於晉陵此皆浙之水利也李冰之金離堆則見於蜀者也趙昌之作常稔塘則見於泉之晉江者也薊之漁陽則有平冦津傍海穿渠以避海難薑師度傳云師度之刺史易州也並海鑿渠以通餉路此海之水利也故太史公曰余南登廬山觀禹疏九江遂至於會稽上姑蘇望五湖東窺洛汭大邳迎河行淮泗濟漯洛渠西瞻蜀之岷山及離雒北自龍門至於朔方曰甚哉水之為利害也余從負薪塞宣房悲瓠子之時而作河渠書漢都水之職屬之水衡郡國都水長丞則領於司農外是則有所謂渭水司空有所謂池監有所謂河隄使者有所謂陂官湖官浦官雲夢官通水之渠非一所領水之官非一人則亦異乎後世文具之政多矣農田舜戒十二牧曰食哉惟時商飭諸侯嵗事來辟亦曰稼穡匪解先王之治天下未始不以農為先故井田之法至周大備始於九夫之井而井方一里終於四縣之都而都廣一同從之有溝洫橫之有甽澮大司徒之造都鄙辨其不易一易再易之有差遂人之辨郊野别其上地中地下地之有等其受田則由百畝而差之至於二百畝其列等則由上農夫而辨之至於下農夫修其稼政簡其稼器治其稼穡勸其耕耨器不足則有合耦之法力不足則有移用之法宅不毛者有里布田不耕者出屋粟先王務農之法如此秦任商鞅以政晉地狹人貧秦地廣人富於是誘三晉之人使之力耕故廢井田開阡陌任其所耕不限少多井田之制自此遂壞漢武帝時仲舒請限民名田以塞兼并而卒不果行其後趙過代田之䇿一畝三甽嵗代其處至於師丹限田之議欲使民無過至三十頃丁傅用事而其議遂格至晉石苞乃有限田之法而晉武帝行之若均田之法出於李安世之議而行於後魏孝文之時永業之制如此齊孝成之制而行於清河之時也後周之初置司均之官掌田里之政唐貞觀時則有口分世業授田之制成丁者人一頃其八十畝為口分二十畝為永業田多者為寬鄉田少者為狹鄉狹鄉授田減寬鄉之半凡徙鄉則自賣世業自狹鄉而徙寬鄉者併賣口分歲輸粟稻謂之租輸綾絹謂之調用人之力嵗以二十日不役者日為絹三尺謂之庸此唐制之大略也明道三年仁宗嘗躬耕於朝陽門以勸天下計耦耕事訖十一跬而止上言謂天下田疇半為形勢所占者於是又定限田之法荒政周之盛時頌詩以告太平而豐年康年之歌更唱迭和竊意當時天人叶應和氣充塞人民享有年之樂而慮不勤於荒政也然周官一書作於太平極盛之時而乃拳拳於荒政之目官聨分列申命惟謹是故以荒政十二聚萬民則司徒職之巡國及野以賙萬民之艱危則鄉師掌之以至遺人之掌委積廪人之移民就粟曽不敢緩夫以有年之時而先為凶年之備此周家之逺慮而非茍安於目前者所可及也春秋以來秦飢乞糴於晉魯飢乞糴於齊嵗不登則使者轍環於鄰國平時之所備者何在哉魏李悝制平糴之法漢耿夀昌立常平之制隋長孫平獻義倉之畫皆公斂散之權以為凶荒之備三代而下之良法也今日之論荒政固將為異時之備而非求為目前之計也則愚敢以是二者為預備之䇿宋朝開基之初藝祖首復義倉於五代廢弛之餘太宗繼復常平於淳化之後以至因豐稔以廣糴置之近倉且以常參官典領焉則又太宗之制也聖王立法有加無已廣惠之有倉廣濟之有倉此又慶厯嘉祐之法也是以蓄積有素而凶年之不告豈非有先備之具乎雖然今日為荒凶之備固無以異於祖宗之時義倉之目常平之額遍州縣而有之而和糴之法且命戒臣僚廣糴以欲其有餘所入之數不知其幾千百石也夫以國家為荒政之備亦既詳矣而斯民一遇水旱之變乃嗸然有不給之憂何哉豈非儲蓄之雖衆而賙給之實或寡士大夫未能仰承上意之過歟明道中遣使賑恤江淮而范仲淹實當其選所至賑乏絶而不遺寶元中遣使賑恤蜀道而韓琦實預其行故斯時不見其不足吁必得若人者而用之則實惠足以及民而荒政非所慮矣羣書考索後集卷五十一
