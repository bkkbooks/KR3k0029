body:
  text: 羣書考索卷二十宋章如愚撰文章門賦類班固曰不歌而誦謂之賦登髙能賦可以為大夫古者諸侯卿大夫交接鄰國以微言相感揖遜之時必稱詩以喻其志蓋以别賢不肖而觀盛衰焉春秋之時周衰道微聘問詠歌不行於列國學詩之士逸在布衣而賢人失志之賦作矣大儒孫卿及楚臣屈原離騷憂國皆作賦以風咸有惻隱古詩之義其後宋玉唐勒鄭興枚乘司馬相如下及揚子雲競為侈麗閎衍之辭設其風諭之義是以揚子悔之曰詩人之賦麗以則辭人之賦麗以淫如孔氏之門用賦則賈誼登堂相如入室矣如其不用何兩都賦序曰賦者古詩之流也昔成康沒而頌聲寖王澤竭而詩不作漢至武帝崇禮官致文章故言語侍從之臣若司馬相如吾丘夀王東方朔枚臯王褒劉向之屬朝夕論思日月獻納而公卿大臣倪寬孔臧董仲舒劉德蕭望之等時時間作或以抒下情而通諷諭或以宣上德而盡忠孝亦雅頌之亞也故孝成之世論而録之蓋奏議者千有餘篇而後大漢之文章炳焉與三代同風戰國有荀卿子之賦其後則離騷興矣離騷屈原作也屈與楚同姓原仕於懷王為三閭大夫同列上官靳尚妬害其能共譖毁之王乃流屈原原作離騷經太史遷曰屈平正道事君讒人間之信而被謗離騷之作蓋自怨生也國風好色而不淫小雅怨誹而不亂離騷可謂兼之矣上稱帝嚳下道齊桓中述湯武以刺世事明道德之廣崇治道之條貫其文約其辭微其志潔其行亷平雖放流眷顧楚國繫心懷王冀幸君之一悟俗之一改也其存君興國一篇之中三致意焉然終無可奈何正詭俗而為九歌四首又二首文選曰辨窮愁而為九章一首涉江又曰原於江南之野復作九章言已所陳忠信之道甚明著也其後作懷沙賦於是懷石投汨羅而死屈原既死之後宋玉有九辨五首文選序曰辨者變也九者陽之數也道之紀綱也宋玉屈原弟子閔其師忠而放逐故作九辨以述其志玉又有髙唐賦蓋假設其事諷諫淫惑也史遷曰宋玉唐勒景差之徒皆好辭而以賦見稱然皆祖屈原之意從容辭令終莫敢直諫漢賈誼謫居長沙意不自得及渡湘水為賦以弔屈原賈誼長沙傅三年有鵩入賈生舍止於坐隅誼乃為鵩賦以自廣太史公曰余適長沙觀屈原所自沈淵未嘗不垂涕想見其為人及見賈生弔之又怪屈原以彼其材遊諸侯何國不容而自令若是讀鵩鳥賦同死生輕去就又爽然自失矣司馬相如客遊梁著子虛之賦武帝讀子虛賦曰獨不得與此人同時哉楊得意因薦之上召相如曰此諸侯之事請為天子遊獵賦故藉子虛烏有先生亡是公三人為辭以推天子諸侯之苑囿其卒章歸於節儉因以風諫賦奏天子以為郎嘗從上至長楊宫獵還過宜春苑因奏賦以哀二世失行上既美子虛之事相如見上好仙乃奏大人賦天子大恱飄飄有凌雲氣遊天地之間意本傳枚臯不通經術為賦頌從幸甘泉雍河東巡狩封泰山塞決河宣房遊觀三輔離宫館臨山澤弋獵射馭狗馬蹴鞠刻鏤上有所感之使賦之為文疾受詔輒成故所賦者多司馬相如善為文而遲故所作少而善於臯臯自言為賦不如相如又言為賦乃俳自悔類俳也其賦可讀者百二十篇其嫚戲不可讀者共數十篇而班史皆不載也元帝時劉向傷周堪張猛之死乃著疾讒摘要救危及世頌凡八篇依興古事悼已及同類也稽古編云劉向有九嘆王褒有九懷傳皆不載也揚雄好辭賦先是相如作賦甚麗雄每作賦擬以為式又怪屈原文過相如至不容作離騷自投江而死悲其文遇不遇命也何必湛身哉乃托離騷文而反之自岷山投諸江流以弔屈原名曰反離騷又旁離騷作重一篇曰廣騷又旁惜誦以下至懷沙一卷名曰畔牢愁畔牢廣騷文不多載獨載反離騷成帝時雄從上甘泉還奏甘泉賦以風其奢泰是時趙昭儀方大幸每上甘泉常法從在屬車間豹尾中故雄甚言車騎之衆參麗之駕非所以感動天地又言屏玉女却虙妃以微戒齋宿之事賦成奏之天子異焉其後祭后土既祭陟西嶽以望八荒迹商周之墟而眇然以思唐虞之風雄以為臨川羡魚不如退而結網還上河東賦以勸其後從校獵雄以為昔二帝三王宫館臺榭沼池苑囿林麓藪澤財足以奉郊廟御賓客充庖厨而己不奪百姓膏腴之地因奏校獵賦以諷明年上令發民捕虎豹之屬輸長楊射熊館大誇胡人以多禽獸雄從還上長楊賦藉翰林以為主人子墨為客卿以風至其晚也雄則曰賦者將以風也必推類而言極靡麗之辭閎侈巨衍競於使人不能加也乃歸於正然覽者已過矣又頗似俳優淳于髠優孟之徒非賢人君子詩賦之正於是下不復為本傳後漢光武時杜篤以關中表裏山河不宜改營洛邑遂效相如揚雄作論都賦以諷班孟堅作兩都賦西都之賦其意蓋敘函谷終南之險洪河涇渭之川商洛鄠杜之饒未央建章之麗士農工商各得其所而肇造之業在是也東都之賦其意蓋序土中平夷帶河泝洛靈臺明堂統和天人辟雍海流道德之富而東都中興之業在是也二賦見文選安帝時天下太平日久自王侯以下莫不踰侈張衡乃擬班固兩都作二京賦因以諷諫十年乃成二賦見文選又有南都賦南陽郡也論其地勢則武闕桐柏為之險其川流則滄浪漢淮為之帶山澤原野之利宫室園廬之盛賦見文選順帝時王逸以楚辭章句行於世其賦誄書論及雜文凡二十篇稽古編云王逸有九思傳不載其子文考作靈光殿賦其意蓋嘆西都未央建章之俱壞而靈光獨存蓋魯共王所作也其後蔡雍亦為此賦及見此作而輟賦見文選東漢之季有邊遜能屬文作章華賦雖多淫麗之詞而終之以正亦如相如之諷也其意蓋取楚靈王遊雲夢之澤顧左史倚相曰盛哉斯樂可以遺老也遂作章臺伍舉知夫陳蔡之將生謀也二國先為楚滅乃作斯賦以風之而遜之賦蓋取此焉文選無晉左思作三都賦紀吳蜀魏之舊事也其紀蜀也不獨見於筇竹菌桂之鬱茂犀象孔翠之馳翔至於劎閣石門之險華容崑崙之要皆紀焉其紀吳也不特夫婺女軫翼之次草木珍賂之小至於武昌建業之盛衡山洞庭之盛皆紀焉及其賦詠魏之鋪張夸大尤有吳蜀之所不足者故極陳中土之美不特紀夫苑囿陂池之勝而山林水澤皆載焉不特紀夫草木蟲魚之變而土壤原隰皆載焉不特備其宫室之麗而鑒茅茨於陶唐察卑宫於夏禹其義在焉不特備其民物之庶而虞夏之遺人而先王之桑梓其意在焉太沖之賦三都以吳蜀遞相頓折而魏都制度以太沖英俊之才猶不能自盡其意至皇甫謐乃發其意之所欲言之未盡者而再序其事潘安仁名嶽晉太始中人也有籍田有射雉有西征有秋興有間居有懷舊有笙其賦籍田也則以世祖躬籍于千畝而作也其賦射雉也則以琅琊之俗善射講肄之餘暇而習媒翳之事遂樂而賦之也其賦西征也則述行歷所經人物山水而載之也其賦秋興也則言萬物成就感秋而興此也其賦間居也則取於禮篇不知世事間居靜坐之意也其賦懷舊也謂思於親舊而賦也其賦笙也以太簇之氣奏物而生也然皆紀其事而其風諷之意殆不及司馬遷揚雄輩也陸機字士衡心識文體作文賦其意蓋以放言遣辭良多變矣雖好惡可得而言每自屬文尤見其情常患意不稱文物不逮意故作賦以述先士之盛藻因論作文利害之所由可謂曲盡其妙也左思三都賦左思字太沖造齊都賦一年乃成復欲賦三都乃詣張載訪岷邛之事締思十年門庭藩溷皆著筆紙遇得句即疏之自以所見不博求為祕書郎及賦成思自以其作不謝班張恐以人廢言皇甫謐有髙譽思造而示之謐稱善為其賦序張載為注荀卿禮賦爰有大物非絲非帛文理成章非日非月為天下明生者以夀死者以葬城郭以固三軍以強粹而王駮而霸無一焉而亡臣愚不識敢請之王王曰此夫文而不采者與簡然易知而致其理者與君子所敬而小人所違者與性不得則若禽獸性得之則甚雅似者與匹夫隆之則為聖人諸侯隆之則一四海者與致明而約甚順而體請歸之禮知賦皇天隆物以示下民或厚或薄帝不齊均桀紂以亂湯武以賢湣湣淑淑皇皇穆穆周流四海曽不崇日君子以修跖以空室大參乎天精微而無形仁義以正事業以成可以禁暴足窮百姓待之而後寧泰臣愚不識願問其名曰此夫安寬平而危險隘者耶修潔之為親而雜汙之為狄者耶甚深藏而外勝敵者耶法禹舜而不能掩迹者耶行為動靜待之而後適者耶血氣之精也志意之榮也百姓待之而後寧也天下待之而後平也明達純粹而無疵也夫是之謂君子之知雲賦有物於此居則周靜致下動則綦髙以巨圓者中規方者中矩大參天地德厚堯禹精微乎毫毛而充盈乎大宇意兮其極之逺也欚兮其相逐而反也卭卭乎天下以咸蹇也德厚而不損五采備而成文往來惛憊通于大神出入甚極莫知其門天下失之則滅得之則存弟子不敏此之願陳君子設辭請則意之曰此夫大而不塞者與充盈大宇而不窕入却穴而不逼者與行逺疾速而不可託訊者與往來惛憊而不可為固塞者與暴至殺傷而不億忌者與功被天下而不私置者與託地而遊宇友風而子雨冬日作寒夏日作暑廣大精神請歸之雲蠶賦有物於此㒩㒩兮其狀屢化如神功被天下為萬世文禮樂以成貴賤以分養老長幼待之為而後成焉名號不美與暴為鄰功立而身廢事成而家敗棄其耆老收其後世人屬所利飛鳥所害臣愚而不識請占之五泰五泰占之曰此夫身女好而頭馬首者與屢化而不夀者與善壯而拙老者與有父母而無牝牡者與冬伏而夏遊食桑而吐絲前亂而後治夏生而惡暑喜溫而惡雨蛹以為母蟻以為父三俯三起事乃大已夫是之謂蠶理針賦有物於此生於山阜處於室堂無知無巧善治衣裳不盜不竊穿窬而行日夜合雜以成文章以能合從又善連衡下覆百姓上飾帝王功業甚博不見賢良時用則存不用則亡臣愚不識敢請之王王曰此夫始生巨其成功小者耶長其尾而鋭其剽者耶頭銛達而剽趙繚者耶一往一來結尾以為事無羽無翼反覆其極尾生而事起尾邅而事已簮以為父管以為母既以縫表又以連裏夫是之謂針理佹詩天下不治請陳佹詩天地易位四時易鄉列星殞墜旦暮晦盲幽暗登昭日月下藏公正無私反見縱橫志愛公利重樓疏堂無私罪人憼革二兵道德純備讒口將將仁人絀約敖暴擅強天下幽險恐失世英螭龍為蝘蜓鴟梟為鳳凰比干見刳孔子拘匡昭昭乎其知之明也郁郁乎其遇時之不詳也拂乎其欲禮義之大行也暗乎天下之晦盲也皓天不復憂無疆也千嵗必反古之常也弟子勉學天不忘也聖人拱手時幾將矣與愚亦疑願聞反辭其小歌也念彼逺方何其塞矣仁人詘約暴人衍矣忠臣危殆讒人般矣琁玉瑶珠弗知佩也雜布與綿弗知異也閭娵子奢莫之媒也嫫母刀父是之喜也以盲為明以聾為聰以危為安以吉為凶嗚呼上天曷維其同離騷離騷經者屈原之所作也屈原名平與楚同姓仕於懷王為三閭大夫三閭之職掌王族三姓曰昭屈景戰國策楚有昭奚恤元和姓纂云楚武王子瑕食采於屈因氏焉屈重屈蕩屈建屈平是其後又云景氏有景差至漢皆徙關中屈原序其譜屬率其賢良以厲國士入則與王圖議政事決定嫌疑出則監察羣下應對諸侯謀行職修王甚珍之同列上官大夫及用事臣靳尚妬害其能共譖毁之王疏屈原屈原被讒憂心煩亂不知所訴乃作離騷班固曰離猶遭也顔師古云擾動曰騷洪曰其謂之經蓋後世之士祖述其詞尊而名之耳非原本意也上述唐虞三后之制下序桀紂羿澆之敗冀君覺悟反於正道而還已也是時秦使張儀譎詐懷王令絶齊交又誘與俱會武關原諫懷王勿行不聽而往遂為所脅與之俱歸拘留不遣卒客死於秦而襄王立復用讒言遷屈原於江南屈原復作九歌天問九章逺遊卜居漁父等篇冀伸已志以悟君心而終不見省不忍見其宗國將遂危亡遂赴汩羅之淵自沈而死汨音覔長沙羅縣西北去縣三十里名為屈潭即屈原自沈處今屬潭州寧鄉縣淮南王曰國風好色而不淫小雅怨誹而不亂若離騷者可謂兼之矣又曰蟬蛻於濁穢之中以浮遊塵埃之外不獲世之滋垢皭然泥而不滓推此志也雖與日月爭光可也宋景文公曰離騷為詞賦之祖後人為之如至方不能加矩至圓不能過規矣按周禮太師掌六詩以教國子曰風曰賦曰比曰興曰雅曰頌而毛詩大序謂之六義蓋古今聲詩條理無出此者風則閭巷風土男女情思之詞雅則朝會宴享公卿大夫之作頌則鬼神宗廟祭祀歌舞之樂其所以分者皆以其篇章節奏之異而别之也賦則直陳之事比則取物為比興則託物興詞其所以分者又以其屬辭命意之不同而别之也誦詩者先辨乎此則三篇者若網在綱有條而不紊矣不特詩也楚人之辭亦以是而求之則其寓情草木託意男女以極遊觀之適者變風之流也其敘事陳情感今懷古以不忘乎君臣之義也變雅之類也至於語冥昏而越禮攄怨憤而失中則又風雅之再變矣其語祀神歌舞之盛則幾乎頌而其變也又有盛焉其為賦則如騷經首章之云也比則香草惡物之類也興則託物興詞初不取義如九歌沅芷澧蘭以興思公子而未敢言之屬也然詩之興多而比賦少騷則興少而比賦多要必辨此而後詞義可尋讀者不可以不察也九歌九歌者屈原之所作也昔楚南郢之邑沅湘之間其俗信鬼而好祀其祀必使巫覡作樂歌舞以娛神蠻荆陋俗詞既鄙俚而其隂陽人鬼之間又或不能無褻慢淫荒之雜原既放逐見而惑之故頗為更定其詞去其泰甚而又因彼事神之心以寄吾忠君愛國眷戀不忘之意是以其言雖若不能無嫌於燕昵而君子反有取焉此卷諸篇皆以事神不答而不能忘其敬愛比事君不合而不能忘其忠義尤足以見其懇切之意舊説失之今悉更定天問天問者屈原之所作也屈原放逐倣徨山澤見楚有先王之廟及公卿祠堂圖畫天地山川神靈琦瑋僪佹及古聖賢怪物行事因書其壁間而問之以泄憤悶楚人哀而惜之因共論述故其文藝不次序云爾此篇所問雖或怪妄然其理之可推事之可鑒者尚多有之而舊注之説徒以多識異聞為功不能得知其所以問之本意與今日所以對之明法至唐栁宗元始欲質以義理為之條對然亦學未聞道而誇多衒巧之意猶有雜乎其間以是讀之當使人不能無遺恨若補注之説則其厖雜不知所擇又愈甚焉今存其不可闕者而悉以義理正之庶讀者之有補云九章九章者屈原之所作也屈原既放思君念國隨事感觸輒形於聲後人輯之得其九章合為一卷非必出於一時之言也今考其詞大抵多直致一無潤色而惜往日悲回風又其臨絶之音以故顚倒重復倔強疏鹵尤憤悶而極悲哀讀之使人太息流涕而不能已董子有言為人君者不可以不知春秋前有讒而不見後有賊而不知嗚呼豈獨春秋也哉逺遊逺遊者屈原之所作也屈原既放悲嘆之餘眇觀宇宙陋世俗之卑狹悼年夀之不長於是作為此篇思欲制煉形魂排空御氣浮遊八極後天而終以盡反復無窮之世變雖曰寓言然其所設王子之詞茍能充之實長生久視之要訣也卜居卜居者屈原之所作也屈原哀閔當世之人習安邪佞違背正直故陽為不知二者之是非可否而將假蓍龜以決之遂為此詞發其取舍之端以警世俗説者乃謂原實未能無疑於此而始將問諸小人則亦誤矣漁父漁父者屈原之所作也漁父蓋亦當時隱遁之士或曰亦原之設詞耳續離騷宋玉九辨九辨者屈原弟子楚大夫宋玉之所作也閔惜其師忠而放逐故作九辨以述其志云招魂招魂者宋玉之所作也古者人死則使人以其上服升屋履危北面而號曰臯某復遂以其衣三招之乃下以覆尸此禮所謂復而説者以為招魂復魂又以為盡愛之道而有禱祠之心者蓋猶冀其復生也如是而不生則不生矣於是乃行死事此制禮者之意也而荆楚之俗乃或以是施之生人故宋玉哀閔屈原無罪放逐恐其魂魄離散而不復還遂因國俗託帝命假巫語以招之以禮言之固為鄙野然其盡愛以致禱則猶古人之遺意也是以太史公讀之而哀其志焉若其譎怪之談荒淫之志則昔人蓋已誤其譏於屈原今皆不復論也景差大招大招不知何人所作或曰屈原或曰景差自王逸時已不能明矣其謂原作者則曰詞義髙古非原莫及其不謂然者則曰漢志定著原賦二十五篇今自騷經以至漁父已充其目矣其謂景差則絶無左驗是以讀書者往往疑之然今以宋玉大小言賦考之則凡差語皆平淡淳古意亦深靖間退不為詞人墨客浮夸艷逸之態然後乃知此篇決為差作無疑也雖其所言有未免於神怪之惑逸欲之娛者然視小招則已逺矣其於天道之詘伸動靜蓋若粗識其端倪於國體時政又頗知其所先後要為近於儒者窮理經世之學豫於是切有感焉因表而出之以俟後之君子云莊忌哀時命哀時命者梁孝王客莊忌之所作也淮南招隱士招隱士者淮南小山之所作也淮南王安好古愛士招致賓客客有八公之徒分造詞賦以類相從或稱大山或稱小山如詩之有大小雅焉此篇視漢諸作最為髙古説者以為亦託意以招屈原也李白明堂賦遂作辭曰穹崇明堂倚天關兮巃嵸鴻濛衛瓌材兮偃蹇坱漭邈崔嵬兮周流辟雍岌思及反靈臺兮赫奕日星憤風雷宗祀肹蠁王化恢鎮八極兮通九垓四門啓兮萬國來考休徵兮進賢才儼皇居而作固窮千祀兮悠哉杜牧阿房宫賦戍卒叫函谷舉楚人一炬可憐焦土嗚呼滅六國者六國也非秦也族秦者秦也非天下也嗟夫使六國各愛其人則足以拒秦秦復愛六國之人則遞三世可至萬世而為君誰得而族滅也秦人不暇自哀而後人哀之後人哀之而不鑑之亦使後人而復哀後人也杜甫進三大禮賦表臣甫言臣生長陛下淳朴之俗行四十載矣與麋鹿同羣而處浪迹於陛下豐草長林實自弱冠之年矣豈九州牧伯不嵗貢豪俊於外豈陛下明詔不仄席思賢於中哉臣之愚鈍靜無所取以此知分沈埋盛時不敢依違不敢激汙默然以漁樵之樂自遣而已頃者賣藥都市寄食交朋竊慕堯翁擊壤之謳適遇國家郊廟之禮不覺手足蹈舞形於篇章潄吮甘液遊泳和氣聲韻浸廣卷軸斯存抑亦古詩之流希乎述者之意然詞理野質終不足以拂天聽之崇髙配史籍以永久恐倐先狗馬遺恨九原謹稽首投延恩閣獻納上表進明主朝獻太清宫朝享太廟有事於南郊等三賦以聞朝謁太清宫朝享太廟有事於南郊封西嶽賦比嵗鴻生巨儒之徒誦古史引時義云國家土德與黃帝合主上本命與金天合而守闕者亦百數天子寢不報蓋謙如也頃或詔厥郡國掃除曽顚雖翠蓋可薄乎蒼穹而銀字未藏於金氣臣甫誠薄劣不勝區區吟詠之極故作封西嶽賦以觀賦之義預述上將展禮焚柴者實覬聖人因有感動焉雕賦雕者鷙鳥之殊特搏擊而不可當豈但壯觀於旌門發狂於原隰引以為類是大臣正色立朝之義也臣竊重其有英雄之姿故作此賦天狗賦天寶中上冬幸華清宫甫因至獸坊怪天狗院列在諸獸院之上胡人云此其獸猛捷無與比者甫壯而賦之尚恨其與凡獸相近詩類王褒中和詩益州刺史王襄欲宣聖化於衆庶聞王褒有俊才使作中和樂職宣布詩選好事者令依鹿鳴之聲習而歌之前王褒傳謝玄暉五言詩玄暉長五言詩沈約嘗云二百年來無此詩也南謝眺傳謝靈運夢得詩謝惠連族兄靈運云每有篇章對惠連輒得佳語嘗思詩竟日不就忽夢見惠連即得池塘生春草大以為工嘗云此語有神功非吾語也謝靈運詩靈運移籍會稽盡幽居之美每有一詩至都下貴賤莫不競寫宿昔間士庶皆遍本傳王泰詩王泰每朔宴刻燭賦詩文不加點本傳王筠詩沈約請王筠為草木十詠書之壁不加篇題約謂人曰此詩指物程形無假題書筠傳劉沆詩劉沆善屬文梁武帝命羣臣賦詩獨詔沆為二百字三刻便成其文甚美本傳沈約詩時盛為文章沈約謝眺王融以氣類相推轂周顒善識聲韻約等文皆用宫商將平上去入四聲以此制韻有平頭上尾蜂腰鶴膝五字之中音韻悉異兩句之內角徵不同不可增減世呼為永明體陸厥傳崔湜詩崔湜執政時年三十八嘗暮出端門緩轡賦詩張説見之嘆曰文與位固可致其年不可及也唐本傳上官儀詩上官儀工詩其詞綺錯婉媚本傳白居易詩傳雞林白居易工詩士人爭傳雞林行賈售其國相率篇易一金其偽者相輒能辨之本傳栁公權詩唐栁公權嘗從穆宗幸未央宫帝曰邊戍賜衣久不時今中春而衣已給帝曰當賀我以詩宫人能之公權應聲成文婉切而麗詔令再賦復無停思天子甚恱曰子建七步爾乃三焉本傳張説詩張説既謫嶽州而詩益悽婉人謂得江山助云本傳小杜詩杜牧於詩有理致豪邁號為小杜以别杜甫本傳孟郊詩孟郊為詩有理致然思苦竒澀李觀稱其詩曰髙處在古無上平處下顧二謝韓愈傳劉義詩劉義氷柱雪車二詩出盧同孟郊右同上劉禹錫詩劉禹錫素善詩白居易言其詩在處應有神物護持禹錫傳長卿五言長城詩秦系與劉長卿善以詩相贈答權德輿曰長卿自以為五言長城系用偏師攻之雖老益壯系傳李杜詩杜甫少與李白齊名時號李杜為歌詩傷時撓弱情不忘君人憐其忠云甫傳杜甫詩唐興詩人承陳隋風流浮靡相矜至甫渾涵汪茫千彚萬狀兼古今而有之他人不足甫乃厭餘殘膏賸馥沾丐後人多矣故元稹謂詩人以來未有如子美者甫又善陳時事律切精深至千言不少衰世號詩史韓愈於文章謹許可至歌詩獨推曰李杜文章在光焰萬丈長誠可信云書贊宋之問奪袍詩武后遊洛南龍門詔從臣賦詩左史東方虯詩先成后賜錦袍宋之問俄頃獻后覽之嗟賞更奪袍以賜李適李賀錦囊詩李賀每旦自出騎弱馬從小奚奴背古錦囊遇所得書投囊中本傳李白詩李白一斗詩百篇杜八仙歌孟浩然詩吾憐孟浩然短褐即長夜賦詩何必多往往淩鮑謝杜詩羣書考索卷二十
