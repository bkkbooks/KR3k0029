  text: 羣書考索後集卷三宋章如愚編官制門緫序類左右衞左右驍衞左右武衞左右威衞左右領衞左右金吾衛左右監門衞左右千牛衞左右共十六衞将軍緫三十員局官緫一百二十八員左右衞上将軍各一人大将軍各一人将軍各二人掌宫禁宿衞凡五府及外府皆緫焉将軍掌貳上将軍之事武徳五年改左右翊衞曰左右衞府左右驍騎衞曰左右驍騎府左右屯衞曰左右威衞左右禦衞曰左右領軍衞左右備身府曰左右府唯左右武衞府左右監門府左右候衞仍隋不改顯慶五年改左右府曰左右千牛衞龍朔二年左右衞府驍衞府武衞府皆省府改左右威衞曰左右武威衞左右領軍衞曰左右戎衞左右候衞曰左右金吾衞左右監門府曰左右監門衞左右千牛府曰左右奉宸衞後又曰左右千牛衞咸亨元年改左右戎衞曰領軍衞武后光宅元年改左右驍衞曰左右武威左右武衞曰左右鷹揚衞左右武衞曰左右豹韜衞左右領軍衞曰左右玉鈐衞貞元二年初置十六衞上将軍左右衞長史各一人掌判諸曹五府外府廩祿卒伍軍團之名數錄事參軍事各一人掌受諸曹及五府之外事倉庫參軍事各二人掌五府文官勲考假使祿俸公廨田園食料毉藥過所武后長安初改鎧曹曰胄曹中宗復舊先天元年又曰胄曹開元初諸衞司倉司兵騎兵參軍改曰倉曹武曹騎曹胄曹參軍事兵曹參軍事各二人掌五府武官宿衞畨第騎曹參軍事各一人掌外府雜畜簿帳牧養胄曹參軍事各一人掌兵械公廨興繕罰讁奉車都尉掌馭副車有其名而無其人駙馬都尉無定員親衞之府一曰親府勲衛之府二一曰勲一府二曰勲二府翊衞之府二一曰翊一府二曰翊二府凡五府每府中郎将一人左右郎将一人親衞勲衞翊衞緫四千九百六十三人兵曹參軍事各一人校尉各五人每校尉有旅帥二人每旅帥各有隊正二十人副隊正二十人五府郎将掌領校尉旅帥親衞勲衞之屬宿衞者而緫其府事左右郎将貳焉畨上者以為薄士於大将軍而配以職唐親衞勲衞置驃騎将軍車騎将軍翊衞置車騎将軍武德七年改驃騎将軍為中郎将車騎将軍皆為郎将分左右以親衞曰一府勲衞翊衞曰二府謂之三府衞諸衞翊衞及率府親勲衞府曰三衞永徽三年避太子諱改中郎将曰旅賁郎郎将曰翊軍郎太子廢復舊左右驍衞上将軍各一人大将軍各一人将軍各一人掌同左右衞凡翊府之翊衞外府豹騎畨上者分配之凡分兵守諸門在皇門四面宫城内外則與左右衞分知助鋪長史各一人錄事參軍事各一人倉曹參軍事各一人兵曹參軍事各一人騎曹參軍事各一人胄曹參軍事各二人左右司階各二人左右中候各三人左右司戈各五人左右執㦸各五人左右翊中郎将府中郎将各一人左郎将各一人右郎将各一人兵曹參軍事各一人校尉各五人旅帥各五十人隊正各二十人副正各二十人左右武衞上将軍各一人大将軍各一人将軍各二人掌同左右衞凡翊府之翊衞外府熊渠畨上者分配之長史各一人錄事參軍事各一人倉曹參軍事各二人兵曹參軍事各二人騎曹參軍事各一人胄曹參軍事各一人左右司階各二人左右中候各三人左右司戈各五人左右執㦸各五人長上各二十五人左右翊中郎将府官同驍衞左右威衞上将軍各一人大将軍各一人将軍各二人掌同左右衞凡翊府之翊衞外府羽林畨上者分配之凡分兵主守則知皇城東面助之長史各一人錄事參軍事各一人倉曹參軍事各二人兵曹參軍事各二人騎曹參軍事各二人胄曹參軍事各一人左右司階各二人左右中候各三人左右司戈各五人左右執㦸各五人長上各二十人左右翊中郎将府官同驍衞左右領軍衞上将軍各一人大将軍各一人将軍各二人掌同左右衞凡翊府之翊衞外府射聲畨上者分配之凡分兵主守則知皇城西面助鋪及京城苑城諸門長史各一人錄事參軍事各一人倉曹參軍事各二人兵曹參軍事各二人騎曹參軍事各一人胄曹參軍事各一人左右司階各二人左右中候各三人左右司戈各五人左右執㦸各五人長上各二十五人左右翊中郎将府官同驍衞左右金吾衞上将軍各一人大将軍各一人将軍各二人掌宫中京城廵警𤇺候道路水草之宜凡翊府之翊衞及外府佽飛畨上皆屬焉騎曹參軍事掌外府雜畜簿帳牧養之事胄曹參軍事掌同左右衞大朝㑹行從給青龍旗䂍矟於衞尉長史各一人錄事參軍事各一人倉曹參軍事各二人兵曹參軍事各二人騎曹參軍事各二人胄曹參軍事各一人左右司階各二人左右中候各三人左右司戈各五人左右執㦸各五人左右街使各一人判官各二人左右翊中郎将府官如驍衞左右翊中郎将府中郎将掌領府屬督京城左右六街鋪廵警左右街使掌分察六街徼廵左右監門衞上将軍各一人大将軍各一人将軍各二人掌諸門禁衞及門籍兵曹參軍事兼掌倉曹胄曹兼掌騎曹左右翊中郎将府中郎将掌莅宫殿城門皆左入右出中郎将各四人長史各一人錄事參軍事各一人兵曹參軍事各一人胄曹參軍事各一人左右千牛衞上将軍各一人大将軍各一人将軍各二人掌侍衞及供御兵仗以千牛備身左右執弓箭宿衞胄曹參軍事掌甲仗凡御仗之物二百一十有九羽儀之物三百自千千以下分掌之騎曹中郎将各二人長史各一人錄事參軍事各一人兵曹胄曹參軍事各一人左右翊中郎将府中郎将掌供奉侍衞凡千牛及備身左右以御刀仗升殿諸衛折衝都尉府掌領屬備宿衛每府折衝都尉一人左右果毅都尉各一人别将各一人長史各一人兵曹參軍事各一人校尉五人旅帥十人隊正二十人副隊正二十人左右果毅都尉掌貳都尉左右羽林大将軍各一人将軍各三人掌統北衙禁兵督攝左右廂