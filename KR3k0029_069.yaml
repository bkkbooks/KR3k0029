  text: 羣書考索後集卷三宋章如愚編官制門總序類左右衛左右驍衛左右武衛左右威衛左右領衛左右金吾衛左右監門衛左右千牛衛左右共十六衛將軍總三十員局官總一百二十八員左右衛上將軍各一人大將軍各一人將軍各二人掌宫禁宿衛凡五府及外府皆總焉將軍掌二上將軍之事武德五年改左右翊衛曰左右衛府左右驍騎衛曰左右驍騎府左右屯衛曰左右威衛左右禦衛曰左右領軍衛左右備身府曰左右府唯左右武衛府左右監門府左右候衛仍隋不改顯慶五年改左右府曰左右千牛衛龍朔二年左右衛府驍衛府武衛府皆省府改左右威衛曰左右武威衛左右領軍衛曰左右戎衛左右候衛曰左右金吾衛左右監門府曰左右監門衛左右千牛府曰左右奉宸衛後又曰左右千牛衛咸亨元年改左右戎衛曰領軍衛武后光宅元年改左右驍衛曰左右武威左右武衛曰左右鷹揚衛左右武衛曰左右豹韜衛左右領軍衛曰左右玉鈐衛貞元二年初置十六衛上將軍左右衛長史各一人掌判諸曹五府外府廩祿卒伍軍團之名數録事參軍事各一人掌受諸曹及五府之外事倉庫參軍事各二人掌五府文官勳考假使祿俸公廨田園食料醫藥過所武后長安初改鎧曹曰胄曹中宗復舊先天元年又曰胄曹開元初諸衛司倉司兵騎兵參軍改曰倉曹武曹騎曹胄曹參軍事兵曹參軍事各二人掌五府武官宿衛畨第騎曹參軍事各一人掌外府雜畜簿帳牧養胄曹參軍事各一人掌兵械公廨興繕罰謫奉車都尉掌馭副車有其名而無其人駙馬都尉無定員親衛之府一曰親府勳衛之府二一曰勳一府二曰勳二府翊衛之府二一曰翊一府二曰翊二府凡五府每府中郎將一人左右郎將一人親衛勳衛翊衛總四千九百六十三人兵曹參軍事各一人校尉各五人每校尉有旅帥二人每旅帥各有隊正二十人副隊正二十人五府郎將掌領校尉旅帥親衛勳衛之屬宿衛者而總其府事左右郎將二焉畨上者以為薄士於大將軍而配以職唐親衛勳衛置驃騎將軍車騎將軍翊衛置車騎將軍武德七年改驃騎將軍為中郎將車騎將軍皆為郎將分左右以親衛曰一府勳衛翊衛曰二府謂之三府衛諸衛翊衛及率府親勳衛府曰三衛永徽三年避太子諱改中郎將曰旅賁郎郎將曰翊軍郎太子廢復舊左右驍衛上將軍各一人大將軍各一人將軍各一人掌同左右衛凡翊府之翊衛外府豹騎畨上者分配之凡分兵守諸門在皇門四面宫城內外則與左右衛分知助鋪長史各一人録事參軍事各一人倉曹參軍事各一人兵曹參軍事各一人騎曹參軍事各一人胄曹參軍事各二人左右司階各二人左右中候各三人左右司戈各五人左右執㦸各五人左右翊中郎將府中郎將各一人左郎將各一人右郎將各一人兵曹參軍事各一人校尉各五人旅帥各五十人隊正各二十人副正各二十人左右武衛上將軍各一人大將軍各一人將軍各二人掌同左右衛凡翊府之翊衛外府熊渠畨上者分配之長史各一人録事參軍事各一人倉曹參軍事各二人兵曹參軍事各二人騎曹參軍事各一人胄曹參軍事各一人左右司階各二人左右中候各三人左右司戈各五人左右執㦸各五人長上各二十五人左右翊中郎將府官同驍衛左右威衛上將軍各一人大將軍各一人將軍各二人掌同左右衛凡翊府之翊衛外府羽林畨上者分配之凡分兵主守則知皇城東面助之長史各一人録事參軍事各一人倉曹參軍事各二人兵曹參軍事各二人騎曹參軍事各二人胄曹參軍事各一人左右司階各二人左右中候各三人左右司戈各五人左右執㦸各五人長上各二十人左右翊中郎將府官同驍衛左右領軍衛上將軍各一人大將軍各一人將軍各二人掌同左右衛凡翊府之翊衛外府射聲畨上者分配之凡分兵主守則知皇城西面助鋪及京城苑城諸門長史各一人録事參軍事各一人倉曹參軍事各二人兵曹參軍事各二人騎曹參軍事各一人胄曹參軍事各一人左右司階各二人左右中候各三人左右司戈各五人左右執㦸各五人長上各二十五人左右翊中郎將府官同驍衛左右金吾衛上將軍各一人大將軍各一人將軍各二人掌宫中京城巡警𤇺候道路水草之宜凡翊府之翊衛及外府佽飛畨上皆屬焉騎曹參軍事掌外府雜畜簿帳牧養之事胄曹參軍事掌同左右衛大朝㑹行從給青龍旗䂍矟於衛尉長史各一人録事參軍事各一人倉曹參軍事各二人兵曹參軍事各二人騎曹參軍事各二人胄曹參軍事各一人左右司階各二人左右中候各三人左右司戈各五人左右執㦸各五人左右街使各一人判官各二人左右翊中郎將府官如驍衛左右翊中郎將府中郎將掌領府屬督京城左右六街鋪巡警左右街使掌分察六街徼巡左右監門衛上將軍各一人大將軍各一人將軍各二人掌諸門禁衛及門籍兵曹參軍事兼掌倉曹胄曹兼掌騎曹左右翊中郎將府中郎將掌蒞宫殿城門皆左入右出中郎將各四人長史各一人録事參軍事各一人兵曹參軍事各一人胄曹參軍事各一人左右千牛衛上將軍各一人大將軍各一人將軍各二人掌侍衛及供御兵仗以千牛備身左右執弓箭宿衛胄曹參軍事掌甲仗凡御仗之物二百一十有九羽儀之物三百自千千以下分掌之騎曹中郎將各二人長史各一人録事參軍事各一人兵曹胄曹參軍事各一人左右翊中郎將府中郎將掌供奉侍衛凡千牛及備身左右以御刀仗升殿諸衛折衝都尉府掌領屬備宿衛每府折衝都尉一人左右果毅都尉各一人别將各一人長史各一人兵曹參軍事各一人校尉五人旅帥十人隊正二十人副隊正二十人左右果毅都尉掌二都尉左右羽林大將軍各一人將軍各三人掌統北衙禁兵督攝左右廂