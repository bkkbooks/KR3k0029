body:
  text: 羣書考索卷十二宋章如愚撰正史門史記類太史公名談仕於建元元封之間愍學者不達其意而師悖師古曰悖惑也各習師法成於所見悖者布內反乃論六家之要指曰易大傳曰天下一致而百慮同歸而殊塗張晏曰大傳謂易繫辭夫隂陽墨儒名法道德此務為治者也直所從言之異路有省不省耳師古曰言發迹雖殊同歸於治但學者不能省察昧其端緒耳直猶但也嘗切觀隂陽之術大詳而衆忌諱使人拘而多畏李竒曰隂陽之術月令星官是其技葉也師古曰拘曲礙也然其序四時之大順不可失也儒者博而寡要勞而少功是以其事難盡從然其序君臣父子之禮列夫婦長幼之别不可易也師古曰易變也墨者儉而難遵是以其事不可遍循師古曰言難盡用然其强本節用不可廢也法家嚴而少恩然其正君臣上下之分不可改也名家使人儉而善失真師古曰劉向别録云名家者流出於禮官古者名位不同禮亦異數孔子曰必也正名乎然其正名實不可不察也道家使人精神專一動合無形淡足萬物師古曰淡古贍字其為術也因隂陽之大順采儒墨之書撮名法之要師古曰撮總取也音于活反與時遷徙應物變化立俗施事無所不宜指約而易操事小而功多遷生龍門蘇林曰禹所鑿龍門也師古曰龍門山其東則在今秦川龍門縣北其西則在今同州韓城縣北而河從其中下流耕牧河山之陽師古曰河之北山之南也年十嵗則誦古文二十而南游江淮上㑹稽探禹冗窺九疑張晏曰禹巡狩至㑹稽而崩因葬焉上有孔穴民間云禹入此穴九疑舜墓在焉師古曰㑹稽山名本茅山也禹於此㑹諸侯之計因名曰㑹稽九疑山有九峯解見司馬相如傳浮沅湘師古曰沅水出牂牁湘水出零陵二水皆入江北涉汶泗師古曰汶泗兩水名在地理志汶音問講業齊魯之都觀夫子遺風鄉射鄒嶧師古曰鄒縣名也嶧山名也近曲阜地也於此行鄉射之禮嶧音懌厄困蕃薛彭城師古曰蕃縣名也音坡過梁楚以歸於是遷仕為郎中奉使西征巴蜀以南略卭筰昆明師古曰筰方各反還報命是嵗天子始建漢家之封而太史公留滯周南如淳曰周南洛陽也張晏曰洛陽而謂周南者自陜以東皆周南之地也不得與從事師古曰與讀曰豫發憤且卒而子遷適反見父於河雒之間太史公執遷手而泣曰豫先周室之太史也自上世嘗顯功名虞夏典天官事後世中衰絶於豫乎汝復為太史則續吾祖矣今天子接千嵗之統封泰山而豫不得從行是命也夫命也夫豫死爾必為太史為太史毋忘吾所欲論著矣且夫孝始於事親中於事君終於立身揚名後世以顯父母此孝之大也幽厲之後王道缺禮樂衰孔子修舊起廢論詩書作春秋則學者至今則之自獲麟以來四百餘嵗而諸侯相兼史記放絶今漢興海內一統明主賢君忠臣義士豫為太史而不論載廢天下之文豫甚懼焉爾其念哉遷俯首流涕曰小子不敏請悉論先人所次舊聞不敢闕卒三嵗而遷為太史令紬史記石室金匱之書且余掌其官廢明聖盛德不載滅功臣賢大夫之業不述墮先人所言師古曰墮毀也謂不修之也音火規反罪莫大焉余所謂述故事整齊其傳非所作也而君比之春秋謬矣於是論次其文十年而遭李陵之禍幽於纍紲師古曰纍繫也紲長繩也纍音力追反紲音先列反乃喟然而嘆曰是余之􅓧師古曰喟然嘆息貌也音丘位反夫身虧不用矣退而深惟曰師古曰惟思也夫詩書隱約者欲遂其志之思也師古曰隱憂者約屈也卒述陶唐以來至于獲麟網羅天下放失舊聞王迹所興原始察終見盛觀衰論考之行事略三代録秦漢上記軒轅下至于兹著十二本紀既科條之矣並時異世年差不明作十表師古曰並時則年歷差殊異代則難以明辨故作表也禮樂損益律歷改易兵權山川鬼神天人之際承敝通變作八書二十八宿環比辰三十輻共一轂運行無窮孟康曰象黃帝以下三十家也老子言車三十輻運行無窮以象王者如此也師古曰此說非也言衆星共繞北辰諸輻咸歸車轂若文武之臣尊輔天子也輔弼股肱之臣配焉忠信行道以奉主上作三十世家輔義俶倘不令已失時師古曰俶倘大節也俶吐歷反立功名於天下作七十列傳凡百三十篇五十二萬六千五百字為太史公書序略以拾遺補載成一家言孟康曰二音揲謂裳下壞偞李竒曰藝六藝也師古曰李說是也藝古藝字協六經異傳齊百官雜語藏之名山副在京師師古曰藏於山者備亡失也其副二本乃留京師也以竣後聖君子第七十師古曰俟古俟也遷之自叙云爾師古曰自此前皆其自叙之辭也自此以後乃班氏作傳語也而七篇缺有録無書遷既被刑之後為中書令尊寵任職漢書舊儀注曰司馬遷作景帝本紀極言其短及武帝過武帝怒而削去之後坐舉李陵降胸奴故下遷蠶室漢書注曰蠶室乃腐刑所居涅密之室也謂推致蠶室之中也有怨言下獄死援班固漢書遷本傳云遷遭刑之後尊寵任職為中書令此云下獄死不知何據漢書音義曰十篇缺有録無書張晏曰遷沒之後失景紀武紀禮書樂書律書漢興已來將相年表日者列傳三王世家龜策列傳靳蒯列傳元成之間禇先生補缺作武帝紀三王世家龜策日者列傳言辭鄙陋非遷本意十二紀以序帝王年表以貫嵗月八書以紀政事三十世家以序公侯七十列傳以志士庶上下三千餘載凡為五十二萬六千五百言朝志紀遷紀五帝或以為遷好竒之過殆未深考五帝紀多采之大戴禮尚書孟子當漢初異端紛亂之時而遷乃卓然有見於聖賢之餘論其贊曰百家言黃帝其文不雅馴又曰總之不離古文者近是此豈淺見之所能識哉或曰孔子叙書斷自唐虞而遷紀於黃帝然觀三代世表則帝王之世皆出黃帝此其㫖歟又曰遷紀遺羲農而黜少昊蓋黃帝髙陽髙辛子孫代有天下而少昊之後不傳周禮六樂亦無少昊之樂易叙古先帝王亦不道也五帝紀大抵皆述其上敬天時下敬民事使萬物各得其所其與書所載羲和之事同一意也其贊夏紀序孔子正夏時其贊啇紀序孔子善商輅豈非夫子損益四代之意乎氏族古之大事夏商二紀贊皆言之周紀自平王東遷以前皆紀周事東遷以後方與諸侯雜記凡齊威晉文秦穆楚莊晉悼之事莫不具載此所以見伯統與王室相為盛衰者也雖然孔子何與於周室其卒也亦與威文並書何也蓋孔子之存亦足以維持周室至於孔子之卒則周室可知也五帝本紀既歷叙其世糸相因之本末而三代世糸之所自出復總而叙於五帝之末篇以見帝王之治體相承而出於一也至秦始皇則别而為二紀者其矜武任力恣行弗顧無復三代之源流五帝之為一紀分而合者也秦之為二紀合而分者也列后項羽之列於本紀何也懷王既泯而項羽主命惠帝幼弱而呂氏擅朝從其實而紀之也然羽紀乃以髙帝紀年明天命之有所歸也呂紀以惠帝紀年明母后之不得專國也表史遷雖變編年之法而編年之意吾於表猶有考焉十二諸侯年表叙晉阻三河齊負東海楚界江淮秦國雍州之固則知先王名山大澤不以封之意髙祖功臣表正欲見初之所以封後之所以廢至太初而見侯五人則其待勳舊而興滅繼絶者可見矣髙祖侯者則以功臣言景武以來則但書侯者其意深矣而班固表槩曰功臣其未思乎書禮樂律書其叙具在禮書云宰制萬物役使羣動豈人力哉以見禮非外來因人性而品節之也樂書言唐虞賡歌之戒成王作頌有懲艾之心以見樂非以為樂所以節樂也律書之附兵即師出以律之㫖而六律所以為萬事之根本也三書皆有其叙自叙而下草具而未成者也河渠書大抵謂河之患可以疏導而不可以壅塞此所以悲瓠子之事而作河渠書封禪書所以見武帝之欺天平凖書所以見武帝之窮人天人之間俱受其害則其所以譏武帝者不待武帝紀而已可見矣平準書大抵叙武帝承富庶之後不能制欲始開邊隙國用既竭復斂於民斂之既足又復出師費耗已甚又復重斂此所以致海內之虛耗也武帝將厚斂於民故必嚴刑於先遷所以雜紀刑法於此書者其意深矣孟子曰省刑罰薄稅斂蓋稅斂薄則刑罰可省耳不然則痛刑以威之然後可以奪民生衣食之命欲斡鹽鐵則行左趾之令欲告緡錢則無平反之獄蓋二者常相關太史公深識此意不傳𢎞羊孔僅乃於張湯傳言興利之事不於用刑處說張湯杜周變法之因而於平準書說張湯杜周與𢎞羊更進用事之迹世家之始於周何也封建之道成於周也首吳以著王迹之興起於太伯之遜也次齊以著王業之成基於尚父之謀也次魯次燕以著王室之所由固而嘉周召靖管蔡之難也秦無封建之議故其臣不得列於世家孔子陳涉世家之作史遷之特筆也自春秋以來夫子維持王道之志不遂不極乎涉不止也漢世家首外戚以見自古治亂皆由乎內也楚漢之際諸呂之變七國之禍封建之助俱多諸王次於外戚而漢興功臣反屈於其後此周以宗强之意也蕭何之曰蕭相國曹參之曰曹相國張良之曰留侯陳平之曰陳丞相周勃之曰絳侯又太史公深嘆將相侯王之權重而惜其後之不能繼也五宗三王之封辭少貶矣所以傷漢家藩屏之缺也蕭曹平勃皆為世家而張蒼乃列於傳申屠嘉附於傳後自嘉以後皆不書矣傳伯夷居傳之首貨殖為傳之末至於序孟子一傳則首歎功利之弊以為利誠亂之原也觀乎此則豈退處士而進奸雄崇富貴而羞貧賤者乎屈原賈誼之同傳或曰曠百代而相通者心也或曰史遷感憤怨懟托人以見意也是未必然也離騷湘鵩之賦豈徒悼志業之未遂壽命之不長哉楚之亡也以不聽屈原而漢事之缺以賈誼之天二子之存亡所繫何如哉胸奴傳贊云惟在擇任將相哉而繼以衛霍公孫洪傳者明武帝之將相若此也又繼以主父偃徐樂嚴安傳者以三子皆以伐胸奴諫也彼三子者武帝猶不加罪焉以是見帝之猶可言也而公孫衛霍之深可罪耳司馬相如之厠西南夷傳後張騫之附大宛傳後是皆遷之深意也酷吏傳始於朝錯以見漢初寬大之意始變也郅都固異於錯而公廉不私之意尤足尚寧成郅都而廉不如其後事益多而民巧法此一時也自趙禹張湯定律令而用法益刻不特吏深刻而法益峻此又一時也趙禹張湯以深刻為九卿然其治尚輔法而行自義縱王溫舒之徒以斬戮為常至流血十餘里無復用法矣觀太史傳其次第可考也太史讀功令而嘆蓋以古者教人非區區以利祿誘天下也髙祖未遑庠序文景尚刑名武帝慨然有興儒學之意而公孫𢎞以春秋為三公而天下向風則亦不免甘心於利祿然太史公於諸儒中自申公而下所取者亦七八人蓋以為漢儒固不足取然分章析句使六藝之傳不泯數子之功也班固贊儒林說五經傳授之盛歸於勸以官祿夫豈知固之所美乃遷之所嘆者歟日者龜策一事也而異傳何哉日者以志其人也龜策以志其事也史記君臣謀議將相功勳紀多不書必俟其臣沒而備載於傳是人臣得專自可謀議功勳也尚書雖無編年之法君臣之事年代有序羲和之業固載於堯典稷契臯䕫之功固載於舜典三代君臣之事亦猶是焉又遷創紀傳所紀一事或分為數處比於編年則文繁矣不若編年體正而文簡也係唐論序諸家論史記得失索隱曰按景紀取班書補之武紀專取封禪書禮書取荀卿禮論樂書取禮樂記兵書亡不補略述律而言兵遂分歷述以次之三王糸家空取其策文以續此論本傳贊曰司馬遷據左氏國語采世本戰國策述楚漢春秋接其後事訖于大漢其言秦漢詳矣至於采經托傳師古曰托拾也音之亦反分散數家之事甚多疏略或有抵牾如淳曰牾讀曰忤相觸忤也師古曰抵觸也牾相支柱不安也悟音悟亦其涉獵者廣博貫穿經傳馳騁古今上下數千載閒斯以勤矣又其是非頗繆於聖人師古曰頗普我反論大道則先黃老而後六經序遊俠則退處士而進奸雄傳貨殖則崇勢利而羞賤貧此其所蔽也然自劉向揚雄博極羣書皆稱遷有良史之材服其善序事理辨而不華質而不俚劉德曰俚鄙也如淳曰言雖賢猶不如閭里之鄙言也師古曰劉說是也俚音里其文直其事核師古曰核堅實也不虛美不隱惡故謂之實録應劭曰言其録事實嗚呼以遷之博物洽聞而不能以知自全既陷極刑幽而發憤著書傷矣叙遊俠之談而論六國之勢則土地甲兵以至車騎積粟之有差可謂辨矣而莫不各當其實是得於辨而不華也叙貨殖之資而比封侯之家則棗栗漆竹以至籍藁之數可謂質矣而莫不各飾以文是得於質而不俚也上自黃帝下迄漢武首尾三千餘年論著才五十餘萬言豈非得於文之直乎紀帝王則本詩書紀列國則據左氏言秦兼諸侯則采戰國策言漢定天下則述漢楚春秋豈非得於事之核乎伯夷古之賢人則冠之於傳首晏嬰善與人交則願與之執鞭兹得於不虛美也陳平之謀略而不諱其受金之奸張湯之薦賢而不略其文深意忌之酷兹得於不隱惡也世家所以紀系緒也臯陶雖封於六仲山甫雖封於樊申伯雖封於謝而子孫功烈不多見於春秋伊尹則由陟而下無聞傳說則神騎箕尾而去至召虎則似召公焉加之世代綿逺經傳無可考故遷皆不敢輕為之傳况世家耶若周公之後封於曲阜召公之後封於朝鮮皆傳數十世魯至戰國而始微燕至秦世而始滅其家緒之傳可得而考遷安得而不為之立世家耶此遷之史見於特書者然耶傳者所以紀事實也管仲以其君霸晏子以其君顯子胥又吳之忠臣其功烈暴白於天下其姓名焜耀於當時遷皆為之立傳固宜矣至子産之相鄭其事業概見於鄭之世家又見於循吏傳是不可謂沒其實矣史遷復為之立傳則是子産二傳也范蠡之相越其事業槩見於越之世家又見於貨殖傳是不可謂沒其實矣史遷復為之立傳則是范蠡二傳也此遷之史見於附書者也伯夷聖之清栁下惠聖之和其制行一也然伯夷則崇遜以立教采薇而全節寥寥千載之下聞其風者猶能律貪化頑故韓退之特為之作頌而謂聖人萬物之標準此則伯夷故當冠列傳而下惠則有所不必書也列禦冦之學老𣆀莊周之學列禦冦其傳道一也然老莊之書一則齊物我一則應世變出入吾儒之道而反畔之至禦冦則流風遺書類多冲虛之說故仲淹言虛無長而晉室亂亦止及老莊如此則老莊固當列於傳而禦冦則有所不必書也墨子之道固不足取然善守禦足財用遷亦嘗附書於荀卿之傳後以小道可觀固耳至别之六家者豈遷之意以其兼愛無父故擇名實之似使之不得以亂吾道之真然則遷不為之立傳誠知其有所不可也丘明之書誠有可取故是非與聖人同嘗見取於劉歆矣然書可取而史不之録者豈遷之意以其依經作傳能自標致故人將讀其書而知其為人又何待於作傳而後顯然則遷之不為立傳誠知其有所不可也雖然遷之史為例如此矣豈偶然者耶考之他傳與世家皆然也若太公之封於齊康叔之封於衛是亦周召作世家之意也若司馬相如之次西南夷汲黯鄭當時之次循吏傳曰是亦子産范蠡附見鄭越世家之意也三仁一也微子抱祭器以歸周以存商祀遷列之宋世家者豈不猶伯夷獨冠於列傳而下惠不録歟陳軫犀首亦說客也蘇秦張儀以縱橫取功名遷列之傳而軫首不傳豈不猶列禦冦不録歟楊朱與墨翟同害教朱之不傳翟之不傳也宜矣丘明與公榖同釋經公榖之不傳丘明之不傳也亦宜矣夫遷以良史之才其為史每每如此孰謂其脫略耶三山要略太史公進孔子於世家班老𣆀於申韓意非黨於黃老首夷齊於列傳意非抑於處士也如吳太伯為世家之首伯夷居列傳之先至於貨殖傳在傳之末平準書在書之終此正是孟子意思昔司馬遷述史記自皇帝至於獲麟成一家之言其論大道先黃老而後六經所以矯漢氏之尚黃老也其序游俠退處士而進奸雄所以矯羣臣之齷齪也其述貨殖則崇勢利而卑貧賤所以激武帝之興利也蓋遷雖橫就刑戮處汚俗之中困於心橫於慮憤激之氣形於簡策故其言每過直而不自知焉雖然遷之矯枉過直而未嘗不微見其意焉其叙傳固先黃老矣而又曰先人有言孔子卒有能紹而明之正易傳繼春秋本詩書禮樂之際其在兹乎此所以見尊六經之本意也其傳游俠固進奸雄矣而又曰原憲獨行不合於世蔬食不厭四百餘年而弟子志之不倦所以見其進處士之本意也其傳貨殖固崇勢利矣而又曰俗之所漸民久矣雖戶說以眇論終不能化所以見其輕利勢之本意也論六家於儒不深取論道家甚詳不無所病意者習見漢初之事曹參以清淨治天下而百姓無擾自後儒者出來變更紛紛擾擾而卒無補太史之所以病儒者非果以儒為非乃陋漢儒耳不然則太史公說詩書禮樂春秋以為學者至今則之夫豈以儒者為無益哉觀史遷與董生論春秋一段亦可謂識得儒者唐劉知幾史通曰史記者紀以包舉大體傳亦委曲細事表以譜列年爵書以總括遺漏此所以為長也若乃同為一事分在數篇斷續相離前後屢出又編次同類不求年月此所以為短也黃池之事世家先晉而周紀先吳齊王傳云齊王使侃午治琅琊王發其兵而琅琊王傳云琅琊引兵與齊王合謀紀稱虞舜見厄􅀈空而出文王隂謀修德以傾商政傳言宣尼既殂門人推奉有若如此之類皆遷之失遷采托尋訪文獻之備如此魏世家則以因遊大梁於墟中感而得之如作伯夷傳則因登箕山之上見許由冢而悲之過梁而求問東門可以知魏公子焉入楚而立觀故宫可以知春申君焉如傳荆軻云始公孫季公董生與夏無且由具知其事為余道之此以董生而傳荆軻之事也如言蘇建語余曰吾嘗責大將軍擇賢人將軍謝曰人臣遵職而已此以蘇建而傳衛青之事也如欲傳張良而見其畫圖狀貌如欲傳韓信而見淮隂人言以至據國語采世本約戰國策述楚漢春秋此乃采托尋訪文獻之備如此三場指南姬自后稷至于西伯嬴自伯翳至于莊王實乃諸侯而名𨽻本紀項籍僣盜而死未得成君安得諱其名字呼之曰王春秋吳楚僣擬書如列國假使羽竊帝號正可抑同羣盜况其國曰西楚號止霸王者乎陳勝起於羣盜稱王六月子孫不嗣而以世家為稱三晉之與田氏自未為君而前齒列陪臣前後一統俱歸世家齊列東帝抗衡西秦髙祖六國而沒其本號惟以田元制名葛洪有云司馬遷發憤作史記三百篇伯夷居列傳之首以為善而無報也項羽列於本紀以為居髙位者非關有德者按史之所書有其事則記其事無則闕尋遷之馳騖古今上下數千載考其先後隨而編次斯則理之常也烏可怪乎必謂子長以善而無報推為傳始若伍子胥大夫種孟軻墨翟賈誼屈原之徒或行仁而不遇或盡忠而受戮何不求其品類同其一科而乃異其篇目分為數卷也索隱述贊曰太史良才實纂先德周遊歷覽東西南北事核事簡是稱實録報任投書申李下獄惜哉殘缺非才妄續班固曰迹其所以自傷悼小雅巷伯之倫太史公撰孔子世家多采論語舊說至管晏列傳則不取本書以管子晏子以為時俗所有故不復更載按論語行於講肄列於學官重加編勒祗覺繁費如管晏者諸子雜家經史外事棄而不録可取而不取未覩厥義至述儒林則不取遊夏文學著循吏則不言冉季政事於貨殖傳獨以子貢居先掩惡揚善既忘此義成人之美不其缺如史記本紀曰瞽瞍使舜穿井為匿空旁出難曰其意以為舜若左慈易質為羊劉根竄形入壁之類非若姬伯拘於羑里孔子厄於陳蔡茍識事如斯難以語夫聖道太史公曰黃帝堯舜佚事時時見於他說余擇其尤雅者著為本紀書首若如所述豈可謂雅耶仲尼弟子傳曰孔子既沒以有若似聖人有若無以應雨具之問弟子起曰此非子之坐難曰有若名不𨽻於四科素無階於十哲尼父既沒取以為師不答所問始令避席何見之晚乎且退老西河取疑夫子猶使投杖謝愆何肯公然自相欺詐此乃童兒相戲非復長老所為觀孟軻著書首陳此說馬遷作史仍習其言曽無先覺悲夫揚雄病其多變好竒文中子曰史之失自遷固始張守節正義序紹太史繼春秋括文魯史而包左氏國語采世本戰國策而托楚漢春秋貫紬經傳旁搜子史上起軒轅下暨大漢作十三本紀帝王興廢悉詳三十世家君國存亡畢著八書贊隂陽禮樂十表定代糸年封七十列傳忠臣孝子之誠備矣筆削冠於史籍題目足於經邦次舊史之㫖兼音解注引致旁通凡成三十卷名曰史記正義司馬貞索隱此書殘缺雖多實為古史忽加穿鑿難允物情今止探求異聞採托典故解其所未解申其所未申釋文演注又重為述贊凡三十卷號曰史記索隱太史公好竒而詞省故事核而文徴矣徴可信也學者多未究班氏依遷而述所以條流更明兼采衆賢羣理畢備其㫖富其辭文近代諸儒共所鑽仰史記音義集解晉宋間徐廣作音義裴駰作集解合八十一卷出司馬貞索隱後序劉伯莊音義劉伯莊以正觀初於𢎞文館講授作音義三十卷音乃周備義則更略司馬貞補史記今輒採按古今仍以裴為本兼自見愚管重為之注號小司馬史記本序太史公古之良史也家承二正之業謂南正重司天北正黎司地太史公乃其後也人當五百之運謂五百年必有王者興其間必有名世者兼以代為史官親當圖籍慨春秋之絶筆傷舊典之闕文爰自黃帝訖于漢武漁獵則窮於百氏筆削乃成於一家父作子述其勤至矣夫以首創者難為功因循者易為力自左氏之後未有體制而司馬公補立紀傳規模别為書表題目如本紀叙五帝而闕三皇世家載列國而有外戚謂外戚不當在世家邾許春秋次國略而不書邾姬姓許姜姓二國亦多有攻戰㑹盟事張吳敵國蕃王抑而不載吳為長沙王吳芮傳國數世太史公不書張則未詳並編録有闕切所未安及列傳所著有管晏及老子韓非管晏乃齊之賢卿即如其例則吳之延陵鄭之子産晉之叔向衛之史魚盛德不闕何為蓋闕謂管晏既書此數君子亦不可不書也伯陽清虛為教伯陽老子也韓子峻刻制法韓非也靜躁不同德刑斯舛靜德謂老子躁刑謂韓非今宜柱史共漆園同傳柱史老子也漆園莊周也謂此二人宜同傳公子與申君並列公子謂韓非諸公子及申不害與商君同傳可不善歟然其網絡古今網絡猶網羅也叙述懲勸異左氏之微婉杜預左傳叙曰春秋之稱微而隱志而晦達而成章懲惡而勸善有南史之典實左傳齊崔杼弒莊公太史書曰崔杼弒其君杼殺之兄弟死者二人兄弟又書乃舍之南史氏聞太史盡殺執筆以往聞已書乃還所以揚雄班固等咸稱其有良史之才蓋信乎其然也蘇子由古史因遷之舊上觀詩書下考春秋及秦漢雜録記伏羲神農訖秦始皇帝為七十紀十六世家二十七列傳謂之古史裴駰集解考校此書文句不同有多有少徐廣研核衆本為作意義具列異同今增演徐氏采經傳百家并先儒之說豫是有益悉皆抄內譬彗星之繼朝陽飛塵之集華嶽以徐為本號曰集解本序徐廣史記音義鄒誕生史記音釋裴駰集解史記許子儒注史記劉伯莊史記音義徐堅注史記李鎮注史記義林二十卷陳伯宣注史記韓琬續史記一百三十卷司馬正史記索隱劉伯莊撰史記地名張守節史記正義竇羣史記名臣疏裴安時史記纂訓衛颯史記要傳張瑩史記正傳譙周古史考葛洪史記鈔羣書考索卷十二
