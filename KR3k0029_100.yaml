body:
  text: 羣書考索後集卷三十四宋章如愚編士門唐取士之科唐制取士之科多因隋舊然其大要有三由學館者曰生徒由州縣者曰鄉貢皆升於有司而進退之其科之目有秀才有眀經有俊士有進士而又有明法明字明算者焉有一史有三史者焉有開元禮有道舉有童子者焉而明經之别有五經有三經有二經有學究一經者焉有三禮有三傳有史科者焉此嵗舉之常選也其天子自詔曰制舉所以待非常之才者也以上見選舉志凡學有六曰國子皆𨽻國子監曰太學曰四門學用禮記四郊立學之說於四門置學曰律學書學算學而其外之州縣則又自有學凡館有二曰𢎞文館曰崇文館而崇文館每嵗仲冬州縣館監舉諸生之成者而送之於尚書省此之謂由學館之生徒也不由學館者皆懷牒而自列于州縣州縣試已則㑹之以鄉飲酒之禮歌鹿鳴之詩送于考功而復試之此之謂州縣之鄉貢也所謂制舉者蓋自有司常選之外天子又自詔四方德行才能文學之士或髙蹈幽隱與其不能自達者下至軍謀將略翹關拔山絶藝竒伎莫不兼取其為名目隨其人主一時所欲而列為定科如賢良方正直言極諫博通墳典達于教化軍謀宏遠堪任將率詳明政術可以理人之類其名最著其所以待之之禮甚優而宏材偉論非常之人亦時出於其間此之謂天子自詔之科舉也三者大略如此而士之進取之方與上之好惡所以育材養士招來奬進之意有司選士之法因時損益又各不同如小學高祖詔宗室功臣子孫就祕書外省别為小學如州縣學則始於高祖之時於門下别置有生員詳見制度門崇文館東宫置亦有生員貞觀十三年置則置於太宗之世至於有所謂崇𤣥學開元二十五年置習莊老諸子有所謂廣文館天寶九年置於國學以領生徒為進士者則又明皇之所增也鄉貢之法至天寶而暫廢自開元七年帝注老子成詔貢舉人減論語尚書而加試老子則創崇𤣥學之意已兆於此天寶二年改為通道學蓋欲盡由於學館也明經進士或與孝亷而並行蓋從楊綰之請也法制之沿革大略如此而其諸科所試之業又有可言者如明經則有大經禮記春秋左傳中經毛詩周禮儀禮小經易書公榖二傳之别如史科則有史記漢書三國志之别於書則有石經說文字林之辨於算則有孫子五曹九章海島周髀五經算及綴術緝古記遺之數秀才之試方略進士之試時務所以策其才也明經之帖文童子之誦文與夫書學之口試墨義所以驗其記也經史三傳諸科又各問其大義或百條或五十條者又所以審其識也此其所習之業大概如此然周禮儀禮在所習也而有所謂開元禮者果何為乎尚書論語所當習也而開元之道舉即崇𤣥學中所習老莊故號之道舉乃易之以老子果何為乎進士之科試以䇿矣試時務策五道自高宗從劉思立之言始於策之外復加以雜文加雜文二篇通文律者然後試策進文之科試以詩賦矣至德宗時用趙贊之言時贊為中書舍人權知貢舉或罷詩賦而易之針論表贊是果合于古乎故劉思立言於前曰明經多抄義條進士惟誦舊策高宗永隆三年時思立為考工員外郎楊綰言于後曰代宗寶應二年時綰為禮部侍郎進士皆誦當代之文而不通經史明經者皆記帖括至李栖筠等之議亦以經學者以帖字為精通不窮㫖義考文者以聲病為是非豈知移風易俗之化亦可以見當時所趨矣是以鄭覃文宗時以經術位宰相深嫉進士之浮薄請罷之而李德裕武宗時宰相遂一切而欲廢之此又忿激不平之論也然大抵唐諸科之目進士尤貴其得人亦最盛焉進士科當唐之晚節尤為浮薄世所患之如杜牧白居易楊綰顔真卿韋貫之裴垍皆舉進士第者也歐陽公唐選舉志曰方其取以詞章類若浮文而少實及其臨事設施奮其事業隱然為國名臣者不可勝數遂使時君篤意以為莫此之尚及其後世俗益偷薄上下交疑因以謂按其聲病可以為有司之責舍是則汗漫無所守遂不復能易嗚呼乃知三代鄉里德行之舉非至治之隆莫能行也科舉大司徒以鄉三物教萬民而賔興之閭胥書其敬敏任恤族師書其孝悌睦姻有學者黨正州長則書其德行道藝鄉大夫三年大比則興賢者能者以禮禮賓之鄉老鄉大夫獻賢能之書于王王拜而受之登于天府內史二之此古之制也漢世取士策于天子曰賢良方正察于州郡者曰孝亷茂材升于學校者曰博士弟子以至書疏論事吏稱其職公府辟召亦皆得以自奮於其間大則取其行次則取其學又次則取其言又次則取其能廣其科目以籠天下之材遣詣丞相府書行藝年酈食其家貧落薄縣中謂之狂生韓信家貧無行不得推擇為吏陳湯乞貸無節不為州里所稱故能自持於鄉里者然後州縣拔為幹佐曹吏能自立于州縣者然後五府辟為曹掾能自效於五府者然後為朝廷選用此猶有古人考行之遺意如朝錯董仲舒公孫𢎞魏相則以賢良對策舉如路溫舒王吉鮑宣蓋寬饒則以孝亷舉蕭望之匡衡貢禹倪寬則以明經舉主父偃徐樂嚴安則以上書進武帝之詔有令州郡察吏民有茂材異等可為將相及使絶域者是舉茂材者也公孫𢎞功令有太常擇儀狀端正者補博士弟子通一藝以上補左右內史是舉弟子者也後漢光武以科目取士順帝時左雄有察舉之法限以四十儒者試經學文吏試章奏於是得陳蕃李膺之徒魏陳羣有九品中正之法及其弊也惟知閥閲非復辨其賢愚故劉毅云下品無高門上品無寒士至隋開皇而罷於是而始有進士之科至唐取士之科大要有三學館曰生徒由州縣者曰鄉貢而天子之自詔者則曰制舉如師德之薦狄仁傑韓愈之排佛老李絳之直道進退陸贄之論諫皆由進士者也張九齡以道侔伊吕進韓休以文經邦國進姜公輔以直言極諫進元稹以才識兼茂進此由制舉得者也何蕃持節守正而六館之士遂不從亂則學館之所得者益可知矣然而唐得人之盛尤盛於進士唐史臣曰方其取以文章類若浮文而少實及其臨事設施隱然為國名臣者不可勝數是有取於進士也其後楊綰雖力言進士之弊請復孝亷之科而終不之勝鄭覃嫉進士之浮薄屢請罷去而卒不之聽李德裕論進士不根藝實其議亦寢而不行終唐之世進士之科雖不改而試者猶恨其一切取文藝而略行實也雖然張昌齡王公謹有時名而王師旦惡其浮薄不書以第盧照鄰駱賓王文章為冠裴行儉謂其浮躁抑之使不進是豈不足以厚士風乎宋取士有賢良有宏詞有進士數科皆足以得人富公蘇文忠以制科進蘇易楊文忠以宏詞進杜祁公范文正韓魏公歐陽公李文靖向文正皆由進士舉其他名臣何可勝數學校古者家有孰黨有庠遂有序國有學大司樂掌成均之法以治建國之學政而合國之子弟焉凡有道有德者使教焉故曰樂德曰樂語曰樂舞皆其教之略也大胥掌學士之版以待致諸子春入學舍菜合舞秋頒學合聲以六樂之會正舞位皆其教之節也禮射於序則州長主之飲酒于序則黨正主之春秋時子産不毁鄉校則春秋猶未盡廢也秦人廢書坑儒則學絶矣漢髙祖時叔孫通為奉常雖有諸子弟共習禮儀然未遑庠序之事文帝始廣遊學之路武帝慨然上慕三代公孫𢎞為學官悼道之久鬱乃請增置博士弟子員太常擇民儀狀端正者請著功令自此來公卿大夫士吏彬彬多文學之士矣東漢之興修造大學逮明帝行三雍之禮冠帶圜橋門者億萬計而又别立學舍自期門羽林之士悉通孝經胸奴亦遣子弟入學此漢儒學之盛也安和以來博士倚席不講而學舍鞠為園蔬唐制諸學有國子有太學有四門律學而京師州縣又皆有學皆𨽻國子監而博士必為之分經教授太宗增築學舍至千二百區四方學者雲集京師四夷皆遣子入學范祖禹作唐鑑亦云唐之儒學惟貞觀開元為盛天寶以後學校益廢太祖皇帝當干戈甫定首幸國子監天聖中王沂公守青州請為州立學仁宗時從其請而郡學之建自此始景祐藩鎮立學而駸駸益盛慶厯三年不獨藩鎮而州府軍監皆立學矣於斯時也師儒之官其精求審擇之意見於詔令有曰必取文行學官講說神宗之時天下官悉自朝廷除授而天下之學愈重矣教化司徒一職謂之教典而教法之施凡十有二自比閭則使之相保相受自州而鄉則使之相賙而相賓州長之教治政令則屬其民而讀法黨正之政令教治則又屬民而讀法師氏掌詔王者也則教之三德教之三行保氏掌諫王者也則教之以六藝教之以六儀而司諫則掌糾萬民之德而勸之以朋友正其行而强以道藝此化之純被於天下而人有士君子之行也秦人變古一切以勇力為尚其所以教民者非殺敵獲首之事則戰爭鬭攘之法里則使相司而連坐家則使子弟而出贅其相親相保之意將安在哉漢之文帝清净寡欲躬行淵默專務以德化民以道德為麗示朴以為先列於朝廷者如石奮之長者用於州縣者如文翁之興學是以海內富庶興禮義自愛而重於犯法先行義而後詘辱也孰謂教化為迂闊哉至於孝武急於用兵興師之事而何暇教化孝宣區區於獄訟名實之間而何暇教化唐之太宗却封德彛刑罰之說用魏徵教化之論偃武修文力行仁義鞭背之刑不忍用也斷足趾之法不敢存也是以家給人足歲終斷獄才二十九人四夷酋長皆襲衣冠坐享仁義之效孰謂教化為迂闊哉明皇狃於太平奢侈之習初何心於教化憲宗奪於皇甫鎛掊刻之習而亦莫知所以教化仁宗皇帝在位四十二年專以教化養育天下而生民何其幸歟射射之所起起於黃帝繫詞云古者揉木為弧剡木為矢弧矢之利以威天下又世本云揮作弓夷牟作矢皆黃帝之臣也是弓矢起於黃帝也虞書曰侯以明之是射見於堯舜也夏商無文周則具矣故弓之别有六司弓矢曰王弓弧弓以授射甲革椹質者夾弓庾弓以授射豺侯鳥獸者唐弓大弓以授學射者使者勞者矢之别有八司弓矢曰枉矢潔矢利火射用諸守城車戰殺矢鍭矢用諸近射田獵矰矢茀矢用諸弋射常矢痺矢用諸散射侯之别有三司裘曰王大射則共虎侯熊侯豹侯諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠周制諸侯歲獻貢士於天子天子試之射宫其容體比於禮其節比於樂而中多者得與於祭數與於祭而君有慶益以地其容體不比於禮其節不比於樂而中少者不得與祭數不得與祭而君有責削以地是以諸侯君臣盡志於射以習禮樂天子將祭必先習射於澤宫澤者所以擇士也又曰射之為言者繹也繹者各繹已志也故心平體正持弓矢審固則射中矣射有三焉曰大射曰賓射曰燕射士無大射而有賓射燕射庶人無賓射燕射特有主皮之射而已司裘云虎侯熊侯豹侯此大射之侯也梓人所謂張皮侯而棲鵠則春以功是也射人以射法治射儀王射三侯五正諸侯射二侯三正卿大夫射一侯二正士射豹侯二正此賓射之侯也梓人所謂張五采之侯則遠國屬是也鄉射記曰九侯天子熊侯白質諸侯麋侯以赤質大夫布侯畫以虎豹士皮侯畫以麋豕此燕射之侯也梓人所謂張獸侯以息燕是也大射之侯用虎熊豹麋之皮飾其側而中又制皮以為鵠賓射之侯亦虎熊豹麋之皮飾其側而中畫五采以為正燕射之侯則畫熊麋虎豹鹿豕之形以象鵠此三射之别也若天子諸侯之射則先行燕禮以明君臣之義卿大夫則先行鄉飲之禮以明長幼之序夫三射者貴其容體比於禮其節合於樂故謂之禮射其樂天子以騶虞為節諸侯以貍首為節卿大夫以采蘋為節士以采蘩為節騶虞者樂官備也貍首者樂會時也采蘋者樂循法度也采蘩者樂不失職也故明乎其節之志以不失其事則功成而德行立無暴亂之禍而國家安故曰射者所以觀德也白虎通曰天子射百二十步諸侯九十步大夫七十步士五十步所以明尊者所服遠卑者所制近也通典曰按鄭𤣥說射禮入嘉禮今按五帝三王之時天下萬國迭相征伐士之志藝以射為首是以開元中修五禮以射禮入軍禮焉古者天子之大射曰射侯者射為諸侯也射中則得為諸侯不中則不得為諸侯是以諸侯君臣盡志於射以習禮樂夫君臣習禮樂而以流亡者未之有也漢明帝則行大射禮於辟雍唐武德則行大射禮於武德殿貞觀則行於觀德殿開元則賜百官於安福樓下自此遂廢宋朝淳化五年行大射詔有司講求典故自周官射禮及開元開寶禮斟酌損益為圖來上其儀之陳始如元會謁見己事武辨改服酒行有遍樂詩有節熊羆設侯金石在簴賞物罰爵東陳西置衣裳冠冕制邦尊卑表著埒位辨遠近威祲儀縟璀璨焜耀帝覽其圖庸極嘉歎將俟弭兵舉行其禮皇乎蒸哉爰暨咸平光紹前烈講肄池上慨想古禮聖聖心傳同出一揆此皆大射之禮也其外又有鄉射之禮主皮之射有習武之射卿大夫之職曰以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞漢甘露石渠議黃門侍郎臨奏鄉射合樂大射則否何也韋𤣥成曰鄉人無樂故合之朝廷君臣故有樂矣時以為然此鄉射之禮也主皮之射有二一乃卿大夫從君田獵班餘獲而射書傳曰凡祭取餘獲陳于澤然後大夫相與射也鄭注鄉射云主皮者無侯張獸皮而射之主於獲也二乃庶人主皮之射鄭注周禮云庶人無侯張皮而射之是也此主皮之射也司弓矢曰弧矢以授射甲革椹質者此習武之射也古者祈子帶弓韣生子垂桑弧其成童也教以射其貢也試以射又有投壺之禮以習于射夫投壺之籌曰矢勝算則以馬贊其詩則以司射實其算則以射中弦其詩則以射節之貍首鼓其節則以射鼓之半而釋算數算勝飲不勝皆與射節相類則投壺亦兵象也蓋兵凶戰危人情之所惡飲酒相樂人情之所欲先王因其所欲而寓其所惡使其樂為之不憚則平日所習乃異日之所用也昔晉侯與齊侯左昭十二年宴飲投壺祭遵臨戎雅歌投壺然則投壺者又古人所以習射者也其可忽哉博洽上博洽之士古今之所重也然其所以為博者則有不同焉如左史倚相能讀三墳五典八索九丘而右尹子革能誦祈招之詩司馬遷自幼即誦古文而又南遊江淮上㑹稽探禹穴窺九疑浮沅湘講業齊魯之都觀夫子遺風是以涉獵廣博貫穿經傳馳騁今古揚雄博覽無所不見以為經莫大於易故作太𤣥傳莫大於論語故作法言史篇莫善於蒼頡故作訓纂針莫善於虞針賦莫深於離騷故反而廣之辭莫麗於相如故作四賦班孟堅以為仲舒司馬遷劉向揚雄皆博物洽聞通達古今又謂向雄博極羣書非虛言也後漢周興博學洽聞而三墳五典無所不覽謝該博通羣藝周覽古今而孔融謂其卓然比跡前列建安中樂詳條左氏疑滯數十事以問該皆為通解之名為謝氏釋至於博學稽古周弼比之武庫以為五經縱橫一時之傑則有若晉之裴頠博綜典籍當時號之為書淫而得武帝一車之書披閲不怠則有若晉之皇甫謐博學多通為左氏經傳集解而自言有左傳之癖則有若晉之杜預博極羣書於文字禽獸草木尤稱精詳則有若梁之顧協遍覽經史人主問以大義及歷代史商較縱橫應答如響者梁之徐摛也博學無所不見聚書至萬餘卷率多異本而五經笥之目虞世南猶能道之者梁之任昉也淹貫古今號為書簏以文選之學講授諸生者唐之李善也天資好學得集賢書讀之六年無所不通者唐之陽城也天下之書無有不讀而一經目則弗忘文宗以為當代仲尼者唐之王起也此皆博於學問者也漢武帝亡書三篋惟張安世識之後求得其書以相校無所遺失後漢應奉凡所經履莫不暗記録囚徒數百千人其罪係姓名坐狀輕重無所遺脫王充閲市肆賣書一見輒能誦憶荀悅每之人間所見篇牘一覽亦能誦記禰衡讀蔡雍碑一覽之餘書之不差而所不能明者止於石缺二字楊修與曹操讀曹娥碑先悟黃絹韲臼之句而謂有智無智校三十里魏王粲讀道旁碑而暗誦之頃不失一字唐蕭穎士與李華陸據讀龍門道旁碑穎士即誦華凡再閲據三乃能盡記而聞者謂三人之才于此分焉若乃所談數百千條皆王儉之所未覩而為儉之所歎服者非齊之陸澄乎該通羣籍任昉劉諷輩以祕閣四部之書問其所知自甲至丁各說一事且叙述作之體莫見所遺非齊之何憲乎於學多所諳記湘東王以四部書目試之自甲至丁卷中各對一事且及於作者姓名非梁之臧嚴乎暗寫漢書五行志略無遺脫非梁之陸倕乎答劉顯漢書十事之問無所疑滯非梁之韋載乎博綜羣書沈約任昉以下每有遺忘皆從訪問而能識楉酒之字知作譜之因記荷槖千里酒之事又非梁之劉杳乎元魏闞駰於三史羣言經目則誦之時人有宿讀之譽隋王劭之在齊時答祖孝徴等古事之問具論所出而取書驗之一無舛誤唐李雍謁李嶠求見祕書未幾辭去而李嶠試問之際奧篇隱帙了辨如響吕向即市閲書而記問之敏至於能通古今韋述觀元行沖數車之書而於前世之事熟復詳諦如指諸掌張巡讀書不過三復終身不忘而士卒居人一見問其姓名後無不識唐德宗詢凌烟閣壁文之缺無能知者而蔣義以為聖厯侍臣圖贊口誦帝前不失一字遂使德宗歎息有虞世南默寫列女傳不能過此之言古者又有策士之法梁沈約䇿以經史十事者劉顯也而顯對其九梁湘東䇿以百事者張綰也而綰之對止缺其六故有百六之目此皆博於記誦者也鄭子産答韓宣子黃熊之問而知鯀之化為黃熊答叔向實沈臺駘之問而知堯遷閼伯於商丘而主辰遷實沈於大夏而主參晉蔡墨因龍見於綘而言豢龍御龍氏之源周內史因神降于莘而謂祝融檮杌鸑鷟應三代之興束晳論曲水而知羽觴隨波金人捧劍之事此皆博於古事者也子夏聞讀史記者有晉師三豕渡河之誤而辨其為己亥之字晉荀朂撰次汲冡竹書以為中經而列之於祕書束晳觀汲冡之書而隨疑分釋皆有義證齊王僧䖍見楚冡簡書而知其為科斗書考工記周官之所缺之文若夫議美陽之鼎而識其為周室褒賜大臣與其子孫之刻銘先功者則漢之張敞也覩缺簡而識其古文尚書所刪之逸篇覩古器而能讀其隱起之文無有疑滯者梁之劉顯也於齊永明時而能辨襄陽竹簡古書為周宣之前者江淹也於梁武帝時而能辨鄱陽王真本漢書之僞者劉之遴也辨甸服黃鍾之銘則唐之鄭欽說也此皆博於古文者也晉昭子問少皥官名於郯子告以黃帝以來紀官之制後漢應劭博覽多聞著漢官禮儀故事而朝廷制度多劭所立若無書不讀長於漢書舊典則蜀之孟光也祖宗制度之遺指掌畫地舉手可採則蜀之胡潛也博物多識問無不對而能興造制作則魏之王粲也博究儒術而羊祜等分定禮儀律令皆先咨而後施用則晉之鄭冲也練習朝議世相傳授並諳江左舊事而為王氏青箱之學則晉之王彪也朝儀舊典晉宋以來故事撰次諳憶無所遺漏理事之際决斷如流而自謂江左風流宰相若晉謝安之比則有若齊之王儉焉博涉多通尤悉魏晉以來故事沈約謂其諳博雖胡廣無以加則有若齊之范岫焉歷任三代該悉舊章博物洽聞當世取則有若梁之沈約焉博通經史多識前載王儉居職以後莫有逮者朝儀國典皆預圖議則有若梁之徐勉焉詳練故事自晉宋起居注亦能記誦梁武帝每訪前事即以所問隨機斷决而任昉則有讀誦之號則又有孔休源者焉以至元魏之鄧彥海明解制度多識故事唐之蘇瓌多識臺省舊章一朝格式咸所刪正此皆博於典故者也元魏崔浩總核天人之際舉其綱紀者數家多有應驗故其推熒惑之失而知其入秦之分推三隂用兵之義而知蠕蠕之必克高允論漢元年十月五星聚東井而謂金水二星無因背日而行崔浩始雖不服及加考究乃以前三月聚于東井果如允之所言此非博於天文者乎漢夏侯勝舉洪範傳厥罰常隂之證而霍光張安世益重經術之士梁丘賀筮旄頭劍墮之異而宣帝以其應加近幸之禮京房分六十四卦更直日用事以風雨寒溫為候而各有占驗此非博於隂陽卜筮者歟昔裴秀為禹貢地域圖其體有六而因地制宜以校險夷之異潘京辨武陵郡名而知其改於漢光武之時齊崔慰祖答謝朓地理十餘事之問而酬據精悉朓遂有班馬復生無以過此之歎梁裴子野能知白題滑國之所自出唐李百藥能知琅邪刈稻之所本以至唐許敬宗古長城之對昆明池之對帝丘濟水之對條陳不差賈耽于天下地土山川必究知之故有隴西山南之圖洮湟甘涼之録而海內華夷古今郡國亦莫不有圖宋劉敞使於虜中亦能以松亭徑易之路質其譯者使之相顧駭愧此非博于地理歟博洽下季桓子得土羊之異而仲尼辨之以為羵羊夫差得骨節專車之異而仲尼辨之以為防風氏之骨陳有隼貫楛矢之異而仲尼辨之以為肅慎之矢聖人之博物通理固非常人之所能及也然古之君子凡所謂博物亦豈無其人乎如管仲識俞兒為登山之神而謂霸王之君興介葛盧聞牛鳴而知其生三犧之驗展禽識海鳥為爰居而譏臧文仲之妄祀史趙以亥有二首為絳縣老人之年而士文伯能知其數東方朔識建章騶牙而知遠方之來歸終軍識豹文鼮鼠而為漢武之所賞二事漢書無之晉竇伋亦識鼮鼠而據爾雅以答世祖之問則亦可以為博矣後漢賈逵證神雀以為降胡之證顯宗時有神雀五采色帝以逵博物多識問之對曰宣帝威懷戎狄神爵乃集此降胡之證也帝敕蘭臺給筆札使作神雀頌魏王粲識舊佩而復為玉佩之法周廟欹器漢末不存而晉之杜預則能創意造之當時朝野以其胸中無所不有而美之以武庫之號若張華之在晉則為尤博者焉華强記默識四海之內若指諸掌而又雅愛典籍天下竒祕悉在其所由是博物洽聞世無與比武帝問漢宮制度及建章千門萬户則應對如流畫地成圖時人比之子産而龍肉之異則華能知之化生之驗則華能知之臨平石鼓槌之無聲者取於蜀桐之叩豐城寶劒若龍泉太阿者得於紫氣之祥則又非華莫能識之以至指南車之轉於銅機欹器之合於魯廟者齊之祖冲之也覩白鳥之獻而知其敬宗廟之應者齊之范雲也論宗廟之犧尊而以齊尊之牛形為古之遺制者梁之劉杳也識人日之名而用董勛答問以明其說者則若元魏之魏收答太宗雉集之問而能知秦文公漢光武之祥則若唐之褚遂良辨北虜之駮而誦山海經管子之書以曉之則若宋朝之劉敞不特此也齊陸澄能辨古器為服匿之名而知為單于與蘇武之器唐元淡之能辨别銅器為晉阮咸之作此皆所謂博物者也後漢蔡雍知㸑桐之美而取為焦尾之琴聽鼓瑟之音而知其有殺心之兆晉荀朂識趙之牛鐸而樂音果諧識宫聲之鐸振於空地而得鍾以成衆樂之和則唐李嗣真實能之見按樂之圖而辨其為霓裳之三叠則唐王維實能之見岑陽古鍾而識其為姑洗之角則唐楊收實能之兹非博于樂乎該綜百氏皆避其諱則徐勉以知名於梁尤明姓系自魏晉以降推本其來皆有條序則路敬淳以知名於唐通姓氏學世號肉譜虞世南歎其可畏而美之為人物志則又李守素之所以顯於唐者兹非博于譜牒者乎如學天官于唐都受易于揚何習道論于黃子而為六家指要之論則有若司馬談者焉積思經術晝誦書傳夜觀星宿著新序說苑及洪範五行傳論則有若劉向者焉講六藝傳記諸子賦詩數術方伎無所不究而集六藝羣書别為七略考定律厯著三統厯譜則有若劉歆者焉後漢王景廣窺衆書又好天文術數之事深沉多藝班固博貫載籍九流百家之言無不通究延篤博通經傳百家之書有名京師劉寬學歐陽尚書京易韓詩而星官風角算厯皆䆒極師法號為通儒樊英習京氏易兼明五經而風角星算河洛七緯推步灾異皆其所善徐稚學嚴氏春秋京易歐書而風角算厯河圖七緯亦所兼綜兩漢儒者自經傳之外其他所習者如翟方進之好天文星厯蔡雍之好術數天文鄭𤣥之通三統厯九章算術任安之兼學圖䜟申屠蟠之兼明圖緯皆炳然可見者內總朝政外供軍旅决斷如流賓客輻湊內外咨禀目覽訴訟手答箋書耳行聽受口並酬應不相參涉悉皆贍舉則有若宋之劉穆之者焉博覽經史隂陽百家之言精於天文之會自朝廷禮儀策詔軍國書記無不關總而留心於制度科律長於計謀自比張良而謂其稽古過之則莫若於元魏之崔浩梁顧野王遍觀經史精記默識而天文地理蓍龜占候蟲篆竒字無所不通後周沈重學業該博為世儒宗而隂陽圖緯無不通涉隋劉焯以儒學知名賈馬王鄭所傳章句多所是非而九章算術周髀七曜推步日月之經量度山海之術莫不窮其祕奧劉光伯於周禮等十三家之義並堪講授史子文集嘉言美事咸誦于心天文律厯窮核微妙凡此皆於經傳百家號為兼通而不以一藝自名者也氏族古者有姓有氏有族姓出於一而百世不可易者謂之姓别其枝派各取以為號者謂之氏合而言之一派之所出者謂之族如齊本姜姓則姜氏之正派者便是吕氏其他如申國許國之類雖同出於姜姓而枝派却别後世姓氏淆亂俱失其從來今之姓方古之氏也古者天子建國賜姓命氏姓氏所以别其族類之所出也自三代之衰稱姓者以國或以族或以地或以官子孫各本於其祖不可改也後世非有親者附之屬籍或加於盜賊夷虜以逆賊異類為同宗然則古之賜姓者别之今之賜姓者亂之也夫為天親不可以人為而强欲同之豈循禮乎上瀆其姓下忘其祖非先王之制不可為後世法也裴駰注史記帝紀曰天子賜姓命氏諸侯命族族者氏之别名也姓者所以統繫百世使不别也氏者所以别子孫之所出也故世本論篇言姓則在上言氏則在下古書所稱百姓皆謂百官蓋民無姓也唐張說曰古未有姓自炎帝之姜黃帝之姬始因所生地而為之姓其後天子建國因生以賜姓黃帝二十五子而得姓者十四德同者姓同德異者異左氏春秋傳言天子建德因生以賜姓胙之土命之氏諸侯以字為氏以諡為族堯賜伯禹姓曰姒氏曰有夏伯益姓曰姜氏曰有吕下及三代官有世功則有官族邑亦如之後世或氏於國則齊魯秦吳氏於諡則文武成宣氏於官則司馬司徒氏於爵則王孫公孫氏於字則孟孫叔孫氏於居則東郭北門氏於志則三烏五鹿氏於事則巫乙匠陶於是受姓命氏燦然衆矣枝分派别初若參錯徐而考之有綱有條猶指諸掌孟仲季臧同出於魯也穆伯子文子僖伯游國豐印同出于鄭也吉參卷童父向華蕩樂同出於宋也宜督父意諸吕欒高崔國同出於齊也子雅徯大歸父如陳伯袁之後而為袁氏齊公子高之後為高氏衛公子衛孫之後為孫氏魯閔子騫之後為騫氏是以美之字為氏也如文王封子聃叔於沈故其後為沈氏晉穆叔封少子成師於韓故其後為韓氏晉獻公封畢萬於魏故其後為魏氏越之後食於歐山之陽而為歐陽氏是皆以所封之邑為氏也如黃帝之子能制弓矢為弓之長因為張氏周史佚也世守其官因為史氏周平王少子有文在手曰武因為武氏金日磾以獲胸奴祭天金人因以為金氏是皆以一時之事為氏者也此數者皆以表功德明人倫奈何至其久則不然故聲相近則訛其聲字相近則訛其字如夏啓封支子於莘而其後為辛氏周武王封虢叔於西虢而其後為郭氏是皆以聲相近而訛其姓也如邾子之後去邑而為朱氏䢴氏之後去邑而為于氏皆以字相近而訛其姓也甚者如趙奢因封馬服君其後轉而為馬婁敬因漢高祖所賜其後轉而為劉氏田千秋因乘小車遂轉而為車氏灌夫因以灌嬰所薦遂蒙而為灌氏京房吹律而為京氏陸羽筮易而後為陸氏吳是本儀氏儀也因孔融之嘲而改曰是晉嵇康本奚姓也因家嵇山而改曰嵇束晳本疏廣之後因避難而改為束賀循本慶普之後因避諱而改為賀第五倫其先齊諸田之族也田氏之族衆以次為氏而因曰第五左思其先齊之公族也以其左右公子之名故因為氏而改曰左是又皆率意以更其姓也至其後世相去既遠又安能辨其祖之所自出邪夫祁氏一族至堯别而為陶唐氏至夏别而為御龍氏至商别而為豕韋氏至周别而為唐杜氏至晉别而為范氏至秦别而為劉氏凡六别其姓焉媯氏一族至舜别而為姚氏至胡公别而為陳氏至敬仲奔齊别而為田氏至齊王建之子别而為王氏凡四别其姓焉是豈非姓多而訛其族乎今夫杜氏一姓也惟杜伯之後不遷者為杜城杜氏至漢建平侯延年之後則為京兆杜氏晉當陽侯翦之後則為襄陽杜氏如子寬之後則為亘之杜氏赫子威之後則為濮陽杜氏是杜氏一姓而五望也張氏一姓也而常山王氏之後則為河間張氏留侯良之後則為武城張氏北平侯之後則為中山張氏後漢廣陵太守綱之後則為馮翊張氏後漢蜀郡太守睦之後則為吳郡張氏晉司空華之後其一徙居河東則為河東張氏其一徙居河南則為河南張氏漢相安世居繁水則為魏郡張氏唐相鎬世居平原則為汲郡張氏唐相亮又為鄭州張氏是張氏一姓而十望也劉氏一姓也而楚元王交之後則為南華劉氏景帝弟子趙欽肅王之後則為廣平劉氏長沙定王之後則為南陽劉氏光武子廣陵恩王之後則為臨進劉氏章帝子河間孝王之後則為尉氏劉氏唐相文靜唐相瞻則為彭城劉氏是劉氏一姓而六望也若是則豈非望多而訛其姓乎非特此也至其弊則若河南劉氏則出於胸奴冒頓能無纍於劉漢之後乎安東王氏則出於阿布思營州王氏則出於高麗能無愧於周齊之後乎柳城李氏則出於契丹代北李氏則出於沙陀李正巳則出於高麗李寶臣則出於奚種能無愧於臯陶之後乎此後世之弊也蓋自秦滅學之後公侯子孫失其本末漢興司馬遷乃約世本修史記因周譜明世家乃知姓氏之所由出虞夏商周昆吾大彭豕韋齊桓晉文皆同祖也更王迭伯漢高祖徒步有天下命官以賢詔爵以功誓曰非劉氏無功而王者天下共誅之逺至公卿之胄才則用不才則棄之不辨士與庶族然則始尚官矣然猶徙山東豪傑以實京師舉諸田屈景皆右姓也魏立九品置中正尊世胄卑寒士權歸右姓晉宋因之于時有司選舉必稽籍而考其真僞故官有世胄譜有世官由是有譜局令史江左則僑姓王謝袁蕭為大東南則為吳姓朱張顧陸為大山東則為郡姓王崔盧李鄭為大關中亦號郡姓韋裴柳薛楊杜首之代北則為虜姓元長孫宇文首之虜姓者魏文遷洛有八氏十姓三十六族皆其宗屬部落也郡姓者以中國士人差第閥閲為之制曰膏粱曰華腴而又有甲姓乙姓丙姓丁姓謂之四姓北齊因仍凡舉秀才非四姓不在選中唐太宗以山東士人尚閥閲雖族已衰而子孫猶負世望至有賣婚之弊由是詔高士亷等考天下之譜牒進忠良退凶惡先宗室後外戚退新門進舊望左膏腴右寒畯合為九等號曰氏族志夫自秦漢以來氏族之制出於上之所賜下之所更者絶無而僅有至於世守一氏待千餘年而不變其别非若古之多然人罕有辨氏族之原者如王氏一也吾不知其出於元城之王邪宜春之王邪卭城之王邪劉氏一也吾不知其出於陶唐之劉邪見高祖贊奉春之劉邪元海之劉邪晉趙元本胸奴其能明辨而不惑者鮮矣氏之馬者未必能辨其為馬服之馬及馬矢之馬也後漢馬隆先本馬矢氏氏之石者未必能辨其為周之石周石速衛之石石碏及後趙之石也古之氏族繁而知之者反多今之氏族簡而知之者反少其說果安在邪蓋由譜牒之明與廢也竊考自古善論姓氏者魯有衆仲晉有胥臣鄭有行人子羽皆能探討本原自炎黃而下如指諸掌後世如漢鄧氏官譜應劭風俗通王符潜夫姓氏篇晉摯虞之族姓昭穆賈弼之姓氏簿晉太元中賈執之姓氏英賢宋何承天之姓苑王僧孺之百家譜唐柳沖之姓系録韋述之開元譜栁芳之永泰新譜李守素之肉譜蕭穎士孔至之百家類例皆以名儒世學疲精歲月而後成書唐張九齡而下至宋諸儒益盡信之然而因陋就誣不可以訓自應劭以來所著大議如齊秦晉楚本非國姓亂其族系他姓尚多有之良由應劭一誤後世相沿未知有改故也獨林寶作元和姓纂稍能是正歐陽修作唐宰相表凡九十三族尤為精詳至鍾陳韓高之氏亦有訛舛近世名儒又有作古今姓氏辨證之書者此譜牒之學也昔李義府不得與於李崇德之譜乃傅致其罪杜正倫不能齒於城南之譜乃鑿通其渠今欲定譜牒而核僞真使天下後世知所以尊祖敬宗之道必能因其所是正其所非以刋一定之書如成周小史之所職者以頒行於天下俾天下明其本系之所自出則世系之混殽昭穆之紊亂其何慮歟羣書考索卷三十四
