body:
  text: 羣書考索後集卷二十四宋章如愚編官制門歷代守令自秦廢封建之法罷侯置守漢興孝文始為銅馬竹使之符而景帝立未釐兩轓之制凡以重郡國之任故有守令入為公卿出宰百里其有治理效者增秩賜金久任其任故終漢之世風流美績班班可考焉若黃霸以教化治潁川龔遂之儉約化渤海朱邑以存問耆老為心文翁以建立學校為盛信臣以興科勸農而盜賊衰杜詩以誅暴清平而威名赫立以至任延學禮於九真錫光變俗於交趾魏尚亷范之守雲中而胸奴逃遁祭彤陳禪之守遼東而胡蠻威服皆刺史郡守之得人者也至於萬户之令一邑之長皆有著稱修德則太丘之陳實教化則雍丘之劉矩卓茂之治密則人愛而不欺魯恭之治中牟則化及而致異以至董宣之在洛陽劉昆之在江陵虞詡之在朝歌鍾離意之在瑕丘此皆前世得人之盛而後世莫及焉及曹魏之世則杜畿之守河東鄭渾之為沛郡倉慈之抑權右蘇則之撫流俗至於為令則有若楊沛之宣奉科法焉晉室之興則魯芝之勉以黃霸胡威之傳父清德鄧攸開倉以振貧曹攄縱囚而復會至於為令則有劉超之推誠於物焉宋氏之世間有其人王鎮之之不受俸祿江秉之之不營田業杜慧度之為政纎密則如治其家斯亦顯然而可道者也至於南齊則虞願以清廉顯於晉安傅琰以竒績顯於山隂南梁則庾蓽以潔白稱於會稽丘仲父以權變過於劉傳北魏則張膺清白著稱竇瑗政績聲譽齊宋世良施八條之制盜奔他境房豹以一井得甘泉為政所致降及於隋則有若梁彥光之守鄴郡而以儒學移風俗公孫景茂之治零陵而以秩俸買牛犢辛公義則又有慈母之稱魏德深則有歸市之感漢唐之代多得其人韋仁夀之鎮撫南寧賈敦頥緝治東洛倪若水隆儒於汴州薛大鼎興利於滄棣田仁會之暴身致雨韋景駿以至孝感人擒盜輒捨則元德秀道不拾遺則張允濟與夫李朝隱之清正剛烈韋抗之不事威刑至於五代之際猶不乏人如郭延魯之守泌州而父子繼聲符令謙之治趙郡而號為德政此亦一時循亷之吏也夫由魏晉以降其間守令之賢雖隨世而有然終不及兩漢何哉文中子續詩至郡縣之政每傷焉曰其從也雖有善政未及行也蓋必有久任責成之意而後吏治可興也漢元功侯籍自古帝王之興必有英傑之輔經營共其始成始同其功安榮增其眷而悠久襲其慶故太常之書司勳之二盟府之藏周家之制其有由來矣漢髙帝龍興泗濱虎嘯豐谷一時之士咸願效其尺寸以垂著於竹帛始自楚陳之嵗魚鱗雜襲填然來附五年而東克項羽趣定功而行封六年而剖封功臣曹參等皆為通侯蓋始有通侯之籍矣班氏作史本原其功以為入載之後侯者百四十有三人有封爵之誓丹書之信白馬之盟又有十八侯位次之作并述其後以功次定朝位表漢興以來功臣因其元功之侯籍以昭之夫所謂十八侯者何也蓋嘗考之顔師古之注則以為蕭何也曹參也張敖也周勃也樊噲也酈商也奚涓也夏侯嬰也灌嬰也傅寬也靳歙也王陵也陳武之與王吸也薛歐之與周昌也丁復之與蟲達凡十八侯者此其功之尤著者也既定十八侯之位合而言之則百四十三人皆著於籍而謂之元功其尤大者若禹成功而申於帝若旦有勳而封於魯以及其次儷景同番悉傳苗裔若商大蒸而誇爾祖之與若君牙受任而美世勞之紀君之報於臣臣之報於君歷萬世猶一日也自時厥後開廟藏覽舊籍宣帝以隆中興之祚四七佐命按籍咸在光武以傳再造之業揆厥所元皆髙皇發之若乃蕭何位第一而居表之十三曹參為次而居表之首周勃位第四而居表之十四蓋籍以功為序而表以封前後為序也陳平與張良同為腹心平之位乃在四十七而良之位乃在六十二或者曰此良平之智當其以功次定朝位之際自貶以晦其迹而非元功之本籍然班固作泗水亭銘十八侯之次有良平紀通而無奚涓薛歐丁復則知良平之在侯籍本非下第也若張敖本無大功可以為蕭曹平勃之亞而其班乃在三得非以其肺腑之恩乎若表之序侯者百四十三人而表增十人去其外戚王子而猶為百四十有七人得非其或有所附益乎亦不可不知也其後在孝文時乃有弓髙襄城之封而外徠者亦侯在孝景時始開封賞之科而降者亦侯在武帝時興羌越之伐而將帥受爵凡應本約者亦封後世承平頗有勞臣故班固於髙惠髙后文功臣表之後又表景武昭宣元成功臣輯而序之以續元功之次又所以見其君能繼髙帝之志云漢侯籍本末髙帝五年冬克項羽趣定功行封六年十一月甲申始剖符封功臣曹參等為通侯訖十二年侯者百四十有三人今謹按史記年表髙祖功臣凡百四十三人班固表位次百三十有七人加以外戚王子六人亦凡百四十三人而表尾定數乃曰百四十七人加外戚王子凡百五十三人固之誤也或者傳寫之訛四十七人當作三十七五十三當作四十三封爵之誓曰使黃河如帶泰山若礪國以永存爰及苖裔於是申以丹書之信重以白馬之盟又作十八侯之位次表髙帝與功臣剖符作誓文書鐡契金匱石室藏之宗廟列侯受封畢至於奏位次皆曰平陽侯曹參功最多宜第一然上心欲何為第一鄂千秋曰蕭何當第一參次之上乃令何第一蕭何曹參張敖周勃樊噲酈商奚涓夏侯嬰灌嬰傅寬靳歙王陵陳武王吸薛歐周昌丁復蟲達此從第一至十八也右見顔師古注酇侯蕭何第一今謹按文頴曰酇音贊臣酇曰國在南陽師古曰或云何封沛郡酇縣才何反非也按地理志南陽酇縣云侯國沛酇縣不云侯國也孫氏曰有二縣音多亂屬沛者音嵯屬南陽者音贊茂陵書何封國在南陽宜呼贊今呼嵯嵯舊字作䣜所由亂也舞陽侯樊噲第二留侯張良第三絳侯周勃第四平陽侯曹參第五户牖侯陳平第六今謹按世家髙帝封平為户牖侯帝出平城南過曲逆乃以平為曲逆侯是户牖為始封而後封曲逆也今十八侯位次從平始封則位次作于圍平城之前也曲逆二字在漢書音義亡别音五臣注陸士衡髙祖功臣頌云曲音區句反逆音遇不知何所據漢書髙帝紀云又戰曲遇東蘇林曰曲音齲遇音顒師古曰齲丘羽反恐地不同非其證也南宫侯張敖第七曲周侯酈商第八潁隂侯灌嬰第九汝隂侯夏侯嬰第十陽陵侯傅寬第十一表諡景漢列侯位次傳諡忠武信武侯靳歙第十二安國侯王陵第十三襄平侯韓信第十四棘津侯陳武第十五曲成侯蟲達第十六汾隂侯周昌第十七青陽侯王吸第十八右見班固泗水亭銘髙后二年詔曰髙皇帝匡飭天下諸有功者皆受分地為列侯朕思念至於久逺而功名不著亡以尊大誼施後世今欲差次列侯功以定朝位藏於髙廟世世勿絶嗣子各襲其功位其與列侯議定奏之丞相臣平等言謹與絳侯臣勃曲周侯臣商潁隂侯臣嬰安國侯臣陵等議列侯幸得賜餐錢奉邑陛下加惠以功次定朝位臣請藏髙廟奏可本紀髙后復詔陳平盡差列侯之功録第下竟藏諸宗廟副在有司表吕氏曰自十九臣下皆平所定也平之第在四十七其自處固善而留侯之第尚在六十二何耶蓋平以知自將固不與功臣爭先若留侯淡然事外雖序曲逆之前亦所不願也髙帝素諒雅意在當時先後必略有定次髙后世特因其舊而詮品之耳曹參位第二而表在首蕭何位第一而表在十三表以封前後故也孟康注髙祖自云吾得天下繇張良稱其才也敘位乃以曹參次蕭何校其勤也至如户數多少或以才德或以功勞亦一定也故稱蕭何位第一户唯八十張良位第三而户過六十他皆類此師古注史記吕后七年丞相平言武信侯吕祿位侯位次第一請立為趙王吕氏曰蓋髙帝定十八侯位次何第一參第二敖第三今年盡定諸侯朝位蕭曹皆死必遞遷張敖第一敖既死遂以祿補其處耳孔衍魏漢春秋曰漢髙祖封許負為明雌亭侯裴松之以為漢髙祖時封皆列侯未有鄉亭之爵疑此封不然景帝子中山王勝勝子貞元狩六年封涿縣陸城亭侯劉備傳漢麒麟功臣宣帝甘露三年單于始入朝上思股肱之美乃圖畫其人於麒麟閣法其形貌記其官爵姓名凡十有一人首博陸侯姓而不名次張安世次韓增次趙充國次魏相次丙吉次杜延年次劉德次梁丘賀次蕭望之次蘇武皆有功德知名當世是以表而揚之明著中興輔佐列於方叔召虎仲山甫焉自黃霸于定國朱邑張敞尹翁歸夏侯勝等皆以善終著名然不得列於名臣之圖以此知其選矣蘇武傳宣帝甘露三年單于始入朝上思股肱之美乃圖畫其人於麒麟閣法其形貌署其官爵姓名唯霍光不名曰大司馬大將軍博陸侯姓霍氏次曰衛將軍富平侯張安世次曰車騎將軍龍額侯韓增次曰後將軍營平侯趙充國次曰丞相髙平侯魏相次曰丞相博陽侯丙吉次曰御史大夫趙平侯杜延年次曰宗正陽城侯劉德次曰少府梁丘賀次曰太子太傅蕭望之次曰典屬國蘇武皆有功德知名當世是以表而揚之明著中興輔佐列於方叔召虎仲山甫焉凡十一人又論博陸侯躬秉節誼定萬世策以安宗廟功德甚茂其冠群后尊而不名張安世宿衛忠正勤勞王家韓增寬和有守世載令聞趙充國料敵制勝奮威先零魏相嚴毅亷正總領衆職丙吉寬厚不伐同心輔治杜延年典司朝政練習憲章劉德宗室之良持身謹厚梁丘賀儒術自進列位九卿蕭望之忠正不撓經術該明蘇武執節忘身不辱國命漢建武封功臣漢光武以睿明英武之資龍飛白水洗滌氛祲復振炎統羣臣翼附爰立雋功昆陽既捷尋邑奔殪進拔邯鄲北州弭定尤來大搶巢穴蕩析銅馬朱鮪先後乞降雖雄斷廟謨冠軼古昔而出竒畫策推鋒鏖戰抑謀臣猛將是賴厥既即祚髙邑定都洛陽帝慊然不以為己功推勞于下以建武二年封功臣皆為列侯大國四縣餘各有差博士丁恭議質古制盛意隆旨曲示優渥乃命謁者畀以印綬乃頒制䇿滿溢示戒謹爾侯度傳爾子孫長為藩屏以固王室若鄧禹則自酇侯而更封梁陳俊則自列侯而更封新處蓋延則自建功侯而更封安平若耿弇之於好畤王霸之於富波任光之於阿陵李忠之於中水皆更封也若萬修之於槐里劉植之於昌城朱祐之於堵陽杜茂之於苦陘亦更封也其定封冦恂馮異則有雍如陽夏之别其定封吳漢祭遵景丹則有廣平潁陽櫟陽之號曰固始曰成安則以封李通臧宫曰昆陽曰伉父則以封傅俊劉隆曰栒邑曰舞陽則以封宋𢎞朱浮賈復以冠軍益封而加二縣隂識以隂鄉增封而遜爵邑丁綝以不求美縣而封定陵新安鄉侯史册所書焜耀舄奕殆與元功侯籍相為終始厥後東克青齊西定隴右庸蜀之區既平既一故建武之十三年班勞䇿勳更封增邑凡三百六十五人又益盛矣髙秩厚禮吏職不任特進朝請加於元勳優遊含𢎞流慶於後計慮深逺何以尚兹至永平之世慨想舊烈而繪象於雲臺逮夫永初聿追盛懿而以紹封大功臣揆元溯端皆建武之制發之矣東漢表及本傳建武二年丁恭議封功臣淮陵侯王霸建武二年更封富波侯十三年增戶邑更向侯阿陵侯任光建武二年更阿陵邑萬戶中水侯李忠建武二年更封中水邑三千户槐里侯萬修建武二年更封槐里侯昌城侯劉植建武二年更封昌城侯觀津侯劉喜建武二年更封觀津侯浮陽侯劉歆建武二年更封浮陽侯劉植傳王郎起植與弟喜從兄歆率宗族賔客聚兵數千人據昌城迎世祖建武二年更封植為昌城侯討密縣賊戰殁子向嗣帝使喜代將植營復為驍騎將軍封觀津侯喜卒復以歆為驍騎將軍封浮陽侯櫟陽侯景丹建武二年更封櫟陽邑萬戶傳建武二年定封丹櫟陽侯帝謂丹曰今關東故王國雖數縣不過櫟萬戶邑耳夫富貴不歸故鄉如衣錦夜行故以封卿爾雍奴侯寇恂建武二年平潁川封雍奴邑萬户傳建武二年定封恂雍奴侯邑萬戶安平侯蓋延建武二年更封安平侯十三年增封食邑萬戶陽夏侯馮異建武二年定封陽夏侯廣平忠侯吳漢建武二年定封廣平食四縣傳建武二年帝遣使者奉璽書封漢為廣平侯食廣平斥漳曲周廣年凡四縣鬲侯朱祐建武二年更封堵陽侯十三年增邑定封鬲侯邑七千三百户髙密元侯鄧禹建武二年春更改梁侯十三年定封髙密食四縣傳建武二年春遣使者定封禹為興侯膠東剛侯賈復建武二年八月封三縣傳建武二年益封穰朝陽二縣十三年定封膠東食六縣祝阿侯陳俊建武二年更封新處侯十三年增邑定封祝阿參蘧鄉侯杜茂建武二年更封苦陘侯十三年增邑更封修侯潁陽成侯祭遵建武二年春定封潁陽侯傳建武二年春征虜將軍定封潁陽侯固始恭侯李通建武二年封傳建武二年封固始侯山桑節侯王常建武二年封郎陵愍侯臧宫建武二年封成安侯十三年增邑封酇侯好畤愍侯耿弇建武二年封食邑二縣傳建武二年更封好畤侯食好畤二縣十三年增邑慎靖侯劉隆建武二年封亢父侯傳建武二年封亢父侯十三年增邑更封竟陵侯昆陽威侯傅俊建武二年封新息侯朱浮建武二年封舞陽陵陽侯丁綝建武二年封定陵新安鄉侯傳丁鴻父綝建武元年拜河南太守及封功臣時帝令各言所樂諸將皆占豐邑惟綝願封本鄉或謂綝曰人皆欲縣子獨求鄉何也綝曰昔孫叔敖勑其子受封必求墝埆之地今綝能薄功微得鄉厚矣帝從之封定陵新安鄉侯食邑五千户後徙陵陽侯宣平侯宋𢎞建武二年壬子封栒邑侯傳建武二年代王梁為大司馬封栒邑侯羣書考索後集卷二十四
