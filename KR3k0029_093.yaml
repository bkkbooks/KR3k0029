body:
  text: 羣書考索後集卷二十七宋章如愚編士門學制類宋朝神宗熙寧元年正月壬寅詔太學增置外舍生百員初太學置內舍生二百員官為給食至是員足逺方之士待次而入者蓋百餘人諫官滕甫劉庠並以為言故有是詔新記書增太學生百人舊記不書熙寧元年五月羣臣凖詔議學校貢舉多欲變改舊法獨殿中丞直史館判官告院蘇軾奏曰得人之道在於知人知人之法在於責實使君相有知人之才朝廷無責實之政則公卿侍從常慮無人况學校貢舉乎雖復古之制臣以為不足矣臣願陛下明敕有司試之以法言取之以實學通經術者雖朴不廢稍涉浮誕者雖工必黜則風俗稍厚學術近正庶幾忠實之士不至蹈衰季之風則天下幸甚上得軾議喜曰吾固疑此得軾議釋然矣長編熙寧元年五月知制誥宋敏求因轉對上言州縣有學舍而無學官四方之士輕去鄉里者以求師也請州置學官三嵗以下務得士三百人今請二百人試詩賦論䇿糊名通考之如舊其百人請如赦文令州郡論薦轉運使審核之太學生則委判國子監官至御試隨其所學而試之學有師故士不輕去鄉里隨其所學而試之則文辭經藝行實之人皆無遺也其後官不數變易太學建三舍命舉人以官州置學官三路取百人多敏求發之也熙寧四年十二月辛亥詔每嵗加賜國子監錢四千緡以增置學官生員用度不足故也熙寧五年八月辛卯國子監外舍生以七百人為額日給食嵗賜萬緡戊戌詔賜懷州州學牧馬草地十頃熙寧五年八月戊戌賜太學生葉適進士及第為試校書郎睦州推官鄆州州學教授適處州人管勾國子監張琥等言適纍試優等也熙寧六年三月丙辰詔諸路學官委中書選京官朝官選人或舉充又詔諸路擇舉人最多州軍依五路法各置教授一員委國子監詢考通經品官及新及第出身進士可為諸路學官即具所著詞業以聞熙寧十年二月戊子詔以光州固始縣户絶田賜國子監贍生員太學西門修築射圃聽諸生遇假日習射並從管勾國子監黃履請也元豐二年五月戊辰朔上批太學外舍生檀宗益上書所論完整學事頗有條理疑其應務之材在所司試判國子監李定嘗保奏自入學無殿罰同齋諸生稱其素行無缺可試校書郎充太學録元豐二年八月丁巳詔益太學生員舍為八十齋每齋屋五間命入內東頭供奉官宋明臣管勾修展元豐二年十二月乙巳御史中丞李定等言竊以取士兼察行藝則是古者鄉里之選蓋藝可以一日而校行則非歷嵗月不可考今酌周官書考賓興之意為太學三舍選察升補之法上國子監敕式令并學令凡百四十條詔行之法太學生檀宗益上書言太學教養之䇿有七一尊講官二重正録三正三舍四擇長諭五增小學六嚴責罰七崇司業上覽其言以為可行命定與畢仲衍蔡京范鏜張璪同立法至是上之太學置齋舍八十齋容三十人外舍生二千四舍生百總二千四百生員入學本貫若州給文據試而後入月一私試嵗一公試補內舍生間嵗又一試補上舍生封彌謄録如貢舉法而上舍則學官不與考校諸齋月書學生行藝以帥教不戾規矩為行治經程文合格為藝齋長諭學録正直講主判官以次考察籍記公試外舍生入第一第二等參以所書行藝預籍者外內舍內舍生試入優平二等參以行藝升上舍分三等俱優為上一優一平為中俱平若一優一否為下上等命以官中等免禮部試下等免解以升補人行藝進退計人數多寡為學官之賞罰緣外舍為姦者論如違制律不用去官赦原學正增為五人學録增為十人學録參以學生為之元豐三年正月辛巳詔改國子監直講為太學博士每經二人元豐三年正月癸未增國子監嵗賜錢萬五千緡以國子監言嵗費錢三萬七千緡而所入才二萬三千緡也元豐三年四月辛酉增國子監嵗賜錢六十緡初給外舍生食人月為錢八百五十至是增至千一百故也元豐三年五月乙丑編修學制所言奉旨立勢要及國子監生太學官親屬許不以鄉貫就開封應舉之法臣等看詳監以國子為名而無國子教養之實恐未稱朝廷建學育士之意乞應清要官親戚並令入監聽讀以二百人為額解發毋過四十人從之哲宗元祐元年十月乙未有詔齊盧宿常虔穎同懷州各置教授一員元祐元年十月癸丑劉摰言國子司業黃隱學不足以教人行不足以服衆又言故相王安石訓經旨視諸儒義説得聖人之意為多故先帝以其書立之於學以啓迪多士而安石晚年溺於字説釋典是以近制禁學者毋習此二字而已至其所頒經義蓋與先儒之説並行而兼存未嘗禁也隱猥見安石政事多已更改輒爾妄意迎合傳意因欲廢安石之學每見生員試卷引用隱輒排斥其説元祐元年十月癸丑吕陶言太學者教化之淵源所以風勸四方而示之表則一有不令何以誨人黃隱素寡問學薄於操行且經義之説蓋無古今新舊惟貴其當先儒之傳注既未全是王氏之解亦未必盡非隱亦能誦記安石新義推尊而信嚮之久矣一旦聞朝廷欲議科舉則諷諭太學諸生凡程文字不可復從王氏新義或引用者類多黜降諸生亦聞安石之死而欲設齋致奠以伸師資之報者隱輒形忿怒將繩以率斂之法此尤可鄙也元祐元年十月癸丑上官均言黃隱自官庠序將及一年考其行則倨傲自任傾邪無常論其學則暗於經術不燭義理興建三舍以來學規弛廢取舍失平未有如今日者也願陛下博採公論早行罷免以副衆心訖不行元祐二年七月丁巳詔內外學官遷年三十以上歷任人充從御史中丞胡宗愈請也學官自罷試多出近臣論薦宗愈言學者初中科遽專師席請擇長才嘗歷任者充選本傳元祐五年十二月丙午岑象言近嵗太學諸生無叩問師資之益學官不以訓導為己任祕書省則多務燕間少親讎校請立訓導之法定校讐之課及聞太學補試伺察不嚴有假手之弊詔令禮部祕書省長二詳度以聞元祐六年八月戊子朔知開封府范百祿轉對言三事其一曰太祖建隆元年正月是嵗二月四年四月太宗端拱元年八月淳化五年十一月真宗咸平二年七月皆幸國子監仁宗天聖二年八月己卯幸國子監謁文宣王召從臣升講堂令直講馬龜符説論語一篇賜龜符三品服伏望陛下詔有司檢舉祖宗視學故事以待萬機之暇而賜臨觀焉今所陳幸太學可以美文明之化紹聖元年五月辛亥詔內外學官非制科進士出身及上舍生入官者並罷紹聖元年五月甲寅三省言學官已立試法耀洪吉饒潭夔利廣桂虔泉等州教授見係吏部差人詔自今三省選差徽宗崇寧三年十一月甲戌幸太學遂幸辟雍詔國子司業吳絪蔣靜各進官一等面賜三品服博士正録滿三考改合入官未滿三考人循兩資學生鄭南等十有六人授官餘免省試免文解恩賜有差詔旨大觀二年正月一日有御製辟雍記今附此崇寧元年八月二十二日甲戌議建外學十月十七日戊辰初建辟雍御製辟雍記鄉舉里選之法掃蕩而士纍於科舉學不為己舍本趨末道聽塗説以應有司之求僥幸一日行不考素賢愚雜揉俾之從政不見大全鮮亷寡恥無不為己歷嵗千百有為之君雖絶俗髙見其設施注措終不能髣佛前古習尚卑陋市利之徒學非先王故也因誤承陋久莫能革惟我神考稽若古昔訓釋經義興置學校崇建師儒天下之士靡然向風始棄聲律雕篆之技遊意於道德性命之理矣朕奉承先志追而述之罷廢科舉增教導之官即國郊之南度地相方建立黌舍因先王禮以制之樂以和之之意命之曰辟雍外圓內方為屋一千八百七十二楹以居天下貢士首善於京又潤色熙豐之成法月書季考核其行能待以嵗月士無苟得苟失之患推三舍法施於天下由外舍升於內舍內舍升於上舍由縣之上升於州由州之上升於辟雍由辟雍以登於太學司成率其屬稽其籍考其成升其尤者命之以官三年大比䇿以當世之務别其等差唱第於廷釋褐而任使之教養之政覃及蠻貊絃歌之聲達於萬里父詔其子兄告其弟相率以善曾不踰嵗咸以行實聞於朝廷載在仕版已踰千計非祖功宗德休養平治何以臻此昔鄭人毁鄉校詩人序而刺之曰亂世則學校不修如今天下被教養之惠凡一十一萬餘人為屋以居之凡萬一千餘楹計其所費錢二百四十一萬餘貫穀五十五萬餘石庠序之盛多士濟濟視古無愧矣朕歷觀在昔教化成人倫明習俗美至於成人有德小子有造蓋上有立道興教之辭下有忘利守義之士維持固結卜世三十卜年八百其遺波餘澤及於後世猶有存者則學校之數治道之首垂世之法無以過也文王作周其詩曰於論鼓鐘於樂辟雍武王能廣文王之聲其詩曰鎬京辟雍自西自東自南自北無思不服蓋武王能廣文王以善養人施之天下而天下服也朕克紹先烈於今其庶幾乎大觀二年正月朔日記長編崇寧四年正月丁丑詔諸路州軍專置學事按差手分一名從通判鄭州曹滋奏請也崇寧四年正月甲午江西提舉學事司言考上舍有地逺而學生少者難於差官乞併撫筠建昌於洪虔袁南安臨江吉試畢具合格人報逐州學參定升貢從之崇寧四年始行三舍之法建辟雍之學又慮山林之士不能月書季考以遊庠序於是又設科場崇寧四年閏二月乙酉詔辟雍以待四方貢士在國之郊太學教養上舍生在王城之內內外既殊而髙下未倫辟雍有司成在侍郎之次國子有祭酒司業列於卿少而已事體不順合行釐正改辟雍司成為太學司成總國子監及內外學事凡學之事皆許專達長編崇寧四年四月甲申增立辟雍國子監等官謁禁長編崇寧四年六月己卯詔在京釐務官本家有服異居大功以上觀聽充國子生見在太學者依此改正內曾隨侍入州學者通理月日從司成薛昂請也長編大觀元年二月乙丑御筆以學校三舍升貢次第著為令編通用令刪之首諸士自縣學教養升之州學州學教養分為三舍自外舍升為內舍自內舍升為上舍自上舍貢之辟雍自辟雍登太學俟殿試命以官長編大觀元年三月甲辰詔有官人與貢士同試合格者上等升二等差遣仍賜上舍出身文學優者取旨推恩中等赴殿試長編大觀元年六月癸酉御崇政殿引見上舍生李邦彥等二十六人孝悌進士三人賜上舍及第釋褐以邦彥為承事郎辟雍博士長編大觀元年閏十月乙未興三舍長編大觀元年十二月壬午御筆八行八刑之士所在皆得以名聞不限在學不在學令學制局申明行下從提舉福建路學事陳汝錫奏請也長編大觀四年八月己卯詔䇿士於庭諏以世務深惟神考盛德美意所宜遵承比閲學制貢士入上等者引見釋褐止以有參校而不復庭䇿豈神考之志哉自今入上等者與中等並留太學以俟殿試其上等人遇取名取旨政和三年四月甲申宣義郎黃冠言竊謂成周之時有所謂選士有所謂俊士有所謂造士先王之命名不同如此而後世則不論其人之成才與未成才不辨士之預貢與不預貢而均謂之秀才則名之不正可知矣欲令天下士自鄉而升之縣學自縣而升之州學則通謂之選士可也其稱則曰外舍生及其才向於成而升之內舍則謂之俊士其自稱則曰內舍生又其才之已成而貢之辟雍然後謂之貢士焉其自稱也亦以是而已若然愚智處宜賢不肖襲情世之商賈工岐巫醫卜筮假進士之名而稱秀才者固不待禁而止矣從之長編政和三年五月乙酉臣僚言陛下著為舍法革千載科舉之弊進士固已罷去今賜承議郎徐禋進士出身顯於名實未正乞改賜同上舍出身從之長編政和六年三月癸丑御崇政殿賜太學上舍饒州臧瑀等十一人并宗子學及太醫學上舍二十四人及第出身同出身並釋褐長編政和六年八月己巳臣僚言乞降德音詔中外師儒之官取程較文藝大槩以熙豐為標凖體制各隨所長務得通經篤學之士黜浮偽剽竊之文庶得真材實能以待朝廷之用詔劄下太學國子監辟雍長編政和七年三月戊午賜進士永興軍景徹等一十三人上舍及第出身釋褐長編政和七年六月癸亥前提舉永興路軍學事郭民贍奏乞將外任官隨行親內舍生遇所在州軍不係試上舍年即依單經人法於學事司附試從之長編宣和三年二月乙酉詔罷天下三舍太學以三舍考選開封府及諸路以科舉取士州縣未行三舍以前應置學官及養士去處國子監太學官吏並依元豐舊制辟雍官屬及宗學并諸路提舉學事管勾文字官並罷長編宣和三年三月辛酉臣僚上言自三舍法行係籍學生並免差科以是兼并上戶之家皆遣子弟入學非人人俊彥也往往以厚科假手濫處庠序其中下之戶差科倍增老幼旁午於州縣力不能給或至逃亡今舍法既罷乞不許更免差科從之實録宣和四年三月辛酉幸太學酌獻文宣王御敦化堂令國子祭酒韋壽隆講書無逸司業權邦彥講詩下武百官諸生並賜茶又幸精微造十二齋命開府儀同三司梁師成總領重葺齋舍詔曰朕惟神宗皇帝稽古恢儒訓迪天下眷成周大比之法實寓六卿乃闢成均肇行舍選褒制訂議積年於兹陳紀立經是為可繼異時議者乃欲推廣兹意咸暨四方緝為繁文譸張迂闊而玩嵗揭日終莫能行士困躓道塗牽攣較試仰事俯育咸咈其心致操行溺於囂浮藝文襲於剽去古益逺朕甚憫之屬者祗紹詒謀一遵前烈惟克果斷自朕心遹觀厥成萬世無斁爰飭庶役增建大成命駕來臨式示延佇爾其敏修厥德日就月將用副朕樂育之誠以章先帝洪業休德無窮之聞惟爾與焉亶兹在庭其體至意御製宣聖贊曰厥初生民自天有造百世之師立人之道有彛布倫垂世設教爰集大成千古允蹈乃嚴斯學乃新斯宫瞻彼德容云孰不宗詔國子祭酒韋壽隆為給事中祕書少監翁彥深為國子祭酒國子司業詹乂為中書舍人權邦彥為左司員外郎學官增秩一等三舍生釋褐免省試免解賜帛有差學生孔端朝先聖四十八代孫賜上舍長編髙宗紹興十二年十一月辛卯初言者屢請復太學以養人材上以戎事未暇至是上謂宰執曰太學教化之原宜復祖宗舊法程克俊曰東晉設學於鼎沸之中今兵息矣興學正其時也秦檜曰久有此議今當舉行之紹興十二年十一月己亥始詔立太學養士既而合權以三百人為額仍復置祭酒司業博士正録等官紹興十二年十二月辛未上曰太學師儒之官雖選經術當先德行要使士子化之以厚風俗紹興十三年七月壬申時國學新成補試生員四方來者甚衆幾六千人丙子揭榜取徐驤等三百人中興紀事紹興十三年九月戊辰知建昌軍李長民言軍興以來學政中輟今和議既成儒風復振郡邑長二宜兼學事以示偃武修文之意詔從之紹興十三年十月己丑侍御史李文會論新除國子監丞石安慶輕儇無行丁酉上曰太學風化之本使此人充監官何以取重於士人詔即罷之並中興紀事紹興十三年十一月戊午時上所寫六經與論語孟子之書皆畢檜因請刋石於國子監仍頒墨本賜諸路州學詔可紹興十三年十二月辛卯新知永州熊彥詩上言欲依嘉祐治平故事補中監學生命祠給綾紙從之並中興紀事紹興十三年十二月癸巳上謂宰執曰學校者人才所自出人才須素養太宗置三館養天下之士至仁廟人才輩出為用秦檜曰國朝崇儒重道變故以來士人雖陷敵者往往能守節乃教育之效也上曰然五代之季學校不修故無名節今日若不興學校將來安得人才可用耶紹興十四年二月庚辰詔太學養士三百人太少宜更增二百人並中興紀事紹興十五年三月戊寅上謂宰執曰朕觀古之太學有養士至二三千亦朝廷一盛事乃詔添養士一百人紹興十六年正月戊寅時太學養士已七百人戊子詔增為一千人紹興十六年太學之初興也春補就試者五千人遂分數場有改名冒試至再三者秋七月辛未中丞何若言今秋補人數又多乞於貢院引試上曰士人進取之弊一至於此所係甚大不可不革今日之所養則他日之所為可見也紹興二十二年時有贍學公田多為權勢所占九月戊戌上謂宰執曰緣不度僧常住多有絶産令戶部撥以贍學紹興二十六年三月壬子進呈太學生員稀少欲令禮部措置上曰學校人材所自出元祐間名臣最多實仁宗養育之有素也近來學校雖設而教育未至每以人材難得為患可如所奏令有司條具以聞臣等曰學校以教之王政之本也樂育人材菁莪之義也士不素養而求一旦之用猶兵不素練而責其一日之戰也太上皇帝興太學以養天下之士慮其未廣又下增員之令譬之嘉穀種之力者獲必豐養之至矣才難何慮哉聖政紹興三十二年十一月甲午殿中侍御史張震奏論國子監已減正録二員不宜復置上曰館職學官祖宗設此儲養人材朕欲待方來之秀不可定員聖政孝宗淳熙四年正月丙寅輔臣進呈紹興十四年幸學詔上曰今所降詔大意欲以崇尚風化勸厲諸生使知所趨向朕得詔中兩語當為君子之儒毋慕人爵之得龔茂良等奏大哉王言誠得體要當以聖語諭學士令載之詔書上可之上宣諭輔臣曰諸生有兩經幸學人宜並與補官龔茂良等奏前此該慶夀恩補官者聞可數人年老離學遂無所歸上曰如此尤可憫於是詔作該慶夀赦太學生七十已補官人如願在學者聽聖政自此以後皆州縣學徽宗崇寧二年五月癸卯詔廣州漳州各添置教授一員長編崇寧二年六月丙辰詔縣學生不及二十人處計依州學例并附近大縣一處教養長編崇寧二年六月辛未給諸州州學印長編崇寧二年八月辛亥詔諸路縣學生見及一百五十人以上即以五十人為額以下即以四十人為額長編崇寧二年十二月庚戌許諸州立學仍賜以國子監書從熙河都轉運司請也長編崇寧三年正月己丑詔諸路增縣學子弟員大縣五十人中縣四十人小縣三十人長編崇寧三年正月癸巳中書省勘會天下已置學養士士在學校月書嵗考行藝純備方與入貢其選頗艱而科舉取一日之長人樂僥幸衆易以趨故異意與怠惰之人多憚於入學甚失朝廷教養之意詔五路學生在學一年方許取應餘路在學半年仍通縣學月日即取應人衆而學校所養數少雖令在學半年其不在學之人尚多者仰學事司較量相度聞奏長編崇寧三年四月辛亥詔府界諸路提舉學事司契勘逐縣糧如有餘剩即許額外增養學生長編崇寧三年六月丙午江東路提舉學士司言諸州皆已置學唯廣德軍附宣州今學者漸多乞自置學從之仍詔諸路州軍未曾置學處並置學崇寧三年六月丁未詔諸州戶絶田並充贍學不許出賣從提舉開封府常平事李晰等請也長編崇寧四年正月戊戌詔諸州學生增養及三百人以上置教授二員從權發遣蜀州張宗武奏請也崇寧四年閏二月丁丑詔應州縣學職事人並先選州學三舍生補充其特奏名進士曾在太學試中上內舍者許依條差所有見充職事特奏名人如不曾在太學試中上內舍即罷長編崇寧四年三月壬子賜辟雍手詔許令諸州學立石從新提舉廣南東路常平陳杞奏請也長編崇寧四年八月戊辰給事中鄭居中言諸州學士百人立上舍額五人即是學生二十人合補上舍一人今乞餘分五人已上者更取一人從之長編大觀元年五月戊戌學制局奏開封府申乞立府學貢士額今取到禮部狀開封府解額二百人崇寧分撥下項三十人留充土著人解額二十人入國子監充諸縣學生升國學解額餘人撥充諸州貢額又辟雍供到開封府學生二百九十三人一百六十三人諸縣嵗升學生一百三人府學生一十三人直學所會到畿縣升到有校定學生臣等看詳辟雍供到即日開封府學生并諸縣嵗升學生止共有二百九十三人今若依己留土著三十人并撥入國子監充諸縣學生升國學解額共五十人立為貢士定額即慮太多今欲以實在府學生每十人聽貢一人零數亦貢一人至五十人止不足者闕之詔王畿庠序初建學者未廣若不立寬額以俟來者則人無向進之意可以五十人為定額長編大觀元年六月庚午御筆令諸州學以御製八行長編大觀二年五月庚戌提舉京西南路學事路瑶言臣所領八州三十餘縣比諸路最為𥚹小管學舍乃至二千三百餘區教養生徒三千二百餘人贍學田業等嵗收錢斛六萬三千餘貫石竊計諸學舍生徒田業錢斛之數何翅數百萬此曠古所未有也乞詔有總會諸路州縣文武大小學生并學費所入所用實數具成圖册上之御府副在辟雍仍宣付史館從之長編大觀二年七月二十一日常州奉行學校推恩御筆手詔詔曰學校興崇人材樂育法備令具勸懲已行深慮有司失實尚有遺材傳不云乎進賢受上賞蔽賢蒙顯戮閲前日賓興之數較其試中多寡惟常州為衆茍依常格推恩非古人上賞之意其知州教授特各轉一官大詔令大觀二年八月二十二日京西南路提舉路瑶奏乞學費所入所用載之圗籍御筆禮部掌教養之事學校之興內外協力今已就緒而養士之類舍宇之數費用之多寡田業之頃畝載之圗籍掌在有司纍年於兹廢闕不具失職為甚可依所奏疾速施行大詔令大觀二年九月乙丑詔諸路州學有閣藏書皆以經史為名方今舉八行以迪多士尊六經以黜百家更何足言應已置閣處可賜名曰稽古長編政和二年五月丁卯新提舉秦鳳等路學士許轂言大觀新修諸路州縣學勑令頒行六年於兹諸路申明上煩訓諭教告者不可悉數乞詔有司特加看詳擇其可使通知鏤板頒行使良法美意人人易曉又乞以屏斥林伯達責降蔡嶷等事鏤板布之天下並從之長編政和三年五月十六日學校御筆鄉舉里選三代所以賓興賢能以善養人者也今學校之興教養之令修明備具矣比來浸失本旨至參以科舉罷廢縣學給食之法害令惑衆者非一可並依大觀三年四月以前指揮其後降指揮更不施行大詔令政和五年八月十一日學校增員御筆學校以善養人設師儒建黌宇備膳羞教天下士十有三年道日益明士日益衆庶幾於古養士之額尚循前數有司拘以定額士遊學校外不被教養於學者尚多有之則野有遺材矣諸路學校額及百人以上者三分增一分百人以下增一分之半即陕西河北河東京東路學生數少者仰提舉學事司具可與不可增及所增數聞奏大詔令小學徽宗大觀二年正月三十日鄉村城市教導童稚令試義御筆古者命之教然後學比聞上書及黨人聚徒立衆教以邪説所習非正違理悖義其能一道德同風俗乎除士子並合入所在學外自今應於鄉村城市教導童稚令經州縣自陳赴所在學試義一道文理不背義理者聽之上書及黨人不在此限違者以違制論大詔令政和四年二月己酉中書省言小學生已及千人貢士教諭止十人恐不能總領兼未有勸沮之法欲分為十齋增與月給俸錢兩貫不許受束修從之政和四年十一月壬辰國子博士李邁言伏覩三舍造士肇自神考成於陛下邇者小學生樂就長育人材之本實始於此臣竊謂教化之行自內及外則此法不獨可施於首善之地固宜推而廣之使州郡小學遵效新令分為三舍庶幾內外均一從之並長編羣書考索後集卷二十七
