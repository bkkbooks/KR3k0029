body:
  text: 羣書考索後集卷五十七宋章如愚編財賦門茶鹽類貼射法宋初許商賈就園户置茶於官場貼射謂之貼射法太宗淳化三年始行之四年罷仁宗天聖元年復行之行之三年利歸大商乃詔孫奭議罷皇祐三年筭依舊只用見錢罷茶貢咸平二年每嵗進茶並停罷初貢茶者三十餘州馳數千里有嵗中再至者上憫其勞擾故罷之續通鑑立三等茶法陳恕為三司使将立茶法召茶商數十人俾條利害第為三等副使宋太初曰吾觀上等之說利取太深此可行於商賈不可行於朝廷下等固减裂無取惟中等之說公私皆濟吾裁損之可以經久於是為三法行之數年貨賄流通公用足而民富實世言三司使之材唯恕為稱首後李諮為使改其法而茶法浸失後雖屢變非恕之舊法也筆談筭茶三說世稱陳恕為三司使改茶法嵗計幾増十倍予為三司使攷之尚未盈舊額世傳筭茶有三說法者便三說者見錢為一說犀牙香藥為一說茶為一說此乃三分法其沿邉入納糧草其價折為三分一分支見錢一分折犀象雜貨一分折茶後又有非折鹽為四分法皆非三說予在三司求得舊三說博糴為一說便糴為一說直便為一說以此商人競逐趨争先赴邉博糴故邉粟常足此良法也沈存中筆談立法便民太祖開寳七年有司以湖南新茶庫重異於常嵗請髙其價以鬻之上曰茶則善矣無乃重困吾民乎即詔第復舊制勿増價值寳訓太宗太平興國二年初江淮諸州官市茶十分之八餘二分復稅其什一然後給符聽其貨鬻商人旁縁為如踰江渉淮頗紊國法轉運使樊若水請禁之仍増所市之直以便民同上寛禁便民真宗祥符九年謂王旦曰茶鹽之利要使國用不損民心和恱卿宜熟思之乃詔御史中丞凌䇿與三司同共定集務要茶園鹽亭户不至辛苦客旅便於興販百姓得存食用編年仁宗天聖元年三月辛卯改淮南十三山場茶法官不收置聽人户興販收浄利錢其客旅聽於在京入便見錢於所在給之三年十一月己酉朔罷貼射茶法令河北㳂存入中糧草而給以見錢香茶三色交勾往十三茶場筭茶編年嘉祐三年韓絳等詳定板行茶法初何鬲上疏言今𣙜茶刑頗煩而不能禁户以久官為置場務而諸費出其中顧嵗入官之初今請一切通商收諸處浄利所過往之稅歸𣙜貨務以還沿邉入中糧草之直誠足以疏利源寛民力韓𤦺相寛䘏民力弛茶禁以便東南之人愚民得無䧟大罪言行録哲宗元祐元年户部言案成都路茶場正令産茶州縣元置場處依未置都茶場日前任便販賣從之長編髙宗紹興二年七年進呈王師心劄子荆湖南北路乞改茶引事上曰茶鹽禁𣙜本為利用取須若財賦有餘則摘山煑海之利朕當與百姓共之聖政總論論𣙜山有三弊夫南國土疆山澤連接逺民習俗多事茶園上則供億賦租下則存活妻子營生取給更絶他門及其官𣙜茶山利歸公室反食之源日削採造之役嵗増課額既漸虧刑罰又屢及以至貼田賣屋力辦課程物産既空死亡無救所以出茶之處郡縣凋殘民不聊生職由於此其弊一也禁𣙜之地法令太嚴銖兩之柔即該憲綱公私追擾獄訟繁興大則破族亡家小則身填牢獄州縣公事大半為茶朝禁夕刑係累相繼户口由兹减耗田野為之蕪萊蠧爾蒸民墜於無告獄連禍結莫甚於斯其弊二也茶貨在山同夫五榖事特愛養即獲滋豐及夫朝廷𣙜山郷原失業茶户逼於寒餒日有逃亡者茶園䧟於奸佞嵗有荒廢者年華漸久殘破益深眷彼靈苖鞠為茂草追呼覺察已失課程雖欲改張噬臍安及其弊三也張泊上太宗端拱二年論放法有五利夫先王創制貴在通行規利竭民政斯濫矣𣙜一弊法舉而棄之則委頓者獲全流竄者盡復東南郡縣百萬遺甿送死養生得安舊業其利一也造茶之戸既專物産必能經營地利愛養茶園封殖窠條防䕶山澤十年之内茶貨大興通商惠農正賦増集其利二也𣙜山既放宻網咸除愛人而義在必行畫象而民将不犯普天之下實省刑章利用厚生莫先於此其利三也比來般運盡出公家渉歴江湖按漕河洛方舟巨艫經途萬里風濤没溺官吏奸偷䧟失茶綱比嵗常有若行放法此患自除其利四也國家𣙜買茶貨嵗入無窮堆貯倉場充積州郡及乎出賣之際則大半塵腐積年之後又多至焚焼今若許放𣙜山任民貿易則國中永無棄貨天下咸喫新茶惠潤公私實為要道其利五也同上通商以收租世之所貴家之所蓄則非有公茶何者公茶濫惡不味於口故也一嵗之春芽者既掇焙者既出則吏呼而買之民輓而輸之矣民之淳或以利而姦也吏之察或以賄而間也於是乎行濫入焉草邪木邪唯恐噐之不盈也塵邪煤邪唯恐行之不昂也商筭而行或不售也則敗者鮮矣倉儲之久或腐敗也則水火乗之矣是以邦之衆布竭於市估而積之亡用之地息未收而本或䘮矣若東南列郡則吏自斤賣課不甚多時或不登焉而民之自用常數陪矣來有甚逺價有甚貴而人争取之者羙味也塗有甚險法有甚重而人争販之者厚利也廵按之使捕逐之卒日馳於野黯顔之吏鞭背之人日滿於庭愁怨愈多而姦不可禁督責愈重而利不可阜勢之所運末如之何也已今日之宜亦莫如一切通商官勿賣買聽其自為而藉茶山之租科商人之稅以此較彼殊途一致耳商人自市則所擇必精則價之必售價之售則商人衆商衆則入稅多矣又昔之所以披草莽懐兵刄務私販者禁嚴故也既已通商則當安行夷路自實官府亦入稅多矣况不滯本泉不煩威獄利用便人莫善於此李太伯文再考本朝鹽産地陜西鹽初安邑解縣有地五總曰兩池北方全藉之其為鹽如耕種疏為畦隴圍塹其外決水灌其間必俟南風起此鹽遂熟風一夜起水一夜結成鹽如南風不起則課利遂失其鹽為顆周官之所謂鹽鹽是也青州鹽出於東海幽薊大同横野有鹽池其鹽出於北海嶺南鹽出於南海劒南西川鹽出於井永康軍鹽出於闕并州鹽出於地是為鹵池湖中鹽出於水又有出於石西夏鹽初唐鹽州五原有烏池白池瓦池細頂池靈州有溫泉池兩井池長瓦池五泉池紅桃池囘樂池洪静池㑹州有河池其鹽青品目鹽有四種一未鹽海鹽也其次顆鹽又其次井鹽又其次崖鹽㑹要天禧五年鹽有二類引池而化者周官所謂鹽鹽也今謂之顆鹽或煮海或煮井或煮􅬺而成者周官所謂散鹽也今謂之末鹽引池為鹽曰陕西觧州安邑斷池墾地為畦引池浹之鹽成籍州及旁州民給復謂之畦户總三百八十户復其家户歳出夫二謂之畦夫以歳給戸錢四萬日給夫米二升歳二月墾畦四月引池為鹽八月而止煑海為鹽曰京東河北淮南兩浙福建廣南凡六路其煑鹽之地曰亭場民曰亭户或謂之竈户户有鹽丁歳課入官受錢或折租賦兩浙又役軍士煑焉在京東曰宻州丁州河北曰滄州濵州淮南曰通泰楚海州漣水軍兩浙曰杭秀温台明五州福建曰福漳泉三州興化軍廣南曰南潮惠亷化瓊崖儋萬安九州煑井則川陜四路大為監小為井監則置官井則募士民或役衙前煑之益州路則縷綿卭眉簡嘉雅漢八州梓州路則梓資遂合戎榮果普昌渠瀘十一州富順監利州路則閬州䕫州路則䕫忠逹萬黔開渝七州雲安軍大寧監煑􅬺則河東并州之永利監會要賣價凡顆鹽末鹽皆以五斤為斗顆鹽賣價每斤自四十四至三十四錢有三等末鹽賣價毎斤自四十七至八錢有三十一筭至道末賣顆鹽錢七十二萬八千餘貫末鹽一百六十三萬餘貫云通鑑場監宋鹽自并州明州各兩監温州兩監福州一監共七監宻州一場通州八場奉州一場海州三場温州一場台州一場瓊州一場共十六場泉州廣州各一倉秦州二倉通州楚州各一倉共六倉鹽井共七百五十五會要交引入中芻粟於沿邉以劵至京師江淮給鹽茶謂之交引又真宗時林特請依舊於京師入納見錢金帛交引於解州取鹽亦謂之交引交引即鹽鈔但隨時命名不同耳真宗咸平六年林特言筭射觧鹽於唐鄧十二州軍貨賣合納見錢應副陜西支用景徳元年三司定唐鄧十二州軍南鹽依西鹽價例於逐處州軍入納見錢發引赴解州𣙜鹽自此放行以來觧鹽交引至少並無納到錢物虧損官中課州臣請依舊在京𣙜貨務入中金銀錢帛交引於觧州取便於他場領鹽依舊只於唐鄧十二州軍破貨即不得𢃄過陕西陕西州軍入納錢銀糧草依舊兩地請鹽只得於鄜延二十五州軍貨賣不得𢃄入南州唐鄧如此則在京與陕西各得載錢文用三司計定請如所奏舊制陕西秦延環慶渭原州保安鎮戎徳順軍聽商人入中糧草筭觧鹽自康定後入中者皆以交引於在京𣙜貨務給見錢銀絹猾商與官吏通弊以邀厚價歳耗官錢不可勝計度支郎中范祚建言令商人止於延環保安等州軍於青鹽池許商人入中觧鹽官自出賣餘並通商重青鹽之禁以詳為制置觧鹽使歳課緡錢一百六十六萬以計置沿邉九軍州一百二十餘城出粟量計入可助十分之八餘則責辦本路轉運司罷在京見錢交引法以實京師行之十歳歳减𣙜貨務緡錢百萬公私以為便縣官可積見錢京師商戸坐贏厚利㑹要鈔法仁宗陜西顆鹽舊法官自般運置務均賣范祥始為鈔法令商人就邊郡入錢四貫八百售鈔至解州請鹽二百斤任其私賣得錢以實塞下又省數十郡般運之勞行之既久鹽價時有低昂又於京師置都鹽院主人鹽斤不過三十五錢過四十則大發庫鹽以壓商利使鹽價有常而鈔法有定故至今以為便也筆談新舊鈔仁宗嘉祐四年先是入中芻粟多虚估歲損官課至是范祥改法抑之其劵已在嘉祐以前者毎劵别使輸錢一千然後予鹽南渡以來每因闕用則改新鈔以幸入納之廣苐茍目前不知利權悉為商賈所持紹興五年乃行對帶法除去積年之弊加以出剰立為分數許人納不對帶二法並行出入有常如不為巨猾所制矣官鬻本末仁宗天聖三年上書有言縣官自𣙜鹽為害請通商以寛民力詔罷三京二十八郡𣙜鹽聽商人入錢若金銀於京師𣙜貸務交鹽於兩池天禧制聽商人入錢要京師及淮浙江南荆湖易鹽及景祐三年言諸路博易無利罷之至康定初復令入中陕西加數給東南鹽國朝制令商入芻粟邉地以劵至京師支見錢茶香藥犀象等謂之三說法又間支鹽以代京師見錢慶歴三年又詔入中者持劵至京給以錢銀不願受金帛者與香藥茶鹽惟其所欲東南鹽利特厚皆願得鹽至八年河北行四說法鹽居其一而沿邉入中芻粟多虚估勝前數陪京師鹽又為商人所抑鹽百八斤舊售錢十萬至皇祐二年止六萬商人但以錢估劵取鹽不復入錢京師帑藏益之於是王堯臣等請復入錢京師法而入中之商先得於未受鹽者每芻粟直十萬止給鹽直七萬又令入錢十萬於京師乃聽兼給謂之對貼髙宗紹興二年川陕茶馬趙開倣大觀東南鹽法置合同場鹽市騪視稱提與茶法大約相類徽宗大觀鹽法未詳然觀趙開行於川者即東南之法可知矣茶法見鹽類建炎二年立茶課入數宋至道末賣顆鹽錢七十二萬八千餘貫末鹽錢一百六十三萬餘貫其後惟顆鹽有定額歲為錢二百三十萬緡自餘不常歲為錢大約一千餘萬緡惟末鹽自鈔三百萬緡以供河北邊糴宣和時淮南鹽利歲入一千四五百萬緡兩浙七八百萬緡河北鹽首末唐自兵興河北鹽羈縻而已至皇甫鎛奏置𣙜鹽使如江淮𣙜法犯禁者歲多及田洪正舉魏博歸朝廷穆宗命河北罷𣙜鹽唐志後唐長興四年鹽鐵使奏每年人户蠶鹽並不許將帶入城侵奪課利宋開寶三年四月詔河北諸州鹽法並許通行量收稅錢六月除河北𣙜鹽令三司使王拱辰請𣙜河北鹽公見上問曰河北再𣙜鹽何也仁宗驚曰始立法非再也公曰周世宗𣙜河北鹽犯輙處死世宗北伐父老遮道泣訴願以鹽課均之兩稅而尅其禁世宗許之今兩稅鹽是也豈非再稅乎仁宗大悟曰卿語宰相立罷之陜西鹽首末宋舊制陜西三十五州軍京西十州軍許民買觧鹽餘皆𣙜之慶歴元年議者以輦運之役困於軍民不若商旅入錢散鹽上命龍圖閣學士盛度與三司議之度言太宗通商鹽太祖開國之初免河北鹽真宗弛郡軍𣙜而民便之今請以見錢輸在京𣙜貨務就池給鹽其利有五方禁商時官自輦運兵無疲勞今無此弊一利也始以陸運既差帖頭不役軍户今悉罷之二利也舟運有沉溺之患綱吏侵盗雜以沙泥今得真鹽三利也國之錢幣謂之貨泉富家多藏不出今商人歳出緡錢五千餘萬頗助經費四利也歳减監軍人夫役作之給五利也上善之曰有利於民何愛也遂詔弛三十一州軍𣙜推而行之寳訓却羡餘真宗大中祥符陕西轉運使張象中言安邑觧鹽兩池見貯鹽三千餘籮都三億百八十餘萬斤切慮更有遺利望行條約真宗曰地利之阜此亦至矣若過求增羡慮有時而闕不可許也寳訓去昌州虛額太宗太平興國三年詔昌州属川七井歳有虚額一萬八千餘斤罷之先是開寳七年知州李專以掊歛市恩務變其法因廢諸井薪錢乃於嵗額外増稅鹽仍課部民煑之民素不知其事甚以為苦雖破産猶不能償其數以至流移入他郡户口日以减耗至是本道轉運使列其事於三司以積年之征不可遽免乃均於部民作兩稅例出錢米以輸官太宗不從盡令革之寳訓罷兩浙鹽禁真宗皇帝咸平二年張詠知杭州屬嵗歉民多私鬻以自給捕死者數百人詠悉寛其罪而遣之官属請曰不痛繩之恐無以禁詠曰錢塘十萬家饑者八九茍不以鹽自活一旦蜂起為盗則其患深矣秋成當任舊法長編减蜀鹽井課慶歴六年益梓䕫三路轉運使皆乞増鹽井課王堯臣不從上問其說對曰庸蜀僻逺恩澤鮮及而貢入常倍民力由此困朝廷既未有以恤之而又牟利焉是重困也上善其對五月裁卬州鹽井課嵗額緡錢一百萬長編革西川弊原孝宗淳熙六年劄子云陛下凡蠲減四川酒課四十七萬二千有奇鹽井虧損四十九萬九千有奇茶引錢一十五萬二千有奇全蜀生齒蒙被聖澤感激流涕然臣愚欲望陛下眀詔制置總領茶馬三司同所屬司分深思逺慮申逐時考察之禁嚴三歲推排之法痛絶弊原以增虧損俾無損於公無害於民其講究長久善後之䇿以副陛下綏恵逺方之意福建鹽首末寛商禁太宗興國八年除福建鹽禁仁宗嘗謂輔臣曰鹽利至薄朕欲通其禁使民間販易王曾等對曰鹽利歲入甚厚縣官又賴其助不可遽弛他日國用有餘議除其禁可也上以為然髙宗紹興十七年五月丙寅上曰近有布衣言福建鹽法利便朕謂法或未便須議損益祖宗成法倘利於民自當永久遵行何俟改作紹興二十七年福建提刑吴逵定鹽綱之數上四州并属縣共般一千六百萬斤據地逺近裁價比舊减三分令官自鬻不許敷民舊漕司取放州縣號増鹽錢斤二十八文今减九文提舉司收吏禄錢一文亦减三文帥漕兩司皆不許賣鹽以侵州縣課轉運司鹽本錢亦减雖民力稍寛而州縣無以供百費且尤非漕司之便次年衆論復徭有㫖下本路相度更定提舉張汝楫奏請行久法上問陳成之對曰福建山溪之險細民冐法私販恐不盡請鈔有虧課額上曰中間福建曽用鈔矣未幾復罷大抵法貴從俗不然不可經久先是福建總認鈔鹽錢三十萬緡既而與减八分自此轉運司及州縣少寛不復科賣於民矣罷放福建上四州民户鹽乾道四年三省同奉到聖㫖訪聞福建路建劔汀邵四州軍科賣鹽搔擾民户至於無本起綱白行敷歛重困民力深可矜憫可将本路鈔鹽二十萬貫並與蠲免却令本司於八州軍増鹽錢并将樁留五分鹽本通融抱認七萬貫充上供起發今後州縣不得更似前賣鹽為名依前科敷騷擾令户部散榜逐州軍曉示仍令監司常切覺察如有違戾許人户越訴監司按劾聞奏重置典憲施行除放福建上四州鹽本錢乾道四年臣寮上言訪聞上四州拖欠鹽本等錢自紹興二十七年至三十二年計五千餘萬自隆興元年至乾道三年亦四十餘萬漕司不知久近衮同拘催前後積壓因縁為姦民力空窮困於追索新欠舊欠拖𢃄不前徒掛簿書實無從出臣愚欲望迴聖慈矜憫州縣煎熬民間不易止附常平積欠官物及諸軍拖欠酒錢並已放免特降睿㫖将紹興三十二年以前積欠鹽本等錢並行除放罷廣南𣙜鹽淳熈十年詔曰聞廣南在數千里外朕甚憫之鹽民資以食向者官利其贏轉而自鬻以為民病朕遣使詢得其利害始為之更令俾通商販無令官鬻然利於民者官不便焉何者官吏妄費異時悉出於此一旦絶之必浮言胥動毁我裕民之政矧監司守令均以為民朕有善意顧撓而壊之可乎自此或有弊必置之法均廣西鹽數淳熙六年臣寮上言切見廣西州郡恃鹽以為命而制其輕重之權者轉運使也然一路地理之逺近舟車之便否户口之多寡商賈之去來郡異而縣不同如邕宜融等州民户稀少不通行旅所賣之鹽不過本處而常患數多昭賀之林賔栁等州當東西水陸要衝食鹽既多益而發洩而常患數少欲望降聖慈下臣此章於運司使之度一路利便之宜别行裁定於公家無所虧於民間無所害實為一方久逺之利罷通州敷鹽曰竊見廣西敷賣食鹽已行住罷臣謂廣西敷鹽尤官獲其利今通州縣敷鹽無一毫之利止是公吏鋪户藉以年例擾民因循不革以其久爾欲望降睿㫖下淮東轉運司將通州均敷人户買鹽取見詣實自下住罷之究諸路鹽塲利害淳熙乙未郊祀赦節文勘㑹諸路鹽場昨縁不依時支散本錢及有减尅之類致有歳額不敷去處累降㫖揮約束尚慮奉行不䖍仰諸路提舉司常切遵守約束所部湏管依時支給不得减尅如有違戾許亭戸越訴將當職官吏按劾以聞循祖宗成法髙宗紹興十六年六月丁未進呈淮東鹽課増羡推賞事上曰法不必改只循其常若更易雖有少増羡次年必虧大抵民食鹽毎歳如此聖政總論洪範五行水曰潤下作鹹此鹽之根源也水性周流無所不在如青州鹽出於東井幽薊北海嶺南南海皆出於海鹵南西川出於井河東出於池如觧池鹽之尤著者大畧三種三種之外所出亦多河北則有鹵地永康軍則出於崖又有出於石出於木品類不一自禹貢青州貢鹽絺此海鹽之見於經三代鹽雖入貢與民共之及管仲相齊始興鹽筴以奪民利漢興雖除山澤之禁至武帝時用洪羊孔僅祖管仲之法於是始行禁𣙜自後隨時更革或寛或急然鹽禁終不可得而罷論其作俑則圖近功而奪民利管仲獨得辭其咎乎論禁𣙜之利惟是海鹽海池最資國用如蜀中之井自贍一方之用無與於大農宋朝就海論之則淮鹽之利最重國初鈔鹽初行是時建安軍置鹽倉乃令真州發運在真州是時李沆為發運使運米轉入其倉空船回皆載鹽散於江浙湖廣諸路各得鹽資般運而民力寛此南方之鹽其利廣而鹽𣙜最資國用觧池之鹽朝廷專置使以領之北方之鹽盡出觧池當時南方全在海北方全在觧池然而南鹽管得其人則其害少惟北鹽有契丹西夏之鹽常相參雜奪觧池之利所以宋朝議論最詳大抵觧鹽之味不及西夏價直西北之鹽又賤所以沿邉多盗販二國鹽國家常措置闗防西夏常護視入中國界大概海鹽井鹽以煎熬而成必資人力如觧池之鹽則如耕種䟽為畦隴决水灌其間必俟南風起此鹽乃成風一夜起水一夜結北風皆坐食鹽如風不起則課利遂失至徽宗時如兩浙之鹽多有變更自蔡京秉政費轉般倉之法使商賈入納於官自此為置鹽法請鈔於京師商賈運於四方有長引短引限以日時各隨所適之地逺近為差蔡京專利罔民率數十日一變鹽法既變則鈔鹽亦不可用商賈既納錢之後鈔皆不用所以商賈折閱甚多此海鹽之一變也觧鹽縁在徽宗初雨水不常圍塹不宻守者䕶視不固為外水參雜不復成鹽所以數年大失課利後大興役車出外水漸可再復此觧鹽之一變也若論禁𣙜之利天下之鹽固皆禁惟河北之鹽自安史亂河北一路縁藩鎮據有河北鹽宋朝因而以鹽定稅所以河北一路鹽無𣙜仁宗時議者欲𣙜上不許神宗時荆公章子厚亦欲求𣙜神宗亦不許自後子厚為相方始行禁𣙜犯刑者甚多盗賊滋起河北所以不容𣙜兼河北之鹽又與其他不同井鹽則不過一井觧池則毫釐封守海鹽則必待起爐皆非一旦所成故可禁察惟河北鹵地甚廣非可墻籬封守又纔煎便成所以最易犯禁自章子厚禁𣙜河北一到靖康之末盜賊愈多河北風俗慓悍小人規利又輕於犯法此所以不容禁也東萊文福建舊鹽課名色福建下四州有産鹽錢一歲所入四十餘萬緡漕臺倚之以集大事自建劒汀邵凡歲運一百七十餘綱况時吏縁為奸廣抛敷買之數以僱下户推見存之數以備倉卒謂之長生鹽民不顧請則納所放之半直以歸倍於官官復貯之别所謂之還魂鹽民困科買有破産者後髙宗減福建認鈔錢八分遂不復科買羣書考索後集卷五十七
