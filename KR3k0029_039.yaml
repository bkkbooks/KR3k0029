body:
  text: 羣書考索卷三十九宋章如愚撰禮門祭祀先王顧諟天之明命以承上下神示洪範八政其三曰祀大宗伯之職以吉禮祀邦國之鬼神示故祭天曰燔柴祭地曰瘞埋祭山林川澤曰貍沈祭風師雨師曰槱燎祭四方百物曰疈辜秦則興鄜密上下之四畤以祠上帝至漢則增之以北畤以祀五帝漢之祀天不於南郊而於甘泉其祀地不於北郊而於汾隂河東禮文一切從事侈靡文帝切於愛民謂禬禳之事足以佑民也廣壇場增圭幣除祕祝之官以為民祈福其為事已失先成民而後致力於神之義矣宣室之問未遑他事而急於鬼神之問至於武帝巡海之求神仙人築室封太一祝史祠官相望於名山大川之上一切妄祭淫祠以徼福於己終漢之世一歲凡三萬七千祠胡廣謂班固郊祀志宜去鬼神神仙之語置韋賢宗廟迭毁議於其中則其祀事庶得以類相從夫孟堅舍宗廟之議而專志於郊祀固未為得至於漢武之淫祀以為後世戒其㫖深哉後漢䜟緯之書出以亂經自鄭𤣥之徒號稱大儒皆主其說由是郊丘明堂之論至於紛然而莫知所止禮曰以禋祀祀昊天上帝皆天也𤣥以為天皇大帝者北辰耀魄寶也又曰兆五帝於四郊此五行精氣之神也𤣥以為靈威仰叶光紀之屬後世莫能廢焉唐初貞觀禮冬至祀昊天上帝于圜丘正月辛日祀感生帝于南郊以祈穀而孟夏雩于南郊季秋大享于明堂皆祀天帝髙宗顯慶中許敬宗盡黜鄭說而皆祀昊天上帝開元中王仲丘議以為宜於祈穀祭昊天而兼祭五帝既而蕭嵩撰開元禮雖未能合古而天神之位别矣宋朝自仁宗以來三歲一郊始為定制明道嘉祐問又有恭謝天地之禮即大慶殿行之如明堂故事禮制成周宗伯之職實掌邦禮而五禮之目於是始備禋祀上帝之禮禴祠蒸嘗之儀朝覲宗遇之節師田冠昏鄉射之事罔不備具及周之衰兩觀大路朱干玉戚天子之禮在諸侯塞門反坫素衣朱襮諸侯之禮在大夫隨武子不知殽蒸孟僖子不知相禮范獻子不知問諱魯不知尚羔則知禮者鮮矣秦滅禮法而古制蕩然漢興叔孫通之綿蕞禮儀徒規當時之近功而其法失於太卑齊魯二生之論禮必期百年然後興而其言失於太髙賈誼有修禮之志而困於絳灌仲舒以教化為大務而武帝不暇禮文王吉欲述舊禮明王制而宣帝不納劉向請興辟雍陳禮樂而成帝不用後漢肅宗有曹褒新禮次序禮事而乃雜以五經䜟記之文安帝時有應劭漢官禮儀故事而朝廷制度於此始立唐太宗用房𤣥齡魏徴因隋之禮增以養老大射講武讀時令之儀次為吉凶軍賓嘉之目而號曰貞觀禮髙宗詔長孫無忌之徒增貞觀禮為顯慶禮其文雜以令式而義府敬宗多希㫖傅會議者非之由是貞觀顯慶二禮兼行而有司臨事連引古義無復定制𤣥宗開元時王嵒請刪去禮記舊文而益以今事張說非之而乃折衷諸禮以為唐禮於是撰述於徐堅李鋭而定於蕭嵩王仲丘為大唐開元禮由是唐五禮之文稍備而用之雖時有損益不能過也宋朝建隆聶崇義重修三禮開寶劉溫叟之徒則有開寶通禮嘉祐歐陽修蘇洵則有太常因革禮此本朝之禮也禮器自空虛浮誕之說勝而儒生無考古之實學禮器之不明於後世也久矣惟我太祖皇帝肇造區夏之初未遑他務首命儒臣計論尊爵籩豆之用簠簋鼎俎之制而聶崇義實膺是選於是采唐六家之傳以定三禮之制作為畫圖以成一代之縟典猗歟盛哉皇祐中王洙又嘗作周禮禮器圖而上之凡品物纎悉皆有考訂意義明達皆有據援可謂詳而備矣其後陸佃又為禮象陳祥道又為禮書皆能考古以求意非但記名數之末而已是以議禮之學至我宋而大盛此豈非儒者務實之功乎自後世學者好為浮誕之言談空說髙而俗日以勝乃謂籩豆之事皆有司之常職制度名物皆道德之土苴而古人器以藏禮禮以辨義之意茫然而不可知矣其言彜也則有所謂雞彜鳥彜有所謂斚彜黃彜又有所謂虎彜蜼彜者則槩之曰彜耳初不思古人於春祠夏禴祼用雞彜鳥彜於秋嘗冬蒸祼用斚彜黃彜於四時之間祀追享朝享祼用虎彜蜼彜者各有義也其言尊也則有所謂獻尊象尊有所謂著尊壺尊又有所謂大尊山尊者則槩之曰尊耳初不思古人於春祠夏禴其朝踐用兩獻尊其再獻用兩象尊於秋嘗冬蒸其朝獻用兩著尊其饋獻用兩壺尊於四時之間祀追享朝享其朝踐用兩大尊其再獻用兩山尊者各有義也爵一也而有玉爵匏爵之異禮曰贊玉爵詩曰酌之用匏寧無意乎瓚一也而有大璋中璋邊璋之别禮曰大璋中璋九寸邊璋七寸得無意乎鼎之有鼐鼎也有陪鼎也有鉶鼎也古人之意各有在也故詩曰鼐鼎及鼒俎之有嶡俎也有椇俎也有房俎也古人之意各有在也故記曰俎夏后氏以嶡殷以椇周以房烏得而不考其所以異簠簋之為黍稷稻梁之器人孰不知之至於或外方而內圓或外圓而內方諸儒之說不可忽也籩豆之為果實葅醢之器人孰不知之至於或以竹或以木諸儒之說不可忽也其他如社稷之用大罍禜門之用瓢齎則大罍也瓢齎也此又古人制器之深意如祼事用概疈事用散則概也散也此又古人制器之深意也今其制詳載於周禮儀禮之書者皆學者之所當考也是以鄭康成杜子春之徒則釋之於注孔穎達之徒則詳之於正義歷代諸儒不敢略也昔太史公適魯觀仲尼廟堂車服禮器低回而不忍去梁之劉杳博物洽聞無所不通至宗廟之犧尊說者不一杳獨以齊尊之牛形為古之遺制而說者之妄於是判然而不能惑蓋古人察物之精審類如此愚是以深歎近世之虛浮也冕服冕服之作尚矣書稱舜曰豫欲觀古人之象日月星辰山龍華蟲作會宗彜藻火粉米黼黻絺繡則黼黻而上象服也象服有冕禮記曰有虞氏皇而祭夏后氏收而祭商人冔而祭周人冕而祭則皇收而下者皆冕也孔子稱禹致美乎黻冕書稱伊尹以冕服奉嗣王詩稱商之孫子常服黼冔則夏商服章蓋與古同矣古之服章十有二而日月星辰山龍華蟲繪於衣宗彛藻火粉米黼黻繡於裳蓋日月星辰在天成象者也山龍華蟲虎蜼藻火粉米黼黻在地成形者也然則古者合三辰以在服備十二章以則天數後世判三辰以在旗而服止九章以法陽數鄭康成謂周服九章登龍於山登火於宗彜以尊其神明理或然也左傳臧哀伯曰三辰旗旗昭其明也火龍黼黻昭其文也子太叔曰為九文六采五章以奉五色夫哀伯言服止於火龍太叔言色止於九文則周之衮服止於九章而無日月星辰明矣周禮典命上公九命其衣服以九為節侯伯七命其衣服以七為節子男五命其衣服以五為節王之三公八命其卿六命其大夫四命及其出封皆加一等其衣服亦如之司服掌王之衣服祀昊天上帝則服大裘而冕祀五帝亦如之享先王則衮冕享先公饗射則鷩冕祀四望山川則毳冕祭社稷五祀則希冕祭羣小祀則𤣥冕公之服則衮冕而下侯伯之服自鷩冕而下子男之服自毳冕而下孤之服自希冕而下卿大夫之服自𤣥冕而下士之服自皮辨而下如大夫之服辨師掌王之五冕皆𤣥冕朱裏綖紐五采繅十有二就皆五采玉有十二玉笄朱紘諸侯之繅斿九就瑉玉三采其餘如王之事繅斿皆九就玉瑱玉笄諸侯及孤卿大夫之冕韋辨皮辨辨絰各以其等為之而掌其禁令夫所謂大裘者何也鄭司農云大裘黑羔裘服以祀天示質也而記曰郊之祭王被衮以象天戴冕璪十有二旒則天數也合二禮而言之王之祀天內服大裘外被龍衮所以襲大裘也記曰裘之裼也見美也服之襲也充美也禮不盛服不充故大裘不裼則龍衮可知故冕服有六冕而辨師云掌王之五冕也服飾於下隂也故司服六冕飾於上陽也故辨師之冕五而已猶王后之服六而追師之首飾三而已則大裘衮衣同冕猶三翟同副也康成謂大裘無衮其冕無旒于經無據故唐開元廢大裘之冕宋神宗用陸佃之說製黑羔以為裘而被以衮此豈非大裘與衮衣同冕者乎夫所謂鷩冕者何也鷩冕士章鷩雉也雉之為物五色備而成章故曰夏翟亦曰華蟲猶中國謂之夏亦謂之華也司服又謂之鷩者别其名也鷩冕以祀先公饗射然先公尊矣所服止於此者非卑之先王以為祭則各以其服授尸尸服如是而王服衮以臨之非所以為敬故弗敢也饗射亦以鷩冕者王朝覲諸侯以衮冕故饗與賓射以鷩冕祭祀以衮冕故大射亦以鷩冕以饗與賓射殺於朝覲而大射殺於祭祀也此豈非鷩冕之制乎夫所謂毳冕者何也毳冕五章說文云毳獸細毛也宗彜有虎蜼之節而毳衣又有宗彜之章故書謂之宗彛周禮謂之毳冕毳冕王所祀四望山川之服也詩曰毳衣如菼毳衣如璊此豈非毳冕之制乎所謂希冕者何也希冕三章王祭祀社稷五祀之服非卑之於享射也以社稷五祀之所主止於利人故衣粉米而已謂之希以其章少故也鄭氏以希為絺以絺為刺唐以希冕為繡冕蓋以襲鄭氏之失歟此豈非希冕之制乎所謂𤣥冕者何也𤣥冕一章王祭羣小祀之服其衣𤣥而無文裳黻而已其章不足道也故以𤣥名之夫乾居西北而天事武故黼之色白黑艮居東北而成始終故黻之色青黑天下之理歸於所斷成於所辨故服章以黻終焉舜命九官終於黜陟分北周官六計終於廉辨皆六服終黻之意也然剛斷者先王之所沈潛非向而上之也故黼依設於後席用黼純設於下而中衣繡黼設於中皆六服後黼之意也詩曰𤣥衮及黼黻衣繡裳常服黼冔語曰致美乎黻冕凡此言舉其章之末者則餘章著矣此豈非𤣥冕之制乎唐楊景當儀鳳中論服色制度而言虞書十二章之義宋陳祥道之在元祐作為禮書而詳言六冕之㫖皆所以發明古人作服之意自是而外則有所謂禆冕山冕之號如玉藻曰諸侯禆冕以朝樂記曰禆冕搢笏而虎賁之士說劍荀卿曰大夫禆冕此禆冕之可見者也考工記曰山以章荀卿曰天子山冕此山冕之可見者也其於辨也則又有所謂𤣥端皮辨韋辨之别古者端衣或施之於冕或施之於冠大戴禮曰武王端冕而受丹書樂記曰魏文侯端冕而聽古樂荀卿曰端衣𤣥裳絻而乘路此施之於冕者也冠禮既冠易服二𤣥冠𤣥端劉定公曰吾端委以治民公西華曰端章甫晏平仲以端委立於虎門此施之於冠者也諸侯與士以為祭服玉藻曰𤣥端以祭郊特牲冠𤣥端是也大夫士以為私朝之服玉藻朝𤣥端是也天子至士亦以為燕衣玉藻天子𤣥端而居內則事父母端禆是也然則端衣所用固不一矣此之謂𤣥端之制也司服視朝則皮辨服辨師王一皮辨會五采玉璂士冠禮皮辨服素積聘禮賓皮辨聘詩會辨如星玉藻天子皮辨以日視朝郊特牲王皮辨以聽祭報蓋皮辨天子以視朝以宴以聽郊報諸侯以聽朔以巡牲卿大夫以聘士以冠學士以釋菜凡士大夫之朔月皆皮辨服則皮辨之所施者衆矣此之謂皮辨之制也司服凡兵事韋辨服辨師諸侯及孤卿大夫之冕韋辨或曰周禮有韋辨無爵辨書與冠禮禮記有爵辨無韋辨士之服止於爵辨而荀卿曰士韋辨則爵辨即韋辨也此之謂韋辨之制也後漢輿服志曰上古穴居而野處衣毛而冒皮後世聖人觀翬翟之文榮陽之色乃染帛以效之成以為服見鳥獸有冠角􅐖胡之制遂作冠冕纓蕤凡十二章至周九章秦滅禮學郊祀之服皆以袀𤣥漢髙之興本以斷蛇而受命之符叶於火德宜尚赤矣公孫臣以為水德宜尚黑張蒼以為土德宜尚黃至文帝時賈誼亦欲改服色卒無定尚故以旗幟則尚赤以朝服則尚黑觀魏相舉髙祖衣服之制曰春夏秋冬天子所服以法天地之數而如淳以為百官皆有五時服則漢之百官其所常服者莫不順時之宜而至於朝服則惟其所尚之色而不敢變也顔氏注云雖有五時服至朝服皆皂衣張敞為列卿則曰敞備皂衣二十年谷永為光祿大夫亦曰擢之皂衣之吏此則朝服尚黑之證也後漢光武踐祚至於顯宗始服旒冕衣裳文章以祠天地養三老五更於三雍于時致治平矣天子三公九卿特進侯侍祠侯天地明堂皆冠旒冕衣裳𤣥上纁下乘輿備文日月星辰十二章三公諸侯用山龍九章九卿以下用華蟲七章皆備五采孝明皇帝永平二年初詔有司采周官禮記尚書乘輿服從歐陽氏說公卿以下從大小夏侯說祀天地明堂則冠旒冕後魏明帝以公卿衮衣公卿之文擬於至尊復損略之宋齊王公皆平冕後周設司服之官掌皇帝十二服祀昊天上帝則蒼衣蒼冕祀東方及朝日則青衣青冕祀南方則朱衣朱冕祭土祀中央則黃衣黃冕祀西方及夕月則素衣素冕祀北方祭神州社稷則𤣥衣𤣥冕享先王廟諸侯則象衣象冕十有二章衮冕自龍以下凡有七章山冕八章鷩冕七章通十有二旒諸公之服九曰方冕曰衮冕曰山冕曰鷩冕曰火冕曰毳冕曰韋辨曰皮辨曰𤣥冠侯伯而次則自方冕而下各有制度改後魏制度大業初牛𢎞虞世基等憲章古制創造衣冠自天子等差始令五品以上通服朱紫唐初平服皆因隋舊武德四年始著衣服之令天子之服自大裘冕而下凡十有四曰大裘冕曰衮冕曰鷩冕曰毳冕曰絺冕曰𤣥冕曰通天冠曰緇衣冠曰武辨曰辨服曰黑介幘曰白紗帽曰平巾幘曰白帢祀天地服大裘顯慶中長孫無忌乃請服衮冕罷大裘又新禮祭社稷則服𤣥冕四旒三章祭日月則服𤣥冕三旒二章無忌以為四品五品之服也天子十二為節以法天烏有四旒三章之服且三公亞獻皆服衮衣孤卿服毳及鷩君少臣多非禮之中請諸祭用衮自是鷩冕以下天子不復用矣品官服色舊止黃紫貞觀四年用馬周之議制三品以上服紫四品以上服緋六品七品以上服緑八品九品以上青至龍朔中孫茂道則又有改青為碧之說上元中又有改闕服緋深緑淺緑深青淺青之制唐史特以平服自為一志大略亦可考矣大裘冕祀天地之服衮冕踐祚享廟征還遣將飲至加元服納后元日受朝賀臨軒冊拜王公之服鷩冕有事逺祖之服毳冕祭海嶽之服絺冕祭社稷享先農之服𤣥冕蠟祭百神朝日夕月之服通天冠冬至受朝賀祭還燕羣臣養老之服緇衣冠始冠之服也武辨講武出征搜狩大射禡類宜社賞祖罰社至嚴之服也辨服朔日受朝之服也黑介幘拜陵之服也白紗帽視朝聽訟宴見賓客之服也平巾幘乘馬之服也白帢臨喪之服車後漢車服志曰上古聖人見轉蓬始知為輪輪行可載復為之輿輿輪相乘流運罔極任重致逺天下享其利後世聖人觀於天見斗周旋魁方柄曲以攜龍角為帝車於是乃曲其輈乘牛駕馬通典載云黃帝作車至少昊始駕牛及陶唐氏制彤車乘白馬則馬駕之初也有虞氏因彤車而制鸞車夏后氏因鸞車而制鈎車奚仲為夏車正建其斿旐尊卑上下各有等級商因鈎車而制大路周因商輅以制木輅約木以加飾為玉巾車五輅一曰玉輅錫樊纓十有再就建太常十有二斿以祀金路鈎樊纓九就建大旗以賓同姓以封象路朱樊纓七就建大赤以朝異姓以封革路龍勒絛纓五就建大白以即戎以封四衛木路前樊鵠纓建大麾以田以封蕃國故周人尚輿一器而工聚焉車為多軫之方也以象地也蓋之圜也以象天也輪輻三十以象日月也蓋弓二十有八以象星也龍旗九斿以象大火也鳥旟七斿以象鶉火也熊旗六斿以象伐也龜蛇四斿以象營室也弧旌枉矢以象弧也然月令於春則曰乘鸞輅於夏則曰乘朱輅於中央土則曰乘大路於秋則曰乘戎輅於冬則曰乘元輅何耶鄭氏曰凡此車馬皆取於商時而有變焉非周制也秦平九國蕩滅典籍舊制多亡改商瑞山車為金根車以金為飾謂為帝軫元旗皂斿以從水德法水之數駕馬以六至漢武帝天漢中始定輿服之制自是以來故有乘輿有金根有安有立有耕有戎有獵有軿有輕有青蓋皂蓋之名有大駕法駕小駕之儀朱班重牙二轂兩轄金簿繆龍為輿倚較文虎伏軾龍首銜軛之飾郊祀所乘千乘萬騎其儀特盛輿服志云五時副車亦曰五帝車鸞旗車亦曰雞翹車耕根車亦曰芝車曰三蓋車桓談謂揚雄曰君為黃門郎居殿中數見輿輦玉蚤華芝及鳳皇三蓋之屬此之謂也司馬相如賦曰前皮軒後道游此皮軒車道游車之可見者也賈捐之傳曰鸞旗在前屬車在後此鸞旗車之可見者也揚雄傳曰豹尾以前皆為省中此豹尾車之可見者也光武平公孫述始獲葆車輿輦因仍舊制若指南車雖起於黃帝時而張衡亦嘗復之於漢矣然天子之車輅大抵多襲秦制而金根之車未始廢也其所以制之者所以擬周之玉輅最尊者也是為德車魏武受漢亦乘金根東晉則始建大輅戎輅宋孝武始建五輅後周置司輅之官掌公車之政皇帝之輅十有二等曰蒼輅曰青輅曰朱輅曰黃輅曰白輅曰𤣥輅曰玉輅曰碧輅曰金輅曰象輅曰革輅曰木輅唐因隋制玉金象革木是為天子五輅武德之初五輅之外加以屬車十乘指南記里鼓白鷺鸞旗辟惡皮軒羊車與耕根四望安車皆屬車之名也貞觀元年始加黃鉞豹尾二車通為十二乘以為儀仗之用天子之輦凡七曰大鳳大芳然避小輕芳亭大玉小玉皆輦名也天子之舉凡三曰五色曰常平曰腰輿皆輿名也髙祖太宗於大禮則乘輅髙宗於大禮則御輦𤣥宗以輦不中禮而開元十一年復乘輅以南郊宋朝太僕所藏玉輅自唐顯慶中傳之號曰顯慶輅乾德之初陶穀創意造成大輦其後金輅玉輅作於慶厯而五輅之制備於元豐此皆歷代人主車輅之制也若夫諸侯大夫士之制則在周之巾車有曰服車五乘孤乘夏篆卿乘夏縵大夫乘墨車士乘棧車庶人乘役車各有定制也然明堂位何以曰鸞車有虞氏之路也鈎車夏后氏之路也大路商路也乘路周路也有虞氏之旗夏后氏之綏商之大白周之大赤耶蓋魯得用四代之禮樂所以異於他國也春秋之時鄭小國也而乘軒者至於三百人秦針公子也車之多至於一千乘或朱馬鬛或光可以鑑漢初以將相之尊或乘牛車長吏至不吏服入閭里自景武以後其制漸立景帝詔二千石者車朱兩幡千石至六百石者朱左幡三百石以上皂蓋二千石以上白蓋此景帝所定之制也通典謂武帝天漢四年始定輿服之制令諸侯王大國朱輪特虎居前左兕右鹿小國特熊居前麋皆居於左右此武帝所定之制也然所乘之車其名不一皇孫乘緑車丞相乘髙蓋車三公皆乘使車列侯乘安車太守乘藩車刺史乘傳車大夫乘官車使者追捕考按則乘小使車佐吏則乘小車致仕者則或賜安車賈人毋得乘馬車然文帝乘輿以朝東宫而使趙談驂乘而共載成帝乘大駕以郊泰畤而使昭儀常從於豹尾中鮑宣為豫州牧行部去法駕乃一馬而宿於鄉亭陳遵初除河南太守至乘藩車出入閭巷則車輿之制亦不可不講也今觀杜延年傳云延年病篤賜安車駟馬此安車之可見者也蕭育傳曰帝以育耆老舊臣以三臣使車載育入殿中受䇿此使車之可見者也至晉之賜王公則有雲母車三公有勳德者有皂輪車而位至公者或四望或三望或夾望或油幢車至後周諸侯則有輅或九方或碧或金或象或犀或貝或革或篆或木之屬而唐自一品則有象輅二品三品則有革輅四品則有木輅五品則有軺車而車輅皆藏於太僕受制行冊則紷之餘皆以騎代車云此唐車服志之所載也陳祥道禮書曰古者車之制象天以為蓋象地以為輿象斗以為杠轂象二十八星以為蓋弓象日月以為輪輻前軾而後户前軌而後軫軛之上平謂之衡衡之才與輿之下木皆曰任其為車也有長轂者有短轂者有杼輪者有侔輪者有反揉者有仄揉者有兩輪者有四輪者有輻者有無輻者有曲轅者有直轅者有直輿者有曲輿者有廣箱者有方箱者有重較者有單較者或駕以馬或駕以牛或挽以人或飾以物或飾以漆或朴以素皆因宜以為之制稱事以為之文也羣書考索卷三十九
