body:
  text: 羣書考索續集卷三十九宋章如愚編官制門爵秩漢封侯漢設爵二等曰王曰侯皇子而封為王者實古諸侯也故謂之諸侯王王子而封侯者故謂之諸侯羣臣異姓以功封者謂之徹侯大者不過萬家小者五六百戸以為差降古者有分土無分民自漢始分民而諸侯王國皆連城數十踰於古制不特此也有以宦官而封侯者髙后八年封中謁者張釋之為列侯是也有見任宰相而封侯者公孫𢎞封平津侯是也有以婦人而封侯者蕭何夫人同封酇侯樊噲妻吕須封臨光侯是也有以方士而封侯者欒布封為樂通侯是也若是者皆無定制非復先王列爵分土之意也食邑秦爵二十級惟徹侯乃得食縣其次闗内侯本無食邑其有加異者與其闗内之邑食其租税髙帝即位之初其士大夫以上皆令食邑所以寵異於一時非常制其後論功封侯者凡百四十三人食邑者除租每戸一歳更輸錢二百貨殖傳所謂千戸之君則二十萬是也宣帝本始元年論定策功蘇武劉德等六人爵皆闗内侯德武食邑葢特寵劉德蘇武二人而加異之也然有累爵至列侯而未有食邑者樊噲是也有累賜食邑而後封侯者酈商是也周爵禄司士以德詔爵以功詔禄以能詔事以久奠食司馬論定然後官之任官然後爵之位定然後禄之漢制除官試守滿年然後為真若干名食全禄猶有古意漢爵漢爵二十級自一級以上至不更四等則比士大夫以上至五大夫五等則比大夫左庶長以上至大庶長九卿之人也闗内侯比古圻内之子男列侯比古列國之諸侯漢初因之凡爵一級直錢二千有赦則賜民爵一級有罪則許民買爵以贖罪公其服飾免復飾免復各以其爵之髙卑而為之劑量也以樊噲夏侯嬰二傳考之其遷轉次第有不可紊者樊噲以舍人有斬首之功賜爵大夫已而加列大夫已而賜上聞已而賜五大夫已而爵號比封君已而賜重爵列侯累遷將軍賜食邑夏侯嬰以太僕常奉車有降敵之功賜爵五大夫已而賜執帛已而賜執圭已而得印匱已而封滕令已而賜食邑一級一紀截截有紀序間有超遷越轉則又出於上所特恩而已唐階勲爵古者官無兼稱亦無虚假惟周立三公以六卿兼之故周公以冢宰位太師是有兼稱矣至漢以侍中左右曹諸吏散騎中常侍為加官加官則兼稱之謂也然其所加自列侯將軍至郎中亦必因其所加而責其職任是則有兼稱而未嘗有虛假也若唐所謂散官勲爵者亦加官之數而徒假以虛名無所當乎事實不亦贅乎曰階者自開府儀同三司至將仕郎二十九為文散階自驃騎將軍至校尉凡四十五為武散階以吏部郎主之曰勲者自上柱國為正二轉至武騎尉為一轉以司勲郎主之曰爵者以王公侯伯子男為九等以司封郎主之朝廷百官所以授其禄秩而謂之職事官者皆不係此是其所以為兼稱者又其所以為虛稱歟且所謂開府儀同三司者謂置府辟吏與三公同耳所謂五等封國皆南面臣人分茅建社令其為階爵豈復有此是得謂之當其實乎且職居其一而為之加者至於再三既加其階又加其勲又加其封求之於古安所取義陸贄言員外試官與勲散爵號同無俸禄之資無管攝之柄無見敬之實無免役之優但止於服色資䕃而已所謂假虛名而濟實利者然而周漢之始初無所假亦足為治假之又假實不勝虛何以勸人凡唐制自勲階進者叙以散官封公䕃叙明經出身亦以散官京官罷歸亦以散官勞攷叙進亦以散官故未有職任而授者有已職任而加者有免職任而居者是不特虛假與試官殊科宋朝改官制始以唐散階為寄禄官勲官遂已削去而封爵食邑猶存古者世禄不世官桓五年天王使仍叔之子來聘胡氏云帝王不以私愛害公選故仕者世禄不世官任之必以其賢也使之必以其能也卿大夫子弟以父兄故而見使則非公選而政由是敗矣昔者有自野耕渭釣擢居輔相而人莫不以為宜陟象賢復相大戊武公世美入為司徒不以世故疑之也伯鯀既殛禹作司空蔡叔已囚仲為卿士亦不以其父故而廢之也惟其公而已及周之衰小人得政視官爵為己私援引親黨分據要途施及童稚賢者退處於蓽門老身而不用春秋書仍叔之子云者示戒深矣林勲云以德詔爵以功詔禄故世禄而不世官葢世禄則世子弟無失所之憂不世官則入仕之源清而官無冗員之濫其意若曰世類茍賢則食采自足而爵位可以自致焉不賢則均食先人之田禄不過數世自與庶人等矣此先王待遇賢臣重惜名器之善意晦庵云世禄所謂有田以處其子孫也先王之世仕者之子孫則教之教之而成材則官之如不足用亦使之不失其禄葢其先常有功德於民報之宜如此忠厚之至也古人以穀粟制禄吕氏云漢制三公號稱萬石其俸月各三百五十斛其稱中二千石者月各百八十斛二千石者百二十斛比二千石者百斛六百石者七十斛百石以下有計食佐史之秩計食月俸十一斛佐史月俸八斛按范雎有計食以上之説吕不韋死其舍人六百石以上奪爵以此攷之則漢之禄秩大率皆秦制其間少有増損則不可知爾孟子論周室制禄自上農夫食九人積之孔子使原思為宰與之粟九百而孟子為齊卿其禄十萬鍾然則自古至於秦漢無不以榖粟制禄也荀綽晉百官表注載後漢延平中中二千石月俸錢九十米七十二斛真二千石月錢六千五百米三十六斛當殤帝之世百官俸禄猶米多錢少况於古乎漢禄秩漢吏禄賦於民上自三公而下至百石吏吏禄各有差其見於百官表之注者皆以榖計也至廣律則謂丞相大將軍俸錢月六萬是則漢禄穀多而錢少如貢禹拜諫大夫秩八百石俸錢月九千二百又拜光禄大夫秩二千石俸錢萬二千葢寛饒以大中大夫為司𨽻校尉俸錢月數千當時亦不以為厚加之節臘有賜士大夫足以養亷而無冒恥干利之態惟小官卑秩稍禄既薄而賞賜不及焉則不能以自奉宣帝憫小吏之勤事於是益吏百石以下俸十五哀帝又益吏二百石以下俸自是小吏稍稍優游至平帝時諸吏之初除者皆食半俸滿一歳為真得食全俸比二千石以上致仕者三分故禄以一與之大抵亦髙爵厚禄者損之耳光武中興其千石以上減於西京舊制六百石以下增於舊秩故西京千石月九十斛東京減為八十西京比六百石六十斛東京減為五十五則是光武之減吏禄乃所以益小吏之俸也宣帝哀帝増三百石以下光武減六十以上其損益之制不同要皆有補於小吏唐俸禄職田變而為地又未幾而罷罷而又置職田公廨本錢有俸有料有賜或年給季給月給日給春秋給其後無事則增加軍興則半給其後愈増愈重天寶數倍於開元大厯數倍於天寶建中又倍於大厯大厯中權臣月俸有至九十萬者刺史亦至十萬自此以後大率外官俸禄重於内官有自方鎮為八座至謂罷權有自左丞貶歙州刺史家人恨降之晩宋朝祖宗留意養賢前代俸給未有實數也而今給以實數前代俸給未有實錢也而今給以實錢省官益俸見於開寶優禄養賢見於雍熈在祥符則加之在寶元則不減之其為士大夫慮至悉也然此皆天子意也非臣子自為身計也自元豐諸臣以省俸之名欺其君以增俸之實豐其身寄禄官有俸錢職事官又有職錢所以入者厚矣以元豐之制比之元祐最為優異而奚以省言也雖曰五品降為六品七品降為八品然此特章服爾議請減䕃及用舊品而又奚以省言也元祐稍減於元豐而紹聖復沿於元豐其切於已計如此哉然此猶未至於極也崇觀奸臣自奉過度俸錢職錢之外又有食料等錢有言之者則以減俸非治世事之說止之噫古之制禄為天下公後之制禄為一己私竭膏血之私奉谿壑之欲君子為之寒心焉中興以來一洗陋政其謂増損得其道矣然嘗考之祖宗之制可為後世法非一而其大要有三一曰優小吏二曰優外臣三曰優故老選人之俸熈寧増之小官之俸紹興又増之非優小吏乎小吏加優則亷節立矣均給外官職田見於慶厯按支外官供給見於紹興非優外官乎外官加優則輕外之患去矣淳化中致仕給半俸景祐中致仕俸給如分司官非優故老乎故老加優則待賢之意篤而來者知勸矣雖然上之所以待我者厚矣我之所以自待者宜如何曰觀頥觀其自養也自求口實觀其自養也以温飽為念而從事於囊帛匱金舍爾靈龜觀我朶頥殆非所望於君子所給俸劵請之於府在職奉使不肯廩給天下未始無鄭公伊川也然不可謂皆鄭公伊川也自出禄米以濟貧民自分俸錢以賑荒饑天下未始無扈稱王居白也然不可謂皆扈稱王居白也資格宋朝堂除及資格國初官人之法文臣屬中書武臣屬樞密太宗分中書之權而置審官院神宗分樞密之權而置審官西院遂以文臣之審官為東焉於後合東西審官之權而歸之左右尚書文臣之差注吏部若得專其責矣然監司郡守及御史省郎以上皆中書主之正將副將准備將以上皆樞密主之此堂除所以為重本也祖宗以來資格甚嚴其用某人也必曰嘗厯其資也由守而憲由憲而漕由漕而三路使而三司副使至是方除待制焉由正將而邊守州鈐由邊守州鈐而邊帥路鈐由邊帥路鈐而都鈐總管官至是方選管軍為一資一級至不輕也自熈寧大臣引用新進有邑宰資序而為監司郡守者有選人未改官而亦預俊拔者官制既行資序止於吏部朝廷所除出於臨時而文臣之資格壊矣自政和之官爵日濫而横行之任下及匪人邊郡之除無異正任官制復行武臣直博皇城使雖樞臣莫之能改而武臣之資格壊矣夫待常才以資待非常之才以望如徒以資而已則盛德善行瑰竒偉雋之士或拘格而遲回然專捨賢用望則狂繆之流矯抗之士或以虛名進矣其用望之弊當有甚於資也且祖宗之朝聞有不次而舉者有特㫖而授者畢士安以侍讀學士兩遷而正端揆宋琪以兵部員外三遷而居端揆王顯閣門使也其正西府止於兩遷王繼英客省使也其知西府止於一遷此固非純用資格者然資格終不可廢也李定以資淺入臺三舍人不奉詔武功大夫之轉横行則紹興廷臣深非之焉葢資格嚴則人望為足貴用望者多僥倖者至斯亦不足貴也已昔范文正公為百官圖以進指其遷進遲速次序曰如此則為叙遷如此則為不次噫必有范公而後可以用資寇忠愍議擢指揮使吏以例籍進公曰用一牙官尚須檢例安用我輩噫必有寇公而後可以用望否則資望俱失矣資格之弊孫洙論資格之弊以為今賢才之伏於下者資格拘之也職業之廢於官者資格牽之也士之寡亷鮮恥者爭於資格也民之困於虐政暴吏循資格之人衆也萬事之所以抗弊百吏之所以廢弛法制所以頽爛决潰而不之救者皆資格之失也今小人累日而取貴仕君子側身而困卑位爵不考德禄不授能故曰賢才之伏於下者資格拘之也才足以堪其任必拘歳月而妨之矣力不足以稱其位累資考級而得之矣位不度才功不責實故曰職業之廢於官者資格牽之也夫資格之法起於後魏崔亮而復行之於唐裴光庭且二子者其當世以罪之今資格之弊流漫根結踵為常法方且世世而遵行之矣為今之急誠宜大蠲弊法簡校異能爵以功為先後用才為資序無以積勤累勞者為髙科無以深資久考者為髙選智愚一别善惡陳前而萬事不治者後未之聞也任子古者官人以世成周之世下及列國皆官人以世周之劉單召甘晉之韓趙樂范齊之髙國陳鮑衞之孫甯孔石宋之華向皇樂鄭之罕駟國遊魯之季孟臧展楚之鬭蒍申屈皆世不乏人與國終始選擇而後用盤庚之告羣臣曰人惟求舊器非求舊惟新古我先王暨乃祖乃父胥及逸勤世選爾勞予不掩爾善觀此則知是雖以其祖父舊勞王家之故猶必知之以選而非泛然録用若後世之無擇也任子保任之法任子之説起於劉向以父任為輦郎袁盎以兄任為郎中釋者曰言為父兄所保任故得為郎也而眉山蘇洵上書仁宗亦云所謂任子猶曰信其父兄而用其子弟云爾由是言之任者保任之謂保其可任不保其不可任者其後易保任之名為奏薦亦以論薦人才之義而已矣以趙括之與父異心而其母上書括不可將如有不稱請無隨坐是母之親不敢保任其子也義縱少為羣盜有姊以醫幸於太后太后欲官之姊曰有弟無行不可是以姊之親不保其弟也夫保息者婦人女子之常情也以括之母猶不敢保其子以縱之姊猶不敢保其弟於以見古人保任之法葢如此其嚴也而况夫受國家之爵位號為人之父兄者曾一婦人女子之不若也昔衞子思有言曰武王之母弟八人五叔無官尚德故也公孫黒之將死請以其子為右師子産曰印也若才君當任之不才將朝夕從汝又何請焉是古之任子者有無為可否之明驗也後世失古人保任之意惟其恩澤所及而已不計其賢愚也惟其格法所得而已不擇其可否也於數子之中茍有一人雨露之未及則為没齒之遺憾視數小子之態固不獨一張禹為然也是以上之人知有隨其所巳任而予之矣異時不如所任不復詰也下之人知有挾其所得任而求之矣才德之堪任與否不暇顧也胡不觀祖宗立國之初減齋郎駙馬之目嚴䕃補考試之科恩郊薦不數數而予之也太祖在位十七年四行大禮爾太宗在位二十三年五講郊禮爾葢有雖經奏薦而便殿引對尚有可否予奪之權行乎其間非可以斷斷而取必者也遺奏之恩告老之澤不汎以施之也惟視其平昔勞能之為輕重爾漢奏䕃漢制二千石九卿得䕃子弟為郎其為虎賁諸郎者皆許父老子代或没於刺史守而名績流著亦蒙恩典録其後嗣如汲黯張安世皆以父任而袁盎亦以其兄任其為郎一也而等有四議郎中郎侍郎郎中號三字郎而悉屬於光禄勲以給天子宿衞獨議郎不預便宜之數光禄勲歳以四行察其茂亷才迹優異始蒙選舉銓居髙第然後出補長丞異時遷擢上而至於兩府初無限格然考之於史貢禹以光禄勲大夫二千石秩惟有一子猶未得禄故以御史大夫卒始以特恩任其子為郎桑𢎞羊為御史大夫自以為有功於國欲為子弟得官而武帝不與漢之奏䕃雖有定制而未始有常恩也唐資䕃甚濫然其選輕昔漢世禄之法雖廢而任子之科亦優凡朝之公卿子弟苟以父任兄任皆得為郎亦可以為優矣魏晉以中正取人其實純以閥閲為尚然其立法本以德行為先反以門地相尚是為名實背違所以未為公論若唐之興以儒科取士而資䕃自為一途然而議者多言其濫矣髙宗時劉祥道所言雜色入流者謂三衞番官親事帳内品子雜掌兵部散官此則皆資䕃之流而謂之雜色抑不少矣所謂三衞者曰親衞勲衞翊衞皆大臣之子孫為之分番宿衞而後授禄任所謂親事帳内者文武三品以上乃給而以品官之子為之所謂品子者有納課品子歳取庶臣之子上之兵部納課十二歳而後試量文武授散官有捉錢品子日本屬以簿附朝集使上之考功兵部滿十歳量文武授官又有太廟社稷齋郎皆以武選而崇文𢎞文及四門館生又以文授凡此皆唐資䕃之目也然楊國忠以其子暄舉明經不中授典舉者達奚詢聞之大驚遂置之髙第俄與詢同列則當時權要子弟欲進身通顯亦必托之儒科則任子之目雖衆其選為輕而唐之得人於科目為盛故賴此耳惟李德裕以任子位宰相乃言朝廷顯官須公卿子弟為之為史臣所誚宜哉宋朝資䕃之濫任子之法宋初其嚴乎減齋郎進馬之額立䕃補考試之科其入仕之路至艱也趙韓王以佐命之功出入將相二十餘年而其子之為六宅使出於天子之特授其弟之為河南推官猶十年不赴調大臣之於子弟如此則當時之羣工百執事又安敢有所希覬哉葢自盧多遜之相其子起家郎任水部員外則其遷驟矣自吕蒙正為三弟求官雖止授其子京秩而其弟特注縣主簿則其路廣矣然猶未至於濫也祥符中録王超之子德用為忠佐超之建旄秉鉞巳二十三年則是祖宗朝管軍方鎮未有奏䕃法也淳化中從魏咸信之請以其子為大理丞咸信以宰臣之孫為駙馬都尉則是祖宗朝天子之女未有奏䕃法也太平興國中以杜彦鈞補東頭供奉官彦鈞以昭憲之姪從太祖幾二十年則是祖宗朝貴戚妃后之家奏䕃之不濫也至於後日横恩四出誕節之恩起於至道其後至於推恩之濫入流増多矣郊禋之恩起於祥符其後至於一郊所奏且數百人矣國初無致仕之制官給事而致仕者其子同學究知制誥而致仕者其子試校書給事知制誥皆曰侍從且特恩也明道初員外郎致仕者其子試校書三丞致仕者其子為三丞郎是今之朝奉奉議皆得官其子矣又其甚也有易簀而請者有停服而請者致仕之恩何其濫也國初無遺表之制韓重斌之子為作坊副使劉幡之子為大理評事亦皆一時特恩也真宗以後丐請日繁其初已官者或止遷秩而後則盡補白丁矣又其甚者妻族外甥悉皆霑恩門客僕𨽻亦蒙甄録遺表之恩何其濫也未離襁褓已結縉紳不限賢愚槩居禄位此非孫沔之言乎承䕃既多受䕃已重行恩在已假奏為名此非裴明允之言乎弊而至此亦可歎也已今誕節之恩罷之久矣而三者之弊猶故也盍亦少加之察乎淳熈之志文臣員郎武臣副使終身止任一子正郎正使再遇大禮者増至於三遇郊者展至於再而遺表之恩致仕之恩皆為之品節今之制猶在也遵而行之則在今日任子較試之法宋朝公卿子弟其未仕也則命之入學其既學也則嚴之較試既試矣又有覆試之制有引對之制覆試而三事失實坐其主司若奚璵王貽孫之貶是也引對而學業未精俾之再學若錢象中陳宗紀之黜是也考之既精察之既詳可以例用矣而猶未也太祖朝㕘樞之子並授供奉官太宗朝大臣之子止為六宅使夫其處之右職艱其仕路寧不謂膏梁之族未能諳究吏事耶至其後也有同為相臣子而或授以郎官或處之右列者有武列之家授以文秩而文班之後命以武官者因其所能為之區别噫亦嚴矣葢自引對之法罷於天禧考試之法更於熈寧甚而有免試之制有陳乞之法不惟不對於便殿亦且不試於有司皂白不分廩賜無别此任子所以濫也厥今引對之制不可復矣祖宗覆試之制亦不必復矣惟銓試之制嚴而行之庶乎其可也久任久任漢制邊吏三歳一更而其他官吏以至倉庫之微初未嘗有終更之限也夏侯嬰自髙祖時為太僕至文帝世不易其職貢門厯三世不徙官此其在内然也有為京兆五年張敞有為刺史五年何武有為郡太守八年黄霸未嘗不久任也王嘉謂文帝時吏居官者或長子孫以官為氏其二千石長吏亦安官樂職莫有苟且之意此足以見漢之任吏不輕易置也茍二千石治行課最則特璽書增秩賜金亦未遽遷擢以重斯民去思之心至其屬吏則其太守察其亷汙而進退之故郡丞雖老聾或以其亷而不欲數易黄霸曹吏書佐選其可用者而罷斥諸病吏朱博亦安有具員而終任者哉當是時惟長安最為難治而尹京兆者往往久不過三年近者數月一歳之毁傷失以罪過罷張敞則知漢之久任固以其吏之循良而貪汙沓冗輩亦豈容久病民哉錢制宋朝久任官守數易弊法也而將相之數易監司郡守之數易其弊為尤甚祖宗朝趙中令之相凡十一年王文正之相凡十二年向文簡之相亦十年皇祐用相逺者五七年次者二三年而亟用亟罷何郯已切議之良以道揆之任非百官有司比任之則勿疑疑之則勿任祖宗朝郭進之守西山凡二十年李漢超之守闗南凡十七年董遵晦之守通逺凡十四年其餘或九年或十年或十餘年葢不可悉數夫閫外之任古人所重委之也專任之也久則可以責其成效擢之未幾而遷之隨至雖有頗牧何所用之祖宗朝朱博轉運使河東凡十一年宋璫之知秦州凡六年蔣元振之知白州凡七八年在蜀者或至三任宰桐廬者或七年不遷而知滄州未半年而更三任授發運使未數日而又遷諫議則吳申力言之夫親民之職不可屢易監司一易則擾一路令守一易則擾一州令宰一易則擾一縣送故迎新勞擾萬狀五日京兆奸者侮之雖百龔黄何所容其技耶祖宗朝曰相曰將曰監司曰守令無一不久其職者正為是也不寧惟是張質之在樞密五十年王貽永為樞密十五年古之以司馬為氏不過是也陳恕之在三司十二年李士衡之任筦記二十年古之以倉庫為氏不過是也趙師民楊安國之在經筵或十餘年或二十七年所以養君德者多矣司馬光劉温叟之在臺諫或五年或十二年所以格君心者久矣張師德九年在西掖章得象十二年在翰林所以出納王命者當矣雖然亦視其才德如何宋琪自外郎歳中三遷為真相何敏中自外郎歳中三遷為真相向敏中自外郎百餘日正西府可以速則速又不容以久任之法拘之人才人才嗚呼天之愛人甚矣其有感於人事之變而迫於氣數屈伸消息之不齊然後不得已而降咎也雖然是氣之屈於此也則必有所信於彼其消於今也必有所息於後是以天將降非常之禍於此世則必為之預出非常之人以擬之使夫國家猶有所依以立而生民之類不至於糜爛泯滅而無餘是則理勢之必然而天之所以為天者其心固如此也故七國將變而已生亞夫以擬之矣新室將亂而已生二十八將以擬之矣天寶至德之運將厄而已生郭子儀李光弼李晟以擬之矣節義先漢有節義之實而亡其名仗節死義之士何世無之顧上之所以養之如何耳髙祖之初丁公不忠於項羽而戮之以徇衆鄭衆不奉詔名籍而貸之以激世田横不肯歸漢而自殺則壯其節而為之流涕魯不下漢則歎其守節死義之國而不忍屠之所以培養氣節保䕶風俗以為後世憑藉之計者不淺矣故其後士大夫皆知節自守不為勢屈不疑之不肯解劍貢禹之不肯改官不受卒徒唾背如田延年不聽兩吏挾持如蕭望之不拜大將軍如汲黯不屈節於單于如蘇武其凜凜英風使人激懦而増氣以至田申賈人也責陽以義有烈士之風樓䕶俠徒也議論常依名節而聽之皆竦其他可知矣惟漢世之君隂有以養其氣不沮不挫而自有以銷其犯上難制之氣故其人亦不以節行自矜而無矯激之名忠而不訐剛而不暴有仗節死義之士而後世獨以節義之名歸之東京者葢東京以節義為尚故也惟其所尚者在是故士大夫相尚成風而未免有詭激之患要之東都尚節又不若西漢有其實而亡其名錢制朋黨歐陽公朋黨論嗚呼始為朋黨之論者誰歟甚乎作俑者也真可謂不仁之人也予嘗至繁城讀魏受禪碑見漢之羣臣稱魏功德而大書深刻自列其姓名以夸耀於世又讀唐實録見文蔚所為如此未嘗不為之流涕也夫以國予人而自夸耀及遂相之此非小人孰能為之漢唐之末舉朝皆小人也而君子何在焉當漢之亡也先以朋黨禁錮天下賢人君子而立其朝者皆小人也然後漢從而亡及唐之亡也又先以朋黨盡殺朝廷之士而其餘存者皆庸懦不肖傾險之人也然後唐從而亡矣夫欲空人之國而去其君子者必進朋黨之説欲孤人主之勢而蔽其耳目者必進朋黨之説欲奪國而與人者必進朋黨之説夫為君子者固常寡過小人欲致之罪則有可誣有不可誣者不能徧及也至欲率天下之善求其類而盡去之惟指以為朋黨爾故其親戚故舊謂之朋黨可也交遊執友謂之朋黨可也門生故吏謂之朋黨可也是數者皆其類也皆善人也故曰欲空人之國而去君子者惟以朋黨罪之則無免者矣夫善善之相樂以其理用皆自然之理也故聞善必相稱譽稱譽則謂之朋黨得善者必相薦引薦引則謂之朋黨使人聞善不敢稱則人主之耳不聞有善於下矣見善不敢薦則人主之目不得見善人矣善人日逺小人日近則為人主者悵悵然誰與之圖治安之計哉故曰欲孤人主之勢而蔽其耳目者必用朋黨之説也一君子在位小人雖衆必有所忌而有所不敢為惟空國而無君子然後小人得肆志而無所不為則漢魏唐梁之際是也故曰欲奪國而予人者由其國無君子守國而無君子由以朋黨而去之也嗚呼朋黨之説人主可不察哉傳曰一言而可以喪邦者其是之謂歟可不監哉可不戒哉漢黨錮始於甘陵南北部成於陳蕃李膺與太學諸生終於張儉等天下有道君子揚於王庭以正小人之罪而莫敢不服天下無道君子括囊不言以避小人之禍而猶或不免黨人生昏亂之世不在其位四海横流而欲以口舌救之臧否人物激濁揚清禁虺蛇之頭踐虎狼之尾以至身被淫刑禍及朋友士類言滅而國隨以亡不亦悲乎温公前漢之黨指蕭望之劉向張猛周堪而治之者元帝與恭顯後漢之黨指李膺范滂二百餘人而治之者桓靈與侯覽曹節輩也唐之黨指獨孤損崔逺等二十餘人而治之者朱全忠柳粲李振也三黨盡索宗社存亡其果君子耶抑小人耶又君子之類或以道德以學術以氣節以議論窮則相益達則相推可以名曰朋而不可謂之黨小人之類或以才智以邪慝以恩知以勢利窮則相踈達則可親可以名之曰黨而不可謂之朋胡安定漢唐黨不同八厨八俊之徒起於漢而憸人切齒於上八闗十六子之目起於唐而賢者扼腕於下均為朋黨之失然而在漢而節義之風有補於漢在唐而鄙利之徒有損於唐此所當監也唐黨錮裴度相憲宗德裕相武宗皆有功烈為唐賢相德裕才優於度而德器不及也度為小人所傾無所不至危亦極矣而能以功名終德裕一失勢斥死海上何者度不為黨德裕為黨故也自今觀之牛僧孺李宗閔之黨多小人德裕之黨多君子然因私以害公挾勢以報怨一也夫為天吏可以伐燕德裕自為朋黨而欲破人之朋黨此以燕伐燕也孔子曰克伐怨欲不行焉可以為難矣君子矜而不爭羣而不黨德裕怨欲必行焉矜而不爭羣而不黨其能免乎范淳夫宋朝朋黨宋朝慶厯黨時慶厯四年初吕夷簡罷相夏竦受樞密使復合之以杜衍同時進用富弼韓琦在二府歐陽修等為諫官石介作慶厯聖德詩言進賢退不肖也奸葢斥竦也竦銜之而仲淹皆修所厚善修斯言畧不形迹顧忌竦因與其黨造尚論目衍仲淹及修為黨人修乃作朋黨論上之其詞云朋黨之論自古有之惟幸人君辨其君子小人而已當時竦黨至謗誣仲淹韓琦富弼有不臣之心仲淹等相繼罷去石介幾至斵棺元祐黨紹聖以來貶責元祐臣僚至徽宗崇寧元年令有司考校官僚章疏言涉時者盡加責降尋又籍記元祐黨人以司馬為首凡三百九人刻名於石後有蔡黨王黨之目以至靖康之變原其所由實由元祐大臣初以兼容小人為寛大元祐八年大防欲用楊畏為諫議大夫范純仁言黨用邪人遂固爭避位大防不悟竟用畏為禮部侍郎畏尋上疏乞講求神宗法以成繼述之道自是悉召用熈豐舊人實畏發之焉尋又有調停之説盡用小人卒使小人復勝而君子去盡故方其始也非惟排斥小人之黨而君子亦自分黨内自相攻如洛黨程正叔為領袖朱光庭賈易等為羽翼川黨以蘇軾為領袖吕陶等為羽翼朔黨以劉摯王岩叟劉安世為領袖羽翼尤衆及其後也至紹聖初同以元祐黨盡竄嶺海之外可哀也已羣書考索續集卷三十九
