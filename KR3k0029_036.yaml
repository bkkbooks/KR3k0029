body:
  text: 羣書考索卷三十六宋章如愚撰禮門釋菜釋奠類釋菜釋奠大胥職云春入學舍菜合舞文王世子亦云釋菜鄭注云釋菜禮輕也則釋菜唯釋蘋藻而已無牲牢幣帛文王世子文云凡始立學者必釋奠於先聖先師及行事必以幣是釋奠有牲牢又有幣帛無用菜之文王制云天子出征反釋奠於學以訊馘告注云釋菜奠幣禮先師也禮記正義周釋奠文王世子凡學春官釋奠于其先師秋冬亦如之注云官謂禮樂之官詩書之官始立學者必釋奠於先聖先師及行事必以幣凡釋奠者必有合也國無先聖先師則所釋奠者當與鄰國合有國故則否若唐虞有夔伯夷周有周公魯有孔子則各自奠之不合也凡大合樂必遂養老大合樂謂春入學舍菜合舞秋頒學合樂聲始立學者既興音釁器用幣然後釋菜不舞不授器不授舞器乃退儐於東序一獻無介語可也晉釋奠講經成帝咸康元年講詩通釋奠如故事穆帝孝武帝釋奠講孝經東晉明帝之為太子亦行釋奠禮成穆孝武三帝皆親釋奠唯成帝在辟雍自是一時制也孝武時有司議依穆帝於中堂權立行太學釋奠禮畢會百官六品以上宋文帝元嘉二十二年太子釋奠採晉故事祭畢親臨學宴會太子以上悉在齊武帝永平三年用元嘉故事設軒懸之樂六佾之舞牲牢器用悉依上公梁武帝天監八年皇太子釋奠周捨議既惟大禮請依東宫元會太子著絳紗襮樂用軒懸合升殿坐者皆服朱衣帝從之北齊將講於天子講畢以一太牢釋奠孔宣父配以顔回列軒懸樂六佾舞皇太子每通一經及新立學必釋奠禮先聖先師每歲春秋二仲常行其禮每月朔祭祭酒領博士以下及國子諸學生以上太學四門博士升堂助教以下太學諸生階下拜孔聖揖顔回日出行事其郡學則於坊內立孔顔廟博士以下亦每月朝隋制國子寺每歲四仲月上下釋奠於先聖先師年别一行鄉飲酒禮唐釋奠貞觀二年詔升孔子為先聖以顔回配四年親釋奠於國子學詔祭酒孔穎達講孝經其後禮不復行至永泰二年八月修國學祠堂成祭酒蕭昕始奏釋奠宰相元載杜鴻漸李抱真及常參官六軍將軍就觀而已永泰代宗年號貞觀十年幸國子學親臨釋奠引道士沙門有學業者與博士雜相駁難久之乃罷貞觀十三年幸國子學親臨釋奠祭酒以下官及學生髙第精勤者加級賜帛各有差詔左丘明卜子夏公羊髙穀梁赤伏勝髙堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭康成服子慎何休王輔嗣杜元凱范寧等二十有一人並用其書垂於國胄既行其道禮合崇褒自今有事於太學可並配享尼父廟堂元宗詔兩京國子監及天下諸州夫子南面坐十哲等東西十哲並封侯始正南面改冕服樂用宫懸仍追贈曽參等六十七人皆為列伯詔春秋釋奠始復用牲牢釋奠畢宰臣文武百官魚朝恩咸詣國子監觀講經有司陳饌詔遣中使賜酒德宗釋奠畢集國學學官升講座陳五經大旨釋奠釋菜先聖先師先老文王世子云凡學春官釋奠於其先師秋冬亦如之注云官謂禮樂詩書之官也正義曰此論四時在學釋奠之事凡學者謂禮樂詩書之學於春夏秋冬之時所教之官釋奠於其先師猶若教書之官春時於虞庠之中釋奠於先代明書之師四時皆然教禮之官秋時於瞽宗之中釋奠於其先代明禮之師如此之類是也禮樂詩書之官謂所教之官若春誦夏弦則太師釋奠也教干戈則小樂正籥師等釋奠也教禮者則執禮之官釋奠也注又言周禮曰凡有道有德者使教焉死則以為樂祖祭於瞽宗此之謂先師若漢禮有髙堂生樂有制氏詩有毛公書有伏生可以為之也正義曰此證樂之先師禮及詩書之官有道有德者亦使教焉死則以為書禮之祖後世亦各祭於其學也不言夏從春可知文王世子又云凡始立學者必釋奠於先聖先師及行事必以幣正義云此明諸侯之國天子命之始立學者必釋奠也言諸侯立學釋奠於先聖先師則天子始立學亦然也天子云四時釋奠於先師不及於先聖者則諸侯四時釋奠亦不及先聖也始立學云必用幣則四時常奠不用幣也文王世子云釋奠者必有合也國有故則否注云國無先聖先師則所釋奠者當與鄰國合也正義云此謂諸侯之國釋奠之時若己國無先師則合祭鄰國者彼此二國共祭故云合也非謂就他國而祭之當遙合祭耳若魯有孔子顔回餘國祭之不必於魯若己國有先聖先師則不須與鄰國合也國有故則否者如唐虞有夔龍伯夷周有周公魯有孔子是國有故人不與鄰國合祭也熊氏曰月令釋菜不及先聖者以其四時入學釋菜故不及先聖也王制釋奠於學注以為釋菜奠幣知非釋奠者彼是告祭之禮初天子出師受成於學告之無牲故謂釋奠時亦不及先聖文王世子云始之養也養老之處適東序釋奠於先老釋奠有六釋菜有三凡釋奠有六始立學釋奠一也四時釋奠有四通前五也王制師還釋奠於學六也釋菜有三春入學釋菜合舞一也釁器釋菜二也文王世子云始立學者既興器用幣然後釋菜注云興當為釁字之誤凡禮樂之器成則釁之又用幣告先聖先師以器成將用也學記皮辨祭菜三也釋幣唯一即釁器用幣是也古者釋奠或施於山川或施於廟社或施於學周官大祝大會同造於廟宜於社過大山川則用事焉及行舍奠甸祝舍奠於祖廟禰亦如之此施於山川廟社者也大司樂凡有道有德者使教焉死乃以為樂祖祭於瞽宗文王世子凡學春官釋奠於先師秋冬亦如之凡始立學者必釋奠於先聖先師及行事必以幣凡釋奠者必有合也天子視學大昕鼓徴乃命有司行事興秩節祭先聖先師焉有司卒事反命適東序釋奠於先老王制出征執有罪反釋奠於學以訊馘告此施於學者也山川廟社之祭不止於釋奠學之祭釋奠而已賈公彥曰非時而祭曰奠此為山川廟社而言之也學之釋奠則有常時者有非常者文王世子凡學春官釋奠於先聖先師秋冬亦如之此常時之釋奠也凡始立學天子視學出征執有罪反以訊馘告必釋奠焉此非時之釋奠也釋奠之禮有牲幣有合樂有獻酬大祝造於廟宜於社過大山川則用事反則釋奠此告祭也曽子問曰成告必用牲幣文王世子凡始立學釋奠行事必以幣此釋奠有牲幣之證也文王世子凡釋奠必有合也此釋奠有合樂之證也聘禮觴酒陳席于阼薦酭醢三獻一人舉爵獻從者行酬乃出此釋奠有獻酬之證也然山川廟社之釋奠皆有牲幣學之釋奠非始立學則不必有幣也學之釋奠有合樂則山川廟社不必有合也聘賓釋奠有三獻則天子諸侯之於山川廟社不止三獻也陳禮書孔子祠七十二賢漢元帝孔霸以帝師賜爵號褒成君奉孔子後平帝元始初追諡孔子曰褒成宣尼公追封孔均為褒成侯後漢光武建武十三年封均子為侯章帝元和二年二月東巡狩因幸魯祠孔子七十二弟子魏晉宋後魏北齊後周隋皆封孔子後為侯唐武德二年詔國子學立周公孔子廟七年髙祖釋奠以周公為先聖孔子為先師貞觀二年房玄齡朱子奢建言周公孔子俱聖人然釋奠於學以夫子也大業以前皆孔子為先聖顔回為先師乃罷周公升孔子為先聖以顔回配四年詔州縣學皆作孔子廟詞題貞觀十一年封孔子後德倫為褒聖侯二十一年制曰左丘明卜子夏公羊髙榖梁赤伏勝髙堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭玄服虔何休王肅王弼杜預范寧賈逵總二十二人並為先師永徽中制令改周公為先聖黜夫子為先師顔回左丘明從祀開元八年敕改顔子等十哲為坐像悉應從祀曽參大孝德冠同列特為塑像坐於十哲之次圖畫七十子及二十二賢於廟壁上以顔子亞聖親為之贊以書於右閔損以下當朝文士分為之贊二十七年八月制夫子追贈諡為文宣王昔緣周公南面夫子西坐自今以後夫子南面而坐內出王者衮冕之服以衣之十哲等東西列侍顔子淵既云亞聖須優其秩顔子兖國公閔子騫贈費侯冉伯牛贈鄆侯冉仲弓贈薛侯宰子我贈齊侯端木子貢贈黎侯冉子有贈徐侯仲子路贈衛侯言子遊贈吳侯卜子夏贈魏侯又夫子格言參也稱魯雖居七十之數不載四科之目頃雖參於十哲終未殊於等倫久稽先旨俾復舊位庶乎禮得其序命尚書右丞相裴耀卿持節就國子廟册册畢所司奠祭亦如釋奠之禮春秋二仲上丁令三公攝行事七十子宜進贈曽參贈郕伯顓孫師贈陳伯子張淡臺滅明贈江伯宓子賤贈單伯名不齊原憲贈原伯字子思公冶長贈莒伯南宫子容贈郯伯名括公晢哀郳伯曽點宿伯名晢顔路杞伯名無繇商瞿蒙伯字子木髙柴共伯字子羔漆雕開滕伯字子若公伯寮任伯字子閭司馬牛向伯名耕樊遲樊伯名須有若卞伯公西赤郜伯字子華巫馬期鄫伯名施梁鱣梁伯字叔魚顔栁闕伯名幸字子栁冉孺紀伯字子魯曹恤豐伯字子循伯虔鄒伯字子折公孫龍黃伯字子石冉季東平伯字子産秦子南少梁伯名祖漆雕子斂武城伯名哆顔子精琅琊伯名髙字子驕漆雕徒父須句伯壤駟赤北徴伯字子徒商澤睢陽伯家語字子季石作蜀郈邑伯字子明任不齊任城伯字選公夏守亢父伯史記公夏首公良孺東牟伯后處營丘伯秦子開彭衙伯名冉奚容針下邳伯字子哲公肩定新田伯字子牛顔襄臨沂伯名祖鄡單銅鞮伯字子家句井疆淇陽伯罕父黑乘丘伯字子素秦商上洛伯字子丕申黨邵陵伯字周公祖子之期思伯榮子斯雩婁伯名旗字子淇縣成巨野伯字子祺左人郢臨淄伯燕伋漁陽伯字思鄭子徒滎陽伯名國顔之僕東武伯字叔原亢誰萊蕪伯樂咳昌平伯廉潔莒父伯史記作潔顔何開陽伯史記作輿字叔仲會瑕丘伯字子期狄黑淮濟伯邽巽平陸伯孔患汶陽伯公西與如重丘伯字子上公西針祝阿伯蘧瑗衛伯施常乘氏伯林放清河伯秦非沂陽伯字子之陳亢潁伯申棖魯伯琴牢闕伯顔噲朱虛伯字子聲步叔乘淳于伯字子車琴張南陵伯通典自十哲外自曽參至琴張凡七十三人史記云自顔回至公孫龍三十五人頗有年名及受業見于書傳自冉季至公西針其四十三人無年及不見書傳但紀其名於左家語七十四賢史記七十七賢通典八十三賢太史公曰學者多稱七十子之徒譽者或過其實毁者或損其真鈞之未覩厥容貌則論之弟子籍出孔氏古文近是余以弟子名姓文字悉取論語弟子問并次為篇疑者闕焉史記仲尼弟子列傳云孔子曰受業身通者七十有七人皆異能之士也德行顔淵閔子騫冉伯牛仲弓政事冉有季路言語宰我子貢文學子遊子夏師也辟參也魯柴也愚由也唁回也屢空賜不受命而貨殖焉億則屢中孔子之所嚴事於周則老子於衛蘧伯玉於齊晏平仲於楚老萊子於鄭子産於魯孟公綽數稱臧文仲栁下惠銅鞮伯華介山子然孔子皆後之不並世宋朝景德四年四月李維言諸州釋奠文宣王今長吏多不親行禮甚非尊師重教之道也請令禮官申明舊典頒之天下詔太常檢討云案五禮精義州縣春秋二仲月上丁釋奠文宣王刺史縣令初獻上佐縣丞亞獻州博士縣簿尉終獻如有故以次官攝祭釋奠同請詔天下並用此禮從之祥符二年詔禮院定州縣釋奠文宣王廟禮數以聞禮院請正配座每座樽各二籩豆各八簠簋各二俎二從祀籩豆各二簠簋俎各一從之又獻在京小祠例止以公服行事太公廟唐開元十九年四月兩京及天下諸州各置太公廟以張良配享春秋取仲月上戊日祭諸州賓貢武舉準明經進士行鄉飲酒禮每出師命將辭訖發日便就朝引辭仍簡取自古名將功成業著洪濟生人者十人準十哲例霑享乾元元年太常少卿于休烈奏子房生於漢初考其年代不接太公自古配食廟庭皆取當時佐命太公人臣不合以張良配享請移於漢祖廟從之上元元年閏四月追封太公望為武成王有司依文宣王置廟仍擇古今名將準文宣王置亞聖及十哲等宋朝建隆三年九月詔於東京舊城南建廟與國學對命崔頌董役仍令檢閲唐末以來謀臣名將勳績者以聞四年帝幸武成廟閲土木之工也歷觀兩廊圖畫名將指白起曰此人殺已降不武之甚何受享於此以杖畫去之是年六月知制誥髙錫上言配享七十二賢王僧辨不克令終慮非全德望加裁定詔張昭竇儀與錫詳定昭等奏議曰武成王廟新升入歷代功臣二十三人漢灌嬰後漢耿純王霸祭遵班超西晉王渾東晉周訪宋沈慶之後魏李崇傅永北齊段韶李弼唐秦叔寶張公謹唐休璟渾瑊李光顔裴度李訴鄭畋梁葛從周後唐周德威符存審其舊配享功臣退二十二人魏吳起齊孫臏趙廉頗漢韓信彭越周亞夫後漢段顒魏鄧艾晉陶侃蜀關羽張飛晉杜元凱北齊慕容紹宗梁王僧辨陳吳明徹隋楊素賀若弼史萬歲唐李光弼王孝傑張齊丘郭元振詔曰其武成王廟從祀齊相管仲宜塑像升于堂魏西河守吳起宜畫像降于廡下餘並從舊制注時直史館梁周翰上言伏覩詔書命張昭等定武成廟七十二賢功業終始無瑕者方得與焉臣竊謂不可請試論之天地以來聖賢交鶩今古同流鮮克具美周公聖人也佐武王定天下輔成王蒞祚盛德大勳極天蟠地外則淮夷結難內則管蔡流言狼跋其胡垂至顛頓偃禾仆木僅至辨明此可謂之盡善哉臣以為非也孔子亦聖人也刪詩書定禮樂祖述堯舜憲章文武卒以倉惶舍魯奔走厄陳圖茍合於定哀曽不容於季孟受學之門人則宰豫覆族仲由凶死此又可謂之盡善哉臣以為非也自餘區區後賢瑣瑣立事比於二聖曽何足云而欲責於磨涅不渝求其終始如一者臣竊以為難其人矣逮乎唐室崇奬太公厥意無他其理甚顯蓋以天下雖乂不可去兵顯張國威遂進王號上元之際祀典益修因以歷代武臣陪享廟祀如文宣王釋奠之制有弟子列侍之儀事雖不經義足垂勸曩日討論亦云折中今若求其考類别定否臧以羔袖之小疵忘狐裘之大善恐其所選僅有可存只如樂毅廉頗皆奔亡而為虜韓信彭越悉葅醢以受誅白起則賜劍杜郵伍員則浮尸江澨左車亦奔軍之將孫臏實刑餘之人穰苴則憤卒齊庭吳起則非命楚國亞夫死於獄吏鄧禹敗於回溪其餘諸葛亮之儔事偏方之主王景略之輩佐閏位之君凡此諸將悉皆人雄茍欲指瑕誰當無纍若一旦除去神位擯出祠庭吹毛求異代之非投袂忿古人之惡必使時情頓惑竊議交興景行髙山更奚瞻於往躅壯魂烈魄將有恨於明時陛下方勵軍威將遏亂略謹求兵法激勸戎臣云云疏奏帝以升降之制有所勸懲不報淳化五年十一月幸武成廟指郭子儀像謂左右曰子儀纍朝握兵立大功無震主之威宜其配享矣又指李晟曰德宗播越蓋為姦邪所誤不能斥去之非李晟克復則唐運已去矣因咨嗟久之景德四年詔西京擇地建廟如東京之制祥符元年十一月詔加諡昭烈武成王仍於青州特建祠廟春秋委長吏致祭告禮類古者天子巡狩出征有親告宗廟之禮國朝因之故幸西京封泰山祠后土謁太清官皆親告太廟三歲皇帝親郊每祈穀上帝祀感生帝雩祀祭方丘明堂大享祭神州地示祀圓丘並遣官告祖宗配侑之意其他大事自祖宗以來登位改名上尊號改元立皇后太子皇子生納降獻俘親征籍田朝陵賜赦上諡祔廟皆遣官奏告天地宗廟諸陵及告社稷嶽瀆山川宫觀在京十里內神祠其儀用犧樽豆籩各一樽實以酒豆籩以脯醢宫觀以素饌時果祝板幣帛行一獻禮祈報類國朝凡水旱災異有祈報之禮祈用酒脯醢報如常祀或乘輿親禱或分遣朝臣云云建隆二年學士王著言秋稼將登稍愆時雨望令近臣依舊典禮告祭天地宗廟社稷及望告嶽鎮海瀆於北郊以祈雨詔用其禮惟不祀配座雨足報祭如禮端拱二年十月御書一幅授吕蒙正等曰萬方有罪罪在朕躬顧兹雨雪愆期應是祅星所致為人父母莫或遑寧當與卿等審刑政之闕失念稼穡之艱難恤物安人以祈垂佑翊日蒙正等引兩漢故事星火水旱皆免三公願上印綬以為調燮無狀帝慰勉久之先是彗星謫見之後自七月不雨至是凡五嶽四瀆名山大川無不遍禱曽無響應帝憂念人民故有是詔淳化三年五月帝以久愆時雨憂形于色謂宰相曰歲旱滋甚朕懇禱精至並走神示而猶未獲膏澤者豈非四方刑獄寃濫郡縣吏不稱職朝廷政理有缺乎是夕降雨尺餘翌日宰相以時雨應期賀帝曰朕孜孜求理視民如傷內省於心無所負矣而久愆時雨蓋隂陽之數非朕之所憂者在政化之未孚官吏之不稱職爾因切責宰相李昉等慙懼拜伏退上表待罪賜璽書諭答咸平二年閏三月知揚州魏羽上唐李雍雩祀五龍祈雨之法詔頒於諸路帝曰此法前代所傳不用巫覡蓋防褻慢可令長吏精潔行之注其法以甲乙日擇東方地作壇取土造青龍長吏齋三日詣龍所汲流水設香案茗果飱餌率羣官鄉老日再至祝酹不得用音樂巫覡以致媟瀆雨足送就水中餘四方皆如之飾以方色大凡日干建壇取土之里數器之大小龍之修廣皆取五行生成數焉景德二年五月詔頒畫龍祈雨法注其法擇潭洞或湫濼林木深邃之所以庚辛壬癸日刺史縣令帥耆老齋潔先以酒脯告訖築方壇三級髙一尺闊一丈三尺壇外二十步界以白繩壇上植竹枝張畫龍其圖以縑素上畫黑魚左顧環以元黿十黑中為白龍吐雲黑色其下畫水波有龜亦左顧吐星氣如線和金銀朱丹飾龍形又設皂幡刎鵝頸取血置盤中楊枝灑水龍上俟雨足三日賽以一豭取畫龍投水中祥符二年二月以愆雨遣官祀太一宫以禮院言太一宫兩廊有十精太一十六神並主風雨望遣官分拜天禧元年三月以旱遣官禱天地宗廟社稷及祠宇名山大川靈迹之處中書門下言舊制四海不祈帝曰百谷之長潤澤及物安可闕禮特命祭之慶厯三年五月諫官以天旱請遣官祈雨帝曰朕已宫中蔬食密禱上天引咎罪已庶獲豐懋之應宰臣章得象曰陛下奉天憂民至誠如此必有感召帝曰天災流行亦朕躬無德所致得象曰此乃臣等備位衡宰未能宣布善政以召和氣帝曰時政中瑣細之務不足留意惟是民間疾苦須當省察有以利天下者必行之卿等更宜公共訪求以答天意云云其後雨應宰臣賀雨帝曰云云比欲下詔避寢撤膳以申責已之意朕不當此虛名夙夜清心密為祈請爾八年六月帝謂輔臣曰朕比以苦雨日夜蔬食夙夜禱于上帝倘霖淫未息當去食啜水冀移災朕躬然不欲外聞之恐其近名也宰臣文彥博對曰今景氣澄晏聖德感通也皇祐四年十二月無雪初帝以愆亢責躬減膳每見輔臣則憂形于色龎藉等因言臣等不能燮調隂陽而上煩陛下責躬引咎願守散秩而避賢路帝曰是朕誠不能感天而惠不能及民非卿等之過也是夕乃得雪治平元年五月詔自今水旱命官禱于九宫貴神從胡宿之請也熙寧十年四月中書門下言御前降到蜥蜴祈雨法排辦其法捕蜥蜴十數枚置之甕中漬之以雜木葉選童男數十人衣青衣青塗面及手足仍持栁枝沾水散灑且呪曰蜥蜴蜥蜴興雲吐霧雨今滂沱汝今歸去如是者晝夜嬰繞而言是月十八日依法為之至二十夜雨詔附宰鵝祈雨法後頒行恭謝類大中祥符五年十月三日奉天書於朝元殿恭謝玉皇大帝聖祖配坐在東太祖太宗在西六年八月詔以來年春親詣亳州太清宫行朝謁之禮先於東京置壇回日恭謝天地一如南郊之制九月司天監言恭謝天地壇宜於城東汴陽鄉同樂村擇地吉從之七年十六日奉天書升壇恭謝天地祖宗並配分命羣官享從祀諸神還御乾元門赦祥符九年五月一日內出御札以十年正月十一日有事于南郊行恭謝之禮天禧元年正月十一日奉天書合祭天地於南郊以太祖太宗並配禮畢還御乾元門賜赦改元帝作恭謝南郊七言詩近臣咸和明道元年修宫室成行恭謝禮嘉祐元年九月於大慶殿行恭謝之禮權罷冬至親祀南郊其賞給並如南郊例施行太常禮院言恭謝請如明堂故事用鑾駕儀仗從之國朝恭謝之禮始於大中祥符五年時聖祖降延恩殿帝重其事乃詔用玉幣服衮冕恭謝玉皇大帝於朝元殿而以祖宗配侑禮成羣臣稱賀帝亦均錫之福其後以七年既朝謁太清宫天禧元年既上玉皇聖號寶册皆舉是禮然别立壇壝於國南而儀物禮制悉如郊祀視五年之制為加盛矣仁宗皇帝於明道初嘉祐元年復即大慶殿行之因輟郊祀自是而後遂不復講云國朝會要髙宗紹興十三年十二月甲午上謁景靈行恭謝禮乙未再詣十九年十月己酉朔宰執奏太常寺申將來郊祀恭謝禮畢合詣太一宫行燒香之禮上曰此祖宗故事可行也壇壝類封人掌設社稷之壝司儀掌將合諸侯則令為壇三成三成三重也宫旁一門掌舍掌王會同之舍為壇壝宫棘門禮書曰天子春帥諸侯拜日於東郊則為壇於國東夏禮日於南郊則為壇於國南秋禮山川丘陵於西郊則為壇於國西冬禮月及四瀆於北郊則為壇於國北既拜禮而還加方明於壇上而祀焉覲禮方明者木也方四尺四方各從其色上元下黃鄭氏曰上下四方神明之象也會同而盟神明監之孔書曰鄭氏以方明之設為盟而已其説拘矣天子拜日禮月與四瀆山川丘陵畢則升壇以祀方明既而退方明以朝諸侯其或盟則復加方明於壇而以載辭告之宗廟亦有壇墠祭法曰王立七廟一壇一墠去祧為壇去壇為墠禱焉祭之無禱乃止祭禮言天子至士立廟之制多與禮異其言壇墠等威之辨理或有之蓋先王之於祖有仁以盡其愛有義以斷其恩近則月祭逺則享嘗在祧無寢去祧無廟此以義處仁也去祧為壇去壇為墠壇墠之設為其無廟而不忍忘焉此以仁行義也元豐郊壇壝位元豐元年十一月詳定郊廟奉祀禮文所言周官外祀皆有兆域後世因之稍增其制東漢壇位天神從祀者甚衆至一千五百十四神故外重營以為等限日月在中營內南道而北斗在北道之西至於五星中宫宿之屬則其位皆在外營然則為重營者所以等神位也唐因齊隋之制設為三壝天神列位不出內壝而御位特設於壇下之東南若夫公卿分獻文武從祀與夫樂架饌幔則皆在中壝之內而大次之設乃在外壝然則為三壝者所以序祀事蓋古者神位寡祀事簡故守有域以為遮列厲禁而已後世神位衆祀事繁故為三壝者以嚴內外之限國朝郊祀壇域率循唐制圜丘三壝每壝二十五步而有司乃以青繩代內壝誠不足以等神位序祀事嚴內外限伏請除去青繩如儀注為三壝之制從之至十四日行禮於圜丘牲牢類檀弓曰夏后氏尚黑牲用玄禮書曰湯之告天以玄牲用夏禮也商人尚白牲用白周人尚赤牲用騂文王騂牛一武王騂牛一是也周禮牧人掌牧六牲司徒奉牛宗伯奉雞司馬奉羊司冦奉犬司空奉豕小宗伯亦曰毛六牲凡祭祀共其犧牲以授充人祀五帝則繫于牢芻之三月享先王亦如之肆師大祭祀展犧牲繫于牢公羊曰帝牲在于滌三月何休曰滌宫名養帝牲三牢之處也禮書曰養馬謂之圉養牛謂之牢圉以防之牢以固之不特牛也羊之所在亦曰牢禮言少牢是也豕之所在亦曰牢詩曰執豕于牢是也所謂三牢封人凡祭祀飾其牛牲設其楅衡飾牲之禮曲禮曰飾羔鴈者以繢莊周曰犧牛衣以文繡漢儀夕牲被以絳周禮羊人亦有所謂祭祀飾羔牛人祭祀共其享牛楚語曰郊禘不過角繭栗蒸嘗不過把握記曰天地之牛角繭栗宗廟之牛角握賓客之牛角尺稿人掌豢祭祀之犬此養牲角牲飾牲之大略也牛羊牲郊所以用特牲者郊謂於南郊祭感生之帝但天神至尊無物可稱故用特牲郊與配坐皆特牲也是故郊特牲云帝牛不吉以為稷牛注言養牛必養二又召誥用牲于郊牛二是也郊天初有燔燎後有正祭皆須有牲故大宗伯云實柴祀日月星辰鄭司農云實牛柴上也鄭康成云實牲體焉郊惟特牲何得供燔燎正祭二處所用熊氏皇氏等以為分牲體供二處所用其實一特牲也我將祀文王於明堂經云維羊維牛者據文武配祭得太牢也若孔安國之義后稷配天用太牢故召誥用牲于郊牛二注云后稷貶於天有羊豕案羊人云釁積共其羊牲注云積積柴則祭天用羊者熊氏云謂祭日月以下故燔燎用羊也小司徒云凡小祭祀奉牛牲鄭注云小祭祀王元冕聽祭然則王者之祭無不用牛又禮緯云六宗五嶽四瀆之牛角尺則日月以下常祀則用羊主配之祀皆用牛血腥爓孰禮器云郊血大享腥三獻爓一獻孰鄭注云郊祭天也大享祫祭先王也三獻祭社稷五祀一獻祭羣小祀也爓沈肉於湯也血腥爓孰逺近備古今也尊者先逺差降而下至小祀孰而已正義云血為逺腥次之爓稍近孰最近逺者為古近者為今一祭之中兼有此事也凡郊與大享三獻之屬正祭之時皆有血有腥有爓有孰此云郊血是郊有血也郊特牲云血毛告幽全是宗廟有血也宗伯云以血祭社稷五祀是三獻有血也楚語云禘郊之事則有全蒸是郊祭天有熟也則有腥可知宗伯云以肆獻祼享先王是大享有腥有熟也此云三獻爓宗伯云以血祭祭社稷五祀既有血有爓明有腥有熟可知周禮掌客掌四方賓客之牢禮餼獻飲食之等數王合諸侯則具十有二牢朝訖致饔餼公九牢侯伯七牢子男五牢何也蓋合諸侯具十二牢者公侯伯子男盡在朝位王兼享之故用十二牢若單享一國則隨其命數禮記曰有虞氏之祭也尚用氣血腥爓用氣也商人臭味未成滌蕩其聲周人尚臭則自氣至臭其禮浸文矣郊祀志注漢祭天牛養五歲又漢官舊儀夕牲牛以繡衣之唐郊祀録凡祭祀之牲大祀在滌九十日中祀三十日小祀十日一月在外牢二月在中牢三月在明牢禮書曰牧人六牲以共祭祀之牲牷凡陽祀用騂牲隂祀用大牲望祀各以其方之色時祀之牲用牷外祭毁事用厖陽祀祀天及宗廟也隂祀祀地及社稷也望祀則四嶽四瀆也以郊特牲之騂犢洛誥之騂牛則祀天及宗廟用騂固也然大宗伯牲幣各放其器之色則天之牲以蒼而不以騂地之牲以黃而不以黝者蓋騂者陽之盛色陽祀以騂為主而不必皆騂黝者隂之盛色隂祀以黝為主而不必皆黝則牧人所言亦其大率而已不然則詩曰來方禋祀以其騂黑則四方有用騂者矣孔子曰犁牛之子騂且角山川其舍諸則山川有用騂者矣卜牲者禮記曰君召牛納而視之擇其毛而卜之吉然後養之僖三十一年四卜郊不從乃免牲成七年鼷鼠食郊牛角改卜又食乃免牛不郊酒醴類周禮酒正凡祭祀以法共五齊泛齊醴齊盎齊緹齊沈齊三酒事酒清酒昔酒以實八樽大祭三二中祭再二小祭一二皆有酌數惟齊酒不二皆有器量司尊彜凡六􅉓六尊之酌鬱齊獻酌醴齊縮酌盎齊説酌凡酒修酌禮運玄酒在室醴盞在户粢醍在堂澄酒在下坊記醴酒在室醍酒在堂澄酒在下禮書曰濁莫如五齊清莫如三酒祭祖有五齊以神事之也有三酒以人養之也酒正共五齊三酒以實八樽皆陳而弗酌所以致事養之義也其二此八樽者皆酌而獻所以致事養之用也犧象所以實泛與醴罍尊所以實盎以下也玄酒在室醴盞在户粢醍在堂澄酒在下此則設而弗酌也又曰齊之作也始則其氣泛然次則有酒之體中則盎然而浮久則赤終則沈泛齊在室以其未離於道故也醴盞在户以其離道未逺故也粢醍在堂則道與事之間者也澄酒在下則純於事而已夫醴齊縮酌則以茅縮而後酌此記所謂縮酌用茅明酌是也盎齊説酌則以酒説而後酌此記所謂盞酒説於清是也禮書曰祫備五齊禘備四齊時祭備二齊朝用醴齊饋用盎齊諸臣自胙用凡酒鬱鬯秬鬯類周禮鬱人凡祭祀賓客之祼事和鬱鬯以實􅉓而陳之築鬱金煮之以和鬯酒案王度記云天子以鬯諸侯以熏大夫以蘭芝士以蕭庶人以艾此等皆以和酒諸侯以熏謂未得圭瓚之賜得賜則以鬱鬯禮書曰天子鬯諸侯以熏誤矣特牲少牢大夫士有奠而無祼傳又曰大夫蘭芝士以蕭庶人以艾不可考也鬯人掌共秬鬯而飾之秬鬯不和鬱者飾之謂設中也大宗伯祭大神享大鬼祭大示涖玉鬯肆師祭之日及果築鬻陳禮書曰禮或言秬鬯或言鬱鬯蓋秬一稃二米天地至和之氣所生謂之鬯以言和氣之條鬯也謂之鬱鬯以其鬻鬱草和之祼類書曰王入太室祼小宰凡祭祀贊王幣爵之事祼將之事凡賓客贊祼內宰大祭祀后祼獻則贊瑶爵亦如之凡賓客之祼獻瑶爵皆贊行人曰公再祼而酢侯伯子男一祼而酢大國之孤以酒禮之齊酒也和之不用鬱鬯耳禮器曰諸侯相朝灌用鬱鬯無籩豆之薦郊特牲曰商人尚聲臭味未成滌蕩其聲樂三闋然後迎牲周人尚臭灌用鬱鬯然後迎牲禮書曰商人尊神而交神於明故先樂而求諸陽周人尊禮而辨神於幽故先祼而求諸隂禮書曰鄭氏注謂宗廟有祼天地大神至尊不祼大宗伯凡祀大神享大鬼祭大示涖玉鬯表記曰親耕粢盛秬鬯以事上帝蓋祀天有鬯者陳之而已非必祼也行人曰公再祼侯伯子男一祼而卿無祼則以酒禮之而已祭統所記獻之屬莫重於祼者也圭璧類周禮大宗伯以玉作六器以禮天地四方以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以元璜禮北方典瑞四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望禮書曰要之蒼璧禮天冬至之郊也四圭有邸非必冬至之郊也黃琮禮地夏至之祭也兩圭有邸非必夏至之祭也冬至用蒼璧夏至用黃琮非冬至則四圭非夏至則兩圭圭璧以祀日月星辰周禮玉人大璋説者曰瓚也下同中璋九寸籩璋七寸射四寸厚寸黃金勺青金外朱中鼻寸衡四寸有繅天子以巡狩宗祝以前馬璋邸射素功以祀山川邸射剡而出也典瑞曰祼圭用瓚以肆先王玉人之事祼圭尺有二寸有瓚以祀廟禮書曰天地之神無所用祼故典瑞祼圭止於肆先王玉人祼圭止於祀廟則天地無祼可知郊特牲曰周人尚臭祼用鬯鬱合鬯臭隂達於淵泉灌以圭璋用玉氣也既灌然後迎牲致隂氣也明堂位曰灌用玉瓚大圭祭統曰君執圭瓚祼尸大宗執圭瓚亞祼此諸侯用圭瓚之禮也周衰禮廢而臧文仲以鬯圭如齊告糴豈知先王之意哉圭幣類周官小行人合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼此朝覲之用幣者也大宗伯禮天地四方皆有牲幣各放其器之色此禮天地四方之用幣也太宰祀之日贊玉幣爵之事享先王亦如之此宗廟之用幣者也肆師曰大祀用玉帛牲牷鄭注大祀謂天地宗廟也則天地宗廟皆用幣無疑矣公食大夫侑以束帛而庭實以皮大夫相食以束錦此食有侑幣也春秋虢公晉侯朝王享醴命之宥皆賜玉五瑴馬三匹秦后子享晉侯歸取酬幣終事八反魯侯享范獻子莊叔執幣此享有酬幣也燕禮用幣之文特鹿鳴之詩曰既飲食之又實幣帛以將其厚意此燕有酬幣也羣書考索卷三十六
