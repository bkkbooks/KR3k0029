body:
  text: 羣書考索續集卷十宋章如愚編經籍門禮春官禮官象春所立釋曰鄭目録云象春所立之官也宗尊也伯長也春者出生萬物天子立宗伯使掌邦禮典禮以事神為上亦所以使天下報本反始不言司者鬼神示人之所為莫敢主之故也辨春官宗伯之義王曰禮有五經莫重於祭宗伯掌天神人鬼地示之禮則謂之宗於四時之官為長則謂之伯豈特宗伯為然哉凡典禮者皆謂之宗若所謂都宗人家宗人者是也夫天地尊親也四時伯仲也天官言冡有尊者之道焉春官宗伯有長之道焉春官叙官不同天府何以在春官掌祖廟之守藏大寶器祭祀則陳於庭故也韎師何以特掌韎樂不與鞮鞻氏掌四夷樂同者東夷曰韎以周以木徳王又見樂為陽春陽是長養之方故特立韎師韎赤色又取東方日出言周尚赤内史外史何以列春官以内史掌羣臣策命及八枋外史掌外令及皇帝之書御史掌贊故在此太史何以長於内史史之中大夫以太史知天道故稱太都家何以稱司馬以軍事重故與之官同其名也神士何以在家宗人之後以羣士中有學問者即抽入為神士無常數也宗伯名號更革鄭司農云宗伯主禮之官故堯典曰帝曰俞咨伯汝作秩宗春秋禘于太廟躋僖公而𫝊曰夏父弗忌為宗人又曰使宗人釁夏獻其禮郊特牲曰宗人升自西階視壺濯及豆籩然則唐虞厯三代以宗官典國之禮與其祭祀漢之太常是也辨宗伯漢之太常釋曰注云虞書是虞法并云唐者堯舜道同故引虞則唐亦與虞同也言厯三代者上舉唐虞下舉周法則其中夏殷亦宗官掌禮可知故總以三代言之也云則漢時太常是也昔三代異法殊禮有㳂革故至漢時祭祀之禮使太常主之故云漢之太常是也但此宗伯主禮并下文主鬼神自分明必引諸文為證者當時張包周孟及何休等不信周禮是周公所制以為六國時隂謀之書故先鄭以諸文為證也宗伯不布象魏周官正月之吉皆垂治象之法於象魏而春官不布何也葢立官所以為民也天官所掌者邦治地官所掌者邦教夏官所掌者邦政而秋官所掌者邦禁也治教政刑之用必先有以令夫上下春官象魏不布固其職當然也宗伯天府之職大府玉府内外府泉府皆是藏財貨曰府亦是物所藏也云言天者尊此而藏若天物然者按其職云凡國之玉鎮大寶器藏焉是尊此所藏若天物然故名此府為天府也三禮五禮之别注曰禮謂曲禮五吉凶賔軍嘉其别三十有六鄭司農云宗伯主禮之官故書堯典曰帝曰咨四岳有能典朕三禮釋曰三禮者謂天地人之禮也虞書云修五禮下又云典朕三禮三五不同者鄭義上云修五禮與下五玉連文五玉是諸侯所執玉則五禮非吉凶軍賔嘉之五禮故鄭云五禮公侯伯子男之禮是以禮論云唐虞有三禮至周分為五禮若然云三禮不言五禮則三禮中含有五禮矣五帝六天之説釋曰春秋緯運斗樞云太微有五帝座星即春秋緯耀鈎云春起青受制其名靈威仰夏起赤受制其名赤熛怒秋起白受制其名曰招樞冬起黒受制其名含樞紐又元命苞云太微為天庭五帝以合時此等是五帝之號又按元命苞云紫微宫為大帝又文耀鈎云中宫大帝是天皇大帝之號也耀魄寶又云昊天上帝又名太乙常居其紫微宫中皇天上帝亦名昊天上帝尚書君奭云格于皇天鄭注皇天北極大帝又掌次設皇邸以旅上帝上帝即大帝堯典云欽若昊天上帝尚書君奭云格于皇天鄭注皇天北極大帝又掌次設皇邸以旅上帝上帝即大帝堯典云欽若昊天皆是大帝單名之事月令更無祭五帝之文故季夏云以供皇天上帝鄭分之皇天北辰耀魄寶上帝太微五帝亦是大帝單號之事若然大帝得單稱與五帝同五帝不得兼稱皇天昊天也異義天號等六今尚書歐陽説曰欽若昊天夏曰蒼天秋曰旻天冬曰上天總為皇天爾雅亦然故尚書説云天有五號各用所宜稱之尊而君之則曰皇天元氣廣大則稱旻天仁覆愍下則稱旻天自上監下則稱上天據逺視之蒼蒼然則稱蒼天謹案尚書堯命羲和昊天總𠡠四時知昊天不獨春春秋左氏曰夏四月已日孔子卒稱昊天不弔時非秋天𤣥之聞也爾雅者孔子門人作以釋六藝之文言葢不誤矣辨天帝非二義鄭曰以禋祀昊天上帝鄭司農以昊天為天上帝為𤣥天鄭康成亦云昊天上帝冬至於圓丘所祀天皇大帝在北極者也二鄭之説因孝經郊祀配天宗祀配帝而然也伊川先生曰天與帝一也天言其體帝言其主也在郊則言天以其冬至物生之始故祭之以圓丘而配以祖六宗異同之説文曰經星辰與司中司命風師雨師鄭君以為六宗按尚書堯典禋于六宗但六宗之義有其數無其名故先儒各以意説鄭君則以此星也辰也司中也司命也風師也雨師也六者為六宗按古尚書説六宗天地神之尊者謂天宗三地宗三天宗日月星辰地宗岱山河海日月為隂陽宗北辰為星宗岱為山宗河為水宗海為澤宗謹按夏侯歐陽説云宗十一而有六名實不相應周禮太宗伯曰以實柴祀日月星辰以槱燎祀司中司命風師雨師此之謂六宗亦自明矣禮論王莽時劉歆孔昭以為易震巽等六子之卦為六宗漢武即位依虞書禋于六宗禮用大社至魏明帝時詔令王肅議六宗取家語宰我問六宗孔子曰所宗者六埋少牢於大昭祭時相近于坎壇祭寒暑王宫祭日夜明祭月幽宗祭星雩宗祭水旱孔安國注尚書與此同司樂六徳教國子釋曰中和祗庸孝友六徳其中和二徳取大司徒六徳之下孝友二徳取大司徒六行之下其祗庸二徳與彼異自是樂徳所加也辨司樂不止聲音教國子以中和祗庸孝友於樂徳何明古者典樂之官豈止知聲音而止哉亦将以治人寛猛剛柔之性也故周官司樂則教國子必以徳行為先而聲音為後故先之以直亮剛簡而後以詩歌則教樂之官不止聲音可知矣三徳三行三徳曰至徳敏徳孝徳三行曰孝行友行順行或問師氏之官以三者教國子一曰至徳以為道本二曰敏徳以為行本三曰孝徳以知逆惡何也曰至徳云者誠意正心端本澄源之事道則天人性命之理事物當然之則脩身齊家治國平天下之術也敏徳云者强志力行畜徳廣業之事行則理之所當為日可見之跡也孝徳云者尊祖愛親不忘其所由生之事知逆惡則以得於已者篤深固有以真知彼之逆惡而自不忍為者也凡此三者雖曰各以其材品之髙下資質之所宜而教之然亦未有専務其一而可以為成人者也是以列而言之以見其相須為用而不可偏廢之意葢不知至徳則敏徳者散漫無統固不免乎篤學力行而不知道之譏然不務敏徳而一於至則又無以廣業而有空虚之弊不知敏徳則孝徳者僅為匹夫之行而不足以通于神明然不務孝徳而一於敏則又無以立本而有悖徳之累是以兼陳備舉而無所遺此先王之教所以本末相資精粗兩盡而不倚於一偏也其又曰教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長何也曰徳也者得於心而無所勉者也行則行其所行之法而已葢不本之以其徳則無所自得而行不能以自脩不實之以其行則無所持循而徳不能以自進是以既教之以三徳而必以三行繼之則雖其至末至粗亦無不盡而徳之脩也不自覺矣然是三者似皆孝徳之行而已至於至徳敏徳則無與焉葢二者之行本無常師必叶于一然後有以獨見而自得之固非教者所得而預言也唯孝徳則其事為可指故又推其類而兼為友順之目以詳教之以為學者雖或未得於心而事亦可得而勉使其行之不已而得於心焉則進乎徳而無待於勉矣况其又能即是而充之以周於事而泝其原則孰謂至徳敏徳之不可至哉或曰三徳之教大學之學也三行之教小學之學也鄉三物之為教也亦然而已文公文集司王朝之制師居虎門司王朝虎門路寢門也義謂路寢庭朝庫門外朝非常朝此是常朝故知在路門外葢路寢門在路門之裏議政事則在此外朝在庫門之外國有大事詢衆庶則在此非常朝也每日常朝王立於寝門外與羣臣相揖而已王又先揖羣臣就位王便入揖亦有髙下不同如天揖同姓是也胡明仲嘗云近世朝禮每日拜跪乃是秦法周制原不如此文公經説樂舞存六代之樂注曰此周所存六代之樂黄帝曰雲門大卷黄帝能成名萬物以明民共財言其徳如雲之所出民得以有族類大咸咸池堯樂也堯能殫均刑法以儀民言其徳無所不施大㲈舜樂也言其徳能紹堯之道也大夏禹樂也禹治水敷土言其徳能大中國也大濩湯樂也湯以寛治民而除其邪言其徳能使天下得其所也大武武王樂也武王伐紂以除其害言其徳能成武功辨樂名取象之義王曰皇以道而作樂也升之以法象乎天故以雲門言之帝以徳而作樂也降以效法乎地故以咸池言之大夏者禹之樂也功業莫大於禹故曰大夏夏以言其文明也與書號禹曰文命同意大濩者成湯之樂言其以寛代虐而有所濩也大武者武王之樂也言其誅暴伐亂而有所制也巾車用旗之制釋曰云太常以下仍有大旂大赤大白大麾之等故云以下云等叙之以封同姓異姓之次叙者周人先同姓次異姓後云四衛蕃國以下故云次叙也辨巾車司馬用旗之異釋曰趙商問巾車職云建大白以即戎注云謂兵事司馬職仲秋辨旗物以治兵王載太常下注云凡班旗物以出軍之旗則如秋不知巾車大白以即戎為在何時答曰殷之正色者或㑹事或勞師不親将故建先王之正色異於親自将辨建旗取象之制王曰祀以徳教建太常奉天道之象也有徳為能不忘焉賔以仁故建大旂大旂有升降而不為亂固賔之道也朝以禮故建大赤臣以宣帝著盡事上而君亦以是進焉固朝之道也即戎以義故建大白田以智故建大麾且大白之為色正秋也以即戎則宜莫盛於秋矣大麾之為色正冬也以田則宜莫盛於冬矣司常九旗之象注曰旂畫成物之象王畫日月象天明也諸侯畫交龍一象其升朝一象其下復也孤卿不畫言奉王之政教而已大夫士雜帛言以先王正道佐職也師都六鄉六遂大夫也謂之師都都民所聚也畫熊虎者鄉遂出軍賦象其首猛莫敢犯也州里縣鄙遂之官原約言之鳥隼象其勇㨗也龜蛇象其杆難辟害也道車象輅也王以朝夕燕出入游車木輅也王以田以鄙全羽析羽五色象其文徳也大閲王乗戎輅建太常焉玉輅金輅不出辨載旂等級之異王曰日月為常天道之運也故王載大常交龍為旂君徳之用也故諸侯載旂軍吏孤卿之為軍将者也以猛毅致其義故軍吏載旗師都孤卿之涖衆者也以涖属軍吏故載􅎶取其􅎶以事上而已鄉遂則卿遂之大夫也以其無所将故載物取其物有所属而已郊野則公邑之吏比其衆者也以完果致其智而已故載旐百官則以其属衛王焉以摯速致其禮而已故載旟辨戎田用旗之異巾車王建大白以即戎建大麾以田大司馬仲秋治兵王載太常四時田王建太常戎田用旂二文何不同大白勞軍或㑹同之時也太常自将之旂也大麾田於春夏太常田於秋冬此其所以異也夏官夏官象夏所立鄭云象夏所立之官馬者武也言為武者也夏整齊萬物天子立司馬掌邦政可以平諸侯正天下辨夏官司馬之義王曰先王制官以探本設司以伺末政非夏官也而謂之夏官者政以禮為本也此之謂探本政官也而謂之司馬者政以馬為末司至於馬則政官所司皆舉矣此謂之伺末夏官序官不同軍師及吏選於何官選於六官及六鄉之吏也在鄉所以謂之長還使此本長為吏也司勲何以列夏官軍無賞士不往故次之司馬司士何以列司馬云進賢興功故司士掌以徳功詔爵禄在此也量人何以列司馬掌營軍之壘舎量其市朝州令軍社之所里弁師何以列司馬謂人年長大而冠象夏物長大而成壮也馭何以不言右以僕難於右是以六藝之中有五馭而不言右也三右兼五輅葢道右充象輅之右戎右充革輅大輅之右齊右充玉輅金輅之右士官何以居大夫之前事急者居前事緩者居後故司勲馬質皆士官而居前射人諸子皆大夫而居後職方何以列司馬司馬主九州職方制其貢故也都宗人家宗人都司馬家司馬士宗設都宗人掌山川及九皇六十四氏王子弟祖王之廟家宗人掌大夫采地所祖與都同若先王之子孫亦有祖廟都司馬主軍賦者即司馬法所云成出七十人徒二十人等家司馬不特置故自使其家臣為之主其地之軍賦往聴政於王之司馬士則都家皆置各主其吏民之獄訟輕于軍事故王皆不置也司馬胥徒獨多釋曰此序官從大司馬至府六人其數與諸官同自史以下則異諸官皆云史十二人胥十二人徒百二十人獨此官史十有六人胥三十二人徒三百二十人與諸官異者以大司馬大摠六軍軍事尚嚴特須鑒察故胥徒獨多禮秋官秋官象秋所立鄭云象秋所立之官冦害也秋者道也如秋義殺害收聚斂藏於萬物也天子立司冦使掌邦刑刑者所以驅耻惡人納於善道也辨秋官司冦之義王曰先王之治先之以徳禮而輔之以刑政徳所不能化然後禮禮所不能服然後政政所不能正然後刑刑豈先王所欲用哉不得已而用之也故司冦掌刑而屬於秋官以秋者天所以肅殺之時於方則為西之酉於行則為金之剛而刑以義為主也然刑官而司至於冦則刑官之事無不舉矣謂之司冦其義如此秋官叙官不同何謂周官列職謂各有職同府史也刑官何以稱士士察也刑官之士所主異同鄉士掌六鄉遂士掌六遂聴獄公邑故官卑人多縣士掌三百四百里方士掌三等采地在王城四方訝士訝四方賔客誅戮暴客兼主四方之獄訟朝士掌外朝之法為詢衆庶讞也序賔客之職何以列秋官賔客是主人所禮故鄉飲禮坐賔於西北象天地嚴凝之氣始於西南盛於西北是以賔客之事亦属焉後之大行人小行人司儀環人行夫象胥掌交掌賔客掌訝皆取凝嚴象也司冦名號更革釋曰鄭注云有虞氏曰士夏曰大理周曰大司冦天子諸侯同故魯有司冦晉魏絳亦云歸死於司冦至於衰世國異政家殊俗官名隨時更造故僖二十八年晉有士榮為大士文十年楚子西云臣歸死於司敗論語云陳司敗昭十四年士景伯如楚叔魚攝理是後官號不同者也二鄭郊遂之制釋曰先鄭云百里外至三百里也者見縣士云掌野去王城四百里曰縣故曰小都任縣地方士云掌都家謂去王城五百里既以鄉士所掌為去王城百里内惟有二百里三百里二處在當是此遂士掌之故為此解後鄭不從𤣥謂其地則距王城百里以外至二百里者後鄭意六遂之地則在二百里中但獄則不在二百里中當在百里四郊上置之也若六鄉地在王城外獄則在城中然故更云言掌四郊此主四郊之獄六遂之獄在四郊也辨鄉遂之制不同鄭曰六遂之官自遂人以下皆降鄉一等鄉遂之長不比於畧之也距王城百里為鄉二百里為遂逹于畿封皆遂法也故鄉遂總之閭師而取閭以名野賦總之縣師而取縣以名晉文請隧於襄王葢是時魏耿霍虢乃入于晉境𫝊請隧者何求王畧也王辭之以視方千里足以供給而與之南陽之田則遂法畧見凡公卿采地皆在地有攸属則王官不察察焉故鄉教大抵加詳遂官趣耕事起大役而已葢有受之者矣凡郊内之賦或二十而一或十二或二十而三京師有它須焉則於近乎取故優之也禹貢冀州有賦無貢而甸師又以逺近而差征蓋自古然矣二鄭采地之制釋曰先鄭意縣士既掌四百里中故此方士掌五百里之中云公所食者謂載師所云大都任疆地者也引魯季氏食於都者謂諸侯大都與三公同後鄭不從謂都王子弟及公卿之采地家大夫之采地者欲見此經都是載師大都任疆土小都任縣地家是家邑稍地王子弟親者與公同百里稍疏者與卿同五十里更疏者與大夫同二十五里引載師職大都任畺地以下為正者是不從先鄭之言若先鄭以采地唯在四百里五百里之中載師何得有三等之差乎是以後鄭縣士自掌三等公邑之獄方士自掌三等采地之獄辨采地大小三等采地有三等邑於畿者有數千載師所謂家邑小都大都是也鄭氏謂家邑大夫之采地小都卿之采地大都公之采地王子弟所食邑也此謂三等采地邑於圻者也禮冬官冬官象冬所立釋曰鄭云象冬所立之官也是官名司空者冬閉藏萬物天子立司空使掌邦事亦所以富充家室使民無空者也司空之篇亡漢興購求千金不得此前世識其事者記録以備大數古周禮六篇畢矣辨司空考工之義王曰先王名官以司空則以居四民言之也作記者以考工言之則以時地利言之也夫百工之事雖本於聖作智創而非巧述工守則不足以設施而致用此百工所以與於六職之一也作記者謂之考工凡以質其成效而已冬官考工七節冬官考工其亡已久有人遵集舊典録此三十三以為考工記雖不知其人又不知作在何日要知在於秦前是以遭春焚滅而韋氏裘氏等闕也故鄭云前世識其事者記録以備大數爾從國有至謂之婦工一也從粤無鏄至夫人能為弓車二也從知者創物至皆聖人所作三也從天有時至此天時四也從攻木之工至陶旊五也從有虞氏至周上輿六也從一器而工聚車為多七也段氏韋氏裘氏筐人櫛人雕人是六闕也辨考工不足續周禮狐裘之敝可補以狐而不可補以羔緇衣之敝可補以緇而不可補以縞周官出於周公亦聖人之言也用以足六經之目是以狐補狐以緇補緇未為過也至於冬官之闕劉歆以考工記足之則是以羔補狐以縞補緇固未能免學者之疑也冬官所記之意釋曰冬官一篇其亡已久有人蓋集舊典録此三十工以為考工記雖不知其人又不知作在何日要知在於秦前是以得遭秦焚滅典籍韋氏裘氏等闕也故鄭云前世識其事者記録以備大數耳司空名號更革釋曰注云監百工者唐虞以上曰共工者按太史公楚世家云共工作亂帝使重黎誅之又按舜典云帝曰咨垂汝共工是唐虞已上者共工者也若然唐虞以上皆曰共工堯時暫為司空是以尚書舜典二十八載後咨四岳欲置百揆僉曰伯禹作司空注云初堯冬官共工舜舉禹治水堯知有强法必有成功故命司空以官異之禹登百揆後更名共工是其事也二鄭五材之異鄭司農云春秋𫝊曰天生五材民並用之謂金木水火土也𤣥謂化五材金木皮玉土釋曰𤣥謂此五材金木皮玉土者言此以對彼之五材金木水火土若然鄭知有皮玉無水火單用不得為器物故不取之知有皮玉者此三十工内函人為甲韗人為臯陶造鼓鮑人主治皮又有玉人之等故知有皮玉無水火者也雜辨賦錢輸貨之制鄭曰自泉府而上凡貨事係之鄉師自廪人而下凡榖事係之遂人以此見古賦分於市與野惟貨幣畢入于冡宰之府葢凡百官府史禄各從其長均之宫正則掌凡在宫之人内宰則均凡治内之人掌固校人各均其属故太府授式法而舎人分給之其餘則即藏焉而不必輸送若貨幣易輸則多奸必冡宰之屬親授受之亦可以見財分掌而不相亂制國用有要而不煩共賦者不難為力矣夫家授田之制自生齒以上書版口授之田安有無職事出夫家之征者厠其間邪夫税者百畆之税也家税者出士徒車輦給徭役也夫口授民田者聖人所以授於民也田授而不耕者民自棄其田而為遊惰之民誠可惡矣然聖人之政未欲即誅也亦漸敺之于農耳故使之轉移執事為庸賃之役以勞辱之有垂緌之冠以表異之有夫家之征以困苦之所以驅天下之民轉縁南畆也里布夫布之罰鄭曰閭師之罰輕於載師何也閭師罰庶民受井田者載師罰有官職者及商賈間民受田者也有官者怙勢豪横給以田而不耕授之宅而不毛則剥上虧下矣庶人在官而不知耕則逐利是矣凡此皆先王所甚惡者故罰之特重異乎庶民也説者以此為卿大夫受地不毛者民宅不毛民田不耕則罰其長孟子所謂入其疆土地荒蕪則有讓是也伯謙辨所罰輕重之宜鄭曰宅不毛者有里布而下漢儒多以為困惰農禁游手果若如鄭氏所説周公之法亦苛矣天下事亦要賞罰相當雖商君行法不過從五家起令罰之如此之重何辜殊不知載師所掌乃卿大夫受地之賦則凡所謂不耕不毛無職事不責之民而責之士大夫受分地者孟子所謂入其疆土地荒蕪則有讓之類是也葢士大夫既有分地乃使其民至於惰游逐末其咎安在於是乎罰之至于百姓受田自有閭師掌之所謂無職事者出夫布不畜者祭無牲之類是也所以懲井田之民士大夫受地多故責之重民受百畆故責之輕圭田何以無征周制圭田若近郊其税十一所謂圭田也孟子曰圭田無征何也載師止任近郊之地者止言任地之法近郊十一者皆宅田賈田之類圭田無征必矣辨圭田之税不可重鄭曰周制什一之法行於天下而載師任地多寡不均葢參之前文而得其説近郊十一則圭田之税所以輕者葢圭田以常禄奉祭祀不可重也餘夫何以如正遂人職餘夫受田如正夫之數孟子曰餘夫二十五畆何以義不同也遂人止言六遂之法康成所謂六遂之民竒受一㕓雖土地猶有業皆所以饒逺也孟子所言近於六鄉之地蓋井田之大畧也封國大小之制周禮封國之制先儒故有能言其非者俗學又為之委曲求通以誤後世亦無能辨焉夫子以大國為千乗之國又曰安見方六七十如五六十而非邦也者至孟子答北宫錡及慎子之言與武王列土分爵之制無少差異則大國不過百里次七十里次五十里周法固然也又曰今滕絶長補短将五十里也則孔孟非特聞武王周公之制亦親見當時之諸侯則然漢儒作王制亦同獨為周官書者以公五百里侯四百里伯三百里子二百里男百里與論語孟子禮記之言並異無疑其為非者陋儒鄭氏釋王制乃曰武王初定天下更立五等之爵増以子男而猶因商之地以九州之界尚狹也周公致太平斥大九州之界封有功諸侯大者至五百里小者百里葢據大司徒之文夫堯舜夏商之地不過九州攷周職方掌天下之圖無以過於禹貢之域禹之疆域東漸于海西被于流沙朔南暨夫既窮于海至于流沙将何所廣斥哉借能開闢邊境取夷狄之地亦不可増封于内此是不然也漢儒見周之衰弱諸侯相侵吞滅小弱開疆拓地至於數百里之廣乃以為周制爾子産曰古者列國一同今大國數圻若無侵小何以至焉孟子曰今魯方百里者五又曰今海内之地方千里者九齊集有其一觀此則知春秋之大國非復一同也戰國時魯乃五百里齊乃千里此則周官所援以為據也又職方氏曰千里封公方五百里則四公方四百里則六侯方三百里則七伯方二百里則二十五子方百里則百男皆非古之制不可信也故曰舉衰世之典而為盛時之制不可信也此類是也設官等級之制周禮事之最大者莫若建都封國設官也建都封國之制予既辨其非古矣未得為是也至其言設官是矣據書周官稱唐虞官百夏商倍之繼之曰仰惟前代時若訓廸厥官立太師太傅太保兹惟三公少師少傅少保曰三孤而後及於六卿周之官制可據惟此成王仰若前代則大率依唐虞夏商之制爾今觀周禮小宰謂天官以下其屬各六十計為三百六十官説者謂象日月星辰之度今觀自太宰至膳人官凡六十有三自大司徒至槁人凡七十有九自大宗伯至宗人官凡七十有一自大司馬至家司馬官凡七十自大司冦至冡士官凡六十有六計五官之属已有三百五十有二而冬官尚不與則與小宰之言自戾矣借謂堯舜之世事簡而建官少周之世事煩而建官多夏商不過倍唐虞之制周人亦不過倍夏商之制何得與夏商相去及數萬倍耶葢彼但欲見成周建官之多初不計其數乃至於此其誕慢至此世儒乃酷信不亦傷乎羣書考索續集卷十
