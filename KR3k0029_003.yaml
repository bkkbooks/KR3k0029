body:
  text: 羣書考索卷三宋章如愚撰六經門詩類毛詩始末詩序云在心為志發言為詩故詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌一國之事係一人之夲謂之風言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有大小故有小雅焉有大雅焉頌者美盛德之形容以其成功告于神眀者也是謂四始詩之至也出詩序古者有採詩之官王者巡守則陳詩以觀民風知得失以自考正也是以孔子録之取周詩兼商頌凡三百二十篇以授子夏子夏遂作序焉出藝文序古詩三千餘篇至孔子去其重取可施于禮義上採契稷中述商周之盛至幽厲之缺始于袵席故曰關雎之亂以為風始鹿鳴為小雅始文王為大雅始清廟為頌始三百五篇孔子皆弦歌之以求合韶武雅頌之音禮樂自此可得而述以備王道成六義出史記孔子世家秦楚之際亡其六漢興詩分為四魯詩起于申公而盛于韋賢初申公與楚元王交俱受詩于齊人浮丘伯申公以詩經為訓故弟子自孔安國而下凡百數瑕丘江公魯許生免中徐公皆守學教授韋賢事江公傳子元成及兄子賞由是魯詩有韋氏學王武事徐公及許生式以授張生唐生禇生由是魯詩有張唐禇氏之學張家冇許氏之學齊詩起于轅固而盛于匡衡轅固生作傳以授夏侯始昌始昌授后蒼蒼兼能通詩禮以授翼奉匡衡師丹伏理由是齊詩有翼匡師伏之學韓詩起於韓嬰而盛於王吉嬰推詩人之意作內外傳數萬言其語頗與齊魯間殊然歸一也燕趙間言詩者由韓生韓生亦以易授人韓詩有王食長孫之學王吉食生長孫順齊魯盛行于時韓詩惟燕趙間好之毛詩最後出未大顯也毛詩起於毛公後傳徐敖由是言詩者本之徐敖三家並立學官而毛詩至平帝時始立四家詩經同而傳説或異後漢又出毛氏詩而立齊魯韓氏其後馬融鄭衆康成賈逵之徒皆發明毛公其學遂盛而三家浸微魏晉之時齊魯之詩廢絶韓詩雖存而益微故毛詩獨行至今詩序關雎舊解云三百一十二篇並是作者著為名舊説云起此至用之邦國焉名關雎序謂之小序自風風也訖末名為大序關雎序為大序餘詩為小序詩序之説不同家語曰子夏習于詩而通其義或曰出於孔子及弟子之知詩者所作鄭詩譜意大序子夏作小序子夏毛公合作東漢儒林傳曰衛宏從謝曼卿受學作毛詩序善得風雅之旨王肅云子夏所序詩今之毛詩是也隋經籍志曰先儒相承謂毛詩序子夏所創毛公及衛敬仲又加潤益唐韓愈以為詩序非子夏所著其説不一自今觀之關雎一篇使作詩者本無序後人何遽知其為后妃之德也鵲巢一篇使作詩者本無序後人何遽知其為夫人之德也謂作詩本無序雖夫子之聖亦不能逆知數十百年之前詩人所作之意何從而次序之又况其為子夏者乎然則詩之有序自太史採詩之時明乎得失之迹已敘其美刺之意于篇之首自美刺一言而下意者講師之説或出于子夏或出于毛公與衛宏之徒非一人之手故其存于詩者辭重復不然則六亡詩之序何以只存首之一辭如白華孝子潔白之類是也蓋詩之亡者經師不得而見故其序不詳絲衣之序髙子曰靈星之尸也以是考之則詩序附益之辭亦皆非漢儒作明矣或謂作詩時故有其名矣自名而下皆後世自為之何以言之蓋韓詩序漢廣曰悅人也序汝墳曰辭家也匡衡習齊詩其引詩曰念我皇祖陟肇庭止韓詩言敝簡在梁其魚遺遺魯詩言中夜之言不可道也皆有差字蕭復以為卜子夏序韓愈常以三事疑其非至介甫獨謂詩人所自製按東漢儒林傳曰衛宏作毛詩序善得風雅之旨隋經籍志曰先儒相承謂毛詩序子夏所創毛公及衛公所潤益愈之言蓋夲于此韓詩序芣苡曰傷夫也漢廣曰恱人也序若詩人所自載毛公猶愈詩也不應不同則是不出一人之手眀矣朝氏志按舊唐書藝文志云韓詩二十卷注謂卜商序韓嬰撰又有韓詩外傳二十卷毛詩十卷注謂毛萇傳毛詩集序二卷注亦謂卜商序然則韓詩序見史傳者考之與毛詩絶不同序詩之次周召風之正經固當為首自衛而下十有餘國編比先後舊無明説歐陽氏曰周南召南邶鄘衛王鄭齊豳秦魏唐陳曹此孔子未刪之前周太師樂歌之次第也季札觀樂于魯次序如此周召弼鄘衛王鄭齊衛唐秦陳檜曹豳此今詩次第也周召弼鄘衛檜鄭齊魏唐秦陳曹豳王此鄭氏詩譜次第也孔氏曰鄭譜以鄭因虢鄶之地而國之先譜鄶事然後譜鄭王在豳後者退就雅頌并言王世故耳詩正風周南召南周南十一篇起關雎止麟之趾召南十四篇起鵲巢止騶虞王化之夲也二南之風變故次之以弼鄘衛衛一國也而三其名志衛首惡滅與國也弼十九篇起柏舟止二子乘舟鄘十篇起柏舟止載馳衛十篇起淇澳止木瓜諸侯相并王迹滅矣雅亡而為一國之風故次之以王王十篇起黍離止丘中有麻王制不足以統臨天下而畿內之諸侯若鄭者亦自為列國故次以鄭鄭二十一篇起緇衣止溱洧君臣上下之分失而人倫亂故次之以齊齊十一篇起雞鳴止猗嗟天下之風至此則無不變之國魏舜禹之都唐帝堯之國其遺風雖存今亦變矣故次之以魏唐魏十篇起葛屨止碩鼠唐十二篇起蟋蟀止采苓先代之風化既泯天下相胥而夷矣故次之以秦秦十篇起車鄰止權輿夷狄之化行聖王之流風盡矣陳舜之後風化所厚也聖人之典法所在也而今也風化熄而典法亡矣故次之以陳陳十篇起宛丘止澤陂人情迫于危亡則思治安故思治者亂之極也故次之以檜曹檜四篇起羔裘止匪風曹四篇起浮蝣止下泉亂既極必有治之之道周家之始蓋嘗由之矣故次之以豳豳七篇起七月止狼跋言變之可正所以識王業之興也王業成而為政于天下故次以雅雅者王之政也小之先大固有序也自鹿鳴止菁莪凡二十二篇為正小雅內亡其六自六月止何草不黃五十八篇為變小雅自文王止卷阿十八篇為正大雅自民勞止召旻十二篇為變大雅天下之治始于正風以風天下其終也功德可以告于神明終始之義也故次之以頌自清廟止賚般三十一篇為周頌頌之有魯蓋生于不足也自駉止閟宫四篇是為魯頌商則頌前代之美不可廢也故附于其後自那止商武五篇為商頌襄公二十九年季札請觀周樂于魯而豳居秦上秦在魏前陳在唐後不能無差蓋是時詩未敘于聖人之手哀公十一年孔子自衛反魯然後樂正雅頌各得其所上距季札時蓋六十有二年以小雅為周之衰者季札也王通反其説謂盛而非衰以豳為樂而不淫者季札也王通反其説謂勤而不怨詩樂周禮大司樂掌成均之法以治建國之學政而合國之子弟焉以樂德教國子中和祗庸孝友以樂語教國子興道諷誦言語以樂舞教國子舞雲門大卷音權大咸大㲈上昭反大夏大濩大武樂師凡射王以騶虞為節諸侯以貍首為節大夫以采蘋為節士以采蘩為節及徹帥學士而歌徹注云徹者在周頌臣工之什太師教六詩曰風曰賦曰比曰興曰雅曰頌以六德為之夲以六律為之音瞽矇掌九德六詩之歌以役太師前漢禮樂志周禮既備而其器用張陳周官具焉典者自卿大夫帥瞽以下皆選有道德之人朝夕習業以教國子國子者卿大夫之子弟也皆學歌九德誦六詩習六舞五聲八音之和然自雅頌之興而所承衰亂之音猶在是謂淫過凶嫚之聲為設禁焉儀禮鄉飲酒禮工歌鹿鳴四牡皇皇者華笙南陔白華華黍乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀乃合樂周南關睢葛覃卷耳召南鵲巢采蘩采蘋孔氏曰召南三篇越草蟲而取采蘋蓋采蘋舊在草蟲之前孔子以後簡札始倒工告于樂正曰正歌備鄉射禮乃合樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋告于樂正曰正歌備燕禮工歌鹿鳴四牡皇皇者華笙奏南陔白華華黍乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀遂歌鄉樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋太師告于樂正曰正歌備大射禮乃歌鹿鳴三終乃管新宫三終其篇亡奏貍首以射射義天子以騶虞為節諸侯以貍首為節卿大夫以采蘋為節士以采蘩為節詩云曾孫侯氏四正具舉大夫君子凡以庶士小大莫處御于君所以燕以射則燕則譽注云騶虞采蘋采蘩今詩篇名貍首逸曾孫侯氏是也國語叔孫穆子聘于晉晉悼公饗之樂及鹿鳴之三而後拜樂三晉侯使行人問焉對曰夫先樂金奏肆夏繁遏渠天子所以饗元侯也夫歌文王大明綿則兩君相見之樂也皆非使臣之所敢聞也今伶簫詠歌鹿鳴之三君之所以貺使臣臣敢不拜貺夫鹿鳴君之所以嘉先君之好也敢不拜嘉四牡君之所以章使臣之勤也敢不拜章皇皇者華君教使臣曰每懷靡及諏謀度詢必咨于周敢不拜教左氏傳吳公子札來聘請觀於周樂使工為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌弼蒲對反鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之德如是是其衛風乎聽聲以為别故有疑言為之歌王曰美哉思而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱於良反乎大風也哉泱泱宏大之聲表東海者其太公乎國未可量也為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲秦本在西戎汧隴之西秦仲始有車馬禮樂去戎狄之音而有諸夏之聲故謂之夏聲夫能夏則大大之至也其周之舊乎為之歌魏曰美哉渢渢扶弓反乎渢渢中庸之聲一大而婉險而易行以德輔此則明主也為之歌唐曰思深哉其有陶唐氏之遺民乎不然何憂之逺也非令德之後誰能若是為之歌陳曰國無主其能久乎淫聲放蕩無所畏忌故曰國無主自鄶古外反以下無譏焉為之歌小雅曰美哉思而不二怨而不言其周德之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熙熙乎熙熙和樂之聲曲而有直體論其聲其文王之德乎為之歌頌曰至矣哉直而不倨曲而不屈邇而不逼逺而不擕遷而不淫復而不厭于艷反哀而不愁樂而不荒用而不匱廣而不宣施矢豉反而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛德之所同也頌有殷魯故曰盛德之所同六義風大序曰風風也教也風以動之教以化之程氏曰風者風以動之上之化下下之風上凡所刺美皆是也賦鄭氏周禮注曰賦之言鋪也直鋪陳善惡程氏曰賦者謂鋪陳其事如齊侯之子衛侯之妻是也比鄭司農周禮注曰比者比方于物程氏曰以物相比狼跋其胡載疐其尾公孫碩膚赤舄几几是也興孔氏曰興者起也程氏曰因物以起興關關雎鳩瞻彼淇澳是也雅大序曰雅者正也程氏曰雅者正言其事天生蒸民有物有則民之秉彜好是懿德是也頌大序曰頌者美盛德之形容以其成功告于神明者也程氏曰頌美之言也如于嗟麟兮有斐君子終不可諼兮是也四始大序上以風化下下以風刺上主文而譎諫言之者無罪聞之者足以戒故曰風至于王道衰禮義廢政教失國異政家殊俗而變風變雅作矣國史明乎得失之迹傷人倫之廢哀刑政之苛吟詠性情以風其上逹於事變而懷其舊俗者也故變風發乎情止乎禮義發乎情民之性也止乎禮義先王之澤也是以一國之事繫一人之本謂之風言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有小大故有小雅焉有大雅焉頌者美盛德之形容以其成功告于神明者也鄭氏詩譜序文武時詩有周南召南雅有鹿鳴文王之屬及成王周公致太平制禮作樂而有頌聲興焉盛之至也夲之由此風雅而來故皆録之謂之詩之正經孔子録懿王夷王時詩迄于陳靈公淫亂之事謂之變風變雅孔氏曰變風之作齊衛為先陳最在後變雅則處其間齊哀公當懿王衛頃公當夷王陳靈公魯宣公十年為其臣夏徴舒所弒變雅始于厲王變雅亦稱雅者王政仍被邦國所以亦名為雅及平王東遷其政才行境內是以變為風焉孔氏曰王道衰諸侯有變風王道盛諸侯無正風王道明盛政出一人諸侯不得有風王道既衰政出諸侯故各從其國有美刺之别也正經述大政為大雅述小政為小雅有大雅小雅之聲王政既衰變雅兼作取大雅之音歌其政事之變者謂之變大雅取小雅之音歌其政事之變者謂之變小雅故變雅之美刺皆由音體有小大不復由政事之小大也頌者美盛德之形容以其成功告于神明者也惟周頌爾商頌雖是祭祀之歌祭其先王之廟述其功德非以成功告神魯頌頌僖公功德才如變風之美者耳又與商頌異也史記孔子世家曰關雎之亂以為風始鹿鳴為小雅始文王為大雅始清廟為頌始李氏曰是四始以下皆詩之至也五際翼奉初學齊詩聞五際之要十月之交萹知日食地震之效昭然可明猶巢居知風穴居知雨前本傳鄭作六藝論引泛歷樞云午亥之際為革命卯酉為改正辰在天門出入候聽卯天保也酉祈父也午采芑也亥大明也亥為革命一際也辰則為天門出入侯聽二際也卯為隂陽交際三際也午為陽謝隂興四際也酉為隂盛陽微五際也其詩含此五際詩大序疏易有隂陽詩有五際注應劭曰君臣父子兄弟夫婦朋友也孟康曰詩內傳曰五際卯酉午戌亥也隂陽終始際會之嵗于此則有變改之政也前翼奉傳詩有五際推得失考天心以言王道之安危同上章句音韻孔氏曰風雅之篇無一章者頌者述成功以告神故一章而已後漢祭祀志東平王蒼議詩傳曰頌者成也一章成篇冝列德故登歌清廟一章魯頌不一章者魯頌美僖公之事非告神之歌也商頌長發殷武重章者或詩人之意所作不同詩之大體必須依韻其有乖者古人之韻不協爾之兮矣也之類本取以為辭雖在句不以為義故處末者皆字上為韻左右流之寤寐求之其實七兮逮其吉兮之類是也亦有即將助句之字以當聲韻者是究是圗亶其然乎其虛其邪既亟只且之類是也卷帙孔氏曰漢初為傳訓者皆與經别行三傳之文不與經連故石經書公羊傳皆無經文藝文志云毛詩經二十九卷毛詩故訓傳三十卷是毛為詁訓亦與經别也又馬融為周禮之注乃云欲省學者兩讀故具載夲文然則後漢以來始就經為注未審此詩引經附傳是誰為之其毛詩二十九卷不知併何卷也孔子讀詩孔子讀詩及小雅喟然而歎曰吾于周南召南見周道之所以盛也于柏舟見匹婦執志之不可易也于淇澳見學之可以為君子也于考槃見遁世之士而不悶也於木瓜見苞苴之禮行也于緇衣見好賢之心至也于雞鳴見古之君子不忘其敬也于伐檀見賢者之先事後食也于蟋蟀見陶唐儉德之大也于七月見豳公之所以造周也于東山見周公之先公後私也于狼跋見周公之逺志所以為聖也于鹿鳴見君臣之有禮也于彤弓見有功之必報也于羔羊見善政之有應也孔叢子賦詩盧蒲癸曰賦詩斷章注譬如賦詩取其一章而已左襄二十八年秦伯享晉公子公子賦河水公賦六月注古者禮會因古詩以見意故言賦詩斷章也僖二十三年戎子駒支對范宣子云云賦青蠅而退注青蠅詩小雅取其愷悌君子無信讒言襄十四年齊慶封來聘魯魯叔孫與慶封食不敬為賦相鼠亦不知也二十七年趙孟入于鄭鄭伯享之子皮戒趙孟賦瓠葉穆叔曰趙孟欲一獻子其從之昭元年季武子如晉拜師晉侯享之范宣子為政賦黍苖季武子再拜賦六月襄十九年齊侯鄭伯如晉晉侯兼享之國景子相齊侯賦蓼蕭子展相鄭伯賦緇衣又曰國子賦轡之柔矣子展賦將仲子兮二十六年晉范宣子來聘宣子賦摽有梅季武子賦角弓賓將出武子賦彤弓襄八年季武子如宋致女復命公享之賦韓奕之五章穆薑出于房敢拜大夫之重勤賦緑衣之卒章成九年鄭子皮賦野有死麕之卒章趙孟賦棠棣且曰吾兄弟比以安昭元年小邾穆公來朝季平子賦采菽穆公賦菁莪昭子曰不有以國其能久乎十七年韓宣子聘于衛衛侯享之北宫文子賦淇澳宣子賦木瓜二年宋公享昭子賦新宫昭子賦車轄注將為季孫迎宋公女故賦之二十五年公享韓宣子季武子賦綿之卒章韓宣子賦角弓季武子拜既享宴于季氏有嘉樹焉宣子譽之武子曰敢不封殖此樹以無忘角弓遂賦甘棠二年鄭六卿餞韓宣子于郊宣子曰二三君子請皆賦起亦以知鄭志子􅀢賦野有蔓草子産賦鄭之羔裘子太叔賦褰裳子遊賦風雨子旗賦有女同車子栁賦蘀兮宣子喜曰鄭其庶乎十六年鄭伯與公宴于棐子家賦鴻鴈文子賦四月子家賦載馳之四章文子賦采薇之四章鄭伯拜公答拜文十三年楚令尹享趙孟賦大眀之首章趙孟賦小宛之二章注小宛取其各敬爾儀天命不又以戒令尹昭元年季武子如宋受享賦棠棣之七章以卒歸復命賦魚麗之卒章公賦南山有臺武子曰臣不堪也云云襄二十年鄭伯享趙孟孟曰七子從君以寵武也請皆賦以卒君貺亦以觀七子之志子展賦草蟲伯有賦鶉之賁賁子西賦黍苖之四章子産賦隰桑子太叔賦野有蔓草印段賦蟋蟀公孫段賦桑扈卒享文子告叔向曰伯有將為戮矣二十七年穆叔如晉見中行獻子賦祈父見范宣子賦鴻鴈之卒章十六年申包胥依庭墻而哭七日秦哀公為之賦無衣九頓首而坐定四年楚薳罷如晉晉侯享之將出賦既醉叔向曰薳氏之有後于楚國也宜哉襄二十七年鄭伯如楚子産相楚子享之賦吉日昭三年晉侯與諸大夫宴于溫使諸大夫舞曰歌詩必類齊髙厚之詩不類荀偃怒且曰諸侯有異志矣襄十六年宋華定來聘通嗣君也享之為賦蓼蕭不知又不答賦昭子曰必亡宴語之不懷寵光之不宣令德之不知將何以在昭十二年寧武子來聘公與之宴為賦湛露及彤弓不辭又不答賦使行人私焉對曰昔諸侯朝正于王于是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功王于是賜之彤弓一彤矢百􅀈弓矢千文四年二南之詩關雎之詩用之鄉人焉用之邦國焉言自鄉人以至于邦國皆可得而用也儀禮鄉飲酒禮曰鄉大夫賔興其賢能乃合樂周南關雎召南鵲巢是用之鄉人也燕禮曰諸侯之于賔客遂歌鄉樂周南關雎召南鵲巢是用之邦國也自上而下皆可得而用則正夫婦之道人所當為也夫詩之首二南猶易之首乾坤書之首典謨也以二南分係于周公召公者以其有王者諸侯之風也故孔子刪詩列之以冠篇首蓋所以示正始基王化也自二南以下説者皆謂之變風則可以先後次序論矣平王降為國風周平王東遷政遂微弱化之所被止及郊圻詩作于衛頃國地狹于千里徒以天命未改王爵猶存不可過後于諸侯豳詩與列國不同豳詩乃周公陳王業艱難之事欲尊周公使專一國故次列國之末居小雅之前欲兼上下之美非列國之例也一説言周公之德髙于諸侯事同于王政處諸國之後不與諸侯為倫次小雅之前其近堪為雅也豳詩備風雅頌七月八章上下章豳風中四章豳雅下二章豳頌風者諸侯之政教凡係水土之風氣謂之風若女心傷悲殆及公子同歸是也雅者正也王者設教以正風作酒飬老是人君之美政若為此春酒以介眉夀是也頌者美盛德之形容成功之事若朋酒斯享萬夀無疆是也魯頌先商頌考頌者美詩之名魯人不得作風以其用天子之禮故僣天子美詩之名改稱為頌非用頌之比也孔子以其同有頌名故取以備三頌耳置以商頌之前以魯周之宗親同姓故使之先商者周太師而有商頌鄭氏曰周用六代之樂故有之並出詩疏三家言詩不同詩經二十八卷魯齊韓三家申公作魯詩后蒼作齊詩韓嬰作韓詩以齊魯韓之義可見者較之獨毛詩率與經傳合歐陽公曰關雎正風之首而齊魯韓三家皆以為康王政衰之刺詩也杜欽傳曰佩玉晏鳴關雎嘆之瓉曰此魯詩也後漢明帝詔曰昔應門失守關雎刺世薛君韓詩章句曰今內傾于色故詠關雎説淑女以刺時翼奉習齊詩五際卯酉午戌亥也司馬遷言商頌乃作于宋襄公之世韓詩章句商頌美襄公也其他如鹿鳴四牡皇皇者華之類皆為康王時詩王風為魯詩鼓鐘為昭王詩並朝補之序論其與毛詩異同不可悉舉賈誼以騶虞為天子之囿以木瓜為下之報上劉向以衛宣夫人作弼柏舟黎莊公夫人作式微陳婦道蔡人之妻作芣苡至于賔之初筵或以為衛武公飲酒悔過作也采薇之詩又以為懿王時戎狄交侵詩人歌之曰靡室靡家獫狁之故前胸奴傳類皆三家之説也揚雄亦曰周康之時頌聲作乎下關雎作乎上習治也大小毛公詩河間獻王博士毛公善説詩獻王號之曰毛詩正義譜云大毛公為訓詁傳于其家河間獻王得而獻之以小毛公為博士然則大毛公為傳小毛公題而曰毛也鄭氏箋其失愈多不諫而入鄭以為入宗廟狼跋言周公安間得于讒疑之中故有公孫碩膚赤舄几几之句而鄭謂之公孫庭燎見宣王之怠政而鄭以為不設雞人之官緑衣之詩而鄭氏又以為禒諸類此不可悉數逸詩周禮趨以采薺注云樂名或曰逸詩諸侯以貍首為節注云逸詩語曰唐棣之華偏其反而注云逸詩春秋之詩趙衰賦河水祭公賦祈招宋公賦新宫儀禮云周公所有曰升歌鹿鳴下管新宫漢明帝飬老常取而歌之漢儒林傳有歌驪駒釋曰詩逸篇也又左傳國子賦轡之柔矣左傳莊公二十二年田敬仲曰翹翹車乘招我以弓豈不欲往畏我友朋襄八年鄭子駟曰俟河之清人夀幾何兆云詢多職競作羅謀之多族民之多違事滋無成襄二十七年君子曰何以恤我我其收之其向戌之謂乎昭四年子産作丘賦云詩曰禮義不愆何恤乎人言訓詁傳授魯詩浮丘伯見楚元王下魯申公楚元王少時好詩與魯生白生申生俱受詩浮丘伯文帝時申公為詩最精以為博士元王好詩諸子讀詩申公始為詩傳號魯詩元王亦次之號元王詩世或有之元王傳韋賢治詩事博士大江公及許生由是魯詩有韋氏詩申公傳韋元成見韋賢下江公為博士為魯詩宗王式傳申公授瑕丘江公江公及魯許生免中徐公皆守學教授趙綰亦嘗受詩申公為御史大夫申公傳楚元王見申公下薛廣德以魯詩教授楚國龔勝本傳齊詩轅固固齊人治詩武帝立以賢良召諸儒多毁曰固老罷歸之公孫𢎞亦召仄目而事固固曰公孫子務正學以言毋曲學以阿世諸齊以詩顯皆固之子弟也出夲傳景鸞能理齊詩作詩解夲傳翼奉治齊詩夲傳后蒼字近君通詩為博士授翼奉蕭望之匡衡匡衡授師丹伏理師丹治詩事匡衡本傳匡衡好學諸儒為之語曰無説詩匡鼎來匡語詩解人頥射策甲科蕭望之梁丘賀問衡對詩諸大義其對深美本傳韓詩韓嬰燕人推詩人之意作內外傳數萬言其語頗與齊魯間殊然歸一也同上燕趙間言詩者由韓生趙子事韓生授蔡誼誼授食子公與王吉食子公授栗豐吉授長孫順召馴字伯春少習韓詩以志義聞鄉里號曰德行恂恂召伯春同上杜撫受業于薛漢定韓詩章句後歸鄉里教授沉靜樂道其所作題約義通學者傳之曰杜君法同上薛漢世習韓詩父子以章句著名當世言詩者推漢為長同上趙子蔡誼食子公王吉栗豐長孫順並見韓嬰下毛詩毛公初孔子以詩授卜商商為之序以授曾申申授李克克授孟仲子仲子授根牟子牟子授荀卿卿授毛亨亨作故訓傳以授毛萇以二公之所傳故名其詩曰毛詩詩關雎疏毛公趙人治詩為河間獻王博士授貫長卿長卿授解延年延年授徐敖由是言毛詩者夲之徐敖本傳貫長卿見毛公下解延年見毛公下徐敖同上鄭元取毛氏訓詁所不盡及異同者續之為注解謂之箋箋薦也主薦成毛意詩疏衛宏初謝曼卿善毛詩乃為其訓宏從曼卿受學因作毛詩序善得風雅之旨于今傳于世賈逵作毛詩傳衛宏傳鄭元作毛詩箋同上馬融作毛詩傳同上鄭衆作毛詩傳同上文中子續詩薛收曰敢問續詩之備六代何也子曰其以仲尼三百始終于周乎收曰然子曰余安敢望仲尼然至興衰之際未嘗不再三焉故具六代始終所以告也薛收問續詩子曰有四名焉有五志焉何謂四名一曰化天下所以風天下也二曰政蕃臣所以移其俗也三曰頌以成功告于神明也四曰歎以陳誨立誡于家也凡此四者或美焉或勉焉或傷焉或惡焉或誡焉是謂五志子謂續詩之有化其猶先王之有雅乎續詩之有政其猶列國之有風乎子曰變風變雅作而王澤竭矣變化變政作而帝制衰矣文中子曰諸侯不貢詩天子不採風樂官不逹雅國史不明變嗚呼斯則久矣詩可以不續乎李百藥見子而論詩子不答百藥退謂薛收曰吾上陳應劉下述沈謝魏應璩劉公幹梁沈約謝靈運分四聲八病剛柔清濁各有端緒音若塤箎而夫子不應我其未逹歟薛收曰吾嘗聞夫子之論詩矣上眀三綱下逹五常于是正存亡辨得失故小人歌之以貢其俗君子賦之以見其志聖人采之以觀其變今子營營馳騁乎末流是夫子之所痛也不答則有由矣子謂叔恬曰汝不為續詩乎則其于七代損益終悶然也子謂續詩可以諷可以逹可以蕩可以獨處出則弟入則孝多見治亂之情晉束晳補亡詩補南陔白華華黍由庚崇丘由儀詩六首許叔牙詩纂義唐貞觀許叔牙為洪文館直學士于詩尤邃獻纂義十篇御史大夫髙智周見之曰欲明詩者宜先讀此草木蟲魚圗唐開成中文宗命集賢院修撰詩草木蟲魚圗并繪物象大學士楊嗣復學士張次宗上之羣書考索卷三
