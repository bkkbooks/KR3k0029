body:
  text: 羣書考索卷五十六宋章如愚撰歴數門天文器類三家言天古之言天者有三家一曰盖天二曰宣夜三曰渾天晉劉智云顓帝造渾儀黄帝為盖天漢蔡邕言宣夜之學絶無師法周髀術數具存考驗天狀多所違失渾天近得其情今史官候䑓所用銅儀則其法也立八尺之圓體而具天地之形以正黄道察法歛以行日月歩五緯官有其器而無本書盖天蔡邕所謂周髀者即盖天之說也其本包羲氏立周天歴度其所𫝊則周公受之於商故曰周髀其言天似盖笠地法覆盆天地各中髙外下北極之下為天地之中三光隐映以為晝夜天地聳髙相從日去地常八萬里日麗天而平轉分冬夏之間日前行道為七衡六間每衡周經里數惟晷影以為逺近之數又云天圓如張盖地方如棊局天旁轉如推磨而左行日月右行隨天左轉故日月實東行而天牽之以西没譬之蟻行磨石之上磨左旋而蟻右行磨疾而蟻遲故隨磨而左回焉天形南髙而北下日出高故見日入低故不見天之居如倚盖故極在人北是其證也極在天之中而今在人北所以知天之形如倚葢也日朝出陽中暮入隂中隂氣暗冥故没不見夏陽多隂少日出即見故夏日長冬隂多陽少掩日之光故冬日短隋書貟盖志曰昔者先王正歴明時作員盖以圖列宿極在其中廽之以觀天象分三百六十五度四分度之一以定日數日行於星紀轉廻右行故圜規之以為日行道欲明其四時所在故於春以青為道於夏以赤為道於秋則以白為道於冬則以黒為道四季之末各十八日則以黄為道盖圖以定仰觀雖明而未可以正昏旦分晝夜故作渾儀以象天體開皇以後靈䑓以後魏鉄渾天儀測七曜盈縮以盖圖分列星分黄赤二道距二十八宿分度而莫有更為渾象者矣唐志盖天之說李淳風以為天地中髙而四潰日月相隠蔽以為晝夜遶北極常見者謂之上規南極常隠者謂之下規赤道横絡者謂之中規及一行考月行出入黄道為圖三十六䆒九道増損而盖天之狀見矣削蔑為變與圖等自中樞之外均刻百四十七度度之末旋為外規規外太半度再旋為重規又為赤道帶天之紘距極三十五度為内規乃歩冬至日旋所在以正辰次之中按渾儀所測仰視小殊者由渾儀去南極漸近其度益狹而盖圖漸逺其度益廣若攷其去極入宿數移於渾天則一也宣夜宣夜之書絶無師法惟漢郄萌云天本無質仰而瞻之髙逺無極日月衆星自然浮生虗空之中其行其止皆須氣焉是以七曜伏見無常進退不同由乎無所根繫故各異焉故辰極常居其所而北斗不與衆星西没攝提填星皆東行日行一度月行十三度遲速任情其無所繫可知矣晋咸康中虞喜因宣夜之說作安天論以為天髙窮於無極地深極於不測天有常安之形地有居靜之體方則俱方員則俱員無方員不同之義也光耀布列各自運行葛洪聞而譏之曰茍辰宿不躔於天天為無用便可以言無何必云有之而不動乎稚川可謂知言之選也虞聳作穹天論云天形穹窿如鷄子幕其際周四海之表浮于元氣之上譬如覆奩以抑水而不没者氣充其中也日繞辰極没西而還東不出入地中天之有極猶盖之有斗也日行黄道繞極北去黄道百一十五度南去黄道六十七度二至之所至以為短長呉姚信作昕天論云天之體南低入地北則偏髙冬至極低而天運近南故日去人逺而斗去人近夏至極起而天運近北故日去人近而斗去人逺極之立時日行地中淺故夜短天去地髙故晝長也極之低時日行地中深故夜長天去地淺故晝短自虞喜虞聳姚信皆好奇狥異之說非極數談天者也渾天春秋文耀鈎云唐堯即位羲和立渾儀虞書舜在璇璣玉衡以齊七政所謂璇璣者謂渾天儀也先儒或因北斗第二星名璇第三名璣第五名玉衡即以為北斗七星莫之或辨焉李淳風謂璇璣為渾天儀鄭元謂以玉為渾儀也唐李淳風曰璇璣玉衡即渾天儀也王蕃云渾天儀羲和之舊器積代相傳謂之璣衡又虞喜云洛下閎為漢武帝於地中轉渾天定時節作太初歴或其所製也和帝時太史揆候皆以赤道儀與天度頗有進退至永元十五年詔賈逵造太史局黄道銅儀延熹中張衡更以銅製於宻室中具内外規南北極黄赤道列二十四氣二十八宿中外星官及日月五緯以漏水轉之於殿上室内令司之者閉户而唱也以告靈䑓之觀天者璇璣所加某星始見某星已中某星已没皆如合符崔子玉為其銘曰數術窮天地制作侔造化髙才偉藝與神合契呉時王蕃以古制局小張衡所作又復傷大而制儀立論考度曰前儒舊說天地之體狀如鳥卵天包地外猶殻之褁黄也周旋無端其形渾渾然故曰渾天也周天三百六十五度五百八十九分度之百四十五半覆地上半在地下其二端謂之南極北極出地三十六度南極入地三十六度兩極相去一百八十二度半强繞北極徑七十二度常見不隱謂之上規繞南極七十二度常隠不見謂之下規赤道帶天之紘去兩極各九十一度少强黄道日之所行也半在赤道外半在黄道内與赤道東交於角五少弱西交於奎十四少强其赤道外極逺者去赤道二十四度斗二十一度是也其入赤道内極逺者亦二十四度井二十五度是也北極規道之行度日南至在子二十一度去極百十五度少强是也日最南去極最逺故景最長黄道斗二十一度出辰入申日晝行地上百四十六度强故日短夜行地下二百一十九度少弱故夜長自南至之後日去極稍近故景稍短日晝行地上度稍多故日稍長夜行地下度稍少故夜稍短日所在度稍北故日稍北以至於夏至日在井二十五度去極六十七度少强是日最北去極最近景近景最短黄道井二十五度出寅入戍故日亦出寅入戍日晝行地上二百一十九度少弱故日長夜行百四十六度强故夜短自夏至之後日去極稍逺故景稍長日晝行地上度稍少故日稍短夜行地下度稍多故夜稍長日所在度稍南故日出稍南以至於南至而復初焉此日冬夏至之度斗二十一井二十五南北相應四十八度春分日在奎十四少强秋分日在角五少弱此黄赤二道之交中也去極俱九十一度少强南北處斗二十一井二十五之中故景居二至長短之中奎十四角五出夘入酉日亦出夘入酉日晝行地上夜行地下俱百八十二度半强故日見伏之漏俱五十刻謂之晝夜同此日二分之度隋志曰梁華林重雲殿前所置銅儀檢其鐫題是偽劉耀時孔挺所造則古渾儀之法也宋何承天之徒咸以為即張衡所造其儀畧舉天狀而不綴經星七曜魏晉䘮亂沉没西戎義熈中宋髙祖定咸陽得之然失之逺矣後漢命晁崇修渾儀以觀星象後永興中詔造太史候部鉄儀其制並以銅鉄惟星度以銀錯之唐志曰正觀初李淳風上言云漢洛下閎作渾儀其後賈逵張衡等亦各有之而推驗七曜並循赤道按冬至極南夏至極北而赤道常定於中國無南北之異盖渾儀無黄道乆矣太宗異其說因詔為之至七年儀成表裏三重一曰六合儀二曰三辰儀三曰四游儀皆用銅帝稱善置於凝暉閣開元九年一行受詔改治新歴故知黄道進退而太史無黄道儀梁令瓉以木為游儀一行更鑄為銅鉄十一年儀成一行又曰靈䑓鉄儀後魏蘭觧所作規制朴畧制度不均赤道不動以考月行遲速多差淳風黄道儀以玉衡旋規别帶日道傍列二百四十九交以鐫四游法頗難臣更造游儀使黄道運行以追列舎之變因二分之中以立黄道交於奎軫之間二至陟降各二十四度黄道内施白道日壊則䆒隂陽朓朒動合天運簡而易從元宗嘉之自為之名又詔一行令賛等更鑄渾天銅儀圗天之象具列宿道及周天度數注水激輪令其自轉一晝夜而天運周外絡二輪綴以日月令得運行每天西旋一周日東行一度月行十三度十九分度之七二十九轉其餘而日月㑹三百六十五轉而日周天無幾而銅儀漸澁不能自轉而遁藏於集賢院其黄道游儀古所謂旋儀也其赤道當天之中以分列宿之度黄道斜運以明日月之行乃立八節九限校二道差數著之歴經此渾儀之制也渾天象者其制有璣無衡梁末祕府以木為之由斯而言儀象云二氣逺不相渉以則張衡所造盖亦止於渾天七曜而何承天莫辨儀象之異亦為乖矣宋文帝元嘉詔錢樂之采効儀象鑄銅為之梁末置於文徳殿前吳時陸績作渾象形如鳥卵以施二道不得如法又有葛衡改作渾天使地居天中以機動之天動而地止以上應晷應到元嘉十七年又作小渾天以白青黄三色珠為三家星其日月五星悉居黄道以象天運而地至其中宋所道儀象器隋大業初移於東都觀象殿晋劉智曰顓帝造渾儀黄帝為盖天此二器皆古聖王之制作也說者乃云始自張衡非也虞喜云洛下閎周而渾天又在張平子前也後漢賈逵永元中造黄道儀張衡始以延熹七年更造銅儀後王蕃陸績晁崇劉卓李淳風皆修渾儀之法諸儒論三家異同漢末揚子雲難盖天八事以通渾天其一論周天之度差其二論春秋分之日晝夜之刻不同其三論星之見伏隨日之出入不同其四論天河之曲直不同其五論二十八宿顯見之多少其六論日托天而旋日出地下而影上行何也其七論日與北斗逺近小大之異其八論北極為天轂二十八宿為天輻其踈宻不同何也其后桓譚鄭元蔡邕陸績各陳周髀考驗天狀多有所違逮梁武帝於長春殿講義别綴天體全同周髀之文善立新意以排渾天而已漢王仲壬據盖天之說以駁渾儀之舊說天從地下過天何得從水中行乎甚不然也日隨天而轉非入地今視日入非入也逺使然耳日月本不貟也望之所以貟者去人逺也葛洪釋之曰渾天儀注云天如鷄子地如鷄子黄孤居於天内天大而地小表裏有水天地各隨氣而立載水而行周天三百六十五度四分度之一又中分之則半覆地上半繞地下故二十八宿半見半隠天轉如車轂之運也諸論天者雖多然精於隂陽者莫宻於渾象也若天果如渾天者則天之出入行於水中為的然矣故黄帝書曰天在地外水在天外水浮天而載地者也天出入水中當有何損而王生謂不可乎又曰今視諸星出於東者初但去地少許爾漸而西行先經人上后遂西轉而下焉不旁旋也其先在西之星亦稍下而没無比轉者日之出入亦然若謂天如磨石轉者衆星日月宜隨天而廻初在於東次徑於南次到於西次反於北而復還於東不應横過去也今日出於東冉冉轉上及其入西亦復漸漸稍下都不繞邊北去如此王生必謂為不然者䟽矣若日以轉逺之故但當光耀不能復来照及人耳宜猶望見其所在不應都失見其所在也日光大於星多矣今見北極之小星而不見日之在北者明其不北行也若曰以轉逺之故不復可見其北入之間應當稍小而日方入時乃大非轉逺之驗也王生以火炬諭日謬矣又日之入西方視之稍稍去初尚有半如横破鏡之狀湏臾淪没矣若如王生之言日轉北去有半者其北都没之頃冝先如直破鏡之狀不應如横破鏡也如此言之曰入而方不亦孤孑乎又云水火者隂陽之餘氣也若水火是日月所生則亦何得盡如日月之員乎王生又云逺故視之員若審然者日月初生之時及既虧之後何以視之不貟乎而日食或上或下從側而起或如鉤至盡若逺視見貟不宜見之殘缺左右所起也此則渾天之體信不誣矣以上用晋隋唐天文志所修揚子或問渾天曰洛下閎營之鮮于妄人度之耿中丞象之幾乎幾乎莫之能違也問盖天曰盖哉盖哉應難未幾也說者以盖天為周髀注云盖天即周髀也其本包羲氏立周天之度其所傳則周公受之於商而周人志之故曰周髀言天似盖笠地法覆槃則雄於二者特取渾天而已古之論周髀者謂天地中髙外下北極所臨為天地中日月周行於旁日近為晝日逺為夜論渾天者謂地居中而天周焉日在地上為晝日在地下為夜是以後漢張衡鄭康成陸績吳之王審晋之姜岌葛洪江南皮延宗錢樂之司徒皆祖渾天而𫝊之盖其眡精祲察災祥有足驗也陳禮書國朝太平興國中張思訓造新銅儀言古之制作運動以水疎畧既多寒暑無凖今以水銀代水運動不差詔置文明殿至道中韓顯符新鑄渾儀其制用雙規詔司天監築䑓置之大中祥符三年造成詔龍圗閣移之其制為天輪二各分三百六十二度又為黄赤道亦管於側輪中測日月星辰行度皆無差皇祐三年李晦言重定渾儀已成欲乞依唐制從之熈寧七年沈括以新定渾儀進呈上領之宋朝㑹要宋朝渾儀太平興國四年正月司天監學生張思訓造新渾儀成詔置文明東南之鐘鼓樓以思訓為渾儀丞注思訓叙渾儀制度云云為七直人左撼鈐右扣鐘中擊鼓以定刻數又十二神報十二時刻數定晝夜短長上列三百六十五度紫㣲宫及周天列象井斗建黄赤二道太陽行度定寒暑進退又古之制作運動以水疏畧既多寒暑無准臣今以水銀代水運動不差且冬至之日在黄路表去北極最逺謂之寒晝短夜長夏至之日在赤路表去北極最近謂之暑晝長夜短春秋二分曰在兩交春和秋凉晝夜復等寒暑進退皆由於此舊制太陽晝夜行度行皆行手運臣今所製取於自然又按唐開元中詔僧一行與梁令瓉及諸衛士造天儀鑄銅為日月周天之象上具列宿赤道及天數度注水激輪令其自轉一日一夜天轉一周又别立二輪絡此天外綴以日月合得運行每天西轉一匝日東行一度月行十三度十九分度之七凡二十九輪有餘而日月㑹三百六十轉而日行匝仍置木櫃以為木平儀半在地上半在地下晦明朔望遲速而有凖又立二木人於地平之上前置鐘鼔以候辰刻則自然撞鐘皆櫃中各於釣軸定交錯闗鏁相持後銅鐡漸澁不能自轉不復行用令思訓以木偶人為土直神揺鈐撞鐘及十二神自執牌循環而出并著日月星辰皆須仰視其機轉之用俱隠樓中觀其制度頗有開元遺象至道元年司天秋官正韓顯符造新渾儀詔司天監築䑓置仍以其事付史館注顯符衛新鑄儀制凡九事云云大中祥符三年閏二月司天監言冬官正韓顯符造銅渾儀成詔移入龍圗閣令顯符選學中可教者𫝊授其業十一月召輔成觀銅渾儀其制為天輪二一平一側各分三百六十二度又為黄赤道立管於側輪中以測日月星辰行度皆無差宣祐二年十二月司天夏官李用晦言重定渾儀鑄造以成欲乞依唐李淳風一行舊制紀以年月以永將来從之治平四年十一月天章閣待制孫思恭奉詔看詳翰林天文院渾儀如已得漢唐古法即依製造渾儀雖依唐梁令瓉法其環固重大黄道運轉澁滯經乆未便其司天監渾儀遊規運轉却且依常其黄道鑄定不動熈寧七年六月同提舉司天監沈括以新定渾儀進呈上召轉臣觀之數問括括具對所以改更之理土圭表附玉人之事以玉為圭而曰土圭者用以土其地其長尺五寸非惟建王國用土圭諸侯之國亦用以土其地但正四方不求地中也周官大司徒曰以土圭之法測土深正日影以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂日至之景尺有五寸謂之地中鄭康成曰景短於土圭謂之日南是地於日為近南也景長於土圭謂之日北則地於日為近北也東於土圭謂之日東是地於日為近東也西於土圭謂之日西是地於日為近西也凡日影於地千里而差一寸陳禮書曰先儒謂天地相距八萬里其升降也不過三萬里之中日景於表移一寸則於地差千里張衡周髀之說皆然惟宋何承天曰六百里而差一寸也後魏信都芳曰千里而差四寸則二百五十里而差一寸也典瑞以土圭致日月四時玉人曰土圭尺有五寸以致日月以土地馮相氏曰春夏致日秋冬致月以辨四時之序古者土圭必植五表地中植中表千里而南植南表千里而北植北表東西二表相去亦如之以四表明中表之正以中表定四方之中鄭司農云夏至之日立八尺之表其影適與圭等謂之地中是也王昭禹曰土圭横植於地於圭之端立表以表端之日影與土圭相齊无過不及然後見地之中疏曰度景之法必於夏至為漏半為之取日正午乃得其端直周禮圗云日南則景短多暑據中土圭之南土圭而言也夏晝漏晝土圭在南得尺四寸景不論尺五寸不與圭等是也於日為近南也故云日南則景短多暑日至之景尺有五寸謂之地中日北則景長多寒據中土圭之北土圭而言也冬晝漏半土圭在北得尺六寸景過於尺五寸不與土圭等是也於日為近北也故云日北則景長多寒日西則景朝多隂者據中土圭之西土圭而言之是於日為近西也夏晝漏半中土圭景得正時土圭在西者日未中乃得朝時之景故曰日西則景朝多隂日東則景夕多風者據中土圭之東土圭而言之是也於日為近東也夏晝漏半中土圭景得時正土圭在東者日已昳矣乃得夕時之景故云日東則景夕多風周公度日景置五圭於頴川陽城置一土圭為中中土圭之南千里置一土圭中土圭之北千里置一土圭東去千里置一土圭西去千里置一土圭為五圭天地相距八萬里先王立八尺之表以度日景天地之升降不過三萬里之中自地以至日不過二萬五千里以尺有五寸土圭測之盖日景於圭差一寸則差千里先王以四表明中表正之以中表定四方之中在地則無道里逺近之不均在天則無寒暑風雨隂陽之不和萬物得極其髙大故至於阜得其冝由其道故至於安然後建王國焉匠人所謂晝參諸日景夜攷諸極星盖如此也易巽為風言東多風盖風之所属者東方也五行𫝊以風属中央失之矣隋志曰先儒皆云夏至立八尺表於陽城周頴川地也景與圭等尚書攷靈曜曰日永景尺伍寸日短景尺三寸易通卦驗曰冬至之日植八尺之表日中視其晷景長短以占和否夏至景一尺四寸八分冬至一丈三尺周髀云成周土中夏至景一尺六寸冬至景一丈三尺五寸劉向洪範論曰夏至景長一尺五寸八分冬至一丈三尺一寸四分春秋二分景七尺三寸六分後漢魏宋之歴皆與攷靈曜同然或地域不改而分寸參差或南北殊方而長短難一盖術士未能精驗也梁天監中祖常造八尺銅表其下與土圭相連圭上為溝置水以取平正揆測日景大同中太史令用九尺表格江左之景陳氏惟用梁法至隋開皇十九年袁充表曰隋興以後日景漸長又曰太平日行上道升平行次道覇代行下道今景短日長振古希有上曰景長之慶天之祐也宜取日長之意改元仁壽百工作役並加程課以日長故也隋志唐儀鳳四年姚元辨奏於陽城測影䑓依古法立八尺表夏至日中測景正與古法同調露元年於陽城周公測影所得圭長一丈二尺七寸開元十二年命太史南宫說等馳𫝊徃安南蔡蔚等州測候日影還與一行校之一行以南北日影校量大約南北極相去纔八萬餘里其餘州測影尺寸如左林邑國北極髙十七度安南都䕶府北極髙二十一度六分其餘州皆不同至海中南望老人星下衆星燦然皆古所未名㑹要水平法按匠人建國之制水地之垂置𣙗以垂眡以景夫𣙗則表也司徒言土圭而不言表匠人言表而不言土圭互文以見也水地以縣則旁植四木而縣䋲焉以水望其髙下所以求地之平既縣以䋲而取其直又以水而取其平然後於所平之地置𣙗焉於所平之中央立八尺之表以懸正之眡日景之出入將以求四方之正眡其出入之景可正東西而已又為規以度兩交之間以求其南北則四方於是乎正然猶以為未也又晝參諸日中之景互考諸極星以正朝夕四方正焉朝夕皆正然後可以建王國致日之法日在東井而北近極星則晷短故立六尺表而景尺六寸日在婁而中日在牽牛而南近極星則晷長故立八尺表而景丈三尺日在角而中於極星則星中故立八尺表而景七尺三寸八分致月之法立春春分月循青道春分在東井貟於角下弦在牽牛立夏夏至南從赤道立秋秋分月循白道秋分上弦在牽牛貟於婁下弦東井立冬冬至北從黒道總論漢書謂日有中道月有九行中道者黄道也北至東井南至牽牛東至角西至婁夏至日在東井而北近極星故晷短故亡八尺之表而景尺五寸八分冬至日在牽牛而南逺極星則晷長故立八尺之表而景丈三尺春分日在婁秋分日在角去極中而晷中故立八尺之表而景七尺三寸六分日陽也陽用事日則進而北晝進而長陽勝故為温為暑隂用事則日退而南晝退而短隂勝故為凉為寒日失節於南則晷過而長為常寒日失節於北則晷短為常燠此四時致日之法也月之九行在東西南北有白赤黒之道各二而出於黄道之旁立春春分月循青道而春分上弦在東井貟於角下弦於牽牛立秋秋分月循白道而秋分上弦在牽牛貟於婁下弦於東井立冬冬至北從黒道立夏夏至南從赤道古之致月不在立春立秋而常在二分不在二分之望而在弦者以月得隂陽之平故也然日之與月隂陽尊卑之辨若君臣也君居中而佚臣旁行而勞君近臣則威損臣逺君則勢盛威盛與君異勢盛與君同月逺日則其光盈近日則其光闕未望則出西既望則出東則日有中道月有九行之說盖是言也刻漏隋志曰昔黄帝創觀漏水以分晝夜梁刻漏經云刻漏之作肇乎黄帝之世宣乎夏周之代其後因以命官周禮挈壺氏下士六人掌挈壺以令軍井凡軍事垂壺以序聚柝皆以水火守之分以日夜鄭元曰以水守壺者為沃漏也以火守者夜則視刻數也分以日夜者異晝夜漏也漏之箭晝夜共百刻冬夏之間有長短焉太史立成法有四十八箭正義曰四十八箭據漢法而言也以器盛四十八箭箭各百刻四十八箭者取倍乎二十四氣也隋志曰其總以百刻分于晝夜凡有四十一箭晝有朝有禺有中有晡有夕夜有甲乙丙丁戊昏旦有星中每箭各有其數所以分時代守周衰齊詩東方未明刺無節也朝廷興居無節號令不時挈壺氏不能掌其職焉正義曰置箭壺内刻以為節而浮之水上令水漏而刻下以記晝夜昏明之數也周天之星二十有八而星之辰十有二辰之度三十有竒十二辰之度三百六十五有竒星辰循天而左旋日月星辰遡天而右轉日陽也舒而遲故朞而周月隂也盛以速故一日而周日月舎於辰則為月十有二㑹則為嵗嵗三百有六旬有六日而日之短長參差不覺先王於是刻箭沃漏以揆此挈壺氏所由設也盖月之行也斗建寅則出巳而漸北斗建午則出艮而漸南漸北則春分而箭加長漸南則秋分而箭加短不過百刻而已故晝長六十刻夜短四十刻晝短四十刻夜長六十刻盖天之晝夜以日之出入為分人之晝夜以天之昏明為節明常先於日出昏常後於日入則日出之前二刻半為明日入之後二刻半為昏損夜五刻以禆晝故夏至晝六十五刻夜三十五刻冬至晝四十五刻夜五十五刻二分之晝五十五刻夜四十五刻自春分至夏至晝所増者九刻有半自夏至以至秋分所减者亦然自秋分以至冬至所减者十刻有半自冬至以至春分所加者亦然挈壺之法盖為箭四十八以候二十四氣大率七日太半而易其一箭孔頴逹謂浮箭壺内以出刻為凖賈公彦謂漏水壺内以没箭為度盖各述其聞而已雖浮没不同大槩一也故以火爨鼎則使之不疑守壺則使之不差施之於軍事所以嚴守警施之於朝廷朝夕之禮亦常以是為節焉然春官鷄人凡國事為期則告吉時而齊詩特罪挈壺氏者盖天子備官挈壺掌漏鷄人告諸侯則掌漏告時一挈壺氏而已漢興武帝詔謝延等定東西之畧儀下漏刻以追二十八宿亦未盡理哀帝又改用晝夜一百二十刻尋亦廢光武亦以百刻九日加减法編於申令為常符漏品和帝時霍融言不如夏歴漏刻隨日南北為長短乃詔用夏歴刻漏用四十八箭張衡以銅為器以玉虬吐漏水為兩壺右為夜左地晝此渾天儀之制也終於魏晋相𫝊不改宋何承天以前代諸漏春分晝長秋分晝短差過半刻遂造漏法春秋二分晝夜漏各五十五刻齊梁因而不改至天監六年武帝以晝夜百刻分配十二辰得八刻仍有餘分以晝夜為九十六刻一辰有全八刻焉大同十年又改用一百八刻是時陸倕作新漏水銘曰則于地四參以天三金方筩貟之制飛龍吐納之規以考辰正晷陳文帝命太史造漏依古刻為法周齊因循魏漏晉宋梁大同並以百刻分于晝夜隋開皇中袁充上晷影漏刻均布十二辰立表隨日影所指辰刻以驗漏水之節然充以私智改舊章未為精宻又有張胃元劉焯漏刻並不施用大業初耿詢作古歌器以漏水注之獻于煬帝善之因令依後魏李蘭所修造隋志宋朝初司天有挈壺正掌司辰刻置文徳殿門外之東偏左右漏刻之法有水秤以水為衡衡上刻曰天河其廣長容水箭以木為之著時刻更㸃晝夜更用制度精巧未知作者誰盖唐五代用之乆矣唐朝殿前報時舊有詞梁以来廢景徳四年復用舊詞如發鼔曰日欲暮魚鑰下龍韜布之類五更皆然天聖八年燕肅上蓮華漏法其制琢石為四分之壺剡木為四分之箭以測十二辰二十四氣隅十千百刻分晝夜四十八箭一氣一易二十四氣各有晝夜故有四十八箭嵗統二百十六萬分刻箭上又有渇烏銅荷之制詔王立等攷定立害其黄道日躔不應今崇天歴不可用罷之至景祐元年燕肅奉詔與楊惟徳測驗並合天道而寸度以為乆難行用差章得象及馮元詳定乃造百刻水秤别添水壺等凡定奪三年而卒用焉國朝㑹要孔頴逹謂浮箭壺内以出刻為凖賈公彦謂漏水壺内以没刻為度盖各述其所聞而已雖浮没不同大槩一也禮書衛宏載𫝊呼之節較而未詳霍融叙分至之差詳而不宻陸機有賦孫綽有銘占候類候氣西漢志曰冬至極短垂土炭炭動以知日至孟康曰冬至先三日垂土炭於衡兩端輕重適均冬至陽氣至則炭重夏至隂氣至則土重後漢志曰隂陽和則景至律氣應則灰除故天子常以冬至夏至御前殿合八能之士候鍾律權土炭於隂陽冬至陽氣應則樂均清景長極黄鍾通土炭輕而衡仰夏至隂氣應則樂均濁景短極㽔賔通土炭重而衡低又曰候氣之法為室三重必周宻布緹縵室中以木為案每律各一内卑外髙從其方位加律其上以葭莩折其内端案歴而候之氣至者炭去殿中候用玉律惟二至乃候雲氣周禮眡祲氏掌十煇之法以觀妖祥辨吉㓙一曰祲曰象曰鐫曰鍳曰闇曰瞢曰彌曰序曰隮曰想及隋志曰海旁氣象樓䑓廣野氣成宫闕北夷之氣如牛羊穹閭南夷之氣類舟舡幡旗自華以南氣下黒上赤嵩髙三河之郊氣正赤常山之北氣青渤碣海岱之間氣皆正黒江淮之間氣皆白又曰韓雲如布趙雲如行人魏雲如䑕鄭齊雲如絳衣越雲如龍蜀雲如囷車氣乍髙乍下徃徃而聚凡候氣之法氣初出若雲非雲若霧非霧初出在桑榆上髙五六尺平望桑榆間二千里登髙而望下属地者三千里保章氏以五雲之物辨吉㓙水旱降豊荒之祲象物色也視日旁之雲色降下也知水旱所下之國青為虫白為䘮赤為兵荒黒為水黄為豊上注正月朔日南至公既視朔遂登觀䑓以望而書禮也凡分至啓閉必書雲物為備故也左僖五年永平二年升靈䑓望元氣吹時律觀物變注元氣天氣也王者承天心理禮樂通上下四時之氣也故望之焉明帝紀春將禘于武宫梓慎曰吾見赤黒之祲非祭祥也䘮氛也其在涖事乎二月癸酉禘叔弓涖事籥入而卒左昭十五年日南至梓慎望氛曰今兹宋有亂國幾亡三年而弭蔡有大䘮注氛氣也時魯侯不行登壇之禮使梓慎望氣也昭二十年羣書考索卷五十六
