body:
  text: 羣書考索卷二十三宋章如愚撰禮門歷代禮類自伏羲至黃帝五禮始具其唐堯則舜典云修五禮又命伯夷典三禮論語云商因於夏禮周因於殷禮則夏商亦有五禮鄭康成注大宗伯惟云唐虞有三禮至周分為五禮不言夏商者但書篇散亡故據周禮有文而言耳禮記疏六禮七教八政王制云司徒修六禮以節民性明七教以興民德齊八政以防淫六禮者冠一昏二喪三祭四鄉五相見六也七教者父子兄弟夫婦君臣長幼朋友賔客也此六禮七教並是商禮周則五禮十二教也八政者飲食衣服事為異别度量數制也禮記疏史遷禮書太史公曰洋洋美德乎宰制萬物役使羣衆豈人力也哉余至大行禮官觀三代損益乃知緣人情而制禮依人性而作儀其所由來尚矣人道經緯萬端規矩無所不貫誘進以仁義束縛以刑罰故德厚者位尊祿重者寵榮所以總一海內而整齊萬民也人體安駕乘為之金輿錯衡以繁其飾目好五色為之黼黻文章以表其能耳樂鐘磬為之調諧八音以蕩其心口甘五味為之庶羞酸醎以致其美情好珍善為之琢磨圭璧以通其意故大輅越席皮辨布裳朱弦疏越太羮𤣥酒防其淫侈救其雕弊是以君臣朝廷尊卑貴賤之序下及黎庶車輿衣服廬室飲食嫁娶喪祭之分事有適宜物有節文周衰禮廢樂壞大小相踰管仲之家兼備三歸循法守正者見侮於世奢溢僭差者謂之顯榮自子夏門人之高弟也猶云出見紛華盛麗而說入聞夫子之道而樂二者心戰未能自决而况中庸以下漸漬於失教被服於成俗乎仲尼沒後受業之徒沈湮而不舉或適齊楚或入河海豈不痛哉史記禮書西漢志西漢禮樂志曰六經之道同歸於禮樂之用為急樂以治內而為同禮以修外而為異二者並行合為一體畏敬之意難見則著之於享獻辭受登降跪拜和親之說難形則發之於詩歌詠言鐘石管絃蓋嘉其敬意而不及其財賄美其歡心而不流其聲音周監於二代禮文元具遭秦滅學遂以亂亡漢興命叔孫制禮儀至文帝時賈誼以為漢承秦之敗俗廢禮義捐廉耻宜定制度興禮樂乃草具其儀而大臣絳灌之屬害之故其議遂寢至武帝即位董仲舒對䇿言古之王者莫不以教化為大務是時上方征討四夷鋭志武功不暇留意禮文之事至宣帝時王吉上疏言欲治之主不世出公卿幸得遭遇其時未有建萬世之長䇿舉明主於三代之隆者也願述舊禮明王制上不納其言至成帝時犍為郡於水濵得古磬十六枚議者以為善祥劉向因是說上宜興辟雍設庠序陳禮樂成帝以向言下公卿議㑹向病卒世祖中興乃營立明堂辟雍顯宗即位躬行其禮宗祀光皇帝于明堂養三老五更於辟雍威儀既盛美矣然德未流洽者禮樂未具羣下無所誦說而庠序尚未設之故也今叔孫通撰禮儀與律令同録藏於理官法家又復不𫝊漢興寢而不著臣民莫有言又通沒之後河間獻王採禮樂古事稍稍增輯至五百餘篇今學者不能昭見但推士禮以及天子說義又頗謬異故君臣長幼交接之道寖以不章今大漢繼周久曠大臣未有立禮成樂此賈誼仲舒王吉劉向之徒所為發憤而增歎也漢官篇序廣注曰漢家禮儀自叔孫通草創十二篇之後無復紀録安帝時劉千秋欲撰次之順帝時張平子欲撰次之皆不果至王隆為新汲令作漢官篇略道公卿內外之職旁及四夷多所發明隋志云漢官解詁注三篇新汲令王隆撰胡廣注漢官禮儀故事建安二年遷都許昌舊章湮沒書記罕存應邵乃綴輯所聞著漢官禮儀故事凡朝廷制度百官典式多邵所立東漢新禮肅宗章和元年正月乃召曹褒詣嘉德門令小黃門持班固所上叔孫通漢儀十二篇敕褒曰此制散略多不合經今宜依禮條正使可施行於南宫東觀盡心集作褒既受命乃次序禮事依凖舊典雜以五經䜟記之文撰次天子至於庶人冠婚吉凶終始制度以為百五十奏上和帝即位褒乃為作章句帝遂以新禮二篇冠三國晉南北隋唐禮書魏以王粲衛凱集創朝儀而魚豢王沈陳壽孫盛雖綴時禮不足相變吳則丁孚拾遺漢事蜀則孟光許慈草建時制晉初以荀顗鄭冲典禮參考古今更其節文羊祜任愷庾峻應正並加删集成百六十五篇後摯虞傳咸續纘未成屬中原覆沒今虞之决疑注是其遺文也江左刁協荀嵩補緝舊文蔡謨又踵修綴宋初因循前史並不重述齊武帝永明二年詔尚書令王儉制定五禮至梁武帝命羣儒又裁成焉吉禮則明山賔凶禮則嚴植之軍禮則陸璉賔禮則賀瑒嘉禮則司馬景又命沈約周捨徐勉何佟之等參㑹其事陳武帝受禪多凖梁舊式因行事隨時筆削後魏道武帝舉其大體事多遺缺孝文帝率由舊章擇其令典朝儀國範煥乎復振北齊則陽休之元循伯熊安生後周則賀經盧辨宇文弼並習於儀禮以通時用隋文帝命牛洪辛彥之等集宋梁及北齊儀注以為禮唐貞觀顯慶開元禮百代之損益三變而著明歷代議禮名臣按秦蕩滅遺文自漢興以來收而存之朝廷有典制可酌而求者漢有叔孫通高堂生徐生賈誼河間獻王董仲舒蕭奮孟卿后蒼聞人通夏侯敬劉向戴德戴聖慶普劉歆後漢有曹元曹褒鄭興鄭衆賈逵許謹杜子春馬融鄭𤣥衛宏何休盧植蔡雍魏有王粲衛覲高堂隆蔣濟王肅秦靜劉表劉紹盧育陳羣魚豢王沈蜀有譙周蔣琬孟光許慈吳有來敏丁孚晉有鄭冲荀顗陳壽孫盛羊祜社元凱衛瓘庾峻袁准賀循任愷陳銓孔備劉達摯虞束晢傅咸鄒湛蔡謨孔衍庾亮范宣范汪徐邈范寧刁協荀嵩卞壼葛洪王彪之司馬彪于寶徐廣謝沈王褒何琦虞喜應正宋有徐羡之傅亮臧壽徐廣裴松之何承天顔延之雷次宗徐爰庾蔚之崔凱孔智齊有王儉何職曰僧紹劉獻王逡梁有司馬景陸璉沈約周捨明山賔裴子野徐勉顧協朱異嚴植之賀瑒崔靈恩皇侃陶洪景司馬憲丘季彬陳有謝嶠孔奐後魏有高允高閣王肅北齊有熊安生陽休之元循伯後周有蘇綽盧辨宇文弼隋有牛洪辛彥之許善心皇唐有孔頴達禇亮虞世南陸德明令狐德棻朱子奢顔師古房元齡魏證許敬宗楊師道賈公彥杜正倫李義府李友益劉祥道郝處俊許圉師韋琨范履冰裴守真孔志約蕭楚材孫自覺王方慶賀紀賈大隱韋萬石韋叔夏祝欽明許子儒沈伯儀元萬頃劉承慶郭山惲唐紹王巖張說徐堅李鋭施敬本王仲丘孔元義賈曽韓抱秦盧履冰王汪韋公肅王彥威田同秀康子元侯行果史𤣥璨李行偉馮宗陳正節賀知章元行冲韋縚等或歷代傳習或因時制作粗舉其名氏列於此唐志由三代而上治出於一而禮樂達于天下由三代而下治出乎二而禮樂為虛名古者宫室車輿以為居衣裳冕辨以為服尊爵爼豆以為器金石絲竹以為樂以適郊廟以臨朝廷以事神而治民其歲時聚㑹以為朝覲聘問歡欣交接以為射鄉食享合衆興事以為師田學校下至里閭田畝吉凶哀樂凡民之事莫不出於禮由之以教其民為孝慈友弟忠信仁義者常不出於居處動作衣服飲食之間蓋其朝夕從事者無非乎此也此所謂治出乎一而禮樂達天下使天下安習而行之不知所以遷善逺罪而成俗也及三代已亡遭秦變古後之有天下者自天子百官名號位序國家制度宫車服器一切用秦其間雖有欲治之主思所改作不能超然逺復三代之上而牽其時俗稍即以損益大扺安於茍簡而已其朝夕從事則以簿書獄訟兵食為急曰此為政也所以治民至於三代禮樂具其典物而藏於有司時出而用之郊廟朝廷曰此為禮也所以教民此所謂治出於二而禮樂為虛名故自漢以來史官所記事物名數降登揖遜拜俯伏興之節皆有司之事爾所謂禮之末節也然用之郊廟朝廷自縉紳大夫從事其間者皆莫能曉習而天下之人至於老死未嘗見也况欲識禮樂之盛曉然諭其意而被其教化以成俗乎嗚呼習其器而不知其意忘其本而存其末又不能備其所謂朝覲聘問射鄉食享師田學校冠昏喪葬之禮在者幾何自梁以來始以其當時所行傅於周官五禮之名各立一家之學唐用隋禮至太宗有貞觀禮高宗有顯慶禮𤣥宗有開元禮正元中王涇考次歷代郊廟沿革之制為郊祀録元和中韋公肅又録開元以後禮儀損益為禮閣新儀王彥威為曲臺新禮嗚呼著其文記可謂備矣以之施于貞觀開元之間亦可謂盛矣而不能至三代之隆者具其文而意不在焉此所謂禮樂為虛名也哉唐書禮樂志唐貞觀顯慶開元禮自梁以來以其所行𫝊於周官五禮之名各立一家之學唐初即用隋禮至太宗時中書令房𤣥齡祕書監魏徴與禮官學士等因隋之禮增以天子上陵朝廟養老大射講武讀時令納皇后皇太子入學太常行陵合朔陳兵大社等為吉禮六十一篇賔禮四篇軍禮二十一篇嘉禮四十二篇凶禮十六篇是為貞觀禮高宗又詔長孫無忌杜正倫李義府等增之為百三十卷是為顯慶禮其文雜以式令又義府敬宗方得幸多希㫖傅㑹事既施行議者以為非上元三年詔復用貞觀禮由是終高宗時貞觀顯慶二禮兼行而有司臨事連引古義與二禮參考增損之無復定制𤣥宗開元十年以國子司業韋縚為禮儀使以掌五禮十四年通事舍人王嵓上疏請删去禮記舊文而益以今事詔付集賢院議學士張說以為禮記不刋之書不可改易而貞觀顯慶禮儀注前後不同宜加折𠂻以為唐禮乃詔集賢院學士徐堅李鋭及太常博士施敬本撰述鋭卒蕭蒿代之奏王仲丘撰定為一百五十卷是為大唐開元禮由是唐之五禮之文稍備而後世用之雖時少有損益不能過也唐禮閭新儀隋五禮文帝開皇二年命牛洪修五禮元和十一年祕書郎修撰韋公肅録開元以後禮文損益為禮閣新儀三十卷唐曲臺新禮續曲臺禮元和新禮王彥威采隋迄唐㳂革條次彚分號元和新禮上之元和十二年太常博士王彥威為曲臺新禮三十卷又採元和以來王公士民昏祭喪葬為續曲臺禮三十卷晉咸寧注晉武元㑹儀晉武更定元㑹儀咸寧注是也故傅元賦曰考夏后之遺訓綜商周之典藝採秦漢之舊儀定元正之嘉會王公以下皆奉璧帛羔羊鴈雉以賀有晨賀晝會之禮夜漏未盡七刻謂之晨賀晝漏上三刻更出百官奉夀酒謂之晝會晉新禮晉志曰晉始有荀顗鄭冲裁成國典江左則有荀嵩刁叶損益朝儀晉文命荀顗因魏世前事撰新禮參考古今更其節文羊祜等共刋成百六十五篇太康初又令摯虞討論所宜增損本朝禮建隆重修三禮圗三年太常博士聶宗義上重修三禮圖二十卷仍命太子詹事尹拙集儒學之士重加參議成十五卷唐藝文志有夏侯氏三禮圖十二卷又有張溢三禮圖九卷太祖太祖新修通禮儀四年命中丞劉溫叟中書舍人李昉知制誥盧多遜等以開元禮重加損益成開寶通禮二百卷六年多遜上新修開寶通禮儀纂百卷詔太常禮院抄寫一卷以備檢討太宗雍熙分門禮選四年邢昺分門禮選二十一卷後真宗因內閣曝書覽而稱善命昺同觀作禮選賜之以示近臣真宗祥符天僖大禮記祥符三年陳彭年請自天書至東封應有儀注乞詔臣寮編録為祥符封禪記丁謂等編之三年十月成天僖元年上册寶禮畢詔王欽若李迪等撰大禮記五十卷以二年正月上之時欽若為僕射李迪維撰之仁宗皇祐周禮禮器圖至和禮器圖仁宗好學至和元年九月成此圗五年王洙上周禮禮器圖先是洙講周禮命畫車服冠冕籩豆簠簋之制及圖成而上之仁宗禮閣新編天聖五年太常博士王皥上所撰禮閣新編六十卷取國初至乾興所下詔敕删去重復類以五禮之目仁宗太常新禮景祐四年知禮院吳育言禮文故事未經刋修請類聚古今參定制度為一代之法詔可之慶厯四年正月上新禮四十卷提舉賈昌朝賞賜有差仁宗太常因革禮嘉祐六年判太常寺歐陽修言禮散失請命官纂述乃命姚闢蘇洵同編纂禮書命修提舉之治平二年成凡百卷修典判寺李宗上之賜名太常新禮藏祕閣政和三年中書舍人蔣獻請續修之哲宗陸農師禮象元祐六年山隂陸佃序曰禮記詩書春秋元為殘缺縉紳先生罕能言之而學者抱殘缺不全之經以求先王制作之方可謂難也余嘗本之性情稽之度數求讀經之大旨自孟子始以余之所能言與上之所可盡者為十五卷名曰禮象以救舊圗之失其庶幾乎非耶哲宗陳祥道禮書元祐中太常博士陳祥道嘗考六藝百家之文以究先王禮樂之迹凡寓於形名度數者必辨其制凡藏於道德仁義者必發其藴僅二十年著成禮書總百五十卷其於歷代諸儒之論近世聶宗義之圗或正其所失或補其所缺禮書序禮書序曰先王之治以禮為本其宫室衣服車旗械器有等其冠昏喪祭朝聘射御有儀即器以觀理無非法象之所寓即文以觀義無非道義之所藏使人思之而知所以教守之而知所以禁奢者不得騁無度之心儉者不得就茍難之節竒者不得以亂常邪者不得以害正此上下所以辨而民志所以定也晚周而下道散於異政之國法亡於殊俗之家君子不得以行禮小人得以行非禮故兩觀大路朱干玉磬天子之禮在諸侯塞門反坫素衣朱襮諸侯之禮在大夫繇是先王之制寖以掃地天下學者亦失其傳故范武子不知殽蒸孟僖子不知相禮范獻子不知問諱曽子不知奠方魯不知尚羔衛不知立市則時之知禮者蓋亦鮮矣漢興叔孫通之綿蕝禮儀徒規時之近功而其法失於太卑齊魯二生之論禮樂必期百年然後興而其言失於太高賈誼有修禮之志而困於絳灌曹褒有定禮之議而沮於黼敏張黼張敏奏褒擅制漢禮破亂聖術而漢禮遂不行傅咸極論於晉而誚流俗劉蕡發䇿於唐而棄於一時繇漢以來千有餘載其間欲起禮法於上者非一君欲成禮法於其下者非一臣有是君而下之人不足以副之則禮之道終不明有是臣而上之人不能以正之則禮之事終不行此厖政薄俗所以繼作而唐虞三代之治不復見也朝儀類歷代朝會左傳昭四年椒舉言於楚子曰夏啓有釣臺之享商湯有景亳之命周武有孟津之誓成有岐陽之搜康有酆宫之朝穆有塗山之會齊桓有召陵之師晉文有踐土之盟長安志立酆宫文王宫也詩既伐于崇作邑于酆在京兆鄠縣東有靈臺夏朝禮禹會諸侯於塗山執玉帛者萬國防風後至而戮之周朝儀秋官朝士掌建外朝之法鄭司農云王有五門曰臯門曰雉門曰應門曰庫門曰路門外朝在路門外內朝在路門內通典周制天子有四朝一曰外朝在臯門內秋官朝士掌之二曰中朝在路門內夏官司士掌之三曰內朝亦謂路寢之朝人君既從正朝視事畢退適路寢聽政使人視大夫大夫退然後適燕寢釋服四曰詢事之朝在雉門外小司冦掌其政以致萬民而詢焉諸侯三朝路寢為內朝中朝在路門外外朝在應門外諸侯社稷與中朝正相當故傳云間於兩社為公室輔者也說曰天子路寢有五焉其最外者曰臯門二曰庫門三曰雉門四曰應門五曰路門路門之內則路寢也臯門之內曰外朝朝有三槐左右九棘近庫門有三庫九寺庫門之內有宗廟社稷雉門之外有兩觀連門觀外有詢事之朝在宗廟社稷之間雉門內有百官宿衛之廨應門內曰中朝中朝東有九卿之室則九卿理事之處考工記曰有九室九卿理之朝則入而理事夕則歸於庫門外外朝之法朝則疑獄王集而聽之故禮云王命三公會其諸侯未去亦於此也廣問之義詢於芻蕘之謀三刺三問以定其法燕朝者路寢之朝羣公以下常日於此相見君位其位大僕掌之初入之時亦門右北面東上王揖之三公則階前北面東上孤東面卿大夫西面皆北上士則門外之西北面東上凡先用燕禮其位亦然所以每朝列位所向不同者皆以政事異故變其位三公之位常北面不變者以三公內臣位尊故屈之使常北面其餘諸侯孤卿大夫皆以地道尊右故尊者東面卑者西面是以於外朝之時諸侯東面尊於孤卿也故以內朝孤卿東面尊於卿大夫時亦無諸侯故也惟詢事之朝非常朝之限故不與三朝同或云客有諸侯之位故孤卿在東也通典周禮宰夫之職掌治朝之法以正王及三公六卿大夫羣吏之位司士掌正朝儀之位辨其貴賤之等太僕掌正王之服位王視朝則前正位而退入亦如之建路鼓于太寢之門外而掌其政以待達窮者與遽令聞鼓聲則速逆御僕與御庶子王㫝燕朝則正位掌擯相王不視朝則辭於三公及孤卿小司冦之職掌外朝之政以致萬民而詢焉其位王南鄉三公及州長百姓北面羣臣西面羣吏東面小司寇擯以叙進而問焉以衆輔志而弊謀朝士掌建邦外朝之法左九棘孤卿大夫位焉羣士在其后右九棘公侯伯子男位焉羣吏在其后面三槐三公位焉州長衆庶在其后左嘉石平罷民焉右肺石達窮民焉匠人左祖右社面朝后市市朝一夫內有九室九嬪居之外有九室九卿朝焉曲禮曰天子當依而立諸侯北面而見天子曰覲天子當寧而立諸公東面諸侯西面曰朝文王世子曰其朝于公內朝則東面北上臣有貴者以齒其在外朝則以官司士為之又曰公族朝於內朝內親也雖有貴者以齒明父子也外朝以官體異姓也周官太僕掌燕朝之服位宰夫掌治朝之法司士掌朝儀之位朝士掌外朝之法文王世子公族朝於內朝庶子掌之其在外朝司士掌之玉藻朝服以日視朝於內朝退適路寢聽政然則文王世子與玉藻所謂朝者諸侯之朝也蓋天子庫門之外外朝也朝士掌之路門之外治朝也宰夫司士掌之路寢燕朝也大僕掌之陳禮書漢朝儀高祖悉去秦儀法為簡易羣臣飲爭功醉或妄呼拔劍而擊柱通知上益厭之說曰儒者難與進取可與守成臣願召魯諸生與臣弟子共起朝儀采古禮與秦儀雜就上曰可試為之令易知度吾所能行為之於是遂與所召三十人及上左右為學者與其弟子百餘人為綿蕞野外習之月餘乃令羣臣朝十月長樂宮成諸侯羣臣朝用叔孫新儀平明謁者治禮引以次入殿廷陳車騎戍卒衛官設兵張旗志功臣列侯以次陳西方東向文官丞相以下陳東方西向廣行設九賔臚句傳於是皇帝輦出房百官執㦸傳警引諸侯王以下至吏六百石以次奉賀自諸侯王以下莫不震恐肅敬至禮畢盡伏復置法酒侍坐殿上皆伏抑首以尊卑次起上壽觴九行謁者言罷酒御史執法舉不如儀者輒引去盡朝置酒無敢歡譁失禮於是高帝曰吾乃今日知為皇帝之尊也拜通為太常漢受計于甘泉太初元年武帝受計于甘泉計謂郡國所上計簿漢制歲盡遣上計掾吏各人條郡內衆事謂之計偕故司馬彪云凡郡課殿最遣吏上計後漢朝儀班固東賦云春王三朝會同漢京三朝元日也謂歲之朝月之朝日之朝谷永曰今年正月朔為三朝之會是日也天子受四海之圖籍膺萬國之貢珍內撫諸夏外撫百蠻爾乃盛禮樂供帳置乎雲龍之廷陳百寮而贊羣后究皇儀而展帝容漢德陽殿朝賀德陽殿顯宗所作蔡質漢儀正月旦天子幸德陽殿臨軒公卿將大夫百官各陪朝賀蠻貊胡羌朝貢畢見屬郡計吏皆陛覲庭燎宗室諸劉雜會萬人以上作樂畢作魚龍曼延小黃門吹吹二通謁者引公卿羣臣以次拜其殿周旋容萬人陛高二丈皆文石作壇激沼水於殿下畫屋朱梁玉階金柱刻鏤作宫掖之好厠以赤翡翠韜以赤緹天子正旦節會朝百寮於此月朔歲首朝儀後漢志每月朔歲首為大朝受賀其儀夜漏未盡七刻鍾鳴受賀及贄百官賀正月二千石以上上殿稱萬歲舉觴御坐前司空奉羮大司農奉飯奏食舉之樂百官受賜宴享大作樂以每朔惟十月旦從故事者高祖定秦之月元年歲首也漢朝堂上壽顯宗永平十二年甘露仍降木枝內附芝草生神雀集西南夷慕義貢獻西域遣子入侍公卿百官以帝威德懷逺祥物類應乃並集朝堂奉觴上壽唐朝儀紫宸殿入閣唐朝天子坐宣政殿立仗正衙或乘輿御紫宸殿則喚仗自宣政兩門入所謂東西上閣門也自𤣥宗以前未有此制開元後以朔望上盤食𤣥宗意欲避正殿遂移紫宸殿喚仗自閣門入始有入閣之名自後行之至昭宗時失以本㫖乃以朔望御前殿行入閣禮蓋誤矣本朝建隆元年行於文德殿皆其禮也淳化時太宗特命張洎詳定儀注洎以入閣是唐一時之禮非盛制至寶元二年仁宗又以問朱庠庠言開元本無此制諸儒於開寶中始用益之差舛尤甚熙寧三年遂罷入閣行正衙之制太極殿朝儀唐自高宗以前即太極殿殿在西內中以後又以宣政殿朝集千秋節朝賀唐𤣥宗以垂拱元年八月五日生以其日為千秋節其日百官上萬壽酒王公戚里上金鏡綬帶露囊百官朝賀羣書考索卷二十三
