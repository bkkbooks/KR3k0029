body:
  text: 羣書考索續集卷五十六宋章如愚編聖賢門孔孟顔子附孔與天一孟聽天所命孔子謂天之將喪斯文也後死者不得與於斯文則文之興喪在孔子與天為一矣蓋聖人之德盛與天為一出此等語自不覺爾孟子地位未到此故曰夫天之未欲平治天下也如欲平治天下當今之世捨我其誰聽天所命未能合一辨害教者天下之事有害於教者聖賢辨之有害於己者聖賢不辨少正卯楊墨害教者也故孔孟辨焉向魋臧倉害巳者也而孔孟豈復辨乎庸人反是石安世論孟所言異而同論語之言無所不包而其所以示人者無非操存涵養之要七篇之旨無所不究而其所以示人者類多體驗充廣之端夫聖賢之分其不同固如此然體用一源也顯微無間也朱熹知人時無孔子顔子殁於陋巷而少正卯為聞人時無孟子匡章陷於不孝而陳仲子為廉士劉彥沖孔俯就孟髙致孔子教人常俯就不俯就則門人不親孟子常髙致不髙致則門人不尊程皓孟子常自尊其道而人不尊孔子益自卑而人益尊之聖賢固有間矣同上孔孟言語之異孔子言語句句是自然孟子言語句句是事實孟子未至孔子孔子為陪臣為宰皆能發明大道孟子必得賓師之位然後能明其道譬如有許大形象然後為泰山有許多水然後為海所以未至孔子程皓孔孟不棄天天之所以豫我者不偶然也夫其所以豫我者必有以用我也孔子孟軻之不遇老於道塗不倦不愠不怍不沮者夫固知夫責之所在也衛靈魯哀齊宣梁惠之徒之不足相與以有為也我知之矣抑將盡吾心焉耳吾心之不盡吾恐天下後世無以責夫衛靈魯哀齊宣梁惠之徒而彼亦將有以辭其責也然則孔子孟軻之目將不瞑於地下矣夫聖賢之用心也固如此蘇洵氣象之異仲尼元氣也顔子春生也孟子并秋殺盡見仲尼無所不包顔子亦不違如愚之學於後世有自然之和氣不言而化者也孟子則露其才蓋亦時焉而已仲尼天地也顔子和風慶雲也孟子泰山巖巖之氣象也仲尼無迹顔子微有迹孟子其迹著程皓孔子十年一化孔子之聖固天縱也而造次顛沛未嘗忘學自志學至從心十年一化大聖自修猶節節而進劉彥沖文武相濟昔諸侯暴武之時孔子曰爼豆之事則嘗聞之此聖人救之以文也及夾谷之會孔子則曰有文事者則有武偹請設左右司馬此聖人濟之以武也范仲淹不言之辨不得已之權孔子不見孺悲有不言之辨見陽虎有不得已之權謝諤神化夫善人為邦百年方能勝殘去殺比之王者則多七十年矣王者必世而後仁比之孔子則多二十七年矣夫子攝行相事於魯七日而誅少正邜凛然有戮飛廉驅虎豹膺夷狄之風為政止三月耳羔豚不二價男女别於途道不拾遺客至如歸肅然已有無思犯禮莫不好德之風行之一年其如何哉其曰三年有成者夫子而居其聖也謂之賢於堯舜生民未有豈過論哉張九成綱紀治功茍有用我者期月而已可也三年有成仲尼言有成者蓋欲立致治之功業如堯舜之時夫是之謂有成此聖人之事非他人可及故嘗言後世論治者皆不中道理漢公孫丞相謂三年而化臣𢎞尚切遲之唐李石謂十年責治太早皆率爾之言聖人之言自有次第所謂期月而已可也綱紀布也三年有成治功成也程灝不言之用子羔之為宰有所不取而必説乎未信之漆雕子張之干祿有所必辨而獨賢乎屢空之顔子三子之言志有所不進而惟與乎詠歸之曽點深知門弟夫子之於門人其念慮所起平生所志雖未形於顔色語言夫子固已得之矣如曽子不問夫子見其何處遽提其名指之曰吾道一以貫之子貢不問夫子見其何事遽提其名指之曰汝以豫為多學而識之者歟子夏無一語也夫子忽斥其短曰女為君子儒無為小人儒子路無一語也夫子忽斥其短曰由也不得其死然聖人內外明映羣弟至前顔色未萌言語未發其幽隱微密夫子已坐照於不言中矣憂在天下天生孔子不獨為魯雖孔子其憂亦未嘗不在天下也周之末列國爭為雄長而天下騷然苦兵孔子拳拳於其間欲以一己捍天下之難故不用於魯則之齊之衛之荆之陳之蔡不用於諸侯則欲為政於費不用於中國則欲為政於蠻夷車馬之迹環於四方雖流離困厄而不悔聖人憂天下之不得其所而欲行其道如此其勤也李邦直作成門弟洙泗之濵席間函文聖化天運逹子貢之學而一貫自通逹顔淵之才而卓爾自見或謦或咳或顧或盼或笑或語一警之下萬慮消亡吕祖謙處身與處國不同昔夫子能忍匡人之圍而不能忍萊夷之兵能忍南子之見而不能忍優施之舞聖人之心何其多變也處身之與處國其法固不相參也毁辱在身聖人納之而不校也此匡人之圍南子之見夫子所以未嘗動一念也毀辱在國聖人競之而不置也此萊夷之兵優施之舞夫子所以未嘗一毫貸也同上語默皆道以謂無隱乎爾則天何言哉夫子之言性與天道不可得而聞也以謂有隱乎爾則四時行焉百物生焉夫子之文章不可得而聞也豈真不可得而聞哉詩云鳶飛戾天魚躍于淵此天下之至顯聖人烏得而隱哉所謂吾無行而不與二三子者也上天之載無聲無臭此天下之至賾聖人亦烏得而顯哉宜其二三子以為有隱乎我者也謝顯道門人皆有用之才夫子之門人顔閔伯牛可以為輔相仲弓可以為諸侯宰我子貢可以使四方冉有可以治兵賦子路可以為將帥子遊子夏可以立制度而不免厄於陳蔡此則天也范祖禹鄉黨一篇該盡聖人自孔子於鄉黨至誾誾如也言孔子言語之變自君在踧踖如也至私覿愈愈如也言孔子動容之變自君子不以紺緅飾至齊必有明衣布言孔子衣服之變自齊必變食至必齊如也言孔子飲食之變自席不正不坐至不親指言孔子應事接物之變吕大臨樂天仲由樂善故車馬衣裘喜與賢者共敝顔子樂道故願無伐善施勞聖人樂天故合內外而成其仁張載言無非道今觀夫子之與顔閔言也見聖人之粹乎其溫而非和也觀夫子之與由求言也見聖人之厲乎其嚴而非髙也觀其與宣哀諸時君言見其慊乎其不倨而非靡也觀其與季孟諸大夫言見其端乎其不撓而非矯也至於立教之言則寬乎不迫而不至於肆傷時之言則愀乎不平而不至於感人見其為言也吾見其為道也生知後天地而生知天地之始先天地而歿知天地之終夾谷之會觀孔子夾谷之會折強齊郤萊人戮侏儒歸侵疆此即大禹決汝漢排淮泗周公膺戎狄驅猛獸之規模也盛矣哉張九成寬猛各當每讀論語觀孔子進互鄉見師冕與鄉黨一篇何其雍容如此及為魯司寇少正邜非有顯然可指之惡一旦誅之於兩觀尸之於朝三日又何其可畏也不如是何以為孔子同上禮樂仲尼有其德而無其位於禮嘗言而不制故或行夏或善殷或從周於樂嘗正而不作故雅頌各得其所如有用者則以其所言制為之禮以其所正作為之樂故其禮貫先聖後聖之精義其政有不盡乎樂集古今之正聲其德有不至乎吕大臨學有形容難盡一時從遊竭所力窮所見於不可形容之中而強名之曰麟鳳歟河嶽歟日月歟生民以來未之有歟性與天道聞不可得歟堅髙前後卓不可從歟溫良恭儉讓蓋清可為也而難於溫溫者清和之發也和可為也而難於良良者易直之發也本無侮人之心貌如之何而不恭本無侈泰之心用如之何而不儉本無競強之心行如之何而不讓至於此則泰然矣儼然矣其泰然也豈不如春其儼然也豈不如秋豈不容貌可觀豈不威儀可象豈不和樂豈不莊敬逺暴慢不足道也逺鄙倍不足道也夫容貌如此諸弟子豈不能學以致之乎蓋有忿懥之心者必不溫有忮尅之心者必不良有欲上之心者必不恭有驕人之意者必不儉有物我之心者必不遜則溫良恭儉讓其惟聖人能之乎謝顯道係周易道充乎一性吾則粹聖人之淵道周乎萬物吾則恢聖人之天吾道其淵耶粹然者或可養而成吾道其天耶恢然者不可強而得宗廟其美百官其富宫墻其數仞豈不足以極綏來動和之機然天下幸不幸難以自決而厚化之德卒不能恢其覆幬之天吾寧淵其淵不時出而用之春生秋殺一字已嚴陶冶諸子天巧已妙吾心所潛吾道所習自不應徒嗜韋編而不有以發其藴也馬圖袐於河而斯文善其未喪周夢嗇於吾而木鐸振其遺音三古之所未該三聖之所未悉吾一槩而竟發之則前日淵淵之淵豈不為今日溥博之天耶羽翼大成翺翔萬世烏慊乎鳳儀之不至也劉穆元周公富貴不如孔子貧賤每讀詩至鴟梟讀書至君奭嘗切悲周公之不遇及觀孔子厄於陳蔡之間而絃歌之聲不絶顔淵仲弓之徒相與問答夫子曰匪兕匪虎率彼曠野吾道非耶吾何為至此顔淵曰夫子之道至大故天下莫能容雖然不容何病不容然後見君子夫子油然而笑曰回使爾多財吾為爾宰夫天下雖不能容而其徒自足以相樂如此乃今知周公之富貴有不如夫子之貧賤夫以召公之貴以管蔡之親而不知其心則周公誰與樂其富貴而夫子之所與共貧賤者皆天下之賢才則亦足與樂乎此矣居其偏以收天下之全昔者夫子廉潔而不為異衆之行勇敢而不為過物之操孝而不徇其親忠而不犯其君若此者是夫子之全也原憲廉而至於貧公良孺勇而至於鬬曽子孝而徇其親子路忠而犯其君凡此者是數子之偏也夫子居其全而收天下之偏是以若此巍巍也蘇軾墮三都蓋田氏六卿不復則齊晉無不亡之道三家不臣則魯無可治之理孔子之用於世其政無急於此者矣彼晏嬰者亦知之曰田氏之僣惟禮可以已之在禮家施不及國大夫不收公利齊景公曰善哉吾今而後知禮之可以為國也嬰能知之而莫能為之嬰非不賢也其浩然之氣以直養而無害塞乎天地之間者不及孔孟也孔子以羇旅之臣為政期月而能舉治世之禮以律亡國之臣墮名都出藏甲而三家不疑其害已此必有不言而信不怒而威者矣孔子之聖見於行事至此為無疑矣嬰之用於齊也久於孔子景公之信其臣也愈於定公而田氏之禍不少衰吾是以知孔子之難也因才而成之蓋孔子之所以教人者始於灑掃應對進退及其安之然後申之以弦歌廣之以讀書曰道在是已仁者見之斯以為仁智者見之斯以為智矣顔閔由是以得其德豫賜由是以得其言求由由是以得其政遊夏由是以得其文皆因其才而成之譬如農夫捆田以植苖大小長短甘辛鹹苦皆其性也吾無加損焉能養而不傷耳無可無不可夫子之於晚周茍可以任不必皆明君也茍可以交不必皆賢卿大夫也茍可以教不必皆才子弟也聖人之道非固如此徇乎人也不如是則道之不行於天下其過不専於人而吾亦與有愧焉故也陳傅良集大成天德出寧時而措之夫焉有所倚曲肱飲水之非清乘田委吏之非和而木鐸斯文之非任歟顔子惟發二問顔子終日如愚論語所載惟發二問一為仁一為邦夫子答之皆極天理人事之大者原易之用內焉惟窮理盡性外焉惟開物成務顔子盡之樂道子夏曰仕而優則學學而優則仕君子之末仕也以學為始其既仕也以學為終昔者仲尼之門輕許人以仕而重許人以學由之果賜之逹求之藝聖人各取其一節而以從政許之至其論學則不然哀公嘗問於夫子矣則對曰回也好學季康子嘗問於夫子矣則對曰回也好學夫三千之徒四科之目如此其衆多而號為好學者獨顔子一人而已嗚呼何其難也或問聖人之門其徒三千獨顔子為好學夫詩書六藝三千子非不習而通也然則顔子所好者何學也曰學以至聖人之道也然聖人則不思而得不勉而中顔子則必思而後得勉而後中其與聖人相去一息所未至者守之也非化之也以其好學之心假之以年則不日而化矣程頥樂道回不改其樂是猶大火中真金乎疾風中徑草乎雪霜交下而松柏自有和氣乎顔子之樂非樂簞瓢陋巷也不以貧屢纍其心而改其所樂也故夫子稱其賢程頥忘富貴貧賤或問富貴而矜貧賤而嘆使處富貴如處貧賤處貧賤如處富貴則矜嘆不發先生曰見得一者難使顔子以貧賤處貧賤又安得樂顔子於此非特忘富貴而貧賤亦忘了此人所以雖視之不堪而回則不改也所見到此便是樂天夫富貴人所愛者也顔子不愛不求而樂乎貧者獨何心哉天地間而有至貴至愛可求而異乎彼者見其大而忘其小焉耳得其大則心泰心泰則無不足富貴貧賤處之一也處之一則能化而齊故顔子亞聖周茂叔顔子簞瓢非樂也忘也程頥克己復禮顔淵之問仁夫子一語仆藩墻去陛級撤堂室而納之於甚大之地付之以一日克己復禮天下歸仁之事何其大也此君子之所驚也及顔子領其大請其目則不離於視聽言動之間警於非禮而已又何其小也此君子之所忽也惟其大而不驚此顔子之所以獨往小而不忽此顔子之所以獨來何也己也者人之欲也禮也者天之理也仁也者性之覺也克而復復而覺人者去而天者還則天髙地下吾性之湛也雲行雨施吾性之遊也君臣父子仁義禮樂吾性之觸也一理徹而萬理融當是之時一者非寡萬者非衆徹者非唱融者非隨夫何故吾心之仁無寡也焉得心無唱也焉得隨至則皆至不至則皆不至見則皆見不見則皆不見至矣見矣頃刻而天下皆吾仁吾猶逹之而何驚於一日而天下歸仁也哉張九成四非之目顔淵問克已復禮之目夫子曰非禮勿視非禮勿聽非禮勿言非禮勿動四者身之用也由乎中而應乎外制於外所以養其中也程頥與禹稷同道知合內外之道則顔子禹稷所同可見蓋自正心誠意推之至於可以平天下此內外之道所以合也故觀其意誠心正則知天下由是而平觀其天下平而知其非意誠心正不能也茲禹稷顔子所以同也見其進未見其止未至聖而不已故仲尼賢其進未得中而不居故惜夫未見其止也張載勇或問顔子為人似乎怯曰孰勇於顔子觀其言曰舜何人也豫何人也有為者亦若是有若無實若虛之類抑可謂大勇者矣楊萬里樂聖道之實聖人之道有趍其名而好之者有安其實而樂之者昔者宰我子貢有若更稱其師以為生民以來未有如夫子之盛雖堯舜之賢亦所不及其尊道好學亦已至矣然而君子不以為貴曰宰我子貢有若智足以知聖人之汗而已矣若夫顔淵豈亦云爾哉蓋亦曰夫子循循然善誘人由此觀之聖人之道果不在於張而大之也東坡閔子騫不輕仕閔子顔淵之倫也不仕於大夫亦不仕於諸侯以仲弓之賢猶為季氏宰若顔閔者夫子之得邦家斯仕矣范祖禹又學者能少知內外之分皆可以樂道而忘人之勢况閔子騫得聖人為之依歸彼其視季氏不義之富貴不啻如犬彘又從而臣之豈其心哉在聖人則有不然者公山弗擾佛肸亂人也召夫子夫子欲應之季氏雖不臣夫豈不知我而欲以為宰也閔子辭之何也蓋居亂邦見惡人在聖人則可在他人則不可所謂磨而不磷涅而不緇蓋其變化莫測人雖欲殺之亦不可得也况得而汙之乎自聖人而下剛則必取禍柔則必取辱閔子豈不能早見而豫待之乎如由也不得其死於衛求也為季氏附益夫豈二子本心哉蓋既無先見之智又無克亂之才故也然則閔子其賢矣乎謝顯道孝子騫之行能使其父母昆弟人無間言此難能也舜之父母兄弟以頑嚚傲聞於天下然則閔子賢於舜乎曰舜以諧頑嚚瞽瞍底豫為孝閔子以善父母兄弟為孝范祖禹子貢善問孔門惟子貢最為善問冉有曰夫子為衛君乎子貢曰諾吾將問之及其入也不問衛君乃問夷齊夫子告以求仁而得仁又何怨子貢遂知夫子之不為乂如子路問魯大夫練而杖禮與夫子曰不知及子路以語子貢子貢乃不指魯大夫而問夫子遂答以非禮觀此可以見子貢之善問張九成以了悟為聞子貢謂夫子之言性與天道不可得而聞既言夫子之言則是居嘗語之矣聖門學者以仁為己任不以茍得為得必以了悟為聞張載留情於富貴為貨殖子貢之髙識曷嘗規規於貨利哉特以豐約之間不能不留情耳且貧富有命彼乃留情於其間多見其不信道也故聖人謂之不受命有志於道者要當去此心而後可語也程皓學造於小成器者成材之謂學者充實時也使其能輝光何害其為不器何害其為形而上者子貢聖門之逹者於道體無不窺見設未能從容而安亦可不謂之小成乎孔子以器許之猶後世以通逹治體者謂之國器未可執方論也謝顯道問一知二知類通逹至極其數者顔子也凡物有對舉其偏而知其對者子貢也吕大臨聞文章而知性與天道夫子之文章異乎人之所謂文章夫子之言性與天道異乎人之言性與天道子貢之聽言異乎人之聽言也他人聞夫子之文章止於文章而已子貢聞夫子之文章於其間知所謂性為天道使子貢智不足以知此則又安能語此則夫子可不謂善言乎子貢可不謂善聽乎後世諸子言性與天道者多矣言紛紛使人彌不識者亦異乎夫子之言矣後世學者觀著於章句之外毫髮無所得也亦異乎子貢之聞矣謝顯道學不及曾子子貢之於學不及曾子也如此孔子語曾子一以貫之蓋不待其問而告曾子復深喻之曰唯至於子貢則不足以知之矣故先發其問曰女以豫為多學而識之者與果不能知之以為然也又復疑其不然而請焉方告之曰豫一以貫之雖聞其言猶不如曾子之唯也尹焞季路死生鬼神子路學於夫子以事鬼神為問又以死為問子路之心蓋以人者吾所自知所不知者鬼神而已生者吾所自知所不知者死而已蓋至理無二知則俱知惑則俱惑安有知此而不知彼者哉子路果知人則必無鬼神之問矣子路果知生則必無死之問矣觀其鬼神之問可以占其未知人也觀其死之問可以占其未知生也夫子答之曰未能事人焉能事鬼未知生焉知死此蓋夫子提耳而誨子路無非真實語世儒乃或以為拒子路之問豈不哀哉子路深省於一言之下故白刃在前結纓正冠不改其操則死生鬼神之際子路其知之矣吕祖謙喜聞過仲由喜聞過令名無窮焉今人有過不喜人規如護疾而忌醫寧滅其身而無悟也噫周茂叔百世之師子路亦百世之師程明道勇則不惑道無乎不在無往而不可也故曰蠻貊之邦行矣又曰欲居九夷然而孔子未必行未必居焉有可行可居之理則必明之公山弗擾佛肸之召欲往而卒不往者明其可往而已仲由好勇故可以受此言他人則不能不惑無勇必多疑故也由知夫子之可從海之可往而不知不必往焉此知進而不知退能勇而不能怯者也范祖禹可與患難子路在聖門最為可與共患難者謝顯道言志顔淵季路與夫子言志夫子安仁也顔淵不違仁也季路求仁也程頥曾子一貫忠恕夫道一而已矣天地一指也萬物一馬也無往而非一此至人所以為無已也豈參彼已所能與哉此忠恕所以近道為其一以貫之也雖然忠所以盡已恕所以盡物則欲求入道者宜莫近於此此忠恕所以違道不遠也子曰參乎吾道一以貫之曾子曰唯使曾子之知不足以及此則仲尼不以告而曾子不自誣矣今曰忠恕而已者所以告門人也孟子曰萬物皆偹於我矣反身而誠樂莫大焉此仲尼告曾子之道也強恕求仁莫近焉此曾子告門人之道也然則曾子豈有隱於是耶蓋門人之知不足以及此而強告之適所以滋其惑使門人誠於忠恕則於一道亦何逺之有遊酢事親事親若曾子可也未嘗以曾子之孝為有餘也蓋子之身所能為者皆所當為也程頥能之短而明之卓夫子稱回之愚參之魯而聖人之傳乃愚與魯者得之學者求其説而不得則曰愚與魯道之資也智與慧性之翳也嗟夫言之似也而差之何也回之愚夫子蓋嘗言其如愚而不愚矣則回之愚豈其真而學者猶以為真也若參之魯夫子言之未及盡也執夫子未及盡之言而以參為真魯參又何辭焉雖然參不病也學者病也右愚魯而左智慧則納天下之人於莊周之瓦礫佛道之寂滅也豈不病哉且參之魯豈蒙然癡暗然昧耶子曰吾道一以貫之門人相顧莫知所依據而參也領之以一唯蒙然癡暗然昧者能之乎然則參非真魯者也非魯而曰魯無乃言語之不給文學之未敏歟言語之給文學之敏君子非有廢也而非所先蓋言語者道之汲而汲者非道也文學者道之寓而寓者非道也言語之不給曰魯可也文學之不敏曰魯可也而魯非道之賊也非道之賊而亦非道之資人之資有所明有所能能者事之資也明者道之資也參之魯短於能者也非事之資而已矣非事之資而移以為道之資道固無用於能而亦何用於不能哉謂能可以入道者妄也謂不能可以入道者大妄也道則有可以入者矣曰明是也參也能之短而明之卓則其為道之資者以其卓者也今也取其短而謂為道之資又欲去其卓而謂為性之翳不知其所謂翳者乃參之所以為資而其所謂資者乃參之無所用於道者也所見大曾子傳聖人學其德後來不可測安知其不至聖人如言吾得正而斃且休理會文字只看他氣象極好被他所見處大後人雖有好言語只被他氣象卑終不類道傳道以魯蓋嘗謂曾子在孔門當時以為魯學道宜難於他人然子思之中庸聖學之所賴以傳者也考其淵源乃自曾子則傳孔子之道者曾子而已矣豈非以魯得之乎由此觀之聰明才智未必不害道而剛毅木訥信乎於仁為近矣楊時參也竟以魯得之明道子思率性致中子思之學不恃其性而恃其率不恃其中而恃其致率也者循是教焉者也致也者力而求之者也性不可見而率性可見中不可能而致中者可能楊萬里言與湯合子思言天命之性即湯之所謂降𠂻其言率性之道修道之教即湯之所謂克綏厥猷惟后真德秀言與堯舜合夫子傳堯舜之道當是時見而知之者惟顔氏曾氏之傳得其宗及曾氏之再傳而復得夫子之孫子思則去聖逺而異端起矣子思懼夫愈久而愈失其真也於是推本堯舜以來相傳之意質以平日所聞父師之言更互演繹作為中庸之書以詔後之學者蓋其知之也深故其言之也切其慮之也逺故其説之也詳其曰天命率性則道心之謂也其曰擇善固執則精一之謂也其曰君子時中則執中之謂也世之相後千有餘年而其言之不異若合符節歷選前聖之書所以提挈綱維開示緼奧未有若是其明且盡者也朱文公善立論孟子之所謂性善者皆出於其師子思之書子思之書皆聖人之微言篤論孟子得之而不善用之能言其道而不知其所以為言之名舉天下之大而必定以性善之論昭昭乎自以為的於天下使天下之過者莫不欲援弓而射之故夫二子之為異論者皆孟子之過也若夫子思之論則不然曰夫婦之愚可以與知焉及其至也雖聖人有所不知焉夫婦之不肖可以能行焉及其至也雖聖人有所不行焉聖人之道造端乎夫婦之所能行而極乎聖人之所不能知是以學者不知其所窮夫如是則惻隱足以為仁而仁不止於惻隱羞惡足以為義而義不止於羞惡此不亦孟子之所以為性善之論歟子思論聖人之道出於天下之所能行而孟子論天下之人皆可以行聖人之道此無以異者而子思取必於聖人之道孟子取必於天下之人故夫後世之議者皆出於孟子而子思之論天下同是而莫之或非焉然後知子思之善為論也孟子於時君人欲中開道其路放鄭聲所以告顔子也豈容有今樂古樂之説焚咸丘所以書春秋也豈於好樂之外復有田獵之説是孔子之道至孟子一失矣嗚呼魯人獵較孔子亦獵較顧在用之如何耳孟子之於時君特於當時人欲中開道其路使駸駸入先王之道而不覺如好勇不妨其安天下好貨好色不妨其於百姓同之好麋鹿魚鱉好今之樂不妨百姓同樂此善用也明王道闢異端孟子卑管仲而狹許行貉白圭而蚓仲子禽獸楊墨妾婦儀秦張九成變孔子之論而歸於正孔子之論多論其常孟荀之論多論其變然孟子則變孔子之論而歸於正荀子則變孔子之論而流於邪孔子曰言忠信行篤敬雖蠻貊之邦行矣至於孟子則曰言不忠信行不篤敬惟義所在斯不亦變而歸於正乎孔子曰非禮勿視非禮勿聽非禮勿言非禮勿動至於荀子則曰禮起於聖人之偽斯不亦變而流於邪乎夫人之所守所學不可因時而遷徙觀二子同生戰國而孟子歸於正是無戰國之心荀子流於邪是有戰國之心也石安世有大功四孟子有大功四明浩然之氣道性善闢楊墨黜五伯而尊三王皆前聖之所不載有功於名教性善嘗讀中庸之書曰天命之謂性率性之謂道又曰能盡其性則能盡人物之性可以贊化育參天地質之以此而後孟子之説始信性果惡耶則違性之謂道可也烏用率且性既惡則盡性之所至當逆天地而戾人物矣奚其贊又奚其參楊萬里浩然之氣上天之載無聲無臭其體則謂之易其理則謂之道其用則謂之神其命於人則謂之性率性之謂道修道則謂之教孟子去其中又發揮出浩然之氣可謂盡矣程皓功不下禹昔者禹以其身拯天下之溺而孟軻氏以其道拯人心之溺其事雖異其於救世則同此韓愈所以謂功不在禹下也有禹稷事功人須學顔子有顔子之德則孟子之事功自立孟子者禹稷之事功也程頥正人心孟子一書只是要正人心教人養性存心收其放心至論仁義禮智則以惻隱羞惡辭遜是非之心為之端論邪説之害則曰生於其心害於其政論事君則欲格君心之非正君而國定千變萬化只從心上來人能正心則事無足為者矣楊時正君心孟子三見齊王而不言事曰我先攻其邪心心既正而後天下之事可得而理也夫政事之失用人之非知者能更之直者能諌之然非心存焉則事事而更之後復有其事將不勝其更矣人人而去之後復有其人將不勝其去矣是以輔相之職必在乎格君心之非然後無所不正真德秀知易春秋孟子曰可以仕則仕可以止則止可以久則久可以速則速孔子也孔子聖之時者也故知易者莫若孟子孟子曰王者之迹熄而詩亡詩亡然後春秋作春秋無義戰彼善於此則有之矣征者上伐下也敵國不相征也故知春秋者莫若孟子程頥知詩古人能知詩者惟孟子為其以意逆志也夫詩人之志至平易不必為艱嶮求之今之艱嶮求詩則已喪其本心何由見詩人之志張載道德之言有有德之言有造道之言孟子言已志者有德之言也言聖人之事者造道之言也明道只言心子思言性而孟子只言心蓋性無所執所以惟求之心心治則性得蓋心出於性故也如求放心養性存心盡心之類所以治心甚嚴不動心孟子所得謝諤責難於君齊宣王問王政孟子稱文王治岐滕文公問守國孟子稱太王居邠齊宣王好勇孟子稱文王武王一怒而安天下之民此責難於君也范祖禹言王道孟子對人君論事句句未嘗離仁此所謂王道也曰安得句句不離乎仁曰須是知一以貫之之理曰一以貫之仁足以貫之仁足以盡之否曰孟子固曰一者何也仁也仁之用大矣楊時出乎富貴君子能輕富貴歟君子非能輕富貴也能出乎富貴也未有以出乎富貴而曰我輕富貴將以輕之適以重之夫惟出乎富貴者然後不為富貴之所誘何則此固有以破其誘也孟子曰生亦我所欲也義亦我所欲也二者不可得兼舍生而取義者也此孟子所以出乎富貴而立其表也且義之必取則生猶必舍也而不能舍富貴也耶楊萬里其中有守孟子之道始於至粗而極於至精充乎天地放乎四海而毫釐有所必計至寬而不可犯至密而不可察者此其中必有所守而後世或未之見也且孟子嘗有言矣人能充其無欲害人之心而仁不可勝用也人能充其無欲為穿窬之心而義不可勝用也士不可以言而言是以言餂之也可以言而不言是以不言餂之也是皆穿窬之類也惟其不為穿窬也而義至於不可勝用惟其不可以言而言可以言而不言也而其罪遂至於穿窬故曰其道始於至粗而極於至精充乎天地放乎四海而毫釐有所必計嗚呼此其所以為孟子歟蘇軾羣書考索續集卷五十六
