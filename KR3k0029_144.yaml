body:
  text: 羣書考索續集卷十三宋章如愚編諸史門史記馬遷之書能蠱壞夫人之心讀其文詞辨麗竒偉而縱橫談説慷慨節俠攘臂於征伐之間者皆蠱壞豪傑之大半矣夫至言大道不足以辨麗竒偉而辨麗竒偉必出於小道異端然則遷之得失盡見於此矣其敘述秦始皇漢武帝巡遊封禪窮奢極欲與其盡變先王之政以開貨利之門者本以示譏耳然後世皆即其術而用之與夫戰國秦楚之事皆天下之人所資取以為不肖者然則述作之大義夫豈易哉後世病史之難以為不幸無遷固之才是又出遷固下矣葉學士進卷進姦雄羞貧賤有激而云班固贊司馬遷以為是非頗謬於聖人論大道則先黃老而後六經序遊俠則退處士而進姦雄述貨殖則崇勢利而羞貧賤先黃老而後六經求古今縉紳先生之論尚或有之至於退處士而進姦雄崇勢利而羞貧賤則非閭里至愚極陋之人不至是也孰謂遷之髙才博洽而至於是乎以臣觀之不然彼實有見而發有激而云耳孟子曰仁者人也合而言之道也揚子亦曰道以導之德以得之仁以人之義以宜之禮以體之合則渾離則散蓋道德者仁義禮之全而仁義禮者道德之一偏黃老之學貴合而賤離故以道為本六經之教於渾者略於散者詳故以仁義禮為用遷之論大道也先黃老而後六經豈非有見於此而發哉方漢武用法刻深急於功利大臣一言不合輒下吏就誅有罪當刑得以貨自贖因而補官者有焉於是朝廷皆以偷合茍免為事而天下皆以竊資殖貨為風遷之遭李陵禍也家貧無財賄自贖交逰莫救左右親近不為一言以陷腐刑其憤悶不平之氣無所發泄乃一切寓之於書故其序遊俠也稱昔虞舜窘於井廩伊尹負於鼎爼傅説匿於傅巖吕尚困於棘津夷吾桎梏百里飯牛仲尼厄於陳蔡蓋遷自况也又曰士窮窘得委命此豈非人所謂賢豪者耶使鄉曲之俠與季次原憲比權量力效功於當世不同日而論矣蓋言當世號為修行仁義者皆畏避自保莫肯急於人之難曽匹夫之不若也其述貨殖也稱秦皇令烏氏倮比封君與列臣朝請以巴蜀寡婦清為貞婦而客之為築女懷清臺蓋以譏孝武也又云諺曰千金之子不死於市非空言也蓋遷自傷砥節礪行特以貧故不免於刑戮也以此言之退處士而進姦雄崇勢利而羞貧賤豈非有激而云哉秦淮海文載子貢遊説五國之事為非嘗讀司馬氏史孔子弟子傳乃以為齊將伐魯而孔子私于父母之國使子貢遊説於外者凡十年存魯亂齊亡吳伯越而強晉子貢一出而五國皆有變細觀其所以説之辭則殊淺陋闊誕又非有策畫可以動五國嗚呼聖賢而肯為耶遷有史才而不入於道又其著書多采戰國策楚漢春秋以博其辭意其六國楚漢之間有僻士者戲㺯文墨附著之孔子子貢以為小説而耀世迹其所言則童子可以不惑而司馬氏輒為之信尚而收採之歟五國之變亂其事皆載於左氏傳未聞孔子子貢之為之也孔子雖欲茍全邱墓之國使數國之民皆死於兵乎李清臣汝水釣翁文不當論商鞅桑宏羊之功吾以謂遷有大罪二其先黃老後六經退處士進姦雄特其小小者耳所謂大罪二則論商鞅桑宏羊之功也桑宏羊斗筲之才穿窬之智無足言者而遷稱之曰不加賦而上用足善乎司馬光之言曰天下安有此理天地所生財貨百物止有此數不在民則在官譬如雨澤夏潦則秋旱不加賦而上用足不過設法隂奪民利其害甚於加賦也東坡海外史論龜策不當謂之傳尋子長之列傳也其所編者惟人而已矣至於龜策異物不類肖形而輒與黔首同科俱謂之傳不其怪乎且龜策所記全為志體向若與八書齊列而定以書名庶幾物得其朋同聲相應者矣史通馬遷不當目項羽為王昔夫子修春秋吳楚稱王而仍舊曰子此則褒貶之大體為前修之楷式也馬遷撰史記項羽僭盜而紀之曰王此則真偽莫分為後來所惑者也史通辨葛洪論馬遷紀傳之非如葛洪有云司馬遷發憤作史記百三十篇伯夷居列傳之首以為善而無報也項羽列於本紀以為居髙位者非關有德也案史之所書也有其事則記無其事則闕尋遷之馳騖今古上下數千載春秋已往得其遺事者蓋惟首陽二子而已然設使夷齊生於秦世死於漢日而乃升諸傳首庸謂有情今考其先後隨而編次斯則理之常也必謂子長以善而無報推為傳始若伍子胥大夫種孟軻墨翟賈誼屈原之徒或行仁而不遇或盡忠而受戮何不求其品類同在一科而乃異其篇目分為數卷也又遷之紕繆其流甚多夫陳勝之為世家既云無據項羽之稱本紀何必有慿必謂遭彼腐刑怨刺孝武故書違凡例志存激切若先黃老而後六經進姦雄而退處士此之乖刺復何為乎史通夷齊而上賢臣尤多列傳不當以夷齊為首子長著史記也馳騖古今上下數千載至如臯陶伊尹傅説仲山甫之流並列經傳名存子史功烈尤顯事迹居多盍各採而編之為列傳之首而斷以夷齊居首何齷齪之甚乎史通述史記本末自魯有史記以後楚漢之際有好事者録自古帝王公侯卿大夫之世終乎秦末號曰世本十五篇春秋之後七雄並爭秦并諸侯則有戰國策三十三篇漢興陸賈記録時功作楚漢春秋九篇孝武之世太史公司馬談欲錯綜古今勒成一史未就而卒子遷乃述父遺志採左傳國語刪世本戰國䇿據楚漢列國時事上自黃帝下訖麟趾作十二本紀十表八書三十世家七十列傳凡百三十篇謂之史記元成間會稽禇先生更補其闕作武帝紀三王世家龜策日者等傳其龜策日者辭多鄙陋非遷本意也晉散騎常侍譙周以遷書周秦以上或采百家諸子不專據正經於是作古史考二十五篇皆慿舊典以紏其謬今與史記並行於代史通説史記馬遷去取無據太史公撰孔子世家多採論語舊説至管晏列傳則不取其本書以為時俗所有故不復更載也按論語行於講肆列於學官重加編勒祗覺繁費如管晏者諸子雜家經史外事棄而不録實杜異聞夫以可除而不除宜取而不取以茲著述未覩其義太史公述儒林則不取遊夏文學著循吏則不言冉季政事至於貨殖為傳獨以子貢居先掩惡揚善既忘此義成人之美不其缺與史記八條見史通遷非有意於明道亦非有意於譏刺太史公作史記其意似不偶然者考其自敘首尾凡三戾愚竊疑焉公本以論著自任始言孔子至於今有能紹而明者本易傳繼春秋本詩書禮樂之作小子何敢辭焉至若與任安書其言深憤蠶室之辱乃曰西伯拘而演周易仲尼厄而作春秋屈原放逐而作離騷幾百餘言蓋意有欎結而不得通思垂空言以自見即此以觀公之此言與前相反一再矣然則公之意果安在哉以謂有意於明道耶公於漢未得為醇儒何自知不明而僣聖作經哉謂有意於譏刺耶則漢尚黃老武帝專以勢利用人而先黃老崇勢利如此類者不可勝數安得有所譏刺哉若曰有所感憤而作則史策萬代之傳豈容感憤為之哉公言草創未就適會此禍又以先人史談之言欲無廢天下之史豈有戮辱而後作哉以此參考未知太史公之意何在愚以謂不可泥太史公之言當採太史公之心也不過痛憤道不克行於時而惟恐身沒之後為無聞人也乃曰孔子嘗以不用於時而作春秋後之知孔子不在乎他由五經春秋以知之也於是遷於述作之際出此言以見其意而已觀其自敘首尾及答任安書詞不同而意則一也分紀傳世家書表皆有深意本紀者天下之統也世家者一國之紀也列傳者一人之事也書者制度沿革之大端表者興亡理亂之大略也必謂紀者帝王行事之稱則秦之未并天下何以為紀謂世家者諸侯族系之稱則蕭曹之徒何以為世家謂列傳者非王侯之稱則韓彭英盧之建國何以降之傳故夫紀之述王者世家之述諸侯傳之述卿大夫固其大法也而書法之權度不可以此拘也本紀謂之帝紀此自班書始耳子長特以其事之係於天下則謂之紀故秦可紀也項氏可紀也雖吕氏亦可紀也始皇已并六國則事異於前不可以商周之例拘也其贊羽曰號為伯王政由已出是時漢未得天下雖紀項羽可也其贊髙后紀曰孝惠髙后之時制政不出房門則君道不立雖削孝惠可也削去世家此亦自班書始耳子長特以其事之有大於列傳則係之世家故夫子以聖陳涉以首事何參良平以勳賢皆得係焉夫子在周則臣道也躋之本紀則有嫌於名分在後世則師道也儕之列傳則幾無異於諸子故特别之其義精矣陳涉事雖微淺而子長之自序曰夏商失其道而湯武作周失其道而春秋作秦失其道而陳涉發難則其所係者大雖世家可也蕭曹良平與功臣位俱通侯而勳烈冠於羣后皆漢家社稷之臣則其所係者大雖世家可也至於列傳之中貫穿錯綜尤有深意管晏同伯者之佐老韓同異端之學則合之而為一莊周學於老氏申不害同於韓氏則附之於其下孟荀與淳于之徒俱在齊國雖同列於傳獨以孟荀冠之篇首其尊之也至矣賈誼附於屈原鄒陽附於魯仲連太伯首於世家伯夷首於列傳吳與淮南不使與荆燕俱列信布之徒不使與蕭曹同功至若酷吏佞幸日者龜䇿滑稽貨殖遊俠之傳皆為當世發也如本紀世家之中凡天下有大事必特紀之若是嵗齊桓始伯是嵗孔子相魯之類皆錯見於諸國之中此紀大事之法也紀列國之世家以封國之先後為次先姬姓而後異姓先舊國而後僣竊之國敘傳之中抑揚感慨每致意於聖賢之後此記列國之法也不寧惟是三代世表所以觀百世之本支也諸侯年表斷自共和所以觀世變之升降也秦楚月表上尊義帝而漢居其中所以明大義也將相年表上係大事之記所以明職分也平凖一書所以著征利之害封禪一書所以著求仙之詐也後世史氏之紀傳表志其規模制度有髣佛於是者哉並林省元執善議論班固論馬遷先黃老崇勢利固之言為非若夫班孟堅論其是非頗謬於聖人又有可言者先黃老者史談之意也子長以老子與韓非同傳豈先黃老者哉世降俗薄見利則逝而遊俠巨室猶有拯急之風子長負豪邁之髙氣若將噓海岱而出雲雨亦豈崇勢利者哉惟其鬱鬱憤嘆有不能平於心凡感時觸事輒廢卷而太息故其意氣豪放多跌蕩於法度之外而班氏乃責之以聖人之是非不知夫人之學問茍未至於知道則是非權衡安能無謬於聖人子長之過固多矣班氏之過不愈多乎子長如天馬駿足步驟不凡不肯少就於籠絡固非駑駘之敢望而馳騁中節則未也使其少就籠絡遵轍而行豈可得哉前人馬遷不當採次異聞以為傳堯舜相繼二百餘年書之所紀者十一篇今其存者二篇而已堯舜之大法既已盡見於二篇之中然則果不欲其詳也太史遷不能知聖人之意而紛然記之為竒以夸天下者何耶遷出秦人之後諸侯之史皆已燔滅而不可見者猶傅會羣書採次異聞如此其多使遷如聖人盡見上世之書籍衒其博而不能窮將如之何耶自遷發其端而劉向盡求而敘之異端之學遂以大肆於後聖人之道相亂嗚呼豈非遷之罪耶葉學士進奏史記體之失撰録之煩尋史記疆宇遼闊年月遐長而分以紀傳散以書表每論家國一致而秦越相遼敘君臣一時而參商是隔者為其體之失者也兼其所載多聚舊記時插雜言謂採國語世本戰國策故使覽之者言罕異聞而語饒重出此撰録之煩者也史通五帝紀世次顛錯馬遷作五紀必欲其世系皆出於一且以黃帝二世而得顓帝三世而得髙辛四世而得帝堯此其説猶有可考者乃若堯之於舜固已黃帝之八世矣及舜之傳禹則又其四世之祖焉夫史遷之作史古人謂之善敘事今考其五帝世次而又顛錯如此蓋遷之失在於好竒是以其説有時而自戾矣夫五帝之世次學者不得見之於聖人之經及考之於史又顛錯如此學者安得稽焉歐陽修律書伯夷傳皆有深意吾嘗讀律書見其所載人民樂業自年六七十翁未嘗至市井遊遨嬉戲如小兒狀伯夷傳首載箕山許由冡及雖執鞭之士吾亦為之二語似若文義背戾不相統屬及嘗推究其意則知遷筆力誠閎深髙古與夫世俗之綢繆編聫拘拘比附者大不侔夫律者天地間和氣之所交通也一鄒子吹之尚能回春溫於寒谷矧夫文帝之時風俗醇厚人民安樂如此所謂黃鍾太簇之屬井然條而不雜寧不有所召乎子長筆之於律書政其適也伯夷首陽之節許由箕山之兆前後一也昔人存昌歜而思文王子長過箕山而感伯夷事有不相關而實相應者皆是物也執鞭吾亦為之之言遷無乃有所激乎遷以一言不中而蹈極刑仰視伯夷髙舉逺引不蹈塵網甚切慕之而願為之執鞭固宜由是以觀子長之史用意所向固非膚淺凡近者比也方㽥史記多出於後人之增益若夫贊司馬相如有揚雄以為靡麗之賦勸百諷一等語今班史亦有此言是必班史所增後人亦以載之遷史而不鐫去也傳賈誼謂賈嘉最好學與豫通書至孝昭時立為九卿説者徒見遷之已死於孝武時不及知孝昭時事不知嘉生於孝武時正與遷同時所謂通書誠有之但至孝昭時立為九卿八字安知非班固所增而後人亦以之載於遷史乎張晏以為遷史十篇有録無書如元城禇先生補缺作武帝紀三王世家漢興以來將相年表禮書樂書龜策日者等傳之類則知遷史必有出於後人之所增益頗多夫子作春秋遊夏不能措一辭遷史非春秋安能免後人之所增益哉前人表載十三國而不數吳猶春秋待越以夷狄遷表十二諸侯首魯迄吳實十三國而越不與焉夫以十二名篇而載國十三何也不數吳也皆諸侯爾獨不數吳何也用夷禮也不數而載之何也周裔而伯盟上國也春秋書哀七年公會吳于鄫書十二年公會吳于槖臯書十三年公會晉侯及吳子于黃池此其所以雖不數而猶獲載也若越區區於南夷豺狼狐狸之與居不與中國會盟以觀華風而用夷俗名以越故君子即其自稱以罪之春秋書定五年於越入吳書十四年於越敗吳于擕李哀十三年於越入吳此春秋所以夷狄蓄之也茍遷舉而措之諸侯之末則西戎玁狁亦或預乎其間是以絶而棄之將使後之人君觀之曰不知中國禮樂雖勾踐之賢猶不免乎絶與棄則其賤夷狄也不亦簡而明乎老泉史論不當裂取六經傳紀之文遷之辭淳健簡直足稱一家而乃裂取六經傳記雜於其間以破碎汩亂其體五帝三王紀多尚書之文齊魯晉楚宋衛陳鄭吳越世家多左傳國語之文孔子世家仲弓弟子傳多論語之文夫尚書左傳國語之文非不善也雜之則不善也今夫繡繒錦縠衣服之窮美者也尺寸而割之錯而紛之以為服則綈繒之不若遷之書無乃類是乎同上不當與父俱稱太史公其自序曰談為太史公又曰太史公遭李陵之禍是與父無異稱也先儒反謂固殁彪之名不若遷遜美於談吾不知遷於紀於表於書於世家於列傳所謂太史公者果其父耶抑其身邪此遷之失也同上吕后不當列帝紀陳涉不當預世家春秋書薑氏會齊侯于禚説者曰婦人制政不出房門安有與列國君之會婦人不可與國君會吕后何為而列帝紀乎此非遷之失乎吳會諸侯於黃池罪吳不當列於會以崛起之醜而哆然預中國之列春秋所以致其譏陳涉何人而亦世家於齊魯之列乎此非遷之失乎顔機左傳史記前漢書左傳不得為省史記漢書不得為煩昔于寶厯詆諸家而獨歸美左傳曰邱明能以三十卷之約括囊二百四十年之事靡有孑遺斯蓋立言之髙標著作之良模也又張輔著班馬優劣論云遷敘三千年事五十萬言固敘二百四十年事八十萬言是班不如馬也然則自古論史之煩省者咸以左氏為得史公為次孟堅為非自魏晉已還年祚轉促而為其國史亦不減班書此則後來愈煩其失彌甚者矣夫論史之煩省但當求其事有妄載苦於榛蕪言有闕書傷於簡略斯則可矣必量世事之厚薄限篇第以多少理則不然且必謂邱明為省也若介葛辨犧於牛鳴叔孫志夢於天壓楚人教晉以拔斾城者謳華以棄甲此而畢書豈得謂之省邪且必謂漢書為煩也若武帝乞漿於柏父陳平獻計於天山長沙戲舞以請地楊僕怙寬而移關此而不録豈得謂之煩邪由斯而言則史之煩省不中從可知矣史通劉向所著多虛偽觀劉向對成帝稱武宣行事世傳失實事具風俗通其言可謂明鑒者矣及自造洪範五行及新序説苑列女神仙諸傳而皆廣陳虛事多造偽辭非其識不周而才不足蓋以世人皆可欺故也同上羣書考索續集卷十三
