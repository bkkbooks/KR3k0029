body:
  text: 羣書考索卷五十八宋章如愚撰天文門天文類自初生民以來世主曷嘗不歷象日月星辰仰則觀象於天俯則觀象於地天有日月地則有隂陽天有五星地則有五行天有列宿地則有州域三光者隂陽之精氣本在地而聖人統理之昔者包犧氏觀象察法以通神明之德以類萬物之情故易曰天垂象見吉凶聖人象之黃帝創受河圖始明休咎星官之書自黃帝始降及髙陽乃命南正重司天北正黎司地爰及帝嚳亦式序三辰唐虞則羲和繼軌夏則昆吾紹德年代綿邈文籍靡𫝊至於商之巫咸周之史佚格言遺記于今不朽其諸侯之史則魯有梓慎晉有卜偃鄭有禆竈宋有子韋齊有甘德楚有唐昧趙有尹臯魏有石申皆掌著天文各謹圖驗其巫咸甘石之徒後代所宗漢司馬談父子繼為史官著天官書以明天人之道劉向廣洪範灾異作皇極論以參往行之事及班固叙漢史司馬續述天文而蔡雍譙周各有撰録司馬彪采之以繼前志漢之傳天文者則有唐都李尋之倫光武以來則有蘇伯况郎雅光並參伍天文發揚善道後張渾為太史令鑄渾天儀總序星經謂之靈憲在三國時吳之陳卓始列甘石巫咸三家著於篇録並著占贊唐興太史李淳風浮屠一行尤稱精博如淳風之法象志一行之覆矩圖後世未能過也故唐史采其要說而以為天文志王朴之在五代通於歷數嘗以步日步月步星步法斂四篇合為歷經故史臣載其遺說而為司天考今以其論日月者考之日有中道月有九行此前漢天文志之說也中道者黃道也一曰光道九行者黑道二則出於黃道之北赤道二則出於黃道之南白道二則出於黃道之西青道二則出於黃道之東此之謂日有中道月有九行也日有九道並與月同此又鄭康成所用以為注月令者也月令於春其日甲乙而注則以為春從東道月令於夏其日丙丁而注則以為夏從赤道月令於秋其日庚辛而注則以為秋從白道月令於冬其日壬癸而注則以為冬從黑道季夏之末其日戊己而注以為四時之間從黃道此之謂日有九行也至於五代史司天考所載王朴之說則又曰自古雖有九道之說蓋亦知而未詳徒有祖述之文而無推步之用今以黃道一周分為八節一節之中分為九道盡七十二道而使日月無所隱其斜正之勢此王朴所以有九道之法也晋書天文志所載王蕃渾天之法則有曰赤道帶天之紘黃道日之所行也半在黃道之內半在赤道之外與赤道東交於角西交於奎此王蕃所以詳言黃道赤道之卞也若日月之行則正嵗凡十二㑹焉子為元枵丑為星紀寅為析木卯為大火辰為壽星巳為鶉尾午為鶉火未為鶉首申為實沈酉為大梁戍為降婁亥為娵訾此一嵗十二㑹之次也日月周天則凡三百六十五度四分度之一焉星則循天而左行日月則遡天而右行日行一度一嵗一周天月行十二度有竒一月一周天此日月周天之度數也日行太隂則無光月行太陽則能照極南為太陽極北為太隂此又王充論衡太陽太隂之說也日者陽精之宗月者隂精之宗月光生於日之所照魄生於日之所蔽當日則光盈就日則光盡此張衡靈憲生魄生明之說也日出于暘谷浴于咸池拂于扶桑以至于隅中虞淵者此又淮南子日出日入之說也今自其論星辰者言之則有五星有四宫星有極星有中星又有經星瑞星焉夫所謂五星者何也嵗星之屬於東熒惑之屬於南太白之屬於西辰星之屬於北鎮星之屬於中央五星同色百姓寧然五星有嬴有縮早出為嬴晚出為縮至甘氏太初歷又各不同蓋以星嬴縮在前名録後所見也古歷五星之推亡逆行者至甘氏石氏經則以熒惑方曰為有逆行蓋以周衰之變遂因以為皆非正行也夫所謂四宫星者何也東宫之星則蒼龍之屬角亢氐房心尾箕之七宿其形如龍故曰蒼龍南宫之星則朱鳥之屬井鬼栁星張翼軫之七星其形如翼鳥故曰朱鳥西宫之星則咸池之屬奎婁胃昴畢觜參有白虎體故曰白虎北宫之星則元武之屬謂斗牛女虛危室壁有龜蛇體故曰元武其所謂北極者北辰也北辰天之中也天運無窮三光迭曜而極星不移故曰居其所而衆星拱之此北極也而又有所謂南極者焉北極則髙於地者三十六度南極則下於地者三十六度故北極之下三十六度常見不沒南極之上三十六度常沒不見此南極北極之别也古者舉中星以正四時春則日中星鳥夏則日永星火秋則宵中星虛冬則日短星昴此堯典之中星也而又有月令之中星焉孟春之月日在營室昏參中旦尾中仲春之月日在奎昏弧中旦建星中季春之月日在胃昏七星中旦牽牛中例而推之四時皆然此月令堯典中星之異也若夫經星者如曰四輔曰華蓋如斗魁所載之六星曰上將曰次將曰貴相司命司中司祿者則名之曰文昌斗魁之下兩相比之六星曰泰階曰中階曰下階者則名之曰三台太微為五帝之坐東壁為圗書之府執法郎官之象其官明堂靈臺之象其物皆經星也故馬績云天文之在圗籍昭昭可知者經星常宿中外官凡百一十八名積數七百八十三星皆有州國宫官物象之類張衡靈憲論曰中外官常明者百有二十四可名者三百二十為星二千五百微星之數萬有一千二百五十庶物蠢動咸有繫命此之謂也若夫瑞星者如隋志所載一曰景星出於有道之國二曰周伯星所見之國必昌三曰含譽四曰格澤此瑞星之類也然總諸星而觀之北斗者乃七政之樞機隂陽之元本也魁四星為璇璣杓三星為玉衡所謂璇璣玉衡以齊七政者也太史公曰杓擕龍角東方宿衡殷南斗魁枕參首斗為帝車運于中央臨制四海分陽隂建四時均五行移節度定諸紀皆繫于斗故天官之書首言極星又以北斗為諸星之首此又觀象之所當先也或曰第一曰天樞二曰璇三曰璣四曰權五曰玉衡六曰開陽七曰搖光樞為天璇為地璣為人權為時玉衡為音開陽為律搖光為星石氏乃曰一主天二主地三主火四主水五主土六主木七主金又曰一主秦二主楚三主梁四主吳五主燕六主趙七主齊亦不可不知也常觀馮相氏之職掌十有二嵗十有二月十有二辰二十有八星之位辨其叙事以㑹天位冬夏致日春秋致月以辨四時之叙保章氏之職掌天星以志星辰日月之變動以辨其吉凶此又觀象之法也雖然魏崔浩嘗考校漢以來日月薄蝕五星行度并譏前史之失别為魏歷以示髙允而允謂漢元年五星聚東井乃漢史之謬案星傳金水二星常附日行冬十月日旦在尾箕昏沒於申南而東井方出於寅北二星何因背日而行是史官欲神其事不復推之於理也及浩考之果如充言乃以前三月旅於東井而非十月也吁安得斯人而與之言天文哉中星聖人南靣視四時之中所以候四時以布民政也故堯命羲和歷象日月星辰敬授人時舜在璿璣玉衡以齊七政皆謂此也然則天以二十八宿分布四方凡三百六十五度有竒為日月五星之次舍日行一度為一日一周天為一嵗月行三十日一周天為一月故日月一嵗十二㑹為四時時有孟仲季仲為分至人君不能以朝夕察候乎星度也故舉四時之中以驗之曰日中春分也曰日永夏至也曰宵中秋分也曰日短冬至也所謂星鳥者南方之星七為朱鳥體春分則見於南方也所謂星火者東方之星七為蒼龍體夏至前見於南方也所謂星虛者北方之星七為元武體秋分則見於南方也所謂星昴者西方之星七為白虎體冬至則見於南方也鄭康成曰凡記昏明中星者為人君南靣而聽天下視時候以授民事也既舉四時之中又昏旦但視方之列宿則孟季之月與周天之度數從可知也故歷代聖王尚之夏有小正周有時訓秦漢暨唐及宋朝皆有月令所以順天時而督民務也詩曰定之方中作于楚宫又有三星在天在隅在户之候春秋𫝊曰啓蟄而郊龍見而雩又曰土功水昏正而栽又曰凡鳥日中而出日中而入此皆視列宿而行國政也歷三代漢唐至于今數千年日行漸逺故中星隨而轉移堯典之中星與月令之中星為不同月令之中星與歷之中星又不同書於春舉星鳥而月令於仲春則曰昏弧中書於夏舉星火而月令於仲夏則曰昏亢中書於秋舉星虛而月令於仲秋則曰昏牽牛中書於冬舉星昴而月令於仲冬則曰昏東璧中書之中星常在後而月令之中星常在前故鄭康成之釋禮記則曰月令舉其初朔而尚書總舉其月之中也豈非與月令為不同乎月令於孟春昏參中而三統歷於立春則以為昏畢十度中元加歷於立春則以為昏昴九度中皆不同其為昏參中者考之餘月之昏旦亦莫不然是月令為歷未嘗同也故孔頴逹之疏禮記則曰月令但舉其大略所以昏明之星不可以正依歷法也是豈非與歷為不同乎昔元祐中蘇頌為儀象法要以月令洎唐及本朝所測者合為四時昏旦中星圗陳祥道為禮書亦併論其月令尚書中星之異皆此意也雖然月令於餘月之昏旦中皆舉二十八宿如孟春之參尾中季春之牽牛中孟夏之曰翼曰婺女季夏之曰火曰奎孟秋之昏畢中季秋之昏虛中孟冬之旦七星中季冬之旦軫中皆二十八宿也惟仲春之月日奎昏弧中旦建星中獨非二十八宿者以弧星近井而建星近斗也石氏星經曰井有二十三度斗有二十六度以井斗度多其星體廣逺不可的指其昏旦之中故舉弧建以定之此又不可不知也分野天有十二次日月之所躔地有十二辰王侯之所國周官大司徒辨十有二土十有二壤保章氏以星土辨九州所封封域皆有分星以觀妖祥蓋九州十二域或係之北斗或係之二十八宿或係之五星則雍主於魁冀主於樞青兖主於璣揚徐主於權荆主於衡梁主於魁陽豫主於搖光此繫之北斗者也星紀吳越也元枵齊也娵訾衛也降婁魯也大梁趙也實沈晋也鶉首秦也鶉火周也鶉尾楚也壽星鄭也大火宋也析木燕也此國之係於二十八宿也壽星之次其州曰兖大火之次其州曰青娵訾之次其州曰并降婁之次其州曰徐大梁之次其州曰冀實沈之次其州曰益鶉首之次其州曰雍鶉火之次其州曰三河鶉尾之次其州曰荆此州之繫於二十八宿也嵗星之主齊吳熒惑之主楚越鎮辰星之主燕趙代此係之五星者也然吳越南而星紀在丑齊東而元枵在子魯東而降婁在戍東西南北相反而相屬何耶先儒以為古者受封之日嵗星所在之辰其國屬焉觀春秋𫝊凡言占相之術以嵗之所在為福故師曠梓慎禆竈之徒以天道在西北而晋不害嵗淫元枵而鄭飢則古之言星紀者未嘗不視嵗之所在也梓慎曰陳太皥之虛也鄭祝融之虛也皆火房也衛髙陽之虛也其星為大水以陳為火則太皥之木為火母故也以衛為水則髙陽水行故也子産曰髙辛氏有二子伯曰閼伯季曰實沈遷閼伯於商邱主辰商人是因故辰為商星遷實沈於大夏主參唐人是因故參為晋星然則十二域所主亦若是爾班固曰甲乙海外日月不占而丙丁則江淮海岱也戊己則中州河濟也庚辛則華山以西壬癸則常山以北一曰甲主齊乙主東夷丙主楚丁主南夷戊主魏己主韓庚主秦辛主西夷壬主燕趙癸主北夷子主周丑主翼寅主趙卯主鄭辰主邯鄲巳主衛午主秦未主中山申主齊酉主魯戍主吳越亥主燕代此又以方位辨州土也蓋自甘德石申以十二次更配十二分野而分野之次巳明自班固取三統歷十二次以配十二野而分野之次益明及費直之說周易蔡雍之月令章句所言頗有先後故陳臯更言郡國所入之宿度而分野之度數為尤明張衡蔡雍之在漢則以漢之郡而配十二次者也李淳風之法象志則以唐之州縣而配十二次者也然唐志所載一行之論則曰近代諸儒言星土者或以州或以國虞夏秦漢列國廢置不同周之興也王畿千里及其衰也僅得河南七縣今天下一統而直以鶉火為周分則疆埸舛矣七國之初地形雌韓而雄魏皆綿亘數州相錯如繡考雲漢山河之象多者或至十餘宿其後魏徙大梁則西河合於東井秦拔宜陽而上黨入於輿鬼方戰國未滅時星家之言屢有明驗今則同在畿甸中矣而或者猶據漢書地理志推之是守甘石遺術而不知變通之數也以為天下山河之象在乎兩戒北戒則自三危積石負終南地絡之隂東及于太華北抵于常山乃東狥塞而至于朝鮮是謂北紀所以限戎狄也南戒則自岷山嶓冡負地絡之陽東及太華南踰江漢乃東狥嶺而至于閩中是謂南紀所以限蠻夷也故星𫝊謂北戒為胡門南戒為越門河源自北紀之首北與地絡相㑹分而東流與涇渭濟瀆相為表裏謂之北河河源自南紀之首南與地脉相㑹分而東流與漢水淮瀆相為表裏謂之南河觀兩河之象與雲漢之始終而分野可知矣渾天儀言天者有三家一曰蓋天二曰宣夜三曰渾天蔡雍言宣夜之學絶旡師承周髀術數具存考驗天狀惟渾天者近得其情所謂周髀者即蓋天之說也其言天地中髙而四隤日月相隱蔽以為晝夜又云天形南髙而北下日出髙故見日入下故隱天之居如倚蓋極在人北是其證也所謂宣夜者惟漢郗萌記先儒所𫝊而云天本無質日月衆星浮生空虛之中其行其止皆須氣焉晋虞喜因宣夜之說於是而有安天之論虞聳亦祖宣夜之說於是而有穹天之論吳姚信又以天之體南低北髙於是而有昕天之論此皆好竒狥異之說非極數談天者也蓋宣夜有其名而無其𫝊周髀有其術而無其驗惟渾天謂地居中而天周焉日在地上為晝日在地下為夜雖王仲任據蓋天之說以駁渾儀而葛洪釋之曰周天之度半覆地上半繞地下故二十八宿半見半隱天轉如車轂之運晋志載黃帝書曰天在地外水在天外水浮天而載地者也易之晋坤下離上以證日出於地明夷之離下坤上以證日入於地需之乾下坎上此亦天入水中之象也當有何損而謂為不可乎故歷代所用多用渾天本朝韓顯符渾天法象序曰自伏羲立渾儀測北極髙下量日影短長定南北東西觀星間廣狹則伏羲已有渾儀矣隋志曰唐堯即位羲和立渾儀舜璿璣玉衡以齊七政而璿璣即渾天儀也是知渾儀者實天地造化之凖隂陽歷數之元自古聖帝明王莫不用是以精詳天象故前漢則有洛下閎渾天儀東漢則有張衡渾天儀在吳則有王蕃渾天儀在晋則有陸績渾儀在宋元嘉中則有錢樂之渾天儀唐正觀則有李淳風渾天儀在開元則有梁令瓉黃道游儀而其中之最精詳者則漢之張衡唐之李淳風為可考也張衡之儀以八尺圎體而具天地之象則有內規外規有南極北極有黃道赤道以至于二十四氣二十八宿與夫日月五星之屬莫不咸在轉之以漏水告之於靈臺而星中出沒與天相值若合符節故崔子玉為之銘曰其數術窮天地制作侔造化范曄云其範圍兩儀天地旡所藴其靈陸公紀之徒以為推步七曜之道度歷象昏明之證候校以四八之氣考以刻漏之分占晷景之往來求形證于事情莫密於此則張衡之渾天為可考也淳風之儀表裏三重曰六合儀曰三辰儀曰四遊儀皆儀之别也天經金渾金常璿璣者儀中之規也上列十日十二辰三百六十五度中著日月五星列宿相距下為元樞主衡遊以橫筒以觀象而察器者儀之用也推驗之法本於黃道蓋帶天之中距極南北定而不易者赤道也視日所照以為光道發斂不時者黃道也治歷者不難於算平朔而難於定氣差制儀者不難於規赤道而難於規黃道是以太宗置於凝暉而用以測候此則淳風之渾儀為可考也漢自張衡渾儀之外而洛下閎之儀君子亦有取焉晋志曰漢太初洛下閎等造貟儀以考歷度揚子雲論渾天亦曰洛下閎營之鮮于妄人度之耿壽昌象之幾幾乎莫能違也此豈非洛下閎之可取者乎唐自李淳風之後梁令瓉之黃道游儀君子亦有取焉唐志曰令瓉以木為游儀使黃道運行以追列舍之變因二分之中以立黃道以赤道定位黃道游仰月環白道動與天合簡而易從一行是之乃奏令瓉所為日道月交皆自然契合於推步尤要此豈非梁令瓉之可取者乎其他如後漢之銅儀則有以銅而為儀者矣後魏之鐵儀則有以鐵而為儀者矣宋元嘉之小儀則曰小渾天李淳風之木渾則曰木渾圖唐明皇武成殿之水渾天則運以水者也張平子之候風地動儀則又用之以測地者也若夫曰赤道曰黃道此其法之不同者也曰單規曰雙規曰雙環規其制之不同者也蓋至本朝張思訓之渾儀則作於太平興國之中其制則有地軸地輪地足之異有橫輪側輪斜輪之别晝夜長短之刻日月五星之度皆具焉而其機轉之用皆隱於樓中此又踵一行令瓉之遺象者也韓顯符之渾儀則成於大中祥符之間其制則有游規直規之别黃道赤道之分曰窺管曰平凖皆其儀之號也曰龍柱曰水臬皆其號之殊也此又本乎淳風一行之遺法者也嘗觀蘇頌上儀象法要於元祐中有曰古人測候天數其法有二一曰渾天儀二曰銅候儀又按吳王蕃云渾天儀者羲和之舊器又有渾天象者以著天體以布星辰二者以考於天蓋密矣詳此則渾天儀銅候儀之外又有渾天象凡三器也渾天象歷代罕𫝊其象惟隋書志稱梁祕府有之云元嘉中所造由是言之古人候天具此三器乃能盡妙今惟一法誠恐未得精密古人言天有周髀之術以鉤股法推考天度若通此算術則天數從可知矣唐開元中太史監南宫說等馳往安南蔡蔚等州測候日景一行以南北日影校量用交股法算之即此法也雖然一行作大衍歷詔太史測天下之晷求其地中以為定數其議曰周禮大司徒以土圭之法測土深日至之景又有五寸謂之地中鄭氏以為日景於地千里而差一寸南宫說擇河南平地度之大率五百餘里晷差一寸而舊說謂王畿千里影差一寸妄矣原古人所以步圭影之意將以節宣和氣輔相物冝不在於辰次之周徑其所以重歷數之意將以恭授人時欽若乾象不在於渾蓋之是非若乃述旡稽之法於視聽之所不及則君子當缺而不議也而或者各守所𫝊之器以術天體謂渾元可任效而測天象可運算而窺迭為矛盾誠以為蓋天耶則南方之度漸狹果以為渾天耶則北方之極浸髙此二者蓋渾蓋之家盡智畢誠未有能通其說也則王仲壬葛稚川區區於異同之辨何益人倫之化哉凡晷度冬夏不同南北亦異先儒一以里數齊之遂失其實今更為覆矩圗南自丹冗北暨幽都每極移一度輒纍其差可以稽日食之多少定晝夜之長短而天下之晷皆叶其數矣唐末邊罔修歷術服其精粹以為不刋之數也昭宗刻漏周天之星二十有八星星之辰十有二辰之度三十有竒而十二辰之度三百六十五有竒星辰徇天而左旋日月五星遡天而右轉日陽也舒而遲故朞而周月隂也蹙而速故一月而周日月㑹於辰則為月十有十二㑹則為嵗嵗三百有六旬有六日而日之長短參差不齊於是先王刻箭沃漏以揆之故隋志曰黃帝創觀漏水制器取則以分晝夜則漏刻之制蓋始於黃帝其後因以命官周禮挈壺氏則其職也及考之鄭氏所注則有曰漏之箭晝夜共百刻冬夏之間有短長焉太史立成法有四十八箭此亦可見周制之大略也漢興因徇古制武帝所用之法二至之後九日而增損一刻建武中興歷稍後天宋浮許淑請更歷法天下初定顧猶未遑而令甲第六漏品斯載日分百刻率以九日為刻增損視夏歷為踈焉永平紹隆張盛景防以四分法課校弦望術頗施行元和編欣李梵推廣其術歷用四分而官漏之制一仍其舊或時至差二刻以上不與天應迄于和帝永元之十四年未知改作惟霍融待詔太史視考夏歷露章抗議詔刻四十八箭以二十四氣日躔所在泊于黃道去極晷景昏明中星刻于其下隨日南北以為長短始終互起凡一再周而一嵗之運畢焉四分歷法訖定于茲然則是氣之設實為至妙終于魏晋相𫝊不改故晋陸機則有刻漏賦晋李充孫綽則有刻漏銘梁陸倕則又有刻漏銘唐藝文志則有刻漏經唐歷志則有一行步軌漏術此亦可以考歷代之大略也然孔頴逹謂浮箭壺內以出刻為凖賈公彥謂漏水壺內以設刻為度或浮或沉此其說之異也古今刻漏之法有浮漏有稱漏或浮或稱此其制之異也漢夏賀良則有百二十刻之說宋何承天則有春秋二分晝夜各五十刻之說梁武帝大同之所改用者則又有百八十刻之說至於陳隋則仍用百刻之制此又其效之不同者也在天聖中燕肅所上刻漏浮箭之壺為金蓮花則曰連花漏皇祐初舒易簡等所造刻漏以水為權衡增平水壺置于文德殿則為文德殿刻漏蘇頌之在元祐上儀象法要於渾天儀銅候儀渾天象三器之外又置刻漏四副一曰浮箭漏二曰稱漏三曰沈箭漏四曰不息漏使挈壺専掌時刻與儀象互相參考以合天星行度為正所以驗天數與天運為不差則寒暑之氣候自正也雖然周官挈壺氏曰凡軍事垂壺施之於軍所以嚴警守以至朝夕之禮而常以是為節焉然春官雞人凡國事為期則告之時而齊詩特罪挈壺氏者蓋天子備官挈壺氏掌漏雞人告之諸侯則掌漏告時一於挈壺氏而已此不可不知也沈存中筆談云古今言刻漏者數十家悉皆踈謬未合天度豫占天候景驗儀象考數下漏凡十餘年方粗見真數成書四卷謂之熙寧晷漏皆非襲蹈前人之迹其間二事尤微其術可以心得不可以言喻非深知造算之理者不能與其微也歷聖人作歷大要有三一曰象二曰氣三曰數考之以日月星辰之象驗之以隂陽寒暑之氣積之以抄忽毫釐之數蓋四時寒暑旡形而運於下日月星辰有象而見於上二者常動而不息一有一旡出入升降或遲或速不相為謀其久而不能旡差者勢使之然也故為歷者其始未嘗不精察而其後多踈不合亦理之然也不合則屢變其法以求之自古以來歷未嘗同也黃帝作調歷乃命羲和占日常儀占月車區占星泠倫造律吕大撓造甲子𨽻首作算數容成總斯六術考定氣象建五行察發斂起消息正閏餘歷法之詳蓋肇於此顓帝之歷正以孟春號為歷宗堯歷象日月星辰箕子言九疇而五紀明歷法夏商周迭用三統正朔不同歷亦以異周室既衰歷官失紀疇人子弟散在諸國於是國各有歷魯歷其一也漢之歷凡四變自張蒼用顓帝歷武帝用太初歷而劉歆有三統歷章帝則用元和四分歷其後劉洪則又有乾象歷此其歷之四變也唐之歷凡八變髙祖則用傅成均戊寅元歷髙宗則用李淳風麟德甲子歷開元則用一行大衍歷代宗則用寶應五紀歷德宗則用建中正元歷憲宗則用元和觀象歷穆宗則用長慶宣明歷在景福則又有邊岡崇元歷此其歷之八變也自漢唐之外在晋則有杜預春秋長歷二元乾度歷在宋元嘉則有何承天之新歷在元魏則有崔浩五寅元歷在隋則有皇極歷在周顯德則有王朴欽天歷然漢之歷莫善於太初蓋鄧平唐都洛下閎之徒以律起歷其衍起於黃鐘初九而乘之得其數八十一以為日法以前歷上元太初而推之復得閼逢攝提格之嵗中冬甲子朔旦冬至日月在建星故罷廢尤疏逺者十有七家至淳于覆驗而太初歷之晦朔弦望皆為最密日月如合璧五星如連珠此太初歷之所以獨顯於漢也其他如歆之三統而杜預則以為比諸家最踈六十餘嵗輒增一日班固誤以為志而何承天亦云揚雄惑歆之說采以為太𤣥如四分歷則出於圖䜟之所著而漢人馮光等又病其歷元之不正至乾象歷雖鄭𤣥以為其法窮幽極微而魏韓翊則以為减斗分太過其視太初則有間矣唐之歷善於大衍蓋一行専用大衍之䇿竊考其詳本於天地之二中始於冬至之中氣以合朔至日月之㑹以日度正周天之數以卦氣定七十二候以中星正二十四氣天數始於一地數始於二合二始以位剛柔天數終於九地數終於十合二終以紀閏餘天數中於五地數中於六合二中以通律歷一䇿之分十九而章法生一揲之分一十六而蔀法生以卦當嵗以爻當月以䇿當日而其原皆本於易故唐史臣謂自太初歷至麟德歷有二十三家與天雖相近而未密也至一行密矣其倚數立法固旡以易也後世雖有作者皆依倣而已此大衍之術所以獨顯於唐也其他如戊寅元歷則以受命之嵗而為名而祖孝孫之徒猶恨其踈闊李淳風之甲子歷雖當時以為精密而後復雜用以瞿曇之經緯歷若夫徐昴之觀象歷則又旡蔀章之數至於察斂啓閉之候循用舊法而測驗不合其視大衍則又有間矣自太初大衍之外而杜預之長歷王朴之欽天歷為可采也預之言曰天行不息日月星辰各運其舍皆動物也以新故相涉不得不有毫末之差積而成多以失弦望晦朔則不得不改憲以從之易所謂治歷以明時言當順天以求合也李修卜顯依其論以為乾度歷合日行四分數而微增當時參校以為特勝預奏行之此其可取者然也朴之言曰為國家者履端立極必體其元布政考績必因其嵗禮動樂舉必正其朔三農百工必順其時五刑九伐必順其氣庶政有為必從其日月是以聖人必治歷數包萬象以為法齊七政以立元測圭箭以候氣明九道以步月交遲速以推星考黃道之斜正辨天勢之升降而交蝕詳焉於是而為欽天歷此其可取者然也至於本朝歷凡十變在建隆則曰應天在太平興國則曰乾元在咸平則曰儀天在天聖曰崇天在治平曰明天在熙寧曰奉天在元祐曰觀天在崇寧曰占天未幾又改曰紀元在紹興曰統元在慶元曰㑹元此其大略也然歷之道大矣有歷元有歷譜後漢虞恭宋欣之議歷有曰建歷之本必先立元正然後定日法法定然後度周天以定分至三者有程則歷可成也故黃帝造歷元起於辛卯顓帝用乙卯虞用戊午夏用丙寅商用甲寅周用丁巳魯用庚子漢用乙卯武帝用丁丑范曄載於律歷志者為可考也劉向深明洪範嘗作五紀論總六歷而列是非至歆復䆒其微眇推易象春秋作三統歷及譜取尹咸所校條而奏之為十八家之書曰黃帝五家歷曰顓帝歷曰夏商周魯歷曰天歷曰大歷曰日月宿歷此其以歷明者也曰日月行帛圖曰五星行度曰律歷數法曰五星宿紀曰日晷曰許商杜忠算術此皆象數之書而歷之流也故亦以歷名之曰帝王諸侯世譜曰古來帝王年譜此以譜名者也蓋譜也者歷叙古帝王授受之次以明三統之序以紀灾祥休咎之徴而使作歷者得以考驗故其書與歷並𫝊今班固載於藝文志者為可考也不特此也唐一行之論則又有十二議焉曰歷本曰中氣曰合朔曰沒滅略例曰卦候曰卦議曰度議曰躔盈縮略例曰九道議曰晷漏中星略例曰月蝕議曰五星議其外又有步中朔術有步發斂術有步日躔術有步月離術有步軌漏術有步交㑹術步五星術今載於唐歷志者又可考也抑嘗觀唐藝文志其於律書也不特叙歷代之歷書而首叙歷代之算法如劉向九章重差之算法張邱建之算經劉徽之海島算經其他如曰七曜歷算曰黃鍾算法曰五曹算經纎悉備載而不遺以見其明歷者又不可不先明乎此也歐陽作歷志論邊岡用算巧能馳騁反覆于乘除間由是簡捷超徑等接之術具而經制逺大衰序之法廢吁歷其可輕議哉雖然古之論朞數者在大𫝊則曰凡三百六十當朞之日是一朞之日數止於三百有六十矣在堯典則曰朞三百六旬有六日是一朞之數又餘於大𫝊所言者六日矣至於杜預長歷又有周天之數凡三百六十有五度四分度之一為言則一朞之度其所行不足又减於堯典之三分矣則增損之數其不同者又何歟大𫝊所言蓋自其正數而言之堯典所言蓋自其置閏之成數言之長歷所言蓋自步占之法言之此又論歷者之不可不知也日蝕議曰使日蝕皆不可以常數求則旡以稽歷數之踈密若皆可以常數求則無以知政教之休咎五星議曰五星留速伏見之效表裏盈縮之行皆係之於時而象之於政政有小失則小變不然皇天何以隂隲下民警悟人主哉地理門江左經略中原晉自元帝植國於江左終晉之世雖未嘗恝然於中原而終不能踰淮而北祖逖之於河南有端緒矣而竟不能以酬其擊楫之素志庾翼之志在滅胡亦少壯矣而不能抗李熊之堅敵禇裒大舉而終以自阻以部將徐翕之敗而自沮商浩北伐而終以不遂元溫雖成關洛之功而枋頭頓挫之後大節遽變亦安望其勵志復仇以混一區宇哉其後劉裕以英雄之才奮然以興復為己任東滅南燕西取姚秦北圍滑臺以與魏氏爭河洛之地前日諸人所以悉力經畫而不可得者往往次第以平志氣亦雄健矣獨惜其入關之後不能事形勢以張國威英雄豪傑之士於是有得其用心者矣故東還之師未及脫斾而秦隴之變已竊發而不可禦此夏連勃勃所以逆知其不能守也裕之規模蓋可知矣是以魏太武一振兵威而青兖司豫之地拱手以歸魏豈非規恢之略旡以開其後歟更宋五十餘年雖文帝一再出師以開拓境土隨得隨失終不得而有之嘗觀到彥之統帥舟師徑趣河洛魏人斂袵而退司兖之地常一平矣未幾而復失柳元景嘗以襄陽之師克復潼關向義之徒所在響應關輔之地嘗一平矣又未幾而復失蓋文帝雖號為有志中原而本旡進取之長䇿幸其事之速辦而不知其敗之尤速也且魏斂戍之初豈真有畏心哉特以天時不利而不敢與之較爾王仲德曰胡虜斂戍北歸必併兵全聚若河氷既合將復南來是固足以知敵人之心而帝莫之聽此彥之所以不能據全其地也元景始進之初亦事幾之㑹也固冝精擇主帥號召英傑以共成響應之勢而帝之所任者乃王元謨虛誕之徒不間將略竟以退怯失利而元景亦不得以獨進命將出師例以成律指授而先後遲速之機諸將往往不得以自便關防纎悉一至於此安得度外之士以立非常之功乎至如檀道濟以蓋世之威名此正敵人之所深畏者也帝乃以猜疑畏忌之心使之進退旡以自免及事變不支之際始深悔之見何晚也况當時太武之在魏內則有崔浩髙允之徒以為之謀外則有奚行長孫翰之徒以為之將乘其翦滅柔然之餘威震兵南向聲勢所接已足以讋服人心於未戰之初矣夫敵人之勢方張而宋之所自為國者乃復若是旡怪乎青徐兖豫之地相繼覆殁而不自固也吾嘗觀何承天備邊䇿曰今日非大田淮泗內實青徐使民有贏儲野有積榖然後一舉蕩夷則不足為也若但欲遣軍追討報其侵暴則彼必輕騎奔走不肯㑹戰徒興巨費不損於彼報復之役將遂旡已此䇿之最末者也承天之言最切於用而一不暇講徒欲愜其欲速之心而不為久長之計志於苟得而卒不可得也嘗觀晋宋以來凡植國於北方未有能久者劉淵父子奄有關洛而稱漢雖賴石勒之力未幾而反為石勒所取歷二十有六年而亡石勒據河南而稱趙雖出於張賔之謀未幾而竟為冉關所取歷三十有二年而亡慕容雋之興燕慕容恪之功也雖其取中山破青齊略取關河之地然不二世而遂并於秦苻堅之興秦王猛之功也雖取洛陽平關東以據中原之地然淝水既敗之後遂分裂於慕容垂姚萇之徒而不可禁其餘後梁之吕光北燕之馮跋赫連勃勃之於夏私自竊據而旡可久之長算是以隨起隨滅而不自知也語北方之盛者莫如魏然自孝文遷洛之後亡形已見其後孝明六鎮之變才起而東西分裂之禍卒移於髙氏宇文亦可見矣然則有志於恢復者豈宜自沮哉荆襄形勢昔諸葛亮勸劉備以取蜀結吳跨有荆益周瑜亦勸孫權分以荆州資劉備以發兵爭蜀還據襄陽以蹙曹操北方可圖也由是觀之坐制吳楚通西蜀而守襄陽英雄之資而帝王之業也昔荀彧說曹操則曰先取河北南臨荆州諸葛說備則曰跨有荆益魯肅說孫權曰荆州與國鄰接據而有之天下可定及曹操破荆州順江東下則遣周瑜逆入劉備領荆州牧則躬援甲胄與魯肅吕蒙陸遜輩數十年間以死拒戰而荆州卒為吳有魏不復南渡蜀不敢南下者以不失上流之勢也此豈非荆州之形勢乎孫權初有江南而周瑜吕䝉勸權取襄陽以抗曹操晋羊祜滅吳果自襄陽始元溫之領荆州也决䇿北征自江陵道襄陽直抵關中進至霸上而還柳元景自襄陽率諸軍據潼關戰于陜下南國之威少振焉苻堅乘陷蜀之勢舉兵冦襄陽則江表之勢固可憂矣此豈非襄陽之形勢乎嘗聞吳紀涉之言曰自西陵至江都五千七百里疆界雖逺而險要必爭之地不過數四猶人有六尺之軀其護風寒亦數處爾如此則上流所備可得而言矣夫荆湖之地為州者十而其鎮則江陵武昌是也京西道為州者八而其鎮則襄陽是也江西道為州者十而其鎮則九江是也凡畫野分土必據其津塗而扼其喉襟今所謂險要必爭之地不過江陵武昌襄陽九江是矣何以明之江水源於岷山下䕫峽而抵荆楚則江陵為之都㑹故諸葛亮以謂荆州北據漢沔利盡南海東連吳㑹西通巴蜀此用武之國也嶓冢導漾東流為漢漢沔之上則襄陽為之都㑹故庾翼以謂襄陽西接益梁與關隴咫尺北去河洛不盈千里方城險峻土沃田良水路通流轉運旡滯進可以掃蕩秦趙退可以保據上流故也沅湘衆水合洞庭之波而輸之於江則武昌為之都㑹故吳常都於此而東晋宋齊梁陳之際號稱盛府者此也豫章西江與鄱陽之浸浩瀚吞納而匯於湓口則九江為之都㑹晋人以謂潯陽北撫群蠻西運荆郢亦藩任之要者此也今守江陵則可以開蜀道守襄陽則可以控川陜守武昌九江則可以蔽全吳夫蜀漢吳楚併而為一則東海之守亦固矣秣陵建康府壽州壽春又舊壽陽縣也今安豐軍蘄州蘄春峽州夷陵又云西陵狼尾灘及安蜀城廣陵今揚州泗州郡名臨淮江陵今荆南府昔荆州又樂郡南郡公安九江今江州又郡名潯陽湓口武昌今下郢川又郡名江夏京口今鎮江府又丹陽又潤州合肥今廬州又云廬江和州歷陽濡須塢在無為軍巢縣舒州同安皖城皖公山漢陽沔又名沔口郢州冨水隨州漢東黃州齊安光州弋陽徐州永陽楚州淮隂池州秋浦瓜步真州六合縣采石和州對境南岸姑熟太平州江淮形勢江淮之險天地所以限南北也而長淮之地又天地所以蔽長江也昔立國於南則守江以為家户備淮以為藩籬是故輕重之權不在江而在淮知有江而不知有淮是未知有重險者也夫江東西東極于海上流江陵歸峽則襄陽隨郢為之藩蔽中流武昌九江則舒蘄光黃為之藩蔽下流建康京口則真陽楚泗廬壽為之藩蔽昔三國時吳不得淮南至晋太康兵出廣陵壽春而吳亡東晋經劉石苻姚之亂長淮以南一彼一此而合肥壽陽淮隂常為晋氏鎮守至陳宣帝始盡失淮南之地其後賀若弼等自陽廬渡采石京口而陳亡南唐罷把淺之師壽春失守而江北之地遂入于周此淮南之得失係江左之安危也今自淮而東以楚泗廣陵為之表則京口秣陵得以蔽遮自淮而西以壽廬歷陽為之表則建康姑熟得以襟帶江西之鎮莫重於潯陽而舒蘄者潯陽之表也湖北之鎮莫重於武昌而齊安者實武昌之表也愚觀三國六朝之間爭戰攻守嘗從事於此矣恨其未知所以用之也吳氏自孫䇿駐足江東而於淮之地則有廬江之守故魏氏雖竊取中土而不能以得吳世率以為守淮之利足以蔽長江也而不知用淮之利以圖進取此吳氏之失也劉宋自劉裕立國於建鄴而於淮之地則有盱眙之蔽故元魏雖有虎視之意而終不能以窺宋世率以為守淮之利足以蔽長江而不知用淮之利以爭中原此劉宋之失也蕭梁自武帝立國於江左雖與元魏交爭於兩淮之間互有勝負而鍾離之守元英退縮斂袵而不敢爭世之議者又以為淮右之勢誠足以禦敵人之衝也而不知用淮以為恢拓之計則其所失殆與孫吳劉氏等耳愚考之孫權踵孫䇿之遺緒而旡爭衝攻取之才觀孫䇿晚嵗付囑之語止以自保之能許之而魯肅帷幄之謀亦止為保守江東之計故廬江之地吕蒙雖守之而合肥之後一為張遼所敗遂終身不敢以窺魏此長淮之地在吳而吳不能用也宋文帝紹劉裕之遺業雖有爭戰之意而旡規恢之大志觀王元謨之徒率師進取以經略中原而欲止圗河洛之地劉興祖徑取河北之䇿則置而不論故臧質盱眙之守僅免敗缺竟未足多而元嘉之政從是不振卒不能挫元魏虎狼之勢此長淮之地雖在劉宋而劉宋不能用也蕭梁自武帝創有基業初年英武似亦可嘉然自其既有天下之後志氣凋落無復囊括宇宙之志雖席鍾離天險之勢而略不能用險以挫北軍之鋒元澄之圍鍾離雖以失利而自退元英之圍鍾離雖以韋睿之救而自解不過僅僅自守耳此長淮之地在梁而梁不能用也今邊之東有淮隂盱眙西有鍾離蘄春西北有襄陽樊城自丹陽而抵廣陵自廣陵而抵淮隂自淮隂而抵盱眙此全淮之右臂也自采石而抵歷陽自歷陽而抵鍾離自鍾離而抵蘄春此全淮之左臂也自武昌齊安而逹信陽自江陵而至襄陽此漢沔之關梁也故淮隂盱眙之城固則自淮而東可以無患鍾離之城固則自淮以西可以獲全至於信陽樊城之壘全則漢沔以南無敵虞矣雖然豈特自固而已哉王羲之與殷浩書曰保淮之志非復所及莫若還守長江羲之勤告因長江以固大業此言是也至謂捨淮而守江豈不謬哉江淮襄陽巴蜀自京口而至秣陵控帶荆陽引輔江湖咫尺淮甸應接梁宋人皆知其為長江之險也自武昌而至於江陵東通吳㑹西運巴蜀南極湖襄北控關洛人皆知其為荆湖之險也自涪陵而極於成都土地險塞沃野千里控渝扼瀘聮接關隴人皆知其為巴蜀之險也然知有長江之勢而不知所以為守淮之計則非知江之險者也徒知有荆湖之勢而不知所以為襄漢之計則非知荆湖之險者也徒知有巴蜀之勢而不知所以為漢中之備則非知巴蜀之險者也蓋長淮所以為江浙之藩籬襄漢所以為荆湖之唇齒漢中又所以為巴蜀之門户陳宣帝失淮甸之地而致隋人之禍南唐罷把淺之師而啓周師之釁蓋棄淮而守江則江左亦難以自立矣吳人不得襄陽杜預得以成江陵之捷苻秦㑹師沔北而朱序必欲以嚴城中之守蓋棄襄陽而守荆湖則荆湖必不能以自固矣曹操既破漢中故蜀人皆無自固之志姜維退保漢樂二城故鍾㑹如履無人之墟蓋棄漢中則巴蜀必不能自存矣惟守江以為家户備淮以為藩籬則長江之險可得而保也以荆湖為重鎮以襄陽為唇齒則荆湖之險可得而固也以巴蜀為要害以漢中有門户則巴蜀之險可得而有也昔東晋守合肥壽陽以為重地故劉石終不能踰淮以圗晋陶侃使元宣以鎮襄陽故趙人不能越漢沔以取荆蜀以魏延鎮漢中故魏人不能踰南鄭以謀蜀合歷代之得失而並觀之則荆襄江淮蜀漢之相為用其效可觀矣昔祖逖自淮隂進兵以復河南到彥之自淮入泗以平司兖則在淮之形勢為可用也元溫自江陵以趍霸上柳元景自襄陽以克潼關則在荆襄之形勢為可用也漢髙祖自南鄭以克三秦諸葛孔明自漢中以震關隴則漢中之形勢為可用也為今之計自淮泗以搗青徐自壽春以收汝潁取財於蜀合軍於陜以遏河隴出師襄陽因糧唐鄧以趨京洛則天下之大勢一矣夏口今鄂州三江口江夏縣是也山陽楚州歸州建平瓜洲襄陽樊城雍州襄嶽州巴陵巴邱泗口今淮陽宿遷縣濠州即鍾離信陽軍近淮河源又之義陽江都豫章隆興漢樂蜀二地城也東京梁地南京宋西京洛陽本朝山陵所在司西京之地兖東京之地太原河東路樊口在今鄂州武昌縣東當陽今荆門軍當陽縣羣書考索卷五十八
