body:
  text: 羣書考索卷四十三宋章如愚撰禮器門后服類總論三禮圖云內司服掌王后之六服褘衣揄狄闕狄鞠衣展衣緣衣此上六服皆以素紗為裏使之張顯但婦人之服不殊裳上下連則此素紗亦上下連也王之吉服有九韋辨皮辨玄端三等裳服與后鞠衣已下三服同但王祭服有六后祭服唯有三翟耳何者天地山川社稷之等后夫人皆不與故三服而已內宰云祭祀祼獻則贊之天地無祼唯宗廟有裸故知后於外神不與以其婦人無外事故也闕狄赤揄狄靑褘衣玄鞠衣黃展衣白褖衣黑以五行之色從下而上以次推之水色黑褖衣象之黑矣水生於金金色白褖衣上有袒衣袒衣象之黑矣金生於土土色黃鞠衣象之黃矣土生於火火色赤鞠衣上有闕翟象之赤矣火生於木木色靑闕翟上有揄狄象之青矣五行之色已盡六色惟有天色玄褘衣最在上象天色玄是自下推次其色然也三翟唯褘言衣者以褘衣是六服之首故以衣目之也禮象圖云翬素質義也揄靑質仁也五色皆備成章禮也闕翟一名屈狄言其屈於二狄鞠衣禮也展衣信也鞠衣黃言禮而以信為質展衣赤言信以禮為文記曰忠信之人可以學禮故古人制禮具義蓋如此也狄衣謂之象服言猶卦之有象其義隱故也禒衣謂之禒衣猶卦之有彖其義顯故也亦或謂之稅衣闕翟言其取象闕稅衣言其取數寡蓋稅十而取一亦或二十而取一或稅又為衣彼曰稅之稅以寡取義故也又為小功不稅之稅以輕取義故也上公衮冕則妻副褘記曰君衮冕立于阼夫人副褘立于東房是也侯伯鷩冕則妻揄翟記曰王后褘衣夫人揄翟是也王之三公同子男毳冕則妻屈狄記曰君命屈狄是也王之卿同其夫希冕則妻自鞠衣而下天子之大夫是也公之孤同其夫玄冕則妻自展衣而下天子之上士是也公之卿大夫同其夫爵辨則妻自褖衣而下小國之大夫是也其夫朝服也則妻自霄衣而下小國之士是也毳衣如菼刺大夫之詩也大夫希冕今曰毳衣則上大夫卿也卿服毳冕則三公宜服鷩冕先儒謂服毳冕誤矣王制曰三公一命衮明服鷩冕也王以衮冕祭若后與焉則服翬衣王以鷩冕祭若后與焉則服揄狄王以絺冕祭若后與焉則服鞠衣若王玄冕祭而后與焉則以展衣從若王皮辨而后與焉則以禒衣從禒衣皮辨之匹也霄衣朝服玄端之匹也諸侯以朝服視朝故夫人以纚笄而朝則天子皮辨視朝后冝以禒衣朝王后禒衣以朝王則其御于王也以霄衣矣朝服以朝制名霄衣以霄制名其義可考而知也鄭氏謂祭羣小祀則服闕翟展衣以禮見王禒衣御于王之服皆非是后以禒衣朝王則其見舅姑見賓客亦以禒衣案內則曰婦事舅姑如事父母雞初鳴咸盥潄櫛縱笄總衣紳則王后以朝其夫之服其見舅姑可知檀弓曰婦人不飾不敢見舅姑將有四方之賓來褻衣何為陳於斯則王后以朝舅姑之服見其賓客可知陳禮書曰九者陽之窮故王之吉服九六者隂之中故后之吉服六王之服九而祭服六后之服六而祭服三以婦人不與天地山川社稷之祭故也王之服衣裳之色異后之服連衣裳而其色同以婦之德本末純一故也王之服單而無裏后之服裏而不單以陽成於奇隂成於耦故也翬素質也素質義也揄青質也靑質仁也五色皆備成章禮也有仁義以為質有禮以為文后之德如此而已地有義故褘衣為上揄狄次之闕狄或謂之屈則其制屈於褕褘而已三翟蓋皆畫之於衣如王冕服崔靈恩謂王后三翟數皆十二王者之後諸侯夫人三公而下夫人雉數如命數於理或然褘衣三禮圖云褘衣翬雉名也其色玄後鄭以為素質五彩刻繒為翬雉之形五色畫之綴衣上后從王祭先王則服之上公二王後魯夫人助君祭宗廟皆服之首飾亦副其舄則以玄凡舄與裳同色者此與衣同色者以婦人尚專一德無所兼故連衣裳不異其色故鄭注屨人云玄舄為上褘衣之舄也陳禮書云褘衣后祭先王之服也上公如王之服則上公之夫人如后之服禮記言夫人副褘是也魯非上公以尊其服者以周公之後故也揄翟三禮圖云後鄭讀揄狄為搖翟雉名靑質五采故刻繒為揄狄之形而五采畫之綴於衣上以為文章然則揄翟之衣其色青后從王祭先公則服之首飾以副侯伯夫人助君祭宗廟亦服之首飾亦副陳禮書云揄祭先公之服也玉藻曰夫人揄翟雜記曰復夫人稅衣揄狄蓋三夫人三公之妻及侯伯之夫人皆揄翟也王姬嫁於諸侯車服下王后一等亦揄狄特雉數與三公之妻侯伯之夫人異耳闕狄一曰屈狄三禮圖云按褘揄二翟皆刻繒為雉形又以五色畫之綴於衣亦刻繒為雉形依此五色畫之故云闕翟其衣色赤但刻赤色之繒為雉形間以文綴於衣上首飾如之其子男夫人從君祭宗廟亦皆服之陳禮書曰闕狄后祭羣小祀之服玉藻曰君命屈狄喪大記曰復夫人以屈狄皆子男夫人也鄭賈之徒謂褖衣黑而象水水生於金故展衣白金生於土故鞠衣黃土生於火故闕翟赤火生於木故揄狄靑五色之上則玄而已故褘衣玄祭先王服褘衣祭先公服揄翟祭羣小祀服闕狄蠶則服鞠衣以禮見王及賓客服展衣燕居及御于王則服褖衣於理或然謂二翟刻繒畫之綴於衣闕翟刻之而不畫其説無據禮象圖云王之三公八命則其妻自揄狄而下如后之服其卿六命則其妻自闕翟而下如夫人之服蓋褘衣視衮冕揄狄視鷩冕闕狄視毳冕故也鞠衣三禮圖云鞠衣者后告桑之服也按後鄭云鞠衣黃桑之服色如鞠塵象桑葉始生月令三月薦鞠衣于先帝告桑事又彼注云先帝太昊之屬也以其蠶功既大總祭五方帝于眀堂故云之屬以該之云象桑葉始生者以其桑葉始生則養蠶故服色象之其首服用編後鄭云謂編列髮為之其遺象若今假紒矣其屨以黃若三翟之用舄屨之與舄其制大同惟襌底為異耳屨人注云復下曰舄襌下曰屨陳禮書曰月令季春天子乃薦鞠衣于先帝蓋薦之於祀告將服之以桑也孔穎達曰薦鞠衣者薦之於神座以求福祥也內司服辨內外命婦之服鞠衣展衣緣衣玉藻曰再命鞠衣鄭氏曰內命婦之服鞠衣九嬪也展衣世婦也緣衣女御也外命婦其夫孤也則服鞠衣其夫卿大夫也則服展衣其夫士也則服緣衣然鞠衣必以黃者蓋黃隂之盛也蠶而服之以其帥內外命婦而蠶使天下之嬪婦取中焉后事之盛也展衣三禮圖曰展衣色白后以禮見王及賓客之服首服亦編其屨以白後鄭云展當為袒袒之言亶也亶誠也此亦卿大夫之妻從夫助君祭宗廟得服之按祭義曰君牽牲夫人奠盎君獻尸夫人薦豆大夫從君命婦從夫人是也陳禮書曰展衣后見王及賔客服之然則內外命婦之鞠衣展衣緣衣則其助祭之服歟詩曰其之翟也而繼之以胡然而帝則德當神眀可知矣曰其之展也而繼之以展如之人邦之媛也則行之配君子可知矣白者隂之純色見王及賔客服之以其見王及賓客無事乎飾一於誠焉后德之懿也褖衣三禮圖云褖衣色黑后接御見王之時則服之首飾以次追師注云次者次第髮長短為之所謂髮髢也其屨以黑士妻從夫助祭亦服之婦人緣衣之黑始因男子之玄端亦名褖衣按士冠禮陳服于房爵辨服皮辨服玄端服士喪禮陳襲事于房亦云爵辨服皮辨服褖衣當玄端處所以變言之者冠時玄端衣裳别及死而襲玄端連衣裳與婦人褖衣同故雖用子玄端亦名禒衣也子羔襲用褖衣纁􅀈褖衣纁􅀈是婦人嫁時之服亦非裳衣也今子羔襲之故譏用婦服但纁􅀈與玄衣相對之物則男子褖衣黑矣男子褖衣既黑則婦人褖衣黑可知矣禮象圖曰褖衣一曰稅衣一曰褖衣士喪禮曰爵辨服純衣皮辨服褖衣據此褖衣白矣男子皮辨白則是亦白也然則翬衣玄揄狄闕狄皆靑鞠衣黃展衣白玄北方也青次之赤次之白又次之鞠衣以黃在中也王之大夫四命希冕其妻鞠衣上士三命玄冕其妻展衣中士再命爵辨其妻展衣下士一命皮辨其妻褖衣蓋鞠衣視希冕展衣視玄冕爵辨褖衣視皮辨公之孤四命希冕其妻鞠衣雜記曰內子鞠衣是也其卿三命其大夫再命皆玄冕其妻展衣喪大記曰大夫以玄頳世婦以袒衣是也其士一命無爵辨自皮辨以下其妻褖衣若子男之大夫一命無玄冕自爵辨而下其妻袒衣其士不命無皮辨自朝服而下其妻霄衣禮記曰大夫冕而祭於公辨而祭於己士辨而祭於公冠而祭於己然則大夫辨而祭於己惟一命之大夫士冠而祭於已惟不命之士爾少牢禮主人朝服主婦被裼衣侈袂特牲禮主人冠玄端主婦纚笄霄衣是也內司服曰辨內外命婦之服鞠衣展衣褖衣素紗蓋內命婦鞠衣九嬪也展衣世婦也褖衣女御也闕狄三夫人也三夫人猶三公之於王坐而論婦禮無官職今三公之妻服揄翟而三夫人反服屈狄何也蓋先王建官內命婦皆下外朝之臣一等故其爵三夫人視卿九嬪視大夫世婦視上士女御視中士下士玉藻曰君命屈狄再命褘衣一命袒衣士褖衣此言士妻褖衣若加一命則服袒衣故曰一命袒衣士褖衣初命為君其妻屈狄若加一命其夫為侯伯也則服揄翟又加一命其夫上公則服褘衣故曰君命屈狄再命褘衣鄭氏謂褘當為鞠誤矣陳禮書曰內司服言緣衣玉藻言褖衣喪禮襲服亦言褖衣雜記喪大記之復服言稅衣則緣褖稅同實而異名也緣衣御于王之服亦以燕居男子褖衣黑是亦黑也其緣亦以纁黑者隂之正色纁者隂之上達緣則循緣之而已燕居御于王服之以其體貴至正而上達為循緣故也此后行之盛也玉藻所謂夫人揄翟君命屈狄鞠衣袒衣士褖衣者周官司服辨內外命婦之服鞠衣展衣褖衣鄭氏以為內命婦之服鞠衣九嬪也展衣世婦也緣衣女御也外命婦者其夫孤也則鞠衣卿大夫也則展衣士也則褖衣三夫人及公之妻其闕翟以下乎侯伯之夫人揄狄子男之夫人亦闕狄惟二王後褘衣然記言士褖衣則明婦命視夫也言君命則明再命一命非女君也蓋子男之夫人屈狄侯伯之夫人揄狄公之夫人褘衣記稱夫人副褘是公之夫人也再命鞠衣則上至於四命可知也鄭氏謂侯伯之夫人揄翟子男之夫人屈狄孤鞠衣卿大夫展衣士褖衣而改褘為鞠其説是也謂三夫人及公闕狄誤矣王制言三公一命衮則三公在朝鷩冕其妻揄狄可也玉藻云夫人揄狄是可知也公之夫人褘衣而明堂位言魯夫人副褘者魯侯得用衮則夫人副褘可知也后之服褘衣揄狄闕狄鞠衣展衣緣衣后三狄雉皆以八十二為數王夫人之服王夫人服有二等有后則夫人服闕狄以下服以倣三公夫人以明其屈也無后則服揄狄以下以效侯伯夫人亦得伸也雉數皆以八九嬪之服九嬪服鞠衣以從后助祭享諸侯採桑之事服展衣從后見賓客服椽衣以進御亦以從后祀事世婦之服世婦服展衣以從后助祭享諸侯采桑以從后見賔客服褖衣以進御女御之服女御八十一人皆服褖衣以從后助祭享諸侯見賔客進御于王也三公夫人之服三公夫人揄狄以下或云闕狄以下其夫服毳冕故夫人服闕狄所以眀其屈也狄雉之數依夫人之命數刻以八雉王之孤之妻服孤之妻自鞠衣而下鞠衣則服以從后助祭享諸侯採桑展衣則服以朝后見賔客褖衣則服以詣后論事也王之卿大夫之妻服卿大夫之妻自展衣而下展衣則以從后助祭享諸侯采桑朝后見賔客緣衣則服以詣后論事也王之士之妻服士之妻則服褖衣而已以從后祭器事至謁后論事皆服之孤卿大夫士之妻再命以上始得受服一命者自為之二王後與二伯夫人服二王後夫人當褘衣三公有功加命服衮冕夫人亦得服褘衣以下三狄皆畫九雉依夫之命數也魯以周公之故得用褘衣但畫九雉所以與王后異侯伯之夫人服侯伯夫人之服自揄翟而下皆畫七雉八命作牧者亦依夫命而畫八雉但不得進服蓋州牧雖得加命其服乃從夫命故夫人不得進服也子男夫人服子男夫人則服闕狄而下不畫特刻五雉而已若子男有六命作州牧者亦依夫命刻六雉但不得進服其義與州牧同也諸侯媵御服古者諸侯一娶九女二媵三姪三娣自夫人以下分為三等二媵之服自鞠衣以下三姪之服自展衣以下三娣之服自褖衣以下也諸侯之孤卿之妻服上公之孤侯伯子男之卿之妻則鞠衣以下諸侯之大夫之妻服上公之卿大夫侯伯子男之大夫之妻則服展衣以下諸侯士之妻服上公侯伯之士之妻則服褖衣以下其中若卿大夫有再命者其妻皆受公服其一命以下其妻之服皆私造之其制與公服無異但不受之於君耳東漢后服太皇太后皇太后入廟服紺上皂下蠶靑上縹下皆深衣制隱領袖緣以絛翦氂蔮簪珥珥耳璫重珠也簪以玳瑁為擲長一尺端為華勝上為鳯皇爵以翡翠為毛羽下有白珠垂黃金鑷左右一橫簪之以安蔮結諸簪珥皆同制其擲有等級焉皇后謁廟服紺上皂下蠶青上縹下皆深衣制隱領袖緣以絛假簪步搖簪珥步搖以黃金為山題貫白珠為桂枝相繆一爵九華熊虎赤羆天鹿辟邪南山豐大特六獸詩所謂副笄六珈者諸爵獸皆以翡翠為毛羽金題白珠璫繞以翡翠為華云貴人助蠶服純縹上下深衣制大手結墨玳瑁又加簪珥長公主見會衣服加步搖公主大手結皆有簪珥衣服如制自公主封君以上皆𢃄綬以采組為緄𢃄各如其綬色黃金辟邪首為𢃄鐍飾以白珠公卿列侯中二千石上一千石夫人紺繒蔮黃金龍首銜白珠魚須擲長一尺為簪珥入廟佐祭者絹紗上下助蠶者縹絹上下皆深衣制緣自二千石夫人以上至皇后皆以蠶衣為朝服公主貴人妃以上嫁娶得服錦綺羅縠繒采十二色重緣袍特進列侯以上錦繒采十二色六百石以上重練采九色禁丹紫紺三百石以上五色采青絳黃紅緑二百石以上四采青黃紅緑貴人緗縹而已公列侯以下皆單緣襈制文繡為祭服自皇后以下皆不得服諸古麗圭襂閨緣加上之服建武永平禁絶之建初永元又復申重於是世莫能有制其裁者乃遂絶矣晉后服皇后謁廟其服皂上皂下親蠶則青上縹下皆深衣制隱領袖緣以絛首飾則假髻步搖俗謂之珠松是也簪珥步搖以黃金為山題貫白珠為枝相繆八爵九華熊獸赤羆天鹿辟邪南山豐大特六獸諸爵獸皆以翡翠為毛羽金題白珠璫繞以翡翠為華元康六年詔曰魏以來皇后蠶服皆以文繡非古義也今宜純服青以為永制貴人夫人貴嬪是為三夫人皆金章紫綬章文曰貴人夫人貴嬪之章佩于置玉淑妃淑媛淑儀修華修容修儀媫妤容華充華是為九嬪銀印青綬佩采瓄玉貴人貴嬪夫人助蠶服純縹為上與下皆深衣制太平髻七鈿蔽髻黑玳瑁又加簪珥九嬪及公主夫人五鈿世婦三鈿助蠶之義自古而然矣皇太子妃金璽龜鈕纁朱綬佩瑜玉諸王大妃妃諸長公主主封君金印紫綬佩山玄玉長公主公主見會太平髻七鈿蔽髻其長公主得有步搖皆有簪珥衣服同制自公主封君以上皆𢃄綬以綵組為緄𢃄各如其綬色金辟邪首為𢃄玦郡公侯縣公侯太夫人夫人銀印青綬佩水蒼玉其特加乃金紫公特進侯卿校世婦中二千石二千石夫人紺繒幗黃金龍首銜白珠魚須擲長一尺為簪簪珥入廟佐祭者皂絹上下助蠶者縹絹上下皆深衣制緣白二千石夫人以上至皇后皆以蠶衣為朝服唐后服禕衣者受册助祭朝會大事之服也深青織成為之畫翬赤質五色十二等素紗中單黼領朱羅縠褾襈蔽膝隨裳色以緅領為緣用翟為章三等青衣革帶大帶隨衣色裨紐約佩綬如天子青襪舄加金飾鞠衣者親蠶之服也黃羅為之不畫蔽膝大帶革帶舄隨衣色餘同褘衣鈿叉袒衣者燕見賔客之服也十一鈿服用雜色而不畫加雙佩小綬去舄加履首飾大小華十二樹以象衮冕之旒又有兩博鬢婦人服從夫子五等以上親及五品以上母妻服紫衣腰襻褾緣用錦繡九品以上母妻服朱衣流外及庶人不服綾羅縠五色線鞾履凡襴色衣不過十二破渾色衣不過六破婦人施羃㒿以蔽身永徽中始用帷冒施裙及頸坐襜以代乘車命婦朝謁則以駝駕車數下詔禁而不止武后時帷冒益盛中宗后乃無復羃㒿矣宮人從駕皆胡冒乘馬海內效之至露髻馳騁而帷冒亦廢有衣男子衣而鞾如奚契丹之服武德間婦人曳履及線鞾開元中初有線鞋侍兒則著履奴婢服襴衫而士女衣胡服其後安祿山反當時以為服妖之應巴蜀婦人出入有兜籠乾元初蕃將又以兜籠易負遂以代車文宗即位以四方車服僭奢下詔凖儀令品秩􅈴勞為等級婦人裙不過五幅曳地不過三寸襦袖不過一尺五寸袍襖之制三品以上服綾以鶻銜瑞草鴈銜綬𢃄及雙孔雀四品五品服綾以地黃交枝六品以下服綾小窠無文隔織獨織本朝皇后之服唐制三等一曰褘衣朝會服之二曰鞠衣親蠶服之三曰禮衣宴見服之國朝存其名常服龍鳯珠翠冠霞帔天聖二年修製皇太后服按隋制后服四等其四曰朱衣以緋羅為之宴見賔客則服今參詳每遇朝謁聖容往還於輦中服此朱衣如常服視事亦服之明道元年又詔定皇太后恭謝天地禮服禮院言請準皇帝衮服減二章衣去宗彛裳去藻前後垂珠翠二十旒以衮衣為名詔冠名儀天舄屨類王之吉服九而舄三冕服赤舄黑絇繶純皮辨服白舄青絇繶純冠辨服黑舄赤絇繶純后之吉服六而舄屨各三褘衣玄舄黃絇繶純揄狄青舄白絇繶純禮象圖云屨人掌王及后之服屨為赤舄黑舄赤繶黃繶青絇此言王六冕后三翟之舄也蓋六冕皆赤舄赤繶青絇三翟皆黑舄黃繶青絇屨順裳色冕服纁裳故其舄赤褘翟玄裳故其舄黑揄翟闕翟皆連青裳而舄皆黑者猶裘順衣色君子狐青裘玄綃衣以裼之也赤繶以純為貴黑舄黃繶從繪次也鄭氏謂凡舄之飾如繢次凡屨之飾如繡次蓋僅得之矣若以為赤繶黃繶青絇雜玄言之非是蓋周之法不如是之大迂也士冠禮曰玄端黑屨青絇繶純素積白屨緇絇繶純爵辨纁屨黑絇繶純據此玄端素積從繡次爵辨從繢次鄭氏謂爵辨從繢次尊祭服也然則凡屨舄之飾以純為上繢次次之繡次又次之爵辨而下絇繶純皆一冕翟更異豈欲異冕翟之故歟然則爵辨素積玄端推之鞠衣蓋黃屨黑絇繶純展衣蓋纁履黃絇繶純褖衣蓋白屨緇絇繶純士冠禮曰屨夏用葛冬用皮屨可也言冬皮屨可則以素屨為正所謂素屨葛屨是也皮屨素而已命夫命婦之命屨命夫之命屨則纁屨也大夫以上衣冠則有命舄無命屨命屨中惟有士爵辨纁屨而已命婦之命屨則黃屨以下也以其外命婦孤妻以下內命婦九嬪以下不得服舄皆自鞠衣以下故用黃屨也其卿大夫妻及二十七世婦則皆以展衣白屨為命屨主妻及女御則皆以褖衣黑屨為命屨也命夫命婦之功屨功屨次命屨於孤卿大夫則白屨黑屨也案司服孤希冕卿大夫玄冕皆以赤舄為命舄以下仍有韋辨命夫冠辨黑屨故云次命屨命屨闕狄赤舄黑絇繶純鞠衣黃屨白絇繶純展衣白屨黑絇繶純褖衣黑屨青絇繶純三禮圖屨人掌王及后之服屨為赤舄黑舄赤繶黃繶青絇注云復下曰舄禪下曰屨舄屨有絇有繶有純者飾也賈釋云下為底也復下重底也重底者名曰舄單底者名曰屨繶謂玄底相接之縫綴絛於其中絇謂屨頭以修為鼻絇拘也取拘持為行戒使人低目不妄視純謂以絛為緣屨舄各象裳色王舄有三冕服則赤舄韋辨皮辨則白舄冠辨之服則黑舄王后亦三舄玄舄配褘衣青舄配揄翟赤舄配闕翟鞠衣以下皆屨也凡舄之飾如繢次玄舄黃絇繶純者玄黃天地色相對為繢次之飾也赤絇繶純者王黑舄之飾赤黑南北方相對亦繢次之飾也黑絇繶純者王赤舄之飾青絇繶純者王白舄之飾青白東西方相對亦繢次之飾也后之赤舄亦黑飾后之青舄亦白飾也若然則爵辨纁絇黑絇繶純黑與纁南北相對用繢次為屨飾者蓋尊祭服之屨故飾從對方色也凡屨之飾如繡次此絇皮辨白屨黑絇繶純為飾白與黑西北相對為繡次之飾又后黃屨白絇繶純白屨黑絇繶純此三者鞠衣以下之屨也然則屨舄王有三等后有六等上公以下夫人得服褘衣者亦赤舄也陳禮書曰凡舄之飾如繢之次凡屨之飾如繡之次玄黃青白赤黑對方者為繢次青赤赤白白黑黑青比方者為繡次詳已見三禮圖屨人言舄止於黑舄言繶止於赤黃言絇止於青有素屨而無飾屨有葛屨而無皮屨鄭氏謂雜互反覆以見理之固然也據婦人而言其實孤卿大夫身則功屨女命舄也九嬪亦以白屨黑屨為功屨內子亦然蓋九嬪與孤妻內子既以黃屨為命屨功屨之中有袒衣白屨黃衣黑屨也世婦則以黑屨為功屨世婦之命屨既以袒衣白屨矣其功屨唯有褖衣黑屨也女御士妻則唯有褖衣黑屨為命屨而已此士妻謂再命受服者方得有此屨如王之中士以上是也若侯伯之士一命子男之士不命及王之下士皆受職而不受服故其妻亦不得有命屨也佩類佩周官王府掌共王之佩玉詩木瓜曰報之以瓊琚丘中有麻曰貽我佩玖玉名次玉女曰雞鳴曰雜佩以贈之渭陽曰瓊瑰玉佩采芑曰有瑲蔥珩大東曰鞙鞙佩璲公劉曰何以舟之維玉及瑶玉藻曰將適公所既服習容觀玉聲乃出揖私朝輝如也古之君子必佩玉右徴角左宮羽君在不佩玉齊則綪結佩而爵鞸凡𢃄必有佩玉謂天子以至士佩玉有衝牙正義曰佩玉必上係於衝下垂三道穿以蠙珠下端前後以縣於璜中央下端縣以衝牙動則衝牙前後觸璜而為聲玉形似牙故曰衝牙天子佩白玉而玄組綬公侯佩山玄玉而朱組綬大夫佩水蒼玉而純組綬世子佩瑜玉而綦組綬士佩瓀玫而縕組綬鄭注云玉有山玄水蒼者視之文色所似也綬者所以貫佩玉相承受者也純當為緇正義曰玉色似山玄而雜有文以承之蒼而雜有文故曰文色所以尊者玉色純公侯以下玉色漸雜而世子及士唯論玉質不眀玉色不定也瑜是玉之美者故世子佩之瓀玫石次玉者賤故士佩之一命緼韍幽衡再命赤韍幽衡三命赤韍蔥衡古之君子必佩玉其制上有折衡下有雙璜中有琚瑀下有衝牙貫之以組綬納之以蠙珠而其色有白蒼赤之辨其聲有角徵宮羽之應其象有仁智禮樂忠信道德之備或結或垂所以著屈伸之理或設或否所以通文質之儀此所以純固之德不內遷非僻之心無自入也蓋衡以平其心璜以中其德琚欲其有所安牙欲其有所制右徴角所以象事與民左宮羽所以象君與物趨以采齊行以肆夏所以比於樂周旋中規折旋中矩所以比於禮進則揖之於前退則揚之於後則佩之為物奚適而非道耶蓋民為貴君為輕事為先物為後能治民然後能安君能應事然後能生物此所以事與民在所右而物與君在所左也春秋傳曰改步改玉則自天子至士步固不同而玉亦隨異古者有德佩有事佩德佩則左右皆玉事佩則左紛帨右決捍之類左佩皆五右佩皆六以左陽而奇右隂而耦故也左佩者小右佩者大以左手不如右強故也先設事佩次加德佩以德成而上故也詩言佩觿韘乃言容兮遂兮是先設事佩後設德佩也內則左佩金燧右佩木燧鄭康成謂夫遂隅遂也鑑鏡屬世謂之方諸內則以夫遂為金遂也莊子曰木與木相摩則然文中子曰木中有火不鑽不發故四時變國火者春取榆栁夏取棗杏季夏取桑柘秋取柞楢冬取槐檀而木燧取火陳禮書玉府職曰共王之佩玉注云佩玉玉之所帶者玉藻曰天子佩白玉而玄組綬謂衡璜琚瑀也玄組綬者用玄組縧穿連衡璜等使相承韓詩外傳曰佩玉上有蔥衡者衡橫也謂蔥為橫梁下有雙璜衡者謂之組懸於衡之兩頭兩組之末皆有半璧之璜故曰雙璜又以一組懸於衡之中央於末用玉其狀如牙使前後突雙璜故曰衝牙毛傳云琚璜之外别有琚瑀其琚瑀當置於縣衝牙組之中央又以二組穿於琚衡之內角斜係於衡之兩頭於組末係於璜蠙珠以納其間蠙蚌也珠出於蚌故言蠙珠納於其間者組繩有五皆穿蠙珠於其間故云也琚佩首也瑀佩腰也所以納間故曰琚瑀所以納間上懸衡上下使自相觸左佩雙衡宜皆中宮雙璜宜皆中羽右佩雙衡中徵雙璜中角不如是則衡璜厚薄小大不能相類故曰右徵角左宮羽詩曰有瑲蔥珩則珩相觸以為聲者也今舊圖以衡為佩首下文止有雙璜衝牙不惟於詩有瑲蔥珩為害又於右徵角左宮羽之言不通蠙珠以玉為珠蓋若蛙蠙之珠貫於間斷處也琚瑀所以納蠙珠之斷處而蠙珠以其斷處納於琚瑀琚瑀所以納間又有蠙珠以納其間采就類按聘禮記云朝天子圭與繅皆九寸繅三采六等朱白蒼是也既重云朱白蒼是一采為二等相間而為六等也若五等諸侯皆一采為一就典瑞云公侯伯皆三采三就一采為一就故三采三就其實采别二就三采則六等也典瑞云子男皆二采再就一采謂朱緑也二采故二就其實采别二就則四等也典瑞又云瑑圭璋璧琮繅皆二采一就以俯聘此謂卿大夫每采惟一等是二采共一就也與諸侯不同其天子則典瑞云繅五采五就亦一采為一就五采故五就其實采别二就五采則十等也禮記正義帶類大戴禮曰黃帝黼黻衣大帶詩曰其帶伊絲又曰垂帶而厲荀子曰逢衣淺帶淺帶博帶雋不疑傳曰褒衣博𢃄玉藻曰天子素帶朱裏終辟諸侯而素帶終辟大夫素帶辟垂士練帶率下辟居士錦帶弟子縞帶并紐約用組雜帶君朱緑大夫玄華士緇辟二寸再繚四寸凡𢃄有率無針功深衣曰帶下毋厭髀上毋厭脅當無骨者左傳曰樂桓子請帶於季武子武子召使者裂裳帛與之曰𢃄其褊矣昭元年天子至士帶皆全帛為之或以素或以練或終辟或辟垂或辟下其飾或朱緑或玄華古者革帶大帶皆謂之鞶內則所謂男鞶革𢃄也春秋傳所謂鞶厲大帶也左傳曰鞶厲遊纓昭其數也佩魚類佩魚之制自雍熙元年南郊畢內出魚袋以賜近臣由是內外升朝文武官皆佩魚服紫者飾以金緋者飾以銀舊制借服無佩醫官其職雖高亦不佩以别賢否也政和初因王昭上言於是借服及醫官隨服色佩魚矣贄儀類書曰三帛二生一死贄大宗伯曰以禽作六贄以等諸臣孤執皮帛古者制幣其長丈有八尺其色或素玄纁卿執羔大夫執鴈曲禮曰飾羔鴈者以繪上相禮下大夫相見以鴈飾之以布維之以素士執雉庶人執鶩工商執雞禮記曰凡贄天子鬯諸侯圭野外軍中無贄左傳曰男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗修以告虔也孟子曰出疆必載質又曰庶人不傳贄為臣則不敢見諸侯荀卿稱周公曰吾所執贄而見者十人還贄而相見者三十人儀禮士於士無辭贄有還贄大夫於士無還贄終辭贄君於其臣則受之於外臣則使儐還之大夫於嘗為臣者亦然魯侯會晉師于瓦范宣子執羔趙簡子中行文子皆執鴈魯於是始尚羔蓋魯禮之失至此乃復正也呂氏春秋言得伍員者位執圭漢之曹參始封執帛後遷執圭陳實父子同時旌命羔鴈成羣魏司空征南將軍與卿校同執羔明帝詔之以執璧則先王贄禮沿歷漢魏其大略尚存也曲禮曰野外軍中無贄以纓拾矢可也則拾亦可以為贄歟羣書考索卷四十三
