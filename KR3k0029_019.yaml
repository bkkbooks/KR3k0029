body:
  text: 羣書考索卷十九宋章如愚撰類書門歴代類書類新書新書漢陸賈作也髙帝時賈説稱詩書帝罵之曰乃公居馬上得之安事詩書賈曰馬上得之寜可以馬上治乎湯武逆取而順守文武並用久長之術也帝慙謂賈曰試為我著秦所以失天下吾所以得之者及古成敗之國賈凡著十二篇每奏一篇帝未嘗不稱善稱其書曰新語本傳古今注晉太傅丞崔豹作也輿服第一都邑第二音樂第三鳥獸第四魚蟲第五草木第六雜注第七問答釋義第八文選梁昭明太子蕭統集子夏屈原宋玉李斯及漢迄梁文人才士所著詩賦騷經詔冊令教表書啓牋記檄難問議論序頌贊銘箴策碑志行状等為三十卷唐李善注析為六十卷善髙宗時人淹貫古今不能屬辭時號書簏所注博引經史釋事而忘其義其子邕嘗補益之與善注並行其後吕延祚等有集注仍三十卷初李善不釋述作之意故延祚與周翰等復為集注唐文皇朝姚鉉集唐人古賦樂章歌詩贊頌碑銘又論箴表傳録書序以類相從各分篇第門目西漢文類皇朝陶叔獻所撰也類次西漢書中詔命書疏奏記䇿對下説檄難詩箴頌賦贊序先是唐柳宗真為西漢文類其兄宗元叙之甚詳叔獻惜此書不見於世因論次為四十卷唐六典三十卷唐明皇撰李林甫等注列三公九卿三省三監東宫諸位官秩職員以凖周禮六官云藝文類聚一百卷唐歐陽詢撰按唐志令狐徳棻明趙洪智同修分門類事附見前世詩賦贊誦牋啓通典二百卷唐貞元十年杜佑撰以事分類載古今制度沿革廢置本末先是劉秩為政典五十五篇佑以為未盡因廣其缺參益新禮為二百篇佑自序曰理道之先在乎行教化教化之本在乎足衣食易稱聚人曰財洪範八政一曰食二曰貨管子曰倉廩足知禮節衣食足知榮辱夫子曰既富而教斯之謂矣夫行教化在乎設職官設職官在乎審官才審官才在乎精選舉制禮以端其俗立樂以和其心此先哲王政治之大方也故職官設然後禮樂興焉是以食貨為之首十二卷選舉次之六卷職官又次之二十二卷禮又次之百卷樂又次之七卷刑又次之大刑用甲兵十五卷其次五刑八卷州郡又次之十四卷邊防末之十六卷覽者庻㡬知篇第之㫖也通典序佑以通典繁蕪於二百卷中纂成十卷目曰理道要訣凡二十三篇皆有答問貞元中進序皇朝宋白等承詔撰續通典二百卷起唐至徳初訖周顯徳末以補杜佑通典之缺先是咸平中李沆奏請續修通典故以命白焉中興書目貞觀政要唐吳兢作也自序曰太宗政化良足可觀至垂世立教之美典謨諫奏之詞可以洪闡大猷者備加甄録於是掇集所聞參詳舊史撮其要㫖舉其洪綱詞兼質文義在懲勸人倫之紀備矣軍國之政存焉凡一帙十一卷合四十篇名曰貞觀政要曰君道曰政體曰任賢曰求諫曰納諫曰君臣鑒戒曰擇官曰封建曰太子諸王定分曰尊敬師傅曰教戒太子諸王曰規諫太子曰仁義曰忠義曰孝友曰公平曰誠信曰儉約曰謙遜曰仁惻曰謹所好曰謹言語曰杜讒邪曰悔過曰奢縱曰貪鄙曰崇儒學曰論文史曰論禮樂曰務農曰論刑法曰論赦令曰辨興亡曰論貢賦曰議征伐曰議安邊曰論行幸曰論田獵曰論災祥曰論謹終並政要羣書考索卷十九
