body:
  text: 羣書考索續集卷四十九宋章如愚編輿地門歷代晉元中興議者謂晉元雖中材之主要不失為唐肅代而安史亂唐肅代興於西北卒能復兩京夷大憝再造皇家不失舊物而劉石覆晉琅琊興於東南祖逖既死勳業頓隳僅能退守江左為自全計耳豈形勢失據地利之不齊邪臣切謂不然夫晉唐之君固無優劣而將有利鈍敵有堅脆所以不同也方安史作亂張真源守睢陽宋朝南京魯山南守南陽宋朝鄧州期年死戰不下賊故江淮克全中興實賴以濟李臨淮戰河北郭尚父戰河南奮鋭挺忠勝氣百倍而祿山思明君臣父子更相戕戮自取殱夷故肅代乘時奮功坐夷巨盜非力也時也劉石之禍則異然自邊釁四起百郡瓦裂卒無一城一壘能堅守挫敵以待王師者唯劉琨保并州不忘晉朝而收民無力臨戎失律汨汨不自振僅能當顔真卿輩徙倚河朔之間耳所謂李郭張魯之將無有也而劉石輔車再世姦雄氣吞九有又非安史崛強之比東南將帥既非其人而元帝有一祖逖不能用王敦投隙而奮遂嬰禍辱內難相仍鄰敵鼎盛而猶能保有東南宗社不絶是難能也且永嘉之際愍帝亦有為之主定都長安根本秦隴股肱三河而琅琊外屏東南首尾應援地利非不得也一時形勢與肅代之際何異而終於顛沛戮辱而後已則以遇敵之強而將帥失律故也借令琅琊復興西北是以肉飼虎口耳典午氏將無種矣而况肅代興於秦蜀而兼有吳楚元帝興自吳楚而併失秦蜀方開元承平之久東南户口最為蕃實安史之亂幸免寇掠當時兩浙諸州民户不下九千萬舉東晉所有不能及也考其國之虛實將之利鈍敵之堅脆其不侔也如此則其勳業有小大虧盈固其宜矣豈地利之不齊哉且以晉室衰微之際祖逖拔起於羣不逞中驟能收合餘燼擊楫奮忠將斗糧尺兵橫軋強敵不數載間俾黃河以南盡為晉土雖以石勒驍雄戰無留敵而終逖之任垂涎河濟之外不敢形南牧之志則勢之強弱顯在於人豈以東西南北為限哉逖之功所以不成則任之不専而年之不永耳向使晉室有幸能専逖之任而天假之年則劉石父子之間雖無安史之禍東晉所有之地雖無肅代之廣庸知不能成李郭興復之功乎南北紛爭論曰自晉元東渡訖於後周之亡南北血爭垂三百年其間北朝之兵屢得志於東南矣或卷甲而趍歷陽石季龍歷陽宋和州也或長驅而至瓜步魏主太武瓜步在宋真州六合縣界也或築行宫於新野元魏孝文新野唐之襄縣屬宋鄧州或駐大軍於秣陵北齊將蕭軌秣陵乃宋之建康府也或涉沅湘而阻於長沙周將賀若敦長沙乃宋之潭州也或渡江淮而守於石頭北齊將栁逹摩石頭城在宋建康府境內也其深入制勝非不鋭也南國之兵屢得志於西北矣或渡河而守黎陽晉將滕恬之黎陽宋衛州縣也或薄海而克廣固宋武帝廣固城在宋夀州益都縣西或遡渭而入長安宋將王鎮惡或踰關而至霸上晉將桓溫霸上在長安之東三十里也或四十七戰所向無前梁將陳慶之也或五十二城望風震服梁將夏侯亶也其深入制勝又非不鋭也加之有北土者八姓後漢劉氏後趙石氏前秦符氏後秦姚氏前燕後燕慕容氏魏拓跋氏北齊髙氏後周宇文氏也割裂紛爭有南朝者五代晉宋齊梁陳也亂亡踵迹劉石暴骨於關河符姚染血於淮渭慕容拓跋鬬鬩軒驁髙氏宇文禍亂如結是北土非無釁可乘也王敦蘇峻踵逆上遊孫恩盧循訌亂海嶺桓玄侯景荼毒江湖李特譙縱崛強巴蜀是南國非無釁可乘也然而北人終不能併南南人終不能併北是何耶蓋其不能圖萬全之舉好興常試之師方敵未有釁則速徼功利紛拏以逞重兵外宿齊民逺輸廟謨重勞帑藏益屈敵未告憊而吾已困矣逮夫幸際機會鄰壤繹騷嬴秦之鹿已奔卞莊之虎可刺用備不豫則無以應享坐視其斃而莫能乘矣間或幸而遇捷則敗不旋踵是以蕭宏舉南國之兵潰於洛口元英掃北方之衆沒於鍾離青泥之敗單騎而逃宋睢陽公劉義真吕梁之役匹馬無反陳將吳明徹彥之退舍宋將劉彥之資實蕩然魏武言還元魏大武帝僵尸闐積齊人如蝟皆為江浙之魚北齊十萬衆渡江不反堅卒若林盡作淮淝之鬼符堅百萬衆大敗於淝水其餘或焚舟而遁晉將桓溫或棄輜重而奔晉將商浩或大敗而還者魏將盧昶不可殫紀既軍敗於外國疲於內民愁盜起群雄乘之而社稷危矣是其急於成功乃所以速底敗亡也向使南北之君能於暇時息民休兵遵養時晦君宰優遊將士偃息元元雍熙咸遂其性莫不蓄鋭以待發銜恩而樂用而廟堂之謀靜觀逺照探敵人之情偽而慣識之必俟一旦釁隙洞開則赫然有作發將士素鋭之氣啓臣民樂用之心興湯后之雲霓仗武王之旄鉞入關下髙祖之令渡河布光武之恩以此赴敵何敵不摧以此吊民何民不服顧海宇之功豈難濟哉常觀三國之時吳魏爭衡淮漢之郊奔命不暇而數十年卒不能入寸土逮晉武受命講好息民邉境如畿輔南北之民各安其堵故能十餘年間一舉而平吳隋之平陳也亦然東晉之初力爭中原五十七戰之間未嘗不有事於西北而關河之功未始克集及其季年務敦鄰好北有南燕西有姚秦而數十年間恬不交兵西北之人不復以東南為虞故能數載之間一舉而克燕再舉而滅秦宋之興其混一宇內已亦由是道是其緩於取敵乃所以速集大勳也故曰天下皆知取之為取而不知與之為取帝王之道出於萬全可不戒哉梁亡嘗考前梁之亡其可怪者二前代皆以驕逸侈暴而敗梁武獨以憂勤慈儉而亡可怪一也始也興而治終焉亂而亡可怪二也議者以謂溺信釋流致精爽迷奪遂底滅亡非也惑於浮屠氏有紊典刑不過委靡而不競耳何致遽亡哉蓋其功以易成而患由忽至也傳曰常勝之將難與慮敵蓋將常勝則驕士常勝則易征伐四克則廟堂之謀輕於用兵是常勝之禍所以為禍也故從古王霸之興必履危踐險然後能成功如漢祖之創業光武之中興魏武之制勝劉宋之霸髙齊之強拓跋魏之盛宇文周之固皆因百戰艱危摧強敵而成大功良由憂勤益智慮而警畏成安強也若乃起兵以來幸不遇敵而擊自潰之師攻無備之城遂致所向莫前偃然有輕敵之心則是潮兵也勝則鋭進如潮之來而不可遏敗則驟退如潮之去而不能止茲為覆敗之端亡無日矣是以湣王制勝而齊國亂宋偃成功而商祀絶項羽轉戰無前而楚亡符堅征伐四克而秦滅是皆常勝之為禍也梁武之興幸會其時乘東昏頽弊遂基洪業適北朝大亂隆伯功取南國如反掌拓中原如拾遺師旅所經有征無戰一時功業之成幾亞宋武之盛而所以盛則易也當時不知成功之幸以為當然故偃然以孩稚待賁育而了無戒心侯景乘虛既濟江戰少衄則壯氣消及勤王之師三十萬環視數旅之賊莫敢誰何卒以敗亡蓋當時南國之兵未嘗遇敵故爾是故善用兵者毋畏敵人之勝要觀其所以勝毋憚敵國之強要觀其所以強敗焉思奮者是為勍敵勝而輕我者終為亡國伺其無前之隙可收不世之功能見小敵怯而大敵勇然後能無敵於天下秦隋速亡周室東遷夷夏紛拏餘六百年而天下併于秦十餘年而天下大亂秦遂以亡晉元南渡南北血爭垂三百年而天下併于隋二十餘年而天下大亂隋遂以亡傳曰飢者易為食渴者易為飲無聊之民不擇主而事方戰國南北之際斯民無聊甚矣反不安秦隋之政相率而為盜何耶蓋民各有心誰能安分不得已而嬰勞苦患難則無辭得已而不已則怨心生矣方戰國南北之際日尋干戈而斯民猶且安分者其意若曰吾君豈獲已矣是未必無恤我之心也時有不幸耳逮夫天下無事人皆有茍安之志少加勞役遽爾怨懟其意若曰吾君豈不獲已哉是終無恤我之心也父子夫婦生長亂離引領息肩于斯有年矣今幸際此而猶不免焉是無時不可已也由是無聊之心生相率為盜此秦隋之所以速亡歟噫天下厭亂聖人乘時斯民懷安姦雄投機為人上者可不畏哉漢唐疆域漢初胸奴鼎盛盡盜河南地白羊樓煩舉為虜庭去長安才七百里飛騎旦夕可至其邉防至隘也逮及世宗大攘胡越浮西河絶大幕封狼居山禪烏姑衍以臨瀚海盡奪隂山千里肥美之地胸奴王庭反為漢之內封又何其廣也唐初逺事西域列波斯以東為八十八州逺者去長安萬五千里計其道里之中建安西都護府調唐兵鎮守焉其邉防至廣也及天寶之亂吐蕃乘虛盡陷河隴地上邽以西皆為虜守去長安才八百里連年入寇遂陷京城輦轂之下無異邊徼又何其隘也雖曰人事有工拙夷夏有否泰是以天道好還虧盈之理自然至此也要之羌狄不能限漢民中國弗能疆異域神州雖盛毋勞北伐之師島夷雖強毋形南牧之志各保封疆自相蕃息非惟允叶於人事抑亦克承於天意矣南北形勢周室之衰秦晉齊楚擅天下相持五百年而秦滅楚漢室之亡天下三分相持六十年而晉平吳晉室之亂琅琊南渡繼為南北朝相持三百年而隋併陳周秦漢唐肇基皇業皆本陜西光武中興亦賴河北遂令古今議者有形勢優劣之辨讀賈生之過秦則夸言陜右誦杜牧之罪言則齒譽山東即宋朝河北西路河東路及燕雲地也而赫赫南夏無有稱焉寡見諛聞之士大抵雷同深以為不然夫欲觀古今盛衰之理者無徒驗其功業之已成考其興亡治亂之所由致良將不擇兵而戰循吏不擇民而治王霸之興豈擇地利而後制勝沃野不能起惰農髙資不能成格虜山河襟帶乂安能保亡國之君是以荆楚削弱王翦渡江髙齊荒蕩周師入鄴是善用關西者能以併南北也赫連崛強魏武克朔方孫皓淫虐王濬入金陵是善用河北者皆能以併西南也章邯輕敵項王渡河姚泓玩寇宋武入關是善用江南者皆能以併西北也魏太祖宋髙祖周武帝皆一代英雄故魏起河北周本關西宋興江南皆能奮自孤微赫然成伯業此則三方之地利皆可以興也商受暴虐黃河無固胡亥愚蒙秦關洞開叔寶荒淫長江失險此則三方之地利皆不足恃也項王殘鷙石季驍雄皆轉戰無前而斯民重困故項興東南石奮西北其亡一也蕭衍符堅皆一時令主乘時奮功然有雄志而無雄材一則強霸於南夏一則制勝於北朝其敗一也夫以孫皓淫虐叔寶荒淫固同符於桀紂矣使奄有萬國覆亡不暇何特於東南哉文王之謨武王之烈髙祖之神光武之聖唐太宗之英武此以天錫勇智俾表正萬邦者也一旅之衆一成之田亦足以王矣何特於西北哉彼東南之君唯宋武最稱英雄然究其威略基圖未可與始皇較優劣又何敢望文武髙光之清塵也無其人而無其功理之必然者也故知南北東西皆無地利興亡治亂舉在人謀尚何妄分優劣之有識者或謂西北之風渾東南之俗偷西北之人直東南之民詐西北之土沃東南之地瘠西北之士徑東南之兵嚻此形勢之所以異也是又不然彼各有所短長固不可一槩論也夫西北之風渾其失也悍東南之俗偷其得也和渾厚可與奮功悍突則難與圖治和易則易與樂成偷墮則難與慮始故由古以來南北紛爭則西北以強勝而多失之亂東南以治隆而多失之弱此則風俗之各有得失也西北之人直其失也狠而後雜以羌狄羌狄之人驕暴者也東南之人詐其得也易而又邊以蠻獠蠻獠蠻獠之人庸愚者也直則不可以屈犯驕則不可以禮加狠暴之人尤不可以德化是知西北之人難治也雖愚可以誠推雖詐可以利夸和易之人易以德懷故知東南之人易治也故由古以來西北之政多以嚴致平東南之政多以寬為治此則人民之各有得失也西北之地沃便種植而宜蠶桑東南之地磽瘠多田疇而利耕布故由古以來西北之人裕於賄而患於飢東南之人苦於貧而足於食善治西北則足以富國善治東南則足以餘糧若九有同軌南北一家則儲糧常仰於東南貨賄常資於西北則食貨之各有得失也西北之兵沉徑其失也抵肆東南之兵嚻亂其得也剽鋭故西北之兵便於持久東南之兵利於速戰嘗考曹公用兵常以堅守拄強敵及征孫權驟來亟戰遂大敗於赤壁此則西北之兵便於持久而不利於速戰也項王持孤軍轉戰無前及遇漢祖堅守相持卒敗於垓下此東南之兵利於亟戰而不便於持久也深淵髙田戰不獲騁而諸葛恪之師敗矣江淮之士出入如飛而李密之衆隳矣是以周亞夫堅壁以挫吳楚謝幼度亟戰而敗符堅則以二人用其便利故耳故張良賈充鄭闕之徒皆有南兵剽鋭之言而北人制勝務以守成不戰之功者蓋畏其鋒而莫敢爭也自古惟聞北人之畏南未聞南人之憚北也顧議者何蔽焉臣謂南北形勢初無輕重舉其天時人事如何耳羣書考索續集卷四十九
