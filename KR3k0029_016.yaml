body:
  text: 羣書考索卷十六宋章如愚撰正史門通鑑類初溫公以載籍煩多人主不能遍覽乃約戰國至秦二世如左氏體為通志八卷上之英宗命續其事治平中辟官屬編集前後漢則劉貢父自三國歷七朝而隋則劉道原唐訖五代則范純甫朝以道送王生之序李燾通鑑序初祖禹修唐長編蓋六百卷今刪止八十卷公乃刪削冗長舉撮機要關國家興衰生民休戚善可為法惡可為戒者為一書凡一千一百六十二年計二百九十四卷神宗製序賜名資治通鑑命經筵進讀公又略舉事目年經國緯以備檢尋為目録三十卷參考羣書評其異同為考異三十卷合三百五十四卷公又患通鑑其書浩大難於領略而目録第撮精要之語無復首尾晚乃著通鑑舉要八十卷又採戰國以來至周之顯德凡諸國治亂集以為圖每年一行六十行為一重六重為一卷凡一千三百六十二年離為五卷治平元年上之而今本六卷蓋自威烈二十二年上距共和元年增多四百三十有八年見威烈王二十二年實光晚年所修是為通鑑厯年圖館閣書目又自宋一天下按於熙寧著為百官表乃若威烈丁丑而上伏羲書契已來論纂成書為稽古録二十卷稽古録序英宗治平中𠡠司馬光編集歷代君臣事跡仍命自選辟官屬於崇文院置局許借龍圖天章閣三館祕閣書籍賜以御府筆墨神宗御製序神宗序略云英考留神載籍萬幾之暇未嘗廢卷乃命龍圖閣直學士司馬光論次歷代君臣事迹起周威烈王迄於五代光之志以謂周道衰王室微禮樂征伐自諸侯出平王東遷齊秦晉始大桓文更霸猶託尊王為辭以服天下自威烈王陪臣執命韓魏趙為諸侯周雖未滅王制盡矣此亦古人述作造端立意之所由也詩言商鑒不逺在夏后之世故賜其名曰資政通鑑以著朕志焉又曰載明君良臣切摩治道議論之精語德刑之善制天人相與之際休咎庶證之原威福盛衰之本規摹利害之效良將之方略循吏之條教斷之以邪正要之以治忽辭令淵源針諫深切之義良謂備焉公嘗謂恕曰春秋之後迄今千餘年史記至五代史一千五百卷諸生歷年莫能竟其篇第畢世不暇舉其大略厭煩趨易行將泯絶豫欲託始於周威烈王命韓魏趙為諸侯下訖五代因丘明編年之體倣簡要之文網羅衆說成一家書恕曰司馬遷以良史之才敘黃帝至秦漢興亡治亂班固已下世各名家李延夀總八朝為南北史而言詞卑弱義例煩雜書言表志沿革不完梁武帝通史唐姚康復統史世近亡軼不足稱也公欲以文章論議成歷世大典髙勳羡德褒贊流於萬世元凶宿奸貶絀甚於誅殛上可繼仲尼之經丘明之傳司馬遷安可比擬荀恱何足道哉治平三年公以學士為英宗皇帝侍講受詔修歷代君臣事迹恕蒙辟置史局嘗請於公曰公之書不始於上古或堯舜何也公曰周平王以來事包春秋孔子之經不可損益曰曷不始於獲麟之嵗曰經不可續也恕乃知賢人著書尊避聖人也始知儒者可以法矣年號皆以後來者為定如隋義寧三年便稱唐武德元年詩賦有所譏諷詔誥有所戒論妖異有所警戒談諧有所補益者皆存之餘乃刪去范祖禹得司馬公書云又曰周秦漢晉隋唐皆嘗混天下傳祚後世子孫微弱播遷猶承祖宗之業有紹復之望今全用天子法臨統諸國其餘蜀魏吳宋齊梁陳後魏秦夏涼燕北齊後周五代諸國地醜德齊不能相一名號匹敵本非君臣者皆用列國法至如𤣥德雖曰承漢然屬族疏逺不能紀其世數名字亦猶宋髙祖自稱楚元王後李忭自稱吳王恪後是非難明今並同之列國不得以漢光武晉元帝例為比溫公與劉道原書陳瓘自言因讀通鑑然後知司馬文正公之相業也此書編年紀事先後有倫凡君臣治亂成敗安危之迹若登乎喬嶽天宇澄清周顧四方悉來獻狀雖調元宰物輔相彌綸之業未能窺測亦信其為典刑之總㑹矣胡文定公通鑑舉要補遺通鑑之得文帝時朝錯以賢良對策也而一辭不録武帝時董仲舒漢廷之對三策所陳首尾略具蓋溫公之意以為文帝開賢良之科正欲聞切直之論而朝錯未免以五帝神聖其臣莫及諛其君仲舒之辭正切直所以格君心而裨聖德者多矣其去取之意或者在此焉姚崇十事之諫非不切直也通鑑則一言不録獨魏鄭公之諫疏與陸宣公之奏議紀之特詳切以唐史鄭公宣公列傳較之如信小人而疑君子之言從諫不逮往年之言皆不取諸傳而取諸諫録如遣使振撫之言內節財賦之言皆不取諸傳而取於奏議溫公去取之意豈不以崇以十事要君非忠愛也而魏陸拳拳之心今以其言皆可考也故録之特詳歟魯仲連却秦軍此談者之夸大耳故不書四皓之立太子乃立黨以制父耳故不載劇孟以俠顯而不録姚崇十事以要君而不紀一先仁義二不求逐功三中官預事四罷邪封五請行佞幸法六塞貢獻七絶造寺觀八禮大臣九容諫臣十請書外戚之禍於史魯肅以荆州借先主而曺操聞之墮筆其事皆不書於通鑑而於考異有焉通鑑之失項羽垓下之敗不敢復還彭城而東走烏江正以灌嬰引兵定淮地下彭城已覆其國都矣溫公雖載漢敗羽垓下而不載灌嬰下彭城之事豈亦有所遺乎漢自七國之變務抑諸侯獨嚴安上書武帝論州郡列城數十形束壞制帶脅諸侯非宗室之利是蓋有見於安危之端者而溫公通鑑削而不載豈非有所缺乎劉昭以為嚴安慷慨發憤謂千里之職即古之強國慮非安本無窮之計其後漢家以中外殫微不降階序以運天下胡致堂管見謂田千秋薨二年不拜丞相是霍光少昭帝也楊敞薨踰月而拜蔡義是霍光不敢少宣帝也其言善矣然考之百官表田千秋之後即拜王欣為相通鑑失於登載遂使致堂發此議耳年紀參異王嘉上疏言元帝溫恭少欲都內錢四十萬萬水衡錢二十五萬萬少府錢十八萬萬通鑑書都內錢而刋去下兩語豈溫公以上為總結而下為分别而言之乎故總云都內錢四十萬萬耳殊不知都內官名也食貨志云武帝募民田南夷入粟郡官而內受錢於都內都內掌天下之經費水衡少府掌天子之私藏嘉之所言謂經費私藏皆富耳劉先主即皇帝位於武擔之南而溫公以昭烈於中山靖王族屬疏逺不能紀其世數名位是非難辨遂使抑之不得紹漢統則未知其去取之意也昔諸葛亮稱𤣥德為帝室之胄豈憑虛無據云耳溫公寬宥曺操謂操取天下於羣盜非取之漢室抑退蜀之主相不少假於孔明北伐亦以入冦書之亦獨何哉習鑿齒作漢晉春秋以蜀為正統其編目叙事皆謂蜀先主為昭烈皇帝觀此則溫公之失可見矣漢興七十餘年之間國家無事人給家足都鄙廩庾皆滿而府庫餘貨財京師之錢纍距萬貫朽而不可較太倉之粟陳陳相因物盛而衰固其變也此段見平凖書而通鑑載於景帝後三年按平凖書云上即位數嵗漢興七十年餘正謂武帝漢帝紀年考異漢之薛包茅容等舊史止附别傳通鑑具載事迹不可謂不廣記而淮南王太史公皆稱屈原離騷與日月爭光而公乃不載歷代文苑隱逸傳直十削去七八㑹要前例並存外記皇朝劉恕撰司馬光受詔修通鑑恕辟置史局嘗謂司馬遷史記始於黃帝包羲神農缺而不録光為歷代書而不及書威烈之前以包羲至末命三晉為諸侯可為前紀宋朝一祖四宗一百八年可為後紀將俟書成有請於光及恕病廢絶意於後紀乃更前紀曰外紀書目劉道原作外紀網羅考托詳矣獨惜其博焉而未粹擇焉而未精包羲以來黃帝以前詭異不經之說往往畢載而史記所録西伯尚父隂謀修德以傾商之事亦復兼採至於論十六相之未舉四凶之未去始堯知舜於側微天下未服故遺之大功二十使民臣仰其功業是以唐太宗用李績之微術曽謂聖人亦出此哉又論夏禹攝政虞舜南巡往而不反欲兆庶專意戴禹而逺邇無徯望之意也此豈足以語聖人事乎其論傅說也謂其出於胥靡之中一旦舉用衆必駭懼故髙宗託諸夢寐以服羣臣耳其論命也謂命以杜旡妄之求中人安於擯棄俟時而不競蓋聖人以此籠羣愚而息爭端也若此之類蓋不一也識者當自能辨其當否雜史類通厯唐馬總撰起天皇氏總以史籍繁蕪故上索三墳中稽五典迄于隋季為十卷今存目十一卷起唐髙祖者即孫光憲也光憲皇朝人館閣書目云孫光憲作續通厯十卷今附於通厯後者唯五卷爾通厯一書大抵簡略首紀三皇尤詭誕不經與司馬正補史記所言無異隨事間有論著謂文帝庶幾於王道而景帝之擬周成康則有惠德謂宣帝刑名圖霸之主也而世以比光武非其倫也斯言當矣帝王世紀晉正始初皇甫謐撰以漢紀殘缺始博按經傳傍觀百家著帝王世紀并年厯合十二篇起太昊帝包羲氏迄漢獻帝蕭穎士編年蕭穎士嘗謂仲尼作春秋為百王不易法而司馬遷作史記書表世家列傳叙事依違失褒貶體不足以訓乃起漢元帝訖隋義寧編年依春秋義類為傳百篇黜陳閏隋以唐武德承梁大德皆自論斷諸儒不與太原王緒者僧辨裔孫撰永寧公輔梁書黜陳不帝穎士佐之亦著梁蕭史譜及作梁不禪陳論以著義例使光明云編年通譜慶厯七年六月九日參知政事宋庠上之取十七代史并百家雜說凡正僞年號成一書詔送史館歷代紀要開寶五年四月參知政事劉熙古上五十卷蘇子由古史蘇轍作因司馬遷史記上觀詩書下考春秋及秦漢雜録記伏羲神農訖秦始皇帝為七本紀十六世家三十七列傳謂之古史書目太史公始易編年之法為本紀世家列傳記五帝三王以來後世莫能易之然其為人淺近而不學疏略而輕信漢景武之間尚書古文詩毛氏春秋左氏皆不列於學宫世能讀之者少故其記堯舜三代之事皆不得聖人之意戰國之際諸子辨士各有著書或增古書以自信一時之說遷一切信之甚者或以世俗相傳之語以易古文舊說古史序史記無三皇本紀而古史則增之史記列孔子於世家而古史則黜之傳史記無栁下惠曺子臧吳季札晉范文子晉叔向鄭子産傳而古史則有之編年通載皇朝熙寧章衡撰始自唐虞至於治平四年曰編年通載大率編年之例首國號廟諡以表元繫日月以記事其書正統之君以至公大義而得天下者堯舜夏商周漢唐宋是也其書或詐或乘衰亂而得天下者秦晉隋五代之梁後唐晉漢周是也其書乘時並起兩立而爭天下者魏蜀吳東晉後魏宋齊梁陳後周是也其書吕后稱制之年繫之少帝黜則天擅政之嵗列之中宗者懼後世改元據位讐僞假真以失正也其書后妃世子宗室之廢立者懼後世登庶黜冢徇愛滅公而失順也其書將相大臣之善惡者懼後世之惡直醜正詭諛擅權而失任也其書奸雄篡奪之興亡者懼後世貸刑拂教稔禍敗亂而失守也其書夷狄君長之逆順者懼後世持安危窮凶起難而失備也至如志災異以示戒去符瑞以防怠明卒葬以正終始皆所以權衡褒貶㑹成史法以便觀採焉通載序竹書按隋經籍志晉太康中汲郡人發魏襄王冢得古竹簡書帝命荀氏朂和嶠撰次為十五部八十七卷多雜怪妄其紀年用夏正載三代事不及他國時紀晉魏事終哀王蓋魏之史記也此本止有第四第六及雜事三卷下皆標云荀氏敘録一紀年一紀今應二雜事悉皆殘缺崇文總目不著録書目按杜預左傳後序曰其紀年篇起自夏商周皆三代王事無諸别國也惟特記晉國起自殤叔次文侯昭侯以至曲沃莊伯之十一年十一月魯隱公之元年正月也皆用夏正編年相次晉國滅獨記魏事下至魏哀王之二十年蓋魏國之史記其著書文意大似春秋經惟此足見古者國史策書之常也按劉知幾史通云汲冢書云舜放堯於平陽益為啓所誅又曰太甲殺伊尹文王殺季歷凡此事語異正經其書近出世人多不之信也東殿新書許敬宗李義府奉詔於武德內殿修撰其書自史記至晉書刪其繁辭龍朔元年撰髙宗製序古史穆天子傳冊府元龜云周穆王內史作體制與今起居注正同得於汲冢唐經籍志云郭璞撰六卷未知孰是史記譙周古文考譙周以司馬遷史記書周秦以上或採俗語百家之言不專據正經於是作古史考二十五篇皆憑舊典以糾遷之謬誤司馬彪復以周為未盡善條古史考中凡百二十二事為不當多據汲冢紀年之義云史記至言唐褚無量撰史記至言二十篇明皇時西漢書前史精要皇祐三年十月癸未詔丁度等前後漢書節義令撰序及名度請名曰兩漢簡微詔以前史精要為名西漢荀恱漢紀漢獻帝以班固書文繁難省乃詔恱依左氏傳刪為漢紀三十篇五年乃就其言簡要史通辭約事詳論辨多美其稱論者乃恱表其大事以參得失也館閣書目或問荀恱文中子曰史乎史乎袁宏曰荀恱才智經綸是為嘉史司馬溫公通鑑考異云荀紀無漢書外事竊嘗考之殆不然也漢書汲黯傳載帝問黯曰吾欲云云注以為史略其辭而恱紀載曰吾欲興政治法堯舜何如十字趙后之立諫者固多而王仁之疏班氏所不載今存于紀者首尾具在則其旁搜博采有補於漢史者多矣又其去取之間間亦有意如孝元贊曰上牽制文義優游不斷孝宣之業衰焉此班固本文也而恱則述其上兩語而孝宣之業衰焉一詞則削而不録其意深矣其他紀載差誤固亦不少後元之嵗乙巳乃載於丙午之後中元二年建元四年未更正朔也而冬十月皆載於嵗之末西漢有諫大夫之職而未有諫議大夫也而恱紀載蕭望之薦諫議大夫劉向又貢禹至拜為諫議大夫或習見東都之制而誤書乎孫盛稱左氏春秋書吳楚則略荀恱漢紀迹胸奴則簡蓋所以賤夷狄而貴諸夏也史通荀恱既刪略班史勒成漢紀而班彪論王命列在末篇夫以規諷隗囂翼戴光武忽以東都之事擢居西漢之中皇甫湜謂荀氏為漢紀強欲復古為編年然其善語嘉言細事詳說所遺多矣如覽正史方能備明其論裴子野宋略亦然天作長厯栁璞作長厯斷自漢武紀年為編年以大政侵叛戰伐著之門位附見其左袁宏後漢紀宏見漢時傅教作顯宗頌辭甚典雅乃作頌成章頌簡文之德上之於孝武時為東陽太守宏撰後漢紀三十卷傳於世晉袁宏撰并序宏以後漢書煩穢因撰後漢紀又以謝承華嶠諸書錯謬同異唯張璠言漢末之事差詳故採而益之荀恱作前漢紀在班固之後袁宏作後漢紀在范曄之前宏在晉末為一時文宗性強直雖桓溫禮遇每不阿屈朝志荀袁二紀於朝廷紀綱禮樂刑政治亂成敗忠邪是非之際指陳論著每致意焉故其辭縱橫放肆反覆辨達明白條暢既啓告當代而垂訓無窮其為書卓矣王鍾復序袁紀之失固亦不少薛包安帝時人也乃載於章帝紀順帝之元無所謂元嘉而袁紀順帝之末嵗乃以元嘉紀號司馬公固嘗駮其失也其有補於漢事者亦間有之鄭洪諫答烏孫之議并言竇憲之惡今於袁紀有考焉而范史未之聞也司馬彪續漢書司馬彪以漢迄建安忠臣義士亦以昭著而時無良史記述煩雜譙周雖已刪除然猶未盡安順以降亡缺者多乃討論衆書掇其所聞起世祖終孝獻編年二百録世十二為紀志傳凡八十篇號曰續漢書元嘉漢記漢桓帝元嘉中詔伏無忌與黃景崔實等共撰漢記東觀漢記漢自明帝以後撰光武帝紀及表志列傳載記皆每朝旋修至靈帝時已成百二十七卷雖未終一代之事且見逐時不闕修述今東觀漢記是也王隱晉史晉王隱父銓少好學有著述之志每私録晉事未就而卒隱博學多聞受父遺業西都舊事多所講究大興初召隱為著作郎令撰晉史時虞預私撰晉書而生長東南不知中朝事數訪於隱并借隱所著書竊寫之後更嫉隱隱以謗免黜歸於家依征西將軍庾亮亮供其紙筆乃得成書上之隱雖好著述而文辭鄙拙蕪舛不倫其書次第可觀者其父所撰文體混混漫義不可解者隱之作也于寶晉紀中興草創未建史官王導上疏宜備史官𠡠著作佐郎于寶著晉書自宣帝迄於愍帝五十三年凡三十卷奏之其書簡略直而能婉咸稱良史徐廣晉紀廣撰成國史成晉紀四十六卷修文殿御覽北齊後主置上林館以中書侍郎杜德林黃門侍郎顔之推判館事文命共撰修文殿御覽唐春秋吳兢在長安景龍間撰唐春秋詔兢就集賢院論次兢敘事簡核號良史晚稍疏悮人病其太簡韋述唐春秋韋述性嗜書撰唐春秋三十卷韋述續七志馬懷素奏述與諸儒即祕書續七志韋述六典先是詔修六典徐堅造意歷年未有所述始摹周六官領其屬事歸於職規制定初令狐德棻吳兢等撰武德以來國史皆不能成述因二家參以後事遂分紀傳文為例一篇文約事詳蕭穎士以為譙周陳夀之流唐六典開元十年起居舍人徐堅被詔修六典於集賢院明皇手寫六條曰理教禮政刑事張說知院委徐堅開元二十六年書成先是詔修六典徐堅命意嵗餘未成及肅宗引韋述撰定始以令式摹周六官規制遂定栁芳唐厯肅宗詔芳與韋述綴緝吳兢所次國史叙天寶後事棄取不倫史官病之又倣編年為唐厯四十篇頗有異聞然不立褒貶義例為諸儒譏訕髙氏小史唐藝文志髙峻初六十卷子迥釐正之峻元和中人凡一百卷建隆重編唐會要建隆二年正月乙未司空平章事監修國史王溥等進編唐㑹要一百卷文簡理備太祖嘉之此書德宗時蘇冕始撰四十卷至武宗時崔鉉又續四十卷至是溥又采宣宗以後故事勒成之詔藏於史閣賜物有差諸家唐書溫大雅創業起居注房𤣥齡許敬宗撰實録姚思亷撰紀傳長孫無忌令狐德棻綴舊史許敬宗撰髙宗紀傳李仁實撰敬宗諸傳牛鳳撰唐書劉子𤣥吳兢等更撰唐書劉吳徐更定則天實録唐武德間溫大雅首撰創業起居注三篇自是房𤣥齡許敬宗敬璠相次立編年體號為實録貞觀初姚思亷始撰紀傳粗成三十年顯慶元年長孫無忌于志寧令狐德棻楊士卿等因其舊書綴以事復為五十卷龍朔中敬宗總統史任更增前作混成百卷始髙宗本紀及永徽名臣四夷等傳多是其所造敬宗所作紀傳或曲希時㫖或猥釋私憾凡有毁譽多非實録其後李仁實續撰于志寧許敬宗李義府等傳載言記事見推直筆長夀中牛鳳及又斷自武德終于洪道撰為唐書百有十卷然以鳳及之不才而輒議一代大典敘事則參差倒錯既而悉收姚許諸本欲使其書獨行由是舊典殘缺殆盡長安中劉子元與朱敬則徐堅吳兢更撰唐書八十卷神龍元年又與堅兢重定則天實録總為三十卷新史糾繆哲宗時吳鎮進唐新史糾繆凡二十條或云哲宗時乃紹興間可更考唐起居注起居郎掌録天子起居法度天子御便殿則郎居左舍人居右有命俯陛而聽退而書之季終以授史官貞觀中以給事諫議大夫兼知起居事每仗下議政事起居郎一人執筆記録於前史官隨之其後復置起居舍人分侍左右秉筆隨宰相入殿若仗在紫宸內閣則夾香案分立殿下直第二螭首和墨濡筆皆坳處時號螭頭髙宗臨朝不決事有所奏唯辭見而已許敬宗李義府為相奏請多畏人之知也命起居郎舍人對仗承㫖仗下與百官皆出不復聞機務矣長夀中仗下後宰相自録軍國政要為時政記則天時姚璹請宰相自撰時政記月送史館然率推美遜善事非其實未幾亦罷而起居郎猶因制𠡠稍稍筆削以補國史之闕開元初詔修史官非供奉者皆隨仗而入位於起居郎舍人之次及李林甫專權又廢太和九年詔入閣曰起居郎舍人具紙筆立螭頭下復貞觀故事楊嗣復開成中為相請延英對宰相語關道德刑政者委中書門下直日記録月付史官他宰相議不同乃止裴休大中六年奏言宰相論政上前知印者次為時政記所論非一詳已辭略他議事有所闕史氏莫得詳請宰相人自為記合付史館詔可太宗欲觀起居注朱子奢太宗時為諫議大夫𢎞文館學士帝常詔起居紀録臧否朕欲見之以知得失若何子奢曰陛下舉無過事雖見無嫌然以此開後世史臣之禍可懼也史臣全身畏死則悠悠千載尚可聞乎隋志起居注者録紀人君言行動止之事春秋傳曰君舉必書書而不法後嗣何觀周官內史掌王之命遂書其副而藏之是其職也漢武帝有禁中起居注後漢明德馬后撰明帝起居注則漢時起居似在宫中為女史之職然皆零落不可復知今之存者有漢獻帝及晉代以來起居注皆近侍之臣所録晉時又得汲冢書有穆天子傳體制與今起居正同蓋周時內史所記王之副也唐貞觀政要吳兢神龍中撰采托太宗朝政事之要隨事載録以備勸戒合四十篇上之唐贊文宗恭儉儒雅出於天性嘗讀太宗政要慨然慕之及即位鋭意於治故太和之初政事修飾號為清明于時因政要思魏鄭公賢詔訪其後唐太宗政要李延夀嘗撰太宗政要調露中髙宗觀之咨美直筆藏副祕閣吳兢武后實録初與劉子元撰定武后實録敘張昌宗誘張說誣證魏元忠事說為相即從容謬謂曰劉生書魏齊公事不少假借奈何兢曰子元之亡不可受誣地下兢實書之其草故在聞者歎其直說屢以情蘄改辭曰徇公之情何名實録卒不改世謂今董狐云唐時政記武后時姚璹進言永徽後左右史惟對仗承㫖仗下謀議不得聞璹以帝王謨訓不可闕紀請仗下所言軍國政要責宰相自撰號時政記四十卷以授史官從之韋述開元譜述述好譜學更撰開元譜二十篇順宗實録韓愈為順宗實録其間載李吉甫事似不少假借德裕當國怏怏有不平之意請更之者屢矣其後卒竄定無全篇憲宗前代君臣事跡憲宗見太宗撰金鑑録帝範明皇撰開元訓戒採尚書春秋後傳史記漢書三國志晉漢晏子春秋新序說苑等書君臣行事可為龜鑑者集成十四篇君臣道合辨邪正戒權幸戒微行任賢臣納忠諫謹征伐謹刑法去奢泰崇節儉奬忠直修德政簡畋獵録勳賢憲宗連屏憲宗詔李絳與崔羣錢微幸洪景白居易等撰次君成敗五十種為連屏張便坐右穆宗政記㑹要長慶元年四月修聖政記中書門下奏國朝舊制每正朝奏事史官載筆於玉階之下議論政事悉得書之永徽後仗下便散宰臣謀議莫得聞長夀二年姚璹請撰時政記此事久廢史官不復得聞唯寫誥詞記除授而已伏望臣等每坐日所有謀議事關政體者便日撰録足為聖政記至嵗末則付史官永為常式從之唐實録唐貞觀中房𤣥齡等上所撰髙祖太宗實録各二十卷永徽初史官太尉無忌等修貞觀實録上之顯慶中許敬宗等撰貞觀二十三年已後至顯慶三年實録至二十卷添成一百卷髙宗以敬宗所記多非實録謂劉仁軌等曰先朝身擐甲胄親履兵鋒削平區宇數年之間四海清晏方始歸功上帝臨御下人昨觀國史所書多不周悉卿等必須探微索隱原始要終盛業洪勳咸使備至如先朝作威鳳賦意屬阿舅及士亷敬宗仍移向尉遲敬德內又嘗幸溫湯教習長圍四合萬隊俱前忽然雲霧晝昏部伍錯亂先聖恐枉法者多待其既整然後臨觀顧朕曰振旅訓兵國之大事此之錯失於法不輕我見必須行法我之不出乃為良也乃移魏徵傳稱是徵之諫語此既乖於實録何以垂之後昆哉開元中史官劉子元吳兢撰唐睿宗實録二十卷則天實録三十卷中宗實録二十卷韓愈撰順宗實録愈書禁中事切直閹宦不喜訾其非實在文宗時詔開正摘去元和永貞間事五代㑹要王溥又采梁開平至顯德事跡為五代㑹要三十卷獻之羣書考索卷十六
