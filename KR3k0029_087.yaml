而預焉河間孝恭非以其宗明之故也以其徇巴蜀破夷陵有方面之功而預焉房杜之謀謨帷幄共定社稷引拔人物致之幕府而臺閣制度皆所裁制足以為元功之首英衛之料敵制勝掃平紛亂降蕭鐃俘世充績破突厥于定襄靖破延陀於磧北足以為元勳之次魏徴之忠蹇貴重世南之論議懇誠蕭瑀之抑過繩違曾無所憚此皆以文而有功于社稷者也屈突通之舉兵圍洛張公謹之副李靖破虜秦瓊之先鋒鏖戰前無堅對此皆以武而有功於社稷者也其他如敬德如唐儉如假志玄如劉𢎞基如殷開山如劉政會如柴紹如程知節如長孫順德皆其﨑嶇兵間戮力王室有功於開創大業者也至於侯君集張亮雖不克終而其初亦未嘗無一戰之勇如破谷渾平髙昌此君集之可見者也如舉黎陽伐髙麗此張亮之可見者也唐初功臣可謂盛矣故吕溫贊凌煙之勳臣而其序有曰唐莒公劉渝公之首戴神堯舉晉陽而拯天下此則大禹之拯溺也魏鄭公以致君為己任諫若不及此則咎繇之揚言也虞永興糾合羣儒明備王禮克諧帝樂煥乎其有文章此則夷夔之制作也長孫趙公舉大義定社稷此則周公之正救也英衛受天勇智麾定四方此則太公之鷹揚也房杜並運帷幄謨成大公此則蕭何之指蹤子房之決勝也尉遲秦程剛毅木訥為王前軀此則吳漢之朴忠賈復之雄勇也其所取大略如此亦可見矣然唐史所載凡二十三人而吕溫之贊乃以春秋之義沒君集張亮之名而為二十二贊至其序則曰圖畫於凌煙閣者二十有四人又併髙士亷而總言之數之不同亦不可不知也然而太宗以創業之功歸之羣臣而圖像之設有古人不忘之意可謂厚矣故其後在永徽時髙宗則又取其終始之著名者圖形于凌煙曰徴曰士亷曰瑀曰志玄曰洪基曰世南曰瓊者是也在寶應時肅宗則又圖功臣于凌煙曰郭子儀曰李光弼者是也在貞元時德宗則詔圖勳臣于舊臣之次曰李晟曰馬燧者是也在太中時宣宗則又差定元和將相圖形凌煙曰李絳者是也既又詔求李峴王圭戴胄之徒以至于李憕凡三十七人皆續之于是閣焉夫子儀光弼豈非以其再造唐室之功乎取河北復長安回紇涇陽之圍而乃單騎見虜一以至誠屈之故史臣謂之身為天下安危者二十年權傾天下而朝不忌功蓋一世而上不疑者子儀之功為如何以朔方而救常山轉戰太原而冦盜之鋒為之震讋而退沮故史臣謂治師嚴整天下服其威名而戰功推為中興第一者光弼之功為如何李晟馬燧豈非以其有扶持社稷之功乎朱泚僭竊於京師懷光跋扈於咸陽河北三盜盤據而紛錯晟獨提孤軍以抗之卒能秉義挺忠以翦賊泚之黨史臣謂師入長安而人不知雖三王之佐無過其能可謂仁義之將者則李晟之功為如何破田悅於魏博封懷光於河中使中原之地不為盜區其制敵有過人者史臣謂馬燧沉雄忠力鬪必決死未嘗折北名蓋一時則馬燧之功為如何至若李絳之在唐每有詢訪隨事補益以直道進退名重一時如連屏之作立石紀德之諫朋黨之諫方鎮進獻之諫用賢豈容易之説皆有補於治道此大中之初所以圖其像也不特此也李峴張鎰之剛直盧奕李憕之忠義王圭之推誠納善戴胄之清直守法馬周之敷奏明敏張鎬之之論議有體王及善之臨事不可奪栁渾之守正不阿此皆有益於國者裴寂劉文靜之共建大計禇遂良之安定社稷劉幽求之參預大策五王之興復唐室此又其功之卓卓者至若婁師德之屯田備邊郭元振之善撫夷夏朱敬則之諫羅織韓瑗之定律令郝處俊引魏文帝令而明社稷之大誼遜位武后事曰魏文著令帝崩不許皇后臨朝李勉劾武臣之驕縱而至朝廷之益尊為相諤諤而有大臣節者張九齡也兼叔向之遺直子産之遺愛者魏知古也器識沈邃有嵗寒後凋之節者陸象先也振厲名節臨事方嚴而面斥諂諛之臣者蕭復也以至張巡之堅守睢陽南霽雲之斷指自誓李嗣業被堅數奮為諸軍冠房琯之以天下為己任請自將平賊蕭華以魏自守而不肯從漁陽之亂賈耽付節度於樊澤而不敢稽天子之命袁履謙同杲卿以圖賊斬欽湊於外郵而力為常山之守又皆其以忠勇而衛王室者也圖而像之其可緩哉推其所自實貞觀忠厚之意有以先之也秦瓊傳貞觀十三年秦瓊改封胡國公後四年詔司徒趙國公無忌司空河間王孝恭司空萊國公如晦司空太子太師鄭國公徴司空梁國公玄齡開府儀同三司鄂國公敬德特進衛國公靖特進宋國公瑀輔國大將軍褒國公志玄輔國大將軍夔國公𢎞基尚書左僕射蔣國公通陕東道行臺右僕射鄖國公開山荆州都督譙國公紹荆州都督邳國公順德洛州都督鄖國公亮吏部尚書陳國公君集左驍衛大將軍郯國公公謹左領衛大將軍虞國公知節禮部尚書永興國公世南户部尚書渝國公政會户部尚書莒國公儉兵部尚書英國公績并叔寶並圖形凌煙閣髙宗永徽六年遣使致祭名臣圖形凌煙閣者凡七人徴士亷瑀志玄𢎞基世南叔寶皆始終著名者也李博傳大中初又詔求李峴王圭戴胄馬周禇遂良韓瑗郝處俊婁師德王及善朱敬則魏知古陸象先張九齡裴寂劉文靜張柬之袁恕己崔元暐桓彥範劉幽求郭元振房琯袁履謙李嗣業張巡許逺盧奕南霽雲蕭華張鎬李勉張鎰蕭復栁渾賈耽馬燧李澄三十七人畫像續圖凌煙閣云宋朝官制宋朝自太祖設官分職多襲五代之制雖稍有增損而大體俱舊制也唐制省部寺監之官備員而已無所職掌别領內外任使而省部寺監别設主判官名惟以侍中中書令同中書門下平章事為宰相此尚循唐制也至乾德二年始置參知政事為宰相副二以薛居正吕餘慶為宰相所居省謂之中書門下國政所出也而兵政𨽻樞密院承五代之制故樞密有使副使知院同知簽書與中書號為二府焉對持文武二柄故號曰二尚書省置判尚書都省只一員但掌百官赴省集議及大祀受誓戒之事六部各有主判率以舉事待制館閣官領之吏部即審官東院掌尚書左選審官西院掌尚書右選吏部南曹掌侍郎左選三班院掌侍郎右選流內銓考功郎官之職也户部即三司使尚書之任也其官崇職重久次者為使稍輕則為權使資淺則為權發遣使公事曰度支副使曰户部副使曰鹽鐵副使皆侍郎之任也别置子司判官度支户部鹽鐵各有判官所掌即本曹郎官之職也判胄案唐軍器監職也掌造器械判修造案唐工部將作少監職也掌修造判磨勘司唐比部職也掌勾考禮部有判部及判禮部貢院即尚書侍郎之任若兵部之事即歸樞密工部之事則歸三司此二部不設主判官多以他官兼之刑部則審刑院也掌詳覆諸路奏案翰林學士襲唐制以六員為額其帶知制誥則釐職事其别領省府職事則不帶知制誥年德俱重者為承旨知通進銀臺司兼門下封駮事即給事中也知制誥即中書舍人之職也御史臺雖有大夫而不除以中丞為臺長諫官以别官兼領者即為知諫院同知諫院資輕者為知院同知院兼掌博士之職九寺則判太常寺禮院即卿之任也宗正則有判寺太僕職屬羣牧司則有制置使以樞密及學士領之大理則糾察京師刑獄是其職也鴻臚則歸於客省四方館光祿司農太府其職皆屬三司衛尉無所總轄其職分為金吾衛仗司其環衛之任分為三衙皇城司矣故此五寺别無置司并主判官祕書省郎昭文史館集賢謂之三館與祕閣𨽻本省有直館直院直閣校理館閣校勘謂之館職初除於本省供職一年出補外任使國子監有判監其資淺者為同知即祭酒司業之任而博士轉為直講將作少府軍器都水之職並屬於三司矣都水無常員一遇興役則遣官亦係三司等人職掌官外又有學士待制等員惟觀文殿大學士仁宗以賈昌朝辭使相特建此職仍詔非曾任宰相不除觀文殿學士而下曰資政殿端明翰林侍讀侍講龍圖天章寶文學士三閣待制皆為侍從清望之選並無職掌多帶職以領在內省府寺監在外藩方任使自資政以上多以授二府自北宋朝舊官制如此文臣則兼帶階勳即自武騎尉至上柱國十二轉是也武臣則兼帶階勳憲御檢校官四色憲御自監察御史至御史大夫號為憲銜檢校自國子祭酒至三公亦唐及五代舊制也而宋朝遵之元豐初始命置局詳定官制大槩本唐六典為法稍增損之設尚書省置令左右僕射門下省置侍中中書省置令已上為丞相尚書有左右丞門下中書各有侍郎樞密院有知有同知已上為執政官尚書六部有尚書有侍郎有郎中有員外惟吏户刑各置四員以其劇曹也左右司郎官通糾六部號都司專佐宰相理省事謂之宰屬翰林學士有定員御史臺官如舊制而除知雜事及裏行之名門下後省置左散騎常侍中書後省置右散騎常侍而不除人給舍諫官左右史之屬曰左右散騎曰給事中曰起居郎曰左右諫議大夫曰左右司諫曰左右正言是也皆號為兩省官祕書省有監自監少而下曰丞郎校書正字著作又佐郎號館職罷直館院校理等員惟有修撰直祕閣號貼職而别領在外任使九寺四監為寺監官國子祭酒而下有司業丞簿太學有博士正録已上為學官是謂職事官罷三司使副及諸生判官而其職分𨽻諸省部寺監以太師太傅太保為三師太尉司徒司空為三公皆論道之官無專領之職為宰相兼官以開府儀同三司易節度使同中書門下平章事號為使相以唐之散階易省部寺監官歸釐本職號階官為寄祿官而食其俸以領內外任使削憲銜檢校留勳十二轉此元豐新制官名即循唐舊典職掌亦倣周禮六官之法也黃元禮崇官制初神宗喜觀六典一日諭王圭等倣唐六典修改官制然唐六典以中書造命行無法式事門下審覆行有法式事尚書省奉行而政柄盡歸於中書又分班奏事各行其職蔡確言於神宗不置三省長官以左僕射兼門下侍郎右僕射中書侍郎各主兩省事時王圭為左確為右獨專政柄而圭不預聞除吏之事後吕正獻乃請三省同班奏事分班治事而元祐行之其後不能易也正獻吕公著流品有别則人安其分無幸進之心爵秩有章則名器加重而天下知所趨向也然元豐官制以唐六典為宗名實正矣臺省寺監職掌之官而寄祿之制混為一流無復差别當時群臣不能推原祖宗制官之意者蓋祖宗官制所以甄别流品者至為嚴密一官凡數等曰宰執侍從之選卿監館職之選出身人之選廕補人之選雜流之選各為一等有條不紊可謂盛矣不獨此也張演論宋朝之待武臣也厚其祿而薄其禮凡貴於正任重於管軍要在橫行近在承旨御帶寵在閣職設遙郡以賞勞績設使臣以别祿秩此武臣之名分也以節度使留後觀察防禦團練使刺史為正任以殿前馬步軍副都指揮使三衙都虞候天武捧日龍武神衛四廂都指揮使為管軍以內客省使客省引進四方館東西上閣門使副為橫行以通事舍人閣門祗候為閣職以橫行使及諸州帶防禦團練使刺史為遙郡以諸司使副內殿承制崇班為大使臣供奉官侍禁殿直供奉職為小使臣自遙郡而上本俸皆厚其使臣本祿雖稍薄而添支給劵皆優若朝謁御燕惟正任預焉蓋正任方號武臣得與文臣分班也管軍臣僚號侍衛橫行大使臣皆為祗應官爾此所謂薄其禮也三司使之職又有制之善者宋沿五代後唐之制置三司使以總國計五代專以鹽鐵為理財之要在三司之首應四方貢賦之入朝廷未嘗預焉一歸三司總鹽鐵鹽鐵今之金薄度支主用度户部主版圖號計省使位亞執政目為計相稱省主其恩數廪祿與參樞均若除翰林承旨及資政端明殿學士或官至尚書或久任權三司使者方正除之若待登柄用多先預焉鹽鐵度支户部在唐五代皆專使額皇朝方各設副使以三司使總之故號三司鹽鐵副使其度支户部亦如之位亞待制乃稱省副恩數視大卿監逐司各置判官二員號三司鹽鐡判官三司度支户部判官以佐副使其資序視轉運使又有三司判官六員謂之子司子司各主一司開坼司兼覆衙司磨勘司兼憑由胄案兼刑案修造案河渠案各號三司判官管開坼司或衙司公事之類以専職也內二貟兼刑案推治隱盜斷刑事通稱省事又其資序視提刑乃通稱省别凡初除必任子司自子司遷鹽鐵等判官判官而後副使蓋祖宗不容資淺新進人厠列於其間也祖宗舊制遷除執政侍從必先歷錢榖有自三司度攴副使擢起居舍人知制誥有先除權三司使而乃拜樞密可見祖宗之意也其所使掌之財驅磨財計檢察憑由悉歸磨勘司乃今之比部造作軍器則胄案主行之今之庫部土木之工則𨽻修造案今之工部河防之役則河渠案行之今之水部且國家工役之費無出於三事且所用為蠧耗之大者必命三司使總之乃可節以制度也至王安石為相以周禮行新法故持冡宰邦計之説謂宰相當主財計遂與三司分權凡賦稅常貢征榷之利方歸三司摘山煮海坑冶榷貨户絶沒納之財悉歸朝廷其立法與常平免役坊場河渡禁軍闕乏地利之資皆號朝廷封樁又有嵗科上供之數盡運入京師别創庫以貯之三司不與焉於是祖宗處國計之良法盡壞矣自元豐改官制户部尚書全無計相之權職在行朝廷之文移僅能經畫在京官吏諸軍俸祿而已以此論之三司使之職不待改官制而失其權自熙寧變更法度之時已壞矣蔡允道官制論三司使之名起於後唐明宗時宋朝因之既專掌利柄而天下之事應用財者亦多兼總之以故事權最重幾與二府相抗嘉祐中京師大水始取三司之河渠按置都水監元豐官制復以三司曹按歸之軍器監修造案之事歸之將作監三監皆𨽻工部如此之類不一於是户部掌版籍財用二事而已權任非復三司之比元祐中蘇子由為户部侍郎大以為不便建言祖宗參酌古今之宜建立三司所領天下事幾半非以私三司也事權不一則財利散雖欲求富其道無由因請都水監將作軍器監悉𨽻户部凡三監有所為户部定其事之可否裁其費之多少其工部任其工之良苦程其作之遲速朝廷以為然從之按唐貞元初度支使杜佑辭錢榖之任引李巽自代先是度支以制置措費漸權百司之職廣設員吏繁而難理佑始奏營繕歸之將作木炭歸之司農染練歸之少府綱條頗整公議多之由是而言計司兼領他職自唐已然不特出於祖宗之意子由所懇懇而言之者皆佑之所釐正也豈時移事異利病固不同耶佑之所請見於蘇冕會要新史載之不如是之詳也羣書考索後集卷二十一
