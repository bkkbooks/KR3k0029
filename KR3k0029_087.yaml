body:
  text: 羣書考索後集卷二十一宋章如愚編官制門唐官制唐之官制名號祿秩雖因時增損而大抵皆沿隋故其官司之别曰省曰臺曰寺曰監曰衛曰府各統其屬以分職定位其辨貴賤敘勞能則有品有爵有勳有階曰尚書曰門下曰中書曰祕書曰殿中曰內省此六省也曰太常曰光祿曰衛尉曰宗正曰太僕曰大理曰鴻臚曰司農曰太府此九寺也臺有御史而其屬則有三院監有五監而其名則自國子而至於都水左右衛而下有曰驍衛曰武衛曰威衛而至於金吾衛千牛衛者凡十六衛焉左右率府而下有曰親府曰勳府曰翊府而至於司禦率府內率府者凡十率府焉然其中别位敘之崇卑則有品自一品而至于九品有正有從而正四品而下又有上下之别凡三十等焉定食邑之多寡則有爵自子男而上以至于王而各比其品之數者凡有九等焉自武騎而上至于護軍自護軍而上極于上柱國凡十有二等者所以為勞能之别也自開府而下至于將仕二十九階自驃騎而下至于陪戎四十五階所以為文武之别也方唐之盛時其制如此蓋其始未嘗不欲立制度明紀綱為萬世法而常至於交侵紛亂者由其時君不能謹守而循一切之茍且故其事愈繁而官愈冗至失其職業而卒不能復初太宗省內外官定制為七百三十員曰吾以此待天下足矣然是時已有員外之置其後又有特置同正員至於檢校兼守判知之類皆非體制又有置使之名或因事而置事已則罷或遂置而不廢其名類繁多莫能遍舉且宰相之職佐天子總百官治萬事其任重矣然自漢以來位號不同而唐世宰相名尤不正唐初因隋制以三省之長共議國政其後太宗為尚書令由是僕射為尚書省長官與侍中中書令號為宰相其品位既崇不欲輕以授人故常以他官居宰相職而假以他名太宗時杜淹以吏部尚書參議時政魏證以祕書監參預朝政其後或曰參議得失參知政事之類其名非一皆宰相職也貞觀八年李靖以疾而平章事而平章事之名起於此李績以詹事同三品而同三品之名起於此自開元以後常以領他職實欲重其事而反輕宰相之體故時方用兵則為節度使時崇儒學則為大學士時急財用則為鹽鐵使又其甚則為延資庫使至於國中太清宫之類其名頗多皆不足取然其失非特宰相也自開元以來諸使紛出李傑則為水陸運使宇文融則為租庸使裴耀卿則為江淮轉運使論度支則以李元祐為之使論鑄錢則以羅文信為之使以至木炭則有使青苗則有使修書則有使群牧置使而太僕不得盡其職户口置使而户部不得專其任無非奪百司之職者故百司之任最為侵紊御史彈擊之司也知太府之出納者有之楊慎矜禮部掌禮樂之司也而掌吏部之十銓者有之蘇題陵夷至于後世遂至於無復職掌劉蕡對䇿以為夏官不知兵籍止於奉朝請大將不主兵事止於養勳封而陸長源上宰相書亦曰兵部無戎帳户部無版圖虞水不管山川金倉不司錢穀光祿不供酒衛尉不供幕祕書不校勘著作不修撰亦可知矣雖然唐初之制亦有足取者至後世不存矣官以勞考敘進所以考功也自髙宗設泛階而其制以壞內侍不置三品所以防患也自元宗用髙力士而其法復隳銓曹注授之法既變於裴光庭而門下過官之制又廢於楊國忠立法之善意不可見矣唐考功九等法唐考功之法掌於吏部京官之考則郎中主之外官之考則員外主之而又有監中外官考使以涖督其事凡百官之長嵗較其屬之功過州牧刺史縣令每嵗亦上其狀於考司監領之官差以九等大合衆而讀而唱第於尚書而後奏之代流內之官敘以四善焉善狀之外又有二十七最焉夫所謂四善者何也德義有聞也清慎明著也公平可稱也恪勤匪懈也此之謂四善夫所謂二十七最者何也獻可替否拾遺補闕是近侍之最也銓衡人物擢盡才良是選司之最也揚清激濁褒貶必當是考校之最也禮制儀式動合經典是禮官之最也其於音律克諧不失節奏則為樂官之最其於決斷不滯豫奪合理則為判事之最其於部統有方警守無失則為宿衛之最其於兵士調習戎裝充備則為督領之最若乃法官之最則以推鞫得情處斷平允者為之校正之最則以讎校精審明於刋定者為之宣納之最則以承旨敷奏吐納開敏者為之學官之最則以訓導有方生徒充業者為之以至於賞罰嚴明攻戰必勝是之謂軍將之最禮義興行肅清所部是之謂政教之最詳録典正辭理兼舉是之謂文史之最訪察精審彈舉必當是之謂糾正之最曰勾稽曰監掌曰役使曰屯官曰倉庫既各定其最矣而厯官之推步方術之效驗關津之檢察市司之不擾亦莫不各有最焉雖牧官之微鎮防之逺亦以牧飬之肥碩邉境之清肅者為之最此之謂二十七最也故一最四善為上上一最三善為上中一最二善為上下其無最而有二善者次之無最而有一善者又次之善最不聞者斯為下矣甚而或至於愛憎之任情或背公而向私或居官之貪濁者皆列於下之三等焉觀其九等之差猶詳於其所謂善而略於其所謂最也蓋善者德也最者才也唐之法猶可嘉焉凡考中上以上每進一等則有加祿之法中下以下每退一等則有奪祿之法此又所以寓懲勸之微意也唐三銓之法通典云在尚書者則為尚書銓分於侍郎者則為中銓為東銓唐六典曰又以三類勸其異一曰德行二曰才用三曰勞效凡選有文武文選則吏部主之武選則兵部主之皆為三銓之法在尚書則典其一在侍郎則分其二而其擇人之法有四一曰身所以取其體貌之豐偉也二曰言所以取其言辭之辨正也三曰書所以取其楷法之遒美也四曰判所以取其文理之優長也四者皆在所可取則又以德行先之德均則以才才均則以勞其得者為留其不得者為放自五品以上則不試于選特以册以制以敕而授之自六品以下始集而試觀其書判已試而銓察其身言已銓而注詢其便利已注而唱則以類而聫其名先簡於僕射而乃上於門下給事中讀之黃門侍郎省之侍中審之不審者則駁其非既審者則以聞主者受旨而奉行焉謂之奏受其視品及流外官則判補之皆給以符而謂之告身凡試判登科則謂之入等而其拙者則謂之藍縷選未滿而試文三篇者謂之宏詞試判三條者則謂之拔萃而其中者則以官授之此選法之大略也自是而外又有所謂小選曰東選曰南選之名凡流外兵部禮部舉人郎官得自主之者則謂之小選東人選者或集於洛州則謂之東選嶺南黔中之屬郡縣之官不由吏部乃遣郎官御史而為選補使則謂之南選其名亦不一焉然其名雖不一而所以擇之之法當不易也自裴行儉設長名榜引銓注法復定升降之等而銓法於是而始改張仁偉員外郎造姓厯改狀樣銓厯之法而銓法於是而遂密裴光庭作循資格而賢愚一槩必與格合乃得銓授而銓法於是而遂變姚崇宋璟之流患斜封墨敇之濫也乃合三銓而通掌之於是有通銓之事宇文融患吏部選試之不公也欲精其選而分掌之於是有十銓之名其後楊國忠以右相而兼吏部悉唱注於都堂以誇神速而門下過官三銓注官之法遂一旦而盡廢此法之所以壞也然銓法在唐盛時諸公固已病之如杜如晦則曰今吏部取人獨舉其言辭刀筆而不詳才行張九齡亦曰今吏部始造簿書以備遺忘而反求精於案牘不急人才而時人有平配之誚官曹無得賢之實至沈既濟言四大之弊於德宗之時則又以為考校之法皆在書判簿厯言辭俯仰之間安行徐言非德也空文善書非才也纍資積考非勞也則是唐之法猶未為良法也雖然亦存乎人而已矣如鄭愔之納貨而選人滯留崔湜之納賂而銓選無序李義府無品鑒才而溪壑之欲惟賄是利則安望其得人若髙季輔之在太宗時善銓序人物至賜金鑑以况其清鑒李義之在睿宗時請謁不行而時人有李下無蹊徑之譽則亦何病於法乎其他若馬載若盧從願若李朝隱或摘檢詭偽而以平允聞或罷黜斜封而不避怨誹者則銓法未嘗不善也故史臣載前有裴馬後有盧李有深意矣唐六典唐六典之書作於元宗之開元也方開元之十年詔於集賢院修定六典而元宗手寫六條曰理教禮政刑事時張説委徐堅為之經嵗而無規制乃命韋述等參撰始以令式象周禮六官其後蕭嵩張九齡之徒亦與焉至二十六年而書始成凡三十卷嘗以其書而考之自太師太傅太保則為三師太尉司徒司空則為三公尚書都省門下省中書省祕書省殿中省內侍省則為六省御史之官則為御史臺曰太常曰光祿曰衛尉曰宗正曰太僕曰大理曰鴻臚曰司農曰太府則為九寺曰國子曰少府曰軍器曰將作曰都水則為五監曰左右衛曰左右驍衛曰左右武衛曰左右威衛曰左右領軍衛曰左右金吾衛曰左右監門衛曰左右千牛衛則為十六衛左右羽林軍則為北衙其他如東宫五府之官京兆河南太原三府之官督府州縣之官皆可於其書而考焉且以三師三公言之皆古宰相之職也唐不常置蓋三師三公皆正一品雖尚書令亦不過正二品左右丞相不過從二品耳故吏部敘階凡二十有九乃自從一品以下而三師三公不在焉蓋三師三公之尊非可以敘遷也以六省言之尚書都省則有尚書令有左右丞相有左右丞有六部之屬夫尚書令號為端揆之官所以統乎六部而為之長也自武德中太宗嘗親其職自是闕而不置其國政樞密皆委中書八座之官但受其成事而已若令闕則以左右僕射為省主此唐尚書令之制也左右丞相在咸亨中名為僕射自開元而始為左右丞相之名唐初未嘗不知國政也自開元中張説兼之後罷知政而猶為丞相自此以後遂不知國政而丞相為虛名耳此唐丞相之制也糾舉憲章以表六官之儀制正百僚之文法若御史有糾劾不當兼得彈奏此唐左右丞之制也吏部之敘有尚書有侍郎所以掌天下之官也故郎中則有敘階之法自開府儀同為從一品而至于文林將仕之從九品凡二十九焉而其中自四品而下每品又有上下之别其敘階也有以封爵有以姻戚有以勳庸有以資蔭有以秀孝有以勞考其嶺南黔中三年一置選補使則號為南選郎中所掌之選則號為少選京司之吏未入九流者謂之流外銓員外所掌之選院則號為南曹司封司封爵之制自王而至于子男則有九等司勳勳級之制自上柱國而至于武騎雲騎則有十二等考功之法則有四善二十七最此吏部之大略也户部之職有尚書有侍郎所以掌天下之户口土田也貢賦之差則分為十道户之資産則定為九等給田之制則曰永業曰口分凡有二焉賦役之制曰租曰調曰役曰雜徑凡有四焉此皆户部之大略也禮部尚書之與侍郎所以掌天下之禮儀貢舉之政令也而其屬曰禮部曰祠部曰膳部曰主客凡五禮之儀吉凶軍賔嘉凡一百五十有二舉試之制自秀才明經進士明法書算其科有六此禮部之大略也兵部尚書之與侍郎所以統天下之軍衛武選也其屬曰兵部曰職方曰駕部曰庫部以三銓之法領其事以五等閲其功以三竒拔其異武官之勳祿品命自驃騎輔國而下至于仁勇陪戎敘階之法凡二十有九焉自上柱國而下至于雲騎武騎勳官之等亦十有二焉左右衛之親勳翊則通謂之三衛左右衛之三衛則分為五仗成丁而入六十而免量其逺近以定其番第自京兆河南蒲同華岐等則皆令番上餘州則納資而已凡親王總戎則曰元帥文武官總統則曰總管以奉使而言之則曰節度使凡天下之節度有八又有大使副使之名焉職方之掌鎮戍有上鎮中鎮下鎮上戍中戍下戍之號駕部之掌輿輦車乘天下之傳驛凡三十里一驛焉此兵部所統之大略也刑部之職掌天下之刑法自尚書侍郎而下其屬有四曰刑部曰都官曰比部曰司門文法之名有四曰律曰令曰格式此刑部之大略也工部之職掌天下之百工屯田自尚書侍郎而下其屬有四曰工部曰屯田曰虞部曰水部凡軍州邊防鎮守轉運不給則設屯田以益軍儲凡天下諸軍州管屯總九百九十有二凡屯各有屯官屯副文武職事官則有職分田在京諸司則有公廨田此工部之大略也自侍中黃門侍郎而下曰給事中曰左散騎常侍曰左諫議大夫曰左補闕拾遺曰起居郎曰𢎞文館學士則皆屬於門下省焉自中書令中書侍郎而下曰中書舍人曰右散騎常侍曰右補闕拾遺曰起居舍人曰通事舍人曰集賢殿書院學士曰集賢院學士曰史館則皆屬於中書省焉夫侍中所以掌出納帝命而黃門為之二至給事中則分判省事百司奏抄侍中審定則先讀而書之以駮正遺失此門下之制也中書令所以掌軍國之大政而侍中為之二至中書舍人則詔旨制敕起草進畫既下則行之此中書之制也然曰散騎曰諫議曰補闕曰拾遺其左乃屬於門下其右乃屬於中書何也曰起居曰𢎞文既屬之門下矣曰舍人曰通事曰集賢曰史館乃屬之中書何也竊考唐中書門下之兩省乃在於宣政殿之東西廡其地亦邃矣則凡諫正之事講論之益記注之官正欲隨所在而致其力也是以命出於中書則造命之地有人焉命行於門下而審覆之地有人焉此建官之美意也至於祕書監之掌經籍圖畫之事而有經史子集四部之别其下又有二局焉曰著作局者所以掌撰碑文之屬曰太史局者所以掌厯數天文之事此又祕書省之制也其外有殿中省內侍省並列為六省焉至於御史臺則以御史大夫為之長曰中丞曰侍御曰殿中曰監察御史皆臺官也自馬周以布衣太宗令於監察御史裏行自此遂有裏行之號此御史臺之制也其次太常光祿而下及于太府者九寺之制也國子監而下及于都水者五監之制也左右衛而下曰驍騎曰武騎曰威衛曰領軍衛曰金吾衛曰監門衛曰千牛衛皆有左有右者此十六衛也夫所謂衛者何也唐制每衛則有大將軍有將軍有中郎將凡兵士𨽻衛各有其名𨽻左右衛者則曰驍騎𨽻驍衛者則曰豹騎𨽻武衛者則曰熊渠𨽻威衛者則曰羽林𨽻領軍衛者則曰射聲𨽻金吾衛者則曰佽飛總名為衛士皆取六品以下子孫充之如左右衛大將軍職掌宫庭警衛之法凡親勳翊五中郎將及折勳府所𨽻者皆總衛焉則左右衛者又諸衛之長也其曰親府曰勳一府曰勳二府曰翊一府曰翊二府號曰五府總曰三衛皆左右衛之制也若左右驍衛武衛威衛左右領軍衛其掌皆如左右衛而金吾則掌宫中及京城巡警之法監門衛則掌諸禁衛門籍之法千牛衛則掌宫殿侍衛及宫御之儀仗者也每府則有折衝都尉左右果毅都尉夫折衝之職掌領五校之屬以備宿衛凡衛士三百人為團以一校尉領之以便習騎射者為越騎餘為步兵其團十人為火凡兵馬在府每季冬折衝都尉率五校之屬以教其軍陳戰鬪之法其果毅則為之二此皆十六衛之制也杜牧以為內以十六衛蓄養戎臣唐會要以為置十二衛將軍分關中諸府𨽻焉唐制以為唐因隋置十二衛唐鑑載武德中以十四衛為京職事官其説不同何也蓋唐志十六衛中領府者十有二而監門千牛不與焉十六衛之外又有左右羽林軍職統北衛禁軍之法此皆見於六典之可考者也然六典之建實效周制今以李林甫所注者考之如六部尚書所以倣周之六卿也尚書之下有侍郎所以倣周禮六官之二也郎中之制所以倣周禮六官之屬所謂下大夫者也員外之制所以倣周禮六官之屬所謂上士者也不獨此也中書令者所以倣周之內史也史館史官所以倣周之太史小史也祕書省所以倣周之外史也然則六典之建豈非有意於法古哉然侍中黃門本秦漢之制也給事諫議亦秦漢之制也尚書六曹之名蓋自漢而始盛𣪚騎常侍之名蓋自魏而始合唐實踵而行之則其所謂法古者又不獨在於周矣然唐之制雖不純於周而其親近儒士之意則猶古意何也有常參官有供奉官有清望官有清官皆儒士也如五品以上職事官八品以上供奉官至於太常博士之屬則謂之常參官侍中中書令左右𣪚騎常侍黃門中書侍郎諫議大夫給事中中書舍人起居郎起居舍人左右補闕拾遺中丞侍御史之屬則謂之供奉官黃門侍郎尚書左右丞諸司侍郎太常少卿祕書少監國子司業等則謂之清望官如諭德如給舍臺諫左右史諸司員外郎至於四門助教皆謂之清官每日以三品已上清官兩人待制於衙內此豈非樂親儒士之意乎如𢎞文集賢翰林學士之類則又有可言者自武德貞觀以來妙選賢良文學之士為𢎞文學士曰直學士曰文學直館所置無員數自禇無量檢校館務而學士號為館主其後有張太素劉禕之范履氷並以特敕相次為館主此非𢎞文之盛事歟自太宗秦府學士之後𢎞文崇文皆有學士元宗大收羣書以廣儒術命禇無量馬懷素校四部書於乾元張説為修書使於是改修書所為集賢殿書院以説為大學士其後更置修撰校理多以他官為之加無量懷素侍講之號至集賢院學士則又偹顧問應對承旨撰集文章此又集賢之盛事也獨六典所載而於翰林學士特缺焉然以唐百官志考之則知翰林之有學士乃在於開元之二十六年而六典固已成故唐志謂𢎞文集賢分𨽻中書門下省而翰林學士獨無所屬特附於百官之序云今其言曰唐制乘輿所在必有文詞經學之士自太宗時名儒學士時時召以草制然猶未有名號乾封以後始號為北門學士元宗初置翰林待詔以張説張九齡為之掌四方表疏批答應和文章號翰林供奉與集賢院學士分掌制誥書敕開元之二十六年始改供奉為學士别置學士院専掌內命選用益重而禮益親至號為內相初無定員自諸曹尚書而下至校書郎皆得與選內宴則居宰相之下一品之上憲宗又置承旨於是又有翰林承旨之名豈非其尊重儒生之意乎此其制度之美也若夫凡出身非清流者不注清資之官凡注官階卑而擬髙者則曰守階髙而擬卑者則曰行其在吏部兵部考功都省御史臺中書門下是謂之前行要望目為七司其餘則曰後行間局其制亦不可不知也然以唐志而較之六典専於尚書令之下則曰左右丞相而唐志乃謂之左右僕六典於太學博士之下則繼以四時博士而唐志於太學博士之下乃有廣文館博士天寶時置唐志於羽林軍之後又有左右龍武神武神䇿之名而六典無之此豈非六典所載乃開元以前之制而唐志所載者乃開元以後之制乎此又考制度之所當知者故附見焉唐太宗定功臣髙祖論太原首功自裴寂劉文靜而下至于趙文恪許世緒之徒凡十有四人武德九年太宗復定功臣而文靜已沒故自寂而下至于秦行師馬三寶之屬等其功之小大而第之總為四十有三人焉今以其傳而考之自趙文恪而下十有八人雖附見於裴寂傳後而其功不為甚顯君子不暇論也惟寂等三十人已見於傳則其功有可言者如裴寂之共建大計長孫無忌之入定大難李藥師之南平江陵北破突厥西定吐谷渾而遼東之役猶有雖老尚堪一行之語則靖之功為可知李懋功之平建德俘世充降黑闥而又破頡利於磧北使突厥稽首請命而不敢南向殆有賢於長城者則績之功為可知其他如從破建德則羅藝尉遲敬德從平黑闥則李子和殷開山至於徇巴蜀降蕭銑則趙王孝恭也平師都討谷渾則柴紹也破潼關而遂定陕者長孫順德也從戰東都以少擊衆者王君廣也劉𢎞基之討薛舉劉政會之圖武周竇軌之起兵募衆略地渭南髙士亷之能舉交趾歸心附義屈突通不牽於質子之愛而以死許國故有烈士徇名之稱唐儉雖有武周之辱猶籍府庫而有不敢忘朝廷之志秦叔寶之先鋒鏖陳程知節之搴旗先登封德彛之議軍事而髙祖謂雖張華叶策晉武亦何以加則軍謀為可取假志元之堅守軍門而太宗謂周亞夫亦何以加則軍政為可法蕭瑀有疾風徑草之節足為社稷之臣杜淹有才辨多聞之名足居左右之任宇文士及當濟北豪傑竊觀形勢之時而能獨歸王室張亮當謀伐髙麗他人畏怯之時而毅然請行張公謹之經略突厥侯君集之能平髙昌此皆其效績於一戰之間者也故史臣贊之曰帝王之興其威靈氣焰有以動物悟人者故士有一槩皆填然躍而附之若椽榱梁柱以成大室義負偃植各安所施而無遺材諸將之謂耶雖然又有大於此者玄齡杖策軍門一見如舊獨收人物致于幕府下與諸將密相申結人人願盡死力故太宗嘗曰玄齡有決勝帷幄立社稷功蕭何所以先諸將也則玄齡之功為如何如晦之常從征伐參謀帷幄時方多事裁處無留莫見其涯故玄齡嘗謂帝曰必欲經營四方捨如晦無共功者則如晦之功為如何若夫玄齡之善謀如晦之善斷二人同心叶濟以佐帝室當紀綱雕弛之餘而能興仆植僵使號令典刑燦然罔不備雖數百年猶蒙其澤可謂名相然求其所以致之之迹逮不可見何哉唐栁芳有言削定禍亂而房杜不言功王魏善諫而房杜遜其直英衛善兵而房杜濟以文持衆美而效之君輔贊彌縫而藏諸用使人由而不知是後新進更用事玄齡身處要地而不吝權善始以終此其成令名者故當時語良相必曰房杜云此又餘子之所可並論也然而武德功臣之次不始於房杜而乃以裴寂為先豈非特以晉陽之始謀乎其後至德宗時録武德以來宰相功臣詔差為二等凡增至百八十有七人每等則以武德以來宰相為首功臣次之至德肅宗以來將相又次之故房杜之名乃在諸臣之首今自房杜而下至于南霽雲凡八十二人為第一等自竇威而下至于李憕姚誾凡百有五人為第二等並載其名於忠義傳後者即當時所定之次也裴寂傳始髙祖論太原首功詔尚書令秦王尚書左僕射裴寂納言劉文靖恕二死左驍衛大將軍長孫順德右驍衛大將軍劉𢎞基右屯衛大將軍竇琮左翊衛大將軍柴紹內史侍郎唐儉吏部侍郎殷開山鴻臚卿劉世龍衛尉少卿劉政會都水監趙文恪庫部郎中武士彠驃騎將軍張平髙李思行李髙遷左屯衛府長史許世緒等十四人恕一死武德九年十月太宗又定功臣封户時文靜已死乃自寂而下差功大小第之揔四十三人寂户千五百長孫無忌王君廓尉遲敬德房玄齡杜如晦户千三百長孫順德柴紹羅藝趙郡王孝恭户一千二百侯君集張公謹劉師立户千李績劉𢎞基户九百髙士亷宇文士及秦叔寶程知節户七百安興貴安修仁唐儉竇軌屈突通蕭瑀封德彛劉義節户六百錢九隴樊興公孫武達李孟常假志玄龎卿惲張亮李藥師杜淹元仲文户四百張長遜張平髙李安逺李子和秦行師馬三寶户三百長孫無忌傳貞觀十一年乃詔有司朕憑明靈之佑賢佐之力克剪多難掃清宇內蓋時屯共資其力世安專享其利朕所不取刺史古諸侯雖名不同而監統一也無忌等義貫休戚效挺夷儉嘉庸懿績簡在朕心其改錫土宇用世及之制乃以無忌為趙州刺史以趙為公國房玄齡宋州刺史國於梁杜如晦贈密州刺史國於萊李靖濮州刺史國於衛髙士亷申州刺史國於申道宗鄂州刺史王江夏尉遲敬德宣州刺史國於鄂侯君集陳州刺史國於陳孝恭觀州刺史王河間李績蘄州刺史國於英假志玄金州刺史國於褒程知節普州刺史國於盧劉𢎞基朗州刺史國於夔張亮李州刺史國於鄖凡十有四人餘官食邑尚不在李澄傳武德功臣十六人貞觀功臣五十三人至德功臣二百六十五人德宗即位録武德以來宰相及實封功臣子孫賜一子正員官史館考勳名特