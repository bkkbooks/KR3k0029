body:
  text: 羣書考索後集卷五十二宋章如愚編財門漕運言兵之患財賦之不足過計也興師十萬日費千金千里饋糧士有飢色賦者兵之所急而不足以為患何邪及觀周禮國用悉見於九式而獨於軍旅之費不與焉當是時兵農不分而國無養兵之費司馬所掌而軍政屬焉而又設六軍之衆軍賦所出卒因井田之制自地方一里而為井而至於成方十里自成十為終而至於同方百里自同十為封而至於畿方千里截然有序於是而有稅有賦而兵食所仰以是蓋先王之時自都逹境十里有飲食三十里有委五十里有積以待師旅又有委人軍旅共其委積疆埸有積倉之具徹申伯土疆以峙其糧而左氏亦云衛取於相土之東都以㑹王之東搜定四年積倉於豳峙糧於申㑹搜之備逹於衛境天下之富藏亦可見矣春秋之世猶有存者齊桓之師陳鄭欲供資糧屝屨僖四年晋文城濮之役館榖楚地三月楚師伐庸自廬以往振廪同食烏有賫糧轉送者耶秦人貪於聚斂以千八百國之民自養賈山雖瀕海之粟亦致京師伍被傳丁男力耕不足糧餉滎陽又置敖倉亦聚逺方之粟負海之郡轉輸河北率三十鍾而致二石先王之制蕩然矣漢因秦敖倉之舊嵗漕關東粟以給京師自是而後漸致其弊淮南地逺或數千里遙屬於漢而吏卒遙役往長安道中衣裝悉自備吳楚兵起長安中列侯從軍者皆貸子錢以自餉西南夷役負擔餽餉費千金鍾致一石而戰士之祿塞卒之糧班班見於信史食貨志與霍去病傳按大司農職凡郡國所積錢穀隨時轉送以供國用邊郡諸官請調度者皆為報給損多寡取相給足大農錢盡則以少府續之夫移郡國之財以給邊費自為勞擾而已此轉漕之病所以相望於秦漢而下也故耿夀昌在宣帝請糴三輔𢎞農等郡榖以給京師而省關東漕卒亦可見也唐都長安而關中號稱沃野然其土地狹所出不足以給京師備水旱故嘗轉漕東南之粟髙祖太宗之時用物有節而易贍水陸漕運嵗不過二十萬石髙宗以後嵗益增多江淮漕米至於東都陸運至陜其費不資開元中裴耀卿請罷陜陸運而置河口使江南漕舟至河口者轉粟於倉而去江南之舟不入黃河黃河之舟不入洛口而河陽柏崖太原永豐渭南諸倉節次轉運故三嵗漕七百萬石省陸運錢三十萬緡代宗廣德中劉晏專領轉輸晏為歇艎又江船二千艘自揚州至河隂江船不入汴汴船不入河河船不入渭江南之運積揚州汴河之運積河隂河船之運積渭口渭船之運入太倉嵗轉運百一十萬石常平義倉成周養民之法縣都有委積倉廪有分頒振荒恤災具載禮典古先聖人法制豫防俾嵗雖凶而常豐民雖貧而常足者罔不由此唐自太宗立口分田以制民之産設租庸調以斂民之財市無濫征田無橫賦民生其時既富既庶而帝心猶惟惠民之務是講是求貞觀三年戴胄言隋固有社倉儲民所輸以備一嵗民免饑饉時號良法今聖仁在御約已便民無復遺利社倉之制尚未及舉臣愚謂可倣隋舊法立義倉以廣儲蓄乃自王公以下爰及衆庶計墾田之數畝稅二升粟麥粳稻隨地所宜鄉之寬狹田之登耗悉為定制商賈無田者以户為九等自石至斗其數有差貯之州縣以備歉嵗於是四海之廣廪庾相望隨致斗米三錢之效言唐治者以太宗為首義倉之立不為無助也厥後明皇開元踵而行之申賑給之法嚴變易之禁致治之美相與比隆彼漢之文景太倉有紅腐之粟百姓有家給之效顯宗永平粟直止三十立常滿倉於京師可謂盛矣乃不能設斂散之法以垂無窮回視太宗之制一何異歟栁宗元作貞符鋪張有唐受命之懿有曰鄉為義廪斂發謹飭嵗丁大浸人似有年端不誣已其後洛相豳并秦蒲等州各有儲蓄有九年五年之制又自别為常平倉至肅宗時第五琦請天下常平倉皆置庫以蓄本錢趙贊請竹木茶漆稅十之一以贍常平本錢皆常平之事也宋義倉始於建隆而復備於慶厯常平立於淳化而廣於景德蓄積古者三年耕必有一年之食九年耕必有三年之食以三十年之通制國用雖有水旱民無菜色周官遺人掌邦之委積以待施惠自鄉里而至於關市自野鄙而至於都縣莫不皆有委積倉人則掌粟入之藏以待邦用廪人掌九穀之數以詔穀用如積倉於豳峙糧於申㑹搜之備逹於衛境天下之藏亦可見矣秦人盡斂天下之財賦負海之粟歸於京師男子力耕不足糧餉西漢之興髙帝就食蜀漢天下既定民無蓋藏於是省法約禁輕田租十五而稅一轉漕關東粟以給中都官嵗不過數十萬石孝文恭儉節用勸課農田故賈誼有論蓄積之疏以為積貯者天下之大命也漢之為漢幾四十年矣公私之積猶可哀痛於是開藉田躬耕以勸百姓朝錯有廣蓄積之䇿以為明主廣蓄積以實倉廪備水旱故民可得而有於是募天下入粟縣官以拜爵除罪是以太倉之粟陳陳相因充溢露積於外腐敗而不可食孝武外事四夷內興功利役費並興而民去本故末年海內虛耗而趙過代田之䇿始事務本用力少而得穀多宣帝時耿壽昌請置常平倉以省漕運唐太宗時備凶荒則有社倉從戴胄之議則又置義倉其後又置常平倉粟藏九年米藏五年故貞觀間斗米三錢行旅不賫糧開元之際海內富貴米斗之價不過十三末年用不知節錢榖之臣始事朘削漁陽之變民物廢耗天下蕭然藝祖建隆之初命朝臣以掌倉廪淳化之時又置常平倉河東之地立和糴之法真宗咸平之間則惠民又有倉矣仁宗嘉祐之間則廣惠又有倉矣鹽鐡酒茶鹽鐡酒茶皆起於漢唐兵興之時而皆足以裕國昔猗頓於鹽池煮鹽與王者埒富而蜀之卓氏即鐵山鼓鑄而富至童八百人自鄭當時薦齊之大鬻鹽與南陽之大冶而鹽鐡悉在官郡國置鹽官者三十九鴈門沃陽有長丞焉置鐡官者五十一而不出鐡者有小鐡官焉天下之私煮鐡器者有刑故董仲舒曰今鹽鐡之利二十倍於古元始之間賢良文學議罷鹽鐡而桑大夫力爭之惟恐國用之不足此漢鹽鐡之大略也唐之鹽池十八井六百四十皆𨽻度支第五琦初變鹽法盡𣙜天下鹽斗加其價自兵起後不足供費劉晏於是上鹽法輕重之冝以鹽利多則州縣擾惟出鹽鄉因舊吏亭户糶商人縱其所之江嶺去鹽逺者有常平鹽每商人不至則减價以糶民官收厚利而人不知貴晏之始至也鹽鐡嵗才二十萬緡至大厯末六百餘萬緍天下之賦鹽利居半至於李巽繼之三倍晏時此唐鹽之大略也酒之𣙜也始於漢自武帝天漢三年始漢𣙜酒而唐初無酒禁肅宗時禁酤酒元和間罷京師酤肆以𣙜酒錢隨兩稅青苖斂之凡百五十萬餘緡茶之稅也始於唐自趙贊在德宗時稅天下茶張滂繼之自是嵗得四十萬穆宗時王播乃增天下茶稅和糴開元中西北邊數十州常宿重兵地租營田皆不能贍始用和糴之䇿有彭梁者請行糴法於關中命增時價什二三和糴東西畿粟各數百萬斛江淮所運租自是關中蓄積羡溢車駕不復幸東都矣天寶中嵗以錢六十萬緍賦諸道和糴貞元初吐蕃劫盟召諸道兵十七萬戍邊月給粟十七萬斛皆糴於漢中德宗興元初詔所在和糴上入趙充竒家問百姓樂乎對曰和糴而實强取不識一錢愁苦如此何樂之有憲宗即位之初有司以嵗豐稔請畿內和糴當時府縣促督限有稽違則迫蹙鞭撻甚於賦稅號為和糴其實害民貞元八年陸贄上書請令户部以二十萬付京兆令尹令糴米以補渭橋之闕斗用百錢以利農人以百餘萬付邊鎮吏糴十萬人一年之糧自是詔西北邊貴糴以實倉儲邊偹浸充仁宗時韓琦論和糴之弊曰若非髙於市糴何人肯糶於官力請增價太祖建隆元年河北豐稔命使添價散糴以惠貧民太宗淳化二年京畿大穰遣使增價以糴貯於近倉財用九賦之斂財賄九式之節財用則冡宰掌之頒其貨於受財之府頒其賄於受用之府太府掌之職內以掌邦之賦入職賦以掌邦之賦出職幣則又振掌事者之餘財而上之用財用則必考于司㑹此成周之所以無乏用也秦人盡數斂天下財雖負海之粟亦歸之京師賈山所謂千八百國之君自養者也漢量吏祿度官用以賦於民而山川園池市肆租稅之入自天子至封君湯沭邑皆各為奉養不領天子之經費孝文用朝錯之䇿募天下入粟縣官得以拜爵免罪孝景三十稅一其後復修賣爵令及徒復作府庫餘財京師之錢至巨萬貫朽而不可校太倉之粟至陳腐而不可食武帝之時患幣之輕也而鑄白金造皮幣患商賈之重而算舟車及緍錢賣爵免罪矣郡國置農官矣行均輸矣𣙜鹽酒醋矣日用宜滋益矣然而忽有水旱之變往往不給昆邪之降至不能具三萬乘兩軍之出塞戰士頗不得祿何直若是凛凛也蓋漢武帝承文景富庶之後內多欲而外事兵役徒見其取諸民之未病也則重賦斂而不拯恤曽不知文景休養生息之餘所賴以扶持而海內虛耗之弊始於末年見之唐之始授人以口分世業之田而取之以租庸調之法其用之也有節蓋其蓄兵以府衛之制故兵雖多而無所損設官有常員之數故官不濫而易祿明皇初至於開元國用猶足天寶以來外奉軍兵於是韋堅楊愼矜王鉷楊國忠各以裒刻進代宗時劉晏用𣙜鹽法以充軍國之用其始江淮鹽利不過四十萬季年乃六百萬用漕運法以轉相給受每嵗運鹽或至百餘萬斛排商賈以制低昂常操天下贏貨以佐軍興雖拏兵數十年斂不及民而用度足德宗用楊炎因租庸調法壞遂作稅法取大厯中一年科率多者為兩稅法其後朱泚之反用益不足而借商之令出陳京請借富商賈錢陳少遊請增本道稅錢趙贊請稅緍錢除陌錢已而又有析紬曰進奉曰宣索曰和市此大厯之數再倍矣故陸贄上疏言兩稅新制竭耗編氓以錢為賦其害尤甚德宗自居奉天儲蓄空窘朱泚既平於是屬意聚斂有日進又有月進自裴延齡用事益為天子積私財而生民重困憲宗罷進奉而分天下之賦以為三一曰上供二曰邊使三曰留州及用皇甫鏄由是益刻剝矣宋制三司使以總國計應四方貢賦之入朝廷未嘗與也一歸三司總鹽鐡度支户部計省使其所掌之財勘磨財賦則悉置磨勘司造作軍器則歸之霄案水土之正則𨽻之修造河防之役則歸之河渠案且國家工役之費無出於三事其所用為耗蠧之大者必欲三司使總之乃可節以制度也稅賦古者冡宰以九賦斂財用自邦中之賦而至於幣斂之賦取之為有度太府以式法受財用自關市之賦以待膳服至於幣餘之賦以待賜豫而用之為有節載師之近郊十一逺郊二十而三則取於田者不至於過㕓人掌斂市絘布總布質布罰布㕓布而入於泉府則取之於市者不至於多自秦人以頭㑹箕斂之法盡括天下之財賦而民不能以聊生漢興田租十五而稅一或三十而稅一或五十而稅一或賜其田租之半或令民無出今年租則其賦為甚薄民年十五以上至五十亦出賦錢百二十民生七嵗至十四出口錢賦又戍邊則曰更賦則其賦為有利觀文帝時諸侯無入貢郡國無來獻除田租稅關無用傳弛山澤之賦惟市肆之租不聞蠲减之詔往往以抑末之故也武帝之時舟車緍錢則有算鹽鐡酒醪則有𣙜其所以司斂藏輸納之職田租則領於司農渠田則入於少府假民之田則有稻田使者掌焉池苑之所田者則有水衡掌焉海租則歸之海丞魚鹽則歸之魚官用度疑若有餘也然貫朽紅腐之效不復見於武帝之世而大農錢盡賦稅耗竭文帝之時有是乎方唐之初授田百畝嵗輸粟稻謂之租此所謂稅也丁則嵗嵗輸綾絹絁布謂之調用人之力嵗二十日不役則收其庸此所謂賦也自貞觀至開元未嘗有所變也天寶以後供億不常漸隳經制肅宗始用第五琦𣙜鹽劉晏繼之其初鹽利嵗四十萬緍至末年則六百餘萬德宗始用趙贊𣙜茶張滂繼之茶利嵗以四十萬緍至其後則增倍矣楊炎始取軍興以來非法賦斂如急備如供軍如折估如宣索之類皆合之以為兩稅陸贄以為兩稅新法耗竭編氓日月滋甚則賦斂之重至於兩稅極矣而猶以為不足如借商錢如稅間架如算除陌如日進如月進方且源源而未巳何開元以前取之少而用不至於乏天寶以後取之加多益以不足也昔歐陽文忠公作唐食貨志始叙租庸調之制謂其始也用之有節畜兵以宿衛故兵多而無損設官有常員故官不濫而易祿此所以善也其後兵冗官濫而用度之數復不節此所以弊也宋乾德之初諸州民田有荒甚者即蠲其租不待奏太平興國之間津渡鎖稅有仍五代之舊者一切罷去天聖中兩稅之外不許發運如稅茶鹽課虧則不使三司增額漢世祖入則有田園山澤門關市肆之租舟車緍錢則有算鹽鐵酒醪則有榷郡國供貢與夫均輸平凖之利國賦算缺賦與夫免更之錢其外則又有贖罪賣爵之目焉其所以司斂藏輸納之職則田租領於司農矣而渠田入於少府陵田入於太常而假民之田則有稻田使者掌焉池苑之所田者又有水衡掌焉其所謂賦入之最多者曰鹽鐡則始之於司農最後又分於水衡矣若其山海池澤之稅則主之少府以給供養故海租歸之海丞少府之屬也市肆之租本給供養不領經費則少府事也酎金所以供宗廟嘗酎之用而少府省之其他關租則掌之關都尉贖罪之錢則典之北軍尉而司農之職除田租鹽鐡之外則舟車緍錢酒𣙜均輸平凖口賦算賦賣爵之類而已及改其支用之目則山川園池市肆租稅之入以為私奉養田租以給軍食算賦錢則治庫兵車馬而又取口賦養天子之餘以補之過更錢以給更卒酎金以供祭祀關稅以給關市罰錢以給北軍之用而鹽鐡舟車緍錢之利與夫郡國租入之類則以供軍興至於軍市租則又或以給士卒焉觀此則漢財賦之斂藏調用之目略可覩矣觀文帝時諸侯無入貢郡國無來賦除田稅租關無用傳弛山澤賦惟市肆之租不聞蠲减之詔正欲抑末趨本也武帝之時患幣之輕也而鑄白金造皮幣患商賈之重也而算舟車告緍錢賣爵免罪郡國置農官矣行均輸𣙜鹽酒酤矣財用宜益滋也然而忽有水旱之變往往不給昆邪之降至不能興三萬乘兩軍之出塞戰士頗不得祿何直若是凛凛也秦之商君漢之朝錯其為術刻矣而其治財猶知本末至如後世一切用商君之法使民耕織致粟帛布復其身朝錯之法使民入粟買爵而勿收其租武帝承文景富庶之後內多欲而外事兵役彼徒見其取諸民之未病也則重賦斂而不恤曽不知文景休養生息之餘所賴以扶持而海內虛耗之弊始於末年見之自其兵役之興而轉移餽餉之煩也而農民困自其斡鹽鐡置均輸算商告緍也而商人困自其賣爵而得以免罪也而富民困自其立轉遷之法而入財補郎也而世家之子弟困自其差出馬也而封君之吏三百石以上困自其造皮幣省酎金也而列侯困雖然民田什五稅一宜歸之大司農諸倉悉在郡國嵗漕關東粟給中都僅不過數十萬石而已算賦為錢百有二十古之所以供士馬車徒之費而今所謂調也然十月朝獻其入司農者才六十三而在郡國者尚五十七也更之不役者出平價今所謂庸也而更卒庸錢悉在州郡蓋時以假貸貧民彼其視天下猶一家也財粟之積在在而有忽有水旱之變夷狄盜賊之虞則即用其民即發其粟即調其車馬器械是故雖有災變而莫為之憂漢之所謂有瓦解而無土崩者其或以此唐租庸調之法以人丁為本自開元以後天下户籍久而不更造田畝賣易貧富升降不實其後兵興財用益出而租庸調法弊壞自代宗時不以畝定稅而斂以夏秋德宗用楊炎遂作兩稅置兩稅使以總之量出制入户無主客以居者薄人無丁中以貧富為差取大厯中一年科率多者為兩稅定法然法既行民力未及寬而朱滔王武俊田悅合從而叛用益不足而借商之令出韋都資陳京請借富商錢淮南陳少遊請增本道稅錢趙贊閲商賈之錢舟緍稅二十竹木茶漆稅十之一以贍常平本錢其後請稅間架算除陌及朱泚平天下户口三耗其二貞元四年詔天下兩稅審等第髙下三年一定自初兩稅貨重錢輕既而物價愈下所納愈多雖賦不增舊而民愈困矣度支以貨物頒諸司皆增本價為虛估以給之而謂之折納復有進奉宣索之名改科役曰召雇率配曰和市以巧避微文比大厯之數再倍陸贄上疏請釐革其甚害者其言兩稅新制竭耗編氓以錢為賦其害尤甚然德宗自居奉天儲蓄空窘朱泚既平於是屬意聚斂常奉之外進奉不息西川節度韋臯則有日進江西觀察李亷則有月進淮南節度杜亞等以常賦入貢名曰羡餘其外又有進奉刺史進奉自裴肅始判官進奉自嚴授始自裴延齡用事益為天子積私財而生民重困憲宗罷進奉而分天下之賦以為三一曰上供二曰送使三曰留州皇甫鏄遂由是益刻剝穆宗時錢重物輕比兩稅初大率加三倍帝亦以貨輕錢重民困而用不充詔百官議革其弊而議者多請重挾銅之律楊於陵曰王者制錢以權百貨古者權之於上今縻之於下昔散之四方今藏之公府昔廣鑄以資用今减爐以廢工昔行之於中夏今泄之於邊裔今宜悉輸之以布帛榖粟由是兩稅上供留州皆易以布帛租庸課調不計錢而納布帛云嘗厯考唐一代財貨損益盈虛而切有疑焉方唐之初其取於民者有田則有租有身則有庸有家則有調自貞觀至開元未嘗有所更變也天寶以後供億不常漸隳經制肅宗始用第五琦𣙜鹽劉晏繼之其初鹽利四十萬緍至季年則六百餘萬矣德宗始用趙贊𣙜茶張滂繼之茶稅嵗以四十萬緍至其後則增倍之楊炎始取軍興以來非法賦斂如急偹如健軍如折估如宣索之類皆合之以兩稅陸贄以為兩稅新法竭耗編氓日月滋甚則賦斂之重至兩稅極矣而猶以為不足如借商錢如稅間架如算除陌如日進月進方且源源不已何開元以前取之少而不至於乏天寶以後取之加多而益以不足也竊求其所以制兵者而得其說焉蓋唐因舊制立府兵之法有事則出而為兵無事則隱之於農則有為兵之利而無當兵之害此其所以取之少而用之不乏也自明皇以府兵耗散用張說之議變府兵為廣騎朝廷有禁兵藩鎮有衛兵兵農於是乎判故雖安平之時而不免饋餉之費此其取之多而用常不足也抑嘗合漢唐而論之漢之法比於三代為重當時有所謂卒更踐更過更又有算賦獻賦取於民者非一疑若非甚苛而民不告病者惟於農甚優而田稅則甚輕如髙帝十五稅一孝惠復行之文帝今年賜田租之半明年又除民田租至景帝則又三十稅一其待農者既厚故其他賦雖重亦無害也武帝悉意改作費用百出桑洪羊孔僅謀利紛然至於海內虛耗然輪臺之詔一下而民有息肩之意者蓋當時取民之法固為甚苛而漢家二十稅一之法猶存而不改雖商賈重困於農則無加損觀西域傳曰當時有司亦請益民賦三十以助邊用而帝不從至于唐租庸調亦良法也奈何德宗從楊炎之請遽變為兩稅使其他雜賦有出於商賈漆林之征者亦併取給於田是雖曰省賦而農民之蠧亦甚矣此終唐之世民無聊生而亂亡隨之也唐賦稅鹽茶酒錢楮坑冶銅禁宋朝生財之法多因於唐今日乏財之患乃甚於唐愚嘗讀唐食貨志而竊疑之昔歐陽公作唐書諸志而其於食貨尤詳曰賦稅曰茶鹽曰𣙜酤曰銅錢曰飛錢曰坑冶曰銅禁皆次第而歷言其本末是非特為唐設也所以見我朝之源流相因如此也自今觀之租庸調之後易以兩稅是時唐都長安常入東南之粟以給關中肅代之世兩河用兵費用百出當時大半之用出於東南是唐之賦稅不見其不足唐之鹽利皆𨽻度支自第五琦始變鹽法而權天下之鹽及劉晏上鹽法輕重之冝縱商人之所之故晏之始至也鹽利嵗才四十萬緍至大厯末六百餘萬緍是唐之鹽法不見其不足茶之有稅始於趙贊張滂繼之嵗得錢四十萬其後王涯置榷茶使而榷茶之法始於此矣是茶之在唐未嘗乏也唐初雖無酒禁自廣德中定天下酤户以月收稅其後以榷酒錢隨兩稅青苖斂之凡天下酤酒錢百五十六萬是酒之在唐未嘗乏也劉晏易江淮鹽炭以廣鑄錢嵗得十餘萬韓洎請復洺源廢監而起十爐嵗得錢七萬餘緡是鑄錢之利又盛於唐唐自憲宗止有飛錢之制令商賈至京師委錢於富家而以輕裝趍四方合劵乃取號為飛錢是楮幣之端又原於唐唐之銀銅鐡錫一百六十餘萬韓洄建議請山澤之利宜歸王者自是皆𨽻於鹽鐡使是坑冶之利在唐為盛貞元之初張滂奏江淮鑄銅為器文宗時李珏請禁銅器一切市之於官是禁銅之法在唐為嚴今日之賦稅亦唐法也而又有所謂和買又有所謂折帛而大農常患於或損今日之鹽法亦唐法也而又有所謂舊鈔又有所謂新錢而鹽課常患其或虧今日之茶法豈非因於唐乎長引短引嵗有定數而州縣征商常不及額今日之酒酤豈非因於唐乎户部之犒賞不聞贏餘州縣之贍軍不聞溢數錢之在今也有邊關漏泄之弊有鉟銷鼓鑄之弊雖嚴其禁而錢愈不見其多楮之在今也有兌易折閲之弊有僞造換易之弊雖嚴其法而諸弊不見其重坑冶之利非不置使以專掌而採於山者有限而生於地者易窮銅器之禁非不申明其法以嚴禁而今日稍稍知懼數月之後浸以如故何乃用唐之法而終不能以如唐歟豈古今之異宜而事勢之不相類歟豈法制之未備而不能窮其利歟又豈非謀議之臣尚有餘智而未能以悉計歟非也蓋唐劉晏李巽韓洄之徒或為户部或為度支或為轉運或為鹽鐡皆能通知其財貨之本末而後隨其盈虛損益之勢斟酌而斡旋之故能使利源不竭而國賴其用今之尚書版曹所以總財貨之權其次則有司農有常平有轉運坑冶往往朝而處之暮而易之未有能通知其本末之所在者雖知其賦稅之當减者也茶鹽之當去也榷酤之當罷也鑄錢之當多也楮幣之當重也坑冶之不可以不盈也銅器之不可以不禁也大抵隨事而議隨弊而救而不深明其所以然之故此其患在於士大夫以財賦之職為假途也天下之事皆易知惟財計之弊非深明其利害則未易論也况利源之在天下本末常竭而今日東南之地又自古財用之區曩時之國於此者玉帛之餘波及他國封於此者銅鹽之利遍於天下或獨倚辦偏方以成鼎峙之勢或專領江淮以當租稅之半而國家全盛之時備禦西戎北狄宿兵方饒使無缺事亦皆仰給於東南安有曩時皆然而今獨不然耶執事試以愚言思之財用之乏非所憂也錢錢法自九府圜法始而鼓鑄之官於周典無所可考景王鑄大錢之日尚未聞有禁令而秦漢之間始聞其說意是法之立其自秦始乎漢之錢法凡九變自初變泰錢而用莢錢高后變為八銖變而為五分即莢錢之制也已變為四銖其文半兩而重不稱然自文景皆用其法迄無變更而建元元年始輕之為三銖焉自此錢法蓋多變矣或為半兩或為三銖或為五銖然自五銖行後民多盜鑄乃始鑄赤仄錢以一當五後患民之盜鑄乃更令上林三官鑄錢而錢法始定夫錢禁之嚴亦自漢始凡盜鑄者棄市而鄰五家坐之闌出徼外亦案沒入文帝最為仁民之主至雜錢罪黥之刑乃創見於此時賈生曰鑄銅錫為錢敢雜以他巧者其罪黥武帝之世乃復定鑄錢棄市之律及赤仄錢不行之後卒始思其弊令郡國毋得鑄錢舉郡國之銅悉輸之上林三官銅不布於郡國而盜鑄始息五銖之錢得以久行者銅禁之功也隋末行五銖錢天下盜起私鑄錢行鐡葉裁皮糊紙皆以為錢髙祖入關民間行淺環錢其制輕小凡八九萬才滿半斛武德四年鑄開元通寶積十錢而重一兩得輕重小大之中至開元二十五年詔出銅所置監鑄開元通寶而京師庫藏皆滿自秦漢以來錢弊不知其幾變如晉之比輪陳之六銖漢之八銖梁之兩柱後周之曰五行曰大布曰永通萬國唐之乾元及第五琦之重輪乾元此皆失之太重者也漢之榆莢後魏之曰水浮曰風飄曰鵝眼宋之曰綖環曰菜子曰荇葉曰吳之沈郎錢此皆又失之太輕者也惟漢之五銖與唐之開元最為折𠂻今以唐考之韓洄在德宗時請復洛源廢監而起十爐嵗七萬二千緍劉晏易江淮銅鉛薪炭以廣鑄錢嵗得十餘萬緍此廣鑄之說也自是而錢日增故楊於陵在穆宗時曰昔廣鑄以資用今减爐而費工昔行之於中原今泄之於邊裔正謂此也貞元初張滂奏禁江淮鑄銅為器惟鑄錢而已文帝時李珏請加罏鑄於是禁銅器官一切為市之及武帝廢浮屠法李郁彥請毁銅像鐘磬而州縣銅益多此禁銅之法也故劉秩曰銅之為器則不如鐡鐡之為器則不如漆禁之無害禁於人則銅無用銅無所用則益錢益錢則錢之用給矣正謂此也楮楮幣之法萌於漢代皮幣武帝以公上之用不給於是造白鹿以為皮幣或為馬或為龍或為龜各有其真而不紊國用賴以少舒至於唐又有飛錢之制憲宗令商賈至京師委錢富家以輕裝趍四方合劵乃取號為飛錢即楮所由起也真宗時張忠定公詠鎮蜀以鐡錢重不可貿易於是設質劑之法一交一繒始於祥符仁宗時冦瑊以蜀人交子起民爭訟議者請官自置務可以利民而止其爭蜀人至今為便紹興之三十二年都茶場始置務乾道之四年而㑹子始行用時兩界雜沓二千萬緍而止逮淳熙甲午而衍之為四千一百二十萬緍考其初用於乾道之四年而已聞折閲於乾道之九年外路之解發民間之輸納官吏之餼給並以錢㑹中半為令則九年之措置也封樁之現錢為樁計者五百三萬有竒而江上之積亦多南庫以金銀收換㑹子凡四百餘萬而行於外者才二百萬故淮東西南總乞以金銀兑換則㑹價髙而金銀低錢良臣申乞民間入納則現錢多而㑹子少故孝宗於量行支降之時未嘗不存詳細究講之意豈有去七十年之久而挾制扶持之不給乎今之十六界為緍計者一億二千九百二十五萬今之十七界為緍計者一億三千九百八十六萬七千有竒計南界新楮之數乃又溢於未易舊楮之前先之紹定之欎攸而十六界已出其一億八百三十餘萬矣繼之以收楮而十六界盡出矣又繼之以用兵而十七界之緍大出矣羣書考索後集卷五十二
