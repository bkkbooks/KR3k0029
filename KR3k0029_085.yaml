body:
  text: 羣書考索後集卷十九宋章如愚編官制門文階類宋朝沿唐制設文階而等級小異唐階曰開府儀同三司從一品特進正二品光祿大夫從二品金紫光祿大夫正三品銀青光祿大夫從三品正議大夫正四品上通議大夫正四品下太中大夫從四品上中大夫從四品下中散大夫正五品上朝議大夫正五品下朝請大夫從五品上朝散大夫從五品下朝議郎正六品上承議郎正六品下奉議郎從六品上通直郎從六品下朝請郎正七品上宣德郎正七品下朝散郎從七品上從義郎從七品下給事郎正八品上徴事郎正八品下承奉郎從八品上承務郎從八品下儒林郎正九品上登仕郎正九品下文林郎從九品上將仕郎從九品下凡二十九宋朝舊階曰開府儀同三司特進以上宰臣使相階光祿大夫金紫光祿大夫正奉大夫以執政階朝請大夫朝散大夫朝奉郎宣德郎承事郎承奉郎儒林郎文林郎登仕郎將仕郎以上為京朝官至侍從階凡十有五元豐新制以階易官乃雜取唐及祖宗舊制而損益之定為二十四階號寄祿新格元豐三年詔中書令將使臺省寺監之官實典職事領空名一切罷去而易之以階因以制祿未幾官制以階易寄祿新格今具下項特進金紫光祿大夫銀青光祿大夫光祿大夫正議大夫通議大夫太中大夫中大夫中散大夫朝議大夫朝請大夫朝散大夫朝奉大夫朝請郎朝散郎朝奉郎承議郎奉議郎通直郎宣教郎宣義郎承事郎承奉郎承務郎元祐初三光祿正議中散朝議六階各分左右詞人為左餘人為右元祐三年詔自今朝議中散正議光祿銀青光祿金紫光祿大夫並置左右進士出身及帶職人轉至左朝議中散為二資餘人轉至朝議中散為左右二字為四資以上各理七年磨勘其正議至金紫並分左右字為八資應今官已及此者悉加之實録既而寄祿官並分左右元祐四年三省言舊制京朝官以上各各分進士出身及餘人自改為寄祿官並後一等改轉元差别除朝奉大夫以上置左右兩等外承務郎以上至朝請大夫亦欲分左右兩等進士出身人加左字餘加右字從之實録元祐董正官制易其稱呼元祐間議者以為無以甄别流品遂詞人加左字餘人加右字而著今將詞人有犯貪墨者去左而稱右庶以為戒豫時守江夏且以為詞人犯貪而稱右可以為戒然餘人合稱右者得毋恥乎又若餘人犯貪墨則復何以為戒也請應貪墨吏詞人則去左餘人則去右此庶幾有别而有所懲書上不行豈朝廷法令事有未安非外官所得與耶麈史紹聖罷之紹聖三年詔寄祿轉正議大夫光祿大夫銀青光祿大夫分左右朝請大夫中散大夫亦仍舊存左右作兩資轉以分有無出身外餘並罷崇寧初換選人七階崇寧三年刑部尚書鄧洵武奏吏部選人自節察判官至主簿尉凡七等宜出自睿斷造為新名因而寄祿今擬下項留守莭察判官為承直郎掌書記支使防團判官為儒林郎留守節察推官軍事判官謂之兩使職官為文林郎防團軍事推官軍監判官謂之初等職官為從事郎司録録事參軍縣令為通事郎知録事參軍為登仕郎軍巡判官司理司户司法簿尉為將仕郎奉聖㫖依㫖國朝選人寄祿凡四等七資留守節察判官掌書記支使防團判官留守節察推官軍事判官為兩使職防團軍事推官軍監判官為初等職官司録縣令知縣為令録軍巡判官司理司户司法簿尉為判司簿尉其升遷之序則自判司簿尉舉令録令録舉職官自職令薦書及格皆改京官不及格而有二薦書則遷兩使職官謂之短般以勞叙賞謂之循資崇寧中鄧樞密洵武建言以為名實渾殽不正乃改令七等以待選人其一曰三京府判官留守判官節度觀察判官四色今目為承直郎是也其二曰節度掌書記觀察支使今目為儒林郎是也其三曰防禦團練軍事判官留守節度觀察推官今目為文林郎是也其四曰防團練軍事推官今目為從事郎是也其五曰縣令録事參軍今目為從政郎是也其六曰試階知縣知録事今目為修職郎是也其七曰三京軍巡判官司理户曹司户法曹司法參軍主簿縣尉今目為迪功郎是也祖宗朝以考第資歷無過失而或有勞績者遞遷謂之循資若磨勘應格自縣令録參以上及六考者有出身皆改著作郎無出身及七考者改大理寺丞其有功賞循資者减一考若未該磨勘循資者至支使及八考者有出身改太子中允餘改太子中舍其四色判官及九考以上者改祕書丞十二考以上者改太常博士無出身人止於殿中丞而已至仁宗朝議者悉以考第改官者其員猥多遂詔用帥臣監司通判保薦而以州縣多寡定數以嵗改百員為額元豐肇新官制稍鎸改官之格改觀察判官以上有出身改奉議郎無出身改通直郎掌書記改通直郎支使以下一例改宣德郎而以朝廷每以選人改官為重必命制詮近臣引對便殿上親閲其人材厯任功過降㫖改令入官或令改次等官或令更任一任回改官不自廟堂進擬使此權專出主上也官制舊典大觀初又置增宣奉正奉中奉奉直四階大觀二年中書省檢㑹御筆寄祿官在神考時不分左右曩雖釐正猶有存者若盡去之則序爵制祿等差終少人易以及今擬下項金紫光祿大夫銀青光祿大夫光祿大夫舊係右銀青光祿大夫宣奉大夫舊係左光祿大夫正奉大夫舊係右光祿大夫通議大夫太中大夫中大夫中奉大夫舊係左中散大夫有出身人及帶職人更不轉中散奉直大夫朝議大夫奉直大夫舊係右朝請大夫奉聖㫖依詔㫖官制寄祿銀青光祿大夫與光祿正議中散朝議皆分左右朝議中散有出身人皆超右其餘並以叙遷大觀中豫為中書舍人奉詔以為非元豐本意下擬定釐正乃參取舊名以奉直易右朝議中奉易右中散通奉易右光祿而左銀青大夫正為光祿大夫遂為定制石林燕語政和末改迪功修職從政三階政和六年御筆假將仕郎可去假字為將仕郎假承務郎奉承事郎可為通仕郎舊將仕郎為迪功郎登仕郎為修職郎通仕郎為從政郎依通為十階而後寄祿之制始備紹興舉行元祐之法亦分左右至孝宗時階官並去左右焉寄祿官特進見散秩門從一品舊為左右僕射金紫光祿大夫正二品舊為吏部尚書銀青光祿大夫舊為五曹尚書光祿大夫從二品舊為左右丞秦郎官令屬官有中大夫漢氏因之武帝太初元年更名光祿大夫秩比二千石掌論議無員後漢因之自魏以來諸公卿告老多加其位晉太始初分為左右光祿大夫皆為員宋因之唐六典南齊左右光祿大夫位從公開府置佐史如光祿大夫皆銀章青綬詔加金章紫綬者為金紫光祿大夫南齊百官志又唐六典云魏晉有加金章紫綬者則謂金紫光祿大夫晉則金紫銀青左右四職並置又云晉有銀青光祿大夫王翹之則銀青非南齊始置今並載梁左右光祿大夫並無員以飬老疾陳金紫光祿大夫中二千石後齊光祿大夫金紫銀青用人俱以舊德就間者居之隋髙祖左右光祿大夫金紫銀青光祿大夫並為散官以加文武官之德齊者並不理事隋職官志唐為文散官宋朝舊階為執政階職略元豐寄祿新格以階易官以吏部尚書為金紫光祿大夫五曹尚書為銀青光祿大夫左右丞為光祿大夫續㑹要宣奉大夫大觀新置正奉大夫大觀新置正議大夫舊為六曹侍郎通奉大夫大觀新置通議大夫舊為給事中太中大夫舊為左右諫大夫宣奉大夫元豐新制未有此階大觀初改左光祿大夫為宣奉大夫正奉大夫元豐新制未有此階大觀二年改右光祿大夫為正奉大夫正議大夫隋煬帝置散官蓋取秦大夫掌論議之義通典宋朝元豐新制改六曹侍郎為正議大夫六侍郎併作一等換正議大夫時論以宰執貪進官作此蓋故事丞郎作四轉今乃減作兩轉爾官制舊典元祐寄祿習分左右紹聖罷分而正議大夫仍舊存左右作兩資轉大觀初改右正議大夫為通奉大夫而左正議大夫去左字為正議大夫職略通奉大夫元豐新制未有此階大觀初改右正議大夫為通奉大夫通議大夫隋煬帝置散官蓋取秦大夫掌論議之義通典宋朝元豐新制改給事中為通議大夫職略太中大夫秦太中大夫秩比千石掌論議漢氏因之梁班第十一秩千石北齊從第三品唐從散官宋朝元豐新制改左右諫議大夫為太中大夫神宗以寄祿官等級少遂以太中為宰相官蔡確時任右諫議大夫參知政事兊換太中大夫及拜相則依前太中大夫守左右僕射遂為定制官制舊典中大夫自此以下甄别流品至詳舊為祕書監秦置中大夫漢武帝太初元年改為光祿大夫唐為散官宋朝元豐新制改祕書監為中大夫祕書殿中監為一等元豐三年偶闕任殿中監者故只著祕書監神宗以太中大夫為宰相官故初除執政止授中大夫是時以翰林學士蒲宗孟王安禮為左右二公寄祿官皆未至大夫遂除中大夫守之官制舊典中奉大夫大觀新置中散大夫舊為光祿卿至少府監王莽所置後漢因之六百石無員魏晉因之齊職儀品第七絳朝服進賢一梁冠班第十陳秩千石唐為散官六典宋朝元祐寄祿官皆分左右詔左右中散大夫以二十員為額紹聖罷分而中散大夫仍舊存左右作兩資轉大觀初改左中散大夫為中奉大夫其右中散大夫去右字為中散大夫朝議大夫舊為太常少卿左右司郎中光祿少卿漢官儀大夫以上得奉朝議則其義也隋文帝置為從三品散官唐為正五品下六典宋朝元豐新制改太常至光祿少卿為朝議大夫少卿監左右司郎中等級最多一換之則清濁莫分舊制從官為左右司郎中當遷者左司轉左諫議大夫右司轉右諫議其太常少卿若自吏兵部郎中轉到者遇特㫖轉行亦遷右諫則是朝議轉太中也崇寧以前從官自轉朝議直轉中大夫乃用元豐故事以中大夫為執政官比舊制太中大夫自增中奉大夫遂用細轉乃由當時執政不知典故爾至庶僚職方郎中轉光祿少卿駕部郎中轉司農少府或將作監次遷衛尉卿則是有出身者三遷至祕書監無出身者五遷至殿中監皆中大夫也近制增中奉大夫奉直大夫兩等乃合舊制官制舊典元祐三年詔左右朝議大夫以五十員為額奉直大夫元豐新制未有此階元祐寄祿官皆分左右紹聖罷分而朝議大夫仍舊存左右作兩資轉大觀初改右朝議大夫為奉直大夫詔有出身及帶職人更不轉中散奉直大夫政和中詔朝議奉直大夫今後共以八十員為額朝請大夫舊為前行郎中隋置散官取將軍公卿年髙德重者以列侯就第特進奉朝請之義大唐因之通典宋朝元豐新制改六曹前行郎中為朝請大夫朝請大夫授前行郎中朝散大夫授中行郎中朝奉大夫授後行郎中故事曹名雖轉正郎亦不呼郎中只稱曹名以示其出常調也自改大夫更無别焉官制舊典朝散大夫舊為中行郎中隋置散官大唐因之宋朝元豐新制改六曹中行郎中為朝散大夫朝奉大夫舊為後行郎中宋朝元豐新制改六曹後行郎中為朝奉大夫職略朝請郎舊為前行員外郎侍御史隋置散官蓋採晉宋齊梁陳並有奉朝請員為名大唐因之通典宋朝元豐新制改六曹前行員外郎為朝請郎朝請郎授前後員外郎朝散郎授起居舍人及中行員外郎朝奉郎授左右司諫及後行員外郎此三等階混殽尤甚舊制狀元登第初為將作監一遷右司諫次轉起居舍人兵部員外郎三人及第并制科厯一任回自太常博士遷祠部度支司封員外郎進士出身自太常博士遷屯田都官職方員外郎世賞自國子博士轉虞部駕部員外郎雜流自國子博士轉水部司門庫部員外郎祖宗不以名器假人故命以别之也官制舊典朝散郎舊為中行員外郎起居舍人隋文帝置通典唐因之宋朝元豐新制六曹中行員外郎及起居舍人為朝散郎朝奉郎舊為後行員外郎左右司諌宋朝元豐新制改六曹後行員外郎及左右司諫為朝奉郎承議郎舊為左右正言太常國子博士隋煬帝置唐因之六典宋朝元豐新制改左右正言太常國子博士為承議郎承議郎授左右正言太常國子博士舊制初除知制誥及待而官未至員外郎即除右正言狀元自著作郎亦除左正言若有出身人皆遷太常博士餘人遷國子博士易階官後清濁無别矣官制舊典奉議郎舊為太常祕書殿中丞著作郎隋文帝置通議郎唐改奉議郎通典宋朝元豐新制改太常祕書殿中丞為奉議郎奉議郎授三丞及著書郎舊制前名自太子中允太常丞著作郎遷祕書丞大理寺丞遷殿中丞狀元自將作監丞遷著作郎無出身自贊善中舍洗馬皆遷殿中丞以上皆號大朝官官制舊典通直郎舊為太子中允贊善大夫洗馬隋置通直郎蓋採晉宋以來諸官皆有通直郎謂官髙下而通為宿直者也因此為名唐因之宋朝元豐新制改太子中允左右贊善大夫中舍洗馬為通直郎通直郎授太子中允贊善中舍洗馬號小朝官舊制初擢用京官選人為經筵官及臺諫皆除中允若擢轉運判官則前除中允無出身人除贊善若敘遷則有出身人轉中舍宰執奏補者轉贊善雜流轉洗馬蓋有以别之自改官制後初除待制以上而官未厯升朝者並改通直郎及倣舊帶除正官耳官制舊典宣教郎舊為光祿衛尉寺將作監丞遊騎尉隋置散官唐改為宣義郎蓋取梁宣義將軍之名通典宋朝元豐新制改光祿衛尉丞將作監丞為宣義郎宣義郎授光祿衛尉寺丞將作監丞舊制凡前名自太祝奉禮轉官選人改次等官皆遷光祿寺丞餘人大理評事自太祝轉官遷光祿寺丞奉禮轉者及選人改次等官皆遷衛尉寺丞官制舊典承事郎舊為大理評事隋煬帝置徴事郎唐因之六典宋朝新制改大理評事為承事郎承事郎授大理評事舊制凡前名授書正字主簿皆轉大理評事登科甲者命官亦如之熙寧末狀元方除評事餘人自太祝奉禮遷者皆轉評事宰相任子亦如之官制舊典承奉郎舊為太常寺太祝奉禮郎隋文帝置六典唐因之宋元豐新制改太常寺太祝奉禮郎為承奉郎承奉郎授大祝奉禮郎舊制執政任子為太祝其用宰執恩澤轉者遷太祝用侍從恩澤轉者遷奉禮官制承務郎舊為祕書省校書郎正字將作監主簿唐置蓋因隋尚書二十四司承務郎之名通典宋朝元豐新制改祕書省校書郎正字將作監主簿為承務郎承務郎授校書正字監主簿制前執政任子校書郎學士任子為正字諫議待制任子為將作監主簿官制舊典承直郎崇寧初以選人七等造為新名改留守節察判官為承直郎從鄧洵武之請也儒林郎唐置前史有儒林傳之名取其義也六典宋朝崇寧新制改節察掌書記支使防團判官為儒林郎文林郎唐置取北齊文林館徴文學之士以充之宋朝崇寧新制留守節察推官軍事判官為文林郎謂之兩使職官從事郎崇寧新制改防團軍事推官軍監判官為從事郎謂之初等職官從政郎宋朝崇寧新制改司録為録事參軍縣令為通仕郎政和中御筆改通仕郎為從政郎修職郎宋朝崇寧新制改知録事參軍知録事為登仕郎政和中御筆改登仕郎為修職郎迪功郎宋朝崇寧新制改軍巡判官司理司户司法簿為將仕郎政和中御筆改將仕郎為迪功郎羣書考索後集卷十九
