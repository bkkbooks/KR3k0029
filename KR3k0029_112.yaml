body:
  text: 羣書考索後集卷四十六宋章如愚編兵門守邊文王之時西有昆夷之患北有玁狁之難天子命將帥遣戍役以衛中國歌采薇以遣之戰國齊威王有檀子守城南盼子守髙唐黔夫守徐州而楚趙燕不敢冦邊李牧之為趙將居邊軍市之租皆自用饗士不從中決故能北逐單于破東夷滅襜檻西抑強秦南距韓魏後趙王用郭開之讒誅李牧而令顔聚代之是以為秦所滅通鑑秦并六國乃使蒙恬北築長城而守藩籬郤胸奴七百餘里朝錯曰秦築塞河上置戍卒焉非以衛邊地欲廣大也漢興與胸奴和親至文帝時背約入冦帝令邊備守不發兵深入又以蘇意屯句注張武屯北地周亞夫次細柳劉禮次霸上徐厲次棘門以備之胸奴傳帝自為代王已習知邊事故於邊備尤留心焉三年胸奴入居北地河南為冦上幸甘泉因幸太原十年行幸甘泉十一年幸代十五年幸雍後元二年幸雍棫陽宫三年幸代四年幸雍五年行幸隴西又行幸代數行幸邊上又躬自勞軍勒兵故當帝之世雖胸奴犯邊而不為害時朝錯上書言備邊之要又陳募民守塞之策武帝遣韓安國屯漢陽郭昌屯朔方又遣徐自為築五原塞皆築外城設屯戍以守之景帝時言陛下幸憂邊境遣將吏發卒以治塞為之髙城深塹具藺石布渠谷所以備其要害之處為之相其隂陽審其土地以裂里割宅所以使民有長居之心自昭帝以後胸奴畏中國之威希犯邊境而欵塞稱藩矣胸奴傳陳彥羣曰漢鴈門雲中以備北狄隴西諸郡備西羌巴蜀諸郡備西南夷遼東燕齊諸郡備朝鮮會稽諸郡備南越此邊備之大凡也後漢光武中興邊往往置郡尉明帝之初以為野無風塵乃悉罷沿邊屯兵永平八年初置度遼將軍屯五原曼桓募郡國中都官死罪繫囚減等諸度遼將軍營屯朔方五原之邊縣妻子自隨便占著邊縣父母同産欲相代者悉聽之亡者贖罪各有差凡徙者賜弓弩衣糧永平十六年詔郡國中都官死罪繫囚減死罪一等各令詣軍營屯朔方燉煌妻子自隨父母同産欲求從者恣聽之章帝建初七年詔天下繫囚減死一等詣邊妻子自隨占著所在父母同産欲相從者恣聽之其後北胡有變則置度遼營南蠻有變則置象林兵永平置羌犯三輔則置長安雍二尉鮮卑冦居庸則置漁營安帝之後又盜作沿邉緣海順帝始令沿邊增置步兵緣海屯兵而益多矣兩漢兵制永和五年令扶風漢陽築隴道塢三百所置屯兵又詔魏郡趙國常山中山繕作塢候六百一十所西羌傳晉武帝時羊祜修德信以懷吳人與陸抗對境抗告邊戍曰彼専為德我専為暴是不戰自服也各保分界而已通鑑宋文帝每歲為後魏侵境令朝臣議何承天陳備邊之要一曰移逺就近以實內地二曰浚後復城隍以增垣防三曰纂偶車牛以飭戎械四曰計丁課役勿使有闕邊防拓跋氏篇唐武德初改郡為太守為刺史其邊領及襟帶之地置總管府以領軍戎七年改總管府為都督府因隋末分割州府倍多前代貞觀初并省州縣始於山河形便分為十道通典唐初安東安北安西皆置都護府意其戍兵之數不少矣太宗威加四夷舉三邊十萬而足其後李林甫邀人主以邊功而三邊之師四十九萬戎馬八萬餘匹説齋又太宗嘗謂李績曰煬帝不擇人守邊以備虜今用績守并突厥不敢南賢長城逺矣中宗詔張仁亶為總管屯邊始築三受降城於河外突厥傳代宗時郭子儀屯邠州李抱玉屯高壁馬璘屯原州李忠臣屯涇州李忠誠屯鳳翔臧布遜屯渭北備虜之入吐蕃傳德宗西北有防敵之地時陸贄謂中國守備易用所長八利可致六失可去帝重其言而不行夫所謂方鎮者節度之兵也原其始起於邊將之屯防者唐初兵之戍逺者大曰軍小曰守捉曰城曰鎮而總之者曰道自武德至天寶以前邊防之制其軍城鎮守捉皆有使而道有大將一人曰大都督至太宗時行軍征討曰大總管在其本道曰大都督自高宗永徽以後都督帶使持節者始謂之節度使然猶未名官睿宗景雲二年以賀拔延嗣為涼州都督河西節度使自此以後朔方諸鎮皆置節度使自祿山結亂肅宗始徹邊備以靖中邦借外威以寧內難於是吐蕃乘釁回紇矜功中國不振四十餘年使傷耗之民竭力奉職西輸賄繒北償馬資尚不足塞其煩言滿其驕志於是逺徴士馬列戍疆陲猶不能遏其奔衝止其侵侮小入則驅略黎庶深入則震驚邦畿陸贄奏議宋朝國初以勇悍忠實之臣分控西北邊孔道何繼筠守滄景李漢超守關南以備北敵郭進在邢州以禦太原姚內斌守慶州董遵誨守通逺軍以捍西戎故二十年間無西北之憂兵制序太祖建隆二年初五代募民盜戎人馬官給其直籍數以補戰騎之闕上欲示信保境戊戌敕沿邊諸州禁民無得出塞侵盜前所盜馬盡令還之由是夷狄畏慕不敢內侮長編上嘗語近臣曰安邊御衆須是得人若分邊寄者皆稟朕意則必優恤家屬厚其爵祿多與公錢及屬州縣境四圍免稅聽其召募驍勇為之爪牙茍財用豐盈必能集事朕雖減後宫之數極於儉約以備邊費亦無辭也寶訓太宗端拱中北人冦邊張泊奏請聚兵積穀分屯塞下來則備禦去則勿追武略淳化元年上召中丞王化基問以邊事化基曰天下所患根本未固根本固則枝幹不足憂今朝廷治則邊鄙何患乎不安長編太宗每選將帥鎮撫邊郡為制敵之策其後戎狄稍稍罷去戰士保境自守因對近臣語其事冦凖曰陛下長駕逺馭動有節制今中原綏靖邊城晏間皆睿算使然寶訓真宗謂近臣曰邊防當常全葺積榖聚人不可弛也又咸平中邊兵未息上與李沆等議禦戎之計分遣白守素屯威虜軍楊延昭屯保州田敏屯北平寨以當敵鋒始至勿與鬪待其氣衰使之奔命不暇又命裴自榮屯寧逺軍張繼旻屯邢州扼東西路戎冦及澶淵之幸王師大捷又楊延昭等諸將各握兵在邊扼其歸路狄人勢屈遂乞和寶訓咸平三年真宗問王濟以邊事濟曰陛下承二聖之基擁萬方之衆兹者契丹敢爾憑陵蓋謨猷當位之臣未有如昔人者衆皆謂國家所恃獨洪河耳此誠急賢之秋不然臣懼狄人將飲馬於河渚矣退而纂備邊策十五條以獻上曰近聞西戎之剽皆不利而去王師所獲俘馘甚衆然朕以戒疆吏但謹烽候嚴卒乘來即驅逐去勿追捕乃遣使與邊將議靈州悠久之便庶令關右之民有以息肩寶訓景德三年上曰比詔河東募土人為廣鋭神虎諸軍就置營宇蓋以契丹未平此等皆徑勇且習知山川道路故帥臣每患其少嘗許續募令邉防罷警若遂令減去即為弛備然豈可歲增不已乃詔以見存為定額缺則補之長編夔州轉運丁謂言近於施州南界建柵立扼要害益師屯戍慮難供饋復置屯田歲獲資糧足以贍給可省輦運之費謂因言邊防要害若所委之官不邀功不生事常以安靜為勝悉依詔條撫理制置則蠻獠不敢為非上曰比來邊境不寧多由守臣生事况條制甚明奉而行之必無事矣長編時秦州掩殺蕃兵萬餘上聞之顧左右曰蕃部撓邊掩殺固其宜矣茍能靜守封疆不令侵軼此尤佳也同上仁宗慶歷三年諌官歐陽修言朝廷與契丹通好僅四十年無有纎介之隙而輒萌姦計妄有請求切以戎狄貪婪性同狼犬遇強則伏見弱便欺臣竊怪在朝之臣尚偷安靜自河以北絶無處置因循弛慢誰復挂心豈可待北使在廷強兵壓境然後計無所出空務倉皇而已哉同上慶歷四年樞密副使韓琦參知政事范仲淹並對於崇政殿上言四策曰昨元昊叛命王師數出不利而北國舉數十萬衆謂元昊是舅甥之邦中國不當稱兵國家以生民之故稍增金繒以續盟好今元昊雖暫求通順得知物力稍寬則又有長驅深入并吞關輔之心何以知之昨定州之戰彼作偽詔誘脅邊人欲定關中為今日之謀者莫若擇帥練兵日計用武之策以和好為權宜以戰守為實務彼知我有謀有備不敢輕舉而盟約可固如不我知輕負盟約我則乘彼之驕可困可擊未必能為中國之患長編參知政事范仲淹言契丹元昊有六可疑三可憂今乞聖慈顧問大臣如契丹可以保信必不入冦亦不與元昊連衡則乞今日同署一奏納於御前使中外安靜不更憂疑他日或誤大事責有所歸如大臣不敢保信則乞指揮大臣今日更不歸廳便畫河東禦捍之策抽何路軍馬用何人將帥添若干錢帛據何處要害如此定策猶恐後時不能當二敵之勢或更因循度日直候大冦入境然後為謀則河東一傾危逼宗社極論不敢有隱惟聖斷處之同上先是范仲淹受命主西事富弼主北事弼條上河北守禦十三策曰宋朝以兵得天下震耀武威太祖皇帝待北國僅若一族每與之戰未嘗不克太宗皇帝因親征之衄敵志遂驕頻年冦邊勝敗相半真宗皇帝嗣位之始専用文德於時舊兵宿將往往淪沒敵騎深入直抵澶淵河朔大騷乘輿北幸於是講金帛啖之之術以結歡好自此河湟百姓幾四十年不識干戈歲遣差優然不足以當用兵之費百一二焉則知澶淵之盟未為失策同上河北三十六州軍內沿邊次邊如北京雄霸祁保瀛莫滄定鎮冀十一州廣信安肅順安信安保寧乾寧永寧七軍總一十九城皆要害之地可以控制敵人而不得深入矣定為右臂滄為左臂瀛為腹心北京為頭角此四城者河朔之所望也餘十五城為指爪支節乃四城之所使者定滄瀛各置一帥北京置一大帥餘十五城分屬定滄瀛三路悉擇善將守之十九城都用兵三十萬此三十萬兵非如景德年中閉門自守皆使出而接戰者也頃年大兵悉屯定州然閉城不使出戰者蓋恐一敗塗地無所救援且防中渡之變也今雖用兵三十萬而分置十九城左敗則右救從失則橫援豈有昔時之虞邪其外十二城不復蓄兵只以本郡鄉兵堅守不使出戰同上河朔州軍長吏最宜得人以備胸奴之變自來都不選擇贓汚不才年老昏昧者盡使為之又移替不定久者不過一二年其間苟且之人只是幹尋常之務其經久利害自知不及其身率皆不為前後相承積弊已甚若不選人久任以矯前失則異日敵有變故邊城不守浸淫深入為患不細同上除上件十九州軍寨長吏以下並乞詔本路轉運提刑安撫部署鈴轄分擘舉充仍委樞密院三班審官銓司選舉不許循入並須三年一替所貴上下得人衆職皆舉用兵之際有可供使與夫臨時外求得失拒萬也同上臣頃聞河朔人説契丹自山得斬伐林木開鑿道路直抵西山漢界而止今則來往通快可以行師臣亦細詰其由云契丹舊亦疑朝廷復燕且恐天兵渡界河直北趍燕京則敵人欲出我不意由山後進兵旁擊鎮定橫行河朔牽制王師以解收燕之患也當得能幹而謹密者隂往經制如何屯戍如何捍禦必有可以勝之之術先事而定以待其來則保邊之道也漢唐以來胸奴入冦率由上郡鴈門定襄等路蓋當時中國拘全燕之地有險可守胸奴不敢由此路而來也自石晉割燕薊入契丹無險可守由是敵騎直出燕不復尋定襄等故道今朝廷若留意河朔邊鄙有備敵不可得而入須求别路以來或雖可入冦苐取定襄等路為掎角之勢則河東不得不大為防或創立城池或造設險阻何地可以設竒伏何路可以出牽制此須預經度素有防備則臨時足以禦捍應卒不至倉皇使與河朔表裏相應冦不能逞其欲實邊防之急務也自契丹侵取燕薊以北拓拔自得靈夏以西其間所生豪英皆為其用得中國土地役中國人力稱中國位號方中國官屬任中國賢才讀中國書籍用中國車服行中國法令是二國所為皆與中國等而又徑兵驍將長於中國中國所有彼盡得之彼之所長中國不及當以中國勍敵待之庶幾可禦豈可以上古之夷狄視彼也范仲淹言今北國西戎合謀并力夾困中原西兵數年未能平定近方遣使往復以議通順餘可假借以成和好然後重議邊事退移兵馬減省糧草蘇我生民勤我稼穡選將練士使民強兵鋭以待四夷之變此帝王有道之術社稷無窮之福也同上范仲淹言麟府二州所修堡寨只通得麟府道路其四路别無城寨防守因奏張亢得以增廣堡寨宜使就總其役詔既下而明鎬持不可屢牒止亢亢曰受詔置堡寨豈可得經略牒而止耶坐違節度所甘心堡寨必為也每得牒置案上卒事乃發封自劾朝廷不問編漢歸者數千户歲減戍兵萬人河外遂安長編慶歷六年詔陜西河東經略司西人雖納欵稱臣然犬戎之心詭譎難信恐諸路乘罷兵之後漸弛邊備其益務練兵卒完城壁常若冦至有不如詔者亟以名聞同上至和二年先是潘美帥河東避冦抄為已纍令民內徙空寨下不耕號禁地而析代州寧化火山軍廢田甚廣歐陽修常奏乞耕之詔范仲淹相視請如修奏尋為明鎬沮撓不克行及韓琦至遣人行視曰此皆我腴田民居舊迹猶存今不耕適留以資敵遂奏募弓箭手居之會琦去即詔弼議弼請如琦奏凡得户四千墾地九千六百頃同上又嘗謂馬知節曰邊防禦戎之術何者為先知節曰邊防之地橫亘雖長然據要害以拒其來惟順安軍至西山不數百里神宗元豐四年八月上謂大臣曰自來邊探多不得實如盧南興師人言旁邊百里內林菁險阻道路難進今得走馬奏大兵至落茹兜村乃有良田萬頃頗多積穀其林菁乃在數百里外去邊百里之間探報尚且如此乃知傳聞多不足信昔趙充國願至金城圖上方略馬援聚米為山川蓋傳聞不如一見爾長編哲宗紹聖元年七月三省樞密院同對以熙河路安撫使蔣之竒所奏攻守和三策進讀于前李清臣奏曰攻所言春秋左氏用三師以疲楚者固為上策然慶歷中元昊冦邊韓琦范仲淹嘗獻議近邊屯徑卒為三屯互出搗虛使羌人並塞不得耕收乃制勝之道計已定會元昊乞和章惇曰先朝是淺攻法及擾耕硬探但使旁邊一二百里羌人不敢耕則自當困弊故制羌之要數出有利制敵無如淺攻最良曽布曰此但殘夷老幼甚可傷上曰豈吾人所欲哉蓋為彼殺掠我老幼如河西被患尤酷故不得已報之使懲創冀不復來爾非欲殺也髙宗紹興八年九月辛丑進呈新除沿邊守臣王默等上宣諭曰今日邊壘內則綏撫外則斥候二事至大未易得人宜精擇之上之留意政事不間遐邇皆得其要二十九年十二月甲寅進呈楊杭探報北界揭榜禁妄傳起軍事上曰此事有無固不必問朕觀其科擾勞役民不聊生豈是長久之道朝廷但當精擇牧守務為自治安邊息民靜以待之爾並同上孝宗除葉顒告詞方今敵國雖和而二備當戒冗兵三代之時未嘗無兵也今以漢志考之云三代王者萬乘之兵甲士三萬卒七十二萬可謂衆矣當時不謂之冗者蓋寓兵於農無坐食之兵也漢京師南北二軍數僅盈萬至於羽林期門之屬數猶未猥漢髙祖以二十萬入秦關武帝以十八萬騎巡北邊亦不謂之冗者置材官於郡國有事集兵事已則罷也杜佑通典謂漢氏重兵悉在京師今以百官志考之光祿勳有衛士八十一人虎賁千五百人羽林郎百一十八人羽林左騎八百人羽林右騎九百人惟三書郎無員計亦不過千人官表云諸郎多至千人總而計之為四千三百九十九人衛尉衛士衛卒六千人南宫北宫衛士共一千八人右都侯左都侯衛士共二百九十九人宫掖凡七門各有司馬以領衛士南屯百二人蒼龍四十人元武三十八人北屯三十八人朱雀二百四人東明百八十人朔平百二十四人總而計之為一千五百一十三人北軍五校所以領騎士如屯騎越騎步兵射聲各領七百人長水領七百三十人又中尉緹騎五百二十人總而計之為四千五十人惟城門屯兵數無所考以宫掖司馬所領者論之多者百八十人少者三十八人况十二門止領於一校必無重兵恐多不過千人爾總是四者而計之則京師之兵僅餘萬人然此是中世以後之制若高文之世未有羽林虎賁未有七校則其數當益少也其兵何自而冗哉唐府兵既罷之後所謂神武神策騎兵不過十數萬而觀察節度之師犄角於天下大邑通都皆宿兵而長慶之數無慮百萬大計以三户資一兵焉唐髙祖自太原發兵三萬及起義兵得兵二十萬及天下既定其願留宿衛者僅三萬人太宗列置府兵六百三十四所在關中乃居三百六十有一凡府三等兵千二百人為上千人為中八百人為下又府兵之置無事時耕於野若四方有命則命將以出事解輒罷兵散于府矣其兵亦無自而冗也中世以來兵始冗矣玄宗時張説言宿衛之士至三十萬天寶元年置十節度經略使以備邊凡鎮兵四十九萬人蓋兵浸多矣憲宗時宿兵見在可計者八十餘萬其後蕃鎮各擁兵自強天子自置兵於京師不勝其冗矣五代之際四方割裂以區區中州之地晉漢之兵嘗至於數十萬養之既費教與用之又皆不得其理周世宗自髙平之戰始知其弊乃曰今兵務精而不務多以農夫百不能養甲士一安用浚民膏血養此無用之兵於是簡去疲弱止存精鋭故能北走三關南定淮南宋太祖鑒前代之弊益修教習之法黜疲懦初得周代之兵中外總一十二萬後平全蜀止揀其精鋭百二十人則江南嶺南諸國可知矣及乾德中㨂成十萬富弼之語兵數既少故月給之外時有賜豫由是兵不貧乏而鋭於役使力既強壯而勇戰鬭藝祖之所以平五強國者用此道也姚內斌領慶州董遵誨領環州夫以折衝方靣之任而所領之兵才五千而已當開寶中狄三萬冦定州太祖詔田欽祚領兵三千赴之大敗狄師則其應敵之兵又不過如此當時中外之兵其數可知至太宗伐劉繼元駕前之兵蓋十餘萬兵稍稍益多矣其後曹彬之敗祈溝關也在行之兵實二十萬富弼云太宗有天下添兵至三十萬真宗全盛時亦不過五六十萬西邊警之後募兵其移募兵日廣仁宗時遂至百餘萬龎籍汰兵疏云夫寶元中騎兵捧日之外所增一百六十二營步兵天武之外增七百五十二營而代郡沿邊沿海所增不下數十萬自是增兵至百餘萬孫洙號善論兵其論宋朝兵曰古者兵一而已今內外之兵百餘萬而别為三四又離為六七别為三四禁兵也廂兵也蕃兵也離為六七謂之兵而不知戰也給漕挽者兵也服工役者兵也繕河防者兵也供寢廟者兵也養國馬者兵也疲老而坐食者兵也前世之兵未有猥多於今日也蓋今天下嘉祐中户口千有餘萬而皇祐一歲之入一億二千六百餘萬耗於兵者常十八而留州以供軍者又數百萬總戶口歲入之數而以百萬兵計之無慮千户而資一廂兵十萬而給一散卒其兵職衛士之給又浮費數倍何得而不大蹙也仁宗至和中諌官范鎮言兵不在衆在練之與將如何耳儂智髙反前後遣兵不知其幾亡命奔北不可勝數狄青請用蕃落廣鋭車卒以數百騎取勝又言備契丹莫若寬河北河東之民備靈夏莫若寬關中之民朝廷之憂不在四夷而在冗兵與窮民也神宗熙寧中裁減廂軍汰去禁卒之老弱者併營以省將校時有司會一歲所省以緡計者四十五萬以石計者四十萬以匹計者亦二十萬而西域諸國皆來朝貢夏人之欵益恭契丹之盟愈固且談笑而復熙河後漢光武以三千之衆敗尋邑百萬之師謝玄以精卒八千敗苻堅百萬之衆曹公赤壁之戰亦八十萬而不能敵周瑜之三萬趙括長平之戰蓋四十萬束手以就坑然則師不在衆亦明矣羣書考索後集卷四十六
