body:
  text: 羣書考索卷十八宋章如愚撰聖翰門歷代聖翰類包羲龍書三皇以前結繩為政包羲因龍之瑞始作龍書神農穗書神農因嘉禾八穗作穗書黃帝鳥跡書黃帝蒼頡變古文作鳥跡篆少昊鳳鸞書少昊作鳳鸞之書取以古文顓帝科斗書顓帝則科斗之書曰科斗篆帝堯龜書帝堯因軒轅靈龜有圖作龜書夏禹螺書見類要文王作鳥書文王時作鳥書漢光武賜方國手迹皆一札十行細書成文循吏傳唐太宗賜馬周飛白曰鸞鳳沖霄必假羽翼本朝御書類太宗飛白書賜李昉雍熙三年十月內出飛白書一軸賜宰臣李昉上曰朕每公事退常惜光景讀書之外不住學書除𨽻草外兼習飛白此固非帝王事業但表朕不閒過耳畋遊聲樂性所不好宫中遣日惟書籍筆札而已飛白書賜吕端至道二年六月出飛白書二十軸賜宰相吕端等人五軸又以四十軸藏祕閣字皆方圓數尺上謂之曰飛白依小草書體與𨽻不同朕君臨天下復何事於筆硯但中心好之不能輕棄嵗月既久遂盡其法太宗草書經史故事至道元年六月草書經史故事三十紙詔翰林侍讀吕文仲正讀之因遣刻石以數百本令於江東名山神地道巖佛廟各藏一本或髙逸不仕有行為州里所稱亦分賜之御書六韜六法雍熙四年召北面諸將田重進潘美崔翰洎殿前劉延翰等對于便殿上訪以禦戎備邊之策延翰曰破敵二策惟聖心裁處上因手書六韜兵法將有五才十過之說以賜之御書孝經淳化三年十月上行書千字文癸亥祕書監李至言請於御製祕閣贊碑隂摹石帝曰千字文蓋梁武得鍾繇書破碑千餘字俾周興嗣次韻而成非垂世立教之文孝經百行之本朕當親書勒之碑隂太宗御書急就章端拱二年以御書急就章藏於祕閣急就章者漢元時黃門令史游作也先是下詔求先賢墨跡有以書鍾繇急就章為字多蹐駮上親草書一本藏祕閣乃刻石賜近臣筆翰太宗鋭意筆翰兼通篆籕八分飛白草書三十六卷示近臣賜儒行篇太宗淳化三年詔以小印儒行篇録賜中書密院兩制等人一軸龍圖閣太宗書帖咸平四年十一月上御龍圖閣召近臣觀御書五年十月又詔閣之四壁設五經圖閣上太宗御筆真宗嘗以太宗御筆集及御書法帖等三百三十六卷示輔臣曰太宗嗜學實由天縱屬思援翰筆極精妙朕孜孜尋訪殆無遺者四方以朕訪求所納甚衆然或因先帝賜其家寶藏即復之王旦以謂文章化人成俗者自太宗始也五代以來筆札無體鍾王之法幾乎絶矣太宗在南宫留意翰墨自是學者書體丕變實聖教所致真宗鏤文紅筆祥符二年帝以太宗鏤文紅筆分賜宰臣王旦以下因曰先帝聽政之暇常以觀書并攻筆法為意每見諸家字體精妙無不學者學之必成旦等言先帝筆法神氣英異非人臣所及如侍書王著有名於時然望先帝甚逺帝曰王著於侍書待詔中亦無其比仁宗邇英閣御書三十五事慶厯四年三月帝御邇英閣出親書十有三軸凡三十五事自遵祖宗之訓以至小瑕不廢仁宗飛白書寶元二年十一月遣內侍就輔臣第賜御飛白書各一軸次日面謝奏曰陛下萬幾之煩翰墨不倦神筆竒奧曠古未有帝曰聽政之暇無所用心特此以為樂耳賜進士太學篇天聖八年自後登第賜字必遣中使賜儒行或中庸大學以為常神筆仁宗字勢皆有法度崇政延英之宣示飛白揭琳宫之榜篆額動感之碑皆足以顯當時之榮遇是以寶元之賜宰臣奏稱神筆竒奧御書明堂皇祐元年九月親篆明堂二字飛白明堂之門四字哲宗御書唐人詩賜范祖禹等上皇書賜羊祜列傳又書賜孝經意在隆孝治而形廣愛其後又書賜六經光宗御書尚書紹興五年九月賜趙鼎御書尚書御書裴度傳六月賜張浚裴度傳書目類西漢藝文志曰仲尼沒而微言絶春秋分為五左氏公穀鄒氏夾氏詩分為四毛齊魯韓易有數家之傳至秦燔滅文章漢興開獻書之路迄孝武書缺簡脫於是建藏書之策置寫書之官諸子傳說皆充祕府至成帝使陳農求遺書於天下詔劉向校經傳諸子詩賦任宏校兵書尹咸校數術李柱國校方技向總録而奏之向死歆於是總羣書而奏其七略故有輯略歆曰謂諸書之總要有六藝略有諸子略有詩賦略有術數略有方技略易十三家二百九十四篇易經十二篇周王孫易傳二篇楊何二篇韓嬰二篇王同二篇丁寬八篇孟氏京房十一篇災異六十六篇五鹿充宗略說三篇此特摘其顯然者録不盡録下皆類此書九家四百一十二篇古文經四十六卷伏生經二十九卷傳四十一篇歐陽章句三十一卷說義二篇小大夏侯章句各二十九卷解二十九篇劉向五行傳十一卷周書七十一篇劉向云周書誥誓號令也石渠奏議四十二篇詩六家四百一十六卷詩經二十八卷魯故二十五卷說二十八卷齊后氏故二十卷傳三十九韓故三十六卷內傳四卷外傳六卷說四十一卷毛詩三十九卷故訓傳三十卷禮十三家五百五十五篇古經五十六卷經七十篇七十子後學者記百三十一篇曲臺后蒼九篇古明堂隂陽三十三篇周官經六篇即今周禮也周官傳四篇軍禮司馬法百五十五篇封禪議十九篇武帝時石渠議三十八篇樂六家百六十五篇樂記二十三篇王禹記二十四篇雅歌詩四篇春秋二十三家九百四十八篇古經十二篇十一卷左氏傳三十卷公羊傳十一卷穀梁傳十一卷鄒氏傳夾氏傳各十一卷公羊外傳五十篇章句三十八篇雜記八十二篇董仲舒治獄十六篇穀梁外傳二十篇章句三十二篇石渠議奏三十九篇國語二十一篇新國語五十四篇劉向世本十五篇古史官記也戰國䇿三十三篇陸賈楚漢春秋九篇太史公百三十篇十篇有録無書馮商續十篇太古以來年紀二篇論語十二家二百二十九篇古二十一篇齊二十二篇說二十九篇魯二十篇傳十九篇夏侯說二十一篇張禹說二十二篇王駁說二十篇燕𫝊說三卷石渠奏議十八篇孔子家語二十七卷孝經十一家五十九篇古孔氏一篇二十二章長孫氏江氏后氏翼氏一篇十八章各有說一篇長孫說二篇張禹說二篇石渠五經惟議十八篇爾雅三卷二十篇小雅一篇古今字一卷弟子職一篇管仲作小學十家三十五篇史籀十五篇周宣王太史作八體六技證一曰大篆二小篆三刻符四蟲書五摹印六署七傳書八𨽻書蒼頡一篇凡將一篇司馬相如作急就一篇漢史游作元尚一篇李長作訓纂一篇揚雄又作蒼頡訓纂一篇蒼頡傳一篇杜林蒼頡訓纂一篇故一篇凡六藝一百三家三千一百二十三篇序六藝為九種儒家者流五十三家八百三十六篇晏子八篇子思二十三篇曽子十八篇漆雕子十三篇宓子十六篇子賤景子三篇世子二十一篇名碩陳人魏文侯六篇李克七篇公孫尼子二十八篇孟子十一篇孫卿子三十三篇芉子十八篇名嬰齊人周史六十六篇周政六篇周法九篇法天地立百官也河間周制十八篇寧越一篇王孫子一篇公孫固一篇十八章李氏春秋一篇羊子四篇童子一篇名無心難墨子徐子四十二篇魯仲連子十四篇平原君七篇虞卿春秋十五篇髙祖傳十三篇陸賈二十三篇劉敬三篇孝文傳十一篇賈山八篇孔臧十篇賈誼五十八篇河間王對三雍三篇董仲舒百二十三篇倪寬九篇公孫𢎞十篇終軍八篇吾丘夀王六篇虞丘說一篇莊助四篇桓寬鹽鐵論十六篇漢劉向所序六十七篇即新序說苑世說列女傳圖頌也揚雄所序三十八篇太𤣥法言樂四針二道家者流三十七家九百九十三篇伊尹五十一篇太公一百三十七篇鬻熊子二十二篇管子八十六篇老子鄰氏傳四篇傅氏說三十七篇徐氏說六篇劉向說四篇文子九篇關尹子九篇莊子五十二篇列子八篇老成子十八篇長盧子九篇田駢子二十五篇老萊子十六篇鶡冠子一篇周訓十四篇黃帝四經四篇銘六篇君臣十篇雜黃帝五十八篇力牧二十二篇孫子十六篇齊闕子二篇臣君子二篇蜀人鄭長者一篇楚子三篇隂陽家者流二十一家三百六十九篇朱子韋三篇鄭衍子四十九篇容成十四篇張蒼十六篇閭丘子十三篇周伯十一篇法家者流十家二百一十七篇李悝子三十二篇商君二十九篇申子六篇慎到子四十二篇韓子五十五篇朝錯三十一篇名家者流七家三十六篇鄧析二篇公孫龍子十四篇惠施子一篇趙毛公九篇墨家者流六家八十六篇尹佚二篇墨子七十一篇縱橫家者流十二家百七篇蘇秦三十二篇張儀十篇蒯通五篇鄒陽七篇主父偃二十八篇徐樂嚴安各一篇雜家者流二十家四百三篇孔甲盤盂二十六篇大禹三十七篇伍子胥八篇由余三篇尉繚三十九篇尸子三十篇吕氏春秋二十六篇淮南內二十一篇外三十三篇東方朔二十篇荆軻論五篇吳子一篇農家者流九家百一十四篇神農二十篇小說家者流十五家千二百八十篇伊尹說二十七篇鬻子說十九篇師曠六篇務成子十一篇凡諸子二百八十九家四千三百二十四篇詩賦百六家千三百一十八篇自屈原至王褒二十家三百一十二篇屈原二十五篇唐勒四篇宋玉十六篇莊忌五十四篇賈誼七篇枚乘九篇相如二十九篇淮南王八十二篇吾丘夀王十五篇倪寬二篇劉向賦三十二篇王褒十六篇自陸賈至朱宇二十一家二百七十四篇陸賈三篇枚臯百二十篇朱建二篇嚴助三十五篇朱買臣三篇劉辟強三篇司馬遷八篇蕭望之四篇揚雄十二篇馮商九篇朱宇三篇自孫卿至路恭二十五家百三十六篇孫卿十篇賈充四篇張仁六篇時洪一篇王商十三篇徐傳四篇吕嘉五篇路恭八篇自客主賦十八篇至隱書十八篇雜一十二家二百三十三篇自髙祖歌詩至南郡歌詩二十八家二百一十四篇髙祖一篇泰畤甘泉夀宫十四篇宗廟五篇吳楚汝南十五篇燕代謳鴈門雲中隴西九篇邯鄲河間四篇齊鄭四篇河間四篇左馮明索三篇京兆尹秦五篇洛陽四篇河南周七篇送迎靈頌歌詩三篇南郡五篇序詩賦為五種兵權謀十三家二百五十九篇吳孫武兵法八十二篇齊孫臏八十九篇公孫鞅二十七篇吳起四十八篇范蠡二篇大夫種二篇兵春秋三篇廣武一篇韓信三篇形勢十一家九十二篇圖十八卷起楚兵法七篇圖四卷止項王一篇隂陽十六家二百四十九篇圖十卷起太乙兵法十篇止辟兵咸勝方七十篇技巧十三家百九十九篇起鮑子兵法十篇止闕二十五篇凡兵馬五十三家七百九十篇圖四十三卷任宏次兵馬為四種天文二十一家四百四十五卷闕二十八卷止圖書祕記十七篇厯譜十八家六百六卷起黃帝五家厯三十三卷止杜忠算術十六卷五行二十一家六百五十二卷起泰乙隂陽二十三卷止五音定名十五卷蓍龜十五家四百一卷起龜書五十二卷止易卦八篇雜占十八家三百一十三卷起黃帝長栁占夢十一卷止種樹臧果相蠶十三卷形法六家百二十卷山海經十三篇凡數術百九十家二千五百二十八卷序為六種方技三十六家八百六十八卷序為四種太乙書六略三十八種五百九十六家萬三千三百九十六卷唐藝文志曰自漢以來史官列其名氏篇第以為六藝九種七略至唐始分為四類曰經史子集而藏書莫盛於開元其著録者五萬三千九百一十五卷而唐學者自為之書又二萬八千四百六十九卷可謂盛矣初隋嘉則殿書三十七萬卷至唐武德初有書八萬卷王世充平得隋書八千餘卷宋遵浮舟泝河西致京師經砥柱舟覆而書盡亡時令狐德棻請加錢帛募遺書增置繕寫數年書備貞觀中魏徵請求天下書繕寫藏於內庫令宫人掌之徵定為四部𤣥宗時命馬懷素修圖書比㑹幸東都乃就乾元殿東序檢校又借民間異本傳録及還京師遷書東宫麗正殿置修書院於著作院其後大明宫光順門外東都明福門外皆創集賢書院學士通籍出入既而太府給紙札以繕寫兩都各聚書四部以甲乙丙丁為次列經子史集四庫其本有正有副開元三年四部書成上令百姓官人入乾元殿東廊觀書祿山之亂尺簡不藏元載為相奏以千錢求書一卷又命苗發等使江淮括訪至文宗因鄭談言經籍未備詔祕閣搜訪於是四庫之書復全分藏于十二庫開成中分察使奏祕書省四庫見新舊書籍共五萬六千四百七十六卷其後經黃巢之亂而蕩然無復存矣今歐陽公述其終始而定其四庫之目一曰甲部經録其類十一易書詩禮樂春秋孝經論語䜟經解小學凡著録四百四十家五百九十七部六千一百四十五卷二曰乙部史録其類十三正史編年僞史雜史起居注故事職官雜傳記儀注刑法目録諸牒地理凡著録五百七十一家八百五十七部一萬六千八百七十四卷三曰丙部子録其類十七儒道法名墨縱橫雜家農家小說天文厯算兵書五行雜藝術類書明堂經脈醫術凡著録六百九家九百六十七部一萬七千一百五十二卷四曰丁部集録其類三楚辭别集總集凡著録八百一十八家八百五十六部一萬一千九百二十三卷舊唐書經籍志曰平世載籍世莫得聞今録開元盛時四部諸書以表藝文之盛甲部為經其類十二易以紀隂陽變化書以紀帝王遺範詩以紀興衰誦嘆禮以紀文物體制樂以紀聲容律度春秋以紀行事褒貶孝經以紀天經地義論語以紀先聖微言圖緯以紀六經䜟候經解以通六經大義詁訓以解六經章句小學以紀字體聲韻乙部為史其類十有三正史以紀傳表志古史以紀編年繫事雜史以紀異體雜記霸史以紀僞朝國史起居注以紀君人言動舊事以紀朝廷政令職官以紀官序品秩儀注以紀吉凶行事刑法以紀律令格式雜傳以紀先賢人物地理以紀山川郡國譜系以紀世族繼序略録以紀史策條目丙部為子其類十有四儒家以紀仁義教化道家以紀清淨無為法家以紀刑法典制名家以紀循名責實墨家以紀強本節用縱橫以紀辨說詭詐雜家以紀兼敘衆說農家以紀播殖種藝小說家以紀芻辭輿頌兵法以紀權謀制度天文以紀星辰象緯厯數以紀推步氣朔五行以紀卜筮占候醫方以紀藥餌針灸丁部為集其類有三楚辭以紀騷人怨刺别集以紀詞賦雜論總集以紀文章事類劉昫撰新唐書甲少舊唐書一丙多舊唐書三其異同如此古今書録唐開元毋氏撰名要初𤣥宗內庫書籍皆是太宗髙宗先代舊書開元七年又借繕寫民間異書九年商踐猷等共修成羣書四部二百卷至毋氏略為四十卷名古今書録以經史子集分四十類總五萬一千八百五十二卷並有小序及注撰人姓氏今此録雖非毋氏全書而綱目大抵已是以其所定著書羣書麗藻目録五代南唐朱遵度撰也凡古今之文章著為六例以總括之一曰六籍瓊華二曰信史瑶英三曰玉海九流四曰集苑金巒五曰絳闕蘂珠六曰鳳首龍編合二百六十七門總雜文一萬三千八百首共勒成一千卷中興書目國朝崇文總目王堯臣等撰也其書之總數凡三萬六百六十九卷自太祖平定四方天下之書悉歸藏室太宗真宗訪求遺逸起祕閣以貯禁中之籍至景祐中仁宗始詔羣儒校定修為總目嘉祐搜訪闕書目首載嘉祐六年六月訪求遺書詔書蓋崇文總目書成後仁宗患祕府所藏遺逸尚多於是開獻書之路下諸道求訪皇朝祕閣書目不知作者以類分二十九門總六千七百九卷史館新定書目不知作者載皇祐史館所藏書其目分經史子集四部總一萬四千四百九卷國子監書目熙寧中國子監書庫鬻書之數總一百二十五部祕書省書目不知作者録祕閣書目凡一萬四千九百餘卷髙宗中興紹興初再改定崇文總目與祕書省續編到四庫闕書至淳熙中陳騤等復定中興館閣書目與崇文總目並行參㑹衆見輯成書目七十卷等例一卷凡五十二門計見在書四萬四千四百八十六卷較之崇文所載實多一萬三千八百一十七卷復參三朝所志多八千二百九十卷兩朝所志多三萬五千九百九十二卷並中興書目編集古録歐陽修所撰自三代以迄秦漢隋唐五代古文籀篆分𨽻諸家之字書莫不皆有序卷帖次第無時世後先者蓋隨其所得録之耳羣書考索卷十八
