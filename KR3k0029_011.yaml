body:
  text: 羣書考索卷十一宋章如愚撰諸子百家門百家類雜家雜者兼儒墨之道通衆家之意以見王者之化無所不冠者也古者司史歴記前言往行禍福存亡之道然則雜者蓋出史官之職也放此爲之不求其本材少而多學言非而傳是以雜錯漫羡而無所指歸雜家者流蓋出於議官兼儒墨合名法知國體之有此見王治之無不貫此其所長也及盪者爲之則漫羡而無所歸心漢志新語漢陸賈撰本傳髙帝謂賈曰試爲我著秦所以失天下吾所以得之者及古成敗之國賈凡著十二篇每奏一篇帝未嘗不稱善稱其書曰新語今存二卷新書漢賈誼撰雜論治道國體及經學胎教本七十二篇劉向刪定爲三十八篇今皆存本傳所載治安䇿今釐爲數篇各立題目雜見于新書隋志以賈子名淮南子鴻烈解漢淮南王安撰安與蘇飛李尚左吳田由雷被等八人共講論道德總統仁義而著此書新序漢劉向撰遠至舜禹次及周秦古人嘉言善行悉採摭序載總一百六十三章本朝曽鞏校其差誤爲之序説苑漢劉向撰采傳記百家所載行事之迹凡二十篇按崇文總目今存五篇餘亡後曽鞏得十五篇與舊合二十篇而爲之序論衡後漢王充撰凡八十五篇釋物類同異正時俗嫌疑王充論衡之自紀也述其父祖不肖爲州閭所鄙而已荅以瞽頑舜神鯀禹惡聖夫自序其世家固當以孝親爲主而乃盛矜於已厚辱其先責以名教罪莫大焉史通風俗通後漢應劭撰辨物類名號釋時俗嫌疑後世服其洽聞昌言後漢仲長統撰論説古今及時俗行事因著論名昌言凡三十四篇今存十六篇申鑒後漢荀悦撰悦志在獻替乃作申鑒五篇其所論辨通見政體既成而奏之今所載政體時事俗嫌雜言上下凡五卷本傳止載政體一篇中論後漢徐幹撰幹病辭人工麗美之文乃著中論二十篇闡宏大義以示學者其書雜論治道脩身學問之要旁及厯家壽夭之説博物志晉張華撰采錄雜説異聞名類不一而足多所攷正劉子題劉晝撰泛論治國脩身之要雜以九流之説凡五十五篇唐志云劉勰撰今袁孝政序云劉子者劉晝字孔昭傷已不遇播遷江表故作此書時人莫知謂劉歆梁劉勰劉孝標作俗書南唐宋齊丘撰凡百十篇言道與術中卷言德與仁下卷言食與儉古今注晉崔豹雜取古今名物各爲攷釋凡八門䜟緯漢順帝陽嘉三年太史令張衡以中興之後儒者爭學圖緯上書言春秋元命包有公輸班與墨翟事見戰國又言别有益州益州之置在於漢世又劉向父子領校祕書閣定九流亦無䜟錄則知圖䜟成於哀平之際皆虚僞之徒以要世取貲不宜收藏圖䜟一禁絶之則朱紫無所眩典籍無瑕玷矣農家農九家百一十四篇農家者流蓋出於農稷之官播百榖勸耕桑以足衣食故八政一曰食二曰貨孔子曰所重民食此其所長也及鄙者爲之以爲無所事聖王欲使君臣並耕誖上下之序漢志農者所以播五榖藝桑麻以供衣食者也書叙八政職任萬民其一曰三農生九榖地官司稼掌巡邦野之稼而辨穜稑之種周知其名與其所宜地以爲法而懸于邑閭是也鄙者爲之則棄君臣之義徇耕稼之利而亂上下之序神農二十八篇六國時諸子疾時怠於農業道許行事託之神農師古曰劉向别錄云疑李悝及啇君所説藝文志汜勝之十八篇成帝時爲議郎師古曰劉向别錄云使教田三輔有好田者師之徙爲御史藝文志小説小説家者流蓋出於稗官街談巷語道聴塗説者之所造也孔子曰雖小道必有可觀者也致遠恐泥是以君子弗爲也然亦弗㓕也閭里小知者之所及亦使綴而不忘如或一言可采此亦芻蕘狂夫之議也小説者街説巷語之説也傳載輿人之誦詩美詢于芻蕘古者聖人在上史爲書瞽爲詩工誦箴諫大夫規誨士傳言而庶人謗孟春徇木鐸以求歌謡巡省觀人詩以知風俗過則正之失則改之道聴塗説靡不畢紀周官誦訓掌道方志以詔觀事道方慝以詔辟忌以知地俗而訓方氏掌道四方之政事與其上下之志誦四方之傳道而觀衣物是也孔子曰雖小道必有可觀者焉致遠恐泥隋志兵家兵家者蓋出古司馬之職王官之武備也鴻範八政八曰師孔子曰爲國者足食足兵以不教民戰是謂棄之明兵之重也易曰古者弦木爲弧剡木爲矢弧矢之利以威天下其用上矣後世燿金爲刄割革爲甲器械甚備下及湯武受命以師克亂而濟百姓動之以仁義行之以禮讓司馬法是其遺事也自春秋至於戰國出竒設伏變詐之兵並作漢興張良韓信序次兵法凡百八十二家刪取要用定著三十五家諸吕用事而盗取之武帝時軍政楊㒒捃摭遺逸紀奏兵錄猶未能備至于孝成命任宏論次兵書漢志兵者所以禁暴靜亂者也周官大司馬掌九伐之法以正邦國是也然皆動之以仁行之以義故能誅暴靜亂以濟百姓下至三季恣情逞欲爭伐尋常不撫其人設變詐而㓕仁義至乃百姓離叛以致於亂隋志權謀者以正守國以竒用兵先計而後戰兼形勢包隂陽用技巧者也形勢者靁動風舉後發而先至離合背鄉變化無常以輕疾制敵者也技巧者習手足便器械積機闗以立攻守之勝諸家總論諸子十家其可觀者九家而已皆起於王道旣微諸侯力政時君世主好惡殊方是以九家之術蠭出並作各引一端崇其所善以此馳説取合諸侯其言雖殊辟猶水火相㓕亦相生也仁之與義敬之與和相反而皆相成也易曰天下同歸而殊塗一致而百慮今異家者各推所長竆其究慮以明其指雖有蔽短合其要歸亦六經之支與流裔使其人遭明王聖主得其所折中皆股肱之材已仲尼有言禮失而求諸野方今去聖久遠道術缺廢無所更索彼九家者不猶愈於野乎若能脩六藝之術而觀此九家之言舍短取長則可以通萬方之義矣字學易曰上古結繩以治後世聖人易之以書契百官以治萬民以察蓋取諸夬夬揚于王庭言其宣揚於王者朝廷其用冣大也古者八嵗入小學故周官保氏掌養國子教之六書謂象形象事象意象聲轉注假借造字之本也師古曰象形爲畫成其物隨體詰屈日月是也象事即指事也謂視而可識察而見意上下是也象意即㑹意也謂比類合誼以見指撝武信是也象聲即形聲謂以事爲名取譬相成江河是也轉注謂建類一首同意相受考老是也假借謂本無其字依聲託事令長是也漢興蕭何草律亦著其法曰太史試學童能風書九千字以上乃得爲史又以六體試之課冣者以爲尚書御史史書令史吏民上書字或不正輙舉劾六體者古文竒字篆書𨽻書繆篆蟲書師古曰古文謂孔子壁中書竒字即古文而異者也篆書謂小篆蓋秦始皇使程邈所作也𨽻書亦程邈所獻主於徒𨽻從簡易也繆篆謂其文屈曲纒繞所以摹印章也虫書謂爲虫鳥之形所以書幡信也皆所以通知古今文字摹印章書幡信也古制書必同文不知則闕問諸故老至於衰世是非無正人用其私故孔子曰吾猶及史之闕文也今亡矣夫蓋傷其寖不正史籕篇者周時史官教學童書也與孔氏壁中古文異體蒼頡七章者秦丞相李斯所作也爰歴六章者車府令趙髙所作也博學七章者太史令胡母敬所作也文字多取史籕篇而篆體復頗異所謂秦傳者也是時始造𨽻書矣起於官獄多事茍趨省易施之於徒𨽻也漢興閭里書師合蒼頡爰歴博學三篇斷六十字以爲一章凡五十五章并爲蒼頡篇武帝時司馬相如作凡將篇無復字元帝時黄門令史㳺作急就篇成帝時將作大匠李長作元尚篇皆蒼頡中正字也凡將則頗有出矣至天始中徴天下通小學者以百數合各記字於庭中揚雄取其有用者以作訓纂篇順續蒼頡又易蒼頡重復之字凡八十九章臣復續揚雄作十三章韋昭曰臣班固自謂也作十三章後人不敢疑在蒼頡下章三十四章中凡二百三章無復字六藝羣書所載畧備矣蒼頡多古字俗師失其讀宣帝時徴齊人能正讀者張敞從受之傳至外孫之子杜林作訓故并列焉漢志孔子曰必也正名乎名謂書字名不正則言不順言不順則事不成説者以爲書之所起起自黄帝蒼頡比類衆形謂之文形聲相益謂之字著於竹帛謂之書故有指事象形形聲㑹意轉注假借六義之别古者童子示而不誑六年教之數與方名十嵗入小學學書訖二十而冠始習先生之道故能成其德而任事然自蒼頡訖于漢初書經五變一曰古文即蒼頡所作二曰大篆周宣王時史籕所作三曰小篆秦時李斯所作四曰𨽻書程邈所作五曰草書漢初作秦世既廢古文始用八體有大篆小篆刻符摹印蟲書署書殳書𨽻書漢時以六體教學童有古文竒字篆書𨽻書繆篆蟲鳥并藁書楷書懸針垂露飛白等二十餘種之勢皆出於上六書因事生變也魏世又有八分書其字義訓讀有史籕篇蒼頡篇三蒼埤蒼廣蒼等諸篇章訓詁説文字林音義聲韻體勢等諸書自後漢佛法行於中國又得西域胡書能以十四字貫一切音文省而義廣謂之婆羅門書與八體六文之義殊别今取以附體勢之下又後魏初定中原軍容號令皆以夷語後染華俗多不能通故錄其本言相傳教習謂之國語今取以附音韻之末今後漢鐫刻七經著於石碑皆蔡邕所書魏正始中又立一字石經相承以爲七經正字後魏之末齊神武執政自洛陽徙于鄴都行至河陽值岸崩遂没于水其得至鄴者不盈大半至隋開皇六年又自鄴京載入長安置於祕書内省議欲補緝立于國學尋屬隋亂事遂寢廢營造之司因用爲柱礎貞觀初祕書監臣魏徴始收聚之十不存一其相承傳授之本猶在祕府并秦帝刻石附於此篇以備小學魏衛恒撰四體書勢自秦用篆書焚燒先典而古文絶矣漢武帝時魯共王壞孔子宅得尚書論語孝經時人已不復知有古文謂之科斗書漢藏祕府希得見之魏初傳古文者出於邯鄲淳衛敬侯冩淳尚書後以示淳而淳不别至正始中立三字石經轉失淳法因科斗之名遂效其法太康元年汲縣民發魏襄王冡得策書十餘萬言敬侯所書猶有髣髴敬侯謂覬也其序篆曰秦時李斯號爲工篆漢建初中扶風曹喜少異於斯而亦稱善邯鄲淳師焉畧究其妙韋誕師淳而不及也漢末又有蔡邕采斯喜之法爲古今雜形然精密閑理不如淳也其序錄𨽻書已畧見武紀又曰師宜官爲大字邯鄲淳爲小字其序草書曰漢興又有草書不知作者姓名至章帝時齊相杜度號善作篇後有崔瑗崔寔亦皆稱工杜氏殺字甚安而書體微瘦崔氏甚得筆勢而結字小疏洪農張伯英因而轉精甚巧韋仲將謂之草聖伯英弟文舒者次伯英又有姜孟穎梁孔達田彦和及韋仲將之徒皆伯英弟子有名於世然殊不及文舒也案説文蓋衣類象形謂之文形聲相益謂之字著於竹帛謂之書有六義焉一曰指事二曰象形三曰形聲四曰㑹意五曰轉注六曰假借古者子生六嵗而教數與方名十嵗入小學學六甲書計之事則文字之謂也自黄帝至三代其文不改秦焚燒先典乃廢古文更用八體一曰大篆周宣王史籕所作也二曰小篆始皇時李斯趙髙胡母敬所作也大小篆並簡冊所用也三曰刻符傳也四曰摹印亦名繆篆施於印璽也五曰蟲書爲蟲鳥之形施於幡信也六曰署書門題所用也七曰殳書銘於戈㦸也八曰𨽻書始皇時程邈所定六行公府也漢氏因之至王莽居攝使甄豐刋定六體一曰古文二曰竒字三曰篆書四曰𨽻書五曰錄書六曰蟲書當代以教學童焉又衛恒四體書勢曰漢興又有草書不知作者蓋兩漢銘勒雜以古文篆籕及八分爲之魏晉以還𨽻文遂盛蕭子良古今篆𨽻文體有藁書楷書蓬書懸針書垂露書飛白書填書奠書鳥書虎爪書偃波書鶴頭書象形篆尚方大篆鳳鳥書科斗蟲書龍虎書仙人書芝英書十二時書倒薤書龜書麒麟書金錯書蚊脚書凡數十種皆出於六文八體之書而因事生變者也崔瑗草書體書體之興始自頡皇冩彼鳥跡以定文章爰暨末葉典籍彌繁人之多僻政之多權官事荒蕪勦其墨翰惟作左𨽻舊字是刪草書之法蓋先簡畧應時諭㫖周於卒迫兼功並用愛日省力純儉之變豈必古式蔡邕篆書體鳥遺迹皇頡循聖作則制斯文體有六篆爲真形要妙巧入神公緩𨽻書體皇頡作文因物構思觀彼鳥迹遂以成章閲之後嗣存載道義綱紀萬事俗所傳述實由書記時變巧易古今各異蟲篆既繁草藁近僞適之中庸莫尚於𨽻規矩有則用之簡易漢許叔重作説文解字按後漢許叔重其字也叔重自序云叙篆文合以古籕博采通人稽撰其説不相雜厠凡五百四十部南唐徐諧作説文解字繁𫝊又作説文解字韻譜玉篇梁大同中顧野王撰廣韻不知作者初隋陸法言作切韻唐孫愐從而増之是爲廣韻此合法言愐兩書列諸家増字訓釋名字於卷首崇文總目云蓋後人博采附見故多叢雜宋朝王安石元豐間上字説二十四卷序云許叔重又於書之意時有所悟因序錄其説與門人所推經義附之並館閣書目晉宋隋唐風流之士攦指於墨池曽不如兩漢經師之詁訓又不如周家之篆籕有禆於國家而訓詁發明於墳典銀鈎玉筯之難工何益於事爲哉已上策㫁卦演龍圖文開鳥迹周宣博雅史籕興古篆之文秦氏剗㓕古文爰創𨽻書自著秦文肇興八體刻符兼於大篆摹印逮乎𨽻書兩漢因之張敞杜業講學於前揚雄豐甄校理於後魏晉以降始造新字字畫無端平之體魚鳥増奔放之容唐大詔令武后改元載初赦蒼頡訓詁杜林撰三倉李斯撰郭璞解凡三卷三倉訓詁埤倉張挹撰廣倉樊恭撰訓纂成帝元延中召天下通小學者以爲數各令記字於庭中揚雄取其有用者以作訓纂嗣續蒼頡中重之字凡八十九章班固復續揚雄作十三章凡一百二章凡古今六藝羣書所載畧備矣蒼頡多古字俗師失其讀宣帝時有齊人能正讀者張敞從受之傳至外孫之子杜林爲作訓詁急就章元帝時史游作急就篇藝文志皆蒼頡中正字至隋唐經籍志始謂之急就章館閻書目唐顔師古爲之注吕向連錦書唐吕向工草𨽻能一筆環冩百字若縈髪然世號連錦書張旭草書文宗時旭大醉乃下筆或以頭濡墨而書既醒自視以爲神不可復得也旭自言始見擔夫爭道又聞鼓吹而得筆法觀舞劒器得其神后人論書歐虞禇陸皆有異論至旭無非短者傳其法惟崔邈顔真卿云唐太宗出御府金帛求天下古本命魏徴虞世南禇遂良定真僞凡得羲之真行二百九十紙爲八十卷又得獻之張芝等書以正觀字爲印開元五年敕陸元悌魏哲劉懷信檢校分益卷帙元宗自書開元自爲印唐書學唐取士之科有明字科學館諸生試書凡書學石經説文字林先曰試通乃墨試説文字林二十條通十八爲第許謹説文解字林吕帆字林字統楊承統字苑馮幹括玉篇梁大同九年顧野王撰本唐正元元年富春秋増加三十卷祥符六年陳彭年校勘増廣書苑景祐三年十月國博士周越上所纂集古今書所更體法名曰書苑凡二十九卷雍熙廣韻太宗端拱二年六月丁丑詔以字書之學歴代編錄爲繆實多命太常博士向中正著作郎吳鉉等考古今之同異究篆𨽻之根源其新定雍熙廣韻一百篇宜付史館雍熙重脩説文雍熙三年十一月右散騎常侍徐鉉等表獻新校定説文三十卷先是上留心字學以説文差繆學者無㨿乃詔鉉與向中正重加刋正至畢上覽嘉之故爲下詔賜器幣有差温公類編如玉篇而釋注加詳韻學類聲韻李登撰唐藝文志韻集吕靜撰見唐藝文志韻畧陽休之撰唐藝文志四聲韻畧夏侯詠撰凡十三卷唐藝文志四聲部二十卷張諒撰唐藝文志韻篇趙氏撰唐藝文志切韻五卷陸慈撰唐藝文志切韻十卷李舟撰唐藝文志韻音二十卷蕭鈞撰唐藝文志顔真卿著韻海鑑源三百六十卷唐藝文志周思言音韻李季節音韻杜臺卿韻畧此二書見廣韻序唐藝文志不載廣韻隋陸法言取諸家音韻而定之爲切韻五卷劉臻顔之推等同撰集長孫訥言箋注闗亮薛峋孫愐等増加字宋朝景德四年刋正大中祥符元年命儒臣増損改爲重修廣韻孫愐唐韻五卷出唐藝文志即廣韻也其序曰陸生切韻盛行於世然注有差錯文復漏誤乃補遺闕具爲訓解名曰唐韻切韻切韻者本乎四聲紐以雙聲疊韻欲使文章麗則韻調精明於古人爾吳棫毛詩叶韻補音序曰少聞元城宰臧謀之言曰詩韻無不恊者如來之爲釐慶之爲差馬之爲姥之類詩音舊有九家唐陸德明始以見定爲一家之學今釋文是也至開元中脩五經文字我心慘慘書爲懆音七到反伐鼔淵淵書淵爲鼘者於巾切皆與釋文音訓有異乃知明德之學在當時亦未必盡用而詩音之亡或有所自矣廣韻序凡二萬六千一百九十四言注一十九萬一千六百九十三字陸法言撰本長孫訥言箋注儀同三司劉臻外史顔之推著作郎魏淵武陽太守盧思道散騎常侍季若國子愽士蕭該蜀王諮議參軍辛德源吏部侍郎薛道衡已上八人同撰集郭知𤣥拾遺緒正更以朱箋三百字關亮増加字薛峋増加字王仁煦増加字祝尚丘増加字孫愐増加字嚴寶文増加字裴務齊増加字陳道固増加字更有諸家増字及義理釋訓悉纂畧備載卷中勒成一部進上以今聲調既自有别諸家取捨亦復不同吳楚則時傷輕淺燕趙則多傷重濁秦隴則去聲爲入梁益則平聲似去文字聿興音韻乃作蒼頡爾雅爲首詩頌次之則有字統字林韻集韻畧述作頗衆得失互分惟陸生切韻盛行於世然隋珠尚纇虹玉仍瑕注有差錯文復漏誤若無刋正何以討論輙罄䛕聞敢補遺闕兼習諸書具爲訓解州縣名號亦據今時字體從木從才著彳著亻施殳施支安尒安禾並悉具言庶無紕繆其有異聞竒怪傳説姓氏原由土地物産山河草木鳥獸蟲魚備載其間皆引馮據隨韻編紀添彼數家勒成一書名曰唐韻蓋取周易周禮之義也及按三蒼爾雅字統字林説文玉篇石經聲韻聲譜九經諸子史漢三國志晉宋後魏周隋陳宋兩齊書本草姓苑風俗通古今注賈執姓氏英賢傳王僧儒百家譜周何潔集文選諸集孝子傳輿地志及武德已來創置訖開元三十年並列注中六十字祖因煙人然新鮮餳涎疑妍零連清遷賓邊經堅神禪秦前寧年寅延真氊娉偏亭田澄纒平便擎䖍輕牽稱燀丁顛興掀興掀汀天汀天精箋民眠聲羶刑賢顧野王撰玉篇總三十卷陸法言著廣韻幾四萬言五音之呼吸四聲之清濁毫釐靡差纎悉備載然其正韻反音罕有知者今舉其宏綱撮其樞要纔六十字而四字無文止五十六字而已便而易見簡而易知學者當留心熟讀周流萬遍將見隨觸而長不約而至雖求字於篇韻之外豈難知哉羣書考索卷十一
