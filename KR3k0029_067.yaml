body:
  text: 羣書考索後集卷一宋章如愚編官制門官數類唐官六十通典云唐官數闕尚書云建官惟百鄭𤣥云虞官六十唐官朱聞堯舜同道或皆六十并屬官而言則皆有百虞官六十明堂位曰有虞氏官五十鄭云六十夏官一百二十明堂位曰夏官百尚書云夏商官倍則當二百矣而鄭云百二十商官二百四十明堂位曰商官二百鄭云二百四十合依鄭説周内外官六萬三千六百七十五人内二千六百四十三人外諸侯國官六萬一千零三十二人秦制爵二十等以賞功勞漢吏員自佐吏至丞相凡十三萬二百八十五人哀帝時官數兼諸侯州郡胥吏後漢内外文武官七千五百六十七人内一千零五十五人外六千五百一十二人都計内外官及職掌人十五萬二千九百八十六人魏官置九品其數未詳晉因魏内外文武官六千八百三十六人内八百九十四人外五千九百四十二人都計内外官及職掌人一十一萬八千六百七十二人宋因晉内外文武官六千一百七十二人内八百二十三人外五千三百四十九人内職掌人門亭長孝經師月令律令師及書佐等一千四百六十一人都計内外官及職掌人七千六百三十三人齊内外文武官二千有六十三人内九百四十七人外一千一百一十六人州刺史及官屬并太守内史州縣令相寧蠻夷校尉中郎将護軍等梁官品秩祿之差亦如前代更定十八班不登二品者又為七班又置諸軍之號二十四班内外官數未詳陳官品祿秩班次多因梁制而又置相國位列丞相上并及丞相太宰太傅太保大司馬大将軍並以為贈官定令尚書置五員郎二十一員其餘並遵梁制為十八班官數未詳後魏内外文武官七千七百六十四人内二千三百七十一人外五千三百九十三人州刺史郡太守縣令長等内文學學生三千人都計内外官一萬零七百六十四人其京城諸司令史及諸色職掌人及外州郡縣屬官并諸色職掌人等並未詳命數亦未詳魏氏之初法制簡畧設官分職多因事宜罕依故實誠非經逺即列九品每品又分為上中下三等至孝文帝太和十八年定令方有倫序又按前代職次皆無從品魏氏始有之自四品以下正從又分為上下階亦一代之别制也北齊内品二千二百二十二人國子太學四門等學生并尚書都令史門下通事主事等令史五百九十六人都計文武官及學生令史等總二千九百一十八人後周改為九命六卿屬官之外内外衆職亦多參秦漢按所建六官并徒屬及府史雜色職掌人二萬一千零七十三人二千九百八十九人諸色官萬八千八十四人府史學生筭生書生醫生倅長虎賁驍騎羽林游擊奉車馭夫武理武候卜筮占夢視祲相生等人也隋開皇中有正從九品上下階至煬帝除上下階唯留正從九品其餘官品亦多升降萬二千五百七十六人内官二千五百八十一員外官郡縣九千九百九十五員又内職掌醫師卜師巫覡掌醖獸醫博士京市長麴倉督并太學學生刻漏千牛門尉門候之事令史及外職掌郡縣佐史族正里正等總十八萬三千三百六十一人内千六百六十四人外十八萬一千六百九十七人都計内外文武官及胥總十九萬五千九百三十七人唐開元二十五年制定流内太師而下流外諸衛而下之别有正從九品上下階内外文武官員凡萬八千八百五人文官萬四千七百七十四人武官四千二十一人内官二千六百二十外官州縣折衝府鎮戍闗廟岳瀆等萬六千二百八十五人内職掌齋郎府史亭長主仗典食監門直長親事帳内等外職掌州縣倉督錄事里正及岳廟齋郎并折衝府旅師隊正隊副等緫三十四萬九千八百六十三内三萬五千一百七十七外三十一萬四千六百八十六都計文武官及諸色胥史等緫三十六萬八千六百六十八人制為九品各有從自四品以下亦分為下階大抵多因隋制官品類周官九命漢自中二千石至百石凡十六等成帝除八百石五百石秩二等後漢自中二千石至斗石凡十三等魏秩次多因漢制更置九品晉宋齊並因之梁因之更置十八班班多為貴陳並因之後魏置九品品各置從自四品以下每品分為上下凡三十階北齊並因之後周制九命每命分為二以正為上凡十八命隋朝置九品品各有從自四品以下每品分為上下凡三十階自太師始焉謂之流内流内自此始焉煬帝除上下階唯留正從各九品又置視正二品至九品品各有從自行䑓尚書令始焉謂之視流内自此始焉大唐自流内以上並因隋制又置視正五品視從七品以署薩寳及祅正祅呼烟反謂之視流内又置勲品九品自諸衞錄事及五省令史始焉謂之流外流外自此始其勲品自齊梁即有之三品以上紫衣金魚袋五品以上緋衣銀魚袋皆執象笏七品以上綠衣九品以上青衣皆木笏光宅元年青衣為碧武后時改五品以上銀魚袋中宗反正從舊初武后天册中制文武官加階應入五品者並須入仕歴十六考以上無私犯進階之時見居六品官及七品官以上清官者其應入三品者取入仕三十三考以上並無私犯進階之時凡居四品官者自外蹤計階者應入仕並不在進階限如有竒才異行别效殊功不拘此列官制緫序伏羲氏以龍紀故為龍師名官共工氏以水紀故為水師水名神農氏以火紀故為火師火名黄帝氏以雲紀故為雲師雲名又晉志曰黄帝置三公之秩以親黎元少昊氏立鳳鳥適至故以鳥紀鳥師鳥名顓帝不能紀逺乃紀於近為民師而命以民事又有五行之官唐堯有羲和之官叔仲周禮正義以為即四岳内有百揆四岳四岳分主四方諸侯外有州牧侯伯虞舜有天下伯禹作司空宅百揆棄社稷播百榖契為司徒敷五教臯陶作士正五刑垂作共工利器用伯益作虞育草木鳥獸伯夷秩宗典三禮䕫典樂教胄子和神人龍作納言出納帝命盖亦為六官以主天地四時也夏后之制亦置六卿甘誓云召六卿是也其官名次猶承虞制禮記曰夏后氏官百天子有三公九卿二十七大夫八十一元士商制天子建天官先六太曰太宰太宗太史太祝太士太卜典司六典五官曰司徒司馬司空司士司宼典司五衆六府曰司土司木司水司草司器司貨典司六職六工曰土工金工石工木工獸工草工典制六材五官致貢曰享五官之長曰伯千里之内為王畿千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯八州八伯五十六正百六十八帥三百三十六長八伯屬於天子之老二人分天下以為左右曰二伯老謂上公並通典伊尹曰三公調隂陽九卿通寒暑大夫知人事列士去其私成湯居亳初置二相以伊尹仲虺為之晉志書曰唐虞稽古建官惟百後魏志云唐虞六十夏商倍之周過三百是為大備夏商官倍亦克用乂周武列爵惟五分土惟三建官惟賢位事惟能成王董正治官三百六十立太師太傅太保茲惟三公論道經邦燮理隂陽官不必備惟其人少師少傅少保曰三孤貳公𢎞化寅亮天地弼予一人冢宰掌邦治綂百官均四海司徒掌邦教敷五典擾兆民宗伯掌邦禮治神人和上下司馬掌邦政綂六師平邦國司㓂掌邦禁詰奸慝刑暴亂司空掌邦土居四民時地利六卿分職各率其屬以倡九牧阜成兆民周禮天地四時之官謂之六卿天官冢宰掌邦治地官司徒掌邦教春官宗伯掌邦禮夏官司馬掌邦政秋官司宼掌邦刑冬官司空掌邦事其屬三百六十者周天之數也盖古人設官皆天之所為非人之所設詎可以私情參哉然攷之周禮六官六屬往往非止三百六十盖其中有兼官也且鄉老二鄉則公一人是三公兼鄉老也一鄉則卿一人是六卿兼鄉大夫也軍将皆命卿是六卿又兼六軍之将也甚者太公以太師兼司盟之職載在盟府太師職之是也以三公而兼太史之職太史司宼蘇公是也吾夫子責管仲所以言官事不攝而罪其變先王之法也三公三孤周禮之職不詳此周官所謂官不備而其職亦非羣有司所可並論也周衰諸侯去班爵之籍人用私意僣偪不常晉以軍行具六卿楚僣公號荘三十年秦不師古設爵級以勸武功厥後罷侯置守太尉主五兵丞相緫百揆又置御史大夫以貳於相先王舊典靡有孑遺漢承秦弊所當更新髙帝無復古之志叔孫通茍趨時之便大抵多仍秦舊孟堅記漢置官本末周之遺制曽不多見而以秦官書者盖緫緫也賈誼請更官名見沮絳灌孝武頗有増益太初以後浸以奢廣矣曰丞相漢初或因軍功而加丞相者樊噲酈商或改丞相之名而俾之征伐者韓信漢制常以列侯為相自公孫𢎞以布衣數年登相位而後封平津侯漢制丞相進見御位即起在輿為下至公孫𢎞武帝始不冠見矣漢制選用人才皆由丞相髙帝舉賢詔令詣國相自署行義年武帝初衞綰奏罷賢良申韓蘇張或有薦人起家至二千石自武帝重儒官朝夕在側薦進人物而選用之權不在宰相嚴助薦朱買臣楊得意薦司馬相如漢制三公號無所不統周家冢宰之屬分入於九卿宫伯則分入郎中令宫正則分入衞尉膳人酒人則分入少府司㑹大府則入司農宫人内宰則入太長秋雖號統攝而不得專領其後九卿更進用事而丞相充位給事謁者為左右私人而丞相為外朝之官受遺歸霍光而朝事歸大将軍初置一相孝恵髙后置左右相文帝復一相哀帝更名大司徒曰太尉文景或置或罷元狩中始置大司馬以冠大将軍之號盖借古官名以為寵非有夏官之實故大司馬太尉不並置太尉雖掌武而兵不在焉髙后時吕祿吕産實掌南北軍吕祿未解将軍印雖太尉不得入北軍然當時非太尉則事不濟盖職尤能盡䕶諸将也武帝置大司馬以冠将軍所以寵衞霍初未嘗及於政事至末年用霍光始兼領尚書事宣帝之後加於外戚而漢禍惨矣雖然漢武帝用大司馬領尚書而丞相固已無權矣然猶建空名於百官之上霍光召議必以丞相為首元平之奏必先言丞相敞而後至於大将軍光及哀帝用董賢為大司馬而司馬遂居司徒之上朱博傳曰武帝初年置大司馬冠大将軍非有印綬官屬至成帝初年賜大司馬金印紫綬乃置官屬曰御史大夫成帝更名大司空哀帝復為御史大夫後又更為大司空御史之名周官以中士下士為之特小臣之傳命令者耳至於戰國其職益親故獻書多言獻書於大王御史而黽池之㑹各命御史書事秦任刀筆又自親事以操制臣下侍御僕從其勢益重遂與宰相分權而居三公之位漢興獨不可正名乎安有三公而專治書史者乎然漢初御史實副宰相髙后欲封諸吕問右丞相陵左丞相平太尉勃而不及趙堯文帝錢榖之問止及右丞相勃左丞相平而不及張蒼是以經歴三世事權盡在宰相國體増重而御史大夫不敢萌出位之思及景帝摧抑申屠嘉而晁錯以刻深用事故事多決於錯謀削七國錯實主之丞相不與也調發兵食錯實任之丞相不聞也馬闗之禁景紀獨書御史綰而不及丞相陶青劉舍之徒齪齪無所建明其有以也漢儀御史大夫見孝亷上計丞長史皆於官司馬門外又宣帝詔御史察計簿然則受上計者御史職也秩中二千石自成帝用何武建三公之言而後大司馬大司空皆封列侯俸如丞相通典曰自此三公俱為宰相矣九卿之職曰奉常景徳初更名太常主郊廟禮樂之事博士亦其屬公孫𢎞對䇿太常奏居末弟掌樂之官而兼教育之任誠以樂者廣大樂易其感人也易以入故也曰光祿勲武帝太初中更郎中令為光祿勲漢初郎中令掌郎衞諸官如諌大夫議郎中郎皆得以議論拾遺左右而謁者僕射又得以執㦸侍衞最為親近矣謁者中郎将之得却慎夫人座皆其親近之至也及武帝游後庭用中人為謁者尚書而諸郎不帶加官不得入内而後郎中令之官稍踈人主罕與正人接而中人日親頗用權矣曰衞尉景徳初更名中大夫今後復為衞尉掌宫中徼處事其職兵衞者乎曰太僕掌輿馬曰廷尉景帝中六年更名大理武帝建元復為廷尉哀帝復為大理掌平獄奏當所應凡郡縣獄疑罪皆處當以報武帝以下置中都官獄郡十六所凡意所欲附致者皆不下廷尉以史考之昭平君繫獄内官灌夫繫獄居室復劾繫都司空李陵言老母繫保宫劉輔繫掖廷王商繫若盧詔獄張湯治他因導官典客有司火獄水衡有上林獄中尉有寺互都船獄至若北軍别有主上章者獄蠶室腐刑獄暴室宫人獄又皇孫坐郡邸獄辛慶忌徙共工獄其所可見大畧如此曰大鴻臚景帝中六年更名大行令武帝太初元年更名大鴻臚郎秦典客職也掌諸侯歸義蠻夷等國曰宗正掌親屬平帝更名宗伯曰大司農景帝更名大農令武帝太初元年更名大司農即秦治粟内史也掌榖貨自太倉至籍田令丞屬焉曰少府掌山海池澤之税以給共養漢氏之制天下公用仰大司農而乘輿供養悉出少府不以民力共浮費别公私示正路也然至於公用缺乏往往資之少府故賈捐之命用兵之費曰大司農錢盡乃以少府禁錢續之是也其屬有尚書令丞中書謁者令丞黄門令丞尚書中書黄門此後世之所謂三省者皆出於少府之屬初秦置尚書於禁中有令丞通章奏而已漢武已後其任甚重及光武親攬吏職天下事皆上尚書與人主參决乃下三府尚書令遂為端揆之官矣晉百官志曰武帝游宴後庭始用宦者主中書元帝以𢎞恭為令石顯為僕射秉權用事而蕭望之以為中書政本宜以賢明之選更置士人黄門奏官也掌侍從左右三者皆親近人主故卒為三省少府掌刑威而猶屬丞相御史此其制之善也自光武以山海鹽鐡歸郡縣官中私用付之外有司章帝以後始别立監以奄人領之大臣不得預矣皆中二千石其外有中尉掌徼循京師武帝太初元年更名執金吾秩雖中二千石後漢至九卿皆云卿一人至中尉獨不言卿則不預九卿之列明矣漢世凡中二千石多稱卿王尊傳如淳注曰三輔皆秩中二千石故亦稱卿上公則太傅髙后置後省哀帝復之至平帝置太師位太傅上太保次太傅王陵忤㫖孔江懼罪而師傅之重迄漢世為右遷之地有特進漢制特進位三公下漢儀特進后父兄為之或以處前宰相有将軍漢初将兵稱将軍兵罷不置吕后以吕祿為上将軍居北軍非漢制也文帝拜宋昌為衛将軍薄昭為車騎将軍始有定職武帝拜衛青大将軍而大将軍始有定職其後霍去病為驃騎将軍上官桀為左将軍昭帝用馮奉世為右将軍始有驃騎左右之職趙充國為後将軍韓増為前将軍始有前後将軍之職其他将軍因出征伐名號不一事已或置或否獨大将軍驃騎衞将軍左右前後将軍終漢世不更置太子則有太傅少傅詹事庶子洗馬舍人家令皆其屬也皇后則有詹事長信詹事是也景帝更為長信少府復更為長樂少府有将行景帝更名大長秋或用中人或用士人應劭曰皇后卿也後志曰掌宣中宫命列卿又有将作少府掌治宫室景帝更名将作大匠典屬國掌蠻夷降者水衡都尉武帝置掌上林苑應劭曰水衡少府皆天子秘藏元帝時水衡錢三十五萬是也大抵漢世公有三等太師太傅太保為上公丞相太尉御史大夫為三公漢制三公號萬石大将軍驃騎車騎将軍為比公卿有三等前後左右将軍為上卿太常至少府凡九稱正卿執金吾太子太傅将作少府詹事大長秋水衡都尉三輔為陪卿三輔則京兆左馮翊右扶風舊内史也掌治京師景帝分置左右内史武帝更名京兆尹左内史則更為左馮翊若夫右扶風之職則主爵中尉也景帝更名都尉武帝初年更為右扶風治内史右地與左馮翊京兆為三輔周之六卿六卿分治秦以内史治畿内漢初因之雖失六卿分治之意然内史猶廷臣也至分三輔其去大郡無幾判然與朝廷二體矣尉有護軍都尉陳平為護軍中尉武帝時屬大司馬司𨽻校尉周官司𨽻屬秋官武帝征和四年初置持莭從中都官捕巫蠱督大姦猾察三輔三河𢎞農元帝去莭武帝省綏和二年哀帝復置但為司𨽻城門校尉環濟要畧云漢髙帝初置城門校尉從緹騎一百二十人八校尉中壘屯騎歩兵越騎長水胡騎射聲虎賁八校尉皆武帝初置漢表之言也刑法志則曰内増七校晉灼曰胡騎不常置故曰七故耳西域戊巳烏桓護羌亦有校尉奉車都尉掌御乘輿駙馬都尉騎都尉此通典所謂三都尉皆武帝増置非漢定制也加官則有侍中左右曹諸吏散騎中常侍所加或列侯将軍卿大夫将都尉尚書太醫太官令至郎中亡貟多至數十人給事中亦加官所加或諌大夫愽士議郎掌顧問應對位次中常侍中黄門則有給事黄門通典以加官為漢制百官表加官一章其末緫云皆秦制則出於秦無疑也但漢因秦制而廣之官名或有損益耳世儒又疑其始於武帝非也特加官用事自武帝始耳以史考之張辟疆恵帝時為侍中賈山至言曰今陛下舉方正之士使為常侍諸吏則加官漢初固有也特是時事權在公卿加官未居中用事至武帝時而加官之權始重耳漢世九卿皆可領加官獨二府不得兼然魏相以御史大夫兼給事中以為分霍光權設非定制也或者以奉車都尉駙馬都尉亦為加官非也荀氏漢紀杜佑通典並不列於加官即此可考此列職於内之大畧也外封諸侯漢郡八九十形錯其間郡置守景帝更名太守有丞有長史司馬又有郡尉将兵大郡或兩尉景帝更名為郡尉縣置令長又有三老掌教化新城三老建縞素之議壷闗三老上書言戾太子之事三老乘興上言明王尊之罪國家之大事朝廷之得失三老皆得言之孝弟力田文帝十二年置三老孝弟力田常員有秩其嗇夫游徼亭有長主捕盗賊里有正秦以御史分别州漢省特丞相遣使耳武帝始置十三部刺史秩六百石外同𨽻一部則三河三輔𢎞農是也漢制守二千石令千石至六百石今刺史才六百石耳其秩卑矣六條問事一條豪右五條皆謂二千石不法秩卑則其人激昂以自奮假之重權則得行其志此良法也成帝更為牧秩二千石闗有都尉農有都尉屬國則有都尉皆武帝始置此設官於外之大凡也其或因事遣使循行天下也或遣光祿武大夫存問耆老或遣博士存問鰥寡或遣丞相御史行掾天下或遣謁者賜三老帛或遣博士錄寃獄振流民或遣中大夫持莭救東甌或遣諌大夫祀金馬碧雞此以輔臣而兼奉使者綉衣直指之使雖武帝之所置然其官屬侍御史又哀帝時漢令反見大夫無可使則召盩厔令尹逢為諌大夫遣之或奉使借官武帝遣移守監蘇武以中郎将持莭使匈奴至昭帝時武還漢紀書移中監蘇武使匈奴還拜大屬國然則武以中郎使乃借官耳此則奉使借官之所從始也漢制序遷之法丞相缺則御史大夫為之御史大夫缺則九卿為之九卿缺則郡守刺史為之武帝則不然丞相石慶卒則御史大夫兒寛當遷而不遷也太僕公孫賀乃得之丞相公孫𢎞卒御史大夫商丘成當遷而不遷也太僕田千秋乃得之公孫宏相御史大夫缺九卿當進者多矣而河東太守畨繫得之石慶相御史大夫缺九卿當遷者多矣而齊相卜式得之不特此也衛青自侍中遷太中大夫自太中大夫遷車騎将軍自車騎遷大将軍大将軍漢三公官也由侍中三遷而得之武帝但欲權自己出故取卑賤而加之尊顯進不由階序畧無所顧漢制有故官皆守舊階不食全俸滿嵗為真不稱者還故官韓延夀守左馮翊趙廣漢守京兆尹翁歸守右扶風張敞守太原太守皆滿嵗為真守官之制莫知其由始按表武帝征和三年始有光祿大夫孫遺守少府此序舊階之證也意武帝始乎漢制官卑職重者稱守是殆武帝驟官左右才智之士故用守以處資淺之人耳然朝廷用新進而無老成此武帝之世所以益多事也漢世官吏率多久任唯邊吏三嵗一更均勞逸叚會宗傳曰竟寧中為西域都護三嵗更盡還拜沛郡守後王嘉言孝文時居官或長子孫以官為氏又朱博傳故事刺史居部九嵗為守相夏侯嬰自髙祖時為太僕至文帝時猶以太僕清宫汲黯居淮陽十嵗張敞居京兆九嵗于定國為廷尉十八年百官有洗沐之制石建傳載毎五日洗沐歸謁親有予告賜吿之法病滿三月當免天子優賜其告曰賜告予告者在官有三最法所當得者以罪去者或曰免或歸家或為庶人漢制雖丞相罷免大者自裁小免爵邑其尤輕者就第及列侯就國與奉朝請其後召用但為光祿大夫或特進優游散秩未嘗除他官御史大夫則聞為九卿将軍至東漢崔烈免乃為城門校尉體貌之禮衰矣王國傅相御史百官皆如朝廷國家惟為置丞相其御史大夫以下皆自置之至景帝時呉楚七國特其國遂以作亂幾危漢室景帝懲之遂令諸王不得治民令内史主治民改丞相曰相省御史大夫廷尉少府宗正博士官改漢内史中尉郎中令之名而王國如故員職皆朝廷除不得自置至漢成帝省内史治民更令相治民矣闗内侯闗内侯無土寄食在所縣民租稅多少各有户數爲限列侯則出闗就國闗内侯有號而無邑其加異者往往與之闗外之邑食其租稅自吕后時闗内侯始有食邑光武中興務從節約并省官職固所以懲孝武奢廣之事三公之屬則省九卿之屬則又省朝廷之官則省郡國之官則又省而唯司𨽻校尉一官獨無所省尚書之員反増其二帝意固可想見矣抑不思漢初之制宰輔重於朝九卿率其屬名城封於宗都尉播於郡國其綱維固善而詎可以冗官視之葢武帝之舊可變而髙帝之法未可輕變也東都無丞相太尉御史大夫而大司徒大司馬大司空實因西漢之末制也建武中復去大改司馬為太尉官居司徒司空上王梁以䜟文用韓歆以直諌死責以吏事而政歸䑓閣司徒鄧禹居外而尚書伏諶攝行之葢光武之視三公也輕則其用之也易去之也不難在内則不過以吏事責之雖在外亦何所不可統體不正其後益舛錄尚書之官建而三公為虚名矣光武以吏事責三公猶預事自明帝有錄尚書之制而三公始不預事矣宋𢎞為司空欲舉侍中以法則三公猶得劾近臣也桓帝時楊秉劾侯覽尚書乃詰其越奏法則三公不得劾近臣矣選舉委三府尚書受奏御則三府尤得以辟舉也靈帝時吕彊冒選舉但任尚書則三公不預選事矣不特此也灾異䇿免所以責之者益竒自徐防始就外除拜而所以畀之者益輕自張温始前漢丞相屬有長史得舉劾有司直得舉不法光武中興省司直之官所以奪三公之權也漢中興相罷免無復為九卿者東漢王梁以䜟文用自野王令拜為大司空俄而違命光武将斬之赦以為中郎将是以終漢之世去三公而復為九卿者不可勝數體貌之禮為如何哉明帝用東平王蒼為車騎将軍而三公屈居将軍之下有矣九卿之制因循西京而併省其屬者多矣太常則省十官而太卜又并於太史博士𨽻於太常而僕射之號非博士所當稱轉而名之曰祭酒善矣光祿勲則省車户騎三将而羽林令亦省焉光祿勲之五官将至羽林右監以職屬者凡士自奉車都尉至謁者則又屬焉度田覈實監護軍旅黎陽領兵皆遣謁者而左右近臣重矣三署郎漢制乃執㦸侍從天子應對賛導之官光武於少府多置黄門官者以為親近人主之官而三署郎乃不必儒士只令執㦸郎官之署盡是諸黄門之屬耳唯議郎用儒生掌顧問又不與宿直分郎作兩科此最後漢之亂制也衞尉省旅賁令衞士一人而丞亦在所省已上三卿志以為屬太尉部太僕省五廐及牧師苑令廷尉省二十六獄唯洛陽廷尉有詔獄鴻臚省譯官别火三令丞及郡邸長丞已上二卿屬司徒部宗正省都司空令臣司農則鹽鐡官屬郡縣而均輸等皆省少府一官省五丞又省場官織室令署丞又省上林等三令二十一丞唯尚書増二人為六曹章和以下中官稍加廣矣自太毉以上四官職屬少府自侍中至御史皆以文屬光武躬親政事而左右近臣往往因時用事増尚書之官所以廣其職也不用令史而用孝亷所以重其選也侍中尚書黄門諸官不以職屬所以成左右之勢也閹人典尚書雖曩有用族姓之制其用則不暇恤矣甚者羽林宿衞亦中官掌之封侯襲爵至於為将軍末流無所不至也源流一失其勢固至此哉漢分司農少府固不若古制之義然猶屬丞相御史也自光武以山海鹽鐡歸郡縣官宫中私用付之外有司章帝以後於是别立監以閹人領之而外司不得預其弊至於桓靈之君歎天子之無藏開西北以賣官後園為私庫而專於宦者矣已上三司屬司空部志以為東都一公綂三卿意非不美然不任三公而事歸䑓閣何綂之有上公則省太保而唯置太傅以卓茂鄧禹為之太師不常置漢末唯董卓為之将軍之官中興呉漢為大将軍景丹為驃騎大将軍位在三公下及前後左右雜號将軍多皆主征伐事訖皆罷自明帝以東平王蒼為驃騎将軍以王位在公上章帝時西𦍑反以舅馬防為車騎将軍外戚将軍始此也後竇憲亦為車騎将軍征匈奴鄧隲亦然又其後也桓帝藉單超而去梁冀而宦者亦得為将軍矣列卿之職執金吾即中尉之屬省式道中候二人又省中壘寺互都船令丞尉及左右京輔都尉大長秋先漢或用中人或用士人中興常用宦者其屬不省将作大匠光武中元二年省常以謁者領之而章帝始復水衡則併於少府省其屬二十餘人唯司𨽻校尉一官此本志言也然光武行司𨽻校尉事見漢官威儀自成帝既省而光武復置且并領一州官屬無省也帝以明察之意緫攬權綱故劾奏刺史之官其權特重而遥舉抗直有風力者為之正所以裁折貴戚也觀帝誅戮諸王賔客之意與歛手以避二鮑之意正所以窘當時之豪貴也終漢之世司𨽻有專終之戚北軍中候監五營兵即中壘也中興省中壘但置中候胡騎并於長水虎賁并於射聲所綂者越騎步兵長水射聲即武帝之八校也諸王建國無復西都之舊此則劉昭所謂光武十子並列畿外近郡孝明八國不能開庇逺民國近則不可以大不大則不足為强此所以本支之援終以少固也又光武時誅諸王賓客外則併省郡縣四百餘所罷諸郡都尉併職太守無復都試之法舊制部刺史考諸郡殿最嵗盡詣京師奏計中興但因計吏此乃一路之權盡歸刺史故又奪之耳闗都尉屬國都尉皆省安帝以後以𦍑犯三輔乃復置右扶風京兆都尉也三國鼎峙大抵漢舊魏置三公不預朝政但朝朔望而已矣灾異不劾三公亦自魏始呉蜀初置相其後蜀有錄尚書魏文帝時置中書監令並掌機宻自是中書多為樞機之任其後或置丞相或相國或司徒而中書監令常掌機要多為宰相之任於是權在中書外則防察諸王建設空名寄地而無實而又設監國之官以伺察之晉承魏祚首建八公大封宗室置十九州而刺史不領兵宋渡江以來王曇首王華殷景仁之徒皆以侍中緫門下樞要宻侍帷幄為國謀主於是權在門下宋齊有三䑓五省三䑓兩漢舊名五省即尚書中書門下秘書集書梁武定諸卿之位分配四時置戎秩之官百有餘號其他多緣齊舊陳氏褊小唯循舊制魏起自朔野分部以置大人凡厥官名多雜夷禮㑹要云又倣上古龍官鳥官之名謂諸曹之使為鳬雁白鷺之類道武平并州始建䑓省置百官封公侯将軍刺史大守尚書皆用文人孝文時王肅來奔為制官品百司位號皆凖南朝魏分為二而髙齊名遵後魏䑓省之職多類江東門下省掌獻納諌正中書省管司王言秘書省典司經籍集書省掌從容諌議中常侍省掌出入門閣御史䑓察糾彈劾宇文周始用蘇綽依周更定六官自餘百官皆倣周禮其他将雖都督刺史之類則依秦漢隋初廢周制唯以中書為内史侍中為納言自餘應庶僚頗有増益大業三年始行新令有三䑓謁者司𨽻御史五省殿内尚書門下内史秘書五監少府長秋國子将作都水十二衞翊驍武屯禦候六衞皆有左右十六府左右備身左右監門等凡十六府也羣書考索後集卷一
