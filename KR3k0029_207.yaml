body:
  text: 羣書考索别集卷二十宋章如愚撰財用門財君民要在兼足蓋君之所與者民也民足矣則君雖不足亦無與其不足者民茍不足則君雖自足而誰其與共足哉論語或問國不以利為利夫洪範八政食貨為先子貢問政而夫子告之亦以足食為首蓋生民之道不可一日而無者聖人豈輕之哉特以為國者以利為利則必至于剝民以自奉而有悖出之禍故深言其害以為戒耳至于崇本節用有國之常政所以厚下而足民者則固未嘗廢也有子曰百姓足君孰與不足孟子曰無政事則財用不足正此意也大學或問財聚則民散易大傳曰何以聚人曰財春秋外傳曰王人者將以導利而布之上下者也故財聚于上則民散于下矣財散于下則民歸于上矣同上仁與不仁之判仁者不私其有故財散民聚而身尊不仁者惟利是圖故指身賈禍以崇貨也若商紂以自焚而起巨橋鹿臺之財德宗以出走而豐瓊林大盈之積皆以身發財之效也同上斂臣盜臣之別聚斂之臣剝民之膏血以奉上而民被其殃盜臣竊君之府庫以自私而禍不及下仁者之心至誠惻怛寧亡已之財而不忍傷民之力所以與其有聚斂之臣寧有盜臣大學或問宋朝取民過厚國家承五季之弊祖宗創業之初日不暇給未及大為經制故其所以取于民者比之前代以為過厚重以熙豐變法頗有增加而建炎以來地削兵多權宜科須又復數倍供輸日久民力以殫而間者諸路上供多入內帑是致户部經費不足遂廢祖宗破分之法而上供嵗額必取十分登足而後已光宗朝己酉擬封事文公天子不當有私財天子際天之所覆極地之所載莫非已分之所有而無外之不通矣又何以私為哉今以不能勝其一念之邪而至于有私心以不能正其家人近習之故而至于有私人以私心用私人則不能無私費于是內損經費之入外納羡餘之獻而至于有私財使天下萬事之弊莫不由此而出是豈不可惜也哉同上小人以聚斂欺君任事之臣惟務迫趣州縣使之急征橫賦戕伐邦本而其所以欺陛下者則曰如是而國可富如是而兵可強陛下亦聞其説之可喜而未究其實往往誤加奬寵卑以事權是以比年以來此輩類皆髙官厚祿志滿氣得而生民日益困苦無復聊賴孝宗朝庚子封事以財發身之義問仁者以財發身曰不是散財以取名教人奉已只是不私其有則人自歸之而身自尊只是言其散財之效如此文公損上益下之説後世不復知潔矩之義惟務竭民財以自豐利自一孔以上悉皆取之故上愈富而下愈貧夫以四海而奉一人不為不厚矣使在上者常有厚民之心而推與共之猶慮有不獲者況皆不恤而惟自封殖則民安得不困極乎易損上益下曰益損下益上曰損所以然者蓋邦本厚則邦寧而君安乃所以為益也否則反是文公當與民共其利財者人之所好自是不可獨占須推與民共之未論為天下且以作一縣言之若寬其賦斂無征誅之擾民便歡喜愛戴若賦斂稍急又有科敷之擾民便生怨決然如此同上財聚民散之説民之與財孰輕孰重身之與國孰大孰小財散猶可復聚民心一失不可復收身危猶可復安國勢一傾不可復正至于民散國危而措手無所則其所聚有不為大盜所積也耶文公上宰相書嚴禁科罰之弊國家愛惜斯人如護元氣不忍以毫髮擾之詔令所頒戒飭州縣未嘗不以嚴禁科罰為言而其所以取之州縣者乃如此是則陽為禁止而隂實縱之又從而驅之使必出于此文公與劉丞相劄子利病制于聚斂之臣今井地之制未能遽講而財利之柄制于聚斂掊克之臣朝廷不恤諸道之虛實監司不恤州縣之有無而為州縣者又不復知民間之苦樂蓋不惟學道不眀仕者無愛民之心亦緣上下相逼只求事辦雖或有此而亦不能施也文公答張敬夫當均節州縣之財莫若因制國用之名而修其實哀憫民力之凋瘁而思所以膏澤之者今逐州逐縣各具民田一畝嵗入幾何輸稅幾何州縣一嵗所收金穀總計幾何諸色支費總計幾何有餘者歸之何許不足者何所取之俟其畢集類會考究而大均節之有餘者取不足者與務使州縣貧富不至甚相懸則民力之慘舒亦不至大相絶矣同上宋朝財數景德中收商稅四百五十餘萬貫慶厯中一千九百七十五萬餘貫景德中收酒課四百二十八萬餘貫慶厯中收一千七百一十餘萬貫景德中收鹽稅課三百五十五萬餘貫慶厯中收七百一十萬餘貫張方平奏聚斂今之法斂焉猶潦也𣙜焉猶癘也征焉猶禦也今之吏非是此三者無議也今之民非是三者無抵也國至大民至細也立法以掩其口腹之尋常而還與之為市市之不酬還與之為仇勢至蹙事至不美也數百里之地設數大穽碁而布之武夫悍吏茍可逃責大體不恤也不必譏也直征而已矣不獨征也直攘而已矣斯民虎視吏坎乎視國也非苛政而何嗟夫足國而蹙其本拔其本而壅其末何如其智也昔文王之政賦不二澤不禁關不征今之吏皆犯之矣人之虐于斯讟于斯聚族哭于斯非一日也幸而天下未有故偶涇原之卒長安市上之呼去爾架除爾陌徹爾僦有不爭赴者乎官兵財內外諸吏髙秩厚祿紫朱其綬唱喝車蓋而出者不啻萬人而朝廷常有無才能之嘆嵗十萬錢乃足一卒卒驅六尺團數石之弩荷一鈞之矛此比屋而居者不下百餘萬而常有夷狄之憂珠犀龜貝出乎海竹木香茗出于山黃金丹砂出于土可耕之野萬餘里鹽藉酒酤舟車水陸之算遍乎天下而常有帑廩不足之患財勝事善為國者知財之甚急而萬事賴焉故常使財勝其事而事不勝財然後財可盡而事無不濟財者車馬也事者其所載之物也載物者嘗使馬輕其車車輕其物馬有餘力車有餘量然後可以涉泥塗而車不憤登峻阪而馬不蹶今四方之財莫不盡取民力屈矣而上用不足乎居惴惴僅能自平而事變之生復不可料譬如弊車羸馬而引丘山之載幸而無虞猶恐不自勝不幸而有隂雨之變陵谷之險其患有不可知者盡地利節浮費理財之要在乎原其所自有而為之道要其所從無而制之法風霆雨露之發生山林川澤之滋養財之所出也不原其所自有不要其所從無切切焉從事於闔闢之中則是賤丈夫爭錐刀之利耳豈君子所謂理財也耶是故原其所自有而為之道則莫若盡地利要其所從無而制之法則莫若節浮費惟君子善理財自君子避取財之名而小人執理財之權民之受禍未有窮已夫所謂理財者豈曰取之乎以天下之財與天下共理之也古之人未有不善理財而為聖君賢臣者大禹周公是也取財以信聖人所為大過於人者理天下之財而天下不疑其利擅天下之有天下不疑其貪政令之行天下雖未必能知其意而終不疑其害已故聖人之于天下無不可為者以其所以信服天下者眀也過斂者多不克終左氏云管仲之世祀也冝哉謂其有禮也而管仲之後不復見于齊者余讀其書大抵以魚鹽富齊爾余然後知管仲所以無後于齊者孔子曰微管仲吾其被髮左衽矣又曰如其仁夫以孔子稱其仁左丘明稱其有禮然不救其無後利固不可與民爭也如此桑𢎞羊滅族韋堅王鉷楊慎矜王涯之徒皆不免于禍孔循誅死有以也夫東坡責民以所無及唐末兵興始有私錢者故白居易譏之曰私斂無錢爐平地無銅山言責民以所無也陳后山興利者多禍敗夫利百物之所生而天地所以養人也専之必壅壅則所害者多故凡有利必有害利於己必害於人君子不盡利以遺民所以均天地之施也是以興利之臣鮮不禍敗自桑𢎞羊以來未有令終者也范祖禹暴斂甚於盜賊暴斂之害甚于盜賊盜賊害民之命暴斂失民之心害民命者君得而治之若失民心不可得而復收也同上公心散財散財發粟先儒或謂武王以此結天下之心是以利心量聖人也利者天下之利紂以私心聚之武王以公心散之萬姓恱服自然之理也東萊土木最費財麥熟於夏禾成于秋秋而書于冬者莊公惟宫室臺榭是崇是飾費用浸廣調度不充有司會計嵗入之多寡虛實然後知倉廩之竭也故于嵗杪而書曰大無禾麥胡文定公武帝費財文帝貫朽粟腐武帝已盡用之矣卜式所輸寧及太倉一粒粟乎故謂卜式之獻不足以富國適足以啓武帝興利之心以為牧養之子尚有餘羡以佐用況天下乎黃公度管子攘奪春秋戰國王政既衰秦飢乞糴于晉魯飢乞糴于齊嵗以不同則乞于鄰國所謂九年之制度已自敗壞管子輕重一篇無慮千百言不過君民之相揆大耳為民者七而遊民者六今天下之財所以不足者何也害農者繁而去本者衆也古之為民者四而農其四之一也今之為民者六而舍農者蓋六之五也而胥吏又不在焉胥吏蓋害農民而蠶食之者也而又害農者之一也則是今之為民者七而遊民者居其六也而兵徒又不在焉為天下理財今之理財者自理之歟為天下理之歟父有十子闔其大門而取其子而不計其後將以富其父歟抑愛其子者必使之與其父歟抑孝其親者抑將盡困其子歟抑其父固其子之財歟然則今之開闔斂散輕重之權有餘不足之數可以一辭而決矣奈何以聚斂為理財財有限而欲無窮厥初生民無窮民也民為聖人而窮也民之欲無窮而財之生有窮以有窮奉無窮于是乎始窮故受之以節節者約侈而歸儉也然有財之窮亦有節之窮財之窮自不節始節之窮自過節始過于節則人情苦之而不可久于是節之説又窮矣理財有三理財之説者三其上惠民其次惠國其下惠姦惠民者雖不為國計而其隂有以利公上者皆民力之所為供也惠國者雖非為民計而其實有以利公上者亦人情之所願也不窮財之所歸徒浚財之所出此惠姦之弊憂世者所以深痛公私之積也窮征則有反頭會箕斂之法慘因以啓隴上輟耕之心間架陌錢之征峻反以實菜糲見色之口財竭民無留藏地無餘寶利自一孔以上皆入官矣而大農猶以匱告財于何而取地半于承平之時而嵗入已倍之財于何而生養兵之外百官有司之奉郊祀賔客之費不能已十之一財于何而節財乏以財言之新疆旋失資糧委棄呌卒一炬倉廩掃空而財始耗矣江廣以冦盜而傾儲二浙以水潦而缺上供而財益乏矣料撥不已猶慮乏興內帑築城將何以繼倚區區之楮以立國而楮至不行是豈更變鈔法賣鬻爵牒所能濟哉賣絲糴穀剜肉醫瘡蓋不特如昔人所詠而已財有三窮采薇未還撒花妄費財窮于將也魏戍方殷孫竈難減財窮于兵也囊金匱帛溪貪壑欲財又窮于貪吏矣錢幣區處交子之䇿論淮西鐵錢交子曰交子本是代錢今朝廷却只以紙視之今時是銅錢交子不得用于淮鐵錢交子不得用于江南又須江南官司置場兊換銅錢交子乃可行耳文公銷鑄漏泄之病或欲通銅錢出淮先生深以為不然云東南銅錢已是甚少其壞之又多端私鑄銅器者動整四五分壞了此壞錢之弊又有海舶之泄海船髙大多以貨物覆其上其內盡載銅錢轉之外國朝廷雖設官禁那曽檢點得出其不亷官吏反以此為利同上節財愛民必先節用蓋國家財用皆出于民如有不節而用度有闕則橫賦暴斂必將有及于民者雖有愛人之心而民不被其澤矣是以將愛人者必先節用此不易之理也光宗朝己酉擬上封事當節無名之費內自京師外達都邑上自宫禁下至胥徒無名浮費亦豈無可省者功計若能還內帑之入于版曹復破分之法于諸路然後大計中外冗費之可省者悉從廢罷則亦豈不能少有所濟光宗朝己酉擬上封事內帑內帑認為私貯虞允文之為相也盡職版曹嵗入窠名之必可指擬者號為嵗終羡餘之數而輸之內帑顧以其有名無實積纍挂欠空載簿書不可催理者撥還版曹其為説曰內帑之積將以備他日用兵進取不時之須而版曹自今經費已自不失嵗入之數聽其言誠甘且美矣然自是以來三十餘年內帑嵗入不知幾何而認為私貯典以私人宰相不得以式貢均節其出入版曹不得以簿書勾考其在亡其日消月耗以奉燕私之費者蓋不知其幾何矣而曷嘗聞其能用此錢以易敵人之首如太祖皇帝之言哉孝宗朝戊申擬上封事文公上供多入內帑間者諸路上供多入內帑是致户部經費不足遂廢祖宗破分之法而上供嵗額必取十分登足而後已期限迫趣科責嚴峻監司州縣更相督迫唯務自寬己責何暇更察民情捶撻驚呼有使人不忍聞者而州縣嵗入多作上供起發則又于額外巧作名色寅緣刻剝此民力之所以大窮也光宗朝己酉擬上封事文公上供官吏脅取之擾縣道既無羸餘可積又無科名可催官吏且欲避免一時州郡督責則不過因民之訴訟而科罰之甚則誘人以告訐而脅取之州郡聞知稍行禁約則諸縣便以籍口不肯留心趂辦州郡不免又將别色官錢那兊補足為州郡者憚其如此則遂一切聽其所為不復考問不惟非理違法妄取民財之可罪而民之負寃苦訴于官司者皆無自而得其平矣光宗朝奏狀文公免上供以寬州縣欲亟圗所以紓州縣民間目前之急則願深詔主計將輸之臣且于見今樁積金穀綿絹數內每嵗量撥二三十萬視州郡之貧乏者特與免起上供官物三五分而代其輸孝宗朝庚子上封事文公經總制錢此錢不當立額經總制錢不當立額不待智者而後知也蓋其出于倉庫出納田宅契劵之所收者雖可約計其大槩然財計有時而虧盈物價有時而髙下則其數已有不可得而凖者又況所謂無額錢者元無一定科名可以椿辨其多少不可得而預知故其創立之初直以無額名之則其不當立額也雖至愚亦知之矣而比年以來悉皆立額比較蓋緣紹興十九年中推行經界人户多有白契不堪照用爭出投印致得當年經總制錢所收增羡遂有無狀小人獻此殘賊之計一時朝廷既為所誤而其流毒至今未已孝宗朝奏狀文公立額比較之弊切見諸路提刑司所管拘催州縣總制錢蓋前代之所無而祖宗盛時亦未之有特起于宣和末年倉卒用兵權宜措畫當時建議之臣方且自以為功而其兄聞之乃為哭于先廟以為作俑之禍且及子孫渡江以後雖知其弊然費出愈繁遂不能罷復有增加以至于今乃為大農之經賦有司不復敢有蠲除之議然其始者亦但討其出納多寡之實數而隨以取之則事雖失體而未有甚害及紹興中推行經界之法民間違限契約悉出投印故一二年間此錢之額倍于常嵗逮其畢事則便復常數而無復前日之羡矣而一時乃有憸佞掊克之人輒為比較之説以誤朝聼使凡嵗入經總制錢悉以經界之年為額其後雖或知其非義而小變之然猶必使趂及一年所收最多之數至其甚無藝者則雖或災傷平分檢放倚閣苗米稅錢已無所入而所謂經總制錢者版曹捴所猶不肯與之蠲除上下相臨轉相逼迫下吏無所措其手足則其勢必至于巧為名目取之于民以求幸免司察之官雖知其然然既利其嵗額之盈則亦不容有所伺間顧猶不足以及數則遂不過將新蓋舊轉後為前嵗月愈深逋負日積大郡所欠十數萬緍小郡亦不下一二萬數官吏操切日益嚴峻而莫有知其事之本原者不知州縣之煎熬局促果何日而少紓斯民之歎息愁怨果何時而少息也伏望詔大臣圗所以節用裕民之道討論合與不合立額比較之利病而罷行之以幸天下孝宗朝延和奏劄軍興權宜創立經總制錢因一時軍興權宜所立後遂不罷要之當時立法亦未盡善陳亨伯韓球所創經制錢陳亨伯所創蓋因方臘反童貫討之亨伯為隨軍轉運使朝廷以其權輕又重為經制使患軍用不足創為此名以收州縣之財當時大獲其利然立此制時眀言軍罷而止其後遂因而不改至紹興四年韓球又創總制錢大略倣經制為之十一年經略法行民間印典賣契多故倍有所得朝廷遂以此年之額至次年則其額大虧乃令州縣添補解發自今州縣大困文公非經賦常入之錢此錢既非經賦常入為民所逋貰官吏所侵盜而以一嵗偶多之數制為定額責使償之自户部四折而至于縣如轉圜于千仞之坂至其址而其勢窮矣縣將何取之不過巧為科目以取之于民耳文公與鍾户部論虧欠經總制錢書無藝無名之制官得其一吏已得其二三並緣為姦何所不有是則議者所謂督責官吏者乃所以深為之地而重困天子所愛之民也夫吏依公以侵民又陽自解曰此朝廷所欲得非我曹過也夫愚民安知其所以然者何哉亦相聚而怨曰朝廷不恤我等耳嗚呼此豈民之所當輸官之所當得者耶其制之無藝取之無名甚矣同上稅賦貢助徹什一之制夏時一夫受田五十畝而每夫計其五畝之入以為貢商人始為井田之制以六百三十畝之地畫為九區區七十畝中為公田其外八家各授一區但借其力以助耕公田而不復稅其私田周時一夫受田百畝鄉遂用貢法十夫有溝都鄙用助法八家同井耕則通力而作收則計畝而分故謂之徹其實皆什一者貢法固以十分之一為常數惟助法乃是九一而商制不可考周制則公田百畝中以二十畝為廬舍一夫所耕公田實計十畝通私田百畝為十分而取其一蓋又輕于十一矣竊料商制亦當似此而以十四畝為廬舍一夫實耕公田七畝是亦不過什一也孟子集注九一什一之法都鄙之地九一而助為公田而行助法也鄉遂之地田不井授但為溝洫使什而自賦其一蓋用貢法也周所謂徹法者蓋如此同上布粟力役之征征賦之法嵗有常數然布縷取之于夏粟米取之于秋力役取之于冬當各以其時若并取之則民力有所不堪矣今兩稅三限之法亦此意也同上戰國非先王之法周禮宅不毛者有里布民無職事者出夫家之征鄭氏謂宅不種桑麻者罰之使出一夫百畝之稅一家力役之征也今戰國時一切取之市宅之民已賦其廛又令出此夫里之布非先王之法也同上魯稅畝非周制之舊周制一夫受田百畝而與同溝共井之人通力合作計畝均分大抵民得其九公取其一故謂之徹魯自宣公稅畝又逐畝什取其一則為什而取二矣語注祖宗破分之法伏見祖宗舊法凡州縣催理官物已及九分已上謂之破分諸司即行住催版曹亦置不問由是州縣得其贏餘以相補助貧民些小拖欠亦得茍延以待蠲放恩自朝廷惠及閭里君民兩足公私俱便此誠不刋之令典也孝宗朝戊申封事文公州縣催督之擾徒使版曹經費闕乏日甚督趣日峻以至廢去祖宗以來破分良法而必以十分登足為限以為不足則又造為比較監司郡守課最之法以誘脅之不復問其政教設施之得失而一以其能剝民奉上者為賢于是中外承風兢為苛急監司眀諭州郡郡守眀諭屬邑不必留心民事惟務催取財什此民力所以重困之本而稅外無名之賦如和買折帛科罰月以之屬尚未論也孝宗朝戊申封事文公諸路科罰之弊切見江西諸路州舊有科罰之弊蓋因嵗入有限而費出無常是以不免巧取于民以備支發凡是百姓有事入門不問曲直恣意誅求無有藝極民間受弊不可勝言為監司州縣者欲一切繩之以法則財計頓闕州縣不可復為雖有良吏亦無以免若一切恣之不問則法廢不行民怨無告而貪虐之吏更復並緣以濟其私為害愈甚孝宗朝延和奏劄文公賦外加耗之供切見本路土瘠民貧無他生理而州縣嵗計入少出多往往例于常賦之外多收加耗重折價錢尚且入不支出公私俱困寧宗朝行宫便殿奏劄文公賦重民勞之苦南康為郡土地瘠薄生物不暢人民稀少穀賤農傷固已為貧國矣而其賦稅偏重比之他處或相倍蓰民間雖復盡力耕種所收之利或不足以了納稅賦須至别作營求乃可陪貼輸官是以人無固志生無定業不肯盡力農桑以為子孫久逺之計幸遇豐年則賤糶禾穀以茍目前之安一有水旱則扶老携幼流移四出視其田廬無異逆旅之舍蓋出郊而四望則荒疇敗屋在處有之孝宗朝庚子封事文公政煩賦重之害斂財失民情猶為不可況今政煩賦重民卒流亡所謂財者又將無有可得之理若不蚤救必深為害孝宗朝戊申封事文公稅重加于贍軍夫有田則有租為日久矣而今日民間特以稅重為苦者正緣二稅太重朝廷盡取以供軍而州縣無復贏餘也夫二稅之入盡以供軍則其物有常數其時有常限而又有貼納水腳轉輸之費州縣皆不容有寬緩而減免也孝宗朝庚子封事文公省賦在于治軍臣聞天下國家之大務莫大于恤民而恤民之實在省賦省賦之實在治軍若夫治軍省賦以為恤民之本則又在人君正其心術以立綱紀而已矣同上租庸調起于惰唐以前唐租庸調大抵改新法度是世界一齊更新之初方做得如漢衰魏代只是漢舊底物事晉魏以至六朝亦只遞相祖述弊法卒亦變更不得直到元魏北齊後周居中原時中原生靈死於兵冦幾盡所以宇文價蘇綽出來便做得租庸調故隋唐因之文公祖宗催科之法祖宗立法催科只是九分才破這一分便不催但破得一百貫謂之破分便住自曽丞相懷為户部時便不用這法須要催盡至今所以如此同上白納絹錢之弊福建賦稅猶易辦浙中全是白撰橫斂無數民不聊生秋稅苗産有定色猶易催夏稅是和買絹最為重苦蓋始者一匹官先支得六百錢後來變而令人先納絹後請錢已自費力了後又無錢可請只白納絹今又不納絹只令納價錢數又重催不到者保正出之一畨當役則為之困矣故福建不如江西江西不如江東江東又不如浙東浙東又不如浙西越郡都越不好同上賦稅供用之費賦謂計口發財六字係班志顔注稅謂公田什一及工商衡虞之入也賦供車馬兵甲士徒之役充實府庫賜豫之費稅給郊宗廟百神之祀天子奉養百官祿食庶事之費井田類説文公朝廷督責之過國家張官置吏本以為民所以平時但聞朝廷戒飭州郡奉行寬恤惟恐有所不至至于督責二字考之前史則韓非李斯慘刻無恩詿誤人主之術非仁人之所忍聞也申省狀文公官司科敷之擾稅籍不正田畝荒蕪官司失陷王稅數目浩瀚無以供解嵗計遂至巧作名色科敷責罰以救目前官既不法吏又為姦是以貧弱之民受害愈甚州郡非不深知其弊然勢之所驅有不容已雖有賢者不過包羞忍恥拱手竊歎而已經界申諸司狀豪強詭冒之弊公私田土皆為豪宗大姓詭名冒占而細民産去稅存或更受俵寄之租困苦狼狽無所從出州縣既失經常之入則遂多方擘畫取其所不應取之財以足嵗計如諸縣之科罰州郡之賣鹽是也文公與丞相劄子減免丁錢之説蓋食王土為王民亦無終嵗安坐不輸一錢之理但不當取之太過使至于不能供耳今欲再奏不若請令白丁下户每嵗人納一二百錢四等而上每等遞增一二百使至于極等則略如今日之數似亦不為厲民而上可以不失其大農經費之入下可以為貧民久逺之利文公答張敬夫追呼重納之患諸縣人户送納稅物官司交訖合給朱鈔縣鈔即關主簿勾銷户鈔即付人户執照使人户免致重疊追呼騷擾近年諸縣間有受納錢物不即印鈔印以鈔單給付人户既無官印不可行用及至追呼不為點對勘斷監納山谷細民被害尤甚與稅户條目文公商稅欲免米商之稅乞詔有司諸被實州縣人户欲與販物貨往外州府收糴米穀就闕米處出糶者各經所在或縣或州或監司自陳所帶貨物判執前去其糶米訖所買回貨亦各經所在自陳判執回歸往回所過並不得輒收分文稅錢違者並依稅米穀法必行無赦孝宗朝奏狀文公征商自龍斷始孟子釋龍斷之説謂左右望者欲得此而又取彼也人惡其専利故就征其稅後世緣此遂征商人也孟子注客旅不宜重困州縣財計取辦于稅務稅務課額仰給于客旅然則客旅雖非農民之比亦官司財用取資不宜重困使其望風畏避而不敢出于其塗也乞減移用錢額劄子文公𣙜酤古人禁人聚飲古人禁人聚飲今却張官置吏惟恐人不來飲如此却何以責遜亷遜文公酒課坊場之弊酒坊之弊其説有四一曰官監二曰買擈三曰拍户四曰萬户抱額臣切以為莫不便于官監莫便于萬户其他則亦互有利害而萬户之中亦不能無少利害要在講究詳盡然後施行則庶乎其弊之可革矣今官監之害朝廷既知而罷之矣然州郡客戶多不遵稟户部漕司所擈仍不廢罷此則害雖除而未盡者也買擈之害在買人有消折本柄破壞家産之患在衆人有掗托抑勒捕捉欺凌之擾雖加禁防法式眀備然勢之所在終不能革拍户抱額則庶幾矣然或額重而抱納不前或籍此而掗托騷擾則其弊亦不異于買撲唯萬户抱額最為簡便然須以一州或一縣通計田畝浮財物力而均出之使無官户民户之殊城居村居之異一槩均出之為定籍乃為盡善若舍官户而敷民户舍城居而困村居不立官簿而置私草簿使吏得以隂肆出沒走弄于其間則又病矣同上𣙜鹽要在根索弊源竊見本司所管鹽課利國計所資為甚廣而民情所患為甚深若不根索弊源别行措置切恐民力日困亦非國家久逺之利孝宗朝浙東奏狀文公販載私鹽之弊夫産鹽地分距亭場去處近或跬步之間逺亦不踰百里故其私鹽常賤而官鹽常貴利之所在雖有重法不能禁止故販私鹽者百十成羣或用大船搬載巡尉既不能訶州郡亦不能詰反與通同資以自利同上鹽鋪抑買之弊民間公食私鹽客人不復請鈔至有一場一監纍月之間不收一袋不支一袋而官吏縻費士卒搔擾有不可勝言者然以有比較之法州郡恐有殿罰則不免創立鹽鋪抑勒民户妄作名邑抑令就買出入暗昧不可稽考大略瘠民以肥吏困農以資遊手同上令民納錢之法切見福建下四州軍舊行産鹽之法令民隨二稅納産鹽錢而請鹽于官近嵗官鹽雖不支給而民間自食私鹽官司既得産鹽稅錢亦不復問其私販雖非正法然實兩便同上公私兩便之計吏須博盡衆謀多方措置使輸錢之數比舊稍輕買鹽之價比舊頓減即公私兩便法可久行若其不然則官户豪宗昔幸免而今例輸者橫議紛紛必有所緣而起雖有良法美意不可行矣文公答陳漕書官民兩利之䇿于見行鹽法之中擇其不可行之甚處小變其法而損其嵗入之數吏官享其利而民不以為病州縣可以立腳而漕司不失嵗輸之實而已文公與王漕書罷海倉以通客販引價之所以貴以引額之數拘之也本錢之所以多以所支之數較之也此鹽之所以貴也賣引之額所以狹以所運之數拘之也海鹽之錢所以取以搬運之費計之也此計産輸錢之所以重也欲致二利去二害在乎罷海倉之買納而已誠能罷海倉及下四州之買納使客人請引南自漳泉北至長溪各從便路徑就亭户買鹽興販則引價可減本錢可輕引額可增海船可罷而計産所輸亦薄文公答陳漕書和買祖宗預買之法臣聞祖宗初立和預買法先支見錢後納紬絹民間實賴其利至有形于歌謡者而當是時本路漕臣有私于越州者其私復私于會稽故此郡縣所拋獨為多其後請本之數遂為嵗額而錢不復支絹日益貴以至今日而白著之科遂反為一州無窮之害孝宗朝浙東奏狀紹興和買之患欲救巨患者不可惜小費欲除實弊者不可徇虛名切見紹興和買之患民所不堪巧詐之徒姦弊百出前此議者非不欲救而除之而往往過為國家顧惜小費下比流俗茍徇虛名是以因循終莫能革同上利源不可開三代之時鹽雖入貢未嘗有禁自管仲始興鹽策而鹽禁方開雖漢興除山澤之禁至武帝時孔僅桑𢎞羊祖管仲之法始行禁𣙜至昭帝之世召賢良文學論民疾苦請罷鹽鐵又𢎞羊反覆論難卒不能廢元帝雖暫罷之卒以用費不足復建自此之後禁𣙜與古今相始終以此知天下之利源不可開一開不可復塞人户敷納之苦切見浙東路和買絹萬數浩瀚舊例人户均敷人户苦于輸納多立詭户隱寄物力以避均敷是致見納人户所敷愈重其間又有不該敷納田地之數官司不為除豁其弊非一欲望特降指揮革去舊弊庶幾飢饉餘民得安生業世世子孫沭浴仁聖之膏澤不勝幸甚孝宗朝延和奏劄文公人力供輸之勞日前兵亂流移民方復業而官吏節次增起稅額及和買折帛數目浩瀚人户盡力供輸有所不給則復轉徙流亡無復顧戀鄉井之意其幸存者亦皆茍且偷安不為子孫長久之慮一旦小有水旱則復顧而他觀其氣象如腐草浮苴無有根蒂愁嘆亡聊深可憐憫孝宗朝浙東奏狀文公子户詭名之姦惟是子户詭名之姦頓輸數户積計甚多故尤不以為便而必爭之其功又足以挾下户唱浮論以搖衆聽故不察其實者遂以自疑而莫能復措其説此和買之議所以洶洶纍年而和買之害固未嘗有一毫之損也同上區處詭户之䇿如欲首併詭户則懼其告訐成風徒敗風俗而暫併復分終不能禁欲以畝頭紐則縱舍遊末重困農民輕重之間亦未為允欲料有産無丁之户則彼能立詭户者固不憚更立虛丁而寡妻弱子實無丁籍者反受其弊同上減嵗額敷貫頭之説緣和買之重姦猾之民爭為子户詭名以避均敷而其淳謹畏法不敢為者顧乃為之代受所免之數幾再倍于其舊政之不平莫甚于此從來為州縣者灼知其弊非不嚴詭户之禁往往隨併隨分終莫能革今若先次痛減嵗額却以貫頭均敷自物力一分以上並紐寸尺則髙下多寡其數一定而姦弊無所從出矣同上先減請本之額今欲去紹興和買之害使無姦弊稍得均平而不先減其當日請本之額譬如負千鈞者皆膂之力既已不堪乃不知減其所負之物但欲移而置之懷袖亦必無益于事矣浙東奏狀文公分等均敷之説所謂髙下等第均敷者上户舊科和買數多今用貫頭均敷則其數却須少減下户舊不曽科和買今用貫頭均敷則其數乃是頓增若使頓增數中皆是子户詭名則固不足恤第其間却有真實下户不能無咨怨者故今復為此法以優恤之同上除放下户丁錢所謂減免下户丁錢者大率第五等中有丁者多是真實下户無丁者多是子户詭名今若將第五等中所謂丁錢特與除放則真實下户雖增和買而得除此色官物其乘除之間亦略足以相補矣同上畝頭物力之説所以欲改畝頭二字為物力貫百者蓋以畝頭科紐則獨有田之家被科而有浮財物力者不與亦有未均之弊故欲改作物力貫百則有田及浮財者皆在其中文公小帖和糶嚴州縣遏糴之禁今體訪浙西州軍極為豐稔去處與紹興水路相通切慮逐州縣不體鄰路災傷之禁故行遏糴及客人應募搬販亦恐逐州縣稅務循習邀阻妄作名色輒收雜稅錢勝買醋錢之類使本路飢民日就狼狽虛被聖主賑恤之恩欲望朝廷行遏糴條法加等坐罪施行庶幾公私搬運免致艱阻二路飢民得沾實惠文公申省狀通商販以濟民食嵗既不登所在艱食全賴商賈負通之利所冝存恤不可搔擾今米穀不得收稅雖有成法而州縣場務多不遵守至于住糴而有所挾之資既糶而有所貿之貨則往來之間經由去處無以邀阻納稅為苦是致客人憚于興販欲望特降睿旨詔有司所過並不得輒收分文稅錢違者並依稅米穀法必行無赦庶幾商販流通民食不匱孝宗朝浙東奏狀文公貴有和平之意人心所在和則樂與官為市不和則彼此角立也和則樂與官相售不和則上下交勝也彼富家巨室之儲朘削不為不甚又迫之以榜牒扼之以刑憲旦夕吏來其家而呼曰命官督爾糴指爾廩譁然而駭者雞犬不能寧焉彼雖有升平之藏倉庫之積其肯樂糴于官府之督趣哉糴曰和糴所貴有和平之意羣書考索别集卷二十
