body:
  text: 羣書考索卷六十三宋章如愚撰地理門要害類守江所以守淮厥今長淮東西岷山導江東入于海猶吾土地勿守可也然蜀非昔之蜀淮非昔之淮矣堡障雖厚風寒實多恐臧質堅守於盱眙而佛貍有飲江之擾南史宋臧質傳魏太武率衆向彭城宋以質北救至盱眙太武已過淮極力攻盱眙質報太武云童謡曰胡馬飲江佛貍死卯年質守城三旬太武引去蕭銑徒守於江陵而孝恭下巴峽之舟唐蕭銑𫝊銑據江陵國號趙唐髙祖使王孝恭李靖統巴蜀兵自䕫州東下擊銑時峽江方漲諸將請俟水落進軍靖曰若乘江漲掩其不備此必成擒孝恭從之率衆東下銑以水漲不為備孝恭進兵銑出降是守淮不足以守江也有周瑜蒙衝之戰而後曹操舳艫之盛可焚而孫權因得以築濡須之塢周瑜拒曹操遇于赤壁時操軍已有疾疫初一交戰操軍不利引次江北瑜在南岸部將黃蓋曰寇衆我寡難以持久操軍方連船艦首尾相接可燒而去也乃取蒙衝鬬艦載燥荻枮柴豫備走舸繫於其尾先以書遺操詐降時東南風急蓋以十艘亟著前中江舉帆去北軍中同時火發火烈風猛燒盡北船延及岸上北兵大敗操引兵北還後吕蒙聞曹操欲東兵說孫權夾濡須立塢有侯瑱蕪湖之兵而後王琳漅湖之衆可敗而明徹因得以成壽陽之功陳文帝時王琳引兵至柵口侯瑱督諸軍出蕪湖春水稍漲琳引合肥漅湖之衆舳艫相次而下引兵直趣建康瑱等徐出蕪湖躡其後琳軍大敗奔齊吳明徹攻夀陽齊皮景和等敗生擒王琳此守江所以守淮也昔楚國之興也兼江漢之險而有之故以區區之國而常與齊秦爭衡及三國而後海內之地分為南北故必都秣陵備淮甸以犄角北寇然則國之安危繫於上流而已蓋宗廟社稷雖具在建鄴而平居旡事千官六師供億旡量則轉輸之利固繫於上流一旦有警旌旗舳艫四面赴救則屏翰之勢又繫於上流故南朝六姓其強弱之衛與興亡之所由顧上流施設如何耳且大江之南地形延袤可撓之處不一備東則敵必撓我之西備西則敵必撓我之東隨處施設則兵分而力屈茍失於彌縫則隙多而寇至昔紀陟聘魏文帝問吳之戍備幾何曰自西陵至江都五千七百里又問道里其逺難為固對曰疆界雖逺而險要必爭之地不過數處猶人有六尺之軀其護風寒亦數處爾如此則上流所備可得而言矣夫荆湖之地為州十一而其鎮則江陵武昌是也京西道為州者八而其鎮則襄陽是也江西道為州者十而其鎮則九江是也凡畫野分州必據其津塗而扼其喉襟今之所謂險要必爭之地者不過江陵武昌襄陽九江是也江水源於岷山下䕫峽而抵荆楚則江陵為之都㑹故諸葛亮謂荆州北據漢沔利盡南海東達吳㑹西通巴蜀此用武之國也嶓冢導漾東流為漢漢沔之上則襄陽為之都㑹故庾翼謂襄陽西接梁益與關隴咫尺北去河洛不盈千里方城險峻土沃田良水路流通轉運旡滯進可以掃蕩秦趙退可以保據下流者也沅湘衆水合洞庭之波而輸之江則武昌為之都㑹故吳大帝嘗都於此而東晉宋齊梁陳之際號稱盛府者此也豫章西江與鄱陽之浸浩瀚吞納而匯於湓口則九江為之都㑹晉人以謂潯陽北撫群蠻西連荆郢亦藩任之要者此也今守江陵則可以開蜀道守襄陽則可以援川陜守武昌九江則可以蔽全吳夫蜀漢吳楚併而為一則東南之守亦固矣東南進取東晉自庾氏經營征伐皆不能以有成其故可考也謝安父子乘苻堅傾敗之餘圗之如恐不及至於渡河入鄴可謂有其釁矣而訖旡尺寸之得宋元自以為富強結戍兵於元魏檀道濟再行旡功諸將皆以敗繼敗而胡馬遂至於瓜步梁武遭魏世之亂陳慶之以數千兵入洛而嵩髙之襲幾至殱盡及貪河南之地納叛將而棄鄰睦而身國顛覆陳宣稍闢土宇於北齊旋失淮泗於後周雖以桓溫劉裕非常之才度越歷代諸將而溫伐苻犍討慕容皆幾成而敗裕平南燕滅姚秦其績偉矣亦既得而復失由是觀之則東南用兵之勢亦可見矣自古用兵於東南者固本而後可以有為養威而後可以乘時陸抗有言曰茍旡其時雖復大聖亦宜養威自保不可輕動戶口類三皇以前尚矣靡可得而詳也孔子稱堯曰大哉舜曰盡善禹曰旡間以三聖之德地方不過數千里故君臣歌德含氣之類各得其宜禹平水土為九州人口千三百五十五萬三千九百二十三塗山之㑹諸侯承唐虞之盛執玉帛者萬國男女耕織不奪其時故公家有三十年之積私家有九年之儲及其衰也棄稷不務續有有窮孔甲之亂遭桀行暴諸侯相兼逮湯受命其能存者三千餘國方於塗山十損其七其後紂作淫虐厚賦以實鹿臺大斂以積巨橋人庶苦而旡憀天下去之周武王致商之罪罔有敵于我師一戎衣天下大定垂拱而天下治定五等之封凡千七百七十三國又减湯時千三百國人衆之損亦如之周公相成王致理刑措人口千三百七十萬四千九百二十三此周之極盛也及昭王南征不還穆王荒耄加以幽王之亂平王東遷三十餘年莊王十三年齊桓公二年五千里外非天子之御自太子公侯以下至於庶人凡千二百八十四萬一千九百二十三人其後諸侯相併尚有千二百國春秋二百四十二年之中弒君三十六亡國五十二諸侯更相征伐奔走不保社稷者不可勝數齊桓救其難孔子定其文至于戰國存者十餘於是縱橫短長之說相奪於殘人詐力之兵動以萬計伊闕之敗斬首二十四萬長平之戰血流漂鹵周之列國唯秦楚燕而已齊及三晉皆以篡亂衛雖得存不絶如線然考蘇張之說計秦及山東六國戍卒尚餘五百餘萬推人口數尚當千餘萬秦兼諸侯所殺三分居一猶以餘力北築長城四十餘萬南戍五嶺五十餘萬阿房驪山七十萬三十年間百姓死沒相踵于路陳項又肆其酷烈新安之坑二十餘萬彭城之戰睢水不流漢髙帝定天下人之死傷亦數百萬是以平城之卒不過三十萬方之六國十分旡三孝文偃武修文與人休息常欲作露臺召匠計之直百金曰百金中人十家之産吾奉先帝宫室尚恐羞之乃止孝景承平賦役減省三十而稅一人人自愛每有詔命頒下閭里垂白戴老扶疾策杖以聽之思一見太平至武帝元狩中六十餘年人衆大增太倉之粟紅腐而不食都內之錢貫朽而不校孝武帝乘其資畜乃厲兵馬以攘戎狄廓地遐廣征伐不休十數年間天下之衆亦减半矣末年追悔故下哀痛之詔封丞相富民侯昭宣之後罷戰務農戶口漸益至孝平元始二年人戶千二百二十三萬三千口五千九百五十九萬四千九百七十八此漢之極盛也及王莽篡位續以更始赤眉之亂率土遺黎十才二三後漢光武建武中兵革漸息至中元二年戶四百二十七萬六百三十四口二千一百萬七千八百二十明章之後天下旡事務在養民至于孝和人戶滋殖桓帝永壽三年戶千六十七萬七千九百六十口五千六百四十八萬六千八百五十六靈帝遭黃巾為寇獻帝遇董卓稱亂大焚宫廟劫御西遷是以興平建安之際海內荒殘人戶所存十旡一二魏武據中原劉備割巴蜀孫權盡有江東之地三國鼎立戰爭不息及平蜀得戶二十八萬口九十四萬帶甲將士十萬二千吏四萬通計戶九十四萬三千四百二十三口五百三十七萬二千八百八十一除平蜀所得當時魏氏唯有戶六十六萬三千四百二十三口有四百四十三萬二千八百八十一晉武帝太康元年平吳收其圗籍戶五十三萬吏三萬二千兵二十三萬男女口二百三十萬後宫五千餘人九州攸同大抵編戶二百四十五萬九千八百四口千六百一十六萬三千八百六十三此晉之極盛也宋武帝北取南燕平廣固西滅後秦平關洛長河以南盡為宋有帝素節儉有司嘗奏東西堂施局腳牀用銀塗釘帝以為費使用直腳牀釘用鐵公主出適遣送不過二十萬旡錦繡金玉之費文帝勵精臨人江左數代帝王莫及所以稱元嘉之理比前漢之文景焉既而國富兵強更務經略元嘉二十七年後魏主太武帝以數十萬衆南伐河上屯戍相次覆敗魏師至瓜步而還宋之財力自此衰耗今按本史起孝武大明八年戶九十萬六千八百七十口四百六十八萬五千五百一齊氏六王年代短促其戶口未詳梁武之初亦稱為理及精華耗竭貪地邀功侯景逆亂竟以幽斃元帝暴虐骨肉相殘才及三年便至覆滅墳籍亦同灰燼戶口不能詳究陳武帝荆州之西既非我有淮淝之內力不能加宣帝勤恤人隱時稱令主閲其本史戶六十萬而末年窮兵黷武逺事經略吳明徹全軍隻輪不返鋭卒利器從北殱焉至後主滅亡之時隋家所收戶五十萬口二百萬後魏起自陰山盡有中夏孝文遷都河洛定禮崇儒明帝正光以前時推全盛戶口之數比夫晉太康倍而餘矣及爾朱之亂政移臣下或廢或立甚於奕碁遂分為東西二國皆權臣擅命戰爭不息人戶流離官司文簿又分散矣今按舊史戶三百三十七萬五千三百六十八北齊承魏末喪亂與周人抗衡雖開拓淮南而郡縣褊小文宣受禪性多暴虐而能委政宰輔楊遵彥十數年間亦稱為理故其時以為主昏於上政清於下及武成後主俱是僻王至崇化二年為周師所滅有戶三百三萬二千五百二十八口二千萬六千八百八十後周閔明二主主祭而已俱以弒崩武帝誅戮權臣方覽庶政恭儉節用考核名實五六年內平蕩燕齊嗣子昏虐亡不旋踵按大象中有戶三百五十九萬口九百萬九千六百四隋文帝始以外戚遂受託孤不踰數年便享大位克勤理道克儉省費至於六宫之內常服浣濯之衣供御故弊隨令補用非享燕所食不過一肉有司常進乾薑用布袋盛帝以為費大加譴責後進香藥復以氊袋盛因笞所司以為後誡其時宇內稱理倉庫盈溢至開皇九年平陳帝親於朱雀門勞師行賞自門外列布帛之積圍於南郭以次頒給所費三百餘萬段而不加賦於人煬帝大業二年戶八百九十萬七千五百三十六口四千六百一萬九千九百五十六此隋之極盛也承其全實遂恣荒淫登極之初即建洛邑每月役丁二百萬人導洛至河及淮又引沁水達河北通涿郡築長城東西千餘里皆徵百萬餘人丁男不充以婦人兼役而死者大半及親征吐谷渾駐軍青海遇雨雪之卒死者十二三又三駕東征遼澤皆興百餘萬衆餽運者倍之又逆徵數年之賦窮侈極奢舉天下之人十分九為盜賊身喪國滅實自取之蓋資我唐之速有天下也唐貞觀戶不滿三百萬三年戶部奏中國人因塞外來歸及突厥前後降附開四夷為州縣獲男女一百二十餘萬口十四年侯君集破髙昌得三郡五縣二十二城戶八千四十六口萬七千三十一馬千三百匹永徽元年戶部尚書髙履行奏去年進戶一十五萬髙宗以天下進戶既多謂旡忌曰比來國家旡事戶口稍多三二十年足堪殷實因問隋有幾戶履行奏隋大業中戶八百七十萬今戶三百八十萬顯慶二年十月日上幸汝州問中書令杜正倫曰此間田地極寬百姓太少因又問問隋有幾戶正倫奏大業初有八百餘萬戶末年離亂至武德有二百餘萬戶總章元年十月司空李績破髙麗國虜其王下城百七十戶六十九萬七千二百配江淮以南山南京西初自貞觀以後太宗勵精為理至八年九年頻至豐稔米斗四五錢馬牛布野外戶動則數月不閉至十五年米每斗直兩錢麟德三年米每斗直五文永淳元年京師大雨飢荒米每斗四百錢加以疾疫死者甚衆武太后孝和朝太平公主武三思悖逆庶人恣情奢縱造罔極寺太平觀香山寺昭成寺遂使農功虛費府庫空竭矣睿宗景雲初又造金仙玉真二觀補闕辛替否上書極諫不從開元四年山東諸州大蝗八年天下戶口逃亡色役僞濫朝廷深以為患九年正月監察御史宇文融陳便宜奏請檢察僞濫兼逃戶及籍外䞉田於是令融充使獲僞勳及諸色役甚衆加朝散大夫融奏置勸農判官長安尉裴寬等二十九人並攝御史分往天下所在檢責田疇招擕戶口其新附客戶則免其六年賦調但輕稅入官陽翟縣尉皇甫憬左拾遺楊相如並上疏盛陳煩擾不便寬等皆當時才彥使還得戶八十餘萬田亦稱是憬遂貶為衢州盈川尉融拜御史中丞十三年封太山米斗至十三文青齊穀斗至五文自後天下旡貴物兩京米斗不至二十文麵三十二文絹一匹二百一十餘文東至宋汴西至岐州夾路列店肆待客酒饌豐溢每店皆有驢賃客乘倐忽數十里謂之驛驢南詣荆襄北至太原范陽西至蜀川凉府皆有店肆以供商旅逺適數千里不持寸刃二十年戶七百八十六萬一千二百三十六口四千五百四十三萬一千二百六十五天寶元年戶八百三十四萬八千三百九十五口四千五百三十一萬一千二百七十二自十三載以後安祿山為范陽節度多有進奉駝馬生口不曠旬月郡縣供熟食酒肉草料楊國忠任用之後即與蠻王閣羅鳳結釁徵關輔河南京兆人討之去者萬不一全連枷赴役郡縣供食於是當路店肆多藏閉以懼撓亂驢馬車牛悉被虜奪不酬其直數年間因漸減耗十四載管戶揔八百九十一萬四千七百九管口㧾五千二百九十一萬九千三百九此唐家之極盛也國朝太祖建隆元年吏部格式四千戶以上為望三千戶以上為緊二千戶以上為上千戶以上為中不滿千戶為中下自後三年一度戶口升降開寶九年戶三百九萬五百四太宗至道三年戶四百一十三萬二千五百七十六真宗天禧五年戶八百六十七萬七千六百七十七仁宗天聖七年戶一千一十六萬二千六百八十九至嘉祐八年戶一千二百四十六萬二千三百一十一英宗治平三年戶一千二百九十一萬七千二百二十一神宗熙寧十年戶一千四百二十四萬五千二百七十並㑹要寶訓所載不同又景德四年丁謂言今戶七百四十一萬餘比咸平六年增五十五萬餘寶元初仁宗御邇英閣讀正說養民篇見歷代戶口登耗之數帝謂侍臣曰今天下民籍幾何梅詢曰真宗所作蓋述前代帝王恭儉有節則戶口充羡賦斂旡藝則版圖衰減自五季之後生齒雕耗太祖受命而真宗休養百姓天下戶口之數蓋倍於前矣南豐曽鞏嘗考藝祖之事以為唐天寶十四年天下戶口八百九十一萬藝祖元年戶九十六萬天下既定戶三百九萬元豐二年戶一千三百九十一萬皇朝戶口之數其逺過於唐者蓋未嘗興一暴役加一橫賦聖人之於民必有休養生息之恩而後能致民俗蕃阜之盛天地之氣與時運遷而日盛於東南故東南民籍以今凖昔乃為特盛漢元始間天下戶口千一百萬而東南戶口當十之一至東漢建康中乃當天下十之二又後而至西晉之太康當天下十之三又後而至唐之開元當天下十之四又後而至國朝之元豐乃當天下十之五版籍類周禮天官小宰八成三曰聽閭里以版圖司書三嵗大比夫家之數掌邦中之版土地之圖地官大司徒掌土地之圗人民之數秋官司民掌登萬民之數自生齒以上皆書于版及三年大比以萬民之數詔司寇及孟冬祀司民之日獻其數王拜受之登於天府內史司㑹冢宰二之其重之也如是及亂君之為政也戶口漏於圖版避役逋逃者有之於是姦心生而僞端作矣通典漢興蕭何收秦丞相府御史圗書藏之髙帝具知天下厄塞戶口多少強弱處以何得秦圗書也他日髙帝過曲逆曰壯哉縣顧問御史戶口幾何對曰始秦時三萬餘戶間者兵數起多亡匿今見五千餘戶非有圗書可考御史其能詳言乎下至宣帝時王成以僞增戶口而獲賞是殆旡版籍之可據也光武披輿地圗指示鄧禹曰天下郡國如是之廣今始得其一子前言天下不足定何也東晉桓溫以人旡定本為庚戌土斷以一其業安帝時劉裕再申行庚戍土斷之科自咸和初蘇峻作亂版籍焚燒至梁武帝時晉代舊籍並在謂之晉籍有東西二庫宋元嘉二十七年立七條之科至于齊東堂校籍置郎令史以掌之而簿籍至此大壞矣齊髙帝時虞玩之上表曰今戶口多少不減元嘉而版籍頓闕宜以元嘉二十七年籍為正後魏旡鄉黨之法民多隱冒李冲上言立鄉黨鄰三長定民戶籍公私便之唐制百戶為里五里為鄉四家為鄰五家為保每里置正一人按比戶口又正天下戶凡九等三年一造戶籍凡三本一留縣一送州一送戶部儀鳳三年敕自今以後省黃籍及州縣籍也通典國朝太祖建隆元年有司請據諸道版籍之數揔九千六萬餘戶此國初版籍之數也四年詔曰蕭何入關先收圖籍沈約為吏手寫簿書自今旡版籍處便仰置造不得煩擾乾德三年張淡上井田制度戶口㳂革數太宗至道元年詔復天下郡國戶口版籍自唐末四方兵起版籍亡失故戶口莫得而知至是始復造咸平五年詔三司取天下戶口數置籍校定以聞景德二年令三司每嵗校天下稅帳登耗以聞天禧二年减諸州府帳目并從簡併勿務滋章四年范雍請逐州選官専管帳以為勞績從之景祐元年造五等丁産簿并丁口帳輿地圗類前漢收秦圗書沛公至咸陽何先入收秦丞相御史律令圗書藏之沛公具知天下厄塞戶口多少強弱處民所疾苦者以何得秦圖書也光武披輿地圗光武披輿地圗示鄧禹曰天下郡國如是今始得其一宋朝輿地圗輿圖之有益於人國也尚矣創業之初有益於平定守成之後有益於備禦其在中興則又有益於恢復舊物者也江南之圖上於盧多遜則收復之功成長編開寶六年盧多遜使江南白國主曰朝廷重修天下圗經先以江南諸州願求一本以歸國主亟令繕寫與之於是江南十九州之形勢屯戍逺近戶口多寡多遜盡得之矣歸即言江南衰弱可取狀上始有意大用䕫州之圗出示劉銀則削平之策定編年乾德三年王師克䕫州初上以地圗示劉鋹劉鋹束手就擒太宗皇帝聖略勃興吳越并汾相繼納欵車書混一德被遐徼圗籍所列府州軍監凡二百九十有五縣一千一百三十有一而化外羈縻之州不與焉或閏年而圖民籍或十年而圗地形上之職方如指諸掌長編咸平四年吳淑言諸路所納閏年圗當在職方收掌近者並納儀鑾司伏以天下山川險要皆王室之藴奧故周禮職方掌天下圗籍又詔土訓以夾王車漢祖入關蕭何收秦圗籍由是周知險要豈可忽而不顧哉請令以今閏年圗並上職方又州郡地理犬牙相入向者圖畫三州地形則可以符合他郡望諸路每十年各畫本路圗上職方所冀天下險要不窺牖而可知九州輪廣如指掌而斯在從之爾土宇昄章亦孔之厚矣玁狁匪茹整居焦穫蓋天人共厭之四牡龐龐駕言徂東則今日事也羣書考索卷六十三
