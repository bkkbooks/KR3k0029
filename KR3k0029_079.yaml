body:
  text: 羣書考索後集卷十三宋章如愚編官制門監司類唐虞建官内有百揆四嶽外有州牧侯伯王者之時五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯秦罷封建而郡縣置御史以監諸郡漢興省之恵帝遣御史監三輔郡察事凡九條其後諸州復置監察御史文帝以御史不奉法乃遣丞相史出刺并督察武帝元封五年初置部刺史掌奉詔條察州以六條問事秩六百石十二州縣十二人居部九嵗舉為守相成帝以為刺史位下大夫而臨二千石輕重不相準乃更為州牧秩真二千石位次九卿哀帝復為刺史元夀復為牧王尊為臨州刺史馳九折坂世稱尊為忠臣黄覇為揚州刺史治有功宣帝詔賜車盖以彰有徳朱博遷冀州刺史行部决遣如神後漢光武復刺史乗傳周行郡國録囚徒考殿最舊制州牧奏二千石事皆先下三公三公遣掾史按檢然後黜退光武用法明察不復委三府故權歸刺舉之吏靈帝改為牧是時天下方亂豪傑各欲據州郡州牧之任自此重矣靈帝時賈琮為冀州刺史百姓聞風自然震竦其諸贓過者望風觧印綬去李膺為青州刺史守令畏威明多望風棄官魏晉為刺史持節都督庶姓為單車刺史魏賈陸為豫州刺史舉奏二千石以下阿縱不法帝曰真刺史也杜元凱荆州人號為杜父後魏州置三刺史其後随時沿革互有不同隋開皇三年罷郡以州統縣自是刺史之名存而職廢後雖有刺史皆太守之互名非舊刺史之職理一郡而已煬帝大業罷州置郡置司𨽻䑓大夫一人廵察畿内刺史十四人廵察畿外唐罷郡置州改太守為刺史而雍州置牧神龍二年分天下為十道置廵察使二十人以左右䑓内外官堅明清勁者為之景雲改置按察使開元中改置採訪處置使至徳之後改採訪使為觀察并領都團練治於所部之大郡宋初有轉運使淳化及景徳増提刑熈寜中又置提舉運使唐先天二年李傑始名務先始為水陸發運使盖使之名起開元二十一年裴耀卿以侍中充江南淮南轉運使而崔希逸蕭旻為副盖副使始此天寳以韋堅充勾當轉運使第五琦充諸色轉運使劉晏充諸道轉運使其後韓滉杜悰杜讓能崔昭緯皆以宰相充使而諸道分置廵院皆統於此五代罷廵院始置轉運使唐㑹要職官分紀藝祖開基懲五季之亂藩臣擅有財賦不歸王府自乾徳以後僣偽畧平始置諸道大運使以總利權開寳六年廣南平除徐澤為判官盖轉運判官始此其轉運使之名宋初但曰勾當某路水陸計度轉運使官髙者則曰某路計度轉運使太平興國初皆曰使兩省以上則為都轉運使又置副使與諸路判官焉又置同勾當轉運使俄罷諸路副使真宗毎用兵或令都部署兼轉運使王師征討則有隨軍轉運使事畢即停至道中詔曰天下物宜民間利病惟轉運使得以周知令更互赴闕延見詢問焉慶厯中皆帶按察之任六年罷三年詔諸路轉運使並兼按察使毎嵗具官吏能否先是歐陽脩請遣使按察官吏賈昌朝言轉運以按察官吏故令兼領之六年赦書以為過為煩擾吏不安其職並罷之先是判官與轉運使争權而罷至嘉祐中復置職畧熈寜二年詔轉運使用本資序人即充資序下一等為權二等為權發遣中興以来逐路都轉運使除授不常唯使副判官常置舊制轉運司除授皆命詞給誥渡江已後例給勅命後稍復舊轉運使副命詞運判則否六年諸路運判亦命詞給誥光宗紹熈以来使副運判不雙除開寳九年詔諸路官吏宜令轉運使廣訪能否第為三等嵗終以聞咸平元年上謂輔臣曰轉運使按察使權甚重必須平允之吏寛猛適中祥符七年詔曰自今轉運副使不限官品並在提㸃刑獄之上南豐除蔡俾制分部而使雖將漕為名其實在於總庶務之予奪主管運幹熈寜初詔諸路漕司始置屬官勾當兩員或一員又置管勾文字實録見熙寕三年管勾文字不得差出元祐中除三路外並罷後復置焉建炎初避髙宗諱改管勾為主管勾當為幹辦帳幹熈寜三年詔諸路漕司始置屬官元祐七年詔轉運司管勾文字除三路外並罷其職事帳司兼管後復故提刑宋朝淳化三年遣官分往諸路提㸃刑獄尋省之景徳四年真宗謂王旦曰朕慮四方刑獄官吏未盡得人一夫受寃即召灾沴今軍民事務雖有轉運使且地逺無由知先帝常選朝臣為諸路提㸃刑獄今可復置仍以使臣副之於是置諸路提㸃刑獄公事以朝臣充始命屯田李拱為之副以武臣閤門祗候以上充天禧四年加勸農使俄改提㸃刑獄勸農使又以武臣為副使天聖六年悉罷八年復置嘉祐中有武臣同提㸃河東刑獄竊用公庫銀器及樂倡首飾議者謂武臣不可為監司罷之治平元年罷提㸃刑獄委轉運司職官分紀熙寧二年諸路提㸃刑獄復差文臣其武臣並罷之史臣曰上以武臣罕習吏文多不足以察舉所部人材故罷之人皆以為便十年復置提㸃京畿刑獄掌察所部疑留獄訟勸課農桑而按其官吏之不法别其亷吏以逹于朝續㑹要宣和初詔江西廣南増置武提刑一員然遇闕帥不許武憲兼攝建炎元年以盜賊未衰諸路無武臣提刑處權添差一次専管捉殺四年罷之孝宗乾道六年詔諸路分置武臣提刑一員後復罷之提幹建炎四年詔諸路提刑司除武臣提刑添置幹辦公事官許行留文臣一員中興㑹要檢法熈寜六年置諸路提刑司檢法官一員從吕恵卿之請也元豐三年罷五年復置四朝列傳髙賦在神宗時亦嘗請諸道刑司獄置法官提舉宋朝淳化中建常平倉景祐元年令轉運司與長吏舉所部官専領之然猶𨽻漕臣熈寧遣使提領此盖提舉常平之所始也二年制置三司條例言河北陜西已差官提舉常平廣恵倉餘路欲差胡朝宗張復侯叔獻曽誼等並為提舉官九年府界畿内亦専置提舉常平倉一員不令司農丞兼領元祐初罷紹聖九年復置政和改元詔江淮荆浙六路共置茶鹽提舉一員宣和三年詔河北京東路推行新法鈔鹽可添置提舉官一員此提舉茶鹽之所始也宋朝茶鹽事舊𨽻發運司元豐間或以轉運常平官兼提舉或以提刑兼領知通提轄政和以後始専置官吏既而諸路皆置建炎元年詔提舉常平司併歸提刑司二年復三年復詔提刑兼四年詔逐路提刑司茶鹽司並依舊分東西路紹興二年詔荆湖北路復置提舉茶鹽司四年詔廣西茶鹽司官吏並罷其職事委漕臣五年詔諸路提舉常平併入茶鹽司仍以提舉茶鹽常平等公事為名二十五年從王支請詔諸路提舉茶鹽官改充提舉常平茶鹽公事提幹熈寜二年置提舉常平司勾當公事於通判幕職内選差一員不妨本職是年制置三司條例司言京西路乞差大理寺丞朱紘淮南路著作郎曽從兩浙路前宣州司理王醇並為管勾官職畧紹興三年户部看詳欲諸路州並以通判充主管官人許公幕職官人差六年復置主管司十五年改為幹辦公事依漕屬例中興㑹要此常平幹也宣和三年置茶鹽提舉屬官一員㑹要此茶鹽幹也今提舉司存二幹官以此總領南渡之初嘗命朝臣總領都督府宣撫司財賦未以官名也紹興三年差户部侍郎姚舜明往建康總領于都督府錢物糧斛六年都督諸路軍馬張浚言三宣撫司錢糧漕司互相占吝因致闕乏乞於户部長貳内郡一員来鎮江府置司専一總領詔差户部侍郎劉寜止七年令户部郎官霍蠡前往鄂州置局専一總領岳飛軍錢糧紹興十一年收諸帥之兵以為御前軍屯駐諸處皆置總領以朝臣為之仍帶専一報發御前軍馬文字盖又使之與聞軍政不獨職餽餉而已叙位在轉運副使之上鎮江諸軍錢糧淮南總領掌之建康池州諸軍錢糧淮西總領掌之鄂州荆南江南諸軍錢糧湖廣總領掌之興元興州金州諸軍錢糧四川總領掌之初以胡紡為司農少卿總領淮東軍馬錢糧呉彦璋太府少卿總領淮西江東軍馬錢糧曽慥為太府卿總領湖廣江西京西路財賦湖北京西軍馬錢糧諸軍不聽節制十六年四川總司以總領四川宣撫司錢糧所為名十八年詔罷宣撫司始改為四川總領見中興㑹要孝宗乾道六年詔淮東總領併歸淮西總領一所中書門下省言勘㑹淮東總領所廢併司名合行併入詔以總領兩淮浙西江東財賦軍馬錢糧為名仍鑄印繳納兩司元印七年復置淮東總領孝宗㑹要又湖北總領所壁記云國家駐蹕呉㑹形勝控扼之地上下數千里自蜀漢荆襄江鄂逹于兩淮其間列戍數百而大屯不過十數視屯兵若干州之賦入供其軍食其始費用出入悉聽乎主將之所自為已而兵寖乏用紹興五年始命中都官為外司農兼總其賦之立而制其出為四總領所總屬紹興十一年初置四總領官屬有幹辦公事准備差遣四川有主管文字二員淮東淮西有分差糧料院審計司審三司通判兼𣙜貨務都茶場御前封摏甲仗庫大軍倉大軍庫贍軍酒庫市易抵當庫恵民藥局湖廣有給納場屬官兼分差糧料院審計以屬官兼御前封樁甲仗庫大軍倉大軍庫贍軍酒庫四川有分差糧料院審計院審計以屬官兼大軍倉大軍庫撥發船運官贖藥庫糴買場中興㑹要都大提舉茶馬宋朝熈寜七年始詔三司鹽鐵判官李杞三司勾當公事蒲宗閔經畫川蜀買茶充秦鳯熈河路博馬就於提舉成都府路買茶公事杞於秦州宗閔於成都置司後改名都大提舉茶馬事成都府志熈寜七年差李杞蒲宗閔成都府買茶熈河路博馬並令杞等提舉置都大㮛舉及主管同主管各因其資品髙下除授云元豐四年羣牧判官郭茂恂又言茶司既不兼買馬遂立法以害馬政恐誤國事乞併茶場買馬為一司從之盖茶馬司始合於此時也舊制於原渭徳順三郡市蕃馬熈寜七年初復熈河經畧使王韶言西人頗以善馬至邉其所嗜唯乏茶與之為市請趣茶馬辦之乃命三司勾當公事李杞運蜀茶至熈河置買馬場六而原渭徳順更不買馬於是杞言賣茶市馬一事也乞同提舉買馬杞遂兼馬政然分合不常至元豐四年羣牧判官提舉買馬郭茂恂又言茶司既不兼買馬遂立法以害馬政乞併為一司從之掌收摘山之利以佐邦用凡市馬於蕃夷以茶易之大觀以来茶馬之政廢川茶不以博馬唯市珠玉故馬政廢缺建炎四年張浚奏大石進奉珠玉髙宗諭曰云云紹興四年從闗師古之請以乏戰馬始令四川宣撫司支茶博馬五年宻院言已於永康軍威茂州置場七年宰臣趙鼎言得㫖復置茶馬官舊有主管茶馬同提舉茶馬都大提舉茶馬凡三等上曰考其資歴命之乾道元年川秦兩司馬額共九千餘匹茶馬陳彌作言本司買馬川秦兩司文黎珍叙南平長寜軍六州軍年額川馬五千餘匹係應副江上諸軍階州之峯貼陜西和州之宕昌兩處年額共西馬四千餘匹係輪年應副三衙川秦兩司者祖宗舊制至今不廢四年四川宣撫使虞允文奏照得祖宗朝都大茶馬官於秦州成都各置司治各半年撥發馬月分居秦司訖事即歸川司措置發茶并買馬物帛之類今欲依舊制於鳯州河池縣置秦司既近宕昌買馬之弊可以稽察上從之都大提㸃諸路坑冶唐開元二十五年監察御史羅文信充諸道鑄錢使唐㑹要天寳三載楊眘矜除御史中丞充鑄錢使六載度支郎中楊釗充諸道鑄錢使永泰元年劉晏充東都淮南浙江東西湖南山南東道鑄錢使第五𤦺充京畿闗内河東劔南山南西道鑄錢使諸鑄錢監監所在州府都督刺史為之副監一人上佐判之續通典宋朝自開寳平呉之後因其舊置錢監于鄱陽既而江淮荆浙閩廣之地皆有監係發運使兼提㸃咸平三年以馮亮為江南轉運副使兼都大提㸃江南福建路鑄錢事内供奉官白丞睿同提㸃鑄錢事實録至景祐二年始置江浙川廣福建等路都大提㸃坑冶鑄錢一員以魏兼為之充朝通各與提㸃刑獄序官按四朝志榮宗範知鉛山縣有詔罷民采銅皆散為盜宗範一切使如故真宗嘉異擢提㸃江浙諸路銀銅坑冶與此不同當攷元豐二年三司言江浙等路提㸃坑冶鑄錢官一員通領九路水陸廵按不周欲増一員分路提㸃從之遂定為兩司在饒者領江東淮浙七閩在虔者領江西荆湖二廣焉並聖朝職畧至元祐元年以坑冶鑄錢通為一司從淮南提㸃李深之請也㑹要政和七年置提㸃鑄錢官兩員於饒䖍州紹興二年置虔州提㸃司從提㸃王㬇之請也雖有上項指揮後来多在饒州置司贑州只係廵歴六年趙伯瑜乞依嘉祐著令銜内添都大二字與提刑序官二十六年詔都大提㸃坑冶鑄錢司官吏並罷令逐路轉運司交割以尚書省言坑冶鑄錢司近年鑄錢全虧一司官吏所費不貲罷之二十七年置提領諸路鑄錢官於行在差侍從或卿監一員不妨本職兼領置屬官三員以提領諸路鑄錢所為名以户部侍郎榮薿兼二十九年從左司諫何溥言乃復置以江淮荆浙福建廣南路提㸃坑冶鑄錢公事係銜與運判序官依舊於饒贑二州置司輪年守任専以措置坑冶督責鼓鑄為職祖額二百六十餘萬貫孝宗乾道六年併歸發運司七年復置此據提㸃司題名八年詔鑄錢司依舊置提㸃官二員於饒贛二州置司除王楫李大正二人九年兩司分認課額將江南淮南兩浙潼川利州路𨽻饒州司江西湖廣福建分𨽻贛州司又王楫等言所有舊坑多係江西却慮饒州一司無從措置欲於江西管内取撥江州吉州撫州興國軍隆興府却𨽻饒州司從之淳熈三年併贛司歸饒州王楫専為提㸃官加都大焉主管提幹檢踏紹興二年鑄錢司言本司昨被㫖許置幹辦公事一員檢踏官五員催綱官二員後来興諸司屬官一員咸罷經所𨽻九州不可缺官詔復置幹辦公事一員檢踏官三員催綱官一員後檢踏置六員十一年從韓環之請將檢踏官各分認専管職事一員在饒州本司一員在信州一員在建州一員在韶州一員在潭州中興㑹要二十六年提㸃坑冶鑄錢司官吏檢踏官等並罷二十九年因何溥議再置提㸃官於饒州置主管文字舊亦有秀州置幹辦公事一員韶州建州各置檢踏官一員别置秤銅官催綱官各一員差武臣續詔於饒州添檢踏之員中興㑹要提舉市舶唐有市舶使以右威衞中郎將周澤為之見栁澤劾慶立疏代宗廣徳元年有廣州市舶使吕太一通鑑宋朝開寶四年下廣南以同知廣州潘美尹宗琦並兼市舶使通判謝處玭兼市舶判官太祖實録咸平三年九月庚子令杭州明州各置市舶聽官從便長編熈寜更始變市舶法泉人賈海外者往復必使東詣廣否則没其貨海道回逺竊還家者過半嵗抵罪者衆太守陳偁奏疏願置市舶於泉不報哲宗即位之二年始詔泉置市舶偁了齋之父也時傳見延平志舊制雖有市舶司多州郡兼領元豐中始令轉運司兼提舉而州郡不預矣元豐三年書言廣西東路條已修定乞専委官催行詔廣東以轉運使孫迥廣西以運使陳倩兩浙以轉運副使周直孺福建以轉運判官王子京迥直孺兼提舉催行倩子京兼覺察拘攔其廣東路安撫使更不帶市舶後専置提舉而轉運司不復預矣後盡罷提舉官至大觀元年續置明年御史中丞石公弼請歸之轉運司不報建炎中興詔罷兩浙福建市舶司歸轉運司建炎時政記而廣南如故明年復置中興會要尚書省言併廢以来工人不便虧失數多於是詔依舊復置紹興四年廢福建提舉市舶初令提刑兼領旋委提舉茶事十三年提舉欲措置福建臘茶時欲發臘茶至行在置局出賣吕斌上言於是茶鹽司歸建州而提舉市舶以次復矣乾道二年詔罷兩浙提舉市舶逐處職事委知通知縣監官同行檢視而總領數令轉運司提督紹興二十九年張闡言福建廣南各置務於一州兩浙舶務乃分建於五所至乾道初臣僚言兩淮臨安明州秀州温州江隂軍凡五處有市舶祖宗舊制有市舶處知州帶提舉市舶務通判帶主管知縣帶監而逐務又各有監司市舶置司乃在華亭近年遇明州舶船到提舉帶一司吏人留明州數月名為抽觧其實騷擾且福建廣南皆有市舶物貨浩瀚置官提舉誠所當宜惟是兩浙置官委是冗蠧乞賜廢罷從之安撫使梁武帝普通五年魏以酈道元為大使慰撫六鎮大使始此隋文帝開皇九年詔遣柱國韋洸安撫嶺外仁夀四年以楊素為并州道行軍總管河北道安撫大使並通鑑唐貞觀初遣大使十三人廵省天下諸州水旱則有廵察安撫存撫之名節度使兼之則有副使天授二年發十道存撫使職官分紀聖厯中狄仁傑為河北道安撫徳宗貞元又置副使今職畧宋朝舊不常置自咸平二年以翰林學士王欽若為西川安撫使知制誥梁顥為陜西安撫使安撫使之名始此其後景徳三年始置河北沿邉安撫使以雄州守臣為之而陜西沿邊諸州亦有安撫使慶厯二年詔置湖南安撫司八年詔置河北四路安撫以韓𤦺王拱辰賈昌朝等充諸路使皇祐四年詔廣桂二州帶經畧安撫使熈寜五年罷諸路經畧安撫使崇寜二年置河南安撫使宣和二年置輔郡内潁昌府帶京西安撫使宣和三年臣僚言睦賊猖獗乞以杭越知州總領兼本路安撫鎮撫一方詔杭越州江寜府守臣並帶安撫使詔洪州守臣可依江寜府安撫使凡諸路安撫逐州知州兼以直秘閣以上充掌總䕶諸將統制軍旅察治奸宄以肅清一道凡兵民之政皆掌焉帥其屬而聽其獄訟頒其禁令定其賞罰稽其錢榖器械出納之名籍其行以法若事難専決則具可否禀奏即干機速邊防及士卒抵罪則聽以便宜裁斷係邊任則綏御夷狄撫寜疆圉若甲兵屯戍芻粟饋運則視其緩急盈虗而移用之掌凡戰守之事並㑹要續㑹要建炎元年李綱請沿河沿淮沿江置安撫使兼馬歩軍都總管以文臣充二年令將兵處知州帶管内安撫使後省四年置鎮撫使罷逐路安撫使後罷鎮撫使置安撫使始故時諸路又有安撫大使自兩浙西路劉光世始二品以上為帥即為安撫大使中興㑹要帥屬唐置藩鎮皆有參謀至行軍亦有之闗預軍中機宻張建封置温造字簡輿説劉濟使納忠於朝建炎四年詔兩浙西路安撫大使許置參謀參議各一員紹興四年詔沿江三大使司亦許置參謀參議官五年詔江南西路湖南浙西安撫大使許置秀州安撫使許置參議共謀參議請給依本路提舉茶鹽支破中興㑹要機宜宋朝安撫使司其屬有勾當公事管勾機宜文字準備差使哲宗正史志建炎初安撫大使許置主管機宜文字主管書寫本司機宜文字各一員紹興四年詔帥府書寫機宜文字除係事干機宻合書寫外其餘文字並不得簽書俸給京官依通判選人依簽判中興㑹要宋朝祖宗朝安撫使司屬有勾當公事髙宗即位事御嫌名改為幹辦公事建炎三年詔浙西安撫大使許置幹辦公事官五員其俸給京朝官依通判選人依簽判支破建炎四年江東西湖南浙西安撫大使許置幹辦公事五員安撫使置幹辦公事四員中興㑹要制置使唐宣宗大中五年以白敏中充招討党項行營都統制置等使通鑑制置使之名始此宋朝不常置掌經畫邊鄙軍旅之事政和中熈秦用兵以内侍童貫為之四朝志宣和末姚古為京畿輔郡兵馬制置使靖康初种師道為河東路制置使錢盖為陜西五路制置使欽宗實録建炎元年有招討賊盜制置使自王淵始三年有行在五軍制置使自劉光世始又諸路皆有副使自江浙陳彦文程千秋始六月浙西安撫使康允之帶本路制置使安撫帶制置自此始也四年有沿江都制置使管江南東路知建康府紹興二年有沿海制置使係建康兩浙東路三年有安撫制置使大使之名自江南西路大使趙鼎始六年始鑄印以某路制置司為名從浙西淮東制置使梁汝嘉所請也其後盡省惟四川沿海有焉四川係成都府沿海明州經畧使唐貞觀二年邊州别置經畧使此盖使名之起唐百官志節度兼度支營田招討經畧使則有副使判官各一人職官分紀儀鳯二年以黒齒常之為河源軍經畧大使今職畧永淳元年婁師徳為河源軍經畧副使通鑑至徳三年賀蘭進明除嶺南五府經畧兼節度使建中元年除元琇節度始不帶五府經畧唐㑹要宋朝不常置咸平五年始以右僕射張齊賢為邠寜環慶涇原路經畧使判邠州諸路軍馬並受節度又以鄧州觀察使錢若水為并代經畧使判并州自後不除人寶元中夏人入冦始命陜西沿邊大將皆兼經畧皇祐間儂智髙擾邊詔知廣桂州並帶經畧安撫使自後西南二邊常帶經畧所以重帥權而服𦍑夷也四朝職畧國朝㑹要其經畧安撫各以直祕閣以上充掌一路兵民之事皆帥其屬而聽其獄訟頒其禁令定其賞罰増其錢榖甲械出納之名籍而行以法若事難専決則具可否禀奏即干機速邉防及士卒抵罪則聴以便宜裁斷帥臣任河東陜西嶺南路職任綏御戎夷則為經畧安撫使續㑹要四朝志南渡之初依舊制廣南東路帶主管經畧安撫使公事西路帶經畧安撫使紹興五年令襄陽守臣湖北帥帶經畧安撫使中書門下省言湖北帥司已移還荆南舊治與襄陽府事體頗同詔王庶許依襄陽例帶經畧安撫中興㑹要後罷而二廣如故京尹秦分天下為三十六郡京師為内史漢因之景帝分左右内史武帝置京兆尹右扶風左馮翊為三輔後漢都洛為河南尹魏晉因之歴代所都皆為尹江左為丹陽尹北齊為清都尹後周及隋復為京兆尹唐初置牧開元復為尹五代都汴為開封尹宋朝牧尹不常置太宗真宗皆嘗尹京後親王無繼者權知府一人以待制以上充掌尹正畿甸之事中都之獄訟皆受而聴焉小事則専决大事則禀奏若承㫖已斷者刑部御史䑓無輙糾察典司轂下建隆以来為要劇之任崇寜三年蔡京乞罷權知府置牧尹各一員専總府事牧以皇子領尹以文臣充四朝志尹以親王為之號判南衙凡命知府必帶權字以翰林為之翰林學士及雜學士若待制則權發遣而已所選皆人望盖四方取則之地也聖朝職畧中興駐蹕杭州建炎三年改杭州為臨安府守臣帶浙西安撫多卿監從臣兼紹興三年詔臨安府有禀奏事許不隔班上殿乾道七年皇太子領臨安府尹就東宫為廨廢臨安府通判簽判職官置少尹判官推官少尹一依淳化判官例差侍從以上判官依前天聖令用郎官以上餘曹掾依舊府官庭參仍拜掾事少尹裁决徒流以上具案判準表奏則繋皇太子銜申中書以下文移則少尹簽書九年皇太子辭免臨安府尹其知通簽判推判官並復置中興㑹要孝宗㑹要留守隋大業九年代王侑留守西京十二年李淵太原留守王威商君雅為副通鑑唐太宗貞觀十七年親征遼東置京城留守以房𤣥齡充蕭瑀為副咸亨二年髙宗幸洛陽以雍州長史李晦為西京留守其後車駕發京都則置留守以右金吾大將軍為副留守太原府亦置尹及少尹以尹為留守少尹為副留守謂之三都留守見唐職林及職官分紀宋朝天子廵狩親征則命親王或大臣總留守事建隆元年親征澤潞以樞宻使呉延祚為東京留守其西南北京留守各一人以知府事兼之闕天北京大名見分紀留守司掌宫鑰及京城守衞修葺彈壓之事畿内錢榖兵民之政四朝志建炎初京城有副留守以檢校少傅寜武軍節度使范訥充留守以侍衞親軍都指揮使遂安軍承宣使郭仲荀副之又有西京留守並係執政從臣充兼節制軍馬其後武林建鄴並建行宫武林視汴都而建鄴視三都焉聖朝職畧紹興四年參知政事孟庾為行宫留守從權措置百司事務六年有行宫同留守以左通奉大夫孟庾提舉萬夀觀兼侍讀充詔二留守並權赴尚書省治事是年八月三省已降指揮三省樞宻院常程事務並聽行宫留守司與决詔秦檜孟庾並權赴尚書省治事中興㑹要羣書考索後集卷十三
