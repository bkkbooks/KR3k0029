body:
  text: 羣書考索卷四十五宋章如愚撰禮器門樽罍類罍樽按周禮祭器圖云形似壺大者一斛刻木為之畫為山雲之形又云罍厠在六尊之間以盛三酒比於六尊設之稍遠爾雅注云罍形似壺大者一斛又曰卣中尊也此欲見彛為上尊罍為下尊也然則六彛為上受三斗六尊為中受五斗六罍為下受一斛是其差也詩周南曰我姑酌彼金罍孔疏指此諸臣所酢之罍而受一石者也又鄭注司尊罍云罍刻而畫之為山雲之形既言刻畫則用木矣又引韓詩說士用梓無飾則士已上同用梓而加飾耳天子則以黃金為飾口徑九寸五分脰高三寸中徑七寸五分脰下橫徑九寸腹中橫徑一尺四寸上下中徑一尺六寸足高二寸下徑一尺畫山雲之形新圖云說文雷字從畾象曰轉又古文靁字作􅣂今宜於罍上作乃􅣂二字象尊按周禮大尊制圖云春祠夏禴其再獻用兩象尊一盛𤣥酒一盛盎齊以象骨飾尊鄭司徒云象尊一象鳯凰本朝陸佃云舊傳象尊或為象載或以其齒飾之亦或空其腹以為尊蓋古者制尊樣制不一要之同不失為象尊頃見參知政事章惇得古銅象尊一制作極精緻三足象其鼻形望而視之真象也黃目尊按周禮云彛制圖云秋嘗冬蒸祼用斝彛黃彛皆有舟盛鬱鬯黃目也以黃金為目彛並以金鄭司農云黃彛黃目尊也明堂位曰夏后氏以雞彛殷以斚周以黃目爾雅曰彛自罍器也鄭𤣥謂黃目以黃金為飾郊特牲曰黃目鬱氣之上尊也黃者中也目者氣之清明者也言酌於中而清明於外陸佃云舊圖黃目尊畫人目而黃之人目不黃作而黃之理無有也許慎說罍云龜目酒尊龜目黃亦其氣之清眀未有知之者也然則黃目宜畫龜目如慎說且龜亦因以為戒禮記正義曰天子則黃彛之上有雞彛鳥彛備前代之器諸侯但有黃彛故鄭注郊特牲云黃彛於諸侯為上尊犧尊按周禮司尊鄭司農云舟尊下臺若今時承槃獻讀為犧尊飾以翡翠明堂位曰犧尊周尊也春秋傳曰犧象不出門尊以祼神罍神之所飲也春祠夏禴用之司尊彛云春祠夏禴其朝踐用兩獻尊一盛𤣥酒一盛醴齊王以玉爵酌醴齊以獻尸也鄭讀獻字與婆娑之娑義同謂刻鳯凰之象其形婆娑然毛詩傳曰犧尊者沙飾也言沙牛飾尊而先儒謂有沙羽飾畫為鳯皇之形誤矣蓋牛有二種一曰沈牛牛之善水者也一曰沙牛俗亦謂之黃牛且言有沙飾也似不為全牛若今牛鼎有牛之飾而已著尊爾雅曰著尊略尊也禮樂論曰秋獻用之者麗於下而將以歸根也秋冬者陰也氣象靜物尊亦用靜物受五斗漆赤中著地無足口圎徑一尺二寸底徑八寸上下空徑一尺五分與獻尊象尊形制容受並同但無足及飾耳司尊彛秋嘗冬蒸朝獻用兩著尊一盛𤣥酒一盛醴齊王以玉爵酌獻尸也又按周禮秋嘗冬蒸朝獻用兩著尊著地無足與獻尊象尊形制容受並同鄭司農引爾雅曰著尊者著略尊也明堂曰著殷尊也壺尊壺尊受五斗漆赤中以壺為之口圎徑八寸脰高三寸中徑六寸半脰下橫徑八寸腹中橫徑一尺一寸底徑八寸腹上下空徑一尺二寸足高二寸下橫徑九寸司尊彛秋嘗冬蒸饋獻用兩壺尊一盛𤣥酒一盛盎齊王以玉爵酌獻尸又按明堂位曰壺者以壺為尊春秋傳曰尊以魯壺太尊太尊太古之瓦尊也受五斗口圎徑一尺脰高三寸中橫徑九寸脰下大橫徑一尺二寸底徑八寸腹上下空徑一尺五分厚半寸底平厚寸按周禮六尊制圖追享朝享朝踐用兩太尊一盛𤣥酒一盛醴齊太古之瓦尊也與甒形制容受同春秋傳曰太尊太古之瓦尊明堂位曰太有虞氏之尊也儀禮燕禮云公尊瓦太兩注云瓦太有虞氏之尊也禮器曰君尊瓦甒山尊山尊受五斗口圎徑九寸脰高三寸空徑一尺五分足高二寸下徑九寸知受五斗者郭璞云罍形似壺大者受一斛今山罍既在中尊之列受五斗可知也司尊彛云追享朝享再獻用兩山尊一盛𤣥酒一盛盎齊王用玉爵酌以獻尸注云山尊山罍也按周禮六尊圖尊赤刻而畫之為山雲形明堂位曰山罍夏后氏之尊也雞彛雞彛受三斗宗廟器盛眀水彛法也言與諸尊為法也司尊彛曰春祠夏禴祼用雞彛鳥彛後鄭云謂刻而畫之為雞鳯凰之形著於尊上口圓徑九寸底徑七寸其腹上下空徑高一尺足高二寸下徑八寸其六彛所飾各畫本象雖别其形制容受皆同鳥彛制度容受一同雞彛用盛鬱鬯司尊彛云春祠夏禴祼用雞彛鳥彛謂春夏將祭之先於奏樂降神之後王始以圭瓚酌此鳥彛鬱鬯以獻尸后亦以璋瓚酌鬱鬯亞祼經云鳥彛後鄭以為畫鳯凰形於尊上知鳥是鳯凰也按書君奭云我則鳴鳥不聞彼鳴鳥是鳯凰故知此鳥彛亦是鳯凰也其與舟俱漆並赤中前雞彛與舟欲見法度故别圖之異處自鳥彛已下尊與舟相連圖之貴省略也斚彛斚彛盛明水先鄭讀斚為稼謂畫禾稼於尊因為尊名然則宜畫嘉禾以為飾其彛與舟并漆赤中其局足內亦漆畫禾稼為飾虎彛按制圖云追享朝享祼用虎彛蜼彛虎彛盛明水畫虎虎彛畫虎於尊盛明水其尊與舟皆漆赤中其局足內亦漆及畫虎為飾蜼彛盛鬱鬯司尊彛云追享朝享祼用虎彛蜼彛皆有舟王亦以圭瓚酌鬱鬯以獻尸禮神后亦以璋瓚亞獻彛與舟皆漆赤中其局足內亦漆畫蜼以為飾蜼之為物鼻露向上尾長數尺其色黃黑有雨即自縣於樹以尾塞鼻或以兩指蜼音壘大罍大罍有蓋祭祀尊也鬯人云凡祭祀社壝用大罍注大罍瓦罍也賈疏云壝謂築土為墠墠內作壇而祭也若三壇同墠之類此注與封人及大司徒皆二社壝者但直見外壝而言也知大罍是瓦罍者旊人為瓦簋據外而言此罍亦用瓦取質略之意瓢齎鬯人云禜門用瓢齎釋云禜是營酇所祭祭神非一取營酇而祭之義也門是國門以祭法七祀有國門故也瓢齎取甘瓠割去抵以齊為尊亦取其質略之意也蜃尊鬯人云凡山川四方用蜃後鄭云卣蜃概散皆漆尊蜃畫為蜃形蚌曰合漿尊之象也口徑一尺二寸底徑八寸足高二寸下徑九寸底至口上中下徑一尺五分容五斗概尊散尊名飾雖殊以義例皆容五斗概尊鬯人云凡祼音堁事用概後鄭云概漆尊以朱帶者賈義云概尊朱𢃄𤣥纁相對既是黑漆為尊以朱飾腹故名概尊取對概之義也形制容受一如蜃尊散尊鬯人云凡疈事用散後鄭云散漆尊無飾曰散賈義云對概蜃獻象四尊各有異物為飾言此散尊惟漆而已别無物飾故曰散大宗伯以疈辜祭四方百物是蠟祭百神與四方百物乃用散尊酒壺公羊傳曰齊侯唁公于野井國子執壺漿何休云壺禮器腹方口圓曰壺反之曰方壺有爵飾蓋此壺也又疏云謂刻畫爵形以飾壺體上下空徑一尺四寸方橫徑一尺一寸強乃容一斛之數也舟司尊彛云雞彛鳥彛皆有舟先鄭云尊下臺若今承槃其舟外漆朱中槃口圓徑尺四寸其舟高厚各半寸槃下刻殺二等而漸大圓局足與槃通高一尺足下空徑橫大二寸六彛下舟形制皆同其舟足各隨尊刻畫其類以飾之此舟漆赤中唯局足內青油畫雞為飾新圖曰司尊彛彛皆有舟尊皆有罍鄭司農云舟尊下臺若今承槃非是蓋彛之有舟以盛鬯則猶尊之有罍以盛酒且皆以為戒然則舟宜若後世酒缸稍加大爾先儒用鄭說因為舟以載彛形制又與舟異若鬯有舟以載彛則尊亦宜有焉亦尊有罍以盛酒彛不應獨無也蓋古者惟爵為有承槃所謂坫與豐是以尊彛則無之尊彛說尊之為言尊也彛之為言常也尊用以獻上及於天地彛用以祼施於宗廟而已故尊於祭器獨名尊彛於常器均名彛籍談曰有􅈴而不廢撫之以彛器昭十五年臧武仲曰大伐小取其所得以作彛器襄十九則彛之為常可知矣先王制器或遠取諸物或近取諸身其取之也有義其用之也以類雞鳥虎蜼之彛取諸物也斚耳黃目取諸身也春祠夏禴彛以雞鳥尊以犧象以雞鳥均羽物犧象均大物故也秋嘗冬蒸彛以耳目尊以著壺以耳目均人體著壺均無足故也追享朝享彛以虎蜼尊以山太以虎蜼均毛物山太均瓦器故也陳禮書疏布巾冪人以疏布巾冪八尊後鄭注云以巾覆物曰冪天地之神尚質故用疏布巾也賈義云天地無祼惟有五齊三酒實於八尊此據正尊而言若五齊加明水三酒加𤣥酒則十六尊皆以疏布冪之天地雖無鬱鬯之彛亦用疏布冪之其四望山川社稷林澤亦用疏布是尚質也孔疏王制曰布幅廣二尺二寸此巾宜用二尺二寸之幅而圓畫布巾畫布巾冪六彛後鄭云宗廟尚文故用畫布賈疏云畫者畫五色雲氣也宗廟六彛盛鬱鬯以畫布冪之此畫布亦當用二尺二寸之幅而亦圓也龍勺周禮梓人云勺一升注云勺尊升也又明堂位曰夏后氏以龍勺注云為龍頭狀柄長尺二寸口縱徑四寸半中央橫徑四寸兩頭橫徑各三寸爵斚類玉爵太宰職云享先王贊玉爵後鄭云宗廟獻用玉爵受一升口徑四寸底徑二寸上下徑二寸二分圓足古人觀象制器義非一揆故假名全畫其物或取類半刻其形則雞鳥以下六彛褘揄素青二質是全畫其物著於服器者也觚爵柄畫之類龍勺蒲勺之倫是半刻其形飾於器皿以取類取呼者也按周禮祭器圖云玉爵受一升陸佃禮象圖載石銅爵云有首有尾有柱有足有柄祭統曰尸酢夫人執柄是也夫人授尸執足是也先儒謂柄為尾蓋不見此制今文彥博李公麟家有之中有篆文殆商器也匏爵陸佃禮圖云舊圖匏爵用匏片為爵據此乃杓也詩曰酌之用匏爵當如此制爾若爵宜截其鼻以盛酒不應破匏為之鄭氏說取甘瓠去抵以齊為正爵玷按周禮祭器圖云玷以致爵漆赤中畫赤雲氛亦隨爵為飾觚一升曰觚口徑四寸中深四寸五分底徑二寸六分圓足謂之觚者寡也飲當寡少也漆赤中畫靑雲氛適飾其巵凡諸觴形皆同升數則異觶三升曰觶口徑四寸中深四寸強底徑二寸觶者適也飲當自適四升曰角五升曰散並不圓爵刻木為之漆赤中爵畫也足也亦畫赤雲氣餘同玉爵之制角禮記圖禮器曰卑者舉角四升曰角觥詩卷耳七月桑扈絲衣言兕觥則觥角爵也周官閭胥掌其比觥撻爵之事小胥觥其不敬者則觥掌爵也先儒謂其受七升以兕角為之無兕則刻木為之如兕角然其用則饗燕鄉飲賔尸皆有之十月言朋酒斯饗稱彼兕觥春秋之時衛侯饗成叔而寧惠子歌兕觥其觩則享有觥也鄭人燕趙孟穆叔子皮則舉兕爵是燕有觥也閭胥掌其比是鄉飲有觥也緑衣言兕觥是賔尸有觥也蓋燕禮鄉飲酒大夫之饗皆有旅酬無算爵於是時也用觥陳禮書器用類筥筥圓受半斛主君致饔餼於賔與大夫上介皆以筥盛米故聘禮云米百筥筥半斛設于中庭十以為列比上黍粱稻皆二行稷四行是也簋方簋方以盛棗㮚聘禮注云簋方者器名也以竹為之狀如簋而方賈云凡簋皆用木而圓受斗二升此用竹而方故云如簋而方亦受斗二升玉人云案十有二棗㮚十有二列注云王后勞朝諸侯皆九列聘大夫皆五列則十二列勞二王之後也后勞有玉案又有竹簋方以盛棗㮚加於案上諸侯夫人無案但有竹簋以盛棗執之以進卣書曰秬鬯二卣詩與左傳曰秬鬯一卣爾雅曰彛卣罍器也又曰卣中尊蓋卣盛鬯之器也古者人臣受鬯以卣不以彛則鬯之未祼也實卣其將祼則實彛矣簋圓曰簋盛黍稷之器有蓋象龜形外圓函方以中規矩天子飾以玉諸侯飾以象又考工記旊人為簋受一斗二升高一尺厚半寸脣寸口徑五寸二分深七寸二分底徑亦五寸二分厚八分足底徑六寸賈釋金人注云方曰簠圓曰簋皆據外而言也簠外方內圓曰簠盛稻粱之器口圓徑六寸深七寸二分底徑亦五寸二分厚八分足底徑六寸厚半寸脣寸所盛之數及蓋之形制一與簋同案考工記旊人為簋及豆皆以瓦為之雖不言簠簋是相將之器亦應制在旊人亦有蓋疏云據祭天地之神尚質器用陶匏而已若祭宗廟則皆以木為之敦九嬪職云凡祭祀贊玉齍注云玉齍玉敦也受黍稷器然則天子八簋之外兼用敦也敦受一斗三升漆赤中大夫飾口以白金其制與簋簠容受並同但上下內外皆圓為異耳九嬪主婦贊執有儀故特圖之次於簠簋敦音對爼爼謂房爼也明堂位曰周以房爼鄭注云房謂足下跗上下兩閒有似於房孔疏云兩頭各有兩足足下各别為跗足閒橫者似堂之壁橫下二跗似堂之東西兩頭各有房也其爼以玉飾知之者以爼豆相類之物明堂位說周公之禮云薦用玉豆豆以玉飾明爼亦用玉飾長二尺四寸廣尺二寸高一尺漆兩端赤中央黑梡爼禮記圖有虞氏梡爼足四如案嶡爼禮記圖夏后氏嶡爼椇爼禮記圖殷爼曰椇讀曰矩豆豆以木為之受四升口圓徑尺二寸有蓋高一尺漆赤中大夫以上畫赤雲氣諸侯飾以象天子加玉飾皆謂飾口足也盛韲醢菹臡之屬籩籩以竹為之有縢緣口形制容受如豆盛棗㮚梅果之屬鄉射記注云所謂豆宜濡物籩宜乾物是也罋醯人醢人云王舉則供醢六十罋供醯六十罋致饔餼於賔客之禮供醢五十罋供醯五十罋是罋以盛醯醢也高一尺受三斗口徑六寸五分腹徑九寸五分底徑六寸五分腹下漸殺六寸登周禮器圖詩云于豆于登形象與豆同畫飾異耳瓦旊禮記圖祭天用瓦旊畢禮記器用制云郊特牲宗人執畢先入主人舉肉之時舉畢㫑主人舉肉也棜禮記器用圖云玉藻云大夫側尊用棜長四尺廣二尺四寸深五寸以陳饌禁禮記圖禮器大夫士棜禁篚以竹為之見掌客柶按周禮掌客器圖云體有柶用角為之銅有柶用木為之柶長一尺㯿陳三寸匜按禮記器用圖云匜者盥手澆水之器以羮魁柄中有道可以沃盥洗水也又公食大夫云小臣具盤匜注云君尊不就洗故設盤匜匜受一斗流長三寸漆赤中口徑八寸深四寸五分底徑六寸微殺流口徑一寸諸侯以象飾天子以黃金飾皆畫赤雲氣洗按周禮祭器圖洗形如罍洗罍周禮圖洗罍受一斛盥盤盥謂用匜沃盥洗手也盤謂承盥洗者承水之器也故謂之盥盤口徑二尺二寸底徑八寸深二寸受二斗足高二寸下徑一尺漆赤中几杖記曲禮大夫七十而致仕若不得謝則必賜之几杖惟几杖所以飬其身體也前文帝贊吳王謝病不朝賜以几杖孔光辭位太后賜太師靈夀杖黃門令為太師省中坐置几入省中用杖光武即位詔求卓茂為太傅賜几杖唐開元二年宴京師侍老于含元殿庭賜九十以上几杖八十以上鳩杖几席肆筵設席授几有緝御詩行葦牖閒南嚮敷重篾席黼純華玉仍几西序東嚮敷重底席綴純文貝仍几東序西嚮敷重豐席畫純雕玉仍几西夾南嚮敷重筍席𤣥紛純漆仍几書顧命司几筵掌五几五席之名物辨其用與其位禮春官越席几筵所以飬體也荀禮論几席所以飬體也史禮書几成王被冕服慿玉几書顧命或授之几詩行葦大宰大朝覲㑹同贊玉几禮天官杖伊耆氏掌國之大祭祀共其杖咸注咸讀作函老臣雖杖於朝事鬼神尚敬去之有司以此函藏之既事乃授之軍旅授有爵者共王之齒杖注王之所以賜老者之杖禮秋官五十杖於家六十杖於鄉七十杖於國八十杖於朝記王制席釋名曰席釋也可卷可釋也說文曰筵竹席也三禮圖曰士蒲筵長七尺廣三尺三寸無純周禮曰王府掌王之袵席司几筵掌五几五席之名物凡大朝覲設莞席紛純加繅席畫純加次席黼純諸侯祭祀席蒲筵繢純韓子曰夏禹為茵蔣席漢書文帝莞蒲為席大魏諸州記曰巨鹿廣阿澤多葦出細御席多雲母晉東宮舊事曰太子有獨坐龍須席赤皮席花席經席史記曰古者封禪席蒩秸漢舊儀曰祭天紫壇紺席六采綺席祭嶽曰菅席屏風釋名曰屏風障風也扆在後所依倚也禮記曰天子當扆而立鄭注云扆屏風又曰天子負斧依南嚮而立鄭𤣥斧扆為斧文屏風於户牖之間禮記曰天子之廟飾也記明堂位漢文帝紀謂屏為罘罳天子外屏人臣至屏俯伏思念其事上文疏唐魏徵十漸疏奏帝曰方以所上疏列為屏障庶朝夕見之太宗曰永惟治人之本莫重於刺史故録姓名於屏風卧興對之得才否狀輒書之以擬廢置憲宗使羣臣李絳等搜次君臣成敗五十種為連屏張便坐皇邸掌次王大旅上帝則設氊案張皇邸天官大旅上帝祭天於圓丘張氊案以氊為案於幄中以皇羽覆上邸後板也染羽象鳯凰羽色為之上文注謂以板為屏風又以鳯凰羽飾之此謂王坐所置者也上文疏案禹貢羽畎夏翟後世無夏翟故周禮鍾氏染鳥羽象鳯凰色以為之覆於板上眀堂位及司几筵皆云斧扆此不在寢廟無屋故不得云斧扆故别名皇邸同上受釐皇邸回蹕帷宮舊唐禮樂志黼扆司几筵凡封國命諸侯王位設黼扆禮春官斧謂之黼其繡白黑文以絳帛為質依制如屏風上文注負之言背也斧扆為斧文屏風於户牖閒上文注帷幕掌舍為帷宮幕人掌帷幕帟綬之事在旁曰帷在上曰幕或在地展陳于上帷幕皆以布為之四合象宮室曰幄王所居之帳也帟平帳也綬組綬所以繫帷也上文注釋名云帷圍也以自彰圍也幕幕絡也在表之稱也廣雅云帷幕帳也歸藏曰昔女媧氏張雲幕而放古神明漢書曰秦起咸陽西至雍離宮三百帷帳不移而具也記曰漢孝文帝所幸慎夫人帷帳不得文繡以示敦朴王忱魏書曰魏太祖雅性節儉帷帳壞則補納儀禮曰國君與卿圖事菅人布幕於寢門外簾釋名曰簾亷也自彰蔽為亷恥也廣雅云惔上必𤣥反下音淡簾也揚雄方言曰宋魏陳楚江淮之間箔謂之筁或謂之麴自關而西謂之箔南楚謂之篷箔說文曰曲受物之形方諸司烜氏掌以鑒取明水於月禮秋官鑒鏡屬取水者也世謂之方諸上文注詩云我心匪鑒金錫半謂之鑒燧之齊冬官築氏執下齊同上太官令掌凡祭之日與卿諸㕑省牲鑊取明水於隂鑒取明火於陽燧舊唐職官制鏡廣雅曰鑒謂之鏡釋名曰鏡景也有光景也淮南子曰人舉其疵則怨人鑑見其醜則善鑑文子曰夫鏡不設形故能有形晉東宮舊事曰皇太子納妃有著衣大鏡尺八寸銀華小鏡一尺二寸並衣紐自副漆奩盛蓋銀華金薄鏡三銀龍頭受福蓮花鈕鎖自副盤杆湯之盤銘曰茍日新日日新又日新記大學湯沐浴之盤而刻銘為戒上文疏盤銘刻戒於盤也上文注韋弦疏曰韋弦非能言之物聖賢引以自正魏志劉廙夷雅之體無待韋弦文選韋皮繩喻緩也弦弓弦喻急也西門豹性急故佩韋以自緩董安于性緩故佩弦以自急言王公夷雅無待此成上文注舟淮南子曰古見􅑆木浮而知為舟周易曰刳木為舟剡木為楫舟楫之利以濟不通蓋取諸渙吕氏春秋曰虞姁音詡舟物理論曰化狐作舟揚雄方言曰自關而西謂舟為船自關而東或謂之舟廣雅曰吳曰艑蒲殄反李䖍通俗曰晉曰舶音白埤蒼曰海中船曰艆䑼上郎下鄒說文曰江中舟曰音禮釋名曰上下重版曰艦四方施版以禦失如牢檻外狹而長曰艨衝以衝突敵船二百斛曰舠三百斛曰艇西京雜記曰太液池有鳴鶴舟容與舟清廣舟採菱舟越女舟罔罟包犧氏作結繩而為罔罟以佃以漁蓋取諸離易繫辭獸人掌罟田獸時田則守罟及弊田令禽注于虞中禮天官湯出見野張網四面祝曰自天下四方皆入吾網湯曰嘻盡之矣乃去其三面祝曰欲左左欲右右不用命乃入吾網諸侯聞之曰湯德至矣及禽獸史殷紀欹器孔子觀於魯桓公之廟有欹器焉夫子問於守廟者曰此謂何器對曰此蓋為宥坐之器孔子曰吾聞宥坐之器虛則欹中則正滿則覆眀君以為至誠故常置之於坐側顧謂弟子曰試注水焉乃注之水中則正滿則覆夫子喟然歎曰嗚呼夫物惡有滿而不覆哉子路進曰敢問持滿有道乎子曰聰明睿智守之以愚功被天下守之以遜勇力振世守之以怯富有四海守之以謙此所謂損之之道也周廟欹器至漢東京猶在御座漢末喪亂形遂絶杜預創意成而上之宋朝欹器太宗時翰林學士蘇易簡內直嘗以水試欹器小黃門宣事密奏上曰卿所玩非欹器耶易簡曰然此江南徐邈所作取至便坐親較視之再三賞歎仁宗皇祐四年二月戊辰御邇英閣內出欹器一陳御前喻丁度曰朕思古欹器之法試令工人制之以示卿等帝令以水注之中則正滿則覆率為家語荀卿淮南之說法度精妙帝曰日中則昃月盈則食聖人有持滿戒謹之守朕欲以中正臨天下度等對曰臣等亦願以中正事陛下因言太宗時嘗作此器真宗制欹器論次先儒之義云四月戊寅御邇英閣帝作欹器後論述一篇以申存亡守成之鑒事與文藝部頗異廩廩人掌九穀之數注藏米曰廩倉人掌粟入之藏同上季春命有司發倉廩賜貧窮季秋藏帝籍於神倉同上月令羣書考索卷四十五
