body:
  text: 羣書考索後集卷四十七宋章如愚編兵門兵法夫兵法自神農黃帝以來則有其書至周太公而其法始備戰國以來著書者甚衆孫武穰苴吳起其尤者也漢孝成命任宏論次兵書為四種一曰權謀二曰形勢三曰隂陽四曰技巧今以藝文志考之吳孫子兵法齊孫子公孫鞅吳起范蠡大夫種李子娷兵春秋龎暖兒良廣武君韓信則列之權謀計十三家所著之書共二百五十九篇夫所謂權謀者以正守國以竒用兵先計而後戰兼地勢包隂陽用技巧者也楚兵法蚩尤孫軫繇敘王孫尉繚魏公子景子李良丁子項王則列之形勢十一家所著之書共九十二篇圖十八卷所謂形勢者靁動焱舉後發而先至離合背鄉變化無常以輕疾制敵者也太乙兵法天一兵法神農兵法黃帝封胡風后力牧鵊冶子鬼容區地典孟子東父師曠萇宏别成子望軍氣辟兵威勝方則列之隂陽十六家所著之書二百四十九篇圖十卷所謂隂陽者順時而發推刑德隨斗擊因五勝假鬼神而為助者也鮑子兵法伍子胥公勝子苗子逄門射法隂通成射法李將軍射法魏氏射法強弩射法王圉射法望逺連弩射法護軍射師王賀射書蒲苴子弋法劒道手搏諸家兵法蹴鞠則列之於技巧十三家所著之書百九十九篇所謂技巧者習手足便器械精機關以立攻守之勝者也已上並藝文志唐李靖對太宗曰黃帝立丘井之法因以制兵故井分為四道八家處之其形井字開方九焉五為陳法四為間地所以起數於五虛其中大將居之環其四面諸部連繞此所謂終於八也及乎變化制敵則紛紛紜紜鬬亂而法不亂渾渾沌沌形員而勢不散此謂散而成八復而為一者也太宗曰深乎黃帝之制兵也周之始興太公實繕其法始於岐都以建井畝戎車三百兩虎賁三百人以立軍制六步七步六伐七伐以教陳法陳師牧野太公以百夫致師以成武功以四萬五千人勝紂七十萬衆太公既沒齊人得其遺法至桓公伯天下任管仲復修太公法謂之節制之師管仲之法三分齊國以為三軍春秋時鄭國禦王有中軍左軍右拒左拒是為魚麗之陳先偏後伍伍承彌縫司馬法車戰二十五乘為偏初鄭敗燕亦用潛軍李靖曰魚麗陳車步兼之謂之左右拒言拒禦耳非敢出竒勝也邲之戰隨武子曰楚軍行右轅左追蓐前茅慮無中權後徑又欒武子曰楚戎二廣廣有一戎卒卒偏之兩右廣初駕及日中左則受之以至於昏內官序當其夜楚許伯御樂伯攝叔為右以致晉師昭公元年晉中行穆子毁車以為行五乘為三伍為五陳以相離兩於前五於後專為右角參為左角偏為前拒以誘之襄公二十三年齊侯伐衛有先驅前軍也有申驅交前軍也有公車有二廣副軍也有啓左翼也有胠右翼也有大殿后軍也楚漢之際韓信以背水陳下趙尉繚子武王伐紂皆濟水而陳垓下之陳淮隂將三十萬自當之孔將軍左費將軍右皇帝在后絳侯又在皇帝后淮隂先合不利孔將軍乘之大敗垓下初項梁教羽以兵法羽不肯竟垓下之陳兵家致人之術而羽獨不悟此馬隆所以議魯公之不識也漢平天下張良韓信申軍法序次百八十二家定著三十五家諸吕用事而盜取之武帝時楊僕捃托遺逸紀奏兵録猶未能備至於孝成帝命任宏論次兵書為四種正義用兵唯衛霍功績最著顧方略如何不學古兵法之論豈其天機敏而有所自得乎及觀李靖太宗問曰以為霍去病暗與孫吳合耳漢氏貙劉法亦𨽻孫吳法六十四陳漢氏三分有諸葛亮者以區區之蜀爭衡二國之間八陳之法亦嘗考之矣四為正四為竒餘為握竒或總稱之先出遊軍定兩端天有行地有軸前後為風風輔於天雲輔於地衡有重列各四隊前後之衝各三隊風居四維故以圓軸單列各三隊前後之軸各三隊雲居四角故以方天居兩端地居中間總有八陳陳訖遊軍從後躡其敵或警左或警右聽音望麾以正四竒天地前衝為虎翼風為蛇蟠為主之義也虎居於中張翼而進蛇居兩端向敵而蟠以應之天地後軸為飛龍雲為鳥翔突擊之義也龍居於中張翼以進鳥掖兩端向敵而翔以應之虛實三軍皆逐天文氣候向背山川利害隨時而進以正合以竒勝今魚腹平沙上有土石存焉其八陳遺迹尚可想也隅落鈎連曲折相對出入變化莫知其蹤是殆黃帝太公管仲之遺制歟太宗嘗問李靖曰天地風雲龍虎鳥蛇斯八陳何義也靖曰傳之者誤也古人祕藏此法故詭設八名耳八陳本一也分為八焉若天地者本乎旗號風雲者本乎幡名龍虎鳥蛇者本乎隊伍之别後世誤傳詭設物象何止八而已乎二説未知誰當也李靖又云臣觀破陳樂舞前出四表後綴八幡左右折旋趍步金鼓各有其節此則八陳圖四頭八尾之制也其後馬隆以晉師討涼州用八陳法卒以取勝寥寥數百載間誰復知此獨唐李靖作六花陳本諸葛八陳法也左右各三軍又虞候兩軍中軍居中六軍在四畔象六出花外畫之方內環之貟太宗曰內員外方何謂也靖曰方生於正員生於竒方所以規其步員所以綴其旋是以步數定於地行綴應於天步定綴齊則變化不亂此武侯之法也又嘗教十三萬每陳三千以其一為營法五方員曲直鋭之形每隊五變凡二十五而止又嘗論諸家兵法唯五法為要左傳先偏後伍司馬法五人為伍尉繚子有束伍令漢制有尺籍五符後世符籍以紙為之失其制矣臣酌其法自五人而變為二十五自二十五人而變為七十五此則步卒七十二人甲士三人之制也舍車用騎則二十五人當八馬此則五兵五當之制也太宗又問五行陳如何靖曰本因五方色立此名方員曲直鋭矣因地形使然凡軍不素習安可臨敵乎兵詭道也故強立五行焉其後太宗命靖以兵法教侯君集君集言於上曰李靖將反上問其故曰靖獨教臣以其粗而匿其精以是知之上問靖曰此乃君集欲反今諸夏已定臣之所教足制四夷君集固求盡臣之術非反而何肅宗時郭子儀討史思明敗於渭渠思明類為長蛇陳以待官軍擊之首尾為兩翼而夾攻軍遂大潰陳霸先謂王僧辨曰善用兵者如常山之蛇首尾相應宋太祖乾德二年以王全斌伐蜀示之川陜地圖親授以方略太宗皇帝覽兵法隂符經謂左右曰此皆詭詐竒巧不足以訓蓋姦雄之志也古人所謂守文為難朕孜孜庶政靡敢怠惰家訓雍熙四年五月上製平戎萬全陳圖出示近臣因召邊將田重進潘美等升殿親授其進退攻擊之方仁宗嘉祐六年大理寺丞郭固編校御閲所裁兵書先是見官編校書籍而兵書與天文為祕書而不預大臣或言固知兵法即以命之然兵書殘缺者多不能編補也長編英宗治平四年詔六宅副使郭固為內藏庫副使使升一任固嘉祐六年四月奉詔編修兵書於祕閣至是書成故有是命同上神宗熙寧三年上曰今兵無紀律有紀律則足以勝敵矣安石曰紀律所以自治算數所以勝敵故兵法曰多算勝少算不勝况於無算乎今非但無紀律尤患無算數同上熙寧四年大理寺丞館閣校勘顧臨為太子中允荆湖南路轉運判官提舉常平等事臨喜談兵嘗召對問以兵學臨曰兵以仁義為本仁者愛人義者循理動靜之機安危所係也同上熙寧五年詔賜王昭御製攻守圖符軍環珠武經總要神武祕略風角集占四路戰守約束各一部仍令秦鳳路經略司抄録熙寧六年十二月乙亥上謂輔臣曰李靖團力之法以三人者為隊長已令李浩試之懿治二州疑亦可行王安石等曰三代至於漢魏皆以五人為伍至如三人若一人戰死押官執刀在後即斬二人恐不可同上上復論孫吳司馬及李靖團力之法王安石曰古論兵無如孫武者以其粗見道故也如日有短長月有死生五聲之變不可勝聽五色之變不可勝觀竒正之變不可勝窮蓋粗能見道故其言有及於此上曰能竒正乃用兵之要竒者天道也正者地道地道有常天道則變而無常至於能用竒正以竒為正以正為竒則妙而神矣安石曰誠如此天能天而不能地地能地而不能天能天能地利用出入則所謂神也神固能以竒為正以正為竒也上善李靖結隊法召賈逵問之逵以為非詔中書密院同議之安石曰今但結三人為隊又結五人為伍相摶執以觀其孰勝則其可用與否立見矣上乃令郭固與殿司各為一法試其可者七年二月上批已降旨令吕惠卿曽孝寬比校三人五人隊法可速具比校事實以聞後惠卿等奏至而上旨卒用五人相結為法長編三月知制誥王益柔言試將作監主簿麻皓年嘗注孫吳二書及唐李靖對問頗得古人意旨兼自撰臨機兵法甚精當欲望詳進所注書或可採録乞加試用從之李靖兵法世無全書略見於通典今對問出於此阮逸家或云逸因杜氏附益之也同上六月上論古人用兵竒正之術以謂旗參差而不齊石大小而不應此真敗也至如韓信之破趙背水為陳而棄大將旗鼓以誘敵彼成安君知兵者非示以真敗何能勝乎同上甲午上論結隊法因歎州兵之難以謂今之邊臣曉知竒正之體者已自無人非竒正之變乎且天地五行之數不過五故五陳之變出於固然非強為之耳韓絳曰臣昔嘗請置講説之官今諸路帥臣各具戰陳之法來上取其所長立以為法上可之乃詔五路安撫使各具可用陳隊法及訪采知陳隊法者陳所見以聞同上命太子中允館閣校勘崇政殿吕升卿兼同修撰經義丙午上與輔臣論戰陳之法因曰兵隂事也主殺尚右而陽多者勝如髙者可以勝下長者可以勝短是也內出攻守圖二十五部賜河北又出敵樓樣送軍器監頒降修製同上上以新定結隊法并賞罰格及置陳形勢等遣近侍李憲付鄜延帥趙卨俾講求推及諸路詔卨曰陳法之詳已令憲面諭今所圖止是一小陳卿其從容折問憲必一一有説然置陳法度久失其傳今朕一旦據意所得率爾為法恐有未盡宜無避忌但具奏來繼又詔卨曰近令李憲齎新定結隊法并賞罰格併卿同詳議施行可否及因以同立將官更置陳法想卿必已深悉朝廷經畫之意如日近可以了當宜令李憲齎赴闕下於是卨奏臣伏詳置陳之法以結隊為先按李靖法五十人為一隊每三人自相得意者結為一小隊合三小隊為一中隊合五中隊為一大隊餘押官隊頭副隊頭左右傔旗五人即充五十並相依附凡諸隊頭與賊相殺左右傔旗急進相救若左右傔旗被賊纒繞以次行人進前相救其進救人又被賊纒繞以次後行人急須進救其前行人被賊後行人不救者押官隊頭即斬之今聖制每一大隊合五中隊五十人為之中隊合三小隊九人為之小隊合三人為之亦擇心意相得者又選壯勇善槍者一人為旗頭令自擇如已藝心相得者二人為左右傔次選勇幹者一人為引戰軍校一人執刀在後為擁隊凡隊內一人用命二人應援小隊用命中隊應援中隊用命大隊應援大隊用命小隊應援如逗遛觀望不即赴救致有陷失者本隊仰擁隊軍校次隊委本轄隊將審觀不救所由斬之其有不可救或赴救不及或自受敵體受重槍但非可救者皆不坐其義雖與古同而用法尤為精密此蓋陛下天錫勇智不待學而能也然而議者謂四十五人而一長不若五人而一長之密且以五人而一長即五十人而十長也推之於百千萬則為長者多而統制不一也至如周制五人為伍屬之比長五伍為兩屬之閭胥四兩為卒屬之族師五卒為旅屬之黨正五旅為師屬之州長五師為率屬之命卿此猶今之軍制百人為都五都為營五營為軍十軍為廂四廂都指揮而下各有節級有員品亦昔之比長閭胥族師黨正之任也議者謂什伍之制於都法為便然都法恐非臨陳對敵決勝之術也况八陳之法久失其傳聖制焕然一新稽之前聞若合符節蓋法制一定易以致人敵好擊虛吾以虛形之敵好背實吾以實形之然而所擊者非其虛所背者非其實故逸能勞之飽能飢之安能動之此所謂致人而不致於人也長編熙寧八年二月上批見校試七軍營陳以分銀不齊前後抵牾難為施用可令見校試官擇其可取者草定八軍法以聞特詔樞密院唐李靖兵法世無完書雖見通典離析訛舛又官號物名與今稱謂不同武夫將佐多不能通其意可令樞密院兵房檢詳官與檢正中書刑房王震提舉修撰經義所檢討曽旻中書吏房習學公事王白管勾國子監丞郭逄原校政分類解釋令可行後又差樞密副都丞旨張一誠入押班李憲震逄原行視寬廣處關殿前司差馬軍二千八百人教李靖營陳法以步軍副都指揮使楊遂為都大提舉誠一憲為同提舉震逄原參議公事夏元象臧景等為將副部隊將勾當公事凡三十萬人誠一等初用李靖六花陳法約授兵二萬人為率為七軍內虞候軍各二千八百人取戰兵千九百人為七十六隊戰兵內每軍弩手三百弓手三百馬軍五百跳蕩四百竒兵四百輜重每軍九百人是為二千八百人長編上諭李憲等曰黃帝始置八陳法敗蚩尤於涿鹿諸葛亮造八陳圖於魚腹平沙之上壘石為八行晉桓溫見之曰常山蛇勢文武皆莫能識之此即九軍陳法也後至隋韓擒虎深明其法以授其甥李靖靖以時遭久亂將臣通曉其法者頗多故造六花陳以變九軍之法使世人不能曉之大抵八陳即九軍九軍者方陳也六花陳即七軍七軍者員陳也蓋陳以員為體方陳者內員而外方員陳即內外俱員矣故以員物驗之則方以八包一員以六包一此九軍六花之陳大體也六軍者左右虞候各一軍為二虞軍左右廂各二軍為四廂軍與中軍共為七軍八陳者加前後二軍共為九軍宋祖宗以來置殿前馬步三帥即中軍前後軍帥之别名而馬步軍都虞候是為二虞候軍天武捧日龍神衛四廂是為四廂軍也中軍帥總制九軍即殿前都虞候專總中書一軍之事務是其名實與古九軍及六花陳相符而不少差也今論兵者俱以唐李筌太白隂經中所載陳圖為法失之逺矣朕嘗覽近日臣僚所獻陳圖皆妄相惑無一可取果如此輩之説則兩敵相遇必須遣使預約戰日擇一寬平之地仍夷阜塞壑誅伐木如射圃教場方可盡其法耳以理推之知其不可用也決矣今可約李靖法為九軍營陳之制然李筌之圖乃營法非陳法也朕采古之法酌今之宜曰營曰陳本於一法而已止則曰營行則曰陳在竒正言之則營為正陳為竒也長編元豐元年大名府元城縣主簿吳璋上所注司馬穰苴兵法二卷詔送學同上二年九月癸巳范育上諸路清野備敵法詔頒行之同上豫嘗謂世之所謂兵法者見其所載司馬法有三代之遺制焉本之以仁治之以義明禮明信而師旅興焉太史公所謂宏達深逺穰苴為小國行師可以及司馬之揖遜乎三代之師吾固因是而略知其意矣春秋已來民未知義民未知信與夫剛而無禮雖伯者之佐猶有習聞三代之遺音者惜乎耳目動於功利正不勝竒三復潛軍卒以取勝而古兵法益逺矣孫吳號最善用兵者大抵料敵制勝莫長焉審世用間莫先焉今其書具存可覆也若夫太公六韜意者非太公書也其隂謀祕計蓋將與孫吳相上下事帝之小心文武一轍而皆謂有傾商之素謀哉或茍以其書為是則文武之志荒矣若夫李靖之對太宗其所以論歷代兵法至詳密焉蓋自三代而上竒不勝正三代而下正不勝竒雖以諸葛八陳之制正大之意尤愧古人而卒不得尺寸之利終於三分蓋世變之下人偽之滋非竒不能制勝魏延直搗關中之䇿豈所謂竒者乎惜乎亮之不察也孟子曰我善為戰我善為陳大罪也豈有敵於戰國計謀之士乎為將愈精則殺人愈多為法益工而害物益甚然則孫吳者其亦三代司馬之罪人乎統軍官宋內有三衙殿司馬司步司四廂之制外有總管鈐轄都監將官之制中興以來沿江置都統之官此內外掌兵之任也三衙詳見官制門宋沿五代之制有侍衛親軍及殿前兩司蓋侍衛親軍起於後唐殿前始於周世宗顯德元年宋初侍衛親軍置都指揮使雖都虞候亦在殿前都指揮使上自王超罷職無復任者而侍衛司馬軍步軍遂分為二并殿前號三衙而馬步二軍始居殿前司之下焉三司天下之兵柄皆在其權雖重軍政號令則在樞密院與漢周間史洪肇之徒為之異矣此祖宗之微意非前此之所及也殿前司都指揮使副指揮使虞候掌殿前諸班直及步騎諸指揮之名籍統制訓練畨衛戍守遷補賞罰皆總其政令入則侍衛殿陛出則扈從乘輿大禮則提點編排整肅禁衛鹵簿儀仗掌宿衛之事都指揮以節度為之副都指揮使都虞候以刺史以上充資序淺則主管本司公事馬步軍亦如之備則通治闕則互攝祖宗以來三帥不曽闕兩人殿帥以難於從下超補政和中詔殿前都指揮使在節度之上殿前副都指揮使在正任承宣之上殿前都虞候在正任防禦之上宋初沿後則有殿前都點檢在都指揮使上太祖由此承禪後不置焉中興以來主管殿司一員馬軍司都指揮使副都指揮使都虞候都指揮使本方鎮軍校之名自梁起宣武軍乃以其鎮兵因仍舊號置在京馬步都指揮使掌馬軍諸都指揮之名籍凡統制訓練畨衛戍守遷補賞罰皆總於政令餘所掌悉如殿前司政和中詔以馬軍都指揮使馬軍副都指揮使在正任觀察使之上馬軍虞候在正任防禦使之上中興以來主管侍衛馬軍司一員常出戍建康步軍司都指揮使副指揮使都虞候之職掌諸指揮之名籍凡統制訓練畨衛戍守遷補賞罰皆總其政令餘所掌如殿前司政和中詔以步軍都指揮使副都指揮使在正任觀察使之上都虞候在正任防禦使之上中興以來主管侍衛步軍一員四廂捧日舊曰日騎雍熙中改捧日天武舊曰控鶴興國中改曰天武四廂都指揮使龍神衛龍衛舊曰龍捷興國中改曰龍衛神衛舊曰虎捷興國中改曰神衛衛四廂都指揮使皆以美名易禁軍之舊號也殿前司捧日天武馬軍司龍衛步軍司神衛謂之上四軍各有左右廂廂各有三軍捧日四廂都指揮使管舊城裏左廂煙火及殿前司馬軍天武四廂都指揮使管舊城裏右廂煙火及殿前司馬軍龍衛四廂都指揮使管新城裏左廂煙火及馬軍司馬軍神衛四廂都指揮使管新城裏右廂煙火及步軍司馬軍三省總括紹興石本此內之統握王旅者然也都總管副總管魏黃初始置都督諸州軍事後周改都督諸軍事為總管武帝時以王謙為益州總管總管之名始此隋文帝以并孟荆揚四州置大總管其餘總管府置於諸州列為上中下三等加使持節煬帝改師都督為旅帥唐諸州復有總管亦加使持節武德初邊要之地亦置宋朝馬步軍都總管以節度使充副總管以觀察以下充有止一州者有數州為一路者有帶兩路三路者或文臣知州則管勾軍馬事舊相重臣亦為都總管有禁兵駐泊之地者冠以駐泊之名咸平廢三路都總管景德詔鎮定兩路併為一路並去行營之名其為駐泊總管慶厯初詔近分陜西緣邊為四路各置經略安撫招討等使自今路總管缺鈐轄以上許與都總管司同議軍事路分都監以下並聽都總管等節制違者以軍法論慶厯七年析河北四路各置都總管一員如無事止以安撫使總管諸路慶厯八年諸州部置並改總管兵馬總管副總管建炎初李綱言守備當於沿河沿淮沿江置帥府要郡以控扼其帥府文臣一員帶安撫使馬步軍都總管武臣一員充副總管改路分為副總管遇朝廷起兵則副總管為帥副鈐轄為都監各以其兵從出聽其節制正官願行者聽紹興初要郡守臣罷帶兵職諸路副總管可依舊改充路分鈐轄紹興五年密院言東南多事合要近上兵官總領軍政乃詔浙江荆福建廣東可依三路置總管於帥府紹興七年淮東置總管十二年諸路並置州總管一員都鈐轄副鈐轄宋以朝官及諸司使以上充或一州或一路或兩路或三路亦無都字者嘉祐詔內臣為鈐轄都監者逐路止置一員建炎中要郡守臣兼兵鈐轄以武臣為副改諸路都監為副鈐轄紹興中守臣罷兼兵職副鈐轄改為路分都監而帥府如故二十八年鎮江守楊揆言舊法一路則有路分鈐轄一州則有州鈐轄如常秀平江皆有之獨鎮江缺欲遂置州鈐轄從之兵馬都監宋朝兵馬都監有路分掌諸路禁旅屯戍邊防訓練之政令以肅清所部建炎中以要郡守臣帶本路兵馬都監武臣帶本路兵馬都監武臣一員充副都監紹興中罷守臣兼兵職而副都監如故諸路將官宋神宗留意武備本以捍西北二虜而推其法於東南故西北為多東南少陜西諸路四十二將河北諸路三十七將而東南才十三將合諸路九十二將各有正副軍中行陳圖隊調發賞罰皆關決於將副元祐初司馬光請盡罷諸路將官其禁軍各委本州縣長吏與總管鈐轄都監監押等轄一如未置將官以前之法而樞密院難之止詔諸路將副在州駐劄不係路分兵官知州并州鈐轄兼充者並差將官一員兼本州都監其軍將駐劄處不復差兼乾道中詔諸州置凖備將一員專一管轄日逐訓練㨂中弓弩此則外之統擇諸將州郡之兵然也都統唐天寶末置天下兵馬元帥都統朔方河東北平盧龍節度使都統之名始於此乾元初李峘除都統淮南江東西節度使宣慰觀察處置等使都統之號始於此唐制或總五道或總三道大中後討徐州以康承訓討黃巢以荆玉鐸皆為都統黃巢之難置諸道行營都統掌征伐兵罷則省雖總諸道兵馬不賜旌節宋朝中興置統制一時興兵稱謂不一諸路起兵有自稱統制者州縣管押勤王兵者亦有稱統制者諸道都總管及諸司使宜差充統制者建炎初劉光世上言於是皆罷惟中都主兵官朝廷差充統制者仍舊紹興中韓世忠張俊嶽飛除樞密使副罷宣撫司其統領將副並改充御前𨽻樞密院各帶御前字入銜其兵馬就令部統制官節制副都統唐興元中置副都統紹興中亦有副都統隆興初詔應諸軍副都統制並罷乾道中陳天麟奏荆南都統王宣久病恐誤邊計蔣芾奏差員琦為副都統制就同管軍閏七月上謂宰執曰朕欲江上諸軍各置副都統制一員令兼領軍事豈惟緒他日統制亦使主將有所顧忌於是以郭剛為之樞密院制云復置在外副都統制禆贊主帥商議軍事覺察姦弊所有本司文字與都統連銜調發軍馬并聽都統指揮此沿江諸鎮總軍旅者也羣書考索後集卷四十七
