body:
  text: 羣書考索續集卷三十四宋章如愚編官制門翰苑翰苑總論四朝志曰自國初至官制行百司事失其實多所釐正獨學士院承唐舊典遵而不改愚謂代言之職自漢以來皆有之官名雖不必更而其實有所當更者不知其幾千百年於此矣漢武帝作文章必使相如輩視草故漢之詔令多有古風魏晉以來文氣不振迄於有唐掌詔誥者猶駢儷然韓栁雖率天下而以古文至於王言則猶古也陸宣公為內相奏天之詔奏議之文猶有王楊餘習其他不足論矣宋朝元豐改制獨不更翰學之名是矣至於內外制猶作四六豈非當更而不更者歟豈非典謨訓誥之體終不可復歟夫王言布於天下猶父之詔子也不存誥詔唯諾之意而工雕鐫篆刻之文果何謂哉宋初官制質勝文故不務名元豐改制文勝質故多失實修國史者反曰國初事多失實元豐多所釐正是亦徒徇其名而已商周秦漢代言之官虞夏之際代祀綿逺其代工掌制之名氏莫得而知至於成湯太甲則有仲虺伊尹為之訓誥髙宗得傅說則有說命之篇周公召公相成王則有洛誥酒誥周官顧命秦始皇帝并一區宇丞相李斯實掌其言漢興當秦焚書之後侍從之臣皆不習文史蕭曹之輩又乏儒墨之用每封功臣建子弟其辭多天子為之縱委於執翰者亦非彰灼知名之士武帝使司馬相如視草率皆文章之流以相如非將相器也文粹鄭亞作李德裕㑹昌一品制集序兩漢代言之官漢家制誥最為後世稱述而求其典職之官非有視草類皆司馬相如枚臯嚴助之徒為之也班固西京賦以為金馬承明著作蓋直廬於承明者皆制誥詔令之言而待詔金馬者皆一時賦詩歌頌之詞而已嚴助厭承明之廬而補外郡詔令侍中復使為之東方朔王褒張子僑皆以待詔金馬而為歌頌至於奏諡策誄則又屬之大鴻臚蓋未始有定員也東漢始制尚書侍郎專立文書起草孝亷之士試以箋奏而補之其員三十六人入直供奉之禮恩寵優渥與今翰苑無異王通獨於漢帝制屢加歎美蓋以其詞不束於程度而有渾厚典雅之風真得王言之體哉吕東萊漢中大夫侍中黃門侍郎尚書令六曹侍郎唐舍人學士皆文章之選嘗以漢制參之漢固有金馬玉堂承明號著作矣然中大夫侍從在承明石渠天子乃使與大臣辨論中外相應以義理之文侍中則輒使為文待詔黃門則在玉堂之廬黃門侍郎日暮入侍青瑣門又尚書令典刑作文書六曹侍郎作文書起草皆文臣之美選按中大夫則屬郎中令侍中黃門尚書令則乃屬奉車駙馬都尉又尚書六曹侍郎復屬少府夫議論制作文臣皆天子近侍最為榮貴乃隸典兵衛之屬而與宦者武夫同曹共列豈所謂尊寵者耶唐制學士直宿於內殿漢郎中令有大夫侍郎等亦更直宿於內出陳彥羣兩漢博議唐翰林學士之職本以文學言語備顧問出入侍從因得參謀議納諫諍其禮猶寵而翰林院者待詔之所也唐制乘輿所在必有文詞經學之士而文書詔令則中書舍人掌之自太宗時名儒學士時時任以草制然猶未有名號北門學士𤣥宗初置翰林待詔以張說陸堅張九齡等為之掌四方表疏批答應和文章既而又以中書務劇文書多壅滯乃選文學之士號翰林供奉與集賢院學士分掌制誥書敕開元二十六年又改翰林供奉為學士别置學士院專掌內命凡拜免將相號令征伐皆用白麻其後選用益重而禮遇益親至號為內相又以為天子私人自諸曹尚書校書郎皆得與選入院一歲則遷知制誥未知制誥者不作文書班次各以其內宴則居丞相之下一品之上憲宗時又置學士承㫖唐之學士𢎞文集賢分隸中書省而翰林學士獨無所屬唐百官志內外制之名自今翰苑學士為內制中書令知制誥為外制總謂之兩制而鸞坡崇於鳳掖青瑣盛於紫垣錢公惟演述金坡遺事起建隆庚申訖天聖丙寅至六十七載得四十七人序其首曰人間之官無貴於學士雖貴極三旌有所不逮嘗讀蘇易簡翰林雜記見其職務之清晏曹局之嚴密寵遇之殊絶恩數之優渥蓋自太祖敞金馬之禁廬太宗灑玉堂之宸翰列聖相繼重於此唐天策府學士北門學士天䇿府學士與北門學士後世榮之謂李唐文章之選無以復加以某觀之是二者出於非正之舉耳何則太宗為秦王之時而置十八學士使之更日直宿以議論政事者將以為奪嫡之舉也武后當髙宗之朝而置北門學士使之參决表疏以分丞相之權者將以為篡國之舉也然則預此選於一時者豈可盡以為榮哉林少穎通鑑唐史論唐不當有私人之目內相之稱翰林初置人才與雜流並處其後雜流不入職親而地近專以處忠賢文章之士然有天子私人之目內相之稱則非王政設官之體矣王者無私豈云私人相無不統豈云內相是與內臣自設形迹為異同也自太宗髙宗時尚未有此彼武氏者內寵無厭又聚華藻輕薄之人於北門而中宗至以宫婢主文柄上官氏是何足法者不必逺奮兩漢上法三王直取則於貞觀則所損益可知矣胡氏管見唐翰苑之官翰林之設其任重矣雍容金鑾優游鳳閣密勿議論取重當時豈特取其詞藝而已哉太宗之時名儒學士召以草制名號未立乾封以後則有北門學士之稱載之信史蓋已班班可考矣𤣥宗之興首重是選始置翰林待詔掌四方表疏批答應制文章又以為未也則有翰林供奉之名自是又易供奉以為學士專掌內命亦何榮哉其後選用益親而以內相目之然則翰林之職自𤣥宗始為之而古無有也雖足以詫一時之盛奈何𤣥宗任用不篤沉溺宴安終使禍亂並興不可救藥雖設是職更何補於治道哉厥後憲宗又置學士承㫖德宗擢陸贄為翰林學士穆宗即位亦以李德裕而為之凡號令典册皆更其手亦由明皇始重此職故後裔得舊貫以仍之也東萊唐博議唐置翰林反與釋老伎術之徒雜處中書門下出納王命之司也故詔敕行焉明皇始置翰林而其職始分既發號令預謀議則自宰相以下進退輕重係之矣豈特取其詞藝而已哉釋老之徒方外之士書畫琴棊數術執技以事上下不與士齒者也而使與文章之士雜處非所以育材養賢也范祖禹唐與宋學士舍人之職有所區别舍人學士之選自唐以來最為儒者之盛事唐人謂之西掖北門之榮於今舍人為文章之盛選學士為天子之私人嘗竊疑之今人與給事中預聞兩省事押僉書黃封還詞頭皆以駁正為職然舍人獨草敕何也夫草敕既有舍人而降詔付中書施行又頒學士則是詔命可得而私也其可乎熙寧初學士王禹稱不肯草制以為失職乃命知制誥蘇子章敕代絲綸皆王命也而區别如此必有謂焉陳彥羣兩漢博議漢唐宋代言之官成周建官之法內史掌王八枋之法以詔王治凡命諸侯及公卿大夫則策命之外史掌書外令御史掌贊書王有命當以書致之則贊為辭若今尚書大抵理㑹黜陟等事未嘗理㑹文章至漢時凡有制詔則以掌書掌之武帝與淮南王爭能每與報書及賜常召司馬相如等視草乃遣自後從事文章改尚書令為中書謁者東漢有蘭臺述作之事唐人置一項人為待詔翰林院百工伎藝皆居焉其後天子尊重文章而有翰林學士之設親近人主權亞丞相惟册皇后太子翰林學士則作制誥宋翰林學士知內知制誥知外同上唐宋翰苑之官唐翰林院在禁中乃人主燕居之所玉堂承明金鑾殿皆在其間應供奉之人自學士以下工伎羣官司隸籍其間者皆稱翰林如今之翰林醫官翰林待詔之類是也唐制自宰相而下初命皆無宣詔之禮惟學士宣召蓋學士院在禁中非內臣宣召無因得入故院門别設復門亦以其通禁庭也沈存中筆談宋朝翰林玉堂森嚴金鑾密邇此非清華之選乎郭贊之乏時望可以掌制誥而不可以入翰林夫均之為兩制也而內制重於外制以此知其選也嘗即宋朝記録考之自建隆至熙寧在翰苑者一百八人而入端揆者二十一自建炎至淳熙在翰苑者七十六而入端揆者凡八祖宗之法兩府闕人取之兩制其選何如哉然祖宗選人不專文藝和矇眸子之眊無與於文也而不之用王著使酒難近無與於文也而不之用用畢士安而不用張洎洎非文不足也行不足也用竇儀而不用杜韡韡非文不足也而行不足也蓋學士之職備顧問司典誥清切貴重非他官比故纍朝遇之頗異焉寵以四字之佳名榮以七事之殊禮錫以七言之聖製或賜鵰錦袍或賜金蓮炬或索冠帶而後見或以御朝服為餽當時之膺是選者非文行兼著之趙安仁則文學兼有之司馬光非詞筆俱優長之彭大年則文章典雅之張方平文人才士彬彬疊出何其盛也又有盛於此者册后之舉富貴可立俟也楊億不奉詔丁謂之留權要所當奉也而劉筠不奉詔嗟夫外制之封還國朝之盛事而今也內制亦然君子因是為之三詠三歎宋太宗嘗幸玉堂學士院玉堂太宗皇帝曾親幸至今惟學士上日許正坐他日皆不敢獨坐故事堂中設視草臺每草制則具衣冠據而坐今不復如此但存空臺而已玉堂東承㫖閣子窗槅上有火燃處宋太宗嘗幸玉堂蘇易簡為學士已寢遽起無燭具衣冠宫嬪自窗槅引燭入照之今不欲更易以為玉堂一盛事沈存中筆談給舍漢王嘉封還董賢除官詔書漢世董賢之益封其不可明矣而王嘉封還詔書適忤其君之盛怒卒不得其死然班孟堅曰依世則廢道違俗則危殆嗟夫道固不可廢而危殆夫何恤嘉以區區一簣障江河固無補於事之萬一而後世以嘉為法名器得以不濫非嘉之力歟東萊漢魏置給事中中書舍人與唐異漢置給事中特居中以備顧問而唐使之掌封還之任魏置中書舍人特掌呈奏案章而唐使之制敕既行有誤得以改正陳傅良同前給事中在漢為加官至唐屬之門下省使之駁正奏抄塗竄詔敕之不便蓋掌其事者凡四人中書舍人在魏掌呈奏案章至唐屬之中書省使之參議表章起草進畫蓋庇其職者凡六人陳祕書試館職策唐人封駁之職唐自袁髙爭盧杞凡十八年門下無議可否者許孟容一日論駁而四方想聞其風采則封還繳駁之任不可無其人陳中書傅良唐自來俊臣之事給事中僅出己意以正救其失而旋即貶逐其後舍人草制第為美詞則職雖存而不復行其職矣任寺簿鄭注之相李甘顯倡欲壞其麻而史臣以排寵救危盛稱其賢同上李藩之塗敕而吏至駭愕以求改則唐人立法使之塗竄詔敕特虛文矣同上給事中非專判機務翰林非專備顧問中書舍人非專掌外制給事中之為職豈獨判機務掌文書也必曰詔令有不便許其糾駁古之人有為之者批御制敕而不以為疑幸而瑣闥有斯人也能容之乎翰林內相之為職豈獨備顧問起草起畫也詔令有不善聽其改作古之人有為之者深辭罪已以感動四方幸而北扉有斯人也能用之乎中書舍人之為職豈獨頒宣外制潤色王言也詞令有不合聽其繳納古之人有為之者詔㫖數下而迄不肯出一辭幸而西掖有斯人也能進之乎李賢良垕文集宋給舍孫公升有言法度命令差失過當給舍獻替於未下而諫官御史止能追救於已行梁公燾之詰張問亦曰朝廷命令失當初則舍人繳納中則給事封駁至成命已行諫官御史乃論之嗚呼至哉斯言夫給舍主封駁臺諫主論列二者其職均也而有先後焉蓋命之未下其正之也易命之已下其奪之也難此給舍之職所以為尤重也宋朝淳化中命魏庠樂成務知給事制敕有未便者許之封駁未幾以其職𨽻之通進銀臺二司故詔按張永德張泳封還之敕出唐介何剡封還之然此皆給事之職也給事之封駁在唐世已然矣而未聞有中舍之封駁者雖曰袁髙不草盧杞制然髙亦給事也白居易封還四刺史詞頭居易固中舍也然史所不録也雖有之亦間見也蓋自康定間遂國夫人之命富公弼當制封還詞頭舍人之封還昉乎此矣至其後也胡宿援弼之事而駁楊懷敏歐陽修援制之例而駁張可之蓋自是而後其職與給事均矣竊嘗考之葉祖洽以舍人主讀為廢職事曾肇以舍人主讀為隳官制夫封駁審讀均之為給事職也舍人封駁不曰侵官舍人審讀則曰越職何也有心於規正無心於將順此古人之深意也故吕誨黜命直送其家韓維有言安燾除命直下吏部劉摯有言吕公著之除侍郎當也告命不經書讀史之誤也而范純仁亦言之范純仁之除兩府當也告命不經書讀史為燾故也而蘇轍亦言之先正之意可知矣范祖禹之堅於執奏韓忠彥之不肯稟議熙寧三舍人之所守如一吁何其盛哉粵自崇寧奸臣自作威福恐人之議己以御筆付有司且重之以大不恭之罰自是結舌者過半矣聖明中興率循舊章批降御筆必經給舍下無隱情上無舛令隆興之責以繳駁乾道之許以批敕其謹重詔令開廣言路雖自聖意亦家法也羣書考索續集卷三十四
