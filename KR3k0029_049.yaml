body:
  text: 羣書考索卷四十九宋章如愚撰樂門樂名類漢靈臺十二門詩靈臺十二門詩宣天地之氣也漢孝章皇帝祗肅上下朝夕不怠若稽前代之制守其所已成增其所未備深惟靈臺之作實用以推測洪化歌詩未作月律猶闕將何以贊元氣之運而導迎其和暖以元和二年夏四月摛宸藻定樂章下大豫樂官各隨其月吹竹律而奏之臣承嘉祀是蓋東都之巨典也謹序其首曰十二氣之運推遷回復不見其迹必調之以律然後可得而宣也十二律之次清濁髙下各隨其方必歌之以詩然後可得而諧也傳曰律以統氣類物呂以旅陽宣氣是氣固待律而宣書曰詩言志歌永言聲依永律和聲是律固待詩而諧天地造化之妙成于帝王輔贊之功歌詩之作亦帝王所以輔贊天地者歟惟漢受命于天益昭事而奉順之立政布教行賞用刑罔不惟天時之若故觀象視祲命官作樂罔不惟天時之謹命趙堯之徒分舉四時則高皇帝之為也作郊祀之詩而間歌四時則武皇帝之為也經始靈臺鬱其特起則制創於光武命駕時登考正儀度則禮盛於顯宗一代制度聖斯作眀斯述可以為詳矣未可以為盡也當此之時竹律之作獨太蔟之音為諧餘律雖設而聲未正也逮至章帝躬秉聖德稽經考文折𠂻羣言而制定其當既作食舉四時列在備樂於是太常丞鮑鄴言聖人之樂必順陰陽願敕攸司增備月律上應月氣帝從中下其議三公九卿旅進在列咸以謂宜如鄴等言帝尢謙抑未遑也號登元和宇內泰寧休祥紹至聲音之道固宜與詩俱高乃發睿思窺見二儀之祕而寫之聲音十二門之詩名殊章列匪豐匪簡音官相與隸習率以令月吉辰祗薦祠事闢斗建之門考叶時律以聲其詩位以方辨氣以聲達中和之化宣暢流衍無有愆伏時令既正措之事業者動有據依恩流而陽熙威振而陰肅萬物該成各由其道天地之功至是而全矣帝王之制至是而備矣莫詩序魏武帝平荆州獲杜夔善八音常為漢雅樂郎尢悉樂事於是使創定雅樂時又有散騎郎鄧靜善調雅樂歌師尹商能歌宗廟郊祀之曲舞師馮肅能曉知先代諸舞夔悉領之遠考經藉近采故事考會古樂始設軒懸鐘磬復先代古樂自夔始也而柴玉左延年之徒妙善鄭聲被寵唯夔好古存正文帝受禪後改漢巴渝舞曰昭武舞改安世樂曰正世樂嘉至樂曰迎靈樂武德樂曰武頌樂昭容樂曰昭業樂雲翹舞曰鳯翔舞育命舞曰靈應舞武德舞曰舜頌舞文始舞曰大韶舞五行舞曰大武舞其衆歌詩多則前代之舊使王粲改作登歌安世及巴渝詩而已眀帝太和初詔曰凡音樂以舞為主自黃帝雲門以下至于周大武皆太廟舞名也然則其所司之官皆曰太樂所以總領諸物不可以一物為名樂官自如故為太樂太樂漢舊名後漢依讖改為大豫樂官至是改復舊於是公卿奏今請太祖武皇帝樂宜曰武始之舞武神武也武又迹也言神武之始又王迹所起也高祖文皇帝宜曰咸熙之舞咸皆也熙興也言應受命之運天下由之皆興也夫歌以詠德舞以象事於文文武為斌臣等謹製樂舞名章斌之舞今有事於天地宗廟則此三舞宜並以薦享及臨朝大享並宜舞之臣等思惟二舞宜有總名可名大鈞之樂鈞平也言大魏三代同功以至崇平也又奏祀圓丘以下武始舞者平冕黑介幘玄衣裳白領袖中衣絳合幅袴􅙋黑韋鞮咸熙舞者冠委白其餘服如前章斌舞者與武始咸熙同服奏於朝廷則武始舞者冠赤介幘生絳袍單衣絳領袖中衣絳合幅袴白布􅙋黑韋鞮咸熙舞者進賢冠黑介幘生黃袍單衣白合幅袴此三舞皆執羽籥其餘服如前侍中繆襲又奏安世歌本漢時歌名今詩非往歌之文則宜變改安世樂猶同房中之樂也往昔議者以房中歌后妃之德以風天下正夫婦焉宜改安世之名而為正始之樂襲又省安世歌詩有后妃之義方今享先祖恐失禮意可改安世歌曰享神歌奏可文帝已改安世為正始而襲至是又改為享神王肅議高皇至高祖文昭廟皆宜兼用先代及武始大鈞之舞按漢時有短簫鐃歌之樂其曲有朱鷺思悲翁艾如張上之回雍離戰城南巫山高上陵將進酒君馬黃芳樹有所思雉子班聖人出上雅臨高臺遠如期石留務成立雲黃雀釣竿等曲列於鼓吹多序戰陳之事及魏受命改其十二曲使繆襲為詞述以功德言代漢之意晉傅玄改製樂章晉武帝初郊廟明堂禮樂權用魏儀蓋遵周室肇稱殷禮之義但改樂章而使傳玄為之詞又令荀朂張華夏侯湛成公綏等各造郊廟諸樂歌詞九年荀朂以杜夔所制律呂校太樂總章鼓吹八音與律呂乖錯依古尺作新律呂荀朂遂典知樂事使郭夏宋識等造正德大悅二舞其樂章亦張華所作自武帝受禪命傳玄改漢鼓吹鐃歌還為二十二曲述以功德改朱鷺為虛之祥改思悲翁為宣受命改艾如張為征遼東改雍離為時運多難言宣帝討吳方有征無戰改戰城南為景龍飛之類晉曹毗王詢增造新詩元帝南渡以來初立宗廟尚書下太常祭祀所用樂名太常賀循答以魏氏增損漢樂遭離喪亂舊典不存自漢以來依於周制自造新詩而已于時以無雅樂器音韻曲折又無識者是後頗得登歌食舉之樂猶有未偹明帝大寧末又詔阮孚等損益之成帝咸和中乃復置太樂官鳩集遺逸而未有金石也及庾亮為荆州與謝尚共為朝廷修復雅樂亮尋薨庾翼桓溫等事軍旅樂器在庫遂至朽壞焉孝武太元中破苻堅獲其樂工楊勉等間習舊樂於是四廂金石始備焉乃使曹毗王珣等增造宗廟歌詩然郊祀遂不設樂通典宋鄭鮮之王韶之撰立新歌高祖永興元年七月有司奏皇朝肇建廟祀應設雅樂大常鄭鮮之等各撰立新歌黃門侍郎王韶之撰歌辭七首並令施用一云韶之造四夏四章行禮一章登歌二章食舉十章前後舞歌各一章十二月又奏依舊正朝設樂改太樂諸歌辭詩王韶之又撰二十二章又正德舞曰前舞大悅舞曰後舞宋文帝元嘉二十二年顏延之造郊天夕牲迎神送神饗神歌詩三百篇饗地神辭一篇孝武孝建元年荀萬秋議郊廟宜設樂又使謝莊造郊廟舞樂眀堂諸樂歌辭南齊禇淵謝超宗造廟樂歌詩太祖初為齊王令司空褚淵造太廟登歌二章建元元年詔謝超宗造廟樂歌詩十六章多刪顏延之謝莊辭以為新曲四年藉田詔江淹造藉田歌梁沈約撰雅樂詩梁武帝思洪古樂天監元年下詔求學術通明者皆陳所見於是沈約奏曰竊以秦代滅學樂經殘亡至于漢武帝時河間獻王與毛生等共採周官及諸子言樂事者以作樂記傳王禹劉向校書得樂記二十三篇與禹不同向别録有樂歌詩四篇趙氏雅琴百六篇惟此而已晉中經簿無復樂書别録所載已復亡逸案漢初典章滅絶諸儒捃托溝渠牆壁之間得竹簡遺文與禮事相關者即編次以為禮記非皆聖人之言月令取呂氏春秋中庸表記緇衣皆取子思鄭云緇衣取公孫尼子樂記取公孫尼子檀弓殘雜又非方輻典誥之書也陛下宜選諸生分令尋討經史百家凡樂事無大小皆别纂録乃委一舊學撰為樂書以起千載絶文以定大梁之樂是時對樂者七十八家咸多引流略浩蕩其詞皆言樂之宜改不言改樂之法帝素善鐘律詳悉舊事遂自制定禮樂乃定郊禋宗廟及三朝之雅樂以武舞為大壯舞取易大者壯也以文武為大觀舞取易大觀在上國樂以雅為稱取詩序云雅者正也止乎十二則天數也乃去皆步之樂增徹食之雅焉皇帝出入奏皇雅取詩皇矣上帝臨下有赫也皇太子出入奏胤雅取詩萬年永錫爾胤王公出入奏寅雅取尚書周官二公洪化寅亮天地也上壽酒奏介雅取詩君子萬年介爾景福也食舉奏需雅撤饌奏雍雅取禮記大饗客出以雍徹也並三朝用之牲出入為牷雅取左氏傳牲牷肥腯北郊眀堂太廟並用降神及迎送為誠雅取尚書至誠感神皇帝飲福酒為獻雅取禮記祭統尸飲五洗玉爵獻卿今之福酒亦古獻之義北郊眀堂太廟同用就燎位就埋位俱奏禋樂雅取周禮大宗伯以禋祀昊天上帝也衆官出入為俊雅取禮記司徒選士之秀者而升之于學曰俊士也二郊太廟眀堂三朝同用焉其辭並沈約所制也是時禮樂制度粲然有序梁樂並以雅為名通典陳樂盡以韶為名陳宣帝改元嘉中所用齊樂盡以韶為名太樂令奏懋韶之樂降神奏通韶牲入出奏潔韶帝入壇及還便殿奏穆韶帝飲福酒奏嘉韶就燎位奏報韶至六年十一月侍中徐陵議曹郎中沈罕奏來年元會儀注奏康韶之樂詔延王公宴登奏變韶帝興入便殿奏穆韶舉酒奏綏韶進膳奏侑韶通典後魏高允奏樂府歌詞孝文太和初垂心雅古務正音聲五年帝乃為歌章誡勸上下皆宣之管絃七年高允奏樂府歌詞陳國家王業符瑞及祖宗德美又隨時歌謡不準古舊辨雅鄭也册府元龜後魏公孫崇上樂書宣武正始元年詔曰太樂令公孫崇更調金石奕理音準其書二卷并表悉付尚書注云太和中高問引公孫崇共考音律景眀中崇乃上言樂事至是成焉後尚書李崇及尚書令高肇等奏言公孫崇所造八音之器及五度五量悉與周禮不同通典公孫崇又有鐘磬志二卷後魏王延眀撰集樂説正元中侍中王延眀受詔監修金石博采古今樂事令其門生河間信都芳之屬天下多難終無制造芳後乃撰延眀所集樂説并諸器物準圖二十餘事而注之通典唐志所載樂書九卷乃信都芳所刪注者也北齊文宣初尚未改舊章宮懸各設十二鏄鐘於其辰位四面並設編鐘編磬各一筍簴合二十架設建鼓於四隅郊廟會同用之其後將有創革尚樂典御祖珽上書曰魏氏來自雲朔未移其俗至道武破慕容寶于中山獲晉樂器不知採用皆委棄之天興初吏部郎鄧彥海奏上廟樂創制宮懸而鐘管不偹樂章既闕雜以簸邏回歌初用八佾作皇始之舞至太武帝平河西得沮渠蒙遜之技賔嘉大禮皆雜用焉此聲所興蓋苻堅之末呂光平西域得胡戎之樂因又改變雜以秦聲所謂秦漢樂也至永熙中録尚書長孫承業共臣先人太常卿瑩等斟酌繕修戎華兼探至於鐘鼓律呂奐然大備自古相襲損益可知今之創製請以為凖珽因採魏安豐王延眀及信都芳等所著樂説而定正聲始具宮懸之器仍雜西涼之曲樂名廣成而無所號所謂洛陽舊樂者也武成之時始定四郊宗廟之樂羣臣入出奏肆夏牲入出薦毛血並奏昭夏迎送神及皇帝初獻亞獻禮五方上帝並奏高眀之樂為覆燾之舞皇帝入壇門及升壇飲福酒就燎位還便殿並奏皇夏以高祖配享奏武德之樂為昭烈之舞祼地奏登歌其四時祭廟及禘祫六代五代髙祖曽祖祖諸神室並奏始陛之樂為恢祚之舞神武皇帝神室奏武德之樂為昭烈之舞文襄皇帝神室奏文德之樂為室政之舞文宣皇帝神室奏文正之樂為光大之舞孝昭皇帝神室奏文眀之樂為休德之舞其入出之儀同四郊之禮其時郊廟宴享之樂皆魏代故西涼伎即是晉初舊聲魏大武平涼所得也秦漢二代是魏晉相承之樂其吳聲者是江南宋齊之伎鼓吹朱鷺等二十曲皆改古名以敘功德古文有黃雀釣竿二曲略而不用孟議定其名被於鼓吹諸川鎮戍各給鼓吹樂人多少各以大小等級為差諸王為州皆給鼓吹赤鼓赤角皇子則增給吳鼓長鳴角上州刺史皆給青鼓青角中州刺史以下及諸鎮戍皆給黑鼓黑角樂器皆有衣並同鼓色雜樂有西涼之舞清樂龜兹等然吹笙彈琵琶五絃及歌舞之伎自文襄已來皆所愛好至河清以後傳習尤盛後主唯賞胡戎樂耽愛無已於是繁習淫聲爭新哀怨故曹妙達安未弱安馬駒之徒至有封王開府者遂服簪纓而為伶人之事後主亦自能度曲親執樂器恱玩無倦遂倚絃而歌别採新聲為無愁曲音韻窈窕極於哀思使胡兒閹官之輩齊唱和之曲終樂闋莫不殞涕雖行幸道路或時馬上奏之樂往哀來竟以亡國後周文帝霸政平江陵大獲梁氏樂器及建六官乃令有司詳定郊廟樂歌舞各有等差雖著其文竟未之行也武帝天和初造山雲舞以備六代南北郊雩壇太廟禘祫俱用六舞南郊則大夏降神大濩獻熟次作大武正德武德山雲之舞雩壇以大武降神正德獻熟次作大夏大濩武德山雲之舞太廟禘祫則大武降神山雲獻熟次作正德大夏大濩武德之舞時享太廟以山雲降神大夏獻熟次作武德之舞拜社以大濩降神正德獻熟次作正德之舞五郊朝日以大夏降神大濩獻熟神州夕月藉田以正德降神大濩獻熟建德二年十月六代樂成奏於崇信殿宮懸依梁三十六架朝會則皇帝出入奏皇夏皇太子出入奏肆夏王公出入奏驁夏五等諸侯元日獻玉帛奏納夏宴族人奏族夏大會至尊執爵奏登歌十八曲食舉奏深夏舞六代大夏大濩大武正德武德山雲之舞於是王定雅音為郊廟樂創造鐘律頗得其宜乃以梁鼓吹熊羆十二按每元正大會列於懸間與正樂合奏初太祖輔魏之時髙昌內附及得其伎教習以備饗宴之禮六年罷掖庭四夷之樂其後帝䀻皇后於突厥得其所獲康國龜兹等樂更雜以髙昌之舊並於大司樂習焉採用其聲被於鐘石取周官制以陳之宣帝時改前代鼓吹朱鷺等曲製為十五曲述受魏禪及戰功之事帝每晨出夜還恆陳鼓吹嘗幸同州自應門至赤岸數十里間鼓吹俱作祈雨仲山還令京城士女於街巷奏樂以迎之公私頓弊以至於亡也隋文帝開皇二年尚因周樂命工人齊樹提檢校樂府改換聲律益不能通俄而沛公鄭譯奏上請更修正於是詔太常卿牛𢎞國子祭酒辛之國子博士何妥等議正樂然淪謬既久積年議不定帝怒曰我受天命七年樂府猶歌前代功德命治書侍御史李諤引𢎞等以下將罪之諤奏曰武王克殷至周公相成王始制禮樂斯事體大不可速成帝意稍解九年平陳獲宋齊舊樂詔於太常置清商署以管之求得陳太樂令蔡子元于普眀等復居其職隋代雅樂唯奏黃鍾一宮郊廟朝享用一調迎氣用五調舊工更盡其餘聲律皆不復通或有能為㽔賔之宮者享祀之際隸之竟無覺者𢎞又修皇后房內之樂文帝龍濳時頗好音樂故嘗因倚琵琶作歌二首名曰地厚天高託言夫妻之義因即取之為房內曲命婦人並登歌上夀並用之職在宮內女人教習之於是祕書監牛𢎞祕書丞姚察散騎常侍許善心儀同三司劉臻內史舍人虞世基等更共詳議按周官大司樂奏黃鍾歌大呂舞雲門以祀天神奏太蔟歌應鍾舞咸池以祭地祗奏姑洗歌南呂舞大㲈以祀四望奏㽔賓歌函鍾舞大夏以祭山川奏夷則歌中呂舞大濩以享先妣奏無射歌夾鍾舞大武以享先祖此乃周制立二王三恪通已為六代之樂至四時祭祀則分而用之以六樂配十二調一代之樂則用二調矣隋去六代之樂又無四望先妣之祭今既與古祭法有别乃以神祗位次分樂配焉奏黃鍾歌大呂以祀圜丘奏太蔟歌應鐘以祭方澤奏姑洗歌南呂以祀五郊神州奏蕤賓歌林鐘以享宗廟奏夷則歌小呂以祭社稷先農奏無射歌夾鐘以祭巡狩方嶽同用文武二舞其圜丘降神八變宗廟禘祫降神九變皆用昭夏其餘享祀皆二變皇帝入出奏皇夏群官入出皆奏肆夏舉酒上夀奏需夏迎送鬼神奏昭夏薦獻郊廟奏咸夏宴享殿上奏登歌並文舞武舞合為八曲古有宮商角徵羽五引梁以三朝元會奏之今改為五音其聲悉依宮商不使差越唯迎氣於五郊降神奏之月令所謂孟春其音角是也通前為十三曲并內官所奏變天髙地厚二曲於房中奏之合十五曲其登歌祀神宴會通行之若有大祀臨軒陳於階壇之上若册拜王公設宮懸不用登歌釋奠則唯用登歌而不設懸古者人君食皆用當月之調以取時律之聲使不失五常之性調暢四體令得時氣之和故東漢太子丞鮑鄴上言天子食飲必順四時侑食舉樂所以順天地養神眀可作十二月均感天地和氣此則庭殿月調之義也祭祀既已分樂迎氣臨軒朝會並用當月之律正月懸太蔟之均及十二月懸太吕之均欲感人君情性允協隂陽之序也作撰歌詩三十首詔並令施用先是文帝遣內史侍郎李元操直內侍省盧思道等製清廟歌詞十二曲令於大樂教習以代周官至仁夀中煬帝為太子時及享於太廟乃言清廟之詞文多浮麗不足以宣功德請更議之於是詔吏部尚書牛𢎞開府儀同栁顧言祕書丞許善心內史舍人虞世基禮部侍郎蔡徵等更詳故實創製雍樂歌詞煬帝大業元年詔修高祖廟樂唯新造高祖歌九首仍屬戎車不遑刋正禮樂之事竟無成功而帝矜奢頗馳淫曲御史大夫裴薀揣知帝情奏搜周齊梁陳樂工子弟及人間善聲調音律凡三百餘人並付太樂倡優猱雜咸來萃止其哀管雜聲淫絃巧奏皆出鄴城之下髙齊之舊典也大唐太宗文皇帝留心雅正厲精文教貞觀之初合考隋氏所傳南北之樂梁陳盡吳楚之聲周齊皆胡虜之音乃命太常卿祖孝孫正宮調起居郎呂才習音韻協律郎張文收考律呂平其散濫為之折𠂻漢以來郊祀眀堂有夕牲迎神登歌等曲近代加祼地迎牲飲福酒今夕牲祼地不用樂公卿攝事又去飲福酒之樂用享神諸樂多以夏為名宋以永為名梁以雅為名後周亦以夏為名隋氏因之今國家以和為名旋宮之樂久喪漢章帝建初三年鮑鄴始請用之順帝陽嘉二年復廢纍代皆黃鍾一均變極七音則五鍾廢而不擊反謂之啞鐘祖孝孫始為旋宮之法造十二和樂合四十八曲八十四調至於開元中又造三和樂共十五和樂其曰元和順和永和肅和雍和夀和太和舒和休和昭和祴和正和永和豐和宣和又制文舞武舞文舞朝廷謂之九功舞武舞朝廷謂之七德舞樂用鐘磬柷敔晉鼓節鼓琴瑟筝築竽笙簫笛篪塤錞于鐃鐸撫拍舂牘謂之雅樂雅樂唯郊廟元會冬至册命大禮則辨其曲度章服而分始終之次唐經雜志樂志管絃記十二卷乃留進所撰管絃志十卷乃凌秀所撰也樂社大義及樂論皆梁武帝所撰也鐘律五卷則撰於沈重樂譜集解則撰於蕭吉樂府聲調樂府歌詞則撰於鄭譯蘇夔撰樂志李元楚撰樂經李守真撰古今樂記唐樂章敘正觀二年太常少卿祖孝孫既定雅樂至六年詔褚亮虞世南魏徴等分制樂章其後至則天稱制多所改易歌詞皆是內出開元初則中書張説奉制所作然雜用貞觀舊詞自是郊廟歌工師傳授多缺或祭用宴樂或郊稱廟詞二十五年太常卿韋縚令博士韋逌直太樂尚沖樂正沈元福郊廟令陳虔申懷操等銓敘前後所行用樂章為五卷以付太樂鼓令大習之時太常舊相傳有宮商角徵羽燕樂五調樂五調歌詞各一卷或云貞觀中侍中楊仁恭妾趙方等所銓集詞多鄭衛音皆近代詞人雜詩至縚文公又令太樂令孫元成更加整比為七卷又自開元以來歌者雜用胡夷里巷之曲其孫元成所集者工人多不能通相傳謂為曲法令依前史舊例録雅樂歌詞前後常行用者附于此志其五調曲法多不經不復載之舊唐書樂志序唐雅樂祖孝孫十二和之制唐興即用隋樂武德九年始詔太常少卿祖孝孫等定樂乃曰大樂與天地同和者也製十二和以法天地之成數號大唐雅樂用於郊廟朝廷以和神人孝孫已卒張文收以為十二和之制未備乃詔有司釐定而文收考正律呂起居郎呂才叶其聲音樂曲遂備初隋用黃鍾一宮唯擊七鐘其五鐘虛而不擊唐叶律郎張文收依古斷竹為十二律吹調五鐘叩之而應於是十二鐘皆用孝孫又以十二月旋相為六十聲八十四調旋之義亡絶已久一朝復古張文收又鑄銅律三百六十銅斛二銅稱尺與古玉尺藏於大樂府自高宗以後稍更其曲名開元定禮始復遵用孝孫十二和其著于禮者一曰豫和以降天神二曰順和以降地祇三曰永和以降人鬼四曰肅和登歌以奠玉帛五曰雍和凡祭祀以入爼六曰夀和以酌獻飲福七曰太和以為行節八曰舒和以出入二舞九曰昭和皇帝太子以舉酒十曰休和皇帝以飲以拜三老皇太子亦以飯十一曰正和皇后受册以行十二曰承和皇太子在其宮有會以行乃同享神樂以夏為名宋以永為名梁以雅名隋以夏名唐以和名唐神功破陳樂功名慶善樂見樂舞唐十部樂燕樂高祖即位仍隋制設九部樂燕樂伎清商伎西涼伎天竺伎高麗伎龜兹伎安國伎疏勒伎康國伎及太宗平高昌收其樂自是初有十部樂開元二十四年升胡部於堂上而天寶樂曲皆以邉地名若涼州伊州甘州之類眀皇龍池樂聖夀樂小破陳樂光聖樂夜半樂還京樂眀皇為平王有散樂一部定韋后之難頗有預謀者及即位命寧王主藩邸樂以太常分兩羽以角優劣置內教坊於蓬萊宮有諧謔而賜金帛朱紫者酸棗縣尉袁楚客上疏極諫初帝賜第隆慶坊坊南之地變為池中宗常泛舟以厭其祥及即位作龍池樂舞者十有二人又作聖夀樂以女衣五色繡襟而舞之又作小破陳樂舞者被甲胄又作光聖樂武者鳥冠畫衣以歌王迹所興又民間以帝自潞州還京夜半誅韋后製夜半樂還京樂二曲當其盛時凡樂人音聲人太常雜户子弟至數萬人樂工少年姿秀者每千秋節舞於勤政樓下後賜宴設酺亦會勤政樓其日未眀金吾引駕騎太常引雜樂間廏使引戲馬五坊使引犀象宮人奏小破陳樂嵗以為常時教於黎園謂之黎園弟子自周陳以上雅鄭淆雜而無别隋文帝始分雅俗二部至唐更曰部當凡所謂俗樂者二十有八調中呂宮黃鐘宮大石調小石調之類自太宗高祖作三大舞雜用於燕樂其他諸曲出於一時之作雖非純尚不至於淫放玄宗有散樂又分為二部堂下立奏謂之立部伎堂上坐奏謂之坐部伎太常閲坐部不可教者隸立部又不可教者乃習雜樂因以生日名節而君臣共為荒樂當時流俗多傳其事以為盛其後巨盜起陷兩京自此天下用兵不息而離宮苑囿遂以荒湮獨其餘聲遺曲人間聞者為之悲涼感動蓋其事適足以為戒而不可考法也唐志羣書考索卷四十九
