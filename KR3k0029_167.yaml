body:
  text: 羣書考索續集卷三十六宋章如愚編官制門臺諫臺諫總論御史大夫不除史監察御史中丞侍御史官殿中侍御御史知雜臺裏行臺檢法考周官宗伯有御史掌贊書法令秦以御史監郡故有監察之名見漢百官表曰監察御史漢初以御史糾不如儀者所職與周異矣自是以來曰烏臺曰霜臺曰憲臺無非彈擊之任宋初臺諫皆以他官兼領本職則為兼官階官諌官至神宗元豐三年始有實職惟臺官自太宗太平興國三年張巽為監察御史正名舉職已見於此時故其後孔道輔賈昌朝杜衍趙槩張昇張方平吕誨皆為中丞道輔論廢郭后事昌言劾林瑀附會易卦宰相以下皆畏之既非治體不言昇方平知無不言誨劾王安石十事孫抃趙抃范純仁吕大防英宗朝皆為殿中侍御史桑慥鞠詠李紘張錫皆為監察御史孫不作識面臺官趙鐡面慥有志行詠欲壊錢惟演命相制紘諫仁宗召伶人錫論丁謂不宜徙内地是所謂振職不撓風采肅然者得非祖宗夙正紀綱之司涵養直臣之氣而然乎熈寧中王安石乃以選人李定為察官凡六察所言行於有司而不行於二府元豐四年宇文昌論此弊崇觀大臣欲其便已南臺御史不言事而惟六察言事至今以為當然者葢依祖宗之法也曾不知此乃王安石蔡京之私意而祖宗之法本不爾也嗚呼安石作俑始於鉗天下之口而終於稔夷狄之禍尚可以為法哉諫官總論諫議大夫遷給舍語曰饒他上坡却下坡夫事有似易而實難者聽言從諫是也王安石在臺諫侍從時常稱唐太宗令宰相入閣諫官隨之最切於治道既為執政有請舉而行之者諫職孫莘老李公擇安石乃有益兩㕘政之語志在變法慮諌官之侵駁也推是心已往能言而不能行者可勝言哉已且不能行其言何以責難於其君哉夫宋初諫官未有實職其以他官兼者謂之知諫院故魯宗道歐陽修余靖蔡襄皆為諫官司馬光吕誨並知諫院言論風采震聳一時者皆自宸選也熈豐正名諫官雖有實職而乃隸中書門下省自是吕惠卿鄧潤甫皆不厯郎中員外而徑為諫議是乃荆公摶撃之具耳何以責其振職哉故嘗為之説曰臺諫所以正君律臣也不曲不阿真臺諫也次則示人君喜怒之私下則為大臣鷹擊狗獵之具正謂是也荆公未顯時又嘗上田正言書曰今聨諫官朝中耳目天子行事即一切是非無不可言者願一為天下昌言以寤主上以起民之疾治國之疵蹇蹇一心如對策時豈意荆公得時行道乃身為民疾國疵也身不能蹇蹇如上書時乃教人蹇蹇如對策時書云責人斯無難惟受責俾如流是為艱哉斯荆公之謂矣仁宗時因田况論諫官王素歐陽修蔡襄知諫院而不得綴兩省班於禮未便遂詔諫官日赴内朝夫仁宗既行唐制孫莘老等又欲舉行於神宗時而荆公從此必荆公復抑遏之耳非此制不存也見亦放談古者諫官無定員後世諫官有常職古者諫官無定員而言路益廣後世諫官有常職而言路彌塞古者工誦箴諫則百工得以諫也瞽誦詩諫則矇瞽得以諫也公卿比諫則凡在朝者得以諫也士傳言諫則庶士得以諫也庶人謗於道商旅議於市則庶人商賈亦得以諫也上而公卿大夫下而至於士庶商賈百工之賤莫不皆得以諫是舉天下皆諌諍者也固不待處諫官之職然後即取以為諌也豈非古者諫官無定員而言路益廣歟後世不然立諫官之職將以求諫而不知諫諍之路反由此而塞夫何故諫議大夫此所謂諫官者也拾遺補闕此所謂諫官者也為諫議者可得而諫不為諫議者可得而諫乎為拾遺補闕者可得而諫不為拾遺補闕者可得而諫乎葢謂之諫官則以諫為職既以諫為職則不居此職者皆不得而諫有所諫則曰侵官曰犯分語及天子則曰指斥乘輿言闗廊廟則曰誹謗朝政所以然者葢由諫官之有定職故也陳伯厚唐史斷諫官御史其職畧異諫官御史雖俱為言責之臣然其職各異諫官掌獻替以正人主御史掌糾察以繩百僚故君有過舉則諫官奏牘臣有違法則御史封章今使諫官同糾察則為侵官御史與獻替則為犯分惟别諫官之職正御史之任獻替之事則付之諫官糾察之事則付之御史選持重方正適時變而敦大體者以為諫議大夫擇嚴威剛直識故事而知國體者以為御史中丞朝廷之上法令有未全教化有未備禮樂有未修號令有未明論議有未决更張有未當隂陽之有灾眚天地之有變怪人主有喜以過予怒以過奪則當責諫官而使之言其失搢紳之中有奸邪不正有驕侈自遂有諂佞以奉上有讒慝以亂聽有豪强之弄法有佞倖之盜權有貪汙而亷恥不修有欺詐而忠信不飾大臣中立而顧望小臣弛慢而隳職則當責御史而陳之以彈其罪並司馬槱文臺諫當以威望為先彈劾為次欲擇其人當以威望為先彈劾為次何則有威望者雖終日不言而人自稽服無威望者雖日露百章而人益不畏葢剛毅之志骨鯁之操素不熟於人心徒俟搏擊之權欲以震肅羣臣清正中外則恐紀綱未振而怨謗先興也今路有伏虎而人懐憂虞門有跳狼而人不畏避豈不以牙爪之利素不足以取畏於人耶若汲長孺在位而淮南自寖逆謀葢寛饒見用而中外莫敢犯禁宣秉務舉大綱而百寮敬憚竇泰無多糾舉而羣下畏懼此四人者素有忠烈足以鎮壓朝廷矣御史大夫與御史中丞御史亞長曰中丞貳大夫以領其屬漢儀大夫副丞相以備其闕㕘維國綱鮮臨府事故中丞專焉晉宋元魏以還無御史大夫由是中丞威望愈髙天寶中以尚書左丞張公為大夫以太府少卿庾公為中丞天下翕然名教知勸大夫睦中丞也羽翮得清風之助中丞奉大夫也律吕本黄鍾之宫文粹李華御史中丞壁記御史府尊則天子尊御史府為朝廷綱紀之職故大臣由公相已下皆屏氣切息注萬目於五曹五曹坐南臺則綜覈天下之法立為内朝則糾約百官之失百司有滯凝之事皆就我而質正云云吾府為天子之耳目宸居之堂陛未有耳目聰明堂陛峻正而天子不尊也天子尊未有奸臣賊子而不滅也奸臣賊子盡滅矣可以自朝廷至於海隅蕩蕩然何所不理哉舒元輿御史臺新造中書院記御史過於宰相翰林仕宦有三榮秉鈞當軸宅揆代工坐廟堂以進退百官為宰相之榮瀛州妙選金鑾召對代天子絲綸之命為翰苑之榮烏府深嚴豸冠威肅得以振紀綱而警風采為御史之榮就是三者而輕重之則御史之榮為尤甚何者言闗乗輿天子改容事屬廊廟宰相待罪則權之所在不特進退百官而已也雖宰相之重其何以及此赤捧所指不問尊卑白簡前立奸回氣攝則天子耳目之所及者為甚廣不止絲綸之代而已也雖翰苑之貴其何以及此是故前輩説搢紳之榮貴者則曰大丈夫不為宰相必為翰林不為翰林必為御史而愚獨以御史為過於宰相翰林者以權重而職嚴也特奏狀元謝藻周以保氏諫王漢因設諫官周以御史贊命漢用司糾察有制同乎古而乃不得以行其職者矣亦有志異乎古而乃得以行其職者矣自周人以保氏諫王而漢人因之以設諫諍之官此名異而其制同者也周以御史掌贊王命而漢人分之以司糾察之任此名同而其制異者也左寺簿一鴞漢言路有限漢御史有大夫有中丞有侍御史而大夫佐丞相兼綂萬機中丞佐天子專掌糾劾總御史員四十有五秩皆六百石其十五人給事殿中受百官章奏而其三十人則留御史府治事凡遣三輔奉六條察州則為監察御史也至於大夫則有諫大夫光禄大夫官無常員多至數十人居常議論如蕭望之部按延壽之驕恣嚴延年劾奏霍光之廢立皆以御史也劉向戒外戚之竊柄龔勝爭孫寳之繫獄皆以大夫也其為制初亦善矣然古者誦詩傳言各以其職上進於君而下至百工執事以諫初未嘗有出位離局之責漢之御史與大夫固以助天子之耳目而言路之狹亦自此始觀鄭昌誦葢寛饒之書曰臣官以諫為名不敢不言而鮑宣上書論何武亦曰官以諫諍為職不敢不竭愚夫職在諫諍然後得言天下之事而職非當諫者其不為越職可乎自是而後其職益分因御史而置兩臺專以糾臣鄰之邪佞因大夫而有諫者專以審人主之愆謬官屬莫偹於唐而其治愈不如古職有所拘也愚以為人君之設諫員孰若各使天下皆得以盡言而無擇者乎漢不獨諫官得言事漢家議事每召丞相御史將軍列侯中二千石大夫博士會議自太常至執金吾秩皆二千石既有㑹議亦何所不預此是漢家開闢言路上自公卿下至博士議郎人人得口銜清議不必官以諫為名而後得言事漢初中丞得行其權其後不得舉其職漢御史中丞乃御史大夫屬官執法殿中糾察百僚凡刺史郡國二千石天子有所詰問下中丞問狀自領侍御史員十五人其職掌察舉非法受公卿奏事有違失舉劾之漢初中丞在殿中蘭臺受公卿奏事舉劾按章外督部刺史内領侍御史是時尚書諸吏等官未置所謂親近天子而疎决内外以助人主聽斷者惟此一人而已武帝以中丞之官不甚周密於是始置中書居中受事後百官志及石顯傳又置諸吏居中舉不法百官表又每詔下自兩府下九卿自九卿下郡國而不由中丞於是中丞之官不得居中制事特不過為掌治刑獄等官而已杜周咸宣是也中丞之權既分則内而侍御史外而部刺史其職皆弛而不振是以武帝末年公卿守令多為奸猾而皆不能制於是内置司直司隸外置繡衣直指皆厚其禄重其權使之持節擊斷於中都郡縣之間猶不能勝葢不知中丞之職廢而刺史奏尚書事多羣蔽故侍御史部刺史皆不得舉其職耳宣帝懲武帝末年遣使縱横之弊一切罷之復還漢初之制令丞相遣掾史按事郡國魏相傳每事奏上丞相一一為披陳之雖刺史亦不廢但丞相史之上尤專是以政事修舉而内外咸稱其職然猶不知復中丞之權及元帝時石顯用事而丞相之權去雖時遣刺史亦無益於治于定國刺史奏事京師皆為石顯壅蔽於是陳咸為御史中丞總領州郡奏事課第諸刺史内執法殿中欲申行總領部刺史奏事之職陳方年傳卒為石顯所排以此見中丞之職久廢而移於中書一旦欲舉之難矣云云成帝欲罷中尚書之職成帝用士人復故後志是時薛宣為中丞於是舉奏刺二千石所貶退稱進白黒分明則中丞居職其效如此是以繼此之後部刺史之權亦行於外如薛宣所奏其任頗已振矣陳彦卿西漢博議至漢武始置諫官古者諫無官自公卿大夫至於工商無不得諫者漢興已來始置官以天下之政四海之衆得失利病萃於一官使言之其為任亦重矣温公文漢宣帝不當出諫官為郡守御史天子之耳目也必得剛正之士而為之葢天子以一身之微處法宫之邃百僚之邪正吾躬之得失皆奚自而察之於是設為耳目之官以司風憲之任故一人不必用其聰恃其明舉天下之事無不聞而見也宣帝之時蕭望之遷諫議出補郡守則亦民之師帥非不美也而望之上疏且以出諫官以補郡守所謂憂其末而忘其本葢朝無諍臣則不知過失以是知霜臺之選不容少緩宣帝拳拳於是者以未為知大體也東萊博議漢唐之世御史得人其後所任非人故必得鐵石肝腸鷹鸇操行者然後可以任是責不然則軟熟依違緘黙退縮而胸中耿耿者不立何以砥礪乎百僚必得志懐秋霜忠貫白日者然後可無負是寄不然則詭隨畏避蒙蔽在我無特操何以彈擊乎奸佞在漢之世臺諫有人則如卜式之長者望之之剛直而慰民望推原其故則漢之君有以致之也班列會同專席而坐驄馬見避京師畏懼為漢之御史者若此其重孰謂懐詐事君人人如張湯乎在唐之世臺諫有人則知栁範之規拂蕭瑀之剛介王義方之牴觸奸人温造之威望稱職皆可以折奸臣而隆國勢推原其故則唐之君有以致之也遊獵抗諫每為動色皂鵰横擊輒加假借為唐之御史者若此其重孰謂告訐獲寵人人如權萬紀乎元成以後御史之職猶前日也陳中丞切齒石顯抗章力爭自翟方進一用而憲司殆為備員王氏奸心漸露日懐染鼎之醜賢愚共知而無敢一言其失以醖釀異日之變元宗末年御史之職亦猶前日周監察以彈劾得罪王拱以貢奉獲寵忠肝義膽無復一毫凜凜林甫國忠奸寵百出聽其驕縱而無所摧折其鋒所以養成肘腋之亂君子所以為漢唐不滿者以終始而二之也謝藻漢唐諫官至多宋與今日不及漢法大夫無員多至十數人唐自諫長至遺補二十人宋朝天禧始創六員之制而慶厯四諫尤為著稱比年以來諫省寂寥僅止一員以為省官歟則閒慢曹局率皆備官以為無事可言歟則今日可言之事必不少於祖宗時此特懐私之臣畏忌人言是以因循虛而不補耳鄭湜奏劄唐臺諫是二職臺官僕射左右丞劾之人有常言皆曰臺諫不知二者設職舉目不同唐諫議大夫拾遺補闕專以諫諍天子為職而御史臺自為一局所以糾察百官之罪惡故舒元褒劾御史温造恚補闕李虞不避道其言云遺補雖卑侍臣也中丞雖髙法吏也帝為之詔臺官供奉先後行葢御史為臺官諫官為供奉官也陸長源曰諫臣須蹇蹇匪躬之士憲臣須孜孜嫉妒之人李華序崔孝公文集云朝廷以公直躬正詞擢左補闕嫉妒忿佞除侍御史直躬故能諫君嫉邪故能察吏是臺諫之分也然諫官以嬰鱗為難其所上封事不過諫國利害初無風憲彈糾之重殆類清而不要者故元次公作竊婢論云諌議冗者貧無以繼酒是直諫議為冗官也陽城為諫議大夫不屑言事韓退之作諍臣論譏之於時諫官無權亦不難譏也一旦罷陸贄相裴延齡城乃以諫顯葢諫臣無預彈擊雖有柄任失人為君之過是不當屑屑於其餘也其御史臺雖以嚴憚然而尚書左僕射左右丞劾其糾舉不當故魏徴劾御史權萬紀李仁發詆房𤣥齡太宗為之徙萬紀而免仁發夫巳以劾人為職人亦得而劾之此所謂有言責者不得其言而責隨之未有聽其所言而無敢議者也若晉傅咸奏云司隸中丞得劾太子而不得劾尚書臣所未喻朝廷無以易之然按漢翟方進為丞相司直旬歳劾兩司隸及唐典尚書左僕射丞專劾御史以此㕘攷則晉中書不劾尚書正其所受劾者而其時公卿莫明其故故咸説得行歟唐世諫官救君失於將然唐太宗之時所謂諫官者與丞弼俱進於前故一言之謬一事之失可救之於將然不使其命已布於天下然後從而爭之也君不失其所以為君臣不失其所以為臣其亦庶乎其近古也今也上之所欲為丞弼所以言於上皆不得而知也及其命之已出然後從而爭之上聽之而改則是士制命而君聽也不聽而逐則是臣不得其言而君恥過也王介甫論諌官髙宗習見太宗時諫官言事穆宗習見憲宗時諫官不諫髙宗嘗謂五品以上曰頃在先帝左右見五品以上論事或使下面陳或退上封事終日不絶豈今日獨無事耶何公等皆不言也夫髙宗在位昏童固無足取而求諫之言如此豈非太宗導人使諫之風有以接於耳目使之視傚而然哉憲宗之時久無閣中論事者故穆宗耳目所睹記不復知有納諫之事至於諫議大夫鄭覃崔郾之徒當羣臣入閣之際諫其宴樂畋遊之失乃甚訝之問宰相以為此輩何人雖曰穆宗之不明而貽謀之道無以使之視傚者實亦憲宗之過也少潁唐論睿宗䕶直臣恐為奸邪所噬朝廷而不長直臣之氣則其擊摶奸邪鮮有不為所噬者觀睿宗之言曰鷹摶狡兎須急救之不爾反為所噬御吏繩奸慝亦然茍非人主保衞則亦為奸慝所噬同前顔真卿嘗為臺官明皇不識其狀貌顔真卿嘗為監察御史矣又嘗遷殿中侍御史矣則是真卿固嘗在明皇左右也鯁直如真卿所言事如真卿且復為御史在明皇之左右則真卿之於明皇非不親且近也而明皇至不識其狀貌臨事見節乃始驚歎則是明皇於平日任人之際葢亦混然而已不復一舉目而為省察也陳伯厚唐史論斷肅宗時李勉劾管崇嗣憲宗時温造劾李祐管崇嗣嘗背闕而坐笑語譁縱為御史李勉所劾矣今於闕下復先至而馳是管崇嗣乃武夫崛起無禮於朝廷者也而肅宗必欲優容之豈以崇嗣嘗有功於國而固為之地耶以管崇嗣之功而遂至於背闕笑語先至而馳則當時如李光弼郭子儀固當乗輿而登天子殿矣然是二人功愈髙而志愈謙勢愈隆而身愈屈使人人皆如李郭尚何以法官彈治為哉憲宗時夏州節度李祐拜大金吾違詔進馬御史温造正衙彈劾祐曰吾夜入蔡州擒吳元濟未嘗心動今日膽落於温御史嗚呼温造真御史也其亦憲宗之剛明果斷者乎知乎此則知肅宗之優容管崇嗣有以長功臣之驕有以屈御史之體肅宗可謂一舉而兩失者也陳伯厚唐史論斷韓昌黎論陽諫議不言政或問諫議大夫陽城於愈可以為有道之士乎學廣而聞多天子以為諫議大夫云云愈應之曰陽子在位不為不久聞天子之得失不為不熟矣天子待之不為不加矣而未嘗一言及於政視政之得失若越人視秦人之肥瘠忽然不加喜戚於其心問其官則曰諫議也問其禄則曰下大夫之秩也問其政則曰我不知也有道之士固如是哉韓文異時陽諫議論國大事不如昌黎所云唐世臺諫多為人所擠陷為國果不可無人也國而無人則人主耳目閉塞而危亡至矣其始也大臣當國憚其不便於己而迫於公卿議之不可誣於是遷以美官而實奪之權若姚崇之遷李義是也其後也大臣固位恐其將發己私而公議有所不恤於是詭計而出之外州如張説之出崔沔是也而又有最巧者小人之欲排君子激之以其勢而使自相攻而小人初無與焉人主不知則適中其欲若李逢吉之欲去李紳乃除韓愈京兆尹特詔不臺參以激之是也又其甚也若李林甫專進諂諛之徒以蠱惑人主之心興大獄傾䧟正人以塞人主之耳目公指立仗馬以諷近臣諫諍路絶而養成天寶之亂雖有貞觀之制如無是制也吕士瞻官制要唐世御史權重其後權輕故事御史臺不受訟有訴可聞者畧其姓名託以風聞其後宰相以御史權重建議彈奏先白中丞大夫復通狀中書門下然後得奏自是御史之任輕矣唐世諫官事有闕失規正宋臺諫事未當始論列唐室以前諫議大夫拾遺補闕皆中書門下省屬官日與中書令侍中侍於天子之側議論大政茍事有闕失皆得隨時規正今國家凡有大政惟兩府大臣數人相與議論深嚴祕密外廷之臣無一人知者及詔勅已下然後臺諫之官始得與知或事有未當須至論列又云命令已下難以更改則是國家凡有失政皆不可復救温公文集今之正言即唐之拾遺唐志云左右拾遺掌供奉諷諫今之正言則拾遺也品秩雖卑責任甚重禮曰有犯無隠傳曰知無不言是以王者有過則犯顔而進諫大臣有罪則直指而不忌其或賞不以功罰不以罪詔令不便興作無時或除拜之間不以才進或公忠之士濫被中傷或流放之人天下未知其罪或進用之者天下未見其能凡闗損益合具奏陳誘之以厚利而不動臨之以白刃而不懼此諫臣之職也劉隨為右正言上仁宗宋朝最重言官宋自建隆以來未嘗罪一言者縱有薄責旋即超升許以風聞而無官長風采所繫不問尊卑言及乗輿則天子改容事闗廊廟則宰相待罪故仁宗之世議者譏宰相但奉行臺諫風㫖而已聖人深意流俗豈知葢擢用臺諫固未必皆賢所言未必皆是然須養其鋭氣借之重權者豈徒然哉將以折奸臣之萌而救内重之弊也夫奸臣之始以臺諫折之而有餘及其既成以干戈取之而不足東坡上神宗書同前祖宗慮下情之壅蔽則許以風聞言事慮職事之或惰則給御寶歴以録彈奏欲其員之無闕也則詔以六員為定制欲其職之專主也則詔以不兼職務乃所以假借臺臣而寵厲之若此其至其與諫官為天子耳目之臣等則是朝廷紀綱之地皆得以論時政糾官邪也李信甫上光宗宋百官皆得言事天禧之前羣臣百執事皆得言事不責於臺諫之官也近世臺諫得言事者三數人爾其餘皆不得論事天下是非皆取决於三數人者移易則是非之論亦隨而移易矣此臺諫之弊不可不察古者無越職言事之禁司馬温公有言曰古者設諫鼓謗木詢於蒭蕘未聞有位於朝而以言事為職者若當職之人既不肯言不當職之人又不得言四海之廣兆民之衆其政治利害天子深居九重何由得聞之哉不求識面御史孫抃為御史中丞薦唐介吳中復為御史人或問曰聞君未嘗與二人相識而遽薦之何也曰昔人恥呈身御史今豈求識面臺官後二公皆以風采稱於天下孫抃晩年執政嘗歎曰吾何功於輔政惟薦二臺官為無愧爾觀望風采臺諫之設正欲逆折奸萌彈壓不肖之心於㝠㝠之中今乃拱黙於未發之前而譊譊於已去之後若是則於言責乎何賴此匡衡不擊石顯於方用而攻石顯於既逐所以見鄙於世也宋相臺相為紀綱任政事之臣而忽諫官畧御史猶股肱便利而耳目聾瞽從議論之臣而輕宰相薄執政猶耳目聰明股肱痿弱故仁祖時天下事一切委之執政大臣而羣臣莫得與者除授或不當雖貴戚近屬㫖從中出輒為固執不行如謂但道杜衍不可之類一日諫官列其罪御史數其過雖元老名儒為上所眷禮者亦稱病而賜罷秦少游臺諫各得言事唐制舍人主書行給事主封駁而宋朝各許之封駁唐制御史主彈劾諫官主諫諍而宋朝各許之諫諍是宋之待臺諫猶其待給舍也宋初官以定賦實不親職故赴諫院者方為諫官端拱初以補闕為司諫以拾遺為正言所以舉其職也天禧之廣諫員明道之置諫院所以重其職也元豐正名散騎常侍不除而諫議大夫為諌垣之長其屬有司諌焉有正言焉而三者又各分左右焉其職則規諌也諷諭也然此特諫臣職也所謂御史者何如哉宋初三員領外任而不任風憲興國中任風憲而不領言事至於天禧而後言事御史之官置矣至於慶厯而後言事御史之職舉矣不惟是也六察之置本於察官司也而廢國家大計察官司細過吕公著且言之專察官司不與於言劉摯又言之有二人之有言也而後前日之所謂察者又得以言矣昔日孝宗嘗命監察御史言事則曰今既分隸六察可許隨事詳奏至論諫臣行御史之事則欲其補遺不任糾劾嗚呼諫臣使之諫諍而不使之糾劾臺臣使之糾劾而又使之諫諍帝王之心何其重於責己以德於待人如此哉然臺諫之患敢於言人主而不敢言權臣昔歐陽公之告仁宗曰方今臺諫諫人主則易言大臣則難歐陽此言為唐介設也傅堯俞亦言於哲宗曰諫官御史敢攻人主之短不敢忤權臣之意傅公此言為張舜民設也使為人上者徒知容納臺諫以規其身不知容納臺諫以規其臣為臺諫者徒知以規諫為職而不敢以彈糾為事彼此相蒙無所可否此其患尤有不可勝言者累朝得人聞之先正有趙抃為御史彈劾不避權倖號鐵面御史四朝國史劉顗為御史貶蘇軾遺以詩有烏府先生鐵作肝之語世因號之為鐵肝御史王素在臺憲風力愈勁帝曰真御史也議者目公為獨擊鶻孔道輔嘗謂人曰言事官多觀望宰相意獨龎籍可謂天子御史也歐陽修余靖蔡襄王素為諫官時謂之四諫范文正以言事忤大臣貶余靖上疏論救落職尹洙歐陽修相繼抗疏亦得罪蔡襄作四賢一不肖之詩真宗見田錫必莊嘗比之曰朕之汲黯也魯宗道為正言事有違誤風聞彈疏御筆題殿壁曰魯直經筵侍讀侍講附臺諫館閣制舉夫官制有當更而不更者内外制是也有不當更而更者臺諫館閣制舉是也宋置臺諫所以正君而律臣也王安石欲其便已也乃以察官下察有司而不及二府以諫官隸中書門下而遍置私人於臺諫乎何用經筵所以討論今昔也蔡確懼其有所言也乃以侍讀侍講為兼官而不得以專其職以秩卑資淺者為説書而不得以抗夫尊於經筵乎何取館閣昭文集賢史館總屬崇文龍圖天章等閣皆有學士有待制所以儲天下之英俊也王珪蔡確慮其言改制之非是乃以學士待制之實職而為貼職於是乎館閣為虛名制舉所以待非常之才也王吕安石惠卿疑其言新法之不便乃以科舉之廷對而易制策於是乎制舉為虚設而其實則盡廢矣夫天下之治亂安危捨是四者孰得逾越而議之哉熈豐宣政大臣欲行周公法度而先行商君之令以鉗天下之口循至正人悉謂之邪黨正言悉第為邪等其禍有不可勝言者矣若夫託圖書之神而造天書假周官之文而助新法吕惠卿經筵之蠧莫大於此哀哉羣書考索續集卷三十六
