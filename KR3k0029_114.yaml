body:
  text: 羣書考索後集巻四十八宋章如愚編兵門歴代兵周自一里之井積而為通為成為終為同凡百里焉自百里之同積而為封為畿九千里焉而天下之田井矣自四井之邑而為丘自四邑之丘而為甸積而為六十四井為戎馬者四為兵車者一為牛者十二甲士三人卒七十二人其出各有差焉自百乗之家而為千乗之國而為萬乗提封九百萬井出賦凡六十有四萬為戎馬者四萬匹為兵車者萬乗其數靡不具焉而天下之賦制矣自五人為伍積而為兩為卒者百人焉自伍卒為旅積而為師為軍凡萬二千五百人焉而天下之軍立矣連帥比年以簡軍卒正三年簡徒羣牧五載大簡車徒則選擇為有年春振旅以蒐夏茇舍以苗秋治兵以獮冬大閱以狩則練者為有時任地以令貢賦則農時不違因農隙以講武事則武備無缺斷斷乎良法美意其積非一日矣已上刑法志班固稱商周以兵定天下天下既定則猶立司馬之官設六軍之衆因井田而制軍賦豈非兵之法至周而後大備歟已上係商洎周乗馬法記管仲變周兵為内政荒已有意於戰矣兵法曰善戰者其勢險其法短司馬法自五人一變而為二十五人三變而七十五人由是而推之至於二千五百為師萬二千五百人為軍節目繁悉要為不可敗而已至於内政則不然以齊國之衆而選士止於三萬人其勢險矣率以萬人為軍而君與卿自將其法短矣以此進退如决隄如轉石人誰敢犯之此其所以大得志於天下歟雖然夷吾之意特欲使之必可戰而已卒之以不戰勝楚則猶有先王之意此五伯所以獨美於桓公也然而齊之内政始使兵農異趨制國為二十一鄉工商之鄉六而士之鄉十五故有軌里連鄉師之制五家之軌為五人之伍十軌之里為十五之小戎四里之連為四小戎之卒十里之鄉為十卒之旅五鄉一軍公將其一工商之鄉𨽻公髙國各將其一自五家為軌三軍教士三萬又如鄉之法車八百乗葢鄙有五属立五大夫使各涖一属之政故有邑卒鄉縣属之制五鄙三十家為邑十邑為卒十卒為鄉三鄉為縣十縣為属五属一大夫總得車五千乗可為三軍者四長勺之戰桓公自謂有帶甲十萬車五千乗盖其斥池甚大非齊舊封自三十家為邑至於五属為四十五萬家率九家二兵可為三軍者六盖如鄉遂之法國中之士為兵鄙里之民為農兵不諳耒耜之勤而農不識干戈之事自是先王寓兵於農其意亡矣晉武公初作一軍獻公作二軍恵公韓之敗作州兵文公蒐於被廬僖公十七年作三軍城濮之戰車七百乗案楚薳啟疆有曰晉十家九縣長轂九百其餘四十縣遺守四千而平公治兵邾南適四千乗昭公十三年則晉通率亦五千乗其用七百乗猶齊之法也魯自禽父三軍詩稱公徒三萬舉成數也實止三萬七千五百人成公作丘甲元年謀伐齊將各一甲也襄公作三軍昭公蒐於紅自根牟至於商衛革車千乗故邾人告呉曰魯賦八百乗邾六百乗盖竭作也哀公始用田賦十二年以夫田為兵也夫變兵乗之制而民無餘力矣楚自武王始為軍政作荆尸以伐隨廣而為三軍然而成王時所謂車宫之甲若敖之六卒申息之子弟畧見於傳徃徃非古公子嬰齊為簡之師襄二年組甲被練漆甲也皆創名之康王時蔿掩始并沃衍收隰臯賦車籍馬而有車兵徒兵甲楯之數靈王斥地益大陳蔡不羮邑則千乗於是有五師左傳吳人敗諸豫章獲其五帥至平王又始為舟師焉若夫差犀甲之士十有三萬人其國語三将軍三萬人呉越春秋三百六十人有中校左右軍黄池之㑹三軍皆萬人此呉之兵也勾踐棲於㑹稽甲楯五千其始伐呉發習流二千教士四萬君子六千人諸御千人其名不一已見其非古制此越之兵也楚吳越皆夷也無井牧之法戰國時齊地方二千里帶甲百萬臨淄之中七萬户不下三男子卒固已二十一萬大抵戰國之制勝甲以上皆籍為兵戰國制兵諸侯斥地益廣而兵乗之法壊是時益尚騎射而技擊齊武卒魏胡服趙百金之習秦有百金之士行於中國後世詐力之兵用矣故荀卿曰秦人功賞相長五甲首而𨽻五家然皆干賞蹈利之兵故齊之技擊不可以遇魏之武卒而魏之武卒不可以直秦之銳士秦之銳士不可以當桓文之節制桓文之節制不可以當湯武之仁義至矣斯言也漢軍政漢氏軍政其可取者五一曰謹重二曰寛䘏三曰嚴明四曰均一五曰周宻吾觀漢世國有軍事則有專斷是以縛馬之書徧示百官前渠犂傳武輪䑓詔屯田之奏初終不議趙充國傳匈奴和親而四百石之博士得以抗論也張湯傳以至精兵郡國人主親為擇將相代地吾所急以委陳豨淮陽兵勁實擢灌夫畧可見漢世重軍戎之意然而從軍有勞得以復除髙紀二年闗中卒從軍者復一嵗亡士過多將軍有譴李廣傳金布著令尤䘏死事金布令曰從事死者給以衣糧羽林養子時錄孤兒武帝取從事死軍之子孫教以五兵故曰羽林百官表以至饗遣衛士王尊傳天子臨幸士卒暴露朝㑹罷酒楊僕傳武帝責楊僕事畧可見寛䘏矣自王侯郡守不得以擅與用虎符合而矯制有功者不賞都試僣上者必誅其立法也至矣上功増級而幕時已察馮奉世傳魏尚事亭徼不治而出廵已誅食貨志上北出蕭闗事乗傳行塞因以歸家楊僕傳而敕責已至其抑欺罔也至矣禁撓者有誅韓安國傳楊僕事後期者有誅張騫事畏懦者有誅前功臣表張騫楊僕事元狩三元符四以至都試而不詣都所者必免燕王旦論霍光䟽注屯而不詣屯所者以乏興論趙廣漢蘓賢事其責驕惰也至矣凡此亦足以見其嚴明矣然而寛恤之恩多施之士卒嚴明之政每用之將帥各當其宜也當是時繇有復闕然則繇戍之法可謂恕甚然宰相之子乃不免戍邊故將之家亦均於給賦惠帝元年詔示吾法之無屈也以至御史大夫出為䕶軍不為左遷韓安國為侍御史後為都尉酒泉太守禦冦破羗趙充國傳拜辛武賢不為異數輪䑓之詔敗亡不揜衛霍行封得䘮相除霍去病傳畧可見其均一之意至於上下相維隄防過宻京師之兵纔萬人耳統於一官未為過多而二三卿士各分所領欲其相制也都試之役太守都尉事與縣令令長丞尉何與而必欲俱㑹欲其相察也以至銅虎調發以防矯偽伍符素備以正什伍馮唐傳尺籍五符注郡縣有尉亦既足矣而又鄉置約徼亭設一長以防益賊天下之亭幾三萬所前百官表二萬七千六百三十五所畧可見其周宻之意矣夫以謹重視兵戎故動可寡悔以寛恤待士卒故下不怨勞以嚴明馭将帥故不敢矯惰以均一定軍制故天下無以議令以周宻立兵防故姦宄無以生心是以終漢之世天下晏然諸吕之國變生倉卒而備禦素具北胡南越連兵數年而邦本不揺誠有以也漢兵漢無計口授田之法故賦兵以丁而不以田下衆而無田雖貧者不免於為兵故為兵者皆家人子起田中從軍而非素養者也出馮唐傳自其二十三為正卒於是傅音附之疇官見髙紀二年蕭何發闗中兵注以給公家繇役給於中都官則為衛士給於郡國則為材官給於邊繇則為戍卒皆正嵗而戍其給於縣則為更卒一月即更其更代徃來道中衣装悉自備惟衛士衣食於縣官罷遣則有饗後漢禮儀志其餘則否至於年五十六者始得為閑民就田里勸農桑兵革之事不預若髙不滿六尺以上年未及二十三與夫過於五十六者謂之罷廢老弱在所不任其已仕於郡縣而被薦舉者皆不與給兵之選惟邊戍之事重昭紀注雖宰相之子不免葢寛饒司隷之子自行戍北邊此賦兵之大畧也見元鳳四年詔更有三品有卒更有踐更有過更古者正卒雖常人皆迭為之一月一更是謂卒更也貧者欲得顧更錢者次直者出賦顧之月二千是謂踐更也天下人皆直戍邊三日亦名為更律所謂繇戍也諸不行者出錢三百入官官以給戍者是謂過更也其他則有中都官徒執金吾緹騎及輯濯士佽飛城門兵皆中都之兵也夫闗中三輔之卒属於中尉無事則散於三輔戍於中都如州郡法魏相為河南尉得罪是時河南卒戍中都者二三千人遮霍光自言願復留戍一年以免相罪及京師有警則中尉調發以為之備文帝三年發中尉材官属衛將軍之長安此所謂中都戍卒也王温舒請發中尉貺卒數萬此所謂中尉戍卒也西羌反發三輔中都官徒弛刑等擊羌正所謂中都官徒也中尉官属有中壘即北軍主緹騎五百二十人光武嘗歎曰陰皇后傳仕宦當作執金吾言其徒役之多也此所謂執金吾緹騎也輯濯士者掌治船而属於水衡者也佽飛者漢募士驍勇者以佽飛名之宣帝世西羌反發應募佽飛騎射士詣金城者是也城門兵者自戾太子事後始置城門兵有城門校尉十二城門候杜鄴𫝊王商以特進孔光以太傅領城門兵得舉吏如五府者是也若郡國則有材官騎士有樓船有更卒有犇命有弩官盖郡兵掌於都尉天下郡國凡百有三置尉者九十山西自三輔之外郡纔十有三而置都尉者乃三十大郡則有兩都尉㑹稽是也北邊諸郡則東西南北中部都尉方髙祖命天下郡國選能引闗蹶張材力武猛者以為輕車騎士此材官騎士也見光武紀十年注漢官儀武帝内増七校刑法志外有樓船廬江郡有樓船官卜式請與博昌習船者攻吕嘉伍被傳有潯陽樓船有㑹稽樓船此志謂樓船也朱買臣傳昭帝始元間遣吕破胡發騎為蜀郡犇命擊益州此所謂犇命也南郡有發弩官卜式上書願與臨淄習弩卜式傳式願與子男同博昌習船者講行此弩官者也至三輔則又有胡越騎六郡則又有良家子天水隴西北地上郡西河安定如趙充國李廣則出於隴西馮奉世則出於上黨焦延夀則出於北地皆是也漢世中首勇率行封諸率為侯李廣傳軍功多用超等食貨志云大者封侯卿大夫小者郎或置武功爵以賞戰士出食貨志或賜武臣則倍於文官續漢志功過相當則不賞李廣以適過行者有功則不賞李廣利傳以矯制有功者則不賞馮奉世傳屯不詣屯所則有罰趙廣漢傳擅弄兵則有罰功臣表無錫侯事延初四年増鹵獲利則有罰魏尚髙不識事擅發兵則有罰公孫戎奴事見功臣表後期則有誅張騫李廣傳畏懦則有誅楊僕事脱歸則有誅蘇建擅斥除賢士則有誅趙廣漢穿壁壘則有誅胡建匿亡虜則有誅公孫敖爭功則有誅荀彘漢世軍法最為嚴整此御軍賞罰之法也買爵至千夫則復食貨志入粟受爵至五大夫則復晁錯奏復一人文帝時見食貨志三老及孝悌力田則復博士弟子及通一經則復元帝時見儒林傳序民産子則復髙帝二年復二嵗罷癃則復卿大夫老者疾者皆注云疾今之癃者周禮注功臣後則復宣紀地節二年復霍光後人元康元年凡百三十六人考功臣表流民則復宣詔地節三年徙邊則復文帝時晁錯奏本傳養民馬則復宗室有属籍及闗内侯則復文紀詔復諸劉有属籍者卿大夫國中貴者皆舍注若今宗室及闗内侯或賜外繇卜式或著外繇成河平元年溝洫志卒治河者為著外繇著謂著於簿籍或除繇文翁傳詔下縣子弟以為學官弟子為除更繇有復其繇役者有復其租稅者有復其身者有復其家者有復一嵗者有復二嵗三嵗者有復十二嵗者有復終身有復後世者此又漢世復除之法也材官車騎樓船漢兵散於郡國各有異習葢不可以一律齊也巴蜀三河潁川則多材官取其才力也髙紀十二年發車騎材官及中尉卒又宣神爵元年發詣金城隴西天水安定則多騎士元鼎六年發平山冦取其習射御馳騎戰陣也西北之地多輕車宣紀本始二年秋發闗東輕車銳士從軍故闗東上郡北地皆有車東南之地多樓船故博昌潯陽會稽諸郡皆有船以至臨淄之弩手見卜式傳荆楚之劒客李陵傳云臣所屯者皆荆楚之勇士竒才劒客也各推其士之所宜而習熟一旦有事以羽檄召天下兵而無有不集事者方其兵之在郡國也則属之都尉每歳八月㑹都試髙紀十一年張晏注郡太守都尉令長咸預各以其方之所習而課殿最焉若騎士既發而不詣屯所則騎士有誅趙廣漢傳太守發騎士馬不適士則太守有貶夫是以郡國之兵教習於平時而征發於有事民有更番之休而將無常權之患然漢之材官騎士輕車樓船四者之兵惟其地之險易而用之故能以我之所長而不䧟於其所短此其所以多取勝也中興之初多戰於兖豫徐宋之郊故夏侯嬰以兵車破李由於雍丘地属陳留兖州灌嬰以車騎破項籍於東城属淮南皆車騎雜用之地也然東阿之敗髙紀秦二年東阿之地属陳留秦以騎將不能勝漢之車垓下之圍地属宿亳間楚以餘卒不能勝漢之騎見髙紀五年則騎之與車歩之與騎其所遇之地固有優劣也至於韓信之伐趙未至井陘而止舍選輕騎二千擊趙王於泜水誠以井陘之險非車騎之所便而彼則能權其地而用之歟伐胡之師多戰於函并河朔之境故霍去病以萬騎出定襄公孫賀以輕車出雲中出武紀又本傳皆車騎雜用之地也然白登之圍属并州太原郡漢以歩卒出匈奴傳不能勝敵之騎李陵之敗漢以用車不能禦敵之兵則騎之與歩車之與騎皆所遇之地固自有優劣也至於衛青之出塞環武剛車以為營縱騎五千擊單于於寘顔城顔山趙信城以武剛之利非塞地之所恃而彼則能權其地而用之歟琅琊以東盡海也車騎歩皆不得而進自嚴助浮海以救東甌而漢始知水戰之為利故武帝遣樓船將軍從兵浮海以擊朝鮮朝鮮傳卒平其地而為郡縣此豈非海道之利於舟乎虢鄧以西盡蜀也車騎舟皆不得進自蕭何請用巴蜀以定三秦而漢始知歩戰之為利故髙帝自南鄭引兵從故道故道係武都出襲雍卒降秦將以有咸陽出本紀此豈非山阪之利於歩乎大率北地利於騎中原長於車江海利舟師而隴蜀宜歩卒各隨其所利而用之晁錯言兵事亦幾於是矣漢南北軍漢京師有南北軍南北二軍同以相伺察周勃以北軍而安劉氏故南北之相制而無偏重之患諸吕用事齊趙合兵西向與灌嬰連和以抗吕氏以見其内有緩急則外足以制之也七國之變京師遣周亞夫將三十六軍以討之不數日而遂定以見其外有緩急則内足以制之也内外相制故無輕重之别刑法志曰髙祖既定天下踵秦而置材官於郡國京師有南北軍之屯至武帝平百粤内増七校外有樓船皆嵗時講肄修武備云所謂南北軍者初未知其果何在也又細攷之光祿勲所掌郎衛執㦸殿下此其在内者也百官表言衛尉掌宫門衛屯兵而漢舊儀云衛尉寺在宫内胡廣云主宫闕之門内衛士於周垣下為區廬則亦在内明矣故諸吕之亂太尉既令酈寄說祿得入北軍然尚有南軍勃令平陽侯告衛尉毋得納相國産殿門故太尉先奪北軍次奪南軍自外及内也江充傳時為直指綉衣充察貴戚近臣多奢侈者令身待北軍擊匈奴即移書光祿勲諸當詣北軍者移劾門衛禁止毋令得出入宫殿詣北軍而不當出入宫殿移劾門衛禁止而必属之光祿勲此又南軍在内者之驗也惟以八校為北軍而八校未置之前史雖不詳載其何者為北軍如太尉之入北軍宋昌之鎮撫南北軍則北軍自漢初置之久矣然以後事攷之如黄霸等京兆發騎士詣北軍馬不適士劾之軍興則漢初北軍之制必各調發畨上也如漢官儀云民二十三為正一嵗為衛士之類是也觀霍光傳發材官輕車北軍五校士不以南軍重之也使北軍果在内南軍果在外則何為不發外兵而發内兵邪漢南兵不輕出故所出者惟北兵多見於史傳則北軍又不得謂之在内矣或曰北軍葢指未央宫殿環衛王宫在長安之内者而言所謂南軍葢指十二城門及三輔所属在長安之外者而言彼惟見劉屈氂傳云上從甘泉來發長水及宣曲胡騎引騎長安而太子在内乃曰召監北軍使者任安發北軍兵夫長水宣曲胡騎既曰北軍則當在長安城内守王宫何為乃云入長安邪觀吾丘夀王傳云上始為㣲行胡騎正屯池陽北至池陽南獵長揚葢胡騎正屯池陽則知胡騎長水所以特在外者正以武帝常在池陽也武帝在外而衛兵亦在外亦何害其為属北軍若以北軍為内南軍為外則無據之甚矣三輔黄圖云中壘屯騎虎賁屯兵越騎長水胡騎射聲八營宿衛王宫是也或謂周勃安劉乃北軍制南軍之效此說得之若謂劉屈氂發三輔近縣兵及長水宣曲胡騎入長安乃南軍制北軍之效則非也葢漢南軍掌於光祿勲衛尉百官表光祿勲有羽林期門之属衛尉掌宫門衛屯兵是也北軍掌於中尉如百官表中壘校尉掌北軍壘門外而中尉属官有中壘李徳裕撰劉洪規碑云漢氏京師有南北軍之屯武帝既平北粤内増七校中尉實司其任是也南軍光祿勲衛尉掌之北軍中尉掌之故胡廣曰衛尉廵行宫中執金吾徼於外相為表裏以擒姦討猾而唐李揆亦云漢以南北軍相制而南軍之在内北軍之在外又何疑焉漢之南北軍正猶唐之南北衙也南衙衛兵是也北衙禁兵是也故攷漢制者當曰宫殿内而郎衛羽林期門兵宫殿外有衛尉兵皇城之中有中尉北軍兵京城之門有十二城門兵中尉徼循京師則又有三輔戍兵中都諸官府有郡縣畨上戍兵則漢兵大畧得之矣葢自髙帝之興櫛風沐雨於鋒鏑間為斯民請命上帝兼天下之謀合天下之勇而始克平之豈其奠天府之安享未央之尊而遽忘兵衛歟此南北軍之屯所以留神軫慮而不敢忽者也想夫營壘星羅儀衛翼張勇敢畢集而戎容壮焉法律昭列而軍政修焉精煆煉之工而戈甲利焉嚴廐牧之令而軍馬備焉國勢以隆主威以强姦心以銷舉積諸此厥後諸吕譸張周勃一入北軍而漢祚之安若泰山而四維自非髙帝創宏逺之規後嗣何以克遵洪業哉傳世四百未之或改而制度益以備具故典領之官則太尉上將軍衛將軍是也分掌之吏則中壘校尉北軍中候之流是也僚属之員則南北皆有軍政與丞天漢中胡建所兼守者是也勞賜之典則當更者上親臨饗之見於寛饒之傳選取之法二年注則民年二十三而用五十六而退見於本紀之注其更休則一嵗為衛士一嵗為材官髙紀二年注其閱習則西京曰都肄東京曰乗之乗之者所以取孫呉六十四陣者也噫亦可謂備矣抑嘗觀髙帝之時其所以治軍修備者不獨南北軍屯而止若蕭何則立武庫者也若韓信則申軍法者也君臣之間用心如此葢其欲得猛士守四方之志常存於胷中則宜其天下既定之後低回顧念分屯並立相與維持不容已也彼唐制之說則言其南北相制而已通典之說則言南如唐之衛兵北如唐之羽林而已或者又以南北迄漢史不復再叙而以為領城門兵者幾是是皆其一端而非髙祖所以飭武備貽謀深逺之意故畧之雲䑓諸將范蔚宗二十八將傳論曰中興二十八將前代以為上應二十八宿未之詳也然咸能感㑹風雲奮其智勇稱其佐命亦各志能之士也議者多非光武不以功臣任職至使英姿茂績委而勿用然原夫深圖逺筭固将有以焉光武監前事之違存矯枉之志雖冦鄧之髙勲耿賈之洪烈分土不過大縣數四所加不過特進朝請而已髙秩厚禮允答元功峻文深憲責成吏職建武之世侯者百數若夫數公者則與參國議分均休咎其餘並優以寛科全其封祿莫不終以功名延慶於後云今以史傳而攷二十八將之功其大者如昆陽之戰邯鄲之戰與夫經畧河北謹守河内之功其他如隴蜀之平赤眉羣盗之捷皆其功之可錄者也如王覇如傅俊之徒則有從擊尋邑昆陽之功如劉植景丹萬修李忠之徒亦有從擊邯鄲平河北之功固守信都以拒王郎而開門迎勞者任光也合漁陽上谷之突騎并軍而南以附漢者呉漢也方帝之朝北征燕趙而河内尚難其守此其任亦重矣惟冦恂以牧人御衆之人給足軍糧率勵士卒雖逺征未嘗乏食則中興之根本於是立矣方帝自薊而還莫知所向且欲以信都之兵西還長安此其機亦危矣惟邳彤力止其行而請奮二郡之兵揚響應之機以平河北則中興之機㑹於是得矣自請北取上谷之兵定彭寵於漁陽取張豐於涿郡還收富平獲索東攻張步以平齊地者耿弇也䧟陣却敵數破羣盗撫劒抵掌以志吕吾之北者臧宫馬武也馮異之討赤眉而三輔以平杜茂之擊盧芳而鴈門以平馬成發㑹稽丹陽等兵以討李憲而江淮以平陳俊之從擊銅馬王梁劉隆之擊誅宋鮪堅鐔擊大槍於盧奴葢延圍劉永於睢陽以樓船數千艘逆流而上而徑破公孫述者岑彭也從馮異以伐蜀而使邊地諸豪悉畔隗囂而來歸者祭遵也敢戰深入則有若賈復先登䧟陣則有若姚期以克定城邑為本不存首級之功則有若朱祐至若禹之深沉大度授以西討之畧而入闗之初三輔之民皆襁負携子以迎王師者日以千數人皆知其為禹之功也而不知其杖䇿渡河之初首論大計而乃有延攬英雄務結民心之語披輿地圖之時開廣帝心而有在徳厚薄不在小大之論任使諸将乃多訪於禹毎有所舉皆當其才此豈諸将所及哉此禹所以獨首於諸將也是以永平之中顯宗慨念舊功乃圖二十八將於南宫雲䑓其外有王常李通竇融卓茂合三十二人夫王常之得預其間者豈非以始事之初首率下江諸將以欲輔漢室乎李通之獲與於此者豈非以南陽騷動之初宻相結約而起兵以相應乎竇融以河西而歸漢能使民之知義卓茂為宻令而示教能使民之知化功亦可紀矣至於馬援聚米以陳隗囂必破之狀守隴西而破先零之功擊武都羗而隴右清凈擊交阯冦而嶠南悉平功非不著也而不與諸臣之次本欲示公適所以為私豈非椒房之故而有所不敢及乎故東平王蒼觀雲䑓功臣圖而獨以伏波為問帝乃笑而不答吁不言之中意可想矣其後安帝永初六年追惟勲烈按圖披籍於䑓紹封二十八將之功臣興亡繼絕之意久而愈加亦顯宗有以先之馬武傳永平中顯宗追感前世功臣乃圖畵二十八將於南宫雲䑓其外又有王常李通竇融卓茂合三十二人故依其本第係之篇末以志功臣之次云爾太傅髙宻侯鄧禹大司馬廣平侯呉漢左將軍膠東侯賈復建威大將軍好畤侯耿弇執金吾雍奴侯冦恂征南大將軍舞陽侯岑彭征西大將軍夏陽侯馮異建義大將軍鬲侯朱祐征虜將軍潁陽侯祭遵驃騎大將軍櫟陽侯景丹虎牙大將軍安平侯盖延衛尉安成侯姚期東郡太守東光侯耿純城門校尉朗陵侯臧宫捕虜將軍楊虛侯馬武驃騎將軍慎侯劉隆中山太守全椒侯馬成河南尹阜成侯王梁琅琊太守祝阿侯陳俊驃騎大將軍參遽侯杜茂積弩將軍昆陽侯傅俊左曹合肥侯堅鐔上谷太守淮陽侯王霸信都太守河陵侯任光豫章太守中水侯李忠右將軍槐里侯萬修太常靈夀侯邳彤驍騎將軍昌成侯劉植横野大將軍山桑侯王常大司空固始侯李通大司空安豐侯竇融太傅宣徳侯卓茂漢唐備禦之䇿漢待匈奴之䇿其畧有四而君子獨有取於孝文帝唐待匈奴之䇿其失有四而君子猶有取於太宗班固云自漢興以至於今其於匈奴有修文而和親者矣有用武而克伐者矣有威服而臣畜者矣然其大要不過兩科縉紳之儒則守和親介胄之士則言征伐以愚觀之皆未得其要也髙祖自平城之後非不欲一舉而空朔庭然爭攘始定之初民力彫弊思欲逞志而不可得故其勢不得而不用婁敬之䇿然以正朔之所不能加而乃欲以甥舅之好覊縻之此其䇿之失也孝武設馬邑之謀誘匈奴而邊備自是而始開鴈門之兵未已而雲中之屯又遣至於衛霍絕漢之師竭中國之力奮於一擊而士馬物故至於大半海内虚耗實自此始至其甚也又從事於烏孫大宛之間開西域以斷匈奴之右臂匈奴之勢未衰而中國固已疲弊矣此其䇿亦未為得君子尚取於漢唐自晉陽始興之初在亟於得志於是屈意外助而借師於突厥姑欲成一時之功而不顧其後此其失一也開元天寳之間吐蕃最盛而中國未易以遽屈也而𤣥宗乃從事邊功輕舉妄動以取石堡城拓境千里似若可喜未幾戎馬入冦境偃然而復取之邊事自是不寧矣其後王忠嗣雖以持重安邊為䇿而哥舒翰復邀功於石堡安能使彼貼然而不較哉此其失二也范陽之變直至長安而兩京卒以不能守勢固熾矣然以李郭之將而用李泌直𢷬范陽之䇿何慮不濟而乃復踵前轍邀回紇以進討彼得以窺我矣自是邀索無已卒為唐世大患此其失三也朱泚涇原之變以渾瑊李晟之徒制之有餘力矣憲宗倉皇無䇿輕許以地而求叶謀以助及奉天之難息而吐蕃之禍作矣至於劫盟平凉以間踈名將變詐反覆而中國無一日之寧李泌最善為謀者自謂能不勞中國之兵而使吐蕃自困及觀其䇿而大要結回紇以殺吐蕃之黨與招雲南以斷吐蕃之右臂亦出於一時不得已之謀抑不思借回紇以制吐蕃則他日回紇之患亦一吐蕃也此其失四也君子又何取於唐惟漢文之時雖曰未免和戎而留意邊備今年幸代明年幸雍無嵗不為自備之計躬被戎服親御鞍馬從六郡良家子材力之士馳射上林講習戰陣以作天下勇銳之氣聚天下精兵於廣武以固中國不可犯之勢顧問馮唐慨想頗牧以属意於守邊之將愚是以知其得備戎之䇿太宗在唐慨然有雪恥酬百王之志滅突厥俘頡利斥地山隂至於大漠而又命將四出東馳西騁無不如意命君集以滅髙昌而西北邊之地極於至逺復命道宗以滅延陀而回紇諸國悉稽首而請命親幸靈武以受降敵而得以伸其上報於古之意愚是以知其得禦戎之䇿夫自古待夷狄不出二䇿養武於内則有備戎之䇿伸威於外則有禦戎之䇿是以中國之計不出於守則出於戰所謂備戎者固一䇿也不容以自安於守則所謂禦戎者亦一䇿也待夷狄不出此二䇿然而文帝在漢惟知所以守而不知所以戰太宗在唐惟知所以戰而不知所以守猶未免得其一說惟今日擇將備邊屯田積榖以養中國不可犯之勢厲兵秣馬分兵教戰以乗夷狄可乗之勢用之於守則文帝備戎之䇿也用之於戰則太宗禦戎之䇿也兼漢唐之所長而並用之正今日事也又嘗反覆而論之漢之待匈奴有過於唐而唐之待匈奴未及於漢兵法曰先為不可勝以待敵之可勝漢之孝文猶知有自備之說也唐之所以為備也果何如哉觀貞觀盛時分處降羌以處塞下單于瀚海皆置都郡此固太宗勝羌之後其勢不得不出於此本非守禦中國之善䇿也唐惟不知所以為備戎之䇿故終唐之世雖從事於戎狄而卒不能得其要領彼其習見太宗之時不過於禦戎之䇿耳而不知所謂先為不可勝之計是以唐史臣於突厥傳惟叙不言太宗禦戎之功而惟叙謀臣内備之說如劉貺謂周得上䇿則取其恵中國以綏四方之意至其論漢則曰能移其財以賞戍卒則民富移其爵以餌守臣則其将良此劉貺備戎之䇿為可取也杜佑謂闗中鄭白二渠溉田數萬頃能復兩渠之饒屯田富力則河隴可復杜牧謂兵不見練事不責實賞厚罰輕將不專任於是有五敗之說攷其為意亦汲汲於自治矣此二杜備戎之䇿為可用也孫權論南詔羣蠻謂宜度要害募卒以守相地分屯春耕夏蚕以資衣食秋冬嚴壁以待冦此孫權備戎之䇿為可用也然則唐末未嘗無䇿特其所用者不出此耳吁此唐之所以不及於漢也宋朝撫馭夷狄之規誠可以上繼有周之䇿澶淵之役契丹傾國入冦眞宗聽冦凖征伐之䇿親御鞍馬兵鋒未交而羌人已折北不支退而請和眞宗不拒也寳元中西夏擾我北鄙韓范二公實任經畧之責兵戎爰興功緒随見迨乎慶厯之時夏人納欵仁宗終不加怙終之刑而許之自新且加以幣賜由是觀之祖宗之時備禦之方積習於閑暇之時而應變於隨機之際可戰則戰可和則和不使勢之在彼常使權之在我是豈有漢唐一偏之失哉羣書考索後集卷四十八
