body:
  text: 羣書考索續集卷九宋章如愚編經籍門周禮周禮周公所制陸曰周禮者周公所制也漢河間獻王開獻書之路時有李氏上周官五篇失冬官一篇乃購千金不得取考工記以補之是為周禮釋文序辨居攝所制之書釋曰云周公居攝而作六典之職謂之周禮者按禮記明堂位云周公攝政六年制禮作樂頒度量於天下又按書𫝊亦云六年制禮作樂所制之禮則此周禮也又云而作六典者下文太宰之職掌建邦之六典天官治典地官教典春官禮典夏官政典秋官刑典冬官事典是六典之職也正義辨周禮所載之詳鄭伯謙曰周公之經理周家也其兵農以井田其取民以什一其教民以鄉遂其養士以學校其建官以三百六十其治天下以封建其威民以五刑大本既立然後其品節條目日夜講求而增益之其上則六典八法八則九柄九貢九賦九式之序其次則祭祀朝覲冠昏喪紀師田行役之詳下至於車旗圭璧之器梓匠輪輿之度與夫畫繢刮摩磚埴之法又其細者則及於登魚取龍擉鱉之微無不備具後之欲講明周家之制者其於周公之書考之篇名異見七處其周禮見於周籍其名異者見有七處按孝經說云禮經三百一也禮器云禮經三百二也中庸曰禮儀三百三也春秋說云禮經三百四也禮說云正經三百五也周官外題謂為周禮六也漢書藝文志云周官經六篇七也七者皆云三百故知俱是周官三百六十舉其大數而云三百也正義周官分合兼攝先王設官分職最當詳考謂其錯綜互見不可倫類而又有截然一定不可易者如大司冦之屬自朝廷之獄大司冦小司冦士師掌之六遂之獄遂士掌之六鄉之獄鄉士掌之甸稍縣封之獄縣士掌之邦國之獄方士掌之四方之獄訝士掌之凡此謂其皆獄訟事故雖在鄉之外如甸稍縣封外而邦國逺而四方皆屬之司冦其他則不然既有司徒以統民掌鄉遂而掌疆之屬又分之司馬其間分畫職掌若此者衆又所宜深究也其設官之大數雖曰三百六十然職事員數不止此而已也以天官考之凡卿大夫命士三百五十餘人地官除鄉遂山虞林衡司關司門不可考尚四百餘人春夏秋三官凡五百餘人凡六官中大略以春夏秋官為凖以多乘少皆以五百人為額則凡三千人矣其間兼攝必相半矣何者先王因事以命官作史者因官以分職以三公六卿論之如二卿必公一人六卿各掌其職宜若不成兼而成王時周公以公兼冡宰召公以公兼宗伯蘇忿生以公兼司冦故書洛誥曰司徒司馬司空也成王將崩召太保奭芮伯彤伯畢公衛侯毛公則是六卿中召公毛公畢公亦上兼三公矣由是推之先王之制其職則不可廢其官亦未必一一有舉其大略而言則土訓誦訓無它職事掌葛掌染草人角人羽人之類止徴一物則其無事時亦多矣軍司馬與司馬行司馬戎僕戎右有軍旅則用之甸祝田僕有田獵則用之有喪紀則用夏采有盟詛則用詛祝建邦國則用土方氏逺方民來則用懷方氏先王豈以祿無用之官而待有事然後用之哉亦於臨事兼攝耳盟府命士也而太公兼之所兼謂載在司盟而太師職之是也作禮者以其不可廢故各設其官職以待智者决擇爾又六卿每卿內治一官外兼一鄉而周官每鄉卿一人每官卿二人若是者皆非事實也周官文不可行今之𫝊周禮曰周公相成王致太平之書考其官師之屬至射惡鳥殺蛙鱉皆有族然太平之功若是微猥煩細而後立耶觀今末世之官俚名曲號猶不能至之甚豈𫝊之非真乎惡鳥之不射蛙鱉之末殄於太平之功宜可損益視其文類若煩而不可舉非於簡治有未盡哉抑徒為其文而不施於事耶荆璞集辨周官立法之善有周官馭吏之法則天下無惰吏有周官治兵之法則天下無惰兵有周官勸農之法則天下無惰農自六典掌於太宰而官無曠職自九法嚴於司馬而兵無虛數自井田制於司農而民之不農者亦寡矣周官職屬煩多周官六屬其職三百六十而員數則多如六鄉七萬五千家耳自比長以上卿大夫一萬八千餘人此大可怪學者每非之而疑其說抑序官之妄耶然鄉州黨族比皆有職又不可闕者則守其官者何等人也辨周官統屬之數周官三百六十六卿分職各率其屬一曰天官冡宰二曰地官司徒三曰春官宗伯四曰夏官司馬五曰秋官司冦六曰冬官考工邦治則掌之冡宰而率其屬自太宰小宰以下則六十有二焉邦教則掌之司徒而率其屬自大司徒小司徒以下則七十有四焉邦禮則掌之宗伯而率其屬自大宗伯小宗伯以下則有七十焉邦政則掌之司馬率其屬自大司馬小司馬以下則六十有八焉邦刑則掌之司冦而率其屬自大司冦小司冦以下則有六十五焉以至冬官考工記雖事實零落考其大槩工人之屬則二十有九焉合而記之則三百六十有五焉又六鄉之吏自鄉大夫卿至于比長下士凡一萬八千九百三十六人府史胥徒不在其數周官鄉遂無法周公致太平六年反政成王今可見者六官之典也建國之法畫為鄉遂自大夫至其長厥職事聞歲時登斂于王家教帥于民里皆何事耶采地三等邑於畿者豈復有數乎列卿六考佐其事者豈復有名乎司徒之屬命以鄉者皆别置則疑於無法司馬之吏取於鄉者皆兼官則詳夫不合書序周公為師召公為保而師氏保氏非輔弼之任周道如砥其直如矢而逺郊近郊殊內外之賦何也荆璞集辨州鄉之長皆鄉官司馬之吏取於鄉官皆兼官則悼夫不合司馬之序自軍將至於伍長凡六等軍將也師帥也旅帥也卒長也兩司馬也五長也皆比閭族黨州鄉之官也故司馬之職中夏苃㑹辨號名之用帥以國名縣鄙各以其名鄉以州名鄭氏之說以帥謂軍將及帥師旅師至伍長也縣鄙謂縣正鄙師至鄰長也鄉謂州長至比長也其兼官可知矣夫三代之制居則民出則軍各親其吏豈有不合者哉鄭伯謙文辨鄉遂用下士為長鄉遂自大夫至所長厥功可得聞歟考地官之序鄉大夫則每鄉以卿一人為之一鄉之間又有比閭族黨州州長中大夫為之也黨正下大夫為之也族師上士為之也閭胥中士為之也比長下士為之也此鄉官也遂大夫每遂則以中大夫一人為之一遂之間又有鄰里酇鄙縣縣正下大夫為之鄙師上士為之酇長中士為之里宰下士為之鄰長五家則一人為之此遂官也鄉官之比長以下士為之而遂官之鄰長不言下士者蓋尊卑之差也何哉卿大夫鄉官差次而下至於比長自然用下士矣遂大夫止中大夫之官差次而下至於里宰已用下士則鄰固不得用下士也蓋以未命之士為之也錢文子文鄉遂都鄙之法周制鄉遂用貢法故十夫有溝長底是十方底是百長底是千方底是萬都鄙用助法故八家同井鄉遂則以五為數家出一人為兵以守衛王畿役次必簡故周禮中惟挽匶則用之此役之最輕者都鄙則以四起數六七家始出一人故甸出甲士三人步卒七十二人馬四匹牛十二頭鄉遂所以必為溝洫而不為井者即欲起兵數故也五鄙五鄰五伍之後變文言四里四兩者用四則成百之數復用五則竒零不整齊矣如曰周制皆井者此欺人之說不可行也文公經說周官為治之煩歐陽曰周之治迹所以尤詳見於後世者周禮著之故也然漢武以為讀禮不驗之書何休亦云六國隂謀之說何也然今考之實有可疑者夫內設公卿大夫下至府史胥徒以相副二外分九服建五等差尊卑以相統理此周禮之大略也而六官之屬略見於經者五萬餘人而里閭縣鄙之長軍師卒伍之徒不與焉王畿千里之地為田幾井容民幾家王官王族之國無幾數民之貢賦幾何而又容五萬人者於其間其人耕而織乎如其不耕而何以給之夫為治者固若是之煩乎此其可疑者也六一文周官體制難行歐陽曰秦既非古盡去古制自漢以後帝王稱號官府制度皆襲秦故以至於今雖有因有革然大抵皆秦制也未嘗有意於周禮者豈其體大而難行乎其果不可行乎夫立法垂制將以遺後也使難行而萬世莫能行與不可行等爾然則反秦制之不若也脫有行者亦莫能興或因以取敗王莾後周是也則其不可用决矣此又可疑也同前辨周禮可致太平有公輸之巧而後可以施斫削之功有王良之銜轡而後可以誇馳騁之工有周官六典之書而後可以致太平之治辨周禮王道之極文中子魏相篇曰子家君未嘗廢周禮門人問子子曰先師以王道極是也如有用我執此以往通也周之介也敢忘其禮乎周禮之書不可信蘇曰言周公之所以治周者莫詳於周禮然以吾觀之秦漢諸儒以意損益之者衆矣非周公之全書也何以言之周之西都今之關中也其東都今之洛陽也二都居北山之陽南山之隂其地東西長南北短短長相補不過千里古今一也而周禮王畿之大四方相距千里如畫棊局近郊逺郊甸地稍地小都大都相距皆百里千里之方地實無所容之故畿內逺近諸法類皆空言爾此周禮之不可信者也蘇欒城文辨六典之文難及李曰昔劉子駿鄭康成皆以周禮為周公致太平之迹而林碩謂末世之書何休云六國隂謀然鄭義獲申故周官遂行切觀六典之文其用心至悉如天焉有象者在如地焉有形者載非古聰明睿智誰能及此其曰周公致太平者信矣荆璞集六官法天地四時釋曰六官之屬三百六十象天地四時日月星辰之度數天道備焉成王作周官其志有述天授位之義故周官設官分職以法之辨六官探伺本末治教禮政刑事謂之六官治非天事謂之天官治以道為本也教非地事謂之地官教以化為本也禮以仁為本故禮曰春官政以禮為本故政曰夏官刑以義為主故刑曰秋官典以智為主故事曰冬官本末相因先後相應故則更新終則復始天地四時之道也聖人之立六官蓋法天地四時理治萬事者也然治有本末不知其本則不能起用以應物不事其末則不能反本以復道先王於是以官探本以司伺末治官曰天而以道為本教官曰地而以化為本禮官曰春而以仁為本政官曰夏而以禮為本此之謂探本教官謂之司徒而教以徒為末政官謂之司馬而政以馬為末刑官謂之司冦而刑以冦為末事官謂之司空而事以空為末此之謂伺末有本有末未嘗偏廢此先王之治所以為大備歟王昭禹辨漢儒臆說之非成王言六卿所治之職何嘗以配天地四時今以冡宰曰天官而天事反在春官乃曰天取兼總之義天之至尊惟萬乘可稱曰天王曰天子豈人臣而稱天乎司徒謂之地官愈無義古者司徒掌以教人倫今乃掌土地之事是乃司空掌土也非司徒掌教也宗伯掌禮謂之春官春者物之生五行以象仁今謂之禮以禮豈能生物也哉司馬掌兵而謂之夏夏方物之盛反用兵乎惟司冦掌刑謂之秋官猶可矣司空掌土謂之冬官又無理也使成王有取於天地四時則書言之矣既不言所取必無義則漢儒臆說可知也六官首序不同釋曰自惟王建國至以為民極五句六官之首同此序者以其建國設官為民不異故也王者臨統無逺故首稱惟王明事皆統之於王王既位矣當擇吉土以建國為先故次言建國於中辨四方正宫廟之位復體國經野自近及逺也於是設官分職助理天工衆人取中以為治體列文先後次第應爾其實建國之初豈未設官分職也直以作序之意主在設官分職為民極耳辨六官皆為民立王昭禹曰六官之首皆於以為民極之後言乃立某官者蓋乃者有以彼而繼以此之辭先王之立官凡以因彼民故也然言乃立天官而不謂之建者蓋立乎上者能大而發下立乎下者能一而承上則立者能得位而已非若建則能作而立之也六官職掌互見太宰以六典佐王治邦國以八法治官府以八則治都鄙以八柄詔王馭羣臣以八統詔王馭萬民以九職任萬民九賦斂財賄九式均節財用九貢致邦國之用司㑹掌六典八法八則八柄九貢九賦九功九式司書掌六典八法八則九職九正九事山師掌山林之名辨其物與其利川師掌川澤之名辨其物與其利害而頒之于邦國六官互相參錯鄭曰周官率屬互相參錯如太史而下掌六典八法八則八柄之二宜屬於天官而乃屬於春官司勳掌六卿之賞地宜在地官而乃屬於夏官大行人小行人司儀掌客宜在春官而乃屬於秋官大僕掌諸侯之復逆小臣掌王公及孤卿之復逆御僕掌羣吏之復逆及庶民之復逆夫民臣復逆宰夫既已掌之則太僕而下宜屬之天官今乃屬之夏官地官掌邦畿之事凡造封邑建社稷設封疆分州里司徒既掌之矣而掌固司險掌疆候人乃屬於夏官如理財事自大府至掌皮盡𨽻於天官則凡財用宜悉領於大宰而泉府廩人倉人乃見於地官自膳夫至臘人不過充君之庖爾而悉領於冡宰至於外朝則百官之廪祿府史胥徒稍食畨上宿衛之廩給其費實廣而外內朝之冗食亦見於地官之槁人自內司服至屨人凡王宫服飾之用既屬於天官而司服掌外朝之服司常巾車之官則屬於禮官如使各得行其意而不關於冡宰是猶太祖之三司使以河渠按付之都水監甲胄按付之軍器監恐無以樽節之稱官之名義釋曰周禮之內宗伯之類諸言伯者伯長也以尊長為名縣師之類言師者皆取可為法也諸稱人者若輪人車人臘人鱉人之類即冬官鄭云其曰某人者以其事名官言氏者有二種謂若桃氏為劒築氏為削之類鄭注冬官族有世業以氏名官若馮相氏保章氏師氏保氏之類鄭注引春秋官有世功則有氏族是也諸稱司若司裘司市之類言司者皆是專任其事事由於已故以司言之也諸典婦功典絲典枲之類言典者出入由已課彼作人故謂之為典也諸稱職者謂若職幣職內職歲財不久停職之而已凡云掌者有三義一如他官供物已則暫掌之而已若幕人供帷幕幄帟掌次待張事是也二則掌徴斂之官若掌皮掌染草之類是也三則掌非已所為則掌節掌固掌疆本非已造廢壞修之而已也序官之義有二釋曰凡六官序官之法其義有二一則以義類相從謂若宫正宫伯同主宫中事膳夫庖人外內饔同主造食如此之類皆是類聚羣分故連類序之二則凡次序六十官不以官之尊卑為先後皆以緩急為次第故此宫正之等士官為前內宰等大夫官為後也嵗時教帥民里所謂教者大司徒以鄉三物教萬民而賔興之鄉大夫頒司徒之教法于鄉吏使各以教其所治州長屬民讀法勸其行義戒其過惡黨正讀邦法以紏戒其民族師讀邦法以書其孝弟睦姻有德者閭胥讀法書其恭敏任恤者所謂帥者如鄉大夫於大詢之時帥衆寡而致於朝州長於作民之時則帥而致之黨正嵗終帥吏而致事族師於萬民之時帥四閭之吏是也六官皆有考釋曰宰夫是太宰之考謂若地官之考為鄉師春官之考為肆師夏官之考為軍司馬秋官之考為士師冬官之考為匠師辨官考皆謂之師王昭禹曰治官之考謂之宰夫政官之考謂之軍司馬而於教官則謂之鄉師禮官則謂之肆師刑官則謂之士師者蓋宰夫則因大宰而名之而考治者宜以智帥人故曰宰夫軍司馬則因大司馬而治之而考政者特以軍為主故曰軍司馬師所以教之而教官所考者止於六鄉之教事故曰鄉師至於禮也刑也無非所以教也故亦皆謂之師先王因事以名官各有攸趣爾周公所立條貫周禮一書周公所以立下許多條貫皆是從廣大心中流出文公語録是周公意思周禮畢竟是出於一手謂是周公親筆做成固不可然大綱却是周公意思可見周家法度周禮一書好看廣大精密周家法度在焉但未敢令初學看建太平之基本今謂周官非聖人之書至如比閭族黨之法正周公建太平之基本也為一代之法周禮一書聖人姑為一代之法爾到可用處聖人須别有權變之道並同上禮天官看天官太宰天官之職須襟懷洪大方看得蓋其規模至大若不得此心欲事事上致曲窮究湊合此心如是之大必不能得也釋氏錙銖天地可謂至大然不嘗為大則為事不得若畀之一錢則必亂矣又曰大宰之職難看蓋無許大心胸包羅記得此復忘彼其混混天下之事當如捕龍蛇摶虎豹用心力看方可其他五官便易看止一職也伊川遺書天官象天所立鄭云象天所立之官天者統理萬物天子立冡宰使掌邦治亦所以總御衆官使不失職不言司者太宰總御衆官不主一官之事也通釋曰周天有三百六十餘度天官亦總攝三百六十官故題曰天官也辨冡宰職關天人鄭曰或問冡宰一官其屬六十顧未始有一事之關乎天者而冡宰謂之天官何也曰此加官也唐虞官百凡天地之運化四時之作訛成易事之關於天者羲和職之教化禮樂之要兵刑財榖之司虞工納言之職事之係於人者九官分治之事有其官官有其職十有五人之職所以分天下之萬事而治之者也辨天官之責甚深古之大臣凡論道經邦以轉移人主之心術而釐正天下之萬事者皆寅亮之理也皆對時育物撫五辰而熙庶績者也是故日月之薄蝕百川之沸騰詩人所以刺卿士榖洛之鬭太子晉亦以歸咎於執政焉和同天人之際使之無間然者雖聖人之能事而大臣實輔佐之其誰曰人事之非天理也加天官於冡宰之上其尊大臣也雖至其所以責大臣也蓋深天官先後之次釋曰自太宰至旅下士總馭羣職故為上自此宫正已下至夏采六十官隨事緩急為先後故自宫正至宫伯二官主宫室之事安身先須宫室故為先也自膳夫至臘人皆供王膳羞飲食饌具之事人之處世在安與飽故食次宫室也自醫師已下至獸醫主療疾之事有生則有疾故醫次食饌也自酒正至宫人主酒飲肴羞之事醫治既畢須酒食養身故次酒肴也自掌舍至掌次安不忘危出行之事故又次之自太府至掌皮並是府藏計㑹之事既有其餘理須貯積或出或內宜計㑹之故相次也自內宰至屨人陳后夫人已下內教婦功婦人衣服之事君子明以訪政夜以安息故言婦人於後也夏采一職記招魂以其死事故於末言之也辨天官叙官不同甸師何以不列地官以共野之薦又給薪蒸故次亨人之下凌人藏氷何以不同豳法按周之二月夏十二月取氷周三月夏正月藏之周四月夏二月頒之藏之既晚出之又早以豳土寒故不於一月也凌人以夏十二月藏氷曰之二月頒氷也大府玉府何以不列冬官八政一曰食二曰貨大府掌賄故次飲食玉府治玉掌王后首服故與大府同列天官奄何以爵內小臣稱士以賢近侍為之也冡宰職不言司鄭注曰天子立冡宰使掌邦治亦所以總御衆官使不失職不言司者太宰總御衆官不主一官之事也辨不言司有二義釋曰鄭云不言司者太宰總御衆官不主一官之事此官不言司對司徒司馬司冦司空皆云司以其各主一官不兼羣職故言司此天官則兼攝衆職故不言司也若然則春官亦不言司者以其祭祀鬼神鬼神非人所主故亦不言司也三公無正職釋曰按成王周官立太師太傅太保茲惟三公亦是公有三人之事云三公者內與王論道者成王周官云茲惟三公論道經邦考工記云坐而論道謂之王公鄭雖言天子諸侯宫中亦舍三公是其內與王論道也云中參六官之事者按書𫝊云天子三公一曰司徒公二曰司馬公三曰司空公彼注云周禮天子六卿與太宰司徒同職者則謂之司徒公與宗伯司馬同職者則謂之司馬公與司冦司空同職者則謂之司空公一公兼二卿舉下以稱是其中參六官之事云外與六鄉之教即此經是也云其要為民所以屬之鄉焉者三公無正職是以三百六十官之中不見三公之任惟此六鄉之內而言三公故云屬之鄉焉辨三公分主六鄉王曰老子曰容乃公公乃王則公者爵爵盛大而其德與王同矣鄉老公也尊之於鄉憲其言行而不纍以事故稱老焉禮賔賢能而獻其書於王王再拜而受之則為道之存故也故以鄉老帥其事鄉老於司徒之官非屬而無職則以事道者尊職事者卑故也然鄉老位卿而公一人則三公分主六鄉矣書曰三公官不必備惟其人則三公一人有時而兼掌六鄉矣辨鄭氏兼官之說三公官不列其職兼之師氏保氏三公無職也鄭氏於師氏保氏序官則曰周公為師召公為保相成王為左右聖賢兼此官謂三公之職下兼師氏之官此說非矣三公取上公九命之職也師氏之職中大夫為之耳保氏之職下大夫為之耳既曰大夫為之而以公兼之則周公設官為虛名也故曰此說非也內宰統御內治內宰下大夫二人命士十二人自內小臣㑹竪凡將命灑掃之人自九嬪御婦祝史凡內官自典婦功服飾織經凡治內之命士皆屬焉而𨽻於冡宰蓋女寵近習所以移人主之德大臣總之則無得踰節詩稱皇父作相膳夫內史皆得人巷伯之雅詩人雖奄官亦吝其選晉侯近女而惑醫和以為趙孟之咎古人致君二南之化其道由此東周宰職不競春秋首書咺賵妾甚者三公逆后其何足以正王閫乎玉府內府分職玉府內府所掌金玉兵器凡良貨賄一也而分為二官何哉蓋玉府所掌皆式財所作及獸人魚人所入之物専以供王玩好賜豫耳邦之大用不與焉內府所掌乃九貢九功之貨賄及諸侯所獻國珍皆公家之物以供邦之大用故不可不分為二也辨三府供貢之非胡宏曰四方職貢各有定制無非王者之財不可有公私之異今大府乃以式貢之餘才以供玩好之用不幾有如李唐之君受裴延齡之欺罔乎玉府乃有王之金玉好貨兵器不幾如漢靈置私庫者乎內府乃有四方金玉之齒革良貨賄之獻而供王之好賜豫不幾如唐受四方之羡餘者乎府史胥徒有無釋曰周禮之內府史大例皆府少而史多而府又在史上唯有御史百有二十人特多而在府上鄭云以其掌贊書數多也又有府兼有史以其當職事繁故也或有史而無府者以其當職事少得史即足故也至於角人羽人等有府無史以其當職文書少而有稅物須藏之故直有府也臘人食醫之等府史俱無者以其専官行事更無所須故也周禮之內唯有天府一官特多於史以其所藏物重故也周禮上下文有胥必有徒胥為什長故也臘人之類有徒無胥者得徒則足不假長帥故也食醫之類胥徒俱無者以其專官行事不假胥徒也辨府史胥徒非王臣釋曰言王臣者自士以上得王簡策命之則為王臣也府史胥徒不得王命官長自辟除者非王臣也辨府史胥徒之職王曰府掌官契以治藏史掌官書以贊治胥掌官叙以治叙徒掌官令以召令蓋有藏則置府有書則置史有召令之事則置徒有徒則置胥胥以統徒一胥而十徒從之謂之胥則以其賤而在下亦能養人也謂之徒則以其尤卑而行趨走以供役也王后參預外事王后有好事于四方則使往有好令於卿大夫亦如之胡宏曰婦人無外事以貞潔為行若外通諸侯內交羣下將安用君者夫人臣尚無境外之交曽謂王后可乎殊不知先王之政王后相成未嘗無外事也按禮天子享諸侯有王后亞獻之禮上公來朝夫人致八壺八方八豆膳大牢致享大牢侯伯來朝亦如之子男來朝夫人致禮六壺六豆六籩未始不接羣臣諸侯也好命其可嫌乎宫正內宰獨均稍食天官一官惟宫正內宰獨均其稍食它有司不言周宫朝之序內有六宫外有三朝三朝之外又有九式九法朝焉六宫之外有九室九卿居之六宫之內有九室九嬪居之自六宫而外凡治朝之官皆宫正掌之自六宫之內凡宫禁之官皆內宰掌之所以稍食必二人均分以此考先王之世百官宫衛之賤宫正內宰各受其財分之所屬序官與分職之辭異王曰大宰佐王治邦國序官曰佐王均邦國蓋治則謂之而已未至於均也王之於邦國非特治之而已又以道均之則均邦國者王之事非治典之書所能及也及其帥屬以佐王然後可以言均焉禮地官地官象地所立鄭云象地所立之官司徒主衆徒地者載養萬物天子立司徒掌邦教亦所以安擾萬民釋曰既言象地所立則此六十官皆法地與天官言象天義異矣辨地官所立次天官鄭曰天職生覆而為萬物之所資始者主乎道地職形載而為萬物之所資生者主乎化治無所不覆而以道為本故掌治者謂之天官教無所不載而以化為本故掌教者謂之地官天覆則無為而尊父道也地載則有為而親母道也故一曰天官而地官次之五教十二教之别司徒因民之常而施十有二教焉一曰以祀禮教敬二曰以陽禮教讓三曰以隂德教親四曰以樂禮教和五曰以儀辨等六曰以俗教安七曰以刑教中八曰以誓教恤九曰以度教節十曰以世事教能十有一曰以賢制爵十有二曰以庸制祿教所以親百姓訓五品有虞氏五而周十有二焉辨周亦有五教有虞氏五而周十有二焉者有虞氏五即舜典所云敬敷五教又文十八年云舜臣堯舉八元使敷五教于四方父義母慈兄友弟恭子孝是也而周十有二者據司徒之職云一曰以祀禮教敬以下是也按成王周官云司徒敷五典擾兆民則周亦有五教而云至周十有二者鄭據此周禮之文言十二以對於虞其實立中雖不含十二亦含有五鼓人六鼓之用釋曰云六鼓四金之音聲者六鼓四金與音聲和合故連音聲也云以節聲樂者下云雷鼓靈鼓路鼓晉鼓皆是也以和軍旅者下云以鼖鼓鼓軍事是也云以正田役者下云以鼛鼓役事是也田狩所以習戰則田鼓當與軍事同按大司馬云王執路鼓諸侯執賁鼓軍將執晉鼓之等是也辨六鼓之用無定制王曰六鼓之用其所主雖如此變而通之則亦有時而不同故路鼓賁鼓有施於軍者若大司馬教戰而王執路鼓諸侯執賁鼓軍將執晉鼓是也路鼓又有施於朝政者若大僕建路鼓于大寢門之外待逹窮與遽令是也賁鼓有施於金奏者若靈臺之詩曰鼖鼓惟鏞是也由此觀之則義設於適斯可矣豈若膠柱調瑟然哉載師任地之法載師掌任地之法有㕓里有埸圃有宅田士田賈田有官田牛田賞田牧田有公邑家邑之田有小都大都之田且國有四民農之受田無疑矣惟工商之受田初無明文而二鄭之釋周禮則有異同之議先鄭謂士大夫之子得而耕之田也賈田吏為縣官賣材者與之田也後鄭則引漢食貨志之言謂農民户一人已受田其家衆男為餘夫亦以口受田如此士工商家受田五口乃當農夫一人據後鄭之意則直謂賈田為商賈之家所受田也豫以為不然夫四民不相易業亦不相雜處其來久矣四民之中自農之外惟士為然田蓋使之耕且養也果如後鄭之言以賈為商賈之賈則工商一也何載師獨載賈田而不言工田乎嗟夫王者之所重者農民也所輕者末作也田不耕者出屋粟宅不毛者出里布莫非設輕重之法使民知農之為優而工商之不足事也今使為工者得以器械易粟而復受田焉則誰不為工乎使為商者日中而市交易而退而復受田焉則誰不為商乎然則載師無商田工田之明文而後鄭必為之說豫以為深沒先王重本抑末之意畎澮溝洫之制注曰十夫二鄰之田百夫一酇之田千夫二鄙之田萬夫四縣之田遂溝洫澮皆所以直通於川也遂廣深各二尺溝倍之洫倍溝澮廣二尋深二仭徑畛塗道路皆所以通車於國都也徑容牛馬畛容大車涂容乘車一軌道容二軌路容三軌都之野塗與環涂同可也萬夫者方三十三里少半里九而方一同於南畝圖之則遂從溝橫洫從澮橫九澮而川周其外焉去山陵林麓川澤溝瀆城郭宫室涂巷三分之制其餘如此以至于畿則中雖有都鄙遂人盡主其地辨遂人匠人之異鄭曰遂人匠人溝洫之制不同鄭氏謂遂人自是井田之制匠人自是溝洫匠人畿內采地之制遂人鄉遂溝洫之制非也周制井田之法通行於天下安有內外之别哉遂人言十夫有溝以直度之也凡十夫之田田首必有一溝以㵼水以方度之則方一里之地所容者九十夫而其間廣四尺深四尺謂之溝則凡一里之內凡四溝矣而旁各一溝中間兩溝遂人云百畝有洫是百畝之地相連屬而同以一溝㵼水以方度之則方十里之成所容者九百夫而其間廣八尺深八尺者謂之洫則方十里之內凡四洫矣兩旁各一洫中間兩洫至於澮亦然若川則非人力所能為也故匠人不為川而云兩山之間必有川焉遂人所云萬夫有川亦大約言之耳大槩甽水㵼於溝溝水㵼於洫洫水㵼於澮澮水㵼於川其縱橫因地勢之便利遂人匠人以大意言之遂人以長言之故曰以逹于畿匠人以方言之故止一同耳井地制田之例按司馬法曰六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為通通十為成成十為終終十為同同方百里又按周禮小司徒職曰九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都康成曰此謂造都鄙也采地制井田異於鄉遂九夫為井方一里四井為邑方二里四邑為丘方四里四丘為甸方八里旁加一里則方十里為一成四甸為縣方二十里四縣為都方四十里四都方八十里旁加十里乃得方百里為一同也又按匠人職曰一耦之伐廣尺深尺謂之甽田首倍之廣二尺深一尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮康成謂井田之制小司徒經之匠人為之溝洫相包乃成全又按遂人職曰夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以逹于畿康成謂十夫二鄰之田百夫一酇之田千夫二鄙之田萬夫四縣之田由是而言是六遂之地所有田也舉六遂則六鄉明矣此制田之例也辨司馬法與周禮不同然司馬法又與周禮之言有異司馬法有步畝夫屋并周禮如之但不别與屋耳司馬法十井為通十通為成周禮則四井為邑四邑為丘四丘為甸一甸旁加一里為成司馬法十成為終十終為同周禮則四甸為縣四縣為都四都旁加十里為同又司馬法止為一制無近逺之殊周禮則三百里以外都鄙為井田鄭云都鄙王子弟公卿大夫采田其界曰都鄙所居也二百里以為鄉遂內十夫百夫千夫萬夫則是殊制矣今亦本周禮為定王賦內外之制孟子曰請野九一而助國中什一使自賦周稅輕近而重逺近者多役也園廛亦輕之者㕓無榖園少利也此周載師之法蓋指畿內而言之若孟子對滕文公之問指周家畿外而言之適與康成匠人之法同也故康成匠人注曰邦國亦異內外之法耳野九一國中什一是外內異也周稅曰徹通野與國中言之則共為什一也宫城大小之制注曰國之所居謂城方也公之城蓋方九里宫方九百步侯伯之城蓋方七里宫方七百步子男之城蓋方五里宫方五百步釋曰此經國家及宫室以九以七以五為節以天子城方十二里而言此九七五亦當為九里七里五里為差矣周禮匠人營國方九里謂天子之城今大國與之同非也然大國七里次國五里小國三里之城為近可也辨匠人九里之非王曰匠人言建國又言營國者謂之建言其始也謂之營言其終也方九里言城中之制以典命考之上公其國家宫室以九為節上公百里之地其城方九里以王畿千里之廣百官之所止舍四方之所湊㑹而城中之制反不同於公殆不然也蓋天子備天數則城中之制宜以十有二里然後其廣足以有容焉謂方九里蓋作記者之誤矣以國服為息注曰有司貸民之物定其賈以與之鄭司農云貸者謂從官借本賈也故有息使民弗利以其所賈之國所出為息也假令其國出絲絮則以絲絮償其國出絺葛則以絺葛償𤣥謂以國服為之息以其於國服事之稅為息也於國事受園㕓之田而貸萬金者則朞出息五百王莽時民貸以治産業者但計嬴所得受息無過嵗什一辨後世法與古異王昭禹曰賖之為民也貸之為國也以其為民故無息焉但各以其物為抵而已以其為國故有息焉而責之以出息必與有司辨而授之則辨其可與而後授之以有司能知其有無故也以國服為之息則各以其所服國事貢物為息也若農以粟米工以器械皆以其所有也孟子曰使民盻盻然將終歲勤動不得養其父母又稱貸而益之夫周之衰不能為民正田制地稅斂無度又從而貸之則凶年饑嵗無以為償而上之人又必責之則稱貸之法豈特無補於民哉求以國服為之息則恐收還其母而不可得也稱貸之法雖存其實異矣羣書考索續集卷九
