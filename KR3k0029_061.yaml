body:
  text: 羣書考索卷六十一宋章如愚撰地理門風俗類漢志云凡民函五常之性而其剛柔緩急音聲不同繫水土之風氣故謂之風好惡取舍動靜無常隨君之情欲故謂之俗孔子曰移風易俗莫善於樂言聖王在上統理人倫必移其本而易其末此混天下一之虖中和然後王教成也堯舜堯舜之時比屋可封畫衣冠而民不犯三代三代之時誰毁誰譽直道而行詩蟋蟀此晉也而謂之唐本其風俗憂深思逺儉而用禮乃有堯之遺風焉禮記曰天子巡狩命太師陳詩以觀民風漢文景五六十載之間移風易俗黎民醇厚史記孝文即位百姓無内外之繇得息肩於田畆天下盛富粟至十餘錢鳴鷄吠犬煙火萬里可謂和樂者乎文帝時百姓遂安自年六七十翁亦未嘗至市井游敖嬉戯如小兒狀唐太宗時外戸不閉行旅不賫糧諸國風俗秦故秦地於禹貢時跨雍梁二州詩風秦豳兩國昔后稷封邰公劉處豳太王徙岐文王作豐武王治鎬其民有先王遺風好稼穡務本業故豳詩言農桑衣食之本甚備有鄠社竹林南山檀柘號稱陸海如海之旡所不出為九州膏腴始皇之初鄭國穿渠引涇水溉田沃野千里民以富饒漢都長安徙齊諸田楚昭屈景及諸功臣家於長安徙髙貲富人與豪傑兼并之家於諸陵故五方雜厝風俗不純其世家則好禮文富人則商賈為利豪傑則遊俠通姦瀕南山近夏陽多險阻輕薄易為盜賊甞為天下劇又郡國輻湊浮食者多民去本就末貴人車服僭上衆庶倣效羞不相及嫁娶尤崇侈靡送死過度天水隴西山多林木民以板為屋室故秦詩小戎曰在其板屋安定北地上郡西河皆迫近戎狄脩習戰備髙上氣力以射獵為先漢興六郡也故秦詩無衣曰王于興師脩我甲兵及車轔駟鐵小戎之篇皆言車馬田狩之事漢興六郡良家子選給羽林期門以材力為官名將多出焉故此數郡民俗質木不耻宼盜水草宜畜放故凉州之畜為天下饒保邊塞三千石治之咸以兵馬為務酒禮之㑹上下通焉吏民相親以是其俗風雨時節谷籴常賤少盜賊有和氣之應賢於内郡政寛厚吏不苛刻之致也巴蜀廣漢本南夷秦并以為郡土地肥美有江水沃野山林竹木疏食果實之饒民食稻魚旡㓙年憂俗不愁苦而輕易滛佚柔弱褊阨景武間文翁為蜀守教民讀書法令未能篤信道徳反以好文譏刺貴慕豪勢及司馬遊宦京師以文辭顯於世郷黨慕循其迹後有王褒嚴遵揚雄之徒文章冠天下由文翁倡其教相如為之師武都地雜氐羌及犍為牂牱越嶲皆西南外夷武帝初開置民俗畧與巴蜀同風而武都近天水俗頗似焉故秦地三分天下之一而人衆不過什三然量其富居什六春秋吳季札觀樂為之歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎魏河南本殷之舊都周既㓕殷分其畿内為三國邶鄘衞是也自紂城北謂之邶以封紂子武庚南謂之鄘以管叔尹之東謂之衞以蔡叔尹之以監殷民謂之三監武王崩三監叛周公誅之盡以其地封康叔號曰孟侯以夾輔王室遷邶鄘衞之民於洛邑故邶鄘衞三國之詩相與同風邶詩曰在浚之下鄘曰在浚之郊邶又曰亦流于淇鄘曰送我乎淇衞曰瞻彼淇澳故吳公子札聘魯觀周樂聞邶鄘衞之歌曰美哉吾聞康叔之徳如是其衛風乎康叔之風既歇而紂之化猶存故其俗剛強多豪傑侵奪薄恩禮好生忿河東土地平易有鹽鐵之饒本唐堯所居詩風唐魏之國也成王㓕唐而封叔虞其民有先王遺教君子深思小人儉陋故唐詩蟋蟀山樞葛生之篇曰今我不樂日月其邁宛其死矣他人是愉百歳之後歸于其居皆思奢儉之中念死生之慮吳季札聞唐之歌曰思深哉其有陶唐氏之遺民乎魏國亦姬姓也在晋之南河曲故其詩曰彼汾一曲寘之河之側呉季札聞魏之歌曰美哉渢渢乎周宗周鎬京洛邑成周也昔姬公營洛邑以為在于土中諸侯藩屏四方故立京師周人之失巧偽趍利貴財賤義髙富下貧喜為商賈不好仕宦韓鄭陳韓分晉得南陽郡及潁川之父城定陵㐮城頴陽頴隂長社陽翟郟東接汝南西接𢎞農得新安宜陽皆韓分也又詩序陳鄭之國與韓同星分焉鄭本周宣王弟友為周司徒食采於宗周畿内是為鄭右洛左泲合溱洧焉土隘而狹山居谷汲男女亟聚㑹故其俗淫鄭詩曰出其東門有女如雲又曰溱與洧方渙渙兮士與女方秉菅兮洵訏且樂惟士與女伊其相謔此其風也吳季札聞鄭之歌曰美哉其細已甚民弗堪也是其先亡乎陳周武王封舜後媯滿於陳是為胡公妻以元女大姬婦人尊貴好祭祀用史巫故其俗尚鬼陳詩曰坎其擊鼓宛邱之下亡冬亡夏值其鷺羽又曰東門之枌宛邱之栩子仲之子婆娑其下此其風也吳季札聞陳之歌曰國亡主其能乆乎潁川南陽本夏禹之國夏人尚忠其敝朴野秦既滅韓徙天下不軌之民於南陽故其俗誇奢尚氣力好商賈漁獵藏匿難制御也宛西通武闗受江淮一都㑹也宣帝時鄭𢎞召信臣為南陽太守信臣勸民農桑弃末歸本即以殷富潁川有都士有申子韓非刻害餘烈髙仕宦好文學民以貪吝爭訟生分為失韓延壽為太守先之以敬譲黄覇繼之教化盛行獄或八年无重囚南陽好商賈召父富以本業頴川好爭訟一韓化以篤厚君子之徳風也小人之徳草也信矣趙中山地薄人衆猶有少丘紂淫亂餘民丈夫相聚遊戯悲歌慷慨起則推剽掘冢作姦巧多弄物為倡優女子彈弦跕蹗游媚富貴徧諸侯之後宫邯鄲北通燕涿南有鄭衞漳河之間一都㑹也其土廣俗雜大率精急髙氣勢輕為姦太原上黨又多晉公族子孫以詐力相傾矜夸功名執仇過直嫁取送死奢靡漢興號為難治擇嚴猛之將或任殺伐為威父兄被誅子弟怨憤至告訴刺史二千石或報殺其親屬代石北迫近胡宼民俗好氣為姦不事農商自至晉時已患其剽悍而武靈王又益厲之故冀州之部盜贓常為他州劇定㐮雲中五原本戎狄地頗有楚衞齊趙之其民鄙朴少禮文好射獵鴈門亦同俗燕武王定殷封召公於燕薊南通齊趙勃碣之間一都㑹也初太子丹養勇士不愛後宫美女民化以為俗至今猶然賔客相過以婦侍宿嫁取之夕男女无别反以為榮其俗愚悍少慮輕薄無威亦有所長敢求急人燕丹遺風也上谷至遼東地廣民稀數被胡宼俗與趙代相類有魚鹽棗栗之饒殷道衰箕子去之朝鮮教其民以禮義田蠶織作嫁取旡所讎是以其民終不相盜旡門戸之閉婦人貞信不淫辟其田民飲食以籩豆都邑頗放效及内郡賈人往往以杯器食郡初取吏於遼東吏見民無閉藏及賈人往者夜則為盜俗稍益薄東夷天性柔順異於三方之外故孔子悼道不行欲浮於海欲居九夷有以也齊少昊之世有爽鳩氏虞夏時有季崱崱仕力反湯時有逄公栢陵殷末有薄姑氏皆為諸侯國至周成王時薄姑氏與四國作亂成王滅之以封師尚父是為太公詩風齊國是也臨淄名營邱故齊詩曰子之還兮遭我乎狃之閒兮又曰俟我於著乎而此亦舒緩之體也吳季札聞齊之歌曰泱泱乎大風也哉表東海者其太公乎國未可量也太公封齊至國修政因其俗簡其禮而人民多歸太公以齊地負海舄鹵少五穀而人民寡迺勸以百工之業通魚鹽之利而人物輻湊後十四世桓公用管仲設輕重以富國合諸侯成霸功身在陪臣而取三歸其俗彌侈織作氷紈綺繡純麗之物號為冠帶衣履天下初太公治齊脩道徳尊賢智賞有功故至今其土多好經術矜功名舒緩濶達而足智其失矜奢朋黨言與繆虚詐不情急之則散緩之則放縱初太公始封周公問何以治齊太公曰舉賢而上功周公曰後世必有簒弑之臣後為強臣田和所滅後又為秦所滅魯周以少昊之墟曲阜封伯禽為魯侯以為周公主其民有聖人之化孔子曰魯一變至於道言近正也洙泗之教其民渉渡㓜者扶老而代其任俗既益薄長老不自安與㓜小相譲故曰魯道衰洙泗之間齗齗如也孔子憫王道衰乃修六經以述唐虞三代之道弟子受業而通者七十二人是以其民好學尚禮義重㢘耻伯禽受封之魯三年而後報政周公曰何遲也伯禽曰變其俗革其禮故遲太公問何以治魯周公曰尊尊而親親太公曰後世寖弱矣故魯自文公以後禄去公室政在大夫季氏逐昭公陵夷微弱二十四世為楚所滅然本大國故自為分野今去聖乆逺周公遺化消微孔氏庠序衰壊地狹民衆頗有桑麻之業亡林澤之饒俗儉嗇愛財趍商賈好訾毁多巧偽䘮祭之禮文備實寡其好學猶愈於他俗宋周封微子於宋本陶唐氏火正閼伯之墟也詩風曹國也武王封弟曹叔振鐸於曹其後稍大得山陽陳留昔堯作游成湯作游者言為宫室游止之處也舜漁雷澤湯止于亳故其民猶有先王遺風重厚多君子好稼穡惡游食以致畜藏宋雖滅本大國故自為分野沛楚之失急疾顓已地薄民貧而山陽好為姦盜衞本顓頊之墟故謂之帝邱夏后之世昆吾居之成公後為韓魏所侵盡亡其旁邑獨有濮陽衞地有桑間濮上之阻男女亦亟㑹聚聲色生焉故俗稱衞之音周末有子路夏育民人慕之故其俗剛武上氣力漢興二千石治者亦以殺戮為威宣帝時韓延夀為本郡太守承聖恩崇禮義尊諫諍至今本郡號善為吏延壽之化也其俗頗奢靡嫁取送死過度野王地名好氣任俠有濮上風楚周成王封文王先師鬻融之曾孫熊繹於荆蠻為楚子居丹陽楚有江漢川澤山林江南地廣或火耕水耨民食魚稻以漁獵山伐為業果蓏蠃來戈反蛤食物常足故啙音紫窳音庾生而亡積聚飲食還給不憂凍餓亦亡千金之家信巫鬼重淫祀而漢中淫失枝柱與巴蜀同俗汝南之别皆急疾有氣執江陵故郢東西通巫巴東有雲夢之饒亦一都㑹也吳太伯初奔荆蠻荆蠻歸之號曰句音鉤吳太伯卒後世謂之虞呉越之君好勇故其民至今好用劒輕死易發夀春合肥受南北朔皮革匏木之輸亦一都㑹也始楚賢臣屈原被讒放流作離騷賦以自傷悼後有宋玉唐勒之屬慕而述之皆以顯名漢興髙祖王兄子濞於吳招致天下之娯游子弟枚乗鄒陽嚴夫子之徒興於文景之際而淮南王安亦都夀春招賔客著書而吳有嚴助朱買臣貴顯漢朝文辭並發故世𫝊楚詞其失巧而少信初淮南王異優異也國中民家有女者以待游士而妻之故至今多女而少男吳越與楚相接比數相兼并故民俗畧同呉東有海鹽章山之銅三江五湖之利亦江東一都㑹也江南地卑丈夫多夭粤少康之庶少封於㑹稽文身斷髮以避蛟龍之害後有句踐周元王賜命為伯漢興復立閩君子揺為粤王至武帝始滅為郡國處近海多犀象瑇瑁珠璣銀銅果布之湊中國往商賈者多取富焉畨禺其一都㑹也民服布如单被穿中央為貫頭男子耕農禾稻紵麻女子桑蠶織績亡馬與虎民有五畜牛羊豕雞犬也山多麈音主似鹿而大麋似鹿而小兵則矛盾刀木弓弩竹矢或骨為鏃歴代所尚商之政尚猛故其俗激昂而奮厲周之政尚寛故其俗和柔而寛緩太公治齊舉賢尚功周公知其後必以强亡周公治魯尊尊而親親太公知其後必以弱亡秦人刑嚴而苛法峻而宻教化不立風俗見於借父耰鋤慮有徳色母取箕帚立而誶語抱哺其子與公並倨賈誼曰商君遺禮義行之二歳秦俗日敗漢文帝躬行元嘿示敦朴為天下先故五六十載之間移風易俗黎民醇厚西漢尚經術東漢尚名節晉尚虚浮唐尚詞章董仲舒曰凡下之從上也不從口之所言而從心之所好也上好勇則民輕死上好仁則民輕財故上之所好民必甚矣匡衡曰鄭伯好勇國多暴虎秦穆貴信民多從死陳后好巫民多淫祀晉侯好儉民多蓄聚太祖好武則天下猛士出而為之兵太宗好竒謀則天下計畫之士出而為之慮真宗好賢則天下豪傑之士出而為之任仁宗好文愛儒則天下無有不學之士人總論國家之治亂本於禮而風俗之善惡係於習赤子之啼无有五方其聲一也及其長則言語不通飲食不同有至死莫能相為者是無他焉所習異也至於古今亦然有服古之衣冠於今之世則駭於州里矣服今之衣冠於古之世則僇於有司矣衣冠烏有是非哉習與不習而已矣夫民朝夕見之其心安焉以為天下事正應如此一旦驅之使去此而就彼則无不憂疑而莫肯從矣昔秦廢井田而民愁怨王莽復井田而民亦愁怨趙武靈王變華俗效胡服而羣下不悦後魏孝文帝變胡服效華俗而羣下亦不悦由此觀之世俗之情安於所習駭於所未見固其常也是故上行下效謂之風薫蒸漸漬謂之化淪胥委靡謂之流衆心安定謂之俗及乎風化已失流俗已成則雖辨智弗能諭也强毅不能制也重賞不能勸也嚴刑不能止也自非聖人得位而臨之積百年之功莫能變也司馬温公文聖人之化自近及逺由内及外是以京師者風俗之樞機四方之所面向而依倣者也加之士民富庶財物畢㑹難以儉率易以奢變至於發一端作一事衣冠車馬之竒器物服玩之具旦出竒制夕染諸夏工者矜能於无用商者通貨於難得歳加一歳巧拙之性不可窮好尚之勢多所易故物有未敝而見毁於時人有循舊而見嗤於俗富者競以自勝貧者耻其不若且曰彼人也我人也彼為奉養若此之麗而我反不及由是轉相慕效務盡鮮明使愚下之人有逞一時之嗜慾破終身之貲産而不自知也且山野不能給野火江海不能實陋巵淳和之風散則貪饕之行成貪饕之行成則上下之力匱如此則人无全行士無㢘聲尚陵逼者為時宜守檢押者為鄙野節義之民少兼并之家多富者財産滿州域貧者困窮不免於溝壑夫人之為性心充體逸則樂生心欝體勞則思死若是之俗何法令之能避哉故刑罰所以不措者此也且壊崖破岩之水原自㳙㳙干雲蔽日之木起於青葱禁微者易救末者難所宜畧依古之王制命市納賈以觀好惡有作竒技淫巧以疑衆者糾罰之下至物器饌具為之品制以節之工商逐末者重租稅以困辱之民見末業之無用而又為糾罰困辱不得不趍於田畝田畝闢則民無飢矣以此顯示衆庶未有輦轂之内治而天下不治矣羣書考索卷六十一
