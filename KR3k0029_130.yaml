body:
  text: 羣書考索後集卷六十四宋章如愚編財賦門内庫類周内府掌受九貢九功之貨賄以待邦之大用凡四方之幣獻及良貨賄入焉周禮漢少府應劭曰通典曰秦官漢因之是為九卿掌山海池澤之稅以給供養通典少府號禁錢應劭曰禁錢以給私養自别為藏少者小也故曰少府師古曰大司農供軍國之用水衡應劭曰水衡與少府皆天子私藏耳本紀武帝時胡降者數萬人皆得厚養衣食仰給縣官縣官不給天子乃損膳觧乗駟出御府錢以贍之武庫兵噐天下公用繕治造化皆度大司農錢大司農錢自乗輿不以給供養勞賜一出少府宣帝本始二年春以水衡錢為平陵徙民起第宅應劭注曰水衡與少府皆天子私藏耳縣官公作當仰給大司農今出水衡錢言宣帝即位為異政也元帝王嘉上䟽曰孝元皇帝奉承大業温恭少欲都内錢四十萬萬水衡錢二十五萬萬少府錢十八萬萬師古注曰言不費用故蓄積也漢書大司農錢盡乃以少府禁錢續之賈捐之對曰臣切以往者羗軍言之暴師曽未一年兵出不踰千里費四十餘萬萬大司農錢盡廼以少府禁錢續之師古曰少府錢正供天子故曰禁錢漢書本傳後漢光武併禁錢掌于大農章帝章和二年詔韋彪上大鴻臚印綬其遣太子舍人詣中藏府受賜錢二十萬續漢志曰中藏府令一人秩六百石掌幣帛金錢貨物也段熲傳賜熲錢二十萬勑中藏府調金錢綵物増助軍費和帝建和元年芝草生中黄藏府漢官儀曰中黄藏府掌中幣帛金銀諸貨物也唐自髙祖太宗及髙宗中宗睿宗未嘗置内庫殆至明皇始設大盈瓊林二庫以貯四方貢獻𤣥宗王鉷為户口色役使嵗進錢百億萬緡非租庸正額者積百寳大盈庫以供天子燕私食貨肅宗至徳後諸州四方貢獻悉入内庫權臣巧史因得旁縁公託進獻私為賍盗者動萬萬計楊炎傳代宗吕温代李侍郎謝用内庫錢充軍資表今月十三日面奉進㫖其南郊賞設錢恐度支支計缺少以内庫錢充者表内有云陛下憐江淮甫罹旱暵念庸蜀新罷大兵雖經費有餘而聖慮尤軫即因伏奏親奉徳音悉出内府金錢御服綵繒約躬節用濟國贍軍允叶師和克䖍祀事文苑英華徳宗舊制天下財賦皆入左藏庫而太府四時以數聞尚書比都覆出納舉無干欲及第五琦為度支鹽鐵使京師豪将求取無節琦不能禁乃悉租賦遷大盈内庫天子以給取為便故不復出自是天下公賦為人君私藏有司不得計贏少而宦官以窠名特薄者三百人奉給其間根柢連結不可動及炎為相言帝曰財賦者邦國大本而生人之喉命天下治亂重輕係焉先朝權制以中人領其職五尺宦豎操邦之柄豐儉盈虚雖大臣不得知則無以計天下利害今陛下至徳惟人是恤參校蠧弊莫與斯甚臣請出之以歸有司度宫中經費一嵗幾何量數奉入不敢以缺如此然後可以議政惟陛下審察帝從之乃詔嵗中裁取以入大盈度支具數先聞詔曰凡財賦皆歸左藏庫一用舊式毎嵗于數中量進三五十萬入大盈食貨徳宗遭奉天之難乃于行宫先立二庫故陸贄極論其不可曰瓊林大盈二庫自古無其制創自先帝自開元貴臣貪權飾巧求媚乃言郡國貢賦所用盍各區分稅賦當付之有司以給經用貢獻宜歸之天子以奉私求明皇恱之遂創二庫蕩心侈慾萌抵于兹陛下嗣位之初務遵理道崇行儉約預戒貪叨雖内藏舊庫未歸太府而諸方貢獻不入禁闥今㓂逆亂常鑾輿臨幸或觀二廊之下榜列二庫之名師旅方興賞賚未行而諸道所貢遽創私庫萬目所觀孰能忍懐及參軍情咸生觖望奏議徳宗時裴延齡素不善財計取宿奸老吏以與謀因言左藏天下嵗入不訾耗登不可校請列别舍以檢盈虚於是以天下宿負八百萬緡析為負庫抽貫三百萬緡為賸庫様物三十萬緡為季庫帛以素出以色入者為月庫帝皆可之延齡傳憲宗嘗曰宫中用帛疋皆籍其数又曰宫中用物極節儉多藏何為當時内庫充實元和八年四月勑以錢重貨輕出内庫五十萬貫令兩常平收市布帛毎端疋估加十之一㑹要元和十年詔出内庫繒絹五十萬疋付左藏庫以供軍憲宗實録元和十一年以内藏庫錢五十萬貫出付度支供軍同上元和之末田𢎞正入相李綘請出内庫錢百五十萬緡賜之左右宦官多有阻格上以問絳絳曰使國家使五十萬兵取六州其費豈止百五十萬乎上恱曰朕所以惡衣菲食蓄聚財貨正為平定四方不然徒貯之府庫何為於是遣裴度以百五十萬賞之軍士受賜歡聲如雷宋朝太祖初平諸國珍寳金帛填溢内府其後漳泉吴越相次獻地又平太原四川帑藏盈衍用度豐給建隆以來天下貢賦盡入左藏庫至乾徳初府庫充羡太祖嘗曰軍旅飢饉當預為之備不可臨事厚歛於人乃於講武後殿别為内庫以貯金帛編年太祖别庫曰封樁庫毎嵗國用之餘皆入焉嘗語近臣曰石晉割幽燕諸郡以歸契丹朕憫八州之民久䧟夷虜俟蓄滿五百萬緡以贖山後諸郡寳訓太宗太平興國二年正月命賈黄中程能馮瓉掌左藏三庫先是貨泉與金帛通掌久儲蓄盈羡始命分之謂侍臣曰朕以涼徳繼守洪圗凡機務邉事皆奉以先帝成規不敢有改易然財貨蓄溢勢須别置官吏使各専其職事同上太平興國二年十月太宗命分左藏北庫為内藏庫内藏庫始于此帝謂左右曰朕置内庫蓋慮司計之臣不能節約異時用度有闕復當賦率于民朕終不以此自供嗜好也自乾徳開寳以後至淳化二十年間有司嵗貸内藏百萬有至三百餘萬者累嵗不能償除其籍興國三年内藏庫置在左臺門外又有西庫景徳殿𨽻焉常度上一一計積供邦國之用諸司副使内侍為監官或置都監别有内侍一人㸃檢㑹要興國三年上幸左藏庫視其儲積語宰相曰此金帛如山用何能盡先帝毎焦心勞慮以經費為念何其過也薛居正等聞上言皆喜於是以左藏北庫為内藏庫又以武殿後封樁庫属焉改封樁庫為景福内庫長編真宗咸平元年十一月上命三司具中外錢榖大數以聞鹽鐵使陳恕久而不進上命輔臣詰之恕曰天子富于春秋若知府庫充羡恐生侈心故不敢進也上聞而善之長編真宗嘗幸景徳殿庫開所積金帛謂左右曰國家有天下毎念四方之人輸賦不易此庫金帛雖多朕亦不敢私用自今非時取索並經三司出納五朝寳訓景徳四年出内藏錢五十萬貫付三司市菽麥時宰相言今嵗豊稔菽麥甚賤為富民所蓄請官為歛糴以惠貧民十月内出龍圗閣待制陳彭年所撰内藏庫記示王旦等真宗曰自太祖以來有景福内庫先帝改為此名所貯金帛備軍國之用非自奉也顧外庭不知耳二聖之平荆湖西蜀嶺表江左河東祀祠郊丘所費鉅萬皆出于是不求于民三司所假凡六千萬自淳化迄景徳毎嵗多至三百萬少亦不下百萬累年不能償則命蠲除之昨令彭年作此述其實也上又曰此庫乃為計司備經費耳且計司有缺必取于民茍非節用何以獲濟寳訓祥符元年内藏庫言舊制宣取物色皆降御寳慿由除破近因條約庫務亦經由三司望再降詔㫖令從之會要祥符二年皇城使提舉内藏庫劉承珪上新脩庫簿詔奨之賜承珪馬及噐幣帝謂宰臣曰承珪此簿述金帛自置庫以來出納年月給予周細深可奨也同上仁宗天聖三年言内藏庫言奉勑與三司商量舊例逐年内藏庫退錢三司今來毎年更要錢三十萬貫今商量舊例若逐年通供退錢六十萬貫文准備支用即更不别作名目申奏乞降宣勑撥借内庫錢帛勑令内藏庫毎年自後去三司更不申奏乞于内藏庫指射撥借錢物如少有違其三司干於官吏並行朝典同上明道三年八月庚申上以内藏錢百萬賜三司初三司言自藉田後繼有賞賚以用度不足請假内庫錢上謂宰臣張士遜曰國家禁錢本無内外蓋以助經費也士遜曰不然有司不免侵剥民庶矣自是嵗歉或調發則出内藏以濟之長編仁宗嘗出龍圗閣延福宫金帛以佐三司支費謂晏殊曰藏之内庫不若付之有司以寛財賦又嘗曰内藏蓋累朝蓄聚以備非常今或外用既節而不絶内帑支取即與外庫糜費一同也寳訓景祐元年出内藏庫絹二十萬下三司以淮南嵗飢代本路上供絹也同上寳元元年九月出左藏庫錦綺綾羅百萬下陜西路市糴軍儲寳訓寳元二年出内庫真珠估緡錢三十萬賜三司上諭輔臣曰此無用之物不若散之民收其直助糴邉儲亦可少紓吾民之歛也奉宸五庫在延福宫内舊名宜聖殿五庫康定元年改今名仍鑄印給之掌内中所降金銀珍寳及舊出所藏秘庫内物會要康定元年合奉宸五庫為一庫在延福宫内舊名宜聖殿五庫一曰宜聖殿内庫二曰穆清殿庫三曰崇聖殿庫四曰崇聖殿受納真珠庫五曰崇聖殿樂噐庫於是合五庫為一改名奉宸仍鑄印給之通鑑慶歴二年罷左藏月進錢千二百緡謂輔臣曰此周官所謂供王之好用者朕宫中無所費其斥以賜縣官長編慶歴三年六月樞宻副使韓𤦺上䟽言祖宗置内藏庫蓋備水旱兵革之用非私蓄財而充己欲也自用兵以来財用匱竭宜稍出金帛以佐邉用民力寛而衆必安矣同上慶歴四年二月遣内侍齎奉宸庫銀三萬兩下陜西博糴榖麥以濟飢民寶訓皇祐二年閏十一月出内藏庫緡錢四十萬紬絹六十萬下河北便糴糧草先是河朔頻年水災朝廷蠲民稅幾盡至秋禾稼将登而鎮定復大水並邉尤被其害上憂軍儲不給故特出内庫錢帛助之同上皇祐二年出内藏庫絹五十萬下河北陜西河東路以備軍賞通鑑皇祐四年出内藏庫錢三十萬緡絹十萬疋下河北助糴軍糧同上嘉祐元年出内藏庫絹三十萬疋銀十萬兩賑貸河北水災州軍寳訓神宗熈寧元年十月乙邜詔出奉宸珠三千三百四十萬付河北四𣙜場貯之别封樁以備買馬長編二年上謂輔臣曰近見内藏庫籍文具而已財貨出入畧無闗防當太宗時内藏財貨毎千計用一牙錢記之名物不同所用錢色亦異他人莫能曉也嘗匣而置之於御閣以參驗帳籍中定數晚年嘗出其錢以示真宗曰善保此足矣今守藏内臣皆不曉帳籍關防之法當更擇人領之即命勾當御院李舜舉代其不職者同上神宗有復幽燕之志即景福殿庫聚金帛為兵費更庫名制詩以掲之凡三十二庫今日財計有三所内之庫天子財也南庫宰相財也户部天下財也元豐五年十月戊申朔壬申詔户部左曹於京東淮浙江湖福建十二路發常平錢八百萬緡輸元豐庫左藏庫内藏庫外又有元豐庫雜儲諸司羡餘錢自熈寧以前諸道榷酤場率以酬衙前之陪備官費者至熈寧免役乃罷收酒場聽民増直以顧取其價以給衙前時有坊埸錢至元豐初法既久儲積贏溢司農請發坊場百萬緡輸中都三年遂于寺南作元豐庫貯之幾百楹凡錢帛之𨽻諸司非度支所主庫蔵之数益廣欲以待非常之用長編哲宗元祐十二年詔諸路元豐七年已有坊場免役寛剰錢除三路至留升諸路許留一半餘召人入便隨宜置場和買可變轉物貨即不得預俵及分配與人户其物貨遂旋計綱起發於元豐庫送納内成都梓州利州三路於鳯翔府寄納封樁長編元祐三年三月乙丑詔改元豐元祐庫為元豐南北庫増至南庫監官一貟三省奏朝廷封樁錢物係備邉河防及緩急支用元在𣙜貨務收乞将舊司農寺庫詔名元豐庫差監官同上髙宗紹興五年進呈州陜宣撫使盧法原奏乞将紹興四年以後上供錢帛依舊留充贍軍用上曰祖宗儲積内帑本以備邉陲緩急之用今方隅多故軍旅未息宜從法原所請趙鼎等曰陛下捐内帑以贍軍此帝王盛徳事也聖政紹興二十八年上諭曰朕平時無妄費内庫所積正所以備水旱爾同上紹興二十九年五月己未進呈次因及内外儲蓄事上曰比縁河流淺澁綱運稽緩已令内帑支降錢五百萬貫以供調度朕自息兵講好二十年間所積錢物豈以自奉哉盖欲備不時之須免臨時科取重擾民爾卿等可令户部㑹計舊嵗經常之費量入為出而善藏其餘自非飢饉師旅勿得妄有交動長編紹興三十一年丙午進呈屯戍兵料暴露日久欲再加賞犒上曰令所在搃領所撥給具數以聞今欲内帑給還後二日進呈賞犒事上曰朕曩于内帑儲備用錢士大夫不喻朕意者至指為瓊林大盈之比顧朕雖積此亦何嘗妄費一錢向來撥一萬緡付分府而近日遣發軍馬及諸處犒設皆于是乎出豈不正資今日之用况方用兵國賦亦須得人經理士大夫耻言財利多事之時艱于遣任亦今時之一病也宰臣陳康伯等曰誠如聖訓臣雋賛曰太上皇帝與鄰國講好二十餘年使命往來無纎介之隙而乃以内帑儲備邉錢一毫不敢妄費是其心未嘗須臾忘患也既逆亮叛盟師興財費而無横賦重歛以及民非聖慮深逺疇克哉聖政貢獻羡餘附禹别九州以任土貢周設九貢以致邦賦見古王者取其樂輸責其地之所有不求其所無漢髙祖十一年詔曰今獻未有程式或多賦以為獻民疾之其令諸侯王通侯常以十月朝獻及郡各以口數率人嵗六十三錢以給獻費通典文帝時有獻千里馬者詔曰鸞旗在前属車在後朕乗千里馬獨先安之於是還馬與道里費詔其令四方無來獻本史唐髙祖時孫伏伽上言陛下即位之明日有獻鷂者不却獻琵琶獻弓矢並被賚賞以率土之衆何索不致豈少物哉唐史太宗貞觀州府嵗市土所出為貢其價視絹之上下無過於五十疋異物滋味名馬鷹犬非有詔不獻加配則以代租賦孔戣以明州嵗貢淡菜蚶蛤自海抵京師役四十三萬人奏罷之嶺南節度使死帝曰嘗論蚶菜者誰歟詔即拜之唐李大亮為涼州都督有䑓使見名鷹諷大亮獻之大亮宻表太宗報書曰有臣如此朕何憂姚崇要𤣥宗十事曰臣願租賦外一絶貢獻可乎羡餘之貢古未有之唐𤣥宗時天子横賜無節州鎮各有進奉於是權臣求媚以謂此乃天子私財遂别為瓊林大盈二庫以貯之羡餘之端實兆於此代宗時天子誕日諸道争以侈麗奏獻常衮建言漢文帝還千里馬不用晉武帝焚雉頭裘宋髙祖碎琥珀是三者非有聰明大聖以致安謹身率下而已今諸道饋獻皆滛侈不急而節度使刺史非能男耕而女織者類出於民是歛怨以媚上也請皆還之代宗嘉納本史徳宗徙幸梁道有獻𤓰菓者帝嘉其意欲授以官陸贄諌曰爵位天下公噐不可輕也徳宗遭奉天之難財用窘乏還宫以來專意聚歛藩鎮多以進奉市恩皆六稅外萬一用度羡乏然或割留常賦或増歛百姓或减刻吏禄或販鬻菜菓往往私自入己所進者什一二劔南西川節度使韋皐有日進江西觀察使李兼有月進淮南節度使杜亞等皆徼幸恩澤以常賦入貢名為羡餘至代易又有進奉常州刺史裴肅鬻薪炭案紙為進奉得遷浙東觀察使刺史進奉自肅始也劉賛卒于宣州其判官嚴綬傾軍府為進奉召為刑部貟外郎判官進奉自綬始也順宗即位乃罷月進憲宗又罷除官受代進奉憲宗嘗罷進奉及李錡既平節度于頔王鍔進獻其後李絳嘗諌帝喟然曰誠非至徳事然兩河貢賦久廢不忍重歛於人也然不知貢賦獻取於人重矣於是度支鹽鐵與諸道貢獻尤甚號助軍錢及賊平則有賀禮及助賞設物羣臣上尊號又有獻賀物至穆宗一切罷之通典及唐史憲宗問李絳曰卿何獨無進羡餘對曰守土之官厚歛以市私恩天下猶非之况户部皆陛下府庫之物安得羡餘若左藏移之内藏猶東庫移之西庫也上嘉之憲宗言王播為鹽鐵使事月進李絳曰比禁天下正賦外不得有他獻而播妄名羡餘不出禄廩家貲願悉付有司帝曰善記絳在位獻不入禁中本傳宋朝太祖乾徳四年四月詔曰出納之吝謂之有司倘規致於羡餘必深務於掊克知化光軍張全操上言三司令諸處場院主吏有羡餘粟及萬石芻五萬束以上者上其名請行賞典此茍非倍加民租私减軍食亦何以致之宜追寢其事勿復頒行除官所定耗外嚴加止絶長編太宗詔天下勿復以鷹犬來獻通鑑太宗詔罷江南嵗貢止絶之真宗諸州嵗貢新茶三十餘處詔悉罷之髙審文同判廣州将辭上戒之曰遐方逺地切在安民若以海外珍竒貢獻非朕意也寳訓真宗朝交州尚牧獻白御馬一疋上曰無名進貢何所用亟還之咸平元年詔監倉官不得以羡餘為獻上曰倉庫多取出羡以為勞績若非受納之際剰收即是出給之用减尅咸平五年二月詔有司帑廩者多收羡餘以為課績蓋出納之際有所重輕此可責而不可奨也宜令有司嚴加戒勵無使復然長編祥符八年四月詔曰自我京畿逹於淮泗倉庾相望轉輸至多若無損増之欺寧有羡餘之積俾均出納以便公私應所收羡餘並不理為勞績長編祥符九年河北轉運使李士衡獻助南郊絹布六十萬疋錢二十萬貫且言六十萬皆合上供者餘二十萬即本州羡餘請遣使臣起發先是毎有大禮士衡必以所部供軍物為貢通鑑仁宗朝范鎮言國家自陜西用兵以來賦役煩重轉運使復於常賦外進羡錢以助南郊此皆貪政長編天聖三年湖南轉運使王逵多為聚歛率部内得習里正命押録錢三十萬為羡餘上曰使人無効百姓何以為生乎乃詔取常賦外歛民者以違制論之寳訓天聖四年乾元節知寧州楊及遣吏齎綉佛來獻上上謂輔臣曰及佞人也民安政舉乃守臣之職焉用此為令邸吏亟還之寳訓天聖六年詔温鼎廣等州歳貢柑無得以貢餘為名餉遺近臣又罷永興咸陽民元守亮家嵗貢梨訓典慶歴七年上封者言諸路轉運司廣要出剰求媚於上以民輸賦稅已是大半之賦又令加耗謂之潤官臣恐諸路轉運使尚有似此無名刻削陛下閱其奏自或有横加收歛名為出剰乞賜絀貶使民知陛下之意上覧之曰古稱聚歛之臣過於盗賊今如此掊歛與朕結怨於民也亟下詔止絶之長編皇祐元年罷廣州嵗貢蜜菓寳訓皇祐五年閠七月李中師為淮南轉運使入辭上謂曰比聞諸路轉運使冬以來餘以希進然遇災傷不免暴取於民此朕所以不取也其戒之長編神宗即位出諸州貢物名件手詔曰四方入貢雖云古禮考之禹制未有若兹之繁也又所貢物多飲食之類缺之亦無害也自今其悉罷之同上徽宗崇寧四年七月初樞宻直學士梁子羙為河北轉運使措置𣙜使建三郡都倉儲粟二十萬斛且傾漕計以市寵至用三百萬緡貨北珠以運於是契丹虐女真捕海東青以求珠女真不勝其求而怒時子羙在部五年矣辛邜召為户部尚書蔡脩史補都運發運使首以羡餘進者崇寧間自梁子羙胡師文始監司郡守不待詔命首以土物進者政和間自盛章宋昇始也髙宗紹興元年十二月御劄朕惟邦本實在斯民比縁盗賊繹騷而元元之民肝腦塗地故選命車徒焉應縁軍須不得已而取于民者務在均敷其率先應辦處尤宜省察勿令夤縁為奸若實盡公竭力臣不加擾者當重寘賞典可檢㑹先降應見科催合出印榜開其所列實數於前次列户口等第毎名當若干勿取羡餘而使斯民重苦仍掲榜曉諭使民知朕意紹興二年二月殿中侍御史江躋剳子奏前知明州吴懋輙有所獻踰五萬緡切恐朝廷受之無名将何以示天下倘或小人觀望争相效尤殘民以為己利其患有不可勝言者欲望斥還懋所獻錢仍加黜罰少寛民力詔其錢委自憲臣勘當如例科歛即仰給還候勘當列具懋取㫖施行後有㫖吴懋降兩官聖政紹興三年知藤州侯彭老奏措置到本州寛剰錢一萬貫文省買到金一百六十六兩銀一千八百兩謹以投進帮助行在大軍支用伏望特降眷㫖下有司交納詔縱有寛剰自合歸之有司非守臣所當進納或恐亂有刻剥取媚朝廷侯彭老可特降一官放罷以懲妄作所進物退還之臣等曰人君嚬笑道以風動天下况可因利以導臣下乎剥民奉上以為進身之階非牧民者所宜為也一人為之四方效之斯民将不聊生矣罪一人以為天下戒使億兆之衆安于田里而無愁歎之聲其為國之利也豈止十萬錢乎聖政紹興二十一年十二月辛巳進呈御筆批下安豐軍進􅒕鮓白魚不欲以口腹勞人令自今後罷進上又曰去年已降指揮罷温州柑橘福建貢荔枝獨􅒕鮓淮甸未罷此皆祖宗所嵗貢之物朕恐勞百姓所以再降指揮紹興二十三年十二月丁酉上諭曰舶司及都大茶馬司諸處進貢真珠文犀等此物何所用當批出禁止聖政紹興二十七年髙宗宣諭宰相沈該曰頃年川蜀製造錦綉帟幕以充嵗貢雖居民㓜女亦追呼以供役作其擾民如此朕不欲土木被文綉皆止絶之紹興三十年十一月丙申進呈福建漕臣王時升欲以樽節到浮費錢三十萬貫撥十五貫代州縣二十五年至二十八年積下舊欠鈔鹽錢恐合旌賞者上曰漕臣能節約妄用而百姓則欠理宜激勸然未可遽行恐它路聞之妄認以為羡餘侵漁百姓僥覬恩賞徐俟其政績有聞與陞職名可也聖政孝宗隆興元年十二月癸未詔諸路州軍歳起上供錢物例有拖欠監司郡守却以羡餘進獻僥冐賞典可令户部行下諸路州軍諸路上供錢物須管依限起發數定如數目未足輙行率歛進獻仰本部按劾以聞史臣曰郡國之財歳有常計川竭而谷虗丘夷而淵實不在此則在彼耳諸州逋負上供而監司守臣以羡餘造執欺君㒺民徼寵幸賞迹其用心真小人之雄也聖明灼知申勑禁戢彼雖貪黷亡恥亦豈不知懼哉聖政乾道三年臣僚劄子多為科目以取之銖積寸累謂之羡餘欲乞先考其見在錢物虛之與實次考其上供之常數足與未足奉聖㫖依又劄子有常賦僅足支遣不取于民安從所出不過重歛苖米倍稅商賈至有指新稅以為餘錢指積逋以與州郡者奉聖㫖依乾道五年九月丙寅起居郎林機論諸郡守臣欲郡計辦集而不恤縣道之匱乏致使横歛及民庻上曰甚不體朕寛恤之意且如稅賦太重朕欲除减但有所未及當次第為之機又奏曰諸處有羡餘之獻皆移東易西以求恩倖惟願陛下熟察之上曰所言甚當今日之財賦豈得有餘今後若有獻朕當却之聖政乾道九年三月乙巳侍御史蘓嶠奏伏覩闗報廣南提舉官廖顒劄子廣州都鹽倉有積下不盡鹽本銀計實十一萬一千四百五十四貫文樁積在庫别無支遣又㸃檢得本路諸州府逐年拘催常平諸色窠名錢物内有見在寛剰五萬貫欲行起發少助朝廷經費耳奉聖㫖依並令赴南庫送納者臣竊以謂陛下即位以來屢却羡餘之獻故近年監司州郡稍知遵守此盛徳之事書之史冊足以為萬世法而小人急於自進不能革心時以一二嘗試朝廷只縁乾道七年提舉官章潭獻錢二十萬貫以此特轉一官不及期年擢為廣西運判廖顒實繼其後故到官未幾便為此舉其為愚弄朝廷莫此為甚訪聞此錢並係鹽本錢潭到任時尚有三四十萬緡皆是前官累政差問不敢妄用潭取其半以獻今顒所獻止十一萬緡已是竭潭所餘無幾顒年嵗間必須别得差遣而去後人何以為繼異時課頗不登誰将任其咎者今淮南浙西其事已自可見兼此錢本是朝廷錢物樁在州郡者豈必獻之内帑然後為富所謂移東庫實西庫何以異于此欲望特降睿㫖却而不受即以此錢付之本司依舊充鹽本錢常平寛剰錢亦乞樁留本路為水旱賑貸之備使四方之人咸知陛下捐利子民之意詔從之史臣曰羡餘之弊上欺人主下蠧生民非難知者而小人屢敢以是進豈非謂利之可動人歟記曰與其有聚歛之臣寧有盗臣此謂國不以利為利以義為利也孟軻曰亦有仁義而已矣何必曰利陸贄曰理天下者以義為本以利為末以人為本以財為末誠使義利之說明于上則奸罔之徒何自乗間耶觀夀皇諭臣僚捐利之請却樁積寛剰之獻而不受所以正君徳清化原警吏治者至矣聖政淳熈五年四月辛未知紹興府張津奏本府支用已是寛餘尚有剰錢四十萬貫起發應請副御前臣賞支用詔令紹興府将張津所獻錢為人户代納今年和買身丁之半仍令本府印給文牓使遍下諸縣鄉村曉諭通知人户今年已多納折帛錢在官與理充來年應輸之數務要實惠均濟即不得因而重疊别作名色騷擾如稍有違戾許人户徑詣尚書省陳訴史臣曰乾道五年臣僚嘗言諸州所獻羡餘類皆移東易西以覬恩倖耳聖訓有曰今日財賦安得有餘自今若有此獻朕當却之至是張津猶以羡餘四十萬緡來當時夀皇聖帝郤而不受復俾為民代輸以其所歛之民者還以畀民豈惟知所取予而示之好惡其所以警厲臣工風動中外者亦宏矣臣故特著于篇聖政淳熈劄子言諸州縣與監司毎嵗修貢天中節銀并大禮銀絹依條諸路自合以係省錢監司以本司錢昨來州科諸縣監司科州團併起發乞戒州郡不得凖前下諸縣科歛百姓又提刑素所入不多諸路監司除提刑司且令州郡依舊代發外其轉運茶鹽兩司各自抱起一半以餘諸州權且與照例發納亦不得科取於民四夷方貢周武王西旅獻獒書周公居攝越裳氏重譯獻白雉史記漢武帝南越獻馴象能言鳥宣帝九真獻竒獸並本傳宋朝太宗夏州趙保忠獻鶻號海東青上諭曰朕久罷畋遊無事此也保忠時出捕獵今當還賜之真宗交州進獻馴犀上曰此犀逺來深違物性朕将還之于闐國去京師之西九千九百餘里西南𢃄䓗嶺與婆羅門接相去三千餘里南接吐蕃北至踈勒自漢至唐皆入貢中國晉天福中李聖天自稱唐之宗属遣使入貢宋朝太祖建隆二年國王遣使來貢玉圭一以玉匣盛玉枕一自是屢來朝貢十二月甲午並乾徳四年李聖天並貢物開寳四年國僧吉祥以其王書來上自言破踈勒得舞象欲以為貢從之真宗祥符二年三月己巳國主黒韓王遣回鶻羅厮温等以方物來貢厮温跪奏曰臣萬里來朝獲見天日願聖人萬嵗與逺蕃作主仁宗天聖三年十二月壬子遣使來貢方物神宗元豊六年五月丙子貢方物見于延和殿八年十一月壬寅進馬賜錢百二十萬哲宗元祐四年五月丁酉遣使李養星阿㸃魏哥已下續貢珠玉象牙珊瑚藥物等五年二月丙辰遣從來貢方物三佛齊國蓋南蠻之别種也與占城為鄰唐天祐中嘗來貢物國朝太祖建隆元年九月癸邜王悉利大霞里檀二年五月乙丑三年三月壬戍十一月丙子國王釋利耶開寳三年四月丁邜七年三月乙丑八年十二月戊辰並遣使來貢方物太宗興國八年十一月壬申雍熈二年二月己亥並遣使來貢真宗咸平六年九月庚寅祥符元年七月丁丑天禧三年四月庚午國王霞遲蘇物吒蒲迷遣使來貢仁宗天聖六年八月初五國王室離疊革遣使蒲押陀羅歇及加盧等來貢方物哲宗元祐三年十二月甲申貢人請以金蓮花一十五兩真珠五兩龍腦一十兩依例撒殿從之四年正月庚辰進奉副使胡仙為歸徳郎将進奉判官它華加羅為保順郎将五年十二月乙未遣使入貢紹聖二年三月丁巳遣使入貢蒲端國在海口與占城國接真宗咸平六年其王陵景徳元年五月甲申四年六月丁未祥符四年二月辛酉並遣使來貢又式崑崙奴一上閔其異俗離去鄉土命還之五月丁亥又遣使來貢方物以金板䥴所上表辭占城國在中國之西南與交州接境汎海交州兩日程陸行半日程汎海至廣州半月程其國前代與中國通周顯徳中其王釋利用徳漫嘗遣使來貢國朝太祖建隆元年十二月壬辰國王釋利因荅蠻二年正月庚子三年九月丙子並遣使來貢方物開寳元年四月甲辰五年二月辛未國王波羙稅遣臣蒲訶散六年六月辛邜並遣使貢物太宗興國二年二月丁未三年五月乙未四年十二月丁未七年閏十二月庚寅遣使乗象來貢方物八年九月丙子遣使貢馴象雍熈二年二月己亥三年三月庚寅淳化三年十二月己邜國王楊陀排遣使李良甫至道元年正月戊午又遣使李波珠並来貢方物真宗咸平二年二月辛亥其國王楊普俱毗茶逸施離遣使先堯副使蒲薩陀婆等以犀象玳瑁香藥來貢景徳元年九月己酉四年五月癸邜並遣使來貢祥符元年十月以方物迎獻道左二年四月甲寅四年十一月庚午八年二月癸丑並遣使來貢五月乙酉遣使婆輪阿羅來貢天禧二年九月乙丑國王尸哩排摩牒遣使羅皮帝加等以方物來貢定安國本馬韓之種宋朝太祖太宗因女真使附表獻貢淳化二年以後不復至日本國倭奴國也宋朝太宗興國五年日本國有寺僧及其徒五六人來真宗景徳六年其國天台山延歴寺僧寂照等八人來朝貢佛像經等物祥符二年其國僧覺因等三人來注輦國自古不通中國水行至廣州真宗祥符八年九月己酉國王羅茶羅年遣使婆里三文等來貢真珠衫㡌各一及真珠象牙香藥等先是有舶商抵其國告以天子東封西祀其王曰十年來海無風濤古老傳云如此則中國有聖人故遣使入朝其使者又以盤捧真珠碧玻瓈升殿布於御座前降殿再拜譯者道其言曰願以表逺人慕化之意天禧四年二月乙酉廣州言注輦國遣使入貢方物其使者至州死以其表來上詔本州宴犒其部下賜噐幣緡錢遣之仁宗明道二年十月甲寅國王尸囉茶印陀囉遣使蒲押陀離等以泥金表進真珠衫㡌及真珠一百五兩象牙百株陀離自言數朝貢而海風破船不達神宗熈寧十年壬午國貢方物其使以金蓮花盛真珠龍腦登階跪望御座而散之謂之撒殿女真國渤海之别種也唐貞觀中靺鞨來朝宋朝太祖建隆朝貢不絶建隆二年八月辛亥國遣使嗢突剌來貢名馬三年正月庚辰遣使只骨來貢乾徳元年遣使來貢方物八月癸巳九月戊辰並遣使貢名馬開寳三年九月丙辰登州言女真國遣使入朝定安國王烈萬華附表貢方物六年十二月庚子遣使貢方物大食國本波斯之别種也隋大業中有波斯紏合王命據波斯國之西境自立為王其王姓大食唐朝屢來朝貢其王益盆泥未換之前謂之白衣大食何蒲羅披後謂之黒衣大食宋朝太祖開寳元年遣使貢方物自是貢奉商船往來不已四年七月庚子六年三月癸未七年十一月壬寅八年三月壬寅並遣使來貢太宗興國二年四月辛邜遣使來貢至道元年二月乙丑舶主蒲押陁黎以方物來貢真宗咸平六年九月壬辰遣使來貢方物及紅鸚鵡其國在海上與占城相接自是始通也景徳四年五月癸邜遣使來貢祥符元年十月丁未國使以方物迎獻道左蕃客李麻笏獻玉圭長一尺二寸自言五代祖得自西天屈長者傳云謹守此俟中國聖君行封禅禮即馳貢之哲宗元祐三年十一月丁邜大食麻囉㧞國遣使入貢七年五月丙午廣州進大食國進奉火浣布二疋十段詔寘之瑞物閣髙麗國後唐長興中遣使貢獻宋朝太祖建隆三年國王昭太宗興國三年十月甲寅國王伷十二月辛巳國王伷遣其子元輔六年四月丙戌七年九月癸丑雍熈元年十一月壬子國王治遣使韓延齡三年十月壬子端拱元年十一月甲申淳化元年十二月甲寅國王治遣使韓彦恭三年十月戊子四年正月丁酉國王遣使白思柔真宗咸平六年八月丙戍國王誦遣使李宣古祥符七年誦卒弟詢十二月丁邜權知國事王詢遣奏告使尹證古及女真将軍大千機已不並來貢方物八年十一月癸酉進奉告奏使御事民官侍郎郭元與束女真首領阿盧太來貢天禧三年九月辛巳登州言髙麗遣禮賔卿桂元信五年國王詢並遣使來貢哲宗元祐五年乙未遣使貢方物交趾國本南城之地唐交州搃管也至徳宗改安南都護州梁正明中土豪曲承羙専有其地送欵于梁帝因授承美節鉞國朝乾徳初交州師號天聖王私署璉為節度使自開寳以來皆受朝廷爵命貢奉不絶開寳六年五月甲寅璉遣使朝貢戊寅璉為静海節度八年又遣使朝貢謝恩太宗興國五年黎桓遣使以丁璿為名獻方物十一月黎桓遣牙校江巨煌王詔祚八年五月庚午黎桓遣牙史趙子愛九月丁邜交州黎桓遣使雍熈二年二月甲申三年九月癸巳權交州三使留後黎桓並遣使貢物淳化五年三月乙亥交趾郡王黎桓遣使貢物真宗咸平元年九月癸亥黎桓獻馴象四景德元年六月甲子黎桓遣子攝驩州刺史明提三年桓死四年八月乙丑黎龍廷遣其弟來貢賜峯州刺史明昶殿中丞黄成雅等來貢辛巳授龍廷静海節度使交趾郡王賜名至忠又封黎桓為南越王祥符二年十二月癸未交州黎至忠遣使來貢并獻馴犀一上以犀違土性不可豢畜欲拒而不納又慮逆至忠意俟其使還乃令縱之三年三月壬辰李公藴遣使入貢封交趾郡王五年四月戊申七年八月己巳復遣使貢物乾興元年四月丙寅李公藴遣使貢物仁宗天聖五年十月癸巳南平王李公藴遣其驩州刺史李公顯來貢方物慶歴三年三月乙亥交州獻馴象五龜兹國回鶻之别種也其國主自稱師子王或稱西川回鶻或稱西州龜兹又稱歸兹回鶻其實一也初回鶻西奔族種散處故甘州有可汗王西州有克韓王新復州有黒韓王皆其後也宋朝太宗興國九年西州龜兹遣使來貢自是可汗王克韓皆遣使貢良玉名馬槖駞犬尾白羊乳香等物至今不絶會要真宗咸平四年十一月甲午龜兹國遣使來朝貢祥符三年二月己未龜兹國遣使貢物六年十一月乙邜龜兹進奉使李延慶等三十六人對于長春殿獻名弓箭鞍勒團玉香藥等天禧元年四月甲午龜兹國剋韓王智海遣使張延來貢四年十二月丁亥龜兹可汗王智海甘州回鶻各遣使來貢智海仍貢犬尾羊二乾興元年五月丙申龜兹國僧華嚴自西天以佛骨舍利梵書來獻仁宗天聖二年三月癸巳智海遣使來貢七年六月戊申龜兹國遣使來貢九年正月己未龜兹國沙州並遣人貢物皇祐四年正月癸巳龜兹國沙州並遣人貢物髙昌國漢車師前王之地也有髙昌國取其地勢髙敞人民昌盛以為名焉後魏初闞伯周為髙昌王唐貞觀中侯君集平其國以其城池為西州安史之亂其地䧟没乃復為國語訛亦云髙敞然地頗有回鶻故亦謂之回鶻宋朝建隆三年四月庚子西川回鶻阿督等來貢乾徳中西州回鶻可汗去淵貢辟支佛牙琉璃噐物玉盞琥珀盃太宗興國六年三月丁巳髙昌國王阿厮蘭漢始自稱西州外生師子王遣都督麥索温來貢雍熈元年五月丙子西州回鶻與波斯外道各遣使來貢真宗咸平四年四月丙辰西州回鶻可汗王禄滕遣使曹萬通來貢玉鞍勒名馬寳噐等物西州回鶻真宗景徳元年五月壬寅六月戊辰西州回鶻遣使金延福並來貢甘州回鶻甘州可汗夜落紇真宗咸平元年四月丁酉甘州回鶻可汗遣僧法勝貢物景徳元年閏九月己未甘州回鶻遣使貢物四年十月戊午甘州回鶻可汗夜落紇遣尼法仙等來朝獻馬十匹㝷又遣僧翟大秦來貢馬十五匹祥符元年十一月己巳甘州回鶻可汗夜落紇寳物公主及其宰相各遣使來貢賀東封也三年十一月乙未甘州回鶻夜落紇遣左温宰相何居禄越樞宻使瞿符守榮來貢四年二月辛酉甘州回鶻蒲端三麻蘭勿廵蒲婆羅大食國吐蕃諸族並遣使來貢五年五月乙亥甘州回鶻可汗夜落紇寳物公主遣使來貢六年十二月庚申回鶻可汗夜落紇遣使來貢天禧二年正月丙寅甘州回鶻可汗王夜落隔歸化遣都督安信等來貢四年三月庚申甘州可汗王夜落隔歸化遣使入貢仁宗天聖元年五月戊寅甘州回鶻可汗王夜落隔通順遣使貢物五年八月壬辰六年二月庚辰甘州可汗王寳國夜落隔並遣使貢物甘州回紇仁宗天聖二年五月庚子甘州回紇可汗王遣使貢物回鶻可汗景瓊建隆二年十二月壬辰遣使貢物自是甘州回鶻貢良馬羙玉珊瑚琥珀之類不絶甘沙州回鶻太宗興國五年閏三月辛未來貢物秦州回鶻真宗祥符四年四月癸丑秦州回鶻安宻等貢玉𢃄賀汾隂禮畢西南蕃漢䍧柯郡地唐置費珍莊琰播郎䍧夷州王建據西州由是不通中國後唐天成二年䍧牱莊宗朝亦嘗朝貢其後孟知祥鎮蜀復不通朝貢宋朝乾道四年西南夷首領兼覇州刺史董暠等上言乞内附自是頻遣使入朝授以真命太祖開寳八年八月壬戌西南蕃三十九部順化王子岩廢等三十七人來貢馬及丹砂太宗興國五年八月甲戍西南蕃主龍瓊琚遣其子羅若從并諸州蠻七百三十四人以方物名馬來貢雍熈三年八月癸巳西南蕃奉化王子以慈等三百五十人來貢九月己未西南蕃王龍漢璿自稱權南寧州事兼蕃落使遣䍧牱諸州酋長趙文橋等率種族百餘人來獻方物名馬端拱二年四月辛未西南蕃王龍漢璿又貽書五溪都統向通漢約入貢淳化三年八月庚午西南蕃王龍漢主遣其弟漢興以方物良馬來貢三年九月乙邜十二月戊子西南蕃並遣使以名馬方物來貢至道元年九月丙子西南蕃王龍漢􅚜遣使龍光進率䍧牱諸蠻來貢真宗咸平元年九月壬申西南蕃王龍漢􅚜遣使龍光腆并率䍧牱諸蠻千餘人來貢五年四月戊戌西南蕃王龍漢􅚜遣使來貢祥符二年八月甲辰西南蕃王龍漢􅚜遣使貢物六年八月戊子冝州西南蕃都部署龍光進等千五百人來貢天禧四年七月庚戌西南蕃干三百人來貢仁宗天聖四年九月乙邜西南蕃王龍光洗遣使來貢景祐三年十一月甲午西南蕃遣龍光辨等來貢英宗治平四年十二月癸丑西南龍蕃來貢元豐十年十月丙申西南石蕃來貢西凉府六谷首領厮鐸督即凉州也自唐末䧟河西之地雖為吐蕃所隔然其地亦自置牧守或請命于中朝天成中權知凉州府留後孫超遣大将拓㧞承誨來朝明宗召見後漢乾祐初超卒土人折溝嘉權知留後事遣使來貢宋朝太祖開寳六年凉州令歩奏官僧各氊聲逋勝觸二人求通于涇州以申朝貢太宗淳化二年凉州復帥來請詔以殿直丁惟清領州事其後丁惟清䧟于李繼遷不復命帥真宗咸平四年李繼和言潘羅支願戮力討繼遷潘羅支既卒六谷首領議立羅支弟厮鐸督為一境所復朝廷遂以為西凉府六谷都大首領西平郡開國侯五年十一月甲午六谷首領潘羅支遣使來貢馬五千疋詔厚給其直别賜綵百匹茶百斤仍宴犒其部族景徳二年二月丙戍西凉府六谷首領厮鐸督遣其甥呵昔來貢三年五月壬寅遣其安化郎将路黎奴十二月壬午遣使四年五月丙辰遣六谷十八首領十二月丁巳並遣使貢物祥符元年十二月己酉遣使貢馬二年二月戊戌遣使十一月壬戌遣使四年十月己巳遣心蘭氊单並來貢賜紫方袍五年十一月辛酉遣其子七年四月丁巳遣使八年五月丁未遣使並來貢凉州蕃太宗至道元年正月丁巳凉州蕃當尊以良馬來貢又鎭戎軍言凉州卑寧族首領喝鄰半冗歸附真宗咸平四年閏十二月戊子仍貢名馬西凉府及咩逋族咸平五年十二月己巳來貢西凉府者龍族都首領咸平六年八月庚午遣使以貢名馬西凉府龕谷嬾家宗家者龍當宗章述等十族景徳元年正月丙申並來貢物西凉府吐蕃毒石鷄等祥符四年三月丙申來貢吐蕃本漢西戎之地或云南凉禿髪利鹿孤之後以禿髪為國號語訛謂之吐蕃唐至徳後因安史之亂遂䧟河西隴右之地宋朝真宗祥符三年其國宰相論恐熱以奉原安樂及石門等土闗來歸四年又克成雖扶二州五年其國沙州刺史張義潮以𤓰沙伊肅十一州來獻唐末𤓰沙之地復為所隔然而其國亦自衰弱族種分散大者千家小者百家無復一統矣自儀渭涇原環慶各鎮戎秦州既與靈夏皆有之各有首領内属者謂之熟户餘謂之生户自建隆以後其部族内附者甚衆朝廷授首領以官太宗興國八年九月庚子以馬來獻宗哥族唃厮川族二族最盛真宗祥符元年十一月壬申八年二月甲寅九年正月乙丑天禧元年九月丁未並貢名馬三年二月丁酉遣使來貢仁宗天聖元年二月戊戌嵗一入貢二年十二月庚午景徳四年十一月癸亥寳元二年三月甲寅並遣使來貢方物卭部川蠻居漢越嶲郡之地其酋長自稱百蠻都鬼主宋朝太祖開寳二年其王子入貢太宗興國四年八月丙子雍熈二年十月甲寅端拱二年九月壬午諾驅遣王子少蓋等並以方物良馬來貢真宗咸平五年八月戊子景徳二年九月丁未阿遵遣使祥符元年九月辛未九年九月壬戌黎吠遣使仁宗天聖八年十一月戊午黎在遣使並以方物來貢明道元年三月丁酉黎在三嵗一入貢景徳元年閠六月庚午五嵗一入貢黎州山後西林蠻皆西南夷之别種也其酋長號都鬼主或云王子次曰大鬼主後唐天成中常遣其大鬼主來貢宋朝開寳二年子勿兒部落将軍離魚以状白黎州求入朝貢詔荅之使至賜以噐帛自是朝貢不絶八年七月己亥太宗興國四年九月癸邜淳化元年十二月甲寅並貢方物名馬風琶蠻在建昌城三山上真宗咸平元年其主曩婆遣使馬怕來貢景徳三年又來貢雅州蠻西山野川路亦西南夷之别種也宋朝太宗興國三年正月甲午首領馬令膜等朝貢保塞蠻在黎州之西頗以善馬來市宋朝太祖開寳六年黎州上言保塞蠻自大渡河來歸䕫川蠻真宗祥符六年正月乙巳䕫州郡徼外蠻覃如綰等來貢二月辛未䕫州蠻彭延進等來貢三月壬子䕫州蠻人龔才晃等來貢撫水蠻在宜州南有縣四曰撫水曰水京曰多逹曰古勞唐𨽻黔其酋皆蒙姓真宗咸平四年十一月甲申蠻酋蒙頂等癸巳蠻酋䖍瑋等十二月丙寅蠻酋蒙填等並輸兵噐夷州蠻太宗興國三年八月辛未任郎政等來貢天賜州蠻真宗咸平五年正月壬子向永豐等來貢朔南州蠻真宗景徳四年七月乙丑龔允進等來貢西南蠻景徳四年羅甕井都指揮使使顔士龍來貢丹砂士龍種落遐阻未嘗入貢今始至髙溪州蠻景徳三年十二月己巳及壬辰並來貢溪洞安逺頓南永寧濁水等州蠻真宗祥符四年十二月庚申田承曉等來貢洛浦磨嵳洞蠻祥符五年二月丁未蠻酋田仕瓊等貢溪布髙州蠻祥符六年正月丙申來貢五溪蠻祥符五年閠十月丁丑向貴升等及磨嵳洛浦蠻來貢方物下溪州蠻仁宗天聖七年十月彭仕端仕羲等來貢黔州蠻天聖七年十一月乙邜舒延巒來貢方物綉州蠻天聖七年十一月丙子向光緒來貢丹流眉在海上咸平四年其主多須機遣使入貢拂林國神宗元豐四年貢方物阿理國哲宗朝元祐六年六月壬子進馬一百七十九匹詔户部逐匹估價於都數内増二分回賜大石國髙宗建炎張浚奏大石國進奉珠玉至熈州詔後悉不受量度支賜以荅逺人之意聖政安南國髙宗紹興三十一年正月己邜進呈安南獻馴象上曰蠻夷貢方物乃其職但朕不欲以異獸妨逺人兼使禽獸失其土性可令帥臣詳與說諭如今後職貢不必以馴象入獻韃靼國本東方韃靼之别部音訛謂之韃靼宋朝太祖乾徳四年六月甲寅其國天王娘子及宰相違于無越來貢太宗興國六年八月來貢續本朝内藏庫宋朝太宗至道二年七月戊辰詔河北三十五州軍淮南二十一州軍山南東道十州京東應天府江南昇潤州絹並納内藏自餘納左藏真宗咸平六年詔内藏庫專副已下不得将庫管錢帛數供報及於外傳說犯者處斬六年上聞河北大稔丙申出内府綾錦綺計直百八十萬命判官朱台符與轉運使定價出市糴粟實邉景徳元年閠九月丁巳内出銀三十萬兩付河北轉運官貿易軍粮命國子愽士張紳秘書丞陳綱大理評事秘閣校理劉筠經度之二年出内帑香藥貿易以入邉偹祥符元年二月己酉三司奏借内藏庫錢三十萬貫又請出銀五萬兩付左藏庫給用五月丙子三司假内藏庫銀十萬兩三年三月丁酉三司貸内藏錢三十萬貫四月乙亥出内藏庫錢五百萬贖故宰相吕端居第賜其子蕃六月己丑三司假内藏庫絹二萬匹四年七月己丑三司假内藏庫絹三十萬匹五年正月己邜三司借内藏庫錢五十萬貫二月己未三司借内藏庫錢三十萬貫三月辛巳三司奏假内藏綾縠二萬四千疋四月壬戌三司假内藏庫錢三十萬貫六月己亥三司借内藏庫金二千兩癸丑出内藏庫錢百萬貫付三司以佐用度八月己酉三司借内藏庫絹二十萬十一月丙午宣政使提㸃内藏庫劉承珪上内藏庫須知五卷詔褒之六年六月己巳三司借内藏庫銀三萬兩十月丁邜三司借内藏庫錢帛五十萬以偹奉祀賞給七年二月戊辰三司假内藏庫錢五十萬貫四月庚申三司借内藏庫綾十五萬匹九月丁酉三司借内藏庫銀八千兩八年二月丁巳三司借内藏庫錢十五萬貫閠六月甲辰内藏庫言三司所借金帛其數至多舊借金即以饒歙等州及諸路所貢充還及諸處納到三司指揮直送左藏本庫不惟漸失封樁數目又不應劉承珪勾當往例詔三司規畫補填九年正月癸亥發内藏錢五十萬貫給三司壬申發内藏錢二十萬貫令三司預市紬絹以濟京東西路之乏時青齊間絹直八百紬六百官給絹直一千紬八百民極以為便自是紬絹之直日増後數歳遂皆倍于昔時云六月乙酉權三司使馬元方言來春大禮於内藏庫假賞賜物凖奉祀例内有雜色匹帛内藏庫言咸平景徳以來南郊悉不支撥慮它時為例王旦曰初降御札令内藏與諸軍賞賜時元方言職司豈無經度其賞賜且依舊借内藏金萬兩銀三十萬兩錢七十萬貫紬絹一百萬匹餘則三司規畫上曰元方在三司謗議甚多何也旦等曰元方盡心公家然性卞急而寡思慮同僚異議多以醜言詆之此所以賈怨也上曰副司判官中亦有英俊豈宜輕待耶居嵗餘卒以苛碎罷七月戊午三司假内藏錢四十萬貫十一月甲辰三司言諸州欠商賈飛錢欲罷來年官市繒絹償之詔發内藏錢二十萬絹以給其費天禧元年二月辛未三司假内藏庫錢五十萬貫九月上出三司使馬元方所上歳出入財用數以示廸時仍歳旱蝗上頗憂不給問何以濟廸曰祖宗初置内藏庫欲辦兵復西北故土及以支凶荒今邉無他費陛下用此以佐國用則賦歛寛民不勞矣又時李廸言仍歳旱蝗國用不給上曰當出内藏金帛借三司迪曰天下於財無内外願賜三司何必曰借二年四月甲申三司假内藏銀九萬兩戊子三司假内藏錢二十萬貫七月丁邜三司借内藏錢五十萬貫甲戌上作寛財利論賜士衡又出内藏錢二百萬貫以助經費士衡因請刻聖製于本㕔從之九月壬申三司假内藏銀十萬兩三年正月甲子三司假内藏紬萬五千匹三月乙丑三司假内藏庫銀一十三萬七月戊辰三司假借内藏錢帛二百四十五萬辛酉三司假内藏錢五十萬貫絹十萬匹九月庚申三司假内藏金二千七百兩四年四月丙戌出内藏錢七萬貫付京西路市軍粮閠十二月丁巳三司假内藏綾萬三千七百四十匹乾興元年三月丙戌出内藏庫銀二十萬兩錢三十萬貫下諸路又出錢三十萬貫下三司許商人入便于河北助給軍費仁宗天聖四年十月辛巳出内藏庫緡錢二十萬下京西路糴軍儲六年六月乙酉出内藏庫緡錢二十萬下京西轉運司市糴軍儲九年八月丙戌出内藏庫絹六十萬下陜西河北河東市糴粮草戊戍又出内藏庫緡錢五十萬河北市粮草九月己巳詔出内藏庫絹六十萬下河北折糴軍儲自三等而上户計其稅一石者糴五斗明道二年五月乙亥出内藏庫緡錢三十萬下三司助山陵十二月甲辰以京東飢出内藏庫絹二十萬下三司貸本路上供之數景祐元年正月甲申以淮南嵗飢出内藏絹二十萬下三司代其歳輸三月乙酉出内藏庫絹五十萬下發轉司市糴軍儲四月丁未出内藏絹三十萬下河北轉運司市糴粮草五月壬申出内藏庫緡錢一百萬賜三司六月壬子出内藏庫緡錢五十萬下三司於瀕河州縣置場糴麥先是京東旱麥不時種故也二年三月戊申出宜聖殿庫真珠付三司以助經費六月丁邜出内藏庫紬絹一百萬下三司市糴軍儲十月己巳出内藏庫緡錢七十萬左藏庫五十萬下河北轉運司市軍儲三年九月己丑出内藏緡錢五十萬下河北轉運司市糴邉儲四年正月甲午内藏庫主者言嵗斥緡錢六十萬以助三司盖始于天禧三年十二月時詔書切戒三司毋得復有假貸自明道二年迄今才四年所借錢帛凡九百十七萬二千有餘請以天禧詔書申飭之奏可七月辛酉詔三司出銀千五萬兩下河北路絹十萬下河東助糴軍粮八月甲戌出内藏庫絹三十萬下河北路市糴軍儲十一月己未出内藏庫紬綿五十萬下河北陜西路市糴軍儲康定元年宰臣張士錢等言禁民戍邉久其家在京師者或不能自存既退上召内侍就殿隅索紙筆自指揮使而下條為數等復召士遜等示之曰朕不欲費三司特出内藏緡錢十萬以賜之二月出内藏庫緡錢八十萬付陜西市糴軍儲四月戊申出内藏庫緡錢十萬下陜西給軍須十二月癸未出内藏庫絹一百萬下三司㫑邉費慶歴二年六月甲戍出内藏庫銀一百萬兩紬絹各一百萬匹下三司以給邉費易河北義勇兵弓弩箭材各一百萬三年十二月庚申孫甫功見景福内庫祖宗積經費之餘以偹非常之用近嵗諸路物帛多入内庫中外盡疑宫中之私費唐置瓊林大盈二庫率供燕侈楊炎陸贄請罷之今日景福之積頗類唐之二庫皇祐五年閏七月出内藏庫緡錢十萬紬絹二十萬綿十萬下河北助糴軍儲至和元年八月癸巳出内藏庫錢二百萬緡令入内供奉官勾當御藥院張茂則置司以市河北入中軍糧抄先是上封者言河北入中軍粮京師給還緡錢紬絹商人以筭請久未能得其抄毎百千止鬻六七千今若出内藏庫錢二百萬緡量増價收市之嵗可得遺利五十萬上以為然故委茂則幹其事既而知諌院范鎮言内藏庫𣙜貨務同是國家之物豈有𣙜貨務固欲滯商人筭抄而令内藏庫乗賤以買之與民争利傷體壊法莫此為甚上諾鎮言遽罷之自皇祐二年改用見錢法京師積錢少不能支入中之費常出内藏庫錢帛百萬以賜三司久之入中者寖多京師帑藏益乏商人持劵以俟動彌嵗月則至損其直以售于蓄賈之家故言利者欲革之朝廷既行即止然自此並邉虚估之不復起二年十月乙未出内藏庫錢一百萬下河北市糴軍儲十一月丙辰出内藏庫絹三十萬下并州市糴軍儲嘉祐元年十月丁邜出内藏庫銀十萬兩絹二十萬匹錢一十萬貫下河北市糴軍儲三年九月乙巳出内藏庫紬絹十萬下河北轉運司助糴軍儲六年九月癸丑詔三司如聞河北秋稼甚登其出内藏庫緡錢一百萬助糴軍儲七年司馬光言祖宗所為置内藏者以備飢饉兵革非常之費非所以供陛下奉養賜予之具也今内藏庫專以内臣掌之不領於三司其出納之多少積蓄之虚實簿書之是非有司莫得而知也十月乙未詔天下常平倉多所移用而不足以支凶年其令内藏庫與三司共支緡錢一百萬下諸路助糴之從右正言判司農寺王陶所請也英宗治平元年吕誨言内帑奉宸庫非有司闗掌外臣莫得知其登耗亦聞禁中取用尚未節加之近倖因縁侵漁以有限之積供無窮之費一旦有事何以支吾三月丁酉詔三司用内藏庫錢三十萬貫修奉仁宗山陵依乾興例蠲其半餘聽有司支應神宗熈寧元年八月丙寅又詔河北馬軍並令立社依陜西河東路例供備錢助買馬其先給官價錢並増之仍賣内庫珠千餘萬給其用二年九月己丑詔諸路金銀並納左藏庫歳出金三萬兩銀十五萬兩赴内藏庫為永額以上批内庫近年諸路所納金銀甚耗减盖嵗無額故三司得以時有移易今若以諸路歳上供内庫金銀撥赴三司朝廷酌中数令三司嵗認送内庫封樁如此為便故也其後復詔依舊悉輸内藏庫仍歳具一帳申三司拘催内藏庫錢帛案三年正月己酉御史程顥言聞京東轉運司去年因和買紬絹増嵗抑配民錢一千買絹一疋後并稅絹毎疋令輸錢一千五百文又配上等户給粟豆錢詔轉運司具析以聞其後轉運司言散粟豆錢本以濟民乏皆取民愿和買依舊並無抑配者乃詔以行常平新法其粟豆錢自今勿給紬絹本錢撥𨽻北京封樁息錢納内藏庫時王廣淵為轉運使而顥言廣淵妄迎合朝廷意故致此五年三月戊申賛善大夫户部判官吕嘉問提舉在京市易務仍賜内藏庫錢一百萬緡為市易哲宗元祐元年四月甲午時為御史上官均言先朝以金部右曹案主行内藏受納寳貨支借拘催之事而奉宸内藏庫受納又𨽻太府寺然按其所領不過闗報寳貨之所入為數若干其不足若干為之拘催歳入之數而已至于支用多少不得以轉質搃領之者止官中數十人昨來内藏斥賣逺年縑帛毎疋止二三百文直止于十之一二此不知貿易移用之弊臣以為宜令戸部太府寺于内藏諸庫得加檢察而轉貿其歳久之貨而無棄敗之患四月蘓轍言西邉熈蘭等州及安强米脂等察毎年費用約三百六七十萬貫此錢大半出于田役寛剰今苖役既罷故議者欲指坊場河渡錢以供其費致使衙前湏至並差鄉户臣欲乞朝廷宻切指揮户部與詳定役法官㑹議先計上件新置城寨歳貢幾何若干係西川茶錢若干係經制司錢若干係缺額禁軍錢若干係内藏庫錢似此諸般窠名外各有不足數目若干若此數目不至絶支臣乞計其所缺三年之数于元豐庫及崇政殿庫錢内樁出訪聞此庫錢物山積本先帝所蓄以備邉事今于此支用正合先帝本意若朝廷重借二庫錢物未欲專行支給即乞将坊場河渡等錢除雇募衙前等外量将剰数添助邉費所貴養民備邉兩不失所紹聖二年二月辛巳董敦逸言河北人户尚有流移詔于内藏庫支錢十萬貫絹十萬疋分賜河北東西兩路提舉司凖備賑濟髙宗紹興二十六年六月癸巳時有詔免民間丁錢一年仍降御筆付户部官令買絹十二萬疋其直于内庫支復令内庫更支見絹一十二萬匹並充蠲放一年丁絹之数以恵細民三十一年八月上念出戍官兵之勞時捐内帑錢七萬緡分犒其家三十二年四月己巳禮部侍郎黄中言足食之計在于量入為出今天下財賦半入内帑有司莫能計其盈虚請悉以歸左藏且引唐楊炎告徳宗語曰陛下仁聖豈不能如徳宗之為哉上善之元豐庫大觀東西庫徽宗政和四年七月己亥詔元豐大觀東西庫見拘催朝廷封樁錢物並仰依條限催促拘收如違並依三催不到䆒治法蔡絛史補云元豐庫大觀庫者皆謂之朝廷庫務國家沿襲唐五代之制財用盡付三司有自來矣及熈寧初議改法因取財利之柄寖歸宰相及元豊官制行既無三司而為户部户部嵗入之額凡四百餘萬緡是獨昔日三司之一事而已三司昔時所應入者則或在朝廷既在朝廷此所以立元豐庫也况又當崇觀之間魯公前後措置所入元豐庫若香藥犀象麄細物貨珠玉金帛不知紀極矣元豐庫之制雖天子不可得而用倘有所用必有司具数上之朝廷宰執聚議同上奏陳降聖㫖下庫始可支撥况宰執議論或有所不同者盖目前行之甚嚴如此也大觀庫者其制同元豐然大觀庫獨貯天下坑冶所以終始未嘗動又不若元豐庫時有支用也大觀庫既貯坑冶金銀及細軟香藥等物大觀東庫大觀本一庫所以有謂之大觀東庫者以又有大觀西庫故也大觀西庫魯公以昔日所鑄當十錢之精緻靳之故以大觀西庫獨貯錢而已大觀西庫當政和初𣙜貨務以客人入納甚盛務中積鏹物盈溢因申乞借大觀西庫收貯未幾大觀西庫復滿其積鏹無慮三四千萬緡此政和二年至四年之盛時也自五年後君臣寖觧體撓政者寖争出日用亦寖多逮宣和元年二年之間大觀西庫一空矣獨元貯當十錢如故而已然大觀東庫未嘗一有所出雖端研亦三千餘板張滋墨者世謂勝李庭珪亦無慮十萬斤百物若是又元豊庫一日数内魯公偶見有佛牙真者十二枚因歎息曰此亦何用貯積乎命左司詳加試驗得佛牙真者七枚因分賜諸大禅寺斯可見其充牣靖康之初都邑既首遭攻圍因傾金銀以賂敵皆出大中諸庫故甚盛及後再圍破而賂敵之入反不及前至歛掠甚苦者雅不知帑藏先空前者金銀之盛悉自大觀諸庫故也又虜人所須雖河北山東精絹動千餘萬匹亦出元豐庫與内藏内藏物帛盖少于元豐積鏹則甚多世不知者罪魯公破除國用此可太息也景福庫元豐元年十二月丁邜上毎憤北人倔强慨然有復幽燕之志即景福殿庫聚金銀為兵費是年始更庫名製詩以掲之曰五季失圗玁狁孔熾藝祖造邦思有懲艾爰設内府基以募士曽孫保之敢忘厥志凡三十二庫後積羡餘又掲以詩曰毎䖍夕惕心妄意遵遺業顧予不武姿何日成戎㨗元豐庫銘元豐五年詔十二路發常平錢輸元豐庫張舜民小史云我神宗於崇政殿後設二十四庫以儲金帛親制庫銘其畧曰昔在前朝獫狁孔熾嗟予小子其承厥志云云諸路分将置都作院河北設五都倉講好髙麗良以此也然功未施而上賔是天未欲幽薊之民歸中國乎元豐庫或即崇政殿後庫當考實録卷末云聚金帛内帑毎庫以詩一字目之詩凡三十二字又别置庫賦詩二十字但不計庫名何為長編續考貢獻太祖建隆二年三月詔文武官及致仕官僧道自今長春節及他慶賀不得輙有貢獻長編開寳五年正月乙丑罷荆㐮歳貢魚腊長編太宗淳化三年十月壬子府州觀察折御卿貢白花鷹上令對其使放之仍詔御卿勿復以珍禽竒獸來獻至道三年六月帝謂宰相曰諸州多以祥瑞之物來獻此甚無益但令稼穡豊稔且得賢臣乃為瑞也辛丑詔天下勿獻珍禽竒獸及諸瑞物真宗咸平五年十一月乙未有自眉州貢奉者上念其遐逺詔禁止之六年十月丙子知萊州齊化基獻白鷹詔還景徳三年五月辛酉撫州獻白烏詔還之給其道里之費祥符二年五月丙辰韶州獻婆果後以道逺還之九年九月戊午申禁諸路貢瑞物時遼州獻白免荆門軍獻緑毛龜故也並長編仁宗天聖元年七月己丑罷廣東歳進異花長編髙宗曩者四川監司不能上體聖心依勢作威凌蔑州邑侵漁細民如重州之黄柑黄安之紫梨涪陵之荔子遂寧之糖氷合陽之細茗洋州之香橙古綿之耿梨抛科掊歛動以千数伏望陛下嚴賜戒敕羣書考索後集卷六十四
