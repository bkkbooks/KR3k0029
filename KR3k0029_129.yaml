body:
  text: 羣書考索後集卷六十三宋章如愚編財用門鬻僧類後漢明帝聞西域有神其名曰佛因遣使之天竺求其道得其書及沙門以來大抵以虛無為宗貴慈悲以為人死精神不滅隨復受形生時所行善惡皆有報應故所貴修練精神以至為佛善為宏濶勝大之言以勸誘愚俗精於道者號曰沙門於是中國始傳其術圖其形像而王公貴人尤甚楚王英最先好之晉末僞秦姚興僭位一方招延緇素演說佛經四方至者凡數千人而姚氏之亡曽不旋踵南朝齊武帝遺詔公私不得出家為道及起塔寺以宅為精舍並厭斷之禁浮屠梁武帝篤志事佛前世所未聞至於捨身披緇以為奴𨽻宗廟之祭不薦毛血重圍之中猶聚大衆以念佛卒使臺城不守身辱國亡魏顯祖時平齊户及諸民嵗輸粟六十斛入僧曹者即為僧祗户粟為僧祗粟凶荒以振民於是僧祗户粟遍于州鎮矣宋明帝紀唐髙祖初傅奕上疏極諌詆浮屠法中書令蕭瑀進曰佛聖人也非聖人者無法請誅之奕曰禮始事親終事君而佛逃父出家非孝者無親瑀不答髙祖九年廢浮屠老子法至太宗復立之明皇欲相姚崇崇上十事曰武后造福先寺費巨百萬臣請絶佛營造可乎帝曰朕能行之元宗時安祿山反楊國忠以為正庫物不可以給士遣侍御史崔衆至太原納錢度僧尼道士旬日得百萬緡而已明年鄭清叔與宰相裴冕建議以天下用度不充諸道度道士僧尼不可勝計又於輔關諸州納錢度道士僧尼萬人肅宗引浮屠數百居禁中號內道場張鎬曰天子之福要在養人願勿以小乘撓聖慮憲宗迎佛骨于鳳翔留禁中三日乃歷遍諸寺王公士民瞻奉捨施惟恐弗及刑部侍郎韓愈上疏切諌憲宗大怒將加極刑裴度崔群為之營救乃貶潮州刺史武宗素惡僧尼㑹昌四年勑上都東都兩街各留一寺天下節度觀察治所各留一寺多不過三十人餘皆勒令歸俗毁招提蘭若四萬餘區收良田數千萬頃奴婢十五萬人歸俗僧尼二十六萬五百人宣宗立盡反為㑹昌之政懿宗咸通十四年八月上遣使迎佛骨群臣諌言憲宗迎佛骨尋晏駕上不聽本紀周世宗以縣官久不鑄錢而民間多銷錢為器皿及佛像錢益少乃敕立監採銅鑄錢自非縣官法物軍器及寺觀鐘磬鈸鐸之類聽留外自餘民間銅器佛像五十日內悉令輸官給其直過期隱匿不輸五十以上其罪死不及者論刑有差上謂侍臣曰卿輩勿以毁佛為疑夫佛以善道人茍志於善斯奉佛矣彼銅像豈所謂佛耶且吾聞佛志在利人雖頭目猶捨以布施若朕身可以濟民亦非所惜也宋朝兩京諸州僧尼共六萬七千四百餘人嵗度千人自後削平諸國其後僧籍彌廣江浙福建尤多太宗崇尚釋教興國中置院於太平興國寺後改為傳法院車駕亦嘗臨幸得西域僧法天及息天災施獲等取所獻梵夾翻譯焉息天災等人賜紫袍師號又命文臣潤色其文是嵗息天災等獻所譯經文一卷詔入藏刻板流行自是盡取禁中梵夾俾之翻譯每誕節即獻經焉息天災等皆至朝散大夫光祿鴻臚卿以卒自是譯經之盛近世無比太宗作新譯經之首教序仁宗作景祐天竺字原序以賜之雍熙二年詔自今經業精熟者方許係籍至道元年覽泉州僧籍一嵗未度者僧四千餘人聳然語侍臣曰一夫耕三人食尚有餒者近世一夫耕逮至十人食天下黎民安得不至重困當降約束真宗景德二年真宗御便殿引對諸寺院主首僧詢行業優長者次補左右街僧録先是道官正令功德使選之遷補所置或非其人故上閲試焉祥符元年軍卒張霸緣相國寺幡竿捨身上語近臣曰朕昨令詰其故霸在營常誦經無為惡之迹然事佛豈在捨身苐愚人不曉其㫖若不戒約恐寖以成俗愚民無故自殺耳自今為檢約祥符三年命李維直史館路振等宿于中書出經論題考試左右街僧官而序遷時又命知制誥王曽等考試道士石知章等十人中選為道官也天禧二年三月詔不許創修寺觀院宫州縣常行覺察如造一間以上許人陳告所犯者依法科罪州縣不切覺察亦行朝典公主戚里節度至刺史已上不得奏請創造寺院開置戒壇如違御史彈奏是嵗又詔諸處不係名各寺院多聚奸盜騷擾鄉村况有條貫不許存留並令毁折其舍宇三十間已上並留存天禧二年八月詔普度道士女冠僧尼凡度二十六萬二千九百餘人天禧三年知越州髙紳言僧尼既受戒還家即受父母拜禮臣責問僧司其言有實竊見唐貞觀五年當禁僧尼受父母拜望降勑特行戒止奏可違者重决罰之天禧三年以宰臣丁謂為譯經使潤文官一貟以學士朝向李維同潤文二貟丁謂罷使後亦不常天禧五年道士萬九千六十六人女冠七百三十一人僧三十九萬七千六百一十五人尼六萬一千三百三十九人江浙福建常居天下之半仁宗天聖四年宰臣王曽等言剃度太多皆惰農遊手之人無益政化張知白言臣托樞密日嘗斷劫盜有一火之中全是僧行者上曰自今切宜懲革勿使太濫懲革太濫天聖八年詔應男子出家為僧道者祖父母父母在别有親兄弟侍養方可得出家禁男子祖父母父母在不許出家景祐元年道士萬一千五百三十八人女冠五百八十八人僧三十八萬五千五百三十人尼四萬八千七百四十三人慶歷二年道士萬九千六百八人女冠五百二十二人僧三十四萬八千一百八人尼四萬八千四百十七人至和初陳執中執政因乾元節聽僧五十人度一人既而言者以為不可復百人度一至和元年詔乾元節度僧限百人度一人嘉祐三年賈昌朝奏京師僧寺多招納亡賴遊民為弟子或藏匿亡命奸人自今皆取鄉貫保任方聽收納詔從之神宗熙寧元年七月戊戌知諌院錢公輔言祠部遇嵗飢河决鬻度牒以佐一時之急若于無事時立為陳乞恩例則亦可惜欲乞自今宫禁遇聖節恩賜度牒並裁損或减半為紫衣稍去剃度之冗從之賣度牒蓋始此年前此未嘗書賣度牒因錢公輔言表而出之熙寧二年賜五百道度牒付陜西宣撫司易見錢糴榖熙寧二年王安石奏事上因問曰程皓所言不可賣度牒作常平本錢如何安石曰皓所言自以為王道之正臣以為皓所言不逹王道之權男女授受不親禮也嫂溺不援是豺狼也今度牒所得可置粟凡四十五萬石若凶年人貸三石則可全十五萬人性命今欲為凶年計當於豐嵗為之而國用有所不暇故賣祠部所剃者三千人頭而所可救活者十五萬人性命若以為不可是不知權也熙寧七年給度牒五百道付河東運使修城熙寧七年賜度僧二千五百道賑涇原環慶路飢民及永興路常平糴本熙寧八年上批勘㑹賣度牒數呈有司言自嘉祐至治平總十三年給七萬八千餘道熙寧至今八年給八萬九千餘道元豐七年門下言度牒已著令每道為錢百三十千檢㑹䕫州路每道三百千以次减為百九十千價髙處别取㫖從之髙宗紹興七年獻言之人有欲多賣度牒者朕以為不然一度牒所得不過三百千一人為僧則一夫不耕其所失豈止一度牒之利若住數年其徒當自少矣長編紹興十三年進呈夀皇寺乞每年撥放有礙昨降權住指揮上諭曰既有權住指揮且休放行朕觀昔人有惡釋氏者欲非毁其教絶滅其徒有喜釋氏者即崇尚其教信奉其徒二者皆不得中朕於釋氏但不使其太盛耳獻言之人有欲多賣度牒以資國用朕以為不然一度牒所得不過一二百千而一人為僧則一夫不耕其所失豈一度牒之利若住撥放十數年之後其徒當少息矣禁度牒紹興二十六年王太寶乞减折帛錢劄子上諭曰王太寶近又乞放行度牒殊未曉朕意建言者多以出賣度牒為利亦以祝人主夀延洪國祚為言佛老自東漢永平間方流入中國五帝三王之時人主夀至百嵗卜年至於八百此時安在哉朕以為人主但當凡事上則求合天心下則仁及生民自然享國久長如髙齊蕭梁奉佛皆無益紹興二十七年上諭曰今田萊多荒若更賣度牒是驅農為僧且一夫受田百畝一夫為僧即百畝之田不耕矣朕所以不給度牒者正恐僧徒多則不耕者衆矣經總制宣和間王師討方臘命陳亨伯經制東南七路財賦亨伯始議若賣酒若鬻糟若商稅若田宅貿易牙稅若頭子錢若樓店錢皆稍增其數别歷收係以供移用謂之經制錢其後盧用原為發運判官頗附益之至翁彥國為經制使倣其法又取贏焉謂之總制錢東南一嵗所入一千七百餘萬緡靖康初凡亨伯所創名色一切罷建炎三年議者復請推其法行之於是權添賣酒錢量添賣糟錢添收牙稅錢加收頭子錢增收五分房錢盡收𨽻經總制建議之始猶曰軍興權行事定即罷而後來申請滋多名因浸廣如商稅鈔旁勘合朱墨之屬視宣和有加焉頭子錢始也每緡十文宣和二十紹興五年三十十年四十乾道五十六有係額不係額之異月樁月樁錢始於紹興江西謂之月樁湖南謂之大軍錢初大軍分屯江淮調度趣迫轉運司提督諸郡隨月樁錢以應軍需元降㫖揮以係省不係省封樁不封樁錢取撥應辦然其名色錢𨽻截用之外類皆有名而無實邉事既寧重為州縣之病敷麴引鬻狀紙隨事科罰以足其數紹興九年金人敗盟中原用兵經費至廣江東運使馬承家奏請置月樁錢時參使孟庾主其議將係省不係省錢有額上供無額上供等五十餘件不以有無拘礙仰取合於窠石每月先次收樁如月樁錢未足未許解諸司錢此紹興九年二月指揮也故當時降詔不許科罰後來嵗月浸久諸司往往全額奪去而縣道獨留其名所謂月樁錢無非鑿空橫取於民也㑹計録周時任民以九職斂之以九賦節之以九式而太宰之尊實司九職然猶立㑹計之官以謹其出納之數有職內以㑹其入職嵗以㑹其出職幣以㑹其餘而其大要則總之以司㑹而掌之以司書彼其所以㑹之者非若後世計於數嵗之後也其分之官司有日要焉有月成焉有嵗㑹焉其出納之數少差於舊則㑹計之官隨而正之蓋懼其循習而弊生也唐憲宗元和二年李吉甫撰元和國計簿上之總計天下方鎮四十八州府二百九十五縣千四百五十三其鳳翔等十五道七十一州不由户口外每嵗賦稅倚辦止於浙江東西宣歙淮南江西福建鄂嶽湖南八道四十九州一百四十四萬户比天寶稅户四分减三天下兵仰給縣官者八十三萬餘人比天寶三分增一大率二户資一兵其水旱所傷非所調發不在此數通鑑宋朝蘇轍曰唐李吉甫始簿録元和國計丁謂等因之為景德皇祐治平熙寧四書網羅一時出納之計首尾八十餘年本末相授有司得以居今而知昔參酌同異因時施宜此前人作書之本意也真宗景德㑹計録景德元年丁謂權三司使撰景德㑹計録五卷上之續長編節四年丁謂上㑹計録時議封禪上慮用度不足以問謂謂奏府庫充實遂以㑹計録上聖政編年祥符㑹計録祥符九年辛酉玉清昭應宫副使林特上㑹計録特前為三司使詔纂大中祥符八年天下戶口財賦凡戶八百四十二萬二千四百三口一千八百八十八萬一千九百三十計入兩稅錢帛糧斛二千二百七十六萬四千一百三十三絲綿二草二千二百八十三萬六千六百三十六茶鹽酒稅𣙜利錢帛金銀二千八百萬二千詔奬之仍付祕閣仁宗皇祐㑹計録皇祐四年田况除三司使金榖用度利害纎悉罔不偹舉議者謂三司使自陳恕李士衡之後惟况為稱職撰皇祐㑹計録上之上嘗面諭之曰卿謀猷深逺器識寬厚堪任國大事未幾拜樞密副使續長編録英宗治平㑹計録治平中蔡襄著治平㑹計録會要神宗熙寧㑹計録國家自天聖以後用度浸廣故於㑹計録加詳神宗嗣位用王安石參預樞要尤以理財為先務熙寧三年條例司始議取三司簿籍考觀本末與使副同商度經久廢置之宜一嵗用度及郊祀大費皆編著定式詔用其議以劉瑾等編三司嵗計及南郊式金君卿等編三司籍簿條例司總領焉四朝志熙寧五年朝廷患天下文帳之繁始命曽布刪定法式布因請選吏於三司顓為一司命以駮磨帳司之置始此矣復以張設官吏縻費過當而罷熙寧七年十月庚辰詔三司置㑹計司以宰相韓絳提舉先是絳奏三司總天下財賦其出入之數並無總要考校盈虛之法欲選官置司以天下戶口人丁稅賦及場務坑冶河渡房園之類祖額年課及一路錢榖出入之數去其重復注籍嵗比較增虧及具廢置名件錢物羡餘橫費等數或收多則尋究因依以當職之官能否為黜陟若支不足或有羡餘理當推移使有無相濟如此則國計大綱朝廷可以省察議論政事足寬民力仍乞臣絳提舉同上哲宗元祐㑹計録元祐中蘇轍著也其叙曰凡計㑹之實取元豐之八年而其别有五一曰收支叙而今者一嵗之入金以兩計者四千三百而其出之不盡者二千七百銀以兩計者五萬七千而其出之多者六萬錢以千計者四千八百四十八萬而其出之多者一百八十三萬紬絹以匹計者一百五十一萬而其出之多者十七萬榖以石計者二千四百四十五萬而其出之不盡者七十四萬帛以束計者七百九十九萬而其出之多者八百八十一萬然則一嵗之入不足以供一嵗之出矣二曰民賦叙有曰丁謂之記景德田况之記皇祐皆以均稅為言矣三曰課入四曰儲運五曰經費欒城集元祐元年四月戶部言左司郎中張汝賢言乞諸路轉運司㑹司自熙寧以前嵗入幾何嵗用幾何朝廷常供之外非泛所須者嵗又幾何熙寧以前嵗入幾何仍具某事之費因某法而有令某法既改則其費可罷要以省不急之用量入以為出則無異時之患從之通鑑元祐二年有司奏制國用量入為出必當周知天下金榖之數以察登耗虛實乃能裁節繁冗必資成法以為總要國家自景德至熙寧並修㑹計録宜復講修以備觀覽三年編修㑹計録成韓宗彥蘇轍抗疏謂一嵗之入不足以支一嵗之出先是裁减浮費所損者二十餘事太后遂以身先天下减親族恩澤四朝志數目真宗景德四年七月權三司使丁謂言景德三年新收戶三十三萬二千九百九十八流移者四千一百五十總舊實管七百四十一萬七千五百七十一户一千六百二十八萬二百五十四口比咸平六年計增五十五萬三千四百一十戶二百萬二千二百一十四口賦入總六千三百七十三萬一千二百二十九貫石匹斤數比咸平六年計增三百四十六萬五千二百九欲望特降詔目自今以咸平六年户口賦入為額嵗較其數具上史館從之長編天禧五年天下户八百六十七萬七千六百七十七口一千三百九十三萬三百二十所收租稅比至道末榖增一百七萬五千餘石錢增二百七十萬八千餘貫絹减萬餘匹絁紬减九萬二千餘匹布增五十萬六千餘匹絲線减三萬五千餘兩綿减一百一十七萬五千餘兩茶增一百一十七萬八千餘斤芻茭减一千一百萬五千餘圍蒿减一百萬餘圍炭减五十萬四千餘稱鵝翎雜翎增十二萬九千餘莖箭簳增四十七萬隻黃蠟增五萬餘斤又䪌八十一萬六千餘量麻皮三十九萬七千餘斤鹽五十七萬七千餘石紙十二萬三千餘幅蘆䕠三十六萬餘張大率名物約此其折變及移輸北壤者視當時所須焉至道末上供錢一百六十九萬二千餘貫金一萬四千八百兩銀三十七萬六千兩絲七十萬五千兩綿四百九十七萬兩紬三十七萬九千匹絹一百七十萬八千匹絁五萬二千匹布一百一十萬六千匹又𣙜利所獲總一千一百二十三萬三千餘貫國家率三嵗一親郊祀共計緡錢常五百餘萬貫大半以金銀綾綺絁絹平其直而給之大凡邦國經制舉一嵗之費錢一千六百九十三萬餘貫金一萬四千八百七十兩銀六十二萬餘兩絹三百三十三萬三千餘匹紬九十萬三千餘匹絁五萬九千餘匹綿七百四十五萬兩絲線一百六十四萬兩布二百六萬三千餘端粟二千一百九十四萬石芻二千二百萬六千圍舉一嵗京城給文武官三班使臣及諸司人等奉錢四萬五千八百餘貫給以他物者九萬一千四百餘貫祿粟五萬一千餘石糧五十四萬二千餘石騎軍一嵗給錢六十八萬餘貫都虞侯以上祿粟一萬四千餘石糧一百一十八萬餘石步軍一嵗給錢七十一萬餘貫祿粟七千八百餘石糧一百八十二萬九千餘石大抵若此而亦有盈縮焉天禧末上供惟錢帛增多餘以移用頗减舊數而天下總獲錢二千六百五十三萬餘貫金萬四千四百餘兩銀八十八萬三千九百餘兩絲四百一十七萬二千餘兩綿一千八百九十九萬一千餘兩絹一百五十五萬二千餘匹紬九百四十一萬五千餘匹綾二千四萬四千餘匹絁一十三萬七千餘匹紗縠二萬三千餘匹錦綺二萬八千餘匹布三百五萬七千餘匹茶七十六萬餘斤鹽二十六萬三千八百餘石香藥真珠犀象七十餘萬斤條片顆竹木䕠箔三百六十餘萬條片五榖二千九百八十三萬餘石草三千萬餘圍木炭薪蒿千餘萬斤束總費錢二千七百一十四萬餘貫金一萬三千五百餘兩銀五十八萬餘兩絲三百六十三萬二千餘兩綿一千六百五十萬餘兩紬七十六萬四千餘匹絹四千一百七十三萬七千餘匹綾十萬七千餘匹絁五萬二千餘匹羅二萬七千餘匹紗縠一萬一千餘匹錦綺六千七百餘匹布一百二十九萬七千餘匹茶三十六萬六千餘斤鹽十一萬八千餘石香藥真珠犀象五十二萬三千餘斤條片顆竹木䕠箔一百二十三萬二千餘條片五榖三千四百五十八萬二千餘石草三千四百三十八萬三千餘圍木炭薪蒿四百五十萬餘斤束景德郊祀七百餘萬東封八百五十餘萬祀汾隂上寶冊又增二十萬丁謂為三司使嘗著景德㑹計録以獻林特領使亦繼為之凡舉大禮有司皆籍當時所費以聞必有優詔奬焉長編仁宗皇祐元年戶部副使包拯言此疏不得其陳疏論慶歷八年出入數必是次年也因附此臣伏見景德祥符中文武官總九千七百八十五貟今內外官屬總一萬七千二百餘貟其未受差遣京官使臣及守選人不在數內較之祖宗朝才四十餘年已逾一倍多矣切以唐虞建官惟百夏商倍之周設六官僚屬漸廣秦併六國郡縣益衆降及漢魏以至隋唐雖設官寖多然未有如本朝之繁冗甚也今天下州郡三百二十縣一千二百五十而一州一縣所任職素有定額大率用吏不過五六千貟則有餘矣今乃三倍其多而又三嵗一開貢舉每放榜僅千人復有臺寺之小吏府監之雜工䕃序之官進納之輩總而計之又不止於三倍是食祿者月增力田者日耗則國計民力安得不窘乏哉臣謹按景德中天下財賦等嵗入四千七百二十萬七千匹貫石兩支數闕當考在京嵗入一千八百三十九萬二千匹貫石兩支一千五百四十萬四千九百匹貫石兩慶厯八年天下財賦等嵗入一萬三百五十九萬七千四百匹貫石兩支八千九百三十八萬三千七百匹貫石兩在京嵗入一千八百五十九萬六千五百匹貫石兩支二千二百四十九萬九百匹貫石兩况天下稅籍有常數矣今則嵗入倍多者何也蓋在祖宗之世所輸之稅只納本色自後用度日廣㳂納並從折變董率暴斂日甚一日何窮之有天下田土財用比之曩時虛耗漸以不逮豈于今而能倍之乎非天降地出但誅求於民無紀極爾輸者已竭取者未足則大本安在哉臣以謂冗兵耗於上冗吏耗於下欲救其弊當治其源治其源者在乎減冗雜而節用度若冗雜不减用度不節雖善為計者亦不能拯也方今山澤之利竭矣征賦之入盡矣幸而西北無事乃是可為之時若不鋭意而改圖但務因循必恐貽患將來有不可救之道矣伏望陛下上體祖宗之成憲下恤生靈之重困謂設官太多也則宜艱難選舉澄汰冗雜謂養兵太衆也則宜罷招募㨂斥老弱土木之功不急者悉罷之費出無名者並除之懲禁中奢侈之端節上下浮枉之費當平成之代建長久之䇿願陛下留神省察申命宰執條此數事而力行之則天下幸甚長編皇祐二年正月命翰林學士承㫖王堯臣入內都知王守忠右司諫陳旭與三司較天下每嵗財賦出入之數以聞四年正月乃以上聞長編皇祐四年王堯臣王守忠陳旭等較慶歷皇祐總四年天下財賦出入凡金幣絲纊薪芻之類皆在其數參相耗登皇祐元年入一億二千六百一十五萬一千九百六十四而所出無餘為書七卷丙辰上之詔送三司取一嵗中數以為定式二年正月受命至是乃上之長編英宗治平四年至慶歷五年取諸路鹽酒商稅嵗課比景德㑹計録皆增及三數倍以上景祐中收商稅數四百五十餘萬貫慶歷中一千九百七十五萬餘貫景德中收酒課四百二十八萬餘慶歷中收一千七百一十萬餘貫景德中收鹽課三百五十五萬餘貫慶歷中收七百一十五萬餘貫但茶亦有增而不多爾天下和買紬絹本以利民初行于河北但資本路軍衣遂通其法以及京東淮南江浙景祐中諸路所買不及二百萬匹慶歷中乃三百萬匹自爾時及今二十年但聞比校督責不聞有所寬减也如此浚取天下豈復有遺利自古有國者貨利之入無若是之多其費用亦無若是之廣也翰林學士承㫖張方平奏疏長編神宗元豐三年宋興承五代之弊政六聖相繼與民休息致生齒既庶而財用有餘且以景德皇祐治平校之景德户七百三十萬墾田一百七十萬頃皇祐戶一千九十萬墾田二百二十五萬頃治平戶一千二百九十萬墾田四百三十萬頃天下嵗入皇祐治平皆一億萬以上嵗費亦一億萬以上景德官一萬餘貟皇祐二萬餘貟洎任幕職州縣官三千三百餘貟總二萬四千貟景德郊費六百萬皇祐一千二百萬治平一千三百萬以二者校之官之衆一倍于景德郊之數不同如此則皇祐治平用財之端多于景德也誠詔有司按尋載籍而講求其故使官之數入者之多門可考而知郊之費用財之多端可考而知然後合議其可罷者罷之可損者損之使天下之人如皇祐治平之盛天下之用官之數郊之費皆同于景德二者所省者蓋半矣則又以類而推之天下之費有約于舊而浮于今者有約于今而浮于舊者其浮者必求其所以浮之目而杜之約者必求其所以約之由而從之如是而力行以嵗入一億萬以上計之所省者十之一則嵗有餘財一萬馴致不過有所省者十之三則嵗有財三萬萬以三十年之通計財當有餘財九億萬可以為十五年之蓄自古國家之富未有及此也髙宗紹興五年周室制國用之法在于用地大小視年之豐耗量入以為出漢祖定天下之本在于得秦圖籍周知四方盈虛强弱之實國朝景德皇祐皆有㑹計録至治平熙豐亦有此書其後蘇洵又倣其法作元祐㑹計録雖書未及上其大略亦有可觀者皆所以總括巨細綱紀出納凡天下賦入與官吏養兵之數條章各立支費有限謹視其書上下遵守此作㑹計録之本意也今國家比年以來財賦清虛用度滋廣正宜括嵗入之厚薄因計嵗出入之多寡分其品目别其名色總貫旁通載之圖籍檢考之間如運之掌斯可以裁减浮費增益邦賦誠今日之先務也望選委詳練財賦之官俾效景德元祐等書撰集成録自元年止四年為率每嵗所出之數列之于前却以今嵗計之除頒借已支費外總計見今實有之效合計若干復以日計至嵗終凡官吏之費及應于合用之數通計若干名曰㑹計録量入為出既有以見有無之實截長補短斯可以制裁損之宜庶幾國用有制光宗紹熙三年臣聞當今之務莫急於寬民力自國朝混一之初嵗入緡錢不過一千六百餘萬太宗皇帝以為極盛而倍于唐室矣其後可增嵗廣至熙豐問言利之臣極力聚斂然後嵗入五千餘萬渡江之初東南嵗入不滿千萬比年乃增至六千五百餘萬則所入倍於祖宗時固已多矣祖宗時中都吏部録兵廩之費全費不過百五十萬元豐間紛更費用亦不過月支三十六萬至宣和末崇侈無度然後月支百二十萬渡江之初雖連年用兵然月支百二十萬非泛無不預焉則其所費亦倍于祖宗時多矣此無他故蓋所取者皆祖宗時所未嘗有作俑於後來也所用者皆循習升平積弊而不量今日之事力也何謂後來作俑今上供正賦不過緡錢二百萬此如經制錢六百六十餘萬宣和末發運使經制兩浙創立建炎初吕頥浩再復總制錢七百八十餘萬紹興初參政孟庚總制財賦創立月樁錢七百八十餘萬紹興初應副大軍創立皆祖宗未嘗有也其它名色煩碎如增收添收糴本降本七分五分之類又起於近時也姑以兩浙言之在祖宗時一嵗通收緡錢不過三百三十餘萬而茶鹽酒稅十居其八州郡支費皆在其間今兩淮嵗輸緡錢千一百萬浙東四百二十八萬浙西七百五十六萬而茶鹽之利又專𨽻朝廷州縣支費亦不預焉然則今之取民不知幾倍於祖宗時矣斯民安得不窮困無聊耶羣書考索後集卷六十三
