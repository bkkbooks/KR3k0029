body:
  text: 羣書考索後集卷五十九宋章如愚編財用門銅錢東晉元帝過江用孫氏赤烏舊錢輕重雜行大者謂之北輪中者謂之四文吳興沈充又鑄小錢謂之沈郎錢錢既不多由是稍貴武帝太元三年詔曰錢國之重寶小人貪利銷壞無已監司當以為意廣州夷人寶貴銅鼓而州境素不出銅聞官私賈人皆貪北輪錢斤兩差重以入廣州貨夷人鑄敗作鼓其重為制得者科罪安帝元興中桓元輔政立議欲廢錢用殳帛孔琳之議曰救弊之術無取於廢錢朝議多同琳之故元議不行宋文帝元嘉七年立錢置法鑄四銖文曰四銖重如其文人間頗盜鑄多剪鑿古錢取銅帝甚患之録尚書王義恭建議以大錢當兩以防穿鑿議者多同之右僕射何尚之議曰夫泉貝之興以估貨為本事在交易豈假多數數少則幣輕數多則物重多少雖異濟用不殊况復以一當兩徒崇虛價者也沈演之謂若以大錢當兩則國傳難朽之寶家嬴一陪之利不俟刑憲巧緣自絶上從演之議遂以一錢當兩行之經時公私非便乃罷時言事者多以錢貨減少國用不足欲禁私銅以充官鑄五銖范泰又陳曰夫貨存貿易不在多少昔日之貴今日之賤其揆一也伏願思可久之道贖欲速之情則嘉謨日陳而聖慮可廣先是元嘉中鑄四銖錢輪郭形制與古五銖同價無利百姓不資盜鑄元嘉二十五年罷當兩大錢孝武孝建初鑄四銖文曰孝建一邉為四銖其後稍去四銖専為孝建三年右丞徐爰議曰貨薄人貧公私俱罄今宜以銅贖刑隨罪為品詔可之所鑄錢形式薄小輪郭不成就于是人間盜鑄者雲起雜以鉛鍚並不牢固又翦鑿古錢以取其銅乃立品格薄小無輪郭者悉加禁斷時議者又以銅轉難得欲鑄二銖錢顔峻上三不可之論上不聽廢帝景和二年鑄二銖錢文曰景和形式轉細官錢每出人間即模效之而大小厚薄皆不及也無輪郭不磨翦鑿者謂之來子尤薄者謂之荇葉市井通用之永光元年沈慶之啓通私鑄由是錢貨亂改一千錢長不盈三寸大小稱此謂之鵝眼錢劣於此者謂之綖環錢入水不沉隨手破碎市者不復斷數十萬錢不盈一掬斗米一萬商旅不行明帝泰始初唯禁鵝眼綖環其餘皆通用復禁人鑄官署亦廢工尋又普斷唯用古錢齊髙帝建元四年孔覬上書曰鑄錢之弊在輕重屢變嚴法不禁者由上鑄錢惜銅愛工也自漢鑄五銖錢至宋文帝四百餘年制度有廢興而不變五銖者其輕重可法得貨之宜以為開置錢府大興鎔鑄錢重五銖一依漢法使嚴斷翦鑿小輕破缺無周郭者悉不得行官錢細小者稱合銖兩錢貨既均逺近若一時議者以為錢貨轉少宜更廣鑄重其銖兩以防人姦上乃使諸州大市銅會上崩乃止武帝時竟陵王子良上表曰頃錢貴物賤殆欲兼倍凡在觸類莫不如兹稼穡艱劬斛直數十機杼勤苦匹才三百所以然者實亦有由東間錢多翦鑿鮮復完者公家所愛必須圓大以兩代一困於無所鞭捶質繫益致無聊漢初京師三吳荆郢江襄梁益用錢其餘州郡則雜以榖帛交易交廣之域則全以金銀為貨武帝乃鑄錢肉好周郭文曰五銖重四銖三參二黍又别鑄除其肉郭謂之公式女錢徑一寸文曰五銖重如私鑄五銖二品並行百姓或私以古錢交易者其五銖徑一寸一分重八銖文曰五銖二吳屬縣行之公式女錢徑一寸重五銖無輪郭郡縣皆通用太平百錢二種並徑一寸重四銖源流本一但文字古今之殊耳文並曰太平百錢定平一百五銖徑六分重一銖半文曰定平一稚錢五銖徑一寸半重四銖文曰五銖源出于五銖但狹小東境謂之稚錢五銖錢徑七分半重三銖半文曰五朱源出於雜錢但稍遷異以銖為朱耳二吳行之差少於餘錢又有對文錢其源未聞豐貨錢竟一寸重四銖半代謂之富錢藏之令人富也布泉錢一寸重四銖半代謂之男錢云婦人佩之即生男也此等輕重不一天子頻下詔書非新鑄二種之錢並不許用而趨利之徒私用轉甚至普通中乃議盡罷銅錢更鑄鐵錢人以鐵錢易得並皆私鑄梁敬帝太平元年詔雜用古今錢太平二年鑄四柱錢一當二十後改四柱錢一當十景申復用細錢南史陳初承梁喪亂之後鐵錢不行始梁末又有兩柱錢及鵝眼錢于時人雜用其價同但兩柱重而鵝眼輕私家多鎔鑄又間以鍚錢兼以粟帛為貨髙祖永定元年四月鑄四柱錢一當二十壬辰改四柱錢丙申復閉細錢通鑑文帝大嘉五年改鑄五銖初出一當鵝眼十南史宣帝大建十一年又鑄大貨六銖以一當五銖之十與五銖並行后還當一帝崩遂廢六銖而行五銖竟至陳亡其嶺南諸州多以鹽米布交易俱不用錢後魏初至太和錢貨無所用孝文帝始詔天下用錢十九年公鑄粗備文曰太和五銖詔京師及諸州鎮皆通行之內外百官祿皆準絹給錢匹為錢二百在所遣錢工備爐冶人有欲鑄聽就鑄之宣武帝永平三年冬又鑄五銖錢京師及諸州鎮或不用或有止用古錢不行新鑄商貿不通貿遷頗隔孝明帝熙平初王澄上言謂今之太和與新鑄五銖及諸古錢方俗所便用者雖有小大之異並得通行貴錢之差自依鄉價庶貨環海內公私無壅詔曰錢行已久且可依舊又奏請並下諸方州鎮其太和及新鑄斤古錢內外全好者不限大小悉聽行之雞眼環鑿依律而禁惟太和五銖二錢得用公造新者其餘雜種一用古錢生新之類普同禁約諸方之錢通用京師其聽依舊之處與太和錢及新造五銖並行若盜鑄錢者罪重常憲詔從之而河北諸州舊少錢貨猶以他物交易錢略不入于市三年崔亮奏謹按鑄錢方興用銅處廣既有治利並宜開鑄詔從之自後所行之錢人多私鑄錢稍小薄價用彌賤初建重制盜鑄之禁開科貴之格孝莊帝初私鑄者益更薄小乃至風飄水浮米斗幾直一千楊侃奏曰及頃在雍州亦表陳其事聽人與官並鑄五銖錢帝從之乃鑄五銖錢髙恭之又奏曰今錢徒有五銖之文而無二銖之實薄甚榆莢上貫便破置之水上始欲不沉論今據古宜改鑄大錢文載年號以記其始則一斤所成七十六文銅價至賤五十有餘其中人功食料錫炭鉛沙直置無利應自息心况復嚴刑廣設以臣測之必當錢貨永通公私獲允後遂用楊侃計永安二年詔更鑄文曰永安五銖錢官自立爐亦聽人就鑄盜鑄彌衆時髙謙之上表求鑄三銖錢且政興不以錢大政衰不以錢小唯貴公私得所自今此鑄以濟交乏五銖之錢任使並用國得其益詔將從之事未就會卒北齊神武霸政之初猶用永安五銖遷鄴已後百姓私鑄體制漸别遂各以為名有雍州青赤梁州生厚緊錢古錢河陽生澀天柱赤牽之稱冀州之北錢皆不行交貿者皆以絹布神武乃收境內之銅及錢仍依舊文更鑄流之四境未幾復細薄姦偽競起武定六年文襄王以錢文五銖名須稱實宜稱錢一文重五銖者聽入市天下州鎮郡縣之市各置二稱懸於市門私人所用之稱皆凖市稱以定重輕凡有私鑄悉不禁斷或雖重五銖而多雜錫鑞並不聽用文帝天保四年受魏禪除永安之錢改鑄常平五銖重如其文其錢甚貴而制造甚精其錢未行私鑄已興一二年間即有濫惡至乾明皇建之間往往私鑄鄴中用錢有赤郭青熟細眉赤生之異河南所用有青薄鉛錫之别青徐齊兖梁荆河等州輩類各殊武平以後私鑄轉甚或以生鐵和銅至于齊亡卒不能禁後周之初尚用魏錢及武帝保定元年乃更鑄布泉之錢以一當五與五銖並行時梁益之境又雜用古錢交易河西諸郡或用西域金鈱之錢而官不禁漢書西域傳罽賔國以銀為錢文為騎馬幕為人面幕即幔也烏弋山雞國之錢與罽賔國同文為人頭幕為騎馬加金銀飾其仄安息亦以銀為錢文為王面幕為夫人面王死即更鑄大月氐亦同建德二年更鑄五行大布錢以一當十夫收商賈之利與布泉錢並行四年又以邉境之錢人多盜鑄乃禁五行大布不得出入四關布泉之錢聽入而不聽出五年以布泉漸賤而人不用遂廢之宣帝大成元年又鑄永通萬國錢以一當千與五行大布五銖凡三品並用隋文帝開皇元年以天下錢貨輕重不一乃更鑄新錢背面肉好皆有周郭文曰五銖而重如其文三年詔四面諸關各付百錢為樣從關外來勘樣相似然後得過樣不同者則壞以為銅入官詔行新錢以後前代舊錢有五行大布永通萬國及齊常平所在勿用以其貨易不止四年詔仍舊不禁者縣令奪半年祿然百姓習用既久猶不能絶五年詔又嚴其制自是錢貨始一所在流布百姓便之是時見用之錢皆須和以鍚鑞鍚鑞既賤求利者多私鑄之錢不可禁約其年詔乃禁出鍚鑞之處不得私有采取十年詔晉王廣聽於揚州立五爐鑄錢其後姦狡稍多鑿磨鑢錢郭取銅私鑄又雜以鉛錫遞相倣效錢遂輕薄乃下惡錢之禁十八年詔漢王諒聽於并州立五爐鑄錢又江南人間錢少晉王廣又請於鄂州白苧山有銅礦處鑄錢於是詔聽置十爐鑄錢又詔蜀王秀於益州立五爐鑄錢是時錢益濫惡乃令有司檢天下邸肆見錢非官鑄者皆毁之其銅入官而京師以惡錢易貿為吏所執有死者數年之間私鑄頗息大業已後王綱弛紊巨姦大猾遂多私鑄錢轉薄惡或剪鐵鐷裁皮糊紙以為錢相雜用之貨賤物貴以至於亡以上並通典唐髙祖入長安民間行線環錢凡八九萬才滿半斛武德四年廢五銖錢鑄開元通寶錢徑八分重二銖四三積十年重一兩得輕重大小之中其錢文給事中歐陽詢書字含八分及篆𨽻三體詢初進蠟樣入文德皇后恰一甲迹故錢上有恰文洛并幽益桂等州皆置場賜秦王齊王三爐右僕射裴寂一爐以鑄盜鑄者沒其家其後盜鑄漸起唐志顯應五年以惡錢多官為市之以一善錢售五惡錢其年又改以好錢一文易惡錢兩文唐志乾封元年造乾封泉寶錢徑一寸重二銖六分以一當舊錢之十踰年而舊錢並廢明年以商賈不通米帛踴貴復行開元通寶錢天下皆鑄之犯法日蕃有以舟筏鑄江中者唐志乾封二年詔開元錢依舊施行乾封錢則之通典儀鳯四年命東都糶米粟斗别納惡錢百少府司農毁之是時鑄多錢賤米粟踴貴乃罷少府鑄錢尋而復舊唐志永淳元年私鑄者抵死鄰保里坊村正皆從坐唐志武后時長安中又降勑又令懸樣於市令百姓依樣用錢俄又揀擇艱難交易留滯非穿穴及鐡錫銅液皆得用之熟銅排斗沙澀之錢皆售自是盜鑄蜂起江淮遊民依大山陂海以鑄吏莫能捕神龍先天之際兩京用錢益濫郴衡錢才有輪郭鐡錫五銖之屬皆可用之或鎔錫模錢須臾百十唐志睿宗先天元年京師用錢惡貨物踴貴諫議楊虛受上疏伏見市井用錢不勝濫惡有加鐡錫即非公鑄銅錫亂雜偽錢豐多商賈積滯富家藏鑄公錢未益於時須禁法不當於代要其惡錢自望官為博取納鑄錢州京城並以好錢為用書奏不行玄宗開元初宰相宋璟請禁惡錢行二銖四參錢毁舊錢不可用者江淮有官鑢錢偏鑢錢稜錢時錢掌監察御史蕭隱之使江淮率戶出惡錢捕責甚峻上青錢皆輸官小惡者沉江湖市井不通物價益貴隱之坐貶官唐志開元六年敕禁斷惡錢行三銖四分以上舊錢更收人間惡錢鎔破復鑄準樣式錢敕出之後百姓喧然物價搖動商人不敢交易宰相宋璟蘇頌奏請出大府錢萬貫分於南北兩市平價買百姓間所賣之物堪貯庫宫須者庶得好錢散行人間從之會要又降敕近斷惡錢恐人間少錢行用其兩京文武官夏季防閣庶僕宜即先給錢待後季催取所配物貨賣準數還官會要七年宋璟又請出米十萬斛收惡錢少府毁之唐志十一年詔所在加鑄禁賣銅錫及造銅器者唐志十八年敕以人間多盜鑄錢始禁私賣銅鉛錫及以銅為器皿其采銅鉛錫者官為市取通鑑二十年千錢以重六斤四兩為率每錢重三銖四參禁缺頓沙澀蕩染白強黑強之錢首者官為市之唐志二十二年宰相張九齡建議古者以布帛菽粟不可尺寸杪勺而均乃為錢以通貨易官鑄所入無幾兩工費多宜縱民鑄議下百官宰相裴耀卿黃門侍郎李林甫河南少尹蕭昃祕書監崔沔皆以嚴斷惡錢則人知禁稅銅折役則官冶可成計估度庸則私錢以利薄而自息若許私鑄則下皆棄農而競利矣時劉秩亦有五不可四美之説於是詔禁惡錢二十六年宣潤等州初置錢監兩京用錢稍善米粟價益下其後錢又漸惡詔出銅所在置監鑄開元通寶錢京師庫藏皆滿天下盜鑄益起廣陵丹陽宣城尤甚江淮偏鑄錢數十種雜以鐵錫輕漫無復錢形公鑄者號官爐錢一以當偏爐錢七八富商往往藏之以易江淮私鑄者兩京錢有鵝眼古文線環之别每貫重不過三四斤至剪鐵而緡之宰相李林甫請出絹布三百萬匹平估收錢侍郎楊國忠招權市恩眀日詔復行舊錢唐志天寶十一載又出錢三十萬緡易兩市惡錢國忠又言錢非鐵錫銅沙穿穴古文皆得用之韋倫請厚價募士繇是役用減而鼓鑄多天下爐九十九絳州三十揚潤宣鄂蔚皆十益郴皆五洋州三定州一每爐歲鑄錢三千三百緡唐志肅宗乾元元年經費不給鑄錢使第五琦鑄乾元重寶錢徑一寸每緡重十斤與開元通寶參用以一當十亦號乾元十當錢先是諸爐鑄錢寙薄鎔破錢及佛像謂之盤陀皆鑄為私錢犯者杖死第五琦為相復命綘州諸爐鑄重輪乾元錢徑一寸二分其文亦曰乾元重寶背之外郭為重輪每緡重十二斤與開元通寶錢並行以一當五十是時民間行三錢大而重稜者亦號重稜錢法既屢易物價騰踴米斗錢至七千餓死者滿道初有虛錢京師人人私鑄併小錢壞鍾像犯禁者愈衆鄭叔清為京兆尹數月榜死者八百餘人肅宗以新錢不便命百官集議不能改上元元年減重輪錢以一當三十開元舊錢與乾元十當錢皆以一當十碾磑鬻受得為實錢虛錢交易皆用十當錢由是錢有虛實之名史思明據東都亦鑄得一元寶錢徑一寸四分以一當開元通寶之百既而惡得一非長祚之兆改其文曰順天元寶肅宗寶應元年其開元乾元重較錢並宜凖一文用不須計以虛數代宗即位乾元重寶錢以一當二重輪錢以一當三而大小錢皆以一當一自第五琦更錢犯法者日數百州縣不能禁止至是民甚便之其後民間乾元重稜二錢鑄為器不復出矣唐志劉晏以江嶺諸州任土所出皆重粗賤弱之貨輸京師不足以供道路之直於是積之江淮易銅鉛薪炭廣鑄錢嵗得十餘萬緡輸京師及荆揚二州自是錢日增矣唐志代宗大歷七年禁天下銅器德宗建中元年户部侍郎韓洄以商州紅崖産銅多請復洛源廢監起十爐嵗鑄錢七萬二千緡德宗從之唐志建中二年鹽鐵使包佶奏江淮百姓近日市肆交易錢交下粗惡訪聞諸州山野地窖皆有私錢轉相貨易姦濫漸深今後委本道觀察使明立賞罰切加禁斷會要建中四年判度支趙贊採蓮州白銅鑄大錢一當十以權輕重唐志貞元九年張滂奏諸州府公私諸邑鑄造銅器雜物等伏請準從前勑文除鑄鏡外一切禁斷會要貞元十年詔天下鑄銅每器一斤其直不得過百六十銷錢者以盜鑄論然而民間錢益少繒帛價輕州縣禁錢不出境觀察使李若初請通錢往來而京師商賈齎錢四方貿易者不可勝計詔復禁之唐志貞元十四年鹽鐡使李若初奏道府多以近日泉貨數少繒帛價輕禁止見錢不令出界置使課利有闕商賈不通請所有見錢任其往來勿使禁止從之會要貞元二十年命市井交易以綾羅絹布雜貨與錢兼用憲宗以錢少復禁用銅器時商賈至京師委錢諸道進奏院及諸軍諸使富家以輕裝趨四方合券乃取之號飛錢元和元年禁銅物會要二年禁鉛錫錢會要三年鹽鐡使李巽以郴州平陽銅坑二百八十餘復置桂陽監日鑄錢二十萬天下歲鑄錢十三萬五千緡唐志四年京師用錢緡少二十及有鉛錫錢者捕之非交易而錢行衢路者不間復詔採五嶺銀坑禁錢出嶺唐志元和六年節度使王鍔置爐疏拒馬河水鑄錢工費尤省以刺史李聽為使以五爐鑄每爐月鑄錢三十萬由是河東錫錢皆廢唐志元和七年尚書王紹度支盧坦鹽鐵使王播等奏伏以京都時用多重見錢官中支計近日殊少蓋緣比來不許商人便換因茲家有滯藏所以物價轉輕錢多不出今商量伏請令商人於戶部度支鹽鐵三司任便換見錢一切依舊禁約從之會要元和十二年復給京兆府錢五十萬緡市布帛而富家錢過五千貫者死王公重貶沒入於官以五之一賞告者京師區肆所積皆方鎮錢少亦五十萬緡乃爭市第宅然富賈倚左右神䇿軍官錢為名府縣不敢劾問敬宗寶歷初河南尹王起請銷錢為佛像者以盜鑄錢論唐志文宗太和三年詔佛像以鉛錫土木為之飾𢃄以金銀鍮石烏油藍鐵唯鑑磬釘環鈕得用銅餘皆禁之盜鑄者死唐志太和四年詔積錢以七千緡為率十萬緡者期以一年出之二十萬以二年凡交易百緡以上者匹帛米粟居半河南府揚州江陵府以都會劇約束如京師未幾皆罷唐志太和八年河東錫錢復起鹽鐵使王涯置飛狐鑄錢院於蔚州天下嵗鑄錢不及十萬緡文宗病幣輕錢重時雖禁銅為器而江淮嶺南列肆鬻之千錢為器射利數倍宰相李珏請加爐鑄錢於是禁銅器官一切為市之唐志武宗廢浮屠法永平監官李郁彥請以銅像鐘磬爐鐸皆歸巡院州縣銅益多益鹽鐵使以工有常力不足以加鑄許諸道觀察使皆得置錢坊淮南節度使李紳請天下以州名鑄錢京師為京錢大小徑寸如開元通寶交易禁用舊錢會宣宗即位盡黜會昌之政上並唐志初鑄錢有七監武宗會昌中增置八監每道置鑄坊一太中初二監廢五代晉髙祖勑聽公私自鑄銅錢毋得雜以鉛錫每十錢重一兩以天福元寶為文羣書考索後集卷五十九
