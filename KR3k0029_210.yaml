body:
  text: 羣書考索别集卷二十三宋章如愚撰邉防門江長江江南所恃以為固者長江也四川之地據長江上㳺而下臨吴㑹盖江水出岷山經䕫峡而抵荆楚則江陵為一都㑹沅湘衆水合洞庭而輸之江則武昌為一都㑹豫章西江與鄱陽之浸浩瀚吞納而匯扵湓口則九江為一都㑹江陵古荆州北據漢沔利盡南海東達吴㑹西通巴蜀孔眀以為用武之國武昌今鄂州當江湖之衝西距郢南距鄂西南距江陵東北距九江吴文帝嘗都扵此東晉齊梁陳之際號稱盛府九江今江州魯人謂北控羣蠻西連荆郢晉江州所領兼江東西湖南北十州之地南朝因而不敢嘗以貴王大臣為都督刺史周瑜赤壁之勝後漢建安十三年操東下張昭曰将軍大勢可以拒操者長江也今荆得荆州長江之險已與我共之矣不如迎之肅瑜不可瑜曰得精兵三萬保為将軍破之遇扵赤壁黄盖曰可燒而走也乃取䝉衝鬬艦載燥荻枯柴詐云欲降時東南風急火燒盡北船吕蒙謀殺闗侯建安二十四年闗侯圍曹仁于樊口呂蒙忌侯居上流宻言扵權曰今令征虜守南郡潘璋住白帝蒋欽将㳺兵萬人循江上下應敵所在蒙為國家前據襄陽如此何憂扵操何賴扵侯不如去侯全據長江形勢益張易為守也吕蒙殺侯入江陵蒙襲侯入潯陽盡伏精兵􅖻􅑳中使白衣揺櫓作商賈人服晝夜兼行盡得侯沿邉屯候遂入江陵趙咨使魏魏黄初二年帝曰吴難魏乎咨曰吴王帶甲百萬江漢為池魏帝問詡伐吴蜀黄初四年帝問賈詡欲伐吴蜀何先詡曰吴蜀雖小國依山阻水據險守要汎舟江湖皆難卒謀鄧芝吴蜀二長四年漢遣鄧芝使吴芝曰蜀有重險之固吴有三江之阻合此二長共為唇齒進可并兼天下退可鼎足而立魏帝嘆江之險五年帝大興兵御龍舟至廣陵江水盛長帝臨望嘆曰魏雖有武騎千羣無所用之天限南北六年再至廣陵臨江觀兵戎卒十餘萬旌旗數百里有渡江之志吴人嚴兵固守帝見波濤洶湧嘆曰嗟乎固天所以限南北也陸抗論江晉㤗始六年陸抗疏長江峻山限帶封域此乃守國之末事非智者之所先吴彦鎻江八年王濬作船木柹蔽江而下吴彦為鐵鎻横斷江路羊祜論水戰咸寜二年祜疏唯有水戰是其所便一入其境則長江非復所保還趨城池去長入短非吾敵也羊祜陳伐江南四年祜病遣張華就問籌䇿祐曰孫皓暴虐若不幸而沒吴人更立令主雖有百萬之衆長江未可窺也孫欽嘆北軍飛渡太康元年王濬出巴東以大筏收鐵錐以火炬燒鐵鎻克西陵襲樂鄉孫欽與伍延書曰北来諸軍乃飛渡江也濬入建業濬自武昌順流徑趨建業新亭對泣永嘉五年名士登新亭㳺宴周顗中坐嘆曰風景不殊舉目有江山之異相視流涕王導變色曰當共戮力王室尅復神州何至作楚囚對泣祖逖渡江建興元年逖擊楫渡曰不能清中原而復濟者有如大江庾翼鎮武昌咸康八年庾翼在武昌欲移鎮樂卿王述與庾氷牋曰武昌實江東鎮戍之中非但扞禦上流而已緩急赴告駿奔不難袁喬論沿江軍永和二年元温将伐蜀将佐不可袁喬曰㳂江諸軍足以拒守必無憂也義之論保長江八年殷浩北伐無功謀再舉羲之遺書曰今軍病資竭保淮之志非所以復及莫若還保長江自長江以外羈縻而已不從孫綽論長江隆和二年温請遷都洛陽孫綽疏曰昔中宗龍飛實賴萬里長江畫而守之耳符堅冦江太元六年符堅入冦權翼曰晉雖㣲弱謝安元沖皆江表偉人君臣輯睦未可圗也石越曰彼據長江之險民為之用殆未可伐堅曰今以吾衆投鞭扵江足斷其流何險之可恃也魏主窺江宋元嘉二十七年魏主至瓜步伐葦為筏聲言欲渡江建康震躍民皆荷擔而立上登石頭城有憂色曰檀道濟在豈使胡馬至此長江為限梁承聖二年州郡大半入魏自巴陵以下至建康以長江為限長江天塹祥眀元年隋軍臨江施文慶沈客卿抑奏報而不言後主謂侍臣曰王氣在此齊兵三来周師再来無不摧敗孔範曰長江天塹古以為限隔南北今日虜軍豈能飛渡耶帝以為然奏伎縱酒賦詩不輟賀若弼濟江隋開皇九年若弼請縁江防人每交代之集必集廣陵扵是大列旗幟營幕被野陳人以為隋兵大至急發兵為備既知防人交代後以為常不復設備又使兵縁江時役人馬喧噪故弼之濟江陳人不覺韓擒虎将五百人自横江宵濟采石守者皆醉遂克之樊若水進取江南宋朝開寳七年江南樊若水舉進士不第遂謀北歸先釣魚采石江上以小舫載絲純其中維南岸而疾棹抵北岸以度江之廣狭凡數十往返而得其數遂詣闕自言有䇿可取江南上如其䇿太祖造浮梁渡江冬遣八作使郝守濬率丁匠自荆南以大艦載巨竹絙并下朗州所造黄黒龍船扵采石磯繫纜三日而成不差尺寸王師過之如履平地建康天險建炎元年時駕在南京劉珏言金陵天險前據大江可以固守東南久安財力盡富盛足以待敵許景衡亦言建康天險請定計巡幸水戰之備三年吕頥浩奏隂為過江之備又水戰之具在今宜講然防淮難防江易近雖在鎮江之岸擺拍海船而上流諸郡自荆南抵儀真可渡䖏甚多豈不可預為計望置使兩員一自鎮江至池陽一自池陽至荆南専提舉造船具詢水戰利害世忠决吴越之行上駐驆江寜敵報至召諸将問駐驆之地韓世忠曰官家已失河北山東若又棄江淮更有何地遂决吴越之行敵人采石濟江杜充在建康以六萬人列戍江南岸而閉門不出師無統一敵自馬家渡過江充北走儀真敵入建康遂自采石濟江世忠金山之捷四年烏珠回至鎮江韓世忠駐焦山以邀之世忠兵止八千募海船百餘艘以鐵綆貫大鈎授諸軍強徤者敵擁十舟噪而前世忠分海船為兩道出其背每縋一綆則曳一舟而入敵不得渡烏珠鑿渠遁去趙鼎防金金人破楚州范宗尹曰敵未必再渡趙鼎曰勿恃其不来恃吾有以待之頥浩遣諸将禦江紹興二年秋上曰冦或南来不避如何頥浩曰若盡遣諸将禦江冦豈能便渡但先定計以待之上曰未聞千里而畏人者張浚視師江上四年世忠捷大儀敵在滁上造舟已有渡江之耗趙鼎薦張浚福州居住可當大事詔浚知樞宻院事往江上視師趙鼎陳計鼎宻陳計當先定事至即應之不可聞渡江便退即諸将各自為謀天下事不再集矣三衙楊沂中劉錡謂鼎曰探報如此駕莫湏動鼎曰方遣二君舉兵趨常潤合諸将併力一戰以决存亡無他術也二人同聲曰相公可謂大膽鼎曰事已到此不得不然御史魏矼言當罷請和二字以攻守待之烏珠遁去張浚至鎮江部分諸将世忠與烏珠書謂樞宻已在此矣敵衆乏糧又其主晟病篤韓常勸烏珠曰士無鬭志茍強驅之過江必多叛者烏珠一夕遁去麟㹸亦北走張浚視師六年都督張浚行邉郡視師時淮東宣撫韓世忠駐承楚淮西宣撫劉光世屯太平州江東宣撫張浚屯建康湖北京西招討岳飛在鄂朝論以邉防空缺䖏尚多浚獨謂楚漢交兵之際漢駐兵殽澠間則楚不敢越境而西盖我軍在前雖有他岐捷徑敵畏我之議其後不敢踰越而深入故太原末䧟則尼堪之兵不復濟河亦以此爾不然必環千里之地盡以兵守之然後可安乎張浚㑹大帥議事浚至江上㑹諸大帥議事乃命世忠屯承楚以圗淮陽命光世屯廬州以招北軍張浚練兵建康為進屯旴眙之計命楊沂中領精兵為浚後翼扵是國威大振張浚請幸建康張浚奏東南形勢莫重扵建康實為中興根本且使人主居此則北望中原常懐憤惕不敢自睱自逸臨安易生驕肆力請幸建康浚復出江上浚復出江上視師時諸将聲勢不相及沿江一帶更無軍馬諸将欲退保江浚力奏異議乃息楊沂中逐敵于李家灣髙宗駐驆建康七年上駐驆建康劉錡順昌之捷十年烏珠渝盟劉錡捷扵順昌拓臯之捷十一年烏珠再舉丙戍錡至拓臯適與敵㑹錡與諸軍合擊之浚與大軍繼至敵大敗團結沿江民兵建康留守葉夢得團結沿江民兵數萬至是呼集分據江津分數千人守馬家渡敵果使酈瓊以輕兵来犯覺有備乃出陳康伯四䇿三十一年康伯四䇿沿江諸郡増壁積糧為歸宿之地康伯請决聖意五月康伯奏敵國渝盟天人共憤今日之事有進無退若聖意堅决則将士之氣自振汪澈請置師江上御史汪澈言置師江上而専付閫外之任葉義問督視以知樞宻院葉義問視江淮荆襄軍馬舎人虞允文為參議軍事起張浚判建康命吴拱䕶武昌敵揚聲欲自光黄𢷬武昌朝廷以敵昔嘗由此入江西慮揺根本命吴拱䕶武昌一帶津渡拱将回鄂汪澈止之而自發鄂之餘兵進戍黄州敵果犯㐮陽拱遂破之元顔亮眀日渡江王權退采石十一月葉義問至建康被㫖罷權代以李顯忠時知建康張燾至府才十餘日夜漏下二鼓燾就寝允文叩門求見甚急曰此何等時而公欲安寝乎適諜者言敵以眀日渡江約晨炊玉麟堂公何以為䇿曰燾當以死守亮麾衆渡江亮駐車和之雞籠山丙子亮麾衆渡江時王權所留水軍車船皆在而諸将未有統屬莫肯用命盡伏山崦惟張振王琪稍任責允文區䖏江事允文往采石督舟師未至十餘里聞鼓聲振野官軍十五日坐路旁者問之衆曰天節使淮西聲金不聲鼓我曺皆騎士節使命棄馬過江我曺不解步戰從者皆勸允文還建業允文不聽䇿馬至采石趨水濵權餘兵止萬八千人馬數百而已諸将已為遁計允文召其統制張振王琪後載臯盛新等問之曰敵萬一得濟汝輩走将何之今前控大江地利在我孰若死中求生且朝廷任汝輩不能一戰報國衆曰豈不欲戰誰主張者允文曰汝輩止坐王權之繆至此朝廷已别選将将此軍矣衆曰誰允文曰李顯忠皆曰得人矣允文曰今顯忠未至敵以来日過江我當自先與諸君戮力决一戰且朝廷出内帑金帛九百萬緡給節度承宣觀察使告身在此有功即賞之授之皆曰既有所主請為舎人一戰允文即與浚等謀整步騎陣扵江岸而以海鰍及戰船載兵駐中流擊之布陣始畢風色作亮執小紅旗麾其舟自楊林口出敵始謂采石無兵且諸将盡伏山崦未覺一見大驚欲退不可敵舟将及岸官軍小却允文顧時俊撫其背曰汝膽畧聞四方今可作氣否若立陣後則兒女子耳俊即揮刀出陣待敵風色忽止官軍以海鰍沖敵敵舟分為二官軍呼曰天師勝矣併擊金人金人所用皆撤和州民居屋板所造及掠江濵渡舟底如梢皆不能動遂盡死扵江中其回北岸者亮盡敲殺之采石之捷允文奏捷夜半復布陣待敵遣盛新引舟師自楊林渡口戒曰若敵船自河出即齊力射之必爭與死毋令一舟得出如河口無敵船則以尅敵神臂弓射北岸新即駐舟江心齊力射敵敵騎望之遽却李横權錡職錡病退屯鎮江葉義問以李横權錡職趨令渡江錡姪汜同往軍不利措置守江上以横汜不利差楊存中措置守江以成閔為淮東制置吴拱為湖北制置李顯忠為淮西制置亮以書招王權以携我衆允文用顯忠計檄曰昨王權望風退舎使汝鴟張至此朝廷已将權重置典憲今統兵乃李世輔也汝豈不知其名亮大怒遂抵瓜州諸将按試車船時江岸有車船二十四艘允文與楊存中等臨江按試命戰士踏車船徑抵瓜州将泊岸復回敵兵皆持滿以待其船中流上下三周回轉如飛敵衆相顧駭愕亮笑曰此紙船耳諸酋射殺金亮亮聞李寳在海道焚其戰艦成閔諸軍方順流而下亮愈忿回揚州召諸酋約三日畢濟過期盡殺諸酋謀曰南軍有備如此進有渰殺之禍退有敲殺之憂奈何遂射殺亮沙上勞軍張浚沙上勞軍一軍見浚以為從天而下吴芾乞留建康三十二年上至建康吴芾奏冝留建康以繫中原之望淮兩淮長江所恃以為藩籬者淮也淮東以楚泗廣陵為表則京口秣陵得以蔽遮淮西以盧夀厯陽為表則建康姑熟得以襟帶江西之鎮潯陽為重而舒蘄實潯陽之表湖北之鎮武昌為緊而齊安實武昌之表廣陵今揚州魏文再至佛貍嘗頓軍郄鑒謝安曽鎮此髙宗皇帝駐驆于此淮隂今楚州謝安蕭道成曽鎮此趙鼎曰楚當敵衝所以蔽兩淮盱眙今盱眙軍臧質嘗守此吕頥浩曰駐維揚當以一軍屯盱眙以備衝突已上繫淮東合肥今廬州魏眀帝曰先帝東置合肥賊来輒破地有所必爭魏文時滿寵表合肥西三十里有險可依立城名曰新城時張浚行淮上築廬州城夀春今夀春府魏與吴晉與符堅宋齊梁與拓㧞氏血戰而爭此南北之衝也紹興劉錡嘗渡江援夀昌厯陽今和州孫䇿圗江表起扵此蘓峻濟横江以刼姑熟厯陽者姑熟之門户楊沂中自臨安晝夜疾馳六日而至厯陽已上繫淮西兩淮山勢由少室而来至扵桐柏而愈大自桐柏而至危岡斷塹纍纍相屬接于巢湖幾一千里淮東水寨淮東川澤之國凢爾小洲大渚沙與石磧水勢環繞人所不到之地皆水寨也自謝楊縣楊石鏡老鸛新開諸湖而言凡四十餘䖏而相通之寨九淮西山寨淮西烏林之地凡嶂嶺峭㧞上平下險無路可登無階可陟人所難到之地皆山寨也自六安信陽舒城南巢廬江諸沿邉而下凡有九十四䖏而外有無水之寨六寨官寨将員數每一寨置寨官一員令借補資秩為之主宰每十寨置寨将一員令繫省特差為之提督孫權牋操春月方生後漢建安十八年操軍濡湏步騎四十萬權率七萬禦之相守月餘權牋操春水方生公宜速去别紙言足下不死孤不得安操曰權不欺孤乃還孫權圍合肥二十年權圍合肥時張遼等屯合肥權守十餘日城不可㧞乃還朱桓守濡湏魏黄初三年吴侍子不至帝怒伐吴曹休張遼臧羈出洞口曹仁出濡須直圍南郡吴吕範督舟師拒休朱桓以濡湏督拒仁曺仁向濡須四年仁步騎數萬向濡須朱桓兵才五千人諸将各有懼心桓諭之曰凡兩軍交對勝負在将不在衆寡曹仁既非智勇又千里步涉人馬罷困桓與諸軍共據髙城南臨大江北背山陵以逸待勞為主制客此百戰百勝之勢曺公自来則不足憂況仁等耶仁遣于泰攻城分遣常雕王雙襲中州中州者桓部曲妻子所在桓遣别将擊雙等身自拒泰泰燒營退桓斬雕擒雙死者千餘人魏帝至廣陵五年魏大興兵伐吴至廣陵時江水盛長帝臨望嘆息而去魏帝如廣陵六年以舟師自譙循渦入淮十月如廣陵臨江觀兵吴嚴兵固守帝見波洶湧歎息而去諸葛亮約吴伐魏青龍二年亮出斜谷遣使約吴同入大舉五月吴主入居巢湖口向合肥新城衆號十萬陸遜諸葛瑾入江夏沔口向襄陽孫韶孫承入淮向廣陵淮隂魏滿寵欲㧞新城致賊夀春帝不聼曰先帝東置合肥南守襄陽西圍邳山賊来輒破扵三城之下地有所必爭也縱權攻新城必不能㧞吾将自征之勅司馬懿堅壁以挫亮鋒七月帝東征吴主聞大軍至遂遁諸葛恪圍新城吴諸葛恪前破魏兵遂有輕敵之忘復入冦淮南圍淮南連月不㧞㑹大暑而退祖逖渡江晉建興元年祖逖擊楫渡江屯淮隂起冶鑄募兵二千餘人而進鎮雍丘禇裒伐趙永和五年趙亂禇裒表伐趙即日嚴戒直泗口徑赴彭城北方士民降附日以千計蔡謨曰今日之事殆非時賢所及後敗裒退屯廣陵殷浩保長江八年殷浩北出許洛無功謀再舉羲之遺浩書曰今以區區江左天下寒心固已久矣力爭武功非所當作今軍破資竭保淮之志非所復及莫若還保長江長江之外羈縻而已不從符堅冦淮太元三年秦兖州刺史彭越請東西並進堅從之使超督東討諸軍事遣俱難毛盛等步騎七萬冦淮陽盱眙起攻彭城四年謝元救彭城彭超據彭城俱難克淮隂符堅冦淮南秦毛當王顯帥衆二萬自襄城東㑹超攻淮南五月難超㧞盱眙六萬圍田洛于三阿去廣陵百里朝廷大震謝元自廣陵救三阿難超敗北走僅以身免謝元淝水之捷八年堅大舉蜀漢之兵順流而下先遣符融至頴口梁成攻洛澗詔以謝元為都督謝石謝琰柏伊等拒之元遣劉牢之趣洛澗斬梁成步騎崩潰皆赴淮水堅進屯夀陽列陣臨淝水元軍不得渡使謂符却堅曰但却使之半渡我以鐵騎逼而殺之遂麾却衆亂不能止元與琰伊以精銳八千涉淝水堅衆潰魏攻盱眙元嘉二十八年魏太武自廣陵歸悉力攻盱眙臧質固守凡三旬乃觧圍去魏冦夀陽齊建元二年魏元嘉與劉昶入冦夀陽垣崇祖扵城西北堰淝水堰北築小城使數千人守之崇祖决堰衆溺死皆退走齊淮南入于魏永元二年裴叔業以夀陽降魏魏以元勰鎮夀陽遣崔恵景赴夀陽不克六月陳伯一再攻勰擊之扵肥口大破之斬首九千俘獲一萬伯一遁還淮南遂入于魏韋叡㧞合肥梁天監四年大舉伐魏五年韋叡攻㧞合肥韋叡救鍾離六年命叡救鍾離或勸叡緩行叡曰今鍾離鑿宂而䖏負尸而汲車馳卒奔猶恐其後而況緩乎景宗與叡合以火攻魏橋魏軍大潰梁堰淮水灌夀陽十三年梁堰淮水以灌夀陽成而復壊侯景反夀陽太清二年侯景反扵夀陽吴眀徹㧞夀春陳大建五年吴眀徹攻夀陽堰肥水以灌城眀徹敗淮十年周滅齊上欲爭徐兖督軍伐之眀徹聞彭城列舟艦城下王軌據淮口結長圍以鐵索貫車輪沈清水以遏陳船歸路眀徹舟並礙不得過軌引兵蹙之衆潰眀徹為周人所執淮南盡歸周賀若弼鎮廣陵十三年隋賀若弼鎮廣陵韓擒虎鎮廬江隋問髙熲取陳策陳祥眀元年隋主問取陳之䇿扵髙熲對曰江北地寒田收差晚江南水田早熟量彼收穫之際㣲集士馬聲言掩襲彼必屯兵守禦足得廢其農時彼既聚兵我便解甲再三若此彼以為常後更集兵彼必然不信猶豫之頃我乃濟師隋用其䇿陳人始困裴度平淮唐元和十二年愬降元濟扵城上梯而下檻送京師淮西平世宗征淮南周世宗顯徳二年帝下詔親征淮南丙辰帝至夀州城下營扵淝水之陽命諸軍圍夀州髙宗駐揚州建炎元年敵過東京上駐驆揚州吕頥浩請俟夹淮一戰三年頥浩請申敕諸将以俟夹淮一戰此不易之䇿又駐維揚當以一軍屯盱眙一軍屯夀春以備衝突張守防淮之䇿守言二䇿一防淮一渡江若屯重兵扵楚泗及淮隂三䖏賊兵未能遽犯然恐我師怯戰望風先潰則舟楫拘扵南岸敵或以精騎間道先絶吾渡江之路此可患者一渡江則去中原益逺又行在兵多西人不樂南去可患者二若為中原計而幸不至則用防淮之䇿若為宗社計而出扵萬全則用渡江之䇿髙宗南渡二月敵犯淮倉卒南渡敵犯淮冬敵䧟滁犯夀春官吏以城降犯無為守臣與民渡江南歸䧟廬犯和守以城降犯真守棄城敵冦淮東四年秋達蘭冦淮東詔劉光世住鎮江分兵以備江岸乃㑹淮南諸鎮併力擊之張浚不救楚州楚州危趙立告急趙鼎欲遣張浚往救浚曰敵鋒不可當徒手搏虎併亡無益鼎曰楚當敵衝所以蔽兩淮若委而不救則失諸将之心浚曰根本末固人心易揺此行失利何以善後鼎曰江東新造全藉兩浙若失楚則大事去矣浚力辭乃詔岳飛掩擊因令光世遣兵渡江以為援敵攻泰州水寨紹興元年達蘭攻秦州水寨為張敵所敗擒其壻萬户布拉克殺五千人衆朱勝非陳淮五事二年勝非陳經營淮北五事二謂逆豫招到山寨已二十六項彼得之未必為用我失之人心必去五謂渡淮之後有助順土豪可率衆者擢為守将俾自為備則兵勢益張敵偽冦淮四年劉豫子麟姪㹸窩里嗢等自維揚分道入冦舟師由清河據楚騎兵渡淮據滁上曰朕當親總六師往臨大江决扵一戰時江東宣撫劉光世在馬家渡淮西宣撫張浚軍在采石淮東宣撫韓世忠自承州退保鎮江詔光世以兵援世忠且令張浚移軍建康扵是光世進屯太平州世忠復過江駐揚州髙宗親征下詔親征始正豫逆罪人皆鼓勇朝士尚多懐疑鼎曰願不為羣議所移詔松年㑹議進兵詔簽樞胡松年往鎮江與諸将㑹議進兵世忠大儀之捷韓世忠戰于大儀背嵬軍各持長斧上揕人胸下摺馬足遂擒貝勒托卜嘉烏珠走還泗上民兵擊賊時承楚秦三州各有水寨民兵合力擊賊上曰淮民未能安業今乃力奮忠義冝放十年租稅仍撥錢来助之仇愈㧞廬州敵犯廬州知州仇愈發戍兵千人拒之無一還者張浚視師六年浚視師命世忠屯承楚光世拒廬浚屯盱眙劉豫分道入冦九月上發臨安豫聞上将親征簽鄉兵分道入冦西路趨合肥以統之東路由紫荆山出渦口㹸統之報至浚復往江上視師時浚駐盱眙沂中屯泗上世忠在楚飛在鄂聲勢了不相及獨光世之兵在太平州遣輕騎據廬而沿江一帶更無軍馬朝廷甚憂之張浚有進無退時疑敵偽合兵光世奏廬州難守欲還太平諸将議欲保江浚及光世曰賊豫之兵以逆犯順若不勦除何以立國平日亦安用養兵為今日之事有進擊無退保或請上回臨安浚奏若諸将渡江則無淮南而長江之險與敵共淮南之屯正所以屏蔽大江使賊得淮南因粮就運以為家計江南其可保乎今淮西之冦正當合兵掩擊況士氣甚振可保必勝一有退意大事去矣願朝廷勿専制于中使諸将不敢觀望上手書報浚覽卿奏甚眀俾朕釋然無憂浚奉此詔異議乃息光世已㑹廬州而退浚即星馳至采石遣人喻光世之衆曰若有一人渡江即斬以徇督光世復還廬賊次濠夀浚拒之詔併以淮西屬浚沂中李家灣之捷㹸過定逺以犯建康楊沂中悉衆以出至李家灣與㹸遇吴錫率勁卒五千突入㹸軍中賊潰亂沂中乗之大破之而聞㹸敗亦潰敵廢豫之意决張浚築廬城七年朝廷謀北伐浚出行淮上撫諭諸軍築廬州城酈瓊叛秋淮西軍統制酈瓊全軍七萬降豫是冬敵廢豫劉錡順昌捷十年烏珠渝盟錡敗之扵順昌劉錡柘臯捷十一年烏珠謀再舉詔大合兵于淮西以待之乙夘果入冦犯夀春府命錡渡江禦之敵䧟夀春錡至廬敵騎大集錡退以避其鋒敵入廬州錡退東闗見其地負山面水據之以遏敵衝軍勢復振烏珠直據和州浚遣姪子盖與王徳先趨采石浚夜絶江與錡聲援相接又命沂中為浚副自臨安晝夜疾馳六日而至厯陽敵退浚復和州錡至柘臯適與敵合烏珠以鐵騎十餘萬分兩隅而陳王徳與田師中先薄其右隅虜陳動錡與諸軍合擊之浚與大軍繼至敵大敗遂復廬州二月捷書至軍勢大振勿以議和為意秦檜曰山陽所以扞淮東東闗拒淮西水路又山陽六合皆近江形勢之地嚴備此數䖏然後江可安上曰山陽東闗已降䖏分更令張浚益脩守備今雖遣使然勿以議和為意但作不講和䖏之爾康伯條陳淮䇿三十年亮将渝盟右僕射陳康伯條上兩淮守禦之計同樞宻葉義問奏兩淮形勢在今為急荆南劉錡則均襄隨郢光化棗陽之所𨽻也鄂渚田師中則安復信陽漢陽之所𨽻也建康王權則滁和之所𨽻也鎮江劉寳與馬帥成閔則真陽通泰之所𨽻也江隂正控海道冝自鎮江分兵以扼之至扵濠梁固始安豐諸郡近邉亦要總之合肥比已分屯諸将臣欲飭兵擇地險要廣施預備汪澈言飭邉備三十一年丁亥夜風雷雨雪交作汪澈言此隂盛也願飭邉備陳康伯四䇿康伯畫四䇿一令兩淮諸将分畫地界使自為守二措置民社宻為寓兵之計三淮東劉寳将驕卒少不可専用四沿江諸郡増壁積糧以為歸宿之地汪澈言守淮要害澈言渡師淮甸以守其要害存恤山水寨又言淮南山水寨舊来鄉豪自相結集當隨宜存恤使自為守劉錡屯揚州錡屯維揚新復海泗二州葉義問督視義問督視江淮允文參議王權棄廬州劉錡遣王權迎敵權逗遛不進錡再激權不得已發兵至廬州戍守故敵得渡橋以濟淮權棄廬州遁敵騎至尉子橋姚興以三萬人力戰權擁羣刀斧自衞不援興興沒王權棄和州權又棄和州奔采石中外大震劉錡皂角林之捷敵萬户髙景山犯揚州錡禦之扵清河敵以氊裏舟載糧挽而上錡募善沒者鑿沉之錡俄病嘔血不能支猶乗肩輿臨敵指揮敵逼江錡設伏皂角林誘敵入弩發敵敗斬景山成閔援淮西成閔發應城縣回援淮西李顯忠代王權十一月葉義問至建康被㫖罷權以李顯忠代之命虞允文往蕪湖趣顯忠交權軍羣書考索别集卷二十三
