body:
  text: 羣書考索續集卷三宋章如愚編經籍門易易為六經之首陸曰伏羲氏因河圖而畫八卦因而重之為六十四周文拘於羑里作卦辭周公作爻辭孔子作彖辭象辭文言繫辭説卦序卦雜卦謂之十翼然易之文起自周代處名教之初為六經之首周禮有三易連山乆亡歸藏不行於世何以謂之周易孔曰周易稱周者文王作易之時猶在羑里周德未興猶是殷世也故顯周别於殷以此文王所演故謂之周易其猶周書周禮顯周以别餘代故易緯云因代以題周是也先儒又兼取鄭説云既指周代之名亦是普偏之義雖然無所遐棄亦恐未可盡通其易題周因代以稱周是先儒更不别解惟皇甫謐云文王在羑里演六十四卦著七八九六之爻謂之周易正義辨易道至周而備胡曰夫易者宓羲文王周公孔子所以重萬世之大法三才變易之書者也謂之周易者自宓羲畫卦文王重之又從而為之彖辭至周公又為之爻辭仲尼又十翼之數聖相繼其道大備於周故曰周易安定易一名含三義孔曰易緯乾鑿度云易一名而含三義所謂易者變易也不易也又云易者其徳也光明四通簡易㞐節此其易也變易者其氣也天地不變不能通氣此其變易也不易者其位也天在上地在下此其不易也鄭𤣥依此義作易賛及易論正義辨孔氏三義之非胡曰謂之易者按乾鑿度云易一名含三義簡易也不易也變易也故頴逹作疏洎崔覲劉正簡皆取其說然謂不易簡易者於聖人之經謬妄殆甚且仲尼曰名不正則言不順言不順則事不成是言凡興作之事先湏正名名正則事方可成况聖人作易為萬世之大法豈復有二三之義乎按繋辭曰易窮則變變則通通則乆又云生生之謂易是大易之作専取變易之義也安定辨易大義凖天地林曰日月二字交配而成如篆文日下從月也是日往月來迭相為易之義後世聖人以其符合隂陽之理取之以名其書故為易也繫辭曰隂陽之義配日月者是也又曰天地設位而易行乎其中矣又曰日月運行一寒一暑則是易之為義如日月之行於天地之内爾噫作易凖天地此其驗歟文王取易字以名其書奥妙極矣節山易卦何人所重孔曰重卦之人諸儒之言不同凡有四説王輔嗣等以為伏羲重卦鄭𤣥之徒以為神農重卦孫盛之徒以為夏禹重卦史遷以為文王重卦其言夏禹及文王重卦者按繫辭神農之時已有盖取諸益與噬嗑以此論之其言神農重卦亦未為得按説卦云昔者聖人之作易也幽賛於神明而生蓍凡言作者創造之謂也神農以後便是述脩不可謂之作也則幽賛用蓍謂伏羲矣故乾鑿度云重皇䇿者羲伏羲用蓍則伏羲已重卦矣故孔安國云伏羲氏既畫八卦河圖易緯等數所歴三聖但云伏羲文王孔子竟不及神農明神農但有盖取諸益不重卦矣故今依王輔嗣以伏羲始畫八卦即自重為六十四卦為得其實正義辨王弼鄭𤣥之説王曰且伏羲初畫八卦因而重之者也其經初乾初奭音坤初艮初兌初犖音坎初離初六音震初㢲卦皆六畫即此八卦也八卦既重爻在其中蔣氏曰昔神農氏既重為六十四卦而初經更本包羲八卦盖八卦成列而六十四卦具焉神農氏因之也繫辭曰神農氏作斵木為耜揉木為耒耒耨之利以教天下盖取諸益王弼以為伏羲重卦鄭𤣥以為神農重卦其説原於此十朋三易之所由作孔曰按周禮太卜三易一曰連山二曰歸藏三曰周易鄭𤣥易賛及易論云夏曰連山商曰歸藏周曰周易鄭𤣥又釋云連山者象山之出雲連連不絶歸藏者萬物莫不歸藏於其中周易者言易道周普無所不備鄭𤣥雖有此釋更無所據之文先儒因此遂為文質之義今所不取按世譜等羣書神農一曰連山氏亦曰列山氏黄帝一曰歸藏氏既連山歸藏並是代號則周易稱周取岐陽地名毛詩云周原膴膴是也正義辨三易經卦皆八鄭曰三易之法一曰連山以艮為首所謂兼山艮是已二曰歸藏以坤為首所謂坤以藏之是已三曰周易以乾為首所謂乾道變化是已盖乾始萬物坤終萬物而易則終始萬物者也故命名如此其實一揆故經卦皆八其别皆六十有四焉辨三易作而數顯林曰昔者伏羲氏之作易其示諸人盖特以象而已後聖有作因伏羲之象而縱其畫用其七八以占吉凶其書為連山因伏羲之畫連山之占而易其卦序以補未備其書為歸藏因歸藏之畫而去其七八占以九六其書為周易三易作而數始顯矣節山辨坤艮即歸藏連山洪曰昔者三王之興正朔各異周以建子為正商以建丑為正夏以建寅為正用天正者其書首乾是為周易用地正者其書首坤是為歸藏用人正者其書首艮是為連山連山歸藏不傳久矣今之所𫝊司馬霄劉光伯之文而已矣固不足信惟當即易而求之尚有可言者焉盖易之坤卦昔之歸藏之遺意也故全體皆言地道易之艮卦昔之連山之遺意也故六爻皆列人象舉之卦辭爻辭誰作孔曰周易繫辭凡有二説一説以卦辭爻辭並是文王所作案繋辭云易之興也其於中古乎又曰易之興也其當殷之末世周之盛徳耶當文王與紂之事耶又乾鑿度云重皇䇿者羲卦演道徳者文成卦者孔通卦驗又云蒼牙通靈昌之成孔演命明經凖此諸立伏羲卦文係此孔子作十翼易歴三聖只謂此也故史遷云文王因而演易即是作易者其有憂患乎鄭𤣥之徒並依此説一以為驗爻辭多是文王後事按升卦六四王用亨于岐山追王尅殷之後始追號文王為王若爻辭是文所制不應云王用亨于岐山又明夷六五箕子之明夷武王觀兵之後箕子始被囚奴文王不宜預言箕子之明夷又既濟九五東鄰殺牛不如西鄰之禴祭説者皆云西鄰謂文王東鄰謂紂文王之時紂尚南面豈容自言己徳遂言東西相鄰而已又左傳韓宣子適魯見易象云吾乃知周公之徳驗此諸説以為卦辭非文王爻辭乃周公馬融陸績等並同此説今依而用之所以只言三聖不數周公者以父統子業故也正義辨爻辭周公所作蔡曰伏羲作易者也文王演易者也孔子賛言易者也則爻辭之作非文王尚誰尸之然文王之時商命未改王用享于岐山與夫箕子之明夷皆不宜預卜而前言疑非文王之所為也非文王之所為則孰為之耶子繼父業則周公其人也周公制禮作樂皆以繼父之志豈獨於易而廢未集之業哉韓宣子適魯見易象而觀以為周公之徳然則爻之所言是周公之辭明矣其後馬融之釋經陸績之叙太𤣥皆以為周公無疑是則父子一家之學宜其止稱三聖也辨正義得易深旨張曰天下之理本無疑難也且夫爻辭與卦辭說者多謂並是文王所作愚以孔氏正義考之其論詳矣觀其取升卦王用享于岐山之言與夫明夷陳箕子利貞之語東鄰西鄰之句其謂爻辭非文王明矣又何必致疑於言語之間乎嗚呼學者於卦辭爻辭之作尚不知其人則將何以論卦爻之旨哉則知孔氏正義之所論者其有得易道之深旨也文王何以重卦爻胡曰自伏羲仰觀天文俯察地理始畫八卦故爻有九六以盡隂陽之數位有三畫以盡三才之道寫天地雷風水火山澤之象以盡天下之用明健順動入止說䧟明之體以盡天下之理然則伏羲之時世質民淳巧偽未興詐端未作故雖三畫亦可以盡吉㓙之變自神農至堯舜莫不取法八卦之象以為大治之本歴夏沿商以及桀紂之世民欲叢生奸偽萬狀禮廢樂缺天下紛然故三爻不能盡萬物之消長究人心之情偽文王有大聖之才罹於憂患觀紂之世小人在位詐偽日熾思周身之方逹憂患之情通天地之淵藴明人事之始終遂重卦為六十四重爻為三百八十四又於逐卦之下為之象辭故天地通變之道萬物情偽之理一備於此安定上下經法隂陽孔曰按乾鑿度云孔子曰陽三隂四位之正也故卦六十四分為上下以象隂陽也夫陽道純而竒故上篇三十所以象陽也隂道不純而偶故下篇三十四所以法隂也乾坤者隂陽之本始萬物之祖宗故為上篇之始而尊之也離為日坎為月日月之道隂陽之經所以始終萬物故以坎離為上篇之終也咸常者男女之始夫婦之道也人道之興必由夫婦所以奉承祖宗為天地之主故為下篇之始而貴之也既濟未濟為最終者所以明戒謹而全王道也以此言之則上下二篇文王所定夫子作繋以釋其義也正義辨以簡帙分上下經胡曰謂之上下經者自乾坤至坎離三十卦謂之上經自咸常至未濟三十四卦謂之下經然則所以分上下二經者以簡秩重大故分之也乾坤者天地之象坎離者日月之象故所以為上經咸常者夫婦之義既濟未濟人倫終始之道故所以為下經先儒亦常謂不分之即無損於義分之亦無害其實但以簡帙大而分之也辨上下經之首末鄭曰觀之繋辭乾坤其易之藴邪乾坤成列而易行乎其中矣乾坤毁則无以見易故易之上經則首之以乾坤坎水也其在人則為耳在天則為月其象則隂中之陽焉離火也其在人則為目在天則為日其象則陽中之隂焉隂陽合徳而剛柔有體上兌下艮於卦為咸男下女也夫之道也上震下㢲於卦為常女從男婦之道也人倫之道莫大乎夫婦故易之下經則首之以咸常離陽也有所謂隂坎隂也有所謂陽上坎下離於卦為既濟其義與咸同也上離下坎於卦為未濟其義與常同也天地絪緼萬物化醇男女構精萬物化生既濟之謂也既濟升則其道盈矣盈者虧所倚盛者衰所伏不可以不懼也不可以不戒也故其在既濟則思未濟之患下經以二卦為終既取象乎坎離又終之以未濟聖人之旨深矣上下經錯綜天人孔曰先儒以易之舊題分自咸已上三十卦為上經已下三十四卦為下經序卦至此又别起端首先儒皆以上經明天道下經明人事然韓康伯注序卦破此義云夫易六畫成卦三才必備錯綜天人以效變化豈有天道人事偏於上下哉按上經之内明飲食必有訟訟必有衆起是兼於人事不專天道既不專天道則下經不專人事理則然矣正義辨分卦推義有次序程曰乾坤天地之道隂陽之本故為上篇之首坎離隂陽之成質故為上篇之終咸恒夫婦之道生育之本故為下篇之首未濟坎離之合既濟坎離之交合而交則生物隂陽之功也故為下篇之終二篇之卦既分而後推其義而為之次序卦是也辨分二篇本天人林曰易之分上下經何也天人之用也上經始於乾坤何也諸卦之祖也終於坎離天地之中下經始於咸常何也人事之始也終於未濟既濟人事之變也此乾坤所以為經之始也坎位乎北離位乎南南北之中天地之中也冬至陽生坎實司之夏至隂生離實司之冬夏之中天地之中也震㢲得隂陽之始而偏於下兌艮得隂陽之究而偏於上正性所傳離坎而已此坎離所以為上經之終也以情相感者莫如男女以禮相合者莫如男下女情感之至者莫如少男少女故先之以咸而咸之六爻具人象焉情既至矣無禮以節之以隂干陽日為之蝕以牝鳴晨家為之索以婦人與政國為之弊非長男長女不足以曉此非男正位乎外女正位乎内不足以終此故繼之以常此咸常所以為下經之始也六十四卦之中隂陽各當其位各有其應惟既濟為然事至於此蔑不濟矣反而觀之陰陽皆失位也故未濟之象實寓於既濟之中以六十四卦相生言之三隂三陽自泰來者極於既未濟三陽三隂自否來者亦極於既未濟人事至此為之一變矣亦數之所不可不終也始其所當始終其所當終此既濟未濟所以為下經之終也辨天人之説非是李曰先儒以乾至離為上經天道也咸至未濟為下經人事也夫易六畫而成卦有天道焉有地道焉有人道焉兼三才而兩之參伍以變錯綜其數三極之道悉備寓諸爻豈夫天道人事分為上下經哉似此盖拘於文義求其説而不得妄測聖經之藴而豈通變之士哉十翼無異説孔曰其彖象為十翼之辭以為孔子所作先儒更無異論但數十翼亦有多家既文王易經本分為上下二篇則區域各别彖象釋卦亦當隨經而分故一家數十翼云上彖一下彖二上象三下象四上繋五下繋六文言七說卦八序卦九雜卦十鄭學之徒並同此説辨孔子十翼之意胡曰聖人作卦其道至大其理至微常人固難知矣是故孔子復作十翼以釋六十四卦之義上象下象以解文王卦下之辭大象以釋一卦之名義小象分於六爻之下以觧周公之爻辭文言以文釋乾坤二卦之理二繋以統言天地之閫奥人事之終始説卦以陳説八卦之徳業序卦以序六十四卦之次序雜卦以辨衆卦之錯雜辨十翼當為七翼先儒所解皆云上彖下彖上象下象上繋下繋文言說卦序卦雜卦邢璹云翼者附翼附翼者如鳥之翼可以冲天孔子作翼輔翼聖言易道大明騰空而踐無所不至故云翼也鳥之有翼皆信於空易之有象履化育矣羣儒所説皆分彖象繫辭盡以上下加之且十翼義無有所出按篆書七字相類或恐誤作十字今若去其彖係上下論之是七翼明矣辨世儒以數明易林曰易之道四辭變象占是也神之道四精變幾深是也聖人之道四言動卜筮是也二者相為用而易無餘藴矣今夫羲經之書乃所以載易與神與聖人三者之道矣欲盡三者之用則必得大易自然之數而後可後之學易者有圗有譜所以著明其數也自然之數著則易之道著易之道著則聖人之道著而大易之書流行天地之間無所終極矣大率漢世嚴君平知之以其學𫝊揚子雲南北之際闗子明知之以學傳王淹五季之末麻衣處士知之以其學傳陳圗南以降其説愈多其傳愈廣而圗之詳莫詳於希夷之所述與其傳授之所衍觀其圗譜則三聖人作易之深旨可以粲然於目前而其他明於易者或有其圗而不著其姓氏要之皆有得於易者以其出於數學也上下篇加經字孔曰子夏𫝊云雖分為上下二篇未有經字是後人所加不知起自誰始案前漢孟喜易本云分上下二經是孟喜之前已題經字其篇題經字雖起於經其稱經之理則又在於前故禮記經觧云潔静精微易教也既在經觧之篇偹論六藝則詩書禮樂並名稱經而孝經稱易建八卦序六十四卦轉成三百八十四爻運機布度其氣轉易故稱經也易始乾坤終未濟易之始於乾坤而終未濟則不勝異説矣守序卦之文自乾坤而下至未濟而上以為出於理之自然而不知其所以者此一説也乾坤之用莫大於坎離坎離莫大於既濟未濟故所以為終始也此又一説也愚以為不然此後天之序也先天之學伏羲之易也後天之學文王之易也先天之序始於復姤終於夬復者君子之始夬者小人之終夬有意於决小人乎後天之序始於乾坤終於未濟乾坤者隂陽之正也故始焉未濟之終其有志於防小人也知先天後天之説則知易之終始矣六十四卦相生始虞氏卦變乾坤生坎離乾息而生復臨泰大壯夬坤消而生姤遁否觀剥自復來者一卦豫自臨來者四卦明夷觧升震自泰來者九卦蠱賁恒升損歸妹豐節既濟自大壯來者六卦需大畜大過暌鼎兌自夬來者一卦同人自遯來者五卦訟无妄家人革巽自否來者八卦隨噬嗑咸益困井渙未濟自觀來者五卦晉蹇頥萃艮自剥來者一卦謙而屯生於坎蒙生於艮比生於師頥小過生於晉暌生於大壯或生於无妄旅生於賁或生於噬嗑中孚生於訟小畜變需上復變訟初姤無生卦師同人夬大有兌四卦閎李鼎祚取蜀才盧氏之書補其三卦變而頥卦虞以為生於晉侯果以為生於觀今以圗考之其合於圗者三十有六卦又時有所疑不合者二十有八卦夫自下而上謂之升自上而下謂之降升者生也息也降者消也陰生陽陽生隂隂復生陽陽復生隂升降消息循環無窮然不離於乾坤一生二二生三至於三極矣故凡卦五隂一陽者皆自復來復一爻五變而成五卦同人履小畜大有夬凡卦四隂二陽者皆自臨來臨五復五變而成十四卦明夷震屯頥升觧坎蒙小過萃觀蹇晉艮凡卦四陽二隂者皆自遯來遯五復五變而成十四卦訟巽鼎大過无妄家人離革中孚大畜大壯暌頥兌凡卦三隂三陽者皆自泰來泰三變而成九卦歸妹節損豐既濟賁常井蠱凡卦三陽三隂者皆自否來否三復三變而成九卦漸旅咸渙未濟困益噬嗑隨乾坤大父母也姤復小父母也坎離得乾坤之用者也頥大過小過中孚或曰先儒謂賁本泰卦豈乾坤重而為泰又由泰而變乎曰此論之卦也所謂之卦者皆變而之他卦周易以變為占一卦變而為六十四卦六十四卦變而為四千九十六卦而卜筮者尚之也焦延壽之易林所以興也聖人因其剛柔相變繋之以辭焉以明往來屈伸利害吉凶之無常也故君子居則觀其象而玩其辭動則觀其變而玩其占占與辭一也故乾坤重而為泰者八卦變而為六十四卦也由泰而為賁者一卦變而為六十三卦也辨六十四卦相變林曰易曰剛柔相易皆本諸乾坤也凡三子之卦言剛來也明此本坤也而乾來化之凡三女之卦言柔來也明此本乾也而坤來化之故凡言是者皆三子三女相值之卦也非是卦則無是言也謂泰變為賁此大惑也曰不然也往者以内外言也自内而之外謂之往自外而之内謂之來請復借賁卦言之柔來而文剛者坤之柔自外卦下而來文乎乾之剛也分剛上而文柔者乾之剛自内卦上而往文乎坤之柔也於柔言來則知分剛上而文柔者往也於剛言上則知柔來而文剛者下也上者出也下者入也此所謂出入以度内外此所謂上下无常也若言柔來者明此本乾也則不當分剛上而文柔當曰剛來而文柔也无妄之彖曰剛自外來而為主於内外卦乾已三畫矣謂之自外來則當卦外來乎故乾施一陽於坤以化其隂而生三子坤施一隂於乾以化其一陽而生三女者乾坤相易以生六子成八卦也上下往來周流無窮者剛柔相交以盡其爻之變也故爻之言往來言上下内外者豈惟三子三女相值之卦而已哉上經乾坤姤復生卦林曰乾之初交於坤之初得震故為長男坤之初交於乾之初得㢲故為長女乾之二交於坤之二得坎故為中男坤之二交於乾之二得離故為中女乾之上交於坤之上得艮故為少男坤之上交於乾之上得兌故為少女乾坤大父母也故能生八卦復姤小父母也故能生六十四卦復之初九交於姤於初六得一陽姤之初六交於復之初九得一隂復之二交於姤之二得二陽姤之二交於復之二得二陰復之三交於姤之三得四陽姤之三交於復之三得四隂復之四交於姤之四得八陽姤之四交於復之四得八陰復之五交於姤之五得十六陽姤之五交於復之五得十六陰復之上交於姤之上得三十二陽姤之上交於復之上得三十二隂隂陽男女皆順行所以生六十四卦也乾坤獨有文言孔曰文言者是夫子第七翼也以乾坤其易之門戸邪其餘諸卦及爻皆從乾坤而出義理深奥故特作文言以開釋之莊氏云文謂文飾以乾坤徳大故特文飾以為文言今謂夫子但賛明易道申説義理非是文釋華彩當謂釋二卦之經文故稱文言辨作文言以釋奥義胡曰文言者先聖以乾坤之義尤深故又作文飾之言以解其義文言非聖人全文歐陽曰昔孔子門人進記其言作論語其尊必以子曰者所以别夫子與弟子之言若文言者夫子自作不應自稱子曰又其作於一時文有次第何假子曰以發之乃知今周易所載非孔子文言之全篇也盖漢之易師擇取其文以觧卦作至有所不取則文斷而不屬故以子曰起之也其先言何謂而後言子曰者乃講師自為答問之言耳取卦體以為荅也亦如公羊榖梁傳春秋先言何曷而後道其師之所𫝊以為𫝊也今上繋凡有子曰者亦皆講師之説六一文乾卦九六之義且伏羲損去天一地二天三地四凡十數益洛書主十成數而畫八卦其八卦則定用盡三十六數餘九盖存乾卦有三畫坤卦有六畫正合地道无成而代有終也何哉是陽得兼陰故乾稱九也陰不得兼陽故坤稱六也其次謂二三者是天地相成之數故二因之三三為九得名盛陽乃為乾父之端故生震艮坎之三男也二三為六得稱盛隂乃為坤母之理故生㢲離兌之三女也又謂盛陽之䇿餘四九三十六盛隂之䇿四六二十四故陽爻稱九隂爻稱六也辨九六隂陽進退乾陽之位共十二畫謂乾三爻震坎艮各一爻㢲離兌各二爻共三十二畫也坤隂之位共二十四畫謂坤六畫㢲離兌各一畫計二十四畫也陽爻君道也故得兼之計有三十六畫所以四九三十六畫陽爻則稱九也坤臣道也不得僣上故四六二十四畫所以隂爻則稱六也故乾三畫兼坤之六畫成陽之九也陽進而乾云用九矣陰退而坤云用六矣合此餘九六者盖天地剛柔之性也辨用九用六之爻周公作爻辭六十二卦皆獨六位轉於乾坤二卦之後乃加用九用六之位而孔子又從而為之彖象焉盖乾坤之二卦本起天地剛柔之性侔擬君臣上下之理以乾純陽也坤純隂也故加用九用六之虚位欲明天地進退之理以定其剛柔之性故轉於乾曰用九見羣龍无首吉於坤卦曰用六利永正此盖聖人慮乾坤剛柔暴立无首之戒俾免夫過亢之愆也悲坤柔非以柔正為之俾無上六龍戰之憂也是以用九六者伏羲所餘以示乾坤剛柔之性為六子之用不為妄也乾坤位不居正乾位東也既生三男數變授位長子退居西北統其中男少男使蒙太上皇統宗子聽治之義也坤生三女隨變授位少女退處西南統其中女長女正家太上后統宗婦聽教之義也宗子有統所以全蒙宗子養蒙之義也宗婦有統所以齊家宗婦肥家之義也震縱天下之君非乾所統也兊縱天下之母非坤所統也三代𫝊家天下之法也乾坤退居無為之地也止哉爲乎數盡何為坤兌位不言方震東方也巽東南也離南方也乾西北也坎北方也艮東北也惟坤曰致役不言西南者以乾言也兌曰正秋不言西方者以震言也夫大成自中成之變震東代乾元之任乾始天下之君也坤始天下之母也故以乾不言也震繼天下之君也兌繼天下之母也故以震不言也君陽也母隂也夫易紀陽而不紀隂猶書紀盈而不紀縮猶春秋書朔而不書晦一法也大哉法乎陽竒也隂偶也惟能偶之而已無數也言竒之方與位則偶而可對矣烏得而並矣哉屯卦曷次乾坤屯者患難未通冬春之交盛陽發舒凝隂未伏天氣混淪浩蕩而降乎上地氣欝蒸蓄泄而騰於下萬物之種芽甲未成根荄未堅撥之可除抑之可去太曝則槁必雨以濡之雨不節則反害矣太寒則屈縮而不舒必風以撓之然風不和則榮華不實矣此天地始交萬物之生必有屯難未通也及元亨利貞之徳扶持然後萬物得出險中聖人列乾坤於前次屯於後乾坤者天地也屯者物之生也天地交而萬物生屯先乾坤而次屯也蒙卦果行育徳蒙之為言豈止於童思未通藝未精聖人謂蒙可也不參至神未足為通不通則蒙蒙則聖人以下不免也泉始出山下困於險而未通蒙之象也故行以充己之性徳以成己之材行在於守故果决而後全徳出於學故育養而後成也端心正思非禮不蹈坦而趨勇而往此果行也聖人之言師之賢人之論友之辨以致之思以通之此育徳也果行為正育徳為明正且明則思期通矣七日來復之義孔曰陽氣始於剥盡之後至陽氣來復時凡經七日觀往之意分明如褚氏莊氏並云五月一隂生至十一月一陽生凡七月而云七日不云月者欲覘陽長湏速古變月言日今輔嗣云剥盡至來復是從盡至來復經七日也又臨卦亦是陽長而言月則今復卦亦是陽長何以獨變月而稱七日觀往之意必謂不然亦用易緯六日七分之義同鄭康成之説按易緯稽覧圗云卦氣起中孚故離坎震兌各主其一方其餘六十卦卦有六爻爻别主一日凡主三百六十日餘有五日四分日之一又每日分為八十分五日分為四百分四分日之一又為二十分是四百二十分六十卦分之六七四十二卦别各得七分是每卦得六日七分也剥卦陽氣之盡在於九月之末十月當純坤用事坤卦有六日七分坤卦之盡則復卦陽來是從剥盡至陽氣來復主坤之一卦六日七分舉成數言之故輔嗣言凡七日也辨陽氣來復之速胡曰九月為剥是隂氣之極盛至十一月則一陽之氣潜復於黄鐘之宫以再生萬物而萬物得其亨通亦猶君子時有否泰始為小人之所剥及其得位發事業於天下其道大通矣陽氣消剥至此凡歴七爻故謂之七日盖日為陽聖人政見陽道來復之速故以七日言之緯經之説為當孔曰復卦云七日來復並觧云七日當為七月謂陽氣五月而消至十月始復所歴七辰故云七月今按輔嗣注云陽氣始剥盡至來復時凡七日則是陽氣剥盡之後凡經七日始復但陽氣雖至午始消至建戍之月陽氣猶在何得稱七月來復故鄭康成引易緯之説建戌之月以陽氣既盡建亥之月純隂用事至建子之月陽氣始生隔此純陰一卦卦主六日七分舉其成數言之而云七日來復仲尼之緯分明輔嗣之注若此康成之説遺迹可尋輔嗣注之於前諸儒背之於後考其義其可通乎辨陽氣無剥盡之理王昭素曰注䟽並違夫子之義序卦云物不可以終盡剥窮上反下故受之以復以此卦不剥盡也况剥上九有一陽取碩果之象碩果則不剥盡矣坤為十月卦十月純隂用事猶有陽氣在内故薺麥先生直至坤卦之末尚有龍戰之象龍亦陽也假使運有剥盡之時則商王受剥喪元良賊虐諌輔乃至億兆夷人離心離徳當此之時豈無西伯之聖徳箕子之賢乎則知陽氣必無剥盡之理辨昭素之論未當胡旦曰夫積陽則萎凝冰則載男老則弱女壯則雄故靡草死於始夏薺麥生於孟冬數已盡而氣存時已極而物反天地之常理隂陽之本性隂之極有龍戰之災故剥盡則復窮上反下皆正理也言窮者剥之盡也言反者復之初也何則西伯箕子非剥䘮之人哉昭素未之辨也辨三家各有所長漢上先生曰隂剥陽盡而成坤隂極陽反而成復天之行也以時言之九月剥十月坤十一月復以理言之陽無剥盡之理故坤之上六龍戰于野為其嫌於无陽也上六則十月也說卦曰乾西北方之卦也西北方亦十月也序卦曰物不可以終盡剥窮上反下故受之以復非特此也五月一隂生其卦為姤積而成坤故坤下有伏乾十一月一陽生其卦為復積而成乾故乾下有伏坤反復相明以見生生無窮之意盖書不盡言言不盡意天地隂陽不可以一言盡故也王胡逹序卦之義而未盡説卦變卦之妙是以其論類此然各有所長不可掩也房易緯難用王昭素曰注云至來復時凡七日注用凡字取七日之義即約酌而已然未見指歸䟽引易緯六日七分坤卦之盡則復卦陽來䟽文此説未見雅當其六日七分是六十四卦分配一嵗之中時日之數今復卦是乾坤二卦隂陽反復之義䟽若實用六日七分以為坤卦之盡復卦陽來則十月之節終則一陽便來也不得到冬至之日矣據其節終尚去冬至十五日則卦七日之義難用易緯之數矣辨昭素之見未明胡旦曰西漢京房以卦氣言事皆有致驗東都朗顗明六日七分之學最為精妙夫卦之爻則實數也嵗之日則虚數也嵗月不盡之日積而為閏則加筭焉六日七分實數也三百六十五日有餘焉故筭而為閏昭素言從十月終至冬至尚有十五日未明嵗月之積閏術數之精妙也惜乎緯文䘮矣京房已亡學者難知但憑臆説後生穿鑿罕得師資是以紛然而致論也卦爻主方位節氣漢上先生曰昭素於九月剥十月坤十一月復而不知此言其大綱耳坎離震兌各主一方六十卦分主一嵗卦有六爻爻主一日凡三百六十日餘五日四分日之一又分於六十卦每卦六日七分氣之進退推盪而成如九月剥也有艮有噬嗑有大過凡五卦而後成坤十月坤也有未濟有蹇有頥有中孚凡五卦而後成復説卦言坎北方之卦也震東方之卦也離南方之卦兌正秋也於三卦言方則知坎離震兊各主一方矣於兌言正秋者秋分也兌言秋分則震春分坎冬至離夏至為四正矣復大象曰先王以至日閉闗所謂至日者冬至也於復言冬至日則姤為夏至而十二月消息之卦可知矣復彖曰七日來復則六十卦分主一嵗卦有六爻爻主一日可知矣繋辭曰三百八十四爻當期之日盖六十卦當三百六十日四卦主十二節十二中氣所餘五日則積分成閏也辨京房學原於易自大綱而言則剥九月坤十月復十一月故京房曰剝復相去三十日别而言之復主冬至冬至中氣起於中孚自中孚之後七日而復故曰七日來復譬如辰為天樞而不動之處猶在極星之下聖人之言居其所者曰北辰而占天者必曰極星之下詳畧異也歴代先漢惟房得其旨故𤣥一中二羡三從四更五晬六廓七减八沉九成十者象中孚之卦冬至之節日起牛宿一度斗建子律中黄鐘夏后氏之十一月也其八牛宿之五度為周周者象復卦冬至之後周復也宋衷陸績曰易七日來復是也夫京房學於焦贛其説則原於易矣自揚子雲馬融鄭康成宋衷虞翻陸績范望並𫝊此學而昭素非之不知其果何見耶孔氏據緯之術竊觀王洙言孔頴逹雖據稽覧圗以釋王𫝊而易緯消息之術月有五卦卦有大小有諸侯有大夫有卿有公有辟五卦分爻迭主一日周而復始終月而既頴逹主七日則是剥盡至復全隔一月恐王𫝊之旨不在此義也當以七為陽數隂陽消復不過七日天道之常也凡消息據陽而言之陽尊隂卑也辨易緯消息之驗漢上先生曰輔嗣之意謂陽為隂剥其氣始盡至於陽氣來復之時凡七日而已何故如是以天道之行反復不過七日復之不可逺也盖本於天矣頴逹以易緯消息之術考之月有五卦五卦分爻迭主一日周而復始終月而既以成一嵗其六十卦之相去不過七日隂陽消復天道之常則輔嗣所謂復之不可逺也其言驗矣孰謂王𫝊之旨不在此哉一言初上言六乾孔曰第一位言初第六位當言終第六位言上第一位當言下所以文不同者莊氏云下言初則上有末義故大過彖云棟橈本末弱是上有末義六言上則初當言下故小象云潛龍勿用陽在下也則是初有下義互文相通義或然也且第一言初者欲明萬物積漸從無而有所以言初不言一與下也六言上者欲見位居卦上故不言六與末也大象在彖之後乾孔曰此大象也十翼之中第三翼摠象一卦故謂之大象但萬物之體自然各有形象聖人説卦以寫萬物之象今夫子以八卦之所象故言象曰象在彖後者彖詳而象畧也是以過半之義思在彖而不在象有由而然也六十四卦説象不同各隨卦以為義也小象在爻之下孔䟽曰夫子所作象辭原在六爻經辭之後以自卑退不敢於亂先聖正經之辭及至輔嗣之意以為象者本釋經文宜相附近其義易了故分爻之象辭各附其當爻下言之猶如元凱注左傳分經之年與𫝊相附辨爻彖象之先後卦畫伏羲而重文王爻辭者文王之文彖象者夫子之文文王於孔子以分則君以道則先逹豈可以孔子之文而加文王之上則爻之先彖理之必然也彖者統論一卦之體而象則盡其意故彖之先象亦理之必然也孔子以文王之辭奥而難明秘而不示故作象象明大易之旨以詔後學王弼取其文而學之兼以小象配於逐爻之下盖意欲省其文以便講習不知害大義也然乾卦之文獨存於首者亦欲留一卦全文以示後學也故於乾之小象又改為子曰者亦使後人知夫象者孔子所為也以乾象為子曰則知繋辭之子曰皆經師援孔子之説授門弟也下經恒亨以濟三事孔曰褚氏云三事謂无咎利貞利有攸往莊氏云三事者无咎一也利二也貞三也周氏云三事者一亨也二无咎也三利貞也注不明數故先儒各以意説竊謂注云恒而亨以濟三事者明用此恒亨濟彼人事無疑亨字在三事之中八卦對象次序陳曰子曰天地定位山澤通氣雷風相薄水火不相射天地定位則乾與坤對山澤通氣則艮與兌對雷風相薄則震與㢲對水火不相射則離與坎對而説卦健順動入䧟麗止説馬牛龍雞豕雉狗羊首腹足股耳目手口與其對象次序皆初卦也上下經對卦之次李曰今夫上經之卦乾天坤地故乾對坤屯氣之始蒙識之終故屯對蒙需和而訟乖故需對訟師憂而比樂故師對比小畜以隂而制陽復以隂而承陽故小畜對復而泰對否同人明於外大有明於内故同人對大有謙自小而豫自大故謙對豫隨少為而蠱多事故隨對蠱臨下故對觀上噬嗑之明獄對賁之明政剥對復无妄之剛動對大畜之剛止頥養之中對大過之過坎之水對離之火此上經之次也咸之動對常之靜遯之隂長對大壯之陽長晉之明對明夷之暗家人之同而異對暌之異而同蹇難對觧通損對益夬之五陽决一隂對姤之一隂遇五陽萃聚而來對升之進而去困在下而塞對井之下而通革之變之用對鼎之變之器震動對艮止漸女吉對歸妹女凶豐之附而光對旅之單而隠巽之順對兌之說渙之散對節之收中孚之誠在中對小過之行在外既濟對未濟此下經之次也易卦氣之始終林曰易之為道其大矣哉方其一卦未示以象太極二體既立以象兩儀立道有三以象三才設象有四以象四時至於適變有五以象五行定位以六以象六氣一闔一闢變化不居生生無窮均有象數彰其外義理寓其中究其旨歸雖千嵗之日可坐而致與黄帝之素問互為標本謹按素問天以七為節地以五為節周天氣者六朞為一備終地氣者五嵗為一周五而六之五十嵗為一紀六十嵗為一周其原積於日以五而成候候以五而成氣氣以七而成嵗各以所主治焉故震主氣之春分至節之芒種離主氣之夏至及節之白露兌主氣之秋分至節之大雪坎主氣之冬至及節之驚蟄其餘卦氣由中孚至於終凡三百六十爻而爻分主七十二候始於中孚之初九終於頥之上九完朞之日周而復始故繋辭言易與天地凖豈非易之以周名者其通變不窮之義六十四卦卦氣陳曰竊稽季溉卦氣圗其説源於易緯在類是謙曰冬至日在坎春分日在震夏至日在離秋分日在兌四正之卦卦有六爻爻生一氣餘六十卦主六日七分八十分日之七嵗十二月三百六十五日四分日之一六十而一周在易通卦驗曰冬至四十五日以次周天三百六十五日復當故卦乾西北也主立冬坎北方也主冬至艮東北也主立春震東方也主春分㢲東南也主立夏離南方也主夏至坤西南也主立秋兌西方也主秋分鄭康成曰春三月候卦氣者泰也大壯也夬也皆九三上六坎九五上六泰震初九六二大壯震六三夬夏三月候卦氣者否也觀也剥也皆六三上九離九四六五否離上九兌初九觀兌九三六三剥冬三月候卦氣者坤也復也臨也皆六三上六兌九四五坤兌上六坎初六復坎九二六二臨義曰冬至坎姤用事而主六氣初六三也小寒初坎直九二大寒初坎直六三也春於坎直六四雨水於坎直九五驚蟄於坎直上六春分於震直初九清明於震直六二榖雨於震直六三立夏於震直九四小滿於震直六五芒種於震直上六夏至於離直初九小暑於離直六二大暑於離直九三立秋於離直九四處暑於離直六五白露於離直上九秋分於兌直初九寒露於兌直九二霜降於兌直六三立冬於兌直九四小雪於兌直九五大雪於兌直上六先儒舊有此圗故康成論乾坤屯震否泰六卦之貞曰餘不見為圗者備列之所謂備列之者謂此備列四正六十卦也李鼎祚論剥畫隔坤復來成震七日來復之義曰先儒已論雖各指於日月先儒褚氏莊氏後學尋討猶未測其端倪畧陳梗槩以俟來哲王昭素漢孔頴逹六日七分謂坤卦之盡復卦陽來則十月節終一陽便來不得冬至之日據其節終尚去冬至一十五日二家之學盖未見此圗是以議論紛然鼎祚闕疑所俟來哲昭素已臆斷之矣鼎祚於此其優乎辨卦氣之所始隂陽一氣之升降為四時聖人未畫卦以前亦然也聖人未作易以前亦然也聖人必畫卦而作易者盖順天而應人耳天生河圗畫卦之端也律應鳯鳥作歴之始也故自伏羲黄帝至於堯舜或命羲和或察璇璣而有厯數在躬之説也舜既命禹而禹復得洛書之詳則卦律之道尤為顯著然後八卦重而分貞悔於洪範之七稽疑焉是時卦雖重而未知所謂七八九六之常變也連山始艮歸藏始坤夏商用之皆不可變為占故其數止於六一納而已文王因羑里之囚用以卜筮遂纂易繫辭更改術數立大衍之説開萬有一千五百二十之䇿使卦可以衍六十四焉故名曰易易者變也後世謂文王重六十四卦盖不知洪範之有貞悔也謂伏羲氏重六十四卦盖不知鼎始於黄帝而鑄於夏后也由是考之則文王重卦非止於六十四卦實為大衍之説衍為三千八百四十又二百五十六矣所以歴法歴代推究必折衷於大衍也司馬温公曰冬至卦氣起於中孚次復次屯次謙次暌凡一卦御六日二百四十分日之二十一五卦合三十日二百四十分日之一百五此冬至距大寒之數也故入冬至凡渉七日而復之氣應也卦象之用不同孫曰昔者卦之始畫也以象而已矣象既立然後分八方之位水火金木天地之正氣生民所日用不可無也近取諸身則乾首坤腹震足㢲股是也逺取諸物則乾馬坤牛震龍㢲雞是也是之謂八卦之䇿㢲為雞爻之得酉者亦為雞坤為牛爻之得丑者亦為牛是之謂納甲之象闕是之謂四象之象八卦既立因而重之俱為㢲也位乎内者為入位乎外者為散俱為坎也位乎下者為心病位乎上者為心亨是之謂重卦之象一陽為復二陽為臨三陽為泰四陽為大壯五陽為夬六陽為乾是之謂辟卦之象復之一陽進於二為師進於三為謙進於四為豫進於五為大有進於六為剥是之謂升卦之象屯反而為蒙需反而為訟師反而為比小畜反而為履是之謂反對之象遇屯之比其説為車從馬遇歸妹之暌其説為姪從姑是之謂變卦之象觀之二四有艮存焉暌之六二有困存焉是之謂直體之象下二為地中二為人上二為天是之謂三極之象一為元士二為大夫三為諸侯四為上公五為天子六為宗廟是之謂六位之象師北面而出征比南面而受朝咸之六位自拇以至輔井之六位自泥以至幕是之謂全卦之象噬嗑之卦生於頥中有物小過之卦生於中孚之信是之謂二卦合體之象物之在天地間多矣聖人欲以六爻説之非立法如是之多不可也諸卦不言人事夫易兼三才而兩之諸卦上言隂陽剛柔而不言人事辨人事黙寓諸卦夫一卦之體自初至上合為六爻各係辭焉其言大旨皆闗諸人事示吉凶休咎之應使蹈履遵承而罔失也故雖但論隂陽剛柔之義而人事已黙寓乎其中矣繋辭繋辭分上下為非歐陽曰夫繋辭者有所繋之謂也故繋辭焉以斷其吉㓙是故謂之爻言其為辭各聨屬其一爻者也是則孔子専指爻辭為繋辭而乃今以孔子賛易之文為上下繋辭者何其繆也卦爻之辭或以為文王作或以為周公作言孔子聖人設卦繫辭焉是斥文王周公之作為辭不復自名其所作又為繋辭也况其文乃槩其大體雜論易之諸卦其辭非有所繋不得謂繋辭也必矣然自漢儒已有此名不知何從而失之也漢去古最近不應有所失然漢所謂繫者得非不為今之繋辭乎上繋舉十七卦聖人逐爻繋辭又於上繋舉中孚咸困等十七卦爻辭而備陳之盖聖人愛之深也然撮其樞要則不盈數辭極其旨歸則何啻千萬舉諸爻而詳言之俾天下後世因端觸類而長也辨聖人復舉之意聖人逐爻明象所以釋文義也上下繋又舉中孚十七卦盖取諸身行已應世之急務也重舉而復言之所以使天下後世知所以為鍳戒以見聖人憂之深慮之逺也非以餘卦為不足取也若徧舉則三百八十四爻有不勝舉者矣亦猶井復九卦繋辭又復言之而他卦不與也下繫取十三卦言黄帝諸聖人凡所動作皆法乾坤離益十三卦而不及震坎等五卦是特提其要耳舉此則他可知矣辨聖人取則之意十三卦論尚象制器各有所當垂衣裳結網罟象乾坤離三卦而取之於震坎五卦則象無取焉以至日中為市則噬嗑服牛乗馬之取隨舟楫弧矢之取渙暌杵臼宫室之取小過大壯耒耜之於益棺椁之於大過書契之於夬是數者乃安民濟世之急務故聖人則而象之然六十四卦莫不皆可象故賛易取而言之非謂餘卦無可取也羣書考索續集卷三
