body:
  text: 羣書考索卷二十四宋章如愚撰禮門朝儀類宋朝國朝元日五月朔冬至大朝會其日陳布將士填街及左右金吾六軍諸衛勒所部列黃麾大仗屯門及陳於殿庭如常儀文武百僚及羣官客使等皆入朝近仗就陳於閣外大樂令樂工叶律郎俱入就位諸侍衛之官各服其器服符寶郎奉寶俱詣閣奉迎羣臣客使陪位官俱入就位立定侍中奏中嚴又奏外辨聞喝鞭宫垂撞黃鍾之鍾石五鍾皆應皇帝服衮冕御輿以出曲直華蓋侍御如常儀協律郎舉麾宫垂奏乾安樂鼓吹振作皇帝服衮冕執圭出自西房即御坐南向扇開叶律郎偃麾戞􅀈樂止符寶郎奉寶置於御座前文武三品以上尚書省四品自大慶門入三品以上入奏正安之曲至位樂止中書侍郎給事中押表案祥瑞案入詣東西階下相對中書門下學士兩省御史臺供奉官橫行北向樂止典儀贊再拜在位官拜舞起居訖太尉將升中書令門下侍郎俱降至兩階下太尉詣西階下解劔脫舄升殿中書令門下侍郎各於案取所奏之文詣褥位解劍舄以次升分東西立以俟太尉詣御座前北面跪奏稱賀云俯伏興降階佩劔納舄餘官升降劔舄準此還位在位官俱再拜舞蹈訖侍中進當御前承旨稱制宣答橫行官分班序立中書令門下侍郎升詣御座前各奏諸方鎮表及祥瑞訖戶部尚書就承制位跪奏諸州貢物請付所司侍中承旨稱制可退次禮部尚書奏諸蕃貢物請付所司司天監奏雲物祥瑞請付史館皆如上儀侍中進奏禮畢宫垂撞㽔賔之鍾左右鍾皆應叶律郎舉麾宫垂奏乾安樂鼓吹振作皇帝降座御輿入自東房扇開偃麾戞􅀈樂止侍中奏解嚴文武百寮相次退還次仗衛排列如舊以俟上壽中書門下文武百寮立班如朝賀儀皇帝出入舉麾奏樂戞􅀈止樂文武百寮拜舞分班相次退並如賀儀太尉升殿執爵跪奏稱上千萬壽降階云云皇帝舉第二爵登歌作甘露之曲舉第三爵作瑞木成文之曲第四爵奏嘉禾之曲尚食奉御進酒殿中監省酒入閣國朝沿唐制以月朔御紫宸殿羣臣行入閣之儀唐恭宗寶厯初始以月朔御紫宸殿入閣後唐明宗天成初又以月望國朝但以月朔行之其儀閣門先期舉奏俟詔可即施行前一日供帳於文德殿云云太祖建隆元年八月帝常服御乾元殿文武百官入閣置待制對官三年八月朔御崇元殿文武百官入閣竇儀待制邉元範候對十一月朔復御崇元殿入閣趙矩待制張淡候對四年四月朔帝服通天冠絳紗袍御崇元殿視朝設金吾仗入閣艾頴待制馬士元候對太宗淳化二年十一月詔以來月朔日御文德殿入閣令楊徽之張洎與有司取舊圗校定儀注以聞云云注洎又上奏按今乾元殿即唐之含元殿也在周為外朝唐為大朝冬至設仗衛朝萬國在此殿今之文德殿即唐宣政殿也在周為中朝在漢為前殿在唐為正衙凡朔望起居及册后妃太子諸王三公對四夷君長試制䇿舉人在此殿也今之崇德殿即唐紫宸殿也在周為內朝在漢為宣室在唐為上閣即隻日常朝之殿也東晉太極殿有東西閣唐置紫宸上閣法此制也所謂入閣者蓋隻日御紫宸殿上閣之時先於宣政殿前立黃麾金吾仗俟契勘畢喚仗自東西門而入故謂之入閣今朝廷以文德正衙權為上閣甚非憲度也切見長春殿正與文德殿對伏請改創此殿以為上閣作隻日立仗視朝之所其崇德殿崇政殿即唐之延英殿是也為雙日常時聽斷之庭庶乎吻合前規永垂昭範疏入不報三年五月朔御文德殿入閣詔有司增設黃麾仗二百五十人令文武官隨中書門下橫行起居徙翰林位於參知政事位後注舊制入閣惟殿中省細仗與兩省供奉官班入陳於庭帝以為儀衛太簡故命增設仍先列於庭中省仗仍舊真宗景德閣門儀制景德元年二月翰林學士梁皓起居舍人知制誥李宗諤等上言準詔定閣門儀制今重加刋正以類分門共成六卷且春秋大宴小宴賞花行幸宴會各按合班圖位次為四圖請班下閣門遵守仍令三館寫儀制四本一本進入二本送閣門一本送御史臺從之初上以閣門制多世曹史之言殊乏規矩命皓等詳定至是來上真宗祥符二年六月帝問宰臣讀時令之禮何時可行王旦曰舊以四時首月讀之詔自今每入閣日即行此禮其後亦不果行三年閏二月朔御文德殿入閣李迪待制杜夢證候對康定閣門儀制景祐間四方館使夏元亨乞修定閣門儀制命翰林承宣章得象知制誥李淑看詳康定元年四日修成制十二卷事例七卷仁宗景祐三年正月詔知制誥李淑等重修閣門儀注其入閣儀注頗省去繁文與舊儀稍異立班圗景祐四年詳定閣門儀制所言紫宸垂拱殿起居臣寮左右位上欲鐫字記驗并立班圗欲用綃寫二本進內二本付閣門收掌從之元會天聖四年上謂輔臣元會禮久廢朕以來歲元紫宸殿行之宰臣王曽曰朝元盛禮也近年闕於講習命有司撰集議注行之景祐四年三月詔五月朔行入閣之儀仍讀時令付禮院詳定儀注先是詔國朝朝會時令委編修官約唐月令詳定以備宣讀於是賈昌朝等采國朝律厯典禮日度昏曉中星及祠祀配侑諸事當以歲時施行者定為一篇上之遂詔因入閣行其禮後亦不果寶元二年十二月宋庠近奉德音詢及入閣政事臣雖略陳梗槩然理有未詳退而講求敢具條悉夫入閣者乃唐家隻日於紫宸殿受常朝之儀也按唐有大內有大明宫宫正大內之東北世謂之東內有大內為西內自高宗以後天子多仁大明宫宫之內南門曰丹鳳門內第一殿曰含光正室大朝會則御之對北第二殿曰宣政謂之正衙朔望人册拜則御之又對北第三殿曰紫宸殿之上閣亦曰內衙隻日常朝則御之據唐制凡天子坐朝必須立仗於正衙殿或乘輿上御紫宸殿即喚正衙仗自宣政殿兩門入是謂東西上閣門也如以國朝之制相比則今之宣德門唐丹鳳門也大慶殿唐含元殿也文德殿唐宣政殿也紫宸殿唐紫宸殿也今欲求入閣本意施於儀典即須先立仗於文德之庭如天子止御紫宸即喚仗自東西閣門入如此則差與舊儀相合但今之諸殿比於唐制南北不相對以此為異耳故後來議論因有未明又按唐自中葉以還雙日及非有大臣奏事别開延英殿賜對若今假日御崇政延和是也乃知唐世每遇坐朝之日即為入閣而叔世亂離五朝草創大昕之制更從簡易正衙立仗因而遂廢其後或有行者常人之所罕見乃復謂之盛禮甚不然也今之相傳入閣圖者是官司記常朝之制如閣門有儀制勑合班雜坐圗之類何足為希濶之事哉况唐開元舊禮本無此制至開寶中諸儒增附新禮始載月朔入閣之儀又以文德殿為上閣差殊尤甚蓋當時編撰之士討求未至臣伏恐朝廷他日修復正衙立仗欲乞送付兩制使預加商確改正舊儀詔兩制詳定學士丁度等奏今詳元起請入閣是唐朝隻日於紫宸殿受常朝之儀若今來隔日行之禮頗為煩况今殿宇與舊制不同宜且仍舊從之神宗熙寧三年五月宋敏求等言奉詔重修定閣門儀制內文德殿入閣門儀今儀制所載與國朝會要及時人議論頗或異同按今文德殿唐宣政殿也紫宸殿唐紫宸殿也然祖宗朝皆曽御文德殿入閣唐制常設仗衛於宣政殿或止座紫宸殿換仗入閣如此則當御紫宸殿入閣方協舊制王圭等言入閣者乃唐朝隻日紫宸受常朝之儀也非為盛禮不可遵行宴享類宴享傳曰享以訓恭儉宴以示慈惠恭儉以行禮慈惠以布政故享有體薦宴有折爼享有圭璋宴有好貨而享為大宴為小也上公三宴三享侯伯之三宴再享子男之三宴一享享宴必相為終始也方其享也體薦列於爼鼎之間圭璋陳於奠幣之際牢十有二以示其多儀儀具有品以彰盛物其禮可謂盛矣禮備而不嚴則諸侯習於禮文之盛熟於采物之美志以侈移心以欲縱聖人於是而嚴之於享禮几設矣而不敢倚酒盈矣而不敢飲肉乾矣而不敢食皆繁而不殺勞而後成也及其宴也折爼必以備其情好貨必以將其意割烹以共於內饔酒以共於酒正則其禮可謂簡矣禮簡而不親則諸侯苦於禮之難行而厭於禮之太嚴情以是乖志以是隔聖人於是親之於宴禮諸侯之序以齒而不以爵則不拘其分也不醉則無歸則不拘乎法也是故享以嚴為主所以示恭儉宴以親為主所以示慈惠也定王晉侯使士會平王室王享之原襄公相禮殽蒸武子私問其故王聞之召武子曰季氏而弗聞乎王享有體薦宴有折爼公當享卿當宴王室之禮也武子歸而講求典禮以修晉國之法饗有四燕有二皇氏云饗有四種一是諸侯來朝天子饗之則周禮廣行人職云上公之禮其饗禮九獻食禮九舉如其牲則體薦二是王親戚及諸侯之臣來聘王饗之禮亦有飯食及酒者親戚及賤臣不須禮隆但示慈惠故並得飲食之也其酌數亦當依命數其牲折爼亦曰殽蒸三是戎狄之君使來王饗之其禮則委饗也其來聘賤故王不親饗但以牲全體委與之若夷狄君來則當與中國子男同故小行人職掌小賔小客所陳牲牢當不異也四是饗宿衛及耆老孤子則以醉為度故酒正云凡饗士庶子耆老孤子皆共其酒無酌數也燕禮者凡正饗食在廟燕則於寢燕以示慈惠故在寢也燕禮則折爼有酒而無飯其禮最輕升堂行一獻禮畢而説屨升堂坐飲以至醉也凡燕禮亦有二種一是燕同姓二是燕異姓若燕同姓夜則飲之其於異姓遜之而止禮記正義燕禮禮記燕義云諸侯燕禮之義君立阼階之東南南鄉爾卿大夫皆少進定位也設賔主飲酒之禮也使宰夫為獻主臣莫敢與君亢禮也不以公卿為賔而以大夫為賔為疑也注云宰夫主膳食之官也天子使膳宰為主人正義云為疑者公卿朝臣之尊賔又敵主之義疑其敵君為嫌所以使大夫為賔逺嫌也又云小卿次上卿大夫次小卿士庶子以次就位於下獻君君舉旅行酬而后獻卿卿舉旅行酬而后獻大夫大夫舉旅行酬而后獻士士舉旅行酬而后獻庶子所以明貴賤也正義曰按燕禮宰夫為主人酌以獻賔飲畢酌以酢主人主人飲畢酌以獻君君飲畢酌以酢主人更爵以受酢飲卒爵主人又洗觚酬主人先飲卒爵酌以酬賔賔受觚媵爵者北面媵爵於公公取所媵之觶以酬賔此是獻君君舉旅行酬也又燕禮主人獻卿于西階上畢小臣又請媵爵者公使媵爵奠于公前公又行一爵若賔若長惟公所酬大夫辨而止此是為卿旅酬也又燕禮主人洗獻大夫大夫辨受獻乃納工獻衆工畢公又舉觶惟公所賜以旅於西階此是獻大夫為大夫而旅酬也又燕禮主人獻士于西階獻士辨又獻旅食賔媵觚于公公取賔所媵觶唯公所賜乃就席坐行之終於大夫終受者興以酬士舉旅於西階此是獻士為旅酬也庶子卑不為舉旅但無算爵之節執爵者酌而旅之儀禮燕禮云小臣戒與者鄭氏注云小臣相君燕飲之法與者留羣臣也君以燕禮勞使臣若臣有功故與羣臣樂之疏曰必使小臣戒與者以其燕為聘使者為主兼與舊在者觀樂之故今戒可與之人使依時而至案周禮太僕職云王燕飲則相其法又案小臣職云凡大事佐太僕則王燕飲太僕相小臣佐之此諸禮降於天子故使小臣相儀禮疏曰按上下經注云燕有四等月録云諸侯無事而燕一也卿大夫有王事之勞二也卿大夫有聘而來還與之燕三也四方聘客之燕四也又云諸侯無事若卿大夫有勤勞之功與羣臣燕飲以樂之燕屬嘉禮燕禮又云射人告具注云告具事於君以其或射也又云小臣設公席于阼階上西鄉設加席公升即位于席西鄉注云後設公席者凡禮卑者先即事尊者後也正義云此燕私禮故賤者先即事大射辨尊卑故先設公席後設賔席也燕禮又云二瑟工歌鹿鳴四牡皇皇者華笙入立于縣玄中奏南陔白華華黍以笙播此三詩乃聞歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀遂歌鄉樂周南關睢葛覃卷耳召南鵲巢采蘩采蘋此六篇者教之原故國君與其臣下及四方之賔燕用之合樂也鄉樂者風也小雅為諸侯之樂大雅為天子之樂蓋鄉飲酒升歌小雅禮盛者可以進取燕合鄉樂者禮輕者可以逮下也諸侯相與升歌大雅合小雅天子與次國小國之君燕亦如之與大國之君皆升歌頌合大雅其笙間之篇未聞諸侯與其羣臣日視朝之服謂冠元端緇帶燕於路寢相親昵也又云與卿燕則大夫為賔與大夫燕亦大夫為賔正義云此謂與己臣子燕法禮記燕義云不以公卿為賔而以大夫為賔為疑也明嫌之義也封禪類古者帝王之興每易位而起以致太平必封乎泰山所以告成功也禮云因名山升中于天封訖而禪梁甫亦以告太平也無懷氏封泰山禪云云云云在蒙隂縣故城北東下有云云亭伏羲神農並因之黃帝禪云云顓頊帝嚳帝堯舜復禪云云禹禪會稽湯依禪云云其所封皆於泰山也周成王封泰山禪社首其儀不存秦始皇平天下三年東巡郡縣祠馳嶧山頌秦功業於是徵齊魯儒生七十人至乎泰山下諸儒或議曰古者封禪為蒲車惡傷山之土石草木掃地而祭席用葅秸言其易遵也始皇聞此議各乖異難施用由此黜儒生而遂除車道上自泰山陽至巔立石頌德文曰事天以禮立身以義事父以孝成人以仁四守之內莫不郡縣四屬八蠻咸來貢職人庶蕃息天祿永得刻石故號有金册石函金泥玉檢之事焉從隂道下禪梁甫其禮頗采泰祀之祝雍上帝所用封藏而皆祕之固不得而記焉漢武帝立二十八年元鼎中汾隂得寶鼎遂議封禪先有司馬相如有遺書頌功德上竒之以問左內史兒寬寬對曰陛下躬發聖德統攝羣元宗祀天地薦禮百神其封泰山禪梁父昭姓考瑞帝王之盛節也然享薦之義不著于經惟天子建中和之極兼總條貫金聲而玉振之以順成天慶垂萬世之基上然之兒寬以為帝王之盛節相如以為天下之壯觀而羣儒不能知其儀又牽拘於詩書古文於是帝盡罷諸儒三月東上泰山命人上石立之泰山巔石高二丈一尺方博皆三尺壇及墠皆廣長十二丈增高三尺帝因東至海上四月還至奉高又至梁父禮祠地主乙卯令侍中儒者皮辨薦紳射牛行事封泰山下東方如郊祀太一之禮封廣丈二尺高九尺其下則有玉牒書書祕禮畢天子獨與侍中奉車子侯上泰山亦有封其事皆禁明日下隂道丙辰禪泰山下趾東北肅然山如祭后土禮天子皆親拜見衣尚黃而盡用樂焉江淮間一茅三脊為神藉五色土益雜封縱逺方竒蜚禽及白雉諸物頗以加禮兕牛犀象之屬不用皆至泰山祭后土封禪祠其夜若有光晝有白雲起封中天子從禪還坐明堂羣臣更上壽改元為元封後漢光武建武三十年羣臣上言宜封禪泰山詔書曰即位三十年百姓怨氣滿腹吾誰欺欺天乎二月帝幸魯過泰山詔祭山及梁父三十二年詔梁松按索河雒讖文言九世封禪事者松等列奏乃許焉求元封時故事議封禪所施用有司奏當用方石再纍置壇中皆方五尺厚一尺用玉牒盡藏方石牒厚五寸長尺三寸廣五寸有玉檢又用石檢十枚列於石旁東西各三南北各二皆長三尺廣一尺厚七寸檢中刻三處深四寸方五寸有蓋檢用金縷五周以水銀和金以為泥玉璽二其一方一寸二分其一方三寸方石四角又有距石皆再纍枚長一丈厚一尺廣二尺皆在圓壇上其下用距石十八枚皆高三尺厚一尺廣二尺如小碑環壇立之去壇三步距石下皆有石跗入地四尺又用石牌高九尺廣三尺五寸厚尺二寸立壇丙地去壇三丈以上以刻書帝以用石功難又欲及二月封禪故詔梁松欲因故封石空檢更加封而已松上疏爭之以為登封之禮告功皇天垂後無窮以為萬民也承天之敬尤宜章明奉圗書之瑞今因舊封竄寄玉牒故石下恐非重命之儀受命中興宜當特異以明天意遂使泰山郡及魯􅂒音况石工宜取完青石無必五色令印工刻玉牒書書祕刻方石中命容玉牒二月帝至奉高遣侍御史與蘭臺令史將工先下山刻石二十二日辛卯晨燎祭天於泰山下南方羣神皆從祀用樂如南郊諸王王者後二公孔子後褒成君皆助祭位事也事畢將升封或曰泰山雖已從食於柴祭今親升告功宜有禮祭於是使謁者以一特牲於常祠泰山處告祠泰山如親耕貙劉先祠先農先虞故事至食時帝御輦升山日中後到川上更衣早脯時即位于壇北面羣臣以次陳後西上畢位升壇尚書令奉玉牒檢皇帝以寸二分璽親封之訖太常命人發壇上石尚書令藏玉牒已復石覆訖尚書令以五寸印封石檢事畢皇帝再拜羣臣稱萬歲命人立所刻石碑乃復道下二十五日甲午禪祭地于梁甫隂以高后配山川羣神從祀如元始中北郊故事四月己卯大赦天下以建武三十二年為建武中元元年以吉日刻玉牒書函藏金匱璽印封之乙酉使太尉行事以特牲告至高廟太尉奉匱以告高廟藏於廟空西礕石室高主室之下魏明帝時中護軍蔣濟請封禪帝雖拒濟議而實使封堂隆草封禪儀以天下未一不欲便行大禮會高堂隆卒不行晉武帝平吳太康九年衛瓘議封禪帝曰此盛德之事所未議也瓘等又奏至于再三詔報絶之宋文帝在位長久有意封禪詔學士山謙之草其儀注屬後魏興師南逼其意乃息孝武大明元年十二月戊申太宰江夏王義恭表三請帝以文軌未一不從北齊有巡狩之禮并登封之儀竟不行隋開皇十四年羣臣請封禪文帝命牛𢎞等創定其禮帝曰此事體大朕何德以堪之但當東狩因拜岱山唐貞觀十一年左僕射房玄齡等議按封禪者本以功成告於上帝天道崇質義取醇素故籍用藁秸樽以瓦甒又按梁甫是謂梁隂近代設禮壇於山上乃乖處隂之義今定壇位於山北又議昊天上帝壇將封先祭義在告神因當為壇下距先陳齋潔贊饗已畢然後登封既表重慎之深兼示行事有漸今請祭於泰山下設壇以祀上帝太祖景皇帝配享壇方十二丈高丈二尺又議制玉牒長尺三寸廣厚各五寸玉檢厚二寸長短闊狹一如玉牒其印函請隨璽大小仍纒以金繩五周又議玉册四枚各長尺三寸廣寸五分每册五簡俱以金編其一奠上帝一奠太祖座一奠方地祗一奠高祖座又議金匱長短令容玉册高廣各六寸形制如今之表函纒以金繩封以金泥印以受命璽又設方石三枚以為册纍其十枚石檢刻方石四邊而立之纒以金繩封以石泥印以受命璽又議泰山上圎壇廣五丈高九尺用五色土加之四面各設一陛御位在壇南升曰陛而就上封玉牒又議圎壇上土封曰凡言封者皆是積土之名今請於圎壇上安方石璽緘既畢加土築以為封高丈二尺而廣二丈以五色土益封玉牒書藏於內祀禪之所土封制亦同此又議玉璽曰詳前載方石緘封玉檢金泥必資印璽以為祕固請依今用受命璽以封石檢其玉檢既為與石檢大小不同請更造璽一枚闊寸二分文同受命以封玉牒石檢形制依後漢建武故事又議立碑曰勒石紀號垂裕後昆美盛德之形容闡后王之休烈其義大矣請刻頌立碑明揚功業又議設告至壇曰既至山下禮告至柴于東方上帝遍于羣神今請其壇方八十一尺高三尺陛仍四出其禪方壇及自餘儀式請如今禮仍謂柴祭同時行事又議廢石闕及大小距石詔從此議餘皆罷之遂附制于今禮麟德二年有司進儀注於太嶽南四里為圎壇三成十二陛如圎丘之制壇上飾以青四面各依方色并造燎壇及㙺三重又造玉册三枚皆以金繩編玉牒為之每牒長尺二寸廣寸二分厚三分刻玉填金為字又為玉匱一以藏配坐册各長尺三寸并玉檢方五寸當繩纒處刻為五道當封璽處刻深二分方寸二分又為黃金繩以纒金玉匱各五周為金泥以泥之為玉璽一枚方寸二分文同受命璽以封金玉匱又為石䃭以藏玉匱用方石再纍各方尺厚一尺刻方石中令容玉匱䃭旁施檢處皆刻深三寸三分闊一尺當繩處皆刻深三分闊寸五分為石檢十枚以檢石䃭皆長三尺闊一尺厚七寸皆刻為印齒二道深四寸當封璽處方五寸當通繩處闊寸五分皆有小石蓋制與檢刻處相應以檢􅞢於按反封泥其檢立於䃭旁南方北方各三東方西方各二去䃭隅皆七寸為金繩三以纒石䃭各周徑三分為石泥以泥石䃭其泥未石和方色土為之為距石十二枚分距䃭隅皆再纍各闊一尺厚一尺長一丈斜刻其首令與䃭隅相應以五色土封之泰山之上設登封之壇上徑五丈二尺高九尺四出陛壇上飾以青四面依方色一㙺隨地之宜又為降禪壇於社首山上方壇八隅一成八陛如方丘之制壇上飾以黃四面依方色三㙺隨地之宜其玉册玉㙺石䃭石檢距石當三月封祀之制又以高宗太宗配禪社首以太穆文德皇后同配皆以公卿充亞獻終獻之禮制曰古今興制文質不同至於制度皆隨代沿革惟祀天地獨不改張斯乃自處於厚奉天以薄又今封禪即用玉牒金繩器物之間復有瓦鐏秸席一時行禮文質頓乖駮而不倫深為未愜其封祀降禪所設上帝后土位先設藁秸瓦甒瓢杯等物並宜改用茵褥罍爵其諸郊祀亦宜準此於是昊天上帝之座褥以蒼皇地祗褥以黃配帝及后褥以紫五方上帝及大明夜明時帝褥皆以方色內官以下席皆以莞三年春正月戊辰朔有事於泰山親祀昊天上帝封祀之壇己巳登于泰山行封禪之禮庚午降禪於社首山壬申大赦天下改元乾封武太后天册萬歲二年臘月甲申登封于嵩嶽大赦天下改元為萬歲登封丁亥禪于少室山開元十二年制以十三年有事泰山所司與公卿諸儒詳擇典禮先為備具中書令張説右散騎常侍徐堅等與禮官撰東封儀注宋朝太平興國九年四月宰臣宋琪等率文武百官諸軍將校蕃夷酋長僧道耆壽拜表請東封詔答不允自是繼三上表始內出御札以今年十一月有事于泰山既而命扈蒙宋白等詳定封禪儀以宋琪賈黃中等為五使六月詔曰云云封禪之儀廢之已久百司祇奉辨集尤難萬姓供輸勞擾斯甚目今停罷以俟後期國門之南圎丘素備宜輟登封之禮聿修柴燎之誠遂以十一月有事于南郊祥符元年三月兖州父老詣闕上表請東封帝諭以大禮不可輕議不允所請又文武百官宰臣王旦等凡五上表固請四月內出御札云云以今年十月內有事于泰山咨爾百執之臣掌禮之士各揚乃職勿曠攸司朕之是行昭答神貺非求仙以徼福在報本而潔誠云云於是以王欽若趙安仁為封禪經度制置使命朝逈李宗諤楊億杜鎬陳彭年詳定儀注以王旦為大禮使王欽若為禮儀使馮拯為儀仗使陳堯叟為鹵簿使趙安為頓遞使又命戚綸劉承圭謝德權計度封禪發運事四月夏侯晟上漢武封禪圗繢金玉匱石䃭距之狀各有注釋帝覽之以所載與舊典小異詔詳定所參校詳定所言準典禮泰山上圎壇社首各用石䃭三重皆有尺寸又壇壝之制望依故事山上立封祀壇徑五丈高九尺四出陛壇上飾以青四面依方色燎壇在圎臺之東南量地之宜山下封祀壇三成十二陛如圜丘之制壇上飾以黝四面各依方色壇外為三壝云云社首壇準通禮如方丘之制八角三成每等高四尺上闊十六步設八陛為三壝開四門又為瘞塪於壇之壬地外壝之內取足容物朝覲壇在行宫之南方九丈六尺高九尺四出陛南面兩陛餘三面各一陛一壝二分在南一分在北望依禮修築又按唐明皇封禪備法駕請準故事告享太廟乘輿出京封泰山禪社首御朝覲壇并用法駕又按六典宫架之樂宗廟殿庭三十六簴郊丘及社二十簴欲於泰山圎臺上設登歌鍾磬各一簴封祀壇設宫架二十簴四隅立建鼓并設二舞社首壇上設登歌如圎臺壇下設宫架二舞如封祀壇其朝覲壇上設宫架二十簴不用熊羆十一案又按六典天子之服一曰大裘冕無旒以黑羔皮為之祀天地則服二曰衮冕垂白珠十有二玄衣纁裳十二章享廟告廟則服令參詳南郊合祭天地止服衮冕望封禪日依南郊例並從之命王旦撰封祀壇頌王欽若撰社首壇頌陳堯叟撰朝覲壇頌詳定所又言詳管子左傳之文三脊茅既以藉神又以縮酒今請昊天上帝座藉以三脊茅從之詔使馳往嶽州採茅五月詳定所玉牒玉册之制請為五牒每牒長尺二寸厚一寸刻牒為字以金填之聮以金繩緘以玉匱又正座配座合用玉牒册六副依開寶通禮制度每簡長尺二寸厚三分廣寸二分填以金簡數量文多少册文中書門下撰進付中書省鐫刻正座玉册玉牒並盛以玉匱配座玉册盛以金匱匱制並長尺三寸檢厚二寸闊五寸長一尺三寸纒以金繩五周封為金泥又為石䃭以藏玉匱云云為石泥以封石䃭先以金繩三以纒石䃭各五周然後以泥封之金玉匱封訖以受命寶印之别造玉寶其封石䃭用天下同文之印金鑄印文云云命王旦撰昊天上帝玉牒文馮拯撰皇地示玉册文趙安仁撰祀昊天上帝及泰山社首二壇配座太祖太宗玉册文帝諭旦等曰其文宜敘上帝降鑒符瑞沓委次述為民祈福之意六月詳定所上儀注四卷帝覽之曰此儀久廢非典禮具備豈為盡美即手札疑互凡十七事令與五使參議釐正而言之詔八神久存祀典實福生民方屬登封特行告享其與歷代封禪帝王及所載山並封祀前七日致祭詳定所與司天監同定三壇正座從祀神位山上圎壇設昊天上帝太祖太宗配座山下封祀壇詔五方帝以下六百八十七座社首壇設皇地示正座太祖太宗配座神州以下共七十二位從之又言準詔從封禪之義易樂章之名今改酌獻禧安之樂昊天上帝為封安皇地示為禪安詔依前詳定所參詳封祀壇內外中官社首壇嶽瀆海鎮並依方色用幣及五方帝日月神州特用方色犢其從祀南郊不用牲今以舊用羊豕二十一改充從祀牲從之十月以御史中丞王嗣宗攝御史大夫為考制度使知制誥周起攝中丞副之所經州縣採訪官吏能否民間利病市物之價舉察儀制車服權衡度量不如法則者有竒才異行隱淪不仕者與所在長吏詢求論薦鰥寡惸獨不能自存者量加賑恤官吏政迹尤異民受其惠及不守亷隅昧於政理者孝子順孫義夫節婦為鄉里所稱者並條析以聞命給事中張秉知制誥王曽訪問所過耆老送閣門引見上州縣繫囚所犯是月二十四日享昊天上帝於山下圜臺奉太祖太宗並配命羣臣享五方帝及諸神於山上封祀壇翊日禪祭皇地示於社首山以祖宗配侑封金玉匱石䃭如儀式云云羣書考索卷二十四
