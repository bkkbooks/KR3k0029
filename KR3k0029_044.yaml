body:
  text: 羣書考索卷四十四宋章如愚撰禮器門圭璧類朝聘圭璧禮書曰蓋玉有朝覲之玉有眺聘之玉有獻享之玉禮於朝覲之玉言其所瑑桓躬信穀蒲是也眺聘之玉言琢而已瑑圭璋璧琮以眺聘是也若夫享獻之玉諸侯以享天子則不瑑玉人謂璧琮九寸諸侯以享天子是也周禮玉人曰琬圭九寸而繅以象德琰圭九寸判規以除慝以易行璧琮九寸諸侯以享天子瑑圭璋八寸璧琮八寸以眺聘執圭周禮玉人曰天子執冒四寸以朝諸侯禮書曰瑁圭則取其覆下而已四寸所以冒方邪刻之所以驗羣瑞書曰太保承介圭上宗奉同瑁書大傳曰古者圭必有瑁言下之必有冒不敢專達也天子執冒以朝諸侯見則覆之故冒圭者天子所與諸侯為瑞也瑞也者屬也無過行者得復其圭以歸其國有過行者留其圭能改過者復其圭三年圭不復少黜以爵六年圭不復少黜以地九年圭不復而地畢削此所謂諸侯之於天子也義則見屬不義則不見屬周禮大宗伯王執鎮圭玉人職曰鎮圭尺有二寸天子守之鄭氏曰鎮安也所以安四方禮書曰鎮圭尺有二寸則天數也繅藉五采五就備文德也其玉用全無厖雜也周禮曰公執桓圭玉人命圭九寸謂之桓圭變植謂之威威宮室之象所以安其上也侯信圭伯躬圭欲謹其行保身各七寸子穀璧象所以飬人男蒲璧蒲為席書曰輯五瑞修五禮如五器卒乃復典瑞曰公侯伯繅皆三采三就子男繅皆二采再就奠信鎮圭執大圭周官典瑞王搢大圭執鎮圭以朝日大圭天子之笏也天子執鎮圭則猶羣臣之有摯搢大圭則猶羣臣之有笏覲禮曰奠圭于繅上鄭氏謂釋於地也蓋諸侯初見天子執摯以入而其笏搢於紳帶之間及奠摯繅上則取笏以對若今羣臣見君秉笏狀然則大圭三尺天子服之蓋將以執使無虛手其用在奠圭之後舊圖大圭玉人職云大圭長三尺杼上終葵首天子服之注云王所搢大圭也或謂之珽玉藻曰天子搢珽方正於天下也杼殺也終葵推也為推於杼上眀無所屈也謂之珽者言珽然無所屈此對諸侯荼前屈後直而為名也相玉書曰珽玉六寸明自照然則六寸之珽據上下殺者惟頭也玉體善惡露見是其忠實或云明自照也比他圭最長故得大圭之名以其搢於衣帶之間同於衣服故以服言之新圖大圭大圭若今笏是也蓋天子既見先王奠鎮圭矣於是執大圭天子見先王猶諸侯之見天子當有所屈故大圭杼上終葵首鄭氏謂王所搢大圭也或謂之珽蓋珽自珽與大圭異珽無所屈天子見諸侯見卿大夫之笏也故玉藻曰天子搢珽方正於天下也大圭推其上猶諸侯荼前曲後直天子見天地見先王之笏也故典瑞曰王搢大圭執鎮圭以朝日相玉書曰珽玉六寸眀自照然據此珽玉六寸大圭長三尺明非一物先儒謂六寸自照據上不殺者惟頭也大圭三尺今自照者才五之一其餘由是一玉俱成豈容玉石頗異於天子用全之説有害介圭詩嵩高曰錫爾介圭以作爾寶韓奕曰以其介圭入覲于王爾雅曰介大也又曰大圭尺有二寸謂之玠圭禮書曰王之大圭長三尺則尺有二寸所以錫諸侯也諸侯之圭長不過九寸錫以尺有二寸使寶之而已冒圭天子執冒四寸以朝諸侯注云名玉曰冒者言德能覆蓋天下也四寸者方以尊援卑以小為貴也其圭邪刻之以冒諸侯之圭以為瑞信尚書大傳云古者必有冒言下不敢專達之義天子執冒以朝侯是見覆之注云君恩覆之臣乃敢進是其冒覆之事然則諸侯所受天子之圭璧者與諸侯為瑞也瑞也者屬也諸侯朝於天子有過行者留其圭璧三年圭璧不復者少黜以爵六年圭璧不復者少黜以地九年圭璧不復者盡黜其地此所謂諸侯之於天子也義則見屬不義則不見屬也鎮圭大宗伯王執鎮圭長尺二寸以鎮安天下蓋以四鎮山為琢飾故得鎮名典瑞曰王執鎮圭以朝日又曰珍圭以徵守以恤凶荒珍音鎮珍圭以徵守者諸侯亦一國之鎮故以鎮圭徵之凶荒則民有遠志不安其土故王使執鎮圭以往致王命以安之鎮圭大小之制當與琬圭琰圭相依桓圭大宗伯公執桓圭注云公者二王之後及王之上公也後鄭云雙植謂之桓賈釋云象宮室之有桓楹也以其宮室在上須桓楹乃安天子在上須諸侯乃安也蓋亦以桓楹為瑑飾也雜記曰圭公九寸侯伯七寸博三寸厚半寸削左右上各寸半信圭大宗伯侯執信圭注云信圭躬圭皆長七寸蓋皆象以人形為瑑飾文有粗縟耳欲其慎行以保身也躬圭大宗伯伯執躬圭七寸孔義云直者為信其文縟細曲者為躬其文粗略義或然也身伸而躬屈伸者尊足以侯外而蔽內屈者卑足以長人而已故侯伯之圭瑑之新圖云信圭直躬圭屈舊圖琢為人形誤矣穀璧大宗伯云子執穀璧五寸諸侯自相見亦執之曲禮疏曰凡璧則內有孔謂之好外有玉謂之肉故爾雅云肉倍好謂之璧好倍肉謂之瑗肉好若一謂之環此五等諸侯各執圭璧朝於王及自相朝所用也又云穀所以飬人蓋瑑穀稼之形為飾蒲璧大宗伯云男執蒲璧五寸曲禮疏引此注云蒲為席所以安人蓋瑑蒲草之形為飾子男不執圭者未成國也圭者天之用璧者天之體盡其用者必盡其體盡其體者未必盡其用此圭璧所以不同也牙璋典瑞云牙璋以起軍旅以治兵守先鄭云牙璋瑑以為牙牙齒兵象故以牙璋發兵若今時以銅虎符發兵也後鄭云牙璋亦王使之瑞飾兵守用兵所守也若齊人戍遂諸侯戍周之類又玉人云牙璋中璋七寸厚寸鄭云二璋皆有鉏牙之飾於琰側知然者以其二璋同起軍旅故也蓋大軍旅則用牙璋以起之小軍旅則用中璋以起之也首言牙璋中璋不言牙者但牙璋文飾多故得牙名而先言之也中璋次於牙璋明亦有牙以文飾差少故惟有中璋之名不言牙也典瑞不言中璋以大小等故不見穀圭玉人云穀圭七寸天子以聘女注云納徵加於束帛賈云自士以上皆用玄纁束帛但天子加以穀璧諸侯加大璋亦七寸後鄭釋典瑞云穀圭亦王使之瑞節也穀善也其飾若粟文然仇讎和之者若春秋宣公及齊侯平莒及郯晉侯使瑕嘉平戎於王是也其聘女則以納徵焉大璋大璋七寸諸侯以聘女注云亦納徵加于束帛也上云大璋九寸此七寸得云大璋者以天子穀圭七寸聘女諸侯不可過於天子而用九寸也謂用大璋之文以飾之故得大璋之名又案三璋之勺注云大璋加文飾邉璋半文飾則此璋雖七寸取於大璋加文飾之義謂遍於璋體瑑雲氣如大璋也駔琮駔琮五寸宗后以為權駔琮七寸天子以為權後鄭讀駔為組謂以組繫琮因名駔琮先鄭解組琮以為稱錘以起量既用為權故有鼻釋云此權衡而為量者以其量輕重故也天子駔琮既有鼻眀后駔琮亦有鼻也新圖駔琮讀以本字不改為組亦玉飾也猶所謂瑑琮大琮玉人大琮十二寸是謂內鎮宗后守之後鄭云如玉鎮圭也射其外鉏牙賈曰言大琮者對上駔琮五寸為大也言十有二寸者并用徑之為尺二寸言射二寸者據用各出二寸兩廂并四寸言是謂內鎮者對天子執鎮圭為內云射其外鉏牙者據八角鋒言之也新圖鄭云大琮八角然地體方而四隅有維蓋所體者四角而已考工記曰土其象方八角之説未之聞琬圭琬圭圜而宛之無鋒芒長九寸用以治德以結好後鄭云琬圭王使之瑞節也諸侯有德王命賜之使者執琬圭以致命焉治德即此之謂也結好謂諸侯使大夫來聘既而為壇會之使大夫執以命事焉行人時聘以結諸侯之好琰圭琰圭九寸判規以除慝以易行賈云判半也凡圭琰上寸半琰圭琰半以上至首規半以下為瑑飾諸侯有為不義使者征之執以為瑞節也經云除慝謂誅惡逆也易行謂去煩苛也又後鄭典瑞注云除慝亦於諸侯使大夫來俯既而使大夫執而命事於壇新圖云琰圭判規則圭上圜而判之與凡圭之琰上寸半者異矣鄭謂琰圭剡半以上又半為瑑飾然琬琰之有瑑飾於經無見此不可考聘享圭璧諸侯聘天子皆以圭享皆以璧聘后皆以璋享皆以琮其相聘相享則亦如之特其長短與繅之隆殺不同焉耳聘禮曰所以朝天子與繅皆九寸繅三采朱白蒼諸侯朱緑繅八寸是也玉人曰璧琮九寸諸侯以享天子此上公享天子之玉享王以璧享后以琮皆九寸繅皆三采典瑞曰瑑圭璋璧琮繅皆二采一就以俯聘此上公聘諸侯之玉聘以圭璋享以璧琮皆八寸繅皆二采與聘禮之文合又玉人曰瑑琮八寸諸侯以享夫人瑑圭璋八寸璧琮八寸以俯聘瑑圭璋璧琮又皆八寸則亦上公俯聘之玉也上公聘天子圭九寸其自相聘八寸則侯伯子男相聘宜各殺其玉一寸子男四寸侯伯六寸可知禮於朝聘之玉言其所瑑桓信躬穀蒲是也若夫享獻之玉諸侯以享天子則不瑑玉人所謂璧琮九寸諸侯以享天子是也夫諸侯相朝而享夫人以琮則諸侯享后亦必以琮諸侯享王以璧聘卿享君亦以璧則諸侯相享亦必以璧玉人言璧琮以享天子則后舉矣言瑑琮享夫人則璧舉矣穀蒲繅籍典瑞曰王搢大圭執鎮圭繅籍五采五就以朝日注云繅有五采文所以薦玉木為中幹用韋衣而畫之就成也五就五匝也一匝為一就公執桓圭侯執信圭伯執躬圭繅皆三采三就子執穀璧男執蒲璧繅皆二采再就繅讀曰藻賈釋曰藻水草之文故讀從之言繅有五采文所以薦玉木為中幹用韋衣而畫之就成也者鎮圭尺二寸廣三寸此木板廣長亦如之然後用韋衣之乃於韋上畫之一采為一匝五采則五匝一匝為一就成也是五采一成者也然則蒲谷二璧其繅籍之形亦如之天子則以五采畫之公侯以三采子男以二采二大夫亦以二采故典瑞云王繅籍五采五就公侯伯皆三采三就子男繅皆二采再就又云瑑圭璋璧琮二采一就是也既以采色畫韋衣於板上前後垂之又有五采組繩以為繫其組上以玄為天下以絳為地用以繫玉有事則垂為飾故聘禮記云玄纁繫長尺絢組注云五采成文曰絢組不問尊卑皆用五采組長尺以為繫所以籍玉使不墜落因以為飾璧羡典瑞云璧羡以起度羡不圓之貌廣徑八寸袤一尺又玉人云璧羡度尺好三寸以為度羡徑也好璧孔也鄭云羡延也袤一尺而廣狹焉是羡為不貟之見也玉人造此璧之時應圓圓徑九寸今減廣一寸以益上下之袤一寸則上下一尺廣有八寸故云袤一尺而廣狹焉此璧羡天子以為量物之度也舊圖佩玉之制玉府職曰共王之佩玉珠玉注云佩玉之所𢃄者玉藻曰天子佩白玉而玄組綬白玉謂衡璜琚瑀也玄組綬者用玄組條穿連衡璜等使相承受韓詩傳曰佩玉上有䓤衡者衡橫也謂蔥玉為橫梁下有雙璜衝牙者謂以組懸于衡之兩頭兩組之末皆有半璧之璜故曰雙璜又以一組懸於衡之中央於末繫玉其狀如牙使前後穿突雙璜故曰衝牙毛傳曰衡璜之外别有琚瑀其琚瑀當置於懸衝牙組之中央又以二組穿於琚瑀之內角斜係於衡之兩頭於組末璜蠙珠以納其間蠙蚌也珠出於蚌故言蠙珠納於其間者組繩有五皆穿蠙珠於其間故云也蒼璧大宗伯云蒼璧禮天牲幣亦如璧色後鄭云以冬至祭天皇大帝在北極者於地上之圜丘蒼璧者天之色圓璧圜丘皆象天體以禮神者必象其類也玉人曰璧好三寸爾雅曰肉倍好謂之璧然則兩邊肉各三寸與此三寸之好共九寸也又玉人璧好三寸之下云璧琮九寸諸侯享天子以此而言是有九寸之璧也黃琮大宗伯云黃琮禮地牲幣亦如琮色後鄭云以夏日至祭崑崙之神於澤中之方丘黃者中之色琮八寸以象地比大琮每角各剡出一寸六分長八寸厚寸又禮記郊特牲疏引先師所説祀中央黃帝亦用黃琮然其琮宜九寸以别於地示青圭大宗伯云青圭禮東方注云以立春祭蒼精之帝而大皥勾芒食焉圭鋭象春物初生其牲幣皆如圭色其圭亦九寸厚寸博三寸剡上各寸半此已下壇兆各隨方於郊設之赤璋大宗伯云赤璋禮南方注云以立夏祭赤精之帝而炎帝祝融食焉牲幣如璋色半圭曰璋夏物半死而象焉熊氏云祀中央黃帝亦用赤璋案上下經文祀五精之帝玉幣各如其色季夏土王而祀黃帝於五帝之內禮用赤璋獨不如其色於理未允不如用黃琮九寸為當白琥大宗伯云以白琥禮西方牲幣皆如琥色注云以立秋日祭白精之帝而少昊蓐收食焉琥猛象秋氣嚴鄭圖云以玉長九寸廣五寸刻伏虎形高三寸玄璜大宗伯云以玄璜禮北方牲幣皆如璜色後鄭云以立冬祭黑精之帝而顓頊玄冥食焉半璧曰璜象冬閉藏地上無物惟天半見賈釋云列宿為天文草木為地文冬草木零落惟列宿在天故云惟天半見四圭有邸四圭有邸邸本也謂用一大玉琢出中央為璧形厚寸天子以十二為節於璧四面各琢出一圭皆長尺二寸與鎮圭等其璧為邸蓋徑六寸總三尺又與大圭長三尺同用此以祀天旅上帝後鄭氏云祀天謂於夏正郊祀感生之帝也旅上帝謂祀五帝也宗伯青圭等已見祭五方天帝此又用四圭有邸而祭者彼即四時迎氣及總享於明堂是其常也國有故而祭之也感生之帝亦五帝别言為天者以其祖感之而生故殊異之也此四圭亦博三寸厚寸兩圭有邸舊圖兩圭有邸此兩圭五寸亦宜於六寸璧兩邊各琢出一圭俱長二寸半博厚與四圭同典瑞注云兩圭以象地數二也僢音絹而同邸又王制注云臥則同僢彼僢謂兩足相嚮此兩圭足同邸是足相嚮之義上四圭同邸亦然此兩圭祀地謂於三陰之月祭神州之神於北郊旅四望謂五嶽四鎮四瀆也若夫地祗自有黃琮此兩圭有邸以祀地謂祀神州之神於北郊及國有故而旅祭四望以對上四圭有邸以祀天旅上帝也新圖兩圭有邸按周官義四圭邸璧則兩圭邸琮可知先鄭説四圭有邸謂於中央為璧圭著其四面一玉俱成蓋圭青璧蒼璋赤琮黃不應一玉俱成也且謂之邸以托宿取名然則圭邸璧則以青圭插蒼璧璋邸琮則以赤璋插黃琮也圭璧圭璧五寸此一圭宜於六寸璧上琢出一圭長五寸後鄭云圭有邸為璧取殺於上賈釋云上四圭有邸以祀天旅上帝此一圭有邸言取殺者謂取降殺以三為節也祀日月者若春分朝日秋分夕月并大報天而主日配以月也其祀星辰若小宗伯云兆五帝於四郊四望四類亦如之鄭注云四類日月星辰運行無常以氣類為之位兆日於東郊兆月與風師於西郊兆司中司命於南郊兆雨師於北郊凡祭日月等用此圭璧以禮其神各隨其方色賈釋云兆日於東郊以大眀生於東故也兆月於西郊以月生於西故也知風師亦於西郊者以五行土為風風雖屬土秋氣之時萬物燥落由風亦於西郊知兆司中司命於南郊者以南郊是盛陽之方司中司命是陽故兆於南方也雨是水宜在水位故兆雨師於北郊璋邸射典瑞璋邸射以祀山川注云璋有邸而射取殺於四望又玉人注云邸射剡而出也賈云嚮上謂剡出半圭曰璋其璋首邪郤刻之今從下自邸嚮上總邪郤之名為剡而出也此祀山川謂若小宗伯云兆山川丘陵墳衍各因其方亦隨四時而祭則用此璋邸以禮其神新圖璋邸射玉人云祼圭尺有二寸有瓚又曰大璋中璋九寸邊璋七寸射四寸厚寸黃金勺青金外朱中鼻寸衡四寸有繅鄭氏謂鼻勺流也凡流皆為龍口衡勺徑也勺杜子春謂酒尊中之勺也然則勺盛酒以注爵爵以注瓚瓚形如盤衡徑四寸鼻寸上為龍形圭璋其柄也祀廟則用圭以禮山川則用璋皆玉為之鼻玉尤美瓚次之圭璋又次之玉人曰天子用全上公用龍侯用瓚伯用將龍鼻也將柄也然則鼻四玉一石瓚三玉二石柄玉石相將舊圖瓚為勺形又鼻為龍稍大而鄭氏云圭瓚酌鬱以獻尸皆非是蓋瓚非酌鬯凡祼酌鬯用爵灌之在瓚爵以灌鬯瓚以受灌而謂瓚酌鬯非矣圭瓚舊圖玉人祼圭尺二寸有瓚以祀廟後鄭云祼謂以圭瓚酌鬱鬯以獻尸也瓚如槃大五升口徑八寸深二寸其柄用圭有流前注流謂鼻也鼻勺流也凡流皆為龍口以圭為柄黃金為勺青金為外朱為中央凡圭博三寸此惟用之於宗廟據祀昊天禮神玉帛牲牷之外别有燔瘞玉帛牲牷其日月星辰社稷但有禮神之玉無燔瘞之玉也其宗廟惟有祼圭以禮神亦無所燔之玉圭柄金勺既異其牝牡相合處各可長三寸厚一寸博二寸半流道空可徑五分下三璋之勺皆類此瓚槃典瑞注云瓚槃大五升口徑八寸下有槃口徑一尺若其材飾則宜用黃金青金為外朱中央圭瓚既深二寸此槃冝深一寸足徑八寸高二寸璋瓚璋瓚者皇后酌鬱鬯獻尸禮神之器也其制一同圭瓚但用璋為柄瓚器小耳司尊彛注云祼謂以圭瓚酌鬱鬯始獻尸也后於是以璋瓚酌亞祼是也此璋瓚口徑四寸深二寸柄長九寸其下亦宜有槃口徑六寸深一尺足高一寸徑四寸一如圭瓚槃形制大璋瓚玉人云大璋九寸射四寸厚寸黃金勺青金外朱中鼻寸衡四寸有繅注云射剡出者也嚮上謂之出謂剡四寸半以上其半已下加文飾焉周天子十二年一巡守所過大山川禮敬其神用黃駒以祈九委切沈則宗祝先用大璋之勺酌鬱鬯以禮神後鄭云大璋加文飾中璋殺文飾邊璋半文飾但解三璋得名大中邊之義不言文飾之物易曰雲從龍璋瓚既以勺鼻為龍頭其二璋半已下宜皆瑑雲氣以為飾祼圭半以下亦宜皆瑑雲氣以為飾若祭祀宗廟后亞獻則執此璋以祼尸后有故則大宗伯執以亞祼中璋瓚中璋九寸其勺口徑亦四寸鼻射寸數外內金色皆如大璋其文飾則殺焉天子巡守所過中山川殺牲以祈沈宗祝亦先用此中璋之勺酌酒以禮神邊璋瓚邊璋七寸其勺口徑璋之厚薄鼻射寸數已下並同大璋中璋惟文飾半於大璋之飾為别天子巡守所過小山川殺牲以祈沈則宗祝先以邊璋之勺酌灌其神三璋之勺形制並同圭瓚但瓚勺各短小耳三璋之下雖不言槃有之可知其制亦同瓚槃口徑皆六寸圭幣周官小行人合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼此朝覲之用幣者也大宗伯禮天地四方皆有牲幣各放其器之色此禮天地四方之用幣者也太宰祀之日贊玉幣爵之事享先王亦如之此宗廟之用幣者也肆師曰大祀用玉帛牲牷鄭注大祀謂天地宗廟也則天地宗廟皆用幣無疑矣公食大夫侑以束帛而庭實以皮大夫相食以束錦此食有侑幣也春秋虢公晉侯朝王享醴命之宥皆賜玉五瑴馬三匹秦后子享晉侯歸取酬幣終事入反魯侯享范獻子莊叔執幣此享有酬幣也燕禮用幣之文特鹿鳴之詩曰既飲食之又實幣帛以將其厚意此燕有酬幣也笏類搢笏樂記曰武王散軍而郊射禆冕搢笏釋名曰笏忽也君有命則書其上備忽忘也徐廣車服儀制曰笏即手板也漢魏以來皆執手板晉王坦之倒持手板唐段秀實以笏擊朱泚禮書曰天子之笏以玉諸侯以象玉藻曰笏諸侯以象又曰諸侯荼前詘後直讓於天子也荀子曰諸侯御荼大夫以魚須文竹玉藻曰以魚須文竹禮書曰蓋竹函其璧堅正有節也前詘後詘無所不讓也以魚須釋飾之卑者不敢用純也士竹本象可也儀禮曰士竹笏禮書曰竹本尢堅正而有節也士以儀節為尚故笏用焉象諸侯所以為笏也士卑而伸故飾用焉蓋玉德之美象義之辨竹禮之節天子尚德諸侯貴義大夫士則循禮而已此笏所以異也周禮典瑞王搢大圭執鎮圭繅藉五采五就以朝日玉藻曰笏天子以球玉又曰天子搢珽玉人曰大圭長三尺杼上終葵首天子服之天子執鎮圭則猶羣臣之有贄搢大圭則猶羣臣之有笏自西魏五品以上通用象牙六品以上兼用竹木武德中始詔五品以上執牙笏上圓下方六品以上執木竹笏上挫下方宋朝笏制唐制五品以上用象上圓下方六品以下用竹木上挫下方國朝文散五品以上用象九品以上用木武臣內職並用象羣書考索卷四十四
