body:
  text: 羣書考索别集卷十一宋章如愚撰經籍門春秋附三傳知我罪我者春秋史以官春秋以匹夫史以國春秋以天下曰春秋曷為匹夫及天下曰小人之惡幸而逃於刑不能逃於史幸而逃於國之史不能逃於天下之春秋然則惡果不可盖作者其庶有忌乎吁聖人之術盖至是已窮故曰春秋天子之事知我者其惟春秋乎罪我者其惟春秋乎陳止齋託魯史以榮辱天下夫子之作春秋也非曰孔氏之書也又非曰我作也賞罰之權不以自與也曰此魯之書也魯之作有善而賞之曰魯賞之也有惡而罰之曰魯罰之也何以知之曰夫子係易謂之係辭言孝謂之孝經皆自名之則夫子私之也而春秋者魯之所以名史夫子託焉則夫子公之也公之以魯史之名則賞罰之權固在魯矣春秋之賞罰自魯而及於天下天子之權也魯之賞罰不出竟而以天子之權與之何也曰天子之權在周不得而以與魯也魯則公之國也居魯之地者宜如周公不得已而假天子之權以賞罰天下以尊周室故以天子之權與之也老泉春秋夫子之不幸春秋之作則奚為而夫子則猶曰寓褒貶於善惡之彰彰加筆削於前後之繩繩以匹夫而操天子之權則不曰吾僣也以空言而黜陟天下則不曰吾迂也然則春秋之作果何為而夫子之心果何謂嗟夫是非不可弛於鄉毁譽不可弛於國刑罰不可弛於天下而褒貶不可弛於春秋一理也是故詩之亡盖起於人之不知戒而春秋盖有濟夫詩之所不及者春秋之一褒勝於詩之美之百春秋之一貶勝於詩之刺之萬亂臣賊子由是惕然始有懼心不畏當時天子之權而畏春秋萬世之直筆嗟夫匹夫而奪天子之事誠僣也空言而代賞罰之權誠過也故曰知我者其惟春秋乎雖然昔者桀不道湯出而條其善惡而見之湯誥之書則湯之春秋也紂不道武王出而條其善惡而見之牧誓之書則武王之春秋也湯武春秋不見於誓命之𫝊乃得舉而施之賞罰之用是以天下之人不知有湯武之春秋而知有湯武之賞罰權不在夫子而道在夫子故夫子得以伸其道而借其權吁夫子之得湯武者幸也彼春秋之作兹豈聖人之幸哉春秋猶法律斷例五經之有春秋猶法律之有斷例也律令惟言其法至於斷例則始見其法之用也伊川春秋聖人之用春秋聖人之用也詩書易如律春秋如斷案詩書易如藥方春秋如治法春秋為王道而作甞恠平王之詩不列於天子之大雅而同於諸侯之國風久而得之乃知平王之時無復有王道矣夫平王之時何以獨無王道盖父子君臣夫婦兄弟王道也隠公即位不禀於天子與邾儀父盟于蔑而授之私盟而天子不問是無君臣之道也鄭伯克叚天子又不問是無兄弟之道也平王已前未有此極夫子傷之此春秋所以始於魯隠公也或削去即位或書其私盟或削去公子名或書鄭伯或書天王而名宰咺是皆以王道正之也嗚呼天下不可一日而無王道也久矣天下一日而無王道是㓕天理而窮人欲者也吾夫子憫人欲之日起悼天理之將㓕所以因魯史而作春秋盖將以續三王之道而扶天理之將亡也夫子以王道注之筆削其筆也見聖人之所在其削也見聖人之所歸且以隠公元年論之書元年書正月公即位此魯史也筆王字於春下而削去公即位此夫子之春秋也夫筆王於春下乃知王之所為天之所為也削去公即位三字乃知隠公之即位不禀於天子也自此類而推之則知不書賵葬成風王不書天吳楚之人卒不書葬者皆聖人削之以存王道也邲之敗魯之舊史書先榖也春秋乃書荀林父衛侯出奔魯舊史書孫林父寗殖也而春秋乃獨書衛侯出奔齊耳皆聖人筆之以見王道也因筆削以存聖心王道豈不昭昭乎倘於此而求之則二百四十二年之筆削森然在目皆聖心之發見也聖心之所與王道之所與也聖心之所奪王道之所去也學者知聖人之心則可以知聖人之筆削則雖生乎千百載之下一讀春秋如歴鄒魯之國登洙泗之堂親見吾夫子之威儀聞吾夫子之謦欬傳吾夫子之心法既傳其心則飲食洒掃進退無非吾夫子之運用窮而獨善也隠㣲之間有廟堂之顯幽時之際有日月之明達而兼善也乾旋坤轉雷厲風飛百物阜康萬民綏緝旂裳鼎彛不足以形容鍾鼓管絃不足以傾寫而髙車駟馬元冕圭璋有不足以榮耀也張震奥論春秋道之極聖人之終事春秋之所為作者所以治乎仁義禮樂是非賞罰之所不能治者也雖然慕無窮之善而為善畏無窮之名而不為惡此猶天下之中人也其所以卒為而莫或制者豈其真無所畏而然耶至於定則未有不反其本矣故崔杼能為弑君而不能殺其書已之史官齊豹𨽻也奮於平難以永除其丹書之惡凢天下之惡未有至於杼天下之賤未有至於豹仁義禮樂之所不能誘是非賞罰之所不能革堯舜三代雖不復行而是書乃有所以也故曰春秋者道之極聖人之終事也水心春秋褒貶見辱於市人越宿而已忘見辱於君子萬世而不泯君子所以筆誅口伐於蓽門圭竇之間而老奸巨猾心䘮膽落者皆此權也遇伯樂者駑駘之不幸遇匠石者樗櫟之不幸遇左氏者禮至之不幸禮至之辱雖他人為之汗顔泚頸然至曷甞自以為辱哉東萊史筆不可奪曹劌諫莊公觀社之辭曰君舉必書書而不法後嗣何觀齊威將列鄭太子華於㑹管仲曰作而不記非威德也記奸之㑹君盟替矣其後晋獻齊㨗於周周私犒其使而戒以勿籍然一時之史官世守其職公議雖廢於上而猶明於下以崔杼之弑齊君史官直書其惡殺三人而書者踵至身可殺而筆不可奪鈇鉞有弊筆鋒益強雖威加一國而莫能増損汗簡之半辭終使君臣之分天髙地下開明於下是誰之功哉嗚呼文武周公之澤既竭仲尼之聖未生是數百年間中國所以不淪於夷狄者皆史官扶持之力也使其阿䛕畏怯君舉不書簡編失實無所考信則仲尼雖欲作春秋以示萬世將何所考信乎無車則造父不能御無弓則后羿不能射無城則墨翟不能守大矣哉史官之功也東萊威王不能正王綱左氏所未言鄭伯朝王威王不禮之衆人之説不過以王不禮之為非此左氏之所已言也君子論之則以為王綱既墜傲固招禍卑亦納侮如夷王下堂見諸侯禮雖卑而周益衰王從晋文之召禮雖卑而晋益僣是知威王之失不専在於不禮鄭伯在於不能振王綱此事外之理左氏之所未言也同前三傳異同單伯為魯請子叔姬於齊左氏無異辭公羊谷梁二家以為单伯淳於叔姬是以見執吾請以經為律以傳為案以同時之人為証驗單伯實周臣而公谷乃為魯之大夫畿内諸侯見於經者多矣祭伯之來凢伯之伐毛伯之錫命召伯之㑹葬攷其書法與單伯無少異公榖何所據而以彼為周而以此為魯乎自周之外經未有書諸侯之臣為伯者暈狹柔溺豹婼意如之類不氏而名者也叔孫得臣仲孫何忌兼氏而名者也公孫慶父公弟叔肸之類配親而名者也仲叔叔老叔弓叔誼之類配仲叔而名者也二百四十二年之間不書名者獨季子來歸一語而已曷甞聞内大夫不名而書伯者乎公谷之誣暸然矣佐公榖者曰單伯之列於經自請叔姬以前如逆王姬如宋伐如㑹鄄不絶於簡至請叔姬之後則載於䇿者有單子而無單伯庸詎知書伯者非魯書子者非周乎曰爵列升降各隨其時如滕前侯而後子不聞其兩滕也杞前伯而後子不聞其有兩杞也浩浩塵編子能盡發而細辨之乎曰人無故負寃更百世而莫能雪又以為𤨏屬而不足問是終天地而無伸眉之日矣同前春秋之君不知懼春秋之世王澤既竭反道敗德亂倫悖理不可槩舉尊莫尊於王而有如子頽之出王有如子帶之出王此天下之大變也自是而降則如㓕國之禍尤所謂惨烈而可懼者國於天地有與立焉封植於唐虞長育於夏商灌溉潤澤於文武於成康之際廟陳四代之鼎彛府藏百世之典籍不知㡬人之力㡬人之功扶持保衛而至於斯也一旦忽暴之以凌㓕聖賢千餘年之所培養者芟㓕無餘凶威虐熖可駭可愕可憫可傷而當時之君視之恬不以為懼赴告之車未反而金石之樂已滛簡冊之墨未乾而淫虐之令已下此無它惟處於危亂之中不知懼之可懼也春秋制事之權衡揆道之軌範春秋大義數十其人雖往炳如日星乃易見也惟其㣲辭隠義時措從宜者為難知也或抑或縱或予或奪或進或退或㣲或顯而得乎義理之安文質之中寛猛之宜是非之宜乃制事之權衡揆道之軌範也伊川春秋灾異皆天人響應春秋所書灾異皆天人響應有致之之道如石隕於宋而言隕石如夷伯之廟震而言震夷伯之廟此天應之也程氏春秋意在示人春秋之文莫不一一意在示人如土功之事無小大莫不書之其意止欲人君重民力也程氏春秋孔子刑書五伯者功之首罪之魁也春秋者孔子之刑書也功過不相掩聖人先褒其功後貶其罪故非人之有功亦必録之不可不恕也康節春秋褒貶始作兩觀始者貶之也誅其舊無也初獻六羽初者褒之也以其舊僣八佾也康節觀物論書翬帥師翬魯國之公子也而夫子止書曰翬豈無意哉春秋一經非實録也其間抑揚予奪無非王道所寓如書翬帥師自有深意且翬魯國之公子孔子止書曰翬者以其不待君父之命自㑹齊鄭以伐宋此逆亂之賊非公子所當為故削去公子二字止書曰翬以見其弑君之心自此而萌則翬之無君久矣魯鄭易田春秋隠公八年書曰三月鄭伯使宛來歸祊庚寅我入祊左氏𫝊曰鄭伯請釋太山之祀而祀周公以太山之祊易許田使宛來歸祊不祀太山也杜預釋之曰許田近許之田成王賜周公許田以為魯朝宿之邑宣王賜母弟鄭威公助祭太山太山湯沐之邑在祊今魯鄭各從本國所近之宜故以祊易許田然則二國以私易田不復頋天子廵狩諸侯朝覲之禮其可乎左氏見隠公八年鄭以祊與魯威元年魯以許田與鄭又見魯頌云居甞與許復周公之宇則遂以為許魯地也曽不知許有二詩所謂許者周公舊封也春秋所謂許田者許國之地也如經書築臺於秦仲遂至黄乃復秦與黄俱魯地而諸侯之國亦有秦有黄也不可以許田即為魯舊地而生易田之説且文武之子孫孰非有功而親者使皆有朝宿湯沐之邑中國何地以處之此不然也攷之地志今許州許昌郡古許國也見有許田縣則許田是許之田如邾田之類何得以為魯地近許之田乎是又不然也况祊今在沂州琅琊縣有祊地去泰山為逺安得為鄭人助祭湯沐之邑借如彼説時鄭莊公方強此年既以祊歸魯必欲急得許田隠公何得終其身不歸之及威之立始以璧假之何哉况神不歆非祀民不祀非族鄭伯雖庸愚釋泰山之祀而為魯祀周公非人情之甚也聖人修經欲令後世明知不待三傳而後著使誠有易田之事但曰歸祊入祊無乃太隠而不可知乎不知祊者乃鄭甞所侵有之地而特近於魯今歸於我者鄭人思以結魯之援六年既來輸平恐魯之好未固謂隠之可以利㗖之故以祊地與之鄭歸而魯入之然後二國之黨固矣予嘗疑祊在沂州為魯地經不書魯失祊之由或在春秋之前也攷之祊即近魯非本魯地也若本魯地經但當書鄭伯使宛來歸祊足矣不當繼書曰庚寅我入祊據齊人歸我濟西田經不書我入濟西齊人歸讙及闡經不書我入讙闡盖魯之故地既失復得何用書入乎今祊特書曰我入祊則見魯公貪鄭之賂非可入而入故也若乃許田既非魯之舊封何得有是乎曰此春秋之㣲義隠公既交齊鄭十年乃相與伐宋而取郜防十一年乃合齊鄭之師伐許而有其地盖魯之有許田自入許之年始伐宋之謀本於齊鄭故經書翬帥事㑹齊人伐宋㑹者謀出於彼也入許之師出於隠公故經書公及齊人鄭人入許及者謀主於我也然許田近鄭而逺於魯魯人雖有之鄭人之所欲也時隠公尚強鄭人雖欲得之而未能與魯争逮一旦威公篡隠鄭莊乘間直至於魯之垂以求許田名為璧假實脇取之也威公不義方懼諸侯之討宜不敢不與也自是許之上地為鄭所有許田此不見經至鄭莊死忽突争國鄭國大亂許叔始得乘間而入許復有其國經於桓十五年先書鄭奔蔡鄭忽歸於鄭即繼書許叔入於許其㫖隠而甚明由是鄭人無時不伐許必欲得其故地許人凡四遷以避之而卒不免逮春秋之末經書鄭游速帥師㓕許以許男斯歸而後已許鄭之争許由鄭莊假許田於魯故也攷之春秋許之源流興亡若是何得如左氏附㑹之説妄假易田之事乎左氏為許田之説既没後又覺有許叔入許之事乃於隠十一年公及齊鄭入許設辭謂齊侯以許讓公公又以與鄭人鄭伯使百里奉許叔以居許東偏盖為後張本也不知鄭之得許乃在於璧假之年何得於隠公之時已有之學者之於春秋不䆒源流始末期於自得而惟隨三傳東西若是錯誤者豈少耶滕侯滕子滕侯滕子特一人而已而夫子既書滕侯復書滕子何哉桓公二年書滕子來朝説者謂隠十一年稱侯今稱子者為時王所黜此大不然使時王能黜侯為子是王法行矣春秋不作可也盖篡弑之賊乃天下之大惡今桓公以弟弑兄以臣弑君罪固不容於誅矣滕既不能討反先隣國而朝之是同惡相濟也故聖人於此削侯稱子以正其惡無垢文書鄭棄師髙克將兵禦狄衆散而歸聖人不書髙克而書鄭何也閔二年書鄭棄其師清人之序可見矣文公惡髙克使之將兵禦狄久而不召遂使衆散而歸豈非棄其師乎盖惡其人而使之將兵以外之兵何罪焉故止罪鄭齊人歸田定公十年春秋書曰公㑹齊侯於夾谷繼以齊人來歸鄆讙龜隂田左氏謂齊犂彌使萊人以兵刼魯侯孔子相定公使士兵之齊侯將享公孔子辭意以為齊服義故來歸田公羊之説則曰孔子行乎季孫三月不違齊人來歸田谷梁又曰兩君相揖齊人鼔譟欲執魯君孔子止之故齊歸田也至司馬遷作史記乃曰齊請奏四方之樂旌旄羽祓矛㦸劔撥鼔譟而至孔子以為夷狄之樂何為至此景公麾去之齊有司又請奏宫中之樂優倡侏儒為戯而前夫子使有司誅之景公歸而恐乃歸魯之所侵鄆汶陽龜隂之田以謝過其後揚雄用其説曰齊人章章歸其侵疆自是㡬千年無不信之其然豈其然乎以經考之及諸子之異説觀之左氏曰犂彌言於齊侯曰孔丘知禮而無勇若使萊人以兵刼魯侯必得志按春秋中國之㑹不知其㡬未嘗有以兵刼人之事齊景公圗姜伯魯方請成以兵刼之何以示諸侯乎借或有之左氏以為萊人谷梁又不言萊人但曰齊人公羊又都無此説但曰孔子行乎季孫司馬又不言刼公之事但曰奏夷狄之樂優倡侏儒為戯數者之説更相背戾如此何者可信乎可知其非也且左氏曰齊人加於載書曰齊兵出竟不以甲車三百乘從我者有如此盟孔子使兹無還對曰而不反我汶陽之田吾以共命者亦如之故司馬遷亦謂歸我汶陽龜隂之田據汶陽田與此所歸之田自别稽之地志鄆田屬廪丘縣經書公居于鄆是也讙在濟北蛇丘縣經書公㑹齊侯于濟是也龜隂古梁父縣詩所謂奄有龜蒙是也此皆魯地若乃汶陽則齊田也成公藉晋之力取齊汶陽田未㡬齊睦於晋晋侯復使韓穿來言汶陽之田歸之於齊自此田歸齊之後魯不可得也而鄆田之失自昭公失國齊取此以居之昭二十五年書齊侯取鄆是矣定六年又書季孫斯帥師圍鄆即此年齊伐我西鄙之時失之不得以此田為汶陽田明矣左氏傳何得以夫子請歸者汶陽司馬遷亦謂汶陽歸我何耶杜預名知地理然有時而妄也徒見左氏以鄆讙龜隂為汶陽即注云三邑皆汶陽田也汶雖齊魯之道魯之西北境拒齊汶上之陽盖屬齊也閔子騫曰如有復我者則吾必在汶上矣言欲北踰齊也齊人刺襄公曰汶水湯湯以此見適齊何疑何得附合左氏即謂三邑乎若然經何不直言曰齊人來歸汶陽田此又知其非也借如彼説聖人修春秋自書其功已非人情矣春秋之作正以賞罰僣亂不正矣方三家僣亂之極陪臣執國命近有寳玉大弓之功後有叔仲圍郈之變聖人若用於時曾不能振一魯之頽綱乃區區自書其功以示後世乎既不能正三家之専陪臣之禮文書其事於經將誰之過歟盖説者必欲謂夫子嘗為大夫於魯必有其功夫子雖暫為大夫遭定公之孱懦三家之専肆未㡬齊歸女樂即致政而去歸田之事於聖人何與不知此自當時諸侯喜怒無常與之隙則横見侵奪與之好則侵地復歸此年魯與齊有隙齊國夏伐我者再公亦兩加兵於齊逮是年及齊平為夾谷之好㑹齊人以魯服已故鄆讙龜隂之侵地復歸於我亦如宣公之時齊人嘗取我濟西田及宣公事齊經則書齊人歸我濟西田哀公之時齊嘗取我讙及鄆及魯睦於齊經則書齊人歸讙及闡若以此歸田之功自夫子則濟西之歸讙闡之歸誰之力乎嗚呼自聖人没三傳妄設事實亂經十八九予非好為臆説以毁聖人之功盖惡其害經失實爾使聖人復生必以子説為然拘儒俗士孰可與語此哉孔子墮三都定公之十二年春秋書曰夏叔孫州仇帥師墮郈季孫斯仲孫何忌帥師墮費冬公圍成説者曰孔子為大司冦言於定公也臣無藏甲大夫無百雉之城使仲由為季氏宰墮三都於是叔孫先墮郈季孫將墮費公山不狃以費叛將墮成公歛處父以成叛盖左氏先為此説而公羊附益之司馬遷又取而記之予以為不然按語曰公山弗擾以費叛召子欲往弗擾即不狃誠如諸儒之説隳三都之謀出於孔子孔既發此謀及費叛召孔子孔子又欲往聖人進退果如此乎公山氏之叛正定公十二年之事司馬遷謂在八年若此年又叛則何不著於經乎然則史記之妄明矣借使孔子用事三家信之如公羊之説則隳三都者自三家之意何用叔孫帥師而後隳費公又自圍成乎三家必自帥師以隳私邑則非三家樂為之可知既非三家樂為之則非夫子之謀行乎三家可知豈有聖人見任於定公見信於三家尚能使之隳私邑而不能振國之紀綱是年築蛇淵囿非所宜築也大蒐於比蒲非所宜蒐也何以不諫止之而徒書以譏之乎又何惡三家之舞八佾歌雍徹而不能救正之徒有憤於空言乎况十年經已再書叔孫州仇仲孫何忌帥師圍郈矣比年之隳郈隳費圍成謀出夫子則前年之再圍郈又誰之謀耶夫以三家之僣亂日久天子之禮樂征伐尚皆專為之彼其治兵積甲髙城峻吏以張大其私邑夫子雖聖安能一旦使之隳名城出藏甲也哉不思之甚也無他諸儒以前年齊歸田之功自孔子遂以隳三都似乎美事故以為孔子謀之且左氏曰費人襲魯公入於季氏之宫登武子之臺費人攻之弗克入及公側仲尼命申句須樂頎下伐之費人北又公歛處父同隳成則曰我將不隳公圍成弗克孔子曰好謀而成今使費人得以自魯入及公側二子始使人下伐之使伐而弗克將若之何及圍成而終不能下庸人之謀亦不如此為是説者欲以加孔子之功反以汗辱聖人也使後世疑聖人謀而無成為無權變者左氏與數子之罪也然則當時之事若何曰此自陪臣據私邑之始三家欲隳之爾夫子曰禮樂征伐自諸侯出盖十世希不失自大夫出盖五世希不失矣又曰禄之去公室五世矣政逮於大夫四世矣故夫三桓子孫㣲矣此正夫子作春秋本㫖也惟諸侯能僣天子則大夫必能僣諸侯惟大夫能僣諸侯則陪臣必能僣大夫惟夫禄去公室政逮大夫之日久則陪臣出而乘之三桓子孫不得不㣲也當是之時正陪臣執國命三桓子孫㣲之時也是以内則有陽虎藏寳玉大弓外則有陪𨽻據私邑以叛侯犯臣叔孫者也而以郈叛叔孫公山弗擾臣季氏者也而以費叛季氏公歛處父臣孟氏者也而以成叛孟氏皆三家之僣叛已極當希不失之時見侮於家陪耳故前年已再圍郈弗克今乃帥師墮郈墮之者病其強而毁之也叔孫既隳郈公山弗擾不及已而又叛故三子挾公以圍之聖人之意以三家始得志也則各繕兵積粟求以富私邑弱公家無所不為及私邑既強公家既弱而陪臣乃為之患亦如三家之禍魯也故書之以為僭竊亂臣之戒何與吾聖人之謀乎聖人謀事豈如是乎自聖人後無有一人辨其謬者傷哉春秋之不振也不書趙穿趙穿弑君之罪聖人不書趙穿而書趙盾何所見乎此春秋大義也趙穿弑君人誰不知若盾之罪非春秋書之更無人知也仲尼曰惜哉越境乃免若出境而反又不討賊則不免除出境不反乃免伊川踰年即位春秋君薨嗣子踰年即位為正其是非何如也先儒皆以春秋君薨嗣子踰年即位為正非也不知聖人所書正以譏非禮且啟禍亂之門也在禮天子崩七日而康嗣子即位稱王以示天下之有王也諸侯薨三日而命嗣子即位稱公以示一國之有君也觀書顧命及康王之誥曰乙丑王崩齊侯以二干戈虎賁百人逆子釗於南門之外延入翼室恤宅宗癸酉王麻冕黼裳既尸天子太保畢公率東西方諸侯執壤奠羣公既皆聽命相揖趍出王釋冕反䘮服此嗣君即位之常禮也夫成王方崩齊侯必逆元子釗入翼室居憂以為天下之宗主及既尸遂麻冕黼裳稱王受冊命同瑁而即位矣及既尸天子受諸侯之奠贄作禮報之君臣之分已定乃釋吉服行䘮禮自乙丑至癸酉九日之間已行即位之禮此周公之舊典夫子定書取之以存周制周公孔子豈不知君父方崩嗣子遽吉服即位改元為未可哉盖以大位畀之重名號不早正則窺伺奪嫡之亂作矣豈惟天子則然方周公薨未踰年伯禽興徐戎之伐稱公以誓征盖諸侯亦然也逮至周衰此禮䘮亂始有踰年即位之制其未踰年也天子不稱王諸侯不稱公名之為子故平王以隠三年春三月崩至秋武氏來求賻雖踰時不稱天王使之以威王未即位也襄王以文八年秋八月崩至明年春毛伯來求金雖踰年猶不稱天王之命以襄未葬嗣君未成君也昭二十二年景王崩於夏四月至冬十月王猛猶稱子則異乎康王嗣天子之禮也魯莊公薨於秋八月子般至冬十月而稱子文公薨於春二月子赤至冬十月而稱子襄公薨於夏四月子野至秋九月而稱子其他列國皆然僖九年春宋公御説卒其夏襄公稱子㑹於葵丘僖公二十五年春衛侯燬卒其冬成公稱子盟于洮如此之類異乎伯禽則諸侯之禮矣嗚呼一人之家不幸而䘮其主父不有家督以為之主則豪奴悍婢與其他人竊其私藏謀及田宅必矣况大而一國又大而天下其可一日而無君乎方先君不幸踰年而後正嗣君之位號何以絶覬覦之望塞禍亂之門乎所以尹氏得以立子朝而抗猛王室以危而不父得以立閔而弑般仲遂得以立宣而弑赤魯以大亂春秋之多變故盖始於此也使從周公之典禮名位早定豈至是乎聖人於春秋所以書其踰年即位及嗣君稱子者皆著其變周禮而啟亂源也近世周氏讀書顧命康王之誥反據漢儒記禮之説與春秋列國之制謂康王以嘉服見諸侯又受乘黄玉帛之幣為非禮且曰使周公在必不為此夫周公制禮成康之君召畢之臣相與守之以為常制豈有非周公之典成康召畢乃行之乎行之非禮夫子定書乃取之乎不知書之所以存顧命者正以見春秋之非矣盖蘇氏不䆒春秋之㫖誤為之説也郊望當否春秋郊望但卜上辛不吉則卜中辛又不吉則當用下辛不可更卜矣如魯郊三卜四卜五卜而至於不郊於禮何如也春秋書郊望之㫖三傳諸儒之説無得之者無他知求小禮而昧於大禮故經書郊者凢皆為有故而書非因卜不吉而廢郊則因牛死傷而廢郊又有不待卜之吉而特郊者雖牛之死傷而必郊者因卜不吉而廢郊則若僖三十一年四卜郊不從乃免牲猶三望成十年夏四月五卜郊不從乃不郊襄七年夏四月三卜郊不從乃免牲十一年夏四月四卜郊不從乃不郊是也因牛死傷而廢郊則若宣三年正月郊牛之口傷改卜牛一又死乃不郊猶三望成七年正月鼷䑕食郊牛角改卜牛鼷䑕又食其角乃免牛夏五月不郊猶三望是也有不待卜之吉而特郊者則若成十九年九月辛丑用郊是也有牛雖死傷而必郊者則若定十五年正月鼷䑕食郊牛牛又死改卜牛夏五月辛亥郊哀元年春正月鼷䑕食郊牛改卜牛夏四月辛巳郊是也先儒之説不過罪其屢卜與其食牲不謹耳或曰禮不卜常祀而卜其牲日或曰三卜禮也四卜五卜非禮也今因卜不吉而廢郊是廢禮也又據禮養牲必在滌三月養牲必二一以祀上帝一以祀后稷帝牛有變則改卜稷牛以代之今以牛死傷而廢郊是又失禮也所以春秋書以示譏此皆非聖師之意不知聖人書郊乃惡其非禮之大者耳屢卜之瀆養牲之慢非春秋所責也學者欲䆒聖人之㫖先嘗斷魯郊之當否未暇及其𤨏𤨏也夫子傷周之末亂禮樂自諸侯出其言魯之郊褅則有周公其衰之嘆豈有天子郊天諸侯亦郊天天子望祀山川諸侯亦望天子禘其祖之所自出諸侯亦禘使諸侯亦可行則聖人不以禮樂自諸侯出為傷也自夫子没漢儒不知道者但見春秋書魯祭祀多天子之禮始妄設周賜魯禮樂之説所以諸儒不以魯郊為非赦其非禮之大者求其不合禮之卜者魯人既僣竊禮樂罪莫重焉就使無四卜五卜神之道則可以郊乎否乎又使養牲必䕶不至死傷則亦可郊乎否乎魯人郊望無時可也何區區者之足論然周郊以冬至而魯用之於啟蟄天子四望而魯三之名為後時降殺但竊郊望之名已有罪矣譬如啇賈冠師儒之冠庶人服卿相之服望其容飾已知其非分越制也予謂春秋所書之㫖正以有故而不郊者為幸無故而郊者為大罪也僖之四卜成之五卜襄之三卜皆不從幸其因卜不從而廢也宣之郊牛口傷成之鼷䑕食郊牛角皆因是而不郊幸其因牛死傷而廢郊也若是者僅以有故而廢僣耳定雖牛死五月而郊哀雖牛傷四月而郊勉強行僣豈為當哉使僖襄不因屢卜不吉宣成不因牛之傷肯不郊而已乎然與其因變故而止猶愈於定哀不知己也若乃成公經直書九月辛丑用郊者古者大祀必順時卜日周官大宰曰祀五帝前期十日帥執事而卜日是也成公七年以牛傷而不郊十年以卜不從而不郊故至此不復順時卜日恐天意不已從也惟肆意所欲為經特謂之用郊用者非禮故為之意也大抵魯人乘周室之衰賞罰不行乘大路載孤韣設兩觀舞八佾其僣擬無所不至是以天子之祭郊望與禘皆僣行之然天不可謟神明有知其肯厚非禮之祭也哉季氏旅於泰山夫子曰魯太山不如林放乎太山有知必不享季氏之祭况上天而可謟乎宜乎至於三卜四卜五卜不從鼷䑕屢食其角可見天心之不享也魯人曾不知得罪於天雖屢卜不從而猶三望雖牛死而改卜其甚者至於用郊僣擬之心不能自已下破王制上拂天心其罪為大也聖人發憤作春秋書其因變故而不郊者僅如此其餘非卜不從牛無死傷而肆意於僣者又不知其㡬也深味聖師之㫖曰猶三望曰免牲其深矣乎其㣲矣乎學者思之貶黜吳楚吳之與楚周季之強者也聖人黜之何哉周室之季吳楚可謂強矣仲尼修春秋書荆以狄之雖其屢進不過子爵所以抑黜侵亂而使後世知懼春秋總論以傳考經之事迹以經别傳之真偽此伊川學春秋法也經不通求之𫝊傳不通求之經此明道學春秋法也夫春秋之作與五經異五經言其理春秋言其用譬之於法其猶律令之有斷例乎譬之於毉其猶方書之用藥劑乎讀春秋而不知聖人之用不足與語春秋矣且春秋何以始吾知王者之迹熄則知春秋之始春秋何以終吾知聖人有所因而作則知春秋之終五伯功之首罪之魁定五伯之功罪則可以治春秋於書劉巻之卒也吾見聖人之憂聖人何憂憂斯道之失其據也於書孔子之生也吾見傳者之喜傳者何喜喜斯道之得其傳也文姜之去其氏誅文姜也吾祖宗之立法亦然矣共妃之詳其録賢共妃也吾先正嘗有不下堂之譽也書始作兩觀始者貶辭也以其舊之無也書初獻六羽初者褒辭也以其舊之僣也一字之間榮辱判焉凛乎其可畏哉康節先生有言春秋因事而褒貶非孔子有意於其間故春秋盡性之書也噫人以春秋為名分之書君子以春秋為性命之書彼為臨川之學者其何知春秋名目夫子未修春秋天下已有春秋之目夫子既修春秋天下愈多春秋之名盖古史以春秋命名者實顯其年以明記事之初始也一字之褒則煖然似春一字之貶則凄然似秋命名取義所以示勸懲於萬世而為不易之法也故夫子未修魯史之前如古語記大丁時事則曰夏商春秋記獻公十七年事則曰晋春秋韓起見魯春秋外傳則見於昭公之二年司馬侯言羊舌肹習春秋則見於晋語之著述申叔時言教太子以春秋則見於楚語之記録至於魯春秋記與屬辭比事之教則又見於禮經之坊記經解此豈非夫子未修春秋而天下已有春秋之目乎夫子既修魯史之後如袁曄之獻帝春秋習鑿齒之漢晋春秋虞卿著書八篇則名曰虞氏春秋不韋著二十餘萬言則名曰吕氏春秋鮑行卿著書二十卷則名曰宋春秋至於包湑所作則又名曰河洛春秋此豈非夫子既修春秋而後世愈多春秋之名乎雖然春秋之目多矣愚不知通行於今者㡬何哉諸家春秋皆以作史為的而吾夫子春秋獨以聖經著名則聖人褒善貶惡真足以起千萬世之敬畏而無愧於春秋之名矣吳楚不書王吳楚盟㑹不書王恐是吳楚當時雖自稱王於其國至與諸侯盟㑹則未必稱也文公語録程沙隨辨春秋之疑向見沙隨春秋解只有説滕子來朝一處最好如隠十一年方書滕侯薛侯來朝到桓二年便書滕子來朝先軰為説甚多或以為時王所黜故降而書子不知是時時王已不能行黜陟之典就使能黜陟諸侯當時亦不止一滕之可黜或以春秋惡其朝桓特削而書子自此之後滕一向書子豈春秋惡其朝桓而并後代子孫削之乎或以為當䘮未君前又不見滕侯卒皆不通之論沙隨則謂此見得春秋時小國事大國其朝聘貢賦之多寡隨其爵之崇卑滕子之事魯以侯禮見則所供者多故自貶降而以子禮見庶得貢賦易供此説恐是如此縁後靣鄭朝晋云鄭國男也而使從公侯之賦見得鄭本是男爵後襲用侯伯之禮以交於大國初焉不覺其貢賦之難辦後來益困於此方説出此等話非獨是鄭想當時小國多是如此同上胡春秋有牽強處胡氏春秋傳有牽強處然議論有開合精神同上看左傳方見筆削㸔春秋且須㸔得一部左傳首尾意思通貫方能畧見聖人筆削與當時事之大意同上左傳是秦時文字三傳惟左氏近之或云左氏是左史倚相之後故載楚事校詳國語與左傳似出一手然國語使人厭㸔如齊楚吳越諸處久精采如紀周魯自是無可説將虚文敷衍如説籍田等處令人厭㸔左氏必不解是邱明如聖人所稱煞是正直底人如左傳之文自有縱横意思史記却説左邱失明厥有國語或云左邱明左邱其姓也左傳自是左姓人作如秦始有臘祭而左氏謂虞不臘矣是秦時文字分明同上三傳精踈不同左氏曾見國史考事頗精只是不知大義專去小處理㑹往往不曾講學公羊榖梁考事甚踈然理義却精此二人乃是經生傳得許多説話往往都不曾見國史同上三傳互有得失左氏傳是箇愽記人做只是以世俗見識斷當它事皆公利之説公榖雖陋亦有是處但皆得於傳聞多訛謬同上三傳各有優劣左氏不是儒者只是曉事該博㑹做文章之人公榖二子却是不曉事底儒者故其説道理及禮制處不甚差不得語鄭重同上擬春秋自論語記於聖門之髙弟而後國語新語皆以語命名自文選集於蕭梁之東宫而後文粹文海皆以文命名然則後代史家典冊多以春秋命名者豈非因孔子春秋而作歟春秋果何為而作為褒貶而作也一字之褒煖然如春一字之貶凄然似秋因其名以䆒其義盖欲公褒貶於萬世而示後以不容犯之直筆柰何後世春秋之目何其紛紛耶虞卿乃戰國説士著書八篇名曰虞氏春秋可矣愚不知譏刺得失果足以勸善懲惡否吕不韋乃陽翟賈人著書二十餘萬言名曰吕氏春秋可矣愚不知八覽六論果足以當一王法否乎孔衍能著漢魏春秋而不能弭鄰郡之賊其視亂臣賊子懼為忸怩呉兢能作唐春秋而不能逭太簡之譏其視顯㣲闡幽為有愧孫盛能撰魏武春秋而不能無放蕩之失其視片字為少惡至於吳均之有齊春秋鮑氏之有宋春秋蕭氏之二十國春秋武敏之三十國春秋其所以擬春秋者何義陸賈之楚漢春秋趙氏之吳越春秋習鑿齒之漢晋春秋其所以合春秋者何事吁故必有夫子而後可以任褒貶之責彼庸庸碌碌手叚而敢於作春秋哉嗚呼是皆未知吾夫子不獲已之意也羣書考索别集卷十一
