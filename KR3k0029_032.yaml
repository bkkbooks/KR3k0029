body:
  text: 羣書考索卷三十二宋章如愚撰禮門明堂史記曰黃帝接萬靈於明庭即明堂也蓋明堂之制起於黃帝其制有殿而無壁蓋之以茅圜之以水宫垣為復道而上有樓從西南入名曰崑崙天子從之入以拜祀此出於公玉帶之説也唐虞祀五帝於五府蒼曰靈府赤曰文祖黃曰神計白曰明紀黑曰元矩此出於通典之所載也夏后氏世室堂修二七廣四修一五室三四步四三尺九階四旁兩夾窗白盛門堂三之二室三之一商人重屋堂修七尋堂崇三尺四阿重屋周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵大戴禮盛德篇曰明堂九室室有四户八窗三十六户七十二牖蓋以茅上圎下方其外以水名辟雍明堂月令孟春之月天子居青陽左個仲春居青陽太廟季春居青陽右個孟夏居明堂左個仲夏居明堂太廟季夏居明堂右個中央土居太廟太室孟秋居總章左個仲秋居總章太廟季秋居總章右個孟冬居玄堂左個仲冬居玄堂太廟季冬居玄堂右個逮漢武帝招延儒雅好行典故泰山北有古明堂基因欲修之而濟南人公玉帶上黃帝明堂圖其制茅屋而水環之建武初營明堂循九室之制至于顯宗始成其事以饗祀神明以朝會諸侯唐禮樂志曰孝經宗祀文王於明堂以配上帝而三代有其名而無其制度故自漢以來諸儒之論不一至於莫知所從則一切臨時增損而不能合古然推其本旨要於布政交神於主者尊嚴之居而已其制作何必與古同然為之者至無所據依乃引天地四時風氣乾坤五行數家之類以為倣像而衆説亦不克成隋無明堂而季秋大享常寓雩壇唐高祖太宗時寓于圜丘正觀中豆盧寬劉伯莊議從崑崙道上層以祭天下層以布政而孔頴達以為非魏徴以謂五室重屋上圓下方上以祭天下以布政自前世儒者所言雖異而以為如此者多同顔師古曰周書敘明堂有應門雉門之制以此知為王者之常居爾其青陽總章玄堂太廟左右個皆路寢之名也大戴禮曰在近郊又曰文王之廟也此奚足以取信哉證及師古等皆當世名儒其論止於如此高宗改元總章分萬年置明堂縣示欲必立之而議益紛然或以為五室或以為九室而高宗依兩議以帟幕為之與公卿臨觀而議益不一明堂亦不能立迄唐之世季秋大享皆寓圜丘然明堂之説先代諸儒所説不一通典注曰戴德云明堂辟雍是一所也古周禮孝經説以明堂為文王廟左傳魯僖公五年既視朔遂登觀臺服氏云人君入太廟視朔天子曰靈臺諸侯曰觀臺在明堂之中文二年服氏云明堂祖廟並與鄭説不同者鄭注玉藻曰天子廟及路寢皆如明堂制即鄭意以為三者名異而制同王制曰小學在公宫之左大學在郊即云天子曰辟雍是學不得與明堂同為一物也又天子宗廟在雉門之外孝經疏云明堂在國之陽是明堂與祖廟不得為一也蔡雍明堂章句曰明堂者天子太廟射饗養老教學選士皆在其中故言五室之貌則曰太廟取其尊崇則曰太室取其堂則曰明堂取其四時之學則曰太學取其周水圜如璧則曰辟雍雖各異名而事實一也袁凖正論乃曰宗廟之中人所致敬而使衆學處焉享射其中人鬼慢黷非其理也宗廟鬼神所合祭天於人鬼之室非其處也如凖所論與鄭氏合宋朝皇祐二年仁宗議明堂禮文彥博等議以為藝祖有事南郊太宗射行祈穀之禮惟季秋大享闕而未舉真宗祥符初議行此禮然亦未遑明堂制度前代諸儒議論皆異要必天子之路寢今大慶殿是也已而內出御製天地祖宗樂曲舞名降神酌獻奠幣入爼繇誠安而下章有其義而威功睿德右文化俗所以為文武二舞之美稱者又皆足以彰盛德形容寓皇心肅敬備薦獻之儀而侑明靈之觀焉太常習肄惟謹惟虔是歲九月即大慶殿因事制宜為五縵室親御寶跗若篆飛白燦為華榜樂舞既作盻蠁來格天地祖宗罔不咸喜帝之昭報之誠於是為盡而我宋盛典實肇興於此焉是時王洙上言文彥博等勒成皇祐大享明堂記凡二十卷自為序至嘉祐八年再行是禮焉社稷祭法曰昔共工氏霸九州也其子曰后土能平水土故祀以為社厲山氏之有天下也其子曰農能殖百穀夏之衰周棄繼之故祀以為稷左傳曰昭公二十九年共工氏有子曰句龍為后土后土為社列山氏有子曰柱為稷自夏以上祀之其後以周棄為稷自商以來祀之通典説顓頊祀共工子句龍為社列山氏子柱為稷高辛氏唐虞夏因之商湯以旱而遷稷故以周棄代之欲遷句龍無可繼者故止周天子立三社曰太社曰王社曰亳社諸侯亦三社曰國社曰侯社曰置社蓋太社國社為百姓而立者也王社侯社自於藉田而立之也亳社遷國之社也立名雖異其神則同天子之社則以五色土諸侯之土則以當方之土大夫以下各以地所宜木而立之禮神之玉皆用兩圭有邸其牲王制云天子祭社稷皆太牢諸侯祭社稷皆少牢皆黝色祭之日王及尸皆服絺冕樂則大司樂云奏太簇歌應鍾舞咸池以祭地祗酌以三獻漢高帝初起禱豐枌榆社二年入關因命縣為公社於是而有公社之名平帝時奏事者有曰漢興已有官社以后稷配食官稷於是而有官社官稷之號後漢光武立太社稷于洛陽歲三祠而太社之名立然自漢後但太社有稷而官社無稷魏明帝遂立帝社而帝社之名彰齊永明中則有太稷梁大同中則又加官稷唐於仲春仲秋則祭太社太稷神龍初改先農壇為帝社於太壇西而立帝稷其禮與太社太稷無異開元十九年停帝稷而祀神農復以后稷而為配天寶三載於是而升社稷為太祀此歷代之沿革也然社稷之義先儒所説不同鄭康成之説以社為五土總神稷為原隰之神勾龍以有平水土之功配社祀之稷有播種之功配稷祀之若賈逵馬融王肅之徒以社祭勾龍稷祭后稷皆人鬼也非理地之神崔靈恩云二家之説雖各有通但昔來所習謂鄭為長及白虎通曰土地廣博不可遍祀五榖衆多不可一一而祭故封土立社示有土也稷得隂陽中和之氣而為衆多故稷為長此言得之矣雖然昔共工氏龍有平水之功高陽氏之子黎亦有平土之功是故祭社之日取二子而配食焉示不忘本之義也今之配祀者謂之龍可也黎亦可也何嫌於二名耶彼直以龍與黎為社之正神非配社昔漢儒之妄也或曰不然使社為土神則當食以水不當兼用羊豕也殊不知用犢祭地禮也社乃地祗之屬而非地猶五帝為天之尊神而非天也安得不用羊豕吾益知社為土之正神而無疑也列山氏之子柱有布穀之功厲山氏之子農亦有播穀之功是故祭稷之日取二子以配食焉示不忘本之義也今之配祀者謂之柱可也農亦可也何嫌於二名耶彼直以柱與農為稷之正神而非配稷者又漢儒之妄也或曰不然使稷為穀神則當祀以牡不當復用秋黍也殊不知用牡祭地禮也稷乃地祗之屬而非地猶五帝為天之尊神而非天也吾安得不用稷黍吾今知稷為穀之正神而無疑也雜祭祀書曰先王顧諟天之明命以承上下神祗洪範八政三曰祀大宗伯之職以吉禮事邦國之鬼神祗故祭天曰燔柴祭地曰瘞埋祭山林川澤曰貍沉祭風師雨師曰槱燎祭四方百物曰疈辜是類是禡師祭也既伯既禱馬祭也除惡之祭為祓會福之祭為會告事求福曰禱潔意以享為禋禱雨為雩禱明為禜是以聖王為之典禮民之精爽不二齊肅聰明者神或降之乃有神民之宫各司其序不相亂也歷代人君罔不遍走羣望咸秩無文故神農播種始諸飲食致恭鬼神顓帝亦潔誠以祭祀其後成湯至于帝乙罔不明德恤祀所以隂陽和而萬物遂也以今考之在古有雩祭之禮有朝日夕月之禮有祀山川之禮有六宗之禮有七祀之禮有司寒之祭有蠟臘之祭夫雩者何也月令仲夏之月命有司祀祈山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士有益於民者以祈穀實若國大旱則司巫帥巫而舞雩漢承秦雩壇禮廢後漢自立春而至于立秋郡國上雨澤若少則公卿官長以次行雩禮以求雨東晉穆帝制雩壇梁天監中停柴燎而用次也唐武德初孟夏雩祀昊天上帝於圜丘正觀雩祀於南郊開元旱則大雩此雩祭之禮也夫日月之禮何也周制以柴祀日月星辰日壇曰王宫月壇曰夜明王搢大圭執鎮圭繅藉五采五就以朝日凡祭日月歲有四焉迎氣之時祭日於東郊祭月於西郊一也二分祭日月二也郊之祭天配天而主日配以月三也月令十月祭天宗合祭日月四也漢武始郊太一朝日夕月改周法其後常於以郊太畤質明出竹宫東向揖日西向揖月魏文帝以為非尊天之道明帝春始朝日于東郊秋夕月于西郊始得古禮唐二分朝日夕月於國城東西柳子厚為御史主祀事將朝日其寮問曰古人夕朝日而已今而曰祀朝日何也柳曰古者旦見曰朝暮見曰夕故詩曰邦君諸侯莫肯朝夕左傳曰百官承事朝而不夕禮記曰日入而夕趙文子礱其椽張老夕智襄子為室美士茁夕皆暮見也漢儀夕則兩郎向瑣闥拜謂之夕郎亦出是名也故曰大采朝日少采夕月義曰春朝日秋夕月此朝日夕月之禮也夫祀山川之禮何也周制以血祭祭五嶽以貍沈祭山林川澤一歲凡四祭迎氣一也郊天二也大雩三也大蠟四也禮神之玉兩圭有邸五寸牲用少牢各隨方色酌用五獻秦并天下令祠官所當奉名山大川鬼神可得而序自崤以東名山大川祠曰太室嵩高也常山泰山會稽湘山水曰濟曰淮自華以西名山七曰華山薄山嶽山岐山吳山鴻冡瀆山名川四曰河祠臨晉沔祠溪中湫泉祠朝邢江水祠黑漢孝文增修山川羣祀武帝因巡狩其禮名山大川後漢章帝詔祀山川百神應禮者唐武德正觀之制五嶽四鎮四海四瀆年别一祭各以五郊迎氣日祭之此祀山川之禮也夫六宗者何也通典曰周制祀昊天上帝則服大裘而冕祀五帝以如之又云以禋祀祀昊天上帝漢興於甘泉汾隂立壇禋六宗孔光劉歆等以乾坤六子為六宗後漢安帝立六宗祀時歐陽説謂六宗者在天地四方之中為上下四方之宗鄭玄以星辰司中司命風師雨師為六宗馬融謂萬物非天不覆非地不載非春不生非夏不長非秋不收非冬不藏孔安國按孔叢子孔子之説謂埋少牢於太昭祭時祖迎於坎壇祭寒暑也王宫祭日夜明祭月幽宗祭星雩宗祭水旱是為六宗賈逵以為天宗三日月星也地宗三河海岱也魏明帝立六宗祀祀六子之卦晉罷其祀劉邵以為太極沖和之氣為六氣之宗後魏立六宗祀孝文詔祀天皇大帝及五帝之神通典謂張迪以六代帝王張麾以宗廟三昭三穆三等並不堪録後魏孝文以天皇大帝五帝為六宗於義為當崔靈恩三禮義宗謂六宗之神宗儒所釋義各不同義雖不同亦各有通月令孟冬祈于天宗盧植注云天宗六宗之神李邰謂六宗上不及天下不及地旁不及四方在六合之中晉虞喜别論曰地有五色大社象之總五為一則成六六為地數劉昭稱孔叢子之言若果夫子所説則後儒無復紛然正謂未必然耳至昭以六宗為祭祀則穿鑿甚矣惟晉司馬彪曰周禮無六宗之兆祭法無六宗之文不宜特立祀也此六宗之説也夫七祀者何也商制天子祭五祀周制王為羣姓立七祀曰司命曰中􅋼曰國門曰國行曰泰厲曰户曰竈諸侯為國立五祀大夫立三祀士立二祀庶人一祀兩漢魏晉立五祀井皆與焉白虎通云户竈門井中􅋼唐開元制禮祭七祀各因時享祭之於廟庭司命户以春竈以夏門厲以秋行以冬中􅋼以季夏夫五祀見於周禮禮記儀禮雜出史傳多矣特祭法以司命泰厲為七祀而左傳家語則以為重該修熙黎勾龍之五官月令以五祀為門行户竈中􅋼白虎通劉昭范曄高堂隆之徒士五祀為門井户竈中􅋼鄭氏釋大宗伯之五祀則用左傳家語之説釋小祝之五祀則用月令之説釋王制之五祀則用祭法之説隋唐參用月令祭法之説五祀祭行及李林甫之徒復修月令冬亦祀井而不祀行此七祀之禮也夫司寒者何也月令仲春之月天子乃鮮羔開冰先薦寢廟鄭注云祭司寒而出冰春秋傳曰古者日在北陸而藏冰西陸朝覿而出之其藏之也深山窮谷固隂沍寒於是乎取之其出之也朝之祿位賔食喪祭於是乎用之其藏之也黑牡秬黍以享司寒其出之也桃弧棘矢以除其災其出入也時食肉之祿冰皆與焉昭四年唐制先立春三日用黑牡秬黍祭司寒之神於冰室鑿井而藏之仲春開冰此司寒之禮也司寒玄𡨕北方之神故物皆用黑夫蠟臘者何也郊特牲云天子大蠟八先嗇也司嗇也農也郵表畷也貓虎也坊也水庸也昆蟲也伊耆氏始為蠟蠟也者索也歲十二月合聚萬物而索饗之也蠟之祭也主先嗇而祭司嗇也祭百種以報嗇也饗農及郵表畷禽獸仁之至義之盡也迎貓為其食田鼠也迎虎為其食田豕也祭坊與水庸事也黃衣黃冠而祭息田夫也八蠟以記四方四方年不順成八蠟不通以謹民財也順成之方其蠟乃通以移民也既蠟而收民息已故既蠟君子不興功鄭氏曰息民與蠟異則黃衣黃冠而祭為臘必矣正義曰先蠟後息民是息民為臘與蠟異也夏曰嘉平商曰清祀周曰大蠟蔡雍月令章句曰總謂之臘籥章國祭蠟則吹豳頌擊土鼓以息老物羅氏蠟則作羅襦秦漢曰臘漢季冬之月星回歲終隂陽以交勞農大享臘唐正觀季冬寅日蠟祭百神於南郊宋朝建隆初有司言以火德王請以戍日為臘元豐六年蠟祭曰郊各為一壇以祀其方之神而息民祭在蠟祭之後此蠟臘之禮也其他在秦則有陳寶祠有伏祠有八神祠漢則有蚩尤祠靈星祠高禖祠太室祠嵩呼宋朝承唐制又祀九宫貴神於東郊用太祀禮東南曰招搖正東曰權星東北曰太隂正南曰天一中央曰天符正北曰太一西南曰攝提正西曰咸池西北曰青龍景祐二年章得象詳定江淵之説隨每年貴神飛棊之方旋定祭位從之然所謂太乙者又有十神太乙之名如曰五福天乙之號君基臣基民基之號此皆雜祭之類也雖然古人先成民而後致力於神蓋以民為神之主也文帝切以愛民而謂禬禳之事足以祐民也廣壇場增圭幣除祕祝之官以為祈福其為事已舛矣宣室之問未皇他事而急於鬼神之問豈以鬼神之福能有以隂助斯民乎逮至武帝又甚焉而其心則為己不為民矣巡海而求神人築宫而封泰一祝吏祠官相望於名山大川之上一切妄祭淫祠以徼福於己百姓困而國用竭福何有於己哉終漢之末一歲凡三萬七千祠胡廣謂班固郊祀志宜去鬼神仙道之語置韋賢宗廟迭毁議於其中則其祀事庶得以類相從矣夫孟堅合宗廟之議而專志於郊祀固未為得至於漢武之淫祀以為後世戒其旨深矣安得以去為哉時祭禘祫通典曰有虞氏四時之祭名春曰禴夏曰禘秋曰嘗冬曰蒸夏因于虞商因于夏王制曰春禴夏禘秋嘗冬蒸其祭尚聲特牲云臭味未成滌蕩其聲樂三闋然後出迎牲周祭春曰祠夏曰禴秋曰嘗冬曰蒸乃以禘為盛祭之名大宗伯云以祠春享先王以禴夏享先王以嘗秋享先王以蒸冬享先王詩曰礿祠蒸嘗于公先王此周四時之祭名也其祭尚臭灌用鬯臭鬱合鬯臭隂達於淵泉既灌然後迎牲行九獻之禮祭之日王服衮冕而入廟尸入奏肆夏王以圭瓚獻尸尸以祼禮降神此祼神之一獻也后以璋瓚獻尸此為二獻也王迎牲奏昭夏始行朝踐之禮此三獻也后於是獻朝事之籩此四獻也至薦熟時謂之饋食此五獻也后薦饋食之籩此六獻也王以醴齊酌尸謂之朝獻此七獻也后薦加事之籩豆此八獻也卿諸侯為賔者以王爵酌盎齊備卒食三獻是為九獻自九獻之後遂降冕而總干舞大武之舞以樂尸九獻之後更行三爵謂之加爵即行旅酬無算之爵而後尸出焉厥明遂繹於祊此時享之禮也時享之外則有禘有祫王制曰天子犆特礿祫禘祫嘗祫蒸諸侯礿則不禘禘則不嘗嘗則不蒸蒸則不礿諸侯礿犆禘一犆一祫嘗祫蒸祫蓋天子先祫而後時祭諸侯先時祭而後祫此夏商之制也周制天子諸侯五年殷祭一禘一祫禘以夏祫以秋祫者毁廟未毁廟皆合升于太祖禘則不及親廟祖文武以下毁主依昭穆於文武廟中祭之王季以上於后稷廟祭之如先祫後禘者礿春秋魯僖公定公宣公皆八年而禘以再殷祭而推之也通典議曰聖人制禮合諸天道使不數不怠故有四時之祭焉而又設殷祭者因天道之成以申孝敬之心用盡事終之禮禘祫二禮俱為大祭先賢所釋義各有差殊馬融王肅皆云禘大祫小鄭元注二禮以祫大禘小賈逵劉歆則云一祭之名禮無差降數家之説非無典據至於大通經訓鄭義為長嘗試論之以禮經及春秋所書皆祫大於禘按春秋公羊傳云大事於太廟大事者祫也祫者毁廟之主陳於太祖未毁廟之主皆升合食於太祖至於禘則云禘于莊公禘于僖公既不及於太祖則小於祫矣曽子問主於夫子曰自非祫祭七廟五廟無虛主而不言禘則知禘小於祫明矣其祫則備五齊三酒禘惟四齊二酒祫則備用六代之樂禘則四代而下又無降神之樂以示其缺也後漢光武詔張純議禘祫之禮而純以為漢舊制三年一祫毁廟主合食高廟存廟主未嘗合祭元始間始為禘祭禮説三年一閏天氣小備五年再閏天氣大備三年一祫五年一禘禘之為言諦定昭穆尊卑之義也禘祭以夏祫禘以冬帝從之自是禘祫遂定後魏孝文太和中詔議禘祫而遊明根高閭等各陳其義孝文遂兩從王鄭二議禘祫并為一名改祫從禘五年一禘則四時盡禘永為後法唐禮樂志禘祫大祭也祫以昭穆合食於太祖而禘以審諦其尊卑此禘祫之義而為禮者失之至於年數不同祖宗失位而議者莫知所從禮曰三年一祫五年一禘傳曰五年再殷祭高宗上元三年十月當祫而有司疑其年數史元璨等議以為祫而後禘自是而後五年而再祭蓋後禘去前禘五年而祫常在禘後二年禘常在祫後二年魯昭公二十年禘至二十五年又禘此可知也議者以元璨等言有經據遂從之而開元六年而祫明年而禘自是而後禘祫各自以年不相通數凡七祫五禘至二十七年禘祫並在一歲有司始覺其非乃議以為一禘一祫五年再殷宜通數而禘後置祫歲數逺近二説不同鄭玄用高堂隆先三而後二徐邈先二而後三而邈以謂二禘相去為月六十中分三十置一祫焉此最為得遂用其説由是一禘一祫在五年之間合於再殷之義而置祫先後則不同焉宋朝三年一祫以孟冬五年一禘以孟夏天聖三年祫饗太廟帝問輔臣以祫饗之禮王欽若等奏曰祫者合也宗廟之禮每三年權遷神主出廟室就前楹而祭之所以謹時思而合祀事以象大宗子有收族合食之義也禘祫歐陽公之作唐禮樂志有曰禘祫大祭也祫以昭穆合食於太祖而禘以審禘其尊卑此禘祫之義而為禮者失之愚嘗三復是説而後知世之議禮者徒惑於紛紜之異同而皆未明其義也古者聖人制禮取法天道以事其祖三年一閏天氣小備故三年一祫五年再閏天氣大備故五年一禘是故周制五年殷祭一祫一禘祫者毁廟未毁廟皆合升於太祖所謂合食於太祖也禘者惟及於毁廟而不及於親廟所以審禘其尊卑也自是制不明載於周禮而鄭氏於肆獻饋食在四方之上則是祫也禘也而祫禘之説始見於周禮之注至王制所載天子犆礿祫禘祫嘗祫蒸而説者又以為夏啇之制此所以起異同紛紛之論也自今考之諸儒之論莫同異於小大之説也馬融王肅則以為禘大而祫小鄭康成則以為祫大而禘小為融肅之説者曰孔子言禘自既灌而往禘祫大祭而獨舉禘則祫可知故於是而以禘為大為鄭康成之説者曰公羊傳云大事於太廟大事者祫也祫者毁廟之主陳於太祖未毁廟之主皆升合食於太祖至於禘則云禘于莊公禘于僖公既不於太祖則小於祫矣故於是而以祫為大愚以為小大之異不必深辨惟明乎禘祫之義則古人尊祖之意得矣諸儒之論莫異同於先後之説也鄭氏用高堂隆説則以為前三後二徐邈之説則以為前二後三駮鄭氏者曰三年而祫為月有餘二年而禘為月不足駮徐氏者曰禘在祫前則是三年而禘祫在禘後則是二年而祫至唐用徐邈之説則以為二禘相去為月六十中分三十而置一祫焉由是一禘一祫在五年之間愚以為前後之説不必深辦惟深明乎禘祫之義則古人尊祖之意得矣不特此也禘祫之祭蓋兩祭也而賈逵劉歆以禘祫為一祭而二名是其名之辨又不一矣禘以夏祫以秋此古制也張純則以祫為冬祭其説曰物備禮成故合聚而祭之是其時之用又不同矣宗廟之禮止於九獻此古制也而先儒則曰大祫十有二獻杜祐通典載禘祭一如祫祭所異者祫則備五齊三酒禘惟四齊三酒祫則備六代之樂禘則用四代而無降神之樂是又其禮之用為不同要之明其義則名之不同亦何惑於名時之不同亦何拘於時禮之不同亦何泥於禮歐公之言蓋深知禮者矣鄭氏又謂禘其祖乃祭感生帝其説尤為無據而王肅則以為祭始祖之父王氏之議祫而後禘則是禘止於一時至後魏之論禮則以五年一禘則四時盡禘人自為説卒莫能定此議禮之家所以名為聚訟也漢唐之間禮意不明光武中興在位亦既久矣而禘祭之禮僅能再舉是不幾於疏而怠乎唐玄宗時行禘祫禮各自以年不相通數凡七祫五禘而其後禘與祫乃并於一歲是不幾於數而瀆乎漢官舊儀雖載三年一大祫之制而未能盡行唐開元禮雖有禘祫之制而未必合古此豈非諸生之過歟惟我宋朝三年一祫以孟夏五年一禘以孟冬其制已合於古而又羣臣之論足以發明乎古人制禮之義故其禮為益全天聖中王欽若為祫饗對則有謹時思而合祀事以象夫宗子收族合食之義熙寧中禮院言僖祖為始祖則孟夏禘祭當正東向之位而其下則以昭穆為序焉猗歟盛哉禘祫之義久失於漢唐而獨明於我宋豈非諸儒講學之功乎仲春羣祀高禖太一朝日釋奠耕藉社稷高禖之祀雖周官所載獨缺其文漢郊祀志不言其禮然考之於古以來久矣月令仲春之月玄鳥至之日以太牢祠于高禖故詩曰天命玄鳥降而生商而毛氏傳則曰薑嫄從帝而祠于郊禖詩曰克禋克祀以弗無子而毛氏傳則曰簡狄從帝而祈于郊禖則是薑嫄簡狄之前先有禖神矣自高辛氏有生契之祥故後王立高辛之祠以配高禖今其説載於孔頴逹之正義者可考也至漢武帝時得太子立高禖之祠而枚臯實為祝辭漢高禖之祠則立於城南而仲春實行其禮晉後從束晢之議以石為主而其祀浸重此祀高禖之禮也而盧植乃謂神居明顯之處故謂之高因其求子故謂之禖此其説之不可信也太一之祀雖時祭之大經禮不載十神之説出於術家然考之於史則有自來矣史記封禪書云天神貴者太乙而太乙之名已著班固郊祀志云古者天子三年一用太牢祀三一而太一實居其一今其所謂十神太一或曰君基太一或曰臣基太一或曰太遊太一而惟太乙無别名昔為最尊其説不為無謂也武帝祠於甘泉得神馬於渥窪水中遂次以為太一之歌玄宗時則以九宫貴神並祠之其禮始盛此祀太一之禮也而説者謂太乙最尊更無别名遂以其别無名者對太遊而謂之小遊太一此則説之不可信者也朝日之禮古禮也禮曰王搢大圭執鎮圭繅藉五采五就以朝日覲禮曰拜日於東門之外禮日於南門之外自武帝郊泰畤而因以揖日故曰朝日之禮遂見於竹宫魏明帝朝日於東郊故朝日之禮又見於東郊蓋至於唐而朝日之禮乃謂之祀朝日此其禮之失也是以柳宗元作為朝日之説豈非欲復古乎釋奠之禮古禮也大胥曰春入學舍菜文王世子曰凡學春官釋奠于先師自唐貞觀釋奠於學而詔孔頴逹講孝經而其禮復盛自貞觀從房玄齡朱子奢之議以孔子為先聖而其禮遂定至玄宗釋奠講經而魚朝恩預焉此則禮之失也故杜佑詳載其事於通典之書豈非欲以復古乎籍田之禮古人重農之意也周禮甸師掌帥其屬而耕耨王籍宣王不籍千畝則虢公諫漢文躬耕籍田以為天下先建始躬耕潘嶽作賦貞觀籍田文本頌之此籍田之禮也然而月或用孟者蓋用吕不韋月令孟春之説也月或用仲者蓋漢明帝唐開元所行之禮也其時説雖不同而其禮則一也社稷之禮古人報本之意也曰春籍田而祈社稷又曰秋報社稷漢高起豐立枌榆社光武洛陽立太社稷唐於仲春祭大社大稷而其禮為重開元之時升為大祀而其禮尤重此社稷之禮也然而或以社為五土總神勾龍有平水土之功配社祀之以稷為原隰之神稷有播種之功配稷祀之此鄭康成之説也或以社祭勾龍稷祭后稷皆人鬼也非地之神此王肅馬融之説也其説雖不同而其禮則一也宋朝仁宗重高禖之祀尤極其至景祐講壇屋牲幣之儀寶元去弓韣弓矢之制在康定則著為常祀在慶厯則復用弓韣皇祐中則詔壇徙高爽嘉祐則詔徙近郊宋朝尤重太一之祠以太一飛在九宫每四十餘年而一徙所臨之地則兵役不興水旱不作在興國中則太宗立祠於東南郊而祀之則謂之東太一在天聖中則仁宗立祠於西南郊而祀之則謂之西太一在熙寧中神宗建集福宫而祀之則謂之中太一釋奠之禮自真宗東幸其廟加展拜之儀增元聖之號定所祭二丁之日與明籩豆簠簋之數定內外三獻之官與頒儀注祭器之式此釋奠之禮至我朝而益盛雍熙籍田則太宗行之明道籍田則仁宗行之則籍田之禮為特備用三獻之官則見於景德正屋壇之制則見於天聖則社稷之禮為尤備廟制昭穆范祖禹作唐鑑論唐九室之制而以為天子七廟自古以來未之有改陸佃議禮於元豐有左右昭穆遞遷之説而何徇直以為於經傳無據愚於是知議禮之家一斷以古則紛紛之疑皆可以迎刃而解書曰七世之廟可以觀德則宗廟之制止於七廟禮曰辨廟祧之昭穆則昭穆之位一定不易其來久矣今以周制明之守祧八人蓋兼薑嫄之廟而為八則其為七廟也明矣自后稷以至昭王歷世無常而昭穆之位未嘗失次辨而敘之又有小史之職則其為定位也又明矣世之論廟制者乃曰唐虞五廟夏氏因之至商周而始有七廟是説也杜佑以通典則載之説者又曰小記云王者立四廟則周制七廟文武為二祧親廟四而已武二祧在七廟內是説也鄭康成注禮實取之惟其説之不同此世之論廟制者始紛紛而可疑要之以二説而斷之於古則亦何疑之有虞唐書載禋于六宗以見太祖則三昭三穆與太祖之廟而七為可驗也豈特商周為然哉荀卿曰有天下者事七廟而穀梁亦言天子七廟則是春秋戰國之時是説猶存至漢始有原廟有郡國廟而東都則又有所謂四親廟故是制始不明於漢唐初有四廟貞觀中從朱子奢虛太祖一室之議而廟以六室中宗增以七室開元則又增以九室是制又不明於唐學者能以是考之則杜祐之説可無疑矣商之三宗周之文武其廟皆在三昭三穆之外歷世不毁此所謂不遷之廟非祧也鄭康成惑小記之言而以文武不祧之廟在七廟之內是臆説也王肅聖證論曰禮自上以下降殺以兩使天子諸侯皆親廟四則君臣同等尊卑不别劉歆論之於漢韓愈論之於唐其言皆與肅同學者能以是考之則康成之説於此可無疑矣世之論昭穆者乃曰昭穆遷徙固無常位周廟王季一遷則昔之右者今為左昔之左者今為右以左右通計其次序然後父子之尊卑不相瀆也説者又曰古者祔以其班祫以其班而尸及賜爵又以其班所謂班者父為昭子為穆昭不可遷於穆穆不可遷於昭父在穆行子居昭位而不嫌者昭自為昭穆自為穆左右相乖不相通也惟其説之不同此世之議昭穆者始紛紛然可疑要之二説而斷之以古則何疑之有祭統曰凡賜爵昭為一穆為一昭與昭齒穆與穆齒武王之時文王之廟為穆故雖至襄王歷十八君矣猶謂之穆富辰有言曰管蔡郕霍魯衛毛𥅆郜雍曹滕畢原酆郇文之昭也十六國文王之子文王為穆故其子之國必謂之昭也康王之時武王之廟為昭故雖至襄王之世猶謂之昭富辰又曰邘晉應韓武之穆也四國武王之子武王為昭故其子之國必謂之穆也蓋三昭三穆左右異等左不可居於右猶右之不可居於左故助祭受爵各以昭穆序齒受氏又以王父之字故劉歆亦曰孫居王父之處正昭穆則孫常與祖代張純曰父子不並坐而孫從王父其説皆同學者能以是而考之則或者之疑於是而無疑矣宋朝元祐中陳祥道作禮書其論廟制也則曰天子七廟自虞至周所不變其論昭穆也則曰宗廟有迭毁而昭穆之位則一定而不易夫禮學廢缺久矣歷漢歷唐未甚明閲數千百年而遂大明於我宋愚於是見本朝儒學之盛焉論禮者宜有考於此羣書考索卷三十二
