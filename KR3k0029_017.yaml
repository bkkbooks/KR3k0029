body:
  text: 羣書考索卷十七宋章如愚撰正史門國史類宋朝百官公卿表熙寧元年十一月司馬光請據國史效漢書作百官公卿表以備省覽與趙彥同修至元豐四年上盡治平二年國朝會要神宗時王圭進會要表云唐有天下逾三百年制度文章可謂盛際德宗貞元間蘇冕始為唐會要四十卷其後武宗時崔氏續四十卷宋朝王溥取宣宗以後事并蘇崔所録共一百卷國家規模宏逺聲昭亡前肆我仁祖命邇臣修宋朝會要肇自建隆至慶厯四年成一百五十卷章得象上王洙編修神宗嗣恢前志命官添修十有二年始克成書續以慶厯四年止熙寧十年通舊增損成三百卷總二十一類八百五十五門其門禮樂政令之大綱儀物事為之細目上自帝后以底臣庶內而朝廷施於蠻夷有關討論顧無不載其文至簡其事致詳稽參盡在推而易行豈止便遺訓故實之求抑亦信疊矩重規之盛皇朝虞允文等撰續會要起神宗初年迄靖康之末凡六十年編百卷分二十一類六百六十六門乾道四年詔尚書左僕射陳俊卿兼提舉編修職源乾道五年汪大猷等言蔡攸所修國朝會要除將熙寧十年以前章得象王圭所修重加刪潤外其自元豐至政和止修得帝系后妃吉禮三門攸所修吉禮緣當時議論好惡不同妄有刪改以迎時好乞令本省再加刪定兼今來續修斷自神宗其五朝要會內有熙寧十年內事件件編次以續修國朝會要為名從之職源梁克家等撰中興會要先是國家會要已修至靖康二年閏五月一日承詔自建炎元年續修至乾道九年陳騤等言編類建炎以後會要至紹興三十二年六月十一日成書請以中興會要名之國朝玉牒官無定員掌修皇帝玉牒凡編年以紀帝系而載其厯數及朝廷政令之因革者為玉牒唐本宗正之職開成後始别置修玉牒官聖朝祥符中始設局置官效唐制也詔以皇宋玉牒為名六年以夏竦為修玉牒官自後置一員或二員景祐初季淑申請詔以編修院廳西閣子充修纂玉牒之所熙寧中以三班院置局後徙編修院皇帝玉牒十年一進修玉牒官並以學士典領自元豐行官制分𨽻宗正寺官六年詔宗正寺修玉牒照用日厯所文字並指定所書事令本所節録元符初陳覺乙將先帝玉牒內聖政令本寺修玉牒官抄寫封送國史院從之紹興中襲舊制始建以宰臣一人提舉修玉牒官一人以侍從兼凡宗正卿少而下悉與修纂二十九年詔玉牒所併入宗正寺更不置修玉牒官檢討官以本寺少卿及丞同領編修事詔玉牒所宰臣提舉依舊修書官一員同宗正卿丞修纂更不置檢討官二十三年詔左僕射陳康伯提舉編修玉牒玉牒格及教令并御札聖旨親筆處分并郊祀巡幸大臣拜罷親試賢良與朝廷大議論更革廢置大祥瑞災異户口增減官雖卑因事賞罰關治體者宋朝玉牒則起於太宗之至道修玉牒則掌帝籍玉牒及近族親屬昭穆之序至真宗大中祥符六年判宗正寺趙世辰等奏乞别崇懿號詔以皇宋玉牒為名其後屬籍類譜與夫宗藩慶系之録仙源積慶之圖常與玉牒為伍並修而同進九事之書則又見於紹興臣僚之請紹興十二年中請一天子親祠天地宗廟一公主下降皇子入閣一丞相除罷一天子巡狩行幸一大慶一臨軒册拜后妃封建皇子一藩國大貢一賞罰大者一雖小官事繫朝廷大體周禮春官之屬史官分職最為詳密國之大事既書於太史而言動之記又分於左右史至於奠世繫辨昭穆則又掌之以史則玉牒之始也逮唐開成李衛差官命名迄宋朝制作益重其凡則編年以紀帝系而載其厯數及朝廷政令之因革者為玉牒序其同姓之親而第其五服之疏戚者為屬籍具其官爵功罪生死及號若世者為類譜推其所自出至於子孫而列其名位者為宗藩慶系録考定其次支分派别而歸於本統者為仙源積慶圖雖檢討之官無常員自少卿丞簿外又置所以領之所以侈盛美昭謨烈而重宗廟也國朝實録國朝沿唐制有實録之史治平初以宰臣韓琦提舉修仁宗實録熙寧初以宰臣曽公亮提舉修英宗實録紹興以實録國史皆寓史館後罷遇修即置院九年以修神宗哲宗徽宗實録始置院以宰臣一員提舉修撰檢討無定員檢討以本省官或他官兼而修撰官如史館例十二年詔史館提舉諸司承受等并官吏並併歸實録院罷史館咸平中真宗以太祖實録漏落詔李沆等重修五十卷沆表上之曰前録頗亡事今之所正率由典章又增益諸傳一百四人至道三年詔李若水等撰太宗實録八十卷咸平元年書成上之乾興元年詔王欽若撰真宗實録一百五十卷天聖二年書成上之韓琦等撰仁宗實録二百卷曽公亮等撰英宗實録三十卷元祐間吕大防范祖禹等撰神宗實録二百卷紹興中謂其變亂美實外應詆誣之説命蔡卞改修之蔡京作哲宗前實録一百卷後實録九十四卷京之意以宣仁垂簾時政非出於上故分前後録蓋厚誣也髙宗紹興四年詔朱勝非等重修神宗哲宗實録勝非奏曰神宗史緣添入王安石日録哲宗史經蔡京蔡卞之手議論多不公矣國朝日厯唐貞元初韋執誼奏修撰私家紀録非是望令各撰日厯月終館中詳定從之此日厯所從起也國朝舊以宰相兼監修國史修撰直館檢討無常員掌修日厯以時政記起居注會集修撰為一代之舊典於門下省置編修院專修國史實録修纂日厯元豐中廢編修院歸史館官制行屬祕書省國史案六年詔祕書省長二毋得預著作修纂日厯事進事即繫銜以防漏泄如舊編修院法焉八年詔曽肇林希兼著作職事官兼職自此始元祐中移國史實録編修日厯以國史院為名𨽻門下省更不𨽻祕書省紹聖中詔日厯還祕書省宣和中詔罷在京修書諸局惟祕書省日厯所繫元豐國史案除注作等官專管修纂日厯之事無定員外其元豐分案編修日厯書庫官吏並依元豐法紹興初以修日厯為名又詔祕書長二通行修纂日厯三年詔左僕射吕頥浩兼提舉修國史詔修日厯令侍從官帶史館修撰餘官帶直史館檢討若著作郎闕依元豐例差郎官兼領日厯所以修國史日厯所為名四年詔修國史日厯所以史館為名依舊制置編修勘校官十年秦檜請下有司討論史館建併之弊禮部看詳依元豐舊制併歸祕書省國史案以著作郎佐郎修纂日厯增修欽宗及髙宗日厯令宰相提舉職源太平政要皇朝樞密使富弼等撰初弼請以三朝典故及諸司可用之文類聚成書使兩府遵守詔命史官校勘王洙集賢校理余靖祕閣校理孫甫集賢校理歐陽修等同修弼領焉慶厯四年書成上之分别書類起賞罰止延諫臣凡九十六門為二十卷每事之後各釋其意相類者止釋一事理明者不復釋云太祖南宫事迹至道中昭宣使王延德上太祖南宫事迹三卷命送實録院咸平元年八月李若水以所修實録八十卷上進太宗置起居注淳化五年史館修撰張泌言聖朝編年謂之日厯惟紀報狀略敘敕文至君上聖政嘉言臣下善惡莫有細書以為世範按六典故事請置起居院修左右史之職以紀録為起居注與時政記逐月送史館以修日厯上嘉之乃置院於禁中命梁周翰起居郎李宗諤掌起居舍人事其修撰注式委翰林檢討故事以聞周翰等奏時政記外自餘百司凡封拜除授沿革制置之事並令聞起居院以備編録仍令郎舍人分直崇政殿以記言動别為起居注與每月起居注先以進御後付史館從之太祖太宗真宗寶訓天聖五年十月乙酉監修國史王曽言唐史官吳兢於正史實録外録太宗與羣臣對問之語為貞觀政要與正史並行今欲采太祖太宗真宗實録日厯時政記起居注事迹不入正史者别為一書從之明年三月癸卯監修國史吕夷簡上三朝寶訓三十卷寶元二年十月詔翰林侍讀李淑赴資善堂刪整以備來春進讀至閏十二月二十七日淑乞丁度同修纂詔可仍令丁度於來年祇候進讀康定元年四月十八日淑又言臣所讀寶訓欲先讀第一卷政體聽斷事外却取第十二卷以後將邊防夷狄事先次進讀庶幾戎備邊政早得敷啓太祖太宗真宗訓鑒慶厯八年八月知制誥楊偉受詔與翰林李淑同編皇祐元年二月纂成進之凡十卷御製序太祖太宗國史真宗景德四年八月宰臣王旦監修樞密王欽若陳堯叟參政趙安仁翰林朝迥楊億等修祥符九年二月上凡帝紀六卷志五十五卷列傳五十九卷初景德三年二月命知制誥朱巽等取太祖太宗兩朝史館日厯時政記起居注行狀編次以聞詔中書察院三司檢兩朝宣敕聖旨文字進納以將修國史故也太祖太宗真宗國史天聖五年二月命宰臣王曽提舉真宗國史參政吕夷簡及樞密夏竦翰林陳堯佐同修天聖八年六月吕夷簡上新修國史于崇政殿先是太祖太宗帝紀六志五十傳五十九凡一百二十卷至是修真宗史成增紀為十志為六十傳為八十總百五十五卷太祖太宗真宗故事慶厯三年九月二十六日天章閣待制王洙右正言余靖太常博士孫甫集賢校理歐陽修同編至四年上之分别事類凡九十六門二十卷富弼總領為序序云編成一書置在兩府俾為模範三朝賞罰之權威德之本責任將帥之術升絀官吏之法息費強兵之制禦戎平冦之略寬民恤災之惠篤親立教之風御臣防患之機察納諫諍之道率編録焉三朝聖政録撰人不著名氏録太祖太宗真宗三朝政事以類相從起君道至戒貪吏凡二十門為六卷每門系之贊云祖宗英睿龜鑑皇朝吉州布衣歐陽永安撰采諸書所載起太祖至神宗雄圖逺略可為後世法程事者後各釋其意相類者不復釋凡四百八十事為十卷太宗真宗聖政記天禧五年四月輔臣集章聖皇帝聖製為三百卷乃祥符九年至道咸平時嘉言善事也又取至道元年四月訖大中祥符應中書密院時政記史館日厯起居注善美之事録為聖政王曽等領之凡一百五十卷仁宗英宗國史熙寧十年五月戊午詔修仁宗英宗兩朝正史命宰臣吳充提舉宋敏求蘇頌修王存黃履林希編修是年七月辛未上御資政殿吳充率修國史宋敏求等以仁宗英宗紀草二册進呈上服靴笏內侍集案宋敏求進讀上立聽顧問篇畢始坐太平御覽興國二年太宗閲前代書類門目紛雜遂詔翰林李昉扈蒙而下凡十四人以前代修文御覽藝文類聚文思博要及諸書參詳條次分定門目為一書八年十二月書成詔曰包羅萬象總括羣書紀厯代之興亡自我朝之編録足以資帝王之宥覽鑒古今之是非宜錫嘉名垂示後世可改為太平御覽帝每聽政日讀御覽三卷有故或闕即退之雖隆冬短景必及其數大臣請少息帝曰朕開卷有益不以為勞凡諸故事可資風教者悉記之及延見廷臣必引接談論以示勸戒景德時政記開寶七年史館修撰扈蒙請委宰臣及參政凡事經聖斷可書簡册者録付史官及命參政盧多遜記録至太宗興國八年詔中書門下應國家裁決之事及帝王宣諭之言合書史册者宜令參政李昉抄録季送史館密院委副使唯此雖有時政記之名但云送史館事件至景德元年始題云時政記故有中書令樞密院時政記册府元龜祥符六年八月十二日王欽若等上先是景德二年九月丁卯命王欽若知制誥楊億等修厯代君臣事迹凡起例類事分門皆上稟聖意以懲勸為本至是凡九年而書成目録音義各十卷詔名册府元龜御製序御覽御屏風真宗咸平中田錫屢召對言事奏曰陛下治天下以何道臣願以皇王之道治之舊有御覽御屏風但託分門事類臣請鈔略四部訓為御覽三百六十卷萬幾之暇日覽一卷又採托經史要切之言為御屏風十卷置扆坐之側則治亂興亡之事常在目矣上善其言詔史館以書借之先奏御覽三十卷御列屏風五卷自為序曰可以銘於坐隅者書於御屏風可以用於帝道者録為御覽仁宗朝修起居注仁宗因賈黯言許修起居注入侍經筵慶厯新編祖宗故事慶厯三年九月二十六日命天章閣侍講史館檢討王洪集賢校理余靖同編修至四年上之凡十卷仁宗訓典范祖禹採仁宗聖政數百事編録成書名曰仁宗訓典元祐七年進之凡六卷仁宗君臣政要皇朝祕書丞張唐英編進自天聖初終於嘉祐八年三月凡二百八十有五條分為四十卷神宗聖訓録皇朝起居舍人林虙撰起孝德迄逺夷凡一百門為二十卷名聖訓録以續五朝寶訓目録一卷續資治通鑑長編皇朝李燾撰起建隆元年訖靖康元年燾以司馬光作資治通鑑唐三百年長編范祖禹實掌之光謂祖禹曰長編毋失於繁寧失於略當時祖禹所編長編蓋六百餘卷光手刪之止八十卷故燾纂集用光義例廣記備言以待後之作者燾此書自謂非使續通鑑姑謂續通鑑長編而已其間有異同之論則並録於下而不敢削歷代聖製類宓羲八卦宓羲之作易綿終天地經以八卦虞舜南風詩舜彈五絃之琴造南風之詩曰南風之薰兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮家語漢髙祖大風歌上還過沛留置酒歌曰大風起兮雲飛揚威加海內兮歸故鄉安得猛士兮守四方武帝作芝房歌甘泉宫中産芝作芝房歌武帝作寶鼎天馬之歌得寶鼎后土祠旁馬生渥窪水中作寶鼎天馬之歌武帝白麟歌元狩元年冬十月行幸雍祠五畤獲白麟師古曰麟麕身牛尾馬足黃色圓蹄一角角端有肉作白麟之歌武帝作盛唐摐陽歌五年冬行南巡狩至於盛唐望祀虞舜于九疑登灊天柱山自潯陽浮江親射蛟江中獲之舳艫千里薄摐陽而出作盛唐摐陽之歌武帝作瓠子歌二年冬十月行幸雍祠五畤春幸緱氏遂至東萊夏四月還太山至瓠子臨決河命從臣將軍臣下皆負薪塞河隄作瓠子之歌武帝秋風辭秋風起兮白雲飛草木黃落兮鴈南歸唐太宗金鑑書宣宗夜召翰林學士令狐綯與論人間疾苦帝出金鑑書曰太宗所著也卿為我舉其要綯擲語曰至治未嘗任不肖至亂未嘗用賢用賢享天下之福任不肖罹天下之禍帝曰善朕讀此常三復乃已髙宗天訓會要顯慶二年六月上製元首前星維城股肱誡著股肱論令許敬宗著名曰天訓玄宗賜三傑詩宋璟為尚書張説為左丞相源乾曜為太子太傅同日拜有詔大官設食太常奏樂會百官尚書省東堂帝賜三傑詩自寫以賜德宗君臣針杜希全遷靈監節度使將即屯獻體要八篇砭切時病帝嘉納之賜君臣針一篇台衡宸扆銘馬燧以河中平詔書褒美遷光祿大夫兼侍中宴賜畢還太原是行也德宗賜燧宸扆台衡二銘燧至太原勒石起義堂帝為題其額以寵之魏武新書太祖自統御海內芟夷羣醜其行軍用師大較依孫吳之法而因事設竒料敵制勝變化如神自作兵書十餘萬言諸將征伐皆新書從事國朝御製類太祖應天厯序乾德元年四月太祖製建隆應天厯序太祖製定神農本草序開寶六年製重定神農本草序太宗賜進士御詩太平興國二年正月宴新及第進士吕蒙正等於開寶寺仍賜御詩二首以寵之故事禮部放榜後敕下之日醵錢於曲江為聞喜會近代多於名園佛廟亦斂鏹而為盛集至是官為供帳仍賜以詩非常例也其後淳化中亦賜詩見於賜進士針太宗聞捷奏詩興國四年太宗幸河東作聞捷奏平隆州詩五月幸城南自草賜劉繼元詔又作平晉賦閲太宗御書於龍圖閣詩景德二年四月作令從臣應制及命李宗諤作序又作龍圖贊是時既觀書又宴於延和殿東郊籍田詩太宗端拱元年正月作御製戒奔競詩太宗聽政之暇每念躁競之輩不知理道作七言詩示學士卒章云好事盡輸純與直謾勞口舌湧如泉張洎揣摩聖意上表稱謝上善之謂宰相曰洎老於文學深諭朕意此表當付史館使衆人塞奔競之源也太宗聖文神筆頌祥符六年正月應諸路轉運司官內州軍宫觀寺院名山靈迹曽經賜太宗御製詩者件榜以聞當降御製太宗聖文神筆頌刋石御製祕閣贊淳化三年詔增修祕閣八月成帝作贊賜之宰相李昉等請刻石閣下太宗賜進士修身針端拱二年親試進士陳堯叟等並賜及第上作修身針賜之勉以修身謹行稽古效官之意賜內侍針大中祥符六年上嘗作內侍針注釋賜閻承翰等大指以內懷祇悚乃可事君其或輕率必當陷刑辟而失身茍能專謹無放佚朕之志也太宗賜進士針淳化三年三月賜新及第孫何等御製針一首及賜宴於瓊林苑又賜御詩是後每宴及第皆賜御詩欹器論後述仁宗嘗出欹器以示侍臣命左右以水注之初虛以欹至中而正盈則覆上曰日中則昃月盈則虧聖人有持盈戒謹之道朕每思臨天下舍中正之道何所法乎丁度對曰臣等亦願以中正事陛下因奏太宗時嘗作此器真宗為之贊上遂製欹器論後述以示之度等奏曰聖文大旨率遵先帝聖訓父作子述此周道所以無憂而永福萬邦之道也願宣布中外使知聖心所存上曰可便以此本賜卿度等拜而受之太宗御集大中祥符五年內出新編太宗御集御書法帖總三百三十六卷示輔臣曰先帝嗜學實由天縱凡屬思必極精妙朕即位以來孜孜尋訪文詞筆札殆無遺逸四方以朕求訪所進納者多是先帝賜與以其欲自寶並却給付丁謂曰若盡收祕府則人間無本好學何所師法上曰朕復給之正為此爾王旦曰太宗以文章化人五代以來筆札無體太宗在南宫留意翰墨斷行片簡傳之於外則爭求之寶為楷法自後學者書體丕變實聖教之至也太宗遊藝集真宗祥符中取太宗御製樂譜棊圖歌詩列為遊藝集凡一百二十卷仁宗又命曽公亮復詳校之及親為後序至聖文宣王贊太宗作至聖文宣七十二子贊帝謂輔臣曰朕萬幾之暇但以經史筆硯為娛因成撰述太宗自踐祚以來多所述作雖車駕征行不廢吟詠真宗文武七條祥符七年清心奉公修德責實明察勸課革弊賜文臣修身守職公平訓習簡閲存恤威嚴賜武臣真宗政要乾興元年九月內出真宗政要十卷示輔臣蓋上於章聖記中掇事之要者纂為此書真宗正説真宗讀經史托其可以為後世法者著正説五十篇寶元二年十月上御邇英閣觀講春秋左氏傳及正説終上曰春秋所述蓋前世治亂之事正説乃先帝訓言皆足以為鑒戒者因詔翰林侍讀李淑進讀三朝寶訓李仲容讀所論規監事迹真宗御集天禧元年十一月龍學李虛已編成百二十卷目三卷召輔臣對于滋福殿以示之宸章集真宗祥符三年夏四月龍圖閣待制陳彭年準詔纂歷代帝王集凡正位十五卷閏位十卷上作序賜名宸章明良集真宗天禧二年九月兵部郎中李虛已上奉詔集羣臣所和御製詩為明良集五百卷詔賜器幣乾坤寶典真宗景德二年五月上作乾坤寶典敘以天文地理隂陽厯數之書率多舛誤乃命司天監史序等修撰掇其精要類分之成四百十七卷踰年始就上為製名及序藏於祕閣真宗北征回鑾詩真宗景德元年澶淵之役契丹來請盟十二月甲申契丹使姚東之來獻御衣食物丙戌遣左藏庫使李吉昌使聽其請盟戊子上作北征回鑾詩命近臣和甲午駕登澶州至仁宗至和二年詔真宗幸澶淵有御製親書回鑾詩存於州廨其令刻石以藏之真宗清景殿書事詩天禧二年二月作憫農天時地利稼穡省費為政薄賦牧宰恤刑安民十題共百篇皆有序召輔臣至龍圖閣示之玉宸殿觀瑞麥詩天禧三年三月作賜近臣金華殿觀麥歌真宗祥符五年六月上以諸王所歌金華殿觀麥示羣臣軫田夫吟念農歌真宗大中祥符二年謂宰臣曰朕北鄙和好邊陲無事然居安慮危未嘗敢自暇逸每為文自警置諸左右朝夕觀之因出軫田夫二吟念農歌自戒守官針以示之憫農歌祥符七年六月丙子棣州經水流民歸業者給復三年庚辰作憫農歌賜近臣和學書歌真宗天禧三年上作學書歌勸農吟賜皇太子元良述天禧三年九月二十三日丙子內出御製賜皇太子元良述六藝針六藝針見前注宗室座右銘祥符三年九月判宗正寺趙湘因對請御製文以戒宗室上作宗室坐右銘賜寧王元握以下內藏庫銘大中祥符四年九月辛未朔壬申上作內藏庫銘以陳彭年表請聖文故從之泰山銘記祥符二年正月出泰山銘記示輔臣十一月中書門下言欲依張齊賢等乞覩御製泰山銘及夫齊王周公文宣王武成等及令丁謂等於朝堂宣示百官帝曰此但紀一時事何足朝堂宣示宰臣王旦等言君父聖作臣下皆願榮觀帝固拒未許再三陳乃從之翌日皆稱謝資善堂記祥符九年二月詔元符觀皇太子就學新堂宜以資善為名因製記天禧二年正月上詣元符觀宴世出製資善堂記祥符九年張士遜請以聖製資善堂記刻石堂壁從之勤政論祥符四年真宗作勤政論裕吏辨示近臣寬財利論天禧二年七月真宗作寬財利論賜三司使李士衡祥瑞論祥符中真宗嘗著祥瑞論大指以明王雖有丕祥常用祇畏中人一覩善應即自侈大聖賢思以防邪故春秋不書其事然神祗降監亦以揚祖宗之烈當欽承而宣布之若恃休期以自肆固宜戒也論成宰相請刻石國子監從之正臣論皇王帝霸四論祥符八年四月癸丑賜宰臣御製良臣正臣忠臣姦臣權臣論并御製皇王帝霸四論資治通鑑序神宗皇帝御製曰故賜其書曰資治通鑑以著朕之志焉耳危竿諭慶厯四年出危竿論述居髙慎危之意瑞物歌祥符三年八月作龍圖閣圖書瑞物歌祫享樂舞嘉祐四年製祫享樂舞名奉天庇民述祥符三年十二月作奉天庇民述示宰相崇儒術為若難為臣不易祥符五年十一月帝以崇儒術為君難為臣不易二論示王旦等先是龍圖閣直學士陳彭年因奏對帝謂之曰儒術汙隆其應實大國家崇替何莫由斯故秦衰則經籍道息漢盛則學校興行其後命厯迭改而風教一揆有唐文物最盛朱梁而下王風浸微太祖太宗丕變弊俗崇尚斯文朕獲紹先業謹守前訓禮樂交舉儒術化行實二后垂裕之所致也又曰君之難由乎聽受臣之不易在乎忠直其或君以寬大接下臣以誠明奉上君臣之心皆歸於正直道而行至公相遇此天地之達理先王之成憲猶指諸掌孰謂難成彭年曰願躬演睿思著之篇翰頃之以二論示彭年復請示輔臣旦等因請付國子監刻石從之勤政裕吏辨為治不易論祥符七年冦凖等表請赴國子監觀太宗御製文集御書及聖製文集御書及聖製御書刻石從之注先是帝以太宗御製文集御書并帝所製勤政裕吏辨為治不易論收於國子監監官拜章乞營閣以安之又輔臣乞以聖製五篇刻石閣下至是始成故文武百官表求觀焉孝經詩祥符八年作孝經詩三章賜羣臣屬和讀十九代史詩祥符八年七月作讀十九代史詩賜近臣和製先天紀序祥符八年十月製先天紀序思政論説春秋要言天禧元年作思政論説十卷春秋要言三卷稼穡倍登詩戒酒天禧二年作稼穡倍登詩戒酒二論賜宰相三教詩天禧二年十一月作三教詩各一百首皇祐大享明堂記序皇祐三年製皇祐大享明堂記序聖祖降臨記祥符五年作聖祖降臨記新修册府元龜序祥符六年作新修册府元龜序承華要略六藝針記授時要記真宗天禧三年九月二十三日以御覽國史兩朝實録太宗御集緯術祕書經史子集及前後御集賜皇太子時召宗室宰臣以下對于清景殿觀書帝以青宫要紀事有未備因博采羣書廣為承華要略每篇著贊并述六藝針各一卷承華要略一十卷授時要記十二卷審樂要記康定元年仁宗御製寶文閣觀書御詩嘉祐七年十二月幸寶文閣為飛白書分賜從臣因出觀書御詩一首賜宰臣韓琦以下令屬和遂宴羣玉殿傳詔學士王圭為詩序刻石于閣其詳亦見於觀三聖御耆觀文鑒古圖記慶厯元年七月上命圖畫前代帝王美惡之迹可為規戒者號觀文鑒古圖上自為記召輔臣至迎陽門觀之原道辨淳熙八年作原道辨東坡集贊孝宗乾道九年賜東坡集贊奉神述祥符四年五月作奉神述以諭中外羣書考索卷十七
