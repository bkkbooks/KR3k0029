body:
  text: 羣書考索卷四十宋章如愚撰儀衛門鹵簿類秦制大駕屬車八十一乘法駕半之左右分行其車皆皂蓋赤裏木轓輜戈矛弮箙尚書御史所載最後一乘懸豹尾豹尾以前為省中漢制乘輿大駕備車千乘騎萬匹屬車八十一乘公卿奉引太僕大將軍參乘祀天於甘泉用之後漢明帝上原陵大喪並因前代為大駕用八十一乘祀天南郊則法駕用三十六乘河南尹執金吾雒陽令奉引奉車郎御史侍中參乘前驅有九斿雲罕鳳皇車闒戟車皮軒車鸞旗車後有金鉦車黃鉞車黃門鼓車黃門令校駕祀天南郊祀地明堂宗廟左省謂之小駕每出太僕奉駕中常侍小黃門副尚書主者郎令史副侍御史蘭臺令史副皆執注以督整車騎謂之護駕春秋上陵尤省於小駕直事尚書一人從晉制大駕鹵簿先象車鼓吹一部十三人中道次靜屋令駕一中道或道候二人駕一分左右次洛陽尉二人騎分左右次洛陽亭院長九人赤車駕一分三道鼓吹正二人引次洛陽令皂車駕一中道次河南中部掾中道河橋掾在左功曹史在右並駕一次河南尹駕駟戟吏六人次河南主簿駕一中道次河南主記駕一中道次司𨽻部河南從事中道都部從事居左别駕從事居右並駕一次司𨽻校尉駕三戟吏六人次司𨽻主簿駕一中道次司𨽻主記駕一中道次廷尉明法掾中道五官掾居左功曹史居右並駕一次廷尉駕駟戟吏六人次廷尉主簿主記駕一在左太僕引從如廷尉在中宗正引從如廷尉在右次太常駕駟戟中道吏六人太常外部掾居左五官掾功曹吏居右並駕一次光祿引從中道太常主記居左衛尉居右並駕一次太尉外督令史駕一中道次東西捕賊倉户等曹屬駕一列從次太尉駕駟中道太尉主簿舍人各一人祭酒二人並駕一在左右次司徒引從駕駟中道次司空引從駕駟中道三公騎令史戟各八人鼓吹各一部七人次中護軍中道駕駟鹵簿左右各二行戟楯在外弓矢在內鼓吹一部七人次步兵校尉在左長水校尉在右並駕一鹵簿左右二行戟楯在外刀楯在內鼓吹各一部七人次驍騎將軍在左遊擊將軍在右並駕一皆鹵簿左右各二行戟楯在外刀楯在內鼓吹各一部七人騎隊五在左五在右隊各五匹命中督二人分領左右各有戟吏二人麾幢揭鼓在隊前次左將軍在左前將軍在右並駕一皆鹵簿左右各二行戟楯在外刀楯在內鼓吹各一部七人次黃麾騎中道次黃門前部鼓吹左右各一部十三人駕駟八校左右各四行外大戟楯次九尺楯弓矢弩並熊渠佽飛督領之次司南車駕駟中道護駕御史騎夾左右次謁者僕射駕駟中道次御史中丞駕一中道次武賁郎將騎中道次九遊車中道武剛車夾左右並駕駟次雲罕駕駟中道次闒戟車駕駟中道長戟邪偃向後次皮軒車駕駟中道次鸞旗車中道建華車分左右並駕駟次護駕尚書郎三人都官郎中道駕部在左中兵在右並騎又有護駕尚書一人騎督攝前後無常次相風中道次司馬督在前中道左右各司馬史三人引仗左右各九尺楯弓矢弩次五時車左右有遮列騎次典兵中郎中道督攝前却無常左殿中御史右殿中監並騎次髙蓋中道左罩右罕次御史中道左右節郎各四人次華蓋中道次殿中司馬中道殿中都尉在左殿中校尉在右左右各四行細楯一行在弩內又殿中司馬一行殿中都尉一行殿中校尉一行次桐鼓中道次金根車駕六馬中道太僕大將軍參左右又各增三行為九行司馬史九人引大戟楯二行九尺楯一行刃楯一行細弩一行細迹禽一行槌斧一行刀楯一行連細楯殿中司馬都尉殿中校尉為左右十三行金根車建青斾斿十二左將軍騎右殿中將軍持鑿腦斧夾車車後衣書主職步徒六行合左右三十二行次曲華蓋中道侍中騎常侍黃門侍郎並騎分左右次黃鉞車駕一在左御麾騎在右次相風中道次中書監騎左祕書監騎右次殿中御史騎左殿中監騎右次五牛旗赤青在左黃在中白黑在右次大輦中道太官令丞在左太醫令丞在右次青立車次青安車次赤立車次赤安車次黃立車次黃安車次白立車次白安車次黑立車次黑安車合十乘並駕駟建旗十二斿如其色立車正豎旗安車邪拖之次闒豬車駕駟中道無旗衣耕根車駕駟中道赤旗十二斿熊渠督左佽飛督右次御軺車次御衣車次御書車次御藥車並駕牛中道次尚書令在左尚書僕射在右又尚書郎六人分左右並駕一又治書侍御史二人分左右又侍御史二人分左右又蘭臺令史分左右並騎次豹尾車駕一自豹尾車後而鹵簿盡矣但以神弩二十張夾道至後部鼓吹其五張神弩置一將左右各二將次輕車二十乘左右分駕次旒蘇馬六十匹次金鉞車駕三中道左右護駕尚書郎并令史並騎各一人次金鉦車駕三中道左右護駕侍御史并令史並騎各一人次黃門後部鼓吹左右各十三人次卓鼓車駕牛二乘分左右次左大鴻臚外部掾右五官掾功曹史並駕一次大鴻臚駕駟戟吏六人次大司農引從中道大鴻臚主簿主記右少府引從次三卿並騎吏四人鈴下二人執馬鞭辟車六人執方扇羽林十人朱衣次領軍將軍中道鹵簿左右各二行九尺楯在外弓矢在內鼓吹如護車次後軍將軍在左右軍將軍在右各鹵簿鼓吹如左軍前後次越騎校尉在左屯騎校尉在右各鹵簿鼓吹如步兵射聲次領護騎遊軍校尉皆騎吏四人乘馬夾道都督兵曹各一人乘馬在中騎將軍四人騎校鞉角金鼓鈴下信幡軍校並駕一功曹史主簿並騎並從傘扇幢麾各一騎鼓吹一部七騎次領護軍加大車斧五官掾騎從次騎十隊隊各五十匹將一人持幢一人執鞉一人並騎在前督戰伯長各一人並騎在後郎簿十隊隊各五十人絳袍將一人騎鞉各一人在前督戰伯長一人步在後騎皆持矟次大戟一隊九尺楯一隊刀楯一隊弓一隊弩一隊五隊隊各五十人黑袴褶將一人騎校鞉角各一人步在前督戰伯長各一人步在後金顔督將并領之其屬車因後漢制東晉屬車五乘而已加緑油幢朱絲絡青交路黃金塗五朱輪轂猶素兩箱無金錦之飾其一車又是軺車舊儀天子所乘駕六元興中屬車唯九乘苻堅敗又得偽車輦增為十二乘宋孝建中尚書令王宏議屬車起秦八十一及三十六乘並不出經典自胡廣蔡雍傳説爾又是從官所乘非常副車正數江左五乘則儉不中禮帝王文物旗旒皆十二為節今宜依禮十二乘為制後魏道武皇帝天興二年命禮官採古法制三駕鹵簿一曰大駕設五輅建太常屬車八十一乘平城令代尹司𨽻校尉丞相奉引太尉陪乘太僕御從輕車介士千乘萬騎魚麗鴈行前驅皮軒闒戟芝蓋雲罕指南後殿豹尾鳴笳唱上不作鼓吹軍戎大祠則設之二曰法駕屬車三十六乘平城令代尹太尉奉引侍中陪乘奉車都尉御巡狩小祠則設之三曰小駕屬車十二乘平城令太僕奉引常侍陪乘奉車郎御遊宴離宫則設之天賜二年初改大駕魚麗鴈行更為方陳鹵簿列步騎內外為四重列標建旌通門建五色車旗各處其方諸王導從在中騎內公在幢內侯在步矟內子在刀楯內五品朝臣夾列乘輿前兩箱官卑者先引王公侯子車旒麾蓋信幡及散官禮服一皆絳黑隋煬帝大業初復備八十一乘並加犢車紫通幰朱絲絡黃金飾駕一牛在鹵簿中單行正道後帝嫌多大駕減為三十六乘法駕宜用十二小駕除之可也唐大駕屬車十二乘大駕行幸則分前後施於鹵簿之內若大陳設則分左右施於衛內其鹵簿制具開元禮宋國初將舉郊祀以五禮草創官籍散落始命有司考制度惟得長興南郊鹵簿字圖校以今文頗有闊略違戾者翰林學士承旨陶穀為禮儀使建議鹵簿內金吾將軍乃諸衛將軍導駕及押仗舊服紫衣請依開元禮各服本色繡袍舊執仗軍士悉衣五色畫衣無有準式請以五行相生為次黑色先之青色次之赤黃白又次之又增造五輅副車服殿中輦輿備用六引本品鹵簿又增置旗名凡馬步儀仗共萬一千二百二十二人悉用禁軍舊用絹布采畫者悉以紵繡絁文代之乾德四年始作至開寶三年而畢明年郊祀始用之謂之繡衣鹵簿軍衛羽儀自是浸盛大駕鹵簿自定通禮後彌有增益禮容大備每大祀鹵簿使專掌定字圖排列儀仗使糾督之大禮使及餘使同披閲致齋日巡仗凡車輅太僕寺主之車輿傘扇御馬殿中省主之皂纛襮矟十六引駕細仗角牙門金吾主之鐘漏司天臺主之鼓吹太常鼓吹局主之器仗名物衣冠幰蓋錦繡等飾朝物法庫出焉甲弩弓箭兵器庫出焉總鹵簿大駕二萬六十一人凡法駕減太常卿司徒兵部尚書白鷺車崇德車輦五副輅進賢車明逺車又減屬車餘並三分減一鸞駕又減縣令州牧御史大夫指南車記里車鸞旗車皮軒車象輅革輅木輅耕根車羊車鉞車豹尾車小輦小輿餘並減半凡兵部黃麾仗用太常鼓吹部太僕寺金玉輅殿中省大輦奉迎其制無定然減於鸞駕凡鹵簿四等大駕法駕鸞駕黃麾仗大駕部郊祀藉田薦獻玉清昭應景靈用之法駕泰山汾隂行禮明堂大慶殿恭謝用之鸞駕朝陵迎泰山天書東封西祀廟謁太清宫奏告玉清昭應宫奉迎刻玉天書恭謝太廟皆用之黃麾仗御樓車駕親征或省方還京迎禁中天書五嶽上册建安軍迎奉聖像六朝上册皆用之法駕萬二千八十八人鸞駕舊二千人大中祥符五年閏十一月告太廟增至七千人大駕二萬六十一人六引開封令仗太常卿司徒御史大夫兵部尚書始於金吾纛矟繡衣鹵簿藝祖皇帝以上聖之姿受天眷命用肇我區夏不譓者威賓服者懷武功既成文治斯廣躬郊禋正會朝祲威盛容以次畢行惟是承五季搶攘之後鹵簿雖設蹖駮為甚易而新之兹惟其時於是制詔臣質臣昭等正其繆盩參定典式已而禮儀使臣穀奏言金吾諸衛將軍暨押仗導駕等官服皆以紫於禮未稱請按開元禮咸用繡袍至若執仗之士舊服五色畫衣先後靡倫無所準式請以黑為先而青赤黃白以次分列用協五行相生之序逮有司以儀注來上帝御便殿陳而閲之凡馬步儀仗總萬有一千二百二十有二人悉以紵絁繡文代彩畫之服揚輝絢彩丕釐舊弊亹亹三代兩漢之盛矣稽諸會要始造於乾德之四年而告備於開寶之三年越明年謁欵圓丘實始用之想夫䂍矟前驅五輅增副里以鼓記南以車指雞翹豹尾夭矯婀娜公卿執事前導後陪細仗大角壯其容幰蓋傘扇備其飾耋老幼稚族觀聚歎向也目熟乎刀兵今乃窺文物旗常之美向也耳厭乎金鼓今乃聞鍚鸞和鈴之音皇皇哉治世之巨典華夏之偉觀也臣愚不肖靡所知識然竊讀三朝寶訓而知藝祖恭儉之德出於天資衣用浣濯器御質素齋官無三服之獻織室罷纂組之工顧於羽衛乃顯設藩飾如此得無意乎蓋躬節儉者帝王之盛德也備羽衛者國家之上儀也在漢孝文殿設書囊之帷身以示朴為先及其詔令則曰鸞旗在前屬車在後儀物明盛尤可想於千載之下然則聖人所以奉巳與夫華國者固自殊轍此臣是以知藝祖之意有在也列聖繼承制作益詳曰大駕曰法駕曰鸞駕曰黃麾仗或施之躬郊或用之封祀或設之朝覲其多寡有差其先後有序揆厥所先皆自繡衣啓之貽謀垂裕永永無極肆皇帝陛下聰明文武紹復祖宗之大業偃戢干戈搜講縟儀典章制度燦然畢舉乃紹興十有三年築壇南郊寅恭天地鹵簿之制實纂乾德至於歲用癸亥則視建隆初郊之歲若合符節敻觀簡册未之攸聞蓋莫為於前無以彰異時創業之功莫繼於後無以見今日中興之治是不可以不特書也周必大記景德鹵簿二年九月上封者言國家郊祀有期仗衛中司天監十二神與行漏殿中有芳停鳳輦等舊制太重望減製稍輕詔鹵簿使王欽若與內侍同詳閲修飾十一月王欽若上三卷天聖鹵簿六年十一月翰林學士宋緩等以郊祀攝太僕卿侍玉輅上問儀物典故悉以對因命撰天聖鹵簿十卷上之其序云在太祖時易畫衣為文繡在太宗時詔詞臣侍圖飾儀衛置在中祕其名數見於令式而先後之次見於兵部其圖歷朝亦罕所損益上諭輔臣曰比以舊記因循不存故命别撰之所引典故詳備可觀乘輿常出入儀康定元年九月七日參知政事宋庠上言車駕行幸自非郊廟大禮具陳鹵簿外其常日導從惟前有駕頭擁扇繖而已其侍從及百官屬下於厮役皆雜行道中步輦之後但以親事官百許人執撾以殿謂之禁衛諸班徑騎頗與乘輿相逺而士庶觀者率隨扈從之人夾道馳走喧呼不禁非所謂旄頭先驅清道後行之説且自黃帝以神功盛德猶假師兵為營衛則防微禦變古今一體按漢魏有大駕小駕之儀至唐又分殿中諸衛黃麾赤仗名數次第各有施設國朝承五姓荒殘之弊事從簡略儀衛寡薄欲望專委一二博學近臣檢討前代儀注及鹵簿令以乘輿常時出入比之三駕諸仗斟酌儀物增嚴條禁上以示尊極下以防未然詔太常禮院與兩制詳定遂合奏諸班直禁兵步騎為禁衛仍舊數復增清道馬百匹左右並騎百六十二人文武官執政為一重親從官三百人為一重殿前指揮使二百為一重左右相對開二門臣僚起居並令中道候起居於左右門出其諸色人止令牙門旗前道傍起居不得便入禁衛也應曰天下之分愈嚴由夫天下之制愈備也愈備而愈嚴惟善反者為能制其後古之聖人其初為是君臣也非以綦貴自私而居天下以綦賤也生而羣羣而欲欲而假物以爭也其勢必有所聽於是戴吾而君之附吾而臣之蓋其不得不爾也夫既君其身而天下且臣屬乎我矣不為其分以間其易而杜其漸則僭且攘之患吾恐末如之何故居處服食之際每每特異於天下天下亦安之於其分曰必聖人而後可以食此必聖人而後可以服此必聖人而後可以居此否則皆非其宜君臣之道至是始得無廢聖人之慮蓋亦至是足矣車輅類後漢輿服志上古聖人見轉蓬始知為輪輪行可載因物知生復為之輿輿輪相乘流運罔極任重致逺天下獲其利後世聖人觀於天視斗周旋魁方杓曲以攜龍角為帝車於是乃曲其輈乘牛駕馬登險赴難周覽八極故易震乘乾謂之大壯言器莫能有上之者也自是以來世加其飾至奚仲為夏車正建其斿旐尊卑上下各有等級周室大備官有六職百工與居一焉一器而羣工致巧者車最多是故具物以時六材皆良輿方法地蓋圓象天三十幅象日月蓋弓二十八以象列星前視則聽鸞和之音傍觀則覩四時之運等威既辨貴賤有序故書曰明試以功車服以庸洎乎魏晉僭踰莫禁代有變改異制殊狀不可畢載故考其制作為車輿篇云通鑒典古史考云黃帝作車至少昊始駕牛及陶唐氏制彤車乘馬有虞氏因彤車而制鸞車夏后氏因鸞車而制鈎車俾車正奚仲建斿旐尊卑上下各有等級商人因鈎車而制大輅昔成湯用而郊祀有山車之瑞山車亦謂之桑根車似金根之色亦謂之大輅或以為木輅周人因商輅以制五輅一曰玉路鍚樊纓十有再就建太常十有二斿以祀金路鈎樊纓九就建大旗以賓同姓以封象路朱樊纓七就建大赤以朝異姓以封革路龍勒絛纓五就建大白以即戎以封四衛木路前樊鵠纓建大麾以田以封蕃國秦因金根車用金為飾玄旗皂斿以從水德復法水數駕車以六漢書應劭曰古者諸侯屬車九乘秦滅九國兼其車服於是屬車八十一乘矣漢制因秦大駕八十一乘法駕三十六乘自髙至文車騎服御無所損益至武帝天漢中始定輿服之制郊祀所乘謂之大駕又備車千乘騎萬匹舊制以金根車為最尊比周之玉路至後漢大駕則御鳳凰車以金根為副東漢上原陵用大駕八十一乘祀天南郊則法駕晉武帝始設金玉象革木五路並為法駕東晉儉不中禮副車惟設五乘宋則十二乘魏道武命禮官采古制三駕鹵簿一曰大駕設五輅建太常屬車八十一乘法駕屬車三十六乘小駕屬車十二乘十二乘起於宋王宏之議而罷於隋大業之中唐制武德著令五路屬車十乘指南黃帝作記里鼓劉裕白鷺隋鸞旗漢辟惡秦皮軒漢耕根漢安車周四望齊羊車晉貞觀中始加黃鉞晉制豹尾周制二車通為十二乘髙宗不喜乘輅每大禮則御輦玄宗以輦不中禮開元冬祀南郊乘輅禮畢騎還自是行幸郊祀皆騎於儀仗之內五輅腰輿皆陳於鹵簿而已本朝車輅輿輦多從唐舊元豐雖置局造輅而玉輅亦仍唐制蓋自唐顯慶中傳之號顯慶輅當時説者謂古五輅皆載旗謂之道德之車考工記車戟崇於殳酋矛崇於戟各四尺戟矛皆插車騎謂之兵車戰國尚武故增插四戟謂之闒戟則知德車武車固異用矣漢鹵簿前驅有鳳凰闒戟猶未施於五輅江左以來五輅乃加棨戟於車之右韜以錦繡之衣後周司輅左建旗右建闒戟方六尺而被之以黼皆戾於古請去五輅闒戟以應道德之稱而建太常於車後又言法駕之行必有共輿者蓋以承清問袁盎曰天子所與共六尺輿皆天下豪俊此漢用古制也國朝之制乘輿有太僕而無參乘請增近臣一員立車右備顧問四朝志宋朝鹵簿四等大駕法駕鸞駕黃麾仗大駕郊祀藉田薦獻玉清昭應景靈用之法駕泰山汾隂行禮明堂大慶殿恭謝用之鸞駕朝陵迎天書東封西祀奏告玉清恭謝太廟用之兵部黃麾仗御樓親征省方還京用之會要車制古者服牛乘馬引重致逺以利天下則車之作尚矣或曰黃帝作軒冕不可考也車之制象天以為蓋象地以為輿象斗以為杠轂象二十八星以為蓋弓象日月以為輪輻前軾而後户前軌而後軫旁輢而首以較下軸而御以幞對人者謂之對車如舟者謂之輈揉而相迎者謂之牙輈之曲中謂之前疾軛之上平謂之衝衡之材輿之下木皆曰任以其力任於此也轂之端與輢之下木皆曰軹以其旁止於此也軫可以名山可以名車達常者可以名部軫前橫木可以名輅此又因一材而通名之也其為車也有長轂有短轂有杼輪有侔輪有反揉有仄揉有兩輪有四輪有有輻有無輻有曲轅有直轅輦直轅有一轅有兩轅有直輿有曲輿鈎牛曲輿有廣箱有方箱有重較有單較或駕以馬或駕以牛或挽以人或飾以物或飾以漆或朴以素皆因宜以為之制稱車以為之文禮書大車牛車也牛車大則柏車中羊車小矣大車以行澤柏車以行山羊車以行宫中周禮車人為車皆掌之陳禮書引書曰大輅在賓階面綴輅在阼階面先輅在左孰之前次輅在右孰之前與巾車之名不同何也蓋周官馭玉輅者謂之大馭則玉輅謂之大輅矣綴輅金輅也以其綴於玉輅也先輅象輅也以其行道之所先也次輅革車木輅也以其次於象輅也或曰革輅兵革以即戎不陳於寢故五輅所陳只四輅薛論五路曰玉路一曰大路言其於金路為大金路一曰先路言其於象路為先象路次金路革路次象路故同謂之次路木路最後綴於諸路之末故曰綴路方其以多為貴則玉路樊纓十有二就金路九就象路七就革路五就木路三就方其以少為貴則大路繁纓一就先路三就次路五就次路七就綴路九就車輅之制尚矣有虞氏之鸞車夏后氏之鈎車商之大輅周之乘輅皆輅也孔子獨取夫商之輅何哉蓋前乎商者質而少文後乎商者華而近麗孔子獨取夫商者以其得車之中也漢金根車商之瑞車秦改曰金根漢承秦制御為乘輿所謂乘殷之輅也輪者朱班重牙二轂兩轄金薄繆龍為輿倚較文虎伏軾龍首銜軛左右吉陽筒鸞雀立衡􅏹文畫輈羽蓋華蚤建大旗十有二斿畫日月升龍駕六馬五時車安車立車亦皆如之各如方色所御駕六餘皆駕四後從為副車逸禮王度記曰天子駕六馬諸侯駕四馬大夫三士二庶人一周禮四馬為乘毛詩天子至大夫同駕四牡彭彭是也士駕二易京氏春秋公羊説皆云天子駕六許慎以為天子駕六諸侯及卿駕四大夫駕三士駕二庶人駕一史記曰秦始皇以水數制乘六馬鄭玄以為天子四馬周禮乘馬有四圍各養一馬也諸侯亦四馬顧命時諸侯皆獻乘黃朱紫亦四馬也今帝者駕六此自漢制與古異耳蔡雍表志曰以文義不著之故俗人多失其名五時副車曰五帝車駕旗曰雞翹耕根曰三蓋其比非一也通典云夏五子歌若朽索之馭六馬六馬非始於秦制但法水數相符耳五時車金根者以金為飾或云安車立車各五為五時車耕車一名三蓋車亦名芝車有三蓋其飾如金根車置􅞙音福耒耜載之天子親耕所乘也桓談謂揚雄曰君之為黃門郎居殿中數見輿輦玉蚤華芝及鳳凰三蓋之屬皆元黃五色飾以金翠羽珠絡錦繡茵席者也東京賦云介御間以剡耜而薛綜謂耜耒金也廣五寸著耒耜而載之天子車參乘帝在左御在中介處右以耒置御之右唐制耕根車八鸞青質大使車大使車立乘駕駟赤帷從車四乘二千石以下從駕之車小使車小使車不立乘蘭輿赤轂白蓋赤帷從騶騎四十人皆班輪四輻追捕考按有所勑取者之所乘也武剛車孫吳兵法云有巾有蓋謂之武剛車武剛車者為先驅又為屬車獵車周禮謂之竒車曲禮曰國君不乘竒車注云獵車也巾車氏木輅以田漢制一曰闒豬車親校獵乘之魏改名闒虎車晉一名闒戟車辟惡車秦制也桃弓葦矢所以禳祓不祥唐制駕四馬大駕出在鸞旗車後安車周制致仕之老乘之漢制乘輿金根安車立車是為德車五時車安立亦如之建大旗十二斿駕六馬餘皆駕四馬皇太子皇子公列侯皆乘之自漢以後亦為副車豹尾車周制也象君子豹變漢制大駕出屬車八十一乘法駕出屬車三十六乘最後一乘垂豹尾以前比之省中晉因之在鹵簿之末鸞旗車漢制鸞旗車編羽旄列繫幢旁胡廣曰以銅作鸞鳥於車衡上晉宋因之唐備之於大駕鹵簿皮軒車漢制以虎皮為軒唐備大駕鹵簿遊車漢制九斿車九乘大駕為先乘羊車晉制羊車一名輦數人引之隋大業亦置駕馬大如羊畫輪車晉制駕牛以采漆畫輪象車晉武帝太康中平吳後南越獻馴象詔作大車駕之載鼓吹數十人使越人騎之元正大會入庭大駕鹵簿黃鉞車晉制唐貞觀以後備於大駕鹵簿天寶改為金鉞車四望車齊四望車通幰油幢絡班漆輪轂亦曰皂輪車以加貴臣白鷺車隋一名鼓吹車上施層樓樓上有翔鸞棲焉漢緑車緑車漢皇孫車也維漢纍葉德施豐溥蟠基植業曼夀保光泰元富媪景貺有闓璣衡七星下而孕秀孫枝挺立應於休期天統之正是為世嫡命服等差則既有别緑車以乘其制維稱蓋乘輿所御金根設飾五安五立色如其方紫白罽軿車備于椒塗安車青蓋施于王子粵惟皇孫厥車以緑左右列騑駕馬有三輪輿較軾轅衡輈轄表裏玄施光彩舄奕輿服有志獨斷所述雖備於東都而是車之設制度惟舊西京盛時金敞有子假之以載庸示光寵夷考其事附見於日磾本傳彬班可覆其視軫獵小車兹為偉觀宜有銘義以侈厥制陳宗召銘武車德車武車綏旌者武車亦革輅也取其建戈刃即曰兵車取其威猛即曰武車也德車結旌者德車謂玉金象木四路不用兵故曰德也禮記正義顯慶輅本朝太僕所藏玉輅自唐顯慶中傳之至此號曰顯慶輅親郊則乘之其制度精巧行止甚安載太常與闒戟分左右以均輕重行之元豐五輅乾德五年陶穀創意造成大輦慶厯七年太僕寺作金輅玉輅元豐四年增置五輅許定所奏依周禮記里鼓車天聖五年十一月內侍盧道隆創記里鼓車獨轅雙輪箱上有兩層各安木人平執木槌車行一里下一層木人擊鼓上平輪轉一周車行十里上一層木人擊鐲一名大章車唐鹵簿中有記里鼓車指南車指南車天聖五年十一月直昭文館燕肅請造指南車云黃帝與蚩尤戰涿鹿蚩尤起大霧將士不知所之帝遂作指南車又周越裳重譯來獻使者惑失道周公賜軿車以指南其後器俱亡漢張衡魏馬均繼作其器無傳宋武平長安嘗為此車而製不精祖沖之亦復造之後魏太武帝使郭善明造彌年不就又命扶風馬嶽造垂成而為善明鴆死其法遂絶唐元和中典作金公元以是車及記里鼓上之憲宗閲於麟德殿以備法駕而五代不聞得其制者今創意成之又盧道隆上所創記里鼓車皆以其法下有司製之晉志云刻木為仙人衣羽衣立車上車雖回運而手常指南羣書考索卷四十
