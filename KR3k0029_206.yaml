body:
  text: 羣書考索别集卷十九宋章如愚撰士門科舉古者教民而賔興盖先王之世教民以徳行道義而賔興之故士能謹其言行則有得禄之道然聖人之意則以為君子亦修其在我者而已其得與不得非所計也故曰禄在其中豈真教之以是而求禄哉嗚呼三代之時先王之法行扵上者既如彼聖人之教行扵下者又如此是雖欲人材之不成風俗之不厚盖亦不可得已正使士之不賢者或不免扵外慕有司之不眀者或不足以得人然其所以相求者盖猶出扵修身謹行之意一得其人則其法固萬世不易之良法也語或問科舉始扵隋唐隋煬帝始置科舉之法彼惟豪傑特起而一天下之難也故以科舉銷天下英雄之氣唐興革隋之弊獨此不改然猶有辟舉法故唐之人物亦有可稱也後世専以詞藝取人後世専以詞藝取人而不考其言行之素使士以賢者猶不免急扵彼而緩扵此有司之良者每恨無以必得行誼才業之人而其不賢且良者則固皆以為當然而不之怪也然則人才風俗之所成就又安得不愧扵古上之人亦何重扵此而不之革哉語或問科舉奪人本心科舉累人不淺人多為此所奪但有父母在仰事俯育不得不資扵此故不可不勉爾其實甚奪人志文公語録不可使科舉之心勝士人先要分别科舉與讀書孰輕孰重若讀書上有七分志科舉上有三分猶可若科舉七分讀書三分将来必被他勝却況此志全是科舉所以到老全使不著盖不關為已也聖人教人只是為已同上當先變經論策之式今科舉之弊極矣如鄉舉里選之法此是第一義今不能行只就科舉法中區䖏且變著如今經義格子使天下士子各通五經大義一舉試春秋一舉試二禮一舉試易詩書禁懐挟出題目使冩出注疏與諸家之說而斷以已意䇿論則試以時務如禮樂兵刑之屬如此亦不為無益欲格奔競之弊則均諸州之觧額稍損太學之額太學則罷月書季攷之法皆限之以省試獨取經眀行修之人如此亦庻幾矣同上當専以經學取人常欲作一科舉法今之詩賦實為無用經義則未離於說經但變其虚浮之格如近古義直述大意遂立科取人以易詩書為一類二禮為一類春秋三𫝊為一類如子年以易詩書取人則以前三年舉天下皆理㑹此三經夘年以二禮取人則以前三年舉天下皆理㑹此二經午年以春秋三𫝊取人則以前三年舉天下皆理㑹此春秋三𫝊如易詩書稍易理㑹故先用此一類取人如是周而復始其每舉所出䇿論皆有定所如某書出論某書出䇿如天文地理樂律之類皆指定令學習而用以為題同上今日立法之弊今日學校科舉不成法上之人分眀以盜賊遇士士亦分眀以盜賊自䖏鼓譟作閙以相迫脇非盜賊而何欲治之無他只是嚴挟書𫝊義之禁不許繼燭少間自沙汰一半不是秀才底自不敢来雖無沙汰之名而有其實同前古者士有定志古者學校選舉之法始扵鄉黨而奪扵國都教之以徳行道義而興其賢者能者盖其所以居之者無異路是以士有定志而無外慕早夜孜孜惟懼徳業之不修而不憂爵禄之未至夫子所謂言寡尤行寡悔禄在其中孟子所謂修其天爵而人爵從之盖謂此也學校貢舉私議古今取士之殊夫古之人教民以徳行道藝而興其賢者能者其法備而意深矣今之為法不然其教之之詳取之之審反覆澄汰至于再三而其具不越乎無用之空言而已深求其意雖或亦将有賴扵其用然彼知但為無用之空言而便足以要吾之爵禄則又何暇復思吾之所以取彼者其意為何如哉文公建昌軍進士題名集厯代選舉之法若舜之命司徒以敷五教命典樂以教胃子皆此意也至扵成周而法始大備故其人材之盛風俗之美後世莫能及之漢室之初尚有遺法其選舉之目必以敬長上順鄉里肅政教出入不悖所聞為稱首魏晉以来雖不及古然其九品中正之法猶為近之及至隋唐遂専以文詞取士而尚徳之舉不復見矣積至扵今流弊已極其勢不可以不忘文公貢舉學校私議宋朝始専以文藝官材取士之法三代尚矣漢魏以来至扵晉唐郡國選舉公府辟召其法不同然上之所取乎下者其路博故下之所學以待問者亦各有所以而不専扵文藝之一長也至宋朝始専以進士入官雖間設科目如所謂賢良方正博學宏詞者然不亦過文藝而已夫文者士之末其在君子小人無常分士或懐負道徳而不能此與雖能而恥不屑就者國家安得而用之耶文公䇿問國朝取士非古法國朝官材取士之法進士而已雖間設科目如所謂賢良方正博學宏詞者特以疑文隠義困扵所不知如此則賢且良矣至扵博學宏詞自命而試扵禮部者則又可笑盖遲眀褁飯掲箧而坐扵省門以竢漏啓鑰而入視所命題退發箧搜之則其中古今事目次輯鱗比而亦有成章矣其平居講學専乎此甚者至扵不復讀書也進士之得人已疎間矣而所設二科者又如此然則士有懐負道藝以陸沉乎下者其勢必恥乎此而亦庸有不能者國家安得而用之耶同上鄉舉太學監漕之弊今之為法不然雖有鄉里而其取人之額不均又設太學利誘之一塗監試漕試附試詐冒之捷徑以啓其奔趍流浪之意其所以教者既不本扵徳行之實而所謂藝者又皆無用之空言至扵甚弊則其所謂空言者又皆怪妄無稽而適足以敗壊學者之心志是以人材日衰風俗日薄文公學校貢舉私議當更諸科之制欲乗時改制以漸復先王之制而善今日之俗則必如眀道先生熙寜之議然後可以大正其本而盡革其末流之弊如曰未暇則莫若且均諸州之觧額以定其志立徳行之科以厚其本罷去詞賦而分諸經子史時務之年以齊其業又使治經者必守家法命題者必依章句荅義者必通經貫史條舉衆說而斷以已意學校則遴選實有道徳之人使専為道以来實學之士裁減鮮額繆濫之恩以塞利誘之塗至扵制科詞科武舉之屬亦皆究其利病而頗更其制則有定志而無奔競之風有實行而無空言之弊有實學而無不可用之材矣同上當立徳行之科所以必立徳行之科者徳行之扵人大矣然其實則皆人性所固有人道所當為以其得之扵心故謂之徳以其行之扵身故謂之行非固有所作為増益而欲為觀徳之美也士誠知用力扵此則不惟可以修身而推之可以治人又可以及夫天下之國家文公學校貢舉私議當反不安以就吾安或以不安科舉之業請教荅曰道二仁與不仁而已二者不能兩立知其所不安則反其所不安以就吾安爾聖人千言萬語只是教人做人而已前日科舉之習盖未嘗不談孝悌忠信但用之非爾吾舉而反之扵身見扵日用則安矣文公語録不可為學業奪志問科舉之業曰程先生有言不可恐妨功惟恐奪志若一月之間十日事舉業亦有二十日修學若被他移了志則更無醫䖏矣同上不可以得失為心舉業亦不害為學前輩何常不應舉只縁今人把心不定所以有害纔以得失為心理㑹文字意思都别了同上不可以新竒立意近日讀書人少也縁科舉時文之弊纔把書讀便生立意要討新竒都不理㑹本意著實同上時文繫教化風俗向来做時文只麄疏恁地直說去意思自周足且是有氣魄近日時文屈曲纎巧少刻墮在裏面只見意思都衰塌也是教化衰風俗壊到這裏同上時文關世變消長因說科舉所取文字多是輕浮不眀白著實因嘆息云最可憂者不是說文字不好這是大闗世變東晉之末其文一切含胡是非都沒理㑹同上時文日趍巧弱時文日趨扵弱日趨於小巧将士人這些志氣都消削得盡同上所說無預扵所行専做時文底人說底都是聖賢話說且如說亷他且㑹說得好說義他也㑹說得好待做䖏只是不亷只是不義縁他将許多話只是就紙上說亷是題目上合說亷義是題目上合說義都不闗自家身已事讀書纔說要做文字使此心便錯了如時文也不出聖賢許多說話翻然出来且如到說忠信䖏他也㑹說做好只是與自身全不相干同上今日出題目暗僻之弊今人都務出暗僻難曉底題目以乗人之所不知却如何教他不杜撰同上舉業之學非古今之世父所以詔其子兄所以勉其弟師所以教其弟子弟子之所以學舎科舉之業則無為也使古人之學止扵如此則凡可以得志扵科舉斯已爾所以孜孜焉愛日不倦以至乎死而後已者果何為而然哉今之士唯不知此以為茍足以應有司之求矣則無事乎汲汲為也是以至于隋㳺而不知反終身不能有志扵學而君子以為非士之罪也使教素眀扵上而學素講于下則士者固将有以用其力而豈有不勉之患哉文公同安縣諭學文空虚無實之名自父母所以教其子弟固已使之假手程文以欺罔有司矣新學小生自為兒童時習見其父兄之誨如此因恬不以為愧而安受其空虚無實之名内有傲其父兄外有驕其閭里終身不知自力以至卒就小人之歸者未必不由此也文公補試榜諭穿鑿新竒之病科舉文字固不可廢然近年翻弄得鬼恠百出都無誠實正當意思一味穿宂旁支曲徑以為新竒最是永嘉浮偽纎巧不美尤甚而後生輩多宗師之此是今日莫大之弊向来知舉輩盖知惡之而不知識其病之所在顧反抉摘一字一句以為瑕疵使人嗤笑今欲革之莫若取三十年前渾厚純正眀白俊偉之文誦以為法此亦正人心作士氣之一事也文公荅陳膚仲馳騖纂組之工鄉里晚學見聞卑淺不過溺心扵科舉程試之習其秀異者又頗騖乎文字纂組之工而不克専其業扵聖門也是以儒風雖甚而美俗未純父子兄弟之間其不能無愧扵古者多矣文公中庸集解棄本逐末之害所諭學者之害莫大扵時文此亦捄弊之言然論其極則古文之與時文其使學者棄本逐末之害等爾但此等物如淫聲美色不敢一識其趣便使人不能忘政當以為通人之蔽不當以是為當務而切切留意也文公荅南軒前賢無怵迫之累科舉之習前賢所不免但循理安命不追時好則心地恬愉自無怵迫之累文公荅嚴居厚經義違經背義之失今之為經義者全不顧經文務自立說敢為新竒詭異之論方試官命此題固已欲其立竒說矣又其所出題目定不依經文都是斷章牽合是甚義理三十年前人猶不敢如此只因一畨省試出上天之載無聲無臭儀刑文王三句後遂成例當時人甚駭之今遂以為常矣遂使後生輩違背經㫖爭為新竒迎合主司之意長浮競薄終将若何可慮可慮王介甫三經義固非聖人意然猶使學者知所統壹不過専念本經及㸔注觧而以其本注之說為文辭主司考其工拙而定去留耳豈若今之違經背義恣為竒說而無所底止哉今之為經義者又不若為詞賦詞賦不過工扵對偶不敢如治經者之亂說也文公語録體貼而無義理今世以文取士如義若依經㫖去說道理尚得今却只是體貼就兩三句題目上說去全無義理如䇿若是著實論時務也尚得今却是虚說說得好底剗地不得同上治經而不眀扵經州縣秀才與太學秀才治周禮者不曽理㑹得周禮治禮記者不曽理㑹得禮記治周易者不曽理㑹得周易以至春秋時都恁地國家何賴焉同上春秋侮聖人之言包顯道言科舉之弊先生曰如他經尚是就文義上說最是春秋不成說話多是去求言外之意某謂此皆是侮聖人之言同上當有踐言之實通經之士固當終身踐言乃為不負所學斯言之要所以警乎學者可謂至深切矣然士之必扵通經正為講眀聖賢之訓以為終身踐履之資耳非直以分章析句為通經然後乃求踐言以實之也文公䟦胡澹庵作李承之論語序専門名家之弊其治經必専家法者天下之理固不外扵人之一心然聖賢之言則有淵奥爾雅而不可以臆斷者其制度名物行事本末又非今日之見聞所能及也故治經者必因先儒已成之說而推之借曰未必盡是亦當究其所以得失之故而後可以反求諸心而正其謬此漢之諸儒所以専門名家各守師說而不敢輕有變焉者也但守之太拘而不能精思眀辨以求真是則為病耳文公學校貢舉私議摹倣時文之病近年以来習俗茍偷學無宗主治經者不復讀其經之本文與夫先儒之傳注但取時近科舉中選之文諷誦摹倣擇取經中可為題目之句以意扭揑妄作主張眀知不是經意但取便扵行文不暇恤也盖諸經皆然而春秋為尤甚主司不惟不知其謬而反以為工而置之髙等習以成風轉相祖述慢侮聖言日以益盛名為治經而實為經學之賊號為作文實為文字之妖不可坐視而不之正也同上裁剪鬭飣之失今日治經者既無家法其穿鑿之弊亦不可勝言矣而主司命題又多為新竒以求出扵舉子之所不意盡所當斷而反連之扵所當連而反斷之大抵務欲無理可觧無說可通以觀其倉卒之問趣附離合之巧主司既以此倡之舉子亦扵此和之平居講習専務裁剪經文巧為鬭飣以求合乎主司之意其為經學賊中之賊文字妖中之妖又不但扵家法之不立而已也同上經學廢而不全況今樂經亡而禮經缺二戴之記已非正經而又廢其一焉盖經之所以為教者已不能備而治之者類皆舎其所難而就其所易僅窺其一而不及其餘則扵天下之事宜有不能盡通其理者矣諸經當兼試四書今欲以易詩書為一科而子年午年試之周禮儀禮及二戴記為一科而夘年試之春秋及三𫝊為一科而酉年試之年分皆以省試為界義各二道諸經皆兼大學論語中庸孟子義各一道則士無不通之經而皆可為當時之用矣詞賦空言無益之尤空言本非所以教人不足以得士而詩賦又空言之尤者其無益扵設教取士章章明矣然熙寜罷之而議者不以為是者非罷詩賦之不善乃専主王氏經義之不善也故元祐初議有改革而司馬温公吕申公皆不欲復其欲復之者惟劉摯為最力然不過以考校之難而為言耳是其識之卑而說之陋豈足與議先王之教學官人本意哉今當直罷無可疑者如以習之者衆未欲遽罷則限以三舉而逓損其取人之數俟其為之者少而後罷之則亦不駭扵俗而其弊可革矣同上詩賦實為無用嘗欲作一科舉之法今之詩賦實為無用經義則未離扵說經但變虚浮之格如近古義直述大意文公語録在見識讀書嘗見已前作者無書不讀而今賦有甚見識若見識稍髙讀書稍多議論髙人豈不更做得好文字同上論䇿論䇿須試以時務今科舉之弊極矣鄉舉里選之行今不能行只就科舉法中區䖏如䇿論則試以時務如禮樂兵刑之屬如此亦不為無益同上論䇿當以年分科今欲論則分諸子為四科而分年以附焉諸子則如荀楊申韓老荘之屬及宋朝諸家文字當别討論分定年數兼論扵當年史傳中出論二道䇿則諸史時務亦然諸史則左傳國語史記両漢為一科三國晉書南北史為一科新舊唐書五代史為一科通鑑為一科時務則律厯地理為一科通禮新儀為一科兵法刑統勅令為一科以次分年如程子之法䇿各二道則士無不習之史而皆可為當世之用矣同上禁對䇿諛佞之習吕申公家傳記熙寜事乃云有司發䇿問必先稱頌時政對者因大為諛詞以應之然則此風盖未逺也今亦冝為之禁使條陳所問之疑畧如韓歐諸集之為者則亦可以觀士子之實學而息其諛佞之奸心矣以上並文公學校貢舉私議羣書考索别集卷十九
