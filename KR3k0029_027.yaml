body:
  text: 羣書考索卷二十七宋章如愚撰禮門郊祀類六天郊丘配帝先儒說郊其義有二按聖證論以天體無二郊即圜丘圜丘即郊鄭氏以為天有六天丘郊各異天體秪應是一而鄭氏以為六者指其尊極清虛之體其實是一論其五時生育之功其别有五以五配一故為六天據其在上之體謂之天天為體稱因其生育之功謂之帝帝為德稱也故周禮司服云王祀昊天上帝則大裘而冕祀五帝亦如之五帝若非天何為同服大裘又春秋緯紫微宫為大帝又云北極耀魄寶又云太微宫在五帝坐星青帝靈威仰赤帝赤熛怒白帝白招拒黑帝叶光紀黃帝含樞紐是五帝與大帝六也又五帝亦稱上帝故孝經曰嚴父莫大於配天又云宗祀文王於明堂以配上帝帝若非天何得云嚴父配天也而賈逵馬融王肅等以五帝非天唯用家語之文謂太皥炎帝黃帝五人帝之屬其義非也家語季康子問於孔子曰舊聞五帝之名而不知其實孔子曰天有五行分時化育以成萬物古之王易代而改居取法五行更王終始故其為明主者而死配五行是以太皥配木炎帝配火黃帝配土少皥配金顓帝配水又王肅以郊丘是一而鄭氏以為二者鄭以為蒼璧大宗伯云蒼璧禮天蒼犢宗伯又云牲幣各隨其器之色則牲用蒼圜鍾大司樂凡樂圜鍾為宫等為祭圜丘所用以四圭有邸大宗伯四圭有邸以祀天騂犢祭法云燔柴於泰壇用騂牲及奏黃鐘等大司樂云乃奏黃鐘歌大吕舞雲門以祀天神為祭五帝及郊天所用王肅以郊特牲周之始郊日以至鄭注云郊天之月而日至魯禮也三王之郊用夏正魯以無冬至祭天於圜丘之事是以建子之月郊天示先有事也與圜丘同配以后稷鄭必以為異圜丘又以帝嚳配者鄭以周郊日以至自是魯郊故注特牲云周衰禮廢儒者見周禮盡在魯因推魯禮以言周事又知圜丘配以帝嚳者按祭法云周人禘嚳而郊稷禘嚳在郊稷之上稷卑於嚳必明禘大於郊又爾雅云禘大祭也大祭莫過於圜丘故以圜丘為禘也圜丘北郊則圜丘為大若以郊對五時之迎氣則郊為大故大傳云王者禘其祖之所自出故郊變稱禘其宗廟五年一祭比每嵗常祭為大故亦稱禘也后稷配見於周頌故思文后稷克配彼天若以嚳配圜丘詩頌不載者后稷周之近祖王業所基故配感生之帝有功於周詩人頌之嚳是周之逺祖於周無功以配逺尊天故詩無歌頌也其祭天之處冬至則祭於圜丘應從陽位當在國南其五時迎氣則在四郊故小宗伯云兆五帝於四郊鄭注春迎青帝於東郊夏迎赤帝於南郊季夏迎黃帝亦於南郊秋迎白帝於西郊冬迎黑帝於北郊其夏正祭感生之帝亦於南郊孝經緯云祭帝於南郊就陽位是也其雩祭五天帝亦於國城南其九月大享五帝則在明堂其所配之人若圜丘周人則以嚳配之祭法禘嚳是也其感生帝則以后稷配之五時迎氣及雩祭則以五方人帝配之九月大享五帝則以五人帝及文武配之以文王配五天帝則謂之祖以武王配五人帝則謂之宗皇氏云天有六天祭感生帝禮記大傳云禮不王不禘王者禘其祖之所自出以其祖配之鄭氏注云禘自由也大祭其先祖之所由生謂郊祀天也王者之先祖皆感太微五帝之精以生蒼則靈威仰赤則赤熛怒黃則含樞紐白則白招拒黑則叶光紀皆用正嵗之正月郊祭之蓋特尊焉孝經云郊祀后稷以配天配靈威仰也宗祀文王於明堂以配上帝配五帝也正義云按師說列河圖云慶都感赤龍而生堯又云堯赤精舜黃禹白湯黑文王蒼又元命包云夏白帝之子殷黑帝之子周蒼帝之子是其王者皆感太微五帝之精而生就五帝之中特祭所感生之帝是特尊焉注引后稷配天者證禘其祖之所自出以其祖配之又引文王於明堂以配上帝者證文王不特配感生之帝而配五帝矣王肅難鄭氏六天五帝感生帝之說王肅難鄭注云按易帝出乎震震東方生萬物之初故王者則之初以木德王天下非謂木精之所生五帝皆黃帝之子孫各改號易代而以五行為次焉何太微之精所生乎又郊祭鄭𤣥云祭感生之帝惟一帝耳郊特牲何得云郊之祭大報天而主日又天惟一而已何得有六又家語云季康子問五帝孔子曰天有五行分時化育以成萬物其神謂之五帝是五帝之佐也五帝可得稱天佐不得稱上天而鄭云以五帝為靈威仰之屬非也禮記正義郊祀后稷以配天宗祀文王於明堂鄭康成以為天者所感之天神如周人木德所感靈威仰也以后稷配明堂遍祭五帝以文王配祭法有虞氏禘黃帝而郊嚳則以為禘者祭昊天於圜丘郊則以為祭上帝於南郊是則圜丘南郊為兩事禘與郊為兩祭禘大於郊圜丘大於南郊昊天有成命郊祀天地也我將祀文王於明堂噫嘻春夏祈榖於上帝皆為此說又以為春祈穀即月令孟春祈穀於上帝夏祈穀即左氏龍見而雩及月令仲夏雩帝以祈穀月令誤言於仲夏雖禘太祖即祈穀之禘禘於廟者也長發大禘也即祭感帝生之禘禮不王不禘王者禘其祖之所自出皆以祭感生之帝而以祖配也凡此皆誕妄不經之甚無足取信郊祀后稷以配天宗祀文王於明堂以配上帝天如言國上帝如言其君也南郊所以祭天圜丘即南郊王者禘其祖之所出則於太祖之廟而祭其所出之帝故曰不王不禘祈穀言春夏之間祭天也其禮則亡矣月令之類皆不足信雩祭則非所以祭天也不得以祈穀為一春秋書大雩則通言祭天矣又祭法所記皆未可信也師友雜記天帝之辨周禮有言祀天有言祀昊天上帝有言五帝者言天則百神皆預言昊天上帝則統乎天者五帝則無預乎昊天上帝言上帝則五帝兼存焉周官司裘掌為大裘以共王祀天之服典瑞四圭有邸以祀天大司樂若樂六變天神皆降以冬日至致天神此總天之百神言之也大宗伯以禋祀祀昊天上帝司服大裘而冕以祀昊天上帝此指統乎天者言之也司服言祀昊天上帝祀五帝亦如之則五帝異乎昊天上帝也太宰祀五帝掌百官之誓戒祀大神祗亦如之則五帝異乎天神也掌次大旅上帝張氈按設皇邸祀五帝張大次小次則上帝異乎五帝也典瑞四圭有邸以祀天旅上帝則上帝異乎天也上帝之文既不主於天與昊天上帝又不主於五帝而典瑞旅上帝對旅言之旅者㑹而祭之之名則上帝非一帝也上帝非一帝而周禮所稱帝者昊天上帝與五帝而已則上帝及五帝可知也易曰先王以作樂崇德盛薦之上帝以配天與昊天上帝及五帝明矣孝經曰郊祀后稷以配天宗祀文王於明堂以配上帝以明堂之祀上帝其為昊天上帝可知也易曰先王以作樂崇德盛薦之上帝以配祖者天也以配考者兼五帝也合天與五帝而謂之上帝則易孝經之於周禮其義一也周禮明其祀之大小輕重故五帝之辨如此詩書之文未嘗有稱五帝而書亦未嘗有稱昊天上帝者其稱天及上帝類皆泛言之而已此固不可援之以議周禮也且周人明堂之制有金木水火土之五室也自漢以來皆於五室以祭五帝惟晉泰始及唐顯慶中嘗議除之後亦遂復則明堂之祀五帝其來逺矣鄭康成以上帝為五帝而不及天王肅以上帝為昊天上帝而不及五帝二者之說皆與禮不合不足信也昊天上帝之名歷代不同漢初曰上帝曰太一元始間曰皇天上帝魏初元間曰皇皇天帝梁曰天皇上帝惟西晉後齊後周隋唐乃曰昊天上帝而鄭氏以星經推之謂昊天上帝則天皇大帝名雖不同其實一也今之南既以昊天上帝位乎其上而壇第一等又有皇天上帝是離而兩之也宜講求以正之陳禮書五帝與昊天同稱帝而不與昊天同稱天猶諸侯與天子同稱君不與天子同稱王周官祀五帝之禮有與天同稱極其隆有與天異以致其辨故皆禋祀皆服大裘此其所以同也祀帝於圜丘兆五帝於四郊此其所以異也鄭氏之徒謂四圭之玉黃鍾大吕之樂夏至以祀感帝於南郊蒼璧之玉六變之樂冬日至禮天皇大帝在北極者於圜丘天皇大帝耀魄寶也五帝太微之帝也分郊與丘以異其祀别四帝與感帝以異其禮王肅嘗考之矣然肅合郊丘而一之則是以五帝五人帝則非天有天地則有五方有五方則有五帝月令之五人帝伏羲神農黃帝少昊顓帝而已果以是為五帝則前此其無司四時者乎古者祀五帝必配天以五人帝從以五人臣月令之五人臣春勾芒夏祝融中央后土秋蓐收冬𤣥𡨕春夏秋中央之臣皆一人耳而冬有修與熙者蓋冬於方為朔於卦為艮於器有權衡於色有青黑則有修熙宜矣司馬遷不紀少皥以黃顓頊高辛唐虞為五帝孔安國以少昊顓氏高辛唐虞為五帝其說與四時五行之理不合當以月令為正同上古郊祀禮祀天於南郊而地上之圜丘者南郊之丘也丘圓而高所以象天此所謂為高必因丘陵也祭地於北郊而澤中之方丘者北郊之丘也丘方而下所以象地此所謂為下必因川澤也泰壇南郊之壇也以燔柴泰折北郊之坎也以之瘞埋言壇則知泰折之為坎言折則知泰壇之為圜言泰壇則自然之丘也言泰折則人為之壇也祭禮必於自然之丘所以致敬燔瘞必於人為之壇所以盡宗廟之禮瘞埋於兩階之間則壇必設於圜丘之南坎必設於方丘之北矣燔柴以升煙瘞埋以逹氣則燔必於樂六變之前瘞必於樂八變之前矣先王燔瘞於郊丘其牲角繭栗其牲體全膋其羮不和其器犧尊疏布冪樿杓豆登鼎爼簠簋匏爵之類其藉蒲越槀秸其樂歌黃鍾太簇奏大吕應鍾其舞雲門咸池其鼓雷鼓靈鼓其車玉路素車其斾太常其服大裘衮冕其搢執大圭鎮圭其位則神南面王北面示北面王南面而日月從祀則日居東月居西古者郊祀大略如此而已更秦則興鄜密上下之四畤以祠五帝至漢則增之以北畤以祠五帝秦之祀天不於圜丘謂天好隂而兆於高山之下其祠地不於方丘謂地貴陽而兆於澤中之圜丘漢之祀天不於南郊而於甘泉其祀地不於北郊而於汾隂河東以至壇有八觚席有六采樂有玉女車有鸞路騂駒龍馬一切侈靡而匡衡劉向之徒邪正異同之論蜂起一時元始之間謬戾尤甚春則天地同牢於南郊冬夏則天地分祭於南郊光武兆南郊於雒陽之陽兆北郊於雒陽之隂其儀禮度數一遵元始之制而先王之禮隳廢殆盡良可悼也並同上魯郊用子月鄭注郊特牲云郊天之月而日至魯禮也三王之郊一用夏正魯以無冬至祭天於圜丘之事是以建子之月郊天祗先有事也正義曰魯之郊祭師說不同崔氏皇氏用王肅之說以魯冬至郊天至建寅之月又郊以祈穀故左傳曰啓蟄而郊又曰郊祀后稷以祈農事是二郊也若鄭康成之說則異於此魯於一郊不與天子郊天同月轉卜三正故穀梁傳云魯以十二月下辛卜正月上辛若不從則以正月下辛卜二月上辛若不從則以二月下辛卜三月上辛若不從則止故聖證論馬昭引穀梁傳以答王肅之難是魯一郊則止或用建子之月郊則特牲云始郊日以至及宣三年郊牛之口傷是也或用建寅之月則春秋左傳云郊祀后稷以祈農事是也但春秋魯禮也無建丑之月耳若杜預不信禮記不取公羊榖梁魯惟有建寅郊天及龍見而雩云鄭言始郊日以至是魯國之禮者以明堂位焉魯君孟春乘大輅載弧䪅旗十有二旒日月之章祀帝於郊配以后稷天子之禮也鄭注云孟春建子之月魯之始郊日以至帝謂蒼帝靈威仰昊天上帝魯不祭又雜記云正月日至可以有事於上帝故知冬至郊天魯禮也三王之郊一用夏正者證明天子之郊必用夏正魯既降下天子不敢郊天與周同月故用建子之月而郊天欲示在天子之先而有事也正義又云后稷惟配靈威仰不配昊天上帝三王郊天迎長日之至郊特牲云郊之祭也迎長日之至也鄭氏注云易說曰三王之郊一用夏正夏正建寅之月也此言迎長日至者建卯而晝夜分分而日長也正義云此易緯乾鑿度文明郊祭用夏正建寅之月意以二月建卯春分後日長今正月建寅郊祭通而迎此長日之將至祭卜表記曰三代明王皆事天地之神明無非卜筮之用是故不犯日月不違卜筮注云日月謂冬夏至正月及四時也正義曰冬至謂祭圜丘夏至謂祭方澤正月謂祭感生之帝及四時迎氣用四時之吉日也知冬夏及四時皆卜者按太宰云禮五帝帥執事而卜日鄭注云五帝謂四郊及明堂是四郊明堂皆有卜也太宰又云祀大神祭大祗亦如之大神則冬至祭圜丘大祗則夏至祭方澤按公羊榖梁魯郊傳云卜三正則知天子郊用夏至亦卜之故知冬夏至正月及四時皆卜日也然明堂不問卜而注太宰祀五帝卜日云四郊及明堂者廣解五帝所在其實祀明堂不卜也按周禮祀宗廟亦卜日注不言宗廟者以經云事上帝故惟祭天之時云不違者日與牲也左傳僖三十一年云禮不卜常祀而卜其牲日是有卜牲日也禮記正義啖子曰禮曰養牲必在滌三月滌養牲之宫名也凡養牲必以二牲一以祀上帝一以祀后稷帝牛有變則改卜稷牛以代之而别以他牛代之稷牛可也宋朝配享類祖宗配侑國初南郊四祭及感生帝皇地祗神州地祗凡七祭並以僖祖順祖翼祖宣祖迭配建隆四年八月詔以將郊祀有司議配座之制請冬至祀昊天夏至祭皇地祗並以僖祖配上辛祈榖孟冬祭神州以順祖配雩祀以翼祖配大享明堂以宣祖配詔恭依十有一月張昭議曰郊初天地必以考配按郊禮用正月故梁陳南郊皆以間嵗正月上辛行事祀天皇大帝於壇上配以皇考北齊圜丘三年一祭亦以正月上辛祀昊天上帝以神武升配隋冬至日祀昊天上帝於圜丘以皇考配唐貞觀初以髙祖配圜丘世祖元皇帝配感生帝髙宗嘗親祀丘澤明堂神州以髙祖太宗並配中宗即南北郊以髙祖太宗髙宗並配梁開平二年郊天以皇考配恭惟宣祖肇基王業切考歷代之禮咸以親廟升配伏請奉宣祖配享從之太宗朝七祭並以太祖宣祖更配興國三年親郊始奉太祖升侑九年扈蒙建議引孝經嚴父配天之義請以宣祖配圜丘太祖配大享是冬罷封禪親郊遂行其禮注太祖親郊以宣祖配天及太宗即位禮官以為舜郊嚳商郊𡨕周郊后稷王業因之而興也若漢髙之太公光武之南頓雖有帝父之尊而無與配天祭故自再郊並以太祖配天於禮為允及將東封詔蒙定禮儀乃奏此議時論非之淳化三年十月蘇易簡上言欲望自今祈穀神州大享以宣祖崇配圜丘北郊雩祀感生帝以太祖崇配詔恭依至道三年十一月有司言冬至圜丘孟夏雩夏至方丘請奉太宗配上辛祈穀季秋明堂奉太祖配上辛感帝孟冬神州奉太祖太宗並配詔恭依乾興元年六月太常禮院言郊祀配帝請孟春祈榖孟冬神州以太祖配孟夏雩祀冬至昊天夏至皇地示以太宗配上帝感帝以宣祖配季秋大享以真宗配皇帝親祀郊丘以太祖太宗配詔恭依景祐二年禮官言切以太祖誕受寶命付畀四海夷澤潞之畔兼淮海之昧東焚吳輿右困蜀壘湘楚閩禺請吏入朝卜年長世不闡鴻業太宗恭行天討底定太原由是愼九刑之辟藝四方之貢信賞類能重食勸分又引諸儒講道興學炳然右文與三代同風真宗乾粹日昭執競維烈翕受敷施普浸黎元云云共惟一祖二宗之烈歷造墳誥未有高焉者也其嵗時常祀則至日圜丘仲夏皇地祗配以太祖孟春祈榖夏雩冬祭神州配以太宗孟春感生帝配以宣祖季秋大享配以真宗請如典禮中書門下議如禮官所定詔恭依皇祐五年詔書令南郊且奉三聖並侑後復迭配如舊禮未幾復降詔三聖並侑為定制雖出孝思然頗違經禮乃復下兩制議王圭議如禮官所請自今南郊以太祖迭配詔恭依治平元年辛酉詔以仁宗配享明堂太常寺奠幣用成安之曲酌獻用德安之曲初禮院奏乞與兩制同議翰林學士王圭議請從周公嚴父之意以仁宗配享明堂知制誥錢公輔議曰孝莫大於嚴父嚴父莫大於配天則周公其人也以周公言之則嚴父也以成王言之則嚴祖也方是時政則周公祭則成王安在於必嚴其父哉竊謂聖宋崛起非有始封之祖也則創業之君遂為太祖矣太祖則周之后稷祭於郊者也太宗則周之文王配祭於明堂者也真宗則周之武王宗羣廟而不祧者也雖有配天之德而無配天之祭未聞成王以嚴父之故廢文王配天之祀而移於武王也仁宗則周之成王也雖有配天之業而無配天之祀亦未聞康王以嚴父之故廢文王配天之祀而移於成王也於是又詔臺諫及講讀官與兩制禮院詳定以聞御史中丞王疇議請依王圭議奉仁宗皇帝配享明堂遷真宗配享孟夏雩祀太宗皇帝依舊配享正月祈穀孟冬神州地祗餘依本朝故事此議與王圭同知諫院司馬光吕誨議以為太祖比周之后稷太宗真宗為帝者宗比周之文武然則祀真宗於明堂若止以太祖比后稷太宗比文王則宣祖真宗向皆不當在配天之列推而上之則謂明堂之祭真宗當不以太宗配先帝不當以真宗配今日不當以仁宗配祖可也臣等參稽舊典敢以前所議為便詔從之羣書考索卷二十七
