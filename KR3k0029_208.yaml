body:
  text: 羣書考索别集卷二十一宋章如愚撰兵門兵車古者兵車之制車千乗法當用十萬人而為步卒者七萬二千人然大國之賦適滿千乗茍盡用之是舉國而行也故其用之大國三軍而已三軍為車三百七十五乗三萬七千五百人其為步卒不過二萬七千人詩集𫝊兵車士卒之數千乗大國之賦也成方十里出革車一乗甲士三人左持弓右持矛中人御步卒七十二人将重車者二十五人同上車士步卒之數兵車一乗甲士三人步卒七十二人又二十五人将重車在後凡百人也同上革車輕車之制馳車千駟革車千乗馳車即兵車盖輕車也革車駕以牛盖輜重之車也每輕車七十二人三人在車上一御一持㦸一持弓此三人乃七十五人中之将盖五伍為兩兩有一長故也輕車甚疾文公兵法謙是用兵之道老子言大國以下小國則取小國小國以下大國則取大國又言抗兵相加哀者勝矣孫子曰始如䖏女敵人開户後如脫免敵不及拒大抵謙自是用兵之道只退䖏一步耳所以利用侵伐也盖自初六積到六五上六謙亦極矣自冝人人服之尚更不服則非人矣故利用侵伐也如必也臨事而懼皆是此意同上不可専泥古法㸔来許多陣法脫遇征戰亦未必用得所以張巡用兵未嘗倣古兵法不過使兵識将意将識士情盖未論臨機應變方畧不同只如地圎則須布圎陣地方則須布方陣亦豈容槩論也文公孫吴說有本原且如孫吴専說用兵也有本原如說一曰道道者與上同意可與之死可與之生有道之主将用其民先和而後造大事若使不合扵道理不和扵人神雖有必勝之法無所用之文公武侯八陣皆有用諸葛武侯七縱七擒令孟獲觀其營人分眀看見只是不可犯今之戰者只靠前列後面人更著力不得前列勝則勝前列敗則敗如八陣之法每軍皆有用䖏天衝地軸龍飛虎翼蛇鳥風雲之類各為一陣有専扵戰鬬者有専扵衝突者又有纒繞之者文公武侯善扵用兵握機文雖未必風后所作然由来須逺武侯立石扵江邉乃是水之回洑䖏所以水不能漂蕩其擇地之善立基之堅如此此其所以為善用兵也文公緩急視敵趨向用兵之要敵勢急則自家當委曲以纒繞之敵勢緩則自家當勁直以衝突之文公鄉遂之兵周人鄉遂鄼鄙之制五家為比五比為閭四閭為族五族為黨五黨為州五州為鄉五家為鄰五鄰為里四里為鄼四鄼為鄙五鄙為縣五縣為遂制田里之法也五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍此鄉遂出兵之法也故曰凡起徒役無過家一人既一家出一人則兵法宜甚多然只是擁衞王室如今禁衞相似不令征行也都鄙之法則九夫為井四井為邑四邑為丘四丘為甸然後出長轂一乗甲士三人步卒七十二人以五百一十二家而共只出七十五人則可謂甚少然有征行則發此鄼鄙之兵悉調者不用而用者不悉調此二者所以不同文公古者内外相維今州縣無兵無權先王之制内有六鄉六遂都鄙之兵外有方伯連帥之兵内外相維緩急相制文公鄉遂兵車之制天子六鄉故有六軍諸侯三鄉故有三軍所謂五家為比比即伍也五比為閭閭即兩也四閭為族族即卒也則是夫人為兵矣至扵九夫為井四井為邑四邑為丘四丘為甸甸出兵車一乗且以九夫言之中為公田只是八夫甸則五百一十二夫何其少扵鄉遂也便是難曉以某觀之鄉遂之民以衞王畿凡有征伐止用丘甸之民文公鄉遂丘甸之制六鄉一家出一人排門是兵都鄙七家而出一兵在内者役重而賦輕在外者役輕而賦重六軍只是六鄉之衆六遂不與六遂亦有軍但不可見其數侯國三軍亦只是三郊之衆大國三郊次國二郊小國一郊文公保伍當嚴戒令糾禁之法保甲之法什伍其民使之守䕶里閭覺察奸盜誠古今不易之良法也然既許其蓄藏兵仗備置金鼓則其節制階級似亦不可不嚴切見自今見行條法累降指揮但有團結教習之文初無戒令糾禁之法鄉里豪右平居挟財恃力已不可制一旦籍此尺寸之權妄以闗集教閱為名聚衆弄兵凌弱暴寡拒捍官司何所不至乞禁保甲擅闗集答子文先王比閭之法因論保伍法或曰此誠急務曰固是先王比閭保伍之法便是此法都是從這里做起所謂分數是也兵書云御衆有多寡分數是也㸔統馭幾人只是分數眀所以不亂王介甫銳意欲行保伍法以去天下坐食之兵不曽做得成文公小大相維之意某保甲草中所說縣郭四門外置隅官四人此最𦂳要盖所以防衞縣郭以制變縣有官府獄訟倉庫之屬須是四面有防衞始得一隅官須各管得十来里方可諸鄉則只置彈壓之類而不徧置隅官黙寓大小相維之意扵其間文公井田軍賦井田軍賦之制書曰天秩有禮天罰有罪固聖人因天秩而制五禮因天罰而制五刑建司馬之官設六軍之衆因井田而制軍賦地方一里為井井十為通通十為成成方十里成十為衆班志並作終字衆十為同同方百里同十為封封十為畿畿方千里地四井為邑四邑為丘丘十六井有戎馬一匹牛三頭四丘為甸六十四井有戎馬四匹兵車一乗牛十二頭甲士三人步卒七十二人干戈備具是謂司馬之法井田類說文公府衞兵漢時皆用子弟漢時宿衞皆是子弟不似今用軍卒文公府兵立而兵農分因論唐府兵之制曰兵農之分自唐府兵始盖府兵家出一人以戰以戍并分畨入衛則此一人便不復為農矣同上府衛廢而長征始自秦漢以下至六國皆未有長征兵都是調發扵民及唐府衞法壊然後方有長征兵同上皇城以武臣宦者兼掌皇城司有親兵數千人今八相貌士之屬是也以武臣二員并内侍都知二員管之宋朝只此一項今宦者掌兵而以武臣參之此又以制殿前都指揮之兵也同上唐兵盡付刺史節度唐之兵盡付與刺史節度使其他牙将之類皆由刺史節度使辟置無如今許多官屬同上唐宋朝主兵之官唐制節度兵觀察財䖏置等使即節鎮也使持節某州諸軍事兵某州刺史民即支郡也支郡𨽻扵節鎮而節鎮支郡各有衙前左右押衙管軍都頭並掌兵事又皆是土人為之其久則根勢深固反視節度有客主之勢至有誅逐其上而更代為之凡陸梁䟦扈之事因兹而有其間惟是節度得人方能率服人心歸命朝廷若論唐初兵力最盛斥地最廣乃在扵統兵者簡約而無牽制之患然自唐末大抵節鎮之患深如人之病外強中乾其勢必有以通其變而後可故太祖皇帝知其病而䟽理之扵是削其支郡以斷其臂指之勢當時至有某州某縣直𨽻京師而不屬節度者置通判以奪其政命都監監押以奪其兵立倉場庫務之官以奪其財向之所患今皆無憂矣其後又有路分鈐轄總領等員神宗時又増置三十七将離亂之後又有都統統領統制之名大抵今日之患又却在扵主兵之員多朝廷雖知其無所用姑存其名目費國家之財不可勝計又且刻剥士卒困怨於下若更不變而通之則其害未艾也要之此事但可責之郡守他亦自分眀謂之郡将若使之練習士卒脩治器甲築固城壘以為一方之守豈不隠然有備而可畏古人謂生之者衆食之者寡為之者疾用之者舒今一切反之同上禁兵國初置諸州指揮使太祖收諸鎮節度兵權置諸州指揮使大州十數員次州六七員又次州三四員毎員營兵四五百人本州自置營招兵而軍員管之每遇遷陞則宻院出宣付之用紙一大幅題其上曰宣付指揮使某却不押號而以御前之寳印之軍員得此極重有一人而得數宣者盖宫中亦有數等員級遷轉也指揮有㕔有射場只在營中升降不得出官樞宻院行下文字日宣尚書省曰劄子諸州禁軍之法廢祖宗時只有許多禁軍散在諸州謂之禁軍者乃天子所用之軍不許他役而今添得許多御前諸軍分屯了故諸州舊有禁軍皆不理㑹又如潭州縁置飛虎一軍了故都不管那禁軍與親軍同上近時三衙權重今之三衙即舊日之指揮使朱温由宣武節度使募唐疑忌他人自用其宣武指揮使為殿前指揮使管禁衛諸軍以至今日其權益重嘗見歐陽公記其為某官時殿帥之權猶輕見從官皆不接坐及再入為執政則禮數皆大異矣文公當正養兵之源宋朝養兵蠧國更無人去源頭理㑹只管從枝葉上去添兵添将太祖初定天下将諸軍分𨽻州郡特寄養爾故謂之第幾指揮謂之禁軍眀其為禁管也其将校乃衙前今所謂都知兵馬使謂之教練乃是其軍之将也若都監乃唐末監軍之遺制鈐轄都部署皆國初制也部署即今之總管今州鈐路鈐總管皆無職事但大閱事供職一兩日耳文公禁軍支遣之費添招禁軍二百人每年合用糧米五千四百石料錢八百五十四貫文省春冬衣絹一千三百五十四匹綿四千五百兩衣錢七百六十五貫委是數目浩大即無合撥窠名可以支遣乞住招軍状文公填刺軍中子弟今日州郡禁軍緩急何足恃賴正當别作措置以漸消除而悉收江上諸軍子弟填刺本軍以時練習却令分下諸州就糧以省餽運防緩急嵗時更代却還本軍則其事藝自然不敢退惰而州兵之未消者亦得以分屬増進乃為長久之計文公荅趙帥書招刺在守将得人州郡泛行招刺守将不得其人則適足以滋其賣鬻之奸而空費衣糧重傷民力又末論也至扵寄招之令則棄子弟素習之技而取浮浪無能之人尤為非計同上州縣兵飛虎軍當屬帥司荆湖南路安撫司飛虎軍元是帥臣辛棄疾剏置所費財力以鉅萬計選募既精器械亦偹經營嘗理用力至多數年以来盜賊不起蠻徭帖息一路賴之以安而棄疾去鎮之後便有指揮撥𨽻州軍司既而又有指揮撥𨽻荆鄂副都都統自此一後只許緩急聽本司節制而陞差事權並在襄陽切詳當日剏置此軍本為彈壓湖南盜賊事𨽻本路帥司本路别無頭段軍馬惟賴此軍以壮聲勢而以帥司制御此軍近在目前行移快疾察探精審事權所屬既以専一種種利便乞撥飛虎軍𨽻湖南安撫劄子文公弓級與寨兵相表裏州縣去䖏雖非要害然既有官府民居倉庫刑獄則亦不可無備故逐縣皆有尉司弓級大者百餘人小者不下數十人與營寨上軍表裏防䕶其用意亦備詳而深逺矣論郭昌増置新寨利害劄子文公罷寨兵而増弓手只於本縣立限招足闕額弓手而更扵闕外増置二十五人凑足一百人亦足以増重形勢防衞不虞而弓手繫屬本縣縣尉知縣等級相承各分素定易為拘轄比之立寨招軍利害萬萬不同矣同上古今兵制總論今之兵異扵古古者兵一而已矣今内外之兵人餘萬而别為三四又離為六七别為三四禁兵也廂兵也民兵也畨兵也離為六七者謂之兵而不知兵之一也給漕輓者皆兵也服工事者皆兵也繕阿防者皆兵也典淮河者皆兵也給國馬者皆兵也疲老而坐食者皆兵也孫洙虞周不以兵為諱治世雖未嘗好戰亦未嘗忘戰也舜當至治之時固可以鼓琴而詠南風之詩矣然典謨所述在内則眀射侯以為教養之術在外則奮武衞以為備禦之防汲汲然惟恐兵之未練固未嘗以兵為諱也武王之時固可以建櫜而奏戢戈之頌矣然司馬所掌扵春於夏則有振旅茇舎之名扵秋扵冬則有治兵大閱之法汲汲然惟恐兵之未練亦未聞其以兵為諱也東莱春秋不言敗不言戰王師扵諸侯不言敗諸侯不可敵王也扵夷狄不言戰夷狄不能抗王也不能敵不能抗理也其敵其抗王道之失也桓王伐鄭兵敗身傷而經不書敗存君臣之義立天下之防也劉康公邀戎伐之敗績扵徐吾氏而經不書戰辨華夷之分立中國之防也胡文定公古之兵雖敗而不可多殺春秋之時諸侯相并天下百戰其經傳所見謂之敗績者如城濮鄢陵之役皆不過犯其徧師而獵其㳺卒歛兵而退未有僵户百萬血流扵江河如後世之戰何也民各推其家之壮者以為兵則其勢不可得而多殺也書生議兵自荀卿始書生輕議兵自荀卿發之三至五權六術雖畧本仁義然聖人不輕議兵夾谷之㑹田常之討勇往直前無如吾夫子者至扵衛公由求之間皆深閉固拒不假辭色非沮之也詭之也卿譚之何容易耶末世乃以長嘯却師圍碁破敵揮扇請鏖戰投筆取封爵抵掌談笑横槊賦詩視聖人所甚謹邈然輕肆焉使書生讀之激昂歆羨袖書公卿之門飛奏雲文之陛莫不拊髀嘆息恨其試已之晚是則鼔之舞之荀卿為之罪人也屏山漢兵制亦近古儒者論兵卒有唐制而遺漢焉雖歐陽公之論亦曰自周襄王制壊而不復至扵府兵始一寓之扵農而蘓眀允遂斷為之言兵民之分自秦漢始噫誠然耶非邪愚聞之先儒漢兵民大畧似唐而尤近古惟唐之知不知有漢攷漢志之未審者也雖然非論者之罪也自孟堅作漢志志刑法而不志兵取古者大刑用甲兵之義而以兵附刑無害也而述之不詳使一代之制無稽焉班孟堅盖過矣秦漢以来之兵秦漢以来諸侯之患不減扵三代而御卒伍者乃如蓄虎豹圏檻一缺咆哮四出其故何也三代之兵耕而食蠶而衣故勞勞則善心生秦漢以来所謂兵者皆坐而衣食扵縣官故驕驕則無所不為老泉漢武用兵之禍漢武帝建元之間兵禍始作是時蚩尤旗出長與天等其春戻太子生自是師行五十餘年死者無數及巫蠱事起京師流血僵尸數萬太子父子皆敗班固以為太子生長扵兵與之終始東坡武帝征伐之數元光六年之間遣将軍者四元朔六年之間遣将軍者五元狩六年之間遣将軍者三漢史發揮武帝用兵之失河朔元年得河南置朔方郡則以為衞青之功而棄上谷遼陽地與匃奴則不計也元狩四年斬首八九萬則以為去病之功而士馬物故則不計也武帝肅代用兵肅代用兵非武帝比也武帝之兵生扵情則自我發之自我抑之輪臺之詔纔下而富民之封可即日見効矣唐自安史胎禍之後藩鎮不掉控制無權兩河用兵連年不觧猛虎在前不殺則噬此步豈容少却哉唐末兵強唐自肅代以来鎮兵禁旅之勢迭強而天子以萬乗之尊日伺此輩動息以為輕重平盧闗帥自朝廷擢任可也必察軍中之所欲立者而後有旌節之授襄陽謀将自九重㨂㧞可也乃因衆議之所樂推者而後有留後之除則恩威䙝矣神䇿凌暴畿甸繩之以國憲可也而芟削舉劾輒重得罪禁軍邀激宰相治之以典刑可也天子知其故無如之何則禮信虧矣宋朝之兵無強弱太祖既受命懲唐季五代之亂聚衆兵京師而邉境亦不曰無備損節度之權而藩鎮亦不曰無威周與漢唐藩鎮之兵強秦之郡縣之兵弱兵強固末大不掉兵弱故天下孤睽周與漢唐則過而秦則不及得其中者惟吾宋也太祖善御将太祖定天下亦有爪牙之将熊羆之将如韓彭者十餘人焉王審琦之屬是也以今之議者而思所以制之之術非威不可也而太祖則不然從容扵杯酒之間而盡泄其肺腑之論使之油然而動亦泰然而安釋然自放其權收其兵而盡得其節鎮者此髙皇帝之威武所不能辨而太祖談笑收之真用兵之眀驗也聖人重扵用兵文王之遣戍役周公之勞歸士皆叙其室家之情男女之思以閔之故其民恱而忘死聖人能通天下之志是以能成天下之務兵者毒民扵死者也孤人之子寡人之妻傷天地之和召水旱之災故聖王重之如不得已而行則告以歸期念其勤勞哀傷慘怛不啻在已是以治世之詩則言其君上閔恤之情亂世之詩則録其室家怨思之苦以為人情不出乎此也詩傳去浮冗則民力寛今日民貧賦重其所從来亦可知矣若不討理軍實而去其浮冗則民力决不可寛然國家蹙䖏東南恢復之勲未集所以養而固圉者常患其力之不足則兵又未可以遽減切意惟有選将吏覈兵籍可以節軍貲開廣屯田可以實軍儲練習民兵可以邉備誠能行此三者民力庻幾其可寛也孝宗朝庚子封事文公将非人則怨憤今将率皆厮役凡流到軍之日惟務裒歛刻剥希望誅求至扵招収簡閱訓習撫摩凡軍中之急務往往皆不暇及軍士既已困扵刻剥苦扵役使而其有能者又不見優異無能者反見親寵怨怒欝積無所伸訴平時既皆悍然有不服之心一旦緩急何由可恃孝宗朝庚子封事文公将得人則奮厲将得其人則軍士畏愛奮厲蒐閱以時而竄名冗食者不得容扵其間得人而久任則上下相安緩急可恃同上将帥貪而士卒貧陛下竭生靈之膏血以奉軍旅之費本非得已而為軍者顧乃未嘗得一温飽甚者採薪織屨掇拾糞壤以度朝夕其又甚者至使妻女盛塗澤倚市門以求食也怨詈謗讟悖逆絶理至有不可聞者一有緩急不知陛下何所倚仗戊申封事文公将權濫而軍政壊謝却傲使嘉奨壮圗冝若可以勵茍安之志矣而置将之權旁出閹寺軍政敗壊士卒愁怨則恐未有以待天下之變孝宗朝延和奏劄文公當募子弟之暗曉者軍中子弟亦有素習軍馬暗曉戰陣者例皆不肯就本軍投募而朝廷反為之分責州郡枉費錢物拖拽短小生疎無用之人以補軍額孝宗朝庚子封事文公統率在得其道只就這腔裏自有道理呼吸之間便可以弱為强變怯為勇振柔為剛易敗為勝直如反掌耳文公用財養兵之費今天下財用費扵養兵者十之八九一百萬貫養一萬人此以嵗計同上財用費扵養兵財用不足皆起扵養兵十分八分是養兵其他用度止在二分之中已前未有池揚江鄂之兵止謂張宣撫兵某人兵今増添許多兵合當精練禁兵汰其老弱以為廂兵同上范公招募刑法范公嘗立一軍為龍猛軍皆是招收前後作過黥配底人後来甚得其用教習諸軍弓射某在漳州初到時教習諸軍弓射等事皆無一人能之後分作三畨每月輪畨入教場挽弓及等者有賞其不及者留在只管挽射及等則止終不及則罷之兩月之間翕然都㑹射及上等者亦多後多留刺以填上額其有老弱不能者並退罷之同上聖人文武並用昔吾夫子對衞靈公以軍旅之事未之學荅孔文子以甲兵之事未之聞及親夾谷之㑹則以兵加萊人而齊侯懼費人之亂則命将士以伐之而費人比嘗曰我戰則克而冉有亦曰聖人文武並用孔子豈有真未學未聞哉特以軍旅甲兵之事非所以為訓也鄭公藝圃折衷弓矢當習扵無事曲道險阨則劒盾利仰髙将下則弓矢便是則射者固嬰城之具而其為技必習之扵無事之時然後緩急可賴而用也以蜂蟻之屯雖未能𫝊吾城而陳而吾之士固将狥我以死亡其可以不素教而用之哉射圃記文公羣書考索别集卷二十一
