body:
  text: 羣書考索别集卷二十一宋章如愚撰兵門兵車古者兵車之制車千乘法當用十萬人而為步卒者七萬二千人然大國之賦適滿千乘茍盡用之是舉國而行也故其用之大國三軍而已三軍為車三百七十五乘三萬七千五百人其為步卒不過二萬七千人詩集傳兵車士卒之數千乘大國之賦也成方十里出革車一乘甲士三人左持弓右持矛中人御步卒七十二人將重車者二十五人同上車士步卒之數兵車一乘甲士三人步卒七十二人又二十五人將重車在後凡百人也同上革車輕車之制馳車千駟革車千乘馳車即兵車蓋輕車也革車駕以牛蓋輜重之車也每輕車七十二人三人在車上一御一持戟一持弓此三人乃七十五人中之將蓋五伍為兩兩有一長故也輕車甚疾文公兵法謙是用兵之道老子言大國以下小國則取小國小國以下大國則取大國又言抗兵相加哀者勝矣孫子曰始如處女敵人開户後如脫免敵不及拒大抵謙自是用兵之道只退處一步耳所以利用侵伐也蓋自初六積到六五上六謙亦極矣自冝人人服之尚更不服則非人矣故利用侵伐也如必也臨事而懼皆是此意同上不可専泥古法看來許多陳法脫遇征戰亦未必用得所以張巡用兵未嘗倣古兵法不過使兵識將意將識士情蓋未論臨機應變方略不同只如地圎則須布圎陳地方則須布方陳亦豈容槩論也文公孫吳説有本原且如孫吳専説用兵也有本原如説一曰道道者與上同意可與之死可與之生有道之主將用其民先和而後造大事若使不合于道理不和于人神雖有必勝之法無所用之文公武侯八陳皆有用諸葛武侯七縱七擒令孟獲觀其營人分眀看見只是不可犯今之戰者只靠前列後面人更著力不得前列勝則勝前列敗則敗如八陳之法每軍皆有用處天衝地軸龍飛虎翼蛇鳥風雲之類各為一陳有専于戰鬬者有専于衝突者又有纒繞之者文公武侯善于用兵握機文雖未必風后所作然由來須逺武侯立石于江邉乃是水之回洑處所以水不能漂蕩其擇地之善立基之堅如此此其所以為善用兵也文公緩急視敵趨向用兵之要敵勢急則自家當委曲以纒繞之敵勢緩則自家當徑直以衝突之文公鄉遂之兵周人鄉遂鄼鄙之制五家為比五比為閭四閭為族五族為黨五黨為州五州為鄉五家為鄰五鄰為里四里為鄼四鄼為鄙五鄙為縣五縣為遂制田里之法也五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍此鄉遂出兵之法也故曰凡起徒役無過家一人既一家出一人則兵法宜甚多然只是擁衛王室如今禁衛相似不令征行也都鄙之法則九夫為井四井為邑四邑為丘四丘為甸然後出長轂一乘甲士三人步卒七十二人以五百一十二家而共只出七十五人則可謂甚少然有征行則發此鄼鄙之兵悉調者不用而用者不悉調此二者所以不同文公古者內外相維今州縣無兵無權先王之制內有六鄉六遂都鄙之兵外有方伯連帥之兵內外相維緩急相制文公鄉遂兵車之制天子六鄉故有六軍諸侯三鄉故有三軍所謂五家為比比即伍也五比為閭閭即兩也四閭為族族即卒也則是夫人為兵矣至于九夫為井四井為邑四邑為丘四丘為甸甸出兵車一乘且以九夫言之中為公田只是八夫甸則五百一十二夫何其少于鄉遂也便是難曉以某觀之鄉遂之民以衛王畿凡有征伐止用丘甸之民文公鄉遂丘甸之制六鄉一家出一人排門是兵都鄙七家而出一兵在內者役重而賦輕在外者役輕而賦重六軍只是六鄉之衆六遂不與六遂亦有軍但不可見其數侯國三軍亦只是三郊之衆大國三郊次國二郊小國一郊文公保伍當嚴戒令糾禁之法保甲之法什伍其民使之守護里閭覺察姦盜誠古今不易之良法也然既許其蓄藏兵仗備置金鼓則其節制階級似亦不可不嚴切見自今見行條法纍降指揮但有團結教習之文初無戒令糾禁之法鄉里豪右平居挾財恃力已不可制一旦籍此尺寸之權妄以關集教閲為名聚衆弄兵凌弱暴寡拒捍官司何所不至乞禁保甲擅關集答子文先王比閭之法因論保伍法或曰此誠急務曰固是先王比閭保伍之法便是此法都是從這里做起所謂分數是也兵書云御衆有多寡分數是也看統馭幾人只是分數眀所以不亂王介甫鋭意欲行保伍法以去天下坐食之兵不曽做得成文公小大相維之意某保甲草中所説縣郭四門外置隅官四人此最緊要蓋所以防衛縣郭以制變縣有官府獄訟倉庫之屬須是四面有防衛始得一隅官須各管得十來里方可諸鄉則只置彈壓之類而不遍置隅官默寓大小相維之意于其間文公井田軍賦井田軍賦之制書曰天秩有禮天罰有罪固聖人因天秩而制五禮因天罰而制五刑建司馬之官設六軍之衆因井田而制軍賦地方一里為井井十為通通十為成成方十里成十為衆班志並作終字衆十為同同方百里同十為封封十為畿畿方千里地四井為邑四邑為丘丘十六井有戎馬一匹牛三頭四丘為甸六十四井有戎馬四匹兵車一乘牛十二頭甲士三人步卒七十二人干戈備具是謂司馬之法井田類説文公府衛兵漢時皆用子弟漢時宿衛皆是子弟不似今用軍卒文公府兵立而兵農分因論唐府兵之制曰兵農之分自唐府兵始蓋府兵家出一人以戰以戍并分畨入衛則此一人便不復為農矣同上府衛廢而長征始自秦漢以下至六國皆未有長征兵都是調發于民及唐府衛法壞然後方有長征兵同上皇城以武臣宦者兼掌皇城司有親兵數千人今八相貌士之屬是也以武臣二員并內侍都知二員管之宋朝只此一項今宦者掌兵而以武臣參之此又以制殿前都指揮之兵也同上唐兵盡付刺史節度唐之兵盡付與刺史節度使其他牙將之類皆由刺史節度使辟置無如今許多官屬同上唐宋朝主兵之官唐制節度兵觀察財處置等使即節鎮也使持節某州諸軍事兵某州刺史民即支郡也支郡𨽻于節鎮而節鎮支郡各有衙前左右押衙管軍都頭並掌兵事又皆是土人為之其久則根勢深固反視節度有客主之勢至有誅逐其上而更代為之凡陸梁跋扈之事因兹而有其間惟是節度得人方能率服人心歸命朝廷若論唐初兵力最盛斥地最廣乃在于統兵者簡約而無牽制之患然自唐末大抵節鎮之患深如人之病外強中乾其勢必有以通其變而後可故太祖皇帝知其病而疏理之于是削其支郡以斷其臂指之勢當時至有某州某縣直𨽻京師而不屬節度者置通判以奪其政命都監監押以奪其兵立倉場庫務之官以奪其財向之所患今皆無憂矣其後又有路分鈐轄總領等員神宗時又增置三十七將離亂之後又有都統統領統制之名大抵今日之患又却在于主兵之員多朝廷雖知其無所用姑存其名目費國家之財不可勝計又且刻剝士卒困怨於下若更不變而通之則其害未艾也要之此事但可責之郡守他亦自分眀謂之郡將若使之練習士卒修治器甲築固城壘以為一方之守豈不隱然有備而可畏古人謂生之者衆食之者寡為之者疾用之者舒今一切反之同上禁兵國初置諸州指揮使太祖收諸鎮節度兵權置諸州指揮使大州十數員次州六七員又次州三四員每員營兵四五百人本州自置營招兵而軍員管之每遇遷升則密院出宣付之用紙一大幅題其上曰宣付指揮使某却不押號而以御前之寶印之軍員得此極重有一人而得數宣者蓋宫中亦有數等員級遷轉也指揮有廳有射場只在營中升降不得出官樞密院行下文字日宣尚書省曰劄子諸州禁軍之法廢祖宗時只有許多禁軍散在諸州謂之禁軍者乃天子所用之軍不許他役而今添得許多御前諸軍分屯了故諸州舊有禁軍皆不理會又如潭州緣置飛虎一軍了故都不管那禁軍與親軍同上近時三衙權重今之三衙即舊日之指揮使朱溫由宣武節度使募唐疑忌他人自用其宣武指揮使為殿前指揮使管禁衛諸軍以至今日其權益重嘗見歐陽公記其為某官時殿帥之權猶輕見從官皆不接坐及再入為執政則禮數皆大異矣文公當正養兵之源宋朝養兵蠧國更無人去源頭理會只管從枝葉上去添兵添將太祖初定天下將諸軍分𨽻州郡特寄養爾故謂之第幾指揮謂之禁軍眀其為禁管也其將校乃衙前今所謂都知兵馬使謂之教練乃是其軍之將也若都監乃唐末監軍之遺制鈐轄都部署皆國初制也部署即今之總管今州鈐路鈐總管皆無職事但大閲事供職一兩日耳文公禁軍支遣之費添招禁軍二百人每年合用糧米五千四百石料錢八百五十四貫文省春冬衣絹一千三百五十四匹綿四千五百兩衣錢七百六十五貫委是數目浩大即無合撥窠名可以支遣乞住招軍狀文公填刺軍中子弟今日州郡禁軍緩急何足恃賴正當别作措置以漸消除而悉收江上諸軍子弟填刺本軍以時練習却令分下諸州就糧以省餽運防緩急嵗時更代却還本軍則其事藝自然不敢退惰而州兵之未消者亦得以分屬增進乃為長久之計文公答趙帥書招刺在守將得人州郡泛行招刺守將不得其人則適足以滋其賣鬻之姦而空費衣糧重傷民力又末論也至于寄招之令則棄子弟素習之技而取浮浪無能之人尤為非計同上州縣兵飛虎軍當屬帥司荆湖南路安撫司飛虎軍元是帥臣辛棄疾創置所費財力以巨萬計選募既精器械亦偹經營嘗理用力至多數年以來盜賊不起蠻徭帖息一路賴之以安而棄疾去鎮之後便有指揮撥𨽻州軍司既而又有指揮撥𨽻荆鄂副都都統自此一後只許緩急聽本司節制而升差事權並在襄陽切詳當日創置此軍本為彈壓湖南盜賊事𨽻本路帥司本路别無頭段軍馬惟賴此軍以壯聲勢而以帥司制御此軍近在目前行移快疾察探精審事權所屬既以専一種種利便乞撥飛虎軍𨽻湖南安撫劄子文公弓級與寨兵相表裏州縣去處雖非要害然既有官府民居倉庫刑獄則亦不可無備故逐縣皆有尉司弓級大者百餘人小者不下數十人與營寨上軍表裏防護其用意亦備詳而深逺矣論郭昌增置新寨利害劄子文公罷寨兵而增弓手只於本縣立限招足闕額弓手而更于闕外增置二十五人湊足一百人亦足以增重形勢防衛不虞而弓手繫屬本縣縣尉知縣等級相承各分素定易為拘轄比之立寨招軍利害萬萬不同矣同上古今兵制總論今之兵異于古古者兵一而已矣今內外之兵人餘萬而别為三四又離為六七别為三四禁兵也廂兵也民兵也畨兵也離為六七者謂之兵而不知兵之一也給漕挽者皆兵也服工事者皆兵也繕阿防者皆兵也典淮河者皆兵也給國馬者皆兵也疲老而坐食者皆兵也孫洙虞周不以兵為諱治世雖未嘗好戰亦未嘗忘戰也舜當至治之時固可以鼓琴而詠南風之詩矣然典謨所述在內則眀射侯以為教養之術在外則奮武衛以為備禦之防汲汲然惟恐兵之未練固未嘗以兵為諱也武王之時固可以建櫜而奏戢戈之頌矣然司馬所掌于春於夏則有振旅茇舍之名于秋于冬則有治兵大閲之法汲汲然惟恐兵之未練亦未聞其以兵為諱也東萊春秋不言敗不言戰王師于諸侯不言敗諸侯不可敵王也于夷狄不言戰夷狄不能抗王也不能敵不能抗理也其敵其抗王道之失也桓王伐鄭兵敗身傷而經不書敗存君臣之義立天下之防也劉康公邀戎伐之敗績于徐吾氏而經不書戰辨華夷之分立中國之防也胡文定公古之兵雖敗而不可多殺春秋之時諸侯相并天下百戰其經傳所見謂之敗績者如城濮鄢陵之役皆不過犯其遍師而獵其遊卒斂兵而退未有僵户百萬血流于江河如後世之戰何也民各推其家之壯者以為兵則其勢不可得而多殺也書生議兵自荀卿始書生輕議兵自荀卿發之三至五權六術雖略本仁義然聖人不輕議兵夾谷之會田常之討勇往直前無如吾夫子者至于衛公由求之間皆深閉固拒不假辭色非沮之也詭之也卿談之何容易耶末世乃以長嘯却師圍碁破敵揮扇請鏖戰投筆取封爵抵掌談笑橫槊賦詩視聖人所甚謹邈然輕肆焉使書生讀之激昂歆羡袖書公卿之門飛奏雲文之陛莫不拊髀嘆息恨其試已之晚是則鼓之舞之荀卿為之罪人也屏山漢兵制亦近古儒者論兵卒有唐制而遺漢焉雖歐陽公之論亦曰自周襄王制壞而不復至于府兵始一寓之于農而蘇眀允遂斷為之言兵民之分自秦漢始噫誠然耶非邪愚聞之先儒漢兵民大略似唐而尤近古惟唐之知不知有漢考漢志之未審者也雖然非論者之罪也自孟堅作漢志志刑法而不志兵取古者大刑用甲兵之義而以兵附刑無害也而述之不詳使一代之制無稽焉班孟堅蓋過矣秦漢以來之兵秦漢以來諸侯之患不減于三代而御卒伍者乃如蓄虎豹圈檻一缺咆哮四出其故何也三代之兵耕而食蠶而衣故勞勞則善心生秦漢以來所謂兵者皆坐而衣食于縣官故驕驕則無所不為老泉漢武用兵之禍漢武帝建元之間兵禍始作是時蚩尤旗出長與天等其春戻太子生自是師行五十餘年死者無數及巫蠱事起京師流血僵尸數萬太子父子皆敗班固以為太子生長于兵與之終始東坡武帝征伐之數元光六年之間遣將軍者四元朔六年之間遣將軍者五元狩六年之間遣將軍者三漢史發揮武帝用兵之失河朔元年得河南置朔方郡則以為衛青之功而棄上谷遼陽地與丐奴則不計也元狩四年斬首八九萬則以為去病之功而士馬物故則不計也武帝肅代用兵肅代用兵非武帝比也武帝之兵生于情則自我發之自我抑之輪臺之詔才下而富民之封可即日見效矣唐自安史胎禍之後藩鎮不掉控制無權兩河用兵連年不解猛虎在前不殺則噬此步豈容少却哉唐末兵強唐自肅代以來鎮兵禁旅之勢迭強而天子以萬乘之尊日伺此輩動息以為輕重平盧關帥自朝廷擢任可也必察軍中之所欲立者而後有旌節之授襄陽謀將自九重㨂拔可也乃因衆議之所樂推者而後有留後之除則恩威褻矣神䇿凌暴畿甸繩之以國憲可也而芟削舉劾輒重得罪禁軍邀激宰相治之以典刑可也天子知其故無如之何則禮信虧矣宋朝之兵無強弱太祖既受命懲唐季五代之亂聚衆兵京師而邉境亦不曰無備損節度之權而藩鎮亦不曰無威周與漢唐藩鎮之兵強秦之郡縣之兵弱兵強固末大不掉兵弱故天下孤睽周與漢唐則過而秦則不及得其中者惟吾宋也太祖善御將太祖定天下亦有爪牙之將熊羆之將如韓彭者十餘人焉王審琦之屬是也以今之議者而思所以制之之術非威不可也而太祖則不然從容于杯酒之間而盡泄其肺腑之論使之油然而動亦泰然而安釋然自放其權收其兵而盡得其節鎮者此髙皇帝之威武所不能辨而太祖談笑收之真用兵之眀驗也聖人重于用兵文王之遣戍役周公之勞歸士皆敘其室家之情男女之思以閔之故其民恱而忘死聖人能通天下之志是以能成天下之務兵者毒民于死者也孤人之子寡人之妻傷天地之和召水旱之災故聖王重之如不得已而行則告以歸期念其勤勞哀傷慘怛不啻在已是以治世之詩則言其君上閔恤之情亂世之詩則録其室家怨思之苦以為人情不出乎此也詩傳去浮冗則民力寬今日民貧賦重其所從來亦可知矣若不討理軍實而去其浮冗則民力決不可寬然國家蹙處東南恢復之勳未集所以養而固圉者常患其力之不足則兵又未可以遽減切意惟有選將吏核兵籍可以節軍資開廣屯田可以實軍儲練習民兵可以邉備誠能行此三者民力庶幾其可寬也孝宗朝庚子封事文公將非人則怨憤今將率皆厮役凡流到軍之日惟務裒斂刻剝希望誅求至于招收簡閲訓習撫摩凡軍中之急務往往皆不暇及軍士既已困于刻剝苦于役使而其有能者又不見優異無能者反見親寵怨怒鬱積無所伸訴平時既皆悍然有不服之心一旦緩急何由可恃孝宗朝庚子封事文公將得人則奮厲將得其人則軍士畏愛奮厲搜閲以時而竄名冗食者不得容于其間得人而久任則上下相安緩急可恃同上將帥貪而士卒貧陛下竭生靈之膏血以奉軍旅之費本非得已而為軍者顧乃未嘗得一溫飽甚者採薪織屨掇拾糞壤以度朝夕其又甚者至使妻女盛塗澤倚市門以求食也怨詈謗讟悖逆絶理至有不可聞者一有緩急不知陛下何所倚仗戊申封事文公將權濫而軍政壞謝却傲使嘉奬壯圗冝若可以勵茍安之志矣而置將之權旁出閹寺軍政敗壞士卒愁怨則恐未有以待天下之變孝宗朝延和奏劄文公當募子弟之暗曉者軍中子弟亦有素習軍馬暗曉戰陳者例皆不肯就本軍投募而朝廷反為之分責州郡枉費錢物拖拽短小生疏無用之人以補軍額孝宗朝庚子封事文公統率在得其道只就這腔裏自有道理呼吸之間便可以弱為強變怯為勇振柔為剛易敗為勝直如反掌耳文公用財養兵之費今天下財用費于養兵者十之八九一百萬貫養一萬人此以嵗計同上財用費于養兵財用不足皆起于養兵十分八分是養兵其他用度止在二分之中已前未有池揚江鄂之兵止謂張宣撫兵某人兵今增添許多兵合當精練禁兵汰其老弱以為廂兵同上范公招募刑法范公嘗立一軍為龍猛軍皆是招收前後作過黥配底人後來甚得其用教習諸軍弓射某在漳州初到時教習諸軍弓射等事皆無一人能之後分作三畨每月輪畨入教場挽弓及等者有賞其不及者留在只管挽射及等則止終不及則罷之兩月之間翕然都會射及上等者亦多後多留刺以填上額其有老弱不能者並退罷之同上聖人文武並用昔吾夫子對衛靈公以軍旅之事未之學答孔文子以甲兵之事未之聞及親夾谷之會則以兵加萊人而齊侯懼費人之亂則命將士以伐之而費人比嘗曰我戰則克而冉有亦曰聖人文武並用孔子豈有真未學未聞哉特以軍旅甲兵之事非所以為訓也鄭公藝圃折衷弓矢當習于無事曲道險厄則劒盾利仰髙將下則弓矢便是則射者固嬰城之具而其為技必習之于無事之時然後緩急可賴而用也以蜂蟻之屯雖未能傳吾城而陳而吾之士固將徇我以死亡其可以不素教而用之哉射圃記文公羣書考索别集卷二十一
