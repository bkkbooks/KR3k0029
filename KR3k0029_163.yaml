body:
  text: 羣書考索續集卷三十二宋章如愚編官制門唐宰相唐宰相下行有司事他官上任宰相之職唐以中書令尚書僕射門下侍中為三省官長蓋漢時宦官䙝臣之職而以命宰此儒者所以譏也然此特名之不正爾實亦無害而其大患乃在於職掌太煩而寄任者不專蓋三代之際天子所與大臣致力於官府都鄙邦國之治者莫不近者致其詳逺者致其略卑者治其冗尊者治其要故宰相常居其逸而天子至於無為自封建之不立而人主所自治者寖至一命之士皆自朝授而人主所以為治者益勤然而詳略冗要之區茍有統理庶幾近古亦可言治今太宗既為尚書六司又有九寺四監釐掌庶務而以宰相總之夫豈不可乃以宰相下行有司之事又以他官上任宰相之職杜如晦既攝吏部又監東宫兵馬魏徴戴胄岑文本張亮褚遂良之徒皆自下位參預朝政或專典機密然則豈有一定之統哉終唐之世宰相無常職亦無常員至守本官為之而有守如故判如故之目坐政事堂而分裂本司事以自便或至數十人同時為之又帥臣為之謂之外宰相其不取法非一端槩此非太宗貽謀之過歟夫太宗但能責房杜日閲訟牒為非宜不知下兼他職已失其宜房杜但既遜諫臣直為得大體不知下行選部參掌考功監修國史兼領學官皆非體也當是時陳師合上拔士論謂一人不可總衆職而太宗斥之嶺表史蓋以此稱太宗能柄任大臣不知師合所言要有至理且謂之宰相自然無所不總何煩又兼他職然後謂之柄任耶師合之論非以輕宰相正以重宰相也時既以貽譴史官又以歸曲宜其論之不𫝊也嗟夫真知宰相之體者太宗房杜猶有愧下此又何言焉姚元崇三為宰相皆兼兵部牛僧孺前後作鎮皆佩相印刻之銘志書之史冊以為美談豈知其為當世弊政也哉宰相合諫諍兼用久任古者諫無常員位乎朝皆可有言而况宰相豈無言責故伊傅周召皆有訓誥著於詩書不可誣也唐太宗常責宰相全無諫諍若但書敕行文書人誰不堪此為得所以委任大臣之道其時魏徴位宰相號稱兼善諫不聞以是為侵官也李泌言臣衰老位宰相以諫而誅分也陸贄言姜公輔官諫議職宰相獻替固其職分李渤以蕭俯段文昌不諫驪山之幸書之下考李絳久不諫憲宗輒詰所以然然則唐之賢君未嘗不以諫諍責宰相唐之賢臣未嘗不以諫諍為宰相之責惟李德裕著命乃言天子有爭臣七人非宰相之謂也且宰相無不總天下之事皆得平章何獨諫諍而不可歟且其位尊地親地親則其察之也微位尊則其接之也重故以宰相而論諫當得之於過失未彰之前而有欵曲必從之勢雖唐制諫官别有員數若其事涉利害亦容宰相執諍何獨不可而謂之非職乎且唐宰相分任他職多矣不以是為侵官獨於諫諍致辨焉茲豈為知所輕重哉然德裕亦稱名相非茍為容悅者不知何為獨建此議論其與武宗言開元初相率三考輒罷姚宋不是過惟李林甫兼權乃十九年以為亟進退宰相為治之本政出二三三公論道經邦燮理隂陽故不以一職名官太尉掌武蓋古者大司馬之職也司徒主民司空主土皆六卿之任非三公之官也自漢以來失之矣唐不能革正而復因之是以官名之紊莫甚於唐且既有太尉司徒司空而又有尚書省是政出於二也既有尚書省而又有九寺是政出於三也夫天地之有四時百官之有六職天下萬事盡備於此如網之在綱裘之挈領雖百世不可易也人君如欲稽古以正名茍舍周官臣未見其可也唐三省六部尚書御史相統之制唐有三省六部尚書之屬也則以中書省中書令六員分押之考功郎又吏部尚書之屬也則又以門下省給事中中書舍人涖之此三省之相統也至於六部又自相經緯屯田郎中掌公廨田而以一品涖之工部之屬也掌歲計所出而支調之户部之屬也至於㑹期賦斂俸祿公廨則以司士之屬官比部郎中掌之此六部之相統也御史臺之屬有三院一曰臺院二曰殿院三曰察院內外百官之罪惡皆由糾正如臺院之有四臺分𨽻諸司察院之有六察分察諸部夫官以糾彈為職宜其權更重也然糾舉不當則左僕射左右丞專掌劾其過失是尚書省御史臺又相統也房𤣥齡為相無跡可尋中庸曰德輶如毛毛猶有倫上天之載無聲無臭至矣蒸民之詩所以歎美仲山甫之德者無所不備雖足以為中興之碩輔然所謂毛猶有倫者也房𤣥齡輔相太宗以成貞觀之治而後世觀之無迹可尋此則近於無聲無臭之至矣是故漢之文景紀無可書之事而為西都之仁君唐之房杜傳無可載之功而為貞觀之賢相林少頴唐史論唐言良相必曰房杜不及魏徵魏徴所遭之時所遇之主與房杜並而當世語良相必曰房杜而徴獨貶焉何哉蓋房杜在髙祖時止為文學館學士至太宗即位後方為相雖曰與魏徴同時然房杜為相時徴方為諫議大夫房杜聲名已播功業已成徴實與帝共守成耳天下後世首言房杜於徴何愧耶唐武后用相何其多宰相之職無常員當其人才之多則如舜之用十六相而不多當其人才之少則如伊尹獨任天下之重而不為少蓋惟其人而不計其多寡之如何此所以任之之重責之之深而無失人之患也唐髙宗之世既有魏知溫之為宰相矣又有郭待舉岑長倩郭元一魏元同之徒以四品而同平章事豈其才之過人足以並列於政事如舜之用十六相哉此皆出於武后之意將以分宰相之權而成篡奪之謀耳林少穎唐史斷狄仁傑薦張柬之可為相甚矣狄仁傑之薦張柬之有似於蕭何之薦韓信也蕭何謂髙祖曰王必欲長王漢中無所事信必欲爭天下非信無可與計事者王曰吾以為將何曰雖為將信不留乃以為大將蓋信之才惟為大將然後可不為大將則未足以盡其才也狄仁傑為武后求相曰文學醖藉則蘇味道固其選必欲卓犖竒才則張柬之雖老宰相材也及武后擢為洛州司馬而謂仁傑曰已遷矣對曰臣所薦者可為宰相非司馬也久之卒用為相蓋柬之之材惟為宰相然後可不為宰相則亦未足以盡其材也狄仁傑姚元崇薦張柬之可為相觀近臣以其所為主觀逺臣以其所主張柬之沉厚有謀能斷大事武氏之禍賴之以平而其薦之者前則有狄仁傑後則有姚元崇欲知姚元崇狄仁傑之賢觀之張柬之是謂觀近臣以其所為主欲知張柬之之賢觀之狄仁傑姚元崇是謂觀逺臣以其所主同上明皇相李林甫故召亂衛相蘧伯玉簡子按兵明皇相李林甫楊國忠祿山知天下可取是知天下安危係一相得其人則有無名之功不怒之威折衝於千里非其人則蓄無形之怨産不測之憂人主之於用相可不戒哉崔正言婆娑文明皇不善用宋璟韓休張九齡甚矣直臣之難用也開元中宋璟已罷相明皇始開邊封太山用宇文融行聚斂一切之計天下於是失治平之實韓休入相始守正不阿宫中宴樂及後苑遊獵小有過差諫疏輒至上以用休為社稷計又言吾雖瘠天下必肥又言蕭嵩每事常順㫖既退吾寢不安休常力爭既退吾安寢夫豈不知休者休相止八月一罷而守工部𤣥宗明知休可以肥天下利社稷可以使之安寢猶不能使之期歲安也正直之難用也如是哉開元賢相可以繩愆糾繆感動君心者惟休與璟張九齡三人而已使三人相繼在位而不遽去唐豈至中僨然璟在位四年九齡三年休七月及明皇西狩獨遣祭九齡猶以賣直取名尤璟正直之難用如是哉明皇欲相張嘉貞而忘其名宋璟等罷相帝欲用張嘉貞而忘其名夜詔中書侍郎韋抗曰朕常記其風操姓張而復名今為北方大將卿為我思之抗曰非張齊丘乎使作詔夜且半因閲大臣表疏舉一則張嘉貞所獻遂得其名嗚呼明皇嘗擇真卿為御史而終不識真卿之面明皇將拜張嘉貞為相而至忘嘉貞之名此二事正相類則知明皇太平日久心術為聲色蠱壞其荒謬至於如此然則天下胡為而不亂哉明皇之臣以鯁直而相者凡三人明皇之臣以鯁直而位宰相者三人曰宋璟曰張九齡曰韓休是也然宋璟以鯁直而位宰相明皇任之克終韓休以鯁直而位宰相明皇任之克終至於張九齡亦以鯁直而位宰相明皇乃任之不終卒以牛仙客代之何耶且明皇既知有宋璟韓休則亦知有張九齡矣何為待前二人之厚而獨於九齡之薄也此無他明皇於即位之始鋭意求治當此之時知有天下不知有一已此宋璟韓休皆以鯁直任而任之皆能克終天寶後侈心生矣知有一已而不知有天下此張九齡之骨鯁雖不減於二人而明皇信用之誠不如二人也同上明皇重姚宋而輕林甫然寵任林甫過於姚宋魏鄭公曰重君子也敬而逺之輕小人也狎而近之近之莫見其非逺之莫見其是則不待間而疏莫見其非則有時而昵斯言可謂合夫君子小人之情狀矣明皇之待姚宋每進見輒為之起去則臨軒送之可謂重君子而敬之矣李林甫為相寵任雖過於姚宋而禮遇卑薄可謂輕小人而狎之矣然姚崇為相才三四年宋璟為相才五年而李林甫則至於十有九年者豈非近之莫見其非則有時而昵逺之莫見其是則不待間而疏者乎林少穎唐史論房杜為相善用天下之才近可言者莫如唐臣之相曰房杜當房杜之時所與共事則長孫無忌岑文本主諫諍則魏鄭公王圭振綱維則戴胄劉洎持憲法則張元素孫伏伽用兵征伐則李績李靖長民守土則李太亮其餘為卿大夫各任其事則馬周溫彥博杜正倫張行成李緯虞世南褚遂良之徒不可勝數夫諫諍其君與正綱維持憲法用兵征伐長民守土皆天下之大務也而盡付之人又有他卿大夫各任其事則房杜何為者耶考之於傳不過曰聞人有善若己有之不以求備取人不以己長格物隨能收敘不隔貧賤而已卒之稱良相者必先此二人南豐文房杜為相輔贊彌縫而藏諸用宰相事業滿天下不可以一官一職論也如太宗時王魏善諫其用止於諫英衛善兵其用止於兵戴胄善守法其用止於守法虞世南李百藥之徒善文章其用止於文章至若房杜為宰相謂之善諫乎此特一諫臣之職爾非宰相之用也謂之善用兵乎此特一將帥之職爾非宰相之用也謂之善守法乎此特一法官之職爾非宰相之用也謂之善文章乎此特一翰林之職爾非宰相之用也然則宰相之用如何哉熟讀房𤣥齡傳得玄齡之用心亦固以識如晦之心而且知宰相之用如此其大也史氏稱𤣥齡曰𤣥齡當國夙夜勤儉任公竭節不欲一物失所且天下如此其廣萬物如此其衆今宰相以眇然一人之身而必欲天下事事物物無一不得其所者則宰相之為用不其大者乎陳伯厚唐史論宰相兼樞密文武一途自古一致自樞密有使起於後唐權置之制因循相承乃與中書對秉鈞軸至於分軍民為二體别文武為二途惟宋初范質王溥以中書平章事參知樞密院事是以東府兼西府也趙普魏仁溥以樞密使同知中書門下平章事是以西府兼東府也真宗景德間北方用兵凡軍旅事先送中書仁宗時富弼乞令宰相兼樞使遂詔密院自今邊事與宰相參議張方平乞省密院歸中書後遂以宰相兼樞使及宰相乞解兼樞使方平又乞令兩府依舊聚㕔議事范鎮又乞中書樞密通知軍民財利大計與三司量其出入制為國用神髙孝皆嘗以宰相兼樞使近日開禧北伐時陳自强以宰相兼樞使宋朝人材纍朝宰相得人蘇老泉有言古之善觀人國者觀其相何如耳纍朝之盛曷嘗以大臣觀之開國勳舊𢎞濟艱難收藩鎮之權遲燕薊之伐建萬世之長策去一時之宿蠧補綴奏藁任官無遺才隨立宫門行賞無廢功鼎鐺之喻夙契帝心金匱之藏有裨國論中令之功多矣此太祖之任相然也而太宗承之沈薛並任不廢舊人中令三入追念故績張齊賢之相以留輔汝之言而相之不愆不忘率由舊章而太宗有焉以正道自待不以媚道害國事有若吕文穆得嘉賞未嘗喜遇抑挫未嘗懼有若吕文靖此太宗任相然也真宗嗣位正人端士相繼登庸不用憸人得大臣之體吾得李文進焉進用正人有古人之風吾得畢文簡焉保全賢哲不用匪人以宋璟自任吾得李文定焉洎澶淵之役左右天子不動如山有若寇萊公進賢黜奸事關國體深沉鎮服天下有若王文正此真宗任相然也逮於慶厯大賢並用魯人石介濃墨大書歌頌聖德嘗讀其詩而三歎焉比弼以夔卨比琦以周勃以率履豫衍以謹重豫得象殊此皆坐而論道者也中廷拜麻小大相慶與富公齊名有文潞公焉受遺輔政與韓公叶心有曽文靖焉公亮以公忠便國家不以官爵養私交尊尚文富形之勸戒有龎敏公焉籍元祐相司馬相吕公著起潞公於二相之上而師种道溫公勇不顧身一洗弊政天下欣然有更生意當時以溫公之勇雖賁黝不能如吕大防繼之范純仁又繼之劉摯蘇頲此數君子皆端人也皆有益於國家也惜也調停之說思之不審稂莠一生嘉禾傷焉子厚一登相位今日之紹興前日之熙寧矣建中改元以公道先天下曾布巧僞韓忠彥不能堪卒引蔡京而勝之京也進用天下之士去矣忠獻為相至公無我忠獻韓公身都將相得政十年勳蓋一時權震天下亦有異同之議排擊之章矣然上則見信於人主而不疑中則見信於士大夫論而不忌下則見信於四方百姓與外國夷狄而惟其行已臨事以至公無我為先以體國濟時為急以振復恩義為戒故不待家至户曉而人自信之雖有異同之論排擊之章卒不能勝耳論西師而詆之甚力則孫公沔是也為其父故反而訟之於朝則李公師中是也奉使淮甸而沮其用事則李公參是也刺陜西義勇而以為不可則司馬公是也議大典禮及同列遷官而皆以為不當則吕公誨是也其甚者至比於三家專魯六卿分晉王氏移漢而欲變名吳氏追從梅福則王公陶也衆人常情睚眦必報當忠獻用事之時殺生號令在其掌握而此六人者或登樞府或翔禁途或鎮巨藩或司大計各盡所長表見於時略不以宿昔排議為怨嫌少廢黜之諺曰桃李不言下自成蹊此言雖小可以喻大其見信於華夏四夷而以功名終始豈偶然哉彼惟其誠信有以取之耳參樞參知政事論者皆曰宋初外懲藩鎮內懲權臣故以通判分守臣之任以參政分宰相之權然秦漢之郡丞魏隋唐之治中别駕司馬長史皆守臣之二也周之小宰秦漢之尚書丞唐之左右丞皆宰相之二也宋初雖有所懲創而亦非創為之制也論者又謂參知政事乃隋唐宰相之職而陶榖以為下丞相一等其言非是曾南豐曰此非百王不易之制殆稱謂適同耳官制輕重因時蓋可見矣僕射侍中皆秦官僕後於射謂之僕射緣所領之事而立名耳侍中則丞相之史也抗之則為宰相名同而實大異矣斯至論也夫宰相既兼三省則造令皆出其手參知政事則審覆奉行者也宋朝令與宰相分日知印押班令寇準與吕餘慶分日云云通知三省政事是為得之其後王安石參知政事而倡為新法亦不為無失矣或得或失有逸出於法制分界之外者非法之所能禁但顧所任之人如何耳漢御史大夫如今參知政事樞密院密院之置於唐末五代楊復恭以宦者而侵宰相唐僖宗時郭崇韜以武臣而抗宰相後唐宋初因仍不改中書密院遂稱二府兵民之任判為兩途人皆謂是所以分宰相之權也曾不知五季易置皆以兵也宰相不握兵何以懲創為其所懲創者外則藩鎮內則三衙也自置密院天下之兵權悉歸之而三衙見宰執必橫杖肅揖則內無專兵之患矣沿邊統制諸路兵官皆𨽻密院則外無握兵之變矣此密院所以司兵而不及民也雖然宰臣自足以辦此何必他置一司哉仁宗朝欲同乞之降二府初不相知熙寧初趙明與西人戰中書賞功而密院降約束郭逵修堡栅密院方詰之而中書已下褒詔夫中書欲戰而密院欲守由二府角立之故也神宗雖命密院事之大者與中書同奏而謂之三省樞密院同奉聖㫖要之體統不一事多率制終不如兵民一致之為愈也元豐改制議者欲廢密院歸兵部而神宗曰祖宗不以兵柄歸有司故專命官統之互相維制不獨有見於懲藩鎮三衙之弊也密院虛設程正叔言藝祖以樞密分宰相之權神宗亦循此意論則未然至謂樞密乃虛設一大事既三省同議其他乃有司之事兵部尚書之職其言有可採者夫密院與中書對立止如參知政事與宰相分班知印未害也有使有副使有知院有同知有簽書又有所謂直學士都丞㫖檢詳編修其屬皆與宰屬等兵民本一而强分為二必置一司如是之浩繁所謂虛設一大事也夫設是虛名無以為職則强立一事以為職於是承㫖參謀議檢詳同文籍編修撰武略無事之時清談有餘紛擾之際一無所用矣何以知其然耶蓋承㫖初用宦者固不足以參謀矣其後用士人亦豈知兵者耶王存編修經武要略始於熙寧三年而終於九年已成而西北用兵馴致靖康之變是豈要略之所能弭耶亦何異蔡京改制武官而不知夷狄之至耶武學置於慶厯三年阮逸為武學諭未幾省去熙寧復置選知兵書者判武學直講如國子監靖康之變不聞武學有禦侮者羣書考索續集卷三十二
