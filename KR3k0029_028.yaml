body:
  text: 羣書考索卷二十八宋章如愚撰禮門明堂類歷代制度神農明堂之作自神農有之淮南子言神農祀於明堂又曰神農明堂曰天府又曰嘗榖祀于明堂黃帝拜祀上帝於明堂或謂之合宮其堂之制中有一殿四靣無壁以茅蓋通水以圜宮垣為復道上有樓從西南八名崑崙天子從之入以拜祀漢公玉帶所上制度唐虞堯曰衢室有虞曰總章應劭唐虞祀五帝於五府府者聚也言五帝之神聚而祭於此堂蒼曰靈府赤曰文祖黃曰神計白曰明紀黑曰𤣥矩五府之制未詳夏氏享祖宗於世室言代代不毁之故魯名宗廟曰文代室武代室世室之制堂修二七廣四修之一修南北之深也夏度以步今堂修十四步益以四方修之一則堂廣十七步半五室三四步四三尺堂上為五室象五行也三四步為室方也四三尺以益廣也木室於東北火室於東南金室於西南水室於西北其方皆三步其廣益之以三尺也土室於中央方四步其廣益之以四尺此五室居堂南北六丈東西七丈九階南靣三階三靣各二四旁兩夾窗窗助户為明也每室四户八窗白盛蜃灰也以蜃灰堊墻所以飾成宮室盛音成門堂三之二門側之堂取數以正堂南北九步二尺東西十一步四尺室三之一兩室與門各居一分商人曰重屋其制堂修七尋崇三尺四阿重屋重屋者王居正堂若太寢也阿今四注也重屋復屋也八尺曰尋周制季秋大享於明堂宗祀文王以配上帝其制度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵東西長八十一尺南北六十三尺其堂髙九尺於一堂之上為五室每一室廣一丈八尺每室開四門門旁各有窗九階外有四門門之廣二丈一尺門兩旁各築土為堂南北四十二尺東西五十四尺其堂上各為一室南北丈四尺東西丈八尺其宫室牆壁以蜃蛤灰飾之武王克紂反商祀于明堂而民知孝樂記成王昔者周公朝諸侯于明堂之位天子負斧依南鄉而立明堂位明堂也者明諸侯之尊卑也成王幼周公六年朝諸侯于明堂制禮作樂頒度量而天下大服一太廟天子明堂昔者周公宗祀文王於明堂以配上帝孝經孔子至周歷郊社之所考明堂之則家語同齊宣王問曰人皆謂我毁明堂毁諸己乎孟子對曰夫明堂者王者之堂也王欲行王政則勿毁之矣孟梁惠王下秦聶宗義三禮圗取大戴九室以為秦人明堂圗按秦實無明堂圗或者泥於呂氏春秋而不知乃古制也漢武帝元封五年祠太一五帝於明堂上座高皇帝對之是時未以高袓配天故言對也光武以來乃配牲以太牢天子從崑崙道中崑崙道即依黃帝時制也始拜明堂如郊禮畢燎堂下其明堂制從公玉帶所上黃帝時圗其年四月天子封泰山泰山東北上有古時明堂處儉下警上欲理明堂奉高帝未曉制度濟南人公玉帶上黃帝時明堂圗上從之作于汶上因朝諸侯王列侯受郡國計仍赦天下賜鰥寡孤獨帛貧者粟光武建武三十年初營明堂明帝永平二年正月辛未初配五帝於明堂光武帝配五帝座位堂上各處其方黃帝在末皆如南郊之位光武位在青帝之南少退西靣各一犢奏樂如南郊章帝元和二年二月壬申宗祀五帝於孝武所作汶上明堂光武帝配於雒陽明堂禮癸酉更告祀高袓太宗世宗中宗世袓顯宗於明堂各一太牢安帝延光三年祀汶上明堂如元和故事其制度建武初營明堂上貟下方法天地八窗四閨法八風四時九室十二座法九州十二月三十六戶七十二牖法三十六旬七十二風魏明帝太和元年正月丁未宗祀文王於明堂以配上帝祝稱天子臣某晋武帝太始二年二月丁丑宗祀文皇帝於明堂以配上帝又議明堂宜除五帝之坐同稱昊天上帝各設一坐而已摯虞議按漢魏故事明堂祀五帝新禮云五帝即上帝帝即天也遂臨五帝之位又按仲尼稱郊祀后稷以配天宗祀文王以配上帝周禮祀天於上帝祀地於四望四望非地則上帝非天斷可識矣又生於明王沒則配五行故太昊配木之列此五帝者配天之神同兆之於四郊報之於明堂十年十月詔復明堂五帝位時以五精帝佐天育物前代相因莫之或廢東晋孝武帝太元十三年正月帝祀明堂車服之儀率遵漢制出以法駕服以衮冕孫耆之議郊以祀天故配以后稷明堂祀帝故配以文王郊為皇天之位明堂為上帝之廟故徐邈以配之為言必有神主郊為天壇則明堂非文廟矣時議帝親奉今親祀北郊明年正月上辛祀皇天次辛祠后土後辛祀明堂宋孝武大明五年依漢汶上儀設五帝位太袓文帝對饗祭皇天上帝鼎爼彛簋一依太廟禮堂制但作大殿屋十二間無古三十六户七十二牖文飾雕畫而已六年正月帝親奉明堂祀祭五畤帝以太祖配齊髙帝建元元年七月祭五帝之神於明堂有功德之君配明堂制五室明帝崇昌元年有司奏以武帝配梁祀五帝於明堂服大裘冕樽以瓦俎豆以純漆牲以特牛肴膳惟二郊若水土之品蔬菜之屬宜以薦郊所無者從省除所配五帝行禮自東階升先春郊帝為始止一獻清酒停三獻及灌事其堂制十二年毁宋太極殿以其材構明堂十二間階准太廟以中央六間安六天座悉南向東來第青帝五帝依次而列又五人帝配享在阼階東上北向大殿後為小殿五間以為五佐室焉陳祀昊天上帝五帝於明堂牲以太牢粢盛六飯鉶羮蔬備薦焉文帝以武帝配廢帝以文帝配堂制殿屋十二間中央六間依前代安六座四方帝各依其方黃帝居坤維而配享座依梁法後魏文帝太和十三年四月經始明堂改營太廟遷洛之後宣武永平延昌中欲建明堂而議者或云五室或云九室至明帝神龜中復議之元義執政遂營九室值代亂不成宗配之禮迄無所設北齊採周官考工記為五室後周採漢三輔黃圗為九室並竟不立隋文帝開皇十三年議立明堂繁役不就終隋代季秋祀五方上帝於雩壇上其用幣各依其方人帝各在天帝之左太袓在太昊南西向五官在庭各依其方牲用犢十二皇帝太尉司農行三獻禮于青帝及太祖自餘有司助奠五官位于堂下行一獻禮有燎其省牲進熟如南郊禮大唐武德初定令每嵗季秋祀五方上帝于明堂元帝配五人帝五官並從祀訖於貞觀之末竟未議立明堂季秋大享則於圎丘行事髙袓圎丘及明堂北郊之祀宗帝専配感帝自餘悉依武德令永徽二年又奉太宗配祠明堂有司遂以髙袓配五天帝太宗配五人帝下詔造明堂內出九室樣堂三等每階各十二上等方九雉八角高一尺中等方三百尺高一筵下等方三百六十尺高一丈二尺上等象黃琮為八角四階安十二階顯慶元年禮官議太宗不當配五人帝太尉長孫無忌等議曰宗祀明堂必配天帝而伏羲五代夲配五郊與入明堂自緣從祀今以太宗作配理有未安伏見永徽二年追奉太宗以遵嚴配當時宗袓先在明堂禮司致惑竟未遷祀乃以太宗降配五人帝雖復亦在明堂不得對越天帝謹按孝經孝莫大於嚴父嚴父莫大於配天昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝又尋歷代禮儀且無父子同配明堂之義惟祭法云周人褅嚳而郊稷袓文王而宗武王鄭𤣥注曰褅郊宗袓謂祭祀以配食也褅謂祭昊天於圎丘郊謂祭上帝於南郊袓宗謂祭五帝五神於明堂也尋鄭此注乃以宗袓合為一祭又以文武共在明堂連祍配祠良為謬矣故王肅駁曰古者袓有功而宗有德袓宗自是不毁之名非謂配食於明堂者也審如鄭義則經當言袓祀文王於明堂不得言宗祀也凡宗者尊也周人既袓其廟又尊其祀孰謂袓於明堂者乎鄭引孝經以解祭法而不曉周公本意殊非仲尼之義旨也臣謹上考殷周下洎貞觀並無一代兩帝同配於明堂伏惟高袓太武皇帝躬受天命奄有神州創制改物體元居正為國始袓抑有舊章太宗文武皇帝道格上𤣥功清下黷極率土之塗炭布大造於生靈請准詔書宗祀於明堂以配上帝從之乾封初仍祭五方上帝依鄭𤣥義復議立明堂左僕射于志寧等請為九室太常博士唐􅀈等請為五室高宗令於觀德殿依兩議張設親與公卿觀議上以五室為便不定又止二年十二月詔祀明堂感帝髙袓太宗崇配仍總祭昊天上帝及五天帝三年三月議定下詔改元為揔章分萬年縣置明堂縣揔章三年三月具明堂規制下詔詔下之後猶詳議未决後竟不立武后臨朝垂拱元年有司議圎丘及南郊明堂嚴配之禮孔𤣥義奏議請太宗高宗配祭於明堂義符周易及祭法之文沈伯義議髙袓神堯皇帝請配圎丘方澤太宗文武聖皇帝請配南郊北郊髙宗天皇大帝制禮作樂告襌升中率土共休普天同賴切惟莫大之孝理當揔配五天元萬頃范履氷等議髙袓太宗今既無配五祠當依舊無改髙宗有功烈而無差豈祀配之有别請奉歷配五祠從之郊丘諸禮皆以三袓俱配因下詔曰時既沿革莫或相遵自我作古用適於事今以上堂為嚴配之所下室為布政之居來年正月一日可以明堂宗祀三聖以配上帝其月明堂成號為萬象神宮天授二年正月乙酉日南至親祀明堂合祭天地以周文王及武氏先考先妣配百神從祠並於壇位以茅布席而祀武太后又於明堂後造佛舍髙百餘尺始構為大風振倒俄又重營其功未畢證聖元年正月丙申夜佛堂災延燒明堂至明而盡尋又無雲而雷起自西北來未幾復令依舊規制重造明堂凡高二百九十四尺東西南北廣三百尺上施寶鳳俄以火珠代之明堂之下圍繞施鐡渠以為辟雍之象天冊萬嵗二年三月造成號為通天宮四月又行親享之禮大赦改元為萬嵗通天明年九月又享於通天宮中宗即位神龍元年九月親享明堂合祭天地以髙宗配季秋大享復就圎丘行事迄于睿宗之代開元五年幸東都將行大享之禮以武太后所造明堂有乖典制遂坼依舊造乾元殿每臨御依正殿禮自是駕在東都常以元日冬至於乾元殿受朝賀季秋大享依舊於圎丘行事十年復題乾元殿為明堂而不行享禮二十年季秋大享於明堂祀昊天上帝以睿宗配又以五方帝五官從祀籩豆樽罍之數與雩禮同二十五年駕在西京詔將作大匠康𧦬素往東都毁之𧦬素以毁坼費功乃奏請且坼上層但留下層以為正殿從之復依舊改為乾元殿其大享儀具開元禮初萬嵗通天元年四月鑄九鼎成置于明堂之庭各依四方列焉蔡州鼎名永昌髙丈八尺受千八百石兾州鼎名武興雍州鼎名長安兖州鼎名日觀青州鼎名少陽徐州鼎名東原揚州鼎名江都荆州鼎名江陵梁州鼎名成都八州鼎各高一丈四尺受千二百石用銅五十八萬七百一十二斤鼎上各寫夲州山川物産之象仍令著作郎賈應福殿中丞薛昌容鳳閣主事李元振司農録事鍾紹京等分題之左尚令曹無靡畫仍令宰相諸王率南北宿衛兵十餘萬人并仗器大牛白象等共曵之自𤣥武門外曵入天后自制曵鼎歌詞令曵者唱和焉開元元年八月太子賔客薛謙光元東都九鼎銘其蔡州銘武后所制文曰羲農首出軒昊應期唐虞繼踵湯禹乘時天下光宅域內雍熙唐禮樂志孝經曰宗祀文王於明堂以配上帝而三代有其名而無其制度故自漢以來諸儒之論不一至於莫知所從則一切臨時增損而不能合古然推其本旨要於布政交神於王者尊嚴之居而已其制作何必與古同然為之者至無所據依乃引天地四時風氣乾坤五行數象之類以為倣象而衆說亦不克成隋無明堂而季秋大享常寓雩壇唐髙袓太宗時寓于圎丘正觀中豆竇盧寬劉伯莊議從崑崙道上層以祭天下層則以布政而孔頴達以為非魏徴以謂五室重屋上貟下方上以祭天下以布政自前世儒者所言雖異而以為如此者多同顔師古曰周書叙明堂有應門雉門之制以此知為王者之常居爾其青陽總章元堂太廟左右個皆路寢之名也大戴禮曰在近郊又曰文王之廟也此奚足以取信哉說及師古等皆當世名儒其論止於如此髙宗改元總章分萬年置明堂縣示必欲立之而議亦紛然或以為五室或以為九室而髙宗依兩議以帟幕為之與公卿臨觀而議益不一乃下詔率意班其制度至取象黃琮上設鴟尾其言益不經而明堂亦不能立至則天始毁東都乾元殿以其地立明堂其制淫侈無復可觀迄唐之世季秋大享皆寓圎丘宋朝仁宗大享明堂皇祐二年二月上謂輔臣曰孝莫大於嚴父嚴父莫大於配天今冬至日當親祀圎丘欲以季秋有事於明堂行享帝享親之禮以極孝親之義文彥博等奏曰臣等檢討舊典昊天上帝一嵗四祭皆以南郊以公卿攝事惟至日圎丘三嵗一親祠開寶中藝祖幸西京以四月庚子有事於南郊行大雩之禮淳化四年至道二年太宗皆以正月上辛躬行祈榖之祀悉如圎丘之禮唯季秋大享闕而未舉真宗祥符初議行此禮亦未遑將上帝祖宗之意遺以俟陛下乎真宗制度前代諸儒議論皆異要必天子之路寢今大慶殿是矣以殿為明堂分五室於內三月一日出御札取今年九月有事於明堂其今年冬至親祀南郊宜即輟罷恩賞依南郊例宋祁上明堂通議二篇宋郊楊安國張揆條典禮十一事劉舜臣上明堂議并圗二卷范仲淹上李太伯明堂圗議鄭叔豹宗祀書三卷于時以丞相文彥博為大禮使宋庠為禮儀使王貽永為儀仗使龎籍為鹵簿使髙若訥為橋道頓遞使四月九日內出手詔曰明堂之禮前代並用鄭王兩家義說兼祭昊天上帝已為變禮國朝自祖宗以來三嵗一親郊及遍祭天地而百神靡不從祀故太祖雩祀太宗真宗祈榖二禮本無地祗位當時皆合祭天地以祖宗並配而百神從祀今明堂正當三嵗親郊之期而禮官所定止祭昊天五帝不及地祗又配座不及祖宗未合三朝之祭制於禮未安其將來親祀明堂宜合祭皇地祗奉太祖太宗真宗並配而五帝神州地祗亦親獻之日月河海諸神悉如圎丘從祀之數以稱朕恭事天地祖宗神靈之意注時帝謂輔臣曰禮非天降地出緣人情爾今禮官習諸儒之舊傳捨三朝之成法豈朕所以昭孝息民也文彥博曰惟上聖至明為能達禮之情適禮之變非臣愚昧所及二十日禮院言奉詔旨明堂祭玉具尺寸制度以聞檢詳今來明堂行禮惟蒼璧不用外定用四圭有邸黃琮圭璧各二青圭赤璋白虎黝璜兩圭有邸各一凡十一玉並凖三禮圗參按周禮制造又五月上自撰明堂樂曲二舞并親書明堂二字太常寺請五帝各用本音之樂青帝以角赤帝以徴黃帝以宮白帝以商黑帝以羽上辛祀感生赤帝即隨月用律大常禮院言詳定明堂禮神玉及燔玉當依典禮用二玉一以禮神置於神位祀畢藏之少府每祀供之一以為燔玉加牲體之上并燔燎之祭玉之備始復於此七月又言准詔合祭皇地祗三聖並侑既增奉禋祀之位則牲亦隨廣請於七犢外更增四犢所有羊豕亦依郊例各用十六又言明堂行禮請初詣昊天位奠玉幣訖次詣皇地祗五帝神州地祗位奠玉幣次詣三聖位奠幣其酌獻之序亦如之惟明堂不講久矣上必欲舉行盛禮制度損益多由上裁酌咸適其當既成禮令王洙勒成皇宋大享明堂記三十卷上自當序至嘉祐七年九月七日再行是禮神宗熙寧四年九月十八日大享明堂以英宗配李拱明堂樂舞頌恭惟仁宗皇帝聰明仁智光紹先烈絯賢核能緝熙事功道洽治隆四海鏡清制作鼎新百度咸飭祲灾巨典搜舉無餘一時文物跨周軼商帝惟天地貺施祖宗貽燕億萬斯祀永永弗替誠心昭報屢正泰壇惟兹明堂合享並配事大體特猶未遑暇乃皇祐紀元明年仲春申喻輔臣肇議兹禮惟彥博庠拜手承命酌古御今講求故實繼發明詔誕告普率將以季秋涓吉祇藏厥事典禮制度悉由聖裁五月二十三日內出御製天地祖宗樂典舞名降神酌獻奠幣入爼繇誠安而下章有其義而威功睿德右文化俗所以為文武二舞之美稱者又皆足以彰盛德形容寓皇心肅敬備薦獻之儀而侑明靈之觀焉太常習禮惟謹惟䖍是嵗九月即大慶殿因事制宜為五縵室親御寶跗若篆飛白粲為華榜戊申齊宿天地開霽辛亥展事月星明概皇心載祇衮服即次粢盛牲幣以次畢陳樂舞既作肸蠁來格登降薦獻舉適厥序天地祖宗罔不咸喜帝之昭報之誠於是為盡而我宋盛典實肇興於此焉先是帝初議大臣有以分撰樂曲為帝言者帝拱而立曰天地袓宗朕當親撰其餘則分命諸臣至是乃發睿思摛帝文以昭肅祇欽恭之意焉詞淵旨精名義兼稱國史登載亶謂丕矩熙事既成一時名儒志之以文而樂舞之製天藻昭垂尤宜鋪張盛美以示方來小臣不佞不敢以辭語淺陋為解敢拜手稽首而為之頌髙宗紹興元年二月初皇祐明堂合祭天地奉太宗真考並配而五帝神州地祗亦親獻之日月河海諸神悉如圎丘從祀至是上取法仁宗欲舉行之癸未詔將來明堂一遵皇祐之制三月有司議明堂配祀於嚴父之文不克時定禮部郎官江都王居正議曰古之帝王非肇造區夏者皆無配天之祭聖宋崛起非有始封之祖太祖則周之后稷配祭于郊者也太宗則周之文王配祭于明堂者也皇祐宗祀固宜以太宗配當年蓋拘嚴父之說故配帝並登真宗其後英宗朝孫抃請專配以近考司馬光呂誨爭之以為絀袓進父而神宗亦謂周公宗祀在成王以文王為祖則明堂非配考明矣今主上紹統自真宗至于神宗均為宗廟獨躋則患無名並配則同祫饗請今祭昊天上帝皇地祗於明堂宜奉太祖太宗配上是其議九月辛亥合祭天地于明堂以太袓太宗並配大赦天下紹興四年九月合祀天地於明堂以太袓太宗並配紹興十年九月合祀天地於明堂以太袓太宗並配紹興三十年秋八月禮部言季秋大享徽宗皇帝於明堂以配上帝緣袓宗以來屢行大享明堂而所設從祀不同若依皇祐廣施從祀切慮其禮稍煩在孝享疑若未專若依元豐悉罷從祀復慮其禮稍略在昭報疑若未備今欲依熙寧設五方帝五人帝五官神從祀之位庶幾繁簡適當得禮之中詔從之紹興三十一年秋九月辛未宗祀上帝於明堂以徽宗配大赦天下孝宗淳熙六年四月御札敕臣僚等朕參稽禮文鋪究古制圎壇八陛雖茂展于欽崇明堂九筵亦間行於嘉享是用逺稽皇祐之書近述紹興之制誕敷大號明戒先期朕以今年九月有事於明堂咨爾攸司各揚其職淳熙六年太史局申明堂大祀合差奏祥瑞官上曰朕以豐年為上瑞不必差官奏祥瑞光宗紹熙五年六月國家恢列聖之洪緒秩百王之彌文天施地生尤重合祫之報祖功宗德載嚴並侑之文肆循三嵗之常間舉九筵之享朕自罹咎釁方處棘艱顧思道弗言之時豈遑他務惟越紼行事之誼莫廢親祠要易圎丘之儀近從路寢之禮適農畝之屢稔暨邊方之咸寧萬寶臻成庶備盛多之薦前彞具在一遵寅畏之謨上以衍夀于重闈下以祈安于兆姓用須丕號俾戒先期朕以今年九月有事於明堂寧宗開禧二年朕丕承眷命祇奉燕貽慶衍重闈賴上帝神祗之祐尊臨廣宇蒙祖宗功德之休深惟菲質之奚堪益念洪私之當報兹以陰陽順序人物遂宜國勢日以安強朝綱日以清肅不循三嵗之祀曷表一純之𠂻是用稽紹興之成規輯合宮之闕禮時秋必報矧萬寶之方成國典固有宜九筵之間舉誕孚羣聽明戒先期朕以今年九月有事於明堂咨爾攸司各揚乃職嘉定元年朕推天地施生之德燕及多方守我祖宗積纍之基期於千載居懷兢業獲濟艱難屬邊鄙之輯寧與黎元而休息田萊浸闢牟麥以登方仰滋至之祥敢後一純之報逺稽元祐近質淳熙咸即合宮載申宗祀肆率遵於舊典用丕闡於彌文寅畏嚴恭尚庶幾於對越肅雍顯相實允賴於交修爰飭先期亶孚衆聼朕以今年九月有事於明堂嘉定八年又詔朕纘承祖烈裒對神休惕思積纍之難無疆惟恤祇畏監觀之赫丕顯亦臨保邦常謹於方微更化已踰於八載猥蒙丕祐獲底小康雖瞻仰昊天方切側身之念然敬事上帝敢稽報本之儀率循舊章間秩宗祀爰卜季商之吉乃㳙路寢之居惟豫一人將舉親祠之典凡爾百辟各殫顯相之誠庶昭答于靈心且茂迎于和氣誕揚大號明戒先期朕以今年九月有事於明堂十一年朕纘緒守成既踰三紀勵精更化亦越十年若涉淵氷靡皇夙夜天地神祗之森列丕顯丕承祖功宗德之兼隆是彛是訓言念菲凉之質每崇保佑之恩比者水旱不時間臻中熟邊隅多故旋底小康屬當舉於親祠敢敬伸於昭報載考纍朝之典洊修路寢之儀乃卜季商聿修祀事以靈承於肸蠁以迓續於休祥祇告先期誕敷羣聽朕以九月有事於明堂嘉定十四年朕纘履洪基恪膺駿命合祭天地肆嚴三嵗之彜並侑祖宗尤重九筵之禮肇精禋於皇祖垂巨典於後昆雖圎丘路寢制名稍殊而紫壇清廟報本則一載惟凉菲端荷貺臨百槖屢豐庶證叶濟齊魯首間於王化輿地來歸荆淮盡掃於邊塵隻輪弗返人心底定國勢漸尊顧列聖積纍之所臻豈一已圗回之能致乃卜季商之吉聿親大享之儀以殫昭答之誠以廣敷錫之慶用孚羣聽肅戒先期朕以今年九月有事於明堂揔說明堂明堂之制或以為一殿公玉𢃄之言裴顯亦言一殿或以為五室考工記或以為九室十二堂大戴禮張衡東都賦或以為十二室呂氏春秋或以為四堂十二室明堂月令其堂室之多寡不同如此或謂之天府神農或謂之合室又曰崑崙黃帝或謂之五府堯舜又曰衢室堯又曰總章舜或謂之世室夏或謂之重屋應劭又云商曰揚館或謂之明堂周蔡雍又取其正室之貌則曰太廟取其尊崇則曰明堂取其四時之學則曰太學取其水圜如璧則曰辟雍大戴禮云其外有水曰辟雍古周禮孝經說明堂文王之廟戴德云明堂辟雍是一其名之不同如此左傳魯僖公五年既視朔遂登觀臺服氏云人君入太廟視朔天子曰靈臺諸侯曰觀臺在明堂之中文公二年服氏曰明堂祖廟並與鄭注不同鄭注玉藻云天子廟及路寢皆如明堂制即鄭意以為三者名異而制同王制云小學在公宮之左大學在郊即云天子曰辟雍是學不得與明堂同為一物又天子宗廟在雉門之外孝經緯云明堂在國之陽玉藻又云聼朔於南門之外是明堂與祖廟别處不得為一也蔡雍明堂章句曰明堂者天子太廟所以宗祀周謂明堂東曰青陽南曰明堂西曰總章北曰𤣥堂中曰太室人君南靣故主以明堂為名在其五堂之中央皆曰太廟享射飬老教學選士皆於其中故取其宗祀之清貌則曰清廟言其正室之貌則曰太廟取其尊崇則曰太室取其堂則曰明堂取其四門之學則曰太學取其四靣周水圜如璧則曰辟雍雖各異名而事實一也袁准正論明堂宗廟太學各有所為而儒者合為一體失之逺矣宗廟之中人所致敬幽隱清净鬼神所居而使衆學處焉饗射於中人鬼慢黷生死交錯囚俘截耳瘡痍流血以干鬼神非其理也茅茨采椽至質之物建日月承玉輅以處其中非其類也夫宗廟鬼神之居祭天而於人鬼之室非其處也王者五門宗廟在一門之內若在廟而張三侯又辟雍在內人物衆多非宗廟之中所能容也其用之不同如此夏度以步商度以尋周度以筵大戴禮云宮統三百步東西九仭南北七筵堂髙三尺禮記正義曰按鄭目録云明堂東西九筵南北七筵堂崇一筵五室凡室二筵古周禮孝經東西九筵南北七筵堂崇一筵五室凡室二筵明堂月令堂髙三丈東西九仭南北七筵又云堂方百四十四尺坤之䇿也屋圜徑二百一十六尺乾之䇿也太廟明堂方三十六丈通天屋徑九丈其廣狹之不同如此或以為在國之陽三里之外七里之內丙巳之地淳于登說或以為在宮中顔師古說蓋得之於路寢歟或以為在郭內宇文愷說或作之汶上武帝或寓之雩壇隋或寓之圜丘唐或以為在近郊三十里明堂月令其地之不同如此或祭上帝黃帝或祭五帝唐虞或祭太乙武帝時以上帝為太乙或除五天帝明帝時摯虞除五帝終東漢至晉皆以五帝即上帝上帝即天帝用王肅一天之說於是除五帝之位惟祭上帝或祭五人帝鄭康成說淳于登曰周公祀文王於明堂五帝之精太微之庭中有五帝座星蔡雍明堂論曰明堂者所以崇禮其祖以配上帝也其所祭之不同如此大戴禮云凡九室四户八窗共三十六户七十二牖以茅蓋屋上圜下方明堂月令云四户八牖淳于登曰八窗四闥鄭駿之云戴禮所云雖如盛德篇云九室三十六户七十二牖似呂不韋作春秋時說者非古也其制之不同如此古周禮孝經說蓋以茅晏子春秋曰明堂之制下之溫濕不能及也上之寒暑不能入也木工不鏤示民知節也呂氏春秋曰周明堂茅茨蒿柱土階三等以見節儉也胡廣曰古之清廟以茅蓋今之明堂茅蓋之乃加瓦其上不忘古也封軌議曰上圜下方以則天地通水圜宮以節觀者茅蓋白盛為之質赤綴白綴為之户牖武后時議大小拱級大梠飛檐上以清陽玉葉覆之後竟不行其制度之豐儉如此陰陽九六之變且圎蓋方載六九之道也八闥以象八卦九室以象九州十二宮以應十二辰三十六户七十二牖以四户八牖乘九室之數也户皆外設而不閉示天下不藏也通天屋髙八十一尺黃鍾九九之實也二十八柱列於四方亦七宿之象也堂髙三尺以應三統四鄉五色各象其行外博二十四丈以應節氣也封軌議曰鄭元曰五室者象五行也九階者法九州四户者達四時八窗者通八風上圜下方以則天地白虎通又以為上圎法天下方法地八窗象八風四闥法四時九室法九州十二座法十二月三十六户法三十六雨七十二牖法七十二風其取象之不同如此五帝之位正四方而明堂祭於四維不以其方天子之朝向明而明堂則四時異宮不必南靣其所向之不同如此或配以遠祖漢初配以髙帝晋初配以宣帝尋復還以文帝配本朝升以列聖同侑其配享不同如此或一犢明帝紀光武制或草太牢武帝從方士言其牲體如此六經有明堂之文而無其說孔孟有明堂之說而無其制度考工有明堂之制而制不詳緯書則詳矣而未必帝王之制漢晋諸儒不宗孔孟之說而信緯書之說不信考工之制而信緯書之制何哉夫所謂明堂者亦曰布政交神而已是孔孟之說也考工所說雖非周公之全經然不可謂非周公之制說者但見其尺度之迫厄盡從而駁之非也姚䇿鄭氏雖得之於考工至謂制如太廟與路寢則失矣此張逸之所以難而宇文愷之所以駁也蔡氏雖得之於大戴至謂教學選士皆在其中此袁准之所以破也周堂度以筵要在為神靈之所廬天子之所御耳三公在中階之前侯伯分於東西四夷子男之居並在國門之外何害於隘也李謐喜非鄭氏有繩樞甕牖蓽門圭竇之譏亦云削刻哉堯階三尺太王陶穴以為宮安得藉此以病周虞舜受終四月覲四嶽羣后並不以巖廊狹隘不足以容也禹塗山之會玉帛萬國而使大為宮室以處諸侯豈卑宮室之意哉觀諸儒之論康成博而證其失也雜伯喈㵷而裁其失也固袁准質而明其失也刻摰虞簡而質其失也短宇文愷才而富其失也巧李謐孚而篤其失也苛至於王儉之典雅顔監之該詳其皆讜論也然終非萬世之法武帝雖得之於斷而溺於怪漢明雖得之於文而惑於纎梁武得之於裘冕而失之牲牢齊丈得之配侑而失之一殿隋氏則奪於羣議而不果行唐世則果於不經而恣淫侈齊宣王欲毁明堂而孟子則勸之以王政之說唐歷世欲興明堂韓愈則排之以三器之論從孟子之論則明堂可興從韓愈則明堂為可廢孟子承王政不行之後必欲行之庸知明堂之不可廢也韓子承諸儒互說之末必欲排之庸知明堂之不必建也與其從韓愈以息諸儒之說不若從孟子以行先王之政䇿且明堂之制於以朝羣后而致其義飬三老而致其仁頒月令以奉天時聼政考言以修人治適其時也又孰曰不可者乎既曰可矣則重屋總章不必狥其名之詭土階茅茨不必從其制之陋至若八闥以象乎八卦九室而象乎九州上圎而法乎乾下方以體乎坤十二宮以應嵗之辰七十二牖以應氣之候者無為詭異不經也要之廣大足以周旋禮文潔净足以致享上帝其最不可取者蔡雍之章句而最可取者袁准之正論而已羣書考索卷二十八
