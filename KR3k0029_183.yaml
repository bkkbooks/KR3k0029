body:
  text: 羣書考索續集卷五十二宋章如愚編輿地門地名古今地名百王制度代有沿革考正實艱而地名同異古今溷殽尤為難辨者也蓋其山川所届時各異名而郡邑之名又復非古嵗代滋久史傳互見或沿其地而易其名或襲其名而遷其地或亦遷其地而革其名此輿地之所以難考也抑嘗討之河東一名也有兖州之河東有并州之河東黃河舊道三代以前自宋衛州之黎陽縣境折而北流故北京及河北東路諸州在河之東即古兖州之域故周禮職方河東曰兖州爰自周定王時黃河舊道漸以湮塞秦漢以還河堤屢壞乘上遊之勢決而東下故兖州之域隔在河北而河東之名乃移在并州戰國以來子史中所稱河東之地皆指宋朝河東路而言即古時并州之域也河西一名也有雍州之河西有凉州之河西黃河源自崑岡傍積石北流餘二千里至于宋銀夏之郊稍折而東流不盈千里又折而南流故宋永興軍路鄜坊丹延諸州在河之西而河湟之間鄯涼甘肅諸州亦在河西戰國之際所稱河西地即指鄜坊丹延之間而言在雍州之域也西漢以來所稱河西地即指河湟而言古涼州之域也河南一名也有中土之河南有邊境之河南河北一名也有中國之河北有夷狄之河北黃河曲折大勢如覆斗之狀而關中正在斗間而中原適當如衡故宋京畿四路在河之南即中土之河南也而綏銀勝夏諸州亦在河南即邊境之河南也河北東西路在河之北斯中國之河北也而隂山淹海之間有秦長城外地亦在河北即夷狄之河北也三代以前河南之稱止在中土秦漢而下奪胸奴南牧之地列為郡縣亦名之曰河南自是河南之稱一彼一此不常也陳隋以前河北之稱止在中國李唐之初夷狄追奔之地悉為郡縣亦名之曰河北自是河北之稱一彼一此不常也如突厥𫝊中所稱河南河北之地皆指邊境夷狄而言與前史全不相侔若此之類不可不察也加之百王疆理代有不同有指一郡而言者有指一州而言者有指一道而言者如中土河南之地今古一名而兩漢河南之稱惟指一郡而言即宋西京屬縣兼鄭孟二州之境而已姬周河南之稱則指一州而言即宋東西二京及京西南北路之地李唐河南之稱則指一道而言包古青徐兖豫四州之境奄黃河以南皆是也宋為東西南三京及京畿四路之地故周之河內異乎漢之河內周禮職方河內曰冀州即宋河北東西路地漢之河內乃古郡宋懷衛二州是已漢之河東異乎唐之河東漢河東郡即宋河中府及慈隰晉綘解五州唐河東道乃宋河東路地古之淮北乃今之淮南宋宿亳二州自開國以來至于李唐皆在淮北宋乃移屬淮南而今之河北乃古之河東宋朝河北東路之地三代以前屬河東以至淮西一名也有在京東有在京西淮道自西而東時折而北流故淮北之地間名淮西如漢封劉交為楚王王淮西則宋京東西路之地也唐裴度身督戰遂平淮西則宋京西北路之地江西一名也有在江北有在江南江道自西而東時折而北流故江北之地間名江西如魏志武帝紀稱江西遂空則宋淮南東路之地也晉紀稱石勒陷江西壘壁百餘則宋京西南路之地也至五代史稱鍾傳據有江西乃今江南西路之地江南一地也有稱江左有稱江右金陵居長江下流前朝有江南者皆都之據金陵而言則江南居左四瀆之流皆自西而東天下之形勢亦然以中原而言則江南之地居右故前史兩稱之山東亦一名也有指河南而言者有指河北而言者前史山東之稱皆據華山而言之則其所謂正在華山之東也則其地正當河南而稍及河北之近河南者至杜牧之罪言則所稱山東之地專指河北而言陜西亦一地也虞夏曰雍州商周曰西土春秋為秦國戰國稱關中楚漢之際謂之三秦兩漢又名山西宋列為陜西路而前史又從而稱顯之曰四塞之國曰陸海之地曰天府之居其名雖異實則同也反以三隅它可知矣此所謂山川所届時各異名者也嘗考歷代州郡之名多有取之於古之國號如書稱河亶甲居相即今之相州也春秋衛侯燬滅邢即今之邢州也楚子入陳即今之陳州也齊師滅陳即今之陳州也齊師滅萊即今之萊州也楚子圍鄭即今鄭州之新鄭縣也齊侯侵蔡即今蔡州之上蔡縣也若此之類未易槩舉蓋履其地不敢沒其名也然而遷徙不常考證或踈至有已非其地而空存其名者如春秋吳師入郢近於今之郢州而非也古郢城在今之荆南府界去郢州餘三百里秦師入滑近於今之滑州而非也古滑國在今西京偃師縣之緱氏鎮去滑州餘四百里楚人滅舒近於今之舒州而非也古舒國今在廬州之舒城縣去舒州餘三百里楚人滅黃近於今之黃州而非也古黃國今在光州定城縣去黃州四百五十里楚人伐徐近於今之徐州而非也古徐州今在泗州臨淮縣之徐城鎮去徐州垂五百里傳稱允姓之戎居於瓜州近於今之瓜州而非也古瓜州地在今沙州去瓜州垂三百里有西亳南亳北亳而皆非今之亳州也西亳今在京西偃師縣南亳在南京榖熟縣北亳在東京考城縣有東虢西虢南虢而皆非今之虢州也東虢在今之鄭州滎陽縣西虢在鳯翔府虢縣南虢在南陵軍升陸縣有東楚西楚南楚而皆非今之楚州也東楚今蘇州西楚今徐州南楚今荆南府夫以州郡之名既非古昔而縣邑之名抑又乖戾方春秋之際鄉亭邑聚之名見於經傳者不啻千數而存於今者百無一二其有地不徙名不更歷代常存用迄於今如彭城中鍾離酸棗長葛諸城才十數而止耳其餘或名同於古則地改於今故古之酒泉在河南而今之酒泉在河西左傳王與虢公酒泉之邑實在河南而西漢而下迄于今有酒泉郡乃開胸奴之地實在河西古之丹陽在荆南而今之丹陽在江東左傳稱楚子邑于丹陽在今荆南府枝江縣內今丹陽郡乃潤州也古之豫章在江北今之豫章在江南皆吳楚境也古澶淵在河南今澶淵在河北而皆宋衛之郊也春秋諸侯㑹于澶淵實宋故都漢志沛國杼秋縣有澶淵聚即其地也其地正屬今之濮州而今之澶淵郡乃河北東路之督府也古之南陽在河北今之南陽在河南而皆晉地也左傳晉于是始啓南陽即今之懷州也而今之南陽郡乃京西南路之鄭州也古之東陽在淮北今之東陽在浙西而皆吳地也漢嘗以彰郡東陽郡行封今浙西在吳亦有東陽夫地理更乎歷代必至混淆驗其名初無異同考其實則為甚易觀者於此幾何而不誤哉臣故曰百王制度考正實艱而地名同異尤為難辨者也羣書考索續集卷五十二
