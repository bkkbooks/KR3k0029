body:
  text: 羣書考索續集卷四宋章如愚編經籍門書書序之難信三條書序不可信伏生時無之其文甚弱亦不是前漢時文字只似後漢末人書序無證據書序恐不是孔安國做漢文粗枝大葉今書小序細膩只似六朝時文字小序斷不是孔子作文公書序於孔子陸曰書者起五帝之末後三皇之經本帝王之號今古史所記孔子刪録斷自唐虞下訖秦穆典謨訓誥誓命之文凡百篇而為之序及秦禁學孔子之孫壁藏之漢興濟南伏勝口所傳授於朝錯是曰今文尚者上也以其上古之書故謂之尚書或曰上所言下為史所書故曰尚書釋文序辨孔子序書獨詳六經成於孔子者四其書獨載五代之遺言尤詳於他經雖遭秦火之餘所亡者幾半而其僅存者猶以厭觀古昔如堯舜之禪遜湯武之放伐臯陶大禹之謨伊尹周公之事張兵息民之本立賢任相之方以至君臣之優劣政事之繁簡風俗之厚薄辭旨之淵深熟閲而審思之莫不畢見於此故學者欲觀帝王之迹在書為最備焉序書義例不同王義曰此序鄭玄馬融王肅並云孔子所作孔義或然詩書理不應異夫子為書作序不作詩序者此自或作書否無義例也鄭知孔子作者依緯文而知也安國既以同序為卷檢此百篇凡有六十三序其九十六篇明居咸有一德立政無逸不序所由直云臯陶作明居伊尹作咸有一德周公作立政周公作無逸六十三序者若舊作九共九篇稿飫十一篇共序其咸乂四篇同序與大禹謨臯陶謨益稷夏社疑至臣扈伊訓建命徂后太甲三篇盤庚三篇説命三篇泰誓三篇康誥酒誥梓材二十四篇皆三篇同序其帝告釐沃汝鳩汝方伊陟顧命高宗肜日高宗之訓八篇皆共卷類同故同序同序而别篇者二十三篇通明居無逸等四篇為三十七篇加六十三為百篇也古文傳於伏生孔曰儒林傳孝文帝求能治尚書者天下無有聞伏生年已九十有餘於是詔太常使掌故臣朝錯往受之得二十九篇即以教於齊魯之間按史記秦時焚書伏生壁藏之其後漢定天下伏生求其書亡數十篇獨得二十九篇以教於齊魯之間而云失其本經口以傳授者蓋伏生初實壁內得之以教齊魯傳教既久誦文則熟至朝錯往受之時不執經而口授之故也辨書非伏生改易書學不同非伏生之由也衛敬仲曰朝錯受書於生生使其女傳之齊音難曉錯不識者十二三僅以其意點定而已而余以為非生之由何也蓋古人傳授點定大義則意見易通無俟乎訓詁之末也生當煨燼之餘授書於人其所誦者傳之其所忘者闕之於大義既未有害而盤誥聱牙自是書之本體亦非生所改易也典謨貢範同出於生而明白坦亮如彼獨盤誥有艱深焉則其書之所以艱深非齊音使然而世儒之所以疑生者皆非其實也今文讀於安國孔氏有古文尚書孔安國以今文字讀之因以起其家逸書得其餘篇蓋尚書滋多於是矣遭巫蠱未立於學官本傳諸儒不見孔傳孔曰按壁內所得孔為傳者凡五十八篇為四十六卷三十三篇與鄭注同二十五篇增多鄭注也孔君所傳值巫蠱不行以終前漢諸儒知孔本有五十八篇不見孔傳遂有張霸之徒於鄭注之外偽造尚書凡二十四篇以足鄭注三十四篇為五十八篇其數雖與孔同其篇有異孔則於伏生所傳二十九篇內無古文泰誓除序尚二十八篇外出舜典益稷盤庚二篇康王之誥為三十三增二十五篇為五十八篇鄭玄則於伏生二十九篇之內外出盤庚二篇康王之誥又泰誓三篇為三十四篇更增益偽書二十四篇為五十八故藝文志劉向别録云五十八篇藝文志又云孔安國者孔子後也悉得其書以古文又多十六篇篇即卷也即是偽書二十四篇劉向作别録班固作藝文志並云此言不見孔傳也劉歆作三統歷論武王伐紂引今文泰誓云丙午逮師又引武成越若來三月五日甲子咸劉商王受並不與孔同亦不見孔傳也後漢初賈逵奏尚書疏云流為烏是與孔亦異也馬融書序云經傳所引四誓泰誓並無此文又云逸十六篇絶無師説是融亦不見也鄭玄不見古文孔曰鄭玄注書序舜典云入麓伐木注五子之歌云避亂於洛汭注胤征云胤征臣名又注禹貢引胤征云厥篚玄黃昭我周王又注咸有一德云伊陟臣扈曰又注典寶引伊訓云載孚在亳又曰征是三朡又注旅獒云獒讀曰毫謂是酋豪之長又古文有仲虺之誥太甲説命等見在而云亡其汨作典寶之等一十三篇見亡而云已逸是不見古文科斗定為𨽻古孔曰科斗書古文也所謂蒼頡本體周所用之文今所不識是古人所為故名古文形多頭粗尾細狀腹團貟似水蟲之科斗故曰科斗也以古文經秦不用孔君以人無能知識之故以所聞伏生之書比校起發考論古文之義定其可知者之古文內定可知識者為𨽻古定不言就伏生之書而云以其所聞者明用伏生書外亦考之不徒伏生書內而已言𨽻古者正謂就古文體而從𨽻定之存古為可慕以𨽻為可識故曰𨽻古孔氏所傳為古文也古文蒼頡舊體孔子壁中書也𨽻古不行於世歐陽曰書原於號令而本之史官孔子刪為百篇斷堯訖秦序其作意遭秦之故孔子末孫惠與濟南伏勝各藏其本於家漢楚之際失其所藏但口以傳授勝既耄昏乃謬合三十四篇為二十九歐陽夏侯之徒皆學之寫以漢世文字號令文尚書至武帝孔惠之書始出屋壁百篇皆在而半已磨滅又皆科斗文字惠孫安國以隸古定之得五十八篇為之作傳號古文尚書至陳隋之間伏生之學廢絶而孔傳獨行先時孔傳亡其舜典至梅頥乃以王肅所注伏生舜典足其篇至唐李明不喜𨽻古更以今文行於世廬陵文頴逹得罪於經或曰安國之傳頴逹之正義其有功於書信矣敢問傳義之中果盡得聖人之意而無失乎否也曰二子之於書其所得固多其所失亦有之如安國以四嶽為四人以傅説版築為胥靡之類世共知其為非矣而頴逹之陋不専在於解説之間正在於引讖緯之書以亂經也讖諱之書出於漢哀平之間迂濶怪妄引聖經以折其誕可也而反援以證經則是以經為不足信而以讖緯為可信也就二子而較之頴逹得罪於經多矣何以獨名為書正義曰五經六籍皆是筆書此獨稱書者以彼五經者非是君口出言即書為法所書之事各有云為遂以所為别立其稱稱以事立故不名書至於此書者本書君事事雖有别正是君言言而見書因而立號以此之故名異諸經書何人加尚字正義曰云以其上古之書謂之尚書者此文繼在伏生之下則言以其上古之書謂之尚書此伏生意也若似伏生指解尚書之名名已先有有則當云名之尚書既言以其上古之書則知尚字乃伏生所加也辨鄭玄謂孔子所加鄭氏云尚者上也尊而重之若夫書然故曰尚書二家以尚與書相將則上名不正出於伏生鄭玄依書緯以尚字是孔子所加故書贊曰孔子乃尊而命之曰尚書且孔君親見伏生不容不悉自云伏生以其上古之書謂之尚書何云孔子加也辨安國信伏生所加言虞夏商周之書者以壁內所得上有題目虞夏商周書其序直云書序皆無尚字故其目録亦然故不云尚書而言虞夏商周之書安國亦以此知尚字是伏生所加推此壁內所無則書本無尚字明矣尚書名義不同孔曰聖賢闡教事顯於言言愜羣心書而示法既書有法因號曰書尚者上也言此上代以來之書故曰尚書且言者意之聲書者言之記是存言以聲意立書以記言故易曰書不盡言言不盡意是言者意之筌蹄書言相生者也書者舒也書緯璿璣鈐云書者如也則書者寫其言如其意情得展舒也又劉熙釋名云書者庶也以記庶物又為著言之得彰著尚書體例有十正義曰一曰典二曰謨三曰貢四曰歌五曰誓六曰誥七曰訓八曰命九曰征十曰範堯典舜典二篇典也大禹謨臯陶謨二篇謨也禹貢一篇貢也五子之歌一篇歌也甘誓泰誓三篇湯誓牧誓費誓秦誓八篇誓也仲虺之誥湯誥大誥康誥酒誥召誥洛誥康王之誥八篇誥也伊訓一篇訓也説命三篇微子之命蔡仲之命顧命畢命冏命文侯之命九篇命也胤征一篇征也洪範一篇範也此名隨事而言也辨立篇名無體例益稷以謨也因其人稱言以别之其太甲咸有一德伊尹訓道王亦訓之類盤庚亦誥也故王肅不言誥何也取其徙而立助非但録其誥高宗肜日與訓序連文亦訓辭可知也西伯戡黎云祖伊奔告于受亦誥也武成云失其政事亦誥也旅獒武王亦訓也金縢自為一體祝亦誥辭也梓材酒誥分出亦誥也多士以王命誥自然誥也無逸戒王亦誥也君奭周公誥召公亦誥也多方周公上告於下亦誥也君陳君牙與畢命之類亦命也吕刑陳刑告王亦誥也書篇之名因事而立既無體例隨便為文尚書篇數存亡書始百篇今其存者五十有九就而考之虞之書存者有二典三謨是也其亡者十有一舊作九共稿飫是也夏之書存者有四禹貢甘誓五子之歌胤征是也其亡者不得而知也商之書存者十有七湯誓仲虺之誥湯誥伊尹訓太甲咸有一德盤庚説命高宗肜日西伯戡黎微子是也其亡者有二十帝告釐沃湯征汝鳩汝方夏社疑至臣扈典寶明居沃丁咸乂伊陟顧命仲丁河亶甲祖乙是也周之書存者三十有二泰誓牧誓武成洪範旅獒金縢大誥微子之命康誥梓材召誥洛誥多士無逸君奭蔡仲之命多方立政周官君陳顧命康王之誥畢命君牙冏命吕刑文侯之命費誓秦誓是也其亡者有八分器旅巢命歸禾嘉禾成王政將蒲姑賄肅氏之命亳姑是也又其一則夫子之序也今以亡失之三十九篇而合具存之五十九篇是百篇之中猶有二篇之不可見也孔安國嘗以典謨訓誥誓命之六體而盡此五十八篇之例至頴逹則廣其説加貢歌征範而為十是果得以盡其體乎余切以謂安國之説固失之踈略而頴逹雖若有得然不著其義用又未為全得也尚書百篇次序孔曰其百篇次第於序孔鄭不同孔以湯誓在夏社前於百篇為第二十六鄭以為在臣扈後第二十九孔以咸有一德次太甲後第四十鄭以為在湯誥後第三十二孔以蔡仲之命次君奭後第八十三鄭以為在費誓前第九十六孔以周官在立政後第八十八鄭以為在立政前第八十六孔以費誓在文侯之後第九十九鄭以為在吕刑前第九十七不同者孔依壁內篇次及序為文鄭依賈氏所奏别録為次孔未入學官以此不同考論次第孔義是也傳授傳注之作孔曰勳華揖讓而典謨起湯武革命而誓誥興先君宣父生於周室末芟煩亂而剪浮辭舉宏綱而撮機要上斷唐虞下終秦魯時經五代書總百篇斯乃前言往行足以垂法將來者也暨乎七雄已戰五精未聚儒雅與深穽同理經典共積薪俱燎漢氏廣求遺逸採古文於金石得今書於齊魯其文則歐陽夏侯二家之所説蔡雍碑石刻之古文則兩漢亦所不行安國注之實遭巫蠱遂寢而不用歷及魏晉方始稍興故馬鄭諸儒莫覩其學所注經傳時或異同晉世皇甫謐獨得其書載於帝紀其後傳授乃可詳焉但古文經雖然早出晚始得行江左學者咸悉祖焉近至隋初始流河朔其為正義者蔡大寶巢猗費彪顔彪劉焯劉炫等其諸公旨趣多或因循詁釋注文義皆淺略惟劉焯劉炫最為詳雅然焯乃織綜經文穿鑿孔穴詭其新見異彼前儒使教者煩而多惑學者勞而少功炫嫌焯之煩雜從而刪焉雖復微稍省而實過華義既無義文又非文此乃炫之所失未為得也辨傳義有力於書伏生以書教授齊魯之間後傳而為歐陽大小夏侯之三家漢世立之學官是以謂今文書也然其偽妄甚多不可據信唯安國之書得於孔壁是古文舊典也安國為傳既成而值巫蠱之事不克立之學官止傳人間亦不彰著故趙岐杜預注解左氏孟子所引皆云逸書彼實見今文而不見孔傳爾逮晉元帝時豫章內史梅頥始得而獻於朝孔傳因以大顯至唐傳孔頴逹為正義以翼之而孔傳益詳明可考前代遺文得傳至今者非二子之力哉堯舜禹湯名諡陳曰堯舜禹湯先儒或以為諡其説皆無據觀大禹謨序言大禹臯陶謨益稷則臯陶益稷皆名也觀師錫帝曰虞舜帝亦曰格汝舜又曰來禹又曰咨禹曰棄曰契曰臯陶曰咨垂曰咨益例以名命之則舜禹不得不為名也舜禹為名則堯亦為名也唯論語曰豫小子履説者謂履為湯名履為名則湯非名矣説者又謂湯名天乙將為王改名履又曰名履字天乙此皆不可知不可知者餘請缺之其可知者據書而言則舜禹宜為名舜禹既為名是堯亦名也典者常也經者法也言其辭則雅正言其體則簡要與謨訓誥誓命不同虞夏之書同孔曰按馬融鄭玄王肅别録題皆曰虞夏書以虞夏同科雖虞事亦連夏以連夏故直言虞書本無尚書之題也按鄭序以為虞夏書二十篇商書四十篇周書四十篇贊云三科之條五家之教是虞夏同科也左氏以虞書為夏正義曰莊八年左傳云夏書曰臯陶邁種德僖二十四年左傳引夏書曰地平天成二十七年引夏書賦納以言襄二十六年引夏書曰與其殺不辜寧失不經皆在大禹謨臯陶謨嘗於虞書而云夏書者以事關禹故引為夏書若洪範以為周書以箕子本商人所陳而傳引之即曰商書虞書堯典曷為虞書正義曰堯典雖曰唐事本以虞史所録末言舜登庸由堯故追堯作典非唐史所録故謂之虞書也鄭玄云舜之美事在於堯時是也辨二典若出一體堯在位堯之書未作堯禪舜然後有堯之書舜在位舜之書未作舜禪禹然後有舜之書大抵其書皆出於後世故堯雖在唐而堯典則曰虞書至舜典而下當出夏時乃曰虞書非史氏之舊也孔子序正之也春秋之君臣引大禹臯陶謨益稷之言見於左氏傳者皆曰夏書此史氏之舊也孔子序舜典而下謂十有五篇之書皆舜一代之制作欲因其舊而為夏書則夏時事有出於商史者遽曰商書商時事有出於周史者遽曰周書如此則名代遷易而言不順矣宜乎孔子正舜典而下十有五篇題以虞書也然則既正舜典為虞書曷不正堯典曰唐書乎蓋堯舜二帝常相終始堯典載舜有鰥在下之言舜典載堯受終之事孔子序堯典亦曰遜下虞舜序舜典亦曰堯聞之聰明相為終始若出一體故孔子因其舊曰虞書可以無嫌也一因一革聖人無容心焉順乎自然而已堯德兼言文思孔曰聰明者據人近驗則聽逺為聰見微為明若離婁之視明也師曠之聽聰也以耳目之聞見喻聖人之智慧兼於天下之事故在於聞見而已故以聰明言之智之所用於天地經緯天地謂之文故以聰明之用為文須當其理故又云思而會理也經云欽明此為聰明者彼方陳行事故美其敬此序其聖性故稱其聰隨事而變文舜德止言聰明孔曰舜典云堯聞之聰眀不云文思者此將言堯用故云文思彼要云舜德故直云聰明亦自此而可知也羲和重黎之後正義曰顓帝命南正重司天北正黎司地堯育重黎之後是此羲和可知是羲和為重黎之後世掌天地之官文所出也吕刑先重後黎此文先羲後和楊子法言云羲近重和近黎是羲承重而和承黎矣吕刑稱乃命重黎與此命羲和為二事也故吕刑傳云重即羲也黎即和也羲和雖别為氏族而出自重黎故吕刑以重黎言之羲和象中星定四時正義曰羲氏和氏敬順昊天之命厯此法家其日之甲乙月之大小昏明遞中之星日月所會之辰定其所行之數以為一嵗之厯乃依此厯敬授乎人以天時之早晚其總為一嵗之厯其分有四時之異既舉總目更别序之堯命羲仲居嵎夷之地主東方耕作之事於日晝夜中分刻漏正等天星朱鳥南方七宿合昏畢見以此天時之候調正仲春之氣節又重命羲叔居南方與南交主南方化育之事於日正長書漏最多天星大火東方七宿合昏畢見以此天時之候調正仲夏之氣節又分命和仲居昧冥之谷主西方成物之事於晝夜中分漏刻正等天星之虛北方七宿合昏畢見以此天時之候調正仲秋之氣節又重命和叔居幽都之地治北方嵗改之事於日正短書漏最少天星之昴西方七宿合昏畢見以此天時之候調正仲冬之氣節以此氣厯告時授事信能和治百官使之衆助皆廣也寅賔寅餞之别孔曰寅敬釋詁云賔者主行導引故賔為𨗳也送行飲酒謂之餞故餞為送也導者引前之言送者從後之稱因其欲出導而引之因其欲入從而送之是其因事之宜而立此文也秋位在西於時萬物成熟則收斂助天成物以此而從送入日也帝堯舉舜之意正義曰俞然釋言文然其所舉言我亦聞也其德行如何恐所聞不審故詳問之堯知有舜不召耴禪之而訊四嶽令衆舉薦者以舜在卑賤未有名聞率暴禪之則下人不服故鄭玄六藝論云若堯知命在舜舜知命在禹猶求於羣臣舉於側陋上下交懷務在服人孔子曰人可使由之不可使知之此之謂也是解堯使人舉舜之意也辨試舜欲服人心陳曰堯舜之相知不在於言語物色之間而其舉舜也考之以四嶽觀之以二女又試之以諸難是何知舜之心猶有未盡乎古者爵人於朝猶曰與衆共之况舉天下而授之匹夫不求先有服天下之心則安得天下無異哉舜典紀事不相屬按堯典命鯀以治水而其功不成舜遂殛鯀而以禹代之當舜攝位之初巡行四方各至乎方嶽之下使是時洪水未平則其禮豈可得而講若巡守之禮講於洪水既平之後則鯀之死蓋已久矣今作書者於舜典受終文祖之後先言其朝諸侯考制度肇十有二州十有二山濬川然後及於欽恤用刑之事而以誅四凶之事繼之何其所紀舜事之先後乃如是之不相屬乎此其可疑者也命官脫簡重出舜之命九官也各相遜於朝命禹則遜于稷契臯陶命夷則遜于夔龍命益則遜于朱虎熊羆命垂則遜于殳斨伯與若棄若契若臯陶若龍皆未嘗言己之功獨命夔典樂而夔則自言其擊石拊石百獸率舞之效乃與上文不類及讀益稷篇則又有此文載於其間豈有脫簡之重出乎此其可疑者也協時月同律度正義曰周禮太史云正嵗年頒告朔於邦國則節氣晦朔皆天子頒之猶恐諸侯國異或不齊同故因巡守而合和之世本云容成作厯大撓作甲子二人皆黃帝之臣蓋自黃帝已來始用甲子紀日每六十日而甲子一周史記稱紂為長夜之飲忘其日辰恐諸侯或有此之類故須合日之甲乙也時也月也日也三者皆當勘檢諸國使齊一也律者候氣之管而度量衡三者法制皆出於律故曰律法制也度有丈尺量有斛斗衡有斤兩皆均同之時月言協日言正度量衡言同者以時月須與它月和合故言協日有正與不正故言正度量衡俱是民之所用恐不齊同故言同因事宜而變名耳舜五載一巡守陳曰前言嵗二月東巡守五月南巡守八月西巡守十有一月北巡守非謂之遍歷四嶽也但五嵗之間以一巡守為率爾舜命官或遜或否觀舜命伯禹伯夷蓋出於咨四嶽而後衆舉之命垂命益蓋出於疇若豫上下草木鳥獸而後衆人舉之衆舉而後命之故四人者不可不遜以盡其禮也蓋大臣之事君也非其君之心素許之則不屑屑而就故也至於命稷契臯陶夔龍皆出於舜意而不出於疇咨豈非五臣任使之方舜嘗素就於胸中故自任之事而無疑焉五臣受之而不必遜可也舜咨二十二人自詢于四嶽十有二牧與夫九官之命則所咨者凡二十有五人及總其人而戒敕之乃曰咨汝二十有二人或謂四嶽為一人併九官十二牧則為二十有二也然堯典有咨四嶽之文而僉曰為對是豈可指四嶽為一人哉或謂稷契臯陶皆申命故不復敕戒之然稷契臯陶之為申命固也四嶽十二牧亦豈非申命者哉何其又預於戒敕之數乎凡是者皆求之而不得其説此其可疑者也九共當為九丘陳曰或曰九共即九丘也孔安國定𨽻古字不知丘字與共字類遂説為九共而謂孔子述職方而除九丘且職方氏周官一官之職爾周官作之孔子如何述之要知書未有一名而九篇者一名而有九篇必其經世之尤著者也釐理也居方所以居處一方之事也方設居方者蓋四方風土不同而聖人所以居處其方者亦異别其生分其類其書載於汨作者一必其釐治下土之大略也載於九丘者九别其方設居方别生分類之精微也其篇有九蓋州有九焉或曰舜之時肇十有二州矣如之何尚九也曰幽州并州本與冀州同營州本與青州同其外域廣大故聖人分之若夫情性則九而已辨書以傳多而誤蓋書自燔滅之後殘缺不全漢之世有伏生口傳之書有孔壁續出之書孔安國合之為五十八篇是為古文尚書凡今書之文有聱牙艱深而難曉者則皆伏生口傳之書也有坦然明白而易曉者則皆孔壁續出之書也而舜典之書則實伏生口傳之書已非聖人之真本矣又古文尚書五十八篇孔安國未及奏上值巫蠱事起經籍道息而其本遂絶晉元帝時豫章內史梅賾雖得其本以獻而獨闕舜典一篇齊建武中吳人姚方興於大航頭得其書而奏之當時舉朝集議皆以為非逮隋開皇中學士劉炫乃取之而列於篇第故唐劉知幾作史通謂今人所習尚書舜典原出於姚氏焉亦嘆其傳者之不能無汨也辨儒者當缺疑嗚呼字經三寫烏焉成馬自秦之漢而書乃得於伏生之傳又自漢至晉而書乃出於梅賾之所獻又自晉至於齊而舜典一篇乃得於大衍市中又自齊而至於隋而舜典一篇乃得列諸篇第此豈特字經三寫而已哉則其簡編之差誤事辭之失次亦其勢然也今儒者不究其所以然之故乃欲於脫簡之中附會以為之説吾見其益惑矣然則如之何曰當以孔子多聞闕疑之言而求之則可三謨何以不稱典序曰少昊顓帝髙辛唐虞之書言常道也然五帝之書皆謂之典則虞書大禹謨臯陶謨益稷之屬亦應稱典所以别立名者何也蓋典者帝者之常道謨者人臣之嘉言言二典所載皆堯舜所行之事可以為萬世法者也至於禹臯陶益稷所載皆一時廟堂之上至誠相與獻替之嘉言比於帝者之制固不侔矣以其曰臣者直言皆稱謨而不稱典也疏氏以為主論帝德則以典為名其臣下所為隨義立稱得之矣序禹謨曷先臯陶臯陶矢厥謨禹成厥功帝舜申之作大禹臯陶謨益稷凡三篇同序正義曰篇先大禹序先言臯陶者臯陶之篇臯陶自先發端禹乃然而問之臯陶言在禹先故序先言臯陶其此篇以功大為先故先禹也益稷之篇亦是禹之所陳因臯陶之言而禹論益稷在臯陶謨後故後其篇也禹謨何以加大字正義曰餘文單稱禹而此獨加大者故解之禹與臯陶同為舜謀而禹功實大禹與臯陶不等史加大其功使異於臯陶於此獨加大字與臯陶並言故也謨謀釋詁文此三篇皆是舜史所録上取堯事下録禹功善於堯之知已又美所禪得人故包括上下以為虞書其事以類相從非由事之先後矣舜禹臯陶稱稽古孔曰堯舜考古以行謂之為典大禹臯陶考古以言謂之為謨典謨之文不同其目皆云考古故傳明言其意夫典謨聖帝所以立治之本雖言行有異皆是考法古道以成不易之則故史皆以稽古為端目但君則行之臣則言之以尊卑不同故典謨名異禹以為君而云謨者禹在舜時未為君也顧氏亦同此解臯陶德劣於禹皆是考古以言故得同其題目但禹能敷於四海祗承于帝臯陶不能然故此下更無别辭耳益稷何以不稱謨觀篇次始終文勢本無益稷之一篇後儒為之爾其文義相連皆帝與禹臯陶之言而不見有益稷所謨之言也雖下文有暨益暨稷之文亦非帝之與言益稷為之謨乃禹稱此二篇爾以是知其舊無有也往往出於後儒以篇次之長而又泥暨益暨稷之文分而目之以益稷也辨禹益稷事出一體陳曰二典史官勒成略備堯舜之終始至大禹臯陶謨益稷則聖賢為經國之逺圖雖閲百聖而可行也益稷獨不得為謨者大抵禹臯陶益稷之事皆出一體禹曰暨益奏庶鮮食又曰暨稷奏庶艱食鮮食則事出一體可知矣夏書禹貢於夏書首正義曰治水是堯末時事而在夏書之首禹之得王天下以是治水之功故以為夏書之首此篇史述時事非是應對言語當是水土既治史即録此篇其初必在虞書之內蓋夏史抽入夏書或仲尼始退其第事不可知也禹貢序不言作孔曰諸序皆言作百篇此序不言作禹貢者以發首言禹句未言貢篇名足以顯矣百篇之序此類有二微子作誥父師少師不言作微子仲虺作誥不言作仲虺之誥與此篇皆為理足而略之也禹貢治水順五行禹貢敘治水以冀兖青徐揚荆豫梁雍為次考地理言之豫居九州中與兖徐接境何為自徐之揚顧以豫為後乎蓋禹順五行而治之耳冀為帝都既在所先而地居北方實於五行為水水生木木東方也故次之以兖青徐木生火火南方也故次之以揚荆火生土土中央也故次之以豫土生金金西方也故後於梁雍所謂彞倫攸敘者此也與鯀之舊陳五行相去逺矣五服逺近差等正義曰甸侯綏要荒五服之名堯之舊制洪水既平之後禹乃為之節文使賦役有恆職掌分定甸服去京師最近賦稅尤多故每於百里即為一節侯服稍逺近者供役故二百里內各為一節三百里外共為一節綏要荒三服去京師益逺每服分而為二內三百里為一節外二百里為一節以逺近地較之其任不等甸服入榖故發首言賦稅也賦令自送入官故三百里內每皆言納四百里五百里不言納者從上省文也於三百里言服者舉中以明上下皆是服王事也侯服以外貢不入榖侯主為斥候二百里內徭役差多故各為一名三百里外同是斥候故共為一名自下皆先言三百里而後二百里舉大率為差等也辨貢文示略外之義禹之治水東及萊牧西及島夷可以及皮卉服之夷其迹逺矣至其弼成五服以王畿千五百里之外為要荒與患難之時急其憂平成之後從其便此孟子所謂以四海為壑也作禹貢者知之九州之域既載治水之所及五服之內復明王化之所止後世不能知之夷狄羈縻皆入中國圗籍則禹貢之書又所以示王者略外之文也五服貢賦之差王畿千里千里之內皆為天子治田而納其貢賦者也賦以逺近為差一差為一等自一而言之五等五百里納秷宜在五百里之下文互誤也何以言之總者總藁穗也秸者藁也為天子治田無止納藁秸之理説者謂并穗而納則與納總何異乎哉蓋總為芻秣之用秸為藁秸之設禮器管簟之安藁鞂之設則秸者施之為席也施之為籍必藁之柔韌者大抵禾之種不一惟柔韌者可以為席則賦之其餘則否此納秸所以輕於納總也三百里納秸則去其藁而納其穗四百里則又去穗而納粟五百里則又脫粟而納米其納愈逺其賦愈輕是以知納秷納秸之簡互誤也羣書考索續集卷四
