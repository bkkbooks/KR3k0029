  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0029_WYG_131-1a, image: WYG0937/WYG0937-0913c.png}
body:
  text: 羣書考索後集卷六十五宋章如愚編刑門士師之職掌五禁之法以左右刑布憲之職執旌節以布于四方而憲邦之刑禁治朝之禁令則宰夫職之王宫之戒令紏禁則宫正掌之至于大司冦掌建邦之三典以詰四方小司冦以八辟麗邦法皆古之法禁也穆王度作刑以詰四方墨劓之刑三千而大辟之屬止於二百而重刑之條目减於前而輕刑之條目增於舊也李悝在魏文侯時著法經六篇商君受之用以相秦蕭何在漢攟托秦法取其宜於時者作律九篇而叔孫通又益律所不及十八篇於是法禁為詳其後挾書之律則除於惠帝之四年收孥相坐之令則除於孝文之元年誹謗妖言之法則除於孝文之二年肉刑之除又見於孝文之十二年景帝之時復定箠令而笞者由得全武帝患民之犯法也於是張湯趙禹之屬條定法令作見知故縱監臨部主之法緩深故之罪急縱出之誅禁網浸密法令凡百五十九章後漢陳寵之刪漢法律而陳思奏二十三條為决事比例應劭刪定律令以為漢儀欲有廷尉板令春秋斷獄之篇唐之初興首以十二條掃隋暴至貞觀中房𤣥齡等始定律令格式髙宗時律學之士則有律疏而律於是而始詳長孫無忌有留司格散頒格元宗時盧懷慎有開元格後敕仁宗時有太和格後敕而勑于是而始詳宣宗時張戣又以刑律分類為門而附以格勑為大中刑律統類故律與格勑合而為一宋朝建隆命竇儀重定刑統而建隆編止四卷耳至淳化則不編勑而仁皇之嘉祐則又有編勑韓琦上之神宗元豐中則命有司編條勑令凡舊載于勑者多移之於令蓋違勑之罪重而違令之罪輕也髙宗則有紹興勑令孝宗則有乾道新書格法勑令世之議者曰古之法簡後之法詳愚以為法無惡於詳也聖人愛民之心實自詳者始古之盛時象以典刑而未始詳於條目及吕刑作以告四方而五刑之屬至于三千而不以為繁聖人豈不知其有異于古哉乃取而並列于四代之書者事愈繁而憂愈至也蓋自風俗日變而民之情僞愈紛而不能以自禁倘一出于簡略而不為之反覆以盡其情則民亦何從而知所畏避哉是以漢刑法志載鄭昌之疏曰明王刪定律令律令一定愚民知所避奸民無所弄矣唐史臣之制刑法曰古之為國者議事以制不為刑辟懼民之知爭也後世作為刑書惟恐不詳俾民之知所趨避也其為治雖殊而用心則一蓋皆欲民之無犯也愚嘗以是而求漢唐之法漢之法雖始于三章之法其施于漢初草創之時可也海內富庶之後三章之法其能禦之乎是以文景之世除肉刑定箠令輕重之數莫不備具正不敢以前日簡略待之也其後如所謂律本章句如所謂决事比例如所謂五曹詔書春秋决獄見于應劭之漢儀者君子不惡漢之至于苛唐之法雖始于十二條而十二條惟施於唐初草創之時可也海宇既平之後十二條其能盡之乎時以貞觀之時律令格式定于𤣥齡條目纎悉無不具載正不敢以前日簡略待之也其後如所謂開元舊格如所謂開元新格如所謂開元敕大中刑律統類見於史志所載者君子不惡唐之至于詳宋朝列聖相承愛民之心有加無已國初重定刑統於編勑四卷在太宗時則有太平編勑在淳化則曰淳化編勑在至道則曰續降編勑真宗時則有咸平編勑仁宗時則有嘉祐編勑神宗元豐中則命有司編修勑令凡有舊載之於勑者多移之于令蓋違勑之罪重而違令之罪輕此尤足以見祖宗愛民之心也在髙宗時則有紹興勑令孝宗時則有乾道新書今日金科玉條纂輯成書得非得于祖宗之意乎愚嘗聞之李悝著法經六篇蕭何叔孫通為漢律而馬鄭諸儒實為之章句元祐中劉忠肅上疏請修法令而乞選儒臣以成一代大典蓋律民之法正不當付之深刻寡恩之人而當本之以道德儒學之士今日編摩之官提舉之臣皆足以仰承上意矣然祖宗深㫖尤不可不念也雖然法不難於修而難於用二法之弊其權未必專在於有司而多於胥吏于今為甚焉舉天下一毫之事非金錢無以行之故凡賄賂之至者雖或自戾於法亦可僥幸而茍免徒手而來者雖明知不然而亦莫能直于有司是法本以求盡乎民情而其弊也反以濟猾吏之奸愚謂行今之法者當自去奸吏始不然纎悉備具不執于一是乃所以為舞文之具也吏何幸焉歐陽公曰法在簡簡則明行之在久久則信至其繁瀆則其精明之士不能遍習而吏得上下以為奸此刑書之弊也獄訟立政之書始言庶言庶獄庶慎而中則曰庶獄庶慎而庶言不與終則曰誤於庶獄而庶慎不與三變其辭而獄獨不敢去焉所以重其刑也司冦之職以五刑聽萬民之獄訟士師之職察獄訟之辭以斷獄弊訟自卿士之掌國中遂士之掌四郊而至于方士之掌都家皆斷其獄弊其訟于朝卿士司刑各麗其民以議獄訟士師受中而行之古人之意斷可見矣秦用商鞅連相坐之法造參夷之誅增加肉刑至于始皇専任刑罰衡石程書而赭衣塞路囹圄成市而天下亂矣漢髙帝約法三章文帝專務德化禁網疏闊用張釋之為廷尉罪疑者豫民是以刑罰大省至于斷獄數百有刑措風淳于繫獄竟感緹縈之言而遽釋犯蹕盜環之罪卒從釋之之議而遂減武帝興兵窮民犯法於是張湯趙禹之屬緩深故之罪急縱出之誅淮南衡山之獄死者數千人杜周為廷尉訟獄逮十餘萬宣帝時溫舒論治獄之吏以為秦風尚存於是選于定國為廷尉伯用為廷平齊居决事獄訟號為平矣而趙蓋韓楊之誅猶未免有間唐太宗天姿仁恕即位之初有勸以刑威肅天下者魏徴以為不可因言王政本于仁恩所以愛民佑俗之意太宗欣然納之遂以寬仁治天下而尤于刑獄為謹念肉刑之久廢而斷趾之刑不敢復也覽明堂灸經而鞭背之刑不敢用也三復奏亦詳矣而重之以五覆奏讞獄於大理亦足矣而又欲議之於中書省此所以四年之間斷獄止二十九人囚徒三百縱之復還此仁恕之效也垂拱以來欲以威制天下於是用周興來俊臣之徒開告密之門作訊囚之法如狄仁傑魏元忠之徒幾所不免自非徐有功之平恕廷爭獄事則唐之基業亦危矣元宗開元之初號稱治平人罕犯法刑部所斷天下犯罪才十八人及李林甫用事而獄訟自是而日繁矣宋朝太祖始用士人分治州縣之獄至太宗淳化中遣官諸路提㸃刑獄而又置審刑院于禁中防大理刑部之失凡獄必先三司然後關報審刑院事從中覆然後下丞相府丞相又以聞然後論刑其謹重之意如此羣書考索後集卷六十五
