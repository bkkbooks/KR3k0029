body:
  text: 羣書考索卷六宋章如愚撰六經門春秋類春秋始末孔子因魯史作春秋十二篇始隱公終獲麟而二百四十二年之行事備矣西漢藝文志曰仲尼有所褒諱貶損不可書見口授弟子弟子退而異言邱明恐弟子各安其意以失其真故論本事而作傳明夫子不以空言説經也春秋序曰春秋者魯史記之名也記事者以事繫日以日繫月以月繫時以時繫年所以紀逺近别同異也故史之所以記必表年以首事年有四時故錯舉以為所記之名也周禮有史官掌邦國四方之事達四方之志諸侯亦各有國史大事書之於䇿小事簡牘而已孟子曰楚謂之檮杌晉謂之乘而魯謂之春秋其實一也仲尼因魯史䇿書成文考其真偽而志其典禮上以遵周公之遺制下以明將來之法其教之所存文之所害則刋而正之以示勸戒其餘則皆即用舊史史有文質辭有詳略不必改也仲尼曰文王既沒文不在兹乎此制作本意也歎曰鳯鳥不至河不出圖吾已矣夫蓋傷時王之政也麟鳯五靈王者之嘉瑞也今麟出非其時虛其應而失其歸此聖人所以為感也絶筆於獲麟之一句者所感而起固所以為終也而微言獨傳於子夏太史公猶謂其不能贊一辭彼公穀之書方出於漢雜載尸子等之語而其師承豈獨專於子夏宜其駁而不純也初漢興張蒼賈誼張敞劉公子皆修春秋左氏傳賈誼亦為左氏訓詁授貫公以至賈護護授陳欽欽以左氏授劉歆漢初胡母生治公羊春秋與董仲舒同業公孫宏亦頗受焉其后有嚴彭祖顔安樂之徒顔之後有泠豐任公管輅冥都之學初瑕丘江公受穀梁春秋於申公孝武時江公時與仲舒議不如仲舒而丞相公孫宏本為公羊學卒用董生上因尊公羊家詔太子授公羊由是公羊大興太子既通公羊而後私問穀梁而善之宣帝即位聞衛太子好穀梁春秋以問丞相韋賢及夏侯勝史髙皆魯人也言穀梁子本魯學公羊乃齊學宜興穀梁時以穀梁並設上前上善穀梁甘露五年召五經名儒蕭望之大議殿中平公羊榖梁同異各以經處是非望之等多從穀梁由是穀梁之學有尹更始胡常申章昌房鳯之學漢初有公羊穀梁鄭氏夾氏四家並行王氏之亂鄭氏無師夾氏亡書而三傳所授並各有師自河間獻王獻左氏而劉歆之引傳文以本經之相發明由是章句義理備焉儒林贊曰初立博士惟春秋公羊而已宣帝世復立穀梁平帝時又立左氏然則左氏比三家為最後顯光武時諸儒廷議立左氏范升以為不宜立賈氏陳元請立博士賈逵言五經家皆無以證圖讖明劉氏為堯後者而左氏獨有明文范會自秦還晉其處者為劉氏明漢家堯後也故卒立博士雖選李孝封會封卒左氏復廢史通云和帝元興十一年鄭興父子請重立學官至魏晉漸行隋劉炫撰春秋述議專解杜預左氏傳唐孔頴達為正義陸淳撰集傳春秋纂例淳事趙匡匡師啖助淳傳二家之學館閣書目詁訓傳授公羊戴元傳序云子夏傳之公羊髙髙傳其子平平傳其子地地傳其子敢敢傳其子夀至漢景時夀乃與弟子胡母子都著以竹帛其傅董仲舒以公羊顯于朝又四傳至何休為經傳集詁其書遂傳鄭元曰公羊明讖休注引讖最多董仲舒少治春秋孝景時為博士本傳謹按春秋之文求王道之端得之於正正次王王次春春者天之所為也正者王之所為其意曰上承天之所為而以正其所為正王道之端云爾臣謹按春秋謂一為元之意一者萬物之所從始也元者辭之所謂大也謂一為元者視大始而欲正本也春秋深探其本而反自貴者始仲舒治國以春秋災異之變推隂陽所以錯行公孫宏治春秋不如仲舒以宏為從諛仲舒説春秋事得失有舉玉杯蕃露清明竹林之屬復數百篇十餘萬言並同上胡母生字子都齊人也治公羊春秋為景帝博士與董仲舒同業仲舒著其德年老歸教於齊齊之言春秋者宗事之公孫宏亦頗受焉而董生為江都相弟子蘭陵褚大東平嬴公廣川假仲溫吕步舒出本傳禇大至梁相出胡母生傳吕步舒丞相長史出胡母生傳嬴公守學不失師法為昭帝諫大夫授東海孟卿魯眭孟孟卿東海人出本傳魯眭孟為符節令坐説災異誅出胡母生傳嚴彭祖字公子東海下邳人也與顔安樂俱事眭孟孟弟子百餘人唯彭祖安樂為明贊問疑誼各持所見孟曰春秋之意在二子矣孟死彭祖安樂各專門教授由是公羊春秋有顔嚴之學彭祖為宣帝博士至河南東郡太守以髙第入為左馮翊遷太子太傅竟以太傅官終受琅邪王中出本傳王中為元帝少府家世傳業受同郡公孫文東門雲出嚴彭祖傳東門雲為荆州刺史坐為江賊拜辱命下獄誅注逢見賊而拜也出嚴彭傳公孫文為東平太傅同上顔安樂字公孫魯國薛人也眭孟姊子也官至齊郡太守丞後為仇家所殺安樂授淮隂冷音零豐次君淄川任公由是顔家有冷任之學出本傳冷豐為淄川太守出顔安樂傳豐授馬宮琅邪左咸同上任公為少府出顔安樂傳貢禹事嬴公成於眭孟至御史大夫出顔安樂傳禹授頴川堂溪惠同上疏廣事孟卿至太子太傅廣授琅邪管輅出顔安樂傳明春秋為九傳本傳管輅為御史中丞出顔安樂傳輅授孫寶同上堂溪惠授太山𡨕都同上𡨕都丞相史與管輅又事顔安樂故顔氏復有管𡨕之學出顔安樂傳孫寶為大司農同上左咸為郡守九卿徒衆尤盛官至大司徒同上王接注公羊接常謂何休訓釋甚詳而黜周王魯大體乖繆且志通公羊而往往還為公羊疾病接乃更注公羊春秋多有新義接惠帝時補尚書殿中郎穀梁穀梁受經於子夏為經作傳故曰穀梁傳傳荀卿荀卿傳魯人申公申公魯人也卒以詩春秋授瑕丘江公能盡傳之徒衆最盛本傳瑕丘江公受穀梁春秋及詩於魯申公傳子至孫為博士其後浸微惟榮廣皓星公二人受焉本傳榮廣能盡傳其詩春秋髙才敏捷與公羊大師眭孟等論數困之故好學者復受穀梁蔡千秋周慶丁姓皆從廣受出江公傳蔡千秋又事皓星公為學最篤宣帝即位問丞相韋賢等言穀梁子本魯學也公羊氏乃齊學也宜興穀梁時千秋為郎召見與公羊家並説上善穀梁説擢千秋為諌大夫給事中後有過左遷平陵令復求能為穀梁者莫及千秋上愍其學且絶乃以千秋為郎中戶將選郎十人從受同上尹更始本事蔡千秋為諌議大夫長樂户將又受左氏傳取其變理合者以為章句傳子咸及翟方進琅邪房鳯同上翁君本事蔡千秋江公傳周慶千秋死徴江公孫為博士江博士復死乃徴周慶丁姓待詔保宮少府屬官也使卒授十人自元康始講至甘露元年積十餘年皆明習同上丁姓字孫至中山太傅授楚申章昌同上申章昌字曼君姓申章名昌為博士至長沙太傅徒衆尤盛江公傳尹咸至大司農江公傳翟方進至丞相江公傳房鳯字子元不其人也琅邪之縣也其音基以射䇿乙科為太史掌故仕至青州牧始江博士授胡常常授蕭秉王莽為講學大夫由是穀梁春秋有尹胡申章房氏之學房鳯傳范寧徐邈注解范寧以春秋穀梁未有善釋遂沉思積年為之集解其義精當為世所重既而徐邈復為之注亦稱之左傳劉向别録左邱明授魯申魯申授吳起吳起授子期子期授楚人鐸椒鐸椒作抄撮八卷授虞卿虞卿作抄撮九卷授荀卿卿授張蒼漢興北平侯張蒼及梁太傅賈誼京兆尹張敞大中大夫劉公子皆修左氏春秋傳誼為左氏傳訓故授趙人貫公為河間獻王博士子長卿為蕩隂令蕩音湯授張禹禹與蕭望之同時為御史數為望之言左氏望之善之上書數以稱説後望之為太子太傅薦禹於宣帝徴禹待詔未及問會疾死授尹更始更始傳子咸及翟方進胡常常授黎陽賈護哀帝時待詔為郎授蒼梧陳欽以左氏授王莽至將軍而劉歆從尹咸及翟方進受由是言左氏者本之賈護劉歆前漢傳左氏者有張蒼賈誼尹咸張敞劉歆後漢有鄭元鄭衆馬逵馬融延篤彭仲博許惠卿服虔頴宛之徒各為訓詁魏世則董遇王肅為之注然其間有取公羊穀梁以釋左氏者惟晉世杜元凱專取邱明之傳以釋經義疏有沈休文蘇寬劉炫然沈氏於義例粗得於經傳極疏劉光伯於數經之內實為翹楚然好短左氏之失凡一百五十餘條杜預左傳集解晉杜預元凱集劉子駿賈景伯父子許惠卿頴子嚴之經分經之年與傳之年相附其發明甚多古今稱之然其弊則棄經信傳如成公十三年麻隧之戰傳載秦敗績而經不書以為晉直秦曲則韓役書戰時公在師復不告克捷有功亦無所諱於左傳之例皆不合不曰傳之謬而猥稱經文缺漏其尤甚者至如此汲冢師春杜預左氏後序云汲冡師春純集疏左氏傳卜筮事上下次第及其文義皆與左傳同師春純集者人名也春秋纂例文宗好左氏令翰林侍讀學士髙重分諸國名為書引名經傳要略藝文志有春秋纂例四十卷乃是服氏傳解何休嘗以春秋駁漢事六百餘條妙得公羊本意服虔又以左傳駁何休之所駁漢事六十條又作春秋左氏傳解于令升獨美左傳于令升史議歷詆諸家而獨歸美左傳云邱明能以三十卷之約括囊二百四十年之事斯蓋著作之良模也當春秋時諸侯大事見知於它國者或因假道而方聞或以同盟而始赴如秦燕之據有西北楚越之大啓東南人罕通於上國故載其行事多有闕如且其書自宣成已前三紀而成一卷至襄昭已下數年而占一篇是知國阻隔者記載不詳年淺近者撰録多備此邱明隨聞見而成傳何有故為簡約者哉注士燮十卷賈逵三十卷王肅三十卷董遇三十卷孫育二十八卷杜預四十五卷音曹髦三卷嵇康三卷杜預二卷李軌三卷荀訥四卷徐邈三卷義沈約蘇寬劉炫春秋三傳之學此在傳授之外者主父偃學春秋主父學長短縱橫術晚乃學春秋百家之言本傳夀王傳受春秋夀王詔使董仲舒傳受髙材通明本傳于定國學春秋于定國迎師學春秋身執經北面備弟子禮本傳文翁通春秋文翁少好學通春秋本傳雋不疑治春秋雋不疑治春秋為郡文學本傳馮奉世學春秋奉世學春秋涉大義鍾興受春秋鍾興從丁恭受嚴氏春秋本傳蓋文達明春秋蓋文達明春秋三家本傳春秋正經古春秋書春秋家者其先出於三代案汲冢瑣語記太丁時目為夏商春秋孔子曰疏通知逺書教也屬辝比事春秋教也知春秋始作與尚書同時瑣語又有晉春秋獻公十七年國語云晉羊舌肸習於春秋悼公使傳其太子左傳昭公二年晉韓宣子來聘見魯春秋曰周禮盡在魯矣墨子曰吾見百國春秋蓋皆指此也孔子生平昌鄉陬邑其先宋人也名丘字仲尼姓孔氏子曰弗乎弗乎君子病沒世而名不稱焉吾道不行矣吾何以自見於後世哉乃因史記作春秋上至隱公下訖哀公十四年十二公據魯親周故殷運之三代約其文辝而旨博故吳楚之君自稱王而春秋貶之曰子踐土之會實召周天子而春秋諱之曰天王狩于河陽推此以繩當世貶損之義行則天下亂臣賊子懼焉孔子在位聽訟文辝有可與人共者弗獨有也至於為春秋筆則筆削則削子夏之徒不能贊一辝弟子受春秋孔子曰後世知丘者以春秋罪丘者以春秋史記孔子世家太史公曰周道將廢孔子為魯司寇諸侯害之大夫壅之孔子知言之不用道之不行也是非二百四十二年之中以為天下表儀貶天子退諸侯討大夫以達王事而已矣春秋上明三王之道下辨人事之紀别嫌疑明是非存亡國繼絶世補弊起廢王道之大者也撥亂世反之正莫近於春秋文成數萬其指數千萬物之聚散在春秋故有國者不可不知春秋前有讒而弗見後有賊而不知為人臣者不可不知春秋守經事而不知其宜遭變事而不知其權為人君父而不通於春秋之義者必蒙首惡之名為人臣子者而不通春秋之義者必陷篡弒之誅死罪之名其實皆以為善為之不知其義被之空言而不敢辭故春秋禮義之大宗也出史記太史公自序夫子祖述堯舜之道而制春秋以文武之法度中庸注孔子曰吾志在春秋世衰道微邪説暴行又作臣弒其君者有之子弒其父者有之孔子懼而作春秋春秋天子之事也是故孔子曰知我者其唯春秋乎罪我者其唯春秋乎孟子孔子作春秋上揆之天道下質諸人情參之於古考之於今故春秋之所譏災異之所加也春秋之所惡怪異之所施也書邦家之過兼災異之變故春秋變古則譏之董仲舒策春秋有災異皆列終始推得失考天心以言王道之安危也翼奉傳春秋五始王褒聖主得賢臣頌共惟春秋發五始之要在乎審已正統而已注元者氣之始春者四時之始王者受命之始正月政教之始即位者一國之始春秋書王正次王王次春董仲舒傳詔曰春秋於春每月書王重三正謹三微也注三正者天地人之正三微者三正之始萬物皆微故王道取法焉漢章帝紀所書之王即平王也春秋序春秋一書書王正月者十有三王二月者二十一王三月者一十九無事有時亦冠以王之一字春秋始隱公杜氏謂平王東周之始王隱公遜國之賢君春秋侯國之數大數總百二十四國正國百十五附庸之國九爵姓具者四十七國有姓無爵者十有八國有爵無姓者一十七國爵姓皆無者三十三國盟者三十四國亡國五十有二諸侯有諡者一十二國會盟戰數盡春秋經傳凡二百二十五年會凡一百有二大會四十四小會五十八盟二百有八大盟六十小盟百四十八戰凡五十有八大戰五次戰二十九小戰一十四晉悼公九合諸侯襄五年會于戚會于城棣救陳也七年會于鄬會于邢邱同盟于戲十年會于柤會于伐鄭十一年盟于亳北會于蕭魚春秋釋例盟會圖長歷杜預參考衆家譜第謂之釋例虞摰賞之曰左邱明本為春秋作傳而左傳遂自孤行釋例本為傳設而所發明何但左傳預又作盟會圖春秋長歷備成一家之學此老乃成其長歷春秋條例晉劉實篤學尤精三傳辨正公羊以為衛輒不應辝以止父祭仲失為臣之節又撰條列二十卷春秋調人晉劉兆嘗以春秋一經而三家殊塗諸儒之議是非紛然乃思三家之異合而通之取周官調人之義作春秋調人七萬餘言皆論其首尾使大義旡乖時有不合者取其長短以通之春秋解詁何休覃思不窺門十有七年作春秋解詁春秋繁露漢董仲舒作説春秋事得失今其書有楚莊王玉杯竹林等五十六篇竹書紀年劉知幾子貺以竹書紀年序諸侯列會皆舉諡後人追修非當時正史如齊人殱于遂鄭棄其師皆孔子新意師春一篇録卜筮事與左傳合知按春秋經傳而為也唐書傳春秋未諭者十二趙孟以無辝伐國貶號為人杞伯以夷禮來朝降爵稱子虞班晉上惡貪賄而先書楚長晉盟譏無信而後列此論人倫臧否直道而行奚為齊鄭楚國有弒君各以疾遂皆書卒昭元年公子圍弒其君麋襄七年鄭子駟弒其君髠頑哀十年齊人弒其君悼公而春秋但書曰楚子卒鄭伯髠頑卒齊侯陽生卒疾惡之情豈其若是其所未諭一也按齊荼野幕之弒事起陽生楚靈乾溪之厄禍由常夀而春秋捐其首謀捨其親弒反歸罪於乞比齊陳乞楚公子比如是則邾之閽者私憾射姑行欺激怒傾瓶水以沃庭俾廢燼而爛卒奚不書弒其所未諭二也善惡必書斯為實録觀夫子修春秋多為賢者諱狄實滅衛因威恥而不書河陽召王成文美而稱狩書法如是豈不使人靡憚憲章其所未諭三也哀八年及十三年公子再與吳盟而皆不書桓二年公及戎盟戎實豺狼非我族類非所諱而仍諱其未諭四也諸國臣子非卿不書必以地來奔則雖賤亦志如陽虎盜入于歡擁陽關而外叛傳具其事經獨無聞何哉未諭五也案諸侯世嫡嗣業居喪既未成君不避其諱此春秋之例也何為般野之沒皆書以名而惡祝之殂直曰子卒其未諭六也君謂之弒卿士以上通謂之殺又春秋之例按桓二年宋督弒其君與夷及其大夫孔父僖十年又曰晉里克弒其君卓及其大夫荀息夫臣當為殺而稱及與君弒同科未諭七也邦之為孔醜諱之可也如公書宋葬公與吳盟為齊所止為邾所敗盟而不至會而後期並諱而不書豈非煩碎之甚且按汲冢竹書其晉春秋及紀之載事也如重耳出奔惠公見獲書其本國皆無所隱推魯春秋之紀其國也則未然未諭者八也夫子之修春秋皆遵彼乖僻習其訛謬凡所編次不加改者矣何為其間則一褒一貶時有弛張或沿或革曽無是正未諭九也定六年書鄭滅許以許男斯歸而哀元年書許男與楚圍蔡夫許既滅矣而能重列諸侯舉兵圍國者何哉未諭十也案虞自魯閔公以來通上國僖二年滅下陽已降漸見於春秋蓋始命行人自達於魯也而瑣語晉春秋載魯國閔公時事言之甚詳斯則聞事必書無假相赴當時國史他皆倣此至於夫子所修則不然凡書異國皆取來告而闕之用使巨細不均繁省失中未諭十一也君子以博聞多識為工良史以實録直書為貴而春秋記他國事必慿來者之辝而來者所言多非其實或兵敗而不以敗告或君弒而不以弒稱或秋葬而冬赴春崩而夏聞遂使真偽莫分是非相亂未諭十二也春秋虛美者五古者國有史官具列時事觀汲冡所記皆與魯史符同如殺其大夫執我行人鄭棄其師隕石于宋其三事並出竹書紀年唯鄭棄師出瑣語晉春秋諸如此句多是古史全文則知夫子所修但因其成事就加雕飾仍舊而已加以史䇿有缺文時月有失次皆存而不正而太史公云夫子為春秋筆則筆削則削子夏之徒不能贊一辝其虛美一也按宋襄公執滕子而誣之以罪楚靈王弒郟敖而赴之以疾亡春秋皆承告而書曽無變革求諸勸戒其義安在左丘明論春秋之義云或求名而不得或欲蓋而名彰善人勸焉其虛美二也春秋本以褒貶為主國語晉司馬侯對其君悼公曰以其善行以其惡戒可謂德義矣公曰孰能曰羊舌肸習於春秋至董狐書法而不隱南史執簡而纍進又寧殖出君而卒自憂名在䇿書故知當時史臣各懷直筆自夫子之修春秋也他邦之篡弒其君有三謂齊鄭楚已解於上本國之殺逐其君者七隱閔般惡祝五君被殺昭哀二主被逐莫不缺而不録而孟子曰孔子成春秋亂臣賊子懼無乃烏有之談歟虛美三也太史公曰孔氏著春秋隱桓之間則彰至定哀之際則微言其切當世之文而亡褒諱之辝也斯則危行言遜以免禍而孔子曰知我者其惟春秋乎其虛美四也案趙穿弒君而稱宣子之弒江乙亡布而稱令尹所盜此則春秋之世莫不微婉其詞而班固云仲尼殁微言絶觀微言之作豈獨宣父者其虛美五也五傳仲尼沒而微言絶故春秋分為五前藝文志邱明論本事而作傳及末世口説流行故有公羊穀梁鄒郟之傳四家之中公羊穀梁立於學官鄒氏無師郟氏未有書人執所見各不同也上文注夫子約魯史記而修春秋因謂之魯史春秋學開五傳者謂各專已學以相教授分經作傳凡有五家開則分也五傳者案漢書藝文志云左氏傳三十卷左邱明魯太史也公羊傳十一卷公羊子齊人名髙穀梁傳十一卷名赤魯人鄒氏傳十二卷郟氏傳十一卷孝經序注三傳總論漢胡母生董仲舒之徒出而公羊興申公蔡千秋之學盛而穀梁起業左氏者又有賈護劉歆之屬故得並立學官三家異論接迹而出是非互有所私注釋之意多緣其流杜元凱則拘以赴告何休則涉以讖偽范寧雖務探經而博采諸説然未盡詳唐世啖趙陸淳亦精焉春秋會義序杜諤作三傳異同汲冢書杜預以為所説與左傳符同異於公羊穀梁則知此二書近世穿鑿非春秋本意審矣莊公二十八年書臧孫辰告糴于齊左氏則曰禮也公羊則曰諱稱使以為臧孫辰之私行也穀梁則為內諱也惟唐趙氏譏其為政而無備得之矣莊公八年書甲午治兵左氏則曰治兵于廟禮也公羊則曰祠兵為久穀梁則曰治兵習戰繼之以善陳僖公三年書王正月不雨蓋春秋之義凡經時不雨告廟則書而左氏謂之不為災公羊謂之記異穀梁曰勤雨也誤矣三傳得失三家言其長則事莫備於左氏例莫明於公羊義莫精於穀梁以言其短則或失之誣或失之亂或失之鑿如載惠公元妃繼室及仲子之歸于魯則隱公兄弟嫡庶之辨攝位之實可接而知也此左氏敘事見本末處若夫來賵仲子以為預凶事則誣矣王正月之為大一統及我欲之暨不得已也此公羊之明於例也若夫母以子貴媵妾許稱夫人則亂矣假弟也弗謂弟公子也弗謂公子賤假而見鄭伯之處心積慮成於殺也此穀梁之精於義也若夫曲生條例以大夫曰卒為正則鑿矣武夷録左氏載諸侯之事或詳或略其尤詳者每出一師具列將佐或因廢興並舉六卿如子産晏嬰之流併其士族世家亦或詳備而夢卜雜占小説諷誦縱橫滑稽之言無所不有其於敘事可謂繁矣然以辭勝於事則其解釋經意乃或滅裂公穀二家隨經解釋事為之説比附日月曲生條例義有不合亦復強説踳駁不倫首尾矛楯雖其釋經密於左氏至其説之繁碎抑又過之蓋左氏之説經少則其失亦少二傳之解經多則其失亦多然則釋經之失少載事之得多左氏之學不賢於公穀乎了齋光武時尚書令韓歆上疏欲立左氏博士范升奏以左氏淺末不宜立且條左氏之失十四事啖助愛公穀以左氏解義多謬此嗜公穀者則指左氏之疵也范升奏左氏不可立而陳元詣闕上書以言邱明至賢親受孔子而公穀傳聞於後世賈逵亦條上左氏長於三傳者三十餘事謂左氏深於君父公羊多任權變此喜左氏者則譏二子之踳駁也左氏艷而富其失也誣穀梁清而婉其失也短公羊辨而裁其失也俗若能富而不誣清而不短裁而不俗則深於其道者也左氏公羊以正月為周正惟穀梁子以為夏正然晉杜預作長歷唐浮屠一行推步日食皆以為春秋用周正此又不能無疑也桓公十四年春無冰成元年二月無冰襄公二十八年春無冰經於春書無冰左氏公羊以為周正似亦有所合也然桓公八年冬十月雨雪果以為正則雨雪於秋八月也穀梁子之説似亦未可廢也三傳之失公羊之失謂求金求車為非禮而不知責諸侯之不貢也以大閲大搜為罕書是不知譏列國之僣天子也以築館為舍禮而不知仇敵之不可通也穀梁之失謂正月己卯蒸為不時是不知周之正月乃夏之十一月在建子之月而冬祭不為不時謂秋搜于紅以為正是不知搜春田而用於秋非正也不納子紏為內惡是仇敵可得而容也左氏之失以郎之狩而為禮是不知其廢國務而逺田獵也以築王姬之館為正是不知仇讎敵之不可交也四國伐鄭以為圍鄭狄人入衛以為滅衛經何以不書圍與滅也春秋左氏全綜劉兆又為春秋左氏解名曰全綜公羊穀梁皆納經傳中朱書以别之春秋釋疑汜育合三傳為之解注撰春秋釋疑春秋總例韋表微病諸儒執一概是非紛然著三傳總例通理經趣集傳例統啖助考三家短長縫綻漏闕號集傳復攝其綱條為例統弟子趙匡與助之子異裒録所為春秋集注總例請趙匡損益陸質纂會之號集傳統例墨守膏盲廢疾初李育少習公羊春秋知名太學嘗讀左氏傳雖樂文采然不謂得聖人深意以謂前世陳元范升之徒更相非折而多引圖讖不據理體於是作難左氏義四十一事建元初舉方正拜博士四年詔與諸儒論五經於白虎觀育以公羊義難賈逵往反皆有理證何休乃與其師羊弼追述李育之意以難二傳故作公羊墨守左氏膏育穀梁廢疾公羊公羊子名髙齊人也受經於子夏傳春秋者非一其中多非常異議不經之論至使賈逵以謂公羊可達左氏可興公羊春秋序何氏之意以為三科九旨是止一物若總而言謂之三科科者假也若析而言之謂之九旨旨者意也公羊疏公羊多任於權變後賈逵傳公羊辭義清雋斷決明審荀嵩傳穀梁穀梁子名淑字元始魯人也一名赤受經於子夏為經作傳故曰穀梁傳於時則接乎隱公兹因以託始該二儀之化育贊人道之幽變舉得失以彰黜陟明成敗以存勸戒拯頽綱以繼三五鼓芳風以扇遊塵一字之褒寵踰華衮之贈片言之貶辱過市朝之撻穀梁序穀梁善於經鄭元六藝論二傳五短穀梁公羊生於異國長於後來語地與魯國相逺論時則與宣尼不接安得以傳聞而與親見者先爭乎其短一也左氏述臧哀伯諌納鼎周內史美其讜言王子朝告于諸侯閔馬父嘉其辨説亦猶史記載樂毅李斯之文漢書朝錯賈生之筆觀二傳所載有異於此其録人言也語乃齟齬文皆瑣碎蓋彼得史臣之簡書此傳流俗之口其短二也左氏載諸大夫詞令行人應答其文典而美其語博而奧如僖伯諌觀魚富辰諌王納帶王孫論九鼎季札觀樂述近古則委曲如存如郯子官名季孫行父舉八元八凱魏絳引虞針子革誦祈招證近代則循環可覆二傳者記言載事失彼菁華尋源探本取諸胸臆理甚迂僻言多鄙野比諸左氏不可同年其短三也二傳雖以釋經為主其缺漏不可殫語其短四也論語有曰夫子不為衛君而公羊釋義反以衛輒為賢是違夫子之教其短五也左氏左丘明魯人也為魯太史出論語公冶長注伊川曰古之聞人也左邱明受經於仲尼以為經者不刋之書也故傳或先經以始事或後經以終義或依經以辨理或錯經以合異隨義而發其例之所重舊史遺文略不盡舉非聖人所修之要故也身為國史躬覽載籍必廣記而備言之其發凡以言例皆經國之常制周公之垂法史書之舊章仲尼從而修之以成一經之通體其微顯闡幽裁成義類者皆據舊例而發義指行事以正褒貶諸稱書不書先書故書不言不稱書曰之類皆所以起新舊發大義謂之變例然亦有史所不書即以為義者此蓋春秋新意故傳不言凡曲而暢之也其經無義例因行事而言則傳直言其歸趣而已非例也故發傳之體有三而為例之情有五一曰微而顯文見於此而起例在彼稱族尊君命舍族尊夫人梁亡城緣陵之類是也二曰志而晦約言示制推以知例參會不地與謀曰及之類是也三曰婉而成章曲從義訓以示大順諸所諱辟璧假許田之類是也四曰盡而不汙直書其事具文見意丹楹刻桷天王求車齊侯獻捷之類是也五曰懲惡而勸善求名而亡欲蓋而章書齊豹盜三叛人名之類是也推此五體以尋經傳觸類而長之附于二百四十二年行事王道之正人倫之紀備矣序左邱明因聖言以攄意托王義以流藻其淵源深大沉懿雅麗可謂命世之才國語左氏三長韓宣子見魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王春秋之作始自姬旦成諸仲尼邱明之傳知有筆削及發凡例皆得周典其長一也按哀三年魯司鐸宮名火南宮敬叔命周人出御書之時魯文籍最備邱明躬為太史博覽羣書如鄭書晉志之類凡此諸籍莫不畢觀每事皆詳其長二也論語子曰左邱明恥之丘亦恥之以同聖之才而膺授經之託上詢夫子下訪其徒凡所采托實廣見聞其長三也左氏敘事左氏之敘事也述行師則簿領盈視哤䀨沸騰論備大則區分在目修飾峻整言勝捷則收獲都盡記奔敗則披靡橫前申盟誓則慷慨有餘稱譎詐則欺誣可見談恩惠則溫如春日紀功烈則凛若秋霜發興邦則滋味無量陳亡國則凄涼可憫或腴辭潤簡編或美句入詠歌跌宕而不羣縱橫而自得若斯才者殆將工侔造化思涉鬼神著述罕聞古今卓絶於二傳之敘事也榛蕪溢句疣贅滿行華多而少實言拙而寡味元經子謂董常曰吾欲修元經稽諸史論不足證也吾得皇極讜義焉文中子王道篇春秋以天道終乎故止於獲麟元經以人事終乎故止於陳亡於是乎天人備矣出述史篇文中子曰天下無賞罰三百載矣自晉惠帝至隋開皇十年凡三百載元經可得而不興乎薛收曰始於晉惠何也子曰昔者明王在上賞罰其有差乎元經褒貶所以代賞罰也其以天下無主而賞罰不明也出王道篇子述元經皇始之事歎焉後魏初年門人未達叔恬曰夫子之歎蓋歎命矣書云天命不于常惟歸乃有德戎狄之德黎民懷之三才其捨諸出王道篇子曰元經其正名乎正帝名皇始之帝徴天以授之也皇始後魏道武帝號也始有中原建天子旌旗得正統此天授之也晉宋之王近於正體東晉至劉宋中國無真主則江南以為正體故曰近於是乎未忘中國晉宋皆舉兵中原有復一之制穆公之志也晉陽公作政大論言帝王之道元經所以帝元魏而斥齊梁蓋其志也齊梁陳之德斥之於四夷也以明中國之有代大和之力也後魏孝文太和元年宋蒼梧王元徽五年也時江南衰替中國始尊出問易篇薛生曰殤之後帝制絶矣元經何以不興乎子曰君子之於帝制并心一氣以待也傾耳以聽拭目而視故假之以歲時桓靈之際帝制遂亡矣文明之際魏制其未成乎魏文帝明帝未能平吳蜀一制天下太康之始書同文車同軌晉武太康元年平吳天下同一君子曰帝制可作矣而不充振故永熙之後君子息心焉曰謂之何哉太康十一年武帝崩楊駿矯詔輔政改元永熙賈后殺駿天下大亂元經於是不得已而作也出問易篇文中子曰春秋作而典誥絶矣元經興而帝制亡矣出問易篇文中子曰小雅盡廢而春秋作矣小化皆衰而天下非一帝續詩有大化小化亦大小雅之義也及其衰也四夷僣帝號故曰非一帝元經所以續而作者其衰世之意乎出禮樂董常曰元經之帝元魏何也子曰亂離斯瘼吾誰適歸天地有奉生民有庇即吾君也且居先王之國受先王之道豫先王之民矣謂之何哉董常曰敢問皇始之授魏而帝晉何也魏太祖入長安始有中原是歲丙申皇始元年當東晉孝武帝盡太元二十一年也然元經尚以安恭紀年子曰主中國者將非中國也我聞有命未敢以告人則猶傷之者也傷之者懷之也董常曰敢問卒帝之何也魏至孝文方得紀帝子曰貴其時大其事於是乎用義矣子曰穆公來王肅至而元魏達矣穆公虬宋順帝升明二年奔魏王肅字恭懿齊明帝建武四年亦奔魏並魏孝文時也出述史篇叔恬曰敢問元經書陳亡而具五國何也子曰江東中國之舊也衣冠禮樂之所就也永嘉之後江東貴焉晉懷帝永嘉二年琅邪王睿自徐州移鎮建業中國衣冠往依焉而卒不貴無人也齊梁陳於是乎不與其為國也及其亡也君子猶懷之故書曰晉宋齊梁陳亡具五以歸其國且言其國亡也嗚呼棄先王之禮樂而至是乎叔恬曰晉宋亡國久矣今具之何謂也子曰衣冠文物之舊君子不欲其先亡宋有樹晉之功有復中國之志亦不欲其先亡也故具齊梁陳以歸其國也其未亡則君子奪其國焉曰中國之禮樂安在其已亡則君子與其國焉曰猶我中國之遺人也書五國並時而亡蓋傷先王之道盡墜故君子大其言極其敗於是乎掃地而求更新也期逝不至而多為恤汝知之乎此元經所以書也出述史篇文中子曰元經有常也所正以道於是乎見義元經有變也所行有適於是乎見權常若五始不可移易是也變若與奪南北以尊中國是也權義舉而皇極立矣出魏相篇文中子曰春秋一國之書也其以天下有國而王室不尊乎故約諸侯以尊王政以明天命之未改此春秋之事也元經天下之書也其以無定國而帝位不明乎徴天命以正帝位以明神器之有歸此元經之事也出魏相篇董常曰執小義而妨大權春秋元經之所罪歟子曰斯謂皇之不極同上子曰元經之專斷蓋藴於天命吾安敢至哉天命未改於晉祚則元經斷之於江南天命有歸於中國則元經斷之於後魏魏相篇文中子曰褒表不及仁夀元經至隋開皇而止矣不及仁夀四年煬帝弒立叔恬曰何謂也子泫然曰仁夀大業之際其事忍容言耶出立命篇子曰吾於續書元經也其知天命而著乎傷禮樂則述章志正歷數則斷南北感帝制而首大熙元經首於大熙蓋感帝制之絶而特振之也尊中國而正皇始晉宋卒不振則歷數斷歸北朝以後魏孝文皇始年都洛陽始得中國也出關朗篇子謂叔恬曰汝為春秋元經乎春秋元經於王道是輕重之權衡曲直之繩墨也失則無所取𠂻矣出事君篇唐續春秋開元中裴光庭拜侍中兼洪文館學士又引夀安丞李融拾遺張琪著作佐郎司馬利賔直洪文館撰續春秋經傳自戰國訖隋請天子修經光庭作傳書久不就十六國春秋魏世黃門侍郎崔鴻乃考核衆家辨其同異除煩補闕錯綜綱紀易其國書曰録主記曰傳都謂十六國之春秋先是前趙有漢趙記平輿子和苞撰後趙有上黨國記趙書徐光等撰鄴都記趙紀燕田融等撰前燕有燕紀杜輔撰後燕有後書董統撰後申秀等取二燕合成一史南燕有南燕録趙郡王景暉撰漢有漢書華陽國志漢乃蜀李勢也二書並常璩撰漢書後入晉祕閣改為蜀李書前涼有涼國春秋索綬作涼記劉慶作涼書索暉劉昞作前秦有秦記車頻纂裴景仁刪後秦有秦史姚和都作夏有國書趙思羣等作西涼西秦北燕之史或當代所書或他邦所録至崔鴻乃著為十六國春秋虞氏春秋虞卿説遊之士困於梁乃著書上採春秋下觀近世由節義稱號揣摩政謀凡八篇以刺譏國家得失世傳之曰虞氏春秋吕氏春秋吕不韋為丞相是時魏有信陵楚有春申趙有平原齊有孟嘗皆下士喜賔客以相傾不韋以秦之強羞不如亦招士厚遇之是時多辨士如荀卿之徒著書布天下吕不韋乃使其客人人著所聞集論以為八覽六論十二紀二十餘萬言以為備天地萬物古今之事號吕氏春秋布咸陽市門垂千金其上延諸侯遊士賔客有客增損一字者豫千金吳越春秋趙景楚漢春秋陸賈漢春秋後漢春秋魏春秋孔衍魏氏春秋晉陽春秋孫盛篤學不倦自少至老不釋卷著魏氏春秋晉陽春秋詞直而理正咸稱良史焉既而桓溫見之怒謂盛子曰枋頭誠為失利何至如尊君所説若此史遂行自是當君門之事其子請刪改盛大怒諸子遂改之盛寫兩本寄於慕容雋太元中孝武博求異聞始於遼東得之考校多有不同書遂兩存晉漢春秋唐春秋韋述吳兢習鑿齒歸襄陽是時桓溫覬覦望鑿齒在郡著漢晉春秋以裁正之起後漢光武終晉愍帝於三國之時蜀以宗室為正魏武雖受漢禪晉尚為篡逆至文帝平蜀乃為漢亡而晉始興焉凡五十四卷後史凖左傳體晉樂資春秋後傳荀悅漢紀張璠後漢紀劉璠梁典孫盛春秋干寶晉紀裴子野宋略吳均齊春秋何之元梁典王劭齊志孔子沒經傳不作于時文籍唯有戰國䇿及太史公書而已至晉著作郎樂資乃追采二史撰為春秋後傳其書始以周平王續前傳魯哀公于後至赧王入秦又以秦文公之繼周終於二世之滅合成三十卷漢獻帝命荀悅為編年體依附左傳著漢紀三十篇自後漢至於髙齊如張璠孫盛干寶徐賈裴子野吳均何之元王劭等其所著書或謂之紀或謂之略或謂之志雖名各異大抵皆依左傳以為的凖羣書考索卷六
