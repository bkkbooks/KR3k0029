body:
  text: 羣書考索别集卷十六宋章如愚撰厯門古今厯堯時厯象之說厯是書象是器無厯則無以知三辰之所在無璣衡則無以見三辰之所在文公語録厯是一件大事厯是古時一大事故炎帝以鳥名官首曰鳯鳥是厯正也嵗月日時既定則百工之事可考其成同上先天後天之差厯數㣲𦕈如今下漏一般漏管稍澁則必後天稍闊則必先天未子而子未午而午同上當運乎天不當為天所運故嘗謂天之運無常日月星辰積氣皆動物也其行度疾速或過不及自是不齊使我之法能運乎天而不為天之所運則其疎宻遲速或過不及之間不出乎我此虚寛之大數雖有差忒皆可推而不失矣何者以我法之有定而律彼之無定自無差也同上古今厯法疎宻之差古人厯法疎闊而差少今厯法愈宻而愈差界限愈宻則差數愈逺何故以界限宻而愈越多也其差則一而古今厯法疎宻不同故爾看来都只是不曽推得定只是移来輳合天之運行所以當年合得不差明後年便差元不曽推得天運只是旋将厯去合那天之行不及則添些過則減些以合之所以一二年又差如唐一行大衍厯當時最謂精宻只一二年後便差同上厯代厯法疎宻太史公厯書是說太初然却是顓帝四分厯劉歆作三統厯一行大衍厯最詳備五代王朴司天考亦簡嚴然一行王朴之厯皆止用之二三年即差王朴厯是七百二十加去季通所用却依康節三百六十數推月大小之法問厯法何以推月之大小曰只是以每月二十九日半九百四十分日之二十九計之觀其合朔為如何如前月大則後月初二日月生眀前月小則後月初三日月生眀同前古人有一定之法今之造厯者無定法只是趕趂天之行度以求合或過則損不及則益所以多差因言古之鍾律紐等寸分毫釐絲忽皆有定法如合符契皆自然而然莫知所起古之聖人其思之如是之巧然皆非私意撰為之也意古之厯書亦必有一定之法而今亡矣三代而下造厯者紛紛莫有定議愈精愈宻而愈見差舛不得古人一定之法也並同上康節厯法宻堯舜以来厯至漢都喪失了不可攷縁如今是這大總紀不正所以都無是䖏康節厯十二萬九千六百分大故宻今厯家所用只是萬分厯萬分厯亦自是多了他如何肯用十二萬分同上律吕候氣之法今治厯家用律吕候氣其法最精氣之至也分寸不差便是這氣都在地中透上来如十一月冬至黄鍾管距地九寸以葭灰實其中至之日氣至灰去晷刻不差文公文集厯家算數之法天之外無窮而其中央空䖏有限天左旋而星拱極仰觀可見四逰之說則未可知然厯家之說乃以算數得之非鑿空而言也若果有之亦與左旋拱北之說不相妨如虚空中一圎毬自内而觀之其坐向不同而常左旋自外而觀之則又一面四逰以薄四表而止也同上厯法先論太虚厯法要當先論太虚以見三百六十五度四分度之一一一定位然後論天行以見天度加虚度之嵗分嵗分既定然後七政乃可齊耳同上天度嵗日之差按堯時冬至日在虚昏中昴月令冬至日在斗昏中壁而中星古今不同者盖天有三百六十五度四分度之一嵗有三百六十五日四分日之一天度四分之一而有餘嵗日四分之一而不足故天度常平運而舒日運常内轉而縮天漸差而西嵗漸差而東此即嵗差之由唐一行所謂嵗差者日與黄道俱差者是也古厯間易未立差法但隨時占候修改以與天合至東晉虞喜始以天為天以嵗為嵗乃立差法以追其變約以五十年而退一度何承天以為大過乃倍其年而又反不及至隋劉焯取二家中數為七十五年盖為近之書說厯法不容不變厯之名始于黄帝厯之算定于容成夫上稽天象下正人時非厯有所不可故有起之以律者矣累實於黄鍾是以有積之以數者矣較分扵絲毫是已又有驗之以象者矣作儀扵渾天是已然由古迄今言天者凡幾而造厯者尤非一家終不能保其厯之不變者厯法之不容不變也是故黄帝起辛夘顓帝用乙夘夏用丙寅殷用甲寅周用丁巳魯用庚子此則厯元之可驗者也夏四百三十二年日差五度商六百二十八年日差八度周訖春秋日差八度戰國及秦日差三度則厯差之可證者也斗分未易考也古厯謂在建星賈逵謂在牽牛中星范曄謂在斗十一度則言斗分者為不同日度未易稽也秦厯以孟春在營室五度三統以立春在危斗六度元嘉以正月中在室一度則言日度者為不一然厯取更厯之義故世代更厯羣言不厭其紛諸家不嫌其異否則治厯明時之語聖人何以特取於革哉嘗因是而為之統曰革之為言更也聖人序卦至四十九而特以革卦居焉是又發明大衍之數足以治厯也大衍演天地之數以大衍起數者自伏羲始以大衍名厯者自一行始夫衍者演天地之數也後世之厯多以古律起而一行大衍厯獨以易數起焉勾稽㣲抄分積毫釐盖有得於伏羲之遺畫君子安可以疎議一行哉今以大衍厯觀之一六為爻位之統五十為大衍之母合二始以位剛柔所以眀天一地二之數也合二中以通律吕所以正天五地六之數也合二終以紀閏餘所以窮天九地十之數也以生乗成吾扵六百而得天中之積焉以乗成生吾又扵六百而得地中之積焉自一六至五六一七至五七一八至五八一九至五九一十至五十生成相乗各有六百吾又扵是而得千二百之算焉一行固非拘于數者盖積黍之法可行而黍之小大則不可積斷竹之制可倣而孔之厚薄則不可均按尺之說可驗而尺之長短則不可證又孰若以無形而御有形以不物而制有物哉吁此大衍厯起於易所以為後世之精宻者歟不然唐自太初至麟徳凡二十三家何以獨稱美于大衍乎韓潁之至徳郭獻之五紀承嗣之正元又何以祖其故智乎然而大衍起算亦不専於易也盖嵗星得扵虞喜日食衝於姜岌定朔得於傅仁均九道得扵張子信而演紀之瑞日在虚一度又得於堯之甲子此尤足以見其通而不溺扵術數也閠法朔空餘分以為閏堯典云朞三百六旬有六日而今一嵗三百五十四日者積朔空餘分以為閠朔空者六小月也餘分者五日四分度之一也余大雅氣盈朔虚之日天道左旋日月亦只左旋但天行徤一日一夜而周常差過一度日月違天而退日是一日退一度月退十三度有竒周天三百六十五度四分度之一每嵗只有三百六十日餘了五日四分度之日又除小月計六日所以置閠所餘六日為氣盈所小六日為朔虚同上土圭天地四㳺之說周禮注土圭一寸折一千里天地四㳺升降不過三萬里土圭之影尺有五寸折一萬五千里以其在地之中故南北東西相去各三萬里問何謂四㳺曰謂地之四㳺升降不過三萬里非謂天地中間相去止三萬里也春游過東三萬里夏游過南三萬里秋游過西三萬里冬游過北三萬里今厯家算數如此以土圭測之皆合文公荅胡用之出日納月之法寅賔出日是推測日出時候盈餞納日是推測日入時候如土圭之法是也書說今人皆不識其制大司徒以土圭求地中今人都不識土圭鄭康成解亦誤圭只是量表影裏尺長一尺五寸以玉為之夏至後立表視表影長短以玉圭量之若表影恰長一尺五寸此便是地之中晷長則表影短晷短則表影長冬至後表影長一丈三尺餘今之地中與古已不同漢時陽城是地之中宋朝岳臺是地之中岳臺在浚儀屬開封府已自差許多文公語録土圭求天地之中自伏羲造盖天而土圭之制已寓至周公稽日景而土圭之名始立迨虞氏用九尺表而土圭之用始驗其所謂土圭者所以求土地之中而稽日景之永短也是故掌以司徒崇地官也縣以陽城辨中域也立表扵夏至之日示相等也置圭於晝漏之半取中正也然則天地之所合四時之所交風雨之所㑹隂陽之所和不以土圭驗之其可哉要必置中圭而後可以測日之中置南圭而後可以測日之南置北圭而後可以測日之北置東圭而後可以測日之東置西圭而後可以測日之西否則不足以辨千里之景也必扵平地立南表而後可以測南土之深望北極立北表而後可以測北土之深於東方立東表而後可以測東土之深於西地立西表而後可以測西土之深扵南表影末立中表而後可以測中土之深否則不足以辨五方之正也由是而推證之扵天則為春為夏為秋為冬驗之扵地則或東或西或南或北質之扵人則多暑多寒多風多隂舉造化之大皆不外扵尺有五寸之制又奚必候氣於緹室占象扵渾天定晦朔扵蓂莢㦲盖天地之升降不過三萬里自地以至日不過一萬五千里圭之景苟差一寸則地差千里冝矣故古人置五土圭而皆以千里為證是必有髙天下之見顔達龍漏刻察四時課六厯觀朱史漏刻經而知剏物之始觀陸倕新漏銘而知造器之難夫刻壺為漏浮箭為刻則于地四參以天一正所以察四氣之盈虚課六厯之疎宻也故制度肇剏扵黄帝水火沃視扵成周玉蚪増廣扵張衡分箭步占於宇文愷是皆制器之源流者也孫綽以之而著銘陸機以之而述賦宋景以之而作經殷䕫以之而垂法是皆著書以𫝊後者也然衛宏載𫝊呼之節較而未詳霍融叙分至古差詳而不宻則漏刻之難定如此漢以百二十刻為一晝夜梁以百八十刻為一晝夜則漏刻之難定又如此吁亦豈終扵難定哉特考訂者不精耳盖日有百刻分之以十二時則一時有八刻其餘四刻又均扵九十六刻之内則晝夜長短可以推測不然初正之法有所未知徒執𢎞度以究終始奚足以言刻漏哉正朔三代革命改正朔盖三代革命皆改正朔故嵗首之月不同夏以建寅商以建丑周以建子是謂三統而夏正上順天時下恊民事獨得其正夏小正即孔子所謂吾得夏時焉者語注三代三正之說王者受命而改正朔所以新民之視聽也故夏以建寅之月為正謂之人統商以建丑之月為正謂之地統周以建子之月為正謂之天統孔氏以為商湯始改正朔而周因之鄭氏以為自古帝王皆然盖不可考然以理求之疑孔氏為得之也語或問春秋孟子所言周正文定春秋說夫子以夏時冠月以周正紀事謂如公即位依舊是十一月只是孔子改正作春正月按今周禮有正月有正嵗則周實是元改作春正月夫子所謂行夏之時只是為他不順欲改從建寅如孟子說七八月之間旱這斷然是五六月十一月徒杠成十二月輿梁成這分眀是九月十月若真是十一月十二月時寒自過了何用更造橋梁文公語録三代更易正朔問子丑寅之建正如何曰此是三陽之月若秦用亥為正直是無謂同上春秋書月不著時春秋正朔事比以書考之凡書月皆不著時疑古史記事例只如此至孔子作春秋然後以天時加王月以明上奉天時下正王朔之義而加春扵建子之月則行夏時之意亦在其中文公與張敬夫諸書周正之說孟子所謂七八月乃今之五六月所謂十一月十二月乃今之十月九月是周人固已改月矣但天時則不可改故書云秋大熟未穫此即只是今時之秋盖非申酉之月則未有以見夫嵗之大熟而未穫也以此考之今春秋月數乃魯史之舊文而四時之序則孔子之㣲意伊川所謂假天時以立義者正此謂也如伊川說則是周正建子之月但非春而書春則夫子有行夏時之意而假天時以立義耳文定引商書十有二月漢史冬十月為證以明周不改月此固然矣然以孟子考之則七八月乃建午建未之月暑雨苗長之時而十一月十二月乃建戍建亥之月将寒成梁之候國語引時令曰十一月成梁又似併改月號月又何耶或是當時二者並行惟人所用但春秋既定國史則必用時王之正其比商書不同者盖後世之彌文而秦漢直稱十月者則其制度之闊畧耳三代正朔三代正朔以元祀十有二月考之則商人但以建丑之月為嵗首而不改月號時亦必不改也以孟子七八月十一月十二月之說考之則周人以建子之月為正月而不改時改月者後王之彌文不改時者天時不可改故祭祀田獵猶以夏時為正以書一月戊午厥四月㦲生眀之類考之則古史例不書時以程子假天時以立義之云考之則是夫子作春秋時特加此四字以繫年見行夏時之意若如胡𫝊之說則是周亦未嘗改月而孔子特以夏正建寅之月為嵗首月下所書之事却是周正建子月事自是之後月與事常相差兩月恐聖人制作之意不如是之紛更煩擾其所制作亦不如是之錯亂無章也文公荅林澤之年號後世年號不可廢上古結繩而治後世聖人易之以書契天下事有古未之為而後人為之固不可無者此類是也如年號一事古所未有後来既置便不可廢胡文定却以後世建年號為非以為年號之美有時而窮不若只作元年二年三年也此殊不然三代已前事迹多有不可考者正縁無年號所以事年統紀難記如云某年王某月箇箇相似更無理㑹䖏及漢既建年號於是事有條有紀屬而可記而今有年號猶自奸偽百出若只寫一年二年三年則官司詞訴簿厯慿何而决少間更無討理㑹䖏文公語録年號擇字之義向改慶元年號時先擬隆平某云向年改隆興時有人議破以隆字近降今既為說破則不可用又曰淳熙字本作純字人有言此字必改言未既而改淳字矣盖純字有屯字在傍又曰真宗是楊大年擬進豐亨字上曰做子不了不用以此觀之用字豈可輕也同上遁甲不待蓍龜之卜考黄帝内𫝊而知遁甲之始觀事物紀原而知遁甲之名盖自元女授黄帝法有九天九地八門六甲之衝而後始有遁甲之說其命名取義實以六甲相遁焉今之所謂三式者盖并太乙六壬是已故風后演為千八千局太公約為七十二子房定為一十八皆所以研窮遁甲之精㣲也伍子胥有文信都芳有經葛洪有圗又所以發眀遁甲之秘訣也推前事於既往定来事於将然盖有不待抵龜而决掛蓍而卜也故為之說曰讀武王之須臾不若讀榮氏之開山圗誦劉寳真之龜經不若誦杜仲之三元書閱王琛之風角六情訣不若閱僧一行之十八局記羣書考索别集卷十六
