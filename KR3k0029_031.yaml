body:
  text: 羣書考索卷三十一宋章如愚撰禮門禮書類自伏羲至黃帝五禮始具其唐堯則舜典云修五禮及命伯夷典三禮論語云商因於夏禮周因於商禮則夏商亦有五禮然王制云司徒修六禮以節民性明七教以興民徳六禮者冠昏䘮祭鄉相見也七教者父子兄弟夫婦君臣長幼朋友賔客也孔頴達之疏曰此六禮教皆商禮也周有五禮十二教焉由三代而上治出於一而禮樂達乎天下由三代而下治出於二而禮樂為虚名古者宮室車輿以為居衣裳冕弁以為服樽爵爼豆以為器金石絲竹以為樂以適郊廟以臨朝廷以事神而治民其嵗時聚會以為朝覲聘問歡欣交接以為射鄉食享合衆興事以為師田學校下至閭里田畆吉凶哀樂凡民之事莫不一出於禮由之以教其民為孝慈友悌忠信仁義者常不出於居處動作衣服飲食之間盖其朝夕從事無非在乎此也此所謂治出於一而禮樂達之天下使天下安皆習而行之不知所以遷善逺罪而成俗也及周之衰道散於異政之國法亡於殊俗之家君子不得以行禮小人得以行非禮故两觀大路朱干玉戚天子之禮在諸侯塞門反坫素衣朱襮諸侯之禮在大夫隋武子不知殽烝孟僖子不知相禮范獻子不知問諱魯不知尚羔則當時之知禮者盖亦鮮矣遭秦變古後之有天下者自天子百官名號位序國家制度宫車服器一切用秦間稍損益而大抵茍簡其朝夕從事則以簿書獄訟兵食為急曰此為政也所以治民至於三代禮樂具其名物而藏于有司時出而用之郊廟朝廷曰此為禮也所以教民此所謂治出於二而禮樂為虚名故自漢以来史官所記事物名數降登揖遜拜俛伏興之節皆有司之事耳所謂禮之末節也然用之郊廟朝廷自縉紳大夫從事其間者皆莫能曉習而天下之人至於老死未甞見也况欲識禮樂之盛曉然諭其意而被其教化以成俗乎嗚乎習其器而不知其意忘其本而存其末又不能備其所謂朝覲聘問射鄉食享師田學校冠昏䘮祭之禮在者幾何漢興叔孫通之綿蕝禮儀徒規當時之近功而其法失於太卑齊魯二生之論禮樂必期百年然後興而其言失於太髙賈誼有修禮之志而困於絳灌仲舒對䇿以教化為大務而上方銳意武功不暇禮文之事王吉欲舉明主於三代之隆願述舊禮明王制而宣帝不納至成帝時得古磬於犍為之水濵劉向請興辟雍設庠序陳禮樂而帝終不用世祖中興立明堂建辟雍顯宗躬行其禮宗祀光武於明堂飬三老五更於辟雍威儀既盛美矣然徳未流洽者禮樂未具羣下無所誦說而庠序尚未設之故也班固作禮樂志有曰今叔孫通所撰禮儀與律令同録藏于理官法家又復不𫝊河間獻王采禮樂古事稍稍増輯至五百餘篇今學者不能昭見但推士禮以及天子說義又頗謬異故君臣長幼交接之道寖以不章今大漢繼周未有立禮成樂此賈誼王吉劉向之徒所以發憤而増嘆也攷之於古有儀禮有周禮河間獻王之得先秦古書者有曰禮曰禮記禮者今之儀禮記者今儀之記今其篇曰士冠禮曰士昏禮曰士相見禮曰鄉飲酒禮曰鄉射禮曰燕禮曰大射禮曰聘禮曰公食大夫禮曰覲禮曰喪服禮曰既夕禮曰士虞禮曰特牲饋食禮曰少宰饋食禮曰有司徹凡十七篇者即儀禮也髙堂生𫝊士禮十七篇其篇與今儀禮同陸徳明賈公彦皆以為今儀禮藝文志所載則又有古經出於孔壁淹中者經七十篇記百三十一篇皆古禮也后倉則有后氏曲䑓記戴聖慶普實𫝊之在肅宗時則有曹褒新禮然次序禮事依凖舊典乃雜以五經䜟記之文在安帝時則有應劭漢宫禮儀故事然亦朝廷制度百官典式皆出於劭之所立魏以王粲衛覬集創朝儀而魚豢王沈陳壽孫盛雖綴時禮不足相變吳則丁孚拾遺漢事蜀則孟光許慈草建時制晋初以荀顗鄭冲撰為新禮叅攷古今更其節文而羊祐等並加刋定其後摯虞討論因以損益今曰决疑注者一是其遺文也江左刁叶荀崧補緝舊文附益朝儀蔡謨又踵修綴宋初因循並不重述齊之永明王儉注定五禮自梁以来始以其當時所行𫝊於周官五禮之名各立一家之學後魏孝文率由其舊章擇其令典朝儀國範煥乎有章北齊則楊休之元循伯熊安生後周則蘇綽盧辯宇文弼並習於儀禮以通時用隋文帝命牛洪辛彦之等采梁及北齊儀注以為五禮唐太宗時房元齡魏證因隋之禮増以飬老大射講武讀時令等為吉凶軍賔嘉之目而號曰正觀禮魏證又以大戴禮綜彚不倫而更作類禮髙宗又詔長孫無忌杜正倫之徒増正觀禮而為顯慶禮其文雜以式令而義府敬宗多希旨傅會議者非之詔復用正觀禮由是終髙帝時正觀顯慶二禮兼行而有司臨事連引古義與二禮參攷増損之無復定制元宗開元之十年王嵓請刪去禮記舊文而益以今事張說以為禮記不刋之書不可改易而正觀顯慶禮儀注前後不同宜加折𠂻以為唐禮於是撰述於徐堅李銳而定於蕭嵩王仲兵為大唐開元禮由是唐五禮之文稍備而用之雖時有損益之不能過也正元中王涇考次歴代郊廟㳂革之制於是而有郊祀録元和中韋公肅録開元以後禮文損益於是而有禮閣新儀王彦威采隋唐㳂革條次彚分而為元和新禮而又有曲䑓禮續曲䑓禮本傳故唐禮樂志曰考其文記可謂備矣以之施于正觀開元之間亦可謂盛矣而不能至三代之隆者具其文而意不在焉此所謂禮樂為虚名也我宋朝建隆聶崇義則有重修三禮圗唐張鎰三禮圗開寳劉溫叟之徒則有開寳通禮盧多遜則有通禮義纂雍熙邢昺則有分門禮選天禧王欽若李廸則有天禧大禮記天聖王皥則有禮閣新編景祐吳育則有太常新禮皇祐王洙則有周禮禮噐圗嘉祐歐陽脩蘇洵則有太常因革禮元祐陸農佃師則有禮象陳祥道則有禮書此皆本朝之言禮者也朝儀鄭康成之注玉藻曰天子諸侯皆有三朝曰外朝曰治朝曰燕朝盖天子有五門一曰臯門二曰庫門三曰雉門四曰應門五曰路門庫門之外者外朝也小司冦朝士掌之路門之外者治朝也宰夫司士掌之路門之内則路寢燕朝也太僕掌之小司冦之職曰掌外朝之政以致萬民而詢焉其位王南鄉三公及州長百姓北面羣臣西面羣吏東面小司冦擯以叙進而問焉以衆輔志而弊謀朝士之職曰掌外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後此豈非所謂外朝者乎宰夫之職掌治朝之法以正王及三公六卿大夫羣吏之位司士之職正朝儀之位辨其貴賤之等王南鄉三公北面東上孤東面北上卿大夫西面北上王族故士虎士在路門之右南面東上太僕太右太僕從者在路門之左南面西上孤卿特揖大夫以其等旅揖士旁三揖王還揖門左揖門右大僕前王八内朝皆退此豈非治朝者乎太僕掌正王之服位出入王之大命王眡朝則前正位而退入亦如之建路鼔于大寢之門外而掌其政以待逹窮者與遽令聞鼔聲則速逆御僕與御庶子王眡燕朝則正位掌擯相王不眡朝則辭於三公及孤卿此豈非所謂燕朝者乎然通典所載則曰周制天子有四朝一曰外朝在臯門之内二曰中朝在路門之外三曰内朝即路寢之朝四曰詢事之朝在雉門之外小司冦掌之所以每朝列位所向不同者皆以事異故變其位三公之位常北面不變者以三公内臣位尊故屈之使常北面其餘諸侯孤卿大夫皆以地道尊右故尊者東面卑者西面是以於外朝之時諸侯東面尊於孤卿也故於内朝孤東面尊於卿大夫也惟詢事之朝非常朝之限故不與三朝同此通典四朝之說也至於文王世子公族朝於内朝庶子掌之其在外朝司士掌之玉藻朝服以日視朝於内朝退適路寢聼政然則文王世子與玉藻所謂朝者諸侯之朝也盖至於漢亦有中朝外朝之名劉輔傳曰中朝左将軍辛慶忌右将軍亷褒等俱上書而孟康注曰大司馬左右前後将軍侍中常侍散騎諸吏為中朝丞相以下至六百石為外朝霍光謂車千秋曰今光治内君侯治外光為大将軍而曰治内千秋為丞相而曰治外則是有中朝外朝之别也然中朝外朝之名必始於武帝以後此漢初制也漢初唯有叔孫通朝儀采古禮與秦儀雜就令羣臣朝十月平明謁者治禮次第而入殿廷陳車騎設兵衛張旗志功臣列侯以次陳西方東鄉文官丞相以下陳東方西鄉廣行設九賔臚句𫝊百官執㦸𫝊警諸侯王以下至吏六百石以次奉賀御史執法舉不如儀者無敢讙譁失禮則漢之朝儀莫盛于十月武帝雖用夏正然每月朔至於十月朔猶常享會攷後漢志雖以每月朔嵗首為大朝賀舉觴上壽奏食舉之樂然每朔惟十月旦從故事者正以髙祖定秦之月元年嵗首也若高祖諱講朝儀於長樂武帝受計於甘泉顯宗朝正月於徳陽此漢朝㑹之所也班固東都賦曰春王三朝㑹同漢京是日也天子受四海之圗籍膺萬國之珍貢張衡東京賦曰每嵗元旦觀於殿下者數萬人賔臚𫝊命郎将司階天子穆穆南面然後司儀辨等以朝而天子禮以三揖詢問朝政行羣臣燕飲之禮以罷此漢元會之禮也魏王肅疏云漢初公卿皆親以事升朝故髙祖躬造反走之周昌武帝遥可奉奏之汲黯宣帝使公卿五日一朝成帝始置尚書五人自是陵遲朝禮遂缺觀此則是漢代五日一朝起自孝宣而罷於成帝耳世祖中興紀述其每旦視朝日昃乃罷曰每旦者世祖之勤勞也故其踈宻不同焉此漢常朝之制也以史攷之自蕭何置未央宫前殿而漢有宮闈之禁自叔孫通制朝會而漢有君臣之禮召文臣則見於宣室賈誼何武召武臣則見於武䑓李陵不下司馬門則有罰醉褻殿上則有劾嬖臣怠慢於朝會宰相得檄召而戮辱之則猶知宫闕之嚴而君臣之不相狎盖至見於大臺而願以常服朝踞厠視大将軍而加以不冠見則何褻之甚也彼其溺於晏安而憚於禮法不樂於外庭之檢束而便於内御之媟近故常朝之禮止於月朔此又其禮之變也蘇武之典屬國蕭望之賜爵闗内侯張禹之罷相就第孔光之為太師皆朝朔望此又漢世朝朔望之禮也石奮以上大夫禄歸老于家以歲時為朝臣馮叅以列侯奉朝請世祖中興不任功臣其加優異者皆以列侯奉朝請此又漢世奉朝請之制也若唐之朝儀冬正設仗以朝萬國則於含元殿盖唐之含元在周為外朝於唐為大朝也朔望起居則於宣政殿盖唐之宣政在周為中朝在漢為前殿於唐為正衙也隻日常朝則於紫宸殿盖唐之紫宸在周為内朝在漢為宣室於唐為上閤也夫上閤之制果何所始乎自東晉之太極殿有東西閤之名故唐置紫宸上閤所以法晉制也唐制凡遇紫宸則先立仗於正衙然後喚仗自東西閤門而入故謂之入閤自元宗以前猶未有此制也開元以後以朔望上食元宗欲避正殿遂移紫宸喚仗自閤門以入始有入閤之名自後行之至昭宗時失其夲旨乃以朔望御正衙而行入閤禮宋建隆元年行於文徳殿者皆是禮也盖宋朝之大慶即唐之含元宋朝之文徳即唐之宣政宋朝之紫宸即唐之紫宸也開寳中諸儒増附新禮遂載月朔入閤之儀又以文徳為上閤舛錯尤甚淳化中太宗嘗命張洎詳定儀注洎以為入閤之儀乃唐一時之禮非盛制也至寶元二年仁宗又以問宋庠庠言開元夲無此制請改舊儀歐陽脩與劉厰論入閤之儀亦以唐日入閤而御前殿自昭宗失之起居而廢正衙自明宗失之唐末或指朔望宣政為入閤尤為誤説至熙寧三年遂罷入閤行正衙之制而朝儀遂為萬世法若夫景徳之閤門儀制景徳之合班圗則定於梁顥李宗諤祥符之閤門儀制則定於陳彭年張知白祥符之重畫入閤圗則定於楊徽之張洎大禮慶賀合班圗則定於天禧紫宸垂拱立班圗則定於景祐至於康定之閤門儀制則定於章得象李淑天聖之元㑹禮則始於王曽此皆宋朝之朝儀也祭天地禮記正義曰夫天有六歲有九祭昊天上帝冬至祭之一也蒼帝靈威仰立春之日祭於東郊二也赤帝赤熛怒立夏之日祭於南郊三也黄帝含樞紐季夏六月土王之日亦祭於南郊四也白帝白招拒立秋之日祭於西郊五也黒帝叶光紀立冬之日祭於北郊六也王者各禀五帝之精氣而王天下於夏正之月祭於南郊七也四月龍星見而雩緫祭五帝於南郊八也季秋大享五帝於明堂九也以經攷之有虞氏禘黄帝而郊嚳夏后氏禘黄帝而郊鯀商人禘嚳而郊㝠周人禘嚳而郊稷鄭注云禘者冬至祭天於圜丘郊者夏至祭感生帝於南郊以禘嚳在郊稷之上稷卑於嚳故知禘大於郊爾雅云禘大祭也大祭莫過於圜丘故以圜丘為禘也夫圜丘之禮何如哉大司樂云冬日至祀天於地上之圜丘大宗伯曰以禋祀祀昊天上帝王服大裘禮神之玉以蒼璧配以帝嚳牲用犢其禮七獻其樂圜鍾為宫黄鍾為角太簇為徴姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣此圜丘之禮也其餘感生之禮何如哉大傳曰禮不王不禘王者禘其祖之所自出以其祖配鄭注云禘王者先祖皆感太微五帝之精以生者也故變郊稱禘因以祈穀其壇則名曰太壇祭法曰燔柴於太壇配以稷祀靈威仰牲用騂其樂大司樂云乃奏黄鍾歌大呂舞雲門以祀天神其禮亦以七獻禮神之玉四圭有邸此祭感生之禮也五時迎氣之禮何如哉月令於四立日及季夏土德王日各迎其王氣之神於其郊其配祭於五人帝春以太皥夏以炎帝秋以少昊冬以顓帝各於其方為兆於近郊名曰太壇禮神之玉則太宗伯青圭禮東方赤璋禮南方白琥禮西方元璜禮北方其禮亦以七獻其樂同於黄鍾此五時迎氣之禮也月令建巳之月大雩五方上帝其壇名曰雲業於南郊之旁配以五人帝命樂正習盛樂舞皇舞月令命有司為民祈祀山川百源百辟卿士有益於民者以祈穀實春秋曰龍見而雩此雩之禮也孝經曰宗祀文王於明堂以配上帝周制季秋大享於明堂考工記周人明堂此明堂之禮也地祇有三歲有二祭夏至之日祭崑崙之神於方澤一也夏正之月祭神州地祇於北郊二也大司樂云夏日至禮地祇於澤中之方丘注云主崑崙者其丘在國之北禮神之玉以黄琮配以后稷其樂則大司樂云凡樂函鍾為宫太簇為角姑洗為徴南呂為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地祗皆出可得而禮矣其神州地祇則王者所居五千里之内地也故不言丘而言郊其壇於北郊名曰泰折祭法曰瘞埋於泰折祭地也配亦以后稷其樂奏太簇歌應鍾舞咸池以祭地祗至唐開元亦夏日至祀皇地祇於方丘孟冬祭神州于北郊此皇地祇神州地祇之禮也盖五帝與昊天同稱帝而不與昊天同稱天猶諸侯與天子同稱君而不與天子同稱王周官祀五帝之禮有與天同極其隆有與天異以致其辨故皆禋祀皆服大裘此其所同也祈祀帝於圜丘兆五帝於四時郊此其所異也鄭氏之徒謂四圭之玉黄鍾大呂之樂夏正以祀感生帝於南郊蒼璧之玉六變之樂冬日至禮天皇上帝在北極者於圜丘天皇大帝耀魄寳也五帝太微之帝也分郊與丘以異其祀别四時帝與感帝以異其禮王肅嘗攷之矣然肅合郊丘而一之則是以五帝為人帝則非天有天地則有五方有五方則有五帝月令之五人帝伏羲神農黄帝少皥顓帝而已果以是為五帝則前此其無司四時者乎古者祀五帝必配以五人帝從以五人臣月令之五人臣者春勾芒夏祝融中央后土秋蓐收冬元冥春夏秋冬之臣各一人爾而冬有脩與熈者脩及熈為元冥蓋冬於方為朔於卦為艮於器有權衡於色有青黒則有脩熈冝矣更秦則興鄜密上下之四時以祠五帝至漢則増之以北畤以祀五帝漢之祀天不於南郊而於甘泉其祠地不於北郊而於汾隂河東以至壇有八觚席有六采樂有玉女車有鸞輅騂駒龍馬一切侈靡而匡衡劉向之徒邪正異同之論蠭起一時元始之間謬戾尤甚春則天地同牢於南郊冬夏則天地分祭於南郊光武兆南郊於洛陽之陽兆北郊於洛陽之隂其禮儀度數一遵元始之制而先王之禮隳廢殆盡唐禮樂志曰自周衰禮樂壞於戰國而廢絶於秦至漢䜟緯之書出以亂經自鄭元之徒號稱大儒皆主其說由是郊丘明堂之論至於紛然而莫知所止禮曰以禋祀祀昊天上帝此天也元以為天皇大帝者北辰耀魄寳也又曰兆五帝於四郊此五行精氣之神也元以青帝靈威仰赤帝赤熛怒黄帝含樞紐白帝白招拒黒帝叶光紀者五天也由是有六天之說後世莫能廢焉唐初正觀禮冬至祀昊天上帝于圜丘正月辛日祀感生帝于南郊以祈穀而孟夏雩于南郊季秋大享於明堂皆祀五天帝高宗顯慶中許敬宗等議以六天出於緯書而南郊圜丘一也由是盡黜鄭說而南郊祈穀孟夏雩明堂大享皆祭昊天上帝開元中王仲丘議以為宜於祈穀祭昊天而兼祭五帝既而蕭嵩撰開元禮雖未能合古而天神之位别矣嗚呼禮之失也豈獨緯書之罪哉在於學者好為曲說而人君一切臨時申其私意以増多為盡禮而不知煩數之為黷也古者祭天於圜丘在國之南祭地於方丘在國之北所以順隂陽因高下而事天地以其類也其方位既别而其燎壇瘞埋樂舞變數亦皆不同而後世有合祭之文則始合祭天地𤣥宗定開元禮天寳元年遂合祭天地於南郊是時神仙道家之說興乃建元皇帝廟凡有事于上帝則廟獻於太清朝享於太廟然後有事于南郊遂為故事杜甫獻三禮賦是也終唐之世莫能改為禮者可不謹哉宋太祖在位十有七年四行大禮乾德中歴六年而方再講開寳中更五歲而祭于洛太宗自雍熈而至淳化凡十年而一郊眞宗東封西祀往往率三年而一行大禮自仁宗以來三歳一郊始為定制其後分祭合祭之說議於元豐再議於元祐又再議於紹聖考之國朝會要在元豐時陳襄謂漢元始附會周官大合樂之說謂當合祭由漢歴唐千有餘年而以五月親祀北郊者惟魏文之太和周武之建德隋高宗之開皇唐睿宗之先天耳請先以夏日至祭地祇於方丘然後以冬至日祀昊天於圜丘王存則議欲以孟冬純隂用事之月有事於北郊張璪則欲以夏至日祭方丘陸佃則欲於冬至日親祠上帝於圜丘之北别祠於地祇此元豐之所議者然也在元祐時曾肇言南郊非欵地之處冬至非見地之時樂以圜鍾為宫其變以六非致地祇之音燎柴升禋非祭地之禮崔公慶則以漢武郊祀歌曰惟泰元尊媪神蕃釐㳙選休成天地並况皆合祭之辭蘇轍則以為欲當郊之歲先以夏至祀北郊有欲移夏至之祀行於十月者有欲三年祀天三年祀地皆不可行蘇軾則以為郊而肆赦非周禮也優賞諸軍非周禮也此皆不改而獨於地祇則曰周禮不當祭於圜丘此何義也此元祐之所議者然也在紹聖時黄履林希等議請罷合祭天地張商英言神宗謂合祭非古據經而正之元祐之臣乃率其私意此紹聖之所議者然也然國朝之制又有恭謝天地之禮始於大中祥符之間再行於天禧一如南郊之制仁宗皇帝於明道嘉祐初復即大慶殿行之如明堂故事因輟郊祀自是而後遂不復講眞宗恭謝大中祥符五年十月三日奉天書於朝元殿恭謝上皇大帝聖祖配位在東太祖太宗在西天禧元年既上玉皇聖號寳冊皆舉是禮然别立壇壝於國南而儀物禮制悉如郊祀視五年之制為加盛矣祥符六年八月詔入來春親詣亳州太清宫行朝謁之禮先於東宫置壇回日恭謝天地一如南郊之制羣書考索巻三十一
