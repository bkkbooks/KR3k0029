body:
  text: 羣書考索卷二十六宋章如愚撰禮門郊祀類仁宗景祐二年十一月合祭天地於圜丘三聖並侑慶厯四年十一月祀南郊始至壇下詔太常太樂六變無擅减節不御小次徹黄道以盡恭肅之志至和郊祀總儀至和二年判太常吕公綽以歲祀六十一禘祫二其薦祼興俯玉帛彛器菁芬醯醢歌奏集為郊祀總儀神宗熙寧元年十一月十七日上齋於郊宫罷臨觀闕幸苑囿翌日昧爽合祭天地於圜丘七年又親郊元豐分祭議元豐元年正月命樞宻直學士陳襄等詳定郊廟奉祀禮文二月六日襄言謹按周禮大司樂以圜鍾為宫冬至於地上之圜丘奏之六變以祀天神以函鍾為宫夏至日於澤中之方丘奏之八變以祭地祇夫祀必以冬日至者以其陽氣來復上天之始也故宫用夾鍾於震之宫以其帝出於震也而謂之圜鍾者取其形以象天也三一之變圜鍾為宫三變黄鍾為角太簇為徵姑洗為羽各一變合陽奇之數也祭必以夏日至者以其隂氣潜萌於下地之始也故宫用林鍾於坤之宫以其萬物致養乎坤也而謂之凾鍾取其容以象地也四二之變凾鍾為宫四變太簇為角姑洗為徵南吕為羽合二變合隂耦之數也又大宗伯以禋祀實柴槱燎祀其在天者而以蒼璧禮之以血祭貍沈疈辜祭其在地者而以黄琮禮之皆所以順其隂陽辨其時位倣其形色而以氣類求之此二禮之不得不異也去古既逺先王之法不行漢元始中姦臣妄議不原經意附㑹周官大合樂之說謂當合祭平帝從而用之故天地共犢禮之失自此始矣由漢歴唐千有餘年之間而以五月親祠北郊者惟四帝而已如魏文帝之太和周武之建德隋髙祖之開皇唐睿宗之先天皆希濶一時之舉也然而隨行隨失卒無所定垂之本朝不遑釐正請陛下每遇親祠之嵗先以夏至日祭地祗於方丘然後以冬至日祀昊天於圜丘國朝㑹要時王存議欲以孟冬純隂用事之月有事於北郊張璪欲以夏至日祭方丘陸佃欲以冬至日親祠上帝圜丘之北别祠地祗李清臣請且用舊儀元祐分祭議元祐四年三月禮部郎中崔公慶言謹按周頌昊天有成命郊祀天地也又周禮冬至祀昊天上帝於圜丘夏至祭地祗於方丘漢武帝郊祀歌曰惟泰元尊媼神蕃釐經緯天地作成四時又曰涓選休成天地並貺惟余有慕爰熈紫壇思求厥路又曰上天布施后土成穰穰豐年四時榮皆合祭天地於南郊之辭也當依舊合祭九月蘇頌曰伏見仁宗皇帝九郊皆合祭天地神宗四郊合祭惟元豐六年用禮文所議止祀上帝而北郊雖已從所議修定儀注未及親行今年南郊望准故事吕大防曰先帝因禮文所建議遂令諸儒議定北郊祀地之禮儀然未經親行今皇帝臨御之始當親見天地而地祗獨不設位恐亦未安况前代人君親祠並祭多縁於己事本朝祖宗則不然直以恩沛四海慶賚将士若非三嵗一行則國力有限宣仁太后曰大防之言是也蘇轍曰周禮二嵗遍祀天地皆王者親行自漢唐以來禮文日盛費用日廣故一嵗遍祀天地不可復行唐明皇天寳初始定三嵗一郊以致齋之日先享太廟然後合祭天地從祀百神所以然者蓋謂三年一行大禮若又不徧則人情不安此近世變禮非復三代之舊而議者欲以三代遺文參亂其間亦失之矣今别祭之議有行當郊之嵗皇帝先以夏日至祀北郊者有欲移夏至之祀行於十月者有欲三年祀天三年祀地者然夏至者暑雨方作以行大禮勢必不可夏至之禮行孟冬其為非周禮與冬至無異而數月之間再舉大祀事力何以堪若天地之祀互用三年則天地均為六年獲一祭而以地廢天以卑畧尊尤為不順十月禮部侍郎曽肇言南郊非欵地之處冬至非建地之時樂以圜鍾爲宫其變以六非致地祗之音燔柴升堙非祭地之禮不問神之享與不享姑欲便於人事不近於怠乎八年二月禮部尚書蘇軾言書曰肆類於上帝禋於六宗望於山川徧於羣神舜之受禪也自上帝六宗山川羣神莫不畢告而獨不告地祗豈有此理哉武王克商庚戍柴祭上帝也望山川也一日之間自上帝而及山川必無南北郊之别也而獨畧地祗豈有此理臣以此知祀上帝則并地祗矣何以明之詩之序曰昊天有成命郊祀天地也此乃合祭天地之明文議者乃謂合祭天地始於王莾以爲不足法臣竊謂禮當論其是非不當以人廢光武皇帝親誅莾者也尚采用元始合祭故事謹按後漢書郊祀志建武元年初制郊兆於洛陽爲圜壇八陛中又爲重壇天地位其上皆南鄉西上此則漢書合祭天地之明驗也又按水經注伊水東北至洛陽縣圜正東大魏郊之所准漢故事爲圜丘壇八階中又爲重壇天地位其上此則魏世合祭天地之明驗也唐睿宗時有事於南郊賈曾議曰有虞氏禘黄帝而郊嚳夏后氏禘黄帝而郊鯀郊之與廟皆有禘也禘於廟則祖宗合食於太祖禘於郊則地祗羣望皆合於圜丘以始祖配享蓋有事之大祭非常禘也三輔故事祭於圜丘上帝后土位皆南面則漢嘗合祭矣時禇元量郭山煇等皆以曾言爲然明皇天寳元年二月敕曰凡所祀享必當躬親朕不親祭禮將有闕其皇地祗宜就南郊合祭是月二十日合祭天地於南郊自後有事於圜丘皆合祭此則唐世合祭天地之明驗也國朝㑹要議者欲冬至祀天夏至祀地葢以爲用周禮也臣請言周禮與今禮之别古者一嵗祀天者三明堂大禮者一四時迎氣者五祭地者二祀宗廟者四凡十五者皆天子親祭者也而又朝日夕月四望山川社稷五祀及羣小祀之類亦皆親祭此周禮也太祖皇帝受天眷命肇造宋室建隆初郊先享宗廟並祀天地自眞宗以來三嵗一郊必先有事是應徧享太廟乃祀天地此國朝之禮也夫周之禮親祭如彼其多而嵗行之不以爲難今之禮親祭如此其少而三嵗一行不以爲易其故何也古者天子出入儀物不繁兵衛甚簡國財有節而宗廟在大門之内朝諸侯出爵賞必於太廟不止時祭而已天子所治不過王畿千里唯以齋祭禮樂爲政事能守此天下服矣是故歳歳行之率以為常至於後世海内爲一四方萬里皆聽命於上機務之繁億萬倍於前日力有不能給自秦漢以來天子儀物日以滋多有加無損以至於今非復如古之簡易也今所行皆非周禮三年一郊非周禮也先郊二日而告原廟一日而祭太廟非周禮也郊而有赦非周禮也優賞諸軍非周禮也自后妃以至文武官皆得廕補親屬非周禮也自宰相宗室已下至百官皆有賜賚非周禮也此皆不改而獨於地祗則曰周禮不當祭圜丘此何義也東坡議及國朝會要紹聖分祭議紹聖元年五月右正言張商英言神宗以歴代典禮訛謬謂合祭天地非古也據經而正之元祐之臣乃率其私意剗蕩前羙旣獲權且合祭指揮於前蘇軾又發六議於後太常博士陳祥道又以昊天有成命郊祀天地之詩爲合不可破之論或析祥曰審如子言則春夏祈穀于上帝豈以夏祈而合春乎般廵守而祀四嶽河海也詩曰允猶翕河豈以海嶽之祀而合於河乎材道屈無以對御史中丞黄履言南郊合祭自古無有止因王莽謟事無後遂躋地位同席共牢逮乎先帝始釐正之陛下初郊大臣以宣仁同政復用王莽私意合而配之瀆亂典禮引昊天有成命之詩夫昊天有成命郊祀天地詩之終篇雖不言地而用可通是以序兼言之亦猶天作祀先王先公般廵守祀四嶽河海詩不言海其指皆同由是推之天地不可合祀亦昭然矣後黄履林希等議請罷合祭天地自後間因大禮嵗以夏至之日親祠北郊其親祠北郊嵗更不親祠南郊國朝㑹要高宗紹興七年夏五月羣臣議南郊尊謚宜天錫之曰聖文仁德顯孝皇帝廟號徽宗紹興十二年冬十二月言曰謂南廵以來三載之祀獨於明堂而冬至郊天曠嵗未舉今旣治安望於來嵗用郊祀之儀庻應祖宗敬天故事詔禮部太常寺討論申省紹興十三年兵部侍郎程瑀言将來郊祀用國初大駕儀仗外見金闕象木革四輅望下所屬製造詔以纈代繡仍差兵部郎官錢時敏軍器監劉才郡主簿宋貺同檢視十一月庚申冬至各祀天地於圜丘以太祖太宗並配大赦天下紹興十六年十一月甲戍朝獻景靈宫乙亥享太廟丙子合祀天地於南郊大赦天下初上致齊而雪作及朝獻則杲日麗空至郊夕微隂登壇即霽三台星見於是秦檜言陛下好生之德旣定宇内乃不歸其聖歸功於天前郊祀之期年稽古制作禮樂大備討論行正悉出聖學有司效使惟謹曽不措一辭及将祀則至誠敢通天意響答雪致瑞於齋居之先日穿雲於朝獻之旦旣升紫壇則星宿明潤旋御端闕則霄漢廓清允謂先天弗違諸神受祀至於率履不越又可爲萬世法有司請設小次則拒而不答宫廟載葺旣畢則宸翰摽題皆極於恭恪此所宜書者也臣職在後親見不誣望宣付史舘詔從之紹興九年秋九月初著作佐郎劉章輪對言禮莫重於祭而郊廟爲尤重神宗元豐間嘗詔陸佃等於太常寺置局類編成書三十卷曰郊廟奉祀禮文今陛下以明聖之資當述作之任而縟儀未紀乞命官爲紹興郊廟奉祀禮文以續元豐之書上嘉納之十一月己酉朔宰執奏太常寺申将來郊祀恭謝禮畢合詣太乙宫行燒香之禮上曰此祖宗故事可行也庚寅朝獻景靈宫辛夘朝饗太廟壬辰冬至合祭天地於圜丘紹興二十二年十一月戊申冬至各祀天地於圜丘大赦天下紹興二十五年九月癸亥合祭天地於圜丘大赦天下紹興二十八年十一月己夘冬至合祭天地於圜丘大赦天下總說按丘之說互有不同歴代諸儒各執所見雖爭論紛起大凡不出二塗宗王子雍者以爲天體唯一安得有六圜丘之與郊祀實名異而體同所云帝者兆五人帝於四郊豈得稱之天帝一嵗凡二祭也宗鄭康成者則以天有六名嵗凡九祭葢以祭位有圜丘大壇之異同樂則黄鍾圜鍾之有差牲乃騂蒼色殊玉則四珪蒼璧祭名且同稱禋祀祭服又俱用大裘略舉其大綱不復悉數惟唐並行二禮可謂恊於時宜矣夏至祭方丘夏以五月祭地祗商以六月周制大司樂云夏日至禮地祗主崑崙也於澤中之方丘其丘在國之北禮神之玉以黄琮王及尸同服大裘配以后稷其樂則大司樂云凡樂凾鍾爲宫太簇爲角姑洗爲徵南吕爲羽靈鼓靈鼗絲竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地祗皆出可得而禮也其神州地祗謂王者所卜居吉土五十里之内地名也按皇地祗鄭𤣥以為崑崙即是土中髙者之稱至於神州但方五千里而已故不言丘而言郊其壇於北郊築土爲壇名曰太折祭法曰瘞埋於太折祭地也配亦以后稷其樂奏太簇歌應鍾舞咸池以祭地祗備五齊七獻其日王服大裘立於方丘乃奏凾鍾爲宫以下之樂以致其神訖王又親牽牲取血并玉瘞以求神謂之二始天地之祭惟圜丘方丘備此二始謂圜丘之先奏圜鍾爲宫之樂坎燎及玉幣也方丘則先奏凾鍾為宫之樂次則瘞埋血及玉幣二者正在祭之前故云二始尸前置玉幣等次玉酌泛齊以獻尸謂之朝踐次大宗伯酌醴齊攝王后之獻玉凡二獻也次薦熟畢王更酌盎齊以獻尸大宗伯酌緹齊以亞獻之所謂饋食之獻凡四獻也尸食訖王更酌泛齊以酌尸所謂朝獻大宗伯次酌醴齊以亞之所謂亞獻凡六獻也次諸臣爲賓酌沈齊以獻凡七也漢初因秦其梁山巫主祠天地武帝立后土祠汾隂睢音雖上澤中爲五壇宣帝修武帝故事間嵗正月至河東祠后土成帝建始初徙河東后土於長安北郊平帝立與天合祭南郊壇後漢光武營北郊祀地祗晉武帝并圜方二丘於南北郊更修壇兆其二至之祀合於二郊帝親祠於南郊自後方澤不别立時從有司議云古者郊丘不異唐制夏日至祭望地祗於宫城之北郊爲方丘壇孟冬祭神州於北郊開元中夏日至祀皇地祗於方丘以髙祖配立冬祭神州於北郊以太宗配其儀備開元禮通典五帝后稷文武配天天子四時迎氣祭五天帝於四郊各以當方八帝配之月令春帝太皥夏帝炎帝季夏帝黄帝秋帝少皥冬帝顓帝明爲配天及告朔而言之其雩祭亦然故月令云大雩帝爲命祀百辟卿士明五方人帝亦雩祀之其夏正郊感生帝周以后稷配之其於明堂總享五帝以文武配之故孝經說云后稷爲天地之主文王爲五帝之宗祭法云周人宗武王是也其配地之神孝經緯旣云后稷爲天地之主文王后稷配天南郊又配地北郊周人以嚳配圜丘亦當配方澤也禮記正義六天九祭地祗二祭天有六祭二嵗有九昊天上帝冬至祭之一也蒼帝靈威仰立春之日祭於東郊二也赤帝赤熛怒立夏之日祭於南郊三也黄帝含樞紐季夏六月土王之日祭於南郊四也白帝白招拒立秋之日祭於西郊五也黑帝叶光紀立冬之日祭於北郊六也五者各禀五帝之精氣而王天下於夏正之月祭於南郊七也四月龍星見而雩總祭五帝於南郊八也季秋大饗五帝於明堂九也地祗有二嵗有二祭夏至之日祭崑崙之神於方澤一也夏正之月祭神州地祗於北郊二也或云建申之月祭之與郊天相對冬至祭昊天上帝者春秋緯云紫微爲天帝北極耀魄寳是也其配之人以帝嚳配故祭法云周人禘嚳是也五帝名又出春秋緯文耀鈎五經通義曰天神之大者曰昊天上帝注云即耀魄寳亦曰天皇大帝亦曰太一禮記正義皇氏八祭皇氏云天有六天嵗有八祭冬至圜丘二也夏正郊天二也五時迎氣五也通前為七九月大饗八也雩與郊禖為祈祭不入其數三祭名五徳帝王制云天子將出類乎上帝宜乎社造乎禰注云帝謂五德之帝所祭於南郊者類宜造皆祭名正義云鄭注月令云孟春祈穀於上帝爲太微之帝注此上帝為五德如太皥五人之帝二文不同庾蔚曰謂太微五帝應於五行五行各有德故謂五德之帝木神仁金神義火神禮水神智土神信是五德也五帝主五行禮器注云五帝主五行即蒼帝靈威仰之屬分主五行各主七十二日故神靈圖云五帝東方木色蒼七十二日云云是也四立祭四天祭月令孟春之月其帝太皥其神勾芒立春之日天子帥三公九卿諸侯大夫迎春於東郊鄭注云迎春祭蒼帝靈威仰於東郊之兆也正義云按賈馬蔡邕皆爲迎春祭太皥及勾芒以月令上文云其帝太皥其神勾芒故也今鄭獨以爲蒼帝靈威仰者以春秋文耀句云蒼帝靈威禮器云饗帝於郊而風雨寒暑時是人帝何能使風雨寒暑時又詩及尚書云上帝皆爲天也故以靈威仰鄭注孟夏祭赤熛怒於南郊之兆孟秋祭白招拒於西北之兆孟冬祭黑帝叶光紀於北郊之兆禮記正義郊與祈榖同一祭月令孟春之月天子以元日祈穀於上帝鄭氏注云謂之上辛郊祭天也春秋傳曰夫郊祀后稷以祈農事是故啓蟄而郊郊而後耕正義云郊特牲云郊不言祈穀此經言祈穀不言郊鄭乃以爲二祭是一故此注謂以上辛郊祭天也鄭既以二祭為一恐人疑故引春秋傳以明之彼祈農事則此祈穀彼云郊而後耕此是祈穀之後即躬耕帝籍是祈穀與郊一也太微之帝月令祈穀於上帝鄭氏注云上帝太微之帝也正義云太微之帝者春秋緯云紫微宫為天帝太微爲天德中有五帝座是即靈威仰赤熛怒白招拒叶光紀含樞紐祈榖郊天之時各祭所感之帝商人則祭於叶光紀周人則祭靈威仰以其不定故總云太微之帝禮記正義皇天上帝為二神月令季夏之月合四監大合百縣之秩芻以養犧牲以共皇天上帝注云皇天北辰耀魄寳冬至所祭於圜丘也上帝太微五帝也正義云上帝太微五帝者按周禮司服云昊天上帝鄭以爲昊天上帝祗是一神北極耀魄寳也知此皇天上帝不是耀魄寳上帝爲太微者以周禮司服云祀昊天上帝大裘而冕祀五帝亦如之旣别云五帝故知昊天上帝亦惟一神此月令昊天上帝之下更無别五帝之文故分爲二月令正義又云皇天天皇上帝也上帝者靈威仰五帝也禮記正義五人帝及臣月令春三月並其帝太皥其神勾芒注云此蒼精之君木官之臣自古以來著德立功者也太皥伏羲氏勾芒少皥氏之子曰重爲木官正義云以此二人生時木王主春立德立功及其死後春祀之也按昭二十九年蔡墨云少皥氏有四叔曰重曰該曰修曰熈重爲勾芒該爲蓐収修及熈爲𤣥𡨕顓頊子曰犂爲祝融共工氏有子曰勾龍爲后土按楚語云重爲南正司天犂為火正司地所以又爲南正火正不同者葢重爲木正兼爲南正司天犂爲火正兼爲比正司地故韋昭注國語云火當爲比重旣顓頊時為南正又事髙辛按楚世家高辛氏誅重犂依帝繫顓帝髙辛各有一人爲帝則重旣事顓帝又事髙辛鄭則依命厯年以顓帝傳九世帝嚳傳十世則重何得事顓帝又事髙辛者師稱重人號雖子孫皆號曰重猶若羿爲堯時射官至夏后之相猶有羿也夏三月並其帝炎帝其神祝融注云此赤精之君火官祝融顓帝之子曰犂爲火官正義曰按昭二十九年左傳顓帝有子曰犂為祝融中央土其帝黄帝其神后土注云此黄精之君土官之臣黄帝軒轅氏也后土亦顓帝氏之子曰犂兼爲土官正義曰按昭二十九年左傳云共工氏有子曰勾龍為后土后土爲土官知此經后土非勾龍而爲犂者以勾龍初爲后土後轉爲社后土官闕犂則兼之故鄭注大宗伯云犂食於火土以宗伯則云社稷又云五社勾龍爲社神則不得又爲五祀故云犂兼也秋三月並其帝少皥其神蓐収注云此白精之君金官之臣少皥金天氏蓐収少皥之子曰該爲金官正義云按左傳昭元年昔金天氏有裔子曰昧爲元𡨕師生允格臺駘稱金天氏與少皥金位相當故少皥則金天氏也又左傳昭二十九年蔡墨云少昊氏之子該爲蓐収是爲金神冬三月並其帝顓帝其神𤣥𡨕注云此黑精之君水官之臣顓帝髙陽氏也元𡨕少皥氏之子曰修曰熈爲水官正義云按昭廿九年左傳云少皥氏官子曰修曰熈脩及熈爲元𡨕是相代爲元𡨕也祭有宗佐月令季夏畢山川之祀及帝之大臣天之神祗注云四時之功成於冬孟冬祭其宗至此可以祭其佐也帝之大臣勾芒之屬天之神祗司中司命風伯雨師也正義云前孟冬是祭先嗇祈農并祭五帝但孟冬其文不具則五帝爲宗大臣勾芒等爲佐孟冬祭司中等是孟月祭宗此月祭佐則天神人鬼山川等皆有宗有佐也羣書考索卷二十六
