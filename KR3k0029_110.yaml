body:
  text: 羣書考索後集卷四十四宋章如愚編兵門馬政類周官校人掌王馬之政辨六馬之屬種馬戎馬齊馬道馬田馬駑馬天子有十二間馬六種邦國六間馬四種家四間馬二種趣馬掌王良馬牧師掌牧地廋人掌十有二間之政教圉師掌教圉人掌養馬圉人掌養馬芻牧之事以役圉師馬質掌質馬馬量三物宣王修車馬以間夷狄齊景公有馬千駟衛文公秉心塞淵騋牝三千魯僖公牧于坰野是時韓之戰晉侯乘小駟鄭入也慶鄭曰古者大事必乘其産生其水土而知其人心今乘異産以從戎事必亂及戰晉戎馬還濘而止左僖十五年秦之先曰非子好馬周孝王使主馬於汧渭之間馬大蕃息由此強盛漢初民出算賦以備車馬武帝於口賦錢人增三錢已補車騎馬昭帝元鳳二年其令郡國毋斂今年馬口錢本紀又令民有車騎馬一匹者復卒三人食貨志是時有馬者間居則免三人之算有事則當三人之卒其制優異此內郡之制也至於邊郡則縱民蓄牧而官不禁文帝時廄馬止有百餘匹下取給於邊郡故云班氏居塞則致馬數千羣前漢書注班固序橋桃居塞則致馬千匹漢書宣曲任氏傳姓橋名桃是時內郡之盛則衆庶街巷有馬任陌之間成羣乘牸牡者擯不聚會邊郡之盛則三十六苑分置西北邊其良者以給乘輿如淳曰漢儀注大僕牧師諸苑三十六所分布北邊西邊以郎為苑監官奴婢三萬人養馬三十萬匹師古曰武景雲中之縣也養鳥獸者通名為苑故謂牧馬處為苑景帝紀中元六年至於武帝初年單于入塞見馬布野而無人牧者及武帝即位征伐四夷而馬尤甚往來食長安者數萬匹食貨志暨大將軍驃騎屢出而馬大耗乏死者十餘萬匹食貨志元狩五年天下馬少平牡馬匹二十萬帝紀如淳曰貴平牡賈欲使人競畜馬於是行一切之令封君以下至三百石吏以上差出牝馬食貨志所在置亭以蓄之則內郡庶民之有馬與望復卒難矣又令民得蓄邊縣者既使從君假馬母三歲而收其息什一則邊縣豪民欲廣蓄牧者難矣誅北地太守以下而令民得蓄邊縣官假馬每三歲而歸及息什一以除告緡用充入新秦中車騎馬乏縣官錢少買馬難得乃著令令封君以下至三百石吏以上差出牝馬天下亭亭有畜牸馬歲課息又匿馬者有罪有以列侯匿馬而腰斬者功臣表黎須侯召奴有以民或匿馬馬不具而長安令幾坐死者汲黯傳故馬益耗而不足用其內郡則籍吏民馬補車騎馬武紀太初二年五月籍吏民馬補車騎馬邊郡則發酒泉騾駝負食出玉門關武紀太初三年二師將軍三萬騎出酒泉末年輪臺之詔修馬復令又令郡國各上蓄馬方略以備邊闕則漢世之馬大略可紀矣監牧之地在樓煩孟康曰漢馬高五尺六寸齒未平不出關昭帝始元五年罷馬弩關是也後漢光武中興息馬論道時馬援好騎得駱越鑄銅為馬上之詔置宣政殿以為名馬式至唐而馬政尤詳焉其置官也領以太僕屬有牧監副監監有丞丞有主簿直司團官牧尉之屬歲課功進儀鳳中以李思文檢校隴右諸牧監使牧監有使始於此後又有廄間使又置四使東西南北其立廄也天子之御左右六間飛黃吉良龍媒騊駼駃騠夭苑總有十二間為二廄祥麟鳳苑其後又增飛龍廄自貞觀至麟德置八坊保樂甘露南浦潤北浦潤岐陽太平宜祿安定凡馬五千為上監三千為中監餘為下監後益置八監於鹽州三監於嵐州其牧養也初得隋馬三千於赤岸澤徙之隴右監牧之制始於此用張萬歲領羣牧自貞觀至麟德馬七十萬六千匹時天下以一縑易一馬又王毛仲掌之初監馬二十四萬後乃四十三萬玄宗嘉之自萬歲失職馬政頗廢其督責也凡馬生死歲終監牧使巡察以功過相除為考課景雲二年詔羣牧歲出髙品御史按察之其市馬也開元初國馬益耗薑晦晴以空名告身市馬於六胡州其後玄宗於受降城為互市以金帛市馬於河東朔方隴右牧之馬乃益壯動以萬計故秦漢以來唐馬最盛唐志宋朝太祖建隆三年十二月五代監牧多廢官失其守國馬無復蕃息時但有左右飛龍院上始置養馬二務歲遣中使詣邊州市馬自是間廄始充矣通略乾德六年八月庚午九月己酉十月辛酉上幸飛龍院太宗謂諸將曰諸軍養馬多有死損苟主將部轄有方躬親秣飼依時放牧豈有斃死之理李覺言戎人蓄牧旋逐水草不拘遊牝順其物性是以蓄滋太平興國二年六月乙卯幸飛龍院興國四年先是詔中使趙守倫優給價和市在京及諸州民間私馬於是得十七萬三千五百七十九匹本志載市馬事在興國四年按正月即出師恐在四年以前矣實録别本載趙守倫市馬數在四年十一月乙巳前今因之蓋市馬前此已及此乃上其所得之數也長編太平興國五年上既平太原遂觀兵范陽得汾晉首薊之馬凡四萬二千餘匹國馬增多乃詔於景陽門外新作四廄名曰天駟監左右各二以左右飛龍使為左右天廄使間廄使為崇儀使內廄馬既充牣始分置諸州牧養改崇儀使實録在甲申今從本紀并書之余靖言國家自來於河東陜西沿邊等處估賈畨馬自西賊不庭買馬數少不足國用太平興國六年詔曰歲於邊郡市馬償以善價內屬戎人驅馬詣闕者悉令縣次給食太平興國八年十二月己酉詔戎人鬻馬官取良而禁駑又禁民私市往來死者甚衆戎人少利由是歲入之數不充自今委長吏謹市馬之良駑者印以記之許民私市雍熙元年六月壬寅禁邊臣於境外寄土種蒔及所市蕃馬勿得虧其直雍熙二年改天廄院為騏驥院天駟監天廄坊自河北府洛陽至許州鎮監凡十八監雍熙四年詔北敵未平方資戰騎分遣使臣收買京城諸道私家所産之馬雍熙中太宗嘗幸天駟監閲馬會要端拱元年國子司業孔維上言欲請禁原蠶以益國馬太宗覽奏稱嘉付史館端拱元年國子博士李覺上言欲請冀北燕代馬之所生羌戎之所恃也故制敵之用實資騎兵為急議者以為欲國之多馬在啖戎以利使重譯而至焉然市馬之費歲益而廄牧之數不加者蓋失其生息之理也淳化二年上謂侍臣曰國家蓄馬備邊最為急務而諸州牧監歲多瘦死養飼失時枉致疾斃近令取數十槽致殿庭命圉人視其芻秣教以醫養之法庶革其弊會要淳化三年九月甲寅幸天駟監淳化五年初內侍趙守倫請以諸州牧龍坊畜牝馬萬五千匹逐水草放牧不費芻秣所生駒子可資軍用詔從之自是牧馬頗蕃息未幾守倫復上言歲約駒子等級遷擢否者罰亦如之以為懲勸駒子生即時付籍以聞庶其盡心養飼無有所隱詔並從之長編真宗咸平二年置羣牧司咸平三年羣牧司總內外馬政其後歲遣判官一人巡行諸監取孳生駒二歲已上者點印之左右騏驥院六坊監上留馬二千餘匹皆三月出就牧放秋冬而入其御馬凖備用者在京師景德四年上謂近臣曰今國馬蕃息當命內侍二人分掌左右監牧比來朱巽閻承翰専領此務頗為幹舉然思得大臣總制以集其事當命陳堯叟領之堯叟曰臣居宥密之職而與承翰聮事合避外議上曰國事戎馬之本係于樞司機要之運然當别置使名卿勿辭也寶訓自罷兵之後言者頗以國馬煩耗歲費縑繒雖市得尤衆而損失亦多知樞密院事陳堯叟獨謂羣牧之設國家巨防今愚淺之説以馬為不急之務則士卒亦當遣而還農也作羣牧議以獻勒石大名監乙巳置羣牧制置使命堯叟兼之堯叟初為羣牧使及掌樞密即罷其任長編大中祥符四年十一月壬午知河南府馮拯言官市芻粟望增給其直陳堯叟曰增直以市不若徙馬他所京師馬舊留二萬今留七千自餘悉付外監仍欲於七千之中更以四千付淳澤監歲可省芻粟三百餘萬若有給賜朝取夕至矣從之上又曰馬及十萬當且止也王旦曰聽民間畜養官中緩急以本直市之猶外廄爾且所費芻粟皆出兩稅少損馬食用資軍儲亦當世之切務馬知節曰馬多不精若十萬匹選可用者當得四五萬耳多畜駑弱大費愈甚上然之長編仁宗天聖四年九月戊申三司請市糴芻粟上因問輔臣諸坊監牧馬幾何王曽對曰當今比五代馬多數倍計芻秣費歲不下數百萬蓋措置利害失其要若以陜西蕃部入中馬立定數餘聽民間市易二三年間必大蕃息此與畜之外廄無異也上然之祖宗舊制以羣牧司總天下馬政其屬有左右騏驥院分領左右天駟監左右天廄坊其畜病馬有牧養上下監收兵校長有提舉指揮使副使員監之寮十將節級獸醫槽頭刷刨長行調上乘有小底諸監之在外者知州通判兼領之各據芻地列棚并課士卒春夏出牧秋冬入廄孶息有賞耗亡有罰其為條教甚備然馬之孶息不足以待國用常市於邊州長編嘉祐五年命翰林學士吳奎户部副使吳中復度支判官王安石右正言王陶同相度牧馬利害以聞時國馬之政因循不舉言者故為當有更革也長編丁度為羣牧使上言天聖中牧馬至十餘萬其後言者以天下無事遂廢八監陜西河東歲市馬一萬二百尤能補京畿塞下之闕自用兵數年所市馬比常歲特三之一請下令河東京東京西淮南籍丁壯為兵處有能蓄一戰馬者與免二丁仍不升户等以備緩急如此則國馬蕃矣事略宋祁上仁宗乞罷河東陜西馬禁民間與蕃落自相貨買英宗治平四年羣牧司言乞於河北河東陜西有都總管處皆置一監令陜西監牧司以所市馬約上京年額外餘分掇諸監則他日本路軍馬可以自辦詔遣官司逐路帥臣度地置監羣牧判官劉航河北屯田郎中孫圭河東監牧司判官李師錫陜西長編先是環慶經略路李肅之鄜延陸詵陜西制置李師錫並言六路元係草官地又密邇西界難以興置馬監詔陜西監牧司廣市善種務令蕃息長編唐介知太原請於交城縣置馬監詔比部員外郎崔台符相視得汾州故牧地三千餘頃其千二百餘頃民以租佃者令入租以給塞月芻豆已從介請置監自沙苑發牝馬五百匹往交城上謂文彥博曰馬政未盡善繇羣牧判官國兾蕃息以給騎兵遂以台符權羣牧判官台符蒲隂人也尋詔台符及劉航刪修羣牧司敕令以詳及宋朝故事增損刪定並奏取旨長編神宗熙寧元年九月宋朝初以左右騏驥院總馬政景祐中始增置羣牧使至是上以使領雖重而不躬巡故馬不蕃息乙酉乃詔更馬政分河南北置兩使以羣牧判官劉航崔台符為之勿𨽻羣牧後又詔屬樞密院所總牧地河南六監三萬三千頃河北六監三萬三千頃既而台符請以牧餘地募民耕出租從之通略熙寧三年陜西宣撫司言官司比乏良馬蓋以官價賤乞應買馬州軍增價市之於是詔惟騍馬不增外其秦渭原州德順軍見買大馬增價有差如價髙商人不願中官者聽民間收買長編熙寧七年曽孝寬言慶歷嘗詔河北州軍每户養被甲馬一匹乞檢會施行户馬始此熙寧八年詔沙苑監𨽻羣牧司餘入監及河南北兩監牧司並廢以中書樞密院言河南北三十二監自熙寧二年至五年歲出馬千六百四十匹可給騎兵者二百六十餘止堪給馬鋪兩監牧歲費及所占牧地約牧租錢總五十三萬九千六百三十八緡計所出馬為錢三萬六千四百九十六緡而以得不稱失故廢之以牧地租給市易務茶本錢外餘寄常平籍出息以給售馬之直長編文彥博言東平監天禧年曽廢末幾復置枉有勞費文彥博上神宗言賦牧地與農民斂其租課散國馬於編户責其孳息不知所賦之地皆可耕乎户配一馬縶之維之皆可蕃息乎坊監廄庫棚庌井泉官廨營房七八十年經畫成就罷廢後蕩然一空元豐三年正月羣牧司言岐廢監租課等錢共一百十六萬緡有竒詔羣牧使韓縝副使張誠一並賜銀絹各五百餘共賜錢五千緡令樞密院均給官吏長編文彥博言不用元豐時其弊乃見神宗嘆曰朕有愧於文彥博矣王圭曰罷祖宗馬監自是王安石上曰安石相誤豈獨此一事哲宗元祐元年二月兵部言畿甸馬監已行廢罷即合於諸路相度置監乞差官前去經畫詔庫部郎中郭茂恂往陜西河東路按行相度以聞長編元祐元年七月成都府利州路鈐轄司奏提舉陜西等路買馬監牧公事陸師閔奏勘會成都府利州路經制買馬司凖朝旨於雅州靈關嘉州中鎮等寨置場買馬數內雅州靈關寨並無蕃馬有無未曽置場外其嘉州中鎮寨雖曽置場亦無買到馬數今來未敢廢罷奉旨令成都府利州路經制買馬司凖朝旨於雅州靈關嘉州中鎮等寨置場買馬數內雅州靈關寨並無蕃馬有無未曽置場外其嘉州中鎮寨雖曽置場亦無買到馬數今來未敢廢罷奉旨令成都府利州路鈐轄司相度聞奏本司今相度雅州靈關嘉州中鎮等寨置場買馬並合廢罷從之長編紹聖元年正月太僕寺言馬政在朝廷最為重事要在蕃息不失武備詔令太僕寺講究的確利害條畫以聞長編高宗紹興二年上謂輔臣吕頥浩曰若復孳生馬監當就水草地是日條畫於饒州四望山等處以為牧地郡守帶提領選差使臣五員専管牧養事上曰兵以馬政為先唐開元間馬多至四十萬匹當時用一縑易一馬亦要得其人又如王毛仲陳馬若錦繡其盛如此聖政紹興七年廣西進出格馬十匹御批留一匹餘付殿前司上謂輔臣曰朕所留一匹幾似代北所生廣西亦有此馬則馬之良者不必西北可知上因論春秋列國不相通所用之馬皆取於國中而已今必於所産之地而求則馬政不修之故也長編紹興十九年進呈賞罰格上曰牧馬孳生為利甚博朕於近地親令牧養今已見效每歲進呈馬駒皆是好馬若得牧馬萬匹各分諸軍牧養數年間便可濟用既免綱馬逺來且官無給賞之費孝宗淳熙三年五月癸亥王淮進呈步軍司相度牧馬去處上曰前日牧馬官辭朕戒以愛護馬當如愛護已身飢飽勞佚各隨時調節若己身所不能堪者馬亦不能堪之但馬不能言告訴不得耳龔茂良等奏云陛下留神馬政曲盡物情不惟戒勑主者使之各各用心如聖言及此其仁蓋不可勝用矣聖政淳熙十五年趙汝愚奏黎州買馬乞照舊法不拘尺寸上曰祖宗時有西北馬可用黎馬止是羈縻今作戰馬如何不及格尺所乞難行凡市馬之處真宗咸平中河東則府州岢嵐軍陜西則秦渭涇原儀環慶階文州鎮戍軍川陜則益黎戎茂雅夔州永康軍皆置務遣官以主之歲得五千餘匹以布帛茶他物凖其直舊用銅錢給之長編國興八年有司言戎人得錢悉消鑄為器乃定此制其後諸州市蕃馬給直漸高務增數以為額課績景德中戎事已息因詔條約之於仁宗景祐三年中再定諸州買額正額外更有省買額者凡招馬之處秦渭階文之吐蕃回紇上府之黨項豐州之藏才族環州之白馬鼻家保家名市族涇儀延鄜火山保德保安軍唐龍鎮制勝關之諸蕃每歲皆給以空名勑書委六邊長吏擇牙吏入蕃招募詣京師至則估馬司定其直御馬有三等祗應馬引駕馬從馬其次給用又有十五等一簡中馬二不得支使馬三添價馬四國信馬五臣寮馬六諸班馬七御龍直馬八捧日龍衛馬九拱聖馬十驍騎馬十一雲騎馬十二天武龍猛馬十三雜配事馬十四雜使馬十五馬鋪馬凡馬之所出以府州為最蓋生於黃河之中子河汶者為善種出環慶者次之秦渭馬雖骨格高大而蹄薄多病文雅諸州為下止給本處兵級充鋪馬契丹馬骨格頗劣河北孶生昔曰本羣馬因其水土服習而少疾馬又泉福州及興化軍亦有州嶼馬皆低弱不堪披甲唯以給本道廂軍及江浙諸處鋪馬用之凡馬羣之號十七字左騏驥院捧日馬內瓦倒印驍騎馬內中溝橫印龍猛馬外尾側正印于字左騏驥院龍猛馬內溝正印雜使馬內溝橫印遞馬內瓦倒印右騏驥院雜使馬外瓦橫印遞馬外尾側橫印上字左騏驥院給諸班直諸軍員馬臨時印無定所立字右騏驥院給諸班直諸軍長行馬外人所印永字左騏驥院給諸班直諸軍長行馬外人所印又諸監三歲馬亦永字印瓦骨官字蕃戎所貢之馬及歲時收市之馬初用之牡印其項牝印其項諸監牧駒生歲亦如之凡馬骨相應圖法可充御馬者以官字印其項令圉師調習之吉字兩院諸馬自龍猛馬已上稍駔駿者印以備近臣中謝生辰所賜及㨂選支用又坊馬部至京選配他處亦以吉字印汙溝天字國信馬及諸班拱聖驍騎馬舊用天字印祥符中令以他字易之主字萬字與字來字小字官字自諸班馬而不參給諸用者無定額或以主字至小官字凡七等號印印之退字凡諸州軍和市馬不及等及選退斥賣者印之凡馬毛色之别九十一種叱潑之别八紅耳鴛鴦桃花丁香青騮騟紫騮青之别二純青護蘭白純白烏之别五純烏釣星歷面白腳護蘭赤之别五純赤釣星歷面白腳護蘭紫之别六純紫釣星歷面白腳緑鬃護蘭驄之别十一白驄釣星歷面白腳緑鬃護蘭駾之别十一白驄釣星歷面白腳并烏青花黃荏鐵護蘭赭白之别五純赭白釣星歷面白腳護蘭騮之别八棗金口燕子黃黑釣星歷面白腳騧之别六純騧繡膞釣星歷面白腳護蘭騅之别五純騅釣星歷面白腳護蘭駼之别八青赤紫黃釣星歷靣白腳護蘭馱䮧之别三駱起雲銀鍾驃之别七赤驃銀鬃黃釣星歷靣白腳護蘭北馬也以叱潑青白紫純色及緑鬃騮上驄赭驃騧白色赤為中荏騟驄駱䮂䮧為下廣鋭軍馬社河東兵廣鋭兵悉是土人其馬皆是本軍團申選良馬而置謂之馬社故廣鋭之馬壯勇而少亡失馬死則社中共市而補之其後陜西振武亦願依此例牧養三代之牧養有養於官有藏於民所謂藏之於民如丘甸歲取馬一匹之類是也前漢衛青去病之徒伐胸奴亦有所謂官馬私馬唐府兵未嘗給馬初不過給之以錢使其自置到來府兵法壞兵貧不足買馬然後方以監牧之馬給之漢有牧師諸苑三十六所馬至三十萬匹唐有八坊四十八監馬至七十萬六千匹此漢唐牧馬之大數也若善其牧養之方而馬之最盛者則莫如後魏蓋拓跋氏本是北人芻秣乃其常故馬至二百餘萬匹也宋朝馬政自太祖講求其制當時要委羣牧司自春放秋歸馬之出入莫不有法則熙寧間曽孝寬領羣牧奉行王荆公意於是罷羣牧吏不過欲區區小利自出買自此馬始衰却欲舉保馬户馬之法只為讀周禮不詳當時大為民害蓋井地不均兼并者衆什一之制未行受田之制未定却獨舉養馬之制豈不重困總論馬行天莫如龍行地莫如馬馬者甲兵之本國之大用安寧則以别尊卑之序有變則以濟逺近之行而兵之所恃以取勝也文王伐玁狁其詩曰四牡業業宣王之攘戎狄其詩曰我馬既間騋牝三千則以言文公之美牧于坰野則以為僖公之頌周官之制兵藏於民而六卿之馬其方乘其政官謂之司馬則以馬者政之所重也乘謂之兵乘則以馬者民之所出也辨其屬則有校人之官掌其牧馬則有牧師之職置醫巫所以攻其疾禁原蠶所以全其類此先王畜馬之術也林之竒文又論馬按周制掌政之官謂之司馬以馬者牧之有政也兵甸之法謂之乘馬以馬者牧之有法也有校人以掌其政有牧師以掌其牧有巫馬以養其疾有趣馬以簡其節日中而出日中而入此先王牧馬之術也文王之伐玁狁也其詩曰四牡業業宣王之攘戎狄也其詩曰我馬既同言衛文公者則曰騋牝三千頌魯僖公者則曰牧于坰野文景之時令民養馬復卒孝武之世平牡馬二十萬令人競蓄之故馬蕃於元狩元鼎之際梁武帝置牧於河西而善水草也故馬蕃於太通之時周之汧渭魯之坰野漢之樓煩唐之沙苑此西北牧馬之地也六朝置區於閩越藏之內地錢氏置監於婺女號為馬海此東南牧馬之地也又總論馬政有三牧之於官一也蓄之於民二也市之於戎狄三也宋內有天駟監外有十八監此官馬也民間蓄養指為外廄此民馬也沿邊算郡估買蕃馬此戎馬也然就是三者論之而監牧為尤重蓋官之馬多不専貴於民中國之馬多則不専倚於戎狄専責於民則民受其害専倚戎狄則戎狄享其利此纍朝於監牧之制所以必加之意也部轄有方秣飼以時時騰駒遊牝順其物性矣既置羣牧司又置羣牧使以大臣領焉何其重也乾德六年八月幸飛龍院九月又幸十月又幸一歲之間凡三幸焉亦何其重也夫惟待之也重故其視之也亦不輕蓄牧孶息自足國用民間與蕃落為市猶禁之而黎馬不及格尺亦收之不問焉何者其所資者輕也前天僖中嘗廢東平監矣未幾而復置且天聖中嘗廢八監矣未幾而復議已上逐改事並見前蓋所重在此則所輕在彼此君臣上下所以必於是拳拳歟熙寧大臣為謀不審聽曽孝寬之説而壞祖宗之制熙寧事見前賦牧地與農民散國馬於編户坊監廄庫棚庌井泉七八十年經畫一日廢罷民受其病官乏其利文彥博事見前中國不足求之夷狄於是茶馬之職置矣見上茶馬段元豐以後其弊歷見天子慨然追念舊臣聖言及此誰執其咎文彥博事見前吁市馬於戎猶可言也責馬於民不可為也不然則户馬之法罷而茶馬之職至于今不易亦必有説矣總論茶馬國初博易戎馬或以銅錢或以布帛國初河東川陜諸路買馬給以銅錢而戎人皆鑄錢為器興國五年乃以布帛凖其直或以銀絹元豐四年郭茂恂言欲専以茶博馬以彩帛博糧穀及以茶馬併為一司竊聞昔時亦用茶兼金帛近歲始専用銀絹及錢鈔等况賣茶買馬事實相須乞買馬通茶場從之以錢則戎獲其器以金帛則戎獲其用彼之器用日見其有餘而我之器用日形其不給二者皆非計之得也熙寧以來講摘山之利得充廄之良中國得馬足以為我利戎人得茶不能以為我害彼以食肉飲酪之性所嗜惟茶元符末程之邵言戎俗食肉飲酪故貴茶而病於難得願禁沿邊鬻茶以蜀産易上乘詔可未幾易馬萬匹四朝志雖奔風逐電之駿有所不靳以我蜀産易彼上乘此誠經久之策者是則始行李杞蒲宗閔分主之成都記熙寧七年詔李杞蒲宗閔經畫川茶充秦鳳熙河路博馬杞於秦州宗閔於成都置司後改名都大提舉茶馬事元豐四年郭茂恂言茶司既不兼買馬遂立法以害馬政乞併為一司從之其分之者非以官有其職足以辦事歟其合之者非以人自為見或至誤事歟官號都大提舉其職専也見上名兼三司判官其權重也熙寧十年李稷提舉茶場詔曰川茶一司創置雖久未能就緒李稷風力可仗然權勢輕小可依李杞例兼三司判官仍委舉劾官吏官屬自辟謹所擇也應産茶市馬之處官屬許自辟置官吏可劾伸其威也見上仲秋為市四月而止順其時也四朝史程之邵奏蜀茶馬歲以仲秋為市四月止秦司半歲事訖歸川順其事也乾道四年虞允文奏祖宗朝茶馬於秦州成都各置司居治各半年排發馬月分居秦司訖即歸川司發茶乞依舊制從之夫惟所創有其人所用有其人故市馬愈多有至萬匹者先帝市馬于邊有司幸賞率以駑駘充數紹聖中程之邵始精㨂汰又以羡茶轉入熙秦市戰騎故馬炙而茶息厚馬至萬匹茶息益厚有至百萬者舊蜀茶額二十萬至稷加為五十萬陸師閔代稷為百萬吁何其利之博也逮元祐改令諸法悉易而茶馬不廢有由矣司馬光元祐初相罷諸路鹽錢法皆復其舊獨川陜茶以邊用未罷及其後也奪於珠玉此制中廢建炎四年張浚奏大石進珠玉高宗曰大觀以來川茶不以博馬唯市珠玉故馬政廢缺中興以來法度修舉故博馬之司置於紹興之四年威茂之場置於紹興之五年茶馬之官又置於紹興之七年紹興四年從關師古之請以乏戰馬始令四川宣撫司支茶博馬五年密院言已於永康軍威茂州置場七年宰臣趙鼎言有旨復置茶馬言凡三等上曰考其資歷命之至于乾道川秦兩司凡得九千餘匹內而三衙外而江上咸足其用矣陳彌作言川秦兩司文黎珍敘南平長寧六州馬五千餘匹應副江上諸軍階州之峯貼和州之宕昌兩處馬四千餘匹應副三衙吾然後知此制之有益於軍無害於國之為經久可用也或者猶曰宋公祁嘗請損馬而益步祁言天下久平馬益少臣請損馬而益步我能用步所長雖契丹多馬無所用之田公况亦嘗請益步而減騎况請料邊兵益步而減騎但五分得一足矣以一騎之費可贍步兵二人而又寬括馬之擾吾用中國所長而已而何以馬為嗟夫二公所言權宜之説也茍以我所長合夷狄所長不亦萬全之策乎抑猶有説焉有市馬之政有養馬之政養之不至雖市之多無益也嚴監牧之責逐水草之利牝馬二萬歲獲萬駒馬安得而不繁夫苟離其牝牡飼以枯稿是馬之生性滅矣何以能育此正李公覺所謂貴市於外夷而賤棄於中國也端拱元年李覺言市易之馬至于中國縶之維之飼以枯稿析牝牡制其生性因而減耗是貴市於外夷而賤棄於中國也宜減市馬之半直賜蓄牧之將卒大率牝馬二萬而駒收其半可歲獲萬匹十數年間馬必倍矣周官一書於馬政為詳蓋以是觀之林駉文羣書考索後集卷四十四
