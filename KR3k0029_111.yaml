body:
  text: 羣書考索後集卷四十五宋章如愚編兵門車戰書曰武王戎車三百兩周禮車僕有戎路廣車闕車苹車輕車大司馬教兵之法易野車為主車戰之法每車用甲士三人步卒七十二人行則以車為衞居則以車為營一車之間又有猝車詳見後周禮車僕曰凡師共革車各以其卒是也武王問太公曰戰車奈何太公曰車貴知地形凡車之死地有十勝地有八詳見後春秋初鄭伯之車僨于濟隠三年自後鄭以徒兵從事而於車或缺隠四年曲沃武公伐翼逐翼侯於汾濕驂絓而止桓四年邲之戰楚君之戎分為二廣晉申公巫臣于吴教吴乗車由是吴通於上國成七年齊侯伐衞有先驅有申驅有貳廣有啓左翼曰啓有朕有大殿晉中行穆子禦狄于太原將戰魏舒曰彼徒我車所遇又阨乃毁車以為行大敗翟人而車戰漸廢戰國以來乃用騎兵而車猶有間見者晁錯以輕車突騎為中國之長技衞青與匈奴戰以武剛車自環為營李陵對單于亦以大車為營此車之用於西都者也後漢光武造戰車可駕數牛上作數櫓置於塞上以拒匈奴靈帝之時陽璇為零陵守制車數十乗以禦賊此車用於東都者也曹操新書攻車七十五人守車一隊共二十五人田豫與虜戰亦用車而戰晉馬隆征羗八陣圗用扁廂車地廣則鹿角車營路狹則為木屋施於車上此車之用於魏晉者也劉裕伐南燕亦以車四千乘為左右翼朱超石戰河上以車百乗抱河為却月營魏大武北伐蠕蠕用車十五萬兩隋諸將與突厥戰皆戎車步騎相㕘與鹿角為方陳此車之用於南北者也李靖與太宗論兵法曰號蕩騎兵也戰鋒隊步騎相半也駐隊兼車乗而去也臣討突厥越險數千里此而未甞敢易則唐固甞用車矣𤣥宗時哥舒翰節度隴右造戰車蒙以狻猊則唐又甞用車矣至於房琯之敗遂以為用車不若用人與騎之愈抑不知古者以馬而琯以牛車二千乗馬步夾之非其素習則敗之固宜此非車之不利而用之者非其道也宋至和中韓琦言郭固造戰車約以古制其車前銳後方上置七鎗以為前後二拒行載兵甲止為營陳春秋如韓原之戰輅秦伯將止之鞌之戰韓厥中御而從齊侯鄢陵之戰郤至遇楚子韓厥從鄭伯邲之戰楚子乗廣以逐趙旃用車以戰而使敵人便得與吾元帥相接則是環衞之車不設也葢古者車戰之法前後整齊必有䕶衞前後行列元帥未易動揺也至春秋中列國用之往往軍伍不整而元帥每以車逐利混然左右率無定法故敵人得以及之終春秋之世致敗者未有不由車戰之無法而輕動揺也惟繻葛之戰二拒用事若原繁髙渠彌以中軍奏功未甞輕動揺深得古法車戰再攷車戰之法自夏啓誓御馬以正而勝有扈文王以戎車既駕而服玁狁武王戎車三百兩虎賁三千人書牧誓宣王以其車三千威蠻荆詩春秋魯僖公攻伐淮夷戎車孔博衞文公元年革車三十乘季年乃三百乗宋華元甲車四百六十乘魯威公之㑹諸侯有兵車有乗車楚子為乗廣三十乘分為左右廣雞鳴而駕日中而說左則受之日入而說是皆用車而制勝也漢夏侯嬰破李田軍雍丘以兵車趣戰疾破之本傳灌嬰以御史大夫將車騎别追項籍至東城破之本傳武帝以輕車將車公孫賀出雲中本紀衞青令武剛車自環為營而縱五千騎往當匈奴霍去病傳唐裴行儉突厥阿史徳温傳反行儉詐為粮車三百乗伏壯士五軰虜果掠車中士突出殺獲幾盡本紀李光弼在太原乃徹民屋為櫑車二百人挽之石所及輙數十人死賊傷十二本傳馬燧為戰車行以載兵止則為陣討田恱燧乃推大車焚恱將楊朝光柵破之本傳車戰之法武王問於太公曰以車與騎歩戰所當幾何公曰車者軍之羽翼也所以䧟堅陣要强敵遮北走也易戰之法一車當步卒八十人八十人當一車一車當六騎六騎當一車十乘敗千人百乘敗萬人此其大數也置車之吏數五車而一長十車而一吏五十車而一率百乘而一將易戰之法五車為列前後相去四十歩左右十步險戰之法車必循道十車為聚二十車為屯前後相去二十步左右六步隊間三十六步五車一長縱横相去一里各返故道選車士之法取年四十以下長七尺五寸以上走能逐馬及馳而乘之前後左右上下周旋能縳乗旌旗力榖八石弩射前後皆便習者武車之士不可不厚也太公六韜車戰之地凡車之死地有十其勝地有八往而無還者車之死地也越絶險阻乘敵逺行者車之竭地也前易後險者車之困地也䧟之險阻而難出者車之絶地也圯下漸澤黒土黏埴者車之勞地也左險右易上陵抑阪者車之逆地也殷草横畆犯歴深澤者車之拂地也車少地易與歩不敵者車之敗地也後有溝瀆左有新水右有峻坂者車之環地也日夜霖雨旬日不止道路潰䧟前不能進後不能解者車之䧟地也此十者車之死地也敵之前後行陣未定即䧟之旌旗擾亂人馬數動即䧟之士卒前後相顧前往而疑後恐而怯即䧟之三軍卒驚皆薄而起即䧟之戰於易地暮不能解即䧟之逺行而暮舎三軍恐懼則䧟之此八者車之勝地也太公六韜毀車而勝晉荀吴敗無終及羣狄于太原將戰魏舒曰彼徒我車所遇又阨以什共車必克困諸阨又克請用卒自我始乃毁車以為行伍乘為三五為五陣以相離兩於前伍於後専為右角偏為前拒以誘之狄人笑之未陣而薄之大敗之左傳昭元年用車而敗言車戰之利者莫如孫武故曰馳車千乘所謂馳車者以其車輕而可馳者也所謂革車者以其鞏於外而可以禦火攻者也至於唐房琯知馳車之為利而不知革車之為固此咸陽之戰所以卒敗於火攻也歟總論車戰言車戰於今日當以國初論不當以中興論是正與舟師相反也大抵平地用車戰水澤用舟載國於東南者之不習於車猶國於西北者之不習於舟也太宗甞曰戈櫂之戰南方所利見上髙宗甞曰江湖沮洳之地雖有車騎亦何用紹興三年上曰近有獻車戰者朕謂在人不在車江湖沮洳之地雖有車騎亦何用高宗之論車戰其猶太宗之論舟師乎雖然中興之初但為守計也雖不習車可也今日之治不但為守計也不習車不可也是故當以國初論不當以中興論也今之為車戰者必當曰符彦卿之拒馬寨如之何而收其效見下米守信之寨脚車如之何而極其利米守信知澧州遣李錫持新様流星弩拒馬牌寨脚車山字甲八種來進至則歛兵退則出兵自比於衞青必如田况之言而後可也咸平四年吴淑請復古車戰之法衞青李陵田豫馬隆皆以車而勝近符彦卿破敵陽城亦拒馬為行寨夫匈奴所長者騎兵也茍非連車以制之則何以禦其奔突哉故用車戰為便其制取常用車接其衡軛駕以牛車上置槍以為外向列士卒於車外賊至射之乃出騎兵擊之此制虜要術也戰之用車一陣之甲鎧也故可以行止為營陣敵至則歛兵附軍以拒之賊退則乘勝出兵以擊之出則藉此為所歸之地入則以此為所居之宅故人心有依不懼胡騎之陵突也行載兵甲止為營陣比於馬燧必如郭固之式而後可也至和二年韓琦言郭固就民車約古制為之臨陣禦敵緩急易集其車前銳後方上置七槍為前後二拒此馬燧戰車行載兵甲止為營陣也又以民車之廂増為重廂髙四尺四寸用革輓之吴起所謂革車掩户輓輪籠轂是也琦以為可用於平川之地臨陣以折奔衝下營以為寨脚今令固自賫車式進呈試之以固為衞尉寺丞有大車有小車山徑之蹊不可以用大車其無如范公仲淹之策范仲淹上仁宗議攻云延安之西慶州之東有賊界百餘里侵入漢地唐馬燧造戰車行載甲兵止為營陣此路山坡大車難進當用小車二十兩銀絹錢二十萬賞有功將吏有兵車有民車干戈之際不可用民車其無如沈公括之言乎北兵將入境遣中貴人取兩河民車為備民大驚擾一日沈括立御座側神宗曰卿知籍車之事乎括曰車戰之利見於歴世臣但未知一事古人所謂輕車者兵車也今之民車重大以牛輓之日不能行三十里少蒙雨雪跬歩不進故俗謂之太平車恐兵間不可用爾神宗喜曰無人如此語朕遂罷取民車噫出車彭彭旂旐央央玁狁之襄易事也我車既攻我馬既同夷狄之不攘無有也如徒曰此唐人房次律之覆轍不可用得無因噎而廢食乎林駉文舟師黄帝堯舜刳木為舟剡木為楫定四年吴王闔廬帥唐蔡之師以伐楚捨舟于淮汭自豫章與楚夾漢左司馬戍欲毁其舟武城黒謂子常曰吴用木也我用革也不如速戰乃自小别至于大别夫槩王擊之三戰皆勝楚子昭王涉睢濟江入於雲夢之澤中國之用水戰自闔廬始哀九年吴城䢴溝通江淮十年吴舟師自海入齊張儀說楚王曰秦西有巴蜀治船積粟浮江而下不十日距䢴闗襄公二十四年楚子為舟師以伐吴昭十七年長江之戰楚獲吴乗舟餘皇二十四年楚子為舟師以畧吴疆漢髙帝遣韓信已定齊項羽使龍且將二十萬救齊王田廣與信夾淮水陣韓信乃夜令人為萬餘囊盛沙壅水上流引軍半渡水信使人决壅囊水大至龍且軍大半不得渡即急擊殺龍且水東流遂敗走後信進兵擊魏魏盛兵蒲坂塞臨晉信乃益為疑兵陳船欲渡臨晉而伏兵從夏陽以木罌缶渡軍襲安邑魏王豹驚引兵迎信信遂虜豹定河東服䖍曰以木柙縳罌缶以渡也武帝時有樓船有戈船有下瀨有横海江淮青齊皆有樓船軍有擊兩越救東甌則用江淮會稽樓船㓕朝鮮則用齊樓船又開昆明池以習水戰武帝時東越數反覆朱買臣上言東越王居保泉山一人守險千人不得上今聞越王更徙南行去泉山五百里居大澤中發兵浮海直指泉山陳舟列兵席卷南行可破㓕也上拜買臣會稽太守詔買臣到郡治樓船備糧食水戰具歲餘買臣受詔與韓說俱擊破東越買臣傳元鼎五年南越反遣伏波將軍路博徳出桂陽下湟水樓船將軍楊僕出豫章下湞水歸義越侯岩為戈船將軍出零陵下離水甲為下瀨將軍下蒼梧咸會畨禺後漢光武伐蜀岑彭裝戰樓船數十艘吴漢以棹卒多費糧穀奏罷之帝報曰大司馬習歩騎不時水戰荆門之事一由征南公為重岑彭装直進樓船與冐突露橈數十艘直進取其有進而無退冐突取其冐突而敢前謂之露橈則楫露在外而兵藏於舟中也發桂陽零陵長沙三郡委輸棹卒凡六萬餘人會於荆門後漢末闗羽領兵圍樊吕蒙以大軍泝江襲其空虚伏甲於舟更衣為商人以理征棹卒襲奪荆州曹操既平劉表得所治水軍而吴孫權與操遏于赤壁周瑜亦用蒙衝闘艦數千艘以火攻之操軍敗走三國劉備為曹公所破欲引兵南渡江與魯肅遇於當陽遂合兵因進往夏口遣諸葛亮詣權權瑜及程普等與備并力逆曹公于赤壁曹公軍引次江北瑜等在南岸瑜部將黄葢曰今寇衆我寡難與持乆然觀操軍方連船艦首尾相接可燒而走也遂同時發火操軍大敗周瑜傳晉武欲伐吴令王濬作舟艦於益州其大艦方百二十步受二千餘人以木為城起樓櫓開四出門其上皆得馳馬往來後濬順流以舟直指建業遂平吴太康元年杜預向江陵王濬唐彬擊破丹陽監盛紀吴人於江磧要害之處並以鉄鎻横截之又作鉄錐長丈餘暗置江中以逆拒舟艦濬乃作大筏數十方百餘歩縳草為人被甲持仗令善水者以筏先行筏行遇鐵錐錐輙著筏而去又作火炬長十餘丈大數十圍在船前遇鎻燃炬燒之湏㬰融液斷絶於是船無所礙濬克西陵杜預遣周㫖等帥竒兵八百汎舟夜渡江吴孫歆曰北來諸軍乃飛渡江也通鑑桓𤣥求為廣州受命而而不行豫州刺史庾楷以道子割其四郡遣其子說王恭恭以吿殷仲堪亘元推恭為盟主刻期同趣京師仲堪悉以軍事委楊佺期使佺期率舟師五千為前鋒亘元次之仲堪帥兵相繼而下佺期元奄至湓口王愉惶遽奔臨川元遣偏軍追獲之東晉𤣥温伐秦引舟自清水入河舳艫數百里至枋頭以水運路不通又戰數不利焚舟棄輜重鎧仗陸道奔還安帝時劉裕伐南燕舟師自淮入泗裕大治水軍遣孫處沈田孑自海道入畨禺盧循兵守廣州者不以海道為虞孫處乗海船至即日拔其城劉裕遣朱齡石伐蜀令齡石從外來取成都卒平蜀又裕伐秦使沈林子將水軍出石門自汴入河又使王仲徳開鉅野入河裕將水軍自淮泗入清河泝河西上王鎮惡請率水軍自河入渭以趨長安乗蒙衝水艦行船者皆在艦内秦人驚以為神至渭橋舎船登岸大破姚丕於渭橋遂入長安元嘉北伐之師再舉皆自泗入河魏元英攻徐州韋睿救之裝大艦為水軍以小船載草用火攻之魏軍大潰梁湘東王命王僧辯等東擊侯景侯子鑒屯姑熟以拒西師景遣兵助之僧辯至子鑒帥步騎萬餘人度洲於岸挑戰又以艅艎千艘載戰士僧辯麾細船皆令退縮留大艦夾泊兩岸子鑒之衆謂水軍欲退争出趍之大艦斷其歸路鼔譟大呼合戰中江子鑒大敗通鑑齊江陵不守霸先奉晉安王即位齊遣兵五千渡江㨿姑熟帝乃遣侯安都領水軍夜襲胡野燒齊船周鉄虎率舟師斷齊運輸齊兵大潰霸先將精甲自西明門出擊之往采石迎齊援督兵疾戰燒柵齊人大潰盡收其船艦齊兵還據石頭帝遣侯安都領水軍襲破之陳武帝時徐嗣徽引齊人渡江㨿𦍑湖帝詔文育還都嗣徽等乃列艦於青墩至於七磯以斷文育歸路及夕文育鼓譟而發嗣徽等不能制而文育反攻之嗣徽驍將鮑砰獨以小艦殿文育乗單舴艋跳入砰艦斬砰仍牽其人而還賊衆大駭因留船𦍑湖自丹陽步上時武帝拒嗣徽於白城適與文育會將戰風急武帝曰矢不逆風文育曰事急矣當决之何用古法抽槊上馬而進衆軍隨之風亦尋轉殺傷數百人嗣徽等移營幕府山文育徙頓對之頻戰屢敗後梁王琳引合淝巢湖之衆舳艫相次而下陳侯瑱率軍進戰檻洲明日合戰琳軍少却及夕東北風吹其舟艦並壊夜中有流星墜于賊營及旦風静琳入浦以鹿角繞岸不敢復出時西魏將史寧躡其上流瑱聞之知琳不能持乆收軍却據湖浦以待其斃及史寧至圍郢州琳恐衆潰乃率船東下去羌湖十里而泊明日齊人遣兵助琳瑱令軍中晨炊蓐食頓羌湖尾以待之將戰有微風至自東南衆軍施拍縱火定州刺史章昭逺乘平虜大艦中江而進琳軍大敗脫走以免者十二三閩中守陳寳應舉兵反據建安晉江二郡界水陸為柵陳將章昭逹討之據其上流命軍士伐木帶枝葉為筏拍於其上綴以大索相次連營夾兩岸寳應數挑戰昭逹乃按甲不動俄而暴雨江水大漲昭逹放筏衝突水柵盡破又出兵攻其歩卒寳應大潰遂尅定閩中歐陽紇據嶺南反陳將章昭逹督衆軍討之紇乃出頓涯口多聚沙石盛以竹籠置于水柵之外用遏船艦昭逹居其上流裝艦造拍以臨賊柵又令其軍人衘刀潜行水中斫竹籠籠篾皆解因縱六艦隨流突之賊衆大敗因而擒紇留異據東陽叛陳將侯安都奉詔討之異本謂臺軍自錢塘江上安都乃歩由會稽之諸暨出永康異大恐奔桃枝嶺處岩谷間立柵以拒守安都躬自接戰為流矢所中血流至踝安都乗興麾軍容止不變因其山隴為堰屬夏潦水漲安都引船入堰樓艦與異城等放拍碎其樓異與其子脫身奔晉安隋之平陳楊素造大艦名五牙容戰士八百人次名黄龍容五百人自餘平乗舴艋等各各有差則隋之舟師其可見者如此楊素引舟師下三峽軍至流頭灘將軍戚昕以青龍百餘艘兵數千人守狼尾灘地勢險峭隋人患之素曰若晝日下船彼見我虚實灘流迅激制不由人不如以夜襲之素親帥黄龍數千艘衘枚而下素帥水軍東下舟艫被江旌甲耀日陳人望之懼曰清河公即江神也通鑑唐之討蕭銑孝恭以戰艦二千餘艘自䕫發而東下則唐之舟師其可見者如此唐詔發巴蜀兵以王孝恭李靖統十二總管自䕫州順流東下以擊蕭銑孝恭帥戰人二千餘艘東下蕭銑以江水方漲殊不為備孝恭等拔其荆門宜都二鎮進至夷陵銑將文士𢎞將精兵數萬屯清江孝恭擊走之獲戰艦二百餘艘銑出兵拒戰恭將擊之李靖止之孝恭不從自帥銳師出戰果敗走銑衆委舟收掠軍資靖見其衆亂大破之大獲舟艦李靖使孝恭盡散之江中銑援兵見舟艦疑不進通鑑梁王彦章攻晉晉人以鉄鎻斷徳勝口彦章隂遣人具舟命甲士六百人皆持巨斧又令舟載鞴炭燒斷之因以巨斧斬浮橋遂破南城周世宗還自夀春以南方水軍敏銳於京城側開池造船艦數百艘招誘南卒教習北人水戰數月之後縱横出没無不可用者則五代舟師其可見者如此晉以鐵鎻斷徳勝口築河南北兩城號夾寨又取鄆州梁人大恐帝召王彦章為招討使叚凝為副至滑州置酒大會隂遣人具舟於楊村命甲士六百人皆持巨斧載冶者具鞴炭乘流而下彦章酒半佯起更衣引精兵數千㳂河以趍徳勝舟兵舉鎻燒斷之以巨斧斬浮橋而彦章引兵急擊南城遂破梁正明五年吴越王錢鏐大舉討淮南以傳瓘為諸軍都指揮使帥戰艦五百艘自東洲擊吴吴遣彭彦章陳汾拒之傳瓘命每舡皆載灰豆及沙戰于狼山江順風揚灰吴人不能開目因縱火焚吴舡吴兵大敗俘吴禆將七十人斬首千餘級焚戰船四百艘梁賀懐攻徳勝南城以竹管聮艨艟十餘艘横於河流以斷晉之救兵使不得渡晉王軍於北岸不能通守將石延賞吿矢石將盡晉王積金帛於軍募能破艨艟者軍校王建及進曰賀懐悉衆而來冀此一舉若我軍不渡則彼為得計今日之事請死决之遂以巨索聮舟十艘選勇卒三百人持斧鼓枻而行將至艨艟流矢雨集建及使持斧者入賊艨艟間斧其竹笮破其垂楯以矟刺之又以木甖載薪沃油燃火於上流縱之隨以巨艦實甲士鼓譟攻之艨艟既斷隨流下梁兵焚溺者殆半顯徳三年周太祖發大梁李谷攻夀州乆不克唐劉彦貞引兵救之又以戰艦數百艘趣正陽為攻浮梁之勢李重進渡淮逆戰破之帝至夀州營於淝水之陽徙正陽浮梁於下蔡鎮唐兵維舟於淮營於塗山之下帝命擊之戰艦五千餘艘張永徳屯下蔡唐將林仁肇等以水陸軍援夀春永徳與之戰肇以船實薪芻因風縱火欲焚下蔡浮橋俄而風回敗退永徳為鉄綆千餘尺横絶淮流繫以巨木唐兵不能近是時唐復以水軍攻之永徳夜令善游者没其船下縻以鉄鎻縱兵擊之溺死甚衆永徳解金帶以賞善游者景徳四年先是周與髙戰水軍銳敏周人無以敵之帝每以為恨返自夀春於大梁城西汴水側造戰艦數百艘命唐降卒教北人水戰數月之後縱横出没殆勝唐兵命王環將水軍自閔河㳂潁入淮命趙晁將水軍㳂淮而下帝軍於趙歩諸將擊唐紫金山寨大破之餘衆東走帝自將騎循北岸追之諸將循南岸追之水軍自中流而下唐兵戰溺死及降者殆四萬人獲船艘糧仗十數萬後遂克壽州帝自攻濠州王審琦抜其水寨唐人屯戰船數百於城北植巨木於淮水以限周兵命水軍攻之抜其木焚戰艦七十餘艘斬首二千餘級又聞唐有戰船數百艘在渙水東欲救濠州將兵夜發水陸擊之大破唐兵於洞口十二月克泗州又聞唐戰船數百艘泊洞口上自將親軍自淮北進命太祖皇帝自淮南進諸將以水軍自中流進共迫唐兵乗勝争進皆忘其勞且戰且行金鼓聲聞數十里直追至楚州西北大破之擒其節度陳承昭以歸所獲戰船燒沉之餘得三百餘艘士卒殺溺之餘得七千餘人唐之戰船在淮上者於是盡矣顯徳五年上欲引戰艦自淮入江阻北神堰不得度欲鑿楚州西北鶴水以通其道遣使視言不便上自獨授以規畫發楚州民夫浚之旬日而成巨艦數百艘皆逹于江唐人大驚以為神宋太祖建隆二年正月壬寅幸造船務觀習水戰己未幸造船務二月丙寅幸造船務三年冬十月丙戌幸造船務觀習水戰甲戌幸城南觀修水櫃乾徳元年正月丙子詔荆南發水兵三千人赴潭州夏四月庚寅出内府錢募諸軍子弟數千人鑿池於朱明門外引蔡水注之造樓船百艘選卒號水虎捷習戰池中命右神武統軍陳承昭董其役十月甲辰幸新池賜役夫錢丁卯幸新池觀習水戰乾徳二年二月戊申幸教船池三月辛巳幸教船池賜水軍將士衣有差七月辛巳幸新池觀習水戰八月乙卯幸造船務乾徳三年秋七月己巳上泛舟於後苑新池賜從官飲丁酉幸教船池乾徳四年七月己巳幸造船務乾徳五年二月己丑幸教船池開寳三年四月甲午幸教船池七月戊辰幸教船池四年三月乙巳幸教船池五月辛巳幸教船池六年正月壬申以教船池為講武池七年五月丙寅幸講武池觀習水戰丙子又幸講武池觀習水戰七月壬子幸講武池觀習水戰初江南人樊若水舉進士不第上書言事不報遂謀北歸先釣魚采石江上以小舫載絲繩其中維南岸而疾棹抵北岸以度江之廣狹凡數十往返而得其丈尺之數遂詣闕自言有䇿可取江南戊辰召若水為贊善大夫且遣使詣荆湖如若水之策造大艦及黄龍船數千艘將浮江以濟師也八月己丑幸講武池觀習水戰賜軍人錢甲辰幸講武池觀習水戰冬十月甲申上幸迎春苑登汴堤發戰艦東下丙戌幸迎春苑觀諸軍習戰遂幸東水門發戰棹東下閏十月己酉曹彬等入池州先是上遣八作使郝守濬率丁匠自荆南以大艦載巨竹絙并下朗州所造黄龍船於采石磯跨江為浮梁或謂江濶水深古未有浮梁而濟者乃先試於石牌口既成命前汝州防禦使靈丘陸萬友往守之丁巳彬等及江南兵戰於銅陵敗之獲戰艦三百餘艘生擒八百餘人十一月癸未籍泰寧節度使李從善麾下及江南水軍凡千三百餘人為禁旅號曰歸聖己丑知漢陽軍李恕敗江南鄂州水軍三千餘人獲戰艦四十餘艘甲午曹彬等敗江南兵數千人於新林寨獲戰艦三十艘十二月丁未漢陽軍兵馬監押甯光祚敗鄂州水軍三千餘人於北岸丙寅曹彬等破江南兵於新林港口斬首二千級焚戰艦六十餘艘八年春正月丙子權知池州樊若水敗江南兵四千人於州界初曹彬等師未出上命韶州刺史王明為黄州刺史面授方畧明既視事亟修葺城壘訓練士卒衆莫諭其意及彬等出師則以明為池州至岳州江路廵檢戰棹都部署辛巳明遣兵馬都監武守謙等領兵渡江敗江南兵萬餘人於武昌殺七百人拔樊山寨是日行營左廂戰棹都監田欽祚領兵敗江南兵萬餘人於漂水斬其都統使李雄甲申王明言敗鄂州兵三百餘人於江南岸庚申曹彬等進攻金陵行營馬軍都指揮使李漢瓊率所部渡秦淮南取巨艦實以葭葦順風縱火攻其水寨拔之斬首數千級初次秦淮江南兵水陸十餘萬背城而陣時舟楫未具潘美下令曰美提驍果數萬人戰必勝攻必取豈限此一衣帶水而怯渡乎遂率所部先濟王師逐之江南兵大敗江南復出兵將泝流奪采石浮梁美旋擊破之擒其神衞都軍頭鄭賔七人二月癸丑曹彬等敗江南兵萬餘衆於白鷺洲斬首五千餘級擒百餘人獲戰艦五十艘三月乙酉幸造船場庚申曹彬等敗江南兵二千餘衆於江中擒五百人夏四月戊辰幸講武池觀習水戰癸丑幸都亭驛臨河亭閱新戰船壬戌幸都亭驛臨汴觀飛江兵乗刀魚船習戰五月丁酉王明言破江南萬餘衆於武昌奪戰艦五百艘六月癸卯曹彬言敗江南兵二萬餘衆於其城下奪戰艦數千艘冬十月戊午江南偽將朱令斌自湖口以衆入援號十五萬縳木為筏長百餘丈戰艦大者容千人順流而下將焚采石浮梁王明率所部兵屯獨樹口遣其子馳騎入奏具請増造戰船三百以襲令斌上曰此非應急之策也令斌朝夕至金陵之圍解矣乃宻遣使令明於洲浦間多立長木若帆檣之狀令斌望見疑有伏即稍逗遛時江水淺涸不利行舟令斌獨乗大航高十餘重上建大將旗旛至皖口行營歩軍都指揮使劉遇聚兵急攻之令斌勢蹙因縱火距闘會北風甚火反及之其衆悉潰己未生擒令斌及戰棹都虞侯王暉等獲兵仗數萬金陵獨恃此援由是孤城愈危蹙矣十一月庚辰王明言敗江南兵萬餘人於湖口獲戰艦五百艘兵仗稱是太宗太平興國元年十二月戊午幸造船務賜工徒人千錢布一疋己未幸講武池二年正月辛卯幸講武池七年冬十月戊辰幸金明池觀習水戰八年三月癸酉幸金明池觀習水戰雍熈元年夏四月乙酉幸金明池觀習水戰謂宰相曰水戰南方之事也今其地已定不復施用時習之不忘武功可已上長編真宗祥符六年詔江淮習水戰於金明池按試立為水虎翼軍以太祖神衞水軍乆廢故也髙宗建炎元年六月己卯詔别置凌波等水軍二年六月戊午言者謂東南武備利於水宜於江上廣造戰艦列於南岸仍防奸人有乗風盗熱之患設不此圖則寡不足以敵衆步不足以敵騎誤事必矣己卯詔㳂江措置限一月畢紹興元年五月己酉淮南劇賊張琪衆五萬渡江冦諸縣進至饒境郡人大恐統制官閻皇者頓造之愛將也琪恃其衆直犯中軍皐力戰而揣邦弼兩軍夾擊遂大破之追奔五十里横尸滿路賊又别遣精銳為水軍分道而進頥浩自將水軍禦之賊敗走溺死者不可勝計二年十二月己巳時鼎冦楊么黄誠聚衆至數萬么主誅殺誠主謀畫據江湖以為巢穴其下又有周倫楊欽夏誠劉衡分布逺近共有車船及海鰍船各數百隻李龜年楊么本末曰車船者置人於前後踏車進退皆可其名大徳小徳山望三州渾江龍之類皆兩重載千餘人又設拍竿其制如大桅長十餘丈上置巨石下作轆轤貫其顛遇官軍船近即倒拍竿擊碎之渾江龍即為龍首每水闘楊么多自乗此海鰍者鰍頭舡也葢車船如陸戰之陣兵海鰍船如陸戰之輕兵而官軍船不能近每戰輙敗大率倫欽雖各有寨而専恃舡以為强誠衡雖各有船而専恃寨以為固誠寨南據芷江東北阻湖惟西有陸路又設重城重濠及䧟馬坑衡寨北據芷江東西南皆阻湖誠衡每自詫曰地險如此除是飛來是月詔鼎澧鎮撫使程昌寓與荆南鎮撫使解潛分遣兵討之既而昌㝢奏殺賊五千餘人紹興三年四月鼎冦楊么犯鄂荆公安石首兩縣甲午詔神武軍都統制王􅊅為荆南潭鼎澧岳制置使率所部全軍併帶統制官崔増水軍𢷬其巢穴仍仰淮東宣撫使劉光世各以舟五十隻與之四年十一月時承秦三州各有水寨民兵合力擊賊庚戌上謂宰執曰淮民未能安業今又遭賊騎乃力奮忠義不忘國家實我祖宗㴠養之力宜與放十年租稅仍撥錢米助之趙鼎曰陛下徳澤如此人心益固國祚益長矣五年十月是月館職髙閱言太祖欲平僣偽甞置神衞水軍至真宗祥符中以兵備不可廢乃選水卒於金明池習戰棹仍置營池側號虎翼軍當無事之日尚爾今沿海沿江雖有舟師而繫于岸下乞時令按習以精其能庶幾緩急可用不至誤事也七年閏十月上數令江東宣撫使張俊盡以舟師分布控扼然後引兵渡江左僕射趙鼎曰淮西寂然無警似不必爾外間便謂朝廷棄淮西矣當一向勿顧不發一兵彼未必敢動上以為然二十六年九月壬午領殿前都指揮使楊存中言本司見造戰船乞置虎翼水軍一千人從之金亮犯順至楊林瞰江持軍以為江可渡也李顯忠措畫依山列馬步軍五分戈船以其二泊於東岸其一泊中流藏其二於蘆州港中頃之敵麾戰艦渡江呼聲震天地彼舟及岸敵漸登陸遣時俊王琪盛新載臯張振張榮逆擊之又疾遣戈船併進以神臂克敵弓射之敵欲退隨向者江中所匿戈舡出斷其後奪敵船三十餘艘繼以輕舸縱火焚其戰艦火光蔽江煙熖徹天亮敗言行録三十一年十月丙子金亮登壇建黄綉旗二十張黄葢亮執小紅旂麾衆渡江時王權所留水軍車船咸在而諸將未有統屬莫肯用命盡伏山崦惟提舉張振王琪稍任其責允文自建康因使人督之賊舟漸近於是振琪與統制官時俊盛新等徐出山崦列于江岸敵初未之覺一見大驚欲退不可我軍用海鰍船迎擊士皆死闘敵舟沉溺者數萬其回北岸者亮皆殺之遂不能濟允文以其捷聞丁丑敵復來望見車船遽却我軍復以海鰍船先往北岸截横林渡口用却敵弓射之敵棄船上岸者悉䧟泥中而斃上以李横劉氾等不利急差御營宿衞使楊存中措置守江中書舎人虞允文亦自建康馳至鎮江時江岸有車舡二十四艘敵已瞰江恐臨期不堪駕用存中允文同淮東總領朱夏卿鎮江守臣趙公稱相與臨江按試命戰士踏車船徑趍𤓰洲將邊岸復回敵兵皆持滿以待其船中流上下回轉如飛敵衆相顧駭愕時金亮已聞李寳由海道入膠西焚其戰艦而荆鄂成問諸軍方順流而下亮愈忿乃回揚州召諸酋約三日畢濟過期盡殺之諸酋謀曰南軍有備如此進有渰殺之禍退有敵殺之憂奈何其中一酋曰等死求生可乎衆皆曰願聞教其總管萬戴者曰殺郎主却與南宋通和歸鄉則生矣衆口一詞曰諾亮有紫茸等細軍不遣臨敵専以自衞諸酋雖欲弑亮而細軍衞之嚴宻衆因謂細軍曰淮東子女金帛皆逃在秦州我軰急渡江汝軰何不白郎主往取之細軍欣然共請亮從之於是細軍去者過半云云乙未諸酋集萬餘人控弦直入亮寢帳左右親兵散走諸酋射帳中矢下如雨亮即死并殺其太傅三妃與謀事者十餘人長編烏珠入冦世忠以舟師赴難烏珠聞世忠在京口遽勒二十萬騎北還世忠遂提兵截大江以邀之烏珠遣使通問世忠亦遣使報之約日會戰戰數十百合敵終不得渡敵乃益兵儀真勢接建康烏珠軍其南辣踈軍于北世忠提海艦中流南北接戰相持四十八日敵自知力憊世忠舟師中流鼓枻若神生路垂絶乃一夕潜鑿小河而逃又言行録載此總論舟師言舟師於今日當以中興論不當以宋初論夫舟師東南之長技也國於西北者而用舟師非其所長也亦非其所恃也昔我太宗甞曰戈櫂之戰南方所利今萬邦平定無所施用但習之不忘武功爾太宗興國九年事見前嗚呼信哉斯言是故入夔峽之鎻江用戰櫂可也今也捨舟而用歩騎卒以勝蜀太祖征西川命劉光義出夔州路伐蜀上出夔峽地圖示光義曰夔州有鎻江至此我軍泝流而上謹勿以舟争勝當先以步騎陸行出其不意擊之俟其稍却以戰櫂夾攻之光義等至夔悉如上所指守采石之浮梁用戰艦可也今也捨舟而立檣木卒以擒全斌開寳七年事見在前非不用舟師也非其所長則非所敢恃也平河之軍非倔强於海道者乎不出於海道未可以平河名也江浙發運使楊允恭捕海冦四十九人送闕下上悉貸之顧左右曰此等越逸川澤習性已乆可團為一軍以備舟楫之役以平河為名水虎翼之軍非𨽻習於江淮者乎不出於江淮未可以虎翼名也祥符六年事見前用東南之所長而不自用其所長此君子不敢以宋初為法而必求之中興以後也葢自六飛南渡駐蹕吴會守江以為門戸守淮以為藩籬士卒服習唯意所用是故舟師之効如此君子其可不以中興為法哉江漢湯湯武夫洸洸經營四方吿成于王愚請俟告成之日而賦是詩林駉文羣書考索後集卷四十五
