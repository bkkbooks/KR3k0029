body:
  text: 羣書考索後集卷四十一宋章如愚編兵制門州兵三代盛時井田之法滿天下皆兵也居則為比閭族黨州鄉出則為伍兩卒旅師軍為兵者皆吾平居之民為將者皆吾平居之吏也至秦用商鞅開阡陌而井田之法廢始皇并天下列為三十六郡置材官漢列郡王國侯國三者其兵不殊郡有都尉佐太守典武職甲卒其在王國則以内史比郡守中尉比都尉侯國亦有相秩比天子令長髙祖命天下選能引闗蹶張材力武猛者以為輕車騎士材官樓船常以秋後講隷課試各有員數平地用車騎山阻用材官水泉用樓船光武以幽冀兵克定天下始於黎陽立營領兵騎常千人以謁者監之號黎陽兵建武六年欲罷郡國都尉并職太守無都試之役紀志明年罷天下輕車騎士材官樓船及軍假吏悉還民伍帝紀唐制髙祖武徳初始置軍府析闗中為十二道以驃騎車騎兩將軍領之太宗正觀十年更號統軍為折衝都尉别將為果毅都尉諸府總曰折衝府凡天下十道闗中道置府一百七十三河南道置府凡六十二河東道置府百三十九河北道置府十四山南道置府凡十隴右道置府二十九淮南道置府凡六江南道置府凡二劔南道置府凡十嶺南道置府凡三右十道凡置府五百六十四皆有名號而闗中府皆以隷諸衞凡府三等兵千二百人為上千人為中八百人為下府置折衝都尉一人左右果毅都尉各一人長史兵曹别將各一人校尉六人士以三百人為團團有校尉五十人為隊隊有正十人為火火有長高宗武后時府衞之法寖壊變為彍騎彍騎變而方鎮之兵熾矣宋朝置禁軍每歲蒐汰著之令甲私役有禁教閱有班諸州所募者曰本城廂軍一軍有分𨽻數州或一州兼屯數軍總諸州騎兵之額四有十八步兵之額百八十有三是為鎮兵縣又有土軍廂禁二軍軍在州縣本在京師亦殿司侍衞司之兵也然其所生長知有州縣不知有殿侍司殿侍司亦不復稽考州縣之兵也名曰内屬其實外軍總論州縣兵禁軍廂軍太祖鑒前代之弊收藩鎮之權天下精兵悉選而萃之京師州郡所存率皆疲弱此强幹弱枝之道也趙普議見上循習已乆外備不修諸郡毀城隍收兵甲者皆是書生領州大郡給十人小郡給五人以充常從名曰長吏實同於人名曰郡城蕩若平地滁州守禦代以白直淮陽重鎮與滁無異去揚而黄復不及滁王元之所言葢咸平之三年也即三郡推之他可知矣三年王禹偁言太祖之初十分天下有其七太宗嗣業天下一家議者乃合江淮諸郡毀城隍徹武備者三十餘年書生領州大郡給十人小郡給五人以充常從號曰長吏實同於人名為郡城蕩若平地城比在滁州值發兵輓漕闗地無人守禦止以白直代主闗閉及徙淮陽稱為重鎮乃與滁州無異今黄州城池器甲復不及滁揚萬一竊發何以支梧望令江淮等郡許置本城守捉軍士二三百人自是以來稍稍修置陜西之保毅置於咸平之四年四年詔陜西民家出一丁號保毅軍給資粮與正兵分戍吳倩與運使主其事凡得六萬八千餘人其㳂邊先選中者亦升為禁軍號保捷㳂邊之振武置於景徳之元年元年陜西運使言西面㳂邊諸州於保毅之軍内簡集成振武軍四十指揮自立北軍邊聲頗振戎不敢寇然猶未盛也慶歴之初西戎阻命始黥民兵以補軍籍陞諸州廂軍以充禁旅既増保捷又置宣毅比及三年又置保毅内外通置禁軍四十餘萬通三朝兵八九十萬而鄉軍廂軍不與焉而後兵大備矣張方平言康定之末慶歴之初議刺民兵極論其害今日果然太祖朝兵不及十五萬太宗朝不過四十萬祥符已後稍稍消伏向因西戎阻命始籍民兵俄黥以補軍籍陞諸州廂軍以充禁旅陜西河北京東京西増置保㨗一百八十五指揮凡内外増置禁軍約計四十餘萬人通三朝兵八九十萬其廂軍鄉軍義軍不在此數自時厥後隨减隨補治平初元刺陜西義勇十五餘萬治平之兵百六萬二千禁旅歩騎六十六萬三千校慶歴之籍减紀十萬校開寳之籍増至七十萬二千至于熈寧廂軍猥多自騎射至牢城其名二十三其為兵凡二十餘萬而廂軍益衆矣三年樞宻院言諸路廂軍名額猥多自騎射至牢城其名二十三總天下廂兵馬步指揮凡八百四十為兵凡二十二萬餘人古者凡國之役皆調於民宋有天下悉役廂軍凡役作營繕民無與焉故偹戰衞者謂之禁軍給徒役者謂之廂軍皆總於侍衞司而兵部掌其政令兵志國朝以備戰衞為禁軍以給徒役為廂軍各𨽻其州之本城内總於侍衞而兵部掌其政令又以廂軍教閱者始號廂禁軍後以為下禁軍熈寧三年詔以禁軍分五都法以撿治廂軍熈寧元豐之間廂軍之數視祖宗時益衆以自三代後凡國之役皆調之民故民以勞弊宋有天下悉役廂軍凡役作工徒營繕民無與焉故民力全固永平百年熈寧之世取廂軍之壯而教之謂之廂禁軍㽞之在城免其難役並加教閱二字於軍額之上曰雄武曰武壯曰静江曰崇節曰保節皆廂禁軍也元年選少壯廂軍留在城以備使二年樞宻言廂軍近以教閱武藝仍改軍額淮南曰壯武江南曰雄武荆湖曰静江兩浙曰崇節福建曰保節並加教閱二字於軍額上從之是則廂軍以役禁軍不役而役之難者廂禁軍亦免之今之禁軍送迎出入畨休寓直與廂軍無異夫兵者不可役役者不能兵一人之身百工所為備勢不可也熈寧私役禁軍之制葢亦舉而行之可乎熈寧中私役禁軍雖經郊叙復永不與親民差遣林駉文總論京師兵神宗有言藝祖養兵二十二萬京師十萬餘諸道十萬餘使京師足以制諸道諸道足以當京師故内外相制無偏重之患元豐五年神宗云云而張泊之言於太宗亦曰今天下甲卒數十萬衆戰馬數十萬匹萃在京師太宗語及北兵利害張泊言國家以大梁為天下之樞故定都焉今天下甲卒云云其本固兵强未有盛於我朝也我太祖加意軍政其練之也精其御之也嚴或大閱西郊建隆二年大閱西郊上曰晉漢衞兵數十萬然可用者寡朕親校其擊刺騎射之藝悉為精銳習戰朱明池乾徳元年鑿池朱明門外選卒號水虎捷習戰池中或閱兵講武殿乾徳三年上御講武殿閱諸道兵得萬餘人屬侍衞其練兵之精如此武雄肆掠百卒竟誅乾徳中籍諸道驍勇兵送闕下太祖團結為武雄軍凡百餘人白日掠人妻女於城下帝怒捕戮之川班妄訴全軍俱廢乾徳中收蜀精兵置川班殿直廩給與御龍直筭開寳四年太祖以御龍直扈從郊祀時命増給而川班殿直不得如例擊鼓上訴帝怒曰朕之所與即為恩澤焉有例哉命斬妄訴遂廢其班雲捷軍偽印寘之極法建隆三年雲捷軍有偽刻侍衞司印者捕得斬之酒坊兵士作過罪及主將何郯言太祖酒坊火發本坊兵士因使作過太祖以本坊使田處岩等不能部轄並處極法軍法約束有非莊宗所能及者上問李承進曰莊宗享國不乆何也對曰莊宗姑息將士隨其所欲給之葢威令不行賞罰無節也上曰二十年争天下不能用軍法約束眹今撫養士卒固不容吝爵賞茍犯吾法惟有劒爾其御兵之嚴又如此夫是以擊刺騎射悉為精銳而見用老弱怯懦安於剰員而不辭建隆二年令殿前侍衞及部兵驍勇者升其籍老弱怯懦者去之初置剰員以處退兵太宗真宗承之軍政益肅故千乗萬騎周旋如一太平興國二年崔翰分布士伍建五色旗以號令將卒每按旗指蹤則千乗萬騎周旋如一甲兵之盛近代無比上恱以金帶賜翰殿庭進退容止中節至道元年上閱武便殿衞士有挽弓及一石五斗者矢二十發綽有餘力又令騎兵歩兵東西列陣觀其進退容止中節上曰此殿庭間數百人爾猶有兵威可觀况堂堂之陣數萬成列者哉近京補禁衞皆為精兵咸平四年募近京强壯補禁衞詔高峻教閱行伍整肅上曰昨日村民皆為精兵矣吁有自來矣至于仁宗承平日乆法制稍弛御士之變何郯兩言之慶歴八年崇政殿宿直皇城司親事官刼取庫兵縁上殿屋何郯兩上書乞重行黜陟步直兵士之變錢彦逺七言之皇祐元年軍頭司步直兵士擬欲作過於皇城内先埋藏器仗錢彦逺七上書乞根究而東軍不知戰鬭龍衞不能被甲田况又歴歴言之慶歴元年田况上兵䇿七曰新添虎翼軍自南中選填才質綿弱自云不知戰鬭見賊恐死傳者以為笑若添土兵請給其立功不在東軍之後八曰騎兵髙者無如龍衞有不能被甲上馬者况老於雲武二騎挽弓不過五六斗望空發箭三十步已墮地天子聖明一加振刷無復曩時之舊矣成制一定歴代遵之雖在熈寧亦循舊章雖在崇寧舊規猶在自髙俅以恩得用軍政遂弛見下中興以來懲諸班之變因噎廢食故或以衞兵掃蕩為言建炎四年初上在明州諸班直謀亂已誅其為首者駕還越遂廢班有趙鼎曰祖宗兵政最為留意熈寧變亂舊章獨不敢議軍政昨明州班直即訴事紛亂非其本謀乃盡廢之是因噎廢食今諸將各揔重兵不𨽻三衙則兵政已壊獨衞兵彷彿舊制亦掃蕩不存或以三衙稍廢為言紹興元年廖剛言祖宗軍政尤嚴如三衙四廂所統之兵闗防周宻此軍稍廢所恃以備非常者諸將外衞兵而已或以親兵寛弱為言紹興二年胡安國言宋朝分三衙以掌親軍雖崇寧間舊規猶在及髙俅以恩得用軍政遂弛陛下承嗣寳位而親兵寡弱豈强本之計高宗慨然委之主帥未及半年軍容益張紹興二年擢楊沂中為神武中軍統制而言者請増衞兵上曰朕命沂中治神武中軍皆宿衞兵也遂命沂中兼提舉衞兵沂中歎曰勾陳天仗单弱於是招丁壯未半歲軍容益張遂改中軍為殿前司禁衞諸軍悉從遷轉紹興五年時諸將所總歲歲奏功而天子親兵乆無轉遷之望趙鼎請立為得員之法始復祖宗之制都督軍馬悉𨽻三衙趙鼎言都督府軍馬合撿三衙上曰祖宗故事軍馬未有不𨽻三衙今正之甚善而祖宗舊制於是乎盡復盛哉中興之功葢與創業無以異也林駉文總論戍兵衞兵出戍祖宗舊制禁軍最親者名以班直宿衞扈從殿前掌之自龍衞以下則或守京師或戍諸路兵志凡禁軍之最親近者執㦸殿陛宿衞宫省扈從乗輿號諸班直非諸班直𨽻軍頭司城隍司騏驥院皆以守京師借征戍葢以天下積兵聚於京師諸道之兵疲怯不任事不得不然也中興以來馬軍一司常戍金陵收諸帥之兵名為御前軍分屯要害此其遺意歟職源馬軍一司中興以後常出戍建康然時有先後勢有强弱昔景徳中陳貫言旅禁以衞京師不當戍邊二年陳貫上兵論三篇言旅禁當以衞京師不當戍邊戍邊莫若募土人皇祐初包拯言調發畿兵非固宗社之策元年包拯言畿兵雖有大故不可多調發近年以來邊陲有警乃一例調發非固宗社制夷狄之良策彼去國初未逺也而其言且然况在數世之後為人主者亦當權其强弱可也今金陵重鎮誠不可緩根本所在盍亦加之意乎林駉文民兵三代盛時天下皆兵也其為兵者皆吾平居之民今以成周周官攷之司徒之屬族師以邦比之法五家為比十家為聮五人為伍十人為聮四閭為族八閭為聨若作民而師田行役則合其卒伍簡其兵器以鼓鐸旗物帥而至小司徒乃㑹方民之卒而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅周禮此民兵之制也齊威公任用管子作内政而寓軍令管子制五家為軌軌為之長十軌為里里有司四里為連連為之長十連為鄉鄉有良人以為軍令是故五家為軌故五人為伍軌長率之十軌為里故五十人為小戎里有司率之四里為連二百人為卒連長率之十連為鄉故二千人為旅鄉良人率之五鄉一師故萬人為軍五鄉之帥率之國語秦有材官於郡國漢制踵秦置材官於郡國馮唐對文帝曰士卒皆家人子起田中從軍馮唐傳此民兵也秦苻堅遣圍襄陽元發三州人丁以為形援唐之府兵見兵志門蕭銑據江陵孝恭數進策圖銑帝嘉納李靖使江陵孝恭倚其謀遂圖江陵盡召巴蜀子弟收用之代宗時李抱真為懐澤潞觀察留後凡八年抱真策山東有變澤潞兵所走集乗戰伐後賦重人困軍伍彫􅀈乃籍户三丁擇一蠲其徭租給弓矢令閑月得曹偶習射歲終大校親按籍第能否賞責比三年皆為精兵舉所部得成十二萬既不廩於官而府庫實乃曰軍可用矣繕甲淬兵遂雄山東天下稱昭義步兵為諸軍冠李徳裕為鄭滑節度徙劒南西川徳裕至則率户一百取一人使習戰貸物事緩則農急則戰謂之雄邊子弟宋太祖乾徳元年遣使九人選闗西鄉兵赴慶州太宗時契丹入冦遣使諸州選丁壯為義軍雍熈三年邊民之驍勇者競團結以襲冦或夜入城壘斬取首級來歸上聞而嘉之曰此等生長邊陲閑習戰鬭若明立賞格必大有應募者乃下詔募民有能糾合應援王師者資以粮食假以兵甲平幽州後願在軍者優與存録願歸農者給復三年自是應募者甚衆長編雍熈四年開封尹陳王元僖又上疏曰河南乆為内地人戸非能便習武藝不可盡寘戎行河北累經戎狄頗有閑習馳射或可選置軍中望且於河朔㳂邊諸州㸃集止令本處守捍城池河南諸州一切停罷上納其言仝上真宗咸平二年朱台符上疏曰江浙舊有義軍寨秦隴見屯强壯執柯取則茲事可行以天下土地之饒士民之衆各于郡縣量置義軍本户畧與復除歲時少加賞賜動則就便召發静則任從營養又於王畿千里之内蓄兵十萬以制之天下孰敢動揺哉仝上咸平三年錢若水言夫今之所患患在不知戎情伏望陛下逐州召邊民為招收軍給與衣粮蠲其租賦彼縁兩地之中各有親族使有懐惠來布腹心彼若舉兵此必預知事苟預知則百戰百勝矣經濟咸平三年河北河東强壯自五代時瀛覇諸州已有之是歲始詔河北民家二丁三丁籍一四丁五丁籍二六丁七丁籍三八丁籍四為强壯五百人為指揮置指揮使百人為都置正副都頭二人節級四人所在置籍擇善射者第補校長聽自置馬勝甲者蠲其户役尋募其勇敢團結附大軍為柵官給鎧甲長編咸平三年王元之言江浙荆湖淮南福建等郡約民户衆寡城池大小並許置本城守提軍士不過三五百人勿令差出止於城中閱習弓劒漸葺城壘繕治甲胄郡國張禦緝之備長吏免剽畧之虞仝上咸平四年詔陜西民家出一丁號保毅軍給資粮與正兵分戍守城壘遣御史吴舊與轉運同主其事凡得六萬八千七百九十五人其縁邊軍士先選中者並升為禁軍號保捷仝上景徳元年於保毅軍内簡集成振武四十指揮景徳四年上曰比詔河東募土人為廣鋭神虎諸軍就置營宇葢以契丹未平此等皆勁勇且習知山川道路故帥臣每患其少甞許續募今邊防罷警若遂令減去即為弛偹然豈可歲増不已乃詔以見存為定額闕則補之仝上祥符二年詔河北强壯自今每歲十月至正月召集教閱習以為常河東曰廣鋭神虎河北曰忠烈宣勇仁宗天聖三年陜西運使范雍涇原路部署王謙等奏凖詔㫖相度㳂邊弓箭手並是父子相承兄弟相授武藝精熟頗得氣力不得妄有差役從之會要范仲淹知延州寳元中元昊叛時議㸃鄉兵戰仲淹令刺手及兵罷瓌慶路皆復為農言行録康定詔河北河東强壯陜西京東西路新置弓手皆以二十五人為團四團為都五都為指揮置使民年二十係籍六十免毎歲十月後正月前分畨上州教閱半月慶歴二年知秦州韓𤦺請益本路兵於是㨂陜西弓手悉刺面充保捷指揮慶歴二年詔簡河北强壯刺為義勇不願者釋之存其籍以備守葺城池自此强壯浸廢又簡河東鄉弓手亦為義勇而陜西之弓手為保捷分戍邊外時初置義勇人情訩訩乃詔河北都轉運使李昭述乗疾置郵日行數舍開諭父老衆始安焉長編御史中丞賈昌朝上䟽言今河北河東强壯陜西弓箭手之屬葢土兵遺制也且戎狄居苦寒沙磧之地惡衣食好馳善射自古御冦却敵非此不可今宜優復田疇安其廬舍使力耕死戰世為邊用則可以减屯戍而省供饋而不易之利内地州縣増置弓手亦當約如鄉軍之法而閱試之仝上慶歴四年樞宻院副使富弼上河北守禦十二䇿有曰景徳以前緣邊土兵無事時令戍本州軍寇至則盡為逐路部署司抽起縁邊闕食又却以南兵屯守甚無謂也夫土兵居邊知其山川道路熟其彼中人情復諳敵兵次第亦藉其營護骨肉之心且又服習州縣令所禦必堅戰必勝也若遷内地則山川道路不知人情不熟敵兵不諳骨肉不在州縣命令不習又為南兵怯弱所累則禦必不堅戰必不勝也北敵惟懼邊兵凡聞以南兵替入内地敵人大喜故來則决勝長編皇祐元年户部副使包拯言今河北河東㳂邊兵寡財匱招置卒難惟有民兵可用徃年甞籍之矣籍之未甚得策又從而釋之竊見唐李抱真民兵之制事頗相近故當時昭義一軍雄視山東將適今之冝可取抱真之制約而行之一則不費供饋二則羣情樂為其處置訓練之法即有祖宗舊制民兵既壯禁軍留實京師則内外安矣仝上嘉祐三年李師中提㸃廣南西路刑獄師中建言嶺南自古不利戍兵乞置土丁募敢勇家丁至四五則籍一人揔為五畨上州教閱不及五百人為四畨利器械農隙訓之禁一切他役上畨則給粮免稅校長免二丁稅於是一路得四萬餘人同上嘉祐四年上封者言義勇為河北伏兵惜其束於列郡遺其大用而議者但以為城守之備誠能以河北冀邢分東西兩路命二郡守臣為義勇總管兵官為鈐轄歲以季冬廵閱萬一犬戎入寇即翔集赴援傍出掩擊彼冦腹背受敵則是河北三十餘所常伏銳兵朝廷下其章河北四路帥臣仝上大名李昭亮定州龎籍真定錢明逸瀛州王贄議曰唐李抱真籍民三丁選一農隙則試示以賞罰得勁卒二萬是時昭義步兵冠於諸軍此近代之顯效而或者謂民兵祗可城守難備戰陣非通論也但今便分為兩路置官統領以張用兵之勢外使敵人疑而生謀内亦揺動衆心恐非寓兵之術姑令㸃集訓練二三年間武藝稍精遇有警時得將臣如抱真者統馭制其陣隊示以賞罰何戰之不可哉自置義勇州縣以時按閱耳目已熟行固無疑詔如所議長編英宗治平元年乙亥命屯田郎中徐億職方員外郎李師錫屯田員外郎錢公紀刺陜西諸州軍百姓皆為義勇初宰相韓琦奏三代漢唐以來皆籍民為兵故其數雖多而贍養至薄所以維制萬宇而威服四夷又非近世所蓄冗兵可及也唐制府兵最為近古天寳以後廢不能復因循至于五代廣募長征之兵故困天下而不能給今之義勇河北幾十五萬河東幾八萬勇悍純實生於天性而有物力資産父母妻子之所係若稍加簡練亦唐之府兵也陜西當西事之初亦甞三丁選一丁為弓手其後刺為保捷正軍及夏國納欵朝廷㨂放於今所存者無幾河北河東陜西三路當西北控禦之地事當一體今若於陜西諸州亦㸃義勇止刺手背一時不無小擾而終成長利詔從之樞宻副使胡宿請且刺㳂邊州軍上答曰不若即了之韓𤦺意亦欲如此乃命億等往除商虢二州不籍餘悉籍義勇總得一十五萬六千八百七十三人仝上知諌院司馬光奏曰昔康定慶歴之間籍陜西之民為鄉弓手始者明出敕榜云使之守䕶鄉里必不刺充正軍屯戍邊境榜猶未收而朝廷盡刺充保捷指揮令於邊州屯戍自後官中知其無用遂大加沙汰以公據放令逐便乞早降指揮罷刺陜西義勇終弗聴仝上光又六奏及申中書自劾求去亦終弗許甞至中書與韓𤦺辨𤦺謂光曰兵貴先聲後實今諒祚方桀傲使聞陜西驟益二十萬兵豈不震慴光曰兵之用先聲為無其實也獨可以欺之於一日之間耳少緩則敵知其情不可復用矣今吾雖益二十萬兵然實不可用過十日西人知其詳寧復懼乎琦不能荅復曰君但見慶歴間陜西鄉兵初刺手背後皆刺面充正軍憂今復然耳今已降勑榜與民約永不充軍戍邊矣光曰雖光亦未免疑也𤦺曰吾在此君無憂此語之不信光曰光終不敢奉信非獨不敢但恐相公亦不能自信耳琦怒曰君何相輕甚耶光曰相公長在此可也萬一均逸偃藩他人在此因相公見成之兵遣使運粮戍邊反掌間耳琦黙然竟不為止其後十年義勇運粮戍邊率以為常矣同上神宗熈寧正月辛丑樞宻使吕公弼言請簡河北義勇五分之一刺手背為上等二字令養馬習騎射而免其户賦甲寅詔從之同上神宗時河北河東陜西三路義勇總四十二萬餘河東弓箭手七千陜西十郡并寨舊籍四萬六千三百後歸休息聮以為保甲云熈寧三年知定州滕甫言臣竊謂中國之兵與夷狄之兵常患多寡之不敵其故無他葢中國兵有定數至於平民則素不使之知戰夷狄之俗人人能闘擊無復兵民之别有事則舉國皆來此所以取勝多也今河北州縣近山谷處民間各有弓箭社及獵射守等户習慣便利與夷人無異乞下本道州縣令募諸色公人及城郭鄉村百姓有武勇願學弓箭者為社每年春長吏就其射處勸誘閱試之緩急雖不可調發亦足以為捍禦從之王安石進呈蔡挺乞以義勇為五畨教閱事上因論及民兵安石曰募兵未可全罷民兵可漸復雖府界亦可為至於廣南尤不可緩今中國募禁軍往戍多死此害於仁政陛下誠罷軍職所得官十二三鼓舞百姓豪傑使趨為民兵則事甚易成上患宻院不肯措置義勇安石曰陛下誠欲行則孰能禦此在陛下也因為上言國之大政在兵農上曰先措置得兵乃及農縁治農事湏財兵不省即財無由足安石曰農事亦不可以為在兵事之後前代興王知不廢農事乃能并天下興農事自不費國財但因民所利而利之則亦因民財力而用也長編涇渭儀四州義勇萬五千人舊止戍守經畧使蔡挺始令遇上畨依諸軍結陣隊分𨽻諸將選藝精者遷補給官馬月廩時帛郊賞與正兵同遂與正兵相參戰守時土兵有闕詔募三千人挺奏以義勇㸃刺累年雖訓𨽻以時而未施於征防意可以按府兵遺法俾之畨戍無補所闕土兵詔復問以措置逺近分畨之法挺即條上以四州義勇分五畨畨三千人防秋以八月十五日上十月罷防春以正月十五日上三月罷周而復始所募土兵歲减粮八萬石料錢六千餘緍春冬衣帛五千疋綿三萬七千兩詔從之行之諸路長編十二月中書言司農寺定畿縣保甲條制凡十家為一保選主户有心力者一人為保長五十家為一大保選主戸最有心力及物産最髙者一人為大保長十大保為一都保乃選主戸有行止材勇為衆所服者以為都副保正凡選一家兩丁以上通主客為之謂之保丁但推以上皆充單丁老幼疾患女口等並令就近附保兩丁以上更有餘人身力少壯者亦令附保内材勇為衆所服及物産最髙者充遂保保丁除禁兵器外其餘弓箭等許從便自置習學武藝仍乞選官行於開封祥符兩縣團成保甲候成次緒以漸及他縣從之先是同管勾開封府界常平等事趙子幾言近歲冦盗充斥公為民害今欲依舊保甲各立首領使相部轄及捕賊賞格乃下司農寺詳定至是増損行之同上王安石剏為保甲之法令民自置弓箭及毎小保用民力築射垜又自辦錢粮起鋪屋三兩區每保置鼔遇賊聲擊開封酸棗等縣民千餘人赴寺訴其不便是時五路義勇皆改為保甲至元祐罷之上謂王安石曰用募兵與民兵亦無異若役之過苦則亦變矣安石曰役之過苦則變誠然募兵浮浪不顧死主之人則其喜禍亂非良農之比然臣已甞論奏募兵不可全無周官國之勇力之士屬於司右有事則可使為選鋒又令壯士有覊屬亦所以弭難也上論變義勇為民兵上曰民兵雖善止是妨農事如何安石曰先王以農髙兵因鄉遂寓軍旅方其在田什伍已定湏有事乃發之以戰守其妨農之時少今邊陲農人則無十五不知戰守之法又别募民為代兵盡邊人耕織不足以給衣粮乃至官私轉輸勞費尚患不足遇有警争則寡兵反不足以應敵無事則百姓耕種不足以給之豈得為良法也上曰止是民兵未可恃以戰守奈何安石曰唐以前未有㸃兵然可以戰守臣以為募兵與民兵無異顧所用將帥如何耳將帥非難求但人主能察見羣臣情偽善駕御之則人材出而為用而不患無將帥則不患民兵不為用長編熈寧四年上曰府兵與租庸調法相湏安石對曰今義勇土軍上畨供設既有廩給則無貧富皆可以入衞出戍雖未有租庸調法亦可為第義勇以良民為之當以義禮奬養今皆倒置涅其手背人不樂一也教閱糜費人不樂其二也又使之運粮人不樂其三也今措置義勇皆當反此使害在於不為義勇而利在於為義勇人以得籍名於義勇為幸至於武藝推恩隨人材之高下使咸有幸得之心則俗可變而衆技可成也擇其鄉閭豪傑為之將校稍加奬抜則人自恱服矧今募兵為宿衞及有積官至刺史以上者移此與彼固無不可况又不至如此費官禄已足使人樂為之陛下誠能審擇近臣皆有政事之材異時可使分將此等軍今募兵出於無賴之人尚可為軍廂主則近臣以上豈不及此軰此乃先王成法社稷之長計也上極以為然同上熈寧五年癸亥樞宻院言諸路勇敢效用法縁邊諸路經畧司勇敢効用皆以材勇應募從軍月給錢粮戰馬器甲以時𨽻習若無調發皆聴還家其鬭戰勞效依次選補凡四補至借職此弓箭手有功遷轉自押官至借職凡十四資淹速特異非朝廷第功均賞之意先據涇原路經畧司奏勇敢武藝舊雖分等弓力多不中程精冗相參疲弱幾半尋閱試汰去冗濫粗為精勇今以河東鄜延秦鳳環慶熈河路各三百人涇原路五百人為額不刺手不置營每季首赴經畧司閱試及本軍注籍遇有邊事追集給口食借官馬給草料其教習日依甲分射親及野戰中者有賞全不中者减料錢次季又不中勒停遇戰有功以八等定賞從之仍頒行諸路長編熈寧五年執政同進呈河東保甲事樞宻院但欲為義勇强壯不别名保甲王安石曰此非王安禮初議也上卒從安石議令盡依王安禮所奏同上上欲修河北弓箭社馮京曰河北義勇十八萬自足何湏做弓箭社王安石曰河北義勇收人户不盡河北有許多地有許多人何故只令十八萬人習兵為義勇而不可令盡習兵當如今府界保法修定古者民居則為比比有比長及用兵即五人為伍伍有伍長司馬二十五家為閭閭有閭胥二十五人為兩兩有兩司馬兩司馬即是閭胥伍司馬即是比長但隨事異名而已熈寧六年八月復比閭族黨養馬法凡五路義保願養馬者户一駟有物力養馬者户二疋聽以監牧見馬給之或官與其直使自市毋或强予府界毋過三千疋五路毋過五千疋馬除襲盗賊外不得乗越三百里三等以上十户為一保四等十户為一社以待死病補償者保甲馬即馬主獨償之社户馬半使社人償之歲一閱其瘠肥禁苛留者凡十有四條先自府界頒行焉在五路者要監司經畧州縣更度長編熈寧八年四月詔罷給田募人充役已就募人聽如舊有走死停替者勿補先是王安石為上言給田募役有十餘害上曰苟如此初何以有此議議者必言所利翌日檢初議乃李承之言募弓手宜如弓箭手為便遂作此法餘無所科安石曰只以田募弓箭手已不如募弓手之便弓箭手雖選强壯然即取足於一家茍可以强壯則弗却也弓手乃選强壯於無方所募皆得直强壯也上乃令廢以田募役法同上熈寧九年五月詔諸保甲可依新降隊法結隊并印新結隊圖付兵部毎一都保結與一圖結隊之法三人為一小隊三小隊為一中隊五中隊為一大隊并引戰一人居前擁隊一人執刀居後兼二人居左右執旗一人居中凡五十人皆選士也有馬人與無馬人各為隊隊中兵械或純用一色或雜用弓弩刀斧槍楯皆於結隊時商定教習同上元豐二年十二月辛亥提舉廣南東路常平等事林顔言今天下之民家為之保保為之長長為之正者豈特不容其奸而已葢歸兵食於農藏武士於耕夫所謂教而後使之道也欲乞本路㳂江海諸州依西路法訓閱使其人既熟山川之險易而又知夫弓矢金鼓之習則一方自足為備可以不勞北兵矣詔下廣南東路經畧轉運提舉鈴轄司相度皆言廣惠潮封康端南恩七州皆並邊及江海外接蠻賊司可依西路保甲教習武藝從之長編元豐六年十月權發遣京西路轉運判官孫覺言看詳諸路廵檢土兵立法之意葢為其人習知本處人情出入道路易以緝捕盗賊近廵歴諸州見所招土兵多老弱不堪被甲可擒盗者十無三四仍未必皆土人欲乞逐路委監司一員選留外改刺遂州廂軍從之同上哲宗元祐元年七月右司諫蘓轍奏曰臣竊見夫仁宗朝河北河東初置義勇至英宗朝推行其法漸及陜西皆以地接邊羌有守禦之備毎歲冬教一月民雖以為勞而邊防之計有不得已及熈寧中更置保甲使京畿二三路之民日夜教習三聖臨御知其不便率皆罷去民得歸秉耒耜盗賊因此衰息歌舞聖徳無有窮已惟有冬教一月之法三路以被邊之故民習為常不敢辭愬至於京畿諸縣累聖以來為輦轂所在素加優厚今乃與三路邊郡為比一例冬教情所未安伏乞聖慈深念根本之地所宜寛恤特與蠲免同上十一月殿中侍御史吕陶言伏見保甲法雖已更改猶有二弊未便於民其一為罷去二十畆已下免教指揮却令五等户有三丁者皆赴冬教一月縁民之貧富不等子之多少而教與不教則有幸不幸今田百畆家有二丁則免教是謂之幸田有十畆家有三丁則赴教是謂之不幸比貧富力役大為不均臣愚欲乞於三等已上或等第雖低而家業及一百貫有三丁者方得差充其一為陜西州郡今秋雨澇人户有訴灾傷去處而蠲稅不及五分並湏赴教官司奉法不敢放免臣竊謂保甲之令行已累年朝廷知其有弊多所釐改欲民休息若雖候灾傷及五分方與免教亦恐徳澤未廣臣愚欲乞應係灾傷縣分兼特免冬教以惠畿内三路之民詔府界保甲人户五等已下地土不及二十畆者雖三丁以上並免教從陶請也長編元祐二年詔諸路廵檢土兵額半差禁軍以樞宻院言土兵本以諳悉山川地理易於捕冦今歲乆以親戚鄉里之故或庇其為奸請以禁軍相兼故有是命同上紹聖三年三月樞宻院言廣南東西路搶手土丁熈寧舊法一年縣教一年上州昨自元祐以來罷上州只令縣教慮因此漸成廢墮詔依熈寧舊法同上高宗建炎元年張慤請募民聮以為什五使合力抗敵謂之廵社有甲隊歩射之制擇土豪一人為都副總轄詔頒行天下二年詔陜西河北依舊餘皆罷紹興初王庶知興元兼利路安撫籍諸縣良家子弟號曰義士每兩丁取一三丁取二與免户下物力錢每五千為一隊以知縣為軍正尉為軍副日閱於縣月閱於州不半年有兵二十萬今川口義士尚衆皆庶倡之也其後紹興四年承楚秦州各置水寨民皆團聚紹興二十一年張輔世言利路義士就令土豪領之多率歛邀求役無虚月望放歸農詔申樞宻院紹興三十一年詔籍鄉兵知荆南府續觱乃請籍民為義勇其法取於主户之雙丁十户為一甲五甲為一團皆有長擇一邑之豪為總首歲於農隙教閱官給其糧其後籍者至七八千人孝宗乾道五年三月淮西副總管王公述進對一曰淮甸義兵可按教不可乆勞有妨耕種淳熈三年二月上御便殿閱兩浙福建土兵上曰軍士皆好身手教閱甫三數月事藝已精熟弓弩手自可比殿前司之數因諭輔臣曰向來兀术入冦陳思恭邀截于平江官兵乃用長槍不能及敵兀术遂以輕舸遁韓世忠江上之戰亦然若用弓弩兀术必成擒矣今次州郡起發禁軍土軍極整肅茲又及時遣歸更加激犒他時調發必易集聖政淳熈四年八月壬申進呈前來教閲民兵兩淮荆襄總費為緡錢三十六萬有竒米三萬石有竒上曰此謂逐路追集教閱耶趙雄奏兩淮各就漕司逐路教閱江陵襄陽荆門各就逐州上曰如此則可與降指揮候農隙日令守臣教閱一月聖政淳熈十一年十二月上曰議者多言邊郡太守湏是乆任今邊郡無兵雖乆任何益大軍皆在江南若是創置又費衣粮却是弓弩手民兵無養兵之費有養民之益緩急亦可用同上再攷民兵自府兵之法廢代宗時李抱真為澤潞觀察留後凡八年抱真策山東有變乃籍户三丁擇一蠲其徭租給弓矢令閑月得曹偶教戰習射歲終大閱第能否比三年皆為精兵舉所部得戍卒二萬既不廪于官而府庫實遂雄山東天下稱昭義步兵為諸侯冠其後李徳裕為劒南西川節度代請甲人安定弓人河中弩人浙西繇是蜀之器械皆犀銳率户二百取一人使習戰貸勿事緩則農急則戰謂之雄邊子弟於是二邊寖懼南詔請還所俘掠四千人吐蕃維州將悉但謀以城降五代唐潞王詔天下大括將吏又發民為兵户出征夫一人自備鎧仗謂之義軍用張延明之謀也得征夫五千人實無益於用而民間大擾晉齊王敇籍鄉兵毎七户共出兵械資一卒號武定軍國朝咸平四年又括陜西丁壯共得萬八千號保毅軍景徳二年曹瑋請以邊民應募者為弓箭手及治平元年籍陜西鄉丁為義勇軍及令環慶鄜延為撥保毅軍為義勇初宰臣韓琦言今之義勇河北幾十五萬河東幾八萬勇悍純實出於天性而又有物力資産父母妻子之所係若精加㨂練亦唐之府兵也陜西當西事初亦甞三丁選一為弓箭手其後刺為保捷西夏納欵朝廷釋之河北河東陜西當西北控禦之地其勢一也今若於陜西諸州亦刺義勇止刺手旁亦無驚駭一時雖擾終成大利上乃命徐億方諸州籍之得義勇十二萬二千五百人初韓琦欲刺陜西民為義勇諌官司馬光抗章數十力言其不可四朝志序國家籍郡國鄉里及旁塞之民與其丁壯子弟之應募者𨽻習武事備戰守曰義勇曰弓箭社曰保毅曰寨户曰疆人曰上丁曰弩手曰洞丁曰槍手曰弓箭手曰敢勇曰蕃兵各因其方之民而名之通謂之鄉兵自熈寧以來民兵莫盛於保甲王安石欲變募兵而行保甲帝從其議熈寧三年始聮比其民以相保伍乃詔畿内之民十家為一保選主户一人為保長五十家為大保選一人為大保長十大保為一都選衆所服者為都保正又以一人為副應主客户兩丁以上選一人為保丁附保兩丁能有餘丁而勇壯者亦附之先行畿甸既就緒遂推之五路以遍于天下初以捕盗賊而相保任而未𨽻以武事四年始詔畿内保丁𨽻習武事元豐元年呈引府界保甲藝成者帝親閱之擇其能者官使下者亦賜金帛元豐四年詔五路義勇悉改為保甲其年府界河東陜西歲費三十一萬三千一百六十六緍而團教之賞為一百萬緡有竒凡教習歲遣使則謂之提舉按閱率以近臣挾内侍往諸路皆以畨次藝成者先按閱率五六歲一遍獨河東以金帛不足以賞乃至十一歲上詔晉人介居二敵之間講勸不可復加賜緍錢十五萬其繫廂義勇保甲及民兵合七百一十八萬二千二十人自保甲之法立争之甚衆文潞公司馬公皆請罷保甲韓維吕公著范純仁王巖叟皆深言其弊渡江以來楚秦州各置水寨民皆團聚邀擊賊衆上曰淮甸遺民能力奮忠義如此水寨民兵並與放十年租稅總論民兵國初京師之兵强州縣之兵弱一有警急悉調京師京師不足以民兵足以振武保捷宣毅義勇皆兵出於民而籍之州縣者也是故禁旅不若土人陳貫言之見衞兵出戍東兵不及土兵田况言之田况言振武保捷皆是土兵材力伉健武藝精强其餘請給甚微不及東軍之下者新添虎翼軍不知戰鬪若添土兵請給其立功必不在東軍之後彼其習於風土長於戰鬪故能動有成功慶歴初詔刺四路弓手張公方平曰不可康定元年詔陜西河東河北京東西路籍民為弓手强壯慶歴元年詔京東西路弓手强壯悉刺充保毅軍陜西路悉刺充保捷軍韓公曰可卒刺之慶歴二年詔琦甞奏本路諸益軍馬詔琦詳度以聞𤦺請陜西弓手悉刺充保捷指揮諸州保毅軍河東河北義勇皆涅手治平初詔刺陜西義勇温公曰不可韓公曰可卒刺之見前夫以祖宗之至仁大臣之至忠而籍民為兵猶莫之免良以費省而足用也馴至熈寧因趙子幾之言行保甲之法見前夫保甲亦民兵也而為法既宻見前為教益酷鞭笞之苦誅求之苦不得免焉民不堪命則有執指使逐廵檢攻提舉幹官以輸其忿而已見上安得人人如黄廉之在河東也哉元祐元年黄廉提舉河東路保甲凡二年雖在團教場未甞易儒服元豐末他路擁兵殺官吏獨河東保甲不為犬吠之盗噫是無以議為也有如弓箭之刺率皆市人不可用而宣毅驕甚所至為冦何韓之慮不及張耶墓志時於諸路刺弓箭手為宣毅保捷指揮方平連争之不從所刺兵皆市人不可用而宣毅驕甚所至為冦識者以為不從方平言為恨義勇之刺其後運糧戍邊率以為常何韓公之慮又不及司馬公耶上文曰張公司馬公慮甚逺矣而韓公亦未可深貶也石壕之詩公葢誦之乆矣彼誠見夫漢唐調發之弊故欲收拾强悍者養之以為兵則良民可以保其相聚之樂雖稅歛之厚不恤也别録琦議及養兵事慨然曰琦有所思而得養兵雖非古然自有利處昔者發百姓戍邊無虚歲杜甫石壕吏篇調兵於民其弊至此後世既收拾强悍無賴者養之以為兵良民雖稅歛良厚而終身保骨肉相聚之樂此豈小利公之慮及此又安得以一時之見而盡非之哉林駉文羣書考索後集卷四十一
