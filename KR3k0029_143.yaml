body:
  text: 羣書考索續集卷十二宋章如愚編經籍門隱公魯何以得稱元劉炫歎何休云唯王者然後改元立號春秋託新王受命於魯故因以録即位若然新王受命正朔必改是魯得稱元亦應改其正朔仍用周正何也既託王於魯則是不事文王仍奉王正何也諸侯改元自是常法而云託王改元是妄説也正義何以黜周王魯經書春王三月王即周平王也月即周正也公及邾儀父公即魯隱公也魯用周正則魯事周矣天子稱王諸侯稱公魯尚稱公則號不改矣春秋之文安在黜周王魯乎若黜周王魯則魯宜稱王周宜稱公此言周王而魯公知非黜周而王魯也孔子之作春秋本欲興周非黜周也春秋何以不取隱古者君薨嫡子立無嫡子則庶長立仲子者惠公之繼室而桓公之母也諸侯無再醮則仲子不當稱夫人桓公不得為嫡也桓公不得為嫡則與隱公尊卑等爾正以長幼為先後爾然而惠公有命焉大夫羣臣可以莫從而隱公則不可以莫之從也惠公薨羣臣以國難立長君隱於是時可謂難矣将為社稷計則先君之命有不及将從先君之命則非徒不可以即位亦不可以攝也周公攝政抱成王而朝諸侯矣未嘗稱王也然猶七年而復子明辟隱公之攝十一年矣口誦立桓之言而征伐盟㑹身自専之一旦干賞蹈利之人媒孽其間則桓公非特患其不立也且有懼焉以為隱公必将殺已而終有其國也故隱公不得遂其愛桓之心而桓終蹈於大惡不義皆隱公之所由致也故學春秋者之無取隱公也正義春秋何始魯隱公曰然則春秋何始於魯隱公答曰周平王東周之始王也隱公讓國之賢君也考乎其時則相接言乎其位則列國本乎其始則周公之祚𦙍也若平王能祈天永命紹開中興隱公能宏宣祖業光啓王室則西周之美可尋文武之迹不墜杜預春秋序辨春秋始隱之意洪曰文王武王都豐鎬是為西周平王都河南是為東周西周之書有誥命存其詩有雅頌存盛徳大業炳如也唯東周賞罰綱紀不可攷聖人欲為之書則東遷周事也夫子陪臣有不當為故用魯以名其書耳武王克商嵗在己卯隱公即位歳在己未其相去蓋有四百一年也周家之興厯年八百夫子以前四百載事託之詩書以後四百載事託之春秋而隱公元年實為後四百始年此春秋所以不得不始隱也名雖始隱而意在周故未嘗盡録平王之政而實承平王末年雖未嘗記東遷之始而實具東遷之末則亦聖人以此微示其意歟説者以為春秋之意欲始平王按平王三年惠公即位果如是説則春秋當始惠公矣説者又以為春秋始隱賢其遜國按隱公生不復辟死不成攝果如是説則隱不當稱公矣然則春秋始隱之意斷若是歟八年魯鄭易田春秋隱公八年書曰三月鄭伯使宛來歸祊庚寅我入祊左氏傳曰鄭伯請釋太山之祀祀周公以太山之祊易許田鄭伯使宛來歸祊不祀太山也杜預釋之曰許田近許之田成王賜周公許田以為朝宿之邑宣王賜母弟鄭桓公助祭於太山湯沐之邑在祊今魯鄭各從本國取近之宜故以祊易許田辨左氏之説為誤林曰魯鄭易田後世因左氏之説以罪二國不復顧天子廵狩諸侯朝覲之禮予究其寔不然此蓋左氏見是年鄭以祊予魯桓公元年魯以許田予鄭又見魯頌云居常與許復周公之宇則遂以為許魯地也曽不知許有二詩所謂許者周公舊封也春秋所謂許田者許國之地也如經書築臺于秦仲遂至黄乃復秦與黄俱魯地而諸侯之國亦有秦與黄也不可以許田即為魯舊地而生易田之説且文武之子孫孰非有功而親者使皆有朝宿湯沐之邑中國何地以處之此不然也攷之地志今許州許昌郡古許國也見有許田縣則許田是許也田如邾田之類何得以為魯地近許之田乎是又不然也况祊今在沂州瑯琊郡有祊城去太山為逺安得為鄭人助祭湯沐之邑借如彼説時鄭荘公方强此年既以祊歸魯必欲急許田隱公何得終其身不歸之及桓公之立始以璧假之何哉况神不歆非祀民不祀非族鄭伯雖愚釋太山之祀而為魯祀周公非人情之甚也聖人脩經欲令後世明知不待三𫝊然後著使誠有易田之事但曰歸祊入祊無乃大隱而不可知乎不知祊者乃鄭人嘗所侵有之地而近於魯今歸我者鄭人思以結魯之援六年既來諭平恐魯之好未固謂隱公可以為援也故以祊地予之鄭歸而魯入然後二國之黨固矣予嘗疑祊在汧州為魯地經不書魯失祊之由或在春秋之前也續攷之祊即近魯非本魯地也若本魯地經但當書鄭伯使宛來歸祊足矣不當經書曰庚寅我入祊據齊人歸我濟西田經不書我入讙闡葢魯之故地既失復得何用書入乎今祊特書曰我入祊則見魯公貪鄭之賂非可入而入故也若乃許由既非魯之舊封何得有是乎曰此春秋之微義隱公既交齊鄭十年乃相與伐宋而取郜祊十一年乃合齊鄭伐許而有其地葢魯之有許田自入許之年始伐宋之謀本於齊鄭故經書翬帥師㑹齊人鄭人伐宋㑹者謀出於彼也入許之師出於隱公故經書公及齊人鄭人入許及者謀主於我也然許田近鄭而逺於魯魯人雖有之鄭人之所欲也時隱公尚强鄭人雖欲得之而未能與魯爭迨一旦桓公簒隱鄭荘乗間直至于魯之垂以求許田名為璧假實以脅取之也桓公不義方懼諸侯之討宜不敢不與也自是許之土地為鄭所有許叔此不見經至鄭荘死忽突爭國鄭國大亂許叔始得乗隙而入許復有其國經於桓十五年書鄭突出奔蔡鄭忽歸于鄭繼書許叔入于許其㫖隱而甚明由是鄭人無時不伐許必欲得其故地許人凡四遷以避之而卒不免迨春秋之末經書鄭游速帥師滅許以許男斯歸而得已許鄭之事葢由鄭荘嘗假許田於魯故也攷之春秋許之源流興亡若是何得如左氏傅㑹之説妄設易田之事乎左氏為許田之説既誤後又覺有許叔入許之事乃於隱十一年公及齊鄭入許設辭謂齊侯以許遜公公以與鄭人鄭伯使百里奉許叔以居許東偏蓋為後張本也不知鄭之得許乃在於假璧之年何得於隱公之時已有之學者之於春秋不究源流始末期於自得而惟随三𫝊東西若是者豈少耶桓公桓公何以不書王春秋一書書王正月者九十三王二月者二十一王三月者一十九無事首時亦冠以王之一字而獨桓公不書王榖梁以為桓無王故春秋不書然既曰無王矣而元年又書者何耶榖梁曰元年有王所以治桓也此説近之荘公盟扈何以書日公羊荘二十三年盟扈曰危之也何危爾我貳也言魯荘有巧貳之行僖九年盟葵丘曰危之也何危爾齊侯震而矜之叛者九國榖梁荘二十三年盟扈范曰魯荘怠棄國政憂危是伯王降心與之盟得免于罪臣子喜而録之故曰儀九年盟葵丘𫝊曰美之也范氏云桓徳極而将衰自此不復盟矣閔公元年書季子來歸嗚呼春秋之於褒貶忠且恕也愛不隱其惡憎不减其善季子之歸也而聖人賢之何也曰賢之将以責其備而譏之也君子之觀過各於其黨斯可知矣善不勝其過則聖人書其過過不勝其善則聖人書其善何也夫孟女之子般叔姜之子開荘公無嫡嗣而愛孟女欲立其子問嗣叔牙叔牙曰一繼一及也而季友以公命使酖之公薨季子立子般為君夫立子般忠也殺叔牙義也忠與義人臣之大分而季子實有之不亦善乎故書曰季子者賢之之辭也慶父與哀姜私而欲立其娣之子開使圉人犖殺魯公子般於黨氏季子知其力不能勝而奔陳國人思其忠義以平内亂而慶父卒立開為君是為閔公閔公立元年秋八月及齊侯盟于落姑以納季友書曰來歸者喜之之辭也魯人意也然則魯人喜之春秋貴之而復何譏也曰譏其不能弭亂討賊也何以見之曰於元年書季子來歸而二年書公薨書慶父出奔見之也何也季友之賢國人恃之以為輕重安危閔公之請復也既歸矣而不能誅慶父使賊復得弑閔公此其過一也慶父既弑閔公矣又不能討賊而平之使復得奔于莒此其過二也夫二者豈國人思之之心而閔公復之之志也然則於元年書季子來歸而二年書公薨書慶父出奔聖人之微意可知矣故曰賢之将以責其備而譏之也過不勝其善者也三𫝊之所謂賢所謂貴所謂善者皆是矣而未及所謂譏之者故愚得詳其説焉二年書吉禘荘公周曰古者大祭曰禘禘者言所以審禘昭穆也天子之事也大𫝊曰王者禘其祖之所自出以見其祭之大者也又曰禮不王不禘以見此諸侯不得有者也而閔公用之嗚呼用於周公可也用於荘公不可也何也昔者成王追念周公賜之重祭外則郊社内則禘嘗魯之用禘所以崇周公也所以尊周也閔公用於荘公者僣也禮莫重於祭禘者祭之大者也節莫差於僣僣其禘者僣之大者也不以親親害尊尊春秋之義也而閔公遂滅其尊是無天也無天而行其能君乎雖然閔公之僣有漸周公而禘其兆之乎禮法國之紀綱所以限尊卑也諸侯而行天子之禮豈周公之意也然則成王之寵周公也所以開魯也嗚呼春秋之世諸侯亂天子大夫亂諸侯亂天子者天子也非諸侯也亂諸侯者諸侯也非大夫也然則防微杜漸可不謹乎哉夫子之志在春秋也葢為後世作也閔公二年夏五月乙酉吉禘于荘公者非禮也古者三年喪畢致新死者之主於廟廟之逺主當遷入祧因是大祭謂之禘然則未三年而禘非禮也故書日者所以明其未三年者也書吉者所以明其不宜吉者也作𫝊者言之詳矣然而皆未及所謂禘之僣也僖公齊桓葵丘之㑹僖公九年夏㑹諸侯于葵丘周襄王使宰孔賜文武胙彤弓矢大路秋盟諸侯于葵丘桓公震而矜之叛者九國是桓公之於葵丘夏㑹而秋盟一時之事也然則桓公圖伯經營出入上下三十年間斯已勞矣然自服强楚之後其志已盈不能朝于京師或致王世子于首止或致宰周公于葵丘其惡可知矣文公魯卿何以不貶元年秋公孫敖㑹晉侯于戚注禮卿不㑹公侯而春秋魯大夫皆不貶者體例已舉故據用魯史成文而已躋僖公何以書二年八月丁卯大事于太廟躋僖公注大事禘也躋升也僖公閔公庶兄繼閔而立廟坐宜次閔下今升在閔上故書而譏之時未應吉禘而於太廟行之明其譏非徒以逆祀故特大其事異其文宣公書不郊猶三望三年春王三月郊牛之口傷改卜牛牛死乃不郊猶三望辨魯僣天子禮林曰夫子傷周之衰禮樂自諸侯出其言魯之郊禘則有周公其衰之歎豈有天子郊天諸侯亦郊天子望祀山川諸侯亦望天子禘祖之所出諸侯亦禘使諸侯亦可行則聖人不以禮樂自諸侯出為傷自夫子沒漢儒不知道者但見春秋書魯祭祀多天子之禮始妄設魯賜禮樂之説所以諸儒不以魯郊為非然周郊於冬至而魯用之於啓蟄天子四望而魯三之名為後時降殺但竊郊望之名也已有罪矣辨春秋責魯之深大抵魯人乗周室之衰其僣擬無所不至是以天子之祭郊望與禘皆僣行之然天不可謟神明有知其肯享非魯之祭也哉季氏旅於泰山夫子曰曽謂泰山不如林放乎泰山有知必不享季氏之祭矧卜禘而可諂乎宜乎至於三卜四卜五卜不從鼷䑕屢食其牛可見天心之不享也魯人曽不知得罪於天雖屢卜不從而猶三望雖牛死而改卜牛甚者至於郊用可知僣擬之心不能自己聖人發憤作春秋書其因變故而不郊者僅如此其餘非卜不從牛死傷而肆意於僣者又不知其幾也深味聖師之㫖曰猶三望曰乃免牲其深矣乎其微矣乎税畆何以書初十五年秋初税畆注公田之法十取其一今又履其餘畆復十收其一故哀公曰二吾猶不足遂以為常故曰初成公作邱甲何以書元年三月作丘甲注周禮九夫為井四井為邑四邑為丘丘十六井出戎馬一疋牛三頭四丘為甸六十四井出長轂一乗戎馬四匹牛十二頭甲士三人歩卒七十二人此甸所賦今魯使丘出之譏重斂故書鄢陵之戰書晦十六年六月甲午晦晉侯及楚子戰于鄢陵楚子鄭師敗績公羊春秋不書晦者越盟奚戰是也朔有事則書霄石泓戰是也晦有事不書重始而終自正也僖十五年己卯晦震夷伯之廟成十六年甲午晦戰于鄢陵然則書之者𫝊曰晦者何冥也何以書記異也襄公武仲如晉何不書𫝊二十二年春臧武仲如晉注公頻與晉侯外㑹今各将罷還魯之守卿遣武仲為公謝不敏故不書㑹于宋曷先侯二十七年夏叔孫豹㑹晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋注按𫝊㑹者十四國齊秦不交相見邾滕為私属皆不為盟宋為主人地於宋則與盟可知故經唯序九國大夫楚先晉㰱而書先晉貴信也陳于晉㑹常在衛上孔奐非上卿故在石惡下春無氷何以書二十有八年春無氷注前年知其再失閏頓置再閏以應天正故此年正月建子得以無氷為灾而書昭公鸜鵒來巢何以書二十五年夏有鸜鵒來巢注此鳥穴居不在其界故曰來巢非常故書黒肱濫奔不書邾三十一年冬黒肱以濫來奔注黒肱邾大夫濫東海昌虞縣不書邾史闕文城成周曷不書盟三十二年冬仲孫何忌㑹晉韓不信齊髙張宋仲幾衛世叔申鄭國參曹人莒人薛人杞人小邾人城成周注世叔申世叔儀孫也國參子産之子不書盟時公在外未及告公公已薨定公齊人歸魯侵田林曰定公十年春秋書曰公㑹齊侯于夾谷繼以齊人來歸讙龜隂田左氏謂齊犂彌使萊人以兵刼魯侯孔子相定公使士兵之齊侯将享公孔子辭意以為齊服義故來歸田公羊之説則曰孔子行乎季孫三月不違齊人來歸田榖梁又曰兩君相揖齊人鼓譟欲執魯君孔子止之故歸齊田也至司馬遷作史記乃曰齊請奏四方之樂孔子以為夷狄之樂何為至此景公麾去之齊有司乃請奏宫中之樂孔子使有司誅之景公歸而恐乃歸所侵魯之鄆汶陽龜隂之田以謝過其後揚雄因其説曰齊人章章歸其侵疆自是幾千年無不信之借如此説聖人修春秋自書其功已非人情矣辨三𫝊説事亂經設者必欲謂夫子嘗為大夫於功必有其功夫子雖暫為大夫遭定公之孱懦三家之専肆未幾齊歸女樂即致政而去歸田之事於聖人何與不知此自為當時諸侯喜怒無常與之隙則横見侵奪與之好則侵地復歸比年魯與齊隙齊國夏伐我者再公亦常加兵于齊逮是年及齊平為夾谷之好㑹齊人以魯服已故鄆讙龜隂之侵地復歸于我亦如宣公之時齊人取我濟西田及宣公事齊人經則書齊人歸我濟西田哀公之時齊人嘗取我讙及闡及魯睦于齊經則書齊人歸讙及闡若以此歸田之功自夫子則濟西之歸讙闡之歸誰之力乎嗚呼自聖人沒三𫝊妄設事實亂經者十八九予非好為臆説以毁聖人之功葢惡其害經失實耳孔子隳三都定公十二年春秋書曰夏叔孫州仇帥師隳郈季孫斯仲孫何忌帥師隳費冬公圍成説者曰孔子為大司冦言於定公曰臣無藏甲大夫無百雉之城公山弗擾以費畔将隳成公斂處父以成叛葢左氏先為此説而公羊附益之司馬遷又取而記之借使孔子用事三事信如公羊之説則隳三都者自三家之意何用叔孫州仇帥師而後隳郈季孫仲孫帥師而後隳費公又自圍成乎三家必自帥師以隳私邑則非三家樂為之可知既非三家樂為之則非夫子之謀行乎三家可知豈有聖人見任於定公見信於三家尚能使之隳私邑而不能振國之綱紀乎哀公春秋曷終於獲麟十四年春西狩獲麟注麟者仁獸聖王之嘉瑞也時無明主出而遇獲仲尼傷周道之不興感嘉瑞之無應故因魯春秋而脩中興之教絶筆於獲麟之一句有感而作固所以為終也雜辨子貢未可言春秋經書閏月不告朔猶朝於廟此聖人愛禮之意也子貢欲去告朔之餼羊則子貢之智未可以言春秋也子路未可見春秋經書趙鞅帥師納衛世子蒯聵于戚此聖人之正名至意也子路曰子之迂也奚其正是子路之智未可以見春秋也游夏不能措一辭孔子作春秋萬有八千言當時門人已不知春秋意語云文學則子游子夏至於春秋不能措一辭公榖不能盡其意六經皆出孔子之筆然詩書止於刪禮樂止於定易止於繫春秋特見聖人之作褒貶當時國君世臣無位而行誅賞明示天子之法於天下也故其辭危其㫖逺其義微雖左氏公羊氏榖梁氏或親孔子或去孔子未逺亦不能盡得聖人之意諸儒不能知其藴諸儒董仲舒劉向晉杜預唐孔頴逹雖探討甚勤終不能知春秋之藴六經詩易春秋為深詩有文武之政周召之迹列國之風卜商之説易有伏羲文王之叙推之差易明放之差易見獨春秋専出孔子之筆故曰君子之於春秋終身而已矣並徂徠文三傳總論三𫝊何以並行陳岳曰聖人之道以春秋而髙聖人之文以春秋而髙聖人之文以春秋而微聖人之㫖以春秋而奥入室之徒既無演釋故後之學者多失其實是致三家之𫝊並行於後俱立學官焉噫絶筆之後厯戰國之艱梗經暴秦之焚蕩大漢初興未暇崇儒術至武帝方設制策延天下英雋有董仲舒應䜟記而通春秋仲尼䜟曰後代而得吾書董仲舒仲舒所業唯公羊傳仲舒既歿則有劉向父子向業榖梁歆業左氏左氏之道假歆而振自斯學者愈茂欲存左氏而廢公榖則西漢鴻儒尚焉欲存公榖而廢左氏則丘明與聖人同代是以皆各專一𫝊辨三𫝊聞見同異或謂丘明受經於仲尼豈其然歟茍親受之經則當横經請問研究深微間不容髪矣安得時有紕誤致二𫝊往往出其表邪葢業左氏者以左傳為證以斯為證謂與聖人同時接其聞見可也謂其親受之經則非矣聞不如見見不如受邱明得非見歟公羊榖梁得非聞歟故左氏多長榖梁多短然同異之理十之六七也辨左氏與二𫝊不同經者本根也𫝊者枝葉也本根正則枝葉固正矣本根非則枝葉曷附焉矧公羊榖梁第直釋經義而已無它蔓延茍經義是則𫝊文亦從而是矣經義非則傳文亦從而非矣左氏釋經義之外復廣記當時之事備文當時之辭與二𫝊不類膏盲廢疾墨守之辨鄭元何休賈逵伏䖍范寗杜元凱皆深於春秋者也而不簸糠蕩粃芟稂抒莠掇其精實附於麟經第各釀其短互鬭其長是非千種惑亂微㫖其弊由各執一家之學學左氏者則訾公榖學公榖者則詆左氏乃有膏肓廢疾墨守之辨設焉謂之膏廢者則莫不彌留矣亡一可砭以藥石者也謂之墨守則莫不堅勁矣亡一可攻以利者也隱公三𫝊言二王同異隱元年春王正月左氏謂周平王公羊謂周文王榖梁謂周平王辨左氏榖梁得其實春秋所以重一統者四海九州同風共貫正王道之大範也廼以月次正正次王王次春春次年年次元斯五者編年紀事之綱領也故書王以統之在乎尊天子卑諸侯正升黜垂勸懲作一王法為萬代規俾其禮樂征伐不専於諸侯也故用隱之元統平之春存平之正得不書平王歟茍為周書始命之王則二年何以復書必不然也是平王明矣斯公羊之短左氏榖梁得其實折𠂻三𫝊言隱即位不同隱元年書即位左氏謂居攝也公羊謂成公讓桓之意榖梁謂隱避非正也辨左氏公羊得其實夫遜者君臣之大節也茍不失其正則聖人必重之春秋必韙之榖梁謂非正豈微㫖歟隱之遜非徒為桓蓋成先君歸仲子之意春秋實尼父之日月也日月之垂昭昭然非遜國之賢君曷以居其首哉居斯之首與居諸史之首則正創業之主斯之首則聖人特筆之以冠十二公矣如定易非乾象無以冠之七十𫝊非夷齊無以冠之三千子非顔閔無以冠之又春秋正桓母之喪不正隱母之喪桓母書夫人薨隱母書君氏卒斯皆正隱讓之明言而聖人崇謙遜之風戒僣亂之俗成王化之本也左氏公羊得其實榖梁之短桓公謂三𫝊言書王不同元年書王左氏通謂之魯用周厯故書王茍王不班厯則不書公羊無𫝊榖梁謂桓弑立以為無王之道故不書辨榖梁𫝊經之短春秋嵗首必書王者聖人大一統也書王必次春書正必次王謂春者天之所為也正者王之所為也王禀於春正稟於王以載行事以立綱紀綱紀立而後條貫舉條貫舉而後褒貶作褒貶作而後君君臣臣父父子子之道定是以凡書王皆因周之班厯或不失班厯則書以明上尊天子下卑諸侯以正王道也茍不班厯而不書王則并正去之雖是月有事第書其事而無其正何者王既不書正将奚附茍班厯而書王則併正在焉雖是無事亦書空正月以紀之何者王既書之正宜在焉自始正末無毫釐之差穀梁謂桓簒立以為無王之道故不書王去聖人之㫖逺矣斯榖梁之短公羊無辭左氏得其實三𫝊言烝不同桓八年正月己卯烝五月丁丑烝左氏曰春即夏之仲月非過時而書公羊曰譏亟也榖梁曰烝冬事而春興之志不敬也辨左氏言得其㫖凡郊祀各有其時茍得其時則國之常禮國之常禮則不書之於冊也夫所書者或志其過時或刺其失禮皆非徒然故啓蟄則郊之時也龍見則雩之時也始殺則嘗之時也閉蟄則蒸之時也周之建子為嵗首夏以建寅為嵗首夫啓蟄者則夏之春周之夏也龍見者則夏之夏周之秋也始殺者則夏之秋周之冬也閉蟄者則夏之冬周之春也春秋用周正以建子為嵗首書正月蒸則夏閉蟄而蒸得其時矣既得其時則是國之常禮則何以書之書之者為五月復蒸也五月復蒸一則失其時二失其禮正月蒸正也五月蒸不正也書其正以譏其不正左氏謂非過時而書得其㫖公羊謂譏亟近之榖梁謂冬事春興逺矣折衷莊公三𫝊言不書即位不同元年不書即位左氏曰文姜出故也公羊曰繼弑君不言即位榖梁曰先君不以其道終故不言即位辨公榖不得經㫖春秋十二公惟隱莊閔僖不書即位蓋聖人因舊史之文無它㫖隱以遜桓居攝荘以父弑母出僖閔國危身出復入不備禮即位故不書公榖謂繼弑君不言即位則桓繼隱之弑君即位何也又稽定公先君薨於乾侯六月癸亥喪至句其月戊辰即位春秋以是書之葢備禮則書明矣左得其㫖三𫝊言築館異同元年秋築王姬之館于外左氏曰得禮之變公羊曰非禮榖梁與公羊同辨左氏榖梁得其㫖聖人修述惟重其禮法得其宜則書以是之非其宜則書以刺之有循常而書者有變文而書者循常而書如戰伐灾異之類是也變文而書如君氏卒大去其國之類是也循常而書者史冊之舊文也變文而書者聖人之新意斯築于外是書荘公變禮得其宜聖人變文示其法何也天子之女下嫁於諸侯則同於諸侯之禮而天子使單伯送王姬于齊以魯為主公與齊襄有不同天之讐荘公方在諒闇不宜行吉禮于廟以齊之强以王之尊大義難距廼築館于外上不失尊周之儀中不失敬齊之體下不失居喪之節左氏榖梁得其㫖公羊之誤三𫝊言錫命不同元年王使榮叔來錫桓公命左氏曰追命桓公褒稱其徳公羊曰追命加貶也榖梁曰禮有受命無來錫命非正也辨公羊之説為當折衷曰褒有徳賞有功絀不服責不臣斯四者聖人筆削之㫖也茍有徳可褒有功可賞生賜之不及則死錫之何爽茍無徳可褒無功可賞雖生而錫之亦非矧其死乎吁春秋十二公唯桓之罪大桓始以簒弑不義而立終以帷簿不修而薨古人曰畏首畏尾身其餘幾桓既不能正其初又不能䕶其末其畏何如哉天王之錫曷為而來春秋經書天王之命生而賜之唯文成二公死而錫之唯桓公而已茍曰加貶則不宜備禮而書為使榮叔來錫桓公命則於文無所貶稽其㫖諸侯强王室弱雖生賜死錫皆非有賞功褒徳之實第務其姑息而已聖人多存内諱内弑君猶不書詎肯筆削錫命歟左氏第曰褒徳未盡其㫖榖梁謂無來錫命近之公羊曰加貶為得其實三𫝊言書狩不同四年冬公及齊人狩于禚左氏曰與微者狩失禮可知也公羊曰稱人諱與讎狩榖梁曰人齊侯者卑公也卑公不復讎而刺釋怨也辨榖梁之説為近凡戰伐盟㑹茍君臣不敵則必耻之矧其狩乎狩者非大於戰伐盟㑹也戰伐盟㑹者不得已而為之狩者在我而已茍公自狩於境内則為人事也越境與齊狩則非人事也既非人事則必齊侯召公同狩公不肯自與齊之微者狩也茍是與微者狩則必為魯諱當書及齊人狩于禚不曰公矣如文二年書及晉處父盟也噫人齊侯者蓋刺公也刺其非王事而與不同天之讎狩斯榖梁近之左氏公羊俱誤三𫝊言書及不同九年八月壬申及齊師戰于乾時我師敗績杜曰不稱公戰公敗諱之公曰内不言敗此其言敗何伐敗也謂自誇大以取敗也榖曰不言公者主名内之卑者也辨杜氏獨得其㫖陳曰敗績義在桓十年來戰論中明矣第評書及而已凡公自伐曰公伐某國如荘九年公伐齊納子紏遣大夫伐則曰某伐某國如隱二年無駭帥師入極與諸侯伐公不與謀則曰㑹某師伐某國如桓十六年公㑹宋公伐鄭公與謀則曰公及某師伐某國如宣四年公及齊侯平莒及郯莒人不肯公伐莒取向或敗績第曰及如僖二十二年及邾人戰于升陘或使微者不列於春秋亦第曰及桓十七年及齊師戰于奚斯書及者是敗績諱之明矣杜得其㫖三𫝊言桓盟不同十三年冬公㑹齊侯盟左氏不以不日為例公羊曰桓盟不日信之也榖梁曰不日信桓也辨左氏獨得其實折衷曰公榖以桓盟不書日謂齊桓公信著於諸侯桓盟皆不日究其微㫖殊不然春秋書内事或係日或係月或係時内事係日如書卒𦵏嫁娶大灾異如常星不見日食之類是也内事係月如書烝嘗雩望是也内事繫時如書蒐狩土功是也外事第從赴告而已盟㑹外事也不赴以日則不日斯桓之盟不日者不赴以日也茍曰桓盟不日齊桓是九年立二十一年方㑹諸侯十五年方伯至僖十七年卒桓方伯之際亦有書日者桓既卒之後復有不書日者方伯之際書日則荘二十二年防之盟二十三年扈之盟閔元年落姑之盟僖元年葵丘之盟是也既卒之後不書日則僖二十八年温之盟二十九年翟泉之盟文二年垂隴之盟宣七年黒壤之盟成十八年虚朾之盟是也聊舉大者以明之則知盟㑹不以日為義例定矣斯左氏得其實公榖皆誤辨左氏之説為得陳曰春秋凡書内事卒𦵏嫁娶灾異則係日烝嘗雩望則係月蒐狩田則係時外事從赴告不告日則不書日桓之盟不日不赴以日也榖梁盟濟桓信著諸侯桓盟皆不日若然則荘二十二年防之盟僖九年葵丘之盟皆方伯之際何又書日既卒後僖二十八年温之盟宣七年黒壤之盟何又不書日也聊舉大者以觀之則知盟㑹不以日為例左得之也三𫝊言來聘不同二十五年春陳侯使女叔來聘左曰始結陳好嘉之故不名公曰字者敬老榖曰不名者天子之命大夫也辨左氏獨得其㫖折衷曰凡升絀之體唯在爵氏名字而已朝聘之使茍循常禮無升絀名氏如衛侯使甯俞來聘茍有可嘉字以貴之如齊仲孫來雖天子之使茍可嘉亦嘉之可絀亦無所避如天王使南季來聘故字之宰咺歸故貶名之左謂結陳好嘉之得其㫖三𫝊言用牲不同二十五年秋大水鼓用牲于社于門左曰非常禮也公曰于社禮也于門非禮也榖曰既戒鼓而駭衆用牲可以已矣辨公羊榖梁之非折衷曰凡書災異多矣大則日月之責小則水旱之災夫正陽之月隂氣未作不宜侵陽茍月掩日則臣掩君之象是以伐鼓用幣正陽既過則一隂生為灾輕也故日食不伐鼓用幣矣得禮之正也如水旱之災則國之常不係於君臣逆順故但書記其為灾而已斯伐鼓用牲者譏其非常也左得其㫖閔公三𫝊言仲孫來不同元年齊仲孫來左氏曰齊仲湫來省難公羊曰慶也係之齊外之也榖梁曰不曰慶父踈之也辨左氏言得其實折衷曰春秋弑君之賊多矣聖人莫不書其名而懲之未有隱其名而外之者也慶父前年弑子般而出于齊猶書曰公子慶父如齊後年弑閔公而奔莒亦書曰公子慶父出奔莒出既顯書入豈外之必不然也又凡公出則書如歸必書至大夫出則書如歸則不書斯聖人之體例也如公子友如陳公子遂如齊公孫敖如晉是也第書去而不書來慶父安得獨書來公榖不原其理但曰齊無仲孫魯有仲孫故曰慶父外大夫氏氏族豈有定耶豈盡著於春秋耶如齊曰賔媚人秦曰西乞術胡可謂齊無賔媚人謂秦無西乞術耶因其事則顯不因其事則不顯者衆矣三𫝊不知齊仲孫之氏族而謂之魯慶父穿鑿矣丘明通見舊史而曰仲孫湫來省難歸曰慶父不除魯難未已又曰猶秉周禮未可動也君其務寕魯難當是時慶父弑二君國幾危設非仲孫湫語之於齊桓齊桓取魯如左右手故曰齊桓存三亡國以属諸侯則魯與邢衛也是以貴湫而書其字斯左氏得其實僖公三𫝊言乞盟不同八年公㑹王人齊侯宋公衛侯盟于洮鄭伯乞盟左氏曰乞盟者鄭未服不與㑹故别言乞盟也榖梁曰其君之子者國人不子也辨公榖之言失其實折衷曰公羊嫌與弑君同故稱其君之子吁申生死重耳夷吾奔既而獻公卒廼立奚齊是獻公之素志奚齊立則其君也里克殺之是弑其君也何謂嫌與弑君同歟茍不以奚齊為君則來年曷以書里克殺其君卓卓與奚齊得無同乎是非有嫌明矣榖梁謂國人不子而稱其君之子益誤矣稽其㫖凡先君未𦵏其嗣子不稱君不稱爵既𦵏而君之爵之故齊之弑先君未𦵏也故稱其君之子卓子之弑獻公已𦵏故稱其君卓斯左氏得其實文公三𫝊言不雨不同十三年書自十二月不雨至于秋七月左氏曰五榖猶可收公羊曰記異榖梁曰厯時而言之文不憂雨也辨三𫝊俱失其實折衷曰聖人之文茍異于常則必有㫖常文者史冊之舊文也異于常者筆削之微㫖也斯文異于常矣凡旱之為災多係於夏如竟夏不雨則為災矣故書旱之常文曰夏大旱是竟夏不雨書為災也有㫖之文則弗然如僖三年書正月不雨夏四月不雨六月雨是旱不竟夏書不為災也不曰不為災異第書六月雨則不為災可知矣斯書自十二月不雨至於秋七月厯四時而言之又夏在其中則為災可知矣故不復曰大旱茍亦曰夏大旱則嫌不聫春冬之不雨茍備書厯四時不雨而更曰大旱則嫌文之繁斯聖人之㫖書旱明矣如書螽蝝有蜮有蜚不曰為災而災可知也三家俱失其實折衷得其㫖三𫝊言宋楚平不同十五年宋人及楚平左氏曰宋人及楚平公羊曰宋人及楚人平榖梁曰宋人及楚平俱貶也辨公羊之説為誤折衷曰春秋襄公與楚爭伯故相攻伐至斯方已宋楚皆大國非有内外也非有升降也雖曰楚非中國自入春秋久矣凡書盟㑹戰伐皆與中國等公羊意謂曷以人宋而不人楚茍人之則宜俱人之茍國之則宜俱國之稽其體例凡盟㑹戰伐君在不稱君而稱人則貶也大夫在不稱大夫而稱人亦貶也茍非戰伐盟㑹第書其國則一稱君一稱臣是為升絀一曰大夫一曰人亦為升絀茍非此例則以國敵國以人敵人不為升絀矧宋楚之平亦何所絀歟聖人以其不係升絀茍曰宋人及楚人平則為文之繁故簡而書之斯左氏榖梁得其㫖公羊之誤成公三𫝊言丘甲不同元年作丘甲左氏曰譏重斂公羊曰譏始丘使也榖梁曰使四人皆作甲辨左氏實得其㫖折衷曰榖梁謂士農工商為一丘今丘作甲是使四人皆作甲以為非正奚見之淺歟公羊謂四丘為甸甸出甲士三人今乃使一丘之地出甲士斯近之亦未盡其㫖噫茍如是二説則必書曰丘出甲必不曰作丘甲也究其㫖謂之丘甲者丘則賦之本名加之以甲則賦之總號非獨為出甲矣周禮九夫為井四井為邑四邑為丘丘出戎馬一疋牛三頭斯丘則魯賦之本名也四丘為甸甸六十四井出長車一乗戎馬四疋牛十二頭甲士三人歩卒七十二人此甸所賦今使丘出之故曰丘甲左氏謂譏重斂得其㫖三𫝊言歸汶陽田不同八年晉侯使韓穿來言汶陽之田歸之於齊左氏曰使來語魯使還齊也公羊曰脅我使歸之也榖梁曰緩詞也不使魯制命於我也辨左氏榖梁得其實折衷曰汶陽者本魯之田而齊取之成二年鞌之戰齊師敗績齊使國佐予晉紀甗玉石與地以和之晉使齊歸我汶陽之田至斯齊晉未有釁隙齊復求汶陽于晉晉復使我還齊茍曰脅我使歸之則必書曰晉侯使韓穿來歸汶陽之田于齊矣而曰來言汶陽之田非脅之明矣窮其㫖是和好之言使我徐徐自歸於齊不使齊魯復有怨隙然考其情不無臨制聴其言則婉且遜聖人為魯故不書其情而書其言斯左氏榖梁得其實公羊之誤三𫝊言書卜郊不同十年夏四月五卜郊不從乃不郊杜曰卜常祀不郊皆非禮故書公羊曰不免牲故曰不從郊也榖曰五卜强也辨杜氏獨得其㫖折衷曰春秋常祀不書郊常祀也書之或以非時非禮不茍然也凡禮不卜常祀五卜郊非禮也公羊謂不免牲故曰乃不郊以僖三十一年襄七年書乃免牲不曰乃不郊故也噫乃免牲與不郊其文雖殊其㫖無異書乃不郊則是乃免牲也聖人互文非有别也是以二書乃免牲二書乃不郊宣三年襄十年并此年杜得之二傳皆誤襄公三𫝊言城杞不同二十九年仲孫羯㑹晉荀盈齊髙止宋華定衛叔儀鄭公孫叚曹人莒人滕人薛人小邾人城杞左氏曰晉平公杞出也乃治杞公羊曰善其臣王者之後榖梁曰杞危而不能自守故諸大夫相帥以城之變之正也辨公榖俱不足取折衷曰夫伯主之於諸侯雖曰先姬姓而後異姓然於正救之道第同盟而共尊王室則異姓亦無殊矣茍不同盟而不尊王室則姬姓亦有嫌焉如城邢城楚丘城縁陵皆伯主帥諸侯而城矣齊桓公城縁陵得非遷杞耶奚齊桓城杞而無詞晉平城杞而異論故聖人以常文而書之無譏無刺非昇非絀也公羊榖梁俱不足取左氏以杞無事而晉以外族之故帥諸侯而城之載鄭子太叔與衛太叔儀之言曰不恤宗周之闕而夏肄是屏所謂廣記當時之事然於經之𫝊斯得其實昭公三𫝊言書雩不同二十五年秋七月上辛大雩季辛又雩左氏曰秋書再雩旱是也公羊曰又雩者非雩也聚衆以逐季氏也榖梁曰有繼之詞也辨公羊之説甚逺折衷曰春秋不書常祭其或書之各有㫖或為過時而書或非禮而書唯書雩數矣以多為過時斯書上辛之雩非為過時也非為非禮也是正雩之時也何者龍見而雩雩用夏之五月斯書周之七月則夏之五月也故曰正雩之時常祭不書正雩得非常祭歟曷以書之書之者為季辛又雩也亦猶書正月烝五月復烝正月正也五月烝不正也書其正以譏其不正斯上辛雩正也季辛又雩旱甚也書其正以明其旱是復雩也左氏得其㫖榖梁謂有繼之詞近之公羊謂聚衆以逐季氏逺矣定公三𫝊言定無正始不同元年春王杜曰公之始年不書正月公即位在六月公曰定何以無正公即位後也榖曰定無正始也昭無正終也辨左氏獨得其㫖折衷曰春秋諸公即位之歳有書即位者有不書即位者然皆備五始以謹其始唯定公即位第書定元年春王而不書正月三家以是互異茍曰昭無正終故定無正始則隱無正終桓曷以書正始桓莊僖閔亦然奚皆書之攷其㫖昭公三十二年十二月薨于乾侯定公正月不即位者喪未歸也至六月癸亥公之喪至是月癸巳公方書即位所以不書正月公即位六月也杜得其㫖三𫝊言齊人歸田不同十年齊人來歸鄆讙龜隂之田左氏曰孔子受盟請反汶陽之田公羊曰孔子行乎季孫三月不違齊人來歸之榖梁曰罷㑹齊人使優施舞於魯君之幕下孔子曰笑君罪當死乃使殺之齊人為是歸之辨左氏獨得其㫖折衷曰齊魯甥舅之國代為婚姻時或侵或伐或平或㑹靡有所定故上書春及齊平次書夏公㑹齊侯于夾谷終書齊人來歸鄆讙龜隂之田是二國平和之後㑹于夾谷齊侯使萊人以兵刼公尼父以公退以大義沮之曰於徳為愆義以人為失禮君必不然齊人聞遽辟之乃盟曰齊師出境不以三百乗從我者有如此盟尼父曰不反汶陽之田吾以供命者亦如之故齊人來歸所侵之田噫齊强國也魯强國也以力爭之不可也以勢競之不可也唯可以義服之以言折之聖人用是而齊沮其謀反其田斯左氏得其㫖公羊榖梁皆短三𫝊言五月郊不同十五年五月辛亥郊左氏曰書過也公羊曰三卜之後遇吉所以五月郊也榖梁曰譏不時也辨公羊之説為短折衷曰凡郊祀卜牛禮也卜郊非禮也何者牛可改郊不可改也牛茍不吉則改之茍有傷則改之郊必其時也先亦非禮也過亦非禮也所以不卜者不可改故也茍卜必書之何者刺其非禮也茍過時必書之何者亦刺其非禮也公羊謂三卜遇吉所以五月郊設三卜胡不書之如成十年書五卜襄七年書三卜郊襄十一年書四卜郊而苐書辛亥郊歟斯誤矣稽其㫖上書鼷䑕食郊牛牛死改卜牛書五月辛亥郊書改卜牛正也書五月郊不正也是刺不時而非禮明矣左氏榖梁得其㫖公羊之短哀公三𫝊言用田賦不同十二年春用田賦杜曰兵賦之法因其田賦通出馬一疋牛三頭今欲别其田及家財各為一賦故言田賦公羊注曰軍賦十井不過一乗今復用田賦過十一也榖與杜同辨杜氏榖梁之得折衷曰春秋常賦不書茍書之必譏其重斂也復書用田賦可知其害人矣謂作者不宜作謂用者不宜用皆聖人之微文也自作丘甲之後已破十一之税矣田賦軍賦本通出馬一匹牛三頭今别為田明矣杜氏榖梁得其㫖三𫝊言獲麟不同十四年西狩獲麟左氏曰獲麟者仁獸聖王之瑞公羊曰非中國之獸榖梁曰不外麟於中國也辨公羊榖梁之短折衷曰春秋書災異不書祥瑞斯麟者瑞也曷以書之者非為祥瑞而書以聖人感麟致而書也夫言祥瑞豈限中國四夷歟茍以非中國之物而為瑞則西域獻吉光獸之類皆當為瑞必不然矣蓋取其隱見不常天下有道則至為瑞明矣然公羊曰顔回死子曰天喪予子路死子曰天祝余西狩獲麟為仲尼之應顔回子路則聖人重愛之弟子也聞其死曰天喪予者皆痛惜之辭安可以獲麟為比麟鳳則王者之瑞既出無其應聖人廼感麟而起以修春秋麟出既非為已春秋修亦非為己蓋懲惡勸善為百王之法如河不出圖洛不出書吾已矣夫斯皆為周徳之衰無明王之應非為己也孟軻謂仲尼之道髙於堯舜何道窮之有左氏得其實公羊榖梁之短羣書考索續集卷十二
