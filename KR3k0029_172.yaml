body:
  text: 羣書考索續集卷四十一宋章如愚編兵制門漢兵漢京師無養兵之費西漢之世財用沛然正以京師無重兵爾嘗試以百官志計之南軍總為一千五百餘人北軍總為四千餘人惟城門屯兵數無所稽考以宫掖司馬所領者論之多者百八十人少者三十八人况十二門止領於一校亦可槩見然此是中世以後之制若髙文之世未有羽林虎賁未有七校其數當益少也若乃髙帝征黥布發關中兵及中尉卒三萬人軍霸上文帝備胡以三將軍軍長安而惠帝末年發車騎材官詣滎陽是皆調兵民間因事設屯事已即罷非係京師所養之兵武帝變兵制初髙帝世南北軍不以出征而民兵散在郡國有事檄召甚便也自武帝窮兵興發無窮嵗至以中尉之材官赴逺恐京師無重兵易以生變也於是內增七校則又恐中尉之權太重也故又以光祿勳增羽林期門之兵此武帝以南北軍相制之意異時南北軍皆郡國畨上無定所之兵也自武帝置八校大抵以習知胡越之人充之則募兵始此期門羽林皆世家為之則長從始此蓋自是有養兵之患而京師之兵制壞矣元狩以後兵革數動士卒物故者衆民多買復於是發及謫吏元狩次及謫民太初元次及謫庶天漢元次及七科謫異時以𨽻於都尉者充兵故其伍符甚整也及常兵不足調及它衆甲五必察而郡國之兵制又壞矣髙皇寓兵於農之意安在漢更卒更有三品卒更踐更過更古者正卒無常人皆當迭為之一月一更是為卒更也貧者欲得雇更錢次直者出錢雇之一月二千是為踐更也天下之人皆當戍邊三日律所謂繇役者雖丞相子亦所不免三日戍不可人人自行而行者亦不可便還因留一嵗一更諸不出者出錢三百入官官以給戍者是為過更也陳君舉漢賦兵漢無計口授田之法故賦兵以丁而不以田丁衆而無田雖貧者不免為兵故凡為兵者皆家人子起田中從軍而非素養者也自其年二十三為正卒於是傳之疇官以給公家繇役給於中都官則為衛士給於郡縣則為材官給於邊徭則為戍卒皆一嵗而代其給於縣則於吏卒一月即更代往來道中衣裝悉自補惟衛士衣食縣官罷遣侑享其餘則否至於年五十六者謂之罷癃老弱在所不任髙帝紀注其已仕於郡縣而已被薦舉者皆不與給兵之選惟戍邊重事雖宰相之子不免髙祖紀注而國有倉卒之寇當兵數少不足辦事則有一切調發凡其所當免者亦在行中謂之奔命昭紀此其賦兵之大略也七科謫天漢四年發七科謫張晏注吏有罪一亡命二贅壻三賈人四故有市籍五父母有市籍六大父母有市籍七漢發兵齊哀王欲發兵誅諸吕中尉曰非有虎符為驗不可發兵膠西王舉兵弓髙侯詰之亦曰未有詔虎符而擅教兵王其自圖之柞陽侯擅興繇賦則削爵信陽侯坐事國人過律則罷免又有為東海太守坐擅發卒而死者有為上黨太守發兵擊胸奴不以聞而免者夫漢之兵散在郡國宜為王侯郡國之兵也而嚴為之禁若此夫是以兵散天下而權歸一人此漢所以防微杜漸制兵之大略也古者以牙璋起軍旅漢初則以羽檄召兵於郡國後用銅虎符漢軍賦漢軍賦有二其一則丁賦民年七嵗已上嵗賦口錢二十有三及十五以嵗等百二十也其一賦財若軍人資萬錢取等百二十七至於貧民亦以衣服釡甑為資計之直而等也至於故吏嘗佩將軍都尉及二千石印者亦給軍賦則又不特取之於民矣蓋漢兵出於民凡其往來繇戍者道中衣裝悉自補從軍旅賫賞廢或自資子錢家兵猶未衣食於縣官而其所賦於民者殆不過於庫兵車馬之資而已調兵逺征則食其所郡國之粟此其所以無列屯坐食之費也漢兵權在內則分在外則專漢初軍未有莭制故天子得以入其壁而奪之軍自韓信始申軍法大抵兵在內權不屬於一人兵在外權專於主將且以南北軍觀之司馬屬於衛尉者也然司馬見衛尉不拜不私於衛將軍正次於將軍者然正不屬於將軍將軍有罪以聞兵權散主不偏屬於一人此內兵之制也至於閫外之寄授鉞專征則自偏裨而下皆屬焉徙部合軍皆大將之所令李廣失道問狀惟幕府之所責斬霸陵尉以報私怨則不以專戮為嫌李廣嚴細栁營以拒先驅則不以擁權為僣此又兵之在外者也然則胡建為南北軍正擅斬監軍衛青為大將軍不敢專斬將正有得春秋殺舟之僑以徇國之意其與胡建以私意行戮有間矣漢用兵掌兵養兵之制或曰班固不志兵止於刑法志略言其端者譏漢不能復古也然用兵之法則見於藝文志掌兵之職則見於百官志養兵之具則見於食貨志蓋漢史事多互見非若後世悉為之目也藝文志有張良韓信刪次要用三十五家後為諸吕所盜至武帝時楊僕捃托遺逸紀奏兵録成帝時任宏撰次兵書分為四種與夫將之用兵其變態百出則見於信越程李衛霍等此皆漢世用兵之法也百官表及紀載傳漢初韓信為大將曹參為步將灌嬰為騎將周勃為太尉入北軍亞夫為將軍屯細栁武帝以光祿勳掌官殿掖戶期門羽林之兵皆屬焉衛尉掌宫門屯衛諸屯衛候之兵皆屬焉城門校尉掌京師十二城門屯兵即南軍中壘校尉掌步八校宿衛之兵即北軍郡國有材官騎士有樓船邊郡有守將都尉有校尉都護此皆漢世掌兵之職也貨志及紀傳所載髙祖征叛文景禦侮以中國之民足中國之兵無不足者十五稅一司農諸倉布在郡國算賦太半卒更平價亦在郡國也武帝北征胸奴南平百越東伐朝鮮西通西域馳心分界之外乃免亡秦之禍者惟算商車惟算緍錢惟榷酒酤惟榷鹽鐵作幣造金以贍用賣爵贖罪以入粟朔方六郡廣開田官以屯田六十萬人而民田租稅實未嘗加多也此皆漢世養兵之制也田官名曰農都尉見東漢志漢末魏初日典農夫自井田封建之制盡滅於秦人之手於是天子之地與四夷為境天子之兵與四夷為敵用兵之法必尚韓信之詐而司馬法無所施矣掌兵之職必循漢武之侈而周官無所用矣養兵之具必至漢法之刻而先王中正之制棄置而不問矣此其勢所必至也然一代之興其初必於三者厚民而自損及其衰也必於三者刻民以自厚其所異者如斯而已武帝征胸奴自秦以來中國既與夷狄為敵故彼之盛衰有候而此之和戰亦有時其勢皆有不能自止者矣胸奴自戰國至於漢初其勢方張漢自髙惠瘡殘之餘至於文景其勢未振一強一弱弱為強制矣五六十年間恭儉之積既厚而復以英雄之主繼之兩強相值其勢不得不鬬矣不鬬則已鬬則必非一日之所能解也嘗觀武帝初即位東甌之救不欲出虎符發郡國兵胸奴和親之議初年蓋從韓安國之計義二年始從王恢伏兵之謀自是以來彼大入寇邊凡十六七此大出兵以擊之亦十五六自王恢馬邑之後大抵彼先發此應之是兵法所謂應兵非師出無名也元狩四年衛霍出塞大有功史氏書曰是後胸奴逺遁然是時使任敞於單于怒而留之未幾復入塞斬狄山頭而去彼何逺遁之有哉元封元年勒十八萬騎北登單于臺史氏書曰胸奴懾焉然是時郭吉諭以上指單于怒而留之元封四年復留路充國天漢元年復留蘇武遂使破奴沒李陵降廣利屠彼又何震懾之有哉夫帝與胸奴鬭終身不解者彼積驕盈之氣此懷雪耻之心其勢皆不能自止也逮夫五單于爭立彼之衰也有候而昭宣繼治此之盛也未艾欵塞來朝奉珍入貢斯其時矣武帝嘗語戾太子曰吾當其勞以逸遺汝豈知斯言始驗於宣帝之世乎帝如知此雖不窮追後人享逸亦自有時耳必不過於自勞也趙充國屯田金城置屬國處降羌於金城不如武帝散之於邊郡文帝用朝錯之䇿入粟塞下武帝內置六郡田官外此京師之境惟晚年欲田輪臺而不果然則漢之用兵未陸抗十七條而守西門之藩也隋之入陳賀若弼自廣陸渡江而陳人不知韓擒虎自橫江濟采石而守者皆醉由不能用蕭摩訶逆戰掩襲之䇿而攻守之偹俱廢也吳與陳君臣昏睡而不覺是以敵能飛渡耳茍能如孫公君臣逆戰於前設援於後晉隋安得而逞其志哉不獨此也晉太元中烈宗八年淝水之役秦兵旗鼓千里先至項城頴口而涼州蜀漢之卒猶未集也朱序謂謝石曰若秦兵百萬盡至難與爭鋒今乘其未集宜速擊之若敗其前鋒則彼已奪氣可遂破也石從其言於是謝玄遣劉牢之趍洛澗謝石等諸軍水陸繼進遇於淝水秦兵大敗此亦周瑜逆戰之意也人皆謂昆陽赤壁淝水之戰本之天意而非人力曾不知用兵之道以少擊衆奔其前而後者不支挫其鋭而大勢瓦解初不論夫衆寡之不敵也若夫魏文臨江而窺吳會魏太武飲江而營瓜步對江為陳則此之守禦也易為力茍如赤壁淝水之役破江而下非逆戰則不可矣自赤壁之戰又五年而有濡須之役曹公得權箋即退軍其後曹丕再臨江而退吳亦不追躡彼此各張虛聲以自固而已蓋是時吳蜀自為陳也蜀明帝初年吳蜀既合從諸葛駐漢中陸遜大破曹休於夾石未幾亮卒大略如此故自赤壁一戰之後其他小勝負皆不必論漢南北軍相制大綱唐舊史志云職官志漢南軍如唐諸衛兵北軍如唐羽林北衙禁兵陳氏博議云南軍指十二城門及三輔所屬中尉之兵北軍指郡國材官騎士番上於衛尉者愚按周勃以一莭入北軍其時吕祿雖去北軍而吕産猶在南軍故未敢聲言諸吕事見正本通鑑以見南北軍必有相制者如唐李揆所云也二漢百官表志曰武帝於光祿勳令郎中也之屬置中壘校尉掌北軍營壘光武改為北軍中候其屬有屯騎長水二校尉掌宿衛騎兵乂步兵射聲二校尉掌宿衛步兵乂有虎賁輕車校尉胡騎不常置光武省胡騎虎賁是八校者雖創於武帝而宿衛步騎之兵則非創為之也是所謂北軍也城門校尉掌京師城門屯兵有八屯司馬有十二門候是所謂南軍也南軍掌城門屯兵北軍掌宿衛步騎內外表裏相制可知矣觀祿産分居南北軍宋昌為衛將軍鎮撫南北軍張武為郎中令行殿中此見太尉雖揔其權而衛將軍郎中令衛尉中尉於南北軍皆有統攝故曰相制云耳諸説當以二漢表志為正所謂中尉即武帝改為執金吾者也掌徼巡京師又李廣程不識為東西宫衛尉前漢南北軍分掌者不一而足惟光武止以城門校尉揔南軍以北軍中候揔北軍其職簡易而不雜但以後漢百官志考之則可知矣漢南北軍本末古者前朝後市一城之中王宫在南故衛宫之軍以南名之宫城之軍既謂之南京城之軍又謂之北所以别也南軍衛尉主之百官表衛尉掌宫門衛屯兵師古注漢舊儀云衛尉寺在宫內胡廣云主宫闕之門內衛士於周垣下為區廬以此考之則南軍在宫內按百官表衛尉掌宫門屯衛兵而髙后紀言周勃既將北軍然尚有南軍乃令平陽侯告衛尉無納吕産以此知南軍衛尉主之也又按百官表百官志西漢中壘校尉主北軍營壘之事至光武變為北軍中候而西漢之初中尉屬官有中壘令丞尉而中尉所職乃巡徼京師以此知北軍為京城兵而中尉主之此漢初之志也漢武帝增八校改中尉名為執金吾錢曰漢京師惟有南北二軍亦如唐之南北二衙也唐兵志南衙衛尉是北衙禁軍是也胡廣謂衛尉巡行於宫掖則金吾徼於宫外相為表裏東漢兵志注而唐李揆亦云漢以南北相制然二軍衛士皆調發郡國材官騎士更番為之初未始有定在之兵黃霸蓋寬饒為衛尉司馬衛卒罷遣願留番自武帝用兵增置八校中壘屯騎步兵越騎長水胡騎射聲虎賁募知胡人事者為胡騎知越人事者為越騎皆屬中尉而北軍始有召募之兵復恐中尉之權太重乃於光祿勳增置羽林期門為宿衛而與衛尉同掌軍門而南軍始有長從之兵方漢之初京城兵猶未逺出髙帝發中尉卒止軍灞上文帝發中尉材官止軍長安或謂此乃調發民間即非南北軍詳見後假內説至武帝則發中尉卒擊南越元鼎元年而京師之兵始從逺調昭宣以來禁旅之列屯如故有警則發雖金城去京師遼絶而羽林孤兒胡騎越騎亦從此而遣矣神爵元年西羌反發羽林孤兒胡越騎詣金城元帝以太常任千秋將五校擊西羌自是而後益募外兵以從軍而更代之法浸弛昭帝募吏民擊益州宣帝選郡國吏三百名伉健者從軍至光武一切倚重於京師之兵而郡國都尉省併矣光武省八校作五營時中壘屬北軍中候掌監五營為宿衛兵郡國無都試惟京師𨽻兵如故又罷天下輕車騎士材官樓船居邊民伍而不知漢初京城之兵亦從郡國而番上也此後所以有列屯養兵之費歟南軍衛尉寺衛尉衛士令丞諸屯衛候諸屯衛司馬郎衛表初皆亡貟多至千人掌守門戶出充軍騎中郎五官中郎將左中郎將右中郎將侍郎郎中車將郎中户將郎中騎將期門府表武帝建元三年初置平帝元始元年更名虎賁期門郎虎賁中郎將期門僕射羽林府表武帝太初元帝置名曰建章營衛後更名羽林騎羽林郎羽林孤兒羽林令丞監羽林中郎將監羽林騎郎將羽林黃頭郎都尉通典西漢秦駙馬二都尉並屬光祿勳奉車都尉駙馬都尉騎郎將北軍中尉府表秦官掌徼巡京師武帝太初元年更名執金吾中壘令丞尉左右京輔都尉尉丞城門校尉表掌城門屯兵一人司馬丞八屯司馬門候城門令史八校尉皆武帝初置有丞司馬顔曰城門中壘校尉多有尉一人屯騎校尉掌騎士步兵校尉越騎校尉長水校尉胡騎校尉射聲校尉虎賁校尉監北軍使者史記武帝使任安護北軍北軍錢官史記任安笞辱北軍錢官小吏公孫敬用擅用北軍錢揔南北軍車騎將軍衛將軍軍正丞京師有南北軍之屯賦根本所係京師是尊都有東西之異軍皆南北之屯仰衆大之奧區曷嚴內偹列前後之禁旅以護周垣按漢刑法志髙祖天下既定踵秦置材官於郡國京師有南北軍之屯至武帝平百粵內增七校外有樓船皆以嵗月講肄修武偹云以今考之東都中興雖詔罷郡國兵及都試而京師肄兵如故南北未嘗廢而亦稍革先漢之舊詳見下注載觀漢代之兵實鑒秦人之弊重輕深戒於偏倚內外悉繇於兼制漢雖踵秦郡國置材官然京師有南北軍之屯則重可以馭輕內可以禦外異時變故相踵而卒收破竹之效者處兵之得其道也秦人則異是矣始皇并天下分為三十六郡郡置守尉尉掌佐守典武職甲卒而軍旅之制徒存虛名至於聚兵咸陽銷為鍾鐻講武之禮罷為角抵兵備弛矣而百役荐興北築長城四十餘萬南戍五嶺五十餘萬驪山阿房之役亦各七十餘萬兵不足用乃至發適先發弛刑之類次又發贅人賈人之類次發治獄不直者之類次以隱官刑徒者次以嘗有市籍者又其次則大父母父母常有市籍者先發里門之左謂之閭左之戍未及發右而二世立復調才士五萬以衛咸陽民不聊生天下騷動而勝廣起矣是時楚兵百萬而秦發郡縣不及乃赦驪山徒奴産子以擊盜及關東盜賊益熾又發關中以擊之而章邯三嵗將兵亡失已數十萬坑降楚者又二十餘萬沛公入關而秦遂以亡原秦之亡皆起於兵備廢弛而倚辦於倉卒髙祖鑒其弊而於郡國京師兵備嚴整且內外有相制之勢重輕無偏倚之失誠漢法之善也逺因三地已均守相之權近列二軍益壯京師之勢刑法志漢踵秦置材官於郡國特舉其略耳其實不惟置材官又曰武帝外有樓船特言用樓船以平百粵爾其實髙祖已有之也光武紀注所引漢官儀曰髙祖命天下選能引闕蹶張材力武猛者以為輕車騎士材官樓船常以秋後講肄課試各有其數平地因車騎山阻用材官水泉用樓船蓋三者之兵各隨土宜以漢史考之大抵巴蜀三河潁川諸處止有材官上郡北地隴西諸處止有車騎而廬江潯陽會稽諸處止有樓船三者之兵雖隨土之所宜而郡國之兵其制則一有列郡有王國有侯國郡有守有都尉都尉佐太守典武其在王國則相比郡守中尉比都尉侯國亦有相秩比天子令長每嵗郡守尉教兵則侯國之相與焉侯國之相既屬之郡而王國之兵亦天子所有不可擅用防微杜漸如此皆所以尊京師也天闕觀象斗垣驗文地禁而近兵聮以分此京師之制也三輔黃圖云武帝太初元年作建章宫宫之正門曰閶闔注謂閶闔天門也又云惠帝元年正月初城長安宫城五年九月城成城南為南斗形城北為北斗形至今呼漢舊京為斗城是也大抵宫門為天關南軍所屯京城為斗垣北軍所屯故云武階之峻命大司馬或曰北軍屬太尉武帝更太尉為大司馬以寵將而北軍分八校以中壘領之非也武帝置八校各有校尉秩皆中二千石不相統屬而中壘校尉自掌北軍壘門事非兼領八校此固不待辨而明矣至謂北軍屬太尉則不可以不辨也彼獨見太尉勃入北軍之事故舉而言之耳是時勃以計入北軍而誅吕氏非謂以太尉領北軍而後入也蓋北軍自屬中尉而太尉雖掌武然三公之職初不常置按司馬氏將相表髙帝二年太尉盧綰五年罷十一年周勃為太尉攻代後官省髙后四年置太尉官文帝三年罷屬丞相景帝五年復置七年罷武帝建元元年復置二年罷後改為大司馬是其或罷或置者蓋以三公無所不統官不必備惟其人而已豈專領北軍耶郎衛之嚴𨽻光祿勳或曰古者環衛之職有二等宫伯則領貴遊子弟宫正則領宫徒役事事在周禮可考也其在漢制則有衛郎衛兵亦此制歟其説未為不善至曰衛兵既屬衛尉為南軍而郎中令均是宿衛故表志皆以冠於衛尉之前而論兵制者遂以之編入南軍也若謂郎中令之職所領皆郎不可以軍言則守門户充軍騎孰謂其非軍也郎而非軍宣帝胡為出之以擊羌哉此話殆不其然嘗考之郎衛兵衛固均為宿衛之職而郎中令衛尉所掌又皆宫門內外之事按郎中令乃秦官武帝更名光祿勳前表光祿勳掌宫殿門户衛尉掌宫門衛屯兵後志光祿勳掌宿衛宫殿門户衛尉掌宫門衛士宫中徼循事其職實有相關者舊儀曰殿內門舍屬衛尉殿外門舍屬光祿勳職之相關特有內外之别耳正周官之所謂宫伯宫正也然兵衛之屬衛尉者號為南軍固可考而知若遂以光祿勳列於南軍則有所不可何者漢光祿勳之職屬官有大夫郎謁者又期門羽林皆屬焉皆親近天子之官别為一府非可謂之南軍也宣帝之擊羌特以羽林孤兒用之非謂所掌之郎及大夫而盡使之從軍不然則光祿勳之屬官中郎有五官左右三將秩比二千石中郎有車户騎三將秩比千石議郎中郎秩比六百石其下如中郎亦比三百石職任固不輕矣而又以明經孝廉射䇿甲科賢良方正及軍功良家子充之是郎選之官其選實甚重所謂守門戶充車騎者若今之環衛出為天子導從儀衛云爾非可以軍名也嘗考文帝自代邸入未央宫拜宋昌為衛將軍領南北軍張武為郎中令行殿中以是觀之張武為郎中令正掌郎衛之職也而宋昌又自别以衛將軍領南北軍知宋昌别領南北軍則知郎衛非南軍明矣雖循近代之分職未盡當時之制軍此言太尉乃三公之職無所不統非専領北軍之任至郎衛乃天子親近之官豈可與兵衛同謂之南軍二説既明則南北軍可考矣為宫門為壘門巍巍克壯胡廣云衛尉主宫闕之門內衛士於周垣下為區廬則知南軍屯於宫門之外前表云中壘校尉掌北軍壘門內外則知北軍屯於壘門之內屬衛尉屬中尉整整能群或曰前百官表衛尉掌宫門衛屯兵中尉掌徼循京師初不言其為南北軍若以為南北軍則史無明文是不然外戚傳及吕后紀以吕産為相國居南軍及周勃欲討之乃令平陽侯告衛尉毋納産殿門以是知宫城之衛士為南軍而衛尉主之也又按胡建及戾太子召北軍使者任安發北軍兵是北軍實屯城中又監軍御史穿北軍壘垣以為賈區是北軍壘門實𨽻於中壘而中壘校尉又統於中尉以是知京城兵卒為北軍而中尉主之也烏得謂之史無明文哉故胡廣云衛尉巡行宫中金吾徼於宫外金吾即武帝以前之中尉此正南北軍內外之證也得非體前朝之勢而列衛於南法後市之儀而分營於北古者前朝後市而王宫居其南故漢於宫門屯衛兵則以南名之宫城之軍既謂之南則京城之軍遂謂之北所以别也或發士於京輔此北軍之制蓋北軍番上與南軍等南軍衛士調之郡國而北軍兵卒調之左右京輔按百官志左右京輔都尉丞兵卒皆屬中尉夫中尉為天子北軍之統帥而其屬乃左右京輔都尉其所調亦左右京輔之兵卒何也左即扶風右即馮翊京即京兆謂之三輔三輔之委寄固重於郡國矣而所領兵事則非郡國之比蓋漢太守謂之郡將兼領武事都尉掌佐守典武職在王國則相比郡守中尉比都尉皆掌兵之任若三輔則異是矣夾輔京邑錯列畿甸其勢為甚過則兵事非所掌故都尉丞與兵卒不屬左右京輔而特屬中尉之北軍其番上亦然何以明之黃霸尹京兆發騎士詣北軍司馬不適士劾乏軍興連貶秩則知左右京輔兵悉皆番上北軍而屬中尉無疑也或調兵於郡國此南軍之制蓋南軍無常在之兵以郡國民始傳者為之髙紀如淳注云律年二十三傅之疇官傅著也言著名籍給公家之繇役也又漢儀注民年二十三為正一嵗為衛士即此南軍衛士也武紀建元元年詔衛士轉置送迎常二萬人其省萬人鄭氏云去故置新常二萬人是即位之初改令如此其後期門羽林七校之類增置不一而南軍衛士實有定數是以國無重費而民亦不以為病王尊傳常以季秋或正月天子行幸曲臺臨享罷衛士蓋寬饒為衛司馬及嵗盡交代上臨享罷衛卒數千人皆叩頭自請欲復留共更一年則當時之人情可知矣考韋玄成傳則寢園所用已四萬五千一百二十九人至元紀初元三年隨即罷甘泉建章宫衛未見其為病民也至光武講省兵之制而宫掖門衛士才二千五百餘人而已其後又罷輕車騎士材官樓船士而後禮儀志有享遣故衛士儀是知光武雖罷郡國之兵而南軍衛士仍番上平民也此南軍屬衛尉而調兵於郡國之證歟當其番上用以執鋭及其更代勸之力穡南北二軍相為表裏番上更代其體則一方其番上用以執鋭如刑法志曰以嵗時講肄修武備後禮儀志曰武官習戰陳之儀斬牲之禮名曰貙劉兵官皆肄孫吳法六十四陳名曰乘之此用之執鋭者也及其更代勸之力穡如元紀罷甘泉建章宫衛令就農又後禮儀志享遣衛士儀百官會位定謁者持莭引故衛士入自端門衛司馬執幡鉦護行行定侍御史持莭慰勞以詔恩問所疾苦畢享賜作樂觀以角抵樂闋罷遣勸以農桑此勸之力穡者也兩漢之制兵農不分亦近古之良法歟非惟外暢於皇威抑亦內尊於宸極九重天峙壯為經為緯之衢萬旅雲屯分居外居中之職杜佑通典謂漢氏重兵悉在京師是不然兩漢之初正以京師無重兵耳嘗以後百官志考之衛尉士六千人南宫北宫衛士共一千八人左右都候衛士共七百九十九人宫掖凡七門各有司馬從領衛士南屯七百二人蒼龍四十人玄武三十人北屯三十八人朱雀二十四人東明百八十人朔平百二十七人總而計之南軍為九千四十六人北軍五校所領騎士如屯騎越騎步兵射聲各七百人長水七百三十人又中尉緹騎五百三十人總而計之為四千五十人惟城門屯兵數無所考以宫掖門司馬所領者推之多者七百二人少者止三十八人况十二門止於一校必非重兵所在多不過一二千人耳總是三者而京師之兵不滿二萬人或曰此光武中興之兵制也武帝之增置則殆不止是然亦不過倍之云爾若髙文之世未有增置則其數當益少於此也豈得云重兵悉在京師哉故此以萬旅言之也大抵圖萬世之安者固有定制處一時之變者姑為預防當姦謀潛合於長樂及大駕亟趨於未央以北制南則功擅周勃以南兼北則事顓宋昌雖審安危之尚無非表裏之相所以右丞相之初除即歸政柄衛將軍之隨罷豈紊權綱前已論南北軍之制此復詳著髙后末年文帝初年南北軍相制之事大抵南北軍之制史所不載無所考證然其雜見於紀傳表志者亦可參考其一二其大要則無出於髙后八年之紀也考之髙后紀則見二軍之權勢內外足以相制表裏足以相應髙帝之法可謂規模宏逺矣漢初定天下京師之屯唯此二軍諸夏本根所係甚重故於衛尉中尉皆不輕授而必付之酈商周昌髙百官表十一年書衛尉王氏中尉戚鰓王氏史失其名而蕭何傳載王衛尉之諌髙祖械繫何也其靣折廷爭有似王陵或者其陵歟鰓者母乃戚夫人之族也歟髙帝鍾愛趙王屈周昌以相之及其莫年則以戚氏本兵得非隂為保護趙王之計而王陵因髙帝付以托孤之任者故以之主兵耶惠帝之初吕氏已顓國政劉澤吕氏之戚屬也實與衛尉而表於中尉缺焉髙后七年澤既為王之國終吕后之世二官不以除人特以兵權分屬於吕氏至於長樂衛尉亦屬之吕更始輩兵權盡歸吕氏矣考之於史太后病困以趙王祿為上將軍居北軍梁王産為相國居南軍且戒之云我崩即據兵衛宫謹勿送喪為人所制故史稱上將軍祿相國産顓兵秉政齊王傳又謂居長安中聚兵以威大臣良有以也陳平周勃謀誅吕氏太尉勃欲入北軍乃令紀通持莭矯內之又令酈寄劉揭説祿解將印而以兵授太尉勃勃既將北軍而尚有南軍衛尉居宫中實專南軍之權故令平陽侯告之使毋納産殿門按表髙后七年劉澤為王衛尉不以除人不知平陽侯所告者何人哉産既顓軍其權不在衛尉審矣恐未易以一言之故而能使之抗平日所專事之相國也又按表文二年始書衛尉足而文元年詔封諸功臣則已云衛尉足等十人矣愚謂平勃區畫南軍宜無異於北軍而平陽侯所告之人得非尉足也耶豈平勃欲誅吕氏始除足為衛尉以奪南軍故平陽得以告之而史䇿省文不詳載爾又不然則勃既得北軍其勢已足以制南軍故令平陽侯告衛尉然南軍未附勢未可知衛尉守殿門相國雖不得入而猶得徘徊往來於殿廷之次是南軍猶冀其入未有奮發而誅之者若衛尉於是時不能抗相國則南軍將何如也又安知不有起而應之者蓋彼皆素所服屬者也異時陳蕃之舉是矣平陽侯既馳告太尉而尚恐不勝未敢誦言誅之乃謂朱虛侯急入衛帝請卒千人入未央宫掖門見産廷中會天大風從官亂莫有鬬者遂得殺之於郎中府吏舍又馳斬長樂衛尉吕更始還入北軍報太尉至於起而相賀曰所患獨産今已誅天下定矣於此見南軍可以制北軍也南軍雖存太尉勃得以告衛尉而奪之權竟誅産而清宫掖是北軍又可以制南軍矣是時北軍討之於外南軍應之於內表裏相應於此可驗然是時誅吕氏北軍之功居多而南軍無大功故文帝褒賞群臣如紀通劉揭等皆封列侯已封者益封至二三千户而衛尉足等僅四百戶或者以其功為劣歟當是之時勃雖以南北軍成誅吕之功及文帝自代邸入未央宫夜拜宋昌為衛將軍兼領南北軍則勃已不與兩軍之政其後除右丞相亦旋歸政柄是前日之以北軍制南軍者特一時之權宜而已南北軍不以相制而文帝以宋昌兼領失本意矣然出於倉卒關防之謀故隨即罷衛將軍仍以其兵分屬焉是雖出於一時之權宜而於南北之制初未嘗有所更易此漢初兵制之善者也其後武帝內增七校以壯翼衛之勢又恐北軍偏重則置期門羽林與夫城門之兵兵籍紛紛而南北軍之制隳矣是何八屯始置而實重城門置城門屯兵以武紀考之則始於政和二年劉屈氂傳云戾太子發兵上賜丞相璽書云堅閉城門毋令反者得出太子兵敗南奔覆盎城門會夜司直田仁都閉城坐令太子得出要斬以太子在外始置屯兵長安諸門長安凡十二門皆有屯兵屬之城門校尉其屬有司馬有候顔師古曰門各有候八屯各有司馬是也職任委寄日以浸隆其後孔光以太師領城門兵紅陽侯立平阿侯鐔成都侯商皆位特進領城門兵而商復得舉吏如將軍府可謂甚重也矣王莽僣竊盡更舊制拜春王城校尉王况為震威將軍春王郡向之宣平也是諸門各有校尉矣而莽又以城門校尉趙恢為城門將軍豈非又有校尉以揔諸門歟後漢雒陽諸門仍有城門屯兵校尉一人踵武帝之舊也七校既增而尤先中壘前刑法志曰武帝內增七校今考之表則曰中壘曰屯騎曰步兵曰越騎曰長水曰胡騎曰射聲曰虎賁其校尉凡八何也或曰取中尉屬官之中壘者升為校尉其説是矣蓋漢初中壘本中尉之屬有令丞尉至武帝始升為校尉即舊中壘之職初非武帝之所增置當時所增置者止於七校加以中壘則並七為八矣或又曰官表雖不明言八校為北軍然考之後官志光武五營即八校之并省者而以北軍中候監其營故東漢屢有北軍五校之稱是知武帝之八校正北軍也其説固有可疑者大抵軍之在北者皆名北軍故八校亦可以北軍名之特非中尉之北軍爾至謂官表不言八校屬中尉疑中壘自此專統北軍與中尉異司又謂中尉自是不領兵而北軍始不屬中尉何其説之謬也若謂中尉自是不領兵而北軍始不屬中尉則武帝改中尉為執金吾果何職歟嘗考之執金吾自掌中尉之北軍八校自掌各校之北軍以其各有司存故史氏特以校尉列於城門之後惟中壘校尉自别掌北軍壘門內特與金吾相關屬若所掌西域則無與乎金吾也蓋執金吾秩中二千石而八校尉皆秩二千石其位亦重矣按胡建上奏曰臣謹按軍法曰正士屬將軍有罪以聞二千石以下行法焉孟康曰二千石謂軍中校尉之屬惟此則校尉之不屬執金吾法然也然金吾之中壘令丞尉仍舊者則以北軍宜門之職實相關焉若謂光武五營即八校之并省者而乃以北軍中候監其營遂證八校為中尉之北軍如是則光武省中壘校尉置北軍中候遂以此證中壘校尉為北軍之中尉可乎光武中興於先漢制度因革不一沿名失實多矣豈獨此一事而信之以為然然則李德裕撰劉𢎞規碑云武帝內增七校中尉實司其任非歟德裕之言蓋亦後世諸儒之論爾未可以是而證漢家一代之兵制也凡此紛若殆將何以或伏波下瀨而十萬餘衆或橫海浮沮而二千餘里故戎士之雜出宜軍容之寖弛武帝於南北軍之外初置八校又置城門期門羽林之類自是始有養兵之病而京師之兵制壞矣京師兵制既壞而郡國兵卒亦奔命不暇武紀元鼎五年南越相吕嘉反遣伏波將軍博德樓船將軍楊僕歸義越侯嚴為戈船將軍甲為下瀨將軍皆得罪人江淮以南樓船十萬人咸會畨禺又元鼎六年東越王反遣橫海將軍韓説浮沮將軍公孫賀胸河將軍趙破奴皆二千餘里不見冦而還以至拔塞因杆浚稽強弩祁連蒲類度遼破羌名字紛紛不一而足至元狩以後兵革數動士卒物故者衆民多貧復徴發之士益鮮於是發及謫吏次及謫民次及謫戍次及七科謫又有所謂亡命罪人與夫惡少年之類昭宣以後其弊日甚始元元年募民及奔命者擊益州元鳳元年遣太常三輔徒免刑擊氏五年發三輔及郡國惡少吏有告劾亡者屯遼東本始二年又選郡國吏三百石伉健習騎射者從軍師旅屢興兵制益壞而民生益困皆武帝啓之也胡為尉卒遂從攻越之兵何預孤兒亦預擊羌之士此言武帝啓用兵之禍昭宣以後其弊日甚非特郡國之兵困於征行雖京師南北軍亦不免焉元鼎六年發隴西天水安定騎及中尉河南河內卒征西羌平之復令征西南夷遂定越地則北軍之尉卒已遣之攻越矣神爵元年西羌反發三輔中都官徒弛刑及應募佽飛射士羽林孤兒胡越騎三河潁川沛郡淮南汝陽材官金城隴西天水安定北地上郡騎士羌騎詣金城則南北軍之羽林孤兒胡騎越騎亦遣之擊羌矣南北軍本以衛京師乃至用之於窮追逺討兵制之壞莫甚於此元成以後寖以微弱其咎將誰執也厥後痛新室之禍慘懲昆陽之戰酣車騎之省則關隴以北樓船之罷則江淮以南始焉禁卒之專恃終也福階之與參衛士寖微由併旅賁之一屯兵漸廢蓋除校尉之三光武中興以幽兾并州兵克定天下始於黎陽立營領兵騎嘗千人以謁者監之號黎陽兵而京師南北軍如故北軍省中國胡騎虎賁三校止為五營謂之五營校士以北軍中候監之南軍於衛士省一丞旅賁省一令考之紀及志則六年罷郡國都尉并職太守無都試之役考之紀及禮儀及注則京師之兵如故又明年詔曰國有衆軍並皆精勇其罷天下輕車騎士材官樓船士及軍假吏悉還民伍九年省關中都尉十三年罷左右將軍二十二年罷諸邊郡亭候吏卒然終建武之世已不能守前法臨時輒復補置而邊郡亦往往置都尉明帝復置度遼將軍乂募中都官屯朔方五原而罷益州西都尉和帝以南蠻之叛則置象林將兵安帝以羌犯三輔則置長安雍二尉又以鮮卑冠居庸則置漁陽營其後盜賊紛然如順帝之緣邊增置步兵緣海增置屯兵而扶風漢陽三百塢魏郡常山一百一十六塢屯兵寖多矣然自建武之罷都試民不知戰四方征討止仰禁旅迄於漢末無嵗無胸奴鮮卑之寇出師屯守奔命不暇大抵皆羽林五營黎陽虎牙之士禁旅悉出豈復衛士之嚴安帝永初以來募入錢榖得為虎賁羽林緹營騎士而營衛之選衰矣桓帝延熹以後減羽林虎賁不任事半俸而京師之兵單弱矣上士既已單弱士兵又不知戰一方盜起三方騷動兵非素習而取辦倉卒是以王師每戰轉北而羌寇遂熾調兵邊戍而民不堪命其後假熲雖平東西羌而黃巾之亂作矣八關都尉之設固不足以弭亂而大發四方兵卒講武於平樂觀果何益哉內而西園八校之兵乃以小黃門蹇碩統之雖大將軍亦屬焉是時閹宦專兵自陳蕃竇武一舉不勝而何進袁紹深戒覆轍一切倚辦於外兵閹宦雖除而董卓之禍起義兵四合群盜交鬬而漢鼎不守皆光武有以啓之自光武一切罷外郡之兵而專倚國軍其後國軍寖衰而又專倚牧鎮外兵既重內兵益弱以至於亡善乎應劭之言天生五材誰能去兵自郡國罷材官車騎之後官無警備實啓戎心其切於東都省兵之弊云抑豈知吕氏之誅而北固盛焉霍光之葬而南為重者然皆審勢於中外夫豈容心於取舍善乎唐李揆之言漢以南北軍而相制也按髙后紀勃欲入北軍乃令襄平侯紀通持莭矯內勃北軍復令酈寄典客欲謁説祿祿遂解印屬典客而以兵授太尉勃遂以北軍誅吕氏又按後吳漢傳漢薨有詔發北軍五校輕車送葬如大將軍霍光事注引光傳且曰不以南軍重之也或者見北軍可以誅吕氏遂謂先漢以北軍為盛南軍不以送吳漢之葬遂謂後漢以南軍為重則亦未之思爾北軍居外故周勃得以先入南軍在內豈得預大臣葬事中外之勢然也然兩軍皆所以翼衛京師豈容有偏重之勢哉唐兵志李揆云漢以南北軍相制此之謂也漢晉夷夏相報復漢自武帝遣將窮搜胸奴窟穴其後陳湯傅介子馮奉世皆以一使之任而切致夷王之首班超復以三十六人開西域竇憲以數千騎空朔庭皆古所未聞者也東漢自諸羌交亂中國馴至於晉胡羌拓跋交據中原者三百年亦古所未聞者也夫中國既與夷狄為鄰中無屏翰之限如兩仇家撤藩墻之蔽豪奴悍𨽻更出迭入以相挻此既能爭彼亦能戰也有國有家者正宜示之以分限先之以禮義寇則拒之服則舍之而已必欲以詐乘之而導其報復之蹊隧則彼之受禍猶淺而此之所受者更深耳可不戒哉光武用兵掌兵養兵之制東漢不志兵亦不志食貨嘗以紀傳及百官志考之乃知光武有見於昆陽之一勝故兵以少而精有監於武帝之奢廣故官以簡而當有懲於新莽之煩碎故賦以薄而贍昆陽以寡敵衆誠知兵在精不在衆明矣於是建武七年隴蜀猶未平詔罷輕車騎士材官樓船及軍假吏復還民伍以國有衆軍吳漢賈復等軍也並多精鋭故也宜其驅除群盜身經百戰先勝後戰不嘗試於一擲指縱諸將千里外如在目前此其跌蕩古兵法中當自矜其智力之有餘顧乃無取於韓白之書而獨以黃石公之戒為法者兵固在乎精而用尤戒乎黷也故以所任以將兵者非有安集之功則有勞來之績非有不伐之能則有牧御之才者也天下既定內省諸校輕車射聲長水止令城門校尉揔南北軍中候揔北軍而已外省郡國都尉及都試之法止存邊都尉及障塞尉而已郡國有叛羌反寇則馬援吳漢輩平蕩之邊境有胸奴鮮卑之擾則王霸守上谷二十年祭彤守遼東三十年控扼之此皆有監於奢廣之事也夫用兵既以少而精掌兵既以簡而當宜乎養兵之具不至於煩且費矣建武六年以往嵗旱蝗廪給貧民以屯田糧儲差積復令三十稅一十一年詔核州郡墾田之數又其後也罷均輸而以鹽鐵稅屬郡國舊屬司農以敖倉粟屬河南尹凡驃騎驍騎虎牙金吾五威等將軍事已即罷無非有懲於煩碎之政也夫今昔共之天下而中興多事復倍於昔時光武處以莭約之制郡縣十併其三四職官十省其五六文書十去其八九乃能優遊不迫安享太平而武帝新莽反以奢廣煩碎肇虛耗亂亡何哉傳曰仁者愛人愛人故惡人之害之也義者循理循理故惡人之亂之也是之謂仁義之兵循是則治反是則亂而已終東漢之世大略不變光武之制但和帝而下八君皆幼沖孱弱所以有治亂之異張角之亂始復置諸關都尉又置西園八校初命皇甫嵩張奂輩討張角皆謂之中郎將自東漢至于魏晉六朝掌兵之職大略皆同不復論又議者謂光武知人之明惟失之龐萌寵鄧奉處事之宜惟失之罷郡國都尉材官騎士其後諸羌擾亂三輔黃巾搖蕩八州皆其銷兵之過也夫知人自古所難固也銷兵以息疲民蓋適時之宜爾處降羌於內地乃馬援之失䇿在當時未能為甚害而其害乃在桓靈之時時則有假紀明輩勦其類黃巾之變亦在靈帝之代時則有皇甫嵩輩制其亂上失其道故民有異志豈得盡歸過於光武哉嘗觀建武至於永光和帝八十餘年偏師出塞則漢北地空竇憲耿純輩都護西指則通譯四方皆光武明章之餘烈也自和殤安順質桓靈獻嗣有大寶或在襁褓或在髫齓或在丱角未有過十五者母后臨朝竇鄧閻梁竇何六太后相繼稱制外氏秉政竇憲鄧隲梁商梁冀竇武何進宦官權幸撓權宦官鄭衆孫程單超曹莭乳母王聖權臣董卓曹操等百餘年間小人交亂君子廢錮天地之運盛極則衰固其宜也何止叛羌之梗黃巾之變而已哉必以人事論之光武明章在七制之列雖其天姿英明亦由春秋鼎盛權出於己也自和帝而下漸以陵遲雖其天姿孱弱亦由年齒沖幼政移於人也天理人事當相符而行是尤非光武之所能盡料也母后外家利於立幼君以自專所以兆亂雖鄧隲竇武之賢未免此失非惟敗國亦自喪身後人可以監矣周勃立文帝時年二十餘霍光立宣帝時年十八非惟年盛亦自賢明尤可為後世法羣書考索續集卷四十一
