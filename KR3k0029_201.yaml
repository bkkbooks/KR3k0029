body:
  text: 羣書考索别集卷十四宋章如愚撰禮樂門祭祀之禮求神於陽祭禮以鬱鬯灌地求神於隂然後迎牲主人親執鸞刀啓其毛以告純也取其血以告殺也取其膋以升臭也合之黍稷實之於蕭而燔之以求神於陽也詩傳主孝主敬祀先主於孝祭神主於敬語注六宗之祭凡祭六宗古注説得自好鄭氏宗讀為禜即祭法之所謂祭時祭寒暑祭日祭月祭星祭水旱者如此方得先祭上帝次禋六宗次望山川然後遍及羣神次序則皆順書説五祀之祭凡祭五祀户竈門行中霤皆先設席於奧而設主奠俎於其所祭之處已乃設饌迎尸於奧而孔疏以為逸禮中霤之文蓋唐初猶有其書而今亡之也亦可惜哉語或問五祀之神當尊言五祀之制詳於曲禮舉五祀之時著於月令辨五祀之名見於白虎通夫五祀者何謂也謂門户井竈中霤也人而知夫出處之所以安佚飲食之所以饜飫則知五祀誠不可以一闕然舉是祀者獨大夫以上得祭之位卑祿薄蓋有非其所當祭者然則五祀之典其可輕乎哉是故祭户以春取萬物始出之義祭竈以夏取火德生旺之義秋為閉藏之時故祭門於秋冬為水王之候故祭井於冬六月為土王之辰故祭中霤於六月嵗僅一遍順五行也士不得祭慮黷祀也户祭先脾竈祭先肺門祭先肝井祭先腎中霤祭先心明五祀之各有所主也户祭以羊竈祭以雉中霤祭以豚門祭以犬井祭以豕明五祀之各有所薦也吁人生羣居出處之所以安佚飲食之所以饜飫獨不可尊五祀之神乎雖然誠敬不存祭如不祭暗室有愧媚竈奚為故必視如面日星聼如耳雷霆戒謹於潔蠲蕆祀之日悚懼於威儀動作之間然後可以舉是祭否則謂之淫祀鬼神其歆之乎不誠無物之義視不見聽不聞是雖謂之無耳目可也且如禘自既灌而往不欲觀是方灌時誠意存焉即有其祭祀之事物矣及其誠意不敬則雖有升降威儀已非所以為祭祀之事物矣文公語録盡其誠意則感格祭祀之感格或求之隂或求之陽各從其類來則俱來然非有一物積於空虛之中以待子孫之求也但主祭祀者既是他一氣之流傳則盡其誠敬感格之時此氣固寓此也幽明本於一理天地隂陽生死晝夜鬼神只是一理若明祭祀鬼神之理則治天下之理豈有外於此七日戒三日齋必見其所祭者故郊焉則天神格廟焉則人鬼享此可謂至微而難通者若能如此到得治天下以上感下以一人感萬民亦初無難者並同上先王制禮之因蓋人之生無不本乎祖者故報本反始之心凡有血氣者之所不能無也古之聖王因其所不能無者制為典禮所以致其精誠篤其恩愛有義有數本末詳焉遭秦滅學禮最先壞由漢以來諸儒繼出稍綴緝僅存一二以古今異便風俗不同雖有崇儒重道之君知經好學之士亦不得盡由古禮以復於三代之盛其因時述作隨事討論以為一國一家之制者固未必皆得先王義起之意然其存於今者亦無幾矣跋古今家祭禮古壇位今廟鬼之異問人心聚處便有神故古人郊則天神格廟則人鬼享亦是此理曰固是但古人之意正故其神亦正後世人心先不正故所感無由得正因言古人祭山川只是設壇位以祭祭時便有祭了便無故不至褻瀆後世却先立廟貌如此所以反致惑亂人心僥求非望無所不至文公語録淫昏之鬼不當祠今之為吏者所知不過簿書期會之間否則觴豆舞歌相與放焉而不知反其所敬畏崇飾而神事之者非老子釋氏之祠則妖妄淫昏之鬼而其於先王之制國家之典所以治人事神明曷嘗有槩於其心哉嗚呼人心之不正風俗之不厚五穀之不登民生之不遂其不亦以此歟鄂州社稷壇封禪古無封禪以封禪為非古者范仲淹也以封禪為不經者李泰伯也以封禪為不足信者蘇子由也夫封土為壇除地為禪十二君巳主其説仲淹何以議其非古李泰伯何以謂之不經子由又何為不之信六經無封禪之文帝王無封禪之事著是文者管仲疏其源史遷浚其流季仲推其波張説助其瀾侈是事者祖龍噓其煙孝元封其燼隋帝熾其膏元宗烈其熖然管仲能作封禪篇而不能逭識者之迂史遷能著封禪書而不能逋君子之誚相如能撰封禪文而不能掩後儒之議張説能撰封禪頌而不能蓋已見之非是封禪之説不足以詡世蠱聽也祖龍能立石封祠而不能綿億載之業孝武能泥封玉檢而不能飾萬嵗之呼隋帝能登封告成而不能衍再傳之統元帝能舞蹈太平而不能覆所有之愆是封禪之典於是以肆情示夸也證之以六經之明文質之以帝王之實迹則後世之惑滋甚且云云一山也或以為在東山或以為在蒙隂亭亭一名也或以為在牟隂或以為在巨平社首一地也或以為在巨平或以為在博縣則服虔晉灼應劭之論為不同既曰伏羲神農禪云云又曰三皇禪繹繹既曰帝嚳告堯舜禪云云又曰五帝禪亭亭既曰禹禪會稽湯禪云云又曰三王禪梁父則管仲孔頴達之説為不一紛紛異議迄無訂證唐虞三代果有是乎七十二君果足信乎設有是事六經遺文豈應不載若以秦漢而下言之則實有是事也吁安得仲淹泰伯子由與之議封禪之非哉郊祀明堂周公以義起古者祭天於圜丘掃地而行事器用陶匏牲用犢其禮極簡聖人之意以為未足以盡其意之委曲故於季秋之月有大享之禮焉天即帝也郊而曰天所以尊之也故以后稷配焉后稷逺矣配稷於郊亦以尊稷也明堂而曰帝所以親之也以文王配焉文王親也配文王於明堂亦以親文王也尊尊而親親周道備矣然則郊者古禮而明堂者周制也周公以義起之也詩傳天與帝所由分問郊祀后稷以配天宗祀文王以配上帝帝只是天天只是帝却分祭何也曰為壇而祭故謂之天祭於屋下而以神祗祭之故謂之帝文公語録鄭氏之説非是問今郊祀都祀許多帝曰周禮説上帝是總説帝説五帝是五方帝説昊天上帝只是説天鄭氏以昊天上帝為北極看得不是恁地北極星只是言天之象且如太微是帝之庭紫微是帝之居紫微便有太子后妃許多星帝庭便有宰相執法許多星又有天市亦有帝座處便有權衡稱斗星又問今郊祀也祀太乙曰而今都重了漢時太乙便是帝今添差了帝多都成十帝且如一國三公尚不可况天而有十帝乎古禮不合祭古時天地不合祭日月山川百神亦無合共一時祭享之禮當時禮數門儀從省必是天子躬親行事豈有祭天便將下許多百神一時都祭同上登壇之儀郊祀天子登壇太常博士引太常卿太常卿引皇帝並同上南北郊分合之辨問先朝南北郊之辨曰如禮説郊特牲而社稷太牢書謂用牲於郊牛二及社於新邑此其明驗也故本朝後來亦嘗分南北郊至徽宗時又不知却合為一周禮亦只是説祀昊天上帝不説祀后土故先儒説祭社便是問周禮大司樂冬至奏樂於圜丘以禮天夏至奏樂於方丘以禮地曰周禮中止有此説更有祀大神享大鬼祭大祇之説餘皆無明文同上明堂制度論明堂之制者非一某切意當有九室如井田之制東之中為青陽太廟東之南為青陽右個東之北為青陽左個南之中為明堂太廟南之東即東之南為明堂左個南之西即西之南為明堂右個西之中為總章太廟西之南即南之西為總章左個西之北即北之西為總章右個北之中為玄堂太廟北之東即東之北為玄堂右個北之西即西之北為玄堂左個中是為太廟太室凡四方之太廟異方所其左個右個則青陽之右個乃明堂之左個明堂之右個乃總章之左個也總章之右個乃玄堂之左個玄堂之右個乃青陽之左個也但隨其時之方位開門耳太廟太室則每季十八日天子居焉古人制事多用井田遺意此恐是也明堂説社稷水旱則變置社稷之説祭祀不失時則土穀之神不能為民禦災捍患則毁其壇而更置之亦年不順時八蠟不通之意是社稷雖重於君而輕於民也孟注祭以勾龍配社后土也以勾龍氏配方秋祭四方報成萬物周禮所謂羅弊獻禽以祀祊是也詩傳孔子責宰我戰栗之對三代之社不同者古者立社各樹其土之所宜木以為主也孔子以宰我所對非立社之本意又啓時君殺伐之心而其言已出不可復救故歷言此以深責之欲使謹其後也語注古者社不立主問古者各置其所宜之木以為社不知以木造主還便以植為主曰看古人意思只以木為社主使神依焉如今人説神木之類社只是壇若有造主何所藏之古者惟喪國之社屋之文公語録壇壝制度州縣社壇方二丈五尺髙三尺四出陛稷壝如社壇之制社以石為主其形如鍾長二尺五寸方一寸剡其上培其下半四門同一壝二十五步壇飾各隨方色上蓋以黃土瘞坎於壇之北壬地南出陛方深取足容物文公答社壇説社有主稷無主舊法社有主而稷無主不曉其意恐不可以已意增添其言壇上之南方非壇之中也蓋神位坐南向北而祭器設於神位之北故此石主當壇上南陛之上若在壇中央即無設祭處矣答社壇説社稷風雨雷神古今禮制社稷風雨雷神各有壇又各有方位社稷於西方風師於南北雨雷於東南大略如此不記子細今州縣亦皆别有壇但方位多不合古同上社主及社稷之神問社主平時藏何處曰但以所宜木為主如今世俗之神木然非是將木來截作主也以木名社如櫟社枌榆之社之類又問社稷神曰説得不同或云稷是丘陵原隰之神或云是榖神看來是榖神底是社即是土神又問社何以有神曰能生物便是神也並同上古人立木為社古人立木於社使民知所存著知社之神必有所司則國君所以守社稷其嚴乎答許順之社稷之祀不可廢載芟載柞其耕澤澤此春祈社稷之詩也其崇如墉其比如櫛此秋報社稷之詩也夫廬居族處非土不生枵腹張頥非榖不食知土榖之不容一日廢則社稷之神如之何其廢之是故人臣有平土之功則取以配社如共工氏之子龍髙陽氏之子黎是也有播榖之功取以配稷如烈山氏之子柱厲山氏之子農是也古人崇重之意為何如祭之以春官卜之以肆師擇之以元日重􅟹事也行之於新邑禱之於枌榆立之於洛陽示尊敬也其崇重之意又為何如蓋自不立官稷而祀稷之禮始廢不建州社而祀社之禮始壞一廢於漢之中世再壞於唐之建州况復有載芟良耜之遺意乎吁此張文琮所以有何觀之嘆然而社用羊豕稷用黍稷又奚為不用犢祭蓋用犢乃祭地之禮社稷雖地祇之屬而非地猶五帝為天之尊神而非天也社安得不用羊豕稷安得不用黍稷乎吾於此又知社稷為土榖之正神實非人為之也顔達龍訂定祀典按社實山林川澤丘陵墳衍原隰五土之祇而后土勾龍氏其配也稷則專為原隰之祇能生五穀者而后稷周棄氏其配也風師箕也雨師畢也是皆著於周禮領於大宗伯之官唯社稷自天子之都至於國里通得祭而風雨之神則自唐以來諸郡始得祀焉至於雷神則又唐制所與雨師同壇共牲而祀者也國朝禮文大抵多襲唐故至今郡國祀典自先聖先師之外唯是五者蓋以為二氣之良能天地之功用流行於覆載之間以育萬物而民生賴焉其德惟此為尤盛是以於其壇壝時日之制牲幣器服之品降登饋奠之節莫不參訂討論著之禮象頒下郡國藏於禮官有司嵗舉行之而部刺史又當以時序循行察其不如法者蓋有國家者所以昭事明神祇以降祥錫福於下其勤如此文公鄂州社稷宗廟前廟後寢之制凡廟之制前廟以奉神後寢以藏衣冠祭於廟而燕於寢故於此將燕而祭時之樂皆入奏於寢也詩傳古今廟制沿革古廟制自大禮以下各是一室陸農師禮象圖可考西漢時髙祖廟文帝顧成廟猶各在一處但無法度不同一處至東漢明帝謙貶不敢自當立廟祔於光武廟其後以為例至唐太廟及羣臣家廟悉如今制以西為上也至禰處謂之東廟只作一列今太廟之制亦然文公語録君臣廟制等級問天子七廟諸侯五廟大夫三廟士二廟官師一廟若只是一廟只祭得父母更不及祖矣無乃不盡人情曰位卑則流澤淺其禮自然如此問曰今雖士庶人家亦祭三代如此却是違禮曰雖祭三代却無廟亦不可謂之僭古之所謂廟者其體面甚大皆具門堂寢室勝如所居之宫非如今人但以一室為之同上堯舜廟制堯舜之廟雖不可考然以義推之堯之廟當立於丹朱之國所謂修其禮物作賔於王家蓋神不歆非類民不祀非族故禮記有虞氏禘黃帝而郊嚳祖顓頊而宗堯一節伊川以為可疑同上春秋漢家廟制又如魯祖文王鄭祖厲王則諸侯祖天子矣三威祖威公則大夫祖諸侯矣故禮曰公朝之設於私家非禮也自三威始也又問漢原廟如何曰原再也猶原蠶之原如宋朝既有太廟又有景靈宫又問郡國有原廟否曰行幸處有之然皆非禮也並同上世代遞遷之制問五廟七廟遞遷之制恐是世代寖逺精爽消亡故廟有遷毁曰雖是如此然祭者求諸隂求諸陽此氣依舊在如噓吸之則又來若不如此即是之死而致死之也蓋其子孫未絶此氣接續亦未絶文公語録古制今日難行古者各有始祖之廟以藏祧主如士二廟各有門堂寢各三間是十八間屋今士人如何要行得同上家廟在東之説問家廟在東莫是親親之意否曰此是人子不死其親之意同上古者祖宗各奉一廟鄧子禮問廟主自西而列排何所據答曰此不是古禮如古時一代只奉之於一廟如后稷為始封之廟文王自有文王之廟武王自有武王之廟不曽混雜共一廟同上今日情文不相稱室中西南隅曰主位室中西室東户若宣聖廟室則先聖當東向先師南向如周人禘嚳郊稷嚳東向稷南向今朝廷宗廟之禮情文都自相悖古者主位東向配位南向故拜即望西今既一列皆南向到拜時亦却望西拜都自相悖如此古者用籩豆簠簋等陳於地當時人只席地而坐故如此飲食為便如今塑象髙髙在上而祭饌反陳於地情文全不相稱同上宋朝張陸所議神宗朝欲議立朝廷廟制當時張琥則以為祧廟祔廟只移一位陸農師以為祔廟祧廟皆移一匝如農師之説則是世為昭穆不定豈得如此文王却是穆武王却是昭如曰我穆考文王曰我昭烈考武王又如左傳説管蔡郕霍魯衛毛聃郜雍曹滕畢原鄷郇文之昭也這十六國是文王之子文王是穆故其子曰文之昭也邘晉應韓武之穆也這四國是武王之子武是昭故其子曰武之穆也則昭穆是萬世不可易豈得如陸氏之説同上周廟昭穆之制或問逺廟為祧如何曰天子七廟如周文武之廟不祧文為穆則凡後之屬乎穆者皆歸於文之廟武為昭則凡後之屬乎昭者歸乎武之廟也並同上昭穆之位太祖之廟始封之君居之昭之北廟二世之君居之穆之北廟三世之君居之昭之南廟四世之君居之穆之南廟五世之君居之廟皆南向各有門堂室寢而牆宇四周焉太祖之廟百世不遷自餘四廟則六世之後每一易世而一遷其遷之也新主祔於其班之南廟南廟之主遷於北廟北廟親盡則遷其主於太廟之西夾室而謂之祧廟主在本廟之室中皆東向及其祫於太廟之室中則唯太祖東向自如而為最尊之位羣昭之入乎此者皆列於北牖下而南向羣穆之入乎此者皆列於南牖下而北向南向者取其向明故謂之昭北向者取其深逺故謂之穆蓋羣廟之列則左為昭而右為穆祫祭之位則北為昭而南為穆也中庸或問祧祔之制昭常為昭穆常為穆禮家之説有明文矣蓋二世祧則四世遷昭之北廟六世祔昭之南廟矣三世祧則五世遷穆之北廟七世祔穆之南廟矣昭者祔則穆者不遷穆者祔則昭者不動此所以祔必以班尸必以孫而子孫之列亦以為序若武王謂文王為穆考成王稱武王謂昭考則自其始祔而已然而春秋傳以管蔡郕霍為文之昭邘晉應韓為武之穆則雖其既逺而猶不易也同上僖祖之廟不當祧僖祖者太祖之髙祖者也雖歷世久逺功德無傳然為四世之傳篤生神孫順天應人以寧兆庶其為功德蓋不必身親為之然後為盛也是以太祖皇帝首崇立之以為初廟當此之時蓋以歸德於彼而不敢以功業自居矣今乃以欲尊太祖之故而必使之奪據僖祖初室東向之位臣恐在天之靈於此有所不忍而不敢當也文公議祧廟小帖子詘義伸恩之説蓋尊太祖以東向者義也奉僖祖以東向者恩也義者天下臣子今日之願也恩者太祖皇帝當日之心也與其伸義詘恩以快天下臣子之願孰若詘義伸恩以慰太祖皇帝之心乎論太廟制不合古制而得古意蓋古者諸侯五廟所謂二昭二穆髙祖以下四世有服之親也所謂太祖者始封之君百世不毁之廟也今世公侯有家而無國則不得有太祖之廟矣故至和四廟特所謂二昭二穆四世有服之親而無太祖之廟其於古制雖若不同而實不害於得其意也文公答汪尚書宗無常數七者其正法數可常數者宗不在此數中宗變也茍有功德則宗之不可預為設數故於殷有三宗周公舉之以勸成王由是言之宗無數也禘祫議劉歆宗無數圖辨廟東向之非古人廟堂南向室在其北東户西牖皆南向室西南隅為奧尊者居之故神主在焉詩所謂宗室牖下者是也主既在西壁下即須東向故行事之際主人入户西向致敬試取儀禮特牲少牢饋食等篇讀之即可見矣考通典開元禮釋奠儀猶於堂上西壁下設先聖東向之位故三獻官皆西向倣佛古制今神位南向而獻官猶西向失之矣凡廟皆在南向而主皆東向唯祫祭之時羣廟之主皆升合食於太祖之廟則太祖之主仍舊東向而羣昭南向羣穆北向列於太祖之前此前代禮官所謂太祖正東向之位者為祫祭時言也非祫時則羣廟之主在其廟中無不東向矣廟則初不東向也文公與吳晦叔三代與漢人之制王制天子七廟三昭三穆與太祖之廟而七諸侯大夫士降殺以兩而祭法又有適士二廟官師一廟之文大抵士無太祖而皆及其祖考也其制皆在中門外之左外為都宫內各有寢廟别有門垣太祖在北左昭右穆以次而南晉博士孫育議天子太祖百世不遷一昭一穆為宗亦百世不遷二昭二穆為四親廟髙祖以上親盡則毁而遞遷昭常為昭穆常為穆諸侯則無二宗大夫又無二廟其遷毁之次則與天子同儀禮所謂以其班祔檀弓所謂祔於祖父者也三代之制其詳不得聞然其大略不過如此漢承秦弊不能深考古制諸帝之廟各在一處不容合為都宫以序昭穆貢禹韋玄成匡衡之徒雖欲正之而終不能盡合古制旋亦廢罷後漢明帝又欲遵儉自抑遺詔無起寢廟俱藏其主於光武廟中更衣别室其後章帝又復如之後世遂不敢加而公私之廟皆為同堂異室之制禘祫議神祖欲定古禮肆我神祖始獨慨然深詔儒臣討論舊典蓋將以逺迹三代之隆一正千古之謬甚盛舉也不幸未及營表世莫得聞秉筆之士又復不能特書其事以詔萬世今獨其見於陸氏之文者為可考耳然其所論昭穆之説亦未有定論獨原廟之制外為都宫而各為寢廟門垣乃為近古但其禮本不經儀亦非古故儒者得以議之如李清臣所謂略於七廟之室而為祠於佛老之側不為木主而為之象不為禘祫蒸嘗之祀而行一酌奠之禮楊時所謂舍二帝三王之正禮而從一繆妄之叔孫通者其言皆是也然不知其所以致此則由於宗廟不立而人心有所不安也同上昭穆之序昭穆但分世數不為分尊卑如父為穆則子為昭又豈可以尊卑論乎周室廟制太王文王為穆王季武王為昭此可考也文公答陳安卿昭穆一定之制據禮家説昭常為昭穆常為穆故書謂文王為穆考詩謂武王為昭考至左傳猶謂畢原鄷郇為文之昭邘晉應韓為武之穆則昭穆之位豈以新主祔廟而可變哉但昭主祔廟則二昭遞遷穆主祔廟則二穆遞遷爾文公答陸子夀左右之次宗廟之制但以左右為昭穆而不以左右為尊卑故五廟同為都廟則昭常在左穆常在右而外有以不失其序一世自為一廟則昭不見穆穆不見昭而內有以各全其尊必大祫而會於一室然後序其尊卑之次則凡已毁未毁之主又畢陳而無所易唯四時之祫不陳毁廟之主則髙祖有時而在穆同上報本享親有常典先王制禮自天子以至於庶人報本享親皆有常典牲器時日皆有常度明有禮樂幽有鬼神一理貫通初無間隔茍禮之所不載即神之所不享是以祭非其鬼即為淫祀淫祀無福經有明文非故設此以禁之乃其理之自然不可得而易也文公擬上封事推其本之所自出后稷本封於邰而不窋已自竄於戎狄公劉太王又再遷而後定文武之興又何嘗盡由於后稷哉但推其本始為出於此故不可以不尊耳豈計其功德之小大有無哉於禘如何才知其説便能於理無所不明曰此是理之至大者蓋人推至始祖則已極矣今又推始祖所自出之帝而祀焉則其理可謂窮深極逺矣非仁孝誠敬之至何以及此能知此則自然理無所不明誠無不格於治天下真不為難矣文公答録國語周禮祭法表裏國語日祭月祀時享既與周禮祀天神祭地示享人鬼之名不合韋昭又謂日上食於祖禰月祀於曽祖時享於二祧亦但與祭法略相表裏而不見於他經文公答葉味道人情不能自已蓋今之俗節古所無有故古人雖不祭而情亦自安今人既以此為重至於是日必具殽羞相宴樂而其節物亦各有宜故世俗之情至於是日不能不思其祖考而復以其物享之雖非禮之正然亦人情之不能已者但不當專用此而廢四時之正禮耳文公答張欽夫諸侯大夫祭禮古者諸侯只得祭始封之君以上則不敢祭大夫有大功則請於天子得祭其髙祖亦止祭得一畨常時不敢祭程先生亦云古人必祭其髙祖只是有疏數耳文公語録禘祫蒸嘗禘其祖之所自出禘是祭祀之甚逺甚大者若其它四時之祭及祫祭祭止於太祖若禘又祭其祖之所自出如祖后稷又推后稷上一代祭之周人禘嚳是也禮不王不禘禘者祭其祖之所自出而以祖配之蓋無廟而祭於祖廟所以難以答或人固是魯禘非禮然事體大自是難説若主祭者須是極其誠意方可感格同上當盡誠意之極至禘之意最深長如祖考與自家身心未相遼絶祭祀之禮亦自易理會至於郊天祀地猶有天地之顯然者不敢不盡其心至祭其始祖已自大假濶逺難盡其感格之道今又推其始祖之所自出而祀之茍非察理之精微誠意之極至安能與於此哉故知此則於治天下不難也並同上仁孝誠敬之至先王報本追逺之意莫深於禘非仁孝誠敬之至不足以與此非或人之所及也而不王不禘之法又魯之所當諱者故以不知答之蓋知禘之説則理無不明誠無不格而治天下不難矣聖人於此豈真有所不知也哉語注四時之祭宗廟之祭春曰祠夏曰禴秋曰嘗冬曰蒸詩傳禘有樂嘗無樂之義祭義説春禘秋嘗霜露既降君子履之必有悽愴之心非其寒之謂也雨露既濡君子履之必有怵愓之心如將見之樂以迎來哀以送往故禘有樂而嘗無樂蓋春陽氣發來人之魂魄亦動故禘有樂以迎來如楚辭大招中亦有魂來之語秋陽氣退去乃鬼之屈故嘗不用樂以送往文公語録大祭合祭之義有來雍雍至止肅肅此豈非雍之詩乎讀雍詩十六句則知為禘文王而作也天命元鳥降而生商此豈非元鳥之詩乎讀元鳥一章則知為祫髙宗而作也禘祫之祭其來尚矣蓋禘之為言大也惟大祭則謂之禘祫之為言合也惟合祭則謂之祫或謂之間祀者以其祭在四時之間也或謂之盛祭者以其合五年再盛之義也是故三年一禘重其事也祫以五齊禘以四齊昭其數也禘以四月祫以十月正其時也所以序昭穆所以貴功德所以尊人君所以廣孝道則禘定尊卑合度飲食固非徇虛議而循故事也奈何魯以諸侯用天子之禘而禘禮之廢自魯始後漢以君臣並列於祫祭而祫禮之廢自後漢始更歷至唐抑又甚焉或祫在禘後三年或禘在祫後二年或禘祫並在一年祀典不明先後倒置雖粢盛必潔酒泉必香器用必備又奚取於禘祫哉善乎元燦之議以五年再祭為證徐邈之説以六十月中置一祫為常此又足以發明古禘祫之義而為後世標凖之論顔達龍祼禮獻莫重於祼王入太室此書洛誥言祼之祭也灌用鬱鬯此禮郊特牲言祼之義也夫祼者灌也謂獻尸求神而用鬯始祼也吾夫子曰禘自既灌而往者吾不欲觀之矣蓋獻祼為歆神之始而獻莫重於祼也是故大君執圭瓚大宗執璋瓚明祼之必有尸也春夏用雞鳥秋冬用斚黃明祼之必順時也有鬯人以司其鬯有小宰以贊其事有鬱人以詔其儀明祼之必有司也灌用雞尊則為夏制灌用斚尊則為商制灌用黃尊則為周制明祼之必有尊也王再祼而酢則為上公之禮王一灌而酢則為侯伯之禮王一祼而不酢則為子男之禮明祼之用酢禮也然宗廟用祼天地大神不用何耶曰宗廟用祼者人道也非人道有所不用耳同前蠟祭蠟以記四方自伊耆行蠟祭之禮而君子知其從始自隋人有俱蠟之名而君子嘆其不專自唐代舉分蠟之典而君子譏其非古夫蠟之為言索也夏曰清祀商曰嘉平周曰蠟秦曰臘此則為蠟之異名土反其宅水歸其壑昆蟲毋作草木歸其澤服用素服辨用皮辨禮用大割樂用六變此則為蠟之祭禮是故終嵗休息則索饗羣神而舉是祀所謂蠟以祭八神是也一方有歉則特闕其禮而不講所謂蠟以記四方是也然則蠟之為義雖所以敬神實所以警東阡西畝耕耔之天也彼康成取昆蟲以足八神之數其意蓋謂蟲螟之災神實驅之不知昆蟲實出於祝辭正不可附會而足其數也王肅析貓虎而棄昆蟲其意蓋謂迎貓迎虎實為二物不知貓虎均為食田鼠尤不可分為二祭也吁昆蟲既不足以充其數貓虎又不當以析而二則所謂祭百種以報嗇者得非八神之一乎若夫魏髙堂隆以五行之終而論蠟日尤有可議者焉且其言曰水行之君以子蠟火行之君以午蠟木行之君以卯蠟金行以酉土行以戍考漢之用午宋之用子固足以牽合其説然唐尚土德開元以前皆用寅蠟又果何以五行之終而論之乎吁一日之蠟百日之澤必有夫子而後可以論蠟若後周用夏后之時而行姬氏之蠟則其惑古也滋甚若夫葛帶榛杖黃冠草笠是又子貢之所謂狂蘇先生之所謂戲也禜祭州郡當修禜祭山川之禮今州郡封域不減古之諸侯而封內名山大川未有望祭之禮其有祠廟亦是民間所立淫誣鄙野非復古制顧乃舍其崇髙深廣能出雲雨之實而傴僂拜伏於土木偶人之前以求其所謂滋養潤澤者於義既無所當又其牲牢器服一切循用流俗褻味燕器於禮又無所稽至於有山川而無祠廟者其嵗時祈禱遂不復禜於山川而反求諸異教淫祀之鬼此則尤無義理而習俗相承莫知其謬文公乞增修禮儀狀雩祀求雨之祭書雩祀之失者莫詳於夫子之春秋辨雩祀之時者莫詳於頴達之月令疏夫雩者求雨之祭也建巳之月常用焉故有以雩音近吁而謂女巫吁嗟之祭又以雩為逺而謂逺為百穀求雨之祭曰吁曰逺義雖不同其所以為求雨之祭一也是故天子雩於上帝諸侯雩於上公言雩祀之必有别也天子禱九州山川諸侯禱封內大夫禱所食邑言雩祀之必先禱也或者則曰周以四月秦以五月何也吁是特未之思耳蓋是周人以建子為正四月雩者今之二月也秦人以建亥為正五月雩者亦今之二月也周歷起元自冬至甲子故四月以東方蒼龍星見而雩秦歷自孟春起日在營室五度故仲夏之月以昏亢中而雩要之亢中此所以為龍見也不然周何以用四月秦何以用五月乎雖然榖梁説以得雨曰雩公羊説以言雩則旱見是又二家之説為不同而愚以鄭氏釋廢疾證之則榖梁之説為得也顔達龍祠禖取神明告示之義自吕令有鳥至祠禖之説而後世始以髙禖為嘉祥之神自頴達有從帝而見之説而後世始以髙禖為配祭之人夫古禖字從女而今從示者蓋取神明告示之象是故祠以仲春正其候也祭以太牢尊其物也祀以南郊重其事也然祠禖之説雖不廢於後世愚不知始立是祠者誰乎嘗考之詩傳有曰薑嫄從帝而祠於郊禖又曰簡狄從帝而祈於郊禖則是薑嫄簡狄之前先有神矣故蔡雍之論以為髙辛巳前有之實據詩傳云爾又考之殷本紀有曰元鳥遺卵娀簡吞之而生契則是髙辛之世有此異祥而後王以為禖官矣故鄭康成之論以為髙辛巳後有之是又得之殷本紀也蔡雍謂髙辛巳前康成謂髙辛巳後二論抵巇將何取正抑嘗思之而得其説蓋髙辛巳前實有先媒之祀髙辛巳後始更髙禖之名夫以禖神而謂之髙者正有取於髙辛配祭之義故髙禖立而先禖廢矣不然髙禖之説胡不聞於髙辛巳前乎同上祭器儀葅醢太羮之器木曰豆以薦葅醢也瓦曰登以薦太羮也文公語録州縣所用制度非古祭器嘗經政和改制盡取古器物之存於今者以為法今郊廟所用則其制也而州縣專取聶氏三禮制度醜怪不經非復古制而政和所定未嘗頒降此禮之所以不合文公民臣禮議宋朝禮制興廢行古禮須是參用今來日用常禮庶或享之如太祖祭簠簋籩豆之外又設牙盤食用碗楪之類陳於床這也有意思到神宗時廢了元祐初復用後來變元祐之政故此亦遂廢文公語録牲牢騂牡既備以享以祀此旱麓之詩也享以騂犧是享是宜此閟宫之詩也牲牢之用其來尚矣蓋牛羊豕曰牲而繫養曰牢古人之所以行禮者皆是物也是故虞祭用特周祀用五所用之數不同也夏后用玄商人用白周代用騂所尚之色不同也或用之於祭祀或用之於賔客祭享之禮異也天地之牛角繭栗宗廟之牛角握小大之祭明也然則牲牢之用烏可去之而廢禮哉蓋自魯僖郊免牲而君子始嘆其非自吳王用百牢而君子始議其僭自宣成定哀改牛而郊而君子始譏其失楚茨之刺興而潔爾牛羊以往蒸嘗者誰乎甫田之詠作而與我犧羊以社以方者又誰乎是則以微物而廢禮奚為不謹於用牲乎愚故為之説曰爾愛其牲我愛其禮顔達龍五齊三酒觀周酒正之職而知五齊之辨考鄭司農之注而知三酒之名夫國有祭祀齊必用五酒必用三以其至誠不尚味而貴多品也知坎之樽酒二簋而不知有孚之心知旱麓之清酒以祀而不知不回之德冕服趨蹌事文飾也八尊充溢崇縟典也器用精潔侈虛文也共粢盛耕循故事也若是則享多儀儀不及物又奚取於五齊三酒蓋五齊者泛醴盎緹沈是也三酒者曰盞曰澄曰清是也泛齊之味尚乎泛薄故祭祀以泛齊為先非取其尚質之義乎清酒之味近於清美故享禮以清酒為後非取其後文之義乎鬱齊雖薄不數於六齊元酒雖淡不與於三酒又豈非鬱為九獻之先元為五味之本乎吁知此則知祭祀之典不在物而在誠不貴華而貴質否則西鄰之禴視以為簡南澗之蘋視以為陋矣故秫稻必齊麴蘖必時湛熾必潔水泉必香然後奉五齊三酒以祀庶乎神之聽之介爾景福同上羣書考索别集卷十四
