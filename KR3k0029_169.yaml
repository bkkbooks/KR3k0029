body:
  text: 羣書考索續集卷三十八宋章如愚編官制門吏治宣帝循吏多於文帝宣帝寬仁恭儉不及文帝天資刻薄頗類景帝其所能垂意吏治而以良二千石為重者徒以舊勞於外備知閭閻疾苦吏治得失故也其天資刻薄終不可掩夫是以循良之名多歸於吏彼其循吏之數多於文帝之世者正以文帝寬厚長者德意志慮盡出於巳不待吏為之宣帝德意既薄於是循吏之名始稍著見於世名不在君而在吏既有以見其君之無足言者然自數人之外酷吏亦可知其不少矣貫珠舉郡縣皆循吏而無循吏之名才説循吏必有酷吏區别於其間故漢之循吏正為宣帝而作東漢之循吏正為明帝而作陳君舉德化盛則循吏無稱循吏變風之美酷吏變小雅之刺德化在上風俗淳一則循吏無稱文帝時是也吳公故不立傳如正雅無風教化闕則國異政然後吏著稱文翁興學是也如列國有風宣帝循吏最多亦有褒貶知擇任二千石良吏為盛宜褒然宣帝雜霸刑名一時吏能亦多承宣帝意嚮惟王成黃霸龔遂召信臣朱邑有德遜之風義歸於上則上有歉武帝時只一仲舒然事不止於循良吏洪寬裕儒又與仲舒不同循吏各有所長朱邑亷平王成勞來信臣勸農文翁興學宣帝雖有循吏亦有酷吏宣帝時雖有循吏酷吏亦不少循吏只是數人皆緣宣帝德意薄故名歸良吏若文帝時豈可勝紀又緣帝長於民間故知民疾苦緣在民間知官吏欺弊賞罰不明故綜核名實信賞必罰緣知民間愁苦由吏不良故選良二千石此良吏所以盛也然宣帝雜霸任刑一時能吏皆以嚴治承帝意向惟王成黃霸龔遂召信臣朱邑有德遜之風文帝吏不入循吏酷吏傳景帝始有酷吏文帝寬仁無酷吏景帝初承文帝後吏尚寬郅都獨嚴故為酷吏之首然郅都乃在鎬後文帝吏不入循吏酷吏傳景帝始有酷吏緣景帝學鼂錯寬仁貶於文帝此酷吏所由起也武帝時皆是酷吏武帝朝無循吏皆是酷吏武帝本非慘刻之資只緣多事欲齊之以刑班固正其名别其義上有好者下必有甚焉序意當矣迹其上以為能一語即見上之人欲齊之以刑之意矣武帝以酷吏為能能之過則為酷故能吏多見於酷吏傳故凡武帝之所謂能者皆班固之所謂酷也蓋武帝正以多欲而起多事惟天下之惑亂吾意也故寧以刑法整齊其民以能吏趣辦其事故班固云雖酷而能稱其位矣楊僕為主爵都尉治放尹齊上以為能拜為樓船將軍王溫舒為河內太守好殺行威上以為能遷中尉凡能吏必有赫赫之名故王溫舒為廣平都尉廣平道無拾遺迹其上以為能一語即見武帝齊之以刑之意考課唐虞成周考課先申明邦法而後誅賞或問太宰之職正月之吉乃始和而布之正歲之月乃始垂象觀之邦國都鄙官府之中乃始施其治牧監正二之屬乃始建其人何也此所以申明吾之法也歲終三歲將有以考課其人正月正元日四嶽四門之詢闢四目四聰之明達十二牧之咨二十二人之戒猶諄諄然命之者是固將以為考績之地也夫是以前黜陟去四凶天下至於咸服後黜陟而分三苖庶績至於咸熙三代以來世守此道周人考課之法尤嚴於唐虞三代之舊考之周禮有所謂逆其治者執吾之法而逆警戒之於其先也有所謂待其治者既警戒之則待其成而考驗之於其後也如宮正醫師司會大司徒小司徒卿大夫族師黨正鄙師內史司冦士師之屬則皆所以考其事如宫正膳夫酒正太府職內司會司書內宰司枲泉府藁人舍人之屬則皆所以考其財如太宰小宰宰夫則兼統而兼考之故日之有成日考之也宰夫受之月之有要月考之也宰夫令之而小宰受之歲有會歲考之也小宰贊之而太宰受之也三歲之有計三歲考之也冢宰贊之而王親受之蓋有官則必有事有事則必有考人與官不相違功與法不相悖則置之賞之其官則然其人則不然其法則然其功則不然則廢之誅之太宰既已三歲計吏而殊賞司士亦三歲稽士而進退非一切委之以法而聽其人之自縱也周人考課之嚴如此夫豈遽行其法而逆其效也哉其本末源流固自有次第非汲汲焉於朝夕之頃蓋曰成曰要雖不廢於日月而會計之大則必遲遲於一歲三歲之終申飭警戒之必嚴勤勤於正月正歲之始在太宰則始和挾日而後斂在小宰則正歲帥治官之屬觀治象之法而懼之以大刑在宰夫則正歲以法警戒羣吏令修宮中之職事而勸之以良能以至大司徒正歲帥屬觀教而卿大夫州長黨正以考而讀焉大司冦正歲帥屬觀刑士師亦慮而禁令焉故凡昔者經國之大綱為治之條目煜煜然常有日新之意奉行之吏聯事合治之人欣欣然常有日新之功法若始立之法人若始用之人戒飭勉厲之餘有奮發而無懈怠有敕正而無玩弛能否畢見賢不肖無所隱至是考績之法始可行小而豫奪大而生殺始可以各當其情也考課詳於外而不詳於內行於小吏而不行於達官漢考課之法詳於外而不詳於內行於小吏而不行於達官郡國長吏既有以上計以較其殿最而部刺史以其六條督其治行天子時遣使者乘傳行四方以察吏考俗而公府聽采長吏臧否以謡言舉按輒被黜免大率於外為詳也至於內則不過三府者光祿􅈴歲考察德行以進退之而已雖曰故事選郡國守相髙第為中二千石選二千石為御史大夫任職者為丞相然進退之序亦未必一以考課為黜陟也焦延壽為中黃令舉最增秩王溫舒試亭長以事數廢賞罰若甚公矣然兒寬為左內史與民假貸而負租課當免而更以最治評為第一而卒不聞其擢用此皆行於小吏而不行於達官也至於京房奏考功課吏法欲以丞令治一縣崇教化亡犯法者輒遷尉有盜賊滿三日不舉發者則尉事也令覺之自除尉負其罪則又行之於縣有上下相司之意其法煩碎不可用矣嘗聞魏正始中上使王昶撰百官考課事昶以為黜陟之文而考課之法不垂周制冢宰之職大計郡吏之治而誅賞又無比較之制由此言之聖主明於任賢略舉黜陟之體以委達官之長而總其統紀故能否不可得而知也大意以上考下郡以課縣如扶風課茂陵蕭育第六是也州以課郡如刺史以六條察二千石歲終則奏事舉殿最是也丞相總職庶官如丙吉之歲竟丞相課其殿最以賞罰是也唐考功之法善考績之法唐虞至成周未嘗一日廢也秦漢之興此法亡矣京房區區欲舉而行之卒不見效而身死讒口漢魏而下未能行其緒餘者惟唐興獨有成法終始行之以有可稱焉其法有四善二十七最善以著其德行最以著其才術以善與最相為乘除分為九等以考中外官上者加階其次進祿其下奪祿又其下解任嵗定京官望髙者二人分校京官外官考而以給事中中書舍人蒞之其後屢置知考使嘗以宰相董其事見於傳記如孫狄之鑒班宏之公趙景盧承慶之達崔隱甫之敏趙宗儒之核皆可以稱記雖孫逖宋朝人書何易于事托言邑民譏益昌令不得上考然易于以不失考中上雖陽城自書下考而益以顯名至如李渤考功員外郎爾乃自宰相而下升黜之雖其事不見施行讀其表辭抑揚奮厲令人神竦大抵唐之法唐虞三代之美意也三代而下皆不能行獨唐能始終行之此其所以為可嘉也矣且其間豈無徇私任情之弊而其法自不可廢必也因噎廢食因溺廢舟則宰相之除授長官之薦舉豈皆人人無私而亦可廢乎嘗考之唐世以物望取人而不疑於有司者其槩有三一曰貢舉許人以廉獻往往皆得公然推薦二曰選曹鑒裁甄拔不一切關於資考三曰考功有褒貶之實有升降之由此三者今皆無有然唐賢言選舉之弊多矣至於考課初無異議趙景審官六議其四亦言考課之善而已今若舉而行之又何難焉薦舉武帝朝所薦皆言利之人長君之惡其罪小逢君之惡其罪大以吾觀鄭當時之立朝未免於逢君之惡也武帝外興師旅內修宮室窮奢極侈使其不得興利之臣四顧索然莫能措手又將懷財盡民散之懼卓然更化復於質朴使哀痛之詔富民之侯必不至於末年而後行也當時不知出此反逢迎武帝之意薦東郭咸陽孔僅𣙜鹽鐡算舟車言利析秋毫以滿帝之欲俾帝之侈心與財俱長是猶蛟龍之雲雨虎豹之羽翼也大節耗虧縱有推轂賢材之意豈能掩其失耶昔鯀之湮洪水三苖之即功共工之象恭滔天彼其竄殛之刑無可疑者惟歡兜亦嘗稱共工於堯朝而遽與三人同罰者抑有深意焉功莫大於進君子罪莫大於進小人小人一至則亂國無所不至推其原究其本非自人以薦之小人安能自進哉以是而論雖切其罰不為過也當時茍生於舜之時吾知其不能逃崇山之貶矣舉主改官之弊今議者以舉主轉官為進賢此不知其弊之深也大凡善惡之人各以類聚故守亷謹者各舉清幹之人有贓汙者各舉貪濁之人好徇私者各舉請求之人性庸暗者各舉不才之人朝廷不問是非但見舉主數足便與改官則清幹者進矣貪濁者進矣請求者進矣不才者亦進矣混淆如此便可與進賢之法乎連坐舉主之法非聖人之所以不責人之所不能者得以深責乎人之所能也後之立法者異於是責人以其所不能而其所能者不深責也宋朝自祖宗以來責有薦舉除授之目仍列舉主姓名或在官貪濁不公柔懦不理職務廢闕處斷乖違並量輕重連坐且夫人之難知自堯舜病之矣今日為善而明日為惡猶不可保况於十數年之後其幼者已壯壯者已老而猶執其一時之言使同被其罪不已過乎故曰今之法責主以其所不能者謂此也薦舉為國非為己張安世嘗有所薦其人來謝大恨以為舉賢達能豈有私謝耶羊祜所進達之人皆不知所由嘗曰拜官公朝謝恩私門吾所不取也狄仁傑薦張柬之又薦姚崇等數十人率為名臣或曰天下桃李盡在公門曰薦賢為國非為私也孫抃薦唐介吳中復為御史或曰君未嘗與二人相識而遽薦之曰昔人恥呈身御史今豈求識面臺官婁師德薦狄仁傑仁傑亦不知王旦舉孝行簡行簡亦不知此舉人不以為己恩者也左雄薦周舉為尚書既而雄舉馮直不當舉即以舉劾雄此為人所舉不以己而受其恩者也或問報國孰為大曰薦賢為大竭一身之智力其效少竭衆人之智力其效多宋朝有擇舉主察舉人責舉主之法擇舉主於未用之先察舉人於方用之始責舉主於己用之後此祖宗之良法也咸平初上語李至曰凡所舉官多聞謬濫不若先擇舉主此擇舉主法也太平興國之詔曰九品之賤一命之微未嘗專望於有司必須召對於便殿此察舉人法也乾德之詔曰除授之制書舉主姓名或不知舉者並連坐之此責舉主法也擇之於其先則人知所勸責之於其後則人知所懼天子又於其中而致察焉則其權又不專在有司矣祖宗朝舉京朝官委之蘇易簡陳恕舉御史委之樂黃知自陳微謂其人足以堪是選也今之達官不能皆偉人一當其任例可揀挍亷謹者舉清幹贓汙者舉貪濁比之匪人如薦賢何祖宗朝髙惠連之績用面授朝官張祥之自新授以令長此皆親得於顧問者也今之班引特為文具去黼座於數十步之外聽唱姓名而已旅進旅退何以知人若乃連坐之法則祖宗之所嚴而今日之所寬也昔卲餘慶受誓戒不及猶劾舉主卲煜舉非其人已經數宥猶至停官其法之嚴也如此雖曰改節中變許自陳首而又有不在陳首之限者今也不然罪犯已著不可庇護舉主乃以陳首而免連坐不罰而懼能幾何人三法皆壞而薦舉之弊有不可勝言者矣竊嘗因賈黯之言而深思焉舊制薦人不限員數自張易所舉猥多乃始限之舊制常參官得論薦其後常參官不許論薦舊不以在任及所統屬皆得論薦其後須在任及統屬方許論薦是向之法疏而後之法密矣然天聖中改官者止數十人皇祐中已六七十人至於治平則三倍其數法之疏者其數省法之密者其數增此其故何哉大抵有敕舉有限舉敕舉主者闕其人則舉不闕則不舉也限舉者每歲有舉雖不闕亦舉也祖宗時闕令長則詔舉令長闕幕職則詔舉幕職闕京朝官則詔舉京朝官士大夫終身所舉一二人而已故可以選可以責天子亦可以閲視自夫監官郡守歲舉限員不問賢否但欲充數一人之身更六七任則所舉不勝其衆雖欲行三者之法烏得而行之限舉不可行敕舉不可復善謀國者亦付之無可奈何而已矣噫薦李師錫者凡三十餘人擢之不次可也而上與循資賈積善史用昭歷任書考薦之者無一人終身選調可也而特以京官與之祖宗權衡固有出於是法之外者神而明之存乎其人薦舉得人吕蒙正之册備盡人才陳述古之藁皆天下名士先正知人之明薦人之公得人之盛如此哉大抵祖宗盛時公道著明大臣知薦賢報國而已士大夫知行己律身而已上以公取下以公進一毫之私心不預焉恩自己出王公曽嘗惡焉謝恩私門吾所不敢曽其今之師德歟曹彬之薦其子祈奚之於子也吕蒙正之薦其姪謝安之於幼度也范仲淹嘗攻吕夷簡而夷簡復薦仲淹唐介嘗劾文彥博而彥博復薦唐介此喬元之於陳球解狐之於荆伯栁也劉安世以不通溫公之書而被擢則恬退者進張師德以兩詣王相之門而見卻則奔競者退論薦如此尚何議然則被薦者如之何曰范仲淹之於晏殊每以不稱為羞若此者可以受所薦矣未被薦者如之何曰吕舜從嘗謂勤於職事乃所以求知若此者可以得所薦矣噫薦人者不私所薦被薦者不負所薦未被薦者不干所薦又烏有薦舉之失實哉故愚不敢以任法論祖宗而以任人論祖宗舉人乃所以為賢己賢不及賢也己賢而舉人之賢斯賢矣己能未為能也己能而揚人之能斯能矣陳述古襄之侍經席也所薦之士自司馬君實而下三十餘人皆賢能之士也嗚呼盛矣其後髙宗紹興元年求賢手詔亦舉陳襄薦賢事趙普堅薦二人普之相太祖也嘗為其事擇官普列二人姓名以進太祖不肯用他日又問復以進又不用他日又問復以進太祖太怒裂其奏擲殿陛上普色不動搢笏帶間徐拾碎紙袖歸中書則補輯之復以進太祖大悟終用二人限日舉賢慶元六年臣僚申請述孝宗之訓明詔兩省侍從臺諫之臣限三日各舉一二員謂嚴三日之限所以杜臣下請托之私奉聖旨依仍不許宰執臺諫侍從親戚子弟交薦改官李垕進卷云初選人之未改京官也但以積考序進雖有保舉課試之式進者不必皆由此途真宗益謹課試多所升黜而保舉之詔又數下進者稍繁矣大中祥符三年始募幕職州縣官須三任六考始得論薦被保舉者或一二人或三四人亟加遷擢執事頗惡其濫命自今待及五人始以名聞自明道後則又裁定內外臣僚歲舉官數文臣自待制至御史武吏自觀察至諸司副使各有等級不許輟過而被舉者非其本部監司按察司不聽磨勘其法制頗詳寶元末因上封事者言磨勘京官者必六考以上而嘗犯罪者加一等選人六考而改官實起於此慶厯初更命諸州視邑之多少薦舉差等而守將始有限矣皇祐初更命監司以所部多少劇易之差為舉人之數尋復裁定舉京官數而部刺史之舉始有定限矣舉官額天聖數十人紹興百四十人孝宗朝百二十人為是真宗行三年磨勘之法皆可積考而進無賢愚之别故自真宗以來改官之制不得不限其舉官選舉王制命鄉論秀士升之司徒曰選士司徒論選士之秀者而升之學曰俊士樂正崇四術立四教順先王詩書禮樂以造士夫樂正論造士之秀者以告於王而升諸司馬曰進士司馬辨論官材論進士之賢者以告於王而定其論論定而後官之周禮閭胥書其敬敏任恤族師書其孝弟睦姻有學者黨正書其德行道藝州長正月之吉考其德行道藝而興賢者能者鄉老及鄉大夫帥其吏以禮禮賓之厥明鄉老及鄉大夫獻賢能之書於王王再拜受之登於天府內史二之此謂使民興賢出使長之使民興能入使治之漢唐制度選舉之法一變而為辟舉再變而為限年三變而為中正四變而為年停五變而為科目自隋始置進士科而唐因之其科目之不一而明經進士尤貴其得人已盛可為後世之良法也古之所謂鄉舉里選猶曰鄉里之舉選云爾唐則不然舉以禮部謂之貢舉選以吏部謂之銓選其名同其事異而其意於古有合茍循其制而善用之雖古所以取士之方何以加是哉漢初為辟舉之法限以四科一曰德行二曰經學三曰明法四曰任事要知本末具舉此其意又與周官考其德行道藝而賓興之豈遽相逺然而舉之於郡國而任之於王朝其初天下畏法莫敢繆舉而不舉者有罰其後舉者猥濫而妄舉者有罰則徇私忘公之弊已形矣左雄為限年之法但使諸生試學文史試章奏一切責之以課試而貢舉之漸興也當是時胡廣張衡已議其非以為詔舉孝亷一以能誦章句節奏按為限是為捐本而忘末而魏氏之興遂立九品之法州郡皆置中正以定其選其取士之意本欲合之於古以德行為先而其弊乃至於純任閥閲不論賢愚故劉毅云上品無寒門下品無世族晉宋循襲莫之革弊夫以名求之則中正之選豈不合古然流弊之甚歷代厭苦反不若左雄課試之法行之十年號稱得人然則善法古者又何必徇其區區之名也九品之弊權歸吏部劉毅云一吏部兩郎中而欲究竟人物何異以管窺天而求其博於是崔亮為停年格士無賢否專以解日月為斷謂之年勞甄升踵而行之史謂魏之失才自亮始然其法亦因時制爾夫豈得已哉崔亮年停之法即裴光庭之循資格也於時為譏於今為用是亦烏可少哉觀亮與甥劉景安書亦以激於中正之弊而為此爾故格法創於魏科目興於唐皆所以救中正之弊也陳黯曰進士科目自漢至唐為擢賢真知言哉唐選舉之弊當唐之時言其選舉之弊一曰不求德行而第考文章之末藝以為非古薛登曰古之取士必考素行之原詢鄉曲之譽漢世求士亦觀其行碩文效試官武閲守禦劉嶢通鑑作劉曉上元元年國家以禮部為考試之門考文章於甲乙故天下驅馳於才藝不務德行楊綰請因古制縣令舉孝亷於刺史刺史升之禮部桞冕言文章之士不根教化進士以詩賦取不先道理明義以墨義考試不舉儒術選人以書考殿最不尊人物各有旨義著於史集以此知本者然而不考其所以變之之由則亦不足以為義也古者天子自治者王畿千里之外即為封建其王城二百里之外又責之都鄙之長則天子所治者六鄉六遂二百里之間耳當此之時四民皆世其業無越乎分守其比閭之民修其德行而書之鄉大夫者又非有後世驟貴峻拔之㙯固亦無所覬覦而其心術純一毀譽自不相冒鄉遂之官下視所𨽻伍伍相聯朝夕相習可以指數而心喻又不難乎考察下漢而郡國雜置然其僚佐皆自辟除常歲所貢率二萬口貢一人不過一二百人而止以天子之朝公卿之重一歲之久按郡國所推薦一二百人之賢否進退雖在數千里之外亦無難者自漢武稍稍裁抑侯國秩二千石不許擅授魏晉而降權益內移故有敕用州簿郡功曹者至於隋制則一命以上之官皆由朝授由是朝授歲選動以萬計而後世爵祿益貴奔競成習欲以無形之德行不可憑之毀譽人人察之而冀其有得豈不難哉魏之中正曷嘗不以德行為本而流弊之甚後代苦之要知封建不立世祿不行郡縣之權悉歸朝廷而欲效古貢士之常制不可得已故科目兆於漢興於隋著於唐而備於宋朝此誠擢賢之路也誠使收之以貢舉格之以法律而分置之朝廷與州縣嚴為考績之法而徐考其後豈不合於唐虞所謂敷奏以言明試以功之良法哉而奚遽不足以得其德行之實也哉又奚至於捨本而徇末也哉鄉評人之實行能掩於人之所不知而不能逃乎鄉黨之公議故古之論秀必本於鄉而漢之取士猶有鄉舉里選之遺意也武帝求賢良國人共推公孫𢎞以充賦萬石君家以孝謹聞郡國特以其子為郎中令一推兒寬則曰知之久矣一言蕭望之則曰此東海蕭生耶一薦襲勝則曰固已聞其名其令聞美譽固已素著於鄉而達於朝廷之上蓋如是其不可掩也至於酈食其家貧落薄縣中謂之狂生韓信家貧無行不得推擇為吏陳湯丐貸無節不為鄉里所稱公議之在鄉里昭昭乎不可泯沒安能掩其所不知而用之欺君哉是故能自持於鄉者然後州縣拔為幹佐曹吏能自立於州縣者然後五府辟為曹掾能自效於五府者然後朝廷所選用其初皆本於鄉里公譽也是以髙祖之初郡縣各置三老相帥為善而又設為孝亷之科以取士其殆有意於鄉舉里選之舊乎貢舉髙宗時劉祥道言歲入流千五百經學時務比雜色人三分不及一玄宗時楊瑒言流外及諸色仕者歲二千過明經進士十倍是唐科目取人不及雜色入流之衆也然唐取士之途又有二焉由學館曰生徒由州縣曰鄉貢而楊瑒言明經進士百人二監生千百數當選者十之二而得第者無幾是言生徒不及鄉貢也進士科不過三十人故社佑言進士得第者百一二明經者十一二是進士又不及明經多也生徒不及鄉貢進士不及明經明經進士又皆不及雜色入流此其選數之大凡也唐初貢舉屬之考功至開元移之禮部所謂主司皆有常人則既預知之矣不惟預知也亦可預謁之不惟預謁也亦可預托之貴者以勢托富者以財托親故者以情托此豈復有真貢舉哉故有因權勢以相傾奪如牛李之黨由於錢徽典舉之日至於互相磨軋者四十餘年於是又有畏嫌自私而矯時以為公者則有嫌於貴而不得舉者矣如韓退之之序齊皥是也有嫌於富而不得舉者矣如栁子厚與王參元書是也幸而不出於私則又不幸而入於矯夫其矯者必有所懲也故觀其矯而思其所懲之由則通榜取士弊且如此此唐名臣多由此出彼果何以致之耶豈其有徇私之弊而猶不失其收時望之利耶若夫崔羣之第緣梁蕭杜牧之第緣吳武陵李商隱之第緣令狐陶盧肇之第緣李德裕每每類此亦何惡於請托哉唐志謂進士尤貴得人亦盛唐志謂衆科之目進士尤貴其得人亦盛然嘗論之以唐貢舉之員數較之他流則狹矣以唐貢舉之條式較之今日則疏矣然而足以得人何哉曰儒科之重自唐始其狹且疏何尤焉而其流品之别公望之屬抑有自來故雖狹且疏而猶足以得人是儒科之所以重也韋貫之嘗言禮部侍郎重於宰相憲宗詰其故對曰為陛下柬宰相者得無重乎權德輿為禮部侍郎擢進士第者七十二而登宰相者十人其他征鎮兵牧文昌掖垣之選不可悉數則知其時待之之異選之之重有在於是而其奮然於事業為國名臣者多出於其間前世所無也杜牧言國朝自房梁已降有大功立大節者率多科第人也因歷數其人謂郝處俊來濟上官儀李元義婁師德張柬之郭元振魏知古姚元崇宋璟劉幽求蘇頲父子張説張九齡張巡裴度凡十九人皆文武全才傑然不世出者然牧所言及其時而止間猶有遺者以此見唐史得人之盛非虛語也漢科目漢之取士隨時設目蓋非一科其行之最久得人為多者在學校則有明經在郡國則有孝亷賢良茂才明經而已孝亷始於髙祖賢良始於孝文茂才明經始於武帝四者之科終漢之世不變而公卿大夫多由此途出然愚以為碩大宏博之材要非科目所能得限人以科目之選則其所得豈復有異才哉蓋明經止於藝以射策為甲乙非有深探聖人之旨賢良止於射策與時世為俯仰非有直言極諫之士鄭司農謂舉孝亷比於周之賓興舉茂才比於周之興能此又名似而實非也是以業明經者志在於取青紫應賢良者志在於貪權勢陳湯舉茂才有不奔父喪之罪徐淑舉孝亷而不能逃冒年之責以科目取士而得人若是其有卓然不羣出其中者特幸耳雖然漢猶不專倚於科目也鄉里有推譽之公州縣有辟除之選故士之修於鄉者雖不由科目以進而辟書踵門選拔州縣等而上之豈與科目之士同於擢用此後世之所未講也銓選漢無限年古者四十強而仕七十則引年而致仕故其未仕也用其半生為學而後可以入仕及其既仕則以三十年宣力於國而晚歲休致又足以自養其筋力故下無躁進而上無貪位漢世士大夫自少至老初未始有限也劉向以十二為輦郎陳咸以十八為郎貢禹之子年十二而元帝欲祿之其入仕不幾於濫乎劉辟疆以八十為衛尉公孫𢎞以八十為丞相充國以七十餘為將軍貢禹以八十一遷御史大夫是未至於老癃者皆可以綰綬於朝也平帝始平中龔勝漢邴以年老乞骸骨詔策遣之始有古者年至致仕不盡其力之詞後漢左雄議限年法四十以上始郡舉孝亷是二者俱有得於古人之意今制二十八仕七十致仕視漢世為得而所以致入仕之源者抑猶有可議者乎遷轉漢之遷轉惟上所命初不以品秩髙下為升降故士亦俯首聽命而莫敢有所請張釋之十年不得調揚雄三十不徙官至有為太僕立功自髙至文而猶未離乎舊職則何有淹滯若此也賈誼超遷歲中至太中大夫公孫𢎞徒步數年至宰相封侯王仲翁大將軍長史三歲至光祿大夫若此者又何其速也彼其黜陟進退雖未必皆當乎賢否而其用舍之權一出於我固未始有資格之拘然至於大臣不職去之可也收其印綬可也亦何至左遷他官以奪之哉孔光免丞相為博山侯久之復為光祿大夫位次丞相月餘為御史大夫未幾復為丞相以至韓安國蕭望之翟方進之徒皆以御史大夫為他官安國為中尉望之為太傅方進為京兆尹彼嘗執天子之政矣嘗正百官而統其權矣今一旦降尊就卑使其僚佐比肩而治事豈所以待大臣哉國朝體貌大臣之禮可為萬世法辟除漢選部有尚書自縣令以上始赴尚書調選張故其餘郡縣之屬吏至於公府之掾曹各自辟於其長其諸侯王國自內史以下亦皆得以自除是以朝廷無銓選之勞官府有薦賢之實賢否勤惰各察於其屬之長而黜陟之故幹佐曹吏拔於州縣者然後為五府所辟五府舉掾曹然後為朝廷所用推而至於公卿之尊初未始有限也故何武以大司空辟鮑宣為左曹掾史髙領尚書事而辟匡衡為議曹史此曹掾之辟於公府者也周景以刺史而辟陳蕃為别駕王渙以方城令而辟仇覽為主簿此屬之辟於郡縣者也是以士之修潔於家而聞譽達於朝廷往往辟書交至其門而無遺才此漢之選吏所以一付之公議而猶未至纎悉於法也今吏部注擬下自監宫管庫之流一切選之尚書其年勞資格而例以豫之若執契券而責債其主奚暇問其賢不肖哉選曹自隋一命之官皆授之朝廷州郡之官悉歸於吏部而唐承其制不能彌縫其闕更張其弊是以論者不滿焉唐之選法始於孟冬終於季春天下之士奔走於往來秋而往春而歸歸裝未解而選期又至是以遠者不能至貧者老者不能至至者不能歸此其患一也其選法與禮部無異自五品而外更歷之久亦不能免庸有顧重而不屑就者此其為患二也凡選無常員雖至者千百而授者不能什一則有出身二十年而不能祿者此其為患三也夫羣天下之士而決於一二有司之目察其貌言考其書判任公之吏力有所不逮容私之人亦何所不至至於請托縱橫姦偽百出無足怪也此其為患四也唐都長安每歲常輸江淮之運以足饋餉今也進士雜流動以萬集僕馬之數又倍於是匱耗地力孰甚於斯此其為患五也又其蒞官率以四考及其滿秩理年即還限以歲數乃得選集得失之際又不可必去位者顧戀有不忍之意居官者放縱無堅持之操此其為患六也凡此六患唐之諸臣極言其故而求所以革之之方皆以為莫如復漢辟舉之法而卒不能行漢初風俗猶古郡國守相得自辟舉中葉以後猜疑交作拜徙如流則既已不可行而况又其後乎夫不私於物物亦公焉不疑於物物亦誠焉今既郡守數易不如漢權任不如漢漢二千石下委之選除今以一命悉由廷授而獨於辟舉欲循漢舊不亦難乎夫自漢武以來極力以收郡國之權至隋而後盡豈其能一旦復散之耶故辟舉之法雖善非復唐所能行也宋朝循唐選法而六患自亡乃有任人不任法之患似直過云流品漢之用人不分流品視其材能􅈴績等而上之無有限格周勃以木強申屠以蹶張薛宣以書佐魏相以卒史皆致位丞相然其入仕之始等級次第亦自有品節存乎其間其以明經博學進者則多除博士或大夫侍中如嚴助朱買臣疏廣平當之徒是也其以材武勇猛進者則多除太僕或中郎將驂乘如夏侯英公孫賀衛綰之徒是也張湯以法律進身則先以法官處之始為內史後為廷尉皆法官也黃霸以入粟補官則先以財賦處之故始為卒吏後為均輸長皆掌財也雖其始有所分别而積功纍􅈴無不可任者也漢官所以未免乎雜也武帝始用儒者為宰相革去軍功刀筆之選誠可為一代之良法而其後惟意所用亦不專用儒生汲黯謂刀筆吏不可為公卿蓋有激而云終漢之世清濁混淆上下無别以宦官典領尚書以儒術直祕閣尚書郎掌代王言而以令史久次補之宜乎丁邯恥以孝亷而為郎也誠使漢之用人上至公卿而有限法則雖流品之不分何害哉雜流蕭何著試吏之法然諷書九千字以上者得為吏又賜六體書而課最者為尚書御史史書令史則為吏者因以諷誦字畫而為之矣至於太學選用文學掌故之士則有補左右內史鴻臚卒史者有補郡守刺史以至二千石屬者則胥吏之職固無間於清濁貴賤而為之也故兒寬以射策補廷尉卒史龔勝孫寶以明經為郡史路溫舒既為獄吏而又以通春秋舉孝亷薛宣朱博皆起於書佐察亷補令丞而終至於丞相則知漢之胥吏亦以功次遷選而無所限格也東漢有三公有長史有符掾今所謂堂後吏是也或主長吏遷除或主民户祭祀或主詞訟賊盜或主貨幣錢鐵或主倉庫郵驛或主卒徒轉漕或主奏議兵事皆以天下名士為之特以進仕之要而朱穆何敞班彪李膺之徒卒由此途進用一時俊彥萃於輔相左右其禆佐不既多乎今顧以為雜流使士大夫從事於此則必以為恥而不肯為矣銓選之制四選之法尚矣文武歸之吏部欲其合也文武别之左右選欲其分也文臣之升朝者尚書左選掌之初任幕職州縣官侍郎左選掌之武官之升朝者尚書右選掌之自副尉至從事侍郎左選掌之官之升朝者屬之尚書其次屬之侍郎此元豐之制也元豐以前曰審官東院則尚書右選也曰流內官曰三班院則侍郎之左右選也此元豐以前制也國初文臣屬中書武臣屬樞密使三班屬宣徽院所以然者蓋磨勘之制未立而敘遷之法不復舉文武百官非有勞者未嘗遷秩故舉而委之大臣有司無與焉自時厥後既分中書之權而置審官院矣則不得不分樞密之權而置審官西院既以宣徽所掌而歸三班院矣則不得不以幕職州縣考課而歸之流內銓所以然者蓋磨勘之法既立敘遷之法既舉其事繁浩非大臣所能專故必舉而委之有司之職此元豐所以總而歸之吏部也因四選之分合原四選之建置則本末可以見矣磨勘考課南曹之歷殿最必書御前之紙不及常事考課之法行之非一日矣然而始也其任在大臣其權在天子其後也其權在天子其任在有司又其後也天子不之問大臣不之與而有司之所謂考課者具文而已矣國初文臣屬之中書武臣屬之樞密宣徽天子視握其權而進退焉此考課之始也淳化間分中書之權而置審官院流內分宣徽之權而置三班雖曰移大臣之職而歸之有司然天子臨軒顧問猶有所謂黜陟者存焉此考課之一變也至其後也非時之恩沛一定之資歷迭為遷轉不復考校然或以天子之悔悟或以大臣之論薦猶未至盡委其權焉此考課之再變也又其後也既置審官西院又以其權盡委之吏部天子不加引對大臣不與參稽有遷進而無貶黜事權軟靡不可復收雖有司亦末如之何也已此考課之三變也噫變而至此極矣五代之除文武諸臣考滿則遷敘遷之法一代之弊政也而太祖革政能可旌也擢以不次無所稱者雖老不遷魏仁甫之羡利並命遷秩張之華之無聞至十六年不遷當是時在臣無私心天子無廢法曷嘗以資歷為遷進哉淳化中天子慮大臣之務未清而百官有司不及察也於是移其職而歸之有司雖曰磨勘一法有司主之然天子實為之進退焉故有遷轉者有貶黜者或引對而不改秩或供奉而至四十年不遷當是時天子嚴其法而有司不得容其情亦曷嘗有遷敘之弊哉至於真宗仁宗憫臣子之久次示一時之寬恩或以磨勘而進秩或以考課而進秩雖足以明仁心之形而不足以盡賢否之實然考課之際第以久次遷秩非勸沮之道天子猶知悔悟也悔悟則革之矣文資三年一遷武職五年一遷不問勞逸賢不肖並進大臣猶加論列也論列則從之矣又况考覆引對此制未嘗缺焉其敘遷之弊亦豈如是之甚哉熙寧以來其權委之吏部上之人無與焉吏部既用格法不必銓量官秩則計歲月久而遷轉差遣則視資次髙下而指射賢否混淆莫此為甚而後祖宗之良法廢弛無餘矣噫始者慮考察之不精而委之有司今也慮考察之自勞而委之有司夫既視為有司之事則朝廷不過奏鈔畫聞而已於所重也而輕之祖宗之意安在哉然則如之何曰擇之以主判之官而委之以銓選之權庶乎其可矣天下之事惟專其任而後可以重其責昔唐德宗命陸贄擇常參官陸贄不從齊抗不遣官考吏部謂非任人不疑之道為今日計盍亦專政部之任而重吏部之責乎昔蘇公紳請擇主判付以事事責成選事誠格言也誠使權衡不欺如王質所判以衡鑑自任如文潞公所言則人不敢欺誠使揭科條如魯宗道榜資闕如趙及銓事悉自豫奪諸吏聽行文書如杜祁公則人不容欺得人若是雖無法可也若觀其事而不知名實聽其言而不知好惡見其容而不知其厚薄不察所舉而不知所豫凡所注擬徒使吏挾法於前曰某人於法在所取某人於法在所後無所可否惟法之為聽則寧不有愧於先正彭公之言也哉羣書考索續集卷三十八
