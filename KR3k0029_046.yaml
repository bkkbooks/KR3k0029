body:
  text: 羣書考索卷四十六宋章如愚撰禮器門鼎類牛鼎牛鼎受一斛天子飾以黄金諸侯飾以白金口徑底徑及深倶一尺五寸三足如牛毎足上以牛首飾之羊豕二鼎亦如之此所謂周之禮飾器各以其類之義也羊鼎羊鼎受五斗大夫亦以銅爲之無飾今謂大夫祭用少牢故無牛鼎口徑底徑俱一尺深一尺一寸豕鼎豕鼎受三升口徑底徑皆八寸深九寸強士以鐵爲之無飾今謂士祭用特牲故無羊鼎案聘禮云牢鼎九設于西階前九鼎者牛一羊二豕三魚四腊五腸胃同鼎六膚七鮮魚八鮮腊九設局幕今惟牛羊豕三鼎各自象其形自魚腊已下並無其制以其物之細雜無所象故也鼎羃按禮記器用圖云冪者若束若編凡鼎冪盖以茅爲長則束本短則編其中央伏羲鼎昔㤗帝伏羲作神鼎黃帝鼎黃帝作寳鼎三象天地人封神獲寳鼎史記黃帝本紀獲寳鼎迎日推䇿禹九鼎左傳宣公三年定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在德不在鼎昔夏之方有德也遠方圖物貢金九牧鑄鼎象物百物而爲之備使人知神姦故民入川澤山林不逢不若魑魅魍魎莫能逢之協于上下以承天休桀有昏德鼎遷于商商紂暴虐鼎遷于周成王定鼎于郟鄏卜世三十卜年八百天所命也晋賜子產方鼎昭七年晉侯有疾夢黄熊入於寢門因子產為聘而問之對曰昔堯殛鯀于羽山其神化爲黄熊入于羽淵晉其未祀之乎韓宣子祀夏郊而晉侯疾有間賜子產莒之二方鼎莒所貢也正考父鼎昭七年孟僖子云孔邱聖人之後而滅於宋其祖弗父何以有宋而授厲公及正考父佐戴武宣三命兹益恭故其鼎銘云一命而僂再命而傴三命而俯漢汾隂寳鼎漢武元鼎元年夏六月汾隂巫錦錦巫名爲民祠魏雎后土營旁見地如鉤狀掊視得鼎鼎大異於衆鼎文鏤無欵識怪之言吏吏告河東太守勝勝以聞天子使驗問巫得鼎無奸詐廼以禮祠迎鼎至甘泉從上行薦之至中山晏温有黃雲焉有鹿過上自射之因以之祭云至長安公卿大夫皆議尊鼎天子曰閒者河溢歲數不登故廵祭后土祈爲百姓育穀今年豐楙禾報鼎曷爲出哉有司皆言聞昔泰帝興神鼎一一者一綂天地萬物所繫象也黄帝作寳鼎三象天地人禹收九牧之金鑄九鼎象九州皆嘗鬺享上帝鬼神其空足曰鬲以象天德饗承天祐夏德衰鼎遷于商商德衰鼎遷于周周德衰鼎遷于秦秦德衰宋之社亡鼎廼淪伏而不見今鼎至甘泉以光潤龍變承休無疆合兹中山有黃白雲降盖若獸爲符路弓乗矢集獲壇下報祠大享唯受命而帝者心知其意而合德焉鼎宜視宗禰廟藏於帝庭以答明應制曰可於是改元爲元鼎后土祠旁寳鼎元鼎四年十一月甲子立后土祠于汾隂睢上六月得寳鼎后土祠旁作寳鼎之歌漢美陽鼎宣帝時美陽得鼎有司議多以爲宜薦見宗廟如元鼎故事張敞好古文字按鼎銘刻而上議今鼎出於郊東并有刻書曰王命尸臣官此􅀈邑賜爾旂鸞黼黻琱弋尸臣拜手稽首曰敢對揚天子丕顯休命此殆周之所以褒賜大臣子孫刻銘其先功藏之于宗廟也不宜薦見宗廟上曰京兆議是漢王雒山寳鼎東漢永平六年二月王雒山出寳鼎廬江太守獻之南單于遺竇憲古鼎南單于遺竇憲古鼎容五升其旁銘曰仲山甫鼎其萬年子子孫孫永保固憲乃上之時竇憲正登燕然功也鼎之器於象爲備鼎之齊於金爲多下有足上有耳有鼐以覆之有鉉以舉之詩稱鼐鼎及鼒爾雅曰鼎絶大者謂之鼐圜弇上者謂之鼒附耳外謂之釴欵足謂之鬲士虞禮有上鼎中鼎下鼎有司徹司馬舉羊鼎司士舉豕鼎魚鼎則鼎之體有大小侈儉之别而用有羊牛豕魚之異天子諸侯有牛鼎大夫有羊鼎士豕鼎魚鼎而已上得兼下下不得兼上則鼐鼎特王有之也然所謂陪鼎羞鼎皆鉶鼎也鉶鼎所以實羮者也鉶羮所以具五味者也自羮言之曰鉶自器言之曰鉶鼎也其陪正鼎曰陪鼎以其爲庻羞曰羞鼎其實一也陳禮書總論或曰膳夫王日一舉鼎十有二掌客諸侯之禮鼎亦十二聘禮飱饔之鼎又復不同葢聘禮掌客陳鼎也王之日舉食鼎也王食九鼎而陪鼎三公食大夫七鼎而鉶鼎四掌客上公鉶四十有二侯伯鉶二十有八子男鉶十有八盖公食大夫之鉶多於王日舉以公食者衆故也周禮天子籩豆各六十而禮器云天子之豆二十有六諸公十有六諸侯十有二上公八下大夫六此豆數不同也禮器用數也嘗客陳數也春秋時鄭享楚子加籩豆六品晉享季孫宿有加籩葢古者籩豆有加者皆所以優尊也掌客設飱公侯伯子男簋同十二公簋十侯伯簠八子男簠六公食上大夫之簋八聘禮諸侯使卿相問之禮堂上之簋十二加豆六設飱之簋十有四加豆四數皆多於君此簠簋之數既已不同而又詩天子之禮只陳饋八簋乃何耶禮書曰掌客公食上大夫之簋有所陳者存焉天子八簋則其所食者也醯人醢人王舉則皆供六十甕其掌客設甕餼之時上公之禮醯醢亦百二十甕得與王同何哉説者曰周惟二王之後及魯爲上公耳天子所以尊周公與二王後也其餘則侯伯而已聘禮致甕餼於賔乃子男之卿也其醯醢百甕米百莒而掌客侯伯甕莒百子之甕莒八十耳此卿大夫之禮乃得過其君又何哉正義曰掌客君禮也上下爲差此乃臣禮或多或少自是一法不可以相兼也以是言之天子待諸侯五等之序不可易也聘禮則鄰國通好之禮不可以常法拘盡其情而已宗廟之制聖人所以追求先祖之神靈庶幾得以享之以安䘏孝子之志也於是以思其生平起居飲食之際而設其器用薦其酒食皆從其生以冀其来而安之而後世宗廟之祭皆用三代之器則是先祖終莫得而安也盖三代之時席地而食是以其器用各因其所便而爲之高下小大之制今世之禮坐於床而食於床上是以其器不得不有所變雖使三代聖人生於今日用之亦將以為便安故夫三代之視上古猶今之視三代也三代之器不可復用矣寳璽類周禮掌節貨賄用璽節職金掌凡金玉錫石丹青之戒令受其入征者辨其物之媺惡與其數量揭而璽之左傳曰季武子取卞使公冶問襄公璽書追而與之璽杜注璽印也秦璽秦以印稱璽以王不通臣下用制乗輿六璽曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽又始皇得藍田白玉爲璽螭虎劔文曰受天之命皇帝夀昌韍佩既廢乃以采組運結於璲光眀章表轉相結受故謂之綬漢舊儀曰璽皆白玉螭虎紐文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子之信璽凡六璽衞宏漢舊儀曰諸侯王印黄金槖駝紐文曰璽列侯黄金印龜鈕文曰印丞相將軍黄金印龜鈕文曰章中二千石銀印龜鈕文曰章千石六百石四百石銅印龜鈕文曰印漢高帝入關得始皇白玉璽佩之曰傳國璽與斬蛇劔倶爲乘輿之寳後周漢帝八璽有神璽有傳國璽唐符寳郎掌天子八寳及國之符節釋名曰印信也説文曰執政所持信也孫堅得傳國璽方圍四寸上有鈕文盤五龍然則漢天子之璽其方不過四寸諸侯王以下其小又可知也唐八璽唐志天子有傳國璽及八璽皆玉爲之神璽以鎮中國藏而不用受命璽以封禪禮神皇帝行璽以報王公書皇帝之璽以勞王公皇帝信璽以召王公天子行璽以報四夷書天子之璽以召兵四夷皆泥封大朝會則符璽郎進神璽受命璽于御座行幸則合八璽五􅓅函封從於黄鉞之内初太宗刻受命元璽以白玉爲螭首文曰皇天景命有德者昌唐承天大寳武后改諸璽皆爲寳中宗復位復為璽開元六年復爲寳天寳初改璽書爲寳書十載改傳國寳爲承天大寳唐天寳天子之寳八一曰神璽二曰受命寳三曰皇帝行寳四曰皇帝之寳五曰皇帝信璽六曰天子行寳七曰天子之寳八曰天子之信寳宋朝寳璽舊制乘輿六璽唐改爲寳唐末䘮亂或亡失周廣順中始造二寳曰皇帝承天受命之寳皇帝神寳太祖受命傳其二寳至太宗又製承天受命之寳用玉篆文每朝會陳于御座前大禮即列于儀仗中真宗即位至道三年中書門下言皇帝受命寳請以皇帝恭膺天命之寳爲文詔可祥符元年五月五日因封禪詳定所言置天下同文之寳用於封禪昭受乾符之寳以印青詞帝以奏章上帝承前皆用御前之寳理亦非便故改用乾符之寳既成於天禧元年十二月十八日召輔臣於滋福殿觀之仁宗慶厯八年以天禧昭受乾符之寳經大内火焚毁於是詔令刻皇帝欽崇國祀之寳而陳執中書之皇祐五年帝謂輔臣曰奉宸庫有良玉廣尺而厚半之葢希代之珍也不欲以爲服玩且天子八璽其一曰神璽遂令参知政事梁適撰名作鎮國神寳宰臣龎籍篆文参知政事劉沆書牌而刻之印綬類周制天子佩白玉而𤣥組綬公侯佩山𤣥玉而朱組綬大夫佩水蒼玉而緇組綬世子佩瑜玉而綦組綬士佩瓀玫而縕組綬玉鎮圭長尺有一寸大圭長三尺杼上終葵首繅籍五采五就以朝日公執桓圭九寸侯執信圭伯執躬圭皆七寸繅皆三采三就子執穀璧男執蒲璧繅皆二采再就以朝覲宗遇會同于王凡圭天子用全上公用龍侯用瓚伯用將漢官儀曰綬者有所承受之也所以别尊卑彰育德呂忱字林曰綬紱也黨巴輿服志曰戰國解去紱佩留其絲禭以為章表秦乃以采組連結於禭光眀章表轉相結綬故謂之綬漢諸侯百官綬印凡分五等諸侯王金璽盩綬丞相太尉金印紫綬比千石以上銀印青綬比六百石以上銅印黑綬比百石以上銅印黄綬亦有無印綬者此有别也朱博之刺冀州也使從事明勑告吏民欲言縣丞尉者刺史不察黄綬各自詣郡欲言二千石長吏者行部還詣治所然則黄綬葢縣丞尉之属而黑綬則長吏二千石是已凡除官受印綬而佩之遷官上印綬而易之兼官累印綬而服之免官解印綬而歸之張奐自謂前後仕進十要銀艾十要者一官一佩之云爾此除官者受印綬而要之也元帝策蕭望之曰今使光禄惲䇿詔左遷君為太子太傅授印其上故印使者策望之雖左遷然以是知遷官必上故印矣此遷官者上印綬而易之也武帝謂楊僕懐銀黃垂三組夸鄉里盖僕爲主爵都尉又爲樓船將軍又封將梁侯故言三組此兼官者累印綬而服之也石慶爲丞相封侯乞骸骨則請歸丞相侯印此免官者解印綬而歸之也符節類節節之爲物或以玉或以角或以金或以竹或用以守或用以使或用以民周官掌節所掌者八玉節也角節也虎節也人節也龍節也符節也璽節也旌節也小行人之所達者六虎節也人節也龍節也旌節也符節也管節也掌節守邦國者用玉節守都鄙者用角節此用以守者也山國用虎節土國用人節澤國用龍節皆金爲之此用以使者也門關用符節貨賄用璽節道路用旌節皆有期以反節此用於使與民者也析竹為符節全竹爲官節小行人有官節而掌節無之者掌節所掌謂之邦節以輔王命則所謂邦國之使節使邦國者所執也小行人所達謂之天下之節則所謂龍節人節虎管節邦國都鄙使者所執非王官所掌也掌節無都鄙之使節以使都鄙者無節持以旌節行之也小行人無璽節以其所掌者使節而貨賄之事不預也然節不特八節六節而已典瑞珍圭以證守以恤凶荒牙璋以起軍旅琬圭以治德以結好琰圭以除匿以易行穀圭以和難以聘女鄭氏皆以爲王使之瑞節則珍圭牙璋琬圭琰圭使者爲信於所適者也龍節虎節人節符節旌節行人爲信於道路者也調人凡和難弗辟則與之瑞節而以執之比琰圭耳則琰圭不特施於使者民亦與之耳書康誥曰越小臣諸節春秋之時宋司馬握節以死司城效節於府人而去司馬牛致其邑與圭而適齊則守節不特於邦國都鄙雖官府小臣亦有之也考工記牙璋穀圭七寸琬圭琰圭九寸漢竹使符竹箭五枚長五寸然則先王之節其長亦不過於此若夫旌節之制又加長焉觀蘇氏之杖節則非以寸計之也漢竹使符銅虎各分其半右㽞京師左付郡國唐符璽節凡國有大事則出納符節班其右而藏其左先王之節其班藏葢亦如此然與老子曰執左契不責於人則藏其右者非是陳禮書漢銅虎符竹使符孝文二年九月初與郡守爲銅虎符應劭曰銅虎符第一至第五國家當發兵遣使者至郡合符符合乃聴受之竹使符皆以竹箭五枚長五寸鐫刻篆書第一至第五張晏曰符以代古之圭璋從簡易也師古曰與郡守爲符者謂各分其半右留京師左以與之蘇武漢節天漢元年且鞮侯單于初立盡歸漢使武帝嘉其義廼遣蘇武以中郎將使持節送匈奴使留在漢者會緱王與長水虞常等謀反事覺併欲降蘇武不肯屈徙武北海上使牧羝武杖漢節牧羊卧起操持節旄盡落唐大將旌節唐制大將出賜旌以專賞節以專殺旌以絳帛五丈粉畫虎有銅龍一首纒緋播紫兼爲袋油囊爲表節垂畫末盤三相志數寸偶垂赤麻餘與旌同唐銅魚符銀莬符高祖初爲唐王二年四月辛巳停竹使符班銀莬符武徳元年九月癸丑改銀莬符爲銅魚符唐交魚符廵魚符唐制呂殿門交魚唐符廵魚符左廂給開門符閉門符亦左符進内右符監門掌之唐傳信符以給郵驛唐雙龍符麟符唐制命皇太子監國給雙龍符左右皆十兩京都留守給麟符左二十右十九唐青龍符朱雀符騶虞符𤣥武符唐制東西諸州給青龍符南方諸州給朱雀符西方諸州給騶虞符北方諸州給𤣥武符皆左四右三左者進内右者付外行軍所亦給之唐木契符木契符者以重鎮守謹出納畿内三畿外五皇帝廵幸太子監國有軍旅之事則用之王公征討皆給焉左右各十九太極殿前刻漏所亦以左契給之晝夜勘合然後鳴鼔𤣥武門苑内諸門有喚人木契左以進内右以授監門有勑召者用之唐玉契唐制皇太子以玉契召勘合乃赴親王以金庶官以銅皆題某位姓名官有貳者加左右皆盛以魚袋三品以上飾以金五品以上飾以銀刻姓名去官納之不刻者傳佩相付英簜淮海惟揚州厥貢惟金三品瑶琨篠簜書禹貢竹濶節曰簜上文疏掌節掌凡邦國之使節山國用虎節土國用人節澤國用龍節皆以英簜輔之禮地官簜當為帑謂以函器盛此節或曰英簜畫函上文注符節令注周禮節有虎節龍節皆金也于寳注曰漢之銅虎符則其制也周禮又曰以英簜輔之于寳曰英刻書也簜竹箭也刻而書其所使之事以助三節之信則漢之百使符者亦取則於故事也後百官志刀劔類呉粤之劔遷乎其地而弗能爲良地氣然也禮冬官子路戎服見於孔子抜劔而舞之曰古之君子固以劔自衞乎家好生周穆王征西戎西戎獻錕鋙之劒列湯問大冶鑄金金踊躍曰我且必爲鏌鋣大冶必以爲不祥之金莊大宗師桓公之葱太公之闕文王之録莊君之胷闔閭干將莫邪鉅闕辟閭皆古之良劔也然而不加砥礪則不能利荀性惡秦昭王曰吾聞楚之鐵劔利而倡優拙范睢傳肅宗賜諸尚書劔自手書其名曰韓稜楚龍淵郤壽蜀漢文陳寵濟南椎成時論者爲之説以稜淵深有謀故得龍淵壽明達有文雅故得漢文寵質樸善不見外故得椎成後陳寵𫝊雷煥曰斗牛之閒頗有異氣寳劔之精上徹于天耳張華曰在何郡煥曰在豫章豐城華補煥爲豐城令煥掘獄基得雙劔並刻題一曰龍泉一曰太阿遣使送一劔與華留一自佩晉張華傳越王允常聘歐冶子作名劔五枚一曰純鉤二曰湛盧三曰豪曹或曰磐郢四曰魚腸五曰鉅闕秦客薛燭善相劔王取豪曹鉅闕魚腸示之燭皆曰非寳劔也取純鉤示之燭矍然望之曰光乎如屈陽之華沈沈如芙蓉始生於湖觀其文如列星之芒觀其芒如水之溢塘觀其色渙如氷將釋見日之光此純鉤也此劔者可以折衝伐敵呉越春秋闔閭使干將造劔二枚一曰干將一曰莫耶同上楚王召風胡子而問之曰聞呉有干將越有歐冶子願請此二人爲鐵劔可乎風胡子見歐冶子干將使之爲鐵劍三枚一曰龍淵二曰太阿三曰工市越絶書釋名曰劔撿也所以防撿非常也按管子曰昔葛天盧之山發而出金蚩尤受而制之以爲劔鎧此劔之始也周官桃氏爲劔臘廣二寸有半寸臘謂兩刄音獵兩從半之劔脊兩面殺起鍔者以其臘廣爲之莖圍長倍之莖謂劔夾人之握鐔以上中有莖設其後謂從中以却稍大之身長五其莖長重九鏘音刷謂之上制上士服之身長四其莖長重七鋝謂之中制中士服之身長三其莖長重五鋝謂之下制下士服之其後楚有龍泉秦有太阿工市呉有干將鏌耶属鏤越有純鉤湛盧豪曹魚腸巨闕諸劒漢有高祖斬蛇劒漢書魏有文帝飛景流彩華鋒三劔見典制呉有白虹紫霓辟邪流星青㝠百里六劔見崔豹古今注皆陸斷馬牛水擊鴻雁當敵則斬於甲盾戰國策曰韓卒之劔皆出於㝠山棠谿墨陽宛馬龍泉太阿皆陸斷馬牛水擊鴻雁當敵斬於甲盾耳此天下名器也見列子古者天子二十而冠帶劒諸侯三十而冠𢃄劔大夫四十而冠𢃄劔隸人不得冠庶人有事得𢃄劔無事不得𢃄劔見賈子禮之所興也劔之在左青龍象也刀之在右白虎象也見春秋繁露舊制上公九命則劔履上殿儲君禮均群后宜劔舃升殿或云漢魏儲君制不納舃則知劔履上殿久矣漢儀諸臣𢃄劔至殿階解劔晋世始代之以木貴者猶用玉首賤者用蚌金銀玳瑁爲雕飾見周遷輿服雜事凡劔口謂之鐔見呂静韻集鼻謂之彘見宗林鞘謂之室見方言韜謂之衣博物子產如晉問疾叔向問實沈臺駘何神也子產曰實沈參神也臺駘汾神也晉侯聞之以爲博物君子魯僖公時介葛廬来朝聞牛鳴曰是生三犧皆用之矣襄公時晉綘縣老人不知紀年云生之歳正月甲子朔四百四十五甲子矣吏問諸朝師曠曰魯叔仲惠伯㑹郤成子于承匡之嵗也七十有三年矣史趙曰亥有二首六身下二如身是其日數也士文伯曰然則二萬六千六百有六旬也昭五年晉叔向如楚王欲敖叔向以其所不知而不能亦厚其禮其後楚靈王與右尹子革語曰左史倚相能讀三墳五典八索九丘子革曰臣問祈招之詩而左史倚相不知若問遠焉能知之穆王周行天下祭公謀父作祈招之詩子革能誦其詩左傳魯季桓子穿井獲如土缶其中有羊使問于孔子子曰羊也木石之怪䕫蝄蜽火之怪龍罔象土之怪羵羊也呉伐越堕會稽獲巨骨一節專車焉呉子使聘魯問孔子子曰禹致羣臣於會稽之山防風後至禹殺而戮之其骨專車焉此爲大矣孔子在陳有隼集于陳侯之庭而死楛矢貫之石砮其長尺有咫惠公使人問孔子子曰此肅慎氏之矢昔武王通道九夷八蠻使各以方賄來貢於是肅慎氏貢楛矢石砮古者分異姓以逺方職貢故分陳以肅慎氏矢焉楚昭王渡江江中有物大如斗赤如日王問臣莫之識使人於魯問孔子子曰此萍實也可剖而食之吉祥也叔孫氏之車士曰子鉏商採薪而獲一角獸焉叔孫以爲不祥棄之子觀之曰麟也曷爲来哉取之魯定公問顏回曰子聞東野里之善御乎曰其馬必佚以政知之舜巧於使民不窮民力造父巧於使馬不窮馬力令東野之御馬力窮矣必佚家語漢成帝時犍爲郡於水濵得古磬十六枚議者以為善祥劉向説興辟雍漢志晉荀朂造鍾律武帝以其與周漢器合故施用之阮咸病其聲高後掘地得古銅尺歲久欲腐不知出何代果長朂尺四分時人服之時有人於嵩高山下得竹簡一枚上兩行科斗書莫有知者張華以問束晢晳曰此漢眀帝陵中策文也檢之果然當時天下奇秘者悉在華所由是博物洽聞強記默識四海之内若指諸掌武帝嘗問漢宮室制度及建章千門萬户華應對如流時人比之子產華又撰博物志十卷采録雜説異聞名類不一而足館閣書目魏崔浩博覽經史無不該盡帝將討河西王李順以其地無水草軍難久停浩曰漢地理志稱涼州之蓄爲天下饒若無水草何以畜牧後果如浩言本傳宋時雍州有盜發古塜者相傳是楚王塜獲王履玉屏風竹簡書青絲綸簡廣數分長二尺皮節如新以示僧䖍云是科斗書考工記周官所缺也本傳張永嘗開𤣥武湖過古塜得一銅斗有柄文帝訪朝士承天曰此新室斗也于時三公亡皆賜之一在冡外一在内三公在江左者惟甄邯爲大司徒俄而啓塜内有石銘果然本傳隋蘇威好古物鍾鼎什物珪璽錢貝必具文中子曰古之好古者聚道今之好古者聚財唐時有僧言得佛齒所擊前無堅物傅奕曰吾聞有金剛石者性堅物莫能傷惟羚羊角能破之出角叩之即碎調露中李嗣真爲太常缺黄鍾鑄不成嗣真居崇業里疑土中有之弗得其所道上逢車鐸聲甚厲曰宮聲也歸以振於空地若有應者掘之得鍾衆樂遂和唐書云楊收耕涔陽獲古鍾高尺餘扣之曰此姑洗角也驗其刻果然收本傳宋朝長安於壞塜得古銅鼎狀方而四足古文十六字人莫曉命勾中正辨其篆曰此鳥跡文也又命杜鎬考其事曰武王都酆鎬平王東遷以岐酆之地賜秦哀公篆曰岐陽錫公必秦哀之墓也後得折碑果然歐陽公集古録序曰凡物好之而有力則無不至也湯盤孔鼎岐陽之鼓岱山鄒嶧會稽之刻石與夫漢魏以来聖君賢士桓碑彞器銘詩序記下至古文籀篆分隸諸家之字書皆三代以来至寳怪奇偉麗工妙可喜之物然而風霜兵火湮淪磨滅散棄於山崖墟莽之間未嘗收拾者由世之好者少也予性嗜古故上自周穆以来下更秦漢隋唐五代外至四海九州名山大澤窮崖絶谷荒林破塜神仙鬼物詭怪所傳莫不皆有以爲集古録總論君子恥一物之不知張蒼徐岱皆號無所不通徐廣杜夷皆號爲畢究百家裴秀賀循栁公權李百藥張廵之輩㒺不研究而當世又以骨那律爲九經庫商踐猷爲五總龜此則博學以通古今者也杜延年備於事蔡邕識於漢儀李太師知南北之舊事蔣文眀前代之沿革王彥威淹識古今苗晉卿練達事宜其通典故有如此者張敞以古文按羨陽之鼎賈逵以博物爲神雀之頌杜預裴頠有武庫之號于寳有鬼董狐之稱荀公識味於勞薪束晢解疑於曲水禇遂良飛雉之對盧若虛鼨鼠之辨其多聞有如此者張安世記亡書三箧應奉對四座數千王伾覽染簿不失尺寸虞世南按寫列女於屏風王充荀恱李邕之徒皆一覽而能記此則不待學力而能議犧尊之形辨阮咸之器識琅琊之稻悟紬絡之灰此則以學而後知者也辨騶牙如東方曼倩眀漢鼎如吾丘夀王武平一以經折崔佑甫栁子厚以天説屈劉禹錫以至序羽陵科斗之書歌岐陽石鼓之什杜征南韓吏部輩類能備道其事未央鍾不擊自鳴東方朔能知其應三豕渡河子夏能知其非周樂及舞季子能言其義太史公稱延陵季子爲博物君子羣書考索卷四十六
