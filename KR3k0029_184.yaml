body:
  text: 羣書考索續集卷五十三宋章如愚編君道門堯舜傳賢帝堯不授於子而授於舜大舜不傳於子而𫝊於禹葢恐失道而民去矣是知親一子者不能子兆民成一家者不能家六合聖人之用心也如是王元之進賢退不肖堯不問洪水而明俊徳舜不問鳳凰而去四㓙俊徳不明無洪水不免於亂四㓙不去有鳳凰何益於治張九成授受出於天人皆曰堯以天下與舜舜以天下與禹孟子曰不然天與之也人皆曰堯以道授舜舜以道授禹董氏曰不然天之道也姚子才未甞以遜揖為髙堯舜之事布在天下若禮樂若法度若征伐若巡狩若歴試若揖遜皆因理之固然本未甞置輕重於其間也則所謂揖遜者特堯舜萬事中一事耳世俗指其一事為髙而忽其餘事為常者無他焉彼自見其捐一金之難而駭堯舜忘天下之易遂誇大以為至高之節矯情而效之噫堯舜之揖遜堯舜曷嘗自知其高哉以世俗之心度之則髙耳然則非特幽囚野死之毁為以利心量聖人也誦堯舜以揖遜為髙者正所謂以利心量聖人也吕祖謙不得已而發道之秘昔者堯以是道而𫝊之舜則曰中舜以是道而𫝊之禹則亦曰中中果何物耶意者堯不免於强名而舜不過於循襲也夫强名以言道循襲以語人非意也勢也河洛出矣八卦具矣而中之名未立也雖言之可也堯之命舜自中之外則無説而舜則有曰人心也道心也危㣲精一也營營然若慮夫擇之者不精也其語之者不詳也其守之者不固也繼而曰無稽之言勿聽也弗詢之謀勿庸也吁强名而言中亦既贅矣而奚至於是哉吾固悲夫舜時之不逮乎堯也自舜有執中之説精一之說然後有吾道一貫之說有喜怒哀樂未發之說已而為性善性惡之説為善惡混之説而道始離矣嗟夫堯固憂乎後世之不知中也而中之名立舜固慮夫後世之失中也而精一之說立二說立而後世之説卒以窮吾又悲堯舜之不得以歸乎其天也同上敬天天地萬物皆吾體也惟聖人不為私意小智所間全體渾然大而無際一星一雲之祲一川一草之變歴然如疾痛之在身無不知其所自起錙錙銖銖不紊不亂豈若後世之汙漫者哉是聖人厯象在身而不待羲和之厯象璣衡在身而不待璿玉之璣衡也然堯不信已而信厯象舜不信已而信璣衡豈所謂制行以人不以己耶非也身有厯象而不廢羲和之厯象堯之所以為堯也身有璣衡而不廢璿玉之璣衡舜之所以為舜也吕祖謙急先務古今言天下之治者必曰堯舜及觀堯舜之所以治天下者則不能無疑焉博施濟衆治之大者而夫子以為猶病知人安民係於治體亦不小耳而禹則曰惟帝其難之夫舍是數者則堯舜殆将芻狗百姓草芥天下而後可堯舜固不能恝然於此然則禹與夫子果何見而云葢嘗思而得其說博施濟衆知人安民堯舜非不為而寔未嘗一一而為之一一而為之則堯舜誠以為難且病於緩急先後而審處之則凡是數者葢有不為之為者矣難與病豈所患哉樂言洪水滔天下民昏墊四岳不以是而儆堯堯乃以是而咨四岳㓂盗奸宄蠻夷猾夏臯陶不以是而戒舜舜乃以是而命臯陶古人樂言如此與人同以名求之則開闢以來一堯舜也不强合其無而求得其所有則堯舜性仁仁即堯舜也堯舜之道孝悌孝悌即堯舜也堯舜非堯舜而仁與孝悌所以為真堯舜則其八骸九竅而目之以人者皆勛華之徒也漢武之欲参堯舜思以此而合彼者也唐太宗之欲輩堯舜思以此而齊彼者也堯舜與我本自一體参之輩之則一而二矣知有堯舜而不知所自有之堯舜則與不知者一律鄭鑑堯舜非度跡聚五帝徳規三王者有堯舜焉言常道尼父首之於書大一統馬遷列之為紀釋云堯舜諡也翼美𫝊聖曰堯仁聖盛明曰舜愚嘗攷世系之端辨質文之變頗疑是說請試明之夫謚法著於周公葢三代之際世有辟王嗜音酣酒荒禽冒色者有之飾非愎諌者有之剖忠害賢者有之欲使聞美號而知勸見惡謚而思懼垂易名之典為觀行之則此周公之制也豈以周制而逆觀堯舜之世耶且堯典曰有鰥在下曰虞舜當羣臣舉善之初釐降試難之事未顯賓門納麓之功未著安有對萬乗而不稱其名在仄陋而先定其謚哉斯固知其不然也明矣余元度不言而信吾觀典謨所載葢數千語不啻也而未嘗有一語令乎民且堯舜非愚乎民也知民之不可以吿語令也以天下之大而傳之人前此未聞也而堯徑行之不吿也已而薦之天暴之民而謳歌訟獄者自來也諸侯朝覲者自至也堯舜非期之而使㑹約之而使同也無他孚焉而言言焉而孚是以未施信於民而民信之也吕祖謙善處大事湯武附昔堯舜以天下與人而無人徳我之望湯武有人之天下而無我取人之嫌是故天下無大事我不能大則以事為大而處之也難胡安國不徇一人之好惡巢由不受堯禅堯舜不害為至徳夷齊不食周粟湯武不害為至仁東坡修己用人兩難舜自修於畎畆之中而聞於堯此舜之難也舜在畎畆之中而堯聞之此堯之難也司馬光四㓙之用舍皆是四㓙雖惡在堯之時實参衆議何舜之初遽加譴責也葢感移之機切於反已之嚴而激勵之意出於望人之厚往之不去也知此理乃人心同然也感而移之安知其果怙終乎今也之不能不罪得其心無復此理之當然也激而勵之或者還其天理之一助乎外天下堯舜之於天下得之不謝去之不留倘然受之人不以為無故之獲洒然釋之人不以為好異之過不輕絶人堯之滅鯀也必至於九載績用弗成之後舜之滅庶頑也必在於侯明撻記之餘聖人之心不忍棄人於為惡也必涵容之寛假之教誨之徐之以須其變不得已而後棄之無不通之情昔者堯舜之世一俞一吁一都一咈而君臣之間無遺情諌於鼓謗於木而君民之間無遺情瞽誦詩諌工誦箴諌士傳言庶人謗而幽隐微賤悉無所不用其情大抵誠意浹洽而勢不扞格法理濶踈而人不自欺石宗昭堯常變兩盡堯典大意先言堯盡天下之常自疇咨以下言堯處天下之變葢堯朝無非君子而有小人是變也堯朝無非休祥而有洪水是變也既盡常又盡變而堯之責塞矣吕東萊修身齊家治國平天下明俊徳者修身之事親九族者齊家之事所謂身修而家齊也九族既睦平章百姓所謂家齊而國治也百姓昭明協和萬邦黎民於變時雍所謂國治而天下平也真徳秀刑賞忠厚當堯之時臯陶為士將殺人臯陶曰殺之三堯曰宥之三故天下畏臯陶執法之堅而樂堯用刑之寛四岳曰鯀可用堯曰不可鯀方命圮族既而曰試之何堯不聽臯陶之殺人而從四岳之用鯀也然則聖人之意葢亦可見矣書曰罪疑惟輕功疑惟重與其殺不辜寜失不經烏乎盡之矣蘇軾以舉相去凶明舜於天下昔者堯之將授舜也一旦以天下之大而加諸側㣲之人懼人之不我聽而且至於疑且駭也是故有十六相而不自用有四罪而不自誅乃舉而委之於舜俾得以行其賞罰焉葢使舜而不有是功則堯亦無以明舜於天下四㓙非盡小人史記舜本紀舜歸而言於帝請流共工於幽陵以變北狄放驩兠於崇山以變南蠻遷三苗於三危以變西戎殛鯀於羽山以變東夷太史公多見先秦古書故其言時有可攷以正漢以來儒者之失四族者皆窮奸極惡則必誅於堯之世不待舜矣屈原曰鯀悻直以亡身則鯀葢剛而犯上耳若四族者皆小人則安能以變四夷之俗哉由是觀之四族之誅皆非殊兇亦不廢棄遷之逺方為要荒之君長其左氏之言皆後世流𫝊之過若堯世有大奸在朝而不能去則堯不足為堯也蘇軾先覺覺後覺堯典先言克明俊徳謂堯能自明其徳也次言百姓昭明謂民亦有以明其徳也真徳秀傳賢以為丹朱計史記云堯知子丹朱之不肖不足授天下乃權授舜授舜則天下得其利而丹朱病授丹朱則天下病而丹朱得其利堯終不以天下之病利一人卒授舜以天下觀堯舜之帝采椽不刮茅茨不剪飲土溜啜土硎其所以儉其身而憂其民者豈不肖之君所願為哉若曰竭四海之養奉一人之欲忽其寄托之重忘其危亡之戒則南巢之放鹿䑓之焚所以貽之禍者酷矣孰與為虞賓終身不失其所以安乎非特以利天下亦以利丹朱也而司馬遷曰不以天下之病而利一人謬矣用才先考徳鯀之治水僉薦之堯用之固也然察其一時顧問君臣皆有所不得已於其間懐山㐮陵之患帝之戚然甚矣在廷相顧思有以紓一時之急故於鯀之對未罷而試可之色已難有能俾乂之求雖急而方命圮族之素已疑矣至驩兠之薦共工帝獨不以試鯀之心試之者豈非予采之若未至如昏墊之廹哉驩兠之言徒知其方鳩僝功而不知帝之所以望人者不置其静言庸違之大累而邀其鳩功之小材也使後世之君遇灾如洪水得一人而用之決不計其方命而疑之咨人以若予采得一人而用之決不惡其象㳟而遂棄之也愚以是知堯之用心深顧國體而不專於事功之必集故其所求之人不切於有才而先考其徳之賢否也陸唐老憫人為惡唐堯忠厚之政樂人為善而憂人為惡故曰嚚訟曰静言曰圯族堯皆加以吁之一字見聖人無忍怒而有咨嗟嘆憫之心也舜忘貧賤富貴舜之飯糗茹草若將終身無飯糗茹草故也被袗衣鼓琴若固有之無袗衣鼓琴故也使舜而有飯糗茹草則不能若將終身使舜而有袗衣鼓琴則不能若固有之荀子所謂外物輕者乃賢人之事未足以語舜也不為居所移舜自側㣲而登至尊木石不能使之愚鹿豕不能使之野耕稼不能使之勞陶漁不能使之辱袗衣鼓琴不能使之侈牛羊倉廩不能使之奢葢居為舜所移而舜不為居所移吕祖謙察人倫父子之倫人所常行也以舜處之若不必察也不幸而有頑嚚之父母焉處頑嚚之間一日而不加察則烏保其無怨舜於此所以用其心者不過於業業致孝而已吾致孝焉則天下之為父子者定矣兄弟之倫人所常行也以舜處之若不必察也不幸而有傲慢之弟焉處傲慢之上一日而不加察則烏保其無怨舜於此所以用其心者不過於同憂喜之情而已吾致愛焉則天下之為兄弟者定矣告則不得娶夫婦之倫於是為難且變也舜於此必察之曰吿則不得娶吾慮夫不孝以懟父母而已也他不知也凡此皆舜之所以盡心焉者舜之心實為天下後世定人倫之始也其始定矣其後世豈難定哉其難且變者定矣其易與常者豈難定哉聖人之所行所為不知一身之利害而闗天下後世之利害凡為人子之不幸如舜之克諧以孝足矣况不為頑嚚者耶為人兄者不幸如舜之不藏怒宿怨足矣况不為傲慢者耶為夫婦之不幸如舜之不告而娶與夫刑帝二女足矣又况無舜之難且變耶舜處一身之不幸而貽天下後世之幸處一時之難且變而為千萬世之法陳孝錫謹於用刑吾觀舜用刑之法官有鞭教有扑贖有金眚有赦至猶怗終者始加以刑尚有欽恤之戒是則未刑之先曰鞭曰扑曰金曰赦致意者四焉當刑之際曰欽曰恤致意者二焉如是而刑則天下罹於屠割之威者無幾矣先教養而後及刑舜之命官也先播榖次敷教而後及於刑葢有以養其民之身而乂以善其民之心不獲已而置刑焉而刑之所施又必察其情當其罪是以惟刑之恤之意也欽恤者聖人用刑之心明允者聖人用刑之法真徳秀言用刑止於四㓙四罪必於恤刑之後言之見史官深識唐虞用刑之意以舜象刑條目觀之至於事勢窮極然後加之以賊刑既欽且恤則知舜於四㓙之誅亦可謂大不得已也然味四罪而天下咸服一語又見舜自即位以來止於四罪之誅用刑之簡非若後世之繁苛也吕祖謙盡處難之道嘗反覆大舜之事未嘗不嘆其所遭之難亦未嘗不慕其所處之盡也人孰無親也而矜憐撫育之恩彼則無有也人孰無兄弟也而友愛親睦之義彼則無有也以側㣲之人而娶貴驕之二女若未易以其質朴者化也以木石鹿豕之與居者而驟進乎臣民之上若未易以刼制者服也然則舜於親則有允若之化於象則有親愛之義於二女則有釐䧏之别而臣民則為謳歌皆歸而不相舍也果何道以至此哉等視輕重舜視天下如棄敝屣豈舜直輕天下如敝屣哉孟子特為桃應言之耳天下者桃應之所重也敝屣者桃應之所輕也以其所輕而明其所重欲使知舜之等視輕重而已孟子止言舜之無所重而人遂疑舜之有所輕誤矣吾將因孟子之言而附益之曰舜當其可與視天下如敝屣當其不可與視敝屣於天下吕祖謙一身而所為備興於側㣲而極於有天下起於耕稼陶漁而至於為帝始於飯糗茹草而止於被袗衣鼔琴一舜之身而其所為偹矣卲康節舜能用君子之朋朋黨之説自古有之惟幸人君辨其君子小人而已堯之時小人共工驩兠等四人為一朋君子八元八凱十六人為一朋舜佐堯退四㓙小人之朋而進元凱君子之朋堯之天下大治及舜自為天子而臯陶稷契等二十二人為一朋而舜皆用之天下亦大治後世不誚舜為朋黨所欺而稱舜為聰明之聖以能辨君子與小人也歐陽修齊家以四岳之舉舜只就家庭中說而堯之試舜亦只就家庭中試此乃身修而後家齊家齊而後國治國治而天下平道理呂祖謙刑家治家之難甚於治國者閨門尚恩易於揜義世之人固有勉於治外者矣至其處家則或狃於妻妾之私或牽於骨肉之愛鮮克以正自檢者而人君尤甚焉故堯之試舜必降以二女者能處二女則能處天下矣舜之身正而刑家如此故堯禅以天下而不疑也真徳秀以弟待象焚廩捐階之虐治棲入宫之侮百世之後讀其書者猶為舜切齒而舜之恩義源源不絶者非以徳而報怨也以弟待象而不以象待象也以天觀象而不以人觀象也葢欝陶而思舜者乃象之天彼傲而害舜者特象之人耳舜之胷中純乎天故見象之天而不見象之人也吕祖謙命官無貧賤精粗之間禹為相而䕫為樂工伯夷典禮而臯陶治囚論其所處則有貴賤精粗矣而舜之於數人者未嘗有輕重之别也均為朝廷之事耳是數人者知耻其職之不修而已不聞其精粗貴賤之間其心也張來以奮起為心百揆重任也舜以之而咨四岳宜也然味奮庸之語不能無疑焉夫奮勵激昂之人用之興廢補弊之時可也舜之時天下已治矣而復奮其用不㡬於生事乎天下之理不進則退中間無可止之理常存奮起之心乃生生不窮日新之道一止則退雖極治之時此意常不可少吕祖謙不廢規儆之益舜以大聖之資安有可戒之事而益以怠荒戒臯以逸欲戒禹又以傲虐戒豈憂其有是而預防之耶抑知其無是而姑為是言耶人心惟危自昔所畏雖聖人不能忘操存之功大臣事聖主不敢廢規儆之益真徳秀盡其當然烝烝之乂非所以自强也䕫䕫之齊非以正行也業業之致非以要譽也吾職之不共吾力之不竭於吾天性有累焉於吾至願有歉焉於吾眞樂有虧焉是則所憂耳德隨寓而著造端乎閨門而閨門有克諧之化至於示儀於天下而天下有底豫之功為法於後世而後世有可𫝊之道怨慕孟子可謂知大舜之心矣人知舜之怨為怨獨孟子知其怨乃所以為慕慕之為言愛之深思之切也真徳秀帝德㒺愆舜之徳雖覆載無以加而臯陶但以㒺愆言之葢必如是僅可謂之無過耳同上待象為仁義之盡聖人不以公義廢私恩故不以象之惡而不與之以富貴亦不以私恩廢公義故使之不得有為於其國以暴其民舜之於象仁之至義之盡也同上言簡而易守舜命契為司徒教以一言曰寛命臯陶作士教以一言曰明所任至重而戒飭不過一言此其所以簡而易守歟夏僎勉臣以立功立言臯陶有謨舜則曰時乃功禹有功舜則曰禹亦昌言璣衡齊政堯既厯象日月星辰舜復何若是哉葢觀天象運行足以卜一身之得失舜攝位之後未知一身之無過又未知天意之如何驗之厯象之間以見天心之逆順茍天象有一之不順則是我之不足以當帝位也雖然舜之事天亦有自矣如納麓之時風雨弗迷天已享舜矣尚何待此耶葢前之所舉乃堯之試舜舜豈自以為能後之所舉舜亦欲自試以驗其身之如何也故察璣衡以齊七政吕祖謙公道大明昔者有虞之世道純徳厚天下如一當時相為稱譽相與汲引不惟在廷諸臣知有公道而洋溢州黨閭巷之間者亦未始有異議故人有齊聖廣淵明允篤誠者天下皆謂之八凱人有忠肅恭懿宣慈恵和者天下皆謂之八元逮舜擢用而置諸上位卒頼以揆百事布五教雖薦舉之權不在天下之民而舜舉十六相實慰天下之願則公議之行至此有可觀者矣陳朴夏商周受命之符論夏之受命不必曰洛書之錫有以為之符當論其平成之績有以救生民於魚鼈之餘論商之受命不必曰元鳥之生有以為之符當論其寛仁之政有以慰天下雲霓之望論有周之受命者不必曰白魚之祥流烏之瑞有以為之符又當論其積行累功有以致艱難之業散財發粟有以成盛大之勲得民心黎民咸貳於洛汭之日似終窮矣然能於洛汭咸貳而不能不合謀於一旅之衆億兆離心於牧野之時似終厭矣然能於牧野離心而不能不思殷於三紀之久周自東遷知有諸侯不知有王室似終怠矣然盟向之民寧背鄭陽樊之民寧叛晉而終不敢一日無周夫以千八百國之天下而斯民常終始如一日有變故無攜貳有動揺無傾覆斯民何依依而至是耶本人情乗輿之供廪稍之給以是而取民未害也而貢助徹之什一更數世如一日豈不曰國用固可急而吾民得無欲富之情乎宫室之奉䑓池之樂以是而使民未過也而三日之役歴數聖如一人豈不曰一己固可奉而吾民得無欲逸之情乎苗民之當誅葛伯之當征有崇之當伐奉辭而滅之可也則寧班師焉寧事小焉寧退而修徳焉豈不曰罪固當問也而吾民得無欲安且夀之情乎誥誓夏之誓典而嚴湯之誓曲而重盤庚之辭悃惻而周人之誥優游制度因革輅一也而鉤車大路乗路之殊冕一也而有毋追章甫委貌之異禮一也而或青或紫之不同勺一也而以龍以蒲之不一進而至於校庠之異制貢助徹之異名忠質文之異尚豈故為是差别哉誠以時變所趨之異不隨時而損益之殆難以强世也仁故苗民逆命人心幾於忿禹而禹不忿舍我穡事天下幾於讎湯而湯不讎伐商之後斯民一旦譁然疑周而周不疑三數聖人蹙然如慈母痛其子之弗類也詔語諄複不忍毫髪之有傷而厭之飫之以徐洩其謗讟憤悱之意而為不怨不詈之歸民亦懲然而改懌然而隨至於婉攣揫幽更數百年而不忍釋者吁聖人一念仁民之天至此哉備先具六府孔修而禹之民不知有水兆民允殖而湯之民不知有旱鄉里縣鄙在在委積而成周之民不知㓙荒嚭厄之變救弊以歸於中中者道之一也道之一則孰為忠孰為敬孰為文而弊亦孰従而出也損益之論此其安施乎禹之後允執之者無其人於是乎狥世變之所趨而變中以為忠曰忠則去中猶未逺也然離中而為忠則已有所偏尚已夫是以久而不能無弊而承之者亦固不能無救弊之政也商人承忠之弊而以敬周人承敬之弊而以文葢各以其勢之所激者救之於是乎有損益之可言矣雖然敬以濟忠文以濟敬湯武之意葢欲舉偏補弊而復之於中也任雄圖兵不待擇而精三代之兵不待擇而精其故何也兵出於農有常數而無常人國有事要以一家而備一正卒如斯而已矣是故老者得以養疾病者得以為閒民而役於官者莫不皆其壯子弟故其無事而田獵則未嘗發老弱之民兵行而餽糧則未嘗食無用之卒使之足輕險阻而手易器械聪明足以察旗鼔之節强銳足以犯死傷之地千乗之衆而人人足以自捍故殺人少而成功多費用省而兵卒强蘇軾民相友助夫民相與親睦者王道之始也昔三代之制畫為井田使其比閭族黨各相親愛有急相賙有喜相慶死䘮相恤疾病相養是故其民安居無事則往來歡欣而獄訟不生有宼而戰則同心并力而緩急不離同上商以強亡周以弱存商之有天下者三十世而周之世三十有七啇之既衰而復興者五王周之既衰而復興者宣王一人而已葢商之多賢君宜若其世之過於周而反不如周周之賢君不如商之多而其久於商者乃數百歳此二者所以使天下之士疑焉而不知其故也葢甞以為周公之治天下務為文章繁縟之禮以和柔天下剛强之民故其道本於尊尊而親親貴老而慈幼使民之父子相愛而兄弟相恱以無犯上難制之氣行其至柔之道以蹂天下之戾心而去其剛毅果勇之志故其享天下至久而諸侯内侵京師不振卒于廢為至弱之國何者優㳺和易之道可以為久而不可以為强也若夫商人之所以為天下者不可復見矣切甞求之於詩書之間見夫詩之寛緩而和柔書之委曲而繁重者舉皆周也而商人之詩駿發而嚴厲其書簡潔而明肅以為商人之風俗葢在乎此矣夫惟天下之有剛强不屈之俗也故其後世有以自振於衰㣲然至於其敗也一散而不可復止故夫物之强者易以折而柔忍者可以久存而常困於不勝强者易以折而其末也乃可以有所立此商之所以不長而周之所以不振也蘓轍文武不分三代而上養有庠教有校而射有序周旋於澤宫者皆有决拾之能而羣居相與閲習者俱足以當受成獻馘之任是以甘野之戰可責之六卿之職而淮夷之勝民獻之夫寔佐之非天下之多全才也所以養之者素也胡林卿無養兵之費專兵之患天下之患莫大乎兵無事而聚食将有權而専兵先王必於所未然者深為之思曲為之偹其設郷遂井田之制以寓兵設比閭族黨之官以寓将葢四時之隙命有司講武而教民以鼓旗鐃鐲之節諸侯卿大夫朝聘燕享從容歡欣之際而猶不忘弓矢之事故方其有事則取兵於農以執干戈取将於士大夫以典軍旅事已則将還其職以治民兵散於野以力耕是以無聚食之費無専兵之虞此其綱維大意之所在者而見於節目之間則征行者限其數調發者從其方偹邊防者甚嚴制畿兵者甚重其别又有四焉且通籍于司徒者若彼其重征於司馬者不能什一是限其數也而未甞悉民以為兵伐楚以荆平淮以江漢是從其方也而未甞調民以逺戍采薇而往雨雪而歸是邊防不以無事而暫止葢恐其一旦有倉卒之變元戎啟行不過十乗是畿兵不以有故而輕出葢恐其内外有輕重之患此先王之深意寓諸節目者又如此求其綱維而徇其節目類皆無有罅隙之可議此其所以經久而無後患陳誠中禹絶此心之私禹視天下之溺由己溺之何其責己太深切哉滔淫之害天實為之惻然不忍斯民葬魚腹中極力牽援愛人利物如禹者至矣禹之心廣矣大矣孰測之哉人心之疵莫重於愛禹不聞呱呱之泣私愛撤矣縱而為欲又其疵也禹卑宫菲食私欲撤矣觸而為憤又其疵也禹不以鯀誅而廢國事私憤撤矣鬬而為夸又其疵也禹不以苖民逆命而逞師私夸撤矣禹之心如虚空木石無所染湼無所動揺而所以異於虚空木石者惟愛人利物之心獨存耳大學之道貴乎能定静然應心常存也大易之㫖貴乎无慮无思然感心不滅也應感之心愛人利物之端也禹之所造殆謂是歟劉彦冲勤儉禹之徳惟儉與勤有功而不伐此其盛者也菲食惡衣者惡華也至於祭祀黻冕則有所用其美也卑宫室者惡榮也至於溝洫則有所用其力也勤而有所用其力儉而有所用其美此所以無間然者歟范祖禹艱難勤儉力拯横流為民粒食得九疇定九川乗四載距四海櫛風沐雨奠山濬川却昏墊之憂平水土之患以父殛而是念聞子哭而不名然後六府孔脩四隩攸宅興播殖之利定貢賦之差億兆熈熈以成淳化是以受禅而有天下可謂艱難矣及其在位也卑宫室惡衣服見罪人而泣聞昌言而拜故能㑹諸侯於塗山執玉帛於萬國可謂勤儉矣王元之傳子聖人之道尚可以安於天下不求夫為異也堯舜傳之賢而禹傳之子天下以為禹無聖人而傳之而後授其子孫此以好異期聖人也夫聖人之與天下不從其所安而為之而求異夫天下之人何其用心之淺耶昔者湯有伊尹武王有周公而周公又武王之弟也湯之太甲武之成王皆可以為天下而湯不以與其臣武王不以與其弟誠以為其子之才不至於亂天下者則無事乎授之他人而以為異也而天下之人何獨疑夫禹哉若禹之不以天下授益也非以益為不足授也使天下復有禹而禹不以天下授之矣何者啟足以為天下故也啟為天下而益為之佐是益不失為伊尹周公而其功猶可以及天下也葢聖人之不喜異也如此東坡求諌昔大禹命遒人以木鐸徇於路曰工執藝事以諌故茫茫禹迹虞人得以獻箴春秋之世若師曠樂官也得以諫晉侯伶州鳩樂官也得以言王心之失醫和醫也得以正趙文子杜蒯膳宰也得以正平公宴樂之事若此者禹之遺風也夫惟親疎逺近之臣無一而不進諫此人主所以獨立於無過之地提領衆職禹宅百揆左右有民則汝翼宣力四方則汝為觀象作服則汝明聞六律五聲八音則汝聽禹之一身何以兼是衆職哉葢契之敷五教左右有民者也四岳十二牧宣力四方者也夷之典禮觀象作服者也䕫之典樂察音在治忽者也禹為宰相緫百官則是事又當從禹而提領之此舜之所以命禹也功著於平水土禹貢之書夏書之首也而歴攷其所紀則九州之未為十二無非堯事也紀堯之事而叙於夏書之首叙書者豈無深意哉葢鑿龍門排伊闕禹之用力也勤矣䟽三江導九河禹之用心也至矣别三壌任九貢禹之利民也大而慮民也深矣禹之勤勤悃悃所以立一代興王之業實於此乎始則叙書以著一代立功之由者尤當於用力之始而求之是何也葢事久論定之餘不足以見聖人濟世之難而害深弊極之際乃可以觀聖人立功之為不易功在萬世禹平水土厥功大矣地平天成當時稱之彛倫攸叙後世稱之以至詠豐水者嘉其績詠疆理者明其功游洛汭者有美哉之嘆探禹穴者有遐想之意禹無間然逸豫之萌常伏於治安侈汰之漸毎胎於冨貴今日居處服御務從菲薄而事神待民必致其勤使其誠實不生於内心則嗜欲必移其所志而禹也處此畧無少疵以禹為甘於薄己而樂於厚物耶則己與物二致厚與薄兩心是猶未能㤀物我之分而拘拘於厚薄之别也禹果容心於是乎一有心焉不無間矣飲食之菲人見其為菲禹飽之而甘衣服之惡人見其為惡禹服之而安以至宫室之卑非愛其卑也是其徳必有大過人者不然則衣已三澣将徳色於侍臣露䑓不作特為計金而止耳是有心於為儉者烏得為無間以事鬼神則致孝以為黻冕則致美㣲而溝洫且盡力焉盛徳之發見固應此耳不然神之弗福或以小信譏之民之弗從或以小恵誚之是有心於為恭者又烏得而無間吾故曰恭儉聖人之盛徳事備聖人之徳然後全聖人之行不與水争地善治水者不與水争地昔嘗觀禹之平洪水莫先於導河而其導河之策則莫先於疏九道今以地理考之自北而南九河之相距三百餘里而其延衺廣迤以同歸於逆河者是又不知其幾也夫田疇土壤之分布與夫貢賦稅歛之均輸於是數百里之内者固不可勝計矣而今也不䘏數百里田疇賦入之地利而棄以為九河亦幾於利害之不審也及夫地平天成而水患息六府三事允治而萬世被其功實自兹始然則捐數百里之地而遺千萬世之利禹之處此葢亦慮之熟矣葉適修堯舜之道宫室之卑即前日茅茨之舊聲教之暨即前日五教之敷六府三事之修九叙九歌之勸又前日庶政惟和萬國咸寧之化也故率百官則曰惟若帝之初敷文命則曰祗承于帝凡制度設施之末維持慿藉之具皆前日之已備後世之稱述者曰至治之極曰盛徳義以加夫豈紛然四出其智以過求紛更之舉哉人皆可為禹見赤子入井而内有怵惕之心是仁也充怵惕之仁則為之援溺也軫耕桑之慮而索綯於夜是勤也充索綯之勤則禹之過門不入也視桮菽之棄於塗泥則失聲而驚駭是儉也充桮菽之儉則禹之卑宫菲食也遇於道塗則徐而後行是謙也充徐行之謙則禹之不矜不伐也道未嘗擅於禹而天下共知之禹未嘗認道為已有而與天下由之智仁觀隨山濬川足以見禹之智觀任土作貢足以見禹之仁不自滿禹之萬世之功方且謂一能勝予禹才髙衆人之上禹心常在一世之下啟始有跋扈之臣道有升降世變風移須當識其統體堯舜禹三聖相授渾然無間至啟而有跋扈之臣此乃風氣之一開去唐虞又不同矣言戰以傷世變啟天子也有扈諸侯也以諸侯與天子戰春秋衰世之風不意禹一傳而遂有此事聖人傷之序其書曰啟與有扈戰於甘之野戰之為言力均而勢敵不伏罪之辭也天子有征而無戰曰戰者傷之也雖然無恠乎啟之世則然也征討之事自舜而始誓師之事自禹而始有三苖之征然後有𦙍侯之征成湯之征有三苗之誓然後有甘野之誓鳴條之誓孟津之誓世變之所趨固如此也不得已用賞罰禹伐有苗止曰爾尚一乃心力其克有勲至啟則曰用命賞于祖不用命戮於社此世變風移不得不然禹家學古者用兵必載遷主載社主而賞罰聽命焉示不敢専用兵也有用命可賞者是祖賞之有不用命可戮者是社戮之也此用兵之常法至予則孥戮汝此啟當時自為加嚴之意古人善於自量審於自知啟知徳䧏於上世而又當用兵之際不好於加嚴也非特警衆亦深以見啟自警省敬畏之意所謂啟賢能敬承繼禹之道者此也夫承堯舜禹重熈累洽之後未嘗接行陳之事至一旦有事誓師其戒飭戎陳如素講者葢禹之家學如此文武兼備體用全具本末並舉不分精粗羣書考索續集卷五十三
