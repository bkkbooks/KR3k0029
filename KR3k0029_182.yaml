body:
  text: 羣書考索續集卷五十一宋章如愚編輿地門京都京東東路春秋戰國之時齊據東海雄制中夏赫然為五百年之强國逮於秦漢之際形勢益張與陜右相角天下制勝之地舉在兩隅如河北江南皆不足進焉故韓信下趙挈以與張耳而弗顧既襲有全齊遽啓假王之請漢既䇿命而蒯通遂知楚漢輕重舉在於信垓下克集西楚遂亡則其地利斷可知矣是故田肯有東西秦之稱臣初讀戰國楚漢之書殊覺齊地之强意其後世滋甚然而漢魏而下寥寥千載間青齊之地浸以汨沒其間擅王張耳僣帝南燕與藩臣不軌唐淄青節度者各一姓而已而又莫不喘息釡中幸亂茍安僅為嵗月崛强之計王師壓境遽即芟夷所謂昔日形勢果何在也以至漢晉隋唐之季天下盜起如蝟南北五季之中中原禍亂沈酣奸雄投隙莫甚於此時矣而全齊之地蔑爾無聞又何其荒凉削弱之甚也夫土壤腴瘠山川夷險今古不殊而前後强弱相戾若此何哉既而考歷代户口登耗與夫城邑修廢郡縣增損離合之制然後知青齊之地一盛一衰蓋有自而來方姬周之季有齊垂九百年斯民久獲休息而為之上者經制緝理又皆得其道惟太公克慎厥始而桓公克振厥中威王又克成厥終三后奮功全底於治斯民浸以蕃息鑿斯池穿斯城深耕易耨日以赴功而齊國赫赫稱强伯矣當時齊地不下七十城而臨淄一城已有丁男二十一萬觸類而長則它城可知故蘇秦稱齊人連衽成帷揮汗成雨蓋言其蕃庶之甚也嘗考西漢之時全齊之地有二百三十餘縣民户不下二百萬大率當天下之十二蓋其去田氏為未逺也故知春秋戰國楚漢之時齊地獨稱强伯不為過矣爰自新莽之亂山東盜起而青徐首難暨光武中興削平中土而齊實為殿故地已丘墟户口凋耗建武之初縣邑并省幾半涵養二百年而民户不踰百萬重以黃巾之亂海岱騷然全齊之民舉為羣盜拏戰數載殺傷困重而歸降曹公者猶百三十餘萬人籍其勇鋭者為兵餘皆漂流失所自是齊地空矣魏晉之際休息六十年而民户才盈十萬舉全齊之民僅能當戰國臨淄一城之衆既而又遭五胡之亂王彌騁亂殺戮如刈瀕海重困雖有州郡之名幾為空地自是而後東國汨焉不振勢亦宜也由是觀之天下國家之輕重特在民户登耗如何茍人物蕃庶則鹵莽惟膏腴隳廢惟金湯丘墟惟甍棟荒圯惟桑麻狼號鬼哭之地惟雞犬相聞牛羊群牧之鄉而赫然盛强矣乃若人民凋耗莫克有為雖雍州之上腴蜀土之天險東國之纎巧河朔之强捍將安施設哉斯率土之濵莫不皆然豈惟青齊之地古今盛衰有足慨也抑嘗譬之土地其軀幹人民其精魄也精魄去矣軀幹猶存其何用哉彼有爭地以戰殺人盈野是猶舍精魄而爭其軀幹豈可謂知務也哉京西北路河南之地天下之中其民生禀中和性理安舒樂逸豫而不能為亂故古名其州為豫自秦漢以還天下有變常為兵衝而其民不工戰鬪大抵易為戡定王師甫至則簞食交迎雖有奸雄不能割據豈非習俗和平不能為亂故邪爰自李唐中葉而後兩河殽亂李忠臣節度淮西統其下暴掠以啓衆心而蔡人始樂為不軌忠臣既敗李希烈乘之益逞由是申蔡之人從亂如歸吳少誠繼世遂以跋扈淮西之民習久為常但知為賊之利不復知有逆順之理及王師壓境則城自為守人自為戰父子相視死不為悔其酣亂錮禍乃與羌夷無異故唐朝環天下兵以事三州歷三世五將五十餘年僅乃克之顧其人如此則所謂昔日安舒逸豫之性果何在也嗟乎河南之地自古名為豫州而習俗之弊乃至甚於幽燕慘殺之氣而况不為豫州者乎為人上而以風俗為任者其可不戒哉京西南北路河南豫州之地平夷洞逹萬有一轂八靣受敵之場也而戰國之時韓魏以區區陋邦北縈南帶環繞數千里界於秦楚齊趙四大國之間無再㑹不受敵而虎狼之秦搏噬尤亟其勢可謂危矣而終能雞唱荷戈月沉擊柝繼世相承為二百年之戰國及與齊楚皆亡夫以二百年韓魏之君豈皆賢哉咸能不失疆土則以生於憂患故耳下至李唐之亂梁主朱溫亦割據河南潜窺唐室天下環起而攻之腹背首尾舉為敵國而溫轉戰萬里出入十年亦能劫據中原以傾唐祚然後知無山河之恃者所以固疆埸之防無守禦之志者所以啓開拓之心天下之勢固有不安之安不固之固存焉在王者處之如何耳河北東西路甚矣亂離之勢不可以久而興復之功不可以緩也蓋常人之情駭於驟見而狃於常聞作於始而怠於終方其禍亂之初天下之人駭然而奮雖匹夫匹婦莫不有忠義憤激之心則奸雄之徒劫以從亂也難及其久也天下之人習亂為常因循顧望之心生而忠義敢為之氣沮則奸雄之徒劫以從亂也易及其又久也天下之人蕩而忘反耆舊既沒而少壯生長亂離視犯順逆節之事以為當然則操戈為仇者唯知各為其主矣於是有一危而不可復安一亂而不可復理歷觀前古例有此弊而李唐河北之禍尤為昭然方安史首亂兩京淪沒宇內大震唐祚不絶僅若綴旒而肅宗匹馬北方提孤軍橫搏强敵不數年間遂清大憝者蓋民心未變困而取之易以成功故也及代宗瓜分河朔付諸叛將涵養二十年間羣起而肆逆則雖窮天下兵纍世事之終不能克蓋民心已變力而爭之則難以成功故耳切觀正元之初朱㴞詔燕人以叛號於衆者三皆不應遂劫之以前既乃大噪而還㴞誅戮數百人然後定則知河朔之人本無負唐之心不幸因循以至此耳且以德宗之初去天寶之亂幾三十年矣而河朔之民猶未始忘唐者豈不以太平之老猶在而斯民猶有所聞故邪逮四十五年之後耆舊既沒少壯生長亂離不復知有太平涵養之恩於是狼心始逞而不可如何矣臣故曰亂離之勢不可以久而興復之功不可以緩者此也兩廣廣南東西路漢魏以還守官廣南者多以貪墨坐激吏民之叛啓蠻獠之寇實由於此蓋古今之同患也抑嘗考其故嬴秦以來以守令為治臺省銓除莫不以內地為重以邊逺為輕而廣南之地去京華為尤逺瘴癘蠱毒種種穢惡內地之人南轅越嶺不啻斥逐必罪戻孱庸不得已然後膺其選既百舍登途往返重費不過厚取於民耳而又地産珍竒掌握之物足當數世疆域曠邈按察稀臨京闕萬里赴訴莫及則無聊汨沒之人何憚而不為賄乎歷古交廣之間民獠多叛致騷擾江淮震駭朝省職由此也嘗觀漢順帝永和中日南象林羣蠻並反四府議發江淮甲卒致討李固駮之以謂前尹就討益州叛羌蜀人諺曰兵來尚可尹來殺我乃召還以兵付刺史張喬旬月之間寇虜殄敗宜精選牧守以殊俗乃以喬刺史交州祝良為九真守喬至開示慰誘並皆降散良單車入賊降者數萬皆為良築起府寺由是嶺表無虞至靈帝中平中屯兵作亂嶺南大擾三府乃精選賈琮為刺史琮至蠲復徭役選良吏試守諸縣逺近翕然巷路為之歌曰賈父來晚使我先反今見清平吏不敢飯自後嶺表之民又獲安堵審觀張喬祝良賈琮之事而人情可見矣然則嶺南歷世多亂豈皆蠻獠之罪抑當時朝廷制置失宜耳嗟乎監司守令九重之指臂也所以撫育斯民全賴良吏其休息安危莫不由之又可易其選耶內地之民伊邇闕庭監司往來如織號令所宣閭閻必達借使守令或非其人寃抑易訴詣監司而不獲則裹糧走闕下耳是內地親民之吏猶可非其人也至嶺表則不然逺者去京華萬里終嵗道途僅能一詣闕庭而又荒陬絶域程驛邈焉監司不能周及守令茍非其人則寃民無由申訴屈抑既甚則其勢必將為亂是逺地親民之吏不可非其人也而歷代銓䕃反以內地為重以邊方為輕是何倒置之甚哉切觀宋朝開寶中太祖命鉞文敏知瀘州召見講武殿謂文敏曰瀘州最近蠻獠尤宜撫綏聞知州郭思齊監軍郭重遷掊斂於民恃其遐逺謂朝廷不知爾至為朕鞫之茍一毫侵民不以逺赦夫瀘州去京師四千一百里可謂逺矣而官吏貪墨太祖盡知之雖僻逺小郡凡差守臣必親自處分其謹重如此則邊民安得不理蠻獠自何而叛措方有於太平之盛東南一尉西北一候端有餘矣嗚呼兩廣四十州之地皆宋朝瀘州之地也其選任守臣可不戒哉東南東南土壤三國之季吳主孫皓自建鄴遡流移都武昌而土地埆塉民間苦之當時謡曰寧飲建鄴水不食武昌魚寧還建鄴死不止武昌居誠以地薄而民窮也據禹貢荆州厥土塗泥厥田下中而武昌乃荆州之壤即本朝之鄂州是鄂土之瘠振古則然矣然而李唐長慶中崔郾為觀察治陜以寬繼治鄂更以嚴或問其故曰陜土瘠而民勞吾撫之不暇鄂土沃而民剽非用威莫治也夫陜郡古雍州之界厥土黃壤厥田上上而鄂土比之猶且為沃則上腴可知矣彼唐堯以來至於三國之季二千五百餘年矣鄂土之瘠自若也孫皓而下至於崔郾之時才五百五十年耳而土壤腴瘠若此其不侔何哉蓋二代以前東南荒凉為甚春秋而下又為吳楚之境兩漢之際未經緝理自吳主孫權以來始倚武昌為重更三國東晉南朝之時常為重鎮車舟所湊人物萃焉積壤流膏耕鑿滋利嵗時浸久遂為沃壤則亦宜然也雖自東漢以還東南民物漸以蕃息至於隋唐宋朝大為豐美人力既偹皆為沃壤方之往古全不相侔固非特鄂土為然也按禹貢揚州厥田下下是東南之地天下最瘠薄者也而隋志乃稱江浙之間川澤衍沃有陸海之饒與土相反如此豈不以東晉南朝之時人力有致於此耶嘗觀漢武帝時趙過能為代田比它畝倍收固非土地有腴瘠而人力有勤怠也特謀畫有工拙耳振古中原之地種植所加盡為沃壤者詎皆其質然哉抑由歷代帝王所居朝覲會同九有輻湊百巧所聚萬貨所通人力修而地利盡故也及漢魏以還天下有變常首難於西北則衣冠伎巧轉而南渡四方習俗所利舉萃東南農桑工賈曲盡其便人物之繁與京華無異而圡壤亦從而沃矣加之離亂少弭上下浸安井里環聚以糞其田雞豚畜之牛羊牧之荆棘芟而草萊闢種植時而灌溉利雖欲不為沃壤得乎哉且以有隋盛時揔江浙閩中不盈三十萬户則人力之不寧幾何自唐朝以來浸以休息更五代至於宋朝以增至五百餘萬戶州縣墟鎮整焉相望則其陸海之名益不虛矣故知今之東南全非昔之東南若欲議東南之實必舍古之名然後可也南北宋朝南北輕重江河淮漢經乎中國皆自西而東注是開闢以來南北之形勢已分矣而古今推遷輕重奪移不可不審也蓋普率之間覆載長育各有定限旺於此則彼衰盛於彼則此謝雖先後不齊其有興廢一也是皆天地自然之數有非人力所能為者觀秦漢以前天運旺於北方故天下之美舉萃於西北其冠冕之盛風化之美榖粟之豐機巧之利財用之饒户口之登舉在淮海以北才越淮漢以南頓然陵替故帝王之興舉在西北而謂之中國淮漢以南盡為蠻夷之域是以舜分天下為十二州淮漢以北居其九兖豫青徐雍兾幽并營淮漢以南止居其三荆揚益周公分天下為九州淮漢以北居其七兖豫青幽并雍兾淮漢以南居其二荆揚漢武分天下為十三郡淮海以北居其九兖豫青徐雍兾幽并司𨽻淮漢以南止居其四荆揚益交元始中揔天下千有二百餘萬户而淮漢以北當千有餘萬户淮漢以南止當二百萬户是秦漢以前萬里南邦僅能當天下四分之一而已加之三國而下繼以東晉南朝紛爭數百年間斯民重困故晉武平吳籍其民户才盈五十萬隋文平陳其籍亦不過晉武之初反以三隅兩淮四川蓋可知矣按其道里雖當宋朝十有五路之地淮南江南荆南湖南廣南八路兩浙路福建路蜀川四路及京西南路而戶口凋耗曽無江浙一路之民加之利源匱竭食貨蕭然茶稅未興鹽利無幾酒課既踈商算亦罕其仰以給國家之用者不過農桑之稅而已是數百年間罄南夏財賦所以曽不及宋朝江浙一路之半而乃用以提挈天下大半之地以與西北爭衡又豈可得哉爰自李唐而下南北一家蠻荒萬里悉為郡縣而民物自古凋零山川英靈湮鬱而無所發泄由是天地王氣盡鍾於北海嶽之藏勃焉坌湧動植含靈莫不昌盛而又蠻夷軌順盜賊浸息更安史之變而無虞歷五季之難而獲免其間縱有禍亂旋即削平至於宋朝之興罰罪弔民拾取諸國州縣晏然不知有軍而聖聖承承深加涵養民物康寧益用豐泰遂為九圍重地奪往古西北之美而盡有之是以鄒魯多儒古所同也至於宋朝則移在閩浙之間而洙泗寂然矣關輔饒穀古所同也至於宋朝則移在江浙之間而雍土荒凉矣青齊冠蓋衣履天下亦古所同也至於宋朝則移在蜀漢之間而海岱蕭然矣古之賦於民者惟桑麻所出而桑麻之饒關河為盛東南無足進焉宋朝則異然酒茶鹽鐡香藥關津之利嵗入不資雖兩稅所及殆不能加國家利源莫重於此而大半在於江淮閩浙川廣之間西北無足進焉是以熙豐盛時分天下為二十三路淮漢以北止居其八京西北路京東兩路陜西兩路河北兩路河東路共八路淮漢以南乃居其十有五即東晉南朝十五路之地揔天下餘千有六百五十萬而淮漢以北才當五百餘萬户四京餘七十九萬京東兩路垂百三十萬京西北路垂四十九萬河西北路垂九十六萬陜西兩路垂一百三十二萬河東路垂五十九萬共五百二十六萬户淮漢以南乃當千有百餘萬户京西南路餘三十五萬淮南兩路餘百三十一萬兩浙路垂一百八十一萬江南兩路餘二百三十八萬荆湖兩路垂一百五十三萬蜀川四路餘一百九十五萬福建路餘一百五萬廣南兩路餘八十一萬共千有一百一十九萬户大率當天下三之二是不出東晉南朝之地而增十五倍之人以十五倍之人而增三十倍之利舉天下之美盡萃於南夏其古今相反若此之甚是豈非天運回旋物莫兩大故輕重奪移一至此也抑嘗譬之人之生世有幼必有壯有壯必有老秦漢以前西北壯而東南之稚也魏晉而下壯者之齒益衰稚者之年方長至於宋朝而壯者已老稚者已壯矣人猶以其昔日之壯也而未敢輕其老以其昔日之稚也而未知畏其壯是又可以為常乎故曰古今推遷輕重奪移不可不審也羣書考索續集卷五十一
