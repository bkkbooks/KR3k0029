body:
  text: 羣書考索後集卷六宋章如愚編官制門宗正周官小宗伯掌三族之别以辨親踈成王時彤伯入為宗正又初學記云宗正卿周官也周封建宗盟封兄弟之國十有五同姓之國三十有五始選其宗中之長而董正之謂之宗正秦置宗正掌屬籍漢因之更以序九族平帝元始中更名宗伯五年又於郡國置宗師以糾皇室親族世氏致教訓焉選有德義者為之後漢有宗正卿掌序録王國嫡庶之次皇室親屬逺近兩漢皆以皇族為之楚元王子郢客及劉辟強劉德等遞為之不以他族魏亦然晉初兼以庶姓山公啓事曰羊祜忠篤寬厚然不長理劇曹宗正卿闕不審可轉作否宋齊不置梁復置名春卿位視列曹尚書後周有宗師中大夫掌皇族定世系辨昭穆訓以孝弟唐武德置宗師晉咸寧中亦有宗師以扶風王亮為之龍朔改曰司宗光宅改為司屬後復舊卿一人少卿二人掌皇族外戚簿籍開元中判宗正官屬皆以皇族為之然自武德以來有以賜姓附屬籍宗正者羅藝徐世績杜伏威胡大思或以功或以來降其後則或借屬籍以寵藩鎮李正己之請附屬籍李晟之編入屬籍張寶臣之賜姓列於屬籍甚者沙陀首領亦以功而賜姓繫籍鄭王房宋宗正寺判寺二人以宗姓兩制以上充闕則以朝官知丞事掌奉宗廟諸陵薦享之事司皇族之籍至道中詔張伯梁周翰同編籍咸平初詔於宗正寺建屬籍樓又詔修玉牒四年趙安易上新修皇屬籍三十三卷詔送宗正寺仍接續編纂祥符判宗正寺趙世長乞於皇屬籍之上别崇懿號詔以皇宋玉牒為名八年詔建玉牒殿屬籍堂於新寺命趙安仁重修玉牒屬安仁又上仙源積慶圖詔嵗寫一本藏龍圖閣九年趙安仁上言唐故事玉牒首載混元皇帝乞以御製聖祖降臨記冠於列聖玉牒及别修皇朝新譜如唐天潢源𣲖譜從之至和元年詔宗正寺故事屬籍十年一修今雖及八年而宗支蕃衍其增修之熙寧元年上兩朝玉牒仁宗哲宗熙寧三年宗正寺言舊制每年裝成仙源積慶圖宗藩慶緒録供送龍圖天章寶文閣如漢宗正嵗上名籍也元豐更制所掌與舊略同掌序宗𣲖紀屬籍以昭穆定親踈凡修録牒譜圖籍其别有五曰玉牒以編年之體敘帝系而紀其厯數凡政令賞罰封域及豐凶祥瑞之事曰屬宗序同姓之親而辨其服紀之戚踈逺近曰宗藩慶系録辨譜系之所自出序其子孫而别其名位品秩日仙源積慶圖考定世次枝分𣲖别而系以本宗曰仙源類譜序男女宗婦族姓婚姻及官爵遷敘而著其功罪生死凡録以一嵗牒譜籍以十嵗修纂以進分案二屬宗知雜設更掌元豐六年詔宗正寺長不專用同姓蓋自有太宗正司以統皇族矣元祐八年詔丞專修纂圖書九月王鞏言玉牒十年而進自熙寧中范鎮進書之後神宗玉牒至今未修仙源類譜自慶厯中張方平修進之後僅五十年並無成書乞令修玉牒類譜官每二年一具草繳進從之紹聖三年應宗室賜名三祖下各隨祖宗之支子而下雖兄弟數多並為一字相連三年詔宗正寺二提舉諸宫學以通典唐職林唐會要國朝會要續會要四朝志太宗正司景祐三年置知太宗正即濮王也同知即守節也時宗室衆多故舉一人令厚睦之違失則紏正至和中改為判太宗正寺同知為同判熙寧置丞二人自唐有百孫院祥符九年以新昌坊皇親禮會院額曰嘉慶景祐二年詔修睦親宅時以宗戚邸第散處俾遷爽塏列次有倫慶厯七年賜北宅名廣親時以秦王宗子蕃盛而所居隘狹治平元年詔建睦親廣親北宅於芳林園給事中中書舍人秦加官漢因之所加或大夫博士議郎掌左右顧問應對位次中常侍侍中黃門諸給事中日上朝謁平尚書奏事又為左右曹以有事殿中故曰給事中多名儒為之東漢省魏復置唐改給事郎為給事中後定為四員龍朔改門下省曰東臺垂拱改曰鸞臺開元曰黃門省給事中掌侍左右分判省事察洪文館繕寫校讎之課凡百司奏抄侍中既審而駁正違失宋太宗從魏羽請置封駁司又𨽻通進銀臺司以侍從官知實給事中之職也然舊例止出內文書而已嘉祐中何郯以待制領此職詔令有不便者輒封去之仁宗加其職振皆從之自此始為故事元豐五年初除舒亶試給事中自是給事中始正除為職事官凡四人治六房掌讀中外出納及判後省之事政令失當除授非人則奏駁之故事中書進熟起草惟執政書押官制行給事中獨書畫黃而不書草著為令建炎中因舊制置門下後省以給事中為長官四員為額中書舍人漢尚書郎直宿建禮門奏事明光殿下筆為詔誥令乃今中書舍人也唐武德置舍人六人後改中書舍人掌傳進奏議表章詔旨詔命皆起草有司奏議文武考課皆預以一人知制誥其餘分署制敕六省分押尚書六曹龍朔改西臺舍人光宅改鳳閣舍人開元改紫微舍人宋初中書舍人為所遷官實不任職復置知制誥及直舍人院主行辭命封還詞頭元豐正名遂以中書舍人而判後省之事分案五中興置中書後省以中書舍人為長官六員常除二員魏置中書通事舍人東晉省宋復置入直閣內出宣誥命齊永平初四員各居一省時謂之四户權傾天下與給事中為一流梁除通事字直曰中書舍人自是詔誥之任舍人專之魏晉以來詔誥皆中書令及中書侍郎掌之後周曰小史上士二人隋曰內史舍人八員煬帝減四員改為內書舍人唐武德改中書舍人置六員自永淳以來天下文章道盛臺閣髦彥無不以文章逹故中書舍人為文士之極任朝廷之盛選諸官無比祠祿宋朝祠祿之官以佚老優賢祖宗時員數絶少自熙寧以後乃增置焉是時方經理時政恐疲老失職欲悉去之乃使任宫觀以食其祿時王安石亦欲以此處異議者遂詔宫觀毋限員並差知州人以三十月為任在京宫觀舊制以宰相執政充使或丞郎學士以上充副使兩省或五品以上為判官內侍官或諸司使副為都監又有提舉提典主管官其戚里近屬及前宰執留京師者多除宫觀以示優禮之意紹興二十一年在京宫觀作在外宫祠以三十個月為任宫觀使宫觀置使自祥符中始真宗建玉清昭應宫王旦為首始命充使宫觀置使自此始然每為宰相兼職天聖元年時崇奉之意又緩因請罷之明道中錢維演以使相為景靈宫使治平中改為節度李端願為醴泉觀使使相節度領內祠自此始後有集禧觀使治平四年富弼以觀文殿大學士充有太乙宫使元祐八年馮京以彰德軍節度改充有同醴泉觀使元祐八年尚書左丞梁燾以疾求罷詔與在京宫觀使時議以為非宰相不除遂置同醴泉使有祐神觀使大觀元年尚書右僕射趙挺之充徽宗建玉清神霄萬夀宫以宰執兼使副用真廟故事也近以宰執奉朝請者領在京宫觀使而在外舊相只除提舉宫觀非祖宗優待宰相之體提舉宫觀宫觀置提舉自康定始康定元年李若谷罷參知政事留京師以資政殿大學士為提舉會靈觀事宫觀置提舉自此始自是學士待制知制誥皆得為提舉醴泉觀元豐元年皇城司劉永夀為提點六年時君卿以皇城司為提舉大觀三年姚雄以右金吾衛上將軍充使萬夀觀元豐元年左藏庫使昌州刺史曹志為提點八年龍圖閣待制趙彥若為提舉佑神觀大觀六年尚書右僕射兼中書侍郎趙挺之除觀文殿大學士充使在外宫觀宋朝宫觀皆俟力請而後授侍從而上任宫觀者絶少若因責降改作主管方直差焉熙寧初王安石相異己者方直除宫觀大抵非自陳而朝廷特差者如降黜例二年詔杭州洞霄宫亳州明道官華州雲臺觀建州武夷觀台州崇道觀成都府玉局觀建昌軍仙都觀江州太平觀洪州玉隆觀五嶽廟並依嵩山崇福觀舒州靈仙觀置管勾或提舉提點官四年詔宫觀嶽廟留官一員餘聽如分司致仕例從便居住六年詔六十以上者乃聽差毋過兩任兼用執政恩例者通不過三任後蔡京用事增廣職任崇寧三年添宫觀十政和三年添三十選人亦許乞嶽廟祠宣和中王黼以熙寧法革之一切不恤於是士大夫失祿御史臺御史之名周官有之掌贊書而受法令戰國亦有御史秦趙澠池之會各命書其事則皆記事之職至秦漢為糾察之任所居之署漢謂之御史府亦命之御史大夫寺亦謂之憲臺後漢謂之御史臺亦謂之蘭臺寺以尚書為中臺御史為憲臺謁者為外臺謂之三臺梁及後魏北齊或謂之南臺後周曰司憲隋及唐皆曰御史臺龍朔改憲臺咸亨復舊制但聞風彈事提綱而已其鞫案繫禁則委大理貞觀中中丞李乾祐以囚自大理來往滋其姦乃奏於臺中置東西兩獄以自繫劾開元復罷武后時改御史臺為肅政臺置左右左以察朝廷右以澄郡邑龍朔後改肅政之名但為左右御史臺睿宗詔二臺並察京師太極元年以尚書省悉𨽻左臺遂廢右臺至德後諸道使府參佐皆以御史為之謂之外臺宋沿唐之制設御史臺大夫無正員止為兼官中丞除正員外或帶他官次有知雜御史一員副中丞判臺事其屬有三院一曰臺院侍御史𨽻焉二曰殿院殿中侍御史𨽻焉三曰察院監察御史𨽻焉舊制三院多出外任風憲之職用他官領之太平興國三年以張巽為監察御史正名舉職自此始唐制御史不專言職天禧始置言事御史唐太宗時有御史裏行之名景祐中始置以處御史之官卑者唐儀臺案有六監司元豐三年李定請復六察於是以御史專領六察其後以中丞為長知雜御史為侍御史言事官為殿中侍御史六察官為監察御史御史中丞周官小宰之職掌建邦之宫刑凡宫之糾禁注云即今御史中丞也漢承秦制御史大夫有兩丞一曰御史丞一曰中丞亦謂中丞為御史中執法中丞在殿中蘭臺掌圖籍外督部刺史內領侍御史十五人受公卿舉劾按章居殿中察舉非法武帝以中丞督司𨽻司𨽻督丞相丞相督司直司直督刺史刺史督二千石下至墨綬及御史大夫轉為司空而中丞出外為臺率薛宣為中丞執法殿中外總部刺史陳咸為中丞總領州郡谷永上疏竊見薛宣前為中丞執憲轂下不吐剛茹柔哀帝更中丞為御史長史光武復改中丞與尚書令司𨽻校尉朝會皆有專席而坐京師號為三獨坐言其尊也魏初改宫正後復為中丞晉宋以下不置大夫以中丞為臺主百與司𨽻分察百僚宋與尚書令分道齊中丞職無不察專道而行自齊梁謂之南司後魏為御史中尉後周有司憲中大夫隋以國諱省中丞置大夫為臺主以持書侍御史二人代中丞之任梁江淹為中丞明帝曰今君為南司足以振肅百僚晉侯史光為中丞光在職寬仁而不縱庾峻為中丞威而不尅晉李熹遷中丞鄧隗為中丞後魏李彪為中丞皆彈奏不避強禦江左拜中丞不得復入尚書省中丞鹵簿至百官趨避唐髙宗復號中丞龍朔改司憲大夫咸亨復唐制大夫掌以刑法典章糾正百官罪惡中丞為之二大事裁奏小事專逹會昌初中書門下奏大夫秩崇官不常置中丞常為憲臺之長武元衡遷中丞延英對罷元宗曰真宰相也持中無私宋沿革見總論自中丞以下掌糾繩內外百官肅清朝廷紀綱大事廷辨小事奏彈仁宗嘗言御史官須厚重知治體者方可用趙槩為中丞上重之張忭為中丞上曰忭清直可任風憲侍御史周御史掌邦國都鄙及萬民之治令以贊冢宰凡治者受法令焉以其在殿柱之間亦謂之柱下史秦改為侍御史張蒼秦時為御史主柱下文書即其任也漢因秦制置侍御史十五員有繡衣直指出討姦猾治大獄武帝所制不常置後漢有掌察舉非法受公卿郡吏奏事有違失舉劾之以公府掾屬髙第補或牧守議郎郎中為之惟德所在二漢所掌凡五曹豹尾之內便為禁省後漢侍御史威烈赫奕莫之敢犯張綱安帝時奏舉梁冀兄弟楊秉為侍御史京師稱其有宰相材魏八人當大會殿中御史簮白筆側陛而坐晉侍御史九人頗用郡守為之宋齊十人梁陳皆九人居曹糾察不法隋八人唐四人又置內供奉掌糾劾百僚侍御史號臺端其知雜事者謂之雜端最為雄劇食坐之南設橫具謂之南牀殿中監察不得坐凡侍御史之例不出纍月遷登南省故號南牀建中元年以侍御史掌公廨推彈自是雜端之議輕矣宋沿革見總論唐李素立為侍御史開元初楊慎為侍御史與御史大夫李桀論將劾崔日知反為所搆揚廷奏曰若尊恐脅以成姦臣之謀御史臺可廢矣徐有功為侍御史逺近聞之皆欣然相賀殿中侍御史魏蘭臺遣御史二人居殿中伺察非法故曰殿中侍御史晉置四人東晉省二人梁有四人掌殿中禁衛內事後魏北齊皆有隋改為殿內侍御史置十二人煬帝省唐武德置殿中侍御史四員貞觀增二員掌殿廷供奉之職京畿諸州兵皆𨽻焉彈舉違失號為副端正班列於閣門之外至文明元年又置殿中裏行唐去殿中侍御史遷拜及職事與侍御在殿中裏殿察兩院在柱外宋沿革見前殿中侍御史二人掌言事分糾大朝會及朔望六參官班序元豐八年詔殿中侍御史兼察事監察御史兼言事監察御史隋置初東晉置檢校御史知行馬外事宋齊梁陳並置後魏北齊復置十二人隋改檢校御史為監察御史凡十二人煬帝增置十六人唐武德初置八人貞觀二十二年加二人其外又置監察御史裏行以馬周為之自此便置裏行之名掌分察百僚巡按郡縣視刑獄肅朝綱唐監察御史職知朝堂正門無籍非因奏事不得入至殿廷開元七年敕隨仗入朝因姚崇用齊幹為監察御史彈劾差遣率先風教當時以為稱職大厯十四年監察御史分察尚書省六司號曰大察臣顔真卿為監察御史決五原獄而天雨宋御史多出外任風憲之職以他官領之興國三年詔本司自薦屬官俾正名舉職用太常博士張巽為之嘉祐四年中丞韓絳舉御史而恨資任屢舉不應格於是絳請置裏行從之初以王陶為御史裏行熙寧三年除秀州推官李定權監察御史裏行選人為御史自定始元豐三年詔御史專領六察又詔御史六員以三員分領察案三員專言事五年詔祕書殿中內侍省不𨽻六察如有違慢委言事御史彈奏七年大正官名以言事官為殿中侍御史六察官為監察御史掌六部之事及在京百司徽宗時如辟雍大晟府算學士之類皆不𨽻臺察崇寧大臣欲其便已而南臺御史亦有不言事者自大觀臣僚申請而辟雍之類復𨽻御史自胡舜陟申請而本臺始增入御史言事之文御史臺主簿西漢張忠為御史大夫署孫寶為主簿隋大業始置御史臺主簿二員唐省一員掌付事勾稽省署抄目貞觀中自張𢎞濟為此官之後遂為美職宋有一人掌受事發辰勾檢稽失兼簿書錢榖之事元豐中李定請增置主簿一員檢點六案文字元祐元年大理寺架閣庫專委主簿主管紹興三年詔御史臺全缺長二檢法主簿特令殿中侍御曽統奏辟御史臺檢法宋御史臺主簿二員熙寧十年改主簿作檢法各一員繫長二同舉京官充元豐四年罷六月因黃履奏復置各一員元祐三年改檢法官為主簿紹聖二年因董厚逸奏請復置紹興二年吕頥浩撥下部差官未幾復詔本臺辟時缺長二令曽統奏辟諌議大夫周保氏掌諌王惡司諌掌糾萬民之惡至秦置諌大夫掌論議無常員多至數十人屬郎中令漢武元狩中置宣帝選諌大夫出為郡守蕭望之選諌大夫至宣帝時出補郡守上疏日出諌官以補郡守朝無爭臣則不知過光武以諌大夫為諌議大夫無常員兩漢並屬光祿勳後周地官有保氏下大夫規諌於天子蓋比其任隋亦曰諌議大夫置七人屬門下省煬帝廢唐武德復置屬門下太宗時諌官入閣王圭嘗為諫議大夫太宗詔諫官隨中書門下及三品官入閣魏徴拜諫議大夫或至卧內計天下事禇遂良為諌議大夫太宗以為鯁亮有學龍朔改為正諌大夫後又置諌議大夫屬中書開元以來廢正諌大夫屬門下凡四人掌侍從規諌髙適明皇在蜀為諫議大夫負氣敢言肅宗時置兩省官十日一上對白居易與元稹書僕為諫官月請諫紙貞元四年德宗分為左右各置四員左𨽻門下右𨽻中書陽城德宗召拜右諌議大夫八年論裴延齡誣陸贄上疏慷慨泣下罷裴延齡穆宗召費文言為諌議大夫羣指稱允栁公權論事不阿帝以為有諫諍風可居諫大夫宋承五代之弊官失其守故官職差遣離而為三官裁以定俸入耳而不親職諌議大夫司諌正言皆須别降敕許赴諌院供職者方為諌官亦有領他職而不預諌諍者其由他官領者帶知諌院以兩省官充掌供奉諌諍凡朝廷闕失大則廷議小則上封時雖除諌官而未置諌院明道元年陳執中為諌官屢請置院於是以門下省為諌院徙舊省於左掖之西置諌院始此田錫遷諫議大夫真宗見之色必莊嚴景祐三年詔曰左右諫議大夫司諫正言咸預軒輊之列是為耳目之官景祐四年姚仲孫言諫議大夫居諫官之上慶厯三年田况每諌官日奉朝請則可以日聞朝廷之事况每日赴內朝元豐正名左右散騎常侍各一人既闕不除而左右諌議大夫遂為諌垣之長專言責焉左𨽻門下右𨽻中書同掌規諫諷諭凡朝政闕失任用他司有失皆得諌正王安石入司政事孫莘老李公擇居諫職二人請舉行太宗令諫官入閣事安石不可日是又益兩參知政事元豐七年諫議大夫趙彥若言事詔降彥若一官云朝廷自修復官政小大羣司皆有職守彥若輒侵法守論事不可不懲元祐元年王巖叟言近降旨兩省諫官出入各異勿與給事中中書舍人通事欲隔限諌官不使在政事之堂恐知本末數論列耳詔諌官直舍仍舊建炎中興始詔諌議大夫不𨽻兩省别置於後省之側許與兩省官相見議事紹興元年詔中書門下後省諌院官吏並依舊赴三省內元置局處供職司諌正言唐武后垂拱中置左右補缺左右拾遺掌供奉諷諌開元以來尤為清選左屬門下右屬中書宋端拱元年改左右補缺為左右司諌左右拾遺為左右正言是時太宗欲令諌官修職故詔改其官後亦有兼他官不供諌職者元豐官制左右司諌各一人正七品左右正言各一人從七品同掌規諌諷諭分𨽻兩省中興之初詔不𨽻兩省紹興三年復淳熙十五年用林栗請於正言司諌外增置補缺拾遺各一人專職諌諍不許彈擊光宗即位省之司諌宋朝咸平中种放對便殿尋授左司諌真宗曰賞一逸人可勸天下明道中執政除親舊二人為正言司諌上謂曰祖宗法制臺諌官必出自宸若大臣自除則大臣過失無敢言補闕韋溫為補闕時宋申錫被誣溫昌言曰吾輩諌官豈避一時之雷電而致聖君賢相蒙蔽惡之咎耶鄭餘慶子浣為右補闕獻疏切直至憲宗遂遷舍人韋處厚擢左補闕帝曰韋處厚上疏其言切直顧人未知爾中外推其精密文宗言宰臣曰太宗得魏徴採拾缺失今得魏謨命授左補闕正言荆公上田正言書今聮諌官朝夕天子耳目行事即一切是非無不可言至道元年和㠓遷右正言獻歌詩稱旨拾遺唐白居易上疏蒙恩授臣左拾遺謹按六典其選甚重其秩甚卑蕭嵩為左拾遺表薦張鎬為拾遺不數年出入將相陳子昻為右拾遺上疏陳事詞皆典美右拾遺張方回每朝政有失抗論昂然進不懼死史館史官自黃帝有之夏商大史夏終古商髙勢周大史小史內史外史而侯國亦置史秦有太史令漢武帝始置以司馬談為之遷嗣宣帝以其官為令行太史公文書修撰職以他官領於是太史官惟知占候而已王莽置柱下五史後漢至隋唯魏明太和中史職𨽻中書其餘多𨽻祕書唐武德四年始置修文館𨽻門下省九年改為𢎞文館神龍元年改為昭文館中間更易不一至開元中則復為𢎞文館也貞觀中建史館於禁中專掌國史至開元七年於乾元殿東廊寫四部書置刋定官以麗正殿為修書所十二年召學士張説等宴於是為集賢即麗正殿也以修書所為集賢殿書院三館之名肇於此矣自此集賢昭文置大學士史館置監修國史皆以宰相兼領之又置學士直學士修撰直館校理之職亦以他官領之其昭文館𨽻門下省史館寓於集賢尚未合為一梁遷都初舊制未備至正明中始以今古長慶門東北小屋十數間為三館即所廢四館是也湫隘卑喧轍道出於其旁每受詔所撰述即移於他所以成之訖太祖朝以經營四方未暇改作太宗因幸故館厯覽舊址顧左右曰豈所以待天下之賢俊耶即日詔有司度左升龍門北車府地為三館棟宇之制皆上所親授輪奐壯麗冠於內庭又於四序啓便門以備行幸於是盡遷三館之書分於兩廊貯焉東廊為昭文書庫南廊為集賢書庫西廊凡四庫分經史子集四部為史館書庫初乾德中平蜀得書萬三千卷開寶中平吳又得書二萬卷參以舊書分為八萬卷凡六庫書皆以類相從簡䇿府翕然一變矣永熙太宗寶録宋監修國史一人以宰相為之修撰直館檢討無常員修撰以朝官充直講檢討以京官以上充掌修日厯及典司圖籍之事凡國史别置院於宣徽北院之東藏之謂之編修院東京記云俗呼為史院天聖修真宗史欲重其任降敕宰相為提舉參政樞副為修史其同修史則以殿閣學士以上為之編修官以三館袐閣校理以上及京官充史畢即停元豐改官制日厯𨽻國史案每修前朝國史實録則别置實録院以首相提舉翰林以上為修國史侍從官為同修史庶官為編修官實録院提舉官如國史從官為修撰官餘官為檢討中興時即祕書省建史館以修神宗哲宗實録選本省官兼檢討校勘以侍從官充修撰紹興初又移史館於省之側别為一所以增重其事至九年始修徽宗實録乃命史館開實録院宰相監修但提大綱檢討官搜閲校對惟修撰實專史職只據所送到時政記唐長夀中姚璹請仗下所言宰相實録號時政記自璹始五代中書樞密院皆置太平興國中蘇易簡為參政自是中書皆參政編録端拱以後樞密院事皆送中書同修為一書及王欽若等始乞别撰不關中書直送史館起居注漢武帝有禁中起居注自魏至晉起居之職掌於著作其後亦命近臣主掌其事後至魏始置起居令史每行幸宴會則在御座左右記録帝言及賓客語後又别置起居注二人北齊有起居注二人隋朝置起居舍人二人以掌內史唐朝起居注之官𨽻於門下顯慶中即與舍人屬兩省每皇帝御殿即左右史夾香案分立於殿下螭頭之側和筆濡毫皆就螭頭之一處有命則臨陛俯聽對而書之凡典禮文物册命啓奏臣僚薨免懲惡勸善之事悉載於起居注季冬則授於史官以俟筆削元和中詔有事可備勸戒合紀述者委其自承旨宰相宣示左右起居令其不録仍作舊例季冬送於史館文宗太和中起居郎起居舍人凖故事入閣日齎紙筆立於螭頭以記言動開延英召大臣論事亦然宋朝淳化中張泌請别置起居院及左右史之職記言動為起居注詔從其請尋以周翰掌起居郎李謙掌起居舍人事銓次其事排以日月謂之日厯詳見日厯所門提舉乾興元年命司徒監修國史馬拯專修提舉監修天聖中宰臣王曽提舉監修真宗實録兩朝史時王旦未領監修故特授詔已監修而無再授敕為提舉蓋一時之制也監修國史國朝舊以宰相為之修日厯也故常帶入銜若先朝正史則别置編修院宰相為提舉紹興中詔國史院宰臣提舉乾道初詔參政虞允文兼提舉修三朝國史中興以來參政兼提舉自此始監修北齊詔魏收撰史又詔髙隆之總監之書名而已唐太宗以宰相監修國史及以他官兼領房玄齡為監修而給事中許敬宗兼唐制宰相四人內一人帶監修宋從唐制史館有監修皆宰相領故事宰相兼領皆內降旨處分乾德初以趙普兼監修止用敕非舊典也開寶中薛居正以參政監修自後參政亦有管勾修國史者不常置至道中修太宗實録宰臣吕端雖帶監修國史而不預焉其後重修太祖實録遂詔吕端等同修端罷相李沆繼成焉景德中監修國史畢士安卒參政王旦權領史館實為監修國史之職慶厯中吕夷簡罷相帶監修國史優老臣也修撰唐令狐德棻請修近代史遂命修撰名始於此唐史館修撰四人掌修國史宋從唐制史館有修撰以他官領取最上一員判館事故事史館每月撰日厯皆判館與修撰官直館分季撰其後止修撰官及判館撰次祥符中以髙綽為史館修撰綽即王欽若所引不令修纂止令權判吏部銓自是五品以上方掌修撰天聖中石中立充史館修撰有司引綽例亦不修日厯乾興初李準等言修撰官舊四人今只二人望擇館閣官二員充編修官遂詔王舉正李淑同編修元豐國史𨽻祕書元祐中就門下置局紹聖復還祕書閣舊有修撰官至是改為修國史以尚書翰林充同修以侍郎以下充紹興中以修神宗哲宗穆宗正史置修史一人同修一人編修二人檢討淳化中以郭延澤董元亨為史館檢討至和中詔今後檢討不得舉試館職嘉祐中韓琦奏史記日厯未修者積十餘年今將修先朝實録而日厯未備檢討缺官詔以吕夏卿韓維兼史館檢討羣書考索後集卷六
