body:
  text: 羣書考索卷六十五宋章如愚撰地理門田制類宣公履畝宣公十五年初稅畝注公田之法十取其一今又履其餘畝復十收其一滕文公問井地滕文公使畢戰問井地孟子對曰經界不正則井地不均井地不均則穀祿不平於是請野九一而助國中什一使自賦魏文侯教民力田李悝為魏文侯盡地力之教而田是富秦孝公廢井田孝公用商鞅以三晉地狹人貧秦地廣人寡故草不盡墾地利不盡出於是誘三晉之人務本於內使秦人應敵於外故廢井田開阡陌任其所耕不限多少孝公十二年之制數年之間國富兵強用商君壞井田開阡陌急耕戰之賞雖非古道猶能以務本之故傾鄰國而雄諸侯然王制遂滅僭差旡度庶人之富者纍巨萬而貧者食糟粕有國強者兼州域而弱者喪社稷漢因秦制髙祖因秦之制旡復古法建都之初召天下名族與之關中田宅蕭何為相請苑為民田而下獄文帝開籍田文帝因仍除租勸農之詔旡嵗旡之然豪強占田逾多其賦大半官收百一之稅而輸豪強大半之賦官惠擾於三代豪強酷於亡秦不正其本而除田租適以資富強也孝文時民近戰國多背本趍末賈誼勸上驅人歸農帝感誼言始開籍田躬耕以勸百姓朝錯曰農夫五口之家其服役者不下二人其能耕者不過百畝百畝之收不過百石春耕夏耘秋穫冬藏伐薪樵治官府給徭役春不得避風塵夏不得避暑熱秋不得避陰雨冬不得避寒凍四時之間亡日休息又私自送往迎來弔死問疾養孤長幼在其中勤苦如此尚復被水旱之災急政暴虐賦斂不時朝令而暮改當其有者半價而賣亡者取倍稱之息於是有賣田宅鬻子孫以償債者矣方今之務莫若使民務農而已矣欲民務農在於貴粟貴粟之道在於使民以粟為賞罰帝從之其後務敦農本倉廩充實景帝徙民寬地孝景元年制曰間者嵗比不登民多乏食夭絶天年朕甚痛之郡國或地磽狹無所農桑孳畜或地饒廣薦草莽水泉利而不得徙其議民欲徙寬大地者聽之後元三年詔曰農天下之本也黃金珠玉飢不可食寒不可衣以為幣用不識其終始間嵗或不登意為末者衆農民寡也其令郡國務勸農桑益種植可得衣食物武帝限田代田仲舒說上曰秦用商鞅之法改帝王之制除井田民得買賣富者田連阡陌貧者亡立錐之地漢興循而未改古井田法雖難卒行宜少近古限民名田以贍不足塞并兼之路然後可善治也竟不能用元狩三年遣謁者勸種宿麥舉吏人能假貸貧人者以名聞及末年帝悔征伐之事乃封丞相田千秋為富民侯下詔曰方今之務在於力農以趙過為搜粟都尉過能為代田一畝三􅎌嵗代處故曰代田古法也后稷始􅎌田以二耜為耦廣尺深尺曰􅎌長終畝一畝三􅎌一夫三百􅎌而播種於􅎌中苗生葉以上稍耨隴草因隤其土以附苗根故其詩曰或耘或耔黍稷擬擬耘除草也耔附根也言苗稍壯每耨輒附根比盛暑隴盡而根深能風與旱故擬擬而盛也其耕耘下種田器皆有便巧率十二夫為田一井一屋故畝五頃用耦犁二牛三人一嵗之收常過縵田畝一斛以上善者倍之過使教田太常三輔大農置工巧奴與以人從事為作田器二千石遣令長三老力田及里父老善田者受田器學耕種養苗狀民或苦少牛旡以趍澤故平都令光教過以人挽犁過奏光以為丞教民相與庸挽犁率多人者田日三十畝少者十三畝以故田多墾闢過試以離宫卒田其宫壖地課得穀皆多其旁田畝一斛以上令命家田三輔公田又教邊郡及居延城是後邊城河東𢎞農三輔太常民皆便代田用力少而得穀多昭帝流民墾田孝昭時流民稍還田野墾闢頗有畜積宣帝以公田假流民孝宣帝地節三年詔曰郡國宫館勿復修治流民還歸者假公田貸種食元帝假民田地孝元初元元年以三輔太常郡國公田及苑可省者振貧民江海陂湖園池屬少府者以假貧民勿租賦建昭五年詔曰方春農桑興百姓戮力自盡之時也故是月勞農勸桑旡使後時今不良之吏覆按小罪徵召證按興不急之事以妨百姓使失一時之作亡終嵗之功公卿其明察申敕之成帝時兼并者多孝成帝之時張禹占鄭白之田四百餘頃它人兼并者類此而人彌困哀帝限名田孝哀即位師丹輔政建言古之聖王莫不設井田然後治乃可平孝文皇帝承亡周亂秦兵革之後天下空虛故務勸農桑帥以節儉民始充實未有兼并之害故不為民田及奴婢為限今纍世承平豪富吏民資數巨萬而貧弱逾困蓋君子為政貴因循而重改作所以有改者將以救急也亦未可詳宜略為限天子下其議丞相孔光大司空何武奏請諸侯王列侯皆得名田國中列侯在長安公主名田縣道及關內侯吏民名田皆毋過三十頃諸侯王奴婢二百人列侯公主百人關內侯吏民三十人期盡三年犯者沒入官時田宅奴婢賈為减賤丁傅用事董賢隆貴皆不便已詔書且須後遂寢不行平帝定墾田孝平元始元年置大司農部丞十三人人部一州勸農桑二年定墾田八百二十七萬五百三十頃蓋紀漢盛時之數王莽更名王田王莽篡位下令曰古者設井田則國給人足而頌聲作此唐虞之道三代所遵行也秦為旡道廢聖制廢井田是以兼并起貪鄙生強者規田以千數弱者曽旡立錐之居於是更名天下田曰王田奴婢曰私屬皆不得賣買其男口不盈八而田過一井者分餘田與九族鄰里鄉黨故無田今當受田者如制度敢有非井田聖制無法惑衆者投諸四裔於是農商失業食貨俱廢百姓涕泣於市道坐賣買田宅奴婢自諸侯卿大夫至于庶人抵罪者不可勝數經二年餘中郎區博諫曰井田雖聖王法其廢已久周道既衰而人不從秦順人心改之可以獲大利故滅廬井而置阡陌遂王諸夏訖今海內未厭其弊今欲違人心追復千載絶跡雖堯舜復生而無百年之漸不能行也莽知人愁乃許買賣其後百姓日以凋弊光武檢覆墾田後漢之初百姓虛耗率土遺黎十才一二光武十五年詔下州郡檢覆墾田頃畝及戶口年紀河南尹張伋及諸郡守十餘人坐度田不實下獄死順帝定墾田順帝建康元年定墾田六百八十五萬六千二百七十頃五十六畝九十四步兩漢揔論漢髙帝以來不過十五稅一其後稍稍變更逮惠帝乃復其故文帝二年令民半出田租自是三十稅一武帝雖頗出地賦以給用度而獨田租無所增建武六年詔郡國收田租三十稅一如舊制其後仲長統論曰今不循古法規為輕賦一方有警將如之何二十稅一其名曰貊况三十稅一乎以是而推當是文景之法世祖中興之後復舉而行終漢之衰無復改名晉武帝占田之制晉武帝泰始八年司徒石苞奏州郡農桑未有殿最之制宜增掾屬令史有所巡察帝從之苞既明勸課百姓安之平吳之後有司奏王公以國為家京城不宜復有田宅未暇作邸當使城中有往來之處近郊有芻藁之田今可限之國王公侯京城得有宅一處近郊田大國十五頃次國十頃小國七頃城內旡宅城外有者皆聽留之男子一人占田七十畝女子三十畝其丁男課田五十畝丁女二十畝次丁男半之女則不課其官第一品五十頃每品減五頃以為差第九品十頃而又各以品之髙卑蔭其親屬多者及九族少者三代宗室國賔先賢之後士人子孫亦如之而又得蔭人以為衣食客及佃客量其官品以為差降宋武帝定山湖之禁宋孝武帝大明初羊希為尚書左丞時揚州刺史西陽王子尚上言山湖之禁雖有舊科人俗相因替而不奉熂山封水保為家利自頃以來頽弛日甚富強者兼領而占貧弱者薪蘇旡託至漁採之地亦又如兹斯實害理之深弊請損益舊條更申恆制有司檢壬辰詔書擅占山澤強盜律論贓一丈以上皆棄市希以壬辰之制其禁嚴刻事既難遵理與時弛而占山封水漸染復滋更相因仍便成先業一朝頓去易致怨嗟今更刋革立制五條凡是山澤先恆熂爈種竹木薪果為林仍及陂湖江海魚梁鰌􅀢常加工修作者聽不追舊官品第一第二品聽占山三頃第三第四品二頃五十畝第五第六品二頃第七第八品一頃五十畝第九品及百姓一頃皆依定格條上資簿若先已占山不得更占先占足若非前條舊業一不得禁有犯者水土一尺以上並計贓依常盜論除晉咸康二年壬辰之科從之宋武帝墾起湖田時山陰縣人多田少孔靈符表請徙旡資之家於餘姚鄮鄞三縣墾起湖田帝令公卿博議咸曰夫訓農修政有國所同土著之人習玩日久如京師旡田不聞徙居他縣尋山陰豪族富室頃畝不少貧者肆力非為旡處又緣湖居人魚鴨為業小人習始既難勸之未易逺廢之疇方翦荆棘率課窮乏其事彌難資徙粗立徐行旡晚帝違衆議徙人並成良業宋文帝均田之制九年下詔給天下人田諸男夫十五以上受露田四十畝婦人二十畝奴婢依良丁牛一頭受田三十畝限四牛所授之田率倍之三易之田再倍之以供耕休及還受之盈縮人年及課則受田老免及身役則還田奴婢牛隨有旡以還受諸桑田不在還受之限但通入倍田分於分雖盈不得以充露田之數不足者以露田充倍諸初受田者男夫一人給田二十畝課蒔餘種桑五十樹棗五株榆三根非桑之土夫給一畝依法課蒔餘果及多種桑榆者不禁諸應還之田不得種桑榆棗果種者以違令論地入還分諸桑田皆為代業身終不還恆從見口有盈者無受無還不足者受種如法盈者得賣其盈不足者得買所不足不得賣其分亦不得買過所足諸麻布之土男夫及課别給麻田十畝婦人五畝奴婢依良皆從還受之法諸有舉戶老小殘疾無受田者年十五以上及疾者各授以半夫田年踰七十者不還所受寡婦守志者雖免課亦授婦田諸還受人田恆以正月若始受田而身亡及賣買奴婢牛者皆至明年正月乃得還受諸土廣人稀之處隨力所及官借人種蒔後有來居者依法封授諸地狹之處有進丁受田而不樂遷者則以其家桑田為正田分又不足不給倍田又不足家內人别減分無桑之鄉凖此為法樂遷者聽逐空荒不限異州他郡唯不聽避勞就逸其地足之處不得無故而移諸人有新居者三口給地一畝以為居室奴婢五口給一畝男女十五以上因其地分口課種菜五分畝之一諸一人之分正從正倍從倍不得隔越他畔進丁受田者恆從所近若同時俱受先貧後富再倍之田倣此為法諸逺流配謫無子孫及戶絶者墟宅桑榆盡為公田以供授受授受之次給其所親未給之間亦借其所親諸宰臣之官各隨廨給公田刺史十五頃太守十頃治中别駕各八頃縣令郡丞六頃更代相付賣者坐如律北齊給授田令依魏朝每年十月普令轉授成丁而授丁老而退不聽賣易文宣帝天保八年議徙冀定瀛無田之人謂之樂遷於幽州寬鄉以處之武成帝河清三年詔每嵗春月各依鄉土早晚課人農桑自春及秋男子十五以上皆營蠶桑孟冬布田畝桑蠶之月婦女十五以上皆營蠶桑孟冬刺史聽審考之優劣定殿最之科品人有人力無牛或有牛無人力者須令相便皆得納種使地無遺利人無游手又令男子率以十八受田輸租調二十充兵六十免力役六十六退田免租調京城四面諸方之外三十里內為公田受公田者三縣代遷戶職事官一品以下逮於羽林武賁各有差其外畿郡華人官第一品以下羽林武賁以上各有差職事及百姓請墾田者名為永業奴婢受田者親王止三百人嗣王二百人第二品嗣王以下及庶姓王百五十人正三品以上及皇宗百人七品以上八十人八品以上至庶人六十人奴婢限外不給田者皆不輸其方百里外及州人一夫受露田八十畝婦人四十畝奴婢依良人限數與者在京百官同丁牛一頭受田六十畝限止四牛每丁給永業二十畝為桑田其田中種桑五十根榆三根棗五株不在還受之限非此田者悉入還受之分土不宜桑者給麻田如桑田法後周創六官均田里後周文帝霸政之初創制六官司均掌田里之政令凡人口十以上宅五畝口七以上宅四畝口五以下宅三畝有室者田百四十畝成丁者田百畝隋文帝永業露田職分田公廨田墾田之制隋文帝令自諸王以下至於都督皆給永業田各有差多者至百頃少者至三十頃其丁男永業露田皆遵後齊之制並課樹以桑榆及棗其田宅率三口給一畝京官又給職分田一品者給田五頃至五品則為田三頃其下每品以五十畝為差至九品為一頃外官亦各有職分田又給公廨田以供用開皇九年任墾田千九百四十萬四千二百六十七頃開皇十二年文帝以天下戶口嵗增京輔及三河地少而人衆衣食不給議者咸欲就寬鄉帝乃發使四出均天下之田其狹鄉每丁才至二十畝老小又少焉至大業中天下墾田五千五百八十五萬四千四十頃唐口田分業唐開元二十五年令田廣一步長二百四十步為畝百畝為頃丁男給永業田二十畝口分田八十畝其中男年十八以上亦依丁男給老男篤疾廢疾各給口分田四十畝寡妻妾各給口分田三十畝先永業者通充口分之數黃小中丁男女及老男篤疾廢疾寡妻妾當戶者各給永業田二十畝口分田二十畝應給寬鄉並依所定數若狹鄉所受者减寬鄉口分之半其給口分田者易田則倍給其永業田親王百頃職事官正一品六十頃郡王及職事官從一品各五十頃國公若職事官正二品各四十頃郡公若職事官從二品各三十五頃縣公若職事官正三品各二十五頃職事官從三品二十頃侯若職事官正四品各十四頃伯若職事官從四品各十頃子若職事官正五品各八頃男若職事官從五品各五頃上柱國三十頃柱國二十五頃上護軍二十頃護軍十五頃上輕車都尉十頃輕車都尉七頃上騎都尉六頃騎都尉四頃驍騎尉飛騎尉各八十畝雲騎尉武騎尉各六十畝其散官五品以上同職事給兼有官爵及勳俱應給者唯從多不並給若當家口分之外先有地非狹鄉者並即回受有賸追收不足者更給諸永業田皆𫝊子孫不在收受之限即子孫犯除名者所承之地亦不追每畝課種桑五十根以上榆棗各十根以上三年種畢鄉土不宜者任以所宜樹充所給五品以上永業田皆不得狹鄉受任於寬鄉隔越射旡主荒地充其六品以下永業即聽本鄉取還公田充願於寬鄉取者亦聽應賜人田非指的處所者不得狹鄉給其應給永業人若官爵之內有解免者從所解者追其除名者依口分例給自外及有賜田者並追若當家之內有官爵及少口分應受者並聽回給有賸追收其因官爵應得永業未請及未足而身亡者子孫不合追請也諸襲爵者唯得承父祖永業不合别請若父祖未請及未足而身亡者減始受封者之半給其州縣縣界內所有部受田悉足者為寬鄉不足者為狹鄉諸狹鄉田不足者聽於寬鄉遙受應給園宅地者良口三口以下給一畝每三口加一畝賤口五口給一畝每五口加一畝並不入永業口分之限其京城及州縣郡郭下園宅不在此例諸京官文武職事職分田一品一十二頃二品十頃三品九頃四品七頃五品六頃六品四頃七品三頃五十畝八品二頃五十畝九品二頃並去京城百里內給其京兆河南府及京縣官人職分田亦准此即百里外給者亦應諸州及都護府親王府官人職分田二品一十二頃三品一十頃四品八頃五品七頃六品五頃七品四頃八品三頃九品二頃五十畝鎮戍關津嶽瀆及在外監官五品五頃六品三頃五十畝七品三頃八品二頃九品一頃五十畝三衛中郎將上府折衝都尉各六頃中府五頃五十畝下府及郎將各五頃上府果毅都尉四頃中府三頃五十畝下府三頃上府長史别將各三頃中府下府各二頃五十畝親王府典軍五頃五十畝副典軍四頃千牛備身左右太子千牛備身各三頃諸軍上折衝府兵曹二頃中府下府各一頃五十畝其外軍校尉一頃二十畝旅師一頃隊正副各八十畝皆於領側州縣界內給其校尉以下在本縣及去家百里內領者不給諸驛封田皆隨近給每馬一匹給地四十畝若驛側有牧馬之處匹各減五畝其𫝊送馬每匹給田二十畝諸庶人有身死家貧旡以供葬者聽賣永業田即流移者亦如之樂遷就寬鄉者并聽賣口分諸買地者不得過本制雖居狹鄉亦聽依寬制其賣者不得更請凡賣買皆須經所部官司申牒年終彼此除附若旡文牒輒賣買財沒不追地還本主諸以工商為業者永業口分各減半給之在狹鄉者並不給諸因王事沒落外藩不還有親屬同居其身分之地六年乃追身還之日隨便先給即身死王事者其子孫雖未成丁身分地勿追其因戰傷及篤疾廢疾者亦不追減聽終其身也諸田不得貼賃及質違者財沒不追地還本主若從逺役外任旡人守業者聽貼賃及質其官人永業田及賜田欲賣及貼賃者皆不在禁限諸給口分田務從便近不得隔越若因州縣改易𨽻地入他境及犬牙相接者聽依舊受其城居之人本縣旡田者聽隔縣受又田令在京諸司及天下州府縣監折衝府鎮戍關津嶽瀆等公廨田職分田各有差諸職分陸田限三月三十日稻田限四月三十日以前上者並入後人以後上者入前人其麥田以九月三十日為限若前人自耕未種後人酬其功直已自種者准租分法其價六斗以下者依舊定以上者不得過六斗並取情願不得抑配親王出藩者給地一頃作園若城內無可開拓者於近城便給如無官田取百姓地充其地給好地替天寶中應受田一千四百三十萬三千八百六十二頃十三畝周世宗均田五代周世宗嘗夜讀元稹均田圗慨然嘆曰此致治之本也王政自此始乃詔頒其圗使吏民先習知之期以一嵗大均天下之田本朝田制五代方鎮割據多於舊賦之外重於取民藝祖悉皆蠲止其間或有未均隨事敷誥罷廣南受租之大斗開寶四年之詔也輕西川之折估則開寶六年之詔也其他如勸課農桑蠲租减賦募民墾田與夫命官行均田諸道戒飭諸州物非土宜不得折配而又崇儉以化俗省費以養民斯民新脫干戈之苦而獲沾王者至仁之化雖一時田制未能盡如古者然民安隴畝得以養生送死則熙熙乎泰和成周之治也列聖嗣守此意不替百年之間海內富庶太祖建隆初分命常參官往諸道均田太宗謂宰相曰井田之制實經國之要道後世為天下者違井田則貧富不均朕深念黎庶雖井田之制不可卒復因時創法漸均貧富則朕别有規制終當行之以安四海祥符六年侍御史張廓言天下曠土甚多請遣使括責真宗曰此事未可遽行今天下豪富之家田多租少貧弱之家地薄賦重須漸次改定方仁宗之在御始詔三司定奪臣僚莊田頃畝之數以抑兼并又詔流民能耕廢田者三年而後賦又詔州縣長吏能招流亡而墾田者計畝而議賞聖意蓋可想蓋自王安石創立新法元老大臣爭之而不得一時老成重厚之人皆不為之用則不免激而用新進果鋭之士用散青苗也講淤田也行募役也結保甲也頒方田也農民自是無安靖之日矣然觀熙寧中詔應諸州有以稅米令民折納見錢者官吏皆抵罪而漕臣亦得奪官神宗愛民之意本自若此而安石激於一時言者之論益堅其意而有失神宗之初心吕惠卿之徒乘間竊出掊尅苛細利析秋毫往往亦非安石意然則安石得罪於神宗而惠卿之徒又得罪於安石者也徽宗宣和中下方田令髙宗紹興元年三月詔諸路閒田甚多令守令各以所宜措畫或官耕或豫民或假貸以取贏或召募以共利行經界法諸儒論古今田制荀悅論限田古者十一而稅以為天下之中正今漢人田或百一而稅可謂輕矣然豪富強人占田踰多其賦大半官收百一之稅而人輸豪強大半之賦孝武時董仲舒言宜限人名田至哀帝乃限人名田不得過三十頃雖有其制卒難施行然三十頃又不平矣且夫井田之制不宜行於人衆之時田廣人寡茍可為也然欲廢之於寡立之於衆土地布列在豪强卒而革之並有怨心則生紛亂制度難行若髙祖初定天下光武中興之時人衆希少立之易矣陸贄論限田古者一夫受田不過百畝欲使人不廢田業無曠耕今富者萬畝貧者無容足之居依托强家服勞終嵗常患不充有田之家坐食租稅京畿田畝稅五升私家收租一碩官取一私取十宜為占田條限此安富恤貧之善經也崔實言墾田政論曰今青徐兖冀人稠土狹不足相供而三輔左右及涼幽州內附近郡皆土曠人稀厥田宜稼悉不肯墾今宜復遵故事可徙貧民不能自業者於寬地此亦開草闢土振人之術也牛僧孺論均田昔周人井田之制逺而不可復漢氏名田之數疏而未可行今版籍不備遷徙無制富者得以専其利貧者不能専其業於是編戶逸為游惰良田併於豪家誠能詔天下官吏隨人所在皆備貢籍來者根其所從去者審其方向居者詳其業疾者籌其數時貢籍於縣嵗貢籍於州州與縣相聞然後頒限田之科重兼并之律使公侯卿士方伯連帥下及于豪商大賈不得廣併吞以専厚利若然則均田之事寓其間矣營田屯田募民以耕謂營田部兵以耕謂屯田自漢武經營西振初置校尉屯田渠黎而屯田之名立至昭帝始元中發習戰射士詣朔方調將吏屯田于張掖宣帝神爵中遣趙充國擊先零願罷騎留屯大獲地利遂平先零魏武以經略四方而苦軍食不足棗祗募百姓屯田于許下得穀百萬斛蜀諸葛亮雜耕渭濵軍無私焉司馬宣王督諸軍伐吳欲廣田役乃使鄧艾屯田壽春晉羊祜守襄陽減戍邏以墾田八百頃東晉應詹請令東吳流民耕江西曠田穆帝時荀羡屯田東陽後魏文帝籍郡縣戶十分之一以為屯田北齊沿邊營置屯田隋文帝以邊上轉輸勞弊長城以北令趙仲卿大興屯田唐開元中令諸屯𨽻司農二十頃為一屯𨽻州鎮者五十頃為一屯天寶八年天下屯凡收百九十一萬三千九百六十石自唐末中原宿兵皆置營田以耕曠土又募髙資使輸課佃之戶部置官領之周太祖時張凝請罷戶部營田務從之以其民𨽻州縣其田廬牛器並賜見田者為永業悉除牛課蓋牛死而租不除民以為苦故有是令本朝諸路惟襄定唐三州有營田務其知州并兼制營田自岐溝關君子館敗衄之後農夫失業於是以陳恕為河北轉運兼西路招置營田樊知古為河東轉運兼東路招置營田此端拱二年也景德二年詔沿邊州軍長吏兼制置營田天聖四年廢襄唐二州營田務令召無産業人請佃每畝輸稅五分轉運使奏襄州務自興置以來至天聖三年所得課則比較支鹽官耕共軍員所受及死損官并諸色費用之外計侵用官錢四萬餘唐州務計侵用官錢萬四千慶歷中詔以陜西用兵軍儲未備陜西宜置營田務又令逐路都稅官司經營田以助邊計初天聖中詔流民耕廢田又詔長吏安輯流亡及墾闢荒田計畝又慶歷中歐陽公謂沿邊閒田人欲請佃者聽之司馬公請募民耕麟州田羣書考索卷六十五
