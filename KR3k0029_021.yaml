body:
  text: 羣書考索卷二十一宋章如愚撰文章門文章縁起類梁太常卿任昉彦升集六經素有歌詩誄箴銘之類尚書帝庸作歌毛詩三百篇左傳叔向貽子産書魯哀公孔子誄孔悝鼎銘虞人箴此等自秦漢以来聖君賢士沿著為文章名之始故因暇録之凡八十五題抑以新好事者之目云耳三言詩晉散騎常侍夏侯湛所作四言詩前漢楚王傅韋孟諫楚夷王戊詩五言詩漢騎都尉李陵與蘇武詩六言詩漢大司農谷永作七言詩漢武帝柏梁殿連句九言詩魏髙貴鄉公所作賦楚大夫宋玉所作歌荆軻作易水歌離騷楚屈原所作詔起秦時璽文秦始皇傳國璽筞文漢武帝問三王筞文表淮南王安諫伐閩表讓表漢東平王蒼上表讓驃騎將軍上書秦丞相李斯上始皇書書漢太史令司馬遷報任少卿書對賢良策漢太子家令晁錯上疏漢中大夫東方朔啓晉吏部郎山濤作選啓奏記漢江都相董仲舒詣公孫𢎞奏記牋漢䕶軍班固說東平王牋謝恩漢丞相魏相請公車謝恩令漢淮南王有謝羣公令奏漢枚乗奏書諫吳王濞駮漢侍中吾丘夀王駮公孫𢎞禁民不得挾弓弩議論漢王褒四子講徳論議漢韋𤣥成奏罷郡國廟議反騷漢揚雄作彈文晉冀州刺史王深集雜彈文薦後漢雲陽令朱雲薦伏湛教漢京兆尹王尊出教吿屬縣封事漢魏相奏霍氏專權封事白事漢孔融主簿作白事書移書漢劉歆移書讓太常博士論左氏春秋銘秦始皇登會稽山刻石銘箴漢揚雄九州五官箴封禪書漢文園令司馬相如讚司馬相如作荆軻讚頌漢王褒聖主得賢臣頌序漢沛郡太守作鄧后序引琴操有箜篌引志録揚雄作記揚雄作蜀記碑漢恵帝四皓碑碣晉潘尼作潘黄門碣誥漢司𨽻從事馮衍作誓漢蔡邕作艱誓露布漢賈𢎞為馬超伐曺操作檄漢丞相祭酒陳琳作檄曺操文明文漢泰山太守應劭樂府古詩對問宋玉對楚王問傳東方朔作非有先生傳上章後漢孔融上章謝大中大夫解嘲揚雄作訓漢丞相主簿繁欽祠其先主訓辭漢武帝秋風辭㫖後漢崔駰作達㫖勸進魏尚書令荀攸勸魏王進文喻難漢司馬相如喻巴蜀并難蜀父老文誡後漢杜篤作女誡弔文賈誼弔屈原文告魏阮瑀為文帝作舒告傳贊漢劉歆作烈女傳贊謁文後漢别部司馬張超謁孔子文祈文後漢傅毅作髙闕祈文祝文董仲舒祝日蝕文行狀漢丞相倉曺傅朝幹作楊元伯行狀哀策漢樂安相李尤作和帝哀策哀頌漢會稽東部尉張紘有陶侯哀頌墓志晉東陽太守殷仲文作從弟墓誌誄漢武帝公孫𢎞誄悲文蔡邕作悲温舒文祭文後漢車騎郎杜篤作祭延鍾文哀詞漢班固梁氏哀詞挽詞魏光禄勲繆襲七發漢枚乗作七發離合詩孔融作四言離合詩連珠揚雄作篇漢司馬相如作凡將篇歌詩漢枚臯作麗人歌詩遺命晉散騎常侍江統作圖漢河間相張人作𤣥圖勢漢濟北相崔瑗作草書勢約漢王褒僮約右文章縁起一卷梁新安太守樂安任公書也按隋經籍志公文章縁始一卷有録無書郡之為郡且千嵗守將不知幾人獨公至今有名字並城四十里曰村曰溪皆以任著旁有僧坊亦借公為重則遺愛在人盖與古循吏比後公六百年而造為州嘗欲㑹稡遺文刻識木石以慰邦人無窮之思而不可得三館有集六卷悉見蕭氏歐陽氏類書中疑後人掇拾傳著於所𫝊亡益獨是書僅存世所𫝊墓誌皆漢人大𨽻此云始於厝日盖丘中之刻當其時未露見也洪适題評文類文章者孔子曰煥乎其有文章子貢曰夫子之文章可得而聞也盖詩言志歌永言不歌而誦謂之賦古者登髙能賦山川能祭師旅能誓喪紀能誄作器能銘則可以為大夫矣三代之後篇什稍多又訓誥宣于邦國移檄陳于師旅箋奏以申情理箴誡用弼違邪讚誦美於形容碑銘彰於勲徳諡冊褒其言行哀弔悼其淪亡章表通於下情牋疏陳於宗敬論議平其理駮難考其差此其畧也易賁卦文明以止人文也注云止物不以威武而以文明人之文也觀乎天文以察時變觀乎人文以化成天下象曰山下有火賁君子以明庶政無敢折獄注云處賁之時止物以文明不以威刑故君子以明庶政而無敢折獄疏云觀乎人文以化成天下者言聖人觀察人文則詩書禮樂之謂當法此教而化成天下論語曰為命裨諶草創之世叔討論之行人子羽修飾之東里子産潤色之國語能文者必得天地盖文之數凡十有一天六地五之數也其數有以合於天故得天其數有以合於地故得地經之以天緯之以地經緯不爽文之象也揚子法言曰或問屈原智乎曰如玉如瑩爰變丹青李斯注曰夫智者逹天命如玉如瑩磨而不磷今屈原放逐感激爰變雖有文采丹青之論耳史記曰雕龍奭談天衍鄒衍之文飾之若龍文故號雕龍枚臯王粲為文疾司馬相如左太沖為文遲其為當世膾炙一也陸機文成而作者欲焚筆王粲才髙作者皆閣筆潘岳謂夏侯湛之文温潤而見孝悌之性張說謂許景先之文豐美而得中和之氣可謂善觀文者也栁子厚之於文也未嘗敢以輕心掉之懼其剽而不留也未嘗敢以怠心易之懼其弛而不嚴也未嘗敢以昏氣出之懼其昩没而雜也未嘗敢以矜氣作之懼其偃蹇而驕也抑之欲其奥揚之欲其明疏之欲其通亷之欲其節激而發之欲其清固而存之欲其重魏文帝典論曰文以氣為主氣之清濁有體不可力強而致王粲長於辭賦徐幹時有竒氣然粲匹也夫文本同而末異盖奏議宜雅書論宜理銘誄尚實詩賦欲麗此四科不同故能之者偏也斯七子者於學無所遺於辭無所假咸自騁騄驥於千里仰齊足而並馳王粲長於辭賦陳琳阮瑀之章表書記今之俊也魏文帝與吳質書仲宣獨自善於詞賦惜其體弱不足起其文至於所善古人無以逺過公幹有逸氣但未遒耳其五言詩之善者妙絶時人摯虞文章流别論曰今賦以事形為本以義正為助也王隠晉書曰阮籍見華鷦鷯賦以為王佐之才成公綏亦推華文義勝也曺植與楊修書曰劉季緒才不能逮於作者而詆訶文章掎摭利病抱朴子曰五典為笙簧三墳為金玉劉義慶世說曰孫興公曰三都二京五經之鼓吹曺植與楊修書曰孔璋之才不嫻詞賦而多自謂能與司馬長卿同風譬畫虎不成反為狗也陸士衡文賦曰於是沈詞怫恱若游魚銜鉤而出重淵之深其為物也多姿其為體也屢遷其會意也尚巧其遣言也貴妍暨音聲之迭代若五色之相宣陳琳答東阿王牋曰清詞妙句炎絶煥景譬猶飛為流星越山越海龍驥所不追况駑馬可得齊足哉傅𤣥敘連珠曰班固喻美詞壯文章𢎞麗最得其體也李充翰林論曰潘安仁之為文也猶翔禽之羽毛衣被之綃縠揚雄劇秦美新論曰昔司馬相如作封禪一篇以彰漢氏之休程曉與傅𤣥書曰文公詠周孔父述殷聲揚千載業傳後嗣梁簡文帝答張讚謝示集書少好文章於世五年矣竊嘗論之日月星辰山龍黼黻尚且著於𤣥象彰乎人事而况文辭可止謳謌可輟乎不為壯夫揚雄實小言破道非謂君子曺植亦小辨破言論之科則罪在不赦至如春庭落景轉蕙承風秋雨朝晴簷梧初下浮雲生野明月入樓時命親賓乍動嚴駕車渠屢酌鸚鵡驟傾伊昔三邊久留四戰胡霧連天征旗拂日時聞鳴笛遥聴塞笳或鄉思悽然或雄心慎薄是以沈吟短翰衲綴庸音寓目寫心因事而作文中子子謂文士之行可見謝靈運小人哉其文傲君子則謹沈休文小人哉其文冶君子則典鮑照江淹古之狷者也其文急以怨吳筠孔珪古之狂者也其文怪以怒謝莊王融古之纎人也其文碎徐陵庾信古之夸人也其文誕晉陸機傳制曰機雲文藻宏麗獨歩當時言論慷慨冠乎終古髙詞逺映如明月之垂光疊意迴舒若重巖之積秀千條析理則電折霜開一緒連文則珠流璧合其詞深而雅其義博而顯故逺超枚馬髙躡王劉百代文宗一人而已隋文學序江左宫商發越貴於清綺河朔詞義正剛重乎氣質氣質則理勝其辭清綺則文過其意理深者便於時用文華者宜於詠歌此其南北詞人得失之大較也王勃傳王勃楊盈川盧照鄰駱賓王天下稱王楊盧駱盈川曰吾愧在盧前恥居王後崔融與張說評勃等曰勃文章宏放非常人所及盈川照鄰可以企之說曰不然盈川文如瀉河酌之不竭優於盧而不減於王恥居後信然愧在前謙也開元中說與徐堅論近世文章說曰李嶠崔融薛稷宋之問之文如良金美玉無施不可富嘉謨如孤峯絶岸壁立萬仞濃雲鬱興震雷俱發誠可畏也若施於廊廟駭矣閻朝隠如麗服靚妆燕歌趙舞觀者忘疲若類之風雅則罪人矣堅問今世奈何說曰韓休之文如太羮𤣥酒有典則薄滋味許景先如豐肌膩理雖穠華可愛而乏風骨張九齡如輕縑素練實濟時用而窘邊幅王翰如瓊盃玉斚雖爛然可珍而多玷缺堅謂篤論云文學序李諤以屬文之家體尚輕薄遞相師效流宕忘反上書曰江左齊梁其弊彌甚遺理存異尋虚逐微競一韻之竒爭一字之巧連篇累牘不出月露之形積案盈箱唯是風雲之狀梁自大同之後雅道淪缺漸乖典則爭馳新巧簡文湘東啓其淫放徐陵庾信分路揚鑣其意淺而繁其文匿而彩詞尚輕險情多哀思隋文初統萬幾每念斵琱為璞發號施令咸去浮華然時俗詞鑣猶多淫麗唐陳子昂傳髙鍇權知貢舉文宗自以題畀有司錯以籍上帝詩侍臣曰比年文章卑弱今所上差勝於前鄭覃曰陛下矯革近制以正頽俗而鍇乃能為陛下得人帝曰諸領表奏太浮華且責掌書記以誡流宕李石曰古人因事為文今人以文害事懲弊抑末誠如聖制即以鍇為禮部侍郎閱二嵗頗得才實張昌齡傳昌齡以文自鳴舉進士為考功王師旦所絀太宗問其故答曰昌齡等華而少實其文浮靡非令器也取之則後生勸慕亂陛下風雅周庾信趙國公集序竊聞平陽擊石山谷為之調大夏吹筠風雲為之動與夫含吐性靈抑揚詞氣曲變陽春光迴白日豈得同年而語哉柱國趙國公發言為論下筆成章逸態横生新情掞起風雨爭飛魚龍各變方之珪璧塗山之會萬重譬以雲霞赤城之巖千文文參厯象即入天官之書韻步絲桐咸歸總章之觀論其壯也則鵬起半天語其細也則蟭巢蚊睫豈直熊羆朝上層城抱日月之輝光燄宵飛南斗觸蛟龍之氣昔者屈平宋玉始於哀怨之深蘇武李陵生於别離之代自魏建安之末晉太康以来彫蟲篆刻其體三變人人自謂握靈虵之珠抱荆山之玉矣公斟酌雅頌諧和律吕若使言乖節目則曲臺不顧聲出操縵則成均無取而遂得棟梁文囿冠冕詞林大雅扶輪小山承盖老泉上田樞密書洵退居山野自分永棄與世俗日踈闊得以大肆其力於文章詩人之優柔騷人之清深孟韓之温淳遷固之雄剛孫吳之簡切投之所嚮無不如意常以為董生得聖人之經其失也流而為迂鼂錯得聖人之權其失也流而為詐有二子之才而不流者其惟賈生乎惜乎今之世愚未見其人也上歐陽内翰書孟子之文語約而意盡不為巉絶斬刻之言而其鋒不可犯韓子之文如長江大河渾浩流轉魚黿蛟龍萬怪惶惑而抑遏蔽掩不使自露而人望見其淵然之光蒼然之色亦自畏避不敢迫視執事之文紆餘委備往復百折而條達疎暢無所間斷氣盛語極急言竭論而容與閑易無艱難勞苦之態此三者皆斷然自為一家之文也惟李翺之文其味黯然而長其光油然而幽俯仰揖讓有執事之態陸贄之文遣言措意切近的當有執事之實而執事之才又自有過人者盖執事之文非孟子之文韓子之文而歐陽子之文也東坡歐公集序宋興七十餘年民不知兵富而教之至天聖景祐極矣而斯文終有愧於古士亦因陋守舊論卑而氣弱自歐陽子出天下爭自濯磨以通經學古為髙以救時行道為賢以犯顔納諫為忠長育成就至嘉祐末號稱多士歐陽子之功為多嗚呼此豈人力也哉非天其孰能使之樂全先生文集序孔北海志大而論髙功烈不見於世然英偉豪傑之氣自為時所宗其論盛孝章郗鴻豫書慨然有烈丈夫之風諸葛孔明不以文章自名而開物成務之姿綜練名實之意自見於言語至出師表簡而盡直而不肆大哉言乎與伊訓說命相表裏非秦漢以来以事君為恱者所能至也常恨二人之文不見其全今吾樂全先生張公安道其庶幾乎鳬繹先生詩集序孔子曰吾猶及史之闕文也有馬者借人乗之今亡矣夫史之不闕文與馬之不借人也豈有損益於世者哉然且識之以為世之君子長者日以逺矣後生不復見其流風遺烈是以日趨於智巧便佞而莫之止是二者雖不足以損益而君子長者之澤在焉則孔子識之而况其足以損益於世者乎昔吾先君適京師與卿士大夫遊歸以語軾曰自今以往文章日工而道將敗矣士慕逺而忽近貴華而賤實吾已見其兆矣以魯人鳬繹先生之詩文十餘篇示軾曰小子識之後數十年天下無復為斯文者也先生之詩文皆有為而作精悍確苦言必中當世之過鑿鑿乎如五穀必可以療饑斷斷乎如藥石必可以伐病其遊談以為髙枝詞以為觀美者先生無一言焉論文吾文如萬斛泉源不擇地皆可出在乎地滔滔汩汩雖一日千里無難及其與石山曲折隨物賦形而不可知也所可知者常行於所當行常止於所不可不止如是而已矣其他雖吾亦不能知潁濱上樞密韓太尉書文者氣之所形然文不可以學而能氣可以養而致孟子曰我善養吾浩然之氣今觀其文章寛厚宏博充乎天地之間稱其氣之小大太史公行天下周覽四海名山大川與燕趙間豪俊交遊故其文疎蕩頗有竒氣此二子者豈嘗執筆學為如此之文哉其氣充乎其中而溢乎其貌動乎其言而見乎其文而不自知也李漢昌黎先生文集序先生生於大厯戊申幼孤隨兄播遷韶嶺兄卒鞠於嫂氏辛苦来歸自知讀書為文日記數千百言比壯經書通念曉析酷排釋氏諸史百子搜決無隠汗瀾卓踔奫泫澄深詭然而蛟龍翔蔚然而虎鳳躍鏘然而韶鈞鳴日光玉潔周情孔思千態萬貌卒澤於道徳仁義炳如也洞視萬古愍惻當世遂大拯頽風教人自為時人始而驚中而笑且排先生益堅終而翕然隨以定韓文公上襄陽于頔書足下負超卓之竒才蓄雄剛之俊徳渾然天成無有畔岸而又貴窮乎公相侔動乎樞極天子之丞諸侯之師故其文章言語與事相侔變化若雷霆浩汗若河漢正聲諧韶濩勁氣沮金石豐而不餘一言約而不失一辭其事信其理切孔子曰有徳者必有言信乎其有徳且有言也揚子雲言曰商書灝灝爾周書噩噩爾信乎其能灝灝而是以噩噩也答李翊書無望其速成無誘於勢利養其根而俟其實加其膏而希其光根之茂者其實遂膏之沃者其光曄仁義之人其言藹如也劉禹錫唐栁先生文集序八音與政通而文章與時髙下三代之文至戰國而病涉秦漢復起漢之文至列國而病唐興復起夫政寵而土裂三光五嶽之氣分太音不完故必混一而復大振初貞元中上嚮文章昭回之光下飾萬物天下文士爭執所長與時而奮粲然如繁星麗天而芒寒色正人望而敬者五行而已河東栁子厚斯人望而敬者歟栁子厚吳君文集序其為詩歌有交王公大人之義其為誄誌弔祭有孝恭慈仁之誠而多舉六經聖人之大㫖發言成章有可觀者楊評事文集後序文之用辭令褒貶導揚諷諭而已雖其言鄙野足以備於用然而闕其文采固不足以竦動時聴夸視後學立言而朽君子不由也故作者抱其根源而必由是假道焉作於聖故曰經述於才故曰文文有文道辭令褒貶本乎著述者也導揚諷諭本乎比興者也著述者流盖出於書之謨訓易之象繫春秋之筆削其要在於髙壯廣厚詞正而理備謂宜藏於簡冊也比興者流盖出於虞夏之詠歌殷周之風雅其要在於麗則清越言揚意美謂宜流於謡誦也答友人求文章書古今號文章為難足下知其所以難乎非謂比興之不足恢拓之不逺鑽礪之不工頗纇之不除也得之為難知之愈難耳茍或得其髙明探其深賾雖有蕪敗則為日月之蝕也大圭之瑕也曷足傷其明黜其寶哉且自孔氏以来兹道大闡家修人礪刓精竭慮者幾千年矣其間耗費簡札役用心神者其可數乎登文章之籙波及後代越不過數十人耳其餘誰不欲爭裂綺繡手攀日月髙視於萬物之中雄視於百代之下乎率皆縰曳而不克躑躅而不進大䠞思窮吞志而沒故其得之為難嗟乎道之顯晦幸不幸繫焉談之辨訥升降繫焉鑒之頗正好惡繫焉文之廣狹屈伸繫焉則彼卓然自得以奮其間者合乎否乎是未可知也而又榮古陋今者比肩疊跡大抵生則不遇死而垂聲者衆焉揚雄沒而法言大興馬遷生而史記未振彼之二才且猶若是况乎未甚聞著者哉固有文不傳於後祀聲遂絶於天下者矣故曰知之愈難而為文之士亦多漁獵前簡戕賊文史抉其意抽其華置齒牙間遇事蠭起大金聲玉耀誑聾瞽之人激一時之聲雖終淪棄而其奪朱亂邪為害己甚是其所以難也王荆公上邵學士書非夫誠發乎文文貫乎道仁思義色表裏相符者其孰能至於此哉因環列書室且欣且慶升有厚也公義之然也安石嘗患近世之文辭弗顧於理理弗顧於事以覈積故實為髙以雕繪語句為精新譬之擷竒花之英積而玩之雖光華馨采鮮縟可愛求其根柢濟用則蔑如也張右史答李推官書足下之文可謂竒矣捐去文字常依力為瓌竒險怪務欲使人讀之如見數千嵗前科斗鳥跡所記弦匏之歌鍾鼎之文也足下之所嗜者如此固無不善者抑未之所聞所謂能文者豈謂其能竒哉能文者固不以竒為主也夫文何為而設也知理者不能言世之能言者多矣而聞者獨傳豈獨傳哉因其能文也而言益工因其言工而理益明是以聖人貴之自六經以下至於諸子百氏騷人辨士論述大抵皆將以為寓理之具也是故理勝者文不期工而工理愧者巧為粉澤而隙間百出此猶兩人持牒而訟直者操筆不待累累讀之如破竹横斜反覆自中節目曲者雖使假詞於子貢問字於揚雄如列五味而不能調和食之於口無一可惬何况使人玩味之乎故學文之端急於明理夫不知為文者無使復道如知文而不務理求文之工世未嘗有是也夫決水於江河淮海也水順道而滔滔汩汩日夜不止衝砥柱絶吕梁放於江湖而納之海其舒為淪漣鼓為濤波激之為風飇怒之為雷霆蛟龍魚黿噴濤出沒是水之竒變也而水初豈如此哉順道而決之因其所遇而變生焉溝瀆東決而西竭下滿而上虚日夜激之欲見其竒彼其所至者蛙蛭之玩耳江河淮海之水理達之文也不求竒而竒至矣激溝瀆而求水之竒此無見於理而欲以言語句讀為竒之文也六經之文莫竒於易莫簡於春秋夫豈以竒與簡為務哉勢自然耳傳曰吉人之辭寡彼豈惡繁而好寡哉雖欲為繁而不可得也自唐以来至今文人好竒者不一甚者或為缺句斷章使脈理不屬又取古書訓詁希於見聞者衣被而說合之或得其字不得其句或得其句不得其章反覆咀嚼卒亦無有此最文之陋也足下之文雖不若此然其意靡靡似主於竒矣故預為足下陳之劉隋司馬温公文集序公出於去聖數千嵗之後其公忠直亮根于性質之自然非勉而中思而得者見於修身踐言則孝悌忠信雖蠻貊而可行在屋漏而不愧至其施諸政事則開百聖而不慙蔽天地而不恥而發為文章則探隂陽造化之賾以豐其源躬仁義禮樂之實以沃其膏酌聖賢出處之正以厲其操通古今因革之變以博其施非徒載之虚言也是文也君天下者得之足以鑒興衰通治體公卿大夫得之足以勸忠嘉盡臣節士庶人得之足以檢身厲行為君子之歸以至山顛水涯幽人放客得之則浩歌流詠斟酌厭飫隨取隨足夫丹青可渝而公之文不可朽也金石可磨而公之文不可磷也山可摧澤可涸而公之文愈久愈新垂世而亡窮也公又嘗著資治通鑑備論前世君臣善否之蹟與其理亂興亡之證别為一書公非有意於立文者然將以鼔吹六經羽翼名教則肆筆為言不約而成章古語曰木有文而水有波雖與更之無奈之何韓愈曰仁義之人其言藹如也昔顔淵死孔子曰噫天喪予憫王道之無傳也公立朝大節輔相勲庸凜然在人耳目公雖云亡斯文未喪學者傳誦非獨得其言得其書而已文集凡八十卷為二十八門其間詩賦章奏制詔表啓雜文書傳無所不備羣書考索卷二十一
