body:
  text: 羣書考索别集卷一宋章如愚撰圖書門周子曰無極而太極太極動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根分隂分陽兩儀立焉陽變隂合而生水火木金土五氣順布四時行焉五行一隂陽也隂陽一太極也太極本無極也五行之生也各一其性無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉惟人也得其秀而最靈形既生矣神發知矣五性感動而善惡分萬事出矣聖人定之以中正仁義聖人之道仁義中正而已矣而主靜無欲故靜立人極焉故聖人與天地合其德日月合其明四時合其序鬼神合其吉凶君子修之吉小人悖之凶故曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義又曰原始反終故知死生之説大哉易也斯其至矣太極圖此無極而太極也所以動而陽靜而隂之本體也非有以離乎隂陽即陰陽而指其本體不雜乎隂陽而為言耳此之動而陽靜而隂也中者其本體也者陽之動也之用所以行也者隂之靜也之體所以立也者之根也者之根也此陽變隂合而生水火木金土也者陽之變也者隂之合也隂盛故居右陽盛故居左陽稚故次火隂稚故次水沖氣故居中而水火之交系乎上隂根陽陽根隂也水而木木而火火而土土而金金而復水如環無端五氣分四時行也五行一隂陽五殊二實無餘欠也隂陽一太極精粗本末無彼此也太極本無極上天之載無聲臭也五行之生各一其性氣殊質異各一其無假借也此無極二五所以妙合而無間也乾男坤女以氣化者言各一其性男女一太極也萬物化生以形化者言各一其性而萬物一太極也又曰極如木之有根浮屠之有頂但是有形之極太極乃是無形之極極者至極之義至中至正至精至一之理也太者大而無以加之稱如太初太一太元太祖之謂也極無不在民極則有總會之義北極則有樞紐之義皇極則有標凖之義謂之太極則是原頭只有此理在天地萬物之先而實行乎天地萬物之中無總會之形而實為萬理之總會無樞紐之形而實為萬化之樞紐無標凖之形而實為萬類之標凖周子但於第二圈中分出一圈在上以見太極只是渾淪極至之理而元無形爾圖説解剝圖體示人以一身所自來惟人也以下示人以人道所由立使知人所以為人聖人所以為聖人君子所以為君子小人所以為小人朱子嘗曰西銘前一假如棊盤後一假如人下棊太極圖意亦然伏羲畫卦橫圖大傳曰易有太極是生兩儀兩儀生四象四象生八卦又曰八卦成列象在其中矣因而重之爻在其中矣朱子曰天地之間莫非太極隂陽之妙聖人仰觀俯察逺求近取固有超然而默契於心矣故自兩儀未分渾然太極而兩儀四象六十四卦之理已粲然於其中太極分而兩儀則太極固太極兩儀固兩儀也兩儀分而四象則兩儀又為太極而四象又為兩儀矣自是而推四而八八而十六十六而三十二三十二而六十四以至百千萬億之無窮雖見於摹畫若有先後而出於人為然其已定之形已成之勢固已具於渾然之中而不容毫髮思慮作為於其間也又曰諸儒談易謾紛紛只見繁枝不見根觀象徒勞推互體玩辭亦是逞空言須知一本能雙幹始信千兒與萬孫喫緊包羲為人意悠悠千古向誰論此伏羲畫卦次序卦畫自下而上初畫一竒一偶則陽一隂一而為兩儀兩儀之上各生一竒一偶則太陽一少隂二少陽三太隂四而為四象四象之上各生一竒一偶則乾一兊二離三震四巽五坎六艮七坤八而為八卦八而十六則兩儀之上各加八卦又八卦之上各加兩儀也十六而三十二則四象之上各加八卦又八卦之上各加四象也三十二而六十四則八卦之上各加八卦下三畫則八乾八兊八離八震八巽八坎八艮八坤上三畫則乾一兊二離三震四巽五坎六艮七坤八各居八卦之上而重乾居一重兊居二重離居三重震居四重巽居五重坎居六重艮居七重坤居八皆自然而然不容已之勢豈待文王而後重周禮三易經卦皆八其别皆六十四周禮至劉歆時方出子雲不見周禮故以重易為文王不知十三卦制器皆取已重之卦矣文王易即伏羲已重之卦而改變其位序也伏羲畫卦圓圖邵子曰太極既分兩儀立矣陽上交於陰隂下交於陽而生天之四象剛交於柔柔交於剛而生地之四象是故一分為二二分為四四分為八八分為十六十六分為三十二三十二分為六十四猶根之有幹幹之有枝愈大而愈小愈細而愈繁是故乾以分之坤以翕之震以長之巽以消之長則分分則消消則翕也乾坤定位也震巽一交也兊離坎艮再交也故震陽少而隂尚多也巽隂少而陽尚多也兊離陽浸多也坎艮隂浸多也又曰無極之前隂含陽也有象之後陽分隂也隂為陽之母陽為隂之父故母孕長男而為復父生長女而為姤是以陽起於復而隂起於姤也又曰乾四十八而四分之一分為隂所尅也坤四十八而四分之一分為所尅之陽也故乾得三十六而坤得十二也又曰復至乾凡百一十有二陽八十隂姤至坤凡百一十有二隂八十陽又曰陽在隂中陽逆行隂在陽中隂逆行陽在陽中隂在隂中則皆順行此真至之理按圖可見之矣又曰坎離隂陽之限也故離當寅坎當申而數常踰之者隂陽之溢也然用數不過乎中也離當卯坎當酉但以坤為子半可見矣又曰先天學心法也故圖皆自中起萬化萬事生於心也此即橫圖而分左右也陽爻多者居左隂爻多者居右隂陽之賔主也自三畫觀之初畫為儀隂陽之竒偶也中畫為象上畫為卦隂陽之中又各有隂陽也自六畫觀之一畫則左三十二陽右三十二隂兩儀也二畫則十六陽十六隂相間四象也三畫則八陽八隂相間八卦也四畫則四陽四隂相間五畫則二陽二隂相間六畫則一陽一隂相間皆隂陽相生不已之象也然以象觀之陽饒隂乏以數觀之陽一隂二故惡多於美害多於利亂多於治天道進陽而退隂人道必崇陽而抑隂歟伏羲八卦圖説卦曰天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也雷以動之風以散之雨以潤之日以烜之艮以止之兊以説之乾以君之坤以藏之邵子曰此一節明伏羲八卦也八卦相錯者明交相錯而成六十四也又曰乾坤縱而六子橫易之本也又曰震始交隂而陽生巽始消陽而隂生兊陽長也艮隂長也震兑在天之隂也巽艮在地之陽也故震兊上隂而下陽巽艮上陽而下隂天以始生言之故隂上而陽下交泰之義也地以既成言之陽上而隂下尊卑之位也乾坤定上下之位坎離列左右之門天地之所闔闢日月之所出入春夏秋冬晦朔弦望晝夜長短行度盈縮莫不由乎此矣朱子曰以橫圖觀之有乾一而後有兊二有兑二而後有離三而震四巽五坎六艮七坤八亦以次而生此易之所以成也而圓圖之左方自震之初為冬至離兑之中為春分以至於乾之末而交夏至焉皆進而得其已生之卦猶自今日而追數昨日也故曰數往者順其右方自巽之初為夏至坎艮之中為秋分以至於坤之末而交冬至焉皆進而得其未生之卦猶自今日而逆計來日也故曰知來者逆然本易之所以成則其先後始終如橫圖及圓圖右方之序而已故曰易逆數也按説卦所言天地山澤雷風水火之象先天圖之小成也乾純陽為天位乎上故居南坤純隂為地位乎下故居北離火外陽內隂居東大明生東也坎水外隂內陽居西月生於西也西北多山故艮止為山居西北澤萃東南故兊説為澤居東南雷起東北故震陽動於下為雷居東北風起西南故巽入於下為風居西南此對待之隂陽也然八卦之序旋轉無窮八位之象交相為用對待者未嘗不流行也文王八卦圖説説卦曰帝出乎震齊乎巽相見乎離致役於坤説言乎兊戰乎乾勞乎坎成言乎艮神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也邵子曰此一節明文王八卦也又曰至哉文王之作易也其得天地之用乎故乾坤交而為泰坎離交而為既濟也乾生於子坤生於午坎終於寅離終於申以應天之時也置乾於西北退坤於西南長子用事而長女代母坎離得位而兊艮為偶以應地之方也王者之法其盡於是矣此言文王改易伏羲卦圖之意也蓋自乾南坤北而交則乾北坤南而為泰矣自離東坎西而交則離西坎東而為既濟矣乾坤之交者自其所已成而反其所由生也故再變則乾退乎西北坤退乎西南也坎離之變者東自上而西西自下而東也故乾坤既退則離得乾位而坎得坤位也震用事者發生於東方巽代母者長養於東南也又曰易者一隂一陽之謂也震兊始交者也故當朝夕之位坎離交之極者也故當子午之位巽艮不交而隂陽猶雜也故當用中之偏乾坤純陽純隂也故當不用之位也又曰兊離巽得陽之多者也艮坎震得隂之多者也是以為天地用也乾極陽坤極隂是以不用也又曰震兊橫而六卦縱易之用也按説卦所言震巽離坤兊乾坎艮之序後天圖之小成也乾坤交而付其用於離坎故離得乾位坎得坤位乾西北坤西南者退處於無為之地天傾西北而樞紐不動亦在西北故乾居西北土居中央致養之道在離兊之間故坤居西南震東兊西者震陽出隂而主春兊隂説陽而主秋也巽東南而艮東北者巽隂入陽長養萬物艮陽止隂終始萬物此流行之隂陽也然乾對坤震對兊坎對離艮對巽則流行者未嘗不對待也故下文水火雷風山澤之相偶又用伏羲卦云先天方圓圖邵子曰此伏羲八卦也伏羲畫八卦即有六十四卦圓者為天方者為地天地之理皆在是也伯溫曰乾兊離震在天為陽在地為剛在天則居東南在地則居西北巽坎艮坤在天為隂在地為柔在天則居西北在地則居東南隂陽相錯天文也剛柔相交地理也朱子曰此圖圓布者乾盡午中坤盡子中離盡卯中坎盡酉中陽生於子中極於午中隂生於午中極於子中其陽在南其隂在北方布者乾始於西北坤盡於東南其陽在北其隂在南此二者隂陽對待之數圓於外者為陽方於中者為隂圓者動而為天方者靜而為地者也又曰先天圖一日有一日之運一月有一月之運大而天地之終始小而人物之死生逺而古今之世變皆不外此天地之間無獨必有對故先天之易兩兩相對圓圖乾與坤對自乾坤而生者夬對剝大有對比壯對觀小畜對豫需對晉大畜對萃泰對否兌與艮對自兌艮而生者復對謙蹇對暌漸對歸妹小過對中孚旅對節咸對損遁對臨坎與離對自離坎而生者師對同人蒙對革渙對豐解對家人未濟對既濟困對賁訟對明夷震與巽對自震巽而生者升對無妄蠱對隨井對噬嗑恆對益鼎對屯大過對頤姤對復方圓自下而上序如橫圖自西北之東南乾之坤東北之西南泰之否縱橫錯綜亦皆相對天下之理有剛必有柔有進必有退有善必有惡六十四卦皆厯三十二位而變而其機則在坤復乾姤之間復至乾陽自少而多極於乾則一變為姤矣姤至坤隂自少而多極於坤則一變為復矣坤而復乾而姤乃隂陽變易之機得其機則安不忘危治不忘亂進必思退吉必慮凶可以體常盡變先天之學其明天道以驗人事之幾歟後天序對圖易大傳序卦雜卦皆後天次序反對卦也邵子曰八卦之象不易者四反易者二以六卦變而成八也重卦之象不易者八反易者二十八以三十六變而成六十四也又曰小成之卦正者四變者二共六卦也大成之卦正者八變者二十八共三十六卦也又曰天根月窟常來往三十六宫都是春又曰體有三百八十四而用止于三百六十何也以乾坤離坎之不用也乾坤離坎之不用所以成三百六十之用也又曰乾坤坎離為上篇之用震艮巽兌為下篇之用頤中孚大小過為二篇之用也隂陽相易自有相反之理故後天之易一一反對上經十八卦下經亦十八卦上經不易者六乾坤坎離頤大過也反易者十二屯與蒙需與訟師與比小畜與履泰與否同人與大有謙與豫隨與蠱臨與觀噬嗑與賁剝與復無妄與大畜是也下經不易者二中孚小過也反易者十六咸與恆遁與壯晉與明夷家人與睽蹇與解損與益夬與姤萃與升困與井革與鼎震與艮漸與歸妹豐與旅巽與兌渙與節既濟與未濟是也乾坤坎離固不易艮震合而為頤震艮合而為小過巽兌合而為中孚兌巽合而為大過亦皆不易也八卦雖不易乾盡變則為坤坤盡變則為乾坎盡變則為離離盡變則為坎頤盡變則為大過大過盡變則為頤中孚盡變則為小過小過盡變則為中孚亦皆變易也易變易也天下有可變之理聖人有能變之道反需為訟反泰為否反隨為蠱反晉為夷反家人為睽此不善變者也反剝為復反遁為壯反蹇為解反損為益反困為井此善變者也亦不盡然文王之意但示人以可變之機得其機則危可安亂可治屈可伸狂可聖特在一轉移之頃爾後天之學其明人事以贊天道之妙歟河圖易曰天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十五地數三十天地之數五十有五所以成變化而行鬼神也朱子曰此一節夫子明河圖之數也天地之間一氣而已分而二則為隂陽而五行造化萬物終始無不管於是故河圖之位一與六居北二與七居南三與八居東四與九居西五與十居中蓋其為數不過一隂一陽一竒一偶以兩其五行而已陽數竒故一三五七九屬乎天隂數偶故二四六八十屬乎地天數五地數五各以類相求五位之相得然也天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生土地十成之所謂各有合也積五竒為二十五積五偶為三十合是二者為五十有五此河圖之全數也孔安國云河圖者伏羲王天下龍馬出河遂則其文以畫八卦劉歆云伏羲繼天而王受河圖而畫之八卦是也關子明云河圖之文七前六後八左九右邵子曰圓者星也歷紀之數其肇於此乎蓋圓者河圖之數故伏羲因之而造易也河圖者天地所畫之易也太極分而為隂陽隂陽立而為天地天地播而為五行天地初生之氣必濕為水濕極必燥為火燥必有所生為木生必剛為金剛必實為土是五行所生之氣也以竒生者以偶成以偶生者以竒成陽先隂故水先成火次之木者土之華金者土之實其性有水火之雜土則萬物之所成始而成終是五行所成之質也五行分王四時土居中央故數亦以五為中一倚之成六二倚之成七三倚之成八四倚之成九五倚一二三四而成十此皆自然之象數易之原也伏羲仰觀俯察逺近參取見天地間無非易而河圖之出適契其心故因之以畫卦使圖不出卦其不畫乎洛書孔安國云洛書者禹治水時神龜負文列於背有數至九禹因第之以成九類劉歆云禹治洪水賜洛書法而陳之九疇是也河圖洛書相為經緯八卦九章相為表裏邵子曰方者土也畫州井地之法其放於此乎蓋方者洛書之文故禹箕敘之而作範也蔡元定云古今傳記自孔安國劉向父子班固皆以為河圖授羲洛書錫禹關子明邵康節皆以十為河圖九為洛書蓋大傳既陳天地五十有五之數洪範又明言錫禹九疇而九宫之數戴九履一左三右七二四為肩六八為足正龜背之象也惟劉牧意見以九為河圖十為洛書其易置圖並無明驗但謂伏羲兼取圖書則為可疑耳其實天地之理一而已時有古今先後不同而其理不容有二故伏羲但據河圖作易不必預見洛書而逆與之合大禹但據洛書作範亦不必追考河圖而暗與之符所以然者此理之外無復他理故也圖象圓圓者天也書象方方者地也圖數十偶贏而竒乏全數也書數九竒贏而偶乏變數也圖以五生數統五成數故生數在內成數在外書以五竒數統四偶數故竒數居正偶數居側皆陽統隂也生成數各有隂陽以生成而論則生為陽成為隂也圖五行相生而分布則首北次南次東次西以復于中也書五行相尅而右旋則由西北而西南由東南而東北以復於中也圖書皆以五居中虛其中則太極也竒偶均二十者兩儀也圖六七八九附于生數之外則隂陽老少互藏其宅書一二三四而含九八七六縱橫十五而互為七八九六則亦四象也圖虛其十亦四十五數也書九疇之母數則亦四十五數也書九疇之子數則亦五十五數也五行五事八政五紀皇極三德七稽疑十休咎證十一福極是以圖固可以為範而書亦可以為易矣經緯表裏之説豈不信然皇極經世書太陽日暑性目元皇太隂月寒情耳會帝少陽星晝形鼻運王少隂辰夜體口世霸少剛石雷木色歲易少柔土露草聲月書太剛火風飛氣日詩太柔水雨走味辰春秋元之元乾會之元履運之元同人世之元無妄元之會夬會之會兌運之會革世之會隨元之運大有會之運暌運之運離世之運噬嗑元之世大壯會之世歸妹運之世豐世之世震元之歲小畜會之歲中孚運之歲家人世之歲益元之月需會之月節運之月既濟世之月屯元之日大畜會之日損運之日賁世之日頤元之辰泰會之辰臨運之辰明夷世之辰復歲之元姤月之元訟日之元遁辰之元否歲之會大過月之會困日之會咸辰之會萃歲之運鼎月之運未濟日之運旅辰之運晉歲之世恆月之世解日之世小過辰之世豫歲之歲巽月之歲渙日之歲漸辰之歲觀歲之月井月之月坎日之月蹇辰之月比歲之日蠱月之日蒙日之日艮辰之日剝歲之辰升月之辰師日之辰謙辰之辰坤經世書天有隂陽隂陽之中又各有隂陽故有太少太陽日太隂月少陽星少隂辰為天之四象暑寒晝夜天之所變也性情形體物所感於天之變也地有剛柔剛柔之中又各有剛柔故有太少太柔水太剛火少柔土少剛石為地之四象雨風露雷地之所化也走飛草木物所應於地之化也人得天地之全暑寒晝夜無不變雨風露雷無不化性情形體無不感走飛草木無不應目善萬物之色耳善萬物之聲鼻善萬物之氣口善萬物之味天地萬物皆隂陽剛柔之分人則兼備萬物故靈萬物而參天地也陽中陽日也陽中隂月也隂中陽星也隂中隂辰也柔中柔水也柔中剛火也剛中柔土也剛中剛石也日月星辰共為天水火土石共為地此乃五之數也天地之數極於八八故元會運世歲月星辰之數極於六十四也陽數以三十起者一月有三十日一世有三十年也隂數以十二起者一日有十二辰一嵗有十二月也一元之數即一嵗之數也一元有十二會三百六十運四千三百二十世猶一嵗有十二月三百六十日四千三百二十辰也一元有十二萬九千六百嵗一會有十二萬九千六百月一運有十二萬九千六百日一世有十二萬九千六百辰皆自然之數皇極一元之運始於日甲月子星甲辰子者豈特歷數之用哉體天地之撰者至於易而止天竒地偶之畫陽九隂六之數四千九十有六之變萬有一千五百二十之䇿有以加乎此哉康節之學雖作用不同而其實則伏羲所畫之卦也故其書以日月星辰水火土石盡天地之體用以暑寒晝夜雨風露雷盡天地之變化以性情形體走飛草木盡萬物之感應以元會運世嵗月日辰盡天地之終始以皇帝王伯易書詩春秋盡聖賢之事業秦漢以來一人而已羣書考索卷一
