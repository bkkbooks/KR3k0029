body:
  text: 羣書考索後集卷五十五宋章如愚編財賦門漕運類古無漕運之法禹貢所載入于渭亂于河之類不過是朝廷之路所輸者不過幣帛九貢之法通典曰其四百里粟五百里米蓋粗而重者為近賦百里納總二百里納銍三百里納秸精而輕者為逺賦若數千里漕運其費百倍矣至周王畿止於千里賦稅則無逺輸其管仲曰粟行三百里國無一年之積粟行四百里無二年之積粟行五百里衆有飢色孫武曰千里饋糧士有飢色食敵一鍾當吾二十鍾是言粟不可推移也通典左傳曰秦輸粟于晉自雍及綘相繼命曰泛舟之役吳城𨝍溝通江淮通糧道也秦欲攻胸奴使天下飛芻挽粟於琅琊負海之郡轉輸北河率三十鍾而致一石漕運之法自此方詳漢髙祖擊楚蕭何轉關中給軍帝又築甬道屬河以取敖倉粟時漕山東粟以給中都官嵗不過數十萬石謂京師之官府通典孝文時賈誼上疏曰天子都長安而以淮南東道為奉地鏹道數千不輕致輸郡或乃越諸侯而逺調均發徴至無狀也古者天子地方千里中之而為都輸將繇使其逺者不在五百里而至公侯地百里中之而都輸將繇使逺者不在五十里而至輸者不苦其繇繇者不傷其費故逺方人安及秦不能分人寸地欲自有之輸將起海上而來一錢之賦數十錢之費不輕而致也上之所得甚少而人之苦甚多也帝不能用通典武帝官多役使在關中之粟四百萬猶不足於建元中通西南夷千里負擔饋糧率十餘鍾致一石其後東滅朝鮮置滄海郡人徒之費擬西南夷又衛青擊胸奴取河南地復興十萬餘人築衛朔方轉漕甚逺鄭當時請引渭穿渠以漕雖曰便利其後來皆言漕從山東西嵗百餘萬石更經底柱之險敗亡甚多後張湯欲通褒斜道五百餘里道果便近而水多湍石不可漕通典宣帝時耿夀昌五鳯中奏故事嵗漕關東榖四百萬斛以給京師用卒六萬人宜糴三輔宏農河東上黨太原諸郡榖足供京師可省關東漕卒之半蕭望之以為不可帝從之漕事果便通典趙充國條留屯十二便其五曰至春省甲士卒循河湟漕榖至臨羌以威羌虜揚武折衝之具也光武北征命寇恂守河內收四百萬斛以給軍以輦車騼駕轉輸不絶虞翊為武都太守開漕船道而水運通利本傳蜀諸葛亮出祈山以木牛運又出斜谷以流馬運魏正始四年司馬宣王使鄧艾開河渠廣漕渠東南有事興衆泛舟而下達於江淮資食有儲而無水害通典晉武帝太始十年鑿陜南山決河東注洛以通運漕謝玄淝水之役乃堰吕梁水以利運漕公私便之通典懷帝永嘉元年修千金堨於許昌以通運通典成帝咸和六年以海賊寇抄運漕不繼發王公已下千餘丁各運米六斛通典穆帝時頻有大軍糧運不繼制王公已下十三户共借一人助度支運通典後魏自徐揚州內附之後經略江淮轉運中州以實邊鎮有司請於水運隨便置倉乃於小平石門白馬津漳涯黑水濟州陳郡大梁凡八所各立邸閣每軍國有須應機漕引通典孝文太和七年􅀢骨律鎮將刁雍上表曰臣鎮內之兵率皆習水一運二十萬斛方舟順流五日而至用人工輕於車運十倍詔永以為式通典隋開皇三年以京師倉廩尚虛議為水旱之備詔於蒲陜虢熊伊洛鄭懷邠衛汴許汝等十三州置運米丁又於衛州置黎陽郡陜州置常平倉華州置廣通倉轉相灌注漕關東及汾晉之粟以給京師通典又詔韋瓉向蒲陜以東募人能於洛陽運米四十石經底柱之險逹於常平者免其征戎其後以渭水多流沙有淺深漕者苦之通典四年又詔宇文愷率水工鑿渠引渭水自大興城東至潼關三百餘里名廣東渠轉運通利關內賴之通典煬帝大業元年中發河南諸郡開通濟渠自西苑引殳洛水達於河又引河通於淮海自是天下利於轉輸通典四年又發河北諸郡開永濟渠引沚水南達於北河通涿郡五年於西域之地置西海鄯且子餘切末等郡大開屯田發四方諸郡運糧以給之七年大會涿郡分江淮别以舟師濟滄舳艫數百里糧會於襄平髙麗所都並通典唐都長安而關中號稱沃野然其土地狹所出不足以給京師備水旱故常轉漕東南之粟髙祖太宗之時用物有節而易贍水陸漕運歲不過二十萬石故漕事簡自髙宗已後歲益增多而工利繁興民亦罹其弊矣初江淮漕租未至東都輸含嘉倉以車或馱陸運至陜而水行來逺多風波覆溺之患其失常十七八故其率一斛得八斗為成勞至陸運至陜才三百里率兩斛計庸錢千民送租者皆有水陸之直食貨志唐髙祖武德中薑行本請開五節堰引水通運許之貞觀永徽之際廩祿數少每年轉運不過一二萬斛而已唐髙宗咸亨三年於岐州陳倉縣東南開渠引渭水入升源渠通船筏至京故城通典唐明皇至開元國用漸廣每年陜路漕運米二百五十五萬斛時李傑奏濬汴州梁公堰以通江淮漕運開元十八年玄宗問朝集使利害之事宣州刺史裴耀卿上便宜以水陸遙逺轉運艱辛功力雖勞倉儲不益竊見每州所送租及庸調斗門水淺已有阻礙渡淮入汴乾淺停留上河入洛船艘隘閙般載停滯備極艱辛伏見舊法河口置武牢倉鞏縣置洛口倉爰及河陽倉柏崖倉太原倉永豐渭南倉安置使江南之舟不入黃河黃河之舟不入洛口水通則隨近運轉不通則且納在倉不滯逺船不憂欠耗等利病疏奏不省通典至開元二十一年耀卿為京兆尹京師榖價踴貴帝召裴耀卿問以救人之術奏曰若能通河漕變陸為水則所支有餘且江南租船所在候水始進吳人不便河漕由是所在停留上然其言乃置河隂縣及河隂倉河清縣置柏崖倉三門東置集津倉三門西置三門倉開三門北止十八里陸行以避灘險自江淮西北泝鴻溝悉納河隂倉自河隂浮漕含嘉倉又遞送納於太原倉所謂北運也自太原浮於渭以實關中凡三年運七百萬石省腳費三十萬貫民間傳云用斗錢運斗米其糜耗如此及耀卿罷相北運頗艱米歲至京師才百萬石二十五年遂罷北運通典崔希逸為河南陕運使歲運百八十萬石其後以太倉積粟有餘歲減漕運十萬石開元二十七年河東採訪使汴州刺史齊浣以江淮漕運經淮水波濤有沉損遂開廣濟渠下流自泗水至楚州合於淮踰時畢功既而以水流浚急行旅艱險旋即停廢通典開元二十九年陜郡太守李齊物避三門河路急峻於其北鑿石渠通運船為漫流河泥旋填淤塞不可漕而止通典盧暉開通濟渠置樓百餘間以貯江淮之貨天寶三年左常侍兼陜州刺史韋堅開漕河自苑西引清水因古渠至華隂入渭引永豐倉及三門倉米以給京師名曰廣運潭通典是嵗漕山東粟四百萬石自裴耀卿言漕事進用者常兼轉運之職而韋堅為最唐志初耀卿興漕路請罷陸運而不果廢自景雲中陸運北路分入遞雇民車牛以載開元初河南尹李傑為水陸運使運米嵗二百五十萬石唐志肅宗末年史朝義兵分出宋州淮運於是沮絶租庸鹽鐵泝漢江而上河南尹劉晏為户部侍郎兼勾當度支轉運鹽鐵鑄錢使江淮粟帛繇襄漢越商於以輸京師唐志及代宗出陜州關中空窘於是盛轉輸以給用唐志廣德二年以劉晏顓領東都河南淮西江南東西轉運租庸鑄錢鹽鐵轉輸至上都度支所領諸道租庸觀察使凡漕事亦皆決於晏晏即鹽利雇傭分吏督之隨江汴河渭所宜故時轉運船繇潤陸運至楊子斗米費錢十九晏命囊米而載以舟減錢十五繇揚州距河隂斗米費錢百二十晏為歇艎支江船二千艘每船受千斛十船為綱江船不入汴汴河不入河河船不入渭江南之運積揚州汴河之運積河隂河船之運積渭口渭船之運入太倉歲輸粟百一十萬石又分官吏主丹陽湖禁引溉自是河漕不涸唐志大厯八年以關內豐穰減漕十萬石度支和糴以優農晏自天寶末掌出納監歲運知左右藏主財穀三十餘年矣唐志及楊炎為相以舊惡罷晏轉運使復歸度支凡江淮漕米以庫部郎中崔河圖主之唐志德宗以給事中崔造為相乃奏諸道觀察使刺史選官部送兩稅至京師廢諸道水陸轉運使及度支巡院江淮轉運使以度支鹽鐵歸尚書省宰相分判六尚書事以户部元琇判諸道鹽鐵𣙜酒侍郎吉中孚判度支諸道兩稅增江淮之運浙江東西嵗運米七十五萬石復以兩稅易米百萬石江西湖南鄂嶽福建嶺南米亦百二十萬石詔浙江東西節度使韓滉淮南節度使杜亞運至渭橋倉唐志韓滉復為江淮轉運使而滉為度支諸道鹽鐵轉運使於是崔造亦罷滉遂劾琇常運米緇青河中而李納懷光倚以構叛貶琇雷州司户尋賜死是時汴宋節度使春夏遣官監汴水察盜灌溉者嵗漕經底柱覆者幾半河中有山號米堆運舟入三門雇平陵人為門匠執標指麾一舟百日乃能上唐志陜虢觀察使李泌益鑿集津倉山西徑為運道屬於三門倉治上路以回空車費錢五萬緡下路減半又為入渭船方五板輸東渭橋太倉米至百三十萬石遂罷南路陸運唐志其後諸道鹽鐵轉運使張滂復置江淮巡院及浙西觀察使李錡請使江淮堰埭浙西者增私路小堰之稅以副使孟湯主上都留後唐志李巽為諸道轉運鹽鐵使以堰埭歸鹽鐵使罷其增置者自劉晏後江淮米至渭橋寖減矣至巽乃復如晏之多唐志初揚州疏太子港陳登塘凡三十四陂以益漕河輒復堙塞淮南節度使杜亞乃濬渠蜀岡疏句城湖愛敬陂起隄貫城以通大舟河益庳水下走淮夏則舟不得前節度使李吉甫築平津堰以泄有餘防不足漕流遂通然漕益少江淮米至渭橋者才二十萬斛唐志諸道鹽鐵轉運使盧坦糴以備一歲之費省冗職八十員自江以南補署皆剸屬院監而漕米亡耗於路頗多唐志刑部侍郎王播代坦建議米至渭橋五百石亡五十石者死其後判度支皇甫鏄議萬斛亡三百斛者償之千七百斛者流塞下過者死盜十斛者流三十斛者死而覆船敗挽至者不得十之四五部吏舟人相挾為姦榜笞號苦之聲聞於道路禁錮連歲赦下而獄死者不可勝數唐志秦漢時故漕興成堰東逹永豐倉咸陽縣令韓遼請疏之自咸陽抵潼關三百里可以罷車挽之勞宰相李固言以為非時文宗曰茍利於人隂陽拘忌非朕所顧也議遂決堰成罷挽車之牛以供農耕關中賴其利唐志及户部侍郎裴休為使以河瀕縣令董漕事自江逹渭運米四十萬石居三嵗米至渭橋百二十萬石凡漕達於京師而足國用者大略如此唐志太祖建隆元年汴都仰給漕運故河渠最為急務先是嵗調丁夫開浚糗糧皆民自備丁未詔悉從官給遂著為式又以河北仍嵗豐稔榖價彌賤命髙其價以糴入長編二年給事中范陽劉載往定陶督漕軍丁夫三萬浚五丈渠自都城北歷曹濟及鄆以通東方之漕上因謂侍臣曰煩民奉己之事朕必不為也開導溝洫以濟京邑蓋不獲已也同上太宗雍熙四年始并水陸路發運為一司以右神武將軍王繼升刑部貟外郎直史館董儼同掌之同上至道元年先是汴河嵗運江淮米三百萬石菽二百萬石黃河粟五十萬石菽三十萬石惠民河粟四十萬石菽二十萬石廣濟河粟十二萬石凡五百五十萬石非水旱大蠲民租未嘗不及數是歲汴河運米至五百八十萬石上因問汴水疏鑿之由參知政事張洎退而講求其事以奏曰今𢃄甲數十萬戰騎稱是萃於京師仍以亡聊之民悉集於輦下此漢唐京邑民庶其人矣甸服時有水旱而不至艱難者有惠民金水五丈汴水等四渠𣲖引脈分會於天邑舳艫相接贍足京師以無匱乏也唯汴之水橫亘中國首承大河漕引江湖利盡南海半天下之財賦并山澤之百貨悉由此路而進然則大禹疏鑿以分水勢煬帝開甽以奉巡遊雖數堙塞而通流不絶者百代之終為國家之用者其上天意乎長編真宗大中祥符元年江南轉運使闕中書進擬人數見却一日上乃除張士遜為之士遜謁宰相王旦於政事堂自言止歷縣道未歷郡事今未領使職願聞善教旦從容曰朝廷權利至矣士遜起謝既去旦語人曰此轉運識大體士遜後徙廣西河北再思旦言不敢妄有興建云長編景德元年宋雄監河隂屯兵雄習河渠利害因領護汴口均節水勢以濟江淮漕運居官數年三遷將作監不易其任職務修舉朝廷賴焉同上天禧二年以崇儀使昭州團練使賈宗户部貟外郎薛奎並為制置發副使郭盛為都監發運司置都監始此同上仁宗天聖四年閏五月定江淮制置發運司嵗漕米課六百萬石初景德中嵗不過四百五十萬石其後益至六百五十萬石故江淮之間榖常貴而民貧於是吳耀卿請約咸平景德嵗漕之數立為中制故裁減之然東南災險輒減嵗漕數或百萬或數十萬又轉移以給他路者時有焉同上康定元年初以陜西宿兵久命朝崇恐與夏竦韓琦議進取之策琦竦乃以所畫攻取二策上之至是上與兩府議用攻策歐陽修上便宜三事一曰通漕運今江淮之米嵗入於汴者六百萬石宜以三百萬石分給關西浚治汴渠按修唐裴耀卿舊迹於大河三門東西置倉陸運於所開山路十八里以避其險卒泝河入渭可紓關中之困又置遞按求漢髙祖入關之道自武昌漢郢襄復梁洋金商均房光化沿漢等十二州之地日入關而不絶同上至和元年王鼎為淮南江浙荆湖制置發運副使居二年遂以為使前使者多漁市南方物因奏計京師特遺權貴鼎一無所市獨悉精吏事度漕路逺近定先後為成法於是勞佚均吏不能為輕重官舟禁私載舟兵無以自給則盜官米為姦有能居販自贍者市人持以法不肯償所逋鼎為移州縣督償之舟人有以自給不為姦而所運米未嘗不足也同上嘉祐三年桂州興安縣有靈渠北通江湖南入海自秦漢通舟楫皆石底淺狹十八里內置三十六斗門一舟所載不過百斛乘漲水則可行李師中積薪焚其石募工鑿之廢斗門三十六後三旬而成舟以通同上江湖上供米舊轉運使以本路綱輸真楚泗州轉般倉載鹽以歸舟還其郡卒還其家其汴舟詣轉般倉漕米輸京師歲運者四河冬涸舟卒亦還營至春復集名曰放凍卒得番休逃亡者少而汴船不涉汴路無風波沉溺之患其後發運使權益重六路上供米團綱發船不復委本路獨發運使專其任文移坌仲事日繁移有不能檢察則吏胥可以用意於其間操舟者賕諸吏輒得詣富饒郡市賤貿貴以趍京口自是江汴之舟合雜混轉而無辨矣挽舟卒有終身不還其家而老死河路者籍多空名漕事大敝長編神宗元豐二年六月甲寅提舉導洛通汴河言請汴城四月甲子起役六月戊申畢工凡四十三里自任村沙谷至河隂瓦亭子并泛水關北通黃發漕運運河長五十一里河兩岸為堤總長一百三里間所占官私地二十九頃已引洛水新口斗門通流入汴候水調勻可塞汴口乞徙汴口官吏河清指揮於新開洛口從之同上孝宗淳熙六年三月丁丑宰執奏事上曰諸路漕臣職當計度欲其計一道盈虛而經度之也今則不然於所部州郡有餘者取之不足者聽之逮其乏事從而劾之吾民亦被其擾矣朕今以手詔戒諭之俾深思古誼視所部為一家周知其經費而通融其有無亷察其能否而裁抑其耗蠧庶幾郡邑寬而民力裕也聖政總論考之詩書如倉積於豳糧峙於申會搜之偹逹於衛境忽有水旱之變則省耕省斂以為施惠會同軍旅之事則資糧屝屨以供困乏不責天下以取辦也自戰國以來兵革不息於是漕挽之術起而竭土地之有無問逺近以應上輸然事已兵休猶不至於甚病漢初漕運髙后文景時中都所用者省歲計不過數十萬石而足是時漕運之法亦未講到得武帝官多徒役衆在關中之粟四百萬猶不足給之所以鄭當時開漕渠六輔渠之類蓋緣當時用粟之多漕法不得不講然當漢之漕在武帝時諸侯王尚未盡輸天下之粟至武宣以後諸侯王削弱方盡輸天下之粟漢之東南漕運至此始詳當髙帝之初天子之州郡與諸侯封疆相間雜諸侯各據其利粟不及於天子是時所謂淮南東道皆天子奉地如賈生説是漢初如此至漢武帝時亦大概有名而無實其發運粟入關當時尚未論江淮到得唐時方論江淮何故漢會稽之地去中國封疆遼逺開墾者多粟不入京都以京都之粟尚不自全何况諸侯自封殖且如吳王濞作亂枚乘之説言京都之倉不如吳之富以此知當時諸侯殖利自豐不是運江淮之粟到唐時全倚辦江淮之粟唐太宗以前府兵之制未壞有征行便出兵兵不征行各自歸散於田野未盡仰給大農所以唐髙祖太宗運粟於關中不過十萬後來明皇府兵之法漸壞兵漸多所以漕粟自此多且唐睿明皇以後府兵之法已壞是故用粟乃多向前府兵之法未壞所用粟不多唐漕運時李傑裴耀卿之徒未甚講論到二子講論自是府兵之法既壞用粟既多不得不講論且如漢漕係鄭當時之議都不曽見於髙惠文景之世唐之李傑裴耀卿之議都不曽見於髙祖太宗之世但只見於中睿明皇之時正緣漢武帝官多役衆唐中睿已後府兵之法壞兵聚既多所以漕運不得不詳大抵這兩事常相為消長兵與漕運常相關所謂宗廟社饗之類十分不費一分所費廣者全在用兵所謂漕運全視兵多少且唐肅宗代宗之後加河北諸鎮皆強租賦不領於度支當時有如吐蕃回紇為亂所用猶多寶應至德之間嵗遣兩河諸鎮所以全倚辦江淮之粟議論漕運其大略自江入淮自淮入汴自汴入河自河入渭各自正輸水次各自置倉如集津倉洛口倉含嘉倉河隂倉渭橋轉相般運道途之逺此法遂壞自當時劉晏再整頓運漕之法江淮之道各自置船淮船不入汴汴船不入河河船不入渭水之曲折各自便習其操舟者所以無傾覆之患國計於是足所以唐人議論之多惟江淮為最急德宗時緣江淮米不至六軍之士脫巾呼於道韓滉運米嵗至德宗太子置酒相慶可見唐人倚辦於此如此其急唐時漕運大率三節江淮是一節河南是一節陜西到長安是一節所以當時漕運之臣所謂無如此三節最重者京口初京口濟江淮之粟並會於京口京口是諸侯咽喉處初時潤州江淮之粟至於京口到得中間河南陜西互相轉輸然而三處惟是江淮最切何故皆是江淮發足所以韓滉由漕運致位宰相李錡因漕運飛揚跋扈以至作亂以此三節惟是京口最重所謂漢漕一時所運臨時制宜不足深論到得宋朝定都於汴是時漕運之法分為四路東南之粟自淮入汴至京師若是陜西之粟使自三門白波轉黃河入汴至京師若是陳蔡一路粟自惠民河至京師京東之粟自廣濟河至京師四方之粟有西路四條河至京師當時最重者惟是汴河最重何故河西之粟江無阻及入汴大計皆在汴其次北方西粟自三門白波入關自河入汴入京師雖惠民廣濟來處不多其勢也輕宋朝置發漕兩處是江淮至真州陸路轉輸之勞其次北方之粟底柱之門舟楫之利若其他置發運如惠民河廣濟河雖嘗立官然不如兩處之重此宋朝之大略如此然而宋所謂嵗漕六百萬石専倚辦江淮其所謂三門白波之類非大農仰給之所惟是江淮最重在祖宗時陸路之粟至真州入轉船倉自真方入船即下貯發運司入汴方至京師諸州回船却自真州請鹽散於諸州諸州雖有費亦有鹽以償之此是宋朝良法凡以江淮往來遲速必視風勢本朝發運使相風旗有官專主管相風旗合則無罪如不合便是姦弊大船之遲速何故以風為旗蓋緣風動四方萬里只是一等所以使得相風旗真州便是唐時楊子江後來宋朝改號曰真州運法未壞諸州船只到真州請鹽回其次入汴入京師後來發運嵗漕船謂之發運官船與諸州載米發運申眀汴船不出江諸州又自造船雖有此約束諸州船終不應副因此漕法漸壞惟發綱發運未罷及蔡京為相不學無術不能眀考祖宗立法深意遂廢改鹽法置直逹法無水處不如此且時姦吏多雖有漕運之官不過催督起發其官亦有名而無實大抵用官船逐處漕運時便都無姦計若用直達法經涉嵗月長逺故得為姦所費甚多東南入京之粟亦少故太倉之粟少似東南蓄積發運有名無實此召亂之道也宋朝漕運之法壞自蔡京東京發遣本原大略如此東萊文漕法唐制凡陸行之程馬日七十里步及驢五十里車三十里水行之程舟之重者泝河日三十里江四十里餘水四十五里空舟泝河四十里江五十里餘水六十里沿流之舟即輕重同制河日一百五十里江一百里餘水七十里漕數漢初嵗不過數十萬石武帝時度四百萬石唐初不過二十萬石太宗時河南陜運一百八十萬石開元中崔希逸嵗運百八十萬石天寶中每嵗水陸二百五十萬石代宗時劉晏嵗百一十萬石劉晏後浸減至李巽乃復如晏之多後漕益少江淮米至渭橋才二十萬斛通典宋太平興國始制汴河歲運江淮粳米二百萬石豆百萬石大中祥符初七百萬石此最登之數也天禧末諸州水運上供金帛緡錢二十二萬一千餘貫兩端匹珠寶香藥三十七萬五千餘斤太宗時歲漕江浙米四百萬石景德三年上供六百萬石永為定制用發運李溥之請也至天聖四年或增置六百五十是歲以吳耀卿言詔減五十萬石漕費秦三十鍾致一石漢武伐西南夷率十餘鍾致一石唐都長安初漕租米至東都輸含嘉倉以車或馱陸運至陜而水行來逺多風波覆溺之患其失常十七八率一斛而得八斗為成勞而陸運至陜率兩斛計庸錢千又玄宗時所出水陸之直增以函腳營窖之名民間傳言用斗錢運斗米漕運得人唐有裴耀卿劉晏韓滉宋范旻為淮南轉運使太宗謂曰江淮之間輦運相繼實我倉廪卿之功也旻曰唐貞元中江淮輸米才十萬石今每嵗輦運倍於貞元上曰知卿有功要覽三司張方平畫漕運十四䇿富弼讀於上前漏盡十刻上太息稱善悉如所啓施行弼退謂方平曰自慶歷以來公論食貨詳矣朝廷每有損益必以公奏議為本其後未期年而京師有五年之蓄宋朝置官宋置淮南浙江湖路都大發運使副使都監以朝官以上或諸司使充至道元年兩浙發運使始於淮南創值廨三年罷發運使自後並以淮南轉運使領其務景祐元年罷江淮發運使五年復置會要羣書考索後集卷五十五
