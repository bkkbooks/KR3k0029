body:
  text: 羣書考索續集卷二宋章如愚編經籍門易易之畫無窮卦畫生生無所終象所以為易道之妙易有太極是生兩儀兩儀生四象四象生八卦竊謂此乃孔子發明伏羲畫卦自然之形體次第最為切要古今説者惟康節明道二先生為能知之故康節之言曰一分為二二分為四四分為八八分為十六十六分為三十二三十二分為六十四猶根之有幹幹之有枝愈大則愈少愈細則愈繁而明道先生以為加一倍法其發明孔子之言又可謂最切要矣蓋以河圖洛書論之太極者虛其中之象也兩儀者隂陽竒耦之象也四象者河圖之一合六二合七三合八四合九洛書之一含九二含八三含七四含六也八卦者河圖四正四隅之位洛書四實四虛之數也以卦畫言之太極者象數未形之全體也兩儀者一為陽而􅄲為隂陽數一而隂數二也四象者陽之上生一陽則為二而謂之太陽生一隂則為而謂之少隂隂之上生一陽則為而謂之少陽生一陰則為而謂之太隂也四象既立則太陽居一而含九少陰居二而含八少陽居三而含七太隂居四而含六此六七八九之數所由定也八卦者太陽之上生一陽則為而名乾生一隂則為而名兌少隂之上生一陽則為而名離生一隂則為而名震少陽之上生一陽則為而名巽生一隂則為而名坎太陰之上生一陽則為而名艮生一隂則為而名坤康節先天之説所謂乾一兌二離三震四巽五坎六艮七坤八者蓋謂此也至於八卦之上又各生一隂一陽則為四畫者十有六經雖無文而康節所謂八分為十六者此也四畫之上又各生一隂一陽者則為五畫者三十有二經雖無文而康節所謂十六分為三十二者此也文公易傳五畫之上各生一竒一偶而為六畫者六十四則兼三才而兩之而八卦之乘三卦亦周於是六十四卦之名立而易道大成矣周禮所謂三易之别皆六十有四大傳所謂因而重之爻在其中矣邵子所謂三十二分為六十四者是也若於其上各卦又各生一竒一偶則為七畫者百二十八矣七畫之上又各生一竒一偶則為八畫者二百五十六矣八畫之上又各生一竒一偶則為九畫者五百十二矣九畫之上又各生一竒一偶則為十畫者千二十四矣十畫之上又各生一竒一偶則為十一畫者二千四十八矣十一畫之上又各生一竒一偶則為十二畫者四千九十六矣此焦貢易林變卦之數蓋以六十四乘六十四也今不復為圗於此而略見第四篇中若自十二畫上又各生一竒一偶纍至二十四畫則成千六百七十七萬二千二百一十六變以四千九十六自相乘其數亦與此合引而伸之蓋未知其所終極也雖未見其用處然亦足以見易道之無窮矣易學啓蒙原易之象論伏羲畫卦之原與文王周孔演易之義太乙肇判隂降陽升陽一以施隂兩而承惟皇昊羲仰觀俯察竒偶既陳兩儀斯設既幹乃支一各生兩陰陽交錯以立四象竒加以竒曰陽之陽竒而加偶陽隂以章偶而加竒隂內陽外偶復加偶隂與陰會兩一既分一復生兩三才在目八卦指掌竒竒而竒初一曰乾竒竒而偶兊次二焉竒偶而竒次三曰離竒偶而偶四震以隨偶竒而竒巽居次五偶竒而偶坎六斯睹偶偶而竒艮居次七偶偶而偶八坤以畢初畫為儀中畫為象上畫卦成人文斯朗因而重之一貞八悔六十四卦由內達外交易為體往此來彼變易為用時靜時動降帝而王傳夏歷商有占無文民用弗彰文王繫彖周公繫爻視此八卦二純六交乃乾斯父乃坤斯母震坎艮男巽離兌女離南坎北震東兌西乾坤艮巽位以四維建官立師命曰周易孔聖傳之是為十翼遭秦弗燼及宋而明邵傳羲畫程演周經象陳數列言盡理得彌億萬年永著常式易學啓蒙述易之旨前聖人作易教人卜筮至孔子乃専用義理發揮昔在上古世質民淳是非莫别利害不分風氣既開乃生聖人聰明睿智出類超羣仰觀俯察始畫竒偶教之卜筮以斷可否作為君師開鑿户牖民用不迷以有常守降及中下世變風移浮澆質喪民偽日滋穆穆文王身蒙大難安土樂天惟世之患乃本卦義繫此彖辭爰及周公六爻是資因事設教丁寧詳密必中必正乃亨乃吉語子惟孝語臣則忠鈎深闡微如日之中暨乎末流淫於術數僂句或欺黃裳亦誤大哉孔子晚好是書韋編八索以袪乃作彖象十翼之篇専用義理發揮經言居省象辭動察變占存亡進退陟降飛潛曰毫曰釐匪差匪繆假我數年庶無大咎恭惟三古四聖一心垂象炳明千載是臨惟是學者不本其初文辭象數或肆或拘嗟豫小子既微且陋鑽仰沒身奚測奚究匪警滋荒匪識滋陋維用存疑敢曰垂後同上先天之易伏羲氏先天之易至康節始明易有太極是生兩儀者一理之判始生一竒一偶而為一畫者二兩儀生四象者兩儀之上各生一竒一偶而為二畫者四也四象生八卦四象之上各生一竒一偶而為三畫者八也爻之所以有竒有偶卦之所以三畫而成者以此而已是皆自然流出不假安排聖人又已分明説破亦不待更著言語别立議論而後明也此乃易學綱領開卷第一義然古今未見有識之者至康節先生始傳先天之學而得其説且以此為伏羲氏之易也説卦天地定位一章先天圗乾一兌二離三震四巽五坎六艮七坤八之序皆本於此若自八卦之上又放此而生之至於六畫則八卦相重而成六十四卦矣剛柔雖若各有所偏必相錯而後得中然在乾坤二卦之全體當剛而剛當柔而柔則不待相錯而不害其為全矣其爻位之無過不及者如乾坤之二五亦不待相錯而不害其為中矣陰陽變化而太極之妙無不在焉文公文集伏羲八卦論數往者順知來者逆及易逆數之説以橫圖觀之有乾一而後有兌二有兌二而後有離三有離三而後有震四有震四而巽五坎六艮七坤八亦以次而生焉此易之所以成也而圎圗之左方自震之初為冬至離兊之中為春分以至於乾之末而交夏至焉皆進而得其已生之卦猶自今日而追數昨日也故曰數往者順其右方自巽之初為夏至坎艮之中為秋分以至於坤之末而交冬至焉皆進而得其未至之卦猶自今日而逆計來日也故曰知來者逆然本易之所以成則其先後始終如橫圗及圎圗右方之序而已故曰易逆數也啓蒙文王八卦論文王改易伏羲卦圗之意蓋自乾南坤北而交則乾北坤南而為泰矣自離東坎西而交則離西坎東而為既濟矣乾坤之變者自其所已成而反其所由生也故再變則乾退乎西北坤退乎西南也坎離之變者東自上而西西自下而東也故乾坤既退則離得乾位而坎得坤位也震用事者發生於東方巽代母者長養於東南也易學啓蒙嘗考此圗而更為之説曰震東兌西者陽主進故以長為先而位乎左隂主退故以少為貴而位乎右也坎北者進之中也離南者退之中也男北而女南者互藏其宅也四者當四方之正位而為用事之卦然震兌始而坎離終震兌輕而坎離重也乾西北坤西南者父母既老而退居不用之地也然母親而父尊故坤猶用半而乾全不用也艮東北巽東南者少男進之後而長女退之先故亦皆不用也然男未就傅女將有行故巽稍向用而艮全未用也四者皆居四隅不正之位然居東者未用而居西者不復用也易學啓蒙易之道有太極之易不可以書言洗心齋戒特觀象玩辭觀變玩占之大者但方其退藏而與民同患之用已具及其應變則又所以齋戒而神眀其德此則非聖人不能與精義致用利用崇德亦頗相類此下所言闔闢往來乃易之道易有太極則承上文而言所以往來闔闢而無窮者以其有是理耳有是理則天地設位而易行乎其中矣兩而生四四而生八至於八則三變相因而三才可見故聖人因之畫為八卦以形變易之妙而定吉凶至此然後可以言書耳前所謂易有太極者恐未可以書言也文公答蔡西山變易從道易字與道字不相似隨時變易以從道主卦爻而言然天理人事皆在其中今且以乾卦潛見飛躍觀之其流行而至此者易也其定理之當然者道也故明道亦曰其體則謂之易其理則謂之道而伊川又謂變易而後合道易字與道字不相似也又云人隨時變易為何為從道也此皆可以見其意矣易中無一卦一爻不具此理所以沿流而可以求其源也文公乾坤三索震巽曰一索坎離曰再艮兌曰三今按坤求於乾得其初九而為震故曰一索而得男乾求於坤得其初六而為巽故曰一索而得女坤再求而得乾之九二以為坎故曰再索而得男乾再求而得坤之六二以為離故曰再索而得女坤再求而得乾之九三以為艮故曰三索而得男乾三求而得坤之六三以為兌故曰三索而得女也凡此數節皆文王觀於已成之卦而推其未明之象以為説邵子所謂後天之學入用之位者也易學啓蒙大衍之數五十之數積於河圗洛書之五數河圗洛書之中數皆五衍之而各極其數以至於十則合為五十矣河圗積數五十五其五十者皆因五而後得獨五為五十所因而自無所因故虛之則但為五十又五十五之中其四十者分為隂陽老少之數而其五與十者無所為則又以五乘十以十乘五而亦皆為五十矣洛書積數四十五其四十者散布於外而分陰陽老少之數惟五居中而無所為則亦自含五數而并為五十矣易學啓蒙四象之數論四象之數自三畫未成之時已具四象之數前日間推只自三畫未成之數已具此數蓋太陽居一而含九少隂居二而含八少陽居三而含七太陰居四而含六不待揲蓍而後有也揲蓍歸竒之數乃是湊著此數過揲之數又是湊著歸竒之數耳近見論者専以過揲之數斷七八九六之説至於歸竒之數尚不能明况能及此乎嘗為之説曰四象之畫六七八九之祖也四象之次六七八九之父也歸竒者其子也過揲者其孫也此論似不可易又曰象之次自十倒數畫六而得太隂之四以上皆然又屈五指而計之一與九同二與八同三與七同四與六同此亦自然不言之妙直是可笑不由人安排文公答蔡西山挂扐過揲之法辨近世前一變獨挂後二變不挂之誤及論隂陽老少之所以然經曰再扐而後挂又曰四營而成易其指甚明注疏雖不詳説然劉禹錫所記僧一行畢中和顧彖之説亦已備矣近世諸儒乃有前一變獨挂後二變不挂之説考之於經乃為六扐而後挂不應五嵗再閏之義且後兩變又止三營蓋已誤矣且用舊法則三變之中又以前一變為竒後二變為偶竒故其餘五九偶故其餘四八餘五九者五三而九一亦圍三徑一之義也餘四八者四八皆二亦圍四用半之義也三變之後老者陽饒而陰乏少者陽少而隂多亦皆有自然之法象焉蔡西山曰按五十之蓍虛一分二挂一揲四為竒者三為偶者二是天三地二自然之數而三揲之變老陽老隂之數本皆八合之得十六陽以老為動而隂性本靜故以四歸於老陽此老隂之數所以四老陽之數所以十二也少陽少隂之數本皆二十四合之四十八少為靜而陽性本動故以四歸於少隂此少陽之數所以二十而少隂之數所以二十八也易用老而不用少故六十四變所用者十六變十六變又以四約之陽用其三隂用其一蓋一竒一偶對待者隂陽之體陽三陰一一饒一乏者隂陽之用故四時春夏秋生物而冬不生物天地東西南可見而北不可見人之瞻視亦前與左右可見而背不可見也不然則以四十九蓍虛一分二挂一揲四則為竒者二為偶者二而老陽得八老隂得八少陽得二十四少隂得二十四不亦善乎聖人之智豈不及此而其取此而不取彼者誠以隂陽之體數常均用數則陽三而隂一也若用近世之法則三變之餘皆為圍三徑一之義而無復竒偶之分三變之後為老陽少陰者皆二十七為少陽者九為老隂者一又皆參差不齊而無復自然之法象此足以見其説之誤矣至於陰陽老少之所以然者則請復得而通論之蓋四十九䇿除初挂之一而為四十八以四約之為十二以十二約之為四故其揲之一變也挂扐之數一其四者為竒兩其四者為偶其三變也挂扐之數三其四一其十二而過揲之數九其四三其十二者為老陽挂扐過揲之數皆六其四兩其十二者為老隂自老陽之挂扐而增一四則是四其四也一十二而又進一四也自其過揲者而損一四則是八其四也三其十二而損一四也此所謂少隂者也自老陰之挂扐而損一四則是五其四也兩其十二而去一四也自其過揲而增一四則是七其四也兩其十二而進一四也此所謂少陽者也二老者陰陽之極也二極之間相距之數凡十有二而三分之自陽之極而進其挂扐退其過揲各至於三之一則為少隂自隂之極而退其挂扐進其過揲各至於三之一則為少陽老陽居一而含九故其挂扐十二為最少而過揲三十六為最多少隂居二而含八故其挂扐十六為次少而過揲三十二為次多少陽居三而含七故其挂扐二十為稍多而過揲二十八為稍少老陰居四而含六故其挂扐二十四為極多而過揲亦二十四為極少蓋陽竒而隂偶是以挂扐之數老陽極少老隂極多而二少者一進一退而交於中焉此其以少為貴者也陽實而隂虛是以過揲之數老陽極多老陰極少而二少者亦一進一退而交於中焉此其以多為貴者也凡此不唯隂之與陽既為二物而迭為消長而其一物之中此二端者又各自為一物而迭為消長其相與低昂如權衡其相與判合如符劵固有非人之私智所能取舍而有無者而况挂扐之數乃七八九六之原而過揲之數乃七八九六之委其勢又有輕重之不同而或者乃欲廢置挂扐而獨以過揲之數為斷則是舍本而取末去約以就煩而不知其不可也豈不誤哉邵子曰五與四四去挂一之數則四三十二也九與八八去挂一之數則四六二十四也五與八八九與四八去挂一之數則四五二十也九與四四五與四八去挂一之數則四四十六也故去其三四五六之數以成九八七六之䇿此之謂也易學啓蒙乾坤之䇿三百六十者舉中數而言也乾之䇿二百一十有六者積六爻之䇿各三十六而得之也坤之䇿百四十有四者積六爻之䇿各二十有四而得之也凡三百六十者合二百一十有六百四十有四而得之也當期之日者每月三十日合十二月為三百六十也蓋以氣言之則有三百六十六日以朔言之則有三百五十四日今舉氣盈朔虛之中數而言故曰三百有六十也然少陽之䇿二十八積乾六爻之䇿則一百六十八少陰之䇿三十二積坤六爻之䇿則一百九十二此獨以老隂老陽之䇿為言者以易用九六不用七八也然二少之合亦三百有六十易學啓蒙四營成易分二為一營挂一為二營揲四為三營歸竒為四營四營者四次經營也分二者第一營也挂一者第二營也揲四者第三營也歸竒者第四營也易變易也謂揲之一變也四營成變三變成爻一變而得兩儀之象再變而得四象之象三變而得八卦之象一爻而得兩儀之畫二爻而得四象之畫三爻而得八卦之畫四爻成而得其十六者之一五爻成而得其十六者之一五爻成而得其三十二者之一至於積七十二營而成十有八變則六爻見而得乎六十四卦之一矣然方其三十六營而九變也已得三畫而八卦之名可見則內卦之為貞者立矣此所謂八卦而小成者也自是而往引而伸之又三十六營九變以成三畫而再得小成之卦者一則外卦之為悔者亦備矣六爻成內外卦備六十四卦之别可見然後視其爻之變與不變而觸類以長焉則天下之事其吉凶悔吝皆不越乎此矣易學啓蒙用九用六陽爻用九而不用七隂爻用六而不用八用九用六者變卦之凡例也言凡陽爻皆用九而不用七隂爻皆用六而不用八用九故老陽變為少隂用六故老隂變為少陽不用七八故少陽少隂不變獨於乾坤二卦言之者以其在諸卦之首又為純陽純隂之卦也聖人因繫以辭使遇乾而六爻皆九遇坤而六爻皆六者即此而占之蓋羣龍無首則陽皆變隂之象利永貞則隂皆變陽之義也易學啓蒙八卦之象隂陽竒偶吉凶之象皆可以類求八卦之象説卦詳焉考之於經其用弗専象以情言象以象告惟是之求斯得其要乾健天行坤順地從震動為雷巽入木風坎險水泉亦雲亦雨離麗文明電日而火艮止為山兌説為澤以是舉之其要斯得凡卦六虛竒偶殊位竒陽耦隂各以其類得位為正二五為中二臣五君初始上終貞悔體分爻以位應隂陽相求乃得其正凡陽斯淑君子居之凡隂斯慝小人是為常可類求變非例測非常曷變謹此為則易學啓蒙易取象於物易之取象固有所自來今不可考但當據辭中之象以求其意耳易之有象其取之有所從其推之有所用非茍為寓言也然兩漢諸儒必欲究其所從則既滯泥而不通王弼以來直欲推其所用則又踈略而無據二者皆失之一偏而不能闕其所疑之過也且以一端論之乾之為馬坤之為牛説卦有明文矣馬之為健牛之為順在物有常理矣至於案文責卦若屯之有馬而無乾離之有牛而無坤乾之六龍則或疑於震坤之牝馬則當反為乾是皆有不可曉者是以漢儒求之説卦而不得則遂相與創為互體變卦五行納甲飛伏之法參互以求其幸而偶合其説雖辨然其不可通者終不可通其可通者又皆傅會穿鑿而非有自然之勢唯其一二之適然而無待於巧説者為若可信然上無所關於義理之本原下無所資於人事之訓戒則又何必苦心極力以求於此而必欲得之哉故王弼曰義茍應健何必乾乃為馬爻茍合順何必坤乃為牛而程子亦曰理無形也故假象以顯義此其所以破先儒膠固支離之失而開後學玩辭玩占之方則至矣然觀其意又似直以易之取象無復有所自來但如詩之比興孟子之譬喻而已如此則是説卦之作為無所與於易而近取諸身逺取諸物者亦剩語矣故疑其説亦若有未盡者因切論之以為易之取象固必有所自來而其為説必已具於太卜之官顧今不可復考則姑闕之而直據辭中之象以求象中之意使足以為訓戒而決吉凶如王氏程子與吾本義之云者其亦可矣固不必深求其象之所自來然亦不可直謂假設而遽欲忘之也文公文集易精變神説至精至變至神之妙皆不可以書言變化之道莫非神之所為也故知變化之道則知神之所為矣易有聖人之道四焉所謂變化之道也觀察玩占可以見其精之至矣玩辭觀象可以見其變之至矣然非有寂然感通之神則亦何以為精為變而成變化之道哉此變化之道所以為神之所為也所以極深者以其幾也所以研幾者以其變也極深研幾所以不疾而速不行而至者以其神也此又發明上文之意復以易有聖人之道四焉者結之也或曰至精至變皆以書言之矣至神之妙亦以書言可乎曰至神之妙固無不在詳考之文意則實亦以書言之也所謂無思無為寂然不動云者言在册象在畫蓍在櫝而變未形也至於玩辭觀象而揲蓍以變則感而遂通天下之故矣推而極於天地之大反而驗諸心術之微其一動一靜循環始終之際至神之妙亦如此而已矣嗚呼此其所以不疾而速不行而至歟文集參伍錯綜説參以三數之也伍以五數之也錯者雜而互之也綜者條而理之也參以三數之也伍以五數之也如云什伍其民如云或相什伯非直為三與五而已也蓋紀數之法以三數之則過五而齊以五數之則遇三而會故荀子曰窺敵制變欲伍以參注引韓子曰省同異之言以知朋黨之分偶三五之驗以責陳言之實又曰參之以比物五之以合三而漢書趙廣漢傳亦云參伍其賈以類相凖皆其義也易所謂參伍以變者蓋言或以三數而變之或以伍數而變之前後多寡更相反復以不齊而要其齊如河圗洛書大衍之數伏羲文王之卦歷象之日月五星章蔀紀元是皆各為一法不相依附而不害其相通也綜字之義沙隨得之然錯綜自是兩事錯者雜而互之也綜者條而理之也參伍錯綜又各是一事參伍所以通之其治之也簡而疏錯綜所以極之其治之也繁而密文集易之為教不同因時立教以承三聖不同於法而同於道者惟程氏之書易之為書更歷三聖而制作不同若包羲氏之象文王之辭皆依卜筮之為教而其法則異至於孔子之贊則又一以義理為教而不専於卜筮也是豈其故相反哉俗之淳漓既異故其所以為教為法者不得不異而道則未嘗不同也然自秦漢以來考象辭者泥於術數而不得其𢎞通簡易之法談義理者淪於空寂而不適乎仁義中正之歸求其因時立教以承三聖不同於法而同於道者則惟伊川先生程氏之書而已後之君子誠能日取其一卦若一爻者熟復而深玩之如已有疑將決於筮而得之者虛心端意推之於事而反之於身以求其所以處此之實則於吉凶消長之理進退存亡之道將無所求而不得邇之事父逺之事君亦無處而不當矣文公文集易之蓍卦蓍卦蓋出於自然之法象非聖人心思智慮之所為聖人觀象以畫卦揲蓍以命爻使天下後世之人皆有以決嫌疑定猶豫而不迷於吉凶悔吝之途其功可謂盛矣然其為卦也自本而幹自幹而支其勢若有所迫而不能自巳其為蓍也分合進退縱橫順逆亦無往而不相值焉是豈聖人心思智慮之所得為也哉特氣數之自然形於法象見於圗書者有以啓於其心而假手焉耳近世學者類喜談易而不察乎此其専於文義者既支離散漫而無所根著其涉於象數者又皆牽合傅會而或以為出於聖人心思智慮之所為也若是者豫切病焉因與同志頗輯舊聞為書四篇以示初學使毋疑於其説云易學啓蒙序辭占象變論辭占象變之理與筮短龜長之説易有象八卦六爻然後有辭卦爻之辭筮有變老隂老陽然後有占變爻之辭象之變也在理而未形於事者也辭則各因象而指其吉凶占則又因吾之所值之吉凶決焉其示人也益以詳矣故君子居而學易則既觀象矣又玩辭以考其所處之當否動而諏筮則既觀變矣又玩占以考其所值之吉凶善而吉者則行否而凶者則止是以動靜之間學無違理而自天祐之吉無不利也蓋觀者一見而決玩者反復而不舍之辭也筮短龜長之説惟見於左氏元凱之注理固有之但先王制卜筮之法至嚴至敬虛其心以聽於鬼神専一則應疑二則差故禮曰卜筮不相襲蓋為此也晉獻之欲立驪姬以理觀之不待卜而不吉可知矣及其卜之不吉也則亦深切著明已矣乃不勝其私意而復筮之是以私心為主而取必於神明也豈有感通之理哉此所以筮之雖吉而卒不免於凶也今不推其所以聽於鬼神者之不専不一而遽欲即此以較龜筮之短長恐未免乎易其言之責也理則一而已矣其形者則謂之器其不形者則謂之道然而道非器不形器非道不立蓋隂陽亦器也而所以陰陽者道也是以一隂一陽往來不息而聖人指是以明道之全體也此一隂一陽之謂道之説也文公文集明筮教人以揲蓍之法倚數之元參天兩地衍而極之五十乃備是曰大衍虛一無為其為用者四十九蓍信手平分置右於几取右一蓍挂左小指乃以右手揲左之䇿四四之餘歸之於扐初扐左手無名指間右䇿左揲將指是安再扐之竒通挂之算不五則九是謂一變置此挂扐再用存䇿分挂揲歸復凖前式三亦如之竒皆四八三變既備數斯可察數之可察其辨伊何四五為少八九為多三少為九是曰老陽三多為六老隂是當一少兩多少陽之七孰八少隂少兩多一既得初爻復合前蓍四十有九如前之為三變一爻通十八變六爻發揮卦體可見老極而變少守其常六爻皆守彖辭是當變視其爻兩兼首尾變及三爻占兩卦體或四或五視彼所存四二五一二分一専皆變而他新成舊毁消息盈虛捨此視彼乾占用九坤占用六泰愕匪人姤喜來復易學啓蒙讀易之法學易者當先正其心以體之於身讀易之法先正其心肅容端席有翼其臨於卦於爻如筮斯得假彼象辭為我儀則字從其訓句逆其情事因其理意適其平曰否曰臧如目斯見曰止曰行如足斯踐毋寬以略毋密以窮毋固而可毋必而通平易從容自表而裏及其實之萬事一理理定既實事來尚虛用應始有體該本無稽實待虛存體應用執古御今由靜制動潔靜精微是之謂易體之在我動有常吉在昔程氏繼周紹孔奧旨宏綱星陳極拱惟斯未啓以俟後人小子狂簡敢述而申之易學啓蒙羣書考索續集卷二
