body:
  text: 羣書考索後集卷五十八宋章如愚編財用門酒類酒者先王所以供祭祀以行禮祭也古有醴酪時儀狄作酒禹飲而甘之遂疏儀狄絶㫖酒曰後世必有酒亡國者後殷紂果以酒敗也周文王誥教小子有正有事无彛酒越庶國飲惟祀徳将无醉酒誥成王時周公誥羣臣曰矧汝剛制于酒厥或告曰羣飲汝勿佚盡執拘以歸于周予其殺又惟殷之廸諸臣惟工乃湎于酒勿庸殺之姑惟教之有斯明享乃不用我教辭惟我一人弗恤弗蠲乃事時同于殺酒誥周官萍氏掌㡬酒謹酒鄭司農釋云㡬者㡬察沽賣過多及非時者謹者使民節用而无彛也秋官漢興有酒酤之禁其律三人以上無故羣飲酒罰金四兩又紀文帝即位賜民酺五日十六年九月令天下大酺本紀後元年詔戒為酒醪以糜榖者多景帝中元三年夏旱禁酤酒本紀後元年夏大酺民得沽酒本紀師古曰酺之為言布也王徳布於天下合聚歛食為酺武帝天漢三年初𣙜酒酤本紀昭帝始元六年詔郡國賢良文學問民所疾苦皆對願罷酒𣙜均輸等官無與民争利洪羊難之於是丞相田千秋奏宜罷郡國𣙜酤酒秋七月罷𣙜酤令民得以律占租本紀及通典宣帝時復禁民酤通典五鳯二年詔諸郡國二千石勿擅行苛禁禁民嫁娶不得具酒食相賀由是廢郷黨之禮非所以導民也三年賜民大酺五日本紀元帝時賈捐之上書曰今天下人賦數百造鹽鐵𣙜酒之科以佐用度猶不足而人困矣後漢末曹操表奏酒禁孔融争之王莽時魯康言鹽鐵錢布皆斡在縣官惟酒酤獨未斡後設六管之令命縣官酤酒置酒士郡一人乗傳督酒利本傳宋文帝時虞荔以國用不足奏立𣙜酤之科永嘉中二年從之南史後魏設酒禁隋文帝開皇三年罷酒坊與百姓共之本史唐初無酒禁肅宗乾元二年京師酒貴帝以廪食方屈乃禁京城酤酒期以麥熟如初二年飢復禁酤唐志代宗廣徳二年定天下酤户以月收稅除此外不問官私一切禁斷大歴六年量定三等逐月稅錢唐史時關輔旱裴諝入對帝問𣙜酤利嵗入幾何諝曰臣謂陛下軫念元元先訪疾苦而乃責臣以利孟子曰治國以仁義何以利為帝曰微公言朕不聞此本傳徳宗建中元年罷酤戸稅三年復禁民酤以佐軍費置肆釀酒斛收直三千州縣總領醨薄私釀者論其罪尋以京師四方所奏罷𣙜貞元二年復禁京城畿縣酒天下置肆以酤者斗錢百五十免其徭役獨淮南忠武宣武河東𣙜麴而已憲宗元和六年罷京師酤肆以𣙜酒錢隨兩稅青苖歛之元和十二年四月十二日户部奏凖𠡠文如酤户出𣙜酒錢處即不得更置官店𣙜酤其中或有諸州府先有不配户出錢者即須𣙜酤請委州府長官據當處錢額約米麴時價收利應額足即止仍限起請到後一月日内處置訖申奏從之元和十四年五月湖州刺史李應奏先是官中酤酒代百姓納𣙜嵗月既久為弊滋深伏望許令百姓自酤取舊額仍許入兩稅隨貫均出依舊例折納輕貨送上都許之文宗太和八年二月九日勑節文京邑之内本無𣙜酤自貞元用兵之後費用稍廣如定户店等第令其納𣙜殊非惠民今後特宜停廢會要遂罷京師𣙜酤凡天下𣙜酒為錢百五十六萬餘緡而釀費居三之一貧户逃酤不在焉唐志武宗會昌六年九月勑揚州等八道州府置㩁麴井置官店酤酒代百姓納𣙜酒錢并充資助軍用各有權許限揚州陳許汴州㐮州河東五處𣙜麴浙西東鄂岳三處置官店酤酒如聞禁止私酤過聞嚴酷一人違犯連累數家閭里之間不免咨怨宜從今已後如有人私酤酒及置私麴者但許罪止一身并所由容縱任據罪處分鄉井之内如不知情並不得追擾其所犯之人任用重典兼不得没入家産㑹要昭宗世以用度不足易京畿近鎮麴法復𣙜酒以贍軍李茂貞方顓其利按兵請入奏利害天子遽罷之唐志宗朝承李唐舊制官中造麴蘖酒皆有𣙜事略太祖建隆二年漢初犯私麴者並棄市周祖始令至五斤死上以周法尚峻壬申詔民犯私麴十五斤以私酒入城至三斗者始處極典其餘罪有差私市酒麴減造者之半通鑑乾徳四年以京城民酤釀者規利頗多命有司計其麴蘖之用定其價直併給升量之器寳訓開寶二年減西蜀之麴價太宗興國七年詔曰昨言事者以川陜諸州𣙜酤謂其便於民而足佐用度朕不得已而聽之比聞民庶頗懐咨怨遣使亷之備得其實况失道之未逺用改調以從宜其除諸州官措置𣙜酤舊造麴鬻仍除益州歳増麴錢六萬貫寳訓雍熈元年賜京師大酺三日淳化二年罷錢俶時兩浙諸州民户所欠酒直淳化五年詔應天下酒𣙜募民掌之减常課十之二使其易辦勿復遣吏與其間既而有司言歳課無幾願一切罷之但賣麴收其直詔從其請元龜真宗咸平五年十一月命度支貟外郎李士衡内殿崇班閣門祗候李溥詣陕西諸州増酒𣙜之課時士衡言陕西𣙜酤尚多遺利今西鄙屯戍至廣經費實繁望遣使經度其事可濟邉用而不擾民故有是命由是歳増錢二十五萬焉通鑑景徳元年户部判官李昉等上言江南諸州所増𣙜酤錢頗為煩擾属歳歉已各罷之二年李昉言江南兩浙荆湖路亦望停寢俟歳稔如故初制置茶監奏議規畫此制以助軍旅之費至是真宗覧昉等奏亟命停罷仍詔羲等自今𣙜酤之課悉仍舊勿復増益寳訓景徳四年四月宰相王旦因對言淮南𣙜酤屢有奏報且言諸路各置轉運使復遣官檢舉酒稅競以増益課利為功煩擾特甚上曰酤醸當有定制旦曰諸州雖各有元定酒數然隨時増益不已上曰地産財賦及民間費用固不能相絶課利豈可歳歳増益此特官吏務貪勞績不憫民困朕甚憫之乃詔三司取一年中等之數立為定額自今中外勿得更議增課以圖恩奬通畧仁宗乾興元年十一月丁巳禁増置酒場縻費榖麥十二月詔鄉村不得增置酒場其已募民主之者期三年他人雖欲增課以售勿聽主者欲自增委官吏度異時不至虧負然後上聞初上封者言天下酒課月比歳增無有藝極非古者禁群飲節用之義故條約之通畧天聖元年王軫言諸路酒務先係買撲毎歳課利多有不登望復許百姓買撲三司詳定所奏長編慶歴元年三司言兵支屯陕西而軍不足尤藉天下酒𣙜之利請較監官歲所增課特奬之奏可長編英宗四朝志曰𣙜酒之利以給養兵之費然其弊也酒直屢增而糟酵亦取其贏焉治平四年詔近復村酒場抑民市酒者罷之神宗熙寧三年詔諸郡節序毋得以酒相饋熙寧中荆公用事散青苗以取民之利使新進少年布滿州縣張酒肆廣聲樂多方招誘謂之設酒今之酒課沿荆襄而下至於兩浙其額重矣在城府有都酒庫又有贍軍庫在官者若課額之不登乃科配於市户在鄉者使買撲為坊籍其脚户月有定額有㑹客者則敷以常數有私醖者則陷以重辟至若縣官之月樁上供又有敷供黄麴錢為名其實白取之也熙寧四年正月詔三司應買撲酒麴諸坊場錢毎千約税錢五十仍别封樁以祿吏徽宗政和二年杭州更置比較務四年兩浙漕司亦請置比較務定課額以釀酒收息增虧為賞罸四朝志髙宗紹興八年四川安撫制置使胡世將於成都潼川資普廣安五處創清酒務是年收息錢四十五萬餘緡孝宗淳熈三年十一月戊申知成都府權四川制置使范成大入奏恭惟陛下宵旰民瘼同仁萬里俯念西蜀酒課虚額之弊公私力屈根柢可憂六月十二日詔書各與次第蠲減歳蠲上供緡錢四十七萬為蜀民代補贍軍折估之數聖政戸部狀照對犒賞諸酒庫昨來差官提領日每歳起觧户部争息錢四十萬貫間有分趂辦不足亦不下三十餘萬貫戸部逓年指淮補助經常支遣近縁淳熈十六年四月十五日承降指揮府庫撥𨽻州軍之後至年終諸州軍納到錢一十八千餘貫紹熈元年分諸州軍納到錢二十一萬七千餘貫并次年補到三萬八千餘貫及紹熈二年正月一日至八月十日終諸州軍納到錢三十萬二千貫縁為起發息錢虧少遂申降到今年十月四日指揮專委兩淮漕司拘催去今又兩月餘日其漕司不以為意催督所有紹熈二年分歳止十二月十日終通前共起到錢一十五萬五千餘貫本部切詳上件犒賞酒庫共六十三處散在兩淮州軍今歳将及年終雖本部不任催督止起一十五萬餘貫以此可見州郡将諸庫納到息錢占吝不發侵移妄用今且以淳熈十三年酌中年分納到息錢三十二萬七千餘貫較之三年已虧計發錢四十六萬餘貫若不别行措置切慮歳久愈見虧損國計今相度欲将兩淮諸州犒賞酒庫就委本部郎官縁酒坊係属右曹欲委自右曹郎中提領提置長貳得以同其檢管免致散漫暗失財計欲望朝廷詳酌特降㫖揮施行總論漢法三人無故群飲則罰金故自漢以來皆有酒酤之禁間賜民酺以適一時之歡是非欲奪民利而特為是隄防懼其為酒醪以糜榖故也武帝費用無度凡遺利在民間者網羅悉盡獨於酒酤之利若姑徐而未𣙜至天漢三年始置官自賣𣙜取其利以供國用行之纔十四年迨昭帝因賢良文學議而罷之乃令民自賣以所利而輸租既又限其酒使不得厚取民財此後世所謂萬戸酒也至宣帝則復禁民酤詔郡國二千石通於鄉黨酒食之㑹而非有利於民也觀魯康言於王莽曰鹽錢布帛互均餘貸斡在縣官惟酒酤獨未斡則知昭帝議罷之後猶未取於酒利也隋唐之間文帝能罷酒坊憲宗亦罷酤肆文帝又罷酒𣙜大歴貞元中常設是禁輙復輙罷亦未急於酒利也宋太宗减酒課十二既而從有司之請而罷之真宗詔𣙜利素有定規不得更議增課而酒禁亦未如是之嚴也愚不知今日𣙜酒之利如是其急乎百段錦或問周酒正唐酒之政令政令之在官者既掌之矣其在民者将如後世之𣙜酒乎抑以與民而聽民之自取其利乎謂酒有𣙜則先王九賦之目未聞有𣙜酒之政而與斯民争口腹之尋常亦非先王所以仁天下之心謂聽民之自取其利則酒正之外在地官則有司虣以掌市飲之禁在秋官則有萍氏以掌幾酒謹酒之禁又與後世曽不少異何也曰先王之於酒禁也禁其群飲以鬬争沉酣以敗風俗與其流禍糜米粟而已若夫孝養洗腆之所樂歳時㑹合冠昏鄉射之所飲則先王固與民共之非復自貪其利也漢興猶存此意後元之詔亦拳拳然憂百姓多為酒醪以縻榖先王之意正若是而已矣以百畝分民以九職任民有本為可厚則其末為可抑有生生之可樂則其刑罰為可畏是故周公雖不與民争其利亦不恣民趨於利也夫豢豕為酒禍至無窮也不為之禁則滛湎而無度群飲而鬭囂酒亂其德而獄訟日益繁滋矣况敢縱民於酣飲乎若夫後世則不然孝武帝之不顧斯民之無以為生一舉而盡奪之斡官之設雖近於酒正水衡都水之設雖近於萍氏大抵不過𣙜酒酤耳取之無藝歛之不惬衆心民固有不平於其下而酒𣙜均輸之議所以起後世賢良文學之紛紛也自是而後其禁愈嚴其犯者愈衆民之以酒獲罪者是未易可禁也先正翰林蘓公論酒誥一書以為漢武帝以來至於今皆有酒禁刑者有至流賞者以不貲未嘗少縱至於私釀終不能絶周公獨何以禁之曰周公無所利於酒也以正民徳而已甲乙皆笞其子甲之子服乙之子不服何也甲笞其子而責之學乙笞其子而奪之食此周公之所以能禁酒也况又有百畆之可耕九職之可任乎經國書銅錢貨幣之論憂商以前幣為三品珠玉為上幣黄金為中幣白金為下幣白金者銀也周外府掌邦布鄭氏注以布為泉其藏曰泉其行曰布太公立九府圜法黄金方寸而重一斤錢圜亟方輕重以銖故寶於金利於刀流於泉布於布束於帛太公既立之於周又退行於其齊也其後周景王時患錢輕更鑄大錢文曰寶貨肉好皆有周郭至秦兼天下幣為二等黄金以溢為上幣銅錢質如周錢文曰半兩重如其文為下幣漢興髙祖以秦錢重更令民鑄榆莢錢吕后二年行八銖錢六年行五分錢孝文五年為錢益多而輕乃更鑄四銖錢其文為半兩除盗鑄令賈誼諌有五禍七福之說不聽是時吴以諸侯即山鑄錢富埒天子鄧通鑄錢財過王者故吴鄧錢布天下武帝有事四夷用度廣出冶鑄或累萬金不佐公家之急乃與公卿議造銀錫白金以為天用莫如龍地用莫如馬人用莫如龜故曰金三品其一曰白撰重八兩圜之其文龍直三千其二曰亦重差小方之其文馬直五百其三曰復小撱之其文龜直三百令縣官銷半兩錢更鑄三銖錢重如其文盗鑄諸金錢罪皆死而吏民之盗鑄白金者不可勝數有司言三銖錢輕輕錢易作姦詐乃更請郡國鑄五銖錢周郭其質令不可磨取鎔焉造白金五銖錢後五歳而赦吏民之坐盗鑄金錢死者數十萬人其不發覺相殺者不可勝計自出者百餘萬人然不能半自出天下大抵無慮皆鑄金錢矣公卿請令京師鑄官赤仄一當五賦官用非赤仄不得行白金稍賤歳餘終廢不行後二歳赤仄錢賤民巧法用之不便又廢於是悉禁郡國毋鑄錢専令上林三官鑄錢既多而令天下非三官錢不得行漢武帝元鼎二年初置水衡都掌上林苑屬官有上林均輸官下銅令然則上林三官其是此三令乎諸郡國前所鑄錢皆廢銷之輸入其銅三官而民之鑄錢益少宣帝時貢禹言鑄錢采銅一歳十萬人不耕坐盗鑄䧟刑者衆宜罷采珠玉金銀鑄錢之官毋復以為幣租稅禄賜皆以布帛及榖議者以為交易待錢布帛不可尺寸分裂禹議亦寝自孝武元狩五年三官初鑄五銖錢至平帝元始中成錢二百八十億萬餘王莽居攝變漢制以周錢有子母相權於是便造大錢徑寸二分重十二銖文曰大錢五十又造契刀錯刀契刀其環如大錢身形如刀長二寸文曰契刀五百錯刀以黄金錯其文曰一刀直五千與五銖錢凡四品並行莽罪刀錢更作金銀龜貝錢布名曰寳貨天鳯元年罷大小錢改作貨布長二寸五分廣一寸首長八分有奇廣八分其圜好徑二分半足枝長八分間廣二分其文右曰貨左曰布重二十五銖直貨泉二十五貨錢徑一寸重五銖文右曰貨左曰泉枚直一與貨布二品竝行又以大錢行久罷之恐民挾不止乃令民且獨行大錢與新貨泉俱枚直一竝行盡六年毋復挾大錢矣後漢光武中興除王莽貨泉自莽以後貨幣雜用布帛金粟建武十六年馬援上書曰富國之本在於食貨宜如舊鑄五銖錢帝從之於是復鑄五銖錢天下以為便焉章帝時穀價貴縣官經用不足尚書張林言穀物皆貴此錢賤故爾宜令天下悉以布帛為租市買皆用之封錢勿出如此則百物皆賤矣帝用其言少時復止和帝時有上書言人以貨輕錢薄故致貧困宜改鑄大錢事下四府羣寮及大學能言之士孝廉劉陶上議曰當今之憂不在乎貨在乎民饑帝竟不鑄錢靈帝作五銖錢而有四出道連於邉縁有識者尤之曰豈非京師破壊此四出散於四方乎至董卓焚宫室乃刼鑾駕西幸長安悉壊五銖錢更鑄小錢大五分盡取洛陽及長安銅人飛亷之屬充鼔鑄其錢無輪郭文章不便時人由是貨輕而物貴榖一斛至錢數百萬曹公為相於是罷之還用五銖魏文帝黄初二年罷五銖錢而以榖帛為市買至明帝代錢廢榖用既久人間巧偽漸多競滋榖以要利作薄絹以為市司馬芝等言更鑄五銖於事為便帝乃更立五銖錢至晉用之不聞有所改創蜀先主時軍用不足備甚憂之西曹掾劉巴曰易耳但當鑄錢一直五百平諸物價數月之間府庫充實文曰直百亦有勒為五銖者大小秤兩如一焉並徑十分重四銖吴孫權嘉平五年鑄大錢一當五百文曰大泉五百徑一寸三分重十二銖而使使人輸銅計鑄畢設盗鑄之科赤烏元年鑄一當千大錢徑一寸四分重十八銖故吕蒙正定荆州孫權賜錢一億錢既大貴但有空名人間患之後權令曰往日鑄大錢云以廣貨故聽之今聞人意不以為便其省之鑄以為器物官勿復出也羣書考索後集卷五十八
