body:
  text: 羣書考索續集卷四十六宋章如愚編財用門東南財賦東南財賦之淵藪惟呉越最為殷富夫東南財賦之淵藪也自戰國漢唐至於今用之昔越王勾踐國於㑹稽以地理考之即今之浙江之東及饒信是也其為郡十地至狹也當是時玉帛之貢於呉府無虚日外而呉之公卿大夫皆有賂内而越之士卒百官皆有養然未甞有不給之虞呉王濞國於全呉以地理考之即今江南二浙及閩中是也其為郡二十地雖廣也而尋陽興國宜春髙安割而屬之長沙當是時呉之百姓無賦也惟即豫章山以鑄銅煮海水以為塩而呉之賦擅天下至於金錢之饒在處而有不特取之呉而未甞有乏財之慮陳傅良唐財賦皆仰給於東南其他諸郡無有爰至於唐代宗大歴之際劉晏掌江淮塩鐵之權嵗入六百餘萬緡是時天下租賦之所入不過千二百萬而江南之利實居其半徳宗建中之間韓滉之莭度浙江東西也是時車駕在奉天滉則獻綾羅四十擔李晟駐軍於渭橋滉則餉米百餘艘乘輿反正於長安滉則貢米百萬斛非特此爾而唐雖名為都長安而大農之國計實仰給於東南其它諸郡無有也憲宗即位之二年李吉甫作元和國計錄備述元和之初藩鎮𤓰割玉帛之不貢於王府者十五道而嵗租賦之所倚辦者八道實皆東南也曰浙江東西路曰淮南曰湖南曰岳鄂曰宣歙曰江西曰福建故韓愈有言曰當今賦出天下而江南居十九是矣當是時户口之在版籍一百四十四萬而兵之仰給於縣官者八十三萬又且師旅四出誅呉平潞劖蜀殄蔡收齊伐魏其間廪給之費不可一日闕而初未甞告乏則是東南之地善用之而財賦未甞不豐也陳傅良十䇿祖宗之時銀絹增絮錢榖皆仰給於東南仁宗皇帝慶厯三年詔㑹國家之財賦轉一嵗之中而為定式别其州縣之廪給鄰境之轉般與酌漕舟車之費而東南金帛之成數入於王府者皆可考也江東錢之上京以緡錢計者凡八十九萬銀以兩計凡二十萬絹以匹計凡五十萬江西錢之上京以緡計者凡三十四萬銀以兩計凡十三萬絹以匹計凡三十萬湖南北錢之上京者二十七萬銀三十二萬絹一十三萬兩浙東西錢之上京者七十四萬銀四萬八千絹七十二萬福建銀之上京者二十萬八千此其大凡而竒贏之數不與焉與夫逺而兩淮之運而川廣所費貢不下百餘萬諸道金繒綿絮之饒亦且數百萬皆不可毛舉是時宋之在東南諸郡者凡六百二十萬石銅之鑄於饒池江建者凡六十八萬緡是則國家財賦之仰於東南也者未甞不豐也同上天下地利古盛於北者今皆盛於南國家撫有南夏大江劒閣以南泰然安堵而又兼巴蜀江北以為外屏以元豐二十三路較之户口登耗墾田多寡當天下三分之二其道里廣狹財賦豐儉當四分之二彼西北一隅之地古當天下四分之三方今僅當四分之一儒學之盛古稱鄒魯今稱閩越機巧之利古稱青齊今稱巴蜀棗栗之利古盛於北而南夏古今無有香茶之利今盛於南而北地古今無有兎利盛於北魚利盛於南皆南北不相兼有者然專於北者其利鮮專於南者其利豐故長江劒閣以南民户雖止當諸夏中分而財賦所入當三分之二漕運之利今稱江淮闗河無聞塩池之利今稱海塩天下仰給而解塩荒凉陸海之利今稱江浙甲於天下闗陜無聞灌溉之利今稱浙江太湖甲於天下河渭無聞呉衡進圖東南牧養方今王氣盛於南故牧養亦盛於南上古王氣在東中古王氣在西近古王氣在北方今王氣在南上古牧養之盛在於海岱之間故禹貢獨稱萊夷作牧今登萊之間是也中古牧養之利盛於秦隴秦之先牧養蕃息受封於周今之秦鳳路是也近古牧養之利盛於河朔元魏孝文於并州置牧場馬大蕃息今之河東路是也宋朝以來川廣之馬足軍國之用葢牧養之利亦隨王氣去來為之盛衰同上東南嵗入今日所入倍於祖宗時所費亦倍於祖宗時自宋混一之初嵗入緡錢不過一千六百餘萬太宗皇帝以為極盛兩倍於唐室矣其後月増嵗廣至熈豐間言利之臣極力聚斂然後嵗入五千餘萬渡江之初東南嵗入不過千萬比年乃増至六千五百餘萬則所入信倍於祖宗時多矣祖宗時中都吏祿兵廪之費全嵗不過百五十萬元豐之間紛更費用猶不過月支三十六萬至宣和間崇侈無度然後月支百二十萬渡江之初雖連年用兵然月支猶不滿八十萬比年安静無事乃月支一百二十萬非泛猶不與焉則其所費亦倍於祖宗時多矣鄭湜剳子東南縣邑民財自晉南渡之後東南漸重而西北漸輕至於宋東南愈重而西北愈輕自晉元南渡東南文物漸盛至於李唐益加繁昌安史之亂江淮獨全歴五季紛争中原之地五易其姓殺戮幾盡而東南之邦民有定主七八年間咸獲安業逮宋龍興伐罪弔民五國咸歸未甞妄殺一人自後數十百年間西北時有少警而東南晏然斯民彌得休息以至元豐中比往古極盛之時縣邑之増幾至三倍民户之増幾至十倍財貨之増幾至數十百倍至於庠序之興人才之盛地氣天靈巍巍赫赫往古中原極盛之時有所不逮天下之勢正猶持衡此首重則彼尾輕故自東南漸重則西北漸輕以至宋東南愈重而西北愈輕宇内辨九州所産周九州所産與禹貢九州所産畧同揚州其利金錫竹箭荆州其利丹銀齒革豫州其利麻漆絲枲青兖州其利蒲魚雍州其利玉石幽州其利魚塩兾州其利松柏并州其利布帛以禹貢揚州惟金三品瑶琨篠簜則金錫竹箭固揚州所産也荆州厥貢羽毛齒革惟金三品與夫礪砥砮丹則丹銀齒革固荆州所産也豫州厥貢漆絲絺紵則麻漆枲固豫州所産也然則餘州皆以其地所産之多少者而言之也王昭禹周禮解九州之田呉越閩蜀之田在古為瘠薄在今為膏腴由人功之修治今天下之田稱沃衍者莫如呉越閩蜀其一畆所出視它州輒數倍彼閩蜀呉越者古揚州梁州之地也按禹貢揚州之田第九梁州之田第七是二州之田在九州之中等最為下而乃今以沃衍稱者何哉呉越閩蜀地狹人衆培養灌溉之功至也夫以第七第九之田培養灌溉之功至猶能倍它州之所出又况其上之數等乎以此言之今天下之田地力未盡者亦多矣九州田賦九州之内有田重而賦輕有田輕而賦重有田賦俱等九州之内有田重而賦輕如青州田上下賦中上徐州田上中賦中中梁州田下上賦下中雍州田上上賦中下也或田輕而賦重如兾州田中中賦上上揚州田下下賦下上荆州田下中賦上下豫州田中上賦上中是也或田賦等如兖州田中下厥賦正是也以州之兵賦考之民之能出兵馬以供上之征伐者以其力之有餘而已民力厚薄由乎田之肥瘠自古當然而禹貢所出之賦乃爾輕重不同何哉兾州土厚水深號為沃野豫州天地之中商賈所集揚州東方之都㑹荆州南夏之名區故兾豫為羅綺之鄉荆州為魚塩之海他物所出利倍於田此所以田輕而賦重也青徐海上僻陋之邦土狹民瘠雍梁西鄙控扼之國地險患多田土之外雜出不厚此所以田重而賦輕也至於兖州無雍梁之邊患無青徐之僻陋又無荆揚之魚塩又無冀豫之羅綺居天下有無之中此所以田賦等也胡氏書解九州之賦惟梁揚冀豫有時錯出冀州出第一等有不給之嵗即出第二等也揚州魚塩之海出第七等近於太輕故有時而出第二等以補除餘州之不足豫州中國之交㑹出第二等葢亦甚優故錯出第一等至於梁州則夷狄北境變故不常而定出八等似若太優故無事則錯出第七等有事則錯出第九等也同上九州土貢九州土貢各以土宜故或出或否九州田賦無地不宜故特分髙下九州之貢各以土宜不可比而同也惟金三品羽毛齒革荆揚所同至於他物若漆則同出於兖豫砮則同出於荆梁磬則同出於梁豫而徐州又有泗濱之浮磬而已若夫桑麻絲枲之屬兖州則有絲及織文青州則有絲及絲枲徐州則有𤣥纎縞揚州則有織具荆州則有𤣥纁璣組豫州則有枲絲絺紵等貢古於雍梁無之至於田賦則九州特有髙下爾豈非麻桑榖粟無地不宜非若他物之各有其方乎同上唐鄧汝潁陳蔡許洛地利古稱肥瘠之地至宋朝反成瘠鹵觀史記貨殖列傳郡國之所有東方之桑麻魚鹽南方之竹木魚鹽與西方之五榖畜牧北方之棗栗裘馬則凡一方之所有皆可以備養生送死之具導之有方而取之有法則其民豐樂饒足老死而無憾及行天下覽及山林藪澤之所有往往與古無類夫自大江以北漢水之側三代之時列國數十楚人都於荆州其在戰國最為强大外抗群蠻内禦秦晉甞以其兵横於天下計其所都安肯用瘠鹵磽确之地而當今自楚之北至於唐鄧汝潁陳蔡許洛之間平田萬里農夫逃散不生五榖荆棘布野而地至磽瘠原泉陂澤之迹迤邐猶在其民不知水耕之利而長吏又不以為意一遇水旱民乏菜茹往者因其流亡廢縣罷鎮者葢往往是矣潁濵民政兩浙地利呉越未甞被兵故其地利尤富夫呉越之地自錢氏時獨不被兵又以四十年都邑之盛四方流徙盡集於千里之内而衣冠貴人不知其幾族故以十五州之衆當今天下之半計其地不足以居其半而米粟布帛之直三倍於舊雞豚菜茹樵薪之鬻五倍於舊田宅之價十倍於舊其便利上腴争取而不置者數十百倍於舊葢秦制萬户為縣而宋齊之間山隂最大而難治然猶不過三萬今兩浙之下縣以三萬户率者不數也葉學士進卷荆州地利鄂乃荆州之地於古為瘠自唐以來乃以沃稱三國之季呉主孫皓自建業溯流移都武昌而土地埆瘠民間苦之當時謡曰寧飲建業水不食武昌魚寧還建業死不止武昌居誠以地薄而民窮也據禹貢荆州厥土塗泥厥田下中而武昌乃荆州之壌即宋朝之鄂州則是鄂之瘠振古則然矣然而李唐長慶中崔郾為觀察治陜以寛繼治鄂以嚴或問其故曰陜土塉而民勞吾撫之不暇鄂土沃而民剽非用威莫治也夫陜郡古雍州之界厥土黄壌厥田上上而鄂土比之猶且為沃則土腴可知矣彼唐堯以來至於三國之季二千五百餘年矣鄂土之瘠自若也孫皓而下至於崔郾之時纔五百五十年耳而土壌腴瘠若此其不侔何哉葢三代以前東南荒凉為甚春秋而下又為呉楚之境兩漢之際未經緝理自呉主孫權以来始倚武昌為重更三國東晉南朝之時常為重鎮舟車所湊人物萃焉積壌流膏耕鑿滋利嵗時浸久遂為沃壌則亦宜然也宇内辨楊州地利揚州於古瘠薄而近世乃為衍沃按禹貢揚州厥田下下是南東之地天下最塉薄者也而隋志乃稱江浙之間川澤衍沃有陸海之饒與古相反如此豈不以東晉南朝之時人力有致於此耶甞觀漢武帝時趙過能為代田比它畆倍收固非土地有腴瘠而人力有勤怠也特謀畫有工拙耳漢魏以還天下有變常首難於西北則衣冠伎巧轉而南渡四方習俗取利舉萃東南農桑工賈曲盡其便人物之繁與京華無異而土壌亦從而沃矣加之亂離少弭上下浸安井里環聚以糞其田雞豚畜之牛羊牧之荆棘芟而草莱闢種植時而灌溉利雖欲不為沃壌得乎哉宇内辨淮浙財賦國用多而常患不足葢知生財取財而未知莭用紹興之初嵗費一千三百二十萬而一嵗所入止以淮浙塩息計之已二千三百萬以二千三百萬之息而為一千三百二十萬之費國用當充衍而有餘况夫今之淮浙所入不減於紹興之初加以江湖福建二廣租賦與夫其他名目甚衆而儲峙匱竭甞患無一年之儲何歟豈非知生財聚財之源而未知莭財之道歟王榜眼館職策江淮巴蜀財賦漢唐以江淮巴蜀財賦給軍宋以江淮巴蜀之資供軍用何不見其有餘巴蜀江淮自昔號為富饒漢髙東向争天下獨命蕭何留取巴蜀以給軍是以巴蜀之資取天下也唐肅宗駐兵彭源河洛以北莽為盗區第五琦所謂財賦之所出江淮為淵請以江淮租賦命輕貨以給軍故史臣謂張廵許逺全江淮財用以濟中興此以江淮之資平天下也今斂戍守邊徒以江淮巴蜀之資為巴蜀江淮之用宜若沛然未見其有餘何哉學士院撰館職䇿問兩淮湖廣四川財賦版圖視古為減而財賦視古為増以今日事勢論之合呉越楚蜀之地東西犄角視昔版圖所有殆不能半而兩淮湖廣四川之賦分𨽻於四揔所不屬於上供而上供所入特不過閩浙數路夫以閩浙數路之所出而資東南七八十年軍國之需無非殚竭民力以贍經費陸濬館職䇿諸路經制緫制月樁及兩浙嵗收緡錢宋末取民多於宋初時今上供正賦不過緡錢二百萬如經制錢六百六十餘萬宣和末發運使經制兩浙創立建炎初吕頥浩再復揔七百八十餘萬紹興初参政孟庾揔財賦創立月樁四百餘萬紹興初應副大軍創立髙宗皇帝以為始於朱勝非常欲待罷兵後盡蠲之皆祖宗未甞有也其他名色繁碎如増收添糴本十分七分五分之類又起於近時也姑以兩浙言在祖宗時一嵗通收緡錢三百三十餘萬而茶塩酒稅十居其八州縣支費皆在其間今兩浙嵗輸緡錢千二百萬浙東四百二十八萬浙西七百五十餘萬而茶塩之利又專𨽻朝廷州郡支費又不預焉然則今之取民不知幾倍於祖宗時矣鄭湜剳子兩浙板帳江西月樁三省稅額太重兩浙板帳錢額之重實與江西之月樁相似月樁之敷出於一時而不能均如額之稅錢二萬三千三百八十有三緡而月樁之額財一千六百九十一貫贛之稅錢四萬一千二百九十有四貫而月樁之額七千四百緡是筠之稅錢去袁無幾而袁之月樁幾五倍於贛江西月樁大畧不均如此孝宗朝臣僚剳子兩浙租賦兩浙既供兩淮嵗輸茶塩又𨽻朝廷取民重於宋初時以兩浙言之在祖宗時一嵗通收緡錢不下三百三十餘萬而茶塩酒稅十居其八州郡支費皆在其間今兩淮嵗輸緡錢千二百萬浙東四百二十八萬浙西七百五十餘萬而茶塩之利又轉𨽻朝廷州縣支費亦不預焉然則今之取民不知幾倍於祖宗時矣斯民安得不窮困無聊耶光宗朝臣僚剳子諸郡土貢唐諸州貢絹按陳留郡唐之汴州滎陽郡唐之鄭州睢陽郡唐之宋州靈昌郡唐之滑州潁川郡唐之許州譙郡唐之亳州濮陽郡唐之濮州淮陽郡唐之陳州東平郡唐之鄆州彭城郡唐之徐州汝隂郡唐之潁州信都郡唐之深州河間郡唐之瀛州樂安郡唐之棣州淮安郡唐之唐州諸州貢綾臨汝郡唐之汝州北海郡唐之青州汝南郡唐之豫州魯郡唐之兖州范陽郡唐之幽州博陵郡唐之定州漢末郡唐之隨州丹陽郡唐之潤州梓潼郡唐之梓州諸州貢綿臨淮郡唐之泗州汲郡唐之衛州文安郡唐之莫州東陽郡唐之婺州信安郡唐之衢州清源郡唐之泉州兩州貢絲葛臨淄郡唐之齊州呉郡唐之蘇州諸州貢絲布鉅鹿郡唐之邢州廬江郡唐之廬州鍾離郡唐之濠州夀春郡唐之夀州益昌郡唐之利州諸州貢紵布晉陵郡唐之常州呉興郡唐之湖州宣城郡唐之宣州廬陵郡唐之吉州宜春郡唐之袁州巴陵郡唐之岳州諸州貢紬紗布歴陽郡唐之和州貢布魏郡唐之魏州廣平郡唐之洛州博平郡唐之博州貢紬鄴郡唐之相州貢紗諸州貢氊紬清河郡唐之真州貢氊清化郡唐之巴州貢綿紬兩州貢錦趙郡唐之趙州廣陵郡唐之揚州貢錦諸州貢葛弋陽郡唐之光州義陽郡唐之申州豫章郡唐之洪州長沙郡唐之潭州零陵郡唐之永州臨川郡唐之撫州潯陽郡唐之江州貢葛三州貢金南浦郡唐之萬州衡陽郡唐之衡州通義郡唐之眉州二州貢銀江夏郡唐之鄂州邵陽郡唐之邵州貢銀二州貢羅常山郡唐之恒州唐安郡唐之蜀州貢羅一州貢蕉長樂郡唐之福州右並據通典實事増損其文諸州土貢四京所貢東京開封府貢紋綾西京河南府貢蜜蠟南京應天府貢絹北京大名府貢花紬絹諸州土貢宻濮鄭滑冀覇亳宿海泗滁濠等州興仁東平等府臨江建昌等軍則貢絹濰淄蔡越杭明秀豐梓等州龍慶江陵等府則貢綾婺處衢等州則貢綿郢揚光蘄舒黄湖常嚴處袁筠郴岳英等州興國南安淮安等軍則貢紵夀光洪吉撫潭永全戎瀘等州與平江府則貢葛汝雄洛等州則貢紬濟南府則貢絹綿徐州則貢紬絹隋州則貢絹綾葛棣州則貢絹絲真定府則貢羅相州則貢紗絹鎮江府則貢綾羅鼎州則貢布果州則貢絲布逹州則貢絺若夫青州則貢棗沂州則貢鐘乳莱州則貢石器孟州則貢粱米解州則貢塩花鳳翔府則貢榛實建州則貢茶至於金之貢則衡嘉雅資昌利象融等州銀之貢則邵鄂循賀封端梅邕昭梧籐貴桞宜等州國都漕運古者國都甚近故未論及漕運戰國争事攻戰秦人罷侯置守始論及漕運古者天子中千里而為都公侯中百里而為都天子之都東西南北所貢入者不過五百里諸侯之都漕運所貢入者不過五十里所以三代之前漕運之法不備雖如禹貢所載入于渭浮于江之類所載者不過是朝廷之路所行者不過幣帛九貢之法所以三代之時漕運之法未甚講論正緣未是事大體重到得春秋之末戰國之初諸侯務相侵伐爭事攻戰是時稍稍講論漕運然所論者尚只是行運之漕至於國都之漕亦未甚論且如管子所論粟行三百里則無一年之積粟行四百里則無二年之積粟行五百里則衆有飢色如孫子所謂千里饋糧士有飢色皆是出征轉輸至其所以書國都不出五百里五十里當時亦尚未講論惟是後來秦併諸侯罷五等置郡然後漕運之法自此方詳秦運天下之粟輸之北河是時葢有三十鍾致一石者地里之逺運粟之多故講論之詳方自此始吕東莱闗中漕運西漢漢初漕巴蜀粟後漕闗中粟最後又漕山東粟漢初轉漕巴蜀租賦以給闗中天下既定國用寖廣於是嵗漕闗東粟以給中都官然亦不過數十萬石而已至武帝則四百萬石後又益六百萬石大抵多似於山東諸郡枚乗書云轉粟西向當時有欲開褒斜道以致漢中榖者以江多湍石不可船漕則知巴蜀道險以運轉為便而集於京師者不可多置闗東山東諸郡道從渭水而上鄭當時開渠之後漕粟益多攷之於史獨河東有糧倉涇倉滎陽有敖倉河南以東置漕船五百舟則知東方諸郡其粟自逺而致者往往至三河交缷給莭而入都矣闗中漕運漢唐漢不仰江淮粟至唐始專仰江淮在漢初髙后文景時中都所用者嵗計不過數十萬石而足是時漕運之法未詳到得武帝時吏多而徒役衆闗中之粟四百萬猶不足給之所以鄭當時開漕渠六輔渠之類葢緣當時用度之多漕法不得不講然當漢之漕在武帝時諸侯王尚未盡輸天下之粟至宣武以後諸侯王削弱漢之東南漕運至此始詳當髙帝之初天子之州郡與諸侯封疆相間雜諸侯各据其利粟不及於天子至武帝時亦大概有名而無實其後運粟入闗尚未論江淮到得唐時方論江淮何故漢㑹稽之地去中國封疆遼逺粟不入京都以京都之粟尚不自全何况諸侯自封殖且如呉王濞作亂枚乘之說言京都之倉不如呉之富以此知當時諸侯殖利自豐京都所運不是江淮之粟到唐時專倚江淮之粟唐太宗以前府兵之制未壊有征行使出兵不征行各自歸散於田野未盡仰給大農所以唐髙祖太宗運粟於闗中不過數十萬後来眀皇時府兵之法漸壊兵漸漸多所以漕粟自此多大抵兵與漕運常相闗所謂宗廟射享之類十分不費一分所費廣者全在用兵兵與漕運相為消長所謂漕運全視兵多少且唐自肅宗代宗之後如河北諸鎮皆强租稅不領於度支所以唐全倚辦江淮之粟議論漕運大畧自江入淮自淮入汴自洛入河自河入渭水次各自置倉如集津倉洛口倉含嘉倉河隂倉之類轉相船運自劉晏再整頓運漕之江淮之道各自置船淮船不入汴汴船不入河河船不入渭水之曲折各自便習其操舟者所以無傾覆之患國計於是足矣唐人議論之多惟江淮為最急徳宗時緣江淮米不至六軍之士脱巾呼於道韓滉運米至徳宗太子置酒相慶可見唐人倚辦於此甚急唐時漕運大率三莭江淮是一莭河南是一莭陜西到長安是一莭三莭最重者京口江淮之粟㑹於京口京口是諸侯咽喉處惟是江淮最切所以韓滉由漕運致位丞相李竒因漕運飛揚䟦扈以至作亂以此知三莭惟是京口最重吕東萊闗中漕運唐唐初漕運未甚多自後益多於前漢都長安唐亦都長安漢漕運事不多見至唐方以漕運為大事然唐初未甚見𤣥宗以後方說得張大耳盖闗中是西秦沃野之地亦可支給卒有水旱則轉漕皆少亦自足用故貞觀永徽之間止嵗漕二十萬自後承平日久用度彌廣奢侈日甚如專仰給漕運天子數幸東都就食敖倉粟徳宗時闗中倉廪耗竭禁兵或脫巾呼於道望見漕船徳宗父子動色相賀是以裴耀卿劉晏之徒皆以漕運得名大率漕運多是江淮之粟取闗中極迢逓自江入淮自淮入汴自汴入洛自洛入黄河自黄河入渭方至闗中毎一畨發運自二月起程至五月方到汴河七八月間方到入黄河十亡八九况用呉人般運在所不便耀卿措置轉運隨處交納更畨易人雖可稍停民力當時民丁約四百萬使丁出錢一百為漕運費又益半為營窟亦大擾民矣且秦漢時亦有轉運只用兵時運糧粟實逺為多數十餘鍾致一石之類是已至唐則専一供闗中之用故漕運極廣徳宗時嵗㑹百餘萬石則是嵗嵗用兵也裴耀卿雖能省漕運然只知為國不知為民止能般運米粟足朝廷之用而不恤民力之困獨不思貞觀永徽之初二十萬石而能足用而今乃如是之多其咎安在若賢相處於此必不獨理㑹漕運湏是使人君莭用自其上面莭儉始若止於漕運特一能吏之才耳徒使在我有多運之功而朝廷無莭儉之徳賢者宜不為此耀卿何足以知之東萊唐傳議闗中漕運漢隋唐隋漕運多於漢唐又多於隋漢初嵗漕山東粟數十萬石是時運路未修其漕尚少其後武帝益修渭渠至漕百餘萬石隋文帝時㳂水為倉轉相運置而闗東汾晉之粟皆至渭南運物最多其遺倉之迹往往皆在然皆尚有三門之險自唐裴耀卿又尋隋迹於三門東西置倉開山十八里為陸運以道甚險卒泝河而入渭當時嵗運不減二三百萬石其後劉晏遵耀卿之路悉漕江淮之米後世言能經財利而善轉運者耀卿與晏為首歐陽文通進司上書汴京漕運宋宋漕運之數太宗至道元年先是汴河嵗運江淮米三百萬石菽一百萬石黄河粟五十萬石菽三十萬石恵民河粟四十萬石菽二十萬石廣濟河粟十二萬石凡五百五十萬石非水旱大蠲民租未甞不及數長編宋漕運之數宋四河所運江淮㳂泝入汴陕西自黄河三門㳂泝入汴陳蔡自恵民河而至京東自廣濟河而至宋初未有定制太平興國六年太宗始制汴河嵗運江淮秔米三百萬石大中祥符初七百萬石此最登之數也天禧末諸州軍水運上供金帛緡錢二十二萬一千餘貫兩端匹珠寳香藥三十七萬五十餘斤㑹要宋時汴河為急神宗熈寧八年張方平甞論汴河曰國初浚河渠三道通京師漕運自後定立上供年額汴河斛斗六百萬石廣濟河六十三萬石恵民河六十萬石廣濟河所運止給太康咸平尉氏等縣軍糧而已淮汴河所運乃太倉畜積之實故宋於漕事至急有汴河則京師可立汴河廢則大衆不可聚汴河之於京師乃是建國之本長編汴京漕運宋朝四路粟惟江淮最重宋朝定都於汴是時漕運之法分為四路東南之粟自淮入汴至京師若是陜西之粟便自三門白波轉黄河入汴至京師若是陳蔡一路粟自恵民河至京師京西之粟自廣濟河至京師四方之粟有四路四條河至京師當時最重者惟是汴河宋朝所謂嵗漕六百萬石專倚辦江淮其所謂三門白波之類非大農仰給之所惟是江淮最重在祖宗時陸路之粟至真州入轉船倉自真方入船即下貯發運司入汴方至京師諸州回船却自真州請塩散於諸州諸州或有費亦有塩以償之此是宋朝良法闗西漕運宋朝分汴京之漕以給江西今江淮之米嵗入於汴者六百萬石誠能分給闗西一二百萬足矣今兵之食汴漕者出戍甚衆有司不惜百萬之粟分而及之其患者三門阻其中爾今宜浚治汴渠使嵗運不阻然後按求耀卿之迹不惮十許里六運之勞則河漕通而物可致歐陽文通進司上書時用兵陕西國都漕運宋朝宋以東南而漕東南比之漢與唐為易漢人甞以東南而漕闗中矣唐甞以東南而漕大梁矣其道路之遥逺轉渉之煩費孰與宋朝以東南而漕東南又何至於虧乎羣書考索續集卷四十六
