body:
  text: 羣書考索續集卷二十一宋章如愚編律門律聲律生於辰聲生於日十日為天為干為陽十二辰為地為支為隂十二律生於十二辰此有不待辨而明者特聲生於日未易遽曉釋晉志者以為甲己為角乙庚為商丙辛為徵丁壬爲羽戊癸為宫晉志引楊子雲之言夫甲己者木勝土也故角為木乙庚者金勝木也故商為金丙辛者火勝金也故徴為火丁壬者水勝火也故羽為水戊癸者土勝水也故宫為土十日生五聲五聲具五行五行相㓕而後相生猶五聲相反而後相和也十日為聲聲無形十二辰為律律有形有形生於無形無形者復資於有形也十日居五位正位而十二辰間厠其間其聲生於日律生於辰此聲律所以相有而不可以相無也又甲乙丙丁戊上五日與己庚辛壬癸下五日上下相勝自有次第猶一二三四五與六七八九十相為竒耦相生亦相成也唐一行曰天有五音所以司日也地有六律所以司辰也參伍相周究於六十聖人以此見天地之心也此言盖得之楊子雲也班固劉歆亦曰天之中數五五為聲地之中數六六為律一行所謂天有五音地有六律亦此意也然班固必以律之形色上黄聲之次第上宫於以釋黄鍾之義恐未免牽合宫為五音之主與他音不同宫為四聲綱居中則主四方為土則王四季為黄鐘則統律吕取數多則八十一於五常為信於五事為思此其所以為人君之象也黄鍾為聲律之本與諸律不同西漢志曰五聲之本生於黄鍾之律九寸為宫或損或益以宫商角徵羽九六相生隂陽之應也以九合六又曰黄鍾為宫則太簇姑洗林鍾南吕以正聲應無有忽微不復與他律為役者同心一統之義也非黄鍾而他律雖當其月自為宫者則其和應之律有空積忽微非五音之正則聲有差降髙下也微忽如鄭氏分一寸而為數千也然則五聲十二律雖還相為宫亦主乎黄鍾而已七始為正聲旋宫不同班固權衡類引書曰予欲聞六律五聲八音七始七始者天地人之始也今攷之書八音之下無所謂七始之説杜佑通典載隋鄭譯七調之説曰周有七音之律五音與變宫變徴也漢志有七始之義黄鍾為天始林鍾為地始太蔟為人始姑洗為春㽔賔為夏南吕為秋應鍾為冬是也夫黄鍾下生林鍾林鍾上生太簇太簇下生南吕南吕上生姑洗姑洗下生應鍾應鍾上生㽔賓此以黄鍾為正隔八而生之也是以黄鍾為十二律本之而始始得七音之正舜雖不明言其義而六律五聲八音相生則七始在其中矣樂之三始則黄鍾宫林鍾角太簇商即三始也又南吕徵姑洗羽又應鍾為羽夷則為商者何謂已上見後五聲相生説隋志亦以黄鍾宫林鍾角太簇商為三始音始於宫窮於角與清濁次第不同太史公曰音始於宫窮於角者五音隔八相生始於黄鍾之宫生徴林鍾祉生商太簇商生羽南吕羽生角姑洗故曰窮於角也以相生論之則窮於角以清濁論之則宫商濁徴羽清角在清濁之中也是故相生次第宫商角徴羽是也又甞觀晉志之言曰司馬遷以宫黄鍾生角林鍾角生商太簇商生徴南吕徴生羽姑洗求其理用罔見通塗此乃樂之三始也與三始同五聲所屬及清濁之説不同律長聲濁律短聲清又玉律六孔宫商角徴羽自清至濁隋志論荀朂笛律之聲以為宫商濁徴羽清惟角音得清濁之中按月令角音屬木而為春商音屬金而為秋今而曰商聲濁次於宫聲是金氣不清矣班志曰寅木也為仁其聲商也為義故太蔟為人統立人之道曰仁與義也是則春屬木其音角者五音之正也春屬木其音為商者黄鍾為宫則太簇為商五音相生之義也黄鍾宫律九寸太蔟商姑洗角林鍾徴南吕羽其律皆次第而减長者聲濁短者聲清所以宫商濁而徴羽清惟角在清濁之間也又十二律黄鍾宫聲則屬仲冬月令五音宫聲則屬季夏盖黄鍾之宫以十二月正位論五音之宫以五行正位言也土音宫土王於四時其音宫亦周旋於十二律在季夏可也在仲冬可也冬至樂均清夏至樂均濁與本律清不同晉志曰冬至陽氣應則樂均清夏至隂氣應則樂均濁夫黄鍾冬至之律律長其聲濁㽔賔夏至之律律短其聲清今乃與晉志之言相反何也盖黄鍾之聲其體本濁陽氣高燥則十二均大畧皆清也㽔賔之聲其體本清隂氣重濕則十二均大畧皆濁也此盖指十二均而言之非特指一月之律也又荀朂黄鍾笛長二尺八寸有餘至於中吕皆不過二尺豈笛短故聲清歟㽔賔笛長三尺九寸有餘至於應鍾或過於四尺豈笛長故聲濁歟豈樂律不可以候氣之律言歟豈黄鍾至中吕而漸清㽔賔至應鍾而漸濁歟何清濁之相反也土音宫君之象其聲濁屬季夏火音徵事之象其聲清屬夏商音濁吹於夏屬秋云云五聲十二律旋相為宫五聲十二律旋相為宫者黄鍾為宫則太蔟為商長男姑洗為角中男㽔賔為變少男林鍾為徵長女南吕為羽中女應鍾為變宫少女盖陽律為宫則陽律以類相從而為商為角為變徴也至於徴羽變宫則變而為隂陽極不生陽而生隂也大吕為宫則夾鍾為商長女中吕為角中女林鍾為變徴少女夷則為徴長男無射為羽中男黄鍾為變宫少女盖隂吕為宫則隂吕以類相從而為商為角為變徴也至於徴羽變宫則變而為隂隂極不生隂而生陽也其餘十律可以類推但於堂上隔一左旋按十二辰而推十二律則宫商角徴羽是也其變徴變宫則在正徴正宫之前一位是也不然以隔八相生之法推之則宫徴商羽角是其次第也其變宫徴又自角音隔八而生自然在正宫之前一位矣宫為君徴為事則有變商為臣角為民羽為物則無變也然尚有疑焉者宫聲濁其餘諸律次第相應者皆自濁而清宫律長其餘諸律次第相應者皆自長而短宫位尊其餘諸律次第相應者皆自尊而卑茍旋相為宫則清濁長短皆易位矣十二月更代而十二律各以所建之月為主推律攷聲者抑揚髙下盖必有道焉是未可以紙上陳言推之也班志曰非黄鍾而他律自為宫者有空積忽㣲然則七始為正聲其旋宫非正矣又黄鍾為宫有父之尊太簇宫長男也姑洗角中男也㽔賔變徴少男也林鍾祉長女南吕羽中女也應鍾變宫少女也太吕有母之親其隂吕三次第相應者長女中女少女也其律三次於隂吕者長男中男少男也一律生五音十二律生六十音六六三十六生三百六十音以當一嵗之日出晉志一律生五音如黄鍾屬子子有五焉甲子丙子戊子庚子壬子是也甲子為中吕之徴中吕為宫則甲子為徴隔八左旋丙子為夾鍾之羽戊子為黄鍾之宫庚子為無射之商壬子為夷則之角掌上十二位左旋自戊子宫數起庚壬甲丙次第相推黄鍾夷則中吕夾鍾各自為宫則五子應宫商角徴羽之音矣黄鍾一位變為五音餘皆然是黄鍾一律而備五音也次至于丑宫大吕至于寅位太蔟十律各以本始之律為宫次第左旋如推五聲十二律旋相為宫之法則一律但變為五音而六十音之數備矣其六六三十六生三百六十音與三百六十日相周旋如錢樂之三百六十律之法而已五聲相生不同後論二者皆隔八數去晉志曰馬遷以宫生角角生商商生徴徴生羽求其理用罔見通途隋志又從而釋之曰黄鍾太蔟林鍾此樂之三始十二律之本末也合二志之説而求之以相生之説則宫徴商羽角即隔八之法也即太史公所謂始於宫窮於角也以天地人三統而求三始之義則宫商角徴羽也黄鍾天始為宫下生林鍾地始則為角林鍾又上生太蔟人始則為商太蔟又下生南吕即為徴南吕又上生姑洗則為羽姑洗又下生應鐘則為變宫也聲以宫角商為尊故謂之三始猶律以子未寅為先故謂之三統是不可以相生之常法推之也太史公曰厯書論相生次第則曰黄鍾為宫林鍾為徴太蔟為商南吕為羽姑洗為角其為律書論三始次第則黄鍾為宫林鍾為角太蔟為商南吕為祉姑洗為羽盖律書言樂聲之始厯書論相生之法也晉志曰遷作律書厯書言其大綱惟其言大綱而不及節目故後人推䆒未詳者罔見通途也十二均之制不同十二律旋為宫宫即均也黄鍾為宫則十一律皆其所均也林鍾為宫亦然黄帝調十二律而為均者盖取還相為宫之義後周王朴調十一律為一均者盖以悉主黄鍾之宫黄帝用宫王朴虚宫猶用中虛中也十二均八十四調則五聲並行其間毎一均七調十二均八十四調也十一均八十一調則四聲共足其數徴商羽角大抵朴之論律以黄鍾為主故止言十一聲共足其數徴商羽角大抵朴之論律以黄鍾為律故止言十一聲以宫為主故止言四也見通監雖然宫為君天下不可一日而無君虛宫恐不如用宫之正也十二律不可闕一則十二均亦然王朴虛宫而為十一均是十二律亦可闕一也茍曰可闕則宫音分主於四時而主季夏足矣何必復為仲冬之律即昔隋代萬寶常作八十四調百四十四律變化終始而為一千八百聲此盖本之黄帝之法也于時樂工鄭譯作五均七均之樂寶常聴之以為亡國之音甚至於垂泣其驗可知矣鄭譯七均按七始之義曽不知黄鍾為宫相應故謂之七始非樂均還相為宫止於七律也以上事見通典十二笛長短之制不同上者荀朂所作下者梁武所作黄鍾笛長二尺八寸四分四釐用四角律下同下徵林鍾三尺八寸見隋音樂志下同大吕笛長二尺六寸六分三釐下徵夷則三尺六寸太簇笛長二尺五寸三分一釐下徵南吕三尺四寸夾鍾笛長二尺四寸下徵無射三尺二寸姑洗笛長二尺二寸三分三釐下徵應鍾三尺一寸中吕笛長二尺一寸二尺九寸㽔賔笛長三尺九寸九分五釐用八角律下徵大吕二尺八寸林鍾笛長三尺七寸九分七釐用八角律下徵太簇二尺七寸夷則笛長三尺六寸下徴夾鍾二尺六寸南吕笛長二尺三寸七分下徵姑洗二尺五寸無射笛長三尺二寸下徵中吕二尺四寸應鍾笛長三尺九寸六釐下徵㽔賔二尺三寸荀朂梁武帝二笛之制長短不同朂以角律之長或四角八角之數制笛也武帝以十二律之長短而乗之也故武帝之笛自黄鍾三尺八寸至應鍾二尺三寸皆自長而漸短猶十二律管之制也朂之笛自黄鍾二尺一寸則皆短自㽔賔三尺九寸至應鍾三尺九寸餘則皆長長則聲濁短則聲清黄鍾為宫其笛反短其聲反清何也㽔賔為變徴其笛反長其聲反濁又何也其是非未易遽辨而梁武笛制見隋音樂志不甚詳備荀朂笛制見隋律厯志其制甚悉姑紀其説以待知者荀朂笛律之制黄鍾之律長九寸大吕八寸四分太蔟八寸夾鍾七寸四分姑洗七寸一分中吕六寸七分㽔賔重上生故六寸三分林鍾六寸夷則五寸六分南吕五寸三分無射五寸餘應鍾四寸五分此十二律長短之大畧也其毫釐杪忽則未計也黄鍾為宫則姑洗為之角大吕為宫則中吕為之角自宫律本位左旋第五位則角律也以隔八相生常法推之即宫生徴徴生商商生羽羽生角也十二律旋相為宫其法皆然茍朂制笛則用四角律如制黄鍾之笛則用姑洗角律也姑洗用七寸一分也四姑洗之律則四七二十八為二尺八又零一分得四分故黄鍾之笛長二尺八寸四分也如制大吕之笛則用中吕角律中吕長六寸七分也四中吕之律則四六二十四為二尺四寸又零七分為二寸八分故大吕之笛長二尺六寸八分也推類而言餘可知矣惟㽔賔林鍾用八角律惟應鍾為變宫於四角律又四分益一餘皆四角律也其制笛必用角律以忖長短者何也相為笛體中聲上異宫商之濁下異祉羽之清以角得清濁之中也短者四之長者八之又十二律旋相為宫之法指諸掌上而左旋正宫居本位自宫隔一而為商自商隔一則為角自角隔一則為變宫變宫之次則正徵也自正徵復隔一而為羽自羽隔一而為變宫變宫之次正徴也今其制笛孔之法則指諸掌而左旋第一孔正宫也第二孔變宫也第三孔為羽第四孔為徴第五孔為變徴笛體中聲角也笛後出孔商也黄鍾為宫則林鍾為下徵也又下徵之調則林鍾為宫餘亦以此相從也其餘制笛孔之法以角律之長自宫孔下次第度之甚有條理詳見隋志注釋宫音土其數八十一季夏商音金其數八十二秋角音木其數六十四春徴音火其數五十四夏羽音水其數四十八冬皆自宫上下損益隔八以生之也凡聲尊卑取象五行數多者濁數少者清大不過宫細不過羽故觀其數之多少律之長短則聲之清濁五行亦可知也荀朂十二笛雖法度嚴然其黄鍾大吕之笛短蕤賔林鍾之笛長誠未詳所謂似不如梁武制笛自黄鍾之長至應鍾漸短近吹候之法五聲諧八音書曰律和聲八音克諧夫六律和五聲見於相生相為宫相為清濁郷之所論者備矣惟五聲諧八音諸志言之不詳攷之班志曰聲者宫商角徵羽也所以作樂諧八音土曰塤師古曰堯為之其形銳上而平底六孔吹之匏曰笙師古曰匏瓠也列管瓠中施簧管端皮曰皷竹曰管孟康曰漆竹長尺六孔古有白玉琯絲曰絃石曰磬形如曲尺所謂磬折也金曰鍾木曰柷狀如桶中有權左右擊之此特言其制而不言其諧之之義杜佑通典曰八音者八卦之音卦各有風謂之八風一曰乾之音石其風不周二曰坎之音革其風廣莫三曰艮之音匏其風條四曰震之音竹其風明庶五曰巽之音木其風清明六曰離之音絲其風景七曰坤之音土其風凉八曰兊之音金其風閶闔是豈班志所謂天地之氣合以生風風氣正十二律定之謂歟必以乾為石者取乾為金玉剛徤之象也坎為革者取坎水周流圎轉之義也艮為匏者取艮始終條逹萬物之意也震為竹者震為蒼筤竹也巽為木者説卦以巽為木也離為絲者火氣明暢也坤為土者坤乃地之象也兊為金者兊之屬秋金也是知八音之器雖取象於八卦非假五聲六律之和按其疾徐清濁之節不可也聲無形而成於有形音雖八而綱維之要不過於五此五聲所以諧八音諸志所以詳於論五聲而畧於論八音也晉志曰聲以情質律以聲和聲律相叶而八音諧是謂五樂其此之謂歟五聲之樂也以此見樂皆不出於五聲八風括不周廣莫條一名融明庶清景凉閶闔次第囘自西北乾亥位左旋至正西兊酉位西北亥位不周風正北子位廣風東北寅位條風正東卯位明庻風東南已位清明風正南午位景風西南申位凉風正西酉位閶闔風律吕相生黄林太蔟順而數南吕姑應皆有序蕤賔之後生大夷夾鍾無射及中吕十二鍾虞氏作樂必諧八音八音之金則鍾也周大司樂有圜鍾夾鍾也有函鍾林鍾也周官鳬氏為鍾論厚薄之所震動清濁之所由出侈弇之所由興不知何自而辨其厚薄清濁侈弇之度也耶昔周景王鑄無射鍾問律於伶州鳩鳩對以律者所以立鈞出度然則論鍾必本於律明矣梁武帝殿前三鍾是周景王所鑄無射吹以南吕之笛則知其宋張永所鑿驗之清廟之銘則知其非秦漢之音唐貞觀初張文収吹笛以調啞鍾肅宗時親定鍾磬之制而皆驗之律是知古人論樂必謂之鍾律而十二律以鍾名者四取其名義之貫通也然通典所載鳬氏為鍾以十二律制為十二鍾子聲之鍾則半於正聲正聲之鍾則倍於子聲今攷之周官攷工記無鳬氏為鍾以律計自倍半之説又云先儒釋倍聲有二義其一云黄鍾之管九寸子聲則四寸半也其二云半相生之法而以相生所得之律寸數半之謂之子聲子聲之鍾十二正聲之鍾十二合二十四鍾通於二神迭為五聲合為六十聲即為六十律此必周禮䟽中語無射鍾梁武帝自謂殿前三鍾是景王時所鑄無射鍾按左傳昭公二十一年景王鑄無射鍾伶州鳩曰天子省風作樂器以鍾之窕則不咸槬則不容心是以感感實生疾今鍾槬矣王心弗堪然景王所鑄無射已不合權度矣後人區區求合於此而梁武方矜其吹笛合聲何以哉律度度所起史記夏禹身為度禮記丈夫布手為尺周官璧羡以起度璧長尺以起度也易緯通卦驗十馬尾為十分淮南子秋分而禾秒定􅳩禾穗芒也十二􅳩當一粟當一寸説苑度量權衡以粟生一粟為一分孫子筭術蠺所生吐絲為忽十忽為抄十抄為毫十毫為釐十釐為分皆起度之源班固曰分者自三微而成著意即毫釐杪忽也惟漢志以為本起黄鍾之長以子谷秬黍中者一黍之廣度之九十黍為黄鍾之長一黍為一分九十黍九寸律也黍有大小之差年有豊耗之異末代校量毎有不同今畧記諸代尺度一十五等并同異之説並見隋志周尺古尺也晉荀朂依周禮制此尺謂之晉前尺杜䕫之尺長於古四方朂去四方以從古也王莽劉歆斛尺後漢建武銅尺祖冲之銅尺即與晉太始中荀朂所校者同隋志以此尺為凖而校隋代之尺也晉田父玉尺亦古尺也世説稱田父掘地得此尺荀朂以校已所造者皆短一黍阮咸所以譏朂尺短故律聲悲也此古二尺已自不同梁法尺比荀朂尺加七釐與田父尺同梁表尺蕭吉云出於司馬法梁朝刻其度於影表以測景隋志又云此即祖桓所造銅圭表影者也宋朝太宗祕畧中有表竿之制即表尺耳加荀朂尺二分二釐二毫漢官尺漢章帝時奚景於狄道縣舜祠下得玉律度為此尺加荀朂三分三毫晉時於始平掘地得古銅尺荀朂以校已所造尺短校四分是知古銅尺與漢官尺同至此乃知阮咸言是魏尺即杜䕫所造者荀朂去其四分者也晉後尺江東所用者加荀朂尺六分二釐後魏前尺加荀朂二寸七釐中尺加荀朂尺二寸一分一釐後尺即隋開皇官尺後周尺也官尺即鐵尺也加荀朂尺二寸八分一釐前後魏尺魏元延明累黍而為者加荀朂尺五寸八毫隋志曰魏永平中公孫崇更造新尺以一黍之長為寸法劉芳以一黍之廣為一分元匡以一黍之廣度黍校縫以取一分太和中高祖從劉芳議蔡邕銅籥尺加荀朂尺一寸五分八釐相承以銅籥一以銀錯題其銘曰籥黄鍾之宫長九寸空圍九分容秬黍千二百粒祖孝孫云相傳是蔡邕銅籥也後周武帝得古玉斗造五尺改元天和與邕銅籥同宋氏尺宋代人間所用者加荀朂尺六分四釐錢樂之渾儀尺後周分尺亦與此同隋開皇水尺萬寶常所造加荀朂尺一寸八分六釐言其造律當黄鍾之羽屬水故曰水尺也雜尺劉曜渾儀水土圭尺也加荀朂一寸五分梁朝俗間尺加荀朂尺一寸七分一釐右尺十五端隋志以荀朂所造前尺與周尺同故以校諸代之尺有加無減如晉田父尺則加七釐梁表尺則加二分有餘漢官尺則加三分有餘魏尺則加四分有餘與夫蔡邕銅籥尺錢樂之渾儀尺後周玉尺鐡尺之屬所加至於二分有餘是則古人之尺短於後而後人之尺漸長於前也豈非黍有小大之差年有豐耗之異歟漢志云一黍之廣度之九十分為黄鍾之長今晉志所載公孫崇以為累黍之長劉芳以為累黍之廣元正以為取二黍之間紛紛無定論豈非黍有小大之異也邪隋志以荀朂所造前尺與周尺合符遂以校諸代之尺言則然矣然阮咸甞譏荀朂所造鍾律聲高哀思及得始平古銅尺果長荀朂所造四分是又未可以荀朂所造獨是以諸代所造皆非也夫聲依永律和聲八音克諧無相奪倫古人制樂律之度雖有成法至於人聲抑揚暗合律吕人心揣摩暗合權度不可執一定之器以為據也晉志曰古者調律出於耳聽後世則據尺度而為之適易差耳荀朂駮杜䕫之尺阮咸駮荀朂之尺魏杜䕫制尺以調律荀朂以其長於古制乃依周禮更制律吕之尺及得汲冢玉律與朂尺暗合而䕫之尺果長四分朂既造鍾律時人稱其精宻惟阮咸譏其聲高哀思及始平掘地得古銅尺果長於朂尺四分舜祠下玉律即漢官尺也與始平尺同夫朂以夔之尺長而損四分汲冢之玉律遂與朂之尺同咸以朂之尺短而加四分始平銅尺舜祠玉律遂與咸之説合縱一時所制有同異而汲冢始平亦自為同異耶意者同律度謹權度古者聖人之所致意後世庸君之所忽慢故京師諸夏律度不同南風北俗權度不一用諸代間者既無定法得諸地中者亦復異同也凡欲審度制器推律攷聲必先得古人耳聽心㑹之法然後可耳區區然止據尺度以為之恐未免毫釐之差千里之謬也荀朂所制晉前尺銘曰晉太始十年中書攷古器揆校今尺杜䕫尺也長四分半所校古法有七品一曰姑洗玉律二曰小吕玉律律律恐即汲冢所得者三曰京西銅望臬臬表也恐與表尺同四曰錯望臬以金錯題之也五曰銅斛王莽所制六曰古錢七曰建武銅尺與此尺同其制非不詳審其銘非不周複猶未免阮咸之誚豈非汲冢所得玉律乃魏襄王所制未能盡合古制者耶不然春秋以來權度已正夫子不必發謹權度之語矣論深衣制度者有周尺指尺之辨今世江之南與淮之北其尺亦不同周景王鑄無射鍾已為伶州鳩所議而梁武方吹笛而求與之合亦猶魏襄王時玉律未必合權度而荀朂方制尺而兾與符合也阮咸譏朂以尺制律聲高哀思及得始平銅尺校朂果長四分作晉志之史臣乃曰朂推百代之法可謂宻切信而有證矣時人寡識據無聞之一尺忽周漢之兩器又是朂而非咸矣晉隋志皆唐人之所撰也隋志既以朂尺為正而校諸代之法故晉志亦是朂而非咸也茍以汲冡之古尺為是則始平地中古銅尺又焉知其非是耶律量以尺制龠班志曰量者龠合升斗斛也自合而下皆自十而升之本起於黄鍾之龠合龠為合兩龠之所有也夫黄鍾之龠容秬黍千二百粒今觀隋志所載歴代尺度以晉前尺制黄鍾之龠謂之晉前尺云者與漢周七品之尺同即荀朂所校制者也其曰是龠容秬黍八百餘粒是與漢志所謂容千二百粒之説不同矣尺既與周漢同而所制律龠不同者何耶荀朂謂之同而其實未必同也又自梁法尺而下至于後周後魏東魏之尺用以制黄鍾之龠自容八百餘粒至于容二千八百餘粒意者古之尺度短至梁法尺而下漸長故以之制律龠量斛亦自少而漸大也下至權衡亦然見權衡隋志又曰梁表尺制律黄鍾其長短及圓徑並同而容黍或多或少者皆由作者旁庣其腹使盈虛耳茍如此言則多寡相生何至有八百餘粒二千餘粒之間耶惟尺之度短長相去逺甚故律龠之小大相去亦倍差明矣然黄鍾之龠其聲尚宫宫聲沉厚渾濁古之尺度既短則以之制律必小度短律小其聲必清何以允合宫聲之洪大耶後世尺度既長則以之制律必大度長律大其聲必濁又何不中宫聲之洪大耶阮咸譏朂制律聲髙哀思是也盖黄帝使伶倫斷三寸九分之竹而吹之得黄鍾之宫謂之含少是知宫聲中度初不在乎律之過長大與聲之過洪濁也後世不察此意増損律度而求合宫商耳聽心㑹之法不審較短量長之法過詳此其所以戞戞乎不合也古斛之制不同斛之為制方尺而深尺班志乃云其中容十斗盖古用之斗小如飲酒至數石而不能亂又有一飯斗粟是也周禮㮚氏為量鬴深尺内方尺而圓其外其實一鬴鄭𤣥注曰鬴六斗四升也豆區釡皆自四而登之十鬴為鍾班志曰十斗為斛其法用銅方尺而圓其外鄭𤣥以為方尺而積千寸祖冲之以筭法攷之方尺積一千五百六十二寸餘其鬴為斛其名則異其實則同皆方尺而圓其外也鄭𤣥祖冲之皆以為是古斛之制也然其圓方深徑則同一云容六斗四升一云容十斗何也一云其積千寸一云積一千五百六十二寸餘又何也按班志所謂方尺而圓其外旁有庣焉顔師古謂庣為不滿之處又按隋志祖冲之所謂方尺而圓其外减傍一釐八毫其徑一尺四寸一分有竒而深尺此必旁庣與减旁有淺深小大之間故積寸有多寡之異也隋志曰黄鍾律黍容或多或少者由旁庣其腹故有盈虛此之謂也然鬴與斛皆方尺而圓其外凡有十千與六斗四升之異雖云旁庣不能相去如是之逺也豈尺度所制有不同耶豈深尺與方尺其間邪㮚氏云鬴中之實其重一鈞三十觔也班氏云其重二鈞孟康云一鈞重三十觔計一萬五百二十餘正與正文備氣物之始萬有五百二十説合則知正文誤作二字耳隋志亦作二字皆誤也積實為寸為圭杪撮升斛大小多寡之説不同鄭𤣥以斛方尺積千尺者方尺而深一寸則以十乗之積一百寸也方尺而深一尺以十乗之則積一千寸也隋志九章商功之法程粟一斛積二千七百寸程米一斛積一千六百二十寸程麻菽粟麥一斛積二千四百三十寸此精粗小大不等故也又孫子筭術曰六粟為圭十圭為杪十杪為撮十撮為勺十勺為合應劭曰四圭為撮孟康曰六十四黍為圭又審度類孫子以十忽為抄抄禾穗芒也夫圭一也或以六粟為圭或以六十四黍為圭撮一也或以十抄為撮或以四圭為撮抄一也孫子既謂十圭為抄又曰為圭之説相去逺甚姑以孫子六粟之言為據可也又王莽斛小而尺短魏斛大而尺長後周王升大於官斗一升當官斗一升三合餘開皇一升倍古升之三以古斗三升為一斗大業初復依古斗又以見古之斗斛狹而後之斗斛寛也觀班志論斛之制方尺而深尺遂能容十斗之實其小狹可知矣吁審度嘉量非惟論者之言不一而古今制器亦自有大小不齊之間也斛銘㮚氏之鬴銘曰時文思索允臻其極嘉量既成以觀四國永啓厥後兹器維則釋者以時文為是文徳之君恐不然禮曰非天子不制度不考文此文與時文同班志自量者龠合升斗斛而下至於左升右合龠狀似爵上三十二參天兩地圜而函方左一右二隂陽之象其重一鈞聲中黄鍾等語註以銅為之故有聲也即漢劉歆王莽之斛銘也見隋志後周武帝王升有銘荀朂之前尺張衡之土圭皆有銘以紀時日制度小大長短之義使後人有考焉耳是故制器尚象古人非茍為也况度量權衡將以一天下同風俗哉茍不知是理而徒侈大其辭以制度考文之事矜示後世又非聖人之本意也甞觀隋志所載王莽銅權之銘曰黄帝初祖德布于虞虞帝始祖德布于新嵗在大梁龍集以辰真人據土徳受正號即真改正建丑長壽降崇同律度量衡稽當前人嵗在己巳嵗次實沈初頒天下萬國咸遵子子孫孫享傳萬年此其銘文也夫㮚氏嘉量之銘數語而足莽之銘何其云云不已耶其意未必欲一天下同風俗姑欲矜大其祖黄帝虞舜之事也班志採劉歆斛銘以備律嘉量之數所謂參天兩地左陽右隂等語雖得制器尚象之意觀其出辭氣大似矜夸故班固曰刪其偽辭取其正義著于篇也偽辭既刪猶有矜大之語使偽辭未刪之前則斛銘與銅權之銘等耳律權衡律權衡漢志言備數和聲審度嘉量權衡皆起於黄鍾之數之宫之長之龠之重及其論五則止曰律量度權衡而聲數不與者聲與律通數與律偕也夫五則五物也今而曰律度量權衡凖繩則七矣凖平繩直皆自衡而生故權衡合徳凖繩連體也規矩凖繩皆自衡而生則知持平之義無往而不通也權者銖兩觔鈞石也古有黍絫七黍為絫十絫為銖環鈞鋝鎰之目後代差變其詳未聞漢志曰千二百黍重十二銖是一銖重一百黍也應卲曰十黍為絫十絫為銖正此意也兩黄鍾之律重故一兩二十四銖也十六兩為觔三十觔為鈞四鈞為石漢制與今皆同惟權之為制今古不同漢志曰五權之制圜而環之令肉倍好周旋無端終而復始無窮已也孟康注曰為鍾之形如環也體為肉孔為好今之權不然也隋志曰石勒獲圎石狀如水碓銘曰權石乃王莽所制與班志所謂如環之狀果同乎此不足多論惟齊以古秤一觔八兩為一觔周秤四兩當古四兩半開皇以秤三觔為一觔是後之權衡亦倍於古也律度之長嘉量之大權衡之重後世皆有加於前惟上之政治下之習俗不能勝古人耳羣書考索續集卷二十一
