body:
  text: 羣書考索續集卷二十二宋章如愚編厯門厯歴代厯古歴有六家黄帝顓帝夏殷周魯是也秦用顓帝厯漢初因之或云用殷厯故通鑑編年朔日兩存之也自武帝更造太初厯前厯與天不合迄東漢之末厯凡四改成帝三統厯章帝四分厯因太初三統踈闕靈帝乾象厯晉書志言四分計分太粗而改作此厯此乃劉洪蔡邕共為之八代多仍此法自魏至隋厯凡十三改魏文帝有黄初厯韓翊以乾象减斗分太過而更造此校議未定而帝崩明帝有景初厯楊偉造晉武帝有正厯劉智造即景初舊法也以五星踈闊故元帝渡江更以乾象法推五星穆帝有通厯王朔之造先是後秦姚興時羗岌亦造三統厯秦姚興時當晉武帝太元九年羗岌造三紀甲子元厯專援劉歆三統宋元嘉中何承天造甲子元厯迄宋末相仍用梁武帝改行宋祖冲之甲子元厯其子祖􅀈奏請行之以何承天歴緯差故也陳氏因之北齊文宣髙氏用宋景業天保厯妄引元命包言齊受厯之期董峻鄭元偉非之乃上甲寅元厯鄭元偉董峻又上甲寅元厯時又有劉孝孫張孟賔同知厯事孟賔受業於張子信與宋景業争論未定屬國亡西魏入闗行李興業正光厯于時宇文周明帝使庾秀才等造周厯宇文周武帝時甄鸞造天和厯以甲寅為元周天象初馬士顯又上丙寅元厯迄于隋開皇四年始更用張賔厯隋開皇行張賔厯張賔盛稱高祖非人臣相自陳代謝之証帝乃下詔頒行寶厯厯本之何承天而劉孝孫劉焯議其失賔方有寵孝孫焯議竟不行十七年又用張胄元厯冑元因言日景長之事帝大悦令與劉暉秀才等相駮難㑹顔敏上書言太初厯八嵗之事帝欲神其事下詔襃美頒行胄元厯冑元與袁充更相引重先是劉焯見胄元進乃更名劉孝孫厯法曰七曜厯上之胄元害之遂罷焯又増修其書曰皇極厯駮正胄元之短袁充左右胄元共排焯歴更不行焯皇極厯厯法見隋志唐厯凡八改髙祖戊寅元厯傅仁均造道士也高宗麟德甲子元厯李淳風造元宗開元大衍厯僧一行造以前厯日蝕不驗此下皆因其法肅宗至德厯韓頴益大衍推代宗寶應五紀厯以前厯不與天合鄭獻之造寫大衍舊法徳宗建中正元厯徐承嗣等造因前厯氣朔稽後也又雜麟徳大衍術憲宗元和觀象厯穆宗長慶宣明厯以前厯測驗不合也皆因大衍舊術昭宗景福崇元厯以前厯數差五代初用唐厯并閠國歴凡有八家晉高帝調元厯馬重績因曹士薦符天小厯不復雅古上元起唐天寳十四年乙未為上元以正月雨水為氣首行之五年輙差復用崇元厯周有明元厯王處訥私譔又有萬分厯蜀有永昌厯正象厯南唐有齊政厯周世宗有欽天厯王朴造宋朝一祖十宗厯凡十一改太祖造應天厯後置閏差乃王處訥所造太宗乾元厯王素造後以朔望有差真宗儀天厯厯家造宋白為之序後以星曜有差仁宗崇天厯厯家造晏殊序並見㑹要英宗改為明天厯以日蝕差神宗改為奉元厯因日蝕有差哲宗改為觀天厯因冬至差徽宗改為紀元厯以時氣之差高宗改為紀元厯以定臘有差孝宗造乾道厯以統元日食有差又改淳熈厯曾子固甞云王處訥見王朴造欽天厯謂之曰此厯可且行久則差矣已而果然宋朝命王處訥正之於是有應天歴久之又差苖守信等承詔論定於是乾元厯淳化至道間王濬鄭安之徒校其踈宻日官韓顯符始定渾儀之器楊文遂増用甲子之數皆施行焉天之髙也日月星辰之逺也寒燠雨暘氣數之不齊章蔀紀元餘分之所積以千百年計之猶可運之掌上及其久也有非巧之所能計者此厯久則必差勢之所必至也治厯明時之君子因其差之未逺革而正之無難也其或盡更前人之法而更復踈逺其或増損前人之舊而更加詆毁則非矣自昔黄帝以來厯凡五十餘家皆由氣朔躔度或先天或後天微有不應厯象則厯法從而變也夫黄帝始調厯顓帝為厯宗至漢則不能無踈宻漢人課之詳矣由漢以來太初厯法為第一三統四分乾象或因革焉而復有踈宻之間盖三統則甚踈而乾象則甚宻也乾象之厯為推歩之師表韓翊楊偉咸遵其舊法而不及深妙翊又復據其術而背其言唐自開元大衍之厯行筭數備悉其後雖屢有變更皆不外於一行之數改厯者又從而指其踈謬不特此也北齊文宣悦宋景業䜟緯之佞而改行天保厯隋髙祖喜張賔陳代謝之證而改行開皇厯上之人所以改歴者悦喜䛕初不為敬天授民而設也劉孝孫厯法甚精輙為劉暉所抑劉焯推占至詳常不為張胄元所容下之人所以造厯者冒寵嗜利初不揆其法之是非也操是心以往其何以議厯為哉是以知天道逺厯法推測不能每事中程其曰日食不效更考日度可也其曰斗分有差更定宻率可也其曰五星踈逺更驗星躔可也其或一事不中程乃盡更前人之法大抵因其實而實其名異其所入之門而同其所歸之極如宋何承天厯法齊用之則為齊厯隋張賔用之則為隋厯也如劉孝孫厯法劉焯更名七曜厯其後又更為皇極厯也一法而異用一厯而數名大抵然也然則自古迄今五十餘厯其立法之異者大初厯本於律大衍厯本於易是也其餘皆襲舊法而増損焉耳後漢羗岌斗分説羌岌造三紀甲子元厯其畧曰以古今七家厯考之所以有差者皆由斗分之䟽春秋所用何厯晉志羗岌云因春秋日蝕攷其晦朔不知用何厯班固以為春秋因魯歴魯厯不正故置閠失其序厯序曰孔子為治春秋之故退脩殷厯則春秋宜用殷厯今攷之交㑹與殷厯又不相應又經率多一日傳率少一日服䖍觧傳乃以太極上元殊不知太極上元劉歆三統厯也於春秋而用漢厯可乎唐志四時寒暑無形而運于下天日月星辰有象而見于上二者常動而不息一有一無出入升降或遲或疾不相為謀其久而不能無差􅑯者勢使之然也故為厯者其始未甞不精宻而其後多踈而不合亦使之然也不合則屢變其法以求之自堯舜以來歴未甞同也唐厯八改自戊寅元厯至景福崇元厯厯不可執一善言厯者常因天以求合不執一以為騐善言厯者為合驗而已矣善言厯者有三説一曰氣二曰象三曰數不善言厯者數而已矣善數可以類推而日月星辰之行有象而見於上四時寒暑之氣無形而運于下二者皆動物也其可執其一定之數以驗其運行而不息者乎故甞謂清臺之候乃厯象之元龜也一晷度之差吾志矣一星辰之動吾著焉旦旦而求之歩其前者推其後來而毫髮無遺筭柰之何預為合以驗天而執其一定以驗二者之常動此漢唐以來治厯者無慮數十家其始未甞不宻而後未甞不䟽者豈非以此歟所貴乎治厯明時之君子正以隨時變通也革卦第四十九象言治厯明時或者以為合大衍之數非也盖厯久必差不可不改革耳自唐至宋朝歴名唐高祖有戊寅之厯高宗有麟徳之厯中宗有景龍厯明皇有大衍厯肅宗有至徳厯代宗有五紀厯徳宗有正元厯憲宗有觀象厯穆宗有宣明厯昭愍有崇元厯自後至於梁唐日官之任缺焉晉高宗始用趙仁錡有調元厯周世宗用王朴有欽天厯方朴之厯成也王處訥謂之曰此歴可且行久必差矣既而果然宋興命處訥正之於是有應天厯久之又差苗守信等承詔論定於是有乾元厯至道淳化間王濬鄭昭晏之徒屢校其䟽宻而日官韓顯符始定渾儀之器楊文溢謂用甲子之數皆施行焉厯久必差必須更革乃善自劉歆作三統厯推易以合春秋然後知作厯不可無所本自杜預序長厯以為天運必有差而後知用厯之不可有所拘秦漢以來古厯不傳所存者自黄帝至魯凡七家其用於漢初惟顓帝厯耳然度數之失服色之乖議者已非之豈非法久弊變而通通而久固有所待耶且太初之歴非不宻也然可行於武帝之時至章帝則復失矣四分之厯非不精也然可用於章帝之時至百年而復差矣唐高祖始用大衍厯至高宗之麟德則變至中宗之景龍則又變迨明皇時大衍用而景龍又廢矣大衍之精宻宜可傳逺也未幾而復差則為五紀為正元唐觀象為崇元又何其紛紛耶盖隨時變通正大易革象之義宋朝之厯率二十年一差又復訂正其以是歟漢太初厯必求上元甲子日月如合璧五星如連珠推之千嵗以前以為厯始至唐士為始變其術至五代司天監馬重績造符天厯乃不復推占冬至上元甲子而以天寶十四載乙未為上元雨水為嵗首自後厯毎易差不可傳之則又變之過也作厯當以儒者漢之厯大率百年而一變唐之厯大率四十年而一變近年以來作厯委之星翁厯家傳政故大率二十年一變由今而欲攷新厯之異同驗交蝕之得失盍亦委之儒者乎至宋朝司天有監太史有局皆以儒臣提舉之今日能舉行其制則推五星聚奎必有如竇公儼者定渾儀占象必有如蘇公頌者厯元不同東漢志曰黄帝造厯元起辛夘顓帝用乙夘虞用戊午夏用丙寅商用甲寅周用丁巳魯用庚子漢承秦初用乙夘秦用顓帝厯也武帝元豐七年作太初厯元以丁丑章帝四分厯元以庚申太初以上諸厯所謂六歴也六厯之書前漢藝文志載之詳矣其起厯之元必於此乎見之自太初以來厯起皆有元諸志所載厯法必先推其元之所起以為積筭之紀綱故太初元法四千六百一十七年范曄以四千五百六十為元與此不同太初併閏嵗之月總計之也三紀大備之意三統上元十四萬三千嵗見漢志乾象元法七千三百七十八年正厯元法九萬七千一年晉武帝太始中劉智造通厯甲子元法推開闢之始亦九萬七千年晉王朔之三紀甲子元法八萬三千八百四十一年羗岌張賔甲子元法積四百萬餘筭劉焯甲子元法積一百萬餘筭一行厯本議積筭至千萬億嵗夫數往所以知來也攷古所以驗今也積筭之多於以見宻率之詳推歩之審焉耳自三皇五帝至于漢方數千年而漢世厯家以三紀之數推之亦已多矣王朔之復以九萬餘年為開闢之始張賔劉焯一行又以數百萬億為積筭豈開闢之上復有開闢邪按後漢順帝漢安二年宗訢等議建厯之本必先正元元正然後定日法日法定然後度周天以定分至也又按靈帝時馮光言盗賊之起由厯元不正蔡邕力辨其非以為咎不在此范曄作東漢志亦曰厯之興廢以踈宻課固不在乎元二子之論或以為厯必正元或以為厯不主於元何者為是甞觀唐傅仁均作戊寅歴所以武徳元年為厯始高祖以戊寅歲甲月登極而嵗朔遲疾交㑹及五星皆有加減至九年復用上元積筭五代晉高祖時馬重績作調元歴不復推占上元上以唐天寶十四載為元行之輙差遂復用唐末崇元厯揆此二事則推厯起元止據目前考驗無證則其術失之淺上推開闢冥測洪濛則其術近乎迂必也用太史公三紀大備之法范曄紀元之目推上元甲子四千五萬餘年以時考之不近不逺以術言之不淺不迂矣四分厯仲紀之元起孝文帝後元三年太初厯元不同史記厯書載武帝改太初厯之詔曰十一月甲子朔旦冬至其更以元封七年為太初元年年名閼逄攝提格月名畢聚日得甲子夜半朔旦冬至夫閼逄者甲也攝提格者寅也是以太初元年為甲寅年也故史記厯術甲子篇以太初元年為甲寅又五年天漢元年也為戊午又五年太始元年也為壬戍自此順數周六十餘年皆以漢家年號紀之是太初元年為甲寅曉然矣又按東漢志漢安二年宗訢等建議以為漢興元年歲在乙未又四十五年文帝後元三年也嵗在庚辰又五十八年武帝太初元年也歲在丁丑今攷之通監編年高祖即位之年以乙未文帝後元三年以庚辰武帝太初元年以丁丑與宗訢之議脗合而劉孝孫勘日度之議亦曰武帝太初元年丁丑然則范志所謂太初厯元用丁丑即以太初元年為元也非推上古之元也太史公所紀武帝之詔曰其更以元封七年為太初元年年名閼逄攝提格是推上古之元得甲寅之歲其嵗十一月甲子朔旦冬至日月如合璧五星如連珠故武帝時以大古甲寅歲為起厯之元也故曰其更以元封七年為太初元年猶言以七年為上古甲寅之嵗也上古太初應合璧連珠之瑞今以太初紀年元起丁丑亦與甲寅同耳非元封七年即甲寅也然則太史公厯術甲子篇以古初甲寅為元順紀六十餘年大餘小餘之數此其起厯之數此其起歴之術也後人不悟太初元年年號傚古初之意即以太初天漢太始年號分配年名之下者非也史通曰元成間禇先生増益天漢年號何以知其然太史出於武帝時安能預知六十年後年號而先書於厯述年名之下哉此必後人増益之無疑也唐一行日度議引洪範傳曰厯始於顓帝上元太始閼逄攝提格之嵗畢聚之月朔日己巳立春七曜俱在營室五度是也觀此則知上元太始猶言上元太初也顓帝厯以甲寅為元故漢厯亦以顓帝之元為元也又曰漢太初厯元起丁丑秦顓帝歴元起乙夘推而上之皆不值甲寅猶以日月五緯復得上元星度故命閼逄攝提格之嵗而實非甲寅也觀此言則又知厯書曰年名閼逄攝提格者以甲子朔旦冬至而為起厯之元故名之以甲寅云耳未必日月合璧五星連珠正當顓帝甲寅年也劉歆三統厯進太初前一世得五星㑹庚戍之嵗以為上元顓帝元用乙夘洪範傳云用甲寅又何也太史公厯術甲子篇有天漢征和等年號在劉歆三統厯譜則有之此必後人以此厯譜附入太史公厯述也又龜莢日者等傳皆禇先生足之矣十一月甲子朔旦冬至周復不同日月如合璧五星如連珠孟康注曰謂上元太初甲子冬至時七曜皆聚斗牛分如合璧連珠也東漢志曰律首黄鍾厯始冬至月先建子時平夜半當漢高皇帝受命之四十九歲嵗在上章辰在執徐文帝後元三年庚辰年也冬十一月甲子夜半朔旦冬至日月閠積皆自此始立元正朔謂之漢厯此章帝四分歴元自文帝後元三年始也夫後元三年止太初元年凢五十八嵗而十一月甲子夜半朔旦冬至已至于再豈一甲子周則復得此數耶賈逵議曰七十二歲復十一月合朔冬至或為八十嵗則一甲子冬至賈逵議見東漢志今考之范志曰至朔同在日首謂之蔀夫十九年得一章四章為蔀合七十六年也日首者甲子日為六甲之首也冬至之日與朔日同是甲子則為蔀所謂十一月甲子夜半朔旦冬至是也何為有五十八年有七十一年有七十六年有八十年之異耶按班志曰乃以前厯上元太初四十六百至於乾封七年復得閼逄攝提格之歲中冬十一月甲子朔旦冬至日月在建星孟康注曰古以建星為宿今以牽牛為宿觀此言則中冬甲子朔旦冬至乃上元太初甲寅年也非武帝元封七年也日度嵗差事多見一行日度議又曰古以牽牛上星為距太初改用中星故洪範𫝊日在牽牛一度又有日躔説見後劉炫依大明厯四十五年日差一度則冬至日在虛危而夏至火已過中與日永星火之説不合矣梁武帝據虞􅒠歴百八十餘年差一度則唐虞之際日在斗牛間而冬至昴尚未中與日短星昴之説不合矣王孝通謂歲差若自昴至壁隔二宿也則堯前七千餘年冬至日不在斗建而在東井不應寒暑易其位也孝通謂日與黄道俱差一行非之故李淳風謂古厯冬至皆起建星今測建星正在斗十三四度一行以淳風麟徳厯校之太初永平百年間氣當後二日半朔當後天半日烏得謂之無差也吕不韋春秋月令謂黄帝仲春乙夘日在奎至今三千餘年而春分亦在奎一行謂月令若可為正則立春正在營室五度淳風安得頓移在啓蟄之節觀諸家之言並不取歲差之説而一行皆非之故其立論曰古厯日有常度天周為嵗終故係度于氣節其法似是而非故久而益差虞喜覺之使天為天歲為嵗乃立差以追其變使五十年退一度何承天以為大過乃倍其半而反不及劉焯取二家中數為七十五年盖近之矣觀一行之言歲差之法以劉焯皇極厯為主此所以併非諸家之説也夫一行所謂天為天度者赤道分天之中也所謂嵗為歲度者黄道日之所行也自漢而下張平子作渾天儀象所以立為黄赤道也欲以日度追天度也茍曰不然則周天三百六十五度四分度之一此乃赤道天度以正嵗之日計之則止行三百六十五度而已天之度有常數而不渝日之度常積餘分而置閠二者不同安得謂之無嵗差哉此太初厯謂冬至日在牽牛初賈逵謂在斗十八度晉武帝太始三年冬至日在斗十六度晉用魏景初厯宋用元嘉何承天厯其冬至皆在斗二十一度所以不能無進退之差也日度歲差一於進則春夏秋冬易其位一於退則其所差亦然其進退疾徐必於中節之氣正閠之月或加或損或進或郤惟巧歴者於此見之爾雖然古者推厯候日必驗昏中之星驗之之時有淺深遲速之異或推而進之或引而退之也日度之度何以為定論哉一行之言又曰漢世課昏明中星為法已淺今候夜半中星以求日衝近於得宻以水有清濁壺有増减或積塵所擁而漏有遲疾臣等頻夜候中星而前後之相差或至三度大畧冬至之日逺不過斗四度近不出十度乃追諸家厯論日度所在或是或非而謂開元四年冬至日在斗十度觀一行之言無所不用其情矣特其所謂昏明中星為術已淺而夜半中星漏壺不常又差三度其開元所定冬至斗分日度又果無一毫之差乎夫餘分之法有日之餘月之餘歳之餘積餘分而成閠月自七閠而為一章猶可計也積七閠之餘而為蔀則何以哉推一蔀之閠而為紀可也積三紀之餘分而為元則何以哉是以天度嵗度不能無差立差以追其變亦止約其大要爾一行取劉焯皇極立差之法凡七十五年而退一度其説是矣至於度之所差或進或郤復歸于中使其盡入一行億萬年積筭之中其厯亦億萬年不改可也何至屢更而屢變一年之頃斗轉星回二十八宿有同旋磨凡曰日在斗幾度云者驗之有頃刻之異則所差有尋丈之間一行亦安能積萬年之筭哉一行之言曰乾度虛盈與時消息譴告於經數之表變蔵於潜遯之中則聖人且猶不知非籌筭之所能及矣斯言其何訾餘見井斗度説斗分不同日月初躔星之紀也商厯以四分一為斗分三統以一千五百三十九分之三百八十五為斗分乾象以五百八十九分之一百四十五為斗分景初以一千八百四十三分四百五十五為斗分䟽宻不同法數各異羗岌曰殷厯斗分麄故不施於今乾象斗分細故不通於古景初雖在麄細之中而日之所在乃差四度見晉志羗岌甲子元厯議夫劉洪蔡邕之作乾象歴以四分厯斗分太多故也於是更為新率而降殺焉是後韓翊作黄初厯以為乾象减斗分太過後當先天而羗岌猶言乾象斗分之細何也甞觀梁武帝天監中祖偃奏曰先臣在晉冲之仰尋黄帝至今十二代厯元不同周天斗分䟽宻亦異當代用之各垂一法是知厯不同則斗分不得不異也用他權度而較他人之物其輕重長短彼是不齊矣夫古人所以注意於斗分之踈宻者日月初躔星辰之紀也日月合朔於斗以紀一歲之星辰一陽生於此萬物萌於此律厯起於此也甄耀度及魯厯南方有狼狐而無東井北方有建星而無南斗者二十八宿周天之度惟斗井二宿其度最多故月令昏弧旦建指以為的而正昏明也後世作厯書者必於斗分而加詳焉亦此意爾東井南斗度加减不同赤道天度也黄道日度也皆以二十八宿分配焉班志二十八宿之度本劉歆厯譜惟南斗東井之度多觜觽輿鬼之度少盖觜二度鬼四度斗二十六度井三十三度也唐一行赤道之度其井斗之度與漢志同惟觜觽一度輿鬼三度各减於一度耳至於黄道之度則南斗三十三度半東井三十度已與赤道之度不同較之范志所載黄道銅儀斗减二度為二十四度井减三度為三十度大畧相同是知東漢以前黄道赤道之度混而為一班志之所紀者是也東漢以後始分為二故赤道之度差多黄道之度少范志一行之所紀者也黄道度少赤道度多天行與日月不同也一行日度議曰古厯日有常度天周為歲故㑹其度於氣節虞喜乃以天為天嵗為歲立差以追其變焉觀乎此則知班志所載猶以天周為歲東漢以來始有黄赤道之異觀黄道度少赤道度多則一行歲差之説是也夫旣有黄赤道之異而度之加减不同此劉孝孫謂堯時冬至日在危宿武帝太初元年日在牽牛初而晉宋間羗岌何承天以日在斗十七度隋甲辰之嵗以日在斗十三度所以紛紛而不齊也夫日在危宿至牽牛初自牽牛而至斗十七度自斗十七度至十三度使日度嵗差或常進而無退或常退而無進由古迄今四時易位矣是則嵗差之説固當以進退加减之際辨之然亦由古今加减并度之不一與黄赤道之不齊也一行議日度曰古以牽牛上星為距太初改用中星故供範傳曰日在牽牛一度也與二十八宿起處不同之説相類孟春日度所在不同月令孟春日在營室三統日在危十六度元嘉厯日在危三度月令孟春昏參中三統厯昏畢中元嘉厯昏昴中時䇿答云張綱䇿月令秦書也孟春日在營室至漢百有餘年故日進在危十六度也自漢太初至宋元嘉四百年故日進在危三度日舍既遷則昏中之星亦從而改日在危十六度則昏畢中自在危三度則昏昴中矣日在營室則昏參中矣若從此説則五百餘年日度有進而無退昏中之星亦有進而無退秦以迨今千有餘載則二十八舍四時易位矣豈知日度嵗差固不無之時其所差在乎進退贏縮之間也又起厯之法所據昏中之宿初或在宿中或在宿末故其餘亦次第不同也所據昏中之宿宿有中初末之異而日之所在亦有不齊而已日月周天度之餘附閠周天三百六十五度四分度之一日一歲而周天月一月而周天以筭法推之則一月之日止得二十九日半強是日之行也一月止行二十九度半強總一年計之止行三百五十五度有竒尚餘十一度有竒也筭法曰一月之日二十九日又曰八十一分日之四十三者分一日為八十一分也日雖西下未全黒日雖東升已先明故夜得三十八分是為半日強也日一月而行二十九度半強則十二月計三百五十五度餘也毎月餘半日弱則十二月餘六日弱即月有六大六小之分也一年而餘六日弱為閠餘又六旬之外有五日又四分日之一是又得五日強也六日弱與五日强一年共餘十一日有竒也五年共餘六十日為兩閠月月有一小一大又餘一日強而附合於一章七閠之數也月之行也一月而周天以筭法推之則二十七日強而月已周天總一年計之三百二十四日以上已周天三百六十五度有竒其餘三十日之度猶未計也筭法曰月一日行一十三度十九分度之七夫一日而月一十三度有竒則二十七日強已得三百五十五度也一月計二十九度半強而月行止二十七日有竒則尚餘二日半強也一月而餘二日半強則十二月共餘三十日有竒也一日為一度一度凡計幾分則三十度之積分可知矣三年一閠五年再閠以日之餘合月之餘而成之也歴法曰以小餘加大餘則知月之小大意其然也尚書䟽謂一年餘十二日弱此入細法推之也前所謂姑言大畧耳大餘小餘太史公厯書曰大餘日也小餘月也攷之厯書與諸史厯志大餘未有盈六十之數則知其為甲子之日也日不盈甲子之數則為大餘也故大餘日也書志凡曰小餘少則七八多則數百或有至於千餘者何也太史公所謂小餘者月豈以積年所餘之月而計之耶豈以一年之中月周天所餘之度積分而計之耶凡一年之中必曰大餘五十小餘六百又曰大餘十三小餘二十凡此等類所以重言之者又何意也豈未合朔未置閏則所餘計若干多已合朔已置閠則所餘計若干少耶按東漢志宗訢議曰百七十嵗小餘六十三自然之數也夫一章計十九年九章計百七十年也一章凡七閠九章則六十三閠百七十年之中有六十三閠月此正與太史公小餘者月之説同又按班固志張壽王言太初厯虧四分月之三去小餘一百五分以故隂陽不調又按劉焯等術曰凡日不全為餘一行大衍等法曰凡分為小餘則知小餘謂之餘分亦可也大抵諸厯法大餘皆以一甲子之日計之其小餘或為月或為分皆以一月之中所餘之日之分積筭之耳又元法紀法日紀所主之數不同故小餘説亦不同也其太史公重言大餘小餘之數者此乃太初厯法而他厯皆不然故不容旁引曲説也閠置閠之法積十九年所餘之日而已七閠大畧已見日度所餘之説矣所謂斗柄兩辰之間其説易明所謂閠無中氣者二十四氣十二為中十二為節一月兼具中節則為常月其節氣或在月中其中氣或在月晦朔之間是為無中氣則為閠也尚書正義曰無閠即三年差一月以正月為二月也九年差三月以春為夏也十七年差六月則四時相反也此履端歸餘所以重閏課厯得失必考諸閠也其有疑義具見左方春秋譏失閏釋者不同春秋書時月諸家皆云建子則是冬十二月十月也春正月十一月也以冬為春者何哉左傳襄公二十七年經書冬十二月乙亥朔日有食之傳云十一月乙亥朔日有食之辰在申司厯過再失閠矣杜預以長歴推之曰周十一月今九月也斗當建戍而猶在申故知再失閠也前志劉歆厯譜亦以為辰在申而司厯以為在戌史書以為建亥周十二月夏建亥之月也其説與杜預皆同後秦羗岌乃謂襄公二十七年十月乙亥朔日有食之以定朔而考其交㑹應在此月不為再失閠又曰劉歆三統厯不可施於春秋而傳之違失亦甚多皆此類也觀岌之言非惟不取劉歆之説併左氏傳杜預長歴而非之矣唐一行亦曰長厯日子不在其月則改易閠餘以求合故閠月相拒近則十餘月逺或七十餘月此杜預所甚謬也然則左氏杜預所謂再失閠者皆非歟意者數百載之下仰求數百載之上各據一法各操一説所以不同也古之書傳編年紀時日非如後世之詳悉惟春秋井井有條而又因史䇿之誤而書之以示司厯之過故後人推考前代之嵗月凡得一言一話則據以為證如得火猶西流之説則據以為再失閠三失閠之辨如得十月之交朔日辛夘日有食之之説則據以為平朔定朔之辨亦如得左氏再失閠之一説則據以推春秋之年代也何怪乎紛紛異端迭相訾毁者乎釋火猶西流之説不同哀公十二年經書冬十二月螽仲尼以為火伏而後蟄者畢今火猶西流司厯過也杜預注云周十二月今之十月是嵗失置一閠誤以九月為十月也故有螽劉歆厯譜云以建申流火之月為建亥司厯誤以七月為十月也張晏注班志云當八月建酉而司厯誤以八月為十月再失閠也杜預謂九月誤為十月則一失閠張晏謂八月誤為十月則再失閠劉歆謂七月誤為十月則三失閠三者之説何如哉按仲尼之言曰火伏而後蟄者畢今火猶西流司厯過也夫大火心星也心星伏而入北方則十月也心星猶西流而未入北方則猶九月也劉歆知七月流火而不知大火八月亦謂之西流也張晏知八月流火而不知九月猶西流也火猶西流蟄虫未畢伏以九月為十月明矣以九月為十月則失一閠曉然矣杜預之言是歆晏之言非也杜預長厯以劉歆三統歴最踈其謂是歟張晏誤以襄公二十七年再失閏之事而釋此也一行議厯亦云以九月為十月魯自文公不知朔至哀公凡百餘年莫能正厯其為失閠多矣故春秋日食甲乙者三十四而劉歆三統厯惟一食杜預以此知其厯術比諸家最踈也杜預推春秋之傳詳且審矣然閠月相拒近則十餘月逺則七十餘月僧一行又復以此譏杜預之謬失春秋假日月以定厯數故合朔先天則經書日食以紏之中氣後天則傳書南至以明之後人推䆒何以紛紛而無定論耶後三正論亦以流火為證魯厯不正以閠餘一之歲為蔀首此乃班志術劉歆厯譜也孟康注云當以閠盡嵗為蔀首今失正未盡一嵗即以此為部首也按左傳文公元年閠三月非禮也杜預注云於厯法閠當在僖公末年誤以今年三月置閠左氏所以譏其不能履端於始舉正於中歸餘於終也意者僖公末年閠餘猶未盡歸終而即置閠於文公之元年與劉歆所謂以閠餘一之嵗為蔀首是也然晉志所載後秦羗岌厯法謂班志以魯厯不正故以閠餘一之嵗為蔀首檢春秋置歴不與此蔀相符也岌又曰服䖍觧傳用太極上元太極上元乃三統厯何縁施於春秋乎岌之言亦甚正特未知為蔀首之説是非果如何耶平朔定朔不同平朔者月大月小相間不必以日月㑹為朔也定朔者或二小或三大常以日月㑹之日為朔多主定朔朔為朝㑹之首氣為生長之端朔有告餼之文氣有郊迎之典故孔子命厯以定朔旦冬至以為將來之範此隋志定朔之言之意也然春秋日食三十五書朔者二十七其不書朔者八左傳云不書朔官失之也公羊傳云不言朔者食二日也初二日也榖梁傳云不言朔者食晦也非二十九即三十也夫日與月㑹則多蝕日食于朔則朔日食于朔則朔日為有定矣不食于朔而食于晦或食于二日者此由月法拘於一大一小相間厠之小數而不能定其㑹朔之日故朔在晦或在二日也左氏受經于夫子所以言不書朔官失之者宜也公榖之説皆非矣不書朔見隠三年二月莊十八年三月僖公十二年三月又僖公十五年五月又襄十五年八月劉孝孫以甲子元厯推筭其食也俱在朔日則是春秋之法主定朔非平朔明矣詩曰朔日辛夘日有食之此定朔之證也何承天亦甞主定朔之説而虞􅒠之言亦曰躔次既同何患乎頻大日月相離何患乎頻小也見唐一行説唐志傅仁均主定朔之説以為三年正月望及二月八月朔日月相蝕而不驗王孝通詰之曰定朔㑹合雖定而蔀元紀首三端並失之矣李淳風主王孝通祖孝孫主傅仁均更相出入無有定議一行曰合朔先天則經書日食以紏之中氣後天則傳書南至以明之其在晦與二日則原乎定朔以約之一行盖取左傳官失之之言而申明定朔之有驗也古人議厯法之不正必曰日不食朔月不蝕望作厯法必以定朔為正而已王孝通所謂蔀元紀首三端與定朔不合此又在乎巧厯者損益進退之也無以𫝊仁均推日食不驗而遽更成法也日蝕議一行月議云日君道也無朏魄之變月臣道也逺日益明近日益虧人臣之象也望而正於黄道是謂臣干君明則陽斯蝕矣又曰十月之交日有食之於厯當蝕君子猶以為變詩人悼之然則古之太平日不食星不孛盖有之矣又曰月或變行以避日或五星潜在日下禦侮以救日或渉交數淺或陽盛隂微則不蝕或徳之休明則天為之隠雖交不蝕此四者皆徳教之所由以生也又曰劉歆賈逵近古大儒豈不知軌道所交朔望同術哉日行黄道月有九道其所行之道遇交則有剥蝕之變也至於合朔如合璧則不蝕其交不軌道則食也故驗日食者必以日躔月道之交驗之耳以日食非常故闕而不論魏黄初以來治歴始課日食踈宻張子信劉焯賈胄元之徒又謂日月可以宻率求以戊寅麟徳厯推春秋之時於厯應食而春秋不書者尚多則日食必交限其入限者必不盡食開元十二年七月朔於厯當蝕半強自交趾至於朔方候之而不食十三年十二月朔於厯當食太半而亦不食然後知徳之動天不俟終日若因開元二蝕不驗遽變交限而從之則差者益多杜預以日月動物雖行度有大量不能不少有盈縮故有交㑹而不食者是也一行因以員儀度日月之經令二徑相掩以驗食分之限又曰日月相㑹大小相若而月在日下自京師斜射而望之假令中國食之旣而南方戴日之下所虧纔半日外反觀則交而不食此則隨地而驗之也又曰使日食皆不可以常數求則無以稽厯數之踈宻若可以常數求則無以知政教之休咎一行之議可謂詳日食之變矣其大要不過謂食有常數而亦不可以常數求在乎人君修徳以應之耳獨有三節不可據曉姑表而出之以待能者一行所謂月在日下自京師斜而望之則食之既自南方戴日之下望之則所虧才半又云日外反觀則交而不食果如一行所測則日雖食而實未甞食矣豈日道月道交軌之際日上月下陽氣微隂氣盛日形為月形所蔽自下望之似食而非食耶夫日食以隂盛月食以星孛今一行謂月望而正於黄道則猶臣干君明故陽食之是月為日所食也而非由星孛也又按通鑑開元二年日食不驗姚崇表請書之史冊其後太史奏麟徳厯踈日食屢不效遂令一行改造新厯今一行乃云開元十二年七月十三年二月於厯當食而不食乃曰徳之動天不俟終日孰謂一行䛕言復蹈姚崇之武耶何者太史奏日食屢不效實開元九年也是年詔一行作新厯十五年而草成十七年而頒行按一行所論開元十二年日食尚以麟徳舊厯驗之而新厯猶未成也然日月之蝕係乎人君之德也舊厯日食屢不效矣此乃厯疎之故而一行乃云徳之動天不俟終日恐未免蹈姚崇之武也月道陽厯隂厯班志曰陽厯者先朔而月生隂厯者後朔而月生一行曰日道表曰陽歴其裏曰隂厯夫朔而後月生所謂三月哉生明月之三日為朏是也先朔之月為晦今而曰月生何也按鄧平等法一月之日上於二十九日半強是一月猶餘半日弱也其先曰朔月生後朔月在此必半日之間合朔有遲速故月生有先後藉之以厯名之曰陽曰隂也又不然則太初厯猶用平朔而未用定朔也一行所謂日道表為陽厯裏為隂厯者此以日道為主而配驗月道之交有表有裏故厯之名亦曰陽曰隂也一行九道議曰隂陽厯交或在四立或在分至所交並同而出入之行異盖九道者月道也青道二朱道二白道二黒道八八行兼黄道而為九也曰隂陽厯交者月道自裏而交於日道之表或自表而交於日道之裏故曰隂陽厯交也曰所交則同而出入之行異者以月道交日道春分與秋分同冬至與夏至同其於四立也亦然特其所以不同者黄道居中月道或出其東而入其西或入其北而出其南也所謂東交於角西交於奎是也又有朔交望交者朔交為初交望交為中交也皆視隂陽厯而正其行也然則隂陽厯之名上為日月之㑹朔望之交設耳青赤為陽白黒為隂隂為裏陽為表九嵗而一終謂之九道百七年而小終八十一章而九終九終之説見三統厯譜又見晉志劉洪乾象厯法班固天文志日月有九道用之一决房中道盖房中道即黄道也五代王朴謂月半道在黄道内半在外同此意耳羣書考索續集卷二十二
