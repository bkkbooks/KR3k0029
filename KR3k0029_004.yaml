body:
  text: 羣書考索卷四宗章如愚撰六經門周禮類周禮始末法始伏羲而成乎堯備乎周周公相成王建六官分六職禮樂政事粲然大備即其設位言之則謂之周官即其制作言之則謂之周禮前乎周者非無禮也在金天時司徒曰祝鳩氏司馬曰鵙鳩氏司寇曰爽鳩氏司空曰鳴鳩氏司事曰鶻鳩氏在帝舜時曰治官有百揆教官有司徒禮官有秩宗政官刑官有士事官有司空唐虞官百夏商官倍則官固有數矣虞書有二典夏書有政典固有名矣甘誓乃召六師而曲禮六大五官先儒以為商制至周則因習以崇之賡續以終之仲長統以周禮為之經禮記為禮之傳賈公彥云按書傳周公一年救亂二年伐商三年踐奄四年建侯衛五年營成周六年制禮作樂七年致政成王所制之禮即此周禮也若稽周室隨時制宜兵刑之官分為二禮樂之官合為一略天地詳人事六卿分職各率其屬以倡九牧阜成兆民為治之道罔不具舉後之言治者必稽焉後周之衰諸侯將踰法度惡其害己滅去其典籍孔子時已不具自秦孝公用商君其政與周官相反始皇疾惡欲絶滅之焚燒獨悉是以隱藏百年漢興言禮自髙堂生蕭奮孟卿后蒼戴聖是為五傳弟子若夫周禮其出最後武帝除挾書之律開獻書之路河間獻王獻入于祕府五家之儒莫得見焉或謂武帝時有李氏上周官五篇復入于祕府至孝成時劉向子歆校理祕書見之始得列序著于録略然冬官亡矣以考工記足之考工記乃前世能識古制者作時衆儒並出共排以為非惟歆獨識而五官亦有殘缺歆之末年始信其為周公致太平之迹按藝文志周官經制禮記所謂禮經是也經禮三百注曰謂周禮也然六官之屬三百六十舉成數也王莽時歆奏置博士奈何通天下兵革並起疾疫喪荒弟子死葬徒有河南緱氏及杜子春在頗識其説賈徽及子逵鄭興及子衆大夫者興也司農者衆也又以經書轉相證為解其時衛次仲賈景作馬季良亦皆作周禮訓詁鄭康成作禮注多引杜子春鄭大夫司農之義然則周禮始於劉歆而成於康成其後唐賈公彥又撰周禮疏五十卷衆所解説近得其實獨以書序言成王既黜殷命還歸在豐作周官則此周官也失之矣逵以六卿大夫則冢宰以下及六遂為十五萬家絙千里之地甚繆馬為武都守郡小少事乃述平生之志著易尚書詩禮傳皆就惟念前業未畢者惟周官年六十有六目瞑意倦自力補之謂之周官傳也初河南杜子春年且九十能通其義識其説鄭衆賈逵往受業焉林孝存以為不驗之書故作十論七難以排之何休亦以為隂謀之書康成獨知聖法故能答其論難且序世祖以來通人達士皆作訓詁使周官之不衰鄭氏力也厥後于寶王邵之徒有為義疏有為論評者與夫禮帖禮鈔之類莫可勝紀而世罕得其傳豈非華多實少不足以行逺歟惟康成之注賈公彥之疏學者用其説久矣惜乎理多錯繆未盡至當之歸欲振斯典宜有所待訓詁傳授劉歆校理祕書始得列序著于録略始奏立學官杜子春承平初年九十家于南山能通其讀識其義鄭興好古學尤明左氏周官其子鄭衆傳周官後本傳鄭衆見鄭興下馬融馬融作周官傳授鄭玄鄭玄作周官注董鈞傳賈徽徽及子逵受業於杜子春賈逵見賈徽下鄭玄以為括囊大典網羅衆家是以周禮盛行禮天官疏鄭玄為之注三禮正義周禮起於成帝劉歆而成於鄭元附離之者大半故林孝存以為末世瀆亂不驗之書故作十論七難以排之何休以為六國隂謀之書惟有鄭元知周禮乃周公致太平之迹故能答林碩之論難賈公彥疏王肅魏志肅初善賈馬而詆鄭玄干寶晉書不載師承孔子述職方述職方以除九邱疏云即周禮也尚書序韓宣子見周禮韓宣子所見蓋周之舊典禮經也左傳文中子言周禮子居家不暫捨周禮門人問子子曰先師以王道極是也如有用我則執此以往通也宗周之介也敢忘其禮乎子曰周禮其敵於天命乎文中子唐太宗論周禮唐太宗召魏徵入曰朕昨夜讀周禮真聖作也首篇云惟王建國辨方正位體國經野設官分職以為人極誠哉深乎良久謂徵曰朕思之不井田不封建不肉刑而欲行周公之道不可得也文中子周禮之名經禮謂周禮也周禮六篇其官有三百六十上文注周禮缺文儀禮有嗇夫之官而周禮不載國語有司商之官而周禮不録説者謂冬官之屬故缺然嗇夫農官也司商財官也宜屬於地官而不載意者三官之中亦有亡缺歟始作之意館閣書目曰成王作洛邑周公法天地四時建六官以行政若後世所謂職官者耳禮經散亡故取此而歸之於禮居攝而作六典之職謂之周禮營邑於土中七年致政於成王以此禮授之使居雒邑治天下禮天官序周禮儀禮並周公所記所謂禮經三百則周禮也威儀三千則儀禮也三禮正義先君周公制周禮曰則以觀德德以處事事以度功功以食民官惟王建國辨方正位體國經野設官分職以為民極乃立天官冢宰使帥其屬而掌邦治以佐王均邦國乃立地官司徒使帥其屬而掌邦教以佐王安擾邦國乃立春官宗伯使帥其屬而掌邦禮以佐王和邦國乃立夏官司馬使帥其屬而掌邦政以佐王平邦國乃立秋官司寇使帥其屬而掌邦禁以佐王刑邦國冬官考工記鄭注云此篇司空之官也亡以此備數且聖人建官治事名之所命莫不有義名曰宰以制變為義名曰夫以帥人為義以正人則曰正以長人則曰伯饔言食之熟亨言氣之通已疾者醫養陽者酒職主也典常也有藏則置府府治藏故爾有書則置史史掌書故爾鄉內鄉比閭族黨州鄉是謂鄉官遂外遂鄰里鄼鄙縣遂是謂遂官山則土之所積川則水之所流虞以虞其物衡以平其政司者伺察之謂氏者世守之稱掌則以手尚之守則固以守之尊其智故稱大夫卑其任故稱人揔則大别則小言大所以别於小也入為內出為外言內所以别於外也平其土之逺近故以均名之成其賈之多寡故以質名之胥養人者也又能助上焉師教人者也又能為物主焉訓而發之則謂之訓祭祀有宗則謂之宗卜以龜而知象筮以蓍而知數樂則聲音之所自出籥則律呂之所自生人尚口接神者祝也人為人交神者巫也屬於人而為僕力之強而為右臣則通乎君隸則本於主以耕為道者牛以行為事者馬有牧以養其形有圉以制其性閭言其同閭門縣言其首在下甸則田法在是也乃若包地而田亦謂之甸焉士則事人事事也乃若刑官尚察亦謂之士焉子為尊者屈以其卑故爾賁謂趍而利以其勇故爾謂之士則所掌者止於士謂之方則所掌者通於方進侍而為御刑人而為寇訝所以逆之禁所以止之或囚或戮以施其刑威有都有家以分其采地輪則運而無窮車則載而有節以梓為名者凡以取其材之美也以匠為名者凡以取其器之利也內宰下大夫二人命士十二人自內小臣奄竪凡將命灑掃之人自九嬪御婦祝史凡內官自典婦功服飾織紝凡治內之命士皆屬焉而隸於冢宰蓋女寵近習所以移人主之德大臣揔之則無得踰節詩稱皇父作相膳夫內史皆得人巷伯之雅寺人為之雖奄官亦吝其選晉侯近女而惑醫和以為趙孟之咎古人致君二南之化其道由此冢宰之尊宜於細務有所不屑也以今觀之自宮正膳夫醫師酒正內宰而下無不揔焉何哉蓋出納之要職宿衛之親臣奉供之近習玉府財用之司存宮中使令之嬖密凡其布列於王宮之內外而迫近於人主之左右者無不揔之誠以君心之所關係甚重也是以士大夫之職業有所統而不敢或肆人主之心術有所礙而不敢自私紀綱不散名分不易爵以不輕而左右前後之臣侍從僕御之士宴安玩狎之際無敢蠱壞人主之心術而侵竊大臣之權柄者體統之正孰大於此古者官不必備惟其人而已有其人則備無其人則兼是以周官之作實放唐虞之制而官事不攝吾夫子所以深責管仲變先王之制也以三公言之召公為保周公為師而太傅無有焉二公實兼之也周公既沒召公為保而太師太傅無有焉召公實兼之也乃同召太保奭芮伯彤伯畢公衛侯毛公是六卿之長召公又兼之不惟此也當是時六卿之官亦不必備周公以三公兼冢宰召公以三公兼宗伯蘇公以三公兼司寇畢公毛公以三公而兼司馬司空惟成王之季年芮伯彤伯衛侯實領司徒宗伯司寇之職其餘大抵皆兼官也其大者猶兼况於百官羣有司乎嘗以周禮考之二鄉則公一人是三公兼鄉老也一鄉則卿一人是六卿兼鄉大夫也軍將皆命卿是六卿又兼六軍之將也甚者太公以太師而兼司盟之職載在盟府太師職之是也蘇公以三公而兼太師之職太史司寇蘇公是也師氏以道德教國子以媺詔王而已其徒百二十人何哉蓋居虎門之左司王朝帥四夷之隸守王門是其徒不得不多也六官各六十凡三百六十周天之數也治官之屬六十三教官之屬七十九禮官之屬七十一政官之屬七十刑官之屬六十有六而小宰皆曰六十舉成數爾考工記官凡三十而輈人不與其數者一器而工聚焉者車為多故也鄉大夫卿也而謂之大夫王制曰諸侯之上大夫卿則卿固可謂之大夫矣卿知進止之義大夫以智帥人者也進止所以事上帥人所以臨下列職於朝則名之曰卿正其位也分治六鄉則名曰大夫非卑之也蓋掌鄉之政教禁令非以智帥人不可也故卿大夫之職所以異於他官者以此都家環於王畿所謂內諸侯也故每重其事焉朝大夫王官也天子之士視諸侯之卿禮彼其有治於國而置官以掌之爵雖士也豈嫌以大夫名之哉惟智足以帥人然後能應事故以告其君長也公孤不言職按周官三公論道經邦燮理隂陽三孤二公𢎞化寅亮天地弼于一人周官一書自冡宰以下無不登載而公孤以下獨缺書者何哉夫朝士掌外朝之法左九棘孤卿位焉右三槐三公位焉非不言公孤也特不言職耳府史胥徒自士以下皆有府史賈胥徒乃庶人之在官者皆祿於公上其數不可以一端備所以五官之長府六人史胥各十二人徒百有二十人與夫御史掌贊書其史則衆甸師掌耕耨王籍其徒則多庖人之賈有八職弊之賈有四外是則角人之類有府無史視祲之類有史無府醫師之類有徒無胥卿大夫之類無府史賈胥徒非特此也有奄有奚有士有庶子女酒女漿之不同蓋聖人設法豈有私意哉大抵其職或有或無其數或多或寡各稱其任斯可矣封建孟子曰公侯皆方百里伯七十里子男五十里王制曰公侯田方百里伯七十里子男五十里鄭子産曰天子之地一圻千里也列國一同百里也參之於書列爵惟五分土惟三其制固無異也然大司徒諸公之地封強方五百里侯之地封疆方四百里伯之地封強方三百里子之地封強方二百里男之地封疆方一百里既與諸經不同而分土惟三又與武成不合或曰大國不過百里王制指邦國之田而言之謂其實地也周禮所謂大國五百里者指其封疆之廣而言之也又王制謂山川林麓城地塗巷三分去一則僅餘其七耳又大司徒不易之田家百畝一易之田家二百畝再易之田家三百畝又有附庸之不能自通於天子者皆總於大國而言之又有間田之待未命者與夫加地進律者左傳魯無賦於司馬邾賦六百乘君之私也皆附庸晉鄭之間有隙地焉此間田也襄王與晉南陽之田此加地也周官之制公方五百里以千里之州僅可封四公耳安得以地給之乎蓋周之上公惟杞宋耳雖周召之勳勞猶侯爵也等而下之則子男附庸之國蓋多矣或者又曰諸侯有功則加地進律不朝則貶爵削邑蓋不能無損益如司徒所載謂其加封極乎此而不得過未必盡然也又曰孟子謂周公之封於魯地方百里地非不足而儉於百里也而明堂位乃以為魯封方七百里此蓋出於成王之特賜以昭周公之德其説非也尚書王制孟子公孫僑皆謂諸侯爵分五等地分三等公侯百里以是而差而周禮有五百里四百里之國先儒謂周公斥大土強廣為封建故後人疑周制為夸廣是不知據有附庸者言也天下有附庸諸侯殆不過百餘皆牧伯連帥統率諸小者也王制孟子説諸侯分地與大司徒不同先儒遂謂孟子之説是夏商之制至周公則拓大土宇增其國以封諸侯故分土為三等且以魯言之奄有龜蒙遂荒大東又曰顓臾為東蒙主且在邦域之中則以據周公之説矣書武成言列爵惟五分土惟三自是武王之制孟子亦明説是周之頒爵祿不知安得如此差别周官之説據有附庸者言之非必五等諸侯皆然也上下其制故分為五等土耳若曰凡諸侯受封者悉有附庸諸侯小而無者多蓋如是上之政令有所屬而不煩下之貢職有所附而不費以是言之凡公侯得附庸者必連帥也周家之制天下諸侯千八百國統之以二伯制之以九牧維之以連帥上以臨下尊以統卑使大國比小國小國事大國此周家之盛也春秋時自齊晉之外魯有邾鄶鄭有費滑宋有蕭滕凡陳鄭等盟會大國皆統屬諸小國者也漢之部刺史唐之按察使今之轉運副使皆其遺法耳侯國百里分為五郊一郊之地皆容一成一十里郊二十里牧三十里野四十里林五十里埛郊地四成牧地十二成野地二十成林地二十八成埛地三十六成總為一百成方十里者百為田凡九百萬畝是為萬井依治一成法為六千四百井五萬一千二百夫平歲收米二百五十六萬石民二百三十萬四千石食三十有五萬八千四百人公二十五萬六千石食三萬五千八百四十人五萬一千二百夫共出車百乘馬四百匹士卒七千五百人若以大國三軍士卒三萬七千五百人車五百乘計之不足以充其數橫渠以百里九萬井八萬夫定數計亦可言千乘之國漢書刑法志曰一封萬三百十六里提封十萬井兵車千乘諸侯之大者也六萬四千井為夫五十一萬二千士卒七萬五千若以大國三軍計之凡一更代而遍車亦如之成周分土惟三恐未有三百十六里王制一君三卿五大夫二十七上士君祿食二千八百八十人卿食二百八十八人三卿共食八百六十四人大夫食七十二人五大夫共食三百六十人上士食三十六人二十七上士共食九百七十二人君卿大夫士共食五千七十六人百里之國六千四百井公收米二十五萬六千石食三萬五千八百四十人除君卿大夫士祿餘三萬七百六十四人方七十里國鄙為方十里者四十有九四千九百井依治一成法為三千一百三十六井二萬五千八十八夫至歲收米一百三十七萬九百八十八石民百二十五萬四千四百石食一十七萬五千六百一十六人公一十二萬五千四百四十石食一萬七千五百六十一人有竒二萬五千八十八夫共出車四十九乘馬一百九十六匹士卒三千六百二十五人若以次國二軍二萬五千人計之不足以充其數一君三卿五大夫二十七上士君食二千一百六十人卿食二百十六人三卿共食六百四十八人大夫食七十二人五大夫共食三百六十人上士食三十六人二十七上士共食九百七十二人君卿大夫士共食四千一百四十人公米食一萬七千五百六十一人除君至士祿餘食一萬三千四百二十一人方五十里國為方十里者二十五二千五百井依治一成法為一千六百井一萬二千八百夫平歲收米六十四萬石民五十七萬石一萬二千八百夫共出車二十五乘馬百匹士卒一千八百七十五人朝會尚書王制謂六年五服一朝又六年各朝于方嶽而周禮有春朝夏宗秋覲冬遇之名且有疏數之節先儒謂春東方來之類是不知朝覲宗遇之名其事則一而名不同以春來曰朝之類其曰歲一見二歲一見亦大略以逺近分等衰耳朝覲宗遇之名以别一時爾其禮一也書曰六年五服一朝王制曰五年一朝以二者參之諸侯六年之內惟一朝耳來以春則曰朝來以夏則曰宗秋冬亦然初無四方之别猶漢律春曰朝夏曰請吳王春不朝使人為秋請之禮也地理曹去王城八百里乃在甸服鄭去河南密縣百七十里乃為男服曹順流極便鄭則有成臯虎牢之險故為男服只是以便差别不必若畫棊局然九州王制言九州之界方三千里而周禮則謂方七千里先儒以為周家輿地之實數是不知并四夷之大言之王制州方千里封方百里之國三十七十里之國六十五十里之國百二十餘方百里者七方五十里者十有四方十里者五凡二百十國名山大澤不以封其餘以為附庸間田天子之縣內方百里之國九七十里之國二十一五十里之國六十有三凡九十三國名山大澤不以朌其餘以祿士以為間田諸侯之有功者取於間田以祿之其有削地者歸之間田田制周制民受田率一夫百畝而大司徒有不易一易再易之地先儒以為六鄉七萬五千家通受十五萬夫是不知以地有肥磽之不同特為三等以均之非必中下之地與上地等也大司徒不易之地家百畝一易之地家二百畝再易之地家三百畝至遂人上地夫一㕓田百畝萊五十畝中地夫一㕓田百畝萊百畝下地夫一㕓田百畝萊二百畝何也何故加萊地於遂矣中地下地雖受之過多而每嵗所入與上地等魏文侯謂史起曰魏氏頒田以百畝今二百畝是田惡也則是頒田之制古以多寡均肥磽則無不平之患然周都鎬京古雍州域也厥土惟上上雖有肥磽之不同何至不等如是哉蓋周畿頒田通行於畿內及以是法令邦國欲受田必足以供公上而足私用其間茍有不同則非王者之政矣故廣為三等以均之是其所收皆無異乎百畝矣遂人上地多萊五十畝或謂司徒所頒六鄉遂人所頒六遂非也大司徒制曰乃云都鄙遂人乃云辨野蓋都鄙受田之制與六卿同互見其義也所以然者以邦國都鄙之民諸侯所治也國家用之寡故受田以常制鄉遂中天子六軍兵車所出也國家用之多故受田以異制夫一㕓羡卒即餘夫亦受田又上地有萊然獨上地增萊五十畝者蓋上農夫家九人八人七人中下則六人五人四人三人二人耳上農夫以數多故特優耳民之受田以年二十為限而夫家二人耳至是家登七人以上然後以萊五十畝給之其家子壯可以受田則又歸之官也溝洫小司徒九夫為井匠人亦九夫為井井間有溝至遂人則曰十夫為溝此猶兼溝塗而言之至於遂人百夫有洫而匠人十里為成成間有洫則九百夫之地遂人千夫有澮而匠人百里為同同間有澮則九千夫之地有不同若此何也説者乃以采地之制用井田鄉遂公邑用溝洫殆不然也周人井田之法通行於天下其溝洫之制安有內外之異哉意者遂人井田以夫言所以紀授田之實地也匠人以地言所以制溝洫塗路故其地不容不廣是以匠人之地倍於遂人也或曰成間有洫非一成包以一洫而已謂其間有洫也同間有澮非一同地包以一澮而已謂其間有澮也成與同地之廣者也洫與澮溝之大者也於成舉洫於同舉澮亦其大略云耳鄭氏以司徒言四丘為甸甸方八里司馬法通十為成成十里是成旁加甸地三十六井方十里積百井其中六十四井五百七十六夫出田稅其外三十六井三百二十四夫治溝洫遂人匠人溝洫之制不同鄭氏謂遂人自是井田之制匠人自是溝洫匠人畿內采地之制遂人鄉遂溝洫之制非也周制井田之法通行於天下安有內外之别哉遂人言十夫有溝以直度之也凡十夫之田田首必有一溝以瀉水以方度之則方一里之地所容者九十夫而其間廣四尺深四尺謂之溝則方一里之內凡四溝矣而旁各一溝中間兩溝遂人云百畝有洫是百夫之地相連屬而同以一溝瀉水以方度之則方十里之成所容者九百夫而其間廣八尺深八尺者謂之洫則方十里之內凡四洫矣兩旁各一洫中間兩洫至於澮亦然若川則非人力所能為也故匠人不為川而云兩山之間必有川焉遂人所云萬夫有川亦大約言之耳大槩甽水㵼於溝溝水㵼於洫洫水㵼於澮澮水㵼於川其縱橫因地勢之便利遂人匠人以大意言之遂人以長言之故曰以達于畿匠人以方言之故止一同耳山澤先王之制名山大澤不以封而周官有山師川師之官頒山林川澤于邦國者蓋非名山大澤也如晉之董澤鄭之原圃楚之荆山宋之逢澤皆頒之諸侯也古者山林之所産川澤之所出某物利於人某物害於人其板圖數要悉藏之王府諸侯不得而知也辨其物之利害而頒之則諸侯知取其利辟其害使致其珍異之物則不得欺其上矣貢賦令貢賦其食者半三之一四之一當從鄭氏謂地貢輕重之等也所以然者以諸侯之地方五百里監五百里內附庸其權甚重矣權既重則貢當重所以制之也諸男之地方百里監百里內附庸權甚輕矣權既輕則貢當輕所以恤之也制之則無驕佚之患恤之則無削弱之憂義當然也若以為大小多寡之别而鄭子産何以曰鄭伯男也而使之從公侯之貢懼不給也不從晉之賦調哉若畿內諸侯則輕重一等故載師曰甸稍縣都皆無過十二子産亦曰卑而貢重者甸服也四丘為甸指言其田之實數也通十為成總其地言之也言其地則山林川澤城郭宮室途巷盡在其中而為田者止三分之一故班固曰一同百里提封萬井除山林城池邑居園街路三千六百井定出賦六千四百井戎馬四百匹兵車百乘由是而上至一畿皆然田稅以井計之孟子八家皆私百畝同養是也孟子曰夏后氏五十而貢商人七十而助周人百畝而徹其實皆什一也滕文公問井田孟子曰請野九一而助國中什一使自賦又曰詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也魯哀公問於有若曰年飢用不足如之何有若對曰盍徹乎鄭元曰世人謂之錯而疑焉然以載師職及司馬法論之周制畿內用夏之貢法稅夫無公田以詩春秋論語孟子論之周制邦國用商助法制公田不稅夫貢者自治其所受田貢其稅穀助者借民之力以治公田又使收斂焉畿內用貢法者鄉遂及公邑之吏旦夕從民事為其促之以公使不得恤其私邦國用助法者諸侯專一國之政為其貪暴稅民無藝周之畿內稅有輕重諸侯謂之徹者通其卒以什一為正孟子云野九夫而稅一國中什一是邦國亦異內外之法耳鄭云載師曰近郊什一逺郊二十而三甸稍縣都皆無過什二惟漆林之征二十而五自常情觀之什一周之通法也而輕重若是何哉蓋聖人因其賦役之繁簡而相裁焉因其地利之厚薄而相權焉要無過什一而已鄭康成曰周法近城者給役多故稅優逺城者給役少故稅重役法均人凡均力政以歲上下豐年三日中年二日無年一日王制所謂用民不過三日也然此所役者非師旅行役師旅行役逺者二三年近者過時而反安得以歲三日為斷也或謂此不謂師旅行役則人主用民力荒矣殊不知師旅行役之事非歲所常有就使有之其調發自有定制東征之師三年而歸勞歸士采薇首尾一年何謂三日乎審如是則三年用一日茍有門庭之寇如東郊之患涇陽之患一日惡可集事則是皆書生之説也王制云五十不從力征六十不與戎服然力征與戎服異矣説者謂古者民年三十而事六十而免名在官者三十年約其在官之齒而以歲三日為斷用之九十日而免則終身不復役其説以之從力征則善謂戎事則未可也軍事不得以時日為斷雖愚者亦知其説矣鄉大夫云國中二十而事野十五而事夫年十五而使從力役非人情矣當以二十為斷六十而免在官者四十年王畿司馬法六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為通通十為成成十為終終十為同同十為封封十為圻王畿千里分為五郊一郊之地各容一同一百里郊二百里甸三百里稍四百里縣五百里都郊地一同甸地十二同稍地二十同縣地二十八同都地三十六同總百同鄉萬二千五百家六鄉七萬五千家餘者為宅田等六遂亦如此王圻五百十二萬夫共出車萬乘馬四萬匹士卒七十五萬人凡七夫出一人天子六軍為士卒七萬五千人七分之一邦畿千里周公詳此為四方法式自朝及市至鄉遂外皆設職分掌六鄉中五家下士一人六遂五家下士二人稍縣都如遂天下莫非王土不憂無祿養士周公亦不與士爭祿商君富國變古以五千户置令嗇夫一人有秩一人不滿五千户置長去嗇夫省比長里宰下士非周公治圻意王城之外皆鄉鄉之外皆遂六鄉占地無幾自六遂之外分公卿王侯子弟大夫采地其餘凡領於天子之地者謂之公田皆以遂法理之此謂達於王畿者也先漢時馬融賈逵説鄉遂近郊五十里為鄉逺郊百里為遂鄭氏説郊之內百里為鄉郊之外百里為遂以占地言之皆未可以為信然九服五服職方氏掌天下之圖辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民周知其利害乃辨九州之國使同其利方千里曰王畿其外方五百里曰侯服至藩服周制九服而周官惟曰六服羣辟罔不承德又曰六年五服一朝者蓋衛侯之外聖人雖制之服而不必其來故武成敘諸侯之助祭洛誥稱諸侯之和會康王之誥陳諸侯之聽命止言五服侯國合方氏掌達天下之道路則封內諸侯津梁相逼聘好往來有無相補患難相救無有壅蔽之患矣然先王恐其私相連衡以叛上及姦人往來而莫之禁於是為之溝池樹渠之固以防之為之節制以謹之所謂守邦國者用玉節守都鄙者用角節凡邦國之使節山國用虎節土國用人節澤國用龍節門關用符節道路用旌節凡通達于天下者必有節無節者不達所以禁絶姦人之往來者也每歲相問每世相朝告終易代有送葬之禮有慶賀之禮凶荒災患有吊恤之禮有致禬之禮此諸侯之邦交也非是而私相連結附下罔上恃強并小則大司馬有九伐之法方伯連帥奉辝伐罪所以防吞并也春秋以來姦人不得志於宗國則如意而往無所疑忌雖殺君之賊往往藏匿以為巳用則關津呵問之法不行矣喜則朝聘無虛月怒則戰伐連歲年則方伯連帥之職不修大司馬九伐之法不舉矣若是而曰通天下之道路是啓姦詐長背叛耳蠻夷戎狄蠻閩夷貉之隸或征伐之所得或諸侯之所獻傳所謂蠻夷戎狄不式王命淫湎毁常王命伐之則有獻捷王親受而勞之則所俘囚以為隸職方氏言四夷八蠻七閩九貉六戎五狄之人民而隸不及戎狄者豈其鷙捍之不可以畜而周公方且膺之以絶其患於未萌固不在所役屬邪昔惠公歸自秦誘陸渾之戎遷于伊川終逼諸姬侵掠畿甸以為中國之害詹桓伯以謂先王居之四裔以禦魑魅正所以處夷狄之𨽻也周天下方千里者九大槩與四夷八蠻七閩九貉五戎六狄并言之其實諸侯封守不如是之廣以王制考之西不盡流沙南不盡衡山東不盡東海北不盡常山凡四海之內斷長補短方三千里是天子壤地之實也其間亦有戎狄錯居其間如魯徐戎之類是也又荆楚之地在江漢之間自楚以南悉為百越之地而衡山在楚之極南安在天子之封內耶舉一隅則四方可知矣錢布國凶札則市無征而作布所以然者以市既無征則物聚多物多則錢重錢重則物反輕非所以便商賈也作布則物雖多而錢不重商賈獲其利則來者多市廛征賦孟子曰市廛而不征周官則有市之征布園廛二十而一又曰關市譏而不征周官則有關市之征又曰澤梁無禁周官則有山林川澤虞衡之官先儒多謂孟子之説是文王治岐之初姑從簡易以便民至周官始增其制其説果然乎不然乎質布犯質劑之泉罰布犯市令之泉二者一等也廛布市廛邸舍之稅也先王之制既稅其物不征其廛既征其廛則不征其稅所謂市廛而不征法而不廛也若曰既征其廛又稅其物則周家之政荒矣兵制小司徒乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人夏官大司馬又云凡令賦以地與民制之上地食者三之二其民可用者家三人中地食者半其民可用者二家五人下地食者三之一其民可用者家二人蓋大約民數以中家計之八家有四十八人可任者二十人其餘蓋老弱不足任者然此一事爾小司徒所言者鄉遂之制大司馬所言者邦國都鄙之制也鄉遂天子六軍與兵車所出故起役徒無過家一人邦國都鄙之兵其調發從司馬之法小司徒通藉民數一井八家可任者二十人矣至司馬法曰四井為邑四邑為丘馬一匹牛三頭是曰匹馬丘牛四丘為甸六十四井出長轂一乘馬四匹牛十二頭甲士三人步卒七十二人戈楯具謂之乘馬據司徒一井八家可任者二十人今甸六十四井為五百十有二家其可任使者通一千二百八十人而籍於司馬者才七十有五人蓋百七十家有餘只賦兵二十五人耳又司馬法曰畝百為夫夫三為屋屋三為井井十為通通為匹馬三十家士一人徒二人通十為成成百井三百家革車一乘士十人徒二十人成十為終終千井三千家革車十乘士百人徒二百人十終為同同方百里萬井三萬家革車百乘士千人徒二千人據前項四丘為甸六十四井其籍七十五人今十通為成旁加甸地三十六井并百井八百家是增二百八十八家其兵亦當添一甲有竒乃只調三十人蓋四分當兵之數而起發其一分之強故八百家止言三百家畨休者嘗五百家積數百井八百家約為丁四千八百人堪任使者二千人二十分二千之一有竒為四甲百人有竒又四分百人之一有竒止發三十耳百井千里皆然可見周家優民之至車馬亦然自備一乘乘四馬丘賦一馬積四丘為甸故凡四丘方賦一乘故前從一十井為一通後加百井為一成成出一車亦無增減田制以八家起算兵制以十人為什起算亦各從其宜非損益也兵制促零就整甸言徒七十二人甲士三人成言士十人徒二十人蓋調發時差擇宜為士者居多耳傳言少康田一成衆一旅八百家調五百人蓋增常數司馬雖為掌兵之官至於軍旅大事五官之長咸有事焉冢宰征師于諸侯大司徒以旗致萬民而治其政令大宗伯以軍禮同邦國大司寇涖戮于社胡氏康侯曰昔成王將崩命大臣相康王方是時親掌兵者太公望之子伋也宰臣奭命仲桓南宮毛取二干戈虎賁百人于伋以逆嗣子伋雖掌兵非有宰臣之命不敢發也召公雖制命非二諸侯將命以往伋亦不承也兵權散主不遍屬一人可見矣此周公之制見諸行事者也周制兵出於農自八家共井至五百十二家之甸出車一乘馬四匹備七十二人則宜以稍人縣師等官領之而乃屬於教官其歲時校登其夫家簡其兵器治其車輦則宜以鄉遂之官領之司馬而乃屬之教官何也三代之時兵滿天下而無將驕卒惰之憂蓋兵藏於農而民弗謂兵將藏於學士大夫而官弗謂將以搜苗獮狩而易其習戰之名以比閭族黨而易其行陳之名國容之制軍容不亂焉養勇以禮積威以義是以不見其強而無敵於天下王畿千里近郊五十里逺郊百里郊為鄉六鄉百里通為十同百里者十提封十萬井九十萬夫之地除山林城郭宮室塗巷三分去一除三萬六千井實計六萬四千井五十七萬六千夫之地又除公田九分之一實計五十一萬二千夫又以一易再易通之三分除其一實計三十四萬一千二百六十六夫大率三百五十家賦車一乘四丘為乘故曰丘乘積六鄉為千乘而餘率七家賦一兵積六鄉為七萬五千人此六軍之制也二百里曰州州為六遂遂如鄉之法異其名示其變爾遂之軍法如六鄉二百里曰野野為稍家邑之田大夫采地四百里曰縣縣為小都小都之田鄉采地五百里曰強強為大都大都之田公家地都通曰鄙為寰內諸侯治之皆如遂法鄭氏云六遂之地自逺以通于畿中有公邑家邑大都小都畿方千里為千里者十如向之除為三百五十萬四千夫賦軍萬乘卒七十五萬人為六軍者十此通畿之師也牧野之師紂兵七十萬通畿皆發隨處搜狩自成什五案禮惟為社事單出里惟田竭作以此見搜狩比屋作民大司馬遞而征之案大司馬教兵名號有縣鄙家鄉官野之異旗物有諸侯軍吏師都鄉遂郊野之别以此見其遞征以赴搜狩十年而役一遍凡三家可任者十一人所謂上地家者三人中地二家五人下地二人藉其大數三家為十一人司馬法自夫三為屋起數以此則終身無過一再給公上事蓋先王忠厚之至更勞均佚不欲窮民之力也遞征之法非遍摘也鄭氏凡用役不必一時皆遍以人數調之使勞佚遞焉蓋鄉遂以次全軍充調不離部曲案傳記周有南國之師晉有九州之戎宋有空澤之甲器全軍更役在軍之士無非鄉遂守望相助猶之田里家有羡卒隸於師長如閭里有故不失守備案傳少康一旅出於一成魯頌僖公千乘出於百里與公劉三單左氏曰社之法皆比屋通數非調兵之制也魯三郊三遂可備六軍而止三軍亦遞征也古者五侯九伯專征而諸侯皆共四方之事畿兵不出也案詩文王出車我出我車于彼牧矣九牧之地自天子所謂我來矣幽王大東漸漸之石為東勞西佚而有不遑朝矣之嗟更以周官司馬法參考王有四方之事則冢宰徴師于諸侯曰某國為不道征之以某年某月師至于某國小宰掌其戒具虎賁氏奉書以牙璋發之詩常武王命卿士太師皇父整我六師冢宰也王謂尹氏命程伯休父左右陳行戒我師旅率彼淮浦小宰戒司馬出征也程伯時為司馬則畿兵不遽征也在易未濟之象髙宗伐鬼方三年有賞于大國則雖天子親征亦用諸侯之師詩周王于邁六師及之則知所在皆成六軍劉文公平丘之會對晉人曰天子之老請帥王賦元戎十乘以先啓行平王東遷以王人戍申甫揚之水始刺之然春秋之初從王伐鄭猶有陳蔡衛人二百四十二年間王人會伐屢矣左氏未嘗見師之出惟敗績于茅戎王師自出春秋深譏焉至戰國時京師益弱強大諸侯往往猶畏之西周武公告楚亦曰見楚世家一周當二十晉不百韓不足以伐周説辭雖或過實而事情亦略可據赧王伐秦尚從天下鋭師以知畿兵不用其力常完也豳詩周公東征有西土蓋以師從春秋王人子突救衛不書師左氏記少康有田一成有衆一旅旅五百人也一成之田百井夏后氏治地三分去二而治其一則可耕者凡三十三井井九百畝除廬舍百畝而十六家耕之孟子以夏后氏五十而貢則頒田以五十畝為制也以此計之則三十三井中凡耕者五百二十人家家賦一人舉其全數而曰一旅也司馬法甸賦車一乘甲士三人步卒七十二人又言通十為成成百井三百家革車一乘士十人徒二十人何也成百井去城郭宮室塗巷三分之一止餘六十四井即一甸也於六十四井之中五百十有二之內每七家而賦一人故甲士步卒總七十五人也至於調發從軍則十七家而遣一人凡三十人故曰成百井士十人徒二十人然而言三百家者蓋一人行而十家合資之則行者三十人而三百家被其征調也故五百十二家只言三百家餘二百十二家又留以須後也或曰周制每一車則七十五人今甸出長轂一乘而止發三十人無乃車多而人少乎曰古者軍行凡革車一乘七十五人之外又有重車一乘載衣裝之屬其士卒則有固守五人衣裝五人廏養五人樵汲五人炊子家五人凡二十五人併正車為百人又備副車以為補缺是車不得不多也以一同之地論之其車一百乘其士三千人每革車一乘通百人則三千人凡用車六十餘乘四十乘以為遊缺之車也兵籍甚多而行者益少所以壯國勢休民力也後世王制既壞遂以甸出七十五人者盡調發之晉之成縣縣方百里而出革車百乘孫子興師百萬日費千金怠於道路不得操事者至七十萬家是一人行而七家奉之此非王制也或人曰制軍旅具車甲願得言焉曰按夏官司馬曰凡制軍萬有二千五百人為軍天子六軍軍將皆命卿二千五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長康成謂軍師旅卒兩伍皆衆名也蓋伍一比兩一閭卒一旅旅一黨師一州軍一鄉家所出一人此則六鄉為六軍七萬五千人也又按遂人職曰以歲時稽其人民而授之田野簡其兵器而教之稼穡康成謂遂之軍法追胥徒役如六鄉若是則六遂亦為六軍七萬五千人也但以五家迭而用之則其興發常六軍耳故止言六軍也此鄉遂制軍之法也又按司馬法通三十家出匹馬士一人徒二人成三百家出革車一乘士十人徒二十人終三千家出革車十乘士百人徒二百人周三萬家出革車百乘士千人徒二千人此雖井人顧未與周制同今考春秋成元年三月作丘甲杜氏注以謂丘出戎馬一匹牛三頭甸出長轂一乘戎馬四匹牛十二頭甲士三人步卒七十二人此甸所賦今魯使丘出之譏重斂故書左傳哀十一年季孫欲以田賦使冉求訪諸仲尼仲尼不對而私於冉有曰君子之行也度於禮施取其厚事舉其中斂從其薄如是則以丘亦足矣杜氏亦謂丘出戎馬一匹牛三頭是賦之常法若不度於禮則貪冒無厭則雖以田賦將又不足季孫若欲行而法則周公之典在若欲茍而行之又何訪焉以是而觀則丘賦實周公之典舉丘則甸明矣如此一同百甸甸旁加為成則百成也亦百乘也百乘則戎馬四百匹牛一千二百頭甲士三百人步卒七千二百人乘數雖同而士卒之制多少異矣今亦本周禮為定蓋甸以內六鄉六遂則為十二軍迭用其六軍稍以外八十四同則為八千四百乘亦逺近異制焉以一切而言則畿內千里合當百同故古謂天子萬乘也大凡康成謂成之甸同之四都出田稅其旁加者甸旁以治成之洫都旁以治同之澮謂溝洫始為之也則用力多後治之也則用力寡矣曷足以免其田稅乎今觀車賦止言甸不言成豈非旁加者不與車賦但主為治洫乎總百成之旁加者既各治其洫又共治同之澮以役折役於事為宜且其治洫澮一歲中豈數數然哉是賦稅軍旅車甲之議盡矣古者軍國之容不相入四井為邑四邑為丘四丘為甸四甸為縣四縣為都是以井法凡以四起數言之也此國容也至於軍制則以五起數加五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍必以五起數者以軍法必用五也此軍容也軍國之容不相入者蓋使民平居井牧其田里則一旦調發之際而又易其數異其名而民不以為惑也不特此耳凡鄉遂以十夫為溝百夫為洫千夫為澮萬夫為川至於司馬調兵之法則以井十為通通十為成成十為終終十為同其名各不同至晉作州兵則是以鄉遂之法調兵也古者調兵三十家十三人徒二人三百家革車一乘士十人徒二十人三千家革車十乘士百人徒三百人三萬家革車百乘士千人徒三千人若以司馬法推之一州二千五百家所調當幾人晉之州兵則盡調發也魯成公作丘甲曹操按户籍得三萬家蘇秦説齊宣臨淄之中七萬户而卒已二十萬皆失古人調發之意兵將聚民而為兵則兵虧聚兵而屬之將則將虧秦漢而下不勝其患矣而獨無聞於三代之上何歟嘗觀於書干戈掌於齊侯呂伋之手必也太保出命仲元南宮毛將命然後得取焉不如此則呂伋不得以專今以周官考之呂伋蓋虎賁耳虎賁才八百人而隄防若是鄉使後世之御將盡若此將何從而驕雖然是中朝之將耳雖邊將亦然常武一詩宣王定淮徐其一章曰王命卿士南仲太祖太師皇父整我六師其二章曰王謂尹氏程伯休父夫尹氏太宰也程氏休父大司馬也皇父出師二卿何與焉不得二卿則皇父不得以擅命於閫外鄉使後世之御邊將而盡若此則又何從而驕雖然是待將帥也皆學士大夫也惟士卒亦然六鄉軍政也六遂亦軍政也王宮次舍之衛士與國子之餘倅抑又軍政也宜屬於司馬今乃不然鄉遂屬之司徒衛士屬之冢宰而國子餘倅雖屬於司馬之諸子而弗征於司馬軍國之容繩繩不相亂誠以民之不可名以為兵而兵之不可專隸將也向使後之卿士者而常若此士卒其能驕乎由三代而論則後世兵有專將有定兵其不勝為患非不幸矣秦漢而下其猶庶幾於古者莫如西都唐杜佑作通典嘗謂漢氏重兵悉聚於京師此非確論南北軍僅盈數萬耳兵車稍人掌丘乘之法四邑為丘十六井百二十八家爾共具車一乘何也此言備車乘之數也司馬法曰四丘為甸甸出革車一乘甲士三人步卒七十二人而稍人共車一乘何也蓋丘備一乘輿賦之數也甸出一乘調發之數也備之多所以存武備調之少所以優民力也縣師云若將有軍旅會同田役之戒則受法于司徒以作其衆庶及馬牛車輦會其車人之卒伍則是調發之實則受於司馬而稍人亦云若有會同師旅行役之事則以縣師之法作其同徒輂輦帥而至治其政令以聽於司馬亦謂調發之實數也兵器甸出革車一乘凡兵甲戈楯旗物鼓鐸悉備焉鄉遂之官簡其兵器是也調發則各以其具行而官府不與知也而司甲司兵司戈盾司弓矢言授兵器非授器於民也授之卿大夫從軍旅會同者也故司兵曰及其授兵亦如之是卿大夫士畢事則歸之若民兵則自藏之民間耳教閲四時之田春辨鼓鐸鐲鐃之用夏辨名號之用秋辨旗物之用冬皆辨之三時各辨其一必不辨其二矣何以令軍乎非止辨其一也互言之耳其實皆辨也辨名號有縣鄙家鄉官野之異辨旗物有諸侯軍吏師都鄉遂郊野之異則畿內皆遞教夫四表之中相去二百五十步雖容六軍不足况畿內乎亦遞閲而已矣祭祀以肆獻祼享先王鄭氏以為禘以饋食享先王鄭氏以為祫非也天子四時之祭曰春祠夏禴秋嘗冬蒸而三年大祭曰禘言王者禘其祖之所自出是也諸侯亦四時有祭而三年大祭曰祫合食於祖廟也大夫亦四時有祭而三年之祭曰殷春秋傳殷以少牢是也是肆祼獻饋食之謂乎此言祭之禮有四等也宗廟祭有祼鬯禮既祼而獻有薦腥禮既薦而肆有薦熟禮既肆而饋有饋食禮自禘及四時祭皆然也小宗伯兆五帝於四郊五行之精氣也五方五帝鄭氏惑六經緯有青帝靈威仰赤帝赤熛怒黃帝含樞紐白帝白招拒黑帝叶光紀之名謂之五天又以昊天上帝為天皇大帝北辰耀魄寶由是有六天之説後世莫能廢至唐許敬宗始立論非之夫人臣如五行之官木正勾芒之類重黎之官尚從祀則以五德之帝配食於五行精氣或者是歟諸侯尊故大宗伯儐卿大夫士卑故小宗伯儐誥命內史掌書王命猶今之內制翰林外史掌書外令猶今之外制舍人漢制誥之事不詳見武帝時方朔枚臯視草而已景帝紀凡諡誄册盡出大鴻臚章奏太僕掌受臣民奏報漢之公車司馬今之登聞檢院也自諸侯羣臣萬民各有復逆勢有尊卑故大僕小臣御僕各以官尊卑受之以達于宰夫宰夫亦掌臣民復逆宰夫告冢宰與王參考行之所以通下情來諌諍也史籍古者諸侯無私史周禮天子外史掌四方之事達四方之志諸侯亦各有國史者書國中之事以達于天子也天子又時巡以達之有二伯以詢之有內史以董之故列國之史多藏之周室孔子亦觀周室論史記舊聞興於魯而次春秋孟子曰晉之乘楚之檮杌魯之春秋今考之晉史乃自殤叔時始有之楚自武王以上有世次而無年月魯之春秋乃自隱公始則知諸侯之私史亦東周以來有之非西周之制也射禮射有三曰大射賔射燕射大射者祭而擇士於射宮也司裘曰王大射則供虎侯熊侯豹侯設其鵠諸侯則供熊侯豹侯大夫則供麋侯皆設其鵠射人云王大射則以貍步張三侯梓人云張皮侯而棲鵠則春以功是也賔射者諸侯來朝王與之射以燕樂之視瞭云賔射則奏鐘鼓梓人云張五采之侯則逺國屬是也燕射者王與羣臣燕飲而射太僕王燕飲則相其禮王射則贊弓矢梓人張獸侯則王以息燕是也以貍步張三侯何也鄭氏以王與諸侯大夫各射其一非也王之大射二三侯皆九節樂以騶虞諸侯與於射者射二侯皆七節卿大夫與於射者射一侯皆五節不言士略也士射犴侯亦五節刑罰為政至於用刑聖人所不得已也然姦宄並作邪慝恣行非刑無以格其非心使之遷善逺罪是以六官之中掌刑者居一雖然臯陶之為士也明于五刑以弼五教刑期于無刑至于察察焉以治獄聽訟為能事是王者之政所不尚也故大司寇之官以兩造禁民訟以兩劑禁民獄以嘉石平罷民以肺石達窮民其心惟恐民之陷乎罪也故有布憲之官禁殺戮禁暴氏之官萍氏之官以禁其邪心察其姦偽憲其刑禁昭其號令使民知刑戮之可畏罪戾之可恥相率而為善是聖人之所欲也及其犯于罰而猶欲免之則吾之設官分職豈其本心也哉取士先王取士之制有三塗有諸侯三年一貢士之法侯國之士有卿大夫論秀之法王畿之士有大司樂教國子之法後世不可行周制用周禮者王莽敗於前荆公敗於後非周禮不可行也成周之時其法度典章自承流宣化執法奉公上自朝廷下至閭里外至羣國其相處如閨門之內故雖五人之長亦皆賢士是以法度雖嚴而甚寬雖詳而甚簡天下之大百官有司之衆而行之如掌握之上蓋其精粗本末兼舉之耳王莽荆公之時如何而欲舉前古已墜之典行之旦暮之間乎程明道曰有關雎麟趾之意然後可以行周官之法度此知本之説也羣書考索卷四
