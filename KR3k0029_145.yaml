body:
  text: 羣書考索續集卷十四宋章如愚編諸史門史記前漢書與善隱而彰懲惡直而寬遷之𫝊亷頗也議救閼與之失不載焉見之趙奢𫝊𫝊酈食其也謀撓楚權之謬不載焉見之留侯𫝊固之𫝊周勃也汗出洽背之耻不載焉見之王陵𫝊𫝊董仲舒也議和親之疏不載焉見之胸奴𫝊夫頗食其勃仲舒皆功十而過一者也茍列一以疵十後之庸人必曰知如亷頗辨如酈食其忠如周勃賢如董仲舒而十功不能贖一過則將苦其難而怠矣是故本傳晦之而他𫝊發之則其與善也不亦隱而彰乎遷論蘇秦稱其知過人不使獨蒙惡聲論北宫伯子多其愛人長者固贊張湯與其推賢揚善贊酷吏人有所褒不獨暴其惡夫秦伯子湯酷吏皆過十而功一者也茍舉十以廢一後之凶人必曰蘇秦北宫伯子張湯酷吏雖有善不録矣吾復何望哉是窒其自新之路而堅其肆惡之志者也故於𫝊詳之於論於贊復明之則其懲惡也不亦直而寬乎老泉史論固依遷之藩籬女后臨朝異事也遷必紀匹夫倡亂異事也遷必取刺客游俠譎詐之異行也遷必𫝊遷紀吕而固亦紀吕固好同乎遷也遷取陳而固亦取陳固好同乎遷也損十表而為八增八書而志十因天官為天文以封禪為郊祀因河渠為溝洫不能自立一家依依乎遷之藩籬下此固所以不能無失也同上遷固皆有失自古史才為難左氏而下得司馬遷司馬遷而下得班固至於范曄陳夀之徒又為班馬之亞其才如鱗之差而不齊也嘗歎司馬遷如彼其才如彼其所瞻而不能深入聖人之道以為已病先黃老後六經髙游俠重貨殖則班固既言之矣又世家孔子而不為𫝊使孔子與陳項爭列欲尊大聖人而反小之其所以稱夫子者識會稽之骨辨羶羊之性道楛矢之異測桓僖之灾斯以為聖而已矣一何其鄙陋也及讀班氏史則與遷同其弊惜乎有史才而皆不能全也固能言遷之失而不知已之妄豈非有離婁之明而不見目睫者耶遷之自序已嘗分九流矣及固為藝文志迹其餘說遂以儒者與道法隂陽名墨縱橫雜家農家分峙而齊驅且其說曰王道既微時君世主好尚殊方九家之術蜂出並作各引一端崇其所善以此馳說取合諸侯嗚呼固以為儒者取合於世而已乎宜固之附竇憲而死於非義也汝水釣翁文史記當呼漢祖為漢王漢書不當加以漢字著魯史者不呼其上曰周王如史記者事總古今勢無主客故言及漢祖多為漢王斯亦未為纍也班氏既分裂史記定名漢書至於述髙祖為公王之時皆不除沛漢之字凡有異方降欵者以歸漢為文肇自班書首為此失迄于仲豫仍踵前非積習相𫝊曽無先覺者矣史通班史載陳涉事不當用遷史文皇甫謐載嚴君平事不當用班史語史記陳涉世家稱其子孫至今血食漢書復有涉𫝊乃具載遷文按遷之言今孝武之世也固之言今當孝明世也事出百年語同一理即如是豈陳氏苗裔祚流東京者乎斯必不然漢書又云嚴君平既卒蜀人至今稱之皇甫謐全録斯語載於髙士𫝊夫孟堅士安年代垂隔至今之說豈可同云夫班之習馬其非既如彼謐之承固其失又如此迷而不悟奚其是乎同上史記不當以無恤為賢漢書不當以韓信為賢史記世家有云趙鞅諸子無恤最賢夫賢者當以仁恕為先禮遜居本至如詐而安忍貪而無親鯨鯢是儔犬豕不若焉得謂之賢哉又漢書云蕭何知韓信賢按賢者處世夷險若一不隕穫於貧賤不充詘於富貴如淮隂初在側微墮業無行復居榮貴滿盈速禍美其善將呼為才略則可矣必以賢為目不其謬乎並史通言簡而意盡洎班馬二史雖多謬五經必求其所長亦時值斯語至若髙祖亡蕭何如失左右手漢兵敗績睢水為之不流董生乘馬三年不知牝牡翟公之門可張雀羅則其例也同上遷未為全得固亦未可非逮史漢繼作踵武相承王充著書既甲班而乙馬張輔持論又劣固而優遷然此二書雖互有修短遞聞得失而大抵同風可為連類張晏云遷沒後亡龜䇿日者𫝊禇先生補其所缺言詞鄙陋非遷本意按遷所撰五帝本紀七十列傳稱虞舜見厄遂匿空而出宣尼既殂門人推奉有若其言為鄙又甚於兹安得獨罪禇生而全宗馬氏也劉軌思商𣙜漢史雅重班才惟譏其本紀不列少帝而輒編髙后按宏非劉氏而竊養漢宫時天下無主吕宗稱制故僣其嵗月寄以編年而野雞行事自具外戚譬夫成為孺子史刋攝政之年厲亡流彘厯紀共和之日而周召二公各世家有𫝊班氏式遵曩例殊合事宜豈謂雖濬發於巧心反受嗤於拙目也史通遷固載事之失按劉氏初興書惟陸賈而已子長述楚漢之事専及此書譬夫行不由徑出不由户未之聞也然觀遷之所載往往與舊不同如酈生之初謁沛公髙祖之長歌鴻鵠非惟文句有别遂乃事理皆殊又韓王名信都而輒去都留信用使稱其名姓令與淮隂不别班氏一准太史曽無弛張靜言思之深所未了同上太史公諸表為是班固古今人表為非觀太史公之創表也於帝王則叙其子孫於公侯則紀其年月列行縈紆以相屬編字戢習而相排雖燕越萬里而於徑寸之內犬牙可接雖昭穆九代而於方寸之中鴈行有序使讀者閲文便覩舉目可詳此其所以為快也如班氏之古今人表者唯以品藻賢愚激揚善惡為務爾既非國家遞襲祿位相承而亦復界重行狹書細字比於它表殆非其類歟蓋人列古今本殊表限必吝而不去則宜以志名篇始自上上終于下下並當明為標榜顯列科條以種類為篇章持優劣為次第史通遷固易地而處本無優劣或問張輔著班馬優劣論云遷叙三千年事五十萬言固叙百年事八十萬言是固不如遷也斯言為是乎曰不然按太史公書上起黃帝下盡宗周年代雖存事跡殊略至戰國已下始有可觀然遷雖叙三千年事其間詳備者惟漢興七十餘載而已其省也如彼其煩也則如此求諸折中未見其宜班書全取史記仍去其日者倉公等𫝊以為其事煩蕪不足編次故也若使遷固易地而處撰成其書將恐多言費辭有踰班氏安得以此而定其優劣耶同上史記前後漢書二史載虛文為非馬卿之子虛上林揚雄之甘泉羽獵班固西都馬融廣成喻過其體詞沒其義繁華而失實流宕而忘返無禆勸奬有長奸詐而前後史漢皆書列傳不其謬乎史通互相譏誚固譏遷失而固亦未為得曄譏固失而曄益甚至夀復爾史之才誠難矣老泉史論前漢書不當蹈襲遷論以足其書不當取遷雄之自序固贊漢自創業至麟趾之間襲蹈遷論以足其書者過半且褒賢貶不肖誠己意也盡己意而已今又剽他人之言以足之彼既言矣申言之何益及其𫝊遷雄皆取其自叙屑屑然曲記其世系固於它𫝊豈若是之備哉彼遷雄自序可也已因之非也此固之失也同上表書王侯號諡姓名皆有深意固之表八而王侯六書其人也必曰某土某王若侯某或功臣外姓則加其姓於首目之曰號諡姓名此異姓列侯之例也諸侯王其目止號諡豈以其尊故不名之耶不名之而實名之豈以不名則不著耶此同姓諸侯王之例也王子侯其目為二上則曰號諡名號諡之而復名之殺一等矣此同姓列侯之例也及其下則曰號諡姓名夫以同姓列侯而加之異姓之例何哉察其故蓋元始之間王莾僞褒宗室而封之者也非天子親親而封之者也宗室天子不能封而使王莾封之故從異姓例亦示天子不能有其同姓也將使後之人君觀之則曰權之歸於臣雖同姓不能有名器誠不可以假人矣同上固善採掇漢事充于簡册漢之文帝號為極盛非有髙識誰能紀托唐柳宗元謂漢風雅敷施天下自天子至于公卿大夫士庶人咸通焉孟堅拔其尤者充于簡䇿則二百三十年間列辟之逹道名臣之大範賢能之志業黔黎之風美焉陳季雅博議孺子不當書於莽𫝊况神璽在握火德猶存而居攝建年不編平紀之末五子主祭咸書莾𫝊之中遂令漢餘數歲湮沒無覩求之正朔不亦厚誣同上不當以嚴延年比子貢冉有又云嚴延年精悍敏捷雖子貢冉有通於政事不能擬也夫以編名酷吏列號屠伯而比孔門逹者豈其倫哉史通漢書倣史記後人倣漢書漢書家者其先出於班固司馬遷撰史記終於今上自太初已下闕而不録班彪因之演成後記以續前篇至子固乃斷自髙祖盡于王莽為十二紀十志八表七十列傳勒成一史自為漢書昔虞夏之典商周之誥孔氏所撰皆謂之書夫以書為名亦稽古之偉稱尋其創造皆准子長但不為世家改書曰志而已自東漢已後作者相仍皆襲其名號無所變革惟東觀曰記三國曰志然稱謂雖别而體制皆同史通漢書包舉一代尚書記周事終秦繆春秋述魯文止哀公紀年不逮於魏亡史記唯論於漢始惟漢書者究西都之首末窮劉氏之廢興包舉一代撰成一家言皆精練事甚該密同上古今人表品藻失次按班書古今人表仰包億載旁貫百家分之以三科定之以九等其言甚髙其義甚愜及至篇中所列奚不類於其叙哉若孔門逹者顔稱殆庶至於它子難為等衰今乃先伯牛而後曽參進仲弓而退冉有伯牛仲弓第一曽子冉有第三求諸折中厥理無聞又楚王過鄧三甥請殺之鄧侯不許卒亡鄧國今之鄧侯入下愚之上第七夫寧人負我為善獲戾特此效尤將何勸善如謂小不忍亂大謀失於用權故加其罪是則三甥見幾而作决在未萌自可髙立標格置諸雲漢何得止與鄧侯鄰伍列在中庸下流三甥在第六等而已哉又其叙晉文之臣佐也舟之僑為上陽處父次士㑹為下之僑三等處父四等士會五等其述燕丹之賔客也髙漸離居首荆軻亞之秦武陽居末漸離五等荆軻六等武陽七等斯並是非紊亂善惡紛拏或䇿駑駘而捨騏驥以兹為監欲誰欺乎同上述漢書本末史記所書年止漢武太初已後闕而不録其後歆向揚雄等相次撰述迄於哀平猶名史記繼述所作至建武中司徒掾班彪以為其言鄙俗似不足以踵前史又雄歆僞褒新室誤後惑衆不當垂之後代者也於是採其舊事傍貫異聞作後傳六十五篇其子固以父所撰未盡一家乃起元髙皇終乎王莾十有二世二百三十年綜其行事上下通洽為漢書紀表志𫝊百篇其事未畢㑹有上書云固私改作史記者有詔收繫悉録家書封上固弟超詣闕自陳明帝引見言固續父所作不敢改易舊書帝意乃解受詔卒業經二十餘載至章帝建初中乃成固後坐竇氏事卒於洛陽獄書頗散亂其妹曹大家博學能文奉詔校叙又選馬融等十人從大家授讀其八表及天文志等猶未克成多是待詔東觀馬續所作而古今人表猶不類本書獻帝以固書文煩難省乃詔侍中荀悅依左氏𫝊體刪為漢紀三十篇其言簡要與本傳並行同上相如𫝊乃自叙班固不知長卿為自叙𫝊具在其集中子長因録斯篇即為列傳班氏仍舊曽無改作尋固於馬揚𫝊末皆云遷雄之自叙如此至此篇下獨無此言蓋止慿太史之書未見文園之集故使言無畫一其例不純史通觀班氏公孫宏𫝊贊直言漢之得人盛於武宣二代至於平津善惡寂蔑無覩持論如是其義靡聞必務其美辭愛而不棄則宜微有改易列於百官公卿表後庶尋文究理頗相附㑹以兹編録不猶愈乎史通左傳荀悅漢紀左傳非略吳楚漢紀非簡胸奴孫盛稱左氏春秋書吳楚則略荀悅漢紀述胸奴則簡蓋所以賤夷狄而貴諸夏也按春秋之時諸國錯峙關梁不通史官所書罕能周悉異乎炎漢之世四海一家馬遷乘𫝊以求自古遺文而州郡上計皆先集太史若斯之備也况彼吳楚者僻居南裔地隔江山去彼魯邦尤為遼闊丘明所録安能備諸且必以蠻夷而故略也若駒支預於晉㑹長狄埋於魯國葛廬之辨牛鳴郯子之知鳥職斯皆邊隅小國人品最微猶復收其瑣事見於方冊安有主盟中國勢迫宗周爭長諸華威凌强晉而可遺之者哉又荀氏著書抄撮班史其取事也中外一槩夷夏皆均非是獨略胡鄉而偏詳漢室盛既疑丘明之擯吳楚遂誣仲豫之抑胸奴可謂强奏庸音特為足曲者也史通荀悅漢紀不當以班彪王命論置西漢之末漢書斷章事終新室如叔皮存殁附入中興而輒引與前書共編者蓋序𫝊之常例耳荀悅既刪略班史勒成漢紀而彪論王命列在末篇夫以規諷隗囂翼戴光武忽以東都之事擢居西漢之中必如是則賔戲幽通亦與同載者矣史通前後漢書二史不當目更始為劉元至如更始中興漢室光武所臣雖事業不成而厯數終在班范二史皆以劉元為目不其慢乎同上後漢書不當抑聖公於𫝊內登文叔於紀首當漢氏之中興也更始升壇改元寒暑三易世祖稱臣北面誠節不虧既而兵敗長安共歸鄗邑兄亡弟及厯數相承作者乃抑聖公於𫝊內登文叔於紀首事等躋僖獨先不窋夫東觀秉筆容或諂於當時後來所修理當刋革者也同上姓名既書題目又顯不當又標為列女髙隱之類尋班馬之為列傳皆具編其人姓名如行狀然相似者則共歸一稱若刺客日者儒林循吏是也范曄移題目於𫝊首厯姓名於卷中而猶於列傳之下注為列女髙隱等目茍姓名既書題目又顯是則鄧禹冦恂之首當書為公輔者矣岑彭吳漢之前當標為將帥者矣觸類而長何止列女孝子髙隱獨行而已同上載更始事為非按後漢書更始𫝊稱其懦弱也其初即位南面立朝羣臣羞愧流汗刮席不敢視夫以聖公身在微賤已能結客報仇避難緑林名為豪傑安有貴為人主而反至於斯者乎將作者曲筆阿附獨成光武之美諛言媚主用雪伯升之怨且中興之史出於東觀或明皇所定或馬后攸刋而炎祚靈長簡書莫改遂使他姓追撰空𫝊僞録者矣史通論之外不當復有贊曄作東漢盡變班馬之條例贊之外又復有論以論而議其賢否然後以贊而揚之論之文如班馬之贊贊之文如商周之頌其文拘礙局促無一事之精詳此曄之弊也同上紀載多失曄之史𫝊若酷吏宦者列女獨行多失其人其間尤失者董宣以節義槩之酷吏鄭衆吕强以亷明直諒槩之宦者蔡琰以忍耻事胡槩之列女李善王忳以深仁厚義槩之獨行與夫前書張湯不載於酷吏史記姚杜仇趙之徒不載於遊俠逺矣又其是非頗與聖人異論竇武何進則戒以宋襄之違天論西域則惜張騫班勇之遺佛書是欲將相茍免以為順天乎中國叛聖人以奉戎神乎此曄之失也羣書考索續集卷十四
